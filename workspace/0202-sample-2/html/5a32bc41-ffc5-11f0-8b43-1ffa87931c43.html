<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weighted Graph Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background: #007acc;
      color: white;
      padding: 1em;
      text-align: center;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }
    #graphCanvas {
      flex: 1;
      background-color: #f0f0f0;
      cursor: grab;
    }
    #controls {
      width: 320px;
      border-left: 1px solid #ccc;
      padding: 1em;
      box-sizing: border-box;
      overflow-y: auto;
      background-color: #fafafa;
    }
    h2 {
      margin-top: 0;
    }
    label {
      display: block;
      margin: 0.5em 0 0.2em;
      font-weight: bold;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 0.25em 0.5em;
      box-sizing: border-box;
    }
    button {
      margin-top: 0.5em;
      padding: 0.5em 1em;
      font-size: 1em;
      cursor: pointer;
      border: none;
      background-color: #007acc;
      color: white;
      border-radius: 3px;
    }
    button:disabled {
      background-color: #888;
      cursor: not-allowed;
    }
    ul {
      list-style: none;
      padding-left: 0;
    }
    ul li {
      padding: 2px 0;
      font-family: monospace;
    }
    .edge-weight {
      font-weight: bold;
      color: #c0392b;
      margin-left: 5px;
    }
    #message {
      margin-top: 1em;
      min-height: 1.5em;
      color: #d35400;
      font-weight: bold;
    }
    #dijkstraControls {
      margin-top: 1em;
      border-top: 1px solid #ccc;
      padding-top: 1em;
    }
    #pathResult {
      margin-top: 0.5em;
      background-color: #e8f6f3;
      padding: 0.5em;
      border-radius: 5px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <header>
    <h1>Weighted Graph Interactive Demo</h1>
  </header>
  <main>
    <canvas id="graphCanvas" width="800" height="600" tabindex="0" aria-label="Weighted graph visualization"></canvas>
    <aside id="controls" role="region" aria-live="polite">
      <h2>Graph Controls</h2>
      <section aria-label="Add Node">
        <label for="nodeIdInput">Node ID (unique)</label>
        <input type="text" id="nodeIdInput" maxlength="3" aria-describedby="nodeHelp" placeholder="e.g. A" />
        <small id="nodeHelp">Node ids are short, like A, B, C...</small>
        <button id="addNodeBtn">Add Node</button>
      </section>
      <section aria-label="Add Edge" style="margin-top:1em;">
        <label for="edgeStartInput">Start Node ID</label>
        <input type="text" id="edgeStartInput" maxlength="3" placeholder="e.g. A" />
        <label for="edgeEndInput">End Node ID</label>
        <input type="text" id="edgeEndInput" maxlength="3" placeholder="e.g. B" />
        <label for="edgeWeightInput">Weight (positive number)</label>
        <input type="number" id="edgeWeightInput" min="0.01" step="0.01" placeholder="e.g. 5" />
        <button id="addEdgeBtn">Add Edge</button>
      </section>

      <section aria-label="Graph Information" style="margin-top: 2em;">
        <h3>Nodes (<span id="nodeCount">0</span>)</h3>
        <ul id="nodesList" aria-live="polite" aria-atomic="true"></ul>
        <h3>Edges (<span id="edgeCount">0</span>)</h3>
        <ul id="edgesList" aria-live="polite" aria-atomic="true"></ul>
      </section>

      <section id="dijkstraControls" aria-label="Find shortest path">
        <h3>Dijkstra Shortest Path</h3>
        <label for="startNodeDijkstra">Start Node</label>
        <input type="text" id="startNodeDijkstra" maxlength="3" placeholder="e.g. A" />
        <label for="endNodeDijkstra">End Node</label>
        <input type="text" id="endNodeDijkstra" maxlength="3" placeholder="e.g. B" />
        <button id="findPathBtn">Find Shortest Path</button>
        <div id="pathResult" aria-live="polite"></div>
      </section>

      <div id="message" role="alert" aria-live="assertive"></div>
    </aside>
  </main>

  <script>
    /*
     * Weighted Graph Demo
     * 
     * Features:
     * - Add nodes by ID
     * - Add weighted edges between nodes
     * - Canvas visualization with drag & position nodes
     * - Shows nodes and edges in lists
     * - Find shortest path with Dijkstra's algorithm
     */

    (function() {
      // Canvas setup
      const canvas = document.getElementById('graphCanvas');
      const ctx = canvas.getContext('2d');

      // DOM Elements
      const nodeIdInput = document.getElementById('nodeIdInput');
      const addNodeBtn = document.getElementById('addNodeBtn');
      const edgeStartInput = document.getElementById('edgeStartInput');
      const edgeEndInput = document.getElementById('edgeEndInput');
      const edgeWeightInput = document.getElementById('edgeWeightInput');
      const addEdgeBtn = document.getElementById('addEdgeBtn');
      const nodesList = document.getElementById('nodesList');
      const edgesList = document.getElementById('edgesList');
      const nodeCount = document.getElementById('nodeCount');
      const edgeCount = document.getElementById('edgeCount');
      const message = document.getElementById('message');
      const startNodeDijkstra = document.getElementById('startNodeDijkstra');
      const endNodeDijkstra = document.getElementById('endNodeDijkstra');
      const findPathBtn = document.getElementById('findPathBtn');
      const pathResult = document.getElementById('pathResult');

      // Graph Data Structures
      class Graph {
        constructor() {
          this.nodes = new Map(); 
          // key: nodeId (string) -> value: Node instance
          this.edges = new Map(); 
          // key: nodeId, value: Map of adjacent nodeId -> weight
        }
        addNode(id, x = null, y = null) {
          if (this.nodes.has(id)) return false;
          // If x,y not provided, place randomly near center
          if (x === null || y === null) {
            x = canvas.width/2 + (Math.random()-0.5)*200;
            y = canvas.height/2 + (Math.random()-0.5)*200;
          }
          this.nodes.set(id, new Node(id, x, y));
          this.edges.set(id, new Map());
          return true;
        }
        hasNode(id) {
          return this.nodes.has(id);
        }
        removeNode(id) {
          if (!this.nodes.has(id)) return false;
          this.nodes.delete(id);
          this.edges.delete(id);
          // Remove edges connected to id
          for (const [from, adjs] of this.edges) {
            if (adjs.has(id)) {
              adjs.delete(id);
            }
          }
          return true;
        }
        addEdge(from, to, weight) {
          if (!this.nodes.has(from) || !this.nodes.has(to)) return false;
          if (weight <= 0) return false;
          this.edges.get(from).set(to, weight);
          this.edges.get(to).set(from, weight); // Undirected
          return true;
        }
        removeEdge(from, to) {
          if (!this.nodes.has(from) || !this.nodes.has(to)) return false;
          const removed1 = this.edges.get(from).delete(to);
          const removed2 = this.edges.get(to).delete(from);
          return removed1 || removed2;
        }
        getEdges() {
          // Return edges as [from,to,weight], only one direction (from < to) to avoid duplicates
          const seen = new Set();
          const result = [];
          for (const [from, adjs] of this.edges) {
            for (const [to, weight] of adjs) {
              const edgeId = [from,to].sort().join('-');
              if (!seen.has(edgeId)) {
                seen.add(edgeId);
                result.push({from, to, weight});
              }
            }
          }
          return result;
        }
      }

      class Node {
        constructor(id, x, y) {
          this.id = id;
          this.x = x;
          this.y = y;
          this.radius = 20;
          this.isDragging = false;
        }
      }

      // Initialize Graph
      const graph = new Graph();

      // Add some sample nodes and edges to start with
      function addSampleGraph() {
        graph.addNode('A', 150, 150);
        graph.addNode('B', 400, 100);
        graph.addNode('C', 650, 150);
        graph.addNode('D', 200, 400);
        graph.addNode('E', 600, 400);

        graph.addEdge('A', 'B', 7);
        graph.addEdge('A', 'D', 5);
        graph.addEdge('B', 'C', 8);
        graph.addEdge('B', 'D', 9);
        graph.addEdge('B', 'E', 7);
        graph.addEdge('C', 'E', 5);
        graph.addEdge('D', 'E', 15);
      }

      // Rendering Variables
      let draggingNode = null;
      let dragOffsetX = 0;
      let dragOffsetY = 0;

      function drawGraph(highlightedPath = null) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw edges first
        for (const {from, to, weight} of graph.getEdges()) {
          const nodeFrom = graph.nodes.get(from);
          const nodeTo = graph.nodes.get(to);

          const isHighlighted = highlightedPath && highlightedPath.some((val, i, arr) => {
            if(i === arr.length-1) return false;
            return (val === from && arr[i+1] === to) || (val === to && arr[i+1] === from);
          });

          ctx.lineWidth = isHighlighted ? 4 : 2;
          ctx.strokeStyle = isHighlighted ? '#e67e22' : '#7f8c8d';
          ctx.beginPath();
          ctx.moveTo(nodeFrom.x, nodeFrom.y);
          ctx.lineTo(nodeTo.x, nodeTo.y);
          ctx.stroke();

          // Draw weight label - midpoint of edge line
          const midX = (nodeFrom.x + nodeTo.x)/2;
          const midY = (nodeFrom.y + nodeTo.y)/2;
          ctx.fillStyle = '#c0392b';
          ctx.font = '14px Arial';
          ctx.fillText(weight, midX + 5, midY - 5);
        }

        // Draw nodes on top
        for (const node of graph.nodes.values()) {
          // Circle
          ctx.beginPath();
          ctx.fillStyle = '#2980b9';
          ctx.strokeStyle = '#34495e';
          ctx.lineWidth = 2;
          ctx.arc(node.x, node.y, node.radius, 0, 2 * Math.PI);
          ctx.fill();

          // Highlight if in path
          if (highlightedPath && highlightedPath.includes(node.id)) {
            ctx.strokeStyle = '#e67e22';
            ctx.lineWidth = 4;
            ctx.stroke();
          } else {
            ctx.stroke();
          }

          // Text
          ctx.fillStyle = 'white';
          ctx.font = 'bold 16px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(node.id, node.x, node.y);
        }
      }

      function updateGraphInfo() {
        // Nodes List
        nodesList.innerHTML = '';
        for (const node of graph.nodes.values()) {
          const li = document.createElement('li');
          li.textContent = `${node.id} (x: ${node.x.toFixed(1)}, y: ${node.y.toFixed(1)})`;
          nodesList.appendChild(li);
        }
        nodeCount.textContent = graph.nodes.size;

        // Edges List
        edgesList.innerHTML = '';
        for (const edge of graph.getEdges()) {
          const li = document.createElement('li');
          li.innerHTML = `${edge.from} — ${edge.to} <span class="edge-weight">(weight: ${edge.weight})</span>`;
          edgesList.appendChild(li);
        }
        edgeCount.textContent = graph.getEdges().length;
      }

      // Validate Node ID: simple uppercase alphabetical max 3 chars
      function validNodeId(id) {
        const r = /^[A-Z0-9]{1,3}$/;
        return r.test(id);
      }

      // Add Node Handler
      addNodeBtn.addEventListener('click', () => {
        message.textContent = '';
        const id = nodeIdInput.value.trim().toUpperCase();
        if (!validNodeId(id)) {
          message.textContent = 'Invalid Node ID. Use 1-3 uppercase letters or numbers (A-Z,0-9).';
          return;
        }
        if (graph.hasNode(id)) {
          message.textContent = `Node "${id}" already exists.`;
          return;
        }
        graph.addNode(id);
        nodeIdInput.value = '';
        updateGraphInfo();
        drawGraph();
      });

      // Add Edge Handler
      addEdgeBtn.addEventListener('click', () => {
        message.textContent = '';
        const from = edgeStartInput.value.trim().toUpperCase();
        const to = edgeEndInput.value.trim().toUpperCase();
        const weight = parseFloat(edgeWeightInput.value);

        if (!(validNodeId(from) && validNodeId(to))) {
          message.textContent = 'Start and End node IDs must be valid (1-3 uppercase letters/numbers).';
          return;
        }
        if (from === to) {
          message.textContent = 'Cannot create edge from a node to itself.';
          return;
        }
        if (!graph.hasNode(from)) {
          message.textContent = `Node "${from}" does not exist.`;
          return;
        }
        if (!graph.hasNode(to)) {
          message.textContent = `Node "${to}" does not exist.`;
          return;
        }
        if (isNaN(weight) || weight <= 0) {
          message.textContent = 'Weight must be a positive number.';
          return;
        }
        graph.addEdge(from, to, weight);
        edgeStartInput.value = '';
        edgeEndInput.value = '';
        edgeWeightInput.value = '';
        updateGraphInfo();
        drawGraph();
      });

      // Canvas Interaction: Drag nodes
      canvas.addEventListener('mousedown', e => {
        const pos = getMousePos(canvas, e);
        for (const node of graph.nodes.values()) {
          if (distance(pos, node) <= node.radius) {
            draggingNode = node;
            dragOffsetX = pos.x - node.x;
            dragOffsetY = pos.y - node.y;
            canvas.style.cursor = 'grabbing';
            break;
          }
        }
      });
      canvas.addEventListener('mouseup', e => {
        if (draggingNode) {
          draggingNode = null;
          canvas.style.cursor = 'grab';
          updateGraphInfo();
          drawGraph();
        }
      });
      canvas.addEventListener('mouseleave', e => {
        if (draggingNode) {
          draggingNode = null;
          canvas.style.cursor = 'grab';
          updateGraphInfo();
          drawGraph();
        }
      });
      canvas.addEventListener('mousemove', e => {
        if (draggingNode) {
          const pos = getMousePos(canvas, e);
          draggingNode.x = pos.x - dragOffsetX;
          draggingNode.y = pos.y - dragOffsetY;
          drawGraph(currentHighlightedPath);
        }
      });

      function getMousePos(canvas, evt) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: evt.clientX - rect.left,
          y: evt.clientY - rect.top
        };
      }
      function distance(p1, p2) {
        return Math.sqrt((p1.x - p2.x)**2 + (p1.y - p2.y)**2);
      }

      // Dijkstra's Algorithm Implementation
      function dijkstra(graph, startId, endId) {
        if (!graph.hasNode(startId) || !graph.hasNode(endId)) return null;

        const distances = new Map();
        const previous = new Map();
        const pq = new MinPriorityQueue();

        for (const nodeId of graph.nodes.keys()) {
          distances.set(nodeId, Infinity);
          previous.set(nodeId, null);
        }
        distances.set(startId, 0);
        pq.enqueue(startId, 0);

        while (!pq.isEmpty()) {
          const currentNode = pq.dequeue();
          if (currentNode === endId) break;
          for (const [neighbor, weight] of graph.edges.get(currentNode)) {
            const altDistance = distances.get(currentNode) + weight;
            if (altDistance < distances.get(neighbor)) {
              distances.set(neighbor, altDistance);
              previous.set(neighbor, currentNode);
              pq.enqueue(neighbor, altDistance);
            }
          }
        }

        // Build path by walking back from endId
        if (distances.get(endId) === Infinity) return null;

        const path = [];
        let u = endId;
        while (u !== null) {
          path.unshift(u);
          u = previous.get(u);
        }

        return {path, distance: distances.get(endId)};
      }

      // Simple Priority Queue for Dijkstra
      class MinPriorityQueue {
        constructor() {
          this.queue = [];
        }
        enqueue(val, priority) {
          this.queue.push({val, priority});
          this.queue.sort((a,b) => a.priority - b.priority);
        }
        dequeue() {
          if (this.queue.length === 0) return null;
          return this.queue.shift().val;
        }
        isEmpty() {
          return this.queue.length === 0;
        }
      }

      // Dijkstra Controls
      let currentHighlightedPath = null;

      findPathBtn.addEventListener('click', () => {
        message.textContent = '';
        pathResult.textContent = '';
        currentHighlightedPath = null;

        const start = startNodeDijkstra.value.trim().toUpperCase();
        const end = endNodeDijkstra.value.trim().toUpperCase();

        if (!validNodeId(start) || !validNodeId(end)) {
          message.textContent = 'Start and End node IDs must be valid (1-3 uppercase letters/numbers).';
          return;
        }
        if (!graph.hasNode(start) || !graph.hasNode(end)) {
          message.textContent = `Both nodes must exist in the graph.`;
          return;
        }
        if (start === end) {
          message.textContent = 'Start and End nodes are the same.';
          return;
        }

        const result = dijkstra(graph, start, end);

        if (!result) {
          message.textContent = `No path found between ${start} and ${end}.`;
          drawGraph();
          return;
        }

        currentHighlightedPath = result.path;
        drawGraph(currentHighlightedPath);

        pathResult.textContent = `Path: ${result.path.join(' → ')} (Total weight: ${result.distance.toFixed(2)})`;
      });

      // Initial setup
      addSampleGraph();
      updateGraphInfo();
      drawGraph();

      // Accessibility focus style on canvas
      canvas.style.outline = 'none';
      canvas.addEventListener('focus', () => {
        canvas.style.boxShadow = '0 0 5px 2px #2980b9';
      });
      canvas.addEventListener('blur', () => {
        canvas.style.boxShadow = 'none';
      });

    })();
  </script>
</body>
</html>
