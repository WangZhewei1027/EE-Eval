<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Heap (Min & Max) Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f9f9f9;
  }
  h1 {
    text-align: center;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
  }
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
    justify-content: center;
  }
  input[type=number] {
    width: 80px;
    padding: 5px;
    font-size: 1em;
    text-align: center;
  }
  button {
    padding: 7px 14px;
    font-size: 1em;
    cursor: pointer;
    border: 1.5px solid #333;
    border-radius: 4px;
    background: white;
    transition: background-color 0.2s;
  }
  button:hover:not(:disabled) {
    background-color: #e0e0e0;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .heap-type {
    margin-bottom: 10px;
    text-align: center;
  }
  .heap-visual, .log-area {
    background: white;
    padding: 15px;
    border: 1.5px solid #ccc;
    border-radius: 8px;
    min-height: 100px;
    box-shadow: 2px 2px 6px #ddd;
  }
  .heap-array {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .heap-node {
    width: 40px;
    height: 40px;
    background: #3a86ff;
    color: white;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    box-shadow: 0 2px 5px rgba(0,0,0,0.15);
    user-select: none;
  }
  .heap-node.highlight {
    background: #ffbe0b;
    color: #333;
    box-shadow: 0 0 12px 4px #ffbe0b;
  }
  .heap-tree {
    margin-top: 25px;
    display: flex;
    justify-content: center;
  }
  svg {
    overflow: visible;
  }
  .log-area {
    margin-top: 15px;
    max-height: 180px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 0.9em;
    white-space: pre-wrap;
  }
  @media (max-width: 600px) {
    .controls {
      flex-direction: column;
      align-items: center;
    }
    .heap-array {
      font-size: 0.85em;
    }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Heap Visualization - Min Heap & Max Heap</h1>
  <div class="heap-type">
    <label><input type="radio" name="heapType" value="min" checked /> Min Heap</label>
    <label><input type="radio" name="heapType" value="max" /> Max Heap</label>
  </div>
  <div class="controls">
    <input type="number" id="inputValue" placeholder="Value" />
    <button id="insertBtn">Insert</button>
    <button id="extractBtn">Extract Root</button>
    <button id="clearBtn">Clear</button>
  </div>
  <div>
    <strong>Heap Array Representation:</strong>
    <div class="heap-array" id="heapArray"></div>
  </div>
  <div>
    <strong>Heap Tree Visualization:</strong>
    <div class="heap-tree" id="heapTree"></div>
  </div>
  <div>
    <strong>Operations Log:</strong>
    <div class="log-area" id="logArea"></div>
  </div>
</div>

<script>
(() => {
  const logArea = document.getElementById("logArea");
  const heapArrayDiv = document.getElementById("heapArray");
  const heapTreeDiv = document.getElementById("heapTree");
  const inputValue = document.getElementById("inputValue");
  const insertBtn = document.getElementById("insertBtn");
  const extractBtn = document.getElementById("extractBtn");
  const clearBtn = document.getElementById("clearBtn");
  const heapTypeRadios = document.getElementsByName("heapType");

  function log(message) {
    logArea.textContent += message + "\n";
    logArea.scrollTop = logArea.scrollHeight;
  }

  class Heap {
    constructor(type = "min") {
      this.type = type; // "min" or "max"
      this.data = [];
    }

    compare(i, j) {
      if (this.type === "min") return this.data[i] < this.data[j];
      else return this.data[i] > this.data[j];
    }

    swap(i, j) {
      [this.data[i], this.data[j]] = [this.data[j], this.data[i]];
      log(`Swapped indices ${i} and ${j}: [${this.data.join(", ")}]`);
    }

    insert(value) {
      log(`Inserting value: ${value}`);
      this.data.push(value);
      this.heapifyUp(this.data.length - 1);
    }

    heapifyUp(index) {
      let current = index;
      while (current > 0) {
        let parent = Math.floor((current - 1) / 2);
        if (this.compare(current, parent)) {
          this.swap(current, parent);
          current = parent;
        } else break;
      }
    }

    extractRoot() {
      if (this.data.length === 0) {
        log("Heap is empty, cannot extract root.");
        return null;
      }
      const rootVal = this.data[0];
      log(`Extracting root: ${rootVal}`);
      if (this.data.length === 1) {
        this.data.pop();
        return rootVal;
      }
      this.data[0] = this.data.pop();
      log(`Moved last element to root: ${this.data[0]}`);
      this.heapifyDown(0);
      return rootVal;
    }

    heapifyDown(index) {
      let current = index;
      const length = this.data.length;
      while (true) {
        let left = 2 * current + 1;
        let right = 2 * current + 2;
        let swapIndex = current;

        if (left < length && this.compare(left, swapIndex)) {
          swapIndex = left;
        }
        if (right < length && this.compare(right, swapIndex)) {
          swapIndex = right;
        }
        if (swapIndex !== current) {
          this.swap(current, swapIndex);
          current = swapIndex;
        } else break;
      }
    }

    clear() {
      this.data = [];
      log("Heap cleared.");
    }
  }

  // Visualization code for the tree
  function createSvgElement(tag, attrs = {}) {
    const elem = document.createElementNS("http://www.w3.org/2000/svg", tag);
    for (const attr in attrs) {
      elem.setAttribute(attr, attrs[attr]);
    }
    return elem;
  }

  function renderHeapTree(heap) {
    heapTreeDiv.innerHTML = "";
    if (heap.data.length === 0) {
      heapTreeDiv.textContent = "Heap is empty.";
      return;
    }

    // Prepare svg
    const width = 800;
    const height = 300;
    const svg = createSvgElement("svg", { width, height });

    // Calculate node positions by levels in a binary tree fashion
    const positions = [];
    const levels = Math.floor(Math.log2(heap.data.length)) + 1;
    const levelHeight = height / (levels + 1);

    // We calculate horizontal positions per level
    for (let i = 0; i < heap.data.length; i++) {
      const level = Math.floor(Math.log2(i + 1));
      const levelIndex = i - (Math.pow(2, level) - 1);
      const nodesInLevel = Math.pow(2, level);
      const horizontalSpace = width / (nodesInLevel + 1);
      const x = (levelIndex + 1) * horizontalSpace;
      const y = (level + 1) * levelHeight;
      positions.push({ x, y });
    }

    // Draw edges first (lines from parent to children)
    for (let i = 0; i < heap.data.length; i++) {
      const leftChildIndex = 2 * i + 1;
      const rightChildIndex = 2 * i + 2;
      if (leftChildIndex < heap.data.length) {
        const line = createSvgElement("line", {
          x1: positions[i].x,
          y1: positions[i].y,
          x2: positions[leftChildIndex].x,
          y2: positions[leftChildIndex].y,
          stroke: "#777",
          "stroke-width": "2"
        });
        svg.appendChild(line);
      }
      if (rightChildIndex < heap.data.length) {
        const line = createSvgElement("line", {
          x1: positions[i].x,
          y1: positions[i].y,
          x2: positions[rightChildIndex].x,
          y2: positions[rightChildIndex].y,
          stroke: "#777",
          "stroke-width": "2"
        });
        svg.appendChild(line);
      }
    }

    // Draw nodes (circles with text)
    for (let i = 0; i < heap.data.length; i++) {
      const group = createSvgElement("g", { cursor: "default" });

      const circle = createSvgElement("circle", {
        cx: positions[i].x,
        cy: positions[i].y,
        r: 20,
        fill: i === 0 ? "#ffbe0b" : "#3a86ff",
        stroke: "#333",
        "stroke-width": 1.5,
        filter: "drop-shadow(1px 1px 1px rgba(0,0,0,0.2))"
      });

      const text = createSvgElement("text", {
        x: positions[i].x,
        y: positions[i].y + 6,
        "text-anchor": "middle",
        "font-size": "16",
        fill: i === 0 ? "#333" : "#fff",
        "font-weight": "bold",
        "pointer-events": "none",
        "user-select": "none"
      });
      text.textContent = heap.data[i];

      group.appendChild(circle);
      group.appendChild(text);

      svg.appendChild(group);
    }

    heapTreeDiv.appendChild(svg);
  }

  function renderHeapArray(heap) {
    heapArrayDiv.innerHTML = "";
    if (heap.data.length === 0) {
      heapArrayDiv.textContent = "Heap is empty.";
      return;
    }
    heap.data.forEach((value, i) => {
      const node = document.createElement("div");
      node.className = "heap-node";
      if (i === 0) node.classList.add("highlight");
      node.title = `Index ${i}`;
      node.textContent = value;
      heapArrayDiv.appendChild(node);
    });
  }

  // Initialize heap
  let heap = new Heap("min");

  // Update heap when type changes
  function onHeapTypeChange() {
    const selected = [...heapTypeRadios].find(r => r.checked).value;
    const oldData = [...heap.data];
    heap = new Heap(selected);
    log(`\nSwitched to ${selected === "min" ? "Min Heap" : "Max Heap"}. Rebuilding heap...`);
    oldData.forEach(val => heap.insert(val));
    renderHeapArray(heap);
    renderHeapTree(heap);
  }

  // Insert value handler
  function onInsert() {
    const val = Number(inputValue.value);
    if (Number.isNaN(val)) {
      alert("Please enter a valid number.");
      return;
    }
    heap.insert(val);
    renderHeapArray(heap);
    renderHeapTree(heap);
    inputValue.value = "";
    inputValue.focus();
  }

  // Extract root handler
  function onExtract() {
    const root = heap.extractRoot();
    if (root !== null) {
      log(`Extracted root value: ${root}`);
    }
    renderHeapArray(heap);
    renderHeapTree(heap);
  }

  function onClear() {
    heap.clear();
    renderHeapArray(heap);
    renderHeapTree(heap);
  }

  insertBtn.addEventListener("click", onInsert);
  extractBtn.addEventListener("click", onExtract);
  clearBtn.addEventListener("click", onClear);
  heapTypeRadios.forEach(radio => radio.addEventListener("change", onHeapTypeChange));
  // allow enter key to insert
  inputValue.addEventListener("keydown", e => {
    if(e.key === "Enter") onInsert();
  });

  // Initial render
  renderHeapArray(heap);
  renderHeapTree(heap);
  log("Heap Visualization Initialized.\nUse the controls above to insert or extract from the heap.\n");
})();
</script>
</body>
</html>
