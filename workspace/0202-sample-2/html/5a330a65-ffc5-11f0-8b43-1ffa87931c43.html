<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Binary Search Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2rem;
    background: #f0f4f8;
    color: #333;
  }
  h1 {
    text-align: center;
  }
  #arrayContainer {
    display: flex;
    justify-content: center;
    margin: 1rem 0 2rem 0;
    flex-wrap: wrap;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }
  .arrayItem {
    width: 40px;
    height: 40px;
    margin: 5px;
    background: #e0e7f3;
    border: 2px solid #ccc;
    border-radius: 5px;
    line-height: 40px;
    text-align: center;
    font-weight: bold;
    user-select: none;
    transition: background-color 0.3s, border-color 0.3s;
  }
  .low {
    background-color: #ffd580;
    border-color: #ffb347;
  }
  .mid {
    background-color: #90caf9;
    border-color: #42a5f5;
    color: white;
  }
  .high {
    background-color: #ff8a80;
    border-color: #e53935;
    color: white;
  }
  .found {
    background-color: #66bb6a;
    border-color: #388e3c;
    color: white;
  }
  #controls {
    max-width: 400px;
    margin: 1rem auto 2rem auto;
    text-align: center;
  }
  input[type="number"] {
    width: 80px;
    font-size: 1rem;
    padding: 6px 8px;
    margin-right: 0.5rem;
  }
  button {
    padding: 8px 14px;
    font-size: 1rem;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    background: #1976d2;
    color: white;
    transition: background-color 0.3s;
  }
  button:disabled {
    background: #90a4ae;
    cursor: not-allowed;
  }
  #log {
    max-width: 600px;
    margin: 0 auto;
    background: white;
    padding: 1rem;
    border-radius: 6px;
    height: 180px;
    overflow-y: auto;
    box-shadow: 0 2px 8px rgb(0 0 0 / 0.1);
    font-family: monospace;
    font-size: 0.9rem;
  }
</style>
</head>
<body>
<h1>Binary Search Visualization</h1>

<div id="arrayContainer"></div>

<div id="controls">
  <input id="searchInput" type="number" placeholder="Enter target" />
  <button id="startBtn">Start Search</button>
  <button id="resetBtn" disabled>Reset</button>
</div>

<div id="log"></div>

<script>
  // Sorted array of unique integers
  const array = [3, 7, 15, 23, 31, 42, 56, 63, 79, 88, 94, 101];

  const arrayContainer = document.getElementById('arrayContainer');
  const searchInput = document.getElementById('searchInput');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const log = document.getElementById('log');

  let low = 0;
  let high = array.length - 1;
  let mid = null;
  let target = null;
  let searching = false;
  let intervalId = null;

  // Initialize array display
  function displayArray() {
    arrayContainer.innerHTML = '';
    array.forEach((num, idx) => {
      const div = document.createElement('div');
      div.classList.add('arrayItem');
      div.id = 'item-' + idx;
      div.textContent = num;
      arrayContainer.appendChild(div);
    });
  }

  function clearHighlights() {
    for (let i = 0; i < array.length; i++) {
      const el = document.getElementById('item-' + i);
      el.className = 'arrayItem';
    }
  }

  function highlight(lowIdx, midIdx, highIdx) {
    clearHighlights();
    if (lowIdx >= 0 && lowIdx < array.length) {
      document.getElementById('item-' + lowIdx).classList.add('low');
    }
    if (midIdx !== null && midIdx >= 0 && midIdx < array.length) {
      document.getElementById('item-' + midIdx).classList.add('mid');
    }
    if (highIdx >= 0 && highIdx < array.length) {
      document.getElementById('item-' + highIdx).classList.add('high');
    }
  }

  function logMessage(message) {
    const p = document.createElement('p');
    p.textContent = message;
    log.appendChild(p);
    log.scrollTop = log.scrollHeight;
  }

  function disableControls(isSearching) {
    searchInput.disabled = isSearching;
    startBtn.disabled = isSearching;
    resetBtn.disabled = !isSearching;
  }

  function binarySearchStep() {
    if (low > high) {
      logMessage(`Target ${target} not found in the array.`);
      disableControls(false);
      clearInterval(intervalId);
      searching = false;
      return;
    }
    mid = Math.floor((low + high) / 2);
    highlight(low, mid, high);
    logMessage(`Checking middle index ${mid}, value ${array[mid]}`);
    
    if (array[mid] === target) {
      document.getElementById('item-' + mid).classList.add('found');
      logMessage(`Target ${target} found at index ${mid}!`);
      disableControls(false);
      clearInterval(intervalId);
      searching = false;
    } else if (array[mid] < target) {
      logMessage(`Value ${array[mid]} is less than target ${target}, searching right half.`);
      low = mid + 1;
    } else {
      logMessage(`Value ${array[mid]} is greater than target ${target}, searching left half.`);
      high = mid - 1;
    }
  }

  function startSearch() {
    target = Number(searchInput.value);

    if (isNaN(target)) {
      alert('Please enter a valid number as the target.');
      return;
    }

    // Reset variables
    low = 0;
    high = array.length - 1;
    mid = null;
    searching = true;
    log.innerHTML = '';
    logMessage(`Starting binary search for target ${target}...`);
    disableControls(true);
    highlight(low, null, high);

    intervalId = setInterval(binarySearchStep, 1500);
  }

  function reset() {
    if (intervalId) {
      clearInterval(intervalId);
    }
    searching = false;
    low = 0;
    high = array.length - 1;
    mid = null;
    target = null;
    log.innerHTML = '';
    searchInput.value = '';
    clearHighlights();
    displayArray();
    disableControls(false);
  }

  startBtn.addEventListener('click', () => {
    if (!searching) {
      startSearch();
    }
  });

  resetBtn.addEventListener('click', reset);

  // Initial setup
  displayArray();
</script>
</body>
</html>
