<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JavaScript Array Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2em;
      background: #f9f9f9;
      color: #333;
    }
    h1 {
      color: #2c3e50;
    }
    #arrayContent {
      margin: 1em 0;
      background: #ecf0f1;
      padding: 1em;
      border-radius: 5px;
      white-space: pre-wrap;
      font-family: monospace;
    }
    button {
      background-color: #2980b9;
      color: white;
      border: none;
      padding: 0.5em 1em;
      margin: 0.5em 0.2em 1em 0;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #3498db;
    }
    input[type="text"], input[type="number"] {
      padding: 0.3em;
      margin-right: 0.5em;
      border: 1px solid #bdc3c7;
      border-radius: 4px;
    }
    label {
      font-weight: bold;
    }
    .section {
      margin-bottom: 2em;
    }
  </style>
</head>
<body>
  <h1>JavaScript Array Demo</h1>
  <p>This page demonstrates the basic concepts and operations on <code>Array</code> in JavaScript.</p>

  <div class="section">
    <h2>Initial Array</h2>
    <div id="arrayContent"></div>
  </div>

  <div class="section">
    <h2>Array Operations</h2>

    <div>
      <label for="pushValue">Push Value:</label>
      <input type="text" id="pushValue" placeholder="Enter value" />
      <button id="btnPush">Push to Array</button>
    </div>

    <div>
      <label for="popResult">Pop Result:</label>
      <input type="text" id="popResult" readonly />
      <button id="btnPop">Pop from Array</button>
    </div>

    <div>
      <label for="unshiftValue">Unshift Value:</label>
      <input type="text" id="unshiftValue" placeholder="Enter value" />
      <button id="btnUnshift">Unshift to Array</button>
    </div>

    <div>
      <label for="shiftResult">Shift Result:</label>
      <input type="text" id="shiftResult" readonly />
      <button id="btnShift">Shift from Array</button>
    </div>

    <div>
      <label for="indexOfValue">Index Of:</label>
      <input type="text" id="indexOfValue" placeholder="Enter value" />
      <button id="btnIndexOf">Find Index</button>
      <span id="indexOfResult"></span>
    </div>

    <div>
      <label for="spliceIndex">Splice Index:</label>
      <input type="number" id="spliceIndex" min="0" style="width: 4em"/>
      <label for="spliceCount">Count:</label>
      <input type="number" id="spliceCount" min="0" style="width: 4em"/>
      <label for="spliceInsert">Insert Value:</label>
      <input type="text" id="spliceInsert" placeholder="Optional" />
      <button id="btnSplice">Splice Array</button>
    </div>
  </div>

  <div class="section">
    <h2>Array Properties & Methods Demo</h2>
    <button id="btnLength">Show Length</button>
    <button id="btnJoin">Show Join (comma separated)</button>
    <button id="btnReverse">Reverse Array</button>
    <button id="btnSort">Sort Array</button>
    <button id="btnMap">Map (to uppercase if string)</button>
    <button id="btnFilter">Filter (strings with length &gt; 3)</button>
    <button id="btnClear">Reset to Initial Array</button>
    <div id="output" style="margin-top: 1em; font-family: monospace; white-space: pre-wrap;"></div>
  </div>

  <script>
    (() => {
      // Initial array with different types
      const initialArray = ['apple', 'banana', 'cherry', 'date', 42, true, null];
      let arr = [...initialArray];

      const arrayContent = document.getElementById('arrayContent');
      const output = document.getElementById('output');

      function updateDisplay() {
        arrayContent.textContent = JSON.stringify(arr, null, 2);
      }

      function clearOutput() {
        output.textContent = '';
      }

      // Show initial array on load
      updateDisplay();

      // Buttons and inputs
      const btnPush = document.getElementById('btnPush');
      const pushValueInput = document.getElementById('pushValue');

      const btnPop = document.getElementById('btnPop');
      const popResultInput = document.getElementById('popResult');

      const btnUnshift = document.getElementById('btnUnshift');
      const unshiftValueInput = document.getElementById('unshiftValue');

      const btnShift = document.getElementById('btnShift');
      const shiftResultInput = document.getElementById('shiftResult');

      const btnIndexOf = document.getElementById('btnIndexOf');
      const indexOfValueInput = document.getElementById('indexOfValue');
      const indexOfResultSpan = document.getElementById('indexOfResult');

      const btnSplice = document.getElementById('btnSplice');
      const spliceIndexInput = document.getElementById('spliceIndex');
      const spliceCountInput = document.getElementById('spliceCount');
      const spliceInsertInput = document.getElementById('spliceInsert');

      const btnLength = document.getElementById('btnLength');
      const btnJoin = document.getElementById('btnJoin');
      const btnReverse = document.getElementById('btnReverse');
      const btnSort = document.getElementById('btnSort');
      const btnMap = document.getElementById('btnMap');
      const btnFilter = document.getElementById('btnFilter');
      const btnClear = document.getElementById('btnClear');

      // Utility to interpret input string to a typed value if possible
      function interpretValue(val) {
        if (val === 'true') return true;
        if (val === 'false') return false;
        if (val === 'null') return null;
        if (!isNaN(Number(val)) && val.trim() !== '') return Number(val);
        return val;
      }

      btnPush.addEventListener('click', () => {
        const val = interpretValue(pushValueInput.value);
        arr.push(val);
        updateDisplay();
        pushValueInput.value = '';
        clearOutput();
      });

      btnPop.addEventListener('click', () => {
        const popped = arr.pop();
        popResultInput.value = popped === undefined ? '' : String(popped);
        updateDisplay();
        clearOutput();
      });

      btnUnshift.addEventListener('click', () => {
        const val = interpretValue(unshiftValueInput.value);
        arr.unshift(val);
        updateDisplay();
        unshiftValueInput.value = '';
        clearOutput();
      });

      btnShift.addEventListener('click', () => {
        const shifted = arr.shift();
        shiftResultInput.value = shifted === undefined ? '' : String(shifted);
        updateDisplay();
        clearOutput();
      });

      btnIndexOf.addEventListener('click', () => {
        const val = interpretValue(indexOfValueInput.value);
        const idx = arr.indexOf(val);
        indexOfResultSpan.textContent = idx === -1 ? 'Value not found' : `Index: ${idx}`;
        clearOutput();
      });

      btnSplice.addEventListener('click', () => {
        const index = Number(spliceIndexInput.value);
        const count = Number(spliceCountInput.value);
        if (isNaN(index) || index < 0 || index > arr.length) {
          alert('Please enter a valid splice index.');
          return;
        }
        if (isNaN(count) || count < 0) {
          alert('Please enter a valid splice count.');
          return;
        }
        let insertedValues = [];
        const insertValRaw = spliceInsertInput.value.trim();
        if (insertValRaw !== '') {
          insertedValues.push(interpretValue(insertValRaw));
        }

        const removed = arr.splice(index, count, ...insertedValues);
        output.textContent = `Removed elements:\n${JSON.stringify(removed, null, 2)}`;
        updateDisplay();
      });

      btnLength.addEventListener('click', () => {
        output.textContent = `Array length: ${arr.length}`;
      });

      btnJoin.addEventListener('click', () => {
        output.textContent = `Array joined with ",":\n${arr.join(',')}`;
      });

      btnReverse.addEventListener('click', () => {
        arr.reverse();
        updateDisplay();
        output.textContent = 'Array reversed.';
      });

      btnSort.addEventListener('click', () => {
        // Use simple sort as strings
        arr.sort((a, b) => {
          if (typeof a === 'string' && typeof b === 'string') return a.localeCompare(b);
          return String(a).localeCompare(String(b));
        });
        updateDisplay();
        output.textContent = 'Array sorted (as strings).';
      });

      btnMap.addEventListener('click', () => {
        arr = arr.map(item => {
          if (typeof item === 'string') return item.toUpperCase();
          return item;
        });
        updateDisplay();
        output.textContent = 'Mapped array (strings to uppercase).';
      });

      btnFilter.addEventListener('click', () => {
        const filtered = arr.filter(item => typeof item === 'string' && item.length > 3);
        output.textContent = `Filtered array (strings with length > 3):\n${JSON.stringify(filtered, null, 2)}`;
      });

      btnClear.addEventListener('click', () => {
        arr = [...initialArray];
        updateDisplay();
        output.textContent = 'Array reset to initial array.';
        clearOutput();
      });
    })();
  </script>
</body>
</html>
