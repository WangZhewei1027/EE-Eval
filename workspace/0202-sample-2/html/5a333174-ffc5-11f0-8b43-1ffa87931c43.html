<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Floyd-Warshall Algorithm Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f9fafb;
    color: #333;
  }
  h1 {
    text-align: center;
  }
  #graph-input {
    margin-bottom: 15px;
  }
  label {
    font-weight: bold;
  }
  textarea {
    width: 100%;
    height: 120px;
    font-family: monospace;
    font-size: 14px;
    margin-top: 5px;
    margin-bottom: 10px;
  }
  button {
    background-color: #2d89ef;
    color: white;
    border: none;
    padding: 10px 18px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 4px;
  }
  button:hover {
    background-color: #1b5fa7;
  }
  .output-section {
    margin-top: 25px;
  }
  table {
    border-collapse: collapse;
    margin: 10px 0;
    width: 100%;
    max-width: 600px;
  }
  th, td {
    border: 1px solid #bbb;
    padding: 6px 8px;
    text-align: center;
  }
  th {
    background: #2d89ef;
    color: white;
  }
  td.infinity {
    color: #d33;
    font-style: italic;
  }
  .note {
    font-size: 0.9em;
    color: #555;
    margin-top: -10px;
    margin-bottom: 15px;
    max-width: 600px;
  }
  #steps {
    max-width: 90vw;
    max-height: 250px;
    overflow-y: auto;
    background: #f0f4ff;
    border: 1px solid #999;
    padding: 10px;
    font-family: monospace;
    font-size: 13px;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
<h1>Floyd-Warshall Algorithm Demo</h1>

<section id="graph-input">
  <label for="matrixInput">Enter adjacency matrix (use 0 for no self loops, 9999 or INF for no edge):</label>
  <textarea id="matrixInput" aria-label="Adjacency matrix input" spellcheck="false">
0 3 9999 7
8 0 2 9999
5 9999 0 1
2 9999 9999 0
  </textarea>
  <div class="note">
    Use spaces to separate numbers and line breaks for new rows. Example above is a 4x4 graph.
  </div>
  <button id="runBtn">Run Floyd-Warshall</button>
</section>

<section class="output-section" aria-live="polite" aria-atomic="true">
  <h2>Distance Matrix Result</h2>
  <div id="result"></div>
</section>

<section class="output-section">
  <h2>Step-by-Step Update Log</h2>
  <div id="steps" tabindex="0" aria-label="Step by step updates"></div>
</section>

<script>
(() => {
  const INF = 9999;

  // Parse input matrix from textarea - convert to numbers, validate rectangular
  function parseMatrix(text) {
    const lines = text.trim().split('\n');
    const matrix = [];
    for (const line of lines) {
      const row = line.trim().split(/\s+/).map(x => {
        if (x.toUpperCase() === 'INF') return INF;
        const n = Number(x);
        return isNaN(n) ? INF : n;
      });
      matrix.push(row);
    }
    // Validate rectangle shape
    const rowLength = matrix[0].length;
    for (const r of matrix) {
      if (r.length !== rowLength) throw new Error('Matrix is not rectangular.');
    }
    // Validate square
    if (matrix.length !== matrix[0].length) throw new Error('Matrix must be square.');
    return matrix;
  }

  // Clone matrix deeply (2d array)
  function cloneMatrix(m) {
    return m.map(row => row.slice());
  }

  // Format matrix as HTML table
  function matrixToTable(matrix) {
    const n = matrix.length;
    let html = '<table><thead><tr><th></th>';
    for (let i = 0; i < n; i++) {
      html += `<th>V${i}</th>`;
    }
    html += '</tr></thead><tbody>';
    for (let i = 0; i < n; i++) {
      html += `<tr><th>V${i}</th>`;
      for (let j = 0; j < n; j++) {
        if (matrix[i][j] === INF) {
          html += `<td class="infinity">∞</td>`;
        } else {
          html += `<td>${matrix[i][j]}</td>`;
        }
      }
      html += '</tr>';
    }
    html += '</tbody></table>';
    return html;
  }

  // Floyd-Warshall algorithm with step logging
  function floydWarshall(matrix, logger) {
    const n = matrix.length;
    // dist initialized with input matrix
    const dist = cloneMatrix(matrix);

    // For all k,i,j check if path i->k->j is shorter than i->j
    for (let k = 0; k < n; k++) {
      logger(`Using vertex V${k} as intermediate:`);
      for (let i = 0; i < n; i++) {
        for (let j = 0; j < n; j++) {
          const before = dist[i][j];
          if (dist[i][k] !== INF && dist[k][j] !== INF) {
            const newDist = dist[i][k] + dist[k][j];
            if (newDist < dist[i][j]) {
              dist[i][j] = newDist;
              logger(`  Updated dist[V${i}][V${j}] from ${before === INF ? '∞' : before} to ${newDist} via V${k}`);
            }
          }
        }
      }
      logger(''); // blank line after each k
    }
    return dist;
  }

  // DOM Elements
  const matrixInput = document.getElementById('matrixInput');
  const runBtn = document.getElementById('runBtn');
  const resultDiv = document.getElementById('result');
  const stepsDiv = document.getElementById('steps');

  runBtn.addEventListener('click', () => {
    resultDiv.innerHTML = '';
    stepsDiv.textContent = '';
    let matrix;
    try {
      matrix = parseMatrix(matrixInput.value);
    } catch (e) {
      alert('Error parsing matrix: ' + e.message);
      return;
    }

    // Log collector
    const logs = [];
    function logger(msg) {
      logs.push(msg);
      // For better UX, also update live step output gradually
      // but here we do at once for clarity
    }

    const distResult = floydWarshall(matrix, logger);
    // Show final distance matrix
    resultDiv.innerHTML = matrixToTable(distResult);
    // Show logs
    stepsDiv.textContent = logs.join('\n');
    stepsDiv.focus();
  });
})();
</script>

</body>
</html>
