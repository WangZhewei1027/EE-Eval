<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Selection Sort Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f0f0f0;
    text-align: center;
  }
  h1 {
    margin-bottom: 0.1em;
  }
  #arrayContainer {
    margin: 30px auto;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 250px;
    width: 80%;
    max-width: 800px;
    border: 1px solid #aaa;
    background: white;
    padding: 10px;
    box-sizing: border-box;
    border-radius: 8px;
  }
  .bar {
    margin: 0 2px;
    background-color: steelblue;
    width: 25px;
    border-radius: 3px 3px 0 0;
    transition: background-color 0.3s, height 0.3s;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    color: white;
    font-weight: bold;
    font-size: 14px;
  }
  .bar.highlight {
    background-color: #f39c12;
  }
  .bar.current-min {
    background-color: #e74c3c;
  }
  .bar.sorted {
    background-color: #2ecc71;
  }
  #controls {
    margin-top: 20px;
  }
  button, input[type=number] {
    font-size: 16px;
    padding: 8px 12px;
    margin: 0 5px 10px 5px;
    border-radius: 5px;
    border: 1px solid #aaa;
  }
  button:hover {
    cursor: pointer;
    background-color: #ddd;
  }
  button:disabled {
    background-color: #eee;
    cursor: default;
  }
  label {
    font-size: 16px;
    margin-left: 10px;
  }
  #speedLabel {
    margin-left: 15px;
    font-weight: bold;
  }
</style>
</head>
<body>
<h1>Selection Sort Visualization</h1>
<div id="arrayContainer"></div>
<div id="controls">
  <button id="generateBtn">Generate New Array</button>
  <button id="startBtn">Start Sorting</button>
  <label for="sizeInput">Array Size:</label>
  <input type="number" id="sizeInput" min="5" max="50" value="20" />
  <label for="speedInput">Speed:</label>
  <input type="range" id="speedInput" min="1" max="1000" value="300" />
  <span id="speedLabel">300 ms</span>
</div>
<script>
(() => {
  const arrayContainer = document.getElementById('arrayContainer');
  const generateBtn = document.getElementById('generateBtn');
  const startBtn = document.getElementById('startBtn');
  const sizeInput = document.getElementById('sizeInput');
  const speedInput = document.getElementById('speedInput');
  const speedLabel = document.getElementById('speedLabel');

  let array = [];
  let delayTime = parseInt(speedInput.value, 10);
  let isSorting = false;

  function generateArray(size) {
    array = [];
    // Generate array with random integers from 5 to 100
    for(let i = 0; i < size; i++) {
      array.push(Math.floor(Math.random() * 95) + 5);
    }
  }

  function renderArray(highlightIndices = {}, sortedIndices = {}) {
    arrayContainer.innerHTML = '';
    const maxVal = Math.max(...array);
    array.forEach((value, index) => {
      const bar = document.createElement('div');
      bar.classList.add('bar');
      bar.style.height = `${(value / maxVal) * 200 + 30}px`;
      bar.textContent = value;
      if (highlightIndices.current === index) {
        bar.classList.add('highlight');
      }
      if (highlightIndices.min === index) {
        bar.classList.add('current-min');
      }
      if (sortedIndices[index]) {
        bar.classList.add('sorted');
      }
      arrayContainer.appendChild(bar);
    });
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  async function selectionSort() {
    isSorting = true;
    generateBtn.disabled = true;
    startBtn.disabled = true;
    sizeInput.disabled = true;
    speedInput.disabled = true;

    let n = array.length;
    let sortedIndices = {};

    for (let i = 0; i < n - 1; i++) {
      let minIndex = i;
      renderArray({current: i, min: minIndex}, sortedIndices);
      await sleep(delayTime);

      for (let j = i + 1; j < n; j++) {
        renderArray({current: j, min: minIndex}, sortedIndices);
        await sleep(delayTime / 2);
        if (array[j] < array[minIndex]) {
          minIndex = j;
          renderArray({current: j, min: minIndex}, sortedIndices);
          await sleep(delayTime / 2);
        }
      }

      if (minIndex !== i) {
        // Swap values
        [array[i], array[minIndex]] = [array[minIndex], array[i]];
        renderArray({current: i, min: minIndex}, sortedIndices);
        await sleep(delayTime);
      }
      sortedIndices[i] = true;
      renderArray({}, sortedIndices);
    }
    sortedIndices[n-1] = true;
    renderArray({}, sortedIndices);

    isSorting = false;
    generateBtn.disabled = false;
    startBtn.disabled = false;
    sizeInput.disabled = false;
    speedInput.disabled = false;
  }

  function updateSpeedLabel() {
    speedLabel.textContent = `${speedInput.value} ms`;
  }

  generateBtn.addEventListener('click', () => {
    if (isSorting) return;
    const size = parseInt(sizeInput.value, 10);
    if (isNaN(size) || size < 5 || size > 50) {
      alert('Array size must be between 5 and 50');
      return;
    }
    generateArray(size);
    renderArray();
  });

  startBtn.addEventListener('click', () => {
    if (isSorting) return;
    selectionSort();
  });

  speedInput.addEventListener('input', () => {
    delayTime = parseInt(speedInput.value, 10);
    updateSpeedLabel();
  });

  sizeInput.addEventListener('change', () => {
    if (isSorting) return;
    let val = parseInt(sizeInput.value, 10);
    if (isNaN(val) || val < 5) val = 5;
    if (val > 50) val = 50;
    sizeInput.value = val;
  });

  // Init
  generateArray(parseInt(sizeInput.value, 10));
  renderArray();
  updateSpeedLabel();
})();
</script>
</body>
</html>
