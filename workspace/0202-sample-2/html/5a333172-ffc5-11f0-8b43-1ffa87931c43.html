<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dijkstra's Algorithm Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f7f7f7;
    color: #333;
  }
  #canvasContainer {
    text-align: center;
    margin-bottom: 20px;
  }
  canvas {
    background: #fff;
    box-shadow: 0 0 10px rgba(100, 100, 100, 0.3);
    border-radius: 8px;
  }
  #controls {
    max-width: 700px;
    margin: 0 auto 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }
  #controls > * {
    flex: 1 1 140px;
    min-width: 140px;
  }
  label {
    display: block;
    font-size: 0.9em;
    margin-bottom: 4px;
  }
  select, input[type=number], button {
    width: 100%;
    padding: 8px 10px;
    font-size: 1em;
    border: 1px solid #aaa;
    border-radius: 4px;
  }
  button {
    background-color: #2d86ff;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: 600;
  }
  button:hover:not(:disabled) {
    background-color: #1766d1;
  }
  button:disabled {
    background-color: #999;
    cursor: not-allowed;
  }
  #log {
    max-width: 700px;
    margin: 0 auto;
    padding: 12px;
    height: 180px;
    overflow-y: auto;
    background: #ececec;
    border-radius: 6px;
    font-family: monospace;
    font-size: 14px;
    line-height: 1.3em;
  }
  #legend {
    max-width: 700px;
    margin: 20px auto 0;
    font-size: 0.9em;
  }
  .legend-item {
    display: inline-flex;
    align-items: center;
    margin-right: 15px;
  }
  .color-box {
    width: 18px;
    height: 18px;
    margin-right: 6px;
    border-radius: 4px;
    border: 1px solid #ccc;
  }
  .color-unvisited { background-color: #ddd; }
  .color-visited { background-color: #66cc66; }
  .color-current { background-color: #ff9933; }
  .color-edge { stroke: #bbb; }
  .color-edge-active { stroke: #ff9933; stroke-width: 3; }
  .color-edge-shortest { stroke: #3399ff; stroke-width: 3; }
</style>
</head>
<body>

<h1>Dijkstra’s Algorithm Visualization</h1>
<p>Visual demonstration of Dijkstra's shortest path algorithm on a weighted graph.</p>

<div id="canvasContainer">
  <canvas id="graphCanvas" width="700" height="500"></canvas>
</div>

<div id="controls">
  <div>
    <label for="startNode">Start Node:</label>
    <select id="startNode"></select>
  </div>
  <div>
    <label for="endNode">End Node (optional):</label>
    <select id="endNode">
      <option value="">None</option>
    </select>
  </div>
  <div>
    <label>&nbsp;</label>
    <button id="startBtn">Start Algorithm</button>
  </div>
  <div>
    <label>&nbsp;</label>
    <button id="resetBtn" disabled>Reset</button>
  </div>
</div>

<div id="log" aria-live="polite" aria-atomic="false" aria-relevant="additions">
  <em>Algorithm log will appear here...</em>
</div>

<div id="legend">
  <strong>Legend:</strong> 
  <span class="legend-item"><span class="color-box color-unvisited"></span> Unvisited Node</span>
  <span class="legend-item"><span class="color-box color-visited"></span> Visited Node (Distance Fixed)</span>
  <span class="legend-item"><span class="color-box color-current"></span> Current Node</span>
  <span class="legend-item"><svg width="18" height="18"><line x1="2" y1="9" x2="16" y2="9" stroke="#bbb" stroke-width="2"/></svg> Edge</span>
  <span class="legend-item"><svg width="18" height="18"><line x1="2" y1="9" x2="16" y2="9" stroke="#ff9933" stroke-width="3"/></svg> Edge being processed</span>
  <span class="legend-item"><svg width="18" height="18"><line x1="2" y1="9" x2="16" y2="9" stroke="#3399ff" stroke-width="3"/></svg> Shortest path edges</span>
</div>

<script>
(() => {
  // Graph data: nodes with positions and adjacency list with weights
  // Hardcoded example graph with 8 nodes
  const nodes = [
    {id: 'A', x: 100, y: 100},
    {id: 'B', x: 250, y: 80},
    {id: 'C', x: 400, y: 120},
    {id: 'D', x: 550, y: 90},
    {id: 'E', x: 150, y: 250},
    {id: 'F', x: 300, y: 280},
    {id: 'G', x: 450, y: 280},
    {id: 'H', x: 600, y: 250},
  ];

  // Edges: undirected graph; each edge has source, target and weight
  // Represented by adjacency list with weights: map nodeId -> array of {to, weight}
  const adjacency = {
    A: [{to: 'B', weight: 4}, {to: 'E', weight: 7}],
    B: [{to: 'A', weight: 4}, {to: 'C', weight: 9}, {to: 'F', weight: 2}],
    C: [{to: 'B', weight: 9}, {to: 'D', weight: 6}, {to: 'G', weight: 3}],
    D: [{to: 'C', weight: 6}, {to: 'H', weight: 5}],
    E: [{to: 'A', weight: 7}, {to: 'F', weight: 3}],
    F: [{to: 'B', weight: 2}, {to: 'E', weight: 3}, {to: 'G', weight: 4}],
    G: [{to: 'C', weight: 3}, {to: 'F', weight: 4}, {to: 'H', weight: 8}],
    H: [{to: 'D', weight: 5}, {to: 'G', weight: 8}],
  };

  const canvas = document.getElementById('graphCanvas');
  const ctx = canvas.getContext('2d');

  const startNodeSelect = document.getElementById('startNode');
  const endNodeSelect = document.getElementById('endNode');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const logContainer = document.getElementById('log');

  // Colors for node states
  const colorUnvisited = '#ddd';
  const colorVisited = '#66cc66';
  const colorCurrent = '#ff9933';
  const edgeColor = '#bbb';
  const edgeActiveColor = '#ff9933';
  const edgeShortestColor = '#3399ff';

  // Radius for node circles
  const nodeRadius = 22;

  // Data structure showing current status of nodes in algorithm
  let nodeStates = {}; 
  // nodeStates[nodeId] = 'unvisited' | 'visited' | 'current'
  // Also store distances and previous node for path
  let distances = {};
  let previous = {};
  let settledNodes = new Set();

  // For animation/timing
  let animationStep = 0;
  let animationIntervalId = null;
  let processingQueue = []; // Priority queue of nodes to process as {id, dist}
  
  // Data to visualize edges activated in current step
  let activeEdges = [];
  // Edges forming the shortest path (for highlighting)
  let shortestPathEdges = [];

  // To facilitate priority queue, we will create a helper function
  function insertQueue(queue, nodeId, dist) {
    queue.push({id: nodeId, dist});
    queue.sort((a,b) => a.dist - b.dist);
  }
  function popQueue(queue) {
    return queue.shift();
  }

  // Initialize selectable nodes in dropdowns
  function populateNodeSelects() {
    for (const n of nodes) {
      const opt1 = document.createElement('option');
      opt1.value = n.id;
      opt1.textContent = n.id;
      startNodeSelect.appendChild(opt1);

      const opt2 = document.createElement('option');
      opt2.value = n.id;
      opt2.textContent = n.id;
      endNodeSelect.appendChild(opt2);
    }
  }

  // Reset all states to initial
  function resetState() {
    nodeStates = {};
    distances = {};
    previous = {};
    settledNodes.clear();
    activeEdges = [];
    shortestPathEdges = [];
    processingQueue = [];
    animationStep = 0;
    clearInterval(animationIntervalId);
    animationIntervalId = null;
    logContainer.textContent = '';
    for (const n of nodes) {
      nodeStates[n.id] = 'unvisited';
      distances[n.id] = Infinity;
      previous[n.id] = null;
    }
    drawGraph();
    startBtn.disabled = false;
    resetBtn.disabled = true;
  }

  // Draw the entire graph with current states
  function drawGraph() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.lineCap = 'round';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '14px monospace';

    // Helper to get node object by id
    function getNode(id) {
      return nodes.find(n => n.id === id);
    }

    // Draw edges
    // First normal edges
    for (const [from, adj] of Object.entries(adjacency)) {
      for (const {to, weight} of adj) {
        // To avoid drawing twice in undirected graph, draw only if from < to lex order
        if (from < to) {
          const fromNode = getNode(from);
          const toNode = getNode(to);

          // Determine color and width
          let lineColor = edgeColor;
          let lineWidth = 2;
          // check if active
          if (activeEdges.some(e => (e.from === from && e.to === to) || (e.from === to && e.to === from))) {
            lineColor = edgeActiveColor;
            lineWidth = 4;
          }
          // check if in shortest path
          if (shortestPathEdges.some(e => (e.from === from && e.to === to) || (e.from === to && e.to === from))) {
            lineColor = edgeShortestColor;
            lineWidth = 4;
          }

          ctx.strokeStyle = lineColor;
          ctx.lineWidth = lineWidth;
          ctx.beginPath();
          ctx.moveTo(fromNode.x, fromNode.y);
          ctx.lineTo(toNode.x, toNode.y);
          ctx.stroke();

          // Draw weight at midpoint
          const midX = (fromNode.x + toNode.x)/2;
          const midY = (fromNode.y + toNode.y)/2;
          ctx.fillStyle = '#222';
          ctx.fillRect(midX - 14, midY - 14, 28, 20);
          ctx.fillStyle = 'white';
          ctx.fillText(weight, midX, midY - 4);
        }
      }
    }

    // Draw nodes
    for (const n of nodes) {
      // Determine color by state
      let fillColor = colorUnvisited;
      if (nodeStates[n.id] === 'visited') fillColor = colorVisited;
      else if (nodeStates[n.id] === 'current') fillColor = colorCurrent;

      ctx.fillStyle = fillColor;
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(n.x, n.y, nodeRadius, 0, 2 * Math.PI);
      ctx.fill();
      ctx.stroke();

      // Draw node ID
      ctx.fillStyle = '#111';
      ctx.font = 'bold 18px monospace';
      ctx.fillText(n.id, n.x, n.y);

      // Draw distance if known and finite
      if (distances[n.id] !== Infinity) {
        ctx.fillStyle = '#222';
        ctx.font = '14px monospace';
        ctx.fillText(distances[n.id], n.x, n.y + 28);
      }
    }
  }

  // Log message to the log container
  function log(message) {
    logContainer.textContent += message + '\n';
    logContainer.scrollTop = logContainer.scrollHeight;
  }

  // Highlight edges on the path back from endNode to start
  function buildShortestPathEdges(endId) {
    shortestPathEdges = [];
    let cur = endId;
    while (previous[cur]) {
      shortestPathEdges.push({from: previous[cur], to: cur});
      cur = previous[cur];
    }
  }

  // Main Dijkstra algorithm steps with animation (step by step)
  function stepDijkstra(startId, endId) {
    if (animationIntervalId) clearInterval(animationIntervalId);

    // Initialize
    for (const n of nodes) {
      distances[n.id] = Infinity;
      previous[n.id] = null;
      nodeStates[n.id] = 'unvisited';
    }
    distances[startId] = 0;
    processingQueue = [{id: startId, dist: 0}];
    settledNodes.clear();
    shortestPathEdges = [];
    activeEdges = [];
    animationStep = 0;

    startBtn.disabled = true;
    resetBtn.disabled = false;
    logContainer.textContent = '';
    log(`Starting at node: ${startId}`);

    drawGraph();

    animationIntervalId = setInterval(() => {
      if (processingQueue.length === 0) {
        clearInterval(animationIntervalId);
        log('Algorithm complete.');

        if (endId && distances[endId] !== Infinity) {
          log(`Shortest distance to node ${endId} is ${distances[endId]}.`);
          buildShortestPathEdges(endId);
          drawGraph();
          log('Shortest path highlighted in blue.');
        } else if (endId) {
          log(`Node ${endId} is not reachable from ${startId}.`);
        }

        nodeStates = Object.fromEntries(Object.entries(nodeStates).map(([id]) => [id, 'visited']));
        drawGraph();
        startBtn.disabled = true; // no restart until reset
        return;
      }

      // Pop node with smallest tentative distance
      let current = popQueue(processingQueue);
      let curNode = current.id;
      // If already settled, skip
      if (settledNodes.has(curNode)) {
        return;
      }

      // Set current node state to 'current'
      for (const nId in nodeStates) {
        if (nodeStates[nId] === 'current') nodeStates[nId] = 'unvisited';
      }
      nodeStates[curNode] = 'current';
      drawGraph();

      log(`Processing node ${curNode} with tentative distance ${distances[curNode]}.`);

      // Explore neighbors
      activeEdges = [];
      const neighbors = adjacency[curNode];
      for (const {to, weight} of neighbors) {
        if (settledNodes.has(to)) continue;
        activeEdges.push({from: curNode, to});

        const newDist = distances[curNode] + weight;
        if (newDist < distances[to]) {
          distances[to] = newDist;
          previous[to] = curNode;

          // Update/Insert node in queue with new distance
          // Remove old entry if exists:
          processingQueue = processingQueue.filter(e => e.id !== to);
          insertQueue(processingQueue, to, newDist);
          log(`Updating distance of node ${to} to ${newDist} (via ${curNode}).`);
        } else {
          log(`No update required for node ${to} (current distance ${distances[to]}).`);
        }
      }
      drawGraph();

      // Mark current node as settled
      nodeStates[curNode] = 'visited';
      settledNodes.add(curNode);

      // End if end node was just settled
      if (endId && curNode === endId) {
        clearInterval(animationIntervalId);
        log(`Reached target node ${endId}. Algorithm complete.`);
        buildShortestPathEdges(endId);
        drawGraph();
        startBtn.disabled = true;
        return;
      }
    }, 1500);
  }

  // Event handlers
  startBtn.addEventListener('click', () => {
    const startId = startNodeSelect.value;
    const endId = endNodeSelect.value || null;
    if (!startId) {
      alert('Please select a start node.');
      return;
    }
    if (endId === startId) {
      alert('Start node and end node must be different.');
      return;
    }
    stepDijkstra(startId, endId);
  });

  resetBtn.addEventListener('click', () => {
    resetState();
  });

  // Initialization
  function init() {
    populateNodeSelects();
    resetState();
  }

  init();
})();
</script>

</body>
</html>
