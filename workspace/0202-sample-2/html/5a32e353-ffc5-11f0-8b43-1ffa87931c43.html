<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Insertion Sort Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f9f9f9;
    color: #333;
  }
  h1 {
    text-align: center;
  }
  #arrayContainer {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    margin: 40px auto;
    width: 90%;
    max-width: 800px;
    height: 300px;
    border: 1px solid #ccc;
    background: #fff;
    position: relative;
  }
  .bar {
    margin: 0 2px;
    background-color: #3498db;
    width: 20px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-size: 12px;
    color: white;
    border-radius: 3px 3px 0 0;
    transition: background-color 0.3s ease;
  }
  .bar.current {
    background-color: #e67e22;
  }
  .bar.compared {
    background-color: #e74c3c;
  }
  .bar.sorted {
    background-color: #2ecc71;
  }
  #controls {
    text-align: center;
    margin-top: 20px;
  }
  button, input[type=number] {
    font-size: 16px;
    padding: 6px 12px;
    margin: 0 5px;
  }
  #speedLabel {
    margin-left: 15px;
    font-size: 14px;
  }
</style>
</head>
<body>

<h1>Insertion Sort Visualization</h1>

<div id="arrayContainer"></div>

<div id="controls">
  <button id="generateBtn">Generate New Array</button>
  <button id="startBtn">Start Sort</button>
  <button id="pauseBtn" disabled>Pause</button>
  <label for="speedRange">Speed:</label>
  <input type="range" id="speedRange" min="100" max="2000" step="100" value="600" />
  <span id="speedLabel">600 ms</span>
</div>

<script>
(() => {
  const arrayContainer = document.getElementById('arrayContainer');
  const generateBtn = document.getElementById('generateBtn');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const speedRange = document.getElementById('speedRange');
  const speedLabel = document.getElementById('speedLabel');

  let array = [];
  const ARRAY_SIZE = 30;
  const MAX_VALUE = 100;
  let sorting = false;
  let paused = false;
  let delay = 600;

  let timeoutId = null;

  // Generate random array
  function generateArray() {
    array = [];
    for (let i = 0; i < ARRAY_SIZE; i++) {
      array.push(Math.floor(Math.random() * MAX_VALUE) + 5);
    }
  }

  // Render array bars
  function renderArray(highlight = {}) {
    // highlight keys: currentIndex, comparedIndex, sortedIndices (Set)
    arrayContainer.innerHTML = '';
    const sortedIndices = highlight.sortedIndices || new Set();

    array.forEach((value, i) => {
      const bar = document.createElement('div');
      bar.classList.add('bar');
      bar.style.height = `${value * 2.5}px`; // scale to fit container height
      bar.textContent = value;

      if (i === highlight.currentIndex) bar.classList.add('current');
      if (i === highlight.comparedIndex) bar.classList.add('compared');
      if (sortedIndices.has(i)) bar.classList.add('sorted');
      arrayContainer.appendChild(bar);
    });
  }

  // Sleep helper
  function sleep(ms) {
    return new Promise(resolve => {
      timeoutId = setTimeout(resolve, ms);
    });
  }

  // Async Insertion Sort with visualization and pause support
  async function insertionSort() {
    sorting = true;
    paused = false;
    startBtn.disabled = true;
    generateBtn.disabled = true;
    pauseBtn.disabled = false;
    pauseBtn.textContent = 'Pause';

    const sortedIndices = new Set();

    for (let i = 1; i < array.length; i++) {
      let key = array[i];
      let j = i - 1;

      // Highlight current element
      renderArray({ currentIndex: i, sortedIndices });

      await waitWhilePaused();

      while (j >= 0 && array[j] > key) {
        renderArray({ currentIndex: i, comparedIndex: j, sortedIndices });
        await sleep(delay);
        await waitWhilePaused();

        array[j + 1] = array[j];
        renderArray({ currentIndex: j, comparedIndex: j + 1, sortedIndices });
        await sleep(delay);
        await waitWhilePaused();

        j--;
      }
      array[j + 1] = key;
      sortedIndices.add(i);
      renderArray({ currentIndex: j + 1, sortedIndices });
      await sleep(delay);
      await waitWhilePaused();
    }
    // Mark all as sorted
    for (let i = 0; i < array.length; i++) sortedIndices.add(i);
    renderArray({ sortedIndices });

    sorting = false;
    startBtn.disabled = false;
    generateBtn.disabled = false;
    pauseBtn.disabled = true;
  }

  // Helper to wait while paused
  function waitWhilePaused() {
    return new Promise(resolve => {
      if (!paused) {
        resolve();
      } else {
        const check = () => {
          if (!paused) {
            resolve();
          } else {
            timeoutId = setTimeout(check, 100);
          }
        };
        check();
      }
    });
  }

  function reset() {
    if (timeoutId) {
      clearTimeout(timeoutId);
      timeoutId = null;
    }
    sorting = false;
    paused = false;
    startBtn.disabled = false;
    generateBtn.disabled = false;
    pauseBtn.disabled = true;
    pauseBtn.textContent = 'Pause';
  }

  // Event listeners
  generateBtn.addEventListener('click', () => {
    reset();
    generateArray();
    renderArray();
  });

  startBtn.addEventListener('click', async () => {
    if (sorting) return;
    await insertionSort();
  });

  pauseBtn.addEventListener('click', () => {
    if (!sorting) return;
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    if (!paused && timeoutId === null) {
      // trigger waiting promises to continue
    }
  });

  speedRange.addEventListener('input', () => {
    delay = Number(speedRange.value);
    speedLabel.textContent = `${delay} ms`;
  });

  // Initial setup
  generateArray();
  renderArray();
})();
</script>

</body>
</html>
