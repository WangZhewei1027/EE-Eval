<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Huffman Coding Demonstration</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    max-width: 900px;
  }
  h1 {
    text-align: center;
  }
  textarea {
    width: 100%;
    height: 100px;
    font-family: monospace;
    font-size: 16px;
  }
  button {
    margin: 10px 0 20px;
    padding: 10px 20px;
    font-size: 16px;
  }
  #output {
    white-space: pre-wrap;
    background: #f7f7f7;
    padding: 10px;
    border: 1px solid #ccc;
    font-family: monospace;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
  }
  th, td {
    border: 1px solid #999;
    padding: 6px 10px;
    text-align: center;
  }
  th {
    background-color: #eee;
  }
  .tree-node {
    display: inline-block;
    text-align: center;
    margin: 5px;
    padding: 6px 10px;
    border: 1px solid #888;
    border-radius: 4px;
    font-weight: bold;
    background-color: #d1e7dd;
    position: relative;
  }
  .tree-container {
    margin-top: 20px;
    overflow-x: auto;
    white-space: nowrap;
  }
  .tree-children {
    display: flex;
    justify-content: center;
    margin-top: 20px;
  }
  .tree-link {
    position: absolute;
    width: 1px;
    background-color: #555;
  }
  .tree-link-left {
    top: 100%;
    left: 25%;
    height: 20px;
    border-left: 2px solid #555;
    border-bottom: 2px solid #555;
    width: 25px;
    transform: rotate(-45deg);
    transform-origin: top left;
  }
  .tree-link-right {
    top: 100%;
    left: 75%;
    height: 20px;
    border-left: 2px solid #555;
    border-bottom: 2px solid #555;
    width: 25px;
    transform: rotate(45deg);
    transform-origin: top right;
  }
  .code-bit {
    font-size: 14px;
    color: #444;
    margin-left: 3px;
    font-style: italic;
  }
</style>
</head>
<body>

<h1>Huffman Coding Demonstration</h1>

<p>Enter text below to see Huffman coding applied to it. The output shows frequencies, Huffman codes for each character, the encoded bitstring, and a visualization of the Huffman tree.</p>

<textarea id="inputText" placeholder="Type or paste text here...">this is an example for huffman encoding</textarea>
<br />
<button id="processBtn">Generate Huffman Codes</button>

<div id="output"></div>

<script>
(() => {
  // Priority queue implementation for Huffman tree building
  class PriorityQueue {
    constructor() {
      this.nodes = [];
    }
    enqueue(node) {
      this.nodes.push(node);
      this.nodes.sort((a, b) => a.freq - b.freq);
    }
    dequeue() {
      return this.nodes.shift();
    }
    size() {
      return this.nodes.length;
    }
  }

  // Node class for Huffman tree
  class Node {
    constructor(char, freq, left = null, right = null) {
      this.char = char;
      this.freq = freq;
      this.left = left;
      this.right = right;
    }
  }

  // Build Huffman Tree given frequencies map {char: freq}
  function buildHuffmanTree(freqMap) {
    const pq = new PriorityQueue();
    for (const [char, freq] of Object.entries(freqMap)) {
      pq.enqueue(new Node(char, freq));
    }
    while (pq.size() > 1) {
      const left = pq.dequeue();
      const right = pq.dequeue();
      const merged = new Node(null, left.freq + right.freq, left, right);
      pq.enqueue(merged);
    }
    return pq.dequeue();
  }

  // Generate codes from Huffman tree recursively
  function generateCodes(node, prefix = '', codes = {}) {
    if (!node.left && !node.right) {
      // Leaf node: assign code
      codes[node.char] = prefix || '0'; // Assign '0' if tree has single node
    } else {
      if (node.left) generateCodes(node.left, prefix + '0', codes);
      if (node.right) generateCodes(node.right, prefix + '1', codes);
    }
    return codes;
  }

  // Encode input text using codes map {char: code}
  function encodeText(text, codes) {
    let encoded = '';
    for (const ch of text) {
      encoded += codes[ch];
    }
    return encoded;
  }

  // Calculate frequencies of characters in text
  function frequencyMap(text) {
    const freq = {};
    for (const ch of text) {
      freq[ch] = (freq[ch] || 0) + 1;
    }
    return freq;
  }

  // Create frequency table HTML
  function createFrequencyTable(freqMap) {
    const entries = Object.entries(freqMap).sort((a,b) => b[1] - a[1]);
    let table = '<table><thead><tr><th>Character</th><th>Frequency</th></tr></thead><tbody>';
    for (const [char, f] of entries) {
      const dispChar = char === ' ' ? '[space]' : char === '\n' ? '[newline]' : char;
      table += `<tr><td>${escapeHTML(dispChar)}</td><td>${f}</td></tr>`;
    }
    table += '</tbody></table>';
    return table;
  }

  // Create codes table HTML
  function createCodesTable(codes, freqMap) {
    let entries = Object.entries(codes).map(([ch, code]) => ({
      ch,
      code,
      freq: freqMap[ch]
    }));
    entries.sort((a, b) => b.freq - a.freq);
    let table = '<table><thead><tr><th>Character</th><th>Code</th><th>Frequency</th></tr></thead><tbody>';
    for (const { ch, code, freq } of entries) {
      const dispChar = ch === ' ' ? '[space]' : ch === '\n' ? '[newline]' : ch;
      table += `<tr><td>${escapeHTML(dispChar)}</td><td>${code}</td><td>${freq}</td></tr>`;
    }
    table += '</tbody></table>';
    return table;
  }

  // Escape HTML entities
  function escapeHTML(text) {
    return text.replace(/[&<>"']/g, (m) => {
      switch(m) {
        case '&': return '&amp;';
        case '<': return '&lt;';
        case '>': return '&gt;';
        case '"': return '&quot;';
        case "'": return '&#39;';
        default: return m;
      }
    });
  }

  // Render Huffman tree as nested divs and lines
  function renderHuffmanTree(node) {
    if (!node) return null;

    if (!node.left && !node.right) {
      // Leaf node: display character and freq
      const dispChar = node.char === ' ' ? '[space]' : node.char === '\n' ? '[newline]' : node.char;
      return `
      <div class="tree-node" title="Char: ${escapeHTML(dispChar)}&#10;Frequency: ${node.freq}">
        ${escapeHTML(dispChar)}<br><span style="font-weight:normal;">(${node.freq})</span>
      </div>
      `;
    } else {
      // Internal node: frequency, children below, with connecting lines showing 0/1
      const leftHTML = renderHuffmanTree(node.left);
      const rightHTML = renderHuffmanTree(node.right);
      return `
      <div style="display:inline-block; vertical-align: top; text-align:center; margin:0 10px;">
        <div class="tree-node" title="Frequency: ${node.freq}">
          <span style="font-weight:normal;">Freq</span><br>${node.freq}
        </div>
        <div class="tree-children">
          <div style="position:relative; margin-right:10px;">
            ${leftHTML}
            <div style="position:absolute; bottom:-20px; left:50%; transform: translateX(-50%); font-size: 12px; color:#555;">
              0
            </div>
          </div>
          <div style="position:relative; margin-left:10px;">
            ${rightHTML}
            <div style="position:absolute; bottom:-20px; left:50%; transform: translateX(-50%); font-size: 12px; color:#555;">
              1
            </div>
          </div>
        </div>
      </div>
      `;
    }
  }

  // Main processing function
  function processInput() {
    const text = document.getElementById('inputText').value;
    if (!text) {
      alert('Please enter some text to encode.');
      return;
    }

    const freqMap = frequencyMap(text);
    const hTree = buildHuffmanTree(freqMap);
    const codes = generateCodes(hTree);

    const encodedStr = encodeText(text, codes);
    const numBitsOriginal = text.length * 8; // 8 bits per char (ASCII/UTF-8)
    const numBitsEncoded = encodedStr.length;
    const compressionRatio = (numBitsEncoded / numBitsOriginal).toFixed(3);

    const outputElm = document.getElementById('output');
    let html = '';

    html += '<h2>Character Frequencies</h2>';
    html += createFrequencyTable(freqMap);

    html += '<h2>Huffman Codes</h2>';
    html += createCodesTable(codes, freqMap);

    html += `<h2>Encoding Result</h2>
      <p><b>Original size:</b> ${text.length} characters &times; 8 bits = ${numBitsOriginal} bits</p>
      <p><b>Encoded size:</b> ${numBitsEncoded} bits</p>
      <p><b>Compression ratio:</b> ${compressionRatio} (encoded/original)</p>
      <p><b>Encoded bitstring:</b> <code>${escapeHTML(encodedStr)}</code></p>`;

    html += '<h2>Huffman Tree Visualization</h2>';
    html += `<div class="tree-container">${renderHuffmanTree(hTree)}</div>`;

    outputElm.innerHTML = html;
  }

  document.getElementById('processBtn').addEventListener('click', processInput);

  // Run once on load for default sample text
  window.addEventListener('load', processInput);
})();
</script>

</body>
</html>
