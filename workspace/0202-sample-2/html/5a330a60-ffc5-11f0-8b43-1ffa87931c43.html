<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quick Sort Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f0f2f5;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    margin-bottom: 0.1em;
  }
  #array-container {
    margin: 20px 0;
    display: flex;
    gap: 4px;
    justify-content: center;
  }
  .bar {
    width: 20px;
    background-color: #72aee6;
    transition: background-color 0.3s, height 0.3s;
    text-align: center;
    color: white;
    font-weight: bold;
    font-size: 12px;
    border-radius: 4px 4px 0 0;
    display: flex;
    justify-content: center;
    align-items: flex-end;
  }
  .bar.pivot {
    background-color: #e67373;
  }
  .bar.compare {
    background-color: #f2d16b;
  }
  .bar.swap {
    background-color: #7de7a6;
  }
  button {
    padding: 10px 18px;
    font-size: 1rem;
    border: none;
    border-radius: 5px;
    background-color: #4285f4;
    color: white;
    cursor: pointer;
    margin-top: 10px;
  }
  button:disabled {
    background-color: #a1c2f7;
    cursor: not-allowed;
  }
  #description {
    max-width: 600px;
    text-align: center;
    margin-bottom: 10px;
    color: #333;
  }
  #speed-control {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #speed-control label {
    font-size: 0.9rem;
  }
  #speed {
    width: 120px;
  }
</style>
</head>
<body>
<h1>Quick Sort Visualization</h1>
<div id="description">
  Quick Sort is a divide-and-conquer sorting algorithm that picks a <em>pivot</em> element,
  partitions the array such that elements smaller than pivot come before it and larger ones after,
  then recursively sorts the sub-arrays.
</div>
<div id="array-container"></div>
<div id="speed-control">
  <label for="speed">Animation Speed (ms):</label>
  <input type="range" id="speed" min="50" max="1000" value="400" step="50" />
  <span id="speed-value">400</span>
</div>
<button id="start-btn">Start Quick Sort</button>
<button id="reset-btn">Reset Array</button>

<script>
(() => {
  const arrayContainer = document.getElementById("array-container");
  const startBtn = document.getElementById("start-btn");
  const resetBtn = document.getElementById("reset-btn");
  const speedInput = document.getElementById("speed");
  const speedValue = document.getElementById("speed-value");

  let array = [];
  const arraySize = 20;
  let delay = +speedInput.value;

  function createRandomArray(size) {
    const arr = [];
    while(arr.length < size){
      const val = Math.floor(Math.random() * 200) + 10; // values between 10 and 209
      if(!arr.includes(val)) arr.push(val); // unique values for visual clarity
    }
    return arr;
  }

  // Render bars representing array
  function renderArray(arr, highlight = {}) {
    arrayContainer.innerHTML = "";
    arr.forEach((value, i) => {
      const bar = document.createElement("div");
      bar.classList.add("bar");
      bar.style.height = `${value}px`;
      bar.textContent = "";
      if (highlight.pivot === i) bar.classList.add("pivot");
      if (highlight.compare && highlight.compare.includes(i)) bar.classList.add("compare");
      if (highlight.swap && highlight.swap.includes(i)) bar.classList.add("swap");
      arrayContainer.appendChild(bar);
    });
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // QuickSort with async visualization
  async function quickSort(arr, left, right) {
    if (left < right) {
      const pivotIndex = await partition(arr, left, right);
      await quickSort(arr, left, pivotIndex - 1);
      await quickSort(arr, pivotIndex + 1, right);
    }
  }

  async function partition(arr, left, right) {
    let pivotValue = arr[right];
    let i = left - 1;

    renderArray(arr, { pivot: right });
    await sleep(delay);

    for (let j = left; j < right; j++) {
      renderArray(arr, { pivot: right, compare: [j] });
      await sleep(delay);

      if (arr[j] < pivotValue) {
        i++;
        // Swap arr[i] and arr[j]
        [arr[i], arr[j]] = [arr[j], arr[i]];
        renderArray(arr, { pivot: right, swap: [i, j] });
        await sleep(delay);
      }
    }
    // Place pivot after smaller elements
    [arr[i + 1], arr[right]] = [arr[right], arr[i + 1]];
    renderArray(arr, { swap: [i + 1, right] });
    await sleep(delay);

    return i + 1;
  }

  function disableButtons(state) {
    startBtn.disabled = state;
    resetBtn.disabled = state;
    speedInput.disabled = state;
  }

  function setup() {
    array = createRandomArray(arraySize);
    renderArray(array);
    disableButtons(false);
  }

  startBtn.addEventListener("click", async () => {
    disableButtons(true);
    await quickSort(array, 0, array.length - 1);
    renderArray(array);
    disableButtons(false);
  });

  resetBtn.addEventListener("click", () => {
    setup();
  });

  speedInput.addEventListener("input", (e) => {
    delay = +e.target.value;
    speedValue.textContent = delay;
  });

  // Initial setup
  setup();
})();
</script>
</body>
</html>
