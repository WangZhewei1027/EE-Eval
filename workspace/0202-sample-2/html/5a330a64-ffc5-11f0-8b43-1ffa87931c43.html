<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Linear Search Demonstration</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      background-color: #f9f9f9;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    #arrayContainer {
      display: flex;
      justify-content: center;
      margin: 1rem 0 2rem 0;
      flex-wrap: wrap;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .arrayElement {
      width: 40px;
      height: 40px;
      border: 2px solid #34495e;
      margin: 5px;
      line-height: 40px;
      text-align: center;
      font-weight: bold;
      border-radius: 5px;
      transition: background-color 0.3s, color 0.3s, border-color 0.3s;
      user-select: none;
      font-size: 18px;
    }
    .current {
      background-color: #f39c12;
      color: white;
      border-color: #e67e22;
    }
    .found {
      background-color: #27ae60;
      color: white;
      border-color: #2ecc71;
    }
    .notFound {
      background-color: #c0392b;
      color: white;
      border-color: #e74c3c;
    }
    #controls {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    input[type="number"] {
      padding: 0.5rem;
      font-size: 16px;
      width: 120px;
      border: 1px solid #bdc3c7;
      border-radius: 4px;
      margin-right: 10px;
    }
    button {
      padding: 0.5rem 1rem;
      font-size: 16px;
      border: none;
      background-color: #2980b9;
      color: white;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:disabled {
      background-color: #7f8c8d;
      cursor: not-allowed;
    }
    button:hover:not(:disabled) {
      background-color: #3498db;
    }
    #message {
      text-align: center;
      font-size: 18px;
      margin-top: 1rem;
      min-height: 24px;
    }
    #legend {
      max-width: 300px;
      margin: 2rem auto 0 auto;
      display: flex;
      justify-content: space-around;
    }
    .legendItem {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .colorBox {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 2px solid #333;
    }
    .colorCurrent {
      background-color: #f39c12;
      border-color: #e67e22;
    }
    .colorFound {
      background-color: #27ae60;
      border-color: #2ecc71;
    }
    .colorNotFound {
      background-color: #c0392b;
      border-color: #e74c3c;
    }
  </style>
</head>
<body>
  <h1>Linear Search Demonstration</h1>
  <div id="controls">
    <input type="number" id="searchInput" placeholder="Enter number to find" />
    <button id="startBtn">Start Search</button>
  </div>
  <div id="arrayContainer" aria-label="Array elements for searching"></div>
  <div id="message" role="alert" aria-live="polite"></div>
  <div id="legend" aria-label="Color legend for linear search visualization">
    <div class="legendItem"><div class="colorBox colorCurrent"></div>Currently Checking</div>
    <div class="legendItem"><div class="colorBox colorFound"></div>Found Element</div>
    <div class="legendItem"><div class="colorBox colorNotFound"></div>Checked and Not Found</div>
  </div>

  <script>
    (() => {
      const array = [7, 13, 5, 9, 20, 2, 15, 8, 10, 11];
      const arrayContainer = document.getElementById('arrayContainer');
      const startBtn = document.getElementById('startBtn');
      const searchInput = document.getElementById('searchInput');
      const messageBox = document.getElementById('message');

      let currentIndex = 0;
      let searchValue = null;
      let searching = false;

      function createArrayElements() {
        arrayContainer.innerHTML = '';
        array.forEach((num) => {
          const el = document.createElement('div');
          el.classList.add('arrayElement');
          el.textContent = num;
          arrayContainer.appendChild(el);
        });
      }

      function reset() {
        searching = false;
        currentIndex = 0;
        messageBox.textContent = '';
        createArrayElements();
        startBtn.disabled = false;
        searchInput.disabled = false;
      }

      async function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }

      async function linearSearch(value) {
        searching = true;
        startBtn.disabled = true;
        searchInput.disabled = true;
        messageBox.textContent = 'Starting linear search...';

        for (currentIndex = 0; currentIndex < array.length; currentIndex++) {
          updateHighlights(currentIndex, null);

          messageBox.textContent = `Checking element at index ${currentIndex} (value: ${array[currentIndex]})...`;
          await sleep(1000);

          if (array[currentIndex] === value) {
            updateHighlights(currentIndex, 'found');
            messageBox.textContent = `Value ${value} found at index ${currentIndex}!`;
            searching = false;
            startBtn.disabled = false;
            searchInput.disabled = false;
            return;
          }

          updateHighlights(currentIndex, 'notFound');
          await sleep(500);
        }
        messageBox.textContent = `Value ${value} not found in the array.`;
        searching = false;
        startBtn.disabled = false;
        searchInput.disabled = false;
      }

      function updateHighlights(currentIdx, status) {
        const elems = arrayContainer.children;
        for (let i = 0; i < elems.length; i++) {
          elems[i].classList.remove('current', 'found', 'notFound');
          if (status === null) {
            if (i === currentIdx) elems[i].classList.add('current');
          } else if (status === 'found') {
            if (i === currentIdx) elems[i].classList.add('found');
          } else if (status === 'notFound') {
            if (i === currentIdx) elems[i].classList.add('notFound');
          }
        }
      }

      startBtn.addEventListener('click', () => {
        if (searching) return;
        const val = parseInt(searchInput.value, 10);
        if (isNaN(val)) {
          messageBox.textContent = 'Please enter a valid number to search.';
          return;
        }
        searchValue = val;
        reset();
        linearSearch(searchValue);
      });

      // Initialize array display on page load
      createArrayElements();
    })();
  </script>
</body>
</html>
