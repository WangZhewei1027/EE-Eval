<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Recursion Demonstration</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2rem;
    background: #f0f4f8;
    color: #333;
  }
  h1 {
    color: #007acc;
  }
  input[type="number"] {
    width: 80px;
    padding: 0.3rem;
    font-size: 1rem;
  }
  button {
    padding: 0.4rem 1rem;
    font-size: 1rem;
    margin-left: 0.5rem;
    cursor: pointer;
    background-color: #007acc;
    color: white;
    border: none;
    border-radius: 4px;
  }
  button:hover {
    background-color: #005fa3;
  }
  pre {
    background: #e3eefd;
    border-radius: 5px;
    padding: 1rem;
    margin-top: 1rem;
    white-space: pre-wrap;
  }
  .result {
    margin-top: 1rem;
    font-weight: bold;
  }
</style>
</head>
<body>
<h1>Understanding Recursion: Factorial & Fibonacci</h1>

<p>
  Enter a number to see <strong>recursive</strong> calculations for factorial and Fibonacci sequence.
</p>

<label for="inputNumber">Number (non-negative integer): </label>
<input type="number" id="inputNumber" min="0" max="30" value="5" />
<button id="computeBtn">Compute</button>

<div class="result" id="resultArea"></div>
<pre id="traceArea"></pre>

<script>
// Recursive function to calculate factorial
function factorial(n, trace) {
  trace.push(`factorial(${n}) called.`);
  if (n === 0 || n === 1) {
    trace.push(`factorial(${n}) = 1 (base case)`);
    return 1;
  }
  const result = n * factorial(n - 1, trace);
  trace.push(`factorial(${n}) = ${n} * factorial(${n - 1}) = ${result}`);
  return result;
}

// Recursive function to calculate nth Fibonacci number
function fibonacci(n, trace) {
  trace.push(`fibonacci(${n}) called.`);
  if (n === 0) {
    trace.push(`fibonacci(0) = 0 (base case)`);
    return 0;
  }
  if (n === 1) {
    trace.push(`fibonacci(1) = 1 (base case)`);
    return 1;
  }
  const result = fibonacci(n - 1, trace) + fibonacci(n - 2, trace);
  trace.push(`fibonacci(${n}) = fibonacci(${n-1}) + fibonacci(${n-2}) = ${result}`);
  return result;
}

document.getElementById('computeBtn').addEventListener('click', () => {
  const n = parseInt(document.getElementById('inputNumber').value);
  const resultArea = document.getElementById('resultArea');
  const traceArea = document.getElementById('traceArea');
  
  if (isNaN(n) || n < 0) {
    resultArea.textContent = 'Please enter a valid non-negative integer.';
    traceArea.textContent = '';
    return;
  }
  if (n > 30) {
    // prevent very high calculation times for fibonacci
    resultArea.textContent = 'Please enter a number 30 or less for performance reasons.';
    traceArea.textContent = '';
    return;
  }
  
  // Clear previous results
  resultArea.textContent = '';
  traceArea.textContent = '';
  
  // Factorial calculation with trace
  const factTrace = [];
  const factResult = factorial(n, factTrace);
  
  // Fibonacci calculation with trace
  const fibTrace = [];
  const fibResult = fibonacci(n, fibTrace);
  
  resultArea.innerHTML = `<strong>Results for n = ${n}:</strong><br>
                          Factorial(${n}) = ${factResult}<br>
                          Fibonacci(${n}) = ${fibResult}`;
  
  // Combine traces and show a clear separation
  traceArea.textContent = 
    "Factorial Trace:\n" + factTrace.join('\n') + 
    "\n\nFibonacci Trace:\n" + fibTrace.join('\n');
});
</script>
</body>
</html>
