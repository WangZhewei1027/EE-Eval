<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Priority Queue Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 1rem;
      background-color: #f9f9f9;
      color: #333;
    }
    h1 {
      text-align: center;
    }
    label {
      display: block;
      margin-top: 1rem;
      font-weight: bold;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 0.5rem;
      margin-top: 0.25rem;
      font-size: 1rem;
    }
    button {
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      font-size: 1.1rem;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background-color: #0056b3;
    }
    #queue-list {
      margin-top: 1rem;
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 1rem;
      min-height: 80px;
    }
    #dequeued {
      margin-top: 1rem;
      font-weight: bold;
      color: #d6336c;
    }
    .item {
      margin-bottom: 0.3rem;
      font-size: 1.1rem;
    }
    .priority {
      font-weight: normal;
      font-size: 0.9rem;
      color: #777;
      margin-left: 0.5rem;
    }
    footer {
      margin-top: 3rem;
      font-size: 0.9rem;
      color: #777;
      text-align: center;
    }
    small {
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Priority Queue Demo</h1>
  <p>
    A <em>priority queue</em> is a data structure where each element has a priority.
    Elements with higher priority are dequeued before those with lower priority.
  </p>
  <form id="enqueue-form">
    <label for="value">Value (string):</label>
    <input type="text" id="value" name="value" required placeholder="Enter value to enqueue" />

    <label for="priority">Priority (number, higher = higher priority):</label>
    <input type="number" id="priority" name="priority" required placeholder="Enter priority" />

    <button type="submit">Enqueue</button>
  </form>

  <button id="dequeue-btn" style="margin-top: 1rem;">Dequeue Highest Priority</button>

  <h2>Queue State</h2>
  <div id="queue-list">Queue is empty.</div>

  <div id="dequeued"></div>

  <footer>
    <small>Priority Queue implemented using a simple array sorted by priority.</small>
  </footer>

  <script>
    // Simple priority queue class
    class PriorityQueue {
      constructor() {
        this.items = [];
      }

      // Inserts element based on priority (higher priority first)
      enqueue(element, priority) {
        const queueElement = { element, priority };
        if (this.isEmpty()) {
          this.items.push(queueElement);
        } else {
          // find the right place to insert
          let added = false;
          for (let i = 0; i < this.items.length; i++) {
            if (queueElement.priority > this.items[i].priority) {
              this.items.splice(i, 0, queueElement);
              added = true;
              break;
            }
          }
          if (!added) {
            this.items.push(queueElement);
          }
        }
      }

      // Removes and returns the highest priority element
      dequeue() {
        if (this.isEmpty()) {
          return null;
        }
        return this.items.shift();
      }

      front() {
        return this.isEmpty() ? null : this.items[0];
      }

      isEmpty() {
        return this.items.length === 0;
      }

      size() {
        return this.items.length;
      }

      clear() {
        this.items = [];
      }

      toArray() {
        return this.items.slice();
      }
    }

    const pq = new PriorityQueue();

    const enqueueForm = document.getElementById("enqueue-form");
    const dequeueBtn = document.getElementById("dequeue-btn");
    const queueList = document.getElementById("queue-list");
    const dequeuedDiv = document.getElementById("dequeued");
    const valueInput = document.getElementById("value");
    const priorityInput = document.getElementById("priority");

    function renderQueue() {
      const arr = pq.toArray();
      if (arr.length === 0) {
        queueList.textContent = "Queue is empty.";
        return;
      }
      // show elements with priority
      queueList.innerHTML = arr
        .map(
          (item, i) =>
            `<div class="item">${i + 1}. <strong>${item.element}</strong> <span class="priority">(priority: ${item.priority})</span></div>`
        )
        .join("");
    }

    enqueueForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const val = valueInput.value.trim();
      const prio = Number(priorityInput.value);
      if (val === "" || isNaN(prio)) {
        alert("Please enter valid value and priority.");
        return;
      }
      pq.enqueue(val, prio);
      renderQueue();
      dequeuedDiv.textContent = "";
      valueInput.value = "";
      priorityInput.value = "";
      valueInput.focus();
    });

    dequeueBtn.addEventListener("click", () => {
      if (pq.isEmpty()) {
        dequeuedDiv.textContent = "Queue is empty. Nothing to dequeue.";
        return;
      }
      const item = pq.dequeue();
      dequeuedDiv.textContent = `Dequeued: "${item.element}" with priority ${item.priority}`;
      renderQueue();
    });

    renderQueue();
  </script>
</body>
</html>
