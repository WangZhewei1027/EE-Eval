<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Linear Regression Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 1rem;
    background: #fafafa;
    color: #333;
  }
  h1 {
    text-align: center;
  }
  #container {
    max-width: 700px;
    margin: 0 auto;
  }
  #canvas {
    border: 1px solid #ccc;
    background: white;
    display: block;
    margin: 1rem auto;
  }
  #instructions {
    text-align: center;
    margin-bottom: 0.5rem;
  }
  #resetButton {
    display: block;
    margin: 1rem auto;
    padding: 0.6rem 1.2rem;
    font-size: 1rem;
    cursor: pointer;
    border: none;
    background-color: #007bff;
    color: white;
    border-radius: 4px;
    transition: background-color 0.25s;
  }
  #resetButton:hover {
    background-color: #0056b3;
  }
  #formula {
    text-align: center;
    font-weight: bold;
    margin-top: 1rem;
  }
  #note {
    font-size: 0.9rem;
    margin-top: 0.3rem;
    text-align: center;
    color: #555;
  }
</style>
</head>
<body>
  <div id="container">
    <h1>Linear Regression Demo</h1>
    <div id="instructions">Click on the canvas to add data points. The red line shows the best fit (linear regression).</div>
    <canvas id="canvas" width="600" height="400"></canvas>
    <button id="resetButton">Reset Points</button>
    <div id="formula"></div>
    <div id="note">Linear regression fits a line y = mx + b minimizing squared errors.</div>
  </div>
<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const resetButton = document.getElementById('resetButton');
  const formulaDiv = document.getElementById('formula');
  const width = canvas.width;
  const height = canvas.height;

  // Store points as {x: number, y: number} in canvas pixel coords
  // Origin top-left, y increases down. We'll invert y for displaying regression.
  let points = [];

  // Margins for axes
  const margin = 40;

  // Axis ranges - dynamically adjust as points added
  // Start default range
  let xMin = 0, xMax = 10;
  let yMin = 0, yMax = 10;

  // Convert data point coords to canvas pixels
  // Linear scale
  function dataToCanvasX(x) {
    return margin + ((x - xMin) / (xMax - xMin)) * (width - 2*margin);
  }
  function dataToCanvasY(y) {
    // invert y axis for drawing (yMax top, yMin bottom)
    return margin + ((yMax - y) / (yMax - yMin)) * (height - 2*margin);
  }
  // Convert canvas coords back to data values
  function canvasToDataX(px) {
    return xMin + ((px - margin) / (width - 2*margin)) * (xMax - xMin);
  }
  function canvasToDataY(py) {
    return yMax - ((py - margin) / (height - 2*margin)) * (yMax - yMin);
  }

  // Compute linear regression line parameters (m, b):
  // y = m*x + b
  // Using least squares formula:
  // m = (N*Σxy - Σx*Σy) / (N*Σx² - (Σx)²)
  // b = (Σy - m*Σx)/N
  function linearRegression(pts) {
    const N = pts.length;
    if (N === 0) return null;
    let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
    for (const p of pts) {
      sumX += p.x;
      sumY += p.y;
      sumXY += p.x * p.y;
      sumXX += p.x * p.x;
    }
    const denominator = N * sumXX - sumX * sumX;
    if (denominator === 0) {
      // vertical line or all points same x?
      return null;
    }
    const m = (N * sumXY - sumX * sumY) / denominator;
    const b = (sumY - m * sumX) / N;
    return { m, b };
  }

  // Update scale domain based on points (simple padding)
  function updateScale() {
    if (points.length === 0) {
      xMin = 0;
      xMax = 10;
      yMin = 0;
      yMax = 10;
      return;
    }
    xMin = Math.min(...points.map(p => p.x));
    xMax = Math.max(...points.map(p => p.x));
    yMin = Math.min(...points.map(p => p.y));
    yMax = Math.max(...points.map(p => p.y));
    // add padding 10% on each side
    const xPad = (xMax - xMin) * 0.1 || 1;
    const yPad = (yMax - yMin) * 0.1 || 1;
    xMin -= xPad;
    xMax += xPad;
    yMin -= yPad;
    yMax += yPad;
    // Prevent zero range
    if (xMin === xMax) {
      xMin -= 1;
      xMax += 1;
    }
    if (yMin === yMax) {
      yMin -= 1;
      yMax += 1;
    }
  }

  // Draw axes with ticks and labels
  function drawAxes() {
    ctx.strokeStyle = '#666';
    ctx.fillStyle = '#666';
    ctx.lineWidth = 1;
    ctx.font = '12px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Draw X axis line
    ctx.beginPath();
    ctx.moveTo(margin, height - margin);
    ctx.lineTo(width - margin, height - margin);
    ctx.stroke();

    // Draw Y axis line
    ctx.beginPath();
    ctx.moveTo(margin, margin);
    ctx.lineTo(margin, height - margin);
    ctx.stroke();

    // Draw ticks on X axis
    const xTicks = 10;
    for (let i = 0; i <= xTicks; i++) {
      const xVal = xMin + (i / xTicks) * (xMax - xMin);
      const xPos = dataToCanvasX(xVal);
      ctx.beginPath();
      ctx.moveTo(xPos, height - margin);
      ctx.lineTo(xPos, height - margin + 6);
      ctx.stroke();
      ctx.fillText(xVal.toFixed(1), xPos, height - margin + 18);
    }

    // Draw ticks on Y axis
    const yTicks = 10;
    ctx.textAlign = 'right';
    for (let i = 0; i <= yTicks; i++) {
      const yVal = yMin + (i / yTicks) * (yMax - yMin);
      const yPos = dataToCanvasY(yVal);
      ctx.beginPath();
      ctx.moveTo(margin - 6, yPos);
      ctx.lineTo(margin, yPos);
      ctx.stroke();
      ctx.fillText(yVal.toFixed(1), margin - 8, yPos);
    }
  }

  // Draw points as blue circles
  function drawPoints() {
    ctx.fillStyle = '#007bff';
    for (const p of points) {
      const cx = dataToCanvasX(p.x);
      const cy = dataToCanvasY(p.y);
      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // Draw regression line in red
  function drawRegressionLine(mb) {
    if (!mb) return;
    const { m, b } = mb;

    // Find intersection points with plot area (at xMin and xMax)
    let y1 = m * xMin + b;
    let y2 = m * xMax + b;

    // Clip y1 and y2 to yMin and yMax for visible line segment
    // If line goes outside range, find intersection within bounds
    function clipLine() {
      let pointsClipped = [];

      // Check y range at xMin
      if (y1 < yMin) {
        // solve for x when y = yMin: x = (yMin - b)/m
        const x = (yMin - b) / m;
        pointsClipped.push({ x, y: yMin });
      } else if (y1 > yMax) {
        const x = (yMax - b) / m;
        pointsClipped.push({ x, y: yMax });
      } else {
        pointsClipped.push({ x: xMin, y: y1 });
      }

      // Check y range at xMax
      if (y2 < yMin) {
        const x = (yMin - b) / m;
        pointsClipped.push({ x, y: yMin });
      } else if (y2 > yMax) {
        const x = (yMax - b) / m;
        pointsClipped.push({ x, y: yMax });
      } else {
        pointsClipped.push({ x: xMax, y: y2 });
      }

      return pointsClipped;
    }

    let linePts = clipLine();

    ctx.strokeStyle = '#e63946'; // red
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(dataToCanvasX(linePts[0].x), dataToCanvasY(linePts[0].y));
    ctx.lineTo(dataToCanvasX(linePts[1].x), dataToCanvasY(linePts[1].y));
    ctx.stroke();
  }

  function clearCanvas() {
    ctx.clearRect(0, 0, width, height);
  }

  function draw() {
    clearCanvas();
    updateScale();
    drawAxes();
    drawPoints();
    const mb = linearRegression(points);
    drawRegressionLine(mb);

    if (mb) {
      const { m, b } = mb;
      const mRounded = m.toFixed(3);
      const bRounded = b.toFixed(3);
      let sign = b >= 0 ? '+' : '-';
      let bAbs = Math.abs(bRounded);
      formulaDiv.textContent = `Regression line: y = ${mRounded}x ${sign} ${bAbs}`;
    } else {
      formulaDiv.textContent = 'Add at least two distinct points to compute linear regression.';
    }
  }

  // Mouse click handler to add point
  canvas.addEventListener('click', e => {
    // get mouse position relative to canvas
    const rect = canvas.getBoundingClientRect();
    const px = e.clientX - rect.left;
    const py = e.clientY - rect.top;

    // Ignore clicks outside plotting area (inside margin)
    if (
      px < margin || px > (width - margin) ||
      py < margin || py > (height - margin)
    ) {
      return;
    }
    const x = canvasToDataX(px);
    const y = canvasToDataY(py);
    points.push({ x, y });
    draw();
  });

  resetButton.addEventListener('click', () => {
    points = [];
    draw();
  });

  // Initialize drawing
  draw();
})();
</script>
</body>
</html>
