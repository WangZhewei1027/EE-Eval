<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JavaScript Set Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2em;
    max-width: 600px;
  }
  h1 {
    color: #2c3e50;
  }
  section {
    margin-bottom: 2em;
  }
  code {
    background: #f4f4f4;
    padding: 0.2em 0.4em;
    border-radius: 3px;
  }
  pre {
    background: #f9f9f9;
    border: 1px solid #ddd;
    padding: 1em;
    border-radius: 4px;
    overflow-x: auto;
  }
  button {
    background-color: #2980b9;
    color: white;
    border: none;
    padding: 0.5em 1em;
    cursor: pointer;
    border-radius: 4px;
    font-size: 1em;
    margin-top: 0.5em;
  }
  button:hover {
    background-color: #3498db;
  }
  #output {
    margin-top: 1em;
    background: #ecf0f1;
    border-radius: 4px;
    padding: 1em;
    font-family: monospace;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
<h1>JavaScript <code>Set</code> Demo</h1>

<section>
  <p>
    A <code>Set</code> is a built-in JavaScript object that lets you store *unique* values of any type, whether primitive or object references. It automatically ensures no duplicates.
  </p>
</section>

<section>
  <h2>Create a Set</h2>
  <pre><code>const fruits = new Set(['apple', 'banana', 'orange']);</code></pre>
</section>

<section>
  <h2>Basic Operations</h2>
  <button id="btn-demo">Run Demo</button>
  <div id="output"></div>
</section>

<script>
  document.getElementById('btn-demo').addEventListener('click', () => {
    let output = '';

    // Create a new set
    const fruits = new Set(['apple', 'banana', 'orange']);
    output += 'Initial set: ' + JSON.stringify(Array.from(fruits)) + '\n';

    // Add a new item
    fruits.add('mango');
    output += 'After adding "mango": ' + JSON.stringify(Array.from(fruits)) + '\n';

    // Try to add a duplicate "banana"
    fruits.add('banana');
    output += 'After adding duplicate "banana": ' + JSON.stringify(Array.from(fruits)) + ' (no change)\n';

    // Check if an item exists
    output += '"apple" is in set? ' + (fruits.has('apple') ? 'Yes' : 'No') + '\n';
    output += '"pear" is in set? ' + (fruits.has('pear') ? 'Yes' : 'No') + '\n';

    // Remove an item
    fruits.delete('orange');
    output += 'After deleting "orange": ' + JSON.stringify(Array.from(fruits)) + '\n';

    // Get the size
    output += 'Set size: ' + fruits.size + '\n';

    // Iterate over the set
    output += 'Iterate using for-of:\n';
    for (const fruit of fruits) {
      output += '- ' + fruit + '\n';
    }

    // Clear all items
    fruits.clear();
    output += 'Cleared set size: ' + fruits.size + '\n';

    document.getElementById('output').textContent = output;
  });
</script>
</body>
</html>
