<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adjacency List Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      max-width: 700px;
    }
    h1 {
      text-align: center;
    }
    pre {
      background: #f0f0f0;
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
    }
    #graphInput {
      width: 100%;
      height: 120px;
      font-family: monospace;
      font-size: 14px;
      margin-bottom: 10px;
    }
    button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 16px;
    }
    button:hover {
      background-color: #0056b3;
    }
    #output {
      margin-top: 20px;
    }
    .node {
      font-weight: bold;
      color: #2c3e50;
    }
    .neighbor-list {
      color: #34495e;
    }
  </style>
</head>
<body>
  <h1>Adjacency List Demonstration</h1>
  <p>
    This example shows a simple <strong>Adjacency List</strong> representation of a directed graph.
    <br />
    You can edit the edges in the textarea below and click <em>Build Graph</em> to see the adjacency list.
  </p>

  <label for="graphInput">
    Enter edges (one per line) in the format <code>node1 node2</code> to represent an edge from node1 → node2.
    <br />Example:
  </label>
  <pre>
A B
A C
B D
C D
D E
  </pre>

  <textarea id="graphInput" aria-label="Graph edges input">
A B
A C
B D
C D
D E
  </textarea>
  <br />
  <button id="buildGraphBtn">Build Graph</button>

  <div id="output"></div>

  <script>
    /**
     * Builds an adjacency list from a list of edges.
     * 
     * @param {string} input - Multiline string with edges, each line "node1 node2"
     * @returns {Map<string, string[]>} Adjacency list map.
     */
    function buildAdjacencyList(input) {
      const adjacencyList = new Map();

      const lines = input.trim().split('\n');
      for (const line of lines) {
        const parts = line.trim().split(/\s+/);
        if (parts.length !== 2) continue; // skip invalid lines

        const [from, to] = parts;

        if (!adjacencyList.has(from)) {
          adjacencyList.set(from, []);
        }
        adjacencyList.get(from).push(to);

        // Also ensure 'to' node exists in map even if it has no neighbors
        if (!adjacencyList.has(to)) {
          adjacencyList.set(to, []);
        }
      }

      return adjacencyList;
    }

    /**
     * Displays adjacency list in the output area.
     * 
     * @param {Map<string,string[]>} adjacencyList 
     */
    function displayAdjacencyList(adjacencyList) {
      const outputDiv = document.getElementById('output');
      outputDiv.innerHTML = '<h2>Adjacency List</h2>';

      const ul = document.createElement('ul');
      for (const [node, neighbors] of adjacencyList) {
        const li = document.createElement('li');
        li.innerHTML = `<span class="node">${node}</span>: <span class="neighbor-list">${neighbors.length > 0 ? neighbors.join(', ') : '(no neighbors)'}</span>`;
        ul.appendChild(li);
      }
      outputDiv.appendChild(ul);
    }

    document.getElementById('buildGraphBtn').addEventListener('click', () => {
      const input = document.getElementById('graphInput').value;
      const adjacencyList = buildAdjacencyList(input);
      displayAdjacencyList(adjacencyList);
    });

    // Initial display on page load
    window.onload = () => {
      const input = document.getElementById('graphInput').value;
      const adjacencyList = buildAdjacencyList(input);
      displayAdjacencyList(adjacencyList);
    };
  </script>
</body>
</html>
