<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Breadth-First Search (BFS) Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 10px;
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    margin-bottom: 5px;
  }
  #graph-container {
    margin-top: 10px;
    position: relative;
  }
  svg {
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  .node circle {
    fill: #69b3a2;
    stroke: #2f6650;
    stroke-width: 2px;
    transition: fill 0.3s;
  }
  .node.visited circle {
    fill: #ffa500;
  }
  .node.current circle {
    fill: #e63946;
  }
  .node text {
    font-size: 14px;
    fill: #fff;
    pointer-events: none;
    user-select: none;
  }
  line {
    stroke: #555;
    stroke-width: 2px;
  }
  #controls {
    margin-top: 15px;
  }
  button {
    font-size: 16px;
    padding: 8px 15px;
    margin-right: 10px;
    cursor: pointer;
  }
  #queue {
    margin-top: 15px;
    font-family: monospace;
    background: #fff;
    padding: 8px 12px;
    border-radius: 6px;
    width: 320px;
    box-shadow: 0 0 6px rgba(0,0,0,0.15);
  }
  #legend {
    margin-top: 15px;
    display: flex;
    justify-content: center;
    gap: 25px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
  }
  .legend-color {
    width: 18px;
    height: 18px;
    border-radius: 50%;
  }
  .color-unvisited {
    background: #69b3a2;
    border: 2px solid #2f6650;
  }
  .color-visited {
    background: #ffa500;
  }
  .color-current {
    background: #e63946;
  }
</style>
</head>
<body>
<h1>Breadth-First Search (BFS) Demonstration</h1>
<div>
  <strong>Graph:</strong> Undirected Graph, nodes numbered 0 to 8.
</div>
<div id="graph-container">
  <svg id="graph-svg" width="600" height="400"></svg>
</div>

<div id="controls">
  <button id="startBtn">Start BFS</button>
  <button id="resetBtn" disabled>Reset</button>
</div>

<div id="queue"><strong>Queue:</strong> [ ]</div>

<div id="legend">
  <div class="legend-item">
    <div class="legend-color color-unvisited"></div> Unvisited Node
  </div>
  <div class="legend-item">
    <div class="legend-color color-visited"></div> Visited Node
  </div>
  <div class="legend-item">
    <div class="legend-color color-current"></div> Current Node
  </div>
</div>

<script>
(() => {
  // Graph data
  // Adjacency list representation of an undirected graph with 9 nodes (0-8)
  const graph = {
    0: [1, 3],
    1: [0, 2, 4],
    2: [1, 5],
    3: [0, 4, 6],
    4: [1, 3, 5, 7],
    5: [2, 4, 8],
    6: [3, 7],
    7: [4, 6, 8],
    8: [5, 7]
  };

  // Coordinates for each node for visualization (circle centers)
  const nodePositions = {
    0: { x: 100, y: 80 },
    1: { x: 200, y: 50 },
    2: { x: 300, y: 80 },
    3: { x: 100, y: 180 },
    4: { x: 200, y: 180 },
    5: { x: 300, y: 180 },
    6: { x: 100, y: 280 },
    7: { x: 200, y: 280 },
    8: { x: 300, y: 280 }
  };

  const svg = document.getElementById('graph-svg');
  const queueDisplay = document.getElementById('queue');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');

  // State variables
  let visited = {};
  let queue = [];
  let currentNode = null;
  let bfsInterval = null;

  // Create SVG elements for edges first (lines between nodes)
  function drawEdges() {
    // Keep track of drawn edges to avoid duplicates in undirected graph
    const drawnEdges = new Set();

    Object.entries(graph).forEach(([nodeStr, neighbors]) => {
      const node = Number(nodeStr);
      neighbors.forEach(neighbor => {
        // Add edge only if not drawn in opposite direction
        const edgeId = node < neighbor ? `${node}-${neighbor}` : `${neighbor}-${node}`;
        if (!drawnEdges.has(edgeId)) {
          const posA = nodePositions[node];
          const posB = nodePositions[neighbor];
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', posA.x);
          line.setAttribute('y1', posA.y);
          line.setAttribute('x2', posB.x);
          line.setAttribute('y2', posB.y);
          line.setAttribute('stroke', '#555');
          line.setAttribute('stroke-width', '2');
          svg.appendChild(line);
          drawnEdges.add(edgeId);
        }
      });
    });
  }

  // Create SVG elements for nodes (circles with text)
  const nodeElements = {};
  function drawNodes() {
    Object.entries(nodePositions).forEach(([nodeStr, pos]) => {
      const node = Number(nodeStr);
      // Create <g> container for circle and label
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.classList.add('node');
      g.setAttribute('data-node', node);
      g.setAttribute('tabindex', '0'); // keyboard focusable

      // Circle
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', pos.x);
      circle.setAttribute('cy', pos.y);
      circle.setAttribute('r', 22);
      g.appendChild(circle);

      // Text label
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', pos.x);
      text.setAttribute('y', pos.y + 5); // vertical align center-ish
      text.setAttribute('text-anchor', 'middle');
      text.textContent = node;
      g.appendChild(text);

      svg.appendChild(g);
      nodeElements[node] = g;
    });
  }

  // Update node color states:
  // unvisited: default (blue-green)
  // visited: orange
  // current: red
  function updateNodeStates() {
    Object.entries(nodeElements).forEach(([nodeStr, g]) => {
      const node = Number(nodeStr);
      g.classList.remove('visited', 'current');
      if (currentNode === node) {
        g.classList.add('current');
      } else if (visited[node]) {
        g.classList.add('visited');
      }
    });
  }

  function updateQueueDisplay() {
    queueDisplay.innerHTML = `<strong>Queue:</strong> [ ${queue.join(', ')} ]`;
  }

  // BFS Step function: processes one node per call
  function bfsStep() {
    if (queue.length === 0) {
      clearInterval(bfsInterval);
      currentNode = null;
      updateNodeStates();
      startBtn.disabled = true;
      resetBtn.disabled = false;
      queueDisplay.innerHTML += " <em>(Finished)</em>";
      return;
    }
    currentNode = queue.shift();
    visited[currentNode] = true;

    // Enqueue all unvisited neighbors
    graph[currentNode].forEach(neighbor => {
      if (!visited[neighbor] && !queue.includes(neighbor)) {
        queue.push(neighbor);
      }
    });

    updateNodeStates();
    updateQueueDisplay();
  }

  // Initialization and reset
  function resetGraph() {
    visited = {};
    queue = [];
    currentNode = null;
    updateNodeStates();
    updateQueueDisplay();
    startBtn.disabled = false;
    resetBtn.disabled = true;
  }

  // Start BFS from node 0
  function startBFS() {
    // Initialize BFS from node 0
    resetGraph();
    queue.push(0);
    updateQueueDisplay();
    updateNodeStates();

    // Steps every 1.2 seconds
    bfsInterval = setInterval(bfsStep, 1200);

    startBtn.disabled = true;
    resetBtn.disabled = false;
  }

  function init() {
    drawEdges();
    drawNodes();
    resetGraph();

    startBtn.addEventListener('click', startBFS);
    resetBtn.addEventListener('click', () => {
      clearInterval(bfsInterval);
      resetGraph();
    });
  }

  init();
})();
</script>
</body>
</html>
