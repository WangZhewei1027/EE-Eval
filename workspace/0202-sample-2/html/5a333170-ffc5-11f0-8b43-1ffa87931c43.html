<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Depth-First Search (DFS) Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f9f9f9;
  }
  h1 {
    text-align: center;
  }
  #graph-container {
    display: flex;
    justify-content: center;
    margin-bottom: 15px;
  }
  svg {
    border: 1px solid #ccc;
    background: white;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
  }
  .node {
    stroke: #555;
    stroke-width: 2px;
    fill: #eee;
    cursor: pointer;
    transition: fill 0.3s, stroke-width 0.3s;
  }
  .node.visited {
    fill: #6cace4;
    stroke: #0b61a4;
    stroke-width: 3px;
  }
  .node.current {
    fill: #f7b733;
    stroke: #c16a00;
    stroke-width: 3px;
    animation: pulse 1s infinite alternate;
  }
  @keyframes pulse {
    0% { filter: drop-shadow(0 0 2px #c16a00); }
    100% { filter: drop-shadow(0 0 8px #f7b733); }
  }
  .edge {
    stroke: #999;
    stroke-width: 2px;
  }
  .edge.visited {
    stroke: #0b61a4;
    stroke-width: 3px;
  }
  #controls {
    text-align: center;
    margin-bottom: 20px;
  }
  #controls button {
    margin: 0 5px;
    padding: 8px 14px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    background: #0b61a4;
    color: white;
    transition: background-color 0.3s;
  }
  #controls button:hover:enabled {
    background: #094877;
  }
  #controls button:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  #log {
    max-width: 700px;
    margin: 0 auto;
    background: white;
    padding: 12px 15px;
    border-radius: 5px;
    box-shadow: 0 0 5px #ccc;
    min-height: 70px;
    font-size: 16px;
    overflow-y: auto;
  }
  #log p {
    margin: 3px 0;
  }
  .label {
    font-size: 14px;
    pointer-events: none;
    user-select: none;
    fill: #333;
  }
</style>
</head>
<body>
  <h1>Depth-First Search (DFS) Visualization</h1>
  <div id="graph-container">
    <svg width="700" height="450" id="graph"></svg>
  </div>
  <div id="controls">
    <button id="startBtn">Start DFS</button>
    <button id="resetBtn" disabled>Reset</button>
  </div>
  <div id="log" aria-live="polite" aria-atomic="true"></div>

<script>
(() => {
  const svg = document.getElementById('graph');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const logDiv = document.getElementById('log');

  // Graph definition as adjacency list
  // We'll create a graph with 8 nodes (A-H)
  // Structure:
  // A connected to B, C
  // B connected to D, E
  // C connected to F
  // E connected to G, H
  //
  // Graph is undirected for demo purpose

  const nodes = [
    {id: 'A', x: 350, y: 40},
    {id: 'B', x: 150, y: 130},
    {id: 'C', x: 550, y: 130},
    {id: 'D', x: 80, y: 220},
    {id: 'E', x: 220, y: 220},
    {id: 'F', x: 620, y: 220},
    {id: 'G', x: 170, y: 330},
    {id: 'H', x: 270, y: 320},
  ];

  const edges = [
    ['A','B'], ['A','C'],
    ['B','D'], ['B','E'],
    ['C','F'],
    ['E','G'], ['E','H'],
  ];

  // Build adjacency list map structure
  const adjacency = {};
  nodes.forEach(({id}) => adjacency[id] = []);
  edges.forEach(([u,v]) => {
    adjacency[u].push(v);
    adjacency[v].push(u);
  });

  // Draw edges
  const edgeElements = [];
  edges.forEach(([u,v]) => {
    const source = nodes.find(n => n.id === u);
    const target = nodes.find(n => n.id === v);
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute('x1', source.x);
    line.setAttribute('y1', source.y);
    line.setAttribute('x2', target.x);
    line.setAttribute('y2', target.y);
    line.classList.add('edge');
    svg.appendChild(line);
    edgeElements.push({el: line, u, v});
  });

  // Draw nodes
  const nodeElements = {};
  nodes.forEach(({id, x, y}) => {
    // Circle
    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circle.setAttribute('cx', x);
    circle.setAttribute('cy', y);
    circle.setAttribute('r', 25);
    circle.classList.add('node');
    circle.setAttribute('tabindex', 0);
    circle.setAttribute('aria-label', `Node ${id}`);
    circle.setAttribute('role', 'button');

    // Label
    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute('x', x);
    text.setAttribute('y', y+6);
    text.setAttribute('text-anchor', 'middle');
    text.classList.add('label');
    text.textContent = id;

    svg.appendChild(circle);
    svg.appendChild(text);
    nodeElements[id] = circle;
  });

  // Log utility
  function log(msg) {
    const p = document.createElement('p');
    p.textContent = msg;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  // DFS variables
  let visited = new Set();
  let stack = [];
  let dfsRunning = false;
  let currentNode = null;

  // Reset visualization and data
  function reset() {
    visited.clear();
    stack = [];
    dfsRunning = false;
    currentNode = null;

    // Reset node styles
    Object.values(nodeElements).forEach(n => {
      n.classList.remove('visited', 'current');
      n.style.pointerEvents = 'auto';
    });
    // Reset edge styles
    edgeElements.forEach(({el}) => {
      el.classList.remove('visited');
    });
    // Clear log
    logDiv.innerHTML = '';

    startBtn.disabled = false;
    resetBtn.disabled = true;
  }

  // Highlight edge between two nodes as visited
  function highlightEdge(u,v) {
    const edge = edgeElements.find(e =>
      (e.u === u && e.v === v) ||
      (e.u === v && e.v === u)
    );
    if(edge) edge.el.classList.add('visited');
  }

  // DFS iterative implementation with visualization
  async function dfs(startId) {
    dfsRunning = true;
    startBtn.disabled = true;
    resetBtn.disabled = true;

    stack.push(startId);
    log(`Starting DFS from node ${startId}.`);

    while(stack.length > 0) {
      currentNode = stack.pop();

      // Highlight current node (temporarily)
      Object.values(nodeElements).forEach(n => n.classList.remove('current'));
      if(!visited.has(currentNode)) {
        nodeElements[currentNode].classList.add('current');
      }

      await sleep(1200);

      if(!visited.has(currentNode)) {
        visited.add(currentNode);
        nodeElements[currentNode].classList.add('visited');
        nodeElements[currentNode].classList.remove('current');
        log(`Visited node ${currentNode}.`);

        // Add neighbors to stack (in reverse alphabetical so that DFS order matches typical recursive left-to-right)
        const neighbors = adjacency[currentNode].slice().sort().reverse();
        for(let neighbor of neighbors) {
          if(!visited.has(neighbor)) {
            stack.push(neighbor);
            highlightEdge(currentNode, neighbor);
            log(`Neighbor ${neighbor} added to stack.`);
          }
        }
      } else {
        // If already visited, no action needed
        log(`Node ${currentNode} was already visited, skipping.`);
      }
    }
    log(`DFS complete! All reachable nodes visited.`);

    resetBtn.disabled = false;
    dfsRunning = false;
  }


  // helper sleep function
  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // Event Listeners
  startBtn.addEventListener('click', () => {
    if(!dfsRunning) {
      resetBtn.disabled = true;
      dfs('A');
    }
  });

  resetBtn.addEventListener('click', () => {
    if(!dfsRunning) reset();
  });

  reset();

})();
</script>
</body>
</html>
