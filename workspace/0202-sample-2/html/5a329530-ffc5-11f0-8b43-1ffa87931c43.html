<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Binary Search Tree (BST) Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f4f7f8;
    color: #333;
  }
  h1 {
    text-align: center;
  }
  #controls {
    text-align: center;
    margin-bottom: 15px;
  }
  input[type="number"] {
    width: 120px;
    font-size: 16px;
    padding: 6px;
    margin-right: 10px;
  }
  button {
    font-size: 16px;
    padding: 6px 12px;
    margin-right: 10px;
    cursor: pointer;
  }
  #display {
    max-width: 900px;
    margin: 0 auto;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    padding: 15px;
  }
  #inorder, #preorder, #postorder {
    margin-top: 10px;
  }
  svg {
    display: block;
    margin: 0 auto;
    background: #fff;
    border-radius: 8px;
    border: 1px solid #ddd;
  }
  .node circle {
    fill: #4a90e2;
    stroke: #2a5d9f;
    stroke-width: 2px;
  }
  .node text {
    fill: #fff;
    font-weight: bold;
    font-size: 14px;
  }
  .edge {
    stroke: #999;
    stroke-width: 2px;
  }
  #message {
    text-align: center;
    color: #d9534f;
    font-weight: bold;
    min-height: 20px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
<h1>Binary Search Tree (BST) Demo</h1>
<div id="controls">
  <input type="number" id="valueInput" placeholder="Enter value" />
  <button id="insertBtn">Insert</button>
  <button id="searchBtn">Search</button>
  <button id="deleteBtn">Delete</button>
  <button id="clearBtn">Clear Tree</button>
</div>
<div id="message"></div>
<div id="display">
  <svg id="treeSVG" width="900" height="400"></svg>
  <div id="inorder"><strong>In-order:</strong> <span id="inorderList"></span></div>
  <div id="preorder"><strong>Pre-order:</strong> <span id="preorderList"></span></div>
  <div id="postorder"><strong>Post-order:</strong> <span id="postorderList"></span></div>
</div>

<script>
  // BST Node class
  class Node {
    constructor(value) {
      this.value = value;
      this.left = null;
      this.right = null;
    }
  }

  // BST class
  class BST {
    constructor() {
      this.root = null;
    }

    insert(value) {
      if (typeof value !== "number" || isNaN(value)) return false;
      this.root = this._insertRec(this.root, value);
      return true;
    }

    _insertRec(root, value) {
      if (root === null) {
        return new Node(value);
      }
      if (value === root.value) {
        // no duplicate values in BST
        return root;
      }
      if (value < root.value) {
        root.left = this._insertRec(root.left, value);
      } else {
        root.right = this._insertRec(root.right, value);
      }
      return root;
    }

    search(value) {
      return this._searchRec(this.root, value);
    }

    _searchRec(root, value) {
      if (root === null) return null;
      if (value === root.value) return root;
      if (value < root.value) return this._searchRec(root.left, value);
      else return this._searchRec(root.right, value);
    }

    delete(value) {
      let found = {deleted: false};
      this.root = this._deleteRec(this.root, value, found);
      return found.deleted;
    }

    _deleteRec(root, value, found) {
      if (root === null) return root;
      if (value < root.value) {
        root.left = this._deleteRec(root.left, value, found);
      } else if (value > root.value) {
        root.right = this._deleteRec(root.right, value, found);
      } else {
        found.deleted = true;
        // node with only one child or no child
        if (root.left === null) return root.right;
        else if (root.right === null) return root.left;

        // node with two children:
        // get the inorder successor (smallest in the right subtree)
        let minLargerNode = this._minValueNode(root.right);
        root.value = minLargerNode.value;
        // delete the inorder successor
        root.right = this._deleteRec(root.right, minLargerNode.value, found);
      }
      return root;
    }

    _minValueNode(node) {
      let current = node;
      while (current.left !== null) {
        current = current.left;
      }
      return current;
    }

    inorder() {
      let res = [];
      this._inorderRec(this.root, res);
      return res;
    }

    _inorderRec(node, res) {
      if (node !== null) {
        this._inorderRec(node.left, res);
        res.push(node.value);
        this._inorderRec(node.right, res);
      }
    }

    preorder() {
      let res = [];
      this._preorderRec(this.root, res);
      return res;
    }

    _preorderRec(node, res) {
      if (node !== null) {
        res.push(node.value);
        this._preorderRec(node.left, res);
        this._preorderRec(node.right, res);
      }
    }

    postorder() {
      let res = [];
      this._postorderRec(this.root, res);
      return res;
    }

    _postorderRec(node, res) {
      if (node !== null) {
        this._postorderRec(node.left, res);
        this._postorderRec(node.right, res);
        res.push(node.value);
      }
    }

    clear() {
      this.root = null;
    }
  }

  // Visualization and UI

  const BSTree = new BST();

  const svg = document.getElementById("treeSVG");
  const width = svg.clientWidth;
  const height = svg.clientHeight;
  const nodeRadius = 20;

  const messageDiv = document.getElementById("message");

  const inputValue = document.getElementById("valueInput");
  const insertBtn = document.getElementById("insertBtn");
  const searchBtn = document.getElementById("searchBtn");
  const deleteBtn = document.getElementById("deleteBtn");
  const clearBtn = document.getElementById("clearBtn");

  const inorderList = document.getElementById("inorderList");
  const preorderList = document.getElementById("preorderList");
  const postorderList = document.getElementById("postorderList");

  insertBtn.addEventListener("click", () => {
    const val = Number(inputValue.value);
    if (inputValue.value === "" || isNaN(val)) {
      showMessage("Please enter a valid number.");
      return;
    }
    // Check for duplicate by search first
    if (BSTree.search(val) !== null) {
      showMessage("Value already exists in the BST.");
      return;
    }
    BSTree.insert(val);
    inputValue.value = "";
    showMessage(`Inserted ${val} into BST.`);
    updateDisplay();
  });

  searchBtn.addEventListener("click", () => {
    const val = Number(inputValue.value);
    if (inputValue.value === "" || isNaN(val)) {
      showMessage("Please enter a valid number.");
      return;
    }
    const node = BSTree.search(val);
    if (node) {
      showMessage(`Value ${val} found in the BST.`);
      updateDisplay(val);
    } else {
      showMessage(`Value ${val} not found in the BST.`);
      updateDisplay();
    }
  });

  deleteBtn.addEventListener("click", () => {
    const val = Number(inputValue.value);
    if (inputValue.value === "" || isNaN(val)) {
      showMessage("Please enter a valid number.");
      return;
    }
    const deleted = BSTree.delete(val);
    if (deleted) {
      showMessage(`Deleted value ${val} from BST.`);
      inputValue.value = "";
      updateDisplay();
    } else {
      showMessage(`Value ${val} not found in the BST.`);
    }
  });

  clearBtn.addEventListener("click", () => {
    BSTree.clear();
    showMessage("Cleared the BST.");
    inputValue.value = "";
    updateDisplay();
  });

  function showMessage(msg) {
    messageDiv.textContent = msg;
  }

  // Calculate positions of nodes for visualization
  // We'll perform an inorder traversal to position nodes horizontally,
  // and vertically by their depth in the tree.
  function calculateNodePositions(root) {
    let positions = new Map();
    let maxDepth = 0;
    let x = 0;

    function inorderPos(node, depth) {
      if (!node) return;
      inorderPos(node.left, depth + 1);
      positions.set(node, {x: x++, depth});
      if (depth > maxDepth) maxDepth = depth;
      inorderPos(node.right, depth + 1);
    }
    inorderPos(root, 0);
    return {positions, maxDepth};
  }

  // Draw the tree using SVG elements
  function drawTree(root, highlightValue = null) {
    while (svg.firstChild) svg.removeChild(svg.firstChild);

    if (!root) return;

    const {positions, maxDepth} = calculateNodePositions(root);

    // Calculate horizontal spacing
    const totalNodes = positions.size;
    const hSpacing = width / (totalNodes + 1);
    const vSpacing = height / (maxDepth + 2);

    // Draw edges first (lines between parent and children)
    for (let [node, pos] of positions) {
      if (node.left) drawEdge(pos, positions.get(node.left), hSpacing, vSpacing);
      if (node.right) drawEdge(pos, positions.get(node.right), hSpacing, vSpacing);
    }

    // Draw nodes
    for (let [node, pos] of positions) {
      let cx = (pos.x + 1) * hSpacing;
      let cy = (pos.depth + 1) * vSpacing;
      drawNode(cx, cy, node.value, highlightValue === node.value);
    }
  }

  function drawNode(cx, cy, value, highlight = false) {
    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    group.setAttribute("class", "node");

    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circle.setAttribute("cx", cx);
    circle.setAttribute("cy", cy);
    circle.setAttribute("r", nodeRadius);
    circle.setAttribute("fill", highlight ? "#e94e77" : "#4a90e2");
    circle.setAttribute("stroke", highlight ? "#b33250" : "#2a5d9f");
    circle.setAttribute("stroke-width", "3");

    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", cx);
    text.setAttribute("y", cy + 5);
    text.setAttribute("text-anchor", "middle");
    text.setAttribute("font-weight", "bold");
    text.setAttribute("font-size", "14");
    text.setAttribute("fill", "#fff");
    text.textContent = value;

    group.appendChild(circle);
    group.appendChild(text);
    svg.appendChild(group);
  }

  function drawEdge(parentPos, childPos, hSpacing, vSpacing) {
    const x1 = (parentPos.x + 1) * hSpacing;
    const y1 = (parentPos.depth + 1) * vSpacing + nodeRadius;
    const x2 = (childPos.x + 1) * hSpacing;
    const y2 = (childPos.depth + 1) * vSpacing - nodeRadius;

    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", x1);
    line.setAttribute("y1", y1);
    line.setAttribute("x2", x2);
    line.setAttribute("y2", y2);
    line.setAttribute("class", "edge");
    line.setAttribute("stroke", "#999");
    line.setAttribute("stroke-width", "2");
    svg.appendChild(line);
  }

  function updateDisplay(highlightValue = null) {
    drawTree(BSTree.root, highlightValue);

    inorderList.textContent = BSTree.inorder().join(", ") || "Empty";
    preorderList.textContent = BSTree.preorder().join(", ") || "Empty";
    postorderList.textContent = BSTree.postorder().join(", ") || "Empty";
  }

  updateDisplay();

  // UX: Enter key triggers Insert
  inputValue.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      insertBtn.click();
    }
  });
</script>
</body>
</html>
