<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Longest Common Subsequence Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2rem;
    background-color: #f9fafd;
    color: #333;
  }
  h1 {
    color: #0066cc;
  }
  label {
    display: block;
    margin-top: 1rem;
    margin-bottom: 0.3rem;
    font-weight: bold;
  }
  input[type="text"] {
    width: 100%;
    max-width: 400px;
    padding: 0.5rem;
    font-size: 1rem;
    border: 2px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
    transition: border-color 0.3s;
  }
  input[type="text"]:focus {
    border-color: #0066cc;
    outline: none;
  }
  button {
    margin-top: 1.2rem;
    padding: 0.6rem 1.5rem;
    font-size: 1rem;
    border: none;
    background-color: #0066cc;
    color: white;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  button:hover {
    background-color: #004a99;
  }
  #result {
    margin-top: 2rem;
    background: white;
    padding: 1.5rem;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    max-width: 600px;
  }
  .highlight {
    background-color: #e6f0ff;
    font-weight: bold;
    color: #004a99;
  }
  pre {
    background-color: #f0f5f9;
    border-radius: 6px;
    padding: 1rem;
    overflow-x: auto;
    font-family: monospace;
    font-size: 0.9rem;
    max-width: 600px;
  }
  footer {
    margin-top: 4rem;
    font-size: 0.85rem;
    color: #777;
  }
</style>
</head>
<body>
<h1>Longest Common Subsequence (LCS) Demo</h1>
<p>
  The <em>Longest Common Subsequence</em> of two sequences is the longest sequence that appears in both in the same order (not necessarily contiguously).
</p>

<label for="str1">First string:</label>
<input type="text" id="str1" placeholder="Enter first string" value="AGGTAB" aria-label="First string" />

<label for="str2">Second string:</label>
<input type="text" id="str2" placeholder="Enter second string" value="GXTXAYB" aria-label="Second string" />

<button id="computeBtn">Compute LCS</button>

<div id="result" aria-live="polite" aria-atomic="true"></div>

<script>
  // Compute LCS length table and also store chosen directions for backtracking
  function computeLCS(str1, str2) {
    const m = str1.length;
    const n = str2.length;
    // dp[i][j] will hold length of LCS of str1[0..i-1] & str2[0..j-1]
    const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
    // directions for backtracking: "diag" (match), "up", "left"
    const dir = Array(m + 1).fill(null).map(() => Array(n + 1).fill(null));

    for (let i = 1; i <= m; i++) {
      for (let j = 1; j <= n; j++) {
        if (str1[i - 1] === str2[j - 1]) {
          dp[i][j] = dp[i - 1][j - 1] + 1;
          dir[i][j] = "diag";
        } else if (dp[i - 1][j] >= dp[i][j - 1]) {
          dp[i][j] = dp[i - 1][j];
          dir[i][j] = "up";
        } else {
          dp[i][j] = dp[i][j - 1];
          dir[i][j] = "left";
        }
      }
    }
    return { dp, dir };
  }

  // Backtrack to find one LCS string from dp and dir arrays
  function backtrackLCS(dir, str1, i, j) {
    let lcs = [];
    while (i > 0 && j > 0) {
      if (dir[i][j] === "diag") {
        lcs.push(str1[i - 1]);
        i--;
        j--;
      } else if (dir[i][j] === "up") {
        i--;
      } else {
        j--;
      }
    }
    return lcs.reverse().join('');
  }

  // To highlight the LCS characters inside the input strings
  function highlightLCS(str, lcs) {
    let result = "";
    let lcsIndex = 0;
    for(let i=0; i<str.length; i++) {
      if (lcsIndex < lcs.length && str[i] === lcs[lcsIndex]) {
        result += `<span class="highlight">${str[i]}</span>`;
        lcsIndex++;
      } else {
        result += str[i];
      }
    }
    return result;
  }

  function generateDPTableHTML(dp, str1, str2) {
    const m = str1.length;
    const n = str2.length;

    let html = '<table border="1" cellspacing="0" cellpadding="5"><thead><tr><th></th><th></th>';
    for(let j=0; j<n; j++) {
      html += `<th>${str2[j]}</th>`;
    }
    html += '</tr></thead><tbody>';

    for(let i=0; i<=m; i++) {
      html += '<tr>';
      if(i === 0) {
        html += '<th></th>';
      } else {
        html += `<th>${str1[i-1]}</th>`;
      }
      for(let j=0; j<=n; j++) {
        html += `<td style="text-align:center;">${dp[i][j]}</td>`;
      }
      html += '</tr>';
    }
    html += '</tbody></table>';
    return html;
  }

  document.getElementById('computeBtn').addEventListener('click', () => {
    const str1 = document.getElementById('str1').value;
    const str2 = document.getElementById('str2').value;
    const resultDiv = document.getElementById('result');

    if (str1.length === 0 || str2.length === 0) {
      resultDiv.innerHTML = '<p style="color: red;">Please enter both strings.</p>';
      return;
    }

    const { dp, dir } = computeLCS(str1, str2);
    const lcs = backtrackLCS(dir, str1, str1.length, str2.length);
    const lengthLCS = lcs.length;

    const highlightedStr1 = highlightLCS(str1, lcs);
    const highlightedStr2 = highlightLCS(str2, lcs);
    const dpTableHtml = generateDPTableHTML(dp, str1, str2);

    resultDiv.innerHTML = `
      <p><strong>Length of LCS:</strong> ${lengthLCS}</p>
      <p><strong>Longest Common Subsequence:</strong> <code>${lcs || '(empty)'}</code></p>
      <p><strong>First string with LCS highlighted:</strong><br />${highlightedStr1}</p>
      <p><strong>Second string with LCS highlighted:</strong><br />${highlightedStr2}</p>
      <h3>DP Table (Lengths of LCS):</h3>
      ${dpTableHtml}
      <p><small>Rows correspond to characters of first string (plus empty prefix), columns to second string.</small></p>
    `;
  });

  // Initialize with default values on page load
  window.onload = () => {
    document.getElementById('computeBtn').click();
  }
</script>
</body>
</html>
