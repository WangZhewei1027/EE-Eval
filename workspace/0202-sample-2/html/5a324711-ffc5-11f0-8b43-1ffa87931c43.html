<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Queue Demonstration</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 1rem;
      background: #f9f9f9;
      color: #333;
    }
    h1 {
      text-align: center;
    }
    .queue-container {
      margin: 1rem 0;
      min-height: 60px;
      border: 2px solid #007bff;
      border-radius: 5px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      flex-wrap: wrap;
    }
    .queue-item {
      background: #007bff;
      color: white;
      padding: 10px 16px;
      border-radius: 4px;
      font-weight: bold;
      min-width: 40px;
      text-align: center;
      position: relative;
    }
    .queue-item::before {
      content: "Front";
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: #555;
      font-weight: normal;
    }
    .queue-item:last-child::before {
      content: "";
    }
    label {
      display: block;
      margin: 1rem 0 0.5rem;
      font-weight: bold;
    }
    input[type=text] {
      padding: 0.5rem;
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 1rem;
      padding: 0.6rem 1rem;
      font-size: 1rem;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: #007bff;
      color: white;
      transition: background 0.3s ease;
    }
    button:disabled {
      background: #bbb;
      cursor: not-allowed;
    }
    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .info {
      margin-top: 1rem;
      font-size: 1rem;
      min-height: 24px;
      color: #d9534f; /* red for alerts */
    }
    .queue-item.front {
      border: 2px solid #ffc107;
      background: #ffc107;
      color: #333;
    }
    @media (max-width: 480px) {
      .queue-item {
        min-width: 30px;
        padding: 8px 12px;
        font-size: 0.9rem;
      }
      button {
        flex: 1 1 45%;
      }
    }
  </style>
</head>
<body>
  <h1>Queue Data Structure Demonstration</h1>
  <p>A <strong>Queue</strong> is a First-In-First-Out (FIFO) data structure. Elements are added (enqueued) to the back and removed (dequeued) from the front.</p>

  <label for="inputValue">Enter value to enqueue:</label>
  <input type="text" id="inputValue" placeholder="Enter a value" />

  <div class="buttons">
    <button id="enqueueBtn">Enqueue</button>
    <button id="dequeueBtn">Dequeue</button>
    <button id="peekBtn">Peek Front</button>
    <button id="clearBtn">Clear Queue</button>
  </div>

  <div class="info" id="info"></div>

  <div class="queue-container" id="queueContainer" aria-live="polite" aria-label="Queue contents">
    <!-- Queue items will show here -->
  </div>

  <script>
    class Queue {
      constructor() {
        this.items = [];
      }
      enqueue(element) {
        this.items.push(element);
      }
      dequeue() {
        if (this.isEmpty()) {
          return null;
        }
        return this.items.shift();
      }
      front() {
        if (this.isEmpty()) {
          return null;
        }
        return this.items[0];
      }
      isEmpty() {
        return this.items.length === 0;
      }
      clear() {
        this.items = [];
      }
      getItems() {
        return this.items;
      }
      size() {
        return this.items.length;
      }
    }

    const queue = new Queue();

    const inputValue = document.getElementById('inputValue');
    const enqueueBtn = document.getElementById('enqueueBtn');
    const dequeueBtn = document.getElementById('dequeueBtn');
    const peekBtn = document.getElementById('peekBtn');
    const clearBtn = document.getElementById('clearBtn');
    const queueContainer = document.getElementById('queueContainer');
    const info = document.getElementById('info');

    function renderQueue() {
      queueContainer.innerHTML = '';
      const items = queue.getItems();
      if (items.length === 0) {
        queueContainer.textContent = 'Queue is empty.';
        return;
      }
      items.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'queue-item';
        if(index === 0) {
          div.classList.add('front');
          div.setAttribute('aria-label', `Front of the queue: ${item}`);
        } else {
          div.setAttribute('aria-label', `Queue element: ${item}`);
        }
        div.textContent = item;
        queueContainer.appendChild(div);
      });
    }

    function showInfo(message, isError = false) {
      info.style.color = isError ? '#d9534f' : '#28a745';
      info.textContent = message;
      setTimeout(() => {
        info.textContent = '';
      }, 3000);
    }

    enqueueBtn.addEventListener('click', () => {
      const value = inputValue.value.trim();
      if (value === '') {
        showInfo('Please enter a value to enqueue.', true);
        return;
      }
      queue.enqueue(value);
      renderQueue();
      showInfo(`Enqueued "${value}".`);
      inputValue.value = '';
      inputValue.focus();
    });

    dequeueBtn.addEventListener('click', () => {
      if (queue.isEmpty()) {
        showInfo('Queue is empty, cannot dequeue.', true);
        return;
      }
      const removed = queue.dequeue();
      renderQueue();
      showInfo(`Dequeued "${removed}".`);
    });

    peekBtn.addEventListener('click', () => {
      if (queue.isEmpty()) {
        showInfo('Queue is empty, nothing at front.', true);
        return;
      }
      const front = queue.front();
      showInfo(`Front of the queue: "${front}".`);
    });

    clearBtn.addEventListener('click', () => {
      if (queue.isEmpty()) {
        showInfo('Queue already empty.', true);
        return;
      }
      queue.clear();
      renderQueue();
      showInfo('Queue cleared.');
    });

    // Render initially empty queue
    renderQueue();

    // Enable enter key to enqueue
    inputValue.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        enqueueBtn.click();
      }
    });
  </script>
</body>
</html>
