<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deque (Double-Ended Queue) Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2rem;
    background: #f0f4f7;
    color: #333;
  }
  h1 {
    text-align: center;
    margin-bottom: 1rem;
    color: #007acc;
  }
  .deque-container {
    max-width: 600px;
    margin: 0 auto 2rem;
    background: #fff;
    border-radius: 8px;
    padding: 1rem;
    box-shadow: 0 2px 6px rgb(0 0 0 / 0.1);
  }
  .deque-state {
    background-color: #e1f5fe;
    border: 2px solid #03a9f4;
    border-radius: 4px;
    min-height: 50px;
    display: flex;
    align-items: center;
    padding: 0.5rem 1rem;
    overflow-x: auto;
    margin-bottom: 1rem;
    font-weight: bold;
  }
  .deque-element {
    background: #03a9f4;
    color: white;
    border-radius: 4px;
    padding: 0.25rem 0.75rem;
    margin: 0 0.25rem;
    min-width: 30px;
    text-align: center;
    user-select: none;
  }
  .operations {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
  }
  label {
    display: block;
    margin-bottom: 0.25rem;
    font-weight: 600;
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 0.4rem 0.6rem;
    border: 1.5px solid #ccc;
    border-radius: 4px;
    font-size: 1rem;
    box-sizing: border-box;
  }
  button {
    margin-top: 0.5rem;
    width: 100%;
    padding: 0.5rem;
    font-size: 1rem;
    border: none;
    border-radius: 4px;
    background-color: #007acc;
    color: white;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }
  button:hover:not(:disabled) {
    background-color: #005f99;
  }
  button:disabled {
    background-color: #aaa;
    cursor: not-allowed;
  }
  .message {
    margin-top: 1rem;
    min-height: 1.4rem;
    font-weight: 600;
    text-align: center;
  }
  footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 0.85rem;
    color: #888;
  }
</style>
</head>
<body>
<h1>Deque (Double-Ended Queue) Demo</h1>

<div class="deque-container" aria-label="Deque container">
  <div><strong>Current Deque State (front to rear):</strong></div>
  <div id="deque-state" class="deque-state" aria-live="polite" aria-atomic="true" aria-relevant="additions removals">
    <!-- Elements displayed here -->
  </div>
  <div class="operations" aria-label="Deque operations">

    <div>
      <label for="input-add-front">Add to Front</label>
      <input type="text" id="input-add-front" placeholder="Enter value" aria-describedby="desc-add-front" />
      <button id="btn-add-front" type="button">Add Front</button>
      <small id="desc-add-front">Insert an element at the front of the deque</small>
    </div>

    <div>
      <label for="input-add-rear">Add to Rear</label>
      <input type="text" id="input-add-rear" placeholder="Enter value" aria-describedby="desc-add-rear" />
      <button id="btn-add-rear" type="button">Add Rear</button>
      <small id="desc-add-rear">Insert an element at the rear of the deque</small>
    </div>

    <div>
      <label>&nbsp;</label>
      <button id="btn-remove-front" type="button">Remove Front</button>
      <small>Remove element from the front</small>
    </div>

    <div>
      <label>&nbsp;</label>
      <button id="btn-remove-rear" type="button">Remove Rear</button>
      <small>Remove element from the rear</small>
    </div>
  </div>

  <div id="message" class="message" role="alert" aria-live="assertive" aria-atomic="true"></div>
</div>

<script>
  // Deque class implementation
  class Deque {
    constructor() {
      this.items = [];
    }
    addFront(element) {
      this.items.unshift(element);
    }
    addRear(element) {
      this.items.push(element);
    }
    removeFront() {
      return this.items.shift();
    }
    removeRear() {
      return this.items.pop();
    }
    isEmpty() {
      return this.items.length === 0;
    }
    size() {
      return this.items.length;
    }
    toArray() {
      // front is index 0 -> rear last index
      return this.items.slice();
    }
  }

  // Instantiate deque
  const deque = new Deque();

  // DOM Elements
  const dequeStateEl = document.getElementById('deque-state');
  const messageEl = document.getElementById('message');
  const inputAddFront = document.getElementById('input-add-front');
  const inputAddRear = document.getElementById('input-add-rear');
  const btnAddFront = document.getElementById('btn-add-front');
  const btnAddRear = document.getElementById('btn-add-rear');
  const btnRemoveFront = document.getElementById('btn-remove-front');
  const btnRemoveRear = document.getElementById('btn-remove-rear');

  // Update the visual display of the deque
  function updateDequeDisplay() {
    dequeStateEl.innerHTML = '';
    const elems = deque.toArray();

    if(elems.length === 0) {
      dequeStateEl.textContent = '[ empty ]';
      btnRemoveFront.disabled = true;
      btnRemoveRear.disabled = true;
      return;
    }
    btnRemoveFront.disabled = false;
    btnRemoveRear.disabled = false;

    elems.forEach(el => {
      const div = document.createElement('div');
      div.className = 'deque-element';
      div.textContent = el;
      dequeStateEl.appendChild(div);
    });
  }

  // Show a message to the user
  function showMessage(text, isError = false) {
    messageEl.textContent = text;
    messageEl.style.color = isError ? '#D8000C' : '#007E33';
  }

  // Validate input (not empty after trimming)
  function validateInput(value) {
    if(value.trim() === '') {
      showMessage('Please enter a non-empty value.', true);
      return false;
    }
    return true;
  }

  // Event handlers
  btnAddFront.addEventListener('click', () => {
    const val = inputAddFront.value;
    if(validateInput(val)) {
      deque.addFront(val.trim());
      showMessage(`Added "${val.trim()}" to front.`);
      inputAddFront.value = '';
      updateDequeDisplay();
    }
  });

  btnAddRear.addEventListener('click', () => {
    const val = inputAddRear.value;
    if(validateInput(val)) {
      deque.addRear(val.trim());
      showMessage(`Added "${val.trim()}" to rear.`);
      inputAddRear.value = '';
      updateDequeDisplay();
    }
  });

  btnRemoveFront.addEventListener('click', () => {
    if(deque.isEmpty()) {
      showMessage('Deque is empty. Nothing to remove from front.', true);
      updateDequeDisplay();
      return;
    }
    const removed = deque.removeFront();
    showMessage(`Removed "${removed}" from front.`);
    updateDequeDisplay();
  });

  btnRemoveRear.addEventListener('click', () => {
    if(deque.isEmpty()) {
      showMessage('Deque is empty. Nothing to remove from rear.', true);
      updateDequeDisplay();
      return;
    }
    const removed = deque.removeRear();
    showMessage(`Removed "${removed}" from rear.`);
    updateDequeDisplay();
  });

  // Initialize display
  updateDequeDisplay();
  showMessage('Deque is empty. Add elements using the controls above.');
</script>
</body>
</html>
