<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Merge Sort Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f0f0f0;
  }
  h1 {
    text-align: center;
  }
  #array {
    display: flex;
    justify-content: center;
    margin: 30px 0;
    gap: 4px;
  }
  .bar {
    background-color: #5dade2;
    width: 30px;
    margin: 0 2px;
    color: white;
    text-align: center;
    border-radius: 4px;
    user-select: none;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-weight: bold;
    transition: background-color 0.3s ease;
  }
  #controls {
    text-align: center;
    margin-bottom: 20px;
  }
  button {
    font-size: 16px;
    padding: 8px 16px;
    margin: 0 5px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background-color: #2980b9;
    color: white;
    transition: background-color 0.3s ease;
  }
  button:disabled {
    background-color: #a9a9a9;
    cursor: not-allowed;
  }
  button:hover:not(:disabled) {
    background-color: #1c5980;
  }
  #description {
    max-width: 700px;
    margin: 0 auto 40px auto;
    text-align: center;
    color: #333;
    font-size: 1.1em;
  }
</style>
</head>
<body>
<h1>Merge Sort Visualization</h1>
<div id="description">
  <p>
    Merge Sort is a divide and conquer algorithm that divides the array into halves, sorts them and then merges them back together.
  </p>
  <p>
    Click <b>Generate Array</b> to create a random array, then <b>Start Merge Sort</b> to watch the sorting process.
  </p>
</div>
<div id="controls">
  <button id="generateBtn">Generate Array</button>
  <button id="startBtn">Start Merge Sort</button>
</div>
<div id="array"></div>

<script>
  const arrayContainer = document.getElementById("array");
  const generateBtn = document.getElementById("generateBtn");
  const startBtn = document.getElementById("startBtn");

  let array = [];
  const ARRAY_SIZE = 15;
  const MAX_VALUE = 100;
  const DELAY = 400; // ms delay for visualization

  function createRandomArray() {
    return Array.from({ length: ARRAY_SIZE }, () =>
      Math.floor(Math.random() * MAX_VALUE) + 5
    );
  }

  function renderArray(arr, highlightIndices = [], mergeIndices = []) {
    arrayContainer.innerHTML = "";
    for (let i = 0; i < arr.length; i++) {
      const bar = document.createElement("div");
      bar.classList.add("bar");
      bar.style.height = arr[i] * 3 + "px"; // scale height for better visibility
      bar.textContent = arr[i];

      // Highlight bars being compared or merged
      if (highlightIndices.includes(i)) {
        bar.style.backgroundColor = "#e74c3c"; // red for comparing
      } else if (mergeIndices.includes(i)) {
        bar.style.backgroundColor = "#27ae60"; // green for merge
      }

      arrayContainer.appendChild(bar);
    }
  }

  // async helper for delay
  function sleep(ms) {
    return new Promise((resolve) => setTimeout(resolve, ms));
  }

  async function merge(arr, left, mid, right) {
    let leftCopy = arr.slice(left, mid + 1);
    let rightCopy = arr.slice(mid + 1, right + 1);

    let i = 0;
    let j = 0;
    let k = left;

    // Visualize the subarrays being merged
    while (i < leftCopy.length && j < rightCopy.length) {
      renderArray(arr, [k], [
        left + i,
        mid + 1 + j,
      ]);
      await sleep(DELAY);

      if (leftCopy[i] <= rightCopy[j]) {
        arr[k] = leftCopy[i];
        i++;
      } else {
        arr[k] = rightCopy[j];
        j++;
      }
      renderArray(arr, [], [k]);
      await sleep(DELAY);
      k++;
    }

    // Copy remaining elements of leftCopy, if any
    while (i < leftCopy.length) {
      arr[k] = leftCopy[i];
      renderArray(arr, [], [k]);
      await sleep(DELAY);
      i++;
      k++;
    }

    // Copy remaining elements of rightCopy, if any
    while (j < rightCopy.length) {
      arr[k] = rightCopy[j];
      renderArray(arr, [], [k]);
      await sleep(DELAY);
      j++;
      k++;
    }
  }

  async function mergeSort(arr, left, right) {
    if (left >= right) {
      return;
    }
    const mid = Math.floor((left + right) / 2);
    await mergeSort(arr, left, mid);
    await mergeSort(arr, mid + 1, right);
    await merge(arr, left, mid, right);
  }

  generateBtn.addEventListener("click", () => {
    array = createRandomArray();
    renderArray(array);
    startBtn.disabled = false;
  });

  startBtn.addEventListener("click", async () => {
    generateBtn.disabled = true;
    startBtn.disabled = true;
    await mergeSort(array, 0, array.length - 1);
    renderArray(array);
    generateBtn.disabled = false;
  });

  // Initial setup
  array = createRandomArray();
  renderArray(array);
</script>
</body>
</html>
