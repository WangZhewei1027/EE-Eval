<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stack Data Structure Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2rem;
    background: #f0f4f8;
    color: #333;
  }
  h1 {
    text-align: center;
    color: #0b3d91;
  }
  .container {
    max-width: 500px;
    margin: 2rem auto;
    background: white;
    border-radius: 6px;
    padding: 1.5rem 2rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  label {
    font-weight: bold;
  }
  input[type="text"] {
    width: 70%;
    padding: 0.4rem 0.6rem;
    margin-right: 0.5rem;
    border: 1px solid #bbb;
    border-radius: 4px;
    font-size: 1rem;
  }
  button {
    padding: 0.45rem 1rem;
    border: none;
    background: #0b3d91;
    color: white;
    font-size: 1rem;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background-color 0.3s ease;
  }
  button:hover {
    background: #06407a;
  }
  .stack-container {
    margin-top: 2rem;
    text-align: center;
  }
  .stack {
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    max-width: 200px;
    margin: 0 auto;
    border: 2px solid #0b3d91;
    border-radius: 6px;
    padding: 10px 0;
    background: #e7edf8;
  }
  .stack-element {
    width: 80%;
    margin: 4px 0;
    padding: 8px 0;
    background: #1e50a2;
    color: white;
    border-radius: 4px;
    box-shadow: 0 2px 4px rgba(12,37,73,0.7);
    font-size: 1.1rem;
    user-select: none;
  }
  .stack-label {
    margin-bottom: 10px;
    font-weight: bold;
    color: #0b3d91;
    font-size: 1.2rem;
  }
  .info {
    margin-top: 1rem;
    color: #0b3d91;
    font-style: italic;
  }
  .message {
    margin-top: 1rem;
    min-height: 1.3em;
    font-weight: bold;
  }
  .message.error {
    color: #d93025;
  }
  .message.success {
    color: #188038;
  }
</style>
</head>
<body>
<h1>Stack Data Structure Visualization</h1>
<div class="container" role="main">
  <label for="pushInput">Element to Push:</label><br />
  <input type="text" id="pushInput" aria-label="Element to push onto stack" />
  <button id="pushBtn" aria-describedby="pushButtonDesc">Push</button>
  <div id="pushButtonDesc" class="visually-hidden">Adds the element to the top of the stack.</div>

  <button id="popBtn" style="margin-left:8px;" aria-describedby="popButtonDesc">Pop</button>
  <div id="popButtonDesc" class="visually-hidden">Removes the element from the top of the stack.</div>

  <button id="peekBtn" aria-describedby="peekButtonDesc">Peek</button>
  <div id="peekButtonDesc" class="visually-hidden">Shows the element at the top of the stack without removing it.</div>

  <button id="clearBtn" style="margin-left:8px;" aria-describedby="clearButtonDesc">Clear Stack</button>
  <div id="clearButtonDesc" class="visually-hidden">Empties the entire stack.</div>

  <div class="stack-container" aria-live="polite" aria-atomic="true" aria-relevant="additions removals">
    <div class="stack-label">Stack (Top at bottom):</div>
    <div id="stack" class="stack" role="list" aria-label="Stack elements">
      <!-- Stack elements will appear here -->
    </div>
  </div>

  <div id="message" class="message" aria-live="assertive" aria-atomic="true"></div>
  <p class="info">Demo Max Stack Size: 10 elements</p>
</div>

<script>
  class Stack {
    constructor(maxSize = 10) {
      this.items = [];
      this.maxSize = maxSize;
    }

    push(element) {
      if (this.items.length >= this.maxSize) {
        throw new Error('Stack Overflow: Max size reached.');
      }
      this.items.push(element);
    }

    pop() {
      if (this.isEmpty()) {
        throw new Error('Stack Underflow: No elements to pop.');
      }
      return this.items.pop();
    }

    peek() {
      if (this.isEmpty()) {
        throw new Error('Stack is empty: Nothing to peek at.');
      }
      return this.items[this.items.length - 1];
    }

    isEmpty() {
      return this.items.length === 0;
    }

    clear() {
      this.items = [];
    }

    size() {
      return this.items.length;
    }

    getElements() {
      return [...this.items]; // return copy of array
    }
  }

  // Initialize stack and DOM elements
  const stack = new Stack(10);
  const stackDiv = document.getElementById('stack');
  const pushInput = document.getElementById('pushInput');
  const pushBtn = document.getElementById('pushBtn');
  const popBtn = document.getElementById('popBtn');
  const peekBtn = document.getElementById('peekBtn');
  const clearBtn = document.getElementById('clearBtn');
  const messageDiv = document.getElementById('message');

  function renderStack() {
    stackDiv.innerHTML = '';
    if (stack.isEmpty()) {
      stackDiv.innerHTML = '<div style="color:#666; font-style: italic; margin:8px;">Stack is empty</div>';
      return;
    }
    // We display the top of stack at the bottom (using flex-column-reverse)
    // So pushing adds to the bottom visually
    stack.getElements().forEach((elem, index) => {
      const elDiv = document.createElement('div');
      elDiv.className = 'stack-element';
      elDiv.setAttribute('role', 'listitem');
      elDiv.textContent = elem;
      stackDiv.appendChild(elDiv);
    });
  }

  function showMessage(text, type='') {
    messageDiv.textContent = text;
    messageDiv.className = 'message';
    if(type === 'error') {
      messageDiv.classList.add('error');
    } else if(type === 'success') {
      messageDiv.classList.add('success');
    }
  }

  // Event listeners
  pushBtn.addEventListener('click', () => {
    const val = pushInput.value.trim();
    if (val === '') {
      showMessage('Please enter a value to push.', 'error');
      pushInput.focus();
      return;
    }
    try {
      stack.push(val);
      renderStack();
      showMessage(`Pushed "${val}" onto the stack.`, 'success');
      pushInput.value = '';
      pushInput.focus();
    } catch(err) {
      showMessage(err.message, 'error');
    }
  });

  popBtn.addEventListener('click', () => {
    try {
      const popped = stack.pop();
      renderStack();
      showMessage(`Popped "${popped}" from the stack.`, 'success');
      pushInput.focus();
    } catch(err) {
      showMessage(err.message, 'error');
    }
  });

  peekBtn.addEventListener('click', () => {
    try {
      const top = stack.peek();
      showMessage(`Top element is "${top}".`, 'success');
      pushInput.focus();
    } catch(err) {
      showMessage(err.message, 'error');
    }
  });

  clearBtn.addEventListener('click', () => {
    stack.clear();
    renderStack();
    showMessage('Stack has been cleared.', 'success');
    pushInput.focus();
  });

  // Allow pressing Enter in input to push element
  pushInput.addEventListener('keydown', e => {
    if(e.key === 'Enter') {
      pushBtn.click();
    }
  });

  // Initial render
  renderStack();
</script>
</body>
</html>
