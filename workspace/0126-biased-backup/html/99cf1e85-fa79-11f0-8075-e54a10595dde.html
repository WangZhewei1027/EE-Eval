<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prim's Algorithm Interactive Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #controls { margin-bottom: 20px; }
    </style>
</head>
<body>

<h1>Prim's Algorithm Interactive Demo</h1>

<div id="controls">
    <label for="numNodes">Number of Nodes:</label>
    <input type="number" id="numNodes" value="5" min="2" max="20">
    <button id="generateGraph">Generate Graph</button>
    <button id="runPrim">Run Prim's Algorithm</button>
</div>

<div id="graphRepresentation"></div>

<h2>Graph Edge Weights</h2>
<pre id="edgeWeights"></pre>

<h2>Minimum Spanning Tree</h2>
<pre id="mstOutput"></pre>

<script>
    class Graph {
        constructor(numNodes) {
            this.numNodes = numNodes;
            this.adjacencyMatrix = Array.from({ length: numNodes }, () => Array(numNodes).fill(Infinity));
            for (let i = 0; i < numNodes; i++) {
                this.adjacencyMatrix[i][i] = 0;
            }
        }

        addEdge(u, v, weight) {
            this.adjacencyMatrix[u][v] = weight;
            this.adjacencyMatrix[v][u] = weight;
        }

        getEdges() {
            const edges = [];
            for (let i = 0; i < this.numNodes; i++) {
                for (let j = i + 1; j < this.numNodes; j++) {
                    if (this.adjacencyMatrix[i][j] !== Infinity) {
                        edges.push({ u: i, v: j, weight: this.adjacencyMatrix[i][j] });
                    }
                }
            }
            return edges;
        }

        prim() {
            const visited = Array(this.numNodes).fill(false);
            const minHeap = [{ weight: 0, node: 0 }];
            const mst = [];
            let totalWeight = 0;

            while (minHeap.length) {
                const { weight, node } = minHeap.pop() || {};

                if (visited[node]) continue;
                visited[node] = true;
                totalWeight += weight;

                for (let i = 0; i < this.numNodes; i++) {
                    if (!visited[i] && this.adjacencyMatrix[node][i] < Infinity) {
                        minHeap.push({ weight: this.adjacencyMatrix[node][i], node: i });
                        mst.push({ u: node, v: i, weight: this.adjacencyMatrix[node][i] });
                    }
                }
                minHeap.sort((a, b) => a.weight - b.weight);
            }

            return { mst, totalWeight };
        }
    }

    function displayGraph(graph) {
        const representation = document.getElementById('graphRepresentation');
        const edges = graph.getEdges();
        representation.innerHTML = edges.map(edge => `(${edge.u} -- ${edge.v}) [Weight: ${edge.weight}]`).join('\n');
        document.getElementById('edgeWeights').innerText = JSON.stringify(graph.adjacencyMatrix);
    }

    document.getElementById('generateGraph').addEventListener('click', () => {
        const numNodes = parseInt(document.getElementById('numNodes').value);
        const graph = new Graph(numNodes);
        for (let i = 0; i < numNodes; i++) {
            for (let j = i + 1; j < numNodes; j++) {
                const weight = Math.floor(Math.random() * 10) + 1; // Random weights from 1 to 10
                graph.addEdge(i, j, weight);
            }
        }
        displayGraph(graph);
        window.currentGraph = graph; // Store current graph in a global variable
    });

    document.getElementById('runPrim').addEventListener('click', () => {
        if (!window.currentGraph) {
            alert("Generate a graph first!");
            return;
        }
        const { mst, totalWeight } = window.currentGraph.prim();
        document.getElementById('mstOutput').innerText = `MST Edges:\n${mst.map(edge => `(${edge.u} -- ${edge.v}) [Weight: ${edge.weight}]`).join('\n')}\nTotal Weight: ${totalWeight}`;
    });
</script>

</body>
</html>
