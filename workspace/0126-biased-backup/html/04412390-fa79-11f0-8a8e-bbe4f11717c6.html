<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Array</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 80%;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            border-bottom: 1px solid #444;
        }

        .header h1 {
            margin: 0;
        }

        .footer {
            background-color: #333;
            color: #fff;
            padding: 10px;
            border-top: 1px solid #444;
        }

        .footer p {
            margin: 0;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #333;
            color: #fff;
            cursor: pointer;
        }

        .button:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dynamic Array</h1>
            <p>Explore the power of dynamic arrays!</p>
        </div>
        <div class="footer">
            <p>&copy; 2023 Dynamic Array</p>
        </div>
        <div class="button-container">
            <button id="array-view">View Array</button>
            <button id="array-clear">Clear Array</button>
        </div>
    </div>

    <script>
        const array = [];
        const viewButton = document.getElementById('array-view');
        const clearButton = document.getElementById('array-clear');

        viewButton.addEventListener('click', () => {
            console.log('Array view button clicked');
        });

        clearButton.addEventListener('click', () => {
            array.length = 0;
            console.log('Array cleared');
        });

        for (let i = 0; i < 10; i++) {
            array.push(i);
        }

        const arrayElement = document.getElementById('array');
        arrayElement.innerHTML = '';

        for (let i = 0; i < array.length; i++) {
            const element = document.createElement('div');
            element.textContent = array[i];
            arrayElement.appendChild(element);
        }
    </script>
</body>
</html>
