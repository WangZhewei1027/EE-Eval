<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interpolation Search Demo</title>
</head>
<body>
    <h1>Interpolation Search Demo</h1>
    
    <label for="arrayInput">Enter Sorted Array (comma separated):</label>
    <input type="text" id="arrayInput" placeholder="e.g. 10, 20, 30, 40, 50" />
    
    <label for="searchInput">Enter Value to Search:</label>
    <input type="number" id="searchInput" placeholder="e.g. 30" />
    
    <button id="searchButton">Search</button>
    <button id="clearButton">Clear</button>
    
    <h2 id="result"></h2>
    
    <script>
        document.getElementById('searchButton').onclick = function() {
            const arrayInput = document.getElementById('arrayInput').value;
            const searchValue = parseInt(document.getElementById('searchInput').value);
            const resultElement = document.getElementById('result');

            if (!arrayInput) {
                resultElement.innerText = "Please enter a sorted array.";
                return;
            }

            const array = arrayInput.split(',').map(Number).sort((a, b) => a - b);
            const index = interpolationSearch(array, searchValue);

            if (index === -1) {
                resultElement.innerText = `Value ${searchValue} not found.`;
            } else {
                resultElement.innerText = `Value ${searchValue} found at index ${index}.`;
            }
        };

        document.getElementById('clearButton').onclick = function() {
            document.getElementById('arrayInput').value = '';
            document.getElementById('searchInput').value = '';
            document.getElementById('result').innerText = '';
        };

        function interpolationSearch(arr, x) {
            let low = 0;
            let high = arr.length - 1;

            while (low <= high && x >= arr[low] && x <= arr[high]) {
                if (low === high) {
                    return arr[low] === x ? low : -1;
                }

                const pos = low + Math.floor(((high - low) / (arr[high] - arr[low])) * (x - arr[low]));

                if (arr[pos] === x) {
                    return pos;
                }

                if (arr[pos] < x) {
                    low = pos + 1;
                } else {
                    high = pos - 1;
                }
            }
            return -1;
        }
    </script>
</body>
</html>
