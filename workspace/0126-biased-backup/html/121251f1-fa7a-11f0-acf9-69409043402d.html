<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Interactive Linked List Explorer</title>
<style>
  /* extremely minimal: just to keep monospace for clarity */
  body {
    font-family: monospace, monospace;
    margin: 1em;
    background: white;
    color: black;
  }
  input[type=number], input[type=text] {
    width: 6em;
    font-family: monospace;
  }
  button {
    font-family: monospace;
  }
  textarea {
    font-family: monospace;
    width: 100%;
    height: 4em;
  }
  .section {
    margin-bottom: 1.5em;
  }
  label {
    display: inline-block;
    min-width: 8em;
  }
</style>
</head>
<body>
<h1>Linked List Interactive Explorer</h1>

<div class="section" id="controls-insert">
  <h2>Insert Node</h2>
  <label for="insert-value">Value (text):</label>
  <input type="text" id="insert-value" autocomplete="off" />
  <br /><br />
  <label for="insert-pos">Position (0 = head):</label>
  <input type="number" id="insert-pos" min="0" value="0" />
  <button id="insert-head">Insert at Head</button>
  <button id="insert-tail">Insert at Tail</button>
  <button id="insert-pos-btn">Insert at Position</button>
  <div>
    <small>Position must be between 0 and current list length.</small>
  </div>
</div>

<div class="section" id="controls-delete">
  <h2>Delete Node</h2>
  <label for="delete-pos">Position (0 = head):</label>
  <input type="number" id="delete-pos" min="0" value="0" />
  <button id="delete-pos-btn">Delete at Position</button>
  <button id="delete-head">Delete Head</button>
  <button id="delete-tail">Delete Tail</button>
  <div>
    <small>Position must be within list bounds.</small>
  </div>
</div>

<div class="section" id="controls-update">
  <h2>Update Node</h2>
  <label for="update-pos">Position (0 = head):</label>
  <input type="number" id="update-pos" min="0" value="0" />
  <br /><br />
  <label for="update-value">New Value (text):</label>
  <input type="text" id="update-value" autocomplete="off" />
  <button id="update-pos-btn">Update Node Value</button>
</div>

<div class="section" id="controls-search">
  <h2>Search</h2>
  <label for="search-value">Search Value:</label>
  <input type="text" id="search-value" autocomplete="off" />
  <button id="search-btn">Find All Positions</button>
  <div id="search-result" style="white-space: pre-wrap; margin-top: 0.5em;"></div>
</div>

<div class="section" id="controls-traverse">
  <h2>Traverse List</h2>
  <button id="traverse-head-next">Start at Head → Next</button>
  <button id="traverse-head">Jump to Head</button>
  <button id="traverse-tail-prev">Start at Tail ← Prev</button>
  <button id="traverse-tail">Jump to Tail</button>
  <button id="traverse-reset">Reset Traversal</button>
  <div style="margin-top:0.5em;">
    <label>Current Traversal Position:</label>
    <span id="traverse-pos">-</span>
    <label style="margin-left:1em;">Value:</label>
    <span id="traverse-val">-</span>
  </div>
</div>

<div class="section" id="controls-reverse">
  <h2>List Operations</h2>
  <button id="reverse-list">Reverse Entire List</button>
  <button id="clear-list">Clear Entire List</button>
  <button id="sort-list">Sort List (lexicographically)</button>
  <button id="remove-duplicates">Remove Duplicate Values</button>
</div>

<div class="section" id="controls-debug">
  <h2>Debug & Export / Import</h2>
  <button id="export-json-btn">Export List JSON</button>
  <button id="import-json-btn">Import List JSON</button>
  <br />
  <textarea id="json-textarea" placeholder="Paste JSON here to import or see export output" spellcheck="false"></textarea>
  <div id="json-message" style="margin-top:0.5em;white-space:pre-wrap;"></div>
</div>

<div class="section" id="list-visualization">
  <h2>Current List (Index : Value)</h2>
  <div id="list-display" style="white-space: pre-wrap; font-weight: normal; min-height: 3em; border: 1px solid #000; padding: 0.5em; font-family: monospace;"></div>
</div>

<script>
(function(){
  // Linked List Node class
  class Node {
    constructor(value) {
      this.value = value;
      this.next = null;
      this.prev = null; // for doubly linked list support
    }
  }

  // Doubly Linked List with rich functionality
  class LinkedList {
    constructor() {
      this.head = null;
      this.tail = null;
      this.length = 0;
    }

    insertAtHead(value) {
      const node = new Node(value);
      if (!this.head) {
        this.head = node;
        this.tail = node;
      } else {
        node.next = this.head;
        this.head.prev = node;
        this.head = node;
      }
      this.length++;
    }

    insertAtTail(value) {
      const node = new Node(value);
      if (!this.tail) {
        this.head = node;
        this.tail = node;
      } else {
        node.prev = this.tail;
        this.tail.next = node;
        this.tail = node;
      }
      this.length++;
    }

    insertAtPosition(value, pos) {
      if (pos < 0 || pos > this.length) {
        throw new RangeError('Position out of bounds');
      }
      if (pos === 0) {
        this.insertAtHead(value);
        return;
      }
      if (pos === this.length) {
        this.insertAtTail(value);
        return;
      }
      // insert in middle
      const node = new Node(value);
      let current = this.head;
      for (let i = 0; i < pos; i++) {
        current = current.next;
      }
      const prev = current.prev;
      prev.next = node;
      node.prev = prev;
      node.next = current;
      current.prev = node;
      this.length++;
    }

    deleteAtHead() {
      if (!this.head) {
        throw new RangeError('List empty');
      }
      const val = this.head.value;
      if (this.head === this.tail) { 
        this.head = null;
        this.tail = null;
      } else {
        this.head = this.head.next;
        this.head.prev = null;
      }
      this.length--;
      return val;
    }

    deleteAtTail() {
      if (!this.tail) {
        throw new RangeError('List empty');
      }
      const val = this.tail.value;
      if (this.head === this.tail) {
        this.head = null;
        this.tail = null;
      } else {
        this.tail = this.tail.prev;
        this.tail.next = null;
      }
      this.length--;
      return val;
    }

    deleteAtPosition(pos) {
      if (pos < 0 || pos >= this.length) {
        throw new RangeError('Position out of bounds');
      }
      if (pos === 0) {
        return this.deleteAtHead();
      }
      if (pos === this.length - 1) {
        return this.deleteAtTail();
      }
      let current = this.head;
      for (let i = 0; i < pos; i++) {
        current = current.next;
      }
      const val = current.value;
      const before = current.prev;
      const after = current.next;
      before.next = after;
      after.prev = before;
      this.length--;
      return val;
    }

    updateAtPosition(pos, newValue) {
      if (pos < 0 || pos >= this.length) {
        throw new RangeError('Position out of bounds');
      }
      let current = this.head;
      for (let i = 0; i < pos; i++) {
        current = current.next;
      }
      current.value = newValue;
    }

    findAllPositions(value) {
      const positions = [];
      let idx = 0;
      let current = this.head;
      while (current) {
        if (current.value === value) {
          positions.push(idx);
        }
        current = current.next;
        idx++;
      }
      return positions;
    }

    toArray() {
      const arr = [];
      let current = this.head;
      while (current) {
        arr.push(current.value);
        current = current.next;
      }
      return arr;
    }

    fromArray(arr) {
      this.clear();
      for (const v of arr) {
        this.insertAtTail(v);
      }
    }

    clear() {
      this.head = null;
      this.tail = null;
      this.length = 0;
    }

    reverse() {
      let current = this.head;
      let tmp = null;
      while (current) {
        tmp = current.next;
        current.next = current.prev;
        current.prev = tmp;
        current = tmp;
      }
      tmp = this.head;
      this.head = this.tail;
      this.tail = tmp;
    }

    sortLex() {
      // sort linked list values lex, rebuild list with sorted array
      const arr = this.toArray();
      arr.sort((a,b)=>String(a).localeCompare(b));
      this.fromArray(arr);
    }

    removeDuplicates() {
      const seen = new Set();
      let current = this.head;
      let pos = 0;
      while (current) {
        if (seen.has(current.value)) {
          const nextNode = current.next;
          // delete current at pos
          this.deleteAtPosition(pos);
          current = nextNode;
        } else {
          seen.add(current.value);
          current = current.next;
          pos++;
        }
      }
    }
  }

  // Traversal controller to move through the list step-wise
  class Traversal {
    constructor(list) {
      this.list = list;
      this.current = null;
      this.currentPos = -1;
    }
    jumpToHead() {
      this.current = this.list.head;
      this.currentPos = this.current ? 0 : -1;
    }
    jumpToTail() {
      this.current = this.list.tail;
      this.currentPos = this.current ? this.list.length - 1 : -1;
    }
    reset() {
      this.current = null;
      this.currentPos = -1;
    }
    next() {
      if (!this.current) {
        this.jumpToHead();
        return;
      }
      if (this.current.next) {
        this.current = this.current.next;
        this.currentPos++;
      } else {
        // At tail already, do not move
      }
    }
    prev() {
      if (!this.current) {
        this.jumpToTail();
        return;
      }
      if (this.current.prev) {
        this.current = this.current.prev;
        this.currentPos--;
      } else {
        // At head already, do not move
      }
    }
    getCurrent() {
      if (!this.current) return {pos:-1,value:null};
      return {pos:this.currentPos, value:this.current.value};
    }
  }

  // App state
  const list = new LinkedList();
  const traversal = new Traversal(list);

  // UI elements
  const insertValueElem = document.getElementById('insert-value');
  const insertPosElem = document.getElementById('insert-pos');
  const insertHeadBtn = document.getElementById('insert-head');
  const insertTailBtn = document.getElementById('insert-tail');
  const insertPosBtn = document.getElementById('insert-pos-btn');

  const deletePosElem = document.getElementById('delete-pos');
  const deletePosBtn = document.getElementById('delete-pos-btn');
  const deleteHeadBtn = document.getElementById('delete-head');
  const deleteTailBtn = document.getElementById('delete-tail');

  const updatePosElem = document.getElementById('update-pos');
  const updateValueElem = document.getElementById('update-value');
  const updatePosBtn = document.getElementById('update-pos-btn');

  const searchValueElem = document.getElementById('search-value');
  const searchBtn = document.getElementById('search-btn');
  const searchResultDiv = document.getElementById('search-result');

  const traverseHeadNextBtn = document.getElementById('traverse-head-next');
  const traverseHeadBtn = document.getElementById('traverse-head');
  const traverseTailPrevBtn = document.getElementById('traverse-tail-prev');
  const traverseTailBtn = document.getElementById('traverse-tail');
  const traverseResetBtn = document.getElementById('traverse-reset');
  const traversePosSpan = document.getElementById('traverse-pos');
  const traverseValSpan = document.getElementById('traverse-val');

  const reverseListBtn = document.getElementById('reverse-list');
  const clearListBtn = document.getElementById('clear-list');
  const sortListBtn = document.getElementById('sort-list');
  const removeDuplicatesBtn = document.getElementById('remove-duplicates');

  const exportJSONBtn = document.getElementById('export-json-btn');
  const importJSONBtn = document.getElementById('import-json-btn');
  const jsonTextarea = document.getElementById('json-textarea');
  const jsonMessageDiv = document.getElementById('json-message');

  const listDisplayDiv = document.getElementById('list-display');

  // Helper to refresh display
  function refreshListDisplay() {
    if (list.length === 0) {
      listDisplayDiv.textContent = "(empty)";
    } else {
      const arr = list.toArray();
      const displayLines = arr.map((v,i)=> i + ' : ' + v);
      listDisplayDiv.textContent = displayLines.join('\n');
    }
  }

  // Helper for traversal display update
  function refreshTraversalDisplay() {
    const current = traversal.getCurrent();
    if (current.pos === -1) {
      traversePosSpan.textContent = '-';
      traverseValSpan.textContent = '-';
    } else {
      traversePosSpan.textContent = current.pos;
      traverseValSpan.textContent = current.value;
    }
  }

  // Helper: validate position input relative to list length
  function validatePositionInput(inputElem, allowEqualLength) {
    let val = inputElem.value.trim();
    if (val === '') {
      return {valid:false, reason:'Empty input'};
    }
    let n = Number(val);
    if (!Number.isInteger(n) || n < 0) {
      return {valid:false, reason:'Not a valid non-negative integer'};
    }
    if (allowEqualLength) {
      if (n > list.length) {
        return {valid:false, reason:`Position > list length (${list.length})`};
      }
    } else {
      if (n >= list.length) {
        return {valid:false, reason:`Position out of bounds, max index ${list.length-1}`};
      }
    }
    return {valid:true, pos:n};
  }

  // Insert Handlers
  insertHeadBtn.addEventListener('click', () => {
    const val = insertValueElem.value.trim();
    if (val === '') {
      alert('Please enter a value to insert.');
      insertValueElem.focus();
      return;
    }
    try {
      list.insertAtHead(val);
      refreshListDisplay();
      resetTraversalIfInvalid();
    } catch(e) {
      alert('Insert failed: ' + e.message);
    }
  });

  insertTailBtn.addEventListener('click', () => {
    const val = insertValueElem.value.trim();
    if (val === '') {
      alert('Please enter a value to insert.');
      insertValueElem.focus();
      return;
    }
    try {
      list.insertAtTail(val);
      refreshListDisplay();
      resetTraversalIfInvalid();
    } catch(e) {
      alert('Insert failed: ' + e.message);
    }
  });

  insertPosBtn.addEventListener('click', () => {
    const val = insertValueElem.value.trim();
    if (val === '') {
      alert('Please enter a value to insert.');
      insertValueElem.focus();
      return;
    }
    const posV = validatePositionInput(insertPosElem, true);
    if (!posV.valid) {
      alert('Position error: ' + posV.reason);
      insertPosElem.focus();
      return;
    }
    try {
      list.insertAtPosition(val, posV.pos);
      refreshListDisplay();
      resetTraversalIfInvalid();
    } catch (e) {
      alert('Insert failed: ' + e.message);
    }
  });

  // Delete Handlers
  deleteHeadBtn.addEventListener('click', () => {
    if (list.length === 0) {
      alert('List already empty');
      return;
    }
    try {
      list.deleteAtHead();
      refreshListDisplay();
      resetTraversalIfInvalid();
    } catch (e) {
      alert('Delete failed: ' + e.message);
    }
  });

  deleteTailBtn.addEventListener('click', () => {
    if (list.length === 0) {
      alert('List already empty');
      return;
    }
    try {
      list.deleteAtTail();
      refreshListDisplay();
      resetTraversalIfInvalid();
    } catch (e) {
      alert('Delete failed: ' + e.message);
    }
  });

  deletePosBtn.addEventListener('click', () => {
    if (list.length === 0) {
      alert('List is empty');
      return;
    }
    const posV = validatePositionInput(deletePosElem, false);
    if (!posV.valid) {
      alert('Position error: ' + posV.reason);
      deletePosElem.focus();
      return;
    }
    try {
      list.deleteAtPosition(posV.pos);
      refreshListDisplay();
      resetTraversalIfInvalid();
    } catch(e) {
      alert('Delete failed: ' + e.message);
    }
  });

  // Update Handlers
  updatePosBtn.addEventListener('click', () => {
    if (list.length === 0) {
      alert('List is empty');
      return;
    }
    const posV = validatePositionInput(updatePosElem, false);
    if (!posV.valid) {
      alert('Position error: ' + posV.reason);
      updatePosElem.focus();
      return;
    }
    const newVal = updateValueElem.value.trim();
    if (newVal === '') {
      alert('Please enter a new value to update.');
      updateValueElem.focus();
      return;
    }
    try {
      list.updateAtPosition(posV.pos, newVal);
      refreshListDisplay();
      resetTraversalIfInvalid();
    } catch(e) {
      alert('Update failed: ' + e.message);
    }
  });

  // Search Handlers
  searchBtn.addEventListener('click', () => {
    const term = searchValueElem.value;
    searchResultDiv.textContent = '';
    if (term === '') {
      alert('Please enter a search value.');
      searchValueElem.focus();
      return;
    }
    const positions = list.findAllPositions(term);
    if (positions.length === 0) {
      searchResultDiv.textContent = 'Value not found in list.';
    } else {
      searchResultDiv.textContent = 'Value found at positions: ' + positions.join(', ');
    }
  });

  // Traversal Handlers
  traverseHeadNextBtn.addEventListener('click', () => {
    traversal.next();
    refreshTraversalDisplay();
  });

  traverseHeadBtn.addEventListener('click', () => {
    traversal.jumpToHead();
    refreshTraversalDisplay();
  });

  traverseTailPrevBtn.addEventListener('click', () => {
    traversal.prev();
    refreshTraversalDisplay();
  });

  traverseTailBtn.addEventListener('click', () => {
    traversal.jumpToTail();
    refreshTraversalDisplay();
  });

  traverseResetBtn.addEventListener('click', () => {
    traversal.reset();
    refreshTraversalDisplay();
  });

  // List operations handlers
  reverseListBtn.addEventListener('click', () => {
    if (list.length < 2) {
      alert('List must have 2 or more elements to reverse.');
      return;
    }
    list.reverse();
    refreshListDisplay();
    resetTraversalIfInvalid();
  });

  clearListBtn.addEventListener('click', () => {
    if (list.length === 0) {
      alert('List is already empty.');
      return;
    }
    if (!confirm('Are you sure you want to clear the entire list?')) return;
    list.clear();
    refreshListDisplay();
    traversal.reset();
    refreshTraversalDisplay();
  });

  sortListBtn.addEventListener('click', () => {
    if (list.length < 2) {
      alert('List must have 2 or more elements to sort.');
      return;
    }
    list.sortLex();
    refreshListDisplay();
    resetTraversalIfInvalid();
  });

  removeDuplicatesBtn.addEventListener('click', () => {
    if (list.length < 2) {
      alert('List must have 2 or more elements to remove duplicates.');
      return;
    }
    list.removeDuplicates();
    refreshListDisplay();
    resetTraversalIfInvalid();
  });

  // Debug, Export/Import
  exportJSONBtn.addEventListener('click', () => {
    const arr = list.toArray();
    try {
      const json = JSON.stringify(arr, null, 2);
      jsonTextarea.value = json;
      jsonMessageDiv.textContent = 'Export successful. JSON copied to textarea.';
    } catch (e) {
      jsonMessageDiv.textContent = 'Export failed: ' + e.message;
    }
  });

  importJSONBtn.addEventListener('click', () => {
    const text = jsonTextarea.value.trim();
    if (text === '') {
      jsonMessageDiv.textContent = 'No JSON input to import.';
      jsonTextarea.focus();
      return;
    }
    try {
      const arr = JSON.parse(text);
      if (!Array.isArray(arr)) {
        jsonMessageDiv.textContent = 'JSON is not an array.';
        return;
      }
      list.fromArray(arr.map(String));
      refreshListDisplay();
      resetTraversalIfInvalid();
      jsonMessageDiv.textContent = `Import successful. List length: ${list.length}`;
    } catch (e) {
      jsonMessageDiv.textContent = 'Import failed: ' + e.message;
    }
  });

  // If current traversal points to invalid position (e.g. after deletion), reset
  function resetTraversalIfInvalid() {
    const current = traversal.getCurrent();
    if (current.pos === -1) {
      traversal.reset();
    } else if (current.pos >= list.length) {
      traversal.reset();
    }
    refreshTraversalDisplay();
  }

  // Initialize
  refreshListDisplay();
  refreshTraversalDisplay();

})();
</script>

</body>
</html>
