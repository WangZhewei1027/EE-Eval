<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive SQL Explorer</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>

<h1>Interactive SQL Explorer</h1>

<div>
    <label for="query">SQL Query:</label>
    <input type="text" id="query" placeholder="SELECT * FROM table_name">
    
    <button onclick="executeQuery()">Execute Query</button>
</div>

<div>
    <label for="filter">Filter Criteria:</label>
    <input type="text" id="filter" placeholder="e.g., column_name=value">

    <button onclick="applyFilter()">Apply Filter</button>
</div>

<div>
    <label for="sort">Sort By:</label>
    <input type="text" id="sort" placeholder="e.g., column_name ASC|DESC">

    <button onclick="applySort()">Apply Sort</button>
</div>

<div>
    <label for="limit">Limit:</label>
    <input type="number" id="limit" placeholder="e.g., 10">

    <button onclick="applyLimit()">Apply Limit</button>
</div>

<div>
    <button onclick="resetFilters()">Reset Filters</button>
</div>

<div id="output"></div>

<script>
    let database = [
        { id: 1, name: 'Alice', age: 30 },
        { id: 2, name: 'Bob', age: 25 },
        { id: 3, name: 'Charlie', age: 35 },
        { id: 4, name: 'David', age: 40 }
    ];

    let filteredData = [...database];
    let limit = null;
    let currentQuery = "";

    function executeQuery() {
        currentQuery = document.getElementById('query').value;
        updateOutput();
    }

    function applyFilter() {
        const filterString = document.getElementById('filter').value;
        const [key, value] = filterString.split('=');
        filteredData = database.filter(item => item[key.trim()] == value.trim());
        updateOutput();
    }

    function applySort() {
        const sortString = document.getElementById('sort').value;
        const [key, order] = sortString.split(' ');
        filteredData.sort((a, b) => {
            if (order.trim().toUpperCase() === 'ASC') return a[key.trim()] - b[key.trim()];
            return b[key.trim()] - a[key.trim()];
        });
        updateOutput();
    }

    function applyLimit() {
        limit = parseInt(document.getElementById('limit').value);
        updateOutput();
    }

    function resetFilters() {
        filteredData = [...database];
        limit = null;
        currentQuery = "";
        document.getElementById('filter').value = '';
        document.getElementById('sort').value = '';
        document.getElementById('limit').value = '';
        updateOutput();
    }

    function updateOutput() {
        let resultData = currentQuery ? filteredData : database;
        if (limit) {
            resultData = resultData.slice(0, limit);
        }
        document.getElementById('output').innerText = JSON.stringify(resultData, null, 2);
    }
</script>

</body>
</html>
