<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket Programming Visualization</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: slideIn 1.5s ease-out;
        }

        p {
            font-size: 1.5rem;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 2s ease-in-out forwards;
            animation-delay: 1.5s;
        }

        .button {
            background-color: #e74c3c;
            border: none;
            border-radius: 5px;
            color: white;
            padding: 15px 30px;
            font-size: 1.25rem;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
            opacity: 0;
            animation: fadeIn 2s ease-in forwards;
            animation-delay: 2.5s;
        }

        .button:hover {
            background-color: #c0392b;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .graphic {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .socket-visual {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: #1abc9c;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.1);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Socket Programming</h1>
        <p>Explore the power of real-time communication over networks with socket programming.</p>
        <button class="button" onclick="alert('Socket Programming Example!')">Learn More</button>
        <div class="graphic">
            <div class="socket-visual"></div>
        </div>
    </div>
</body>
</html>
