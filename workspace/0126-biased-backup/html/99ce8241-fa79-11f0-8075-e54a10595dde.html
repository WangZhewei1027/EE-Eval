<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Heap Demonstration</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .heap-node { margin: 5px; }
    </style>
</head>
<body>
    <h1>Max Heap Interactive Demonstration</h1>
    <div>
        <label for="value-input">Enter a value to insert into the heap:</label>
        <input type="number" id="value-input">
        <button id="insert-button">Insert</button>
    </div>
    <div>
        <button id="remove-button">Remove Max</button>
        <button id="peek-button">Peek Max</button>
    </div>
    <div>
        <h3>Current Max Heap:</h3>
        <div id="heap-display"></div>
    </div>
    <div>
        <h3>Max Value:</h3>
        <div id="max-value"></div>
    </div>

    <script>
        class MaxHeap {
            constructor() {
                this.heap = [];
            }

            insert(value) {
                this.heap.push(value);
                this.bubbleUp(this.heap.length - 1);
                this.updateDisplay();
            }

            removeMax() {
                if (this.heap.length === 0) return null;
                const max = this.heap[0];
                const end = this.heap.pop();
                if (this.heap.length > 0) {
                    this.heap[0] = end;
                    this.bubbleDown(0);
                }
                this.updateDisplay();
                return max;
            }

            peekMax() {
                return this.heap[0] || null;
            }

            bubbleUp(index) {
                let parentIdx = Math.floor((index - 1) / 2);
                while (index > 0 && this.heap[index] > this.heap[parentIdx]) {
                    [this.heap[index], this.heap[parentIdx]] = [this.heap[parentIdx], this.heap[index]];
                    index = parentIdx;
                    parentIdx = Math.floor((index - 1) / 2);
                }
            }

            bubbleDown(index) {
                let length = this.heap.length;
                let leftChildIdx, rightChildIdx, largestIdx;

                while (true) {
                    leftChildIdx = 2 * index + 1;
                    rightChildIdx = 2 * index + 2;
                    largestIdx = index;

                    if (leftChildIdx < length && this.heap[leftChildIdx] > this.heap[largestIdx]) {
                        largestIdx = leftChildIdx;
                    }
                    if (rightChildIdx < length && this.heap[rightChildIdx] > this.heap[largestIdx]) {
                        largestIdx = rightChildIdx;
                    }
                    if (largestIdx === index) break;

                    [this.heap[index], this.heap[largestIdx]] = [this.heap[largestIdx], this.heap[index]];
                    index = largestIdx;
                }
            }

            updateDisplay() {
                const heapDisplay = document.getElementById('heap-display');
                heapDisplay.innerHTML = this.heap.map((value, index) => `<div class="heap-node">Node ${index}: ${value}</div>`).join('');
                const maxValueDisplay = document.getElementById('max-value');
                maxValueDisplay.innerText = this.peekMax() !== null ? this.peekMax() : 'Heap is empty';
            }
        }

        const maxHeap = new MaxHeap();
        
        document.getElementById('insert-button').onclick = function() {
            const valueInput = document.getElementById('value-input');
            const value = parseInt(valueInput.value);
            if (!isNaN(value)) {
                maxHeap.insert(value);
                valueInput.value = '';
            }
        };

        document.getElementById('remove-button').onclick = function() {
            const removedValue = maxHeap.removeMax();
            alert(removedValue !== null ? `Removed Max: ${removedValue}` : 'Heap is empty');
        };

        document.getElementById('peek-button').onclick = function() {
            const maxValue = maxHeap.peekMax();
            alert(maxValue !== null ? `Max Value: ${maxValue}` : 'Heap is empty');
        };
    </script>
</body>
</html>
