<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runtime Environment Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
    </style>
</head>
<body>

    <h1>Interactive Runtime Environment Demo</h1>
    
    <div>
        <h2>Choose Operation:</h2>
        <button onclick="setOperation('add')">Add</button>
        <button onclick="setOperation('subtract')">Subtract</button>
        <button onclick="setOperation('multiply')">Multiply</button>
        <button onclick="setOperation('divide')">Divide</button>
    </div>

    <div>
        <h2>Input Numbers:</h2>
        <input type="number" id="num1" placeholder="First Number" oninput="calculate()">
        <input type="number" id="num2" placeholder="Second Number" oninput="calculate()">
    </div>

    <div>
        <h2>Result:</h2>
        <p id="result">0</p>
    </div>
    
    <h2>Adjustment Factor:</h2>
    <input type="range" id="factor" min="1" max="10" value="1" step="1" oninput="applyFactor()">
    <p>Current Factor: <span id="factorValue">1</span></p>

    <h2>Log:</h2>
    <button onclick="clearLog()">Clear Log</button>
    <div id="log" style="max-height: 200px; overflow:auto; border: 1px solid #000;">
    </div>
    
    <script>
        let operation = 'add';
        let factor = 1;
        
        function setOperation(op) {
            operation = op;
            calculate();
        }

        function calculate() {
            const num1 = parseFloat(document.getElementById('num1').value) || 0;
            const num2 = parseFloat(document.getElementById('num2').value) || 0;
            let result;

            switch (operation) {
                case 'add':
                    result = num1 + num2;
                    break;
                case 'subtract':
                    result = num1 - num2;
                    break;
                case 'multiply':
                    result = num1 * num2;
                    break;
                case 'divide':
                    result = num2 !== 0 ? num1 / num2 : 'Infinity';
                    break;
            }

            result *= factor;
            document.getElementById('result').innerText = result;
            logResult(result);
        }

        function logResult(result) {
            const log = document.getElementById('log');
            const entry = document.createElement('p');
            entry.textContent = `Operation: ${operation}, Result: ${result}`;
            log.appendChild(entry);
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        function applyFactor() {
            factor = parseFloat(document.getElementById('factor').value);
            document.getElementById('factorValue').innerText = factor;
            calculate();
        }
    </script>

</body>
</html>
