<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
        }
        input, button {
            padding: 5px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>Bubble Sort</h1>
    <form>
        <label for="array-size">Array Size:</label>
        <input type="number" id="array-size" value="10" min="1">
        <button id="sort-button">Sort</button>
        <button id="clear-button">Clear</button>
        <button id="reset-button">Reset</button>
        <div id="output"></div>
    </form>

    <script>
        let arraySize = 10;
        let array = new Array(arraySize);
        let sorted = false;
        let swapped = false;

        function bubbleSort() {
            if (swapped) return;
            swapped = false;
            for (let i = 0; i < arraySize - 1; i++) {
                if (array[i] > array[i + 1]) {
                    [array[i], array[i + 1]] = [array[i + 1], array[i]];
                    swapped = true;
                }
            }
            if (!swapped) {
                console.log("Sorted array:");
                console.log(array);
                sorted = true;
            }
        }

        function clearArray() {
            array = new Array(arraySize);
            console.log("Array cleared.");
        }

        function resetArray() {
            array = new Array(arraySize);
            sorted = false;
            swapped = false;
            console.log("Array reset.");
        }

        document.getElementById("sort-button").addEventListener("click", bubbleSort);
        document.getElementById("clear-button").addEventListener("click", clearArray);
        document.getElementById("reset-button").addEventListener("click", resetArray);

        document.getElementById("output").innerHTML = "Unsorted array: <pre>" + array.join(", ") + "</pre>";

        let intervalId = setInterval(() => {
            if (sorted) {
                clearInterval(intervalId);
                console.log("Sorted array:");
                console.log(array);
                bubbleSort();
            }
        }, 100);
    </script>
</body>
</html>
