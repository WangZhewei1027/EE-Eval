<!DOCTYPE html>
<html>
<head>
    <title>Interactive Hash Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .panel {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 10px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        button, input, select {
            padding: 5px 10px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .bucket {
            background-color: #f9f9f9;
        }
        .collision {
            background-color: #ffebee;
        }
        .highlight {
            background-color: #e3f2fd;
        }
        .stats {
            margin-top: 20px;
        }
        .visualization {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 20px;
        }
        .bucket-vis {
            border: 1px solid #000;
            padding: 5px;
            min-width: 50px;
            min-height: 30px;
        }
        .entry {
            border: 1px solid #999;
            margin: 2px;
            padding: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interactive Hash Table Explorer</h1>
        
        <div class="panel">
            <h2>Hash Table Configuration</h2>
            <div class="controls">
                <div>
                    <label>Table Size: <span id="sizeValue">10</span></label>
                    <input type="range" id="tableSize" min="1" max="20" value="10">
                </div>
                <div>
                    <label>Hash Function:</label>
                    <select id="hashFunction">
                        <option value="simple">Simple Modulo</option>
                        <option value="multiplicative">Multiplicative</option>
                        <option value="djb2">DJB2 (String)</option>
                    </select>
                </div>
                <div>
                    <label>Collision Resolution:</label>
                    <select id="collisionMethod">
                        <option value="chaining">Chaining</option>
                        <option value="linear">Linear Probing</option>
                        <option value="quadratic">Quadratic Probing</option>
                    </select>
                </div>
                <button id="resetTable">Reset Table</button>
            </div>
        </div>
        
        <div class="panel">
            <h2>Operations</h2>
            <div class="controls">
                <input type="text" id="keyInput" placeholder="Key">
                <input type="text" id="valueInput" placeholder="Value">
                <button id="insertBtn">Insert</button>
                <button id="searchBtn">Search</button>
                <button id="deleteBtn">Delete</button>
                <button id="randomData">Add Random Data</button>
                <input type="number" id="randomCount" min="1" max="20" value="5" style="width: 50px;">
            </div>
        </div>
        
        <div class="panel">
            <h2>Visualization</h2>
            <div id="hashVisualization" class="visualization"></div>
            <div>
                <label>Animation Speed: </label>
                <input type="range" id="speedControl" min="100" max="1000" value="500">
            </div>
        </div>
        
        <div class="panel">
            <h2>Detailed View</h2>
            <table id="hashTableDetail">
                <thead>
                    <tr>
                        <th>Index</th>
                        <th>Key</th>
                        <th>Value</th>
                        <th>Hash</th>
                        <th>Probes</th>
                    </tr>
                </thead>
                <tbody id="hashTableBody">
                </tbody>
            </table>
        </div>
        
        <div class="panel stats">
            <h2>Statistics</h2>
            <div>
                <p>Load Factor: <span id="loadFactor">0</span></p>
                <p>Total Collisions: <span id="totalCollisions">0</span></p>
                <p>Average Probes: <span id="avgProbes">0</span></p>
                <p>Operations: <span id="operationCount">0</span></p>
            </div>
        </div>
        
        <div class="panel">
            <h2>Hash Function Details</h2>
            <div id="hashCalculation">
                <p>Enter a key to see hash calculation steps:</p>
                <input type="text" id="hashTestKey">
                <button id="calcHashBtn">Calculate Hash</button>
                <div id="hashSteps"></div>
            </div>
        </div>
    </div>

    <script>
        class HashTable {
            constructor(size = 10, hashFn = 'simple', collisionMethod = 'chaining') {
                this.size = size;
                this.hashFn = hashFn;
                this.collisionMethod = collisionMethod;
                this.table = Array(size).fill().map(() => []);
                this.collisions = 0;
                this.operations = 0;
                this.totalProbes = 0;
            }
            
            hash(key) {
                if (this.hashFn === 'simple') {
                    return this.simpleHash(key);
                } else if (this.hashFn === 'multiplicative') {
                    return this.multiplicativeHash(key);
                } else if (this.hashFn === 'djb2') {
                    return this.djb2Hash(key);
                }
            }
            
            simpleHash(key) {
                if (typeof key === 'string') {
                    let sum = 0;
                    for (let i = 0; i < key.length; i++) {
                        sum += key.charCodeAt(i);
                    }
                    return sum % this.size;
                }
                return key % this.size;
            }
            
            multiplicativeHash(key) {
                const A = 0.6180339887; // Golden ratio
                if (typeof key === 'string') {
                    let numericKey = 0;
                    for (let i = 0; i < key.length; i++) {
                        numericKey = numericKey * 31 + key.charCodeAt(i);
                    }
                    key = numericKey;
                }
                const product = key * A;
                return Math.floor(this.size * (product - Math.floor(product)));
            }
            
            djb2Hash(key) {
                if (typeof key !== 'string') key = key.toString();
                let hash = 5381;
                for (let i = 0; i < key.length; i++) {
                    hash = (hash * 33) ^ key.charCodeAt(i);
                }
                return (hash >>> 0) % this.size; // Ensure positive number
            }
            
            insert(key, value) {
                this.operations++;
                const originalHash = this.hash(key);
                let index = originalHash;
                let probes = 0;
                
                if (this.collisionMethod === 'chaining') {
                    // Check if key already exists in chain
                    const existingIndex = this.table[index].findIndex(item => item.key === key);
                    if (existingIndex >= 0) {
                        this.table[index][existingIndex].value = value;
                    } else {
                        if (this.table[index].length > 0) this.collisions++;
                        this.table[index].push({ key, value, hash: originalHash, probes });
                        this.totalProbes += probes;
                    }
                    return { index, probes };
                }
                
                // Open addressing methods
                let i = 0;
                while (true) {
                    probes++;
                    if (i >= this.size) {
                        throw new Error("Hash table is full");
                    }
                    
                    if (this.collisionMethod === 'linear') {
                        index = (originalHash + i) % this.size;
                    } else if (this.collisionMethod === 'quadratic') {
                        index = (originalHash + i*i) % this.size;
                    }
                    
                    if (this.table[index].length === 0) {
                        this.table[index].push({ key, value, hash: originalHash, probes });
                        this.totalProbes += probes;
                        return { index, probes };
                    } else if (this.table[index][0].key === key) {
                        this.table[index][0].value = value;
                        return { index, probes };
                    } else {
                        this.collisions++;
                        i++;
                    }
                }
            }
            
            search(key) {
                this.operations++;
                const originalHash = this.hash(key);
                let index = originalHash;
                let probes = 0;
                
                if (this.collisionMethod === 'chaining') {
                    const bucket = this.table[index];
                    for (let i = 0; i < bucket.length; i++) {
                        probes++;
                        if (bucket[i].key === key) {
                            this.totalProbes += probes;
                            return { index, item: bucket[i], probes };
                        }
                    }
                    return { index, item: null, probes };
                }
                
                // Open addressing methods
                let i = 0;
                while (true) {
                    probes++;
                    if (i >= this.size) {
                        return { index: -1, item: null, probes };
                    }
                    
                    if (this.collisionMethod === 'linear') {
                        index = (originalHash + i) % this.size;
                    } else if (this.collisionMethod === 'quadratic') {
                        index = (originalHash + i*i) % this.size;
                    }
                    
                    if (this.table[index].length === 0) {
                        return { index: -1, item: null, probes };
                    } else if (this.table[index][0].key === key) {
                        this.totalProbes += probes;
                        return { index, item: this.table[index][0], probes };
                    } else {
                        i++;
                    }
                }
            }
            
            delete(key) {
                this.operations++;
                const originalHash = this.hash(key);
                let index = originalHash;
                let probes = 0;
                
                if (this.collisionMethod === 'chaining') {
                    const bucket = this.table[index];
                    for (let i = 0; i < bucket.length; i++) {
                        probes++;
                        if (bucket[i].key === key) {
                            this.totalProbes += probes;
                            return { index, item: bucket.splice(i, 1)[0], probes };
                        }
                    }
                    return { index, item: null, probes };
                }
                
                // Open addressing methods
                let i = 0;
                while (true) {
                    probes++;
                    if (i >= this.size) {
                        return { index: -1, item: null, probes };
                    }
                    
                    if (this.collisionMethod === 'linear') {
                        index = (originalHash + i) % this.size;
                    } else if (this.collisionMethod === 'quadratic') {
                        index = (originalHash + i*i) % this.size;
                    }
                    
                    if (this.table[index].length === 0) {
                        return { index: -1, item: null, probes };
                    } else if (this.table[index][0].key === key) {
                        this.totalProbes += probes;
                        return { index, item: this.table[index].pop(), probes };
                    } else {
                        i++;
                    }
                }
            }
            
            getLoadFactor() {
                let count = 0;
                for (const bucket of this.table) {
                    count += bucket.length;
                }
                return count / this.size;
            }
            
            getAvgProbes() {
                return this.operations > 0 ? (this.totalProbes / this.operations).toFixed(2) : 0;
            }
        }

        // UI Implementation
        let hashTable = new HashTable();
        let animationSpeed = 500;
        let highlightedCells = [];
        
        function updateUI() {
            // Update visualization
            const visContainer = document.getElementById('hashVisualization');
            visContainer.innerHTML = '';
            
            for (let i = 0; i < hashTable.size; i++) {
                const bucketDiv = document.createElement('div');
                bucketDiv.className = 'bucket-vis';
                bucketDiv.textContent = i;
                
                if (highlightedCells.includes(i)) {
                    bucketDiv.classList.add('highlight');
                }
                
                const entries = hashTable.table[i];
                if (entries.length > 0) {
                    if (hashTable.collisionMethod === 'chaining' && entries.length > 1) {
                        bucketDiv.classList.add('collision');
                    }
                    
                    entries.forEach(entry => {
                        const entryDiv = document.createElement('div');
                        entryDiv.className = 'entry';
                        entryDiv.textContent = `${entry.key}:${entry.value}`;
                        bucketDiv.appendChild(entryDiv);
                    });
                }
                
                visContainer.appendChild(bucketDiv);
            }
            
            // Update detailed table
            const tableBody = document.getElementById('hashTableBody');
            tableBody.innerHTML = '';
            
            for (let i = 0; i < hashTable.size; i++) {
                const row = document.createElement('tr');
                if (highlightedCells.includes(i)) {
                    row.classList.add('highlight');
                }
                
                const indexCell = document.createElement('td');
                indexCell.textContent = i;
                row.appendChild(indexCell);
                
                const entries = hashTable.table[i];
                if (entries.length === 0) {
                    row.appendChild(document.createElement('td'));
                    row.appendChild(document.createElement('td'));
                    row.appendChild(document.createElement('td'));
                    row.appendChild(document.createElement('td'));
                } else {
                    if (hashTable.collisionMethod === 'chaining') {
                        // For chaining, show all entries in the row
                        const keyCell = document.createElement('td');
                        const valueCell = document.createElement('td');
                        const hashCell = document.createElement('td');
                        const probesCell = document.createElement('td');
                        
                        keyCell.textContent = entries.map(e => e.key).join(', ');
                        valueCell.textContent = entries.map(e => e.value).join(', ');
                        hashCell.textContent = entries[0]?.hash ?? '';
                        probesCell.textContent = entries.map(e => e.probes).join(', ');
                        
                        row.appendChild(keyCell);
                        row.appendChild(valueCell);
                        row.appendChild(hashCell);
                        row.appendChild(probesCell);
                    } else {
                        // For open addressing, one entry per row
                        const entry = entries[0];
                        const keyCell = document.createElement('td');
                        const valueCell = document.createElement('td');
                        const hashCell = document.createElement('td');
                        const probesCell = document.createElement('td');
                        
                        keyCell.textContent = entry.key;
                        valueCell.textContent = entry.value;
                        hashCell.textContent = entry.hash;
                        probesCell.textContent = entry.probes;
                        
                        row.appendChild(keyCell);
                        row.appendChild(valueCell);
                        row.appendChild(hashCell);
                        row.appendChild(probesCell);
                    }
                }
                
                tableBody.appendChild(row);
            }
            
            // Update stats
            document.getElementById('loadFactor').textContent = hashTable.getLoadFactor().toFixed(2);
            document.getElementById('totalCollisions').textContent = hashTable.collisions;
            document.getElementById('avgProbes').textContent = hashTable.getAvgProbes();
            document.getElementById('operationCount').textContent = hashTable.operations;
        }
        
        function highlightCell(index, duration = 1000) {
            highlightedCells.push(index);
            updateUI();
            
            setTimeout(() => {
                highlightedCells = highlightedCells.filter(i => i !== index);
                updateUI();
            }, duration);
        }
        
        function animateOperation(steps, finalAction) {
            let stepIndex = 0;
            
            function nextStep() {
                if (stepIndex < steps.length) {
                    const step = steps[stepIndex];
                    if (step.highlight !== undefined) {
                        highlightedCells = [step.highlight];
                    }
                    updateUI();
                    stepIndex++;
                    setTimeout(nextStep, animationSpeed);
                } else {
                    highlightedCells = [];
                    finalAction();
                    updateUI();
                }
            }
            
            nextStep();
        }
        
        // Event Listeners
        document.getElementById('tableSize').addEventListener('input', function() {
            document.getElementById('sizeValue').textContent = this.value;
        });
        
        document.getElementById('resetTable').addEventListener('click', function() {
            const size = parseInt(document.getElementById('tableSize').value);
            const hashFn = document.getElementById('hashFunction').value;
            const collisionMethod = document.getElementById('collisionMethod').value;
            
            hashTable = new HashTable(size, hashFn, collisionMethod);
            updateUI();
        });
        
        document.getElementById('insertBtn').addEventListener('click', function() {
            const key = document.getElementById('keyInput').value;
            const value = document.getElementById('valueInput').value;
            
            if (!key) {
                alert("Please enter a key");
                return;
            }
            
            const originalHash = hashTable.hash(key);
            const steps = [
                { message: `Calculating hash for key "${key}"...` },
                { highlight: originalHash, message: `Initial hash index: ${originalHash}` }
            ];
            
            if (hashTable.collisionMethod !== 'chaining') {
                // For open addressing, show probing steps
                let i = 0;
                let index = originalHash;
                while (i < hashTable.size) {
                    if (hashTable.collisionMethod === 'linear') {
                        index = (originalHash + i) % hashTable.size;
                    } else if (hashTable.collisionMethod === 'quadratic') {
                        index = (originalHash + i*i) % hashTable.size;
                    }
                    
                    steps.push({ highlight: index, message: `Probing index ${index}...` });
                    
                    if (hashTable.table[index].length === 0) {
                        break;
                    } else if (hashTable.table[index][0].key === key) {
                        break;
                    }
                    
                    i++;
                }
            }
            
            animateOperation(steps, () => {
                const result = hashTable.insert(key, value);
                highlightCell(result.index);
            });
        });
        
        document.getElementById('searchBtn').addEventListener('click', function() {
            const key = document.getElementById('keyInput').value;
            
            if (!key) {
                alert("Please enter a key");
                return;
            }
            
            const originalHash = hashTable.hash(key);
            const steps = [
                { message: `Calculating hash for key "${key}"...` },
                { highlight: originalHash, message: `Initial hash index: ${originalHash}` }
            ];
            
            if (hashTable.collisionMethod === 'chaining') {
                // For chaining, just show the bucket
                steps.push({ highlight: originalHash, message: `Searching chain at index ${originalHash}...` });
            } else {
                // For open addressing, show probing steps
                let i = 0;
                let index = -1;
                while (i < hashTable.size) {
                    if (hashTable.collisionMethod === 'linear') {
                        index = (originalHash + i) % hashTable.size;
                    } else if (hashTable.collisionMethod === 'quadratic') {
                        index = (originalHash + i*i) % hashTable.size;
                    }
                    
                    steps.push({ highlight: index, message: `Probing index ${index}...` });
                    
                    if (hashTable.table[index].length === 0) {
                        break;
                    } else if (hashTable.table[index][0].key === key) {
                        break;
                    }
                    
                    i++;
                }
            }
            
            animateOperation(steps, () => {
                const result = hashTable.search(key);
                if (result.item) {
                    alert(`Found key "${key}" with value "${result.item.value}" at index ${result.index} (${result.probes} probes)`);
                    highlightCell(result.index);
                } else {
                    alert(`Key "${key}" not found (${result.probes} probes)`);
                }
            });
        });
        
        document.getElementById('deleteBtn').addEventListener('click', function() {
            const key = document.getElementById('keyInput').value;
            
            if (!key) {
                alert("Please enter a key");
                return;
            }
            
            const originalHash = hashTable.hash(key);
            const steps = [
                { message: `Calculating hash for key "${key}"...` },
                { highlight: originalHash, message: `Initial hash index: ${originalHash}` }
            ];
            
            if (hashTable.collisionMethod === 'chaining') {
                steps.push({ highlight: originalHash, message: `Searching chain at index ${originalHash} for deletion...` });
            } else {
                let i = 0;
                let index = -1;
                while (i < hashTable.size) {
                    if (hashTable.collisionMethod === 'linear') {
                        index = (originalHash + i) % hashTable.size;
                    } else if (hashTable.collisionMethod === 'quadratic') {
                        index = (originalHash + i*i) % hashTable.size;
                    }
                    
                    steps.push({ highlight: index, message: `Probing index ${index} for deletion...` });
                    
                    if (hashTable.table[index].length === 0) {
                        break;
                    } else if (hashTable.table[index][0].key === key) {
                        break;
                    }
                    
                    i++;
                }
            }
            
            animateOperation(steps, () => {
                const result = hashTable.delete(key);
                if (result.item) {
                    alert(`Deleted key "${key}" from index ${result.index} (${result.probes} probes)`);
                    highlightCell(result.index);
                } else {
                    alert(`Key "${key}" not found for deletion (${result.probes} probes)`);
                }
            });
        });
        
        document.getElementById('randomData').addEventListener('click', function() {
            const count = parseInt(document.getElementById('randomCount').value);
            const keys = new Set();
            
            while (keys.size < count) {
                const randomKey = Math.random() > 0.5 ? 
                    Math.floor(Math.random() * 100) : 
                    Math.random().toString(36).substring(2, 5);
                keys.add(randomKey);
            }
            
            Array.from(keys).forEach((key, i) => {
                setTimeout(() => {
                    const value = `val${i+1}`;
                    hashTable.insert(key, value);
                    updateUI();
                }, i * 300);
            });
        });
        
        document.getElementById('speedControl').addEventListener('input', function() {
            animationSpeed = 1100 - this.value; // Invert so slider left is faster
        });
        
        document.getElementById('calcHashBtn').addEventListener('click', function() {
            const key = document.getElementById('hashTestKey').value;
            const hashFn = document.getElementById('hashFunction').value;
            const stepsDiv = document.getElementById('hashSteps');
            stepsDiv.innerHTML = '';
            
            if (!key) {
                stepsDiv.textContent = 'Please enter a key';
                return;
            }
            
            let steps = [];
            let hash;
            
            if (hashFn === 'simple') {
                if (typeof key === 'string') {
                    steps.push(`Calculating simple hash for string "${key}":`);
                    let sum = 0;
                    steps.push(`Initialize sum = 0`);
                    for (let i = 0; i < key.length; i++) {
                        const code = key.charCodeAt(i);
                        sum += code;
                        steps.push(`Add char '${key[i]}' (ASCII ${code}): sum = ${sum}`);
                    }
                    hash = sum % hashTable.size;
                    steps.push(`Final hash = sum % ${hashTable.size} = ${hash}`);
                } else {
                    steps.push(`Calculating simple hash for number ${key}:`);
                    hash = key % hashTable.size;
                    steps.push(`Final hash = ${key} % ${hashTable.size} = ${hash}`);
                }
            } else if (hashFn === 'multiplicative') {
                steps.push(`Calculating multiplicative hash (using golden ratio):`);
                let numericKey;
                if (typeof key === 'string') {
                    steps.push(`Converting string "${key}" to numeric value:`);
                    numericKey = 0;
                    for (let i = 0; i < key.length; i++) {
                        numericKey = numericKey * 31 + key.charCodeAt(i);
                        steps.push(`After char '${key[i]}': ${numericKey}`);
                    }
                } else {
                    numericKey = key;
                }
                steps.push(`Numeric key: ${numericKey}`);
                const A = 0.6180339887;
                const product = numericKey * A;
                steps.push(`Multiply by golden ratio (${A}): ${product}`);
                const fractional = product - Math.floor(product);
                steps.push(`Fractional part: ${fractional}`);
                hash = Math.floor(hashTable.size * fractional);
                steps.push(`Multiply by table size (${hashTable.size}): ${hashTable.size * fractional}`);
                steps.push(`Floor to get final hash: ${hash}`);
            } else if (hashFn === 'djb2') {
                if (typeof key !== 'string') key = key.toString();
                steps.push(`Calculating DJB2 hash for "${key}":`);
                let hash = 5381;
                steps.push(`Initial hash: ${hash}`);
                for (let i = 0; i < key.length; i++) {
                    const code = key.charCodeAt(i);
                    hash = (hash * 33) ^ code;
                    steps.push(`After char '${key[i]}' (ASCII ${code}): hash = ${hash}`);
                }
                hash = (hash >>> 0) % hashTable.size;
                steps.push(`Ensure positive number: ${hash >>> 0}`);
                steps.push(`Final hash = ${hash >>> 0} % ${hashTable.size} = ${hash}`);
            }
            
            steps.forEach(step => {
                const p = document.createElement('p');
                p.textContent = step;
                stepsDiv.appendChild(p);
            });
        });
        
        // Initialize
        updateUI();
    </script>
</body>
</html>
