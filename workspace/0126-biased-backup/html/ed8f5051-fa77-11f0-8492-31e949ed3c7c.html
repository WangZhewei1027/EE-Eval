<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Connection - HTTPS</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom right, #4A90E2, #50E3C2);
            color: white;
            overflow: hidden;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            position: relative;
        }

        .title {
            font-size: 3.5rem;
            animation: fadeIn 1s ease forwards;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .subtitle {
            font-size: 1.5rem;
            margin-top: 10px;
            animation: fadeIn 1s ease forwards;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .button {
            padding: 15px 30px;
            background-color: #F5A623;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 30px;
            opacity: 0;
            transform: translateY(-20px);
            animation: slideIn 1s ease forwards;
            transition: transform 0.3s ease;
        }

        .button:hover {
            transform: translateY(-5px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lock-icon {
            width: 100px;
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="title">Secure Connection</div>
            <div class="subtitle">You're browsing over HTTPS</div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/SSL_TLS_Logo.svg/1024px-SSL_TLS_Logo.svg.png" alt="Lock icon" class="lock-icon">
            <button class="button" onclick="showAlert()">Learn More</button>
        </div>
    </div>
    
    <script>
        function showAlert() {
            alert("HTTPS (Hypertext Transfer Protocol Secure) is an extension of HTTP. It uses TLS/SSL to encrypt data for security.");
        }
        
        // Trigger animations on window load
        window.onload = function() {
            document.querySelector('.title').style.opacity = '1';
            document.querySelector('.subtitle').style.opacity = '1';
            document.querySelector('.button').style.opacity = '1';
        };
    </script>
</body>
</html>
