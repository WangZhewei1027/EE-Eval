<!DOCTYPE html>
<html>
<head>
    <title>Radix Sort</title>
    <style>
        body {
            font-family: monospace;
        }
        input {
            padding: 10px;
            margin: 5px;
            border: 1px solid black;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <h1>Radix Sort</h1>
    <p>Radix Sort is a non-comparative sorting algorithm that works by grouping numbers by their largest digit first and then continuing with the next largest digit, and so on.</p>
    <button id="radix-sort">Radix Sort</button>
    <button id="bubble-sort">Bubble Sort</button>
    <button id="merge-sort">Merge Sort</button>
    <button id="insert-sort">Insertion Sort</button>
    <button id="quick-sort">Quick Sort</button>
    <button id="kmp-sort">KMP Sort</button>
    <button id="radix-sort-example">Radix Sort Example</button>
    <button id="bubble-sort-example">Bubble Sort Example</button>
    <button id="merge-sort-example">Merge Sort Example</button>
    <button id="insert-sort-example">Insertion Sort Example</button>
    <button id="quick-sort-example">Quick Sort Example</button>
    <button id="kmp-sort-example">KMP Sort Example</button>
    <div id="radix-sort-example-container"></div>

    <script>
        let radixSortExampleContainer = document.getElementById('radix-sort-example-container');
        let radixSortExample = document.getElementById('radix-sort-example');
        let bubbleSortExample = document.getElementById('bubble-sort-example');
        let mergeSortExample = document.getElementById('merge-sort-example');
        let insertionSortExample = document.getElementById('insert-sort-example');
        let quickSortExample = document.getElementById('quick-sort-example');
        let kmpSortExample = document.getElementById('kmp-sort-example');

        function radixSortExample() {
            let arr = Array.from({length: 100}, (_, i) => i).map(i => i);
            radixSort(arr);
            let sorted = arr.map(i => i.toString()).join('');
            radixSortExampleContainer.innerHTML = `<p>Sorted array: ${sorted}</p>`;
        }

        function bubbleSortExample() {
            let arr = Array.from({length: 100}, (_, i) => i);
            bubbleSort(arr);
            let sorted = arr.map(i => i.toString()).join('');
            radixSortExampleContainer.innerHTML = `<p>Sorted array: ${sorted}</p>`;
        }

        function mergeSortExample() {
            let arr = Array.from({length: 100}, (_, i) => i);
            mergeSort(arr);
            let sorted = arr.map(i => i.toString()).join('');
            radixSortExampleContainer.innerHTML = `<p>Sorted array: ${sorted}</p>`;
        }

        function insertionSortExample() {
            let arr = Array.from({length: 100}, (_, i) => i);
            insertionSort(arr);
            let sorted = arr.map(i => i.toString()).join('');
            radixSortExampleContainer.innerHTML = `<p>Sorted array: ${sorted}</p>`;
        }

        function quickSortExample() {
            let arr = Array.from({length: 100}, (_, i) => i);
            quickSort(arr);
            let sorted = arr.map(i => i.toString()).join('');
            radixSortExampleContainer.innerHTML = `<p>Sorted array: ${sorted}</p>`;
        }

        function kmpSortExample() {
            let arr = Array.from({length: 100}, (_, i) => i);
            kmpSort(arr);
            let sorted = arr.map(i => i.toString()).join('');
            radixSortExampleContainer.innerHTML = `<p>Sorted array: ${sorted}</p>`;
        }

        function radixSort(arr) {
            let max = Math.max(...arr);
            let exp = 1;
            while (exp <= max) {
                let buckets = Array.from({length: 10}, () => []);
                for (let num of arr) {
                    let index = Math.floor(num / exp);
                    buckets[index].push(num);
                }
                let sorted = [];
                for (let bucket of buckets) {
                    sorted.push(...bucket);
                }
                arr = sorted;
                exp *= 10;
            }
        }

        function display(arr) {
            let output = '';
            for (let i = 0; i < arr.length; i++) {
                output += `${arr[i]} `;
            }
            radixSortExampleContainer.innerHTML = output;
        }

        let radixSortButton = document.getElementById('radix-sort');
        let bubbleSortButton = document.getElementById('bubble-sort');
        let mergeSortButton = document.getElementById('merge-sort');
        let insertionSortButton = document.getElementById('insert-sort');
        let quickSortButton = document.getElementById('quick-sort');
        let kmpSortButton = document.getElementById('kmp-sort');

        radixSortButton.addEventListener('click', radixSortExample);
        bubbleSortButton.addEventListener('click', bubbleSortExample);
        mergeSortButton.addEventListener('click', mergeSortExample);
        insertionSortButton.addEventListener('click', insertionSortExample);
        quickSortButton.addEventListener('click', quickSortExample);
        kmpSortButton.addEventListener('click', kmpSortExample);

        display('Radix Sort Example');
    </script>
</body>
</html>
