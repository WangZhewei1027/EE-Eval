<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P vs NP</title>
    <style>
        body {
            background-color: #fff;
            font-family: Arial, sans-serif;
        }
        #controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        label {
            display: block;
            margin-bottom: 10px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
        #complex {
            display: none;
        }
        #simple {
            display: block;
        }
    </style>
</head>
<body>
    <div id="controls">
        <h2>P vs NP</h2>
        <label>Problem:</label>
        <input type="text" id="problem" placeholder="Enter problem name">
        <button id="solve-btn">Solve</button>
        <label>Solution:</label>
        <input type="text" id="solution" placeholder="Enter solution name">
        <button id="view-btn">View</button>
        <button id="complex-btn">Complex</button>
        <button id="simple-btn">Simple</button>
        <div id="complex" class="hidden"></div>
        <div id="simple" class="hidden"></div>
    </div>

    <script>
        let problem = "Traveling Salesman Problem";
        let solution = " brute-force";
        let solutionText = document.getElementById("solution");
        let complexDiv = document.getElementById("complex");
        let simpleDiv = document.getElementById("simple");

        // Solve button click handler
        document.getElementById("solve-btn").addEventListener("click", () => {
            // Get input values
            const problemName = document.getElementById("problem").value.trim();
            const solutionName = document.getElementById("solution").value.trim();

            // Check if input values are correct
            if (problemName === "" || solutionName === "") {
                alert("Please enter a problem name and a solution name.");
                return;
            }

            // Display solution
            solutionText.textContent = solution;
            solutionText.style.display = "block";

            // Display complex solution
            complexDiv.style.display = "block";
            complexDiv.innerHTML = `<h2>Complex Solution:</h2><p>${problemName} is a ${problem} problem. The solution is a brute-force algorithm.</p>`;
        });

        // View button click handler
        document.getElementById("view-btn").addEventListener("click", () => {
            // Display solution
            solutionText.textContent = solution;
            solutionText.style.display = "block";

            // Display simple solution
            simpleDiv.style.display = "block";
            simpleDiv.innerHTML = `<h2>Simple Solution:</h2><p>${problemName} is a ${problem} problem. The simple solution is ${solution}.`;
        });

        // Complex button click handler
        document.getElementById("complex-btn").addEventListener("click", () => {
            // Display complex solution
            complexDiv.style.display = "block";
            complexDiv.innerHTML = `<h2>Complex Solution:</h2><p>${problemName} is a ${problem} problem. The complex solution is a brute-force algorithm.</p>`;
        });

        // Simple button click handler
        document.getElementById("simple-btn").addEventListener("click", () => {
            // Display simple solution
            simpleDiv.style.display = "block";
            simpleDiv.innerHTML = `<h2>Simple Solution:</h2><p>${problemName} is a ${problem} problem. The simple solution is ${solution}.`;
        });
    </script>
</body>
</html>
