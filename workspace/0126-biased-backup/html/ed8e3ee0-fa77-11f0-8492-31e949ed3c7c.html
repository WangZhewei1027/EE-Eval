<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Pointers Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1d1f21;
            color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            position: relative;
            width: 80%;
            max-width: 800px;
            background: #282c34;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        .title {
            font-size: 2.5rem;
            margin: 20px 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        .array-container {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 250px;
            margin: 20px 0;
        }
        .bar {
            width: 60px;
            background: #007bff;
            transition: height 0.4s ease;
        }
        .pointer {
            background: #ff5722;
            position: relative;
            margin: 0 10px;
            border-radius: 5px;
            animation: pulse 1s infinite;
        }
        button {
            background-color: #28a745;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 1.2rem;
            padding: 10px 20px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin: 20px;
        }
        button:hover {
            background-color: #218838;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Two Pointers Visualization</div>
        <div class="array-container" id="arrayContainer">
            <!-- Bars will be dynamically added here -->
        </div>
        <button id="startBtn">Visualize Two Pointers</button>
    </div>

    <script>
        const arrayContainer = document.getElementById('arrayContainer');
        const startBtn = document.getElementById('startBtn');

        const array = [4, 2, 7, 3, 5, 1, 6, 8];
        let leftPointer = 0;
        let rightPointer = array.length - 1;

        function createBars() {
            arrayContainer.innerHTML = '';
            array.forEach((value, index) => {
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = `${value * 30}px`;
                if (index === leftPointer || index === rightPointer) {
                    const pointerDiv = document.createElement('div');
                    pointerDiv.classList.add('pointer');
                    pointerDiv.style.height = `${value * 30}px`;
                    bar.appendChild(pointerDiv);
                }
                arrayContainer.appendChild(bar);
            });
        }

        function visualize() {
            createBars();
            if (leftPointer < rightPointer) {
                leftPointer++;
                rightPointer--;
            }
            if (leftPointer <= rightPointer) {
                setTimeout(visualize, 1000);
            }
        }

        startBtn.addEventListener('click', () => {
            leftPointer = 0;
            rightPointer = array.length - 1;
            visualize();
        });

        createBars();
    </script>
</body>
</html>
