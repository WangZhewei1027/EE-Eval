<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Bubble Sort Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #arrayDisplay {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Bubble Sort Visualization</h1>
    <label for="arrayInput">Enter Numbers (comma-separated): </label>
    <input type="text" id="arrayInput" value="64,34,25,12,22,11,90">
    <button id="startButton">Start Sorting</button>
    <button id="stepButton">Next Step</button>
    <button id="resetButton">Reset</button>
    <label for="speedSlider">Set Speed (ms): </label>
    <input type="range" id="speedSlider" min="100" max="1000" value="500">
    <span id="speedValue">500 ms</span>

    <div id="arrayDisplay"></div>
    <script>
        let array = [];
        let currentStep = 0;
        let isSorted = false;
        let speed = 500;

        document.getElementById('startButton').addEventListener('click', startSorting);
        document.getElementById('stepButton').addEventListener('click', nextStep);
        document.getElementById('resetButton').addEventListener('click', reset);
        document.getElementById('speedSlider').addEventListener('input', changeSpeed);

        function displayArray() {
            document.getElementById('arrayDisplay').innerText = 'Current Array: ' + array.join(', ');
        }

        function startSorting() {
            const input = document.getElementById('arrayInput').value;
            array = input.split(',').map(Number);
            currentStep = 0;
            isSorted = false;
            displayArray();
            bubbleSort();
        }

        function bubbleSort() {
            const n = array.length;
            const steps = [];
            for (let i = 0; i < n-1; i++) {
                for (let j = 0; j < n-i-1; j++) {
                    steps.push(j);
                    if (array[j] > array[j+1]) {
                        [array[j], array[j+1]] = [array[j+1], array[j]];
                    }
                }
            }
            isSorted = true;
            array = steps;
            displayArray();
        }

        function nextStep() {
            if (isSorted) {
                alert('Sorting is complete.');
                return;
            }
            const j = array[currentStep];
            if (j < array.length - 1 && array[j] > array[j + 1]) {
                [array[j], array[j + 1]] = [array[j + 1], array[j]];
            }
            currentStep++;
            displayArray();
            if (currentStep >= array.length - 1) {
                isSorted = true;
                alert('One pass completed.');
                currentStep = 0;
            }
        }

        function reset() {
            array = [];
            currentStep = 0;
            isSorted = false;
            document.getElementById('arrayInput').value = '64,34,25,12,22,11,90';
            displayArray();
        }

        function changeSpeed() {
            speed = parseInt(document.getElementById('speedSlider').value);
            document.getElementById('speedValue').innerText = speed + ' ms';
        }
    </script>
</body>
</html>
