<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Heap Sort — Visualized</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#0f1724;
    --bg-2:#071028;
    --card:#0b1320aa;
    --accent:#6ee7b7;
    --accent-2:#7cc0ff;
    --muted:#9aa7b2;
    --glass: rgba(255,255,255,0.04);
    --glass-2: rgba(255,255,255,0.02);
    --shadow: 0 10px 30px rgba(2,6,23,0.6);
    --neon: 0 6px 30px rgba(110,231,183,0.12);
    --duration: 620ms;
    --ease: cubic-bezier(.21,.9,.32,1);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    background: radial-gradient(1200px 600px at 10% 20%, rgba(124,58,237,0.12), transparent 8%),
                radial-gradient(900px 500px at 90% 80%, rgba(34,211,238,0.06), transparent 10%),
                linear-gradient(180deg,var(--bg-1),var(--bg-2));
    color: #e6eef6;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
  }

  .card{
    width: 100%;
    max-width:1100px;
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border-radius:20px;
    padding:28px;
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.02);
    backdrop-filter: blur(8px) saturate(120%);
    border: 1px solid rgba(255,255,255,0.03);
    position:relative;
    overflow:hidden;
  }

  .header{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:18px;
  }

  .logo{
    width:72px;
    height:72px;
    border-radius:14px;
    background: linear-gradient(135deg, rgba(124,58,237,0.18), rgba(34,211,238,0.08));
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: var(--neon);
    flex-shrink:0;
    border:1px solid rgba(255,255,255,0.03);
  }
  .logo svg{filter: drop-shadow(0 6px 18px rgba(34,211,238,0.06));}

  h1{
    margin:0;
    font-weight:800;
    letter-spacing: -0.02em;
    font-size:20px;
    color: linear-gradient(#fff,#aaf);
  }
  .subtitle{
    margin:0;
    color:var(--muted);
    font-size:13px;
    font-weight:500;
    margin-top:6px;
  }

  .controls{
    margin-left:auto;
    display:flex;
    gap:12px;
    align-items:center;
  }

  .btn{
    appearance:none;
    border:0;
    padding:10px 16px;
    border-radius:12px;
    color:#06202a;
    font-weight:700;
    cursor:pointer;
    font-size:13px;
    transition:transform .18s var(--ease), box-shadow .18s var(--ease);
    box-shadow: 0 6px 18px rgba(3,8,23,0.45);
    user-select:none;
  }
  .btn:active{transform:translateY(1px) scale(.997)}
  .btn.primary{
    background: linear-gradient(180deg,var(--accent), #4bd2a7);
  }
  .btn.ghost{
    background: transparent;
    color: var(--accent-2);
    border: 1px solid rgba(124,58,237,0.12);
    backdrop-filter: blur(4px);
  }

  .arena{
    margin-top:18px;
    height:360px;
    position:relative;
    border-radius:14px;
    overflow:visible;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:22px;
  }

  .stage{
    width:100%;
    max-width:980px;
    height:220px;
    background: linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.01));
    border-radius:14px;
    position:relative;
    padding:20px;
    display:block;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.02);
  }

  /* Items row */
  .row{
    position:absolute;
    left:20px;
    right:20px;
    bottom:28px;
    top:28px;
    display:block;
    pointer-events:none;
  }

  .items{
    position:relative;
    height:100%;
    width:100%;
    overflow:visible;
  }

  .node{
    position:absolute;
    bottom:14px;
    width:62px;
    height:62px;
    border-radius:14px;
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    display:flex;
    align-items:center;
    justify-content:center;
    color:#e6f9f0;
    font-weight:800;
    font-size:18px;
    box-shadow: 0 8px 28px rgba(2,6,23,0.55), inset 0 1px 0 rgba(255,255,255,0.03);
    transition: left var(--duration) var(--ease), transform var(--duration) var(--ease), background-color 280ms linear, box-shadow 280ms linear;
    will-change: left, transform;
    border: 1px solid rgba(255,255,255,0.04);
  }

  .node::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:14px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    mix-blend-mode: screen;
    pointer-events:none;
  }

  .node .value{
    z-index:2;
    display:block;
    text-shadow: 0 4px 22px rgba(34,211,238,0.06);
  }
  .node .idx{
    position:absolute;
    top:6px;
    right:8px;
    font-size:11px;
    color:var(--muted);
    font-weight:600;
  }

  .node.highlight{
    transform: translateY(-18px) scale(1.06);
    box-shadow: 0 18px 48px rgba(110,231,183,0.12), inset 0 1px 0 rgba(255,255,255,0.04);
    background: linear-gradient(180deg, rgba(110,231,183,0.14), rgba(34,211,238,0.06));
    color:#022827;
  }
  .node.compare{
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 14px 38px rgba(124,58,237,0.08);
    background: linear-gradient(180deg, rgba(124,58,237,0.12), rgba(124,58,237,0.04));
  }
  .node.sorted{
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    color:var(--muted);
    transform: translateY(0) scale(.98);
    box-shadow: none;
    opacity:0.78;
    border: 1px dashed rgba(255,255,255,0.03);
  }

  svg.links{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:visible;
  }
  .link{
    fill:none;
    stroke: rgba(255,255,255,0.06);
    stroke-width:2.2;
    filter: drop-shadow(0 6px 22px rgba(34,211,238,0.04));
    transition: stroke 260ms linear, stroke-width 260ms linear;
  }
  .link.active{
    stroke: linear-gradient(#6ee7b7,#7cc0ff);
    stroke: rgba(124,58,237,0.85);
    stroke-width:2.8;
    stroke: rgba(110,231,183,0.86);
    stroke-linecap:round;
  }
  .link.pulse{
    stroke: #7cc0ff;
    stroke-width:3.4;
    filter: drop-shadow(0 8px 26px rgba(124,58,237,0.08));
  }

  .legend{
    display:flex;
    gap:12px;
    margin-top:14px;
    align-items:center;
    color:var(--muted);
    font-size:13px;
  }

  .badge{
    display:inline-flex;
    gap:8px;
    align-items:center;
    color:var(--muted);
    font-weight:700;
    font-size:12px;
    background: var(--glass-2);
    padding:8px 10px;
    border-radius:10px;
    border: 1px solid rgba(255,255,255,0.02);
  }
  .dot{
    width:10px;
    height:10px;
    border-radius:10px;
    background: linear-gradient(180deg,var(--accent), #4bd2a7);
    box-shadow: 0 6px 16px rgba(110,231,183,0.12);
    flex-shrink:0;
  }

  .micro{
    font-size:12px;
    color:var(--muted);
    margin-left:8px;
  }

  /* small responsive tweaks */
  @media (max-width:700px){
    .node{width:52px;height:52px}
    .logo{width:56px;height:56px}
    .header{gap:12px}
    .card{padding:16px}
    .arena{padding:12px}
  }

</style>
</head>
<body>
  <div class="card" role="main" aria-label="Heap Sort visualization">
    <div class="header">
      <div class="logo" aria-hidden="true">
        <!-- Decorative logo -->
        <svg width="44" height="44" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g1" x1="0" x2="1">
              <stop offset="0" stop-color="#7cc0ff"/>
              <stop offset="1" stop-color="#6ee7b7"/>
            </linearGradient>
          </defs>
          <rect x="6" y="6" width="52" height="52" rx="12" fill="url(#g1)" opacity="0.12"/>
          <g transform="translate(8,8)">
            <path d="M12 20 L20 8 L28 20 Z" fill="#7cc0ff" opacity="0.92"/>
            <rect x="10" y="24" width="20" height="6" rx="3" fill="#6ee7b7" opacity="0.92"/>
          </g>
        </svg>
      </div>
      <div style="min-width:0">
        <h1>Heap Sort</h1>
        <p class="subtitle">A refined, animated demonstration of the heap sort algorithm — watch the heap build, sift and sort in elegant motion.</p>
      </div>

      <div class="controls" aria-hidden="false">
        <button id="shuffle" class="btn ghost" title="Shuffle values">Shuffle</button>
        <button id="start" class="btn primary" title="Start the heap sort animation">Start</button>
      </div>
    </div>

    <div class="arena">
      <div class="stage" id="stage">
        <svg class="links" id="links" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="row">
          <div class="items" id="items" aria-hidden="true"></div>
        </div>
      </div>

      <div style="position:absolute; left:28px; bottom:18px; right:28px; display:flex; justify-content:space-between; align-items:center;">
        <div class="legend">
          <div class="badge"><span class="dot" style="background:linear-gradient(180deg,#7cc0ff,#6ee7b7)"></span> Heap node</div>
          <div class="badge"><span class="dot" style="background:linear-gradient(180deg,#7c58ed,#7cc0ff)"></span> Active comparison</div>
          <div class="micro">Observe the sequence — limited controls: shuffle or start</div>
        </div>
        <div style="color:var(--muted); font-size:13px; font-weight:700">Array size: <span id="sizeLabel">12</span></div>
      </div>
    </div>
  </div>

<script>
(() => {
  const config = {
    size: 12,
    minVal: 12,
    maxVal: 98,
    itemW: 62,
    gap: 16,
    leftPadding: 14,
    transition: 620, // ms
    ease: 'cubic-bezier(.21,.9,.32,1)'
  };

  let data = [];
  const itemsEl = document.getElementById('items');
  const linksSvg = document.getElementById('links');
  const startBtn = document.getElementById('start');
  const shuffleBtn = document.getElementById('shuffle');
  const sizeLabel = document.getElementById('sizeLabel');
  const stage = document.getElementById('stage');

  sizeLabel.textContent = config.size;

  // Initialize
  function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
  function createArray(n){
    const arr = [];
    for(let i=0;i<n;i++){
      arr.push(randInt(config.minVal, config.maxVal));
    }
    return arr;
  }

  function clearElems(){
    itemsEl.innerHTML = '';
    linksSvg.innerHTML = '';
  }

  function setupElements(){
    clearElems();
    const n = data.length;
    // compute row width to center items
    const totalW = n * config.itemW + Math.max(0, n-1) * config.gap;
    const containerW = Math.max(stage.clientWidth - 40, totalW);
    const startX = (stage.clientWidth - totalW)/2;

    for(let i=0;i<n;i++){
      const el = document.createElement('div');
      el.className = 'node';
      el.setAttribute('data-index', i);
      el.style.left = `${startX + i*(config.itemW + config.gap)}px`;
      el.style.width = config.itemW + 'px';
      el.style.height = config.itemW + 'px';
      el.style.transitionTimingFunction = config.ease;
      el.style.transitionDuration = config.transition + 'ms';

      el.innerHTML = `<span class="value">${data[i]}</span><span class="idx">${i}</span>`;
      itemsEl.appendChild(el);
    }
    drawLinks(n);
  }

  // draw arcs from parent to children to represent heap edges
  function drawLinks(heapSize){
    linksSvg.innerHTML = '';
    const n = data.length;
    for(let i=0;i<heapSize;i++){
      const left = 2*i+1;
      const right = 2*i+2;
      if(left < heapSize) linksSvg.appendChild(linkPath(i,left));
      if(right < heapSize) linksSvg.appendChild(linkPath(i,right));
    }
  }

  function linkPath(p,c){
    const path = document.createElementNS("http://www.w3.org/2000/svg",'path');
    path.classList.add('link');
    path.setAttribute('data-from', p);
    path.setAttribute('data-to', c);
    path.setAttribute('d', computePathD(p,c));
    return path;
  }

  function computePathD(p,c){
    const a = getCenter(p);
    const b = getCenter(c);
    const mx = (a.x + b.x)/2;
    const my = Math.min(a.y, b.y) - 62 - Math.abs(a.x - b.x)*0.08;
    // Quadratic bezier
    return `M ${a.x} ${a.y} Q ${mx} ${my} ${b.x} ${b.y}`;
  }

  function getCenter(index){
    const el = itemsEl.querySelector(`.node[data-index="${index}"]`);
    if(!el) return {x:0,y:0};
    const rect = el.getBoundingClientRect();
    const svgRect = linksSvg.getBoundingClientRect();
    const x = rect.left + rect.width/2 - svgRect.left;
    const y = rect.top + rect.height/2 - svgRect.top;
    return {x,y};
  }

  // Update all paths positions (useful during transitions)
  function refreshLinks(){
    const paths = linksSvg.querySelectorAll('path.link');
    paths.forEach(p => {
      const from = parseInt(p.getAttribute('data-from'));
      const to = parseInt(p.getAttribute('data-to'));
      p.setAttribute('d', computePathD(from,to));
    });
  }

  // Helpers to highlight nodes and links
  function setNodeClass(idx, cls, add=true){
    const el = itemsEl.querySelector(`.node[data-index="${idx}"]`);
    if(!el) return;
    if(add) el.classList.add(cls); else el.classList.remove(cls);
  }
  function setLinkClass(from,to,cls, add=true){
    const p = linksSvg.querySelector(`path[data-from="${from}"][data-to="${to}"]`);
    if(!p) return;
    if(add) p.classList.add(cls); else p.classList.remove(cls);
  }

  // swap elements visually and in data array
  function swapNodes(i,j){
    return new Promise(resolve => {
      if(i===j){ resolve(); return; }
      const a = itemsEl.querySelector(`.node[data-index="${i}"]`);
      const b = itemsEl.querySelector(`.node[data-index="${j}"]`);
      if(!a||!b){ resolve(); return; }
      // swap left
      const leftA = a.style.left;
      const leftB = b.style.left;
      // mark swapping style
      a.classList.add('compare'); b.classList.add('compare');
      let transCount = 0;
      function onEnd(e){
        if(e.propertyName !== 'left') return;
        transCount++;
        if(transCount>=2){
          a.removeEventListener('transitionend', onEnd);
          b.removeEventListener('transitionend', onEnd);
          // swap data-index attributes and inner idx labels
          const ai = a.getAttribute('data-index'), bi = b.getAttribute('data-index');
          a.setAttribute('data-index', bi);
          b.setAttribute('data-index', ai);
          a.querySelector('.idx').textContent = b.getAttribute('data-index');
          b.querySelector('.idx').textContent = a.getAttribute('data-index');
          // replace highlight classes
          a.classList.remove('compare');
          b.classList.remove('compare');
          // refresh link positions
          refreshLinks();
          resolve();
        }
      }
      a.addEventListener('transitionend', onEnd);
      b.addEventListener('transitionend', onEnd);
      // trigger swap of left positions
      a.style.left = leftB;
      b.style.left = leftA;
      // swap DOM order for visual clarity (not necessary but keeps structure)
      // update data array
      const tmp = data[i]; data[i] = data[j]; data[j] = tmp;
      // After small guard time, ensure resolution if transitionend missed
      setTimeout(()=>{ if(transCount<2){ a.removeEventListener('transitionend', onEnd); b.removeEventListener('transitionend', onEnd); refreshLinks(); resolve(); } }, config.transition + 80);
    });
  }

  // Update numeric values displayed on nodes to match data array order
  function refreshValues(){
    const nodes = Array.from(itemsEl.querySelectorAll('.node'));
    nodes.forEach(n=>{
      const idx = parseInt(n.getAttribute('data-index'));
      n.querySelector('.value').textContent = data[idx];
      n.querySelector('.idx').textContent = idx;
    });
  }

  // Utility to pulse link and nodes for comparison
  function pulseComparison(i, j){
    setNodeClass(i,'highlight',true);
    setNodeClass(j,'compare',true);
    setLinkClass(i,j,'active', true);
    return new Promise(res=>{
      setTimeout(()=>{ setNodeClass(i,'highlight',false); setNodeClass(j,'compare',false); setLinkClass(i,j,'active',false); res(); }, 420);
    });
  }

  // SiftDown algorithm with animation
  async function siftDown(start, heapSize){
    let root = start;
    while(true){
      const childLeft = 2*root + 1;
      if(childLeft >= heapSize) break;
      let swapIdx = root;
      // compare root and left
      await pulseComparison(swapIdx, childLeft);
      if(data[swapIdx] < data[childLeft]) swapIdx = childLeft;
      const childRight = childLeft + 1;
      if(childRight < heapSize){
        await pulseComparison(swapIdx, childRight);
        if(data[swapIdx] < data[childRight]) swapIdx = childRight;
      }
      if(swapIdx !== root){
        // animate swap between root and swapIdx
        await animateSwapAndReindex(root, swapIdx);
        root = swapIdx;
      } else {
        break;
      }
    }
  }

  // Animate swap and ensure DOM indexes match data indexes
  async function animateSwapAndReindex(i,j){
    // find nodes by their current data-index (not by DOM order)
    // For swapNodes, it expects indices in the data array (positions). We'll use them directly.
    // Add emphasis
    const a = itemsEl.querySelector(`.node[data-index="${i}"]`);
    const b = itemsEl.querySelector(`.node[data-index="${j}"]`);
    if(a) a.classList.add('compare');
    if(b) b.classList.add('compare');

    // Begin a raf loop to update links while transition occurs
    let active = true;
    const raf = () => {
      if(!active) return;
      refreshLinks();
      requestAnimationFrame(raf);
    };
    requestAnimationFrame(raf);

    await swapNodes(i,j);

    active = false;
    refreshValues(); // update displayed values to reflect new mapping
    // mark swapped briefly
    const nodeA = itemsEl.querySelector(`.node[data-index="${j}"]`);
    const nodeB = itemsEl.querySelector(`.node[data-index="${i}"]`);
    if(nodeA) nodeA.classList.add('highlight');
    if(nodeB) nodeB.classList.add('highlight');
    setTimeout(()=>{
      if(nodeA) nodeA.classList.remove('highlight');
      if(nodeB) nodeB.classList.remove('highlight');
    }, 420);
  }

  // Build heap (max-heap)
  async function buildHeap(){
    const n = data.length;
    for(let i = Math.floor(n/2)-1; i>=0; i--){
      // highlight starting node
      setNodeClass(i,'highlight',true);
      await sleep(160);
      await siftDown(i, n);
      setNodeClass(i,'highlight',false);
      await sleep(120);
    }
  }

  // Sorting phase
  async function heapSortAnimate(){
    const n = data.length;
    await buildHeap();
    for(let end = n-1; end>0; end--){
      // swap root with end
      // highlight
      setNodeClass(0,'highlight',true);
      setNodeClass(end,'compare',true);
      await sleep(160);
      // animate swap positions in UI and data
      await animateSwapAndReindex(0, end);
      // mark end as sorted
      const node = itemsEl.querySelector(`.node[data-index="${0}"]`); // after swap, the node at index 0 is the original end
      const sortedNode = itemsEl.querySelector(`.node[data-index="${end}"]`);
      // The sorted element is the node with data-index == end (value moved there)
      if(sortedNode) sortedNode.classList.add('sorted');
      // remove highlights
      setNodeClass(0,'highlight',false);
      setNodeClass(end,'compare',false);
      // rebuild links with reduced heap size
      drawLinks(end);
      await siftDown(0, end);
      await sleep(120);
    }
    // finally mark first element sorted
    const remaining = itemsEl.querySelectorAll('.node');
    remaining.forEach(n=> n.classList.add('sorted'));
  }

  function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

  // Shuffle and reset
  function resetData(newData){
    data = newData.slice();
    setupElements();
    refreshValues();
  }

  // Entry: Shuffle
  function shuffleAction(){
    // generate array with more aesthetic spread by mixing two ranges
    const arr = createArray(config.size);
    // ensure variety by shuffling a bit
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    resetData(arr);
  }

  // Start animation
  let busy = false;
  async function startAction(){
    if(busy) return;
    busy = true;
    startBtn.disabled = true;
    shuffleBtn.disabled = true;
    startBtn.textContent = 'Running...';
    // ensure previous visuals clean
    const nodes = itemsEl.querySelectorAll('.node');
    nodes.forEach(n=>{ n.classList.remove('sorted','highlight','compare'); });
    await heapSortAnimate();
    // done
    startBtn.textContent = 'Start';
    startBtn.disabled = false;
    shuffleBtn.disabled = false;
    busy = false;
  }

  // Responsive adjustments
  window.addEventListener('resize', () => {
    // reposition nodes to be centered
    const nodes = Array.from(itemsEl.querySelectorAll('.node'));
    const n = nodes.length;
    const totalW = n * config.itemW + Math.max(0, n-1) * config.gap;
    const startX = (stage.clientWidth - totalW)/2;
    nodes.forEach((el, i) => {
      el.style.left = `${startX + i*(config.itemW + config.gap)}px`;
      el.style.transitionDuration = config.transition + 'ms';
    });
    // redraw links after resize
    setTimeout(refreshLinks, 80);
  });

  // initialize default data
  data = createArray(config.size);
  resetData(data);

  // Buttons
  startBtn.addEventListener('click', startAction);
  shuffleBtn.addEventListener('click', () => {
    if(busy) return;
    shuffleAction();
  });

  // small initial motion for delight
  (function introPulse(){
    const nodes = Array.from(itemsEl.querySelectorAll('.node'));
    nodes.forEach((n,i)=>{
      n.style.transform = 'translateY(6px) scale(0.98)';
      setTimeout(()=> n.style.transform = '', 220 + i*18);
    });
    setTimeout(()=> refreshLinks(), 420);
  })();

  // keyboard frills: pressing space starts (but keeping interactivity limited)
  window.addEventListener('keydown', (e)=>{
    if(e.code === 'Space'){ e.preventDefault(); startAction(); }
  });

})();
</script>
</body>
