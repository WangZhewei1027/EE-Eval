<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interpolation Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .footer {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
            clear: both;
        }
        
        .footer p {
            margin-bottom: 20px;
        }
        
        .search-bar {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }
        
        .search-bar input {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            border: none;
            border-radius: 5px 0 0 5px;
            background-color: #f0f0f0;
        }
        
        .search-results {
            padding: 20px;
            font-size: 16px;
            font-family: Arial, sans-serif;
        }
        
        .search-results p {
            margin-bottom: 10px;
        }
        
        .search-results button {
            width: 100%;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        
        .search-results button:hover {
            background-color: #3e8e41;
        }
        
        .search-results button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Interpolation Search</h1>
        </div>
        <div class="search-bar">
            <input type="search" id="search-input" placeholder="Search...">
            <button id="search-button">Search</button>
        </div>
        <div class="search-results">
            <p id="search-results"></p>
        </div>
    </div>
    <script>
        let results = [];
        
        function interpolationSearch(arr, x) {
            let lo = 0, hi = arr.length - 1;
            
            while (lo <= hi && x >= arr[lo] && x <= arr[hi]) {
                let i = lo + ((x - arr[lo]) * (hi - lo)) / (arr[hi] - arr[lo]);
                if (arr[i] === x) return i;
                if (arr[i] < x) lo = i + 1;
                else hi = i - 1;
            }
            return -1;
        }
        
        function search(arr, x) {
            let result = interpolationSearch(arr, x);
            if (result !== -1) {
                document.getElementById("search-results").innerHTML = "Result: " + arr[result] + " (Index: " + result + ")";
            } else {
                document.getElementById("search-results").innerHTML = "No result found.";
            }
        }
        
        document.getElementById("search-button").addEventListener("click", function() {
            let input = document.getElementById("search-input").value;
            search([1, 2, 3, 4, 5], input);
        });
    </script>
</body>
</html>
