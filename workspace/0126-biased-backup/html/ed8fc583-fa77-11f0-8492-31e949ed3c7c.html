<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compiler Visual Showcase</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #282c36;
            color: #f8f8f2;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }
        h1 {
            font-size: 3.5em;
            margin-bottom: 0.2em;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2), 0 0 30px rgba(255, 255, 255, 0.2);
            transition: transform 0.3s;
        }
        h1:hover {
            transform: scale(1.05);
        }
        p {
            font-size: 1.5em;
            margin: 0 20px;
            animation: fadeInUp 1s forwards;
            opacity: 0;
            animation-delay: 0.5s;
        }
        .button {
            background-color: #5e60ce;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            padding: 15px 30px;
            font-size: 1.25em;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s, transform 0.3s;
            animation: fadeInUp 1s forwards;
            opacity: 0;
            animation-delay: 1s;
        }
        .button:hover {
            background-color: #7a8bfc;
            transform: scale(1.05);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .graphics {
            margin-top: 50px;
            position: relative;
            width: 200px;
            height: 200px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        .graphic-shape {
            position: absolute;
            width: 100%;
            height: 100%;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            background: linear-gradient(135deg, #4cc9f0, #7209b7);
            filter: blur(10px);
            animation: rotate 8s linear infinite;
        }
        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Compiler Showcase</h1>
    <p>Experience the beauty of compilers through stunning visuals and elegant design.</p>
    <button class="button" onclick="showAlert()">Learn More</button>
    
    <div class="graphics">
        <div class="graphic-shape"></div>
    </div>
</div>

<script>
    function showAlert() {
        alert("Thank you for your interest in compilers!");
    }
</script>

</body>
</html>
