<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Software Development Life Cycle Interactive Demo</title>
<style>
  body {
    font-family: monospace, monospace;
    background: white;
    color: black;
    margin: 1em;
  }
  textarea, input, select, button {
    font-family: monospace, monospace;
    font-size: 1em;
  }
  textarea {
    width: 100%;
    height: 6em;
  }
  fieldset {
    margin-bottom: 1em;
  }
  label {
    display: inline-block;
    min-width: 150px;
    margin-right: 0.5em;
  }
  button {
    margin: 0.2em 0.5em 0.2em 0;
  }
  .step {
    border: 1px solid black;
    padding: 0.5em;
    margin-bottom: 1em;
  }
  .step h2 {
    margin: 0 0 0.3em 0;
  }
  #log {
    width: 100%;
    height: 8em;
  }
</style>
</head>
<body>
<h1>Software Development Life Cycle (SDLC) Interactive Demo</h1>

<div>
  <fieldset>
    <legend>Select SDLC Model</legend>
    <label><input type="radio" name="model" value="Waterfall" checked /> Waterfall</label>
    <label><input type="radio" name="model" value="Iterative" /> Iterative</label>
    <label><input type="radio" name="model" value="Spiral" /> Spiral</label>
    <label><input type="radio" name="model" value="Agile" /> Agile</label>
  </fieldset>
</div>

<div id="control-panel">
  <fieldset>
    <legend>Current Step: <span id="current-step-name"></span></legend>
    <div id="step-description" style="white-space: pre-wrap; margin-bottom:0.5em;"></div>

    <div id="step-controls"></div>

    <div id="step-output" style="white-space: pre-wrap; border:1px solid black; padding:0.5em; min-height:3em;"></div>
  </fieldset>
</div>

<div>
  <fieldset>
    <legend>Project Overview & Logs</legend>
    <textarea id="project-state" readonly></textarea>
    <br/>
    <button id="download-log">Download Log</button>
    <button id="reset-project">Reset Project</button>
  </fieldset>
</div>

<script>
(function() {
  // Define SDLC steps for different models with descriptions and mechanics
  // We'll implement Waterfall fully, others with variations for complexity

  // Utility functions
  function clone(obj) {
    return JSON.parse(JSON.stringify(obj));
  }

  // Common states used across steps
  const initialProjectState = {
    model: "Waterfall",
    stepIndex: 0,
    steps: [],
    artifacts: {},
    logs: [],
    history: [],
    variables: {}, // generic place to store step-specific variables
    agileSprints: [],
    iterativeCycle: 1,
    spiralCycle: 1,
  };

  // All step definitions for Waterfall Model (classic linear approach)
  const WaterfallSteps = [
    {
      id: "Requirement Analysis",
      description: "Gather and analyze the software requirements with stakeholders.",
      inputs: [
        {type: "textarea", label: "Enter Requirements (comma or line separated)", key:"requirements", placeholder:"e.g. User login, Data storage, Reporting"},
      ],
      outputs: ["requirements"],
      validate: function(state) {
        if(!state.artifacts.requirements || state.artifacts.requirements.length === 0) {
          return "Please enter at least one requirement.";
        }
        return null;
      },
      process: function(state, inputs) {
        // Parse requirements as array trimming whitespace
        const reqsRaw = inputs.requirements || "";
        const reqs = reqsRaw.split(/\n|,/).map(r => r.trim()).filter(r=>r.length > 0);
        state.artifacts.requirements = reqs;
        return "Requirements saved: " + reqs.join(", ");
      }
    },
    {
      id: "System Design",
      description: "Design the system architecture and components based on requirements.",
      inputs: [
        {type: "textarea", label: "Write Design Notes", key:"designNotes", placeholder:"Describe system architecture, components, data flow..."},
        {type: "select-multi", label: "Select Components to Design", key:"componentsSelected", options:["Database", "Backend API", "Frontend UI", "Authentication", "Reporting Module", "Deployment"]},
      ],
      outputs: ["designNotes", "designedComponents"],
      validate: function(state) {
        if(!state.variables.designNotes || state.variables.designNotes.trim().length < 10) {
          return "Design Notes must be at least 10 characters.";
        }
        if(!state.variables.componentsSelected || state.variables.componentsSelected.length === 0) {
          return "Select at least one component.";
        }
        return null;
      },
      process: function(state, inputs) {
        state.variables.designNotes = inputs.designNotes.trim();
        state.variables.componentsSelected = inputs.componentsSelected || [];
        state.artifacts.design = {
          notes: state.variables.designNotes,
          components: state.variables.componentsSelected
        };
        return "Design saved for components: " + (state.variables.componentsSelected.join(", ") || "None");
      }
    },
    {
      id: "Implementation",
      description: "Develop the software by writing code for the designed components.",
      inputs: [
        {type: "slider", label: "Progress for each component (%)", key:"progressPercent", min:0, max:100, step:5, default:0, multipleSelect:"components"},
        {type: "select-multi", label: "Select Components to Code", key:"componentsToCode", optionsGetter: function(state) {
          return state.artifacts.design ? state.artifacts.design.components : [];
        }},
        {type: "textarea", label: "Enter bug reports while coding (line separated)", key:"bugsReported", placeholder:"Bug 1\nBug 2"},
      ],
      outputs: ["implementationProgress", "bugs"],
      validate: function(state) {
        if(!state.variables.componentsToCode || state.variables.componentsToCode.length === 0) return "Select at least one component to code.";
        return null;
      },
      process: function(state, inputs) {
        if(!state.artifacts.implementation) state.artifacts.implementation = {};
        const components = inputs.componentsToCode;
        if(!state.variables.implementationProgress) state.variables.implementationProgress={};
        components.forEach(c=>{
          let v = inputs.progressPercent[c];
          v = v !== undefined ? Number(v) : 0;
          // Store the progress if increased
          if(!state.variables.implementationProgress[c] || v > state.variables.implementationProgress[c]) {
            state.variables.implementationProgress[c] = v;
          }
        });
        state.artifacts.implementation.progress = state.variables.implementationProgress;
        // Bugs
        let bugsRaw = inputs.bugsReported || "";
        let bugsList = bugsRaw.split("\n").map(b=>b.trim()).filter(b=>b.length>0);
        if(!state.artifacts.implementation.bugs) state.artifacts.implementation.bugs = [];
        state.artifacts.implementation.bugs = state.artifacts.implementation.bugs.concat(bugsList);
        return "Implementation progress updated. Bugs logged: "+bugsList.length;
      }
    },
    {
      id: "Testing",
      description: "Test the implementation thoroughly to find issues.",
      inputs: [
        {type: "select-multi", label: "Select Components to Test", key:"componentsToTest", optionsGetter: function(state) {
          return state.artifacts.design ? state.artifacts.design.components : [];
        }},
        {type: "slider", label: "Test Coverage (%)", key:"testCoverage", min:0, max:100, step:5, default:0},
        {type: "textarea", label: "Write Test Results & Issues (line separated)", key:"testIssues", placeholder:"Issue 1\nIssue 2"},
      ],
      outputs: ["testCoverage", "testIssuesReported"],
      validate: function(state) {
        if(!state.variables.componentsToTest || state.variables.componentsToTest.length === 0) return "Select at least one component for testing.";
        return null;
      },
      process: function(state, inputs) {
        if(!state.artifacts.testing) state.artifacts.testing = {};
        state.artifacts.testing.componentsTested = inputs.componentsToTest;
        state.artifacts.testing.coverage = Number(inputs.testCoverage);
        let issuesRaw = inputs.testIssues || "";
        let issuesList = issuesRaw.split("\n").map(i=>i.trim()).filter(i=>i.length>0);
        state.artifacts.testing.issues = issuesList;
        return "Test coverage set to "+inputs.testCoverage+"%. Issues found: "+issuesList.length;
      }
    },
    {
      id: "Deployment",
      description: "Release the software for use by end users.",
      inputs: [
        {type: "checkbox", label: "Perform Deployment Smoke Test?", key:"smokeTest"},
        {type: "textarea", label: "Deployment Notes", key:"deployNotes", placeholder:"Describe deployment environment and procedures"},
        {type: "select", label: "Deployment Environment", key:"deployEnv", options:["Development","Staging","Production"]},
      ],
      outputs: ["deployNotes", "deployEnv", "smokeTestResult"],
      validate: function(state) {
        if(!state.variables.deployNotes || state.variables.deployNotes.trim().length < 5) {
          return "Deployment Notes must be at least 5 characters long.";
        }
        if(!state.variables.deployEnv) {
          return "Select deployment environment.";
        }
        return null;
      },
      process: function(state, inputs) {
        state.variables.deployNotes = inputs.deployNotes.trim();
        state.variables.deployEnv = inputs.deployEnv;
        state.artifacts.deployment = {
          notes: state.variables.deployNotes,
          environment: state.variables.deployEnv,
          smokeTestPerformed: !!inputs.smokeTest,
          smokeTestPassed: inputs.smokeTest ? confirm("Simulate Smoke Test: Did it PASS? (OK = Pass, Cancel = Fail)") : null,
        };
        return "Deployment recorded. Smoke test performed: " + (inputs.smokeTest ? (state.artifacts.deployment.smokeTestPassed ? "PASS" : "FAIL") : "No");
      }
    },
    {
      id: "Maintenance",
      description: "Maintain and update the software to fix issues or add features.",
      inputs: [
        {type: "textarea", label: "Enter Maintenance Tasks (comma or line separated)", key:"maintenanceTasks", placeholder:"Bug fixes\nPerformance improvement\nAdd reports"},
        {type: "select-multi", label: "Select Priority Levels", key:"maintenancePriorities", options:["High","Medium","Low"]},
        {type: "checkbox", label: "Perform Regression Testing after Maintenance?", key:"regressionTest"},
      ],
      outputs: ["maintenanceTasks", "maintenancePriorities", "regressionTestPerformed"],
      validate: function(state) {
        if(!state.variables.maintenanceTasks || state.variables.maintenanceTasks.length === 0) return "Please enter at least one maintenance task.";
        if(!state.variables.maintenancePriorities || state.variables.maintenancePriorities.length === 0) return "Select at least one priority level.";
        return null;
      },
      process: function(state, inputs) {
        const tasksRaw = inputs.maintenanceTasks || "";
        const tasks = tasksRaw.split(/\n|,/).map(t => t.trim()).filter(t=>t.length > 0);
        state.variables.maintenanceTasks = tasks;
        state.variables.maintenancePriorities = inputs.maintenancePriorities || [];
        state.variables.regressionTestPerformed = !!inputs.regressionTest;
        state.artifacts.maintenance = {
          tasks: tasks,
          priorities: state.variables.maintenancePriorities,
          regressionTested: state.variables.regressionTestPerformed
        };
        return "Maintenance tasks recorded: "+tasks.length+". Regression test: "+(state.variables.regressionTestPerformed ? "Yes" : "No");
      }
    },
  ];

  
  // Iterative Model uses core WaterfallSteps but inside cycles with possible repeats
  // Spiral Model adds risk analysis detail & iterations
  // Agile Model uses sprints with backlog management

  // We'll define basic steps for models to show user-driven path exploration
  
  // For Iterative Model: Repeat Analysis -> Design -> Implementation -> Testing cycles before deployment

  // For Spiral Model: multiple cycles, each with Planning, Risk Analysis, Engineering, Evaluation

  // For Agile Model: backlog creation, sprint planning, daily scrum simulation, sprint review

  // We'll implement key steps with branching logic for interactivity

  // Define models and their step workflows

  // Build universal controls
  function createInputControl(inputDef, state) {
    const container = document.createElement("div");

    const label = document.createElement("label");
    label.textContent = inputDef.label + ": ";
    label.htmlFor = "input-" + inputDef.key;
    container.appendChild(label);

    let input;
    switch(inputDef.type) {
      case "textarea":
        input = document.createElement("textarea");
        input.id = "input-" + inputDef.key;
        input.placeholder = inputDef.placeholder || "";
        input.rows = 4;
        if(state.variables[inputDef.key] !== undefined) {
          input.value = state.variables[inputDef.key];
        }
        container.appendChild(input);
        break;
      case "select":
        input = document.createElement("select");
        input.id = "input-" + inputDef.key;
        (inputDef.options||[]).forEach(opt=>{
          const option = document.createElement("option");
          option.value = opt;
          option.textContent = opt;
          input.appendChild(option);
        });
        if(state.variables[inputDef.key] !== undefined) {
          input.value = state.variables[inputDef.key];
        }
        container.appendChild(input);
        break;
      case "select-multi":
        input = document.createElement("select");
        input.id = "input-" + inputDef.key;
        input.multiple = true;
        let opts = inputDef.options;
        if(!opts && typeof inputDef.optionsGetter === "function") {
          opts = inputDef.optionsGetter(state) || [];
        }
        (opts||[]).forEach(opt=>{
          const option = document.createElement("option");
          option.value = opt;
          option.textContent = opt;
          input.appendChild(option);
        });
        if(state.variables[inputDef.key] !== undefined) {
          const saved = state.variables[inputDef.key];
          for(let i=0;i<input.options.length;i++) {
            input.options[i].selected = saved.indexOf(input.options[i].value) !== -1;
          }
        }
        container.appendChild(input);
        break;
      case "slider":
        if(inputDef.multipleSelect === "components") {
          // For sliders per component
          const comps = inputDef.optionsGetter ? inputDef.optionsGetter(state) : [];
          if(!state.variables[inputDef.key]) state.variables[inputDef.key] = {};
          comps.forEach(c=>{
            const labelItem = document.createElement("label");
            labelItem.textContent = c + ": ";
            labelItem.htmlFor = `input-slider-${inputDef.key}-${c}`;
            container.appendChild(labelItem);

            const slider = document.createElement("input");
            slider.type = "range";
            slider.min = inputDef.min !== undefined ? inputDef.min : 0;
            slider.max = inputDef.max !== undefined ? inputDef.max : 100;
            slider.step = inputDef.step !== undefined ? inputDef.step : 1;
            slider.value = state.variables[inputDef.key][c] !== undefined ? state.variables[inputDef.key][c] : (inputDef.default !== undefined ? inputDef.default : 0);
            slider.id = `input-slider-${inputDef.key}-${c}`;
            slider.dataset.component = c;
            slider.style.width = "150px";
            // Show value next to slider
            const valSpan = document.createElement("span");
            valSpan.textContent = slider.value + "%";

            slider.oninput = function() {
              valSpan.textContent = slider.value + "%";
              state.variables[inputDef.key][c] = Number(slider.value);
            };
            container.appendChild(slider);
            container.appendChild(valSpan);
            container.appendChild(document.createElement("br"));
          });
        } else {
          input = document.createElement("input");
          input.type = "range";
          input.id = "input-" + inputDef.key;
          input.min = inputDef.min !== undefined ? inputDef.min : 0;
          input.max = inputDef.max !== undefined ? inputDef.max : 100;
          input.step = inputDef.step !== undefined ? inputDef.step : 1;
          input.value = state.variables[inputDef.key] !== undefined ? state.variables[inputDef.key] : (inputDef.default !== undefined ? inputDef.default : 0);
          const spanVal = document.createElement("span");
          spanVal.textContent = input.value + "%";
          input.oninput = function() {
            spanVal.textContent = input.value + "%";
            state.variables[inputDef.key] = Number(input.value);
          };
          container.appendChild(input);
          container.appendChild(spanVal);
        }
        break;
      case "checkbox":
        input = document.createElement("input");
        input.type = "checkbox";
        input.id = "input-" + inputDef.key;
        input.checked = !!state.variables[inputDef.key];
        input.onchange = function() {
          state.variables[inputDef.key] = input.checked;
        };
        container.appendChild(input);
        break;
      default:
        input = document.createElement("input");
        input.type = "text";
        input.id = "input-" + inputDef.key;
        input.value = state.variables[inputDef.key] || "";
        container.appendChild(input);
    }

    if(input && input.onchange === undefined) {
      input.onchange = function() {
        if(inputDef.type === "select-multi") {
          const selected = [];
          for(let i=0;i<input.options.length;i++) {
            if(input.options[i].selected) selected.push(input.options[i].value);
          }
          state.variables[inputDef.key] = selected;
        } else if(inputDef.type === "select") {
          state.variables[inputDef.key] = input.value;
        } else if(inputDef.type === "textarea") {
          state.variables[inputDef.key] = input.value;
        } else if(inputDef.type === "text") {
          state.variables[inputDef.key] = input.value;
        }
      };
    }

    return container;
  }

  // SDLC Models definition
  const SDLCModels = {
    "Waterfall": {
      name: "Waterfall Model",
      description: "A linear and sequential approach to software development.",
      steps: WaterfallSteps,
      getStepCount: function(state) { return this.steps.length; },
    },
    "Iterative": {
      name: "Iterative Model",
      description: "Repeating cycles of development with gradual refinement.",
      steps: [
        {
          id: "Iteration Initialization",
          description: "Decide iteration number and scope.",
          inputs: [
            {type: "number", label: "Current Iteration Number", key:"iterNumber", min:1, default:1},
            {type: "textarea", label: "Iteration Scope / Goals", key:"iterScope", placeholder:"Define goals for this iteration"},
          ],
          outputs: ["iterNumber","iterScope"],
          validate: function(state) {
            if(!state.variables.iterNumber || state.variables.iterNumber < 1) {
              return "Iteration number must be 1 or greater.";
            }
            if(!state.variables.iterScope || state.variables.iterScope.trim().length < 5) {
              return "Iteration scope must be descriptive (min 5 chars).";
            }
            return null;
          },
          process: function(state, inputs) {
            state.iterativeCycle = Number(inputs.iterNumber);
            state.variables.iterScope = inputs.iterScope.trim();
            return "Iteration "+state.iterativeCycle+" started with goals: "+state.variables.iterScope;
          }
        },
        {
          id: "Requirement Analysis",
          description: "Gather and analyze requirements for this iteration.",
          inputs: [
            {type: "textarea", label: "Enter Requirements (comma or line separated)", key:"requirementsIter", placeholder:"Feature A\nFeature B"},
          ],
          outputs: ["requirementsIter"],
          validate: function(state) {
            if(!state.artifacts.requirementsIter || state.artifacts.requirementsIter.length === 0) {
              return "Please enter at least one requirement for this iteration.";
            }
            return null;
          },
          process: function(state, inputs) {
            const reqsRaw = inputs.requirementsIter || "";
            const reqs = reqsRaw.split(/\n|,/).map(r => r.trim()).filter(r=>r.length > 0);
            state.artifacts.requirementsIter = reqs;
            return "Iteration requirements saved: " + reqs.join(", ");
          }
        },
        {
          id: "System Design",
          description: "Design system components for iteration.",
          inputs: [
            {type: "textarea", label: "Write Design Notes", key:"designNotesIter", placeholder:"Design architecture for iteration."},
            {type: "select-multi", label: "Select Components to Design", key:"componentsSelectedIter", options:["Backend API","Frontend UI","Database","Auth","Reporting"]},
          ],
          outputs: ["designNotesIter", "designedComponentsIter"],
          validate: function(state) {
            if(!state.variables.designNotesIter || state.variables.designNotesIter.trim().length < 10) {
              return "Design notes must be at least 10 characters.";
            }
            if(!state.variables.componentsSelectedIter || state.variables.componentsSelectedIter.length === 0) {
              return "Select at least one component.";
            }
            return null;
          },
          process: function(state, inputs) {
            state.variables.designNotesIter = inputs.designNotesIter.trim();
            state.variables.componentsSelectedIter = inputs.componentsSelectedIter || [];
            state.artifacts.designIter = {
              notes: state.variables.designNotesIter,
              components: state.variables.componentsSelectedIter
            };
            return "Iteration design saved for components: " + (state.variables.componentsSelectedIter.join(", ") || "None");
          }
        },
        {
          id: "Implementation & Testing",
          description: "Implement and test components iteratively.",
          inputs: [
            {type: "slider", label: "Code Progress for each component (%)", key:"progressPercentIter", min:0, max:100, step:5, default:0, multipleSelect:"componentsIter"},
            {type: "select-multi", label: "Select Components to Work On", key:"componentsToCodeIter", optionsGetter: function(state) {
              return state.artifacts.designIter ? state.artifacts.designIter.components : [];
            }},
            {type: "textarea", label: "Bug reports during Implementation", key:"bugsIter", placeholder:"Bug A\nBug B"},
            {type: "slider", label: "Test Coverage (%)", key:"testCoverageIter", min:0, max:100, step:5, default:0},
            {type: "textarea", label: "Test Issues Found", key:"testIssuesIter", placeholder:"Issue 1\nIssue 2"},
          ],
          outputs: ["codeProgressIter", "bugsIter", "testCoverageIter", "testIssuesIter"],
          validate: function(state) {
            if(!state.variables.componentsToCodeIter || state.variables.componentsToCodeIter.length === 0) return "Select at least one component to work on.";
            if(state.variables.testCoverageIter === undefined) return "Set test coverage.";
            return null;
          },
          process: function(state, inputs) {
            if(!state.artifacts.iterativeImplTest) state.artifacts.iterativeImplTest = {};
            const components = inputs.componentsToCodeIter;
            if(!state.variables.progressPercentIter) state.variables.progressPercentIter={};
            components.forEach(c=>{
              let v = inputs.progressPercentIter[c];
              v = v !== undefined ? Number(v) : 0;
              if(!state.variables.progressPercentIter[c] || v > state.variables.progressPercentIter[c]) {
                state.variables.progressPercentIter[c] = v;
              }
            });
            state.artifacts.iterativeImplTest.codeProgress = state.variables.progressPercentIter;
            // Bugs
            let bugsRaw = inputs.bugsIter || "";
            let bugsList = bugsRaw.split("\n").map(b=>b.trim()).filter(b=>b.length>0);
            if(!state.artifacts.iterativeImplTest.bugs) state.artifacts.iterativeImplTest.bugs = [];
            state.artifacts.iterativeImplTest.bugs = state.artifacts.iterativeImplTest.bugs.concat(bugsList);

            // Testing
            state.artifacts.iterativeImplTest.testCoverage = Number(inputs.testCoverageIter);
            let testIssuesRaw = inputs.testIssuesIter || "";
            let testIssuesList = testIssuesRaw.split("\n").map(i=>i.trim()).filter(i=>i.length > 0);
            state.artifacts.iterativeImplTest.testIssues = testIssuesList;

            return "Iterative Implementation & Testing updated. Bugs: "+bugsList.length+". Test issues: "+testIssuesList.length;
          }
        },
        {
          id: "Iteration Review",
          description: "Review the iteration and decide next steps.",
          inputs: [
            {type: "textarea", label: "Review Notes", key:"iterReview", placeholder:"What went well? What didn't?"},
            {type: "checkbox", label: "Plan another iteration?", key:"planNextIter"},
          ],
          outputs: ["iterReview","planNextIter"],
          validate: function(state) {
            if(!state.variables.iterReview || state.variables.iterReview.trim().length < 5) {
              return "Please enter review notes (min 5 characters).";
            }
            return null;
          },
          process: function(state, inputs) {
            state.variables.iterReview = inputs.iterReview.trim();
            state.variables.planNextIter = !!inputs.planNextIter;
            if(state.variables.planNextIter) {
              state.iterativeCycle++;
              state.stepIndex = 0; // Loop back to iteration initialization
              return "Iteration review saved. Another iteration planned: Yes. Advancing to iteration "+state.iterativeCycle+".";
            } else {
              // Advance to deployment step
              state.stepIndex = state.steps.findIndex(s=>s.id==="Deployment");
              return "Iteration review saved. Planning to deploy.";
            }
          }
        },
        WaterfallSteps.find(s=>s.id==="Deployment"),
        WaterfallSteps.find(s=>s.id==="Maintenance")
      ],
      getStepCount: function(state) {
        return this.steps.length;
      }
    },
    "Spiral": {
      name: "Spiral Model",
      description: "Risk-driven model with repeated cycles through four quadrants.",
      steps: [
        {
          id: "Spiral Cycle Initialization",
          description: "Set spiral cycle number and objectives.",
          inputs: [
            {type:"number", label:"Spiral Cycle Number", key:"spiralCycleNum", min:1, default:1},
            {type:"textarea", label:"Cycle Objectives", key:"cycleObjectives"},
          ],
          outputs:["spiralCycleNum","cycleObjectives"],
          validate: function(state) {
            if(!state.variables.spiralCycleNum || state.variables.spiralCycleNum <1) return "Cycle number >=1 required.";
            if(!state.variables.cycleObjectives || state.variables.cycleObjectives.trim().length <5) return "Enter cycle objectives (min 5 chars).";
            return null;
          },
          process: function(state, inputs) {
            state.spiralCycle = Number(inputs.spiralCycleNum);
            state.variables.cycleObjectives = inputs.cycleObjectives.trim();
            return "Started Spiral Cycle "+state.spiralCycle+": "+state.variables.cycleObjectives;
          }
        },
        {
          id: "Planning Quadrant",
          description: "Gather requirements and plan for the cycle.",
          inputs: [
            {type:"textarea", label:"Requirements & Plans", key:"planningReq"},
          ],
          outputs:["planningReq"],
          validate: function(state) {
            if(!state.variables.planningReq || state.variables.planningReq.trim().length <5) return "Enter planning details (min 5 chars)";
            return null;
          },
          process: function(state, inputs) {
            state.variables.planningReq = inputs.planningReq.trim();
            return "Planning captured.";
          }
        },
        {
          id: "Risk Analysis Quadrant",
          description: "Identify and analyze risks for the cycle.",
          inputs: [
            {type:"textarea", label:"Risks Identified (line separated)", key:"risks"},
            {type:"select-multi", label:"Risk Mitigation Strategies", key:"mitigations", options:["Prototyping","Simulation","Expert Review","Alternative Design","Redundancy","Testing"]},
          ],
          outputs:["risks","mitigations"],
          validate: function(state) {
            if(!state.variables.risks || state.variables.risks.length === 0) return "List at least one risk.";
            if(!state.variables.mitigations || state.variables.mitigations.length === 0) return "Select at least one mitigation strategy.";
            return null;
          },
          process: function(state, inputs) {
            let risksRaw = inputs.risks || "";
            let risksList = risksRaw.split("\n").map(r => r.trim()).filter(r => r.length>0);
            state.variables.risks = risksList;
            state.variables.mitigations = inputs.mitigations || [];
            return "Risk analysis saved. "+risksList.length+" risks identified.";
          }
        },
        {
          id: "Engineering Quadrant",
          description: "Implement and test based on cycle plans and mitigations.",
          inputs: [
            {type: "slider", label: "Implementation Progress (%)", key:"engineeringProgress", min:0, max:100, step:5, default:0},
            {type:"textarea", label:"Issues & Bugs Found", key:"engineeringIssues"},
          ],
          outputs:["engineeringProgress","engineeringIssues"],
          validate: function(state) {
            if(state.variables.engineeringProgress === undefined) return "Set implementation progress.";
            return null;
          },
          process: function(state, inputs) {
            state.variables.engineeringProgress = Number(inputs.engineeringProgress);
            let issuesRaw = inputs.engineeringIssues || "";
            let issuesList = issuesRaw.split("\n").map(i=>i.trim()).filter(i=>i.length > 0);
            state.variables.engineeringIssues = issuesList;
            return "Engineering progress: "+state.variables.engineeringProgress+"%. Issues logged: "+issuesList.length;
          }
        },
        {
          id: "Evaluation Quadrant",
          description: "Evaluate cycle results and plan next cycle.",
          inputs: [
            {type:"textarea", label:"Evaluation Notes", key:"evaluationNotes"},
            {type:"checkbox", label:"Proceed to Next Cycle", key:"proceedNextCycle"},
          ],
          outputs:["evaluationNotes","proceedNextCycle"],
          validate: function(state) {
            if(!state.variables.evaluationNotes || state.variables.evaluationNotes.trim().length < 5) return "Evaluation notes required.";
            return null;
          },
          process: function(state, inputs) {
            state.variables.evaluationNotes = inputs.evaluationNotes.trim();
            state.variables.proceedNextCycle = !!inputs.proceedNextCycle;
            if(state.variables.proceedNextCycle) {
              state.spiralCycle++;
              state.stepIndex = 0; // Loop back to Spiral Cycle Initialization
              return "Evaluation saved. Proceeding to cycle "+state.spiralCycle+".";
            } else {
              // Move to Deployment step (Waterfall style)
              state.stepIndex = state.steps.findIndex(s=>s.id==="Deployment");
              return "Evaluation saved. Proceeding to deployment.";
            }
          }
        },
        WaterfallSteps.find(s=>s.id==="Deployment"),
        WaterfallSteps.find(s=>s.id==="Maintenance"),
      ],
      getStepCount: function(state) {
        return this.steps.length;
      }
    },
    "Agile": {
      name: "Agile Model",
      description: "Iterative approach using sprints and continuous feedback.",
      steps: [
        {
          id: "Product Backlog Creation",
          description: "Create backlog of user stories and features.",
          inputs: [
            {type:"textarea", label:"Enter User Stories (line separated)", key:"backlogStories", placeholder:"As a user, I want to log in...\nAs an admin, I want to view reports..."},
          ],
          outputs:["backlogStories"],
          validate: function(state) {
            if(!state.variables.backlogStories || state.variables.backlogStories.length===0) return "Enter at least one user story.";
            return null;
          },
          process: function(state, inputs) {
            let storiesRaw = inputs.backlogStories || "";
            let storiesList = storiesRaw.split("\n").map(s=>s.trim()).filter(s=>s.length>0);
            state.variables.backlogStories = storiesList;
            state.agileSprints = [];
            return "Backlog created with "+storiesList.length+" stories.";
          }
        },
        {
          id: "Sprint Planning",
          description: "Plan sprint scope and assign user stories.",
          inputs: [
            {type:"number", label:"Sprint Number", key:"sprintNumber", min:1, default:1},
            {type:"select-multi", label:"Select User Stories for sprint", key:"sprintStories", optionsGetter: function(state) {
              // Exclude stories already assigned in sprints
              const assigned = state.agileSprints.flatMap(s=>s.stories);
              return state.variables.backlogStories.filter(s => assigned.indexOf(s) === -1);
            }},
            {type:"number", label:"Sprint Duration (weeks)", key:"sprintDuration", min:1, max:6, default:2},
          ],
          outputs:["sprintNumber","sprintStories","sprintDuration"],
          validate: function(state) {
            if(!state.variables.sprintNumber || state.variables.sprintNumber < 1) return "Sprint number must be >=1.";
            if(!state.variables.sprintStories || state.variables.sprintStories.length === 0) return "Select at least one user story.";
            if(!state.variables.sprintDuration || state.variables.sprintDuration <1) return "Sprint duration must be at least 1 week.";
            return null;
          },
          process: function(state, inputs) {
            // Save sprint
            const sprintNum = Number(inputs.sprintNumber);
            const stories = inputs.sprintStories || [];
            const duration = Number(inputs.sprintDuration);
            // Check if sprint number already saved
            const existingIndex = state.agileSprints.findIndex(s=>s.number===sprintNum);
            if(existingIndex !== -1) {
              state.agileSprints[existingIndex] = {number:sprintNum,stories:stories,duration:duration,completed:false};
            } else {
              state.agileSprints.push({number:sprintNum,stories:stories,duration:duration,completed:false});
            }
            state.variables.sprintNumber = sprintNum;
            return "Sprint "+sprintNum+" planned with "+stories.length+" stories for "+duration+" weeks.";
          }
        },
        {
          id: "Sprint Execution",
          description: "Simulate sprint with daily scrums and progress tracking.",
          inputs: [
            {type:"number", label:"Enter current sprint number to update", key:"execSprintNumber", min:1, default:1},
            {type:"slider", label:"Sprint Progress (%)", key:"sprintProgress", min:0, max:100, step:5, default:0},
            {type:"textarea", label:"Sprint Issues / Blockers (line separated)", key:"sprintIssues", placeholder:"Issue 1\nIssue 2"},
            {type:"checkbox", label:"Mark Sprint Complete?", key:"sprintComplete"},
          ],
          outputs:["execSprintNumber","sprintProgress","sprintIssues","sprintComplete"],
          validate: function(state) {
            if(!state.variables.execSprintNumber || state.variables.execSprintNumber < 1) return "Enter valid sprint number.";
            if(state.variables.sprintProgress === undefined) return "Set sprint progress.";
            return null;
          },
          process: function(state, inputs) {
            const sprintNum = Number(inputs.execSprintNumber);
            const sprint = state.agileSprints.find(s=>s.number === sprintNum);
            if(!sprint) {
              return "Sprint "+sprintNum+" not found in planned sprints.";
            }
            sprint.progress = Number(inputs.sprintProgress);
            let issuesRaw = inputs.sprintIssues || "";
            sprint.issues = issuesRaw.split("\n").map(s=>s.trim()).filter(s=>s.length>0);
            if(inputs.sprintComplete) sprint.completed = true;
            return "Updated Sprint "+sprintNum+": Progress "+sprint.progress+"%. Issues: "+sprint.issues.length+". Completed: "+(sprint.completed ? "Yes" : "No");
          }
        },
        {
          id: "Sprint Review & Retrospective",
          description: "Review sprint outcomes and discuss improvements.",
          inputs: [
            {type:"number", label:"Sprint Number to Review", key:"reviewSprintNumber", min:1, default:1},
            {type:"textarea", label:"Review Comments", key:"reviewComments"},
            {type:"textarea", label:"Retrospective Notes", key:"retroNotes"},
            {type:"checkbox", label:"Add New User Stories to Backlog?", key:"addStories"},
            {type:"textarea", label:"New User Stories (if adding)", key:"newStories", placeholder:"New story 1\nNew story 2"},
          ],
          outputs:["reviewSprintNumber","reviewComments","retroNotes","addStories","newStories"],
          validate: function(state) {
            if(!state.variables.reviewSprintNumber || state.variables.reviewSprintNumber < 1) return "Enter sprint number to review.";
            if(!state.variables.reviewComments || state.variables.reviewComments.trim().length < 5) return "Enter review comments (min 5 chars).";
            if(!state.variables.retroNotes || state.variables.retroNotes.trim().length < 5) return "Enter retrospective notes (min 5 chars).";
            if(state.variables.addStories) {
              if(!state.variables.newStories || state.variables.newStories.length === 0) return "Enter new user stories.";
            }
            return null;
          },
          process: function(state, inputs) {
            const sprintNum = Number(inputs.reviewSprintNumber);
            const sprint = state.agileSprints.find(s=>s.number === sprintNum);
            if(!sprint) return "Sprint "+sprintNum+" not found.";
            if(!sprint.reviews) sprint.reviews = [];
            sprint.reviews.push({
              comments: inputs.reviewComments.trim(),
              retrospective: inputs.retroNotes.trim(),
              date: new Date()
            });
            if(inputs.addStories) {
              const newStoriesRaw = inputs.newStories || "";
              const newStories = newStoriesRaw.split("\n").map(s=>s.trim()).filter(s=>s.length>0);
              state.variables.backlogStories = (state.variables.backlogStories || []).concat(newStories);
              return "Review saved. Added "+newStories.length+" new stories to backlog.";
            }
            return "Sprint "+sprintNum+" review saved.";
          }
        },
        {
          id: "Release",
          description: "Prepare working software release for end users.",
          inputs: [
            {type:"textarea", label:"Release Notes", key:"releaseNotes", placeholder:"Describe features and fixes..."},
            {type:"checkbox", label:"Perform User Acceptance Testing (UAT)?", key:"uat"},
          ],
          outputs:["releaseNotes","uat"],
          validate: function(state) {
            if(!state.variables.releaseNotes || state.variables.releaseNotes.trim().length < 5) return "Enter release notes (min 5 chars).";
            return null;
          },
          process: function(state, inputs) {
            state.variables.releaseNotes = inputs.releaseNotes.trim();
            const performedUAT = !!inputs.uat;
            let msg = "Release prepared. UAT performed: "+(performedUAT ? "Yes" : "No");
            if(performedUAT) {
              const pass = confirm("Simulate UAT Results: Did UAT pass? (OK = Pass, Cancel = Fail)");
              msg += ". UAT result: "+(pass ? "PASS" : "FAIL");
            }
            return msg;
          }
        },
        {
          id: "Agile Maintenance",
          description: "Manage quick fixes and updates post release.",
          inputs: [
            {type:"textarea", label:"Post-Release Tasks", key:"postReleaseTasks", placeholder:"Bug fix\nPerformance optimization"},
            {type:"checkbox", label:"Plan next sprint?", key:"planNextSprint"},
          ],
          outputs:["postReleaseTasks","planNextSprint"],
          validate: function(state) {
            if(!state.variables.postReleaseTasks || state.variables.postReleaseTasks.length === 0) return "Enter at least one post-release task.";
            return null;
          },
          process: function(state, inputs) {
            const tasksRaw = inputs.postReleaseTasks || "";
            const tasks = tasksRaw.split(/\n|,/).map(t => t.trim()).filter(t => t.length > 0);
            state.variables.postReleaseTasks = tasks;
            state.variables.planNextSprint = !!inputs.planNextSprint;
            if(state.variables.planNextSprint) {
              // Suggest next sprint planning
              state.stepIndex = 1; // go back to Sprint Planning
              return "Post release tasks saved. Planning next sprint.";
            } else {
              return "Post release tasks saved. No further sprints planned now.";
            }
          }
        },
      ],
      getStepCount: function(state) {
        return this.steps.length;
      }
    }
  };

  // Main state
  let state = clone(initialProjectState);
  let currentStep = null;

  // DOM elements
  const currentStepNameElem = document.getElementById("current-step-name");
  const stepDescriptionElem = document.getElementById("step-description");
  const stepControlsElem = document.getElementById("step-controls");
  const stepOutputElem = document.getElementById("step-output");
  const projectStateTextarea = document.getElementById("project-state");
  const downloadLogBtn = document.getElementById("download-log");
  const resetProjectBtn = document.getElementById("reset-project");

  // Model selection radios
  const modelRadios = document.querySelectorAll('input[name="model"]');

  function log(msg) {
    const time = new Date().toLocaleTimeString();
    state.logs.push(`[${time}] ${msg}`);
    state.history.push({step:currentStep ? currentStep.id : null, message: msg, time:Date.now()});
    updateProjectStateDisplay();
  }

  // Update project overview display including logs
  function updateProjectStateDisplay() {
    let text = `Model: ${state.model}\nCurrent Step: ${currentStep ? currentStep.id : "N/A"}\n\nArtifacts Collected:\n`;
    for(const k in state.artifacts) {
      text += `- ${k}: `;
      try {
        const jsonStr = JSON.stringify(state.artifacts[k]);
        if(jsonStr.length > 100) text += jsonStr.slice(0,100) + "...";
        else text += jsonStr;
      } catch(e) {
        text += "[Cannot display]";
      }
      text += "\n";
    }
    text += "\nLogs:\n";
    if(state.logs.length > 100) {
      text += state.logs.slice(state.logs.length - 100).join("\n");
    } else {
      text += state.logs.join("\n");
    }
    projectStateTextarea.value = text;
  }

  function clearStepControls() {
    stepControlsElem.innerHTML = "";
  }

  // Generate the interactive controls for the current step
  function renderStepControls() {
    clearStepControls();
    stepOutputElem.textContent = "";
    if(!currentStep) return;

    const inputs = currentStep.inputs || [];
    inputs.forEach(inputDef=>{
      const ctrl = createInputControl(inputDef, state);
      stepControlsElem.appendChild(ctrl);
    });

    // Add buttons for confirm and navigation
    const btnContainer = document.createElement("div");
    btnContainer.style.marginTop = "0.5em";

    const prevBtn = document.createElement("button");
    prevBtn.textContent = "Previous Step";
    prevBtn.disabled = (state.stepIndex === 0);
    prevBtn.onclick = function() {
      moveStep(-1);
    };
    btnContainer.appendChild(prevBtn);

    const validateBtn = document.createElement("button");
    validateBtn.textContent = "Validate & Save";
    validateBtn.onclick = function() {
      onValidateAndSave();
    };
    btnContainer.appendChild(validateBtn);

    const nextBtn = document.createElement("button");
    nextBtn.textContent = "Next Step";
    nextBtn.disabled = (state.stepIndex >= (state.steps.length - 1));
    nextBtn.onclick = function() {
      moveStep(1);
    };
    btnContainer.appendChild(nextBtn);

    stepControlsElem.appendChild(btnContainer);
  }

  // Handle Validate & Save button
  function onValidateAndSave() {
    if(!currentStep) return;
    // Collect inputs
    const inputs = {};
    for(let inputDef of currentStep.inputs || []) {
      let val;
      const el = document.getElementById("input-" + inputDef.key);
      if(!el) {
        // special cases like sliders with multiple
        if(inputDef.type === "slider" && inputDef.multipleSelect === "components") {
          val = {};
          const comps = inputDef.optionsGetter ? inputDef.optionsGetter(state) : [];
          comps.forEach(c=>{
            const slider = document.getElementById(`input-slider-${inputDef.key}-${c}`);
            if(slider) val[c] = Number(slider.value);
          });
        } else continue;
      } else {
        if(inputDef.type === "select-multi") {
          val = [];
          for(let i=0;i<el.options.length;i++) {
            if(el.options[i].selected) val.push(el.options[i].value);
          }
        } else if(inputDef.type === "checkbox") {
          val = el.checked;
        } else if(inputDef.type === "number") {
          val = Number(el.value);
        } else {
          val = el.value;
        }
      }
      inputs[inputDef.key] = val;
      // Save to state.variables for persistent form state
      state.variables[inputDef.key] = val;
    }
    // Validate step
    if(currentStep.validate) {
      const err = currentStep.validate(state);
      if(err) {
        alert("Validation Error:\n" + err);
        return;
      }
    }
    // Process inputs to save artifacts or variables
    let outputMsg = "";
    try {
      outputMsg = currentStep.process(state, inputs) || "";
      stepOutputElem.textContent = outputMsg;
      log(`Step "${currentStep.id}": ${outputMsg}`);
    } catch(e) {
      stepOutputElem.textContent = "Error processing step: " + e.message;
      log(`Step "${currentStep.id}": Error - ${e.message}`);
      return;
    }
    updateProjectStateDisplay();
  }

  // Move to next/prev step
  function moveStep(delta) {
    const maxIndex = state.steps.length - 1;
    let newIndex = state.stepIndex + delta;
    if(newIndex < 0) newIndex = 0;
    if(newIndex > maxIndex) newIndex = maxIndex;
    if(newIndex === state.stepIndex) return;
    state.stepIndex = newIndex;
    setCurrentStep(state.steps[state.stepIndex]);
  }

  // Set current step and update UI
  function setCurrentStep(step) {
    currentStep = step;
    currentStepNameElem.textContent = step ? step.id : "";
    stepDescriptionElem.textContent = step ? step.description : "";
    renderStepControls();
    updateProjectStateDisplay();
  }

  // Model selection change handler
  function onModelChange() {
    const checkedModel = Array.from(modelRadios).find(r=>r.checked);
    if(!checkedModel) return;
    state.model = checkedModel.value;
    const modelDef = SDLCModels[state.model];
    if(!modelDef) return;
    state.steps = modelDef.steps;
    state.stepIndex = 0;
    state.artifacts = {};
    state.logs = [];
    state.variables = {};
    state.iterativeCycle = 1;
    state.spiralCycle = 1;
    state.agileSprints = [];
    setCurrentStep(state.steps[state.stepIndex]);
  }

  modelRadios.forEach(radio=>{
    radio.addEventListener("change", () => {
      if(confirm("Changing SDLC model will reset current progress. Proceed?")) {
        onModelChange();
      } else {
        // revert selection (force previous selection)
        radio.checked = false;
        const currentRadio = Array.from(modelRadios).find(r=>r.value === state.model);
        if(currentRadio) currentRadio.checked = true;
      }
    });
  });

  // Reset project completely
  resetProjectBtn.addEventListener("click", () => {
    if(confirm("Are you sure you want to reset all project data?")) {
      state = clone(initialProjectState);
      const currentRadio = Array.from(modelRadios).find(r=>r.value === state.model);
      if(currentRadio) currentRadio.checked = true;
      onModelChange();
    }
  });

  // Download logs as txt
  downloadLogBtn.addEventListener("click", () => {
    const logsText = state.logs.join("\n");
    const blob = new Blob([logsText], {type: "text/plain"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `SDLC_Log_${new Date().toISOString().replace(/[:.]/g,"-")}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  });

  // Initialize app
  onModelChange();
})();
</script>
</body>
</html>
