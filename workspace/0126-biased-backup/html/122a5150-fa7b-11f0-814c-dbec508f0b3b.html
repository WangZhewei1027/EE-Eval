<!DOCTYPE html>
<html>
<head>
    <title>Array with Interactive Controls</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Array with Interactive Controls</h1>
        <button id="add-btn">Add</button>
        <button id="remove-btn">Remove</button>
        <input id="input-field" type="text" placeholder="Enter value">
        <button id="submit-btn">Submit</button>
        <div id="output"></div>

        <script src="script.js"></script>
    </div>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #add-btn, #remove-btn {
            width: 100%;
            height: 40px;
            margin-bottom: 20px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        #add-btn:hover, #remove-btn:hover {
            background-color: #ccc;
        }

        #input-field {
            width: 100%;
            height: 40px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
        }

        #submit-btn {
            width: 100%;
            height: 40px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: #fff;
        }

        #submit-btn:hover {
            background-color: #3e8e41;
        }

        #output {
            width: 100%;
            height: 200px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
        }
    </style>
</body>
</html>
