<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greedy Algorithms</title>
    <style>
        body {
            background-color: #fff;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #ccc;
        }
        .slider {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .input-field {
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .input-field input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }
        .button-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Greedy Algorithms</h2>
        <button class="button" id="greedy-btn">Greedy Algorithm</button>
        <button class="button" id="max-btn">Max Algorithm</button>
        <button class="button" id="min-btn">Min Algorithm</button>
        <button class="button" id="sort-btn">Sort Algorithm</button>
        <button class="button" id="filter-btn">Filter Algorithm</button>
        <button class="button" id="reset-btn">Reset</button>
        <div class="slider">
            <label for="speed">Speed (1-10)</label>
            <input type="range" id="speed" min="1" max="10" value="5">
            <span id="speed-value">5</span>
        </div>
        <div class="input-field">
            <label for="num">Number:</label>
            <input type="text" id="num" value="10">
        </div>
        <div class="button-group">
            <button class="button">Run</button>
            <button class="button">Reset</button>
        </div>
    </div>

    <script>
        let greedyBtn = document.getElementById('greedy-btn');
        let maxBtn = document.getElementById('max-btn');
        let minBtn = document.getElementById('min-btn');
        let sortBtn = document.getElementById('sort-btn');
        let filterBtn = document.getElementById('filter-btn');
        let resetBtn = document.getElementById('reset-btn');

        let speedValue = document.getElementById('speed-value');
        let numInput = document.getElementById('num');

        let speed = 5;
        let num = 10;

        let maxOutput = '';
        let minOutput = '';

        let maxOutputFunction = (arr) => {
            let max = arr[0];
            for (let i = 0; i < arr.length; i++) {
                if (arr[i] > max) {
                    max = arr[i];
                }
            }
            return max;
        };

        let minOutputFunction = (arr) => {
            let min = arr[0];
            for (let i = 0; i < arr.length; i++) {
                if (arr[i] < min) {
                    min = arr[i];
                }
            }
            return min;
        };

        maxBtn.addEventListener('click', () => {
            if (num < 100) {
                num++;
            } else {
                num = 10;
            }
            speedValue.textContent = speed;
            maxOutput = maxOutputFunction([num]);
            maxOutputFunction = (arr) => {
                let max = arr[0];
                for (let i = 0; i < arr.length; i++) {
                    if (arr[i] > max) {
                        max = arr[i];
                    }
                }
                return max;
            };
            maxOutputFunction = (arr) => {
                let max = arr[0];
                for (let i = 0; i < arr.length; i++) {
                    if (arr[i] < max) {
                        max = arr[i];
                    }
                }
                return max;
            };
            maxOutput = maxOutputFunction([num]);
            speedValue.textContent = speed;
            alert(`Max output: ${maxOutput}`);
        });

        minBtn.addEventListener('click', () => {
            if (num > 1) {
                num--;
            } else {
                num = 1;
            }
            speedValue.textContent = speed;
            minOutput = minOutputFunction([num]);
            minOutputFunction = (arr) => {
                let min = arr[0];
                for (let i = 0; i < arr.length; i++) {
                    if (arr[i] < min) {
                        min = arr[i];
                    }
                }
                return min;
            };
            minOutputFunction = (arr) => {
                let min = arr[0];
                for (let i = 0; i < arr.length; i++) {
                    if (arr[i] > min) {
                        min = arr[i];
                    }
                }
                return min;
            };
            minOutput = minOutputFunction([num]);
            speedValue.textContent = speed;
            alert(`Min output: ${minOutput}`);
        });

        sortBtn.addEventListener('click', () => {
            let arr = [num, maxOutput, minOutput];
            arr.sort((a, b) => a - b);
            alert(`Sorted array: ${arr.join(', ')}`);
        });

        filterBtn.addEventListener('click', () => {
            let arr = [num, maxOutput, minOutput];
            arr = arr.filter((x) => x > 5);
            arr = arr.filter((x) => x < 10);
            alert(`Filtered array: ${arr.join(', ')}`);
        });

        resetBtn.addEventListener('click', () => {
            speedValue.textContent = '5';
            num = 10;
            maxOutput = '';
            minOutput = '';
            alert('Reset!');
        });
    </script>
</body>
</html>
