<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garbage Collection Visualization</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            color: #333;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #75b2ff, #ff7e7e);
            overflow: hidden;
        }
        .garbage {
            position: absolute;
            border-radius: 50%;
            background-color: #4a4a4a;
            animation: fall 5s infinite linear;
            will-change: transform;
        }
        @keyframes fall {
            0% {
                transform: translateY(-100px);
            }
            100% {
                transform: translateY(100vh);
            }
        }
        .title {
            position: absolute;
            top: 20px;
            font-size: 4em;
            color: #fff;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
            z-index: 2;
            transition: opacity 0.5s;
        }
        .button-container {
            position: absolute;
            bottom: 30px;
            text-align: center;
            z-index: 2;
        }
        .button {
            background-color: #fff;
            border: none;
            border-radius: 25px;
            padding: 15px 30px;
            font-size: 1.5em;
            color: #333;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title" id="title">Garbage Collection</div>
        <div class="button-container">
            <button class="button" id="start">Start Visual</button>
            <button class="button" id="stop" style="display: none;">Stop Visual</button>
        </div>
    </div>
    <script>
        const startButton = document.getElementById('start');
        const stopButton = document.getElementById('stop');
        const container = document.querySelector('.container');
        let garbageInterval;

        function createGarbage() {
            const garbage = document.createElement('div');
            garbage.className = 'garbage';
            garbage.style.width = Math.random() * 50 + 20 + 'px';
            garbage.style.height = garbage.style.width;
            garbage.style.left = Math.random() * 100 + 'vw';
            container.appendChild(garbage);
        }

        function startAnimation() {
            startButton.style.display = 'none';
            stopButton.style.display = 'block';
            garbageInterval = setInterval(createGarbage, 800);
        }

        function stopAnimation() {
            startButton.style.display = 'block';
            stopButton.style.display = 'none';
            clearInterval(garbageInterval);
            document.querySelectorAll('.garbage').forEach(g => g.remove());
        }

        startButton.addEventListener('click', startAnimation);
        stopButton.addEventListener('click', stopAnimation);
    </script>
</body>
</html>
