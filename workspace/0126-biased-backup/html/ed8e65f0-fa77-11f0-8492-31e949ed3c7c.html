<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Complexity Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom right, #1a2a6c, #b21f1f, #fdbb2d);
            color: white;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            margin-top: 50px;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 100px);
            position: relative;
        }

        .box {
            width: 150px;
            height: 150px;
            border: 5px solid rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .box:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .inner {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            position: absolute;
            left: 0;
            top: 0;
            transition: background-color 0.3s;
        }

        .big {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .medium {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .small {
            background-color: rgba(255, 255, 255, 0.5);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s, transform 0.3s;
        }

        button:hover {
            background-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .description {
            text-align: center;
            margin-top: 20px;
            font-size: 1.2em;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <h1>Space Complexity</h1>
    <div class="container">
        <div class="box big">
            <div class="inner big">O(n^2)</div>
        </div>
        <div class="box medium">
            <div class="inner medium">O(n log n)</div>
        </div>
        <div class="box small">
            <div class="inner small">O(n)</div>
        </div>
    </div>

    <div class="description">
        <p>Observe how different algorithms utilize space based on their complexity.</p>
    </div>

    <div class="button-container" style="text-align: center;">
        <button id="revealBtn">Reveal the Concepts</button>
    </div>

    <script>
        document.getElementById('revealBtn').onclick = function () {
            alert("Space Complexity measures the amount of memory space required by an algorithm as a function of the input size.");
        };
    </script>
</body>

</html>
