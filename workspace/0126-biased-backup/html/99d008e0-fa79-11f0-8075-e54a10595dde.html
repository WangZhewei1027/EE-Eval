<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Monitor</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<h1>Interactive Monitor</h1>

<div>
    <h2>Data Entry</h2>
    <label for="inputValue">Enter a value:</label>
    <input type="number" id="inputValue" placeholder="Input value" />
    <button onclick="addValue()">Add Value</button>
    <button onclick="resetValues()">Reset Values</button>
</div>

<div>
    <h2>Controls</h2>
    <label for="slider">Adjust setting:</label>
    <input type="range" id="slider" min="0" max="100" oninput="updateSliderValue(value)" />
    <span id="sliderValue">50</span>
    
    <hr />
    
    <label for="checkbox">Enable Notifications:</label>
    <input type="checkbox" id="checkbox" onclick="toggleNotifications()" />
    <span id="notificationStatus">Disabled</span>
</div>

<div>
    <h2>Historical Data</h2>
    <button onclick="toggleHistory()">Show/Hide History</button>
    <div id="history" class="hidden">
        <ul id="historyList"></ul>
    </div>
</div>

<div>
    <h2>Dashboard</h2>
    <p><strong>Selected Value:</strong> <span id="displayValue">No values entered</span></p>
</div>

<script>
    let historyData = [];
    let notificationsEnabled = false;

    function addValue() {
        const input = document.getElementById('inputValue');
        const value = input.value;
        if (value) {
            historyData.push(value);
            document.getElementById('historyList').innerHTML += `<li>${value}</li>`;
            document.getElementById('displayValue').innerText = value;
            input.value = '';
        }
    }

    function resetValues() {
        historyData = [];
        document.getElementById('historyList').innerHTML = '';
        document.getElementById('displayValue').innerText = 'No values entered';
    }

    function updateSliderValue(value) {
        document.getElementById('sliderValue').innerText = value;
        if (notificationsEnabled) {
            alert(`Slider value changed to: ${value}`);
        }
    }

    function toggleNotifications() {
        notificationsEnabled = !notificationsEnabled;
        document.getElementById('notificationStatus').innerText = notificationsEnabled ? 'Enabled' : 'Disabled';
    }

    function toggleHistory() {
        const history = document.getElementById('history');
        history.classList.toggle('hidden');
    }
</script>

</body>
</html>
