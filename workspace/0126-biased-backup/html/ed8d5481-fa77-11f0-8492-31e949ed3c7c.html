<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Sort Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 30%, #d1d5db 100%);
            color: #374151;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #container {
            width: 80%;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            background-color: #ffffff;
        }
        .bar {
            width: 30px;
            margin: 0 2px;
            display: inline-block;
            background-color: #4f46e5;
            transition: height 0.5s ease, background-color 0.5s ease;
        }
        .active {
            background-color: #f59e0b;
        }
        .sorted {
            background-color: #22c55e;
        }
        #controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-size: 16px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="controls">
        <button id="start">Start Sorting</button>
    </div>

    <script>
        const container = document.getElementById('container');
        const startButton = document.getElementById('start');
        const barCount = 15;
        let array = Array.from({length: barCount}, () => Math.floor(Math.random() * 100) + 10);

        function createBars(array) {
            container.innerHTML = '';
            array.forEach(height => {
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = height + 'px';
                container.appendChild(bar);
            });
        }

        async function selectionSort() {
            for (let i = 0; i < array.length - 1; i++) {
                let minIndex = i;
                const bars = document.querySelectorAll('.bar');

                // Highlight active selection
                bars[i].classList.add('active');

                for (let j = i + 1; j < array.length; j++) {
                    if (array[j] < array[minIndex]) {
                        minIndex = j;
                    }
                }

                // Swap bars if necessary
                if (minIndex !== i) {
                    [array[i], array[minIndex]] = [array[minIndex], array[i]];
                    createBars(array);
                    bars[i].classList.remove('active');
                    bars[minIndex].classList.add('active');
                    await new Promise(requestAnimationFrame);
                }

                // Mark bar as sorted
                bars[i].classList.add('sorted');
            }
            document.querySelectorAll('.bar').forEach(bar => bar.classList.add('sorted'));
        }

        startButton.addEventListener('click', async () => {
            startButton.disabled = true;
            createBars(array);
            await selectionSort();
            startButton.disabled = false;
        });

        createBars(array);
    </script>
</body>
</html>
