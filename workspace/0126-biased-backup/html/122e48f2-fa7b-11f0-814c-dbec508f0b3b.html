<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Nearest Neighbors</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        #knn-container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #knn-container h2 {
            margin-top: 0;
        }
        #knn-container input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #knn-container button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #knn-container button:hover {
            background-color: #3e8e41;
        }
        #knn-table {
            width: 100%;
            border-collapse: collapse;
        }
        #knn-table th, #knn-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        #knn-table th {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <div id="knn-container">
        <h2>K-Nearest Neighbors</h2>
        <form id="knn-form">
            <label for="feature1">Feature 1:</label>
            <input type="text" id="feature1" name="feature1" value="Feature 1">
            <br>
            <label for="feature2">Feature 2:</label>
            <input type="text" id="feature2" name="feature2" value="Feature 2">
            <br>
            <label for="feature3">Feature 3:</label>
            <input type="text" id="feature3" name="feature3" value="Feature 3">
            <br>
            <button id="knn-button">KNN</button>
            <button id="knn-clear">Clear</button>
            <table id="knn-table">
                <thead>
                    <tr>
                        <th>Feature</th>
                        <th>Value</th>
                    </tr>
                </thead>
                <tbody id="knn-data">
                </tbody>
            </table>
        </form>
        <div id="knn-output"></div>
    </div>

    <script>
        const knnButton = document.getElementById('knn-button');
        const knnClearButton = document.getElementById('knn-clear');
        const knnDataContainer = document.getElementById('knn-data');
        const knnOutputContainer = document.getElementById('knn-output');
        const feature1Input = document.getElementById('feature1');
        const feature2Input = document.getElementById('feature2');
        const feature3Input = document.getElementById('feature3');
        const knnButtonInput = document.getElementById('knn-button');
        const knnClearButtonInput = document.getElementById('knn-clear');

        const knnData = [];

        knnButton.addEventListener('click', () => {
            const feature1 = feature1Input.value;
            const feature2 = feature2Input.value;
            const feature3 = feature3Input.value;

            knnDataContainer.innerHTML = '';

            knnData.push({
                feature1,
                feature2,
                feature3,
                value: Math.random() * 100
            });

            knnData.sort((a, b) => b.value - a.value);

            const table = document.createElement('table');
            knnData.forEach((data, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${data.feature1}</td>
                    <td>${data.feature2}</td>
                    <td>${data.feature3}</td>
                    <td>${data.value}</td>
                `;
                table.appendChild(row);
            });
            knnDataContainer.appendChild(table);

            knnClearButtonInput.addEventListener('click', () => {
                knnData = [];
                knnDataContainer.innerHTML = '';
            });
        });

        knnClearButton.addEventListener('click', () => {
            knnData = [];
            knnDataContainer.innerHTML = '';
        });

        knnButton.addEventListener('click', () => {
            const feature1 = feature1Input.value;
            const feature2 = feature2Input.value;
            const feature3 = feature3Input.value;

            knnDataContainer.innerHTML = '';

            knnData.push({
                feature1,
                feature2,
                feature3,
                value: Math.random() * 100
            });

            knnData.sort((a, b) => b.value - a.value);

            const table = document.createElement('table');
            knnData.forEach((data, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${data.feature1}</td>
                    <td>${data.feature2}</td>
                    <td>${data.feature3}</td>
                    <td>${data.value}</td>
                `;
                table.appendChild(row);
            });
            knnDataContainer.appendChild(table);

            knnButtonInput.value = 'KNN';
        });

        knnButtonInput.addEventListener('input', () => {
            knnButton.textContent = knnButtonInput.value;
        });
    </script>
</body>
</html>
