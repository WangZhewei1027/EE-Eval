<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Congestion Control Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;600&display=swap');

  :root {
    --bg-light: #f5f7fa;
    --bg-dark: #181c24;
    --primary-start: #00d2ff;
    --primary-end: #3a47d5;
    --accent: #ff6a9e;
    --text-light: #e0e6f2;
    --text-dark: #202b46;
    --gradient-glow: radial-gradient(circle at center, #3a47d5 0%, #0b0c13 80%);
    --packet-green: #3cd070;
    --packet-orange: #ffa94d;
    --packet-red: #ff6a6a;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg-light);
    font-family: 'Manrope', sans-serif;
    color: var(--text-dark);
    overflow-x: hidden;
  }

  header {
    text-align: center;
    padding: 2rem 1rem 0 1rem;
    background: linear-gradient(135deg, var(--primary-start), var(--primary-end));
    color: white;
    box-shadow: 0 4px 15px rgba(58, 71, 213, 0.3);
  }

  header h1 {
    margin: 0;
    font-weight: 600;
    font-size: 3rem;
    letter-spacing: 0.05em;
    text-shadow:
      0 0 8px rgba(58, 71, 213, 0.7),
      0 0 15px rgba(0, 210, 255, 0.75);
  }

  header p {
    margin: 0.5rem 0 2rem;
    font-weight: 300;
    font-size: 1.25rem;
    opacity: 0.85;
    user-select: none;
  }

  main {
    max-width: 900px;
    margin: 0 auto 3rem auto;
    background: white;
    border-radius: 24px;
    box-shadow:
      0 10px 18px rgba(58, 71, 213, 0.15),
      0 2px 6px rgba(0, 0, 0, 0.06);
    padding: 3rem 3.5rem 4rem 3.5rem;
    position: relative;
  }

  #visualizer {
    width: 100%;
    height: 380px;
    background: #1e222e;
    border-radius: 20px;
    overflow: visible;
    box-shadow:
      0 0 40px 6px rgba(58, 71, 213, 0.25),
      inset 0 0 20px 2px rgba(0, 210, 255, 0.3);
    position: relative;
  }

  /* Link between sender and receiver */
  .link {
    stroke: url(#linkGradient);
    stroke-width: 8;
    fill: none;
    filter: drop-shadow(0 0 8px rgba(58, 71, 213, 0.45));
  }

  /* Congestion bar */
  #congestionBarContainer {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    height: 28px;
    background: #222533;
    border-radius: 14px;
    box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.7);
    overflow: hidden;
  }

  #congestionBar {
    height: 28px;
    width: 0%;
    background: linear-gradient(90deg, var(--packet-green), var(--packet-orange), var(--packet-red));
    border-radius: 14px;
    box-shadow:
      0 0 10px rgba(252, 119, 3, 0.7),
      0 0 14px rgba(252, 119, 3, 0.6);
    transition: width 1.2s ease-in-out;
  }

  #congestionLabel {
    position: absolute;
    width: 280px;
    text-align: center;
    line-height: 28px;
    font-weight: 600;
    font-size: 1.1rem;
    color: var(--text-light);
    text-shadow: 0 0 4px rgba(0,0,0,0.6);
    user-select: none;
    pointer-events: none;
  }

  /* Sender and Receiver containers */
  .node {
    fill: #283040;
    stroke: #3a47d5;
    stroke-width: 3;
    filter:
      drop-shadow(0 0 4px rgba(58, 71, 213, 0.5));
  }

  .node-glow {
    fill: none;
    stroke: #00d2ff;
    stroke-width: 7;
    stroke-linecap: round;
    filter:
      drop-shadow(0 0 12px rgba(0, 210, 255, 0.85));
    opacity: 0.35;
    animation: pulseGlow 2.5s ease-in-out infinite;
  }

  @keyframes pulseGlow {
    0%, 100% {opacity: 0.3;}
    50% {opacity: 0.7;}
  }

  .node-text {
    fill: var(--text-light);
    font-weight: 600;
    font-size: 1.1rem;
    user-select: none;
    letter-spacing: 0.04em;
  }

  /* Packet Styles */
  .packet {
    fill: var(--packet-green);
    stroke: #0a7159;
    stroke-width: 1.5;
    filter: drop-shadow(0 0 5px rgba(60, 208, 112, 0.7));
    transform-origin: center;
    animation-timing-function: linear;
  }

  .packet-warning {
    fill: var(--packet-orange);
    stroke: #a66d1a;
    filter: drop-shadow(0 0 5px rgba(255, 164, 77, 0.7));
  }

  .packet-drop {
    fill: var(--packet-red);
    stroke: #912929;
    filter: drop-shadow(0 0 8px rgba(255, 106, 106, 0.8));
  }

  /* Buttons */
  #controls {
    margin-top: 2.5rem;
    text-align: center;
  }

  button {
    background: linear-gradient(135deg, #3a47d5, #00d2ff);
    border: none;
    color: white;
    font-weight: 600;
    font-family: 'Manrope', sans-serif;
    font-size: 1.15rem;
    padding: 0.75rem 2.25rem;
    border-radius: 34px;
    cursor: pointer;
    box-shadow:
      0 6px 16px rgba(58, 71, 213, 0.6),
      inset 0 1px 2px rgba(255, 255, 255, 0.2);
    transition:
      box-shadow 0.3s ease,
      transform 0.3s ease;
    user-select: none;
  }

  button:hover {
    box-shadow:
      0 12px 22px rgba(58, 71, 213, 0.9),
      inset 0 2px 5px rgba(255, 255, 255, 0.3);
    transform: scale(1.08);
  }

  button:active {
    transform: scale(0.97);
  }

  /* Packet animation paths */

  /* Helper for easing */
  @keyframes packetMoveForward {
    0% {
      offset-distance: 0%;
      opacity: 1;
      transform: rotate(0deg);
    }
    100% {
      offset-distance: 100%;
      opacity: 1;
      transform: rotate(0deg);
    }
  }

  @keyframes packetDropFade {
    0% {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }
    80% {
      opacity: 1;
      transform: scale(1.2) rotate(15deg);
    }
    100% {
      opacity: 0;
      transform: scale(0.5) rotate(30deg);
    }
  }

  svg {
    overflow: visible;
  }
</style>
</head>
<body>
<header>
  <h1>Congestion Control</h1>
  <p>An aesthetic and animated visualization of network congestion dynamics</p>
</header>
<main>
  <svg id="visualizer" viewBox="0 0 900 380" aria-label="Congestion control network visualization" role="img" >
    <defs>
      <linearGradient id="linkGradient" x1="0%" y1="50%" x2="100%" y2="50%">
        <stop offset="0%" stop-color="#00d2ff" />
        <stop offset="100%" stop-color="#3a47d5" />
      </linearGradient>

      <path id="pathLink" d="M 150 190 Q 450 50 750 190" />
    </defs>

    <!-- Nodes with glowing halo -->
    <g id="sender" transform="translate(150,190)" aria-label="Sender Node" role="img">
      <circle class="node" r="44" />
      <circle class="node-glow" r="60" />
      <text class="node-text" x="0" y="7" text-anchor="middle">Sender</text>
    </g>

    <g id="receiver" transform="translate(750,190)" aria-label="Receiver Node" role="img">
      <circle class="node" r="44" />
      <circle class="node-glow" r="60" />
      <text class="node-text" x="0" y="7" text-anchor="middle">Receiver</text>
    </g>

    <!-- Link line -->
    <path class="link" d="M 150 190 Q 450 50 750 190" />

    <!-- Congestion window visual -->
    <rect x="340" y="150" width="220" height="35" rx="8" ry="8" fill="url(#linkGradient)" filter="url(#glow)" opacity="0.2"/>

    <!-- Congestion window text -->
    <text x="450" y="178" fill="#e0e6f2" font-family="Manrope" font-weight="600" font-size="1rem" text-anchor="middle" opacity="0.7" user-select="none">Congestion Window</text>
  </svg>

  <div id="congestionBarContainer" role="img" aria-label="Congestion window utilization bar">
    <div id="congestionBar"></div>
    <div id="congestionLabel">Congestion Window: 0%</div>
  </div>

  <div id="controls" aria-label="Controls">
    <button id="startBtn" aria-pressed="false" aria-label="Start animation">Start Animation</button>
    <button id="resetBtn" aria-pressed="false" aria-label="Reset animation" disabled>Reset</button>
  </div>
</main>

<script>
  (function(){
    const SVG_NS = "http://www.w3.org/2000/svg";
    const visualizer = document.getElementById('visualizer');
    const pathLink = visualizer.querySelector('#pathLink');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const congestionBar = document.getElementById('congestionBar');
    const congestionLabel = document.getElementById('congestionLabel');

    // Path length for offsetDistance animations
    const pathLength = pathLink.getTotalLength();

    // State variables
    let animationRunning = false;

    // Packet prototype function: create a packet circle with classes and initial opacity 0
    function createPacket(className = 'packet', radius = 10) {
      const circle = document.createElementNS(SVG_NS, 'circle');
      circle.setAttribute('r', radius);
      circle.setAttribute('class', className);
      circle.style.offsetPath = 'path("M 150 190 Q 450 50 750 190")';
      circle.style.offsetDistance = '0%';
      circle.style.opacity = '0';
      circle.style.position = 'absolute';
      // Enable GPU layer for smooth animations
      circle.style.willChange = 'offset-distance, transform, opacity';
      visualizer.appendChild(circle);
      return circle;
    }

    // Create and store packets for animation
    const packets = [];
    // Three packets traveling normally (green)
    for(let i=0; i<8; i++){
      packets.push({el: createPacket('packet'), delay: i * 1300});
    }

    // Warning packet (orange)
    const warningPacket = createPacket('packet packet-warning');
    warningPacket.style.offsetDistance = '0%';
    warningPacket.style.opacity = '0';

    // Dropped packet (red)
    const droppedPacket = createPacket('packet packet-drop');
    droppedPacket.style.opacity = '0';

    // Congestion Bar increments: from 0 to 100% and back to 30% cyclically
    const congStates = [
      {percent: 20, duration: 1200},
      {percent: 45, duration: 1300},
      {percent: 75, duration: 1400},
      {percent: 95, duration: 1600},
      {percent: 55, duration: 1300},
      {percent: 30, duration: 1200}
    ];

    // Returns a Promise that resolves after ms milliseconds
    function delay(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    // Animate single packet forward along path
    function animatePacket(packet, duration = 3500, startDelay = 0) {
      return new Promise(resolve => {
        packet.style.transition = 'none';
        packet.style.opacity = '0';
        packet.style.offsetDistance = '0%';

        // Trigger reflow for immediate style applying
        // eslint-disable-next-line no-unused-expressions
        packet.offsetWidth;

        setTimeout(() => {
          packet.style.transition = `offset-distance ${duration}ms linear, opacity 500ms ease-in-out`;
          packet.style.opacity = '1';
          packet.style.offsetDistance = '100%';

          // At 70% of duration, reduce opacity for fade effect
          setTimeout(() => {
            packet.style.opacity = '0';
          }, duration * 0.85);

          setTimeout(() => {
            resolve();
          }, duration + 150);
        }, startDelay);
      });
    }

    // Animate warning packet: slows and pulses on path then fades out
    async function animateWarningPacket() {
      return new Promise(resolve => {
        warningPacket.style.transition = 'none';
        warningPacket.style.opacity = '0';
        warningPacket.style.offsetDistance = '0%';

        // Reflow
        warningPacket.offsetWidth;

        warningPacket.style.transition = 'offset-distance 4s ease-in-out, opacity 400ms ease-in-out';
        warningPacket.style.opacity = '1';
        warningPacket.style.offsetDistance = '80%';

        let pulseCount = 0;

        function pulse() {
          warningPacket.animate([
            { transform: 'scale(1) rotate(0deg)', offset: 0 },
            { transform: 'scale(1.2) rotate(5deg)', offset: 0.5 },
            { transform: 'scale(1) rotate(0deg)', offset: 1 }
          ], {
            duration: 1200,
            iterations: 3,
            easing: 'ease-in-out'
          });

          pulseCount++;
        }

        setTimeout(() => pulse(), 600);

        setTimeout(() => {
          warningPacket.style.opacity = '0';
          setTimeout(() => resolve(), 800);
        }, 4000);
      });
    }

    // Animate dropped packet fading out near sender, simulating drop
    async function animateDroppedPacket() {
      return new Promise(resolve => {
        droppedPacket.style.transition = 'none';
        droppedPacket.style.opacity = '1';
        droppedPacket.setAttribute('cx', '150');
        droppedPacket.setAttribute('cy', '190');
        droppedPacket.style.transformOrigin = 'center';
        droppedPacket.style.transform = 'scale(1) rotate(0deg)';
        droppedPacket.style.willChange = 'transform, opacity';

        // Reflow
        droppedPacket.offsetWidth;

        droppedPacket.style.transition = 'opacity 1500ms ease-in, transform 1500ms ease-in';
        droppedPacket.style.opacity = '0';
        droppedPacket.style.transform = 'scale(0.3) rotate(30deg) translateY(22px)';

        setTimeout(() => {
          resolve();
        }, 1600);
      });
    }

    // Animate congestion bar with smooth linear interpolation between states
    async function animateCongestionBar() {
      for(let i=0; i<congStates.length; i++) {
        const state = congStates[i];
        congestionBar.style.transition = `width ${state.duration}ms ease-in-out`;
        congestionBar.style.width = `${state.percent}%`;
        congestionLabel.textContent = `Congestion Window: ${state.percent}%`;
        await delay(state.duration + 100);
      }
    }

    // Animate whole cycle
    async function startAnimationCycle() {
      if(animationRunning) return;
      animationRunning = true;
      startBtn.disabled = true;
      resetBtn.disabled = false;
      startBtn.setAttribute('aria-pressed', 'true');
      resetBtn.setAttribute('aria-pressed', 'false');

      // Loop packets with staggered start times, for 3 iterations
      for(let cycle=0; cycle < 3; cycle++) {
        // Animate green packets moving forward
        let packetPromises = [];
        for(let i=0; i<packets.length; i++){
          packetPromises.push(animatePacket(packets[i].el, 3800, packets[i].delay));
        }

        // Animate congestion bar increasing
        const congestionPromise = animateCongestionBar();

        // Wait until all packets finish
        await Promise.all(packetPromises.concat(congestionPromise));

        // Animate warning orange packet (congestion alert)
        await animateWarningPacket();

        // Animate congestion bar decrease partially
        congestionBar.style.transition = 'width 1200ms ease-in-out';
        congestionBar.style.width = '30%';
        congestionLabel.textContent = 'Congestion Window: 30%';
        await delay(1300);

        // Animate dropped red packet near sender
        await animateDroppedPacket();

        // Reset packets opacity
        packets.forEach(p => {
          p.el.style.transition = 'none';
          p.el.style.opacity = '0';
          p.el.style.offsetDistance = '0%';
        });
        warningPacket.style.opacity = '0';
        droppedPacket.style.opacity = '0';
      }

      startBtn.disabled = false;
      resetBtn.disabled = true;
      startBtn.setAttribute('aria-pressed', 'false');
      animationRunning = false;
    }

    // Reset visual elements to initial states
    function resetAnimation() {
      if(animationRunning) return;
      congestionBar.style.transition = 'width 800ms ease-in-out';
      congestionBar.style.width = '0%';
      congestionLabel.textContent = 'Congestion Window: 0%';

      packets.forEach(p => {
        p.el.style.transition = 'none';
        p.el.style.opacity = '0';
        p.el.style.offsetDistance = '0%';
      });

      warningPacket.style.opacity = '0';
      droppedPacket.style.opacity = '0';

      startBtn.disabled = false;
      resetBtn.disabled = true;
    }

    startBtn.addEventListener('click', startAnimationCycle);
    resetBtn.addEventListener('click', resetAnimation);

    // Initial congestion bar zero width
    resetAnimation();
  })();
</script>
</body>
</html>
