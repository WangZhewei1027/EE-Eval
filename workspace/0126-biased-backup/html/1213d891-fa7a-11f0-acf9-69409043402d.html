<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interactive Counting Sort Demo</title>
<style>
  body {
    font-family: monospace, monospace;
    white-space: pre-wrap;
  }
  button, input[type=number], input[type=text] {
    font-family: monospace, monospace;
    font-size: 1em;
    margin: 0 0.2em 0.3em 0.2em;
    padding: 0.15em 0.3em;
  }
  input[type=range] {
    width: 100px;
    vertical-align: middle;
  }
  .step-info {
    margin: 0.5em 0;
  }
  .array-container {
    margin: 0.5em 0 1em 0;
  }
  .array-item {
    display: inline-block;
    width: 2.5em;
    text-align: center;
    border: 1px solid black;
    margin: 0 0.1em;
    padding: 0.3em 0;
    user-select:none;
  }
  .array-item.highlight {
    font-weight: bold;
    text-decoration: underline;
  }
  .array-item.current {
    border: 2px solid black;
  }
  #log {
    margin-top: 1em;
    max-height: 120px;
    overflow-y: auto;
    border: 1px solid black;
    padding: 0.3em 0.5em;
    font-size: 0.9em;
    background: white;
  }
  label {
    user-select:none;
  }
</style>
</head>
<body>
<h1>Counting Sort Interactive Demonstration</h1>

<div>
  <label for="inputArray">Enter initial array (comma/space-separated integers):</label><br />
  <input type="text" id="inputArray" size="50" aria-label="Array input" placeholder="e.g. 4,3,2,8,3" />
  <button id="btnLoadArray">Load Array</button>
  <button id="btnRandomArray">Generate Random Array</button>
</div>

<div>
  <label for="minValue">Minimum Value (inclusive):</label>
  <input type="number" id="minValue" value="0" step="1" />
  <label for="maxValue">Maximum Value (inclusive):</label>
  <input type="number" id="maxValue" value="10" step="1" />
</div>

<div>
  <label for="arraySize">Array size:</label>
  <input type="number" id="arraySize" value="10" min="1" max="10000" step="1" />
</div>

<hr />

<div>
  <button id="btnStartSort" disabled>Start Counting Sort</button>
  <button id="btnStepBackward" disabled>Step Backward</button>
  <button id="btnStepForward" disabled>Step Forward</button>
  <button id="btnRunToEnd" disabled>Run to End</button>
  <button id="btnReset" disabled>Reset</button>
</div>

<div>
  <label for="speedRange">Automatic run speed (ms delay):</label>
  <input type="range" id="speedRange" min="100" max="2000" value="500" step="50" />
  <span id="speedDisplay">500</span> ms
  <button id="btnToggleAuto" disabled>Start Auto</button>
</div>

<hr />

<div>
  <div><strong>Current Step:</strong><span id="stepDesc">Not started</span></div>
</div>

<div class="array-container" aria-label="Input array container" id="inputArrayDisplay" role="region" aria-live="polite"></div>
<div class="array-container" aria-label="Count array container" id="countArrayDisplay" role="region" aria-live="polite"></div>
<div class="array-container" aria-label="Output array container" id="outputArrayDisplay" role="region" aria-live="polite"></div>

<hr />

<div>
  <strong>Controls to explore states:</strong>
  <div>
    <button id="btnViewInput">View Input Array</button>
    <button id="btnViewCount">View Count Array</button>
    <button id="btnViewOutput">View Output Array</button>
  </div>
  <div>
    <label for="viewIndexInput">Highlight element at index:</label>
    <input type="number" id="viewIndexInput" min="0" step="1" />
    <button id="btnHighlightIndex">Highlight</button>
    <button id="btnClearHighlight">Clear Highlight</button>
  </div>
</div>

<hr />
<div>
  <strong>Log / Explanation</strong>
  <div id="log" aria-live="polite" aria-atomic="true" role="log"></div>
</div>

<script>
(function() {
  'use strict';

  // Data containers
  let stateHistory = [];
  let currentStepIndex = -1;
  let autoRunnerId = null;

  // State format:
  // {
  //  phase: "init"|"counting"|"accumulating"|"place"|"finished"
  //  stepDetail: string
  //  inputArray: [...]
  //  countArray: [...]
  //  outputArray: [...]
  //  variables: object storing indices, values relevant to step
  // }

  // Elements references
  const inputArrayInput = document.getElementById('inputArray');
  const btnLoadArray = document.getElementById('btnLoadArray');
  const btnRandomArray = document.getElementById('btnRandomArray');
  const minValueInput = document.getElementById('minValue');
  const maxValueInput = document.getElementById('maxValue');
  const arraySizeInput = document.getElementById('arraySize');

  const btnStartSort = document.getElementById('btnStartSort');
  const btnStepForward = document.getElementById('btnStepForward');
  const btnStepBackward = document.getElementById('btnStepBackward');
  const btnRunToEnd = document.getElementById('btnRunToEnd');
  const btnReset = document.getElementById('btnReset');

  const speedRange = document.getElementById('speedRange');
  const speedDisplay = document.getElementById('speedDisplay');
  const btnToggleAuto = document.getElementById('btnToggleAuto');

  const stepDesc = document.getElementById('stepDesc');
  const inputArrayDisplay = document.getElementById('inputArrayDisplay');
  const countArrayDisplay = document.getElementById('countArrayDisplay');
  const outputArrayDisplay = document.getElementById('outputArrayDisplay');

  const btnViewInput = document.getElementById('btnViewInput');
  const btnViewCount = document.getElementById('btnViewCount');
  const btnViewOutput = document.getElementById('btnViewOutput');
  const viewIndexInput = document.getElementById('viewIndexInput');
  const btnHighlightIndex = document.getElementById('btnHighlightIndex');
  const btnClearHighlight = document.getElementById('btnClearHighlight');

  const logArea = document.getElementById('log');

  // Current "view mode" determines which array is displayed highlighted
  //  "input" | "count" | "output"
  let currentViewMode = "input";
  // Highlight index, for display
  let highlightIndex = null;

  // State management and helper functions

  // Parsing input array (returns null if invalid values)
  function parseInputArray(text) {
    // Split on comma or whitespace, ignoring empty parts
    const parts = text.split(/[\s,]+/).filter(p => p.length>0);
    const vals = [];
    for(let p of parts) {
      if(!/^[-+]?\d+$/.test(p)) {
        return null;
      }
      vals.push(parseInt(p,10));
    }
    return vals;
  }

  // Clamp a number between min and max (if min>max return null)
  function clampNum(n,min,max) {
    if(min>max) return null;
    if(n<min) return min;
    if(n>max) return max;
    return n;
  }

  // Log helper
  function log(message) {
    // Append message + newline
    logArea.textContent += message + "\n";
    logArea.scrollTop = logArea.scrollHeight;
  }

  // Clear log
  function clearLog() {
    logArea.textContent = "";
  }

  // Display an array in the container - array parameter is array of numbers
  // highlightIndex - index to highlight with bold/underline
  // currentIndex - index with thicker border
  // container is the container element to hold the array items
  function displayArray(container, arr, highlightIndex=null, currentIndex=null) {
    container.innerHTML = "";
    if(!arr || arr.length === 0) {
      container.textContent = "(empty)";
      return;
    }
    for(let i=0; i<arr.length; i++) {
      const div = document.createElement('div');
      div.textContent = arr[i];
      div.className = 'array-item';
      div.setAttribute('data-index', i);
      if(i === highlightIndex) div.classList.add('highlight');
      if(i === currentIndex) div.classList.add('current');
      container.appendChild(div);
    }
  }

  // Show array view based on currentViewMode with highlightIndex if any
  function showCurrentView() {
    if(currentViewMode === "input") {
      const state = stateHistory[currentStepIndex];
      if(!state) {
        inputArrayDisplay.innerHTML = "(no input array)";
      } else {
        displayArray(inputArrayDisplay, state.inputArray, highlightIndex, state.variables && state.variables.inputIndex);
      }
      countArrayDisplay.innerHTML = "";
      outputArrayDisplay.innerHTML = "";
    } else if(currentViewMode === "count") {
      const state = stateHistory[currentStepIndex];
      if(!state) {
        countArrayDisplay.innerHTML = "(no count array)";
      } else {
        displayArray(countArrayDisplay, state.countArray, highlightIndex, state.variables && state.variables.countIndex);
      }
      inputArrayDisplay.innerHTML = "";
      outputArrayDisplay.innerHTML = "";
    } else if(currentViewMode === "output") {
      const state = stateHistory[currentStepIndex];
      if(!state) {
        outputArrayDisplay.innerHTML = "(no output array)";
      } else {
        displayArray(outputArrayDisplay, state.outputArray, highlightIndex, state.variables && state.variables.outputIndex);
      }
      inputArrayDisplay.innerHTML = "";
      countArrayDisplay.innerHTML = "";
    }
  }

  // Disable or enable main controls based on active state
  function updateControlState() {
    const hasHistory = stateHistory.length > 0;
    btnStartSort.disabled = hasHistory;
    btnStepForward.disabled = !hasHistory || currentStepIndex >= stateHistory.length-1;
    btnStepBackward.disabled = !hasHistory || currentStepIndex <= 0;
    btnRunToEnd.disabled = !hasHistory || currentStepIndex >= stateHistory.length-1;
    btnReset.disabled = !hasHistory;
    btnToggleAuto.disabled = !hasHistory;
    btnViewInput.disabled = !hasHistory;
    btnViewCount.disabled = !hasHistory;
    btnViewOutput.disabled = !hasHistory;
    btnHighlightIndex.disabled = !hasHistory;
    btnClearHighlight.disabled = !hasHistory;
  }

  // Validate min/max for counting sort
  function validateMinMax() {
    const minV = parseInt(minValueInput.value,10);
    const maxV = parseInt(maxValueInput.value,10);
    if(isNaN(minV) || isNaN(maxV) || minV > maxV) return false;
    return true;
  }

  // Validate array size
  function validateArraySize() {
    const sizeV = parseInt(arraySizeInput.value,10);
    if(isNaN(sizeV) || sizeV < 1 || sizeV > 10000) return false;
    return true;
  }

  // Generate random array respecting range and size, returns array
  function generateRandomArray(size, min, max) {
    const arr = [];
    for(let i=0; i<size; i++) {
      arr.push(Math.floor(Math.random()*(max - min +1)) + min);
    }
    return arr;
  }

  // ##########################
  // Counting Sort Algorithm and Step Generation
  // ##########################
  // We model the counting sort as a sequence of small-step states with descriptions.
  // This allows very fine-grained stepping and exploring the internal arrays.

  // We store all steps in stateHistory and move forward/backward on them.

  // Counting sort steps overview:
  // 1. Start - load input array, initialize count array to zeros
  // 2. Counting phase - For each element in input array, increment count array bucket
  // 3. Accumulating phase - For i in [1..count.length-1], accumulate counts into prefix sums
  // 4. Output building phase - traverse input array backward, place elements to output array per count, decrement count
  // 5. Finished

  // We implement a step generator that from input array and min/max generates the full sequence of states.

  // Helper to create deep copy
  function deepCopy(obj) {
    return JSON.parse(JSON.stringify(obj));
  }

  // Create base initial state with arrays initialized
  function createInitialState(inputArray, minVal, maxVal) {
    const countLength = maxVal - minVal +1;
    const countArray = new Array(countLength).fill(0);
    const outputArray = new Array(inputArray.length).fill(null);
    return {
      phase: "init",
      stepDetail: "Initial state before counting.",
      inputArray: inputArray.slice(),
      countArray: countArray,
      outputArray: outputArray,
      variables: {
        minVal: minVal,
        maxVal: maxVal,
        countLength: countLength,
        inputIndex: -1,
        countIndex: -1,
        outputIndex: -1,
        placeInputIndex: -1,
        placeCountIndex: -1
      }
    };
  }

  // Generate all states step by step returns an array of states
  function generateCountingSortStates(inputArray, minVal, maxVal) {
    const states = [];
    const countLength = maxVal - minVal +1;
    const n = inputArray.length;
    const countArray = new Array(countLength).fill(0);
    const outputArray = new Array(n).fill(null);

    let variables = {
      minVal: minVal,
      maxVal: maxVal,
      countLength: countLength,
      inputIndex: -1,
      countIndex: -1,
      outputIndex: -1,
      placeInputIndex: -1,
      placeCountIndex: -1
    };

    // Initial state
    states.push({
      phase: "init",
      stepDetail: "Initial state before counting. Count array initialized to zeros.",
      inputArray: inputArray.slice(),
      countArray: countArray.slice(),
      outputArray: outputArray.slice(),
      variables: deepCopy(variables)
    });

    // 1. Counting phase: count occurrences
    for(let i=0; i<n; i++) {
      variables.inputIndex = i;
      const val = inputArray[i];
      const countPos = val - minVal;
      variables.countIndex = countPos;
      countArray[countPos]++;
      states.push({
        phase: "counting",
        stepDetail: `Counting phase: processing input index ${i} (value ${val}). Increment countArray[${countPos}] to ${countArray[countPos]}.`,
        inputArray: inputArray.slice(),
        countArray: countArray.slice(),
        outputArray: outputArray.slice(),
        variables: deepCopy(variables)
      });
    }

    // 2. Accumulating phase: prefix sums in count array
    variables.inputIndex = -1;
    variables.countIndex = 0;
    for(let i=1; i<countLength; i++) {
      variables.countIndex = i;
      const oldVal = countArray[i];
      countArray[i] = countArray[i] + countArray[i-1];
      states.push({
        phase: "accumulating",
        stepDetail: `Accumulating phase: updating countArray[${i}] = countArray[${i}] (${oldVal}) + countArray[${i-1}] (${countArray[i-1]}) = ${countArray[i]}.`,
        inputArray: inputArray.slice(),
        countArray: countArray.slice(),
        outputArray: outputArray.slice(),
        variables: deepCopy(variables)
      });
    }
    variables.countIndex = -1;

    // 3. Output building phase:
    // Traverse input array backwards placing elements correctly
    for(let i=n-1; i>=0; i--) {
      variables.placeInputIndex = i;
      const val = inputArray[i];
      const pos = val - minVal;
      variables.placeCountIndex = pos;
      // The index for placement in output is countArray[pos]-1
      const placeIndex = countArray[pos] - 1;
      variables.outputIndex = placeIndex;
      outputArray[placeIndex] = val;
      countArray[pos] = countArray[pos] - 1;

      states.push({
        phase: "place",
        stepDetail: `Output building phase: placing input[${i}] = ${val} at output[${placeIndex}]. Decrement countArray[${pos}] to ${countArray[pos]}.`,
        inputArray: inputArray.slice(),
        countArray: countArray.slice(),
        outputArray: outputArray.slice(),
        variables: deepCopy(variables)
      });
    }
    variables.placeInputIndex = -1;
    variables.placeCountIndex = -1;
    variables.outputIndex = -1;

    // 4. Finished
    states.push({
      phase: "finished",
      stepDetail: "Counting sort completed successfully. Output array is sorted.",
      inputArray: inputArray.slice(),
      countArray: countArray.slice(),
      outputArray: outputArray.slice(),
      variables: deepCopy(variables)
    });

    return states;
  }


  // Update the UI for current step index
  function updateUIForCurrentStep() {
    if(currentStepIndex < 0 || currentStepIndex >= stateHistory.length) {
      stepDesc.textContent = "No sorting steps available.";
      inputArrayDisplay.innerHTML = "";
      countArrayDisplay.innerHTML = "";
      outputArrayDisplay.innerHTML = "";
      highlightIndex = null;
      updateControlState();
      return;
    }
    const state = stateHistory[currentStepIndex];
    stepDesc.textContent = `[${currentStepIndex+1} / ${stateHistory.length}] ${state.stepDetail}`;

    showCurrentView();

    // Scroll log to bottom to see last message (already done in log)
    updateControlState();
  }

  // Advance forward one step if possible
  function stepForward() {
    if(currentStepIndex < stateHistory.length-1) {
      currentStepIndex++;
      updateUIForCurrentStep();
    }
  }

  // Step backward one step if possible
  function stepBackward() {
    if(currentStepIndex > 0) {
      currentStepIndex--;
      updateUIForCurrentStep();
    }
  }

  // Reset everything
  function resetAll() {
    if(autoRunnerId) {
      clearInterval(autoRunnerId);
      autoRunnerId = null;
      btnToggleAuto.textContent = "Start Auto";
    }
    stateHistory = [];
    currentStepIndex = -1;
    highlightIndex = null;
    currentViewMode = "input";
    clearLog();
    inputArrayDisplay.innerHTML = "";
    countArrayDisplay.innerHTML = "";
    outputArrayDisplay.innerHTML = "";
    stepDesc.textContent = "Not started";
    updateControlState();
  }

  // Auto runner start/stop toggle
  function toggleAutoRun() {
    if(autoRunnerId) {
      clearInterval(autoRunnerId);
      autoRunnerId = null;
      btnToggleAuto.textContent = "Start Auto";
      btnStepForward.disabled = false;
      btnStepBackward.disabled = false;
      btnRunToEnd.disabled = false;
      btnStartSort.disabled = true;
    } else {
      const delay = parseInt(speedRange.value, 10);
      btnToggleAuto.textContent = "Stop Auto";
      btnStepForward.disabled = true;
      btnStepBackward.disabled = true;
      btnRunToEnd.disabled = true;
      btnStartSort.disabled = true;
      autoRunnerId = setInterval(() => {
        if(currentStepIndex >= stateHistory.length -1) {
          clearInterval(autoRunnerId);
          autoRunnerId = null;
          btnToggleAuto.textContent = "Start Auto";
          updateControlState();
          return;
        }
        stepForward();
      }, delay);
    }
  }

  // Handle controls event listeners

  btnLoadArray.addEventListener('click', () => {
    resetAll();
    clearLog();
    const arr = parseInputArray(inputArrayInput.value);
    if(arr === null) {
      alert("Invalid array input. Use only integers separated by commas or spaces.");
      return;
    }
    // Validate min/max
    if(!validateMinMax()) {
      alert("Invalid minimum or maximum value inputs.");
      return;
    }
    const minV = parseInt(minValueInput.value, 10);
    const maxV = parseInt(maxValueInput.value, 10);
    // Check if all values within min/max range
    for(let v of arr) {
      if(v < minV || v > maxV) {
        alert(`Array element ${v} is out of range [${minV}, ${maxV}].`);
        return;
      }
    }
    stateHistory = [];
    currentStepIndex = -1;
    highlightIndex = null;
    currentViewMode = "input";
    clearLog();
    log("Loaded input array: " + arr.join(", "));
    displayArray(inputArrayDisplay, arr);
    countArrayDisplay.innerHTML = "";
    outputArrayDisplay.innerHTML = "";
    stepDesc.textContent = "Array loaded. Ready to start Counting Sort.";
    btnStartSort.disabled = false;
    btnStepForward.disabled = true;
    btnStepBackward.disabled = true;
    btnRunToEnd.disabled = true;
    btnReset.disabled = true;
    btnToggleAuto.disabled = true;
    btnViewInput.disabled = true;
    btnViewCount.disabled = true;
    btnViewOutput.disabled = true;
    btnHighlightIndex.disabled = true;
    btnClearHighlight.disabled = true;
  });

  btnRandomArray.addEventListener('click', () => {
    resetAll();
    clearLog();
    if(!validateMinMax() || !validateArraySize()) {
      alert("Invalid inputs for min, max, or array size.");
      return;
    }
    const minV = parseInt(minValueInput.value,10);
    const maxV = parseInt(maxValueInput.value,10);
    const sizeV = parseInt(arraySizeInput.value,10);
    const arr = generateRandomArray(sizeV, minV, maxV);
    inputArrayInput.value = arr.join(", ");
    stateHistory = [];
    currentStepIndex = -1;
    highlightIndex = null;
    currentViewMode = "input";
    clearLog();
    log("Random array generated: " + arr.join(", "));
    displayArray(inputArrayDisplay, arr);
    countArrayDisplay.innerHTML = "";
    outputArrayDisplay.innerHTML = "";
    stepDesc.textContent = "Random array loaded. Ready to start Counting Sort.";
    btnStartSort.disabled = false;
    btnStepForward.disabled = true;
    btnStepBackward.disabled = true;
    btnRunToEnd.disabled = true;
    btnReset.disabled = true;
    btnToggleAuto.disabled = true;
    btnViewInput.disabled = true;
    btnViewCount.disabled = true;
    btnViewOutput.disabled = true;
    btnHighlightIndex.disabled = true;
    btnClearHighlight.disabled = true;
  });

  btnStartSort.addEventListener('click', () => {
    clearLog();
    const arr = parseInputArray(inputArrayInput.value);
    if(arr === null) {
      alert("Invalid array input before sorting.");
      return;
    }
    if(!validateMinMax()) {
      alert("Invalid minimum or maximum value inputs.");
      return;
    }
    const minV = parseInt(minValueInput.value, 10);
    const maxV = parseInt(maxValueInput.value, 10);
    // Check if all values within min/max range
    for(let v of arr) {
      if(v < minV || v > maxV) {
        alert(`Array element ${v} is out of range [${minV}, ${maxV}].`);
        return;
      }
    }
    stateHistory = generateCountingSortStates(arr, minV, maxV);
    currentStepIndex = 0;
    highlightIndex = null;
    currentViewMode = "input";
    log("Counting Sort started.");
    updateUIForCurrentStep();
    btnStartSort.disabled = true;
    btnReset.disabled = false;
  });

  btnStepForward.addEventListener('click', () => {
    stepForward();
  });

  btnStepBackward.addEventListener('click', () => {
    stepBackward();
  });

  btnRunToEnd.addEventListener('click', () => {
    while(currentStepIndex < stateHistory.length-1) {
      currentStepIndex++;
    }
    updateUIForCurrentStep();
  });

  btnReset.addEventListener('click', () => {
    resetAll();
    inputArrayDisplay.innerHTML = "";
    countArrayDisplay.innerHTML = "";
    outputArrayDisplay.innerHTML = "";
    stepDesc.textContent = "Reset done. Load or generate array.";
    inputArrayInput.value = "";
    btnStartSort.disabled = true;
  });

  speedRange.addEventListener('input', () => {
    speedDisplay.textContent = speedRange.value;
    // If running auto adjust interval
    if(autoRunnerId) {
      clearInterval(autoRunnerId);
      autoRunnerId = setInterval(() => {
        if(currentStepIndex >= stateHistory.length -1) {
          clearInterval(autoRunnerId);
          autoRunnerId = null;
          btnToggleAuto.textContent = "Start Auto";
          updateControlState();
          return;
        }
        stepForward();
      }, parseInt(speedRange.value,10));
    }
  });

  btnToggleAuto.addEventListener('click', () => {
    toggleAutoRun();
  });

  // View mode controls and highlight

  btnViewInput.addEventListener('click', () => {
    currentViewMode = "input";
    highlightIndex = null;
    showCurrentView();
  });
  btnViewCount.addEventListener('click', () => {
    currentViewMode = "count";
    highlightIndex = null;
    showCurrentView();
  });
  btnViewOutput.addEventListener('click', () => {
    currentViewMode = "output";
    highlightIndex = null;
    showCurrentView();
  });

  btnHighlightIndex.addEventListener('click', () => {
    const idx = Number(viewIndexInput.value);
    if(isNaN(idx) || idx < 0) {
      alert("Highlight index must be a non-negative integer.");
      return;
    }
    // Check bounds for current view
    const state = stateHistory[currentStepIndex];
    if(!state) {
      alert("No sorting state loaded.");
      return;
    }
    let maxLen = 0;
    if(currentViewMode === "input") maxLen = state.inputArray.length;
    else if(currentViewMode === "count") maxLen = state.countArray.length;
    else if(currentViewMode === "output") maxLen = state.outputArray.length;
    else {
      alert("Invalid view mode for highlight.");
      return;
    }
    if(idx >= maxLen) {
      alert(`Highlight index out of bounds for current view (max index ${maxLen-1}).`);
      return;
    }
    highlightIndex = idx;
    showCurrentView();
  });

  btnClearHighlight.addEventListener('click', () => {
    highlightIndex = null;
    showCurrentView();
  });

  // Initial setup
  resetAll();

  // Accessibility notes:
  // - aria-live for outputs ensures messages are read by screen readers.
  // - inputs and buttons have labels.
  // - monospace font and minimal styles to keep clarity.

})();
</script>
</body>
</html>
