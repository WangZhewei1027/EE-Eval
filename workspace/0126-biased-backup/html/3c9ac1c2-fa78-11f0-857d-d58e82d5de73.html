<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Software Development Life Cycle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Roboto+Slab:wght@700&display=swap');

  /* Reset and base */
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Poppins', sans-serif;
    color: #e8eaf6;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.5rem 4rem;
    user-select: none;
  }

  h1 {
    font-family: 'Roboto Slab', serif;
    font-size: 3.25rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
    text-align: center;
    text-transform: uppercase;
    color: #ffdd57;
    text-shadow:
      0 0 10px #ffdd57aa,
      0 0 30px #ffdd57cc,
      0 0 50px #ffdd57ee;
  }

  h2 {
    font-weight: 600;
    font-size: 1.25rem;
    letter-spacing: 0.06em;
    margin-top: 1rem;
    margin-bottom: 0.25rem;
    color: #e8eaf6cc;
  }

  main {
    max-width: 1000px;
    width: 100%;
    margin-top: 2rem;
    position: relative;
  }

  /* The cycle container */
  .cycle-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 900px;
    margin: 0 auto 3rem;
  }

  /* Circular path */
  svg#cycle-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Step circles */
  .step-circle {
    cursor: default;
    filter: drop-shadow(0 0 5px rgba(255 221 87 / 0.7));
    transition: transform 0.35s cubic-bezier(.4,0,.2,1), filter 0.35s ease;
  }

  .step-circle:hover {
    transform: scale(1.15);
    filter: drop-shadow(0 0 15px rgba(255 221 87 / 1));
  }

  .step-label {
    user-select: none;
    fill: #ffdd57;
    font-weight: 600;
    font-size: 1.15rem;
    letter-spacing: 0.03em;
    filter: drop-shadow(0 0 3px #111a27bb);
    pointer-events: none;
  }

  /* Connecting arrows */
  .arrow-path {
    fill: none;
    stroke: #ffdd57cc;
    stroke-width: 4;
    filter: drop-shadow(0 0 5px #ffdd57aa);
    marker-end: url(#arrowhead);
    transform-origin: center;
    transition: stroke 0.3s ease;
  }

  /* Step info box */
  .info-box {
    background: linear-gradient(145deg, #203a43, #2c5364);
    border-radius: 1rem;
    color: #f0f4ff;
    padding: 1.5rem 2rem;
    box-shadow:
      0 0 20px #ffdd5711,
      inset 0 0 15px #121f2a88;
    max-width: 480px;
    text-align: center;
    margin: 0 auto;
    font-size: 1rem;
    line-height: 1.45;
    font-weight: 400;
    letter-spacing: 0.02em;
    user-select: text;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: background 0.4s ease;
  }

  /* Highlight the step title in info */
  .info-box strong {
    color: #ffdd57;
    font-weight: 700;
    font-size: 1.15rem;
    margin-bottom: 0.4rem;
    letter-spacing: 0.04em;
  }

  /* Footer with button */
  footer {
    margin-top: auto;
    user-select: none;
  }

  button#nextButton {
    background: #ffdd57;
    border: none;
    border-radius: 30px;
    padding: 0.7rem 2.4rem;
    font-weight: 600;
    font-size: 1.15rem;
    color: #121212;
    cursor: pointer;
    box-shadow:
      0 6px 15px #ffdd5788,
      inset 0 -2px 6px #efa918;
    transition: background-color 0.35s ease, box-shadow 0.35s ease, transform 0.2s ease;
    user-select: none;
  }

  button#nextButton:hover {
    background: #ffea85;
    box-shadow:
      0 9px 20px #ffea8588,
      inset 0 -4px 10px #f1c935;
    transform: translateY(-2px);
  }

  /* Responsive text scaling */
  @media (max-width: 580px) {
    h1 {
      font-size: 2.1rem;
    }
    .step-label {
      font-size: 0.9rem;
    }
    .info-box {
      max-width: 90vw;
      font-size: 0.9rem;
      min-height: 120px;
    }
  }
</style>
</head>
<body>
  <h1>Software Development Life Cycle</h1>
  <main>
    <div class="cycle-wrapper" aria-label="Software Development Life Cycle diagram" role="img">
      <svg id="cycle-svg" viewBox="0 0 900 900" aria-hidden="true" focusable="false" >
        <defs>
          <marker id="arrowhead" markerWidth="12" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L10,5 L0,10 z" fill="#ffdd57cc"/>
          </marker>
        </defs>
        <!-- Circular path -->
        <circle cx="450" cy="450" r="330" stroke="rgba(255, 221, 87, 0.25)" stroke-width="5" fill="none" />

        <!-- Arrows between steps -->
        <path class="arrow-path" id="arrow1" d="M675 240 A330 330 0 0 1 706 450" />
        <path class="arrow-path" id="arrow2" d="M706 450 A330 330 0 0 1 573 662" />
        <path class="arrow-path" id="arrow3" d="M573 662 A330 330 0 0 1 285 706" />
        <path class="arrow-path" id="arrow4" d="M285 706 A330 330 0 0 1 100 450" />
        <path class="arrow-path" id="arrow5" d="M100 450 A330 330 0 0 1 210 244" />
        <path class="arrow-path" id="arrow6" d="M210 244 A330 330 0 0 1 378 197" />
        <path class="arrow-path" id="arrow7" d="M378 197 A330 330 0 0 1 675 240" />

        <!-- Steps circles -->
        <circle class="step-circle" id="step0" cx="675" cy="240" r="48" fill="#ffdd57" />
        <circle class="step-circle" id="step1" cx="706" cy="450" r="48" fill="#ffdd57" />
        <circle class="step-circle" id="step2" cx="573" cy="662" r="48" fill="#ffdd57" />
        <circle class="step-circle" id="step3" cx="285" cy="706" r="48" fill="#ffdd57" />
        <circle class="step-circle" id="step4" cx="100" cy="450" r="48" fill="#ffdd57" />
        <circle class="step-circle" id="step5" cx="210" cy="244" r="48" fill="#ffdd57" />
        <circle class="step-circle" id="step6" cx="378" cy="197" r="48" fill="#ffdd57" />

        <!-- Step labels -->
        <text class="step-label" x="675" y="248" text-anchor="middle" dominant-baseline="middle">Planning</text>
        <text class="step-label" x="706" y="458" text-anchor="middle" dominant-baseline="middle">Analysis</text>
        <text class="step-label" x="573" y="670" text-anchor="middle" dominant-baseline="middle">Design</text>
        <text class="step-label" x="285" y="714" text-anchor="middle" dominant-baseline="middle">Implementation</text>
        <text class="step-label" x="100" y="458" text-anchor="middle" dominant-baseline="middle">Testing</text>
        <text class="step-label" x="210" y="252" text-anchor="middle" dominant-baseline="middle">Deployment</text>
        <text class="step-label" x="378" y="205" text-anchor="middle" dominant-baseline="middle">Maintenance</text>
      </svg>
    </div>

    <section class="info-box" aria-live="polite" aria-atomic="true" id="infoBox">
      <strong>Planning</strong>
      <p>Defining the project objectives, scope, and feasibility to set a clear roadmap for the software development.</p>
    </section>
  </main>

  <footer>
    <button id="nextButton" aria-label="Show next Software Development Life Cycle phase">Next Phase &rarr;</button>
  </footer>

<script>
  (() => {
    const phases = [
      {
        title: 'Planning',
        info: 'Defining the project objectives, scope, and feasibility to set a clear roadmap for the software development.'
      },
      {
        title: 'Analysis',
        info: 'Gathering and analyzing requirements from stakeholders to understand what the software must achieve.'
      },
      {
        title: 'Design',
        info: 'Creating architecture, user interfaces, and detailed plans to guide the development process effectively.'
      },
      {
        title: 'Implementation',
        info: 'Writing clean, efficient code and integrating components to build the functional software system.'
      },
      {
        title: 'Testing',
        info: 'Verifying and validating the software to identify and fix bugs ensuring quality and reliability.'
      },
      {
        title: 'Deployment',
        info: 'Releasing the software to the production environment making it available to end users.'
      },
      {
        title: 'Maintenance',
        info: 'Ongoing updates and improvements post-deployment to adapt the software to evolving needs.'
      }
    ];

    const infoBox = document.getElementById('infoBox');
    const nextBtn = document.getElementById('nextButton');
    const stepCircles = Array.from(document.querySelectorAll('.step-circle'));
    const stepLabels = Array.from(document.querySelectorAll('.step-label'));

    let currentIndex = 0;

    // Highlight function
    function highlightStep(index) {
      stepCircles.forEach((circle, i) => {
        if (i === index) {
          circle.setAttribute('fill', '#fff176');
          circle.style.filter = 'drop-shadow(0 0 20px #fff176cc)';
          circle.style.transform = 'scale(1.25)';
        } else {
          circle.setAttribute('fill', '#ffdd57');
          circle.style.filter = 'drop-shadow(0 0 5px rgba(255 221 87 / 0.7))';
          circle.style.transform = 'scale(1)';
        }
      });
      stepLabels.forEach((label, i) => {
        label.setAttribute('fill', i === index ? '#fff8e1' : '#ffdd57');
        label.style.filter = i === index ? 'drop-shadow(0 0 7px #fff8e1dd)' : 'drop-shadow(0 0 3px #111a27bb)';
      });
      infoBox.querySelector('strong').textContent = phases[index].title;
      infoBox.querySelector('p').textContent = phases[index].info;

      // Animate info box background briefly on change
      infoBox.animate([
        { backgroundColor: 'rgba(255, 221, 87, 0.2)' },
        { backgroundColor: 'linear-gradient(145deg, #203a43, #2c5364)' }
      ], {
        duration: 700,
        easing: 'ease-out'
      });
    }

    nextBtn.addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % phases.length;
      highlightStep(currentIndex);
    });

    // Initialize highlight on load
    highlightStep(currentIndex);
  })();
</script>
</body>
</html>
