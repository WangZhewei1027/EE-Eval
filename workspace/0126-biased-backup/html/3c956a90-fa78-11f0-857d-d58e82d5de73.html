<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Linked List Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

  /* Root variables for easy theming */
  :root {
    --bg-dark: #0f172a;
    --bg-gradient-start: #0f172a;
    --bg-gradient-end: #1e293b;
    --node-bg: #2563eb;
    --node-border: #3b82f6;
    --node-shadow: rgba(37, 99, 235, 0.65);
    --pointer-color: #facc15;
    --text-primary: #e0e7ff;
    --text-secondary: #93c5fd;
    --font-family: 'Poppins', sans-serif;
    --btn-bg: #3b82f6;
    --btn-bg-hover: #2563eb;
    --btn-text: #f0f9ff;
  }

  /* Reset and base styles */
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
    font-family: var(--font-family);
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 3rem;
    user-select: none;
  }

  main {
    max-width: 900px;
    width: 100%;
    text-align: center;
  }

  header {
    margin-bottom: 3rem;
    letter-spacing: 0.15em;
  }

  header h1 {
    font-weight: 600;
    font-size: 3.6rem;
    line-height: 1.1;
    color: var(--text-primary);
    filter: drop-shadow(0 0 8px #60a5fa88);
  }

  header p {
    margin-top: 0.6rem;
    font-weight: 300;
    font-size: 1.15rem;
    color: var(--text-secondary);
    font-style: italic;
  }

  /* Linked list container */
  .linked-list {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4rem;
    padding: 1rem 0;
  }

  /* Node container with relative to position arrows */
  .node {
    background: linear-gradient(145deg, #1a40d8, #345ed9);
    border-radius: 1.25rem;
    box-shadow:
      0 5px 15px var(--node-shadow),
      inset 0 0 10px #60a5faaa;
    width: 130px;
    height: 130px;
    filter: drop-shadow(0 0 12px #60a5faf2);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    transition: transform 0.4s ease;
  }

  .node:hover {
    transform: scale(1.1);
    box-shadow:
      0 8px 25px var(--node-shadow),
      inset 0 0 18px #93c5fdcc;
  }

  .node .label {
    font-weight: 600;
    color: #dbeafe;
    font-size: 1.1rem;
    user-select: none;
    margin-bottom: 0.6rem;
    letter-spacing: 0.05em;
    text-shadow: 0 0 4px #bfdbfeaa;
  }

  .node .value {
    font-family: 'Courier New', Courier, monospace;
    font-size: 2.7rem;
    color: #bfdbfe;
    font-weight: 700;
    text-shadow:
      0 0 4px #93c5fddd,
      0 0 12px #60a5faee;
  }

  /* Special null node styling */
  .node.null-node {
    background: linear-gradient(145deg, #6b7280, #4b5563);
    box-shadow:
      0 5px 15px rgba(75, 85, 99, 0.7),
      inset 0 0 10px #9ca3afaa;
  }

  .node.null-node .value {
    font-size: 1.6rem;
    font-weight: 600;
    color: #cbd5e1;
    user-select: none;
    text-shadow: none;
  }

  /* Arrow style */
  .arrow {
    position: absolute;
    top: 50%;
    right: -90px;
    width: 80px;
    height: 12px;
    display: flex;
    align-items: center;
    transform: translateY(-50%);
    filter: drop-shadow(0 0 5px var(--pointer-color));
  }

  .arrow line {
    stroke: var(--pointer-color);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 140;
    stroke-dashoffset: 140;
    animation: dash 1.6s forwards ease-in-out;
  }
  .arrow polygon {
    fill: var(--pointer-color);
    opacity: 0;
    animation: fadeInArrow 0.5s forwards ease-in-out;
    animation-delay: 1.6s;
  }
  .arrow.delay-1 line {
    animation-delay: 0.3s;
  }
  .arrow.delay-2 line {
    animation-delay: 0.6s;
  }
  .arrow.delay-3 line {
    animation-delay: 0.9s;
  }

  @keyframes dash {
    to {
      stroke-dashoffset: 0;
    }
  }
  @keyframes fadeInArrow {
    to {
      opacity: 1;
    }
  }

  /* Controls */
  .controls {
    margin-top: 4rem;
  }

  button {
    cursor: pointer;
    background: var(--btn-bg);
    border: none;
    padding: 0.9rem 2rem;
    border-radius: 9999px;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--btn-text);
    box-shadow:
      0 4px 14px #2563ebcc;
    transition: all 0.3s ease;
    user-select: none;
    letter-spacing: 0.05em;
  }
  button:focus {
    outline: 3px solid #fde68a;
    outline-offset: 4px;
  }
  button:hover {
    background: var(--btn-bg-hover);
    box-shadow:
      0 6px 20px #1d4ed8cc;
  }
  button:active {
    transform: scale(0.97);
  }

  /* Subtle fade transition on value changes */
  .node .value {
    transition: color 0.6s ease, text-shadow 0.6s ease;
  }

  /* Footer info */
  footer {
    margin-top: 6rem;
    font-size: 0.875rem;
    color: var(--text-secondary);
    opacity: 0.6;
    font-weight: 300;
    letter-spacing: 0.09em;
    user-select: none;
  }
</style>
</head>
<body>
<main role="main" aria-label="Linked List Visualization">
  <header>
    <h1>Linked List</h1>
    <p>Sequential nodes linked by pointers</p>
  </header>

  <section class="linked-list" aria-label="Linked list diagram">
    <!-- Node 1 -->
    <div class="node" id="node-0" aria-label="Node 1">
      <div class="label">Node</div>
      <div class="value" aria-live="polite" aria-atomic="true">10</div>
      <svg class="arrow delay-1" aria-hidden="true" width="80" height="12" viewBox="0 0 80 12" fill="none" xmlns="http://www.w3.org/2000/svg" >
        <line x1="2" y1="6" x2="78" y2="6" />
        <polygon points="65,2 78,6 65,10" />
      </svg>
    </div>

    <!-- Node 2 -->
    <div class="node" id="node-1" aria-label="Node 2">
      <div class="label">Node</div>
      <div class="value" aria-live="polite" aria-atomic="true">23</div>
      <svg class="arrow delay-2" aria-hidden="true" width="80" height="12" viewBox="0 0 80 12" fill="none" xmlns="http://www.w3.org/2000/svg" >
        <line x1="2" y1="6" x2="78" y2="6" />
        <polygon points="65,2 78,6 65,10" />
      </svg>
    </div>

    <!-- Node 3 -->
    <div class="node" id="node-2" aria-label="Node 3">
      <div class="label">Node</div>
      <div class="value" aria-live="polite" aria-atomic="true">35</div>
      <svg class="arrow delay-3" aria-hidden="true" width="80" height="12" viewBox="0 0 80 12" fill="none" xmlns="http://www.w3.org/2000/svg" >
        <line x1="2" y1="6" x2="78" y2="6" />
        <polygon points="65,2 78,6 65,10" />
      </svg>
    </div>

    <!-- Null Node -->
    <div class="node null-node" aria-label="Null pointer (end)">
      <div class="label">NULL</div>
      <div class="value" aria-hidden="true">∅</div>
    </div>
  </section>

  <div class="controls" aria-label="Linked list controls">
    <button id="btn-change" aria-pressed="false">Change Values</button>
  </div>

  <footer>
    &copy; 2024 &nbsp;&bull;&nbsp; Visual Learning
  </footer>
</main>

<script>
  (() => {
    const valuesSets = [
      [10, 23, 35],
      [7, 14, 21],
      [19, 42, 58],
      [5, 11, 18],
    ];
    let currentIndex = 0;

    const btn = document.getElementById('btn-change');
    const nodes = [
      document.querySelector('#node-0 .value'),
      document.querySelector('#node-1 .value'),
      document.querySelector('#node-2 .value'),
    ];

    btn.addEventListener('click', () => {
      // Cycle to next values set
      currentIndex = (currentIndex + 1) % valuesSets.length;
      const newValues = valuesSets[currentIndex];

      nodes.forEach((nodeValueEl, i) => {
        // Animate color pulse for update
        nodeValueEl.style.color = 'var(--pointer-color)';
        nodeValueEl.style.textShadow = '0 0 10px var(--pointer-color)';
        setTimeout(() => {
          nodeValueEl.textContent = newValues[i];
          // Return to normal styles smoothly
          nodeValueEl.style.color = '';
          nodeValueEl.style.textShadow = '';
        }, 300);
      });

      // Toggle aria-pressed for accessibility
      const pressedState = btn.getAttribute('aria-pressed') === 'true';
      btn.setAttribute('aria-pressed', String(!pressedState));
    });
  })();
</script>
</body>
</html>
