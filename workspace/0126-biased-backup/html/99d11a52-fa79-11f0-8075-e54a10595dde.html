<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Decision Tree</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .question { margin: 10px 0; }
        .result { margin-top: 20px; }
    </style>
</head>
<body>

<h1>Interactive Decision Tree</h1>

<div id="decision-tree">
    <div class="question" id="question">Is it a fruit or vegetable?</div>
    <button onclick="nextStep('fruit')">Fruit</button>
    <button onclick="nextStep('vegetable')">Vegetable</button>
</div>

<div class="result" id="result"></div>

<script>
    const tree = {
        question: "Is it a fruit or vegetable?",
        fruit: {
            question: "Is it citrus?",
            yes: {
                question: "Is it small?",
                yes: "You selected Orange",
                no: "You selected Watermelon"
            },
            no: {
                question: "Is it a berry?",
                yes: "You selected Strawberry",
                no: "You selected Mango"
            }
        },
        vegetable: {
            question: "Is it green?",
            yes: {
                question: "Is it leafy?",
                yes: "You selected Spinach",
                no: "You selected Broccoli"
            },
            no: {
                question: "Is it root?",
                yes: "You selected Carrot",
                no: "You selected Cucumber"
            }
        }
    };

    let currentNode = tree;

    function nextStep(selection) {
        if (typeof currentNode[selection] === 'object') {
            currentNode = currentNode[selection];
            updateQuestion();
        } else {
            displayResult(currentNode[selection]);
            reset();
        }
    }

    function updateQuestion() {
        document.getElementById('question').innerText = currentNode.question;
    }

    function displayResult(result) {
        document.getElementById('result').innerText = result;
    }

    function reset() {
        currentNode = tree;
        setTimeout(() => {
            document.getElementById('question').innerText = currentNode.question;
            document.getElementById('result').innerText = '';
        }, 2000);
    }
</script>

</body>
</html>
