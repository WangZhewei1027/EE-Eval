<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoSQL</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        #form {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #form input, #form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #form button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #form button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <h1>NoSQL</h1>
    <form id="form">
        <label for="database">Database:</label>
        <select id="database" name="database">
            <option value="default">default</option>
            <option value="MongoDB">MongoDB</option>
            <option value="MySQL">MySQL</option>
            <option value="PostgreSQL">PostgreSQL</option>
        </select>
        <br>
        <label for="collection">Collection:</label>
        <select id="collection" name="collection">
            <option value="default">default</option>
            <option value="User">User</option>
            <option value="Product">Product</option>
            <option value="Order">Order</option>
        </select>
        <br>
        <label for="document">Document:</label>
        <input type="text" id="document" name="document" placeholder="Enter document">
        <br>
        <label for="operation">Operation:</label>
        <select id="operation" name="operation">
            <option value="insert">Insert</option>
            <option value="update">Update</option>
            <option value="delete">Delete</option>
        </select>
        <br>
        <button type="submit">Submit</button>
    </form>

    <script>
        let database = 'default';
        let collection = 'default';
        let document = '';
        let operation = 'default';

        document.getElementById('database').addEventListener('change', function() {
            database = this.value;
            document.getElementById('database-label').innerHTML = `Database: ${database}`;
        });

        document.getElementById('collection').addEventListener('change', function() {
            collection = this.value;
            document.getElementById('collection-label').innerHTML = `Collection: ${collection}`;
        });

        document.getElementById('document').addEventListener('input', function() {
            document.getElementById('document-label').innerHTML = `Document: ${document}`;
        });

        document.getElementById('operation').addEventListener('change', function() {
            operation = this.value;
            document.getElementById('operation-label').innerHTML = `Operation: ${operation}`;
        });

        document.getElementById('submit').addEventListener('click', function() {
            console.log('Submit button clicked!');
            console.log(`Database: ${database}`);
            console.log(`Collection: ${collection}`);
            console.log(`Document: ${document}`);
            console.log(`Operation: ${operation}`);
        });
    </script>
</body>
</html>
