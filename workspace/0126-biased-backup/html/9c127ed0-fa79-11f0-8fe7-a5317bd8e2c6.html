<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Array Playground</title>
  <style>
    /* Extremely minimal styling so layout is usable but visually plain */
    body { font-family: sans-serif; margin: 12px; color: #000; background: #fff; }
    section { margin-bottom: 14px; }
    label { display: inline-block; margin-right: 8px; }
    input[type="text"], input[type="number"], textarea, select { width: 240px; }
    textarea { height: 70px; width: 480px; }
    .small { width: 80px; }
    .inline { display: inline-block; margin-right: 8px; }
    .array-grid { white-space: pre; font-family: monospace; }
    button { margin-right: 6px; }
    .op-row { margin: 6px 0; padding: 6px; border: 1px solid #000; }
    .op-list { max-height: 260px; overflow: auto; }
    .history-list { max-height: 160px; overflow: auto; }
    .muted { color: #000; opacity: 0.65; }
  </style>
</head>
<body>
  <h1>Array Playground</h1>

  <section id="create">
    <h2>Create / Load Array</h2>
    <div>
      <label>CSV / JSON input:</label>
      <textarea id="inputData" placeholder='e.g. 1,2,3 or ["a","b"]'></textarea>
      <div>
        <button id="loadFromInput">Load</button>
        <button id="appendFromInput">Append</button>
        <button id="clearArray">Clear</button>
      </div>
    </div>

    <div style="margin-top:8px;">
      <label>Random generation - count:</label>
      <input type="number" id="randCount" value="10" class="small">
      <label>min:</label><input type="number" id="randMin" value="0" class="small">
      <label>max:</label><input type="number" id="randMax" value="100" class="small">
      <label class="inline"><input type="checkbox" id="randUnique"> unique</label>
      <button id="genRandom">Generate</button>
    </div>

    <div style="margin-top:8px;">
      <label>Load from file:</label>
      <input type="file" id="fileInput">
      <button id="pasteClipboard">Paste Clipboard</button>
    </div>
  </section>

  <section id="main">
    <h2>Array View & Edit</h2>
    <div>
      <label>Filter visible (text or regex):</label>
      <input type="text" id="viewFilter" placeholder="e.g. ^a or 42">
      <label class="inline"><input type="checkbox" id="filterRegex"> regex</label>
      <button id="applyViewFilter">Apply</button>
      <button id="clearViewFilter">Clear</button>
    </div>

    <div style="margin-top:8px;">
      <button id="selectAllVisible">Select all visible</button>
      <button id="deselectAll">Deselect all</button>
      <button id="removeSelected">Remove selected</button>
      <button id="compactArray">Compact (remove holes)</button>
    </div>

    <div style="margin-top:8px;">
      <label>New element value:</label><input type="text" id="newValue" class="small">
      <button id="pushBtn">Push</button>
      <button id="unshiftBtn">Unshift</button>
      <label> at index:</label><input type="number" id="insertIndex" class="small" value="0">
      <button id="insertAtBtn">Insert at index</button>
      <button id="popBtn">Pop</button>
      <button id="shiftBtn">Shift</button>
    </div>

    <div style="margin-top:8px;">
      <label>Find / Search:</label><input type="text" id="searchText" class="small" placeholder="value or regex">
      <label class="inline"><input type="checkbox" id="searchRegex"> regex</label>
      <button id="findNext">Next</button>
      <button id="findPrev">Prev</button>
      <button id="countMatches">Count</button>
      <span id="searchResult" class="muted"></span>
    </div>

    <h3>Array</h3>
    <div id="arrayContainer" class="array-grid" aria-live="polite"></div>

    <div style="margin-top:8px;">
      <button id="saveSnapshot">Save snapshot</button>
      <button id="undoBtn">Undo</button>
      <button id="redoBtn">Redo</button>
      <span id="historyInfo" class="muted"></span>
    </div>

    <div style="margin-top:8px;">
      <label>Export:</label>
      <button id="copyJSON">Copy JSON</button>
      <button id="downloadJSON">Download JSON</button>
    </div>
  </section>

  <section id="operations">
    <h2>Single Operations & Utilities</h2>
    <div>
      <label>Operation:</label>
      <select id="singleOp">
        <option value="splice">splice (index, deleteCount, ...items)</option>
        <option value="slice">slice (start, end)</option>
        <option value="concat">concat (array CSV)</option>
        <option value="flatten">flatten (depth)</option>
        <option value="reverse">reverse</option>
        <option value="sort">sort (numeric/lex/custom)</option>
        <option value="fill">fill (value, start, end)</option>
        <option value="copyWithin">copyWithin(target, start, end)</option>
        <option value="unique">unique</option>
        <option value="map">map (expression)</option>
        <option value="filter">filter (expression)</option>
        <option value="reduce">reduce (expression, initial)</option>
      </select>
    </div>

    <div id="opParams" style="margin-top:8px;"></div>

    <div style="margin-top:8px;">
      <button id="previewOp">Preview</button>
      <button id="applyOp">Apply</button>
      <label style="margin-left:12px;">Visualize steps: <input type="checkbox" id="visualSteps"></label>
      <label style="margin-left:12px;">Step delay(ms):</label><input type="number" id="stepDelay" value="400" class="small">
    </div>

    <div id="opPreview" style="margin-top:8px;"></div>
  </section>

  <section id="pipeline">
    <h2>Operation Pipeline</h2>
    <div>
      <label>Add op:</label>
      <select id="addOpSelect">
        <option value="map">map</option>
        <option value="filter">filter</option>
        <option value="slice">slice</option>
        <option value="splice">splice</option>
        <option value="sort">sort</option>
        <option value="concat">concat</option>
        <option value="unique">unique</option>
        <option value="flatten">flatten</option>
        <option value="custom">custom</option>
      </select>
      <button id="addPipelineOp">Add to pipeline</button>
    </div>

    <div class="op-list" id="pipelineList" style="margin-top:8px;"></div>

    <div style="margin-top:8px;">
      <button id="applyPipeline">Apply pipeline</button>
      <button id="applyPipelineStep">Apply one step</button>
      <button id="resetPipelinePreview">Reset preview</button>
      <label style="margin-left:12px;">Auto-play speed(ms):</label>
      <input type="number" id="pipelineSpeed" class="small" value="600">
      <button id="playPipeline">Play</button>
      <button id="pausePipeline">Pause</button>
      <span id="pipelineStatus" class="muted"></span>
    </div>

    <div id="pipelinePreview" style="margin-top:8px;"></div>
  </section>

  <section id="historySection">
    <h2>History & Snapshots</h2>
    <div>
      <label>Snapshot name:</label><input type="text" id="snapshotName" class="small" placeholder="optional">
      <button id="createSnapshotBtn">Create snapshot</button>
      <button id="clearSnapshots">Clear snapshots</button>
    </div>
    <div class="history-list" id="snapshotList" style="margin-top:8px;"></div>
  </section>

  <section id="advanced">
    <h2>Advanced Tools</h2>
    <div>
      <label>Custom element expression (x, i, arr):</label><input type="text" id="customExpr" style="width:360px;" placeholder="e.g. x*2 or x && x.name">
      <button id="applyCustomMap">Map with expr</button>
      <button id="applyCustomFilter">Filter with expr</button>
    </div>

    <div style="margin-top:8px;">
      <label>Custom comparator (a,b):</label><input type="text" id="customComparator" class="small" placeholder="e.g. a-b">
      <button id="applyCustomSort">Sort with comparator</button>
    </div>

    <div style="margin-top:8px;">
      <label>Reduce expression (acc, x, i, arr):</label>
      <input type="text" id="reduceExpr" style="width:360px;" placeholder="e.g. acc + x">
      <label>initial:</label><input type="text" id="reduceInit" class="small" value="0">
      <button id="applyReduce">Run reduce</button>
      <div id="reduceResult" class="muted" style="margin-top:6px;"></div>
    </div>
  </section>

  <script>
    // Array Playground - rich interactivity in a minimal UI
    (function(){
      // State
      let state = {
        arr: [],
        visibleFilter: null, // {text, regex}
        selection: new Set(),
        history: [], // {arr, name}
        historyIndex: -1,
        snapshots: [],
        pipeline: [],
        pipelinePreviewState: null,
        pipelinePlaying: false,
        pipelinePlayTimer: null
      };

      // DOM refs
      const arrayContainer = document.getElementById('arrayContainer');
      const inputData = document.getElementById('inputData');
      const loadFromInput = document.getElementById('loadFromInput');
      const appendFromInput = document.getElementById('appendFromInput');
      const clearArray = document.getElementById('clearArray');
      const genRandom = document.getElementById('genRandom');
      const randCount = document.getElementById('randCount');
      const randMin = document.getElementById('randMin');
      const randMax = document.getElementById('randMax');
      const randUnique = document.getElementById('randUnique');
      const fileInput = document.getElementById('fileInput');
      const pasteClipboard = document.getElementById('pasteClipboard');

      const viewFilter = document.getElementById('viewFilter');
      const filterRegex = document.getElementById('filterRegex');
      const applyViewFilter = document.getElementById('applyViewFilter');
      const clearViewFilter = document.getElementById('clearViewFilter');

      const selectAllVisible = document.getElementById('selectAllVisible');
      const deselectAll = document.getElementById('deselectAll');
      const removeSelected = document.getElementById('removeSelected');
      const compactArray = document.getElementById('compactArray');

      const newValue = document.getElementById('newValue');
      const pushBtn = document.getElementById('pushBtn');
      const unshiftBtn = document.getElementById('unshiftBtn');
      const insertAtBtn = document.getElementById('insertAtBtn');
      const insertIndex = document.getElementById('insertIndex');
      const popBtn = document.getElementById('popBtn');
      const shiftBtn = document.getElementById('shiftBtn');

      const searchText = document.getElementById('searchText');
      const searchRegex = document.getElementById('searchRegex');
      const findNext = document.getElementById('findNext');
      const findPrev = document.getElementById('findPrev');
      const countMatches = document.getElementById('countMatches');
      const searchResult = document.getElementById('searchResult');

      const saveSnapshot = document.getElementById('saveSnapshot');
      const undoBtn = document.getElementById('undoBtn');
      const redoBtn = document.getElementById('redoBtn');
      const historyInfo = document.getElementById('historyInfo');

      const copyJSON = document.getElementById('copyJSON');
      const downloadJSON = document.getElementById('downloadJSON');

      const singleOp = document.getElementById('singleOp');
      const opParams = document.getElementById('opParams');
      const previewOp = document.getElementById('previewOp');
      const applyOp = document.getElementById('applyOp');
      const visualSteps = document.getElementById('visualSteps');
      const stepDelay = document.getElementById('stepDelay');
      const opPreview = document.getElementById('opPreview');

      const addOpSelect = document.getElementById('addOpSelect');
      const addPipelineOp = document.getElementById('addPipelineOp');
      const pipelineList = document.getElementById('pipelineList');
      const applyPipeline = document.getElementById('applyPipeline');
      const applyPipelineStep = document.getElementById('applyPipelineStep');
      const resetPipelinePreview = document.getElementById('resetPipelinePreview');
      const pipelinePreview = document.getElementById('pipelinePreview');
      const pipelineSpeed = document.getElementById('pipelineSpeed');
      const playPipeline = document.getElementById('playPipeline');
      const pausePipeline = document.getElementById('pausePipeline');
      const pipelineStatus = document.getElementById('pipelineStatus');

      const snapshotName = document.getElementById('snapshotName');
      const createSnapshotBtn = document.getElementById('createSnapshotBtn');
      const clearSnapshots = document.getElementById('clearSnapshots');
      const snapshotList = document.getElementById('snapshotList');

      const customExpr = document.getElementById('customExpr');
      const applyCustomMap = document.getElementById('applyCustomMap');
      const applyCustomFilter = document.getElementById('applyCustomFilter');

      const customComparator = document.getElementById('customComparator');
      const applyCustomSort = document.getElementById('applyCustomSort');

      const reduceExpr = document.getElementById('reduceExpr');
      const reduceInit = document.getElementById('reduceInit');
      const applyReduce = document.getElementById('applyReduce');
      const reduceResult = document.getElementById('reduceResult');

      // Utilities
      function cloneArr(a) {
        try { return JSON.parse(JSON.stringify(a)); } catch(e) { return a.slice(); }
      }
      function pushHistory(name) {
        // truncate forward history if index not at end
        if (state.historyIndex < state.history.length - 1) {
          state.history = state.history.slice(0, state.historyIndex + 1);
        }
        state.history.push({ arr: cloneArr(state.arr), name: name || null });
        state.historyIndex = state.history.length - 1;
        renderHistoryInfo();
      }
      function renderHistoryInfo() {
        historyInfo.textContent = 'history ' + (state.historyIndex + 1) + '/' + state.history.length;
        undoBtn.disabled = state.historyIndex <= 0;
        redoBtn.disabled = state.historyIndex >= state.history.length - 1;
      }
      function setArray(newArr, label) {
        state.arr = cloneArr(newArr);
        pushHistory(label || 'set');
        renderArray();
      }

      // Rendering
      function renderArray() {
        const arr = state.arr;
        const filter = state.visibleFilter;
        let out = [];
        for (let i = 0; i < arr.length; i++) {
          let val = arr[i];
          let show = true;
          if (filter && filter.text !== '') {
            if (filter.regex) {
              try {
                show = filter.pattern.test(String(val));
              } catch(e) {
                show = false;
              }
            } else {
              show = String(val).indexOf(filter.text) !== -1;
            }
          }
          if (show) {
            const checked = state.selection.has(i) ? 'checked' : '';
            out.push(indexRow(i, val, checked));
          }
        }
        if (out.length === 0) arrayContainer.textContent = '(no visible items)';
        else arrayContainer.innerHTML = out.join('\n');
        // Add event listeners to inline inputs & checkboxes
        attachArrayInteraction();
      }

      function indexRow(i, val, checked) {
        // Minimal plain text-like representation, but include inputs
        const displayVal = escapeHtml(String(val));
        return '<span data-idx="'+i+'">['+i+'] <input data-idx="'+i+'" class="element-input" value="'+displayVal+'"> <label><input type="checkbox" class="sel-box" data-idx="'+i+'" '+checked+'> select</label></span>';
      }
      function escapeHtml(s){
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      function attachArrayInteraction() {
        const inputs = arrayContainer.querySelectorAll('.element-input');
        inputs.forEach(inp => {
          inp.addEventListener('change', (e) => {
            const idx = Number(inp.getAttribute('data-idx'));
            const raw = inp.value;
            // try to parse JSON to allow objects/numbers, fallback to string
            let parsed;
            try { parsed = JSON.parse(raw); } catch(e) { parsed = raw; }
            state.arr[idx] = parsed;
            pushHistory('edit index ' + idx);
            renderArray();
          });
        });
        const boxes = arrayContainer.querySelectorAll('.sel-box');
        boxes.forEach(box => {
          box.addEventListener('change', (e) => {
            const idx = Number(box.getAttribute('data-idx'));
            if (box.checked) state.selection.add(idx); else state.selection.delete(idx);
            // Don't push history for selection
          });
        });
      }

      // Basic operations
      loadFromInput.addEventListener('click', ()=> {
        const txt = inputData.value.trim();
        if (!txt) return;
        let parsed = tryParseInput(txt);
        if (parsed !== undefined) {
          setArray(parsed, 'load input');
        } else {
          alert('Could not parse input. Use CSV like "1,2,3" or JSON array like ["a","b"].');
        }
      });
      appendFromInput.addEventListener('click', ()=> {
        const txt = inputData.value.trim();
        if (!txt) return;
        let parsed = tryParseInput(txt);
        if (parsed !== undefined) {
          state.arr = state.arr.concat(parsed);
          pushHistory('append input');
          renderArray();
        } else {
          alert('Could not parse input.');
        }
      });
      clearArray.addEventListener('click', ()=> {
        if (!confirm('Clear array?')) return;
        setArray([], 'clear');
      });

      function tryParseInput(txt) {
        // Try JSON
        try {
          const v = JSON.parse(txt);
          if (Array.isArray(v)) return v;
          // if single value -> return [value]
          if (v !== undefined) return [v];
        } catch(e){}
        // Try CSV: split by comma, trim, parse numbers/JSON if possible
        const parts = txt.split(',').map(s => s.trim()).filter(s => s !== '');
        if (parts.length === 0) return [];
        const arr = parts.map(part => {
          try { return JSON.parse(part); } catch(e) { return part; }
        });
        return arr;
      }

      genRandom.addEventListener('click', ()=>{
        const count = Math.max(0, Number(randCount.value) || 0);
        const min = Number(randMin.value) || 0;
        const max = Number(randMax.value) || 100;
        const unique = randUnique.checked;
        const out = [];
        const span = max - min + 1;
        for (let i=0;i<count;i++){
          let v = Math.floor(Math.random()*span) + min;
          if (unique) {
            let attempts = 0;
            while (out.includes(v) && attempts < 1000) { v = Math.floor(Math.random()*span)+min; attempts++; }
          }
          out.push(v);
        }
        setArray(out, 'random');
      });

      fileInput.addEventListener('change', (e)=>{
        const f = e.target.files && e.target.files[0];
        if (!f) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
          const txt = ev.target.result.trim();
          const parsed = tryParseInput(txt);
          if (parsed !== undefined) setArray(parsed, 'file load');
          else alert('Could not parse file content.');
        };
        reader.readAsText(f);
      });

      pasteClipboard.addEventListener('click', async ()=>{
        try {
          const txt = await navigator.clipboard.readText();
          inputData.value = txt;
          alert('Pasted into input area. Press Load or Append.');
        } catch(e) { alert('Could not read clipboard.'); }
      });

      // View filter
      applyViewFilter.addEventListener('click', ()=>{
        const text = viewFilter.value.trim();
        if (text === '') { state.visibleFilter = null; renderArray(); return; }
        if (filterRegex.checked) {
          try {
            const re = new RegExp(text);
            state.visibleFilter = {text, regex:true, pattern:re};
            renderArray();
          } catch(e){ alert('Invalid regex'); }
        } else {
          state.visibleFilter = {text, regex:false};
          renderArray();
        }
      });
      clearViewFilter.addEventListener('click', ()=> {
        viewFilter.value = '';
        state.visibleFilter = null;
        renderArray();
      });

      // Selection & basic edits
      selectAllVisible.addEventListener('click', ()=>{
        // mark selection for visible items
        const filter = state.visibleFilter;
        for (let i=0;i<state.arr.length;i++){
          let val = state.arr[i];
          let show = true;
          if (filter && filter.text !== '') {
            if (filter.regex) {
              try { show = filter.pattern.test(String(val)); } catch(e) { show = false; }
            } else { show = String(val).indexOf(filter.text) !== -1; }
          }
          if (show) state.selection.add(i);
        }
        renderArray();
      });
      deselectAll.addEventListener('click', ()=>{
        state.selection.clear();
        renderArray();
      });
      removeSelected.addEventListener('click', ()=>{
        if (state.selection.size === 0) { alert('No selection'); return; }
        const keep = [];
        for (let i=0;i<state.arr.length;i++){
          if (!state.selection.has(i)) keep.push(state.arr[i]);
        }
        setArray(keep, 'remove selected');
        state.selection.clear();
      });
      compactArray.addEventListener('click', ()=>{
        const compacted = state.arr.filter(()=>true);
        setArray(compacted, 'compact');
      });

      // push/pop/etc
      pushBtn.addEventListener('click', ()=> {
        let val = parseValueInput(newValue.value);
        state.arr.push(val);
        pushHistory('push');
        renderArray();
      });
      unshiftBtn.addEventListener('click', ()=> {
        let val = parseValueInput(newValue.value);
        state.arr.unshift(val);
        pushHistory('unshift');
        renderArray();
      });
      insertAtBtn.addEventListener('click', ()=> {
        let idx = Number(insertIndex.value);
        if (isNaN(idx) || idx < 0) idx = 0;
        if (idx > state.arr.length) idx = state.arr.length;
        let val = parseValueInput(newValue.value);
        state.arr.splice(idx, 0, val);
        pushHistory('insert at '+idx);
        renderArray();
      });
      popBtn.addEventListener('click', ()=> {
        const v = state.arr.pop();
        pushHistory('pop');
        renderArray();
        alert('Popped: ' + JSON.stringify(v));
      });
      shiftBtn.addEventListener('click', ()=> {
        const v = state.arr.shift();
        pushHistory('shift');
        renderArray();
        alert('Shifted: ' + JSON.stringify(v));
      });

      function parseValueInput(s) {
        try { return JSON.parse(s); } catch(e) { return s; }
      }

      // Search
      let lastSearchIndex = -1;
      function findMatches(text, regexMode) {
        const arr = state.arr;
        const out = [];
        if (regexMode) {
          let re;
          try { re = new RegExp(text); } catch(e) { return null; }
          for (let i=0;i<arr.length;i++) if (re.test(String(arr[i]))) out.push(i);
        } else {
          for (let i=0;i<arr.length;i++) if (String(arr[i]).indexOf(text) !== -1) out.push(i);
        }
        return out;
      }
      findNext.addEventListener('click', ()=> {
        const t = searchText.value;
        if (!t) return;
        const matches = findMatches(t, searchRegex.checked);
        if (matches === null) { searchResult.textContent = 'invalid regex'; return; }
        if (matches.length === 0) { searchResult.textContent = 'no matches'; return; }
        lastSearchIndex = matches.findIndex(i=>i>lastSearchIndex);
        if (lastSearchIndex === -1) lastSearchIndex = 0;
        const idx = matches[lastSearchIndex];
        state.selection.clear(); state.selection.add(idx);
        renderArray();
        searchResult.textContent = 'match '+(lastSearchIndex+1)+'/'+matches.length+' at index '+idx;
      });
      findPrev.addEventListener('click', ()=> {
        const t = searchText.value;
        if (!t) return;
        const matches = findMatches(t, searchRegex.checked);
        if (matches === null) { searchResult.textContent = 'invalid regex'; return; }
        if (matches.length === 0) { searchResult.textContent = 'no matches'; return; }
        lastSearchIndex = matches.findIndex(i=>i>=lastSearchIndex) - 1;
        if (lastSearchIndex < 0) lastSearchIndex = matches.length - 1;
        const idx = matches[lastSearchIndex];
        state.selection.clear(); state.selection.add(idx);
        renderArray();
        searchResult.textContent = 'match '+(lastSearchIndex+1)+'/'+matches.length+' at index '+idx;
      });
      countMatches.addEventListener('click', ()=> {
        const t = searchText.value;
        if (!t) return;
        const matches = findMatches(t, searchRegex.checked);
        if (matches === null) { searchResult.textContent = 'invalid regex'; return; }
        searchResult.textContent = matches.length + ' matches';
      });

      // History / snapshots
      saveSnapshot.addEventListener('click', ()=> {
        state.snapshots.push({arr: cloneArr(state.arr), name: 'snapshot '+(state.snapshots.length+1), created: new Date()});
        renderSnapshots();
      });
      createSnapshotBtn.addEventListener('click', ()=> {
        const name = snapshotName.value.trim() || ('snap '+(state.snapshots.length+1));
        state.snapshots.push({arr: cloneArr(state.arr), name, created: new Date()});
        renderSnapshots();
      });
      clearSnapshots.addEventListener('click', ()=> {
        if (!confirm('Clear all snapshots?')) return;
        state.snapshots = [];
        renderSnapshots();
      });
      function renderSnapshots(){
        snapshotList.innerHTML = '';
        state.snapshots.forEach((s, idx) => {
          const el = document.createElement('div');
          el.style.border = '1px solid #000';
          el.style.padding = '6px';
          el.style.marginBottom = '6px';
          const name = s.name + ' (' + s.arr.length + ' items)';
          el.innerHTML = '<b>'+escapeHtml(name)+'</b> <button data-idx="'+idx+'" class="restore-snap">restore</button> <button data-idx="'+idx+'" class="fork-snap">fork</button> <button data-idx="'+idx+'" class="delete-snap">delete</button><div class="muted" style="margin-top:6px;">'+escapeHtml(JSON.stringify(s.arr).slice(0,200))+'</div>';
          snapshotList.appendChild(el);
        });
        snapshotList.querySelectorAll('.restore-snap').forEach(b => {
          b.addEventListener('click', ()=> {
            const idx = Number(b.getAttribute('data-idx'));
            setArray(state.snapshots[idx].arr, 'restore snapshot');
          });
        });
        snapshotList.querySelectorAll('.fork-snap').forEach(b => {
          b.addEventListener('click', ()=> {
            const idx = Number(b.getAttribute('data-idx'));
            state.arr = cloneArr(state.snapshots[idx].arr);
            pushHistory('fork snap');
            renderArray();
          });
        });
        snapshotList.querySelectorAll('.delete-snap').forEach(b => {
          b.addEventListener('click', ()=> {
            const idx = Number(b.getAttribute('data-idx'));
            state.snapshots.splice(idx,1);
            renderSnapshots();
          });
        });
      }

      // Undo / Redo
      undoBtn.addEventListener('click', ()=> {
        if (state.historyIndex <= 0) return;
        state.historyIndex--;
        state.arr = cloneArr(state.history[state.historyIndex].arr);
        renderArray();
        renderHistoryInfo();
      });
      redoBtn.addEventListener('click', ()=> {
        if (state.historyIndex >= state.history.length - 1) return;
        state.historyIndex++;
        state.arr = cloneArr(state.history[state.historyIndex].arr);
        renderArray();
        renderHistoryInfo();
      });

      // Export
      copyJSON.addEventListener('click', async ()=> {
        try {
          await navigator.clipboard.writeText(JSON.stringify(state.arr));
          alert('Copied JSON to clipboard.');
        } catch(e){ alert('Failed to copy.'); }
      });
      downloadJSON.addEventListener('click', ()=> {
        const blob = new Blob([JSON.stringify(state.arr)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'array.json'; a.style.display='none';
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      });

      // Single operation UI
      function renderOpParams() {
        const op = singleOp.value;
        opParams.innerHTML = '';
        if (op === 'splice') {
          opParams.innerHTML = 'index: <input id="op_splice_index" class="small" type="number" value="0"> delCount: <input id="op_splice_del" class="small" type="number" value="1"> items (CSV): <input id="op_splice_items" type="text" placeholder="a,b,c">';
        } else if (op === 'slice') {
          opParams.innerHTML = 'start: <input id="op_slice_start" class="small" type="number" value="0"> end: <input id="op_slice_end" class="small" type="number" value=""> (end blank = to end)';
        } else if (op === 'concat') {
          opParams.innerHTML = 'array CSV or JSON: <input id="op_concat_arr" type="text">';
        } else if (op === 'flatten') {
          opParams.innerHTML = 'depth: <input id="op_flatten_depth" class="small" type="number" value="1">';
        } else if (op === 'reverse') {
          opParams.innerHTML = '<span class="muted">no params</span>';
        } else if (op === 'sort') {
          opParams.innerHTML = 'mode: <select id="op_sort_mode"><option value="numeric">numeric</option><option value="lex">lex</option><option value="custom">custom</option></select> custom comparator: <input id="op_sort_custom" class="small" placeholder="a-b">';
        } else if (op === 'fill') {
          opParams.innerHTML = 'value: <input id="op_fill_val" class="small" type="text"> start: <input id="op_fill_start" class="small" type="number" value="0"> end: <input id="op_fill_end" class="small" type="number" value="">';
        } else if (op === 'copyWithin') {
          opParams.innerHTML = 'target: <input id="op_copy_target" class="small" type="number" value="0"> start: <input id="op_copy_start" class="small" type="number" value="0"> end: <input id="op_copy_end" class="small" type="number" value="">';
        } else if (op === 'unique') {
          opParams.innerHTML = '<span class="muted">no params - remove duplicates</span>';
        } else if (op === 'map' || op === 'filter') {
          opParams.innerHTML = 'expression (x, i, arr): <input id="op_expr" style="width:360px;" placeholder="e.g. x*2">';
        } else if (op === 'reduce') {
          opParams.innerHTML = 'expression (acc,x,i,arr): <input id="op_reduce_expr" style="width:360px;" placeholder="acc+x"> initial: <input id="op_reduce_init" class="small" value="0">';
        }
      }
      singleOp.addEventListener('change', renderOpParams);
      renderOpParams();

      previewOp.addEventListener('click', ()=> {
        const op = singleOp.value;
        const preview = computeOpPreview(op);
        if (preview === undefined) return;
        opPreview.textContent = 'Preview result: ' + JSON.stringify(preview).slice(0, 800);
      });
      applyOp.addEventListener('click', async ()=> {
        const op = singleOp.value;
        const visual = visualSteps.checked;
        if (visual) {
          await applyOpWithVisualization(op);
        } else {
          const preview = computeOpPreview(op);
          if (preview === undefined) return;
          setArray(preview, 'op:'+op);
        }
      });

      function computeOpPreview(op) {
        try {
          if (op === 'splice') {
            const idx = Number(document.getElementById('op_splice_index').value) || 0;
            const del = Number(document.getElementById('op_splice_del').value) || 0;
            const itemsTxt = document.getElementById('op_splice_items').value.trim();
            const items = itemsTxt ? tryParseInput(itemsTxt) : [];
            const arr = cloneArr(state.arr);
            arr.splice(idx, del, ...(Array.isArray(items) ? items : [items]));
            return arr;
          } else if (op === 'slice') {
            const s = document.getElementById('op_slice_start').value;
            const e = document.getElementById('op_slice_end').value;
            const arr = state.arr.slice(Number(s)||0, e===''?undefined:Number(e));
            return arr;
          } else if (op === 'concat') {
            const txt = document.getElementById('op_concat_arr').value;
            const arr2 = tryParseInput(txt) || [];
            return state.arr.concat(arr2);
          } else if (op === 'flatten') {
            const depth = Number(document.getElementById('op_flatten_depth').value) || 1;
            return flattenDepth(state.arr, depth);
          } else if (op === 'reverse') {
            return cloneArr(state.arr).reverse();
          } else if (op === 'sort') {
            const mode = document.getElementById('op_sort_mode').value;
            const custom = document.getElementById('op_sort_custom').value;
            const copy = cloneArr(state.arr);
            if (mode === 'numeric') {
              copy.sort((a,b)=>Number(a)-Number(b));
            } else if (mode === 'lex') {
              copy.sort();
            } else {
              try {
                const fn = new Function('a','b','return ' + custom);
                copy.sort(fn);
              } catch(e){ alert('Invalid comparator'); return; }
            }
            return copy;
          } else if (op === 'fill') {
            const val = parseValueInput(document.getElementById('op_fill_val').value);
            const start = Number(document.getElementById('op_fill_start').value)||0;
            const endRaw = document.getElementById('op_fill_end').value;
            const end = endRaw===''?undefined:Number(endRaw);
            const copy = cloneArr(state.arr);
            copy.fill(val, start, end);
            return copy;
          } else if (op === 'copyWithin') {
            const t = Number(document.getElementById('op_copy_target').value)||0;
            const s = Number(document.getElementById('op_copy_start').value)||0;
            const eRaw = document.getElementById('op_copy_end').value;
            const e = eRaw===''?undefined:Number(eRaw);
            const copy = cloneArr(state.arr);
            copy.copyWithin(t, s, e);
            return copy;
          } else if (op === 'unique') {
            const seen = new Set();
            return state.arr.filter(x=>{ const k = typeof x + '|' + JSON.stringify(x); if (seen.has(k)) return false; seen.add(k); return true; });
          } else if (op === 'map') {
            const expr = document.getElementById('op_expr').value;
            if (!expr) { alert('Provide expression'); return; }
            const fn = new Function('x','i','arr','return ('+expr+')');
            return state.arr.map(fn);
          } else if (op === 'filter') {
            const expr = document.getElementById('op_expr').value;
            if (!expr) { alert('Provide expression'); return; }
            const fn = new Function('x','i','arr','return ('+expr+')');
            return state.arr.filter(fn);
          } else if (op === 'reduce') {
            const expr = document.getElementById('op_reduce_expr').value;
            const initRaw = document.getElementById('op_reduce_init').value;
            const init = initRaw === '' ? undefined : parseValueInput(initRaw);
            if (!expr) { alert('Provide reduce expression'); return; }
            const fn = new Function('acc','x','i','arr','return ('+expr+')');
            // Return an array carrying only the final reduced value to maintain shape
            try {
              const res = state.arr.reduce(fn, init);
              return [res];
            } catch(e){ alert('Reduce failed: '+e); return; }
          }
        } catch(e) {
          alert('Operation failed: ' + e);
          return;
        }
      }

      function flattenDepth(arr, depth) {
        if (depth < 1) return arr.slice();
        const result = [];
        for (const v of arr) {
          if (Array.isArray(v)) result.push(...flattenDepth(v, depth-1));
          else result.push(v);
        }
        return result;
      }

      async function applyOpWithVisualization(op) {
        // We'll provide a simple transitional visualization: old -> new with delay
        const preview = computeOpPreview(op);
        if (preview === undefined) return;
        const old = cloneArr(state.arr);
        opPreview.textContent = '';
        // Show a stepwise transition highlighting changed indices
        const changes = computeDiff(old, preview);
        // For each change, apply stepwise: replace the index, render, wait
        for (let step=0; step<changes.length; step++) {
          const change = changes[step];
          // apply this one change to a temp array and render
          state.arr = cloneArr(old);
          for (let i=0;i<=step;i++){
            const c = changes[i];
            if (c.type === 'set') state.arr[c.index] = c.value;
            else if (c.type === 'ins') state.arr.splice(c.index,0,c.value);
            else if (c.type === 'del') state.arr.splice(c.index,1);
          }
          renderArray();
          await sleep(Number(stepDelay.value) || 300);
        }
        // finally set final array
        setArray(preview, 'op:'+op);
      }

      function computeDiff(a,b) {
        // simple diff: index wise with insert/delete detection
        const diffs = [];
        const len = Math.max(a.length,b.length);
        let ai=0, bi=0;
        while (ai < a.length || bi < b.length) {
          if (ai >= a.length) { diffs.push({type:'ins', index:ai, value: b[bi]}); bi++; }
          else if (bi >= b.length) { diffs.push({type:'del', index:ai}); ai++; }
          else if (JSON.stringify(a[ai]) !== JSON.stringify(b[bi])) {
            // if next a matches current b -> deletion
            if (ai+1 < a.length && JSON.stringify(a[ai+1]) === JSON.stringify(b[bi])) {
              diffs.push({type:'del', index:ai});
              ai++;
            } else if (bi+1 < b.length && JSON.stringify(a[ai]) === JSON.stringify(b[bi+1])) {
              diffs.push({type:'ins', index:ai, value:b[bi]});
              bi++;
            } else {
              diffs.push({type:'set', index:ai, value:b[bi]});
              ai++; bi++;
            }
          } else { ai++; bi++; }
        }
        return diffs;
      }

      function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

      // Pipeline
      addPipelineOp.addEventListener('click', ()=> {
        const type = addOpSelect.value;
        const op = { type, enabled: true, params: {} };
        // default params
        if (type === 'map' || type === 'filter' || type === 'custom') op.params.expr = 'x';
        if (type === 'slice') op.params.start = 0; op.params.end = undefined;
        if (type === 'splice') op.params.index = 0; op.params.del = 1; op.params.items = [];
        if (type === 'sort') op.params.mode = 'numeric';
        if (type === 'concat') op.params.arr = [];
        if (type === 'flatten') op.params.depth = 1;
        state.pipeline.push(op);
        renderPipeline();
      });

      function renderPipeline(){
        pipelineList.innerHTML = '';
        state.pipeline.forEach((op, idx) => {
          const el = document.createElement('div');
          el.className = 'op-row';
          el.innerHTML = '<div><b>['+idx+']</b> '+escapeHtml(op.type)+' <label><input type="checkbox" data-idx="'+idx+'" class="pipe-enable" '+(op.enabled?'checked':'')+'> enabled</label> <button data-idx="'+idx+'" class="pipe-up">up</button> <button data-idx="'+idx+'" class="pipe-down">down</button> <button data-idx="'+idx+'" class="pipe-delete">del</button></div>';
          // params area
          const paramsDiv = document.createElement('div');
          paramsDiv.style.marginTop = '6px';
          if (op.type === 'map' || op.type === 'filter' || op.type === 'custom') {
            paramsDiv.innerHTML = 'expr: <input data-idx="'+idx+'" class="pipe-expr" style="width:360px;" value="'+escapeHtml(op.params.expr || '')+'">';
          } else if (op.type === 'slice') {
            paramsDiv.innerHTML = 'start: <input data-idx="'+idx+'" class="pipe-slice-start small" type="number" value="'+(op.params.start||0)+'"> end: <input data-idx="'+idx+'" class="pipe-slice-end small" type="number" value="'+(op.params.end===undefined?'':op.params.end)+'">';
          } else if (op.type === 'splice') {
            paramsDiv.innerHTML = 'index: <input data-idx="'+idx+'" class="pipe-splice-index small" type="number" value="'+(op.params.index||0)+'"> del: <input data-idx="'+idx+'" class="pipe-splice-del small" type="number" value="'+(op.params.del||0)+'"> items (CSV): <input data-idx="'+idx+'" class="pipe-splice-items" value="'+(Array.isArray(op.params.items)?op.params.items.join(','):'')+'">';
          } else if (op.type === 'sort') {
            paramsDiv.innerHTML = 'mode: <select data-idx="'+idx+'" class="pipe-sort-mode"><option value="numeric">numeric</option><option value="lex">lex</option><option value="custom">custom</option></select> comparator: <input data-idx="'+idx+'" class="pipe-sort-custom small" value="'+escapeHtml(op.params.custom||'')+'">';
          } else if (op.type === 'concat') {
            paramsDiv.innerHTML = 'arr CSV/JSON: <input data-idx="'+idx+'" class="pipe-concat-arr" value="'+escapeHtml(JSON.stringify(op.params.arr||[]))+'">';
          } else if (op.type === 'flatten') {
            paramsDiv.innerHTML = 'depth: <input data-idx="'+idx+'" class="pipe-flatten-depth small" type="number" value="'+(op.params.depth||1)+'">';
          } else {
            paramsDiv.innerHTML = '<span class="muted">no params</span>';
          }
          el.appendChild(paramsDiv);
          pipelineList.appendChild(el);
        });
        // attach handlers
        pipelineList.querySelectorAll('.pipe-enable').forEach(b => b.addEventListener('change', ()=> {
          const idx = Number(b.getAttribute('data-idx'));
          state.pipeline[idx].enabled = b.checked;
        }));
        pipelineList.querySelectorAll('.pipe-up').forEach(b => b.addEventListener('click', ()=> {
          const idx = Number(b.getAttribute('data-idx'));
          if (idx <= 0) return;
          const tmp = state.pipeline[idx-1];
          state.pipeline[idx-1] = state.pipeline[idx];
          state.pipeline[idx] = tmp;
          renderPipeline();
        }));
        pipelineList.querySelectorAll('.pipe-down').forEach(b => b.addEventListener('click', ()=> {
          const idx = Number(b.getAttribute('data-idx'));
          if (idx >= state.pipeline.length-1) return;
          const tmp = state.pipeline[idx+1];
          state.pipeline[idx+1] = state.pipeline[idx];
          state.pipeline[idx] = tmp;
          renderPipeline();
        }));
        pipelineList.querySelectorAll('.pipe-delete').forEach(b => b.addEventListener('click', ()=> {
          const idx = Number(b.getAttribute('data-idx'));
          state.pipeline.splice(idx,1);
          renderPipeline();
        }));
        pipelineList.querySelectorAll('.pipe-expr').forEach(inp => inp.addEventListener('change', ()=> {
          const idx = Number(inp.getAttribute('data-idx'));
          state.pipeline[idx].params.expr = inp.value;
        }));
        pipelineList.querySelectorAll('.pipe-slice-start').forEach(inp => inp.addEventListener('change', ()=> {
          const idx = Number(inp.getAttribute('data-idx'));
          state.pipeline[idx].params.start = Number(inp.value);
        }));
        pipelineList.querySelectorAll('.pipe-slice-end').forEach(inp => inp.addEventListener('change', ()=> {
          const idx = Number(inp.getAttribute('data-idx'));
          const v = inp.value; state.pipeline[idx].params.end = v===''?undefined:Number(v);
        }));
        pipelineList.querySelectorAll('.pipe-splice-index').forEach(inp => inp.addEventListener('change', ()=> {
          const idx = Number(inp.getAttribute('data-idx'));
          state.pipeline[idx].params.index = Number(inp.value);
        }));
        pipelineList.querySelectorAll('.pipe-splice-del').forEach(inp => inp.addEventListener('change', ()=> {
          const idx = Number(inp.getAttribute('data-idx'));
          state.pipeline[idx].params.del = Number(inp.value);
        }));
        pipelineList.querySelectorAll('.pipe-splice-items').forEach(inp => inp.addEventListener('change', ()=> {
          const idx = Number(inp.getAttribute('data-idx'));
          const v = inp.value.trim();
          state.pipeline[idx].params.items = v ? tryParseInput(v) : [];
        }));
        pipelineList.querySelectorAll('.pipe-sort-mode').forEach(inp => inp.addEventListener('change', ()=> {
          const idx = Number(inp.getAttribute('data-idx'));
          state.pipeline[idx].params.mode = inp.value;
        }));
        pipelineList.querySelectorAll('.pipe-sort-custom').forEach(inp => inp.addEventListener('change', ()=> {
          const idx = Number(inp.getAttribute('data-idx'));
          state.pipeline[idx].params.custom = inp.value;
        }));
        pipelineList.querySelectorAll('.pipe-concat-arr').forEach(inp => inp.addEventListener('change', ()=> {
          const idx = Number(inp.getAttribute('data-idx'));
          state.pipeline[idx].params.arr = tryParseInput(inp.value) || [];
        }));
        pipelineList.querySelectorAll('.pipe-flatten-depth').forEach(inp => inp.addEventListener('change', ()=> {
          const idx = Number(inp.getAttribute('data-idx'));
          state.pipeline[idx].params.depth = Number(inp.value);
        }));
      }

      function computePipelineStep(arr, op) {
        if (!op.enabled) return arr;
        let copy = cloneArr(arr);
        try {
          if (op.type === 'map') {
            const fn = new Function('x','i','arr','return ('+op.params.expr+')');
            return copy.map(fn);
          } else if (op.type === 'filter') {
            const fn = new Function('x','i','arr','return ('+op.params.expr+')');
            return copy.filter(fn);
          } else if (op.type === 'slice') {
            return copy.slice(op.params.start, op.params.end);
          } else if (op.type === 'splice') {
            const items = Array.isArray(op.params.items) ? op.params.items : tryParseInput(op.params.items || '') || [];
            const arr2 = cloneArr(copy);
            arr2.splice(op.params.index || 0, op.params.del || 0, ...(Array.isArray(items)?items:[items]));
            return arr2;
          } else if (op.type === 'sort') {
            if (op.params.mode === 'numeric') return cloneArr(copy).sort((a,b)=>Number(a)-Number(b));
            if (op.params.mode === 'lex') return cloneArr(copy).sort();
            const fn = new Function('a','b','return '+(op.params.custom||'0'));
            return cloneArr(copy).sort(fn);
          } else if (op.type === 'concat') {
            return copy.concat(op.params.arr || []);
          } else if (op.type === 'unique') {
            const seen = new Set();
            return copy.filter(x=>{ const k = typeof x + '|' + JSON.stringify(x); if (seen.has(k)) return false; seen.add(k); return true; });
          } else if (op.type === 'flatten') {
            return flattenDepth(copy, op.params.depth || 1);
          } else if (op.type === 'custom') {
            const fn = new Function('arr','return ('+op.params.expr+')');
            return fn(copy);
          }
        } catch(e) { alert('Pipeline op error: '+e); return copy; }
        return copy;
      }

      applyPipeline.addEventListener('click', ()=> {
        // atomic apply all
        let cur = cloneArr(state.arr);
        for (const op of state.pipeline) cur = computePipelineStep(cur, op);
        setArray(cur, 'pipeline');
      });

      applyPipelineStep.addEventListener('click', ()=> {
        // apply first enabled op only
        let idx = state.pipeline.findIndex(o=>o.enabled);
        if (idx === -1) { alert('No enabled ops'); return; }
        const op = state.pipeline[idx];
        const newArr = computePipelineStep(state.arr, op);
        setArray(newArr, 'pipeline step '+idx);
      });

      resetPipelinePreview.addEventListener('click', ()=> {
        state.pipelinePreviewState = null;
        pipelinePreview.textContent = '';
      });

      playPipeline.addEventListener('click', ()=> {
        if (state.pipelinePlaying) return;
        state.pipelinePlaying = true;
        pipelineStatus.textContent = 'playing';
        runPipelinePlay();
      });
      pausePipeline.addEventListener('click', ()=> {
        state.pipelinePlaying = false;
        pipelineStatus.textContent = 'paused';
        if (state.pipelinePlayTimer) { clearTimeout(state.pipelinePlayTimer); state.pipelinePlayTimer = null; }
      });

      function runPipelinePlay() {
        const speed = Number(pipelineSpeed.value) || 600;
        // perform next single op
        const enabledIdx = state.pipeline.findIndex(o=>o.enabled);
        if (enabledIdx === -1) { pipelineStatus.textContent = 'no enabled ops'; state.pipelinePlaying = false; return; }
        const op = state.pipeline.shift(); // take first
        state.pipeline.push(op); // rotate
        const newArr = computePipelineStep(state.arr, op);
        setArray(newArr, 'pipeline-play:'+op.type);
        if (state.pipelinePlaying) {
          state.pipelinePlayTimer = setTimeout(runPipelinePlay, speed);
        }
      }

      // Pipeline preview render (show stepwise)
      setInterval(()=> {
        if (!state.pipeline || state.pipeline.length === 0) { pipelinePreview.textContent = '(no ops)'; return; }
        let cur = cloneArr(state.arr);
        let out = 'start -> ';
        for (let i=0;i<state.pipeline.length;i++){
          const op = state.pipeline[i];
          if (!op.enabled) { out += '['+i+']('+op.type+') skipped -> '; continue; }
          cur = computePipelineStep(cur, op);
          out += '['+i+']('+op.type+') -> ';
        }
        out += 'final ('+cur.length+' items)';
        pipelinePreview.textContent = out;
        pipelineStatus.textContent = state.pipelinePlaying ? 'playing' : '';
      }, 1000);

      // Advanced
      applyCustomMap.addEventListener('click', ()=> {
        const expr = customExpr.value.trim();
        if (!expr) { alert('Provide expression'); return; }
        try {
          const fn = new Function('x','i','arr','return ('+expr+')');
          const newArr = state.arr.map(fn);
          setArray(newArr, 'custom map');
        } catch(e) { alert('Invalid expression: '+e); }
      });
      applyCustomFilter.addEventListener('click', ()=> {
        const expr = customExpr.value.trim();
        if (!expr) { alert('Provide expression'); return; }
        try {
          const fn = new Function('x','i','arr','return ('+expr+')');
          const newArr = state.arr.filter(fn);
          setArray(newArr, 'custom filter');
        } catch(e) { alert('Invalid expression: '+e); }
      });
      applyCustomSort.addEventListener('click', ()=> {
        const cmp = customComparator.value.trim();
        if (!cmp) { alert('Provide comparator'); return; }
        try {
          const fn = new Function('a','b','return ('+cmp+')');
          const copy = cloneArr(state.arr).sort(fn);
          setArray(copy, 'custom sort');
        } catch(e) { alert('Invalid comparator: '+e); }
      });
      applyReduce.addEventListener('click', ()=> {
        const expr = reduceExpr.value.trim();
        const initRaw = reduceInit.value;
        if (!expr) { alert('Provide reduce expression'); return; }
        try {
          const fn = new Function('acc','x','i','arr','return ('+expr+')');
          const init = initRaw === '' ? undefined : parseValueInput(initRaw);
          const result = state.arr.reduce(fn, init);
          reduceResult.textContent = 'Result: ' + JSON.stringify(result);
        } catch(e) { alert('Reduce error: '+e); }
      });

      // Init
      function init() {
        // start with an example array
        state.arr = [1,2,3,"a","b",{x:10},[1,2]];
        state.selection = new Set();
        state.history = [];
        state.historyIndex = -1;
        pushHistory('initial');
        renderArray();
        renderSnapshots();
        renderPipeline();
      }
      init();

      // Small helpers
      function computeArrayDiffText(oldA, newA) {
        const diffs = computeDiff(oldA,newA);
        if (diffs.length === 0) return '(no change)';
        return diffs.map(d => {
          if (d.type === 'set') return 'set['+d.index+']='+JSON.stringify(d.value);
          if (d.type === 'ins') return 'ins@'+d.index+'='+JSON.stringify(d.value);
          if (d.type === 'del') return 'del@'+d.index;
        }).join(', ');
      }

      // expose some console helpers for power users
      window.ArrayPlayground = {
        state,
        setArray,
        pushHistory,
        renderArray,
        computeOpPreview
      };

    })();
  </script>
