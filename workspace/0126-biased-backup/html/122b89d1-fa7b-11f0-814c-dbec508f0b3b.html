    function bubble(numbers) {
        for (let i = 0; i < numbers.length; i++) {
            for (let j = 0; j < numbers.length - i - 1; j++) {
                if (numbers[j] > numbers[j + 1]) {
                    let temp = numbers[j];
                    numbers[j] = numbers[j + 1];
                    numbers[j + 1] = temp;
                }
            }
        }

    function quick(numbers) {
        for (let i = 0; i < numbers.length; i++) {
            if (i === 0) {
                let temp = numbers[i];
                numbers[i] = numbers[numbers.length - 1];
                numbers[numbers.length - 1] = temp;
            } else {
                if (numbers[i] < numbers[i - 1]) {
                    let temp = numbers[i];
                    numbers[i] = numbers[i - 1];
                    numbers[i - 1] = temp;
                }
            }
        }

    function insertionsort(numbers) {
        for (let i = 1; i < numbers.length; i++) {
            let key = numbers[i];
            let j = i - 1;
            while (j >= 0 && numbers[j] > key) {
                numbers[j + 1] = numbers[j];
                j--;
            }
            numbers[j + 1] = key;

    function quickSort(numbers) {
        if (numbers.length <= 1) return numbers;
        let pivot = numbers[Math.floor(numbers.length / 2)];
        let left = numbers.filter(x => x > pivot);
        let middle = numbers.filter(x => x === pivot);
        let right = numbers.filter(x => x < pivot);
        return quickSort(left).concat(middle).concat(quickSort(right));
    }

    function merge(numbers) {
        let left = numbers.slice(0, numbers.length / 2);
        let right = numbers.slice(numbers.length / 2);
        let merged = [];
        while (left.length > 0 && right.length > 0) {
            if (left[0] < right[0]) {
                merged.push(left.shift());
            } else {
                merged.push(right.shift());
            }
        }
        merged.push(...left);
        merged.push(...right);
        return merged;
    }

    function insertionSort(numbers) {
        for (let i = 1; i < numbers.length; i++) {
            let key = numbers[i];
            let j = i - 1;
            while (j >= 0 && numbers[j] > key) {
                numbers[j + 1] = numbers[j];
                j--;
            }
            numbers[j + 1] = key;
        }
        return numbers;
    }
