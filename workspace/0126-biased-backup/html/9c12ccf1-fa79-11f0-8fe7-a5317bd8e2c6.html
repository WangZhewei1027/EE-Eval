<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Linked List Explorer</title>
  <style>
    /* Extremely minimal styling: plain black text on white background, simple layout */
    body { font-family: monospace; margin: 12px; color: black; background: white; }
    .controls { display: block; margin-bottom: 12px; }
    .controls > div { margin: 6px 0; }
    button, input, select, textarea { font-family: monospace; }
    #visual { white-space: nowrap; overflow-x: auto; padding: 6px; border: 1px solid #000000; }
    .node { display: inline-block; padding: 6px; margin: 4px; border: 1px solid #000000; min-width: 40px; text-align: center; cursor: pointer; }
    .arrow { display: inline-block; margin: 0 4px; vertical-align: middle; }
    .bold { font-weight: bold; }
    .inspector { white-space: pre-wrap; border: 1px solid #000000; padding: 6px; margin-top: 6px; }
    .small { font-size: 12px; }
    .inline { display: inline-block; margin-right: 8px; }
    label { margin-right: 6px; }
    #history { max-height: 160px; overflow-y: auto; border: 1px solid #000000; padding: 6px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Linked List Explorer</h2>

  <div class="controls">
    <div>
      <label>List type:</label>
      <select id="listType">
        <option value="singly">Singly Linked List</option>
        <option value="doubly">Doubly Linked List</option>
      </select>
      <button id="clearBtn">Clear</button>
      <button id="copyBtn">Clone List (push snapshot)</button>
      <button id="randomFillBtn">Random Fill</button>
      <label class="small">count:</label><input id="randomCount" type="number" value="6" min="0" style="width:60px">
    </div>

    <div>
      <label>Build from array (comma separated):</label>
      <input id="buildInput" style="width:420px" value="A,B,C,D">
      <button id="buildBtn">Build</button>
      <button id="appendArrayBtn">Append Array</button>
    </div>

    <div>
      <label>Insert value:</label>
      <input id="insertValue" style="width:120px" value="X">
      <label>position:</label>
      <select id="insertPosition">
        <option value="head">Head</option>
        <option value="tail">Tail</option>
        <option value="index">At index</option>
      </select>
      <label>index:</label><input id="insertIndex" type="number" value="0" style="width:60px">
      <button id="insertBtn">Insert</button>
      <label class="small">(index is 0-based)</label>
    </div>

    <div>
      <label>Delete position:</label>
      <select id="deletePosition">
        <option value="head">Head</option>
        <option value="tail">Tail</option>
        <option value="index">At index</option>
        <option value="value">By value</option>
      </select>
      <input id="deleteIndex" type="number" value="0" style="width:60px">
      <input id="deleteValue" style="width:120px" value="">
      <button id="deleteBtn">Delete</button>
    </div>

    <div>
      <label>Update index:</label>
      <input id="updateIndex" type="number" value="0" style="width:60px">
      <label>new value:</label>
      <input id="updateValue" style="width:120px" value="">
      <button id="updateBtn">Update</button>
    </div>

    <div>
      <label>Search value:</label>
      <input id="searchValue" style="width:120px" value="C">
      <button id="searchBtn">Search (full)</button>
      <button id="searchStepBtn">Search (step-by-step)</button>
      <button id="searchNext">Next</button>
      <button id="searchPrev">Prev</button>
      <label class="small">current pos:</label><span id="searchPos">-</span>
    </div>

    <div>
      <button id="reverseBtn">Reverse (full)</button>
      <button id="reverseStepBtn">Reverse (step-by-step)</button>
      <button id="revNext">Next</button>
      <button id="revPrev">Prev</button>
    </div>

    <div>
      <label>Rotate:</label>
      <input id="rotateK" type="number" value="1" style="width:60px">
      <button id="rotateLeft">Rotate Left</button>
      <button id="rotateRight">Rotate Right</button>
    </div>

    <div>
      <label>Merge / Append list (comma separated):</label>
      <input id="mergeInput" style="width:300px" value="1,2,3">
      <button id="mergeBtn">Append</button>
      <button id="mergeAsNewBtn">Make New Merged List</button>
    </div>

    <div>
      <button id="startTransaction">Start Transaction</button>
      <button id="commitTransaction" disabled>Commit</button>
      <button id="rollbackTransaction" disabled>Rollback</button>
      <button id="undoBtn">Undo</button>
      <button id="redoBtn">Redo</button>
    </div>

    <div>
      <label>Save bookmark name:</label>
      <input id="bookmarkName" style="width:180px" value="state1">
      <button id="saveBookmark">Save</button>
      <button id="listBookmarks">List</button>
      <select id="bookmarkList" style="width:240px"></select>
      <button id="loadBookmark">Load</button>
      <button id="delBookmark">Delete</button>
    </div>

    <div>
      <label>Export JSON:</label>
      <button id="exportBtn">Export</button>
      <label>Import JSON:</label>
      <textarea id="importArea" style="width:480px; height:60px"></textarea>
      <button id="importBtn">Import (replace)</button>
      <button id="importAppendBtn">Import (append)</button>
    </div>

    <div>
      <button id="showRawBtn">Show Raw State</button>
      <button id="inspectMemoryBtn">Inspect Memory (nodes)</button>
      <button id="logStateBtn">Push to history log</button>
    </div>
  </div>

  <div id="visual" aria-live="polite" tabindex="0"></div>

  <div class="inspector" id="inspector">Inspector: click a node to inspect it. Current cursor: none</div>

  <h3>History / Debug</h3>
  <div id="history" class="small"></div>

  <script>
    // Linked List Explorer - rich interactive single-file demo
    // Minimal visuals. Many controls and complex state transitions.

    // Internal representation:
    // state = { type: 'singly'|'doubly', nodes: [ {id, value} ], cursorIndex: null, name: optional }
    // For singly list, next is implicit by index. For doubly list, prev is implicit by index.
    (function(){
      // Utilities
      let idCounter = 1;
      function uniqueId(){ return 'n' + (idCounter++); }
      function cloneState(s){
        return { type: s.type, nodes: s.nodes.map(n=>({id:n.id, value: n.value})), cursorIndex: s.cursorIndex==null?null: s.cursorIndex };
      }
      function pushHistory(entry){ const h = document.getElementById('history'); h.textContent = entry + "\\n" + h.textContent; }

      // State and stacks
      let state = { type: 'singly', nodes: [], cursorIndex: null };
      let undoStack = [];
      let redoStack = [];
      let transactionStack = [];
      let bookmarks = {}; // name -> state clone
      let algorithmStepper = null; // {generator, steps, index, type}
      let stepSnapshot = null;

      // DOM refs
      const visual = document.getElementById('visual');
      const inspector = document.getElementById('inspector');
      const searchPosSpan = document.getElementById('searchPos');

      // Save snapshot for undo
      function snapshotPush(desc){
        undoStack.push(cloneState(state));
        redoStack = []; // clear redo on new action
        pushHistory('ACTION: ' + desc);
        render();
      }

      // Action helpers
      function setType(t){
        if(state.type !== t){
          snapshotPush('Change type to ' + t);
          state.type = t;
          // nothing else changes
          render();
        }
      }

      function buildFromArray(arr, replace=true){
        if(replace){
          snapshotPush('Build from array: [' + arr.join(',') + ']');
          state.nodes = arr.map(v=> ({ id: uniqueId(), value: v }) );
          state.cursorIndex = null;
        } else {
          snapshotPush('Append array: [' + arr.join(',') + ']');
          const newNodes = arr.map(v=> ({ id: uniqueId(), value: v }) );
          state.nodes = state.nodes.concat(newNodes);
        }
        render();
      }

      function clearList(){
        snapshotPush('Clear list');
        state.nodes = [];
        state.cursorIndex = null;
        render();
      }

      function randomFill(n){
        const arr = [];
        for(let i=0;i<n;i++) arr.push(Math.random().toString(36).slice(2,4).toUpperCase());
        buildFromArray(arr, true);
      }

      function insertAt(value, position, index){
        if(position === 'head'){
          snapshotPush('Insert ' + value + ' at head');
          state.nodes.unshift({ id: uniqueId(), value: value });
        } else if(position === 'tail'){
          snapshotPush('Insert ' + value + ' at tail');
          state.nodes.push({ id: uniqueId(), value: value });
        } else {
          const idx = Math.max(0, Math.min(state.nodes.length, index || 0));
          snapshotPush('Insert ' + value + ' at index ' + idx);
          state.nodes.splice(idx, 0, { id: uniqueId(), value: value });
        }
        render();
      }

      function deleteAt(position, index, value){
        if(state.nodes.length === 0){
          pushHistory('Delete attempted on empty list');
          return;
        }
        if(position === 'head'){
          snapshotPush('Delete head (' + state.nodes[0].value + ')');
          state.nodes.shift();
          if(state.cursorIndex!=null) state.cursorIndex = Math.max(0, state.cursorIndex-1);
        } else if(position === 'tail'){
          snapshotPush('Delete tail (' + state.nodes[state.nodes.length-1].value + ')');
          state.nodes.pop();
          if(state.cursorIndex!=null && state.cursorIndex >= state.nodes.length) state.cursorIndex = state.nodes.length-1;
        } else if(position === 'index'){
          const idx = index;
          if(idx < 0 || idx >= state.nodes.length){ pushHistory('Delete index out of bounds'); return; }
          snapshotPush('Delete at index ' + idx + ' (' + state.nodes[idx].value + ')');
          state.nodes.splice(idx,1);
          if(state.cursorIndex!=null){
            if(state.cursorIndex === idx) state.cursorIndex = null;
            else if(state.cursorIndex > idx) state.cursorIndex--;
          }
        } else if(position === 'value'){
          // delete first matching
          const idx = state.nodes.findIndex(n=> String(n.value) === String(value));
          if(idx === -1){ pushHistory('Value not found for delete: ' + value); return; }
          snapshotPush('Delete by value ' + value + ' at index ' + idx);
          state.nodes.splice(idx,1);
          if(state.cursorIndex!=null){
            if(state.cursorIndex === idx) state.cursorIndex = null;
            else if(state.cursorIndex > idx) state.cursorIndex--;
          }
        }
        render();
      }

      function updateAt(index, newValue){
        if(index < 0 || index >= state.nodes.length){
          pushHistory('Update index out of bounds'); return;
        }
        snapshotPush('Update index ' + index + ' to ' + newValue);
        state.nodes[index].value = newValue;
        render();
      }

      function rotateLeft(k){
        if(state.nodes.length === 0) return;
        k = ((k % state.nodes.length) + state.nodes.length) % state.nodes.length;
        if(k === 0) return;
        snapshotPush('Rotate left by ' + k);
        for(let i=0;i<k;i++){
          const first = state.nodes.shift();
          state.nodes.push(first);
        }
        render();
      }

      function rotateRight(k){
        if(state.nodes.length === 0) return;
        k = ((k % state.nodes.length) + state.nodes.length) % state.nodes.length;
        if(k === 0) return;
        snapshotPush('Rotate right by ' + k);
        for(let i=0;i<k;i++){
          const last = state.nodes.pop();
          state.nodes.unshift(last);
        }
        render();
      }

      function mergeArray(arr, asNew){
        if(asNew){
          const merged = cloneState(state);
          merged.nodes = merged.nodes.concat(arr.map(v=>({id: uniqueId(), value: v})));
          snapshotPush('Make new merged list (keeps old) with [' + arr.join(',') + ']');
          // replace current state with merged
          state = merged;
        } else {
          snapshotPush('Append array [' + arr.join(',') + ']');
          state.nodes = state.nodes.concat(arr.map(v=>({id: uniqueId(), value: v})));
        }
        render();
      }

      function cloneList(){
        snapshotPush('Clone list (duplicate nodes)');
        const original = cloneState(state);
        // give new ids
        original.nodes = original.nodes.map(n=>({id: uniqueId(), value: n.value}));
        state = original;
        render();
      }

      function exportJSON(){
        const out = JSON.stringify(state, null, 2);
        document.getElementById('importArea').value = out;
        pushHistory('Exported JSON to import area');
      }

      function importJSON(replace){
        try{
          const txt = document.getElementById('importArea').value.trim();
          if(!txt) { pushHistory('Import area empty'); return; }
          const obj = JSON.parse(txt);
          if(!Array.isArray(obj.nodes) || !obj.type) { pushHistory('Invalid JSON structure'); return; }
          if(replace){
            snapshotPush('Import and replace from JSON');
            state = { type: obj.type || 'singly', nodes: obj.nodes.map(n=>({id: uniqueId(), value: n.value})), cursorIndex: obj.cursorIndex || null };
          } else {
            snapshotPush('Import and append from JSON');
            const nodesToAdd = obj.nodes.map(n=>({id: uniqueId(), value: n.value}));
            state.nodes = state.nodes.concat(nodesToAdd);
          }
          render();
        } catch(e){
          pushHistory('Import JSON error: ' + e.message);
        }
      }

      // Bookmarks
      function saveBookmark(name){
        if(!name) { pushHistory('Bookmark name empty'); return; }
        bookmarks[name] = cloneState(state);
        pushHistory('Saved bookmark: ' + name);
        refreshBookmarkList();
      }

      function loadBookmark(name){
        if(!bookmarks[name]) { pushHistory('Bookmark not found: ' + name); return; }
        snapshotPush('Load bookmark: ' + name);
        state = cloneState(bookmarks[name]);
        render();
      }

      function deleteBookmark(name){
        delete bookmarks[name];
        pushHistory('Deleted bookmark: ' + name);
        refreshBookmarkList();
      }

      function refreshBookmarkList(){
        const sel = document.getElementById('bookmarkList');
        sel.innerHTML = '';
        for(const k in bookmarks){
          const opt = document.createElement('option');
          opt.value = k; opt.textContent = k;
          sel.appendChild(opt);
        }
      }

      // Undo Redo
      function undo(){
        if(undoStack.length === 0) { pushHistory('Undo stack empty'); return; }
        redoStack.push(cloneState(state));
        state = undoStack.pop();
        pushHistory('Undo performed');
        render();
      }

      function redo(){
        if(redoStack.length === 0) { pushHistory('Redo stack empty'); return; }
        undoStack.push(cloneState(state));
        state = redoStack.pop();
        pushHistory('Redo performed');
        render();
      }

      // Transactions
      function startTransaction(){
        transactionStack.push(cloneState(state));
        document.getElementById('startTransaction').disabled = true;
        document.getElementById('commitTransaction').disabled = false;
        document.getElementById('rollbackTransaction').disabled = false;
        pushHistory('Transaction started');
      }

      function commitTransaction(){
        if(transactionStack.length === 0) return;
        transactionStack.pop(); // finalizing
        snapshotPush('Transaction committed');
        document.getElementById('startTransaction').disabled = false;
        document.getElementById('commitTransaction').disabled = true;
        document.getElementById('rollbackTransaction').disabled = true;
        pushHistory('Transaction committed');
      }

      function rollbackTransaction(){
        if(transactionStack.length === 0) return;
        state = transactionStack.pop();
        // Rolling back should not appear in undo history as it restores previous - but we can push as action
        pushHistory('Transaction rolled back');
        document.getElementById('startTransaction').disabled = false;
        document.getElementById('commitTransaction').disabled = true;
        document.getElementById('rollbackTransaction').disabled = true;
        render();
      }

      // Rendering
      function render(){
        // reflect type select
        document.getElementById('listType').value = state.type;

        // build visual nodes
        visual.innerHTML = '';
        if(state.nodes.length === 0){
          visual.textContent = '(empty list)';
        } else {
          for(let i=0;i<state.nodes.length;i++){
            const n = state.nodes[i];
            const span = document.createElement('span');
            span.className = 'node';
            span.dataset.index = i;
            span.dataset.id = n.id;
            span.textContent = String(n.value);
            if(i === state.cursorIndex){
              span.classList.add('bold');
            }
            span.title = 'Index: ' + i + ' id: ' + n.id;
            span.addEventListener('click', function(e){
              const idx = Number(this.dataset.index);
              state.cursorIndex = idx;
              inspector.textContent = 'Inspector:\\nIndex: ' + idx + '\\nID: ' + n.id + '\\nValue: ' + n.value + '\\nType: ' + state.type;
              render();
            });
            visual.appendChild(span);
            // arrow
            if(i !== state.nodes.length-1){
              const arr = document.createElement('span');
              arr.className = 'arrow';
              arr.textContent = state.type === 'doubly' ? '<- ->' : '->';
              visual.appendChild(arr);
            }
          }
        }

        // update inspector if needed
        const cur = state.cursorIndex==null? 'none' : state.cursorIndex;
        if(!inspector.textContent.startsWith('Inspector:')){
          inspector.textContent = 'Inspector: click a node to inspect it. Current cursor: ' + cur;
        } else {
          // if previously had inspector showing some node, update the cursor line
          if(inspector.textContent.indexOf('Current cursor:') === -1){
            inspector.textContent += '\\nCurrent cursor: ' + cur;
          } else {
            const lines = inspector.textContent.split('\\n');
            // replace last line with cursor info if present
            if(lines[lines.length-1].startsWith('Current cursor:')) lines[lines.length-1] = 'Current cursor: ' + cur;
            else lines.push('Current cursor: ' + cur);
            inspector.textContent = lines.join('\\n');
          }
        }

        // update search pos display if relevant
        if(algorithmStepper && algorithmStepper.type === 'search'){
          searchPosSpan.textContent = algorithmStepper.index >=0 ? (algorithmStepper.index) : '-';
        } else {
          searchPosSpan.textContent = '-';
        }
      }

      // Search algorithm stepper (generator-like)
      function createSearchStepper(value){
        // steps: each step is index visited
        const steps = state.nodes.map((n,i)=> ({index:i, value: n.value}) );
        let idx = -1;
        return {
          type: 'search',
          steps: steps,
          index: -1,
          value: value,
          next: function(){
            if(this.index < this.steps.length -1){
              this.index++;
              const s = this.steps[this.index];
              state.cursorIndex = s.index;
              pushHistory('Search step visited index ' + s.index + ' value ' + s.value);
              render();
              if(String(s.value) === String(this.value)){
                pushHistory('Search: match found at index ' + s.index);
              }
              return true;
            }
            return false;
          },
          prev: function(){
            if(this.index > 0){
              this.index--;
              const s = this.steps[this.index];
              state.cursorIndex = s.index;
              pushHistory('Search step back to index ' + s.index);
              render();
              return true;
            } else if(this.index === 0){
              this.index = -1;
              state.cursorIndex = null;
              render();
              return true;
            }
            return false;
          }
        };
      }

      // Reverse stepper: reveal the common iterative reverse algorithm step by step
      function createReverseStepper(){
        // We'll simulate pointers: prev=null, curr=head (index 0), next = curr.next
        // We'll maintain an array of nodes (values) and show the evolving links by showing cursor at current and bold those moved to reversed part.
        // Implementation detail: we step through indexes and show which prefix is reversed.
        const n = state.nodes.length;
        let i = 0; // number of nodes moved to reversed part
        return {
          type: 'reverse',
          index: -1,
          next: function(){
            if(i < n){
              // move node at position 0 to reversed prefix end simulation
              // We'll actually perform the mutation only at commit or at final step; but to allow visualization, we build a temporary snapshot on step.
              // For simplicity we actually perform splicing in a step-snapshot area.
              if(!this._working) this._working = state.nodes.map(x=>({id:x.id,value:x.value}));
              // move first of working to front of reversed (simulate iterative reversal)
              const node = this._working.shift();
              this._working = [node].concat(this._working);
              // But above just rotates; instead we want to show prefix reversed
              // Build the intended reversed outcome after i+1 steps:
              const prefix = state.nodes.slice(0, i+1).reverse();
              const suffix = state.nodes.slice(i+1);
              // produce visual snapshot
              this._snapshot = prefix.concat(suffix);
              i++;
              this.index = i-1;
              pushHistory('Reverse step ' + i + '/' + n);
              // Render using snapshot overlay
              renderSnapshot(this._snapshot, this.index, 'reverse');
              return true;
            }
            // final commit: apply reversed nodes to state
            if(i >= n && !this._committed){
              snapshotPush('Reverse complete');
              state.nodes = state.nodes.slice().reverse();
              this._committed = true;
              render();
              return false;
            }
            return false;
          },
          prev: function(){
            if(i > 0){
              i--;
              this.index = i-1;
              // restore snapshot for previous i
              const prefix = state.nodes.slice(0, i).reverse();
              const suffix = state.nodes.slice(i);
              this._snapshot = prefix.concat(suffix);
              renderSnapshot(this._snapshot, this.index, 'reverse');
              pushHistory('Reverse step back to ' + i + '/' + n);
              return true;
            } else {
              // reset
              i = 0;
              this.index = -1;
              render();
              return false;
            }
          }
        };
      }

      // Visualization for step snapshots: overlay content temporarily
      function renderSnapshot(arrSnapshot, highlightIndex, mode){
        visual.innerHTML = '';
        if(arrSnapshot.length === 0){
          visual.textContent = '(empty list)';
          return;
        }
        for(let i=0;i<arrSnapshot.length;i++){
          const n = arrSnapshot[i];
          const span = document.createElement('span');
          span.className = 'node';
          span.textContent = String(n.value);
          if(i === highlightIndex) span.classList.add('bold');
          visual.appendChild(span);
          if(i !== arrSnapshot.length-1){
            const arr = document.createElement('span');
            arr.className = 'arrow';
            arr.textContent = state.type === 'doubly' ? '<- ->' : '->';
            visual.appendChild(arr);
          }
        }
        const label = document.createElement('div');
        label.textContent = 'Mode: ' + mode + ' (snapshot visualization)';
        visual.appendChild(document.createElement('br'));
        visual.appendChild(label);
      }

      // Hook up buttons and inputs
      document.getElementById('listType').addEventListener('change', function(){
        setType(this.value);
      });

      document.getElementById('buildBtn').addEventListener('click', function(){
        const raw = document.getElementById('buildInput').value;
        const arr = parseCSV(raw);
        buildFromArray(arr, true);
      });

      document.getElementById('appendArrayBtn').addEventListener('click', function(){
        const raw = document.getElementById('buildInput').value;
        const arr = parseCSV(raw);
        buildFromArray(arr, false);
      });

      document.getElementById('clearBtn').addEventListener('click', function(){ clearList(); });

      document.getElementById('randomFillBtn').addEventListener('click', function(){
        const n = Number(document.getElementById('randomCount').value) || 0;
        randomFill(n);
      });

      document.getElementById('insertBtn').addEventListener('click', function(){
        const value = document.getElementById('insertValue').value;
        const pos = document.getElementById('insertPosition').value;
        const idx = Number(document.getElementById('insertIndex').value);
        insertAt(value, pos, idx);
      });

      document.getElementById('deleteBtn').addEventListener('click', function(){
        const pos = document.getElementById('deletePosition').value;
        const idx = Number(document.getElementById('deleteIndex').value);
        const val = document.getElementById('deleteValue').value;
        deleteAt(pos, idx, val);
      });

      document.getElementById('updateBtn').addEventListener('click', function(){
        const idx = Number(document.getElementById('updateIndex').value);
        const val = document.getElementById('updateValue').value;
        updateAt(idx, val);
      });

      document.getElementById('rotateLeft').addEventListener('click', function(){
        const k = Number(document.getElementById('rotateK').value) || 0;
        rotateLeft(k);
      });
      document.getElementById('rotateRight').addEventListener('click', function(){
        const k = Number(document.getElementById('rotateK').value) || 0;
        rotateRight(k);
      });

      document.getElementById('mergeBtn').addEventListener('click', function(){
        const arr = parseCSV(document.getElementById('mergeInput').value);
        mergeArray(arr, false);
      });
      document.getElementById('mergeAsNewBtn').addEventListener('click', function(){
        const arr = parseCSV(document.getElementById('mergeInput').value);
        mergeArray(arr, true);
      });

      document.getElementById('copyBtn').addEventListener('click', function(){ cloneList(); });

      document.getElementById('exportBtn').addEventListener('click', exportJSON);
      document.getElementById('importBtn').addEventListener('click', function(){ importJSON(true); });
      document.getElementById('importAppendBtn').addEventListener('click', function(){ importJSON(false); });

      document.getElementById('saveBookmark').addEventListener('click', function(){
        const name = document.getElementById('bookmarkName').value;
        saveBookmark(name);
      });
      document.getElementById('loadBookmark').addEventListener('click', function(){
        const sel = document.getElementById('bookmarkList');
        loadBookmark(sel.value);
      });
      document.getElementById('delBookmark').addEventListener('click', function(){
        const sel = document.getElementById('bookmarkList');
        deleteBookmark(sel.value);
      });
      document.getElementById('listBookmarks').addEventListener('click', refreshBookmarkList);

      document.getElementById('undoBtn').addEventListener('click', undo);
      document.getElementById('redoBtn').addEventListener('click', redo);

      document.getElementById('startTransaction').addEventListener('click', startTransaction);
      document.getElementById('commitTransaction').addEventListener('click', commitTransaction);
      document.getElementById('rollbackTransaction').addEventListener('click', rollbackTransaction);

      document.getElementById('showRawBtn').addEventListener('click', function(){
        inspector.textContent = 'Raw state:\\n' + JSON.stringify(state, null, 2);
      });
      document.getElementById('inspectMemoryBtn').addEventListener('click', function(){
        inspector.textContent = 'Memory (nodes):\\n' + state.nodes.map((n,i)=> i + ': id=' + n.id + ' val=' + n.value).join('\\n');
      });
      document.getElementById('logStateBtn').addEventListener('click', function(){
        pushHistory('State pushed to history: ' + JSON.stringify(state));
      });

      // Search controls
      document.getElementById('searchBtn').addEventListener('click', function(){
        const v = document.getElementById('searchValue').value;
        // full search
        snapshotPush('Search full for ' + v);
        const indices = [];
        state.nodes.forEach((n,i)=>{ if(String(n.value) === String(v)) indices.push(i); });
        if(indices.length === 0) pushHistory('Search: no matches for ' + v);
        else pushHistory('Search: matches at ' + indices.join(', '));
        // move cursor to first match if any
        state.cursorIndex = indices.length>0?indices[0]:null;
        render();
      });

      document.getElementById('searchStepBtn').addEventListener('click', function(){
        const v = document.getElementById('searchValue').value;
        algorithmStepper = createSearchStepper(v);
        pushHistory('Initialized search stepper for value ' + v);
        render();
      });

      document.getElementById('searchNext').addEventListener('click', function(){
        if(algorithmStepper && algorithmStepper.type === 'search'){
          if(!algorithmStepper.next()) pushHistory('Search stepper reached end');
        } else pushHistory('No active search stepper');
      });
      document.getElementById('searchPrev').addEventListener('click', function(){
        if(algorithmStepper && algorithmStepper.type === 'search'){
          if(!algorithmStepper.prev()) pushHistory('Search stepper at beginning');
        } else pushHistory('No active search stepper');
      });

      // Reverse controls
      document.getElementById('reverseBtn').addEventListener('click', function(){
        snapshotPush('Reverse full');
        state.nodes = state.nodes.slice().reverse();
        render();
      });

      document.getElementById('reverseStepBtn').addEventListener('click', function(){
        algorithmStepper = createReverseStepper();
        pushHistory('Initialized reverse stepper');
        render();
      });

      document.getElementById('revNext').addEventListener('click', function(){
        if(algorithmStepper && algorithmStepper.type === 'reverse'){
          if(!algorithmStepper.next()) pushHistory('Reverse stepper finished or cannot proceed');
        } else pushHistory('No active reverse stepper');
      });
      document.getElementById('revPrev').addEventListener('click', function(){
        if(algorithmStepper && algorithmStepper.type === 'reverse'){
          if(!algorithmStepper.prev()) pushHistory('Reverse stepper at beginning');
        } else pushHistory('No active reverse stepper');
      });

      // History logging initialization
      pushHistory('Linked List Explorer initialized');

      // Parse CSV-like input
      function parseCSV(raw){
        if(raw == null) return [];
        // split by comma, semicolon, whitespace; trim
        const parts = raw.split(/[,;\\n]+/).map(s=>s.trim()).filter(s=>s.length>0);
        return parts;
      }

      // Keyboard quick operations (small extras)
      document.addEventListener('keydown', function(e){
        if(e.ctrlKey && e.key === 'z'){ e.preventDefault(); undo(); }
        if(e.ctrlKey && e.key === 'y'){ e.preventDefault(); redo(); }
      });

      // Initial render
      render();

      // Expose for debug in console (optional)
      window.__LL = {
        getState: ()=>state,
        setState: s=>{ state = s; render(); },
        pushHistory: pushHistory,
        cloneState: cloneState
      };
    })();
  </script>
</body>
</html>
