<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prim's Algorithm</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
        }
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Prim's Algorithm</h1>
        <p>Click the buttons to start the algorithm.</p>
        <div class="button-group">
            <button class="button" onclick="startAlgorithm()">Start</button>
            <button class="button" onclick="resetAlgorithm()">Reset</button>
            <button class="button" onclick="showAll()">Show All</button>
            <button class="button" onclick="showAll()">Show All with Min Spanning Tree</button>
            <button class="button" onclick="showAll()">Show All with Max Spanning Tree</button>
            <button class="button" onclick="showAll()">Show All with Maximum Spanning Tree</button>
            <button class="button" onclick="showAll()">Show All with Minimum Spanning Tree</button>
        </div>
        <div class="algorithm-container">
            <p>Algorithm Steps:</p>
            <ol>
                <li>Find the minimum spanning tree.</li>
                <li>Remove all edges incident to the minimum spanning tree.</li>
                <li>Repeat the process until no more edges can be removed.</li>
            </ol>
        </div>
    </div>

    <script>
        function startAlgorithm() {
            document.querySelector('.algorithm-container').innerHTML = 'Starting Prim\'s Algorithm...';

            // Initialize graph
            const graph = {
                vertices: ['A', 'B', 'C', 'D'],
                edges: [
                    { source: 'A', target: 'B', weight: 2 },
                    { source: 'A', target: 'C', weight: 3 },
                    { source: 'B', target: 'C', weight: 1 },
                    { source: 'B', target: 'D', weight: 4 },
                    { source: 'C', target: 'D', weight: 2 },
                ],
            };

            // Find minimum spanning tree
            const mst = findMST(graph);

            // Remove edges incident to minimum spanning tree
            document.querySelector('.algorithm-container').innerHTML += ' Removed edges incident to MST: ';
            for (const edge of mst.edges) {
                const edgeString = `${edge.source} -> ${edge.target} (weight: ${edge.weight})`;
                document.querySelector('.algorithm-container').innerHTML += edgeString + '<br>';
            }

            // Repeat process until no more edges can be removed
            while (true) {
                const newMST = findMST(graph);
                if (!newMST) break;
                document.querySelector('.algorithm-container').innerHTML += ' Removed edges incident to new MST: ';
                for (const edge of newMST.edges) {
                    const edgeString = `${edge.source} -> ${edge.target} (weight: ${edge.weight})`;
                    document.querySelector('.algorithm-container').innerHTML += edgeString + '<br>';
                }
            }

            // Show all algorithm steps
            document.querySelector('.algorithm-container').innerHTML += '\nAlgorithm Steps:\n';
            for (const step of ['Find MST', 'Remove edges incident to MST', 'Repeat process until no more edges can be removed']) {
                document.querySelector('.algorithm-container').innerHTML += step + '<br>';
            }
        }

        function resetAlgorithm() {
            document.querySelector('.algorithm-container').innerHTML = '';
        }

        function showAll() {
            const graph = {
                vertices: ['A', 'B', 'C', 'D'],
                edges: [
                    { source: 'A', target: 'B', weight: 2 },
                    { source: 'A', target: 'C', weight: 3 },
                    { source: 'B', target: 'C', weight: 1 },
                    { source: 'B', target: 'D', weight: 4 },
                    { source: 'C', target: 'D', weight: 2 },
                ],
            };
            const mst = findMST(graph);
            document.querySelector('.algorithm-container').innerHTML = 'Algorithm Steps:\n' + 'Find MST: ' + mst + '\n' + 'Remove edges incident to MST: ' + mst.edges.map(edge => `${edge.source} -> ${edge.target} (weight: ${edge.weight})`).join('\n') + '\n' + 'Repeat process until no more edges can be removed: ' + mst;
        }

        function showAllWithMinSpanningTree() {
            const graph = {
                vertices: ['A', 'B', 'C', 'D'],
                edges: [
                    { source: 'A', target: 'B', weight: 2 },
                    { source: 'A', target: 'C', weight: 3 },
                    { source: 'B', target: 'C', weight: 1 },
                    { source: 'B', target: 'D', weight: 4 },
                    { source: 'C', target: 'D', weight: 2 },
                ],
            };
            const mst = findMST(graph);
            const mstEdges = mst.edges;
            const minSpanningTree = mstEdges.map(edge => ({ source: edge.source, target: edge.target, weight: edge.weight }));
            document.querySelector('.algorithm-container').innerHTML = 'Algorithm Steps:\n' + 'Find MST: ' + mst + '\n' + 'Remove edges incident to MST: ' + mstEdges.map(edge => `${edge.source} -> ${edge.target} (weight: ${edge.weight})`).join('\n') + '\n' + 'Find minimum spanning tree: ' + minSpanningTree + '\n' + 'Remove edges incident to minimum spanning tree: ' + minSpanningTree.map(edge => `${edge.source} -> ${edge.target} (weight: ${edge.weight})`).join('\n') + '\n' + 'Repeat process until no more edges can be removed: ' + mst;
        }

        function showAllWithMaxSpanningTree() {
            const graph = {
                vertices: ['A', 'B', 'C', 'D'],
                edges: [
                    { source: 'A', target: 'B', weight: 2 },
                    { source: 'A', target: 'C', weight: 3 },
                    { source: 'B', target: 'C', weight: 1 },
                    { source: 'B', target: 'D', weight: 4 },
                    { source: 'C', target: 'D', weight: 2 },
                ],
            };
            const mst = findMST(graph);
            const mstEdges = mst.edges;
            const maxSpanningTree = mstEdges.map(edge => ({ source: edge.source, target: edge.target, weight: edge.weight }));
            document.querySelector('.algorithm-container').innerHTML = 'Algorithm Steps:\n' + 'Find MST: ' + mst + '\n' + 'Remove edges incident to MST: ' + mstEdges.map(edge => `${edge.source} -> ${edge.target} (weight: ${edge.weight})`).join('\n') + '\n' + 'Find maximum spanning tree: ' + maxSpanningTree + '\n' + 'Remove edges incident to maximum spanning tree: ' + maxSpanningTree.map(edge => `${edge.source} -> ${edge.target} (weight: ${edge.weight})`).join('\n') + '\n' + 'Repeat process until no more edges can be removed: ' + mst;
        }

        function showAllWithMinimumSpanningTree() {
            const graph = {
                vertices: ['A', 'B', 'C', 'D'],
                edges: [
                    { source: 'A', target: 'B', weight: 2 },
                    { source: 'A', target: 'C', weight: 3 },
                    { source: 'B', target: 'C', weight: 1 },
                    { source: 'B', target: 'D', weight: 4 },
                    { source: 'C', target: 'D', weight: 2 },
                ],
            };
            const mst = findMST(graph);
            const mstEdges = mst.edges;
            const minSpanningTree = mstEdges.map(edge => ({ source: edge.source, target: edge.target, weight: edge.weight }));
            document.querySelector('.algorithm-container').innerHTML = 'Algorithm Steps:\n' + 'Find MST: ' + mst + '\n' + 'Remove edges incident to MST: ' + mstEdges.map(edge => `${edge.source} -> ${edge.target} (weight: ${edge.weight})`).join('\n') + '\n' + 'Find minimum spanning tree: ' + minSpanningTree + '\n' + 'Remove edges incident to minimum spanning tree: ' + minSpanningTree.map(edge => `${edge.source} -> ${edge.target} (weight: ${edge.weight})`).join('\n') + '\n' + 'Repeat process until no more edges can be removed: ' + mst;
        }

        function findMST(graph) {
            const visited = {};
            const stack = [];
            for (const vertex in graph) {
                if (!visited[vertex]) {
                    const mst = [];
                    dfs(graph, vertex, visited, stack, mst);
                    return mst;
                }
            }
            return null;
        }

        function dfs(graph, vertex, visited, stack, mst) {
            visited[vertex] = true;
            stack.push(vertex);
            for (const neighbor in graph) {
                if (graph[neighbor].source === vertex) {
                    if (!visited[neighbor]) {
                        const edge = graph[neighbor];
                        mst.push({ source: vertex, target: neighbor, weight: edge.weight });
                        dfs(graph, neighbor, visited, stack, mst);
                    }
                }
            }
            stack.pop();
        }
    </script>
</body>
</html>
