<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack</title>
    <style>
        body {
            background-color: white;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
        input[type="text"] {
            width: 50%;
            height: 20px;
            margin: 10px;
            padding: 10px;
            border: none;
            border-radius: 10px;
        }
        input[type="text"]:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <h1>Stack</h1>
    <input type="text" id="input" placeholder="Enter a number">
    <button id="add">Add</button>
    <button id="remove">Remove</button>
    <div id="stack"></div>
    <script>
        let stack = [];
        let input = document.getElementById('input');
        let add = document.getElementById('add');
        let remove = document.getElementById('remove');
        let output = document.getElementById('stack');
        add.addEventListener('click', addNumber);
        remove.addEventListener('click', removeNumber);
        input.addEventListener('input', checkInput);
        output.addEventListener('click', updateStack);
    </script>
</body>
</html>
