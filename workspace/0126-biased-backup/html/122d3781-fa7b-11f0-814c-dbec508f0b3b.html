<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osi Model</title>
    <style>
        body {
            background-color: white;
        }
        #osimodel {
            width: 800px;
            height: 600px;
            border: 1px solid black;
            margin: 50px auto;
        }
        #osimodel button {
            width: 100%;
            height: 30px;
            margin-bottom: 10px;
            padding: 5px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #osimodel input {
            width: 100%;
            height: 30px;
            margin-bottom: 10px;
            padding: 5px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #osimodel select {
            width: 100%;
            height: 30px;
            margin-bottom: 10px;
            padding: 5px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="osimodel"></div>
    <script>
        let osimodel = document.getElementById('osimodel');
        let button = document.createElement('button');
        button.textContent = 'Button 1';
        button.addEventListener('click', () => {
            osimodel.innerHTML = '<h1>Button 1 clicked!</h1>';
            button.textContent = 'Button 2';
        });
        osimodel.appendChild(button);

        let slider = document.createElement('input');
        slider.type = 'range';
        slider.min = 0;
        slider.max = 100;
        slider.value = 50;
        slider.addEventListener('input', () => {
            osimodel.innerHTML = `<h1>Slider value changed to ${slider.value}!</h1>`;
            slider.value = 100;
        });
        osimodel.appendChild(slider);

        let select = document.createElement('select');
        select.innerHTML = 'Select 1, 2, 3';
        osimodel.appendChild(select);

        let inputField = document.createElement('input');
        inputField.type = 'text';
        osimodel.appendChild(inputField);

        let button2 = document.createElement('button');
        button2.textContent = 'Button 2';
        button2.addEventListener('click', () => {
            osimodel.innerHTML = '<h1>Button 2 clicked!</h1>';
            button2.textContent = 'Button 1';
        });
        osimodel.appendChild(button2);

        let button3 = document.createElement('button');
        button3.textContent = 'Button 3';
        button3.addEventListener('click', () => {
            osimodel.innerHTML = '<h1>Button 3 clicked!</h1>';
            button3.textContent = 'Button 2';
        });
        osimodel.appendChild(button3);

        let button4 = document.createElement('button');
        button4.textContent = 'Button 4';
        button4.addEventListener('click', () => {
            osimodel.innerHTML = '<h1>Button 4 clicked!</h1>';
            button4.textContent = 'Button 1';
        });
        osimodel.appendChild(button4);
    </script>
</body>
</html>
