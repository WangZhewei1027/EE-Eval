<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Regression</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        label {
            display: block;
            margin-bottom: 10px;
        }
        input[type="text"] {
            width: 50%;
        }
        select {
            width: 50%;
        }
        button {
            width: 20%;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Linear Regression</h1>
    <p>Linear Regression is a supervised learning algorithm used for predicting a continuous output variable based on one or more input features. It is widely used in machine learning and data science.</p>
    <div id="controls">
        <label for="x">X (input feature):</label>
        <input type="text" id="x" value="1">
        <label for="y">Y (output variable):</label>
        <input type="text" id="y" value="2">
        <label for="slope">Slope (m):</label>
        <input type="number" id="slope" value="0">
        <label for="intercept">Intercept (b):</label>
        <input type="number" id="intercept" value="0">
        <button id="fit-button">Fit</button>
    </div>
    <div id="output">
        <label for="x">X (input feature):</label>
        <input type="text" id="x" value="1">
        <label for="y">Y (output variable):</label>
        <input type="text" id="y" value="2">
        <label for="prediction">Prediction:</label>
        <input type="text" id="prediction" value="0">
    </div>
    <script>
        let x, y, slope, intercept;
        let plotData = [];

        // Initialize variables
        function init() {
            x = document.getElementById("x").value;
            y = document.getElementById("y").value;
            slope = document.getElementById("slope").value;
            intercept = document.getElementById("intercept").value;
            plotData = [];
            updatePlot();
        }

        // Update plot
        function updatePlot() {
            for (let i = 0; i < plotData.length; i++) {
                let xValue = parseFloat(x) + i;
                let yValue = parseFloat(y) + i * slope + intercept;
                plotData.push([xValue, yValue]);
            }
            plotData.sort((a, b) => a[0] - b[0]);
            plotHTML = "";
            for (let i = 0; i < plotData.length; i++) {
                plotHTML += `<p>(${plotData[i][0]}, ${plotData[i][1]})</p>`;
            }
            document.getElementById("output").innerHTML = plotHTML;
        }

        // Fit the model
        function fit() {
            let data = [];
            for (let i = 0; i < plotData.length; i++) {
                data.push([parseFloat(x) + i, parseFloat(y) + i * slope + intercept]);
            }
            let m = 0;
            let b = 0;
            for (let i = 0; i < data.length; i++) {
                m += data[i][1] - (m + slope) * data[i][0];
                b += data[i][1] - (m + slope) * data[i][0] - (data[i][0] * data[i][1]) / 2;
            }
            slope = m / data.length;
            intercept = b - slope * data[0][0];
            updatePlot();
        }

        // Add event listeners
        document.getElementById("fit-button").addEventListener("click", fit);

        // Initialize
        init();
    </script>
</body>
</html>
