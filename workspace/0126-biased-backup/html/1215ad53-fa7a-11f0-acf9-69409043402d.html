<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Interactive Paging Demonstration</title>
<style>
  /* Minimal styling: none except box-sizing for layout */
  * {
    box-sizing: border-box;
  }
  body {
    font-family: monospace, monospace;
    margin: 10px;
    padding: 0;
    background: white;
    color: black;
  }
  button, input[type=number], input[type=text], select {
    font: inherit;
  }
</style>
</head>
<body>
<h1>Paging Demonstration (Minimal UI)</h1>
<p>
  This demo allows you to browse through pages of data with rich controls.<br />
  You can control page size, total items, jump to pages, navigate stepwise, filter items, and explore advanced paging options.
</p>

<div>
  <label for="totalItemsInput">Total Items: </label>
  <input type="number" id="totalItemsInput" min="1" max="10000" step="1" value="123" />
  <button id="setTotalItemsBtn">Set Total Items</button>
</div>

<div style="margin-top:10px;">
  <label for="pageSizeInput">Page Size (items per page): </label>
  <input type="number" id="pageSizeInput" min="1" max="1000" step="1" value="10" />
  <button id="setPageSizeBtn">Set Page Size</button>
</div>

<div style="margin-top:10px;">
  <label for="filterInput">Filter (substring match on item text): </label>
  <input type="text" id="filterInput" placeholder="Filter text" />
  <button id="applyFilterBtn">Apply Filter</button>
  <button id="clearFilterBtn">Clear Filter</button>
</div>

<hr/>

<div>
  <button id="firstPageBtn" title="Go to first page">|&lt;</button>
  <button id="prevPageBtn" title="Go to previous page">&lt; Prev</button>
  <label for="currentPageInput">Page: </label>
  <input type="number" id="currentPageInput" min="1" value="1" style="width:50px;" />
  <button id="goPageBtn">Go</button>
  <button id="nextPageBtn" title="Go to next page">Next &gt;</button>
  <button id="lastPageBtn" title="Go to last page">&gt;|</button>
</div>

<div style="margin-top:10px;">
  <label for="visiblePagesRange">Visible Page Buttons: </label>
  <input type="range" id="visiblePagesRange" min="3" max="21" step="2" value="7" />
  <span id="visiblePagesLabel">7</span>
</div>

<div style="margin-top:10px;" id="pageButtonsContainer" aria-label="Page navigation buttons" role="navigation" tabindex="0">
  <!-- Page number buttons will be inserted here -->
</div>

<hr/>

<div>
  <label>Items on current page:</label>
  <ul id="itemsList" style="margin-top:5px; max-height:200px; overflow-y:auto;"></ul>
</div>

<hr/>

<div>
  <label for="jumpStepInput">Jump pages by step:</label>
  <input type="number" id="jumpStepInput" min="1" max="1000" value="5" style="width: 60px;" />
  <button id="jumpForwardBtn">Jump Forward</button>
  <button id="jumpBackwardBtn">Jump Backward</button>
</div>

<hr/>

<div>
  <label for="customPageInput">Add Custom Page Bookmark (page number):</label>
  <input type="number" id="customPageInput" min="1" value="1" style="width: 60px;" />
  <button id="addBookmarkBtn">Add Bookmark</button>
</div>
<div style="margin-top:5px;">
  <label>Bookmarks: </label>
  <ul id="bookmarksList" style="list-style: decimal; padding-left:20px;"></ul>
</div>

<hr/>

<div>
  <button id="toggleAdvancedBtn">Show Advanced Paging Options</button>
</div>

<div id="advancedOptions" style="display:none; margin-top:10px;">
  <fieldset>
    <legend>Advanced Paging Controls</legend>
    <div>
      <input type="checkbox" id="enableLoopPaging" />
      <label for="enableLoopPaging">Enable Loop Paging (wrap navigation)</label>
    </div>
    <div style="margin-top:10px;">
      <label for="fastJumpMultiplier">Fast Jump Multiplier:</label>
      <input type="number" id="fastJumpMultiplier" min="1" max="100" value="10" />
      <button id="fastJumpForwardBtn">Fast Jump Forward</button>
      <button id="fastJumpBackwardBtn">Fast Jump Backward</button>
    </div>
    <div style="margin-top:10px;">
      <label for="pageRangeInput">Display Page Range (start,end):</label>
      <input type="text" id="pageRangeInput" placeholder="e.g. 3,15" style="width:80px;" />
      <button id="setPageRangeBtn">Set Range</button>
      <button id="clearPageRangeBtn">Clear Range</button>
    </div>
  </fieldset>
</div>

<script>
(function(){
  // Data and State
  let totalItems = 123;
  let pageSize = 10;
  let currentPage = 1;
  let filterText = "";
  let filteredItems = [];
  let allItems = [];
  let bookmarks = [];
  let visiblePageButtonsCount = 7;
  let loopPaging = false;
  let pageRangeFilter = null; // {start: X, end: Y}

  // Generate mock data (simple text items)
  function generateItems(n) {
    let arr = [];
    for(let i=1; i<=n; i++){
      arr.push("Item #" + i);
    }
    return arr;
  }

  // Initialize items
  function refreshAllItems(){
    allItems = generateItems(totalItems);
    applyFilterAndRange();
  }

  // Apply filtering and page range filter
  function applyFilterAndRange(){
    filteredItems = allItems.filter(function(item){
      if(filterText && !item.toLowerCase().includes(filterText.toLowerCase())){
        return false;
      }
      return true;
    });
    if(pageRangeFilter){
      filteredItems = filteredItems.filter(function(item){
        let num = +item.match(/\d+$/)[0];
        return num >= pageRangeFilter.start && num <= pageRangeFilter.end;
      });
    }
    // If current page > max page, reset to max page
    let maxP = maxPage();
    if(currentPage > maxP) currentPage = maxP > 0 ? maxP : 1;
  }

  // Calculate max pages
  function maxPage() {
    return Math.max(1, Math.ceil(filteredItems.length / pageSize));
  }

  // Update visible pages label
  function updateVisiblePagesLabel(){
    let el = document.getElementById('visiblePagesLabel');
    el.textContent = visiblePageButtonsCount;
  }

  // Render page buttons in container with ellipsis if needed
  function renderPageButtons(){
    let container = document.getElementById('pageButtonsContainer');
    container.innerHTML = "";
    let maxP = maxPage();
    let btnCount = Math.min(visiblePageButtonsCount, maxP);
    if(btnCount < 3) btnCount = Math.min(3, maxP);

    // Determine range of pages to show around current page
    // The range is centered on currentPage whenever possible
    let half = Math.floor(btnCount/2);
    let startPage = currentPage - half;
    let endPage = currentPage + half;

    if(startPage < 1){
      endPage += 1 - startPage;
      startPage = 1;
    }
    if(endPage > maxP){
      startPage -= (endPage - maxP);
      endPage = maxP;
    }
    if(startPage < 1) startPage = 1;

    // Helper to create a button
    function createPageBtn(pageNum) {
      let btn = document.createElement('button');
      btn.textContent = pageNum;
      btn.disabled = (pageNum === currentPage);
      btn.setAttribute('aria-current', pageNum === currentPage ? 'page' : null);
      btn.addEventListener('click', function(){
        currentPage = pageNum;
        updateEverything();
        currentPageInput.value = currentPage;
        focusPageButtonsContainer();
      });
      return btn;
    }

    // If startPage > 1, show first page and ellipsis (if gap >1)
    if(startPage > 1){
      container.appendChild(createPageBtn(1));
      if(startPage > 2){
        let ellipsis = document.createElement('span');
        ellipsis.textContent = ' ... ';
        ellipsis.style.userSelect = "none";
        container.appendChild(ellipsis);
      }
    }

    for(let p=startPage; p<=endPage; p++){
      container.appendChild(createPageBtn(p));
    }

    // If endPage < maxP, show ellipsis and last page
    if(endPage < maxP){
      if(endPage < maxP - 1){
        let ellipsis = document.createElement('span');
        ellipsis.textContent = ' ... ';
        ellipsis.style.userSelect = "none";
        container.appendChild(ellipsis);
      }
      container.appendChild(createPageBtn(maxP));
    }
  }

  // Render items on current page
  function renderItems(){
    let ul = document.getElementById('itemsList');
    ul.innerHTML = "";
    if(filteredItems.length === 0){
      let li = document.createElement('li');
      li.textContent = "(No items to display)";
      ul.appendChild(li);
      return;
    }
    let startIndex = (currentPage - 1) * pageSize;
    let endIndex = Math.min(startIndex + pageSize, filteredItems.length);
    for(let i = startIndex; i < endIndex; i++){
      let li = document.createElement('li');
      li.textContent = filteredItems[i];
      ul.appendChild(li);
    }
  }

  // Update buttons enabled state for prev/next etc
  function updateNavigationButtons(){
    let maxP = maxPage();
    firstPageBtn.disabled = (currentPage === 1);
    prevPageBtn.disabled = (currentPage === 1);
    nextPageBtn.disabled = (currentPage === maxP);
    lastPageBtn.disabled = (currentPage === maxP);
  }

  // Focus page buttons container for accessibility
  function focusPageButtonsContainer(){
    let c = document.getElementById('pageButtonsContainer');
    c.focus();
  }

  // Update bookmark list UI
  function updateBookmarksUI(){
    let ul = document.getElementById('bookmarksList');
    ul.innerHTML = "";
    if(bookmarks.length === 0){
      let li = document.createElement('li');
      li.textContent = "(No bookmarks)";
      ul.appendChild(li);
      return;
    }
    bookmarks.forEach(function(p,i){
      let li = document.createElement('li');
      let btn = document.createElement('button');
      btn.textContent = "Go to page " + p;
      btn.addEventListener('click', function(){
        if(p >= 1 && p <= maxPage()){
          currentPage = p;
          currentPageInput.value = currentPage;
          updateEverything();
        }
      });
      li.appendChild(btn);
      let delBtn = document.createElement('button');
      delBtn.textContent = "Remove";
      delBtn.style.marginLeft = "5px";
      delBtn.addEventListener('click', function(){
        bookmarks.splice(i,1);
        updateBookmarksUI();
      });
      li.appendChild(delBtn);
      ul.appendChild(li);
    });
  }

  // Go to a given page, clamped to available pages
  function goToPage(page){
    let maxP = maxPage();
    if(page < 1) page = 1;
    else if(page > maxP) page = maxP;
    currentPage = page;
    currentPageInput.value = currentPage;
    updateEverything();
  }

  // Update all UI parts and data displays
  function updateEverything(){
    applyFilterAndRange();
    updateVisiblePagesLabel();
    renderPageButtons();
    renderItems();
    updateNavigationButtons();
    updateBookmarksUI();
  }

  // Initialization and event handlers
  let totalItemsInput = document.getElementById('totalItemsInput');
  let setTotalItemsBtn = document.getElementById('setTotalItemsBtn');
  let pageSizeInput = document.getElementById('pageSizeInput');
  let setPageSizeBtn = document.getElementById('setPageSizeBtn');
  let filterInput = document.getElementById('filterInput');
  let applyFilterBtn = document.getElementById('applyFilterBtn');
  let clearFilterBtn = document.getElementById('clearFilterBtn');

  let firstPageBtn = document.getElementById('firstPageBtn');
  let prevPageBtn = document.getElementById('prevPageBtn');
  let currentPageInput = document.getElementById('currentPageInput');
  let goPageBtn = document.getElementById('goPageBtn');
  let nextPageBtn = document.getElementById('nextPageBtn');
  let lastPageBtn = document.getElementById('lastPageBtn');

  let visiblePagesRange = document.getElementById('visiblePagesRange');

  let jumpStepInput = document.getElementById('jumpStepInput');
  let jumpForwardBtn = document.getElementById('jumpForwardBtn');
  let jumpBackwardBtn = document.getElementById('jumpBackwardBtn');

  let customPageInput = document.getElementById('customPageInput');
  let addBookmarkBtn = document.getElementById('addBookmarkBtn');
  let bookmarksList = document.getElementById('bookmarksList');

  let toggleAdvancedBtn = document.getElementById('toggleAdvancedBtn');
  let advancedOptions = document.getElementById('advancedOptions');
  let enableLoopPagingChk = document.getElementById('enableLoopPaging');

  let fastJumpMultiplierInput = document.getElementById('fastJumpMultiplier');
  let fastJumpForwardBtn = document.getElementById('fastJumpForwardBtn');
  let fastJumpBackwardBtn = document.getElementById('fastJumpBackwardBtn');

  let pageRangeInput = document.getElementById('pageRangeInput');
  let setPageRangeBtn = document.getElementById('setPageRangeBtn');
  let clearPageRangeBtn = document.getElementById('clearPageRangeBtn');

  setTotalItemsBtn.addEventListener('click', function(){
    let val = parseInt(totalItemsInput.value);
    if(isNaN(val) || val < 1){
      alert("Total items must be a positive integer");
      return;
    }
    totalItems = val;
    refreshAllItems();
    if(currentPage > maxPage()) currentPage = maxPage();
    currentPageInput.value = currentPage;
    updateEverything();
  });

  setPageSizeBtn.addEventListener('click', function(){
    let val = parseInt(pageSizeInput.value);
    if(isNaN(val) || val < 1){
      alert("Page size must be a positive integer");
      return;
    }
    pageSize = val;
    if(currentPage > maxPage()) currentPage = maxPage();
    currentPageInput.value = currentPage;
    updateEverything();
  });

  applyFilterBtn.addEventListener('click', function(){
    filterText = filterInput.value.trim();
    currentPage = 1;
    currentPageInput.value = currentPage;
    updateEverything();
  });

  clearFilterBtn.addEventListener('click', function(){
    filterText = "";
    filterInput.value = "";
    currentPage = 1;
    currentPageInput.value = currentPage;
    updateEverything();
  });

  firstPageBtn.addEventListener('click', function(){
    currentPage = 1;
    currentPageInput.value = currentPage;
    updateEverything();
    focusPageButtonsContainer();
  });

  prevPageBtn.addEventListener('click', function(){
    let newPage = currentPage - 1;
    if(newPage < 1){
      if(loopPaging){
        newPage = maxPage();
      } else {
        newPage = 1;
      }
    }
    currentPage = newPage;
    currentPageInput.value = currentPage;
    updateEverything();
    focusPageButtonsContainer();
  });

  nextPageBtn.addEventListener('click', function(){
    let newPage = currentPage + 1;
    if(newPage > maxPage()){
      if(loopPaging){
        newPage = 1;
      } else {
        newPage = maxPage();
      }
    }
    currentPage = newPage;
    currentPageInput.value = currentPage;
    updateEverything();
    focusPageButtonsContainer();
  });

  lastPageBtn.addEventListener('click', function(){
    currentPage = maxPage();
    currentPageInput.value = currentPage;
    updateEverything();
    focusPageButtonsContainer();
  });

  goPageBtn.addEventListener('click', function(){
    let val = parseInt(currentPageInput.value);
    if(isNaN(val)){
      alert("Please enter a valid page number");
      currentPageInput.value = currentPage;
      return;
    }
    goToPage(val);
    focusPageButtonsContainer();
  });

  currentPageInput.addEventListener('keydown', function(e){
    if(e.key === "Enter"){
      goPageBtn.click();
    }
  });

  visiblePagesRange.addEventListener('input', function(){
    visiblePageButtonsCount = parseInt(this.value);
    updateEverything();
  });

  jumpForwardBtn.addEventListener('click', function(){
    let step = parseInt(jumpStepInput.value);
    if(isNaN(step) || step < 1) step = 1;
    let newPage = currentPage + step;
    if(newPage > maxPage()){
      if(loopPaging){
        newPage = ((newPage - 1) % maxPage()) + 1;
      } else {
        newPage = maxPage();
      }
    }
    currentPage = newPage;
    currentPageInput.value = currentPage;
    updateEverything();
    focusPageButtonsContainer();
  });

  jumpBackwardBtn.addEventListener('click', function(){
    let step = parseInt(jumpStepInput.value);
    if(isNaN(step) || step < 1) step = 1;
    let newPage = currentPage - step;
    if(newPage < 1){
      if(loopPaging){
        newPage = maxPage() - ((-newPage) % maxPage());
        if(newPage < 1) newPage = maxPage();
      } else {
        newPage = 1;
      }
    }
    currentPage = newPage;
    currentPageInput.value = currentPage;
    updateEverything();
    focusPageButtonsContainer();
  });

  addBookmarkBtn.addEventListener('click', function(){
    let val = parseInt(customPageInput.value);
    if(isNaN(val) || val < 1 || val > maxPage()){
      alert("Bookmark page must be a valid page number within range.");
      return;
    }
    if(!bookmarks.includes(val)){
      bookmarks.push(val);
      bookmarks.sort((a,b)=>a-b);
      updateBookmarksUI();
    }
  });

  toggleAdvancedBtn.addEventListener('click', function(){
    if(advancedOptions.style.display === "none" || advancedOptions.style.display === ""){
      advancedOptions.style.display = "block";
      toggleAdvancedBtn.textContent = "Hide Advanced Paging Options";
    } else {
      advancedOptions.style.display = "none";
      toggleAdvancedBtn.textContent = "Show Advanced Paging Options";
    }
  });

  enableLoopPagingChk.addEventListener('change', function(){
    loopPaging = this.checked;
  });

  fastJumpForwardBtn.addEventListener('click', function(){
    let mult = parseInt(fastJumpMultiplierInput.value);
    if(isNaN(mult) || mult < 1) mult = 10;
    let newPage = currentPage + pageSize * mult;
    if(newPage > maxPage()){
      if(loopPaging){
        newPage = ((newPage - 1) % maxPage()) + 1;
      } else {
        newPage = maxPage();
      }
    }
    currentPage = newPage;
    currentPageInput.value = currentPage;
    updateEverything();
    focusPageButtonsContainer();
  });

  fastJumpBackwardBtn.addEventListener('click', function(){
    let mult = parseInt(fastJumpMultiplierInput.value);
    if(isNaN(mult) || mult < 1) mult = 10;
    let newPage = currentPage - pageSize * mult;
    if(newPage < 1){
      if(loopPaging){
        newPage = maxPage() - ((-newPage) % maxPage());
        if(newPage < 1) newPage = maxPage();
      } else {
        newPage = 1;
      }
    }
    currentPage = newPage;
    currentPageInput.value = currentPage;
    updateEverything();
    focusPageButtonsContainer();
  });

  setPageRangeBtn.addEventListener('click', function(){
    let val = pageRangeInput.value.trim();
    if(!val) {
      alert("Please enter a page range in format: start,end");
      return;
    }
    let parts = val.split(',');
    if(parts.length !== 2){
      alert("Invalid format. Use start,end (e.g., 10,50)");
      return;
    }
    let s = parseInt(parts[0]);
    let e = parseInt(parts[1]);
    if(isNaN(s) || isNaN(e) || s < 1 || e < s || e > totalItems){
      alert("Invalid range numbers or out of bounds");
      return;
    }
    pageRangeFilter = {start: s, end: e};
    currentPage = 1;
    currentPageInput.value = currentPage;
    updateEverything();
  });

  clearPageRangeBtn.addEventListener('click', function(){
    pageRangeFilter = null;
    pageRangeInput.value = "";
    currentPage = 1;
    currentPageInput.value = currentPage;
    updateEverything();
  });

  // Initialize data and UI
  refreshAllItems();
  updateEverything();

  // Accessibility: keyboard page buttons navigation support
  let pageButtonsContainer = document.getElementById('pageButtonsContainer');

  pageButtonsContainer.addEventListener('keydown', function(e){
    let focusElem = document.activeElement;
    if(focusElem.tagName !== 'BUTTON') return;
    let buttons = Array.from(pageButtonsContainer.querySelectorAll('button'));
    let idx = buttons.indexOf(focusElem);
    if(idx === -1) return;

    if(e.key === 'ArrowRight' || e.key === 'ArrowDown'){
      e.preventDefault();
      let next = (idx + 1) % buttons.length;
      buttons[next].focus();
    } else if(e.key === 'ArrowLeft' || e.key === 'ArrowUp'){
      e.preventDefault();
      let prev = (idx -1 + buttons.length) % buttons.length;
      buttons[prev].focus();
    } else if(e.key === 'Home'){
      e.preventDefault();
      buttons[0].focus();
    } else if(e.key === 'End'){
      e.preventDefault();
      buttons[buttons.length - 1].focus();
    }
  });

})();
</script>
</body>
</html>
