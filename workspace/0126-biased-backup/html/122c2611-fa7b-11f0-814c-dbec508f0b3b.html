<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A* Search</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
            margin: 20px;
        }
        
        input[type="number"] {
            width: 50px;
            padding: 5px;
            margin: 5px;
            border: 1px solid #ccc;
        }
        
        input[type="range"] {
            width: 50px;
            padding: 5px;
            margin: 5px;
            border: 1px solid #ccc;
        }
        
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #3e8e41;
        }
        
        #debug {
            width: 50px;
            padding: 5px;
            margin: 5px;
            border: 1px solid #ccc;
            display: none;
        }
        
        #debug input[type="number"] {
            width: 20px;
            padding: 5px;
            margin: 5px;
            border: 1px solid #ccc;
        }
        
        #debug input[type="range"] {
            width: 20px;
            padding: 5px;
            margin: 5px;
            border: 1px solid #ccc;
        }
        
        #debug button {
            padding: 5px 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        
        #debug button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <h1>A* Search</h1>
    <p>Enter coordinates (x, y):</p>
    <input type="number" id="x" value="0" readonly>
    <input type="number" id="y" value="0" readonly>
    <button id="start">Start</button>
    <button id="reset">Reset</button>
    <button id="debug" style="display: none;">Debug</button>
    <div id="grid"></div>
    <div id="path"></div>
    <script>
        let grid = [];
        let path = [];
        let start = [0, 0];
        let end = [0, 0];
        let visited = [];
        let heuristic = (x, y) => Math.sqrt(x * x + y * y);
        let aStar = (x, y) => {
            if (visited[x][y]) return visited[x][y];
            let node = [x, y];
            visited[x][y] = 1;
            path.push(node);
            while (path.length > 0) {
                let node = path[path.length - 1];
                if (node[0] === end[0] && node[1] === end[1]) return true;
                path.pop();
                for (let [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
                    let nx = node[0] + dx;
                    let ny = node[1] + dy;
                    if (nx >= 0 && nx < grid.length && ny >= 0 && ny < grid[0].length && grid[nx][ny] !== -1) {
                        let neighbor = [nx, ny];
                        let cost = heuristic(node[0], node[1]) + 1;
                        if (neighbor[0] === start[0] && neighbor[1] === start[1]) {
                            return true;
                        }
                        if (neighbor[0] !== end[0] || neighbor[1] !== end[1]) {
                            neighbor[0] += dx;
                            neighbor[1] += dy;
                        }
                        neighbor[0] = Math.min(neighbor[0], grid[nx][ny]);
                        neighbor[1] = Math.min(neighbor[1], grid[nx][ny]);
                        let node2 = [nx, ny];
                        if (!aStar(neighbor[0], neighbor[1])) {
                            node2[0] = node[0];
                            node2[1] = node[1];
                            let cost2 = heuristic(node2[0], node2[1]) + 1;
                            if (cost2 < cost) {
                                visited[node2[0]][node2[1]] = 1;
                                path.push(node2);
                            }
                        }
                    }
                }
            }
            return false;
        };
        let startButton = document.getElementById('start');
        let resetButton = document.getElementById('reset');
        let debugButton = document.getElementById('debug');
        startButton.addEventListener('click', () => {
            start[0] = parseInt(document.getElementById('x').value);
            start[1] = parseInt(document.getElementById('y').value);
            end[0] = start[0];
            end[1] = start[1];
            startButton.style.display = 'none';
            debugButton.style.display = 'block';
            grid = Array.from({length: start[0]}, () => Array.from({length: start[1]}, () => -1));
            path = [];
            visited = Array.from({length: start[0]}, () => Array.from({length: start[1]}, () => 0));
            heuristic(0, 0);
            updateGrid();
        });
        resetButton.addEventListener('click', () => {
            start[0] = 0;
            start[1] = 0;
            end[0] = 0;
            end[1] = 0;
            startButton.style.display = 'block';
            debugButton.style.display = 'none';
            grid = Array.from({length: start[0]}, () => Array.from({length: start[1]}, () => -1));
            path = [];
            visited = Array.from({length: start[0]}, () => Array.from({length: start[1]}, () => 0));
            heuristic(0, 0);
            updateGrid();
        });
        function updateGrid() {
            for (let i = 0; i < grid.length; i++) {
                for (let j = 0; j < grid[0].length; j++) {
                    if (grid[i][j] === -1) {
                        grid[i][j] = 1;
                    }
                }
            }
            let x = start[0];
            let y = start[1];
            let path = [];
            while (x !== end[0] || y !== end[1]) {
                path.push([x, y]);
                let dx = Math.abs(x - end[0]);
                let dy = Math.abs(y - end[1]);
                let dx2 = Math.min(dx, dy);
                dx /= dx2;
                dy /= dx2;
                let nx = x + dx * dx2;
                let ny = y + dy * dx2;
                if (nx >= 0 && nx < grid.length && ny >= 0 && ny < grid[0].length && grid[nx][ny] !== -1) {
                    x = nx;
                    y = ny;
                } else {
                    x = end[0];
                    y = end[1];
                }
            }
            for (let i = 0; i < grid.length; i++) {
                for (let j = 0; j < grid[0].length; j++) {
                    if (grid[i][j] === -1) {
                        grid[i][j] = 1;
                    }
                }
            }
            updatePath();
        }
        function updatePath() {
            let x = start[0];
            let y = start[1];
            while (x !== end[0] || y !== end[1]) {
                path.push([x, y]);
                let dx = Math.abs(x - end[0]);
                let dy = Math.abs(y - end[1]);
                let dx2 = Math.min(dx, dy);
                dx /= dx2;
                dy /= dx2;
                let nx = x + dx * dx2;
                let ny = y + dy * dx2;
                if (nx >= 0 && nx < grid.length && ny >= 0 && ny < grid[0].length && grid[nx][ny] !== -1) {
                    x = nx;
                    y = ny;
                } else {
                    x = end[0];
                    y = end[1];
                }
            }
            for (let i = 0; i < grid.length; i++) {
                for (let j = 0; j < grid[0].length; j++) {
                    if (grid[i][j] === -1) {
                        grid[i][j] = 1;
                    }
                }
            }
            updateGrid();
            document.getElementById('path').innerHTML = '';
            for (let i = 0; i < path.length; i++) {
                let row = '';
                for (let j = 0; j < path[i][0]; j++) {
                    row += '<span style="background-color: black; color: white;"></span>';
                }
                for (let j = 0; j < path[i][1]; j++) {
                    row += '<span style="background-color: black; color: white;"></span>';
                }
                document.getElementById('path').innerHTML += row;
            }
        }
    </script>
