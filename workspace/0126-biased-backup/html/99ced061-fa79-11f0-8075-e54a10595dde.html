<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Sort Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #output {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Counting Sort Interactive Demo</h1>
    <label for="arrayInput">Enter numbers (comma-separated):</label><br>
    <input type="text" id="arrayInput" placeholder="e.g., 4, 2, 2, 8, 3, 3, 1"><br>
    
    <label for="maxValue">Enter maximum value:</label><br>
    <input type="number" id="maxValue" placeholder="Enter maximum value of numbers"><br>
    
    <button id="sortButton">Sort</button>
    <button id="resetButton">Reset</button>
    
    <div id="output"></div>
    
    <script>
        document.getElementById('sortButton').addEventListener('click', function() {
            const userInput = document.getElementById('arrayInput').value;
            const maxInput = parseInt(document.getElementById('maxValue').value);
            const array = userInput.split(',').map(Number);
            
            if(!validateInput(array, maxInput)) {
                alert("Please enter valid numbers.");
                return;
            }
            
            const sortedArray = countingSort(array, maxInput);
            document.getElementById('output').innerText = 'Sorted Array: ' + sortedArray.join(', ');
        });

        document.getElementById('resetButton').addEventListener('click', function() {
            document.getElementById('arrayInput').value = '';
            document.getElementById('maxValue').value = '';
            document.getElementById('output').innerText = '';
        });

        function countingSort(arr, max) {
            let count = new Array(max + 1).fill(0);
            let output = new Array(arr.length);
            
            // Count occurrences
            for (let i = 0; i < arr.length; i++) {
                count[arr[i]]++;
            }
            
            // Update the count array
            for (let i = 1; i <= max; i++) {
                count[i] += count[i - 1];
            }
            
            // Build the output array
            for (let i = arr.length - 1; i >= 0; i--) {
                output[count[arr[i]] - 1] = arr[i];
                count[arr[i]]--;
            }
            
            return output;
        }

        function validateInput(array, max) {
            return array.every(num => !isNaN(num) && num >= 0 && num <= max) && max > 0;
        }
    </script>
</body>
</html>
