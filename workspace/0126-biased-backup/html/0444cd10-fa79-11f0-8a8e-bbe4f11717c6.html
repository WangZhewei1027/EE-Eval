<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runtime Environment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="ui">
            <h1 class="heading">Runtime Environment</h1>
            <p class="description">A showcase of exceptional design and aesthetics.</p>
            <div class="ui">
                <button class="ui button" id="start-button">Start</button>
            </div>
            <div class="ui">
                <button class="ui button" id="stop-button">Stop</button>
            </div>
        </div>
        <script src="script.js"></script>
    </div>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f0f0f0;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            text-align: center;
        }

        .ui {
            width: 50%;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .heading {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .description {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }

        .ui button {
            width: 100%;
            height: 40px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }

        .ui button:hover {
            background-color: #3e8e41;
        }
    </style>
</body>
</html>
