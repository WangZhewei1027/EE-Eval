<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #00698f;
            font-size: 36px;
            margin-bottom: 10px;
        }
        p {
            margin-bottom: 20px;
        }
        #binary-search-explanation {
            font-size: 18px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Binary Search</h1>
    <p id="binary-search-explanation"></p>

    <div id="binary-search-algorithm"></div>

    <button id="binary-search-demo-button">Run Binary Search Demo</button>

    <script>
        // Binary Search Algorithm
        function binarySearch(arr, target) {
            let low = 0;
            let high = arr.length - 1;

            while (low <= high) {
                let mid = Math.floor((low + high) / 2);

                if (arr[mid] === target) {
                    return mid;
                } else if (arr[mid] < target) {
                    low = mid + 1;
                } else {
                    high = mid - 1;
                }
            }

            return -1;
        }

        // Explanation Text
        function binarySearchExplanation() {
            let explanation = `
                Binary Search is an efficient algorithm for finding an item from a sorted list of items. It works by repeatedly dividing in half the portion of the list that could contain the item, until you've narrowed down the possible locations to just one.

                The process begins with a list of items, sorted in ascending order. The algorithm starts at the first item and checks if it's the target. If it is, the algorithm returns the index of the item.

                If the item is less than the target, the algorithm moves to the right half of the list. If the item is greater than the target, the algorithm moves to the left half.

                This process continues until the algorithm finds the target or determines that it's not in the list.

                Binary Search has a time complexity of O(log n), making it much faster than linear search for large lists.
            `;

            document.getElementById("binary-search-explanation").innerHTML = explanation;
        }

        // Demo Button Click Event
        document.getElementById("binary-search-demo-button").addEventListener("click", function() {
            let arr = [2, 5, 8, 12, 16, 23, 38, 56, 72, 91];
            let target = 23;

            let index = binarySearch(arr, target);

            if (index !== -1) {
                console.log(`Target ${target} found at index ${index}`);
            } else {
                console.log(`Target ${target} not found in the list`);
            }

            binarySearchExplanation();
        });
    </script>
</body>
</html>
