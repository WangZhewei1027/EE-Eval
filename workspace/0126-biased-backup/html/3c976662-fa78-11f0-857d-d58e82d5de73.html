<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ternary Search Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

  /* Root colors */
  :root {
    --clr-bg: #0f172a;
    --clr-primary: #4ade80;
    --clr-secondary: #60a5fa;
    --clr-accent: #f97316;
    --clr-neutral-light: #e0e7ff;
    --clr-neutral-dark: #64748b;
    --clr-error: #ef4444;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: linear-gradient(120deg, #0f172a 0%, #1e293b 100%);
    color: var(--clr-neutral-light);
    font-family: 'Poppins', sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow: hidden;
  }

  header {
    padding: 2rem 3rem;
    text-align: center;
    user-select: none;
  }

  header h1 {
    font-weight: 600;
    font-size: 3rem;
    letter-spacing: 0.06em;
    margin: 0;
    color: var(--clr-primary);
    text-shadow:
      0 0 6px var(--clr-primary),
      0 0 12px var(--clr-primary);
  }

  header p {
    max-width: 520px;
    margin: 0.5rem auto 0;
    font-weight: 400;
    font-size: 1.15rem;
    color: var(--clr-neutral-light);
    opacity: 0.75;
    line-height: 1.5;
  }

  main {
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem 1.5rem 3rem;
  }

  /* Container holding the ternary search visualization */
  #visualizer {
    position: relative;
    width: 920px;
    max-width: 95vw;
    height: 240px;
    background: #1e293b;
    border-radius: 20px;
    box-shadow:
      inset 0 0 25px #2563eb88,
      0 10px 30px #2563eb55;
    overflow: visible;
    user-select: none;
    padding: 40px 30px 70px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  /* Array container */
  #array {
    display: flex;
    justify-content: space-between;
    user-select: none;
  }

  /* Individual array element box */
  .array-el {
    position: relative;
    width: 50px;
    height: 72px;
    background: #334155;
    border-radius: 12px;
    box-shadow:
      inset 0 0 12px #64748b55,
      0 4px 8px #1e293bcc;
    transition:
      background-color 0.48s cubic-bezier(0.4,0,0.2,1),
      box-shadow 0.48s cubic-bezier(0.4,0,0.2,1),
      transform 0.36s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: default;
  }

  .array-el span {
    font-weight: 600;
    font-size: 1.45rem;
    color: var(--clr-neutral-light);
    user-select: text;
    letter-spacing: 0.02em;
    text-shadow: 0 0 2px #00000088;
  }

  /* Selected marker labels (mid1, mid2) */
  .marker-label {
    position: absolute;
    top: -48px;
    font-weight: 600;
    font-size: 0.88rem;
    color: var(--clr-accent);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    user-select: none;
    white-space: nowrap;
    text-shadow:
      0 0 5px var(--clr-accent),
      0 0 8px var(--clr-accent);
  }

  /* Indicator arrow below marker label */
  .arrow-down {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; 
    height: 0; 
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 12px solid var(--clr-accent);
    filter: drop-shadow(0 0 1.2px var(--clr-accent));
    animation: bounceArrow 1.8s ease-in-out infinite;
  }

  @keyframes bounceArrow {
    0%, 100% {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    50% {
      transform: translateX(-50%) translateY(6px);
      opacity: 0.72;
    }
  }

  /* Highlight colors */
  .highlight-left {
    background: linear-gradient(135deg, #2563ebbb 10%, #3b82f6cc 90%);
    box-shadow: 0 0 18px #3b82f6dd;
    color: #dbeafe;
  }

  .highlight-mid1 {
    background: linear-gradient(135deg, #d97706dd 20%, #fbbf24ee 90%);
    box-shadow: 0 0 20px #fbbf2411, 0 0 16px #eab308cc;
    color: #fff7cc;
  }

  .highlight-mid2 {
    background: linear-gradient(135deg, #ea580cdd 20%, #f9731611 90%);
    box-shadow: 0 0 22px #fb923cdd, 0 0 18px #f8717111;
    color: #fff9e6;
  }

  .highlight-right {
    background: linear-gradient(135deg, #10b981cc 10%, #34d399dd 90%);
    box-shadow: 0 0 16px #22c55eaa;
    color: #e6fff9;
  }

  .highlight-found {
    background: linear-gradient(135deg,#facc15dd,#fde68add);
    box-shadow: 0 0 24px #facc15cc;
    color: #222200;
  }

  /* Range separators below array */
  #range-indicators {
    position: absolute;
    bottom: 25px;
    left: 30px;
    right: 30px;
    display: flex;
    justify-content: space-between;
    font-weight: 600;
    color: var(--clr-neutral-dark);
    text-shadow: 0 0 3px #00000055;
    pointer-events: none;
    user-select: none;
  }

  /* Explanation box */
  #explanation {
    max-width: 920px;
    margin: 0 auto 24px;
    background: #1e293bdd;
    padding: 18px 28px;
    border-radius: 14px;
    box-shadow: 0 0 30px #4ade8080 inset;
    font-weight: 500;
    font-size: 1.2rem;
    color: var(--clr-neutral-light);
    line-height: 1.4;
    min-height: 60px;
    user-select: none;
    text-align: center;
  }

  /* Controls container */
  #controls {
    max-width: 920px;
    margin: 0 auto 2rem;
    display: flex;
    justify-content: center;
    gap: 18px;
  }

  button {
    background: linear-gradient(145deg, #2563eb, #1e40af);
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-weight: 600;
    font-size: 1.1rem;
    color: var(--clr-neutral-light);
    cursor: pointer;
    box-shadow:
      0 2px 8px #2563ebcc,
      inset 0 -2px 6px #1e40afcc;
    user-select: none;
    transition:
      background 0.36s ease,
      box-shadow 0.36s ease,
      color 0.36s ease;
  }

  button:hover,
  button:focus-visible {
    background: linear-gradient(145deg, #3b82f6, #2563eb);
    box-shadow:
      0 4px 18px #3b82f6ff,
      inset 0 -3px 8px #1e40afcc;
    outline-offset: 4px;
    outline: 3px solid #60a5faaa;
  }

  /* Footer credit */
  footer {
    text-align: center;
    padding: 1rem 1rem 1.5rem;
    color: var(--clr-neutral-dark);
    font-size: 0.9rem;
    user-select: none;
    font-style: italic;
    letter-spacing: 0.04em;
  }

  /* Scrollbar hidden for aesthetic */
  ::-webkit-scrollbar {
    width: 0px;
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: transparent;
  }

  /* Tooltip styling for explanations (if needed) */
  [data-tooltip] {
    position: relative;
    cursor: default;
  }

  [data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 120%;
    left: 50%;
    transform: translateX(-50%);
    background: #2563ebcc;
    color: var(--clr-neutral-light);
    padding: 6px 12px;
    border-radius: 10px;
    white-space: normal;
    font-weight: 500;
    font-size: 0.88rem;
    box-shadow: 0 0 16px #2563ebdd;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.3s ease;
    z-index: 110;
  }

  [data-tooltip]::after {
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>
<header>
  <h1>Ternary Search Visualization</h1>
  <p>Aesthetic & elegant display of the ternary search algorithm progressively narrowing down a sorted array.</p>
</header>
<main>
  <section id="visualizer" aria-label="Ternary Search Visualization">
    <div id="array" role="list" aria-live="polite" aria-atomic="true"></div>
    <div id="range-indicators" aria-hidden="true"></div>
  </section>
</main>

<div id="explanation" aria-live="polite" aria-atomic="true" aria-label="Step explanation">
  Press <strong>Start</strong> to begin the beautiful ternary search animation.
</div>

<div id="controls">
  <button id="startBtn" aria-label="Start ternary search animation">Start</button>
  <button id="resetBtn" aria-label="Reset visualization" disabled>Reset</button>
</div>

<footer>© 2024 Visualized by AI | Designed for Exceptional Aesthetic Experience</footer>

<script>
(() => {
  'use strict';

  const arrayEl = document.getElementById('array');
  const explanationEl = document.getElementById('explanation');
  const rangeIndicatorsEl = document.getElementById('range-indicators');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');

  // Sorted array to search in
  // Beautiful incremental values for smooth visual and easier demonstration
  const arr = [3, 7, 11, 18, 24, 29, 37, 44, 52, 59, 66, 73, 79, 85, 91, 98];

  // Target value to find — exist in array
  // Let's pick a mid/high element for aesthetic balance
  const target = 66;

  let left = 0;
  let right = arr.length - 1;
  let running = false;
  let timeoutId = null;

  // Step duration in ms
  const stepDuration = 2200;

  // Clear the container and display array elements initially
  function renderArray(selectedIndices = {}, foundIndex = -1) {
    // selectedIndices keys: left, mid1, mid2, right — each stores index or -1
    arrayEl.innerHTML = '';

    for (let i = 0; i < arr.length; i++) {
      const val = arr[i];
      const el = document.createElement('div');
      el.classList.add('array-el');
      el.setAttribute('role', 'listitem');
      el.setAttribute('aria-label', `Index ${i}, value ${val}`);

      const span = document.createElement('span');
      span.textContent = val;
      el.appendChild(span);

      // Add highlights
      if (foundIndex === i) {
        el.classList.add('highlight-found');
      } else {
        if (i < selectedIndices.left) {
          // Left of search range - dim
          el.style.opacity = '0.25';
          el.style.transform = 'scale(0.85)';
        } else if (i > selectedIndices.right) {
          // Right of search range - dim
          el.style.opacity = '0.25';
          el.style.transform = 'scale(0.85)';
        } else {
          el.style.opacity = '';
          el.style.transform = '';
        }

        if (i === selectedIndices.left) el.classList.add('highlight-left');
        if (i === selectedIndices.mid1) el.classList.add('highlight-mid1');
        if (i === selectedIndices.mid2) el.classList.add('highlight-mid2');
        if (i === selectedIndices.right) el.classList.add('highlight-right');
      }

      // Add marker labels for mid1 and mid2 if present
      if (i === selectedIndices.mid1 || i === selectedIndices.mid2) {
        const label = document.createElement('div');
        label.className = 'marker-label';
        label.style.left = '50%';
        label.textContent = i === selectedIndices.mid1 ? 'MID 1' : 'MID 2';

        // We'll position label on top center
        label.style.transform = 'translateX(-50%)';
        el.appendChild(label);

        const arrow = document.createElement('div');
        arrow.className = 'arrow-down';
        label.appendChild(arrow);
      }

      arrayEl.appendChild(el);
    }

    // Show left and right range indicators as array indices below the array
    rangeIndicatorsEl.innerHTML = `
      <div>Left: ${selectedIndices.left}</div>
      <div>Right: ${selectedIndices.right}</div>
    `;
  }

  // Explanation text for each step state
  function explainStep(left, mid1, mid2, right, found, action) {
    if(found !== -1) {
      explanationEl.innerHTML = `Value <strong>${target}</strong> found at index <strong>${found}</strong>. Search complete.`;
      return;
    }
    switch(action) {
      case 'init':
        explanationEl.innerHTML = `Search for <strong>${target}</strong> begins between indices <strong>${left}</strong> and <strong>${right}</strong>.`;
        break;
      case 'compare_mid1_lt':
        explanationEl.innerHTML = `Target <strong>${target}</strong> is less than middle 1 value <strong>${arr[mid1]}</strong> at index <strong>${mid1}</strong>.<br> Narrowing search to left part.`;
        break;
      case 'compare_mid1_eq':
        explanationEl.innerHTML = `Target <strong>${target}</strong> equals value at middle 1 index <strong>${mid1}</strong>! Found.`;
        break;
      case 'compare_mid2_lt':
        explanationEl.innerHTML = `Target <strong>${target}</strong> is greater than middle 1 <strong>${arr[mid1]}</strong> but less than middle 2 <strong>${arr[mid2]}</strong>. Narrowing search to middle segment.`;
        break;
      case 'compare_mid2_eq':
        explanationEl.innerHTML = `Target <strong>${target}</strong> equals value at middle 2 index <strong>${mid2}</strong>! Found.`;
        break;
      case 'compare_mid2_gt':
        explanationEl.innerHTML = `Target <strong>${target}</strong> is greater than middle 2 value <strong>${arr[mid2]}</strong>.<br> Narrowing search to right part.`;
        break;
      default:
        explanationEl.innerHTML = `Searching indices <strong>${left}</strong> through <strong>${right}</strong>.`;
    }
  }

  // Compute middles for ternary search in current range
  function getMids(l, r) {
    const third = Math.floor((r - l) / 3);
    const mid1 = l + third;
    const mid2 = r - third;
    return [mid1, mid2];
  }

  // Animation frame of the ternary search algorithm
  async function ternarySearchAnim() {
    running = true;
    startBtn.disabled = true;
    resetBtn.disabled = false;
    left = 0;
    right = arr.length - 1;
    let found = -1;

    // Initial render
    const [mid1_init, mid2_init] = getMids(left, right);
    renderArray({ left, mid1: mid1_init, mid2: mid2_init, right });
    explainStep(left, mid1_init, mid2_init, right, -1, 'init');

    await wait(stepDuration);

    while (left <= right && found === -1) {
      const [mid1, mid2] = getMids(left, right);

      renderArray({ left, mid1, mid2, right });
      explainStep(left, mid1, mid2, right, -1, 'default');
      await wait(stepDuration / 2);

      if (target === arr[mid1]) {
        found = mid1;
        renderArray({ left, mid1, mid2, right }, found);
        explainStep(left, mid1, mid2, right, found, 'compare_mid1_eq');
        break;
      }

      if (target < arr[mid1]) {
        explainStep(left, mid1, mid2, right, -1, 'compare_mid1_lt');
        right = mid1 - 1;
        renderArray({ left, mid1, mid2, right });
        await wait(stepDuration);
        continue;
      }

      if (target === arr[mid2]) {
        found = mid2;
        renderArray({ left, mid1, mid2, right }, found);
        explainStep(left, mid1, mid2, right, found, 'compare_mid2_eq');
        break;
      }

      if (target < arr[mid2]) {
        explainStep(left, mid1, mid2, right, -1, 'compare_mid2_lt');
        left = mid1 + 1;
        right = mid2 - 1;
        renderArray({ left, mid1, mid2, right });
        await wait(stepDuration);
        continue;
      }

      explainStep(left, mid1, mid2, right, -1, 'compare_mid2_gt');
      left = mid2 + 1;
      renderArray({ left, mid1, mid2, right });
      await wait(stepDuration);
    }

    if(found === -1) {
      explanationEl.innerHTML = `Value <strong>${target}</strong> not found in the array.`;
      renderArray({ left, mid1: -1, mid2: -1, right }, -1);
    }

    running = false;
    startBtn.disabled = false;
    resetBtn.disabled = true;
  }

  // Utility wait function returning Promise for delays
  function wait(ms) {
    return new Promise(r => {
      timeoutId = setTimeout(r, ms);
    });
  }

  // Initialize array display with no highlight at load or reset
  function initializeDisplay() {
    renderArray({ left: 0, mid1: -1, mid2: -1, right: arr.length - 1 });
    explanationEl.innerHTML = `Press <strong>Start</strong> to begin the beautiful ternary search animation.`;
    startBtn.disabled = false;
    resetBtn.disabled = true;
  }

  // Reset current animation and visuals
  function reset() {
    clearTimeout(timeoutId);
    running = false;
    initializeDisplay();
  }

  startBtn.addEventListener('click', () => {
    if(running) return;
    ternarySearchAnim();
  });

  resetBtn.addEventListener('click', () => {
    reset();
  });

  // On initial page load
  initializeDisplay();

  // Accessibility: prevent focus outline except keyboard navigation
  let hadKeyboardEvent = false;
  function handleFirstTab(e) {
    if (e.key === 'Tab') {
      hadKeyboardEvent = true;
      document.body.classList.add('user-is-tabbing');
      window.removeEventListener('keydown', handleFirstTab);
    }
  }
  window.addEventListener('keydown', handleFirstTab);

})();

</script>
</body>
</html>
