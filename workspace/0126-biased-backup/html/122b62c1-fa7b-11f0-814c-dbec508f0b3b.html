<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph (Directed)</title>
    <style>
        body {
            font-family: monospace;
        }
        input[type="text"] {
            width: 100%;
            height: 10px;
            padding: 0 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
        }
        input[type="number"] {
            width: 100%;
            height: 10px;
            padding: 0 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            height: 10px;
            padding: 0 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
            cursor: pointer;
        }
        button:hover {
            background-color: #ccc;
        }
        input[type="submit"] {
            width: 100%;
            height: 10px;
            padding: 0 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #ccc;
        }
        .graph-container {
            width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .graph-container h2 {
            margin-bottom: 20px;
        }
        .graph-container button {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="graph-container">
        <h2>Graph (Directed)</h2>
        <form>
            <button type="button" id="add-node">Add Node</button>
            <button type="button" id="add-edge">Add Edge</button>
            <button type="button" id="clear-graph">Clear Graph</button>
            <button type="button" id="save-graph" disabled>Save Graph</button>
        </form>
        <div id="graph"></div>
        <input type="text" id="node-name" placeholder="Node Name">
        <input type="number" id="edge-weight" placeholder="Edge Weight">
        <button type="submit" id="add-node-btn">Add Node</button>
    </div>

    <script>
        let graph = {
            nodes: [],
            edges: []
        };

        document.getElementById('add-node').addEventListener('click', addNode);
        document.getElementById('add-edge').addEventListener('click', addEdge);
        document.getElementById('clear-graph').addEventListener('click', clearGraph);
        document.getElementById('save-graph').addEventListener('click', saveGraph);

        function addNode() {
            const nodeName = document.getElementById('node-name').value;
            if (nodeName) {
                graph.nodes.push({ id: nodeName, weight: 0 });
                renderGraph();
                document.getElementById('node-name').value = '';
            }
        }

        function addEdge() {
            const edgeWeight = document.getElementById('edge-weight').value;
            if (edgeWeight) {
                const edge = { from: graph.nodes[0].id, to: graph.nodes[0].id, weight: edgeWeight };
                graph.edges.push(edge);
                renderGraph();
                document.getElementById('edge-weight').value = '';
            }
        }

        function clearGraph() {
            graph.nodes = [];
            graph.edges = [];
            renderGraph();
        }

        function saveGraph() {
            const graphData = JSON.stringify(graph);
            document.getElementById('graph').innerHTML = `<graph id="graph">${graphData}</graph>`;
            document.getElementById('save-graph').disabled = true;
        }

        function renderGraph() {
            const graphHTML = graph.nodes.map(node => `
                <div class="node" data-id="${node.id}" data-weight="${node.weight}">
                    <input type="text" id="node-name-${node.id}" value="${node.name}">
                    <input type="number" id="edge-weight-${node.id}" value="${node.weight}">
                    <button type="button" id="remove-node-${node.id}">Remove Node</button>
                </div>
            `).join('');
            document.getElementById('graph').innerHTML = graphHTML;
        }

        function removeNode(nodeId) {
            graph.nodes = graph.nodes.filter(node => node.id !== nodeId);
            renderGraph();
        }

        function updateEdgeWeight(edgeId, weight) {
            graph.edges[edgeId].weight = weight;
            renderGraph();
        }

        function updateNodeWeight(nodeId, weight) {
            graph.nodes[nodeId].weight = weight;
            renderGraph();
        }
    </script>
</body>
</html>
