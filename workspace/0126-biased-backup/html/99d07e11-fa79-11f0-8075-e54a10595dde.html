<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routing Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<h1>Routing Example</h1>

<button onclick="navigate('home')">Home</button>
<button onclick="navigate('form')">Form</button>
<button onclick="navigate('details')">Details</button>

<div id="home" class="page">
    <h2>Welcome to the Home Page</h2>
    <p>This is an interactive routing example. You can navigate to different pages using the buttons above.</p>
</div>

<div id="form" class="page hidden">
    <h2>Form Page</h2>
    <input type="text" id="name" placeholder="Enter your name">
    <button onclick="submitForm()">Submit</button>
    <button onclick="navigate('home')">Back to Home</button>
</div>

<div id="details" class="page hidden">
    <h2>Details Page</h2>
    <p id="nameDisplay"></p>
    <button onclick="navigate('form')">Edit</button>
    <button onclick="navigate('home')">Back to Home</button>
</div>

<script>
    let state = {};

    function navigate(page) {
        let pages = document.querySelectorAll('.page');
        pages.forEach(p => p.classList.add('hidden')); // hide all pages
        document.getElementById(page).classList.remove('hidden'); // show current page

        if (page === 'details') {
            document.getElementById('nameDisplay').textContent = state.name ? `Name: ${state.name}` : 'No name entered.';
        }
    }

    function submitForm() {
        const nameInput = document.getElementById('name').value;
        if (nameInput) {
            state.name = nameInput;
            navigate('details');
        } else {
            alert('Please enter your name.');
        }
    }

    navigate('home'); // start on the home page
</script>

</body>
</html>
