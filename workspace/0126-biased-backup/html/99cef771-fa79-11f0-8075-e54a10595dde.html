<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jump Search Demonstration</title>
    <style>
        body { font-family: monospace; }
        input, button, select { margin: 5px; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>

<h1>Jump Search Demonstration</h1>

<label for="length">Array Length:</label>
<input type="number" id="length" value="10" min="1" max="100">
<br>

<label for="target">Target Value:</label>
<input type="number" id="target" value="0">
<br>

<button id="generate">Generate Array</button>
<button id="search">Jump Search</button>

<div>
    <strong>Generated Array:</strong> <span id="arrayOutput"></span>
</div>

<div id="output"></div>

<script>
    let array = [];
    let jump = 0;

    document.getElementById("generate").addEventListener("click", function() {
        const length = parseInt(document.getElementById("length").value, 10);
        array = Array.from({ length }, (_, i) => i); // Generates a sorted array [0, 1, ..., N-1]
        jump = Math.floor(Math.sqrt(length));
        document.getElementById("arrayOutput").innerText = JSON.stringify(array);
        document.getElementById("output").innerText = "";
    });

    document.getElementById("search").addEventListener("click", function() {
        const target = parseInt(document.getElementById("target").value, 10);
        const result = jumpSearch(array, target);
        document.getElementById("output").innerText = result !== -1 ? `Element found at index: ${result}` : `Element not found.`;
    });

    function jumpSearch(arr, target) {
        let n = arr.length;
        let prev = 0;

        while (arr[Math.min(jump, n) - 1] < target) {
            prev = jump;
            jump += Math.floor(Math.sqrt(n));
            if (prev >= n) return -1;
        }

        while (arr[prev] < target) {
            prev++;
            if (prev === Math.min(jump, n)) return -1;
        }

        if (arr[prev] === target) return prev;
        return -1;
    }
</script>

</body>
</html>
