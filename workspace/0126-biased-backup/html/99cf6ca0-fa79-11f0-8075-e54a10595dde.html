<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greedy Algorithms Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
        }
    </style>
</head>
<body>

<h1>Greedy Algorithms Interactive Demo</h1>

<h2>1. Coin Change Problem</h2>
<p>Enter amount and available coin denominations:</p>
<input type="number" id="amount" placeholder="Amount" />
<input type="text" id="denominations" placeholder="Coin Denominations (comma separated)" />
<button onclick="calculateCoinChange()">Calculate Coin Change</button>
<div id="coinChangeResult"></div>

<h2>2. Activity Selection Problem</h2>
<p>Enter activities (start, end) separated by commas:</p>
<input type="text" id="activities" placeholder="Activities (e.g. 0,6; 1,4; 3,5; 5,7; 3,9; 5,9)" />
<button onclick="selectActivities()">Select Activities</button>
<div id="activityResult"></div>

<h2>3. Fractional Knapsack Problem</h2>
<p>Enter weights and values of items:</p>
<input type="text" id="itemData" placeholder="Weights and Values (e.g. 10,60; 20,100; 30,120)" />
<input type="number" id="knapsackCapacity" placeholder="Knapsack Capacity" />
<button onclick="fractionalKnapsack()">Calculate Maximum Value</button>
<div id="knapsackResult"></div>

<script>
    function calculateCoinChange() {
        const amount = parseInt(document.getElementById("amount").value);
        const denominations = document.getElementById("denominations").value.split(',').map(Number);
        const result = [];

        denominations.sort((a, b) => b - a);
        let remainingAmount = amount;

        for (const coin of denominations) {
            while (remainingAmount >= coin) {
                remainingAmount -= coin;
                result.push(coin);
            }
        }
        document.getElementById("coinChangeResult").innerText = `Coins used: ${result.join(", ")}`;
    }

    function selectActivities() {
        const activityInput = document.getElementById("activities").value;
        const activities = activityInput.split(';').map(item => item.split(',').map(Number));
        activities.sort((a, b) => a[1] - b[1]);

        let lastFinishTime = -1;
        const chosenActivities = [];

        for (const activity of activities) {
            if (activity[0] >= lastFinishTime) {
                chosenActivities.push(activity);
                lastFinishTime = activity[1];
            }
        }
        document.getElementById("activityResult").innerText = `Selected Activities: ${chosenActivities.map(a => `[${a.join(',')}]`).join(", ")}`;
    }

    function fractionalKnapsack() {
        const itemData = document.getElementById("itemData").value;
        const capacity = parseInt(document.getElementById("knapsackCapacity").value);
        const items = itemData.split(';').map(item => {
            const [weight, value] = item.split(',').map(Number);
            return {weight, value, ratio: value / weight};
        });

        items.sort((a, b) => b.ratio - a.ratio);

        let totalValue = 0;
        let totalWeight = 0;
        
        for (const item of items) {
            if (totalWeight + item.weight <= capacity) {
                totalWeight += item.weight;
                totalValue += item.value;
            } else {
                const remain = capacity - totalWeight;
                totalValue += item.ratio * remain;
                break;
            }
        }
        document.getElementById("knapsackResult").innerText = `Maximum Value: ${totalValue.toFixed(2)}`;
    }
</script>

</body>
</html>
