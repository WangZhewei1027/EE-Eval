<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(90deg, #1a1a1a, #414141);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #e0e0e0;
            transition: background 0.5s ease-in-out;
        }
        .container {
            text-align: center;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 40px rgba(0, 0, 0, 0.5);
            background: rgba(30, 30, 30, 0.8);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #ffffff;
            animation: fadeIn 2s ease-in-out;
        }
        p {
            font-size: 1.5em;
            margin-bottom: 30px;
            animation: slideIn 2s ease-in-out;
        }
        .button {
            background: #ff5252;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1.2em;
            color: white;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
        }
        .button:hover {
            background: #ff7878;
            transform: scale(1.05);
        }
        canvas {
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 40px rgba(0, 0, 0, 0.5);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Deadlock Visualization</h1>
        <p>Discover how deadlock occurs in systems through this interactive visualization.</p>
        <button class="button" id="start">Start Visualization</button>
        <canvas id="canvas" width="400" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let deadlocked = false;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = deadlocked ? '#ff5252' : '#4caf50';
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 50, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.font = '20px Arial';
            ctx.fillText(deadlocked ? 'Deadlock' : 'Running', canvas.width / 2 - 40, canvas.height / 2 + 8);
        }

        document.getElementById('start').addEventListener('click', () => {
            deadlocked = !deadlocked; // Toggle state
            draw();
        });
        
        // Initial draw
        draw();
    </script>
</body>
</html>
