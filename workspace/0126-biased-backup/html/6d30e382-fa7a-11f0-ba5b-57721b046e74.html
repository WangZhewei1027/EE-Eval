<!DOCTYPE html>
<html>
<head>
    <title>B-Tree Index Interactive Demo</title>
    <style>
        body {
            font-family: monospace;
            margin: 20px;
            line-height: 1.5;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .control-group {
            border: 1px solid #ccc;
            padding: 10px;
            margin-right: 10px;
        }
        .tree-container {
            min-height: 300px;
            border: 1px solid #000;
            padding: 10px;
            overflow: auto;
        }
        .node {
            border: 1px solid #000;
            margin: 5px;
            padding: 5px;
            display: inline-block;
            vertical-align: top;
        }
        .key {
            display: inline-block;
            padding: 2px 5px;
            margin: 2px;
            border: 1px solid #999;
        }
        .highlight {
            background-color: #eee;
        }
        .pointer {
            font-style: italic;
            color: #666;
        }
        .stats {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>B-Tree Index Interactive Demo</h1>
        
        <div class="controls">
            <div class="control-group">
                <h3>Tree Configuration</h3>
                <div>
                    <label>Order (minimum degree t):</label>
                    <input type="range" id="orderSlider" min="2" max="5" value="3">
                    <span id="orderValue">3</span>
                </div>
                <button id="rebuildTree">Rebuild Tree</button>
            </div>
            
            <div class="control-group">
                <h3>Operations</h3>
                <div>
                    <input type="number" id="insertValue" placeholder="Value to insert">
                    <button id="insertBtn">Insert</button>
                </div>
                <div>
                    <input type="number" id="deleteValue" placeholder="Value to delete">
                    <button id="deleteBtn">Delete</button>
                </div>
                <div>
                    <input type="number" id="searchValue" placeholder="Value to search">
                    <button id="searchBtn">Search</button>
                </div>
            </div>
            
            <div class="control-group">
                <h3>Visualization</h3>
                <div>
                    <label>Animation Speed:</label>
                    <input type="range" id="speedSlider" min="100" max="2000" value="500">
                </div>
                <div>
                    <button id="showAll">Show All Nodes</button>
                    <button id="collapseAll">Collapse All</button>
                </div>
                <div>
                    <label><input type="checkbox" id="showPointers"> Show Pointers</label>
                </div>
            </div>
            
            <div class="control-group">
                <h3>Bulk Operations</h3>
                <div>
                    <input type="text" id="bulkValues" placeholder="Comma-separated values">
                    <button id="bulkInsert">Bulk Insert</button>
                </div>
                <div>
                    <button id="randomTree">Generate Random Tree</button>
                    <input type="number" id="randomCount" value="10" min="1" max="50">
                </div>
            </div>
        </div>
        
        <div class="tree-container" id="treeContainer">
            <!-- Tree will be rendered here -->
        </div>
        
        <div class="stats">
            <h3>Tree Statistics</h3>
            <div>Height: <span id="treeHeight">0</span></div>
            <div>Node Count: <span id="nodeCount">0</span></div>
            <div>Key Count: <span id="keyCount">0</span></div>
            <div id="operationLog"></div>
        </div>
    </div>

    <script>
        // B-Tree implementation
        class BTreeNode {
            constructor(t, isLeaf) {
                this.t = t;
                this.isLeaf = isLeaf;
                this.keys = [];
                this.children = [];
                this.collapsed = false;
            }
            
            traverse(level = 0, callback) {
                callback(this, level);
                if (!this.isLeaf && !this.collapsed) {
                    for (let child of this.children) {
                        child.traverse(level + 1, callback);
                    }
                }
            }
            
            search(k) {
                let i = 0;
                while (i < this.keys.length && k > this.keys[i]) {
                    i++;
                }
                
                if (i < this.keys.length && k === this.keys[i]) {
                    return { node: this, index: i };
                }
                
                if (this.isLeaf) {
                    return null;
                }
                
                return this.children[i].search(k);
            }
            
            // Other B-Tree methods would be here (insert, delete, split, etc.)
            // Omitted for brevity but would be implemented in a full version
        }

        class BTree {
            constructor(t) {
                this.root = null;
                this.t = t;
                this.animationSpeed = 500;
                this.highlightedNodes = new Set();
                this.operationLog = [];
            }
            
            insert(k) {
                this.logOperation(`Inserting ${k}`);
                if (this.root === null) {
                    this.root = new BTreeNode(this.t, true);
                    this.root.keys.push(k);
                    return;
                }
                
                if (this.root.keys.length === 2 * this.t - 1) {
                    const s = new BTreeNode(this.t, false);
                    s.children.push(this.root);
                    this.splitChild(s, 0);
                    this.root = s;
                }
                
                this.insertNonFull(this.root, k);
            }
            
            insertNonFull(node, k) {
                let i = node.keys.length - 1;
                
                if (node.isLeaf) {
                    while (i >= 0 && k < node.keys[i]) {
                        i--;
                    }
                    node.keys.splice(i + 1, 0, k);
                    return;
                }
                
                while (i >= 0 && k < node.keys[i]) {
                    i--;
                }
                i++;
                
                if (node.children[i].keys.length === 2 * this.t - 1) {
                    this.splitChild(node, i);
                    if (k > node.keys[i]) {
                        i++;
                    }
                }
                
                this.insertNonFull(node.children[i], k);
            }
            
            splitChild(parent, i) {
                const t = this.t;
                const y = parent.children[i];
                const z = new BTreeNode(t, y.isLeaf);
                
                z.keys = y.keys.splice(t, t - 1);
                if (!y.isLeaf) {
                    z.children = y.children.splice(t, t);
                }
                
                parent.children.splice(i + 1, 0, z);
                parent.keys.splice(i, 0, y.keys.pop());
            }
            
            delete(k) {
                this.logOperation(`Deleting ${k}`);
                if (!this.root) {
                    return;
                }
                
                this.deleteKey(this.root, k);
                
                if (this.root.keys.length === 0) {
                    if (this.root.isLeaf) {
                        this.root = null;
                    } else {
                        this.root = this.root.children[0];
                    }
                }
            }
            
            deleteKey(node, k) {
                const idx = node.keys.findIndex(key => key >= k);
                
                if (idx < node.keys.length && node.keys[idx] === k) {
                    if (node.isLeaf) {
                        node.keys.splice(idx, 1);
                    } else {
                        this.deleteInternalNode(node, idx);
                    }
                    return;
                }
                
                if (node.isLeaf) {
                    return;
                }
                
                const child = node.children[idx];
                if (child.keys.length >= this.t) {
                    this.deleteKey(child, k);
                    return;
                }
                
                let siblingIdx;
                let sibling;
                
                if (idx > 0 && node.children[idx - 1].keys.length >= this.t) {
                    siblingIdx = idx - 1;
                    sibling = node.children[siblingIdx];
                    this.rotateRight(node, idx, sibling);
                } else if (idx < node.children.length - 1 && node.children[idx + 1].keys.length >= this.t) {
                    siblingIdx = idx + 1;
                    sibling = node.children[siblingIdx];
                    this.rotateLeft(node, idx, sibling);
                } else {
                    if (idx < node.children.length - 1) {
                        this.merge(node, idx);
                    } else {
                        this.merge(node, idx - 1);
                    }
                }
                
                this.deleteKey(node.children[idx], k);
            }
            
            // Other B-Tree methods would be here...
            
            traverse(callback) {
                if (this.root) {
                    this.root.traverse(0, callback);
                }
            }
            
            getHeight() {
                let height = 0;
                let node = this.root;
                while (node) {
                    height++;
                    if (node.isLeaf) break;
                    node = node.children[0];
                }
                return height;
            }
            
            getNodeCount() {
                let count = 0;
                this.traverse(() => count++);
                return count;
            }
            
            getKeyCount() {
                let count = 0;
                this.traverse(node => count += node.keys.length);
                return count;
            }
            
            logOperation(message) {
                this.operationLog.push(message);
                if (this.operationLog.length > 10) {
                    this.operationLog.shift();
                }
            }
            
            // Visualization helpers
            highlightNode(node, highlight = true) {
                if (highlight) {
                    this.highlightedNodes.add(node);
                } else {
                    this.highlightedNodes.delete(node);
                }
            }
            
            clearHighlights() {
                this.highlightedNodes.clear();
            }
        }

        // UI Controller
        class BTreeUI {
            constructor() {
                this.tree = new BTree(3);
                this.initializeControls();
                this.renderTree();
            }
            
            initializeControls() {
                // Order slider
                document.getElementById('orderSlider').addEventListener('input', (e) => {
                    document.getElementById('orderValue').textContent = e.target.value;
                });
                
                // Rebuild tree
                document.getElementById('rebuildTree').addEventListener('click', () => {
                    const newOrder = parseInt(document.getElementById('orderSlider').textContent);
                    this.tree = new BTree(newOrder);
                    this.renderTree();
                });
                
                // Insert
                document.getElementById('insertBtn').addEventListener('click', () => {
                    const value = parseInt(document.getElementById('insertValue').value);
                    if (!isNaN(value)) {
                        this.tree.insert(value);
                        this.renderTree();
                        document.getElementById('insertValue').value = '';
                    }
                });
                
                // Delete
                document.getElementById('deleteBtn').addEventListener('click', () => {
                    const value = parseInt(document.getElementById('deleteValue').value);
                    if (!isNaN(value)) {
                        this.tree.delete(value);
                        this.renderTree();
                        document.getElementById('deleteValue').value = '';
                    }
                });
                
                // Search
                document.getElementById('searchBtn').addEventListener('click', () => {
                    const value = parseInt(document.getElementById('searchValue').value);
                    if (!isNaN(value)) {
                        this.tree.clearHighlights();
                        const result = this.tree.root ? this.tree.root.search(value) : null;
                        if (result) {
                            this.tree.highlightNode(result.node);
                        }
                        this.renderTree();
                        setTimeout(() => {
                            this.tree.clearHighlights();
                            this.renderTree();
                        }, 2000);
                    }
                });
                
                // Animation speed
                document.getElementById('speedSlider').addEventListener('input', (e) => {
                    this.tree.animationSpeed = 2100 - e.target.value;
                });
                
                // Show all nodes
                document.getElementById('showAll').addEventListener('click', () => {
                    this.tree.traverse(node => node.collapsed = false);
                    this.renderTree();
                });
                
                // Collapse all
                document.getElementById('collapseAll').addEventListener('click', () => {
                    this.tree.traverse(node => {
                        if (!node.isLeaf) node.collapsed = true;
                    });
                    this.renderTree();
                });
                
                // Bulk insert
                document.getElementById('bulkInsert').addEventListener('click', () => {
                    const values = document.getElementById('bulkValues').value
                        .split(',')
                        .map(v => parseInt(v.trim()))
                        .filter(v => !isNaN(v));
                    
                    values.forEach(v => this.tree.insert(v));
                    this.renderTree();
                    document.getElementById('bulkValues').value = '';
                });
                
                // Random tree
                document.getElementById('randomTree').addEventListener('click', () => {
                    const count = parseInt(document.getElementById('randomCount').value) || 10;
                    this.tree = new BTree(parseInt(document.getElementById('orderValue').textContent));
                    
                    for (let i = 0; i < count; i++) {
                        const value = Math.floor(Math.random() * 100);
                        this.tree.insert(value);
                    }
                    
                    this.renderTree();
                });
                
                // Toggle node collapse
                document.getElementById('clickableTree').addEventListener('click', (e) => {
                    const nodeElement = e.target.closest('.node');
                    if (nodeElement) {
                        const nodeId = nodeElement.dataset.nodeId;
                        // In a real implementation, we'd find the node and toggle its collapsed state
                        this.renderTree();
                    }
                });
            }
            
            renderTree() {
                const container = document.getElementById('treeContainer');
                container.innerHTML = '';
                
                if (!this.tree.root) {
                    container.textContent = 'Tree is empty';
                    return;
                }
                
                const showPointers = document.getElementById('showPointers').checked;
                
                this.tree.traverse((node, level) => {
                    const nodeDiv = document.createElement('div');
                    nodeDiv.className = 'node';
                    nodeDiv.style.marginLeft = `${level * 20}px`;
                    
                    if (this.tree.highlightedNodes.has(node)) {
                        nodeDiv.classList.add('highlight');
                    }
                    
                    // Keys
                    node.keys.forEach(key => {
                        const keySpan = document.createElement('span');
                        keySpan.className = 'key';
                        keySpan.textContent = key;
                        nodeDiv.appendChild(keySpan);
                    });
                    
                    // Pointers (if enabled)
                    if (showPointers && !node.isLeaf && !node.collapsed) {
                        node.children.forEach((child, i) => {
                            const pointerSpan = document.createElement('span');
                            pointerSpan.className = 'pointer';
                            pointerSpan.textContent = ` → ${i < node.keys.length ? '≤' : '>'}`;
                            nodeDiv.appendChild(pointerSpan);
                        });
                    }
                    
                    // Collapse/expand indicator
                    if (!node.isLeaf) {
                        const toggleSpan = document.createElement('span');
                        toggleSpan.className = 'pointer';
                        toggleSpan.textContent = node.collapsed ? ' [+]' : ' [-]';
                        toggleSpan.style.cursor = 'pointer';
                        toggleSpan.onclick = () => {
                            node.collapsed = !node.collapsed;
                            this.renderTree();
                        };
                        nodeDiv.appendChild(toggleSpan);
                    }
                    
                    container.appendChild(nodeDiv);
                });
                
                // Update stats
                document.getElementById('treeHeight').textContent = this.tree.getHeight();
                document.getElementById('nodeCount').textContent = this.tree.getNodeCount();
                document.getElementById('keyCount').textContent = this.tree.getKeyCount();
                
                // Update operation log
                const logElement = document.getElementById('operationLog');
                logElement.innerHTML = this.tree.operationLog
                    .map(op => `<div>${op}</div>`)
                    .join('');
            }
        }

        // Initialize the UI when the page loads
        window.onload = () => {
            const btreeUI = new BTreeUI();
            window.btreeUI = btreeUI; // Make available in console for debugging
            
            // Add some initial values
            [10, 20, 5, 15, 30, 25, 35, 3, 8, 12, 18, 22, 28, 33, 40].forEach(v => {
                btreeUI.tree.insert(v);
            });
            btreeUI.renderTree();
        };
    </script>
</body>
</html>
