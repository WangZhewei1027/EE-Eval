<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thread Interaction Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        input, button, select { margin: 5px; }
    </style>
</head>
<body>

<h1>Thread Interaction Demo</h1>

<div>
    <h2>Control Input</h2>
    <label for="textInput">Type something:</label>
    <input type="text" id="textInput" placeholder="Enter text here">
</div>

<div>
    <h2>Choose an Option</h2>
    <select id="optionsSelect">
        <option value="none">Select an option</option>
        <option value="show">Show Input</option>
        <option value="count">Count Chars</option>
        <option value="clear">Clear Input</option>
    </select>
    <button id="selectOptionButton">Submit</button>
</div>

<div>
    <h2>Character Count</h2>
    <button id="countButton">Count Characters</button>
    <span id="charCount">0</span>
</div>

<div>
    <h2>Number Slider</h2>
    <label for="numberSlider">Choose a number:</label>
    <input type="range" id="numberSlider" min="1" max="100" value="50">
    <span id="sliderValue">50</span>
</div>

<div>
    <h2>Thread Creation</h2>
    <input type="text" id="threadInput" placeholder="Type thread message">
    <button id="createThreadButton">Create Thread</button>
    <div id="threadOutput"></div>
</div>

<script>
    document.getElementById("textInput").addEventListener("input", function() {
        document.getElementById("charCount").innerText = this.value.length;
    });

    document.getElementById("selectOptionButton").addEventListener("click", function() {
        const option = document.getElementById("optionsSelect").value;
        const inputText = document.getElementById("textInput").value;

        if (option === "show") {
            alert("You entered: " + inputText);
        } else if (option === "count") {
            alert("Character count: " + inputText.length);
        } else if (option === "clear") {
            document.getElementById("textInput").value = '';
            document.getElementById("charCount").innerText = '0';
        }
    });

    document.getElementById("countButton").addEventListener("click", function() {
        const charCount = document.getElementById("textInput").value.length;
        alert("Character count in input: " + charCount);
    });

    document.getElementById("numberSlider").addEventListener("input", function() {
        document.getElementById("sliderValue").innerText = this.value;
    });

    document.getElementById("createThreadButton").addEventListener("click", function() {
        const threadMessage = document.getElementById("threadInput").value;
        if (threadMessage) {
            const threadOutput = document.getElementById("threadOutput");
            const newThread = document.createElement("p");
            newThread.innerText = threadMessage;
            threadOutput.appendChild(newThread);
            document.getElementById("threadInput").value = '';
        }
    });
</script>

</body>
</html>
