<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bucket Sort — Visual Demonstration</title>
<style>
  :root{
    --bg1: #0f1724;
    --bg2: #071024;
    --card: rgba(255,255,255,0.06);
    --glass: rgba(255,255,255,0.04);
    --muted: rgba(255,255,255,0.6);
    --accent: linear-gradient(135deg,#7bffea 0%, #6ec1ff 50%, #9b8bff 100%);
    --accent-2: linear-gradient(135deg,#ffbf69 0%, #ff7aa2 70%);
    --glass-blur: 18px;
    --font-sans: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }

  /* Page */
  html,body{
    height:100%;
    margin:0;
    font-family:var(--font-sans);
    background: radial-gradient(1200px 600px at 10% 10%, rgba(110,193,255,0.08), transparent),
                radial-gradient(1000px 500px at 90% 90%, rgba(155,139,255,0.06), transparent),
                linear-gradient(180deg,var(--bg1) 0%, var(--bg2) 100%);
    color: #e9f0ff;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  .wrap{
    max-width:1100px;
    margin:40px auto;
    padding:34px;
    border-radius:20px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    box-shadow: 0 10px 30px rgba(3,10,30,0.6);
    position:relative;
    overflow:hidden;
  }

  /* Decorative blurred shapes */
  .wrap::before, .wrap::after{
    content:"";
    position:absolute;
    width:420px;height:420px;border-radius:50%;
    filter: blur(60px); opacity:0.22;
    z-index:0;
    transform:translate(-10%,-30%);
    pointer-events:none;
  }
  .wrap::before{
    background: radial-gradient(circle at 30% 30%, #6ec1ff 0%, transparent 40%);
    left:-160px; top:-120px;
  }
  .wrap::after{
    background: radial-gradient(circle at 70% 70%, #9b8bff 0%, transparent 40%);
    right:-180px; bottom:-120px;
  }

  header{
    display:flex;
    align-items:center;
    gap:18px;
    position:relative;
    z-index:2;
  }
  .logo{
    width:68px;height:68px;border-radius:14px;
    display:grid;place-items:center;
    background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
    border: 1px solid rgba(255,255,255,0.04);
    box-shadow: 0 6px 18px rgba(14,28,57,0.6), inset 0 -6px 24px rgba(0,0,0,0.2);
    font-weight:700;
    color:transparent;
    position:relative;
  }
  .logo svg{filter:drop-shadow(0 6px 14px rgba(76,137,255,0.15));}
  h1{
    font-size:22px;margin:0;
    letter-spacing:0.2px;
  }
  p.lead{
    margin:6px 0 0 0;
    color:var(--muted);
    font-size:13px;
  }

  /* Main visual panel */
  .visual{
    margin-top:24px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:16px;
    padding:26px;
    position:relative;
    z-index:2;
    border:1px solid rgba(255,255,255,0.03);
    overflow:visible;
  }

  .playground{
    height:420px;
    display:flex;
    flex-direction:column;
    gap:18px;
    position:relative;
    user-select:none;
  }

  /* Top row: unsorted / sorted array */
  .array-row{
    height:96px;
    display:flex;
    align-items:center;
    gap:14px;
    padding:10px 18px;
    background: linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.01));
    border-radius:12px;
    border:1px dashed rgba(255,255,255,0.03);
  }
  .array-row .label{
    width:120px;
    font-size:13px;color:var(--muted);
    padding-left:6px;
  }
  .array-canvas{
    flex:1;
    position:relative;
    height:72px;
    display:flex;
    align-items:center;
    gap:12px;
    padding:6px;
    overflow:visible;
  }

  /* Bucket area */
  .buckets{
    flex:1;
    position:relative;
    display:flex;
    gap:14px;
    align-items:stretch;
    padding:16px;
    background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.02);
    overflow:hidden;
  }
  .bucket{
    flex:1;
    position:relative;
    min-width:60px;
    border-radius:10px;
    padding:12px 10px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    background: linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.01));
    box-shadow: inset 0 -6px 18px rgba(0,0,0,0.18);
    transition:transform .4s ease;
  }
  .bucket .range{
    font-size:12px;color:var(--muted);
    background: rgba(255,255,255,0.02);
    padding:6px 8px;border-radius:8px;
    border:1px solid rgba(255,255,255,0.02);
  }
  .bucket .lane{
    flex:1;
    width:100%;
    position:relative;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:8px;
    padding-bottom:6px;
    overflow:visible;
  }
  .bucket .count{
    font-size:11px;color:var(--muted);
  }

  /* Number token */
  .token{
    width:64px;height:64px;
    border-radius:14px;
    display:grid;place-items:center;
    font-weight:700;
    font-size:18px;
    color:white;
    position:absolute;
    will-change:transform, left, top;
    transition: transform 800ms cubic-bezier(.2,.9,.25,1), opacity 300ms ease;
    box-shadow: 0 10px 30px rgba(2,8,23,0.55), 0 2px 8px rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.06);
    text-shadow: 0 2px 8px rgba(0,0,0,0.45);
    transform-origin:center;
    cursor:default;
  }
  .token .sub{
    position:absolute;right:8px;bottom:6px;font-size:10px;opacity:0.85;color:rgba(255,255,255,0.85);
  }

  /* Gradients for tokens based on bucket */
  .g0{background: linear-gradient(135deg,#ffd6a5,#fdcb6e);}
  .g1{background: linear-gradient(135deg,#ffd6a5,#ff9fa3);}
  .g2{background: linear-gradient(135deg,#bde0fe,#6ec1ff);}
  .g3{background: linear-gradient(135deg,#d4a5ff,#9b8bff);}
  .g4{background: linear-gradient(135deg,#b7f0d2,#7bffea);}
  .g5{background: linear-gradient(135deg,#ffa8a8,#ff9fb2);}
  .g6{background: linear-gradient(135deg,#ffd6a5,#ffbf69);}
  .g7{background: linear-gradient(135deg,#c4b5fd,#9b8bff);}
  .g8{background: linear-gradient(135deg,#9be7ff,#6ec1ff);}
  .g9{background: linear-gradient(135deg,#ffd7e2,#ff9fb2);}

  /* Controls */
  .controls{
    display:flex;
    gap:12px;
    margin-top:18px;
    align-items:center;
    z-index:3;
  }
  button{
    border:0;outline:0;
    background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
    color:#eaf6ff;
    padding:10px 16px;border-radius:12px;
    box-shadow: 0 6px 20px rgba(10,20,40,0.45);
    cursor:pointer;
    transition: transform .18s ease, box-shadow .18s ease, opacity .18s;
    font-weight:600;
  }
  button:active{transform:translateY(1px) scale(.997);}
  .btn-primary{
    background: linear-gradient(90deg,#7bffea 0%, #6ec1ff 50%, #9b8bff 100%);
    color:#052033;
  }
  .btn-ghost{
    background:transparent;
    border:1px solid rgba(255,255,255,0.05);
    color:var(--muted);
  }
  button[disabled]{opacity:0.5; cursor:not-allowed;}

  /* Step caption */
  .status{
    margin-left:auto;
    text-align:right;
    font-size:13px;
    color:var(--muted);
  }

  /* footer / legend */
  .legend{
    margin-top:18px;
    color:var(--muted);
    font-size:13px;
    display:flex;
    gap:12px;
    align-items:center;
  }

  /* Responsive */
  @media (max-width:880px){
    .wrap{margin:20px;padding:18px;}
    .buckets{gap:10px;padding:12px;}
    .token{width:56px;height:56px}
    .array-row{height:84px}
  }

</style>
</head>
<body>
<div class="wrap" role="main" aria-label="Bucket Sort Visual Demonstration">
  <header>
    <div class="logo" aria-hidden="true">
      <svg width="44" height="44" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#7bffea"/>
            <stop offset="1" stop-color="#9b8bff"/>
          </linearGradient>
        </defs>
        <rect x="4" y="4" width="40" height="40" rx="10" fill="url(#lg)" opacity="0.18"/>
        <g transform="translate(6 6)" fill="none" stroke="url(#lg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 28 L12 8 L18 28"></path>
          <path d="M22 28 L30 8 L36 28"></path>
        </g>
      </svg>
    </div>
    <div>
      <h1>Bucket Sort — Elegant Visualization</h1>
      <p class="lead">Observe how values are distributed into buckets, sorted locally, then merged back into a sorted list.</p>
    </div>
  </header>

  <section class="visual" aria-hidden="false">
    <div class="playground">
      <div class="array-row" aria-hidden="true">
        <div class="label">Array</div>
        <div class="array-canvas" id="arrayCanvas"></div>
      </div>

      <div class="buckets" id="bucketsContainer" aria-hidden="true"></div>

      <div class="controls">
        <button id="startBtn" class="btn-primary">Start Animation</button>
        <button id="randBtn" class="btn-ghost">Randomize</button>
        <div class="status" id="status">Ready — press Start to run the demonstration.</div>
      </div>

      <div class="legend" aria-hidden="true">
        <div style="opacity:0.9">Buckets: 10 ranges (0–9 … 90–99)</div>
        <div style="margin-left:auto;color:var(--muted)">Minimal controls — visual-first experience</div>
      </div>
    </div>
  </section>
</div>

<script>
/*
  Bucket Sort Visual Demonstration
  - Extremely limited interactivity: Start and Randomize
  - Beautiful, staggered, smooth animations
*/

(function(){
  const BUCKET_COUNT = 10;
  const ITEM_COUNT = 12;
  const MAX_VALUE = 100;
  const arrayCanvas = document.getElementById('arrayCanvas');
  const bucketsContainer = document.getElementById('bucketsContainer');
  const startBtn = document.getElementById('startBtn');
  const randBtn = document.getElementById('randBtn');
  const status = document.getElementById('status');

  let tokens = []; // {value, el, id}
  let buckets = []; // array of arrays of token ids
  let running = false;
  let seedId = 0;

  // Utilities
  function randInt(n){ return Math.floor(Math.random()*n); }
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function bucketIndex(value){
    return clamp(Math.floor(value / (MAX_VALUE/BUCKET_COUNT)), 0, BUCKET_COUNT-1);
  }

  // Build bucket UI
  function createBucketsUI(){
    bucketsContainer.innerHTML = '';
    buckets = Array.from({length:BUCKET_COUNT}, ()=>[]);
    for(let i=0;i<BUCKET_COUNT;i++){
      const low = i*(MAX_VALUE/BUCKET_COUNT)|0;
      const high = Math.min(MAX_VALUE-1, (i+1)*(MAX_VALUE/BUCKET_COUNT)-1)|0;
      const b = document.createElement('div');
      b.className='bucket';
      b.dataset.idx = i;
      b.innerHTML = `
        <div class="range">${low} – ${high}</div>
        <div class="lane" id="lane-${i}"></div>
        <div class="count">0</div>
      `;
      bucketsContainer.appendChild(b);
    }
  }

  // Generate random array tokens and render them
  function generateArray(){
    // clear
    tokens.forEach(t=>t.el.remove());
    tokens = [];
    seedId++;
    const values = [];
    for(let i=0;i<ITEM_COUNT;i++){
      values.push(randInt(MAX_VALUE));
    }
    // Create token elements placed horizontally in arrayCanvas (absolute positioning)
    arrayCanvas.innerHTML = '';
    const canvasRect = arrayCanvas.getBoundingClientRect();
    const spacing = 12;
    const tokenW = 64;
    const totalW = ITEM_COUNT*tokenW + (ITEM_COUNT-1)*spacing;
    const startX = Math.max(6, (canvasRect.width - totalW)/2);
    for(let i=0;i<values.length;i++){
      const v = values[i];
      const el = document.createElement('div');
      el.className = `token g${bucketIndex(v)}`;
      const id = `t-${seedId}-${i}`;
      el.dataset.id = id;
      el.innerHTML = `<div>${v}</div><div class="sub">${v}</div>`;
      // initial absolute position
      el.style.position = 'absolute';
      const x = startX + i*(tokenW+spacing);
      const y = 6;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      // subtle entrance
      el.style.transform = 'translateY(-18px) scale(.98)';
      el.style.opacity = '0';
      arrayCanvas.appendChild(el);
      tokens.push({id, value:v, el});
      // animate in
      requestAnimationFrame(()=> {
        el.style.transition = 'transform 600ms cubic-bezier(.2,.9,.25,1), opacity 420ms ease';
        el.style.transform = 'translateY(0px) scale(1)';
        el.style.opacity = '1';
      });
    }
    updateCounts();
    status.textContent = 'New array generated — ready.';
  }

  // Update bucket counts UI
  function updateCounts(){
    for(let i=0;i<BUCKET_COUNT;i++){
      const bEl = bucketsContainer.children[i];
      bEl.querySelector('.count').textContent = buckets[i].length;
    }
  }

  // Move a token element to a target absolute position relative to the root container
  function moveTo(el, targetX, targetY, delay=0, dur=800){
    return new Promise(resolve=>{
      el.style.transition = `transform ${dur}ms cubic-bezier(.2,.9,.25,1) ${delay}ms, opacity 200ms ease ${delay}ms`;
      // compute current position
      const parentRect = el.parentElement.getBoundingClientRect();
      const curLeft = parseFloat(el.style.left || el.getBoundingClientPropertyValue('left') || el.offsetLeft);
      const curTop = parseFloat(el.style.top || el.getBoundingClientPropertyValue('top') || el.offsetTop);
      // We'll use transform translate to animate from current to target
      const dx = targetX - curLeft;
      const dy = targetY - curTop;
      // set transform
      el.style.transform = `translate(${dx}px, ${dy}px)`;
      // Wait for transition end
      const onEnd = (ev)=>{
        if(ev && ev.target !== el) return;
        el.removeEventListener('transitionend', onEnd);
        // Snap: update left/top to target and reset transform for smooth further moves
        el.style.transition = 'none';
        el.style.left = targetX + 'px';
        el.style.top = targetY + 'px';
        el.style.transform = 'none';
        // allow a tick then resolve
        requestAnimationFrame(()=>requestAnimationFrame(resolve));
      };
      el.addEventListener('transitionend', onEnd);
      // Fallback timeout
      setTimeout(()=>{ onEnd(); }, dur + delay + 60);
    });
  }

  // Animate distribution into buckets
  async function distribute(){
    status.textContent = 'Distributing values into buckets...';
    // Clear buckets arrays
    buckets = Array.from({length:BUCKET_COUNT}, ()=>[]);
    updateCounts();
    // For positioning compute coordinates relative to layout
    const wrapRect = document.querySelector('.wrap').getBoundingClientRect();
    const arrayRect = arrayCanvas.getBoundingClientRect();
    const tokenW = 64;
    const laneDepth = 140; // approximate vertical stack space within bucket
    for(let i=0;i<tokens.length;i++){
      const t = tokens[i];
      const bIdx = bucketIndex(t.value);
      const lane = document.getElementById(`lane-${bIdx}`);
      // Move element from arrayCanvas into bucketsContainer (re-parent) to keep coordinates stable
      // compute global target position:
      const bucketEl = bucketsContainer.children[bIdx];
      const laneRect = lane.getBoundingClientRect();
      // compute stacked position offset in lane (bottom-up)
      const stackIndex = buckets[bIdx].length;
      const spacing = 10;
      const targetX = (laneRect.left - arrayRect.left) + (laneRect.width - tokenW)/2 + arrayRect.left - wrapRect.left;
      // for consistent coordinates, we'll place tokens relative to arrayCanvas container by converting absolute to arrayCanvas coordinates
      // Actually simpler: append token into wrap and position absolute in wrap
      // We'll ensure tokens are direct children of wrap for animation steps
      // Move token to wrap
      const wrap = document.querySelector('.wrap');
      const currentRect = t.el.getBoundingClientRect();
      // prepare: place in wrap with same visual location
      t.el.style.left = (currentRect.left - wrapRect.left) + 'px';
      t.el.style.top = (currentRect.top - wrapRect.top) + 'px';
      wrap.appendChild(t.el);

      // Determine final target inside the bucket lane (stack from bottom)
      const bucketInnerRect = lane.getBoundingClientRect();
      const targetCenterX = bucketInnerRect.left + (bucketInnerRect.width - tokenW)/2;
      const bottomY = bucketInnerRect.bottom - tokenW - 8; // some padding
      const targetY = bottomY - stackIndex*(tokenW + spacing);

      // Animate drop with dramatic easing
      await moveTo(t.el, targetCenterX - wrapRect.left, targetY - wrapRect.top, i*90, 700);

      // After move, append to lane container DOM at correct absolute coords within wrap (keeps visual)
      buckets[bIdx].push(t);
      updateCounts();
      // tiny bounce
      t.el.style.transition = 'transform 260ms cubic-bezier(.2,1.3,.4,1)';
      t.el.style.transform = 'translateY(-6px) scale(1.02)';
      setTimeout(()=>{ t.el.style.transform='none'; }, 260);
    }
    status.textContent = 'All values distributed into buckets.';
  }

  // Sort each bucket locally and animate internal rearrangement
  async function sortBuckets(){
    status.textContent = 'Sorting each bucket locally...';
    const wrapRect = document.querySelector('.wrap').getBoundingClientRect();
    const tokenW = 64;
    const spacing = 10;

    for(let b=0;b<BUCKET_COUNT;b++){
      if(buckets[b].length <= 1) {
        await new Promise(r=>setTimeout(r, 120));
        continue;
      }
      // perform a stable sort of bucket by value
      const bucketArr = buckets[b];
      // compute lane geometry
      const lane = document.getElementById(`lane-${b}`);
      const laneRect = lane.getBoundingClientRect();
      // compute bottom baseline
      const bottomY = laneRect.bottom - tokenW - 8;
      // sort by value
      bucketArr.sort((a,bk)=> a.value - bk.value);
      // animate tokens to their new stacked positions
      for(let i=0;i<bucketArr.length;i++){
        const t = bucketArr[i];
        const targetX = laneRect.left + (laneRect.width - tokenW)/2 - wrapRect.left;
        const targetY = bottomY - i*(tokenW + spacing) - wrapRect.top;
        // small stagger per bucket
        await moveTo(t.el, targetX, targetY, i*80, 430);
      }
      // slight pause per bucket
      await new Promise(r=>setTimeout(r, 160));
      // update stored order
      buckets[b] = bucketArr;
    }
    status.textContent = 'Buckets sorted. Preparing to merge...';
  }

  // Collect buckets into sorted array displayed in top area
  async function collect(){
    status.textContent = 'Collecting buckets: merging back into sorted array...';
    const wrapRect = document.querySelector('.wrap').getBoundingClientRect();
    const topRow = arrayCanvas.getBoundingClientRect();
    const tokenW = 64;
    // Build sorted sequence
    const sorted = [];
    for(let b=0;b<BUCKET_COUNT;b++){
      for(const t of buckets[b]) sorted.push(t);
    }
    // compute target positions in top row
    const spacing = 12;
    const totalW = sorted.length*tokenW + (sorted.length-1)*spacing;
    const startX = Math.max(6, (topRow.width - totalW)/2);
    // re-parent tokens to wrap have them already in wrap; animate to top positions
    for(let i=0;i<sorted.length;i++){
      const t = sorted[i];
      const targetAbsX = topRow.left + startX + i*(tokenW+spacing) - wrapRect.left;
      const targetAbsY = topRow.top + 6 - wrapRect.top;
      // small staggered delay for elegance
      await moveTo(t.el, targetAbsX, targetAbsY, i*70, 520);
      // update token color to neutral sorted style
      t.el.style.boxShadow = '0 12px 28px rgba(6,18,42,0.6)';
      t.el.style.border = '1px solid rgba(255,255,255,0.06)';
    }
    status.textContent = 'Sorted — operation complete.';
  }

  // Main run
  async function runDemo(){
    if(running) return;
    running = true;
    startBtn.disabled = true;
    randBtn.disabled = true;
    status.textContent = 'Starting animation...';
    // Step 1: distribute
    await distribute();
    await new Promise(r=>setTimeout(r, 420));
    // Step 2: sort buckets
    await sortBuckets();
    await new Promise(r=>setTimeout(r, 420));
    // Step 3: collect
    await collect();
    // finalize
    running = false;
    startBtn.disabled = false;
    randBtn.disabled = false;
    status.textContent = 'Finished — press Randomize for a new example or Start to replay.';
  }

  // Reset layout on randomize
  function reset(){
    // remove tokens from wrap
    const wrap = document.querySelector('.wrap');
    tokens.forEach(t=>{
      if(t.el.parentElement) t.el.remove();
    });
    createBucketsUI();
    generateArray();
  }

  // Initial setup
  createBucketsUI();
  generateArray();

  // Event handlers
  startBtn.addEventListener('click', ()=>{
    runDemo();
  });
  randBtn.addEventListener('click', ()=>{
    if(running) return;
    reset();
  });

  // Defensive: reposition tokens on resize (simple snap)
  window.addEventListener('resize', ()=>{
    if(running) return;
    // Recreate, to keep layout consistent
    createBucketsUI();
    generateArray();
  });

  // Accessibility small animation when hovered
  document.querySelectorAll('button').forEach(b=>{
    b.addEventListener('mouseenter', ()=> b.style.transform='translateY(-2px)');
    b.addEventListener('mouseleave', ()=> b.style.transform='none');
  });

})();
</script>
</body>
</html>
