<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Array</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        input[type="text"] {
            width: 50%;
            padding: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <h1>Dynamic Array</h1>
    <div id="array"></div>
    <script>
        let array = [];
        const addButton = document.getElementById('addButton');
        const removeButton = document.getElementById('removeButton');
        const inputField = document.getElementById('inputField');
        const buttonField = document.getElementById('buttonField');

        function add() {
            array.push(Math.floor(Math.random() * 100));
            updateArray();
        }

        function remove() {
            array = array.filter(x => x > 0);
            updateArray();
        }

        function updateArray() {
            const arrayString = array.map(x => x.toString()).join(', ');
            document.getElementById('array').innerHTML = `<p>Array: ${arrayString}</p>`;
        }

        addButton.addEventListener('click', add);
        removeButton.addEventListener('click', remove);
        inputField.addEventListener('input', updateArray);

        function printArray() {
            console.log(array);
        }

        printArray();
    </script>
</body>
</html>
