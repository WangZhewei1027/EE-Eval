<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asymmetric Cryptography Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(150deg, #141E30, #243B55);
            color: #fff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            animation: fadeIn 1.5s forwards;
        }

        p {
            font-size: 1.2rem;
            animation: fadeIn 2s forwards;
            opacity: 0;
            transition: opacity 1s;
        }

        .button {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 15px 30px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 1rem;
            border-radius: 5px;
            margin: 20px 0;
            cursor: pointer;
            animation: fadeIn 2.5s forwards;
            transition: background 0.3s;
        }

        .button:hover {
            background: #45a049;
        }

        .graphic {
            margin: 20px auto;
            width: 300px;
            height: 300px;
            background: url('https://media.giphy.com/media/l0MYt4OX7zp4A6zarG/giphy.gif') center/cover no-repeat;
            opacity: 0;
            animation: fadeIn 3s forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Welcome to Asymmetric Cryptography</h1>
        <p>
            Discover the art of encryption where two keys are better than one. Together, they unlock a world of secure
            communication.
        </p>
        <div class="graphic"></div>
        <p>Click the button below to learn more!</p>
        <button class="button" onclick="showAlert()">Learn More</button>
    </div>

    <script>
        function showAlert() {
            alert('Asymmetric cryptography involves a public and a private key for secure data transmission.');
        }
    </script>
</body>

</html>
