<!DOCTYPE html>
<html>
<head>
    <title>Interactive Hash Map Explorer</title>
    <style>
        body {
            font-family: monospace;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .panel {
            border: 1px solid #000;
            padding: 10px;
        }
        button, input, select {
            margin: 5px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #000;
            padding: 5px;
            text-align: left;
        }
        .bucket {
            margin: 5px 0;
            padding: 5px;
            border: 1px dashed #000;
        }
        .key-value-pair {
            display: inline-block;
            margin: 2px;
            padding: 2px 5px;
            border: 1px solid #000;
        }
        .collision {
            background-color: #f0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interactive Hash Map Explorer</h1>
        
        <div class="panel">
            <h2>Hash Map Configuration</h2>
            <div>
                <tr>
                    <td>Initial Size:</td>
                    <td><input type="range" id="sizeSlider" min="1" max="20" value="5"> <span id="sizeValue">5</span></td>
                </tr>
                <tr>
                    <td>Load Factor:</td>
                    <td><input type="range" id="loadFactorSlider" min="10" max="90" value="75"> <span id="loadFactorValue">0.75</span></td>
                </tr>
                <tr>
                    <td>Hash Function:</td>
                    <td>
                        <select id="hashFunctionSelect">
                            <option value="simple">Simple (key % size)</option>
                            <option value="complex">Complex (custom hash)</option>
                            <option value="random">Random (for testing)</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>Collision Resolution:</td>
                    <td>
                        <select id="collisionMethodSelect">
                            <option value="chaining">Chaining</option>
                            <option value="linear">Linear Probing</option>
                            <option value="quadratic">Quadratic Probing</option>
                        </select>
                    </td>
                </tr>
            </div>
            <button id="resetBtn">Reset Hash Map</button>
        </div>
        
        <div class="panel">
            <h2>Hash Map Operations</h2>
            <div>
                <input type="text" id="keyInput" placeholder="Key">
                <input type="text" id="valueInput" placeholder="Value">
                <button id="insertBtn">Insert</button>
                <button id="getBtn">Get</button>
                <button id="removeBtn">Remove</button>
                <button id="batchInsertBtn">Batch Insert (10 random)</button>
                <button id="clearBtn">Clear All</button>
            </div>
            <div id="operationResult"></div>
        </div>
        
        <div class="panel">
            <h2>Hash Map Visualization</h2>
            <div id="hashMapVisualization"></div>
            <div>
                <p>Current Size: <span id="currentSize">5</span></p>
                <p>Current Load: <span id="currentLoad">0</span>/<span id="currentCapacity">5</span> (<span id="currentLoadPercent">0</span>%)</p>
                <p>Collisions: <span id="collisionCount">0</span></p>
            </div>
        </div>
        
        <div class="panel">
            <h2>Hash Function Details</h2>
            <div>
                <input type="text" id="hashTestInput" placeholder="Test key">
                <button id="hashTestBtn">Calculate Hash</button>
                <div id="hashCalculationSteps"></div>
            </div>
        </div>
    </div>

    <script>
        class HashMap {
            constructor(size = 5, loadFactor = 0.75, hashFunction = 'simple', collisionMethod = 'chaining') {
                this.size = size;
                this.loadFactor = loadFactor;
                this.hashFunction = hashFunction;
                this.collisionMethod = collisionMethod;
                this.buckets = Array(size).fill(null).map(() => []);
                this.collisionCount = 0;
                this.itemCount = 0;
            }
            
            hash(key) {
                if (this.hashFunction === 'complex') {
                    let hash = 0;
                    for (let i = 0; i < key.length; i++) {
                        hash = (hash << 5) - hash + key.charCodeAt(i);
                        hash |= 0;
                    }
                    return Math.abs(hash) % this.size;
                } else if (this.hashFunction === 'random') {
                    return Math.floor(Math.random() * this.size);
                } else {
                    // Simple hash
                    return key.length % this.size;
                }
            }
            
            findIndex(key) {
                const index = this.hash(key);
                
                if (this.collisionMethod === 'chaining') {
                    return { bucketIndex: index, itemIndex: null };
                }
                
                // For open addressing methods
                let i = 0;
                let currentIndex = index;
                
                while (true) {
                    const bucket = this.buckets[currentIndex];
                    if (bucket.length === 0 || bucket[0].key === key) {
                        return { bucketIndex: currentIndex, itemIndex: 0 };
                    }
                    
                    if (this.collisionMethod === 'linear') {
                        currentIndex = (index + i) % this.size;
                    } else { // quadratic
                        currentIndex = (index + i * i) % this.size;
                    }
                    
                    i++;
                    if (i >= this.size) break;
                }
                
                return { bucketIndex: -1, itemIndex: -1 };
            }
            
            insert(key, value) {
                if (this.itemCount / this.size >= this.loadFactor) {
                    this.resize();
                }
                
                const { bucketIndex, itemIndex } = this.findIndex(key);
                
                if (bucketIndex === -1) {
                    return false; // No space found
                }
                
                if (this.collisionMethod === 'chaining') {
                    const bucket = this.buckets[bucketIndex];
                    const existingIndex = bucket.findIndex(item => item.key === key);
                    
                    if (existingIndex >= 0) {
                        bucket[existingIndex].value = value;
                    } else {
                        if (bucket.length > 0) this.collisionCount++;
                        bucket.push({ key, value });
                        this.itemCount++;
                    }
                } else {
                    if (this.buckets[bucketIndex].length > 0 && this.buckets[bucketIndex][0].key !== key) {
                        this.collisionCount++;
                    }
                    this.buckets[bucketIndex] = [{ key, value }];
                    this.itemCount++;
                }
                
                return true;
            }
            
            get(key) {
                const { bucketIndex, itemIndex } = this.findIndex(key);
                
                if (bucketIndex === -1) return undefined;
                
                if (this.collisionMethod === 'chaining') {
                    const item = this.buckets[bucketIndex].find(item => item.key === key);
                    return item ? item.value : undefined;
                } else {
                    if (this.buckets[bucketIndex].length > 0 && this.buckets[bucketIndex][0].key === key) {
                        return this.buckets[bucketIndex][0].value;
                    }
                    return undefined;
                }
            }
            
            remove(key) {
                const { bucketIndex, itemIndex } = this.findIndex(key);
                
                if (bucketIndex === -1) return false;
                
                if (this.collisionMethod === 'chaining') {
                    const bucket = this.buckets[bucketIndex];
                    const index = bucket.findIndex(item => item.key === key);
                    if (index >= 0) {
                        bucket.splice(index, 1);
                        this.itemCount--;
                        return true;
                    }
                } else {
                    if (this.buckets[bucketIndex].length > 0 && this.buckets[bucketIndex][0].key === key) {
                        this.buckets[bucketIndex] = [];
                        this.itemCount--;
                        return true;
                    }
                }
                
                return false;
            }
            
            resize() {
                const oldBuckets = this.buckets;
                this.size *= 2;
                this.buckets = Array(this.size).fill(null).map(() => []);
                this.collisionCount = 0;
                this.itemCount = 0;
                
                for (const bucket of oldBuckets) {
                    for (const item of bucket) {
                        this.insert(item.key, item.value);
                    }
                }
            }
            
            clear() {
                this.buckets = Array(this.size).fill(null).map(() => []);
                this.collisionCount = 0;
                this.itemCount = 0;
            }
        }

        // UI Setup
        const hashMap = new HashMap();
        
        // DOM Elements
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeValue = document.getElementById('sizeValue');
        const loadFactorSlider = document.getElementById('loadFactorSlider');
        const loadFactorValue = document.getElementById('loadFactorValue');
        const hashFunctionSelect = document.getElementById('hashFunctionSelect');
        const collisionMethodSelect = document.getElementById('collisionMethodSelect');
        const resetBtn = document.getElementById('resetBtn');
        
        const keyInput = document.getElementById('keyInput');
        const valueInput = document.getElementById('valueInput');
        const insertBtn = document.getElementById('insertBtn');
        const getBtn = document.getElementById('getBtn');
        const removeBtn = document.getElementById('removeBtn');
        const batchInsertBtn = document.getElementById('batchInsertBtn');
        const clearBtn = document.getElementById('clearBtn');
        const operationResult = document.getElementById('operationResult');
        
        const hashMapVisualization = document.getElementById('hashMapVisualization');
        const currentSize = document.getElementById('currentSize');
        const currentLoad = document.getElementById('currentLoad');
        const currentCapacity = document.getElementById('currentCapacity');
        const currentLoadPercent = document.getElementById('currentLoadPercent');
        const collisionCount = document.getElementById('collisionCount');
        
        const hashTestInput = document.getElementById('hashTestInput');
        const hashTestBtn = document.getElementById('hashTestBtn');
        const hashCalculationSteps = document.getElementById('hashCalculationSteps');
        
        // Event Listeners
        sizeSlider.addEventListener('input', () => {
            sizeValue.textContent = sizeSlider.value;
        });
        
        loadFactorSlider.addEventListener('input', () => {
            loadFactorValue.textContent = (loadFactorSlider.value / 100).toFixed(2);
        });
        
        resetBtn.addEventListener('click', () => {
            hashMap.size = parseInt(sizeSlider.value);
            hashMap.loadFactor = parseFloat(loadFactorSlider.value / 100);
            hashMap.hashFunction = hashFunctionSelect.value;
            hashMap.collisionMethod = collisionMethodSelect.value;
            hashMap.clear();
            updateVisualization();
            operationResult.textContent = 'Hash map reset with new configuration.';
        });
        
        insertBtn.addEventListener('click', () => {
            const key = keyInput.value.trim();
            const value = valueInput.value.trim();
            
            if (!key) {
                operationResult.textContent = 'Please enter a key.';
                return;
            }
            
            const success = hashMap.insert(key, value);
            updateVisualization();
            if (success) {
                operationResult.textContent = `Inserted: ${key} => ${value}`;
            } else {
                operationResult.textContent = `Failed to insert ${key} (no space found with current collision method).`;
            }
        });
        
        getBtn.addEventListener('click', () => {
            const key = keyInput.value.trim();
            
            if (!key) {
                operationResult.textContent = 'Please enter a key.';
                return;
            }
            
            const value = hashMap.get(key);
            if (value !== undefined) {
                operationResult.textContent = `Found: ${key} => ${value}`;
            } else {
                operationResult.textContent = `Key ${key} not found.`;
            }
        });
        
        removeBtn.addEventListener('click', () => {
            const key = keyInput.value.trim();
            
            if (!key) {
                operationResult.textContent = 'Please enter a key.';
                return;
            }
            
            const success = hashMap.remove(key);
            updateVisualization();
            if (success) {
                operationResult.textContent = `Removed key: ${key}`;
            } else {
                operationResult.textContent = `Key ${key} not found.`;
            }
        });
        
        batchInsertBtn.addEventListener('click', () => {
            const randomWords = ['apple', 'banana', 'cherry', 'date', 'elderberry', 
                               'fig', 'grape', 'honeydew', 'kiwi', 'lemon'];
            
            for (let i = 0; i < 10; i++) {
                const word = randomWords[Math.floor(Math.random() * randomWords.length)];
                hashMap.insert(word + i, `value-${Math.random().toString(36).substr(2, 5)}`);
            }
            
            updateVisualization();
            operationResult.textContent = 'Inserted 10 random key-value pairs.';
        });
        
        clearBtn.addEventListener('click', () => {
            hashMap.clear();
            updateVisualization();
            operationResult.textContent = 'Cleared all entries from hash map.';
        });
        
        hashTestBtn.addEventListener('click', () => {
            const key = hashTestInput.value.trim();
            
            if (!key) {
                hashCalculationSteps.textContent = 'Please enter a key to test.';
                return;
            }
            
            let steps = '';
            if (hashMap.hashFunction === 'complex') {
                steps += 'Complex hash calculation:\n';
                steps += `Key: "${key}"\n\n`;
                
                let hash = 0;
                steps += 'Initialize hash = 0\n';
                
                for (let i = 0; i < key.length; i++) {
                    const charCode = key.charCodeAt(i);
                    steps += `Character '${key[i]}' (ASCII ${charCode}):\n`;
                    steps += `  hash = (hash << 5) - hash + ${charCode}\n`;
                    hash = (hash << 5) - hash + charCode;
                    steps += `  hash = ${hash}\n`;
                    steps += `  hash = ${hash} | 0 (convert to 32-bit integer)\n`;
                    hash |= 0;
                    steps += `  Current hash: ${hash}\n\n`;
                }
                
                const finalHash = Math.abs(hash) % hashMap.size;
                steps += `Final hash: Math.abs(${hash}) % ${hashMap.size} = ${finalHash}\n`;
            } else if (hashMap.hashFunction === 'random') {
                steps += 'Random hash (for testing only):\n';
                steps += `Random index between 0 and ${hashMap.size - 1}\n`;
                steps += `Result: ${hashMap.hash(key)}`;
            } else {
                steps += 'Simple hash calculation:\n';
                steps += `key.length % size = ${key.length} % ${hashMap.size} = ${hashMap.hash(key)}`;
            }
            
            hashCalculationSteps.textContent = steps;
        });
        
        function updateVisualization() {
            hashMapVisualization.innerHTML = '';
            
            currentSize.textContent = hashMap.size;
            currentLoad.textContent = hashMap.itemCount;
            currentCapacity.textContent = hashMap.size;
            currentLoadPercent.textContent = Math.round((hashMap.itemCount / hashMap.size) * 100);
            collisionCount.textContent = hashMap.collisionCount;
            
            for (let i = 0; i < hashMap.buckets.length; i++) {
                const bucketDiv = document.createElement('div');
                bucketDiv.className = 'bucket';
                
                const bucketHeader = document.createElement('div');
                bucketHeader.textContent = `Bucket ${i}:`;
                bucketDiv.appendChild(bucketHeader);
                
                const bucket = hashMap.buckets[i];
                if (bucket.length === 0) {
                    const emptySpan = document.createElement('span');
                    emptySpan.textContent = ' (empty)';
                    bucketDiv.appendChild(emptySpan);
                } else {
                    bucket.forEach((item, index) => {
                        const pairDiv = document.createElement('div');
                        pairDiv.className = 'key-value-pair' + (index > 0 ? ' collision' : '');
                        pairDiv.textContent = `${item.key} => ${item.value}`;
                        pairDiv.title = `Hash: ${hashMap.hash(item.key)}`;
                        bucketDiv.appendChild(pairDiv);
                    });
                }
                
                hashMapVisualization.appendChild(bucketDiv);
            }
        }
        
        // Initialize
        updateVisualization();
    </script>
</body>
</html>
