<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floyd-Warshall Algorithm Visualizer</title>
    <style>
        :root {
            --primary: #5d37e0;
            --secondary: #ff6b6b;
            --accent: #4ecdc4;
            --dark: #292f36;
            --light: #f7f7f7;
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background-color: var(--dark);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 3rem 2rem 2rem;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.05em;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            flex: 1;
            position: relative;
        }

        .graph-container {
            position: relative;
            width: 600px;
            height: 400px;
            margin: 3rem auto;
            perspective: 1000px;
        }

        .graph {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            transition: var(--transition);
            transform-style: preserve-3d;
        }

        .node {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transform: translateZ(20px);
            transition: var(--transition);
            z-index: 2;
        }

        .edge {
            position: absolute;
            height: 3px;
            background: rgba(255, 255, 255, 0.4);
            transform-origin: 0 0;
            z-index: 1;
            transition: var(--transition);
        }

        .edge::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            border-radius: 2px;
            background: var(--secondary);
            clip-path: polygon(100% 50%, 0 0, 0 100%);
        }

        .edge-weight {
            position: absolute;
            font-size: 0.9rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            z-index: 10;
        }

        button {
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            background: linear-gradient(45deg, var(--primary), #7a5af5);
            color: white;
            box-shadow: 0 4px 15px rgba(93, 55, 224, 0.4);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(93, 55, 224, 0.6);
        }

        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            opacity: 0;
            transition: var(--transition);
            z-index: -1;
        }

        button:hover::after {
            opacity: 1;
        }

        .matrix-container {
            width: 100%;
            max-width: 600px;
            margin: 2rem auto;
            overflow: hidden;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: var(--transition);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Courier New', monospace;
        }

        th, td {
            padding: 0.8rem;
            text-align: center;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            background: rgba(0, 0, 0, 0.3);
            font-weight: 600;
            color: var(--accent);
        }

        td {
            position: relative;
        }

        td.highlight {
            animation: highlight 1.5s ease;
            background: rgba(255, 107, 107, 0.2);
        }

        td.path {
            background: rgba(78, 205, 196, 0.3);
        }

        td.infinity {
            color: rgba(255, 255, 255, 0.4);
        }

        @keyframes highlight {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(255, 107, 107, 0.4); }
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .highlight-legend {
            background: rgba(255, 107, 107, 0.4);
        }

        .path-legend {
            background: rgba(78, 205, 196, 0.4);
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.08;
        }

        .status {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            font-weight: 500;
            min-height: 24px;
            color: var(--accent);
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 2rem;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }
            .graph-container {
                width: 90%;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <header>
        <h1>Floyd-Warshall Algorithm</h1>
        <p class="subtitle">
            A visual demonstration of the dynamic programming algorithm for finding shortest paths in a weighted graph
        </p>
    </header>

    <div class="container">
        <div class="graph-container">
            <div class="graph" id="graph"></div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color highlight-legend"></div>
                <span>Current Comparison</span>
            </div>
            <div class="legend-item">
                <div class="legend-color path-legend"></div>
                <span>Optimized Path</span>
            </div>
        </div>

        <div class="status" id="status">Ready to begin</div>

        <div class="controls">
            <button id="startBtn">Start Animation</button>
            <button id="resetBtn">Reset</button>
        </div>

        <div class="matrix-container">
            <table id="matrix">
                <thead>
                    <tr>
                        <th colspan="5">Distance Matrix</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Filled by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        Floyd-Warshall Algorithm Visualization | Shortest Path Finder
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Create particles
            const particles = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'absolute';
                particle.style.width = `${Math.random() * 5 + 2}px`;
                particle.style.height = particle.style.width;
                particle.style.backgroundColor = 'white';
                particle.style.borderRadius = '50%';
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.opacity = Math.random() * 0.3 + 0.1;
                particle.style.transform = `translateZ(${Math.random() * 100}px)`;
                particle.style.animation = `float ${Math.random() * 10 + 10}s infinite ease-in-out`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                particles.appendChild(particle);
            }

            // Graph definition
            const graph = {
                nodes: [
                    { id: 'A', x: 100, y: 100 },
                    { id: 'B', x: 450, y: 100 },
                    { id: 'C', x: 450, y: 300 },
                    { id: 'D', x: 100, y: 300 },
                    { id: 'E', x: 275, y: 200 }
                ],
                edges: [
                    { source: 0, target: 1, weight: 5 },
                    { source: 0, target: 3, weight: 10 },
                    { source: 1, target: 2, weight: 3 },
                    { source: 1, target: 4, weight: 4 },
                    { source: 2, target: 3, weight: 1 },
                    { source: 3, target: 0, weight: 2 },
                    { source: 4, target: 2, weight: 6 },
                    { source: 4, target: 3, weight: 2 }
                ]
            };

            // Initialize distance matrix
            let dist = [];
            const n = graph.nodes.length;
            
            // Create initial distance matrix with Infinity
            for (let i = 0; i < n; i++) {
                dist[i] = [];
                for (let j = 0; j < n; j++) {
                    if (i === j) {
                        dist[i][j] = 0;
                    } else {
                        dist[i][j] = Infinity;
                    }
                }
            }

            // Set edges in distance matrix
            graph.edges.forEach(edge => {
                dist[edge.source][edge.target] = edge.weight;
            });

            // Draw the graph
            function drawGraph() {
                const container = document.getElementById('graph');
                container.innerHTML = '';

                // Draw edges
                graph.edges.forEach((edge, index) => {
                    const sourceNode = graph.nodes[edge.source];
                    const targetNode = graph.nodes[edge.target];
                    
                    const edgeEl = document.createElement('div');
                    edgeEl.className = 'edge';
                    
                    // Calculate edge position and angle
                    const dx = targetNode.x - sourceNode.x;
                    const dy = targetNode.y - sourceNode.y;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                    
                    edgeEl.style.width = `${length}px`;
                    edgeEl.style.left = `${sourceNode.x}px`;
                    edgeEl.style.top = `${sourceNode.y}px`;
                    edgeEl.style.transform = `rotate(${angle}deg)`;
                    
                    // Add weight label
                    const weightEl = document.createElement('span');
                    weightEl.className = 'edge-weight';
                    weightEl.textContent = edge.weight;
                    
                    // Position weight at center of edge
                    const weightLeft = length / 2 - 15;
                    const weightTop = angle > 90 || angle < -90 ? -30 : 10;
                    
                    weightEl.style.left = `${weightLeft}px`;
                    weightEl.style.top = `${weightTop}px`;
                    
                    edgeEl.appendChild(weightEl);
                    container.appendChild(edgeEl);
                });

                // Draw nodes
                graph.nodes.forEach((node, index) => {
                    const nodeEl = document.createElement('div');
                    nodeEl.className = 'node';
                    nodeEl.textContent = node.id;
                    nodeEl.style.left = `${node.x - 30}px`;
                    nodeEl.style.top = `${node.y - 30}px`;
                    nodeEl.setAttribute('data-index', index);
                    container.appendChild(nodeEl);
                });
            }

            // Render the distance matrix
            function renderMatrix() {
                const matrixBody = document.querySelector('#matrix tbody');
                matrixBody.innerHTML = '';
                
                // Add header row
                const headerRow = document.createElement('tr');
                headerRow.innerHTML = '<th></th>' + 
                    graph.nodes.map(node => `<th>${node.id}</th>`).join('');
                matrixBody.appendChild(headerRow);
                
                // Add data rows
                for (let i = 0; i < n; i++) {
                    const row = document.createElement('tr');
                    row.innerHTML = `<th>${graph.nodes[i].id}</th>` + 
                        Array(n).fill().map((_, j) => {
                            const value = dist[i][j];
                            const isInfinity = value === Infinity;
                            const displayValue = isInfinity ? '∞' : value;
                            return `<td class="${isInfinity ? 'infinity' : ''}">${displayValue}</td>`;
                        }).join('');
                    matrixBody.appendChild(row);
                }
            }

            // Floyd-Warshall algorithm implementation
            let isRunning = false;
            let currentStep = { k: -1, i: -1, j: -1 };
            
            async function floydWarshallStep() {
                isRunning = true;
                document.getElementById('startBtn').textContent = 'Running...';
                
                const n = dist.length;
                const delay = 1000;
                
                for (let k = 0; k < n; k++) {
                    currentStep.k = k;
                    updateStatus();
                    
                    for (let i = 0; i < n; i++) {
                        currentStep.i = i;
                        
                        for (let j = 0; j < n; j++) {
                            currentStep.j = j;
                            updateStatus();
                            
                            // Highlight the current comparison in matrix
                            highlightMatrixCell(i, j);
                            
                            // Check if the path through k is shorter
                            if (dist[i][k] + dist[k][j] < dist[i][j]) {
                                // Update the matrix
                                dist[i][j] = dist[i][k] + dist[k][j];
                                
                                // Highlight the new shorter path
                                highlightPath(i, j, k);
                                
                                // Add small delay for visualization
                                await new Promise(resolve => setTimeout(resolve, delay));
                                
                                // Update the matrix display
                                renderMatrix();
                            }
                            
                            await new Promise(resolve => setTimeout(resolve, delay / 2));
                        }
                    }
                }
                
                isRunning = false;
                document.getElementById('startBtn').textContent = 'Complete';
                updateStatus({ text: 'Algorithm complete! Final shortest paths calculated.' });
            }
            
            function highlightMatrixCell(i, j) {
                // Clear previous highlights
                document.querySelectorAll('#matrix td').forEach(td => {
                    td.classList.remove('highlight', 'path');
                });
                
                // Highlight current cells
                const cell1 = document.querySelector(`#matrix tr:nth-child(${i + 2}) td:nth-child(${j + 2})`);
                if (cell1) cell1.classList.add('highlight');
                
                // Add path class to cells being compared
                if (currentStep.k >= 0) {
                    const cell2 = document.querySelector(`#matrix tr:nth-child(${i + 2}) td:nth-child(${currentStep.k + 2})`);
                    const cell3 = document.querySelector(`#matrix tr:nth-child(${currentStep.k + 2}) td:nth-child(${j + 2})`);
                    
                    if (cell2) cell2.classList.add('path');
                    if (cell3) cell3.classList.add('path');
                }
            }
            
            function highlightPath(i, j, k) {
                updateStatus({
                    text: `Found shorter path from ${graph.nodes[i].id} → ${graph.nodes[j].id} (via ${graph.nodes[k].id})`,
                    color: '#4ecdc4'
                });
                
                // Here you could add visual path highlighting on the graph
                // This would require tracking paths in a more complex way
            }
            
            function updateStatus(options = {}) {
                const statusEl = document.getElementById('status');
                const { k, i, j } = currentStep;
                
                if (options.text) {
                    statusEl.textContent = options.text;
                    if (options.color) statusEl.style.color = options.color;
                    return;
                }
                
                if (k === -1) {
                    statusEl.textContent = 'Ready to begin';
                    statusEl.style.color = '#4ecdc4';
                } else {
                    let text = `Comparing path: ${graph.nodes[i].id} → ${graph.nodes[j].id}`;
                    if (k >= 0) {
                        text += ` (via ${graph.nodes[k].id})`;
                    }
                    statusEl.textContent = text;
                    statusEl.style.color = '#ff6b6b';
                }
            }
            
            function reset() {
                // Reset distance matrix
                for (let i = 0; i < n; i++) {
                    for (let j = 0; j < n; j++) {
                        if (i === j) {
                            dist[i][j] = 0;
                        } else {
                            dist[i][j] = Infinity;
                        }
                    }
                }
                
                // Set edges in distance matrix
                graph.edges.forEach(edge => {
                    dist[edge.source][edge.target] = edge.weight;
                });
                
                // Reset UI
                currentStep = { k: -1, i: -1, j: -1 };
                renderMatrix();
                updateStatus();
                document.getElementById('startBtn').textContent = 'Start Animation';
                
                // Clear highlights
                document.querySelectorAll('#matrix td').forEach(td => {
                    td.classList.remove('highlight', 'path');
                });
            }
            
            // Initialize
            drawGraph();
            renderMatrix();
            
            // Event listeners
            document.getElementById('startBtn').addEventListener('click', function() {
                if (!isRunning && this.textContent !== 'Complete') {
                    floydWarshallStep();
                }
            });
            
            document.getElementById('resetBtn').addEventListener('click', reset);
            
            // Add animation for particles
            const style = document.createElement('style');
            style.textContent = `
                @keyframes float {
                    0%, 100% { transform: translateY(0) translateX(0) translateZ(0); }
                    25% { transform: translateY(-50px) translateX(20px) translateZ(30px); }
                    50% { transform: translateY(20px) translateX(-30px) translateZ(-20px); }
                    75% { transform: translateY(-30px) translateX(-10px) translateZ(-10px); }
                }
            `;
            document.head.appendChild(style);
        });
    </script>
</body>
</html>
