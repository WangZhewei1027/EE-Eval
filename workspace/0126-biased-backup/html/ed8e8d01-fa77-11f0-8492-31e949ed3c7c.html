<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Context Switching Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffffff, #e0e0e0);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        .container {
            position: relative;
            width: 80%;
            max-width: 800px;
            height: 500px;
            background: #fff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.8;
            transition: transform 0.5s ease-in-out;
        }

        .scene-1 {
            background: url('https://source.unsplash.com/random/800x500/?nature') center/cover no-repeat;
            z-index: 1;
        }

        .scene-2 {
            background: url('https://source.unsplash.com/random/800x500/?city') center/cover no-repeat;
            transform: translateX(100%);
        }

        .button {
            background-color: #007BFF;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
            position: absolute;
            bottom: 20px;
        }

        .button:hover {
            background-color: #0056b3;
        }

        h1 {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Context Switching</h1>
        <div class="scene scene-1"></div>
        <div class="scene scene-2"></div>
        <button class="button" id="switchScene">Switch Scene</button>
    </div>

    <script>
        const button = document.getElementById('switchScene');
        let sceneIndex = 0;
        
        button.addEventListener('click', () => {
            const scene1 = document.querySelector('.scene-1');
            const scene2 = document.querySelector('.scene-2');

            if (sceneIndex === 0) {
                scene1.style.transform = 'translateX(-100%)';
                scene2.style.transform = 'translateX(0)';
                sceneIndex = 1;
            } else {
                scene1.style.transform = 'translateX(0)';
                scene2.style.transform = 'translateX(100%)';
                sceneIndex = 0;
            }
        });
    </script>
</body>
</html>
