<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive HTTPS Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        button, input, select {
            margin: 5px;
        }
    </style>
</head>
<body>

<h1>HTTPS Interactive Demonstration</h1>
<p>Explore the concept of HTTPS with the following interactive controls:</p>

<h2>1. URL Encryption Simulation</h2>
<label for="urlInput">Enter URL:</label>
<input type="text" id="urlInput" placeholder="https://example.com">
<button id="encryptButton">Encrypt URL</button>
<p id="encryptedResult"></p>

<h2>2. Simulate Server Response</h2>
<label for="responseSelect">Select Response Status:</label>
<select id="responseSelect">
    <option value="200">200 OK</option>
    <option value="404">404 Not Found</option>
    <option value="500">500 Internal Server Error</option>
</select>
<button id="responseButton">Simulate Response</button>
<p id="responseResult"></p>

<h2>3. TLS Version Selection</h2>
<label for="tlsSelect">Select TLS Version:</label>
<select id="tlsSelect">
    <option value="TLS 1.0">TLS 1.0</option>
    <option value="TLS 1.1">TLS 1.1</option>
    <option value="TLS 1.2">TLS 1.2</option>
    <option value="TLS 1.3">TLS 1.3</option>
</select>
<button id="tlsButton">Show Selected TLS Version</button>
<p id="tlsResult"></p>

<h2>4. Random Security Vulnerability</h2>
<button id="vulnerabilityButton">Check for Random Vulnerability</button>
<p id="vulnerabilityResult"></p>

<h2>5. Interaction History</h2>
<button id="showHistoryButton">Show Interaction History</button>
<ul id="interactionHistory"></ul>

<script>
    let interactionHistory = [];

    document.getElementById('encryptButton').onclick = function() {
        const url = document.getElementById('urlInput').value;
        const encryptedUrl = btoa(url); // Basic simulation of encryption
        document.getElementById('encryptedResult').innerText = 'Encrypted URL: ' + encryptedUrl;
        interactionHistory.push('Encrypted URL: ' + encryptedUrl);
    };

    document.getElementById('responseButton').onclick = function() {
        const response = document.getElementById('responseSelect').value;
        let message;
        switch (response) {
            case '200':
                message = 'Server Response: 200 OK';
                break;
            case '404':
                message = 'Server Response: 404 Not Found';
                break;
            case '500':
                message = 'Server Response: 500 Internal Server Error';
                break;
        }
        document.getElementById('responseResult').innerText = message;
        interactionHistory.push(message);
    };

    document.getElementById('tlsButton').onclick = function() {
        const tlsVersion = document.getElementById('tlsSelect').value;
        document.getElementById('tlsResult').innerText = 'Selected TLS Version: ' + tlsVersion;
        interactionHistory.push('Selected TLS Version: ' + tlsVersion);
    };

    document.getElementById('vulnerabilityButton').onclick = function() {
        const vulnerabilities = ['SSL Stripping', 'Heartbleed', 'POODLE', 'BEAST', 'Logjam'];
        const randomVulnerability = vulnerabilities[Math.floor(Math.random() * vulnerabilities.length)];
        document.getElementById('vulnerabilityResult').innerText = 'Random Vulnerability: ' + randomVulnerability;
        interactionHistory.push('Checked for Vulnerability: ' + randomVulnerability);
    };

    document.getElementById('showHistoryButton').onclick = function() {
        const historyList = document.getElementById('interactionHistory');
        historyList.innerHTML = ''; // Clear previous list
        interactionHistory.forEach(interaction => {
            const li = document.createElement('li');
            li.textContent = interaction;
            historyList.appendChild(li);
        });
    };
</script>

</body>
</html>
