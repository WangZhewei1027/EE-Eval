<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stack Visualization – Elegant Concept Demo</title>
<style>
  /* Reset & base */
  *, *::before, *::after {
    box-sizing: border-box;
  }
  body {
    margin:0; 
    min-height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Fira Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex; 
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #e1e7f0;
    overflow: hidden;
    user-select:none;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  h1 {
    font-weight: 800;
    font-size: 2.8rem;
    margin-bottom: 0.2em;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #a0cdfc;
    text-shadow: 0 0 8px #77aaff99;
  }
  p.subheading {
    margin-top: 0;
    margin-bottom: 2.4rem;
    color: #b6c8d9cc;
    font-style: italic;
    font-weight: 500;
    font-size: 1.1rem;
    letter-spacing: 0.07em;
  }

  /* Container for stack and controls */
  .container {
    width: 320px;
    max-width: 90vw;
    background: rgba(28, 40, 51, 0.65);
    border-radius: 24px;
    box-shadow:
      0 6px 18px rgba(20,45,75,0.35),
      inset 0 0 30px 6px rgba(30, 100, 210, 0.15);
    padding: 2rem 2rem 3rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Stack area */
  .stack {
    position: relative;
    width: 240px;
    min-height: 300px;
    background: linear-gradient(145deg, #203a43, #2c5364);
    border-radius: 1.4rem;
    box-shadow:
      inset 0 0 30px 4px #1b2c3e,
      0 8px 24px rgba(15, 30, 50, 0.9);
    overflow: visible;
    padding-top: 20px;
    perspective: 900px;
  }

  /* Stack blocks */
  .block {
    position: absolute;
    left: 50%;
    width: 200px;
    height: 48px;
    margin-left: -100px;
    background: linear-gradient(135deg, #3268f1, #4a97ff);
    border-radius: 12px;
    box-shadow:
      0 8px 15px #1f43d4cc,
      inset 0 -4px 8px #635fe1c9,
      inset 0 4px 10px #aacbffcc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1.22rem;
    letter-spacing: 0.06em;
    color: #e9edff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    transition:
      transform 0.65s cubic-bezier(0.4, 0, 0.2, 1),
      box-shadow 0.4s ease;
    user-select:none;
  }

  /* Dynamic stacking: each block up by 58px + slight 3d tilt */
  .block:nth-child(1) {
    bottom: 20px;
    transform-origin: bottom center;
    transform: translateY(0) rotateX(0deg);
    z-index: 10;
  }
  .block:nth-child(2) {
    bottom: 78px;
    transform-origin: bottom center;
    transform: translateY(0) rotateX(4deg);
    z-index: 9;
    filter: drop-shadow(0 2px 1px #1a2c50cc);
  }
  .block:nth-child(3) {
    bottom: 136px;
    transform-origin: bottom center;
    transform: translateY(0) rotateX(8deg);
    z-index: 8;
    filter: drop-shadow(0 4px 2px #162649bb);
  }
  .block:nth-child(4) {
    bottom: 194px;
    transform-origin: bottom center;
    transform: translateY(0) rotateX(12deg);
    z-index: 7;
    filter: drop-shadow(0 6px 3px #12203b99);
  }
  .block:nth-child(5) {
    bottom: 252px;
    transform-origin: bottom center;
    transform: translateY(0) rotateX(16deg);
    z-index: 6;
    filter: drop-shadow(0 8px 4px #0e1a3188);
  }

  /* Glow accent behind stack for depth */
  .stack::before {
    content: "";
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 20px;
    background: radial-gradient(ellipse at center, rgba(70,140,255,0.4), transparent 70%);
    filter: blur(12px);
    z-index: 1;
    pointer-events: none;
  }

  /* Buttons container */
  .controls {
    margin-top: 2.4rem;
    display: flex;
    gap: 1.4rem;
  }

  /* Elegant buttons */
  button {
    position: relative;
    background:
      linear-gradient(145deg, #274eaa, #416de9);
    border: none;
    border-radius: 12px;
    color: #ddefff;
    font-weight: 600;
    font-family: 'Fira Sans', sans-serif;
    font-size: 1.1rem;
    padding: 0.72rem 1.6rem;
    cursor: pointer;
    box-shadow:
      0 5px 12px #3e6de520,
      inset 0 -3px 6px #224d9e;
    transition:
      box-shadow 0.25s ease,
      transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
      color 0.25s ease;
    user-select:none;
  }
  button:focus {
    outline: none;
    box-shadow:
      0 0 16px 3px #79a5ffcc,
      inset 0 -3px 6px #224d9e;
  }
  button:hover {
    color: #c9e0ff;
    box-shadow:
      0 10px 22px #5d89ff55,
      inset 0 -4px 8px #335ecf;
    transform: translateY(-1.8px);
  }
  button:active {
    transform: translateY(0);
    box-shadow:
      0 4px 8px #3160d6cc,
      inset 0 -3px 6px #2b4fcc;
  }

  /* Subtle info note */
  .info-note {
    margin-top: 1.8rem;
    font-size: 0.9rem;
    color: #9bb2ceaa;
    letter-spacing: 0.05em;
    font-style: italic;
    text-align: center;
    max-width: 280px;
    user-select:none;
  }

  /* Hide scrollbar if any */
  ::-webkit-scrollbar {
    display: none;
  }
</style>
</head>
<body>
  <h1>STACK</h1>
  <p class="subheading">Visualizing the Last-In, First-Out Data Structure</p>

  <div class="container" aria-label="Stack demonstration container">

    <div class="stack" aria-live="polite" aria-atomic="true" aria-relevant="additions removals" role="list" id="stack" tabindex="0">
      <!-- Stack blocks will be dynamically rendered by JS -->
    </div>

    <div class="controls" role="group" aria-label="Stack controls">
      <button id="push" aria-describedby="infoPush" title="Push a new element onto the stack">Push</button>
      <button id="pop" aria-describedby="infoPop" title="Pop the top element off the stack">Pop</button>
    </div>
    <div class="info-note" aria-live="polite" id="infoPush">Click 'Push' to add a new block to the stack.</div>
  </div>

<script>
  (() => {
    // Minimal stack logic to show effect visually with nice smooth animations.
    const stackEl = document.getElementById('stack');
    const pushBtn = document.getElementById('push');
    const popBtn = document.getElementById('pop');

    // Maximum blocks to display to keep aesthetics
    const MAX_BLOCKS = 5;

    // Keep a simple array representing stack data
    const stackData = [];

    // Generate a subtle progressive palette for blocks - blue shades with neon glow
    // Base color: #3268f1, we brighten for newest blocks
    function blockColor(idx) {
      // idx 0 is bottom block, newest at top (max idx length-1)
      const max = MAX_BLOCKS - 1;
      const lightness = 70 - idx*7; // from 70% to ~38%
      const saturation = 85 - idx*10;
      return `hsl(215, ${saturation}%, ${lightness}%)`;
    }

    // Create block element with styling & text
    function createBlock(label, idx) {
      const block = document.createElement('div');
      block.className = 'block';
      block.textContent = label;
      block.style.background = `linear-gradient(135deg, ${blockColor(idx)}, hsl(215, 80%, 45%))`;
      block.style.boxShadow = `
        0 8px 15px ${hslToRGBA(215, 0.7 - idx*0.1, 0.8)},
        inset 0 -4px 8px ${hslToRGBA(215, 0.5 - idx*0.1, 0.5)},
        inset 0 4px 10px ${hslToRGBA(215, 0.2, 1)}
      `;
      block.setAttribute('role', 'listitem');
      block.setAttribute('aria-label', `Stack block ${label}`);
      return block;
    }

    // Convert hsl hue and alpha to rgba string for shadows
    // alpha from 0 to 1
    function hslToRGBA(h, alpha, lightness) {
      // h saturation lightness to rgb 
      // simple, fixed saturation 90%
      const s = 90;
      const l = lightness*100;
      return `hsla(${h}, ${s}%, ${l}%, ${alpha})`;
    }

    // Render the entire stack
    function renderStack() {
      // Clear current
      stackEl.innerHTML = '';
      for (let i = 0; i < stackData.length; i++) {
        // bottom zero index, top last index
        const idx = stackData.length - 1 - i;
        const block = createBlock(stackData[i], idx);
        stackEl.appendChild(block);
      }
    }

    // Animate pushing new element
    function pushElement() {
      if (stackData.length >= MAX_BLOCKS) return;
      const newVal = `#${stackData.length + 1}`;
      stackData.push(newVal);
      animateStackChange('push');
    }

    // Animate popping top element
    function popElement() {
      if (stackData.length === 0) return;
      animateStackChange('pop');
    }

    // Animate stack modification
    function animateStackChange(action) {
      if(action === 'push'){
        // Create new block separately and animate from above down
        const newVal = stackData[stackData.length - 1];
        const newBlock = createBlock(newVal, 0);
        newBlock.style.bottom = '320px';
        newBlock.style.opacity = '0';
        newBlock.style.transformOrigin = 'bottom center';
        newBlock.style.transform = 'translateY(-40px) rotateX(12deg)';
        stackEl.appendChild(newBlock);

        // Animate fade & slide in
        requestAnimationFrame(() => {
          newBlock.style.transition = 'transform 0.8s cubic-bezier(0.4,0,0.2,1), opacity 0.6s ease-out';
          newBlock.style.opacity = '1';
          newBlock.style.bottom = '20px';
          newBlock.style.transform = 'translateY(0) rotateX(0deg)';
        });

        // After animation, re-render stack to reset z-index and order
        setTimeout(() => {
          renderStack();
        }, 850);
      }
      else if(action === 'pop'){
        // Animate the top block sliding up and fading
        const topBlock = stackEl.querySelector('.block');
        if(!topBlock) return;

        topBlock.style.transition = 'transform 0.7s cubic-bezier(0.4,0,0.2,1), opacity 0.5s ease-out';
        topBlock.style.transformOrigin = 'bottom center';
        topBlock.style.transform = 'translateY(-80px) rotateX(-12deg)';
        topBlock.style.opacity = '0';

        setTimeout(() => {
          stackData.pop();
          renderStack();
        }, 700);
      }
    }

    // Initial sample stack with 3 elements
    for(let i=1; i<=3; i++) stackData.push(`#${i}`);
    renderStack();

    pushBtn.addEventListener('click', () => {
      pushElement();
      speakInfo('Pushed ' + (stackData[stackData.length-1] || 'element'));
    });
    popBtn.addEventListener('click', () => {
      if(stackData.length === 0) {
        speakInfo('Stack is empty, cannot pop');
        return;
      }
      speakInfo('Popped ' + stackData[stackData.length-1]);
      popElement();
    });

    // Accessibility: spoken updates
    const infoNote = document.querySelector('.info-note');
    function speakInfo(text){
      // Quick text update for screen readers
      infoNote.textContent = text;
    }

  })();
</script>
</body>
</html>
