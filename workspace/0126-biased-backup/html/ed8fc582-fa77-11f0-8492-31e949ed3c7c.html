<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refactoring Concept</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f0f4c3, #ffe0b2);
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            transition: background 0.4s ease-in-out;
        }
        h1 {
            font-size: 3rem;
            text-align: center;
            margin: 20px 0;
            color: #453f27;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
        }
        .content {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            text-align: center;
            transform: scale(1);
            transition: transform 0.3s ease;
        }
        .content:hover {
            transform: scale(1.05);
        }
        .btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: background 0.3s, transform 0.3s;
            margin-top: 20px;
        }
        .btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        .graphic {
            width: 200px;
            margin: 20px auto;
            opacity: 0.8;
            transition: opacity 0.4s ease-in-out;
        }
        .graphic:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Refactoring</h1>
        <img src="https://via.placeholder.com/200" alt="Refactoring Graphic" class="graphic" />
        <p>
            Refactoring is the process of restructuring existing computer code—changing the factoring—without changing its external behavior. 
            <br>
            Click the button below to reveal a concept!
        </p>
        <button class="btn" onclick="displayMessage()">Reveal Concept</button>
        <p id="message" style="display:none; margin-top: 20px; font-weight: bold;">Refactoring improves code readability and reduces complexity!</p>
    </div>

    <script>
        function displayMessage() {
            document.getElementById("message").style.display = "block";
        }
    </script>
</body>
</html>
