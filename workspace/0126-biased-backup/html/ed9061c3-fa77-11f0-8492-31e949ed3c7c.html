<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overfitting Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #F5F7FA;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }
        #container {
            text-align: center;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            background: #FFFFFF;
            padding: 40px;
            width: 80%;
            max-width: 600px;
        }
        h1 {
            color: #5D5C6B;
            font-size: 2.5em;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        p {
            color: #7D7D7D;
            line-height: 1.6;
            font-size: 1.2em;
            margin: 20px 0;
        }
        .button {
            background: #396AB0;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }
        .button:hover {
            background: #2B4A8A;
            transform: scale(1.05);
        }
        #scatter-plot {
            width: 100%;
            height: 300px;
            margin-top: 30px;
            position: relative;
            background: linear-gradient(to right, #E4E4E9, #A2A2C8);
            border-radius: 10px;
            overflow: hidden;
        }
        .point {
            position: absolute;
            border-radius: 50%;
            background: #FFA500;
            transition: transform 0.3s;
        }
        .curve {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 165, 0, 0.2);
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            transition: clip-path 0.3s;
        }
    </style>
</head>
<body>

<div id="container">
    <h1>Understanding Overfitting</h1>
    <p>Overfitting occurs when a model learns the noise in the training data, leading to less effective predictions on new data.</p>
    
    <div id="scatter-plot">
        <div class="curve" id="curve"></div>
        <div class="point" style="width: 10px; height: 10px; left: 20%; top: 40%;"></div>
        <div class="point" style="width: 12px; height: 12px; left: 50%; top: 30%;"></div>
        <div class="point" style="width: 8px; height: 8px; left: 70%; top: 60%;"></div>
        <div class="point" style="width: 11px; height: 11px; left: 30%; top: 70%;"></div>
        <div class="point" style="width: 9px; height: 9px; left: 10%; top: 80%;"></div>
    </div>
    
    <button class="button" onclick="toggleAnimation()">Animate</button>
</div>

<script>
    let animating = false;
    function toggleAnimation() {
        animating = !animating;
        const points = document.querySelectorAll('.point');
        if (animating) {
            points.forEach(point => {
                point.style.transition = "transform 0.5s";
                point.style.transform = `translateY(-15px)`;
            });
            document.getElementById('curve').style.clipPath = "polygon(0 80%, 25% 60%, 50% 90%, 75% 20%, 100% 60%, 100% 100%, 0 100%)";
        } else {
            points.forEach(point => {
                point.style.transform = `translateY(0)`;
            });
            document.getElementById('curve').style.clipPath = "polygon(0 0, 100% 0, 100% 100%, 0 100%)";
        }
    }
</script>

</body>
</html>
