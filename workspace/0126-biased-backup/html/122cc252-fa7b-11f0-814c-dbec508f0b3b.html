<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Context Switching</title>
    <style>
        body {
            background-color: #fff;
            font-family: monospace;
        }
        #context {
            width: 50%;
            height: 50vh;
            border: 1px solid black;
            padding: 20px;
            margin: 20px auto;
        }
        #context input, #context textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
        }
        #context button {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        #context button:hover {
            background-color: #3e8e41;
        }
        #context textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="context"></div>
    <script>
        const context = document.getElementById('context');
        const input = document.createElement('input');
        const textarea = document.createElement('textarea');
        const button = document.createElement('button');
        const output = document.createElement('div');
        context.appendChild(input);
        context.appendChild(textarea);
        context.appendChild(button);
        context.appendChild(output);

        input.value = 'Hello World!';
        textarea.value = 'This is a test textarea.';
        button.textContent = 'Click me!';
        button.addEventListener('click', () => {
            context.innerHTML = '';
            context.appendChild(input);
            context.appendChild(textarea);
            context.appendChild(button);
            context.appendChild(output);
            input.value = 'Hello again!';
            textarea.value = 'This is another test textarea.';
            button.textContent = 'Click me again!';
        });

        function updateOutput() {
            output.textContent = input.value + '\n' + textarea.value;
        }

        setInterval(updateOutput, 1000);
    </script>
</body>
</html>
