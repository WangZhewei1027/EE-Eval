<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Heap Interactive Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
    </style>
    <script>
        let minHeap = [];

        function insert() {
            const value = parseInt(document.getElementById('insertInput').value);
            if (!isNaN(value)) {
                minHeap.push(value);
                buildMinHeap();
                updateDisplay();
                document.getElementById('insertInput').value = '';
            }
        }

        function removeMin() {
            if (minHeap.length > 0) {
                minHeap[0] = minHeap[minHeap.length - 1];
                minHeap.pop();
                buildMinHeap();
                updateDisplay();
            }
        }

        function buildMinHeap() {
            const length = minHeap.length;
            for (let i = Math.floor(length / 2) - 1; i >= 0; i--) {
                heapify(i, length);
            }
        }

        function heapify(i, length) {
            let smallest = i;
            const left = 2 * i + 1;
            const right = 2 * i + 2;

            if (left < length && minHeap[left] < minHeap[smallest]) {
                smallest = left;
            }
            if (right < length && minHeap[right] < minHeap[smallest]) {
                smallest = right;
            }
            if (smallest !== i) {
                [minHeap[i], minHeap[smallest]] = [minHeap[smallest], minHeap[i]];
                heapify(smallest, length);
            }
        }

        function updateDisplay() {
            const heapDisplay = document.getElementById('heapDisplay');
            heapDisplay.innerText = minHeap.length > 0 ? 'Heap: ' + minHeap.join(', ') : 'Heap is empty';
        }

        function clearHeap() {
            minHeap = [];
            updateDisplay();
        }

    </script>
</head>
<body>
    <h1>Min Heap Interactive Demonstration</h1>
    
    <div>
        <label for="insertInput">Insert Value:</label>
        <input type="number" id="insertInput" />
        <button onclick="insert()">Insert</button>
    </div>

    <div>
        <button onclick="removeMin()">Remove Min</button>
        <button onclick="clearHeap()">Clear Heap</button>
    </div>

    <h2 id="heapDisplay">Heap is empty</h2>
    
    <h3>Current Min: <span id="currentMin"></span></h3>
    <script>
        const updateCurrentMin = () => {
            document.getElementById('currentMin').innerText = minHeap.length > 0 ? Math.min(...minHeap) : 'None';
        }
        
        const updateDisplay = () => {
            const heapDisplay = document.getElementById('heapDisplay');
            heapDisplay.innerText = minHeap.length > 0 ? 'Heap: ' + minHeap.join(', ') : 'Heap is empty';
            updateCurrentMin();
        }
        
        document.addEventListener('DOMContentLoaded', function () {
            updateDisplay();
        });
    </script>
</body>
</html>
