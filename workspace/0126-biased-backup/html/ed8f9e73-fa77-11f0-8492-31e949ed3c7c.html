<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Testing Visualize</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #20232a, #61dafb);
            color: #fff;
            overflow: hidden;
        }
        
        h1 {
            text-align: center;
            margin-top: 100px;
            font-size: 3em;
            animation: fadeIn 2s ease-in-out;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 70vh;
            position: relative;
        }

        .unit-test-card {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            margin: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .unit-test-card:hover {
            transform: translateY(-10px);
        }

        .button {
            padding: 15px 30px;
            background-color: #61dafb;
            border: none;
            border-radius: 25px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #21a1f1;
        }

        .animation-container {
            position: absolute;
            top: 20%;
            right: 50%;
            transform: translate(50%, 0);
            z-index: -1;
        }

        .circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            position: absolute;
            animation: rotate 10s linear infinite;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

    </style>
</head>

<body>
    <h1>Unit Testing Visualization</h1>
    <div class="container">
        <div class="unit-test-card">
            <h2>What is Unit Testing?</h2>
            <p>Unit testing is a software testing method by which individual pieces of code, known as units, are tested 
            in isolation from the rest of the code base.</p>
            <p>It helps ensure that each component of the application behaves as expected.</p>
        </div>
        <button class="button" id="show-alert">Show Example</button>
    </div>
    
    <div class="animation-container">
        <div class="circle"></div>
    </div>

    <script>
        document.getElementById('show-alert').addEventListener('click', function() {
            alert("Unit Test Example Executed!");
        });
    </script>
</body>
</html>
