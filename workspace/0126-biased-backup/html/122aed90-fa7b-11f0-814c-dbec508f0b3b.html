<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Map</title>
    <style>
        body {
            font-family: monospace;
            font-size: 12px;
            background-color: white;
            padding: 0;
            margin: 0;
        }
        .hash-map {
            width: 800px;
            height: 600px;
            margin: 0 auto;
            border: 1px solid black;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .hash-map input[type="text"], .hash-map input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
        }
        .hash-map button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        .hash-map button:hover {
            background-color: #3e8e41;
        }
        .hash-map input[type="submit"] {
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        .hash-map input[type="submit"]:hover {
            background-color: #3e8e41;
        }
        .hash-map select {
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        .hash-map select:hover {
            background-color: #3e8e41;
        }
        .hash-map input[type="checkbox"] {
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        .hash-map input[type="checkbox"]:checked {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="hash-map">
        <input type="text" id="input1" placeholder="Enter key" oninput="updateDisplay()">
        <input type="text" id="input2" placeholder="Enter value" oninput="updateDisplay()">
        <button id="add-btn">Add</button>
        <button id="remove-btn">Remove</button>
        <select id="select1" onchange="updateDisplay()">
            <option value="1">Option 1</option>
            <option value="2">Option 2</option>
            <option value="3">Option 3</option>
        </select>
        <input type="checkbox" id="checkbox1">
        <input type="checkbox" id="checkbox2">
        <input type="checkbox" id="checkbox3">
        <button id="clear-btn">Clear</button>
    </div>

    <script>
        let input1 = document.getElementById('input1');
        let input2 = document.getElementById('input2');
        let addBtn = document.getElementById('add-btn');
        let removeBtn = document.getElementById('remove-btn');
        let select1 = document.getElementById('select1');
        let checkbox1 = document.getElementById('checkbox1');
        let checkbox2 = document.getElementById('checkbox2');
        let checkbox3 = document.getElementById('checkbox3');
        let clearBtn = document.getElementById('clear-btn');
        let display = document.getElementById('display');
        let count = 0;

        addBtn.addEventListener('click', () => {
            if (count < 10) {
                input1.value += 'a';
                count++;
            }
        });

        removeBtn.addEventListener('click', () => {
            if (count > 0) {
                input1.value = input1.value.slice(0, -1);
                count--;
            }
        });

        select1.addEventListener('change', () => {
            display.innerText = `Select: ${select1.value}`;
        });

        checkbox1.addEventListener('change', () => {
            if (checkbox1.checked) {
                input2.value += 'b';
            } else {
                input2.value = input2.value.slice(0, -1);
            }
        });

        checkbox2.addEventListener('change', () => {
            if (checkbox2.checked) {
                input2.value += 'c';
            } else {
                input2.value = input2.value.slice(0, -1);
            }
        });

        checkbox3.addEventListener('change', () => {
            if (checkbox3.checked) {
                input2.value += 'd';
            } else {
                input2.value = input2.value.slice(0, -1);
            }
        });

        clearBtn.addEventListener('click', () => {
            input1.value = '';
            input2.value = '';
        });

        updateDisplay() {
            display.innerText = `Input 1: ${input1.value}, Input 2: ${input2.value}`;
        }
    </script>
</body>
</html>
