<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stunning Monitor Visualization</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background-color: #1a1a2e;
            color: #fff;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }
        .monitor {
            width: 80vw;
            height: 50vh;
            border-radius: 15px;
            background: linear-gradient(145deg, #0e1a30, #1d2a4d);
            box-shadow: 15px 15px 30px #1a1a2e, -15px -15px 30px #0b0c1c;
            overflow: hidden;
            position: relative;
            transition: transform 0.5s ease;
        }
        .screen {
            width: 100%;
            height: 100%;
            background: url('https://via.placeholder.com/800x500/5D5C61/FFFFFF/?text=Interactive+Monitor+Screen') center/cover no-repeat;
            border-radius: 15px;
            position: relative;
            transform: translateZ(20px);
            transition: transform 0.5s ease;
        }
        .button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background-color: #e94560;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #d13450;
        }
        .button:focus {
            outline: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="monitor">
        <div class="screen"></div>
        <button class="button" onclick="toggleAnimation()">Toggle Animation</button>
    </div>
</div>

<script>
    let animated = false;

    function toggleAnimation() {
        const monitor = document.querySelector('.monitor');
        animated = !animated;
        monitor.style.transform = animated ? 'rotateY(-20deg)' : 'rotateY(0deg)';
    }
</script>

</body>
</html>
