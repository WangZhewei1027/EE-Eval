<!DOCTYPE html>
<html>
<head>
    <title>Interactive Paging System</title>
    <script>
        let currentPage = 1;
        let totalPages = 10;
        let pageSize = 10;
        let data = [];
        
        function init() {
            generateData();
            renderPagination();
            renderData();
            updateControls();
        }
        
        function generateData() {
            data = [];
            for (let i = 1; i <= 100; i++) {
                data.push(`Item ${i} - Data content for demonstration of paging functionality`);
            }
        }
        
        function renderData() {
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = data.slice(start, end);
            
            const dataContainer = document.getElementById('data-container');
            dataContainer.innerHTML = '';
            
            pageData.forEach(item => {
                const div = document.createElement('div');
                div.textContent = item;
                dataContainer.appendChild(div);
            });
        }
        
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            // First page
            addPageButton(pagination, '<<', 1, currentPage === 1);
            
            // Previous page
            addPageButton(pagination, '<', currentPage - 1, currentPage === 1);
            
            // Page numbers
            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            
            if (endPage - startPage + 1 < maxVisiblePages) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }
            
            if (startPage > 1) {
                const ellipsis = document.createElement('span');
                ellipsis.textContent = '...';
                pagination.appendChild(ellipsis);
            }
            
            for (let i = startPage; i <= endPage; i++) {
                addPageButton(pagination, i, i, i === currentPage);
            }
            
            if (endPage < totalPages) {
                const ellipsis = document.createElement('span');
                ellipsis.textContent = '...';
                pagination.appendChild(ellipsis);
            }
            
            // Next page
            addPageButton(pagination, '>', currentPage + 1, currentPage === totalPages);
            
            // Last page
            addPageButton(pagination, '>>', totalPages, currentPage === totalPages);
        }
        
        function addPageButton(container, text, page, disabled) {
            const button = document.createElement('button');
            button.textContent = text;
            button.onclick = () => goToPage(page);
            button.disabled = disabled;
            container.appendChild(button);
        }
        
        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderData();
            renderPagination();
            updateControls();
        }
        
        function updateControls() {
            document.getElementById('current-page').value = currentPage;
            document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages} (${data.length} total items)`;
        }
        
        function changePageSize() {
            const newSize = parseInt(document.getElementById('page-size').value);
            if (newSize > 0) {
                pageSize = newSize;
                totalPages = Math.ceil(data.length / pageSize);
                if (currentPage > totalPages) {
                    currentPage = totalPages;
                }
                renderData();
                renderPagination();
                updateControls();
            }
        }
        
        function jumpToPage() {
            const pageInput = document.getElementById('current-page');
            const page = parseInt(pageInput.value);
            if (page >= 1 && page <= totalPages) {
                goToPage(page);
            } else {
                pageInput.value = currentPage;
            }
        }
        
        function searchData() {
            const query = document.getElementById('search-input').value.toLowerCase();
            if (query === '') {
                generateData();
            } else {
                data = data.filter(item => item.toLowerCase().includes(query));
            }
            totalPages = Math.ceil(data.length / pageSize);
            currentPage = 1;
            renderData();
            renderPagination();
            updateControls();
        }
    </script>
</head>
<body onload="init()">
    <h1>Interactive Paging System</h1>
    
    <div>
        <h2>Data Display</h2>
        <div id="data-container"></div>
    </div>
    
    <div>
        <h2>Pagination Controls</h2>
        <div id="pagination"></div>
        <div id="page-info"></div>
    </div>
    
    <div>
        <h2>Configuration</h2>
        <div>
            <label>Items per page:
                <input id="number-of-pages" type="number" min="1" max="100" value="10" onchange="changePageSize()">
            </label>
        </div>
    </div>
    
    <div>
        <h2>Navigation</h2>
        <div>
            <label>Go to page:
                <input id="current-page" type="number" min="1" onchange="jumpToPage()">
            </label>
        </div>
    </div>
    
    <div>
        <h2>Search</h2>
        <div>
            <input id="search-input" type="text" placeholder="Search data...">
            <button onclick="searchData()">Search</button>
            <button onclick="document.getElementById('search-input').value=''; searchData();">Clear</button>
        </div>
    </div>
    
    <div>
        <h2>Advanced Controls</h2>
        <div>
            <button onclick="totalPages = Math.ceil(data.length / pageSize); goToPage(1)">Reset to First Page</button>
            <button onclick="goToPage(Math.floor(totalPages / 2))">Go to Middle Page</button>
            <button onclick="goToPage(totalPages)">Go to Last Page</button>
        </div>
        <div>
            <label>Jump to random page:
                <button onclick="goToPage(Math.floor(Math.random() * totalPages) + 1)">Random</button>
            </label>
        </div>
    </div>
</body>
</html>
