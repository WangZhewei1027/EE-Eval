<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query Optimization Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .hidden {
            display: none;
        }
        #results {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>Query Optimization Simulator</h1>

<div>
    <label for="select-table">Select Table:</label>
    <select id="select-table">
        <option value="users">Users</option>
        <option value="orders">Orders</option>
        <option value="products">Products</option>
    </select>
</div>

<div>
    <label for="filters">Add Filters:</label>
    <input type="text" id="filters" placeholder="e.g. age>30"/>
    <button id="add-filter">Add Filter</button>
</div>

<div>
    <label for="sort-order">Sort Order:</label>
    <select id="sort-order">
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
    </select>
</div>

<div>
    <label for="limit">Limit Results:</label>
    <input type="number" id="limit" placeholder="e.g. 10" value="10"/>
</div>

<button id="execute-query">Execute Query</button>

<div id="results" class="hidden">
    <h2>Query Results:</h2>
    <pre id="output"></pre>
</div>

<script>
    let filters = [];

    document.getElementById('add-filter').addEventListener('click', () => {
        const filter = document.getElementById('filters').value;
        if (filter) {
            filters.push(filter);
            document.getElementById('filters').value = '';
            updateOutput();
        }
    });

    document.getElementById('execute-query').addEventListener('click', () => {
        const table = document.getElementById('select-table').value;
        const sortOrder = document.getElementById('sort-order').value;
        const limit = document.getElementById('limit').value;

        const query = `SELECT * FROM ${table} WHERE ${filters.join(' AND ')} ORDER BY id ${sortOrder} LIMIT ${limit};`;
        document.getElementById('output').textContent = query;
        document.getElementById('results').classList.remove('hidden');
    });

    function updateOutput() {
        const table = document.getElementById('select-table').value;
        const sortOrder = document.getElementById('sort-order').value;
        const limit = document.getElementById('limit').value;

        const query = `SELECT * FROM ${table} WHERE ${filters.join(' AND ')} ORDER BY id ${sortOrder} LIMIT ${limit};`;
        document.getElementById('output').textContent = query;
    }
</script>

</body>
</html>
