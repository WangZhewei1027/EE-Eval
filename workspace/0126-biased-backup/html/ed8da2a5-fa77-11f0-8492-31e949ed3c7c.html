<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ternary Search Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 30px;
            width: 80%;
            max-width: 600px;
            animation: fadeIn 1s ease-in-out;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #0077cc;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        button {
            background-color: #0077cc;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #005fa3;
        }
        .visualization {
            position: relative;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 250px;
        }
        .line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: #ccc;
            bottom: 50%;
            transform: translateY(50%);
        }
        .marker {
            position: absolute;
            background-color: #ffcc00;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            animation: bounce 1s infinite alternate;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes bounce {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ternary Search Visualization</h1>
        <p>Observe how Ternary Search efficiently narrows down the search space of a sorted array by dividing it into three parts.</p>
        <div class="visualization">
            <div class="line"></div>
            <div class="marker" id="marker1" style="left: 20%;"></div>
            <div class="marker" id="marker2" style="left: 50%;"></div>
            <div class="marker" id="marker3" style="left: 80%;"></div>
        </div>
        <button id="startButton">Start Visualization</button>
    </div>
    <script>
        let step = 0;
        const markers = [
            {element: document.getElementById('marker1'), position: '20%', label: 'L'},
            {element: document.getElementById('marker2'), position: '50%', label: 'M'},
            {element: document.getElementById('marker3'), position: '80%', label: 'R'}
        ];

        document.getElementById('startButton').addEventListener('click', function () {
            step = 0;
            animateSearch();
        });

        function animateSearch() {
            if (step >= markers.length) return;
            markers[step].element.animate([
                { transform: 'translateY(0)' },
                { transform: 'translateY(-20px)' },
                { transform: 'translateY(0)' }
            ], {
                duration: 500,
                easing: 'ease-in-out',
                fill: 'forwards'
            });
            step++;
            setTimeout(animateSearch, 1000);
        }
    </script>
</body>
</html>
