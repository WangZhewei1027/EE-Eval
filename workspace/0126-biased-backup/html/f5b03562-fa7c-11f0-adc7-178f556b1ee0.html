<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heap (Min) Explanation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #text {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div id="text"></div>
    <button id="demonstration-button">Demonstrate Min Heap</button>

    <script>
        const textElement = document.getElementById('text');
        const demonstrationButton = document.getElementById('demonstration-button');

        // Define a sample array
        let array = [4, 2, 9, 6, 23, 12, 13, 10, 7, 5, 1];

        // Define a function to build a min heap
        function buildMinHeap(array) {
            for (let i = Math.floor(array.length / 2) - 1; i >= 0; i--) {
                heapify(array, i);
            }
        }

        // Define a function to heapify an array
        function heapify(array, i) {
            let smallest = i;
            let left = 2 * i + 1;
            let right = 2 * i + 2;

            if (left < array.length && array[left] < array[smallest]) {
                smallest = left;
            }

            if (right < array.length && array[right] < array[smallest]) {
                smallest = right;
            }

            if (smallest !== i) {
                swap(array, i, smallest);
                heapify(array, smallest);
            }
        }

        // Define a function to swap two elements in an array
        function swap(array, i, j) {
            let temp = array[i];
            array[i] = array[j];
            array[j] = temp;
        }

        // Define a function to print the min heap
        function printMinHeap(array) {
            textElement.innerHTML = '';
            for (let i = 0; i < array.length; i++) {
                textElement.innerHTML += array[i] + ' ';
            }
        }

        // Build the min heap
        buildMinHeap(array);

        // Print the min heap
        printMinHeap(array);

        // Add an event listener to the demonstration button
        demonstrationButton.addEventListener('click', () => {
            // Build a new min heap
            let newArray = [1, 5, 3, 6, 7, 8, 2, 4];

            // Print the new min heap
            printMinHeap(newArray);
        });
    </script>
</body>
</html>
