<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Binary Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Interactive Binary Tree</h1>
    <div>
        <label for="valueInput">Node Value: </label>
        <input type="number" id="valueInput" placeholder="Enter value">
        <button onclick="addNode()">Add Node</button>
        <button onclick="removeNode()">Remove Node</button>
    </div>
    
    <div>
        <button onclick="traverseInOrder()">In-Order Traversal</button>
        <button onclick="traversePreOrder()">Pre-Order Traversal</button>
        <button onclick="traversePostOrder()">Post-Order Traversal</button>
    </div>

    <h2>Tree Structure:</h2>
    <pre id="treeOutput"></pre>
    
    <h2>Traversal Output:</h2>
    <pre id="traversalOutput"></pre>

    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
            }
        }

        class BinaryTree {
            constructor() {
                this.root = null;
            }

            add(value) {
                const newNode = new Node(value);
                if (!this.root) {
                    this.root = newNode;
                    return;
                }
                this.insertNode(this.root, newNode);
            }

            insertNode(node, newNode) {
                if (newNode.value < node.value) {
                    if (!node.left) {
                        node.left = newNode;
                    } else {
                        this.insertNode(node.left, newNode);
                    }
                } else {
                    if (!node.right) {
                        node.right = newNode;
                    } else {
                        this.insertNode(node.right, newNode);
                    }
                }
            }

            remove(value) {
                this.root = this.removeNode(this.root, value);
            }

            removeNode(node, value) {
                if (!node) {
                    return null;
                }
                if (value < node.value) {
                    node.left = this.removeNode(node.left, value);
                } else if (value > node.value) {
                    node.right = this.removeNode(node.right, value);
                } else {
                    if (!node.left && !node.right) {
                        return null;
                    }
                    if (!node.left) {
                        return node.right;
                    }
                    if (!node.right) {
                        return node.left;
                    }
                    const tempNode = this.getMinNode(node.right);
                    node.value = tempNode.value;
                    node.right = this.removeNode(node.right, tempNode.value);
                }
                return node;
            }

            getMinNode(node) {
                while (node && node.left) {
                    node = node.left;
                }
                return node;
            }

            inOrder(node, result) {
                if (node) {
                    this.inOrder(node.left, result);
                    result.push(node.value);
                    this.inOrder(node.right, result);
                }
            }

            preOrder(node, result) {
                if (node) {
                    result.push(node.value);
                    this.preOrder(node.left, result);
                    this.preOrder(node.right, result);
                }
            }

            postOrder(node, result) {
                if (node) {
                    this.postOrder(node.left, result);
                    this.postOrder(node.right, result);
                    result.push(node.value);
                }
            }

            display(node, level = 0, result = "") {
                if (!node) return "";
                result = this.display(node.right, level + 1, result);
                result += " ".repeat(4 * level) + node.value + "\n";
                result = this.display(node.left, level + 1, result);
                return result;
            }
        }

        const tree = new BinaryTree();

        function addNode() {
            const value = parseInt(document.getElementById("valueInput").value);
            if (!isNaN(value)) {
                tree.add(value);
                document.getElementById("valueInput").value = "";
                updateTreeOutput();
            }
        }

        function removeNode() {
            const value = parseInt(document.getElementById("valueInput").value);
            if (!isNaN(value)) {
                tree.remove(value);
                document.getElementById("valueInput").value = "";
                updateTreeOutput();
            }
        }

        function updateTreeOutput() {
            document.getElementById("treeOutput").textContent = tree.display(tree.root);
        }

        function traverseInOrder() {
            const result = [];
            tree.inOrder(tree.root, result);
            document.getElementById("traversalOutput").textContent = result.join(', ');
        }

        function traversePreOrder() {
            const result = [];
            tree.preOrder(tree.root, result);
            document.getElementById("traversalOutput").textContent = result.join(', ');
        }

        function traversePostOrder() {
            const result = [];
            tree.postOrder(tree.root, result);
            document.getElementById("traversalOutput").textContent = result.join(', ');
        }
    </script>
</body>
</html>
