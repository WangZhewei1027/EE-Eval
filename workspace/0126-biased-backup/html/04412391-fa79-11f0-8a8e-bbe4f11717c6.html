<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
        }
        
        .link {
            display: inline-block;
            width: 100px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .link:hover {
            background-color: #f5f5f5;
        }
        
        .button {
            display: inline-block;
            width: 150px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #3e8e41;
        }
        
        .graphic {
            width: 100%;
            height: 100vh;
            background-image: linear-gradient(to bottom, #f0f0f0, #fff);
            background-size: 100% 100%;
            background-position: 0% 0%;
            position: relative;
        }
        
        .animation {
            animation: fadeIn 2s infinite;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Linked List</h1>
            <p>Visual Representation of Linked List Data Structure</p>
        </div>
        <div class="graphic"></div>
        <div class="footer">
            <p>&copy; 2023 Linked List Demo</p>
        </div>
        <div class="link" id="link1" onclick="clickLink1()">Click Me!</div>
        <div class="button" id="button1">Click Me!</div>
    </div>
    
    <script>
        let links = [];
        let currentLink = null;
        
        function addLink(text) {
            links.push({ text, next: null });
        }
        
        function printList() {
            let text = "";
            for (let link of links) {
                text += link.text + "\n";
            }
            document.getElementById("link1").innerHTML = text;
        }
        
        function clickLink1() {
            currentLink = links.shift();
            currentLink.next = null;
            printList();
        }
        
        function clickButton1() {
            currentLink = links.shift();
            currentLink.next = null;
            printList();
        }
    </script>
</body>
</html>
