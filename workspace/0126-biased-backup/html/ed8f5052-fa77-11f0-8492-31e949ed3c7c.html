<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful DNS Concept Demo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
            height: 100%;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            overflow: hidden;
        }

        .dns-box {
            width: 400px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            animation: fadeIn 1.5s ease-in-out;
            text-align: center;
        }

        .dns-title {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #e8e8e8;
            font-weight: 700;
        }

        .description {
            font-size: 1.2em;
            margin-bottom: 20px;
            line-height: 1.5;
            opacity: 0.8;
        }

        .button {
            padding: 10px 20px;
            border: none;
            background-color: #98c0f5;
            color: #fff;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            animation: pulse 2s infinite;
        }

        .button:hover {
            background-color: #0e4c92;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8em;
            color: #ccc;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="dns-box">
        <div class="dns-title">Understanding DNS</div>
        <div class="description">
            The Domain Name System (DNS) is like the internet's phonebook. It translates human-friendly domain names (like www.example.com) into IP addresses (like 192.0.2.1), allowing browsers to load internet resources seamlessly.
        </div>
        <button class="button" onclick="showMessage()">Learn More</button>
    </div>
</div>

<div class="footer">© 2023 All rights reserved.</div>

<script>
    function showMessage() {
        alert("The Domain Name System (DNS) is crucial for the functionality of the internet!");
    }
</script>

</body>
</html>
