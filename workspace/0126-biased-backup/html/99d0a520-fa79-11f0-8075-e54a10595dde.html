<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version Control Simulator</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #history { margin-top: 20px; }
        #log { margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Version Control Simulator</h1>
    <input type="text" id="fileInput" placeholder="Enter file content">
    <button id="commitBtn">Commit</button>
    <button id="revertBtn">Revert Last Commit</button>
    <button id="resetBtn">Reset to Base Version</button>
    <button id="viewHistoryBtn">View Commit History</button>
    
    <h2>Current Value</h2>
    <div id="currentValue" style="border: 1px solid black; padding: 10px;">No content</div>
    
    <h2 id="historyHeader">Commit History</h2>
    <div id="history"></div>
    
    <div id="log"></div>

    <script>
        let commits = [];
        let currentVersion = 0;
        let baseVersionContent = '';

        document.getElementById('commitBtn').onclick = function() {
            const fileContent = document.getElementById('fileInput').value;
            if (fileContent) {
                commits.push({ version: currentVersion + 1, content: fileContent });
                currentVersion++;
                baseVersionContent = fileContent;
                document.getElementById('currentValue').innerText = fileContent;
                document.getElementById('log').innerText = 'Committed version ' + (currentVersion);
                document.getElementById('fileInput').value = '';
            }
            else {
                alert("Please enter file content to commit.");
            }
        };

        document.getElementById('revertBtn').onclick = function() {
            if (commits.length > 0) {
                commits.pop();
                currentVersion = commits.length ? commits[commits.length - 1].version : 0;
                const lastCommit = commits.length > 0 ? commits[commits.length - 1].content : '';
                document.getElementById('currentValue').innerText = lastCommit || 'No content';
                document.getElementById('log').innerText = 'Reverted to version ' + (currentVersion);
            }
            else {
                alert("No commits to revert.");
            }
        };

        document.getElementById('resetBtn').onclick = function() {
            commits = [];
            currentVersion = 0;
            baseVersionContent = '';
            document.getElementById('currentValue').innerText = 'No content';
            document.getElementById('log').innerText = 'Reset to base version';
        };

        document.getElementById('viewHistoryBtn').onclick = function() {
            const historyDiv = document.getElementById('history');
            historyDiv.innerHTML = '';
            if (commits.length > 0) {
                commits.forEach(commit => {
                    const commitEntry = document.createElement('div');
                    commitEntry.innerText = 'Version ' + commit.version + ': ' + commit.content;
                    historyDiv.appendChild(commitEntry);
                });
            } else {
                historyDiv.innerText = 'No commits made yet.';
            }
        };
    </script>
</body>
</html>
