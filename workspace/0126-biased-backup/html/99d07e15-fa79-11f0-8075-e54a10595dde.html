<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST API Demonstration</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .control { margin-bottom: 10px; }
    </style>
</head>
<body>

<h1>REST API Interactive Demo</h1>

<div class="control">
    <input type="text" id="apiEndpoint" placeholder="Enter API Endpoint" />
    <button id="fetchData">Fetch Data</button>
</div>

<div class="control">
    <input type="text" id="postData" placeholder='Enter JSON for POST (e.g. {"name": "John"})' />
    <button id="postDataButton">Post Data</button>
</div>

<div class="control">
    <input type="text" id="updateDataId" placeholder="Enter ID to Update" />
    <input type="text" id="updateData" placeholder='Enter JSON for Update (e.g. {"name": "Doe"})' />
    <button id="updateDataButton">Update Data</button>
</div>

<div class="control">
    <input type="text" id="deleteDataId" placeholder="Enter ID to Delete" />
    <button id="deleteDataButton">Delete Data</button>
</div>

<div class="control">
    <label for="timeout">Request Timeout (ms): </label>
    <input type="number" id="timeout" value="5000" />
</div>

<h2>Response:</h2>
<pre id="responseOutput"></pre>

<script>
    document.getElementById('fetchData').onclick = function() {
        const endpoint = document.getElementById('apiEndpoint').value;
        const timeout = document.getElementById('timeout').value;

        fetch(endpoint, { method: 'GET', timeout: timeout })
            .then(response => response.json())
            .then(data => {
                document.getElementById('responseOutput').textContent = JSON.stringify(data, null, 2);
            })
            .catch(error => {
                document.getElementById('responseOutput').textContent = 'Error: ' + error;
            });
    };

    document.getElementById('postDataButton').onclick = function() {
        const endpoint = document.getElementById('apiEndpoint').value;
        const postData = document.getElementById('postData').value;
        const timeout = document.getElementById('timeout').value;

        fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: postData,
            timeout: timeout
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('responseOutput').textContent = JSON.stringify(data, null, 2);
        })
        .catch(error => {
            document.getElementById('responseOutput').textContent = 'Error: ' + error;
        });
    };

    document.getElementById('updateDataButton').onclick = function() {
        const endpoint = document.getElementById('apiEndpoint').value + '/' + document.getElementById('updateDataId').value;
        const updateData = document.getElementById('updateData').value;
        const timeout = document.getElementById('timeout').value;

        fetch(endpoint, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: updateData,
            timeout: timeout
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('responseOutput').textContent = JSON.stringify(data, null, 2);
        })
        .catch(error => {
            document.getElementById('responseOutput').textContent = 'Error: ' + error;
        });
    };

    document.getElementById('deleteDataButton').onclick = function() {
        const endpoint = document.getElementById('apiEndpoint').value + '/' + document.getElementById('deleteDataId').value;
        const timeout = document.getElementById('timeout').value;

        fetch(endpoint, {
            method: 'DELETE',
            timeout: timeout
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('responseOutput').textContent = JSON.stringify(data, null, 2);
        })
        .catch(error => {
            document.getElementById('responseOutput').textContent = 'Error: ' + error;
        });
    };
</script>

</body>
</html>
