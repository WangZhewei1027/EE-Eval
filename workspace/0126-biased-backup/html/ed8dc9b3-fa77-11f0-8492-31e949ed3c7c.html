<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellman-Ford Algorithm Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #6200ea;
        }

        .graph-container {
            position: relative;
            width: 80vw;
            height: 50vh;
            border: 2px solid #6200ea;
            border-radius: 12px;
            background-color: #fff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .node {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #03a9f4;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            transition: background 0.3s;
        }

        .node.active {
            background: #ffea00;
        }

        .edge {
            position: absolute;
            width: 2px;
            height: 200px;
            background: #ccc;
            transition: background 0.3s;
        }

        .edge.active {
            background: #ff5722;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #6200ea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #3700b3;
        }
    </style>
</head>
<body>

<h1>Bellman-Ford Algorithm Visualization</h1>
<div class="graph-container" id="graphContainer"></div>
<button id="startButton">Run Algorithm</button>

<script>
    const graphContainer = document.getElementById('graphContainer');
    const startButton = document.getElementById('startButton');

    const nodes = [
        { id: 'A', x: 50, y: 200 },
        { id: 'B', x: 200, y: 50 },
        { id: 'C', x: 200, y: 250 },
        { id: 'D', x: 350, y: 150 }
    ];

    const edges = [
        { from: 'A', to: 'B', weight: 1 },
        { from: 'A', to: 'C', weight: 4 },
        { from: 'B', to: 'C', weight: 2 },
        { from: 'B', to: 'D', weight: 5 },
        { from: 'C', to: 'D', weight: 1 }
    ];

    nodes.forEach(node => {
        const div = document.createElement('div');
        div.classList.add('node');
        div.style.left = node.x + 'px';
        div.style.top = node.y + 'px';
        div.innerText = node.id;
        div.dataset.id = node.id;
        graphContainer.appendChild(div);
    });

    edges.forEach(edge => {
        const fromNode = nodes.find(n => n.id === edge.from);
        const toNode = nodes.find(n => n.id === edge.to);
        
        const div = document.createElement('div');
        div.classList.add('edge');
        const startX = fromNode.x + 20;
        const startY = fromNode.y + 20;
        const endX = toNode.x + 20;
        const endY = toNode.y + 20;

        div.style.left = Math.min(startX, endX) + 'px';
        div.style.top = Math.min(startY, endY) + 'px';
        div.style.height = Math.sqrt((endX - startX) ** 2 + (endY - startY) ** 2) + 'px';
        div.style.transform = `rotate(${Math.atan2(endY - startY, endX - startX) * (180 / Math.PI)}deg)`;
        graphContainer.appendChild(div);
    });

    startButton.addEventListener('click', () => {
        let iterations = 0;
        const maxIterations = nodes.length - 1;
        const interval = setInterval(() => {
            if (iterations > maxIterations) {
                clearInterval(interval);
            } else {
                nodes.forEach((node, index) => {
                    setTimeout(() => {
                        document.querySelectorAll('.node')[index].classList.add('active');
                        document.querySelectorAll('.edge').forEach(edge => {
                            edge.classList.add('active');
                        });
                    }, iterations * 1000);
                });
                iterations++;
            }
        }, 1000);
    });
</script>
</body>
</html>
