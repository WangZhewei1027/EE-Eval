<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stunning Process Visualization</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            color: #333;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 0.5em;
            color: #502e91;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            animation: fadeIn 2s ease forwards;
        }

        p {
            font-size: 1.2em;
            max-width: 600px;
            margin: auto;
            line-height: 1.5;
            opacity: 0;
            animation: slideIn 2s ease forwards 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .button {
            background-color: #502e91;
            border: none;
            border-radius: 25px;
            color: white;
            padding: 15px 30px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
            margin-top: 20px;
        }

        .button:hover {
            background-color: #6a3dba;
            transform: translateY(-3px);
        }

        .background-graphic {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2), rgba(0, 0, 0, 0));
            border-radius: 50%;
            animation: pulse 3s infinite;
            z-index: 1;
            transform: translate(-50%, -50%);
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.05);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Visualizing the Process</h1>
        <p>Witness the elegant journey of progress through a beautifully designed representation. This is a stunning
            portrayal focusing on aesthetics over interaction.</p>
        <button class="button">Explore More</button>
    </div>
    <div class="background-graphic"></div>
</body>

</html>
