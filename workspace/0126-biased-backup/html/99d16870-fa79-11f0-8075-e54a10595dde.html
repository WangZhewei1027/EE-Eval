<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encryption Interface</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body>

<h1>Simple Encryption Tool</h1>

<h2>Input Text</h2>
<textarea id="inputText" rows="4" cols="50"></textarea><br/>

<h2>Encryption Method</h2>
<select id="encryptionMethod" onchange="updateEncryptionMethod()">
    <option value="caesar">Caesar Cipher</option>
    <option value="xor">XOR Cipher</option>
</select>

<h2>Caesar Cipher Settings</h2>
<div id="caesarSettings" class="hidden">
    <label for="shift">Shift:</label>
    <input type="number" id="shift" value="3" min="1" max="25"/><br/>
</div>

<h2>XOR Cipher Settings</h2>
<div id="xorSettings" class="hidden">
    <label for="xorKey">XOR Key:</label>
    <input type="text" id="xorKey" value="mykey"/><br/>
</div>

<h2>Output</h2>
<textarea id="outputText" rows="4" cols="50" readonly></textarea><br/>

<h2>Actions</h2>
<button onclick="encryptText()">Encrypt</button>
<button onclick="decryptText()">Decrypt</button>
<button onclick="clearFields()">Clear</button>

<script>
    function updateEncryptionMethod() {
        const method = document.getElementById("encryptionMethod").value;
        document.getElementById("caesarSettings").classList.toggle('hidden', method !== 'caesar');
        document.getElementById("xorSettings").classList.toggle('hidden', method !== 'xor');
    }

    function encryptText() {
        const method = document.getElementById("encryptionMethod").value;
        const input = document.getElementById("inputText").value;
        let output;

        if (method === "caesar") {
            const shift = parseInt(document.getElementById("shift").value);
            output = caesarCipher(input, shift);
        } else if (method === "xor") {
            const key = document.getElementById("xorKey").value;
            output = xorCipher(input, key);
        }

        document.getElementById("outputText").value = output;
    }

    function decryptText() {
        const method = document.getElementById("encryptionMethod").value;
        const input = document.getElementById("outputText").value;
        let output;

        if (method === "caesar") {
            const shift = parseInt(document.getElementById("shift").value);
            output = caesarCipher(input, -shift);
        } else if (method === "xor") {
            const key = document.getElementById("xorKey").value;
            output = xorCipher(input, key);
        }

        document.getElementById("outputText").value = output;
    }

    function caesarCipher(text, shift) {
        return text.split('').map(char => {
            if (!char.match(/[a-zA-Z]/)) return char; // Non-alphabet characters untouched
            const base = char.charCodeAt(0) >= 65 && char.charCodeAt(0) <= 90 ? 65 : 97; // A or a
            return String.fromCharCode((char.charCodeAt(0) - base + shift + 26) % 26 + base);
        }).join('');
    }

    function xorCipher(text, key) {
        let output = '';
        for (let i = 0; i < text.length; i++) {
            output += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
        }
        return output;
    }

    function clearFields() {
        document.getElementById("inputText").value = '';
        document.getElementById("outputText").value = '';
        document.getElementById("xorKey").value = 'mykey';
        document.getElementById("shift").value = 3;
    }
</script>

</body>
</html>
