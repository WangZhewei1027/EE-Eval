<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Radix Sort Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap');

  /* Reset and base */
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Space Grotesk', sans-serif;
    color: #e0e6f0;
    overflow-x: hidden;
    user-select: none;
  }
  h1 {
    margin: 1.2rem 0 0.4rem;
    font-weight: 700;
    font-size: 2.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #85d7ff;
    text-shadow: 0 0 6px #32bfffaa;
  }

  h2 {
    margin: 0 0 1.5rem 0;
    font-weight: 500;
    font-size: 1.2rem;
    color: #a8c6ffcc;
    letter-spacing: 0.06em;
  }

  /* Container */
  .container {
    max-width: 900px;
    margin: 2rem auto 5rem;
    background: rgba(30, 50, 70, 0.72);
    border-radius: 1.4rem;
    padding: 2.8rem 3rem 3.2rem;
    box-shadow:
      0 0 12px 3px #1da1f2bb,
      inset 0 0 15px 2px #32bfff55;
  }

  /* Buttons */
  .btn-group {
    display: flex;
    justify-content: center;
    gap: 1.6rem;
    margin: 1.8rem 0 3rem;
  }

  button {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    padding: 0.9rem 2rem;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: linear-gradient(145deg, #1d8cf3, #0d6cbc);
    color: #e0e6f0;
    box-shadow:
      0 4px 15px #0f4e8faa,
      inset 0 -1px 4px #143d69;
    transition:
      background-color 0.35s ease,
      box-shadow 0.35s ease,
      transform 0.18s ease;
    user-select: none;
  }
  button:hover {
    background: linear-gradient(145deg, #47a7ff, #1d8cf3);
    box-shadow:
      0 6px 20px #1d8cf3cc,
      inset 0 -1px 6px #1661a4;
    transform: translateY(-2px);
  }
  button:active {
    transform: translateY(1px);
    box-shadow:
      0 2px 9px #0f4e8fbb,
      inset 0 -1px 4px #0b3e6e;
  }
  button:disabled {
    background: #0b2c4fdd;
    cursor: default;
    box-shadow: none;
    color: #779bb3aa;
  }

  /* Visualization area */
  #visualizer {
    position: relative;
    height: 290px;
    background: linear-gradient(135deg, #122437, #274264);
    border-radius: 1rem;
    overflow: visible;
    box-shadow:
      0 0 15px 3px #2a70f8bb,
      inset 0 0 20px 2px #32bfff55;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 1rem 1rem 1.8rem 1rem;
  }

  /* Bars container */
  .bars {
    display: flex;
    gap: 1rem;
    align-items: flex-end;
    justify-content: center;
    flex-wrap: nowrap;
  }

  /* Individual bar */
  .bar {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    width: 36px;
    border-radius: 0.35rem;
    box-shadow:
      0 3px 13px #0f71ffcc,
      inset 0 -3px 12px #145effee;
    transition:
      background-color 0.5s ease,
      transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: default;
    user-select: none;
  }
  .bar[data-highlight="digit"] {
    background: #59f0ffcc;
    box-shadow:
      0 0 20px 5px #59d9ffff,
      inset 0 0 18px #47c1fff4;
    transform: translateY(-8px);
    z-index: 10;
  }
  .bar[data-highlight="bucket"] {
    background: #e26caccc;
    box-shadow:
      0 0 25px 6px #d1488aff,
      inset 0 0 20px #b1397ee3;
    transform: translateY(-10px);
    z-index: 12;
  }
  .bar.sorted {
    background: #71ffb5cc;
    box-shadow:
      0 0 18px 4px #4acf8ff5,
      inset 0 0 20px #3db77ccc;
    transform: translateY(0);
  }

  /* Bar height and label */
  .bar .height-label {
    position: absolute;
    bottom: 100%;
    margin-bottom: 8px;
    color: #a5d8ffcc;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-shadow: 0 0 5px #47bfffdd;
    user-select: none;
  }
  .bar .value-label {
    color: #d0ebffdd;
    font-weight: 700;
    font-size: 1.12rem;
    letter-spacing: 0.12em;
    text-shadow:
      0 0 5px #32bfffcc,
      0 0 10px #9fddfff2;
    user-select: none;
    pointer-events: none;
  }

  /* Buckets container */
  #buckets-area {
    margin-top: 32px;
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: nowrap;
    user-select: none;
  }

  .bucket {
    background: #112e4cbb;
    border-radius: 0.85rem;
    width: 46px;
    min-height: 80px;
    box-shadow:
      inset 0 0 25px 10px #1e90ff33,
      0 0 16px 3px #1e90ffcc;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 4px 10px 4px;
    transition:
      box-shadow 0.35s ease,
      transform 0.5s ease;
    flex-wrap: nowrap;
  }
  .bucket[data-active="true"] {
    box-shadow:
      inset 0 0 30px 14px #67f9ffff,
      0 0 25px 6px #67f9ffcc;
    transform: translateY(-6px);
    z-index: 15;
  }

  .bucket-label {
    font-weight: 700;
    font-size: 1rem;
    color: #4de2ffdd;
    margin-bottom: 0.45rem;
    text-shadow: 0 0 8px #4de2ffdd;
    user-select: text;
    letter-spacing: 0.14em;
  }

  .bucket-bars {
    display: flex;
    flex-direction: column-reverse;
    gap: 6px;
    align-items: center;
    overflow-y: visible;
    max-height: 120px;
    min-height: 90px;
    justify-content: flex-start;
  }

  .bucket-bars .bar {
    width: 38px;
    border-radius: 0.45rem;
    font-size: 0.95rem;
    letter-spacing: 0.06em;
    box-shadow:
      0 2px 10px #b1e7ffff,
      inset 0 -2px 8px #89d6ffcc;
    cursor: default;
    transform: translateY(0);
  }
  .bucket-bars .bar .height-label {
    display: none;
  }
  .bucket-bars .bar .value-label {
    font-size: 1.1rem;
    color: #bbffffee;
    text-shadow:
      0 0 7px #33ddffff,
      0 0 14px #46eaffef;
  }

  /* Footer Text */
  .footer-text {
    text-align: center;
    font-size: 0.85rem;
    color: #83c6ff99;
    padding: 16px 18px 40px;
    user-select: none;
  }

  /* Scrollbar hidden on buckets area for neatness */
  #buckets-area::-webkit-scrollbar {
    display: none;
  }

  /* Smooth fade animation for bars appearing */
  .fade-in {
    animation: fadeInUp 1.2s ease forwards;
    opacity: 0;
    transform: translateY(12px);
  }
  @keyframes fadeInUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

</style>
</head>
<body>
  <main class="container" role="main" aria-label="Radix Sort Visualization">
    <h1>Radix Sort</h1>
    <h2>An elegant demonstration of sorting by digits with luminous animation</h2>

    <div class="btn-group" role="region" aria-label="Controls">
      <button id="start-button" aria-live="polite" aria-label="Start Radix Sort Animation">Start Animation</button>
      <button id="reset-button" aria-live="polite" aria-label="Reset to initial state" disabled>Reset</button>
    </div>

    <section id="visualizer" aria-live="polite" aria-atomic="true" aria-relevant="additions removals">
      <!-- Bars representing array elements -->
      <div class="bars" id="bars-container" aria-label="Array bars representing numbers to be sorted">
        <!-- Bars dynamically generated -->
      </div>
    </section>

    <section id="buckets-area" aria-label="Buckets for digits 0 through 9">
      <!-- Buckets dynamically generated -->
    </section>

    <div class="footer-text" aria-hidden="true">
      &copy; 2024 &bull; Visualization by AI &bull; Inspired by data structures &amp; algorithms
    </div>
  </main>

<script>
(() => {
  'use strict';

  const ARRAY_LENGTH = 14;
  const MAX_NUMBER = 9999; // Up to 4 digits
  const DIGIT_BASE = 10;
  const ANIMATION_DELAY = 900; // ms between steps

  const barsContainer = document.getElementById('bars-container');
  const bucketsArea = document.getElementById('buckets-area');
  const startBtn = document.getElementById('start-button');
  const resetBtn = document.getElementById('reset-button');

  // Generate distinct pastel-blue tinted colors, avoiding monotony
  function generateBarColor(idx, total) {
    const hue = 200 + (idx / total) * 60; // from blue-ish to cyan-ish
    return `hsl(${hue}, 80%, 65%)`;
  }

  // Create bars representing array elements
  function createBars(arr) {
    barsContainer.innerHTML = '';
    for (let i = 0; i < arr.length; i++) {
      const val = arr[i];
      const bar = document.createElement('div');
      bar.className = 'bar fade-in';
      bar.style.height = `${40 + (val / MAX_NUMBER) * 210}px`; // dynamic height 40-250 px

      bar.style.backgroundColor = generateBarColor(i, arr.length);
      bar.style.boxShadow = `
        0 4px 12px hsla(200, 90%, 65%, 0.85),
        inset 0 -6px 25px hsla(200, 80%, 55%, 0.85)
      `;

      bar.setAttribute('data-index', i);
      bar.setAttribute('tabindex', '-1');

      const heightLabel = document.createElement('div');
      heightLabel.className = 'height-label';
      heightLabel.textContent = val;

      const valueLabel = document.createElement('div');
      valueLabel.className = 'value-label';
      valueLabel.textContent = val;

      bar.appendChild(heightLabel);
      bar.appendChild(valueLabel);
      barsContainer.appendChild(bar);
    }
  }

  // Create buckets 0-9
  function createBuckets() {
    bucketsArea.innerHTML = '';
    for(let i=0; i<10; i++) {
      const bucket = document.createElement('div');
      bucket.className = 'bucket';
      bucket.setAttribute('data-index', i);
      bucket.setAttribute('tabindex', '-1');

      const label = document.createElement('div');
      label.className = 'bucket-label';
      label.textContent = i;

      const bucketBars = document.createElement('div');
      bucketBars.className = 'bucket-bars';

      bucket.appendChild(label);
      bucket.appendChild(bucketBars);

      bucketsArea.appendChild(bucket);
    }
  }

  // Radix Sort utility: get digit at position pos (0 = least significant)
  function digitAt(num, pos) {
    return Math.floor(num / Math.pow(10, pos)) % 10;
  }

  // Sleep using async Promise
  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // Animation and visualization logic
  async function animateRadixSort(arr) {
    startBtn.disabled = true;
    resetBtn.disabled = true;

    const bars = [...barsContainer.children];

    const maxVal = Math.max(...arr);
    const maxDigits = maxVal.toString().length;

    // For visual clarity, mark all bars as default
    bars.forEach(bar => {
      bar.classList.remove('sorted', 'bar-highlight');
      bar.style.transform = 'translateY(0)';
    });

    for (let digitPos = 0; digitPos < maxDigits; digitPos++) {
      // Highlight current digit position
      updateMessage(`Sorting on digit position: ${digitPos + 1}`);

      // Mark buckets active
      highlightActiveBucket(null); // clear active buckets
      clearBucketsBars();

      // Highlight digit in bars & move bars up slightly
      for (let i = 0; i < arr.length; i++) {
        const bar = bars[i];
        bar.dataset.highlight = 'digit';
        // Show digit overlay or color effect?
        // We'll rely on blue highlight and slight raise
      }
      await sleep(ANIMATION_DELAY / 2);

      // Place each bar into corresponding bucket visually
      let buckets = Array.from({ length: 10 }, () => []);
      for (let i = 0; i < arr.length; i++) {
        let digit = digitAt(arr[i], digitPos);
        buckets[digit].push(arr[i]);
      }

      // Animate distributation
      for (let b = 0; b < buckets.length; b++) {
        highlightActiveBucket(b);
        // Remove all "digit" highlight from bars before transfer
        bars.forEach(bar => bar.removeAttribute('data-highlight'));
        await sleep(ANIMATION_DELAY / 3);

        // Remove bars from main display that move into this bucket
        const barsToMove = [];
        for (let i = 0; i < arr.length; i++) {
          let d = digitAt(arr[i], digitPos);
          if (d === b) {
            barsToMove.push({
              value: arr[i],
              idx: i,
              barElem: bars[i]
            });
          }
        }

        // Animate bars moving down from main container into bucket
        for (let bmv of barsToMove) {
          bmv.barElem.dataset.highlight = 'bucket';
        }
        await sleep(ANIMATION_DELAY / 2);

        let bucketElem = bucketsArea.children[b];
        let bucketBars = bucketElem.querySelector('.bucket-bars');

        // Actually move bars DOM nodes into bucket for visual
        for (let bmv of barsToMove) {
          bucketBars.prepend(bmv.barElem);
        }
        await sleep(ANIMATION_DELAY / 2);
      }

      highlightActiveBucket(null);
      clearBarsHighlight();

      // Reassemble array from buckets visually and logically
      let newArr = [];
      let newBars = [];
      for (let i = 0; i < buckets.length; i++) {
        let bucketElem = bucketsArea.children[i];
        let bucketBars = bucketElem.querySelectorAll('.bar');
        for (let b of bucketBars) {
          newArr.push(parseInt(b.querySelector('.value-label').textContent, 10));
          newBars.push(b);
        }
      }

      // Animate bars moving from bucket back to main container
      barsContainer.style.justifyContent = 'center';

      // Delay before moving back
      await sleep(ANIMATION_DELAY / 2);

      for(let b of newBars) {
        barsContainer.appendChild(b);
        b.dataset.highlight = 'digit'; // light highlight while moving back
      }

      // Force update bars array
      bars.length = 0;
      bars.push(...newBars);

      await sleep(ANIMATION_DELAY / 2);
      newBars.forEach(bar => bar.removeAttribute('data-highlight'));

      // Update array reference
      arr = newArr;

      // Small delay before next digit round
      await sleep(ANIMATION_DELAY * 0.7);
    }

    // Mark bars as sorted - luminous green
    bars.forEach(bar => {
      bar.classList.add('sorted');
      bar.removeAttribute('data-highlight');
    });

    updateMessage(`Sorting complete! Array sorted in ascending order.`);
    startBtn.disabled = true;
    resetBtn.disabled = false;

    return arr;
  }

  function updateMessage(msg) {
    startBtn.setAttribute('aria-label', msg);
  }

  function highlightActiveBucket(bucketIndex) {
    for (let i = 0; i < bucketsArea.children.length; i++) {
      const bucket = bucketsArea.children[i];
      if (i === bucketIndex) {
        bucket.setAttribute('data-active', 'true');
      } else {
        bucket.removeAttribute('data-active');
      }
    }
  }

  function clearBucketsBars() {
    for(let i=0; i<bucketsArea.children.length; i++) {
      const bucketBars = bucketsArea.children[i].querySelector('.bucket-bars');
      bucketBars.innerHTML = '';
    }
  }

  function clearBarsHighlight() {
    for(let bar of barsContainer.children) {
      bar.removeAttribute('data-highlight');
    }
  }

  // Initial array and visualization setup
  let array = [];
  function generateRandomArray() {
    array = [];
    const used = new Set();
    while(array.length < ARRAY_LENGTH) {
      let val = Math.floor( Math.random() * (MAX_NUMBER+1) );
      // Enforce uniqueness for aesthetic clarity
      if (!used.has(val)) {
        used.add(val);
        array.push(val);
      }
    }
    return array;
  }

  // Reset visualization to initial state
  function resetVisualization() {
    array = generateRandomArray();
    createBars(array);
    createBuckets();
    updateMessage('Ready to start Radix Sort animation.');
    startBtn.disabled = false;
    resetBtn.disabled = true;
  }

  // Event handlers for buttons
  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    resetBtn.disabled = true;
    await animateRadixSort(array);
  });
  resetBtn.addEventListener('click', () => {
    resetVisualization();
  });

  // On load initialize
  resetVisualization();

})();
</script>
</body>
</html>
