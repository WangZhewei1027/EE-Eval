<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Undirected Graph</title>
    <style>
        /* Minimal CSS: no styling for visual appeal */
        body {
            font-family: Arial, sans-serif;
        }
        #graph {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Interactive Undirected Graph</h1>

    <div>
        <label for="nodeInput">Add Node:</label>
        <input type="text" id="nodeInput" placeholder="Node Name">
        <button id="addNodeBtn">Add Node</button>
        <button id="clearGraphBtn">Clear Graph</button>
    </div>

    <div>
        <label for="edgeInputStart">From:</label>
        <input type="text" id="edgeInputStart" placeholder="Start Node">
        <label for="edgeInputEnd">To:</label>
        <input type="text" id="edgeInputEnd" placeholder="End Node">
        <button id="addEdgeBtn">Add Edge</button>
    </div>

    <div id="graph"></div>

    <script>
        class Graph {
            constructor() {
                this.adjacencyList = {};
            }

            addNode(node) {
                if (!this.adjacencyList[node]) {
                    this.adjacencyList[node] = [];
                }
            }

            addEdge(node1, node2) {
                if (!this.adjacencyList[node1]) {
                    this.addNode(node1);
                }
                if (!this.adjacencyList[node2]) {
                    this.addNode(node2);
                }
                this.adjacencyList[node1].push(node2);
                this.adjacencyList[node2].push(node1);
            }

            clear() {
                this.adjacencyList = {};
            }

            display() {
                const graphDiv = document.getElementById('graph');
                graphDiv.innerHTML = '';
                for (const node in this.adjacencyList) {
                    graphDiv.innerHTML += `${node}: ${this.adjacencyList[node].join(', ')}<br>`;
                }
            }
        }

        const graph = new Graph();

        document.getElementById('addNodeBtn').addEventListener('click', () => {
            const nodeName = document.getElementById('nodeInput').value;
            if (nodeName) {
                graph.addNode(nodeName);
                document.getElementById('nodeInput').value = '';
                graph.display();
            }
        });

        document.getElementById('addEdgeBtn').addEventListener('click', () => {
            const startNode = document.getElementById('edgeInputStart').value;
            const endNode = document.getElementById('edgeInputEnd').value;
            if (startNode && endNode) {
                graph.addEdge(startNode, endNode);
                document.getElementById('edgeInputStart').value = '';
                document.getElementById('edgeInputEnd').value = '';
                graph.display();
            }
        });

        document.getElementById('clearGraphBtn').addEventListener('click', () => {
            graph.clear();
            document.getElementById('graph').innerHTML = '';
        });
    </script>
</body>
</html>
