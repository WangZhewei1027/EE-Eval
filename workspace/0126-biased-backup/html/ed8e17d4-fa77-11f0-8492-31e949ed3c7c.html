<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch and Bound Visualization</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f3f4f6, #e0e7ff);
            color: #333;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #container {
            position: relative;
            width: 80%;
            height: 80%;
            border-radius: 15px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .node {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #4a90e2;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            transition: transform 0.5s ease;
        }

        .active {
            background-color: #e94e77;
            transform: scale(1.1);
        }

        h1 {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        button {
            position: absolute;
            top: 90%;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            background-color: #4a90e2;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #3a7bbf;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Branch and Bound Visualization</h1>
        <button id="startButton">Start Visualization</button>
        <div id="nodes"></div>
    </div>

    <script>
        const container = document.getElementById("nodes");
        const startButton = document.getElementById("startButton");
        const nodeCount = 10;
        let nodes = [];

        function createNodes() {
            for (let i = 0; i < nodeCount; i++) {
                const node = document.createElement("div");
                node.classList.add("node");
                node.innerText = i + 1;
                node.style.left = Math.random() * 90 + "%";
                node.style.top = Math.random() * 90 + "%";
                container.appendChild(node);
                nodes.push(node);
            }
        }

        function activateNodes() {
            nodes.forEach((node, index) => {
                setTimeout(() => {
                    node.classList.add("active");
                    if (index > 0) {
                        nodes[index - 1].classList.remove("active");
                    }
                }, index * 1000);
            });
        }

        startButton.addEventListener("click", () => {
            createNodes();
            activateNodes();
            startButton.style.display = 'none'; // Hide button after start
        });
    </script>
</body>
</html>
