<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim Sort Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <h1>Tim Sort Interactive Demo</h1>
    
    <label for="arrayInput">Enter array (comma separated):</label>
    <input type="text" id="arrayInput" value="5,21,7,1,89,16" />
    <button onclick="initSort()">Initialize Sort</button>
    <br/><br/>
    
    <button onclick="sortArray()">Sort Array</button>
    <button onclick="resetArray()">Reset Array</button>
    <label for="size">Run size:</label>
    <input type="number" id="size" value="5" min="1" />
    <br/><br/>
    
    <h2>Current State:</h2>
    <pre id="currentArray"></pre>
    
    <script>
        let originalArray = [];
        let sortedArray = [];
        let runSize = 5;

        function initSort() {
            originalArray = document.getElementById('arrayInput').value.split(',').map(Number);
            sortedArray = [...originalArray];
            displayCurrent();
        }

        function displayCurrent() {
            document.getElementById('currentArray').innerText = JSON.stringify(sortedArray);
        }

        function insertionSort(arr, left, right) {
            for (let i = left + 1; i <= right; i++) {
                let key = arr[i];
                let j = i - 1;
                while (j >= left && arr[j] > key) {
                    arr[j + 1] = arr[j];
                    j--;
                }
                arr[j + 1] = key;
            }
        }

        function merge(arr, left, mid, right) {
            let leftArray = arr.slice(left, mid + 1);
            let rightArray = arr.slice(mid + 1, right + 1);
            let i = 0, j = 0, k = left;

            while (i < leftArray.length && j < rightArray.length) {
                if (leftArray[i] <= rightArray[j]) {
                    arr[k++] = leftArray[i++];
                } else {
                    arr[k++] = rightArray[j++];
                }
            }
            while (i < leftArray.length) {
                arr[k++] = leftArray[i++];
            }
            while (j < rightArray.length) {
                arr[k++] = rightArray[j++];
            }
        }

        function timSort() {
            for (let start = 0; start < sortedArray.length; start += runSize) {
                let end = Math.min(start + runSize - 1, sortedArray.length - 1);
                insertionSort(sortedArray, start, end);
            }
            for (let size = runSize; size < sortedArray.length; size *= 2) {
                for (let left = 0; left < sortedArray.length; left += 2 * size) {
                    let mid = Math.min(left + size - 1, sortedArray.length - 1);
                    let right = Math.min((left + 2 * size - 1), (sortedArray.length - 1));
                    if (mid < right) {
                        merge(sortedArray, left, mid, right);
                    }
                }
            }
        }

        function sortArray() {
            runSize = parseInt(document.getElementById('size').value);
            timSort();
            displayCurrent();
        }

        function resetArray() {
            document.getElementById('arrayInput').value = originalArray.join(',');
            initSort();
        }
    </script>
</body>
</html>
