<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        input, button, select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <h1>Authentication</h1>
    <form>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Enter your username">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password">
        <button type="button">Login</button>
        <button type="button" id="forgot-password">Forgot Password</button>
        <button type="button" id="create-account">Create Account</button>
        <button type="button" id="register">Register</button>
        <div id="error-message"></div>
    </form>
    <script>
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const forgotPasswordButton = document.getElementById('forgot-password');
        const createAccountButton = document.getElementById('create-account');
        const registerButton = document.getElementById('register');
        const errorMessageElement = document.getElementById('error-message');

        let username = '';
        let password = '';

        let isLogin = false;

        function handleLogin() {
            if (username !== '' && password !== '') {
                // Simulate a login process
                alert('Login successful!');
                isLogin = true;
            } else {
                errorMessageElement.textContent = 'Please enter both username and password.';
            }
        }

        function handleForgotPassword() {
            // Simulate a forgot password process
            alert('Forgot password?');
        }

        function handleCreateAccount() {
            // Simulate a create account process
            alert('Create account?');
        }

        function handleRegister() {
            // Simulate a register process
            alert('Register?');
        }

        let loginButton = document.getElementById('login-button');
        let forgotPasswordButton = document.getElementById('forgot-password-button');
        let createAccountButton = document.getElementById('create-account-button');
        let registerButton = document.getElementById('register-button');

        loginButton.addEventListener('click', () => {
            handleLogin();
        });

        forgotPasswordButton.addEventListener('click', () => {
            handleForgotPassword();
        });

        createAccountButton.addEventListener('click', () => {
            handleCreateAccount();
        });

        registerButton.addEventListener('click', () => {
            handleRegister();
        });

        loginButton.addEventListener('click', () => {
            isLogin = false;
            username = '';
            password = '';
            errorMessageElement.textContent = '';
        });

        forgotPasswordButton.addEventListener('click', () => {
            isLogin = false;
            username = '';
            password = '';
            errorMessageElement.textContent = '';
        });

        createAccountButton.addEventListener('click', () => {
            isLogin = false;
            username = '';
            password = '';
            errorMessageElement.textContent = '';
        });

        registerButton.addEventListener('click', () => {
            isLogin = false;
            username = '';
            password = '';
            errorMessageElement.textContent = '';
        });
    </script>
</body>
</html>
