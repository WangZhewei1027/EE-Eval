<!DOCTYPE html>
<html>
<head>
    <title>Greedy Algorithms Explorer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .panel {
            border: 1px solid #ccc;
            padding: 15px;
        }
        .algorithm-section {
            margin-bottom: 20px;
        }
        button {
            padding: 5px 10px;
            margin: 5px;
        }
        input, select {
            padding: 5px;
            margin: 5px;
        }
        .visualization {
            border: 1px solid #000;
            padding: 10px;
            min-height: 100px;
            font-family: monospace;
            white-space: pre;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .control-group {
            margin-right: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        td, th {
            border: 1px solid #000;
            padding: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Greedy Algorithms Explorer</h1>
        
        <div class="panel">
            <h2>Algorithm Selection</h2>
            <select id="algorithm-selector">
                <option value="coin">Coin Change Problem</option>
                <option value="fractional">Fractional Knapsack</option>
                <option value="activity">Activity Selection</option>
                <option value="huffman">Huffman Coding</option>
            </select>
            <button id="select-algorithm">Load Algorithm</button>
        </div>
        
        <div id="algorithm-container">
            <!-- Algorithm-specific content will be loaded here -->
        </div>
    </div>

    <script>
        // Global state
        let currentAlgorithm = null;
        let algorithmState = {};
        
        // DOM elements
        const algorithmContainer = document.getElementById('algorithm-container');
        const algorithmSelector = document.getElementById('algorithm-selector');
        const selectAlgorithmBtn = document.getElementById('select-algorithm');
        
        // Algorithm templates
        const algorithms = {
            coin: {
                name: "Coin Change Problem",
                description: "Find the minimum number of coins to make a given amount using a greedy approach.",
                init: initCoinChange,
                state: {
                    coins: [25, 10, 5, 1],
                    amount: 63,
                    solution: []
                }
            },
            fractional: {
                name: "Fractional Knapsack",
                description: "Maximize value in a knapsack with limited capacity by taking fractions of items.",
                init: initFractionalKnapsack,
                state: {
                    items: [
                        {weight: 10, value: 60},
                        {weight: 20, value: 100},
                        {weight: 30, value: 120}
                    ],
                    capacity: 50,
                    solution: []
                }
            },
            activity: {
                name: "Activity Selection",
                description: "Select maximum number of non-overlapping activities that can be performed by a single person.",
                init: initActivitySelection,
                state: {
                    activities: [
                        {start: 1, end: 4},
                        {start: 3, end: 5},
                        {start: 0, end: 6},
                        {start: 5, end: 7},
                        {start: 3, end: 9},
                        {start: 5, end: 9},
                        {start: 6, end: 10},
                        {start: 8, end: 11},
                        {start: 8, end: 12},
                        {start: 2, end: 14},
                        {start: 12, end: 16}
                    ],
                    solution: []
                }
            },
            huffman: {
                name: "Huffman Coding",
                description: "Create optimal prefix codes for data compression using character frequencies.",
                init: initHuffmanCoding,
                state: {
                    characters: [
                        {char: 'a', freq: 5},
                        {char: 'b', freq: 9},
                        {char: 'c', freq: 12},
                        {char: 'd', freq: 13},
                        {char: 'e', freq: 16},
                        {char: 'f', freq: 45}
                    ],
                    codes: {}
                }
            }
        };
        
        // Initialize the selected algorithm
        selectAlgorithmBtn.addEventListener('click', () => {
            const selected = algorithmSelector.value;
            currentAlgorithm = algorithms[selected];
            algorithmState = JSON.parse(JSON.stringify(currentAlgorithm.state)); // Deep copy
            currentAlgorithm.init();
        });
        
        // Coin Change Problem
        function initCoinChange() {
            algorithmContainer.innerHTML = `
                <div class="algorithm-section">
                    <h2>${currentAlgorithm.name}</h2>
                    <p>${currentAlgorithm.description}</p>
                    
                    <div class="controls">
                        <div class="control-group">
                            <label>Coin Denominations:</label>
                            <input type="text" id="coin-input" value="${algorithmState.coins.join(', ')}">
                            <button id="update-coins">Update Coins</button>
                        </div>
                        <div class="control-group">
                            <label>Amount:</label>
                            <input type="number" id="amount-input" value="${algorithmState.amount}">
                            <button id="solve-coin">Solve</button>
                        </div>
                    </div>
                    
                    <div class="visualization" id="coin-visualization">
                        ${renderCoinChangeVisualization()}
                    </div>
                    
                    <div>
                        <h3>How it works:</h3>
                        <ol>
                            <li>Sort coins in descending order</li>
                            <li>Take as many as possible of the largest coin first</li>
                            <li>Move to next largest coin and repeat</li>
                            <li>Continue until amount is zero</li>
                        </ol>
                    </div>
                </div>
            `;
            
            document.getElementById('update-coins').addEventListener('click', () => {
                const coinsInput = document.getElementById('coin-input').value;
                algorithmState.coins = coinsInput.split(',').map(coin => parseInt(coin.trim())).filter(coin => !isNaN(coin));
                algorithmState.coins.sort((a, b) => b - a);
                document.getElementById('coin-visualization').innerHTML = renderCoinChangeVisualization();
            });
            
            document.getElementById('solve-coin').addEventListener('click', () => {
                const amount = parseInt(document.getElementById('amount-input').value);
                if (!isNaN(amount)) {
                    algorithmState.amount = amount;
                    solveCoinChange();
                    document.getElementById('coin-visualization').innerHTML = renderCoinChangeVisualization();
                }
            });
        }
        
        function solveCoinChange() {
            let remaining = algorithmState.amount;
            algorithmState.solution = [];
            
            for (const coin of algorithmState.coins) {
                if (remaining <= 0) break;
                const count = Math.floor(remaining / coin);
                if (count > 0) {
                    algorithmState.solution.push({coin, count});
                    remaining -= count * coin;
                }
            }
        }
        
        function renderCoinChangeVisualization() {
            let html = `<h3>Solution for ${algorithmState.amount}:</h3>`;
            
            if (algorithmState.solution.length === 0) {
                html += "<p>Click 'Solve' to find solution</p>";
            } else {
                html += "<table><tr><th>Coin</th><th>Count</th><th>Subtotal</th></tr>";
                let totalCoins = 0;
                
                for (const item of algorithmState.solution) {
                    html += `<tr><td>${item.coin}</td><td>${item.count}</td><td>${item.coin * item.count}</td></tr>`;
                    totalCoins += item.count;
                }
                
                html += `<tr><td><strong>Total</strong></td><td><strong>${totalCoins}</strong></td><td><strong>${algorithmState.amount}</strong></td></tr>`;
                html += "</table>";
            }
            
            return html;
        }
        
        // Fractional Knapsack
        function initFractionalKnapsack() {
            algorithmContainer.innerHTML = `
                <div class="algorithm-section">
                    <h2>${currentAlgorithm.name}</h2>
                    <p>${currentAlgorithm.description}</p>
                    
                    <div class="controls">
                        <div class="control-group">
                            <label>Capacity:</label>
                            <input type="number" id="capacity-input" value="${algorithmState.capacity}">
                            <button id="update-capacity">Update</button>
                        </div>
                        <div class="control-group">
                            <button id="add-item">Add Item</button>
                            <button id="solve-knapsack">Solve</button>
                        </div>
                    </div>
                    
                    <div id="items-container">
                        ${renderKnapsackItems()}
                    </div>
                    
                    <div class="visualization" id="knapsack-visualization">
                        ${renderKnapsackSolution()}
                    </div>
                    
                    <div>
                        <h3>How it works:</h3>
                        <ol>
                            <li>Calculate value/weight ratio for each item</li>
                            <li>Sort items by ratio in descending order</li>
                            <li>Take as much as possible of the highest ratio item</li>
                            <li>Continue with next items until capacity is full</li>
                        </ol>
                    </div>
                </div>
            `;
            
            document.getElementById('update-capacity').addEventListener('click', () => {
                const capacity = parseInt(document.getElementById('capacity-input').value);
                if (!isNaN(capacity)) {
                    algorithmState.capacity = capacity;
                    document.getElementById('knapsack-visualization').innerHTML = renderKnapsackSolution();
                }
            });
            
            document.getElementById('add-item').addEventListener('click', () => {
                const weight = Math.floor(Math.random() * 30) + 5;
                const value = Math.floor(Math.random() * 100) + 20;
                algorithmState.items.push({weight, value});
                document.getElementById('items-container').innerHTML = renderKnapsackItems();
            });
            
            document.getElementById('solve-knapsack').addEventListener('click', () => {
                solveFractionalKnapsack();
                document.getElementById('knapsack-visualization').innerHTML = renderKnapsackSolution();
            });
        }
        
        function solveFractionalKnapsack() {
            // Calculate value per unit weight and sort
            const items = algorithmState.items.map(item => ({
                ...item,
                ratio: item.value / item.weight
            })).sort((a, b) => b.ratio - a.ratio);
            
            let remainingCapacity = algorithmState.capacity;
            algorithmState.solution = [];
            
            for (const item of items) {
                if (remainingCapacity <= 0) break;
                
                const taken = Math.min(item.weight, remainingCapacity);
                const fraction = taken / item.weight;
                const valueTaken = fraction * item.value;
                
                algorithmState.solution.push({
                    weight: item.weight,
                    value: item.value,
                    taken,
                    fraction,
                    valueTaken
                });
                
                remainingCapacity -= taken;
            }
        }
        
        function renderKnapsackItems() {
            let html = "<h3>Items:</h3><table><tr><th>Weight</th><th>Value</th><th>Value/Weight</th></tr>";
            
            for (const item of algorithmState.items) {
                const ratio = (item.value / item.weight).toFixed(2);
                html += `<tr><td>${item.weight}</td><td>${item.value}</td><td>${ratio}</td></tr>`;
            }
            
            html += "</table>";
            return html;
        }
        
        function renderKnapsackSolution() {
            if (algorithmState.solution.length === 0) {
                return "<p>Click 'Solve' to find solution</p>";
            }
            
            let html = "<h3>Solution:</h3><table><tr><th>Weight</th><th>Value</th><th>Fraction Taken</th><th>Value Taken</th></tr>";
            let totalWeight = 0;
            let totalValue = 0;
            
            for (const item of algorithmState.solution) {
                html += `<tr>
                    <td>${item.weight}</td>
                    <td>${item.value}</td>
                    <td>${item.fraction.toFixed(2)}</td>
                    <td>${item.valueTaken.toFixed(2)}</td>
                </tr>`;
                totalWeight += item.taken;
                totalValue += item.valueTaken;
            }
            
            html += `<tr>
                <td><strong>${totalWeight.toFixed(2)}/${algorithmState.capacity}</strong></td>
                <td colspan="3"><strong>Total Value: ${totalValue.toFixed(2)}</strong></td>
            </tr>`;
            html += "</table>";
            
            return html;
        }
        
        // Activity Selection
        function initActivitySelection() {
            algorithmContainer.innerHTML = `
                <div class="algorithm-section">
                    <h2>${currentAlgorithm.name}</h2>
                    <p>${currentAlgorithm.description}</p>
                    
                    <div class="controls">
                        <button id="add-activity">Add Random Activity</button>
                        <button id="solve-activity">Solve</button>
                        <button id="reset-activities">Reset</button>
                    </div>
                    
                    <div id="activities-container">
                        ${renderActivities()}
                    </div>
                    
                    <div class="visualization" id="activity-visualization">
                        ${renderActivitySolution()}
                    </div>
                    
                    <div>
                        <h3>How it works:</h3>
                        <ol>
                            <li>Sort activities by finish time</li>
                            <li>Select first activity</li>
                            <li>For each remaining activity, if it doesn't conflict with last selected, select it</li>
                        </ol>
                    </div>
                </div>
            `;
            
            document.getElementById('add-activity').addEventListener('click', () => {
                const duration = Math.floor(Math.random() * 5) + 1;
                const start = Math.floor(Math.random() * 20);
                algorithmState.activities.push({
                    start,
                    end: start + duration
                });
                document.getElementById('activities-container').innerHTML = renderActivities();
            });
            
            document.getElementById('solve-activity').addEventListener('click', () => {
                solveActivitySelection();
                document.getElementById('activity-visualization').innerHTML = renderActivitySolution();
            });
            
            document.getElementById('reset-activities').addEventListener('click', () => {
                algorithmState.activities = [];
                algorithmState.solution = [];
                document.getElementById('activities-container').innerHTML = renderActivities();
                document.getElementById('activity-visualization').innerHTML = renderActivitySolution();
            });
        }
        
        function solveActivitySelection() {
            // Sort activities by finish time
            const activities = [...algorithmState.activities].sort((a, b) => a.end - b.end);
            
            algorithmState.solution = [];
            let lastFinish = -Infinity;
            
            for (const activity of activities) {
                if (activity.start >= lastFinish) {
                    algorithmState.solution.push(activity);
                    lastFinish = activity.end;
                }
            }
        }
        
        function renderActivities() {
            if (algorithmState.activities.length === 0) {
                return "<p>No activities. Click 'Add Random Activity' to add some.</p>";
            }
            
            let html = "<h3>Activities:</h3><table><tr><th>Start</th><th>End</th></tr>";
            
            for (const activity of algorithmState.activities) {
                html += `<tr><td>${activity.start}</td><td>${activity.end}</td></tr>`;
            }
            
            html += "</table>";
            return html;
        }
        
        function renderActivitySolution() {
            if (algorithmState.solution.length === 0) {
                return "<p>Click 'Solve' to find solution</p>";
            }
            
            let html = "<h3>Selected Activities:</h3><table><tr><th>Start</th><th>End</th></tr>";
            
            for (const activity of algorithmState.solution) {
                html += `<tr><td>${activity.start}</td><td>${activity.end}</td></tr>`;
            }
            
            html += `<tr><td colspan="2"><strong>Total: ${algorithmState.solution.length} activities</strong></td></tr>`;
            html += "</table>";
            
            return html;
        }
        
        // Huffman Coding
        function initHuffmanCoding() {
            algorithmContainer.innerHTML = `
                <div class="algorithm-section">
                    <h2>${currentAlgorithm.name}</h2>
                    <p>${currentAlgorithm.description}</p>
                    
                    <div class="controls">
                        <button id="add-character">Add Random Character</button>
                        <button id="solve-huffman">Generate Codes</button>
                        <button id="reset-huffman">Reset</button>
                    </div>
                    
                    <div id="characters-container">
                        ${renderCharacters()}
                    </div>
                    
                    <div class="visualization" id="huffman-visualization">
                        ${renderHuffmanCodes()}
                    </div>
                    
                    <div>
                        <h3>How it works:</h3>
                        <ol>
                            <li>Create leaf node for each character with frequency</li>
                            <li>While more than one node in queue:
                                <ul>
                                    <li>Remove two nodes with lowest frequency</li>
                                    <li>Create new internal node with these as children</li>
                                    <li>Add new node back to queue</li>
                                </ul>
                            </li>
                            <li>Assign binary codes by traversing the tree</li>
                        </ol>
                    </div>
                </div>
            `;
            
            document.getElementById('add-character').addEventListener('click', () => {
                const char = String.fromCharCode(Math.floor(Math.random() * 26) + 97);
                const freq = Math.floor(Math.random() * 20) + 1;
                algorithmState.characters.push({char, freq});
                document.getElementById('characters-container').innerHTML = renderCharacters();
            });
            
            document.getElementById('solve-huffman').addEventListener('click', () => {
                generateHuffmanCodes();
                document.getElementById('huffman-visualization').innerHTML = renderHuffmanCodes();
            });
            
            document.getElementById('reset-huffman').addEventListener('click', () => {
                algorithmState.characters = [];
                algorithmState.codes = {};
                document.getElementById('characters-container').innerHTML = renderCharacters();
                document.getElementById('huffman-visualization').innerHTML = renderHuffmanCodes();
            });
        }
        
        function generateHuffmanCodes() {
            // Create nodes for each character
            const nodes = algorithmState.characters.map(char => ({
                type: 'leaf',
                char: char.char,
                freq: char.freq
            }));
            
            // Sort nodes by frequency
            nodes.sort((a, b) => a.freq - b.freq);
            
            // Build Huffman tree
            while (nodes.length > 1) {
                const left = nodes.shift();
                const right = nodes.shift();
                
                const newNode = {
                    type: 'node',
                    left,
                    right,
                    freq: left.freq + right.freq
                };
                
                // Insert new node in correct position
                let insertAt = 0;
                while (insertAt < nodes.length && nodes[insertAt].freq < newNode.freq) {
                    insertAt++;
                }
                nodes.splice(insertAt, 0, newNode);
            }
            
            // Generate codes by traversing the tree
            algorithmState.codes = {};
            if (nodes.length > 0) {
                traverseTree(nodes[0], '');
            }
        }
        
        function traverseTree(node, code) {
            if (node.type === 'leaf') {
                algorithmState.codes[node.char] = code || '0'; // Handle single character case
            } else {
                if (node.left) traverseTree(node.left, code + '0');
                if (node.right) traverseTree(node.right, code + '1');
            }
        }
        
        function renderCharacters() {
            if (algorithmState.characters.length === 0) {
                return "<p>No characters. Click 'Add Random Character' to add some.</p>";
            }
            
            let html = "<h3>Characters:</h3><table><tr><th>Character</th><th>Frequency</th></tr>";
            
            for (const char of algorithmState.characters) {
                html += `<tr><td>${char.char}</td><td>${char.freq}</td></tr>`;
            }
            
            html += "</table>";
            return html;
        }
        
        function renderHuffmanCodes() {
            if (Object.keys(algorithmState.codes).length === 0) {
                return "<p>Click 'Generate Codes' to create Huffman codes</p>";
            }
            
            let html = "<h3>Huffman Codes:</h3><table><tr><th>Character</th><th>Code</th><th>Length</th></tr>";
            
            for (const [char, code] of Object.entries(algorithmState.codes)) {
                html += `<tr><td>${char}</td><td>${code}</td><td>${code.length}</td></tr>`;
            }
            
            // Calculate average code length
            let totalFreq = 0;
            let weightedLength = 0;
            
            for (const char of algorithmState.characters) {
                totalFreq += char.freq;
                weightedLength += char.freq * algorithmState.codes[char.char].length;
            }
            
            const avgLength = weightedLength / totalFreq;
            
            html += `<tr><td colspan="3"><strong>Average code length: ${avgLength.toFixed(2)}</strong></td></tr>`;
            html += "</table>";
            
            return html;
        }
        
        // Initialize with first algorithm
        window.addEventListener('load', () => {
            currentAlgorithm = algorithms.coin;
            algorithmState = JSON.parse(JSON.stringify(currentAlgorithm.state));
            currentAlgorithm.init();
        });
    </script>
</body>
</html>
