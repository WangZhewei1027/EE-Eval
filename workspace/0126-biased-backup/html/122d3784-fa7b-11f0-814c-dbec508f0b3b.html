<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTPS Demo</title>
    <style>
        body {
            font-family: monospace;
            background-color: #fff;
            padding: 10px;
            margin: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-bottom: 10px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            height: 30px;
            margin-bottom: 10px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        select {
            width: 100%;
            height: 30px;
            margin-bottom: 10px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            height: 30px;
            background-color: #4CAF50;
            color: #fff;
            padding: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
        .error {
            color: #f44336;
        }
    </style>
</head>
<body>
    <h1>HTTPS Demo</h1>
    <form>
        <label for="server">Server:</label>
        <input type="text" id="server" name="server" value="example.com">
        <br>
        <label for="port">Port:</label>
        <input type="text" id="port" name="port" value="443">
        <br>
        <label for="protocol">Protocol:</label>
        <input type="text" id="protocol" name="protocol" value="https">
        <br>
        <button id="submit">Submit</button>
    </form>
    <p id="error"></p>
    <script>
        const server = document.getElementById('server');
        const port = document.getElementById('port');
        const protocol = document.getElementById('protocol');
        const submitButton = document.getElementById('submit');
        const errorElement = document.getElementById('error');

        submitButton.addEventListener('click', (e) => {
            e.preventDefault();
            const serverValue = server.value;
            const portValue = port.value;
            const protocolValue = protocol.value;

            if (!serverValue || !portValue || !protocolValue) {
                errorElement.textContent = 'Please fill in all fields';
                return;
            }

            fetch(`https://${serverValue}:${portValue}/${protocolValue}/example`, {
                method: 'GET'
            })
            .then((response) => {
                if (response.ok) {
                    console.log('Success!');
                    errorElement.textContent = '';
                } else {
                    console.log('Error:', response.statusText);
                    errorElement.textContent = 'Failed to connect to server';
                }
            })
            .catch((error) => {
                console.log('Error:', error);
                errorElement.textContent = 'Failed to connect to server';
            });
        });
    </script>
</body>
</html>
