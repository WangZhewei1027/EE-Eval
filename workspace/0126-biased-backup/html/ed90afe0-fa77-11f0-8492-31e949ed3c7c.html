<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signatures</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ece9e6, #ffffff);
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            background-color: #fff;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #4C6EF5;
            animation: fadeIn 1.5s ease;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            animation: fadeIn 2s ease;
        }
        button {
            background-color: #4C6EF5;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            animation: fadeIn 2.5s ease;
        }
        button:hover {
            background-color: #3b5bdb;
            transform: scale(1.05);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .graphic {
            margin-top: 20px;
            width: 100%;
            height: auto;
            animation: slideIn 1.5s ease-out;
        }
        @keyframes slideIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Understanding Digital Signatures</h1>
        <p>A digital signature is your electronic fingerprint, ensuring the authenticity and integrity of your documents. It provides assurance about the origin of the data, the identity of the signer, and the data's stability during transmission.</p>
        <button onclick="showMoreInfo()">Learn More</button>
        <img src="https://via.placeholder.com/500x300/4C6EF5/FFFFFF/?text=Digital+Signature+Graphic" alt="Digital Signature Concept" class="graphic" />
    </div>

    <script>
        function showMoreInfo() {
            alert("Digital signatures are crucial for security in online communications. They protect the integrity of your data!");
        }
    </script>
</body>
</html>
