<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Priority Queue Visualization — Elegant Showcase</title>
<style>
  /* Importing a refined serif font for headings and a clean sans-serif for body */
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');

  /* Reset and base */
  * {
    box-sizing: border-box;
  }
  body, html {
    margin: 0; padding: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #1f2937, #111827);
    font-family: 'Inter', sans-serif;
    color: #e0e7ff;
    overflow-x: hidden;
  }

  /* Container */
  .container {
    max-width: 980px;
    margin: 3.5rem auto 5rem;
    padding: 0 2rem;
    text-align: center;
  }

  /* Header */
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 3.5rem;
    letter-spacing: 0.06em;
    margin-bottom: 0.25em;
    color: #a5b4fc;
    text-shadow:
      0 0 6px #818cf8aa,
      0 2px 8px #4338ca88;
  }
  h2 {
    font-weight: 600;
    font-size: 1.25rem;
    color: #c7d2fe;
    margin-bottom: 3rem;
    font-style: italic;
    letter-spacing: 0.01em;
  }

  /* Priority Queue Visualization */

  .pq-container {
    position: relative;
    margin: 0 auto 4rem;
    width: 100%;
    max-width: 880px;
    height: 240px;
    padding: 2rem 1rem;
    background: linear-gradient(120deg, #3730a3, #4f46e5);
    border-radius: 24px;
    box-shadow:
      0 12px 40px #4338ca88,
      inset 0 0 30px #818cf8aa;
  }

  /* Priority queue label - subtle top text */
  .pq-label {
    position: absolute;
    top: 18px;
    left: 2.5rem;
    font-size: 1.1rem;
    font-weight: 600;
    color: #dbeafeee;
    text-shadow: 0 0 7px #c7d2fee0;
    letter-spacing: 0.06em;
  }

  /* The queue "slots" container horizontally aligned */
  .queue-slots {
    height: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 1.05rem;
    perspective: 900px;
  }

  /* Individual slot */
  .slot {
    position: relative;
    width: 75px;
    height: 180px;
    background: linear-gradient(180deg, #312e81, #6366f1);
    border-radius: 16px;
    box-shadow:
      inset 0 7px 10px #a5b4fcaa,
      0 8px 20px #292a73bb;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: visible;
    user-select: none;
    transform-style: preserve-3d;
    transition:
      transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
      box-shadow 0.4s ease;
  }
  .slot:hover {
    transform: translateY(-12px) rotateX(8deg) rotateY(15deg);
    box-shadow:
      0 16px 35px #a5b4fccc,
      inset 0 9px 22px #c7d2feee;
  }
  .slot:nth-child(even) {
    transform-origin: center bottom;
  }
  .slot:nth-child(odd) {
    transform-origin: center bottom;
  }

  /* Priority value bar (height corresponds to priority) */
  .priority-bar {
    margin: 0 auto 1.1rem;
    width: 62px;
    border-radius: 12px;
    background: linear-gradient(145deg, #a5b4fc, #818cf8);
    box-shadow: 0 4px 9px #818cf833;
    transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* The content block with item number & priority on "glass panel" */
  .info-panel {
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    color: #eef2ffee;
    padding: 0.3rem 0.6rem;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    background: rgba(255 255 255 / 0.10);
    box-shadow:
      inset 0 0 7px #c7d2fe55,
      0 0 8px #a5b4fc99;
    user-select: none;
  }
  .info-panel span {
    display: block;
    letter-spacing: 0.04em;
  }
  .info-panel .item-id {
    font-size: 1.3rem;
    font-weight: 700;
    color: #eef2ffdd;
  }

  /* Fade in animation */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(35px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .slot {
    animation: fadeInUp 1s ease forwards;
  }
  .slot:nth-child(1) { animation-delay: 0.1s; }
  .slot:nth-child(2) { animation-delay: 0.15s; }
  .slot:nth-child(3) { animation-delay: 0.2s; }
  .slot:nth-child(4) { animation-delay: 0.25s; }
  .slot:nth-child(5) { animation-delay: 0.3s; }
  .slot:nth-child(6) { animation-delay: 0.35s; }
  .slot:nth-child(7) { animation-delay: 0.4s; }

  /* Controls at bottom */
  .controls {
    margin-top: 3rem;
    display: flex;
    justify-content: center;
    gap: 2rem;
  }
  button {
    padding: 0.8rem 2.5rem;
    border-radius: 30px;
    border: none;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    font-size: 1.05rem;
    cursor: pointer;
    transition:
      background-color 0.3s ease,
      transform 0.2s ease,
      box-shadow 0.3s ease;
    box-shadow:
      0 5px 15px #6366fbbf;
    user-select: none;
  }
  button:focus-visible {
    outline: 3px solid #a5b4fcff;
    outline-offset: 2px;
  }
  button:active {
    transform: scale(0.96);
    box-shadow: 0 3px 8px #4f46e5cc;
  }

  button#enqueue {
    background-color: #6366f1;
    color: #eef2ffee;
    filter: drop-shadow(0 0 4px #818cf8);
  }
  button#enqueue:hover {
    background-color: #818cf8;
    box-shadow: 0 8px 24px #818cfeba;
  }
  button#dequeue {
    background-color: #474973;
    color: #c7d2fecc;
    filter: drop-shadow(0 0 3px #474973aa);
  }
  button#dequeue:hover {
    background-color: #6366f1;
    color: #eef2ffdd;
    box-shadow: 0 8px 20px #6366f1cc;
  }

  /* Footer tiny textual note */
  footer {
    font-size: 0.85rem;
    color: #94a3b8;
    text-align: center;
    margin-bottom: 2rem;
    user-select: none;
    font-style: italic;
  }
  
  /* Tooltip styling for priority explanation */
  .tooltip {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    max-width: 320px;
    font-size: 0.9rem;
    background: #1e40afdd;
    color: #dbeafe;
    border-radius: 16px;
    padding: 1rem 1.3rem;
    backdrop-filter: blur(16px);
    box-shadow: 0 4px 24px #3442bcaa;
    text-align: left;
    line-height: 1.35;
    font-family: 'Inter', sans-serif;
    user-select: none;
    pointer-events: none;
    filter: drop-shadow(0 2px 6px #1e40af99);
  }
  .tooltip strong {
    color: #c7d2fe;
  }
</style>
</head>
<body>
  <main class="container" role="main" aria-label="Priority Queue Demonstration">
    <h1>Priority Queue</h1>
    <h2>An Elegant Visualization of Priority Ordering</h2>

    <section class="pq-container" aria-label="Priority queue visual representation">
      <div class="pq-label">Queue (Highest Priority → Lowest Priority)</div>
      <div class="queue-slots" id="queueSlots" aria-live="polite" aria-relevant="additions removals">
        <!-- Dynamically populated -->
      </div>
    </section>

    <section class="controls" aria-label="Priority queue controls">
      <button id="enqueue" type="button" title="Add new item with random priority to the queue">Enqueue Item</button>
      <button id="dequeue" type="button" title="Remove highest priority item from the queue">Dequeue Item</button>
    </section>
  </main>

  <aside class="tooltip" aria-hidden="true" role="note">
    <strong>Priority Queue Concept:</strong><br />
    Items are ordered by <em>priority</em>. The highest priority elements are served before lower priority ones.<br />
    Here, each block’s height visually encodes its priority level.
  </aside>

<script>
  /*
  Priority Queue Visualization with minimal interactivity:
  - Enqueue: adds an item with random priority (1-9)
  - Dequeue: removes the highest priority item (lowest number)
  */

  const MAX_PRIORITY = 9;
  const MIN_PRIORITY = 1;

  // Container holding queue slots
  const queueSlots = document.getElementById('queueSlots');
  const enqueueBtn = document.getElementById('enqueue');
  const dequeueBtn = document.getElementById('dequeue');

  // Internal queue structure: array of {id:Number, priority:Number}
  // Smaller priority number = higher priority
  let itemIdCounter = 0;
  let priorityQueue = [];

  // Smooth ease function for height scale (for aesthetics)
  function scalePriorityToHeight(priority) {
    // priority from 1 (highest) to 9 (lowest)
    // want taller bar for lower number, max 160px height down to 30px
    return 160 - ((priority - 1) / (MAX_PRIORITY - 1)) * 130;
  }

  // Create HTML element for one queue slot
  function createSlot(item) {
    const slot = document.createElement('article');
    slot.classList.add('slot');
    slot.setAttribute('tabindex', '-1');
    slot.setAttribute('aria-label', `Item ${item.id}, Priority ${item.priority}`);

    const bar = document.createElement('div');
    bar.classList.add('priority-bar');
    bar.style.height = scalePriorityToHeight(item.priority) + 'px';
    bar.style.background = createGradientForPriority(item.priority);

    const infoPanel = document.createElement('div');
    infoPanel.classList.add('info-panel');
    infoPanel.innerHTML = `
      <span class="item-id">#${item.id}</span>
      <span class="item-priority">Priority: ${item.priority}</span>
    `;

    slot.appendChild(bar);
    slot.appendChild(infoPanel);

    return slot;
  }

  // Gradient colors reflecting high to low priority (cool blue → violet → soft purple)
  function createGradientForPriority(priority) {
    const blueStart = [101, 116, 247]; // #6574f7
    const violetMid = [139, 92, 246]; // #8b5cf6
    const purpleEnd = [129, 140, 248]; //" #818cf8"

    // Interpolate color depending on priority range (1-9)
    // Priority 1 → blueStart, Priority 5 → violetMid, Priority 9 → purpleEnd
    let r, g, b;
    if(priority <= 5) {
      const t = (priority - 1) / 4;
      r = lerp(blueStart[0], violetMid[0], t);
      g = lerp(blueStart[1], violetMid[1], t);
      b = lerp(blueStart[2], violetMid[2], t);
    } else {
      const t = (priority - 5) / 4;
      r = lerp(violetMid[0], purpleEnd[0], t);
      g = lerp(violetMid[1], purpleEnd[1], t);
      b = lerp(violetMid[2], purpleEnd[2], t);
    }
    return `linear-gradient(145deg, rgb(${r},${g},${b}) 30%, rgba(${r},${g},${b},0.8) 90%)`;
  }
  // Linear interpolation helper
  function lerp(a,b,t) {
    return Math.round(a + (b - a) * t);
  }

  // Render entire queue UI from priorityQueue array
  function renderQueue() {
    // Clear container
    queueSlots.innerHTML = '';

    // Sort by priority ascending (lowest first)
    priorityQueue.sort((a,b) => a.priority - b.priority || a.id - b.id);

    // For smooth animation & visual spacing, stagger insertions
    priorityQueue.forEach(item => {
      const slot = createSlot(item);
      queueSlots.appendChild(slot);
    });

    // Controls enable: Enqueue always enabled, dequeue enabled if queue not empty
    dequeueBtn.disabled = priorityQueue.length === 0;
  }

  // Enqueue: add new random item with random priority and unique ID
  function enqueueItem() {
    if(priorityQueue.length >= 7) {
      // Limit at 7 for visual clarity
      alert('Maximum of 7 items in queue reached.');
      return;
    }
    itemIdCounter++;
    const randomPriority = randomInt(MIN_PRIORITY, MAX_PRIORITY);
    priorityQueue.push({id: itemIdCounter, priority: randomPriority});
    renderQueue();
  }

  // Dequeue: remove item with highest priority (lowest priority number)
  function dequeueItem() {
    if(priorityQueue.length === 0) return;
    // Find highest priority item (lowest priority value)
    priorityQueue.sort((a,b) => a.priority - b.priority || a.id - b.id);
    priorityQueue.shift();
    renderQueue();
  }

  // Random integer in range [min, max]
  function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  // Initialize with some items for demonstration on load
  function initQueue() {
    priorityQueue = [
      {id: ++itemIdCounter, priority: 2},
      {id: ++itemIdCounter, priority: 4},
      {id: ++itemIdCounter, priority: 1},
      {id: ++itemIdCounter, priority: 7},
      {id: ++itemIdCounter, priority: 3},
      {id: ++itemIdCounter, priority: 6},
    ];
    renderQueue();
  }

  // Event listeners
  enqueueBtn.addEventListener('click', () => {
    enqueueItem();
  });

  dequeueBtn.addEventListener('click', () => {
    dequeueItem();
  });

  // Initialize on page load
  window.addEventListener('load', () => {
    initQueue();
  });
</script>
</body>
</html>
