<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heap Sort Visualization</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #e0f7fa, #80deea);
            font-family: 'Arial', sans-serif;
            color: #333;
            overflow: hidden;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #00796b;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.15);
        }

        #array-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin: 20px 0;
            position: relative;
            height: 300px;
            width: 80%;
            border: 2px solid #004d40;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .bar {
            width: 30px;
            margin: 0 2px;
            background: #ff7043;
            border-radius: 5px 5px 0 0;
            transition: height 0.5s ease, background 0.5s ease;
        }

        .button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background: #00796b;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            outline: none;
        }

        .button:hover {
            background: #004d40;
        }
    </style>
</head>

<body>
    <h1>Heap Sort Visualization</h1>
    <div id="array-container"></div>
    <button class="button" onclick="startHeapSort()">Start Sorting</button>
    <script>
        const arrayContainer = document.getElementById('array-container');
        let array = [10, 30, 50, 20, 40, 70, 60];

        function drawArray() {
            arrayContainer.innerHTML = '';
            array.forEach(value => {
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = `${value * 3}px`; // Scale for better visualization
                arrayContainer.appendChild(bar);
            });
        }

        function heapify(array, n, i) {
            let largest = i;
            const left = 2 * i + 1;
            const right = 2 * i + 2;

            if (left < n && array[left] > array[largest]) {
                largest = left;
            }

            if (right < n && array[right] > array[largest]) {
                largest = right;
            }

            if (largest !== i) {
                [array[i], array[largest]] = [array[largest], array[i]];
                drawArray();
                setTimeout(() => {
                    heapify(array, n, largest);
                }, 500);
            }
        }

        function heapSort() {
            const n = array.length;
            for (let i = Math.floor(n / 2) - 1; i >= 0; i--) {
                heapify(array, n, i);
            }

            for (let i = n - 1; i > 0; i--) {
                [array[0], array[i]] = [array[i], array[0]];
                drawArray();
                setTimeout(() => {
                    heapify(array, i, 0);
                }, 500);
            }
            drawArray();
        }

        function startHeapSort() {
            drawArray();
            heapSort();
        }
    </script>
</body>

</html>
