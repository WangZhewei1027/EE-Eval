<!DOCTYPE html>
<html>
<head>
    <title>Topological Sort Interactive Demo</title>
    <style>
        body {
            font-family: Arial, margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .graph-container {
            display: flex;
            gap: 50px;
        }
        .graph-display {
            border: 1px solid #000;
            padding: 10px;
            min-height: 300px;
            min-width: 300px;
        }
        .result-display {
            border: 1px solid #000;
            padding: 10px;
            min-height: 300px;
            min-width: 200px;
        }
        .node {
            cursor: pointer;
            margin: 5px;
            padding: 5px;
            border: 1px solid #000;
            display: inline-block;
        }
        .edge {
            margin-left: 10px;
            color: #555;
        }
        .step {
            margin: 5px 0;
            padding: 5px;
            border-bottom: 1px solid #eee;
        }
        button {
            padding: 5px 10px;
        }
        input {
            padding: 5px;
        }
        textarea {
            width: 100%;
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Topological Sort Interactive Demo</h1>
        
        <div class="control-panel">
            <div>
                <h3>Graph Input</h3>
                <textarea id="graphInput">A: b,c
B: c,d
C: e
D: 
E: d</textarea>
                <button id="parseGraph">Parse Graph</button>
            </div>
            
            <div>
                <h3>Manual Node Control</h3>
                <input type="text" id="newNode" placeholder="Node name">
                <button id="addNode">Add Node</button>
                <div>
                    <input type="text" id="edgeFrom" placeholder="From" size="5">
                    →
                    <input type="text" id="edgeTo" placeholder="To" size="5">
                    <button id="addEdge">Add Edge</button>
                </div>
                <button id="removeSelected">Remove Selected</button>
            </div>
            
            <div>
                <h3>Algorithm Control</h3>
                <button id="startSort">Start Sort</button>
                <button id="nextStep">Next Step</button>
                <button id="autoStep">Auto Step</button>
                <button id="reset">Reset</button>
                <div>
                    Speed: 
                    <input type="range" id="speed" min="100" max="2000" value="500">
                </div>
            </div>
            
            <div>
                <h3>Preset Graphs</h3>
                <button id="presetDAG">DAG Example</button>
                <button id="presetCycle">Cycle Example</button>
                <button id="presetLarge">Large Example</button>
            </div>
        </div>
        
        <div class="graph-container">
            <div class="graph-display" id="graphDisplay">
                <h3>Graph Visualization</h3>
                <div id="nodesContainer"></div>
            </div>
            
            <div class="result-display">
                <h3>Topological Order</h3>
                <div id="sortedNodes"></div>
                <h3>Algorithm Steps</h3>
                <div id="algorithmSteps"></div>
            </div>
        </div>
    </div>

    <script>
        // Graph data structure
        let graph = {
            nodes: new Set(),
            edges: new Map()
        };
        
        // Algorithm state
        let algorithmState = {
            inProgress: false,
            currentStep: 0,
            steps: [],
            visited: new Set(),
            tempVisited: new Set(),
            sorted: [],
            processing: null,
            autoInterval: null,
            speed: 500
        };
        
        // DOM elements
        const graphInput = document.getElementById('graphInput');
        const parseGraph = document.getElementById('parseGraph');
        const newNode = document.getElementById('newNode');
        const addNode = document.getElementById('addNode');
        const edgeFrom = document.getElementById('edgeFrom');
        const edgeTo = document.getElementById('edgeTo');
        const addEdge = document.getElementById('addEdge');
        const removeSelected = document.getElementById('removeSelected');
        const startSort = document.getElementById('startSort');
        const nextStep = document.getElementById('nextStep');
        const autoStep = document.getElementById('autoStep');
        const reset = document.getElementById('reset');
        const speed = document.getElementById('speed');
        const presetDAG = document.getElementById('presetDAG');
        const presetCycle = document.getElementById('presetCycle');
        const presetLarge = document.getElementById('presetLarge');
        const nodesContainer = document.getElementById('nodesContainer');
        const sortedNodes = document.getElementById('sortedNodes');
        const algorithmSteps = document.getElementById('algorithmSteps');
        
        // Initialize
        init();
        
        function init() {
            parseGraph.addEventListener('click', parseGraphInput);
            addNode.addEventListener('click', addNewNode);
            addEdge.addEventListener('click', addNewEdge);
            removeSelected.addEventListener('click', removeSelectedNodes);
            startSort.addEventListener('click', startTopologicalSort);
            nextStep.addEventListener('click', performNextStep);
            autoStep.addEventListener('click', toggleAutoStep);
            reset.addEventListener('click', resetAlgorithm);
            speed.addEventListener('input', updateSpeed);
            presetDAG.addEventListener('click', () => loadPreset('dag'));
            presetCycle.addEventListener('click', () => loadPreset('cycle'));
            presetLarge.addEventListener('click', () => loadPreset('large'));
            
            renderGraph();
        }
        
        function parseGraphInput() {
            const input = graphInput.value.trim();
            const lines = input.split('\n');
            
            graph.nodes.clear();
            graph.edges.clear();
            
            lines.forEach(line => {
                const parts = line.split(':');
                if (parts.length < 1) return;
                
                const node = parts[0].trim();
                if (!node) return;
                
                graph.nodes.add(node);
                
                if (parts.length > 1) {
                    const edges = parts[1].split(',').map(e => e.trim()).filter(e => e);
                    graph.edges.set(node, new Set(edges));
                } else {
                    graph.edges.set(node, new Set());
                }
            });
            
            renderGraph();
        }
        
        function addNewNode() {
            const node = newNode.value.trim();
            if (!node) return;
            
            graph.nodes.add(node);
            if (!graph.edges.has(node)) {
                graph.edges.set(node, new Set());
            }
            
            newNode.value = '';
            renderGraph();
        }
        
        function addNewEdge() {
            const from = edgeFrom.value.trim();
            const to = edgeTo.value.trim();
            
            if (!from || !to || !graph.nodes.has(from) || !graph.nodes.has(to)) {
                alert('Invalid edge. Both nodes must exist.');
                return;
            }
            
            if (!graph.edges.has(from)) {
                graph.edges.set(from, new Set());
            }
            
            graph.edges.get(from).add(to);
            
            edgeFrom.value = '';
            edgeTo.value = '';
            renderGraph();
        }
        
        function removeSelectedNodes() {
            const selected = document.querySelectorAll('.node.selected');
            selected.forEach(nodeEl => {
                const node = nodeEl.getAttribute('data-node');
                graph.nodes.delete(node);
                graph.edges.delete(node);
                
                // Remove any edges pointing to this node
                for (const [from, edges] of graph.edges) {
                    if (edges.has(node)) {
                        edges.delete(node);
                    }
                }
            });
            
            renderGraph();
        }
        
        function renderGraph() {
            nodesContainer.innerHTML = '';
            
            graph.nodes.forEach(node => {
                const nodeEl = document.createElement('div');
                nodeEl.className = 'node';
                nodeEl.setAttribute('data-node', node);
                nodeEl.textContent = node;
                
                nodeEl.addEventListener('click', () => {
                    nodeEl.classList.toggle('selected');
                });
                
                nodesContainer.appendChild(nodeEl);
                
                const edges
                const edges = graph.edges.get(node) || new Set();
                if (edges.size > 0) {
                    const edgeList = document.createElement('div');
                    edgeList.className = 'edge';
                    edgeList.textContent = `→ ${Array.from(edges).join(', ')}`;
                    nodeEl.appendChild(edgeList);
                }
            });
        }
        
        function startTopologicalSort() {
            if (algorithmState.inProgress) return;
            
            algorithmState.inProgress = true;
            algorithmState.currentStep = 0;
            algorithmState.steps = [];
            algorithmState.visited = new Set();
            algorithmState.tempVisited = new Set();
            algorithmState.sorted = [];
            algorithmState.processing = null;
            
            // Perform the sort
            let hasCycle = false;
            
            for (const node of graph.nodes) {
                if (!algorithmState.visited.has(node)) {
                    if (!visit(node)) {
                        hasCycle = true;
                        break;
                    }
                }
            }
            
            if (hasCycle) {
                algorithmState.steps.push({
                    action: 'cycle',
                    message: 'Cycle detected! Graph is not a DAG.'
                });
            } else {
                algorithmState.steps.push({
                    action: 'complete',
                    message: 'Topological sort completed successfully!'
                });
            }
            
            updateAlgorithmDisplay();
            startSort.disabled = true;
            nextStep.disabled = false;
        }
        
        function visit(node) {
            if (algorithmState.tempVisited.has(node)) {
                return false; // Cycle detected
            }
            
            if (algorithmState.visited.has(node)) {
                return true;
            }
            
            algorithmState.tempVisited.add(node);
            algorithmState.steps.push({
                action: 'visit',
                node: node,
                message: `Visiting node ${node}`
            });
            
            algorithmState.processing = node;
            
            const edges = graph.edges.get(node) || new Set();
            for (const neighbor of edges) {
                algorithmState.steps.push({
                    action: 'check-edge',
                    from: node,
                    to: neighbor,
                    message: `Checking edge ${node} → ${neighbor}`
                });
                
                if (!visit(neighbor)) {
                    return false;
                }
            }
            
            algorithmState.tempVisited.delete(node);
            algorithmState.visited.add(node);
            algorithmState.sorted.unshift(node);
            
            algorithmState.steps.push({
                action: 'add-to-sorted',
                node: node,
                message: `Added ${node} to sorted list`
            });
            
            algorithmState.processing = null;
            return true;
        }
        
        function performNextStep() {
            if (!algorithmState.inProgress || algorithmState.currentStep >= algorithmState.steps.length) {
                return;
            }
            
            const step = algorithmState.steps[algorithmState.currentStep];
            algorithmState.currentStep++;
            
            updateAlgorithmDisplay(step);
            
            if (algorithmState.currentStep >= algorithmState.steps.length) {
                nextStep.disabled = true;
            }
        }
        
        function toggleAutoStep() {
            if (algorithmState.autoInterval) {
                clearInterval(algorithmState.autoInterval);
                algorithmState.autoInterval = null;
                autoStep.textContent = 'Auto Step';
                nextStep.disabled = false;
            } else {
                if (!algorithmState.inProgress) {
                    startTopologicalSort();
                }
                
                autoStep.textContent = 'Stop Auto';
                nextStep.disabled = true;
                algorithmState.autoInterval = setInterval(() => {
                    if (algorithmState.currentStep >= algorithmState.steps.length) {
                        clearInterval(algorithmState.autoInterval);
                        algorithmState.autoInterval = null;
                        autoStep.textContent = 'Auto Step';
                        nextStep.disabled = false;
                        return;
                    }
                    performNextStep();
                }, algorithmState.speed);
            }
        }
        
        function updateAlgorithmDisplay(step) {
            // Update sorted nodes display
            sortedNodes.innerHTML = '';
            algorithmState.sorted.forEach(node => {
                const nodeEl = document.createElement('div');
                nodeEl.className = 'step';
                nodeEl.textContent = node;
                sortedNodes.appendChild(nodeEl);
            });
            
            // Update algorithm steps
            algorithmSteps.innerHTML = '';
            for (let i = 0; i < algorithmState.currentStep; i++) {
                const s = algorithmState.steps[i];
                const stepEl = document.createElement('div');
                stepEl.className = 'step';
                
                if (s.action === 'cycle') {
                    stepEl.textContent = '✗ ' + s.message;
                    stepEl.style.color = 'red';
                } else if (s.action === 'complete') {
                    stepEl.textContent = '✓ ' + s.message;
                    stepEl.style.color = 'green';
                } else {
                    stepEl.textContent = s.message;
                }
                
                algorithmSteps.appendChild(stepEl);
            }
            
            // Highlight current processing node
            document.querySelectorAll('.node').forEach(nodeEl => {
                nodeEl.classList.remove('processing');
                const node = nodeEl.getAttribute('data-node');
                
                if (step && step.node === node) {
                    if (step.action === 'visit') {
                        nodeEl.classList.add('processing');
                    }
                }
            });
        }
        
        function resetAlgorithm() {
            if (algorithmState.autoInterval) {
                clearInterval(algorithmState.autoInterval);
                algorithmState.autoInterval = null;
                autoStep.textContent = 'Auto Step';
            }
            
            algorithmState.inProgress = false;
            algorithmState.currentStep = 0;
            algorithmState.steps = [];
            algorithmState.visited = new Set();
            algorithmState.tempVisited = new Set();
            algorithmState.sorted = [];
            algorithmState.processing = null;
            
            sortedNodes.innerHTML = '';
            algorithmSteps.innerHTML = '';
            
            document.querySelectorAll('.node').forEach(nodeEl => {
                nodeEl.classList.remove('processing');
            });
            
            startSort.disabled = false;
            nextStep.disabled = false;
        }
        
        function updateSpeed() {
            algorithmState.speed = 2100 - speed.value; // Invert so higher value = faster
            
            if (algorithmState.autoInterval) {
                clearInterval(algorithmState.autoInterval);
                algorithmState.autoInterval = setInterval(() => {
                    if (algorithmState.currentStep >= algorithmState.steps.length) {
                        clearInterval(algorithmState.autoInterval);
                        algorithmState.autoInterval = null;
                        autoStep.textContent = 'Auto Step';
                        nextStep.disabled = false;
                        return;
                    }
                    performNextStep();
                }, algorithmState.speed);
            }
        }
        
        function loadPreset(type) {
            let preset = '';
            
            switch (type) {
                case 'dag':
                    preset = `A: b,c
B: c,d
C: e
D: 
E: d`;
                    break;
                case 'cycle':
                    preset = `A: b
B: c
C: a`;
                    break;
                case 'large':
                    preset = `Task1: Task2,Task3
Task2: Task4,Task5
Task3: Task5,Task6
Task4: Task7
Task5: Task7,Task8
Task6: Task8
Task7: Task9
Task8: Task9
Task9: `;
                    break;
            }
            
            graphInput.value = preset;
            parseGraphInput();
        }
    </script>
</body>
</html>
