<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thread</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
        }
        #thread {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        #controls {
            margin-bottom: 20px;
        }
        #controls button {
            margin-right: 10px;
        }
        #controls input {
            padding: 10px;
            width: 20%;
        }
        #controls select {
            padding: 10px;
            width: 20%;
        }
    </style>
</head>
<body>

<h1>Thread</h1>

<div id="thread"></div>
<div id="controls">
    <button id="create-thread-btn">Create Thread</button>
    <button id="edit-thread-btn">Edit Thread</button>
    <input id="thread-title-input" type="text" placeholder="Thread Title">
    <input id="thread-description-input" type="text" placeholder="Thread Description">
    <button id="add-thread-btn">Add Thread</button>
    <button id="delete-thread-btn">Delete Thread</button>
</div>

<script>
    let currentThread = null;
    let currentThreadId = null;
    let threads = [];

    // Create thread function
    function createThread(title, description) {
        const thread = {
            id: currentThreadId,
            title: title,
            description: description,
            replies: []
        };
        threads.push(thread);
        updateThreadUI(thread);
        updateThreadUI(currentThread);
        currentThreadId++;
    }

    // Edit thread function
    function editThread(id, title, description) {
        const thread = threads.find(t => t.id === id);
        thread.title = title;
        thread.description = description;
        updateThreadUI(thread);
        updateThreadUI(currentThread);
    }

    // Add thread function
    function addThread() {
        const threadTitle = document.getElementById('thread-title-input').value;
        const threadDescription = document.getElementById('thread-description-input').value;
        createThread(threadTitle, threadDescription);
    }

    // Delete thread function
    function deleteThread(id) {
        threads = threads.filter(t => t.id !== id);
        updateThreadUI(currentThread);
    }

    // Update thread UI function
    function updateThreadUI(thread) {
        document.getElementById('thread-title-input').value = thread.title;
        document.getElementById('thread-description-input').value = thread.description;
        if (thread.replies.length > 0) {
            thread.replies.forEach(reply => {
                const replyButton = document.createElement('button');
                replyButton.textContent = `Reply ${thread.replies.length}`;
                replyButton.onclick = () => {
                    const reply = {
                        id: thread.id,
                        content: replyButton.textContent,
                        replies: thread.replies
                    };
                    addReply(reply);
                };
                document.getElementById('controls').appendChild(replyButton);
            });
        }
    }

    // Add reply function
    function addReply(reply) {
        const replyButton = document.createElement('button');
        replyButton.textContent = reply.content;
        replyButton.onclick = () => {
            const reply = {
                id: reply.id,
                content: replyButton.textContent,
                replies: reply.replies
            };
            thread.replies.push(reply);
            updateThreadUI(reply);
            updateThreadUI(thread);
        };
        document.getElementById('controls').appendChild(replyButton);
    }

    // Initialize threads
    if (threads.length > 0) {
        const thread = threads[0];
        updateThreadUI(thread);
    }

    // Add event listeners
    document.getElementById('create-thread-btn').addEventListener('click', createThread);
    document.getElementById('edit-thread-btn').addEventListener('click', editThread);
    document.getElementById('add-thread-btn').addEventListener('click', addThread);
    document.getElementById('delete-thread-btn').addEventListener('click', deleteThread);
</script>

</body>
</html>
