<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Heap Sort Visualization — Elegant Algorithm Art</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap');

  /* Root & Reset */
  *, *::before, *::after {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #232526, #1c1c1c);
    color: #f0f0f7;
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: start;
    padding: 2rem 1rem 4rem;
    user-select: none;
  }

  h1 {
    font-weight: 600;
    font-size: 2.75rem;
    letter-spacing: 0.15em;
    margin-bottom: 0.1em;
    color: #e0e8ff;
    text-shadow:
      0 0 8px #5060ff88,
      0 0 20px #3f4cffcc,
      0 0 30px #3049d6cc;
  }
  h2 {
    margin: 0 0 2rem 0;
    font-weight: 300;
    font-size: 1.125rem;
    color: #bbc9ffcc;
    letter-spacing: 0.06em;
  }

  /* Container for heap & array */
  #visualizer {
    position: relative;
    width: 100%;
    max-width: 900px;
    min-height: 420px;
    margin: 0 auto 2.5rem auto;
    background: linear-gradient(145deg, #1e2233, #151820);
    border-radius: 2rem;
    box-shadow:
      inset 0 0 60px 2px #3f4cff88,
      0 12px 30px rgba(56, 80, 255, 0.3);
    padding: 2rem 3rem 3rem 3rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
  }

  /* Heap Binary Tree Canvas (SVG) */
  svg#heapTree {
    width: 100%;
    max-width: 900px;
    height: 280px;
    overflow: visible;
    filter: drop-shadow(0 0 6px #4a5affcc);
  }

  /* Nodes styling */
  circle.node {
    fill: #3b46e6;
    filter:
      drop-shadow(0 0 3px #7189ffcc);
    transition: fill 0.4s ease, transform 0.5s ease;
    cursor: default;
  }
  circle.node.highlighted {
    fill: #ffc857;
    filter:
      drop-shadow(0 0 15px #ffc857dd);
    transform: scale(1.2);
    transition: fill 0.3s ease, transform 0.3s ease;
    z-index: 10;
  }

  text.node-label {
    fill: #e0e8ffee;
    font-weight: 600;
    font-size: 1.1rem;
    text-shadow:
      0 0 2px #203dbfdd;
    pointer-events: none;
    user-select: none;
    transition: fill 0.3s ease;
  }
  text.node-label.highlighted {
    fill: #301a00ee;
    filter: drop-shadow(0 0 6px #f9c346cc);
  }

  /* Edges styling */
  line.edge {
    stroke: #6789ffcc;
    stroke-width: 3px;
    filter: drop-shadow(0 0 2px #3f4cffaa);
    transition: stroke 0.4s ease;
  }
  line.edge.highlighted {
    stroke: #ffc857;
    stroke-width: 5px;
    filter: drop-shadow(0 0 12px #ffc857bb);
    transition: stroke 0.3s ease;
  }

  /* Array display */
  #arrayContainer {
    margin-top: 1.8rem;
    width: 100%;
    max-width: 900px;
    display: flex;
    justify-content: center;
    gap: 0.9rem;
    flex-wrap: wrap;
    user-select: none;
  }

  .array-bar {
    background: linear-gradient(145deg, #5562f0, #414df0);
    width: 36px;
    height: 80px;
    border-radius: 0.7rem;
    box-shadow:
      inset 0 0 6px #2933bfcc,
      0 6px 8px rgba(87, 97, 252, 0.8);
    font-weight: 700;
    font-size: 1.05rem;
    color: #e0e8ffdd;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 0.7rem;
    position: relative;
    transition:
      background 0.35s ease,
      box-shadow 0.35s ease,
      height 0.7s cubic-bezier(0.4,0,0.2,1),
      transform 0.5s ease;
    cursor: default;
  }
  .array-bar.highlighted {
    background: linear-gradient(145deg, #ffbf56, #ffb33e);
    box-shadow:
      inset 0 0 14px #e67e22cc,
      0 10px 12px #f0911fbb;
    color: #301a00ee;
    height: 96px;
    transform: scale(1.05);
    transition:
      background 0.3s ease,
      box-shadow 0.3s ease,
      height 0.6s ease,
      transform 0.4s ease;
    z-index: 10;
  }
  .array-bar::after {
    content: attr(data-index);
    position: absolute;
    bottom: -22px;
    font-size: 0.7rem;
    color: #9abaffcc;
    font-weight: 400;
    letter-spacing: 0.04em;
  }

  /* Controls Panel */
  #controls {
    width: 100%;
    max-width: 900px;
    display: flex;
    justify-content: center;
    gap: 2rem;
  }
  button.control-btn {
    border: none;
    border-radius: 2rem;
    padding: 0.6rem 2.4rem;
    font-size: 1.1rem;
    font-weight: 600;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(145deg, #3f4cff, #5364f5);
    color: #e0e8ff;
    cursor: pointer;
    box-shadow:
      0 4px 8px rgba(80, 96, 255, 0.6);
    transition: background 0.3s ease, box-shadow 0.3s ease, transform 0.15s ease;
    user-select: none;
  }
  button.control-btn:active {
    transform: scale(0.95);
  }
  button.control-btn:disabled {
    background: #27308b;
    box-shadow: none;
    cursor: default;
    color: #9abaffaa;
  }

  /* Footer Text */
  footer {
    margin-top: 3rem;
    font-weight: 300;
    font-size: 0.9rem;
    color: #7986ffb2;
    letter-spacing: 0.1em;
  }

  /* Tooltip for nodes */
  .tooltip {
    position: absolute;
    pointer-events: none;
    background: #3546a3cc;
    color: #e0e8ffdd;
    padding: 0.3rem 0.7rem;
    border-radius: 0.5rem;
    font-weight: 500;
    font-size: 0.9rem;
    white-space: nowrap;
    text-shadow: 0 0 5px #283ec8aa;
    user-select: none;
    opacity: 0;
    transition: opacity 0.25s ease;
    z-index: 50;
  }
  .tooltip.visible {
    opacity: 1;
  }
</style>
</head>
<body>

<h1>HEAP SORT</h1>
<h2>An elegant in-place comparison sorting algorithm</h2>

<div id="visualizer" aria-label="Heap Sort Visualization">
  <svg id="heapTree" aria-hidden="true" focusable="false"></svg>
  <div id="arrayContainer" aria-label="Array elements visualization"></div>
</div>

<div id="controls" aria-label="Heap Sort Controls">
  <button id="startBtn" class="control-btn" aria-pressed="false" aria-label="Start Heap Sort Animation">Start</button>
  <button id="resetBtn" class="control-btn" aria-label="Reset Visualization">Reset</button>
</div>

<footer>Visualizing data structure meets art &amp; science — &copy; 2024</footer>

<script>
(() => {
  const svgNS = "http://www.w3.org/2000/svg";

  // Data Initialization
  let array = [];
  const maxElements = 15;
  const minValue = 10;
  const maxValue = 99;

  // Visual & DOM Elements
  const heapTreeSVG = document.getElementById('heapTree');
  const arrayContainer = document.getElementById('arrayContainer');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');

  // Animation & State
  let animations = [];
  let animationIndex = 0;
  let animationRunning = false;

  // Visual parameters for tree layout
  const levelHeight = 70;
  const nodeRadius = 22;
  const svgWidth = 900;  // match CSS max-width approx
  const marginX = 60;

  // Tooltip for nodes
  const tooltip = document.createElement('div');
  tooltip.className = 'tooltip';
  document.body.appendChild(tooltip);

  // Generate a random array with unique values between min and max
  function generateRandomArray(size, min, max) {
    const set = new Set();
    while (set.size < size) {
      set.add(Math.floor(Math.random() * (max - min + 1)) + min);
    }
    return Array.from(set);
  }

  // Clear the SVG
  function clearSVG() {
    while (heapTreeSVG.firstChild) {
      heapTreeSVG.removeChild(heapTreeSVG.firstChild);
    }
  }

  // Positions of nodes in SVG for given index
  function getNodePosition(i, n = array.length) {
    if(i < 0 || i >= n) return {x: 0, y: 0};
    const level = Math.floor(Math.log2(i + 1));
    const maxNodesAtLevel = 2 ** level;
    const indexAtLevel = i + 1 - maxNodesAtLevel;

    const levelWidth = svgWidth - 2 * marginX;
    const spacing = levelWidth / maxNodesAtLevel;
    const x = marginX + spacing * (indexAtLevel + 0.5);
    const y = levelHeight * level + nodeRadius + 8;
    return {x, y};
  }

  // Draw edges of the binary heap tree
  function drawEdges() {
    clearEdges();
    for(let i = 0; i < array.length; i++) {
      const leftChild = 2 * i + 1;
      const rightChild = 2 * i + 2;
      const posParent = getNodePosition(i);
      if(leftChild < array.length) {
        const posLeft = getNodePosition(leftChild);
        drawEdge(posParent, posLeft, i, leftChild);
      }
      if(rightChild < array.length) {
        const posRight = getNodePosition(rightChild);
        drawEdge(posParent, posRight, i, rightChild);
      }
    }
  }

  // Draw an edge line between two points with data attributes
  function drawEdge(p1, p2, parentIdx, childIdx) {
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', p1.x);
    line.setAttribute('y1', p1.y);
    line.setAttribute('x2', p2.x);
    line.setAttribute('y2', p2.y);
    line.classList.add('edge');
    line.dataset.parent = parentIdx;
    line.dataset.child = childIdx;
    heapTreeSVG.appendChild(line);
  }

  // Clear only edges
  function clearEdges() {
    [...heapTreeSVG.querySelectorAll('line.edge')].forEach(e => e.remove());
  }

  // Draw nodes circles and their labels
  function drawNodes() {
    clearCircles();
    for(let i=0; i<array.length; i++) {
      const {x, y} = getNodePosition(i);
      // circle
      const circle = document.createElementNS(svgNS, 'circle');
      circle.setAttribute('cx', x);
      circle.setAttribute('cy', y);
      circle.setAttribute('r', nodeRadius);
      circle.classList.add('node');
      circle.dataset.index = i;
      circle.dataset.value = array[i];
      // label
      const label = document.createElementNS(svgNS, 'text');
      label.setAttribute('x', x);
      label.setAttribute('y', y + 6);
      label.setAttribute('text-anchor', 'middle');
      label.classList.add('node-label');
      label.textContent = array[i];
      label.dataset.index = i;

      heapTreeSVG.appendChild(circle);
      heapTreeSVG.appendChild(label);
    }
  }

  // Clear only nodes
  function clearCircles() {
    [...heapTreeSVG.querySelectorAll('circle.node, text.node-label')].forEach(e => e.remove());
  }

  // Draw the entire tree anew
  function drawTree() {
    clearSVG();
    drawEdges();
    drawNodes();
  }

  // Draw array bars below the tree
  function drawArray() {
    arrayContainer.innerHTML = '';
    array.forEach((v, i) => {
      const bar = document.createElement('div');
      bar.classList.add('array-bar');
      bar.style.height = `${v * 1.4 + 12}px`; // scaled height
      bar.textContent = v;
      bar.dataset.index = i;
      arrayContainer.appendChild(bar);
    });
  }

  // Highlight node and corresponding array bar
  function highlight(index, type = 'heap') {
    clearHighlights();
    if(index == null) return;
    if(type === 'heap') {
      const circles = heapTreeSVG.querySelectorAll('circle.node');
      const labels = heapTreeSVG.querySelectorAll('text.node-label');
      const nodeCircle = [...circles].find(c => +c.dataset.index === index);
      const nodeLabel = [...labels].find(l => +l.dataset.index === index);
      if(nodeCircle) nodeCircle.classList.add('highlighted');
      if(nodeLabel) nodeLabel.classList.add('highlighted');
    }
    if(type === 'array') {
      const bars = arrayContainer.querySelectorAll('.array-bar');
      if(bars[index]) bars[index].classList.add('highlighted');
    }
  }
  // Clear all highlights
  function clearHighlights() {
    heapTreeSVG.querySelectorAll('.highlighted').forEach(el => el.classList.remove('highlighted'));
    arrayContainer.querySelectorAll('.highlighted').forEach(el => el.classList.remove('highlighted'));
  }

  // Show a smooth swap animation between two nodes and bars
  function swap(index1, index2) {
    // Swap in data representation
    [array[index1], array[index2]] = [array[index2], array[index1]];

    // Animate array bars
    const bars = arrayContainer.querySelectorAll('.array-bar');
    const bar1 = bars[index1];
    const bar2 = bars[index2];

    // Animate tree nodes and edge labels on next redraw
  }

  // Heap Sort Algorithm with step recording (Heapify, Swap, etc)
  // Generate a sequence of animation steps to play

  // Animation step types:
  // 'highlight' : {indices: [i,j,...], type: 'heap'|'array'}
  // 'swap'      : {indices: [i,j]}
  // 'unhighlight' : no data

  function heapSortSteps(arr) {
    const steps = [];
    const n = arr.length;
    const arrayCopy = arr.slice();

    function swapInArr(i, j) {
      [arrayCopy[i], arrayCopy[j]] = [arrayCopy[j], arrayCopy[i]];
      steps.push({action: 'swap', indices:[i,j]});
    }

    // maxHeapify downwards from i to n
    function heapify(n, i) {
      let largest = i;
      let l = 2 * i + 1;
      let r = 2 * i + 2;

      steps.push({action:'highlight', indices:[i], type:'heap'});
      if(l < n) steps.push({action:'highlight', indices:[l], type:'heap'});
      if(r < n) steps.push({action:'highlight', indices:[r], type:'heap'});

      if(l < n && arrayCopy[l] > arrayCopy[largest]) largest = l;
      if(r < n && arrayCopy[r] > arrayCopy[largest]) largest = r;
      
      if(largest !== i) {
        swapInArr(i, largest);
        steps.push({action:'unhighlight'});
        heapify(n, largest);
      } else {
        steps.push({action:'unhighlight'});
      }
    }

    // Build max heap
    for(let i = Math.floor(n/2) -1; i >= 0; i--) {
      heapify(n, i);
    }

    // Heap sort extraction
    for(let end = n -1; end > 0; end--) {
      steps.push({action:'highlight', indices:[0, end], type:'array'});
      swapInArr(0, end);
      steps.push({action:'unhighlight'});
      heapify(end, 0);
    }
    return steps;
  }

  // Animate steps sequentially
  let animDelay = 700; // milliseconds per step
  async function playAnimations(steps) {
    animationRunning = true;
    startBtn.disabled = true;
    resetBtn.disabled = true;
    for(animationIndex=0; animationIndex<steps.length; animationIndex++) {
      const step = steps[animationIndex];
      if(step.action === 'highlight') {
        clearHighlights();
        step.indices.forEach(i => highlight(i, step.type));
      } else if(step.action === 'swap') {
        clearHighlights();
        const [i, j] = step.indices;
        highlight(i, 'array');
        highlight(j, 'array');
        highlight(i, 'heap');
        highlight(j, 'heap');

        // Swap elements visually in the array bars
        await animateSwap(i, j);
        // Swap data and redraw tree & array
        [array[i], array[j]] = [array[j], array[i]];
        drawTree();
        drawArray();
      } else if(step.action === 'unhighlight') {
        clearHighlights();
      }
      await sleep(animDelay * 0.85);
    }
    clearHighlights();
    animationRunning = false;
    startBtn.disabled = false;
    resetBtn.disabled = false;
  }

  // Sleep helper
  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  // Animate swap between two array bars (translate)
  async function animateSwap(i, j) {
    const bars = arrayContainer.querySelectorAll('.array-bar');
    if(!bars[i] || !bars[j]) return;

    const bar1 = bars[i];
    const bar2 = bars[j];

    const rect1 = bar1.getBoundingClientRect();
    const rect2 = bar2.getBoundingClientRect();

    const deltaX = rect2.left - rect1.left;

    // Animate horizontal movement by transform
    bar1.style.transition = 'transform 0.45s cubic-bezier(0.4,0,0.2,1)';
    bar2.style.transition = 'transform 0.45s cubic-bezier(0.4,0,0.2,1)';
    bar1.style.zIndex = 20;
    bar2.style.zIndex = 20;

    bar1.style.transform = `translateX(${deltaX}px) scale(1.1)`;
    bar2.style.transform = `translateX(${-deltaX}px) scale(1.1)`;

    await sleep(460);

    // Reset transformations for next state (new position after actual swap)
    bar1.style.transition = '';
    bar2.style.transition = '';
    bar1.style.transform = '';
    bar2.style.transform = '';
    bar1.style.zIndex = '';
    bar2.style.zIndex = '';
  }

  // Initialize the visualization (initial draw)
  function initialize() {
    array = generateRandomArray(maxElements, minValue, maxValue);
    drawTree();
    drawArray();
    clearHighlights();
    animations = [];
    animationIndex = 0;
    animationRunning = false;
    startBtn.disabled = false;
  }

  // Handle Start button click
  async function onStart() {
    if(animationRunning) return;
    animations = heapSortSteps(array);
    await playAnimations(animations);
  }

  // Handle Reset button click
  function onReset() {
    if(animationRunning) return;
    initialize();
  }

  // Tooltip positioning and content for heap nodes on mouseover strongest subtle interaction
  function onNodeHover(e) {
    if(!e.target.classList.contains('node')) return;
    const idx = +e.target.dataset.index;
    const val = array[idx];
    const pos = e.target.getBoundingClientRect();
    tooltip.textContent = `Heap Index: ${idx} | Value: ${val}`;
    tooltip.style.left = `${pos.left + pos.width / 2}px`;
    tooltip.style.top = `${pos.top - 34}px`;
    tooltip.classList.add('visible');
  }
  function onNodeLeave() {
    tooltip.classList.remove('visible');
  }

  // Events
  startBtn.addEventListener('click', onStart);
  resetBtn.addEventListener('click', onReset);
  heapTreeSVG.addEventListener('mousemove', onNodeHover);
  heapTreeSVG.addEventListener('mouseleave', onNodeLeave);

  // Initialize on load
  initialize();

})();
</script>
</body>
</html>
