<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suffix Tree Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom right, #283c86, #45a247);
            color: #ffffff;
            margin: 0;
            overflow: hidden;
        }

        header {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 3em;
            margin: 0;
        }

        #canvas {
            display: block;
            margin: 0 auto;
            width: 80%;
            height: 70vh;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            background-color: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            transition: transform 0.5s;
        }

        #canvas.hover {
            transform: scale(1.05);
        }

        .buttons {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .button {
            background-color: #45a247;
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin: 0 10px;
        }

        .button:hover {
            background-color: #283c86;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8em;
            background: rgba(0, 0, 0, 0.7);
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <header>
        <h1>Suffix Tree Visualization</h1>
        <p>Observe the beauty of suffix trees in action.</p>
    </header>
    
    <canvas id="canvas"></canvas>

    <div class="buttons">
        <button class="button" id="drawBtn">Draw Suffix Tree</button>
        <button class="button" id="clearBtn">Clear Canvas</button>
    </div>

    <footer>
        &copy; 2023 Suffix Tree Visualization. All rights reserved.
    </footer>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Suffix Tree example for "banana"
        const text = "banana";
        const suffixes = [];
        
        for (let i = 0; i < text.length; i++) {
            suffixes.push(text.slice(i));
        }

        const drawTree = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const radius = 20;
            const startX = canvas.width / 2;
            const startY = 50;

            suffixes.forEach((suffix, i) => {
                const posX = startX + (i * 40) - (suffixes.length * 20);
                ctx.fillStyle = `hsl(${(i * 360) / suffixes.length}, 100%, 50%)`;
                ctx.beginPath();
                ctx.arc(posX, startY + 50, radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.fillText(suffix, posX - 15, startY + 60);
            });

            // Show hover effect
            canvas.classList.add('hover');
            setTimeout(() => {
                canvas.classList.remove('hover');
            }, 500);
        };

        const clearCanvas = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        };

        document.getElementById('drawBtn').onclick = drawTree;
        document.getElementById('clearBtn').onclick = clearCanvas;
    </script>
</body>

</html>
