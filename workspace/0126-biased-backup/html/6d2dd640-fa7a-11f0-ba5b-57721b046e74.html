<!DOCTYPE html>
<html>
<head>
    <title>Interactive Merge Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .array-container {
            display: flex;
            margin: 20px 0;
            height: 200px;
            align-items: flex-end;
        }
        .array-bar {
            flex: 1;
            background-color: #ddd;
            margin: 0 1px;
            position: relative;
        }
        .array-bar {
            background-color: #555;
            width: 100%;
        }
        .controls {
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .control-group {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }
        button {
            padding: 5px 10px;
            margin: 2px;
        }
        input[type="range"] {
            width: 200px;
        }
        .explanation {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #eee;
        }
        .highlight {
            background-color: yellow;
        }
        .merge-highlight {
            background-color: lightblue;
        }
        .sorted {
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interactive Merge Sort</h1>
        
        <div class="control-group">
            <h3>Array Configuration</h3>
            <div>
                <label for="arraySize">Array Size:</label>
                <input type="range" id="arraySize" min="5" max="30" value="15">
                <span id="arraySizeValue">15</span>
            </div>
            <div>
                <label for="arrayType">Array Type:</label>
                <select id="arrayType">
                    <option value="random">Random</option>
                    <option value="sorted">Sorted</option>
                    <option value="reverse">Reverse Sorted</option>
                    <option value="fewUnique">Few Unique</option>
                </select>
            </div>
            <button id="generateArray">Generate New Array</button>
        </div>
        
        <div class="control-group">
            <h3>Sorting Controls</h3>
            <button id="startSort">Start Merge Sort</button>
            <button id="pauseSort" disabled>Pause</button>
            <button id="stepSort" disabled>Step</button>
            <button id="resetSort">Reset</button>
            
            <div>
                <label for="speedControl">Animation Speed:</label>
                <input type="range" id="speedControl" min="1" max="10" value="5">
            </div>
        </div>
        
        <div class="control-group">
            <h3>Visualization Options</h3>
            <div>
                <input type="checkbox" id="showRecursion" checked>
                <label for="showRecursion">Show Recursion Depth</label>
            </div>
            <div>
                <input type="checkbox" id="showMerge" checked>
                <label for="showMerge">Highlight Merge Operations</label>
            </div>
        </div>
        
        <div class="array-container" id="arrayContainer"></div>
        
        <div class="explanation" id="explanation">
            <h3>Algorithm Explanation</h3>
            <p>Click "Start Merge Sort" to begin the visualization.</p>
        </div>
        
        <div class="control-group">
            <h3>Detailed View</h3>
            <div id="callStack"></div>
            <div id="currentStep"></div>
            <div id="comparisons">Comparisons: 0</div>
            <div id="merges">Merges: 0</div>
            <div id="recursionDepth">Recursion Depth: 0</div>
        </div>
    </div>

    <script>
        // Global variables
        let array = [];
        let animationQueue = [];
        let isSorting = false;
        let isPaused = false;
        let animationSpeed = 5;
        let comparisons = 0;
        let merges = 0;
        let maxRecursionDepth = 0;
        let currentRecursionDepth = 0;
        
        // DOM elements
        const arrayContainer = document.getElementById('arrayContainer');
        const arraySizeInput = document.getElementById('arraySize');
        const arraySizeValue = document.getElementById('arraySizeValue');
        const arrayTypeSelect = document.getElementById('arrayType');
        const generateArrayBtn = document.getElementById('generateArray');
        const startSortBtn = document.getElementById('startSort');
        const pauseSortBtn = document.getElementById('pauseSort');
        const stepSortBtn = document.getElementById('stepSort');
        const resetSortBtn = document.getElementById('resetSort');
        const speedControl = document.getElementById('speedControl');
        const showRecursionCheckbox = document.getElementById('showRecursion');
        const showMergeCheckbox = document.getElementById('showMerge');
        const explanationDiv = document.getElementById('explanation');
        const callStackDiv = document.getElementById('callStack');
        const currentStepDiv = document.getElementById('currentStep');
        const comparisonsDiv = document.getElementById('comparisons');
        const mergesDiv = document.getElementById('merges');
        const recursionDepthDiv = document.getElementById('recursionDepth');
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            generateNewArray();
            setupEventListeners();
        });
        
        function setupEventListeners() {
            arraySizeInput.addEventListener('input', updateArraySize);
            generateArrayBtn.addEventListener('click', generateNewArray);
            startSortBtn.addEventListener('click', startMergeSort);
            pauseSortBtn.addEventListener('click', togglePause);
            stepSortBtn.addEventListener('click', processNextStep);
            resetSortBtn.addEventListener('click', resetVisualization);
            speedControl.addEventListener('input', updateSpeed);
        }
        
        function updateArraySize() {
            const size = arraySizeInput.value;
            arraySizeValue.textContent = size;
        }
        
        function updateSpeed() {
            animationSpeed = 11 - speedControl.value; // Invert so higher = faster
        }
        
        function generateNewArray() {
            if (isSorting) return;
            
            const size = parseInt(arraySizeInput.value);
            const type = arrayTypeSelect.value;
            
            array = [];
            
            switch(type) {
                case 'random':
                    for (let i = 0; i < size; i++) {
                        array.push(Math.floor(Math.random() * 100) + 1);
                    }
                    break;
                case 'sorted':
                    for (let i = 0; i < size; i++) {
                        array.push(Math.floor((i + 1) * (100 / size)));
                    }
                    break;
                case 'reverse':
                    for (let i = 0; i < size; i++) {
                        array.push(Math.floor((size - i) * (100 / size)));
                    }
                    break;
                case 'fewUnique':
                    const uniqueValues = [10, 30, 50, 70, 90];
                    for (let i = 0; i < size; i++) {
                        array.push(uniqueValues[Math.floor(Math.random() * uniqueValues.length)]);
                    }
                    break;
            }
            
            renderArray();
            resetStats();
        }
        
        function renderArray(highlights = [], mergeHighlights = [], sortedIndices = []) {
            arrayContainer.innerHTML = '';
            const maxValue = Math.max(...array, 1);
            
            array.forEach((value, index) => {
                const bar = document.createElement('div');
                bar.className = 'array-bar';
                
                const barHeight = (value / maxValue) * 100;
                const barInner = document.createElement('div');
                barInner.className = 'array-bar';
                barInner.style.height = `${barHeight}%`;
                
                if (highlights.includes(index)) {
                    barInner.classList.add('highlight');
                }
                
                if (mergeHighlights.includes(index)) {
                    barInner.classList.add('merge-highlight');
                }
                
                if (sortedIndices.includes(index)) {
                    barInner.classList.add('sorted');
                }
                
                if (showRecursionCheckbox.checked) {
                    barInner.style.backgroundColor = `hsl(${currentRecursionDepth * 30}, 70%, 60%)`;
                }
                
                const label = document.createElement('div');
                label.textContent = value;
                label.style.textAlign = 'center';
                label.style.fontSize = '10px';
                
                bar.appendChild(barInner);
                bar.appendChild(label);
                arrayContainer.appendChild(bar);
            });
        }
        
        function resetStats() {
            comparisons = 0;
            merges = 0;
            maxRecursionDepth = 0;
            currentRecursionDepth = 0;
            updateStats();
        }
        
        function updateStats() {
            comparisonsDiv.textContent = `Comparisons: ${comparisons}`;
            mergesDiv.textContent = `Merges: ${merges}`;
            recursionDepthDiv.textContent = `Recursion Depth: ${currentRecursionDepth} (Max: ${maxRecursionDepth})`;
        }
        
        function startMergeSort() {
            if (isSorting) return;
            
            resetStats();
            animationQueue = [];
            isSorting = true;
            isPaused = false;
            
            startSortBtn.disabled = true;
            pauseSortBtn.disabled = false;
            stepSortBtn.disabled = false;
            generateArrayBtn.disabled = true;
            
            // Generate the animation queue
            const arrayCopy = [...array];
            mergeSort(arrayCopy, 0, array.length - 1);
            
            // Process the animation queue
            processAnimationQueue();
        }
        
        function mergeSort(arr, left, right) {
            currentRecursionDepth++;
            maxRecursionDepth = Math.max(maxRecursionDepth, currentRecursionDepth);
            
            // Add to call stack visualization
            const callId = `${left}-${right}`;
            addToCallStack(`mergeSort(${left}, ${right})`, callId);
            
            // Highlight current segment
            animationQueue.push({
                type: 'highlight',
                indices: Array.from({length: right - left + 1}, (_, i) => left + i),
                recursionDepth: currentRecursionDepth,
                callId
            });
            
            if (left < right) {
                const mid = Math.floor((left + right) / 2);
                
                // Explanation
                animationQueue.push({
                    type: 'explanation',
                    text: `Dividing array from index ${left} to ${right} at midpoint ${mid}`
                });
                
                // Recursively sort left and right halves
                mergeSort(arr, left, mid);
                mergeSort(arr, mid + 1, right);
                
                // Merge the sorted halves
                merge(arr, left, mid, right);
            } else {
                // Base case - single element is already sorted
                animationQueue.push({
                    type: 'sorted',
                    indices: [left],
                    callId
                });
                
                animationQueue.push({
                    type: 'explanation',
                    text: `Base case reached - single element at index ${left} is already sorted`
                });
            }
            
            // Remove from call stack visualization
            animationQueue.push({
                type: 'removeFromCallStack',
                callId
            });
            
            currentRecursionDepth--;
        }
        
        function merge(arr, left, mid, right) {
            merges++;
            
            // Explanation
            animationQueue.push({
                type: 'explanation',
                text: `Merging sorted subarrays from ${left}-${mid} and ${mid+1}-${right}`
            });
            
            const n1 = mid - left + 1;
            const n2 = right - mid;
            
            // Create temp arrays
            const L = new Array(n1);
            const R = new Array(n2);
            
            // Copy data to temp arrays
            for (let i = 0; i < n1; i++) {
                L[i] = arr[left + i];
            }
            for (let j = 0; j < n2; j++) {
                R[j] = arr[mid + 1 + j];
            }
            
            // Merge the temp arrays back into arr[left..right]
            let i = 0, j = 0, k = left;
            
            while (i < n1 && j < n2) {
                comparisons++;
                
                // Highlight the elements being compared
                animationQueue.push({
                    type: 'compare',
                    indices: [left + i, mid + 1 + j],
                    comparison: `${L[i]} <= ${R[j]}`
                });
                
                if (L[i] <= R[j]) {
                    animationQueue.push({
                        type: 'overwrite',
                        index: k,
                        value: L[i],
                        from: left + i,
                        mergeHighlight: true
                    });
                    arr[k] = L[i];
                    i++;
                } else {
                    animationQueue.push({
                        type: 'overwrite',
                        index: k,
                        value: R[j],
                        from: mid + 1 + j,
                        mergeHighlight: true
                    });
                    arr[k] = R[j];
                    j++;
                }
                k++;
            }
            
            // Copy remaining elements of L[] if any
            while (i < n1) {
                animationQueue.push({
                    type: 'overwrite',
                    index: k,
                    value: L[i],
                    from: left + i,
                    mergeHighlight: true
                });
                arr[k] = L[i];
                i++;
                k++;
            }
            
            // Copy remaining elements of R[] if any
            while (j < n2) {
                animationQueue.push({
                    type: 'overwrite',
                    index: k,
                    value: R[j],
                    from: mid + 1 + j,
                    mergeHighlight: true
                });
                arr[k] = R[j];
                j++;
                k++;
            }
            
            // Mark the merged segment as sorted
            animationQueue.push({
                type: 'sorted',
                indices: Array.from({length: right - left + 1}, (_, i) => left + i)
            });
        }
        
        function processAnimationQueue() {
            if (isPaused || animationQueue.length === 0) {
                if (animationQueue.length === 0) {
                    sortingComplete();
                }
                return;
            }
            
            const animation = animationQueue.shift();
            processAnimation(animation);
            
            if (animation.type === 'explanation') {
                explanationDiv.innerHTML = `<h3>Algorithm Explanation</h3><p>${animation.text}</p>`;
            } else if (animation.type === 'compare') {
                currentStepDiv.textContent = `Comparing elements at indices ${animation.indices[0]} (${array[animation.indices[0]]}) and ${animation.indices[1]} (${array[animation.indices[1]]}): ${animation.comparison}`;
            } else if (animation.type === 'overwrite') {
                currentStepDiv.textContent = `Moving value ${animation.value} from index ${animation.from} to index ${animation.index}`;
            }
            
            updateStats();
            
            if (animationQueue.length > 0) {
                setTimeout(processAnimationQueue, 1000 / animationSpeed);
            } else {
                sortingComplete();
            }
        }
        
        function processNextStep() {
            if (animationQueue.length === 0) {
                sortingComplete();
                return;
            }
            
            const animation = animationQueue.shift();
            processAnimation(animation);
            
            if (animation.type === 'explanation') {
                explanationDiv.innerHTML = `<h3>Algorithm Explanation</h3><p>${animation.text}</p>`;
            } else if (animation.type === 'compare') {
                currentStepDiv.textContent = `Comparing elements at indices ${animation.indices[0]} (${array[animation.indices[0]]}) and ${animation.indices[1]} (${array[animation.indices[1]]}): ${animation.comparison}`;
            } else if (animation.type === 'overwrite') {
                currentStepDiv.textContent = `Moving value ${animation.value} from index ${animation.from} to index ${animation.index}`;
            }
            
            updateStats();
        }
        
        function processAnimation(animation) {
            switch(animation.type) {
                case 'highlight':
                    currentRecursionDepth = animation.recursionDepth;
                    renderArray(animation.indices, [], []);
                    break;
                    
                case 'compare':
                    renderArray(animation.indices, [], []);
                    break;
                    
                case 'overwrite':
                    array[animation.index] = animation.value;
                    const mergeHighlights = showMergeCheckbox.checked ? [animation.index, animation.from] : [];
                    renderArray([], mergeHighlights, []);
                    break;
                    
                case 'sorted':
                    renderArray([], [], animation.indices);
                    break;
                    
                case 'addToCallStack':
                    addToCallStack(animation.text, animation.callId);
                    break;
                    
                case 'removeFromCallStack':
                    removeFromCallStack(animation.callId);
                    break;
            }
        }
        
        function addToCallStack(text, callId) {
            const callElement = document.createElement('div');
            callElement.textContent = text;
            callElement.id = callId;
            callElement.style.marginLeft = `${currentRecursionDepth * 20}px`;
            callStackDiv.appendChild(callElement);
        }
        
        function removeFromCallStack(callId) {
            const element = document.getElementById(callId);
            if (element) {
                element.remove();
            }
        }
        
        function togglePause() {
            isPaused = !isPaused;
            pauseSortBtn.textContent = isPaused ? 'Resume' : 'Pause';
            
            if (!isPaused) {
                processAnimationQueue();
            }
        }
        
        function sortingComplete() {
            isSorting = false;
            isPaused = false;
            
            startSortBtn.disabled = false;
            pauseSortBtn.disabled = true;
            stepSortBtn.disabled = true;
            generateArrayBtn.disabled = false;
            
            explanationDiv.innerHTML = '<h3>Algorithm Explanation</h3><p>Merge Sort completed! The algorithm works by recursively dividing the array into halves until single elements are reached, then merging them back together in sorted order.</p>';
            currentStepDiv.textContent = 'Sorting completed!';
            
            // Highlight entire array as sorted
            renderArray([], [], Array.from({length: array.length}, (_, i) => i));
        }
        
        function resetVisualization() {
            isSorting = false;
            isPaused = false;
            
            startSortBtn.disabled = false;
            pauseSortBtn.disabled = true;
            stepSortBtn.disabled = true;
            generateArrayBtn.disabled = false;
            
            animationQueue = [];
            callStackDiv.innerHTML = '';
            currentStepDiv.textContent = '';
            explanationDiv.innerHTML = '<h3>Algorithm Explanation</h3><p>Click "Start Merge Sort" to begin the visualization.</p>';
            
            renderArray();
            resetStats();
        }
    </script>
</body>
</html>
