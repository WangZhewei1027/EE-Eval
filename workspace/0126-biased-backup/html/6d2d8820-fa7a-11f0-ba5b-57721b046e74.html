<!DOCTYPE html>
<html>
<head>
    <title>Suffix Tree Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .control-group {
            border: 1px solid #ccc;
            padding: 10px;
            margin-right: 10px;
        }
        textarea {
            width: 100%;
            height: 100px;
        }
        button {
            padding: 5px 10px;
        }
        #tree-container {
            font-family: monospace;
            white-space: pre;
            overflow-x: auto;
        }
        .node {
            margin-left: 20px;
        }
        .edge-label {
            color: #333;
            font-weight: bold;
        }
        .suffix-link {
            color: blue;
            font-style: italic;
        }
        .active {
            background-color: #f0f0f0;
        }
        .search-results {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Suffix Tree Interactive Demo</h1>
        
        <div class="control-group">
            <h3>Text Input</h3>
            <textarea id="input-text">banana$</textarea>
            <button id="build-tree">Build Suffix Tree</button>
            <button id="random-text">Random Text</button>
            Length: <input type="range" id="text-length" min="1" max="20" value="6">
        </div>
        
        <div class="control-group">
            <h3>Tree Operations</h3>
            <button id="expand-all">Expand All</button>
            <button id="collapse-all">Collapse All</button>
            <button id="show-links">Toggle Suffix Links</button>
            <button id="show-indices">Toggle Suffix Indices</button>
        </div>
        
        <div class="control-group">
            <h3>Pattern Search</h3>
            <input type="text" id="search-pattern" placeholder="Enter pattern">
            <button id="search">Search</button>
            <div class="search-results" id="search-results"></div>
        </div>
        
        <div class="control-group">
            <h3>Tree Navigation</h3>
            <button id="dfs">DFS Traversal</button>
            <button id="bfs">BFS Traversal</button>
            <button id="reset">Reset Highlight</button>
        </div>
        
        <div class="control-group">
            <h3>Tree Statistics</h3>
            <div id="stats">
                Nodes: <span id="node-count">0</span> | 
                Edges: <span id="edge-count">0</span> | 
                Height: <span id="tree-height">0</span> | 
                Longest Repeat: <span id="longest-repeat"></span>
            </div>
        </div>
        
        <h2>Suffix Tree Visualization</h2>
        <div id="tree-container">No tree built yet. Enter text and click "Build Suffix Tree".</div>
    </div>

    <script>
        class SuffixTreeNode {
            constructor() {
                this.children = {};
                this.suffixLink = null;
                this.start = 0;
                this.end = 0;
                this.suffixIndex = -1;
                this.isLeaf = false;
            }
        }

        class SuffixTree {
            constructor(text) {
                this.text = text;
                this.root = new SuffixTreeNode();
                this.build();
            }

            build() {
                this.root = new SuffixTreeNode();
                this.activeNode = this.root;
                this.activeEdge = -1;
                this.activeLength = 0;
                this.remaining = 0;
                this.lastNewNode = null;
                this.size = this.text.length;
                
                for (let i = 0; i < this.size; i++) {
                    this.extend(i);
                }
                
                this.setSuffixIndices(this.root, 0);
            }

            extend(pos) {
                this.lastNewNode = null;
                this.remaining++;
                
                while (this.remaining > 0) {
                    if (this.activeLength === 0) {
                        this.activeEdge = pos;
                    }
                    
                    if (!this.activeNode.children[this.text[this.activeEdge]]) {
                        this.activeNode.children[this.text[this.activeEdge]] = new SuffixTreeNode();
                        this.activeNode.children[this.text[this.activeEdge]].start = pos;
                        this.activeNode.children[this.text[this.activeEdge]].end = this.size - 1;
                        this.activeNode.children[this.text[this.activeEdge]].isLeaf = true;
                        
                        if (this.lastNewNode !== null) {
                            this.lastNewNode.suffixLink = this.activeNode;
                            this.lastNewNode = null;
                        }
                    } else {
                        const next = this.activeNode.children[this.text[this.activeEdge]];
                        const edgeLength = next.end - next.start + 1;
                        
                        if (this.activeLength >= edgeLength) {
                            this.activeEdge += edgeLength;
                            this.activeLength -= edgeLength;
                            this.activeNode = next;
                            continue;
                        }
                        
                        if (this.text[next.start + this.activeLength] === this.text[pos]) {
                            if (this.lastNewNode !== null && this.activeNode !== this.root) {
                                this.lastNewNode.suffixLink = this.activeNode;
                                this.lastNewNode = null;
                            }
                            
                            this.activeLength++;
                            break;
                        }
                        
                        const splitEnd = next.start + this.activeLength - 1;
                        const splitNode = new SuffixTreeNode();
                        splitNode.start = next.start;
                        splitNode.end = splitEnd;
                        
                        this.activeNode.children[this.text[this.activeEdge]] = splitNode;
                        splitNode.children[this.text[pos]] = new SuffixTreeNode();
                        splitNode.children[this.text[pos]].start = pos;
                        splitNode.children[this.text[pos]].end = this.size - 1;
                        splitNode.children[this.text[pos]].isLeaf = true;
                        
                        next.start += this.activeLength;
                        splitNode.children[this.text[next.start]] = next;
                        
                        if (this.lastNewNode !== null) {
                            this.lastNewNode.suffixLink = splitNode;
                        }
                        
                        this.lastNewNode = splitNode;
                    }
                    
                    this.remaining--;
                    
                    if (this.activeNode === this.root && this.activeLength > 0) {
                        this.activeLength--;
                        this.activeEdge = pos - this.remaining + 1;
                    } else if (this.activeNode !== this.root) {
                        this.activeNode = this.activeNode.suffixLink || this.root;
                    }
                }
            }

            setSuffixIndices(node, labelHeight) {
                if (!node) return;
                
                let isLeaf = true;
                for (const child in node.children) {
                    isLeaf = false;
                    const childNode = node.children[child];
                    this.setSuffixIndices(
                        childNode,
                        labelHeight + (childNode.end - childNode.start + 1)
                    );
                }
                
                if (isLeaf) {
                    node.suffixIndex = this.size - labelHeight;
                }
            }

            search(pattern) {
                let node = this.root;
                let patternIndex = 0;
                const result = {
                    found: false,
                    positions: []
                };
                
                while (patternIndex < pattern.length) {
                    const currentChar = pattern[patternIndex];
                    if (!node.children[currentChar]) {
                        return result;
                    }
                    
                    const child = node.children[currentChar];
                    const edgeText = this.text.slice(child.start, child.end + 1);
                    
                    for (let i = 0; i < edgeText.length && patternIndex < pattern.length; i++) {
                        if (edgeText[i] !== pattern[patternIndex]) {
                            return result;
                        }
                        patternIndex++;
                    }
                    
                    node = child;
                }
                
                result.found = true;
                this.collectSuffixIndices(node, result.positions);
                return result;
            }

            collectSuffixIndices(node, positions) {
                if (node.isLeaf) {
                    positions.push(node.suffixIndex);
                    return;
                }
                
                for (const child in node.children) {
                    this.collectSuffixIndices(node.children[child], positions);
                }
            }

            getLongestRepeatedSubstring() {
                let maxLength = 0;
                let substring = '';
                
                const traverse = (node, currentLength, currentString) => {
                    if (Object.keys(node.children).length === 0) return;
                    
                    for (const child in node.children) {
                        const childNode = node.children[child];
                        const edgeLength = childNode.end - childNode.start + 1;
                        const newLength = currentLength + edgeLength;
                        const newString = currentString + this.text.slice(childNode.start, childNode.end + 1);
                        
                        if (Object.keys(childNode.children).length > 1 && newLength > maxLength) {
                            maxLength = newLength;
                            substring = newString;
                        }
                        
                        traverse(childNode, newLength, newString);
                    }
                };
                
                traverse(this.root, 0, '');
                return substring;
            }

            getNodeCount() {
                let count = 0;
                const traverse = (node) => {
                    if (!node) return;
                    count++;
                    for (const child in node.children) {
                        traverse(node.children[child]);
                    }
                };
                traverse(this.root);
                return count;
            }

            getEdgeCount() {
                let count = 0;
                const traverse = (node) => {
                    if (!node) return;
                    for (const child in node.children) {
                        count++;
                        traverse(node.children[child]);
                    }
                };
                traverse(this.root);
                return count;
            }

            getHeight() {
                const traverse = (node) => {
                    if (!node || Object.keys(node.children).length === 0) return 0;
                    let max = 0;
                    for (const child in node.children) {
                        const childHeight = node.children[child].end - node.children[child].start + 1;
                        max = Math.max(max, childHeight + traverse(node.children[child]));
                    }
                    return max;
                };
                return traverse(this.root);
            }
        }

        // UI State
        let suffixTree = null;
        let showSuffixLinks = false;
        let showSuffixIndices = false;
        let expandedNodes = new Set();

        // DOM Elements
        const inputText = document.getElementById('input-text');
        const buildTreeBtn = document.getElementById('build-tree');
        const randomTextBtn = document.getElementById('random-text');
        const textLengthSlider = document.getElementById('text-length');
        const expandAllBtn = document.getElementById('expand-all');
        const collapseAllBtn = document.getElementById('collapse-all');
        const showLinksBtn = document.getElementById('show-links');
        const showIndicesBtn = document.getElementById('show-indices');
        const searchInput = document.getElementById('search-pattern');
        const searchBtn = document.getElementById('search');
        const searchResults = document.getElementById('search-results');
        const dfsBtn = document.getElementById('dfs');
        const bfsBtn = document.getElementById('bfs');
        const resetBtn = document.getElementById('reset');
        const treeContainer = document.getElementById('tree-container');
        const nodeCountSpan = document.getElementById('node-count');
        const edgeCountSpan = document.getElementById('edge-count');
        const treeHeightSpan = document.getElementById('tree-height');
        const longestRepeatSpan = document.getElementById('longest-repeat');

        // Event Listeners
        buildTreeBtn.addEventListener('click', buildTree);
        randomTextBtn.addEventListener('click', generateRandomText);
        expandAllBtn.addEventListener('click', expandAllNodes);
        collapseAllBtn.addEventListener('click', collapseAllNodes);
        showLinksBtn.addEventListener('click', toggleSuffixLinks);
        showIndicesBtn.addEventListener('click', toggleSuffixIndices);
        searchBtn.addEventListener('click', searchPattern);
        dfsBtn.addEventListener('click', traverseDFS);
        bfsBtn.addEventListener('click', traverseBFS);
        resetBtn.addEventListener('click', resetHighlight);

        // Functions
        function buildTree() {
            const text = inputText.value.trim();
            if (!text) return;
            
            suffixTree = new SuffixTree(text);
            expandedNodes = new Set();
            expandedNodes.add('root');
            renderTree();
            updateStats();
        }

        function generateRandomText() {
            const length = parseInt(textLengthSlider.value);
            const chars = 'abcdefghijklmnopqrstuvwxyz';
            let result = '';
            
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            inputText.value = result + '$';
            buildTree();
        }

        function toggleSuffixLinks() {
            showSuffixLinks = !showSuffixLinks;
            renderTree();
        }

        function toggleSuffixIndices() {
            showSuffixIndices = !showSuffixIndices;
            renderTree();
        }

        function expandAllNodes() {
            if (!suffixTree) return;
            expandedNodes = new Set();
            traverseAndExpand(suffixTree.root, 'root');
            renderTree();
        }

        function traverseAndExpand(node, path) {
            expandedNodes.add(path);
            for (const child in node.children) {
                traverseAndExpand(node.children[child], `${path}-${child}`);
            }
        }

        function collapseAllNodes() {
            expandedNodes = new Set(['root']);
            renderTree();
        }

        function searchPattern() {
            if (!suffixTree) {
                searchResults.textContent = 'No tree built yet.';
                return;
            }
            
            const pattern = searchInput.value.trim();
            if (!pattern) {
                searchResults.textContent = 'Please enter a search pattern.';
                return;
            }
            
            const result = suffixTree.search(pattern);
            if (result.found) {
                searchResults.textContent = `Pattern found at positions: ${result.positions.join(', ')}`;
            } else {
                searchResults.textContent = 'Pattern not found.';
            }
        }

        function traverseDFS() {
            if (!suffixTree) return;
            
            let delay = 0;
            const traverse = (node, path) => {
                setTimeout(() => {
                    highlightNode(path);
                }, delay * 500);
                delay++;
                
                for (const child in node.children) {
                    traverse(node.children[child], `${path}-${child}`);
                }
            };
            
            traverse(suffixTree.root, 'root');
        }

        function traverseBFS() {
            if (!suffixTree) return;
            
            const queue = [{node: suffixTree.root, path: 'root'}];
            let delay = 0;
            
            while (queue.length > 0) {
                const current = queue.shift();
                
                setTimeout(() => {
                    highlightNode(current.path);
                }, delay * 500);
                delay++;
                
                for (const child in current.node.children) {
                    queue.push({
                        node: current.node.children[child],
                        path: `${current.path}-${child}`
                    });
                }
            }
        }

        function highlightNode(path) {
            const nodeElements = document.querySelectorAll('.node');
            nodeElements.forEach(el => {
                el.classList.remove('active');
                if (el.dataset.path === path) {
                    el.classList.add('active');
                    el.scrollIntoView({behavior: 'smooth', block: 'center'});
                }
            });
        }

        function resetHighlight() {
            document.querySelectorAll('.node').forEach(el => {
                el.classList.remove('active');
            });
        }

        function renderTree() {
            if (!suffixTree) {
                treeContainer.textContent = 'No tree built yet. Enter text and click "Build Suffix Tree".';
                return;
            }
            
            let output = '';
            const traverse = (node, depth, path) => {
                if (!node) return;
                
                const isExpanded = expandedNodes.has(path);
                const hasChildren = Object.keys(node.children).length > 0;
                const edgeText = suffixTree.text.slice(node.start, node.end + 1);
                
                output += `${'  '.repeat(depth)}`;
                
                if (path !== 'root') {
                    if (hasChildren) {
                        output += `<span class="node" data-path="${path}" onclick="toggleNode('${path}')">`;
                        output += `[${isExpanded ? '-' : '+'}] `;
                    } else {
                        output += `<span class="node" data-path="${path}">`;
                        output += '  ';
                    }
                    
                    output += `<span class="edge-label">${edgeText}</span>`;
                    
                    if (node.isLeaf && showSuffixIndices) {
                        output += ` (${node.suffixIndex})`;
                    }
                    
                    if (showSuffixLinks && node.suffixLink && path.endsWith('root') === false) {
                        output += ` <span class="suffix-link">→ ${getNodePath(node.suffixLink)}</span>`;
                    }
                    
                    output += '</span>\n                }
                
                output += '\n';
                
                if (isExpanded) {
                    for (const child in node.children) {
                        traverse(node.children[child], depth + 1, `${path}-${child}`);
                    }
                }
            };
            
            traverse(suffixTree.root, 0, 'root');
            treeContainer.innerHTML = output;
        }

        function toggleNode(path) {
            if (expandedNodes.has(path)) {
                expandedNodes.delete(path);
            } else {
                expandedNodes.add(path);
            }
            renderTree();
        }

        function getNodePath(node) {
            if (node === suffixTree.root) return 'root';
            
            let current = node;
            let path = '';
            const stack = [];
            
            while (current && current !== suffixTree.root) {
                let found = false;
                for (const parent in suffixTree.root.children) {
                    if (suffixTree.root.children[parent] === current) {
                        stack.push(parent);
                        found = true;
                        break;
                    }
                }
                
                if (!found) {
                    for (const parentKey in suffixTree.root.children) {
                        const parentNode = suffixTree.root.children[parentKey];
                        for (const child in parentNode.children) {
                            if (parentNode.children[child] === current) {
                                stack.push(child);
                                current = parentNode;
                                found = true;
                                break;
                            }
                        }
                        if (found) break;
                    }
                }
                
                if (!found) break;
            }
            
            while (stack.length > 0) {
                path += (path ? '-' : '') + stack.pop();
            }
            
            return path || 'root';
        }

        function updateStats() {
            if (!suffixTree) return;
            
            nodeCountSpan.textContent = suffixTree.getNodeCount();
            edgeCountSpan.textContent = suffixTree.getEdgeCount();
            treeHeightSpan.textContent = suffixTree.getHeight();
            longestRepeatSpan.textContent = suffixTree.getLongestRepeatedSubstring() || 'None';
        }

        // Expose to global scope for onclick handlers
        window.toggleNode = toggleNode;
    </script>
</body>
</html>
