<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Testing Interactive Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .hidden { display: none; }
        .output { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Unit Testing Interactive Demo</h1>
    
    <div>
        <h2>Run Unit Tests</h2>
        <button onclick="runTests()">Run Tests</button>
        <div class="output" id="testOutput"></div>
    </div>

    <div>
        <h2>Calculator Tests</h2>
        <label for="calcInputA">Input A: </label>
        <input type="number" id="calcInputA"><br>
        
        <label for="calcInputB">Input B: </label>
        <input type="number" id="calcInputB"><br>
        
        <button onclick="testAddition()">Test Addition</button>
        <div class="output" id="calcTestOutput"></div>
    </div>

    <div>
        <h2>Complex Functionality</h2>
        <label for="multiplier">Multiplier: </label>
        <input type="number" id="multiplier" value="1"><br>
        
        <label for="baseNumber">Base Number: </label>
        <input type="number" id="baseNumber" value="1"><br>
        
        <button onclick="calculateProduct()">Calculate Product</button>
        <div class="output" id="productOutput"></div>
    </div>

    <script>
        function runTests() {
            const output = document.getElementById('testOutput');
            output.innerHTML = '';
            let result = "All Tests Passed!";
            const tests = [testAddition];
            tests.forEach(test => {
                try {
                    test();
                } catch (error) {
                    result = `Test Failed: ${error.message}`;
                }
            });
            output.innerHTML = result;
        }

        function testAddition() {
            const a = 2;
            const b = 3;
            const result = add(a, b);
            if (result !== 5) {
                throw new Error(`Expected 5 but got ${result}`);
            }
            console.log("Addition test passed");
        }

        function add(x, y) {
            return x + y;
        }

        function testAddition() {
            const a = Number(document.getElementById('calcInputA').value);
            const b = Number(document.getElementById('calcInputB').value);
            const expected = add(a, b);
            if (isNaN(expected)) {
                document.getElementById('calcTestOutput').innerText = "Please enter valid numbers.";
                return;
            }
            document.getElementById('calcTestOutput').innerText = `Result: ${expected}`;
        }

        function calculateProduct() {
            const multiplier = Number(document.getElementById('multiplier').value);
            const baseNumber = Number(document.getElementById('baseNumber').value);
            const product = multiplier * baseNumber;
            document.getElementById('productOutput').innerText = `Product: ${product}`;
        }
    </script>
</body>
</html>
