<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Visualization</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');
        
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #fd79a8;
            --dark: #2d3436;
            --light: #f5f6fa;
            --success: #00b894;
            --warning: #fdcb6e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease-out;
        }
        
        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: var(--dark);
            opacity: 0.8;
            font-weight: 300;
        }
        
        .transaction-visualization {
            position: relative;
            height: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 2rem;
            margin-bottom: 3rem;
            animation: slideUp 1s ease-out;
        }
        
        .transaction-path {
            position: relative;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .node {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 600;
            z-index: 2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.5s ease;
            cursor: default;
        }
        
        .node:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .node-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .node-label {
            font-size: 0.9rem;
            font-weight: 400;
        }
        
        .sender {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        
        .network {
            background: linear-gradient(135deg, #0984e3, #74b9ff);
        }
        
        .blockchain {
            background: linear-gradient(135deg, #00b894, #55efc4);
        }
        
        .receiver {
            background: linear-gradient(135deg, var(--accent), #ff7675);
        }
        
        .connection-line {
            position: absolute;
            height: 8px;
            background: linear-gradient(to right, var(--secondary), #74b9ff, #55efc4, var(--accent));
            top: 50%;
            left: 120px;
            right: 120px;
            transform: translateY(-50%);
            border-radius: 10px;
            z-index: 1;
            animation: pulse 3s infinite;
        }
        
        .transaction-details {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 2rem;
            margin-bottom: 3rem;
            animation: slideUp 1.2s ease-out;
        }
        
        .details-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        .details-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
        }
        
        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            background: var(--success);
            color: white;
        }
        
        .detail-row {
            display: flex;
            margin-bottom: 1rem;
        }
        
        .detail-label {
            width: 150px;
            font-weight: 600;
            color: rgba(0,0,0,0.7);
        }
        
        .detail-value {
            flex: 1;
            font-family: monospace;
        }
        
        .visualization-controls {
            text-align: center;
            margin-top: 2rem;
            animation: fadeIn 1.5s ease-out;
        }
        
        .btn {
            padding: 0.8rem 2rem;
            border-radius: 50px;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a4bd1;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
        }
        
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            margin-left: 1rem;
        }
        
        .btn-outline:hover {
            background: rgba(108, 92, 231, 0.1);
            transform: translateY(-2px);
        }
        
        .transaction-animation {
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
            z-index: 3;
            opacity: 0;
        }
        
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--accent);
            opacity: 0;
            z-index: 100;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(50px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        @keyframes moveCoin {
            0% { left: 120px; opacity: 1; }
            100% { left: calc(100% - 140px); opacity: 1; }
        }
        
        @keyframes confettiFall {
            0% { 
                transform: translateY(-100px) rotate(0deg); 
                opacity: 1;
            }
            100% { 
                transform: translateY(100vh) rotate(360deg); 
                opacity: 0;
            }
        }
        
        @media (max-width: 768px) {
            .transaction-path {
                flex-direction: column;
                height: auto;
                padding: 2rem 0;
            }
            
            .node {
                margin: 1rem 0;
            }
            
            .connection-line {
                width: 8px;
                height: 100%;
                left: 50%;
                top: 0;
                transform: translateX(-50%);
                background: linear-gradient(to bottom, var(--secondary), #74b9ff, #55efc4, var(--accent));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Transaction Flow</h1>
            <p class="subtitle">Visualizing the journey of a blockchain transaction</p>
        </header>
        
        <div class="transaction-visualization">
            <div class="connection-line"></div>
            <div class="transaction-path">
                <div class="node sender" id="sender">
                    <div class="node-icon">👤</div>
                    <div class="node-label">Sender</div>
                </div>
                
                <div class="node network" id="network">
                    <div class="node-icon">🌐</div>
                    <div class="node-label">Network</div>
                </div>
                
                <div class="node blockchain" id="blockchain">
                    <div class="node-icon">⛓️</div>
                    <div class="node-label">Blockchain</div>
                </div>
                
                <div class="node receiver" id="receiver">
                    <div class="node-icon">👤</div>
                    <div class="node-label">Receiver</div>
                </div>
            </div>
        </div>
        
        <div class="transaction-details">
            <div class="details-header">
                <div class="details-title">Transaction Details</div>
                <div class="status-badge" id="statusBadge">Pending</div>
            </div>
            
            <div class="detail-row">
                <div class="detail-label">Transaction ID:</div>
                <div class="detail-value">0x8a3f...c72d</div>
            </div>
            
            <div class="detail-row">
                <div class="detail-label">Amount:</div>
                <div class="detail-value">1.5 ETH</div>
            </div>
            
            <div class="detail-row">
                <div class="detail-label">From:</div>
                <div class="detail-value">0x4b3a...f9e2</div>
            </div>
            
            <div class="detail-row">
                <div class="detail-label">To:</div>
                <div class="detail-value">0x7d1f...a4c6</div>
            </div>
            
            <div class="detail-row">
                <div class="detail-label">Gas Fee:</div>
                <div class="detail-value">0.0021 ETH</div>
            </div>
            
            <div class="detail-row">
                <div class="detail-label">Timestamp:</div>
                <div class="detail-value">2023-06-15 14:32:45 UTC</div>
            </div>
        </div>
        
        <div class="visualization-controls">
            <button class="btn btn-primary" id="startBtn">Start Transaction</button>
            <button class="btn btn-outline" id="resetBtn">Reset</button>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const startBtn = document.getElementById('startBtn');
            const resetBtn = document.getElementById('resetBtn');
            const statusBadge = document.getElementById('statusBadge');
            const transactionVisualization = document.querySelector('.transaction-visualization');
            
            let animationInProgress = false;
            
            startBtn.addEventListener('click', function() {
                if (animationInProgress) return;
                animationInProgress = true;
                
                // Reset previous animations
                document.querySelectorAll('.transaction-animation').forEach(el => el.remove());
                
                // Create coin animation
                const coin = document.createElement('div');
                coin.className = 'transaction-animation';
                coin.style.top = '50%';
                coin.style.left = '120px';
                coin.style.transform = 'translateY(-50%)';
                transactionVisualization.appendChild(coin);
                
                // Update status
                statusBadge.textContent = 'Processing';
                statusBadge.style.background = 'var(--warning)';
                
                // Animate coin through the path
                setTimeout(() => {
                    coin.style.animation = 'moveCoin 2s forwards';
                    
                    // When coin reaches network node
                    setTimeout(() => {
                        document.getElementById('network').style.transform = 'scale(1.1)';
                    }, 500);
                    
                    // When coin reaches blockchain node
                    setTimeout(() => {
                        document.getElementById('blockchain').style.transform = 'scale(1.1)';
                    }, 1500);
                    
                    // When coin reaches receiver
                    setTimeout(() => {
                        document.getElementById('receiver').style.transform = 'scale(1.1)';
                        statusBadge.textContent = 'Completed';
                        statusBadge.style.background = 'var(--success)';
                        
                        // Create confetti celebration
                        createConfetti();
                        animationInProgress = false;
                    }, 2000);
                }, 100);
            });
            
            resetBtn.addEventListener('click', function() {
                // Reset all animations and states
                document.querySelectorAll('.transaction-animation, .confetti').forEach(el => el.remove());
                document.querySelectorAll('.node').forEach(node => {
                    node.style.transform = 'scale(1)';
                });
                
                statusBadge.textContent = 'Pending';
                statusBadge.style.background = 'var(--warning)';
                animationInProgress = false;
            });
            
            function createConfetti() {
                const colors = ['var(--primary)', 'var(--secondary)', 'var(--accent)', 'var(--success)', 'var(--warning)'];
                
                for (let i = 0; i < 50; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.width = (Math.random() * 10 + 5) + 'px';
                    confetti.style.height = (Math.random() * 10 + 5) + 'px';
                    confetti.style.animation = `confettiFall ${Math.random() * 3 + 2}s linear forwards`;
                    document.body.appendChild(confetti);
                    
                    // Remove confetti after animation
                    setTimeout(() => {
                        confetti.remove();
                    }, 5000);
                }
            }
        });
    </script>
</body>
</html>
