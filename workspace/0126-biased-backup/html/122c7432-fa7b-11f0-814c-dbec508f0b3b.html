<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big-Theta Notation</title>
    <style>
        body {
            background-color: #000;
            font-family: monospace;
            font-size: 14px;
            text-align: left;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 80%;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #000;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .button:hover {
            background-color: #444;
        }
        .slider {
            width: 100%;
            margin-bottom: 20px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .slider input[type="range"] {
            width: 100%;
            height: 10px;
            margin-bottom: 10px;
        }
        .slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background-color: #fff;
            border: none;
            font-size: 16px;
            margin: 0 10px;
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
        }
        .slider input[type="range"]::-moz-thumb {
            width: 20px;
            height: 20px;
            background-color: #f00;
            border: none;
            font-size: 16px;
            margin: 0 10px;
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
        }
        .slider input[type="range"]::-ms-thumb {
            width: 20px;
            height: 20px;
            background-color: #f00;
            border: none;
            font-size: 16px;
            margin: 0 10px;
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
        }
        .slider input[type="range"]::-ms-thumb-glow {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background-color: #f00;
            border: none;
            font-size: 16px;
            margin: 0 10px;
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
        }
        .slider input[type="range"]::-ms-thumb-glow-out {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background-color: #f00;
            border: none;
            font-size: 16px;
            margin: 0 10px;
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
        }
        .slider input[type="range"]::-ms-thumb-glow-in {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background-color: #f00;
            border: none;
            font-size: 16px;
            margin: 0 10px;
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Big-Theta Notation</h1>
        <p>This is a demonstration of Big-Theta Notation, a measure of the time or space complexity of an algorithm.</p>
        <div class="slider">
            <input type="range" id="slider" min="1" max="10" value="5">
            <label for="slider">Slider Value</label>
        </div>
        <div class="button">
            <button id="button">Calculate Big-Theta</button>
        </div>
        <p id="result"></p>
    </div>

    <script>
        const slider = document.getElementById('slider');
        const button = document.getElementById('button');
        const resultElement = document.getElementById('result');

        function calculateBigTheta() {
            const value = parseFloat(slider.value);
            const timeComplexity = value;
            const spaceComplexity = 1 / value;
            const bigTheta = timeComplexity + spaceComplexity;
            resultElement.innerText = `Big-Theta Notation: Time Complexity: ${timeComplexity}O, Space Complexity: ${spaceComplexity}O`;
        }

        button.addEventListener('click', calculateBigTheta);

        slider.addEventListener('input', calculateBigTheta);
    </script>
</body>
</html>
