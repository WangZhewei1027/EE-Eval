<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Load Balancing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        .button:hover {
            background-color: #3e8e41;
        }
        .input-field {
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        .input-field:hover {
            border: 1px solid #ccc;
        }
        .slider {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        .slider:hover {
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Load Balancing</h1>
        <button class="button" onclick="loadBalancing()">Load Balancing</button>
        <div class="button" onclick="reset()">Reset</button>
        <div class="button" onclick="save()">Save</button>
        <div class="button" onclick="clear()">Clear</button>
        <h2>Example 1: Simple Load Balancing</h2>
        <p>Example 1: Simple Load Balancing</p>
        <input type="text" id="input1" placeholder="Input 1">
        <button class="input-field" onclick="example1()">Example 1</button>
        <h2>Example 2: Slider Load Balancing</h2>
        <p>Example 2: Slider Load Balancing</p>
        <input type="range" id="slider1" min="1" max="100" value="50">
        <label for="slider1">Slider 1:</label>
        <button class="input-field" onclick="example2()">Example 2</button>
        <h2>Example 3: Button Load Balancing</h2>
        <p>Example 3: Button Load Balancing</p>
        <button class="button" onclick="example3()">Example 3</button>
    </div>
    <script>
        let currentExample = 0;
        let examples = [
            {
                id: 1,
                name: "Example 1: Simple Load Balancing",
                example1: example1,
                example2: example2,
                example3: example3
            },
            {
                id: 2,
                name: "Example 2: Slider Load Balancing",
                example1: example1,
                example2: example2,
                example3: example3
            },
            {
                id: 3,
                name: "Example 3: Button Load Balancing",
                example1: example1,
                example2: example2,
                example3: example3
            }
        ];
        function loadBalancing() {
            console.log("Load balancing initiated.");
            currentExample = 1;
            examples[currentExample].example1();
        }
        function example1() {
            console.log("Example 1 initiated.");
            document.getElementById("input1").value = "Example 1 input value";
            document.getElementById("slider1").value = 50;
        }
        function example2() {
            console.log("Example 2 initiated.");
            document.getElementById("input1").value = "Example 2 input value";
            document.getElementById("slider1").value = 70;
        }
        function example3() {
            console.log("Example 3 initiated.");
            document.getElementById("input1").value = "Example 3 input value";
            document.getElementById("slider1").value = 90;
        }
        function reset() {
            console.log("Reset initiated.");
            document.getElementById("input1").value = "";
            document.getElementById("slider1").value = 0;
        }
        function save() {
            console.log("Save initiated.");
            let input1 = document.getElementById("input1").value;
            let slider1 = document.getElementById("slider1").value;
            console.log(`Example 1 input value: ${input1}`);
            console.log(`Example 1 slider value: ${slider1}`);
        }
        function clear() {
            console.log("Clear initiated.");
            document.getElementById("input1").value = "";
            document.getElementById("slider1").value = 0;
        }
    </script>
</body>
</html>
