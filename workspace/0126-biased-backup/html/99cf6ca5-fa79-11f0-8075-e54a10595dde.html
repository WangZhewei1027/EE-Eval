<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big-O Notation Explorer</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .control { margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Big-O Notation Explorer</h1>

    <div class="control">
        <label for="size">Input Size (n):</label>
        <input type="number" id="size" value="10" min="1" max="100" />
    </div>
    
    <div class="control">
        <label for="algorithm">Select Algorithm:</label>
        <select id="algorithm">
            <option value="constant">O(1) - Constant</option>
            <option value="linear">O(n) - Linear</option>
            <option value="quadratic">O(n^2) - Quadratic</option>
            <option value="logarithmic">O(log n) - Logarithmic</option>
            <option value="exponential">O(2^n) - Exponential</option>
        </select>
    </div>

    <div class="control" id="operations"></div>

    <button id="run">Run Algorithm</button>
    <button id="reset">Reset</button>

    <div class="control">
        <h3>Algorithm Complexity:</h3>
        <p id="complexity"></p>
        <h3>Execution Time (simulated):</h3>
        <p id="execution_time"></p>
    </div>

    <script>
        const algorithmSelect = document.getElementById('algorithm');
        const inputSize = document.getElementById('size');
        const runButton = document.getElementById('run');
        const resetButton = document.getElementById('reset');
        const complexityDisplay = document.getElementById('complexity');
        const executionTimeDisplay = document.getElementById('execution_time');
        const operationsDisplay = document.getElementById('operations');

        const algorithms = {
            "constant": function(n) { return 1; },
            "linear": function(n) { return n; },
            "quadratic": function(n) { return n * n; },
            "logarithmic": function(n) { return Math.log2(n); },
            "exponential": function(n) { return Math.pow(2, n); }
        };

        function getAlgorithmComplexity() {
            const selectedAlgorithm = algorithmSelect.value;
            complexityDisplay.textContent = selectedAlgorithm.toUpperCase();
            getOperations(selectedAlgorithm);
        }

        function getOperations(selectedAlgorithm) {
            const n = parseInt(inputSize.value);
            operationsDisplay.innerHTML = "";
            let operationsCount = algorithms[selectedAlgorithm](n);
            operationsDisplay.textContent = "Operation Count: " + operationsCount;
        }

        function runAlgorithm() {
            const n = parseInt(inputSize.value);
            const selectedAlgorithm = algorithmSelect.value;
            let operationsCount = algorithms[selectedAlgorithm](n);
            let executionSimulatedTime = operationsCount / 1000; // simulate execution time in ms
            executionTimeDisplay.textContent = executionSimulatedTime + " ms";
        }

        function reset() {
            inputSize.value = 10;
            algorithmSelect.value = 'constant';
            complexityDisplay.textContent = '';
            executionTimeDisplay.textContent = '';
            operationsDisplay.innerHTML = '';
        }

        algorithmSelect.addEventListener('change', getAlgorithmComplexity);
        inputSize.addEventListener('input', getAlgorithmComplexity);
        runButton.addEventListener('click', runAlgorithm);
        resetButton.addEventListener('click', reset);

        // Initialize
        getAlgorithmComplexity();
    </script>
</body>
</html>
