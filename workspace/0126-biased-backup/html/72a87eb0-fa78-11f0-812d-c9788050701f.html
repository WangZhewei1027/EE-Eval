<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doubly Linked List Visualization</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');
        
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #fd79a8;
            --dark: #2d3436;
            --light: #f5f6fa;
            --success: #00b894;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            color: var(--dark);
        }
        
        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease-out;
        }
        
        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            font-size: 1.2rem;
            color: var(--dark);
            opacity: 0.8;
            max-width: 700px;
            margin: 0 auto;
        }
        
        .visualization-container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }
        
        .visualization-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }
        
        .linked-list {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            position: relative;
            padding: 2rem 0;
        }
        
        .node {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            border: 3px solid var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 1.5rem;
            color: var(--primary);
            position: relative;
            z-index: 2;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            animation: popIn 0.5s ease-out forwards;
            opacity: 0;
        }
        
        .node.active {
            transform: scale(1.1);
            box-shadow: 0 0 0 5px rgba(108, 92, 231, 0.3);
        }
        
        .node::before, .node::after {
            content: '';
            position: absolute;
            width: 60px;
            height: 4px;
            background: var(--secondary);
            z-index: 1;
        }
        
        .node::before {
            right: -60px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .node::after {
            left: -60px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .node:first-child::after, .node:last-child::before {
            display: none;
        }
        
        .arrow {
            position: absolute;
            width: 20px;
            height: 20px;
            border-top: 4px solid var(--primary);
            border-right: 4px solid var(--primary);
            z-index: 3;
        }
        
        .arrow.next {
            transform: rotate(45deg);
            right: -30px;
            top: 50%;
            margin-top: -10px;
        }
        
        .arrow.prev {
            transform: rotate(-135deg);
            left: -30px;
            top: 50%;
            margin-top: -10px;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        button {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        button.primary {
            background: var(--primary);
            color: white;
        }
        
        button.primary:hover {
            background: #5649c7;
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(108, 92, 231, 0.3);
        }
        
        button.secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        
        button.secondary:hover {
            background: #f5f6fa;
            transform: translateY(-2px);
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        .legend-next {
            background: var(--primary);
        }
        
        .legend-prev {
            background: var(--accent);
        }
        
        .legend-node {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--primary);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            70% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        @keyframes highlight {
            0% { box-shadow: 0 0 0 0 rgba(108, 92, 231, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(108, 92, 231, 0); }
            100% { box-shadow: 0 0 0 0 rgba(108, 92, 231, 0); }
        }
        
        .highlight {
            animation: highlight 1.5s ease-out;
        }
        
        .footer {
            margin-top: 3rem;
            text-align: center;
            color: var(--dark);
            opacity: 0.6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Doubly Linked List</h1>
        <p>A visual representation of a doubly linked list where each node contains a reference to both the next and previous nodes, enabling bidirectional traversal.</p>
    </div>
    
    <div class="visualization-container">
        <div class="linked-list" id="linkedList">
            <!-- Nodes will be inserted here by JavaScript -->
        </div>
    </div>
    
    <div class="controls">
        <button class="primary" id="traverseNext">Traverse Next</button>
        <button class="secondary" id="traversePrev">Traverse Previous</button>
    </div>
    
    <div class="legend">
        <div class="legend-item">
            <div class="legend-node"></div>
            <span>Node</span>
        </div>
        <div class="legend-item">
            <div class="legend-color legend-next"></div>
            <span>Next pointer</span>
        </div>
        <div class="legend-item">
            <div class="legend-color legend-prev"></div>
            <span>Previous pointer</span>
        </div>
    </div>
    
    <div class="footer">
        <p>Visualization of a fundamental data structure in computer science</p>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const linkedList = document.getElementById('linkedList');
            const traverseNextBtn = document.getElementById('traverseNext');
            const traversePrevBtn = document.getElementById('traversePrev');
            
            // Create nodes
            const nodes = [];
            const values = ['A', 'B', 'C', 'D', 'E'];
            
            values.forEach((value, index) => {
                const node = document.createElement('div');
                node.className = 'node';
                node.textContent = value;
                node.dataset.index = index;
                node.style.animationDelay = `${index * 0.2}s`;
                
                // Add arrows for next and previous (except first and last)
                if (index < values.length - 1) {
                    const nextArrow = document.createElement('div');
                    nextArrow.className = 'arrow next';
                    node.appendChild(nextArrow);
                }
                
                if (index > 0) {
                    const prevArrow = document.createElement('div');
                    prevArrow.className = 'arrow prev';
                    node.appendChild(prevArrow);
                }
                
                linkedList.appendChild(node);
                nodes.push(node);
            });
            
            let currentIndex = 0;
            nodes[currentIndex].classList.add('active');
            
            // Traverse next
            traverseNextBtn.addEventListener('click', function() {
                nodes[currentIndex].classList.remove('active');
                currentIndex = (currentIndex + 1) % nodes.length;
                nodes[currentIndex].classList.add('active');
                nodes[currentIndex].classList.add('highlight');
                
                setTimeout(() => {
                    nodes[currentIndex].classList.remove('highlight');
                }, 1500);
            });
            
            // Traverse previous
            traversePrevBtn.addEventListener('click', function() {
                nodes[currentIndex].classList.remove('active');
                currentIndex = (currentIndex - 1 + nodes.length) % nodes.length;
                nodes[currentIndex].classList.add('active');
                nodes[currentIndex].classList.add('highlight');
                
                setTimeout(() => {
                    nodes[currentIndex].classList.remove('highlight');
                }, 1500);
            });
            
            // Auto-traverse demonstration
            setTimeout(() => {
                const autoTraverse = setInterval(() => {
                    traverseNextBtn.click();
                }, 2000);
                
                // Stop after one full cycle
                setTimeout(() => {
                    clearInterval(autoTraverse);
                }, values.length * 2000 + 1000);
            }, 3000);
        });
    </script>
</body>
</html>
