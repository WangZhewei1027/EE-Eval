<!DOCTYPE html>
<html>
<head>
    <title>Binary Search Tree Interactive</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        .node { margin: 10px; padding: 5px; border: 1px solid black; display: inline-block; }
        .controls { margin: 20px 0; border: 1px solid #ccc; padding: 10px; }
        .control-group { margin: 10px 0; }
        .tree-container { margin: 20px 0; }
        .highlight { background-color: #eee; }
        .path { font-weight: bold; }
    </style>
</head>
<body>
    <h1>Binary Search Tree Interactive</h1>
    
    <div class="controls">
        <div class="control-group">
            <h3>Tree Operations</h3>
            <input type="insertValue" id="insertValue" placeholder="Enter value">
            <button onclick="insertNode()">Insert</button>
            <input type="deleteValue" id="deleteValue" placeholder="Enter value">
            <button onclick="deleteNode()">Delete</button>
            <input type="searchValue" id="searchValue" placeholder="Enter value">
            <button onclick="searchNode()">Search</button>
            <button onclick="clearTree()">Clear Tree</button>
        </div>
        
        <div class="control-group">
            <h3>Traversal</h3>
            <button onclick="traverse('inorder')">Inorder</button>
            <button onclick="traverse('preorder')">Preorder</button>
            <button onclick="traverse('postorder')">Postorder</button>
            <button onclick="traverse('levelorder')">Level Order</button>
            <div id="traversalResult"></div>
        </div>
        
        <div class="control-group">
            <h3>Tree Properties</h3>
            <button onclick="getMin()">Find Min</button>
            <button onclick="getMax()">Find Max</button>
            <button onclick="getHeight()">Get Height</button>
            <button onclick="countNodes()">Count Nodes</button>
            <div id="propertyResult"></div>
        </div>
        
        <div class="control-group">
            <h3>Visualization</h3>
            <button onclick="toggleBalance()">Toggle Balance</button>
            <button onclick="togglePaths()">Toggle Paths</button>
            <button onclick="randomTree()">Generate Random Tree</button>
            <div>
                <label>Node Count: <input type="range" id="nodeCount" min="1" max="20" value="10" onchange="updateNodeCount()"></label>
                <span id="nodeCountValue">10</span>
            </div>
        </div>
    </div>
    
    <div id="treeContainer"></div>
    <div id="status"></div>
    
    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
                this.parent = null;
            }
        }
        
        let root = null;
        let showBalance = false;
        let showPaths = false;
        
        function insertNode() {
            const value = parseInt(document.getElementById('insertValue').value);
            if (isNaN(value)) {
                updateStatus("Please enter a valid number");
                return;
            }
            
            const newNode = new Node(value);
            if (root === null) {
                root = newNode;
            } else {
                insertNodeHelper(root, newNode);
            }
            renderTree();
            updateStatus(`Inserted node with value ${value}`);
        }
        
        function insertNodeHelper(node, newNode) {
            if (newNode.value < node.value) {
                if (node.left === null) {
                    node.left = newNode;
                    newNode.parent = node;
                } else {
                    insertNodeHelper(node.left, newNode);
                }
            } else if (newNode.value > node.value) {
                if (node.right === null) {
                    node.right = newNode;
                    newNode.parent = node;
                } else {
                    insertNodeHelper(node.right, newNode);
                }
            }
        }
        
        function deleteNode() {
            const value = parseInt(document.getElementById('deleteValue').value);
            if (isNaN(value)) {
                updateStatus("Please enter a valid number");
                return;
            }
            
            root = deleteNodeHelper(root, value);
            renderTree();
            updateStatus(`Deleted node with value ${value} (if found)`);
        }
        
        function deleteNodeHelper(node, value) {
            if (node) {
                if (value < node.value) {
                    node.left = deleteNodeHelper(node.left, value);
                } else if (value > node.value) {
                    node.right = deleteNodeHelper(node.right, value);
                } else {
                    if (node.left === null && node.right === null) {
                        node = null;
                    } else if (node.left === null) {
                        node = node.right;
                    } else if (node.right === null) {
                        node = node.left;
                    } else {
                        const minRight = findMinNode(node.right);
                        node.value = minRight.value;
                        node.right = deleteNodeHelper(node.right, minRight.value);
                    }
                }
            }
            return node;
        }
        
        function searchNode() {
            const value = parseInt(document.getElementById('searchValue').value);
            if (isNaN(value)) {
                updateStatus("Please enter a valid number");
                return;
            }
            
            const path = [];
            const found = searchNodeHelper(root, value, path);
            
            renderTree();
            if (found) {
                highlightPath(path);
                updateStatus(`Found node with value ${value}`);
            } else {
                updateStatus(`Node with value ${value} not found`);
            }
        }
        
        function searchNodeHelper(node, value, path) {
            if (node === null) return false;
            
            path.push(node);
            
            if (value === node.value) return true;
            if (value < node.value) return searchNodeHelper(node.left, value, path);
            return searchNodeHelper(node.right, value, path);
        }
        
        function highlightPath(path) {
            const nodes = document.querySelectorAll('.node');
            nodes.forEach(node => {
                node.classList.remove('highlight');
                node.classList.remove('path');
            });
            
            path.forEach(node => {
                const element = document.querySelector(`.node[data-value="${node.value}"]`);
                if (element) {
                    element.classList.add('highlight');
                    if (showPaths) {
                        element.classList.add('path');
                    }
                }
            });
        }
        
        function traverse(order) {
            let result = [];
            switch(order) {
                case 'inorder':
                    inorder(root, result);
                    break;
                case 'preorder':
                    preorder(root, result);
                    break;
                case 'postorder':
                    postorder(root, result);
                    break;
                case 'levelorder':
                    levelorder(root, result);
                    break;
            }
            document.getElementById('traversalResult').textContent = `${order}: ${result.join(' → ')}`;
        }
        
        function inorder(node, result) {
            if (node) {
                inorder(node.left, result);
                result.push(node.value);
                inorder(node.right, result);
            }
        }
        
        function preorder(node, result) {
            if (node) {
                result.push(node.value);
                preorder(node.left, result);
                preorder(node.right, result);
            }
        }
        
        function postorder(node, result) {
            if (node) {
                postorder(node.left, result);
                postorder(node.right, result);
                result.push(node.value);
            }
        }
        
        function levelorder(node, result) {
            if (!node) return;
            
            const queue = [node];
            while (queue.length > 0) {
                const current = queue.shift();
                result.push(current.value);
                
                if (current.left) queue.push(current.left);
                if (current.right) queue.push(current.right);
            }
        }
        
        function getMin() {
            if (!root) {
                document.getElementById('propertyResult').textContent = "Tree is empty";
                return;
            }
            const minNode = findMinNode(root);
            document.getElementById('propertyResult').textContent = `Minimum value: ${minNode.value}`;
            
            const path = [];
            findPathToNode(root, minNode.value, path);
            highlightPath(path);
        }
        
        function getMax() {
            if (!root) {
                document.getElementById('propertyResult').textContent = "Tree is empty";
                return;
            }
            const maxNode = findMaxNode(root);
            document.getElementById('propertyResult').textContent = `Maximum value: ${maxNode.value}`;
            
            const path = [];
            findPathToNode(root, maxNode.value, path);
            highlightPath(path);
        }
        
        function getHeight() {
            const height = calculateHeight(root);
            document.getElementById('propertyResult').textContent = `Tree height: ${height}`;
        }
        
        function countNodes() {
            const count = countNodesHelper(root);
            document.getElementById('propertyResult').textContent = `Node count: ${count}`;
        }
        
        function findMinNode(node) {
            while (node && node.left) {
                node = node.left;
            }
            return node;
        }
        
        function findMaxNode(node) {
            while (node && node.right) {
                node = node.right;
            }
            return node;
        }
        
        function calculateHeight(node) {
            if (!node) return -1;
            return 1 + Math.max(calculateHeight(node.left), calculateHeight(node.right));
        }
        
        function countNodesHelper(node) {
            if (!node) return 0;
            return 1 + countNodesHelper(node.left) + countNodesHelper(node.right);
        }
        
        function findPathToNode(node, value, path) {
            if (!node) return false;
            
            path.push(node);
            
            if (node.value === value) return true;
            if (value < node.value && findPathToNode(node.left, value, path)) return true;
            if (value > node.value && findPathToNode(node.right, value, path)) return true;
            
            path.pop();
            return false;
        }
        
        function clearTree() {
            root = null;
            renderTree();
            updateStatus("Tree cleared");
            document.getElementById('traversalResult').textContent = "";
            document.getElementById('propertyResult').textContent = "";
        }
        
        function toggleBalance() {
            showBalance = !showBalance;
            renderTree();
        }
        
        function togglePaths() {
            showPaths = !showPaths;
            renderTree();
        }
        
        function randomTree() {
            clearTree();
            const count = parseInt(document.getElementById('nodeCount').value);
            const values = new Set();
            
            while (values.size < count) {
                const value = Math.floor(Math.random() * 100);
                values.add(value);
            }
            
            values.forEach(value => {
                const newNode = new Node(value);
                if (root === null) {
                    root = newNode;
                } else {
                    insertNodeHelper(root, newNode);
                }
            });
            
            renderTree();
            updateStatus(`Generated random tree with ${count} nodes`);
        }
        
        function updateNodeCount() {
            const value = document.getElementById('nodeCount').value;
            document.getElementById('nodeCountValue').textContent = value;
        }
        
        function renderTree() {
            const container = document.getElementById('treeContainer');
            container.innerHTML = '';
            
            if (!root) {
                container.textContent = "Tree is empty";
                return;
            }
            
            const levels = [];
            const queue = [{node: root, level: 0}];
            
            while (queue.length > 0) {
                const current = queue.shift();
                if (!levels[current.level]) {
                    levels[current.level] = [];
                }
                levels[current.level].push(current.node);
                
                if (current.node.left) {
                    queue.push({node: current.node.left, level: current.level + 1});
                }
                if (current.node.right) {
                    queue.push({node: current.node.right, level: current.level + 1});
                }
            }
            
            levels.forEach((levelNodes, levelIndex) => {
                const levelDiv = document.createElement('div');
                levelDiv.className = 'level';
                
                levelNodes.forEach(node => {
                    const nodeDiv = document.createElement('div');
                    nodeDiv.className = 'node';
                    nodeDiv.textContent = node.value;
                    nodeDiv.setAttribute('data-value', node.value);
                    
                    if (showBalance) {
                        const balance = calculateHeight(node.right) - calculateHeight(node.left);
                        nodeDiv.textContent += ` (${balance})`;
                    }
                    
                    levelDiv.appendChild(nodeDiv);
                });
                
                container.appendChild(levelDiv);
            });
        }
        
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }
        
        // Initialize
        renderTree();
    </script>
</body>
</html>
