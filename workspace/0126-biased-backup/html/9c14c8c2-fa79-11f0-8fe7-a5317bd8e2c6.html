<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Backtracking Explorer - Interactive Demo</title>
<style>
/* Minimal styling only to keep layout usable. No colors, no animations. */
body { font-family: sans-serif; margin: 12px; color: #000; background: #fff; }
section { margin-bottom: 12px; }
label { display: inline-block; margin-right: 8px; }
input[type="text"], input[type="number"], select, textarea { font-family: monospace; }
textarea { width: 100%; height: 120px; }
button { margin: 2px; }
pre { background: #fff; padding: 6px; border: 1px solid #000; overflow: auto; max-height: 240px; }
details { margin-bottom: 8px; }
fieldset { margin-bottom: 8px; }
</style>
</head>
<body>
<h1>Backtracking Explorer</h1>

<section>
  <fieldset>
    <legend>Problem Templates / Configuration</legend>
    <label for="templateSelect">Template:</label>
    <select id="templateSelect">
      <option value="nqueens">N-Queens</option>
      <option value="subset">Subset Sum</option>
      <option value="graphcolor">Graph Coloring</option>
      <option value="custom">Custom Problem (JS)</option>
    </select>

    <div id="templateParams">
      <div id="nqueensParams">
        <label for="nSize">N (board size):</label>
        <input id="nSize" type="number" min="1" max="12" value="8">
      </div>
      <div id="subsetParams" style="display:none">
        <label for="itemsList">Items (comma integers):</label>
        <input id="itemsList" type="text" value="3,34,4,12,5,2" size="30">
        <label for="targetSum">Target:</label>
        <input id="targetSum" type="number" value="9" min="0">
      </div>
      <div id="graphParams" style="display:none">
        <label for="graphAdj">Graph (adj lists, semicolon):</label>
        <input id="graphAdj" type="text" value="1:2;2:1,3;3:2,4;4:3" size="40">
        <label for="colorCount">Colors:</label>
        <input id="colorCount" type="number" value="3" min="1">
      </div>
      <div id="customParams" style="display:none">
        <label for="customVars">Variables (comma):</label>
        <input id="customVars" type="text" size="30" placeholder="x,y,z">
        <label for="customDomains">Domains (JSON map):</label>
        <input id="customDomains" type="text" size="40" placeholder='{"x":[1,2],"y":[1,2]}' />
        <div>
          <label for="customConstraints">Constraint code (return true if partial assignment valid):</label>
          <textarea id="customConstraints">// Example: return !assignment.x || !assignment.y || assignment.x !== assignment.y;
// You can access "assignment" object. Return true if consistent so far.</textarea>
        </div>
      </div>

    </div>

    <div style="margin-top:8px">
      <button id="initBtn">Initialize Problem</button>
      <button id="resetBtn">Full Reset</button>
      <button id="clearLogBtn">Clear Log</button>
    </div>
  </fieldset>
</section>

<section>
  <fieldset>
    <legend>Solver Controls</legend>
    <div>
      <button id="stepBtn">Step</button>
      <button id="runBtn">Run</button>
      <button id="pauseBtn" disabled>Pause</button>
      <button id="nextSolBtn">Next Solution</button>
      <button id="findAllBtn">Find All (limit)</button>
    </div>

    <div style="margin-top:6px">
      <label for="heuristicSelect">Heuristic:</label>
      <select id="heuristicSelect">
        <option value="static">Static Order</option>
        <option value="mrv">MRV (Minimum Remaining Values)</option>
        <option value="random">Random Variable</option>
      </select>

      <label for="orderSelect">Value Order:</label>
      <select id="orderSelect">
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
        <option value="random">Random</option>
      </select>

      <label><input id="forwardChk" type="checkbox" checked> Forward checking</label>
      <label><input id="stopFirstChk" type="checkbox"> Stop at first solution</label>
    </div>

    <div style="margin-top:6px">
      <label for="speedRange">Speed (ms):</label>
      <input id="speedRange" type="range" min="50" max="2000" value="250">
      <label for="maxNodes">Max Nodes:</label>
      <input id="maxNodes" type="number" value="10000" min="1" style="width:80px">
      <label for="depthLimit">Depth Limit (0 = none):</label>
      <input id="depthLimit" type="number" value="0" min="0" style="width:80px">
    </div>

    <div style="margin-top:6px">
      <label><input id="manualMode" type="checkbox"> Manual decision mode</label>
      <button id="undoBtn">Undo</button>
      <button id="redoBtn">Redo</button>
      <button id="saveStateBtn">Save State (JSON)</button>
      <input id="loadStateFile" type="file" style="display:inline-block">
    </div>
  </fieldset>
</section>

<section>
  <fieldset>
    <legend>Interactive Exploration & Tree</legend>
    <div>
      <button id="exportTreeBtn">Export Tree JSON</button>
      <button id="importTreeBtn">Import Tree JSON (paste)</button>
    </div>
    <div style="display:flex; gap:12px; margin-top:8px">
      <div style="flex:1; min-width:220px;">
        <label>Searchable Assignment / Current State:</label>
        <pre id="assignPre">{}</pre>
        <label>Domains:</label>
        <pre id="domainsPre">{}</pre>
        <label>Counters:</label>
        <pre id="countersPre">nodesVisited: 0
solutions: 0
depth: 0
stackSize: 0</pre>
      </div>

      <div style="flex:2; min-width:320px;">
        <label>Backtrack Tree (click node to view):</label>
        <div id="treeDiv" style="border:1px solid #000; padding:6px; max-height:520px; overflow:auto;">
          <div id="treeRoot">[empty]</div>
        </div>
        <div style="margin-top:6px">
          <button id="jumpToNodeBtn" disabled>Explore from Selected Node</button>
          <button id="pruneNodeBtn" disabled>Mark Selected Node as Pruned</button>
          <button id="expandAllBtn">Expand All</button>
        </div>
      </div>
    </div>
  </fieldset>
</section>

<section>
  <fieldset>
    <legend>Solutions & Logs</legend>
    <label>Solutions Found:</label>
    <div id="solutionsDiv" style="border:1px solid #000; padding:6px; max-height:120px; overflow:auto;"><em>none</em></div>

    <label>Event Log:</label>
    <textarea id="logArea"></textarea>
  </fieldset>
</section>

<!-- Import area for tree JSON -->
<section>
  <fieldset>
    <legend>Advanced / Developer (manual import/export)</legend>
    <label for="importText">Import JSON:</label>
    <textarea id="importText" placeholder="Paste exported tree or state JSON here"></textarea>
    <div>
      <button id="doImportBtn">Import</button>
      <button id="downloadStateBtn">Download Current State</button>
    </div>
  </fieldset>
</section>

<script>
/*
  Backtracking Explorer - JavaScript logic
  - Multiple templates
  - Iterative backtracking with stack and domain snapshots
  - Heuristics, forward checking, manual mode, undo/redo, state save/load
  - Tree of exploration
  Minimal UI. No external libs.
*/

/* Utilities */
function deepCopy(obj) {
  return JSON.parse(JSON.stringify(obj));
}
function log(msg) {
  const area = document.getElementById('logArea');
  area.value = new Date().toLocaleTimeString() + ' - ' + msg + '\\n' + area.value;
}
function download(filename, text) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: 'application/json'}));
  a.download = filename;
  a.click();
}

/* Templates */
const templates = {
  nqueens: {
    name: "N-Queens",
    build: (params) => {
      const N = Math.max(1, Math.min(12, Number(params.n || 8)));
      const vars = [];
      const domains = {};
      for (let r=0;r<N;r++) {
        const v = 'r' + r;
        vars.push(v);
        const dom = [];
        for (let c=0;c<N;c++) dom.push(c);
        domains[v] = dom;
      }
      // constraint function: no two queens same column or diagonal
      function constraint(assignment) {
        const keys = Object.keys(assignment);
        for (let i=0;i<keys.length;i++) {
          for (let j=i+1;j<keys.length;j++) {
            const r1 = parseInt(keys[i].slice(1));
            const r2 = parseInt(keys[j].slice(1));
            const c1 = assignment[keys[i]];
            const c2 = assignment[keys[j]];
            if (c1 === c2) return false;
            if (Math.abs(r1 - r2) === Math.abs(c1 - c2)) return false;
          }
        }
        return true;
      }
      return {vars, domains, constraints: [constraint], text: 'Place N queens so none attack.'};
    }
  },

  subset: {
    name: "Subset Sum",
    build: (params) => {
      const items = (params.items || "3,34,4,12,5,2").split(',').map(s=>Number(s.trim())).filter(n=>!Number.isNaN(n));
      const target = Number(params.target || 9);
      const vars = items.map((_,i)=>'i'+i);
      const domains = {};
      vars.forEach((v,i)=> domains[v] = [0,1]); // 0 = excluded, 1 = included
      function constraint(assignment) {
        // partial check: sum included so far cannot exceed target
        let sum = 0, remainingMax = 0;
        for (let k=0;k<items.length;k++) {
          const v = 'i'+k;
          if (assignment[v] === 1) sum += items[k];
          else if (assignment[v] === 0) { /* excluded */ }
          else remainingMax += items[k];
        }
        if (sum > target) return false;
        // if all assigned, require equality
        const allAssigned = vars.every(v=>assignment.hasOwnProperty(v));
        if (allAssigned) return sum === target;
        return true;
      }
      return {vars, domains, constraints: [constraint], text: 'Choose subset equal to target.'};
    }
  },

  graphcolor: {
    name: "Graph Coloring",
    build: (params) => {
      // parse adjacency like "1:2;2:1,3;3:2,4;4:3"
      const adjStr = (params.adj || "1:2;2:1,3;3:2,4;4:3");
      const colorCount = Math.max(1, Number(params.colors || 3));
      const nodes = [];
      const adj = {};
      const parts = adjStr.split(';').map(s=>s.trim()).filter(Boolean);
      parts.forEach(p=>{
        const [k,rest] = p.split(':');
        const key = k.trim();
        nodes.push(key);
        adj[key] = (rest || '').split(',').map(x=>x.trim()).filter(Boolean);
      });
      const vars = nodes.slice();
      const domains = {};
      vars.forEach(v=> domains[v] = Array.from({length:colorCount}, (_,i)=>i+1));
      function constraint(assignment) {
        for (let v in assignment) {
          const col = assignment[v];
          const neighbors = adj[v] || [];
          for (let nb of neighbors) {
            if (assignment.hasOwnProperty(nb) && assignment[nb] === col) return false;
          }
        }
        return true;
      }
      return {vars, domains, constraints: [constraint], text: 'Color graph so adjacent nodes differ.'};
    }
  },

  custom: {
    name: "Custom",
    build: (params) => {
      const vars = (params.vars || '').split(',').map(s=>s.trim()).filter(Boolean);
      let domains = {};
      try {
        domains = params.domains ? JSON.parse(params.domains) : {};
      } catch(e) {
        domains = {};
      }
      // ensure domains arrays
      vars.forEach(v=>{
        if (!Array.isArray(domains[v])) domains[v] = domains[v] === undefined ? [0,1] : [domains[v]];
      });
      // constraint code provided by user
      let fn;
      try {
        const code = params.constraintCode || 'return true;';
        fn = new Function('assignment', code);
      } catch(e) {
        fn = ()=>true;
      }
      return {vars, domains, constraints: [fn], text: 'Custom constraints.'};
    }
  }
};

/* Solver state */
let PROBLEM = null;
let ASSIGNMENT = {};
let DOMAINS = {};
let STACK = []; // frames: {var, index, domainsBefore, parentNode}
let TREE = null; // root node
let CURRENT_NODE = null;
let NODES_VISITED = 0;
let SOLUTIONS = [];
let SOL_LIMIT = 1000;
let RUN_TIMER = null;
let HISTORY = [];
let HISTORY_INDEX = -1;

/* Tree node id generator */
let nodeIdCounter = 0;
function makeNode(parent, varName, value, assignmentSnapshot) {
  return {
    id: ++nodeIdCounter,
    parent: parent ? parent.id : null,
    var: varName,
    value: value,
    status: 'trying', // trying, pruned, solution, backtracked
    children: [],
    assignment: deepCopy(assignmentSnapshot || {})
  };
}

/* Initialize or reset */
function initProblemFromUI() {
  const tpl = document.getElementById('templateSelect').value;
  const params = {};
  if (tpl === 'nqueens') {
    params.n = Number(document.getElementById('nSize').value);
  } else if (tpl === 'subset') {
    params.items = document.getElementById('itemsList').value;
    params.target = Number(document.getElementById('targetSum').value);
  } else if (tpl === 'graphcolor') {
    params.adj = document.getElementById('graphAdj').value;
    params.colors = Number(document.getElementById('colorCount').value);
  } else if (tpl === 'custom') {
    params.vars = document.getElementById('customVars').value;
    params.domains = document.getElementById('customDomains').value;
    params.constraintCode = document.getElementById('customConstraints').value;
  }
  const builder = templates[tpl].build;
  const prob = builder(params);
  PROBLEM = {
    name: templates[tpl].name,
    vars: prob.vars,
    domainsTemplate: deepCopy(prob.domains),
    constraints: prob.constraints,
    text: prob.text
  };
  resetSolver();
  log('Initialized problem: ' + PROBLEM.name + ' with ' + PROBLEM.vars.length + ' variables.');
  updateUI();
}

/* Reset solver state to initial problem */
function resetSolver() {
  ASSIGNMENT = {};
  DOMAINS = deepCopy(PROBLEM ? PROBLEM.domainsTemplate : {});
  STACK = [];
  TREE = { id: 0, parent: null, var: null, value: null, status: 'root', children: [], assignment: {} };
  CURRENT_NODE = TREE;
  NODES_VISITED = 0;
  SOLUTIONS = [];
  nodeIdCounter = 0;
  HISTORY = [];
  HISTORY_INDEX = -1;
  saveHistorySnapshot('initial');
  updateTreeView();
  updateUI();
}

/* Save snapshot for undo/redo */
function saveHistorySnapshot(note) {
  try {
    const snap = {
      assignment: deepCopy(ASSIGNMENT),
      domains: deepCopy(DOMAINS),
      stack: deepCopy(STACK),
      tree: deepCopy(TREE),
      currentNodeId: CURRENT_NODE ? CURRENT_NODE.id : null,
      nodesVisited: NODES_VISITED,
      solutions: deepCopy(SOLUTIONS)
    };
    // truncate future if undid
    if (HISTORY_INDEX < HISTORY.length - 1) HISTORY = HISTORY.slice(0, HISTORY_INDEX + 1);
    HISTORY.push(snap);
    HISTORY_INDEX++;
    // limit history size
    if (HISTORY.length > 200) HISTORY.shift(), HISTORY_INDEX--;
  } catch(e) {
    // ignore heavy snapshots issues
  }
}

/* Undo/Redo */
function undo() {
  if (HISTORY_INDEX <= 0) { log('No more undo'); return; }
  HISTORY_INDEX--;
  restoreHistory(HISTORY[HISTORY_INDEX]);
  log('Undo');
}
function redo() {
  if (HISTORY_INDEX >= HISTORY.length - 1) { log('No more redo'); return; }
  HISTORY_INDEX++;
  restoreHistory(HISTORY[HISTORY_INDEX]);
  log('Redo');
}
function restoreHistory(snap) {
  if (!snap) return;
  ASSIGNMENT = deepCopy(snap.assignment);
  DOMAINS = deepCopy(snap.domains);
  STACK = deepCopy(snap.stack);
  TREE = deepCopy(snap.tree);
  // find node by id to set CURRENT_NODE reference in runtime structure
  function findNodeById(node, id) {
    if (!node) return null;
    if (node.id === id) return node;
    for (let ch of (node.children||[])) {
      const found = findNodeById(ch, id);
      if (found) return found;
    }
    return null;
  }
  CURRENT_NODE = findNodeById(TREE, snap.currentNodeId) || TREE;
  NODES_VISITED = snap.nodesVisited || 0;
  SOLUTIONS = deepCopy(snap.solutions || []);
  updateTreeView();
  updateUI();
}

/* Heuristic selection */
function selectNextVariable() {
  const heuristic = document.getElementById('heuristicSelect').value;
  const unassigned = PROBLEM.vars.filter(v => !ASSIGNMENT.hasOwnProperty(v));
  if (unassigned.length === 0) return null;
  if (heuristic === 'static') return unassigned[0];
  if (heuristic === 'random') return unassigned[Math.floor(Math.random() * unassigned.length)];
  if (heuristic === 'mrv') {
    // pick var with smallest domain size
    let best = unassigned[0];
    let bestLen = (DOMAINS[best] || []).length;
    for (let v of unassigned) {
      const len = (DOMAINS[v] || []).length;
      if (len < bestLen) { best = v; bestLen = len; }
    }
    return best;
  }
  return unassigned[0];
}

/* Value order */
function orderValues(arr) {
  const order = document.getElementById('orderSelect').value;
  const copy = arr.slice();
  if (order === 'asc') return copy.sort((a,b)=> (a<b?-1: (a>b?1:0)));
  if (order === 'desc') return copy.sort((a,b)=> (a>b?-1: (a<b?1:0)));
  if (order === 'random') {
    for (let i=copy.length-1;i>0;i--) {
      const j = Math.floor(Math.random()*(i+1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }
  return copy;
}

/* Check constraints: all constraints must return true for partial assignment */
function checkConstraints(assignment) {
  const fns = PROBLEM.constraints;
  for (let fn of fns) {
    try {
      if (!fn(assignment)) return false;
    } catch(e) {
      // If constraint throws, treat as failure but log it
      log('Constraint error: ' + (e.message || e));
      return false;
    }
  }
  return true;
}

/* Forward checking: reduce domains of unassigned vars given current assignment */
function forwardFilterDomains(assignment, domains) {
  const newDomains = deepCopy(domains);
  for (let v of PROBLEM.vars) {
    if (assignment.hasOwnProperty(v)) continue;
    const avail = newDomains[v] || [];
    const filtered = avail.filter(val => {
      const tmp = Object.assign({}, assignment);
      tmp[v] = val;
      return checkConstraints(tmp);
    });
    newDomains[v] = filtered;
  }
  return newDomains;
}

/* Step the solver once */
function solverStep() {
  if (!PROBLEM) { log('No problem initialized'); return; }
  const maxNodes = Math.max(1, Number(document.getElementById('maxNodes').value || 10000));
  if (NODES_VISITED >= maxNodes) {
    log('Max nodes reached');
    stopRun();
    return;
  }
  const depthLimit = Number(document.getElementById('depthLimit').value || 0);
  // If stack empty, pick next var and push an initial frame
  if (STACK.length === 0) {
    const nextVar = selectNextVariable();
    if (nextVar === null) {
      // No variables -> trivial solution
      recordSolution();
      saveHistorySnapshot('solution');
      updateUI();
      return;
    }
    // prepare domain ordering
    const dom = orderValues(DOMAINS[nextVar] || []);
    // update the underlying DOM representation
    DOMAINS[nextVar] = dom;
    // push frame storing domainsBefore as snapshot
    const frame = { var: nextVar, index: 0, domainsBefore: deepCopy(DOMAINS), parentNode: CURRENT_NODE };
    STACK.push(frame);
    saveHistorySnapshot('push frame ' + nextVar);
    updateUI();
    return;
  }

  // operate on top frame
  const frame = STACK[STACK.length - 1];
  const v = frame.var;
  const domList = DOMAINS[v] || [];
  // domain exhausted -> backtrack
  if (frame.index >= domList.length) {
    // mark backtrack on parent node if any
    // when popping, restore domains and delete assignment if exists
    if (ASSIGNMENT.hasOwnProperty(v)) {
      delete ASSIGNMENT[v];
    }
    // set current node to parent of frame.parentNode
    if (frame.parentNode) {
      // mark that the parent branch is backtracked for UI clarity
      frame.parentNode.status = frame.parentNode.status || 'backtracked';
    }
    // pop
    STACK.pop();
    // restore domains to snapshot
    DOMAINS = deepCopy(frame.domainsBefore);
    CURRENT_NODE = frame.parentNode || TREE;
    saveHistorySnapshot('pop ' + v);
    updateUI();
    log('Backtracked from var ' + v);
    return;
  }

  // try next value
  const val = domList[frame.index];
  frame.index++;
  NODES_VISITED++;
  // create node in tree
  const childNode = makeNode(frame.parentNode || CURRENT_NODE, v, val, Object.assign({}, ASSIGNMENT, { [v]: val }));
  // attach to parent
  const parentNode = frame.parentNode || CURRENT_NODE;
  parentNode.children.push(childNode);
  CURRENT_NODE = childNode;

  // perform assignment
  ASSIGNMENT[v] = val;
  saveHistorySnapshot('assign ' + v + '=' + val);
  log('Try ' + v + ' = ' + JSON.stringify(val));
  // check constraints
  if (!checkConstraints(ASSIGNMENT)) {
    // prune this branch
    childNode.status = 'pruned';
    delete ASSIGNMENT[v];
    // restore domains remain as at top of frame.domainsBefore (we didn't permanently alter them)
    log('Pruned by constraint: ' + v + '=' + JSON.stringify(val));
    updateTreeView();
    updateUI();
    return;
  }

  // optionally forward check
  if (document.getElementById('forwardChk').checked) {
    const newDom = forwardFilterDomains(ASSIGNMENT, DOMAINS);
    // if any unassigned var has empty domain -> prune
    const unassigned = PROBLEM.vars.filter(x => !ASSIGNMENT.hasOwnProperty(x));
    let dead = false;
    for (let u of unassigned) {
      if (!newDom[u] || newDom[u].length === 0) { dead = true; break; }
    }
    if (dead) {
      childNode.status = 'pruned';
      delete ASSIGNMENT[v];
      log('Pruned by forward checking at ' + v + '=' + JSON.stringify(val));
      updateTreeView();
      updateUI();
      return;
    } else {
      // accept the new domains (propagate)
      DOMAINS = newDom;
    }
  }

  // check if solution
  const allAssigned = PROBLEM.vars.every(x => ASSIGNMENT.hasOwnProperty(x));
  if (allAssigned) {
    childNode.status = 'solution';
    recordSolution();
    // after recording solution, prepare to try next choices: remove last assignment and restore domains to frame.domainsBefore
    delete ASSIGNMENT[v];
    DOMAINS = deepCopy(frame.domainsBefore);
    CURRENT_NODE = frame.parentNode || TREE;
    saveHistorySnapshot('found solution');
    updateTreeView();
    updateUI();
    if (document.getElementById('stopFirstChk').checked) {
      log('Stopping at first solution.');
      stopRun();
    }
    return;
  }

  // depth limit check
  if (depthLimit > 0 && STACK.length >= depthLimit) {
    childNode.status = 'pruned';
    delete ASSIGNMENT[v];
    DOMAINS = deepCopy(frame.domainsBefore);
    CURRENT_NODE = frame.parentNode || TREE;
    log('Pruned due to depth limit at ' + v + '=' + JSON.stringify(val));
    updateTreeView();
    updateUI();
    return;
  }

  // push next variable frame for further exploration
  const nextVar = selectNextVariable();
  if (!nextVar) {
    // should not happen because we checked allAssigned earlier
    log('No next var available unexpectedly.');
    delete ASSIGNMENT[v];
    DOMAINS = deepCopy(frame.domainsBefore);
    CURRENT_NODE = frame.parentNode || TREE;
    updateTreeView();
    updateUI();
    return;
  }
  // order its values according to user selection; update DOMAINS snapshot for that var
  DOMAINS[nextVar] = orderValues(DOMAINS[nextVar] || []);
  const newFrame = { var: nextVar, index: 0, domainsBefore: deepCopy(DOMAINS), parentNode: childNode };
  STACK.push(newFrame);
  saveHistorySnapshot('push ' + nextVar);
  updateTreeView();
  updateUI();
}

/* Record a solution snapshot */
function recordSolution() {
  const sol = deepCopy(ASSIGNMENT);
  SOLUTIONS.push(sol);
  const solDiv = document.getElementById('solutionsDiv');
  const entry = document.createElement('div');
  entry.textContent = JSON.stringify(sol);
  solDiv.appendChild(entry);
  log('Solution #' + SOLUTIONS.length + ': ' + JSON.stringify(sol));
}

/* Run / Pause management */
function startRun() {
  if (!PROBLEM) { log('Initialize problem first'); return; }
  if (RUN_TIMER) return;
  const ms = Number(document.getElementById('speedRange').value || 250);
  document.getElementById('runBtn').disabled = true;
  document.getElementById('pauseBtn').disabled = false;
  log('Run started');
  RUN_TIMER = setInterval(() => {
    const stopOnFirst = document.getElementById('stopFirstChk').checked;
    solverStep();
    if (RUN_TIMER && stopOnFirst && SOLUTIONS.length > 0) {
      stopRun();
    }
    // stop if reached node limit
    const maxNodes = Math.max(1, Number(document.getElementById('maxNodes').value || 10000));
    if (NODES_VISITED >= maxNodes) stopRun();
  }, ms);
}
function stopRun() {
  if (RUN_TIMER) {
    clearInterval(RUN_TIMER);
    RUN_TIMER = null;
    document.getElementById('runBtn').disabled = false;
    document.getElementById('pauseBtn').disabled = true;
    log('Run stopped');
  }
}

/* Update UI elements to reflect state */
function updateUI() {
  document.getElementById('assignPre').textContent = JSON.stringify(ASSIGNMENT, null, 2);
  document.getElementById('domainsPre').textContent = JSON.stringify(DOMAINS, null, 2);
  document.getElementById('countersPre').textContent =
    'nodesVisited: ' + NODES_VISITED + '\\n' +
    'solutions: ' + SOLUTIONS.length + '\\n' +
    'depth: ' + STACK.length + '\\n' +
    'stackSize: ' + STACK.length;
  // enable/disable undo/redo
  document.getElementById('undoBtn').disabled = (HISTORY_INDEX <= 0);
  document.getElementById('redoBtn').disabled = (HISTORY_INDEX >= HISTORY.length - 1);
  // update next solution button
  document.getElementById('nextSolBtn').disabled = false;
  // Keep tree view updated
  updateTreeView();
}

/* Update tree view rendering (text-only nested structure) */
function updateTreeView() {
  const container = document.getElementById('treeDiv');
  container.innerHTML = '';
  function renderNode(node, depth) {
    const el = document.createElement('div');
    el.style = '';
    const label = document.createElement('span');
    if (node.id === 0) label.textContent = '[root]';
    else label.textContent = node.var + ' = ' + JSON.stringify(node.value) + ' (' + node.status + ')';
    label.style.cursor = 'pointer';
    label.dataset.nodeId = node.id;
    label.onclick = () => { selectTreeNode(node.id); };
    el.appendChild(label);
    if (node.children && node.children.length > 0) {
      const chContainer = document.createElement('div');
      chContainer.style.marginLeft = '12px';
      for (let ch of node.children) chContainer.appendChild(renderNode(ch, depth+1));
      el.appendChild(chContainer);
    }
    return el;
  }
  const rootEl = renderNode(TREE, 0);
  container.appendChild(rootEl);
}

/* Selected tree node logic */
let SELECTED_NODE_ID = null;
function findNodeById(node, id) {
  if (!node) return null;
  if (node.id === id) return node;
  for (let ch of (node.children||[])) {
    const f = findNodeById(ch, id);
    if (f) return f;
  }
  return null;
}
function selectTreeNode(id) {
  SELECTED_NODE_ID = id;
  const node = findNodeById(TREE, id);
  if (!node) return;
  // show node assignment in a quick preview area
  document.getElementById('assignPre').textContent = JSON.stringify(node.assignment, null, 2);
  document.getElementById('jumpToNodeBtn').disabled = false;
  document.getElementById('pruneNodeBtn').disabled = false;
}

/* Jump to a selected node: set solver state as if we are at that assignment */
function exploreFromSelectedNode() {
  if (SELECTED_NODE_ID === null) return;
  const node = findNodeById(TREE, SELECTED_NODE_ID);
  if (!node) return;
  // build assignment from node and set domains by forward filtering
  ASSIGNMENT = deepCopy(node.assignment || {});
  DOMAINS = deepCopy(PROBLEM.domainsTemplate);
  // apply forward filter from current assignment
  if (document.getElementById('forwardChk').checked) {
    DOMAINS = forwardFilterDomains(ASSIGNMENT, DOMAINS);
  }
  // rebuild stack to a minimal state: push a frame for next variable if any
  STACK = [];
  const nextVar = selectNextVariable();
  if (nextVar) {
    DOMAINS[nextVar] = orderValues(DOMAINS[nextVar] || []);
    STACK.push({ var: nextVar, index: 0, domainsBefore: deepCopy(DOMAINS), parentNode: node });
  }
  CURRENT_NODE = node;
  saveHistorySnapshot('explore from node ' + node.id);
  updateUI();
  log('Exploring from node ' + node.id);
}

/* Mark node as pruned manually */
function pruneSelectedNode() {
  if (SELECTED_NODE_ID === null) return;
  const node = findNodeById(TREE, SELECTED_NODE_ID);
  if (!node) return;
  node.status = 'pruned';
  saveHistorySnapshot('prune node ' + node.id);
  updateTreeView();
  updateUI();
  log('Node ' + node.id + ' marked pruned by user.');
}

/* Export / Import tree or full state */
function exportTreeJSON() {
  const out = JSON.stringify(TREE, null, 2);
  download('backtrack_tree.json', out);
}
function importTreeFromText(txt) {
  try {
    const obj = JSON.parse(txt);
    TREE = obj;
    CURRENT_NODE = TREE;
    saveHistorySnapshot('import tree');
    updateTreeView();
    updateUI();
    log('Tree imported.');
  } catch(e) {
    log('Import failed: ' + e.message);
  }
}
function downloadState() {
  const state = { PROBLEM, ASSIGNMENT, DOMAINS, STACK, TREE, NODES_VISITED, SOLUTIONS };
  download('bt_state.json', JSON.stringify(state, null, 2));
}

/* Save / Load state from file input */
document.getElementById('loadStateFile').addEventListener('change', function(e){
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const obj = JSON.parse(ev.target.result);
      // restore
      if (obj.PROBLEM) PROBLEM = obj.PROBLEM;
      ASSIGNMENT = obj.ASSIGNMENT || {};
      DOMAINS = obj.DOMAINS || (PROBLEM ? deepCopy(PROBLEM.domainsTemplate) : {});
      STACK = obj.STACK || [];
      TREE = obj.TREE || { id: 0, parent: null, var: null, value: null, status: 'root', children: [], assignment: {} };
      NODES_VISITED = obj.NODES_VISITED || 0;
      SOLUTIONS = obj.SOLUTIONS || [];
      CURRENT_NODE = TREE;
      saveHistorySnapshot('loaded file');
      updateTreeView();
      updateUI();
      log('State loaded from file.');
    } catch(e) {
      log('Failed to load state: ' + e.message);
    }
  };
  reader.readAsText(f);
});

/* Wiring UI controls */
document.getElementById('templateSelect').addEventListener('change', function(e){
  const val = e.target.value;
  document.getElementById('nqueensParams').style.display = val === 'nqueens' ? '' : 'none';
  document.getElementById('subsetParams').style.display = val === 'subset' ? '' : 'none';
  document.getElementById('graphParams').style.display = val === 'graphcolor' ? '' : 'none';
  document.getElementById('customParams').style.display = val === 'custom' ? '' : 'none';
});

document.getElementById('initBtn').addEventListener('click', function(){ initProblemFromUI(); });
document.getElementById('resetBtn').addEventListener('click', function(){ if (PROBLEM) resetSolver(); });
document.getElementById('clearLogBtn').addEventListener('click', function(){ document.getElementById('logArea').value = ''; });

document.getElementById('stepBtn').addEventListener('click', function(){ solverStep(); });
document.getElementById('runBtn').addEventListener('click', function(){ startRun(); });
document.getElementById('pauseBtn').addEventListener('click', function(){ stopRun(); });
document.getElementById('nextSolBtn').addEventListener('click', function(){
  // run until next solution or node limit
  const stopAtFirstBox = document.getElementById('stopFirstChk');
  const prev = stopAtFirstBox.checked;
  stopAtFirstBox.checked = true;
  startRun();
  // Will stop automatically by stopAtFirst behavior
  setTimeout(()=> { stopAtFirstBox.checked = prev; }, 1000);
});
document.getElementById('findAllBtn').addEventListener('click', function(){
  const limit = Number(prompt('Find up to how many solutions?', '100')) || 100;
  SOL_LIMIT = limit;
  const oldStop = document.getElementById('stopFirstChk').checked;
  document.getElementById('stopFirstChk').checked = false;
  startRun();
  // We'll rely on maxNodes or user pause to stop; user can pause.
});

document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);
document.getElementById('saveStateBtn').addEventListener('click', function(){
  downloadState();
});
document.getElementById('stepBtn').addEventListener('dblclick', function(){ // double click to do many steps quickly
  for (let i=0;i<10;i++) solverStep();
});

document.getElementById('exportTreeBtn').addEventListener('click', exportTreeJSON);
document.getElementById('importTreeBtn').addEventListener('click', function(){
  const txt = prompt('Paste tree JSON here:');
  if (!txt) return;
  importTreeFromText(txt);
});

document.getElementById('jumpToNodeBtn').addEventListener('click', exploreFromSelectedNode);
document.getElementById('pruneNodeBtn').addEventListener('click', pruneSelectedNode);
document.getElementById('expandAllBtn').addEventListener('click', function(){
  updateTreeView();
});

document.getElementById('doImportBtn').addEventListener('click', function(){
  const txt = document.getElementById('importText').value;
  if (!txt) return;
  // determine if it's a state or a tree
  try {
    const obj = JSON.parse(txt);
    if (obj.TREE || obj.tree) {
      TREE = obj.TREE || obj.tree;
      updateTreeView();
      log('Imported tree from JSON');
    } else if (obj.PROBLEM || obj.problem) {
      // assume full state
      if (obj.PROBLEM) PROBLEM = obj.PROBLEM;
      ASSIGNMENT = obj.ASSIGNMENT || {};
      DOMAINS = obj.DOMAINS || (PROBLEM ? deepCopy(PROBLEM.domainsTemplate) : {});
      STACK = obj.STACK || [];
      TREE = obj.TREE || { id: 0, parent: null, var: null, value: null, status: 'root', children: [], assignment: {} };
      NODES_VISITED = obj.NODES_VISITED || 0;
      SOLUTIONS = obj.SOLUTIONS || [];
      updateTreeView();
      updateUI();
      log('Imported state JSON');
    } else {
      TREE = obj;
      updateTreeView();
      log('Imported tree');
    }
  } catch(e) {
    log('Import failed: ' + e.message);
  }
});

document.getElementById('downloadStateBtn').addEventListener('click', downloadState);

/* Node selection by clicking tree label sets SELECTED_NODE_ID */
document.getElementById('treeDiv').addEventListener('click', function(e){
  const target = e.target;
  if (target && target.dataset && target.dataset.nodeId) {
    selectTreeNode(Number(target.dataset.nodeId));
  }
});

/* Simple initialization */
(function boot() {
  // attach loadStateFile to handler shown above
  // populate initial problem
  initProblemFromUI();
  log('Boot complete');
})();

</script>
