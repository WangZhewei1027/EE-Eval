<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Complexity Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.5;
        }
        #output {
            margin-top: 20px;
            border: 1px solid black;
            padding: 10px;
        }
    </style>
    <script>
        let spaceUsage = 0;

        function increaseSpace() {
            const inputSize = parseInt(document.getElementById("sizeInput").value);
            if (!isNaN(inputSize) && inputSize > 0) {
                spaceUsage += inputSize;
                document.getElementById("output").innerText = "Current Space Usage: " + spaceUsage;
            } else {
                alert("Please enter a valid size.");
            }
        }

        function decreaseSpace() {
            const inputSize = parseInt(document.getElementById("sizeInput").value);
            if (!isNaN(inputSize) && inputSize > 0) {
                spaceUsage = Math.max(0, spaceUsage - inputSize);
                document.getElementById("output").innerText = "Current Space Usage: " + spaceUsage;
            } else {
                alert("Please enter a valid size.");
            }
        }

        function resetSpace() {
            spaceUsage = 0;
            document.getElementById("output").innerText = "Current Space Usage: " + spaceUsage;
            document.getElementById("sizeInput").value = "";
        }

        function toggleDetails() {
            const details = document.getElementById("details");
            details.style.display = (details.style.display === "none" || details.style.display === "") ? "block" : "none";
        }

        function calculateCapacity() {
            const capacity = parseInt(document.getElementById("capacityInput").value);
            if (!isNaN(capacity) && capacity > 0) {
                const percentageUsed = (spaceUsage / capacity) * 100;
                document.getElementById("capacityOutput").innerText = "Used capacity: " + percentageUsed.toFixed(2) + "%";
            } else {
                alert("Please enter a valid capacity.");
            }
        }
    </script>
</head>
<body>
    <h1>Space Complexity Interactive Demo</h1>
    <p>This demo helps visualize concept of Space Complexity.</p>

    <label for="sizeInput">Enter size to increase/decrease space usage:</label>
    <input type="number" id="sizeInput" value="0" min="1">
    <button onclick="increaseSpace()">Increase Space Usage</button>
    <button onclick="decreaseSpace()">Decrease Space Usage</button>
    <button onclick="resetSpace()">Reset Space Usage</button>
    <button onclick="toggleDetails()">Toggle Details</button>

    <div id="details" style="display:none;">
        <label for="capacityInput">Enter total capacity:</label>
        <input type="number" id="capacityInput" value="0" min="1">
        <button onclick="calculateCapacity()">Calculate Capacity Usage</button>
        <div id="capacityOutput"></div>
    </div>

    <div id="output">Current Space Usage: 0</div>
</body>
</html>
