<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch and Bound Interactive Example</title>
</head>
<body>
    <h1>Branch and Bound Example</h1>
    <p>Use the controls below to explore the Branch and Bound algorithm for solving optimization problems.</p>

    <div>
        <label for="items">Enter Number of Items (2-10): </label>
        <input type="number" id="items" min="2" max="10" value="5">
        <button onclick="generateItems()">Generate Items</button>
    </div>

    <div>
        <h2>Items:</h2>
        <ul id="itemList"></ul>
    </div>

    <div>
        <label for="capacity">Enter Capacity: </label>
        <input type="number" id="capacity" value="15">
    </div>

    <button onclick="startBranchAndBound()">Start Branch and Bound</button>

    <h2>Results:</h2>
    <div id="results"></div>

    <script>
        let items = [];
        let weights = [];
        let values = [];

        function generateItems() {
            const numItems = document.getElementById('items').value;
            items = [];
            for (let i = 0; i < numItems; i++) {
                const weight = Math.floor(Math.random() * 10) + 1;
                const value = Math.floor(Math.random() * 20) + 1;
                items.push({ weight, value });
                weights.push(weight);
                values.push(value);
            }
            displayItems();
        }

        function displayItems() {
            const itemList = document.getElementById('itemList');
            itemList.innerHTML = '';
            items.forEach((item, index) => {
                itemList.innerHTML += `<li>Item ${index + 1}: Weight - ${item.weight}, Value - ${item.value}</li>`;
            });
        }

        function startBranchAndBound() {
            const capacity = document.getElementById('capacity').value;
            const result = branchAndBound(capacity);
            displayResults(result);
        }

        function branchAndBound(capacity) {
            const n = items.length;
            let maxValue = 0;
            let bestItems = [];

            function traverse(node, level, totalWeight, totalValue) {
                if (level === n) {
                    if (totalValue > maxValue && totalWeight <= capacity) {
                        maxValue = totalValue;
                        bestItems = [...node];
                    }
                    return;
                }

                // Include the current item
                traverse([...node, level], level + 1, totalWeight + weights[level], totalValue + values[level]);

                // Exclude the current item
                traverse(node, level + 1, totalWeight, totalValue);
            }

            traverse([], 0, 0, 0);
            return { maxValue, bestItems };
        }

        function displayResults(result) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `Maximum Value: ${result.maxValue}<br>Items Included: ${result.bestItems.map(i => `Item ${i + 1}`).join(', ')}`;
        }
    </script>
</body>
</html>
