<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Multiset Explorer - Interactive Playground</title>
<style>
/* Extremely minimal styling: plain black text on white background, basic layout only */
html,body { height: 100%; margin: 8px; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; color: #000; background: #fff; }
section { margin-bottom: 16px; padding: 6px 0; }
label { display: inline-block; margin-right: 8px; }
button, input, select, textarea { margin: 4px 6px 4px 0; font: inherit; }
textarea { width:100%; height:80px; }
.controls-row { margin-bottom:8px; }
.split { display: flex; gap: 12px; align-items: flex-start; }
.column { flex: 1 1 0; min-width: 240px; }
.small { width: 90px; }
.listbox { width:100%; height:160px; }
table { border-collapse: collapse; }
td, th { padding: 2px 6px; vertical-align: top; }
.code { font-family: monospace; white-space: pre-wrap; }
.op-list { max-height:160px; overflow:auto; border: 1px solid #ddd; padding: 6px; }
.badge { display:inline-block; padding:2px 6px; margin-left:6px; border:1px solid #ddd; }
</style>
</head>
<body>

<h2>Multiset Explorer</h2>

<section>
  <div class="controls-row">
    <label for="ms-select">Active multiset:</label>
    <select id="ms-select"></select>
    <button id="new-ms">New</button>
    <button id="clone-ms">Clone</button>
    <button id="rename-ms">Rename</button>
    <button id="delete-ms">Delete</button>
    <span class="badge" id="ms-stats">distinct:0 total:0</span>
  </div>

  <div class="controls-row">
    <label for="element-input">Element:</label>
    <input id="element-input" placeholder="text or number" />
    <label for="multiplicity-input">Multiplicity:</label>
    <input id="multiplicity-input" class="small" type="number" value="1" min="0" />
    <button id="add-element">Add / Set</button>
    <button id="inc-element">+1</button>
    <button id="dec-element">-1</button>
    <button id="remove-element">Remove</button>
  </div>

  <div class="controls-row">
    <label for="bulk-input">Bulk add (comma/newline separated, optional multiplicities like a:3):</label>
  </div>
  <div class="controls-row">
    <textarea id="bulk-input" placeholder="apple:2, banana, orange:4"></textarea>
    <button id="apply-bulk">Apply to active</button>
    <button id="clear-bulk">Clear</button>
  </div>

  <div class="controls-row">
    <label>Quick element generator:</label>
    <select id="gen-type">
      <option value="words">words</option>
      <option value="ints">integers</option>
      <option value="letters">letters</option>
      <option value="pattern">pattern</option>
    </select>
    <label for="gen-count">distinct</label>
    <input id="gen-count" type="number" value="5" class="small" min="1" />
    <label for="gen-multi-max">max multiplicity</label>
    <input id="gen-multi-max" type="number" value="5" class="small" min="1" />
    <button id="gen-add">Generate and add</button>
    <button id="gen-replace">Generate and replace</button>
    <input id="gen-pattern" placeholder="pattern e.g. item_{i}" class="small" />
  </div>
</section>

<section>
  <div class="split">
    <div class="column">
      <h4>Multiset View</h4>
      <div class="controls-row">
        <label>View mode:</label>
        <select id="view-mode">
          <option value="compact">Compact (element:count)</option>
          <option value="expanded">Expanded (repeated items)</option>
          <option value="sorted">Sorted by multiplicity desc</option>
        </select>
        <label for="expand-limit">expand limit</label>
        <input id="expand-limit" type="number" value="50" class="small" min="1" />
      </div>
      <div id="ms-view" class="code"></div>
      <div class="controls-row">
        <button id="copy-as-list">Copy expanded list to clipboard</button>
        <button id="export-json">Export JSON</button>
        <button id="import-json">Import JSON</button>
      </div>
      <div class="controls-row">
        <label for="filter-input">Filter elements (substring or regex /.../):</label>
        <input id="filter-input" class="small" />
        <button id="apply-filter">Apply</button>
        <button id="clear-filter">Clear</button>
      </div>
    </div>

    <div class="column">
      <h4>Operations (between A and B or single)</h4>
      <div class="controls-row">
        <label for="lhs-select">LHS:</label>
        <select id="lhs-select"></select>
        <label for="rhs-select">RHS:</label>
        <select id="rhs-select"></select>
      </div>

      <div class="controls-row">
        <button id="op-union">Union (max)</button>
        <button id="op-sum">Sum (add)</button>
        <button id="op-intersection">Intersection (min)</button>
        <button id="op-diff">Difference (lhs - rhs)</button>
        <button id="op-symdiff">Symmetric diff (abs)</button>
      </div>

      <div class="controls-row">
        <label for="op-scale">Scale multiplicities by</label>
        <input id="op-scale" type="number" value="1" class="small" />
        <button id="op-scale-btn">Apply to active</button>
        <label for="op-cap">Cap at</label>
        <input id="op-cap" type="number" value="10" class="small" />
        <button id="op-cap-btn">Cap active</button>
      </div>

      <div class="controls-row">
        <label for="op-filter-min">Keep multiplicity >=</label>
        <input id="op-filter-min" type="number" value="1" class="small" />
        <label for="op-filter-max">and <=</label>
        <input id="op-filter-max" type="number" value="9999" class="small" />
        <button id="op-filter-btn">Filter active</button>
      </div>

      <div class="controls-row">
        <label for="sample-k">Random sample k</label>
        <input id="sample-k" type="number" value="3" class="small" min="1" />
        <label><input id="sample-replace" type="checkbox" /> with replacement</label>
        <button id="sample-btn">Sample from active</button>
      </div>

      <div class="controls-row">
        <label for="apply-to">Apply result to:</label>
        <select id="apply-to"></select>
        <button id="apply-result-new">Create New</button>
        <button id="apply-result-overwrite">Overwrite target</button>
      </div>

      <div class="controls-row">
        <label for="op-log-desc">Operation description (for log):</label>
        <input id="op-log-desc" placeholder="optional note" />
        <button id="run-op-and-log">Run & Log</button>
      </div>

      <div>
        <strong>Operation preview:</strong>
        <div id="op-preview" class="code"></div>
      </div>
    </div>
  </div>
</section>

<section>
  <div class="split">
    <div class="column">
      <h4>History & Undo/Redo</h4>
      <div class="controls-row">
        <button id="undo">Undo</button>
        <button id="redo">Redo</button>
        <label for="history-slider">History index:</label>
        <input id="history-slider" type="range" min="0" max="0" value="0" style="width:200px;" />
      </div>
      <div class="controls-row">
        <strong>History:</strong>
        <div id="history-list" class="op-list"></div>
      </div>
    </div>

    <div class="column">
      <h4>Workflow Builder (chain operations)</h4>
      <div class="controls-row">
        <label for="wf-name">Name:</label>
        <input id="wf-name" placeholder="workflow name" />
        <button id="wf-new">New</button>
        <button id="wf-load">Load JSON</button>
        <button id="wf-save">Export JSON</button>
      </div>

      <div class="controls-row">
        <label>Choose op:</label>
        <select id="wf-op-type">
          <option value="union">union</option>
          <option value="sum">sum</option>
          <option value="intersection">intersection</option>
          <option value="difference">difference</option>
          <option value="symdiff">symdiff</option>
          <option value="scale">scale</option>
          <option value="cap">cap</option>
          <option value="filter">filter</option>
          <option value="map">map(element mapping)</option>
        </select>
        <label for="wf-lhs">LHS</label>
        <select id="wf-lhs"></select>
        <label for="wf-rhs">RHS</label>
        <select id="wf-rhs"></select>
      </div>

      <div class="controls-row">
        <label for="wf-param">Param (JSON):</label>
        <input id="wf-param" placeholder='{"scale":2} or {"cap":5}' style="width:60%;" />
        <button id="wf-add-op">Add op to workflow</button>
      </div>

      <div class="controls-row">
        <div><strong>Workflow steps:</strong></div>
        <div id="wf-steps" class="op-list"></div>
      </div>

      <div class="controls-row">
        <label for="wf-preview-target">Preview target:</label>
        <select id="wf-preview-target"></select>
        <button id="wf-preview">Preview</button>
        <button id="wf-run">Run and create new</button>
      </div>

      <div>
        <strong>Workflow preview result:</strong>
        <div id="wf-preview-result" class="code"></div>
      </div>
    </div>
  </div>
</section>

<section>
  <h4>Diagnostics / Advanced Queries</h4>
  <div class="controls-row">
    <button id="distinct-btn">Distinct elements (support)</button>
    <button id="cardinality-btn">Cardinality (total counts)</button>
    <button id="topk-btn">Top-k frequent</button>
    <input id="topk-k" type="number" value="5" class="small" min="1" />
    <button id="entropy-btn">Shannon entropy (multiplicity dist)</button>
    <button id="gfs-btn">Generating function (polynomial string)</button>
  </div>
  <div class="controls-row">
    <strong>Result:</strong>
    <div id="diagnostic-result" class="code"></div>
  </div>
</section>

<section>
  <h4>Operation Log</h4>
  <div class="controls-row">
    <div id="op-log" class="op-list"></div>
    <button id="clear-log">Clear log</button>
    <button id="export-log">Export log JSON</button>
  </div>
</section>

<script>
/*
Multiset Explorer
- Minimal visual design, many interactive controls
- Multisets are maps from string element -> integer multiplicity >=0
- Multiple multisets managed by name
- Undo/redo, history, workflow builder, operation chaining, many operations
*/

(function(){

/* Utilities */
function cloneDeep(obj) { return JSON.parse(JSON.stringify(obj)); }
function isRegexLike(s) { return /^\\/.+\\/[a-z]*$/i.test(s); }
function parseRegexLike(s) {
  if (!isRegexLike(s)) return null;
  var parts = s.split('/');
  var flags = parts.pop();
  parts.shift();
  return new RegExp(parts.join('/'), flags);
}
function elemKey(e) { return String(e); }
function parseBulkText(text) {
  const entries = {};
  text.split(/[,\\n]+/).map(t => t.trim()).filter(Boolean).forEach(token => {
    // token maybe "a:3" or "b=4" or just "x"
    let m = token.match(/^(.+?)\\s*[:=]\\s*([0-9]+)\\s*$/);
    if (m) {
      entries[elemKey(m[1].trim())] = (entries[elemKey(m[1].trim())] || 0) + parseInt(m[2]);
    } else {
      entries[elemKey(token)] = (entries[elemKey(token)] || 0) + 1;
    }
  });
  return entries;
}

/* Data store */
let state = {
  multisets: {}, // name -> {elem:count}
  namesOrder: [],
  active: null,
  history: [], // snapshots of multisets state, with description
  historyIndex: -1,
  log: [],
  undoStack: [],
  redoStack: []
};

function snapshot(description) {
  // deep copy current multisets
  const data = cloneDeep({multisets: state.multisets, namesOrder: state.namesOrder, active: state.active});
  // discard redo on new snapshot
  state.history = state.history.slice(0, state.historyIndex+1);
  state.history.push({data, description, time: (new Date()).toISOString()});
  state.historyIndex = state.history.length - 1;
  updateHistoryUI();
}

/* Initialize with two sample multisets */
function newMultiset(name, base) {
  let nm = name || makeUniqueName("M");
  state.multisets[nm] = base ? cloneDeep(base) : {};
  state.namesOrder.push(nm);
  if (!state.active) state.active = nm;
  snapshot("Created multiset " + nm);
  refreshAll();
  return nm;
}
function makeUniqueName(prefix) {
  prefix = prefix || "M";
  let i = 1;
  while (state.namesOrder.includes(prefix + i)) i++;
  return prefix + i;
}

/* Core multiset ops */
function setMultiplicity(msName, elem, count) {
  count = Math.max(0, Math.floor(count));
  const ms = state.multisets[msName];
  if (count === 0) {
    delete ms[elemKey(elem)];
  } else {
    ms[elemKey(elem)] = count;
  }
  snapshot("Set " + elem + " -> " + count + " in " + msName);
  refreshAll();
}
function incMultiplicity(msName, elem, delta) {
  delta = Math.floor(delta)||0;
  const ms = state.multisets[msName] || {};
  const key = elemKey(elem);
  const prev = ms[key] || 0;
  const next = Math.max(0, prev + delta);
  if (next === 0) delete ms[key]; else ms[key] = next;
  snapshot((delta>=0?"+":"") + delta + " " + elem + " in " + msName);
  refreshAll();
}
function addBulk(msName, entries, replace=false) {
  const ms = state.multisets[msName];
  if (replace) {
    state.multisets[msName] = cloneDeep(entries);
    snapshot("Replaced " + msName + " with bulk");
  } else {
    Object.keys(entries).forEach(k => {
      ms[k] = (ms[k]||0) + entries[k];
      if (ms[k] <= 0) delete ms[k];
    });
    snapshot("Added bulk to " + msName);
  }
  refreshAll();
}

function getMultisetClone(name) { return cloneDeep(state.multisets[name] || {}); }
function setMultiset(name, data, desc) {
  state.multisets[name] = cloneDeep(data);
  snapshot(desc || ("Set multiset " + name));
  refreshAll();
}

/* Combining ops */
function union(msA, msB) {
  const a = getMultisetClone(msA), b = getMultisetClone(msB);
  const res = {};
  Object.keys(a).forEach(k => res[k] = Math.max(res[k]||0, a[k]));
  Object.keys(b).forEach(k => res[k] = Math.max(res[k]||0, b[k]));
  return res;
}
function sum(msA, msB) {
  const a = getMultisetClone(msA), b = getMultisetClone(msB);
  const res = {};
  Object.keys(a).forEach(k => res[k] = (res[k]||0) + a[k]);
  Object.keys(b).forEach(k => res[k] = (res[k]||0) + b[k]);
  return res;
}
function intersection(msA, msB) {
  const a = getMultisetClone(msA), b = getMultisetClone(msB);
  const res = {};
  Object.keys(a).forEach(k => {
    if (b[k]) res[k] = Math.min(a[k], b[k]);
  });
  return res;
}
function difference(msA, msB) {
  const a = getMultisetClone(msA), b = getMultisetClone(msB);
  const res = {};
  Object.keys(a).forEach(k => {
    const v = a[k] - (b[k]||0);
    if (v>0) res[k] = v;
  });
  return res;
}
function symdiff(msA, msB) {
  const a = getMultisetClone(msA), b = getMultisetClone(msB);
  const res = {};
  const keys = new Set([...Object.keys(a), ...Object.keys(b)]);
  keys.forEach(k => {
    const v = Math.abs((a[k]||0) - (b[k]||0));
    if (v>0) res[k] = v;
  });
  return res;
}

/* Transform ops */
function scaleMultiset(ms, factor) {
  factor = Number(factor) || 0;
  const res = {};
  Object.keys(ms).forEach(k => {
    const v = Math.floor(ms[k] * factor);
    if (v>0) res[k] = v;
  });
  return res;
}
function capMultiset(ms, cap) {
  cap = Math.max(0, Math.floor(cap));
  const res = {};
  Object.keys(ms).forEach(k => {
    const v = Math.min(ms[k], cap);
    if (v>0) res[k] = v;
  });
  return res;
}
function filterByMultiplicity(ms, minv, maxv) {
  minv = Math.floor(minv||0);
  maxv = Math.floor(maxv||Infinity);
  const res = {};
  Object.keys(ms).forEach(k => {
    const v = ms[k];
    if (v >= minv && v <= maxv) res[k] = v;
  });
  return res;
}
function mapElements(ms, mapFunc) {
  const res = {};
  Object.keys(ms).forEach(k => {
    const newk = mapFunc(k);
    if (newk == null) return;
    res[newk] = (res[newk]||0) + ms[k];
  });
  return res;
}

/* Sampling */
function sampleFrom(ms, k, withReplacement) {
  // expand but limit size safety
  const expanded = [];
  Object.keys(ms).forEach(k1 => {
    for (let i=0;i<ms[k1];i++) {
      expanded.push(k1);
    }
  });
  if (expanded.length === 0) return [];
  const out = [];
  if (withReplacement) {
    for (let i=0;i<k;i++) {
      out.push(expanded[Math.floor(Math.random() * expanded.length)]);
    }
  } else {
    // without replacement from multiset: pick up to distinct occurrences
    const copy = expanded.slice();
    k = Math.min(k, copy.length);
    for (let i=0;i<k;i++) {
      const idx = Math.floor(Math.random() * copy.length);
      out.push(copy.splice(idx,1)[0]);
    }
  }
  return out;
}

/* Metrics / diagnostics */
function cardinality(ms) {
  return Object.values(ms).reduce((s,x)=>s+x,0);
}
function supportSize(ms) {
  return Object.keys(ms).length;
}
function distinctElements(ms) {
  return Object.keys(ms).slice().sort();
}
function topK(ms, k) {
  return Object.entries(ms).sort((a,b)=>b[1]-a[1]).slice(0,k);
}
function shannonEntropy(ms) {
  const total = cardinality(ms);
  if (total === 0) return 0;
  let h = 0;
  Object.values(ms).forEach(v=>{
    const p = v / total;
    h -= p * Math.log2(p);
  });
  return h;
}
function generatingFunction(ms, varName='x', maxTerms=200) {
  // product over elements (1 + x + x^2 + ... + x^m) = product ((1-x^(m+1))/(1-x))
  // We'll build polynomial coefficients up to some bound (cap total).
  const total = cardinality(ms);
  const cap = Math.min(total, maxTerms);
  let coeffs = [1]; // coeffs[i] = coefficient for x^i
  Object.keys(ms).forEach(k=>{
    const m = ms[k];
    const newCoeffs = new Array(Math.min(cap, coeffs.length + m) + 1).fill(0);
    for (let i=0;i<coeffs.length;i++){
      for (let j=0;j<=m && i+j<=cap;j++){
        newCoeffs[i+j] += coeffs[i];
      }
    }
    coeffs = newCoeffs;
  });
  return coeffs.slice(0, cap+1).map((c,i)=>c + (i>0?('*'+varName+'^'+i):'')).join(' + ');
}

/* UI wiring */
const el = id => document.getElementById(id);

/* Initialize UI elements */
function refreshMsSelects() {
  const selects = ['ms-select', 'lhs-select', 'rhs-select', 'apply-to', 'wf-lhs', 'wf-rhs', 'wf-preview-target', 'wf-select', 'wf-preview-target'];
  selects.forEach(id=>{
    const s = el(id);
    if (!s) return;
    // remember selection
    const prev = s.value;
    s.innerHTML = '';
    state.namesOrder.forEach(nm=>{
      const o = document.createElement('option');
      o.value = nm; o.textContent = nm;
      s.appendChild(o);
    });
    if (state.active && s.id === 'ms-select') s.value = state.active;
    // try restore previous selection
    if (s.querySelector('option[value="'+prev+'"]')) s.value = prev;
  });
}

function updateMsStats() {
  const msName = state.active;
  if (!msName) { el('ms-stats').textContent = 'distinct:0 total:0'; return; }
  const ms = state.multisets[msName];
  el('ms-stats').textContent = 'distinct:' + supportSize(ms) + ' total:' + cardinality(ms);
}

function formatCompact(ms) {
  return Object.keys(ms).sort().map(k=>k + ':' + ms[k]).join(', ');
}
function formatSorted(ms){
  return Object.entries(ms).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0])).map(e=>e[0]+':'+e[1]).join('\\n');
}
function formatExpanded(ms, limit) {
  const arr = [];
  Object.keys(ms).forEach(k=>{
    for (let i=0;i<ms[k] && arr.length < limit;i++) arr.push(k);
  });
  if (Object.values(ms).reduce((s,x)=>s+x,0) > limit) arr.push('... (truncated)');
  return arr.join(', ');
}

function renderView() {
  const msName = state.active;
  const mode = el('view-mode').value;
  const limit = parseInt(el('expand-limit').value) || 50;
  let text = '';
  if (!msName) { el('ms-view').textContent = '(no multiset)'; return;}
  const ms = state.multisets[msName];
  const filter = el('filter-input').value.trim();
  let filteredMs = ms;
  if (filter) {
    const regex = parseRegexLike(filter);
    filteredMs = {};
    Object.keys(ms).forEach(k=>{
      if (regex) {
        if (regex.test(k)) filteredMs[k] = ms[k];
      } else {
        if (k.indexOf(filter) !== -1) filteredMs[k] = ms[k];
      }
    });
  }
  if (mode === 'compact') text = formatCompact(filteredMs) || '(empty)';
  else if (mode === 'expanded') text = formatExpanded(filteredMs, limit) || '(empty)';
  else if (mode === 'sorted') text = formatSorted(filteredMs) || '(empty)';
  el('ms-view').textContent = text;
  updateMsStats();
}

/* History UI */
function updateHistoryUI() {
  const hl = el('history-list');
  hl.innerHTML = '';
  state.history.forEach((h, idx) => {
    const d = document.createElement('div');
    d.textContent = idx + ': ' + (h.description || '(no desc)') + ' @' + h.time;
    if (idx === state.historyIndex) d.style.fontWeight = 'bold';
    d.addEventListener('click', ()=> {
      // restore snapshot without adding new snapshot to history
      const dp = cloneDeep(h.data);
      state.multisets = cloneDeep(dp.multisets);
      state.namesOrder = cloneDeep(dp.namesOrder);
      state.active = dp.active;
      // do not snapshot; add to undo stack
      refreshAll();
    });
    hl.appendChild(d);
  });
  const hs = el('history-slider');
  hs.max = Math.max(0, state.history.length-1);
  hs.value = state.historyIndex >= 0 ? state.historyIndex : 0;
}

/* Operation preview generation */
function previewOperation(type, lhs, rhs, params) {
  params = params || {};
  if (!lhs) return '(need LHS)';
  const left = state.multisets[lhs] || {};
  let res;
  try {
    switch(type) {
      case 'union': res = union(lhs, rhs||lhs); break;
      case 'sum': res = sum(lhs, rhs||lhs); break;
      case 'intersection': res = intersection(lhs, rhs||lhs); break;
      case 'difference': res = difference(lhs, rhs||lhs); break;
      case 'symdiff': res = symdiff(lhs, rhs||lhs); break;
      case 'scale': res = scaleMultiset(left, params.scale||1); break;
      case 'cap': res = capMultiset(left, params.cap||Infinity); break;
      case 'filter': res = filterByMultiplicity(left, params.min||0, params.max||Infinity); break;
      case 'map':
        if (params.mapping) {
          const f = new Function('el', 'return ' + params.mapping);
          res = mapElements(left, f);
        } else res = left;
        break;
      default: res = left;
    }
  } catch(e) {
    return 'Error generating preview: ' + e.message;
  }
  return JSON.stringify(res, null, 2);
}

/* Operation log management */

}

/* Workflow builder */
let workflow = {name:'', steps:[]};

function renderWorkflow() {
  const container = el('wf-steps');
  container.innerHTML = '';
  workflow.steps.forEach((s, i)=>{
    const d = document.createElement('div');
    d.textContent = i + ': ' + s.type + ' LHS=' + s.lhs + ' RHS=' + (s.rhs||'') + ' param=' + JSON.stringify(s.param || {});
    const up = document.createElement('button'); up.textContent = '↑'; up.addEventListener('click', ()=>{ if (i>0){ const t=workflow.steps[i-1]; workflow.steps[i-1]=workflow.steps[i]; workflow.steps[i]=t; renderWorkflow(); }});
    const down = document.createElement('button'); down.textContent = '↓'; down.addEventListener('click', ()=>{ if (i<workflow.steps.length-1){ const t=workflow.steps[i+1]; workflow.steps[i+1]=workflow.steps[i]; workflow.steps[i]=t; renderWorkflow(); }});
    const r = document.createElement('button'); r.textContent = 'Remove'; r.addEventListener('click', ()=>{ workflow.steps.splice(i,1); renderWorkflow();});
    d.appendChild(up); d.appendChild(down); d.appendChild(r);
    container.appendChild(d);
  });
  el('wf-name').value = workflow.name || '';
}

/* Run a workflow: starting from a target multiset name (cloned), apply each step
   Steps refer to available multisets by name or to special token "__current__" representing the current result.
*/
function runWorkflow(targetName) {
  let current = cloneDeep(state.multisets[targetName] || {});
  workflow.steps.forEach(step=>{
    try {
      switch(step.type) {
        case 'union': current = unionObject(current, state.multisets[step.rhs] || {}); break;
        case 'sum': current = sumObject(current, state.multisets[step.rhs] || {}); break;
        case 'intersection': current = intersectionObject(current, state.multisets[step.rhs] || {}); break;
        case 'difference': current = differenceObject(current, state.multisets[step.rhs] || {}); break;
        case 'symdiff': current = symdiffObject(current, state.multisets[step.rhs] || {}); break;
        case 'scale': current = scaleMultiset(current, step.param.scale); break;
        case 'cap': current = capMultiset(current, step.param.cap); break;
        case 'filter': current = filterByMultiplicity(current, step.param.min, step.param.max); break;
        case 'map':
          if (step.param && step.param.mapping) {
            const f = new Function('el', 'return ' + step.param.mapping);
            current = mapElements(current, f);
          }
          break;
      }
    } catch(e) {
      // stop on error
      throw new Error('Error in workflow step ' + step.type + ': ' + e.message);
    }
  });
  return current;
}

/* Helper object-based combine functions to apply on in-memory data (not by name) */
function unionObject(aObj, bObj) {
  const res = {};
  Object.keys(aObj).forEach(k => res[k] = Math.max(res[k]||0, aObj[k]));
  Object.keys(bObj).forEach(k => res[k] = Math.max(res[k]||0, bObj[k]));
  return res;
}
function sumObject(aObj, bObj) {
  const res = {};
  Object.keys(aObj).forEach(k => res[k] = (res[k]||0) + aObj[k]);
  Object.keys(bObj).forEach(k => res[k] = (res[k]||0) + bObj[k]);
  return res;
}
function intersectionObject(aObj, bObj) {
  const res = {};
  Object.keys(aObj).forEach(k => {
    if (bObj[k]) res[k] = Math.min(aObj[k], bObj[k]);
  });
  return res;
}
function differenceObject(aObj, bObj) {
  const res = {};
  Object.keys(aObj).forEach(k => {
    const v = aObj[k] - (bObj[k]||0);
    if (v>0) res[k] = v;
  });
  return res;
}
function symdiffObject(aObj, bObj) {
  const res = {};
  const keys = new Set([...Object.keys(aObj), ...Object.keys(bObj)]);
  keys.forEach(k => {
    const v = Math.abs((aObj[k]||0) - (bObj[k]||0));
    if (v>0) res[k] = v;
  });
  return res;
}

    const active = state.active;

    state.namesOrder = state.namesOrder.map(n=> n===active? nn: n);

/* helper to update apply-to dropdowns */
function renderApplyToOptions() {
  const selects = ['apply-to', 'wf-preview-target', 'wf-lhs', 'wf-rhs', 'lhs-select', 'rhs-select', 'ms-select'];
  selects.forEach(id=>{
    const s = el(id);
    if (!s) return;
    const prev = s.value;
    s.innerHTML = '';
    state.namesOrder.forEach(nm=> {
      const o = document.createElement('option'); o.value = nm; o.textContent = nm;
      s.appendChild(o);
    });
    if (state.namesOrder.length === 0) {
      const o = document.createElement('option'); o.value = ''; o.textContent = '(none)';
      s.appendChild(o);
    }
    if (prev && s.querySelector('option[value="'+prev+'"]')) s.value = prev;
    if (id === 'ms-select' && state.active) s.value = state.active;
  });
}
