<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kruskal's Algorithm Interactive Demo</title>
    <style>
        /* Minimal styling for layout - no colors, no animations */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #controls {
            margin-bottom: 20px;
        }
        .node, .edge {
            padding: 5px;
            border: 1px solid black;
            margin: 2px;
            display: inline-block;
        }
    </style>
</head>
<body>

<h2>Kruskal's Algorithm Demo</h2>

<div id="controls">
    <input type="text" id="node-input" placeholder="Node (e.g. A)">
    <input type="text" id="edge-input" placeholder="Edge (e.g. A-B:3)">
    <button id="add-node">Add Node</button>
    <button id="add-edge">Add Edge</button>
    <button id="run-algorithm">Run Kruskal's Algorithm</button>
</div>

<div>
    <h4>Graph Nodes:</h4>
    <div id="nodes-area"></div>
</div>
<div>
    <h4>Graph Edges:</h4>
    <div id="edges-area"></div>
</div>
<div>
    <h4>Minimum Spanning Tree Edges:</h4>
    <div id="mst-area"></div>
</div>

<script>
    let nodes = [];
    let edges = [];
    
    document.getElementById('add-node').onclick = function() {
        const nodeInput = document.getElementById('node-input').value.trim();
        if (nodeInput && !nodes.includes(nodeInput)) {
            nodes.push(nodeInput);
            document.getElementById('nodes-area').innerHTML += `<div class="node">${nodeInput}</div>`;
            document.getElementById('node-input').value = '';
        } else {
            alert("Invalid or duplicate node.");
        }
    };

    document.getElementById('add-edge').onclick = function() {
        const edgeInput = document.getElementById('edge-input').value.trim();
        const edgeParts = edgeInput.split(':');
        if (edgeParts.length === 2) {
            const edgeNodes = edgeParts[0].trim().split('-');
            const weight = parseInt(edgeParts[1].trim());
            if (edgeNodes.length === 2 && !isNaN(weight)) {
                const edge = {nodes: edgeNodes.map(n => n.trim()), weight};
                edges.push(edge);
                document.getElementById('edges-area').innerHTML += `<div class="edge">${edgeNodes.join('-')}:${weight}</div>`;
                document.getElementById('edge-input').value = '';
            } else {
                alert("Invalid edge format.");
            }
        } else {
            alert("Invalid edge format.");
        }
    };

    document.getElementById('run-algorithm').onclick = function() {
        const mst = kruskalAlgorithm(nodes, edges);
        document.getElementById('mst-area').innerHTML = mst.map(e => e.nodes.join('-') + ':' + e.weight).join(', ');
    };

    function kruskalAlgorithm(nodes, edges) {
        // Sort edges by weight
        edges.sort((a, b) => a.weight - b.weight);
        
        // Create a parent map for union-find
        const parent = {};
        nodes.forEach(node => parent[node] = node);
        
        const find = (node) => {
            if (parent[node] !== node) {
                parent[node] = find(parent[node]);
            }
            return parent[node];
        };

        const union = (node1, node2) => {
            const root1 = find(node1);
            const root2 = find(node2);
            if (root1 !== root2) {
                parent[root1] = root2;
            }
        };

        const mst = [];
        for (const edge of edges) {
            const [node1, node2] = edge.nodes;
            if (find(node1) !== find(node2)) {
                mst.push(edge);
                union(node1, node2);
            }
        }
        return mst;
    }
</script>

</body>
</html>
