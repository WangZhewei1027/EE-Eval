<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Queue Visualization — Elegant Data Structure</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display&display=swap');

  /* Reset and base */
  *, *::before, *::after {
    box-sizing: border-box;
  }
  html, body {
    height: 100%;
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Montserrat', sans-serif;
    color: #e0e6f0;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    user-select: none;
  }

  /* Container */
  .container {
    width: 95vw;
    max-width: 960px;
    text-align: center;
    position: relative;
    padding: 2rem 1rem 4rem;
  }

  /* Header */
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 3.2rem;
    color: #a6d1e6;
    letter-spacing: 0.04em;
    margin-bottom: 0.15em;
    text-shadow:
      0 0 5px #a6d1e6cc,
      0 0 10px #a6d1e6bb,
      0 0 20px #a6d1e6cc,
      0 0 30px #58a6d4dd;
    user-select: none;
  }
  h2 {
    font-weight: 500;
    font-size: 1.1rem;
    font-style: italic;
    color: #89b4d9cc;
    margin-bottom: 3rem;
    letter-spacing: 0.03em;
  }

  /* Queue visualization wrapper */
  .queue-wrapper {
    perspective: 1200px;
  }

  /* Queue container */
  .queue {
    display: flex;
    justify-content: center;
    gap: 1rem;
    padding: 1.6rem 1.2rem;
    background: radial-gradient(ellipse at center, #1e3c55dd 0%, #0a1c2fcc 85%);
    border-radius: 2rem;
    box-shadow:
      inset 0 0 35px #1162a062,
      0 0 25px #2079c8aa;
    min-height: 120px;
    max-width: 100%;
    overflow-x: auto;
  }

  /* Queue item */
  .queue-item {
    flex: 0 0 80px;
    height: 80px;
    background: linear-gradient(145deg, #3a86ff, #023e8a);
    border-radius: 1rem;
    box-shadow:
      0 4px 15px #1d5be466,
      inset 0 0 12px #61a4f165;
    color: #e0f0ff;
    font-weight: 700;
    font-size: 1.8rem;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: visible;
    cursor: default;
    user-select: none;
    transition:
      transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
      box-shadow 0.4s ease,
      background 0.4s ease;
  }

  .queue-item::before {
    content: attr(data-label);
    position: absolute;
    top: -1.3rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
    color: #aaddffaa;
    font-family: 'Montserrat', sans-serif;
    user-select: none;
    pointer-events: none;
  }

  /* Entrance and Exit labels for front and rear */
  .queue-item.front::before {
    content: "Front";
    color: #93c5fd;
    text-shadow: 0 0 3px #4f8bffcc;
  }
  .queue-item.rear::before {
    content: "Rear";
    color: #7ee5fcd9;
    text-shadow: 0 0 6px #68c9f7dd;
  }

  /* Hover effect for the front and rear to highlight */
  .queue-item.front:hover,
  .queue-item.rear:hover {
    transform: scale(1.15);
    box-shadow:
      0 0 30px #7ed0ffcc,
      inset 0 0 25px #62a7f99c;
    z-index: 2;
  }

  /* Subtle glow pulse animation */
  @keyframes gentlePulse {
    0%, 100% { box-shadow:
      0 4px 15px #1d5be466,
      inset 0 0 12px #61a4f165;
    }
    50% { box-shadow:
      0 6px 25px #3f8beca1,
      inset 0 0 18px #74b7f27c;
    }
  }

  .queue-item {
    animation: gentlePulse 4.5s ease-in-out infinite;
  }

  /* Buttons container */
  .controls {
    position: absolute;
    bottom: 1.8rem;
    width: 100%;
    max-width: 480px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    justify-content: center;
    gap: 2.8rem;
  }

  /* Button style */
  button {
    padding: 0.9rem 3rem;
    border-radius: 2rem;
    border: none;
    font-weight: 700;
    font-size: 1.2rem;
    font-family: 'Montserrat', sans-serif;
    cursor: pointer;
    background: linear-gradient(135deg, #0288d1, #026aa7);
    color: #d7e9ff;
    box-shadow:
      0 8px 20px #0266a6cc;
    user-select: none;
    transition:
      background 0.3s ease,
      transform 0.25s cubic-bezier(0.22, 1, 0.36, 1),
      box-shadow 0.3s ease;
  }
  button:focus {
    outline: none;
    box-shadow:
      0 0 8px 3px #74baffaa,
      0 8px 22px #0288d1ee;
  }
  button:hover:not(:disabled) {
    background: linear-gradient(135deg, #4dabf7, #0288d1);
    transform: translateY(-3px);
    box-shadow:
      0 12px 26px #1493f9cc;
  }
  button:active:not(:disabled) {
    transform: translateY(-1px);
    box-shadow:
      0 6px 14px #0271becc;
  }
  button:disabled {
    background: #1d3a5c88;
    box-shadow: none;
    cursor: default;
    color: #8caad8aa;
  }

  /* Queue flow visualization */
  .arrow-container {
    position: absolute;
    top: 54%;
    left: 50%;
    width: 100%;
    max-width: 900px;
    height: 30px;
    pointer-events: none;
    user-select: none;
    overflow: visible;
    transform: translateX(-50%);
    filter: drop-shadow(0 0 1.5px #80bfff55);
  }

  svg {
    width: 100%;
    height: 100%;
  }

  /* Label below */
  .desc {
    margin-top: 3.8rem;
    font-style: italic;
    font-weight: 400;
    font-size: 1rem;
    color: #b8ceeaaa;
    user-select: none;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
    letter-spacing: 0.04em;
  }

  /* Scrollbar styling for overflow-x */
  .queue::-webkit-scrollbar {
    height: 8px;
  }
  .queue::-webkit-scrollbar-track {
    background: #0a203539;
    border-radius: 2rem;
  }
  .queue::-webkit-scrollbar-thumb {
    background: #1162a0bb;
    border-radius: 2rem;
  }

</style>
</head>
<body>
  <div class="container" aria-label="Queue Data Structure visualization">
    <h1>Queue</h1>
    <h2>First-In, First-Out (FIFO) Data Structure</h2>

    <div class="queue-wrapper" aria-live="polite">
      <div class="queue" id="queue" aria-label="Queue elements">
        <!-- Queue items inserted by script -->
      </div>
      <div class="arrow-container" aria-hidden="true">
        <svg viewBox="0 0 900 30" preserveAspectRatio="none" aria-hidden="true" focusable="false">
          <defs>
            <linearGradient id="arrowGradient" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#7bd0ff" stop-opacity="0" />
              <stop offset="30%" stop-color="#7bd0ff" stop-opacity="0.7" />
              <stop offset="70%" stop-color="#7bd0ff" stop-opacity="0.7" />
              <stop offset="100%" stop-color="#7bd0ff" stop-opacity="0" />
            </linearGradient>
            <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L6,3 L0,6" fill="#74bffe"/>
            </marker>
          </defs>
          <line x1="40" y1="15" x2="860" y2="15" stroke="url(#arrowGradient)" stroke-width="4" marker-end="url(#arrowhead)" />
          <circle cx="40" cy="15" r="5" fill="#74bffe" filter="url(#glow)" />
          <text x="10" y="23" fill="#88c8ff" font-family="Montserrat,sans-serif" font-size="12" letter-spacing="0.05em" user-select="none">Front (Dequeue)</text>
          <text x="750" y="23" fill="#bde4ff" font-family="Montserrat,sans-serif" font-size="12" user-select="none">Rear (Enqueue)</text>
        </svg>
      </div>
    </div>

    <div class="controls" aria-label="Queue controls">
      <button id="enqueueBtn" aria-label="Enqueue an element">Enqueue</button>
      <button id="dequeueBtn" aria-label="Dequeue front element">Dequeue</button>
    </div>

    <p class="desc">Observe how elements enter at the rear and exit from the front, maintaining the sequence order.</p>
  </div>

<script>
  (() => {
    const queueEl = document.getElementById('queue');
    const enqueueBtn = document.getElementById('enqueueBtn');
    const dequeueBtn = document.getElementById('dequeueBtn');

    // Initialize queue with a few numbers for neat visual start
    let queue = [10, 20, 30, 40, 50];

    // Maximum queue size for display (to keep design neat)
    const MAX_SIZE = 10;

    // Update the queue display
    function renderQueue() {
      queueEl.innerHTML = '';
      if (queue.length === 0) {
        const emptyMsg = document.createElement('div');
        emptyMsg.textContent = 'Queue is empty';
        emptyMsg.style.color = '#3b6fb3aa';
        emptyMsg.style.fontWeight = '600';
        emptyMsg.style.letterSpacing = '0.1em';
        emptyMsg.style.fontSize = '1.1rem';
        emptyMsg.style.textShadow = '0 0 6px #74bffe99';
        emptyMsg.style.userSelect = 'none';
        queueEl.appendChild(emptyMsg);
        dequeueBtn.disabled = true;
        return;
      }

      for (let i=0; i<queue.length; i++) {
        const div = document.createElement('div');
        div.className = 'queue-item';
        div.textContent = queue[i];
        // Label front and rear visually
        if (i === 0) div.classList.add('front');
        if (i === queue.length - 1) div.classList.add('rear');
        queueEl.appendChild(div);
      }
      dequeueBtn.disabled = false;
    }

    // Generate a random number (2 digit) to enqueue
    function randomNumber() {
      return Math.floor(Math.random() * 90) + 10;
    }

    // Enqueue operation with animation
    function enqueue() {
      if (queue.length >= MAX_SIZE) {
        enqueueBtn.disabled = true;
        return;
      }
      const newVal = randomNumber();
      queue.push(newVal);
      renderQueue();
      enqueueBtn.disabled = queue.length >= MAX_SIZE;
      dequeueBtn.disabled = queue.length === 0;
    }

    // Dequeue operation with animation
    function dequeue() {
      if (queue.length === 0) {
        dequeueBtn.disabled = true;
        return;
      }
      queue.shift();
      renderQueue();
      enqueueBtn.disabled = false;
      dequeueBtn.disabled = queue.length === 0;
    }

    // Attach listeners with subtle debounce for elegance
    enqueueBtn.addEventListener('click', () => {
      enqueueBtn.disabled = true;
      enqueue();
      setTimeout(() => {
        enqueueBtn.disabled = queue.length >= MAX_SIZE;
      }, 400);
    });

    dequeueBtn.addEventListener('click', () => {
      dequeueBtn.disabled = true;
      dequeue();
      setTimeout(() => {
        dequeueBtn.disabled = queue.length === 0;
      }, 400);
    });

    // Initial render
    renderQueue();

  })();
</script>
</body>
</html>
