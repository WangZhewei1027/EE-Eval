<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Typing Showcase</title>
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #6e7e6a, #b2c2b0);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        .container {
            text-align: center;
            border-radius: 15px;
            padding: 50px;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .dynamic-text {
            font-size: 2.5rem;
            color: #4F8C9A;
            overflow: hidden;
            white-space: nowrap;
            border-right: 4px solid;
            width: 0;
            animation: typing 4s steps(30, end), blink 0.75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        button {
            margin-top: 30px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4F8C9A;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background-color 0.3s, transform 0.3s;
        }

        button:hover {
            background-color: #3A6A73;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dynamic Typing Demonstration</h1>
        <div class="dynamic-text">Dynamic Typing in Action!</div>
        <button onclick="triggerAnimation()">Replay Animation</button>
    </div>

    <script>
        function triggerAnimation() {
            const dynamicText = document.querySelector('.dynamic-text');
            dynamicText.style.animation = 'none'; // Resetting the animation
            dynamicText.offsetHeight; // Triggering reflow
            dynamicText.style.animation = ''; // Re-adding the animation
        }
    </script>
</body>
</html>
