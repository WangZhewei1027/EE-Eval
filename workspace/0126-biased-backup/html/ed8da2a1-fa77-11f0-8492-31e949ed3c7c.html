<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #181818;
            color: #F0F0F0;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 0.5em;
            color: #00FFC3;
        }

        p {
            font-size: 1.2em;
            margin-bottom: 1.5em;
            max-width: 600px;
        }

        .graph-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            width: 80%;
            height: 300px;
            position: relative;
            overflow: hidden;
            border: 2px solid #00FFC3;
            border-radius: 10px;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .bar {
            width: 30px;
            margin: 0 5px;
            background-color: #00FFC3;
            transition: height 0.5s ease, background-color 0.5s ease;
        }

        .bar.active {
            background-color: #FF6F61;
        }

        .bar.selected {
            background-color: #FFCE54;
            height: 100%;
        }

        button {
            padding: 10px 20px;
            margin-top: 20px;
            font-size: 1em;
            color: #181818;
            background-color: #00FFC3;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #00695C;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Binary Search Visualization</h1>
        <p>Observe the binary search algorithm in action as it finds the target value in a sorted array. Click "Start"
            to see the effect!</p>
        <div class="graph-container" id="graph-container"></div>
        <button id="start-btn">Start</button>
    </div>

    <script>
        const array = [3, 6, 9, 12, 15, 18, 21, 24, 27, 30, 33, 36, 39];
        const target = 21;
        let left = 0;
        let right = array.length - 1;

        const graphContainer = document.getElementById('graph-container');

        function createBars() {
            graphContainer.innerHTML = '';
            array.forEach(num => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${(num / 39) * 100}%`;
                graphContainer.appendChild(bar);
            });
        }

        function highlightActive(index) {
            const bars = document.querySelectorAll('.bar');
            bars.forEach((bar, i) => {
                bar.classList.remove('active');
                if (i === index) {
                    bar.classList.add('active');
                }
            });
        }

        async function binarySearch() {
            while (left <= right) {
                const mid = Math.floor((left + right) / 2);
                highlightActive(mid);
                
                if (array[mid] === target) {
                    const bars = document.querySelectorAll('.bar');
                    bars[mid].classList.add('selected');
                    return;
                } else if (array[mid] < target) {
                    left = mid + 1;
                } else {
                    right = mid - 1;
                }

                await new Promise(resolve => setTimeout(resolve, 1000)); // wait for a second
            }
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            createBars();
            binarySearch();
        });
    </script>
</body>

</html>
