<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutex</title>
    <style>
        body {
            background-color: #000;
        }
        input, button, select {
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        button {
            background-color: #000;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        select {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mutex</h1>
        <p>Interactive Mutex Example</p>
        <div class="controls">
            <button id="start-button">Start</button>
            <button id="stop-button">Stop</button>
            <button id="reset-button">Reset</button>
            <button id="pause-button">Pause</button>
            <button id="unpause-button">Unpause</button>
            <input id="time-input" type="range" min="0" max="10" value="5">
            <label for="time-input">Time (s)</label>
            <select id="step-select">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
            <button id="start-step-button">Start Step</button>
            <button id="stop-step-button">Stop Step</button>
            <button id="reset-step-button">Reset Step</button>
            <button id="pause-step-button">Pause Step</button>
            <button id="unpause-step-button">Unpause Step</button>
        </div>
        <div class="workflows">
            <h2>Workflows</h2>
            <button id="workflow-1">Workflow 1</button>
            <button id="workflow-2">Workflow 2</button>
            <button id="workflow-3">Workflow 3</button>
            <button id="workflow-4">Workflow 4</button>
        </div>
        <div class="interactivity">
            <h2>Interactivity</h2>
            <button id="interactive-1">Interactive 1</button>
            <button id="interactive-2">Interactive 2</button>
            <button id="interactive-3">Interactive 3</button>
            <button id="interactive-4">Interactive 4</button>
        </div>
    </div>

    <script>
        let mutex = {
            startButton: document.getElementById('start-button'),
            stopButton: document.getElementById('stop-button'),
            resetButton: document.getElementById('reset-button'),
            pauseButton: document.getElementById('pause-button'),
            unpauseButton: document.getElementById('unpause-button'),
            timeInput: document.getElementById('time-input'),
            stepSelect: document.getElementById('step-select'),
            startStepButton: document.getElementById('start-step-button'),
            stopStepButton: document.getElementById('stop-step-button'),
            resetStepButton: document.getElementById('reset-step-button'),
            pauseStepButton: document.getElementById('pause-step-button'),
            unpauseStepButton: document.getElementById('unpause-step-button'),
            workflow1Button: document.getElementById('workflow-1'),
            workflow2Button: document.getElementById('workflow-2'),
            workflow3Button: document.getElementById('workflow-3'),
            workflow4Button: document.getElementById('workflow-4'),
            interactive1Button: document.getElementById('interactive-1'),
            interactive2Button: document.getElementById('interactive-2'),
            interactive3Button: document.getElementById('interactive-3'),
            interactive4Button: document.getElementById('interactive-4'),
        };

        function startMutex() {
            console.log('Mutex started');
            mutex.startButton.disabled = true;
            mutex.stopButton.disabled = false;
            mutex.resetButton.disabled = false;
            mutex.pauseButton.disabled = false;
            mutex.unpauseButton.disabled = false;
            mutex.stepSelect.disabled = false;
            mutex.timeInput.disabled = false;
            mutex.stepSelect.value = '1';
            mutex.timeInput.value = '5';
            mutex.startStepButton.disabled = false;
            mutex.stopStepButton.disabled = false;
            mutex.resetStepButton.disabled = false;
            mutex.pauseStepButton.disabled = false;
            mutex.unpauseStepButton.disabled = false;
            mutex.interactive1Button.disabled = false;
            mutex.interactive2Button.disabled = false;
            mutex.interactive3Button.disabled = false;
            mutex.interactive4Button.disabled = false;
        }

        function stopMutex() {
            console.log('Mutex stopped');
            mutex.startButton.disabled = false;
            mutex.stopButton.disabled = true;
            mutex.resetButton.disabled = false;
            mutex.pauseButton.disabled = false;
            mutex.unpauseButton.disabled = false;
            mutex.stepSelect.disabled = false;
            mutex.timeInput.disabled = false;
            mutex.stepSelect.value = '1';
            mutex.timeInput.value = '5';
            mutex.startStepButton.disabled = false;
            mutex.stopStepButton.disabled = true;
            mutex.resetStepButton.disabled = false;
            mutex.pauseStepButton.disabled = false;
            mutex.unpauseStepButton.disabled = false;
            mutex.interactive1Button.disabled = false;
            mutex.interactive2Button.disabled = false;
            mutex.interactive3Button.disabled = false;
            mutex.interactive4Button.disabled = false;
        }

        function resetMutex() {
            console.log('Mutex reset');
            mutex.startButton.disabled = true;
            mutex.stopButton.disabled = false;
            mutex.resetButton.disabled = true;
            mutex.pauseButton.disabled = false;
            mutex.unpauseButton.disabled = false;
            mutex.stepSelect.disabled = false;
            mutex.timeInput.disabled = true;
            mutex.stepSelect.value = '1';
            mutex.timeInput.value = '0';
            mutex.startStepButton.disabled = true;
            mutex.stopStepButton.disabled = false;
            mutex.resetStepButton.disabled = true;
            mutex.pauseStepButton.disabled = false;
            mutex.unpauseStepButton.disabled = false;
            mutex.interactive1Button.disabled = true;
            mutex.interactive2Button.disabled = true;
            mutex.interactive3Button.disabled = true;
            mutex.interactive4Button.disabled = true;
        }

        function pauseMutex() {
            console.log('Mutex paused');
            mutex.startButton.disabled = false;
            mutex.stopButton.disabled = true;
            mutex.pauseButton.disabled = true;
            mutex.unpauseButton.disabled = false;
            mutex.stepSelect.disabled = false;
            mutex.timeInput.disabled = true;
            mutex.stepSelect.value = '1';
            mutex.timeInput.value = '0';
            mutex.startStepButton.disabled = true;
            mutex.stopStepButton.disabled = false;
            mutex.resetStepButton.disabled = true;
            mutex.pauseStepButton.disabled = false;
            mutex.unpauseStepButton.disabled = false;
            mutex.interactive1Button.disabled = true;
            mutex.interactive2Button.disabled = true;
            mutex.interactive3Button.disabled = true;
            mutex.interactive4Button.disabled = true;
        }

        function unpauseMutex() {
            console.log('Mutex unpainted');
            mutex.startButton.disabled = false;
            mutex.stopButton.disabled = true;
            mutex.pauseButton.disabled = true;
            mutex.unpauseButton.disabled = true;
            mutex.stepSelect.disabled = false;
            mutex.timeInput.disabled = true;
            mutex.stepSelect.value = '1';
            mutex.timeInput.value = '5';
            mutex.startStepButton.disabled = true;
            mutex.stopStepButton.disabled = false;
            mutex.resetStepButton.disabled = true;
            mutex.pauseStepButton.disabled = false;
            mutex.unpauseStepButton.disabled = false;
            mutex.interactive1Button.disabled = true;
            mutex.interactive2Button.disabled = true;
            mutex.interactive3Button.disabled = true;
            mutex.interactive4Button.disabled = true;
        }

        function startWorkflow() {
            console.log('Workflow started');
            mutex.startWorkflow();
        }

        function stopWorkflow() {
            console.log('Workflow stopped');
            mutex.stopWorkflow();
        }

        function resetWorkflow() {
            console.log('Workflow reset');
            mutex.resetWorkflow();
        }

        function pauseWorkflow() {
            console.log('Workflow paused');
            mutex.pauseWorkflow();
        }

        function unpauseWorkflow() {
            console.log('Workflow unpainted');
            mutex.unpauseWorkflow();
        }

        function startInteractive() {
            console.log('Interactive started');
            mutex.startInteractive();
        }

        function stopInteractive() {
            console.log('Interactive stopped');
            mutex.stopInteractive();
        }

        function resetInteractive() {
            console.log('Interactive reset');
            mutex.resetInteractive();
        }

        function pauseInteractive() {
            console.log('Interactive paused');
            mutex.pauseInteractive();
        }

        function unpauseInteractive() {
            console.log('Interactive unpainted');
            mutex.unpauseInteractive();
        }

        function startMutexWithInteractivity() {
            console.log('Mutex with interactivity started');
            mutex.startMutexWithInteractivity();
        }

        function stopMutexWithInteractivity() {
            console.log('Mutex with interactivity stopped');
            mutex.stopMutexWithInteractivity();
        }

        function resetMutexWithInteractivity() {
            console.log('Mutex with interactivity reset');
            mutex.resetMutexWithInteractivity();
        }

        function pauseMutexWithInteractivity() {
            console.log('Mutex with interactivity paused');
            mutex.pauseMutexWithInteractivity();
        }

        function unpauseMutexWithInteractivity() {
            console.log('Mutex with interactivity unpainted');
            mutex.unpauseMutexWithInteractivity();
        }

        function startMutexWithMaximumInteractivity() {
            console.log('Mutex with maximum interactivity started');
            mutex.startMutexWithMaximumInteractivity();
        }

        function stopMutexWithMaximumInteractivity() {
            console.log('Mutex with maximum interactivity stopped');
            mutex.stopMutexWithMaximumInteractivity();
        }

        function resetMutexWithMaximumInteractivity() {
            console.log('Mutex with maximum interactivity reset');
            mutex.resetMutexWithMaximumInteractivity();
        }

        function pauseMutexWithMaximumInteractivity() {
            console.log('Mutex with maximum interactivity paused');
            mutex.pauseMutexWithMaximumInteractivity();
        }

        function unpauseMutexWithMaximumInteractivity() {
            console.log('Mutex with maximum interactivity unpainted');
            mutex.unpauseMutexWithMaximumInteractivity();
        }

        mutex.startMutex();
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            startMutex();
        });

        document.getElementById('start-button').addEventListener('click', startMutex);
        document.getElementById('stop-button').addEventListener('click', stopMutex);
        document.getElementById('reset-button').addEventListener('click', resetMutex);
        document.getElementById('pause-button').addEventListener('click', pauseMutex);
        document.getElementById('unpause-button').addEventListener('click', unpauseMutex);

        document.getElementById('time-input').addEventListener('input', function () {
            mutex.stepSelect.value = this.value;
            mutex.timeInput.value = this.value;
        });

        document.getElementById('step-select').addEventListener('input', function () {
            mutex.stepSelect.value = this.value;
            mutex.timeInput.value = '5';
        });

        document.getElementById('start-step-button').addEventListener('click', startStep);
        document.getElementById('stopStepButton').addEventListener('click', stopStep);
        document.getElementById('resetStepButton').addEventListener('click', resetStep);
        document.getElementById('pauseStepButton').addEventListener('click', pauseStep);
        document.getElementById('unpauseStepButton').addEventListener('click', unpauseStep);

        document.getElementById('workflow-1').addEventListener('click', startWorkflow);
        document.getElementById('workflow-2').addEventListener('click', stopWorkflow);
        document.getElementById('workflow-3').addEventListener('click', resetWorkflow);
        document.getElementById('workflow-4').addEventListener('click', pauseWorkflow);
        document.getElementById('workflow-5').addEventListener('click', unpauseWorkflow);

        document.getElementById('interactive1Button').addEventListener('click', startInteractive);
        document.getElementById('interactive2Button').addEventListener('click', stopInteractive);
        document.getElementById('interactive3Button').addEventListener('click', resetInteractive);
        document.getElementById('interactive4Button').addEventListener('click', pauseInteractive);
        document.getElementById('interactive5Button').addEventListener('click', unpauseInteractive);

        document.getElementById('workflow1Button').addEventListener('click', startWorkflow);
        document.getElementById('workflow2Button').addEventListener('click', stopWorkflow);
        document.getElementById('workflow3Button').addEventListener('click', resetWorkflow);
        document.getElementById('workflow4Button').addEventListener('click', pauseWorkflow);
        document.getElementById('workflow5Button').addEventListener('click', unpauseWorkflow);
    </script>
</body>
</html>
