<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Search</title>
    <style>
        body {
            background-color: #f0f0f0;
        }
        input, select, button {
            padding: 5px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }
        input[type="number"], select, button {
            width: 100%;
        }
        button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <h1>Linear Search</h1>
    <input type="number" id="search-input" placeholder="Enter a number">
    <button id="search-button">Search</button>
    <div id="search-results"></div>

    <script>
        const searchInput = document.getElementById('search-input');
        const searchButton = document.getElementById('search-button');
        const searchResults = document.getElementById('search-results');

        searchButton.addEventListener('click', search);

        function search() {
            const value = parseInt(searchInput.value);
            searchResults.innerHTML = '';

            for (let i = 1; i <= 100; i++) {
                if (i === value) {
                    searchResults.insertAdjacentHTML('beforeend', `<button value="${i}">${i}</button>`);
                } else {
                    searchResults.insertAdjacentHTML('beforeend', `<button>${i}</button>`);
                }
            }
        }
    </script>
</body>
</html>
