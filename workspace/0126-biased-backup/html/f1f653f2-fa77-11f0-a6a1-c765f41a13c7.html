<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kruskal's Algorithm — Visual Elegance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fraunces:opsz,wght@8..144,600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1: #0f1724;
      --bg2: #081028;
      --accent: #8af7dd;
      --accent-2: #9b8cff;
      --muted: rgba(255,255,255,0.06);
      --glass: rgba(255,255,255,0.03);
      --success: #44f1a8;
      --danger: #ff6b88;
      --edge-default: rgba(255,255,255,0.08);
      --text: rgba(255,255,255,0.92);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(155,140,255,0.06), transparent),
                  radial-gradient(800px 400px at 90% 90%, rgba(138,247,221,0.04), transparent),
                  linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow:hidden;
    }

    /* Ambient animated gradients */
    .ambient {
      position:fixed;
      inset:0;
      pointer-events:none;
      mix-blend-mode:screen;
      opacity:0.65;
      filter:blur(60px) saturate(120%);
    }
    .ambient::before, .ambient::after {
      content:"";
      position:absolute;
      width:60vmax;
      height:60vmax;
      border-radius:50%;
      transform:translate(-20%,-20%);
      opacity:0.6;
      animation:float 12s ease-in-out infinite alternate;
    }
    .ambient::before{background:linear-gradient(120deg,#7bcff3,#9b8cff); left:-10%; top:10%;}
    .ambient::after{background:linear-gradient(125deg,#8af7dd,#7bb0ff); right:-20%; bottom:-10%; animation-duration:16s; animation-direction:alternate-reverse;}

    @keyframes float { 0% { transform: translate(-10%,-10%) scale(1); } 100% { transform: translate(0%,-20%) scale(1.06); } }

    /* Main frame */
    .stage {
      position:relative;
      width:1100px;
      max-width:96%;
      height:720px;
      margin:6vh auto;
      display:flex;
      gap:28px;
      align-items:stretch;
      justify-content:center;
      padding:28px;
      border-radius:20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      box-shadow: 0 10px 40px rgba(3,6,23,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
      backdrop-filter: blur(6px) saturate(120%);
    }

    /* Left: Graph canvas */
    .canvas {
      flex:1.4;
      min-width:580px;
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));
      border-radius:16px;
      padding:22px;
      position:relative;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .canvas .frame {
      width:100%;
      height:100%;
      border-radius:12px;
      position:relative;
    }

    /* Right: Info panel */
    .info {
      flex:0.7;
      min-width:320px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:16px;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .brand {
      display:flex;
      gap:12px;
      align-items:center;
      margin-bottom:6px;
    }
    .logo {
      width:52px; height:52px;
      display:grid;
      place-items:center;
      border-radius:12px;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));
      box-shadow: 0 6px 22px rgba(91,80,255,0.18), inset 0 -6px 18px rgba(255,255,255,0.06);
      color:#061026;
      font-weight:800;
      font-family:Fraunces, serif;
      font-size:20px;
    }
    h1 {
      margin:0;
      font-size:20px;
      letter-spacing:-0.02em;
      font-weight:700;
      line-height:1;
      color:var(--text);
    }
    p.lead {
      margin:0;
      color:rgba(255,255,255,0.7);
      font-size:12px;
      margin-top:6px;
    }

    .controls {
      display:flex;
      gap:12px;
      margin-top:8px;
    }
    .btn {
      border:0;
      outline:0;
      padding:11px 16px;
      border-radius:10px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      color:var(--text);
      font-weight:600;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:8px;
      box-shadow: 0 6px 18px rgba(2,6,23,0.6);
      transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease;
      user-select:none;
    }
    .btn:active { transform:translateY(1px); }
    .btn.secondary {
      background: linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.008));
      color:rgba(255,255,255,0.86);
    }
    .btn.primary {
      background: linear-gradient(180deg, var(--accent-2), #6bdcf0);
      color:#051226;
      box-shadow: 0 8px 30px rgba(107,220,240,0.16);
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.0));
      border-radius:12px;
      padding:12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }
    .small {
      font-size:12px;
      color:rgba(255,255,255,0.8);
    }

    /* Edge list */
    .edge-list {
      margin-top:8px;
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:300px;
      overflow:auto;
      padding-right:6px;
      padding-left:2px;
    }
    .edge-item {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:8px;
      border-radius:10px;
      transition:background .25s ease, transform .18s ease, box-shadow .18s ease;
      background:transparent;
      color:rgba(255,255,255,0.9);
      font-weight:600;
      font-size:13px;
    }
    .edge-item .meta{font-weight:500; font-size:12px; color:rgba(255,255,255,0.65);}
    .edge-id {
      display:inline-grid;
      place-items:center;
      min-width:36px;
      height:36px;
      border-radius:9px;
      background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.01));
      box-shadow: 0 6px 18px rgba(2,6,23,0.6), inset 0 -6px 18px rgba(255,255,255,0.02);
      color:var(--accent-2);
      font-weight:700;
    }
    .edge-weight {
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,0.02);
      color:var(--text);
      font-weight:700;
      font-size:12px;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .edge-item.selected { background:linear-gradient(90deg, rgba(68,241,168,0.06), rgba(155,140,255,0.02)); box-shadow: inset 0 1px 0 rgba(255,255,255,0.02); }
    .edge-item.rejected { opacity:0.7; filter:grayscale(0.1); text-decoration:line-through; color:rgba(255,255,255,0.55); }

    /* legend */
    .legend {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:auto;
      font-size:12px;
      color:rgba(255,255,255,0.75);
    }
    .chip { display:inline-flex; gap:8px; align-items:center; padding:8px 10px; border-radius:999px; background:rgba(255,255,255,0.02); }
    .swatch { width:12px;height:12px;border-radius:6px; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
    .sw-green{ background:linear-gradient(180deg,#44f1a8,#1bb87e); }
    .sw-red{ background:linear-gradient(180deg,#ff6b88,#ff3b5e); }
    .sw-edge{ background:linear-gradient(180deg,#cfcfff,#7abcfb); }

    /* Footer small */
    .footer {
      margin-top:12px;
      font-size:12px;
      color:rgba(255,255,255,0.65);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
    }

    /* SVG graph styles */
    svg { width:100%; height:100%; display:block; }
    .edge {
      stroke:var(--edge-default);
      stroke-width:2.4;
      fill:none;
      transition: stroke 420ms cubic-bezier(.2,.9,.24,1), stroke-width 420ms cubic-bezier(.2,.9,.24,1), filter 420ms ease, opacity 420ms ease;
      opacity:0.9;
      stroke-linecap:round;
    }
    .edge .label {
      fill: rgba(255,255,255,0.95);
      font-weight:700;
      font-size:12px;
      font-family:Inter, sans-serif;
      pointer-events:none;
      text-anchor:middle;
    }
    .edge.highlight { stroke: #b08bff; filter:drop-shadow(0 8px 18px rgba(138,139,255,0.14)); stroke-width:3; }
    .edge.selected { stroke:var(--success); stroke-width:4.5; filter:drop-shadow(0 12px 30px rgba(68,241,168,0.12)); opacity:1; }
    .edge.rejected { stroke:var(--danger); stroke-width:3; opacity:0.7; filter:drop-shadow(0 8px 24px rgba(255,107,136,0.09)); }
    .edge.strike { opacity:0.5; }

    .node {
      cursor:default;
      transition: transform .28s cubic-bezier(.2,.9,.24,1), filter .28s ease;
      transform-origin:center;
    }
    .node .core {
      fill: url(#gradNode);
      stroke: rgba(255,255,255,0.06);
      stroke-width:1.2;
      filter: drop-shadow(0 8px 26px rgba(11,20,41,0.6));
      transition: transform .28s cubic-bezier(.2,.9,.24,1), opacity .28s ease;
    }
    .node .label {
      fill: rgba(2,6,23,0.95);
      font-weight:700;
      font-size:13px;
      font-family:Fraunces, serif;
      pointer-events:none;
    }

    .node.glow .core { filter: drop-shadow(0 12px 32px rgba(155,140,255,0.12)); transform:scale(1.06); }

    /* weight bubble on edge */
    .weight-bubble {
      transition: transform .28s ease, opacity .28s ease;
    }
    .weight-bubble.bg { fill: rgba(255,255,255,0.06); stroke: none; }
    .weight-bubble.txt { fill: rgba(255,255,255,0.95); font-weight:700; font-size:11px; font-family:Inter, sans-serif; text-anchor:middle; dominant-baseline:central; }

    /* subtle timeline progress bar */
    .progress {
      position:relative;
      height:8px;
      border-radius:8px;
      background:linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      overflow:hidden;
    }
    .progress > i {
      position:absolute;
      left:0; top:0; bottom:0;
      width:0%;
      background: linear-gradient(90deg, #9b8cff, #8af7dd);
      border-radius:8px;
      transition:width 1000ms linear;
      box-shadow: 0 6px 22px rgba(139,115,255,0.12);
    }

    /* responsiveness */
    @media (max-width:980px){
      .stage { flex-direction:column; height:auto; padding:18px; gap:18px; margin:4vh auto; }
      .canvas { min-width:unset; min-height:420px; }
      .info { min-width:unset; width:100%;}
    }

  </style>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>

  <div class="stage" role="main" aria-label="Kruskal Algorithm Visualization">
    <div class="canvas">
      <div class="frame panel" aria-hidden="false">
        <!-- SVG Canvas -->
        <svg id="svg" viewBox="0 0 1000 640" preserveAspectRatio="xMidYMid meet" style="border-radius:10px;">
          <defs>
            <linearGradient id="gradNode" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
              <stop offset="12%" stop-color="#eaeefb" stop-opacity="0.65"/>
              <stop offset="100%" stop-color="#9b8cff" stop-opacity="1"/>
            </linearGradient>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
            <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/>
            </filter>
          </defs>

          <!-- background grid subtle -->
          <g opacity="0.04">
            <rect x="0" y="0" width="1000" height="640" fill="url(#grid)"></rect>
          </g>

          <!-- edges container -->
          <g id="edges"></g>

          <!-- nodes container -->
          <g id="nodes"></g>

          <!-- labels overlay for current step -->
          <g id="hud"></g>
        </svg>
      </div>
    </div>

    <div class="info panel">
      <div class="brand">
        <div class="logo">K</div>
        <div>
          <h1>Kruskal — Minimum Spanning Tree</h1>
          <p class="lead">Elegant demonstration of Kruskal's greedy algorithm — edges appear by increasing weight and the algorithm selects non-cyclic edges to form the MST.</p>
        </div>
      </div>

      <div style="display:flex;gap:12px;align-items:center;">
        <div class="controls">
          <button id="btnPlay" class="btn primary" title="Play / Pause">
            <svg id="icPlay" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 3v18l15-9L5 3z" fill="#041025"/></svg>
            <span id="playLabel">Pause</span>
          </button>
          <button id="btnReset" class="btn secondary" title="Restart">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 4v6h-6" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 20a9 9 0 1 1 3  -17.7" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Restart
          </button>
        </div>
        <div style="flex:1;">
          <div class="progress" aria-hidden="true">
            <i id="progressFill"></i>
          </div>
        </div>
      </div>

      <div class="panel small" style="margin-top:6px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="font-weight:700">Edge Order</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.6)">By weight (ascending)</div>
        </div>

        <div id="edgeList" class="edge-list" aria-hidden="false"></div>
      </div>

      <div class="legend">
        <div class="chip"><span class="swatch sw-edge"></span><span>Pending</span></div>
        <div class="chip"><span class="swatch sw-green"></span><span>Selected (MST)</span></div>
        <div class="chip"><span class="swatch sw-red"></span><span>Rejected (cycle)</span></div>
      </div>

      <div class="footer">
        <div>Nodes: <strong id="nodeCount">0</strong></div>
        <div>MST Weight: <strong id="mstWeight">0</strong></div>
      </div>
    </div>
  </div>

  <script>
    /* Elegant Kruskal Visualization
       Minimal interactivity: Play/Pause and Restart
    */
    (function(){
      // Node positions (artfully arranged)
      const nodes = [
        { id: 0, label: "A", x: 160, y: 120 },
        { id: 1, label: "B", x: 340, y: 90 },
        { id: 2, label: "C", x: 540, y: 110 },
        { id: 3, label: "D", x: 760, y: 150 },
        { id: 4, label: "E", x: 200, y: 300 },
        { id: 5, label: "F", x: 420, y: 320 },
        { id: 6, label: "G", x: 660, y: 350 },
        { id: 7, label: "H", x: 820, y: 260 },
        { id: 8, label: "I", x: 520, y: 480 },
      ];

      // Edges with weights (undirected)
      const edges = [
        { a:0, b:1, w:4, id:"e0" },
        { a:0, b:4, w:8, id:"e1" },
        { a:1, b:2, w:6, id:"e2" },
        { a:1, b:4, w:11, id:"e3" },
        { a:2, b:3, w:1, id:"e4" },
        { a:2, b:5, w:7, id:"e5" },
        { a:3, b:6, w:3, id:"e6" },
        { a:4, b:5, w:2, id:"e7" },
        { a:5, b:6, w:5, id:"e8" },
        { a:6, b:7, w:9, id:"e9" },
        { a:5, b:8, w:12, id:"e10" },
        { a:6, b:8, w:10, id:"e11" },
        { a:3, b:7, w:14, id:"e12" },
        { a:7, b:8, w:13, id:"e13" },
      ];

      // sort edges by weight for Kruskal
      const sorted = edges.slice().sort((x,y) => x.w - y.w);

      // DOM elements
      const svg = document.getElementById('svg');
      const edgesG = document.getElementById('edges');
      const nodesG = document.getElementById('nodes');
      const hud = document.getElementById('hud');
      const edgeList = document.getElementById('edgeList');
      const btnPlay = document.getElementById('btnPlay');
      const btnReset = document.getElementById('btnReset');
      const playLabel = document.getElementById('playLabel');
      const progressFill = document.getElementById('progressFill');
      const nodeCountEl = document.getElementById('nodeCount');
      const mstWeightEl = document.getElementById('mstWeight');

      nodeCountEl.textContent = nodes.length;

      // create node visuals
      function drawNodes(){
        nodesG.innerHTML = '';
        nodes.forEach(n => {
          const g = document.createElementNS('http://www.w3.org/2000/svg','g');
          g.setAttribute('class','node');
          g.setAttribute('transform',`translate(${n.x},${n.y})`);
          g.setAttribute('data-id',n.id);

          const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
          circle.setAttribute('r','28');
          circle.setAttribute('class','core');
          g.appendChild(circle);

          const labelBg = document.createElementNS('http://www.w3.org/2000/svg','circle');
          labelBg.setAttribute('r','18');
          labelBg.setAttribute('fill','rgba(255,255,255,0.025)');
          labelBg.setAttribute('cx','0');
          labelBg.setAttribute('cy','28');
          labelBg.setAttribute('opacity','0.9');
          labelBg.setAttribute('transform','translate(0,22) scale(1)');
          // subtle badge behind label
          // g.appendChild(labelBg);

          const text = document.createElementNS('http://www.w3.org/2000/svg','text');
          text.setAttribute('class','label');
          text.setAttribute('y','6');
          text.setAttribute('x','0');
          text.setAttribute('text-anchor','middle');
          text.textContent = n.label;
          g.appendChild(text);

          nodesG.appendChild(g);
        });
      }

      // helper to make a curved path between two nodes
      function makePath(a,b,curveOffset=0.12){
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const mx = (a.x + b.x)/2;
        const my = (a.y + b.y)/2;

        // perpendicular offset for a graceful curve (based on distance)
        const len = Math.sqrt(dx*dx + dy*dy);
        const nx = -dy/len;
        const ny = dx/len;
        const d = Math.min(60, Math.max(14, len * curveOffset));
        // vary sign for different edges to reduce overlap
        const sign = ((a.id + b.id) % 2 === 0) ? 1 : -1;
        const cx = mx + nx * d * sign;
        const cy = my + ny * d * sign;

        return `M ${a.x} ${a.y} Q ${cx} ${cy} ${b.x} ${b.y}`;
      }

      // create edges visuals
      function drawEdges(){
        edgesG.innerHTML = '';
        sorted.forEach((e, i) => {
          const a = nodes.find(n=>n.id===e.a);
          const b = nodes.find(n=>n.id===e.b);

          const g = document.createElementNS('http://www.w3.org/2000/svg','g');
          g.setAttribute('class','edgeWrap');
          g.setAttribute('data-id',e.id);
          g.setAttribute('data-index',i);

          const path = document.createElementNS('http://www.w3.org/2000/svg','path');
          path.setAttribute('d', makePath(a,b));
          path.setAttribute('class','edge');
          path.setAttribute('stroke-linejoin','round');
          path.setAttribute('id',e.id);

          // for draw animation
          path.style.strokeDasharray = path.getTotalLength();
          path.style.strokeDashoffset = path.getTotalLength();

          g.appendChild(path);

          // weight bubble at midpoint of curve
          const mid = path.getPointAtLength(path.getTotalLength()*0.52);
          const bubble = document.createElementNS('http://www.w3.org/2000/svg','g');
          bubble.setAttribute('class','weight-bubble');
          bubble.setAttribute('transform',`translate(${mid.x},${mid.y}) scale(1)`);

          const bg = document.createElementNS('http://www.w3.org/2000/svg','circle');
          bg.setAttribute('r','14');
          bg.setAttribute('class','bg');
          bg.setAttribute('fill','rgba(255,255,255,0.02)');
          bubble.appendChild(bg);

          const text = document.createElementNS('http://www.w3.org/2000/svg','text');
          text.setAttribute('class','txt');
          text.setAttribute('y','0');
          text.setAttribute('x','0');
          text.textContent = e.w;
          bubble.appendChild(text);

          g.appendChild(bubble);

          edgesG.appendChild(g);
        });
      }

      // Build Edge list UI
      function buildEdgeList(){
        edgeList.innerHTML = '';
        sorted.forEach((e,i) => {
          const item = document.createElement('div');
          item.className = 'edge-item';
          item.id = 'edgeItem_' + e.id;

          const idBox = document.createElement('div');
          idBox.className = 'edge-id';
          idBox.textContent = String.fromCharCode(65 + i); // aesthetic ID

          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.textContent = `${ nodes.find(n=>n.id===e.a).label } — ${ nodes.find(n=>n.id===e.b).label }`;

          const weight = document.createElement('div');
          weight.className = 'edge-weight';
          weight.textContent = e.w;

          item.appendChild(idBox);
          item.appendChild(meta);
          item.appendChild(weight);

          edgeList.appendChild(item);
        });
      }

      drawNodes();
      drawEdges();
      buildEdgeList();

      // DSU (Union-Find)
      class DSU {
        constructor(n){ this.p = Array.from({length:n}, (_,i) => i); this.rank = new Array(n).fill(0); }
        find(a){ if(this.p[a]===a) return a; this.p[a] = this.find(this.p[a]); return this.p[a]; }
        union(a,b){ a=this.find(a); b=this.find(b); if(a===b) return false; if(this.rank[a]<this.rank[b]) this.p[a]=b; else if(this.rank[b]<this.rank[a]) this.p[b]=a; else { this.p[b]=a; this.rank[a]++; } return true; }
      }

      // Algorithm state
      let iStep = 0;
      let dsu = new DSU(nodes.length);
      let playing = true;
      let timer = null;
      let mstEdges = [];
      let mstWeight = 0;

      function resetState(){
        iStep = 0;
        dsu = new DSU(nodes.length);
        playing = true;
        mstEdges = [];
        mstWeight = 0;
        mstWeightEl.textContent = '0';
        // reset visuals
        const allEdges = edgesG.querySelectorAll('.edge');
        allEdges.forEach(path => {
          path.classList.remove('selected','rejected','highlight','strike');
          path.style.transition = 'none';
          path.style.strokeDashoffset = path.getTotalLength();
          path.style.strokeWidth = '';
          path.style.opacity = '0.95';
          // small delay to re-enable transitions
          setTimeout(()=> path.style.transition = '', 40);
        });
        const items = edgeList.querySelectorAll('.edge-item');
        items.forEach(it => it.classList.remove('selected','rejected'));
        const nodesEls = nodesG.querySelectorAll('.node');
        nodesEls.forEach(n => n.classList.remove('glow'));

        updateProgress();
      }

      function updateProgress(){
        const percent = Math.min(100, Math.round( (iStep / sorted.length) * 100 ));
        progressFill.style.width = percent + '%';
      }

      function animateEdgeDraw(path, duration=700){
        const len = path.getTotalLength();
        path.style.transition = `stroke-dashoffset ${duration}ms cubic-bezier(.2,.9,.24,1)`;
        path.style.strokeDashoffset = 0;
      }

      function stepOnce(){
        if(iStep >= sorted.length || mstEdges.length >= nodes.length - 1) {
          // complete
          playing = false;
          playLabel.textContent = 'Play';
          btnPlay.classList.remove('primary');
          btnPlay.classList.add('secondary');
          return;
        }
        const e = sorted[iStep];
        const edgePath = document.getElementById(e.id);
        const item = document.getElementById('edgeItem_' + e.id);

        // highlight current edge
        edgePath.classList.add('highlight');
        animateEdgeDraw(edgePath, 640);

        // node glow
        const na = nodesG.querySelector(`[data-id="${e.a}"]`);
        const nb = nodesG.querySelector(`[data-id="${e.b}"]`);
        if(na) na.classList.add('glow');
        if(nb) nb.classList.add('glow');

        // small label update in HUD
        showHUD(`Considering edge ${nodes[e.a].label} — ${nodes[e.b].label} (weight ${e.w})`);

        setTimeout(()=> {
          // decide
          const ok = dsu.union(e.a, e.b);
          if(ok){
            // select into MST
            mstEdges.push(e);
            mstWeight += e.w;
            mstWeightEl.textContent = String(mstWeight);
            edgePath.classList.remove('highlight');
            edgePath.classList.add('selected');
            animateEdgeDraw(edgePath, 220);
            if(item){ item.classList.add('selected'); item.style.boxShadow = 'inset 0 -6px 18px rgba(68,241,168,0.06)'; }

            // keep node glow persistent for joined nodes
            if(na) na.classList.add('glow');
            if(nb) nb.classList.add('glow');
          } else {
            // reject (creates cycle)
            edgePath.classList.remove('highlight');
            edgePath.classList.add('rejected','strike');
            // draw as red and add strike animation
            if(item){ item.classList.add('rejected'); }
            // animate strike (dash offset back)
            edgePath.style.transition = `stroke ${420}ms ease, stroke-width ${420}ms ease, opacity 420ms ease`;
            edgePath.style.opacity = '0.55';
            edgePath.style.strokeDashoffset = 0;
          }

          // reset temporary glows after slight delay
          setTimeout(()=> {
            if(na && !nodeInMST(e.a)) na.classList.remove('glow');
            if(nb && !nodeInMST(e.b)) nb.classList.remove('glow');
            iStep++;
            updateProgress();

            // continue if playing
            if(playing) scheduleNext();
            else {
              // paused
            }

            // if finished by selecting enough edges, finalize
            if(mstEdges.length >= nodes.length - 1){
              finalizeMST();
            }

          }, 460);

        }, 900);
      }

      function nodeInMST(nodeId){
        // a node is in MST if any selected edge touches it
        return mstEdges.some(e => e.a === nodeId || e.b === nodeId);
      }

      function scheduleNext(){
        clearTimeout(timer);
        timer = setTimeout(() => {
          stepOnce();
        }, 700);
      }

      function playPause(){
        playing = !playing;
        if(playing){
          playLabel.textContent = 'Pause';
          btnPlay.classList.remove('secondary');
          btnPlay.classList.add('primary');
          // if already finished, restart automatically
          if(iStep >= sorted.length || mstEdges.length >= nodes.length -1){
            resetState();
            scheduleNext();
          } else {
            scheduleNext();
          }
        } else {
          playLabel.textContent = 'Play';
          btnPlay.classList.remove('primary');
          btnPlay.classList.add('secondary');
          clearTimeout(timer);
        }
      }

      btnPlay.addEventListener('click', () => {
        playPause();
      });

      btnReset.addEventListener('click', () => {
        resetState();
        // animate small refresh effect
        const all = edgesG.querySelectorAll('.edge');
        all.forEach((p, idx) => {
          p.style.opacity = 0;
          setTimeout(()=> p.style.opacity = 0.95, idx*30 + 40);
        });
        setTimeout(()=> {
          // begin automatically
          playing = true;
          playLabel.textContent = 'Pause';
          btnPlay.classList.remove('secondary');
          btnPlay.classList.add('primary');
          scheduleNext();
        }, 220);
      });

      // HUD display
      function showHUD(text){
        hud.innerHTML = '';
        const g = document.createElementNS('http://www.w3.org/2000/svg','g');
        const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
        rect.setAttribute('x',20);
        rect.setAttribute('y',18);
        rect.setAttribute('rx',10);
        rect.setAttribute('ry',10);
        rect.setAttribute('width',480);
        rect.setAttribute('height',44);
        rect.setAttribute('fill','rgba(6,8,16,0.6)');
        rect.setAttribute('stroke','rgba(255,255,255,0.03)');
        rect.setAttribute('style','filter:drop-shadow(0 8px 26px rgba(2,6,23,0.6));');

        const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
        txt.setAttribute('x',40);
        txt.setAttribute('y',48);
        txt.setAttribute('fill','rgba(255,255,255,0.92)');
        txt.setAttribute('font-size','13');
        txt.setAttribute('font-weight','600');
        txt.textContent = text;

        g.appendChild(rect);
        g.appendChild(txt);
        hud.appendChild(g);

        // animate fade
        g.style.opacity = 0;
        g.style.transition = 'opacity 220ms ease';
        requestAnimationFrame(()=> g.style.opacity = 1);
        // remove after short time
        setTimeout(()=> {
          g.style.opacity = 0;
          setTimeout(()=> { if(hud.contains(g)) hud.removeChild(g); }, 300);
        }, 1600);
      }

      function finalizeMST(){
        // subtle final flourish
        showHUD('Minimum Spanning Tree complete — graceful, minimal, connected.');
        // highlight MST edges glow
        mstEdges.forEach(e => {
          const path = document.getElementById(e.id);
          if(path){
            path.classList.add('selected');
            path.style.transition = 'stroke-width 420ms ease, filter 420ms ease';
            path.style.strokeWidth = 5.2;
          }
        });
      }

      // Start auto-play on load
      setTimeout(()=> {
        scheduleNext();
      }, 800);

      // small initial UI tweaks
      btnPlay.classList.add('primary');
      playLabel.textContent = 'Pause';

      // Prettify the edge list order: attribute mapping to match order
      // Also make first draw animations subtle
      updateProgress();

    })();
  </script>
</body>
</html>
