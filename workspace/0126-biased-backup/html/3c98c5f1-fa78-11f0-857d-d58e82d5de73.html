<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Time Complexity — A Visual Elegance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap');

  /* Root colors for a professional dark palette */
  :root {
    --color-bg: #0f172a;
    --color-primary: #38bdf8; /* sky blue */
    --color-secondary: #818cf8; /* indigo */
    --color-accent: #facc15; /* amber */
    --color-text-primary: #e0e7ff;
    --color-text-secondary: #a5b4fc;
    --color-shadow: rgba(24, 71, 146, 0.25);
    --font-sans: 'Inter', sans-serif;
  }

  /* Reset and base */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  html, body {
    height: 100%;
    background: var(--color-bg);
    color: var(--color-text-primary);
    font-family: var(--font-sans);
    overflow-x: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1rem 5rem;
    min-height: 100vh;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 3rem;
  }
  header h1 {
    font-weight: 600;
    font-size: 3.5rem;
    color: var(--color-primary);
    letter-spacing: 0.05em;
    line-height: 1.1;
    text-shadow:
      0 0 8px #38bdf8cc,
      0 0 20px #38bdf8bb;
    user-select: none;
  }
  header p {
    margin-top: 0.6rem;
    font-weight: 300;
    font-size: 1.25rem;
    color: var(--color-text-secondary);
    letter-spacing: 0.03em;
  }

  /* Container for main content */
  main {
    width: 100%;
    max-width: 900px;
    background: linear-gradient(180deg, #1e293bdd 0%, #0f172aee 100%);
    border-radius: 2rem;
    box-shadow:
      0 0 30px var(--color-primary),
      inset 0 0 15px #081029;
    backdrop-filter: blur(18px);
    padding: 3rem 4rem 5rem;
    position: relative;
    overflow: visible;
  }

  /* TIME COMPLEXITY GRAPH */
  .graph-container {
    position: relative;
    height: 380px;
    margin-top: 1rem;
  }

  /* Axis lines */
  .axis {
    position: absolute;
    background: var(--color-text-secondary);
    opacity: 0.2;
    filter: drop-shadow(1px 1px 1px #0005);
    user-select: none;
  }
  .axis-x {
    bottom: 48px;
    left: 48px;
    right: 48px;
    height: 2px;
    border-radius: 1px;
  }
  .axis-y {
    top: 48px;
    bottom: 80px;
    left: 48px;
    width: 2px;
    border-radius: 1px;
  }

  /* Axis labels */
  .labels-x, .labels-y {
    position: absolute;
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    color: var(--color-text-secondary);
    user-select: none;
  }
  .labels-x {
    bottom: 18px;
    left: 48px;
    right: 48px;
    display: flex;
    justify-content: space-between;
    padding: 0 2px;
  }
  .labels-y {
    top: 48px;
    bottom: 80px;
    left: 6px;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 3rem;
  }
  .labels-y span {
    transform: translateX(2px);
    opacity: 0.8;
  }

  /* Curves container */
  .curves {
    position: absolute;
    top: 48px;
    left: 48px;
    right: 48px;
    bottom: 80px;
    pointer-events: none;
  }

  svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* Curve styles */
  .curve-path {
    fill: none;
    stroke-width: 3.5;
    stroke-linejoin: round;
    stroke-linecap: round;
    transition: stroke-dashoffset 1.3s cubic-bezier(0.23, 1, 0.32, 1);
  }
  .curve-constant {
    stroke: var(--color-secondary);
    stroke-dasharray: 720;
    stroke-dashoffset: 720;
    filter: drop-shadow(0 0 10px #818cf8cc);
  }
  .curve-log {
    stroke: var(--color-primary);
    stroke-dasharray: 720;
    stroke-dashoffset: 720;
    filter: drop-shadow(0 0 12px #38bdf8cc);
  }
  .curve-linear {
    stroke: var(--color-accent);
    stroke-dasharray: 720;
    stroke-dashoffset: 720;
    filter: drop-shadow(0 0 14px #facc1588);
  }
  .curve-nlogn {
    stroke: #f97316; /* orange-500 */
    stroke-dasharray: 720;
    stroke-dashoffset: 720;
    filter: drop-shadow(0 0 14px #f9731688);
  }
  .curve-quadratic {
    stroke: #ef4444; /* red-500 */
    stroke-dasharray: 720;
    stroke-dashoffset: 720;
    filter: drop-shadow(0 0 14px #ef444488);
  }
  .curve-exponential {
    stroke: #db2777; /* pink-600 */
    stroke-dasharray: 720;
    stroke-dashoffset: 720;
    filter: drop-shadow(0 0 18px #db277788);
  }

  /* Labels for curves */
  .legend {
    margin-top: 3rem;
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
    gap: 0.8rem 2rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    user-select: none;
    color: var(--color-text-secondary);
    font-weight: 600;
    font-size: 1rem;
    opacity: 0.9;
    transition: color 0.3s ease;
  }
  .legend-color {
    width: 24px;
    height: 10px;
    border-radius: 4px;
    box-shadow: 0 0 8px;
  }
  .legend-constant {
    background: var(--color-secondary);
    box-shadow: 0 0 10px #818cf8cc;
  }
  .legend-log {
    background: var(--color-primary);
    box-shadow: 0 0 12px #38bdf8cc;
  }
  .legend-linear {
    background: var(--color-accent);
    box-shadow: 0 0 14px #facc1588;
  }
  .legend-nlogn {
    background: #f97316;
    box-shadow: 0 0 14px #f9731688;
  }
  .legend-quadratic {
    background: #ef4444;
    box-shadow: 0 0 14px #ef444488;
  }
  .legend-exponential {
    background: #db2777;
    box-shadow: 0 0 18px #db277788;
  }

  /* Button container */
  .controls {
    margin-top: 3rem;
    text-align: center;
  }
  button {
    background: var(--color-primary);
    border: none;
    outline: none;
    cursor: pointer;
    color: var(--color-bg);
    font-weight: 600;
    font-size: 1.1rem;
    padding: 0.65rem 2rem;
    border-radius: 1.2rem;
    box-shadow:
      0 0 12px var(--color-primary);
    transition:
      background-color 0.3s ease,
      box-shadow 0.3s ease,
      transform 0.2s ease;
    user-select: none;
  }
  button:hover,
  button:focus {
    background: var(--color-accent);
    box-shadow:
      0 0 20px var(--color-accent);
    transform: scale(1.05);
  }
  button:active {
    transform: scale(0.95);
  }

  /* Footer */
  footer {
    margin-top: 4rem;
    font-size: 0.85rem;
    color: var(--color-text-secondary);
    user-select: none;
    font-style: italic;
  }

  /* Subtle background animation behind main */
  body::before {
    content: "";
    position: fixed;
    top: -50vh;
    left: -50vw;
    width: 200vw;
    height: 200vh;
    background:
      radial-gradient(circle at 30% 40%, #38bdf8aa, transparent 60%),
      radial-gradient(circle at 70% 70%, #facc15aa, transparent 50%),
      radial-gradient(circle at 50% 35%, #818cf8aa, transparent 70%);
    animation: bgFloat 30s ease-in-out infinite alternate;
    z-index: -1;
    filter: blur(70px);
  }
  @keyframes bgFloat {
    0% {
      transform: translate(0, 0) scale(1);
      opacity: 0.6;
    }
    100% {
      transform: translate(40px, -45px) scale(1.1);
      opacity: 0.85;
    }
  }

  /* Responsive typography */
  @media (max-width: 600px){
    header h1 {
      font-size: 2.25rem;
    }
    main {
      padding: 2rem 2rem 4rem;
    }
    .legend {
      gap: 0.4rem 1rem;
    }
  }
</style>
</head>
<body>
<header>
  <h1>Time Complexity</h1>
  <p>Visualizing the landscape of algorithmic growth</p>
</header>
<main>
  <div class="graph-container" role="img" aria-label="Graph showing different time complexity curves">
    <div class="axis axis-x"></div>
    <div class="axis axis-y"></div>
    <div class="labels-y" aria-hidden="true">
      <span>1000</span>
      <span>100</span>
      <span>10</span>
      <span>1</span>
    </div>
    <div class="labels-x" aria-hidden="true">
      <span>1</span>
      <span>10</span>
      <span>20</span>
      <span>30</span>
      <span>40</span>
      <span>50</span>
      <span>60</span>
      <span>70</span>
      <span>80</span>
      <span>90</span>
      <span>100</span>
    </div>
    <div class="curves" aria-hidden="true">
      <svg viewBox="0 0 110 110" preserveAspectRatio="none" aria-hidden="true" >
        <!-- Constant O(1) -->
        <path class="curve-path curve-constant" d="M5 100 L105 100" />
        <!-- Logarithmic O(log n) -->
        <path class="curve-path curve-log" d="M5 98 Q30 95 55 90 Q80 85 105 80" />
        <!-- Linear O(n) -->
        <path class="curve-path curve-linear" d="M5 95 L105 15" />
        <!-- Linearithmic O(n log n) -->
        <path class="curve-path curve-nlogn" d="M5 92 Q45 60 85 35 L105 28" />
        <!-- Quadratic O(n²) -->
        <path class="curve-path curve-quadratic" d="M5 95 C40 80 75 50 105 5" />
        <!-- Exponential O(2ⁿ) -->
        <path class="curve-path curve-exponential" d="M5 95 C40 30 70 10 105 1" />
      </svg>
    </div>
  </div>
  <section class="legend" aria-label="Legend describing time complexity curves">
    <div class="legend-item"><div class="legend-color legend-constant"></div>Constant O(1)</div>
    <div class="legend-item"><div class="legend-color legend-log"></div>Logarithmic O(log n)</div>
    <div class="legend-item"><div class="legend-color legend-linear"></div>Linear O(n)</div>
    <div class="legend-item"><div class="legend-color legend-nlogn"></div>Linearithmic O(n log n)</div>
    <div class="legend-item"><div class="legend-color legend-quadratic"></div>Quadratic O(n²)</div>
    <div class="legend-item"><div class="legend-color legend-exponential"></div>Exponential O(2ⁿ)</div>
  </section>
  <div class="controls" aria-label="Controls for animating the time complexity curves">
    <button id="animateBtn" aria-pressed="false" aria-label="Animate Time Complexity Curves">Animate Curves</button>
  </div>
</main>
<footer>
  &mdash; The Beauty of Algorithms &mdash;
</footer>
<script>
  (() => {
    const btn = document.getElementById('animateBtn');
    const curves = document.querySelectorAll('.curve-path');
    let animated = false;
    let animationTimeout;

    // Reset all curves to hidden offset
    function resetCurves() {
      curves.forEach(curve => {
        curve.style.transition = 'none';
        curve.style.strokeDashoffset = getComputedStyle(curve).strokeDasharray;
      });
      // Force reflow to apply styles immediately without transition
      void btn.offsetWidth;
      curves.forEach(curve => {
        curve.style.transition = 'stroke-dashoffset 1.3s cubic-bezier(0.23, 1, 0.32, 1)';
      });
    }

    // Animate curves drawing in a staggered manner
    function animateCurves() {
      curves.forEach((curve, i) => {
        setTimeout(() => {
          curve.style.strokeDashoffset = '0';
        }, i * 180);
      });
    }

    btn.addEventListener('click', () => {
      if (animated) {
        // Reverse animation (hide curves)
        curves.forEach((curve, i) => {
          setTimeout(() => {
            curve.style.strokeDashoffset = getComputedStyle(curve).strokeDasharray;
          }, i * 140);
        });
        btn.textContent = "Animate Curves";
        btn.setAttribute('aria-pressed', 'false');
      } else {
        animateCurves();
        btn.textContent = "Reset Animation";
        btn.setAttribute('aria-pressed', 'true');
      }
      animated = !animated;
      clearTimeout(animationTimeout);
      animationTimeout = setTimeout(() => {
        animated = false;
        btn.textContent = "Animate Curves";
        btn.setAttribute('aria-pressed', 'false');
        resetCurves();
      }, 12000);
    });

    // On page load, reset curves to hidden state
    window.addEventListener('load', () => {
      resetCurves();
    });
  })();
</script>
</body>
</html>
