<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Merge Sort Explorer - Interactive</title>
<style>
  /* Extremely minimal visual styling - basic layout only */
  body { font-family: Arial, sans-serif; color: #000; background: #fff; margin: 10px; }
  .row { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 13px; }
  input[type="range"] { width: 160px; }
  button, select, input[type="text"], input[type="number"], textarea { font-size: 13px; }
  #arrayView { display:flex; gap:4px; flex-wrap:wrap; padding:6px; border:1px solid #000; min-height:36px; }
  .cell { padding:6px 8px; border:1px solid #000; cursor:pointer; user-select:none; }
  .cell.highlight { background: #fff; } /* no color change to adhere to plain design */
  #bufferView { display:flex; gap:4px; padding:6px; border:1px solid #000; min-height:36px; }
  #recursionTree, #callStack, #log { padding:6px; border:1px solid #000; min-height:60px; white-space:pre-wrap; overflow:auto; }
  #controls { border:1px solid #000; padding:6px; }
  #timeline { width:100%; }
  textarea { width:100%; height:60px; }
  .small { font-size:12px; }
  .muted { font-size:12px; }
  .spaced { margin-right:8px; }
  #main { display:flex; gap:12px; }
  #leftPane { flex:1; }
  #rightPane { width:360px; }
</style>
</head>
<body>
<h3>Merge Sort Explorer (Interactive)</h3>

<div id="controls">
  <div class="row">
    <div class="col" style="min-width:320px;">
      <label>Array size: <input id="sizeInput" type="number" min="1" max="200" value="10" style="width:60px;"></label>
      <label>Min value: <input id="minVal" type="number" value="0" style="width:60px;"></label>
      <label>Max value: <input id="maxVal" type="number" value="99" style="width:60px;"></label>
      <button id="genRandom">Generate Random</button>
      <button id="genSorted">Generate Sorted</button>
      <button id="genReversed">Generate Reversed</button>
      <button id="genDuplicates">Generate Duplicates</button>
    </div>

    <div class="col">
      <label>Algorithm:
        <select id="algoSelect">
          <option value="topdown">Top-Down Recursive</option>
          <option value="bottomup">Bottom-Up Iterative</option>
        </select>
      </label>
      <label>Direction:
        <select id="dirSelect">
          <option value="asc">Ascending</option>
          <option value="desc">Descending</option>
        </select>
      </label>
      <label><input id="autoTrace" type="checkbox" checked> Auto-generate trace on change</label>
    </div>
  </div>

  <div class="row">
    <div style="flex:1;">
      <label>Custom array (comma or space separated):</label><br>
      <textarea id="customArrayInput" placeholder="e.g. 5,1,9,2,2"></textarea>
      <div class="row">
        <button id="applyCustom">Apply Custom Array</button>
        <button id="clearArray">Clear</button>
      </div>
    </div>

    <div style="width:380px;">
      <label>Trace controls:</label>
      <div class="row">
        <button id="generateTrace">Generate Trace</button>
        <button id="exportTrace">Export Trace JSON</button>
        <button id="importTraceBtn">Import Trace JSON</button>
        <input id="importTraceInput" type="file" accept=".json">
      </div>

      <div class="row">
        <label>Play speed: <input id="speedRange" type="range" min="50" max="2000" value="400"></label>
        <label class="small">ms/step</label>
      </div>

      <div class="row">
        <label><input id="showRec" type="checkbox" checked> Show recursion tree</label>
        <label><input id="showStack" type="checkbox" checked> Show call stack</label>
        <label><input id="showLog" type="checkbox" checked> Show log</label>
      </div>
    </div>
  </div>

  <hr>

  <div class="row">
    <div class="col" style="flex:1;">
      <div class="row">
        <button id="stepPrev">⟸ Prev</button>
        <button id="stepNext">Next ⟹</button>
        <button id="stepInto">Step Into</button>
        <button id="stepOver">Step Over</button>
        <button id="stepOut">Step Out</button>
        <button id="playPause">Play</button>
        <button id="resetBtn">Reset</button>
      </div>
      <div class="row">
        <label>Jump to step: <input id="gotoStep" type="number" min="0" value="0" style="width:80px;"></label>
        <button id="gotoBtn">Go</button>
        <label>Detail level:
          <input id="detailRange" type="range" min="0" max="3" value="2">
        </label>
      </div>
    </div>

    <div style="width:380px;">
      <label>Breakpoints (by call id or depth):</label>
      <div class="row">
        <label>ID: <input id="bpId" type="number" style="width:80px;"></label>
        <label>Depth: <input id="bpDepth" type="number" style="width:80px;"></label>
        <button id="setBp">Set</button>
        <button id="clearBp">Clear</button>
      </div>
      <div class="row">
        <button id="saveSnapshot">Save Snapshot</button>
        <button id="loadSnapshot">Load Snapshot</button>
        <select id="snapshotsList"></select>
      </div>
    </div>
  </div>
</div>

<div id="main">
  <div id="leftPane">
    <h4>Array</h4>
    <div id="arrayView" title="Click a cell to edit"></div>
    <h4>Auxiliary / Buffer</h4>
    <div id="bufferView"></div>
    <div class="row">
      <label>Timeline: <input id="timeline" type="range" min="0" max="0" value="0"></label>
      <span id="stepLabel" class="muted">Step 0 / 0</span>
    </div>
    <h4>Current Operation</h4>
    <div id="opDetail" style="border:1px solid #000;padding:6px;min-height:40px;"></div>
  </div>

  <div id="rightPane">
    <h4>Recursion Tree</h4>
    <div id="recursionTree"></div>
    <h4>Call Stack</h4>
    <div id="callStack"></div>
    <h4>Operation Log</h4>
    <div id="log"></div>
  </div>
</div>

<script>
/*
  Merge Sort Explorer - Interactive
  - Generates a trace of events representing a merge sort execution (top-down or bottom-up).
  - Allows step-by-step navigation, step into/over/out, play/pause, breakpoints.
  - Shows recursion tree and call stack and a detailed log.
  - Minimal visuals intentionally.
*/

(function(){

// Utility
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function copyArr(a){ return a.slice(); }
function parseArrayInput(str) {
  if (!str) return [];
  const tokens = str.trim().split(/[\s,;]+/).filter(Boolean);
  const nums = tokens.map(t => {
    const n = Number(t);
    return isNaN(n) ? 0 : n;
  });
  return nums;
}

// DOM Elements
const sizeInput = document.getElementById('sizeInput');
const minVal = document.getElementById('minVal');
const maxVal = document.getElementById('maxVal');
const genRandom = document.getElementById('genRandom');
const genSorted = document.getElementById('genSorted');
const genReversed = document.getElementById('genReversed');
const genDuplicates = document.getElementById('genDuplicates');
const algoSelect = document.getElementById('algoSelect');
const dirSelect = document.getElementById('dirSelect');
const autoTrace = document.getElementById('autoTrace');

const customArrayInput = document.getElementById('customArrayInput');
const applyCustom = document.getElementById('applyCustom');
const clearArray = document.getElementById('clearArray');

const generateTraceBtn = document.getElementById('generateTrace');
const exportTraceBtn = document.getElementById('exportTrace');
const importTraceBtn = document.getElementById('importTraceBtn');
const importTraceInput = document.getElementById('importTraceInput');

const showRec = document.getElementById('showRec');
const showStack = document.getElementById('showStack');
const showLog = document.getElementById('showLog');

const stepPrev = document.getElementById('stepPrev');
const stepNext = document.getElementById('stepNext');
const stepInto = document.getElementById('stepInto');
const stepOver = document.getElementById('stepOver');
const stepOut = document.getElementById('stepOut');
const playPause = document.getElementById('playPause');
const resetBtn = document.getElementById('resetBtn');

const gotoStep = document.getElementById('gotoStep');
const gotoBtn = document.getElementById('gotoBtn');
const detailRange = document.getElementById('detailRange');

const bpIdInput = document.getElementById('bpId');
const bpDepthInput = document.getElementById('bpDepth');
const setBp = document.getElementById('setBp');
const clearBp = document.getElementById('clearBp');

const saveSnapshotBtn = document.getElementById('saveSnapshot');
const loadSnapshotBtn = document.getElementById('loadSnapshot');
const snapshotsList = document.getElementById('snapshotsList');

const arrayView = document.getElementById('arrayView');
const bufferView = document.getElementById('bufferView');
const recursionTree = document.getElementById('recursionTree');
const callStackDiv = document.getElementById('callStack');
const logDiv = document.getElementById('log');
const opDetail = document.getElementById('opDetail');

const timeline = document.getElementById('timeline');
const stepLabel = document.getElementById('stepLabel');
const speedRange = document.getElementById('speedRange');

const importTraceFile = importTraceInput;

// State
let array = [];
let initialArray = [];
let trace = [];    // array of events
let states = [];   // snapshots per event
let currentStep = 0;
let playing = false;
let playTimer = null;
let callBoundaries = {}; // callId => {startIndex, endIndex}
let callTree = []; // nodes
let breakpoint = { id: null, depth: null };
let snapshotStoreKey = 'mergeSortExplorerSnapshots_v1';

// Setup default
function randomInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

function genRandomArray(size, min, max) {
  const a = [];
  for (let i=0;i<size;i++) a.push(randomInt(min,max));
  return a;
}

function setArray(a, doGenerateTrace=true) {
  array = copyArr(a);
  initialArray = copyArr(a);
  renderArrayEditable();
  if (autoTrace.checked && doGenerateTrace) {
    generateTrace();
  } else {
    resetPlayer();
  }
}

// Render array as clickable/editable cells
function renderArrayEditable() {
  arrayView.innerHTML = '';
  array.forEach((v,i) => {
    const span = document.createElement('div');
    span.className = 'cell';
    span.textContent = String(v);
    span.title = 'Click to edit';
    span.dataset.index = i;
    span.addEventListener('click', () => editCell(i));
    arrayView.appendChild(span);
  });
  bufferView.innerHTML = '';
  opDetail.textContent = 'Array set. Use Generate Trace to produce instrumentation if Auto-generate disabled.';
}

// Edit cell inline
function editCell(index) {
  const old = array[index];
  const val = prompt('Edit element at index '+index, String(old));
  if (val === null) return;
  const n = Number(val);
  if (isNaN(n)) {
    alert('Invalid number');
    return;
  }
  array[index] = n;
  renderArrayEditable();
  if (autoTrace.checked) generateTrace();
}

// Trace event structure:
// {type: 'call'|'return'|'mergeStart'|'compare'|'copy'|'mergeEnd'|'overwrite',
//  callId, parentCallId, left, mid, right, depth, i,j,k, values, message}
// We'll also produce states: snapshots of array, buffer, highlights, stack

let callIdCounter = 1;

function newCallId(){ return callIdCounter++; }

// Generate trace for top-down recursive merge sort
function generateTraceTopDown(arr, ascending=true) {
  trace = [];
  states = [];
  callBoundaries = {};
  callIdCounter = 1;
  const a = arr.slice();
  const buffer = new Array(a.length);
  const cmp = ascending ? ((x,y)=>x<=y) : ((x,y)=>x>=y);

  function pushEvent(ev) {
    trace.push(ev);
    // We'll not push states here; we will produce states inline when we simulate to allow stepable copy
  }

  function recordState(ev, arrSnapshot, bufSnapshot, stackSnapshot, msg) {
    const st = {
      event: ev,
      array: arrSnapshot.slice(),
      buffer: bufSnapshot.slice(),
      stack: stackSnapshot.slice(),
      message: msg || ''
    };
    states.push(st);
    return st;
  }

  // We'll maintain a stack of call descriptors for stack snapshots
  const callStack = [];

  function ms(left, right, parentCallId, depth) {
    const callId = newCallId();
    const callNode = {callId, parentCallId, left, right, depth};
    // mark call start
    pushEvent({type:'call', callId, parentCallId, left, right, depth});
    callStack.push({callId,left,right,depth});
    recordState(trace[trace.length-1], a, buffer, callStack, 'Call start');

    if (left >= right) {
      // immediate return
      pushEvent({type:'return', callId, left, right, depth});
      // record state
      recordState(trace[trace.length-1], a, buffer, callStack, 'Return (single element)');
      callStack.pop();
      callBoundaries[callId] = {startIndex: trace.findIndex(e=>e.callId===callId && e.type==='call'), endIndex: trace.length-1};
      return;
    }
    const mid = Math.floor((left+right)/2);
    // split
    pushEvent({type:'split', callId, left, mid, right, depth});
    recordState(trace[trace.length-1], a, buffer, callStack, 'Split');

    ms(left, mid, callId, depth+1);
    ms(mid+1, right, callId, depth+1);

    // Begin merge
    pushEvent({type:'mergeStart', callId, left, mid, right, depth});
    recordState(trace[trace.length-1], a, buffer, callStack, 'Merge start');

    // Merge process with trace of comparisons and copies
    let i = left, j = mid+1, k = left;
    while (i <= mid && j <= right) {
      pushEvent({type:'compare', callId, left, mid, right, depth, i, j, k, values:[a[i], a[j]]});
      recordState(trace[trace.length-1], a, buffer, callStack, 'Compare elements');

      if (cmp(a[i], a[j])) {
        pushEvent({type:'copy', callId, left, mid, right, depth, from:i, to:k, value:a[i]});
        buffer[k] = a[i];
        recordState(trace[trace.length-1], a, buffer, callStack, 'Copy left to buffer');
        i++; k++;
      } else {
        pushEvent({type:'copy', callId, left, mid, right, depth, from:j, to:k, value:a[j]});
        buffer[k] = a[j];
        recordState(trace[trace.length-1], a, buffer, callStack, 'Copy right to buffer');
        j++; k++;
      }
    }
    while (i <= mid) {
      pushEvent({type:'copy', callId, left, mid, right, depth, from:i, to:k, value:a[i]});
      buffer[k] = a[i];
      recordState(trace[trace.length-1], a, buffer, callStack, 'Copy remaining left');
      i++; k++;
    }
    while (j <= right) {
      pushEvent({type:'copy', callId, left, mid, right, depth, from:j, to:k, value:a[j]});
      buffer[k] = a[j];
      recordState(trace[trace.length-1], a, buffer, callStack, 'Copy remaining right');
      j++; k++;
    }

    // Write buffer back to a and emit overwrite events
    for (let idx = left; idx <= right; idx++) {
      pushEvent({type:'overwrite', callId, left, mid, right, depth, index:idx, value:buffer[idx]});
      a[idx] = buffer[idx];
      recordState(trace[trace.length-1], a, buffer, callStack, 'Overwrite array from buffer');
    }

    pushEvent({type:'mergeEnd', callId, left, mid, right, depth});
    recordState(trace[trace.length-1], a, buffer, callStack, 'Merge end');

    pushEvent({type:'return', callId, left, right, depth});
    recordState(trace[trace.length-1], a, buffer, callStack, 'Return from call');

    callStack.pop();
    callBoundaries[callId] = {startIndex: trace.findIndex(e=>e.callId===callId && e.type==='call'), endIndex: trace.findIndex((e,i)=>i>0 && e.callId===callId && e.type==='return')};
  }

  if (a.length>0) ms(0, a.length-1, null, 0);
  // States produced inline; convert to consistent structure for player
  return {trace, states, callBoundaries};
}

// Bottom-up iterative merge sort trace generator
function generateTraceBottomUp(arr, ascending=true) {
  trace = [];
  states = [];
  callBoundaries = {};
  callIdCounter = 1;
  const a = arr.slice();
  const n = a.length;
  const buffer = new Array(n);
  const cmp = ascending ? ((x,y)=>x<=y) : ((x,y)=>x>=y);

  const callStack = [];
  function push(ev) {
    trace.push(ev);
    recordState(ev, a, buffer, callStack, ev.message || '');
  }
  function recordState(ev, arrSnapshot, bufSnapshot, stackSnapshot, msg) {
    const st = {
      event: ev,
      array: arrSnapshot.slice(),
      buffer: bufSnapshot.slice(),
      stack: stackSnapshot.slice(),
      message: msg || ''
    };
    states.push(st);
    return st;
  }

  // We'll treat each merge operation as a "call" node with unique id and depth approximated by log2(size)
  let width = 1;
  while (width < n) {
    for (let left=0; left < n; left += 2*width) {
      const mid = Math.min(left+width-1, n-1);
      const right = Math.min(left+2*width-1, n-1);
      if (mid >= right) continue;
      const callId = newCallId();
      const depth = Math.max(0, Math.floor(Math.log2(width)));
      push({type:'call', callId, left, mid, right, depth});
      callStack.push({callId,left,mid,right,depth});
      push({type:'mergeStart', callId, left, mid, right, depth});
      // merge
      let i = left, j = mid+1, k = left;
      while (i <= mid && j <= right) {
        push({type:'compare', callId, left, mid, right, depth, i, j, k, values:[a[i], a[j]]});
        if (cmp(a[i], a[j])) {
          push({type:'copy', callId, left, mid, right, depth, from:i, to:k, value:a[i]});
          buffer[k] = a[i]; i++; k++;
        } else {
          push({type:'copy', callId, left, mid, right, depth, from:j, to:k, value:a[j]});
          buffer[k] = a[j]; j++; k++;
        }
      }
      while (i <= mid) { push({type:'copy', callId, left, mid, right, depth, from:i, to:k, value:a[i]}); buffer[k]=a[i]; i++; k++; }
      while (j <= right) { push({type:'copy', callId, left, mid, right, depth, from:j, to:k, value:a[j]}); buffer[k]=a[j]; j++; k++; }
      for (let idx=left; idx<=right; idx++) {
        push({type:'overwrite', callId, left, mid, right, depth, index:idx, value:buffer[idx]});
        a[idx] = buffer[idx];
      }
      push({type:'mergeEnd', callId, left, mid, right, depth});
      push({type:'return', callId, left, mid, right, depth});
      callStack.pop();
      callBoundaries[callId] = {startIndex: trace.findIndex(e=>e.callId===callId && e.type==='call'), endIndex: trace.findIndex((e,i)=>i>0 && e.callId===callId && e.type==='return')};
    }
    width *= 2;
  }
  return {trace, states, callBoundaries};
}

// After generating trace and states, prepare player structures
function preparePlayer(generated) {
  trace = generated.trace;
  states = generated.states;
  callBoundaries = generated.callBoundaries || {};
  // Build call tree from trace events (call events)
  callTree = [];
  const callMap = {};
  trace.forEach((ev, idx) => {
    if (ev.type === 'call') {
      callMap[ev.callId] = {callId:ev.callId, left:ev.left, right:ev.right, depth:ev.depth, parent:ev.parentCallId || ev.parent, start: idx, end: null};
    } else if (ev.type === 'return') {
      if (callMap[ev.callId]) callMap[ev.callId].end = idx;
    }
  });
  // Build tree
  for (const id in callMap) {
    const node = callMap[id];
    node.children = [];
    callTree.push(node);
  }
  const treeIndex = {};
  callTree.forEach(n => treeIndex[n.callId] = n);
  const roots = [];
  callTree.forEach(n => {
    if (n.parent == null || n.parent === undefined) roots.push(n);
    else {
      const p = treeIndex[n.parent];
      if (p) p.children.push(n);
      else roots.push(n);
    }
  });
  callTree = roots;
  // Fill timeline slider
  timeline.max = Math.max(0, states.length-1);
  timeline.value = 0;
  currentStep = 0;
  renderAll();
}

// Generate trace wrapper
function generateTrace() {
  stopPlaying();
  const arr = array.slice();
  const ascending = dirSelect.value === 'asc';
  let generated;
  try {
    if (algoSelect.value === 'topdown') {
      generated = generateTraceTopDown(arr, ascending);
    } else {
      generated = generateTraceBottomUp(arr, ascending);
    }
    preparePlayer(generated);
    log('Trace generated: ' + trace.length + ' events, ' + states.length + ' states.');
  } catch (e) {
    alert('Error generating trace: ' + e.message);
    console.error(e);
  }
}

// Render functions
function renderAll() {
  renderArrayState();
  renderBufferState();
  renderRecursionTree();
  renderCallStack();
  renderLog();
  renderOpDetail();
  timeline.value = currentStep;
  stepLabel.textContent = 'Step ' + currentStep + ' / ' + Math.max(0, states.length-1);
  gotoStep.value = currentStep;
}

function renderArrayState() {
  arrayView.innerHTML = '';
  const st = states[currentStep];
  const arr = st ? st.array : array;
  arr.forEach((v,i) => {
    const div = document.createElement('div');
    div.className = 'cell';
    div.textContent = String(v);
    // highlight according to current event
    const ev = st ? st.event : null;
    if (ev) {
      if (ev.type === 'compare' && (i === ev.i || i === ev.j || i===ev.i || i===ev.j)) {
        div.style.fontWeight = 'bold';
      }
      if (ev.type === 'copy' && i === ev.to) {
        div.style.outline = '1px solid';
      }
      if (ev.type === 'overwrite' && i === ev.index) {
        div.style.outline = '1px dashed';
      }
    }
    // allow edit while not playing
    div.addEventListener('click', () => {
      if (playing) return;
      const val = prompt('Edit element at index '+i, String(arr[i]));
      if (val === null) return;
      const n = Number(val);
      if (isNaN(n)) { alert('Invalid number'); return; }
      array[i] = n;
      initialArray = array.slice();
      if (autoTrace.checked) generateTrace();
      else renderAll();
    });
    arrayView.appendChild(div);
  });
}

function renderBufferState() {
  bufferView.innerHTML = '';
  const st = states[currentStep];
  const buf = st ? st.buffer : [];
  if (!buf) return;
  for (let i=0;i<buf.length;i++){
    const div = document.createElement('div');
    div.className = 'cell';
    div.textContent = (buf[i] === undefined ? '' : String(buf[i]));
    bufferView.appendChild(div);
  }
}

function renderRecursionTree() {
  recursionTree.style.display = showRec.checked ? 'block' : 'none';
  recursionTree.innerHTML = '';
  if (!showRec.checked) return;
  if (!trace || trace.length===0) { recursionTree.textContent = '(no trace)'; return; }
  // build simple textual tree from call boundaries
  // We'll reconstruct parent-child relationships from trace 'call' parentCallId fields if present
  // Fallback: list calls by depth and left-right
  const calls = trace.filter(e=>e.type==='call').map(e=>({id:e.callId,left:e.left,right:e.right,depth:e.depth,parent:e.parentCallId||e.parent}));
  if (calls.length===0) { recursionTree.textContent='(no calls)'; return; }
  // Build by depth ordering
  calls.sort((a,b)=> (a.depth - b.depth) || (a.left - b.left));
  const lines = [];
  function pad(n){ return '  '.repeat(Math.max(0,n)); }
  calls.forEach(c => {
    lines.push(pad(c.depth) + 'Call ' + c.id + ' ['+c.left+','+c.right+'] depth='+c.depth + (c.parent ? ' parent='+c.parent : ''));
  });
  recursionTree.textContent = lines.join('\n');
}

function renderCallStack() {
  callStackDiv.style.display = showStack.checked ? 'block' : 'none';
  callStackDiv.innerHTML = '';
  if (!showStack.checked) return;
  const st = states[currentStep];
  if (!st) { callStackDiv.textContent = '(no state)'; return; }
  const stack = st.stack || [];
  if (!stack.length) { callStackDiv.textContent = '(stack empty)'; return; }
  const lines = stack.slice().reverse().map(s => 'Call '+ (s.callId||s.callId) + ' ['+(s.left!==undefined? s.left:'?')+','+(s.right!==undefined? s.right:'?')+'] depth='+(s.depth!==undefined? s.depth:'?'));
  callStackDiv.textContent = lines.join('\n');
}

function renderLog() {
  logDiv.style.display = showLog.checked ? 'block' : 'none';
  logDiv.innerHTML = '';
  if (!showLog.checked) return;
  // show last N states upto detail level
  const detail = Number(detailRange.value);
  const maxLines = 200;
  const start = Math.max(0, currentStep - 100);
  const lines = [];
  for (let i = start; i <= currentStep; i++) {
    const st = states[i];
    if (!st) continue;
    const ev = st.event;
    let s = i + ': ' + (ev.type || '[state]') + ' ';
    if (ev.type === 'call') s += 'CallId=' + ev.callId + ' ['+ev.left+','+ev.right+']';
    else if (ev.type === 'compare') s += 'compare i='+ev.i+' j='+ev.j+' vals='+JSON.stringify(ev.values);
    else if (ev.type === 'copy') s += 'copy from='+ev.from+' to='+ev.to+' val='+ev.value;
    else if (ev.type === 'overwrite') s += 'overwrite idx='+ev.index+' val='+ev.value;
    else s += JSON.stringify(ev);
    if (i === currentStep) s = '> ' + s;
    lines.push(s);
    if (lines.length > maxLines) break;
  }
  logDiv.textContent = lines.join('\n');
}

function renderOpDetail() {
  const st = states[currentStep];
  if (!st) { opDetail.textContent = '(no operation)'; return; }
  const ev = st.event;
  let text = 'Step: ' + currentStep + '\n';
  text += 'Event type: ' + (ev.type || '') + '\n';
  if (ev.callId) text += 'CallId: ' + ev.callId + '\n';
  if (ev.left !== undefined) text += 'Left: ' + ev.left + (ev.mid!==undefined? ('  Mid: '+ev.mid):'') + (ev.right!==undefined?('  Right: '+ev.right):'') + '\n';
  if (ev.type === 'compare') text += 'Compare indices: i=' + ev.i + ' j=' + ev.j + ' values=' + JSON.stringify(ev.values) + '\n';
  if (ev.type === 'copy') text += 'Copy from ' + ev.from + ' to ' + ev.to + ' value=' + ev.value + '\n';
  if (ev.type === 'overwrite') text += 'Overwrite index ' + ev.index + ' with ' + ev.value + '\n';
  if (st.message) text += 'Message: ' + st.message + '\n';
  opDetail.textContent = text;
}

// Player controls
function setStep(idx) {
  if (!states || states.length===0) { currentStep = 0; renderAll(); return; }
  currentStep = clamp(Math.floor(idx), 0, states.length-1);
  renderAll();
}

function stepForward() {
  if (!states || states.length===0) return;
  if (currentStep < states.length-1) {
    currentStep++;
    renderAll();
    // breakpoints
    const ev = states[currentStep].event;
    if ((breakpoint.id !== null && ev.callId === breakpoint.id) || (breakpoint.depth !== null && ev.depth === breakpoint.depth)) {
      stopPlaying();
      log('Hit breakpoint at step '+currentStep);
    }
  } else {
    stopPlaying();
  }
}

function stepBackward() {
  if (!states || states.length===0) return;
  if (currentStep > 0) {
    currentStep--;
    renderAll();
  }
}

function stepIntoFn() {
  // just next step
  stepForward();
}

function stepOverFn() {
  // If current event is a call, jump to its return index
  const st = states[currentStep];
  if (!st) { stepForward(); return; }
  const ev = st.event;
  const callId = ev.callId || ev.callId;
  if (ev.type === 'call' && callId && callBoundaries[callId]) {
    const endIndex = callBoundaries[callId].endIndex;
    if (endIndex !== undefined) {
      setStep(endIndex+1);
      return;
    }
  }
  // Otherwise step to next event that is not part of same call depth (try to find enclosing call end)
  // Find nearest call in stack
  const stack = st.stack || [];
  if (stack.length) {
    const topCall = stack[stack.length-1];
    const end = callBoundaries[topCall.callId] ? callBoundaries[topCall.callId].endIndex : null;
    if (end !== null) { setStep(end+1); return; }
  }
  stepForward();
}

function stepOutFn() {
  // Jump to return of enclosing call (not current call)
  const st = states[currentStep];
  if (!st) { stepForward(); return; }
  const stack = st.stack || [];
  if (!stack.length) { setStep(states.length-1); return; }
  const currentCall = stack[stack.length-1];
  const end = callBoundaries[currentCall.callId] ? callBoundaries[currentCall.callId].endIndex : null;
  if (end !== null) {
    setStep(end+1);
    return;
  }
  stepForward();
}

function playToggle() {
  if (playing) stopPlaying(); else startPlaying();
}

function startPlaying() {
  if (!states || states.length===0) return;
  playing = true;
  playPause.textContent = 'Pause';
  const interval = Number(speedRange.value) || 400;
  playTimer = setInterval(() => {
    if (currentStep >= states.length-1) { stopPlaying(); return; }
    stepForward();
  }, interval);
}

function stopPlaying() {
  playing = false;
  playPause.textContent = 'Play';
  if (playTimer) clearInterval(playTimer);
  playTimer = null;
}

function resetPlayer() {
  stopPlaying();
  trace = [];
  states = [];
  currentStep = 0;
  timeline.max = 0;
  timeline.value = 0;
  stepLabel.textContent = 'Step 0 / 0';
  arrayView.innerHTML = '';
  bufferView.innerHTML = '';
  recursionTree.innerHTML = '';
  callStackDiv.innerHTML = '';
  logDiv.innerHTML = '';
  opDetail.textContent = '';
}

// Logging utility
function log(msg) {
  const now = new Date();
  const line = '[' + now.toLocaleTimeString() + '] ' + msg;
  const prev = logDiv.textContent || '';
  logDiv.textContent = (prev ? prev + '\n' : '') + line;
  logDiv.scrollTop = logDiv.scrollHeight;
}

// Breakpoint controls
setBp.addEventListener('click', () => {
  const id = bpIdInput.value ? Number(bpIdInput.value) : null;
  const depth = bpDepthInput.value ? Number(bpDepthInput.value) : null;
  breakpoint.id = (isNaN(id) ? null : id);
  breakpoint.depth = (isNaN(depth) ? null : depth);
  log('Breakpoint set: id=' + breakpoint.id + ' depth=' + breakpoint.depth);
});
clearBp.addEventListener('click', () => {
  breakpoint = {id:null, depth:null};
  bpIdInput.value = '';
  bpDepthInput.value = '';
  log('Breakpoints cleared');
});

// Snapshots (localStorage)
function loadSnapshots() {
  const raw = localStorage.getItem(snapshotStoreKey);
  const list = raw ? JSON.parse(raw) : {};
  snapshotsList.innerHTML = '';
  for (const name in list) {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    snapshotsList.appendChild(opt);
  }
}
saveSnapshotBtn.addEventListener('click', () => {
  const name = prompt('Snapshot name:');
  if (!name) return;
  const raw = localStorage.getItem(snapshotStoreKey);
  const list = raw ? JSON.parse(raw) : {};
  list[name] = {array: initialArray, algo: algoSelect.value, dir: dirSelect.value};
  localStorage.setItem(snapshotStoreKey, JSON.stringify(list));
  loadSnapshots();
});
loadSnapshotBtn.addEventListener('click', () => {
  const name = snapshotsList.value;
  if (!name) { alert('Select a snapshot'); return; }
  const raw = localStorage.getItem(snapshotStoreKey);
  const list = raw ? JSON.parse(raw) : {};
  const snap = list[name];
  if (!snap) { alert('Snapshot missing'); return; }
  array = snap.array.slice();
  initialArray = array.slice();
  algoSelect.value = snap.algo || algoSelect.value;
  dirSelect.value = snap.dir || dirSelect.value;
  renderArrayEditable();
  if (autoTrace.checked) generateTrace();
});
loadSnapshots();

// Event handlers
genRandom.addEventListener('click', () => {
  const size = clamp(Number(sizeInput.value)||10,1,200);
  const min = Number(minVal.value)||0;
  const max = Number(maxVal.value)||99;
  array = genRandomArray(size, Math.min(min,max), Math.max(min,max));
  setArray(array);
});

genSorted.addEventListener('click', () => {
  const size = clamp(Number(sizeInput.value)||10,1,200);
  const min = Number(minVal.value)||0;
  const max = Number(maxVal.value)||99;
  const a = [];
  for (let i=0;i<size;i++) a.push(min + Math.floor((max-min)*(i/(Math.max(1,size-1)))));
  setArray(a);
});

genReversed.addEventListener('click', () => {
  const size = clamp(Number(sizeInput.value)||10,1,200);
  const min = Number(minVal.value)||0;
  const max = Number(maxVal.value)||99;
  const a = [];
  for (let i=0;i<size;i++) a.push(max - Math.floor((max-min)*(i/(Math.max(1,size-1)))));
  setArray(a);
});

genDuplicates.addEventListener('click', () => {
  const size = clamp(Number(sizeInput.value)||10,1,200);
  const vals = [];
  for (let i=0;i<Math.max(2,Math.floor(size/3));i++) vals.push(randomInt(Number(minVal.value)||0, Number(maxVal.value)||99));
  const a = [];
  for (let i=0;i<size;i++) a.push(vals[i % vals.length]);
  setArray(a);
});

applyCustom.addEventListener('click', () => {
  const parsed = parseArrayInput(customArrayInput.value);
  if (!parsed.length) { alert('No numbers parsed'); return; }
  setArray(parsed);
});

clearArray.addEventListener('click', () => {
  array = [];
  initialArray = [];
  renderArrayEditable();
  resetPlayer();
});

generateTraceBtn.addEventListener('click', generateTrace);

exportTraceBtn.addEventListener('click', () => {
  if (!trace || trace.length===0) { alert('No trace to export'); return; }
  const exportObj = {initialArray, algo: algoSelect.value, dir: dirSelect.value, trace, states};
  const blob = new Blob([JSON.stringify(exportObj)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'merge_sort_trace.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

importTraceInput.addEventListener('change', (ev) => {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const obj = JSON.parse(e.target.result);
      if (!obj || !obj.states || !obj.trace) {
        alert('Invalid trace file');
        return;
      }
      initialArray = obj.initialArray || obj.array || [];
      array = initialArray.slice();
      trace = obj.trace;
      states = obj.states;
      callBoundaries = obj.callBoundaries || {};
      preparePlayer({trace, states, callBoundaries});
    } catch (err) { alert('Error parsing file: '+err.message); }
  };
  reader.readAsText(file);
});

// Playback controls
stepPrev.addEventListener('click', stepBackward);
stepNext.addEventListener('click', stepForward);
stepInto.addEventListener('click', stepIntoFn);
stepOver.addEventListener('click', stepOverFn);
stepOut.addEventListener('click', stepOutFn);
playPause.addEventListener('click', playToggle);
resetBtn.addEventListener('click', () => {
  stopPlaying();
  setArray(initialArray, false);
  generateTrace();
});

// timeline and goto
timeline.addEventListener('input', (e) => {
  setStep(Number(e.target.value));
});
gotoBtn.addEventListener('click', () => {
  const idx = Number(gotoStep.value);
  if (isNaN(idx)) return;
  setStep(idx);
});

// dynamic options
speedRange.addEventListener('input', () => {
  if (playing) {
    stopPlaying();
    startPlaying();
  }
});
detailRange.addEventListener('input', renderLog);
showRec.addEventListener('change', renderRecursionTree);
showStack.addEventListener('change', renderCallStack);
showLog.addEventListener('change', renderLog);

// keyboard shortcuts
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') stepForward();
  if (e.key === 'ArrowLeft') stepBackward();
  if (e.key === ' ') { e.preventDefault(); playToggle(); }
});

// Initialize with random array
setArray(genRandomArray(10,0,99));

// Small help in console
console.log('Merge Sort Explorer ready. Use controls in the page to explore the trace.');

/* End */
})();
</script>
