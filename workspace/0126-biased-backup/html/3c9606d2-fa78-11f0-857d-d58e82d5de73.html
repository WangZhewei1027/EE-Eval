<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Multiset • Visualized Elegance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Montserrat:wght@400;600&display=swap');

  /* Reset and base */
  *, *::before, *::after {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Exo 2', sans-serif;
    color: #f1f1f1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 3rem 2rem 5rem;
    user-select: none;
  }

  h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 3.6rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0 0 0.4em;
    background: linear-gradient(90deg, #6dd5fa, #2980b9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    position: relative;
    z-index: 2;
  }
  h2 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 1.15rem;
    color: #a0cde8cc;
    margin: 0 0 3rem 0;
    letter-spacing: 0.1em;
  }

  /* Container for visualization */
  #container {
    position: relative;
    width: min(90vw, 700px);
    aspect-ratio: 1 / 1;
    background: radial-gradient(circle at center, #113355 0%, #021f3f 80%);
    border-radius: 2rem;
    box-shadow:
      0 15px 30px rgba(20, 50, 90, 0.6),
      inset 0 0 60px #1a406c;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-content: center;
    padding: 3rem 3rem 4rem;
    gap: 2.1rem 2.1rem;
    user-select: none;
    transition: box-shadow 0.8s ease;
  }

  /* Individual element circle */
  .element {
    --size: 72px;
    position: relative;
    width: var(--size);
    height: var(--size);
    border-radius: 50%;
    background: radial-gradient(
      circle at 35% 35%,
      #4a83c1 0%,
      #0b1b3f 75%
    );
    box-shadow:
      inset 0 6px 8px #88b1ef99,
      0 6px 15px #1d3f7a88;
    color: #cde3ff;
    font-family: 'Exo 2', monospace;
    font-weight: 700;
    font-size: 1.45rem;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: default;
    backdrop-filter: contrast(160%) brightness(180%) saturate(200%);
    transition:
      transform 0.4s cubic-bezier(0.22,1,0.36,1),
      box-shadow 0.3s ease,
      background 0.35s ease;
  }
  /* subtle shine animation on element circle */
  .element::before {
    content: "";
    position: absolute;
    top: 15%;
    left: 15%;
    width: 60%;
    height: 60%;
    border-radius: 50%;
    background: radial-gradient(circle at top left,
      rgba(255 255 255 / 0.32),
      transparent 85%);
    filter: drop-shadow(0 0 3px rgba(150 200 255 / 0.25));
    transform-origin: center;
    animation: shineSpin 9s linear infinite;
  }
  @keyframes shineSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg);}
  }

  .element:hover {
    transform: scale(1.15);
    box-shadow:
      inset 0 8px 12px #b9d4fecc,
      0 10px 25px #3e6fdccc;
    background: radial-gradient(
      circle at 40% 40%,
      #7aa9f9 0%,
      #12315d 85%
    );
  }
  /* label + count stacked inside the circle */
  .element-inner {
    text-align: center;
    line-height: 1.1;
  }
  .element-label {
    font-size: 1.1rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #d4e3ffdd;
    mix-blend-mode: screen;
    user-select: none;
  }
  .element-count {
    font-size: 1.9rem;
    font-weight: 800;
    margin-top: -0.18rem;
    color: #b5d2ff;
    text-shadow:
      0 0 4px #73a1fe,
      0 0 10px #4176ffcc;
    user-select: none;
  }

  /* Info text under the container */
  #info {
    max-width: 700px;
    margin-top: 3rem;
    font-family: 'Exo 2', sans-serif;
    font-size: 1.1rem;
    line-height: 1.5;
    color: #b8d1ffcc;
    text-align: center;
    letter-spacing: 0.03em;
    filter: drop-shadow(0px 0px 2px #040f23aa);
    user-select: none;
  }

  /* Button styling */
  #btnShuffle {
    margin-top: 4rem;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(145deg, #2a6cf0, #547de8);
    border: none;
    padding: 16px 36px;
    font-weight: 700;
    font-size: 1.15rem;
    color: #e6f0ff;
    border-radius: 34px;
    box-shadow:
      0 5px 12px rgb(48 88 235 / 0.75),
      inset 0 2px 4px rgb(99 146 244 / 0.85);
    cursor: pointer;
    transition:
      background 0.45s ease,
      box-shadow 0.35s ease,
      transform 0.3s cubic-bezier(0.22,1,0.36,1);
    user-select: none;
  }
  #btnShuffle:hover {
    background: linear-gradient(145deg, #658ef7, #3f69f2);
    box-shadow:
      0 9px 20px rgb(80 118 244 / 0.9),
      inset 0 3px 6px rgb(159 178 255 / 0.95);
    transform: scale(1.06);
  }
  #btnShuffle:active {
    transform: scale(0.96);
    box-shadow:
      0 5px 10px rgb(48 88 235 / 0.8),
      inset 0 1px 3px rgb(99 146 244 / 0.9);
  }

  /* Subtle glow background behind container */
  #container::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 650px;
    height: 650px;
    background: radial-gradient(circle, #1f69d1cc 15%, transparent 80%);
    border-radius: 50%;
    filter: blur(64px);
    transform: translate(-50%, -50%);
    z-index: 0;
    pointer-events: none;
  }

  /* Tooltip for each element */
  .tooltip {
    position: absolute;
    background: #0c1a38dd;
    border-radius: 0.38rem;
    padding: 0.3rem 0.7rem;
    font-size: 0.88rem;
    font-weight: 600;
    user-select: none;
    pointer-events: none;
    color: #9cbaffee;
    backdrop-filter: blur(4px);
    box-shadow:
      0 0 8px #2e53a9cc,
      inset 0 0 4px #3c6dcb88;
    opacity: 0;
    transition: opacity 0.26s ease;
    z-index: 5;
    white-space: nowrap;
  }
  .element:hover .tooltip {
    opacity: 1;
  }

  /* Responsive text scaling */
  @media (max-width:520px) {
    h1 {
      font-size: 2.8rem;
    }
    .element {
      --size: 56px;
      font-size: 1rem;
    }
    .element-count {
      font-size: 1.4rem;
    }
  }
</style>
</head>
<body>

<h1>Multiset</h1>
<h2>Visualizing Counting & Multiplicities</h2>

<div id="container" aria-label="Multiset visualization" role="region" tabindex="0" aria-live="polite">
  <!-- Elements will be injected here -->
</div>

<button id="btnShuffle" aria-label="Shuffle Elements">Shuffle Elements</button>

<div id="info" aria-live="polite">
  A <strong>multiset</strong> is like a set, but allows multiple occurrences of elements. Each circle represents an element with its <em>multiplicity</em>, showing how many times it appears.
</div>

<script>
  (() => {
    // Multiset data: element label => count
    const multisetData = [
      { label: 'A', count: 4 },
      { label: 'B', count: 2 },
      { label: 'C', count: 1 },
      { label: 'D', count: 3 },
      { label: 'E', count: 5 },
      { label: 'F', count: 2 },
      { label: 'G', count: 1 },
      { label: 'H', count: 3 },
    ];

    const container = document.getElementById('container');

    function createElementCircle({ label, count }) {
      const el = document.createElement('div');
      el.className = 'element';
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-label', `${label} appears ${count} times`);

      // Inner content container
      const inner = document.createElement('div');
      inner.className = 'element-inner';

      const labelSpan = document.createElement('span');
      labelSpan.className = 'element-label';
      labelSpan.textContent = label;

      const countSpan = document.createElement('span');
      countSpan.className = 'element-count';
      countSpan.textContent = count;

      // Tooltip
      const tooltip = document.createElement('span');
      tooltip.className = 'tooltip';
      tooltip.textContent = `Multiplicity: ${count}`;

      inner.appendChild(labelSpan);
      inner.appendChild(countSpan);
      el.appendChild(inner);
      el.appendChild(tooltip);
      return el;
    }

    // Render all elements
    function renderElements(data) {
      container.innerHTML = '';
      data.forEach(d => {
        const el = createElementCircle(d);
        container.appendChild(el);
      });
    }

    // Shuffle utility
    function shuffleArray(arr) {
      let a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Animate shuffle by fade out and fade in with new order
    function shuffleVisual() {
      container.style.transition = 'opacity 0.5s ease';
      container.style.opacity = '0';
      setTimeout(() => {
        const shuffled = shuffleArray(multisetData);
        renderElements(shuffled);
        container.style.opacity = '1';
      }, 520);
    }

    // Initial render
    renderElements(multisetData);

    // Bind button
    const btnShuffle = document.getElementById('btnShuffle');
    btnShuffle.addEventListener('click', () => {
      btnShuffle.disabled = true;
      shuffleVisual();
      setTimeout(() => {
        btnShuffle.disabled = false;
      }, 700);
    });
  })();
</script>

</body>
</html>
