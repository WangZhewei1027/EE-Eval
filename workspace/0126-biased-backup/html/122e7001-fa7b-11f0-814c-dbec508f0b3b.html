<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encryption</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        #container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #container h1 {
            text-align: center;
        }
        #container p {
            margin-bottom: 20px;
        }
        #container button {
            width: 20%;
            height: 30px;
            margin: 10px;
            padding: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #container button:hover {
            background-color: #ccc;
        }
        #container input[type="text"] {
            width: 30%;
            height: 30px;
            padding: 5px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
            cursor: pointer;
        }
        #container input[type="number"] {
            width: 30%;
            height: 30px;
            padding: 5px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
            cursor: pointer;
        }
        #container input[type="checkbox"] {
            width: 30%;
            height: 30px;
            padding: 5px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
            cursor: pointer;
        }
        #container select {
            width: 30%;
            height: 30px;
            padding: 5px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Encryption</h1>
        <p>Enter your message to encrypt.</p>
        <form>
            <label for="message">Message:</label>
            <input type="text" id="message" placeholder="Type here...">
            <button type="button" id="encrypt-button">Encrypt</button>
            <button type="button" id="decrypt-button">Decrypt</button>
            <label for="decrypt-message">Decrypt Message:</label>
            <input type="text" id="decrypt-message" placeholder="Type here...">
            <button type="button" id="decrypt-button-2">Decrypt</button>
        </form>
    </div>

    <script>
        let message = document.getElementById('message').value;
        let encryptButton = document.getElementById('encrypt-button');
        let decryptButton = document.getElementById('decrypt-button');
        let decryptMessageInput = document.getElementById('decrypt-message');
        let decryptButton2 = document.getElementById('decrypt-button-2');

        // Encrypt function
        function encrypt() {
            let encryptedMessage = message;
            let encryptedMessageLength = encryptedMessage.length;
            for (let i = 0; i < encryptedMessageLength; i++) {
                encryptedMessage = encryptedMessage.substring(0, encryptedMessageLength - i) + Math.floor(Math.random() * 256).toString();
            }
            message = encryptedMessage;
            encryptButton.disabled = true;
            decryptButton.disabled = false;
            encryptButton.textContent = 'Decrypt';
            decryptButton.textContent = 'Encrypt';
            decryptMessageInput.disabled = true;
            decryptMessageInput.value = encryptedMessage;
        }

        // Decrypt function
        function decrypt() {
            let decryptedMessage = decryptMessageInput.value;
            let decryptedMessageLength = decryptedMessage.length;
            for (let i = 0; i < decryptedMessageLength; i++) {
                decryptedMessage = decryptedMessage.substring(0, decryptedMessageLength - i) + Math.floor(Math.random() * 256).toString();
            }
            decryptMessageInput.value = decryptedMessage;
            decryptButton.disabled = true;
            decryptButton.textContent = 'Decrypt';
            encryptButton.textContent = 'Encrypt';
            decryptMessageInput.disabled = true;
        }

        // Event listeners
        encryptButton.addEventListener('click', encrypt);
        decryptButton.addEventListener('click', decrypt);
        decryptButton2.addEventListener('click', decrypt);
    </script>
</body>
</html>
