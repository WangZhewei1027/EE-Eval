<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insertion Sort Interactive Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #arrayDisplay { margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Insertion Sort Demo</h1>
    <label for="arrayInput">Enter numbers (comma separated): </label>
    <input type="text" id="arrayInput" placeholder="e.g., 5,2,9,1,5,6">
    
    <button onclick="generateArray()">Generate Array</button>
    <button onclick="startInsertionSort()">Start Insertion Sort</button>
    <button onclick="reset()">Reset</button>

    <div id="arrayDisplay">Array: </div>
    
    <div>
        <label for="speed">Set Speed (ms): </label>
        <input type="number" id="speed" value="500" min="100">
    </div>

    <script>
        let array = [];
        let timer;

        function generateArray() {
            const input = document.getElementById('arrayInput').value;
            array = input.split(',').map(Number);
            document.getElementById('arrayDisplay').innerText = 'Array: ' + array.join(', ');
        }

        function startInsertionSort() {
            if (array.length === 0) return;
            resetSort();
            insertionSort(array);
        }

        function insertionSort(arr) {
            let i = 1;
            let interval = document.getElementById('speed').value;
            const display = document.getElementById('arrayDisplay');

            function sortStep() {
                if (i >= arr.length) {
                    clearInterval(timer);
                    return;
                }
                let key = arr[i];
                let j = i - 1;

                display.innerText = 'Array: ' + arr.join(', ') + ' | Key: ' + key + ' | j: ' + j;

                while (j >= 0 && arr[j] > key) {
                    arr[j + 1] = arr[j];
                    j--;
                }
                arr[j + 1] = key;
                display.innerText = 'Array: ' + arr.join(', ') + ' | Key Inserted: ' + key;
                i++;
            }

            clearInterval(timer);
            timer = setInterval(sortStep, interval);
        }

        function reset() {
            clearInterval(timer);
            array = [];
            document.getElementById('arrayInput').value = '';
            document.getElementById('arrayDisplay').innerText = 'Array: ';
        }

        document.getElementById('arrayInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                generateArray();
            }
        });
    </script>
</body>
</html>
