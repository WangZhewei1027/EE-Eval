<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Array Demonstration</title>
    <script>
        let array = [];

        function updateDisplay() {
            const display = document.getElementById('arrayDisplay');
            display.innerText = `Array: [${array.join(', ')}]`;
        }

        function addElement() {
            const value = document.getElementById('addElementInput').value;
            if (value) {
                array.push(value);
                updateDisplay();
                document.getElementById('addElementInput').value = '';
            }
        }

        function removeElement() {
            const value = document.getElementById('removeElementInput').value;
            const index = array.indexOf(value);
            if (index !== -1) {
                array.splice(index, 1);
                updateDisplay();
                document.getElementById('removeElementInput').value = '';
            }
        }

        function clearArray() {
            array = [];
            updateDisplay();
        }

        function sortArray() {
            array.sort();
            updateDisplay();
        }

        function reverseArray() {
            array.reverse();
            updateDisplay();
        }

        function setArrayLength() {
            const length = parseInt(document.getElementById('lengthInput').value);
            if (length >= 0) {
                array.length = length;
                updateDisplay();
            }
        }

        function addRange() {
            const start = parseInt(document.getElementById('rangeStartInput').value);
            const end = parseInt(document.getElementById('rangeEndInput').value);
            if (!isNaN(start) && !isNaN(end) && start < end) {
                for (let i = start; i <= end; i++) {
                    array.push(i);
                }
                updateDisplay();
            }
        }
    </script>
</head>
<body>
    <h1>Interactive Array</h1>
    <div>
        <h2>Array Operations</h2>
        <div>
            <h3>Add Element</h3>
            <input type="text" id="addElementInput" placeholder="Value to add">
            <button onclick="addElement()">Add</button>
        </div>
        <div>
            <h3>Remove Element</h3>
            <input type="text" id="removeElementInput" placeholder="Value to remove">
            <button onclick="removeElement()">Remove</button>
        </div>
        <div>
            <h3>Clear Array</h3>
            <button onclick="clearArray()">Clear</button>
        </div>
        <div>
            <h3>Sort Array</h3>
            <button onclick="sortArray()">Sort</button>
        </div>
        <div>
            <h3>Reverse Array</h3>
            <button onclick="reverseArray()">Reverse</button>
        </div>
        <div>
            <h3>Set Length</h3>
            <input type="number" id="lengthInput" placeholder="New Length">
            <button onclick="setArrayLength()">Set Length</button>
        </div>
        <div>
            <h3>Add Range</h3>
            <input type="number" id="rangeStartInput" placeholder="Start">
            <input type="number" id="rangeEndInput" placeholder="End">
            <button onclick="addRange()">Add Range</button>
        </div>
    </div>
    <div>
        <h3>Current Array</h3>
        <div id="arrayDisplay">Array: []</div>
    </div>
</body>
</html>
