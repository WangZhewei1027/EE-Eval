<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depth-First Search (DFS)</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: monospace;
        }
        #graph {
            width: 800px;
            height: 600px;
            border: 1px solid #000;
            margin: 40px auto;
        }
        .node {
            border: 1px solid #000;
            padding: 5px;
            font-size: 12px;
            cursor: pointer;
        }
        .edge {
            border: 1px solid #000;
            padding: 2px;
            cursor: pointer;
        }
        .visited {
            background-color: #ccc;
        }
        .current {
            background-color: #999;
        }
    </style>
</head>
<body>
    <div id="graph"></div>
    <script>
        class Node {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.children = [];
                this.visited = false;
                this.current = false;
            }
        }

        class Edge {
            constructor(from, to) {
                this.from = from;
                this.to = to;
            }
        }

        function createGraph(width, height) {
            let graph = document.getElementById('graph');
            graph.style.width = width + 'px';
            graph.style.height = height + 'px';
            graph.innerHTML = '';

            let nodes = [];
            let edges = [];

            for (let i = 0; i < height; i++) {
                let row = '';
                for (let j = 0; j < width; j++) {
                    row += '<div class="node" id="' + i + ',' + j + '">';

                    if (i === 0 || i === height - 1 || j === 0 || j === width - 1) {
                        row += '<div class="edge" id="' + i + ',' + j + '">';

                        for (let k = 0; k < 10; k++) {
                            let edge = new Edge(i, j);
                            edge.from = i;
                            edge.to = j;
                            edge.children.push(edge);
                            nodes.push(edge);
                        }

                        row += '</div>';
                    } else {
                        row += '<div class="edge" id="' + i + ',' + j + '">';

                        for (let k = 0; k < 10; k++) {
                            let edge = new Edge(i, j);
                            edge.from = i;
                            edge.to = j;
                            edge.children.push(edge);
                            nodes.push(edge);
                        }

                        row += '</div>';
                    }

                    row += '</div>';
                }

                graph.innerHTML += row;
            }

            function dfs(node) {
                node.current = true;
                for (let child of node.children) {
                    if (child.current) {
                        dfs(child);
                    }
                }

                node.current = false;
                let visited = false;
                for (let edge of nodes) {
                    if (edge.to === node.x && edge.to === node.y && !edge.visited) {
                        edge.visited = true;
                        dfs(edge);
                    }
                }
            }

            for (let node of nodes) {
                if (node.current) {
                    dfs(node);
                }
            }
        }

        let width = 800;
        let height = 600;
        createGraph(width, height);
    </script>
</body>
</html>
