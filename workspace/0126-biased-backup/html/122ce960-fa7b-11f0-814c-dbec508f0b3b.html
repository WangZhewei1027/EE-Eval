<!DOCTYPE html>
<html>
<head>
    <title>Semaphore</title>
    <style>
        body {
            font-family: monospace;
            background-color: white;
            font-size: 12px;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            margin: 0 auto;
            padding: 0;
        }
        .button {
            padding: 5px 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #ccc;
        }
        .slider {
            width: 50%;
            height: 10px;
            margin: 10px 0;
        }
        .slider input {
            width: 100%;
            height: 10px;
            margin: 5px 0;
            padding: 2px;
            border: 1px solid black;
        }
        .button input[type="submit"] {
            width: 100%;
            height: 30px;
            margin: 10px 0;
            padding: 5px 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .button input[type="submit"]:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Semaphore</h1>
        <button id="button1">Button 1</button>
        <button id="button2">Button 2</button>
        <button id="button3">Button 3</button>
        <input type="text" id="input1" placeholder="Enter value">
        <button id="input2">Input 2</button>
        <input type="text" id="input2" placeholder="Enter value">
        <button id="input3">Input 3</button>
        <div id="output"></div>
        <script>
            let inputs = document.querySelectorAll('input');
            let buttons = document.querySelectorAll('button');
            let output = document.getElementById('output');

            function updateOutput(value) {
                output.value = value;
            }

            function updateButtonValue(value) {
                buttons.forEach(button => button.textContent = value);
            }

            function handleSliderChange() {
                let value = document.getElementById('slider').value;
                updateOutput(value);
                updateButtonValue(value);
            }

            function handleInputChange() {
                let value = inputs[0].value;
                updateOutput(value);
                updateButtonValue(value);
            }

            function handleInput2Change() {
                let value = inputs[1].value;
                updateOutput(value);
                updateButtonValue(value);
            }

            function handleInput3Change() {
                let value = inputs[2].value;
                updateOutput(value);
                updateButtonValue(value);
            }

            buttons.forEach(button => button.addEventListener('click', () => {
                if (button.id === 'button1') {
                    handleSliderChange();
                } else if (button.id === 'button2') {
                    handleInputChange();
                } else if (button.id === 'button3') {
                    handleInput2Change();
                } else if (button.id === 'input2') {
                    handleInput2Change();
                } else if (button.id === 'input3') {
                    handleInput3Change();
                }
            }));

            let slider = document.getElementById('slider');
            slider.addEventListener('input', handleSliderChange);
            inputs.forEach(input => input.addEventListener('input', handleInputChange));
            inputs.forEach(input => input.addEventListener('input', handleInput2Change));
            inputs.forEach(input => input.addEventListener('input', handleInput3Change));
        </script>
    </div>
</body>
</html>
