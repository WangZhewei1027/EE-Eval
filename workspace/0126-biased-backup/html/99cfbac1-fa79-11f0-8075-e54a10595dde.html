<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amortized Analysis Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #result {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Amortized Analysis Interactive Demo</h1>

    <label for="operation">Select Operation:</label>
    <select id="operation">
        <option value="insert">Insert</option>
        <option value="delete">Delete</option>
        <option value="get">Get</option>
    </select>

    <label for="size">Current Size of Data Structure:</label>
    <input type="number" id="size" value="0" min="0" />

    <button id="execute">Execute Operation</button>
    <button id="reset">Reset</button>

    <div id="result"></div>

    <script>
        let currentSize = 0;
        let totalOperations = 0;
        let cost = 0;

        document.getElementById("execute").onclick = function () {
            const operation = document.getElementById("operation").value;
            const sizeInput = parseInt(document.getElementById("size").value);
            let currentCost = 0;

            if (operation === "insert") {
                currentCost = 1; // Basic insert cost
                if (sizeInput >= 1) {
                    currentCost += 1; // Increment cost for growing array
                }
                currentSize += 1;
            } else if (operation === "delete") {
                if (sizeInput >= 1) {
                    currentCost = 1; // Basic delete cost
                    currentSize -= 1;
                } else {
                    currentCost = 0; // No cost if nothing to delete
                }
            } else if (operation === "get") {
                currentCost = 1; // Cost to retrieve an element
            }

            totalOperations++;
            cost += currentCost;

            const amortizedCost = (cost / totalOperations).toFixed(2);
            document.getElementById("result").innerHTML = 
                `Operation: ${operation}<br>Current Size: ${currentSize}<br>Current Cost: ${currentCost}<br>Total Cost: ${cost}<br>Amortized Cost: ${amortizedCost}`;
        };

        document.getElementById("reset").onclick = function () {
            currentSize = 0;
            totalOperations = 0;
            cost = 0;
            document.getElementById("size").value = 0;
            document.getElementById("result").innerHTML = "";
        };
    </script>
</body>
</html>
