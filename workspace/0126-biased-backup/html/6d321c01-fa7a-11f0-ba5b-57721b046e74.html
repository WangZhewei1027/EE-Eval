<!DOCTYPE html>
<html>
<head>
    <title>Refactoring Interactive Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .container { display: flex; gap: 20px; }
        .panel { flex: 1; border: 1px solid #ccc; padding: 10px; }
        .code { font-family: monospace; white-space: pre; background: #f5f5f5; padding: 10px; }
        button, select, input { margin: 5px; }
        .hidden { display: none; }
        .refactor-step { margin-bottom: 15px; padding: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>
    <h1>Interactive Refactoring Demo</h1>
    
    <div class="container">
        <div class="panel">
            <h2>Original Code</h2>
            <select id="example-select">
                <option value="long-method">Long Method</option>
                <option value="duplicate-code">Duplicate Code</option>
                <option value="large-class">Large Class</option>
                <option value="primitive-obsession">Primitive Obsession</option>
            </select>
            
            <div id="original-code" class="code"></div>
            
            <div>
                <h3>Code Metrics</h3>
                <div id="metrics">
                    <p>Lines: <span id="lines">0</span></p>
                    <p>Complexity: <span id="complexity">0</span></p>
                    <p>Duplication: <span id="duplication">0%</span></p>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <h2>Refactoring Tools</h2>
            <div id="refactoring-controls">
                <button id="extract-method">Extract Method</button>
                <button id="rename-variable">Rename Variable</button>
                <button id="introduce-parameter">Introduce Parameter</button>
                <button id="replace-conditional">Replace Conditional</button>
                <button id="extract-class">Extract Class</button>
            </div>
            
            <div id="refactor-options" class="hidden">
                <h3>Refactoring Options</h3>
                <div id="options-content"></div>
                <button id="apply-refactor">Apply Refactoring</button>
                <button id="cancel-refactor">Cancel</button>
            </div>
            
            <div id="refactor-steps">
                <h3>Refactoring Steps</h3>
                <div id="steps-list"></div>
            </div>
        </div>
        
        <div class="panel">
            <h2>Refactored Code</h2>
            <div id="refactored-code" class="code"></div>
            
            <div>
                <h3>Refactored Metrics</h3>
                <div id="refactored-metrics">
                    <p>Lines: <span id="refactored-lines">0</span></p>
                    <p>Complexity: <span id="refactored-complexity">0</span></p>
                    <p>Duplication: <span id="refactored-duplication">0%</span></p>
                </div>
            </div>
            
            <div>
                <button id="compare">Compare Before/After</button>
                <button id="reset">Reset All</button>
            </div>
        </div>
    </div>
    
    <div id="comparison-view" class="hidden">
        <h2>Comparison View</h2>
        <div class="container">
            <div class="panel">
                <h3>Before</h3>
                <div id="before-code" class="code"></div>
            </div>
            <div class="panel">
                <h3>After</h3>
                <div id="after-code" class="code"></div>
            </div>
        </div>
        <button id="close-comparison">Close Comparison</button>
    </div>
    
    <script>
        // Sample code examples
        const examples = {
            'long-method': `function processOrder(order) {
    // Validate order
    if (!order.items || order.items.length === 0) {
        throw new Error('No items in order');
    }
    
    // Calculate total
    let total = 0;
    for (let item of order.items) {
        total += item.price * item.quantity;
    }
    
    // Apply discounts
    if (order.customer.isPremium) {
        total *= 0.9; // 10% discount
    } else if (total > 1000) {
        total *= 0.95; // 5% discount
    }
    
    // Process payment
    let paymentResult;
    if (order.paymentMethod === 'credit') {
        paymentResult = processCreditCard(order.creditCard, total);
    } else if (order.paymentMethod === 'paypal') {
        paymentResult = processPayPal(order.paypalEmail, total);
    } else {
        throw new Error('Invalid payment method');
    }
    
    // Update inventory
    for (let item of order.items) {
        updateInventory(item.productId, item.quantity);
    }
    
    // Send confirmation
    sendConfirmationEmail(order.customer.email, order, total);
    
    return paymentResult;
}`,
            'duplicate-code': `function calculateRectangleArea(width, height) {
    return width * height;
}

function calculateRectanglePerimeter(width, height) {
    return 2 * (width + height);
}

function calculateCircleArea(radius) {
    return Math.PI * radius * radius;
}

function calculateCircleCircumference(radius) {
    return 2 * Math.PI * radius;
}`,
            'large-class': `class UserManager {
    constructor() {
        this.users = [];
    }
    
    addUser(user) { /* ... */ }
    removeUser(userId) { /* ... */ }
    findUserById(userId) { /* ... */ }
    findUserByEmail(email) { /* ... */ }
    updateUser(user) { /* ... */ }
    changePassword(userId, newPassword) { /* ... */ }
    resetPasswordEmail(userId) { /* ... */ }
    verifyEmail(userId) { /* ... */ }
    generateAuthToken(userId) { /* ... */ }
    revokeToken(token) { /* ... */ }
    checkPermission(userId, permission) { /* ... */ }
    addPermission(userId, permission) { /* ... */ }
    removePermission(userId, permission) { /* ... */ }
    logLogin(userId) { /* ... */ }
    logLogout(userId) { /* ... */ }
    getLoginHistory(userId) { /* ... */ }
    // ... 15 more methods ...
}`,
            'primitive-obsession': `function createUser(firstName, lastName, email, street, city, state, zip, country, phone, dob) {
    return {
        firstName,
        lastName,
        email,
        street,
        city,
        state,
        zip,
        country,
        phone,
        dob
    };
}

function formatAddress(user) {
    return \`\${user.street}, \${user.city}, \${user.state} \${user.zip}, \${user.country}\`;
}

function sendWelcomeEmail(user) {
    const address = formatAddress(user);
    const message = \`Welcome \${user.firstName} \${user.lastName}! Your address is: \${address}\`;
    sendEmail(user.email, 'Welcome!', message);
}`
        };

        // Initialize the app
        document.addEventListener('DOMContentLoaded', function() {
            const exampleSelect = document.getElementById('example-select');
            const originalCode = document.getElementById('original-code');
            const refactoredCode = document.getElementById('refactored-code');
            const refactoringControls = document.getElementById('refactoring-controls');
            const refactorOptions = document.getElementById('refactor-options');
            const optionsContent = document.getElementById('options-content');
            const stepsList = document.getElementById('steps-list');
            const compareButton = document.getElementById('compare');
            const comparisonView = document.getElementById('comparison-view');
            const beforeCode = document.getElementById('before-code');
            const afterCode = document.getElementById('after-code');
            const closeComparison = document.getElementById('close-comparison');
            const resetButton = document.getElementById('reset');
            
            let currentExample = 'long-method';
            let originalCodeText = examples[currentExample];
            let refactoredCodeText = originalCodeText;
            let refactoringSteps = [];
            
            // Metrics calculation
            function calculateMetrics(code) {
                const lines = code.split('\n').length;
                let complexity = 0;
                let duplication = 0;
                
                // Simple complexity calculation
                complexity += (code.match(/if\s*\(|else\s*|for\s*\(|while\s*\(|case\s*:/g) || []).length;
                
                // Simple duplication calculation (for demo)
                const linesArray = code.split('\n').filter(l => l.trim().length > 0);
                const uniqueLines = new Set(linesArray);
                duplication = Math.round(100 - (uniqueLines.size / linesArray.length * 100));
                
                return { lines, complexity, duplication };
            }
            
            // Update code displays
            function updateCodeDisplays() {
                originalCode.textContent = originalCodeText;
                refactoredCode.textContent = refactoredCodeText;
                
                const metrics = calculateMetrics(originalCodeText);
                document.getElementById('lines').textContent = metrics.lines;
                document.getElementById('complexity').textContent = metrics.complexity;
                document.getElementById('duplication').textContent = metrics.duplication + '%';
                
                const refactoredMetrics = calculateMetrics(refactoredCodeText);
                document.getElementById('refactored-lines').textContent = refactoredMetrics.lines;
                document.getElementById('refactored-complexity').textContent = refactoredMetrics.complexity;
                document.getElementById('refactored-duplication').textContent = refactoredMetrics.duplication + '%';
            }
            
            // Add refactoring step
            function addRefactoringStep(description) {
                const step = { description, timestamp: new Date() };
                refactoringSteps.push(step);
                
                const stepElement = document.createElement('div');
                stepElement.className = 'refactor-step';
                stepElement.textContent = `${refactoringSteps.length}. ${description}`;
                stepsList.appendChild(stepElement);
            }
            
            // Example change event
            exampleSelect.addEventListener('change', function() {
                currentExample = this.value;
                originalCodeText = examples[currentExample];
                refactoredCodeText = originalCodeText;
                refactoringSteps = [];
                stepsList.innerHTML = '';
                updateCodeDisplays();
            });
            
            // Refactoring controls
            document.getElementById('extract-method').addEventListener('click', function() {
                refactorOptions.classList.remove('hidden');
                optionsContent.innerHTML = `
                    <p>Select code to extract:</p>
                    <textarea id="code-to-extract" rows="5" cols="50"></textarea>
                    <p>New method name: <input type="text" id="new-method-name" value="newMethod"></p>
                    <p>Parameters: <input type="text" id="method-parameters" placeholder="param1, param2"></p>
                `;
                
                document.getElementById('apply-refactor').onclick = function() {
                    const codeToExtract = document.getElementById('code-to-extract').value;
                    const methodName = document.getElementById('new-method-name').value;
                    const parameters = document.getElementById('method-parameters').value;
                    
                    if (codeToExtract.trim() && methodName.trim()) {
                        // Simple extraction (in a real app this would be more sophisticated)
                        const newMethod = `function ${methodName}(${parameters}) {\n${codeToExtract}\n}\n\n`;
                        refactoredCodeText = newMethod + refactoredCodeText.replace(codeToExtract, `${methodName}(${parameters.split(',').map(p => p.trim()).join(', ')});`);
                        
                        addRefactoringStep(`Extracted method '${methodName}'`);
                        updateCodeDisplays();
                        refactorOptions.classList.add('hidden');
                    }
                };
            });
            
            document.getElementById('rename-variable').addEventListener('click', function() {
                refactorOptions.classList.remove('hidden');
                optionsContent.innerHTML = `
                    <p>Variable to rename: <input type="text" id="old-name" placeholder="oldVarName"></p>
                    <p>New name: <input type="text" id="new-name" placeholder="newVarName"></p>
                `;
                
                document.getElementById('apply-refactor').onclick = function() {
                    const oldName = document.getElementById('old-name').value;
                    const newName = document.getElementById('new-name').value;
                    
                    if (oldName.trim() && newName.trim()) {
                        // Simple replace (in a real app this would be more sophisticated)
                        refactoredCodeText = refactoredCodeText.replace(new RegExp(oldName, 'g'), newName);
                        
                        addRefactoringStep(`Renamed variable '${oldName}' to '${newName}'`);
                        updateCodeDisplays();
                        refactorOptions.classList.add('hidden');
                    }
                };
            });
            
            document.getElementById('introduce-parameter').addEventListener('click', function() {
                refactorOptions.classList.remove('hidden');
                optionsContent.innerHTML = `
                    <p>Select hardcoded value to parameterize:</p>
                    <input type="text" id="hardcoded-value" placeholder="1000 or 'default'">
                    <p>New parameter name: <input type="text" id="param-name" value="threshold"></p>
                `;
                
                document.getElementById('apply-refactor').onclick = function() {
                    const value = document.getElementById('hardcoded-value').value;
                    const paramName = document.getElementById('param-name').value;
                    
                    if (value.trim() && paramName.trim()) {
                        // Find function definition and add parameter
                        const functionStart = refactoredCodeText.indexOf('function');
                        if (functionStart >= 0) {
                            const functionDefEnd = refactoredCodeText.indexOf(')', functionStart);
                            const beforeParams = refactoredCodeText.substring(0, functionDefEnd);
                            const afterParams = refactoredCodeText.substring(functionDefEnd);
                            
                            // Add parameter
                            let newParams = beforeParams;
                            if (beforeParams.endsWith('()')) {
                                newParams = beforeParams.replace('()', `(${paramName})`);
                            } else {
                                newParams = beforeParams.replace(')', `, ${paramName})`);
                            }
                            
                            // Replace value with parameter
                            refactoredCodeText = newParams + afterParams.replace(new RegExp(`\\b${value}\\b`, 'g'), paramName);
                            
                            addRefactoringStep(`Introduced parameter '${paramName}' to replace '${value}'`);
                            updateCodeDisplays();
                            refactorOptions.classList.add('hidden');
                        }
                    }
                };
            });
            
            document.getElementById('replace-conditional').addEventListener('click', function() {
                refactorOptions.classList.remove('hidden');
                optionsContent.innerHTML = `
                    <p>Select conditional to replace:</p>
                    <select id="conditional-type">
                        <option value="polymorphism">Polymorphism</option>
                        <option value="strategy">Strategy Pattern</option>
                        <option value="null-object">Null Object Pattern</option>
                    </select>
                    <div id="conditional-options"></div>
                `;
                
                document.getElementById('conditional-type').addEventListener('change', function() {
                    const conditionalOptions = document.getElementById('conditional-options');
                    if (this.value === 'polymorphism') {
                        conditionalOptions.innerHTML = `
                            <p>Type property name: <input type="text" id="type-property" value="type"></p>
                            <p>Class names (comma separated): <input type="text" id="class-names" value="TypeA,TypeB"></p>
                        `;
                    } else if (this.value === 'strategy') {
                        conditionalOptions.innerHTML = `
                            <p>Strategy interface name: <input type="text" id="interface-name" value="Strategy"></p>
                            <p>Strategy implementations (comma separated): <input type="text" id="strategy-names" value="StrategyA,StrategyB"></p>
                        `;
                    }
                });
                
                document.getElementById('apply-refactor').onclick = function() {
                    const refactoringType = document.getElementById('conditional-type').value;
                    let description = '';
                    
                    if (refactoringType === 'polymorphism') {
                        const typeProperty = document.getElementById('type-property').value;
                        const classNames = document.getElementById('class-names').value;
                        description = `Replaced conditional with polymorphism using ${typeProperty} and classes ${classNames}`;
                    } else if (refactoringType === 'strategy') {
                        const interfaceName = document.getElementById('interface-name').value;
                        const strategyNames = document.getElementById('strategy-names').value;
                        description = `Replaced conditional with strategy pattern (${interfaceName} and ${strategyNames})`;
                    }
                    
                    // In a real app, this would actually transform the code
                    addRefactoringStep(description);
                    refactorOptions.classList.add('hidden');
                };
            });
            
            document.getElementById('extract-class').addEventListener('click', function() {
                refactorOptions.classList.remove('hidden');
                optionsContent.innerHTML = `
                    <p>Class name to extract from: <input type="text" id="source-class" value="OrderProcessor"></p>
                    <p>New class name: <input type="text" id="new-class" value="PaymentProcessor"></p>
                    <p>Methods to move (comma separated): <input type="text" id="methods-to-move" value="processCreditCard,processPayPal"></p>
                `;
                
                document.getElementById('apply-refactor').onclick = function() {
                    const sourceClass = document.getElementById('source-class').value;
                    const newClass = document.getElementById('new-class').value;
                    const methods = document.getElementById('methods-to-move').value;
                    
                    if (sourceClass && newClass && methods) {
                        // In a real app, this would actually move the methods
                        addRefactoringStep(`Extracted class ${newClass} from ${sourceClass} with methods: ${methods}`);
                        refactorOptions.classList.add('hidden');
                    }
                };
            });
            
            document.getElementById('cancel-refactor').addEventListener('click', function() {
                refactorOptions.classList.add('hidden');
            });
            
            // Comparison view
            compareButton.addEventListener('click', function() {
                comparisonView.classList.remove('hidden');
                beforeCode.textContent = originalCodeText;
                afterCode.textContent = refactoredCodeText;
            });
            
            closeComparison.addEventListener('click', function() {
                comparisonView.classList.add('hidden');
            });
            
            // Reset
            resetButton.addEventListener('click', function() {
                refactoredCodeText = originalCodeText;
                refactoringSteps = [];
                stepsList.innerHTML = '';
                updateCodeDisplays();
            });
            
            // Initialize
            updateCodeDisplays();
        });
    </script>
</body>
</html>
