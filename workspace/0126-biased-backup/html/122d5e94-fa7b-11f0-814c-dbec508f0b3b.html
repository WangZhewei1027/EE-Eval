<!DOCTYPE html>
<html>
<head>
    <title>Socket Programming Example</title>
    <style>
        body {
            font-family: monospace;
            background-color: #fff;
        }
        #output {
            padding: 20px;
            border: 1px solid #000;
        }
    </style>
</head>
<body>
    <h1>Socket Programming Example</h1>
    <div id="output"></div>

    <button id="start-btn">Start</button>
    <button id="stop-btn">Stop</button>
    <button id="reset-btn">Reset</button>

    <input id="input-field" type="text" placeholder="Enter message...">
    <button id="send-btn">Send</button>

    <div id="state-container"></div>

    <script>
        let socket = null;
        let state = "idle";

        function start() {
            if (!socket) {
                socket = new WebSocket("ws://localhost:8080");
                socket.onopen = function() {
                    console.log("Connected to server.");
                    socket.send("Hello, server!");
                };
                socket.onmessage = function(event) {
                    console.log("Received message from server:", event.data);
                    updateOutput(event.data);
                };
                socket.onclose = function() {
                    console.log("Disconnected from server.");
                    socket = null;
                };
                socket.onerror = function(event) {
                    console.log("Error occurred:", event.error);
                };
            } else {
                socket.send("Hello, client!");
            }
        }

        function stop() {
            if (socket) {
                socket.close();
                socket = null;
            }
        }

        function reset() {
            state = "idle";
            updateOutput("State: idle");
        }

        function updateOutput(message) {
            document.getElementById("output").innerHTML = message;
            if (state === "idle") {
                document.getElementById("state-container").innerHTML = "State: idle";
            } else if (state === "running") {
                document.getElementById("state-container").innerHTML = "State: running";
            } else if (state === "stopped") {
                document.getElementById("state-container").innerHTML = "State: stopped";
            }
        }

        document.getElementById("start-btn").addEventListener("click", start);
        document.getElementById("stop-btn").addEventListener("click", stop);
        document.getElementById("reset-btn").addEventListener("click", reset);

        function send() {
            let message = document.getElementById("input-field").value;
            socket.send(message);
        }
    </script>
</body>
</html>
