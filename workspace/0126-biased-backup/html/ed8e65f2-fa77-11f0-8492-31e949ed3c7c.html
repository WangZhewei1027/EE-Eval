<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P vs NP - A Visual Exploration</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #eaeef2, #ffffff);
            color: #333;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        h1 {
            font-size: 4rem;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.1);
            transition: transform 0.5s ease;
        }
        h1:hover {
            transform: scale(1.05);
        }
        .description {
            font-size: 1.5rem;
            margin: 20px 0;
            max-width: 600px;
            line-height: 1.6;
            opacity: 0.8;
            transition: opacity 0.5s ease;
        }
        .button {
            background: #007BFF;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
            margin-top: 20px;
        }
        .button:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
        .graphic {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 100vw;
            max-height: 100vh;
            animation: fadeIn 2s ease-in;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -30%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>P vs NP</h1>
        <div class="description">
            Explore the age-old question in computer science <br> 
            that challenges the boundaries of algorithmic efficiency and problem-solving.
        </div>
        <button class="button" onclick="startAnimation()">Begin Exploration</button>
        <img class="graphic" src="https://via.placeholder.com/800x400/007BFF/FFFFFF?text=P+vs+NP+Graphic" alt="P vs NP Graphic" />
    </div>
    <script>
        function startAnimation() {
            const graphic = document.querySelector('.graphic');
            graphic.style.animation = 'moveIn 2s forwards';
        }
    </script>
</body>
</html>
