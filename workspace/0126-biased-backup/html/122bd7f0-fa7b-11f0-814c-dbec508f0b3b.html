<!DOCTYPE html>
<html>
<head>
    <title>Interpolation Search</title>
    <style>
        body {
            background-color: #f0f0f0;
        }
        input, button, select, textarea {
            width: 50%;
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
        select, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .error {
            color: #f00;
        }
    </style>
</head>
<body>
    <h1>Interpolation Search</h1>
    <p>Interpolation Search is a search algorithm that uses interpolation to estimate the location of the target element. It is particularly useful when the search space is large or unbounded.</p>
    <button id="search-button">Search</button>
    <input id="search-input" type="text" placeholder="Enter search term">
    <select id="search-type">
        <option value="linear">Linear Search</option>
        <option value="interpolation">Interpolation Search</option>
    </select>
    <button id="interpolation-button">Interpolation Search</button>
    <div id="result"></div>

    <script>
        let searchType = 'linear';
        let searchInput = document.getElementById('search-input');
        let searchTypeSelect = document.getElementById('search-type');
        let resultDiv = document.getElementById('result');
        let searchButton = document.getElementById('search-button');
        let interpolationButton = document.getElementById('interpolation-button');

        searchButton.addEventListener('click', searchLinear);
        interpolationButton.addEventListener('click', searchInterpolation);

        function searchLinear() {
            let input = searchInput.value;
            let max = 100;
            let min = 0;
            while (max - min > 1) {
                let mid = Math.floor((min + max) / 2);
                if (input === String(mid)) {
                    resultDiv.innerText = `Found ${input} at index ${mid}`;
                    break;
                } else if (input < String(mid)) {
                    min = mid;
                } else {
                    max = mid;
                }
            }
            if (input !== String(mid)) {
                resultDiv.innerText = `Not found at index ${mid}`;
            }
        }

        function searchInterpolation() {
            let input = searchInput.value;
            let max = 100;
            let min = 0;
            let x = 0;
            let y = 0;
            while (max - min > 1) {
                let mid = Math.floor((min + max) / 2);
                x = input.length - 1 - mid;
                y = Math.floor(mid / 2);
                if (input[x] === String(mid)) {
                    resultDiv.innerText = `Found ${input} at index ${mid}`;
                    break;
                } else if (input[x] < String(mid)) {
                    min = mid;
                } else {
                    max = mid;
                }
            }
            if (input !== String(mid)) {
                resultDiv.innerText = `Not found at index ${mid}`;
            }
        }
    </script>
</body>
</html>
