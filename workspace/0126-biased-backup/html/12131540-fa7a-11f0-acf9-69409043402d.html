<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Binary Search Tree Interactive Demo</title>
<style>
  /* Minimal, unstyled except minimal structure */
  body {
    font-family: monospace, monospace;
    margin: 10px;
  }
  #tree-display {
    white-space: pre;
    font-family: monospace;
    margin-top: 10px;
    margin-bottom: 10px;
  }
  #log {
    white-space: pre-wrap;
    border: 1px solid black;
    height: 150px;
    overflow-y: scroll;
    margin-top: 5px;
    margin-bottom: 15px;
    padding: 5px;
    font-family: monospace;
  }
  fieldset {
    margin-bottom: 20px;
  }
  input[type="number"] {
    width: 60px;
  }
  button {
    margin: 2px 5px 2px 0;
  }
</style>
</head>
<body>
<h1>Binary Search Tree (BST) Interactive Demo</h1>

<fieldset>
<legend>Node Operations</legend>
<label for="insert-value">Insert value:</label>
<input type="number" id="insert-value" />
<button id="insert-btn">Insert</button>
<br /><br />
<label for="delete-value">Delete value:</label>
<input type="number" id="delete-value" />
<button id="delete-btn">Delete</button>
<br /><br />
<label for="search-value">Search value:</label>
<input type="number" id="search-value" />
<button id="search-btn">Search</button>
<br /><br />
<button id="clear-tree-btn">Clear Tree</button>
</fieldset>

<fieldset>
<legend>Traversals</legend>
<button id="inorder-btn">Inorder</button>
<button id="preorder-btn">Preorder</button>
<button id="postorder-btn">Postorder</button>
<button id="levelorder-btn">Level-order (BFS)</button>
<br /><br />
<label for="traversal-delay">Traversal step delay (ms): </label>
<input type="number" id="traversal-delay" value="500" min="0" step="100" />
<button id="traversal-toggle-btn">Start Traversal</button>
<button id="traversal-step-btn" disabled>Step</button>
<button id="traversal-reset-btn">Reset Traversal</button>
</fieldset>

<fieldset>
<legend>Tree Info & Queries</legend>
<button id="height-btn">Calculate Height</button>
<button id="count-nodes-btn">Count Nodes</button>
<button id="count-leaves-btn">Count Leaves</button>
<button id="min-value-btn">Find Minimum</button>
<button id="max-value-btn">Find Maximum</button>
<button id="is-bst-btn">Validate BST Property</button>
<br /><br />
<label for="kth-smallest-value">Find k-th Smallest (k):</label>
<input type="number" id="kth-smallest-value" min="1" />
<button id="kth-smallest-btn">Find</button>
<br /><br />
<label for="range-min">Range min:</label>
<input type="number" id="range-min" />
<label for="range-max">max:</label>
<input type="number" id="range-max" />
<button id="range-search-btn">Range Search</button>
</fieldset>

<fieldset>
<legend>Node Highlight & Interaction</legend>
<label for="highlight-value">Highlight value:</label>
<input type="number" id="highlight-value" />
<button id="highlight-btn">Highlight</button>
<button id="clear-highlight-btn">Clear Highlight</button>
<br /><br />
<button id="show-path-btn">Show Path to Value</button>
<input type="number" id="path-value" />
<button id="clear-path-btn">Clear Path Highlight</button>
</fieldset>

<fieldset>
<legend>Batch Operations</legend>
<label for="batch-input">Comma separated integers:</label>
<input type="text" id="batch-input" style="width: 300px" />
<button id="batch-insert-btn">Batch Insert</button>
<button id="batch-delete-btn">Batch Delete</button>
<button id="batch-search-btn">Batch Search</button>
</fieldset>

<div>
<h2>BST Structure Visualization</h2>
<pre id="tree-display">(Empty Tree)</pre>
</div>

<div>
<h2>Console Log (Operation trace & info)</h2>
<div id="log"></div>
<button id="clear-log-btn">Clear Log</button>
</div>

<script>
(() => {
  'use strict';

  // --- BST Node and Tree Implementation ---
  class BSTNode {
    constructor(value) {
      this.value = value;
      this.left = null;
      this.right = null;
    }
  }

  class BST {
    constructor() {
      this.root = null;
    }

    insert(value) {
      if (typeof value !== 'number' || !Number.isFinite(value)) return false;
      this.root = insertRec(this.root, value);
      function insertRec(node, val) {
        if (node === null) return new BSTNode(val);
        if (val === node.value) return node; // no duplicates
        if (val < node.value) node.left = insertRec(node.left, val);
        else node.right = insertRec(node.right, val);
        return node;
      }
      return true;
    }

    delete(value) {
      let deleted = false;
      const deleteRec = (node, val) => {
        if (node === null) return null;
        if (val < node.value) node.left = deleteRec(node.left, val);
        else if (val > node.value) node.right = deleteRec(node.right, val);
        else {
          deleted = true;
          // Node with only one child or no child
          if (node.left === null) return node.right;
          else if (node.right === null) return node.left;
          // Node with two children
          node.value = minValue(node.right);
          node.right = deleteRec(node.right, node.value);
        }
        return node;
      };
      const minValue = (node) => {
        let current = node;
        while (current.left !== null) current = current.left;
        return current.value;
      };
      this.root = deleteRec(this.root, value);
      return deleted;
    }

    search(value) {
      let node = this.root;
      const path = [];
      while (node !== null) {
        path.push(node);
        if (value === node.value) return { found: true, path };
        if (value < node.value) node = node.left;
        else node = node.right;
      }
      return { found: false, path };
    }

    inorder(callback) {
      const arr = [];
      inorderRec(this.root);
      function inorderRec(node) {
        if (!node) return;
        inorderRec(node.left);
        arr.push(node);
        inorderRec(node.right);
      }
      return arr;
    }

    preorder(callback) {
      const arr = [];
      preorderRec(this.root);
      function preorderRec(node) {
        if (!node) return;
        arr.push(node);
        preorderRec(node.left);
        preorderRec(node.right);
      }
      return arr;
    }

    postorder(callback) {
      const arr = [];
      postorderRec(this.root);
      function postorderRec(node) {
        if (!node) return;
        postorderRec(node.left);
        postorderRec(node.right);
        arr.push(node);
      }
      return arr;
    }

    levelorder() {
      const arr = [];
      if (!this.root) return arr;
      const queue = [this.root];
      while(queue.length) {
        const node = queue.shift();
        arr.push(node);
        if (node.left) queue.push(node.left);
        if (node.right) queue.push(node.right);
      }
      return arr;
    }

    height() {
      function heightRec(node) {
        if (!node) return 0;
        return 1 + Math.max(heightRec(node.left), heightRec(node.right));
      }
      return heightRec(this.root);
    }

    countNodes() {
      let cnt = 0;
      function countRec(node) {
        if (!node) return;
        cnt++;
        countRec(node.left);
        countRec(node.right);
      }
      countRec(this.root);
      return cnt;
    }

    countLeaves() {
      let cnt = 0;
      function leavesRec(node) {
        if (!node) return;
        if (!node.left && !node.right) cnt++;
        leavesRec(node.left);
        leavesRec(node.right);
      }
      leavesRec(this.root);
      return cnt;
    }

    findMin() {
      if (!this.root) return null;
      let current = this.root;
      while (current.left) current = current.left;
      return current.value;
    }

    findMax() {
      if (!this.root) return null;
      let current = this.root;
      while (current.right) current = current.right;
      return current.value;
    }

    isBST() {
      function validate(node, low, high) {
        if (!node) return true;
        if ((low !== null && node.value <= low) || (high !== null && node.value >= high)) return false;
        return validate(node.left, low, node.value) && validate(node.right, node.value, high);
      }
      return validate(this.root, null, null);
    }

    kthSmallest(k) {
      if (typeof k !== 'number' || k < 1) return null;
      let count = 0, result = null;
      function inorderRec(node) {
        if (!node || result !== null) return;
        inorderRec(node.left);
        count++;
        if (count === k) {
          result = node.value;
          return;
        }
        inorderRec(node.right);
      }
      inorderRec(this.root);
      return result;
    }

    rangeSearch(minVal, maxVal) {
      const result = [];
      function rangeRec(node) {
        if (!node) return;
        if (node.value > minVal) rangeRec(node.left);
        if (node.value >= minVal && node.value <= maxVal) result.push(node.value);
        if (node.value < maxVal) rangeRec(node.right);
      }
      rangeRec(this.root);
      return result;
    }

    clear() {
      this.root = null;
    }
  }

  // --- Helpers for displaying the tree ---
  // We'll show multi-level tree textual display (very rough)
  // The approach: level-order with spacing and lines (not too fancy)
  // Since minimal styling, simple textual lines with indentation and pointers

  function getLevels(root) {
    const levels = [];
    if (!root) return levels;
    let queue = [{node: root, level:0}];
    while(queue.length) {
      const {node, level} = queue.shift();
      if (levels.length === level) levels.push([]);
      levels[level].push(node);
      if (node) {
        queue.push({node: node.left, level: level+1});
        queue.push({node: node.right, level: level+1});
      }
    }
    // Remove trailing levels with only nulls
    while (levels.length && levels[levels.length-1].every(n => n===null)) {
      levels.pop();
    }
    return levels;
  }

  // Produce a simple textual tree representation vertically
  // Each level on a line: print node values or spaces, pointer lines
  // This is a minimal hack, no complex formatting
  function renderTree(root, highlightValues = [], pathNodes = []) {
    if (!root) return "(Empty Tree)";
    const levels = getLevels(root);
    const maxLevel = levels.length;
    const maxWidth = Math.pow(2, maxLevel) - 1; // max elems at last level

    // We'll represent the tree lines in an array of strings
    let outputLines = [];
    // For each level create a line using fixed width spacing
    // nodeStr with mark if highlighted or path
    for(let i=0; i<levels.length; i++) {
      const level = levels[i];
      // spacing count: total slots is maxWidth, nodes are placed with gaps
      // slots for this level = 2^i
      const slots = Math.pow(2, i);
      const spaceBetween = Math.floor(maxWidth / slots);
      let line = "";
      for(let j=0; j<slots; j++) {
        const node = level[j];
        let nodeStr = " ";
        if (node) {
          nodeStr = node.value.toString();
          if (highlightValues.indexOf(node.value) !== -1) nodeStr = "[" + nodeStr + "]";
          else if (pathNodes.indexOf(node) !== -1) nodeStr = "("+nodeStr+")";
        }
        // pad nodeStr to length 3, left aligned (pad right)
        if (nodeStr.length < 3) nodeStr = nodeStr + " ".repeat(3 - nodeStr.length);
        line += nodeStr;
        if (j < slots -1) line += " ".repeat(spaceBetween*3 -3);
      }
      outputLines.push(line);

      // Add connection line if not last level
      if (i < levels.length -1) {
        // For each parent node, show / and \ under them when children present
        let connectionLine = "";
        for(let j=0; j<slots; j++) {
          const node = level[j];
          if (node) {
            // if left child exists
            connectionLine += node.left ? " / " : "   ";
            connectionLine += " ".repeat(spaceBetween*3 -3);
            // similarly for right child, but spacing already handled by spaceBetween*3
          } else {
            // No parent node - spacing for two children
            connectionLine += "   " + " ".repeat(spaceBetween*3 -3);
          }
        }
        outputLines.push(connectionLine);
      }
    }

    return outputLines.join("\n");
  }

  // --- Main Script ---

  // Elements
  const insertValueInput = document.getElementById('insert-value');
  const insertBtn = document.getElementById('insert-btn');

  const deleteValueInput = document.getElementById('delete-value');
  const deleteBtn = document.getElementById('delete-btn');

  const searchValueInput = document.getElementById('search-value');
  const searchBtn = document.getElementById('search-btn');

  const clearTreeBtn = document.getElementById('clear-tree-btn');

  const inorderBtn = document.getElementById('inorder-btn');
  const preorderBtn = document.getElementById('preorder-btn');
  const postorderBtn = document.getElementById('postorder-btn');
  const levelorderBtn = document.getElementById('levelorder-btn');

  const traversalDelayInput = document.getElementById('traversal-delay');
  const traversalToggleBtn = document.getElementById('traversal-toggle-btn');
  const traversalStepBtn = document.getElementById('traversal-step-btn');
  const traversalResetBtn = document.getElementById('traversal-reset-btn');

  const heightBtn = document.getElementById('height-btn');
  const countNodesBtn = document.getElementById('count-nodes-btn');
  const countLeavesBtn = document.getElementById('count-leaves-btn');
  const minValueBtn = document.getElementById('min-value-btn');
  const maxValueBtn = document.getElementById('max-value-btn');
  const isBSTBtn = document.getElementById('is-bst-btn');

  const kthSmallestInput = document.getElementById('kth-smallest-value');
  const kthSmallestBtn = document.getElementById('kth-smallest-btn');

  const rangeMinInput = document.getElementById('range-min');
  const rangeMaxInput = document.getElementById('range-max');
  const rangeSearchBtn = document.getElementById('range-search-btn');

  const highlightValueInput = document.getElementById('highlight-value');
  const highlightBtn = document.getElementById('highlight-btn');
  const clearHighlightBtn = document.getElementById('clear-highlight-btn');

  const showPathBtn = document.getElementById('show-path-btn');
  const pathValueInput = document.getElementById('path-value');
  const clearPathBtn = document.getElementById('clear-path-btn');

  const batchInput = document.getElementById('batch-input');
  const batchInsertBtn = document.getElementById('batch-insert-btn');
  const batchDeleteBtn = document.getElementById('batch-delete-btn');
  const batchSearchBtn = document.getElementById('batch-search-btn');

  const treeDisplay = document.getElementById('tree-display');
  const logDiv = document.getElementById('log');
  const clearLogBtn = document.getElementById('clear-log-btn');

  // State variables
  const bst = new BST();

  // For traversal walk
  let traversalNodes = [];
  let traversalIndex = 0;
  let traversalTimer = null;
  let traversalRunning = false;
  let currentTraversalType = null; // inorder, preorder, postorder, levelorder
  const highlightNodes = []; // for highlighting values
  let pathHighlightNodes = [];

  // Utility log function
  function log(msg) {
    const time = new Date().toLocaleTimeString();
    logDiv.textContent += `[${time}] ${msg}\n`;
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  function clearLog() {
    logDiv.textContent = "";
  }

  function updateTreeDisplay() {
    treeDisplay.textContent = renderTree(bst.root, highlightNodes, pathHighlightNodes);
  }

  // Highlight management
  function addHighlight(value) {
    if (!highlightNodes.includes(value)) highlightNodes.push(value);
  }
  function clearHighlights() {
    highlightNodes.length = 0;
  }
  function clearPathHighlights() {
    pathHighlightNodes.length = 0;
  }

  // Traversal step function
  function traversalStep() {
    if (traversalIndex >= traversalNodes.length) {
      traversalStepEnd();
      return;
    }
    // Highlight current node only, clearing prior highlights on traversal
    clearHighlights();
    addHighlight(traversalNodes[traversalIndex].value);
    updateTreeDisplay();
    log(`Traversal step: visiting node ${traversalNodes[traversalIndex].value} (${currentTraversalType})`);

    traversalIndex++;
  }

  // Called when traversal ends/stops
  function traversalStepEnd() {
    traversalRunning = false;
    traversalNodes = [];
    traversalIndex = 0;
    currentTraversalType = null;
    traversalToggleBtn.textContent = "Start Traversal";
    traversalStepBtn.disabled = true;
    clearHighlights();
    updateTreeDisplay();
    if (traversalTimer) {
      clearInterval(traversalTimer);
      traversalTimer = null;
    }
    log("Traversal ended.");
  }

  // Start traversal as per selected type
  function startTraversal(type) {
    if (traversalRunning) return; // already running
    currentTraversalType = type.toLowerCase();
    switch(currentTraversalType) {
      case "inorder": traversalNodes = bst.inorder(); break;
      case "preorder": traversalNodes = bst.preorder(); break;
      case "postorder": traversalNodes = bst.postorder(); break;
      case "levelorder": traversalNodes = bst.levelorder(); break;
      default:
        log("Unknown traversal type");
        return;
    }
    if (traversalNodes.length === 0) {
      log("Tree is empty, nothing to traverse.");
      return;
    }
    traversalRunning = true;
    traversalIndex = 0;
    traversalToggleBtn.textContent = "Stop Traversal";
    traversalStepBtn.disabled = false;
    const delay = parseInt(traversalDelayInput.value) || 500;
    if (delay > 0) {
      traversalTimer = setInterval(() => {
        traversalStep();
        if (traversalIndex >= traversalNodes.length) traversalStepEnd();
      }, delay);
    } else {
      // If delay is zero or not positive, disable timer and expect manual stepping
      clearInterval(traversalTimer);
      traversalTimer = null;
      log("Traversal running in manual step mode (delay=0). Use Step button.");
    }
    log(`Traversal started: ${type}`);
  }

  // Stop current traversal
  function stopTraversal() {
    traversalStepEnd();
  }

  // Reset traversal state
  function resetTraversal() {
    if (traversalRunning && traversalTimer) {
      clearInterval(traversalTimer);
      traversalTimer = null;
    }
    traversalRunning = false;
    traversalNodes = [];
    traversalIndex = 0;
    currentTraversalType = null;
    traversalToggleBtn.textContent = "Start Traversal";
    traversalStepBtn.disabled = true;
    clearHighlights();
    updateTreeDisplay();
    log("Traversal reset.");
  }

  // --- Event Listeners ---

  insertBtn.addEventListener('click', () => {
    const v = parseInt(insertValueInput.value);
    if (isNaN(v)) {
      log("Insert: Invalid input");
      return;
    }
    const inserted = bst.insert(v);
    if (inserted) {
      log(`Inserted value ${v}`);
      updateTreeDisplay();
    } else {
      log(`Insert: Value ${v} already exists or invalid`);
    }
  });

  deleteBtn.addEventListener('click', () => {
    const v = parseInt(deleteValueInput.value);
    if (isNaN(v)) {
      log("Delete: Invalid input");
      return;
    }
    const deleted = bst.delete(v);
    if (deleted) {
      log(`Deleted value ${v}`);
      updateTreeDisplay();
      // Also clear path or highlights if affected
      clearHighlights();
      clearPathHighlights();
    } else {
      log(`Delete: Value ${v} not found`);
    }
  });

  searchBtn.addEventListener('click', () => {
    const v = parseInt(searchValueInput.value);
    if (isNaN(v)) {
      log("Search: Invalid input");
      return;
    }
    const res = bst.search(v);
    if (res.found) {
      log(`Search: Value ${v} found. Path length: ${res.path.length}`);
      clearHighlights();
      clearPathHighlights();
      res.path.forEach(n => addHighlight(n.value));
      updateTreeDisplay();
    } else {
      log(`Search: Value ${v} not found. Closest path length: ${res.path.length}`);
      clearHighlights();
      clearPathHighlights();
      res.path.forEach(n => addHighlight(n.value));
      updateTreeDisplay();
    }
  });

  clearTreeBtn.addEventListener('click', () => {
    bst.clear();
    clearHighlights();
    clearPathHighlights();
    updateTreeDisplay();
    log("Tree cleared.");
    resetTraversal();
  });

  inorderBtn.addEventListener('click', () => {
    if (traversalRunning) {
      log("Traversal already running. Stop traversal to start another.");
      return;
    }
    startTraversal("inorder");
  });

  preorderBtn.addEventListener('click', () => {
    if (traversalRunning) {
      log("Traversal already running. Stop traversal to start another.");
      return;
    }
    startTraversal("preorder");
  });

  postorderBtn.addEventListener('click', () => {
    if (traversalRunning) {
      log("Traversal already running. Stop traversal to start another.");
      return;
    }
    startTraversal("postorder");
  });

  levelorderBtn.addEventListener('click', () => {
    if (traversalRunning) {
      log("Traversal already running. Stop traversal to start another.");
      return;
    }
    startTraversal("levelorder");
  });

  traversalToggleBtn.addEventListener('click', () => {
    if (traversalRunning) {
      stopTraversal();
    } else {
      if (!currentTraversalType) {
        log("No traversal type selected. Use traversal buttons to start.");
        return;
      }
      startTraversal(currentTraversalType);
    }
  });

  traversalStepBtn.addEventListener('click', () => {
    if (!traversalRunning) {
      log("Traversal not active. Start traversal first.");
      return;
    }
    if (traversalTimer) {
      log("Traversal running in auto mode. Stop auto to step manually.");
      return;
    }
    traversalStep();
    if (traversalIndex >= traversalNodes.length) traversalStepEnd();
  });

  traversalResetBtn.addEventListener('click', () => {
    resetTraversal();
  });

  heightBtn.addEventListener('click', () => {
    const h = bst.height();
    log(`Tree height: ${h}`);
  });

  countNodesBtn.addEventListener('click', () => {
    const c = bst.countNodes();
    log(`Total nodes: ${c}`);
  });

  countLeavesBtn.addEventListener('click', () => {
    const c = bst.countLeaves();
    log(`Leaf nodes: ${c}`);
  });

  minValueBtn.addEventListener('click', () => {
    const min = bst.findMin();
    if (min === null) log("Tree is empty.");
    else log(`Minimum value: ${min}`);
  });

  maxValueBtn.addEventListener('click', () => {
    const max = bst.findMax();
    if (max === null) log("Tree is empty.");
    else log(`Maximum value: ${max}`);
  });

  isBSTBtn.addEventListener('click', () => {
    const valid = bst.isBST();
    log(`BST property valid: ${valid ? "Yes" : "No"}`);
  });

  kthSmallestBtn.addEventListener('click', () => {
    const k = parseInt(kthSmallestInput.value);
    if (isNaN(k) || k < 1) {
      log("k-th Smallest: Invalid k value");
      return;
    }
    const val = bst.kthSmallest(k);
    if (val === null) log(`k-th Smallest: Tree has fewer than ${k} nodes.`);
    else log(`k-th Smallest value (k=${k}): ${val}`);
  });

  rangeSearchBtn.addEventListener('click', () => {
    const minV = parseInt(rangeMinInput.value);
    const maxV = parseInt(rangeMaxInput.value);
    if (isNaN(minV) || isNaN(maxV) || minV > maxV) {
      log("Range search: Invalid range input");
      return;
    }
    const results = bst.rangeSearch(minV, maxV);
    log(`Range search [${minV}, ${maxV}] found ${results.length} value(s): ${results.join(", ")}`);
    clearHighlights();
    results.forEach(v => addHighlight(v));
    updateTreeDisplay();
  });

  highlightBtn.addEventListener('click', () => {
    const v = parseInt(highlightValueInput.value);
    if (isNaN(v)) {
      log("Highlight: Invalid input");
      return;
    }
    clearHighlights();
    addHighlight(v);
    updateTreeDisplay();
    log(`Highlighted node with value ${v} (even if not present)`);
  });

  clearHighlightBtn.addEventListener('click', () => {
    clearHighlights();
    updateTreeDisplay();
    log("Cleared highlights.");
  });

  showPathBtn.addEventListener('click', () => {
    const v = parseInt(pathValueInput.value);
    if (isNaN(v)) {
      log("Show Path: Invalid input");
      return;
    }
    const res = bst.search(v);
    clearPathHighlights();
    if (res.path.length === 0) {
      log("Show Path: Tree empty.");
      updateTreeDisplay();
      return;
    }
    pathHighlightNodes.push(...res.path);
    updateTreeDisplay();
    if (res.found) {
      log(`Path to value ${v} highlighted (${res.path.length} nodes)`);
    } else {
      log(`Value ${v} not found. Path to closest node highlighted (${res.path.length} nodes)`);
    }
  });

  clearPathBtn.addEventListener('click', () => {
    clearPathHighlights();
    updateTreeDisplay();
    log("Cleared path highlight.");
  });

  batchInsertBtn.addEventListener('click', () => {
    const values = batchInput.value.split(',').map(s => parseInt(s.trim())).filter(x => !isNaN(x));
    if (values.length === 0) {
      log("Batch Insert: No valid integers found.");
      return;
    }
    let insertedCount = 0;
    values.forEach(v => {
      if (bst.insert(v)) insertedCount++;
    });
    log(`Batch Insert: Tried ${values.length}, successfully inserted ${insertedCount} new nodes.`);
    updateTreeDisplay();
  });

  batchDeleteBtn.addEventListener('click', () => {
    const values = batchInput.value.split(',').map(s => parseInt(s.trim())).filter(x => !isNaN(x));
    if (values.length === 0) {
      log("Batch Delete: No valid integers found.");
      return;
    }
    let deletedCount = 0;
    values.forEach(v => {
      if (bst.delete(v)) deletedCount++;
    });
    log(`Batch Delete: Tried ${values.length}, successfully deleted ${deletedCount} nodes.`);
    updateTreeDisplay();
  });

  batchSearchBtn.addEventListener('click', () => {
    const values = batchInput.value.split(',').map(s => parseInt(s.trim())).filter(x => !isNaN(x));
    if (values.length === 0) {
      log("Batch Search: No valid integers found.");
      return;
    }
    clearHighlights();
    let foundCount = 0;
    values.forEach(v => {
      const r = bst.search(v);
      if (r.found) {
        foundCount++;
        addHighlight(v);
      }
    });
    updateTreeDisplay();
    log(`Batch Search: Searched ${values.length}. Found ${foundCount} values.`);
  });

  clearLogBtn.addEventListener('click', () => {
    clearLog();
  });

  // Initialize
  updateTreeDisplay();
  clearHighlights();
  clearPathHighlights();
})();
</script>

</body>
</html>
