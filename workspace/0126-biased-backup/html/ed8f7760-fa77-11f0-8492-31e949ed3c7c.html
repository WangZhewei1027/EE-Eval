<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Load Balancing Visualization</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.2);
            padding: 40px 20px;
            width: 90%;
            max-width: 800px;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5em;
            margin: 0;
            color: #4a4a4a;
            animation: fadeIn 2s;
        }

        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin-top: 15px;
            color: #555;
            animation: fadeIn 3s;
        }

        .load-balancer {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 200px;
            margin-top: 40px;
            animation: dropIn 2s;
        }

        .server {
            width: 60px;
            height: 0;
            background: #6fa3ef;
            border-radius: 10px;
            transition: height 0.5s ease-in-out;
        }

        .server.active {
            height: 100%;
            animation: rise 0.5s ease-in forwards;
        }

        .load-balancer-controls {
            margin-top: 20px;
        }

        .button {
            padding: 10px 20px;
            background: #20c997;
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s ease;
            margin: 5px;
        }

        .button:hover {
            background: #118c74;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes dropIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes rise {
            from {
                height: 0;
            }
            to {
                height: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Load Balancing Visualization</h1>
        <p>Witness how load is distributed among servers, optimizing resource usage for efficiency.</p>

        <div class="load-balancer">
            <div class="server" id="server1"></div>
            <div class="server" id="server2"></div>
            <div class="server" id="server3"></div>
        </div>

        <div class="load-balancer-controls">
            <button class="button" id="loadButton">Distribute Load</button>
        </div>
    </div>

    <script>
        const servers = document.querySelectorAll('.server');
        const loadButton = document.getElementById('loadButton');

        loadButton.addEventListener('click', () => {
            servers.forEach((server, index) => {
                server.classList.remove('active');
                setTimeout(() => {
                    server.classList.add('active');
                }, index * 500); // Stagger start of animations
            });
        });
    </script>
</body>

</html>
