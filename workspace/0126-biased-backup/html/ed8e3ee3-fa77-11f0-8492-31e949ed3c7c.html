<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big-Omega Notation</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            color: #333;
            overflow: hidden;
        }
        header {
            text-align: center;
            padding: 50px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px 10px 0 0;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
        h1 {
            font-size: 2.5em;
            color: #333;
            animation: fadeIn 2s ease-in-out;
        }
        .content {
            display: flex;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 150px);
            padding: 20px;
            text-align: center;
        }
        .graph {
            width: 80%;
            height: 300px;
            position: relative;
            margin: 0 auto;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .line {
            position: absolute;
            left: 10%;
            bottom: 10%;
            height: 0;
            width: 0;
            border-left: 2px solid #ff5e62;
            border-bottom: 2px solid #4a90e2;
            animation: drawLine 3s 0.5s forwards;
            transform-origin: bottom left;
            opacity: 0;
        }
        .button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s, transform 0.3s;
            margin: 10px;
        }
        .button:hover {
            background: #5bc0de;
            transform: scale(1.05);
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        @keyframes drawLine {
            0% { height: 0; opacity: 0; }
            100% { height: 100%; opacity: 1; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Understanding Big-Omega Notation</h1>
    </header>
    <div class="content">
        <div class="graph">
            <div class="line"></div>
        </div>
    </div>
    <div style="text-align: center;">
        <button class="button" onclick="displayMessage()">Learn More</button>
        <button class="button" onclick="resetAnimation()">Reset</button>
    </div>
    <script>
        function displayMessage() {
            alert("Big-Omega Notation represents a lower bound.\nIt is used to describe the best-case performance of an algorithm.");
        }

        function resetAnimation() {
            const line = document.querySelector('.line');
            line.style.height = '0';
            line.style.opacity = '0';
            setTimeout(() => {
                line.style.height = '100%';
                line.style.opacity = '1';
            }, 10);
        }
    </script>
</body>
</html>
