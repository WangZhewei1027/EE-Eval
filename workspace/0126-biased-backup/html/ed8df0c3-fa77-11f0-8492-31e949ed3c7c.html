<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive PageRank Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #191b24;
            color: #f0f0f0;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
        }
        .graph {
            width: 80vmin;
            height: 80vmin;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .node {
            position: absolute;
            border-radius: 50%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease, background-color 0.3s ease;
            font-size: 1.2em;
        }
        .edge {
            position: absolute;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.4);
            transition: opacity 0.3s ease;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #3498db;
            color: white;
            font-size: 1em;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<h1>PageRank Visualization</h1>
<div class="graph" id="graph"></div>
<button id="startButton">Start Animation</button>

<script>
    const graphElement = document.getElementById('graph');
    const startButton = document.getElementById('startButton');

    const nodes = [
        { id: 0, value: 10, angle: 0 },
        { id: 1, value: 20, angle: Math.PI / 2 },
        { id: 2, value: 40, angle: Math.PI },
        { id: 3, value: 30, angle: (3 * Math.PI) / 2 }
    ];

    const edges = [
        { source: 0, target: 1 },
        { source: 1, target: 2 },
        { source: 2, target: 3 },
        { source: 3, target: 0 }
    ];

    function drawGraph() {
        nodes.forEach(node => {
            const x = 40 * Math.cos(node.angle) + 50;
            const y = 40 * Math.sin(node.angle) + 50;

            const nodeElement = document.createElement('div');
            nodeElement.className = 'node';
            nodeElement.style.width = `${node.value}px`;
            nodeElement.style.height = `${node.value}px`;
            nodeElement.style.backgroundColor = `hsl(${node.value * 5}, 70%, 50%)`;
            nodeElement.style.left = `${x}vmin`;
            nodeElement.style.top = `${y}vmin`;
            nodeElement.textContent = node.id;

            graphElement.appendChild(nodeElement);
        });

        edges.forEach(edge => {
            const sourceNode = nodes[edge.source];
            const targetNode = nodes[edge.target];

            const x1 = 40 * Math.cos(sourceNode.angle) + 50;
            const y1 = 40 * Math.sin(sourceNode.angle) + 50;
            const x2 = 40 * Math.cos(targetNode.angle) + 50;
            const y2 = 40 * Math.sin(targetNode.angle) + 50;

            const edgeElement = document.createElement('div');
            edgeElement.className = 'edge';
            edgeElement.style.left = `${x1}vmin`;
            edgeElement.style.top = `${y1}vmin`;
            edgeElement.style.width = `${Math.hypot(x2 - x1, y2 - y1)}vmin`;
            edgeElement.style.transform = `rotate(${Math.atan2(y2 - y1, x2 - x1)}rad)`;
            edgeElement.style.opacity = 0.5;

            graphElement.appendChild(edgeElement);
        });
    }

    startButton.addEventListener('click', () => {
        drawGraph();
        startButton.disabled = true;
    });
</script>

</body>
</html>
