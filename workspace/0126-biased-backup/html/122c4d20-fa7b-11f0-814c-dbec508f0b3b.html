<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divide and Conquer</title>
    <style>
        body {
            font-family: monospace;
            font-size: 12px;
            margin: 0;
            padding: 0;
        }
        input, button {
            width: 100%;
            height: 30px;
            padding: 5px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button {
            background-color: #4CAF50;
            color: #fff;
            border: none;
            padding: 5px 10px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div id="controls">
        <h2>Divide and Conquer</h2>
        <button id="button1">Button 1</button>
        <button id="button2">Button 2</button>
        <button id="button3">Button 3</button>
        <input id="slider1" type="range" min="0" max="100" value="50">
        <label for="slider1">Slider 1</label>
        <input id="slider2" type="range" min="0" max="100" value="50">
        <label for="slider2">Slider 2</label>
        <input id="slider3" type="range" min="0" max="100" value="50">
        <label for="slider3">Slider 3</label>
    </div>
    <div id="result"></div>

    <script>
        let state = 0;

        document.getElementById('button1').addEventListener('click', function() {
            state = 1;
            document.getElementById('result').innerHTML = "Button 1 clicked";
        });

        document.getElementById('button2').addEventListener('click', function() {
            state = 2;
            document.getElementById('result').innerHTML = "Button 2 clicked";
        });

        document.getElementById('button3').addEventListener('click', function() {
            state = 3;
            document.getElementById('result').innerHTML = "Button 3 clicked";
        });

        document.getElementById('slider1').addEventListener('input', function() {
            state = 1;
            document.getElementById('result').innerHTML = "Slider 1 value: " + this.value;
        });

        document.getElementById('slider2').addEventListener('input', function() {
            state = 2;
            document.getElementById('result').innerHTML = "Slider 2 value: " + this.value;
        });

        document.getElementById('slider3').addEventListener('input', function() {
            state = 3;
            document.getElementById('result').innerHTML = "Slider 3 value: " + this.value;
        });

        let workflow = function() {
            if (state === 1) {
                document.getElementById('result').innerHTML = "Button 1 clicked";
            } else if (state === 2) {
                document.getElementById('result').innerHTML = "Button 2 clicked";
            } else if (state === 3) {
                document.getElementById('result').innerHTML = "Button 3 clicked";
            }
            if (document.getElementById('slider1').value < 50 && document.getElementById('slider2').value < 50 && document.getElementById('slider3').value < 50) {
                document.getElementById('result').innerHTML = "All sliders are within the range";
            } else {
                document.getElementById('result').innerHTML = "Not all sliders are within the range";
            }
        };

        workflow();
    </script>
</body>
</html>
