<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doubly Linked List Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #8e44ad, #3498db);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #container {
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .list {
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease-in-out;
        }
        .node {
            background: #2c3e50;
            border-radius: 10px;
            padding: 20px;
            margin: 0 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            transition: transform 0.3s ease;
        }
        .node:hover {
            transform: scale(1.05);
        }
        .arrow {
            margin: 0 5px;
            font-size: 2rem;
            transition: opacity 0.3s ease;
        }
        .arrow.hidden {
            opacity: 0;
        }
        .button {
            background: #e74c3c;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            margin-top: 25px;
            cursor: pointer;
            font-size: 1rem;
            color: white;
            transition: background 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .button:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Doubly Linked List Visualization</h1>
        <div class="list" id="doublyLinkedList">
            <div class="node">Node 1</div>
            <span class="arrow">⇄</span>
            <div class="node">Node 2</div>
            <span class="arrow hidden">⇄</span>
            <div class="node">Node 3</div>
        </div>
        <button class="button" onclick="addNode()">Add Node</button>
    </div>

    <script>
        let nodeCount = 3;

        function addNode() {
            const list = document.getElementById('doublyLinkedList');
            const newNode = document.createElement('div');
            newNode.classList.add('node');
            newNode.textContent = `Node ${++nodeCount}`;

            const arrow = document.createElement('span');
            arrow.classList.add('arrow');
            arrow.textContent = "⇄";

            if (list.lastChild.className === "node") {
                list.appendChild(arrow);
            }
            list.appendChild(newNode);
        }
    </script>
</body>
</html>
