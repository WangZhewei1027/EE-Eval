<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semaphore Visualization</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }
        h1 {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 1s;
        }
        .semaphore {
            position: relative;
            width: 100px;
            height: 300px;
            margin: 0 auto;
            border-radius: 10px;
            border: 5px solid #ecf0f1;
            background-color: #34495e;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .light {
            position: absolute;
            width: 80px;
            height: 80px;
            background-color: #e74c3c;
            border-radius: 50%;
            top: 20px;
            left: 10px;
            transition: background-color 0.5s ease;
            animation: blink 1.5s infinite alternate;
        }
        .light.yellow {
            background-color: #f1c40f;
        }
        .light.green {
            background-color: #2ecc71;
        }
        @keyframes blink {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0.3;
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .controls {
            position: absolute;
            bottom: 50px;
            display: flex;
            justify-content: space-between;
            width: 200px;
        }
        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #2980b9;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #3498db;
        }
    </style>
</head>
<body>
    <h1>Pulsating Semaphore Visualization</h1>
    <div class="semaphore">
        <div class="light"></div>
        <div class="light yellow" style="top: 110px;"></div>
        <div class="light green" style="top: 200px;"></div>
    </div>
    <div class="controls">
        <button class="button" onclick="changeLight('red')">Red</button>
        <button class="button" onclick="changeLight('green')">Green</button>
    </div>
    
    <script>
        const lights = document.querySelectorAll('.light');

        function changeLight(color) {
            lights.forEach(light => {
                light.style.opacity = '0.2'; // dim all lights
            });

            if (color === 'red') {
                lights[0].style.opacity = '1'; // make red light bright
            } else if (color === 'green') {
                lights[2].style.opacity = '1'; // make green light bright
            }
        }
    </script>
</body>
</html>
