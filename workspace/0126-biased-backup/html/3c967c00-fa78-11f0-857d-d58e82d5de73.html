<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Heap (Min) - Concept Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

  /* Root & Reset */
  * {
    box-sizing: border-box;
  }
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: linear-gradient(135deg, #0a0f2c, #1a1f4a);
    font-family: 'Poppins', sans-serif;
    color: #e0e6f2;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 60px;
  }

  h1 {
    font-weight: 600;
    font-size: 2.8rem;
    margin-bottom: 8px;
    letter-spacing: 1.2px;
    color: #7cd1f9;
    text-shadow:
      0 0 6px #52b8ff,
      0 0 15px #52b8ff55;
  }

  p.subtitle {
    font-weight: 300;
    font-size: 1.15rem;
    margin-top: 0;
    margin-bottom: 36px;
    color: #a3b4d6;
    max-width: 460px;
    text-align: center;
    letter-spacing: 0.55px;
  }

  /* Main container */
  main {
    position: relative;
    width: min(800px, 95vw);
    background: linear-gradient(145deg, #151c49, #0e1431);
    border-radius: 24px;
    padding: 48px 44px 76px;
    box-shadow:
      inset 0 0 15px #183660,
      0 10px 30px rgba(41, 119, 238, 0.45);
    user-select: none;
  }

  /* Heap container is a stylish tree container with subtle glow */
  .heap-container {
    position: relative;
    margin: 0 auto;
    width: 720px;
    max-width: 95vw;
    user-select: none;
  }

  /* Lines connector style */
  svg.connectors {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: visible;
    filter: drop-shadow(0 0 1.5px #5e99ffaa);
  }

  /* Heap node style */
  .node {
    position: absolute;
    width: 64px;
    height: 64px;
    background: radial-gradient(circle at 25% 25%, #4e79f9, #2f4bf2);
    border-radius: 50%;
    box-shadow:
      0 0 12px #5f91ffcc,
      inset 0 0 5px #b0d3ffcc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 1.5rem;
    color: #eaf2ff;
    text-shadow:
      0 0 10px #89afff,
      0 0 18px #83aaffcc;
    transition: transform 0.7s ease, box-shadow 0.7s ease;
    cursor: default;
  }

  .node.minroot {
    background: radial-gradient(circle at 25% 25%, #ff8c4e, #ff7632);
    box-shadow:
      0 0 16px #ff8c4ebb,
      inset 0 0 10px #ffad7533;
    color: #fff6e7;
    text-shadow:
      0 0 12px #ff9955,
      0 0 22px #ff7a22cc;
  }

  /* Subtle pulse animation for the root */
  @keyframes pulseRoot {
    0%, 100% { box-shadow: 0 0 16px #ff8c4ebb, inset 0 0 10px #ffad7533; }
    50% { box-shadow: 0 0 28px #ffb366dd, inset 0 0 18px #ffcc9955; }
  }
  .node.minroot {
    animation: pulseRoot 3.8s ease-in-out infinite;
  }

  /* Positions for a perfect min heap shape: 3 levels (7 nodes) */
  .heap-container {
    height: 320px;
  }

  .node.pos-0 { top: 0; left: calc(50% - 32px); }
  .node.pos-1 { top: 110px; left: calc(25% - 32px); }
  .node.pos-2 { top: 110px; left: calc(75% - 32px); }
  .node.pos-3 { top: 220px; left: calc(12.5% - 32px); }
  .node.pos-4 { top: 220px; left: calc(37.5% - 32px); }
  .node.pos-5 { top: 220px; left: calc(62.5% - 32px); }
  .node.pos-6 { top: 220px; left: calc(87.5% - 32px); }

  /* Connectors lines style */
  line.connector-line {
    stroke: #5e9affcc;
    stroke-width: 3;
    stroke-linecap: round;
    filter: drop-shadow(0 0 3px #5e9affdd);
    transition: stroke 0.7s ease;
  }

  /* Controls panel */
  .controls {
    margin-top: 48px;
    text-align: center;
  }
  button.btn {
    background: linear-gradient(145deg, #274699, #3e5bb3);
    border: none;
    border-radius: 28px;
    padding: 14px 34px;
    font-weight: 600;
    font-size: 1.15rem;
    color: #d2e7ff;
    letter-spacing: 0.7px;
    cursor: pointer;
    box-shadow:
      0 5px 12px #3a62adcc,
      inset 0 -3px 8px #1e3369;
    transition:
      background 0.5s ease,
      box-shadow 0.35s ease,
      transform 0.22s ease;
  }
  button.btn:hover {
    background: linear-gradient(145deg, #3e5bb3, #274699);
    box-shadow:
      0 8px 22px #527debcc,
      inset 0 -2px 10px #2b4cab;
    transform: translateY(-3px);
  }
  button.btn:active {
    transform: translateY(-1px);
    box-shadow:
      0 3px 10px #3259b166,
      inset 0 -1px 6px #213c7a;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    bottom: 18px;
    right: 38px;
    background: #1a2250bb;
    backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 10px 22px;
    font-weight: 300;
    font-size: 1rem;
    color: #a1b6ebdd;
    box-shadow: 0 0 13px #3463c7a8;
    user-select: none;
    cursor: default;
    transition: opacity 0.4s ease;
    max-width: 280px;
  }

  /* Subtle floating animation for the tooltip */
  @keyframes floatTooltip {
    0%, 100% { transform: translateY(0); opacity: 1; }
    50% { transform: translateY(-6px); opacity: 0.78; }
  }
  .tooltip {
    animation: floatTooltip 6s ease-in-out infinite;
  }

  /* Scrollbar hidden for aesthetic */
  ::-webkit-scrollbar {
    width: 0px;
    background: transparent;
  }
</style>
</head>
<body>
  <h1>Heap (Min)</h1>
  <p class="subtitle">A visually stunning presentation of a Min Heap data structure.<br />Observe the heap property with the smallest element at the root.</p>

  <main role="main" aria-label="Min Heap visualization">
    <div class="heap-container" aria-live="polite" aria-atomic="true" aria-relevant="additions removals">
      <!-- Nodes -->
      <div class="node pos-0 minroot" aria-label="Root node with value 8" tabindex="0">8</div>
      <div class="node pos-1" aria-label="Left child node with value 12" tabindex="0">12</div>
      <div class="node pos-2" aria-label="Right child node with value 15" tabindex="0">15</div>
      <div class="node pos-3" aria-label="Left child node with value 20" tabindex="0">20</div>
      <div class="node pos-4" aria-label="Left child node with value 18" tabindex="0">18</div>
      <div class="node pos-5" aria-label="Right child node with value 25" tabindex="0">25</div>
      <div class="node pos-6" aria-label="Right child node with value 30" tabindex="0">30</div>

      <!-- SVG Connector Lines -->
      <svg class="connectors" aria-hidden="true" role="presentation" xmlns="http://www.w3.org/2000/svg" >
        <!-- From root(0) -->
        <line class="connector-line" x1="360" y1="64" x2="180" y2="110" />
        <line class="connector-line" x1="360" y1="64" x2="540" y2="110" />
        <!-- From left child(1) -->
        <line class="connector-line" x1="180" y1="174" x2="90" y2="220" />
        <line class="connector-line" x1="180" y1="174" x2="270" y2="220" />
        <!-- From right child(2) -->
        <line class="connector-line" x1="540" y1="174" x2="450" y2="220" />
        <line class="connector-line" x1="540" y1="174" x2="630" y2="220" />
      </svg>
    </div>

    <div class="controls" aria-label="Heap controls">
      <button id="btnHeapify" class="btn" aria-pressed="false" aria-label="Run Heapify animation">Run Heapify animation</button>
    </div>
  </main>

  <div class="tooltip" role="note" aria-atomic="true">
    The Min Heap property ensures the root node is the smallest element.<br />Children nodes are always larger or equal to their parent.
  </div>

<script>
  (function(){
    const btnHeapify = document.getElementById('btnHeapify');
    const nodes = Array.from(document.querySelectorAll('.node'));
    /*
      We'll animate a simple heapify transform:
      Start from unordered values -> After animation -> Min Heap order
    */
    // Original unordered values (for demo purpose)
    const unorderedValues = [20, 18, 15, 30, 25, 12, 8];
    // Final min heap values for this tree
    const heapValues = [8, 12, 15, 20, 18, 25, 30];

    // Positions for nodes (x,y) for animating
    // nodes pos0..6 center coords based on CSS
    // Calculation: node 0: top=0 left=50% - 32 => x=50%*720=360, y=32
    const positions = [
      {x:360, y:32}, // root
      {x:180, y:142}, // 1
      {x:540, y:142}, // 2
      {x:90, y:252},  // 3
      {x:270, y:252}, // 4
      {x:450, y:252}, // 5
      {x:630, y:252}, // 6
    ];

    // Shuffle the nodes' displayed values to unordered at the start
    function resetValues() {
      nodes.forEach((node,i) => {
        node.textContent = unorderedValues[i];
        node.classList.remove('minroot');
      });
      nodes[0].classList.remove('minroot');
      btnHeapify.setAttribute('aria-pressed', 'false');
      btnHeapify.textContent = "Run Heapify animation";
    }

    // Animate heapify with subtle scaling and shadow glow
    async function animateHeapify(){
      btnHeapify.setAttribute('aria-pressed', 'true');
      btnHeapify.disabled = true;
      btnHeapify.textContent = "Heapifying...";

      // Step 1: Highlight nodes in initial order with subtle glow and slight scale
      for(let i=0; i<nodes.length; i++){
        nodes[i].style.transition = "transform 0.35s ease, box-shadow 0.35s ease";
        nodes[i].style.transform = "scale(1.05) translateY(-6px)";
        nodes[i].style.boxShadow = "0 0 18px #78b2ffdd, inset 0 0 12px #a1c6ffbb";
        await new Promise(r => setTimeout(r, 180));
      }
      // Relax highlight
      await new Promise(r => setTimeout(r, 300));
      nodes.forEach(node => {
        node.style.transform = "";
        node.style.boxShadow = "";
      });

      // Step 2: Animate node value swaps (fake "heapify" update - realistic visual)
      // We'll animate fade out/in transitions on text changes, plus re-assign minroot
      for(let i=0; i<nodes.length; i++){
        await new Promise(r => setTimeout(r, 180));
        // Fade out text
        nodes[i].style.transition = "color 0.4s ease, text-shadow 0.4s ease";
        nodes[i].style.color = "transparent";
        nodes[i].style.textShadow = "none";
        await new Promise(r => setTimeout(r, 450));
        // Update value
        nodes[i].textContent = heapValues[i];
        // Fade in
        nodes[i].style.color = i===0 ? "#fff6e7" : "#eaf2ff";
        nodes[i].style.textShadow =
          i===0 
          ? "0 0 12px #ff9955, 0 0 22px #ff7a22cc"
          : "0 0 10px #89afff, 0 0 18px #83aaffcc";
      }
      // Step 3: Mark root node distinct and animate pulse
      nodes.forEach(node => node.classList.remove('minroot'));
      nodes[0].classList.add('minroot');

      await new Promise(r => setTimeout(r, 650));
      btnHeapify.textContent = "Reset to Unordered";
      btnHeapify.disabled = false;
    }

    // When user clicks the button...
    btnHeapify.addEventListener('click', () => {
      const pressed = btnHeapify.getAttribute('aria-pressed') === 'true';
      if(pressed) {
        // reset
        resetValues();
      }
      else {
        animateHeapify();
      }
    });

    // Initialize unordered on page load
    resetValues();
  })();
</script>
</body>
</html>
