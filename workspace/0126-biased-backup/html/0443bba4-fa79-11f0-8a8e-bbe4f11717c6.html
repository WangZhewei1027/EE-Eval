<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Database</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
        }
        
        .main {
            padding: 20px;
        }
        
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #3e8e41;
        }
        
        .footer {
            background-color: #f0f0f0;
            padding: 10px;
            text-align: center;
        }
        
        .footer p {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SQL Database</h1>
        </div>
        <div class="main">
            <h2>SQL Basics</h2>
            <p>SQL is a programming language designed for managing relational databases. It uses a query language to store, manipulate, and retrieve data.</p>
        </div>
        <div class="footer">
            <p>&copy; 2023 SQL Database</p>
        </div>
    </div>
    <script>
        const db = {
            users: [
                { id: 1, name: 'John Doe', email: 'john.doe@example.com' },
                { id: 2, name: 'Jane Doe', email: 'jane.doe@example.com' }
            ]
        };

        const displayUsers = () => {
            const usersList = document.getElementById('users-list');
            usersList.innerHTML = '';
            db.users.forEach(user => {
                const userHTML = `
                    <li>
                        <span>${user.name}</span>
                        <span>${user.email}</span>
                    </li>
                `;
                usersList.insertAdjacentHTML('beforeend', userHTML);
            });
        };

        const addNewUser = () => {
            const newUserForm = document.getElementById('new-user-form');
            newUserForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const newUser = {
                    id: Math.floor(Math.random() * 100),
                    name: document.getElementById('name-input').value,
                    email: document.getElementById('email-input').value
                };
                db.users.push(newUser);
                displayUsers();
                document.getElementById('new-user-form').reset();
            });
        };

        const displayUsersList = () => {
            const usersList = document.getElementById('users-list');
            usersList.innerHTML = '';
            db.users.forEach(user => {
                const userHTML = `
                    <li>
                        <span>${user.name}</span>
                        <span>${user.email}</span>
                    </li>
                `;
                usersList.insertAdjacentHTML('beforeend', userHTML);
            });
        };

        const addNewUserForm = document.getElementById('new-user-form');
        addNewUserForm.addEventListener('submit', (e) => {
            e.preventDefault();
            addNewUser();
        });

        displayUsersList();
    </script>
</body>
</html>
