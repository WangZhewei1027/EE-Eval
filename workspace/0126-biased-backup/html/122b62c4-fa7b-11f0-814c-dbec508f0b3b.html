<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Selection Sort</h1>
        <p>Sort the array in ascending order using Selection Sort.</p>
        <div class="button-container">
            <button id="start-button">Start</button>
            <button id="reset-button">Reset</button>
            <input id="array-size" type="number" placeholder="Array size">
            <label for="array-size">Array size:</label>
            <select id="sort-order" placeholder="Sort order (asc/desc)">
                <option value="asc">Ascending</option>
                <option value="desc">Descending</option>
            </select>
        </div>
        <div id="output"></div>
    </div>

    <script>
        let arraySize = 10;
        let array = Array.from({length: arraySize}, (_, i) => i);
        let sortOrder = 'asc';

        // Function to print the array
        function printArray() {
            console.log('Array:', array);
        }

        // Function to swap two elements
        function swap(i, j) {
            let temp = array[i];
            array[i] = array[j];
            array[j] = temp;
        }

        // Selection Sort function
        function selectionSort(array) {
            for (let i = 0; i < array.length - 1; i++) {
                let minIndex = i;
                for (let j = i + 1; j < array.length; j++) {
                    if (array[j] < array[minIndex]) {
                        minIndex = j;
                    }
                }
                if (minIndex !== i) {
                    swap(i, minIndex);
                }
            }
        }

        // Main function
        function main() {
            let startButton = document.getElementById('start-button');
            let resetButton = document.getElementById('reset-button');
            let arraySizeInput = document.getElementById('array-size');
            let sortOrderSelect = document.getElementById('sort-order');
            let outputDiv = document.getElementById('output');

            startButton.addEventListener('click', () => {
                arraySize = parseInt(arraySizeInput.value);
                sortOrder = sortOrderSelect.value;
                array = Array.from({length: arraySize}, (_, i) => i);
                printArray();
                selectionSort(array);
                printArray();
                outputDiv.textContent = 'Sorted array in ' + sortOrder + ' order: ';
            });

            resetButton.addEventListener('click', () => {
                array = Array.from({length: arraySize}, (_, i) => i);
                printArray();
                outputDiv.textContent = 'Sorted array in ' + sortOrder + ' order: ';
            });
        }

        main();
    </script>
</body>
</html>
