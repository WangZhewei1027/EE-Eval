<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paging</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
        }
        
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #3e8e41;
        }
        
        .input-field {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .input-field input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .button-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .button-container button {
            margin-right: 10px;
        }
        
        .button-container input[type="button"] {
            padding: 10px 20px;
            cursor: pointer;
        }
        
        .button-container input[type="submit"] {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .button-container input[type="submit"]:hover {
            background-color: #3e8e41;
        }
        
        .pagination {
            margin-top: 20px;
            text-align: center;
        }
        
        .pagination button {
            padding: 10px 20px;
            cursor: pointer;
        }
        
        .pagination button:hover {
            background-color: #3e8e41;
        }
        
        .pagination a {
            padding: 10px 20px;
            cursor: pointer;
        }
        
        .pagination a:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Paging</h1>
        <input type="number" id="amount" value="10" />
        <button id="clear-button">Clear</button>
        <button id="next-button">Next</button>
        <button id="previous-button">Previous</button>
        <div class="pagination">
            <button id="prev-button">Prev</button>
            <button id="current-button">1</button>
            <button id="next-button">2</button>
            <button id="end-button">End</button>
        </div>
    </div>

    <script>
        let currentAmount = 10;
        let currentPage = 1;
        let prevButtonPressed = false;
        let nextButtonPressed = false;
        let endButtonPressed = false;

        document.getElementById('clear-button').addEventListener('click', function() {
            document.getElementById('amount').value = '10';
            document.getElementById('current-button').textContent = '1';
            prevButtonPressed = false;
            nextButtonPressed = false;
            endButtonPressed = false;
        });

        document.getElementById('next-button').addEventListener('click', function() {
            if (prevButtonPressed) {
                document.getElementById('next-button').style.display = 'none';
                document.getElementById('prev-button').style.display = 'none';
                document.getElementById('current-button').style.display = 'none';
                document.getElementById('next-button').style.display = 'none';
                document.getElementById('prev-button').style.display = 'none';
                document.getElementById('end-button').style.display = 'none';
                document.getElementById('clear-button').style.display = 'none';
                document.getElementById('current-button').textContent = '1';
                document.getElementById('prev-button').textContent = 'Prev';
                document.getElementById('next-button').textContent = 'Next';
                document.getElementById('end-button').textContent = 'End';
                prevButtonPressed = false;
                nextButtonPressed = false;
                endButtonPressed = false;
            } else {
                document.getElementById('current-button').textContent = currentPage;
                currentAmount = parseInt(document.getElementById('amount').value);
                document.getElementById('next-button').style.display = 'block';
                document.getElementById('prev-button').style.display = 'block';
                document.getElementById('end-button').style.display = 'block';
                endButtonPressed = true;
            }
        });

        document.getElementById('previous-button').addEventListener('click', function() {
            if (currentAmount > 1) {
                document.getElementById('current-button').textContent = currentPage - 1;
                currentAmount = parseInt(document.getElementById('amount').value);
                document.getElementById('next-button').style.display = 'block';
                document.getElementById('prev-button').style.display = 'block';
                document.getElementById('end-button').style.display = 'block';
                endButtonPressed = true;
            } else {
                endButtonPressed = false;
            }
        });

        document.getElementById('end-button').addEventListener('click', function() {
            if (currentAmount <= 9) {
                document.getElementById('current-button').textContent = currentPage;
                document.getElementById('next-button').style.display = 'block';
                document.getElementById('prev-button').style.display = 'block';
                document.getElementById('end-button').style.display = 'none';
                endButtonPressed = true;
            } else {
                endButtonPressed = false;
            }
        });

        document.getElementById('next-button').addEventListener('click', function() {
            if (prevButtonPressed) {
                document.getElementById('next-button').style.display = 'none';
                document.getElementById('prev-button').style.display = 'none';
                document.getElementById('current-button').style.display = 'none';
                document.getElementById('next-button').style.display = 'none';
                document.getElementById('prev-button').style.display = 'none';
                document.getElementById('end-button').style.display = 'none';
                document.getElementById('clear-button').style.display = 'none';
                document.getElementById('current-button').textContent = '1';
                document.getElementById('prev-button').textContent = 'Prev';
                document.getElementById('next-button').textContent = 'Next';
                document.getElementById('end-button').textContent = 'End';
                prevButtonPressed = false;
                nextButtonPressed = false;
                endButtonPressed = false;
            } else {
                document.getElementById('current-button').textContent = currentPage;
                currentAmount = parseInt(document.getElementById('amount').value);
                document.getElementById('next-button').style.display = 'block';
                document.getElementById('prev-button').style.display = 'block';
                document.getElementById('end-button').style.display = 'block';
                endButtonPressed = true;
            }
        });
    </script>
</body>
</html>
