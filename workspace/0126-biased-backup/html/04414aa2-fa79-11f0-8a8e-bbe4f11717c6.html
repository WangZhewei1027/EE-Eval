<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .main-content {
            padding: 20px;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        .button {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        .button:hover {
            background-color: #555;
        }

        .footer {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
            clear: both;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Stack</h1>
            <p>Beautiful, polished UI with smooth animations and transitions</p>
        </div>
        <div class="main-content">
            <h2>Stack Example</h2>
            <p>This is an example of a stack data structure.</p>
            <button class="button" id="add-item">Add Item</button>
            <button class="button" id="delete-item">Delete Item</button>
        </div>
        <div class="footer">
            <p>&copy; 2023 Stack Example</p>
        </div>
    </div>

    <script>
        const addItemButton = document.getElementById('add-item');
        const deleteItemButton = document.getElementById('delete-item');

        addItemButton.addEventListener('click', () => {
            // Add item logic goes here
            alert('Item added successfully!');
        });

        deleteItemButton.addEventListener('click', () => {
            // Delete item logic goes here
            alert('Item deleted successfully!');
        });
    </script>
</body>
</html>
