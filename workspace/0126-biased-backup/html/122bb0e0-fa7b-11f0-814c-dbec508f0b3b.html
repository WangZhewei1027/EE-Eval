<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucket Sort</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
            margin: 20px;
        }
        label {
            display: block;
            margin-bottom: 10px;
        }
        input[type="number"] {
            width: 100px;
            margin-bottom: 20px;
        }
        button {
            width: 100px;
            height: 30px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <h1>Bucket Sort</h1>
    <p>Enter the number of elements:</p>
    <input type="number" id="numElements" value="10">
    <button id="sortButton">Sort</button>
    <p id="sortedArray"></p>
    <p id="errorMessage"></p>

    <script>
        const numElements = parseInt(document.getElementById('numElements').value);
        if (isNaN(numElements) || numElements <= 0) {
            document.getElementById('errorMessage').textContent = 'Please enter a positive integer.';
            return;
        }

        const array = Array.from({ length: numElements }, () => Math.floor(Math.random() * 101));
        document.getElementById('sortedArray').textContent = 'Unsorted Array: ';
        for (const element of array) {
            document.getElementById('sortedArray').textContent += element + ' ';
        }
        document.getElementById('sortedArray').textContent += '\n';

        const errorElement = document.getElementById('errorMessage');
        errorElement.textContent = '';

        const sortButton = document.getElementById('sortButton');
        sortButton.addEventListener('click', () => {
            try {
                const sortedArray = bucketSort(array);
                document.getElementById('sortedArray').textContent = 'Sorted Array: ';
                for (const element of sortedArray) {
                    document.getElementById('sortedArray').textContent += element + ' ';
                }
                document.getElementById('sortedArray').textContent += '\n';
                errorElement.textContent = '';
            } catch (error) {
                document.getElementById('errorMessage').textContent = error.message;
            }
        });
    </script>

    function bucketSort(array) {
        const bucket = [];
        for (const element of array) {
            const index = Math.floor(element / 10);
            if (index >= 0) {
                bucket.push(element % 10);
            } else {
                bucket.push(element % 10);
            }
        }
        return bucket;
    }
</body>
</html>
