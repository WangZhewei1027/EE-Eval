<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>K-Means Clustering — Visualized Elegance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

  /* Reset & base */
  *, *::before, *::after {
    box-sizing: border-box;
  }
  body {
    margin: 0; padding: 0;
    height: 100vh;
    background: linear-gradient(135deg, #2c3e50 0%, #4ca1af 100%);
    font-family: 'Poppins', sans-serif;
    color: #f0f4f8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    user-select: none;
    overflow: hidden;
  }
  h1 {
    margin-top: 1.5rem;
    font-weight: 600;
    font-size: 2.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
    color: #e1e8f0;
    text-shadow:
      0 0 8px rgba(255 255 255 / 0.25),
      0 8px 30px rgba(58 188 212 / 0.6);
  }
  p.subtitle {
    margin: 0.25rem 0 1.75rem;
    font-weight: 300;
    font-size: 1.1rem;
    color: #dce6f1cc;
    max-width: 520px;
    text-align: center;
    letter-spacing: 0.05em;
    font-style: italic;
    user-select: none;
  }

  #canvas-container {
    position: relative;
    width: 90vmin;
    height: 90vmin;
    max-width: 700px;
    max-height: 700px;
    border-radius: 1.25rem;
    background:
      radial-gradient(circle at center, #1c2a36 40%, #16232c 98%);
    box-shadow:
      inset 0 0 80px #144559aa,
      0 30px 60px -15px rgba(15 88 122 / 0.5),
      0 15px 30px -15px rgba(10 61 90 / 0.3);
    overflow: hidden;
  }
  canvas {
    width: 100%;
    height: 100%;
    display: block;
    border-radius: 1.25rem;
  }

  /* Controls container */
  #controls {
    margin: 1.5rem 0 3rem;
    display: flex;
    justify-content: center;
    gap: 1.25rem;
  }
  
  button {
    background: linear-gradient(135deg, #26a0da, #314755);
    border: none;
    border-radius: 30px;
    padding: 0.75rem 2.25rem;
    font-size: 1.15rem;
    font-weight: 600;
    color: #d2e6f2;
    letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow:
      0 3px 10px #21a7e0cc,
      0 0 8px 1.5px #27b0f2cc;
    transition:
      background 0.4s ease,
      box-shadow 0.4s ease,
      transform 0.2s ease;
    user-select: none;
  }
  button:hover,
  button:focus {
    background: linear-gradient(135deg, #3196ff, #3f6171);
    box-shadow:
      0 5px 20px #3cb1ffdd,
      0 0 12px 2px #51baffdd;
    transform: translateY(-3px);
    outline: none;
  }

  button:active {
    transform: translateY(0);
    box-shadow:
      0 2px 7px #2498d1cc,
      0 0 6px 1px #279ddacc;
  }

  /* Legend style */
  #legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 3.25rem;
    user-select: none;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-weight: 600;
    font-size: 1rem;
    color: #cde4f4cc;
    letter-spacing: 0.05em;
  }
  .legend-color {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    box-shadow: 0 0 10px 1.5px;
  }
  .centroid-legend {
    border: 2.5px solid #fff;
    box-shadow:
      0 0 14px 2.7px #f3f9ffdd,
      0 0 14px 7px #2ca6e0cc;
  }

  /* Animated subtle stars background */
  #stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
</style>
</head>
<body>

<h1>K-MEANS<br>CLUSTERING</h1>
<p class="subtitle">Visualizing iterative classification of data points with elegant clusters</p>

<section id="canvas-container" aria-label="K-Means Clustering Visualization">
  <canvas id="kmeansCanvas" width="700" height="700"></canvas>
  <canvas id="stars" width="700" height="700" aria-hidden="true"></canvas>
</section>

<div id="legend" aria-label="Color Legend">
  <div class="legend-item"><div class="legend-color" style="background:#e27d60;"></div> Cluster 1</div>
  <div class="legend-item"><div class="legend-color" style="background:#85dcb6;"></div> Cluster 2</div>
  <div class="legend-item"><div class="legend-color" style="background:#fcab64;"></div> Cluster 3</div>
  <div class="legend-item"><div class="legend-color centroid-legend" style="background:#ffffff;"></div> Centroids</div>
</div>

<div id="controls" role="region" aria-label="Controls">
  <button id="simulateBtn" aria-pressed="false" aria-label="Start or pause clustering simulation">Start Simulation</button>
  <button id="resetBtn" aria-label="Reset clustering visualization">Reset</button>
</div>

<script>
(() => {
  // Canvas & contexts
  const container = document.getElementById('canvas-container');
  const canvas = document.getElementById('kmeansCanvas');
  const ctx = canvas.getContext('2d');
  const starsCanvas = document.getElementById('stars');
  const starsCtx = starsCanvas.getContext('2d');

  // Dimensions
  const WIDTH = canvas.width;
  const HEIGHT = canvas.height;

  // Styles and colors for clusters
  const clusterColors = [
    '#e27d60', // coral red-ish
    '#85dcb6', // pastel teal
    '#fcab64', // warm orange
  ];
  const centroidColor = '#ffffff';

  // Data points and centroids
  // Generate 150 points in a smooth random distributed cluster-like way
  const NUM_POINTS = 150;
  const K = 3;

  // Points will be in form: {x, y, clusterIndex}
  let points = [];

  // Centroids will be in form {x,y}
  let centroids = [];

  // Assign initial centroids randomly selected from points
  function initializeCentroids() {
    const chosenIndices = new Set();
    while(chosenIndices.size < K) {
      chosenIndices.add(Math.floor(Math.random() * points.length));
    }
    centroids = Array.from(chosenIndices).map(i => ({x: points[i].x, y: points[i].y}));
  }
  
  // Initialize points spread around 3 clusters for visual allure
  function generatePoints() {
    points = [];
    // Use Gaussian clusters with centers and radii chosen for best visual effect
    // Cluster centers (x,y) roughly spaced well
    const centers = [
      {x: WIDTH * 0.28, y: HEIGHT * 0.33},
      {x: WIDTH * 0.65, y: HEIGHT * 0.45},
      {x: WIDTH * 0.45, y: HEIGHT * 0.75},
    ];
    const radius = WIDTH * 0.1;

    function gaussianRandom(mean = 0, stdev = 1) {
      // using Box-Muller Transform
      let u = 0, v = 0;
      while(u === 0) u = Math.random(); // Converting [0,1) to (0,1)
      while(v === 0) v = Math.random();
      let num = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
      return num * stdev + mean;
    }

    const pointsPerCluster = Math.floor(NUM_POINTS / K);
    for(let i=0; i<K; i++) {
      for(let j=0; j<pointsPerCluster; j++) {
        // Generate points with gaussian around the center
        let x = centers[i].x + gaussianRandom(0, radius * 0.35);
        let y = centers[i].y + gaussianRandom(0, radius * 0.35);
        // Clamp inside boundaries with nice padding
        x = Math.min(WIDTH - 20, Math.max(20, x));
        y = Math.min(HEIGHT - 20, Math.max(20, y));
        points.push({x, y, cluster: -1});
      }
    }

    // If NUM_POINTS isn't divisible by K, add remaining points randomly but near centered clusters
    for(let i=points.length; i < NUM_POINTS; i++) {
      const c = Math.floor(Math.random() * K);
      let x = centers[c].x + gaussianRandom(0, radius * 0.4);
      let y = centers[c].y + gaussianRandom(0, radius * 0.4);
      x = Math.min(WIDTH - 20, Math.max(20, x));
      y = Math.min(HEIGHT - 20, Math.max(20, y));
      points.push({x, y, cluster: -1});
    }
  }


  // Assign points to closest centroid
  function assignClusters() {
    let changed = false;
    points.forEach(p => {
      let minDistSq = Infinity;
      let assignedCluster = -1;
      centroids.forEach((cent, idx) => {
        let dx = p.x - cent.x;
        let dy = p.y - cent.y;
        let distSq = dx*dx + dy*dy;
        if(distSq < minDistSq) {
          minDistSq = distSq;
          assignedCluster = idx;
        }
      });
      if(p.cluster !== assignedCluster) changed = true;
      p.cluster = assignedCluster;
    });
    return changed;
  }

  // Move centroids towards mean of assigned points
  function updateCentroids() {
    let moved = false;
    for(let i=0; i<K; i++){
      const assignedPoints = points.filter(p => p.cluster === i);
      if(assignedPoints.length === 0) continue; // avoid division by zero
      const meanX = assignedPoints.reduce((acc,p) => acc + p.x, 0) / assignedPoints.length;
      const meanY = assignedPoints.reduce((acc,p) => acc + p.y, 0) / assignedPoints.length;
      // Smooth transition toward mean for aesthetics
      let cx = centroids[i].x;
      let cy = centroids[i].y;
      const ease = 0.08;
      const newX = cx + (meanX - cx) * ease;
      const newY = cy + (meanY - cy) * ease;
      if(Math.abs(newX - cx) > 0.1 || Math.abs(newY - cy) > 0.1) moved = true;
      centroids[i].x = newX;
      centroids[i].y = newY;
    }
    return moved;
  }

  // Draw points and centroids on canvas
  function draw() {
    // Clear canvas with slight transparent fill to create smooth motion trails
    ctx.clearRect(0, 0, WIDTH, HEIGHT);

    // Draw cluster backgrounds (subtle blurred glows)
    centroids.forEach((cent, i) => {
      let gradient = ctx.createRadialGradient(cent.x, cent.y, 10, cent.x, cent.y, 120);
      gradient.addColorStop(0, clusterColors[i] + 'bb');
      gradient.addColorStop(1, clusterColors[i] + '10');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.ellipse(cent.x, cent.y + 10, 120, 80, Math.sin(Date.now()/3000 + i)*0.3, 0, 2 * Math.PI);
      ctx.fill();
    });

    // Draw points softly glowing colored by cluster
    points.forEach(p => {
      const color = p.cluster !== -1 ? clusterColors[p.cluster] : '#77777788';
      // Subtle glow effect with shadowBlur
      ctx.shadowColor = color;
      ctx.shadowBlur = 10;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, 2 * Math.PI);
      ctx.fill();

      // Inner bright dot for crispness
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#f0f5f9ee';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2, 0, 2 * Math.PI);
      ctx.fill();
    });

    // Draw centroid markers
    centroids.forEach((cent, i) => {
      // Outer glowing halo
      ctx.shadowColor = '#eef9ffcc';
      ctx.shadowBlur = 18;
      ctx.fillStyle = centroidColor;
      ctx.beginPath();
      ctx.arc(cent.x, cent.y, 11, 0, 2 * Math.PI);
      ctx.fill();

      // Inner solid circle with stroke
      ctx.shadowBlur = 0;
      ctx.fillStyle = centroidColor;
      ctx.beginPath();
      ctx.arc(cent.x, cent.y, 7, 0, 2 * Math.PI);
      ctx.fill();

      ctx.lineWidth = 2.5;
      ctx.strokeStyle = clusterColors[i];
      ctx.stroke();
    });
  }

  // MAIN iterative simulation using requestAnimationFrame
  let running = false;
  let animationId = null;

  function step() {
    // 1) Assign clusters
    assignClusters();
    // 2) Move centroids smoothly toward cluster means
    updateCentroids();
    draw();

    if(running) {
      animationId = requestAnimationFrame(step);
    }
  }

  // INTERACTIVITY: start/pause & reset
  const simulateBtn = document.getElementById('simulateBtn');
  const resetBtn = document.getElementById('resetBtn');

  simulateBtn.addEventListener('click', () => {
    running = !running;
    if(running){
      simulateBtn.textContent = 'Pause Simulation';
      simulateBtn.setAttribute('aria-pressed', 'true');
      step();
    } else {
      simulateBtn.textContent = 'Start Simulation';
      simulateBtn.setAttribute('aria-pressed', 'false');
      if(animationId) cancelAnimationFrame(animationId);
    }
  });

  resetBtn.addEventListener('click', () => {
    running = false;
    simulateBtn.textContent = 'Start Simulation';
    simulateBtn.setAttribute('aria-pressed', 'false');
    if(animationId) cancelAnimationFrame(animationId);

    generatePoints();
    initializeCentroids();
    draw();
  });

  // Starfield subtle background animation behind main canvas

  class Star {
    constructor(width, height){
      this.width = width;
      this.height = height;
      this.reset();
    }
    reset(){
      this.x = Math.random() * this.width;
      this.y = Math.random() * this.height;
      this.radius = Math.random() * 1.2 + 0.2;
      this.alpha = Math.random() * 0.5 + 0.3;
      this.alphaChange = (Math.random() * 0.002 + 0.001) * (Math.random() > 0.5 ? 1 : -1);
    }
    update(){
      this.alpha += this.alphaChange;
      if(this.alpha > 0.8 || this.alpha < 0.3){
        this.alphaChange = -this.alphaChange;
      }
    }
    draw(ctx) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
      ctx.shadowColor = 'rgba(255, 255, 255, 0.7)';
      ctx.shadowBlur = this.radius * 4;
      ctx.fill();
    }
  }

  // Create stars
  let stars = [];
  const NUM_STARS = 120;
  function createStars() {
    stars = [];
    for(let i=0; i<NUM_STARS; i++){
      stars.push(new Star(WIDTH, HEIGHT));
    }
  }

  function animateStars() {
    starsCtx.clearRect(0, 0, WIDTH, HEIGHT);
    stars.forEach(star => {
      star.update();
      star.draw(starsCtx);
    });
    requestAnimationFrame(animateStars);
  }


  // INIT

  // Setup retina scaling for crispness
  function fixDPI() {
    let dpi = window.devicePixelRatio || 1;
    [canvas, starsCanvas].forEach(canv => {
      let style_height = +getComputedStyle(canv).getPropertyValue("height").slice(0,-2);
      let style_width = +getComputedStyle(canv).getPropertyValue("width").slice(0,-2);
      canv.width = style_width * dpi;
      canv.height = style_height * dpi;
      const context = canv.getContext('2d');
      context.scale(dpi, dpi);
    });
  }
  fixDPI();

  generatePoints();
  initializeCentroids();
  draw();
  createStars();
  animateStars();

  // Resize Handling - keep canvases sharp and sized
  window.addEventListener('resize', () => {
    fixDPI();
    draw();
  });
})();
</script>

</body>
</html>
