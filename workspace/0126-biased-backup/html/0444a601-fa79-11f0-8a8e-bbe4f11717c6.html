<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garbage Collection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: all 0.5s ease;
        }

        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #3e8e41;
        }

        .icon {
            width: 30px;
            height: 30px;
            margin: 0 10px;
            border-radius: 50%;
            background-color: #fff;
            border: 2px solid #000;
            transition: transform 0.3s ease;
        }

        .icon:hover {
            transform: scale(1.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Garbage Collection</h1>
        <p>Learn how garbage collection works in JavaScript</p>
        <button class="button" onclick="gcTest()">Test Garbage Collection</button>
        <button class="button" onclick="gcTest()">Test Garbage Collection (Again)</button>
    </div>

    <script>
        function gcTest() {
            // Simulate garbage collection
            const button1 = document.querySelector('.button');
            const button2 = document.querySelector('.button');
            if (button1.classList.contains('button')) {
                button1.style.background_color = '#3e8e41';
            } else {
                button1.style.background_color = '#4CAF50';
            }
            if (button2.classList.contains('button')) {
                button2.style.background_color = '#3e8e41';
            } else {
                button2.style.background_color = '#4CAF50';
            }
            setTimeout(() => {
                button1.style.background_color = '#fff';
                button2.style.background_color = '#fff';
            }, 3000);
        }
    </script>
</body>
</html>
