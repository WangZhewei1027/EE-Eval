<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breadth-First Search Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #output {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Breadth-First Search (BFS) Interactive Demo</h1>
    
    <label for="nodes">Enter number of nodes (0 to 20): </label>
    <input type="number" id="nodes" min="0" max="20" value="5"><br>
    
    <label for="edges">Enter edges (format: u,v; etc.): </label>
    <input type="text" id="edges" value="0,1; 0,2; 1,3; 1,4; 2,5"><br>
    
    <label for="startNode">Start Node (0 to 19): </label>
    <input type="number" id="startNode" min="0" max="19" value="0"><br>
    
    <button id="runBFS">Run BFS</button>
    
    <h3>BFS Output:</h3>
    <div id="output"></div>
    
    <script>
        document.getElementById('runBFS').onclick = function() {
            const numNodes = parseInt(document.getElementById('nodes').value);
            const edgesInput = document.getElementById('edges').value.split(";").map(e => e.trim());
            const startNode = parseInt(document.getElementById('startNode').value);
            const graph = Array.from({length: numNodes}, () => []);
            
            edgesInput.forEach(edge => {
                const [u, v] = edge.split(",").map(Number);
                if (u < numNodes && v < numNodes) {
                    graph[u].push(v);
                    graph[v].push(u); // Assuming undirected graph
                }
            });

            const bfsResult = bfs(graph, startNode);
            document.getElementById('output').innerText = bfsResult.join(' - ');
        };
        
        function bfs(graph, start) {
            const queue = [start];
            const visited = Array(graph.length).fill(false);
            const result = [];
            
            visited[start] = true;

            while (queue.length > 0) {
                const node = queue.shift();
                result.push(node);

                for (const neighbor of graph[node]) {
                    if (!visited[neighbor]) {
                        visited[neighbor] = true;
                        queue.push(neighbor);
                    }
                }
            }
            return result;
        }
    </script>
</body>
</html>
