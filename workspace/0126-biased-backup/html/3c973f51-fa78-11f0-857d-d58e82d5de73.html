<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Binary Search Visualization — Exquisite Design</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Roboto+Slab&display=swap');

  /* Root and Reset */
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #e0e6f1;
    font-family: 'Roboto Slab', serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  h1 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 3.25rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 0 0 1rem;
    color: #a3cef1;
    text-shadow:
      0 0 8px #78a7d0aa,
      0 0 12px #5f8eb8cc;
  }

  h2 {
    font-weight: 400;
    font-size: 1.1rem;
    color: #a3a9b8cc;
    margin: 0 0 3.5rem 0;
    letter-spacing: 0.04em;
  }

  /* Container for search & array */
  #container {
    position: relative;
    width: 90vw;
    max-width: 1000px;
    min-height: 380px;
    background: rgba(32, 53, 67, 0.6);
    border-radius: 1.8rem;
    box-shadow:
      inset 0 0 40px 6px #224858aa,
      0 10px 40px 0 #183445cc;
    padding: 3rem 3.5rem 4rem 3.5rem;
    display: flex;
    flex-direction: column;
  }

  /* Binary array row */
  #array-row {
    display: flex;
    justify-content: center;
    gap: 0.85rem;
    margin-bottom: 3rem;
    perspective: 1100px;
  }

  .array-element {
    background: #1e3c5b;
    box-shadow:
      inset 0 0 3px #a3cef1dd,
      0 0 22px 2px #69a9d833;
    width: 54px;
    height: 72px;
    border-radius: 0.75rem;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 1.9rem;
    line-height: 72px;
    color: #bdd7f7;
    text-shadow:
      0 0 6px #83bff588;
    user-select: none;
    position: relative;
    transition:
      background-color 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      box-shadow 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      transform 0.9s ease;
    cursor: default;
    transform-style: preserve-3d;
  }

  .array-element.low {
    background: #2f6ca3;
    box-shadow:
      0 0 10px 3px #4ea6ecaa;
    color: #c0d6f9;
    transform: translateY(8px) scale(1.05) translateZ(12px);
  }

  .array-element.high {
    background: #2f6ca3;
    box-shadow:
      0 0 14px 4px #4ea6eccc;
    color: #c0d6f9;
    transform: translateY(8px) scale(1.05) translateZ(11px);
  }

  .array-element.mid {
    background: #e1a44d;
    box-shadow:
      0 0 22px 8px #f2c24fee,
      0 0 60px 20px #f2c24fbb;
    color: #3f2d00;
    text-shadow:
      0 0 14px #f2c24fff;
    transform: translateY(-6px) scale(1.2) translateZ(20px);
    z-index: 22;
  }

  .array-element.found {
    background: #4cc552;
    box-shadow:
      0 0 26px 10px #95de95ee,
      0 0 70px 27px #95de95aa;
    color: #1f2f16;
    text-shadow:
      0 0 22px #5ed665cc;
    transform: translateY(-8px) scale(1.25) translateZ(24px) rotateY(15deg);
    z-index: 28;
  }

  /* Search Instructions */
  #info {
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 0.04em;
    font-weight: 600;
    font-size: 1.22rem;
    text-align: center;
    margin-bottom: 2.2rem;
    color: #80a6d6dd;
    user-select: none;
    min-height: 39px;
    transition: color 0.5s ease;
  }

  /* Buttons container */
  #controls {
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 1.8rem;
    pointer-events: auto;
  }

  button {
    background: linear-gradient(145deg, #214264, #2a5980);
    border: none;
    border-radius: 0.95rem;
    padding: 0.85rem 2.3rem;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    letter-spacing: 0.1em;
    font-size: 1.1rem;
    color: #b9d5ff;
    box-shadow:
      0 4px 15px #4885cfaa,
      inset 0 2px 4px #6ba0dbbb;
    cursor: pointer;
    transition:
      box-shadow 0.35s ease,
      background 0.4s ease,
      color 0.3s ease;
    user-select: none;
    text-transform: uppercase;
    filter: drop-shadow(0 0 1px #6794dbcc);
  }
  button:hover {
    background: linear-gradient(145deg, #2a5980, #4b8ee3);
    box-shadow:
      0 5px 25px #6ca6ffdd,
      inset 0 2px 6px #9cc4f9ff;
    color: #e7f1ff;
  }
  button:active {
    filter: none;
    box-shadow:
      inset 0 2px 5px #265078;
    background: linear-gradient(145deg, #1c3757, #214e79);
    color: #bbe1ff;
  }

  /* Footer with author */
  #footer {
    position: fixed;
    bottom: 14px;
    font-family: 'Roboto Slab', serif;
    font-size: 0.88rem;
    color: #4b648baa;
    user-select: none;
    font-style: italic;
    letter-spacing: 0.08em;
  }

  /* SVG animation elements */
  svg#decorative-svg {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    user-select: none;
    width: 100%;
    height: 100%;
  }

  /* Glow Layer */
  #glowLayer circle {
    filter: url(#glow);
    transition: fill 0.5s ease;
  }

</style>
</head>
<body>

<h1>Binary Search</h1>
<h2>An elegant visual demonstration</h2>

<div id="container" role="main" aria-label="Binary search visualization container">

  <div id="array-row" aria-live="polite" aria-atomic="true" aria-relevant="additions removals">
    <!-- Array elements inserted by JS -->
  </div>

  <div id="info" aria-live="polite" aria-atomic="true" aria-relevant="text">
    Click <strong>Start Search</strong> to see the binary search in action.
  </div>

  <div id="controls">
    <button id="startBtn" aria-label="Start binary search animation">Start Search</button>
    <button id="resetBtn" aria-label="Reset the visualization" disabled>Reset</button>
  </div>

  <!-- Decorative SVG for subtle glowing arcs -->
  <svg id="decorative-svg" aria-hidden="true" focusable="false" viewBox="0 0 1000 380" preserveAspectRatio="xMidYMid meet" >
    <defs>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
        <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#87cefa" flood-opacity="0.3"/>
        <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#5b9ad2" flood-opacity="0.2"/>
      </filter>
    </defs>

    <circle cx="500" cy="190" r="160" stroke="#3a5770" stroke-width="1.2" fill="none" />
    <circle cx="500" cy="190" r="135" stroke="#3570a9" stroke-width="1" fill="none" />
    <circle cx="500" cy="190" r="110" stroke="#4295e1" stroke-width="0.7" fill="none" />
    <circle id="glowCircle" cx="500" cy="190" r="90" fill="none" stroke="#67b2ff" stroke-width="1.8" filter="url(#glow)" opacity="0" />
  </svg>

</div>

<div id="footer">Crafted with ♥ by AI Design</div>

<script>
  // Variables and constants
  const arr = [3, 7, 12, 19, 23, 27, 31, 37, 42, 48, 54, 59, 63, 68, 73];
  const target = 42;
  const animationDelay = 1600;

  const arrayRow = document.getElementById('array-row');
  const info = document.getElementById('info');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const glowCircle = document.getElementById('glowCircle');

  let timeoutIds = [];

  // Create visual array elements
  function createArrayElements() {
    arrayRow.innerHTML = '';
    for(let i = 0; i < arr.length; i++) {
      const el = document.createElement('div');
      el.classList.add('array-element');
      el.textContent = arr[i];
      el.dataset.index = i;
      arrayRow.appendChild(el);
    }
  }

  // Reset all styles and state
  function resetVisualization() {
    timeoutIds.forEach(clearTimeout);
    timeoutIds.length = 0;
    glowCircle.style.opacity = '0';
    info.style.color = '#80a6d6dd';
    info.innerHTML = 'Click <strong>Start Search</strong> to see the binary search in action.';
    createArrayElements();
    startBtn.disabled = false;
    resetBtn.disabled = true;
  }

  // Animate the binary search process
  function binarySearchVisual(arr, target) {
    let low = 0;
    let high = arr.length - 1;
    let step = 0;
    const elements = arrayRow.children;

    function markRange(low, high) {
      for(let i = 0; i < elements.length; i++) {
        elements[i].classList.remove('low','high','mid','found');
        if(i < low || i > high) {
          elements[i].style.opacity = '0.25';
          elements[i].style.transform = 'scale(0.8) translateZ(0)';
          elements[i].style.filter = 'grayscale(0.7) brightness(0.65)';
        } else {
          elements[i].style.opacity = '1';
          elements[i].style.filter = 'none';
          elements[i].style.transform = 'scale(1) translateZ(0)';
        }
      }
      if(low <= high) {
        elements[low].classList.add('low');
        elements[high].classList.add('high');
      }
    }

    function highlightMid(mid) {
      for(let i = 0; i < elements.length; i++) {
        elements[i].classList.remove('mid');
      }
      elements[mid].classList.add('mid');
    }

    function highlightFound(idx) {
      elements[idx].classList.remove('mid');
      elements[idx].classList.add('found');
    }

    // Glow circle animation on found element
    function glowAtElement(idx) {
      const el = elements[idx];
      const rect = el.getBoundingClientRect();
      const containerRect = arrayRow.getBoundingClientRect();

      // Coordinates relative to SVG container
      const cx = rect.left + rect.width/2 - containerRect.left;
      const cy = rect.top + rect.height/2 - containerRect.top;

      glowCircle.setAttribute('cx', cx);
      glowCircle.setAttribute('cy', cy);
      glowCircle.style.opacity = '1';
      glowCircle.style.transition = 'opacity 0.7s ease-in-out';
    }

    // Stepwise animation loop
    function stepSearch() {
      if(low > high) {
        info.style.color = '#de6868cc';
        info.innerHTML = `<strong>Target <em>${target}</em> not found in the array.</strong>`;
        startBtn.disabled = false;
        resetBtn.disabled = false;
        glowCircle.style.opacity = '0';
        return;
      }
      markRange(low, high);

      const mid = Math.floor((low + high)/2);
      highlightMid(mid);

      info.style.color = '#a9cdf4';
      info.innerHTML = `Step ${step+1}: Checking middle index <strong>${mid}</strong>, value <strong>${arr[mid]}</strong>...`;

      timeoutIds.push(setTimeout(() => {
        if(arr[mid] === target) {
          highlightFound(mid);
          info.style.color = '#94d78e';
          info.innerHTML = `<strong>Target <em>${target}</em> found at index <em>${mid}</em>!</strong>`;

          glowAtElement(mid);

          startBtn.disabled = false;
          resetBtn.disabled = false;
        } else if(arr[mid] < target) {
          low = mid + 1;
          step++;
          stepSearch();
        } else {
          high = mid - 1;
          step++;
          stepSearch();
        }
      }, animationDelay));
    }

    stepSearch();
  }

  // Initialization
  createArrayElements();

  // Button handlers
  startBtn.addEventListener('click', () => {
    startBtn.disabled = true;
    resetBtn.disabled = true;
    binarySearchVisual(arr, target);
  });

  resetBtn.addEventListener('click', resetVisualization);

</script>

</body>
</html>
