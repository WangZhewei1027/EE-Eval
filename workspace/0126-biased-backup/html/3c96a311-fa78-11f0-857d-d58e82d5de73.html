<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Directed Graph Concept — Visual Illustration</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

  :root {
    --bg-dark: #1e1e2f;
    --graph-node: #60a5fa;
    --graph-arrow: #93c5fd;
    --graph-shadow: rgba(30, 30, 47, 0.7);
    --highlight: #facc15;
    --text-primary: #e0e7ff;
    --text-secondary: #a5b4fc;
    --button-bg: #3b82f6;
    --button-bg-hover: #2563eb;
    --button-shadow: rgba(37, 99, 235, 0.7);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: linear-gradient(135deg, #1e1e2f, #111123);
    color: var(--text-primary);
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    padding: 1.4rem 2.5rem;
    text-align: center;
    border-bottom: 1px solid #323245;
    box-shadow: inset 0 -1px 0 #323245;
  }

  header h1 {
    margin: 0;
    font-weight: 600;
    font-size: 2.8rem;
    letter-spacing: 0.06em;
    background: linear-gradient(90deg, #a5b4fc, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    user-select: none;
  }

  main {
    flex-grow: 1;
    position: relative;
  }

  #graph-canvas {
    width: 100%;
    height: 100%;
    display: block;
    background: radial-gradient(circle at center, #2e2e48, #1e1e2f 80%);
  }

  footer {
    padding: 1rem 2.5rem;
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    background: #111123;
    border-top: 1px solid #323245;
  }

  button {
    padding: 0.6rem 1.6rem;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    color: var(--text-primary);
    background-color: var(--button-bg);
    border: none;
    border-radius: 0.4rem;
    cursor: pointer;
    box-shadow: 0 5px 15px var(--button-shadow);
    transition:
      background-color 0.3s ease,
      box-shadow 0.3s ease,
      transform 0.15s ease;
    user-select: none;
  }

  button:hover,
  button:focus-visible {
    background-color: var(--button-bg-hover);
    box-shadow: 0 8px 22px var(--button-shadow);
    outline: none;
  }

  button:active {
    transform: scale(0.95);
  }

  /* Tooltip styling */

  .tooltip {
    position: absolute;
    padding: 0.4rem 0.8rem;
    background: #222233dd;
    color: var(--text-primary);
    border-radius: 0.4rem;
    font-size: 0.85rem;
    pointer-events: none;
    transform: translate(-50%, -130%);
    user-select: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    white-space: nowrap;
    font-weight: 600;
  }

  .tooltip.visible {
    opacity: 1;
  }

</style>
</head>
<body>
<header>
  <h1>Directed Graph Concept</h1>
</header>
<main>
  <canvas id="graph-canvas" aria-label="Directed graph illustration" role="img"></canvas>
  <div id="tooltip" class="tooltip" role="tooltip" aria-hidden="true"></div>
</main>
<footer>
  <button id="btn-toggle-arrows" aria-pressed="true" aria-label="Toggle arrow animation">Pause Arrows</button>
  <button id="btn-reset" aria-label="Reset graph animation">Reset</button>
</footer>

<script>
(() => {
  const canvas = document.getElementById('graph-canvas');
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('tooltip');
  let width, height, dpr;

  // Nodes and edges definition for a conceptual directed graph
  // Node positions calculated relative to canvas size for responsiveness

  /* 
   Graph nodes:
   id, label, normalized position (x:0-1, y:0-1)
  */
  const nodes = [
    { id: 'A', label: 'A', x: 0.22, y: 0.17 },
    { id: 'B', label: 'B', x: 0.50, y: 0.10 },
    { id: 'C', label: 'C', x: 0.78, y: 0.17 },
    { id: 'D', label: 'D', x: 0.30, y: 0.45 },
    { id: 'E', label: 'E', x: 0.70, y: 0.40 },
    { id: 'F', label: 'F', x: 0.41, y: 0.75 },
    { id: 'G', label: 'G', x: 0.59, y: 0.75 },
    { id: 'H', label: 'H', x: 0.50, y: 0.90 }
  ];

  /*
   Directed edges connecting nodes by id.
   Each edge has a subtle animation parameter to move arrow "pulse".
  */
  const edges = [
    { from: 'A', to: 'B' },
    { from: 'B', to: 'C' },
    { from: 'A', to: 'D' },
    { from: 'B', to: 'E' },
    { from: 'C', to: 'E' },
    { from: 'D', to: 'F' },
    { from: 'E', to: 'G' },
    { from: 'F', to: 'H' },
    { from: 'G', to: 'H' },
    { from: 'E', to: 'D' } // A backward edge emphasizing directionality
  ];

  // Canvas sizing & scaling
  function resize() {
    dpr = window.devicePixelRatio || 1;
    width = window.innerWidth;
    height = window.innerHeight - (header.offsetHeight + footer.offsetHeight);

    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
  }

  // Draw utilities

  const NODE_RADIUS = 24;
  const FONT = '600 18px Poppins, sans-serif';

  function drawNode(node, isHover = false) {
    const cx = node.x * width;
    const cy = node.y * height;

    // Node shadow glow
    ctx.shadowColor = 'rgba(96, 165, 250, 0.6)';
    ctx.shadowBlur = isHover ? 16 : 8;

    // Node circle base
    ctx.beginPath();
    const gradient = ctx.createRadialGradient(cx, cy, NODE_RADIUS * 0.3, cx, cy, NODE_RADIUS);
    gradient.addColorStop(0, '#60a5fa');
    gradient.addColorStop(1, '#1e40af');
    ctx.fillStyle = gradient;
    ctx.strokeStyle = isHover ? '#fde68a' : '#93c5fd';
    ctx.lineWidth = isHover ? 4 : 2;
    ctx.arc(cx, cy, NODE_RADIUS, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Node label
    ctx.fillStyle = 'white';
    ctx.font = FONT;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(node.label, cx, cy);
  }

  // Arrow drawing from point A to B with a smooth curved edge, arrowhead and pulse animation
  function drawDirectedEdge(fromNode, toNode, progress = 0) {
    // Coordinates
    const start = { x: fromNode.x * width, y: fromNode.y * height };
    const end = { x: toNode.x * width, y: toNode.y * height };

    // Control points for Bezier curve for elegance
    // Control points perpendicularly offset by 70px with direction awareness
    const dx = end.x - start.x;
    const dy = end.y - start.y;
    const distance = Math.sqrt(dx * dx + dy * dy);

    const offset = 70;
    const nx = -dy / distance;
    const ny = dx / distance;

    const cp1 = {
      x: start.x + dx * 0.25 + nx * offset,
      y: start.y + dy * 0.25 + ny * offset
    };

    const cp2 = {
      x: start.x + dx * 0.75 + nx * offset,
      y: start.y + dy * 0.75 + ny * offset
    };

    // Setup stroke style
    const gradient = ctx.createLinearGradient(start.x, start.y, end.x, end.y);
    gradient.addColorStop(0, '#93c5fd');
    gradient.addColorStop(1, '#60a5fa');
    ctx.strokeStyle = gradient;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.shadowColor = 'rgba(96, 165, 250, 0.8)';
    ctx.shadowBlur = 8;

    // Draw curve line
    ctx.beginPath();
    ctx.moveTo(start.x, start.y);
    ctx.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, end.x, end.y);
    ctx.stroke();

    // Draw arrowhead
    // Calculate arrowhead position (close to end, offset back by NODE_RADIUS + 5)
    const t = 0.96;
    // Cubic Bezier formula for t
    function cubicBezier(t, p0, p1, p2, p3) {
      const mt = 1 - t;
      return mt * mt * mt * p0 + 3 * mt * mt * t * p1 + 3 * mt * t * t * p2 + t * t * t * p3;
    }
    const ax = cubicBezier(t, start.x, cp1.x, cp2.x, end.x);
    const ay = cubicBezier(t, start.y, cp1.y, cp2.y, end.y);

    // Derivative for angle
    function cubicBezierDeriv(t, p0, p1, p2, p3) {
      const mt = 1 - t;
      return 3 * mt * mt * (p1 - p0) + 6 * mt * t * (p2 - p1) + 3 * t * t * (p3 - p2);
    }
    const dxArrow = cubicBezierDeriv(t, start.x, cp1.x, cp2.x, end.x);
    const dyArrow = cubicBezierDeriv(t, start.y, cp1.y, cp2.y, end.y);
    const angle = Math.atan2(dyArrow, dxArrow);

    // Arrowhead style
    const arrowLength = 14;
    const arrowWidth = 9;

    ctx.fillStyle = 'rgba(96, 165, 250, 0.85)';
    ctx.shadowBlur = 12;

    ctx.save();
    ctx.translate(ax, ay);
    ctx.rotate(angle);

    // Arrowhead triangle path with a smooth shape
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-arrowLength, arrowWidth / 2);
    ctx.quadraticCurveTo(-arrowLength * 0.75, 0, -arrowLength, -arrowWidth / 2);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
    ctx.shadowBlur = 0;

    // Animated pulse traveling on curve - subtle glowing circle
    if (progress !== null) {
      const pulseT = progress % 1;

      const pulseX = cubicBezier(pulseT, start.x, cp1.x, cp2.x, end.x);
      const pulseY = cubicBezier(pulseT, start.y, cp1.y, cp2.y, end.y);

      const pulseRadius = 7 + Math.sin(pulseT * Math.PI * 2) * 2; // pulsate radius

      const pulseGradient = ctx.createRadialGradient(pulseX, pulseY, 0, pulseX, pulseY, pulseRadius);
      pulseGradient.addColorStop(0, 'rgba(250, 250, 100, 0.9)');
      pulseGradient.addColorStop(1, 'rgba(250, 250, 100, 0)');

      ctx.fillStyle = pulseGradient;
      ctx.beginPath();
      ctx.arc(pulseX, pulseY, pulseRadius, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Find node at mouse coordinate for hover
  function findNodeAt(x, y) {
    for (const node of nodes) {
      const nx = node.x * width;
      const ny = node.y * height;
      const dist = Math.hypot(nx - x, ny - y);
      if (dist <= NODE_RADIUS + 8) return node;
    }
    return null;
  }

  // Animation control variables
  let animationId = null;
  let startTime = null;
  let paused = false;
  let arrowAnimationProgress = 0;

  function draw(time = 0) {
    if (!startTime) startTime = time;
    const elapsed = time - startTime;

    ctx.clearRect(0, 0, width, height);

    // Draw all edges with animation progress incremented
    const pulseFrequency = 0.0015; // controls speed
    arrowAnimationProgress += paused ? 0 : pulseFrequency * elapsed;
    arrowAnimationProgress %= 1;

    // Draw edges
    let edgeIndex = 0;
    for (const edge of edges) {
      // Stagger pulses on edges
      const progress = (arrowAnimationProgress + edgeIndex * 0.1) % 1;
      drawDirectedEdge(
        nodes.find(n => n.id === edge.from),
        nodes.find(n => n.id === edge.to),
        paused ? null : progress
      );
      edgeIndex++;
    }

    // Draw nodes above edges
    for (const node of nodes) {
      drawNode(node, hoveredNode === node);
    }

    // Request next frame
    if (!paused) {
      animationId = requestAnimationFrame(draw);
    } else {
      animationId = null;
    }
  }

  // Hover handling
  let hoveredNode = null;

  function onMouseMove(e) {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const node = findNodeAt(x, y);

    if (node !== hoveredNode) {
      hoveredNode = node;
      renderTooltip(node, e.clientX, e.clientY);
      if (!paused && !animationId) {
        animationId = requestAnimationFrame(draw);
      }
    }
  }

  function renderTooltip(node, clientX, clientY) {
    if (!node) {
      tooltip.classList.remove('visible');
      tooltip.setAttribute('aria-hidden', 'true');
      return;
    }
    tooltip.textContent = `Node ${node.label}`;
    tooltip.style.left = clientX + 'px';
    tooltip.style.top = clientY + 'px';
    tooltip.classList.add('visible');
    tooltip.setAttribute('aria-hidden', 'false');
  }

  function onMouseLeave() {
    hoveredNode = null;
    renderTooltip(null);
    if (!paused && !animationId) animationId = requestAnimationFrame(draw);
  }

  // Control buttons
  const btnToggleArrows = document.getElementById('btn-toggle-arrows');
  const btnReset = document.getElementById('btn-reset');
  const header = document.querySelector('header');
  const footer = document.querySelector('footer');

  btnToggleArrows.addEventListener('click', () => {
    paused = !paused;
    btnToggleArrows.textContent = paused ? 'Play Arrows' : 'Pause Arrows';
    btnToggleArrows.setAttribute('aria-pressed', paused ? 'false' : 'true');
    if (!paused && !animationId) {
      startTime = performance.now();
      animationId = requestAnimationFrame(draw);
    }
  });

  btnReset.addEventListener('click', () => {
    arrowAnimationProgress = 0;
    if (!paused && !animationId) {
      startTime = performance.now();
      animationId = requestAnimationFrame(draw);
    }
  });

  // Init & event bindings
  function init() {
    resize();
    window.addEventListener('resize', () => {
      resize();
      if (!paused && !animationId) {
        animationId = requestAnimationFrame(draw);
      } else {
        draw(0);
      }
    });

    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('mouseleave', onMouseLeave);

    draw(0);
  }

  document.fonts.ready.then(init);
})();
</script>
</body>
</html>
