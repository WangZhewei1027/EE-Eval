<!DOCTYPE html>
<html>
<head>
    <title>Interactive Heap Sort</title>
    <style>
        body {
            font-family: monospace;
            margin: 20px;
            line-height: 1.5;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .array-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 20px;
        }
        .array-element {
            border: 1px solid black;
            padding: 10px;
            min-width: 30px;
            text-align: center;
        }
        .highlight {
            background-color: #eee;
        }
        .swapping {
            background-color: #ddd;
        }
        .heap-container {
            margin-top: 30px;
        }
        .heap-level {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-bottom: 20px;
        }
        .heap-node {
            border: 1px solid black;
            padding: 10px;
            min-width: 30px;
            text-align: center;
            position: relative;
        }
        .heap-node.highlight {
            background-color: #eee;
        }
        .heap-node.swapping {
            background-color: #ddd;
        }
        .heap-node::before, .heap-node::after {
            content: '';
            position: absolute;
            top: 100%;
            width: 50%;
            height: 20px;
            border-top: 1px solid black;
        }
        .heap-node::before {
            left: 50%;
            transform: translateX(-100%);
        }
        .heap-node::after {
            left: 50%;
        }
        .heap-node:only-child::before, .heap-node:only-child::after,
        .heap-node:last-child:nth-child(odd)::before,
        .heap-node:last-child:nth-child(odd)::after {
            display: none;
        }
        .explanation {
            margin-top: 20px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
        button, input, select {
            padding: 5px 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interactive Heap Sort</h1>
        
        <div class="controls">
            <button id="generate-btn">Generate New Array</button>
            <input type="number" id="array-size" min="3" max="20" value="10">
            <select id="speed">
                <option value="1000">Slow</option>
                <option value="500" selected>Medium</option>
                <option value="100">Fast</option>
            </select>
            <button id="build-heap-btn">Build Max Heap</button>
            <button id="sort-btn">Sort Array</button>
            <button id="step-btn">Step Back</button>
            <button id="step-btn">Step Forward</button>
            <button id="reset-btn">Reset</button>
        </div>
        
        <div>
            <h3>Current Array:</h3>
            <div id="array-display" class="array-container"></div>
        </div>
        
        <div id="heap-display" class="heap-container">
            <h3>Heap Visualization:</h3>
            <div id="heap-levels"></div>
        </div>
        
        <div class="explanation">
            <h3>Algorithm Steps:</h3>
            <div id="steps-log"></div>
        </div>
    </div>

    <script>
        let array = [];
        let history = [];
        let currentStep = 0;
        let isSorting = false;
        let speed = 500;
        
        // DOM elements
        const arrayDisplay = document.getElementById('array-display');
        const heapLevels = document.getElementById('heap-levels');
        const stepsLog = document.getElementById('steps-log');
        const generateBtn = document.getElementById('generate-btn');
        const buildHeapBtn = document.getElementById('build-heap-btn');
        const sortBtn = document.getElementById('sort-btn');
        const stepBackBtn = document.querySelectorAll('#step-btn')[0];
        const stepForwardBtn = document.querySelectorAll('#step-btn')[1];
        const resetBtn = document.getElementById('reset-btn');
        const arraySizeInput = document.getElementById('array-size');
        const speedSelect = document.getElementById('speed');
        
        // Initialize
        generateRandomArray();
        updateDisplay();
        
        // Event listeners
        generateBtn.addEventListener('click', () => {
            generateRandomArray();
            resetHistory();
            updateDisplay();
        });
        
        buildHeapBtn.addEventListener('click', async () => {
            if (isSorting) return;
            isSorting = true;
            disableControls();
            await buildMaxHeap();
            isSorting = false;
            enableControls();
        });
        
        sortBtn.addEventListener('click', async () => {
            if (isSorting) return;
            isSorting = true;
            disableControls();
            await heapSort();
            isSorting = false;
            enableControls();
        });
        
        stepBackBtn.addEventListener('click', () => {
            if (currentStep > 0) {
                currentStep--;
                array = [...history[currentStep].array];
                updateDisplay();
                updateStepsLog(history[currentStep].action);
            }
        });
        
        stepForwardBtn.addEventListener('click', () => {
            if (currentStep < history.length - 1) {
                currentStep++;
                array = [...history[currentStep].array];
                updateDisplay();
                updateStepsLog(history[currentStep].action);
            }
        });
        
        resetBtn.addEventListener('click', () => {
            currentStep = 0;
            array = [...history[0].array];
            updateDisplay();
            updateStepsLog("Reset to initial state");
        });
        
        arraySizeInput.addEventListener('change', () => {
            generateRandomArray();
            resetHistory();
            updateDisplay();
        });
        
        speedSelect.addEventListener('change', () => {
            speed = parseInt(speedSelect.value);
        });
        
        function disableControls() {
            generateBtn.disabled = true;
            buildHeapBtn.disabled = true;
            sortBtn.disabled = true;
            stepBackBtn.disabled = true;
            stepForwardBtn.disabled = true;
            resetBtn.disabled = true;
            arraySizeInput.disabled = true;
        }
        
        function enableControls() {
            generateBtn.disabled = false;
            buildHeapBtn.disabled = false;
            sortBtn.disabled = false;
            stepBackBtn.disabled = false;
            stepForwardBtn.disabled = false;
            resetBtn.disabled = false;
            arraySizeInput.disabled = false;
        }
        
        function generateRandomArray() {
            const size = parseInt(arraySizeInput.value);
            array = [];
            for (let i = 0; i < size; i++) {
                array.push(Math.floor(Math.random() * 100) + 1);
            }
        }
        
        function resetHistory() {
            history = [{ array: [...array], action: "Initial array" }];
            currentStep = 0;
        }
        
        function saveStep(action) {
            history.push({ array: [...array], action });
            currentStep = history.length - 1;
        }
        
        function updateDisplay() {
            // Update array display
            arrayDisplay.innerHTML = '';
            array.forEach((value, index) => {
                const element = document.createElement('div');
                element.className = 'array-element';
                element.textContent = value;
                arrayDisplay.appendChild(element);
            });
            
            // Update heap display
            updateHeapVisualization();
        }
        
        function updateHeapVisualization() {
            heapLevels.innerHTML = '';
            
            if (array.length === 0) return;
            
            let level = 0;
            let start = 0;
            let end = 0;
            
            while (start < array.length) {
                const levelContainer = document.createElement('div');
                levelContainer.className = 'heap-level';
                
                for (let i = start; i <= end && i < array.length; i++) {
                    const node = document.createElement('div');
                    node.className = 'heap-node';
                    node.textContent = array[i];
                    levelContainer.appendChild(node);
                }
                
                heapLevels.appendChild(levelContainer);
                
                level++;
                start = end + 1;
                end = 2 * end + 2;
            }
        }
        
        function updateStepsLog(action) {
            stepsLog.innerHTML = `<p><strong>Step ${currentStep}:</strong> ${action}</p>`;
        }
        
        async function buildMaxHeap() {
            const n = array.length;
            
            // Start from the last non-leaf node
            for (let i = Math.floor(n / 2) - 1; i >= 0; i--) {
                await heapify(n, i);
            }
            
            saveStep("Max heap built");
            updateStepsLog("Max heap built");
        }
        
        async function heapSort() {
            // First build the max heap
            await buildMaxHeap();
            
            // One by one extract elements
            for (let i = array.length - 1; i > 0; i--) {
                // Move current root to end
                await swap(0, i);
                saveStep(`Swapped root (${array[i]}) with last element (${array[0]})`);
                
                // Call max heapify on the reduced heap
                await heapify(i, 0);
            }
            
            saveStep("Array sorted");
            updateStepsLog("Array sorted");
        }
        
        async function heapify(n, i) {
            let largest = i;
            const left = 2 * i + 1;
            const right = 2 * i + 2;
            
            // Highlight the current node and its children
            highlightNodes([i, left, right]);
            saveStep(`Heapifying node ${i} (value: ${array[i]})`);
            await delay(speed);
            
            // Compare with left child
            if (left < n && array[left] > array[largest]) {
                largest = left;
            }
            
            // Compare with right child
            if (right < n && array[right] > array[largest]) {
                largest = right;
            }
            
            // If largest is not root
            if (largest !== i) {
                await swap(i, largest);
                saveStep(`Swapped ${array[i]} (index ${i}) with ${array[largest]} (index ${largest})`);
                
                // Recursively heapify the affected sub-tree
                await heapify(n, largest);
            }
            
            // Remove highlights
            removeHighlights();
        }
        
        async function swap(i, j) {
            // Highlight elements being swapped
            highlightNodes([i, j], 'swapping');
            await delay(speed);
            
            // Perform the swap
            [array[i], array[j]] = [array[j], array[i]];
            
            // Update display
            updateDisplay();
            await delay(speed);
            
            // Remove highlights
            removeHighlights();
        }
        
        function highlightNodes(indices, className = 'highlight') {
            const arrayElements = document.querySelectorAll('.array-element');
            const heapNodes = document.querySelectorAll('.heap-node');
            
            indices.forEach(index => {
                if (index >= 0 && index < array.length) {
                    arrayElements[index].classList.add(className);
                    heapNodes[index].classList.add(className);
                }
            });
        }
        
        function removeHighlights() {
            document.querySelectorAll('.array-element').forEach(el => {
                el.classList.remove('highlight', 'swapping');
            });
            document.querySelectorAll('.heap-node').forEach(el => {
                el.classList.remove('highlight', 'swapping');
            });
        }
        
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
