<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Means Clustering</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="k-means-container">
            <div class="k-means-box">
                <h2>K-Means Clustering</h2>
                <p>Clustering algorithm that groups similar data points into clusters based on their features.</p>
            </div>
            <div class="k-means-graph">
                <canvas id="k-means-graph"></canvas>
            </div>
            <div class="k-means-button-container">
                <button id="cluster-button">Cluster</button>
                <button id="visualize-button">Visualize</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
