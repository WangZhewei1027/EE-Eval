<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Red-Black Tree</title>
    <style>
        body { font-family: Arial, sans-serif; }
    </style>
</head>
<body>

<h1>Interactive Red-Black Tree</h1>

<label for="value">Enter a value: </label>
<input type="number" id="value" min="1" />
<button onclick="insertValue()">Insert</button>
<button onclick="deleteValue()">Delete</button>
<button onclick="searchValue()">Search</button>
<button onclick="resetTree()">Reset Tree</button>

<h2>Tree Visualization</h2>
<pre id="treeDisplay"></pre>

<h2>Tree Operations</h2>
<button onclick="printTree()">Print Tree</button>
<button onclick="inOrderTraversal()">In-order Traversal</button>
<button onclick="preOrderTraversal()">Pre-order Traversal</button>
<button onclick="postOrderTraversal()">Post-order Traversal</button>

<script>
class Node {
    constructor(value, color) {
        this.value = value;
        this.color = color; // 'R' for Red, 'B' for Black
        this.left = null;
        this.right = null;
        this.parent = null;
    }
}

class RedBlackTree {
    constructor() {
        this.root = null;
    }

    insert(value) {
        // Insert logic with balancing; simplified
        let newNode = new Node(value, 'R');
        // Your insertion logic goes here to maintain red-black properties
        this.root = this._insertNode(this.root, newNode);
        this.insertFixup(newNode);
        this.updateDisplay();
    }

    _insertNode(root, node) {
        if (root === null) return node;
        if (node.value < root.value) {
            root.left = this._insertNode(root.left, node);
            root.left.parent = root;
        } else {
            root.right = this._insertNode(root.right, node);
            root.right.parent = root;
        }
        return root;
    }

    insertFixup(node) {
        // Your fix-up logic after insertion goes here
    }

    delete(value) {
        // Simplified delete method; add balancing logic
        // Your deletion logic goes here to maintain red-black properties
        this.updateDisplay();
    }

    search(value) {
        // Simplified search logic
        return this._searchNode(this.root, value);
    }

    _searchNode(root, value) {
        if (root === null) return false;
        if (value === root.value) return true;
        return value < root.value ? this._searchNode(root.left, value) : this._searchNode(root.right, value);
    }

    reset() {
        this.root = null;
        this.updateDisplay();
    }

    inOrderTraversal() {
        return this._traverse(this.root, 'in-order');
    }

    preOrderTraversal() {
        return this._traverse(this.root, 'pre-order');
    }

    postOrderTraversal() {
        return this._traverse(this.root, 'post-order');
    }

    _traverse(node, type) {
        if (!node) return [];
        switch (type) {
            case 'in-order':
                return [...this._traverse(node.left, type), node.value, ...this._traverse(node.right, type)];
            case 'pre-order':
                return [node.value, ...this._traverse(node.left, type), ...this._traverse(node.right, type)];
            case 'post-order':
                return [...this._traverse(node.left, type), ...this._traverse(node.right, type), node.value];
        }
    }

    updateDisplay() {
        let display = this.visualize(this.root);
        document.getElementById('treeDisplay').innerText = display;
    }

    visualize(node, depth = 0, prefix = "") {
        if (!node) return "";
        let result = prefix + node.value + " (" + node.color + ")\n";
        result += this.visualize(node.left, depth + 1, prefix + "  ");
        result += this.visualize(node.right, depth + 1, prefix + "  ");
        return result;
    }
}

const redBlackTree = new RedBlackTree();

function insertValue() {
    const value = document.getElementById('value').value;
    if (value) {
        redBlackTree.insert(Number(value));
    }
}

function deleteValue() {
    const value = document.getElementById('value').value;
    if (value) {
        redBlackTree.delete(Number(value));
    }
}

function searchValue() {
    const value = document.getElementById('value').value;
    if (value) {
        const result = redBlackTree.search(Number(value));
        alert(result ? "Value found" : "Value not found");
    }
}

function resetTree() {
    redBlackTree.reset();
}

function printTree() {
    alert(redBlackTree.visualize(redBlackTree.root));
}

function inOrderTraversal() {
    alert(redBlackTree.inOrderTraversal().join(", "));
}

function preOrderTraversal() {
    alert(redBlackTree.preOrderTraversal().join(", "));
}

function postOrderTraversal() {
    alert(redBlackTree.postOrderTraversal().join(", "));
}
</script>

</body>
</html>
