<!DOCTYPE html>
<html>
<head>
    <title>Interactive Unit Testing Playground</title>
    <script>
        // Application state
        let testResults = {
            passed: 0,
            failed: 0,
            total: 0,
            testCases: []
        };

        let currentTestSuite = {
            name: '',
            description: '',
            tests: []
        };

        let testHistory = [];
        let assertionLibrary = 'assert';
        // Test functions
        function addTest() {
            const testName = document.getElementById('testName').value;
            const testCode = document.getElementById('testCode').value;
            
            if (testName && testCode) {
                currentTestSuite.tests.push({
                    name: testName,
                    code: testCode,
                    status: 'not run'
                });
                updateTestList();
                document.getElementById('testName').value = '';
                document.getElementById('testCode').value = '';
            }
        }

        function runTests() {
            testResults = {
                passed: 0,
                failed: 0,
                total: currentTestSuite.tests.length,
                testCases: []
            };

            currentTestSuite.tests.forEach((test, index) => {
                try {
                    // This is a simplified evaluation - in real world you'd want better sandboxing
                    const testFunc = new Function('assert', test.code);
                    const customAssert = createAssertionLibrary();
                    testFunc(customAssert);
                    
                    testResults.passed++;
                    test.status = 'passed';
                    testResults.testCases.push({
                        name: test.name,
                        status: 'passed',
                        message: 'Test passed'
                    });
                } catch (e) {
                    testResults.failed++;
                    test.status = 'failed';
                    testResults.testCases.push({
                        name: test.name,
                        status: 'failed',
                        message: e.message
                    });
                }
            });

            testHistory.push({
                suite: currentTestSuite.name,
                timestamp: new Date(),
                results: {...testResults}
            });

            updateResults();
            updateHistory();
            updateTestList();
        }

        function createAssertionLibrary() {
            return {
                equal: (actual, expected, message) => {
                    if (actual != expected) {
                        throw new Error(message || `Expected ${expected} but got ${actual}`);
                    }
                },
                strictEqual: (actual, expected, message) => {
                    if (actual !== expected) {
                        throw new Error(message || `Expected ${expected} but got ${actual}`);
                    }
                },
                truthy: (value, message) => {
                    if (!value) {
                        throw new Error(message || `Expected truthy value but got ${value}`);
                    }
                },
                throws: (fn, errorType, message) => {
                    try {
                        fn();
                        throw new Error(message || 'Expected function to throw but it did not');
                    } catch (e) {
                        if (errorType && !(e instanceof errorType)) {
                            throw new Error(message || `Expected error of type ${errorType.name} but got ${e.constructor.name}`);
                        }
                    }
                }
            };
        }

        function updateTestList() {
            const testList = document.getElementById('testList');
            testList.innerHTML = '';
            
            currentTestSuite.tests.forEach((test, index) => {
                const li = document.createElement('li');
                li.textContent = `${test.name} - ${test.status}`;
                li.style.color = test.status === 'passed' ? 'green' : 
                                 test.status === 'failed' ? 'red' : 'black';
                
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Delete';
                deleteBtn.onclick = () => {
                    currentTestSuite.tests.splice(index, 1);
                    updateTestList();
                };
                
                li.appendChild(deleteBtn);
                testList.appendChild(li);
            });
        }

        function updateResults() {
            document.getElementById('passedCount').textContent = testResults.passed;
            document.getElementById('failedCount').textContent = testResults.failed;
            document.getElementById('totalCount').textContent = testResults.total;
            
            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';
            
            testResults.testCases.forEach(result => {
                const li = document.createElement('li');
                li.textContent = `${result.name}: ${result.status} - ${result.message}`;
                li.style.color = result.status === 'passed' ? 'green' : 'red';
                resultsList.appendChild(li);
            });
        }

        function updateHistory() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            testHistory.forEach((run, index) => {
                const li = document.createElement('li');
                li.textContent = `${run.suite} - ${run.timestamp.toLocaleTimeString()}: ${run.results.passed}/${run.results.total} passed`;
                li.onclick = () => {
                    document.getElementById('historyDetails').textContent = 
                        `Suite: ${run.suite}\n` +
                        `Time: ${run.timestamp.toLocaleString()}\n` +
                        `Passed: ${run.results.passed}\n` +
                        `Failed: ${run.results.failed}\n` +
                        `Total: ${run.results.total}`;
                };
                historyList.appendChild(li);
            });
        }

        function createNewSuite() {
            const suiteName = document.getElementById('suiteName').value;
            const suiteDesc = document.getElementById('suiteDescription').value;
            
            if (suiteName) {
                currentTestSuite = {
                    name: suiteName,
                    description: suiteDesc,
                    tests: []
                };
                document.getElementById('currentSuite').textContent = suiteName;
                document.getElementById('suiteName').value = '';
                document.getElementById('suiteDescription').value = '';
                updateTestList();
            }
        }

        function changeAssertionLibrary() {
            assertionLibrary = document.getElementById('assertionLibrary').value;
        }

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(section => {
                section.style.display = 'none';
            });
            document.getElementById(sectionId).style.display = 'block';
        }

        function loadExample() {
            const example = document.getElementById('exampleSelect').value;
            if (example === 'math') {
                currentTestSuite.tests = [
                    {
                        name: 'Addition test',
                        code: 'assert.equal(2 + 2, 4, "2+2 should be 4");',
                        status: 'not run'
                    },
                    {
                        name: 'Multiplication test',
                        code: 'assert.equal(3 * 3, 9, "3*3 should be 9");',
                        status: 'not run'
                    },
                    {
                        name: 'Division test',
                        code: 'assert.throws(() => { const x = 1/0; }, Error, "Division by zero should throw");',
                        status: 'not run'
                    }
                ];
            } else if (example === 'string') {
                currentTestSuite.tests = [
                    {
                        name: 'String length',
                        code: 'assert.equal("hello".length, 5, "hello should have length 5");',
                        status: 'not run'
                    },
                    {
                        name: 'String concatenation',
                        code: 'assert.equal("a" + "b", "ab", "a + b should be ab");',
                        status: 'not run'
                    }
                ];
            }
            updateTestList();
        }
    </script>
</head>
<body>
    <h1>Unit Testing Playground</h1>
    
    <div>
        <button onclick="showSection('suiteSection')">Test Suite</button>
        <button onclick="showSection('testSection')">Add Tests</button>
        <button onclick="showSection('runSection')">Run Tests</button>
        <button onclick="showSection('historySection')">History</button>
        <button onclick="showSection('examplesSection')">Examples</button>
    </div>
    
    <div id="suiteSection" class="section" style="display: block;">
        <h2>Test Suite Configuration</h2>
        <div>
            <label>Suite Name:</label>
            <input type="text" id="suiteName">
        </div>
        <div>
            <label>Description:</label>
            <textarea id="suiteDescription"></textarea>
        </div>
        <button onclick="createNewSuite()">Create New Suite</button>
        <div>
            <p>Current Suite: <span id="currentSuite">None</span></p>
        </div>
    </div>
    
    <div id="testSection" class="section" style="display: none;">
        <h2>Add Tests</h2>
        <div>
            <label>Test Name:</label>
            <input type="text" id="testName">
        </div>
        <div>
            <label>Test Code:</label>
            <textarea id="testCode" rows="4" cols="50"></textarea>
        </div>
        <button onclick="addTest()">Add Test</button>
        
        <h3>Current Tests</h3>
        <ul id="testList"></ul>
    </div>
    
    <div id="runSection" class="section" style="display: none;">
        <h2>Run Tests</h2>
        <div>
            <label>Assertion Library:</label>
            <select id="assertionLibrary" onchange="changeAssertionLibrary()">
                <option value="assert">Basic Assertions</option>
                <option value="chai">Chai-style</option>
                <option value="jasmine">Jasmine-style</option>
            </select>
        </div>
        <button onclick="runTests()">Run All Tests</button>
        
        <h3>Results</h3>
        <p>Passed: <span id="passedCount">0</span> | 
           Failed: <span id="failedCount">0</span> | 
           Total: <span id="totalCount">0</span></p>
        
        <ul id="resultsList"></ul>
    </div>
    
    <div id="historySection" class="section" style="display: none;">
        <h2>Test History</h2>
        <ul id="historyList"></ul>
        <div id="historyDetails" style="white-space: pre-line; border: 1px solid #ccc; padding: 10px; margin-top: 10px;"></div>
    </div>
    
    <div id="examplesSection" class="section" style="display: none;">
        <h2>Load Examples</h2>
        <select id="exampleSelect">
            <option value="math">Math Operations</option>
            <option value="string">String Operations</option>
        </select>
        <button onclick="loadExample()">Load Example</button>
    </div>
</body>
</html>
