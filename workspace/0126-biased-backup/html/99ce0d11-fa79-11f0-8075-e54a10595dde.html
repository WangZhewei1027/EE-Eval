<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deque Demonstration</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Deque Interactive Demo</h1>
    <div>
        <input type="number" id="valueInput" placeholder="Enter a number" />
        <button onclick="addFront()">Add to Front</button>
        <button onclick="addBack()">Add to Back</button>
        <button onclick="removeFront()">Remove from Front</button>
        <button onclick="removeBack()">Remove from Back</button>
        <button onclick="clearDeque()">Clear Deque</button>
    </div>
    <div>
        <strong>Current Deque:</strong>
        <div id="output">[]</div>
    </div>

    <script>
        class Deque {
            constructor() {
                this.items = [];
            }

            addFront(element) {
                this.items.unshift(element);
            }

            addBack(element) {
                this.items.push(element);
            }

            removeFront() {
                return this.items.shift();
            }

            removeBack() {
                return this.items.pop();
            }

            size() {
                return this.items.length;
            }

            clear() {
                this.items = [];
            }

            toString() {
                return JSON.stringify(this.items);
            }
        }

        const deque = new Deque();

        function updateOutput() {
            document.getElementById("output").innerText = deque.toString();
        }

        function addFront() {
            const value = document.getElementById("valueInput").value;
            if (value) {
                deque.addFront(value);
                updateOutput();
                document.getElementById("valueInput").value = '';
            }
        }

        function addBack() {
            const value = document.getElementById("valueInput").value;
            if (value) {
                deque.addBack(value);
                updateOutput();
                document.getElementById("valueInput").value = '';
            }
        }

        function removeFront() {
            if (deque.size() > 0) {
                deque.removeFront();
                updateOutput();
            }
        }

        function removeBack() {
            if (deque.size() > 0) {
                deque.removeBack();
                updateOutput();
            }
        }

        function clearDeque() {
            deque.clear();
            updateOutput();
        }
    </script>
</body>
</html>
