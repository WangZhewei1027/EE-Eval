<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #ccc;
        }
        .input-field {
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .input-field input {
            padding: 10px;
            font-size: 16px;
        }
        .button-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .button-group button {
            width: 40%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Deadlock Simulator</h1>
        <button id="reset-button">Reset</button>
        <button id="increase-value-button">Increase Value</button>
        <button id="decrease-value-button">Decrease Value</button>
        <button id="add-value-button">Add Value</button>
        <button id="subtract-value-button">Subtract Value</button>
        <button id="save-button">Save</button>
        <button id="load-button">Load</button>
        <div class="button-group">
            <button id="max-value-button">Max Value</button>
            <button id="min-value-button">Min Value</button>
            <button id="random-value-button">Random Value</button>
        </div>
        <div class="input-field">
            <label for="value-input">Value:</label>
            <input type="number" id="value-input" value="0">
        </div>
        <div class="input-field">
            <label for="max-value-input">Max Value:</label>
            <input type="number" id="max-value-input" value="100">
        </div>
        <div class="input-field">
            <label for="min-value-input">Min Value:</label>
            <input type="number" id="min-value-input" value="0">
        </div>
        <div class="input-field">
            <label for="random-value-input">Random Value:</label>
            <input type="number" id="random-value-input" value="0">
        </div>
    </div>

    <script>
        let currentValue = 0;
        let maxValue = 100;
        let minValue = 0;
        let randomValue = 0;

        document.getElementById("reset-button").addEventListener("click", () => {
            currentValue = 0;
            maxValue = 100;
            minValue = 0;
            randomValue = 0;
            document.getElementById("value-input").value = "0";
            document.getElementById("max-value-input").value = "100";
            document.getElementById("min-value-input").value = "0";
            document.getElementById("random-value-input").value = "0";
        });

        document.getElementById("increase-value-button").addEventListener("click", () => {
            currentValue++;
            document.getElementById("value-input").value = currentValue.toString();
        });

        document.getElementById("decrease-value-button").addEventListener("click", () => {
            currentValue--;
            document.getElementById("value-input").value = currentValue.toString();
        });

        document.getElementById("add-value-button").addEventListener("click", () => {
            currentValue += 10;
            document.getElementById("value-input").value = currentValue.toString();
        });

        document.getElementById("subtract-value-button").addEventListener("click", () => {
            currentValue -= 10;
            document.getElementById("value-input").value = currentValue.toString();
        });

        document.getElementById("save-button").addEventListener("click", () => {
            localStorage.setItem("currentValue", currentValue.toString());
            localStorage.setItem("maxValue", maxValue.toString());
            localStorage.setItem("minValue", minValue.toString());
            localStorage.setItem("randomValue", randomValue.toString());
        });

        document.getElementById("load-button").addEventListener("click", () => {
            currentValue = parseInt(localStorage.getItem("currentValue"));
            maxValue = parseInt(localStorage.getItem("maxValue"));
            minValue = parseInt(localStorage.getItem("minValue"));
            randomValue = parseInt(localStorage.getItem("randomValue"));
            document.getElementById("value-input").value = currentValue.toString();
            document.getElementById("max-value-input").value = maxValue.toString();
            document.getElementById("min-value-input").value = minValue.toString();
            document.getElementById("random-value-input").value = randomValue.toString();
        });

        document.getElementById("max-value-button").addEventListener("click", () => {
            maxValue = parseInt(document.getElementById("max-value-input").value);
            document.getElementById("max-value-input").value = maxValue.toString();
        });

        document.getElementById("min-value-button").addEventListener("click", () => {
            minValue = parseInt(document.getElementById("min-value-input").value);
            document.getElementById("min-value-input").value = minValue.toString();
        });

        document.getElementById("random-value-button").addEventListener("click", () => {
            randomValue = Math.floor(Math.random() * 101);
            document.getElementById("random-value-input").value = randomValue.toString();
        });

        document.getElementById("max-value-button").addEventListener("click", () => {
            maxValue = 100;
            document.getElementById("max-value-input").value = maxValue.toString();
        });

        document.getElementById("min-value-button").addEventListener("click", () => {
            minValue = 0;
            document.getElementById("min-value-input").value = minValue.toString();
        });

        document.getElementById("random-value-button").addEventListener("click", () => {
            randomValue = 0;
            document.getElementById("random-value-input").value = randomValue.toString();
        });
    </script>
</body>
</html>
