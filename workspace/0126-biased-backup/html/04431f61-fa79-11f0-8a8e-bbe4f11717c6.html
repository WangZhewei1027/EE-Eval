<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backtracking</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #3e8e41;
        }
        
        .text {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Backtracking</h1>
        <p>Explore this maze and find the shortest path.</p>
        <button id="start-button">Start</button>
        <button id="reset-button" style="display: none;">Reset</button>
    </div>
    
    <script>
        let maze = [
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ']
        ];
        
        let currentRow = 0;
        let currentCol = 0;
        
        function printMaze() {
            let str = '';
            for (let i = 0; i < maze.length; i++) {
                for (let j = 0; j < maze[i].length; j++) {
                    if (maze[i][j] === 'S') {
                        str += 'S ';
                    } else if (maze[i][j] === 'E') {
                        str += 'E ';
                    } else if (maze[i][j] === 'O') {
                        str += 'O ';
                    } else {
                        str += ' ';
                    }
                }
                str += '\n';
            }
            document.getElementById('maze').innerHTML = str;
        }
        
        function findPath() {
            if (currentRow < 0 || currentRow >= maze.length || currentCol < 0 || currentCol >= maze[0].length) {
                return false;
            }
            if (maze[currentRow][currentCol] === 'O') {
                return true;
            }
            maze[currentRow][currentCol] = 'P';
            let directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            for (let [dr, dc] of directions) {
                if (findPath(maze, currentRow + dr, currentCol + dc)) {
                    return true;
                }
            }
            maze[currentRow][currentCol] = ' ';
            return false;
        }
        
        function reset() {
            maze = [
                [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
                [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
                [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
                [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
                [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
                [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
                [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
                [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
                [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ']
            ];
            currentRow = 0;
            currentCol = 0;
        }
        
        function start() {
            printMaze();
            if (findPath()) {
                alert('Congratulations! You found the shortest path!');
            } else {
                alert('Sorry, you didn\'t find the shortest path.');
            }
        }
        
        document.getElementById('start-button').addEventListener('click', start);
        document.getElementById('reset-button').addEventListener('click', reset);
    </script>
</body>
</html>
