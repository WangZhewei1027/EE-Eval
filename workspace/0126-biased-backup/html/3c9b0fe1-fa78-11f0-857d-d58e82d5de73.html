<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Refactoring — Elegance in Code Evolution</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=JetBrains+Mono&display=swap');

  /* Reset and base */
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #141214 0%, #1f1f27 40%, #2e2d39 75%, #45455b 100%);
    color: #e6e6e9;
    font-family: 'Space Grotesk', sans-serif;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Container wrapper */
  .container {
    max-width: 960px;
    width: 90vw;
    padding: 2rem 0 6rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    user-select: none;
  }

  /* Title */
  h1 {
    font-weight: 700;
    font-size: 3.8rem;
    line-height: 1.1;
    letter-spacing: 0.015em;
    color: #8fd3f4;
    text-shadow:
      0 0 8px #08f,
      0 0 20px #0cf,
      0 0 36px #09f,
      0 0 48px #0ff,
      0 0 68px #0ff,
      0 0 80px #0ff;
    margin-bottom: 0.3em;
    transition: color 0.6s ease;
  }
  h1 span.highlight {
    color: #e2fffa;
    filter: drop-shadow(0 0 6px #3ce5d7);
  }

  /* Subtitle */
  .subtitle {
    font-size: 1.25rem;
    font-weight: 400;
    color: #bbd7ea;
    margin-bottom: 3.2rem;
    letter-spacing: 0.02em;
    max-width: 28rem;
    line-height: 1.55;
  }

  /* Abstract visualization frame */
  .visualization {
    position: relative;
    width: 100%;
    max-width: 600px;
    aspect-ratio: 1 / 1;
    background:
      radial-gradient(circle at top left, #03a9f4aa, transparent 40%),
      radial-gradient(circle at bottom right, #00bcd499, transparent 50%),
      linear-gradient(135deg, #1e2433 0%, #12151e 100%);
    border-radius: 2rem;
    box-shadow:
      0 0 40px rgba(3, 169, 244, 0.3),
      inset 0 0 40px #0091ea66,
      0 4px 24px rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: visible;
  }

  /* Code block stylized */
  .codeblock {
    width: 75%;
    height: 75%;
    background: #11131a;
    border-radius: 1.5rem;
    box-shadow: inset 0 0 18px #0ff7ffc7;
    color: #a1eafd;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.02rem;
    line-height: 1.5;
    letter-spacing: 0.04em;
    padding: 2rem 2.4rem;
    overflow-y: auto;
    position: relative;
    user-select: text;
    white-space: pre-wrap;
    transition:
      box-shadow 0.6s ease,
      transform 0.6s ease;
  }

  /* Puff glow animation around code block */
  @keyframes pulseGlow {
    0% {
      box-shadow:
        inset 0 0 18px #0ff7ffc7,
        0 0 40px #00ffffcc;
      transform: scale(1);
    }
    50% {
      box-shadow:
        inset 0 0 26px #00fff0e0,
        0 0 54px #0ff;
      transform: scale(1.02);
    }
    100% {
      box-shadow:
        inset 0 0 18px #0ff7ffc7,
        0 0 40px #00ffffcc;
      transform: scale(1);
    }
  }
  .codeblock.pulse {
    animation: pulseGlow 3.2s infinite ease-in-out;
  }

  /* Interactive buttons container */
  .controls {
    margin-top: 3.8rem;
    display: flex;
    gap: 1.6rem;
  }
  button {
    background: transparent;
    border: 2.4px solid #0ff;
    border-radius: 0.8rem;
    color: #0ff;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    padding: 0.68rem 2.4rem;
    cursor: pointer;
    transition:
      background-color 0.3s ease,
      color 0.3s ease,
      box-shadow 0.35s ease;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  button::before {
    content: "";
    position: absolute;
    top: 110%;
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 200%;
    height: 200%;
    background: linear-gradient(120deg, #00ffffcc 0%, transparent 80%);
    transition: top 0.35s ease;
    filter: blur(15px);
    border-radius: 50%;
    z-index: 0;
  }
  button:hover::before {
    top: -30%;
  }
  button:hover {
    background-color: #0ff3;
    color: #e0f7ff;
    box-shadow: 0 0 12px 3px #00fffccc;
  }
  button:active {
    background-color: #08e8ffbb;
    box-shadow: 0 0 18px 5px #00ffffdd;
  }
  button:focus {
    outline: none;
    box-shadow: 0 0 14px 3px #00ffffdd;
  }

  /* Code line highlights */
  .highlight-line {
    background: linear-gradient(90deg, #127bdc44 0%, #0ffaff44 100%);
    border-radius: 4px;
    transition: background-color 0.45s ease;
  }

  /* Animated morphing shapes behind code block - signifying transformation */
  .shape-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 850px;
    height: 850px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    filter: drop-shadow(0 0 10px #00ffffaa);
    z-index: 0;
  }
  svg.morph-shape {
    width: 100%;
    height: 100%;
    stroke-width: 1.2;
    stroke-linejoin: round;
    stroke-linecap: round;
    fill: none;
    stroke: #00fffccc;
    filter: drop-shadow(0 0 20px #0ff);
  }

  /* Footer text */
  footer {
    position: fixed;
    bottom: 1.8rem;
    width: 100%;
    text-align: center;
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    color: #33ffffaa;
    user-select: none;
    font-family: 'Space Grotesk', sans-serif;
    text-transform: uppercase;
  }

  /* Scrollbar styling for code block */
  .codeblock::-webkit-scrollbar {
    width: 8px;
  }
  .codeblock::-webkit-scrollbar-thumb {
    background: #0ff4;
    border-radius: 4px;
  }
  .codeblock::-webkit-scrollbar-track {
    background: transparent;
  }
  /* Responsive typography */
  @media (max-width: 480px) {
    h1 {
      font-size: 2.8rem;
    }
    .subtitle {
      font-size: 1rem;
      max-width: 90vw;
    }
    .codeblock {
      font-size: 0.9rem;
      padding: 1.6rem 1.8rem;
    }
  }
</style>
</head>
<body>

<div class="container" role="main" aria-label="Refactoring demonstration">
  <h1>Refactoring<br /><span class="highlight">Elegance in Code Evolution</span></h1>
  <p class="subtitle">Transforming tangled codebases into fluid, elegant structures — the art and science of sustainable development.</p>

  <div class="visualization" aria-hidden="true">
    <svg class="shape-glow" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid meet" aria-hidden="true" >
      <path id="morphPath" stroke-opacity="0.65" />
    </svg>
    <pre class="codeblock pulse" id="codeblock" aria-label="Before and after sample code snippet" tabindex="0"></pre>
  </div>

  <div class="controls" aria-label="Code view controls">
    <button id="beforeBtn" aria-pressed="true">Before Refactor</button>
    <button id="afterBtn" aria-pressed="false">After Refactor</button>
  </div>
</div>

<footer>Visualized by refined UI &amp; subtle motion</footer>

<script>
  (() => {
    // Code samples demonstrating refactoring (basic JS example)
    const beforeRefactor = `
// Original tangled code

function processData(data){
  let result = [];
  for(let i=0; i<data.length; i++){
    if(data[i].active){
      let filtered = [];
      for(let j=0; j<data[i].items.length; j++){
        if(data[i].items[j].valid){
          filtered.push(data[i].items[j]);
        }
      }
      if(filtered.length > 0){
        result.push({
          id: data[i].id,
          items: filtered,
          timestamp: new Date().toISOString()
        });
      }
    }
  }
  return result;
}
  `.trim();

    const afterRefactor = `
// Refactored for clarity, performance & maintainability

function processData(data) {
  const filterValidItems = items => items.filter(item => item.valid);

  return data
    .filter(entry => entry.active)
    .map(entry => ({
      id: entry.id,
      items: filterValidItems(entry.items),
      timestamp: new Date().toISOString()
    }))
    .filter(entry => entry.items.length > 0);
}
    `.trim();

    // Elements
    const codeblock = document.getElementById('codeblock');
    const beforeBtn = document.getElementById('beforeBtn');
    const afterBtn = document.getElementById('afterBtn');

    // Initial state
    let showingBefore = true;
    codeblock.textContent = beforeRefactor;

    // Highlight lines for emphasis (simulate complexity -> clarity)
    const highlightLinesBefore = [3,4,5,6,7,8,9,12,13,14];
    const highlightLinesAfter = [5,8];

    function highlightCode(text, linesToHighlight) {
      const lines = text.split('\n');
      return lines.map((line, i) => {
        const n = i + 1;
        if (linesToHighlight.includes(n)) {
          return `<span class="highlight-line">${line}</span>`;
        }
        return line;
      }).join('\n');
    }

    // Set code content with highlights wrapped in spans
    function setCode(isBefore) {
      codeblock.innerHTML = highlightCode(isBefore ? beforeRefactor : afterRefactor, isBefore ? highlightLinesBefore : highlightLinesAfter);
    }

    beforeBtn.addEventListener('click', () => {
      if (!showingBefore) {
        showingBefore = true;
        setCode(true);
        beforeBtn.setAttribute('aria-pressed', 'true');
        afterBtn.setAttribute('aria-pressed', 'false');
        codeblock.classList.add('pulse');
      }
    });
    afterBtn.addEventListener('click', () => {
      if (showingBefore) {
        showingBefore = false;
        setCode(false);
        afterBtn.setAttribute('aria-pressed', 'true');
        beforeBtn.setAttribute('aria-pressed', 'false');
        codeblock.classList.remove('pulse');
      }
    });

    // Initialize code with highlights
    setCode(true);

    // Animated morphing path for background shape (symbolizing transformation)
    const morphPath = document.getElementById('morphPath');

    // Morph shapes - 3 organic blobs
    const blobs = [
      "M445,300Q436,350 409.5,372.5Q383,395 345,390.5Q307,386 278,378.5Q249,371 236,338.5Q223,306 215,270Q207,234 243,210Q279,186 311,177Q343,168 380,190Q417,212 445,300Z",
      "M439,302Q433,354 403,379.5Q373,405 331.5,400.5Q290,396 273,372Q256,348 230.5,335Q205,322 222,276Q239,230 275,198.5Q311,167 361.5,182Q412,197 445.5,254Q479,311 439,302Z",
      "M451,303.5Q469,355 437.5,399Q406,443 360,440.5Q314,438 260,433Q206,428 206,381.5Q206,335 214,296Q222,257 260,236.5Q298,216 358,209Q418,202 438,254Q458,306 451,303.5Z"
    ];

    let morphIndex = 0;
    let morphDirection = 1;

    function animateMorph(t = 0) {
      const duration = 8000;
      let progress = (t % duration) / duration;
      if (morphDirection === -1) progress = 1 - progress;

      // cubic interpolation between blobs[morphIndex] to blobs[nextIndex]
      const nextIndex = (morphIndex + 1) % blobs.length;

      try {
        const pathA = blobs[morphIndex];
        const pathB = blobs[nextIndex];

        // Simple morph function: interpolate by points - approximated by SVG path strings
        // Because paths differ structurally this is a rough approximation using opacity fade:

        morphPath.setAttribute('d', progress < 0.5 ? pathA : pathB);
        morphPath.style.opacity = 0.75 + 0.25 * Math.cos(progress * Math.PI * 2);

      } catch {
        morphPath.setAttribute('d', blobs[0]);
      }

      if (t >= duration) {
        morphIndex = nextIndex;
        morphDirection = 1;
      }
      requestAnimationFrame(animateMorph);
    }
    requestAnimationFrame(animateMorph);

  })();
</script>

</body>
</html>
