<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph (Directed)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .graph-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .graph {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .graph-item {
            background-color: #f7f7f7;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
        }

        .graph-item:hover {
            background-color: #e5e5e5;
        }

        .graph-item::before {
            content: "";
            display: inline-block;
            width: 20px;
            height: 20px;
            background-color: #333;
            border-radius: 50%;
            margin-right: 10px;
        }

        .graph-item::after {
            content: "";
            display: inline-block;
            width: 20px;
            height: 20px;
            background-color: #333;
            border-radius: 50%;
            margin-right: 10px;
            transition: transform 0.2s ease;
        }

        .graph-item::after::before {
            transform: rotate(45deg);
        }

        .graph-item::after::after {
            transform: rotate(135deg);
        }

        .graph-item.selected {
            background-color: #333;
            color: #fff;
            transform: scale(1.1);
        }

        .button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="graph-container">
            <div class="graph">
                <div class="graph-item selected" data-index="0">Item 1</div>
                <div class="graph-item" data-index="1">Item 2</div>
                <div class="graph-item" data-index="2">Item 3</div>
                <div class="graph-item" data-index="3">Item 4</div>
                <div class="graph-item" data-index="4">Item 5</div>
                <div class="graph-item" data-index="5">Item 6</div>
                <div class="graph-item" data-index="6">Item 7</div>
                <div class="graph-item" data-index="7">Item 8</div>
                <div class="graph-item" data-index="8">Item 9</div>
                <div class="graph-item" data-index="9">Item 10</div>
                <div class="graph-item" data-index="10">Item 11</div>
            </div>
        </div>
        <div class="button-container">
            <button class="button" data-index="0">Click me!</button>
            <button class="button" data-index="1">Click me!</button>
        </div>
    </div>

    <script>
        const graph = document.querySelector('.graph');
        const items = document.querySelectorAll('.graph-item');

        items.forEach((item, index) => {
            item.addEventListener('click', () => {
                if (item.classList.contains('selected')) {
                    items.forEach((otherItem) => {
                        otherItem.classList.remove('selected');
                    });
                    item.classList.add('selected');
                }
            });
        });

        const button = document.querySelector('.button');
        button.addEventListener('click', () => {
            console.log('Button clicked!');
        });
    </script>
</body>
</html>
