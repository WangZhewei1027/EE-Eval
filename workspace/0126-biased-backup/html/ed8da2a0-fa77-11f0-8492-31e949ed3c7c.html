<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Search Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 800px;
            background-color: #2b2b3d;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            padding: 40px;
            overflow: hidden;
            position: relative;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            color: #66fcf1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .number {
            width: 50px;
            height: 50px;
            background-color: #f9a69b;
            color: #1e1e2f;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            margin: 0 5px;
            transition: transform 0.3s, background-color 0.3s;
        }

        .highlight {
            background-color: #66fcf1;
            transform: scale(1.2);
        }

        .button {
            background-color: #66fcf1;
            color: #1e1e2f;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
        }

        .button:hover {
            background-color: #5fb8b8;
            transform: scale(1.05);
        }

        .button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .visual {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Linear Search Visualization</h1>
        <div class="search-container">
            <div class="number" id="num0">3</div>
            <div class="number" id="num1">8</div>
            <div class="number" id="num2">1</div>
            <div class="number" id="num3">7</div>
            <div class="number" id="num4">4</div>
            <div class="number" id="num5">5</div>
        </div>
        <button class="button" id="startButton">Start Search</button>
    </div>

    <script>
        const numbers = document.querySelectorAll('.number');
        const target = 7; // Target we are searching for
        let index = 0;

        document.getElementById('startButton').addEventListener('click', function () {
            this.disabled = true; // Disable the button during the search
            linearSearch();
        });

        function linearSearch() {
            if (index < numbers.length) {
                const currentNumber = numbers[index];
                currentNumber.classList.add('highlight');

                setTimeout(() => {
                    if (parseInt(currentNumber.textContent) === target) {
                        alert(`Found ${target} at index ${index}!`);
                    } else {
                        currentNumber.classList.remove('highlight');
                        index++;
                        linearSearch(); // Move to the next number
                    }
                }, 1000);
            } else {
                alert(`${target} not found in the array.`);
                document.getElementById('startButton').disabled = false; // Enable button again
                index = 0; // Reset index for next search
            }
        }
    </script>
</body>

</html>
