<!DOCTYPE html>
<html>
<head>
    <title>Interactive SDLC Explorer</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .phase { border: 1px solid #000; padding: 10px; margin: 10px 0; }
        .hidden { display: none; }
        button, select, input { margin: 5px; }
        .artifact { border-left: 2px solid #000; padding-left: 10px; margin: 5px 0; }
        #workflow { height: 300px; overflow-y: scroll; border: 1px solid #000; padding: 10px; }
    </style>
</head>
<body>
    <h1>Software Development Life Cycle Interactive Explorer</h1>
    
    <div>
        <h2>Select Methodology:</h2>
        <select id="methodology">
            <option value="waterfall">Waterfall</option>
            <option value="agile">Agile</option>
            <option value="spiral">Spiral</option>
            <option value="vmodel">V-Model</option>
        </select>
        <button onclick="initSDLC()">Initialize SDLC</button>
    </div>
    
    <div id="sdlcContainer" class="hidden">
        <h2>Current Phase: <span id="currentPhase"></span></h2>
        <div id="phaseControls">
            <button onclick="previousPhase()">Previous Phase</button>
            <button onclick="nextPhase()">Next Phase</button>
            <button onclick="showAllPhases()">Show All Phases</button>
            <button onclick="customizePhase()">Customize Current Phase</button>
        </div>
        
        <div id="phases"></div>
        
        <div>
            <h3>Workflow Simulation</h3>
            <div id="workflow"></div>
            <button onclick="simulateWork()">Simulate Work</button>
            <button onclick="introduceBug()">Introduce Bug</button>
            <button onclick="resolveBug()">Resolve Bug</button>
            <input type="range" id="teamSize" min="1" max="10" value="3" onchange="updateTeamSize()">
            <span>Team Size: <span id="teamSizeValue">3</span></span>
        </div>
        
        <div>
            <h3>Artifact Generator</h3>
            <select id="artifactType">
                <option value="document">Document</option>
                <option value="diagram">Diagram</option>
                <option value="code">Code</option>
                <option value="test">Test Case</option>
            </select>
            <button onclick="generateArtifact()">Generate Artifact</button>
            <div id="artifacts"></div>
        </div>
        
        <div>
            <h3>Metrics Dashboard</h3>
            <div>
                Progress: <progress id="progress" value="0" max="100"></progress> <span id="progressValue">0%</span>
            </div>
            <div>
                Bugs Found: <span id="bugCount">0</span>
            </div>
            <div>
                Artifacts Created: <span id="artifactCount">0</span>
            </div>
        </div>
    </div>
    
    <script>
        const methodologies = {
            waterfall: ['Requirements', 'Design', 'Implementation', 'Verification', 'Maintenance'],
            agile: ['Sprint Planning', 'Development', 'Testing', 'Review', 'Retrospective'],
            spiral: ['Planning', 'Risk Analysis', 'Engineering', 'Evaluation'],
            vmodel: ['Requirements', 'HL Design', 'LL Design', 'Unit Testing', 'Integration Testing', 'System Testing', 'Acceptance Testing']
        };
        
        let currentMethodology = 'waterfall';
        let currentPhaseIndex = 0;
        let bugs = 0;
        let artifacts = 0;
        let progress = 0;
        let teamSize = 3;
        let phaseCustomizations = {};
        
        function initSDLC() {
            currentMethodology = document.getElementById('methodology').value;
            currentPhaseIndex = 0;
            bugs = 0;
            artifacts = 0;
            progress = 0;
            updateMetrics();
            
            document.getElementById('sdlcContainer').classList.remove('hidden');
            renderPhases();
            updateCurrentPhase();
            logWorkflow(`Initialized ${currentMethodology} SDLC`);
        }
        
        function renderPhases() {
            const phasesContainer = document.getElementById('phases');
            phasesContainer.innerHTML = '';
            
            methodologies[currentMethodology].forEach((phase, index) => {
                const phaseDiv = document.createElement('div');
                phaseDiv.className = 'phase hidden';
                phaseDiv.id = `phase-${index}`;
                
                const phaseTitle = document.createElement('h3');
                phaseTitle.textContent = phase;
                phaseDiv.appendChild(phaseTitle);
                
                const phaseDesc = document.createElement('p');
                phaseDesc.textContent = getPhaseDescription(phase);
                phaseDiv.appendChild(phaseDesc);
                
                const phaseTasks = document.createElement('div');
                phaseTasks.innerHTML = `<p>Tasks: ${getPhaseTasks(phase)}</p>`;
                phaseDiv.appendChild(phaseTasks);
                
                if (phaseCustomizations[phase]) {
                    const customNote = document.createElement('p');
                    customNote.textContent = `Custom: ${phaseCustomizations[phase]}`;
                    phaseDiv.appendChild(customNote);
                }
                
                phasesContainer.appendChild(phaseDiv);
            });
        }
        
        function getPhaseDescription(phase) {
            const descriptions = {
                'Requirements': 'Gather and document system requirements from stakeholders.',
                'Design': 'Create architectural and detailed design specifications.',
                'Implementation': 'Write code according to design specifications.',
                'Verification': 'Test the system against requirements.',
                'Maintenance': 'Fix issues and implement changes post-deployment.',
                'Sprint Planning': 'Plan work for the upcoming sprint with user stories.',
                'Development': 'Implement user stories and features.',
                'Testing': 'Verify functionality through automated and manual tests.',
                'Review': 'Demonstrate completed work to stakeholders.',
                'Retrospective': 'Reflect on the sprint and identify improvements.',
                'Planning': 'Define objectives, alternatives, and constraints.',
                'Risk Analysis': 'Identify and resolve potential risks.',
                'Engineering': 'Develop and test the product.',
                'Evaluation': 'Assess results and plan next iteration.',
                'HL Design': 'Create high-level system architecture.',
                'LL Design': 'Create detailed component designs.',
                'Unit Testing': 'Test individual components.',
                'Integration Testing': 'Test component interactions.',
                'System Testing': 'Test the complete system.',
                'Acceptance Testing': 'Validate system with end users.'
            };
            return descriptions[phase] || 'Phase description not available.';
        }
        
        function getPhaseTasks(phase) {
            const tasks = {
                'Requirements': 'Interviews, Use Cases, SRS',
                'Design': 'Architecture Diagrams, Database Schema',
                'Implementation': 'Coding, Code Reviews',
                'Verification': 'Test Cases, Bug Reports',
                'Maintenance': 'Patches, Updates',
                'Sprint Planning': 'Backlog Grooming, Story Points',
                'Development': 'Pair Programming, CI/CD',
                'Testing': 'Unit Tests, Regression Tests',
                'Review': 'Demo, Feedback Collection',
                'Retrospective': 'Action Items, Process Improvements',
                'Planning': 'Feasibility Study, Cost Estimation',
                'Risk Analysis': 'Risk Matrix, Mitigation Plans',
                'Engineering': 'Prototyping, Coding',
                'Evaluation': 'Customer Feedback, Metrics Analysis',
                'HL Design': 'System Architecture, Interfaces',
                'LL Design': 'Class Diagrams, Algorithm Design',
                'Unit Testing': 'White-box Testing, Code Coverage',
                'Integration Testing': 'API Testing, Interface Testing',
                'System Testing': 'End-to-end Testing, Performance Testing',
                'Acceptance Testing': 'UAT, Sign-off'
            };
            return tasks[phase] || 'Various development tasks';
        }
        
        function updateCurrentPhase() {
            const phases = methodologies[currentMethodology];
            document.getElementById('currentPhase').textContent = phases[currentPhaseIndex];
            
            // Hide all phases
            document.querySelectorAll('.phase').forEach(el => {
                el.classList.add('hidden');
            });
            
            // Show current phase
            document.getElementById(`phase-${currentPhaseIndex}`).classList.remove('hidden');
            
            updateProgress();
        }
        
        function nextPhase() {
            const phases = methodologies[currentMethodology];
            if (currentPhaseIndex < phases.length - 1) {
                currentPhaseIndex++;
                updateCurrentPhase();
                logWorkflow(`Moved to ${phases[currentPhaseIndex]} phase`);
            } else {
                logWorkflow('Project completed!');
            }
        }
        
        function previousPhase() {
            if (currentPhaseIndex > 0) {
                currentPhaseIndex--;
                updateCurrentPhase();
                logWorkflow(`Returned to ${methodologies[currentMethodology][currentPhaseIndex]} phase`);
            }
        }
        
        function showAllPhases() {
            document.querySelectorAll('.phase').forEach(el => {
                el.classList.remove('hidden');
            });
            logWorkflow('Showing all phases simultaneously');
        }
        
        function customizePhase() {
            const currentPhase = methodologies[currentMethodology][currentPhaseIndex];
            const customization = prompt(`Customize ${currentPhase} phase:`);
            if (customization) {
                phaseCustomizations[currentPhase] = customization;
                renderPhases();
                updateCurrentPhase();
                logWorkflow(`Customized ${currentPhase}: ${customization}`);
            }
        }
        
        function simulateWork() {
            const currentPhase = methodologies[currentMethodology][currentPhaseIndex];
            const workItems = [
                `Working on ${getRandomTask(currentPhase)}`,
                `Reviewing ${getRandomArtifact(currentPhase)}`,
                `Collaborating with team on ${currentPhase}`,
                `Documenting ${currentPhase} progress`,
                `Refining ${currentPhase} deliverables`
            ];
            
            const work = workItems[Math.floor(Math.random() * workItems.length)];
            logWorkflow(work);
            
            // Increase progress based on team size
            progress += (5 * teamSize);
            if (progress > 100) progress = 100;
            updateMetrics();
        }
        
        function getRandomTask(phase) {
            const tasks = getPhaseTasks(phase).split(', ');
            return tasks[Math.floor(Math.random() * tasks.length)] || 'task';
        }
        
        function getRandomArtifact(phase) {
            const artifacts = {
                'Requirements': ['SRS', 'Use Cases', 'User Stories'],
                'Design': ['Architecture Diagram', 'Database Schema', 'UI Mockups'],
                'Implementation': ['Source Code', 'API Documentation', 'Build Scripts'],
                'Verification': ['Test Cases', 'Bug Reports', 'Test Plans'],
                'Maintenance': ['Patch Notes', 'Change Requests', 'Hotfixes'],
                'Sprint Planning': ['Backlog', 'Sprint Goals', 'Task Board'],
                'Development': ['Feature Branch', 'Pull Request', 'CI Pipeline'],
                'Testing': ['Automated Tests', 'Test Results', 'Bug Tickets'],
                'Review': ['Demo', 'Feedback Notes', 'Acceptance Criteria'],
                'Retrospective': ['Action Items', 'Process Improvements', 'Team Feedback'],
                'Planning': ['Project Charter', 'Feasibility Study', 'Cost Estimate'],
                'Risk Analysis': ['Risk Matrix', 'Mitigation Plan', 'Contingency Plan'],
                'Engineering': ['Prototype', 'Technical Spec', 'Code Review'],
                'Evaluation': ['Customer Feedback', 'Metrics Report', 'Lessons Learned'],
                'HL Design': ['System Architecture', 'Component Diagram', 'Interface Spec'],
                'LL Design': ['Class Diagram', 'Algorithm Spec', 'Database Design'],
                'Unit Testing': ['Unit Tests', 'Code Coverage', 'Test Stubs'],
                'Integration Testing': ['Integration Tests', 'API Contracts', 'Interface Tests'],
                'System Testing': ['E2E Tests', 'Performance Tests', 'Security Tests'],
                'Acceptance Testing': ['UAT Plan', 'Sign-off Document', 'User Manual']
            };
            
            const phaseArtifacts = artifacts[phase] || ['artifact'];
            return phaseArtifacts[Math.floor(Math.random() * phaseArtifacts.length)];
        }
        
        function introduceBug() {
            bugs++;
            updateMetrics();
            logWorkflow(`Bug introduced! Total bugs: ${bugs}`);
        }
        
        function resolveBug() {
            if (bugs > 0) {
                bugs--;
                updateMetrics();
                logWorkflow(`Bug resolved! Remaining bugs: ${bugs}`);
            }
        }
        
        function updateTeamSize() {
            teamSize = parseInt(document.getElementById('teamSize').value);
            document.getElementById('teamSizeValue').textContent = teamSize;
            logWorkflow(`Team size changed to ${teamSize}`);
        }
        
        function generateArtifact() {
            const type = document.getElementById('artifactType').value;
            const currentPhase = methodologies[currentMethodology][currentPhaseIndex];
            let artifact = '';
            
            switch(type) {
                case 'document':
                    artifact = `${currentPhase} Document v${Math.floor(Math.random() * 5) + 1}.0`;
                    break;
                case 'diagram':
                    artifact = `${currentPhaseTasks(currentPhase).split(', ')[0]} Diagram`;
                    break;
                case 'code':
                    artifact = `${currentPhase.replace(/ /g, '')}Module.java`;
                    break;
                case 'test':
                    artifact = `Test Case for ${getRandomTask(currentPhase)}`;
                    break;
            }
            
            artifacts++;
            updateMetrics();
            
            const artifactDiv = document.createElement('div');
            artifactDiv.className = 'artifact';
            artifactDiv.textContent = artifact;
            document.getElementById('artifacts').appendChild(artifactDiv);
            
            logWorkflow(`Created artifact: ${artifact}`);
        }
        
        function updateMetrics() {
            document.getElementById('bugCount').textContent = bugs;
            document.getElementById('artifactCount').textContent = artifacts;
            
            document.getElementById('progress').value = progress;
            document.getElementById('progressValue').textContent = `${progress}%`;
        }
        
        function updateProgress() {
            const phaseCount = methodologies[currentMethodology].length;
            progress = Math.floor((currentPhaseIndex / phaseCount) * 100);
            updateMetrics();
        }
        
        function logWorkflow(message) {
            const workflow = document.getElementById('workflow');
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            workflow.appendChild(entry);
            workflow.scrollTop = workflow.scrollHeight;
        }
    </script>
</body>
</html>
