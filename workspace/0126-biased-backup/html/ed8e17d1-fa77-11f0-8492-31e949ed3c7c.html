<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Programming Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #74EBD5 0%, #ACB6E5 100%);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            border-radius: 15px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            background-color: white;
            padding: 40px;
            width: 80%;
            max-width: 600px;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5rem;
            color: #5C4D7D;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .button {
            background-color: #5C4D7D;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .button:hover {
            background-color: #7C6C99;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 15px;
            margin-top: 20px;
        }

        .cell {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            background-color: #8E9BFF;
            color: white;
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .cell:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Dynamic Programming Visualization</h1>
        <p>Watch the magic of solving complex problems step-by-step using Dynamic Programming!</p>
        <button class="button" id="startButton">Start Visualization</button>
        <div class="grid" id="grid"></div>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const startButton = document.getElementById('startButton');

        const fibonacci = (n) => {
            const fib = [0, 1];

            for (let i = 2; i <= n; i++) {
                fib[i] = fib[i - 1] + fib[i - 2];
                animateCell(i, fib[i]);
            }
            return fib[n];
        };

        const animateCell = (index, value) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = value;
            gridElement.appendChild(cell);

            // Fade-in animation for each cell
            cell.animate([
                { opacity: 0 },
                { opacity: 1 }
            ], {
                duration: 500,
                fill: 'forwards'
            });
        };

        startButton.onclick = () => {
            gridElement.innerHTML = ''; // Clear previous grid
            fibonacci(10); // Start visualizing the first 10 Fibonacci numbers
        };
    </script>
</body>

</html>
