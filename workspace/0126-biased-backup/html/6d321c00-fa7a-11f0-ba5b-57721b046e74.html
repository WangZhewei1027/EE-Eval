<!DOCTYPE html>
<html>
<head>
    <title>Design Patterns Explorer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
        }
        .pattern-controls {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
        }
        .output {
            margin-top: 10px;
            padding: 10px;
            border: 1px dashed #999;
            min-height: 50px;
        }
        button, select {
            margin: 5px;
        }
        input[type="range"] {
            width: 200px;
        }
        .hidden {
            display: none;
        }
        .tab {
            cursor: pointer;
            padding: 5px 10px;
            border: 1px solid #ccc;
            background: #eee;
            display: inline-block;
        }
        .active-tab {
            background: #fff;
            border-bottom: 1px solid #fff;
        }
        .tab-content {
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: -1px;
        }
    </style>
</head>
<body>
    <h1>Design Patterns Explorer</h1>
    <div class="pattern-selector">
        <h3>Select Pattern Category:</h3>
        <select id="patternCategory">
            <option value="creational">Creational Patterns</option>
            <option value="structural">Structural Patterns</option>
            <option value="behavioral">Behavioral Patterns</option>
        </select>
        <button id="loadPatterns">Load Patterns</button>
    </div>

    <div id="patternsContainer" class="container"></div>

    <div id="patternDetails" class="container hidden">
        <h2 id="currentPatternName"></h2>
        <div id="patternTabs">
            <div class="tab active-tab" data-tab="description">Description</div>
            <div class="tab" data-tab="example">Example</div>
            <div class="tab" data-tab="interactive">Interactive</div>
        </div>
        <div id="tabContents">
            <div id="description" class="tab-content">
                <p id="patternDescription"></p>
            </div>
            <div id="example" class="tab-content hidden">
                <pre id="codeExample"></pre>
            </div>
            <div id="interactive" class="tab-content hidden">
                <div id="interactiveControls"></div>
                <div id="interactiveOutput" class="output"></div>
            </div>
        </div>
    </div>

    <div id="stateTracker" class="container">
        <h3>State History</h3>
        <div id="stateHistory" class="output"></div>
        <button id="undoAction">Undo</button>
        <button id="redoAction">Redo</button>
        <button id="resetAll">Reset All</button>
    </div>

    <script>
        // Pattern data
        const patterns = {
            creational: [
                {
                    name: "Singleton",
                    description: "Ensures a class has only one instance and provides a global point of access to it.",
                    example: "class Singleton {\n  constructor() {}\n  static getInstance() {\n    if (!Singleton.instance) {\n      Singleton.instance = new Singleton();\n    }\n    return Singleton.instance;\n  }\n}",
                    interactive: {
                        controls: '<button id="getInstance">Get Instance</button>',
                        init: function() {
                            document.getElementById('getInstance').addEventListener('click', () => {
                                const instance = Singleton.getInstance();
                                document.getElementById('interactiveOutput').textContent = 
                                    `Singleton instance created at: ${instance.createdAt}`;
                            });
                        }
                    }
                },
                {
                    name: "Factory Method",
                    description: "Defines an interface for creating an object, but lets subclasses decide which class to instantiate.",
                    example: "class ProductFactory {\n  createProduct(type) {\n    switch(type) {\n      case 'A': return new ProductA();\n      case 'B': return new ProductB();\n      default: throw new Error('Unknown product type');\n    }\n  }\n}",
                    interactive: {
                        controls: '<select id="productType"><option value="A">Product A</option><option value="B">Product B</option></select><button id="createProduct">Create Product</button>',
                        init: function() {
                            document.getElementById('createProduct').addEventListener('click', () => {
                                const type = document.getElementById('productType').value;
                                const factory = new ProductFactory();
                                const product = factory.createProduct(type);
                                document.getElementById('interactiveOutput').textContent = 
                                    `Created ${product.getName()} with price $${product.getPrice()}`;
                            });
                        }
                    }
                },
                {
                    name: "Builder",
                    description: "Separates the construction of a complex object from its representation.",
                    example: "class CarBuilder {\n  constructor() { this.car = new Car(); }\n  setEngine(engine) { this.car.engine = engine; return this; }\n  setWheels(wheels) { this.car.wheels = wheels; return this; }\n  build() { return this.car; }\n}",
                    interactive: {
                        controls: '<div><label>Engine: <input type="text" id="engineType" value="V6"></label></div>' +
                                  '<div><label>Wheels: <input type="range" id="wheelCount" min="2" max="6" value="4"></label><span id="wheelValue">4</span></div>' +
                                  '<button id="buildCar">Build Car</button>',
                        init: function() {
                            document.getElementById('wheelCount').addEventListener('input', (e) => {
                                document.getElementById('wheelValue').textContent = e.target.value;
                            });
                            
                            document.getElementById('buildCar').addEventListener('click', () => {
                                const builder = new CarBuilder();
                                const engine = document.getElementById('engineType').value;
                                const wheels = document.getElementById('wheelCount').value;
                                
                                const car = builder
                                    .setEngine(engine)
                                    .setWheels(wheels)
                                    .build();
                                
                                document.getElementById('interactiveOutput').textContent = 
                                    `Built car with ${car.engine} engine and ${car.wheels} wheels`;
                            });
                        }
                    }
                }
            ],
            structural: [
                {
                    name: "Adapter",
                    description: "Allows incompatible interfaces to work together by wrapping an adaptee class with a compatible interface.",
                    example: "class OldSystem {\n  specificRequest() { return 'Old system response'; }\n}\n\nclass Adapter {\n  constructor(oldSystem) { this.oldSystem = oldSystem; }\n  request() { return this.oldSystem.specificRequest(); }\n}",
                    interactive: {
                        controls: '<button id="useOldSystem">Use Old System Directly</button>' +
                                  '<button id="useAdapter">Use Adapter</button>',
                        init: function() {
                            document.getElementById('useOldSystem').addEventListener('click', () => {
                                const oldSystem = new OldSystem();
                                try {
                                    oldSystem.request(); // This will fail
                                } catch (e) {
                                    document.getElementById('interactiveOutput').textContent = 
                                        `Error: ${e.message}`;
                                }
                            });
                            
                            document.getElementById('useAdapter').addEventListener('click', () => {
                                const oldSystem = new OldSystem();
                                const adapter = new Adapter(oldSystem);
                                document.getElementById('interactiveOutput').textContent = 
                                    `Adapter response: ${adapter.request()}`;
                            });
                        }
                    }
                },
                {
                    name: "Composite",
                    description: "Composes objects into tree structures to represent part-whole hierarchies.",
                    example: "class Component {\n  operation() {}\n}\n\nclass Leaf extends Component {\n  operation() { return 'Leaf'; }\n}\n\nclass Composite extends Component {\n  constructor() { super(); this.children = []; }\n  add(c) { this.children.push(c); }\n  operation() { return this.children.map(c => c.operation()).join(', '); }\n}",
                    interactive: {
                        controls: '<button id="addLeaf">Add Leaf</button>' +
                                  '<button id="addComposite">Add Composite</button>' +
                                  '<button id="executeOperation">Execute Operation</button>' +
                                  '<button id="resetComposite">Reset</button>',
                        init: function() {
                            let root = new Composite();
                            
                            document.getElementById('addLeaf').addEventListener('click', () => {
                                root.add(new Leaf());
                                updateCompositeState();
                            });
                            
                            document.getElementById('addComposite').addEventListener('click', () => {
                                const newComposite = new Composite();
                                root.add(newComposite);
                                updateCompositeState();
                            });
                            
                            document.getElementById('executeOperation').addEventListener('click', () => {
                                document.getElementById('interactiveOutput').textContent = 
                                    `Composite operation result: ${root.operation()}`;
                            });
                            
                            document.getElementById('resetComposite').addEventListener('click', () => {
                                root = new Composite();
                                updateCompositeState();
                                document.getElementById('interactiveOutput').textContent = '';
                            });
                            
                            function updateCompositeState() {
                                document.getElementById('interactiveOutput').textContent = 
                                    `Current structure has ${root.children.length} components`;
                            }
                        }
                    }
                },
                {
                    name: "Proxy",
                    description: "Provides a surrogate or placeholder for another object to control access to it.",
                    example: "class RealSubject {\n  request() { return 'RealSubject: Handling request.'; }\n}\n\nclass Proxy {\n  constructor(realSubject) { this.realSubject = realSubject; }\n  request() {\n    if (this.checkAccess()) {\n      return this.realSubject.request();\n    }\n    return 'Proxy: Access denied';\n  }\n  checkAccess() { return Math.random() > 0.5; }\n}",
                    interactive: {
                        controls: '<button id="directAccess">Access Directly</button>' +
                                  '<button id="proxyAccess">Access Through Proxy</button>',
                        init: function() {
                            const realSubject = new RealSubject();
                            
                            document.getElementById('directAccess').addEventListener('click', () => {
                                document.getElementById('interactiveOutput').textContent = 
                                    realSubject.request();
                            });
                            
                            document.getElementById('proxyAccess').addEventListener('click', () => {
                                const proxy = new Proxy(realSubject);
                                document.getElementById('interactiveOutput').textContent = 
                                    proxy.request();
                            });
                        }
                    }
                }
            ],
            behavioral: [
                {
                    name: "Observer",
                    description: "Defines a one-to-many dependency between objects so that when one object changes state, all its dependents are notified and updated automatically.",
                    example: "class Subject {\n  constructor() { this.observers = []; }\n  addObserver(o) { this.observers.push(o); }\n  notify(data) { this.observers.forEach(o => o.update(data)); }\n}\n\nclass Observer {\n  update(data) { console.log('Received:', data); }\n}",
                    interactive: {
                        controls: '<button id="addObserver">Add Observer</button>' +
                                  '<input type="text" id="notificationData" placeholder="Notification data">' +
                                  '<button id="notifyObservers">Notify Observers</button>' +
                                  '<button id="clearObservers">Clear Observers</button>',
                        init: function() {
                            const subject = new Subject();
                            let observerCount = 0;
                            
                            document.getElementById('addObserver').addEventListener('click', () => {
                                observerCount++;
                                const observer = new Observer();
                                observer.update = (data) => {
                                    const output = document.getElementById('interactiveOutput');
                                    output.textContent += `Observer ${observerCount} received: ${data}\n`;
                                };
                                subject.addObserver(observer);
                                document.getElementById('interactiveOutput').textContent += 
                                    `Added observer ${observerCount}\n`;
                            });
                            
                            document.getElementById('notifyObservers').addEventListener('click', () => {
                                const data = document.getElementById('notificationData').value || 'default notification';
                                subject.notify(data);
                            });
                            
                            document.getElementById('clearObservers').addEventListener('click', () => {
                                subject.observers = [];
                                document.getElementById('interactiveOutput').textContent = 
                                    'All observers cleared\n';
                            });
                        }
                    }
                },
                {
                    name: "Strategy",
                    description: "Defines a family of algorithms, encapsulates each one, and makes them interchangeable.",
                    example: "class Context {\n  constructor(strategy) { this.strategy = strategy; }\n  executeStrategy() { return this.strategy.execute(); }\n}\n\nclass ConcreteStrategyA {\n  execute() { return 'Strategy A'; }\n}\n\nclass ConcreteStrategyB {\n  execute() { return 'Strategy B'; }\n}",
                    interactive: {
                        controls: '<select id="strategyType">' +
                                    '<option value="A">Strategy A</option>' +
                                    '<option value="B">Strategy B</option>' +
                                    '<option value="C">Strategy C</option>' +
                                  '</select>' +
                                  '<button id="executeStrategy">Execute Strategy</button>',
                        init: function() {
                            document.getElementById('executeStrategy').addEventListener('click', () => {
                                const type = document.getElementById('strategyType').value;
                                let strategy;
                                
                                switch(type) {
                                    case 'A': strategy = new ConcreteStrategyA(); break;
                                    case 'B': strategy = new ConcreteStrategyB(); break;
                                    case 'C': strategy = new ConcreteStrategyC(); break;
                                }
                                
                                const context = new Context(strategy);
                                document.getElementById('interactiveOutput').textContent = 
                                    context.executeStrategy();
                            });
                        }
                    }
                },
                {
                    name: "State",
                    description: "Allows an object to alter its behavior when its internal state changes.",
                    example: "class Context {\n  constructor(state) { this.state = state; }\n  request() { this.state.handle(this); }\n}\n\nclass State {\n  handle(context) {}\n}\n\nclass ConcreteStateA extends State {\n  handle(context) { context.state = new ConcreteStateB(); }\n}\n\nclass ConcreteStateB extends State {\n  handle(context) { context.state = new ConcreteStateA(); }\n}",
                    interactive: {
                        controls: '<button id="stateRequest">Make Request</button>' +
                                  '<button id="resetState">Reset State</button>',
                        init: function() {
                            const context = new Context(new ConcreteStateA());
                            
                            document.getElementById('stateRequest').addEventListener('click', () => {
                                const beforeState = context.state.constructor.name;
                                context.request();
                                const afterState = context.state.constructor.name;
                                document.getElementById('interactiveOutput').textContent = 
                                    `State changed from ${beforeState} to ${afterState}`;
                            });
                            
                            document.getElementById('resetState').addEventListener('click', () => {
                                context.state = new ConcreteStateA();
                                document.getElementById('interactiveOutput').textContent = 
                                    'State reset to ConcreteStateA';
                            });
                        }
                    }
                }
            ]
        };

        // Implementations of pattern classes
        class Singleton {
            constructor() {
                this.createdAt = new Date().toLocaleTimeString();
            }
            
            static getInstance() {
                if (!Singleton.instance) {
                    Singleton.instance = new Singleton();
                }
                return Singleton.instance;
            }
        }

        class ProductA {
            getName() { return "Product A"; }
            getPrice() { return 100; }
        }

        class ProductB {
            getName() { return "Product B"; }
            getPrice() { return 200; }
        }

        class ProductC {
            getName() { return "Product C"; }
            getPrice() { return 300; }
        }

        class ProductFactory {
            createProduct(type) {
                switch(type) {
                    case 'A': return new ProductA();
                    case 'B': return new ProductB();
                    case 'C': return new ProductC();
                    default: throw new Error('Unknown product type');
                }
            }
        }

        class Car {
            constructor() {
                this.engine = '';
                this.wheels = 0;
            }
        }

        class CarBuilder {
            constructor() {
                this.car = new Car();
            }
            
            setEngine(engine) {
                this.car.engine = engine;
                return this;
            }
            
            setWheels(wheels) {
                this.car.wheels = wheels;
                return this;
            }
            
            build() {
                return this.car;
            }
        }

        class OldSystem {
            specificRequest() {
                return 'Old system response';
            }
        }

        class Adapter {
            constructor(oldSystem) {
                this.oldSystem = oldSystem;
            }
            
            request() {
                return this.oldSystem.specificRequest();
            }
        }

        class Component {
            operation() {}
        }

        class Leaf extends Component {
            operation() {
                return 'Leaf';
            }
        }

        class Composite extends Component {
            constructor() {
                super();
                this.children = [];
            }
            
            add(c) {
                this.children.push(c);
            }
            
            operation() {
                return this.children.map(c => c.operation()).join(', ');
            }
        }

        class RealSubject {
            request() {
                return 'RealSubject: Handling request.';
            }
        }

        class Proxy {
            constructor(realSubject) {
                this.realSubject = realSubject;
            }
            
            request() {
                if (this.checkAccess()) {
                    return this.realSubject.request();
                }
                return 'Proxy: Access denied';
            }
            
            checkAccess() {
                return Math.random() > 0.5;
            }
        }

        class Subject {
            constructor() {
                this.observers = [];
            }
            
            addObserver(o) {
                this.observers.push(o);
            }
            
            notify(data) {
                this.observers.forEach(o => o.update(data));
            }
        }

        class Observer {
            update(data) {}
        }

        class ConcreteStrategyA {
            execute() {
                return 'Strategy A: Simple algorithm';
            }
        }

        class ConcreteStrategyB {
            execute() {
                return 'Strategy B: Complex algorithm';
            }
        }

        class ConcreteStrategyC {
            execute() {
                return 'Strategy C: Optimized algorithm';
            }
        }

        class Context {
            constructor(strategy) {
                this.strategy = strategy;
            }
            
            executeStrategy() {
                return this.strategy.execute();
            }
        }

        class State {
            handle(context) {}
        }

        class ConcreteStateA extends State {
            handle(context) {
                context.state = new ConcreteStateB();
                return 'Handled by State A, switching to State B';
            }
        }

        class ConcreteStateB extends State {
            handle(context) {
                context.state = new ConcreteStateA();
                return 'Handled by State B, switching to State A';
            }
        }

        // State management
        const stateHistory = [];
        let currentStateIndex = -1;

        function saveState() {
            // Truncate any future states if we're not at the end
            if (currentStateIndex < stateHistory.length - 1) {
                stateHistory.length = currentStateIndex + 1;
            }
            
            const state = {
                patternCategory: document.getElementById('patternCategory').value,
                selectedPattern: document.getElementById('currentPatternName')?.textContent || '',
                activeTab: document.querySelector('.tab.active-tab')?.dataset.tab || 'description'
            };
            
            stateHistory.push(state);
            currentStateIndex = stateHistory.length - 1;
            updateStateHistory();
        }

        function updateStateHistory() {
            const historyElement = document.getElementById('stateHistory');
            historyElement.innerHTML = '';
            
            stateHistory.forEach((state, index) => {
                const div = document.createElement('div');
                div.textContent = `${index + 1}. ${state.patternCategory} > ${state.selectedPattern || 'No pattern'} [${state.activeTab}]`;
                if (index === currentStateIndex) {
                    div.style.fontWeight = 'bold';
                }
                historyElement.appendChild(div);
            });
        }

        function loadState(index) {
            if (index < 0 || index >= stateHistory.length) return;
            
            const state = stateHistory[index];
            document.getElementById('patternCategory').value = state.patternCategory;
            
            if (state.selectedPattern) {
                loadPatternList(state.patternCategory);
                
                // Small delay to allow pattern list to load
                setTimeout(() => {
                    const patterns = document.querySelectorAll('.pattern-item');
                    for (let p of patterns) {
                        if (p.textContent === state.selectedPattern) {
                            p.click();
                            break;
                        }
                    }
                    
                    // Another small delay to allow pattern to load
                    setTimeout(() => {
                        const tab = document.querySelector(`.tab[data-tab="${state.activeTab}"]`);
                        if (tab) tab.click();
                    }, 100);
                }, 100);
            }
            
            currentStateIndex = index;
            updateStateHistory();
        }

        // UI Event Handlers
        document.getElementById('loadPatterns').addEventListener('click', () => {
            const category = document.getElementById('patternCategory').value;
            loadPatternList(category);
            saveState();
        });

        function loadPatternList(category) {
            const container = document.getElementById('patternsContainer');
            container.innerHTML = `<h3>${category.charAt(0).toUpperCase() + category.slice(1)} Patterns</h3>`;
            
            patterns[category].forEach(pattern => {
                const div = document.createElement('div');
                div.className = 'pattern-item';
                div.textContent = pattern.name;
                div.style.cursor = 'pointer';
                div.style.margin = '5px 0';
                div.style.padding = '5px';
                div.style.border = '1px solid #ddd';
                
                div.addEventListener('click', () => {
                    showPatternDetails(pattern, category);
                    saveState();
                });
                
                container.appendChild(div);
            });
        }

        function showPatternDetails(pattern, category) {
            document.getElementById('patternDetails').classList.remove('hidden');
            document.getElementById('currentPatternName').textContent = pattern.name;
            document.getElementById('patternDescription').textContent = pattern.description;
            document.getElementById('codeExample').textContent = pattern.example;
            
            // Setup interactive controls
            const interactiveControls = document.getElementById('interactiveControls');
            interactiveControls.innerHTML = pattern.interactive.controls;
            
            // Clear previous output
            document.getElementById('interactiveOutput').textContent = '';
            
            // Initialize interactive functionality
            pattern.interactive.init();
            
            // Show description tab by default
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active-tab');
                if (tab.dataset.tab === 'description') {
                    tab.classList.add('active-tab');
                }
            });
            
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
                if (content.id === 'description') {
                    content.classList.remove('hidden');
                }
            });
        }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
                tab.classList.add('active-tab');
                
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.add('hidden');
                });
                
                document.getElementById(tab.dataset.tab).classList.remove('hidden');
                saveState();
            });
        });

        // State management controls
        document.getElementById('undoAction').addEventListener('click', () => {
            if (currentStateIndex > 0) {
                loadState(currentStateIndex - 1);
            }
        });

        document.getElementById('redoAction').addEventListener('click', () => {
            if (currentStateIndex < stateHistory.length - 1) {
                loadState(currentStateIndex + 1);
            }
        });

        document.getElementById('resetAll').addEventListener('click', () => {
            document.getElementById('patternsContainer').innerHTML = '';
            document.getElementById('patternDetails').classList.add('hidden');
            stateHistory.length = 0;
            currentStateIndex = -1;
            updateStateHistory();
        });

        // Initialize with Creational patterns
        loadPatternList('creational');
    </script>
</body>
</html>
