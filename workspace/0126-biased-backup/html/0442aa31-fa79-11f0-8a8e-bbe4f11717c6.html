<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijkstra's Algorithm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 20px;
        }
        #graph {
            width: 800px;
            height: 600px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            margin: 40px auto;
        }
        #graph canvas {
            border: 1px solid #ddd;
            border-radius: 10px;
        }
        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <div id="graph"></div>
    <div>
        <h1>Dijkstra's Algorithm</h1>
        <p>Find the shortest path between two nodes in a graph using Dijkstra's algorithm.</p>
    </div>
    <div id="controls">
        <button id="start-button">Start</button>
        <button id="reset-button">Reset</button>
    </div>

    <script>
        class Graph {
            constructor(graph) {
                this.graph = graph;
                this.nodes = Object.keys(graph);
                this.edges = Object.keys(graph).map(node => [node, ...graph[node]]);
                this.distances = {};
                this.previousNodes = {};
                this.unvisitedNodes = [...this.nodes];
                this.startNode = this.unvisitedNodes[0];
                this.endNode = this.nodes[graph.length - 1];
                this.distances[this.startNode] = 0;
                this.previousNodes[this.startNode] = null;
            }

            dijkstra() {
                let unvisitedNodes = [...this.unvisitedNodes];
                while (unvisitedNodes.length > 0) {
                    let currentNode = unvisitedNodes.sort((a, b) => this.distances[a] - this.distances[b])[0];
                    unvisitedNodes.splice(unvisitedNodes.indexOf(currentNode), 1);
                    for (let neighbor of this.edges[currentNode]) {
                        let distance = this.distances[currentNode] + this.edges[currentNode].reduce((a, b) => a + b, 0);
                        if (distance < this.distances[neighbor]) {
                            this.distances[neighbor] = distance;
                            this.previousNodes[neighbor] = currentNode;
                        }
                    }
                }
                return this.distances;
            }
        }

        let graph = {
            'A': {'B': 1, 'C': 4, 'D': 7},
            'B': {'A': 1, 'C': 2, 'D': 5},
            'C': {'A': 4, 'B': 2, 'D': 1},
            'D': {'A': 7, 'B': 5, 'C': 1}
        };

        let graphObject = new Graph(graph);
        let distances = graphObject.dijkstra();

        let canvas = document.getElementById('graph');
        let ctx = canvas.getContext('2d');

        for (let node in distances) {
            let x = Math.floor((node - this.startNode) / (this.endNode - this.startNode) * canvas.width);
            let y = Math.floor((node - this.startNode) / (this.endNode - this.startNode) * canvas.height);
            ctx.beginPath();
            ctx.arc(x, y, 10, 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.fillText(node, x + 5, y + 5);
        }

        let startNodeX = Math.floor(distances[this.startNode] / (this.endNode - this.startNode) * canvas.width);
        let startNodeY = Math.floor(distances[this.startNode] / (this.endNode - this.startNode) * canvas.height);
        ctx.beginPath();
        ctx.arc(startNodeX, startNodeY, 20, 0, 2 * Math.PI);
        ctx.fillStyle = 'red';
        ctx.fill();
        ctx.fillStyle = 'black';
        ctx.fillText('Start', startNodeX + 10, startNodeY + 10);

        let endNodeX = Math.floor(distances[this.endNode] / (this.endNode - this.startNode) * canvas.width);
        let endNodeY = Math.floor(distances[this.endNode] / (this.endNode - this.startNode) * canvas.height);
        ctx.beginPath();
        ctx.arc(endNodeX, endNodeY, 20, 0, 2 * Math.PI);
        ctx.fillStyle = 'red';
        ctx.fill();
        ctx.fillStyle = 'black';
        ctx.fillText('End', endNodeX + 10, endNodeY + 10);

        let startButton = document.getElementById('start-button');
        let resetButton = document.getElementById('reset-button');

        startButton.addEventListener('click', () => {
            startNodeX = Math.floor(distances[this.startNode] / (this.endNode - this.startNode) * canvas.width);
            startNodeY = Math.floor(distances[this.startNode] / (this.endNode - this.startNode) * canvas.height);
            endNodeX = Math.floor(distances[this.endNode] / (this.endNode - this.startNode) * canvas.width);
            endNodeY = Math.floor(distances[this.endNode] / (this.endNode - this.startNode) * canvas.height);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let node in distances) {
                let x = Math.floor((node - this.startNode) / (this.endNode - this.startNode) * canvas.width);
                let y = Math.floor((node - this.startNode) / (this.endNode - this.startNode) * canvas.height);
                ctx.beginPath();
                ctx.arc(x, y, 10, 0, 2 * Math.PI);
                ctx.fillStyle = 'red';
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.fillText(node, x + 5, y + 5);
            }
            ctx.beginPath();
            ctx.arc(startNodeX, startNodeY, 20, 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.fillText('Start', startNodeX + 10, startNodeY + 10);
            ctx.beginPath();
            ctx.arc(endNodeX, endNodeY, 20, 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.fillText('End', endNodeX + 10, endNodeY + 10);
        });

        resetButton.addEventListener('click', () => {
            startNodeX = Math.floor(distances[this.startNode] / (this.endNode - this.startNode) * canvas.width);
            startNodeY = Math.floor(distances[this.startNode] / (this.endNode - this.startNode) * canvas.height);
            endNodeX = Math.floor(distances[this.endNode] / (this.endNode - this.startNode) * canvas.width);
            endNodeY = Math.floor(distances[this.endNode] / (this.endNode - this.startNode) * canvas.height);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let node in distances) {
                let x = Math.floor((node - this.startNode) / (this.endNode - this.startNode) * canvas.width);
                let y = Math.floor((node - this.startNode) / (this.endNode - this.startNode) * canvas.height);
                ctx.beginPath();
                ctx.arc(x, y, 10, 0, 2 * Math.PI);
                ctx.fillStyle = 'red';
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.fillText(node, x + 5, y + 5);
            }
            ctx.beginPath();
            ctx.arc(startNodeX, startNodeY, 20, 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.fillText('Start', startNodeX + 10, startNodeY + 10);
            ctx.beginPath();
            ctx.arc(endNodeX, endNodeY, 20, 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.fillText('End', endNodeX + 10, endNodeY + 10);
        });
    </script>
</body>
</html>
