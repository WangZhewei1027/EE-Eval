<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiset</title>
    <style>
        body {
            background-color: #000;
        }
        #multiset {
            width: 800px;
            height: 600px;
            margin: 40px auto;
            border: 1px solid #000;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        #multiset h1 {
            color: #fff;
            margin-bottom: 20px;
        }
        #multiset p {
            margin-bottom: 10px;
        }
        #multiset input, #multiset textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #000;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }
        #multiset button {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            background-color: #000;
            color: #fff;
            cursor: pointer;
        }
        #multiset button:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <div id="multiset">
        <h1>Multiset</h1>
        <p>Example usage of a multiset data structure.</p>
        <p>This is a text field for user input.</p>
        <input type="text" id="input" placeholder="Enter a word">
        <button id="add-word-btn">Add Word</button>
        <button id="remove-word-btn">Remove Word</button>
        <button id="clear-btn">Clear Multiset</button>
        <p id="multiset-words"></p>
    </div>

    <script>
        let words = new Set();
        let currentWord = '';

        function addWord() {
            const word = document.getElementById('input').value;
            if (word) {
                words.add(word);
                document.getElementById('multiset-words').innerHTML += `<p>${word}</p>`;
                document.getElementById('input').value = '';
            }
        }

        function removeWord() {
            const word = document.getElementById('input').value;
            if (word) {
                words.delete(word);
                document.getElementById('multiset-words').innerHTML = words.size;
            }
        }

        function clearMultiset() {
            words.clear();
            document.getElementById('multiset-words').innerHTML = '';
        }

        document.getElementById('add-word-btn').addEventListener('click', addWord);
        document.getElementById('remove-word-btn').addEventListener('click', removeWord);
        document.getElementById('clear-btn').addEventListener('click', clearMultiset);

        document.getElementById('input').addEventListener('input', () => {
            currentWord = document.getElementById('input').value;
        });
    </script>
</body>
</html>
