<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Linked List — Visual Concept</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1: #0f1724;
      --bg2: #071025;
      --glass: rgba(255,255,255,0.04);
      --card: rgba(255,255,255,0.03);
      --muted: rgba(255,255,255,0.6);
      --accent: #6EE7B7;
      --accent-2: #7C5CFF;
      --highlight: #FFD166;
      --soft-shadow: 0 10px 30px rgba(2,6,23,0.6);
      --glass-border: rgba(255,255,255,0.06);
      --node-bg: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    }
    html,body{
      height:100%;
      margin:0;
      font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(124,92,255,0.12), transparent 10%),
                  radial-gradient(900px 500px at 95% 90%, rgba(110,231,183,0.06), transparent 10%),
                  linear-gradient(180deg,var(--bg1),var(--bg2));
      color: #E9F0F6;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow:hidden;
    }

    .app {
      width: min(1180px, 94vw);
      margin: 48px auto;
      padding: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius: 18px;
      box-shadow: var(--soft-shadow);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(8px) saturate(120%);
      position: relative;
      overflow: hidden;
    }

    /* Decorative corner gradients */
    .app::before, .app::after {
      content: "";
      position: absolute;
      width: 380px;
      height: 380px;
      filter: blur(60px);
      pointer-events: none;
      opacity: 0.9;
    }
    .app::before {
      right: -120px;
      top: -160px;
      background: conic-gradient(from 200deg at 50% 50%, rgba(124,92,255,0.18), rgba(110,231,183,0.06));
      transform: rotate(8deg);
    }
    .app::after {
      left: -160px;
      bottom: -120px;
      background: conic-gradient(from 20deg at 50% 50%, rgba(110,231,183,0.06), rgba(255,209,102,0.04));
      transform: rotate(-8deg);
    }

    header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      margin-bottom: 22px;
    }
    .title {
      display:flex;
      gap:18px;
      align-items:center;
    }
    .logo {
      width:64px;
      height:64px;
      border-radius:12px;
      background: linear-gradient(135deg, rgba(124,92,255,0.12), rgba(110,231,183,0.06));
      display:flex;
      align-items:center;
      justify-content:center;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: 0 6px 20px rgba(124,92,255,0.08), inset 0 -6px 18px rgba(0,0,0,0.25);
    }
    .logo svg { width:44px; height:44px; filter: drop-shadow(0 6px 18px rgba(0,0,0,0.45)); }

    h1 {
      font-family: "Playfair Display", serif;
      font-weight:700;
      margin:0;
      font-size:20px;
      letter-spacing: -0.02em;
      color: #FFF;
    }
    p.lead {
      margin:0;
      color: var(--muted);
      font-size:13px;
      max-width:640px;
    }

    .controls {
      display:flex;
      gap:10px;
      align-items:center;
    }
    .btn {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.04);
      color: #fff;
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      font-weight:600;
      font-size:13px;
      display:inline-flex;
      gap:10px;
      align-items:center;
      transition: transform .18s cubic-bezier(.2,.9,.2,1), box-shadow .18s;
      box-shadow: 0 6px 18px rgba(2,6,23,0.45);
      backdrop-filter: blur(6px);
    }
    .btn:active { transform: translateY(1px) scale(.997); }
    .btn.secondary {
      background: linear-gradient(180deg, rgba(255,255,255,0.018), rgba(255,255,255,0.008));
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.03);
      font-weight:600;
    }
    .btn .dot {
      width:10px;height:10px;border-radius:50%;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      box-shadow: 0 6px 16px rgba(124,92,255,0.16), 0 0 10px rgba(110,231,183,0.06);
    }

    /* Visualization area */
    .visual {
      margin-top:18px;
      display:flex;
      gap:20px;
      align-items:center;
      justify-content:center;
      padding:34px;
      border-radius:14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
      border: 1px solid rgba(255,255,255,0.02);
      position:relative;
      min-height:240px;
      overflow:visible;
    }

    .list {
      display:flex;
      align-items:center;
      gap:28px;
      position:relative;
      z-index:2;
    }

    .node {
      width:160px;
      height:72px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 12px 12px 18px;
      box-shadow: 0 8px 28px rgba(2,6,23,0.5), inset 0 -4px 12px rgba(255,255,255,0.01);
      background: var(--node-bg);
      border: 1px solid rgba(255,255,255,0.04);
      transition: transform .36s cubic-bezier(.2,.9,.2,1), box-shadow .28s, filter .28s;
      transform-origin: center;
      position:relative;
      overflow:visible;
      backdrop-filter: blur(6px) saturate(120%);
      opacity:0;
      transform: translateY(22px) scale(.98);
    }
    .node.enter {
      opacity:1;
      transform: translateY(0) scale(1);
    }

    .payload {
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .payload .value {
      font-weight:700;
      font-size:20px;
      letter-spacing:-0.02em;
      color: #fff;
    }
    .payload .meta {
      font-size:12px;
      color:var(--muted);
      display:flex;
      gap:8px;
      align-items:center;
    }

    .ptr {
      width:46px;
      height:46px;
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.02));
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      border: 1px solid rgba(255,255,255,0.04);
      font-size:18px;
      color: var(--muted);
      position:relative;
      transition: background .22s, transform .18s;
    }

    .node.active {
      box-shadow: 0 18px 40px rgba(124,92,255,0.12), 0 4px 30px rgba(2,6,23,0.6);
      transform: translateY(-6px) scale(1.02);
      z-index:5;
      filter: saturate(1.08);
    }

    .node .halo {
      position:absolute;
      inset: -12px;
      border-radius: 18px;
      pointer-events:none;
      background: radial-gradient(ellipse at center, rgba(124,92,255,0.14), rgba(110,231,183,0.03) 30%, transparent 40%);
      opacity:0;
      transform: scale(.98);
      transition: opacity .28s, transform .28s;
      mix-blend-mode: screen;
    }
    .node.active .halo {
      opacity:1;
      transform: scale(1);
    }

    /* Arrow SVG overlay */
    .arrows {
      position:absolute;
      left:0;right:0;top:0;bottom:0;
      pointer-events:none;
      z-index:1;
    }
    svg { overflow:visible; }

    /* Stroke reveal animation control class */
    .reveal {
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: dash 600ms cubic-bezier(.2,.9,.2,1) forwards;
      animation-delay: 0s;
    }
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }

    /* Traversal pulse */
    .pulse {
      position:absolute;
      width:82px;height:82px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.06), transparent 30%);
      pointer-events:none;
      top:0;left:0;
      transform: translate(-8px,-8px) scale(.6);
      opacity:0;
      transition: opacity .28s, transform .5s;
      box-shadow: 0 12px 28px rgba(124,92,255,0.12);
    }
    .node.active .pulse { opacity:1; transform: translate(-8px,-24px) scale(1); }

    /* Footer / league */
    .legend {
      margin-top:22px;
      display:flex;
      gap:18px;
      align-items:center;
      color:var(--muted);
      font-size:13px;
    }

    /* Responsive */
    @media (max-width:920px){
      .list { gap:18px; flex-wrap:wrap; justify-content:center; }
      .node { width:140px; height:64px; padding:10px; }
      .visual { padding:20px; min-height:320px; }
    }
  </style>
</head>
<body>
  <div class="app" role="main" aria-label="Linked List visualization">
    <header>
      <div class="title">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <linearGradient id="g1" x1="0" x2="1">
                <stop offset="0" stop-color="#7C5CFF"/>
                <stop offset="1" stop-color="#6EE7B7"/>
              </linearGradient>
            </defs>
            <rect x="6" y="8" width="52" height="48" rx="10" fill="url(#g1)" opacity="0.18"/>
            <path d="M20 36c4-8 12-8 16 0" stroke="url(#g1)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="22" cy="28" r="3.8" fill="#fff" opacity="0.88"/>
            <circle cx="38" cy="28" r="3.8" fill="#fff" opacity="0.88"/>
          </svg>
        </div>
        <div>
          <h1>Linked List — Conceptual Flow</h1>
          <p class="lead">A minimal, refined exploration of a singly linked list. Observe nodes, pointers, and traversal — thoughtfully animated for clarity and aesthetic delight.</p>
        </div>
      </div>

      <div class="controls" aria-hidden="false">
        <button id="playBtn" class="btn" aria-pressed="false" title="Play / Pause traversal">
          <span class="dot" id="playDot" style="background:linear-gradient(180deg,#FFD166,#FF9F1C);"></span>
          <span id="playLabel">Play</span>
        </button>
        <button id="resetBtn" class="btn secondary" title="Reset visualization">Reset</button>
      </div>
    </header>

    <div class="visual" aria-hidden="false">
      <div class="list" id="list">
        <!-- Nodes will be injected -->
      </div>

      <svg class="arrows" id="arrows" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="9.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="#9AE6B4" opacity="0.95"></path>
          </marker>
          <marker id="arrow-dark" viewBox="0 0 10 10" refX="9.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="#7C5CFF" opacity="0.92"></path>
          </marker>
        </defs>
        <!-- Paths inserted by JS -->
      </svg>
    </div>

    <div class="legend">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:12px;height:12px;border-radius:3px;background:linear-gradient(180deg,#7C5CFF,#6EE7B7);box-shadow:0 6px 16px rgba(124,92,255,0.08)"></div>
        Node (value + pointer)
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <svg width="18" height="10" viewBox="0 0 50 12"><path d="M2 6h40" stroke="#9AE6B4" stroke-width="2.6" stroke-linecap="round"/></svg>
        Link (pointer to next)
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.06)"></div>
        Null / End
      </div>
    </div>
  </div>

  <script>
    (function(){
      /* Data */
      const values = [13, 27, 31, 42, 58, 73];
      const container = document.getElementById('list');
      const svg = document.getElementById('arrows');
      const playBtn = document.getElementById('playBtn');
      const playLabel = document.getElementById('playLabel');
      const playDot = document.getElementById('playDot');
      const resetBtn = document.getElementById('resetBtn');

      let nodes = [];
      let paths = [];
      let idx = -1;
      let running = false;
      let tickTimer = null;

      /* Build nodes */
      function createNode(val, i) {
        const el = document.createElement('div');
        el.className = 'node';
        el.dataset.index = i;

        el.innerHTML = `
          <div class="halo"></div>
          <div class="pulse"></div>
          <div class="payload">
            <div class="value">${val}</div>
            <div class="meta">address: <span style="font-weight:700;color:#DFF8EA">0x${(1000+i).toString(16)}</span></div>
          </div>
          <div class="ptr">${i === values.length -1 ? '⊘' : '→'}</div>
        `;
        return el;
      }

      function mount() {
        container.innerHTML = '';
        svg.querySelectorAll('path.link').forEach(n=>n.remove());
        nodes = [];
        paths = [];
        values.forEach((v,i) => {
          const n = createNode(v,i);
          container.appendChild(n);
          nodes.push(n);
        });

        // Add staggered enter animation
        nodes.forEach((n,i)=>{
          setTimeout(()=> n.classList.add('enter'), 80 * i);
        });

        // Wait for layout then draw arrows
        requestAnimationFrame(drawArrows);
      }

      function drawArrows(){
        // Clear old paths
        svg.innerHTML = svg.querySelector('defs')?.outerHTML || svg.innerHTML;
        const defs = svg.querySelector('defs') || null;
        // compute positions
        const rect = container.getBoundingClientRect();
        nodes.forEach((n,i)=>{
          const r = n.getBoundingClientRect();
          // end of arrow from right edge center of node to left edge center of next node
          if (i < nodes.length -1) {
            const r2 = nodes[i+1].getBoundingClientRect();
            // compute relative positions inside svg coordinates
            const x1 = r.right - rect.left - 8;
            const y1 = r.top - rect.top + r.height/2;
            const x2 = r2.left - rect.left + 8;
            const y2 = r2.top - rect.top + r2.height/2;
            // create elegant curved path
            const dx = Math.min(120, Math.abs(x2 - x1));
            const controlX = x1 + dx * 0.55;
            const controlX2 = x2 - dx * 0.55;
            const d = `M ${x1} ${y1} C ${controlX} ${y1} ${controlX2} ${y2} ${x2} ${y2}`;
            const path = document.createElementNS('http://www.w3.org/2000/svg','path');
            path.setAttribute('d', d);
            path.setAttribute('fill','none');
            path.setAttribute('stroke','#94F0CB');
            path.setAttribute('stroke-width','2.6');
            path.setAttribute('stroke-linecap','round');
            path.setAttribute('class','link');
            path.setAttribute('marker-end','url(#arrow)');
            svg.appendChild(path);
            paths.push(path);
          }
        });
        // subtle path opacity and shadow
        svg.querySelectorAll('path.link').forEach((p,i)=>{
          p.style.opacity = 0.9;
          p.style.filter = 'drop-shadow(0 6px 18px rgba(16,24,40,0.6))';
        });
      }

      /* Traversal state */
      function step() {
        // move to next index in list
        const prev = idx;
        idx = (idx + 1) % nodes.length;
        if (prev >=0) {
          nodes[prev].classList.remove('active');
        }
        nodes[idx].classList.add('active');

        // animate link from prev to current
        if (prev >= 0 && paths[prev]) {
          // clone and re-animate for a bright reveal
          const p = paths[prev];
          p.classList.remove('reveal');
          // force reflow
          void p.getBoundingClientRect();
          p.classList.add('reveal');
          // small color accent
          p.setAttribute('stroke','#7C5CFF');
          p.style.transition = 'stroke 220ms';
          setTimeout(()=> {
            p.setAttribute('stroke','#94F0CB');
          }, 420);
        }

        // subtle pointer emphasis
        nodes.forEach((n,i)=>{
          const ptr = n.querySelector('.ptr');
          if (i === idx) {
            ptr.style.transform = 'translateX(2px) translateY(-2px) scale(1.02)';
            ptr.style.background = 'linear-gradient(180deg, rgba(255,255,255,0.018), rgba(255,255,255,0.005))';
            ptr.style.color = '#E6FFEF';
          } else {
            ptr.style.transform = '';
            ptr.style.background = '';
            ptr.style.color = '';
          }
        });
      }

      function start() {
        if (running) return;
        running = true;
        playBtn.setAttribute('aria-pressed','true');
        playLabel.textContent = 'Pause';
        playDot.style.background = 'linear-gradient(180deg,#6EE7B7,#7C5CFF)';
        // immediate step to show
        step();
        tickTimer = setInterval(()=>{
          step();
        }, 1100);
      }

      function pause() {
        running = false;
        playBtn.setAttribute('aria-pressed','false');
        playLabel.textContent = 'Play';
        playDot.style.background = 'linear-gradient(180deg,#FFD166,#FF9F1C)';
        clearInterval(tickTimer);
        tickTimer = null;
      }

      function reset() {
        pause();
        idx = -1;
        nodes.forEach(n=>{
          n.classList.remove('active');
          const p = n.querySelector('.ptr');
          if (p) { p.style.transform=''; p.style.background=''; p.style.color=''; }
        });
        // re-run an elegant entrance
        nodes.forEach((n,i)=>{
          n.classList.remove('enter');
          void n.offsetWidth;
          setTimeout(()=> n.classList.add('enter'), 40 * i);
        });

        // clear path reveal animations
        paths.forEach(p=>{
          p.classList.remove('reveal');
        });
      }

      /* Event bindings */
      playBtn.addEventListener('click', ()=>{
        if (running) pause(); else start();
      });
      resetBtn.addEventListener('click', reset);

      // Recalculate on resize (throttled)
      let rt;
      window.addEventListener('resize', ()=> {
        clearTimeout(rt);
        rt = setTimeout(drawArrows, 120);
      });

      // Setup & initial mount
      mount();

      // gentle auto-start after a short pause for cinematic effect (not too interactive)
      setTimeout(()=> {
        // play briefly once for demonstration then pause automatically
        start();
        setTimeout(()=> {
          pause();
        }, 3800);
      }, 900);

      // ensure SVG adjusts if fonts/metrics change
      setTimeout(drawArrows, 1200);
    })();
  </script>
</body>
</html>
