<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Tree Visualization</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: #2C3E50;
            color: #ECF0F1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 48px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        .btn {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background-color: #E74C3C;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #C0392B;
        }
        .b-tree {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .node {
            width: 60px;
            height: 60px;
            background: #3498DB;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            margin: 10px;
            transition: transform 0.3s;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .node:hover {
            transform: scale(1.1);
        }
        .connection {
            width: 2px;
            height: 50px;
            background: #BDC3C7;
            position: relative;
        }
        .horizontal-line {
            width: 100%;
            height: 2px;
            background: #BDC3C7;
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>
    <h1>B-Tree Visualization</h1>
    <div class="b-tree">
        <div class="node">10</div>
        <div class="connection"></div>
        <div class="node">20</div>
        <div class="connection"></div>
        <div class="node">30</div>
        <div class="connection"></div>
        <div class="node">40</div>
        <div class="horizontal-line"></div>
        <div class="node">50</div>
    </div>
    <button class="btn" onclick="showInformation()">Learn More</button>
    <script>
        function showInformation() {
            alert("This is a simple visualization of a B-Tree.\n\nA B-Tree is a self-balancing tree data structure that maintains sorted data and allows searches, sequential access, insertions, and deletions in logarithmic time. It is commonly used in databases and filesystems.");
        }
    </script>
</body>
</html>
