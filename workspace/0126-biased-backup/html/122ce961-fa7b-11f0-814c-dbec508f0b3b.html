<!DOCTYPE html>
<html>
<head>
    <title>Monitor</title>
    <style>
        body {
            background-color: #000;
        }
        input[type="text"], input[type="number"], input[type="datetime-local"], select, textarea {
            padding: 0.5em;
            margin: 0.25em 0;
            border: 1px solid #ccc;
            border-radius: 0.25em;
            width: 100%;
        }
        button {
            padding: 0.5em 1em;
            margin: 0.25em 0;
            border: none;
            border-radius: 0.25em;
            background-color: #444;
            color: #fff;
            cursor: pointer;
        }
        button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <h1>Monitor</h1>
    <div id="controls">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter name">
        <button id="add-button">Add</button>
        <label for="age">Age:</label>
        <input type="number" id="age" placeholder="Enter age">
        <button id="update-button">Update</button>
        <label for="city">City:</label>
        <input type="text" id="city" placeholder="Enter city">
        <button id="delete-button">Delete</button>
    </div>
    <button id="close-button">Close</button>

    <script>
        let controls = document.getElementById('controls');
        let nameInput = document.getElementById('name');
        let ageInput = document.getElementById('age');
        let updateButton = document.getElementById('update-button');
        let cityInput = document.getElementById('city');
        let deleteButton = document.getElementById('delete-button');
        let addButton = document.getElementById('add-button');
        let closeButton = document.getElementById('close-button');

        // Add event listeners to buttons
        addButton.addEventListener('click', () => {
            nameInput.value = '';
            ageInput.value = '';
            cityInput.value = '';
        });

        updateButton.addEventListener('click', () => {
            nameInput.value = '';
            ageInput.value = '';
            cityInput.value = '';
        });

        deleteButton.addEventListener('click', () => {
            nameInput.value = '';
            ageInput.value = '';
            cityInput.value = '';
        });

        updateButton.addEventListener('click', () => {
            nameInput.value = document.getElementById('name').value;
            ageInput.value = document.getElementById('age').value;
            cityInput.value = document.getElementById('city').value;
        });

        closeButton.addEventListener('click', () => {
            controls.style.display = 'none';
        });

        addButton.addEventListener('click', () => {
            let newControl = document.createElement('div');
            newControl.id = 'control';
            newControl.className = 'control';
            controls.appendChild(newControl);
            newControl.innerHTML = `
                <label for="name">Name:</label>
                <input type="text" id="name" value="${nameInput.value}">
                <button id="update-button">Update</button>
                <label for="age">Age:</label>
                <input type="number" id="age" value="${ageInput.value}">
                <button id="delete-button">Delete</button>
            `;
        });

        updateButton.addEventListener('click', () => {
            let name = document.getElementById('name').value;
            let age = document.getElementById('age').value;
            let city = document.getElementById('city').value;
            nameInput.value = name;
            ageInput.value = age;
            cityInput.value = city;
        });

        deleteButton.addEventListener('click', () => {
            controls.style.display = 'none';
        });
    </script>
</body>
</html>
