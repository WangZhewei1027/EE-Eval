<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Linked List</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .node { margin: 5px; }
        #output { margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Interactive Linked List</h1>
    <button onclick="addNode()">Add Node</button>
    <input type="text" id="nodeValue" placeholder="Enter node value" />
    <button onclick="deleteNode()">Delete Node</button>
    <input type="text" id="deleteValue" placeholder="Enter value to delete" />
    <button onclick="displayList()">Display List</button>
    <button onclick="clearList()">Clear List</button>
    <div id="output"></div>

    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.next = null;
            }
        }

        class LinkedList {
            constructor() {
                this.head = null;
            }

            add(value) {
                const newNode = new Node(value);
                if (!this.head) {
                    this.head = newNode;
                    return;
                }
                let current = this.head;
                while (current.next) {
                    current = current.next;
                }
                current.next = newNode;
            }

            delete(value) {
                if (!this.head) return;
                if (this.head.value === value) {
                    this.head = this.head.next;
                    return;
                }
                let current = this.head;
                let previous = null;
                while (current && current.value !== value) {
                    previous = current;
                    current = current.next;
                }
                if (current) {
                    previous.next = current.next;
                }
            }

            display() {
                let current = this.head;
                let result = [];
                while (current) {
                    result.push(current.value);
                    current = current.next;
                }
                return result.length ? result.join(' -> ') : 'List is empty';
            }

            clear() {
                this.head = null;
            }
        }

        const linkedList = new LinkedList();

        function addNode() {
            const value = document.getElementById('nodeValue').value;
            if (value) {
                linkedList.add(value);
                document.getElementById('nodeValue').value = '';
            }
        }

        function deleteNode() {
            const value = document.getElementById('deleteValue').value;
            if (value) {
                linkedList.delete(value);
                document.getElementById('deleteValue').value = '';
            }
        }

        function displayList() {
            const output = linkedList.display();
            document.getElementById('output').innerText = output;
        }

        function clearList() {
            linkedList.clear();
            document.getElementById('output').innerText = 'List cleared.';
        }
    </script>
</body>
</html>
