            padding: 0;
            background-color: #f0f0f0;
        }
        label {
            display: block;
            margin-bottom: 10px;
        }
        input[type="text"] {
            padding: 5px;
            margin-bottom: 20px;
            width: 100%;
        }
        select {
            padding: 5px;
            margin-bottom: 20px;
            width: 100%;
        }
        button {
            padding: 5px 10px;
            margin-bottom: 20px;
            width: 100%;
        }
        input[type="submit"] {
            padding: 5px 10px;
            margin-bottom: 20px;
            width: 100%;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #3e8e41;
        }
        .result {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 20px;
            width: 100%;
        }
        .error {
            padding: 10px;
            border: 1px solid red;

    </style>
</head>
