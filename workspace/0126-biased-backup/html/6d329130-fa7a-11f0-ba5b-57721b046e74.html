<!DOCTYPE html>
<html>
<head>
    <title>Runtime Environment Simulator</title>
    <script>
        // Global state
        let runtimeState = {
            executionStack: [],
            callStack: [],
            heap: {},
            eventQueue: [],
            currentLine: 0,
            variables: {},
            breakpoints: [],
            executionSpeed: 1,
            isRunning: false,
            isPaused: false
        };

        // Sample code
        const sampleCode = `function factorial(n) {
    if (n <= 1) return 1;
    return n * factorial(n - 1);
}

function fibonacci(n) {
    if (n <= 1) return n;
    return fibonacci(n - 1) + fibonacci(n - 2);
}

function main() {
    const num = 5;
    const fact = factorial(num);
    const fib = fibonacci(num);
    console.log(fact, fib);
}

main();`;

        // Initialize
        function init() {
            document.getElementById('codeArea').value = sampleCode;
            updateVisualization();
        }

        // Execution functions
        function executeStep() {
            if (runtimeState.currentLine >= runtimeState.executionStack.length) {
                runtimeState.isRunning = false;
                return;
            }

            const line = runtimeState.executionStack[runtimeState.currentLine];
            processLine(line);
            runtimeState.currentLine++;
            updateVisualization();
        }

        function processLine(line) {
            // Simplified line processing
            if (line.includes('=')) {
                const [varName, value] = line.split('=').map(s => s.trim());
                runtimeState.variables[varName] = eval(value);
            } else if (line.includes('function')) {
                const funcName = line.split('function')[1].split('(')[0].trim();
                runtimeState.callStack.push(funcName);
            } else if (line.includes('return')) {
                runtimeState.callStack.pop();
            }
        }

        function runCode() {
            const code = document.getElementById('codeArea').value;
            runtimeState.executionStack = code.split('\n').filter(line => line.trim() !== '');
            runtimeState.currentLine = 0;
            runtimeState.variables = {};
            runtimeState.callStack = [];
            runtimeState.isRunning = true;
            runtimeState.isPaused = false;
            updateVisualization();
        }

        function pauseExecution() {
            runtimeState.isPaused = !runtimeState.isPaused;
            updateVisualization();
        }

        function stopExecution() {
            runtimeState.isRunning = false;
            runtimeState.isPaused = false;
            updateVisualization();
        }

        function setBreakpoint() {
            const lineNum = parseInt(document.getElementById('breakpointLine').value);
            if (!isNaN(lineNum) && !runtimeState.breakpoints.includes(lineNum)) {
                runtimeState.breakpoints.push(lineNum);
                runtimeState.breakpoints.sort((a, b) => a - b);
                updateVisualization();
            }
        }

        function clearBreakpoints() {
            runtimeState.breakpoints = [];
            updateVisualization();
        }

        function changeSpeed() {
            runtimeState.executionSpeed = parseInt(document.getElementById('speedControl').value);
        }

        function inspectVariable() {
            const varName = document.getElementById('inspectVar').value;
            const value = runtimeState.variables[varName];
            document.getElementById('inspectionResult').innerText = value !== undefined ? 
                `${varName} = ${value}` : 'Variable not found';
        }

        function updateVisualization() {
            // Update call stack display
            const callStackElement = document.getElementById('callStack');
            callStackElement.innerHTML = runtimeState.callStack.map(f => `<div>${f}()</div>`).join('');

            // Update variables display
            const variablesElement = document.getElementById('variables');
            variablesElement.innerHTML = Object.entries(runtimeState.variables)
                .map(([k, v]) => `<div>${k} = ${v}</div>`).join('');

            // Update execution status
            document.getElementById('executionStatus').innerText = 
                runtimeState.isRunning ? 
                    (runtimeState.isPaused ? 'Paused' : 'Running') : 
                    'Stopped';

            // Update current line highlight
            const codeLines = document.getElementById('codeArea').value.split('\n');
            document.getElementById('codePreview').innerHTML = codeLines
                .map((line, i) => {
                    let lineClass = '';
                    if (i === runtimeState.currentLine && runtimeState.isRunning) {
                        lineClass = 'current-line';
                    } else if (runtimeState.breakpoints.includes(i)) {
                        lineClass = 'breakpoint';
                    }
                    return `<div class="${lineClass}">${line}</div>`;
                })
                .join('');
        }

        // Auto-execute when running
        function autoStep() {
            if (runtimeState.isRunning && !runtimeState.isPaused) {
                if (runtimeState.breakpoints.includes(runtimeState.currentLine)) {
                    runtimeState.isPaused = true;
                } else {
                    executeStep();
                }
            }
            setTimeout(autoStep, 1000 / runtimeState.executionSpeed);
        }

        // Start auto-stepping
        window.onload = function() {
            init();
            autoStep();
        };
    </script>
    <style>
        body {
            font-family: monospace;
            margin: 20px;
            background: white;
            color: black;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .panel {
            border: 1px solid black;
            padding: 10px;
            margin-bottom: 10px;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button, input, select {
            padding: 5px;
        }
        textarea {
            width: 100%;
            height: 200px;
            font-family: monospace;
        }
        .current-line {
            background: #f0f0f0;
            font-weight: bold;
        }
        .breakpoint {
            background: #f0f0f0;
            border-left: 3px solid red;
            padding-left: 3px;
        }
        .visualization {
            display: flex;
            gap: 20px;
        }
        .visualization-panel {
            flex: 1;
            min-height: 200px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Runtime Environment Simulator</h1>
        
        <div class="panel">
            <h2>Code Editor</h2>
            <textarea id="codeArea"></textarea>
            <div id="codePreview" class="panel"></div>
        </div>
        
        <div class="panel">
            <h2>Execution Controls</h2>
            <div class="controls">
                <button onclick="runCode()">Run</button>
                <button onclick="executeStep()">Step</button>
                <button onclick="pauseExecution()">Pause/Resume</button>
                <button onclick="stopExecution()">Stop</button>
                <input type="range" id="speedControl" min="1" max="10" value="1" onchange="changeSpeed()">
                <span>Speed: <span id="speedValue">1</span>x</span>
            </div>
            <div>
                Status: <span id="executionStatus">Stopped</span>
            </div>
        </div>
        
        <div class="panel">
            <h2>Debugging Tools</h2>
            <div class="controls">
                <input type="number" id="breakpointLine" placeholder="Line number">
                <button onclick="setBreakpoint()">Set Breakpoint</button>
                <button onclick="clearBreakpoints()">Clear All Breakpoints</button>
            </div>
            <div class="controls">
                <input type="text" id="inspectVar" placeholder="Variable name">
                <button onclick="inspectVariable()">Inspect</button>
                <span id="inspectionResult"></span>
            </div>
        </div>
        
        <div class="visualization">
            <div class="panel visualization-panel">
                <h2>Call Stack</h2>
                <div id="callStack"></div>
            </div>
            <div class="panel visualization-panel">
                <h2>Variables</h2>
                <div id="variables"></div>
            </div>
        </div>
    </div>
</body>
</html>
