<!DOCTYPE html>
<html>
<head>
    <title>Breadth-First Search (BFS)</title>
    <style>
        body {
            font-family: monospace;
            background-color: white;
        }
        #graph {
            border: 1px solid black;
            padding: 10px;
            margin: 10px;
        }
        input[type="number"] {
            width: 100px;
        }
        input[type="range"] {
            width: 100px;
            height: 10px;
        }
        input[type="text"] {
            width: 100px;
            height: 10px;
        }
        input[type="submit"] {
            width: 100px;
            height: 10px;
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Breadth-First Search (BFS)</h1>
    <p>Enter the number of vertices in the graph:</p>
    <input type="number" id="numVertices" value="10">
    <button id="startButton">Start</button>
    <button id="resetButton">Reset</button>
    <div id="graph"></div>
    <script>
        let numVertices = document.getElementById('numVertices').value;
        let graph = document.getElementById('graph');
        let startButton = document.getElementById('startButton');
        let resetButton = document.getElementById('resetButton');

        function drawGraph() {
            graph.innerHTML = '';
            for (let i = 0; i < numVertices; i++) {
                graph.innerHTML += '<div style="width: 50px; height: 50px"></div>';
            }
            let nodes = new Set();
            let edges = new Set();
            for (let i = 0; i < numVertices; i++) {
                for (let j = i + 1; j < numVertices; j++) {
                    let distance = bfs(i, j);
                    if (distance !== -1) {
                        let node = document.createElement('div');
                        node.style.width = '50px';
                        node.style.height = '50px';
                        node.style.background = 'lightgreen';
                        node.style.position = 'absolute';
                        node.style.top = `${distance}px`;
                        node.style.left = `${i * 50}px`;
                        graph.appendChild(node);
                        nodes.add(i);
                        edges.add(`${i},${j}`);
                    }
                }
            }
        }

        function bfs(source, destination) {
            let visited = new Set();
            let queue = [source];
            visited.add(source);
            while (queue.length > 0) {
                let node = queue.shift();
                for (let neighbor of graph.children[node]) {
                    if (!visited.has(neighbor)) {
                        visited.add(neighbor);
                        queue.push(neighbor);
                    }
                }
            }
            return visited.has(destination) ? destination : -1;
        }

        startButton.addEventListener('click', drawGraph);
        resetButton.addEventListener('click', () => {
            graph.innerHTML = '';
            for (let i = 0; i < numVertices; i++) {
                let node = document.createElement('div');
                node.style.width = '50px';
                node.style.height = '50px';
                node.style.background = 'lightgreen';
                node.style.position = 'absolute';
                node.style.top = `${i * 50}px`;
                node.style.left = `${i * 50}px`;
                graph.appendChild(node);
            }
        });
    </script>
</body>
</html>
