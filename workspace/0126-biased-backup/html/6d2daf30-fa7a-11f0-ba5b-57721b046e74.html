<!DOCTYPE html>
<html>
<head>
    <title>Interactive Bubble Sort</title>
    <style>
        body {
            font-family: Arial, margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .array-container {
            display: flex;
            margin: 20px 0;
            height: 200px;
            align-items: flex-end;
            border-bottom: 1px solid #000;
        }
        .array-bar {
            flex: 1;
            background-color: #ddd;
            margin: 0 1px;
            position: relative;
            text-align: center;
        }
        .controls {
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .control-group {
            margin-right: 20px;
        }
        .status {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #000;
        }
        .comparison {
            background-color: #ccc;
        }
        .swapped {
            background-color: #999;
        }
        .sorted {
            background-color: #555;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interactive Bubble Sort</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="arraySize">Array Size:</label>
                <input type="range" id="arraySize" min="5" max="50" value="15">
                <span id="arraySizeValue">15</span>
            </div>
            
            <div class="control-group">
                <label for="speed">Speed:</label>
                <input type="range" id="speed" min="1" max="10" value="5">
                <span id="speedValue">5</span>
            </div>
            
            <div class="control-group">
                <button id="generate">Generate New Array</button>
                <button id="start">Start Sort</button>
                <button id="pause" disabled>Pause</button>
                <button id="step" disabled>Step</button>
                <button id="reset">Reset</button>
            </div>
            
            <div class="control-group">
                <label for="arrayInput">Custom Array (comma separated):</label>
                <input type="text" id="arrayInput" placeholder="e.g. 5,3,8,1,2">
                <button id="useCustom">Use Custom Array</button>
            </div>
        </div>
        
        <div class="status" id="status">
            Status: Ready. Generate array or use custom array to begin.
        </div>
        
        <div class="array-container" id="arrayContainer"></div>
        
        <div class="controls">
            <div class="control-group">
                <h3>Sort Options:</h3>
                <label><input type="radio" name="direction" value="asc" checked> Ascending</label>
                <label><input type="radio" name="direction" value="desc"> Descending</label>
            </div>
            
            <div class="control-group">
                <h3>Display Options:</h3>
                <label><input type="checkbox" id="showValues" checked> Show Values</label>
                <label><input type="checkbox" id="showIndices"> Show Indices</label>
            </div>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <h3>Algorithm Details:</h3>
                <div id="algorithmDetails">
                    <p>Current Pass: <span id="currentPass">0</span></p>
                    <p>Current Comparison: <span id="currentComparison">0</span></p>
                    <p>Total Swaps: <span id="totalSwaps">0</span></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State variables
        let array = [];
        let isSorting = false;
        let isPaused = false;
        let sortingInterval;
        let currentStep = 0;
        let currentPass = 0;
        let totalSwaps = 0;
        let speed = 5;
        let direction = 'asc';
        
        // DOM elements
        const arrayContainer = document.getElementById('arrayContainer');
        const arraySizeInput = document.getElementById('arraySize');
        const arraySizeValue = document.getElementById('arraySizeValue');
        const speedInput = document.getElementById('speed');
        const speedValue = document.getElementById('speedValue');
        const generateBtn = document.getElementById('generate');
        const startBtn = document.getElementById('start');
        const pauseBtn = document.getElementById('pause');
        const stepBtn = document.getElementById('step');
        const resetBtn = document.getElementById('reset');
        const statusEl = document.getElementById('status');
        const arrayInput = document.getElementById('arrayInput');
        const useCustomBtn = document.getElementById('useCustom');
        const showValues = document.getElementById('showValues');
        const showIndices = document.getElementById('showIndices');
        const currentPassEl = document.getElementById('currentPass');
        const currentComparisonEl = document.getElementById('currentComparison');
        const totalSwapsEl = document.getElementById('totalSwaps');
        
        // Event listeners
        arraySizeInput.addEventListener('input', updateArraySize);
        speedInput.addEventListener('input', updateSpeed);
        generateBtn.addEventListener('click', generateNewArray);
        startBtn.addEventListener('click', startSorting);
        pauseBtn.addEventListener('click', togglePause);
        stepBtn.addEventListener('click', performStep);
        resetBtn.addEventListener('click', reset);
        useCustomBtn.addEventListener('click', useCustomArray);
        document.querySelectorAll('input[name="direction"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                direction = e.target.value;
                if (!isSorting) {
                    renderArray();
                }
            });
        });
        showValues.addEventListener('change', renderArray);
        showIndices.addEventListener('change', renderArray);
        
        // Initialize
        generateNewArray();
        
        // Functions
        function updateArraySize() {
            arraySizeValue.textContent = arraySizeInput.value;
        }
        
        function updateSpeed() {
            speed = speedInput.value;
            speedValue.textContent = speed;
            if (isSorting && !isPaused) {
                clearInterval(sortingInterval);
                sortingInterval = setInterval(performStep, 1100 - (speed * 100));
            }
        }
        
        function generateNewArray() {
            if (isSorting) return;
            
            const size = parseInt(arraySizeInput.value);
            array = [];
            for (let i = 0; i < size; i++) {
                array.push(Math.floor(Math.random() * 100) + 1);
            }
            
            resetState();
            renderArray();
            statusEl.textContent = 'New array generated. Ready to sort.';
        }
        
        function useCustomArray() {
            if (isSorting) return;
            
            try {
                const input = arrayInput.value.trim();
                if (!input) return;
                
                const newArray = input.split(',').map(num => {
                    const parsed = parseInt(num.trim());
                    if (isNaN(parsed)) throw new Error('Invalid number');
                    return parsed;
                });
                
                if (newArray.length < 2) {
                    throw new Error('Array must have at least 2 elements');
                }
                
                array = newArray;
                arraySizeInput.value = array.length;
                arraySizeValue.textContent = array.length;
                
                resetState();
                renderArray();
                statusEl.textContent = 'Custom array loaded. Ready to sort.';
            } catch (e) {
                statusEl.textContent = 'Error: ' + e.message;
            }
        }
        
        function resetState() {
            currentStep = 0;
            currentPass = 0;
            totalSwaps = 0;
            isSorting = false;
            isPaused = false;
            updateAlgorithmDetails();
        }
        
        function renderArray(highlightIndices = [], state = '') {
            arrayContainer.innerHTML = '';
            const maxValue = Math.max(...array);
            
            array.forEach((value, index) => {
                const bar = document.createElement('div');
                bar.className = 'array-bar';
                
                // Set height proportional to value
                const heightPercentage = (value / maxValue) * 100;
                bar.style.height = `${heightPercentage}%`;
                
                // Add classes based on state
                if (highlightIndices.includes(index)) {
                    bar.classList.add(state);
                }
                
                // Add value and/or index if enabled
                const label = document.createElement('div');
                if (showValues.checked) {
                    label.textContent = value;
                }
                if (showIndices.checked) {
                    if (showValues.checked) label.textContent += ` (${index})`;
                    else label.textContent = index;
                }
                bar.appendChild(label);
                
                arrayContainer.appendChild(bar);
            });
        }
        
        function startSorting() {
            if (isSorting) return;
            
            isSorting = true;
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            stepBtn.disabled = false;
            generateBtn.disabled = true;
            useCustomBtn.disabled = true;
            
            statusEl.textContent = 'Sorting in progress...';
            
            sortingInterval = setInterval(performStep, 1100 - (speed * 100));
        }
        
        function togglePause() {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? 'Resume' : 'Pause';
            
            if (isPaused) {
                clearInterval(sortingInterval);
                statusEl.textContent = 'Sorting paused.';
            } else {
                sortingInterval = setInterval(performStep, 1100 - (speed * 100));
                statusEl.textContent = 'Sorting resumed...';
            }
        }
        
        function performStep() {
            if (isPaused) return;
            
            // Check if sorting is complete
            if (currentPass >= array.length - 1) {
                completeSort();
                return;
            }
            
            const i = currentStep % (array.length - currentPass - 1);
            
            // Highlight the current comparison
            renderArray([i, i + 1], 'comparison');
            updateAlgorithmDetails();
            statusEl.textContent = `Comparing elements at indices ${i} and ${i + 1}: ${array[i]} and ${array[i + 1]}`;
            
            // Determine if we should swap
            let shouldSwap = false;
            if (direction === 'asc') {
                shouldSwap = array[i] > array[i + 1];
            } else {
                shouldSwap = array[i] < array[i + 1];
            }
            
            if (shouldSwap) {
                // Perform swap
                [array[i], array[i + 1]] = [array[i + 1], array[i]];
                totalSwaps++;
                totalSwapsEl.textContent = totalSwaps;
                
                // Show swap
                setTimeout(() => {
                    renderArray([i, i + 1], 'swapped');
                    statusEl.textContent = `Swapped elements at indices ${i} and ${i + 1}`;
                }, (1100 - (speed * 100)) / 2);
            }
            
            currentStep++;
            
            // Check if we've completed a pass
            if (i === array.length - currentPass - 2) {
                currentPass++;
                currentPassEl.textContent = currentPass;
                
                // Mark the last element as sorted
                setTimeout(() => {
                    const sortedIndex = array.length - currentPass;
                    renderArray([sortedIndex], 'sorted');
                    statusEl.textContent = `Completed pass ${currentPass}. Element at index ${sortedIndex} is now in its final position.`;
                }, (1100 - (speed * 100)) / 2);
            }
        }
        
        function completeSort() {
            clearInterval(sortingInterval);
            isSorting = false;
            
            // Mark all elements as sorted
            renderArray(Array.from({length: array.length}, (_, i) => i), 'sorted');
            statusEl.textContent = `Sorting complete! Total passes: ${currentPass}, total swaps: ${totalSwaps}`;
            
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            stepBtn.disabled = true;
            generateBtn.disabled = false;
            useCustomBtn.disabled = false;
        }
        
        function reset() {
            clearInterval(sortingInterval);
            isSorting = false;
            isPaused = false;
            
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            stepBtn.disabled = true;
            generateBtn.disabled = false;
            useCustomBtn.disabled = false;
            pauseBtn.textContent = 'Pause';
            
            resetState();
            renderArray();
            statusEl.textContent = 'Reset. Ready to sort.';
        }
        
        function updateAlgorithmDetails() {
            currentPassEl.textContent = currentPass;
            currentComparisonEl.textContent = currentStep % (array.length - currentPass - 1);
            totalSwapsEl.textContent = totalSwaps;
        }
    </script>
</body>
</html>
