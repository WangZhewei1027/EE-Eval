<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSI Model Interactive Explorer</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .section { margin: 20px 0; }
        button { margin: 5px; }
    </style>
</head>
<body>

<h1>OSI Model Interactive Explorer</h1>

<div class="section">
    <h2>OSI Layers</h2>
    <button onclick="selectLayer(1)">Physical Layer</button>
    <button onclick="selectLayer(2)">Data Link Layer</button>
    <button onclick="selectLayer(3)">Network Layer</button>
    <button onclick="selectLayer(4)">Transport Layer</button>
    <button onclick="selectLayer(5)">Session Layer</button>
    <button onclick="selectLayer(6)">Presentation Layer</button>
    <button onclick="selectLayer(7)">Application Layer</button>
</div>

<div class="section" id="details">
    <h2>Layer Details</h2>
    <p id="layerInfo">Select a layer to see details.</p>
</div>

<div class="section">
    <h2>Simulate Data Transmission</h2>
    <label for="dataInput">Enter Data: </label>
    <input type="text" id="dataInput">
    <button onclick="transmitData()">Transmit</button>
</div>

<div class="section">
    <h2>Data at Each Layer</h2>
    <p id="layerData">Data will appear here as it passes through layers.</p>
</div>

<script>
    const layerDetails = {
        1: "Physical Layer: Transmits raw bits over a physical medium.",
        2: "Data Link Layer: Provides node-to-node data transfer and error detection.",
        3: "Network Layer: Handles the routing of data between devices.",
        4: "Transport Layer: Ensures complete data transfer with flow control.",
        5: "Session Layer: Manages sessions and controls the dialogues.",
        6: "Presentation Layer: Translates data formats for the application layer.",
        7: "Application Layer: Provides network services to the end user."
    };

    function selectLayer(layer) {
        document.getElementById('layerInfo').innerText = layerDetails[layer];
    }

    function transmitData() {
        let data = document.getElementById('dataInput').value;
        if (!data) {
            alert("Please enter some data to transmit.");
            return;
        }
        let processingData = data;
        let result = [];
        for (let i = 1; i <= 7; i++) {
            processingData = `Layer ${i}: ${processingData}`;
            result.push(processingData);
        }
        document.getElementById('layerData').innerText = result.join("\n");
    }
</script>

</body>
</html>
