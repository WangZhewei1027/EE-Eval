<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backpropagation Visualization</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f3f4f6, #e3e4e8);
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background 0.5s ease;
        }
        h1 {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            color: #4a90e2;
        }
        .container {
            position: relative;
            width: 80vw;
            height: 60vh;
            border: 5px solid #4a90e2;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            animation: fadeIn 1.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .neural-network {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .layer {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .neuron {
            width: 60px;
            height: 60px;
            background: #4a90e2;
            border-radius: 50%;
            margin: 20px 0;
            position: relative;
            transition: transform 0.2s;
        }
        .neuron:hover {
            transform: scale(1.1);
        }
        .connection {
            position: absolute;
            width: 3px;
            background: #4a90e2;
            transform-origin: top;
            transition: height 0.5s;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #4a90e2;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        button:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <h1>Backpropagation Visualization</h1>

    <div class="container">
        <div class="neural-network">
            <div class="layer">
                <div class="neuron" style="background: #ff4d4d;"></div>
                <div class="neuron" style="background: #ff4d4d;"></div>
            </div>
            <div class="layer">
                <div class="neuron"></div>
                <div class="neuron"></div>
                <div class="neuron"></div>
            </div>
            <div class="layer">
                <div class="neuron" style="background: #ffcc00;"></div>
            </div>
        </div>
    </div>

    <button onclick="animateBackpropagation()">Start Backpropagation</button>

    <script>
        function animateBackpropagation() {
            const neuronEffects = document.querySelectorAll('.neuron');
            const connections = [];

            for (let i = 0; i < neuronEffects.length; i++) {
                if (i < neuronEffects.length - 1) {
                    const connection = document.createElement('div');
                    const from = neuronEffects[i];
                    const to = neuronEffects[i + 1];
                    const height = 100;
                    connection.classList.add('connection');
                    connection.style.height = `${height}px`;
                    connection.style.left = `${from.offsetLeft + from.offsetWidth / 2}px`;
                    connection.style.top = `${from.offsetTop + from.offsetHeight}px`;
                    document.body.appendChild(connection);
                    connections.push(connection);
                }
            }

            setTimeout(() => {
                connections.forEach((conn, index) => {
                    conn.style.height = `${Math.random() * 150 + 50}px`;
                });
            }, 500);
        }
    </script>
</body>
</html>
