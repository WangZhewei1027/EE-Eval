<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Typing Demonstration</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>

<h1>Dynamic Typing Demonstration</h1>

<div>
    <label for="textInput">Input a value:</label>
    <input type="text" id="textInput" oninput="updateOutput()" placeholder="Type here...">
</div>

<div>
    <label for="numberInput">Input a number:</label>
    <input type="number" id="numberInput" oninput="updateOutput()">
</div>

<div>
    <label for="boolInput">Select a boolean:</label>
    <select id="boolInput" onchange="updateOutput()">
        <option value="true">True</option>
        <option value="false">False</option>
    </select>
</div>

<div>
    <label for="stringButton">Click to input predefined string:</label>
    <button id="stringButton" onclick="setString()">Set String "Hello World"</button>
</div>

<div>
    <label for="arrayButton">Click to input array:</label>
    <button id="arrayButton" onclick="setArray()">Set Array [1, 2, 3]</button>
</div>

<div>
    <label for="objectButton">Click to input object:</label>
    <button id="objectButton" onclick="setObject()">Set Object { name: 'John', age: 30 }</button>
</div>

<div>
    <label for="dateButton">Click to input current date:</label>
    <button id="dateButton" onclick="setDate()">Set Date</button>
</div>

<div>
    <label for="customObjectButton">Click to input custom object:</label>
    <button id="customObjectButton" onclick="setCustomObject()">Set Custom Object</button>
</div>

<div id="output">
    <h3>Output:</h3>
    <pre id="outputDisplay"></pre>
</div>

<script>
    let currentOutput = "";

    function updateOutput() {
        const textInput = document.getElementById('textInput').value;
        const numberInput = document.getElementById('numberInput').value;
        const boolInput = document.getElementById('boolInput').value;

        currentOutput = {
            string: textInput,
            number: numberInput ? Number(numberInput) : null,
            boolean: boolInput === "true",
        };

        updateDisplay();
    }

    function setString() {
        document.getElementById('textInput').value = "Hello World";
        updateOutput();
    }

    function setArray() {
        currentOutput = [1, 2, 3];
        updateDisplay();
    }

    function setObject() {
        currentOutput = { name: 'John', age: 30 };
        updateDisplay();
    }

    function setDate() {
        currentOutput = new Date().toString();
        updateDisplay();
    }

    function setCustomObject() {
        currentOutput = { info: "This is a custom object", timestamp: new Date() };
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('outputDisplay').textContent = JSON.stringify(currentOutput, null, 2);
    }
</script>

</body>
</html>
