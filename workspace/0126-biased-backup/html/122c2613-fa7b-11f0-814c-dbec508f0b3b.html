<!DOCTYPE html>
<html>
<head>
    <title>Recursion</title>
    <style>
        body {
            background-color: white;
            font-family: monospace;
        }
        #recursion-container {
            width: 800px;
            height: 600px;
            border: 1px solid black;
            margin: 50px auto;
        }
        #recursion-container button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #recursion-container input[type="number"] {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            width: 100%;
            cursor: pointer;
        }
        #recursion-container select {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            width: 100%;
            cursor: pointer;
        }
        #recursion-container textarea {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="recursion-container">
        <button>Start</button>
        <button>Stop</button>
        <button>Reset</button>
        <input type="number" id="num-input" value="0" step="any">
        <select id="step-select">
            <option value="1">Step 1</option>
            <option value="2">Step 2</option>
            <option value="3">Step 3</option>
        </select>
        <input type="text" id="result-text" readonly>
        <textarea id="result-textarea" readonly></textarea>
    </div>

    <script>
        let num = 0;
        let step = 1;
        let result = '';

        document.getElementById('num-input').addEventListener('input', function() {
            num = parseInt(this.value);
            if (isNaN(num)) {
                alert('Please enter a number.');
            } else {
                result = 'Step ' + step + ': ' + num;
                document.getElementById('result-text').innerHTML = result;
            }
        });

        document.getElementById('step-select').addEventListener('change', function() {
            step = parseInt(this.value);
            result = 'Step ' + step + ': ' + num;
            document.getElementById('result-text').innerHTML = result;
        });

        document.getElementById('start').addEventListener('click', function() {
            num = 0;
            step = 1;
            result = '';
            document.getElementById('num-input').value = '0';
            document.getElementById('step-select').value = '1';
            document.getElementById('result-text').innerHTML = '';
        });

        document.getElementById('stop').addEventListener('click', function() {
            num = 0;
            step = 1;
            result = '';
            document.getElementById('num-input').value = '0';
            document.getElementById('step-select').value = '1';
            document.getElementById('result-text').innerHTML = '';
        });

        document.getElementById('reset').addEventListener('click', function() {
            num = 0;
            step = 1;
            result = '';
            document.getElementById('num-input').value = '0';
            document.getElementById('step-select').value = '1';
            document.getElementById('result-text').innerHTML = '';
        });
    </script>
</body>
</html>
