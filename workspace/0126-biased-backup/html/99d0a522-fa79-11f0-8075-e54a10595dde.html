<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Development Life Cycle</title>
    <style>
        /* Minimal CSS */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .section {
            margin-bottom: 20px;
        }
        .button, .input-field, .slider {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Software Development Life Cycle (SDLC)</h1>

    <div class="section" id="planning-section">
        <h2>1. Planning</h2>
        <textarea id="plan-input" class="input-field" rows="4" placeholder="Enter project goals..."></textarea>
        <button class="button" onclick="savePlanning()">Save Planning</button>
        <div id="planning-output"></div>
    </div>

    <div class="section" id="analysis-section">
        <h2>2. Analysis</h2>
        <button class="button" onclick="startAnalysis()">Start Analysis</button>
        <div id="analysis-output"></div>
    </div>

    <div class="section" id="design-section">
        <h2>3. Design</h2>
        <input type="text" id="design-input" class="input-field" placeholder="Enter design specifications..." />
        <button class="button" onclick="saveDesign()">Save Design</button>
        <div id="design-output"></div>
    </div>

    <div class="section" id="development-section">
        <h2>4. Development</h2>
        <label>Development Progress:</label>
        <input type="range" id="development-slider" class="slider" min="0" max="100" onchange="updateProgress()"/>
        <div id="development-output"></div>
    </div>

    <div class="section" id="testing-section">
        <h2>5. Testing</h2>
        <button class="button" onclick="startTesting()">Start Testing</button>
        <div id="testing-output"></div>
    </div>

    <div class="section" id="deployment-section">
        <h2>6. Deployment</h2>
        <button class="button" onclick="deployProject()">Deploy Project</button>
        <div id="deployment-output"></div>
    </div>

    <script>
        // JavaScript functionality

        let planningOutput = "";
        let analysisDone = false;
        let designOutput = "";
        let developmentProgress = 0;

        function savePlanning() {
            const planningInput = document.getElementById('plan-input').value;
            planningOutput = planningInput;
            document.getElementById('planning-output').innerText = "Planning saved: " + planningOutput;
        }

        function startAnalysis() {
            if (planningOutput) {
                analysisDone = true;
                document.getElementById('analysis-output').innerText = "Analysis started based on: " + planningOutput;
            } else {
                alert("Please save planning first.");
            }
        }

        function saveDesign() {
            const designInput = document.getElementById('design-input').value;
            designOutput = designInput;
            document.getElementById('design-output').innerText = "Design saved: " + designOutput;
        }

        function updateProgress() {
            developmentProgress = document.getElementById('development-slider').value;
            document.getElementById('development-output').innerText = "Development progress: " + developmentProgress + "%";
        }

        function startTesting() {
            if (developmentProgress == 100) {
                document.getElementById('testing-output').innerText = "Testing started on completed development.";
            } else {
                alert("Development must be 100% complete before testing.");
            }
        }

        function deployProject() {
            if (analysisDone && designOutput && developmentProgress == 100) {
                document.getElementById('deployment-output').innerText = "Project deployed successfully!";
            } else {
                alert("Ensure all prior phases are completed correctly.");
            }
        }
    </script>

</body>
</html>
