<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Sort Visualizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #arrayDisplay {
            margin-top: 20px;
            white-space: pre;
        }
    </style>
</head>
<body>

<h1>Merge Sort Visualizer</h1>

<label for="sizeInput">Array Size (2-20):</label>
<input type="number" id="sizeInput" min="2" max="20" value="10">
<button id="generateArray">Generate Array</button>
<button id="startSort">Start Merge Sort</button>

<div id="arrayDisplay"></div>

<script>
    let array = [];

    function displayArray() {
        const arrayDisplay = document.getElementById('arrayDisplay');
        arrayDisplay.textContent = array.join(', ');
    }

    function generateRandomArray(size) {
        array = Array.from({ length: size }, () => Math.floor(Math.random() * 100));
        displayArray();
    }

    async function mergeSort(arr) {
        if (arr.length <= 1) return arr;

        const mid = Math.floor(arr.length / 2);
        const left = await mergeSort(arr.slice(0, mid));
        const right = await mergeSort(arr.slice(mid));

        return await merge(left, right);
    }

    async function merge(left, right) {
        const result = [];
        let leftIndex = 0, rightIndex = 0;

        while (leftIndex < left.length && rightIndex < right.length) {
            if (left[leftIndex] < right[rightIndex]) {
                result.push(left[leftIndex]);
                leftIndex++;
            } else {
                result.push(right[rightIndex]);
                rightIndex++;
            }
            displayArray();
            await new Promise(resolve => setTimeout(resolve, 500)); // Pause for visualization
        }

        return result.concat(left.slice(leftIndex)).concat(right.slice(rightIndex));
    }

    document.getElementById('generateArray').addEventListener('click', () => {
        const size = parseInt(document.getElementById('sizeInput').value, 10);
        generateRandomArray(size);
    });

    document.getElementById('startSort').addEventListener('click', async () => {
        array = await mergeSort(array);
        displayArray();
    });

    // Initialize with a random array on page load
    window.onload = () => generateRandomArray(10);
</script>

</body>
</html>
