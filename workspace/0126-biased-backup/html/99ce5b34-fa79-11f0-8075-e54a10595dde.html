<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B+ Tree Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #tree {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>B+ Tree Demo</h1>

<label for="degree">Select Degree (Max Children): </label>
<input type="number" id="degree" min="2" value="3">
<button onclick="createBPlusTree()">Create B+ Tree</button>
<button onclick="showTree()">Show Tree</button>
<br><br>

<label for="value">Enter Value to Insert: </label>
<input type="number" id="value">
<button onclick="insertValue()">Insert</button>
<br><br>

<label for="deleteValue">Enter Value to Delete: </label>
<input type="number" id="deleteValue">
<button onclick="deleteValue()">Delete</button>
<br><br>

<h2>B+ Tree Structure:</h2>
<pre id="tree"></pre>

<script>
    class BPlusTreeNode {
        constructor(degree, isLeaf = true) {
            this.degree = degree;
            this.keys = [];
            this.children = [];
            this.isLeaf = isLeaf;
        }
    }

    class BPlusTree {
        constructor(degree) {
            this.root = new BPlusTreeNode(degree);
            this.degree = degree;
        }

        insert(value) {
            const root = this.root;
            if (root.keys.length === (this.degree - 1)) {
                const newRoot = new BPlusTreeNode(this.degree, false);
                newRoot.children.push(this.root);
                this.splitChild(newRoot, 0);
                this.root = newRoot;
                this.insertNonFull(this.root, value);
            } else {
                this.insertNonFull(root, value);
            }
        }

        insertNonFull(node, value) {
            let i = node.keys.length - 1;
            if (node.isLeaf) {
                while (i >= 0 && value < node.keys[i]) {
                    i--;
                }
                node.keys.splice(i + 1, 0, value);
            } else {
                while (i >= 0 && value < node.keys[i]) {
                    i--;
                }
                i++;
                if (node.children[i].keys.length === (this.degree - 1)) {
                    this.splitChild(node, i);
                    if (value > node.keys[i]) {
                        i++;
                    }
                }
                this.insertNonFull(node.children[i], value);
            }
        }

        splitChild(parent, index) {
            const degree = this.degree;
            const child = parent.children[index];
            const newChild = new BPlusTreeNode(degree, child.isLeaf);
            parent.keys.splice(index, 0, child.keys[degree - 1]);
            parent.children.splice(index + 1, 0, newChild);
            newChild.keys = child.keys.splice(degree - 1, degree - 1);
            if (!child.isLeaf) {
                newChild.children = child.children.splice(degree - 1);
            }
        }

        delete(value) {
            // Simplified delete function implementation (not fully functional)
            // Ideally, this should handle merging nodes and rebalancing.
            this.deleteRecursive(this.root, value);
        }

        deleteRecursive(node, value) {
            // Not implemented: Node deletion logic which requires merging and rebalancing.
            // Placeholder implementation that simply logs the delete attempt.
            console.log(`Attempting to delete: ${value}`);
        }

        display(node = this.root, depth = 0) {
            let result = ' '.repeat(depth * 4) + node.keys.join(", ") + "\n";
            if (!node.isLeaf) {
                for (let child of node.children) {
                    result += this.display(child, depth + 1);
                }
            }
            return result;
        }
    }

    let bPlusTree;

    function createBPlusTree() {
        const degree = parseInt(document.getElementById('degree').value, 10);
        bPlusTree = new BPlusTree(degree);
        document.getElementById('tree').textContent = "B+ Tree has been created.";
    }

    function insertValue() {
        const value = parseInt(document.getElementById('value').value, 10);
        if (bPlusTree) {
            bPlusTree.insert(value);
            document.getElementById('tree').textContent = bPlusTree.display();
        } else {
            document.getElementById('tree').textContent = "Please create a B+ Tree first.";
        }
    }

    function deleteValue() {
        const value = parseInt(document.getElementById('deleteValue').value, 10);
        if (bPlusTree) {
            bPlusTree.delete(value);
            document.getElementById('tree').textContent = bPlusTree.display();
        } else {
            document.getElementById('tree').textContent = "Please create a B+ Tree first.";
        }
    }

    function showTree() {
        if (bPlusTree) {
            document.getElementById('tree').textContent = bPlusTree.display();
        } else {
            document.getElementById('tree').textContent = "No B+ Tree to display.";
        }
    }
</script>

</body>
</html>
