<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Authentication Concept — Elegant Visual Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

  /* Reset and base */
  * {
    box-sizing: border-box;
    margin: 0; padding: 0;
  }
  html, body {
    height: 100%;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Poppins', sans-serif;
    color: #e0e6f0;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Container */
  .auth-container {
    perspective: 1400px;
    width: 440px;
    max-width: 90vw;
  }

  /* Card */
  .auth-card {
    position: relative;
    width: 100%;
    min-height: 530px;
    background: linear-gradient(145deg, #1c2940, #263850);
    border-radius: 24px;
    box-shadow:
      0 15px 35px rgba(0,0,0,0.7),
      inset 0 0 30px rgba(255,255,255,0.08);
    overflow: hidden;
    transform-style: preserve-3d;
    animation: cardFloat 6s ease-in-out infinite;
  }

  @keyframes cardFloat {
    0%, 100% { transform: translateY(0) rotateX(2deg) rotateY(-5deg);}
    50% { transform: translateY(-15px) rotateX(-2deg) rotateY(5deg);}
  }

  /* Header - Logo & Title */
  .auth-header {
    padding: 36px 36px 12px;
    text-align: center;
    position: relative;
  }

  .logo-circle {
    width: 74px;
    height: 74px;
    margin: 0 auto 16px auto;
    background: radial-gradient(circle at center, #62dafb, #0a7abf);
    border-radius: 50%;
    box-shadow:
      0 4px 12px rgba(98, 218, 251, 0.6),
      0 0 18px rgba(10, 122, 191, 0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    animation: pulseGlow 3s infinite ease-in-out alternate;
  }

  @keyframes pulseGlow {
    0% {
      box-shadow:
        0 4px 12px rgba(98, 218, 251, 0.6),
        0 0 18px rgba(10, 122, 191, 0.7);
      transform: scale(1);
    }
    100% {
      box-shadow:
        0 8px 20px rgba(98, 218, 251, 0.9),
        0 0 36px rgba(10, 122, 191, 1);
      transform: scale(1.07);
    }
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    fill: #e0e6f0;
    filter: drop-shadow(0 0 1.5px rgba(98, 218, 251, 0.9));
  }

  .auth-header h1 {
    font-weight: 600;
    font-size: 2.4rem;
    letter-spacing: 0.14em;
    color: #62dafb;
    text-shadow:
      0 0 6px #62dafb90,
      0 0 14px #62dafb70;
    user-select: none;
  }

  /* Subheading */
  .auth-subheading {
    margin-top: 6px;
    font-weight: 300;
    font-size: 1rem;
    color: #aabbcc;
    letter-spacing: 0.08em;
    user-select: none;
    text-transform: uppercase;
  }

  /* Form mockup container */
  .auth-body {
    padding: 28px 48px 48px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    filter: drop-shadow(0 2px 9px #1a2a3dbb);
    perspective: 800px;
  }

  /* Input line mockups */
  .input-line {
    position: relative;
    height: 46px;
    border-radius: 12px;
    background:
      linear-gradient(90deg, #062b54, #084171);
    box-shadow:
      inset 0 0 6px #0d4e99,
      0 1px 10px #0a5ecf60;
    overflow: hidden;
  }
  .input-line::before {
    content: '';
    position: absolute;
    inset: 0;
    margin: 3px;
    border-radius: 8px;
    background:
      linear-gradient(90deg, #0157bc 0%, #3dd9fe 45%, #0157bc 100%);
    filter: blur(10px);
    opacity: 0.3;
    animation: pulseBorder 5s linear infinite;
  }
  .input-line .label-text {
    position: absolute;
    top: 9px;
    left: 20px;
    font-weight: 300;
    font-size: 1.1rem;
    color: #a0c2e8cc;
    font-style: italic;
    user-select: none;
    text-transform: capitalize;
    pointer-events: none;
  }
  .input-line .input-fake {
    position: absolute;
    bottom: 8px;
    left: 20px;
    font-weight: 600;
    font-size: 1.25rem;
    color: #e1edf9;
    letter-spacing: 0.04em;
    user-select: none;
    filter: drop-shadow(0 0 3px #3dd9febb);
  }

  @keyframes pulseBorder {
    0%, 100% {
      background-position: 0% 50%;
    }
    50% {
      background-position: 100% 50%;
    }
  }

  /* Button container */
  .auth-footer {
    display: flex;
    justify-content: center;
    margin-top: 12px;
  }

  /* Button styling */
  button.btn-auth {
    background: linear-gradient(135deg, #52a3ff, #0a65d0);
    border: none;
    border-radius: 48px;
    padding: 14px 64px;
    font-weight: 600;
    font-size: 1.2rem;
    color: #e0e6f0;
    letter-spacing: 0.12em;
    cursor: pointer;
    box-shadow:
      0 0 24px #0a65d0cc,
      inset 0 -3px 6px #2a69db;
    transition:
      background 0.35s ease,
      box-shadow 0.35s ease,
      transform 0.25s ease;
    user-select: none;
  }
  button.btn-auth:hover {
    background: linear-gradient(135deg, #75bbff, #1090ff);
    box-shadow:
      0 0 36px #1090ffcc,
      inset 0 -4px 8px #428eff;
    transform: scale(1.05);
  }
  button.btn-auth:active {
    transform: scale(0.98);
    box-shadow:
      0 0 18px #0a65d0cc,
      inset 0 -2px 4px #2a69db;
  }

  /* Glow ellipse behind card */
  .bg-glow-ellipse {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 650px;
    height: 650px;
    background:
      radial-gradient(ellipse at center, #4fc3ff45 0%, transparent 80%);
    transform: translate(-50%, -50%);
    filter: blur(70px);
    pointer-events: none;
    animation: glowPulse 8s ease-in-out infinite alternate;
    z-index: -1;
  }
  @keyframes glowPulse {
    0% {
      filter: blur(65px) brightness(1.05);
      opacity: 0.48;
    }
    50% {
      filter: blur(80px) brightness(1.25);
      opacity: 0.75;
    }
    100% {
      filter: blur(65px) brightness(1.05);
      opacity: 0.48;
    }
  }

  /* Abstract top-right shapes */
  .top-right-graphics {
    position: absolute;
    top: 36px;
    right: 36px;
    width: 140px;
    height: 140px;
    pointer-events: none;
    z-index: 0;
  }

  .abstract-shape {
    position: absolute;
    border-radius: 42% 58% 65% 35% / 70% 36% 64% 30%;
    background: linear-gradient(225deg, #31a8ff, #0a4297);
    opacity: 0.24;
    filter: drop-shadow(0 0 2px #3bc6ff90);
    animation: floatShape 6s ease-in-out infinite;
  }
  .abstract-shape.one {
    width: 80px; height: 80px;
    top: 0; right: 0;
    animation-delay: 0s;
  }
  .abstract-shape.two {
    width: 52px; height: 52px;
    top: 56px; right: 46px;
    animation-delay: 2.3s;
  }
  .abstract-shape.three {
    width: 64px; height: 64px;
    top: 110px; right: 18px;
    animation-delay: 4.6s;
  }
  @keyframes floatShape {
    0%, 100% {
      transform: translateY(0) rotate(0deg);
      opacity: 0.24;
      filter: drop-shadow(0 0 2px #3bc6ff90);
    }
    50% {
      transform: translateY(-8px) rotate(7deg);
      opacity: 0.38;
      filter: drop-shadow(0 0 9px #3bc6ffc3);
    }
  }

  /* Info Tooltip */
  .tooltip {
    position: absolute;
    left: 24px;
    bottom: 26px;
    font-size: 0.7rem;
    color: #62dafb88;
    letter-spacing: 0.12em;
    font-weight: 300;
    user-select: none;
    font-style: italic;
    pointer-events: none;
  }

</style>
</head>
<body>
  <div class="auth-container" aria-label="Authentication visual concept demonstration">
    <div class="auth-card" role="region" aria-labelledby="authTitle">
      <div class="bg-glow-ellipse" aria-hidden="true"></div>

      <div class="top-right-graphics" aria-hidden="true">
        <div class="abstract-shape one"></div>
        <div class="abstract-shape two"></div>
        <div class="abstract-shape three"></div>
      </div>

      <header class="auth-header">
        <div class="logo-circle" aria-hidden="true">
          <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" >
            <path d="M32 6c14.36 0 26 11.64 26 26S46.36 58 32 58 6 46.36 6 32 17.64 6 32 6zm0 4C20.745 10 12 18.745 12 30s8.745 20 20 20 20-8.745 20-20S43.255 10 32 10zm6 8-8 15-8-15h16z" />
          </svg>
        </div>
        <h1 id="authTitle">AUTHENTICATION</h1>
        <p class="auth-subheading">SECURE • PROFESSIONAL • TRUSTED</p>
      </header>

      <main class="auth-body" aria-label="Authentication form mockup">
        <div class="input-line" aria-hidden="true">
          <span class="label-text">Username</span>
          <span class="input-fake">jane.doe</span>
        </div>
        <div class="input-line" aria-hidden="true">
          <span class="label-text">Password</span>
          <span class="input-fake">•••••••••</span>
        </div>
      </main>

      <footer class="auth-footer">
        <button class="btn-auth" id="btnLogin" type="button" aria-label="Simulate login button">LOGIN</button>
      </footer>

      <span class="tooltip" aria-hidden="true">Authentication by design, not by chance</span>
    </div>
  </div>

<script>
  // Minimal interactivity: button triggers a subtle glow animation on the card
  const btnLogin = document.getElementById('btnLogin');
  const card = document.querySelector('.auth-card');
  btnLogin.addEventListener('click', () => {
    if(card.classList.contains('card-glow')) return;
    card.classList.add('card-glow');
    setTimeout(() => {
      card.classList.remove('card-glow');
    }, 1800);
  });
</script>

<style>
  /* Glow effect on card triggered by the button */
  .card-glow {
    animation: cardGlowPulse 1.8s ease forwards;
  }
  @keyframes cardGlowPulse {
    0% {
      box-shadow:
        0 15px 35px rgba(0,0,0,0.7),
        inset 0 0 30px rgba(255,255,255,0.08);
      transform: translateY(0) rotateX(2deg) rotateY(-5deg);
      filter: drop-shadow(0 0 0 #3dd9fe);
    }
    50% {
      box-shadow:
        0 20px 55px #3dd9fecc,
        inset 0 0 55px #62dafb;
      transform: translateY(-12px) rotateX(3deg) rotateY(6deg);
      filter: drop-shadow(0 0 18px #3dd9fecc);
    }
    100% {
      box-shadow:
        0 15px 35px rgba(0,0,0,0.7),
        inset 0 0 30px rgba(255,255,255,0.08);
      transform: translateY(0) rotateX(2deg) rotateY(-5deg);
      filter: drop-shadow(0 0 0 #3dd9fe);
    }
  }
</style>
</body>
</html>
