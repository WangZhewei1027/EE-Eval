<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bellman-Ford Algorithm Visualization</title>
<style>
  /* Reset and base */
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');
  * {
    box-sizing: border-box;
  }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Poppins', sans-serif;
    color: #e0e6f0;
    overflow: hidden;
  }

  /* Container */
  .container {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
    user-select: none;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 1.5rem;
    letter-spacing: 2px;
  }
  header h1 {
    font-weight: 600;
    font-size: 3rem;
    line-height: 1.1;
    color: #a4cdfc;
    text-shadow:
      0 0 10px #83aefc,
      0 0 20px #4178d4,
      0 0 30px #1c348b;
    margin-bottom: 0.1rem;
  }
  header p {
    font-weight: 300;
    font-size: 1.25rem;
    color: #b8c7f9cc;
    letter-spacing: 1px;
  }

  /* Canvas Container */
  .canvas-wrapper {
    flex-grow: 1;
    position: relative;
    border-radius: 24px;
    box-shadow:
      0 0 60px 10px rgba(69, 124, 255, 0.25);
    background:
      radial-gradient(circle at center, #15283d 60%, #0a1524 98%);
    overflow: visible;
  }

  /* Control Bar */
  .controls {
    margin-top: 2rem;
    text-align: center;
  }
  button {
    background: linear-gradient(135deg, #3c70f3, #145cdf);
    border: none;
    border-radius: 30px;
    padding: 0.75rem 2rem;
    color: #f0f5ff;
    font-weight: 600;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow:
      0 6px 15px rgba(60, 112, 243, 0.6);
    transition:
      background 0.4s ease,
      transform 0.25s ease,
      box-shadow 0.4s ease;
  }
  button:hover {
    background: linear-gradient(135deg, #5488f7, #3370ee);
    transform: scale(1.05);
    box-shadow:
      0 9px 25px rgba(60, 112, 243, 0.8);
  }
  button:active {
    transform: scale(0.97);
    box-shadow:
      0 4px 10px rgba(60, 112, 243, 0.5);
  }

  /* Tooltip */
  #tooltip {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(29, 51, 102, 0.9);
    padding: 0.75rem 1.4rem;
    border-radius: 18px;
    font-weight: 600;
    color: #c3d0f8;
    font-size: 1.15rem;
    pointer-events: none;
    text-shadow: 0 0 6px #1d3366;
    user-select: none;
    filter: drop-shadow(0 0 5px #1e3b85);
  }

  /* Footer credit */
  footer {
    margin-top: 2rem;
    text-align: center;
    color: #324060aa;
    font-weight: 300;
    font-size: 0.9rem;
    user-select: none;
  }

</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Bellman-Ford Algorithm</h1>
    <p>Shortest Path Detection in Graphs with Negative Weights</p>
  </header>

  <div class="canvas-wrapper">
    <canvas id="graphCanvas"></canvas>
    <div id="tooltip"></div>
  </div>

  <div class="controls" aria-label="Controls">
    <button id="stepBtn" aria-live="polite" aria-label="Step through algorithm">Step ▶️</button>
    <button id="resetBtn" aria-label="Reset visualization" style="margin-left:1rem; background: linear-gradient(135deg, #d9534f, #b73732); box-shadow: 0 6px 15px rgba(217,83,79,0.7);">Reset ⟲</button>
  </div>

  <footer>
    &copy; 2024 Bellman-Ford Visualization — Designed for elegance & clarity
  </footer>
</div>

<script>
(() => {
  // Get canvas and context setup
  const canvas = document.getElementById('graphCanvas');
  const tooltip = document.getElementById('tooltip');
  const stepBtn = document.getElementById('stepBtn');
  const resetBtn = document.getElementById('resetBtn');

  const dpr = window.devicePixelRatio || 1;
  let width, height;

  // Graph data for Bellman-Ford demonstration (small example)
  // Nodes with IDs and positions
  const nodes = [
    {id: 0, label: 'A', x: 160, y: 140},
    {id: 1, label: 'B', x: 520, y: 100},
    {id: 2, label: 'C', x: 720, y: 220},
    {id: 3, label: 'D', x: 420, y: 320},
    {id: 4, label: 'E', x: 180, y: 300},
  ];

  /* Edges: from, to, weight */
  // Includes a negative edge to show Bellman-Ford's capability
  const edges = [
    {from: 0, to: 1, weight: 6},
    {from: 0, to: 4, weight: 7},
    {from: 1, to: 2, weight: 5},
    {from: 1, to: 3, weight: -4},
    {from: 1, to: 4, weight: 8},
    {from: 2, to: 1, weight: -2},
    {from: 3, to: 2, weight: 7},
    {from: 3, to: 0, weight: 2},
    {from: 4, to: 3, weight: 9},
  ];

  /*
  Distances array and predecessors initialized when starting algorithm.
  Bellman-Ford performs |V| - 1 iterations of edge relaxation:
  We will animate one edge relaxation at a time for clarity.
  */

  let ctx;
  let dist = [];
  let prev = [];
  let currentStep = 0; // current edge relax step count
  let relaxSteps = []; // all relaxation steps precomputed as sequence of {edgeIndex, relaxed: boolean, prevDist, newDist}

  // Animation settings
  const fps = 60;
  const animationDuration = 700; // ms per step

  // Graphical parameters
  const nodeRadius = 28;
  const fontNodeLabel = "600 20px 'Poppins', sans-serif";
  const fontWeightDist = "600 18px 'Poppins', sans-serif";
  const fontEdgeWeight = "500 16px 'Poppins', sans-serif";
  const arrowSize = 12;
  const colorNode = '#2c6be8';
  const colorNodeActive = '#71a1f4';
  const colorNodeRelaxed = '#98cffe';
  const colorEdge = '#6389d0';
  const colorEdgeRelaxed = '#a3c3ff';
  const colorEdgeNegative = '#ff5656';
  const colorDistText = '#e0e6f0';
  const colorDistInfinity = '#546787cc';

  // Variables for animation
  let animationStartTime = null;
  let animationActive = false;

  // Current relaxation info for animation
  let currentRelaxStepData = null;

  // Initialize canvas size for HiDPI
  function resizeCanvas() {
    width = canvas.clientWidth;
    height = canvas.clientHeight;
    // fallback if clientWidth or clientHeight are zero
    if (width === 0 || height === 0) {
      width = window.innerWidth * 0.9;
      height = window.innerHeight * 0.65;
    }
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx = canvas.getContext('2d');
    ctx.setTransform(1, 0, 0, 1, 0, 0); // reset transforms
    ctx.scale(dpr, dpr);
  }

  // Precompute relaxation steps for animation & state replay
  function prepareRelaxSteps() {
    dist = new Array(nodes.length).fill(Infinity);
    prev = new Array(nodes.length).fill(null);
    dist[0] = 0; // source = node 0 (A)

    relaxSteps = [];

    // Perform Bellman-Ford algorithm, record all edge relax attempts
    for(let i=1; i < nodes.length; i++) {
      for(let e=0; e < edges.length; e++) {
        const edge = edges[e];
        const from = edge.from, to = edge.to, weight = edge.weight;
        let relaxed = false;
        let prevDistance = dist[to];

        if (dist[from] !== Infinity && dist[from] + weight < dist[to]) {
          dist[to] = dist[from] + weight;
          prev[to] = from;
          relaxed = true;
        }

        relaxSteps.push({
          edgeIndex: e,
          relaxed: relaxed,
          nodeDistPrev: prevDistance,
          nodeDistNew: dist[to]
        });
      }
    }
  }

  // Reset all to initial state
  function reset() {
    currentStep = 0;
    dist = new Array(nodes.length).fill(Infinity);
    dist[0] = 0;
    prev = new Array(nodes.length).fill(null);
    animationActive = false;
    currentRelaxStepData = null;
    stepBtn.textContent = "Step ▶️";
    tooltip.textContent = "Source node A set to 0. Press Step to start relaxation...";
    drawGraph();
  }

  // Draw arrow helper function
  function drawArrow(ctx, fromX, fromY, toX, toY, color = '#6389d0') {
    const headlen = arrowSize;
    const dx = toX - fromX;
    const dy = toY - fromY;
    const angle = Math.atan2(dy, dx);

    // shorten line so arrow head doesn't go inside node circle
    const shortenFrom = nodeRadius;
    const shortenTo = nodeRadius + arrowSize;

    const startX = fromX + Math.cos(angle) * shortenFrom;
    const startY = fromY + Math.sin(angle) * shortenFrom;
    const endX = toX - Math.cos(angle) * shortenTo;
    const endY = toY - Math.sin(angle) * shortenTo;

    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 2.8;
    ctx.lineCap = 'round';

    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.stroke();

    // Arrowhead
    ctx.beginPath();
    ctx.moveTo(endX, endY);
    ctx.lineTo(endX - headlen * Math.cos(angle - Math.PI / 7), endY - headlen * Math.sin(angle - Math.PI / 7));
    ctx.lineTo(endX - headlen * Math.cos(angle + Math.PI / 7), endY - headlen * Math.sin(angle + Math.PI / 7));
    ctx.closePath();
    ctx.fill();
  }

  // Draw nodes & edges & distances on canvas
  function drawGraph(highlightEdgeIdx = null, highlightRelaxed = false, distProgress = null) {
    ctx.clearRect(0, 0, width, height);

    // Draw edges first under nodes
    edges.forEach((edge, i) => {
      const fromNode = nodes[edge.from];
      const toNode = nodes[edge.to];

      // Choose edge color - if edge is negative weight: warm red
      const baseColor = edge.weight < 0 ? colorEdgeNegative : colorEdge;

      // Highlight edge currently relaxed
      let color = baseColor;
      if (highlightEdgeIdx === i) {
        color = highlightRelaxed ? colorEdgeRelaxed : '#ffff88';
      }

      // Draw curved edge for bidirectional edges overlapping, or straight otherwise
      const reverseEdge = edges.findIndex(e => e.from === edge.to && e.to === edge.from) >= 0;

      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';

      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 2.8;

      ctx.beginPath();

      if (reverseEdge && edge.from < edge.to) {
        // Draw a nice arc between nodes
        const midX = (fromNode.x + toNode.x) / 2;
        const midY = (fromNode.y + toNode.y) / 2;
        const ctrlX = midX + (toNode.y - fromNode.y) * 0.3;
        const ctrlY = midY - (toNode.x - fromNode.x) * 0.3;

        ctx.moveTo(fromNode.x, fromNode.y);
        ctx.quadraticCurveTo(ctrlX, ctrlY, toNode.x, toNode.y);

        ctx.stroke();

        // Draw arrowhead on quadratic curve
        // Calculate point slightly before end
        const t = 0.9;
        // Quadratic Bezier formula
        const cx = ctrlX, cy = ctrlY;
        const x = (1-t)*(1-t)*fromNode.x + 2*(1-t)*t*cx + t*t*toNode.x;
        const y = (1-t)*(1-t)*fromNode.y + 2*(1-t)*t*cy + t*t*toNode.y;
        // Calculate tangent angle
        const dx = 2*(1-t)*(cx - fromNode.x) + 2*t*(toNode.x - cx);
        const dy = 2*(1-t)*(cy - fromNode.y) + 2*t*(toNode.y - cy);

        const angle = Math.atan2(dy, dx);

        // Draw arrowhead
        ctx.beginPath();
        const headlen = arrowSize;
        ctx.fillStyle = color;
        ctx.moveTo(x, y);
        ctx.lineTo(x - headlen * Math.cos(angle - Math.PI / 7), y - headlen * Math.sin(angle - Math.PI / 7));
        ctx.lineTo(x - headlen * Math.cos(angle + Math.PI / 7), y - headlen * Math.sin(angle + Math.PI / 7));
        ctx.closePath();
        ctx.fill();

        // Edge weight label midpoint
        const labelX = ctrlX;
        const labelY = ctrlY - 12;

        ctx.fillStyle = '#e0e6f0cc';
        ctx.font = fontEdgeWeight;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(edge.weight, labelX, labelY);
      } else {
        // Straight line edge
        drawArrow(ctx, fromNode.x, fromNode.y, toNode.x, toNode.y, color);

        // Midpoint for weight label with slight offset perpendicular to line
        const dx = toNode.x - fromNode.x;
        const dy = toNode.y - fromNode.y;
        const mx = (fromNode.x + toNode.x) / 2;
        const my = (fromNode.y + toNode.y) / 2;
        const len = Math.sqrt(dx*dx + dy*dy);
        const offsetX = -(dy / len) * 20;
        const offsetY = (dx / len) * 20;

        ctx.fillStyle = '#e0e6f0cc';
        ctx.font = fontEdgeWeight;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(edge.weight, mx + offsetX, my + offsetY);
      }
    });

    // Draw nodes on top with shadow and highlight
    nodes.forEach((node, i) => {
      const isSource = i === 0;
      // Highlight node if distance updated in current step
      let highlight = false;

      if(distProgress && distProgress.updatedNode === i) {
        highlight = true;
      }

      // Node fill style
      ctx.shadowColor = 'rgba(97,142,231,0.75)';
      ctx.shadowBlur = highlight ? 20 : 8;

      ctx.fillStyle = highlight ? colorNodeRelaxed : colorNode;
      ctx.strokeStyle = '#0c2844';
      ctx.lineWidth = 3;

      ctx.beginPath();
      ctx.ellipse(node.x, node.y, nodeRadius, nodeRadius, 0, 0, 2*Math.PI);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.stroke();

      // Node label
      ctx.fillStyle = '#cddbff';
      ctx.font = fontNodeLabel;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(node.label, node.x, node.y - 10);

      // Distance display below node
      ctx.font = fontWeightDist;
      // Dist value text color - infinity = faded
      if(distProgress && distProgress.dist[i] !== Infinity) {
        ctx.fillStyle = colorDistText;
        ctx.fillText(distProgress.dist[i], node.x, node.y + 22);
      } else {
        ctx.fillStyle = colorDistInfinity;
        ctx.fillText('∞', node.x, node.y + 22);
      }

      // Source marker circle small
      if(isSource) {
        ctx.strokeStyle = '#73a9ff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(node.x, node.y, nodeRadius + 6, nodeRadius + 4, 0, 0, 2*Math.PI);
        ctx.stroke();
      }
    });
  }

  // Animate one step (edge relaxation)
  function animateStep(relaxStepIdx) {
    if(relaxStepIdx >= relaxSteps.length) {
      tooltip.textContent = `Algorithm complete! No more edge relaxations.`;
      animationActive = false;
      stepBtn.textContent = "✔️ Done";
      return;
    }

    animationActive = true;
    currentRelaxStepData = relaxSteps[relaxStepIdx];
    animationStartTime = performance.now();

    // Prepare dist and prev snapshot for showing before this edge relaxation
    // We replay dist and prev up to (relaxStepIdx-1)
    const baseDist = new Array(nodes.length).fill(Infinity);
    baseDist[0] = 0;
    const basePrev = new Array(nodes.length).fill(null);

    for(let i = 0; i < relaxStepIdx; i++) {
      const step = relaxSteps[i];
      if(step.relaxed) {
        const edge = edges[step.edgeIndex];
        baseDist[edge.to] = step.nodeDistNew;
        basePrev[edge.to] = edge.from;
      }
    }

    // We animate the current relaxation: from baseDist to new distance if relaxed
    let animFrame;

    function stepAnimation(time) {
      let progress = (time - animationStartTime) / animationDuration;
      if(progress > 1) progress = 1;

      // Interpolate distance for the involved node if relaxed, else stay at baseDist
      const edge = edges[currentRelaxStepData.edgeIndex];

      // Clone dist for display
      const animDist = [...baseDist];
      if(currentRelaxStepData.relaxed) {
        let fromVal = currentRelaxStepData.nodeDistPrev;
        let toVal = currentRelaxStepData.nodeDistNew;

        // Interpolate
        let currentVal = fromVal + (toVal - fromVal) * progress;
        // For visual clarity, round decimals nicely
        currentVal = Math.round(currentVal * 100) / 100;

        animDist[edge.to] = currentVal;
      }

      drawGraph(
        currentRelaxStepData.edgeIndex,
        currentRelaxStepData.relaxed,
        {dist: animDist, updatedNode: currentRelaxStepData.relaxed ? edge.to : null}
      );

      // Tooltip text update with smooth fade in/out effect
      if(progress < 1) {
        tooltip.style.opacity = 1;
        let baseMsg = `Relaxing edge <strong>${nodes[edge.from].label} → ${nodes[edge.to].label}</strong> with weight <strong>${edge.weight}</strong>`;
        let distMsg = currentRelaxStepData.relaxed
          ? `<br>Distance to <strong>${nodes[edge.to].label}</strong> updated: ${currentRelaxStepData.nodeDistPrev === Infinity ? '∞' : currentRelaxStepData.nodeDistPrev} → ${Math.round(currentRelaxStepData.nodeDistNew*100)/100}`
          : `<br>No update: current distance ${currentRelaxStepData.nodeDistPrev === Infinity ? '∞' : currentRelaxStepData.nodeDistPrev}`;
        tooltip.innerHTML = baseMsg + distMsg;
      } else {
        // End of animation (progress=1)
        tooltip.style.opacity = 1;
        if(currentRelaxStepData.relaxed) {
          tooltip.innerHTML = `✔️ Edge <strong>${nodes[edge.from].label} → ${nodes[edge.to].label}</strong> relaxed. Distance updated to <strong>${currentRelaxStepData.nodeDistNew}</strong>.`;
        } else {
          tooltip.innerHTML = `✖️ Edge <strong>${nodes[edge.from].label} → ${nodes[edge.to].label}</strong> not relaxed.`;
        }
      }

      if(progress < 1) {
        animFrame = requestAnimationFrame(stepAnimation);
      } else {
        animationActive = false;
        animFrame = null;
        currentStep++;
        stepBtn.textContent = currentStep < relaxSteps.length ? "Step ▶️" : "✔️ Done";
      }
    }

    animFrame = requestAnimationFrame(stepAnimation);
  }


  // Event listeners
  stepBtn.addEventListener('click', () => {
    if(animationActive) return;
    if(currentStep >= relaxSteps.length) {
      // Finished - no op
      tooltip.textContent = "Algorithm has completed all relaxation steps.";
      return;
    }
    animateStep(currentStep);
  });

  resetBtn.addEventListener('click', () => {
    if(animationActive) return;
    prepareRelaxSteps();
    reset();
  });

  // Initialize sizes and prepare algorithm on load
  function init() {
    resizeCanvas();
    prepareRelaxSteps();
    reset();
  }

  window.addEventListener('resize', () => {
    if(animationActive) return;
    resizeCanvas();
    drawGraph();
  });

  // Initial call
  init();

})();
</script>

</body>
</html>
