<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PageRank Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Petrona:wght@600&family=Manrope:wght@400;700&display=swap');

  :root {
    --bg-gradient-start: #0f2027;
    --bg-gradient-end: #203a43;
    --node-color: #3aa0d8;
    --node-highlight: #f5a425;
    --link-color: #6eb8e1;
    --link-highlight: #f5a425;
    --text-primary: #f0f6fc;
    --text-secondary: #9db7cf;
    --shadow-glow: rgba(245, 164, 37, 0.6);
    --shadow-dark: rgba(15, 32, 39, 0.8);
  }

  * {
    box-sizing: border-box;
  }

  body, html {
    margin: 0; padding: 0;
    height: 100%;
    background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
      Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    color: var(--text-primary);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  main {
    width: 90vw;
    max-width: 960px;
    padding: 2rem 0 3rem;
  }

  h1 {
    font-family: 'Petrona', serif;
    font-weight: 600;
    font-size: 3.4rem;
    text-align: center;
    letter-spacing: 0.08em;
    color: #f5a425;
    margin-bottom: 0.15em;
    user-select: none;
    text-shadow:
      0 0 6px #f5a425aa,
      0 0 12px #f5a425cc;
  }

  h2 {
    color: var(--text-secondary);
    text-align: center;
    font-weight: 600;
    font-size: 1.3rem;
    letter-spacing: 0.06em;
    margin-bottom: 2rem;
    user-select: none;
  }

  #graph-container {
    width: 100%;
    aspect-ratio: 1 / 1;
    position: relative;
    filter: drop-shadow(0 0 10px var(--shadow-glow));
    border-radius: 1.5rem;
    background: radial-gradient(ellipse 100% 120% at center, #142c42 35%, #0f1e2a 90%);
    box-shadow:
      inset 0 0 45px #0e3c67,
      0 0 35px var(--shadow-glow);
    user-select: none;
  }

  svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }

  /* Node circles */
  circle.node {
    fill: var(--node-color);
    filter: drop-shadow(0 0 6px #2490dc44);
    transition: fill 0.6s ease, r 0.6s ease, filter 0.6s ease;
    cursor: default;
  }

  circle.node.highlighted {
    fill: var(--node-highlight);
    filter: drop-shadow(0 0 14px var(--shadow-glow));
  }

  /* Link lines */
  line.link {
    stroke: var(--link-color);
    stroke-width: 2px;
    stroke-linecap: round;
    opacity: 0.5;
    transition: stroke 0.6s ease, stroke-width 0.6s ease, opacity 0.6s ease;
  }

  line.link.highlighted {
    stroke: var(--link-highlight);
    stroke-width: 3.5px;
    opacity: 1;
  }

  /* Node label text */
  text.node-label {
    fill: var(--text-primary);
    pointer-events: none;
    font-weight: 700;
    font-size: 1rem;
    user-select: none;
    filter: drop-shadow(0 0 2px #0f2027bb);
    transition: fill 0.6s ease;
  }

  /* PageRank value inside nodes */
  text.pagerank {
    font-family: 'Manrope', monospace;
    font-weight: 800;
    font-size: 0.9rem;
    fill: white;
    user-select: none;
    pointer-events: none;
    filter: drop-shadow(0 0 4px #0f2027cc);
    letter-spacing: 0.05em;
    text-anchor: middle;
  }

  /* Control panel */
  #control-panel {
    margin-top: 2.5rem;
    text-align: center;
    user-select: none;
  }

  button {
    background: linear-gradient(145deg, #f5a425 0%, #c97e07 100%);
    border: none;
    border-radius: 36px;
    padding: 0.9rem 2.4rem;
    font-size: 1.05rem;
    font-weight: 700;
    color: #142c42;
    cursor: pointer;
    box-shadow:
      0 0 15px #f5a425cc,
      inset 0 2px 5px #e0a723cc;
    transition:
      box-shadow 0.4s ease,
      background 0.4s ease,
      color 0.4s ease;
    user-select: none;
    letter-spacing: 0.06em;
  }

  button:hover,
  button:focus {
    outline: none;
    background: linear-gradient(145deg, #f5c04f 0%, #d1990a 100%);
    box-shadow:
      0 0 25px #f5c04fcc,
      inset 0 3px 6px #f7c13fcc;
    color: #0f1e2a;
  }

  button:active {
    transform: scale(0.96);
    box-shadow:
      0 0 15px #f5a425cc,
      inset 0 1px 3px #c37e07cc;
  }

  /* Footer text */
  footer {
    margin-top: 4rem;
    text-align: center;
    font-size: 0.86rem;
    color: var(--text-secondary);
    user-select: none;
    font-style: italic;
    letter-spacing: 0.07em;
  }

  /* Responsive adjustments */
  @media (max-width: 600px) {
    h1 {
      font-size: 2.4rem;
    }
    h2 {
      font-size: 1rem;
    }
    button {
      font-size: 0.95rem;
      padding: 0.75rem 2rem;
    }
  }
</style>
</head>
<body>
  <main>
    <h1>PageRank</h1>
    <h2>Visualizing the Power of Link Importance</h2>
    <section id="graph-container" aria-label="PageRank visualization graph">
      <svg viewBox="0 0 800 800" role="img" aria-describedby="desc" preserveAspectRatio="xMidYMid meet">
        <desc id="desc">Graph representation of nodes and their PageRank values, with directed edges.</desc>

        <!-- Links -->
        <line class="link" data-from="0" data-to="1" />
        <line class="link" data-from="0" data-to="2" />
        <line class="link" data-from="1" data-to="2" />
        <line class="link" data-from="2" data-to="0" />
        <line class="link" data-from="2" data-to="3" />
        <line class="link" data-from="3" data-to="4" />
        <line class="link" data-from="4" data-to="2" />
        <line class="link" data-from="4" data-to="5" />
        <line class="link" data-from="5" data-to="3" />
        <line class="link" data-from="5" data-to="6" />
        <line class="link" data-from="6" data-to="4" />

        <!-- Nodes -->
        <g class="node" id="node-0" data-index="0" aria-label="Page A" role="listitem" tabindex="0">
          <circle class="node" cx="400" cy="120" r="42" />
          <text class="node-label" x="400" y="115" text-anchor="middle">A</text>
          <text class="pagerank" x="400" y="155" text-anchor="middle">0.15</text>
        </g>

        <g class="node" id="node-1" data-index="1" aria-label="Page B" role="listitem" tabindex="0">
          <circle class="node" cx="250" cy="280" r="36" />
          <text class="node-label" x="250" y="275" text-anchor="middle">B</text>
          <text class="pagerank" x="250" y="310" text-anchor="middle">0.07</text>
        </g>

        <g class="node" id="node-2" data-index="2" aria-label="Page C" role="listitem" tabindex="0">
          <circle class="node" cx="520" cy="290" r="48" />
          <text class="node-label" x="520" y="285" text-anchor="middle">C</text>
          <text class="pagerank" x="520" y="320" text-anchor="middle">0.22</text>
        </g>

        <g class="node" id="node-3" data-index="3" aria-label="Page D" role="listitem" tabindex="0">
          <circle class="node" cx="660" cy="460" r="33" />
          <text class="node-label" x="660" y="455" text-anchor="middle">D</text>
          <text class="pagerank" x="660" y="485" text-anchor="middle">0.06</text>
        </g>

        <g class="node" id="node-4" data-index="4" aria-label="Page E" role="listitem" tabindex="0">
          <circle class="node" cx="380" cy="520" r="40" />
          <text class="node-label" x="380" y="515" text-anchor="middle">E</text>
          <text class="pagerank" x="380" y="550" text-anchor="middle">0.18</text>
        </g>

        <g class="node" id="node-5" data-index="5" aria-label="Page F" role="listitem" tabindex="0">
          <circle class="node" cx="230" cy="480" r="29" />
          <text class="node-label" x="230" y="475" text-anchor="middle">F</text>
          <text class="pagerank" x="230" y="505" text-anchor="middle">0.05</text>
        </g>

        <g class="node" id="node-6" data-index="6" aria-label="Page G" role="listitem" tabindex="0">
          <circle class="node" cx="130" cy="350" r="32" />
          <text class="node-label" x="130" y="345" text-anchor="middle">G</text>
          <text class="pagerank" x="130" y="375" text-anchor="middle">0.07</text>
        </g>
      </svg>
    </section>

    <div id="control-panel" aria-label="PageRank control panel">
      <button id="animate-btn" aria-pressed="false" aria-label="Animate PageRank iterations">Animate Iterations</button>
    </div>
  </main>
  <footer>
    &copy; 2024 &mdash; PageRank Visualization Demo
  </footer>

<script>
(() => {
  // Graph data structure
  const nodes = [
    { id: "A", index: 0, links: [1, 2] },
    { id: "B", index: 1, links: [2] },
    { id: "C", index: 2, links: [0, 3] },
    { id: "D", index: 3, links: [4] },
    { id: "E", index: 4, links: [2, 5] },
    { id: "F", index: 5, links: [3, 6] },
    { id: "G", index: 6, links: [4] }
  ];

  const numNodes = nodes.length;
  const damping = 0.85;
  const tolerance = 0.0001;
  const maxIterations = 30;

  // SVG Elements references
  const svg = document.querySelector('svg');
  const animateBtn = document.getElementById('animate-btn');

  // Store circle and pagerank text references for quick access
  const nodeCircles = [];
  const nodeRankTexts = [];

  for (let i = 0; i < numNodes; i++) {
    nodeCircles[i] = svg.querySelector(`#node-${i} circle.node`);
    nodeRankTexts[i] = svg.querySelector(`#node-${i} text.pagerank`);
  }

  // Compute adjacency matrix (stochastic)
  // We represent the graph as an adjacency matrix M where M[j][i] = 1/outboundLinks(j) if there's a link j->i
  // PageRank vector p is column vector, satisfying p = damping * M * p + (1-damping) * teleportation

  // Build matrix M as 2D array (size numNodes x numNodes)
  const M = Array.from({ length: numNodes }, () => Array(numNodes).fill(0));

  for (let j = 0; j < numNodes; j++) {
    const outLinks = nodes[j].links;
    const outDegree = outLinks.length;
    if (outDegree === 0) {
      // Dangling node distributes uniformly
      for (let i = 0; i < numNodes; i++) {
        M[i][j] = 1 / numNodes;
      }
    } else {
      for (const dest of outLinks) {
        M[dest][j] = 1 / outDegree;
      }
    }
  }

  // Initialize PageRank vector with uniform probability
  let p = Array(numNodes).fill(1 / numNodes);

  // States for animation
  let isAnimating = false;
  let currentIter = 0;
  let intervalId = null;

  // Utility: format pagerank to 2 decimals as string
  function formatPR(value) {
    return value.toFixed(3);
  }

  // Update node visuals for PageRank values and size
  function updateVisuals(rankVector) {
    const maxPR = Math.max(...rankVector);
    const minPR = Math.min(...rankVector);

    // Map PageRank to radius range 29 to 48 (original radii)
    const minRadius = 29;
    const maxRadius = 48;
    const rangePR = maxPR - minPR || 1;

    for (let i = 0; i < numNodes; i++) {
      const normValue = (rankVector[i] - minPR) / rangePR;
      const radius = minRadius + normValue * (maxRadius - minRadius);
      nodeCircles[i].setAttribute('r', radius.toFixed(1));

      // Animate color glow intensity by ranking
      const glowStrength = 0.4 + 0.6 * normValue;
      nodeCircles[i].style.filter = `drop-shadow(0 0 ${6 + 14 * glowStrength}px rgb(245,164,37,${glowStrength}))`;

      // Update text (PageRank value)
      nodeRankTexts[i].textContent = formatPR(rankVector[i]);
    }
  }

  // Ease function for animation steps
  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  // Smooth animate a tick between two rank vectors
  function animateTick(fromPR, toPR, duration = 1200) {
    return new Promise((resolve) => {
      const startMs = performance.now();

      function step(time) {
        const elapsed = time - startMs;
        const t = Math.min(elapsed / duration, 1);
        const interp = fromPR.map((v,i) => lerp(v, toPR[i], t));

        updateVisuals(interp);

        if (t < 1) {
          requestAnimationFrame(step);
        } else {
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Single iteration of PageRank
  function pageRankIteration(prVec) {
    const newPR = new Array(numNodes).fill(0);
    for (let i = 0; i < numNodes; i++) {
      let sum = 0;
      for (let j = 0; j < numNodes; j++) {
        sum += M[i][j] * prVec[j];
      }
      newPR[i] = damping * sum + (1 - damping) / numNodes;
    }
    return newPR;
  }

  // Animate full iterations
  async function animateIterations() {
    if (isAnimating) return;
    isAnimating = true;
    animateBtn.setAttribute('aria-pressed', 'true');
    animateBtn.textContent = 'Animating…';

    let prevPR = p;
    for (currentIter = 1; currentIter <= maxIterations; currentIter++) {
      const nextPR = pageRankIteration(prevPR);
      await animateTick(prevPR, nextPR);

      // Check convergence (L1 norm)
      const diff = nextPR.reduce((acc, val, i) => acc + Math.abs(val - prevPR[i]), 0);
      prevPR = nextPR;

      if (diff < tolerance) break;
    }
    p = prevPR;

    animateBtn.textContent = 'Animate Iterations';
    animateBtn.setAttribute('aria-pressed', 'false');
    isAnimating = false;
  }

  // Initialize visuals on page load
  updateVisuals(p);

  // Event listener for button
  animateBtn.addEventListener('click', () => {
    if (!isAnimating) {
      animateIterations();
    }
  });

  // Draw arrow markers on links
  function setupArrowMarkers() {
    const ns = "http://www.w3.org/2000/svg";

    // Create defs if not exist
    let defs = svg.querySelector('defs');
    if (!defs) {
      defs = document.createElementNS(ns, 'defs');
      svg.insertBefore(defs, svg.firstChild);
    }

    // Marker for arrowhead
    let marker = defs.querySelector('#arrowhead');
    if (!marker) {
      marker = document.createElementNS(ns, 'marker');
      marker.setAttribute('id', 'arrowhead');
      marker.setAttribute('markerWidth', '7');
      marker.setAttribute('markerHeight', '7');
      marker.setAttribute('refX', '5');
      marker.setAttribute('refY', '3.5');
      marker.setAttribute('orient', 'auto');
      marker.setAttribute('markerUnits', 'strokeWidth');

      const path = document.createElementNS(ns, 'path');
      path.setAttribute('d', 'M0,0 L7,3.5 L0,7 Z');
      path.setAttribute('fill', 'var(--link-color)');
      marker.appendChild(path);
      defs.appendChild(marker);
    }

    // Apply marker-end to all links
    const lines = svg.querySelectorAll('line.link');
    lines.forEach(line => {
      line.setAttribute('marker-end', 'url(#arrowhead)');
    });
  }

  // Position links properly and shorten lines so arrows don't overlap nodes
  function adjustLinkPositions() {
    const padding = 4; // small padding away from node edge
    for (const line of svg.querySelectorAll('line.link')) {
      const fromIndex = +line.dataset.from;
      const toIndex = +line.dataset.to;
      const fromNode = svg.querySelector(`#node-${fromIndex} circle.node`);
      const toNode = svg.querySelector(`#node-${toIndex} circle.node`);

      if (!fromNode || !toNode) continue;

      const x1 = +fromNode.getAttribute('cx');
      const y1 = +fromNode.getAttribute('cy');
      const r1 = +fromNode.getAttribute('r');

      const x2 = +toNode.getAttribute('cx');
      const y2 = +toNode.getAttribute('cy');
      const r2 = +toNode.getAttribute('r');

      const dx = x2 - x1;
      const dy = y2 - y1;
      const dist = Math.hypot(dx, dy);

      if (dist === 0) {
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        continue;
      }

      // shorten line start and end by radius + padding
      const ratioStart = (r1 + padding) / dist;
      const ratioEnd = (r2 + padding + 6) / dist; // +6 for arrow size approx

      const newX1 = x1 + dx * ratioStart;
      const newY1 = y1 + dy * ratioStart;
      const newX2 = x2 - dx * ratioEnd;
      const newY2 = y2 - dy * ratioEnd;

      line.setAttribute('x1', newX1.toFixed(1));
      line.setAttribute('y1', newY1.toFixed(1));
      line.setAttribute('x2', newX2.toFixed(1));
      line.setAttribute('y2', newY2.toFixed(1));
    }
  }

  setupArrowMarkers();
  adjustLinkPositions();

  // Accessibility note: focus outlines for nodes
  const nodeGroups = svg.querySelectorAll('g.node');
  nodeGroups.forEach(g => {
    g.addEventListener('focus', () => {
      const circle = g.querySelector('circle.node');
      if (circle) {
        circle.classList.add('highlighted');
      }
    });
    g.addEventListener('blur', () => {
      const circle = g.querySelector('circle.node');
      if (circle) {
        circle.classList.remove('highlighted');
      }
    });
  });

})();
</script>
</body>
</html>
