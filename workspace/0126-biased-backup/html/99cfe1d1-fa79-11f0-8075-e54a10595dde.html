<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutex Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        button, input {
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>Mutex Simulation</h1>
    
    <h2>Controls</h2>
    <button id="lockBtn">Lock</button>
    <button id="unlockBtn">Unlock</button>
    
    <h2>Thread Simulation</h2>
    <div>
        <button id="startThread1">Start Thread 1</button>
        <button id="startThread2">Start Thread 2</button>
        <button id="stopThread1">Stop Thread 1</button>
        <button id="stopThread2">Stop Thread 2</button>
    </div>
    
    <h2>Thread States</h2>
    <div>
        <span id="thread1State">Thread 1 State: Idle</span><br>
        <span id="thread2State">Thread 2 State: Idle</span>
    </div>
    
    <h2>Mutex State</h2>
    <span id="mutexState">Mutex is Unlocked</span><br>
    
    <script>
        let mutex = false;
        let thread1Active = false;
        let thread2Active = false;

        const lockBtn = document.getElementById('lockBtn');
        const unlockBtn = document.getElementById('unlockBtn');
        const startThread1 = document.getElementById('startThread1');
        const startThread2 = document.getElementById('startThread2');
        const stopThread1 = document.getElementById('stopThread1');
        const stopThread2 = document.getElementById('stopThread2');
        const thread1State = document.getElementById('thread1State');
        const thread2State = document.getElementById('thread2State');
        const mutexState = document.getElementById('mutexState');

        function updateMutexState() {
            mutexState.textContent = mutex ? "Mutex is Locked" : "Mutex is Unlocked";
        }

        function updateThreadState() {
            thread1State.textContent = `Thread 1 State: ${thread1Active ? 'Running' : 'Idle'}`;
            thread2State.textContent = `Thread 2 State: ${thread2Active ? 'Running' : 'Idle'}`;
        }

        lockBtn.addEventListener('click', () => {
            if (!mutex) {
                mutex = true;
                updateMutexState();
            } else {
                alert("Mutex is already locked!");
            }
        });

        unlockBtn.addEventListener('click', () => {
            if (mutex) {
                mutex = false;
                updateMutexState();
            } else {
                alert("Mutex is already unlocked!");
            }
        });

        startThread1.addEventListener('click', () => {
            if (!mutex) {
                thread1Active = true;
                updateThreadState();
            } else {
                alert("Cannot start Thread 1, Mutex is locked!");
            }
        });

        startThread2.addEventListener('click', () => {
            if (!mutex) {
                thread2Active = true;
                updateThreadState();
            } else {
                alert("Cannot start Thread 2, Mutex is locked!");
            }
        });

        stopThread1.addEventListener('click', () => {
            thread1Active = false;
            updateThreadState();
        });

        stopThread2.addEventListener('click', () => {
            thread2Active = false;
            updateThreadState();
        });
    </script>
</body>
</html>
