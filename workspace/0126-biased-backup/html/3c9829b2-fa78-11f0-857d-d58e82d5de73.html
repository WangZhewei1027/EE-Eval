<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Recursion | Visual Elegance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Roboto+Slab:wght@300;600&display=swap');

  /* Reset */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* Colors */
  :root {
    --deep-indigo: #2e1a47;
    --violet-light: #a48be8;
    --violet-mid: #735fcf;
    --violet-dark: #482d7d;
    --accent: #ffc857;
    --bg-dark: #11101d;
    --text-light: #f5f3f7;
    --shadow-glow: rgba(255, 200, 87, 0.25);
  }

  body {
    background: var(--bg-dark);
    font-family: 'Roboto Slab', serif;
    color: var(--text-light);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    padding: 2rem;
    text-align: center;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 3.8rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-shadow:
      0 0 8px var(--accent),
      0 0 16px var(--accent),
      0 0 24px var(--accent);
    margin-bottom: 0.2em;
    user-select: text;
  }

  h2 {
    font-weight: 300;
    font-size: 1.25rem;
    color: var(--violet-light);
    margin-bottom: 3rem;
    font-style: italic;
    text-shadow: 0 0 8px var(--violet-mid);
  }

  /* Container for recursion spiral */
  #recursion-container {
    position: relative;
    width: 420px;
    height: 420px;
    filter:
      drop-shadow(0 0 8px var(--violet-mid))
      drop-shadow(0 0 12px var(--accent));
    user-select: none;
  }

  svg {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Recursive Circles Styling */
  circle {
    fill: none;
    stroke: url(#gradient);
    stroke-width: 2.4;
    mix-blend-mode: screen;
    filter:
      drop-shadow(0 0 6px var(--violet-mid))
      drop-shadow(0 0 8px var(--accent));
    transition: stroke-width 0.35s ease, filter 0.35s ease;
    transform-origin: center center;
    will-change: transform, stroke-width;
  }

  /* Animation for recursion effect */
  @keyframes spin-recursion {
    0% {
      transform: rotate(0);
      opacity: 1;
      stroke-width: 2.4;
    }
    50% {
      transform: rotate(16deg);
      opacity: 0.85;
      stroke-width: 3.2;
    }
    100% {
      transform: rotate(0);
      opacity: 1;
      stroke-width: 2.4;
    }
  }

  circle.recursive {
    animation: spin-recursion 8s ease-in-out infinite;
    transform-origin: 210px 210px;
  }

  /* Slight delays for a mesmerizing swirl */
  circle.recursive:nth-child(1) { animation-delay: 0s; }
  circle.recursive:nth-child(2) { animation-delay: 0.5s; }
  circle.recursive:nth-child(3) { animation-delay: 1.0s; }
  circle.recursive:nth-child(4) { animation-delay: 1.5s; }
  circle.recursive:nth-child(5) { animation-delay: 2.0s; }
  circle.recursive:nth-child(6) { animation-delay: 2.5s; }
  circle.recursive:nth-child(7) { animation-delay: 3.0s; }
  circle.recursive:nth-child(8) { animation-delay: 3.5s; }

  /* Controls styled as minimal gold-glow buttons */

  #controls {
    margin-top: 2.6rem;
    display: flex;
    gap: 1.4rem;
  }

  button {
    background: linear-gradient(145deg, #ffdc65, #cca433);
    border: none;
    border-radius: 34px;
    padding: 0.75rem 2.2rem;
    font-family: 'Roboto Slab', serif;
    font-weight: 600;
    font-size: 1.05rem;
    color: var(--deep-indigo);
    cursor: pointer;
    box-shadow:
      0 0 10px var(--accent),
      inset 0 0 14px #efcb56;
    transition:
      background 0.3s ease,
      box-shadow 0.3s ease,
      color 0.3s ease;
    user-select: none;
  }
  button:hover, button:focus {
    background: linear-gradient(145deg, #fbde79, #d4b23f);
    box-shadow:
      0 0 18px var(--accent),
      inset 0 0 20px #ffda78;
    outline: none;
  }

  /* Footer highlight with subtle recursion symbol */
  footer {
    font-family: 'Roboto Slab', serif;
    font-size: 0.9rem;
    color: var(--violet-mid);
    margin-top: 3.8rem;
    opacity: 0.75;
    user-select: none;
    letter-spacing: 0.06em;
  }

  /* Blink subtle "exceptional" accent */
  #exceptional {
    color: var(--accent);
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    animation: pulseAccent 3.8s ease-in-out infinite;
  }
  @keyframes pulseAccent {
    0%, 100% { text-shadow: 0 0 20px var(--accent); }
    50% { text-shadow: 0 0 40px #fff1b6; }
  }

  /* Responsive scaling */
  @media (max-width: 480px) {
    #recursion-container {
      width: 90vw;
      height: 90vw;
    }
    h1 {
      font-size: 2.7rem;
    }
    h2 {
      font-size: 1rem;
    }
  }
</style>
</head>
<body>

  <h1>RECURSION</h1>
  <h2>Visualizing infinity through iterative echoes</h2>

  <div id="recursion-container" aria-label="Recursive spiraling circles animation" role="img" tabindex="0">
    <svg viewBox="0 0 420 420" aria-hidden="true" focusable="false" >
      <defs>
        <radialGradient id="gradient" cx="50%" cy="50%" r="70%">
          <stop offset="0%" stop-color="var(--accent)" stop-opacity="1"/>
          <stop offset="50%" stop-color="var(--violet-mid)" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="var(--violet-dark)" stop-opacity="0.15"/>
        </radialGradient>
      </defs>

      <!-- Recursive circles -->

      <!-- We will create nested circles decreasing in size and offset -->
      <!-- Each circle is offset by rotation and scaling to simulate recursion -->

      <g id="recursiveGroup" transform="translate(210 210)">
        <!-- JavaScript will generate circles inside this group -->
      </g>
    </svg>
  </div>

  <div id="controls" aria-label="Recursion controls">
    <button id="toggleAnimation" aria-pressed="true" aria-label="Pause recursion animation">Pause</button>
    <button id="resetAnimation" aria-label="Reset recursion animation">Reset</button>
  </div>

  <footer>
    <span>Experience the </span><span id="exceptional">EXCEPTIONAL</span><span> beauty of recursion — where patterns echo infinitely.</span>
  </footer>

<script>
  const svgNS = "http://www.w3.org/2000/svg";
  const group = document.getElementById('recursiveGroup');

  // Parameters for recursion visuals
  const baseRadius = 190; // max radius of largest circle
  const minRadius = 30;   // smallest circle radius
  const recursionCount = 8; // number of circles to draw (depth)

  // Function to create circles and apply recursion-like scaling + rotation
  function createRecursiveCircles() {
    // Clear existing circles
    while (group.firstChild) group.removeChild(group.firstChild);

    // Recursion-like fractal scaling factor
    const scaleStep = 0.72;
    let currentScale = 1;

    for(let i = 0; i < recursionCount; i++) {
      const r = baseRadius * currentScale;
      const circle = document.createElementNS(svgNS, 'circle');

      circle.setAttribute('cx', 0);
      circle.setAttribute('cy', 0);
      circle.setAttribute('r', r);
      circle.classList.add('recursive');

      // Each circle rotated by i*20 degrees for a gentle swirl
      const rotate = i * 20;

      circle.style.transformOrigin = '0px 0px'; // Center of group
      circle.style.transformBox = 'fill-box';

      // Apply transform: rotate + scale to simulate recursive spiral
      circle.style.transform = `rotate(${rotate}deg)`;
      circle.style.animationDelay = `${i * 0.5}s`;

      group.appendChild(circle);

      currentScale *= scaleStep;
      if (r * scaleStep < minRadius) break;
    }
  }

  createRecursiveCircles();

  // Animation control buttons
  const toggleBtn = document.getElementById('toggleAnimation');
  const resetBtn = document.getElementById('resetAnimation');

  let animationRunning = true;

  toggleBtn.addEventListener('click', () => {
    animationRunning = !animationRunning;
    const circles = group.querySelectorAll('circle.recursive');

    if(animationRunning) {
      circles.forEach(c => c.style.animationPlayState = 'running');
      toggleBtn.textContent = 'Pause';
      toggleBtn.setAttribute('aria-pressed', 'true');
      toggleBtn.setAttribute('aria-label', 'Pause recursion animation');
    } else {
      circles.forEach(c => c.style.animationPlayState = 'paused');
      toggleBtn.textContent = 'Play';
      toggleBtn.setAttribute('aria-pressed', 'false');
      toggleBtn.setAttribute('aria-label', 'Play recursion animation');
    }
  });

  resetBtn.addEventListener('click', () => {
    // Reset animation by forcing reflow
    const circles = group.querySelectorAll('circle.recursive');
    circles.forEach(c => {
      c.style.animation = 'none';
      void c.offsetWidth; // trigger reflow
      c.style.animation = '';
    });
  });

  // Initialize animation state (running)
  toggleBtn.click(); // Toggle once to ensure proper ARIA, then toggle back
  toggleBtn.click();

</script>

</body>
</html>
