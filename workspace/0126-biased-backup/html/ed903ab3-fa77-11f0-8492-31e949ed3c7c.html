<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Means Clustering Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #container {
            position: relative;
            width: 80vw;
            height: 80vh;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            background: rgba(255, 255, 255, 0.1);
        }

        #title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5em;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        #playButton {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        #playButton:hover {
            background-color: rgba(255, 255, 255, 0.5);
        }

        .dot {
            position: absolute;
            border-radius: 50%;
            transition: transform 0.3s ease;
        }

        #clusters {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="container">
        <h1 id="title">K-Means Clustering Visualization</h1>
        <button id="playButton">Run K-Means</button>
        <div id="clusters"></div>
    </div>

    <script>
        const clustersDiv = document.getElementById('clusters');
        const playButton = document.getElementById('playButton');

        const numPoints = 100;
        let points = [];
        let centroids = [];
        let numClusters = 3;

        function initPoints() {
            points = [];
            for (let i = 0; i < numPoints; i++) {
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                points.push({ x, y });
            }
        }

        function initCentroids() {
            centroids = [];
            for (let i = 0; i < numClusters; i++) {
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                centroids.push({ x, y });
            }
        }

        function drawPoints() {
            clustersDiv.innerHTML = '';
            points.forEach((point, index) => {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.style.width = '8px';
                dot.style.height = '8px';
                dot.style.backgroundColor = `hsl(${(index / numPoints) * 360}, 100%, 50%)`;
                dot.style.left = `${point.x}%`;
                dot.style.top = `${point.y}%`;
                clustersDiv.appendChild(dot);
            });
        }

        function drawCentroids() {
            centroids.forEach(centroid => {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.style.width = '15px';
                dot.style.height = '15px';
                dot.style.backgroundColor = 'white';
                dot.style.left = `${centroid.x}%`;
                dot.style.top = `${centroid.y}%`;
                clustersDiv.appendChild(dot);
            });
        }

        playButton.addEventListener('click', () => {
            initPoints();
            initCentroids();
            drawPoints();
            drawCentroids();
        });
    </script>
</body>

</html>
