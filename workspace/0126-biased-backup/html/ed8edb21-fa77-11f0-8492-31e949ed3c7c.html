<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Memory Visualization</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #0c1c27;
            color: #ffffff;
            overflow: hidden;
        }
        header {
            text-align: center;
            padding: 20px;
            background-color: #183d4d;
        }
        h1 {
            font-size: 3em;
            margin: 0;
            color: #00bcd4;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }
        h2 {
            font-size: 1.5em;
            color: #94d0e1;
        }
        .canvas-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70vh;
            position: relative;
        }
        #memoryCanvas {
            border: 3px solid #00bcd4;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
        }
        .controls {
            text-align: center;
            margin-top: 20px;
        }
        button {
            background-color: #00bcd4;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
        }
        button:hover {
            background-color: #0097a7;
            transform: scale(1.05);
        }
        footer {
            text-align: center;
            padding: 10px;
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: #183d4d;
        }
    </style>
</head>
<body>
    <header>
        <h1>Virtual Memory Concept</h1>
        <h2>Observe the Allocation and Paging Process</h2>
    </header>
    <div class="canvas-container">
        <canvas id="memoryCanvas" width="800" height="400"></canvas>
    </div>
    <div class="controls">
        <button id="startAnimation">Start Animation</button>
    </div>
    <footer>
        <p>&copy; 2023 Virtual Memory Visualization</p>
    </footer>
    <script>
        const canvas = document.getElementById('memoryCanvas');
        const ctx = canvas.getContext('2d');
        let pages = [];
        let animationInterval;

        // Initialize pages
        for(let i = 0; i < 8; i++) {
            pages.push({ id: i + 1, loaded: false });
        }

        function drawMemory() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1f3d48';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const pageWidth = canvas.width / pages.length;
            pages.forEach((page, index) => {
                if (page.loaded) {
                    ctx.fillStyle = '#00bcd4';
                    ctx.fillRect(index * pageWidth, 0, pageWidth, canvas.height);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '20px Arial';
                    ctx.fillText(`Page ${page.id}`, index * pageWidth + pageWidth / 3, canvas.height / 2);
                } else {
                    ctx.fillStyle = '#4e4e4e';
                    ctx.fillRect(index * pageWidth, 0, pageWidth, canvas.height);
                    ctx.fillStyle = '#cccccc';
                    ctx.fillText(`Page ${page.id}`, index * pageWidth + pageWidth / 3, canvas.height / 2);
                }
            });
        }

        function animatePages() {
            let currentPage = 0;
            animationInterval = setInterval(() => {
                if (currentPage < pages.length) {
                    pages[currentPage].loaded = true;
                    currentPage++;
                } else {
                    clearInterval(animationInterval);
                }
                drawMemory();
            }, 1000);
        }

        document.getElementById('startAnimation').addEventListener('click', () => {
            pages.forEach(page => page.loaded = false); // Reset pages
            animatePages();
        });

        drawMemory(); // Initial drawing
    </script>
</body>
</html>
