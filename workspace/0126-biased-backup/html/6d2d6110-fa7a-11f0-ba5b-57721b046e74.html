<!DOCTYPE html>
<html>
<head>
    <title>Interactive Max Heap</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .control-group {
            border: 1px solid #ccc;
            padding: 10px;
            margin-right: 10px;
        }
        .heap-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .heap-level {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .heap-node {
            border: 1px solid black;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 10px;
            position: relative;
        }
        .heap-node.highlight {
            background-color: #f0f0f0;
        }
        .heap-node.active {
            font-weight: bold;
            border-width: 2px;
        }
        .heap-node.max {
            border-color: red;
        }
        .heap-lines {
            position: absolute;
            width: 100%;
            height: 20px;
            top: -20px;
        }
        .line-left, .line-right {
            position: absolute;
            width: 25px;
            height: 20px;
            border-top: 1px solid black;
        }
        .line-left {
            left: 0;
            border-right: 1px solid black;
        }
        .line-right {
            right: 0;
            border-left: 1px solid black;
        }
        .explanation {
            margin-top: 20px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
        input[type="number"] {
            width: 60px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interactive Max Heap</h1>
        
        <div class="controls">
            <div class="control-group">
                <h3>Heap Operations</h3>
                <button id="insert-btn">Insert Random</button>
                <button id="extract-max-btn">Extract Max</button>
                <button id="heapify-btn">Heapify Array</button>
                <button id="clear-btn">Clear Heap</button>
            </div>
            
            <div class="control-group">
                <h3>Manual Insert</h3>
                <input type="number" id="insert-value" min="-100" max="100" value="10">
                <button id="manual-insert-btn">Insert Value</button>
            </div>
            
            <div class="control-group">
                <h3>Heap Size</h3>
                <input type="range" id="heap-size-slider" min="0" max="15" value="0">
                <span id="heap-size-value">0</span>
            </div>
            
            <div class="control-group">
                <h3>Animation Speed</h3>
                <input type="range" id="speed-slider" min="100" max="2000" value="500">
                <span id="speed-value">500ms</span>
            </div>
            
            <div class="control-group">
                <h3>Heap Array</h3>
                <div id="heap-array"></div>
            </div>
        </div>
        
        <div class="heap-container" id="heap-visualization">
            <!-- Heap will be rendered here -->
        </div>
        
        <div class="explanation" id="explanation">
            <h3>Current Operation</h3>
            <p>No operation in progress. Use the controls above to interact with the heap.</p>
        </div>
    </div>

    <script>
        class MaxHeap {
            constructor() {
                this.heap = [];
                this.animationSpeed = 500;
                this.operationInProgress = false;
            }
            
            insert(value) {
                if (this.operationInProgress) return;
                this.operationInProgress = true;
                
                this.updateExplanation(`Inserting ${value} into the heap...`);
                this.heap.push(value);
                this.renderHeap();
                
                let currentIndex = this.heap.length - 1;
                this.highlightNode(currentIndex);
                
                const bubbleUp = () => {
                    if (currentIndex === 0) {
                        this.completeOperation(`Insertion complete. ${value} is now in the heap.`);
                        return;
                    }
                    
                    const parentIndex = Math.floor((currentIndex - 1) / 2);
                    this.highlightNode(parentIndex);
                    
                    setTimeout(() => {
                        if (this.heap[currentIndex] > this.heap[parentIndex]) {
                            this.updateExplanation(`Swapping ${this.heap[currentIndex]} with parent ${this.heap[parentIndex]}...`);
                            [this.heap[currentIndex], this.heap[parentIndex]] = [this.heap[parentIndex], this.heap[currentIndex]];
                            this.renderHeap();
                            currentIndex = parentIndex;
                            this.highlightNode(currentIndex);
                            setTimeout(bubbleUp, this.animationSpeed);
                        } else {
                            this.completeOperation(`Insertion complete. ${value} is now in the heap.`);
                        }
                    }, this.animationSpeed);
                };
                
                setTimeout(bubbleUp, this.animationSpeed);
            }
            
            extractMax() {
                if (this.operationInProgress || this.heap.length === 0) return;
                this.operationInProgress = true;
                
                const maxValue = this.heap[0];
                this.updateExplanation(`Extracting max value (${maxValue}) from the heap...`);
                this.highlightNode(0);
                
                setTimeout(() => {
                    if (this.heap.length === 1) {
                        this.heap.pop();
                        this.renderHeap();
                        this.completeOperation(`Extracted max value: ${maxValue}. Heap is now empty.`);
                        return;
                    }
                    
                    this.heap[0] = this.heap.pop();
                    this.updateExplanation(`Replaced root with ${this.heap[0]}. Now heapifying down...`);
                    this.renderHeap();
                    this.highlightNode(0);
                    
                    let currentIndex = 0;
                    const heapifyDown = () => {
                        const leftChildIndex = 2 * currentIndex + 1;
                        const rightChildIndex = 2 * currentIndex + 2;
                        let largestIndex = currentIndex;
                        
                        if (leftChildIndex < this.heap.length) {
                            this.highlightNode(leftChildIndex, 'highlight');
                        }
                        if (rightChildIndex < this.heap.length) {
                            this.highlightNode(rightChildIndex, 'highlight');
                        }
                        
                        setTimeout(() => {
                            if (leftChildIndex < this.heap.length && this.heap[leftChildIndex] > this.heap[largestIndex]) {
                                largestIndex = leftChildIndex;
                            }
                            
                            if (rightChildIndex < this.heap.length && this.heap[rightChildIndex] > this.heap[largestIndex]) {
                                largestIndex = rightChildIndex;
                            }
                            
                            if (largestIndex !== currentIndex) {
                                this.updateExplanation(`Swapping ${this.heap[currentIndex]} with ${this.heap[largestIndex]}...`);
                                [this.heap[currentIndex], this.heap[largestIndex]] = [this.heap[largestIndex], this.heap[currentIndex]];
                                this.renderHeap();
                                currentIndex = largestIndex;
                                this.highlightNode(currentIndex);
                                setTimeout(heapifyDown, this.animationSpeed);
                            } else {
                                this.completeOperation(`Extracted max value: ${maxValue}. Heap property restored.`);
                            }
                        }, this.animationSpeed);
                    };
                    
                    setTimeout(heapifyDown, this.animationSpeed);
                }, this.animationSpeed);
            }
            
            heapify(array) {
                if (this.operationInProgress) return;
                this.operationInProgress = true;
                
                this.heapSize = array.length;
                this.heap = [...array];
                this.renderHeap();
                this.updateExplanation(`Building max heap from array [${array.join(', ')}]...`);
                
                const startIdx = Math.floor(this.heap.length / 2) - 1;
                
                const heapifyAt = (index, callback) => {
                    this.highlightNode(index);
                    
                    setTimeout(() => {
                        const left = 2 * index + 1;
                        const right = 2 * index + 2;
                        let largest = index;
                        
                        if (left < this.heap.length) this.highlightNode(left, 'highlight');
                        if (right < this.heap.length) this.highlightNode(right, 'highlight');
                        
                        setTimeout(() => {
                            if (left < this.heap.length && this.heap[left] > this.heap[largest]) {
                                largest = left;
                            }
                            
                            if (right < this.heap.length && this.heap[right] > this.heap[largest]) {
                                largest = right;
                            }
                            
                            if (largest !== index) {
                                this.updateExplanation(`Swapping ${this.heap[index]} with ${this.heap[largest]}...`);
                                [this.heap[index], this.heap[largest]] = [this.heap[largest], this.heap[index]];
                                this.renderHeap();
                                this.highlightNode(largest);
                                setTimeout(() => heapifyAt(largest, callback), this.animationSpeed);
                            } else {
                                callback();
                            }
                        }, this.animationSpeed);
                    }, this.animationSpeed);
                };
                
                const processIndexes = (i) => {
                    if (i < 0) {
                        this.completeOperation(`Heap built successfully. Max heap property satisfied.`);
                        return;
                    }
                    
                    heapifyAt(i, () => {
                        processIndexes(i - 1);
                    });
                };
                
                processIndexes(startIdx);
            }
            
            renderHeap() {
                const container = document.getElementById('heap-visualization');
                container.innerHTML = '';
                
                if (this.heap.length === 0) {
                    container.innerHTML = '<p>Heap is empty</p>';
                    document.getElementById('heap-array').textContent = '[]';
                    return;
                }
                
                document.getElementById('heap-array').textContent = `[${this.heap.join(', ')}]`;
                
                const levels = Math.ceil(Math.log2(this.heap.length + 1));
                
                for (let level = 0; level < levels; level++) {
                    const levelStart = Math.pow(2, level) - 1;
                    const levelEnd = Math.min(Math.pow(2, level + 1) - 1, this.heap.length);
                    
                    const levelDiv = document.createElement('div');
                    levelDiv.className = 'heap-level';
                    
                    for (let i = levelStart; i < levelEnd; i++) {
                        const node = document.createElement('div');
                        node.className = 'heap-node';
                        node.textContent = this.heap[i];
                        node.dataset.index = i;
                        
                        if (i === 0) {
                            node.classList.add('max');
                        }
                        
                        // Add lines to children if they exist
                        if (2 * i + 1 < this.heap.length || 2 * i + 2 < this.heap.length) {
                            const lines = document.createElement('div');
                            lines.className = 'heap-lines';
                            
                            if (2 * i + 1 < this.heap.length) {
                                const lineLeft = document.createElement('div');
                                lineLeft.className = 'line-left';
                                lines.appendChild(lineLeft);
                            }
                            
                            if (2 * i + 2 < this.heap.length) {
                                const lineRight = document.createElement('div');
                                lineRight.className = 'line-right';
                                lines.appendChild(lineRight);
                            }
                            
                            node.appendChild(lines);
                        }
                        
                        levelDiv.appendChild(node);
                    }
                    
                    container.appendChild(levelDiv);
                }
            }
            
            highlightNode(index, className = 'active') {
                const nodes = document.querySelectorAll('.heap-node');
                nodes.forEach(node => node.classList.remove('active', 'highlight'));
                
                if (index >= 0 && index < nodes.length) {
                    nodes[index].classList.add(className);
                }
            }
            
            updateExplanation(text) {
                document.getElementById('explanation').innerHTML = `
                    <h3>Current Operation</h3>
                    <p>${text}</p>
                `;
            }
            
            completeOperation(text) {
                this.updateExplanation(text);
                this.operationInProgress = false;
                this.renderHeap();
            }
        }
        
        // Initialize heap and UI
        const heap = new MaxHeap();
        
        // Event listeners
        document.getElementById('insert-btn').addEventListener('click', () => {
            const value = Math.floor(Math.random() * 100) + 1;
            heap.insert(value);
        });
        
        document.getElementById('manual-insert-btn').addEventListener('click', () => {
            const value = parseInt(document.getElementById('insert-value').value);
            if (!isNaN(value)) {
                heap.insert(value);
            }
        });
        
        document.getElementById('extract-max-btn').addEventListener('click', () => {
            heap.extractMax();
        });
        
        document.getElementById('heapify-btn').addEventListener('click', () => {
            const size = parseInt(document.getElementById('heap-size-slider').value);
            const array = [];
            for (let i = 0; i < size; i++) {
                array.push(Math.floor(Math.random() * 100) + 1);
            }
            heap.heapify(array);
        });
        
        document.getElementById('clear-btn').addEventListener('click', () => {
            heap.heap = [];
            heap.renderHeap();
            heap.updateExplanation('Heap cleared.');
        });
        
        document.getElementById('heap-size-slider').addEventListener('input', (e) => {
            document.getElementById('heap-size-value').textContent = e.target.value;
        });
        
        document.getElementById('speed-slider').addEventListener('input', (e) => {
            heap.animationSpeed = parseInt(e.target.value);
            document.getElementById('speed-value').textContent = `${e.target.value}ms`;
        });
        
        // Initial render
        heap.renderHeap();
    </script>
</body>
</html>
