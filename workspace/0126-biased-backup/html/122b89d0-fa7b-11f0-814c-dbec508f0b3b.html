<!DOCTYPE html>
<html>
<head>
    <title>Merge Sort</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
        }
        #result {
            font-size: 12pt;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>Merge Sort</h1>
    <div id="result"></div>
    <div>
        <label for="n">Input size:</label>
        <input type="number" id="n" value="10" min="2">
        <button id="sort-btn">Sort</button>
    </div>
    <div id="controls">
        <label for="sort-type">Sort type:</label>
        <select id="sort-type" value="ascending">
            <option value="ascending">Ascending</option>
            <option value="descending">Descending</option>
        </select>
        <label for="reverse">Reverse:</label>
        <input type="checkbox" id="reverse" value="true">
        <label for="reverse">Reverse</label>
        <label for="step">Step:</label>
        <input type="number" id="step" value="2" min="1">
    </div>
    <div id="input-container">
        <button id="clear-btn">Clear</button>
        <input type="number" id="input-field" value="1" min="1">
        <button id="add-btn">Add</button>
        <button id="sort-btn">Sort</button>
    </div>

    <script>
        let input = document.getElementById('input-field');
        let result = document.getElementById('result');
        let sortBtn = document.getElementById('sort-btn');
        let controls = document.getElementById('controls');
        let clearBtn = document.getElementById('clear-btn');
        let addBtn = document.getElementById('add-btn');
        let n = document.getElementById('n');
        let sortType = document.getElementById('sort-type');
        let reverse = document.getElementById('reverse');
        let step = document.getElementById('step');
        let inputContainer = document.getElementById('input-container');
        let inputField = document.getElementById('input-field');

        let mergeSort = function(arr) {
            if (arr.length <= 1) {
                return arr;
            }
            let mid = Math.floor(arr.length / 2);
            let left = arr.slice(0, mid);
            let right = arr.slice(mid);
            return merge(mergeSort(left), mergeSort(right));
        }

        function merge(left, right) {
            let result = [];
            while (left.length > 0 && right.length > 0) {
                if (left[0] <= right[0]) {
                    result.push(left.shift());
                } else {
                    result.push(right.shift());
                }
            }
            result.push(...left);
            result.push(...right);
            return result;
        }

        function sort(arr) {
            let sortedArr = mergeSort(arr);
            let sortedHtml = '';
            for (let i = 0; i < sortedArr.length; i++) {
                sortedHtml += sortedArr[i] + ' ';
            }
            result.innerHTML = '<h1>Merge Sort Result:</h1><p>' + sortedHtml + '</p>';
        }

        function reverseSort(arr) {
            let sortedArr = mergeSort(arr);
            let sortedHtml = '';
            for (let i = sortedArr.length - 1; i >= 0; i--) {
                sortedHtml += sortedArr[i] + ' ';
            }
            result.innerHTML = '<h1>Merge Sort Result:</h1><p>' + sortedHtml + '</p>';
        }

        function addToList() {
            let arr = [];
            while (inputField.value > 0) {
                arr.push(parseInt(inputField.value));
                inputField.value = 0;
            }
            sort(arr);
        }

        function clearList() {
            result.innerHTML = '';
        }

        addBtn.addEventListener('click', addToList);
        clearBtn.addEventListener('click', clearList);
        inputField.addEventListener('input', function() {
            inputField.value = 0;
        });
        sortBtn.addEventListener('click', sort);
        sortType.addEventListener('change', function() {
            if (sortType.value === 'ascending') {
                sortBtn.textContent = 'Reverse Sort';
                reverseSort = function(arr) {
                    let sortedArr = mergeSort(arr);
                    let sortedHtml = '';
                    for (let i = 0; i < sortedArr.length; i++) {
                        sortedHtml += sortedArr[i] + ' ';
                    }
                    result.innerHTML = '<h1>Merge Sort Result:</h1><p>' + sortedHtml + '</p>';
                    return sortedHtml;
                }
                reverseSort = function(arr) {
                    let sortedArr = mergeSort(arr);
                    let sortedHtml = '';
                    for (let i = sortedArr.length - 1; i >= 0; i--) {
                        sortedHtml += sortedArr[i] + ' ';
                    }
                    result.innerHTML = '<h1>Merge Sort Result:</h1><p>' + sortedHtml + '</p>';
                    return sortedHtml;
                }
            } else {
                sortBtn.textContent = 'Reverse Sort';
                reverseSort = function(arr) {
                    let sortedArr = mergeSort(arr);
                    let sortedHtml = '';
                    for (let i = 0; i < sortedArr.length; i++) {
                        sortedHtml += sortedArr[i] + ' ';
                    }
                    result.innerHTML = '<h1>Merge Sort Result:</h1><p>' + sortedHtml + '</p>';
                    return sortedHtml;
                }
                reverseSort = function(arr) {
                    let sortedArr = mergeSort(arr);
                    let sortedHtml = '';
                    for (let i = sortedArr.length - 1; i >= 0; i--) {
                        sortedHtml += sortedArr[i] + ' ';
                    }
                    result.innerHTML = '<h1>Merge Sort Result:</h1><p>' + sortedHtml + '</p>';
                    return sortedHtml;
                }
            }
        });
    </script>
</body>
</html>
