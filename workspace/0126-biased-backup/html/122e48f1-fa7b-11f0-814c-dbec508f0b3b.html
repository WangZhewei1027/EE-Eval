<!DOCTYPE html>
<html>
<head>
    <title>K-Means Clustering</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #4CAF50;
            color: #fff;
        }
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>K-Means Clustering</h2>
        <p>Number of clusters: <input type="number" id="num_clusters" value="3" /></p>
        <p>Max iterations: <input type="number" id="max_iterations" value="100" /></p>
        <button id="generate_button">Generate Clustering</button>
        <button id="reset_button">Reset</button>
        <div class="button-container">
            <button id="cluster_button">Cluster</button>
            <button id="visualize_button">Visualize</button>
            <button id="save_button">Save</button>
        </div>
        <div class="cluster-container">
            <h2>Cluster 1</h2>
            <div id="cluster1"></div>
            <h2>Cluster 2</h2>
            <div id="cluster2"></div>
            <h2>Cluster 3</h2>
            <div id="cluster3"></div>
        </div>
    </div>

    <script>
        let num_clusters = 3;
        let max_iterations = 100;
        let clusters = [];

        document.getElementById('generate_button').addEventListener('click', generate_clusters);
        document.getElementById('reset_button').addEventListener('click', reset_clusters);
        document.getElementById('cluster_button').addEventListener('click', cluster_clusters);
        document.getElementById('visualize_button').addEventListener('click', visualize_clusters);
        document.getElementById('save_button').addEventListener('click', save_clusters);

        function generate_clusters() {
            let data = [];
            for (let i = 0; i < 100; i++) {
                data.push({
                    x: Math.random() * 100,
                    y: Math.random() * 100
                });
            }
            let kmeans = new KMeans(num_clusters, data, max_iterations);
            let clusters = kmeans.cluster();
            for (let i = 0; i < num_clusters; i++) {
                clusters[i].data.forEach(point => {
                    document.getElementById(`cluster${i+1}`).innerHTML += `<div class="point">${point.x} ${point.y}</div>`;
                });
            }
        }

        function reset_clusters() {
            num_clusters = 3;
            max_iterations = 100;
            clusters = [];
            document.getElementById('cluster1').innerHTML = '';
            document.getElementById('cluster2').innerHTML = '';
            document.getElementById('cluster3').innerHTML = '';
        }

        function cluster_clusters() {
            let data = [];
            for (let i = 0; i < 100; i++) {
                data.push({
                    x: Math.random() * 100,
                    y: Math.random() * 100
                });
            }
            let kmeans = new KMeans(num_clusters, data, max_iterations);
            let clusters = kmeans.cluster();
            for (let i = 0; i < num_clusters; i++) {
                clusters[i].data.forEach(point => {
                    document.getElementById(`cluster${i+1}`).innerHTML += `<div class="point">${point.x} ${point.y}</div>`;
                });
            }
        }

        function visualize_clusters() {
            let data = [];
            for (let i = 0; i < 100; i++) {
                data.push({
                    x: Math.random() * 100,
                    y: Math.random() * 100
                });
            }
            let clusters = [];
            for (let i = 0; i < num_clusters; i++) {
                let cluster_data = [];
                for (let j = 0; j < 100; j++) {
                    cluster_data.push({
                        x: Math.random() * 100,
                        y: Math.random() * 100
                    });
                }
                clusters.push(cluster_data);
            }
            let points = document.querySelectorAll('.point');
            let clusters_points = document.querySelectorAll('.cluster');
            for (let i = 0; i < num_clusters; i++) {
                for (let j = 0; j < clusters.length; j++) {
                    for (let k = 0; k < clusters[j].length; k++) {
                        if (clusters[j][k].x < 100 && clusters[j][k].y < 100) {
                            points[j].innerHTML += `<div class="point" data-point="${clusters[j][k].x}" data-point-index="${j}">Point ${clusters[j][k].x} ${clusters[j][k].y}</div>`;
                        }
                    }
                }
            }
        }

        function save_clusters() {
            let clusters_data = [];
            for (let i = 0; i < num_clusters; i++) {
                let cluster_data = [];
                for (let j = 0; j < clusters[i].length; j++) {
                    cluster_data.push({
                        x: clusters[i][j].x,
                        y: clusters[i][j].y,
                        point_index: i
                    });
                }
                clusters_data.push(cluster_data);
            }
            let data = {
                points: document.querySelectorAll('.point'),
                clusters: clusters_data
            };
            let blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            let link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'clusters.json';
            link.click();
        }

        function KMeans(num_clusters, data, max_iterations) {
            let kmeans = {};
            for (let i = 0; i < num_clusters; i++) {
                kmeans[i] = new KMeansImpl(data, i, max_iterations);
            }
            return kmeans;
        }

        function KMeansImpl(data, cluster_index, max_iterations) {
            let centroids = data.slice(0, cluster_index).map(point => ({ x: point.x, y: point.y }));
            for (let i = 0; i < max_iterations; i++) {
                let clusters = data.slice(cluster_index);
                let new_centroids = [];
                for (let j = 0; j < clusters.length; j++) {
                    let point = clusters[j].pop();
                    let minDistance = Infinity;
                    let bestIndex = -1;
                    for (let k = 0; k < centroids.length; k++) {
                        let distance = Math.sqrt(Math.pow(point.x - centroids[k].x, 2) + Math.pow(point.y - centroids[k].y, 2));
                        if (distance < minDistance) {
                            minDistance = distance;
                            bestIndex = k;
                        }
                    }
                    new_centroids.push({ x: point.x, y: point.y, index: bestIndex });
                }
                centroids = new_centroids;
                if (centroids.every(point => point.index === cluster_index)) {
                    break;
                }
            }
            return centroids;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/kmeansjs@1.0.2/dist/kmeans.min.js"></script>
</body>
</html>
