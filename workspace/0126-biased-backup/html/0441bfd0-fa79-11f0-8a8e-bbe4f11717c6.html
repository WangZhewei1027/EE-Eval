<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .bst-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .bst-header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        .bst-tree {
            padding: 20px;
        }

        .bst-node {
            background-color: #f7f7f7;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
        }

        .bst-node:hover {
            background-color: #ddd;
        }

        .bst-node.selected {
            background-color: #ccc;
            color: #fff;
        }

        .bst-node.disabled {
            background-color: #ccc;
            color: #666;
            cursor: not-allowed;
        }

        .bst-btn {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .bst-btn:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <div class="bst-container">
        <div class="bst-header">Binary Search Tree</div>
        <div class="bst-tree">
            <div class="bst-node">
                <span class="bst-node-text">Node 1</span>
                <span class="bst-node-value">1</span>
                <span class="bst-node-selected"></span>
                <span class="bst-node-disabled"></span>
            </div>
            <div class="bst-node">
                <span class="bst-node-text">Node 2</span>
                <span class="bst-node-value">2</span>
                <span class="bst-node-selected"></span>
                <span class="bst-node-disabled"></span>
            </div>
            <div class="bst-node">
                <span class="bst-node-text">Node 3</span>
                <span class="bst-node-value">3</span>
                <span class="bst-node-selected"></span>
                <span class="bst-node-disabled"></span>
            </div>
        </div>
        <div class="bst-btn">Delete Node 1</div>
        <div class="bst-btn">Delete Node 2</div>
        <div class="bst-btn">Delete Node 3</div>
    </div>

    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.selected = false;
                this.disabled = false;
            }
        }

        class BinarySearchTree {
            constructor() {
                this.root = null;
            }

            add(value) {
                if (this.root === null) {
                    this.root = new Node(value);
                } else {
                    this._addRecursive(this.root, value);
                }
            }

            _addRecursive(node, value) {
                if (value < node.value) {
                    if (node.left === null) {
                        node.left = new Node(value);
                    } else {
                        this._addRecursive(node.left, value);
                    }
                } else {
                    if (node.right === null) {
                        node.right = new Node(value);
                    } else {
                        this._addRecursive(node.right, value);
                    }
                }
            }

            _deleteRecursive(node, value) {
                if (node === null) {
                    return;
                }
                if (value < node.value) {
                    if (node.left === null) {
                        node.disabled = true;
                    } else {
                        this._deleteRecursive(node.left, value);
                    }
                } else if (value > node.value) {
                    if (node.right === null) {
                        node.disabled = true;
                    } else {
                        this._deleteRecursive(node.right, value);
                    }
                } else {
                    if (node.disabled) {
                        return;
                    }
                    if (node.left === null && node.right === null) {
                        node.disabled = true;
                    } else if (node.left === null) {
                        node.disabled = true;
                        node.value = null;
                    } else if (node.right === null) {
                        node.disabled = true;
                        node.value = null;
                    } else {
                        let min = node.left;
                        while (min.right !== null) {
                            min = min.right;
                        }
                        min.disabled = true;
                        node.value = min.value;
                        node.left = null;
                        node.right = null;
                    }
                }
            }

            deleteNode(value) {
                this.root = this._deleteRecursive(this.root, value);
            }

            printTree() {
                if (this.root === null) {
                    return;
                }
                this._printRecursive(this.root);
            }

            _printRecursive(node) {
                if (node !== null) {
                    this._printRecursive(node.left);
                    console.log(node.value);
                    this._printRecursive(node.right);
                }
            }
        }

        let bst = new BinarySearchTree();
        bst.add(5);
        bst.add(3);
        bst.add(7);
        bst.add(2);
        bst.add(4);
        bst.add(6);
        bst.add(8);

        console.log("Before deleting Node 1:");
        bst.printTree();

        bst.deleteNode(5);

        console.log("After deleting Node 1:");
        bst.printTree();
    </script>
</body>
</html>
