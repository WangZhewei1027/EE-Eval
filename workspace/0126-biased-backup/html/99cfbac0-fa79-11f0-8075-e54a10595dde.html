<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P vs NP Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>P vs NP Demonstration</h1>
    <p>Explore the concept of P vs NP through an interactive experience.</p>
    
    <h2>Select a Problem Type</h2>
    <button onclick="selectProblem('SAT')">SAT Problem</button>
    <button onclick="selectProblem('TSP')">Traveling Salesman Problem</button>
    <button onclick="selectProblem('Knapsack')">Knapsack Problem</button>
    
    <div id="problemInput" style="display:none;">
        <h2>Problem Input</h2>
        <p id="problemDescription"></p>
        <label for="inputData">Enter your data (comma-separated):</label>
        <input type="text" id="inputData" placeholder="e.g., 1,2,3">
        <button onclick="solveProblem()">Solve Problem</button>
        <h3>Solution:</h3>
        <p id="solutionOutput"></p>
    </div>

    <div id="maxPathInput" style="display:none;">
        <h2>Explore Solution Path</h2>
        <label for="pathData">Enter possible solutions (comma-separated):</label>
        <input type="text" id="pathData" placeholder="e.g., path1,path2">
        <button onclick="explorePaths()">Explore Paths</button>
        <h3>Exploration Output:</h3>
        <p id=" explorationOutput"></p>
    </div>

    <script>
        function selectProblem(type) {
            document.getElementById('problemInput').style.display = 'block';
            document.getElementById('problemDescription').innerText = 'You selected ' + type + '.';
            // Store the type for later use
            window.selectedProblemType = type;
        }

        function solveProblem() {
            const inputData = document.getElementById('inputData').value.split(',').map(Number);
            let output;
            switch(window.selectedProblemType) {
                case 'SAT':
                    output = 'SAT solution logic not implemented. Inputs: ' + inputData.join(', ');
                    break;
                case 'TSP':
                    output = 'TSP solution logic not implemented. Inputs: ' + inputData.join(', ');
                    break;
                case 'Knapsack':
                    output = 'Knapsack solution logic not implemented. Inputs: ' + inputData.join(', ');
                    break;
                default:
                    output = 'No problem selected.';
            }
            document.getElementById('solutionOutput').innerText = output;
            document.getElementById('maxPathInput').style.display = 'block';
        }

        function explorePaths() {
            const pathData = document.getElementById('pathData').value.split(',');
            let output = 'Explored following paths: ' + pathData.join(', ');
            document.getElementById('explorationOutput').innerText = output;
        }
    </script>
</body>
</html>
