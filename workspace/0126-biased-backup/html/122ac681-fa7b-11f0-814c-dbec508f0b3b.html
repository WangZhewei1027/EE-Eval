<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue</title>
    <style>
        body {
            font-family: monospace;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 0.25rem;
            box-shadow: 0 0 0 0.125rem rgba(0, 0, 0, 0.1);
        }
        button, input[type="submit"] {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            background-color: #4CAF50;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover, input[type="submit"]:hover {
            background-color: #3e8e41;
        }
        .queue {
            position: relative;
            width: 80%;
            height: 300px;
            margin: 40px auto;
            overflow-y: auto;
            padding: 20px;
        }
        .queue input, .queue select, .queue textarea {
            width: 100%;
        }
        .queue button {
            width: 20%;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="queue">
        <input type="text" id="input" placeholder="Enter text">
        <select id="select">
            <option value="1">Option 1</option>
            <option value="2">Option 2</option>
            <option value="3">Option 3</option>
        </select>
        <textarea id="textarea" placeholder="Enter text"></textarea>
        <button id="submit">Submit</button>
        <button id="clear">Clear</button>
        <button id="move-left">Move Left</button>
        <button id="move-right">Move Right</button>
        <button id="move-up">Move Up</button>
        <button id="move-down">Move Down</button>
    </div>

    <script>
        let queue = [];
        let current = 0;
        let isClear = false;
        let isMoveLeft = false;
        let isMoveRight = false;
        let isMoveUp = false;
        let isMoveDown = false;

        document.getElementById('input').addEventListener('input', (e) => {
            queue.push(e.target.value);
            document.getElementById('textarea').value = queue.join('\n');
        });

        document.getElementById('select').addEventListener('change', () => {
            queue = [];
            current = 0;
            isClear = false;
            isMoveLeft = false;
            isMoveRight = false;
            isMoveUp = false;
            isMoveDown = false;
            document.getElementById('textarea').value = '';
        });

        document.getElementById('textarea').addEventListener('input', (e) => {
            queue = [];
            current = 0;
            isClear = false;
            isMoveLeft = false;
            isMoveRight = false;
            isMoveUp = false;
            isMoveDown = false;
            document.getElementById('input').value = '';
        });

        document.getElementById('submit').addEventListener('click', () => {
            if (queue.length > 0) {
                let result = queue.shift();
                document.getElementById('textarea').value += result + '\n';
                document.getElementById('input').value = '';
            } else {
                alert('No text to submit');
            }
        });

        document.getElementById('clear').addEventListener('click', () => {
            queue = [];
            isClear = true;
            document.getElementById('textarea').value = '';
        });

        document.getElementById('move-left').addEventListener('click', () => {
            if (queue.length > 0) {
                current -= 1;
                document.getElementById('input').value = queue[current];
                document.getElementById('textarea').value = queue.join('\n');
            }
        });

        document.getElementById('move-right').addEventListener('click', () => {
            if (queue.length > 0) {
                current += 1;
                document.getElementById('input').value = queue[current];
                document.getElementById('textarea').value = queue.join('\n');
            }
        });

        document.getElementById('move-up').addEventListener('click', () => {
            if (queue.length > 0) {
                current -= queue.length;
                document.getElementById('input').value = queue[current];
                document.getElementById('textarea').value = queue.join('\n');
            }
        });

        document.getElementById('move-down').addEventListener('click', () => {
            if (queue.length > 0) {
                current += queue.length;
                document.getElementById('input').value = queue[current];
                document.getElementById('textarea').value = queue.join('\n');
            }
        });
    </script>
</body>
</html>
