<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radix Sort Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #282c34;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 20px rgba(0, 0, 0, 0.8);
        }

        #array-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 300px;
            width: 80%;
            margin-bottom: 30px;
            position: relative;
        }

        .bar {
            width: 40px;
            margin: 0 2px;
            background-color: #61dafb;
            transition: height 0.3s ease, background-color 0.3s ease;
        }

        .active {
            background-color: #ffcc00;
        }

        .sorted {
            background-color: #4caf50;
        }

        button {
            padding: 10px 20px;
            font-size: 1.2rem;
            color: #ffffff;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Radix Sort Visualization</h1>
    <div id="array-container"></div>
    <button id="startButton">Visualize Radix Sort</button>

    <script>
        const arrayContainer = document.getElementById('array-container');
        const startButton = document.getElementById('startButton');

        let array = [];

        function generateRandomArray(size) {
            array = Array.from({ length: size }, () => Math.floor(Math.random() * 100));
            renderArray();
        }

        function renderArray() {
            arrayContainer.innerHTML = '';
            array.forEach(value => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${value * 3}px`;
                arrayContainer.appendChild(bar);
            });
        }

        async function radixSort() {
            let max = Math.max(...array);
            const exp = 1;

            for (let exp = 1; Math.floor(max / exp) > 0; exp *= 10) {
                await countingSortByDigit(exp);
            }

            renderSorted();
        }

        async function countingSortByDigit(exp) {
            const output = new Array(array.length);
            const count = new Array(10).fill(0);

            for (let i = 0; i < array.length; i++) {
                const index = Math.floor(array[i] / exp) % 10;
                count[index]++;
            }

            for (let i = 1; i < 10; i++) {
                count[i] += count[i - 1];
            }

            for (let i = array.length - 1; i >= 0; i--) {
                const index = Math.floor(array[i] / exp) % 10;
                output[count[index] - 1] = array[i];
                count[index]--;
                
                const bars = document.querySelectorAll('.bar');
                bars[i].classList.add('active');
                await sleep(200);
                bars[i].classList.remove('active');
            }

            for (let i = 0; i < array.length; i++) {
                array[i] = output[i];
            }

            renderArray();
        }

        function renderSorted() {
            const bars = document.querySelectorAll('.bar');
            bars.forEach(bar => bar.classList.add('sorted'));
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        startButton.addEventListener('click', () => {
            generateRandomArray(20);
            radixSort();
        });

        // Initial call to generate a random array
        generateRandomArray(20);
    </script>
</body>
</html>
