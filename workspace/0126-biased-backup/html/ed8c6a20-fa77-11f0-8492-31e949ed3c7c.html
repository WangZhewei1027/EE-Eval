<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked List Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s;
            border-radius: 12px;
            padding: 20px;
            background: linear-gradient(135deg, #3498db, #8e44ad);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            width: 80%;
            max-width: 800px;
        }
        .node {
            background: #e74c3c;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        .node:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }
        .arrow {
            font-size: 24px;
            color: #ecf0f1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .visible {
            opacity: 1;
        }
        button {
            background-color: #16a085;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 20px 2px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #1abc9c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="node">Node 1</div>
        <div class="arrow" id="arrow1">➔</div>
        <div class="node">Node 2</div>
        <div class="arrow" id="arrow2">➔</div>
        <div class="node">Node 3</div>
    </div>
    <button id="showArrows">Show Connections</button>

    <script>
        document.getElementById('showArrows').addEventListener('click', function () {
            document.getElementById('arrow1').classList.toggle('visible');
            document.getElementById('arrow2').classList.toggle('visible');
            this.textContent = this.textContent === 'Show Connections' ? 'Hide Connections' : 'Show Connections';
        });
    </script>
</body>
</html>
