<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floyd-Warshall Algorithm Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1c1c1c;
            color: #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-align: center;
            color: #ffcc00;
        }
        #canvas {
            border: 2px solid #ffcc00;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
            transition: transform 0.2s;
        }
        #canvas:hover {
            transform: scale(1.05);
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        .button {
            background-color: #ffcc00;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            color: black;
            transition: background-color 0.3s, transform 0.2s;
        }
        .button:hover {
            background-color: #e5e5e5;
            color: #1c1c1c;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="controls">
        <button class="button" id="startBtn">Start Visualization</button>
    </div>
    <canvas id="canvas" width="600" height="600"></canvas>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const graph = [
            [0, 3, 8, Infinity, -4],
            [Infinity, 0, Infinity, 1, 7],
            [Infinity, 4, 0, Infinity, Infinity],
            [2, Infinity, -5, 0, Infinity],
            [Infinity, Infinity, Infinity, 6, 0]
        ];
        
        const numVertices = graph.length;
        const distance = JSON.parse(JSON.stringify(graph));

        function drawGraph() {
            const w = 600 / (numVertices + 1);
            const h = 600 / (numVertices + 1);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1c1c1c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numVertices; i++) {
                for (let j = 0; j < numVertices; j++) {
                    const x1 = (i + 1) * w;
                    const y1 = (j + 1) * h;
                    ctx.fillStyle = '#ffcc00';
                    ctx.fillRect(x1 - 15, y1 - 15, 30, 30);
                    ctx.fillStyle = '#1c1c1c';
                    ctx.textAlign = "center";
                    ctx.fillText(distance[i][j] === Infinity ? "∞" : distance[i][j], x1, y1 + 10);
                }
            }
        }

        function floydWarshall() {
            for (let k = 0; k < numVertices; k++) {
                for (let i = 0; i < numVertices; i++) {
                    for (let j = 0; j < numVertices; j++) {
                        if (distance[i][j] > distance[i][k] + distance[k][j]) {
                            distance[i][j] = distance[i][k] + distance[k][j];
                            drawGraph();
                        }
                    }
                }
            }
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            floydWarshall();
        });

        drawGraph(); // Initial drawing
    </script>
</body>
</html>
