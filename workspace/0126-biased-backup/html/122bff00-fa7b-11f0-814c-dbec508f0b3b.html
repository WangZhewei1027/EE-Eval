<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijkstra's Algorithm</title>
    <style>
        body {
            background-color: #000;
            font-family: monospace;
            font-size: 12px;
        }
        #dijkstra {
            width: 800px;
            height: 600px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #000;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #controls button {
            padding: 10px 20px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #controls input {
            padding: 10px 20px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="dijkstra"></div>
    <div id="controls">
        <button id="start-btn">Start</button>
        <label for="min-heap-size">Min Heap Size:</label>
        <input id="min-heap-size" type="number" value="10">
        <label for="max-heap-size">Max Heap Size:</label>
        <input id="max-heap-size" type="number" value="100">
        <label for="num-starting-points">Number of Starting Points:</label>
        <input id="num-starting-points" type="number" value="10">
        <label for="num-edges">Number of Edges:</label>
        <input id="num-edges" type="number" value="100">
        <button id="reset-btn">Reset</button>
        <label for="show-path">Show Path:</label>
        <input id="show-path" type="checkbox" value="true">
    </div>

    <script>
        let d = {
            graph: {},
            start: {},
            path: {},
            heap: {},
            minHeapSize: 10,
            maxHeapSize: 100,
            numStartingPoints: 10,
            numEdges: 100,
            showPath: false
        };

        function createGraph() {
            for (let i = 0; i < d.numStartingPoints; i++) {
                d.graph[i] = {};
                for (let j = 0; j < d.numStartingPoints; j++) {
                    d.graph[i][j] = 0;
                }
            }
        }

        function addEdge(start, end, weight) {
            d.graph[start][end] = weight;
        }

        function dijkstra(start, end) {
            d.start[start] = 0;
            d.path[start] = null;
            d.heap = [];

            let current = start;
            while (d.heap.length > 0) {
                let min = Infinity;
                let minIndex = -1;
                for (let i = 0; i < d.heap.length; i++) {
                    if (d.heap[i][0] < min) {
                        min = d.heap[i][0];
                        minIndex = i;
                    }
                }
                let next = minIndex;
                let minWeight = d.heap[next][0];
                d.heap.splice(next, 1);
                if (d.path[current] !== null) {
                    d.path[current] = end;
                }
                d.path[current] = minWeight;
                if (d.path[current] === Infinity) {
                    break;
                }
                d.heap.push([d.path[current], current]);
                current = next;
            }

            if (d.path[end] !== null) {
                console.log("Shortest path:", d.path[end]);
            } else {
                console.log("No path found");
            }
        }

        function start() {
            createGraph();
            dijkstra(0, d.numStartingPoints);
            if (d.showPath) {
                for (let i = 0; i < d.numStartingPoints; i++) {
                    console.log(`Path from point ${i} to ${d.numStartingPoints}: ${d.path[i]}`);
                }
            }
            d.minHeapSize = 10;
            d.maxHeapSize = 100;
            d.numStartingPoints = 10;
            d.numEdges = 100;
            d.showPath = false;
            d.minHeapSize = 10;
            d.maxHeapSize = 100;
            d.numStartingPoints = 10;
            d.numEdges = 100;
            d.showPath = false;
        }

        function reset() {
            d = {
                graph: {},
                start: {},
                path: {},
                heap: {},
                minHeapSize: 10,
                maxHeapSize: 100,
                numStartingPoints: 10,
                numEdges: 100,
                showPath: false
            };
            createGraph();
            dijkstra(0, d.numStartingPoints);
        }

        let startButton = document.getElementById("start-btn");
        let minHeapSizeInput = document.getElementById("min-heap-size");
        let maxHeapSizeInput = document.getElementById("max-heap-size");
        let numStartingPointsInput = document.getElementById("num-starting-points");
        let numEdgesInput = document.getElementById("num-edges");
        let resetButton = document.getElementById("reset-btn");
        let showPathCheckbox = document.getElementById("show-path");

        startButton.addEventListener("click", start);
        minHeapSizeInput.addEventListener("input", start);
        maxHeapSizeInput.addEventListener("input", start);
        numStartingPointsInput.addEventListener("input", start);
        numEdgesInput.addEventListener("input", start);
        resetButton.addEventListener("click", reset);
        showPathCheckbox.addEventListener("change", start);
    </script>
</body>
</html>
