<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Window Maximum</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input, button {
            margin: 5px;
        }
        #output {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Sliding Window Maximum Demonstration</h1>

<label for="arrayInput">Enter numbers (comma-separated):</label><br>
<input type="text" id="arrayInput" placeholder="e.g. 1,3,-1,-3,5,3,6,7"/><br>

<label for="windowSize">Select window size:</label><br>
<input type="number" id="windowSize" min="1" value="3"/><br>

<button id="calculateButton">Calculate Maximums</button>
<button id="resetButton">Reset</button>

<h2>Output:</h2>
<div id="output"></div>

<script>
    document.getElementById('calculateButton').onclick = function() {
        const input = document.getElementById('arrayInput').value;
        const k = parseInt(document.getElementById('windowSize').value);
        const outputDiv = document.getElementById('output');

        if (!input || isNaN(k) || k <= 0) {
            outputDiv.innerText = 'Please enter valid input and window size.';
            return;
        }

        const nums = input.split(',').map(Number);
        const result = slidingWindowMax(nums, k);
        outputDiv.innerText = 'Maximums in each sliding window: ' + result.join(', ');
    };

    document.getElementById('resetButton').onclick = function() {
        document.getElementById('arrayInput').value = '';
        document.getElementById('windowSize').value = 3;
        document.getElementById('output').innerText = '';
    };

    function slidingWindowMax(nums, k) {
        const result = [];
        const deque = [];
        for (let i = 0; i < nums.length; i++) {
            // Remove indices that are out of bound
            if (deque.length && deque[0] < i - k + 1) {
                deque.shift();
            }
            // Remove elements that are less than the current element
            while (deque.length && nums[deque[deque.length - 1]] < nums[i]) {
                deque.pop();
            }
            deque.push(i);
            // The first window is ready
            if (i >= k - 1) {
                result.push(nums[deque[0]]);
            }
        }
        return result;
    }
</script>

</body>
</html>
