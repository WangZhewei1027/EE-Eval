<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
        }
        
        input[type="text"], input[type="number"], input[type="date"], input[type="time"], select {
            width: 100%;
            padding: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        button {
            width: 100%;
            padding: 10px 20px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #3e8e41;
        }
        
        .transaction {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .transaction input[type="text"], .transaction input[type="number"], .transaction input[type="date"], .transaction input[type="time"], .transaction select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        .transaction button {
            width: 100%;
            padding: 10px 20px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        
        .transaction button:hover {
            background-color: #3e8e41;
        }
        
        .transaction input[type="submit"] {
            padding: 10px 20px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        
        .transaction input[type="submit"]:hover {
            background-color: #3e8e41;
        }
        
        .transaction button[type="button"] {
            background-color: transparent;
        }
        
        .transaction button[type="button"]:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="transaction">
        <h2>Transaction</h2>
        <form>
            <label for="input1">Input 1:</label>
            <input type="text" id="input1" name="input1" placeholder="Enter text">
            <br>
            <label for="input2">Input 2:</label>
            <input type="text" id="input2" name="input2" placeholder="Enter text">
            <br>
            <label for="input3">Input 3:</label>
            <input type="text" id="input3" name="input3" placeholder="Enter text">
            <br>
            <label for="input4">Input 4:</label>
            <input type="text" id="input4" name="input4" placeholder="Enter text">
            <br>
            <label for="input5">Input 5:</label>
            <input type="number" id="input5" name="input5" placeholder="Enter number">
            <br>
            <label for="input6">Input 6:</label>
            <input type="date" id="input6" name="input6" placeholder="Enter date">
            <br>
            <label for="input7">Input 7:</label>
            <input type="time" id="input7" name="input7" placeholder="Enter time">
            <br>
            <label for="input8">Input 8:</label>
            <select id="input8" name="input8">
                <option value="option1">Option 1</option>
                <option value="option2">Option 2</option>
                <option value="option3">Option 3</option>
            </select>
            <br>
            <label for="input9">Input 9:</label>
            <input type="text" id="input9" name="input9" placeholder="Enter text">
            <br>
            <label for="input10">Input 10:</label>
            <input type="text" id="input10" name="input10" placeholder="Enter text">
            <br>
            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        const input1 = document.getElementById('input1');
        const input2 = document.getElementById('input2');
        const input3 = document.getElementById('input3');
        const input4 = document.getElementById('input4');
        const input5 = document.getElementById('input5');
        const input6 = document.getElementById('input6');
        const input7 = document.getElementById('input7');
        const input8 = document.getElementById('input8');
        const input9 = document.getElementById('input9');
        const input10 = document.getElementById('input10');
        const submitButton = document.getElementById('submitButton');

        function validateInput() {
            if (input1.value === '') {
                alert('Please enter text for input 1');
                return false;
            }
            if (input2.value === '') {
                alert('Please enter text for input 2');
                return false;
            }
            if (input3.value === '') {
                alert('Please enter text for input 3');
                return false;
            }
            if (input4.value === '') {
                alert('Please enter text for input 4');
                return false;
            }
            if (input5.value === '') {
                alert('Please enter number for input 5');
                return false;
            }
            if (input6.value === '') {
                alert('Please enter date for input 6');
                return false;
            }
            if (input7.value === '') {
                alert('Please enter time for input 7');
                return false;
            }
            if (input8.value === '') {
                alert('Please select option for input 8');
                return false;
            }
            if (input9.value === '') {
                alert('Please enter text for input 9');
                return false;
            }
            if (input10.value === '') {
                alert('Please enter text for input 10');
                return false;
            }
            return true;
        }

        submitButton.addEventListener('click', validateInput);

        function showProgress() {
            const progress = document.getElementById('progress');
            if (progress) {
                progress.style.display = 'block';
            } else {
                progress = document.createElement('div');
                progress.style.position = 'fixed';
                progress.style.top = '50%';
                progress.style.left = '50%';
                progress.style.transform = 'translate(-50%, -50%)';
                progress.style.width = '100%';
                progress.style.height = '100%';
                progress.style.background = 'lightblue';
                progress.style.padding = '20px';
                progress.style.border = '1px solid black';
                document.body.appendChild(progress);
            }
        }

        function hideProgress() {
            const progress = document.getElementById('progress');
            if (progress) {
                progress.style.display = 'none';
            } else {
                progress = document.createElement('div');
                progress.style.position = 'fixed';
                progress.style.top = '50%';
                progress.style.left = '50%';
                progress.style.transform = 'translate(-50%, -50%)';
                progress.style.width = '100%';
                progress.style.height = '100%';
                progress.style.background = 'lightblue';
                progress.style.padding = '20px';
                progress.style.border = '1px solid black';
                document.body.appendChild(progress);
            }
        }

        function updateProgress() {
            const progress = document.getElementById('progress');
            if (progress) {
                const progressValue = Math.random() * 100;
                const progressPercentage = Math.floor(progressValue * 10);
                const progressText = `Progress: ${progressPercentage}%`;
                progress.textContent = progressText;
                progress.style.backgroundColor = `hsl(${progressPercentage}, 50%, 50%)`;
                if (progressValue < 50) {
                    showProgress();
                } else {
                    hideProgress();
                }
            } else {
                updateProgress();
            }
        }

        updateProgress();
    </script>
</body>
</html>
