<!DOCTYPE html>
<html>
<head>
    <title>Transaction System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { display: flex; flex-direction: column; gap: 20px; }
        .panel { border: 1px solid #000; padding: 10px; margin-bottom: 10px; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #000; padding: 5px; text-align: left; }
        input, select, button { margin: 5px 0; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Transaction System</h1>
        
        <!-- Account Selection -->
        <div class="panel" id="accountPanel">
            <h2>Account Selection</h2>
            <div>
                <label>Select Account:</label>
                <select id="accountSelect">
                    <option value="">-- Select Account --</option>
                    <option value="checking">Checking (Balance: $1,500.00)</option>
                    <option value="savings">Savings (Balance: $5,000.00)</option>
                    <option value="credit">Credit Card (Balance: -$250.00)</option>
                </select>
                <button id="viewAccountBtn">View Account Details</button>
            </div>
            <div id="accountDetails" class="hidden">
                <h3>Account Details</h3>
                <div id="accountInfo"></div>
                <button id="newTransactionBtn">New Transaction</button>
                <button id="viewHistoryBtn">View Transaction History</button>
            </div>
        </div>
        
        <!-- Transaction Creation -->
        <div class="panel hidden" id="transactionPanel">
            <h2>Create Transaction</h2>
            <div>
                <label>Transaction Type:</label>
                <select id="transactionType">
                    <option value="deposit">Deposit</option>
                    <option value="withdrawal">Withdrawal</option>
                    <option value="transfer">Transfer</option>
                    <option value="payment">Payment</option>
                </select>
            </div>
            
            <div id="amountSection">
                <label>Amount: $</label>
                <input type="number" id="transactionAmount" min="0.01" step="0.01">
            </div>
            
            <div id="transferSection" class="hidden">
                <label>Transfer To:</label>
                <select id="transferAccount">
                    <option value="">-- Select Account --</option>
                    <option value="checking">Checking</option>
                    <option value="savings">Savings</option>
                    <option value="credit">Credit Card</option>
                </select>
            </div>
            
            <div id="paymentSection" class="hidden">
                <label>Payee:</label>
                <input type="text" id="payeeName" placeholder="Payee name">
                <label>Account Number:</label>
                <input type="text" id="payeeAccount" placeholder="Account number">
            </div>
            
            <div>
                <label>Description:</label>
                <input type="text" id="transactionDesc" placeholder="Transaction description">
            </div>
            
            <div>
                <label>Date:</label>
                <input type="date" id="transactionDate">
            </div>
            
            <div id="transactionError" class="error"></div>
            
            <button id="previewTransactionBtn">Preview Transaction</button>
            <button id="cancelTransactionBtn">Cancel</button>
        </div>
        
        <!-- Transaction Preview -->
        <div class="panel hidden" id="previewPanel">
            <h2>Transaction Preview</h2>
            <div id="previewDetails"></div>
            <button id="confirmTransactionBtn">Confirm Transaction</button>
            <button id="editTransactionBtn">Edit Transaction</button>
        </div>
        
        <!-- Transaction History -->
        <div class="panel hidden" id="historyPanel">
            <h2>Transaction History</h2>
            <div>
                <label>Filter by:</label>
                <select id="historyFilter">
                    <option value="all">All Transactions</option>
                    <option value="deposit">Deposits</option>
                    <option value="withdrawal">Withdrawals</option>
                    <option value="transfer">Transfers</option>
                    <option value="payment">Payments</option>
                </select>
                <label>Date Range:</label>
                <input type="date" id="historyStartDate">
                <input type="date" id="historyEndDate">
                <button id="applyFilterBtn">Apply Filter</button>
            </div>
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Balance</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody"></tbody>
            </table>
            <button id="closeHistoryBtn">Close History</button>
        </div>
        
        <!-- Confirmation -->
        <div class="panel hidden" id="confirmationPanel">
            <h2>Transaction Complete</h2>
            <div id="confirmationDetails"></div>
            <button id="newTransactionFromConfirmBtn">New Transaction</button>
            <button id="viewAccountFromConfirmBtn">View Account</button>
        </div>
    </div>

    <script>
        // State management
        const state = {
            currentAccount: null,
            accounts: {
                checking: { balance: 1500.00, transactions: [] },
                savings: { balance: 5000.00, transactions: [] },
                credit: { balance: -250.00, transactions: [] }
            },
            transactionInProgress: null
        };

        // DOM elements
        const elements = {
            accountSelect: document.getElementById('accountSelect'),
            viewAccountBtn: document.getElementById('viewAccountBtn'),
            accountDetails: document.getElementById('accountDetails'),
            accountInfo: document.getElementById('accountInfo'),
            newTransactionBtn: document.getElementById('newTransactionBtn'),
            viewHistoryBtn: document.getElementById('viewHistoryBtn'),
            transactionPanel: document.getElementById('transactionPanel'),
            transactionType: document.getElementById('transactionType'),
            transactionAmount: document.getElementById('transactionAmount'),
            transferSection: document.getElementById('transferSection'),
            transferAccount: document.getElementById('transferAccount'),
            paymentSection: document.getElementById('paymentSection'),
            payeeName: document.getElementById('payeeName'),
            payeeAccount: document.getElementById('payeeAccount'),
            transactionDesc: document.getElementById('transactionDesc'),
            transactionDate: document.getElementById('transactionDate'),
            transactionError: document.getElementById('transactionError'),
            previewTransactionBtn: document.getElementById('previewTransactionBtn'),
            cancelTransactionBtn: document.getElementById('cancelTransactionBtn'),
            previewPanel: document.getElementById('previewPanel'),
            previewDetails: document.getElementById('previewDetails'),
            confirmTransactionBtn: document.getElementById('confirmTransactionBtn'),
            editTransactionBtn: document.getElementById('editTransactionBtn'),
            historyPanel: document.getElementById('historyPanel'),
            historyFilter: document.getElementById('historyFilter'),
            historyStartDate: document.getElementById('historyStartDate'),
            historyEndDate: document.getElementById('historyEndDate'),
            applyFilterBtn: document.getElementById('applyFilterBtn'),
            historyTableBody: document.getElementById('historyTableBody'),
            closeHistoryBtn: document.getElementById('closeHistoryBtn'),
            confirmationPanel: document.getElementById('confirmationPanel'),
            confirmationDetails: document.getElementById('confirmationDetails'),
            newTransactionFromConfirmBtn: document.getElementById('newTransactionFromConfirmBtn'),
            viewAccountFromConfirmBtn: document.getElementById('viewAccountFromConfirmBtn')
        };

        // Initialize date fields
        const today = new Date().toISOString().split('T')[0];
        elements.transactionDate.value = today;
        elements.historyStartDate.value = new Date(new Date().setMonth(new Date().getMonth() - 1)).toISOString().split('T')[0];
        elements.historyEndDate.value = today;

        // Event listeners
        elements.viewAccountBtn.addEventListener('click', viewAccount);
        elements.newTransactionBtn.addEventListener('click', startNewTransaction);
        elements.viewHistoryBtn.addEventListener('click', viewTransactionHistory);
        elements.transactionType.addEventListener('change', handleTransactionTypeChange);
        elements.previewTransactionBtn.addEventListener('click', previewTransaction);
        elements.cancelTransactionBtn.addEventListener('click', cancelTransaction);
        elements.confirmTransactionBtn.addEventListener('click', confirmTransaction);
        elements.editTransactionBtn.addEventListener('click', editTransaction);
        elements.applyFilterBtn.addEventListener('click', applyHistoryFilter);
        elements.closeHistoryBtn.addEventListener('click', closeHistory);
        elements.newTransactionFromConfirmBtn.addEventListener('click', startNewTransaction);
        elements.viewAccountFromConfirmBtn.addEventListener('click', viewAccountFromConfirm);

        // Functions
        function viewAccount() {
            const accountId = elements.accountSelect.value;
            if (!accountId) {
                alert('Please select an account');
                return;
            }
            
            state.currentAccount = accountId;
            const account = state.accounts[accountId];
            
            elements.accountInfo.innerHTML = `
                <p><strong>Account:</strong> ${accountId.charAt(0).toUpperCase() + accountId.slice(1)}</p>
                <p><strong>Balance:</strong> $${account.balance.toFixed(2)}</p>
                <p><strong>Last Transaction:</strong> ${account.transactions.length > 0 ? 
                    account.transactions[0].date + 'No transactions yet' : 'No transactions yet'}</p>
            `;
            
            elements.accountDetails.classList.remove('hidden');
        }

        function startNewTransaction() {
            elements.transactionPanel.classList.remove('hidden');
            elements.accountDetails.classList.add('hidden');
            elements.previewPanel.classList.add('hidden');
            elements.historyPanel.classList.add('hidden');
            elements.confirmationPanel.classList.add('hidden');
            
            // Reset form
            elements.transactionAmount.value = '';
            elements.transactionDesc.value = '';
            elements.transactionDate.value = today;
            elements.transactionError.textContent = '';
            
            state.transactionInProgress = {
                account: state.currentAccount,
                type: 'deposit',
                amount: 0,
                description: '',
                date: today
            };
            
            handleTransactionTypeChange();
        }

        function handleTransactionTypeChange() {
            const type = elements.transactionType.value;
            
            elements.transferSection.classList.add('hidden');
            elements.paymentSection.classList.add('hidden');
            
            if (type === 'transfer') {
                elements.transferSection.classList.remove('hidden');
                // Remove current account from transfer options
                Array.from(elements.transferAccount.options).forEach(option => {
                    option.disabled = option.value === state.currentAccount;
                });
            } else if (type === 'payment') {
                elements.paymentSection.classList.remove('hidden');
            }
        }

        function previewTransaction() {
            const amount = parseFloat(elements.transactionAmount.value);
            if (isNaN(amount) || amount <= 0) {
                elements.transactionError.textContent = 'Please enter a valid amount';
                return;
            }
            
            const type = elements.transactionType.value;
            const description = elements.transactionDesc.value || 'No description';
            const date = elements.transactionDate.value;
            
            state.transactionInProgress = {
                account: state.currentAccount,
                type,
                amount,
                description,
                date,
                transferAccount: type === 'transfer' ? elements.transferAccount.value : null,
                payeeName: type === 'payment' ? elements.payeeName.value : null,
                payeeAccount: type === 'payment' ? elements.payeeAccount.value : null
            };
            
            // Validate transfer
            if (type === 'transfer' && !state.transactionInProgress.transferAccount) {
                elements.transactionError.textContent = 'Please select a transfer account';
                return;
            }
            
            // Validate payment
            if (type === 'payment' && (!state.transactionInProgress.payeeName || !state.transactionInProgress.payeeAccount)) {
                elements.transactionError.textContent = 'Please enter payee details';
                return;
            }
            
            // Check sufficient funds for withdrawals/transfers/payments
            if ((type === 'withdrawal' || type === 'transfer' || type === 'payment') && 
                amount > state.accounts[state.currentAccount].balance) {
                elements.transactionError.textContent = 'Insufficient funds';
                return;
            }
            
            elements.transactionError.textContent = '';
            
            // Show preview
            let previewText = `
                <p><strong>Type:</strong> ${type.charAt(0).toUpperCase() + type.slice(1)}</p>
                <p><strong>Amount:</strong> $${amount.toFixed(2)}</p>
                <p><strong>Date:</strong> ${date}</p>
                <p><strong>Description:</strong> ${description}</p>
            `;
            
            if (type === 'transfer') {
                previewText += `<p><strong>Transfer To:</strong> ${state.transactionInProgress.transferAccount.charAt(0).toUpperCase() + state.transactionInProgress.transferAccount.slice(1)}</p>`;
            }
            
            if (type === 'payment') {
                previewText += `
                    <p><strong>Payee:</strong> ${state.transactionInProgress.payeeName}</p>
                    <p><strong>Account:</strong> ${state.transactionInProgress.payeeAccount}</p>
                `;
            }
            
            elements.previewDetails.innerHTML = previewText;
            elements.transactionPanel.classList.add('hidden');
            elements.previewPanel.classList.remove('hidden');
        }

        function cancelTransaction() {
            elements.transactionPanel.classList.add('hidden');
            elements.accountDetails.classList.remove('hidden');
            state.transactionInProgress = null;
        }

        function confirmTransaction() {
            const transaction = state.transactionInProgress;
            const account = state.accounts[transaction.account];
            
            // Process transaction
            const transactionRecord = {
                id: Date.now(),
                date: transaction.date,
                type: transaction.type,
                amount: transaction.amount,
                description: transaction.description,
                balanceBefore: account.balance
            };
            
            switch (transaction.type) {
                case 'deposit':
                    account.balance += transaction.amount;
                    break;
                case 'withdrawal':
                    account.balance -= transaction.amount;
                    break;
                case 'transfer':
                    account.balance -= transaction.amount;
                    state.accounts[transaction.transferAccount].balance += transaction.amount;
                    
                    // Create transaction record for destination account
                    const destTransaction = {
                        id: transactionRecord.id,
                        date: transaction.date,
                        type: 'deposit',
                        amount: transaction.amount,
                        description: `Transfer from ${transaction.account}`,
                        balanceBefore: state.accounts[transaction.transferAccount].balance - transaction.amount
                    };
                    state.accounts[transaction.transferAccount].transactions.unshift(destTransaction);
                    break;
                case 'payment':
                    account.balance -= transaction.amount;
                    transactionRecord.payee = transaction.payeeName;
                    transactionRecord.payeeAccount = transaction.payeeAccount;
                    break;
            }
            
            transactionRecord.balanceAfter = account.balance;
            account.transactions.unshift(transactionRecord);
            
            // Show confirmation
            elements.confirmationDetails.innerHTML = `
                <p>Transaction completed successfully</p>
                <p><strong>New Balance:</strong> $${account.balance.toFixed(2)}</p>
                <p><strong>Transaction ID:</strong> ${transactionRecord.id}</p>
            `;
            
            elements.previewPanel.classList.add('hidden');
            elements.confirmationPanel.classList.remove('hidden');
            state.transactionInProgress = null;
        }

        function editTransaction() {
            elements.previewPanel.classList.add('hidden');
            elements.transactionPanel.classList.remove('hidden');
        }

        function viewTransactionHistory() {
            elements.historyPanel.classList.remove('hidden');
            elements.accountDetails.classList.add('hidden');
            applyHistoryFilter();
        }

        function applyHistoryFilter() {
            const filter = state.currentAccount;
            const typeFilter = elements.historyFilter.value;
            const startDate = elements.historyStartDate.value;
            const endDate = elements.historyEndDate.value;
            
            const transactions = state.accounts[filter].transactions;
            
            let filteredTransactions = transactions;
            
            if (typeFilter !== 'all') {
                filteredTransactions = filteredTransactions.filter(t => t.type === typeFilter);
            }
            
            if (startDate) {
                filteredTransactions = filteredTransactions.filter(t => t.date >= startDate);
            }
            
            if (endDate) {
                filteredTransactions = filteredTransactions.filter(t => t.date <= endDate);
            }
            
            // Populate table
            elements.historyTableBody.innerHTML = '';
            
            if (filteredTransactions.length === 0) {
                elements.historyTableBody.innerHTML = '<tr><td colspan="5">No transactions found</td></tr>';
                return;
            }
            
            filteredTransactions.forEach(t => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${t.date}</td>
                    <td>${t.description}</td>
                    <td>${t.type.charAt(0).toUpperCase() + t.type.slice(1)}</td>
                    <td>${t.type === 'withdrawal' || t.type === 'payment' || t.type === 'transfer' ? '-' : ''}$${t.amount.toFixed(2)}</td>
                    <td>$${t.balanceAfter.toFixed(2)}</td>
                `;
                elements.historyTableBody.appendChild(row);
            });
        }

        function closeHistory() {
            elements.historyPanel.classList.add('hidden');
            elements.accountDetails.classList.remove('hidden');
        }

        function viewAccountFromConfirm() {
            elements.confirmationPanel.classList.add('hidden');
            viewAccount();
        }

        // Initialize with some sample transactions
        function initializeSampleData() {
            const now = new Date();
            const yesterday = new Date(now);
            yesterday.setDate(now.getDate() - 1);
            const lastWeek = new Date(now);
            lastWeek.setDate(now.getDate() - 7);
            
            state.accounts.checking.transactions = [
                {
                    id: 1001,
                    date: now.toISOString().split('T')[0],
                    type: 'deposit',
                    amount: 500.00,
                    description: 'Paycheck',
                    balanceBefore: 1000.00,
                    balanceAfter: 1500.00
                },
                {
                    id: 1002,
                    date: yesterday.toISOString().split('T')[0],
                    type: 'withdrawal',
                    amount: 200.00,
                    description: 'ATM Withdrawal',
                    balanceBefore: 1200.00,
                    balanceAfter: 1000.00
                }
            ];
            
            state.accounts.savings.transactions = [
                {
                    id: 2001,
                    date: lastWeek.toISOString().split('T')[0],
                    type: 'deposit',
                    amount: 1000.00,
                    description: 'Monthly savings',
                    balanceBefore: 4000.00,
                    balanceAfter: 5000.00
                }
            ];
            
            state.accounts.credit.transactions = [
                {
                    id: 3001,
                    date: yesterday.toISOString().split('T')[0],
                    type: 'payment',
                    amount: 50.00,
                    description: 'Grocery store',
                    balanceBefore: -200.00,
                    balanceAfter: -250.00
                }
            ];
        }

        initializeSampleData();
    </script>
</body>
</html>
