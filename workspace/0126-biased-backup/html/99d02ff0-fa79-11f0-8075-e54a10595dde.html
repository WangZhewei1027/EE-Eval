<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoSQL Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

<h1>NoSQL Interactive Demo</h1>

<p>Add a new record to the NoSQL Database:</p>
<label for="recordKey">Record Key:</label>
<input type="text" id="recordKey" placeholder="Enter record key"><br>
<label for="recordValue">Record Value:</label>
<input type="text" id="recordValue" placeholder="Enter record value"><br>
<button onclick="addRecord()">Add Record</button>

<h2>Existing Records:</h2>
<ul id="recordList"></ul>

<h2>Search for a Record:</h2>
<label for="searchKey">Search Key:</label>
<input type="text" id="searchKey" placeholder="Enter key to search">
<button onclick="searchRecord()">Search</button>
<p id="searchResult"></p>

<h2>Update a Record:</h2>
<label for="updateKey">Key to Update:</label>
<input type="text" id="updateKey" placeholder="Enter key to update"><br>
<label for="updateValue">New Value:</label>
<input type="text" id="updateValue" placeholder="Enter new value"><br>
<button onclick="updateRecord()">Update Record</button>

<h2>Delete a Record:</h2>
<label for="deleteKey">Key to Delete:</label>
<input type="text" id="deleteKey" placeholder="Enter key to delete">
<button onclick="deleteRecord()">Delete Record</button>

<script>
    let database = {};

    function addRecord() {
        const key = document.getElementById('recordKey').value;
        const value = document.getElementById('recordValue').value;
        if (key && value) {
            database[key] = value;
            refreshRecordList();
            clearFields();
        } else {
            alert("Please input both key and value.");
        }
    }

    function refreshRecordList() {
        const recordList = document.getElementById('recordList');
        recordList.innerHTML = '';
        for (const key in database) {
            const li = document.createElement('li');
            li.textContent = `${key}: ${database[key]}`;
            recordList.appendChild(li);
        }
    }

    function searchRecord() {
        const key = document.getElementById('searchKey').value;
        const resultText = database[key] !== undefined ? `Value: ${database[key]}` : 'Record not found.';
        document.getElementById('searchResult').textContent = resultText;
    }

    function updateRecord() {
        const key = document.getElementById('updateKey').value;
        const newValue = document.getElementById('updateValue').value;
        if (key && newValue) {
            if (database[key] !== undefined) {
                database[key] = newValue;
                refreshRecordList();
                clearFields();
            } else {
                alert("Record not found for the given key.");
            }
        } else {
            alert("Please input both key and new value.");
        }
    }

    function deleteRecord() {
        const key = document.getElementById('deleteKey').value;
        if (key) {
            if (database[key] !== undefined) {
                delete database[key];
                refreshRecordList();
                clearFields();
            } else {
                alert("Record not found for the given key.");
            }
        } else {
            alert("Please input a key to delete.");
        }
    }

    function clearFields() {
        document.getElementById('recordKey').value = '';
        document.getElementById('recordValue').value = '';
        document.getElementById('searchKey').value = '';
        document.getElementById('updateKey').value = '';
        document.getElementById('updateValue').value = '';
        document.getElementById('deleteKey').value = '';
        document.getElementById('searchResult').textContent = '';
    }
</script>

</body>
</html>
