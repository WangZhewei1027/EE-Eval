<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big-Theta Notation</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f0f8ff, #e6e6fa);
            color: #333;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 4rem;
            animation: fadeInDown 1s ease forwards;
        }

        h2 {
            font-size: 2rem;
            margin-top: 20px;
            animation: fadeInUp 1s ease forwards;
        }

        .graph {
            width: 90px;
            height: 80px;
            margin: 0 auto;
            position: absolute;
            top: 80%;
            left: 50%;
            transform: translateX(-50%);
            animation: rise 2s ease forwards;
            opacity: 0;
        }

        .arrow {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid #3498db;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .line {
            width: 5px;
            height: 60px;
            background-color: #ff5733;
            margin: 0 auto;
        }

        .button {
            padding: 10px 20px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background 0.3s;
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        .button:hover {
            background-color: #27ae60;
        }

        @keyframes fadeInDown {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes rise {
            0% {
                transform: translate(-50%, 100%);
                opacity: 0;
            }

            100% {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <header>
        <div>
            <h1>Big-Theta Notation</h1>
            <h2>The Concept of Tight Bound</h2>
            <div class="graph">
                <div class="arrow"></div>
                <div class="line"></div>
                <div class="arrow" style="top: 60%; transform: translate(-50%, -100%); background: #e67e22;"></div>
            </div>
        </div>
        <button class="button" onclick="alert('You can observe the animation representing Big-Theta Notation!')">Learn More</button>
    </header>
</body>

</html>
