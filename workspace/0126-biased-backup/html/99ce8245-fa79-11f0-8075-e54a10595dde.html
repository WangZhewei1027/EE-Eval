<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directed Graph Interactive Demonstration</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #graph { margin-top: 20px; }
        #inputArea, #controlArea { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Directed Graph Interactive Demonstration</h1>
    <div id="inputArea">
        <label for="nodeInput">Node Name: </label>
        <input type="text" id="nodeInput">
        <button onclick="addNode()">Add Node</button>
        <br>
        <label for="sourceInput">Source Node: </label>
        <input type="text" id="sourceInput">
        <label for="targetInput">Target Node: </label>
        <input type="text" id="targetInput">
        <button onclick="addEdge()">Add Edge</button>
    </div>
    <div id="controlArea">
        <button onclick="displayGraph()">Display Graph</button>
        <button onclick="removeNode()">Remove Node</button>
        <button onclick="removeEdge()">Remove Edge</button>
    </div>
    <div id="graph"></div>

    <script>
        let nodes = new Set();
        let edges = new Set();

        function addNode() {
            const node = document.getElementById("nodeInput").value;
            if (node) {
                nodes.add(node);
                document.getElementById("nodeInput").value = '';
                updateGraph();
            }
        }

        function addEdge() {
            const source = document.getElementById("sourceInput").value;
            const target = document.getElementById("targetInput").value;
            if (source && target && nodes.has(source) && nodes.has(target)) {
                edges.add(`${source}->${target}`);
                document.getElementById("sourceInput").value = '';
                document.getElementById("targetInput").value = '';
                updateGraph();
            } else {
                alert("Invalid source or target node!");
            }
        }

        function removeNode() {
            const node = document.getElementById("nodeInput").value;
            if (nodes.has(node)) {
                nodes.delete(node);
                edges = new Set([...edges].filter(edge => !edge.startsWith(node) && !edge.endsWith(node)));
                document.getElementById("nodeInput").value = '';
                updateGraph();
            } else {
                alert("Node does not exist!");
            }
        }

        function removeEdge() {
            const source = document.getElementById("sourceInput").value;
            const target = document.getElementById("targetInput").value;
            const edge = `${source}->${target}`;
            if (edges.has(edge)) {
                edges.delete(edge);
                document.getElementById("sourceInput").value = '';
                document.getElementById("targetInput").value = '';
                updateGraph();
            } else {
                alert("Edge does not exist!");
            }
        }

        function displayGraph() {
            let displayArea = document.getElementById("graph");
            displayArea.innerHTML = "<strong>Nodes:</strong> " + Array.from(nodes).join(", ") + "<br><strong>Edges:</strong> " + Array.from(edges).join(", ");
        }

        function updateGraph() {
            displayGraph();
        }
    </script>
</body>
</html>
