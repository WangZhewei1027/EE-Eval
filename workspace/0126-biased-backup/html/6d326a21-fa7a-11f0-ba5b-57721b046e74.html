<!DOCTYPE html>
<html>
<head>
    <title>Static Typing Explorer</title>
    <script>
        let currentExample = 0;
        let typeSystem = 'TypeScript';
        let strictMode = true;
        let userCode = '';
        let typeErrors = [];
        let inferredTypes = {};
        let typeAnnotations = {};

        const examples = [
            {
                title: "Basic Type Annotations",
                description: "Explicitly declare variable types",
                code: `let age: number = 30;
let name: string = "Alice";
let isActive: boolean = true;`,
                controls: [
                    {type: "checkbox", id: "strict1", label: "Strict Mode", checked: true},
                    {type: "dropdown", id: "lang1", label: "Language", options: ["TypeScript", "Flow"], value: "TypeScript"}
                ]
            },
            {
                title: "Function Signatures",
                description: "Type annotations for function parameters and return values",
                code: `function add(a: number, b: number): number {
    return a + b;
}

const result = add(5, "10");`,
                controls: [
                    {type: "slider", id: "paramCount", label: "Parameters", min: 1, max: 5, value: 2},
                    {type: "button", id: "toggleReturn", label: "Toggle Return Type"}
                ]
            },
            {
                title: "Type Inference",
                description: "How types are automatically determined",
                code: `let inferredNumber = 42;
let inferredString = "hello";
let inferredArray = [1, 2, 3];`,
                controls: [
                    {type: "button", id: "showTypes", label: "Show Inferred Types"},
                    {type: "button", id: "addAnnotation", label: "Add Annotation"}
                ]
            },
            {
                title: "Union Types",
                description: "Variables that can be multiple types",
                code: `let id: string | number;
id = "ABC123";
id = 456;`,
                controls: [
                    {type: "checkbox", id: "strict4", label: "Strict Null Checks", checked: false},
                    {type: "dropdown", id: "unionCount", label: "Union Members", options: ["2", "3", "4"], value: "2"}
                ]
            }
        ];

        function init() {
            loadExample(currentExample);
            document.getElementById('prev').addEventListener('click', prevExample);
            document.getElementById('next').addEventListener('click', nextExample);
            document.getElementById('run').addEventListener('click', checkTypes);
            document.getElementById('code').addEventListener('input', updateCode);
        }

        function loadExample(index) {
            const example = examples[index];
            document.getElementById('title').textContent = example.title;
            document.getElementById('description').textContent = example.description;
            document.getElementById('code').value = example.code;
            userCode = example.code;
            
            const controlsDiv = document.getElementById('controls');
            controlsDiv.innerHTML = '';
            
            example.controls.forEach(control => {
                const div = document.createElement('div');
                const label = document.createElement('label');
                label.textContent = control.label + ': ';
                
                if (control.type === 'checkbox') {
                    const input = document.createElement('input');
                    input.type = 'checkbox';
                    input.id = control.id;
                    input.checked = control.checked || false;
                    input.addEventListener('change', updateSettings);
                    label.appendChild(input);
                } 
                else if (control.type === 'dropdown') {
                    const select = document.createElement('select');
                    select.id = control.id;
                    control.options.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option;
                        opt.textContent = option;
                        if (option === control.value) opt.selected = true;
                        select.appendChild(opt);
                    });
                    select.addEventListener('change', updateSettings);
                    label.appendChild(select);
                }
                else if (control.type === 'slider') {
                    const input = document.createElement('input');
                    input.type = 'range';
                    input.id = control.id;
                    input.min = control.min;
                    input.max = control.max;
                    input.value = control.value;
                    input.addEventListener('input', updateSettings);
                    label.appendChild(input);
                    const valueSpan = document.createElement('span');
                    valueSpan.id = control.id + 'Value';
                    valueSpan.textContent = control.value;
                    div.appendChild(valueSpan);
                }
                else if (control.type === 'button') {
                    const button = document.createElement('button');
                    button.id = control.id;
                    button.textContent = control.label;
                    button.addEventListener('click', () => handleButton(control.id));
                    div.appendChild(button);
                }
                
                div.appendChild(label);
                controlsDiv.appendChild(div);
            });
            
            updateOutput();
        }

        function updateSettings() {
            strictMode = document.getElementById('strict1') ? document.getElementById('strict1').checked : true;
            typeSystem = document.getElementById('lang1') ? document.getElementById('lang1').value : 'TypeScript';
            
            if (document.getElementById('paramCount')) {
                const paramCount = document.getElementById('paramCount').value;
                document.getElementById('paramCountValue').textContent = paramCount;
                updateFunctionParams(parseInt(paramCount));
            }
            
            updateOutput();
        }

        function updateFunctionParams(count) {
            let params = '';
            let args = '';
            for (let i = 0; i < count; i++) {
                params += `param${i}: number, `;
                args += `${i * 10}, `;
            }
            params = params.slice(0, -2);
            args = args.slice(0, -2);
            
            userCode = `function example(${params}): number {
    return ${args.split(',').map((_, i) => `param${i}`).join(' + ')};
}

const result = example(${args});`;
            document.getElementById('code').value = userCode;
        }

        function handleButton(id) {
            if (id === 'showTypes') {
                showInferredTypes();
            } else if (id === 'addAnnotation') {
                addTypeAnnotation();
            } else if (id === 'toggleReturnType') {
                toggleReturnType();
            }
        }

        function showInferredTypes() {
            inferredTypes = {
                'inferredNumber': 'number',
                'inferredString': 'string',
                'inferredArray': 'number[]'
            };
            updateOutput();
        }

        function addTypeAnnotation() {
            typeAnnotations = {
                'inferredNumber': ': number',
                'inferredString': ': string',
                'inferredArray': ': number[]'
            };
            updateOutput();
        }

        function toggleReturnType() {
            const code = document.getElementById('code').value;
            if (code.includes(': number')) {
                userCode = code.replace(': number', ': string');
                userCode = userCode.replace('a + b', 'a.toString() + b.toString()');
            } else {
                userCode = code.replace(': string', ': number');
                userCode = userCode.replace('a.toString() + b.toString()', 'a + b');
            }
            document.getElementById('code').value = userCode;
            updateOutput();
        }

        function updateCode() {
            userCode = document.getElementById('code').value;
            updateOutput();
        }

        function checkTypes() {
            // Simulate type checking
            typeErrors = [];
            
            if (userCode.includes('add(5, "10")')) {
                typeErrors.push("Argument of type 'string' is not assignable to parameter of type 'number'");
            }
            
            if (userCode.includes('let id: string | number') && strictMode) {
                typeErrors.push("Type 'number' is not assignable to type 'string'");
            }
            
            updateOutput();
        }

        function updateOutput() {
            let output = '';
            
            if (Object.keys(inferredTypes).length > 0) {
                output += "Inferred Types:\n";
                for (const [varName, type] of Object.entries(inferredTypes)) {
                    output += `${varName}: ${type}\n`;
                }
                output += "\n";
            }
            
            if (Object.keys(typeAnnotations).length > 0) {
                output += "Suggested Annotations:\n";
                for (const [varName, annotation] of Object.entries(typeAnnotations)) {
                    output += `let ${varName}${annotation} = ...\n`;
                }
                output += "\n";
            }
            
            if (typeErrors.length > 0) {
                output += "Type Errors:\n";
                typeErrors.forEach(err => output += `❌ ${err}\n`);
            } else if (typeErrors.length === 0 && document.getElementById('run')?.clicked) {
                output += "✅ No type errors found!";
            }
            
            document.getElementById('output').textContent = output;
        }

        function nextExample() {
            if (currentExample < examples.length - 1) {
                currentExample++;
                loadExample(currentExample);
            }
        }

        function prevExample() {
            if (currentExample > 0) {
                currentExample--;
                loadExample(currentExample);
            }
        }
    </script>
</head>
<body onload="init()">
    <h1>Static Typing Explorer</h1>
    
    <div>
        <button id="prev">Previous</button>
        <button id="next">Next</button>
        <span id="title"></span>
    </div>
    
    <p id="description"></p>
    
    <div id="controls"></div>
    
    <div>
        <textarea id="code" rows="10" cols="80"></textarea>
    </div>
    
    <div>
        <button id="run">Check Types</button>
    </div>
    
    <pre id="output"></pre>
    
    <div>
        <h3>Current Settings</h3>
        <p>Type System: <span id="currentTypeSystem">TypeScript</span></p>
        <p>Strict Mode: <span id="currentStrictMode">true</span></p>
    </div>
</body>
</html>
