<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Refactoring — Visual Demo</title>
<style>
  :root{
    --bg-1: #0f1724;
    --bg-2: #071026;
    --glass-1: rgba(255,255,255,0.06);
    --accent: #7dd3fc;
    --accent-2: #a78bfa;
    --muted: rgba(255,255,255,0.45);
    --glass-border: rgba(255,255,255,0.06);
    --glass-glow: rgba(124,58,237,0.12);
    --success: #36d399;
    --shadow: 0 10px 30px rgba(2,6,23,0.6);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }

  /* Page */
  html,body{height:100%; margin:0; background:linear-gradient(180deg,var(--bg-1),var(--bg-2)); color:#e6eef8; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;}
  .stage{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px;
    position:relative;
    overflow:hidden;
  }

  /* Background dynamic shapes */
  .blob {
    position:absolute;
    filter: blur(40px) contrast(120%);
    opacity:0.8;
    mix-blend-mode: screen;
    transform-origin: center;
    will-change: transform, opacity;
    pointer-events:none;
  }
  .blob.b1{ width:560px; height:560px; background: radial-gradient(circle at 30% 20%, #7dd3fc 0%, #67e8f9 15%, transparent 40%); left:-10%; top:5%; animation: drift1 12s ease-in-out infinite; }
  .blob.b2{ width:420px; height:420px; background: radial-gradient(circle at 70% 80%, #a78bfa 0%, #7c3aed 20%, transparent 50%); right:-8%; bottom:-6%; animation: drift2 14s ease-in-out infinite; }
  .blob.b3{ width:220px; height:220px; background: radial-gradient(circle at 40% 60%, #60a5fa 0%, #38bdf8 30%, transparent 60%); left:50%; top:10%; transform:translateX(-50%); animation: drift3 10s linear infinite; opacity:0.5; }

  @keyframes drift1 { 0%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-20px) rotate(6deg)} 100%{transform:translateY(0) rotate(0deg)} }
  @keyframes drift2 { 0%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(18px) rotate(-4deg)} 100%{transform:translateY(0) rotate(0deg)} }
  @keyframes drift3 { 0%{transform:translateY(0)} 50%{transform:translateY(-8px)} 100%{transform:translateY(0)} }

  /* Central card */
  .panel {
    width:1100px;
    max-width:96vw;
    background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
    border-radius:20px;
    padding:32px;
    box-shadow: var(--shadow);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(8px) saturate(120%);
    position:relative;
    overflow:hidden;
    z-index:2;
  }

  /* Header */
  .head {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    margin-bottom:24px;
  }
  .title {
    display:flex;
    gap:18px;
    align-items:center;
  }
  .logo {
    width:56px; height:56px; border-radius:12px;
    background: linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 6px 20px rgba(122,77,255,0.18), inset 0 -6px 18px rgba(255,255,255,0.06);
    transform:translateZ(0);
  }
  .logo svg{ width:34px; height:34px; }
  .heading {
    line-height:1;
  }
  .heading h1 { font-size:20px; margin:0; letter-spacing:-0.2px; color: #fff; }
  .heading p { margin:2px 0 0 0; font-size:13px; color:var(--muted); }

  .controls {
    display:flex;
    align-items:center;
    gap:12px;
  }
  .kb {
    font-size:12px;
    color:var(--muted);
    padding:8px 10px;
    border-radius:10px;
    background:rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.03);
    box-shadow: 0 6px 16px rgba(2,6,23,0.45);
  }
  .btn {
    -webkit-appearance:none; appearance:none; border:0; cursor:pointer;
    padding:10px 16px; background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02)); color: #fff;
    border-radius:12px; font-weight:600; font-size:14px; letter-spacing:0.2px;
    display:inline-flex; align-items:center; gap:10px;
    transition: transform .18s cubic-bezier(.2,.9,.2,1), box-shadow .18s;
    box-shadow: 0 6px 18px rgba(5,10,30,.45);
  }
  .btn:active{ transform: translateY(1px) scale(.998); }
  .btn .dot {
    width:10px; height:10px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow: 0 6px 20px rgba(124,58,237,0.18);
  }

  /* Workbench area */
  .workbench {
    display:grid;
    grid-template-columns: 1fr 140px 1fr;
    gap:18px;
    align-items:center;
  }
  .pane {
    background: linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.01));
    border-radius:14px;
    padding:18px;
    min-height:320px;
    position:relative;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.03);
  }
  .label {
    position:absolute;
    top:12px; left:14px;
    font-size:12px; color:var(--muted);
    display:flex; gap:8px; align-items:center;
  }
  .label .chip {
    width:8px; height:8px; border-radius:50%;
    background:rgba(255,255,255,0.06); box-shadow: inset 0 0 6px rgba(0,0,0,0.2);
  }

  /* center glyph */
  .center {
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    gap:12px; user-select:none;
  }
  .glyph {
    width:120px; height:120px; border-radius:18px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.012));
    display:flex; align-items:center; justify-content:center; box-shadow: 0 8px 30px rgba(10,15,30,0.45);
    border:1px solid rgba(255,255,255,0.03);
    position:relative;
    transition: transform .7s cubic-bezier(.2,.9,.2,1);
  }
  .glyph .arrow {
    width:72px; height:72px;
    display:block;
    transition: transform .9s cubic-bezier(.2,.9,.2,1), opacity .5s;
    filter: drop-shadow(0 8px 22px rgba(44,199,255,0.06));
  }
  .glyph .badge{
    position:absolute; right:12px; bottom:10px;
    background: linear-gradient(90deg,#0ea5d9,#7c3aed);
    padding:6px 8px; color:#fff; font-weight:700; font-size:11px;
    border-radius:8px; box-shadow: 0 6px 20px rgba(124,58,237,0.12);
  }

  /* Code layout */
  .code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", monospace;
    font-size:13px;
    color:#dbeafe;
    line-height:1.5;
    margin-top:22px;
    position:relative;
  }
  .line {
    white-space:pre;
    display:block;
    transform-origin:left center;
    will-change: transform, opacity;
    opacity:1;
  }
  .muted { color: #92a6c8; }
  .kw { color:#60a5fa; font-weight:600; }
  .fn { color:#a78bfa; font-weight:700; }
  .str { color:#34d399; }
  .num { color:#fbbf24; }
  .comment { color:#94a3b8; font-style:italic; font-weight:500; }

  /* before pane specifics */
  .pane.before .code { padding-left:6px; }
  .pane.after .code { padding-left:6px; }

  /* animation: lines move and morph */
  .run .glyph { transform: rotate(-6deg) scale(1.02); }
  .run .arrow { transform: translateX(8px) rotate(8deg); opacity:0.95; }

  /* animate individual lines in the before pane as they transform */
  .pane.before .line { transition: transform .9s cubic-bezier(.2,.9,.2,1), opacity .6s, filter .6s; }
  .pane.after .line { transition: opacity .6s ease .4s, transform .9s cubic-bezier(.2,.9,.2,1) .4s; opacity:0; transform: translateY(18px) scale(.98); }

  /* when running, animate lines with stagger via style attribute set by JS */
  .run .pane.before .line.animate {
    transform: translateX(-28px) rotate(-2deg) scale(.96);
    opacity:0;
    filter: blur(1px) saturate(.95);
  }
  .run .pane.after .line.animate {
    opacity:1;
    transform: translateY(0) scale(1);
    filter: none;
  }

  /* subtle rulers and decorations */
  .ruler {
    position:absolute; inset:12px; pointer-events:none; opacity:0.06;
    background: repeating-linear-gradient(180deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 28px);
    border-radius:12px;
  }

  /* Footer micro info */
  .meta {
    margin-top:18px;
    display:flex;
    gap:12px;
    align-items:center;
    color:var(--muted);
    font-size:13px;
  }

  /* small responsive */
  @media (max-width:880px){
    .workbench { grid-template-columns: 1fr; }
    .center { order:3; margin:8px 0 0; }
    .pane { min-height:220px; }
  }

  /* tiny flourish */
  .sparkle {
    position:absolute; width:8px; height:8px; border-radius:50%;
    box-shadow: 0 8px 30px rgba(124,58,237,0.22);
    background: radial-gradient(circle, #fff 0%, #7c3aed 40%, #7dd3fc 100%);
    opacity:0; transform:scale(.6);
    animation: twinkle 6s linear infinite;
  }
  .sparkle.s1{ left:20%; top:18%; animation-delay: -1s; }
  .sparkle.s2{ right:18%; bottom:24%; animation-delay: -2.2s; }
  .sparkle.s3{ left:52%; top:64%; animation-delay: -4.5s; }

  @keyframes twinkle {
    0%{ opacity:0; transform:scale(.6) translateY(0); }
    10%{ opacity:1; transform:scale(1) translateY(-6px); }
    50%{ opacity:0.3; transform:scale(.9) translateY(3px) }
    100%{ opacity:0; transform:scale(.6) translateY(0); }
  }

  /* small accessibility focus */
  .btn:focus{ outline:2px solid rgba(125,211,252,0.12); outline-offset:3px; }

</style>
</head>
<body>
<div class="stage">
  <!-- Background blobs -->
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <div class="panel" id="panel" role="region" aria-label="Refactoring visual demonstration">
    <div class="head">
      <div class="title">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#7dd3fc"/>
                <stop offset="1" stop-color="#a78bfa"/>
              </linearGradient>
            </defs>
            <rect x="6" y="6" width="52" height="52" rx="10" fill="url(#g)"/>
            <path d="M20 38 L28 26 L36 34 L44 22" stroke="#0b1220" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".9"/>
          </svg>
        </div>
        <div class="heading">
          <h1>Refactoring</h1>
          <p>Sculpting code into clarity — before → after</p>
        </div>
      </div>

      <div class="controls">
        <div class="kb">Design-first demo</div>
        <button id="actionBtn" class="btn" aria-pressed="false" title="Run the refactor animation">
          <span class="dot" aria-hidden="true"></span>
          <span id="btnText">Run Refactor</span>
        </button>
      </div>
    </div>

    <div class="workbench" aria-hidden="false">
      <div class="pane before" id="beforePane" aria-label="Before refactor">
        <div class="label"><span class="chip"></span><strong style="margin-left:8px">Before</strong></div>
        <div class="ruler" aria-hidden="true"></div>
        <div class="code" id="beforeCode" aria-hidden="false">
          <!-- Lines will be populated by JS for animation control -->
        </div>
      </div>

      <div class="center" aria-hidden="true">
        <div class="glyph" id="glyph">
          <svg class="arrow" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <linearGradient id="ag" x1="0" x2="1">
                <stop offset="0" stop-color="#60a5fa"/>
                <stop offset="1" stop-color="#a78bfa"/>
              </linearGradient>
            </defs>
            <rect x="6" y="6" width="108" height="108" rx="16" fill="url(#ag)" opacity="0.08"></rect>
            <g transform="translate(20,20)" stroke="url(#ag)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
              <path d="M6 36 H60" opacity="0.75"></path>
              <path d="M42 12 L66 36 L42 60" opacity="0.95"></path>
            </g>
          </svg>
          <div class="badge">refactor</div>
        </div>
        <div style="font-size:13px; color:var(--muted)">Transformation</div>
      </div>

      <div class="pane after" id="afterPane" aria-label="After refactor">
        <div class="label"><span class="chip"></span><strong style="margin-left:8px">After</strong></div>
        <div class="ruler" aria-hidden="true"></div>
        <div class="code" id="afterCode" aria-hidden="true">
          <!-- After lines populated by JS -->
        </div>
      </div>
    </div>

    <div class="meta">
      <div style="display:flex;gap:8px;align-items:center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="opacity:.9">
          <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.06)" stroke-width="1.7"></circle>
          <path d="M7 12h10M12 7v10" stroke="rgba(255,255,255,0.16)" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <div style="font-size:13px;color:var(--muted)">One-click animation. Observe how complexity becomes composable.</div>
      </div>
    </div>

    <div class="sparkle s1"></div>
    <div class="sparkle s2"></div>
    <div class="sparkle s3"></div>
  </div>
</div>

<script>
  // Content for before and after
  const beforeLines = [
    { html: '<span class="comment">// utility to fetch and compute user stats</span>' },
    { html: '<span class="kw">async</span> <span class="fn">processUser</span>(user){' },
    { html: '    let data = await fetch("/api/users/"+user.id).then(r=>r.json());' },
    { html: '    // merge, compute, filter, sort — all inline' },
    { html: '    data = data.items.filter(i=>i.active).map(i=>({x:i.score*yOffset(i), name:i.name}));' },
    { html: '    let total=0; for(let i=0;i<data.length;i++){ total+=data[i].x; }' },
    { html: '    let avg = total/data.length; console.log("avg",avg);' },
    { html: '    // side-effects sprinkled everywhere' },
    { html: '    sendTelemetry(user.id, avg); updateUI(avg); return avg;' },
    { html: '}' }
  ];

  const afterLines = [
    { html: '<span class="comment">// refactored: small single-purpose functions</span>' },
    { html: '<span class="kw">async</span> <span class="fn">processUser</span>(user){' },
    { html: '    const data = await <span class="fn">loadUserData</span>(user.id);' },
    { html: '    const stats = <span class="fn">computeStats</span>(data);' },
    { html: '    <span class="fn">present</span>(stats);' },
    { html: '    <span class="fn">track</span>(user.id, stats.avg);' },
    { html: '    return stats.avg;' },
    { html: '}' },
    { html: '' },
    { html: '<span class="kw">async</span> <span class="fn">loadUserData</span>(id){ /* fetch + safe-json */ }' },
    { html: '<span class="kw">function</span> <span class="fn">computeStats</span>(data){ /* filter, map, sum */ }' }
  ];

  const beforeContainer = document.getElementById('beforeCode');
  const afterContainer = document.getElementById('afterCode');
  const panel = document.getElementById('panel');
  const actionBtn = document.getElementById('actionBtn');
  const btnText = document.getElementById('btnText');

  // Create line elements with stagger data attributes
  function renderLines(container, lines, prefix){
    container.innerHTML = '';
    lines.forEach((ln, i) => {
      const line = document.createElement('div');
      line.className = 'line';
      line.dataset.index = i;
      // slight variation to look organic
      line.style.opacity = '1';
      line.style.transform = 'translateY(0) scale(1)';
      line.innerHTML = ln.html;
      container.appendChild(line);
    });
  }

  renderLines(beforeContainer, beforeLines, 'b');
  renderLines(afterContainer, afterLines, 'a');

  // Animation orchestration
  let state = 'idle'; // idle | running | done
  let timeouts = [];

  function clearTimers(){
    timeouts.forEach(t => clearTimeout(t));
    timeouts = [];
  }

  function runRefactor(){
    if(state === 'running') return;
    clearTimers();
    state = 'running';
    panel.classList.add('run');
    actionBtn.setAttribute('aria-pressed','true');
    btnText.textContent = 'Refactoring…';

    // animate before lines out with stagger
    const beforeLinesEls = Array.from(beforeContainer.querySelectorAll('.line'));
    const afterLinesEls = Array.from(afterContainer.querySelectorAll('.line'));

    // add animate class with stagger
    beforeLinesEls.forEach((el, idx) => {
      const delay = idx * 120;
      timeouts.push(setTimeout(() => {
        el.classList.add('animate');
      }, delay));
    });

    // reveal center glyph flourish
    timeouts.push(setTimeout(() => {
      // slide in after pane lines
      afterLinesEls.forEach((el, idx) => {
        const d2 = idx * 80 + 300;
        timeouts.push(setTimeout(() => {
          el.classList.add('animate');
        }, d2));
      });
    }, 420));

    // finally mark done and update button
    timeouts.push(setTimeout(() => {
      state = 'done';
      panel.classList.remove('run');
      // visually settle: ensure before lines faded and after visible
      beforeLinesEls.forEach(el => { el.style.opacity = '0'; });
      afterContainer.parentElement.setAttribute('aria-hidden','false');
      beforeContainer.parentElement.setAttribute('aria-hidden','true');
      actionBtn.setAttribute('aria-pressed','false');
      btnText.textContent = 'Reset';
    }, 1600 + beforeLinesEls.length * 120));
  }

  function reset(){
    clearTimers();
    state = 'idle';
    panel.classList.remove('run');
    actionBtn.setAttribute('aria-pressed','false');
    btnText.textContent = 'Run Refactor';
    // reset DOM lines
    renderLines(beforeContainer, beforeLines);
    renderLines(afterContainer, afterLines);
    // ensure visibility states
    const beforeLinesEls = Array.from(beforeContainer.querySelectorAll('.line'));
    const afterLinesEls = Array.from(afterContainer.querySelectorAll('.line'));
    beforeLinesEls.forEach(el => { el.style.opacity = '1'; el.classList.remove('animate'); });
    afterLinesEls.forEach(el => { el.style.opacity = '0'; el.classList.remove('animate'); el.style.transform = 'translateY(18px) scale(.98)'; });
    afterContainer.parentElement.setAttribute('aria-hidden','true');
    beforeContainer.parentElement.setAttribute('aria-hidden','false');
  }

  // Initial state: after hidden
  reset();

  actionBtn.addEventListener('click', () => {
    if(state === 'idle') runRefactor();
    else reset();
  });

  // small accessibility: allow space/enter to trigger
  actionBtn.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); actionBtn.click(); }
  });

  // decorative gentle animation on load
  window.addEventListener('load', () => {
    const glyph = document.getElementById('glyph');
    glyph.animate([
      { transform: 'translateY(4px) rotate(0deg)' },
      { transform: 'translateY(-2px) rotate(-1deg)' },
      { transform: 'translateY(0px) rotate(0deg)' }
    ], { duration: 2600, iterations: Infinity, easing: 'ease-in-out' });
  });

  // small helper (not interactive) to compute yOffset placeholder in comment
  function yOffset(i){ return 1 + (i%3)/10; }
</script>
</body>
</html>
