<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Linear Search Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600&family=Playfair+Display&family=Poppins:wght@400;600&display=swap');

  /* Root Variables for Colors */
  :root {
    --bg-color: #0e141b;
    --primary-color: #76c7c0;
    --accent-color: #f8b500;
    --text-light: #eaeaea;
    --text-dark: #1f2937;
    --search-highlight: #f57c00;
    --found-color: #4caf50;
    --notfound-color: #e53935;
    --box-bg: #19232f;
    --box-border: #2e3a49;
    --shadow-color: rgba(118, 199, 192, 0.4);
  }

  /* Reset and Base */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  body {
    background: var(--bg-color);
    color: var(--text-light);
    font-family: 'Poppins', 'IBM Plex Sans Arabic', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 5rem;
  }


  /* Header */
  header {
    text-align: center;
    margin-bottom: 2rem;
    user-select: none;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    color: var(--primary-color);
    letter-spacing: 0.04em;
    text-shadow: 0 3px 10px rgba(118,199,192,0.35);
  }

  header p {
    font-weight: 600;
    font-size: 1.2rem;
    color: #a0b9bd;
    margin-top: 0.6rem;
    font-style: italic;
  }


  /* The array container */
  #array-container {
    margin-top: 1.5rem;
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 860px;
  }

  /* Each array item — stylized card */
  .array-item {
    width: 60px;
    height: 60px;
    background: var(--box-bg);
    border-radius: 12px;
    border: 2.5px solid var(--box-border);
    box-shadow:
      0 8px 15px rgba(0,0,0,0.15),
      inset 0 -2px 8px rgba(255 255 255 / 0.08);
    color: var(--text-light);
    font-weight: 600;
    font-size: 1.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    user-select: none;

    /* subtle emboss effect */
    filter: drop-shadow(0 1px 0 rgb(255 255 255 / 0.06));
    transition:
      border-color 0.35s ease,
      box-shadow 0.35s ease,
      color 0.35s ease,
      transform 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  /* Index label below each item */
  .array-item::after {
    content: attr(data-index);
    position: absolute;
    bottom: -22px;
    font-size: 0.72rem;
    color: #658092;
    font-weight: 400;
    letter-spacing: 0.05em;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    user-select: none;
  }

  /* Highlight currently checked */
  .current {
    border-color: var(--accent-color);
    box-shadow:
      0 0 12px 3px var(--accent-color),
      0 0 30px 8px var(--accent-color) inset;
    transform: scale(1.08);
    font-weight: 700;
  }

  /* Found item highlight */
  .found {
    border-color: var(--found-color);
    box-shadow:
      0 0 18px 5px var(--found-color),
      inset 0 0 16px var(--found-color);
    color: var(--found-color);
    transform: scale(1.2);
    font-weight: 700;
  }

  /* Not found highlight */
  .notfound {
    border-color: var(--notfound-color);
    color: var(--notfound-color);
    font-weight: 700;
    transform: scale(1.05);
  }


  /* Search Controls */
  #controls {
    margin-top: 3.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1.2rem;
    justify-content: center;
    max-width: 600px;
  }

  .btn {
    appearance: none;
    background: var(--primary-color);
    color: var(--text-dark);
    border: none;
    border-radius: 28px;
    padding: 0.7rem 1.8rem;
    font-weight: 700;
    font-size: 1.08rem;
    cursor: pointer;
    box-shadow:
      0 5px 12px rgb(118 199 192 / 0.6);
    transition: 
      background-color 0.35s ease,
      box-shadow 0.3s ease,
      transform 0.25s cubic-bezier(0.4,0,0.2,1);
  }

  .btn:hover {
    background: #4ca9a3;
    box-shadow: 0 10px 28px rgb(76 169 163 / 0.75);
    transform: translateY(-3px);
  }

  .btn:active {
    transform: scale(0.95);
    box-shadow: 0 4px 8px rgb(76 169 163 / 0.6);
  }


  /* Input field style */
  input[type="number"] {
    border-radius: 28px;
    border: 2.5px solid var(--box-border);
    background: var(--box-bg);
    color: var(--text-light);
    font-weight: 600;
    font-size: 1.1rem;
    padding: 0.7rem 1.6rem;
    width: 140px;
    text-align: center;
    box-shadow:
      0 8px 12px rgba(0,0,0,0.2),
      inset 0 -3px 8px rgba(255 255 255 / 0.06);
    transition:
      border-color 0.3s ease,
      box-shadow 0.3s ease;
  }

  input[type="number"]::placeholder {
    color: #55717a;
  }

  input[type="number"]:focus {
    outline: none;
    border-color: var(--accent-color);
    box-shadow: 0 0 12px 1px var(--accent-color), inset 0 0 15px var(--accent-color);
    color: var(--text-light);
  }


  /* Explanation text area */
  #explanation {
    margin-top: 4rem;
    font-weight: 600;
    max-width: 730px;
    text-align: center;
    line-height: 1.5;
    font-size: 1.1rem;
    color: #98b4bb;
    font-style: italic;
    user-select: none;
    min-height: 3.8rem;
  }

  /* Footer - subtle */
  footer {
    margin-top: 6rem;
    font-size: 0.9rem;
    color: #3a4b56;
    font-weight: 400;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    user-select: none;
  }


  /* Loading shimmer pattern on current */
  .current::before {
    content: '';
    position: absolute;
    left: -60%;
    top: 0;
    width: 70%;
    height: 100%;
    background: linear-gradient(120deg, transparent 0%, rgba(255 255 255 / 0.15) 50%, transparent 100%);
    animation: shimmer 1.8s ease-in-out infinite;
    border-radius: 12px;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes shimmer {
    0% { transform: translateX(0); }
    100% { transform: translateX(300%); }
  }


  /* Responsive */
  @media (max-width: 640px){
    .array-item {
      width: 48px;
      height: 48px;
      font-size: 1.3rem;
    }
    .array-item::after {
      bottom: -18px;
      font-size: 0.58rem;
    }
    #controls {
      gap: 1rem;
    }
    input[type="number"] {
      width: 110px;
      font-size: 1rem;
    }
  }
</style>
</head>
<body>
<header>
  <h1>Linear Search</h1>
  <p>An Elegant Step-by-Step Visualization</p>
</header>

<main>
  <div id="array-container" aria-label="Array visualization" role="list"></div>

  <div id="controls" aria-label="Search controls">
    <input type="number" min="0" max="99" id="search-input" placeholder="Enter target" aria-label="Target value for Linear Search" />
    <button id="start-btn" class="btn" aria-live="polite" aria-label="Start linear search animation">Start Search</button>
  </div>

  <p id="explanation" aria-live="polite"></p>
</main>

<footer>
  &copy; 2024 &bull; Designed with care by AI
</footer>

<script>
  (() => {
    const arrayContainer = document.getElementById('array-container');
    const explanation = document.getElementById('explanation');
    const startBtn = document.getElementById('start-btn');
    const searchInput = document.getElementById('search-input');

    // Example array - artificial but visually balanced
    const arr = [15, 3, 27, 8, 34, 23, 42, 10, 5, 7, 18, 30, 28, 46, 4];

    // Clear previous
    function clearArrayItems(){
      arrayContainer.innerHTML = '';
    }

    // Build array blocks
    function buildArray(){
      clearArrayItems();
      arr.forEach((num, idx) => {
        const div = document.createElement('div');
        div.classList.add('array-item');
        div.setAttribute('role', 'listitem');
        div.setAttribute('data-index', idx);
        div.textContent = num;
        arrayContainer.appendChild(div);
      });
      explanation.textContent = 'Enter a target number above and press "Start Search" to see linear search in action.';
    }

    // Animation & Search Logic
    async function linearSearch(target) {
      const items = arrayContainer.children;
      explanation.textContent = `Starting linear search for ${target}...`;
      startBtn.disabled = true;
      searchInput.disabled = true;
      searchInput.setAttribute('aria-disabled', 'true');
      startBtn.textContent = 'Searching...';
      const delay = ms => new Promise(res => setTimeout(res, ms));

      // Clear previous states
      for(let i=0; i < items.length; i++){
        items[i].classList.remove('current','found','notfound');
      }

      for (let i=0; i < arr.length; i++){
        items[i].classList.add('current');
        explanation.textContent = `Checking element at index ${i} (value: ${arr[i]})...`;
        await delay(1200);

        if(arr[i] === target){
          items[i].classList.remove('current');
          items[i].classList.add('found');
          explanation.textContent = `Found ${target} at index ${i}. Search complete!`;
          break;
        } else{
          items[i].classList.remove('current');
        }
      }

      // If not found after full pass
      if(!Array.from(items).some(el => el.classList.contains('found'))){
        explanation.textContent = `Target value ${target} not found in the array.`;
        // Subtly highlight all as not found
        for(let j=0; j < items.length; j++){
          items[j].classList.add('notfound');
        }
      }

      startBtn.disabled = false;
      searchInput.disabled = false;
      searchInput.setAttribute('aria-disabled', 'false');
      startBtn.textContent = 'Start Search';
    }

    // Validate and start
    function startSearch(){
      let val = parseInt(searchInput.value, 10);
      if(isNaN(val)){
        explanation.textContent = 'Please enter a valid number to search for.';
        return;
      }
      if(val < 0 || val > 99){
        explanation.textContent = 'Please enter a number between 0 and 99.';
        return;
      }
      // Remove previous notfound
      const items = arrayContainer.children;
      for(let i=0; i < items.length; i++){
        items[i].classList.remove('notfound','found','current');
      }
      linearSearch(val);
    }

    // Initialize
    buildArray();

    // Events
    startBtn.addEventListener('click', startSearch);
    searchInput.addEventListener('keydown', e => {
      if(e.key === 'Enter'){
        startSearch();
        e.preventDefault();
      }
    });
  })();
</script>
</body>
</html>
