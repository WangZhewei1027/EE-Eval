<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Linked List</title>
    <style>
        body {
            font-family: monospace;
        }
        #input {
            width: 100%;
            height: 20px;
            margin-bottom: 10px;
            padding: 5px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
        }
        #button {
            width: 100%;
            height: 30px;
            margin-bottom: 10px;
            padding: 5px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        #button:hover {
            background-color: #3e8e41;
        }
        #output {
            width: 100%;
            height: 400px;
            padding: 10px;
            font-size: 16px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>Circular Linked List</h1>
    <div id="input"></div>
    <div id="button">
        <button id="clear">Clear</button>
        <button id="append">Append</button>
        <button id="prev">Prev</button>
        <button id="next">Next</button>
    </div>
    <div id="output"></div>

    <script>
        let head = null;
        let tail = null;
        let headIndex = 0;
        let tailIndex = 0;
        let headSize = 0;

        function append(value) {
            const newNode = document.createElement('div');
            newNode.textContent = value;
            if (head == null) {
                head = newNode;
                headIndex = 0;
            } else {
                tail = newNode;
                tailIndex = tailIndex + 1;
                newNode.previous = tail;
                tail.next = newNode;
            }
            headSize++;
            updateOutput();
        }

        function prev() {
            if (headIndex > 0) {
                head = head.previous;
                headIndex--;
            }
            updateOutput();
        }

        function next() {
            if (tailIndex < headSize - 1) {
                tail = tail.next;
                tailIndex++;
            }
            updateOutput();
        }

        function clear() {
            if (head != null) {
                head = null;
                headIndex = 0;
                tail = null;
                tailIndex = 0;
                headSize = 0;
            }
            updateOutput();
        }

        function updateOutput() {
            const output = document.getElementById('output');
            output.innerHTML = '';
            for (let i = 0; i < headSize; i++) {
                if (i == 0) {
                    output.appendChild(head);
                } else {
                    output.appendChild(head.next);
                }
            }
        }

        append("Head");
        append("Tail");
        append("Middle");
        append("End");

        const input = document.getElementById('input');
        input.addEventListener('input', () => {
            if (input.value.trim() != "") {
                append(input.value.trim());
            } else {
                clear();
            }
        });

        const button = document.getElementById('button');
        button.addEventListener('click', () => {
            if (button.id == 'clear') {
                clear();
            } else if (button.id == 'append') {
                append(input.value.trim());
            } else if (button.id == 'prev') {
                prev();
            } else if (button.id == 'next') {
                next();
            }
        });
    </script>
</body>
</html>
