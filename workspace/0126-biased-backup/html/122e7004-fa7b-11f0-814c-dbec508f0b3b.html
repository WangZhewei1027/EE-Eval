<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Functions Demo</title>
    <style>
        body {
            background-color: #f0f0f0;
        }
        input[type="text"], input[type="number"], input[type="date"] {
            width: 50%;
            margin: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 30%;
            height: 30px;
            margin: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <h1>Hash Functions Demo</h1>
    <div class="container">
        <h2>Hash Functions</h2>
        <p>Hash functions are used to create a fixed-size string of characters from an arbitrary input string.</p>
        <p>Here's an example of a simple hash function that uses SHA-256:</p>
        <pre id="hash"></pre>
        <p>Example input: <input type="text" id="input" placeholder="Enter a string"> <button id="hash-button">Calculate Hash</button></p>
        <p>Example output: <pre id="output"></pre></p>
        <div class="controls">
            <label for="length">Hash length:</label>
            <select id="length" name="length">
                <option value="32">32</option>
                <option value="64">64</option>
                <option value="128">128</option>
            </select>
            <label for="algorithm">Hash algorithm:</label>
            <select id="algorithm" name="algorithm">
                <option value="sha256">SHA-256</option>
                <option value="md5">MD5</option>
            </select>
            <button id="generate-btn">Generate Hash</button>
        </div>
    </div>
    <script>
        const input = document.getElementById('input');
        const hashButton = document.getElementById('hash-button');
        const hashOutput = document.getElementById('hash');
        const output = document.getElementById('output');
        const lengthSelect = document.getElementById('length');
        const algorithmSelect = document.getElementById('algorithm');
        const generateBtn = document.getElementById('generate-btn');

        const hash = (inputValue) => {
            const hash = crypto.createHash('sha256');
            hash.update(inputValue);
            return hash.digest('hex');
        };

        const generateHash = () => {
            const input_value = input.value;
            const length = parseInt(lengthSelect.value);
            const algorithm = algorithmSelect.value;
            const hash = hash(input_value, length, algorithm);
            hashOutput.textContent = hash;
        };

        hashButton.addEventListener('click', generateHash);

        generateBtn.addEventListener('click', generateHash);
    </script>
</body>
</html>
