<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked List</title>
    <style>
        body {
            font-family: monospace;
        }
        #list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #list li {
            padding: 0;
            margin: 0;
            border-bottom: 1px solid black;
            cursor: pointer;
        }
        #list li:hover {
            background-color: #ccc;
        }
        #input-field {
            padding: 0 10px;
            margin: 10px 0;
            width: 50%;
        }
        #buttons {
            padding: 0 10px;
            margin: 10px 0;
            width: 50%;
        }
    </style>
</head>
<body>

<button id="add-button">Add</button>
<button id="remove-button">Remove</button>
<button id="clear-button">Clear</button>
<input id="input-field" type="text" placeholder="Enter value">
<div id="list"></div>

<script>
    let list = document.getElementById('list');
    let inputField = document.getElementById('input-field');
    let buttons = document.getElementById('buttons');

    function addValue(value) {
        let li = document.createElement('li');
        li.textContent = value;
        list.appendChild(li);
    }

    function removeValue(index) {
        list.removeChild(list.childNodes[index]);
    }

    function clearList() {
        list.innerHTML = '';
    }

    let currentValue = '';

    function handleAddClick() {
        addValue(currentValue);
        currentValue = '';
        inputField.value = '';
        list.innerHTML = '';
    }

    function handleRemoveClick(index) {
        removeValue(index);
    }

    function handleClearClick() {
        clearList();
    }

    let currentValueInput = document.getElementById('input-field');
    currentValueInput.addEventListener('input', () => {
        currentValue = currentValueInput.value;
    });

    buttons.addEventListener('click', () => {
        if (currentValue !== '') {
            addValue(currentValue);
        }
    });

    inputField.addEventListener('input', handleAddClick);

    document.getElementById('add-button').addEventListener('click', handleAddClick);
    document.getElementById('remove-button').addEventListener('click', handleRemoveClick);
    document.getElementById('clear-button').addEventListener('click', handleClearClick);
</script>

</body>
</html>
