<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Neural Network Demo</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Interactive Neural Network Demo</h1>
    <div>
        <label for="num_layers">Number of Layers:</label>
        <input type="range" id="num_layers" min="1" max="10" value="3" />
        <span id="layer_count">3</span>
    </div>
    <div>
        <label for="neurons_per_layer">Neurons per Layer:</label>
        <input type="number" id="neurons_per_layer" min="1" value="5" />
    </div>
    <div>
        <button id="create_network">Create Network</button>
    </div>
    
    <h2>Network Configuration:</h2>
    <pre id="network_config"></pre>

    <h2>Training Data</h2>
    <div>
        <label for="input_data">Input Data (comma-separated):</label>
        <input type="text" id="input_data" placeholder="0.2, 0.8" />
    </div>
    <div>
        <button id="train_network">Train Network</button>
    </div>
    
    <h2>Output</h2>
    <pre id="output_display"></pre>

    <h2>Test the Network</h2>
    <div>
        <label for="test_data">Test Data (comma-separated):</label>
        <input type="text" id="test_data" placeholder="0.1, 0.9" />
    </div>
    <div>
        <button id="run_network">Run Network</button>
    </div>

    <script>
        let numLayers = 3;
        let neuronsPerLayer = 5;
        let network = [];

        document.getElementById('num_layers').addEventListener('input', function() {
            numLayers = this.value;
            document.getElementById('layer_count').textContent = numLayers;
        });

        document.getElementById('neurons_per_layer').addEventListener('input', function() {
            neuronsPerLayer = this.value;
        });

        document.getElementById('create_network').addEventListener('click', function() {
            network = [];
            for (let i = 0; i < numLayers; i++) {
                let layer = [];
                for (let j = 0; j < neuronsPerLayer; j++) {
                    layer.push(Math.random());
                }
                network.push(layer);
            }
            displayNetworkConfig();
        });

        function displayNetworkConfig() {
            document.getElementById('network_config').textContent = JSON.stringify(network);
        }

        document.getElementById('train_network').addEventListener('click', function() {
            let inputData = document.getElementById('input_data').value.split(',').map(Number);
            if (inputData.length !== neuronsPerLayer) {
                alert("Input data must match the number of neurons per layer!");
                return;
            }
            // Simulate training (skipping complex logic for demonstration)
            for (let i = 0; i < network.length; i++) {
                for (let j = 0; j < network[i].length; j++) {
                    network[i][j] += inputData[i % inputData.length] * 0.1; // Random training logic
                }
            }
            document.getElementById('output_display').textContent = "Network trained!";
        });

        document.getElementById('run_network').addEventListener('click', function() {
            let testData = document.getElementById('test_data').value.split(',').map(Number);
            if (testData.length !== neuronsPerLayer) {
                alert("Test data must match the number of neurons per layer!");
                return;
            }

            let output = network.map(layer => {
                return layer.map(weight => {
                    return weight * testData[0]; // Simple output calculation
                });
            });

            document.getElementById('output_display').textContent = JSON.stringify(output);
        });
    </script>
</body>
</html>
