<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizing Sets</title>
    <style>
        :root {
            --primary: #6a1b9a;
            --secondary: #ffab00;
            --tertiary: #00acc1;
            --background: #f8f9fa;
            --text: #212529;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--background);
            color: var(--text);
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        h1 {
            font-size: 3.5rem;
            font-weight: 300;
            margin-bottom: 1rem;
            text-align: center;
            color: var(--primary);
            letter-spacing: -1px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 3rem;
            font-weight: 300;
            color: #666;
        }
        
        .visualization {
            position: relative;
            height: 70vh;
            width: 100%;
            margin-bottom: 3rem;
        }
        
        .set {
            position: absolute;
            border-radius: 50%;
            opacity: 0.8;
            mix-blend-mode: multiply;
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .set-a {
            background-color: var(--primary);
            width: 300px;
            height: 300px;
            top: 50%;
            left: 35%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
        
        .set-b {
            background-color: var(--secondary);
            width: 280px;
            height: 280px;
            top: 50%;
            left: 65%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }
        
        .intersection {
            position: absolute;
            background-color: var(--tertiary);
            opacity: 0;
            border-radius: 50%;
            width: 0px;
            height: 0px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        button {
            padding: 0.8rem 1.6rem;
            background: linear-gradient(135deg, var(--primary), #9c27b0);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button.secondary {
            background: linear-gradient(135deg, #666, #888);
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        
        .footer {
            text-align: center;
            margin-top: 4rem;
            color: #666;
            font-size: 0.9rem;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .element {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: all 0.6s ease;
            z-index: 10;
        }
        
        /* Set animation states */
        .show-intersection .intersection {
            opacity: 0.8;
            width: 200px;
            height: 200px;
        }
        
        .show-intersection .set-a {
            left: 30%;
        }
        
        .show-intersection .set-b {
            left: 70%;
        }
        
        /* Floating animation for elements */
        .element:nth-child(1) { top: 40%; left: 30%; animation: float 3s ease-in-out infinite; }
        .element:nth-child(2) { top: 60%; left: 25%; animation: float 4s ease-in-out infinite 0.5s; }
        .element:nth-child(3) { top: 55%; left: 40%; animation: float 3.5s ease-in-out infinite 0.2s; }
        .element:nth-child(4) { top: 45%; left: 70%; animation: float 4.2s ease-in-out infinite 0.7s; }
        .element:nth-child(5) { top: 60%; left: 75%; animation: float 3.8s ease-in-out infinite 0.3s; }
        .element:nth-child(6) { top: 50%; left: 50%; animation: float 4.5s ease-in-out infinite; background-color: var(--tertiary); }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .visualization {
                height: 50vh;
            }
            
            .set-a, .set-b {
                width: 200px;
                height: 200px;
            }
            
            .show-intersection .intersection {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Visualizing Sets</h1>
        <p class="subtitle">A beautiful demonstration of set theory concepts</p>
        
        <div class="visualization" id="visualization">
            <div class="set set-a">Set A</div>
            <div class="set set-b">Set B</div>
            <div class="intersection">A ∩ B</div>
            
            <div class="element">1</div>
            <div class="element">2</div>
            <div class="element">3</div>
            <div class="element">4</div>
            <div class="element">5</div>
            <div class="element">6</div>
        </div>
        
        <div class="controls">
            <button id="showIntersection">Show Intersection</button>
            <button class="secondary" id="reset">Reset</button>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background-color: var(--primary);"></div>
                <span>Set A</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: var(--secondary);"></div>
                <span>Set B</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: var(--tertiary);"></div>
                <span>Intersection</span>
            </div>
        </div>
        
        <div class="footer">
            <p>An elegant visualization of set theory concepts</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const visualization = document.getElementById('visualization');
            const showIntersectionBtn = document.getElementById('showIntersection');
            const resetBtn = document.getElementById('reset');
            
            showIntersectionBtn.addEventListener('click', function() {
                visualization.classList.add('show-intersection');
                
                // Animate elements to their proper sets
                const elements = document.querySelectorAll('.element');
                elements.forEach((el, index) => {
                    if (index < 3) {
                        el.style.backgroundColor = 'var(--primary)';
                        el.style.color = 'white';
                    } else if (index < 5) {
                        el.style.backgroundColor = 'var(--secondary)';
                        el.style.color = 'white';
                    } else {
                        el.style.backgroundColor = 'var(--tertiary)';
                        el.style.color = 'white';
                    }
                });
            });
            
            resetBtn.addEventListener('click', function() {
                visualization.classList.remove('show-intersection');
                
                // Reset elements
                const elements = document.querySelectorAll('.element');
                elements.forEach(el => {
                    el.style.backgroundColor = 'white';
                    el.style.color = 'var(--text)';
                });
            });
            
            // Initial animation
            setTimeout(() => {
                visualization.classList.add('show-intersection');
                setTimeout(() => {
                    visualization.classList.remove('show-intersection');
                }, 3000);
            }, 1000);
        });
    </script>
</body>
</html>
