<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Max Heap Visualization — Elegant Concept</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto:wght@400&display=swap');

  /* Reset & base */
  * {
    box-sizing: border-box;
  }
  body {
    margin:0;
    min-height:100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Roboto', sans-serif;
    color: #e6eaf0;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3.5rem 1rem 5rem 1rem;
  }

  h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 3rem;
    letter-spacing: 0.12em;
    margin-bottom: 0.4rem;
    color: #ffd95b;
    text-shadow:
      0 0 10px #ffd95b90,
      0 0 30px #ffd95b70,
      0 0 40px #ffcc33aa;
  }

  h2 {
    font-weight: 400;
    font-size: 1.25rem;
    color: #fff9e8cc;
    margin-bottom: 3rem;
    font-style: italic;
    letter-spacing: 0.06em;
  }

  .container {
    max-width: 1100px;
    width: 100%;
    background: rgba(35,47,57,0.65);
    border-radius: 20px;
    padding: 3rem 2rem 4rem 2rem;
    box-shadow:
      inset 0 0 30px #ffd95b33,
      0 15px 35px rgb(255 217 91 / 0.22);
    backdrop-filter: blur(14px);
    position: relative;
  }

  /* Heap tree container */
  .heap {
    display: flex;
    justify-content: center;
    position: relative;
  }

  /* Nodes styling */
  .node {
    position: relative;
    background: linear-gradient(145deg, #ffdc76 0%, #fad84f 80%);
    width: 70px;
    height: 70px;
    border-radius: 50%;
    box-shadow:
      0 0 15px #ffdc76aa,
      inset 0 4px 8px #e5c751,
      0 6px 15px #b88903;
    font-family: 'Poppins', sans-serif;
    font-size: 1.7rem;
    font-weight: 600;
    color: #422f01;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    transition: transform 0.45s cubic-bezier(0.5, 0, 0, 1), box-shadow 0.3s;
    cursor: default;
    z-index: 10;
  }
  .node.hover-glow:hover {
    box-shadow:
      0 0 25px #ffd95bcc,
      inset 0 4px 8px #ffdb60,
      0 8px 20px #b58a00;
    transform: scale(1.14) translateY(-4px);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s;
    cursor: default;
  }

  /* Connections lines */
  svg {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    overflow: visible;
    width: 100%;
    height: 100%;
  }
  line {
    stroke: #ffdc76dd;
    stroke-width: 4;
    stroke-linecap: round;
    filter: drop-shadow(0 0 1.8px #ffd95bcc);
    transition: stroke 0.35s ease;
  }

  /* Layout for heap levels */
  .level {
    display: flex;
    justify-content: center;
    margin: 1.5rem 0;
    gap: 3.4rem;
    position: relative;
  }

  /* smaller gap on upper levels */
  .level.level-0 {
    gap: 0;
  }
  .level.level-1 {
    gap: 6rem;
  }
  .level.level-2 {
    gap: 4rem;
  }

  /* Button container */
  .buttons {
    margin-top: 3.8rem;
    text-align: center;
  }

  button {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(145deg, #ffdc76 0%, #fad84f 100%);
    border: none;
    border-radius: 12px;
    padding: 0.85rem 2.8rem;
    margin: 0 0.9rem;
    font-weight: 600;
    font-size: 1.1rem;
    color: #422f01;
    box-shadow:
      0 0 14px #ffdd6caa,
      inset 0 -4px 6px #d5af09;
    cursor: pointer;
    user-select: none;
    transition:
      box-shadow 0.3s ease,
      color 0.25s ease,
      background 0.25s ease,
      transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  button:hover, button:focus-visible {
    outline-offset: 4px;
    background: linear-gradient(145deg, #fad84f, #ffeb92);
    box-shadow:
      0 0 26px #fff3afcc,
      inset 0 -4px 10px #ffe752;
    color: #483400;
    transform: translateY(-3px) scale(1.07);
  }
  button:active {
    transform: translateY(-1px) scale(1.04);
    box-shadow:
      0 0 18px #ffd94a88,
      inset 0 -4px 6px #c3a403;
  }

  /* Info box */
  .info-box {
    max-width: 550px;
    margin: 3rem auto 0 auto;
    color: #f0e9dbdd;
    font-style: italic;
    letter-spacing: 0.04em;
    font-weight: 500;
    line-height: 1.6;
    font-size: 1.25rem;
    background:
      radial-gradient(circle at bottom right, #fbeebb33 30%, transparent 75%),
      linear-gradient(268deg, #ffd95b33 0%, #a9840066 85%);
    padding: 1.6rem 1.9rem 1.8rem 1.9rem;
    border-radius: 14px;
    box-shadow:
      inset 0 0 25px #ffd95b66;
    user-select: none;
  }

  /* Responsive adjustments */
  @media (max-width: 850px) {
    h1 {
      font-size: 2.3rem;
    }
    h2 {
      font-size: 1rem;
      max-width: 450px;
      margin-bottom: 1.8rem;
    }
    .container {
      padding: 2.5rem 1.6rem 3rem 1.6rem;
    }
    .level {
      gap: 2.7rem !important;
    }
    .node {
      width: 56px;
      height: 56px;
      font-size: 1.25rem;
    }
    .buttons {
      margin-top: 2rem;
    }
    button {
      padding: 0.7rem 2.3rem;
      font-size: 1rem;
      margin: 0 0.6rem;
    }
    .info-box {
      font-size: 1.05rem;
      max-width: 90vw;
      margin-top: 2rem;
    }
  }
</style>
</head>
<body>
  <h1>MAX HEAP</h1>
  <h2>Elegant Visual Demonstration of Heap (Max)</h2>

  <div class="container" aria-label="Max Heap Visualization">
    <div class="heap" id="heap-visual">
      <!-- Levels inserted by JavaScript -->
    </div>

    <svg aria-hidden="true" id="connections"></svg>

    <div class="buttons" role="group" aria-label="Heap controls">
      <button id="btn-reset" aria-pressed="false" title="Reset to original heap">Reset</button>
      <button id="btn-extract" aria-pressed="false" title="Extract max element">Extract Max</button>
    </div>

    <div class="info-box" aria-live="polite" id="info">
      Observe the MAX heap structure: Each parent node is greater than or equal to its children.<br /><br />
      Press <strong>Extract Max</strong> to remove the root (maximum value) visually, showing how the heap reorganizes.<br />
      Use <strong>Reset</strong> to restore the initial heap shape.
    </div>
  </div>

<script>
(() => {
  // Max Heap initial array (complete binary tree)
  const initialHeap = [100, 80, 60, 50, 70, 30, 45];

  // We'll visually construct 3 levels:
  // Level 0: index 0
  // Level 1: indices 1..2
  // Level 2: indices 3..6

  const heapContainer = document.getElementById('heap-visual');
  const svg = document.getElementById('connections');
  const btnReset = document.getElementById('btn-reset');
  const btnExtract = document.getElementById('btn-extract');
  const infoBox = document.getElementById('info');

  let heap = initialHeap.slice();

  // Store references to nodes DOM for animations & positioning
  /** @type {HTMLDivElement[]} **/
  let nodeElements = [];

  // Create level container divs (for layout and spacing)
  const levels = [];
  for (let i=0; i<3; i++) {
    const lvl = document.createElement('div');
    lvl.classList.add('level', `level-${i}`);
    heapContainer.appendChild(lvl);
    levels.push(lvl);
  }

  // Create nodes elements for heap array, place them by levels:
  function buildHeapVisual(array) {
    // Clear previous
    levels.forEach(lvl => lvl.innerHTML = '');
    nodeElements = [];

    // Level 0: index 0
    if(array.length > 0) {
      const node = createNode(array[0], 0);
      levels[0].appendChild(node);
      nodeElements.push(node);
    }
    // Level 1: indices 1,2
    for(let i=1; i<=2; i++){
      if(i >= array.length) break;
      const node = createNode(array[i], i);
      levels[1].appendChild(node);
      nodeElements.push(node);
    }
    // Level 2: indices 3..6
    for(let i=3; i<=6; i++) {
      if(i >= array.length) break;
      const node = createNode(array[i], i);
      levels[2].appendChild(node);
      nodeElements.push(node);
    }
    // After creating nodes, draw connections
    drawConnections(array.length);
  }

  // Create one node circle
  function createNode(value, index) {
    const node = document.createElement('div');
    node.className = 'node hover-glow';
    node.textContent = value;
    node.dataset.index = index.toString();
    return node;
  }

  // Clear and draw lines between parent and children
  function drawConnections(length) {
    while(svg.firstChild) svg.removeChild(svg.firstChild);

    // For each node i:
    // leftChild = 2i + 1, rightChild = 2i + 2
    // draw line from node i center to children centers
    for(let i=0; i<length; i++) {
      const parentNode = nodeElements[i];
      if(!parentNode) continue;
      const parentRect = parentNode.getBoundingClientRect();

      const parentCenter = {
        x: parentRect.left + parentRect.width/2,
        y: parentRect.top + parentRect.height/2
      };

      const leftChildIndex = 2*i + 1;
      const rightChildIndex = 2*i + 2;

      // Draw left line if child exists
      if(leftChildIndex < length) {
        const leftNode = nodeElements[leftChildIndex];
        if(leftNode) {
          const leftRect = leftNode.getBoundingClientRect();
          const leftCenter = {
            x: leftRect.left + leftRect.width/2,
            y: leftRect.top + leftRect.height/2
          };
          drawLine(parentCenter, leftCenter);
        }
      }
      // Draw right line if child exists
      if(rightChildIndex < length) {
        const rightNode = nodeElements[rightChildIndex];
        if(rightNode) {
          const rightRect = rightNode.getBoundingClientRect();
          const rightCenter = {
            x: rightRect.left + rightRect.width/2,
            y: rightRect.top + rightRect.height/2
          };
          drawLine(parentCenter, rightCenter);
        }
      }
    }
  }

  function drawLine(from, to) {
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    // Convert from viewport coords to svg coords inside heapContainer
    // svg position relative to viewport
    const svgRect = svg.getBoundingClientRect();
    line.setAttribute('x1', (from.x - svgRect.left).toFixed(2));
    line.setAttribute('y1', (from.y - svgRect.top).toFixed(2));
    line.setAttribute('x2', (to.x - svgRect.left).toFixed(2));
    line.setAttribute('y2', (to.y - svgRect.top).toFixed(2));

    svg.appendChild(line);
  }

  // On window resize redraw connections to reposition
  window.addEventListener('resize', () => {
    drawConnections(heap.length);
  });

  // Swap animation: animate scaling and shadow glow on involved nodes
  // Helper: animate and return promise that resolves after animation
  function animateSwap(nodeA, nodeB) {
    return new Promise(res => {
      // Animate nodeA scaling up & moving right, nodeB scaling up & moving left, then swap text
      const duration = 400;

      // reset transforms on both nodes before
      nodeA.style.transition = 'none';
      nodeB.style.transition = 'none';
      nodeA.style.transform = 'scale(1) translateX(0)';
      nodeB.style.transform = 'scale(1) translateX(0)';
      nodeA.style.zIndex = 12;
      nodeB.style.zIndex = 12;

      // force reflow
      nodeA.offsetHeight;

      nodeA.style.transition = `transform ${duration}ms cubic-bezier(0.5,0,0,1), box-shadow 0.3s`;
      nodeB.style.transition = `transform ${duration}ms cubic-bezier(0.5,0,0,1), box-shadow 0.3s`;

      nodeA.style.transform = 'scale(1.15) translateX(20px)';
      nodeB.style.transform = 'scale(1.15) translateX(-20px)';
      nodeA.style.boxShadow = '0 0 28px #ffd95bcc, inset 0 8px 15px #ffdd7f, 0 8px 25px #b88600';
      nodeB.style.boxShadow = '0 0 28px #ffd95bcc, inset 0 8px 15px #ffdd7f, 0 8px 25px #b88600';

      setTimeout(() => {
        // Swap text content
        const temp = nodeA.textContent;
        nodeA.textContent = nodeB.textContent;
        nodeB.textContent = temp;

        // Reverse animation
        nodeA.style.transform = 'scale(1) translateX(0)';
        nodeB.style.transform = 'scale(1) translateX(0)';
        nodeA.style.boxShadow = '';
        nodeB.style.boxShadow = '';
      }, duration);

      setTimeout(() => {
        nodeA.style.zIndex = 10;
        nodeB.style.zIndex = 10;
        res();
      }, duration * 2);
    });
  }

  // Visual extract max: remove root, replace root with last element,
  // then heapify down with animations.
  // Disables buttons during operation.
  async function extractMaxVisual() {
    if(heap.length === 0) return;

    btnExtract.disabled = true;
    btnReset.disabled = true;

    infoBox.textContent = "Extracting max element and reorganizing heap...";

    // Animate root node 'popped' and faded out
    const rootNode = nodeElements[0];
    rootNode.style.transition = 'transform 0.5s ease, opacity 0.5s ease';
    rootNode.style.transform = 'scale(1.6) translateY(-40px)';
    rootNode.style.opacity = '0';
    await new Promise(r => setTimeout(r, 550));

    // Remove root from array, replace with last heap leaf
    if(heap.length > 1) {
      heap[0] = heap[heap.length - 1];
    }
    heap.pop();

    // Rebuild heap visuals instantly with updated values, but fade in root
    buildHeapVisual(heap);

    if(heap.length === 0) {
      infoBox.textContent = "Heap is now empty.";
      btnExtract.disabled = false;
      btnReset.disabled = false;
      return;
    }

    // Animate root appearance
    const newRootNode = nodeElements[0];
    newRootNode.style.transform = 'scale(1.6) translateY(-40px)';
    newRootNode.style.opacity = '0';
    // let browser catch repaint
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    newRootNode.style.transition = 'transform 0.4s ease, opacity 0.45s ease';
    newRootNode.style.transform = 'scale(1) translateY(0)';
    newRootNode.style.opacity = '1';
    await new Promise(r => setTimeout(r, 500));

    // Heapify down with swap animations
    let i = 0;
    const n = heap.length;

    function largerChildIndex(i) {
      const left = 2*i + 1;
      const right = 2*i + 2;
      if(left >= n) return -1;
      if(right >= n) return left;
      return (heap[left] > heap[right]) ? left : right;
    }

    while(true) {
      let c = largerChildIndex(i);
      if(c === -1) break;
      if(heap[i] >= heap[c]) break;

      // Animate swap nodes i and c visually
      await animateSwap(nodeElements[i], nodeElements[c]);

      // Swap values in heap array
      [heap[i], heap[c]] = [heap[c], heap[i]];

      // Rebuild visuals text inside nodes to reflect swaps
      nodeElements[i].textContent = heap[i];
      nodeElements[c].textContent = heap[c];

      i = c;
    }

    infoBox.textContent = "Max extracted. Heap property restored.";
    btnExtract.disabled = false;
    btnReset.disabled = false;
  }

  // Reset heap visuals & data to initial state
  function resetHeap() {
    heap = initialHeap.slice();
    buildHeapVisual(heap);
    infoBox.textContent = "Observe the MAX heap structure: Each parent node is greater than or equal to its children.\n\nPress Extract Max to remove the root (maximum value) visually, showing how the heap reorganizes. Use Reset to restore the initial heap shape.";
  }

  btnReset.addEventListener('click', () => {
    resetHeap();
  });

  btnExtract.addEventListener('click', () => {
    extractMaxVisual();
  });

  // Initial load
  function init() {
    resetHeap();
  }

  // Wait for next animation frame to ensure elements have layout before drawing lines
  function delayedDraw() {
    requestAnimationFrame(() => {
      drawConnections(heap.length);
    });
  }

  // After heap build & inject to DOM, draw connections when visible & stable
  const observer = new ResizeObserver(() => {
    delayedDraw();
  });
  observer.observe(heapContainer);

  init();
})();
</script>
</body>
</html>
