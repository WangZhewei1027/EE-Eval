<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doubly Linked List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

       .container {
            width: 300px;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 5px;
            transition: all 0.3s ease-in-out;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        li {
            display: inline-block;
            margin-right: 20px;
            border-bottom: 1px solid black;
        }

        button {
            width: 100%;
            height: 40px;
            padding: 10px 20px;
            background-color: #666;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #007bff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Double Linked List</h1>
        <ul>
            <li><button onclick="addItem()">Add Item</button></li>
            <li><button onclick="removeItem()">Remove Item</button></li>
            <li><button onclick="printList()">Print List</button></li>
        </ul>

        <div id="myList"></div>

        <script src="script.js"></script>
    </body>
</html>
