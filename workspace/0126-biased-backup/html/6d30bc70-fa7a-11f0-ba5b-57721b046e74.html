<!DOCTYPE html>
<html>
<head>
    <title>Relational Database Explorer</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: left; }
        .container { display: flex; gap: 20px; }
        .panel { flex: 1; }
        .query-builder { border: 1px solid #000; padding: 10px; margin-bottom: 20px; }
        .hidden { display: none; }
        button, select, input { margin: 5px; }
    </style>
</head>
<body>
    <h1>Relational Database Explorer</h1>
    
    <div class="container">
        <div class="panel">
            <h2>Database Schema</h2>
            <select id="schema-selector" onchange="loadTableSchema()">
                <option value="">Select a table</option>
                <option value="customers">Customers</option>
                <option value="orders">Orders</option>
                <option value="products">Products</option>
                <option value="order_items">Order Items</option>
            </select>
            
            <div id="schema-details"></div>
            
            <h2>Relationships</h2>
            <div id="relationships">
                <p>Customers 1 → ∞ Orders (customer_id)</p>
                <p>Orders 1 → ∞ Order Items (order_id)</p>
                <p>Products 1 → ∞ Order Items (product_id)</p>
            </div>
        </div>
        
        <div class="panel">
            <h2>Query Builder</h2>
            <div class="query-builder">
                <div>
                    <label>SELECT">SELECT</label>
                    <select id="select-columns" multiple>
                        <option value="*">* (All columns)</option>
                    </select>
                </div>
                <div>
                    <label>FROM</label>
                    <select id="from-table" onchange="updateJoinOptions()">
                        <option value="">Select table</option>
                        <option value="customers">Customers</option>
                        <option value="orders">Orders</option>
                        <option value="products">Products</option>
                    </select>
                </div>
                <div id="join-section" class="hidden">
                    <label>JOIN</label>
                    <select id="join-type">
                        <option value="INNER">INNER JOIN</option>
                        <option value="LEFT">LEFT JOIN</option>
                        <option value="RIGHT">RIGHT JOIN</option>
                    </select>
                    <select id="join-table">
                        <option value="">Select table</option>
                    </select>
                    <div id="join-condition" class="hidden">
                        <span>ON</span>
                        <select id="left-join-column"></select>
                        <span>=</span>
                        <select id="right-join-column"></select>
                    </div>
                </div>
                <div>
                    <label>WHERE</label>
                    <select id="where-column"></select>
                    <select id="where-operator">
                        <option value="=">=</option>
                        <option value=">">></option>
                        <option value="<"><</option>
                        <option value="LIKE">LIKE</option>
                    </select>
                    <input type="text" id="where-value">
                </div>
                <button onclick="executeQuery()">Execute Query</button>
                <button onclick="resetQuery()">Reset</button>
            </div>
            
            <h2>Query Results</h2>
            <div id="query-results"></div>
        </div>
    </div>
    
    <div class="panel">
        <h2>Data Manipulation</h2>
        <div>
            <button onclick="showInsertForm()">Insert Record</button>
            <button onclick="showUpdateForm()">Update Record</button>
            <button onclick="showDeleteForm()">Delete Record</button>
        </div>
        
        <div id="insert-form" class="hidden">
            <h3>Insert Record</h3>
            <select id="insert-table" onchange="loadInsertFields()">
                <option value="">Select table</option>
                <option value="customers">Customers</option>
                <option value="orders">Orders</option>
                <option value="products">Products</option>
            </select>
            <div id="insert-fields"></div>
            <button onclick="performInsert()">Insert</button>
            <button onclick="hideInsertForm()">Cancel</button>
        </div>
        
        <div id="update-form" class="hidden">
            <h3>Update Record</h3>
            <select id="update-table" onchange="loadUpdateFields()">
                <option value="">Select table</option>
                <option value="customers">Customers</option>
                <option value="orders">Orders</option>
                <option value="products">Products</option>
            </select>
            <div id="update-fields"></div>
            <button onclick="performUpdate()">Update</button>
            <button onclick="hideUpdateForm()">Cancel</button>
        </div>
        
        <div id="delete-form" class="hidden">
            <h3>Delete Record</h3>
            <select id="delete-table" onchange="loadDeleteFields()">
                <option value="">Select table</option>
                <option value="customers">Customers</option>
                <option value="orders">Orders</option>
                <option value="products">Products</option>
            </select>
            <div id="delete-fields"></div>
            <button onclick="performDelete()">Delete</button>
            <button onclick="hideDeleteForm()">Cancel</button>
        </div>
    </div>

    <script>
        // Sample database
        const database = {
            customers: [
                { id: 1, name: "John Doe", email: "john@example.com", phone: "555-1234" },
                { id: 2, name: "Jane Smith", email: "jane@example.com", phone: "555-5678" },
                { id: 3, name: "Bob Johnson", email: "bob@example.com", phone: "555-9012" }
            ],
            orders: [
                { id: 1, customer_id: 1, order_date: "2023-01-15", total: 125.50 },
                { id: 2, customer_id: 2, order_date: "2023-01-16", total: 89.99 },
                { id: 3, customer_id: 1, order_date: "2023-01-18", total: 45.75 }
            ],
            products: [
                { id: 1, name: "Laptop", price: 999.99, category: "Electronics" },
                { id: 2, name: "Smartphone", price: 699.99, category: "Electronics" },
                { id: 3, name: "Headphones", price: 149.99, category: "Electronics" }
            ],
            order_items: [
                { id: 1, order_id: 1, product_id: 1, quantity: 1, price: 999.99 },
                { id: 2, order_id: 1, product_id: 3, quantity: 2, price: 149.99 },
                { id: 3, order_id: 2, product_id: 2, quantity: 1, price: 699.99 }
            ]
        };

        // Schema information
        const schema = {
            customers: [
                { name: "id", type: "INTEGER", primary_key: true },
                { name: "name", type: "VARCHAR(100)" },
                { name: "email", type: "VARCHAR(100)" },
                { name: "phone", type: "VARCHAR(20)" }
            ],
            orders: [
                { name: "id", type: "INTEGER", primary_key: true },
                { name: "customer_id", type: "INTEGER", foreign_key: "customers.id" },
                { name: "order_date", type: "DATE" },
                { name: "total", type: "DECIMAL(10,2)" }
            ],
            products: [
                { name: "id", type: "INTEGER", primary_key: true },
                { name: "name", type: "VARCHAR(100)" },
                { name: "price", type: "DECIMAL(10,2)" },
                { name: "category", type: "VARCHAR(50)" }
            ],
            order_items: [
                { name: "id", type: "INTEGER", primary_key: true },
                { name: "order_id", type: "INTEGER", foreign_key: "orders.id" },
                { name: "product_id", type: "INTEGER", foreign_key: "products.id" },
                { name: "quantity", type: "INTEGER" },
                { name: "price", type: "DECIMAL(10,2)" }
            ]
        };

        // Load table schema details
        function loadTableSchema() {
            const tableName = document.getElementById("schema-selector").value;
            const detailsDiv = document.getElementById("schema-details");
            
            if (!tableName) {
                detailsDiv.innerHTML = "";
                return;
            }
            
            let html = `<h3>${tableName}</h3><table><tr><th>Column</th><th>Type</th><th>Key</th></tr>`;
            
            schema[tableName].forEach(column => {
                let keyType = "";
                if (column.primary_key) keyType = "PRIMARY KEY";
                else if (column.foreign_key) keyType = `FOREIGN KEY (${column.foreign_key})`;
                
                html += `<tr>
                    <td>${column.name}</td>
                    <td>${column.type}</td>
                    <td>${keyType}</td>
                </tr>`;
            });
            
            html += "</table>";
            detailsDiv.innerHTML = html;
            
            // Update query builder options
            updateColumnSelectors(tableName);
        }

        // Update column selectors in query builder
        function updateColumnSelectors(tableName) {
            const selectColumns = document.getElementById("select-columns");
            const whereColumn = document.getElementById("where-column");
            
            // Clear existing options (except the first one)
            while (selectColumns.options.length > 1) {
                selectColumns.remove(1);
            }
            while (whereColumn.options.length > 0) {
                whereColumn.remove(0);
            }
            
            // Add new options
            schema[tableName].forEach(column => {
                const option1 = document.createElement("option");
                option1.value = column.name;
                option1.textContent = `${tableName}.${column.name}`;
                selectColumns.appendChild(option1);
                
                const option2 = document.createElement("option");
                option2.value = column.name;
                option2.textContent = `${tableName}.${column.name}`;
                whereColumn.appendChild(option2);
            });
        }

        // Update join options when FROM table changes
        function updateJoinOptions() {
            const fromTable = document.getElementById("from-table").value;
            const joinTableSelect = document.getElementById("join-table");
            const joinSection = document.getElementById("join-section");
            
            // Clear existing options
            while (joinTableSelect.options.length > 1) {
                joinTableSelect.remove(1);
            }
            
            if (!fromTable) {
                joinSection.classList.add("hidden");
                return;
            }
            
            // Show join section
            joinSection.classList.remove("hidden");
            
            // Add possible join options (all tables except the current one)
            Object.keys(schema).forEach(table => {
                if (table !== fromTable) {
                    const option = document.createElement("option");
                    option.value = table;
                    option.textContent = table;
                    joinTableSelect.appendChild(option);
                }
            });
        }

        // Update join condition when join table changes
        function updateJoinCondition() {
            const fromTable = document.getElementById("from-table").value;
            const joinTable = document.getElementById("join-table").value;
            const leftColumn = document.getElementById("left-join-column");
            const rightColumn = document.getElementById("right-join-column");
            const joinCondition = document.getElementById("join-condition");
            
            // Clear existing options
            while (leftColumn.options.length > 0) {
                leftColumn.remove(0);
            }
            while (rightColumn.options.length > 0) {
                rightColumn.remove(0);
            }
            
            if (!fromTable || !joinTable) {
                joinCondition.classList.add("hidden");
                return;
            }
            
            // Show join condition
            joinCondition.classList.remove("hidden");
            
            // Add columns from FROM table
            schema[fromTable].forEach(column => {
                const option = document.createElement("option");
                option.value = column.name;
                option.textContent = `${fromTable}.${column.name}`;
                leftColumn.appendChild(option);
            });
            
            // Add columns from JOIN table
            schema[joinTable].forEach(column => {
                const option = document.createElement("option");
                option.value = column.name;
                option.textContent = `${joinTable}.${column.name}`;
                rightColumn.appendChild(option);
            });
        }

        // Execute the query
        function executeQuery() {
            const selectColumns = Array.from(document.getElementById("select-columns").selectedOptions)
                .map(opt => opt.value);
            const fromTable = document.getElementById("from-table").value;
            const joinType = document.getElementById("join-type").value;
            const joinTable = document.getElementById("join-table").value;
            const leftJoinColumn = document.getElementById("left-join-column").value;
            const rightJoinColumn = document.getElementById("right-join-column").value;
            const whereColumn = document.getElementById("where-column").value;
            const whereOperator = document.getElementById("where-operator").value;
            const whereValue = document.getElementById("where-value").value;
            
            let results = [];
            
            if (!fromTable) {
                alert("Please select a table to query");
                return;
            }
            
            // Simple query without join
            if (!joinTable || !leftJoinColumn || !rightJoinColumn) {
                results = database[fromTable];
                
                // Apply WHERE clause if specified
                if (whereColumn && whereValue) {
                    results = results.filter(row => {
                        const rowValue = row[whereColumn];
                        if (whereOperator === "=") return rowValue == whereValue;
                        if (whereOperator === ">") return rowValue > whereValue;
                        if (whereOperator === "<") return rowValue < whereValue;
                        if (whereOperator === "LIKE") return String(rowValue).includes(whereValue);
                        return true;
                    });
                }
            } else {
                // Join query
                const leftTable = database[fromTable];
                const rightTable = database[joinTable];
                
                leftTable.forEach(leftRow => {
                    rightTable.forEach(rightRow => {
                        if (leftRow[leftJoinColumn] == rightRow[rightJoinColumn]) {
                            let combinedRow = {};
                            
                            // Add all columns from left table
                            Object.keys(leftRow).forEach(key => {
                                combinedRow[`${fromTable}.${key}`] = leftRow[key];
                            });
                            
                            // Add all columns from right table
                            Object.keys(rightRow).forEach(key => {
                                combinedRow[`${joinTable}.${key}`] = rightRow[key];
                            });
                            
                            results.push(combinedRow);
                        }
                    });
                });
            }
            
            // Filter columns if not selecting all
            if (selectColumns.length > 0 && !selectColumns.includes("*")) {
                results = results.map(row => {
                    let filteredRow = {};
                    selectColumns.forEach(col => {
                        if (row[col] !== undefined) {
                            filteredRow[col] = row[col];
                        }
                    });
                    return filteredRow;
                });
            }
            
            // Display results
            displayResults(results);
        }

        // Display query results
        function displayResults(results) {
            const resultsDiv = document.getElementById("query-results");
            
            if (results.length === 0) {
                resultsDiv.innerHTML = "<p>No results found</p>";
                return;
            }
            
            let html = "<table><tr>";
            
            // Create headers
            Object.keys(results[0]).forEach(col => {
                html += `<th>${col}</th>`;
            });
            
            html += "</tr>";
            
            // Add rows
            results.forEach(row => {
                html += "<tr>";
                Object.values(row).forEach(val => {
                    html += `<td>${val}</td>`;
                });
                html += "</tr>";
            });
            
            html += "</table>";
            resultsDiv.innerHTML = html;
        }

        // Reset query builder
        function resetQuery() {
            document.getElementById("from-table").value = "";
            document.getElementById("select-columns").selectedIndex = 0;
            document.getElementById("where-column").value = "";
            document.getElementById("where-operator").value = "=";
            document.getElementById("where-value").value = "";
            document.getElementById("join-section").classList.add("hidden");
            document.getElementById("query-results").innerHTML = "";
        }

        // Data manipulation functions
        function showInsertForm() {
            document.getElementById("insert-form").classList.remove("hidden");
            document.getElementById("update-form").classList.add("hidden");
            document.getElementById("delete-form").classList.add("hidden");
        }

        function hideInsertForm() {
            document.getElementById("insert-form").classList.add("hidden");
        }

        function loadInsertFields() {
            const table = document.getElementById("insert-table").value;
            const fieldsDiv = document.getElementById("insert-fields");
            
            fieldsDiv.innerHTML = "";
            
            if (!table) return;
            
            schema[table].forEach(column => {
                if (!column.primary_key) { // Skip auto-increment primary keys
                    const label = document.createElement("label");
                    label.textContent = column.name;
                    fieldsDiv.appendChild(label);
                    
                    const input = document.createElement("input");
                    input.type = "text";
                    input.id = `insert-${column.name}`;
                    input.placeholder = column.type;
                    fieldsDiv.appendChild(input);
                    
                    fieldsDiv.appendChild(document.createElement("br"));
                }
            });
        }

        function performInsert() {
            const table = document.getElementById("insert-table").value;
            const fieldsDiv = document.getElementById("insert-fields");
            const inputs = fieldsDiv.querySelectorAll("input");
            
            if (!table) {
                alert("Please select a table");
                return;
            }
            
            const newRecord = {};
            schema[table].forEach(column => {
                if (!column.primary_key) {
                    const input = document.getElementById(`insert-${column.name}`);
                    if (input) {
                        newRecord[column.name] = input.value;
                    }
                }
            });
            
            // Generate ID for new record
            if (schema[table].some(col => col.primary_key)) {
                const idField = schema[table].find(col => col.primary_key).name;
                const maxId = Math.max(...database[table].map(r => r[idField]), 0);
                newRecord[idField] = maxId + 1;
            }
            
            database[table].push(newRecord);
            alert("Record inserted successfully");
            hideInsertForm();
        }

        function showUpdateForm() {
            document.getElementById("update-form").classList.remove("hidden");
            document.getElementById("insert-form").classList.add("hidden");
            document.getElementById("delete-form").classList.add("hidden");
        }

        function hideUpdateForm() {
            document.getElementById("update-form").classList.add("hidden");
        }

        function loadUpdateFields() {
            const table = document.getElementById("update-table").value;
            const fieldsDiv = document.getElementById("update-fields");
            
            fieldsDiv.innerHTML = "";
            
            if (!table) return;
            
            // Add ID selector
            const idField = schema[table].find(col => col.primary_key).name;
            const idLabel = document.createElement("label");
            idLabel.textContent = `Select ${idField} to update:`;
            fieldsDiv.appendChild(idLabel);
            
            const idSelect = document.createElement("select");
            idSelect.id = "update-id";
            database[table].forEach(record => {
                const option = document.createElement("option");
                option.value = record[idField];
                option.textContent = record[idField];
                idSelect.appendChild(option);
            });
            fieldsDiv.appendChild(idSelect);
            fieldsDiv.appendChild(document.createElement("br"));
            
            // Add fields to update
            schema[table].forEach(column => {
                if (!column.primary_key) {
                    const label = document.createElement("label");
                    label.textContent = column.name;
                    fieldsDiv.appendChild(label);
                    
                    const input = document.createElement("input");
                    input.type = "text";
                    input.id = `update-${column.name}`;
                    input.placeholder = column.type;
                    fieldsDiv.appendChild(input);
                    
                    fieldsDiv.appendChild(document.createElement("br"));
                }
            });
        }

        function performUpdate() {
            const table = document.getElementById("update-table").value;
            const idField = schema[table].find(col => col.primary_key).name;
            const id = document.getElementById("update-id").value;
            
            if (!table || !id) {
                alert("Please select a table and record");
                return;
            }
            
            const record = database[table].find(r => r[idField] == id);
            if (!record) {
                alert("Record not found");
                return;
            }
            
            schema[table].forEach(column => {
                if (!column.primary_key) {
                    const input = document.getElementById(`update-${column.name}`);
                    if (input && input.value) {
                        record[column.name] = input.value;
                    }
                }
            });
            
            alert("Record updated successfully");
            hideUpdateForm();
        }

        function showDeleteForm() {
            document.getElementById("delete-form").classList.remove("hidden");
            document.getElementById("insert-form").classList.add("hidden");
            document.getElementById("update-form").classList.add("hidden");
        }

        function hideDeleteForm() {
            document.getElementById("delete-form").classList.add("hidden");
        }

        function loadDeleteFields() {
            const table = document.getElementById("delete-table").value;
            const fieldsDiv = document.getElementById("delete-fields");
            
            fieldsDiv.innerHTML = "";
            
            if (!table) return;
            
            const idField = schema[table].find(col => col.primary_key).name;
            const label = document.createElement("label");
            label.textContent = `Select ${idField} to delete:`;
            fieldsDiv.appendChild(label);
            
            const select = document.createElement("select");
            select.id = "delete-id";
            database[table].forEach(record => {
                const option = document.createElement("option");
                option.value = record[idField];
                option.textContent = record[idField];
                select.appendChild(option);
            });
            fieldsDiv.appendChild(select);
        }

        function performDelete() {
            const table = document.getElementById("delete-table").value;
            const idField = schema[table].find(col => col.primary_key).name;
            const id = document.getElementById("delete-id").value;
            
            if (!table || !id) {
                alert("Please select a table and record");
                return;
            }
            
            const index = database[table].findIndex(r => r[idField] == id);
            if (index === -1) {
                alert("Record not found");
                return;
            }
            
            if (confirm("Are you sure you want to delete this record?")) {
                database[table].splice(index, 1);
                alert("Record deleted successfully");
                hideDeleteForm();
            }
        }

        // Initialize event listeners
        document.getElementById("join-table").addEventListener("change", updateJoinCondition);
    </script>
</body>
</html>
