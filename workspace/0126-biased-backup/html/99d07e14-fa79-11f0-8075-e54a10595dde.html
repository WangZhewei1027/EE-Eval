<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket Programming Demo</title>
    <script>
        let socket;
        
        function initSocket() {
            socket = new WebSocket('ws://localhost:8080');

            socket.onopen = function() {
                updateStatus("Socket connected.");
            };

            socket.onmessage = function(event) {
                updateResponse(event.data);
            };

            socket.onclose = function() {
                updateStatus("Socket disconnected.");
            };
            
            socket.onerror = function(error) {
                updateStatus("Socket error: " + error.message);
            };
        }

        function updateStatus(status) {
            document.getElementById('status').innerText = status;
        }

        function updateResponse(response) {
            const responseContainer = document.getElementById('response');
            responseContainer.innerText += response + '\n';
        }

        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value;
            if (message && socket) {
                socket.send(message);
                messageInput.value = '';
                updateResponse('You: ' + message);
            }
        }

        function closeSocket() {
            if (socket) {
                socket.close();
            }
        }

        function setCustomMessage() {
            const customMessage = document.getElementById('customMessageInput').value;
            document.getElementById('messageInput').value = customMessage;
        }

        function changeMessagePriority() {
            const priorityLevel = document.getElementById('prioritySlider').value;
            document.getElementById('priorityDisplay').innerText = "Priority Level: " + priorityLevel;
            const message = `Priority Level: ${priorityLevel}`;
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(message);
                updateResponse(`Sent: ${message}`);
            }
        }

        window.onload = function() {
            initSocket();
        }
    </script>
</head>
<body>
    <h1>Socket Programming Demo</h1>
    <div id="status">Socket not connected.</div>
    <textarea id="response" rows="10" cols="30" readonly></textarea><br/>
    <input type="text" id="messageInput" placeholder="Type your message"/>
    <button onclick="sendMessage()">Send Message</button><br/>
    
    <h2>Custom Message Control</h2>
    <input type="text" id="customMessageInput" placeholder="Set custom message"/>
    <button onclick="setCustomMessage()">Set Custom Message</button><br/>
  
    <h2>Priority Control</h2>
    <input type="range" id="prioritySlider" min="1" max="10" onchange="changeMessagePriority()"/>
    <div id="priorityDisplay">Priority Level: 5</div><br/>

    <button onclick="closeSocket()">Close Socket</button>
</body>
</html>
