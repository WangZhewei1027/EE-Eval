<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directed Graph Visualization</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');
        
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #fd79a8;
            --dark: #2d3436;
            --light: #f5f6fa;
            --edge: #00cec9;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        
        header {
            text-align: center;
            padding: 2rem 1rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 0;
            color: var(--dark);
            letter-spacing: 1px;
        }
        
        .subtitle {
            font-weight: 300;
            font-size: 1.2rem;
            margin-top: 0.5rem;
            color: var(--dark);
        }
        
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .graph-container {
            width: 90%;
            max-width: 900px;
            height: 500px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .node {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
            transition: all 0.3s ease;
            cursor: default;
            z-index: 2;
        }
        
        .node:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.6);
        }
        
        .edge {
            position: absolute;
            height: 3px;
            background: var(--edge);
            transform-origin: left center;
            z-index: 1;
        }
        
        .arrow {
            position: absolute;
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 10px solid var(--edge);
            transform-origin: center;
        }
        
        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
        }
        
        button {
            padding: 0.8rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
        }
        
        button:hover {
            background: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(253, 121, 168, 0.4);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.9rem;
            color: var(--dark);
            opacity: 0.7;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .pulse {
            animation: pulse 3s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <header>
        <h1>Directed Graph</h1>
        <p class="subtitle">A visual representation of interconnected nodes</p>
    </header>
    
    <div class="container">
        <div class="graph-container" id="graph">
            <!-- Nodes and edges will be added dynamically -->
        </div>
        
        <div class="controls">
            <button id="animateBtn">Animate Flow</button>
            <button id="rearrangeBtn">Rearrange</button>
        </div>
    </div>
    
    <footer>
        © 2023 Directed Graph Visualization | Beautiful Data Structures
    </footer>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const graphContainer = document.getElementById('graph');
            const animateBtn = document.getElementById('animateBtn');
            const rearrangeBtn = document.getElementById('rearrangeBtn');
            
            const containerWidth = graphContainer.offsetWidth;
            const containerHeight = graphContainer.offsetHeight;
            
            // Graph data
            const nodes = [
                { id: 'A', label: 'A', x: 0.2, y: 0.5 },
                { id: 'B', label: 'B', x: 0.4, y: 0.3 },
                { id: 'C', label: 'C', x: 0.6, y: 0.7 },
                { id: 'D', label: 'D', x: 0.8, y: 0.4 },
                { id: 'E', label: 'E', x: 0.5, y: 0.8 }
            ];
            
            const edges = [
                { from: 'A', to: 'B' },
                { from: 'A', to: 'C' },
                { from: 'B', to: 'D' },
                { from: 'C', to: 'D' },
                { from: 'D', to: 'E' },
                { from: 'E', to: 'A' }
            ];
            
            // Create nodes
            const nodeElements = {};
            nodes.forEach(node => {
                const nodeElement = document.createElement('div');
                nodeElement.className = 'node';
                nodeElement.textContent = node.label;
                nodeElement.id = node.id;
                
                // Position node
                const x = node.x * (containerWidth - 60);
                const y = node.y * (containerHeight - 60);
                nodeElement.style.left = `${x}px`;
                nodeElement.style.top = `${y}px`;
                
                graphContainer.appendChild(nodeElement);
                nodeElements[node.id] = nodeElement;
            });
            
            // Create edges
            const edgeElements = [];
            edges.forEach(edge => {
                const fromNode = nodeElements[edge.from];
                const toNode = nodeElements[edge.to];
                
                const fromRect = fromNode.getBoundingClientRect();
                const toRect = toNode.getBoundingClientRect();
                
                const graphRect = graphContainer.getBoundingClientRect();
                
                const fromX = fromRect.left - graphRect.left + fromRect.width/2;
                const fromY = fromRect.top - graphRect.top + fromRect.height/2;
                const toX = toRect.left - graphRect.left + toRect.width/2;
                const toY = toRect.top - graphRect.top + toRect.height/2;
                
                // Calculate edge length and angle
                const length = Math.sqrt(Math.pow(toX - fromX, 2) + Math.pow(toY - fromY, 2));
                const angle = Math.atan2(toY - fromY, toX - fromX) * 180 / Math.PI;
                
                // Create edge line
                const edgeElement = document.createElement('div');
                edgeElement.className = 'edge';
                edgeElement.style.width = `${length}px`;
                edgeElement.style.left = `${fromX}px`;
                edgeElement.style.top = `${fromY}px`;
                edgeElement.style.transform = `rotate(${angle}deg)`;
                
                // Create arrow at the end
                const arrow = document.createElement('div');
                arrow.className = 'arrow';
                arrow.style.left = `${length - 10}px`;
                arrow.style.top = `-4px`;
                arrow.style.transform = `rotate(${angle}deg)`;
                
                edgeElement.appendChild(arrow);
                graphContainer.appendChild(edgeElement);
                edgeElements.push(edgeElement);
            });
            
            // Animation function
            function animateFlow() {
                // Reset all nodes
                Object.values(nodeElements).forEach(node => {
                    node.style.backgroundColor = 'var(--primary)';
                    node.classList.remove('pulse');
                });
                
                // Animate the flow through edges
                const flowPath = ['A', 'B', 'D', 'E', 'A', 'C', 'D', 'E'];
                
                flowPath.forEach((nodeId, i) => {
                    setTimeout(() => {
                        const node = nodeElements[nodeId];
                        node.style.backgroundColor = 'var(--accent)';
                        node.classList.add('pulse');
                        
                        // Return to original color after delay
                        setTimeout(() => {
                            node.style.backgroundColor = 'var(--primary)';
                            node.classList.remove('pulse');
                        }, 1000);
                    }, i * 1000);
                });
            }
            
            // Rearrange nodes function
            function rearrangeNodes() {
                nodes.forEach(node => {
                    const nodeElement = nodeElements[node.id];
                    
                    // Generate new random positions (within bounds)
                    const newX = 0.1 + Math.random() * 0.8;
                    const newY = 0.1 + Math.random() * 0.8;
                    
                    // Update node position with smooth transition
                    nodeElement.style.transition = 'left 0.5s ease, top 0.5s ease';
                    nodeElement.style.left = `${newX * (containerWidth - 60)}px`;
                    nodeElement.style.top = `${newY * (containerHeight - 60)}px`;
                    
                    // Update node data
                    node.x = newX;
                    node.y = newY;
                    
                    // Remove transition after animation completes
                    setTimeout(() => {
                        nodeElement.style.transition = 'none';
                    }, 500);
                });
                
                // After nodes move, update edges
                setTimeout(() => {
                    edgeElements.forEach((edgeElement, index) => {
                        edgeElement.remove();
                    });
                    
                    edges.forEach(edge => {
                        const fromNode = nodeElements[edge.from];
                        const toNode = nodeElements[edge.to];
                        
                        const fromRect = fromNode.getBoundingClientRect();
                        const toRect = toNode.getBoundingClientRect();
                        
                        const graphRect = graphContainer.getBoundingClientRect();
                        
                        const fromX = fromRect.left - graphRect.left + fromRect.width/2;
                        const fromY = fromRect.top - graphRect.top + fromRect.height/2;
                        const toX = toRect.left - graphRect.left + toRect.width/2;
                        const toY = toRect.top - graphRect.top + toRect.height/2;
                        
                        const length = Math.sqrt(Math.pow(toX - fromX, 2) + Math.pow(toY - fromY, 2));
                        const angle = Math.atan2(toY - fromY, toX - fromX) * 180 / Math.PI;
                        
                        const edgeElement = document.createElement('div');
                        edgeElement.className = 'edge';
                        edgeElement.style.width = `${length}px`;
                        edgeElement.style.left = `${fromX}px`;
                        edgeElement.style.top = `${fromY}px`;
                        edgeElement.style.transform = `rotate(${angle}deg)`;
                        
                        const arrow = document.createElement('div');
                        arrow.className = 'arrow';
                        arrow.style.left = `${length - 10}px`;
                        arrow.style.top = `-4px`;
                        arrow.style.transform = `rotate(${angle}deg)`;
                        
                        edgeElement.appendChild(arrow);
                        graphContainer.appendChild(edgeElement);
                    });
                }, 500);
            }
            
            // Event listeners
            animateBtn.addEventListener('click', animateFlow);
            rearrangeBtn.addEventListener('click', rearrangeNodes);
            
            // Initial animation
            setTimeout(animateFlow, 1000);
        });
    </script>
</body>
</html>
