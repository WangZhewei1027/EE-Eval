<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Graph (Undirected) — Aesthetic Visualization</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap');

    /* Reset and base */
    * {
      box-sizing: border-box;
      user-select: none;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #0b0f29 0%, #050813 90%);
      font-family: 'Poppins', sans-serif;
      color: #e0e6f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 40px 20px 80px;
    }

    h1 {
      font-weight: 500;
      font-size: 3.2rem;
      letter-spacing: 0.12em;
      margin: 0 0 20px 0;
      user-select: none;
      text-transform: uppercase;
      color: #b3c7ff;
      text-shadow:
        0 0 12px #a4b8ff88,
        0 0 20px #8eabffcc;
    }
    h2 {
      font-weight: 300;
      font-size: 1.15rem;
      margin: 0 0 55px;
      color: #8d9ae8cc;
      letter-spacing: 0.08em;
      font-style: italic;
      user-select: none;
    }

    .container {
      position: relative;
      width: 680px;
      max-width: 95vw;
      aspect-ratio: 1 / 1;
      background: radial-gradient(ellipse at center, #112152 32%, #1c2953 85%);
      border-radius: 28px;
      box-shadow:
        0 8px 20px -3px rgba(49,71,146,0.85),
        inset 0 0 40px #5062f745;
      padding: 24px;
      overflow: visible;
      user-select: none;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      filter:
        drop-shadow(0 0 3px #a5aafe80)
        drop-shadow(0 0 10px #7788fcaa);
    }

    /* Node Styling */
    .node {
      fill: #7f92ffcc;
      stroke: #fbfbffdd;
      stroke-width: 1.7;
      filter:
        drop-shadow(0 0 4px #697affaa);
      transition: fill 0.3s ease, r 0.3s ease;
      cursor: default;
      transform-origin: center center;
      pointer-events: auto;
    }
    .node.highlighted {
      fill: #a4b8ffff;
      r: 14;
      filter:
        drop-shadow(0 0 12px #ced8ffff);
    }

    /* Edge Styling */
    .edge {
      stroke: #99aaffcc;
      stroke-width: 2.4;
      stroke-linecap: round;
      transition:
        stroke 0.25s ease,
        stroke-width 0.25s ease;
      filter: drop-shadow(0 0 4px #aabbffcc);
    }
    .edge.highlighted {
      stroke: #e0eaffff;
      stroke-width: 4;
      filter: drop-shadow(0 0 10px #eff7ffff);
    }

    /* Labels */
    .label {
      font-size: 14px;
      fill: #a3a9ffdd;
      font-weight: 500;
      text-shadow:
        0 0 3px #2d2d7855;
      user-select: none;
      pointer-events: none;
      font-family: 'Poppins', sans-serif;
    }

    /* Glow pulse animation for nodes */
    @keyframes nodeGlowPulse {
      0%, 100% {
        filter: drop-shadow(0 0 5px #839dffcc);
      }
      50% {
        filter: drop-shadow(0 0 18px #a6b6ffff);
      }
    }
    .glow-pulse {
      animation: nodeGlowPulse 3s ease-in-out infinite;
    }

    /* UI Controls */
    .ui-controls {
      margin-top: 48px;
      display: flex;
      gap: 18px;
    }

    button {
      background: linear-gradient(145deg, #7984ef, #5c67d2);
      border: none;
      outline: none;
      padding: 14px 28px;
      border-radius: 14px;
      box-shadow:
        0 4px 8px #4954c2cc,
        inset 0 2px 10px #9da9ffcc;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      color: #e4e8ff;
      letter-spacing: 0.05em;
      user-select: none;
      transition:
        background 0.3s ease,
        box-shadow 0.3s ease,
        transform 0.2s ease;
      font-family: 'Poppins', sans-serif;
      text-transform: uppercase;
    }
    button:hover {
      background: linear-gradient(150deg, #8ea1ff, #7181dd);
      box-shadow:
        0 8px 16px #7e8affcc,
        inset 0 4px 16px #c1c9ffdd;
      transform: translateY(-2.5px);
    }
    button:active {
      transform: translateY(1px);
      box-shadow:
        0 2px 6px #4b54b2cc,
        inset 0 1px 5px #8a9fe8cc;
    }

    /* Tooltip */
    .tooltip {
      position: absolute;
      background: #2d367ddd;
      backdrop-filter: blur(6px);
      padding: 6px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      color: #cdd3ff;
      pointer-events: none;
      user-select: none;
      opacity: 0;
      transform: translate(-50%, -10px) scale(0.85);
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow:
        0 4px 14px -2px #4a5290cc;
      white-space: nowrap;
      font-family: 'Poppins', sans-serif;
      z-index: 100;
    }
    .tooltip.visible {
      opacity: 1;
      transform: translate(-50%, -20px) scale(1);
    }

  </style>
</head>
<body>
  <h1>Graph (Undirected)</h1>
  <h2>An elegant visualization of an undirected graph</h2>

  <div class="container" aria-label="Undirected graph visualization">
    <svg aria-hidden="true" viewBox="0 0 680 680" role="img" >
      <!-- Edges -->
      <line id="e0" class="edge" x1="340" y1="120" x2="520" y2="250" />
      <line id="e1" class="edge" x1="520" y1="250" x2="440" y2="440" />
      <line id="e2" class="edge" x1="440" y1="440" x2="230" y2="440" />
      <line id="e3" class="edge" x1="230" y1="440" x2="130" y2="250" />
      <line id="e4" class="edge" x1="130" y1="250" x2="340" y2="120" />

      <line id="e5" class="edge" x1="340" y1="120" x2="340" y2="520" />
      <line id="e6" class="edge" x1="340" y1="520" x2="230" y2="440" />
      <line id="e7" class="edge" x1="340" y1="520" x2="440" y2="440" />
      <line id="e8" class="edge" x1="130" y1="250" x2="230" y2="440" />

      <!-- Nodes -->
      <circle id="n0" class="node glow-pulse" cx="340" cy="120" r="14" />
      <circle id="n1" class="node glow-pulse" cx="520" cy="250" r="14" />
      <circle id="n2" class="node glow-pulse" cx="440" cy="440" r="14" />
      <circle id="n3" class="node glow-pulse" cx="230" cy="440" r="14" />
      <circle id="n4" class="node glow-pulse" cx="130" cy="250" r="14" />
      <circle id="n5" class="node glow-pulse" cx="340" cy="520" r="14" />

      <!-- Labels -->
      <text class="label" x="340" y="115" text-anchor="middle" dominant-baseline="middle" pointer-events="none">A</text>
      <text class="label" x="520" y="245" text-anchor="middle" dominant-baseline="middle" pointer-events="none">B</text>
      <text class="label" x="440" y="435" text-anchor="middle" dominant-baseline="middle" pointer-events="none">C</text>
      <text class="label" x="230" y="435" text-anchor="middle" dominant-baseline="middle" pointer-events="none">D</text>
      <text class="label" x="130" y="245" text-anchor="middle" dominant-baseline="middle" pointer-events="none">E</text>
      <text class="label" x="340" y="515" text-anchor="middle" dominant-baseline="middle" pointer-events="none">F</text>
    </svg>
  </div>

  <div class="ui-controls" role="group" aria-label="Graph controls">
    <button id="btnHighlightEdges" aria-pressed="false" aria-label="Toggle highlight edges">Toggle Highlight Edges</button>
    <button id="btnPulseNodes" aria-pressed="true" aria-label="Toggle nodes glowing pulse">Toggle Node Pulse</button>
  </div>

  <div class="tooltip" id="tooltip" role="tooltip" aria-hidden="true"></div>

  <script>
    (() => {
      const edges = [...document.querySelectorAll('.edge')];
      const nodes = [...document.querySelectorAll('.node')];
      const btnHighlightEdges = document.getElementById('btnHighlightEdges');
      const btnPulseNodes = document.getElementById('btnPulseNodes');
      const tooltip = document.getElementById('tooltip');
      const container = document.querySelector('.container');
      
      // Edge highlighting toggle state
      let edgesHighlighted = false;
      // Pulse toggle state
      let pulseActive = true;

      // Setup node labels mapping for tooltip info
      const nodeLabels = {
        'n0': 'Node A',
        'n1': 'Node B',
        'n2': 'Node C',
        'n3': 'Node D',
        'n4': 'Node E',
        'n5': 'Node F'
      };

      // Button: Toggle highlight on edges
      btnHighlightEdges.addEventListener('click', () => {
        edgesHighlighted = !edgesHighlighted;
        edges.forEach(edge => {
          if (edgesHighlighted) edge.classList.add('highlighted');
          else edge.classList.remove('highlighted');
        });
        btnHighlightEdges.setAttribute('aria-pressed', edgesHighlighted);
      });

      // Button: Toggle node pulse animation
      btnPulseNodes.addEventListener('click', () => {
        pulseActive = !pulseActive;
        nodes.forEach(node => {
          if (pulseActive) {
            node.classList.add('glow-pulse');
          } else {
            node.classList.remove('glow-pulse');
          }
        });
        btnPulseNodes.setAttribute('aria-pressed', pulseActive);
      });

      // Simple tooltip for nodes: show node label on hover
      nodes.forEach(node => {
        node.addEventListener('mouseenter', (e) => {
          const label = nodeLabels[node.id] || 'Node';
          tooltip.innerText = label;
          tooltip.style.opacity = '1';
          tooltip.setAttribute('aria-hidden', 'false');
          positionTooltip(e);
        });
        node.addEventListener('mousemove', (e) => {
          positionTooltip(e);
        });
        node.addEventListener('mouseleave', () => {
          tooltip.style.opacity = '0';
          tooltip.setAttribute('aria-hidden', 'true');
        });
        node.addEventListener('focus', (e) => {
          const label = nodeLabels[node.id] || 'Node';
          tooltip.innerText = label;
          tooltip.style.opacity = '1';
          tooltip.setAttribute('aria-hidden', 'false');
          const rect = e.target.getBoundingClientRect();
          tooltip.style.left = `${rect.left + rect.width / 2}px`;
          tooltip.style.top = `${rect.top - 14}px`;
        });
        node.addEventListener('blur', () => {
          tooltip.style.opacity = '0';
          tooltip.setAttribute('aria-hidden', 'true');
        });
      });

      function positionTooltip(e) {
        const rect = container.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        tooltip.style.left = `${x}px`;
        tooltip.style.top = `${y - 18}px`;
      }

      // Accessibility: keyboard focus outlines for nodes
      nodes.forEach(node => {
        node.setAttribute('tabindex', '0');
      });

    })();
  </script>
</body>
</html>
