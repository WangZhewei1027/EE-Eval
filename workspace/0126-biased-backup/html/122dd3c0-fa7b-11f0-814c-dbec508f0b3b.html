<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Syntax Tree</title>
    <style>
        body {
            font-family: monospace;
            background-color: white;
        }
        input {
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        button {
            padding: 10px 20px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>

<h1>Abstract Syntax Tree</h1>

<div id="tree"></div>

<div id="controls">
    <label for="type">Type:</label>
    <input type="radio" id="function" name="type" value="function" checked>
    <label for="function">Function</label>
    <label for="variable">Variable</label>
    <input type="radio" id="variable" name="type" value="variable">
    <label for="variable">Variable</label>
    <button id="add-button">Add</button>
    <button id="remove-button">Remove</button>
    <button id="edit-button">Edit</button>
</div>

<div id="code" style="display: none;">
    <pre id="code-print"></pre>
</div>

<script>
    const tree = document.getElementById('tree');
    const controls = document.getElementById('controls');
    const code = document.getElementById('code');
    const codePrint = document.getElementById('code-print');

    let currentType = 'function';
    let currentCode = '';

    function addNode(node, type) {
        const nodeElement = document.createElement('div');
        nodeElement.className = 'node';
        nodeElement.textContent = `${node.type} ${node.value}`;

        if (type === 'function') {
            nodeElement.classList.add('function');
        } else if (type === 'variable') {
            nodeElement.classList.add('variable');
        }

        tree.appendChild(nodeElement);

        if (node.type === 'function') {
            addNode(node.children[0], 'variable');
        } else if (node.type === 'variable') {
            addNode(node.children[0], 'function');
        }
    }

    function removeNode(node) {
        const parent = node.parentNode;
        parent.removeChild(node);

        if (node.type === 'function') {
            removeNode(node.children[0]);
        } else if (node.type === 'variable') {
            removeNode(node.children[0]);
        }
    }

    function editNode(node, value) {
        const parent = node.parentNode;
        const newNode = document.createElement('div');
        newNode.className = 'node';
        newNode.textContent = `${node.type} ${value}`;

        if (node.type === 'function') {
            newNode.classList.add('function');
        } else if (node.type === 'variable') {
            newNode.classList.add('variable');
        }

        parent.replaceChild(newNode, node);

        if (node.type === 'function') {
            removeNode(node.children[0]);
        } else if (node.type === 'variable') {
            removeNode(node.children[0]);
        }
    }

    function updateCode() {
        if (currentType === 'function') {
            const codeElement = document.getElementById('code-print');
            codeElement.textContent = currentCode;
        } else if (currentType === 'variable') {
            const codeElement = document.getElementById('code-print');
            codeElement.textContent = '';
        }
    }

    function updateCodeValue(value) {
        currentCode += value + '\n';
        updateCode();
    }

    function addEventListeners() {
        const addButton = document.getElementById('add-button');
        addButton.addEventListener('click', addNode);

        const removeButton = document.getElementById('remove-button');
        removeButton.addEventListener('click', removeNode);

        const editButton = document.getElementById('edit-button');
        editButton.addEventListener('click', editNode);

        const codePrint = document.getElementById('code-print');
        codePrint.addEventListener('input', updateCode);

        addButton.addEventListener('click', () => {
            const type = prompt('Enter type (function/variable):');
            currentType = type;
            currentCode = '';
            updateCode();
        });

        removeButton.addEventListener('click', () => {
            const type = prompt('Enter type (function/variable):');
            currentType = type;
            currentCode = '';
            updateCode();
        });

        editButton.addEventListener('click', () => {
            const value = prompt('Enter value:');
            editNode(currentType, value);
        });

        codePrint.addEventListener('input', updateCode);
    }

    addEventListeners();

    // Add initial code
    currentType = 'function';
    currentCode = 'function add 2 3';
    updateCode();

    // Update code on user input
    function updateCodeEvent(event) {
        const value = event.target.value;
        updateCodeValue(value);
    }

    // Update code on user click
    const addButton = document.getElementById('add-button');
    addButton.addEventListener('click', updateCodeEvent);

    const removeButton = document.getElementById('remove-button');
    removeButton.addEventListener('click', updateCodeEvent);

    const editButton = document.getElementById('edit-button');
    editButton.addEventListener('click', updateCodeEvent);
</script>

</body>
</html>
