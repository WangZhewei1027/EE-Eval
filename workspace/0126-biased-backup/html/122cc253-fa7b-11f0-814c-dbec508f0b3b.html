<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduling</title>
    <style>
        body {
            font-family: monospace;
        }
        #cpu-scheduling-container {
            width: 80%;
            margin: 40px auto;
            background-color: white;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #cpu-scheduling-container h1 {
            margin-bottom: 20px;
        }
        #cpu-scheduling-container p {
            margin-bottom: 10px;
        }
        #cpu-scheduling-container input, #cpu-scheduling-container select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #cpu-scheduling-container button {
            width: 100%;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #cpu-scheduling-container button:hover {
            background-color: #3e8e41;
        }
        #cpu-scheduling-container select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #cpu-scheduling-container select option {
            padding: 10px;
        }
        #cpu-scheduling-container input[type="number"] {
            padding: 10px;
        }
        #cpu-scheduling-container input[type="text"] {
            padding: 10px;
        }
    </style>
</head>
<body>
    <div id="cpu-scheduling-container">
        <h1>CPU Scheduling</h1>
        <p>CPU Scheduling is the process of allocating CPU time to different tasks or processes based on their priority.</p>
        <p>Here are the interactive controls for CPU Scheduling:</p>
        <div id="cpu-scheduling-controls">
            <button id="cpu-scheduling-allocate-button">Allocate CPU Time</button>
            <button id="cpu-scheduling-deallocate-button">Deallocate CPU Time</button>
            <button id="cpu-scheduling-switch-button">Switch CPU Time</button>
            <input id="cpu-scheduling-priority-input" type="number" placeholder="Priority">
            <select id="cpu-scheduling-task-type-select">
                <option value="I/O">I/O Task</option>
                <option value="CPU">CPU Task</option>
            </select>
        </div>
        <div id="cpu-scheduling-output-container"></div>
    </div>

    <script>
        let cpuTime = 0;
        let priority = 0;
        let taskType = "I/O";
        let allocated = false;
        let deallocated = false;

        document.getElementById("cpu-scheduling-allocate-button").addEventListener("click", allocateCPU);
        document.getElementById("cpu-scheduling-deallocate-button").addEventListener("click", deallocateCPU);
        document.getElementById("cpu-scheduling-switch-button").addEventListener("click", switchCPU);
        document.getElementById("cpu-scheduling-priority-input").addEventListener("input", updatePriority);
        document.getElementById("cpu-scheduling-task-type-select").addEventListener("change", updateTaskType);

        function allocateCPU() {
            if (allocated) return;
            cpuTime = Math.floor(Math.random() * 100);
            document.getElementById("cpu-scheduling-output-container").innerHTML = `Allocated CPU Time: ${cpuTime}ms`;
            allocated = true;
        }

        function deallocateCPU() {
            if (!deallocated) return;
            cpuTime = Math.floor(Math.random() * 100);
            deallocated = true;
            document.getElementById("cpu-scheduling-output-container").innerHTML = `Deallocated CPU Time: ${cpuTime}ms`;
        }

        function switchCPU() {
            if (taskType === "I/O") {
                taskType = "CPU";
                document.getElementById("cpu-scheduling-task-type-select").innerHTML = `Task Type: CPU`;
            } else {
                taskType = "I/O";
                document.getElementById("cpu-scheduling-task-type-select").innerHTML = `Task Type: I/O`;
            }
        }

        function updatePriority() {
            priority = parseInt(document.getElementById("cpu-scheduling-priority-input").value);
            document.getElementById("cpu-scheduling-output-container").innerHTML = `Priority: ${priority}`;
        }

        function updateTaskType() {
            taskType = document.getElementById("cpu-scheduling-task-type-select").value;
            document.getElementById("cpu-scheduling-task-type-select").innerHTML = `Task Type: ${taskType}`;
        }
    </script>
</body>
</html>
