<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ternary Search Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        input, button {
            margin: 5px;
        }
    </style>
</head>
<body>

<h1>Ternary Search Interactive Demo</h1>
<p>Enter an array of numbers (comma separated):</p>
<input type="text" id="arrayInput" placeholder="e.g. 10, 20, 30, 40, 50">
<br>
<p>Enter the number to search for:</p>
<input type="number" id="targetInput" placeholder="Target Number">
<br>
<button onclick="performTernarySearch()">Search</button>
<button onclick="reset()">Reset</button>
<p id="result"></p>
<p id="steps"></p>

<script>
    function performTernarySearch() {
        const arrayInput = document.getElementById('arrayInput').value.split(',').map(Number);
        const target = Number(document.getElementById('targetInput').value);
        const resultElement = document.getElementById('result');
        const stepsElement = document.getElementById('steps');

        if (!Array.isArray(arrayInput) || arrayInput.length === 0 || isNaN(target)) {
            resultElement.textContent = "Please provide a valid input.";
            stepsElement.textContent = "";
            return;
        }

        const sortedArray = arrayInput.sort((a, b) => a - b);
        const searchResult = ternarySearch(sortedArray, target, 0, sortedArray.length - 1, stepsElement);
        resultElement.textContent = searchResult !== -1 ? `Found at index: ${searchResult}` : "Not found";
    }

    function ternarySearch(arr, target, left, right, stepsElement) {
        if (left > right) {
            return -1;
        }

        const thirdLength = Math.floor((right - left) / 3);
        const mid1 = left + thirdLength;
        const mid2 = right - thirdLength;

        let steps = `Searching in range [${left}-${right}]: mid1 = ${mid1}, mid2 = ${mid2} - values: ${arr[mid1]}, ${arr[mid2]}\n`;
        
        if (arr[mid1] === target) {
            stepsElement.textContent += steps;
            return mid1;
        }
        if (arr[mid2] === target) {
            stepsElement.textContent += steps;
            return mid2;
        }
        
        if (target < arr[mid1]) {
            stepsElement.textContent += steps;
            return ternarySearch(arr, target, left, mid1 - 1, stepsElement);
        } else if (target > arr[mid2]) {
            stepsElement.textContent += steps;
            return ternarySearch(arr, target, mid2 + 1, right, stepsElement);
        }
        
        stepsElement.textContent += steps;
        return ternarySearch(arr, target, mid1 + 1, mid2 - 1, stepsElement);
    }

    function reset() {
        document.getElementById('arrayInput').value = '';
        document.getElementById('targetInput').value = '';
        document.getElementById('result').textContent = '';
        document.getElementById('steps').textContent = '';
    }
</script>

</body>
</html>
