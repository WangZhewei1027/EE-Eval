<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Encryption - The Art of Secrets</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;600&family=Montserrat:wght@400;700&display=swap');

  /* Root Colors */
  :root {
    --dark-bg: #0e1117;
    --primary: #4f91f7;
    --secondary: #ff758f;
    --accent1: #f5a623;
    --accent2: #50e3c2;
    --text-light: #d3d6df;
    --text-lighter: #a0a5b9;
    --shadow-glow: rgba(79, 145, 247, 0.6);
    --shadow-pulse: rgba(80, 227, 194, 0.5);
    --font-mono: 'JetBrains Mono', monospace;
    --font-sans: 'Montserrat', sans-serif;
  }

  /* Reset & base */
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(ellipse at center, #151a29 0%, #0e1117 90%);
    color: var(--text-light);
    font-family: var(--font-sans);
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    user-select: none;
  }

  h1 {
    font-weight: 700;
    font-size: 3.8rem;
    margin: 0 0 0.25rem 0;
    letter-spacing: 0.06em;
    color: var(--primary);
    text-shadow:
      0 0 5px var(--primary),
      0 0 20px var(--primary);
    font-family: var(--font-mono);
  }

  h2 {
    font-weight: 400;
    font-size: 1.25rem;
    margin: 0 0 2rem 0;
    color: var(--text-lighter);
    font-style: italic;
  }

  /* Container for the cipher circle */
  .circle-container {
    position: relative;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle at center, #192132, #07101b 90%);
    box-shadow: 
      inset 0 0 25px var(--primary),
      0 0 40px var(--shadow-glow);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 3rem;
  }

  /* The rotating outer ring with dashes */
  .ring {
    position: absolute;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    width: 300px;
    height: 300px;
    margin-left: -150px;
    margin-top: -150px;
    box-shadow:
      0 0 15px var(--secondary),
      inset 0 0 20px var(--accent1);
    animation: ringSpin 40s linear infinite;
  }

  .ring::before {
    content: '';
    position: absolute;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    top: 10px;
    left: 10px;
    box-shadow:
      0 0 25px var(--accent2),
      inset 0 0 30px var(--accent2);
    filter: drop-shadow(0 0 5px var(--accent2));
  }

  /* The text ring */
  .text-ring {
    position: absolute;
    width: 300px;
    height: 300px;
    top: 50%;
    left: 50%;
    margin-left: -150px;
    margin-top: -150px;
    pointer-events: none;
  }

  .text-ring span {
    filter: drop-shadow(0 0 3px var(--primary));
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 1.05rem;
    color: var(--primary);
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: 0 120px;
    user-select: none;
  }

  /* Inner core */
  .core {
    position: relative;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle at center, #0e1623 35%, #132334 90%);
    box-shadow:
      inset 0 0 18px #0b1b2a,
      0 0 18px var(--accent1);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: var(--accent1);
    font-family: var(--font-mono);
    text-align: center;
    filter: drop-shadow(0 0 6px var(--accent1));
    animation: pulseGlow 4s ease-in-out infinite;
  }

  .core .lock-icon {
    margin-bottom: 1rem;
    width: 64px;
    height: 64px;
    fill: var(--accent1);
    filter: drop-shadow(0 0 6px var(--accent1));
    animation: lockPulse 3.6s ease-in-out infinite;
  }

  .core strong {
    font-weight: 700;
    font-size: 1.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Subtitle below core */
  .core .desc {
    margin-top: 0.3rem;
    font-size: 0.9rem;
    color: var(--text-lighter);
    font-style: italic;
    user-select: none;
  }

  /* Button style */
  .btn {
    padding: 0.85rem 2.5rem;
    border: none;
    outline: none;
    border-radius: 36px;
    background: linear-gradient(135deg, var(--secondary), var(--accent2));
    color: #111827;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow:
      0 5px 15px rgba(255, 117, 143, 0.6),
      inset 0 -3px 6px rgba(255, 255, 255, 0.25);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    user-select: none;
    letter-spacing: 0.08em;
  }

  .btn:hover,
  .btn:focus {
    background: linear-gradient(135deg, var(--accent2), var(--secondary));
    box-shadow:
      0 8px 20px rgba(80, 227, 194, 0.9),
      inset 0 -3px 10px rgba(255, 255, 255, 0.4);
    transform: scale(1.05);
  }

  /* Footer note */
  .footer-note {
    margin-top: 3rem;
    font-size: 0.85rem;
    font-style: italic;
    color: var(--text-lighter);
    font-family: var(--font-mono);
    letter-spacing: 0.06em;
    user-select: none;
  }

  /* Animations */
  @keyframes ringSpin {
    0% {
      transform: translate(-50%, -50%) rotate(0deg);
    }
    100% {
      transform: translate(-50%, -50%) rotate(360deg);
    }
  }

  @keyframes pulseGlow {
    0%, 100% {
      box-shadow:
      inset 0 0 18px #0b1b2a,
      0 0 18px var(--accent1);
    }
    50% {
      box-shadow:
      inset 0 0 28px #0b1b2a,
      0 0 28px var(--accent1);
    }
  }

  @keyframes lockPulse {
    0%, 100% {
      filter: drop-shadow(0 0 6px var(--accent1));
      transform: scale(1);
    }
    50% {
      filter: drop-shadow(0 0 16px var(--accent1));
      transform: scale(1.08);
    }
  }

</style>
</head>
<body>
  <h1>ENCRYPTION</h1>
  <h2>The Art of Secrets</h2>

  <div class="circle-container" aria-label="Encryption Cipher Graphic">
    <div class="ring"></div>

    <div class="text-ring" aria-hidden="true">
      <!-- We'll create a circular text with the phrase repeating -->
    </div>

    <div class="core" aria-label="Lock symbolizing encryption">
      <svg class="lock-icon" viewBox="0 0 64 64" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
        <path d="M44 26h-4v-8a8 8 0 0 0-16 0v8h-4a4 4 0 0 0-4 4v22a4 4 0 0 0 4 4h24a4 4 0 0 0 4-4V30a4 4 0 0 0-4-4zm-16-8a4 4 0 0 1 8 0v8h-8zm16 34H24V30h20z"/>
      </svg>
      <strong>SECURE</strong>
      <div class="desc">Confidentiality & Trust</div>
    </div>
  </div>

  <button class="btn" id="toggleRing">Pause Rotation</button>

  <div class="footer-note">Experience the unseen protection of encrypted secrets.</div>

  <script>
    // Create circular text
    const phrase = " ENCRYPTION  ";
    const repeatCount = 16;
    const textRing = document.querySelector('.text-ring');
    const chars = (phrase.repeat(repeatCount)).split('');
    const charCount = chars.length;
    const radius = 120;

    chars.forEach((ch, i) => {
      const span = document.createElement('span');
      span.textContent = ch;
      const angle = (360 / charCount) * i;
      span.style.transform = `rotate(${angle}deg) translate(${radius}px) rotate(${angle * -1}deg)`;
      textRing.appendChild(span);
    });

    // Button interaction - pause/resume ring rotation
    const ring = document.querySelector('.ring');
    const btn = document.getElementById('toggleRing');
    let rotating = true;

    btn.addEventListener('click', () => {
      if (rotating) {
        ring.style.animationPlayState = 'paused';
        btn.textContent = 'Resume Rotation';
      } else {
        ring.style.animationPlayState = 'running';
        btn.textContent = 'Pause Rotation';
      }
      rotating = !rotating;
    });
  </script>
</body>
</html>
