<!DOCTYPE html>
<html>
<head>
    <title>Interactive Array Explorer</title>
    <script>
        let array = [];
        let history = [];
        let maxHistory = 20;
        
        function init() {
            updateDisplay();
            document.getElementById('arrayLength').addEventListener('input', updateLengthControls);
            document.getElementById('randomizeBtn').addEventListener('click', randomizeArray);
            document.getElementById('reverseBtn').addEventListener('click', reverseArray);
            document.getElementById('sortBtn').addEventListener('click', sortArray);
            document.getElementById('shuffleBtn').addEventListener('click', shuffleArray);
            document.getElementById('pushBtn').addEventListener('click', pushValue);
            document.getElementById('popBtn').addEventListener('click', popValue);
            document.getElementById('unshiftBtn').addEventListener('click', unshiftValue);
            document.getElementById('shiftBtn').addEventListener('click', shiftValue);
            document.getElementById('spliceBtn').addEventListener('click', spliceArray);
            document.getElementById('mapBtn').addEventListener('click', mapArray);
            document.getElementById('filterBtn').addEventListener('click', filterArray);
            document.getElementById('reduceBtn').addEventListener('click', reduceArray);
            document.getElementById('findBtn').addEventListener('click', findInArray);
            document.getElementById('undoBtn').addEventListener('click', undoAction);
            document.getElementById('arrayLength').value = 10;
            createArray();
        }
        
        function saveState() {
            history.push([...array]);
            if (history.length > maxHistory) {
                history.shift();
            }
        }
        
        function undoAction() {
            if (history.length > 0) {
                array = history.pop();
                updateDisplay();
            }
        }
        
        function createArray() {
            saveState();
            const length = parseInt(document.getElementById('arrayLength').value);
            array = new Array(length).fill(0);
            updateDisplay();
        }
        
        function randomizeArray() {
            saveState();
            const min = parseInt(document.getElementById('randomMin').value);
            const max = parseInt(document.getElementById('randomMax').value);
            array = array.map(() => Math.floor(Math.random() * (max - min + 1)) + min);
            updateDisplay();
        }
        
        function reverseArray() {
            saveState();
            array.reverse();
            updateDisplay();
        }
        
        function sortArray() {
            saveState();
            const order = document.getElementById('sortOrder').value;
            if (order === 'asc') {
                array.sort((a, b) => a - b);
            } else {
                array.sort((a, b) => b - a);
            }
            updateDisplay();
        }
        
        function shuffleArray() {
            saveState();
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            updateDisplay();
        }
        
        function pushValue() {
            saveState();
            const value = parseInt(document.getElementById('pushValue').value);
            array.push(value);
            updateDisplay();
        }
        
        function popValue() {
            saveState();
            const popped = array.pop();
            document.getElementById('operationResult').textContent = `Popped: ${popped}`;
            updateDisplay();
        }
        
        function unshiftValue() {
            saveState();
            const value = parseInt(document.getElementById('unshiftValue').value);
            array.unshift(value);
            updateDisplay();
        }
        
        function shiftValue() {
            saveState();
            const shifted = array.shift();
            document.getElementById('operationResult').textContent = `Shifted: ${shifted}`;
            updateDisplay();
        }
        
        function spliceArray() {
            saveState();
            const start = parseInt(document.getElementById('spliceStart').value);
            const deleteCount = parseInt(document.getElementById('spliceDelete').value);
            const value = parseInt(document.getElementById('spliceValue').value);
            
            if (deleteCount > 0) {
                const deleted = array.splice(start, deleteCount, value);
                document.getElementById('operationResult').textContent = `Deleted: ${deleted.join(', ')}`;
            } else {
                array.splice(start, 0, value);
            }
            updateDisplay();
        }
        
        function mapArray() {
            saveState();
            const operation = document.getElementById('mapOperation').value;
            switch(operation) {
                case 'square':
                    array = array.map(x => x * x);
                    break;
                case 'double':
                    array = array.map(x => x * 2);
                    break;
                case 'increment':
                    array = array.map(x => x + 1);
                    break;
                case 'decrement':
                    array = array.map(x => x - 1);
                    break;
            }
            updateDisplay();
        }
        
        function filterArray() {
            saveState();
            const condition = document.getElementById('filterCondition').value;
            const value = parseInt(document.getElementById('filterValue').value);
            
            switch(condition) {
                case 'gt':
                    array = array.filter(x => x > value);
                    break;
                case 'lt':
                    array = array.filter(x => x < value);
                    break;
                case 'eq':
                    array = array.filter(x => x === value);
                    break;
                case 'even':
                    array = array.filter(x => x % 2 === 0);
                    break;
                case 'odd':
                    array = array.filter(x => x % 2 !== 0);
                    break;
            }
            updateDisplay();
        }
        
        function reduceArray() {
            const operation = document.getElementById('reduceOperation').value;
            let result;
            
            switch(operation) {
                case 'sum':
                    result = array.reduce((acc, val) => acc + val, 0);
                    break;
                case 'product':
                    result = array.reduce((acc, val) => acc * val, 1);
                    break;
                case 'max':
                    result = array.reduce((acc, val) => Math.max(acc, val), -Infinity);
                    break;
                case 'min':
                    result = array.reduce((acc, val) => Math.min(acc, val), Infinity);
                    break;
            }
            
            document.getElementById('operationResult').textContent = `Result: ${result}`;
        }
        
        function findInArray() {
            const condition = document.getElementById('findCondition').value;
            const value = parseInt(document.getElementById('findValue').value);
            let result;
            
            switch(condition) {
                case 'gt':
                    result = array.find(x => x > value);
                    break;
                case 'lt':
                    result = array.find(x => x < value);
                    break;
                case 'eq':
                    result = array.find(x => x === value);
                    break;
            }
            
            document.getElementById('operationResult').textContent = `Found: ${result}`;
        }
        
        function updateLengthControls() {
            const length = document.getElementById('arrayLength').value;
            document.getElementById('lengthValue').textContent = length;
        }
        
        function updateDisplay() {
            document.getElementById('arrayDisplay').textContent = `[${array.join(', ')}]`;
            document.getElementById('arrayInfo').textContent = `Length: ${array.length}`;
            document.getElementById('historyCount').textContent = `Undo steps: ${history.length}`;
        }
    </script>
</head>
<body onload="init()">
    <h1>Interactive Array Explorer</h1>
    
    <div>
        <h2>Array Creation</h2>
        <div>
            <label>Length: <span id="lengthValue">10</span></label>
            <input type="range" id="arrayLength" min="1" max="50" value="10">
            <button onclick="createArray()">Create Array</button>
        </div>
        
        <div>
            <label>Random Range: </label>
            <input type="number" id="randomMin" value="1" min="-100" max="100">
            <span> to </span>
            <input type="number" id="randomMax" value="100" min="-100" max="100">
            <button id="randomizeBtn">Randomize Values</button>
        </div>
    </div>
    
    <div>
        <h2>Array Display</h2>
        <div id="arrayDisplay">[]</div>
        <div id="arrayInfo">Length: 0</div>
        <div id="operationResult"></div>
    </div>
    
    <div>
        <h2>Basic Operations</h2>
        <div>
            <button id="reverseBtn">Reverse</button>
            <button id="sortBtn">Sort</button>
            <select id="sortOrder">
                <option value="asc">Ascending</option>
                <option value="desc">Descending</option>
            </select>
            <button id="shuffleBtn">Shuffle</button>
        </div>
        
        <div>
            <input type="number" id="pushValue" value="0">
            <button id="pushBtn">Push</button>
            <button id="popBtn">Pop</button>
        </div>
        
        <div>
            <input type="number" id="unshiftValue" value="0">
            <button id="unshiftBtn">Unshift</button>
            <button id="shiftBtn">Shift</button>
        </div>
        
        <div>
            <label>Splice: </label>
            <input type="number" id="spliceStart" value="0" min="0" placeholder="Start">
            <input type="number" id="spliceDelete" value="0" min="0" placeholder="Delete">
            <input type="number" id="spliceValue" value="0" placeholder="Value">
            <button id="spliceBtn">Splice</button>
        </div>
    </div>
    
    <div>
        <h2>Functional Operations</h2>
        <div>
            <label>Map: </label>
            <select id="mapOperation">
                <option value="square">Square</option>
                <option value="double">Double</option>
                <option value="increment">Increment</option>
                <option value="decrement">Decrement</option>
            </select>
            <button id="mapBtn">Apply Map</button>
        </div>
        
        <div>
            <label>Filter: </label>
            <select id="filterCondition">
                <option value="gt">Greater than</option>
                <option value="lt">Less than</option>
                <option value="eq">Equal to</option>
                <option value="even">Even</option>
                <option value="odd">Odd</option>
            </select>
            <input type="number" id="filterValue" value="0">
            <button id="filterBtn">Apply Filter</button>
        </div>
        
        <div>
            <label>Reduce: </label>
            <select id="reduceOperation">
                <option value="sum">Sum</option>
                <option value="product">Product</option>
                <option value="max">Maximum</option>
                <option value="min">Minimum</option>
            </select>
            <button id="reduceBtn">Calculate</button>
        </div>
        
        <div>
            <label>Find: </label>
            <select id="findCondition">
                <option value="gt">Greater than</option>
                <option value="lt">Less than</option>
                <option value="eq">Equal to</option>
            </select>
            <input type="number" id="findValue" value="0">
            <button id="findBtn">Find</button>
        </div>
    </div>
    
    <div>
        <h2>History</h2>
        <div>
            <span id="historyCount">Undo steps: 0</span>
            <button id="undoBtn">Undo</button>
        </div>
    </div>
</body>
</html>
