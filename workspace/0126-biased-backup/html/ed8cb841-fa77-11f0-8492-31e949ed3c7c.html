<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Table Visualization</title>
    <style>
        body {
            font-family: "Arial", sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
            width: 70%;
            max-width: 600px;
        }
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }
        h1:hover {
            color: #007BFF;
        }
        .hash-table {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .bucket {
            background: linear-gradient(135deg, #6FB1FC, #4364F7);
            border-radius: 8px;
            padding: 20px;
            color: #fff;
            font-size: 1.2em;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .bucket:hover {
            transform: scale(1.05);
        }
        .bucket::after {
            content: '';
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 150%;
            height: 150%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transition: transform 0.4s ease;
            z-index: 0;
        }
        .bucket:hover::after {
            transform: scale(0.8);
        }
        .bucket-content {
            position: relative;
            z-index: 1;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hash Table Visualization</h1>
        <div class="hash-table" id="hashTable"></div>
        <button id="populateButton">Populate Hash Table</button>
    </div>

    <script>
        const hashTableElement = document.getElementById("hashTable");

        const generateRandomData = () => {
            const data = [];
            for (let i = 0; i < 8; i++) {
                data.push(`Key ${i + 1}: Value ${Math.floor(Math.random() * 100)}`);
            }
            return data;
        };

        const populateHashTable = () => {
            const data = generateRandomData();
            hashTableElement.innerHTML = '';
            data.forEach(item => {
                const bucket = document.createElement("div");
                bucket.className = "bucket";
                bucket.innerHTML = `<div class="bucket-content">${item}</div>`;
                hashTableElement.appendChild(bucket);
            });
        };

        document.getElementById("populateButton").addEventListener("click", populateHashTable);
    </script>
</body>
</html>
