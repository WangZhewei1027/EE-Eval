<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Sort Visualization</title>
    <style>
        body {
            background-color: #282c34;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }
        #container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 60%;
            width: 80%;
            border: 2px solid #61dafb;
            position: relative;
        }
        .bar {
            width: 40px;
            margin: 0 2px;
            background-color: #61dafb;
            transition: height 0.4s ease, background-color 0.4s ease;
        }
        button {
            background-color: #61dafb;
            color: #282c34;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #21a1f1;
        }
        .highlight {
            background-color: #ff6347 !important;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <button id="startSortBtn">Start Bubble Sort</button>

    <script>
        const container = document.getElementById('container');
        const startSortBtn = document.getElementById('startSortBtn');

        let array = generateRandomArray(10);
        renderArray(array);

        async function bubbleSort(arr) {
            const len = arr.length;
            for (let i = 0; i < len; i++) {
                for (let j = 0; j < len - 1 - i; j++) {
                    highlightBars(j, j + 1);
                    await new Promise(resolve => setTimeout(resolve, 400));
                    if (arr[j] > arr[j + 1]) {
                        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                    }
                    renderArray(arr);
                    await new Promise(resolve => setTimeout(resolve, 400));
                    resetHighlightBars(j, j + 1);
                }
            }
            resetHighlightBars(-1, -1); // Reset highlights at the end
        }

        function highlightBars(index1, index2) {
            if (index1 >= 0) container.children[index1].classList.add('highlight');
            if (index2 >= 0) container.children[index2].classList.add('highlight');
        }

        function resetHighlightBars(index1, index2) {
            if (index1 >= 0) container.children[index1].classList.remove('highlight');
            if (index2 >= 0) container.children[index2].classList.remove('highlight');
        }

        function renderArray(arr) {
            container.innerHTML = '';
            arr.forEach(value => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${value * 30}px`; // Height scaled for better visibility
                container.appendChild(bar);
            });
        }

        function generateRandomArray(size) {
            const arr = [];
            for (let i = 0; i < size; i++) {
                arr.push(Math.floor(Math.random() * 10) + 1);
            }
            return arr;
        }

        startSortBtn.addEventListener('click', () => {
            bubbleSort(array);
        });
    </script>
</body>
</html>
