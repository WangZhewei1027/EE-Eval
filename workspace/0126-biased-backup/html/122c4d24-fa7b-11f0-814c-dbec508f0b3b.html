<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch and Bound</title>
    <style>
        body {
            background-color: white;
            font-family: monospace;
        }
        #input {
            width: 100%;
            height: 10px;
            margin-bottom: 10px;
            padding: 5px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }
        #slider {
            width: 100%;
            height: 10px;
            margin-bottom: 10px;
            padding: 5px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }
        #button {
            width: 100%;
            height: 20px;
            margin-bottom: 10px;
            padding: 5px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }
        #output {
            width: 100%;
            height: 50px;
            margin-bottom: 10px;
            padding: 5px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <h1>Branch and Bound</h1>
    <div id="input">
        <label for="x">X:</label>
        <input type="number" id="x" value="10">
    </div>
    <div id="slider">
        <label for="y">Y:</label>
        <input type="range" id="y" min="0" max="100" value="50">
    </div>
    <div id="button">
        <button id="solve">Solve</button>
        <button id="back">Back</button>
    </div>
    <div id="output"></div>

    <script>
        let x = 10;
        let y = 50;
        let max = 100;

        document.getElementById("solve").addEventListener("click", solve);

        function solve() {
            let path = [];
            while (x > 0 && y > 0) {
                path.push([x, y]);
                if (x > y) {
                    x -= y;
                } else {
                    y -= x;
                }
            }
            if (x === 0 || y === 0) {
                document.getElementById("output").innerHTML = "Maximum value reached!";
            } else {
                document.getElementById("output").innerHTML = path.map(([x, y]) => `${x},${y}`).join("\n");
            }
        }

        document.getElementById("back").addEventListener("click", back);

        function back() {
            x = max;
            y = max;
            document.getElementById("output").innerHTML = "";
        }
    </script>
</body>
</html>
