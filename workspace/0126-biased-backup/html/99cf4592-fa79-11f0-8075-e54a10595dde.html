<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PageRank Interactive Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { margin: 20px; }
        .node { display: inline-block; width: 100px; text-align: center; padding: 5px; margin: 5px; border: 1px solid black; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interactive PageRank Demo</h1>
        <div>
            <label for="nodeCount">Number of Nodes:</label>
            <input type="number" id="nodeCount" value="5" min="2" max="20">
            <button id="createGraph">Create Graph</button>
        </div>
        <div id="graphContainer"></div>
        <div>
            <button id="calculatePageRank">Calculate PageRank</button>
        </div>
        <h3>PageRank Values</h3>
        <div id="pageRankResults"></div>
    </div>

    <script>
        let graph = [];
        const graphContainer = document.getElementById('graphContainer');
        const pageRankResults = document.getElementById('pageRankResults');

        document.getElementById('createGraph').onclick = () => {
            const nodeCount = parseInt(document.getElementById('nodeCount').value);
            graph = Array.from({ length: nodeCount }, (_, i) => ({ id: i, links: [] }));
            graphContainer.innerHTML = '';

            for (let i = 0; i < nodeCount; i++) {
                const nodeDiv = document.createElement('div');
                nodeDiv.className = 'node';
                nodeDiv.innerText = `Node ${i}`;
                const linkInput = document.createElement('input');
                linkInput.placeholder = 'Link to nodes (comma-sep)';
                linkInput.onchange = () => {
                    const links = linkInput.value.split(',').map(Number);
                    graph[i].links = links.filter(link => link >= 0 && link < nodeCount);
                };
                nodeDiv.appendChild(linkInput);
                graphContainer.appendChild(nodeDiv);
            }
        };

        document.getElementById('calculatePageRank').onclick = () => {
            const dampingFactor = 0.85;
            const iterations = 100;
            const pageRank = Array(graph.length).fill(1 / graph.length);
            const N = graph.length;

            for (let iter = 0; iter < iterations; iter++) {
                const newPageRank = Array(N).fill(0);
                for (const node of graph) {
                    const numLinks = node.links.length;
                    if (numLinks === 0) {
                        continue;
                    }
                    const shareRank = pageRank[node.id] / numLinks;
                    for (const link of node.links) {
                        newPageRank[link] += shareRank;
                    }
                }
                for (let i = 0; i < N; i++) {
                    newPageRank[i] = (1 - dampingFactor) / N + dampingFactor * newPageRank[i];
                }
                for (let i = 0; i < N; i++) {
                    pageRank[i] = newPageRank[i];
                }
            }

            pageRankResults.innerHTML = pageRank.map((rank, index) => `Node ${index}: ${rank.toFixed(4)}`).join('<br>');
        };
    </script>
</body>
</html>
