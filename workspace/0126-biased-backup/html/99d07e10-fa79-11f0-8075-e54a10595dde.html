<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive DNS Exploration</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .control { margin: 10px 0; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>

<h1>Interactive DNS Exploration</h1>

<div class="control">
    <label for="domain">Enter Domain Name:</label>
    <input type="text" id="domain" placeholder="example.com">
</div>

<div class="control">
    <label for="record-type">Select Record Type:</label>
    <select id="record-type">
        <option value="A">A</option>
        <option value="AAAA">AAAA</option>
        <option value="CNAME">CNAME</option>
        <option value="MX">MX</option>
        <option value="TXT">TXT</option>
    </select>
</div>

<div class="control">
    <button id="lookup-btn">Look Up</button>
</div>

<div class="control">
    <label for="timeout">Set Timeout (ms):</label>
    <input type="number" id="timeout" value="1000" min="500">
    <button id="set-timeout-btn">Set Timeout</button>
</div>

<div class="control">
    <label for="ipv4">IPV4 Address:</label>
    <input type="text" id="ipv4" placeholder="e.g. 192.0.2.1">
</div>

<div class="control">
    <button id="resolve-ip-btn">Resolve Domain from IP</button>
</div>

<div class="control">
    <button id="clear-btn">Clear History</button>
</div>

<h2>Output:</h2>
<pre id="output"></pre>

<script>
    const domainInput = document.getElementById('domain');
    const recordTypeInput = document.getElementById('record-type');
    const lookupButton = document.getElementById('lookup-btn');
    const timeoutInput = document.getElementById('timeout');
    const setTimeoutButton = document.getElementById('set-timeout-btn');
    const ipv4Input = document.getElementById('ipv4');
    const resolveIpButton = document.getElementById('resolve-ip-btn');
    const clearButton = document.getElementById('clear-btn');
    const outputArea = document.getElementById('output');

    let timeoutValue = 1000;

    function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    lookupButton.onclick = async () => {
        const domain = domainInput.value;
        const recordType = recordTypeInput.value;
        outputArea.textContent += `Looking up ${recordType} record for ${domain}...\n`;
        await delay(timeoutValue);
        // Simulate DNS response
        outputArea.textContent += `Response for ${domain}: ${recordType} record found!\n`;
    };

    setTimeoutButton.onclick = () => {
        timeoutValue = parseInt(timeoutInput.value);
        outputArea.textContent += `Timeout set to ${timeoutValue} ms.\n`;
    };

    resolveIpButton.onclick = async () => {
        const ipv4 = ipv4Input.value;
        outputArea.textContent += `Resolving domain from IP ${ipv4}...\n`;
        await delay(timeoutValue);
        // Simulate reverse DNS lookup response
        outputArea.textContent += `Response: Domain for ${ipv4} found!\n`;
    };

    clearButton.onclick = () => {
        outputArea.textContent = '';
    };
</script>

</body>
</html>
