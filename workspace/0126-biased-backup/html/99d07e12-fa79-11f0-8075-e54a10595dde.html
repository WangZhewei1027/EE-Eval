<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congestion Control Simulation</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .control { margin: 10px 0; }
        #status { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Congestion Control Simulation</h1>

    <div class="control">
        <label for="bandwidth">Set Bandwidth (Mbps): </label>
        <input type="number" id="bandwidth" value="10" min="1" max="100">
    </div>

    <div class="control">
        <label for="delay">Set Delay (ms): </label>
        <input type="number" id="delay" value="0" min="0" max="500">
    </div>

    <div class="control">
        <button id="startButton">Start Simulation</button>
    </div>

    <div class="control">
        <button id="increaseButton">Increase Congestion</button>
        <button id="decreaseButton">Decrease Congestion</button>
    </div>

    <div class="control">
        <label for="packets">Current Packets in Flight: </label>
        <input type="number" id="packets" value="0" min="0" max="100" readonly>
    </div>

    <div class="control">
        <label for="congestionLevel">Congestion Level: </label>
        <input type="number" id="congestionLevel" value="0" min="0" max="100" readonly>
    </div>

    <button id="resetButton">Reset</button>

    <div id="status"></div>

    <script>
        let bandwidth = 0;
        let delay = 0;
        let packetsInFlight = 0;
        let congestionLevel = 0;
        let interval;
        
        document.getElementById('startButton').onclick = function() {
            bandwidth = parseInt(document.getElementById('bandwidth').value);
            delay = parseInt(document.getElementById('delay').value);
            packetsInFlight = 0;
            congestionLevel = 0;

            document.getElementById('status').innerText = "Simulation Started. Bandwidth: " + bandwidth + " Mbps, Delay: " + delay + " ms";
            interval = setInterval(simulateNetwork, 1000);
        };

        document.getElementById('increaseButton').onclick = function() {
            congestionLevel = Math.min(congestionLevel + 10, 100);
            updateStatus("Increased Congestion Level: " + congestionLevel);
        };

        document.getElementById('decreaseButton').onclick = function() {
            congestionLevel = Math.max(congestionLevel - 10, 0);
            updateStatus("Decreased Congestion Level: " + congestionLevel);
        };

        document.getElementById('resetButton').onclick = function() {
            clearInterval(interval);
            resetSimulation();
            updateStatus("Simulation Reset.");
        };

        function simulateNetwork() {
            if (congestionLevel >= 100) {
                clearInterval(interval);
                updateStatus("Congestion Level at maximum. Simulation Stopped.");
                return;
            }

            packetsInFlight = Math.min(packetsInFlight + (bandwidth - congestionLevel), 100);
            document.getElementById('packets').value = packetsInFlight;
            document.getElementById('congestionLevel').value = congestionLevel;
        }

        function resetSimulation() {
            packetsInFlight = 0;
            congestionLevel = 0;
            document.getElementById('packets').value = packetsInFlight;
            document.getElementById('congestionLevel').value = congestionLevel;
            document.getElementById('status').innerText = "";
            document.getElementById('bandwidth').value = 10;
            document.getElementById('delay').value = 0;
        }

        function updateStatus(message) {
            document.getElementById('status').innerText = message;
        }
    </script>
</body>
</html>
