<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Big-O Notation Interactive Explorer</title>
<style>
/* Minimal styling only to make layout usable; keep visual plain (black on white). */
body { font-family: sans-serif; margin: 12px; color: #000; background: #fff; }
h1 { font-size: 18px; margin: 0 0 8px 0; }
section { margin: 8px 0; padding: 0; }
label { display: inline-block; margin-right: 8px; }
input[type="range"] { width: 220px; vertical-align: middle; }
canvas { border: 1px solid #000; display: block; margin-top: 8px; }
textarea { width: 100%; height: 120px; }
button { margin-right: 6px; }
.small { font-size: 12px; }
.split { display: flex; gap: 12px; }
.col { flex: 1; }
.log { white-space: pre-wrap; font-family: monospace; border: 1px solid #000; padding: 6px; height: 150px; overflow: auto; }
.controls { margin-bottom: 8px; }
.inline { display: inline-block; margin-right: 8px; }
</style>
</head>
<body>
<h1>Big-O Notation Interactive Explorer</h1>

<section>
  <div class="controls">
    <label for="mode">Mode:</label>
    <select id="mode">
      <option value="predefined">Predefined Algorithm</option>
      <option value="custom">Custom Function</option>
      <option value="compare">Compare Algorithms</option>
      <option value="fit">Hypothesis Fit</option>
    </select>
  </div>

  <!-- Predefined algorithms -->
  <div id="predefinedArea">
    <label for="algorithm">Algorithm:</label>
    <select id="algorithm">
      <option value="const">O(1) - Access element</option>
      <option value="binary">O(log n) - Binary Search</option>
      <option value="linear">O(n) - Linear Search</option>
      <option value="merge">O(n log n) - Merge Sort (counts comparisons & copies)</option>
      <option value="bubble">O(n^2) - Bubble Sort</option>
      <option value="quick">O(n log n) - Quick Sort (average)</option>
      <option value="fib">O(2^n) - Naive Fibonacci (counts calls)</option>
      <option value="perm">O(n!) - Permutation generation (counts permutations)</option>
    </select>

    <div style="margin-top:6px;">
      <label for="nSlider">N (size):</label>
      <input id="nSlider" type="range" min="1" max="200" value="20">
      <input id="nValue" type="number" value="20" style="width:60px">
      <label class="small"><input id="fastMode" type="checkbox"> Aggregate large steps</label>
    </div>

    <div style="margin-top:6px;">
      <label>Array pattern:</label>
      <select id="pattern">
        <option value="random">Random</option>
        <option value="sorted">Sorted</option>
        <option value="reverse">Reverse</option>
        <option value="nearly">Nearly-sorted</option>
      </select>

      <label style="margin-left:12px;">Count:</label>
      <label><input id="countComp" type="checkbox" checked> Comparisons</label>
      <label><input id="countAssign" type="checkbox" checked> Assignments</label>
    </div>

    <div style="margin-top:8px;">
      <button id="runBtn">Run Simulation</button>
      <button id="stepBtn">Step</button>
      <button id="autoBtn">Auto-Play</button>
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
      <label style="margin-left:8px;">Speed:</label>
      <input id="speed" type="range" min="50" max="2000" value="300">
      <span id="speedVal">300ms</span>
    </div>
  </div>

  <!-- Custom function area -->
  <div id="customArea" style="display:none; margin-top:8px;">
    <div>
      <label for="customExpr">Custom count expression (JavaScript, in variable n):</label><br>
      <input id="customExpr" type="text" value="n*n" style="width:100%">
      <div class="small">Examples: n, Math.log(n), n*Math.log(n), Math.pow(2,n) (avoid huge n)</div>
    </div>
    <div style="margin-top:6px;">
      <label for="customN">N:</label>
      <input id="customN" type="number" value="20" style="width:80px">
      <button id="customRun">Evaluate</button>
      <button id="customPlot">Plot range</button>
    </div>
  </div>

  <!-- Compare area -->
  <div id="compareArea" style="display:none; margin-top:8px;">
    <div>
      <label>Select up to 3 algorithms to compare</label><br>
      <label><input type="checkbox" class="cmpAlg" value="linear"> Linear</label>
      <label><input type="checkbox" class="cmpAlg" value="binary"> Binary</label>
      <label><input type="checkbox" class="cmpAlg" value="merge"> Merge</label>
      <label><input type="checkbox" class="cmpAlg" value="bubble"> Bubble</label>
      <label><input type="checkbox" class="cmpAlg" value="quick"> Quick</label>
      <label><input type="checkbox" class="cmpAlg" value="fib"> Fib(naive)</label>
    </div>
    <div style="margin-top:6px;">
      <label for="cmpRange">Max N:</label>
      <input id="cmpRange" type="range" min="5" max="300" value="100">
      <input id="cmpRangeVal" type="number" value="100" style="width:80px">
      <button id="cmpRun">Plot Compare</button>
    </div>
  </div>

  <!-- Fit area -->
  <div id="fitArea" style="display:none; margin-top:8px;">
    <div>
      <label>Hypothesis fit: choose algorithm to observe and test which Big-O class fits best</label>
      <select id="fitAlg">
        <option value="bubble">Bubble (n^2)</option>
        <option value="merge">Merge (n log n)</option>
        <option value="linear">Linear (n)</option>
        <option value="fib">Fib naive (2^n)</option>
      </select>
      <label style="margin-left:8px;">Max N:</label>
      <input id="fitMaxN" type="number" value="60" style="width:80px">
      <button id="fitRun">Run Fit</button>
    </div>
  </div>
</section>

<section class="split">
  <div class="col">
    <h2 class="small">Operation Log / Step Inspector</h2>
    <div id="opLog" class="log"></div>
    <div style="margin-top:6px;">
      <button id="exportBtn">Export Results (JSON)</button>
      <button id="importBtn">Import Results (paste JSON)</button>
    </div>
    <textarea id="importArea" placeholder="Paste JSON here to import..." style="display:none"></textarea>
  </div>

  <div class="col">
    <h2 class="small">Counts & Plot</h2>
    <div>
      <div id="countsSummary" class="small">No run yet.</div>
      <canvas id="plot" width="640" height="240"></canvas>
    </div>
    <div style="margin-top:6px;">
      <label><input id="showRef" type="checkbox" checked> Show reference curves (n, n log n, n^2)</label>
      <label style="margin-left:12px;"><input id="normalize" type="checkbox"> Normalize (scale max to 1)</label>
    </div>
  </div>
</section>

<section style="margin-top:12px;">
  <h2 class="small">Model Fit Scores</h2>
  <div id="fitResults" class="small">No fit performed.</div>
</section>

<script>
/* Big-O Interactive Explorer: heavy on functionality, minimal visuals. */

/* Utilities */
function log(msg) {
  const el = document.getElementById('opLog');
  el.textContent = msg + "\\n" + el.textContent;
}
function appendLog(msg) {
  const el = document.getElementById('opLog');
  el.textContent = msg + "\\n" + el.textContent;
}
function clamp(v, a, b){ return Math.max(a, Math.min(b,v)); }
function now() { return new Date().getTime(); }

/* Algorithms: each provides:
   - count(n, options) -> { comparisons: x, assignments: y, total: x+y }
   - stepper(n, options) -> generator that yields step objects {desc, comps, assigns}
   For huge counts, stepper may yield aggregated steps with large deltas.
*/

const Algorithms = (function(){
  function makeConst() {
    return {
      count(n){ return {comparisons:1, assignments:0, total:1}; },
      stepper: function*(n){ yield {desc:'access constant (O(1))', comps:1, assigns:0}; }
    };
  }

  function makeBinary() {
    function count(n){ return {comparisons: Math.ceil(Math.log2(Math.max(1,n))) , assignments:0, total: Math.ceil(Math.log2(Math.max(1,n))) }; }
    function* stepper(n, opts){
      let l=0, r=n-1; let comps=0;
      while(l<=r){
        let m = Math.floor((l+r)/2);
        comps++;
        yield {desc:'compare mid index '+m, comps:1, assigns:0};
        if(m === Math.floor((n-1)/2)){ // stop via synthetic match at middle for demo
          break;
        }
        // for step demo we simply alternate the bounds
        if((l+r)%2===0) { r = m-1; } else { l = m+1; }
      }
    }
    return {count, stepper};
  }

  function makeLinear() {
    function count(n){ return {comparisons:n, assignments:0, total:n}; }
    function* stepper(n, opts){
      for(let i=0;i<n;i++){
        yield {desc:'check index '+i, comps:1, assigns:0};
      }
    }
    return {count, stepper};
  }

  function makeBubble() {
    function count(n){
      let comps = Math.max(0, (n*(n-1))/2);
      let assigns = 0; // we count swaps separately: each swap ~3 assignments
      return {comparisons: comps, assignments: comps>0 ? comps*3/10 : 0, total: comps + (comps*3/10)};
    }
    function* stepper(n, opts){
      let fast = !!opts.fastMode;
      for(let i=0;i<n;i++){
        for(let j=0;j<n-1-i;j++){
          if(fast && n>60){
            // group many together
            if(j%100===0) { yield {desc:'grouped comparisons chunk', comps:100, assigns:0}; }
            continue;
          }
          yield {desc:'compare a['+j+'] and a['+(j+1)+']', comps:1, assigns:0};
          // synthetic swap occasionally for demo
          if((j+i)%5===0){
            yield {desc:'swap a['+j+'] and a['+(j+1)+']', comps:0, assigns:3};
          }
        }
      }
    }
    return {count, stepper};
  }

  function makeMerge() {
    function count(n){
      // We'll compute comparisons ~ n log n (approx (n*ceil(log2 n)))
      let comps = 0;
      function mergesize(k){
        return k <= 1 ? 0 : Math.floor(k)*Math.ceil(Math.log2(k));
      }
      // rougher but okay
      comps = Math.floor(n * Math.max(1, Math.log2(Math.max(2,n))));
      return {comparisons: comps, assignments: Math.floor(n*Math.max(1, Math.log2(Math.max(2,n)))), total: comps*2};
    }
    function* stepper(n, opts){
      // We'll simulate merge process by levels
      let levels = Math.ceil(Math.log2(Math.max(1,n)));
      for(let level=0; level<levels; level++){
        let chunk = Math.pow(2, level+1);
        let groups = Math.ceil(n / chunk);
        for(let g=0; g<groups; g++){
          // group yield
          let comps = Math.min(chunk, n - g*chunk);
          if(opts.fastMode && n>200){
            yield {desc:'merge-level '+level+' group '+g+' (aggregated)', comps: comps, assigns: comps};
          } else {
            for(let k=0;k<comps;k++) yield {desc:'merge step in group '+g+' item '+k, comps:1, assigns:1};
          }
        }
      }
    }
    return {count, stepper};
  }

  function makeQuick() {
    function count(n){
      // average approximate n log n
      let comps = Math.floor(n * Math.max(1, Math.log2(Math.max(2,n))));
      return {comparisons: comps, assignments: Math.floor(comps*0.5), total: comps + Math.floor(comps*0.5)};
    }
    function* stepper(n, opts){
      // We simulate partitions
      function* quickSim(l,r){
        if(l>=r) return;
        let pivot = Math.floor((l+r)/2);
        let partSize = r-l+1;
        let comps = Math.max(1, Math.floor(partSize * 0.7));
        if(opts.fastMode && partSize>80){
          yield {desc:'partition (aggregated) ['+l+','+r+']', comps:comps, assigns:Math.floor(comps*0.3)};
        } else {
          for(let i=0;i<comps;i++) yield {desc:'partition compare in ['+l+','+r+']', comps:1, assigns:0};
        }
        let mid = pivot;
        yield* quickSim(l, mid-1);
        yield* quickSim(mid+1, r);
      }
      yield* quickSim(0, n-1);
    }
    return {count, stepper};
  }

  function makeFib() {
    function count(n){
      // number of calls ~ 2^n (approx)
      let calls = Math.pow(2, Math.max(0,n-1));
      return {comparisons: Math.floor(calls), assignments:0, total: Math.floor(calls)};
    }
    function* stepper(n, opts){
      // We cannot really recurse expensively; we'll yield aggregated call expansions
      function* fibSim(k){
        if(k<=1){ yield {desc:'base case fib('+k+')', comps:1, assigns:0}; return; }
        if(opts.fastMode && k>20){
          // aggregated representation
          let est = Math.pow(2, k-1);
          yield {desc:'aggregate fib('+k+') expands into ~'+Math.floor(est)+' calls', comps: Math.floor(est), assigns:0};
          return;
        }
        yield {desc:'call fib('+k+')', comps:1, assigns:0};
        yield* fibSim(k-1);
        yield* fibSim(k-2);
      }
      yield* fibSim(n);
    }
    return {count, stepper};
  }

  function makePermutations(){
    function factorial(n){ let r=1; for(let i=2;i<=n;i++) r*=i; return r; }
    function count(n){
      // number of permutations n! ; we'll not return huge numbers beyond safe
      let perms = factorial(Math.min(12,n)); // cap factorial computation
      return {comparisons: perms, assignments: perms*1.5, total: perms*2.5};
    }
    function* stepper(n, opts){
      // yield aggregated permutation generation
      if(opts.fastMode && n>8){
        yield {desc:'generate n! permutations aggregated', comps: factorial(Math.min(10,n)), assigns:0};
        return;
      }
      // simple recursive permutation generator steps but aggregated
      function* permSim(k){
        if(k<=1){ yield {desc:'emit permutation', comps:1, assigns:0}; return; }
        for(let i=0;i<k;i++){
          yield* permSim(k-1);
        }
      }
      yield* permSim(n);
    }
    return {count, stepper};
  }

  return {
    const: makeConst(),
    binary: makeBinary(),
    linear: makeLinear(),
    bubble: makeBubble(),
    merge: makeMerge(),
    quick: makeQuick(),
    fib: makeFib(),
    perm: makePermutations()
  };
})();

/* Global state for stepping / autoplay */
let state = {
  currentStepper: null,
  running: false,
  autoTimer: null,
  accumulated: {comparisons:0, assignments:0, total:0},
  lastCounts: null,
  lastRunMetadata: null
};

/* DOM Hooks */
const modeSel = document.getElementById('mode');
const predefinedArea = document.getElementById('predefinedArea');
const customArea = document.getElementById('customArea');
const compareArea = document.getElementById('compareArea');
const fitArea = document.getElementById('fitArea');

modeSel.addEventListener('change', ()=> {
  const v = modeSel.value;
  predefinedArea.style.display = (v==='predefined' ? '' : 'none');
  customArea.style.display = (v==='custom' ? '' : 'none');
  compareArea.style.display = (v==='compare' ? '' : 'none');
  fitArea.style.display = (v==='fit' ? '' : 'none');
});

/* N controls sync */
const nSlider = document.getElementById('nSlider');
const nValue = document.getElementById('nValue');
nSlider.addEventListener('input', ()=>{ nValue.value = nSlider.value; });
nValue.addEventListener('change', ()=>{ let v=parseInt(nValue.value)||1; v=clamp(v, parseInt(nSlider.min), parseInt(nSlider.max)); nSlider.value=v; nValue.value=v; });

const speed = document.getElementById('speed');
const speedVal = document.getElementById('speedVal');
speed.addEventListener('input', ()=>{ speedVal.textContent = speed.value + 'ms'; });

/* Run, step, auto */
document.getElementById('runBtn').addEventListener('click', runSimulation);
document.getElementById('stepBtn').addEventListener('click', stepOnce);
document.getElementById('autoBtn').addEventListener('click', startAuto);
document.getElementById('pauseBtn').addEventListener('click', pauseAuto);
document.getElementById('resetBtn').addEventListener('click', resetState);
document.getElementById('exportBtn').addEventListener('click', exportResults);
document.getElementById('importBtn').addEventListener('click', ()=> {
  const area = document.getElementById('importArea');
  area.style.display = area.style.display === 'none' ? '' : 'none';
});
document.getElementById('customRun').addEventListener('click', customEvaluate);
document.getElementById('customPlot').addEventListener('click', customPlot);
document.getElementById('cmpRun').addEventListener('click', runCompare);
document.getElementById('cmpRange').addEventListener('input', ()=>{ document.getElementById('cmpRangeVal').value = document.getElementById('cmpRange').value; });
document.getElementById('cmpRangeVal').addEventListener('change', ()=>{ let v=parseInt(document.getElementById('cmpRangeVal').value)||5; v=clamp(v,5,300); document.getElementById('cmpRange').value=v; document.getElementById('cmpRangeVal').value=v; });
document.getElementById('fitRun').addEventListener('click', runFit);
document.getElementById('importArea').addEventListener('paste', ()=> setTimeout(()=> tryImport(), 100));
document.getElementById('exportBtn').addEventListener('click', exportResults);
document.getElementById('importArea').addEventListener('change', tryImport);

/* Main functions */
function resetState(){
  pauseAuto();
  state.currentStepper = null;
  state.running = false;
  state.accumulated = {comparisons:0, assignments:0, total:0};
  state.lastCounts = null;
  document.getElementById('opLog').textContent = '';
  document.getElementById('countsSummary').textContent = 'Reset.';
  drawEmptyPlot();
}

function runSimulation(){
  resetState();
  const algKey = document.getElementById('algorithm').value;
  const alg = Algorithms[algKey];
  const n = parseInt(document.getElementById('nValue').value) || 1;
  const fastMode = document.getElementById('fastMode').checked;
  const pattern = document.getElementById('pattern').value;
  const countComp = document.getElementById('countComp').checked;
  const countAssign = document.getElementById('countAssign').checked;
  // compute counts using count function
  let counts = alg.count(n);
  // filter by selected count types
  let comps = countComp ? counts.comparisons : 0;
  let assigns = countAssign ? counts.assignments : 0;
  counts.calculated = {comparisons: comps, assignments: assigns, total: comps+assigns};
  state.lastCounts = counts;
  state.lastRunMetadata = {alg:algKey, n, pattern, timestamp: now()};
  // prepare stepper
  state.currentStepper = alg.stepper ? alg.stepper(n, {fastMode}) : null;
  state.accumulated = {comparisons:0, assignments:0, total:0};
  document.getElementById('countsSummary').textContent = 'Estimated counts: comparisons='+Math.round(counts.calculated.comparisons)+', assignments='+Math.round(counts.calculated.assignments)+', total='+Math.round(counts.calculated.total);
  appendLog('Run: '+algKey+' n='+n+' pattern='+pattern+' | Est comps='+Math.round(counts.calculated.comparisons)+' assigns='+Math.round(counts.calculated.assignments));
  // draw plot of counts at single N as a vertical bar
  drawSinglePointPlot([{label:algKey, values:[counts.calculated.total], color:'#000'}], n);
}

function stepOnce(){
  if(!state.currentStepper){
    appendLog('No stepper loaded. Click Run Simulation first.');
    return;
  }
  const it = state.currentStepper;
  const res = it.next();
  if(res.done){
    appendLog('Stepper complete.');
    state.currentStepper = null;
    return;
  }
  const step = res.value || {};
  state.accumulated.comparisons += step.comps || 0;
  state.accumulated.assignments += step.assigns || 0;
  state.accumulated.total = state.accumulated.comparisons + state.accumulated.assignments;
  appendLog('STEP: '+step.desc + ' | +comps='+ (step.comps||0) + ' +assigns=' + (step.assigns||0) + ' | accumulated total='+state.accumulated.total);
  document.getElementById('countsSummary').textContent = 'Step accumulated: comps='+state.accumulated.comparisons+', assigns='+state.accumulated.assignments+', total='+state.accumulated.total;
}

function startAuto(){
  if(!state.currentStepper){
    appendLog('No stepper loaded. Click Run Simulation first.');
    return;
  }
  if(state.running) return;
  state.running = true;
  function tick(){
    if(!state.running) return;
    let i=0;
    let chunk = 5; // steps per tick
    while(i<chunk){
      const it = state.currentStepper;
      const res = it.next();
      if(res.done){
        appendLog('Auto-play completed.');
        state.running = false;
        state.currentStepper = null;
        return;
      }
      const step = res.value || {};
      state.accumulated.comparisons += step.comps || 0;
      state.accumulated.assignments += step.assigns || 0;
      state.accumulated.total = state.accumulated.comparisons + state.accumulated.assignments;
      appendLog('STEP: '+step.desc + ' | +comps='+ (step.comps||0) + ' +assigns=' + (step.assigns||0) + ' | total='+state.accumulated.total);
      i++;
    }
    document.getElementById('countsSummary').textContent = 'Step accumulated: comps='+state.accumulated.comparisons+', assigns='+state.accumulated.assignments+', total='+state.accumulated.total;
    state.autoTimer = setTimeout(tick, parseInt(speed.value));
  }
  tick();
}

function pauseAuto(){
  state.running = false;
  if(state.autoTimer) clearTimeout(state.autoTimer);
  state.autoTimer = null;
}

/* Plotting utilities */
const canvas = document.getElementById('plot');
const ctx = canvas.getContext('2d');

function drawEmptyPlot(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#000';
  ctx.fillText('No data plotted', 10, 20);
}

function drawSinglePointPlot(datasets, n){
  // datasets: array {label, values:[singleValue], color}
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const pad = 30;
  const w = canvas.width - pad*2;
  const h = canvas.height - pad*2;
  // single point, draw bar(s)
  let maxVal = 0;
  datasets.forEach(d=> { if(d.values[0]>maxVal) maxVal=d.values[0]; });
  if(maxVal===0) maxVal=1;
  datasets.forEach((d, idx)=>{
    const val = d.values[0];
    const bw = w / datasets.length;
    const x = pad + idx*bw;
    const barH = (val/maxVal) * h;
    ctx.strokeStyle = '#000';
    ctx.strokeRect(x, pad + (h-barH), bw-6, barH);
    ctx.fillText(d.label + ' ('+Math.round(val)+')', x, pad + h + 12);
  });
  ctx.fillText('N='+n, 10, 10);
}

function plotXY(curves, options){
  // curves: array of {label, xs[], ys[]}
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const pad = 40;
  const w = canvas.width - pad*2;
  const h = canvas.height - pad*2;
  // determine bounds
  let maxX = 1, maxY = 1;
  curves.forEach(c=> {
    for(let i=0;i<c.xs.length;i++){
      maxX = Math.max(maxX, c.xs[i]);
      maxY = Math.max(maxY, Math.abs(c.ys[i]));
    }
  });
  if(document.getElementById('normalize').checked){
    // scale each curve so its max is 1
    curves = curves.map(c=>{
      let m = Math.max(...c.ys.map(Math.abs));
      if(m===0) m=1;
      return {label:c.label, xs:c.xs, ys:c.ys.map(y=>y/m)};
    });
    maxY = 1;
  }
  // axes
  ctx.strokeStyle = '#000';
  ctx.beginPath();
  ctx.moveTo(pad, pad);
  ctx.lineTo(pad, pad+h);
  ctx.lineTo(pad+w, pad+h);
  ctx.stroke();
  // draw curves
  const colors = ['#000','#000','#000']; // keep simple black lines
  curves.forEach((c, idx)=>{
    ctx.beginPath();
    for(let i=0;i<c.xs.length;i++){
      const x = pad + (c.xs[i]/maxX) * w;
      const y = pad + h - (Math.abs(c.ys[i])/maxY) * h;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.strokeStyle = '#000';
    ctx.stroke();
    ctx.fillText(c.label, pad + 8, pad + 12 + idx*12);
  });
}

/* Custom functions */
function customEvaluate(){
  const expr = document.getElementById('customExpr').value;
  const n = parseInt(document.getElementById('customN').value) || 1;
  try {
    const f = new Function('n', 'return ('+expr+');');
    const v = f(n);
    appendLog('Custom eval n='+n+' -> '+v);
    document.getElementById('countsSummary').textContent = 'Custom evaluated: '+v;
    drawSinglePointPlot([{label:'custom', values:[v]}], n);
    state.lastCounts = {customExpr:expr, calculated:{total:v}, timestamp: now()};
  } catch(e){
    appendLog('Custom eval error: '+e.message);
  }
}

function customPlot(){
  const expr = document.getElementById('customExpr').value;
  let f;
  try{
    f = new Function('n', 'return ('+expr+');');
  }catch(e){
    appendLog('Invalid expression: '+e.message);
    return;
  }
  const max = 100;
  let xs = [], ys = [];
  for(let n=1;n<=max;n++){
    try {
      let v = f(n);
      if(!isFinite(v)) v = NaN;
      xs.push(n); ys.push(Number(v));
    } catch(e){
      xs.push(n); ys.push(NaN);
    }
  }
  plotXY([{label:'custom', xs, ys}], {});
  appendLog('Plotted custom function for n=1..'+max);
  state.lastRunMetadata = {mode:'custom', expr};
}

/* Compare multiple algorithms */
function runCompare(){
  const checked = Array.from(document.querySelectorAll('.cmpAlg:checked')).map(i=>i.value);
  if(checked.length===0){ appendLog('Select at least one algorithm to compare.'); return; }
  if(checked.length>3){ appendLog('Select up to 3 algorithms only.'); return; }
  const maxN = parseInt(document.getElementById('cmpRange').value) || 50;
  const xs = [];
  for(let n=1;n<=maxN;n++) xs.push(n);
  const curves = [];
  checked.forEach(key=>{
    const alg = Algorithms[key];
    const ys = xs.map(n=>{
      const c = alg.count(n);
      return c.comparisons + c.assignments;
    });
    curves.push({label:key, xs:xs, ys:ys});
  });
  // add references optionally
  if(document.getElementById('showRef').checked){
    const nxs = xs.slice();
    curves.push({label:'n', xs:nxs, ys:nxs.map(n=>n)});
    curves.push({label:'n log n', xs:nxs, ys:nxs.map(n=>n*Math.log2(Math.max(2,n)))});
    curves.push({label:'n^2', xs:nxs, ys:nxs.map(n=>n*n)});
  }
  plotXY(curves, {});
  appendLog('Compared: '+checked.join(', ')+' up to N='+maxN);
  state.lastRunMetadata = {mode:'compare', algorithms:checked, maxN};
}

/* Hypothesis testing / Model fitting */
function runFit(){
  const algKey = document.getElementById('fitAlg').value;
  const maxN = parseInt(document.getElementById('fitMaxN').value) || 60;
  const alg = Algorithms[algKey];
  // collect observed totals for range 1..maxN (but reduce points to avoid huge counts)
  const xs = [];
  const ys = [];
  for(let n=1;n<=maxN;n++){
    xs.push(n);
    const c = alg.count(n);
    ys.push(c.comparisons + c.assignments);
  }
  // candidate models: constant, log, n, n log n, n^2, n^p (fit exponent p), 2^n
  const candidates = [
    {name:'O(1)', func: n => 1},
    {name:'O(log n)', func: n => Math.log2(Math.max(2,n))},
    {name:'O(n)', func: n => n},
    {name:'O(n log n)', func: n => n*Math.log2(Math.max(2,n))},
    {name:'O(n^2)', func: n => n*n},
    {name:'O(2^n)', func: n => Math.pow(2, n)}
  ];
  // convert to arrays and compute least-squares scale factor for each candidate
  function scoreModel(modelFn){
    const g = xs.map(modelFn);
    // find scale factor c minimizing ||y - c*g||^2 => c = (y.g) / (g.g)
    let yg=0, gg=0;
    for(let i=0;i<xs.length;i++){
      yg += ys[i]*g[i];
      gg += g[i]*g[i];
    }
    const c = gg===0 ? 0 : yg/gg;
    // compute relative error
    let err=0, norm=0;
    for(let i=0;i<xs.length;i++){
      const pred = c * g[i];
      err += Math.pow(ys[i]-pred,2);
      norm += Math.pow(ys[i],2);
    }
    const rel = norm===0 ? 0 : Math.sqrt(err/norm);
    return {c, rel};
  }
  const results = candidates.map(cand=>{
    const s = scoreModel(cand.func);
    return {name:cand.name, scale:s.c, relErr:s.rel};
  });
  // also fit polynomial exponent by linear regression in log-log for polynomial behavior
  // compute log(y) = a + p*log(n)
  let logs = [], logy = [];
  for(let i=0;i<xs.length;i++){
    if(ys[i]<=0) continue;
    logs.push(Math.log(xs[i]));
    logy.push(Math.log(ys[i]));
  }
  let pExp=null;
  if(logs.length>1){
    const meanX = logs.reduce((a,b)=>a+b,0)/logs.length;
    const meanY = logy.reduce((a,b)=>a+b,0)/logy.length;
    let num=0, den=0;
    for(let i=0;i<logs.length;i++){ num += (logs[i]-meanX)*(logy[i]-meanY); den += (logs[i]-meanX)*(logs[i]-meanX); }
    const p = den===0 ? 0 : num/den;
    const a = meanY - p*meanX;
    // compute relative error for this model
    let err=0, norm=0;
    for(let i=0;i<xs.length;i++){
      const pred = Math.exp(a) * Math.pow(xs[i], p);
      err += Math.pow(ys[i]-pred,2);
      norm += Math.pow(ys[i],2);
    }
    const rel = norm===0 ? 0 : Math.sqrt(err/norm);
    pExp = {p, a: Math.exp(a), relErr: rel};
  }
  // prepare results text
  let txt = 'Fitting results for algorithm '+algKey+' (N=1..'+maxN+')\\n';
  results.forEach(r => {
    txt += r.name + ' | scale=' + (isFinite(r.scale)? r.scale.toExponential(3): r.scale) + ' | relErr=' + r.relErr.toFixed(4) + '\\n';
  });
  if(pExp){
    txt += 'Best-fit power law: ~ ' + pExp.a.toExponential(2) + ' * n^' + pExp.p.toFixed(4) + ' | relErr=' + pExp.relErr.toFixed(4) + '\\n';
  }
  document.getElementById('fitResults').textContent = txt;
  appendLog('Fit completed for '+algKey);
  // Also plot observed and best candidate curves
  const obs = {label:'observed', xs: xs, ys: ys};
  const refCurves = [];
  // include top 3 best candidates by relErr
  const best = results.slice().sort((a,b)=>a.relErr-b.relErr).slice(0,3);
  best.forEach(b=>{
    const cand = candidates.find(c=>c.name===b.name);
    refCurves.push({label: b.name, xs: xs, ys: xs.map(n=>b.scale * cand.func(n))});
  });
  if(pExp) refCurves.push({label:'fit power n^'+pExp.p.toFixed(2), xs: xs, ys: xs.map(n=>pExp.a*Math.pow(n, pExp.p))});
  plotXY([obs].concat(refCurves), {});
}

/* Export / Import */
function exportResults(){
  const meta = state.lastRunMetadata || {};
  const counts = state.lastCounts || {};
  const exported = {meta, counts, timestamp: now()};
  const txt = JSON.stringify(exported, null, 2);
  // copy to clipboard if possible and also display
  navigator.clipboard && navigator.clipboard.writeText(txt).then(()=> {
    appendLog('Exported results copied to clipboard.');
  }).catch(()=> {
    appendLog('Exported JSON (not copied):\\n'+txt);
  });
}

function tryImport(){
  const area = document.getElementById('importArea');
  try{
    const data = JSON.parse(area.value);
    appendLog('Imported data: ' + JSON.stringify(data).substring(0,200));
    // apply if data contains counts and meta
    if(data.counts){
      state.lastCounts = data.counts;
      state.lastRunMetadata = data.meta || {imported:true};
      document.getElementById('countsSummary').textContent = 'Imported counts: '+JSON.stringify(data.counts).slice(0,80);
    }
  } catch(e){
    appendLog('Import error: '+e.message);
  }
}

/* Initialize */
drawEmptyPlot();
appendLog('Big-O Interactive Explorer ready. Select mode and controls.');

/* Safety: limit slider max depending on algorithm selection to avoid impossible runs */
document.getElementById('algorithm').addEventListener('change', function(){
  const v = this.value;
  if(v==='fib'){ nSlider.max = 40; nSlider.value = Math.min(30, nSlider.value); nValue.value = nSlider.value; }
  else if(v==='perm'){ nSlider.max = 12; nSlider.value = Math.min(8, nSlider.value); nValue.value = nSlider.value; }
  else if(v==='bubble' || v==='merge' || v==='quick'){ nSlider.max = 400; nSlider.value = Math.min(200, nSlider.value); nValue.value = nSlider.value; }
  else { nSlider.max = 200; nSlider.value = Math.min(100, nSlider.value); nValue.value = nSlider.value; }
});

/* Provide keyboard shortcuts for stepping and autoplay: S = step, A = auto, P = pause, R = run */
document.addEventListener('keydown', function(e){
  const key = e.key.toLowerCase();
  if(key==='s') stepOnce();
  if(key==='a') startAuto();
  if(key==='p') pauseAuto();
  if(key==='r') runSimulation();
});

/* Provide quick reproducibility: clicking on log messages toggles visibility */
document.getElementById('opLog').addEventListener('click', function(){
  if(this.style.height === '30px') this.style.height = '';
  else this.style.height = '30px';
});
</script>
