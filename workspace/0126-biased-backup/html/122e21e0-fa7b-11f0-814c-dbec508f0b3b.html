<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Tree</title>
    <style>
        body {
            font-family: monospace;
            text-align: left;
            margin: 0;
            padding: 0;
        }
        .tree {
            position: relative;
            width: 800px;
            height: 600px;
            border: 1px solid black;
            padding: 10px;
            font-size: 12px;
            line-height: 1.2;
        }
        .tree input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid black;
            font-size: 12px;
        }
        .tree button {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 10px;
            font-size: 12px;
            cursor: pointer;
        }
        .tree input:hover, .tree button:hover {
            background-color: #ccc;
        }
        .tree select {
            padding: 10px;
            font-size: 12px;
            cursor: pointer;
        }
        .tree select:focus {
            outline: 2px solid black;
        }
    </style>
</head>
<body>
    <div class="tree" id="tree"></div>
    <div class="input-container">
        <label for="input1">Input 1:</label>
        <input type="number" id="input1" value="10">
        <button id="button1">Submit</button>
    </div>
    <div class="input-container">
        <label for="input2">Input 2:</label>
        <input type="number" id="input2" value="20">
        <button id="button2">Submit</button>
    </div>
    <div class="input-container">
        <label for="input3">Input 3:</label>
        <input type="number" id="input3" value="30">
        <button id="button3">Submit</button>
    </div>
    <div class="input-container">
        <label for="input4">Input 4:</label>
        <input type="number" id="input4" value="40">
        <button id="button4">Submit</button>
    </div>
    <div class="input-container">
        <label for="input5">Input 5:</label>
        <input type="number" id="input5" value="50">
        <button id="button5">Submit</button>
    </div>
    <div class="input-container">
        <label for="input6">Input 6:</label>
        <input type="number" id="input6" value="60">
        <button id="button6">Submit</button>
    </div>
    <div class="input-container">
        <label for="input7">Input 7:</label>
        <input type="number" id="input7" value="70">
        <button id="button7">Submit</button>
    </div>
    <div class="input-container">
        <label for="input8">Input 8:</label>
        <input type="number" id="input8" value="80">
        <button id="button8">Submit</button>
    </div>
    <div class="input-container">
        <label for="input9">Input 9:</label>
        <input type="number" id="input9" value="90">
        <button id="button9">Submit</button>
    </div>
    <div class="input-container">
        <label for="input10">Input 10:</label>
        <input type="number" id="input10" value="100">
        <button id="button10">Submit</button>
    </div>
    <button id="submit">Submit Decision Tree</button>
    <div id="result"></div>

    <script>
        const tree = document.getElementById("tree");
        const inputs = document.querySelectorAll("input");
        const buttons = document.querySelectorAll("button");
        const result = document.getElementById("result");

        let inputsValues = [];
        let buttonsClick = {};

        inputs.forEach((input) => {
            input.addEventListener("change", () => {
                inputsValues.push(input.value);
            });
        });

        buttons.forEach((button) => {
            button.addEventListener("click", () => {
                inputsValues.push(button.value);
                buttonsClick[button.id] = true;
            });
        });

        tree.addEventListener("click", (e) => {
            if (e.target.classList.contains("input") || e.target.classList.contains("button")) {
                const inputId = e.target.classList.contains("input") ? e.target.id : e.target.parentNode.id;
                inputsValues = inputs.filter((input) => input.id !== inputId);
                buttonsClick[inputId] = true;
                inputs.forEach((input) => {
                    if (input.id !== inputId) {
                        input.value = "";
                    }
                });
            }
        });

        const submitButton = document.getElementById("submit");
        submitButton.addEventListener("click", () => {
            const decisionTree = {
                inputs: inputsValues,
                buttons: Object.keys(buttonsClick),
            };

            // Create a simple decision tree model
            const treeModel = {
                root: {
                    inputs: decisionTree.inputs,
                    buttons: decisionTree.buttons,
                },
                node: (node) => {
                    if (node.buttons) {
                        return {
                            inputs: node.inputs,
                            buttons: node.buttons,
                            children: [],
                        };
                    } else if (node.inputs.length === 0) {
                        return {
                            inputs: [],
                            buttons: [],
                            children: [],
                        };
                    } else {
                        const children = node.inputs.map((input) => ({
                            inputs: input,
                            buttons: Object.keys(buttonsClick).filter((buttonId) => buttonsClick[buttonId]),
                            children: [],
                        }));
                        return {
                            inputs: node.inputs,
                            buttons: node.buttons,
                            children,
                        };
                    }
                },
            };

            // Perform the decision tree
            function makeDecision(node) {
                if (node.children.length > 0) {
                    const child = node.children[0];
                    const decision = child.node(node);
                    return decision;
                } else {
                    return node.inputs[0];
                }
            }

            // Start the decision tree
            const decision = makeDecision(treeModel.root);
            result.textContent = `Decision: ${decision}`;
        });
    </script>
</body>
</html>
