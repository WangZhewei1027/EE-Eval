<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Programming</title>
    <style>
        body {
            font-family: monospace;
            background-color: white;
        }
        input, button {
            width: 20%;
            height: 20%;
            padding: 5px;
            margin: 5px;
            border: 1px solid black;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <h1>Dynamic Programming</h1>
    <p>This is a simple example of dynamic programming.</p>
    <h2>Problem:</h2>
    <p>Find the maximum sum of a subarray of size k.</p>
    <input id="k" type="number" value="3" min="1" max="10" step="1">
    <button id="solve">Solve</button>
    <p id="result"></p>

    <script>
        let k = parseInt(document.getElementById('k').value);
        let dp = new Array(11).fill(0).map(() => new Array(11).fill(-Infinity));
        function solve() {
            let result = '';
            for (let i = 0; i <= 10; i++) {
                for (let j = 0; j <= 10; j++) {
                    if (i + j >= k) {
                        dp[i][j] = Math.max(dp[i][j], dp[i][j - 1] + i === 0 ? 0 : dp[i - 1][j]);
                    }
                    result += (i === 0 ? '' : ', ') + dp[i][j] + ' ';
                }
            }
            document.getElementById('result').innerHTML = result.trim();
        }
        solve();
    </script>
</body>
</html>
