<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue</title>
    <style>
        /* Custom styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        #queue {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
            background-color: #f5f5f5;
            border-radius: 5px;
            cursor: pointer;
        }

        #queue button {
            width: 20px;
            height: 20px;
            background-color: white;
            border: none;
            cursor: pointer;
        }

        #queue button:hover {
            background-color: #d9d9d9;
        }
    </style>
</head>
<body>
    <div id="queue"></div>

    <button onclick="addToQueue()">Add to Queue</button>

    <button onclick="removeFromQueue()">Remove from Queue</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/5.0.4/dist/materialize.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/3.6.0/js/bootstrap.min.js"></script>

    <script>
        $(document).ready(function(){
            // Add functionality to queue
            function addToQueue() {
                var queue = document.getElementById("queue");
                var element = document.createElement("div");
                element.classList.add("queue-item");

                queue.appendChild(element);

                // Add event listener for when a new item is added to the queue
                queue.addEventListener("click", function(){
                    // Call addToQueue function
                    addToQueue();
                });
            }

            function removeFromQueue() {
                var queue = document.getElementById("queue");
                var element = document.createElement("div");
                element.classList.remove("queue-item");

                queue.removeChild(element);

                // Call removeFromQueue function
                removeFromQueue();
            }

            // Call addToQueue function every time the page loads
            setInterval(addToQueue, 1000);
        });
    </script>
</body>
</html>
