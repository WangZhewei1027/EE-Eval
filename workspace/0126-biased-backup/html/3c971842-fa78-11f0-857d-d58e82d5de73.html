<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tim Sort Visualization — Elegant Algorithm Showcase</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

  :root {
    --bg-dark: #0f172a;
    --accent-blue: #3b82f6;
    --accent-indigo: #6366f1;
    --text-primary: #e0e7ff;
    --text-secondary: #a5b4fc;
    --run-color-start: #2563eb;
    --run-color-mid: #818cf8;
    --run-color-end: #a5b4fc;
    --merge-color-left: #f472b6;
    --merge-color-right: #fb7185;
    --merge-color-merged: #fbbf24;
    --shadow-glow: rgba(99,102,241,0.5);
  }

  html, body {
    height: 100%;
    margin: 0;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    overflow: hidden;
    user-select: none;
  }

  .container {
    max-width: 960px;
    margin: 2rem auto 4rem;
    padding: 0 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-weight: 600;
    font-size: 2.75rem;
    line-height: 1.1;
    margin-bottom: 0.25rem;
    letter-spacing: -0.025em;
    text-align: center;
    color: var(--accent-indigo);
    text-shadow: 0 0 8px var(--shadow-glow);
  }

  h2 {
    font-weight: 400;
    font-size: 1.1rem;
    color: var(--text-secondary);
    margin-bottom: 2rem;
    text-align: center;
    font-style: italic;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 1rem;
    margin-bottom: 3rem;
  }

  button {
    background: var(--accent-blue);
    border: none;
    border-radius: 0.4rem;
    padding: 0.8rem 1.8rem;
    font-size: 1rem;
    font-weight: 600;
    color: white;
    cursor: pointer;
    box-shadow:
      0 0 8px var(--shadow-glow),
      0 6px 12px rgb(59 130 246 / 0.4);
    transition: background-color 0.3s ease, transform 0.15s ease;
    user-select: none;
  }
  button:hover {
    background: var(--accent-indigo);
    box-shadow:
      0 0 16px var(--shadow-glow),
      0 8px 16px rgb(99 102 241 / 0.5);
    transform: translateY(-2px);
  }
  button:active {
    transform: translateY(1px);
  }

  /* Visualization Canvas */
  #visualizer {
    width: 100%;
    max-width: 920px;
    height: 400px;
    border-radius: 1rem;
    background:
      radial-gradient(circle at center, #1e293b 0%, #0f172a 95%);
    box-shadow:
      inset 0 0 40px #3b82f6aa,
      0 0 25px #6366f1bb;
    position: relative;
    overflow: visible;
  }

  /* Footer styling */
  footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 0.85rem;
    color: var(--text-secondary);
    user-select: none;
  }

</style>
</head>
<body>
  <div class="container">
    <h1>Tim Sort Visualization</h1>
    <h2>An elegant blend of insertion & merge sorting</h2>

    <div class="controls" aria-label="Controls to replay or generate shuffle">
      <button id="btnShuffle" aria-label="Shuffle array">Shuffle Array</button>
      <button id="btnStart" aria-label="Start sorting animation">Start Sort</button>
    </div>

    <canvas id="visualizer" aria-label="Tim Sort visualization animation" role="img"></canvas>
  </div>

  <footer>Made with ♥ showcasing algorithmic beauty — by ChatGPT</footer>

<script>
(() => {
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');

  // Responsive high-DPI
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = canvas.clientHeight * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
  }
  resize();
  window.addEventListener('resize', () => {
    resize();
    drawArray(state.array, []);
  });

  // Constants for array
  const ARRAY_LENGTH = 60;
  const MAX_VALUE = 100;
  const BAR_WIDTH = 12;
  const BAR_SPACING = 3;
  const RUN_MIN = 32; // TimSort min run size

  // Animation timing
  const FPS = 60;
  const FRAME_DURATION = 1000 / FPS;
  const ANIMATION_SPEED = 1.5; // multiplier for animation speed

  // Colors
  const Colors = {
    background: '#0f172a',
    bar_fill: '#a5b4fc',
    bar_fill_insertion: '#2563eb',
    run_color_start: '#2563eb',
    run_color_mid: '#818cf8',
    run_color_end: '#a5b4fc',
    merge_left: '#f472b6',
    merge_right: '#fb7185',
    merge_merged: '#fbbf24',
  };

  // State - central source of truth for the visualization
  let state = {
    array: [],
    runs: [],
    actions: [],
    actionIndex: 0,
    sorting: false,
    animationFrameId: null,
    animationProgress: 0,
    currentAction: null,
    mergedIndices: new Set(),
  };

  // Generate a random array
  function generateArray(len = ARRAY_LENGTH) {
    return Array.from({length: len}, () => Math.floor(Math.random() * MAX_VALUE) + 5);
  }

  // Clamp color fade
  function lerpColor(a, b, t) {
    const parse = (c) => {
      if (c.startsWith('#')) {
        const bigint = parseInt(c.slice(1),16);
        return [(bigint >> 16) & 255, (bigint >> 8) & 255, bigint & 255];
      }
      return [0,0,0];
    };
    const [r1,g1,b1] = parse(a);
    const [r2,g2,b2] = parse(b);
    const r = Math.round(r1 + (r2-r1)*t);
    const g = Math.round(g1 + (g2-g1)*t);
    const b = Math.round(b1 + (b2-b1)*t);
    return `rgb(${r},${g},${b})`;
  }


  // Draw a single bar (vertical rectangle) with smooth rounded edges
  function drawBar(x, y, width, height, color) {
    const radius = Math.min(width / 2, 6);
    ctx.fillStyle = color;
    ctx.shadowColor = color + "aa";
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
    ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Draw entire array with optional highlights
  // highlights: object {runs: [{start, end}], merging: {left:[], right:[], merged:[]}, insertion: index}
  function drawArray(arr, highlights) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const cw = canvas.clientWidth;
    const ch = canvas.clientHeight;
    const bottomMargin = 48;
    const maxHeight = ch - bottomMargin;
    const barFullWidth = BAR_WIDTH + BAR_SPACING;
    const totalWidth = barFullWidth * arr.length - BAR_SPACING;
    const startX = (cw - totalWidth) / 2;

    // Draw runs background bent color - gradient highlight
    if (highlights?.runs && highlights.runs.length) {
      const gradientRunsColor = (pos, total) => lerpColor(Colors.run_color_start, Colors.run_color_end, pos / total);
      const totalRuns = highlights.runs.length;
      highlights.runs.forEach((run, i) => {
        const runLength = run.end - run.start + 1;
        const x = startX + run.start * barFullWidth;
        const width = runLength * barFullWidth - BAR_SPACING;
        const grad = ctx.createLinearGradient(x, 0, x + width, 0);
        grad.addColorStop(0, Colors.run_color_start);
        grad.addColorStop(0.5, Colors.run_color_mid);
        grad.addColorStop(1, Colors.run_color_end);
        ctx.fillStyle = grad;
        ctx.shadowColor = grad;
        ctx.shadowBlur = 18;
        ctx.fillRect(x - 4, 6, width + 8, maxHeight - 40);
        ctx.shadowBlur = 0;
      });
    }

    // Draw bars
    arr.forEach((v,i) => {
      const height = (v/MAX_VALUE) * (maxHeight - 64);
      const x = startX + i * barFullWidth;
      const y = maxHeight - height;

      // Determine bar color with priority: merging > insertion > normal
      let fillColor = Colors.bar_fill;

      if (highlights?.merging) {
        if (highlights.merging.left.includes(i)) fillColor = Colors.merge_left;
        else if (highlights.merging.right.includes(i)) fillColor = Colors.merge_right;
        else if (highlights.merging.merged.includes(i)) fillColor = Colors.merge_merged;
      }
      if (highlights?.insertion === i) {
        fillColor = Colors.bar_fill_insertion;
      }

      drawBar(x, y, BAR_WIDTH, height, fillColor);

      // Subtle top shine on each bar
      ctx.fillStyle = `rgba(255,255,255,0.08)`;
      ctx.beginPath();
      ctx.ellipse(x + BAR_WIDTH/2, y + 6, BAR_WIDTH/2.6, 8, 0, 0, Math.PI * 2);
      ctx.fill();
    });

  }


  // TIM SORT IMPLEMENTATION WITH ACTION LOGS FOR ANIMATION
  // We will log all the major actions to replay with animation:
  // Actions: {type: 'run', start, end}, {type: 'merge', leftStart, leftEnd, rightStart, rightEnd, mergedArray}, {type: 'insertion', index}

  // Find min run length (standard TimSort heuristic)
  function minRunLength(n) {
    let r = 0;
    while (n >= 64) {
      r |= n & 1;
      n >>=1;
    }
    return n + r;
  }

  // Binary insertion sort for runs
  function binaryInsertionSort(arr, start, end, actions) {
    for (let i = start+1; i <= end; i++) {
      let val = arr[i];
      actions.push({type:'insertion', index:i});
      let left = start;
      let right = i-1;
      // Binary search to find position
      while(left <= right) {
        let mid = Math.floor((left+right)/2);
        if (arr[mid] > val) right = mid -1;
        else left = mid +1;
      }
      // Move elements
      for (let j = i -1; j >= left; j--) {
        arr[j+1] = arr[j];
      }
      arr[left] = val;
    }
  }

  // Merge two sorted runs and log action
  function merge(arr, start1, end1, start2, end2, actions) {
    let left = arr.slice(start1,end1+1);
    let right = arr.slice(start2,end2+1);
    let i=0, j=0, k=start1;
    const mergedArray = [];
    while(i < left.length && j < right.length) {
      if (left[i] <= right[j]) {
        arr[k] = left[i];
        mergedArray.push(left[i]);
        i++; k++;
      } else {
        arr[k] = right[j];
        mergedArray.push(right[j]);
        j++; k++;
      }
    }
    while(i < left.length) {
      arr[k] = left[i];
      mergedArray.push(left[i]);
      i++; k++;
    }
    while(j < right.length) {
      arr[k] = right[j];
      mergedArray.push(right[j]);
      j++; k++;
    }
    actions.push({type:'merge', leftStart:start1, leftEnd:end1, rightStart:start2, rightEnd:end2, mergedArray});
  }

  function timSort(arr) {
    const actions = [];

    const n = arr.length;
    const minRun = minRunLength(n);
    let runs = [];

    // Step 1: Create natural runs and extend to minRun with insertion sort
    let i = 0;
    while (i < n) {
      let runStart = i;
      let runEnd = i + 1;

      if(runEnd === n) {
        runEnd = n - 1;
        actions.push({type:'run', start: runStart, end: runEnd});
        runs.push([runStart, runEnd]);
        i = n;
        break;
      }

      // Detect run direction ascending or descending
      if(arr[runStart] <= arr[runEnd]) {
        // Ascending run
        while (runEnd < n -1 && arr[runEnd] <= arr[runEnd+1]) runEnd++;
      } else {
        // Descending run
        while (runEnd < n -1 && arr[runEnd] > arr[runEnd+1]) runEnd++;
        // Reverse descending run
        arr.splice(runStart, runEnd - runStart + 1, ...arr.slice(runStart, runEnd +1).reverse());
      }

      // Run length found
      let runLen = runEnd - runStart + 1;
      // Extend run to minRun by insertion sort if needed
      if (runLen < minRun) {
        let extendEnd = Math.min(runStart + minRun - 1, n -1);
        binaryInsertionSort(arr, runStart, extendEnd, actions);
        runEnd = extendEnd;
      }

      // Log this run
      actions.push({type:'run', start: runStart, end: runEnd});
      runs.push([runStart, runEnd]);
      i = runEnd + 1;
    }

    // Step 2: Merge runs until only one left
    // We'll use a simple approach: repeatedly merge neighboring runs left to right

    while (runs.length > 1) {
      const newRuns = [];
      for (let i = 0; i < runs.length; i += 2) {
        if (i + 1 === runs.length) {
          newRuns.push(runs[i]);
        } else {
          const left = runs[i];
          const right = runs[i+1];
          merge(arr, left[0], left[1], right[0], right[1], actions);
          newRuns.push([left[0], right[1]]);
        }
      }
      runs = newRuns;
    }

    return actions;
  }


  // Animate tim sort based on logged actions
  // Animate frame-by-frame with easing

  // Util easing curve (easeInOutQuad)
  function easeInOutQuad(t) {
    return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
  }

  // Current animation context for merges
  let animMergeContext = null;

  function animateAction() {
    if (state.actionIndex >= state.actions.length) {
      state.sorting = false;
      state.currentAction = null;
      // Final redraw with fully sorted array
      drawArray(state.array, {});
      return;
    }

    if (!state.currentAction) {
      state.currentAction = state.actions[state.actionIndex];
      state.animationProgress = 0;

      if(state.currentAction.type === 'merge') {
        animMergeContext = {
          leftIndices: [...Array(state.currentAction.leftEnd - state.currentAction.leftStart + 1).keys()]
            .map(i => i + state.currentAction.leftStart),
          rightIndices: [...Array(state.currentAction.rightEnd - state.currentAction.rightStart + 1).keys()]
            .map(i => i + state.currentAction.rightStart),
          mergedArray: state.currentAction.mergedArray.slice(),
          leftCopy: state.array.slice(state.currentAction.leftStart, state.currentAction.leftEnd +1),
          rightCopy: state.array.slice(state.currentAction.rightStart, state.currentAction.rightEnd +1),
          posLeft: 0,
          posRight: 0,
          posMerge: state.currentAction.leftStart,
          mergedSoFar: [],
        };
      }

      if(state.currentAction.type === 'insertion') {
        // noop initial setup
      }

      if(state.currentAction.type === 'run') {
        // noop initial setup
      }
    }

    state.animationProgress += (ANIMATION_SPEED*FRAME_DURATION)/800;
    if(state.animationProgress > 1) state.animationProgress = 1;

    // Depending on action type, draw differently
    if(state.currentAction.type === 'run') {
      // Highlight current run in gradient
      drawArray(state.array, {runs: [{start: state.currentAction.start, end: state.currentAction.end}]});
    }

    else if(state.currentAction.type === 'insertion') {
      drawArray(state.array, {insertion: state.currentAction.index});
    }

    else if(state.currentAction.type === 'merge') {
      // Animate merge process stepwise

      // Lerp between showing left/right separately and merged combined progressively

      // Calculate progress eased
      const eProg = easeInOutQuad(state.animationProgress);

      // Number of elements merged so far on progress
      const total = animMergeContext.mergedArray.length;
      let mergedCount = Math.floor(eProg * total);

      // Build color groups for bars
      // Left: indices still to merge in leftCopy (posLeft to end)
      // Right: indices still to merge in rightCopy (posRight to end)
      // Merged: indices in mergedSoFar

      // We simulate merging visually from left to right:

      // Determine how mergedCount splits into leftCopy and rightCopy
      // Because mergedArray is result of interleaving, we simulate picking elements in order

      // We track mergedSoFar (elements already placed) and highlight merged indices orange

      // Also highlight in pink/red the elements currently considered from left and right segments being merged

      // For simplicity at this animation step we just highlight all left items which haven't merged as merge_left,
      // all right items unmerged as merge_right,
      // all merged as merge_merged.

      // Actually, to animate smoothly, we will blend merged array progressively replacing the old bars.

      // Visual approach:

      // Keep array bars as in main array state, but overlay colors on left and right runs:
      // Left run bars: pink
      // Right run bars: red
      // Bars merged and replaced: gold (merged_merged)

      // We'll highlight bars on left and right and highlight merged area separately.

      // But the actual array is already updated because merges are done immediately in timSort code.

      // So for visuals, we draw bars with colors according to:

      // - Bars indices in left run which are still part of original leftCopy and have not been mapped merged yet => merge_left color
      // - Bars indices in right run still present in rightCopy and not merged yet => merge_right color
      // - Bar indices already merged (from left and right) => merge_merged color
      // - Bar indices outside merge runs => normal color

      // Calculate number merged from which run:
      // We iterate leftCopy and rightCopy and compare mergedArray prefix.

      // For performance, precompute merged counts per run on each tick:

      let leftMergedCount = 0;
      let rightMergedCount = 0;

      for(let mi=0; mi < mergedCount; mi++) {
        const val = animMergeContext.mergedArray[mi];
        // Check if val is from leftCopy or rightCopy:
        if (animMergeContext.leftCopy.includes(val)) leftMergedCount++;
        else if (animMergeContext.rightCopy.includes(val)) rightMergedCount++;
      }

      const leftUnmergedIndices = animMergeContext.leftIndices.slice(leftMergedCount);
      const rightUnmergedIndices = animMergeContext.rightIndices.slice(rightMergedCount);
      const mergedIndices = animMergeContext.leftIndices.slice(0, leftMergedCount).concat(animMergeContext.rightIndices.slice(0,rightMergedCount));


      drawArray(state.array,{
        merging: {
          left: leftUnmergedIndices,
          right: rightUnmergedIndices,
          merged: mergedIndices,
        }
      });

    }

    if (state.animationProgress >= 1) {
      // Finished this action
      state.actionIndex++;
      state.currentAction = null;

      if(state.actionIndex >= state.actions.length) {
        // Completed all actions - final highlight
        drawArray(state.array, {});
      }
    }

    if(state.sorting) {
      state.animationFrameId = requestAnimationFrame(animateAction);
    }
  }

  // Start the tim sort animation
  function startSort() {
    if(state.sorting) return;
    state.sorting = true;
    state.actionIndex = 0;
    state.actions = timSort(state.array.slice());
    animateAction();
  }

  // Shuffle and redraw
  function shuffleArray() {
    if(state.sorting) return;
    state.array = generateArray();
    drawArray(state.array, {});
  }

  // Initialization
  state.array = generateArray();
  drawArray(state.array, {});

  // Buttons hookup
  document.getElementById('btnShuffle').addEventListener('click', () => {
    if(state.sorting) return;
    shuffleArray();
  });

  document.getElementById('btnStart').addEventListener('click', () => {
    if(state.sorting) return;
    startSort();
  });
})();
</script>

</body>
</html>
