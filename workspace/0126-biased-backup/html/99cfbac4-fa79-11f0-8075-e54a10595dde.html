<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Context Switching Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<h1>Context Switching Interactive Demo</h1>

<div>
    <h2>Control Area</h2>
    <button id="view1Btn">View 1</button>
    <button id="view2Btn">View 2</button>
    <button id="view3Btn">View 3</button>
</div>

<div id="view1" class="view hidden">
    <h2>View 1</h2>
    <input type="text" id="input1" placeholder="Type something...">
    <button id="submit1">Submit</button>
    <div id="output1"></div>
</div>

<div id="view2" class="view hidden">
    <h2>View 2</h2>
    <input type="range" id="slider1" min="0" max="100" value="50">
    <button id="submit2">Submit Slider</button>
    <div id="output2"></div>
</div>

<div id="view3" class="view hidden">
    <h2>View 3</h2>
    <input type="text" id="input2" placeholder="Another input...">
    <label for="select1">Choose an option:</label>
    <select id="select1">
        <option value="Option 1">Option 1</option>
        <option value="Option 2">Option 2</option>
        <option value="Option 3">Option 3</option>
    </select>
    <button id="submit3">Submit</button>
    <div id="output3"></div>
</div>

<script>
    document.getElementById('view1Btn').onclick = function() {
        switchView('view1');
    };
    document.getElementById('view2Btn').onclick = function() {
        switchView('view2');
    };
    document.getElementById('view3Btn').onclick = function() {
        switchView('view3');
    };

    function switchView(viewId) {
        const views = document.querySelectorAll('.view');
        views.forEach(view => {
            if (view.id === viewId) {
                view.classList.remove('hidden');
            } else {
                view.classList.add('hidden');
            }
        });
    }

    document.getElementById('submit1').onclick = function() {
        const input = document.getElementById('input1').value;
        document.getElementById('output1').innerText = 'You entered: ' + input;
    };
    
    document.getElementById('submit2').onclick = function() {
        const sliderValue = document.getElementById('slider1').value;
        document.getElementById('output2').innerText = 'Slider value: ' + sliderValue;
    };

    document.getElementById('submit3').onclick = function() {
        const input = document.getElementById('input2').value;
        const selectedOption = document.getElementById('select1').value;
        document.getElementById('output3').innerText = 'Input: ' + input + ', Selected: ' + selectedOption;
    };
</script>

</body>
</html>
