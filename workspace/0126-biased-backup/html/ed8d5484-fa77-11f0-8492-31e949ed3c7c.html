<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Sort Visualization</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #f0f2f5, #d9e5f0);
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
            overflow: hidden;
        }
        h1 {
            position: absolute;
            top: 20px;
            font-size: 2.5rem;
            text-align: center;
            color: #2f4f4f;
        }
        #array-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 300px;
            width: 80%;
            margin: 0 auto;
            position: relative;
        }
        .bar {
            width: 20px;
            margin: 0 2px;
            background: #8acb88;
            display: inline-block;
            transition: height 0.3s ease, background 0.3s ease;
        }
        .pivot {
            background: #ff6347;
        }
        .sorted {
            background: #4169e1;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            background-color: #3b5998;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #2e4571;
        }
    </style>
</head>
<body>

    <h1>Quick Sort Visualization</h1>
    <div id="array-container"></div>
    <button id="sort-button">Sort Array</button>

    <script>
        const arrayContainer = document.getElementById('array-container');
        const sortButton = document.getElementById('sort-button');

        let array = [];
        for(let i = 0; i < 15; i++) {
            array.push(Math.floor(Math.random() * 200) + 20);
        }

        function createBars() {
            arrayContainer.innerHTML = '';
            array.forEach(value => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${value}px`;
                arrayContainer.appendChild(bar);
            });
        }

        async function quickSort(array, left, right) {
            if(left < right) {
                let pivotIndex = await partition(array, left, right);
                await quickSort(array, left, pivotIndex - 1);
                await quickSort(array, pivotIndex + 1, right);
            }
        }

        async function partition(array, left, right) {
            let pivot = array[right];
            let i = left - 1;
            for(let j = left; j < right; j++) {
                if(array[j] < pivot) {
                    i++;
                    [array[i], array[j]] = [array[j], array[i]];
                    updateBars(i, j);
                    await sleep(200);
                }
            }
            [array[i + 1], array[right]] = [array[right], array[i + 1]];
            updateBars(i + 1, right);
            await sleep(200);
            return i + 1;
        }

        function updateBars(index1, index2) {
            const bars = document.querySelectorAll('.bar');
            bars[index1].classList.add('pivot');
            bars[index2].classList.add('pivot');
            setTimeout(() => {
                bars[index1].classList.remove('pivot');
                bars[index2].classList.remove('pivot');
            }, 300);
            createBars();
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        sortButton.addEventListener('click', async () => {
            await quickSort(array, 0, array.length - 1);
            const bars = document.querySelectorAll('.bar');
            bars.forEach(bar => bar.classList.add('sorted'));
        });

        createBars();
    </script>

</body>
</html>
