<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Memory</title>
    <style>
        body {
            background-color: #000;
        }
        #container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #000;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        #controls {
            margin-bottom: 20px;
        }
        #controls button, #controls input {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #000;
            color: #fff;
            cursor: pointer;
        }
        #controls input[type="text"] {
            padding: 10px 20px;
            border: 1px solid #000;
            border-radius: 5px;
            width: 50%;
        }
        #controls button:hover, #controls input[type="text"]:hover {
            background-color: #000;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Virtual Memory</h1>
        <div id="controls">
            <button id="clear-btn">Clear</button>
            <input id="input-field" type="text" placeholder="Enter text to clear">
            <button id="write-btn">Write</button>
            <input id="write-input" type="text" placeholder="Enter text to write">
            <button id="read-btn">Read</button>
            <input id="read-input" type="text" placeholder="Enter text to read">
            <button id="delete-btn">Delete</button>
        </div>
        <div id="output"></div>
    </div>

    <script>
        let inputField = document.getElementById('input-field');
        let outputDiv = document.getElementById('output');
        let clearBtn = document.getElementById('clear-btn');
        let writeBtn = document.getElementById('write-btn');
        let readBtn = document.getElementById('read-btn');
        let deleteBtn = document.getElementById('delete-btn');
        let writeInput = document.getElementById('write-input');
        let readInput = document.getElementById('read-input');

        let clear = function() {
            outputDiv.innerText = '';
        }

        let write = function() {
            let text = writeInput.value;
            outputDiv.innerText = text;
        }

        let read = function() {
            let text = readInput.value;
            outputDiv.innerText = text;
        }

        let delete = function() {
            outputDiv.innerText = '';
        }

        clearBtn.addEventListener('click', clear);
        writeBtn.addEventListener('click', write);
        readBtn.addEventListener('click', read);
        deleteBtn.addEventListener('click', delete);

        inputField.addEventListener('input', function() {
            writeInput.value = inputField.value;
        });

        writeInput.addEventListener('input', function() {
            write();
        });

        readInput.addEventListener('input', function() {
            read();
        });

        writeBtn.addEventListener('click', function() {
            write();
        });

        readBtn.addEventListener('click', function() {
            read();
        });

        deleteBtn.addEventListener('click', function() {
            clear();
        });
    </script>
</body>
</html>
