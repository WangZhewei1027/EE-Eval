<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interpreter</title>
    <style>
        body {
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #444;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .footer {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
            border-top: 1px solid #444;
            clear: both;
        }
        .footer p {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Interpreter</h1>
            <p>Learn to code without typing</p>
        </div>
        <div class="footer">
            <p>&copy; 2023 Interpreter</p>
        </div>
        <div class="code-container">
            <div class="code">
                <pre id="code"></pre>
            </div>
            <button id="run-btn">Run Code</button>
        </div>
    </div>

    <script>
        let code = document.getElementById('code');
        let runBtn = document.getElementById('run-btn');
        let output = document.getElementById('output');

        runBtn.addEventListener('click', () => {
            try {
                let codeStr = code.value;
                let result = runCode(codeStr);
                output.innerHTML = result;
            } catch (e) {
                output.innerHTML = `Error: ${e.message}`;
            }
        });

        function runCode(codeStr) {
            try {
                let result = runInterpreter(codeStr);
                return result;
            } catch (e) {
                return `Error: ${e.message}`;
            }
        }

        function runInterpreter(codeStr) {
            // Simulate a complex interpreter logic
            if (codeStr.includes('if')) {
                let condition = codeStr.split(' ')[1];
                if (condition === 'true') {
                    return 'Condition is true';
                } else {
                    return 'Condition is false';
                }
            } else if (codeStr.includes('def')) {
                let funcName = codeStr.split(' ')[1];
                let func = eval(funcName);
                return func.toString();
            } else {
                return 'Unknown code';
            }
        }
    </script>
</body>
</html>
