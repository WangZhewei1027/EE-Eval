<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routing Demo</title>
    <style>
        body {
            font-family: monospace;
            background-color: white;
        }
        #controls {
            display: inline-block;
            margin: 0 10px;
        }
        #controls button {
            padding: 5px 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        #controls button:hover {
            background-color: #3e8e41;
        }
        #controls input[type="number"] {
            width: 50px;
            height: 20px;
            margin: 5px;
        }
        #controls input[type="text"] {
            width: 100px;
            height: 20px;
            margin: 5px;
        }
        #controls input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin: 5px;
        }
        #controls input[type="radio"] {
            width: 20px;
            height: 20px;
            margin: 5px;
        }
        #controls button input[type="submit"] {
            padding: 5px 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        #controls button input[type="submit"]:hover {
            background-color: #3e8e41;
        }
        #controls input[type="submit"] {
            padding: 5px 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        #controls input[type="submit"]:hover {
            background-color: #3e8e41;
        }
        #controls button input[type="submit"] {
            padding: 5px 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        #controls button input[type="submit"]:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <h1>Routing Demo</h1>
    <div id="controls">
        <button id="submit">Submit</button>
        <input type="number" id="num1" value="10">
        <input type="number" id="num2" value="20">
        <input type="text" id="text" placeholder="Enter text">
        <input type="checkbox" id="chk1" name="chk1">
        <label for="chk1">Check 1</label>
        <input type="radio" id="chk2" name="chk2" value="1">
        <label for="chk2">Check 2</label>
        <button id="btn1">Button 1</button>
        <button id="btn2">Button 2</button>
    </div>

    <script>
        const submit = document.getElementById('submit');
        const num1 = document.getElementById('num1');
        const num2 = document.getElementById('num2');
        const text = document.getElementById('text');
        const chk1 = document.getElementById('chk1');
        const chk2 = document.getElementById('chk2');
        const btn1 = document.getElementById('btn1');
        const btn2 = document.getElementById('btn2');

        submit.addEventListener('click', () => {
            alert(`Number 1: ${num1.value}, Number 2: ${num2.value}, Text: ${text.value}, Check 1: ${chk1.checked}, Check 2: ${chk2.checked}`);
        });

        num1.addEventListener('input', () => {
            text.value = `Number 1: ${num1.value}`;
        });

        num2.addEventListener('input', () => {
            text.value = `Number 2: ${num2.value}`;
        });

        text.addEventListener('input', () => {
            alert(`Text: ${text.value}`);
        });

        chk1.addEventListener('change', () => {
            if (chk1.checked) {
                alert('Check 1 is checked');
            } else {
                alert('Check 1 is not checked');
            }
        });

        chk2.addEventListener('change', () => {
            if (chk2.checked) {
                alert('Check 2 is checked');
            } else {
                alert('Check 2 is not checked');
            }
        });

        btn1.addEventListener('click', () => {
            alert(`Button 1 clicked`);
        });

        btn2.addEventListener('click', () => {
            alert(`Button 2 clicked`);
        });
    </script>
</body>
</html>
