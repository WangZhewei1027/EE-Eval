<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heap Sort Visualization</title>
    <style>
        :root {
            --primary-color: #3a0ca3;
            --secondary-color: #7209b7;
            --accent-color: #f72585;
            --background-color: #1a1a2e;
            --text-color: #e2e2e2;
            --highlight-color: #4cc9f0;
            --node-color: #4361ee;
            --node-sorted: #4ad66d;
            --node-compare: #ff9e00;
            --node-parent: #f72585;
            --node-active: #4cc9f0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 2rem;
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(to right, white, var(--highlight-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-top: 0.5rem;
            font-weight: 300;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 1200px;
            margin-bottom: 3rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            width: 100%;
        }

        button {
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, var(--accent-color), var(--secondary-color));
        }

        button:disabled {
            opacity: 0.6;
            transform: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: not-allowed;
        }

        .visualization {
            position: relative;
            width: 100%;
            min-height: 500px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1), 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            overflow: hidden;
        }

        .array-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 250px;
            margin-bottom: 2rem;
            position: relative;
        }

        .array-bar {
            width: 40px;
            margin: 0 3px;
            transition: all 0.3s ease;
            position: relative;
            background-color: var(--node-color);
            border-radius: 5px 5px 0 0;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .array-bar.sorted {
            background-color: var(--node-sorted);
        }

        .array-bar.comparing {
            background-color: var(--node-compare);
        }

        .array-bar.parent {
            background-color: var(--node-parent);
        }

        .array-bar.active {
            background-color: var(--node-active);
        }

        .array-bar::after {
            content: attr(data-value);
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .tree-container {
            height: 300px;
            width: 100%;
            position: relative;
            margin-top: 2rem;
        }

        .node {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--node-color);
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.5s ease;
            z-index: 2;
        }

        .node.sorted {
            background-color: var(--node-sorted);
        }

        .node.comparing {
            background-color: var(--node-compare);
        }

        .node.parent {
            background-color: var(--node-parent);
        }

        .edge {
            position: absolute;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.3);
            transform-origin: 0 0;
            z-index: 1;
            transition: all 0.5s ease;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .status {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            font-weight: 500;
            height: 1.5rem;
            text-align: center;
            color: var(--highlight-color);
            text-shadow: 0 0 10px rgba(76, 201, 240, 0.3);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 1s infinite;
        }

        @media (max-width: 768px) {
            .array-bar {
                width: 25px;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Heap Sort Visualization</h1>
        <p class="subtitle">A beautiful demonstration of the heap sort algorithm</p>
    </div>

    <div class="container">
        <div class="controls">
            <button id="startBtn">Start Visualization</button>
            <button id="resetBtn">Reset</button>
        </div>

        <div class="visualization">
            <div class="array-container" id="arrayContainer"></div>
            <div class="status" id="status">Ready to begin heap sort</div>
            <div class="tree-container" id="treeContainer"></div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background-color: var(--node-color);"></div>
                    <span>Normal Node</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: var(--node-parent);"></div>
                    <span>Parent Node</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: var(--node-compare);"></div>
                    <span>Comparing Nodes</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: var(--node-active);"></div>
                    <span>Active Node</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: var(--node-sorted);"></div>
                    <span>Sorted Position</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Configuration
            const arraySize = 15;
            const minValue = 10;
            const maxValue = 100;
            const animationSpeed = 800;
            
            // DOM Elements
            const arrayContainer = document.getElementById('arrayContainer');
            const treeContainer = document.getElementById('treeContainer');
            const startBtn = document.getElementById('startBtn');
            const resetBtn = document.getElementById('resetBtn');
            const statusElement = document.getElementById('status');
            
            // State
            let array = [];
            let isSorting = false;
            let animationQueue = [];
            let heapSize = 0;
            let edges = [];
            
            // Initialize
            function init() {
                resetArray();
                renderArray();
                renderTree();
                updateStatus("Ready to begin heap sort");
            }
            
            // Generate random array
            function resetArray() {
                array = Array.from({length: arraySize}, () => 
                    Math.floor(Math.random() * (maxValue - minValue + 1)) + minValue
                );
                heapSize = array.length;
                clearAnimations();
                renderArray();
                renderTree();
            }
            
            // Render array as bars
            function renderArray() {
                arrayContainer.innerHTML = '';
                array.forEach((value, index) => {
                    const bar = document.createElement('div');
                    bar.className = 'array-bar';
                    bar.style.height = `${value * 2}px`;
                    bar.setAttribute('data-value', value);
                    arrayContainer.appendChild(bar);
                });
            }
            
            // Render heap as tree
            function renderTree() {
                treeContainer.innerHTML = '';
                edges = [];
                
                // Calculate positions for nodes
                const levelHeight = 80;
                const maxLevel = Math.floor(Math.log2(array.length)) + 1;
                const containerWidth = treeContainer.offsetWidth;
                
                // Create nodes
                array.forEach((value, index) => {
                    if (index >= heapSize) return;
                    
                    const level = Math.floor(Math.log2(index + 1));
                    const nodesInLevel = Math.pow(2, level);
                    const posInLevel = index + 1 - Math.pow(2, level);
                    
                    const node = document.createElement('div');
                    node.className = 'node';
                    node.textContent = value;
                    node.id = `node-${index}`;
                    
                    // Position calculation
                    const x = (containerWidth / (nodesInLevel + 1)) * (posInLevel + 1);
                    const y = 50 + level * levelHeight;
                    
                    node.style.left = `${x - 25}px`;
                    node.style.top = `${y}px`;
                    
                    treeContainer.appendChild(node);
                    
                    // Create edges to children
                    const leftChild = 2 * index + 1;
                    const rightChild = 2 * index + 2;
                    
                    if (leftChild < heapSize) {
                        createEdge(index, leftChild, x, y);
                    }
                    if (rightChild < heapSize) {
                        createEdge(index, rightChild, x, y);
                    }
                });
                
                // Render edges after all nodes are positioned
                edges.forEach(edgeData => {
                    const edge = document.createElement('div');
                    edge.className = 'edge';
                    edge.style.width = `${edgeData.width}px`;
                    edge.style.left = `${edgeData.fromX}px`;
                    edge.style.top = `${edgeData.fromY}px`;
                    edge.style.transform = `rotate(${edgeData.angle}rad)`;
                    treeContainer.appendChild(edge);
                });
            }
            
            function createEdge(parentIndex, childIndex, parentX, parentY) {
                const level = Math.floor(Math.log2(childIndex + 1));
                const nodesInLevel = Math.pow(2, level);
                const posInLevel = childIndex + 1 - Math.pow(2, level);
                
                const childX = (treeContainer.offsetWidth / (nodesInLevel + 1)) * (posInLevel + 1);
                const childY = 50 + level * 80;
                
                const dx = childX - parentX;
                const dy = childY - parentY;
                const length = Math.sqrt(dx * dx + dy * dy);
                const angle = Math.atan2(dy, dx);
                
                edges.push({
                    width: length,
                    fromX: parentX,
                    fromY: parentY + 25,
                    angle: angle
                });
            }
            
            // Highlight elements being compared
            function highlightElements(indices, className) {
                return new Promise(resolve => {
                    // Highlight array bars
                    indices.forEach(i => {
                        const bar = arrayContainer.children[i];
                        bar.classList.add(className);
                    });
                    
                    // Highlight tree nodes
                    indices.forEach(i => {
                        if (i < heapSize) {
                            const node = document.getElementById(`node-${i}`);
                            if (node) node.classList.add(className);
                        }
                    });
                    
                    setTimeout(() => {
                        indices.forEach(i => {
                            const bar = arrayContainer.children[i];
                            bar.classList.remove(className);
                            
                            if (i < heapSize) {
                                const node = document.getElementById(`node-${i}`);
                                if (node) node.classList.remove(className);
                            }
                        });
                        resolve();
                    }, animationSpeed);
                });
            }
            
            // Move element in array and tree
            function moveElement(fromIndex, toIndex) {
                return new Promise(resolve => {
                    // Swap array values
                    [array[fromIndex], array[toIndex]] = [array[toIndex], array[fromIndex]];
                    
                    // Animate array bars
                    const fromBar = arrayContainer.children[fromIndex];
                    const toBar = arrayContainer.children[toIndex];
                    
                    fromBar.style.transform = `translateX(${(toIndex - fromIndex) * 46}px)`;
                    toBar.style.transform = `translateX(${(fromIndex - toIndex) * 46}px)`;
                    
                    setTimeout(() => {
                        // Update array bars
                        fromBar.style.height = `${array[fromIndex] * 2}px`;
                        fromBar.setAttribute('data-value', array[fromIndex]);
                        toBar.style.height = `${array[toIndex] * 2}px`;
                        toBar.setAttribute('data-value', array[toIndex]);
                        
                        // Reset transforms
                        fromBar.style.transform = '';
                        toBar.style.transform = '';
                        
                        // Re-render tree to update positions and values
                        renderTree();
                        
                        resolve();
                    }, animationSpeed);
                });
            }
            
            // Mark element as sorted
            function markSorted(index) {
                const bar = arrayContainer.children[index];
                bar.classList.add('sorted');
                
                if (index < heapSize) {
                    const node = document.getElementById(`node-${index}`);
                    if (node) node.classList.add('sorted');
                }
            }
            
            // Heap sort algorithm
            async function heapSort() {
                if (isSorting) return;
                isSorting = true;
                startBtn.disabled = true;
                
                // Build max heap
                await updateStatus("Building max heap...");
                await buildMaxHeap();
                
                // Extract elements from heap
                await updateStatus("Sorting by extracting elements...");
                for (let i = array.length - 1; i > 0; i--) {
                    // Move current root to end
                    await highlightElements([0, i], 'comparing');
                    await moveElement(0, i);
                    markSorted(i);
                    
                    // Reduce heap size
                    heapSize--;
                    await updateStatus(`Extracted max element (${array[i]}), reduced heap size to ${heapSize}`);
                    
                    // Heapify root element
                    await heapify(0);
                    renderTree();
                }
                
                // Mark first element as sorted
                markSorted(0);
                
                await updateStatus("Sorting complete!", 2000);
                isSorting = false;
                startBtn.disabled = false;
            }
            
            // Build max heap
            async function buildMaxHeap() {
                // Start from last non-leaf node
                const startIdx = Math.floor(array.length / 2) - 1;
                
                for (let i = startIdx; i >= 0; i--) {
                    await updateStatus(`Heapifying subtree rooted at index ${i}`);
                    await heapify(i);
                    renderTree();
                }
            }
            
            // Heapify subtree rooted at index i
            async function heapify(i) {
                let largest = i;
                const left = 2 * i + 1;
                const right = 2 * i + 2;
                
                // Highlight parent and children being considered
                await highlightElements([i], 'parent');
                
                // Compare with left child
                if (left < heapSize) {
                    await highlightElements([largest, left], 'comparing');
                    
                    if (array[left] > array[largest]) {
                        largest = left;
                    }
                }
                
                // Compare with right child
                if (right < heapSize) {
                    await highlightElements([largest, right], 'comparing');
                    
                    if (array[right] > array[largest]) {
                        largest = right;
                    }
                }
                
                // If largest is not root
                if (largest !== i) {
                    await highlightElements([i, largest], 'active');
                    await moveElement(i, largest);
                    
                    // Recursively heapify the affected sub-tree
                    await heapify(largest);
                }
            }
            
            // Clear all animations and highlights
            function clearAnimations() {
                const bars = arrayContainer.querySelectorAll('.array-bar');
                bars.forEach(bar => {
                    bar.className = 'array-bar';
                    bar.style.transform = '';
                });
                
                treeContainer.innerHTML = '';
            }
            
            // Update status message
            async function updateStatus(message, duration = 1000) {
                statusElement.textContent = message;
                statusElement.classList.add('pulse');
                
                if (duration > 0) {
                    await new Promise(resolve => setTimeout(resolve, duration));
                    statusElement.classList.remove('pulse');
                }
            }
            
            // Event listeners
            startBtn.addEventListener('click', heapSort);
            resetBtn.addEventListener('click', init);
            
            // Initialize the visualization
            init();
        });
    </script>
</body>
</html>
