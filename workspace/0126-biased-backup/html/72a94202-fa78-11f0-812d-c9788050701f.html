<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Heap Visualization</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');
        
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #fd79a8;
            --dark: #2d3436;
            --light: #f5f6fa;
            --success: #00b894;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            color: var(--dark);
        }
        
        header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: var(--dark);
            opacity: 0.7;
            font-weight: 300;
            max-width: 600px;
            line-height: 1.6;
        }
        
        .visualization-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            min-height: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            padding: 2rem;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        button {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .heap-container {
            width: 100%;
            height: 400px;
            position: relative;
            display: flex;
            justify-content: center;
        }
        
        .node {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 2;
        }
        
        .edge {
            position: absolute;
            background: var(--secondary);
            height: 2px;
            transform-origin: 0 0;
            z-index: 1;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .extract-animation {
            animation: extract 1s ease-out forwards;
        }
        
        @keyframes extract {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }
        
        .insert-animation {
            animation: insert 1s ease-out forwards;
        }
        
        @keyframes insert {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            70% {
                transform: scale(1.1);
                opacity: 0.8;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .highlight {
            animation: highlight 1.5s ease-in-out infinite;
        }
        
        @keyframes highlight {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(253, 121, 168, 0.7);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(253, 121, 168, 0);
            }
        }
        
        .status {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.9);
            padding: 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        .decorative-element {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.1) 0%, rgba(253, 121, 168, 0.1) 100%);
            z-index: -1;
        }
        
        .decorative-element:nth-child(1) {
            top: -100px;
            right: -100px;
        }
        
        .decorative-element:nth-child(2) {
            bottom: -50px;
            left: -100px;
            width: 200px;
            height: 200px;
        }
        
        footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--dark);
            opacity: 0.6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="visualization-container">
        <div class="decorative-element"></div>
        <div class="decorative-element"></div>
        
        <header>
            <h1>Max Heap Visualization</h1>
            <p class="subtitle">A complete binary tree where each node is greater than or equal to its children. The largest element is always at the root.</p>
        </header>
        
        <div class="controls">
            <button id="insert-btn">Insert Random Value</button>
            <button id="extract-btn">Extract Max</button>
        </div>
        
        <div class="heap-container" id="heap-container"></div>
        
        <div class="status" id="status">Heap is empty. Click "Insert Random Value" to add elements.</div>
    </div>
    
    <footer>An elegant visualization of the Max Heap data structure</footer>
    
    <script>
        class MaxHeap {
            constructor() {
                this.heap = [];
                this.maxSize = 15; // Limit for visualization purposes
            }
            
            parent(index) {
                return Math.floor((index - 1) / 2);
            }
            
            leftChild(index) {
                return 2 * index + 1;
            }
            
            rightChild(index) {
                return 2 * index + 2;
            }
            
            insert(value) {
                if (this.heap.length >= this.maxSize) {
                    document.getElementById('status').textContent = 'Heap is full (maximum size reached for visualization)';
                    return false;
                }
                
                this.heap.push(value);
                this.heapifyUp(this.heap.length - 1);
                return true;
            }
            
            extractMax() {
                if (this.heap.length === 0) return null;
                
                const max = this.heap[0];
                const last = this.heap.pop();
                
                if (this.heap.length > 0) {
                    this.heap[0] = last;
                    this.heapifyDown(0);
                }
                
                return max;
            }
            
            heapifyUp(index) {
                while (index > 0 && this.heap[this.parent(index)] < this.heap[index]) {
                    [this.heap[this.parent(index)], this.heap[index]] = [this.heap[index], this.heap[this.parent(index)]];
                    index = this.parent(index);
                }
            }
            
            heapifyDown(index) {
                let maxIndex = index;
                const left = this.leftChild(index);
                const right = this.rightChild(index);
                
                if (left < this.heap.length && this.heap[left] > this.heap[maxIndex]) {
                    maxIndex = left;
                }
                
                if (right < this.heap.length && this.heap[right] > this.heap[maxIndex]) {
                    maxIndex = right;
                }
                
                if (index !== maxIndex) {
                    [this.heap[index], this.heap[maxIndex]] = [this.heap[maxIndex], this.heap[index]];
                    this.heapifyDown(maxIndex);
                }
            }
            
            size() {
                return this.heap.length;
            }
            
            isEmpty() {
                return this.heap.length === 0;
            }
        }
        
        const heap = new MaxHeap();
        const heapContainer = document.getElementById('heap-container');
        const statusElement = document.getElementById('status');
        const insertBtn = document.getElementById('insert-btn');
        const extractBtn = document.getElementById('extract-btn');
        
        function renderHeap() {
            // Clear previous rendering
            heapContainer.innerHTML = '';
            
            if (heap.isEmpty()) {
                statusElement.textContent = 'Heap is empty. Click "Insert Random Value" to add elements.';
                return;
            }
            
            statusElement.textContent = `Current heap size: ${heap.size()}. Root value: ${heap.heap[0]}`;
            
            // Calculate tree dimensions
            const height = Math.floor(Math.log2(heap.size())) + 1;
            const maxWidth = Math.pow(2, height - 1);
            
            // Calculate node positions
            const nodeWidth = 60;
            const nodeHeight = 60;
            const horizontalSpacing = 100;
            const verticalSpacing = 100;
            
            const startX = heapContainer.offsetWidth / 2;
            const startY = 40;
            
            // Create nodes and edges
            for (let i = 0; i < heap.size(); i++) {
                const level = Math.floor(Math.log2(i + 1));
                const levelWidth = Math.pow(2, level);
                const levelStartIndex = Math.pow(2, level) - 1;
                const positionInLevel = i - levelStartIndex;
                
                const x = startX + (positionInLevel - (levelWidth - 1) / 2) * (nodeWidth + horizontalSpacing);
                const y = startY + level * (nodeHeight + verticalSpacing);
                
                // Draw edges to children if they exist
                const leftChild = heap.leftChild(i);
                const rightChild = heap.rightChild(i);
                
                if (leftChild < heap.size()) {
                    const leftChildLevel = Math.floor(Math.log2(leftChild + 1));
                    const leftChildLevelStartIndex = Math.pow(2, leftChildLevel) - 1;
                    const leftChildPositionInLevel = leftChild - leftChildLevelStartIndex;
                    
                    const leftChildX = startX + (leftChildPositionInLevel - (Math.pow(2, leftChildLevel) - 1) / 2) * (nodeWidth + horizontalSpacing);
                    const leftChildY = startY + leftChildLevel * (nodeHeight + verticalSpacing);
                    
                    drawEdge(x, y, leftChildX, leftChildY);
                }
                
                if (rightChild < heap.size()) {
                    const rightChildLevel = Math.floor(Math.log2(rightChild + 1));
                    const rightChildLevelStartIndex = Math.pow(2, rightChildLevel) - 1;
                    const rightChildPositionInLevel = rightChild - rightChildLevelStartIndex;
                    
                    const rightChildX = startX + (rightChildPositionInLevel - (Math.pow(2, rightChildLevel) - 1) / 2) * (nodeWidth + horizontalSpacing);
                    const rightChildY = startY + rightChildLevel * (nodeHeight + verticalSpacing);
                    
                    drawEdge(x, y, rightChildX, rightChildY);
                }
                
                // Create node
                const node = document.createElement('div');
                node.className = 'node';
                node.style.left = `${x - nodeWidth/2}px`;
                node.style.top = `${y - nodeHeight/2}px`;
                node.textContent = heap.heap[i];
                
                if (i === 0) {
                    node.classList.add('highlight');
                }
                
                heapContainer.appendChild(node);
            }
        }
        
        function drawEdge(x1, y1, x2, y2) {
            const length = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
            
            const edge = document.createElement('div');
            edge.className = 'edge';
            edge.style.width = `${length}px`;
            edge.style.left = `${x1}px`;
            edge.style.top = `${y1}px`;
            edge.style.transform = `rotate(${angle}deg)`;
            
            heapContainer.appendChild(edge);
        }
        
        function insertRandomValue() {
            const value = Math.floor(Math.random() * 100) + 1;
            if (heap.insert(value)) {
                renderHeap();
                
                // Animate the new node (last one added)
                const nodes = document.querySelectorAll('.node');
                if (nodes.length > 0) {
                    const newNode = nodes[nodes.length - 1];
                    newNode.classList.add('insert-animation');
                    
                    setTimeout(() => {
                        newNode.classList.remove('insert-animation');
                        if (nodes.length === 1) {
                            newNode.classList.add('highlight');
                        }
                    }, 1000);
                }
                
                statusElement.textContent = `Inserted value: ${value}. Current heap size: ${heap.size()}. Root value: ${heap.heap[0]}`;
            }
        }
        
        function extractMaxValue() {
            const max = heap.extractMax();
            if (max !== null) {
                // Animate the root node before removing
                const rootNode = document.querySelector('.node');
                if (rootNode) {
                    rootNode.classList.add('extract-animation');
                    
                    setTimeout(() => {
                        renderHeap();
                        statusElement.textContent = `Extracted max value: ${max}. Current heap size: ${heap.size()}. ${heap.size() > 0 ? `New root value: ${heap.heap[0]}` : 'Heap is now empty.'}`;
                    }, 1000);
                }
            } else {
                statusElement.textContent = 'Heap is empty. Nothing to extract.';
            }
        }
        
        // Insert initial elements
        for (let i = 0; i < 5; i++) {
            heap.insert(Math.floor(Math.random() * 100) + 1);
        }
        renderHeap();
        
        // Event listeners
        insertBtn.addEventListener('click', insertRandomValue);
        extractBtn.addEventListener('click', extractMaxValue);
        
        // Initial animation
        setTimeout(() => {
            const nodes = document.querySelectorAll('.node');
            if (nodes.length > 0) {
                nodes.forEach((node, index) => {
                    node.style.transitionDelay = `${index * 0.1}s`;
                });
            }
        }, 500);
    </script>
</body>
</html>
