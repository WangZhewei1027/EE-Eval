<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmetric Cryptography</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        button, input, select {
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button {
            background-color: #4CAF50;
            color: #fff;
        }
        input, select {
            width: 100%;
            height: 20px;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
        }
        select {
            margin-bottom: 20px;
        }
        .progress-bar {
            height: 20px;
            background-color: #4CAF50;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Symmetric Cryptography</h1>
    <p>Learn how to create symmetric encryption algorithms using Python.</p>
    <button id="encrypt-btn">Encrypt</button>
    <button id="decrypt-btn">Decrypt</button>
    <button id="generate-btn">Generate Key</button>
    <button id="clear-btn">Clear</button>
    <div id="progress-bar"></div>
    <div id="output"></div>

    <script>
        // Function to encrypt a message
        function encrypt(message) {
            const key = prompt("Enter your encryption key:");
            if (key === null) {
                alert("Please enter a key.");
                return;
            }

            const encryptedMessage = message + key;
            document.getElementById("output").innerHTML = encryptedMessage;
            document.getElementById("progress-bar").style.width = 20 + "%";
        }

        // Function to decrypt a message
        function decrypt(message) {
            const key = prompt("Enter your decryption key:");
            if (key === null) {
                alert("Please enter a key.");
                return;
            }

            const decryptedMessage = message + key;
            document.getElementById("output").innerHTML = decryptedMessage;
            document.getElementById("progress-bar").style.width = 40 + "%";
        }

        // Function to generate a key
        function generateKey() {
            const key = prompt("Enter your encryption key:");
            if (key === null) {
                alert("Please enter a key.");
                return;
            }

            document.getElementById("progress-bar").style.width = 20 + "%";
            document.getElementById("output").innerHTML = key;
            document.getElementById("progress-bar").style.width = 50 + "%";
        }

        // Function to clear the output
        function clearOutput() {
            document.getElementById("output").innerHTML = "";
            document.getElementById("progress-bar").style.width = 0 + "%";
        }

        // Get the buttons and progress bar
        const buttons = document.querySelectorAll("button");
        const progressBar = document.getElementById("progress-bar");
        const output = document.getElementById("output");

        // Add event listeners to the buttons
        buttons.forEach(button => {
            button.addEventListener("click", () => {
                if (button.id === "encrypt-btn") {
                    encrypt();
                } else if (button.id === "decrypt-btn") {
                    decrypt();
                } else if (button.id === "generate-btn") {
                    generateKey();
                } else if (button.id === "clear-btn") {
                    clearOutput();
                }
            });
        });

        // Add event listener to the progress bar
        progressBar.addEventListener("change", () => {
            if (progressBar.value >= 100) {
                alert("Encryption and decryption completed successfully.");
            } else {
                alert("Encryption and decryption in progress.");
            }
        });
    </script>
</body>
</html>
