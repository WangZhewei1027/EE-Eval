<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Typing Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input, button, select {
            margin: 5px 0;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>Static Typing Demonstration</h1>
    
    <h2>Variable Declaration</h2>
    <input type="text" id="varName" placeholder="Enter variable name">
    <select id="varType">
        <option value="number">Number</option>
        <option value="string">String</option>
        <option value="boolean">Boolean</option>
    </select>
    <input type="text" id="varValue" placeholder="Enter variable value">
    <button id="declareVar">Declare Variable</button>

    <h2>Current Variables</h2>
    <div id="variablesList"></div>

    <h2>Variable Type Check</h2>
    <input type="text" id="checkVarName" placeholder="Enter variable name to check type">
    <button id="checkType">Check Type</button>
    <div id="typeResult"></div>

    <h2>Type Conversion</h2>
    <input type="text" id="convertValue" placeholder="Enter value to convert">
    <select id="convertToType">
        <option value="number">Number</option>
        <option value="string">String</option>
        <option value="boolean">Boolean</option>
    </select>
    <button id="convertValueBtn">Convert Value</button>
    <div id="conversionResult"></div>

    <h2>Error Handling</h2>
    <input type="text" id="errorVarName" placeholder="Enter variable name for error">
    <button id="simulateError">Simulate Error</button>
    <div id="errorResult"></div>

    <script>
        const variables = {};

        document.getElementById('declareVar').addEventListener('click', () => {
            const name = document.getElementById('varName').value;
            const type = document.getElementById('varType').value;
            const value = document.getElementById('varValue').value;

            try {
                if (type === 'number') {
                    variables[name] = parseFloat(value);
                } else if (type === 'boolean') {
                    variables[name] = (value.toLowerCase() === 'true');
                } else {
                    variables[name] = value;
                }
                updateVariablesList();
                alert(`Variable ${name} of type ${type} declared successfully.`);
            } catch (error) {
                alert('Error declaring variable: ' + error.message);
            }
        });

        function updateVariablesList() {
            const list = document.getElementById('variablesList');
            list.innerHTML = '';
            for (const [name, value] of Object.entries(variables)) {
                list.innerHTML += `<div>${name}: ${value} (${typeof value})</div>`;
            }
        }

        document.getElementById('checkType').addEventListener('click', () => {
            const name = document.getElementById('checkVarName').value;
            const type = typeof variables[name];
            document.getElementById('typeResult').innerText = type ? 
                `Type of ${name} is ${type}` : 
                `Variable ${name} not found.`;
        });

        document.getElementById('convertValueBtn').addEventListener('click', () => {
            const value = document.getElementById('convertValue').value;
            const toType = document.getElementById('convertToType').value;
            let result;

            try {
                if (toType === 'number') {
                    result = parseFloat(value);
                } else if (toType === 'boolean') {
                    result = (value.toLowerCase() === 'true');
                } else {
                    result = value.toString();
                }
                document.getElementById('conversionResult').innerText = `Converted value: ${result}`;
            } catch (error) {
                document.getElementById('conversionResult').innerText = 'Error converting value: ' + error.message;
            }
        });

        document.getElementById('simulateError').addEventListener('click', () => {
            const name = document.getElementById('errorVarName').value;
            try {
                if (!variables[name]) {
                    throw new Error(`Variable ${name} does not exist.`);
                }
                document.getElementById('errorResult').innerText = `Variable ${name} exists with value: ${variables[name]}`;
            } catch (error) {
                document.getElementById('errorResult').innerText = 'Error: ' + error.message;
            }
        });
    </script>
</body>
</html>
