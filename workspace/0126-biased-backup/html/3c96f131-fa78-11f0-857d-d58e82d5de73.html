<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quick Sort Visualization — Aesthetic Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

  :root {
    --color-bg: #0a0f2c;
    --color-primary: #ffd966;
    --color-secondary: #ff6f91;
    --color-accent: #7ae7ff;
    --color-neutral: #d3d3d3;
    --color-shadow: rgba(255, 217, 102, 0.45);
    --color-bar-base: #2b2f4a;
  }

  * {
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(135deg, #0a0f2c 0%, #171b3a 100%);
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    color: var(--color-neutral);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  header {
    text-align: center;
    padding: 3rem 1rem 1rem;
    user-select: none;
  }
  header h1 {
    font-weight: 700;
    font-size: 3.6rem;
    letter-spacing: 0.14em;
    color: var(--color-primary);
    margin-bottom: 0.1em;
    text-shadow:
      0 0 12px var(--color-primary),
      0 0 28px var(--color-primary);
  }
  header p {
    font-weight: 400;
    font-size: 1.25rem;
    font-style: italic;
    color: var(--color-accent);
    text-shadow: 0 0 5px var(--color-accent);
  }

  main {
    max-width: 900px;
    margin: 3rem auto 6rem;
    padding: 0 1.5rem;
  }

  .viz-container {
    position: relative;
    height: 380px;
    background: radial-gradient(circle at center, #191f42 30%, #0a0f2c 100%);
    border-radius: 1.15rem;
    box-shadow:
      inset 0 0 70px #141a3b,
      0 10px 40px -5px rgba(255, 217, 102, 0.3);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 0 18px 2rem 18px;
    user-select: none;
  }

  .bars {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    width: 100%;
    max-width: 820px;
    height: 340px;
  }

  .bar {
    --h: 100%;
    flex: 1 1 16px;
    max-width: 32px;
    position: relative;
    border-radius: 0.55rem 0.55rem 0.12rem 0.12rem;
    background-color: var(--color-bar-base);
    box-shadow:
      inset 0 -8px 10px rgba(255 217 102 / 0.2),
      0 0 25px rgba(255 217 102 / 0.1);
    cursor: default;
    transition:
      background-color 0.55s cubic-bezier(0.4, 0, 0.2, 1),
      box-shadow 0.55s cubic-bezier(0.4, 0, 0.2, 1),
      height 0.9s cubic-bezier(0.4, 0, 0.2, 1),
      filter 0.55s ease;
    will-change: height, background-color, box-shadow, filter;
  }
  .bar:after {
    content: attr(data-val);
    position: absolute;
    top: -2.9rem;
    left: 50%;
    transform: translateX(-50%);
    font-weight: 700;
    color: var(--color-accent);
    font-size: 1rem;
    letter-spacing: 0.05em;
    user-select: none;
    text-shadow:
      0 0 5px var(--color-accent);
  }

  /* Height defined by inline style --h variable */
  .bar {
    height: calc(var(--h) * 1%);
  }

  /* Bar states */

  .bar.pivot {
    background-color: var(--color-secondary);
    box-shadow:
      0 0 24px var(--color-secondary),
      inset 0 0 16px var(--color-secondary);
    filter: drop-shadow(0 0 10px var(--color-secondary));
    z-index: 2;
  }
  .bar.comparing {
    background-color: var(--color-accent);
    box-shadow:
      0 0 24px var(--color-accent),
      inset 0 0 16px var(--color-accent);
    filter: drop-shadow(0 0 8px var(--color-accent));
  }
  .bar.swapped {
    background-color: var(--color-primary);
    box-shadow:
      0 0 32px var(--color-primary),
      inset 0 0 22px var(--color-primary);
    filter: drop-shadow(0 0 12px var(--color-primary));
  }
  .bar.sorted {
    background-color: #44dd88;
    box-shadow:
      0 0 28px #44dd88,
      inset 0 0 18px #44dd88;
    filter: drop-shadow(0 0 10px #44dd88);
  }

  /* Buttons */

  .controls {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin: 0 auto 1rem;
    user-select: none;
  }
  button {
    background: transparent;
    border: 2.5px solid var(--color-primary);
    padding: 0.85rem 2.5rem;
    border-radius: 3.2rem;
    letter-spacing: 0.14em;
    color: var(--color-primary);
    font-weight: 700;
    font-size: 1.05rem;
    cursor: pointer;
    transition:
      color 0.3s ease,
      background-color 0.3s ease,
      border-color 0.3s ease,
      box-shadow 0.3s ease;
    font-family: 'Montserrat', sans-serif;
    box-shadow: 0 0 25px rgba(255, 217, 102, 0.2);
  }
  button:hover,
  button:focus-visible {
    outline: none;
    background-color: var(--color-primary);
    color: var(--color-bg);
    border-color: var(--color-primary);
    box-shadow:
      0 0 40px var(--color-primary);
  }
  button:active {
    transform: scale(0.95);
  }

  footer {
    text-align: center;
    padding: 3rem 1rem 5rem;
    font-size: 0.85rem;
    color: #666d8b;
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.08em;
    user-select: none;
  }

  @media (max-width: 480px) {
    header h1 {
      font-size: 2.7rem;
      letter-spacing: 0.12em;
    }
    header p {
      font-size: 1rem;
    }
    .bars {
      gap: 6px;
      max-width: 100%;
    }
    .bar {
      max-width: 14px;
    }
    main {
      margin: 2rem 1rem 5rem;
    }
  }

</style>
</head>
<body>
<header role="banner" aria-label="Page header">
  <h1>QUICK SORT</h1>
  <p>Elegant Visualization &amp; Animation</p>
</header>
<main role="main" aria-label="Quick Sort visualization">
  <div class="viz-container" aria-live="polite" aria-atomic="true" aria-relevant="additions removals">
    <div class="bars" aria-label="Array bars representing numbers to sort"></div>
  </div>
  <nav class="controls" aria-label="Visualization controls">
    <button id="startBtn" aria-controls="bars" aria-disabled="false" aria-live="polite" title="Start sorting animation">START</button>
    <button id="resetBtn" aria-controls="bars" aria-disabled="false" aria-live="polite" title="Reset to new random array">RESET</button>
  </nav>
</main>
<footer>
  Crafted with meticulous care &mdash; Experience the finesse of Quick Sort.
</footer>
<script>
  (() => {
    const barsContainer = document.querySelector('.bars');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    // Config
    const ARRAY_SIZE = 30;
    const MIN_VALUE = 7;
    const MAX_VALUE = 95;

    let array = [];
    let sorting = false;

    // Utility: delay (ms)
    const delay = (ms) => new Promise(res => setTimeout(res, ms));

    // Create initial random array, avoid duplicates for cleaner visualization
    function createRandomArray(size, min, max) {
      const s = new Set();
      while (s.size < size) {
        s.add(Math.floor(Math.random() * (max - min + 1)) + min);
      }
      return Array.from(s);
    }

    // Render bars based on current array values & states
    // states arg: {pivotIndex, compareIndices, swapIndices, sortedIndices}
    function renderBars(states = {}) {
      const {
        pivotIndex = null,
        compareIndices = [],
        swapIndices = [],
        sortedIndices = []
      } = states;

      barsContainer.innerHTML = '';
      const max = Math.max(...array);

      array.forEach((val, i) => {
        const bar = document.createElement('div');
        bar.classList.add('bar');
        bar.style.setProperty('--h', val * 1);
        bar.setAttribute('data-val', val);
        bar.setAttribute('role', 'img');
        bar.setAttribute('aria-label', `Value ${val}`);

        // Assign classes for states
        if (sortedIndices.includes(i)) bar.classList.add('sorted');
        else if (swapIndices.includes(i)) bar.classList.add('swapped');
        else if (pivotIndex === i) bar.classList.add('pivot');
        else if (compareIndices.includes(i)) bar.classList.add('comparing');

        barsContainer.appendChild(bar);
      });
    }

    // Quick Sort with visual steps & animations
    async function quickSort(left = 0, right = array.length - 1) {
      if (left >= right) {
        if (left === right) sortedIndices.add(left);
        return;
      }

      let pivotIndex = right;
      let pivotValue = array[pivotIndex];
      let i = left;

      renderBars({ pivotIndex, sortedIndices: Array.from(sortedIndices) });
      await delay(600);

      for (let j = left; j < right; j++) {
        if (!sorting) return;

        renderBars({
          pivotIndex,
          compareIndices: [j, i],
          sortedIndices: Array.from(sortedIndices)
        });
        await delay(250);

        if (array[j] < pivotValue) {
          if (i !== j) {
            [array[i], array[j]] = [array[j], array[i]];

            renderBars({
              pivotIndex,
              swapIndices: [i, j],
              sortedIndices: Array.from(sortedIndices)
            });
            await delay(500);
          }
          i++;
        }
      }

      // Swap pivot with i
      if (i !== pivotIndex) {
        [array[i], array[pivotIndex]] = [array[pivotIndex], array[i]];
        renderBars({ swapIndices: [i, pivotIndex], sortedIndices: Array.from(sortedIndices) });
        await delay(650);
      }

      sortedIndices.add(i);

      // Mark pivot position sorted
      renderBars({ sortedIndices: Array.from(sortedIndices) });
      await delay(400);

      // Recurse left side
      await quickSort(left, i - 1);
      // Recurse right side
      await quickSort(i + 1, right);
    }

    // Sorted indices set for visual styling
    let sortedIndices;

    /** Reset visualization to new random array */
    function resetVisualization() {
      if (sorting) return;
      array = createRandomArray(ARRAY_SIZE, MIN_VALUE, MAX_VALUE);
      sortedIndices = new Set();
      renderBars();
    }

    /** Start sorting animation */
    async function startVisualization() {
      if (sorting) return;
      sorting = true;
      startBtn.setAttribute('aria-disabled', 'true');
      resetBtn.setAttribute('aria-disabled', 'true');
      startBtn.disabled = true;
      resetBtn.disabled = true;

      await quickSort();

      // Final mark all as sorted (in case any missed)
      sortedIndices = new Set(array.map((_, i) => i));
      renderBars({ sortedIndices: Array.from(sortedIndices) });

      sorting = false;
      startBtn.removeAttribute('aria-disabled');
      resetBtn.removeAttribute('aria-disabled');
      startBtn.disabled = false;
      resetBtn.disabled = false;
    }

    // Initialization
    resetVisualization();

    // Event listeners
    startBtn.addEventListener('click', () => {
      if (!sorting) startVisualization();
    });
    resetBtn.addEventListener('click', () => {
      if (!sorting) resetVisualization();
    });

    // Accessibility: focus indicators visible only with keyboard
    document.body.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') document.body.classList.add('user-is-tabbing');
    });
    document.body.addEventListener('mousedown', () => {
      document.body.classList.remove('user-is-tabbing');
    });
  })();
</script>
</body>
</html>
