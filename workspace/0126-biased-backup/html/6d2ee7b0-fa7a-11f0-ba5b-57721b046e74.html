<!DOCTYPE html>
<html>
<head>
    <title>Kruskal's Algorithm Interactive</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        #graph-container {
            border: 1px solid #000;
            width: 600px;
            height: 400px;
            position: relative;
            margin-bottom: 20px;
        }
        .node {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 15px;
            border: 1px solid #000;
            background: #fff;
            text-align: center;
            line-height: 30px;
            cursor: move;
        }
        .edge {
            position: absolute;
            height: 2px;
            background: #000;
            transform-origin: 0 0;
        }
        .edge-weight {
            position: absolute;
            background: white;
            padding: 2px;
            font-size: 12px;
        }
        .selected {
            border: 2px solid red;
        }
        .in-mst {
            background: #ccc;
        }
        .controls {
            margin-bottom: 20px;
        }
        .control-group {
            margin-bottom: 10px;
        }
        table {
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #000;
            padding: 5px;
            text-align: left;
        }
        #status {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Kruskal's Algorithm Interactive</h1>
    
    <div class="controls">
        <div class="control-group">
            <button id="add-node">Add Node</button>
            <button id="add-edge">Add Edge (select 2 nodes)</button>
            <button id="clear">Clear Graph</button>
            <button id="random-graph">Generate Random Graph</button>
        </div>
        
        <div class="control-group">
            <label>Nodes: <input type="number" id="node-count" min="3" max="15" value="5"></label>
            <label>Edge Density: <input type="range" id="density" min="0" max="100" value="50"></label>
        </div>
        
        <div class="control-group">
            <button id="start-kruskal">Start Kruskal's Algorithm</button>
            <button id="next-step">Next Step</button>
            <button id="reset-algo">Reset Algorithm</button>
            <label>Speed: <input type="range" id="speed" min="100" max="2000" value="500"></label>
        </div>
        
        <div class="control-group">
            <label>Edge Weight Range: 
                <input type="number" id="min-weight" min="1" max="100" value="1"> to 
                <input type="number" id="max-weight" min="1" max="100" value="10">
            </label>
        </div>
    </div>
    
    <div id="graph-container"></div>
    
    <div class="control-group">
        <h3>Edge List (sorted by weight)</h3>
        <table id="edge-list">
            <thead>
                <tr>
                    <th>Edge</th>
                    <th>Weight</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    
    <div class="control-group">
        <h3>Disjoint Set Status</h3>
        <table id="set-status">
            <thead>
                <tr>
                    <th>Node</th>
                    <th>Parent</th>
                    <th>Rank</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    
    <div id="status">Ready</div>
    
    <script>
        // Graph state
        let nodes = [];
        let edges = [];
        let selectedNodes = [];
        let nextNodeId = 1;
        let nextEdgeId = 1;
        
        // Algorithm state
        let sortedEdges = [];
        let mstEdges = [];
        let disjointSet = {};
        let currentStep = 0;
        let autoStepInterval = null;
        
        // DOM elements
        const graphContainer = document.getElementById('graph-container');
        const addNodeBtn = document.getElementById('add-node');
        const addEdgeBtn = document.getElementById('add-edge');
        const clearBtn = document.getElementById('clear');
        const randomGraphBtn = document.getElementById('random-graph');
        const startKruskalBtn = document.getElementById('start-kruskal');
        const nextStepBtn = document.getElementById('next-step');
        const resetAlgoBtn = document.getElementById('reset-algo');
        const nodeCountInput = document.getElementById('node-count');
        const densityInput = document.getElementById('density');
        const speedInput = document.getElementById('speed');
        const minWeightInput = document.getElementById('min-weight');
        const maxWeightInput = document.getElementById('max-weight');
        const edgeListTbody = document.querySelector('#edge-list tbody');
        const setStatusTbody = document.querySelector('#set-status tbody');
        const statusDiv = document.getElementById('status');
        
        // Initialize
        initEventListeners();
        
        function initEventListeners() {
            addNodeBtn.addEventListener('click', addRandomNode);
            addEdgeBtn.addEventListener('click', startEdgeCreation);
            clearBtn.addEventListener('click', clearGraph);
            randomGraphBtn.addEventListener('click', generateRandomGraph);
            startKruskalBtn.addEventListener('click', startKruskal);
            nextStepBtn.addEventListener('click', performNextStep);
            resetAlgoBtn.addEventListener('click', resetAlgorithm);
            
            graphContainer.addEventListener('click', handleGraphClick);
        }
        
        function addRandomNode() {
            const x = nextNodeId * 50 % 550 + 25;
            const y = Math.floor(nextNodeId / 10) * 50 + 25;
            addNode(x, y);
        }
        
        function addNode(x, y) {
            const node = {
                id: nextNodeId++,
                x: x,
                y: y
            };
            nodes.push(node);
            renderNode(node);
            resetAlgorithm();
        }
        
        function renderNode(node) {
            const nodeElement = document.createElement('div');
            nodeElement.className = 'node';
            nodeElement.id = `node-${node.id}`;
            nodeElement.textContent = node.id;
            nodeElement.style.left = `${node.x - 15}px`;
            nodeElement.style.top = `${node.y - 15}px`;
            
            nodeElement.addEventListener('click', (e) => {
                e.stopPropagation();
                handleNodeClick(node.id);
            });
            
            graphContainer.appendChild(nodeElement);
        }
            
            function handleNodeClick(nodeId) {
                if (document.getElementById('add-edge').classList.contains('active')) {
                    // Edge creation mode
                    const nodeElement = document.getElementById(`node-${nodeId}`);
                    
                    if (selectedNodes.includes(nodeId)) {
                        // Deselect
                        selectedNodes = selectedNodes.filter(id => id !== nodeId);
                        nodeElement.classList.remove('selected');
                    } else {
                        // Select
                        if (selectedNodes.length < 2) {
                            selectedNodes.push(nodeId);
                            nodeElement.classList.add('selected');
                        }
                        
                        if (selectedNodes.length === 2) {
                            // Create edge
                            const weight = Math.floor(Math.random() * (maxWeightInput.value - minWeightInput.value + 1)) + parseInt(minWeightInput.value);
                            addEdge(selectedNodes[0], selectedNodes[1], weight);
                            
                            // Reset selection
                            selectedNodes.forEach(id => {
                                document.getElementById(`node-${id}`).classList.remove('selected');
                            });
                            selectedNodes = [];
                            document.getElementById('add-edge').classList.remove('active');
                        }
                    }
                }
            }
            
            function startEdgeCreation() {
                if (nodes.length < 2) {
                    alert('Need at least 2 nodes to create an edge');
                    return;
                }
                
                document.getElementById('add-edge').classList.add('active');
                statusDiv.textContent = 'Select two nodes to connect';
            }
            
            function addEdge(node1Id, node2Id, weight) {
                // Check if edge already exists
                const existingEdge = edges.find(edge => 
                    (edge.node1 === node1Id && edge.node2 === node2Id) || 
                    (edge.node1 === node2Id && edge.node2 === node1Id));
                
                if (existingEdge) {
                    alert('Edge already exists between these nodes');
                    return;
                }
                
                const node1 = nodes.find(n => n.id === node1Id);
                const node2 = nodes.find(n => n.id === node2Id);
                
                const edge = {
                    id: nextEdgeId++,
                    node1: node1Id,
                    node2: node2Id,
                    weight: weight,
                    x1: node1.x,
                    y1: node1.y,
                    x2: node2.x,
                    y2: node2.y
                };
                
                edges.push(edge);
                renderEdge(edge);
                resetAlgorithm();
            }
            
            function renderEdge(edge) {
                const edge line
                const edgeElement = document.createElement('div');
                edgeElement.className = 'edge';
                edgeElement.id = `edge-${edge.id}`;
                
                // Calculate position and angle
                const dx = edge.x2 - edge.x1;
                const dy = edge.y2 - edge.y1;
                const length = Math.sqrt(dx * dx + dy * dy);
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                
                edgeElement.style.width = `${length}px`;
                edgeElement.style.left = `${edge.x1}px`;
                edgeElement.style.top = `${edge.y1}px`;
                edgeElement.style.transform = `rotate(${angle}deg)`;
                
                // edge weight label
                const weightElement = document.createElement('div');
                weightElement.className = 'edge-weight';
                weightElement.textContent = edge.weight;
                weightElement.style.left = `${edge.x1 + dx/2 - 10}px`;
                weightElement.style.top = `${edge.y1 + dy/2 - 10}px`;
                weightElement.id = `edge-weight-${edge.id}`;
                
                graphContainer.appendChild(edgeElement);
                graphContainer.appendChild(weightElement);
            }
            
            function handleGraphClick(e) {
                if (e.target === graphContainer && document.getElementById('add-edge').classList.contains('active')) {
                    // Clicked on empty space while in edge creation mode
                    selectedNodes.forEach(id => {
                        document.getElementById(`node-${id}`).classList.remove('selected');
                    });
                    selectedNodes = [];
                    document.getElementById('add-edge').classList.remove('active');
                    statusDiv.textContent = 'Ready';
                }
            }
            
            function clearGraph() {
                nodes = [];
                edges = [];
                selectedNodes = [];
                nextNodeId = 1;
                nextEdgeId = 1;
                graphContainer.innerHTML = '';
                edgeListTbody.innerHTML = '';
                setStatusTbody.innerHTML = '';
                resetAlgorithm();
                statusDiv.textContent = 'Graph cleared';
            }
            
            function generateRandomGraph() {
                clearGraph();
                
                const nodeCount = parseInt(nodeCountInput.value);
                const density = parseInt(densityInput.value) / 100;
                const minWeight = parseInt(minWeightInput.value);
                const maxWeight = parseInt(maxWeightInput.value);
                
                // Add nodes in a circle
                const centerX = 300;
                const centerY = 200;
                const radius = 150;
                
                for (let i = 0; i < nodeCount; i++) {
                    const angle = (i * 2 * Math.PI / nodeCount) - Math.PI/2;
                    const x = centerX + radius * Math.cos(angle);
                    const y = centerY + radius * Math.sin(angle);
                    addNode(x, y);
                }
                
                // Add edges
                const maxEdges = nodeCount * (nodeCount - 1) / 2;
                const targetEdges = Math.floor(maxEdges * density);
                
                // Ensure the graph is connected
                for (let i = 1; i < nodeCount; i++) {
                    const weight = Math.floor(Math.random() * (maxWeight - minWeight + 1)) + minWeight;
                    addEdge(i, i + 1, weight);
                }
                
                // Add remaining edges randomly
                let addedEdges = nodeCount - 1;
                while (addedEdges < targetEdges) {
                    const node1 = Math.floor(Math.random() * nodeCount) + 1;
                    let node2 = Math.floor(Math.random() * nodeCount) + 1;
                    
                    if (node1 !== node2) {
                        const edgeExists = edges.some(edge => 
                            (edge.node1 === node1 && edge.node2 === node2) || 
                            (edge.node1 === node2 && edge.node2 === node1));
                        
                        if (!edgeExists) {
                            const weight = Math.floor(Math.random() * (maxWeight - minWeight + 1)) + minWeight;
                            addEdge(node1, node2, weight);
                            addedEdges++;
                        }
                    }
                }
                
                statusDiv.textContent = `Random graph generated with ${nodeCount} nodes and ${edges.length} edges`;
            }
            
            function startKruskal() {
                if (edges.length === 0) {
                    alert('Graph has no edges');
                    return;
                }
                
                // Initialize disjoint set
                disjointSet = {};
                nodes.forEach(node => {
                    disjointSet[node.id] = {
                        parent: node.id,
                        rank: 0
                    };
                });
                
                // Sort edges by weight
                sortedEdges = [...edges].sort((a, b) => a.weight - b.weight);
                mstEdges = [];
                currentStep = 0;
                
                // Update UI
                updateEdgeList();
                updateSetStatus();
                statusDiv.textContent = 'Starting Kruskal\'s algorithm';
                
                // Enable next step button
                nextStepBtn.disabled = false;
                
                // Start auto-stepping
                if (autoStepInterval) clearInterval(autoStepInterval);
                autoStepInterval = setInterval(performNextStep, speedInput.value);
            }
            
            function performNextStep() {
                if (currentStep >= sortedEdges.length) {
                    clearInterval(autoStepInterval);
                    autoStepInterval = null;
                    statusDiv.textContent = 'Algorithm complete - MST found';
                    return;
                }
                
                const edge = sortedEdges[currentStep];
                const root1 = find(edge.node1);
                const root2 = find(edge.node2);
                
                // Highlight current edge
                edges.forEach(e => {
                    document.getElementById(`edge-${e.id}`).classList.remove('selected');
                });
                document.getElementById(`edge-${edge.id}`).classList.add('selected');
                
                if (root1 !== root2) {
                    // Add to MST
                    union(root1, root2);
                    mstEdges.push(edge);
                    document.getElementById(`edge-${edge.id}`).classList.add('in-mst');
                    statusDiv.textContent = `Adding edge ${edge.node1}-${edge.node2} (weight ${edge.weight}) to MST`;
                } else {
                    statusDiv.textContent = `Skipping edge ${edge.node1}-${edge.node2} - would create cycle`;
                }
                
                currentStep++;
                updateEdgeList();
                updateSetStatus();
                
                if (currentStep >= sortedEdges.length) {
                    clearInterval(autoStepInterval);
                    autoStepInterval = null;
                    statusDiv.textContent = 'Algorithm complete - MST found';
                }
            }
            
            function find(nodeId) {
                if (disjointSet[nodeId].parent !== nodeId) {
                    disjointSet[nodeId].parent = find(disjointSet[nodeId].parent);
                }
                return disjointSet[nodeId].parent;
            }
            
            function union(root1, root2) {
                if (disjointSet[root1].rank > disjointSet[root2].rank) {
                    disjointSet[root2].parent = root1;
                } else if (disjointSet[root1].rank < disjointSet[root2].rank) {
                    disjointSet[root1].parent = root2;
                } else {
                    disjointSet[root2].parent = root1;
                    disjointSet[root1].rank++;
                }
            }
            
            function updateEdgeList() {
                edgeListTbody.innerHTML = '';
                
                sortedEdges.forEach((edge, index) => {
                    const row = document.createElement('tr');
                    if (index < currentStep) {
                        if (mstEdges.includes(edge)) {
                            row.style.backgroundColor = '#eee';
                        }
                    }
                    
                    const edgeCell = document.createElement('td');
                    edgeCell.textContent = `${edge.node1}-${edge.node2}`;
                    
                    const weightCell = document.createElement('td');
                    weightCell.textContent = edge.weight;
                    
                    const actionCell = document.createElement('td');
                    if (index < currentStep) {
                        if (mstEdges.includes(edge)) {
                            actionCell.textContent = 'Added to MST';
                        } else {
                            actionCell.textContent = 'Skipped (cycle)';
                        }
                    } else if (index === currentStep) {
                        actionCell.textContent = 'Processing...';
                        row.style.fontWeight = 'bold';
                    } else {
                        actionCell.textContent = 'Pending';
                    }
                    
                    row.appendChild(edgeCell);
                    row.appendChild(weightCell);
                    row.appendChild(actionCell);
                    edgeListTbody.appendChild(row);
                });
            }
            
            function updateSetStatus() {
                setStatusTbody.innerHTML = '';
                
                nodes.forEach(node => {
                    const row = document.createElement('tr');
                    
                    const nodeCell = document.createElement('td');
                    nodeCell.textContent = node.id;
                    
                    const parentCell = document.createElement('td');
                    parentCell.textContent = disjointSet[node.id].parent;
                    
                    const rankCell = document.createElement('td');
                    rankCell.textContent = disjointSet[node.id].rank;
                    
                    row.appendChild(nodeCell);
                    row.appendChild(parentCell);
                    row.appendChild(rankCell);
                    setStatusTbody.appendChild(row);
                });
            }
            
            function resetAlgorithm() {
                if (autoStepInterval) {
                    clearInterval(autoStepInterval);
                    autoStepInterval = null;
                }
                
                sortedEdges = [];
                mstEdges = [];
                disjointSet = {};
                currentStep = 0;
                
                // Reset edge visuals
                edges.forEach(edge => {
                    document.getElementById(`edge-${edge.id}`).classList.remove('selected', 'in-mst');
                });
                
                edgeListTbody.innerHTML = '';
                setStatusTbody.innerHTML = '';
                statusDiv.textContent = 'Algorithm reset';
            }
            
            // Speed control
            speedInput.addEventListener('input', () => {
                if (autoStepInterval) {
                    clearInterval(autoStepInterval);
                    autoStepInterval = setInterval(performNextStep, speedInput.value);
                }
            });
    </script>
</body>
</html>
