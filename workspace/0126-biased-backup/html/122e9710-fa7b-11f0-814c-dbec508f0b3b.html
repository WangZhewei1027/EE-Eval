<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signatures</title>
    <style>
        body {
            font-family: monospace;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        #digital-signature-container {
            width: 800px;
            height: 600px;
            border: 1px solid #ccc;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #3e8e41;
        }
        .button-container button {
            margin: 5px;
        }
        .input-field {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #fff;
            color: #4CAF50;
            cursor: pointer;
        }
        .input-field input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #fff;
            color: #4CAF50;
            cursor: pointer;
        }
        .input-field input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #fff;
            color: #4CAF50;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="digital-signature-container">
        <button class="button" onclick="generateSignature()">Generate Signature</button>
        <div id="button-container"></div>
        <div id="input-field-container"></div>
    </div>

    <script>
        let signature = '';
        let inputFields = [];

        function generateSignature() {
            const button = document.querySelector('.button');
            button.classList.remove('disabled');
            button.classList.add('active');

            const inputFieldsContainer = document.getElementById('input-field-container');
            inputFieldsContainer.innerHTML = '';

            const passwordField = document.createElement('input');
            passwordField.type = 'password';
            passwordField.id = 'password-field';
            passwordField.className = 'input-field input-field-password';
            inputFieldsContainer.appendChild(passwordField);

            const textField = document.createElement('input');
            textField.type = 'text';
            textField.id = 'text-field';
            textField.className = 'input-field input-field-text';
            inputFieldsContainer.appendChild(textField);

            const generateButton = document.createElement('button');
            generateButton.textContent = 'Generate Signature';
            generateButton.className = 'button';
            generateButton.onclick = function() {
                const password = passwordField.value;
                const text = textField.value;
                signature = crypto.createSign('SHA256');
                signature.update(password);
                signature.update(text);
                generateSignature();
            };
            inputFieldsContainer.appendChild(generateButton);

            button.classList.remove('active');
            button.classList.add('disabled');
        }

        function sign() {
            const password = document.getElementById('password-field').value;
            const text = document.getElementById('text-field').value;
            const signatureBuffer = signature.sign(password, 'SHA256');
            const signatureHex = signatureBuffer.toString('hex');
            const signatureBase64 = signatureBuffer.toString('base64');
            document.getElementById('input-field-container').innerHTML = `
                <p>Generated Signature (Hex): ${signatureHex}</p>
                <p>Generated Signature (Base64): ${signatureBase64}</p>
            `;
        }
    </script>
</body>
</html>
