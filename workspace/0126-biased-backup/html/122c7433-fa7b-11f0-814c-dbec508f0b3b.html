<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big-Omega Notation</title>
    <style>
        body {
            font-family: monospace;
            background-color: white;
        }
        .control {
            padding: 10px;
            border: 1px solid black;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .slider {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
        }
        .input-field {
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Big-Omega Notation</h1>
    <div class="control">
        <h2>MAXIMUM</h2>
        <button class="button" onclick="showControls()">Show Controls</button>
    </div>
    <div id="controls" style="display: none;">
        <h2>Controls</h2>
        <div class="control">
            <h3>Button</h3>
            <button id="button">Button</button>
            <p>Button text</p>
        </div>
        <div class="control">
            <h3>Slider</h3>
            <input type="range" id="slider" min="0" max="100" value="50">
            <p>Slider value</p>
        </div>
        <div class="control">
            <h3>Input Field</h3>
            <input type="text" id="input-field" placeholder="Enter text">
            <p>Input field text</p>
        </div>
        <div class="control">
            <h3>Toggle</h3>
            <button onclick="toggleToggle()">Toggle</button>
        </div>
    </div>

    <script>
        let controls = document.getElementById('controls');
        let button = document.getElementById('button');
        let slider = document.getElementById('slider');
        let inputField = document.getElementById('input-field');
        let toggleButton = document.getElementById('toggleButton');
        let max = 100;
        let current = 50;

        function showControls() {
            controls.style.display = 'block';
        }

        function toggleToggle() {
            max = Math.min(max + 10, 100);
            current = Math.max(current - 10, 0);
            document.getElementById('slider').value = max;
            document.getElementById('input-field').value = current;
            document.getElementById('toggleButton').textContent = 'Toggle';
            document.getElementById('toggleButton').style.backgroundColor = 'red';
        }

        function updateControls() {
            let buttonText = document.getElementById('button').textContent;
            button.textContent = buttonText;
            button.style.backgroundColor = buttonText === 'Button' ? 'green' : 'red';
        }

        function updateSlider() {
            let value = document.getElementById('slider').value;
            document.getElementById('input-field').value = value;
            document.getElementById('input-field').textContent = value;
        }

        function updateInputField() {
            let text = document.getElementById('input-field').value;
            document.getElementById('input-field').textContent = text;
        }

        function updateToggle() {
            let button = document.getElementById('toggleButton');
            button.textContent = button.textContent === 'Toggle' ? 'Toggle' : 'Button';
            button.style.backgroundColor = button.textContent === 'Toggle' ? 'green' : 'red';
        }

        function updateMax() {
            let max = Math.min(max + 10, 100);
            document.getElementById('slider').value = max;
            document.getElementById('input-field').value = current;
            document.getElementById('input-field').textContent = current;
        }

        button.addEventListener('click', updateControls);
        slider.addEventListener('input', updateSlider);
        inputField.addEventListener('input', updateInputField);
        toggleButton.addEventListener('click', updateToggle);
        updateMax();
        updateControls();
    </script>
</body>
</html>
