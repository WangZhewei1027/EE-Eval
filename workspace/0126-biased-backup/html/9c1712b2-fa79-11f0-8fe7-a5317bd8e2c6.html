<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Symmetric Cryptography Interactive Playground</title>
<style>
/* Extremely minimal styling - plain black text on white background */
body { font-family: Arial, sans-serif; color: #000; background: #fff; margin: 12px; }
section { margin-bottom: 18px; padding: 6px; border: 1px solid #000; }
label { display: block; margin-top: 8px; }
input[type="text"], input[type="number"], textarea, select { width: 100%; box-sizing: border-box; margin-top: 4px; }
textarea { height: 90px; }
button { margin-top: 6px; display: inline-block; }
.small { width: auto; display: inline-block; }
.log { height: 160px; overflow: auto; white-space: pre-wrap; background: #fff; border: 1px solid #000; padding: 6px; }
.inline { display: inline-block; vertical-align: top; margin-right: 8px; }
fieldset { margin-top: 8px; padding: 6px; }
</style>
</head>
<body>
<h1>Symmetric Cryptography Interactive Playground</h1>

<section id="stateSection">
  <strong>State</strong>
  <div id="stateDisplay">idle</div>
  <div>
    <button id="resetBtn">Reset All</button>
    <button id="clearLogBtn">Clear Log</button>
  </div>
</section>

<section>
  <strong>Algorithm & Key Management</strong>
  <label>Algorithm:
    <select id="algoSelect">
      <option value="AES">AES</option>
      <option value="XOR">XOR (educational)</option>
      <option value="AES-GCM">AES-GCM (explicit)</option>
      <option value="AES-CBC">AES-CBC (explicit)</option>
      <option value="AES-CTR">AES-CTR</option>
    </select>
  </label>

  <label id="modeLabel">AES Key Size (bits):
    <input id="keySize" type="range" min="128" max="256" step="64" value="256">
    <span id="keySizeVal">256</span>
  </label>

  <label>Key input (text or hex). Prefix hex with 0x or enter base64 and click Import:
    <input id="keyInput" type="text" placeholder="raw text, 0x...hex, or base64">
  </label>

  <div>
    <button id="importKeyBtn">Import Key</button>
    <button id="genKeyBtn">Generate Random Key</button>
    <button id="exportKeyBtn">Export Key (hex)</button>
    <button id="showKeyBtn">Show Key Representations</button>
  </div>

  <fieldset>
    <legend>Derive from password (PBKDF2)</legend>
    <label>Password:
      <input id="pwInput" type="text" placeholder="password">
    </label>
    <label>Salt (hex or text):
      <input id="saltInput" type="text" placeholder="salt">
    </label>
    <label>Iterations:
      <input id="pwIters" type="number" min="1" value="100000">
    </label>
    <label>Hash:
      <select id="pwHash">
        <option>SHA-256</option>
        <option>SHA-1</option>
        <option>SHA-384</option>
      </select>
    </label>
    <button id="deriveBtn">Derive Key</button>
  </fieldset>

  <div id="keyInfo" style="margin-top:8px;"></div>
</section>

<section>
  <strong>IV / Nonce / Counter Controls</strong>
  <label>
    Auto-generate IV/nonce on encrypt:
    <input id="autoIv" type="checkbox" checked>
  </label>

  <label>
    IV / Nonce (hex). If empty and auto-generate is ON, a random IV will be used.
    <input id="ivInput" type="text" placeholder="hex iv (e.g. 0x...)">
  </label>

  <label>
    IV length (bytes) (applies for auto-generation):
    <input id="ivLen" type="number" min="1" value="12">
  </label>

  <div>
    <button id="genIvBtn">Generate IV Now</button>
    <button id="mutateIvBtn">Flip bit in IV</button>
  </div>
  <div id="ivInfo"></div>
</section>

<section>
  <strong>Encryption / Decryption</strong>

  <label>Plaintext input (text):
    <textarea id="plaintext">Hello world</textarea>
  </label>

  <label>Input encoding for export:
    <select id="plainEncoding">
      <option value="utf8">UTF-8 text</option>
      <option value="hex">Hex</option>
      <option value="base64">Base64</option>
    </select>
  </label>

  <label>Ciphertext output encoding:
    <select id="ctEncoding">
      <option value="base64">Base64</option>
      <option value="hex">Hex</option>
      <option value="utf8">UTF-8 (may be binary)</option>
    </select>
  </label>

  <div>
    <button id="encryptBtn">Encrypt</button>
    <button id="decryptBtn">Decrypt</button>
    <button id="tamperBtn">Flip bit in ciphertext</button>
    <button id="showCtBtn">Show Stored Ciphertext</button>
    <button id="downloadBtn">Download Ciphertext as file</button>
  </div>

  <label>Ciphertext area (editable). You can paste ciphertext here to decrypt:
    <textarea id="ciphertext"></textarea>
  </label>

  <div id="decryptResult"></div>
</section>

<section>
  <strong>Advanced / Exploration</strong>

  <fieldset>
    <legend>Brute-forcing (demonstration only) - works for XOR small key sizes</legend>
    <label>Target ciphertext (hex or base64 or paste above):
      <input id="bfInput" type="text" placeholder="ciphertext to try decrypting">
    </label>
    <label>Key size to brute-force (bytes):
      <input id="bfKeySize" type="number" min="1" max="4" value="1">
    </label>
    <label>Max attempts limit:
      <input id="bfLimit" type="number" min="1" value="10000">
    </label>
    <label>Filter for readable plaintext (ASCII printable):
      <input id="bfFilter" type="checkbox" checked>
    </label>
    <div>
      <button id="bfStart">Start Brute-force</button>
      <button id="bfStop">Stop</button>
    </div>
    <div id="bfResults"></div>
  </fieldset>

  <fieldset>
    <legend>Benchmarking</legend>
    <label>Iterations:
      <input id="benchIters" type="number" min="1" value="100">
    </label>
    <label>Data size per op (bytes):
      <input id="benchSize" type="number" min="1" value="1024">
    </label>
    <div>
      <button id="benchBtn">Run Benchmark (encrypt)</button>
    </div>
    <div id="benchResult"></div>
  </fieldset>

  <fieldset>
    <legend>Logs and detailed trace</legend>
    <div class="log" id="log"></div>
    <div>
      <button id="dumpStateBtn">Dump Internal State</button>
    </div>
  </fieldset>
</section>

<script>
/*
  Symmetric Cryptography Interactive Playground
  - Uses WebCrypto for AES operations
  - Provides XOR implementation for educational brute-force demos
  - Supports key import/export, PBKDF2 derivation
  - Numerous interactive controls and state transitions
*/

(function(){
  // Utility conversions
  function str2ab(str) {
    return new TextEncoder().encode(str).buffer;
  }
  function ab2str(ab) {
    try { return new TextDecoder().decode(ab); }
    catch(e) { return ''; }
  }
  function ab2hex(buf) {
    const a = new Uint8Array(buf);
    return Array.from(a).map(b => ('0'+b.toString(16)).slice(-2)).join('');
  }
  function hex2ab(hex) {
    if (hex.startsWith('0x')) hex = hex.slice(2);
    if (hex.length % 2) hex = '0' + hex;
    const len = hex.length/2;
    const out = new Uint8Array(len);
    for (let i=0;i<len;i++) out[i]=parseInt(hex.substr(i*2,2),16);
    return out.buffer;
  }
  function ab2b64(buf) {
    let binary = '';
    const bytes = new Uint8Array(buf);
    for (let i=0;i<bytes.length;i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
  }
  function b642ab(b64) {
    try {
      const bin = atob(b64);
      const out = new Uint8Array(bin.length);
      for (let i=0;i<bin.length;i++) out[i]=bin.charCodeAt(i);
      return out.buffer;
    } catch(e) { return null; }
  }
  function tryParseInputAsArrayBuffer(input) {
    input = input.trim();
    if (!input) return null;
    // try hex
    if (/^(0x)?[0-9a-fA-F\s]+$/.test(input.replace(/\s+/g,''))) {
      try { return hex2ab(input.replace(/\s+/g,'')); } catch(e){}
    }
    // try base64
    try {
      const a = b642ab(input);
      if (a) return a;
    } catch(e){}
    // fallback to utf8 string
    return str2ab(input);
  }

  // DOM
  const stateDisplay = document.getElementById('stateDisplay');
  const resetBtn = document.getElementById('resetBtn');
  const clearLogBtn = document.getElementById('clearLogBtn');

  const algoSelect = document.getElementById('algoSelect');
  const keySize = document.getElementById('keySize');
  const keySizeVal = document.getElementById('keySizeVal');
  const keyInput = document.getElementById('keyInput');
  const importKeyBtn = document.getElementById('importKeyBtn');
  const genKeyBtn = document.getElementById('genKeyBtn');
  const exportKeyBtn = document.getElementById('exportKeyBtn');
  const showKeyBtn = document.getElementById('showKeyBtn');
  const keyInfo = document.getElementById('keyInfo');

  const deriveBtn = document.getElementById('deriveBtn');
  const pwInput = document.getElementById('pwInput');
  const saltInput = document.getElementById('saltInput');
  const pwIters = document.getElementById('pwIters');
  const pwHash = document.getElementById('pwHash');

  const autoIv = document.getElementById('autoIv');
  const ivInput = document.getElementById('ivInput');
  const genIvBtn = document.getElementById('genIvBtn');
  const ivLen = document.getElementById('ivLen');
  const ivInfo = document.getElementById('ivInfo');
  const mutateIvBtn = document.getElementById('mutateIvBtn');

  const plaintext = document.getElementById('plaintext');
  const plainEncoding = document.getElementById('plainEncoding');
  const ctEncoding = document.getElementById('ctEncoding');
  const encryptBtn = document.getElementById('encryptBtn');
  const decryptBtn = document.getElementById('decryptBtn');
  const tamperBtn = document.getElementById('tamperBtn');
  const showCtBtn = document.getElementById('showCtBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const ciphertextArea = document.getElementById('ciphertext');
  const decryptResult = document.getElementById('decryptResult');

  const bfStart = document.getElementById('bfStart');
  const bfStop = document.getElementById('bfStop');
  const bfInput = document.getElementById('bfInput');
  const bfKeySize = document.getElementById('bfKeySize');
  const bfLimit = document.getElementById('bfLimit');
  const bfFilter = document.getElementById('bfFilter');
  const bfResults = document.getElementById('bfResults');

  const benchBtn = document.getElementById('benchBtn');
  const benchIters = document.getElementById('benchIters');
  const benchSize = document.getElementById('benchSize');
  const benchResult = document.getElementById('benchResult');

  const logBox = document.getElementById('log');
  const dumpStateBtn = document.getElementById('dumpStateBtn');

  // Internal state
  const app = {
    phase: 'idle',
    key: null,               // CryptoKey for AES or Uint8Array for XOR
    keyRaw: null,            // ArrayBuffer of raw key bytes
    algo: 'AES',
    iv: null,                // ArrayBuffer
    ciphertext: null,        // ArrayBuffer
    lastPlain: null,         // ArrayBuffer
    lastCiphertextEncoding: 'base64',
    bruteForceRunning: false
  };

  function log(...args) {
    const s = args.map(a => (typeof a === 'string' ? a : JSON.stringify(a))).join(' ');
    const ts = (new Date()).toISOString();
    logBox.textContent = ts + '  ' + s + '\n' + logBox.textContent;
  }

  function setPhase(phase) {
    app.phase = phase;
    stateDisplay.textContent = phase;
    log('Phase ->', phase);
  }

  function updateKeySizeDisplay() {
    keySizeVal.textContent = keySize.value;
  }

  // Key helpers
  async function importKeyFromText(text) {
    const ab = tryParseInputAsArrayBuffer(text);
    if (!ab) throw new Error('Could not parse input as key bytes');
    app.keyRaw = ab.slice(0); // copy
    if (app.algo === 'XOR') {
      app.key = new Uint8Array(app.keyRaw);
      setPhase('keyImported');
    } else {
      // import as AES raw key
      const lenBits = (new Uint8Array(app.keyRaw)).length * 8;
      // accept if matches requested or derive/truncate
      const requested = parseInt(keySize.value,10);
      let raw = new Uint8Array(app.keyRaw);
      if (raw.length * 8 !== requested) {
        // truncate or pad with zeros
        const needed = requested/8;
        const out = new Uint8Array(needed);
        out.set(raw.subarray(0, needed));
        raw = out;
        app.keyRaw = raw.buffer;
      }
      app.key = await window.crypto.subtle.importKey('raw', app.keyRaw, {name:'AES-GCM'}, false, ['encrypt','decrypt']);
      setPhase('keyImported');
    }
    refreshKeyInfo();
    log('Imported key length bytes:', (new Uint8Array(app.keyRaw)).length);
  }

  async function generateRandomKey() {
    if (app.algo === 'XOR') {
      const size = Math.max(1, parseInt(prompt('How many bytes for XOR key?', '8') || '8',10));
      const arr = new Uint8Array(size);
      window.crypto.getRandomValues(arr);
      app.keyRaw = arr.buffer;
      app.key = arr;
      setPhase('keyGenerated');
      refreshKeyInfo();
      return;
    }
    const bits = parseInt(keySize.value,10);
    const key = await window.crypto.subtle.generateKey({name:'AES-GCM', length: bits}, true, ['encrypt','decrypt']);
    const exported = await window.crypto.subtle.exportKey('raw', key);
    app.keyRaw = exported;
    app.key = key;
    setPhase('keyGenerated');
    refreshKeyInfo();
    log('Generated AES key', bits, 'bits');
  }

  async function exportKeyHex() {
    if (!app.keyRaw) { alert('No key available'); return; }
    const hex = ab2hex(app.keyRaw);
    prompt('Key hex (copy):', hex);
  }

  function refreshKeyInfo() {
    if (!app.keyRaw) { keyInfo.textContent = 'No key loaded'; return; }
    const hex = ab2hex(app.keyRaw);
    const b64 = ab2b64(app.keyRaw);
    const len = (new Uint8Array(app.keyRaw)).length;
    keyInfo.textContent = 'Key: ' + len + ' bytes. Hex preview: ' + hex.slice(0,64) + (hex.length>64? '...':'') + '  Base64 preview: ' + b64.slice(0,64);
    ivInfo.textContent = app.iv ? ('IV: ' + ab2hex(app.iv).slice(0,64)) : 'IV: <none>';
  }

  // IV helpers
  function generateIv(lenBytes) {
    const arr = new Uint8Array(lenBytes);
    window.crypto.getRandomValues(arr);
    app.iv = arr.buffer;
    ivInput.value = '0x' + ab2hex(app.iv);
    ivInfo.textContent = 'IV: 0x' + ab2hex(app.iv);
    setPhase('ivGenerated');
    log('IV generated length', lenBytes);
  }

  function parseIvInput() {
    const v = ivInput.value.trim();
    if (!v) return null;
    try {
      const ab = tryParseInputAsArrayBuffer(v);
      return ab;
    } catch(e) { return null; }
  }

  function mutateIv() {
    if (!app.iv) {
      alert('No IV to mutate. Generate one first.');
      return;
    }
    const u = new Uint8Array(app.iv.slice(0));
    u[0] = u[0] ^ 1;
    app.iv = u.buffer;
    ivInput.value = '0x' + ab2hex(app.iv);
    ivInfo.textContent = 'IV: 0x' + ab2hex(app.iv);
    setPhase('ivMutated');
    log('IV mutated (flipped bit 0)');
  }

  // AES encrypt/decrypt wrappers
  async function importKeyForAes(raw) {
    const key = await window.crypto.subtle.importKey('raw', raw, {name:'AES-GCM'}, false, ['encrypt','decrypt']);
    return key;
  }

  function pkcs7Pad(buf) {
    const block = 16;
    const u = new Uint8Array(buf);
    const padLen = block - (u.length % block) || block;
    const out = new Uint8Array(u.length + padLen);
    out.set(u,0);
    out.fill(padLen, u.length);
    return out.buffer;
  }
  function pkcs7Unpad(buf) {
    const u = new Uint8Array(buf);
    if (u.length === 0) throw new Error('Invalid padding');
    const pad = u[u.length-1];
    if (pad <= 0 || pad > 16) throw new Error('Invalid padding value');
    for (let i=1;i<=pad;i++) if (u[u.length-i] !== pad) throw new Error('Invalid padding bytes');
    return u.subarray(0, u.length - pad).buffer;
  }

  async function encryptOperation() {
    // prepare input
    const plainMode = plainEncoding.value;
    let plainAB;
    if (plainMode === 'utf8') plainAB = str2ab(plaintext.value);
    else if (plainMode === 'hex') plainAB = hex2ab(plaintext.value);
    else if (plainMode === 'base64') plainAB = b642ab(plaintext.value);

    app.lastPlain = plainAB;

    // ensure key exists
    if (!app.key) { alert('No key. Generate or import one.'); return; }
    app.algo = algoSelect.value;

    // prepare IV
    let ivToUse = null;
    if (autoIv.checked || !ivInput.value.trim()) {
      const len = Math.max(1, parseInt(ivLen.value,10) || 12);
      ivToUse = new Uint8Array(len);
      window.crypto.getRandomValues(ivToUse);
      app.iv = ivToUse.buffer;
    } else {
      const parsed = parseIvInput();
      if (!parsed) { alert('Invalid IV input'); return; }
      app.iv = parsed;
    }

    // perform encrypt based on algorithm
    if (app.algo === 'XOR') {
      // XOR: repeat key bytes
      if (!(app.key instanceof Uint8Array)) { alert('XOR key is not loaded'); return; }
      const keyBytes = app.key;
      const data = new Uint8Array(plainAB);
      const out = new Uint8Array(data.length);
      for (let i=0;i<data.length;i++) out[i] = data[i] ^ keyBytes[i % keyBytes.length];
      app.ciphertext = out.buffer;
      app.lastCiphertextEncoding = ctEncoding.value;
      const displayed = encodeOutput(app.ciphertext, ctEncoding.value);
      ciphertextArea.value = displayed;
      setPhase('encrypted');
      log('XOR encryption done. ciphertext length', out.length);
      return;
    }

    // AES modes - use WebCrypto
    const algorithmMode = algoSelect.value === 'AES' ? 'AES-GCM' : algoSelect.value;
    const key = app.key;
    let algoParams;
    if (algorithmMode === 'AES-GCM') {
      algoParams = { name: 'AES-GCM', iv: new Uint8Array(app.iv) };
      try {
        const ct = await window.crypto.subtle.encrypt(algoParams, key, plainAB);
        app.ciphertext = ct;
        app.lastCiphertextEncoding = ctEncoding.value;
        ciphertextArea.value = encodeOutput(ct, ctEncoding.value);
        setPhase('encrypted');
        log('AES-GCM encrypt success, ciphertext bytes', (new Uint8Array(ct)).length);
      } catch(e) {
        log('Encrypt error', e.message);
        alert('Encryption failed: ' + e.message);
      }
      return;
    } else if (algorithmMode === 'AES-CBC') {
      // pad then encrypt
      const padded = pkcs7Pad(plainAB);
      algoParams = { name: 'AES-CBC', iv: new Uint8Array(app.iv) };
      try {
        const ct = await window.crypto.subtle.encrypt(algoParams, key, padded);
        app.ciphertext = ct;
        app.lastCiphertextEncoding = ctEncoding.value;
        ciphertextArea.value = encodeOutput(ct, ctEncoding.value);
        setPhase('encrypted');
        log('AES-CBC encrypt success, ciphertext bytes', (new Uint8Array(ct)).length);
      } catch(e) { log('Encrypt CBC error', e.message); alert('Encryption failed: '+ e.message); }
      return;
    } else if (algorithmMode === 'AES-CTR') {
      // CTR needs counter 16 bytes
      const counter = new Uint8Array(16);
      const ivBytes = new Uint8Array(app.iv);
      counter.set(ivBytes.slice(0,16));
      algoParams = { name:'AES-CTR', counter: counter, length: 64 };
      try {
        const ct = await window.crypto.subtle.encrypt(algoParams, key, plainAB);
        app.ciphertext = ct;
        app.lastCiphertextEncoding = ctEncoding.value;
        ciphertextArea.value = encodeOutput(ct, ctEncoding.value);
        setPhase('encrypted');
        log('AES-CTR encrypt success');
      } catch(e) { log('Encrypt CTR error', e.message); alert('Encryption failed: '+ e.message); }
      return;
    } else {
      alert('Unsupported algorithm: ' + algorithmMode);
    }
  }

  async function decryptOperation() {
    // find ciphertext from area or stored
    let ctInput = ciphertextArea.value.trim();
    let ctAB = null;
    if (!ctInput && app.ciphertext) ctAB = app.ciphertext;
    else ctAB = tryParseInputAsArrayBuffer(ctInput);

    if (!ctAB) { alert('No ciphertext found to decrypt'); return; }
    if (!app.key) { alert('No key available'); return; }

    if (app.algo === 'XOR') {
      if (!(app.key instanceof Uint8Array)) { alert('XOR key is not a Uint8Array'); return; }
      const data = new Uint8Array(ctAB);
      const out = new Uint8Array(data.length);
      for (let i=0;i<data.length;i++) out[i] = data[i] ^ app.key[i % app.key.length];
      decryptResult.textContent = 'Decrypted (UTF-8):\n' + ab2str(out.buffer) + '\n\nHex:\n' + ab2hex(out.buffer);
      setPhase('decrypted');
      return;
    }

    const algorithmMode = algoSelect.value === 'AES' ? 'AES-GCM' : algoSelect.value;
    const key = app.key;

    // ensure iv parsed
    const ivParsed = parseIvInput();
    if (ivParsed) app.iv = ivParsed;
    if (!app.iv && algorithmMode !== 'AES-CTR') { alert('IV not set. For AES-GCM/CBC you must set IV or enable auto-generate before encrypt to store the IV.'); return; }

    try {
      if (algorithmMode === 'AES-GCM') {
        const params = { name:'AES-GCM', iv: new Uint8Array(app.iv) };
        const plain = await window.crypto.subtle.decrypt(params, key, ctAB);
        decryptResult.textContent = 'Decrypted (UTF-8):\n' + ab2str(plain);
        setPhase('decrypted');
        log('AES-GCM decrypt OK');
      } else if (algorithmMode === 'AES-CBC') {
        const params = { name:'AES-CBC', iv: new Uint8Array(app.iv) };
        const dec = await window.crypto.subtle.decrypt(params, key, ctAB);
        try {
          const unp = pkcs7Unpad(dec);
          decryptResult.textContent = 'Decrypted (UTF-8):\n' + ab2str(unp);
        } catch(e) {
          decryptResult.textContent = 'Decrypted but padding invalid or error: ' + e.message;
        }
        setPhase('decrypted');
        log('AES-CBC decrypt completed');
      } else if (algorithmMode === 'AES-CTR') {
        // CTR uses counter 16 bytes
        const counter = new Uint8Array(16);
        counter.set(new Uint8Array(app.iv).slice(0,16));
        const params = { name:'AES-CTR', counter: counter, length:64 };
        const dec = await window.crypto.subtle.decrypt(params, key, ctAB);
        decryptResult.textContent = 'Decrypted (UTF-8):\n' + ab2str(dec);
        setPhase('decrypted');
      } else {
        alert('Unsupported decrypt algorithm: ' + algorithmMode);
      }
    } catch(e) {
      log('Decrypt error', e.message);
      decryptResult.textContent = 'Decryption failed: ' + e.message;
      setPhase('decryptFailed');
    }
  }

  function encodeOutput(ab, encoding) {
    if (!ab) return '';
    if (encoding === 'hex') return ab2hex(ab);
    if (encoding === 'base64') return ab2b64(ab);
    if (encoding === 'utf8') return ab2str(ab);
    return ab2b64(ab);
  }

  function flipBitInCiphertext() {
    let ctAB = app.ciphertext;
    if (!ctAB) {
      const txt = ciphertextArea.value.trim();
      if (!txt) { alert('No ciphertext available to tamper'); return; }
      ctAB = tryParseInputAsArrayBuffer(txt);
    }
    const u = new Uint8Array(ctAB.slice(0));
    if (u.length === 0) { alert('Ciphertext empty'); return; }
    u[0] = u[0] ^ 1;
    app.ciphertext = u.buffer;
    ciphertextArea.value = encodeOutput(app.ciphertext, app.lastCiphertextEncoding || 'base64');
    setPhase('ciphertextTampered');
    log('Ciphertext bit flipped at byte 0');
  }

  // Brute force XOR small key
  let bfAbort = false;
  async function bruteForceXor() {
    bfResults.textContent = '';
    bfAbort = false;
    const ctText = bfInput.value.trim() || ciphertextArea.value.trim();
    if (!ctText) { alert('No ciphertext specified'); return; }
    const ctAB = tryParseInputAsArrayBuffer(ctText);
    if (!ctAB) { alert('Failed to parse ciphertext'); return; }
    const data = new Uint8Array(ctAB);
    const keySizeBytes = parseInt(bfKeySize.value,10) || 1;
    const limit = parseInt(bfLimit.value,10) || 10000;
    const filterPrintable = bfFilter.checked;
    const maxKeyspace = Math.pow(256, keySizeBytes);
    const attempts = Math.min(limit, maxKeyspace);
    setPhase('bruteforce_running');
    log('Starting brute-force XOR. Key bytes:', keySizeBytes, 'attempts:', attempts);
    let tries = 0, found = 0;
    // iterate lexicographically small to large; for keyspace > limit will iterate attempts only
    function keyFromIndex(i) {
      const out = new Uint8Array(keySizeBytes);
      for (let j=0;j<keySizeBytes;j++) {
        out[j] = (i >> (8*j)) & 0xff;
      }
      return out;
    }
    for (let i=0;i<attempts;i++) {
      if (bfAbort) { log('Brute-force aborted by user'); bfResults.textContent += '\nAborted\n'; break; }
      const key = keyFromIndex(i);
      // decrypt
      const dec = new Uint8Array(data.length);
      for (let k=0;k<data.length;k++) dec[k] = data[k] ^ key[k % key.length];
      const text = ab2str(dec.buffer);
      const isPrintable = /^[\x09\x0A\x0D\x20-\x7E]*$/.test(text);
      if (!filterPrintable || isPrintable) {
        found++;
        bfResults.textContent += 'KEY hex:' + ab2hex(key.buffer) + ' -> ' + text.slice(0,200) + '\n';
      }
      tries++;
      if (tries % 1000 === 0) {
        await new Promise(r => setTimeout(r,0));
      }
    }
    setPhase('bruteforce_done');
    log('Brute-force finished. tried', tries, 'found', found);
  }

  // Benchmark
  async function runBenchmark() {
    if (!app.key) { alert('Load or generate a key first'); return; }
    const iterations = parseInt(benchIters.value,10) || 1;
    const size = parseInt(benchSize.value,10) || 1024;
    const algo = (algoSelect.value === 'AES' ? 'AES-GCM' : algoSelect.value);
    const data = new Uint8Array(size);
    window.crypto.getRandomValues(data);
    const start = performance.now();
    for (let i=0;i<iterations;i++) {
      // use auto IV for each iteration
      const iv = new Uint8Array(Math.max(12, Math.min(16, parseInt(ivLen.value,10) || 12)));
      window.crypto.getRandomValues(iv);
      if (algo === 'AES-GCM') {
        await window.crypto.subtle.encrypt({name:'AES-GCM', iv:iv}, app.key, data);
      } else if (algo === 'AES-CBC') {
        const padded = pkcs7Pad(data.buffer);
        await window.crypto.subtle.encrypt({name:'AES-CBC', iv:iv}, app.key, padded);
      } else if (algo === 'AES-CTR') {
        const counter = new Uint8Array(16);
        counter.set(iv.slice(0,16));
        await window.crypto.subtle.encrypt({name:'AES-CTR', counter: counter, length: 64}, app.key, data);
      } else if (algoSelect.value === 'XOR') {
        // simple XOR speed
        const keyBytes = app.key;
        const out = new Uint8Array(data.length);
        for (let k=0;k<data.length;k++) out[k] = data[k] ^ keyBytes[k % keyBytes.length];
      }
    }
    const end = performance.now();
    const elapsed = end - start;
    benchResult.textContent = 'Elapsed: ' + elapsed.toFixed(2) + ' ms. Ops: ' + iterations + '. Ops/s: ' + ((iterations/(elapsed/1000))|0);
    log('Benchmark complete', benchResult.textContent);
  }

  // Event wiring
  keySize.addEventListener('input', updateKeySizeDisplay);
  updateKeySizeDisplay();

  algoSelect.addEventListener('change', ()=> {
    app.algo = algoSelect.value;
    log('Algorithm changed to', app.algo);
    // adjust features for XOR
    if (app.algo === 'XOR') {
      keySize.disabled = true;
      keySizeVal.textContent = 'variable';
    } else {
      keySize.disabled = false;
      keySizeVal.textContent = keySize.value;
    }
  });

  importKeyBtn.addEventListener('click', async ()=> {
    try {
      await importKeyFromText(keyInput.value || '');
    } catch(e) {
      alert('Import failed: ' + e.message);
      log('Import error', e.message);
    }
  });

  genKeyBtn.addEventListener('click', async ()=> {
    try { await generateRandomKey(); } catch(e){ alert('Generate key failed: '+e.message); log('genKey error', e.message); }
  });

  exportKeyBtn.addEventListener('click', exportKeyHex);
  showKeyBtn.addEventListener('click', refreshKeyInfo);

  deriveBtn.addEventListener('click', async ()=> {
    const pw = pwInput.value || '';
    if (!pw) { alert('Enter password'); return; }
    const saltAB = tryParseInputAsArrayBuffer(saltInput.value || '') || str2ab('salt');
    const iters = parseInt(pwIters.value,10) || 100000;
    const hash = pwHash.value;
    // derive raw key bytes of desired length
    const bits = (app.algo === 'XOR') ? 64 : parseInt(keySize.value,10);
    const lengthBytes = bits/8;
    try {
      const baseKey = await window.crypto.subtle.importKey('raw', str2ab(pw), {name:'PBKDF2'}, false, ['deriveBits','deriveKey']);
      const derived = await window.crypto.subtle.deriveBits({name:'PBKDF2', salt: saltAB, iterations: iters, hash: hash}, baseKey, bits);
      app.keyRaw = derived;
      if (app.algo === 'XOR') {
        app.key = new Uint8Array(derived);
      } else {
        app.key = await importKeyForAes(derived);
      }
      refreshKeyInfo();
      setPhase('keyDerived');
      log('Derived key via PBKDF2', bits, 'bits');
    } catch(e) {
      alert('Derive failed: ' + e.message);
      log('derive error', e.message);
    }
  });

  genIvBtn.addEventListener('click', ()=> generateIv(Math.max(1, parseInt(ivLen.value,10))));
  mutateIvBtn.addEventListener('click', mutateIv);

  encryptBtn.addEventListener('click', async ()=> {
    try { await encryptOperation(); } catch(e) { alert('Encrypt op failed: ' + e.message); log('encrypt error', e.message); }
  });

  decryptBtn.addEventListener('click', async ()=> {
    try { await decryptOperation(); } catch(e) { alert('Decrypt op failed: ' + e.message); log('decrypt error', e.message); }
  });

  tamperBtn.addEventListener('click', flipBitInCiphertext);
  showCtBtn.addEventListener('click', ()=> {
    if (!app.ciphertext) return alert('No stored ciphertext');
    const enc = app.lastCiphertextEncoding || 'base64';
    alert('Stored ciphertext ('+enc+'): \n' + encodeOutput(app.ciphertext, enc));
  });

  downloadBtn.addEventListener('click', ()=> {
    if (!app.ciphertext) { alert('Nothing to download'); return; }
    const blob = new Blob([new Uint8Array(app.ciphertext)], {type:'application/octet-stream'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'cipher.bin'; document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    log('Ciphertext downloaded as cipher.bin');
  });

  bfStart.addEventListener('click', ()=> {
    if (algoSelect.value !== 'XOR') {
      if (!confirm('Brute-force DEMO is designed for XOR. Continue anyway?')) return;
    }
    app.bruteForceRunning = true;
    bruteForceXor();
  });
  bfStop.addEventListener('click', ()=> {
    bfAbort = true;
    app.bruteForceRunning = false;
    setPhase('bruteforce_aborted');
  });

  benchBtn.addEventListener('click', runBenchmark);

  resetBtn.addEventListener('click', ()=> {
    if (!confirm('Reset all internal state?')) return;
    app.key = null; app.keyRaw = null; app.iv = null; app.ciphertext = null; app.lastPlain = null;
    keyInput.value = ''; ivInput.value = ''; ciphertextArea.value = ''; plaintext.value = 'Hello world';
    setPhase('idle');
    refreshKeyInfo();
    log('State reset by user');
  });

  clearLogBtn.addEventListener('click', ()=> { logBox.textContent=''; });

  dumpStateBtn.addEventListener('click', ()=> {
    try {
      const dump = {
        phase: app.phase,
        algo: app.algo,
        keyBytes: app.keyRaw ? (new Uint8Array(app.keyRaw)).length : null,
        ivHex: app.iv ? ab2hex(app.iv) : null,
        ciphertextBytes: app.ciphertext ? (new Uint8Array(app.ciphertext)).length : null
      };
      alert(JSON.stringify(dump, null, 2));
    } catch(e) { alert('Dump failed: ' + e.message); }
  });

  // initialize
  setPhase('idle');
  refreshKeyInfo();
  log('Interactive symmetric cryptography playground ready. Use controls to explore.');
})();
</script>
