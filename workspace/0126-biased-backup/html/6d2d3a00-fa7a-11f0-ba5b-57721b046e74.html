<!DOCTYPE html>
<html>
<head>
    <title>Interactive B-Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .control-group {
            border: 1px solid #ccc;
            padding: 10px;
            margin-right: 10px;
        }
        .tree-container {
            min-height: 300px;
            border: 1px solid #ccc;
            padding: 20px;
            overflow: auto;
        }
        .node {
            border: 1px solid black;
            display: inline-block;
            margin: 5px;
            padding: 5px;
            vertical-align: top;
        }
        .key {
            display: inline-block;
            padding: 5px;
            margin: 2px;
            border: 1px solid #999;
        }
        .child-pointer {
            display: block;
            margin-top: 5px;
            font-size: 0.8em;
            color: #666;
        }
        .highlight {
            background-color: #eee;
        }
        .operation-log {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interactive B-Tree</h1>
        
        <div class="controls">
            <div class="control-group">
                <h3>Tree Configuration</h3>
                <div>
                    <label>Minimum Degree (t): <input type="number" id="degree-input" min="2" max="10" value="2"></label>
                    <button id="init-btn">Initialize Tree</button>
                </div>
            </div>
            
            <div class="control-group">
                <h3>Node Operations</h3>
                <div>
                    <label>Key: <input type="number" id="key-input"></label>
                    <button id="insert-btn">Insert</button>
                    <button id="delete-btn">Delete</button>
                    <button id="search-btn">Search</button>
                </div>
            </div>
            
            <div class="control-group">
                <h3>Bulk Operations</h3>
                <div>
                    <label>Keys (comma separated): <input type="text" id="bulk-input"></label>
                    <button id="bulk-insert-btn">Bulk Insert</button>
                    <button id="bulk-delete-btn">Bulk Delete</button>
                    <button id="random-btn">Random Tree</button>
                </div>
            </div>
            
            <div class="control-group">
                <h3>Visualization</h3>
                <div>
                    <button id="expand-btn">Expand All</button>
                    <button id="collapse-btn">Collapse All</button>
                    <label><input type="checkbox" id="show-pointers"> Show Pointers</label>
                </div>
            </div>
        </div>
        
        <div class="tree-container" id="tree-container">
            <p>Initialize a B-Tree by setting the minimum degree and clicking "Initialize Tree"</p>
        </div>
        
        <div class="operation-log" id="operation-log">
            <p>Operation log will appear here...</p>
        </div>
    </div>

    <script>
        class BTreeNode {
            constructor(leaf = false) {
                this.keys = [];
                this.children = [];
                this.leaf = leaf;
                this.parent = null;
                this.id = Math.random().toString(36).substr(2, 9);
            }
        }

        class BTree {
            constructor(t) {
                this.root = new BTreeNode(true);
                this.t = t;
                this.highlightedNodes = new Set();
            }

            search(node, key, path = []) {
                let i = 0;
                while (i < node.keys.length && key > node.keys[i]) {
                    i++;
                }
                
                path.push({node: node, index: i});
                
                if (i < node.keys.length && key === node.keys[i]) {
                    return { node: node, index: i, path: path };
                } else if (node.leaf) {
                    return null;
                } else {
                    return this.search(node.children[i], key, path);
                }
            }

            insert(key) {
                const root = this.root;
                if (root.keys.length === (2 * this.t) - 1) {
                    const newRoot = new BTreeNode();
                    this.root = newRoot;
                    newRoot.children.push(root);
                    root.parent = newRoot;
                    this.splitChild(newRoot, 0);
                    this.insertNonFull(newRoot, key);
                } else {
                    this.insertNonFull(root, key);
                }
            }

            insertNonFull(node, key) {
                let i = node.keys.length - 1;
                if (node.leaf) {
                    while (i >= 0 && key < node.keys[i]]) {
                        i--;
                    }
                    node.keys.splice(i + 1, 0, key);
                } else {
                    while (i >= 0 && key < node.keys[i]) {
                        i--;
                    }
                    i++;
                    if (node.children[i].keys.length === (2 * this.t) - 1) {
                        this.splitChild(node, i);
                        if (key > node.keys[i]) {
                            i++;
                        }
                    }
                    this.insertNonFull(node.children[i], key);
                }
            }

            splitChild(parent, i) {
                const t = this.t;
                const child = parent.children[i];
                const newChild = new BTreeNode(child.leaf);
                newChild.parent = parent;
                
                parent.keys.splice(i, 0, child.keys[t - 1]);
                parent.children.splice(i + 1, 0, newChild);
                
                newChild.keys = child.keys.slice(t);
                child.keys = child.keys.slice(0, t - 1);
                
                if (!child.leaf) {
                    newChild.children = child.children.slice(t);
                    child.children = child.children.slice(0, t);
                    for (const c of newChild.children) {
                        c.parent = newChild;
                    }
                }
            }

            delete(key) {
                this.deleteKey(this.root, key);
                if (this.root.keys.length === 0 && !this.root.leaf) {
                    this.root = this.root.children[0];
                    this.root.parent = null;
                }
            }

            deleteKey(node, key) {
                const t = this.t;
                let idx = node.keys.findIndex(k => k === key);
                
                if (idx !== -1) {
                    if (node.leaf) {
                        node.keys.splice(idx, 1);
                    } else {
                        const predecessor = this.getPredecessor(node, idx);
                        if (predecessor.keys.length >= t) {
                            node.keys[idx] = predecessor.keys.pop();
                        } else {
                            const successor = this.getSuccessor(node, idx);
                            if (successor.keys.length >= t) {
                                node.keys[idx] = successor.keys.shift();
                            } else {
                                this.merge(node, idx);
                                this.deleteKey(node.children[idx], key);
                            }
                        }
                    }
                } else {
                    if (node.leaf) {
                        return;
                    }
                    
                    let childIdx = 0;
                    while (childIdx < node.keys.length && key > node.keys[childIdx]) {
                        childIdx++;
                    }
                    
                    const child = node.children[childIdx];
                    if (child.keys.length >= t) {
                        this.deleteKey(child, key);
                    } else {
                        if (childIdx > 0 && node.children[childIdx - 1].keys.length >= t) {
                            this.borrowFromLeft(node, childIdx);
                        } else if (childIdx < node.children.length - 1 && node.children[childIdx + 1].keys.length >= t) {
                            this.borrowFromRight(node, childIdx);
                        } else {
                            if (childIdx < node.children.length - 1) {
                                this.merge(node, childIdx);
                            } else {
                                this.merge(node, childIdx - 1);
                                childIdx--;
                            }
                            this.deleteKey(node.children[childIdx], key);
                        }
                    }
                }
            }

            getPredecessor(node, idx) {
                let current = node.children[idx];
                while (!current.leaf) {
                    current = current.children[current.children.length - 1];
                }
                return current;
            }

            getSuccessor(node, idx) {
                let current = node.children[idx + 1];
                while (!current.leaf) {
                    current = current.children[0];
                }
                return current;
            }

            borrowFromLeft(parent, idx) {
                const child = parent.children[idx];
                const sibling = parent.children[idx - 1];
                
                child.keys.unshift(parent.keys[idx - 1]);
                parent.keys[idx - 1] = sibling.keys.pop();
                
                if (!child.leaf) {
                    child.children.unshift(sibling.children.pop());
                    child.children[0].parent = child;
                }
            }

            borrowFromRight(parent, idx) {
                const child = parent.children[idx];
                const sibling = parent.children[idx + 1];
                
                child.keys.push(parent.keys[idx]);
                parent.keys[idx] = sibling.keys.shift();
                
                if (!child.leaf) {
                    child.children.push(sibling.children.shift());
                    child.children[child.children.length - 1].parent = child;
                }
            }

            merge(parent, idx) {
                const t = this.t;
                const child = parent.children[idx];
                const sibling = parent.children[idx + 1];
                
                child.keys.push(parent.keys[idx]);
                child.keys = child.keys.concat(sibling.keys);
                
                if (!child.leaf) {
                    for (const c of sibling.children) {
                        c.parent = child;
                        child.children.push(c);
                    }
                }
                
                parent.keys.splice(idx, 1);
                parent.children.splice(idx + 1, 1);
            }

            traverse(node = this.root, level = 0, expanded = new Set()) {
                if (!node) return [];
                
                const isExpanded = expanded.has(node.id);
                const items = [];
                
                items.push({
                    node: node,
                    level: level,
                    expanded: isExpanded
                });
                
                if (isExpanded && !node.leaf) {
                    for (let i = 0; i < node.children.length; i++) {
                        items.push(...this.traverse(node.children[i], level + 1, expanded));
                        if (i < node.keys.length) {
                            items.push({
                                key: node.keys[i],
                                level: level + 1
                            });
                        }
                    }
                }
                
                return items;
            }
        }

        class BTreeVisualizer {
            constructor(container, logContainer) {
                this.tree = null;
                this.treeContainer = treeContainer;
                this.logContainer = logContainer;
                this.expandedNodes = new Set();
                this.showPointers = false;
            }

            initialize(t) {
                this.tree = new BTree(t);
                this.expandedNodes = new Set();
                this.log('Initialized B-Tree with minimum degree ' + t);
                this.render();
            }

            insert(key) {
                if (!this.tree) {
                    this.log('Please initialize the tree first');
                    return;
                }
                
                this.log('Inserting key: ' + key);
                this.tree.insert(parseInt(key));
                this.expandedNodes.add(this.tree.root.id);
                this.render();
            }

            delete(key) {
                if (!this.tree) {
                    this.log('Please initialize the tree first');
                    return;
                }
                
                const result = this.tree.search(this.tree.root, parseInt(key));
                if (!result) {
                    this.log('Key ' + key + ' not found in tree');
                    return;
                }
                
                this.log('Deleting key: ' + key);
                this.tree.delete(parseInt(key));
                this.render();
            }

            search(key) {
                if (!this.tree) {
                    this.log('Please initialize the tree first');
                    return;
                }
                
                this.log('Searching for key: ' + key);
                const result = this.tree.search(this.tree.root, parseInt(key));
                
                // Clear previous highlights
                this.tree.highlightedNodes.clear();
                
                if (result) {
                    this.log('Key ' + key + ' found in the tree');
                    // Highlight the path
                    for (const step of result.path) {
                        this.tree.highlightedNodes.add(step.node.id);
                    }
                    // Highlight the found node
                    this.tree.highlightedNodes.add(result.node.id);
                } else {
                    this.log('Key ' + key + ' not found in the tree');
                }
                
                this.render();
            }

            bulkInsert(keysStr) {
                if (!this.tree) {
                    this.log('Please initialize the tree first');
                    return;
                }
                
                const keys = keysStr.split(',').map(k => parseInt(k.trim())).filter(k => !isNaN(k));
                if (keys.length === 0) {
                    this.log('No valid keys provided');
                    return;
                }
                
                this.log('Bulk inserting keys: ' + keys.join(', '));
                for (const key of keys) {
                    this.tree.insert(key);
                }
                this.expandedNodes.add(this.tree.root.id);
                this.render();
            }

            bulkDelete(keysStr) {
                if (!this.tree) {
                    this.log('Please initialize the tree first');
                    return;
                }
                
                const keys = keysStr.split(',').map(k => parseInt(k.trim())).filter(k => !isNaN(k));
                if (keys.length === 0) {
                    this.log('No valid keys provided');
                    return;
                }
                
                this.log('Bulk deleting keys: ' + keys.join(', '));
                for (const key of keys) {
                    this.tree.delete(key);
                }
                this.render();
            }

            generateRandom() {
                if (!this.tree) {
                    this.log('Please initialize the tree first');
                    return;
                }
                
                const count = Math.floor(Math.random() * 15) + 5;
                const keys = [];
                for (let i = 0; i < count; i++) {
                    keys.push(Math.floor(Math.random() * 100));
                }
                
                this.log('Generating random tree with keys: ' + keys.join(', '));
                this.tree = new BTree(this.tree.t);
                for (const key of keys) {
                    this.tree.insert(key);
                }
                this.expandedNodes.add(this.tree.root.id);
                this.render();
            }

            toggleNode(nodeId) {
                if (this.expandedNodes.has(nodeId)) {
                    this.expandedNodes.delete(nodeId);
                } else {
                    this.expandedNodes.add(nodeId);
                }
                this.render();
            }

            expandAll() {
                if (!this.tree) return;
                
                const queue = [this.tree.root];
                while (queue.length > 0) {
                    const node = queue.shift();
                    this.expandedNodes.add(node.id);
                    if (!node.leaf) {
                        queue.push(...node.children);
                    }
                }
                this.log('Expanded all nodes');
                this.render();
            }

            collapseAll() {
                this.expandedNodes.clear();
                if (this.tree) {
                    this.expandedNodes.add(this.tree.root.id);
                }
                this.log('Collapsed all nodes');
                this.render();
            }

            togglePointers() {
                this.showPointers = !this.showPointers;
                this.render();
            }

            render() {
                if (!this.tree) {
                    this.treeContainer.innerHTML = '<p>Initialize a B-Tree by setting the minimum degree and clicking "Initialize Tree"</p>';
                    return;
                }
                
                const items = this.tree.traverse(this.tree.root, 0, this.expandedNodes);
                let html = '<div class="tree">';
                
                for (const item of items) {
                    if (item.node) {
                        const node = item.node;
                        const isHighlighted = this.tree.highlightedNodes.has(node.id);
                        const isExpanded = this.expandedNodes.has(node.id);
                        
                        html += `<div style="margin-left: ${item.level * 40}px;">`;
                        html += `<div class="node ${isHighlighted ? 'highlight' : ''}" onclick="visualizer.toggleNode('${node.id}')">`;
                        
                        // Keys
                        for (const key of node.keys) {
                            html += `<span class="key">${key}</span>`;
                        }
                        
                        // Child pointers (if enabled)
                        if (this.showPointers && !node.leaf) {
                            html += '<div class="child-pointers">';
                            for (let i = 0; i < node.children.length; i++) {
                                const child = node.children[i];
                                const arrow = isExpanded ? '↓' : '→';
                                html += `<div class="child-pointer">${arrow} Child ${i+1} (ID: ${child.id.substr(0,4)})</div>`;
                            }
                            html += '</div>';
                        }
                        
                        html += '</div></div>';
                    }
                }
                
                html += '</div>';
                this.treeContainer.innerHTML = html;
            }

            log(message) {
                const entry = document.createElement('div');
                entry.textContent = '> ' + message;
                this.logContainer.appendChild(entry);
                this.logContainer.scrollTop = this.logContainer.scrollHeight;
            }

            clearLog() {
                this.logContainer.innerHTML = '';
            }
        }

        // Initialize visualizer
        const visualizer = new BTreeVisualizer(
            document.getElementById('tree-container'),
            document.getElementById('operation-log')
        );

        // Event listeners
        document.getElementById('init-btn').addEventListener('click', () => {
            const t = parseInt(document.getElementById('degree-input').value);
            if (t >= 2) {
                visualizer.initialize(t);
            } else {
                visualizer.log('Minimum degree must be at least 2');
            }
        });

        document.getElementById('insert-btn').addEventListener('click', () => {
            const key = document.getElementById('key-input').value;
            if (key) {
                visualizer.insert(key);
                document.getElementById('key-input').value = '';
            }
        });

        document.getElementById('delete-btn').addEventListener('click', () => {
            const key = document.getElementById('key-input').value;
            if (key) {
                visualizer.delete(key);
                document.getElementById('key-input').value = '';
            }
        });

        document.getElementById('search-btn').addEventListener('click', () => {
            const key = document.getElementById('key-input').value;
            if (key) {
                visualizer.search(key);
                document.getElementById('key-input').value = '';
            }
        });

        document.getElementById('bulk-insert-btn').addEventListener('click', () => {
            const keys = document.getElementById('bulk-input').value;
            visualizer.bulkInsert(keys);
        });

        document.getElementById('bulk-delete-btn').addEventListener('click', () => {
            const keys = document.getElementById('bulk-input').value;
            visualizer.bulkDelete(keys);
        });

        document.getElementById('random-btn').addEventListener('click', () => {
            visualizer.generateRandom();
        });

        document.getElementById('expand-btn').addEventListener('click', () => {
            visualizer.expandAll();
        });

        document.getElementById('collapse-btn').addEventListener('click', () => {
            visualizer.collapseAll();
        });

        document.getElementById('show-pointers').addEventListener('change', (e) => {
            visualizer.togglePointers();
        });

        // Allow pressing Enter in key input
        document.getElementById('key-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('insert-btn').click();
            }
        });
    </script>
</body>
</html>
