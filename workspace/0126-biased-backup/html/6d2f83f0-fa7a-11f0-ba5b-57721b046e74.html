<!DOCTYPE html>
<html>
<head>
    <title>Sliding Window Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .controls {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #ccc;
        }
        .array-display {
            font-family: monospace;
            font-size: 18px;
            margin: 20px 0;
            white-space: nowrap;
            overflow-x: auto;
        }
        .window {
            position: relative;
            height: 30px;
            margin: 20px 0;
        }
        .window-highlight {
            position: absolute;
            background-color: rgba(0,0,0,0.1);
            height: 30px;
            border: 1px solid #000;
        }
        .result {
            margin: 20px 0;
            font-weight: bold;
        }
        button, input, select {
            margin: 5px;
        }
        .log {
            font-family: monospace;
            height: 200px;
            overflow-y: scroll;
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sliding Window Interactive Demo</h1>
        
        <div class="controls">
            <h2>Array Configuration</h2>
            <div>
                <label>Array Size: <input type="range" id="arraySize" min="5" max="30" value="10"></label>
                <span id="arraySizeValue">10</span>
            </div>
            <div>
                <label>Min Value: <input type="number" id="minValue" value="1"></label>
                <label>Max Value: <input type="number" id="maxValue" value="100"></label>
            </div>
            <button id="generateArray">Generate New Array</button>
            <button id="manualEdit">Edit Array Manually</button>
            <div id="manualEditContainer" style="display: none; margin-top: 10px;">
                <input type="text" id="manualArrayInput" placeholder="Enter comma-separated numbers">
                <button id="applyManualArray">Apply</button>
            </div>
        </div>
        
        <div class="array-display" id="arrayDisplay"></div>
        
        <div class="controls">
            <h2>Window Configuration</h2>
            <div>
                <label>Window Size: <input type="range" id="windowSize" min="1" max="10" value="3"></label>
                <span id="windowSizeValue">3</span>
            </div>
            <div>
                <label>Operation: 
                    <select id="operation">
                        <option value="max">Maximum</option>
                        <option value="min">Minimum</option>
                        <option value="sum">Sum</option>
                        <option value="average">Average</option>
                        <option value="custom">Product</option>
                    </select>
                </label>
            </div>
            <button id="runAlgorithm">Run Sliding Window</button>
            <button id="stepForward">Step Forward</button>
            <button id="reset">Reset</button>
        </div>
        
        <div class="window" id="windowContainer"></div>
        
        <div class="result" id="resultDisplay"></div>
        
        <div class="controls">
            <h2>Algorithm State</h2>
            <div>
                Current Window: <span id="currentWindow">[]</span>
            </div>
            <div>
                Current Result: <span id="currentResult">-</span>
            </div>
            <div>
                Final Results: <span id="finalResults">[]</span>
            </div>
        </div>
        
        <div class="log" id="executionLog"></div>
    </div>

    <script>
        // State variables
        let array = [];
        let windowSize = 3;
        let currentPosition = 0;
        let results = [];
        let isRunning = false;
        let operation = 'max';
        
        // DOM elements
        const arrayDisplay = document.getElementById('arrayDisplay');
        const windowContainer = document.getElementById('windowContainer');
        const resultDisplay = document.getElementById('resultDisplay');
        const currentWindowDisplay = document.getElementById('currentWindow');
        const currentResultDisplay = document.getElementById('currentResult');
        const finalResultsDisplay = document.getElementById('finalResults');
        const executionLog = document.getElementById('executionLog');
        
        // Initialize
        document.getElementById('arraySize').addEventListener('input', updateArraySize);
        document.getElementById('windowSize').addEventListener('input', updateWindowSize);
        document.getElementById('generateArray').addEventListener('click', generateArray);
        document.getElementById('manualEdit').addEventListener('click', toggleManualEdit);
        document.getElementById('applyManualArray').addEventListener('click', applyManualArray);
        document.getElementById('runAlgorithm').addEventListener('click', runAlgorithm);
        document.getElementById('stepForward').addEventListener('click', stepForward);
        document.getElementById('reset').addEventListener('click', reset);
        document.getElementById('operation').addEventListener('change', updateOperation);
        
        // Initial setup
        generateArray();
        updateWindowSize();
        
        function updateArraySize() {
            const size = document.getElementById('arraySize').value;
            document.getElementById('arraySizeValue').textContent = size;
        }
        
        function updateWindowSize() {
            windowSize = parseInt(document.getElementById('windowSize').value);
            document.getElementById('windowSizeValue').textContent = windowSize;
            reset();
        }
        
        function updateOperation() {
            operation = document.getElementById('operation').value;
            reset();
        }
        
        function generateArray() {
            const size = parseInt(document.getElementById('arraySize').value);
            const min = parseInt(document.getElementById('minValue').value);
            const max = parseInt(document.getElementById('maxValue').value);
            
            array = [];
            for (let i = 0; i < size; i++) {
                array.push(Math.floor(Math.random() * (max - min + 1)) + min);
            }
            
            updateArrayDisplay();
            reset();
        }
        
        function toggleManualEdit() {
            const container = document.getElementById('manualEditContainer');
            if (container.style.display === 'none') {
                container.style.display = 'block';
                document.getElementById('manualArrayInput').value = array.join(', ');
            } else {
                container.style.display = 'none';
            }
        }
        
        function applyManualArray() {
            const input = document.getElementById('manualArrayInput').value;
            try {
                array = input.split(',').map(num => parseInt(num.trim()));
                document.getElementById('manualEditContainer').style.display = 'none';
                updateArrayDisplay();
                reset();
            } catch (e) {
                alert('Invalid input. Please enter comma-separated numbers.');
            }
        }
        
        function updateArrayDisplay() {
            arrayDisplay.textContent = array.join(' ');
        }
        
        function runAlgorithm() {
            reset();
            isRunning = true;
            executionLog.innerHTML += 'Algorithm started...<br>';
            
            while (currentPosition <= array.length - windowSize) {
                stepForward();
            }
            
            isRunning = false;
            executionLog.innerHTML += 'Algorithm completed.<br>';
        }
        
        function stepForward() {
            if (currentPosition > array.length - windowSize) {
                executionLog.innerHTML += 'Cannot step forward - reached end of array.<br>';
                return;
            }
            
            const windowValues = array.slice(currentPosition, currentPosition + windowSize);
            currentWindowDisplay.textContent = `[${windowValues.join(', ')}]`;
            
            let result;
            switch (operation) {
                case 'max':
                    result = Math.max(...windowValues);
                    break;
                case 'min':
                    result = Math.min(...windowValues);
                    break;
                case 'sum':
                    result = windowValues.reduce((a, b) => a + b, 0);
                    break;
                case 'average':
                    result = (windowValues.reduce((a, b) => a + b, 0) / windowSize).toFixed(2);
                    break;
                case 'custom':
                    result = windowValues.reduce((a, b) => a * b, 1);
                    break;
            }
            
            results.push(result);
            currentResultDisplay.textContent = result;
            finalResultsDisplay.textContent = `[${results.join(', ')}]`;
            
            // Update window highlight
            windowContainer.innerHTML = '';
            const windowHighlight = document.createElement('div');
            windowHighlight.className = 'window-highlight';
            const charWidth = 15; // Approximate width of each array element
            const startPos = currentPosition * charWidth;
            const width = windowSize * charWidth;
            
            windowHighlight.style.left = `${startPos}px`;
            windowHighlight.style.width = `${width}px`;
            windowContainer.appendChild(windowHighlight);
            
            // Update log
            executionLog.innerHTML += `Window at position ${currentPosition}: [${windowValues.join(', ')}] → ${result}<br>`;
            executionLog.scrollTop = executionLog.scrollHeight;
            
            currentPosition++;
        }
        
        function reset() {
            currentPosition = 0;
            results = [];
            isRunning = false;
            
            currentWindowDisplay.textContent = '[]';
            currentResultDisplay.textContent = '-';
            finalResultsDisplay.textContent = '[]';
            resultDisplay.textContent = '';
            windowContainer.innerHTML = '';
            executionLog.innerHTML = '';
            
            if (array.length > 0) {
                const maxPossibleWindowSize = array.length;
                document.getElementById('windowSize').max = maxPossibleWindowSize;
                if (windowSize > maxPossibleWindowSize) {
                    windowSize = maxPossibleWindowSize;
                    document.getElementById('windowSize').value = windowSize;
                    document.getElementById('windowSizeValue').textContent = windowSize;
                }
            }
        }
    </script>
</body>
</html>
