<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Exponential Search - Visual Demonstration</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Fraunces:wght@700&display=swap');
  /* Reset and base */
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: #e7edef;
    font-family: 'Space Grotesk', sans-serif;
    overflow-x: hidden;
    user-select: none;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    text-align: center;
    font-size: 3.5rem;
    margin: 2rem 1rem 0.2rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #f0f4f8;
    text-shadow:
      0 0 8px #a5f3fc88,
      0 0 15px #14b8a688,
      0 0 20px #14b8a6;
  }
  h2 {
    text-align: center;
    font-weight: 700;
    font-size: 1.25rem;
    margin-top: 0;
    margin-bottom: 2rem;
    color: #a0c7c7cc;
    letter-spacing: 0.05em;
    font-style: italic;
  }
  main {
    max-width: 960px;
    margin: 0 auto 4rem;
    padding: 0 1rem;
  }
  /* Search container & array */
  .array-container {
    background: rgba(20, 55, 70, 0.7);
    border-radius: 18px;
    padding: 1.5rem 2rem 2.5rem 2rem;
    box-shadow:
      inset 0 0 18px #1fc3c9aa,
      0 6px 30px #0b263833;
    user-select: none;
  }
  .array-title {
    font-weight: 600;
    font-size: 1.2rem;
    margin-bottom: 1rem;
    color: #7efff5cc;
    text-align: center;
    letter-spacing: 0.05em;
    font-family: 'Fraunces', serif;
    text-shadow: 0 0 6px #14b899cc;
  }
  .array {
    display: flex;
    justify-content: center;
    flex-wrap: nowrap;
    gap: 0.45rem;
    overflow-x: auto;
    padding-bottom: 8px;
  }
  /* Scrollbar styling */
  .array::-webkit-scrollbar {
    height: 8px;
  }
  .array::-webkit-scrollbar-track {
    background: rgba(255 255 255 / 0.05);
    border-radius: 20px;
  }
  .array::-webkit-scrollbar-thumb {
    background: #3dd9d9cc;
    border-radius: 20px;
  }
  .element {
    flex: 0 0 54px;
    height: 54px;
    background: linear-gradient(145deg, #18afb4, #12a7ad);
    border-radius: 12px;
    color: #e1f7f7;
    font-weight: 700;
    font-size: 1.45rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 3px 8px #147d7e88,
      inset 0 2px 4px #8ff7f7bb;
    position: relative;
    user-select: none;
    transition:
      background 0.45s cubic-bezier(0.19, 1, 0.22, 1),
      color 0.45s cubic-bezier(0.19, 1, 0.22, 1),
      box-shadow 0.45s cubic-bezier(0.19, 1, 0.22, 1);
  }
  .element.highlight {
    background: #3af4f4;
    color: #003b3b;
    box-shadow:
      0 0 22px 4px #3af4f4cc,
      inset 0 0 18px #00f0f0ff;
  }
  .element.checked {
    background: #f4a261;
    color: #3d1f00;
    box-shadow:
      0 0 20px #f4a261cc,
      inset 0 0 18px #f48a117f;
  }
  .element.found {
    background: #90be6d;
    color: #1b3a00;
    box-shadow:
      0 0 26px #90be6dcc,
      inset 0 0 20px #6a9748ff;
  }
  /* Indicators */
  .indicator {
    position: absolute;
    top: -28px;
    width: 100%;
    font-size: 0.875rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-align: center;
    user-select: none;
    color: #b2fff3cc;
    text-shadow: 0 0 8px #2ee6e0cc;
  }
  .indicator.left {
    top: unset;
    bottom: -28px;
    color: #a0ffccbb;
    text-shadow: 0 0 8px #24ccacbb;
  }
  /* Animation line */
  .line-container {
    position: relative;
    height: 130px;
    margin-top: 3rem;
  }
  svg.line-path {
    width: 100%;
    height: 130px;
    overflow-visible: visible;
  }
  /* Markers circle */
  circle.marker {
    fill: #14c1becc;
    stroke: #0d6b6a;
    stroke-width: 2px;
    filter: drop-shadow(0 0 4px #14c1becc);
    transition: fill 0.35s ease;
  }
  circle.marker.checked {
    fill: #f4a260cc;
    filter: drop-shadow(0 0 7px #f4a260cc);
  }
  circle.marker.found {
    fill: #90be6dcc;
    filter: drop-shadow(0 0 10px #90be6dcc);
  }
  /* Buttons & controls */
  .controls {
    text-align: center;
    margin-top: 2rem;
  }
  button {
    cursor: pointer;
    background: #18afb4;
    border: none;
    padding: 0.85rem 2rem;
    border-radius: 50px;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #e0fcfc;
    box-shadow:
      0 4px 12px #18afb480,
      0 0 15px #18afb480;
    user-select: none;
    transition:
      background 0.35s ease,
      box-shadow 0.35s ease;
    font-family: 'Space Grotesk', sans-serif;
  }
  button:hover,
  button:focus {
    background: #1fe6e9;
    box-shadow:
      0 8px 24px #1fe6e980,
      0 0 20px #1fe6e980;
    outline: none;
  }
  button:active {
    transform: scale(0.95);
  }

  /* Footer */
  footer {
    text-align: center;
    color: #4f8d8dbc;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    margin-bottom: 3rem;
    font-style: italic;
  }

  /* Tooltip styling for legend */
  .legend {
    max-width: 480px;
    margin: 1.5rem auto 3rem;
    font-size: 0.9rem;
    line-height: 1.5;
    color: #a9e3e3dd;
    font-family: 'Space Grotesk', sans-serif;
    text-align: center;
    letter-spacing: 0.03em;
    user-select: none;
  }
  .legend b {
    color: #79f8f7dd;
  }
  .legend span {
    display: inline-block;
    min-width: 88px;
    padding: 0.15rem 0.6rem;
    border-radius: 12px;
    font-weight: 700;
    margin: 0 0.15rem;
    user-select: none;
  }
  .legend .highlight {
    background: #07f0f7cc;
    color: #003838;
    text-shadow: none;
  }
  .legend .checked {
    background: #f4a261cc;
    color: #3d1f00;
  }
  .legend .found {
    background: #90be6dcc;
    color: #1b3a00;
  }

  /* Responsive: smaller screens */
  @media (max-width: 580px) {
    .element {
      flex: 0 0 44px;
      height: 44px;
      font-size: 1.1rem;
      border-radius: 10px;
    }
    h1 {
      font-size: 2.8rem;
    }
    .array-title {
      font-size: 1rem;
    }
  }
</style>
</head>
<body>
  <h1>Exponential Search</h1>
  <h2>An Elegant Visual Demonstration</h2>
  <main role="main" aria-label="Exponential Search Visualization">
    <section class="array-container" aria-live="polite" aria-atomic="true" aria-relevant="additions removals">
      <div class="array-title">Sorted Array</div>
      <div class="array" id="array" aria-label="Array of numbers">
        <!-- Elements inserted by JS -->
      </div>
    </section>

    <div class="line-container" aria-hidden="true">
      <svg class="line-path" viewBox="0 0 960 130" preserveAspectRatio="none" role="presentation" aria-hidden="true">
        <!-- Lines and markers inserted by JS -->
      </svg>
    </div>

    <div class="legend" aria-label="Legend explaining color coding">
      <span class="highlight" tabindex="0">Highlight</span> &mdash; Potential boundary in exponential steps&nbsp;&nbsp;
      <span class="checked" tabindex="0">Checked</span> &mdash; Elements currently examined during binary search&nbsp;&nbsp;
      <span class="found" tabindex="0">Found</span> &mdash; Target element located
    </div>

    <div class="controls">
      <button id="btnStart" aria-label="Start the Exponential Search animation">Start Search</button>
      <button id="btnReset" aria-label="Reset the visualization" disabled>Reset</button>
    </div>
  </main>
  <footer>© 2024 Visual Algorithms — Crafted with care &amp; finesse</footer>

<script>
(() => {
  // Sorted array for demonstration (length 32, nice powers of 2)
  const arrayValues = [2,3,5,7,10,14,18,19,23,25,29,31,35,38,42,46,48,52,57,61,65,67,70,73,77,80,84,88,91,94,97,99];
  // Target value for searching example
  const targetValue = 73;

  // Elements container & SVG
  const arrayContainer = document.getElementById('array');
  const svg = document.querySelector('svg.line-path');
  const btnStart = document.getElementById('btnStart');
  const btnReset = document.getElementById('btnReset');

  // Constants for layout
  const elemCount = arrayValues.length;
  const elemWidth = 54; // must match CSS flex-basis and height
  const gap = 0.45 * 16; // 0.45rem gap in px (assuming 16px base font size)
  const totalWidth = elemCount * elemWidth + (elemCount - 1) * gap;
  svg.setAttribute('width', totalWidth);

  // Create array elements DOM once
  const elems = [];
  for(let i = 0; i < elemCount; i++) {
    const el = document.createElement('div');
    el.className = 'element';
    el.textContent = arrayValues[i];
    el.setAttribute('data-index', i);
    el.setAttribute('aria-label', `Element ${i}, value ${arrayValues[i]}`);
    arrayContainer.appendChild(el);
    elems.push(el);
  }

  // Helper: Convert index to horizontal x center coordinate within the SVG
  // Place markers above array elements by calculating their center.
  function indexToX(i) {
    return elemWidth/2 + i*(elemWidth + gap);
  }

  // Remove all highlights & markers
  function clearHighlights() {
    elems.forEach(e => {
      e.classList.remove('highlight', 'checked', 'found');
      const ind = e.querySelector('.indicator');
      if(ind) ind.remove();
    });
    while(svg.firstChild) svg.removeChild(svg.firstChild);
  }

  // Create an indicator label on top/bottom of an element
  function setIndicator(index, text, position='top') {
    const el = elems[index];
    let label = el.querySelector('.indicator');
    if(!label) {
      label = document.createElement('div');
      label.className = `indicator ${position === 'bottom' ? 'left' : ''}`;
      el.appendChild(label);
    }
    label.textContent = text;
  }

  // Draw an arrow line with a glowing marker circle in SVG between two elements indices (inclusive x positions)
  // type: 'highlight', 'checked', or 'found' affects color
  // From fromIndex to toIndex horizontally
  function drawLine(fromIndex, toIndex, type='highlight') {
    const startX = indexToX(fromIndex);
    const endX = indexToX(toIndex);
    const y = 60;

    // Draw a curved line
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    let color;
    switch(type) {
      case 'checked': color = '#f4a260'; break;
      case 'found': color = '#90be6d'; break;
      default: color = '#14c1be'; break;
    }

    const cp1x = startX + (endX - startX)/4;
    const cp2x = startX + 3*(endX - startX)/4;
    const cp1y = y - 42;
    const cp2y = y - 42;

    const d = `M ${startX} ${y} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${endX} ${y}`;
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '3.5');
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('filter', `drop-shadow(0 0 8px ${color}aa)`);

    // Animate stroke dash
    path.style.strokeDasharray = 250;
    path.style.strokeDashoffset = 250;
    path.style.animation = 'drawPath 1.1s ease forwards';

    svg.appendChild(path);

    // Draw circles for start and end markers 
    [fromIndex, toIndex].forEach((idx) => {
      const cir = document.createElementNS('http://www.w3.org/2000/svg','circle');
      cir.classList.add('marker', type);
      cir.setAttribute('r', 10);
      cir.setAttribute('cx', indexToX(idx));
      cir.setAttribute('cy', y);
      svg.appendChild(cir);
    });
  }
  
  // Animation keyframes injection for path drawing
  const styleSheet = document.createElement('style');
  styleSheet.textContent = `
    @keyframes drawPath {
      to { stroke-dashoffset: 0; }
    }
  `;
  document.head.appendChild(styleSheet);

  /*
    Exponential Search Animation Logic:
    1) Start from index 0, check if target == arr[0]. If yes done.
    2) Increase index exponentially: 1, 2, 4, 8, 16... until arr[i] >= target or i > array.length
    3) Use binary search between previous bound and current bound.
  */

  // Steps state for animation timeline
  const STEPS = [];

  // Prepare exponential steps
  function prepareExponentialSteps(arr, target) {
    let step = 0;
    STEPS.length = 0;
    // Step 0: start at 0
    STEPS.push({type:'check', indices:[0], desc: `Check element at index 0 (value ${arr[0]})`});
    if(arr[0] === target) {
      STEPS.push({type:'found', index:0, desc: `Target ${target} found immediately at index 0`});
      return;
    }
    let bound = 1;
    while(bound < arr.length && arr[bound] < target) {
      STEPS.push({type:'highlight', indices:[bound], desc: `Exponential step: checking index ${bound} (value ${arr[bound]})`});
      bound *= 2;
    }
    const high = Math.min(bound, arr.length -1);
    const low = bound/2;
    STEPS.push({type:'range', low:low, high:high, desc: `Found range for binary search: indices [${low}..${high}]`});
    binarySearchSteps(arr, target, low, high);
  }

  // Prepare binary search steps
  function binarySearchSteps(arr, target, left, right) {
    // Iterative binary search, recording steps
    while(left <= right) {
      const mid = Math.floor((left + right) / 2);
      STEPS.push({type:'check', indices:[mid], desc: `Checking middle element at index ${mid} (value ${arr[mid]})`});
      if(arr[mid] === target) {
        STEPS.push({type:'found', index: mid, desc: `Target ${target} found at index ${mid}`});
        return;
      }
      else if(arr[mid] < target) {
        STEPS.push({type:'binary-update', low: mid + 1, high:right, desc: `Target > value at ${mid}, new search range [${mid+1}..${right}]`});
        left = mid + 1;
      }
      else {
        STEPS.push({type:'binary-update', low: left, high: mid - 1, desc: `Target < value at ${mid}, new search range [${left}..${mid-1}]`});
        right = mid - 1;
      }
    }
    STEPS.push({type:'notfound', desc:`Target ${target} not found in the array.`});
  }

  // Reset visual states
  function resetVisual() {
    clearHighlights();
    svg.style.opacity = '1';
  }

  // Scroll to element nicely for user visibility (centered horizontally)
  function scrollToElement(index) {
    const el = elems[index];
    if(!el) return;
    const rect = el.getBoundingClientRect();
    const containerRect = arrayContainer.getBoundingClientRect();
    const scrollParent = arrayContainer.parentElement;

    // Calculate center offset to scroll
    const targetScrollLeft = el.offsetLeft - (scrollParent.clientWidth/2) + (el.clientWidth/2);
    scrollParent.scroll({
      left: targetScrollLeft,
      behavior: 'smooth'
    });
  }

  // Animate step-by-step
  let stepIndex = 0;
  let animationInProgress = false;

  function runStep(index) {
    if(index >= STEPS.length) {
      animationInProgress = false;
      btnStart.disabled = true;
      btnReset.disabled = false;
      return;
    }
    animationInProgress = true;
    const step = STEPS[index];
    resetVisual();

    switch(step.type) {
      case 'check':
        step.indices.forEach(i => {
          elems[i].classList.add('checked');
          setIndicator(i, 'Checking', 'top');
          scrollToElement(i);
          drawLine(i, i, 'checked');
        });
        break;
      case 'highlight':
        step.indices.forEach(i => {
          elems[i].classList.add('highlight');
          setIndicator(i, 'Exponential Check', 'top');
          scrollToElement(i);
          drawLine(i, i, 'highlight');
        });
        break;
      case 'range':
        // Highlight the range bounded for binary search
        const { low, high } = step;
        for(let i = low; i <= high; i++) {
          elems[i].classList.add('highlight');
        }
        setIndicator(low, 'Low', 'bottom');
        setIndicator(high, 'High', 'top');
        drawLine(low, high, 'highlight');
        scrollToElement(low);
        break;
      case 'binary-update':
        // Clear previous checked, highlight current range
        const { low: l, high: h } = step;
        for(let i = l; i <= h; i++) {
          elems[i].classList.add('highlight');
        }
        setIndicator(l, 'Low', 'bottom');
        setIndicator(h, 'High', 'top');
        drawLine(l, h, 'highlight');
        scrollToElement(l);
        break;
      case 'found':
        elems[step.index].classList.add('found');
        setIndicator(step.index, 'FOUND!', 'top');
        drawLine(step.index, step.index, 'found');
        scrollToElement(step.index);
        break;
      case 'notfound':
        // Display a subtle message in footer (through live region)
        alert(step.desc);
        break;
    }

    // Display description in aria-live region (optional: for screen reader)
    arrayContainer.setAttribute('aria-label', `Exponential Search step: ${step.desc}`);

    // Proceed to next step after delay
    setTimeout(() => {
      runStep(index + 1);
    }, step.type === 'check' ? 1900 : 2500);
  }

  // Button event handlers
  btnStart.addEventListener('click', () => {
    btnStart.disabled = true;
    btnReset.disabled = true;
    prepareExponentialSteps(arrayValues, targetValue);
    runStep(0);
    btnReset.disabled = false;
  });

  btnReset.addEventListener('click', () => {
    stepIndex = 0;
    animationInProgress = false;
    resetVisual();
    btnStart.disabled = false;
    btnReset.disabled = true;
    arrayContainer.setAttribute('aria-label', 'Sorted array content');
    arrayContainer.parentElement.scroll({
      left: 0,
      behavior: 'smooth'
    });
  });

  // Initialize disabled state
  btnReset.disabled = true;

})();
</script>
</body>
</html>
