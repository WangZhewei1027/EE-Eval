<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A* Search Visualization — Elegant Demo</title>
<style>
  /* Fonts & base */
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display&display=swap');

  * {
    box-sizing: border-box;
  }

  body, html {
    margin: 0; padding: 0; height: 100%;
    background: linear-gradient(135deg, #0a1128 0%, #001f54 60%, #003566 100%);
    color: #e0e6f0;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 2.8rem;
    text-align: center;
    margin: 1.5rem 0 0.25rem 0;
    letter-spacing: 0.12em;
    color: #f0f5ff;
    user-select: none;
    text-shadow: 0 0 12px #97caffbb;
  }

  h2 {
    font-weight: 400;
    font-size: 1.3rem;
    color: #bfcde7dd;
    text-align: center;
    margin: 0 0 1.8rem 0;
    letter-spacing: 0.1em;
  }

  #container {
    width: 540px;
    max-width: 90vw;
    margin: 0 auto 3rem auto;
    padding: 0;
    border-radius: 20px;
    background: rgba(20,35,72,0.6);
    box-shadow:
      inset 0 0 20px #0b2a57,
      0 14px 30px rgba(1, 54, 105, 0.9);
  }

  /* Grid container */
  #grid {
    display: grid;
    grid-template-columns: repeat(18, 28px);
    grid-template-rows: repeat(12, 28px);
    gap: 5px;
    padding: 18px 18px 24px 18px;
    border-radius: 0 0 20px 20px;
    background: #07182c88;
  }

  /* Cell base */
  .cell {
    width: 28px; height: 28px;
    border-radius: 6px;
    position: relative;
    user-select: none;
    cursor: default;
    box-shadow:
      inset 0 0 8px #0f3a82,
      inset 0 -2px 6px #1b5cc6aa,
      0 3px 5px #0d1f3b90;
    transition:
      background-color 0.3s cubic-bezier(.4,0,.2,1),
      box-shadow 0.5s cubic-bezier(.4,0,.2,1),
      transform 0.35s ease,
      filter 0.4s ease;
  }

  /* Terrain types */
  .cell.empty {
    background-color: #09203f;
  }

  .cell.wall {
    background: #0c1729;
    box-shadow:
      inset 0 0 7px #2c2347,
      0 2px 10px #482465aa;
  }

  .cell.start {
    background: linear-gradient(145deg, #08f7fe 0%, #00f2fe 100%);
    box-shadow:
      0 0 18px 4px #00f2fe,
      inset 0 0 10px 3px #08f7fe;
    position: relative;
    overflow: visible;
    transform-origin: center;
    animation: pulseStart 2.5s ease-in-out infinite;
  }

  .cell.end {
    background: linear-gradient(45deg, #ff416c 0%, #ff4b2b 100%);
    box-shadow:
      0 0 18px 4px #ff4b2b,
      inset 0 0 15px 5px #ff416c;
    position: relative;
    overflow: visible;
    transform-origin: center;
    animation: pulseEnd 2.5s ease-in-out infinite;
  }

  /* Visited */
  .cell.visited {
    background-color: #16407b;
    box-shadow: inset 0 0 10px #235393aa;
    filter: brightness(1.15);
    transform: scale(1.05);
  }

  /* Frontier cells (open set) */
  .cell.frontier {
    background: linear-gradient(135deg, #3877d6cc 25%, #82aaffdd 100%);
    box-shadow:
      0 0 10px 3px #2c68d437,
      inset 0 0 12px 3px #5c8edeaa;
    transform: scale(1.1);
  }

  /* Path cells */
  .cell.path {
    background: linear-gradient(135deg, #ff6519cc 30%, #ffd16cca 90%);
    box-shadow:
      0 0 14px 5px #ff8a1c88,
      inset 0 0 18px 5px #ffa33cbb;
    transform: scale(1.15);
    filter: drop-shadow(0 0 6px #ffa33daa);
  }

  /* Text inside cells - smooth transparent style */
  .cell span {
    position: absolute;
    width: 100%; height: 100%;
    top: 0; left: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 12px;
    font-weight: 600;
    text-shadow:
      0 0 4px #000000bb;
    color: #e3e9fccc;
    user-select: none;
    pointer-events: none;
    font-family: 'Montserrat', sans-serif;
  }

  /* Button panel */
  #buttons {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin: 0 0 1.8rem 0;
  }
  button {
    background: linear-gradient(145deg, #2c88ff, #004bbb);
    border: none;
    outline: none;
    color: white;
    font-weight: 700;
    font-family: 'Montserrat', sans-serif;
    font-size: 1rem;
    padding: 0.85rem 2rem;
    border-radius: 14px;
    cursor: pointer;
    box-shadow:
      0 6px 12px rgba(0,75,187,0.8),
      inset 0 -4px 6px #00256f;
    transition: background-color 0.3s ease, box-shadow 0.3s ease;
    user-select: none;
  }
  button:hover {
    background: linear-gradient(145deg, #3f9dff, #1d5fce);
    box-shadow:
      0 10px 20px rgba(0,118,255,0.7),
      inset 0 -5px 8px #004fbd;
  }
  button:active {
    background: #004bbb;
    box-shadow:
      inset 0 3px 5px #00368a;
    transform: translateY(2px);
  }

  /* Animations */

  @keyframes pulseStart {
    0%, 100% {
      transform: scale(1);
      box-shadow:
        0 0 18px 4px #00f2fe,
        inset 0 0 10px 3px #08f7fe;
    }
    50% {
      transform: scale(1.1);
      box-shadow:
        0 0 26px 8px #00f2fecc,
        inset 0 0 15px 5px #08f7fecc;
    }
  }

  @keyframes pulseEnd {
    0%, 100% {
      transform: scale(1);
      box-shadow:
        0 0 18px 4px #ff4b2b,
        inset 0 0 15px 5px #ff416c;
    }
    50% {
      transform: scale(1.12);
      box-shadow:
        0 0 28px 9px #ff4b2bcc,
        inset 0 0 20px 8px #ff416ccc;
    }
  }

  /* Footer - small note */
  #footer {
    font-size: 0.8rem;
    text-align: center;
    color: #6b85b9bb;
    font-style: italic;
    letter-spacing: 0.12em;
    margin-bottom: 2rem;
    user-select: none;
  }

</style>
</head>
<body>
  <h1>A* SEARCH</h1>
  <h2>Tracing the shortest path with heuristic guidance</h2>

  <section id="container" aria-label="A star search grid visualization">
    <div id="grid" aria-live="polite" aria-relevant="additions removals">
      <!-- grid cells generated by JS -->
    </div>
  </section>

  <div id="buttons" role="region" aria-label="Control buttons">
    <button id="runBtn" aria-label="Run A star search animation">Run Search</button>
    <button id="resetBtn" aria-label="Reset grid to initial state">Reset</button>
  </div>

  <div id="footer">Visualization by GPT &mdash; Elegant A* Search Demo</div>

<script>
(() => {

  // Configuration of grid size
  const COLS = 18;
  const ROWS = 12;

  // Node types
  const TYPE_EMPTY = 'empty';
  const TYPE_WALL = 'wall';
  const TYPE_START = 'start';
  const TYPE_END = 'end';

  // Reference to container
  const gridEl = document.getElementById('grid');
  const runBtn = document.getElementById('runBtn');
  const resetBtn = document.getElementById('resetBtn');

  // Grid data: each node has { x, y, f, g, h, type, neighbors, previous }
  // We'll build this structure on start.
  let grid = [];

  // Start and end nodes
  let startNode = null;
  let endNode = null;

  // Animation variables
  let animationQueue = [];
  let animationFrameId = null;
  let animationCancelled = false;

  // Heuristic function (Manhattan)
  function heuristic(a, b) {
    return Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
  }

  // Initialize grid data and DOM
  function initGrid() {
    grid = [];
    gridEl.innerHTML = '';

    // Create nodes with base properties
    for(let y=0; y<ROWS; y++) {
      for(let x=0; x<COLS; x++) {
        let node = {
          x, y,
          f: 0,
          g: 0,
          h: 0,
          type: TYPE_EMPTY,
          neighbors: [],
          previous: null,
          el: null,
        };
        grid.push(node);
      }
    }

    // Assign neighbors (only 4 directions)
    grid.forEach(n => {
      const neighbors = [];
      const {x, y} = n;
      if (y > 0) neighbors.push(getNode(x, y-1));
      if (y < ROWS-1) neighbors.push(getNode(x, y+1));
      if (x > 0) neighbors.push(getNode(x-1, y));
      if (x < COLS-1) neighbors.push(getNode(x+1, y));
      n.neighbors = neighbors;
    });

    // Walls generation: some aesthetic pattern for elegance
    // Pattern: vertical stripes + random dots with glow effect
    const wallPositions = new Set();

    // Vertical stripes (cool blue shadows)
    for(let x=3; x<COLS; x+=5) {
      for(let y=1; y<ROWS-1; y++) {
        wallPositions.add(`${x},${y}`);
      }
    }
    // Random "floating" walls with soft glow, about a dozen
    for(let i=0; i<14; i++) {
      let wx = 2 + Math.floor(Math.random()*(COLS-4));
      let wy = 1 + Math.floor(Math.random()*(ROWS-2));
      wallPositions.add(`${wx},${wy}`);
    }

    // Assign walls
    grid.forEach(n => {
      if (wallPositions.has(`${n.x},${n.y}`)) n.type = TYPE_WALL;
    });

    // Define fixed start and end - symmetric and elegant positions
    startNode = getNode(1, Math.floor(ROWS/2));
    endNode = getNode(COLS-2, Math.floor(ROWS/2));

    startNode.type = TYPE_START;
    endNode.type = TYPE_END;

    // Create DOM elements for each node, with data attributes for reference and accessibility
    grid.forEach(node => {
      const cell = document.createElement('div');
      cell.className = `cell ${node.type}`;
      cell.setAttribute('data-x', node.x);
      cell.setAttribute('data-y', node.y);
      cell.setAttribute('aria-label', node.type === TYPE_START ? "Start node" :
                                       node.type === TYPE_END ? "End node" :
                                       node.type === TYPE_WALL ? "Wall" :
                                       "Empty node");
      if(node.type === TYPE_START) cell.setAttribute('aria-current', 'step');
      node.el = cell;

      // Optional: show coordinates unobtrusively on hover
      // (Commented out for cleaner UI)
      // let coordSpan = document.createElement('span');
      // coordSpan.textContent = `${node.x},${node.y}`;
      // cell.appendChild(coordSpan);

      gridEl.appendChild(cell);
    });
  }

  // Get node by x,y coordinates
  function getNode(x, y) {
    if (x < 0 || y < 0 || x >= COLS || y >= ROWS) return null;
    return grid[y*COLS + x];
  }

  // Core A* Search algorithm implementation
  // Returns an animation queue of steps:
  // Each step: { type: 'visit' | 'frontier' | 'path', node }
  function aStar() {
    const openSet = [];
    const closedSet = new Set();

    openSet.push(startNode);

    // Initialize costs
    grid.forEach(n => {
      n.f = Infinity;
      n.g = Infinity;
      n.h = 0;
      n.previous = null;
    });
    startNode.g = 0;
    startNode.h = heuristic(startNode, endNode);
    startNode.f = startNode.h;

    const animationSteps = [];

    while (openSet.length > 0) {
      // Sort openSet by f value (lowest first)
      openSet.sort((a,b) => a.f - b.f);
      let current = openSet.shift();

      // Add current to closedSet
      closedSet.add(current);

      // Mark node as visited
      if(current !== startNode && current !== endNode) animationSteps.push({type:'visited',node:current});

      // Found the end
      if(current === endNode) {
        // Trace path backward
        let pathNode = current;
        const pathNodes = [];
        while(pathNode.previous && pathNode !== startNode) {
          pathNodes.push(pathNode);
          pathNode = pathNode.previous;
        }
        pathNodes.reverse();

        for(const pn of pathNodes) {
          animationSteps.push({type:'path',node:pn});
        }
        return animationSteps;
      }

      // Check neighbors
      for(const neighbor of current.neighbors) {
        if (neighbor.type === TYPE_WALL || closedSet.has(neighbor)) continue;
        let tentative_g = current.g + 1; // cost between nodes is 1

        if (tentative_g < neighbor.g) {
          neighbor.previous = current;
          neighbor.g = tentative_g;
          neighbor.h = heuristic(neighbor, endNode);
          neighbor.f = neighbor.g + neighbor.h;
          if(!openSet.includes(neighbor)) {
            openSet.push(neighbor);
            if(neighbor !== endNode && neighbor !== startNode) animationSteps.push({type:'frontier',node:neighbor});
          }
        }
      }
    }
    // No path found - return empty path but still return steps as visited as much as explored
    return animationSteps;
  }

  // Animate the algorithm steps
  function animate(steps) {
    let i = 0;

    animationCancelled = false;

    function nextStep() {
      if(animationCancelled) return;

      if(i >= steps.length) {
        runBtn.disabled = false;
        resetBtn.disabled = false;
        runBtn.textContent = "Run Search";
        return;
      }

      const {type, node} = steps[i];
      i++;

      switch(type) {
        case 'visited':
          node.el.classList.add('visited');
          node.el.classList.remove('frontier');
          break;
        case 'frontier':
          node.el.classList.add('frontier');
          break;
        case 'path':
          node.el.classList.add('path');
          break;
      }
      // Animate next step after delay
      animationFrameId = setTimeout(nextStep, 65);
    }

    nextStep();
  }

  // Reset visual states except walls/start/end
  function resetVisuals() {
    animationCancelled = true;
    if(animationFrameId) window.clearTimeout(animationFrameId);

    grid.forEach(node => {
      node.el.classList.remove('visited','frontier','path');
      // Reset walls, start, end remain with respective classes
      if(node.type === TYPE_WALL) {
        node.el.className = 'cell wall';
      } else if(node === startNode) {
        node.el.className = 'cell start';
      } else if(node === endNode) {
        node.el.className = 'cell end';
      } else {
        node.el.className = 'cell empty';
      }
      node.previous = null;
      node.f = Infinity;
      node.g = Infinity;
      node.h = 0;
    });
  }

  // Handle Run Search button click
  runBtn.addEventListener('click', () => {
    runBtn.disabled = true;
    resetBtn.disabled = true;
    runBtn.textContent = "Searching...";
    resetVisuals();

    // Small delay to let UI update before calculation
    setTimeout(() => {
      const steps = aStar();
      animate(steps);
    }, 300);
  });

  // Handle Reset button click
  resetBtn.addEventListener('click', () => {
    resetVisuals();
  });

  // Initialization on load
  initGrid();

})();
</script>
</body>
</html>
