<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amortized Analysis Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background-color 0.3s ease;
        }

        h1 {
            font-size: 3rem;
            color: #4a90e2;
            margin-bottom: 20px;
            text-align: center;
        }

        .container {
            position: relative;
            width: 80%;
            max-width: 700px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            background: linear-gradient(135deg, #eaeaea 0%, #f4f4f9 100%);
            animation: fadeIn 2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .chart {
            width: 100%;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .bar {
            width: 30px;
            height: 0;
            background-color: #4a90e2;
            margin: 0 5px;
            transition: height 0.5s ease, transform 0.5s ease;
        }

        .footer {
            text-align: center;
            padding: 20px 0;
            font-size: 1rem;
            color: #666;
        }

        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4a90e2;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #357ab7;
        }

        .hidden {
            display: none;
        }

        .animated-text {
            opacity: 0;
            transition: opacity 1s ease;
        }

        .visible {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Amortized Analysis</h1>
        <div class="chart" id="chart">
            <div class="bar" style="height: 50%;"></div>
            <div class="bar" style="height: 70%;"></div>
            <div class="bar" style="height: 40%;"></div>
            <div class="bar" style="height: 90%;"></div>
            <div class="bar" style="height: 60%;"></div>
        </div>
        <button class="button" id="showTextButton">Show Explanation</button>
        <div class="footer">
            <p class="animated-text hidden" id="explanation">Amortized Analysis helps us study the
                efficiency of an algorithm across multiple operations. By averaging out the time complexity
                over a sequence of operations, it offers a more holistic view of performance.</p>
        </div>
    </div>

    <script>
        document.getElementById("showTextButton").onclick = function() {
            const explanation = document.getElementById("explanation");
            explanation.classList.toggle("visible");
            explanation.classList.toggle("hidden");

            // Animate bars
            const bars = document.querySelectorAll(".bar");
            bars.forEach((bar, index) => {
                setTimeout(() => {
                    bar.style.height = (Math.random() * 100) + '%';
                    bar.style.transform = 'translateY(0)';
                }, index * 100);
            });
        };
    </script>
</body>

</html>
