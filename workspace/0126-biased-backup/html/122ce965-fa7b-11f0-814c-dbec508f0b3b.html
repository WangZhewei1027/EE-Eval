<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Interactive Demo</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
        }
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button-container {
            margin-bottom: 20px;
        }
        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>SQL Interactive Demo</h1>
    <p>Enter a SQL query and execute it.</p>
    <div class="button-container">
        <button id="run-button">Run</button>
        <button id="edit-button">Edit</button>
        <button id="history-button">History</button>
        <button id="debug-button">Debug</button>
        <button id="clear-button">Clear</button>
    </div>
    <div class="sql-input-container">
        <label for="sql-input">SQL Query:</label>
        <textarea id="sql-input" readonly></textarea>
    </div>
    <div class="output-container">
        <label for="sql-output">Output:</label>
        <textarea id="sql-output" readonly></textarea>
    </div>
    <script>
        const sqlInput = document.getElementById('sql-input');
        const runButton = document.getElementById('run-button');
        const editButton = document.getElementById('edit-button');
        const historyButton = document.getElementById('history-button');
        const debugButton = document.getElementById('debug-button');
        const clearButton = document.getElementById('clear-button');
        const sqlOutput = document.getElementById('sql-output');

        runButton.addEventListener('click', () => {
            const query = sqlInput.value.trim();
            if (query) {
                executeQuery(query);
            } else {
                alert('Please enter a query');
            }
        });

        editButton.addEventListener('click', () => {
            const query = sqlInput.value.trim();
            if (query) {
                sqlInput.value = query;
                sqlOutput.value = '';
            }
        });

        historyButton.addEventListener('click', () => {
            sqlOutput.value = sqlInput.value;
        });

        debugButton.addEventListener('click', () => {
            console.log('Debug output');
        });

        clearButton.addEventListener('click', () => {
            sqlInput.value = '';
            sqlOutput.value = '';
        });

        function executeQuery(query) {
            fetch('/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            })
            .then(response => response.text())
            .then(output => {
                sqlOutput.value = output;
            })
            .catch(error => {
                sqlOutput.value = `Error: ${error}`;
            });
        }
    </script>
</div>
</body>
</html>
