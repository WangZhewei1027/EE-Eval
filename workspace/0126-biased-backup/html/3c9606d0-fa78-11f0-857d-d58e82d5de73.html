<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hash Map Visualization — Elegant Concept Exploration</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

  :root {
    --color-bg: #0f1c2f;
    --color-primary: #4a90e2;
    --color-secondary: #50e3c2;
    --color-accent: #f5a623;
    --color-text-light: #e1e9f0;
    --color-text-dark: #25313c;
    --color-shadow: rgba(10, 25, 47, 0.4);

    --shadow-glow: 0 0 20px rgba(74,144,226,0.6);
    --transition-speed: 0.4s ease-in-out;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin:0;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f1c2f 0%, #142a53 100%);
    font-family: 'Poppins', sans-serif;
    color: var(--color-text-light);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
  }

  .container {
    max-width: 960px;
    width: 100%;
    background: linear-gradient(145deg, #162a4d, #1e3b6d);
    border-radius: 28px;
    box-shadow:
      0 8px 30px var(--color-shadow),
      inset 0 0 15px #316ab6cc;
    overflow: hidden;
    user-select: none;
  }

  header {
    padding: 24px 40px 12px;
    text-align: center;
    border-bottom: 1px solid #316ab6aa;
    background: linear-gradient(90deg, #21497a 0%, #2e5f9b 100%);
  }

  header h1 {
    font-weight: 600;
    font-size: 2.75rem;
    letter-spacing: 0.08em;
    color: var(--color-secondary);
    text-shadow:
      0 0 8px var(--color-secondary),
      0 0 15px var(--color-primary);
  }

  header p {
    margin-top: 4px;
    font-weight: 300;
    font-size: 1.1rem;
    color: #a2cddfcc;
    letter-spacing: 0.04em;
    font-style: italic;
  }

  main {
    padding: 36px 48px 48px;
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  /* Hash Map Visualization Container */
  .hashmap-visual {
    position: relative;
    background: #172b56;
    border-radius: 22px;
    padding: 28px 28px 38px;
    box-shadow:
      inset 0 0 20px #1b3b7f,
      0 12px 24px rgba(17,31,59,0.6);
  }

  /* Title on hashmap */
  .hashmap-visual h2 {
    color: var(--color-accent);
    font-weight: 600;
    font-size: 1.9rem;
    margin-bottom: 24px;
    letter-spacing: 0.06em;
    text-shadow:
      0 0 8px var(--color-accent);
  }

  /* The table/gird for buckets */
  .buckets {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 18px 18px;
  }

  /* Single bucket */
  .bucket {
    background: linear-gradient(145deg, #284c89, #1d366f);
    border-radius: 16px;
    min-height: 120px;
    box-shadow:
      inset 0 0 10px #406db8,
      0 6px 10px #132a5a88;
    position: relative;
    transition: box-shadow var(--transition-speed);
    cursor: default;
    overflow: visible;
  }

  .bucket.highlighted {
    box-shadow:
      inset 0 0 24px #50e3c299,
      0 8px 25px #50e3c2cc;
    background: linear-gradient(145deg, #395ea9, #2b4a8c);
  }

  /* Bucket index number */
  .bucket-index {
    position: absolute;
    top: 10px;
    left: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--color-secondary);
    text-shadow: 0 0 6px #387f7aaa;
    user-select: none;
    letter-spacing: 0.05em;
  }

  /* Linked List inside a bucket (chained items) */
  .bucket .chain {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
    margin-top: 34px;
    perspective: 1400px;
  }

  /* Single key-value pair in the bucket */
  .pair {
    background: linear-gradient(145deg, #3b73d0, #1a4bb9);
    padding: 10px 16px;
    min-width: 85px;
    border-radius: 14px;
    box-shadow:
      0 3px 7px #1f4493cc,
      inset 0 2px 6px #5a90e5cc;
    color: var(--color-text-light);
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
    text-align: center;
    position: relative;
    user-select: none;
    transform-style: preserve-3d;
    animation: fadeInUp 0.6s ease forwards;
  }

  /* keys and values style */
  .pair .key {
    color: #81d4fa;
    text-shadow: 0 0 6px #81d4fa99;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.06em;
  }

  .pair .value {
    margin-top: 2px;
    color: #cbdcffcc;
    font-weight: 500;
    font-size: 0.88rem;
    font-style: italic;
    text-shadow: 0 0 4px #3b6ed9aa;
  }

  /* Arrows between pairs for chaining */
  .chain .pair:not(:last-child)::after {
    content: "";
    position: absolute;
    right: -36px;
    top: 50%;
    width: 32px;
    height: 4px;
    background:
      linear-gradient(90deg, var(--color-secondary), var(--color-primary));
    border-radius: 10px;
    transform: translateY(-50%);
    filter: drop-shadow(0 0 3px var(--color-secondary));
    animation: pulseArrow 1.9s infinite;
  }

  /* Arrows vertical when bucket has more than one pair */
  @media (min-width: 450px) {
    .chain {
      flex-direction: row;
    }
    .chain .pair:not(:last-child)::after {
      top: 50%;
      left: 100%;
      transform: translate(12px, -50%);
    }
  }

  /* Hash function bar */
  .hash-function {
    margin-top: 40px;
    padding: 18px 32px;
    border-radius: 24px;
    background: linear-gradient(145deg, #375f96, #2b4a83);
    box-shadow:
      inset 0 0 14px #5481d3cc,
      0 5px 20px rgba(0, 109, 243, 0.45);
    color: var(--color-accent);
    font-weight: 600;
    font-size: 1.3rem;
    text-align: center;
    letter-spacing: 0.06em;
    user-select: none;
    font-family: 'Courier New', Courier, monospace;
    position: relative;
  }

  .hash-function::before {
    content: "hash(key) = ";
    position: absolute;
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    color: #88c9f9;
    font-weight: 700;
    font-size: 1.5rem;
    text-shadow: 0 0 8px #55acffba;
  }

  /* Button controls */
  .controls {
    margin-top: 40px;
    text-align: center;
  }

  button {
    background: linear-gradient(145deg, #50e3c2cc, #4ac2bbcc);
    border: none;
    padding: 14px 28px;
    border-radius: 34px;
    font-weight: 600;
    font-size: 1.15rem;
    color: var(--color-text-dark);
    cursor: pointer;
    box-shadow:
      0 8px 20px #42b8b8cc,
      inset 0 3px 6px #7febf2aa;
    transition:
      background-color 0.32s ease,
      box-shadow 0.32s ease,
      transform 0.3s ease;
    user-select: none;
    letter-spacing: 0.06em;
  }

  button:hover {
    background: linear-gradient(145deg, #50e3c249, #48c8b7bb);
    box-shadow:
      0 12px 28px #34aaa4dd,
      inset 0 4px 9px #82f0e5cc;
    transform: translateY(-2px);
  }

  button:active {
    background: linear-gradient(145deg, #44b9abcc, #3ca495cc);
    box-shadow:
      0 4px 10px #298b7cbb,
      inset 0 2px 5px #5cb8a9bb;
    transform: translateY(0);
  }

  /* Animations */
  @keyframes fadeInUp {
    0% {
      opacity: 0;
      transform: translateY(10px) translateZ(0);
    }
    100% {
      opacity: 1;
      transform: translateY(0) translateZ(0);
    }
  }

  @keyframes pulseArrow {
    0% {
      opacity: 0.4;
      filter: drop-shadow(0 0 3px var(--color-secondary));
    }
    50% {
      opacity: 1;
      filter: drop-shadow(0 0 8px var(--color-primary));
    }
    100% {
      opacity: 0.4;
      filter: drop-shadow(0 0 3px var(--color-secondary));
    }
  }

  /* Footer credit */
  footer {
    margin-top: 40px;
    text-align: center;
    font-weight: 300;
    font-size: 0.9rem;
    letter-spacing: 0.07em;
    color: #314e80bb;
    user-select: none;
  }

  footer a {
    color: #50d1c6cc;
    font-weight: 600;
    text-decoration: none;
    transition: color 0.3s ease;
  }

  footer a:hover {
    color: #79e8d1ff;
    text-shadow: 0 0 5px #6de3cebb;
  }
</style>
</head>
<body>
  <section class="container" role="main" aria-label="Hash Map Visualization">
    <header>
      <h1>HASH MAP</h1>
      <p>Efficient Key-Value Lookup Structure</p>
    </header>
    <main>
      <section class="hashmap-visual" aria-label="Hash Map buckets and chains">
        <h2>Buckets (Hash Table)</h2>
        <div class="buckets" id="buckets" aria-live="polite" aria-relevant="additions removals">
          <!-- Buckets will be populated here by JS -->
        </div>
        <div class="hash-function" aria-label="Hash function">
          <code> (key &times; 2654435761) mod 8 </code>
        </div>
      </section>

      <div class="controls" aria-label="Interactive controls">
        <button id="shuffleBtn" aria-pressed="false" aria-live="polite">Shuffle Values</button>
      </div>
    </main>
    <footer>
      <small>Concept visualization by &copy; 2024 - <a href="https://github.com" target="_blank" rel="noopener noreferrer">Creative Dev</a></small>
    </footer>
  </section>

<script>
  (() => {
    const bucketsCount = 8;

    // Sample fixed keys with initial values for display
    // Keys and values mimic typical hash map example data
    // Collisions deliberately present: keys share same bucket index
    const entries = [
      { key: "apple", value: "fruit" },
      { key: "car", value: "vehicle" },
      { key: "dog", value: "animal" },
      { key: "blue", value: "color" },
      { key: "table", value: "furniture" },
      { key: "java", value: "language" },
      { key: "cat", value: "animal" },
      { key: "dogma", value: "belief" },
      { key: "ruby", value: "gem" },
      { key: "fish", value: "animal" },
      { key: "green", value: "color" },
      { key: "bus", value: "vehicle" },
    ];

    // Simple hash function mod bucketsCount:
    // (String char codes sum * prime) mod bucketsCount
    function hashKey(key) {
      let sum = 0;
      for(let i = 0; i < key.length; i++) {
        sum += key.charCodeAt(i);
      }
      return (sum * 2654435761) % bucketsCount; // multiplicative hash constant
    }

    // Structure buckets as array of arrays (chains)
    const chains = Array.from({ length: bucketsCount }, () => []);

    entries.forEach(({key, value}) => {
      const index = hashKey(key) >>> 0 % bucketsCount;
      chains[index].push({ key, value });
    });

    const bucketsContainer = document.getElementById("buckets");

    // Create bucket elements with chained pairs visual
    function renderBuckets() {
      bucketsContainer.innerHTML = "";
      chains.forEach((bucketItems, idx) => {
        const bucketEl = document.createElement("section");
        bucketEl.classList.add("bucket");
        bucketEl.setAttribute("aria-label", `Bucket index ${idx}, contains ${bucketItems.length} item${bucketItems.length !== 1 ? "s" : ""}`);
        bucketEl.setAttribute("role", "list");
        bucketEl.dataset.idx = idx;

        const indexLabel = document.createElement("div");
        indexLabel.className = "bucket-index";
        indexLabel.textContent = `#${idx}`;
        bucketEl.appendChild(indexLabel);

        if(bucketItems.length === 0) {
          // Empty bucket placeholder - subtle glow
          const emptyMsg = document.createElement("div");
          emptyMsg.style = "color:#425a92bb; font-style: italic; font-weight: 400; font-size: 0.94rem; padding-top: 44px; user-select:none; text-align:center";
          emptyMsg.textContent = "Empty";
          bucketEl.appendChild(emptyMsg);
        } else {
          // Show chain of pairs
          const chainEl = document.createElement("div");
          chainEl.className = "chain";
          bucketItems.forEach(({key, value}) => {
            const pairEl = document.createElement("div");
            pairEl.className = "pair";
            pairEl.setAttribute("role", "listitem");
            pairEl.title = `Key: ${key}, Value: ${value}`;

            const keySpan = document.createElement("div");
            keySpan.className = "key";
            keySpan.textContent = key;

            const valueSpan = document.createElement("div");
            valueSpan.className = "value";
            valueSpan.textContent = value;

            pairEl.appendChild(keySpan);
            pairEl.appendChild(valueSpan);
            chainEl.appendChild(pairEl);
          });
          bucketEl.appendChild(chainEl);
        }
        bucketsContainer.appendChild(bucketEl);
      });
    }

    // Animate a highlight for buckets on shuffle
    function highlightRandomBucket() {
      // Remove any current highlight
      Array.from(bucketsContainer.children).forEach(b => b.classList.remove("highlighted"));
      // Pick random bucket index with items
      let candidateBuckets = [];
      chains.forEach((chain, idx) => {
        if(chain.length > 0) candidateBuckets.push(idx);
      });
      if(candidateBuckets.length === 0) return;
      const randomIdx = candidateBuckets[Math.floor(Math.random() * candidateBuckets.length)];
      const bucketEl = bucketsContainer.querySelector(`.bucket[data-idx="${randomIdx}"]`);
      if(bucketEl) {
        bucketEl.classList.add("highlighted");
      }
    }

    // Shuffle values within chains randomly
    function shuffleValues() {
      chains.forEach(chain => {
        if(chain.length > 1) {
          for(let i = chain.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [chain[i].value, chain[j].value] = [chain[j].value, chain[i].value];
          }
        }
      });
    }

    // Initialize visualization
    function init() {
      renderBuckets();
      highlightRandomBucket();
    }

    // Button to shuffle values (limited interactivity)
    const shuffleBtn = document.getElementById("shuffleBtn");
    shuffleBtn.addEventListener("click", () => {
      shuffleValues();
      renderBuckets();
      highlightRandomBucket();
    });

    // On load
    window.requestAnimationFrame(init);
  })();
</script>
</body>
</html>
