<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integration Testing Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .control-group {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<h1>Integration Testing Live Demo</h1>

<div class="control-group">
    <label for="inputField">Type a value:</label>
    <input type="text" id="inputField" placeholder="Enter a number">
    <button onclick="submitValue()">Submit</button>
    <p id="submitResult"></p>
</div>

<div class="control-group">
    <label for="slider">Adjust the slider:</label>
    <input type="range" id="slider" min="0" max="100" value="50" oninput="updateSliderValue()">
    <p>Current Value: <span id="sliderValue">50</span></p>
</div>

<div class="control-group">
    <button onclick="resetAll()">Reset All</button>
</div>

<div class="control-group">
    <h3>Integration Test Results:</h3>
    <ul id="testResults">
        <li>No tests run yet.</li>
    </ul>
</div>

<script>
    let testResults = [];

    function submitValue() {
        const inputVal = document.getElementById('inputField').value;
        const resultArea = document.getElementById('submitResult');
        const sliderValue = document.getElementById('slider').value;
        
        if (isNaN(inputVal) || inputVal === "") {
            resultArea.innerText = "Please enter a valid number.";
            return;
        }

        const resultText = `Submitted Value: ${inputVal}, Slider Value: ${sliderValue}`;
        resultArea.innerText = resultText;

        // Log the result for integration testing
        logTestResult(resultText);
    }

    function updateSliderValue() {
        const sliderValue = document.getElementById('slider').value;
        document.getElementById('sliderValue').innerText = sliderValue;
    }

    function resetAll() {
        document.getElementById('inputField').value = '';
        document.getElementById('submitResult').innerText = '';
        document.getElementById('slider').value = 50;
        document.getElementById('sliderValue').innerText = '50';
        testResults = [];
        document.getElementById('testResults').innerHTML = '<li>No tests run yet.</li>';
    }

    function logTestResult(result) {
        testResults.push(result);
        updateTestResultsDisplay();
    }

    function updateTestResultsDisplay() {
        const resultsList = document.getElementById('testResults');
        resultsList.innerHTML = ''; // Clear existing results
        testResults.forEach((testResult, index) => {
            const listItem = document.createElement('li');
            listItem.innerText = `Test ${index + 1}: ${testResult}`;
            resultsList.appendChild(listItem);
        });
    }
</script>

</body>
</html>
