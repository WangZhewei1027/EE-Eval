<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Binary Search Tree (BST) Interactive Demo</title>
  <style>
    /* Extremely minimal styling: keep default fonts and layout, only small resets for SVG space */
    html, body { margin: 8px; padding: 0; font-family: sans-serif; color: black; background: white; }
    button, input, select, textarea { margin: 2px; }
    #main { display: block; }
    #svgArea { border: 1px solid black; width: 100%; height: 420px; box-sizing: border-box; }
    .controls { margin-bottom: 6px; }
    .panel { margin-bottom: 8px; }
    pre { white-space: pre-wrap; word-wrap: break-word; max-height: 180px; overflow: auto; border: 1px solid black; padding: 4px; }
  </style>
</head>
<body>
  <h2>Binary Search Tree (BST) Interactive Demo</h2>

  <div id="main">

    <div class="panel controls">
      <label>Value:
        <input id="valueInput" type="text" size="6" placeholder="e.g. 42">
      </label>
      <button id="insertBtn">Insert</button>
      <button id="deleteBtn">Delete</button>
      <button id="searchBtn">Search</button>

      <label>Duplicates:
        <select id="dupMode">
          <option value="no">Disallow</option>
          <option value="left">Allow - go left</option>
          <option value="right">Allow - go right</option>
        </select>
      </label>

      <label>Step speed:
        <input id="speed" type="range" min="50" max="2000" value="400">
      </label>

      <label>Node radius:
        <input id="radius" type="range" min="8" max="28" value="14">
      </label>

      <label>Show heights:
        <input id="showHeight" type="checkbox">
      </label>

      <label>Show balance:
        <input id="showBalance" type="checkbox">
      </label>
    </div>

    <div class="panel controls">
      <button id="stepInsertBtn">Step Insert (interactive)</button>
      <button id="stepDeleteBtn">Step Delete (interactive)</button>
      <button id="stepSearchBtn">Step Search (interactive)</button>

      <button id="playStepsBtn">Play Steps</button>
      <button id="pauseBtn">Pause</button>
      <button id="stepForwardBtn">Step Forward</button>
      <button id="stepBackBtn">Step Back</button>
      <button id="clearStepsBtn">Clear Steps</button>

      <button id="undoBtn">Undo</button>
      <button id="redoBtn">Redo</button>
    </div>

    <div class="panel controls">
      <label>Bulk CSV:
        <input id="bulkInput" type="text" size="40" placeholder="e.g. 5,3,8,2,6">
      </label>
      <button id="bulkInsertBtn">Bulk Insert</button>

      <label>Random count:
        <input id="randCount" type="number" value="7" min="1" max="200" style="width:60px">
      </label>
      <label>min:
        <input id="randMin" type="number" value="1" style="width:60px">
      </label>
      <label>max:
        <input id="randMax" type="number" value="100" style="width:60px">
      </label>
      <button id="randBtn">Generate Random</button>

      <button id="clearBtn">Clear</button>
      <button id="mirrorBtn">Mirror (invert)</button>
      <button id="balanceBtn">Rebuild Balanced</button>
      <button id="avlRebalanceBtn">AVL Rebalance</button>
    </div>

    <div class="panel controls">
      <label>Select node by clicking on it. Selected id: <span id="selectedInfo">none</span></label>
      <button id="deleteSelectedBtn">Delete Selected</button>
      <button id="rotateLeftBtn">Rotate Left</button>
      <button id="rotateRightBtn">Rotate Right</button>
      <button id="showSubtreeBtn">Show Subtree (selected)</button>
      <button id="kthBtn">Find k-th Smallest</button>
      <input id="kInput" type="number" style="width:60px" value="1" min="1">
    </div>

    <div class="panel controls">
      <button id="inorderBtn">In-order</button>
      <button id="preorderBtn">Pre-order</button>
      <button id="postorderBtn">Post-order</button>
      <button id="levelorderBtn">Level-order</button>
      <button id="clearLogBtn">Clear Log</button>
    </div>

    <div class="panel">
      <div id="svgAreaContainer">
        <svg id="svgArea" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>

    <div class="panel">
      <strong>Traversal / Info / Logs</strong>
      <div>
        <pre id="infoArea">Tree is empty.</pre>
      </div>
    </div>

    <div class="panel">
      <strong>Save / Load</strong>
      <button id="exportBtn">Export JSON (copy)</button>
      <button id="importBtn">Import JSON (paste)</button>
      <button id="clearStorageBtn">Clear saved</button>
    </div>

    <div class="panel">
      <strong>Internal Step Log (click an entry to jump to that state)</strong>
      <pre id="stepLog"></pre>
    </div>

  </div>

  <script>
    // Minimal BST interactive demo with rich controls. No visual flair.
    (function(){
      // Utility
      function idGen() {
        let i = 1;
        return function(){ return i++; };
      }
      const nextId = idGen();
      function clamp(v,min,max){return Math.max(min,Math.min(max,v));}

      // Node class
      class Node {
        constructor(value){
          this.id = nextId();
          this.value = value;
          this.left = null;
          this.right = null;
          this.parent = null;
          this.height = 0;
          this.size = 1;
        }
      }

      // BST state
      let root = null;
      let selected = null;
      let history = [];
      let future = [];
      let steps = []; // step frames for play/step
      let currentStepIndex = -1;
      let playing = false;
      let playTimer = null;

      // Settings
      const settings = {
        dupMode: 'no',
        speed: 400,
        radius: 14,
        showHeight: false,
        showBalance: false
      };

      // DOM handles
      const svg = document.getElementById('svgArea');
      const valueInput = document.getElementById('valueInput');
      const insertBtn = document.getElementById('insertBtn');
      const deleteBtn = document.getElementById('deleteBtn');
      const searchBtn = document.getElementById('searchBtn');
      const dupMode = document.getElementById('dupMode');
      const speedRange = document.getElementById('speed');
      const radiusRange = document.getElementById('radius');
      const showHeightCb = document.getElementById('showHeight');
      const showBalanceCb = document.getElementById('showBalance');

      const stepInsertBtn = document.getElementById('stepInsertBtn');
      const stepDeleteBtn = document.getElementById('stepDeleteBtn');
      const stepSearchBtn = document.getElementById('stepSearchBtn');
      const playStepsBtn = document.getElementById('playStepsBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const stepForwardBtn = document.getElementById('stepForwardBtn');
      const stepBackBtn = document.getElementById('stepBackBtn');
      const clearStepsBtn = document.getElementById('clearStepsBtn');

      const undoBtn = document.getElementById('undoBtn');
      const redoBtn = document.getElementById('redoBtn');

      const bulkInput = document.getElementById('bulkInput');
      const bulkInsertBtn = document.getElementById('bulkInsertBtn');
      const randCount = document.getElementById('randCount');
      const randMin = document.getElementById('randMin');
      const randMax = document.getElementById('randMax');
      const randBtn = document.getElementById('randBtn');
      const clearBtn = document.getElementById('clearBtn');
      const mirrorBtn = document.getElementById('mirrorBtn');
      const balanceBtn = document.getElementById('balanceBtn');
      const avlRebalanceBtn = document.getElementById('avlRebalanceBtn');

      const selectedInfo = document.getElementById('selectedInfo');
      const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
      const rotateLeftBtn = document.getElementById('rotateLeftBtn');
      const rotateRightBtn = document.getElementById('rotateRightBtn');
      const showSubtreeBtn = document.getElementById('showSubtreeBtn');
      const kthBtn = document.getElementById('kthBtn');
      const kInput = document.getElementById('kInput');

      const inorderBtn = document.getElementById('inorderBtn');
      const preorderBtn = document.getElementById('preorderBtn');
      const postorderBtn = document.getElementById('postorderBtn');
      const levelorderBtn = document.getElementById('levelorderBtn');
      const clearLogBtn = document.getElementById('clearLogBtn');

      const infoArea = document.getElementById('infoArea');
      const exportBtn = document.getElementById('exportBtn');
      const importBtn = document.getElementById('importBtn');
      const clearStorageBtn = document.getElementById('clearStorageBtn');

      const stepLog = document.getElementById('stepLog');

      // Helpers to compute heights and sizes
      function recompute(node){
        if(!node) return -1;
        const lh = node.left ? recompute(node.left) : -1;
        const rh = node.right ? recompute(node.right) : -1;
        node.height = 1 + Math.max(lh, rh);
        node.size = 1 + (node.left ? node.left.size : 0) + (node.right ? node.right.size : 0);
        return node.height;
      }

      function computeBalance(node){
        if(!node) return 0;
        const lh = node.left ? node.left.height + 1 : 0;
        const rh = node.right ? node.right.height + 1 : 0;
        return lh - rh;
      }

      // Save and restore state for undo/redo and stepping
      function snapshotState(){
        return JSON.stringify(serialize(root));
      }
      function pushHistory(){
        history.push(snapshotState());
        if(history.length > 200) history.shift();
        future = [];
        updateInfo();
      }
      function undo(){
        if(history.length === 0) return;
        const state = history.pop();
        future.push(snapshotState());
        root = deserialize(JSON.parse(state));
        recompute(root);
        selected = null;
        pushLog("Undo: restored previous state");
        render();
      }
      function redo(){
        if(future.length === 0) return;
        const state = future.pop();
        history.push(snapshotState());
        root = deserialize(JSON.parse(state));
        recompute(root);
        selected = null;
        pushLog("Redo: restored next state");
        render();
      }

      // Serialization
      function serialize(node){
        if(!node) return null;
        return {
          id: node.id,
          value: node.value,
          left: serialize(node.left),
          right: serialize(node.right)
        };
      }
      function deserialize(obj){
        if(!obj) return null;
        const n = new Node(obj.value);
        n.id = obj.id || nextId();
        n.left = deserialize(obj.left);
        n.right = deserialize(obj.right);
        if(n.left) n.left.parent = n;
        if(n.right) n.right.parent = n;
        return n;
      }

      // Insert (non-stepping)
      function bstInsert(val){
        if(root === null){
          root = new Node(val);
          pushLog("Inserted root: " + val);
          recompute(root);
          pushHistory();
          render();
          return root;
        }
        let cur = root;
        while(true){
          if(val === cur.value){
            if(settings.dupMode === 'no'){
              pushLog("Duplicate not allowed: " + val);
              return null;
            } else if(settings.dupMode === 'left'){
              if(cur.left === null){
                const n = new Node(val);
                cur.left = n; n.parent = cur;
                recompute(root);
                pushHistory();
                render();
                pushLog("Inserted " + val + " as left duplicate of " + cur.value);
                return n;
              } else cur = cur.left;
            } else {
              if(cur.right === null){
                const n = new Node(val);
                cur.right = n; n.parent = cur;
                recompute(root);
                pushHistory();
                render();
                pushLog("Inserted " + val + " as right duplicate of " + cur.value);
                return n;
              } else cur = cur.right;
            }
          } else if(val < cur.value){
            if(cur.left === null){
              const n = new Node(val);
              cur.left = n; n.parent = cur;
              recompute(root);
              pushHistory();
              render();
              pushLog("Inserted " + val + " to left of " + cur.value);
              return n;
            } else cur = cur.left;
          } else {
            if(cur.right === null){
              const n = new Node(val);
              cur.right = n; n.parent = cur;
              recompute(root);
              pushHistory();
              render();
              pushLog("Inserted " + val + " to right of " + cur.value);
              return n;
            } else cur = cur.right;
          }
        }
      }

      // Search (non-stepping)
      function bstSearch(val){
        let cur = root;
        let path = [];
        while(cur){
          path.push(cur);
          if(val === cur.value) return {node: cur, path: path};
          if(val < cur.value) cur = cur.left;
          else cur = cur.right;
        }
        return {node: null, path: path};
      }

      // Delete (non-stepping)
      function bstDelete(val){
        const res = bstSearch(val);
        const node = res.node;
        if(!node){
          pushLog("Delete: value not found: " + val);
          return null;
        }
        const deletedNode = deleteNode(node);
        recompute(root);
        pushHistory();
        render();
        pushLog("Deleted node: " + val);
        return deletedNode;
      }

      function deleteNode(node){
        if(!node.left && !node.right){
          // leaf
          replaceNodeInParent(node, null);
        } else if(node.left && !node.right){
          replaceNodeInParent(node, node.left);
        } else if(!node.left && node.right){
          replaceNodeInParent(node, node.right);
        } else {
          // two children: find successor (min of right)
          const succ = minNode(node.right);
          const succVal = succ.value;
          node.value = succVal;
          // delete successor
          deleteNode(succ);
        }
        // if root got replaced, update root variable
      }

      function replaceNodeInParent(node, replacement){
        if(node.parent){
          if(node.parent.left === node) node.parent.left = replacement;
          else node.parent.right = replacement;
        } else {
          root = replacement;
        }
        if(replacement) replacement.parent = node.parent;
      }

      function minNode(node){
        let cur = node;
        while(cur.left) cur = cur.left;
        return cur;
      }

      function maxNode(node){
        let cur = node;
        while(cur.right) cur = cur.right;
        return cur;
      }

      // Rotations (local)
      function rotateLeft(x){
        if(!x || !x.right) { pushLog("Rotate left not possible"); return; }
        const y = x.right;
        x.right = y.left;
        if(y.left) y.left.parent = x;
        y.parent = x.parent;
        if(!x.parent) root = y;
        else if(x === x.parent.left) x.parent.left = y;
        else x.parent.right = y;
        y.left = x;
        x.parent = y;
        recompute(root);
        pushHistory();
        render();
        pushLog("Rotated left at node " + x.value);
      }
      function rotateRight(x){
        if(!x || !x.left) { pushLog("Rotate right not possible"); return; }
        const y = x.left;
        x.left = y.right;
        if(y.right) y.right.parent = x;
        y.parent = x.parent;
        if(!x.parent) root = y;
        else if(x === x.parent.left) x.parent.left = y;
        else x.parent.right = y;
        y.right = x;
        x.parent = y;
        recompute(root);
        pushHistory();
        render();
        pushLog("Rotated right at node " + x.value);
      }

      // Rebuild balanced from sorted array
      function buildBalancedFromSorted(arr, l=0, r=arr.length-1){
        if(l>r) return null;
        const m = Math.floor((l+r)/2);
        const n = new Node(arr[m]);
        n.left = buildBalancedFromSorted(arr, l, m-1);
        if(n.left) n.left.parent = n;
        n.right = buildBalancedFromSorted(arr, m+1, r);
        if(n.right) n.right.parent = n;
        return n;
      }
      function rebuildBalanced(){
        const arr = inorderValues();
        root = buildBalancedFromSorted(arr);
        recompute(root);
        pushHistory();
        render();
        pushLog("Rebuilt balanced tree from in-order sequence.");
      }

      // AVL rebalance: naive approach - perform rotations bottom-up
      function avlRebalance(){
        recompute(root);
        if(!root) return;
        // collect nodes in post-order and attempt balancing
        const nodes = [];
        (function post(node){
          if(!node) return;
          post(node.left); post(node.right);
          nodes.push(node);
        })(root);
        for(let node of nodes){
          recompute(root);
          const bal = computeBalance(node);
          if(bal > 1){
            // left heavy
            if(computeBalance(node.left) < 0){
              rotateLeft(node.left);
            }
            rotateRight(node);
          } else if(bal < -1){
            if(computeBalance(node.right) > 0){
              rotateRight(node.right);
            }
            rotateLeft(node);
          }
        }
        recompute(root);
        pushHistory();
        render();
        pushLog("Attempted AVL rebalancing (local rotations).");
      }

      // Utility traversals
      function inorderValues(){
        const res = [];
        (function dfs(n){ if(!n) return; dfs(n.left); res.push(n.value); dfs(n.right); })(root);
        return res;
      }
      function inorderNodesArray(){
        const res = [];
        (function dfs(n){ if(!n) return; dfs(n.left); res.push(n); dfs(n.right); })(root);
        return res;
      }
      function preorderValues(){
        const res = [];
        (function dfs(n){ if(!n) return; res.push(n.value); dfs(n.left); dfs(n.right); })(root);
        return res;
      }
      function postorderValues(){
        const res = [];
        (function dfs(n){ if(!n) return; dfs(n.left); dfs(n.right); res.push(n.value); })(root);
        return res;
      }
      function levelorderValues(){
        const res = [];
        if(!root) return res;
        const q = [root];
        while(q.length){
          const n = q.shift();
          res.push(n.value);
          if(n.left) q.push(n.left);
          if(n.right) q.push(n.right);
        }
        return res;
      }

      // Subtree info for selected
      function subtreeValues(node){
        const res = [];
        (function dfs(n){ if(!n) return; res.push(n.value); dfs(n.left); dfs(n.right); })(node);
        return res;
      }
      function subtreeSize(node){ return node ? node.size : 0; }
      function nodeDepth(node){
        let d = 0; let cur = node;
        while(cur && cur.parent){ d++; cur = cur.parent; }
        return d;
      }

      // Render SVG tree
      function render(){
        // clear svg contents
        while(svg.firstChild) svg.removeChild(svg.firstChild);
        recompute(root);

        const nodes = [];
        const positions = {};
        // compute x by inorder index
        const arr = inorderNodesArray();
        for(let i=0;i<arr.length;i++){
          nodes.push(arr[i]);
        }
        const width = svg.clientWidth || 800;
        const height = svg.clientHeight || 300;
        const marginX = 10;
        const marginY = 20;
        const levels = (root ? root.height + 1 : 1);
        const levelHeight = Math.max(24, Math.floor((height - 40)/levels));
        // compute x positions based on inorder index mapping
        const indexMap = new Map();
        for(let i=0;i<nodes.length;i++){
          indexMap.set(nodes[i].id, i);
        }
        // BFS to assign positions
        (function assign(node, depth){
          if(!node) return;
          const idx = indexMap.get(node.id) || 0;
          const x = marginX + (idx+1) * ((width-2*marginX) / (nodes.length+1));
          const y = marginY + depth * levelHeight;
          positions[node.id] = {x, y};
          assign(node.left, depth+1);
          assign(node.right, depth+1);
        })(root, 0);

        // draw edges first
        (function drawEdges(node){
          if(!node) return;
          if(node.left){
            const pa = positions[node.id];
            const pb = positions[node.left.id];
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", pa.x);
            line.setAttribute("y1", pa.y);
            line.setAttribute("x2", pb.x);
            line.setAttribute("y2", pb.y);
            line.setAttribute("stroke", "black");
            line.setAttribute("stroke-width", 1);
            svg.appendChild(line);
          }
          if(node.right){
            const pa = positions[node.id];
            const pb = positions[node.right.id];
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", pa.x);
            line.setAttribute("y1", pa.y);
            line.setAttribute("x2", pb.x);
            line.setAttribute("y2", pb.y);
            line.setAttribute("stroke", "black");
            line.setAttribute("stroke-width", 1);
            svg.appendChild(line);
          }
          drawEdges(node.left);
          drawEdges(node.right);
        })(root);

        // draw nodes
        (function drawNodes(node){
          if(!node) return;
          const pos = positions[node.id];
          if(!pos) return;
          const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
          g.setAttribute("data-id", node.id);
          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circle.setAttribute("cx", pos.x);
          circle.setAttribute("cy", pos.y);
          circle.setAttribute("r", settings.radius);
          circle.setAttribute("fill", "white");
          circle.setAttribute("stroke", "black");
          circle.setAttribute("stroke-width", selected === node ? 3 : 1);
          g.appendChild(circle);

          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("x", pos.x);
          text.setAttribute("y", pos.y + 4);
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("font-size", Math.max(10, settings.radius));
          text.textContent = String(node.value);
          g.appendChild(text);

          if(settings.showHeight){
            const ht = document.createElementNS("http://www.w3.org/2000/svg", "text");
            ht.setAttribute("x", pos.x);
            ht.setAttribute("y", pos.y - settings.radius - 2);
            ht.setAttribute("text-anchor", "middle");
            ht.setAttribute("font-size", Math.max(8, settings.radius - 6));
            ht.textContent = "h:" + node.height;
            g.appendChild(ht);
          }

          if(settings.showBalance){
            const bf = computeBalance(node);
            const bfText = document.createElementNS("http://www.w3.org/2000/svg", "text");
            bfText.setAttribute("x", pos.x + settings.radius + 8);
            bfText.setAttribute("y", pos.y - settings.radius - 2);
            bfText.setAttribute("font-size", Math.max(8, settings.radius - 6));
            bfText.textContent = "b:" + bf;
            g.appendChild(bfText);
          }

          // click handler to select
          g.addEventListener("click", function(evt){
            evt.stopPropagation();
            selected = node;
            updateSelectedInfo();
            render();
          });

          svg.appendChild(g);
          drawNodes(node.left);
          drawNodes(node.right);
        })(root);

        updateInfo();
      }

      function updateInfo(){
        let s = "";
        s += "Size: " + (root ? root.size : 0) + (root ? "    Height: " + root.height : "") + "\n";
        s += "In-order: " + inorderValues().join(", ") + "\n";
        s += "Pre-order: " + preorderValues().join(", ") + "\n";
        s += "Post-order: " + postorderValues().join(", ") + "\n";
        s += "Level-order: " + levelorderValues().join(", ") + "\n";
        if(selected){
          s += "\nSelected node:\n";
          s += "Value: " + selected.value + "  id:" + selected.id + "\n";
          s += "Depth: " + nodeDepth(selected) + "\n";
          s += "Parent: " + (selected.parent ? selected.parent.value : "none") + "\n";
          s += "Subtree size: " + subtreeSize(selected) + "\n";
          s += "Subtree values: " + subtreeValues(selected).join(", ") + "\n";
        }
        infoArea.textContent = s;
      }

      function updateSelectedInfo(){
        selectedInfo.textContent = selected ? (selected.value + " (id:" + selected.id + ")") : "none";
      }

      function pushLog(msg){
        const time = new Date().toLocaleTimeString();
        const line = "["+time+"] " + msg + "\n" + (stepStringFromRoot());
        stepLog.textContent = line + "\n\n" + stepLog.textContent;
      }

      function stepStringFromRoot(){
        return "state: size=" + (root ? root.size : 0) + "  in-order=[" + inorderValues().join(",") + "]";
      }

      // Stepping / frames. Each frame: {type:'compare'|'move'|'insert'|'delete'|'select', nodeId?, value?, message?}
      function createInsertionFrames(val){
        const frames = [];
        if(!root){
          frames.push({type:'insert', value: val, message: "Insert as root"});
          return frames;
        }
        let cur = root;
        while(cur){
          frames.push({type:'select', node: cur.id, message: "Compare with node " + cur.value});
          if(val === cur.value){
            if(settings.dupMode === 'no'){
              frames.push({type:'noop', message: "Duplicate, abort insert"});
              return frames;
            } else if(settings.dupMode === 'left'){
              frames.push({type:'move', dir:'left', node:cur.id, message: "Going left for duplicate"});
              if(!cur.left){
                frames.push({type:'insertChild', parent:cur.id, side:'left', value:val, message:"Insert left duplicate"});
                return frames;
              } else cur = cur.left;
            } else {
              frames.push({type:'move', dir:'right', node:cur.id, message: "Going right for duplicate"});
              if(!cur.right){
                frames.push({type:'insertChild', parent:cur.id, side:'right', value:val, message:"Insert right duplicate"});
                return frames;
              } else cur = cur.right;
            }
          } else if(val < cur.value){
            frames.push({type:'move', dir:'left', node: cur.id, message: "Go left"});
            if(!cur.left){
              frames.push({type:'insertChild', parent:cur.id, side:'left', value:val, message:"Insert as left child"});
              return frames;
            } else cur = cur.left;
          } else {
            frames.push({type:'move', dir:'right', node: cur.id, message: "Go right"});
            if(!cur.right){
              frames.push({type:'insertChild', parent:cur.id, side:'right', value:val, message:"Insert as right child"});
              return frames;
            } else cur = cur.right;
          }
        }
        return frames;
      }

      function createSearchFrames(val){
        const frames = [];
        let cur = root;
        while(cur){
          frames.push({type:'select', node: cur.id, message: "Compare with node " + cur.value});
          if(val === cur.value){
            frames.push({type:'found', node: cur.id, message: "Found value"});
            return frames;
          } else if(val < cur.value){
            frames.push({type:'move', dir:'left', node:cur.id, message: "Go left"});
            cur = cur.left;
          } else {
            frames.push({type:'move', dir:'right', node:cur.id, message: "Go right"});
            cur = cur.right;
          }
        }
        frames.push({type:'notfound', message: "Value not found"});
        return frames;
      }

      function findNodeById(id){
        if(!id || !root) return null;
        let found = null;
        (function dfs(n){
          if(!n) return;
          if(n.id === id){ found = n; return; }
          dfs(n.left); dfs(n.right);
        })(root);
        return found;
      }

      // Execute frame (mutating)
      function executeFrame(frame){
        switch(frame.type){
          case 'select':
            selected = findNodeById(frame.node) || null;
            updateSelectedInfo();
            pushLog(frame.message || ("Select node " + frame.node));
            break;
          case 'move':
            selected = findNodeById(frame.node) || null;
            updateSelectedInfo();
            pushLog(frame.message || ("Move from " + frame.node));
            break;
          case 'insert':
            // as root
            root = new Node(frame.value);
            pushLog(frame.message || ("Inserted root " + frame.value));
            break;
          case 'insertChild':
            {
              const parent = findNodeById(frame.parent);
              if(!parent){ pushLog("Parent not found for insertChild"); break; }
              const n = new Node(frame.value);
              if(frame.side === 'left') parent.left = n;
              else parent.right = n;
              n.parent = parent;
              pushLog(frame.message || ("Inserted child " + frame.value));
            }
            break;
          case 'found':
            selected = findNodeById(frame.node) || null;
            updateSelectedInfo();
            pushLog(frame.message || "Found node");
            break;
          case 'notfound':
            selected = null;
            updateSelectedInfo();
            pushLog(frame.message || "Not found");
            break;
          case 'noop':
            pushLog(frame.message || "No operation");
            break;
        }
        recompute(root);
        render();
      }

      // Step queue handling
      function setSteps(newSteps){
        steps = newSteps.slice();
        currentStepIndex = -1;
        updateStepLogDisplay();
      }
      function playSteps(){
        if(playing) return;
        playing = true;
        function stepPlay(){
          if(!playing) return;
          if(currentStepIndex+1 >= steps.length){
            playing = false;
            pushLog("Finished stepping sequence.");
            return;
          }
          currentStepIndex++;
          const f = steps[currentStepIndex];
          executeFrame(f);
          updateStepLogDisplay();
          playTimer = setTimeout(stepPlay, settings.speed);
        }
        stepPlay();
      }
      function pauseSteps(){
        playing = false;
        if(playTimer) clearTimeout(playTimer);
        playTimer = null;
      }
      function stepForward(){
        if(currentStepIndex+1 >= steps.length) return;
        currentStepIndex++;
        executeFrame(steps[currentStepIndex]);
        updateStepLogDisplay();
      }
      function stepBack(){
        // restore from history snapshot before steps started if possible
        if(history.length === 0) return;
        // roll back to the state before first step, and then replay up to currentStepIndex-1
        // For simplicity, when stepping begins, we push a snapshot. We'll assume it's first in history.
        // Implementation: can't partially revert frames easily; instead, we saved initial snapshot at step creation.
        if(stepBaseSnapshot){
          root = deserialize(JSON.parse(stepBaseSnapshot));
          recompute(root);
          selected = null;
          pushHistory();
          // replay frames up to currentStepIndex-1
          const target = Math.max(-1, currentStepIndex-1);
          currentStepIndex = -1;
          for(let i=0;i<=target;i++){
            currentStepIndex++;
            executeFrame(steps[currentStepIndex]);
          }
          updateStepLogDisplay();
        }
      }
      function clearSteps(){
        steps = [];
        currentStepIndex = -1;
        stepBaseSnapshot = null;
        updateStepLogDisplay();
      }

      let stepBaseSnapshot = null;

      function updateStepLogDisplay(){
        const arr = steps.map((s,i) => ((i === currentStepIndex) ? "-> " : "   ") + i + ": " + (s.message || s.type));
        stepLog.textContent = arr.join("\n") + "\n\n" + stepLog.textContent;
      }

      // Event wiring
      insertBtn.addEventListener('click', function(){
        const v = parseValue(valueInput.value);
        if(v === null) { pushLog("Invalid value for insert"); return; }
        bstInsert(v);
      });

      deleteBtn.addEventListener('click', function(){
        const v = parseValue(valueInput.value);
        if(v === null) { pushLog("Invalid value for delete"); return; }
        bstDelete(v);
      });

      searchBtn.addEventListener('click', function(){
        const v = parseValue(valueInput.value);
        if(v === null) { pushLog("Invalid value for search"); return; }
        const res = bstSearch(v);
        if(res.node){
          selected = res.node;
          updateSelectedInfo();
          pushLog("Search found: " + v);
        } else {
          selected = null;
          updateSelectedInfo();
          pushLog("Search not found: " + v);
        }
        render();
      });

      dupMode.addEventListener('change', function(){
        settings.dupMode = dupMode.value;
      });
      speedRange.addEventListener('input', function(){
        settings.speed = parseInt(speedRange.value, 10);
      });
      radiusRange.addEventListener('input', function(){
        settings.radius = parseInt(radiusRange.value, 10);
        render();
      });
      showHeightCb.addEventListener('change', function(){
        settings.showHeight = showHeightCb.checked;
        render();
      });
      showBalanceCb.addEventListener('change', function(){
        settings.showBalance = showBalanceCb.checked;
        render();
      });

      stepInsertBtn.addEventListener('click', function(){
        const v = parseValue(valueInput.value);
        if(v === null) { pushLog("Invalid value for step insert"); return; }
        stepBaseSnapshot = snapshotState();
        setSteps(createInsertionFrames(v));
        pushLog("Prepared step insertion frames for " + v);
      });

      stepSearchBtn.addEventListener('click', function(){
        const v = parseValue(valueInput.value);
        if(v === null) { pushLog("Invalid value for step search"); return; }
        stepBaseSnapshot = snapshotState();
        setSteps(createSearchFrames(v));
        pushLog("Prepared step search frames for " + v);
      });

      stepDeleteBtn.addEventListener('click', function(){
        const v = parseValue(valueInput.value);
        if(v === null) { pushLog("Invalid value for step delete"); return; }
        // create frames: search, then delete
        const searchFrames = createSearchFrames(v);
        const final = [];
        final.push(...searchFrames);
        final.push({type:'noop', message: "Manual delete will be performed now"});
        stepBaseSnapshot = snapshotState();
        setSteps(final);
        pushLog("Prepared step delete frames for " + v);
      });

      playStepsBtn.addEventListener('click', function(){
        if(steps.length === 0){ pushLog("No steps to play"); return; }
        playSteps();
        pushLog("Playing steps...");
      });

      pauseBtn.addEventListener('click', function(){
        pauseSteps();
        pushLog("Paused steps.");
      });

      stepForwardBtn.addEventListener('click', function(){ stepForward(); });
      stepBackBtn.addEventListener('click', function(){ stepBack(); });
      clearStepsBtn.addEventListener('click', function(){ clearSteps(); pushLog("Cleared steps."); });

      undoBtn.addEventListener('click', function(){ undo(); });
      redoBtn.addEventListener('click', function(){ redo(); });

      bulkInsertBtn.addEventListener('click', function(){
        const txt = bulkInput.value.trim();
        if(!txt) { pushLog("Bulk input empty"); return; }
        const arr = txt.split(/[\s,;]+/).map(x => parseValue(x)).filter(x => x!==null);
        if(arr.length === 0) { pushLog("No valid numbers in bulk input"); return; }
        for(let v of arr) bstInsert(v);
        pushLog("Bulk inserted " + arr.length + " items.");
      });

      randBtn.addEventListener('click', function(){
        const count = clamp(parseInt(randCount.value||0,10),1,200);
        const lo = parseInt(randMin.value||0,10);
        const hi = parseInt(randMax.value||0,10);
        const arr = [];
        for(let i=0;i<count;i++){
          const r = Math.floor(Math.random()*(hi-lo+1)) + lo;
          arr.push(r);
          bstInsert(r);
        }
        pushLog("Generated and inserted random " + count + " values.");
      });

      clearBtn.addEventListener('click', function(){
        root = null;
        selected = null;
        history = [];
        future = [];
        steps = [];
        currentStepIndex = -1;
        stepBaseSnapshot = null;
        pushLog("Cleared tree and history.");
        render();
      });

      mirrorBtn.addEventListener('click', function(){
        (function mirror(n){
          if(!n) return;
          const t = n.left; n.left = n.right; n.right = t;
          mirror(n.left); mirror(n.right);
        })(root);
        recompute(root);
        pushHistory();
        render();
        pushLog("Mirrored (inverted) tree.");
      });

      balanceBtn.addEventListener('click', function(){
        rebuildBalanced();
      });

      avlRebalanceBtn.addEventListener('click', function(){
        avlRebalance();
      });

      deleteSelectedBtn.addEventListener('click', function(){
        if(!selected){ pushLog("No selected node to delete"); return; }
        deleteNode(selected);
        recompute(root);
        pushHistory();
        selected = null;
        render();
        pushLog("Deleted selected node.");
      });

      rotateLeftBtn.addEventListener('click', function(){
        if(!selected){ pushLog("No selected node to rotate"); return; }
        rotateLeft(selected);
      });
      rotateRightBtn.addEventListener('click', function(){
        if(!selected){ pushLog("No selected node to rotate"); return; }
        rotateRight(selected);
      });

      showSubtreeBtn.addEventListener('click', function(){
        if(!selected){ pushLog("No selected node to show subtree"); return; }
        pushLog("Subtree values: " + subtreeValues(selected).join(", "));
      });

      kthBtn.addEventListener('click', function(){
        const k = parseInt(kInput.value||1,10);
        if(!root){ pushLog("Tree empty"); return; }
        if(k < 1 || k > root.size){ pushLog("k out of range"); return; }
        let cur = root;
        while(cur){
          const leftSize = cur.left ? cur.left.size : 0;
          if(k === leftSize + 1){
            selected = cur;
            updateSelectedInfo();
            render();
            pushLog(k + "-th smallest = " + cur.value);
            return;
          } else if(k <= leftSize){
            cur = cur.left;
          } else {
            k = k - leftSize - 1;
            cur = cur.right;
          }
        }
      });

      inorderBtn.addEventListener('click', function(){ pushLog("In-order: " + inorderValues().join(", ")); });
      preorderBtn.addEventListener('click', function(){ pushLog("Pre-order: " + preorderValues().join(", ")); });
      postorderBtn.addEventListener('click', function(){ pushLog("Post-order: " + postorderValues().join(", ")); });
      levelorderBtn.addEventListener('click', function(){ pushLog("Level-order: " + levelorderValues().join(", ")); });
      clearLogBtn.addEventListener('click', function(){ stepLog.textContent = ""; pushLog("Cleared log"); });

      exportBtn.addEventListener('click', function(){
        const txt = snapshotState();
        prompt("Copy tree JSON:", txt);
      });
      importBtn.addEventListener('click', function(){
        const txt = prompt("Paste tree JSON:");
        if(!txt) return;
        try{
          const obj = JSON.parse(txt);
          root = deserialize(obj);
          recompute(root);
          pushHistory();
          render();
          pushLog("Imported tree from JSON.");
        }catch(e){
          pushLog("Import failed: invalid JSON");
        }
      });
      clearStorageBtn.addEventListener('click', function(){
        history = []; future = [];
        pushLog("Cleared saved history (only in-memory).");
      });

      clearLogBtn.addEventListener('click', function(){
        stepLog.textContent = "";
      });

      // helper parse value: try integer or raw string if not numeric
      function parseValue(raw){
        if(raw === null || raw === undefined) return null;
        const s = raw.trim();
        if(s === "") return null;
        // try numeric
        if(/^[-+]?\d+$/.test(s)){
          return parseInt(s,10);
        }
        // allow floats
        if(/^[-+]?\d*\.\d+$/.test(s)){
          return parseFloat(s);
        }
        // otherwise use string
        return s;
      }

      // Initialize
      function init(){
        settings.dupMode = dupMode.value;
        settings.speed = parseInt(speedRange.value,10);
        settings.radius = parseInt(radiusRange.value,10);
        settings.showHeight = showHeightCb.checked;
        settings.showBalance = showBalanceCb.checked;
        render();
        pushHistory(); // initial state
        pushLog("Initialized BST demo.");
        // click background clears selection
        svg.addEventListener('click', function(){ selected = null; updateSelectedInfo(); render(); });
      }

      init();

      // expose some functions for debugging
      window._bst = {
        rootGetter: () => root,
        serialize: () => serialize(root),
        deserialize: (obj) => { root = deserialize(obj); recompute(root); render(); },
        insert: bstInsert,
        delete: bstDelete,
        search: bstSearch,
        rotateLeft,
        rotateRight,
        rebalance: avlRebalance
      };

    })();
  </script>
</body>
</html>
