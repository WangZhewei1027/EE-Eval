<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Sort Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #282c34;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #visualization {
            display: flex;
            margin-bottom: 30px;
            transition: all 0.5s ease;
        }

        .bar {
            width: 30px;
            margin: 0 2px;
            background-color: #61dafb;
            border-radius: 5px;
            transition: height 0.5s ease, background-color 0.5s ease;
        }

        .merging {
            background-color: #ff6f61;
        }

        .sorted {
            background-color: #28a745;
        }

        .button {
            padding: 10px 20px;
            font-size: 1em;
            color: #ffffff;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Merge Sort Visualization</h1>
    <div id="visualization"></div>
    <button class="button" onclick="startSort()">Start Merge Sort</button>

    <script>
        const visualization = document.getElementById('visualization');
        const data = [60, 10, 40, 70, 20, 50, 30];

        function drawBars(arr, highlight = null) {
            visualization.innerHTML = '';
            arr.forEach((value, index) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = value * 4 + 'px';
                if (highlight === index) {
                    bar.classList.add('merging');
                }
                visualization.appendChild(bar);
            });
        }

        async function mergeSort(arr) {
            if (arr.length <= 1) return arr;

            let mid = Math.floor(arr.length / 2);
            const left = await mergeSort(arr.slice(0, mid));
            const right = await mergeSort(arr.slice(mid));

            return merge(left, right);
        }

        async function merge(left, right) {
            const sorted = [];
            let i = 0, j = 0;

            while (i < left.length && j < right.length) {
                drawBars([...left, ...right], i + j);
                await new Promise(resolve => setTimeout(resolve, 500));

                if (left[i] <= right[j]) {
                    sorted.push(left[i++]);
                } else {
                    sorted.push(right[j++]);
                }
            }

            while (i < left.length) {
                sorted.push(left[i++]);
            }

            while (j < right.length) {
                sorted.push(right[j++]);
            }

            drawBars(sorted.concat(Array.from({length: right.length + left.length - sorted.length}, 
                () => 0)));

            await new Promise(resolve => setTimeout(resolve, 500));
            return sorted;
        }

        async function startSort() {
            await mergeSort(data);
            drawBars(data);
            for (let i = 0; i < data.length; i++) {
                const bar = document.querySelectorAll('.bar')[i];
                bar.classList.add('sorted');
            }
        }

        drawBars(data);
    </script>
</body>
</html>
