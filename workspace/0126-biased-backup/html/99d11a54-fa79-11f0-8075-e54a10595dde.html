<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Vector Machine Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #dataDisplay {
            margin: 20px 0;
        }
        #controls {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<h1>Support Vector Machine Interactive Demo</h1>

<div id="controls">
    <label for="pointX">Point X:</label>
    <input type="number" id="pointX" value="0" step="0.1">
    <label for="pointY">Point Y:</label>
    <input type="number" id="pointY" value="0" step="0.1">
    <button id="addPoint">Add Point</button>
    <button id="trainSVM">Train SVM</button>
    <button id="clearPoints">Clear Points</button>
</div>

<div id="dataDisplay">
    <h3>Points:</h3>
    <ul id="pointsList"></ul>
</div>

<div id="modelStatus">
    <h3>Model Status</h3>
    <p id="modelOutput">No model trained yet.</p>
</div>

<script>
    const points = [];
    const pointsList = document.getElementById('pointsList');
    const modelOutput = document.getElementById('modelOutput');

    document.getElementById('addPoint').addEventListener('click', function() {
        const x = parseFloat(document.getElementById('pointX').value);
        const y = parseFloat(document.getElementById('pointY').value);
        points.push({x, y});
        updatePointsList();
    });

    document.getElementById('trainSVM').addEventListener('click', function() {
        if (points.length < 2) {
            modelOutput.innerText = "At least 2 points are required to train the SVM.";
            return;
        }

        // Simulate training by calculating boundary (just a toy example)
        const boundary = calculateBoundary(points);
        
        modelOutput.innerText = `Model trained. Boundary: y = ${boundary.m}x + ${boundary.b}`;
    });

    document.getElementById('clearPoints').addEventListener('click', function() {
        points.length = 0;
        updatePointsList();
        modelOutput.innerText = "No model trained yet.";
    });

    function updatePointsList() {
        pointsList.innerHTML = "";
        points.forEach(point => {
            const li = document.createElement('li');
            li.innerText = `(${point.x}, ${point.y})`;
            pointsList.appendChild(li);
        });
    }

    function calculateBoundary(points) {
        // A mock function to simulate calculating an SVM boundary
        const xAvg = points.reduce((sum, p) => sum + p.x, 0) / points.length;
        const yAvg = points.reduce((sum, p) => sum + p.y, 0) / points.length;
        const slope = (yAvg - xAvg) / (points.length > 1 ? points.length - 1 : 1);
        const intercept = yAvg - slope * xAvg;
        return {m: slope, b: intercept};
    }
</script>

</body>
</html>
