<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Recursion Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        h1 { font-size: 20px; }
        .control-group { margin: 10px 0; }
    </style>
</head>
<body>

<h1>Interactive Recursion Demo</h1>

<div class="control-group">
    <label for="factorial-input">Enter a number for Factorial:</label>
    <input type="number" id="factorial-input" value="5" min="0">
    <button onclick="calculateFactorial()">Calculate Factorial</button>
    <p id="factorial-result"></p>
</div>

<div class="control-group">
    <label for="fibonacci-input">Enter a number for Fibonacci:</label>
    <input type="number" id="fibonacci-input" value="5" min="0">
    <button onclick="calculateFibonacci()">Calculate Fibonacci</button>
    <p id="fibonacci-result"></p>
</div>

<div class="control-group">
    <label for="string-input">Enter a string for Reversal:</label>
    <input type="text" id="string-input" value="hello">
    <button onclick="reverseString()">Reverse String</button>
    <p id="string-result"></p>
</div>

<div class="control-group">
    <label for="depth-input">Set Recursion Depth for Counting:</label>
    <input type="number" id="depth-input" value="5" min="1" max="10">
    <button onclick="countUpDown()">Count Up/Down</button>
    <p id="count-result"></p>
</div>

<script>
    function factorial(n) {
        if (n === 0) return 1;
        return n * factorial(n - 1);
    }

    function calculateFactorial() {
        const input = document.getElementById("factorial-input").value;
        const result = factorial(parseInt(input));
        document.getElementById("factorial-result").innerText = "Factorial: " + result;
    }

    function fibonacci(n) {
        if (n <= 1) return n;
        return fibonacci(n - 1) + fibonacci(n - 2);
    }

    function calculateFibonacci() {
        const input = document.getElementById("fibonacci-input").value;
        const result = fibonacci(parseInt(input));
        document.getElementById("fibonacci-result").innerText = "Fibonacci: " + result;
    }

    function reverse(str) {
        if (str.length === 0) return "";
        return str[str.length - 1] + reverse(str.slice(0, str.length - 1));
    }

    function reverseString() {
        const input = document.getElementById("string-input").value;
        const result = reverse(input);
        document.getElementById("string-result").innerText = "Reversed: " + result;
    }

    function countUpDown(depth, current = 1) {
        if (current > depth) {
            return "Done counting down.";
        }
        let output = current + " ";
        output += countUpDown(depth, current + 1) + " ";
        return output.trim();
    }

    function countUpDown() {
        const depth = document.getElementById("depth-input").value;
        const result = countUpDown(parseInt(depth));
        document.getElementById("count-result").innerText = "Counting: " + result;
    }
</script>

</body>
</html>
