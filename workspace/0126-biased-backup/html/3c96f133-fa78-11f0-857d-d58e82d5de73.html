<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Counting Sort Visualization — Aesthetic Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=JetBrains+Mono&display=swap');
  /* Reset and base */
  * {
    box-sizing: border-box;
    user-select: none;
  }
  body, html {
    margin: 0; padding: 0;
    height: 100%;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: #e0e6f0;
    overflow: hidden;
  }
  /* Container */
  .container {
    max-width: 960px;
    margin: 2.5rem auto 3rem;
    padding: 0 1rem;
  }
  header {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  header h1 {
    font-weight: 700;
    font-size: 3.2rem;
    letter-spacing: 0.1em;
    color: #ff897d;
    text-shadow:
      0 0 8px #ff897daa,
      0 0 20px #ff5043cc,
      0 0 30px #ff3022dd;
    margin-bottom: 0.2rem;
    user-select: none;
  }
  header p {
    font-weight: 400;
    font-style: italic;
    font-size: 1.1rem;
    color: #abc4ffdd;
    letter-spacing: 0.05em;
  }
  /* Sort panel */
  #visualizer {
    background: #16292fdd;
    border-radius: 24px;
    box-shadow:
      inset 0 0 60px 8px #1a3a4fcc,
      0 0 40px 6px #ff584d88;
    padding: 2rem 2.5rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 3.2rem;
  }
  /* Step labels */
  .step-title {
    font-weight: 700;
    color: #ffaea3;
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    user-select: none;
    margin-bottom: 1rem;
    text-shadow:
      0 0 5px #ffaea388,
      0 0 15px #ff6a5bbb;
  }
  /* Number arrays container */
  .array-row {
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 0.8rem;
  }
  /* Individual array item */
  .array-item {
    flex: 1 1 0;
    max-width: 40px;
    height: 56px;
    background: linear-gradient(145deg, #41607f, #344a5c);
    box-shadow:
      0 4px 8px rgba(0,0,0,0.35),
      inset 0 0 14px #71a8c0aa;
    border-radius: 12px;
    color: #bbd7f8ee;
    font-weight: 700;
    font-size: 1.4rem;
    line-height: 56px;
    text-align: center;
    transition: background 0.45s ease, color 0.45s ease, box-shadow 0.45s ease;
    position: relative;
    user-select: none;
  }
  .array-item.highlight {
    background: linear-gradient(135deg, #ff5f66, #ff9a8b);
    box-shadow:
      0 0 24px 3px #ff7f70cc,
      inset 0 14px 36px -6px #ff7f70dd;
    color: #ffe6e2;
    z-index: 10;
    transform: scale(1.25);
    transition: all 0.35s cubic-bezier(0.645, 0.045, 0.355, 1);
  }
  /* Counting bars container */
  .count-bars {
    display: flex;
    justify-content: center;
    gap: 1rem;
  }
  .count-bar-wrapper {
    flex: 1 1 0;
    max-width: 48px;
    position: relative;
  }
  .count-bar {
    background: linear-gradient(145deg, #4998c2, #297ab8);
    border-radius: 16px;
    box-shadow:
      0 0 15px #3e81b1aa inset,
      0 0 16px #6ca7db88;
    width: 100%;
    height: 0;
    transition: height 0.45s cubic-bezier(0.77, 0, 0.175, 1), box-shadow 0.45s ease;
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
    transform-origin: bottom;
  }
  .count-bar.highlight {
    background: linear-gradient(180deg, #ff678e, #ff3850);
    box-shadow:
      0 0 22px #ff4356cc inset,
      0 0 28px 6px #ff678ecc;
    border-bottom-left-radius: 24px;
    border-bottom-right-radius: 24px;
  }
  .count-label {
    margin-top: 0.45rem;
    color: #a2c7f2cc;
    text-align: center;
    font-weight: 600;
    font-size: 0.95rem;
    user-select: none;
    letter-spacing: 0.03em;
  }
  /* Output row (sorted) */
  #output-row {
    justify-content: center;
    gap: 1rem;
  }
  .output-item {
    width: 48px;
    height: 48px;
    background: linear-gradient(145deg, #5781a6, #3c596f);
    border-radius: 14px;
    box-shadow:
      0 8px 16px rgba(130, 160, 190, 0.4),
      inset 0 4px 11px #8ab9e5cc;
    color: #d1e5ffcc;
    font-weight: 700;
    font-size: 1.5rem;
    line-height: 48px;
    text-align: center;
    user-select: none;
    opacity: 0;
    transform: translateY(18px);
    transition: all 0.45s cubic-bezier(0.56, 0.04, 0.41, 0.99);
  }
  .output-item.show {
    opacity: 1;
    transform: translateY(0);
  }
  /* Controls */
  .controls {
    margin-top: 2rem;
    text-align: center;
  }
  button {
    background: linear-gradient(135deg, #ee7752, #e73c7e);
    border: none;
    padding: 0.85rem 2.1rem;
    font-size: 1.3rem;
    font-weight: 700;
    color: white;
    border-radius: 36px;
    cursor: pointer;
    text-shadow: 0 0 5px rgba(255, 110, 110, 0.95);
    box-shadow:
      0 6px 14px #d04166bb,
      inset 0 -3px 8px #fa779bcc;
    transition:
      background 0.5s ease,
      box-shadow 0.5s ease,
      transform 0.2s ease;
  }
  button:hover {
    background: linear-gradient(135deg, #eb4a67, #d71e63);
    box-shadow:
      0 6px 18px #ff5672cc,
      inset 0 -5px 14px #ff7a9ccc;
    transform: scale(1.06);
  }
  button:active {
    transform: scale(0.95);
    box-shadow:
      0 3px 10px #ba3260cc,
      inset 0 -2px 5px #dd5577cc;
  }
  /* Footer */
  footer {
    text-align: center;
    color: #789cc5d8;
    font-size: 0.87rem;
    user-select: none;
    letter-spacing: 0.05em;
    margin-top: 5rem;
    font-family: 'JetBrains Mono', monospace;
  }
  /* Scrollbar small styling */
  ::-webkit-scrollbar {
    width: 7px;
  }
  ::-webkit-scrollbar-thumb {
    background: #647eafaa;
    border-radius: 10px;
  }
</style>
</head>
<body>
<main class="container" aria-label="Counting Sort Visualization">
  <header>
    <h1>Counting Sort</h1>
    <p>Stable, Efficient Sorting Algorithm Visualized</p>
  </header>
  <section id="visualizer" role="main" aria-live="polite" aria-atomic="true">
    <!-- Input Array -->
    <div>
      <div class="step-title">1. Input Array</div>
      <div id="input-row" class="array-row" aria-label="Input unsorted array"></div>
    </div>
    <!-- Counting Process -->
    <div>
      <div class="step-title">2. Counting Frequencies</div>
      <div id="count-bars" class="count-bars" aria-label="Counting frequency bars"></div>
    </div>
    <!-- Accumulated Count -->
    <div>
      <div class="step-title">3. Accumulated Counts</div>
      <div id="accumulated-bars" class="count-bars" aria-label="Accumulated frequency bars"></div>
    </div>
    <!-- Output Array -->
    <div>
      <div class="step-title">4. Output Sorted Array</div>
      <div id="output-row" class="array-row" aria-label="Output sorted array"></div>
    </div>
  </section>
  <div class="controls">
    <button id="start-btn" aria-label="Start Animation">Start Sorting Animation</button>
  </div>
  <footer>
    &copy; 2024 &mdash; Visual Demo by AI
  </footer>
</main>

<script>
  (() => {
    // Data: Input array of integers 0-9 (small range for counting sort)
    const inputArray = [3, 6, 4, 1, 7, 2, 5, 2, 0, 4, 6, 3, 7, 5];
    const maxValue = 9; // max integer value considered
    const delay = 650; // delay between animation steps (ms)

    // Reference to DOM containers
    const inputRow = document.getElementById('input-row');
    const countBars = document.getElementById('count-bars');
    const accBars = document.getElementById('accumulated-bars');
    const outputRow = document.getElementById('output-row');
    const startBtn = document.getElementById('start-btn');

    // Utility to create array item elements for input/output
    function createArrayItem(value) {
      const el = document.createElement('div');
      el.className = 'array-item';
      el.textContent = value;
      return el;
    }
    function createOutputItem(value) {
      const el = document.createElement('div');
      el.className = 'output-item';
      el.textContent = value;
      return el;
    }
    // Create count bar wrapper + column with label
    function createCountBarWrapper(index) {
      const wrapper = document.createElement('div');
      wrapper.className = 'count-bar-wrapper';
      wrapper.setAttribute('aria-label', 'Number ' + index + ' count bar');
      const bar = document.createElement('div');
      bar.className = 'count-bar';
      bar.style.height = '0px';
      const label = document.createElement('div');
      label.className = 'count-label';
      label.textContent = index;
      wrapper.appendChild(bar);
      wrapper.appendChild(label);
      return {wrapper, bar};
    }

    // Initialize input array display
    function initInput() {
      inputRow.innerHTML = '';
      for(const n of inputArray){
        const item = createArrayItem(n);
        inputRow.appendChild(item);
      }
    }
    // Initialize count bars (freq and accumulated)
    function initCountBars() {
      countBars.innerHTML = '';
      accBars.innerHTML = '';
      for(let i=0; i <= maxValue; i++){
        const c = createCountBarWrapper(i);
        countBars.appendChild(c.wrapper);
      }
      for(let i=0; i <= maxValue; i++){
        const c = createCountBarWrapper(i);
        accBars.appendChild(c.wrapper);
      }
    }
    // Animate function helpers
    function sleep(ms){
      return new Promise(res => setTimeout(res, ms));
    }
    // Set count bars heights with smooth transitions
    function updateCountBars(countArray, container){
      // countArray is integer counts
      const maxCount = Math.max(...countArray, 1);
      for(let i=0; i < countArray.length; i++){
        const wrapper = container.children[i];
        const bar = wrapper.querySelector('.count-bar');
        const heightPct = (countArray[i]/maxCount)*120;
        bar.style.height = heightPct + 'px';
        // highlight bar if count > 0
        if(countArray[i] > 0){
          bar.classList.add('highlight');
        } else {
          bar.classList.remove('highlight');
        }
      }
    }
    // Clear all highlights
    function clearHighlights(){
      document.querySelectorAll('.array-item.highlight, .count-bar.highlight').forEach(el=>{
        el.classList.remove('highlight');
      });
    }
    // Core animation sequence
    async function countingSortAnimation(){
      startBtn.disabled = true;
      // Step 1: Highlight input array values one by one as counted
      clearHighlights();

      // Frequency count array init
      const count = Array(maxValue+1).fill(0);

      // Show each input item highlight + count increment
      for(let i=0; i < inputArray.length; i++){
        clearHighlights();
        const val = inputArray[i];
        // Highlight current item
        const inputItems = inputRow.children;
        inputItems[i].classList.add('highlight');
        // Increment count for value
        count[val]++;
        // Update count bars
        updateCountBars(count, countBars);
        await sleep(delay);
      }
      clearHighlights();

      // Step 2: Show accumulated count (prefix sums)
      let accumulated = count.slice();
      for(let i=1; i <= maxValue; i++){
        accumulated[i] += accumulated[i-1];
      }
      // Animate accumulated counts bar growing in
      // Show zero highlight by default for animation
      for(let i=0; i <= maxValue; i++){
        const bar = accBars.children[i].querySelector('.count-bar');
        bar.style.height = '0px';
        bar.classList.remove('highlight');
      }
      await sleep(300);

      // Animate accumulated bar heights increasing in steps
      for(let i=0; i <= maxValue; i++){
        clearHighlights();
        accBars.children[i].querySelector('.count-bar').classList.add('highlight');
        updateCountBars(accumulated, accBars);
        await sleep(delay/1.4);
      }
      clearHighlights();

      // Step 3: Place elements in output array in reverse order to maintain stability
      outputRow.innerHTML = '';
      for(let i=0; i < inputArray.length; i++){
        const outputItem = createOutputItem('');
        outputRow.appendChild(outputItem);
      }

      // Clone accumulated for placement index
      const position = accumulated.slice();
      // We place from right to left to maintain stability
      for(let i=inputArray.length-1; i >= 0; i--){
        const val = inputArray[i];
        clearHighlights();
        // Highlight input item & acc bar at val
        inputRow.children[i].classList.add('highlight');
        const accBar = accBars.children[val].querySelector('.count-bar');
        accBar.classList.add('highlight');
        // Decrement position for placing index
        position[val]--;
        const pos = position[val];
        // Reveal output item at pos with value
        const outputItem = outputRow.children[pos];
        outputItem.textContent = val;
        // Animate its showing
        outputItem.classList.add('show');
        await sleep(delay / 1.6);
      }
      clearHighlights();
      startBtn.disabled = false;
    }
    // Initialization on page load
    function init(){
      initInput();
      initCountBars();
      outputRow.innerHTML = '';
    }
    init();

    // Attach event handler
    startBtn.addEventListener('click', () => {
      countingSortAnimation();
    });
  })();
</script>
</body>
</html>
