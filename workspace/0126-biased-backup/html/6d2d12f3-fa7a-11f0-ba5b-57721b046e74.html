<!DOCTYPE html>
<html>
<head>
    <title>Red-Black Tree Interactive</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { display: flex; flex-direction: column; gap: 10px; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .control-group { border: 1px solid #ccc; padding: 10px; }
        .tree-container { min-height: 500px; border: 1px solid #ccc; padding: 10px; position: relative; }
        .node { position: absolute; width: 30px; height: 30px; border: 1px solid black; 
                display: flex; align-items: center; justify-content: center; border-radius: 15px; }
        .red { background-color: red; color: white; }
        .black { background-color: black; color: white; }
        .line { position: absolute; background-color: black; height: 1px; transform-origin: 0 0; }
        .log { border: 1px solid #ccc; padding: 10px; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>Red-Black Tree Interactive</h1>
    <div class="container">
        <div class="controls">
            <div class="control-group">
                <h3>Node Operations</h3>
                <input type="number" id="insertValue" placeholder="Value">
                <button onclick="insertNode()">Insert</button>
                <input type="number" id="deleteValue" placeholder="Value">
                <button onclick="deleteNode()">Delete</button>
                <input type="number" id="searchValue" placeholder="Value">
                <button onclick="searchNode()">Search</button>
            </div>
            <div class="control-group">
                <h3>Tree Operations</h3>
                <button onclick="clearTree()">Clear Tree</button>
                <button onclick="randomTree()">Random Tree (5-15 nodes)</button>
                <button onclick="balanceTree()">Balance Tree</button>
            </div>
            <div class="control-group">
                <h3>Visualization</h3>
                <label>Node Size: <input type="range" id="nodeSize" min="20" max="50" value="30" onchange="updateNodeSize()"></label>
                <label>Spacing: <input type="range" id="treeSpacing" min="50" max="200" value="100" onchange="drawTree()"></label>
                <label><input type="checkbox" id="showValues" checked onchange="drawTree()"> Show Values</label>
            </div>
            <div class="control-group">
                <h3>Step-by-Step</h3>
                <button onclick="startStepByStep()">Start Insert/Delete</button>
                <button onclick="nextStep()">Next Step</button>
                <span id="stepInfo"></span>
            </div>
        </div>
        
        <div class="tree-container" id="treeCanvas"></div>
        
        <div class="log" id="operationLog"></div>
    </div>

    <script>
        // Red-Black Tree implementation
        class Node {
            constructor(value, color = 'red') {
                this.value = value;
                this.color = color;
                this.left = null;
                this.right = null;
                this.parent = null;
            }
        }

        class RedBlackTree {
            constructor() {
                this.root = null;
                this.NIL = new Node(null, 'black');
            }

            insert(value) {
                let newNode = new Node(value);
                if (!this.root) {
                    this.root = newNode;
                    this.root.color = 'black';
                    return;
                }

                let current = this.root;
                let parent = null;

                while (current !== this.NIL && current !== null) {
                    parent = current;
                    if (value < current.value) {
                        current = current.left || this.NIL;
                    } else if (value > current.value) {
                        current = current.right || this.NIL;
                    } else {
                        return; // Duplicate value
                    }
                }

                newNode.parent = parent;
                if (value < parent.value) {
                    parent.left = newNode;
                } else {
                    parent.right = newNode;
                }

                this.fixInsert(newNode);
            }

            fixInsert(node) {
                while (node.parent && node.parent.color === 'red') {
                    let uncle;
                    if (node.parent === node.parent.parent.left) {
                        uncle = node.parent.parent.right || this.NIL;
                        if (uncle.color === 'red') {
                            // Case 1: Uncle is red
                            node.parent.color = 'black';
                            uncle.color = 'black';
                            node.parent.parent.color = 'red';
                            node = node.parent.parent;
                        } else {
                            // Case 2: Uncle is black and node is right child
                            if (node === node.parent.right) {
                                node = node.parent;
                                this.rotateLeft(node);
                            }
                            // Case 3: Uncle is black and node is left child
                            node.parent.color = 'red';
                            node.parent.parent.color = 'black';
                            this.rotateRight(node.parent.parent);
                        }
                    } else {
                        uncle = node.parent.parent.left || this.NIL;
                        if (uncle.color === 'red') {
                            // Case 1 mirror
                            node.parent.color = 'black';
                            uncle.color = 'black';
                            node.parent.parent.color = 'red';
                            node = node.parent.parent;
                        } else {
                            // Case 2 mirror
                            if (node === node.parent.left) {
                                node = node.parent;
                                this.rotateRight(node);
                            }
                            // Case 3 mirror
                            node.parent.color = 'red';
                            node.parent.parent.color = 'black';
                            this.rotateLeft(node.parent.parent);
                        }
                    }
                }
                this.root.color = 'black';
            }

            rotateLeft(node) {
                let rightChild = node.right;
                node.right = rightChild.left;
                if (rightChild.left) rightChild.left.parent = node;
                rightChild.parent = node.parent;
                if (!node.parent) {
                    this.root = rightChild;
                } else if (node === node.parent.left) {
                    node.parent.left = rightChild;
                } else {
                    node.parent.right = rightChild;
                }
                rightChild.left = node;
                node.parent = rightChild;
            }

            rotateRight(node) {
                let leftChild = node.left;
                node.left = leftChild.right;
                if (leftChild.right) leftChild.right.parent = node;
                leftChild.parent = node.parent;
                if (!node.parent) {
                    this.root = leftChild;
                } else if (node === node.parent.right) {
                    node.parent.right = leftChild;
                } else {
                    node.parent.left = leftChild;
                }
                leftChild.right = node;
                node.parent = leftChild;
            }

            delete(value) {
                let node = this.search(value);
                if (!node) return;

                let originalColor = node.color;
                let x;
                
                if (!node.left || node.left === this.NIL) {
                    x = node.right || this.NIL;
                    this.transplant(node, x);
                } else if (!node.right || node.right === this.NIL) {
                    x = node.left || this.NIL;
                    this.transplant(node, x);
                } else {
                    let successor = this.minimum(node.right);
                    originalColor = successor.color;
                    x = successor.right || this.NIL;
                    
                    if (successor.parent === node) {
                        x.parent = successor;
                    } else {
                        this.transplant(successor, x);
                        successor.right = node.right;
                        successor.right.parent = successor;
                    }
                    
                    this.transplant(node, successor);
                    successor.left = node.left;
                    successor.left.parent = successor;
                    successor.color = node.color;
                }
                
                if (originalColor === 'black') {
                    this.fixDelete(x);
                }
            }

            fixDelete(node) {
                while (node !== this.root && node.color === 'black') {
                    if (node === node.parent.left) {
                        let sibling = node.parent.right || this.NIL;
                        
                        if (sibling.color === 'red') {
                            sibling.color = 'black';
                            node.parent.color = 'red';
                            this.rotateLeft(node.parent);
                            sibling = node.parent.right || this.NIL;
                        }
                        
                        if ((!sibling.left || sibling.left.color === 'black') && 
                            (!sibling.right || sibling.right.color === 'black')) {
                            sibling.color = 'red';
                            node = node.parent;
                        } else {
                            if (!sibling.right || sibling.right.color === 'black') {
                                if (sibling.left) sibling.left.color = 'black';
                                sibling.color = 'red';
                                this.rotateRight(sibling);
                                sibling = node.parent.right || this.NIL;
                            }
                            
                            sibling.color = node.parent.color;
                            node.parent.color = 'black';
                            if (sibling.right) sibling.right.color = 'black';
                            this.rotateLeft(node.parent);
                            node = this.root;
                        }
                    } else {
                        let sibling = node.parent.left || this.NIL;
                        
                        if (sibling.color === 'red') {
                            sibling.color = 'black';
                            node.parent.color = 'red';
                            this.rotateRight(node.parent);
                            sibling = node.parent.left || this.NIL;
                        }
                        
                        if ((!sibling.right || sibling.right.color === 'black') && 
                            (!sibling.left || sibling.left.color === 'black')) {
                            sibling.color = 'red';
                            node = node.parent;
                        } else {
                            if (!sibling.left || sibling.left.color === 'black') {
                                if (sibling.right) sibling.right.color = 'black';
                                sibling.color = 'red';
                                this.rotateLeft(sibling);
                                sibling = node.parent.left || this.NIL;
                            }
                            
                            sibling.color = node.parent.color;
                            node.parent.color = 'black';
                            if (sibling.left) sibling.left.color = 'black';
                            this.rotateRight(node.parent);
                            node = this.root;
                        }
                    }
                }
                node.color = 'black';
            }

            transplant(u, v) {
                if (!u.parent) {
                    this.root = v;
                } else if (u === u.parent.left) {
                    u.parent.left = v;
                } else {
                    u.parent.right = v;
                }
                v.parent = u.parent;
            }

            minimum(node) {
                while (node.left && node.left !== this.NIL) {
                    node = node.left;
                }
                return node;
            }

            search(value) {
                let current = this.root;
                while (current && current !== this.NIL) {
                    if (value === current.value) {
                        return current;
                    } else if (value < current.value) {
                        current = current.left || this.NIL;
                    } else {
                        current = current.right || this.NIL;
                    }
                }
                return null;
            }

            inOrderTraversal(node = this.root, result = []) {
                if (node && node !== this.NIL) {
                    this.inOrderTraversal(node.left, result);
                    result.push(node.value);
                    this.inOrderTraversal(node.right, result);
                }
                return result;
            }
        }

        // Visualization and interaction
        const tree = new RedBlackTree();
        let stepQueue = [];
        let currentStep = null;

        function insertNode() {
            const value = parseInt(document.getElementById('insertValue').value);
            if (isNaN(value)) return;
            
            tree.insert(value);
            logOperation(`Inserted ${value}`);
            drawTree();
            document.getElementById('insertValue').value = '';
        }

        function deleteNode() {
            const value = parseInt(document.getElementById('deleteValue').value);
            if (isNaN(value)) return;
            
            tree.delete(value);
            logOperation(`Deleted ${value}`);
            drawTree();
            document.getElementById('deleteValue').value = '';
        }

        function searchNode() {
            const value = parseInt(document.getElementById('searchValue').value);
            if (isNaN(value)) return;
            
            const node = tree.search(value);
            if (node) {
                logOperation(`Found ${value}`);
                highlightNode(node);
            } else {
                logOperation(`${value} not found`);
            }
            document.getElementById('searchValue').value = '';
        }

        function clearTree() {
            tree.root = null;
            logOperation('Tree cleared');
            drawTree();
        }

        function randomTree() {
            clearTree();
            const count = Math.floor(Math.random() * 11) + 5; // 5-15 nodes
            const values = new Set();
            
            while (values.size < count) {
                values.add(Math.floor(Math.random() * 100));
            }
            
            values.forEach(value => tree.insert(value));
            logOperation(`Generated random tree with ${count} nodes`);
            drawTree();
        }

        function balanceTree() {
            const values = tree.inOrderTraversal();
            clearTree();
            
            // Build balanced tree
            function buildBalanced(arr, start, end) {
                if (start > end) return null;
                
                const mid = Math.floor((start + end) / 2);
                const node = new Node(arr[mid], 'black');
                
                node.left = buildBalanced(arr, start, mid - 1);
                if (node.left) node.left.parent = node;
                
                node.right = buildBalanced(arr, mid + 1, end);
                if (node.right) node.right.parent = node;
                
                return node;
            }
            
            tree.root = buildBalanced(values, 0, values.length - 1);
            logOperation('Tree rebalanced');
            drawTree();
        }

        function startStepByStep() {
            const insertValue = parseInt(document.getElementById('insertValue').value);
            const deleteValue = parseInt(document.getElementById('deleteValue').value);
            
            stepQueue = [];
            
            if (!isNaN(insertValue)) {
                stepQueue.push({ type: 'insert', value: insertValue });
                document.getElementById('insertValue').value = '';
            }
            
            if (!isNaN(deleteValue)) {
                stepQueue.push({ type: 'delete', value: deleteValue });
                document.getElementById('deleteValue').value = '';
            }
            
            if (stepQueue.length > 0) {
                document.getElementById('stepInfo').textContent = `Step 1/${stepQueue.length}`;
            }
        }

        function nextStep() {
            if (stepQueue.length === 0) return;
            
            currentStep = stepQueue.shift();
            
            if (currentStep.type === 'insert') {
                tree.insert(currentStep.value);
                logOperation(`Step: Inserted ${currentStep.value}`);
            } else {
                tree.delete(currentStep.value);
                logOperation(`Step: Deleted ${currentStep.value}`);
            }
            
            drawTree();
            document.getElementById('stepInfo').textContent = stepQueue.length > 0 ? 
                `Step ${stepQueue.length}/${stepQueue.length + 1}` : 'All steps completed';
        }

        function updateNodeSize() {
            const size = document.getElementById('nodeSize').value;
            document.documentElement.style.setProperty('--node-size', `${size}px`);
            drawTree();
        }

        function logOperation(message) {
            const log = document.getElementById('operationLog');
            log.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${message}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        function highlightNode(node) {
            const canvas = document.getElementById('treeCanvas');
            const nodes = canvas.querySelectorAll('.node');
            
            nodes.forEach(n => {
                if (parseInt(n.textContent) === node.value) {
                    n.style.border = '2px solid blue';
                    setTimeout(() => n.style.border = '1px solid black', 1000);
                }
            });
        }

        function drawTree() {
            const canvas = document.getElementById('treeCanvas');
            canvas.innerHTML = '';
            
            if (!tree.root) return;
            
            const spacing = parseInt(document.getElementById('treeSpacing').value);
            const nodeSize = parseInt(document.getElementById('nodeSize').value);
            const showValues = document.getElementById('showValues').checked;
            
            // Calculate tree dimensions
            function getHeight(node) {
                if (!node || node === tree.NIL) return 0;
                return 1 + Math.max(getHeight(node.left), getHeight(node.right));
            }
            
            const height = getHeight(tree.root);
            const canvasWidth = Math.pow(2, height) * spacing;
            canvas.style.width = `${canvasWidth}px`;
            
            // Draw tree recursively
            function drawNode(node, x, y, level, parentX, parentY) {
                if (!node || node === tree.NIL) return;
                
                const nodeElement = document.createElement('div');
                nodeElement.className = `node ${node.color}`;
                nodeElement.style.width = `${nodeSize}px`;
                nodeElement.style.height = `${nodeSize}px`;
                nodeElement.style.left = `${x - nodeSize/2}px`;
                nodeElement.style.top = `${y}px`;
                
                if (showValues) {
                    nodeElement.textContent = node.value;
                }
                
                canvas.appendChild(nodeElement);
                
                // Draw line to parent
                if (parentX !== undefined && parentY !== undefined) {
                    const line = document.createElement('div');
                    line.className = 'line';
                    
                    const length = Math.sqrt(Math.pow(x - parentX, 2) + Math.pow(y - parentY, 2));
                    const angle = Math.atan2(y - parentY, x - parentX);
                    
                    line.style.width = `${length}px`;
                    line.style.left = `${parentX}px`;
                    line.style.top = `${parentY + nodeSize/2}px`;
                    line.style.transform = `rotate(${angle}rad)`;
                    
                    canvas.appendChild(line);
                }
                
                const xOffset = spacing * Math.pow(2, height - level - 1);
                
                drawNode(node.left, x - xOffset, y + 60, level + 1, x, y + nodeSize/2);
                drawNode(node.right, x + xOffset, y + 60, level + 1, x, y + nodeSize/2);
            }
            
            drawNode(tree.root, canvasWidth / 2, 20, 1);
        }

        // Initialize
        drawTree();
    </script>
</body>
</html>
