<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semaphore Visual Symphony</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e74c3c;
            --light: #ecf0f1;
            --dark: #2c3e50;
            --highlight: #f39c12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--dark));
            color: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            perspective: 1000px;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            transform: translateY(-20px);
            opacity: 0;
            animation: fadeInDown 1.5s ease-out forwards;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto;
        }

        .semaphore-container {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 2rem auto;
            transform-style: preserve-3d;
        }

        .semaphore-disc {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3),
                        inset 0 0 20px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: rotateX(10deg);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .semaphore-arm {
            position: absolute;
            width: 12px;
            height: 180px;
            background: var(--light);
            border-radius: 6px;
            top: 50%;
            left: 50%;
            transform-origin: top center;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            transition: all 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .arm-left {
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        .arm-right {
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .semaphore-center {
            position: absolute;
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--accent);
            z-index: 10;
        }

        .semaphore-light {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, var(--highlight), transparent 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: all 0.4s ease-out;
            z-index: 5;
        }

        .active .semaphore-light {
            transform: translate(-50%, -50%) scale(1);
            opacity: 0.6;
        }

        .code-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 1.5rem;
            border-radius: 10px;
            margin-top: 2rem;
            max-width: 600px;
            text-align: center;
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.5s ease-out 0.5s forwards;
            position: relative;
            overflow: hidden;
        }

        .code-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                        transparent, 
                        rgba(255, 255, 255, 0.05), 
                        transparent);
            animation: shine 3s infinite;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            color: var(--light);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            opacity: 0.6;
            text-align: center;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from { 
                opacity: 0;
                transform: translateY(-20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .pulse {
            animation: pulse 2s infinite ease-in-out;
        }

        @media (max-width: 600px) {
            .semaphore-container {
                width: 300px;
                height: 300px;
            }

            .semaphore-arm {
                height: 140px;
            }

            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Semaphore Visualizer</h1>
        <p class="subtitle">A mesmerizing demonstration of communication through signaling</p>
    </div>

    <div class="semaphore-container pulse">
        <div class="semaphore-disc"></div>
        <div class="semaphore-arm arm-left"></div>
        <div class="semaphore-arm arm-right"></div>
        <div class="semaphore-center"></div>
        <div class="semaphore-light"></div>
    </div>

    <div class="code-display">
        <p>Semaphore signaling allows communication through visual positions...</p>
        <p>Each arm position encodes a different letter or message</p>
    </div>

    <div class="controls">
        <button id="signal-btn">Activate Signal</button>
        <button id="reset-btn">Reset Position</button>
    </div>

    <div class="footer">
        <p>A visual exploration of semaphore communication | Designed for aesthetic appreciation</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const semaphore = document.querySelector('.semaphore-container');
            const leftArm = document.querySelector('.arm-left');
            const rightArm = document.querySelector('.arm-right');
            const light = document.querySelector('.semaphore-light');
            const signalBtn = document.getElementById('signal-btn');
            const resetBtn = document.getElementById('reset-btn');
            
            // Predefined semaphore positions for letters A, B, C
            const positions = [
                { left: -45, right: 135 },  // A
                { left: 0, right: 90 },     // B
                { left: -90, right: 45 }    // C
            ];
            
            let currentPos = 0;
            
            // Animate semaphore arms to random positions
            const animateSemaphore = () => {
                semaphore.classList.add('active');
                
                currentPos = (currentPos + 1) % positions.length;
                const pos = positions[currentPos];
                
                leftArm.style.transform = `translate(-50%, -50%) rotate(${pos.left}deg)`;
                rightArm.style.transform = `translate(-50%, -50%) rotate(${pos.right}deg)`;
                
                // Random color for the light effect
                const colors = ['#f39c12', '#e74c3c', '#3498db', '#2ecc71'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                light.style.background = `radial-gradient(circle, ${randomColor}, transparent 70%)`;
                
                setTimeout(() => {
                    semaphore.classList.remove('active');
                }, 2000);
            };
            
            // Reset to default position
            const resetSemaphore = () => {
                leftArm.style.transform = 'translate(-50%, -50%) rotate(-45deg)';
                rightArm.style.transform = 'translate(-50%, -50%) rotate(45deg)';
                semaphore.classList.remove('active');
            };
            
            // Event listeners for minimal interactivity
            signalBtn.addEventListener('click', animateSemaphore);
            resetBtn.addEventListener('click', resetSemaphore);
            
            // Auto-cycle through positions every 3 seconds
            let autoCycle = setInterval(animateSemaphore, 3000);
            
            // Pause auto-cycling when interacting
            signalBtn.addEventListener('mousedown', () => {
                clearInterval(autoCycle);
            });
            
            resetBtn.addEventListener('mousedown', () => {
                clearInterval(autoCycle);
            });
            
            // Restart auto-cycling after 10 seconds of inactivity
            let timeout;
            const restartAutoCycle = () => {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    autoCycle = setInterval(animateSemaphore, 3000);
                }, 10000);
            };
            
            document.addEventListener('mousemove', restartAutoCycle);
            restartAutoCycle();
        });
    </script>
</body>
</html>
