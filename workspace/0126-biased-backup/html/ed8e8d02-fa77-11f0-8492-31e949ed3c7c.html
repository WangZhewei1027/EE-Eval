<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduling Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
            animation: fadeIn 1s ease-in;
            position: relative;
        }

        h1 {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .chart {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin: 20px 0;
            height: 300px;
            position: relative;
        }

        .process {
            width: 80px;
            margin: 0 10px;
            background-color: #4a90e2;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .process:hover {
            transform: scale(1.1);
            background-color: #3a80c2;
        }

        .button {
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .button:hover {
            background-color: #3a80c2;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CPU Scheduling Visualization</h1>
        <div class="chart">
            <div class="process" style="height: 150px;">P1</div>
            <div class="process" style="height: 200px;">P2</div>
            <div class="process" style="height: 100px;">P3</div>
            <div class="process" style="height: 250px;">P4</div>
            <div class="process" style="height: 180px;">P5</div>
        </div>
        <button class="button" onclick="startSimulation()">Start Simulation</button>
    </div>
    <script>
        function startSimulation() {
            alert('Starting CPU Scheduling Simulation!');
        }
    </script>
</body>
</html>
