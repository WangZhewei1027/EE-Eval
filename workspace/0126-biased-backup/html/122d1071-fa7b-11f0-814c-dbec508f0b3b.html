<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indexing</title>
    <style>
        body {
            font-family: monospace;
            background-color: white;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.5em;
            margin: 0.5em 0;
            border: 1px solid black;
            border-radius: 0.5em;
        }
        button {
            padding: 0.5em 1em;
            margin: 0.5em 0;
            border: none;
            border-radius: 0.5em;
            cursor: pointer;
        }
        button:hover {
            background-color: #ccc;
        }
        #example {
            width: 80%;
            margin: 40px auto;
            padding: 0.5em;
            border: 1px solid black;
            border-radius: 0.5em;
            background-color: white;
        }
    </style>
</head>
<body>

<h1>Indexing</h1>
<h2>Multiple Interactive Controls</h2>
<button id="button1">Button 1</button>
<button id="button2">Button 2</button>
<button id="button3">Button 3</button>

<h2>Complex State Transitions and User-Driven Workflows</h2>
<select id="select1">
    <option value="option1">Option 1</option>
    <option value="option2">Option 2</option>
    <option value="option3">Option 3</option>
</select>

<h2>Deep Exploration Capabilities</h2>
<input id="input1" type="text" placeholder="Enter text here">
<button id="button4">Submit</button>

<h2>Rich Functionality</h2>
<p>This is a simple text editor with the following features:</p>
<ul>
    <li>Text input</li>
    <li>Submit button</li>
</ul>

<script>
    // Define the button click handlers
    document.getElementById('button1').addEventListener('click', function() {
        alert('Button 1 clicked!');
    });

    document.getElementById('button2').addEventListener('click', function() {
        alert('Button 2 clicked!');
    });

    document.getElementById('button3').addEventListener('click', function() {
        alert('Button 3 clicked!');
    });

    // Define the select change handler
    document.getElementById('select1').addEventListener('change', function() {
        alert('Select changed to: ' + this.value);
    });

    // Define the input field change handler
    document.getElementById('input1').addEventListener('input', function() {
        alert('Input field changed to: ' + this.value);
    });

    // Define the submit button click handler
    document.getElementById('button4').addEventListener('click', function() {
        alert('Submit button clicked!');
    });
</script>

<div id="example">
    <p>This is an example text editor.</p>
    <button id="submit">Submit</button>
</div>

</body>
</html>
