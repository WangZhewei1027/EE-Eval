<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Complexity Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        button, input, select {
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>Time Complexity Interactive Demo</h1>

    <label for="algorithm">Choose Algorithm:</label>
    <select id="algorithm">
        <option value="constant">O(1) - Constant Time</option>
        <option value="linear">O(n) - Linear Time</option>
        <option value="quadratic">O(n^2) - Quadratic Time</option>
    </select>

    <label for="inputSize">Input Size (n):</label>
    <input type="number" id="inputSize" value="10" min="1" max="100">

    <label for="repeat">Number of Repeats:</label>
    <input type="number" id="repeat" value="1" min="1" max="10">

    <button id="run">Run Simulation</button>
    
    <h2>Output:</h2>
    <pre id="output"></pre>

    <script>
        document.getElementById('run').onclick = function() {
            const algorithm = document.getElementById('algorithm').value;
            const inputSize = parseInt(document.getElementById('inputSize').value);
            const repeats = parseInt(document.getElementById('repeat').value);
            let timeComplexity = 0;

            switch (algorithm) {
                case 'constant':
                    timeComplexity = constantTime(inputSize, repeats);
                    break;
                case 'linear':
                    timeComplexity = linearTime(inputSize, repeats);
                    break;
                case 'quadratic':
                    timeComplexity = quadraticTime(inputSize, repeats);
                    break;
            }

            document.getElementById('output').textContent = 
                `Algorithm: ${algorithm}\nInput Size: ${inputSize}\nRepeats: ${repeats}\nTotal Operations: ${timeComplexity}`;
        };

        function constantTime(n, repeats) {
            return repeats * 1; // O(1)
        }

        function linearTime(n, repeats) {
            return repeats * n; // O(n)
        }

        function quadraticTime(n, repeats) {
            return repeats * n * n; // O(n^2)
        }
    </script>
</body>
</html>
