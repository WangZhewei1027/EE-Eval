<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agile Methodology Interactive Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1, h2, p { margin: 10px 0; }
        .section { margin-bottom: 20px; }
        button { margin: 5px; }
    </style>
</head>
<body>

<h1>Agile Methodology Interactive Demo</h1>

<div class="section">
    <h2>Define User Stories</h2>
    <input type="text" id="userStory" placeholder="Enter a user story" />
    <button onclick="addUserStory()">Add User Story</button>
    <h3>User Stories:</h3>
    <ul id="userStoryList"></ul>
</div>

<div class="section">
    <h2>Sprint Planning</h2>
    <label for="sprintLength">Sprint Length (days): </label>
    <input type="number" id="sprintLength" value="2" min="1" />
    <button onclick="setSprint()">Set Sprint</button>
    <p id="sprintInfo"></p>
</div>

<div class="section">
    <h2>Task Breakdown</h2>
    <input type="text" id="taskDescription" placeholder="Enter task description" />
    <button onclick="addTask()">Add Task</button>
    <h3>Tasks:</h3>
    <ul id="taskList"></ul>
</div>

<div class="section">
    <h2>Task Status</h2>
    <select id="taskSelect">
        <option>Select a task</option>
    </select>
    <button onclick="markAsDone()">Mark as Done</button>
    <h3>Completed Tasks:</h3>
    <ul id="completedTaskList"></ul>
</div>

<div class="section">
    <h2>Feedback Loop</h2>
    <input type="text" id="feedbackInput" placeholder="Enter feedback" />
    <button onclick="addFeedback()">Submit Feedback</button>
    <h3>Feedback:</h3>
    <ul id="feedbackList"></ul>
</div>

<script>
    let userStories = [];
    let tasks = [];
    let completedTasks = [];
    let sprintLength = 2;

    function addUserStory() {
        const userStoryInput = document.getElementById('userStory');
        const story = userStoryInput.value;
        if (story) {
            userStories.push(story);
            userStoryInput.value = '';
            updateUserStoryList();
        }
    }
    
    function updateUserStoryList() {
        const userStoryList = document.getElementById('userStoryList');
        userStoryList.innerHTML = userStories.map(story => `<li>${story}</li>`).join('');
    }

    function setSprint() {
        sprintLength = document.getElementById('sprintLength').value;
        document.getElementById('sprintInfo').innerText = `Sprint set for ${sprintLength} days.`;
    }

    function addTask() {
        const taskInput = document.getElementById('taskDescription');
        const task = taskInput.value;
        if (task) {
            tasks.push(task);
            taskInput.value = '';
            updateTaskList();
            updateTaskSelect();
        }
    }

    function updateTaskList() {
        const taskList = document.getElementById('taskList');
        taskList.innerHTML = tasks.map(task => `<li>${task}</li>`).join('');
    }

    function updateTaskSelect() {
        const taskSelect = document.getElementById('taskSelect');
        taskSelect.innerHTML = '<option>Select a task</option>' + tasks.map((task, index) => `<option value="${index}">${task}</option>`).join('');
    }

    function markAsDone() {
        const taskSelect = document.getElementById('taskSelect');
        const selectedIndex = taskSelect.value;
        if (selectedIndex !== "Select a task") {
            completedTasks.push(tasks[selectedIndex]);
            tasks.splice(selectedIndex, 1);
            updateTaskList();
            updateTaskSelect();
            updateCompletedTaskList();
        }
    }

    function updateCompletedTaskList() {
        const completedTaskList = document.getElementById('completedTaskList');
        completedTaskList.innerHTML = completedTasks.map(task => `<li>${task}</li>`).join('');
    }

    function addFeedback() {
        const feedbackInput = document.getElementById('feedbackInput');
        const feedback = feedbackInput.value;
        if (feedback) {
            const feedbackList = document.getElementById('feedbackList');
            const newItem = document.createElement('li');
            newItem.innerText = feedback;
            feedbackList.appendChild(newItem);
            feedbackInput.value = '';
        }
    }
</script>

</body>
</html>
