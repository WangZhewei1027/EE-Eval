<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trie Visualization</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #trie-node { margin: 10px; }
    </style>
</head>
<body>

<h1>Trie Interactive Demo</h1>
<input type="text" id="word-input" placeholder="Enter a word" />
<button id="insert-button">Insert</button>
<button id="search-button">Search</button>
<button id="clear-button">Clear Trie</button>

<div id="trie-node"></div>

<script>
    class TrieNode {
        constructor() {
            this.children = {};
            this.isEndOfWord = false;
        }
    }

    class Trie {
        constructor() {
            this.root = new TrieNode();
        }

        insert(word) {
            let node = this.root;
            for (let char of word) {
                if (!node.children[char]) {
                    node.children[char] = new TrieNode();
                }
                node = node.children[char];
            }
            node.isEndOfWord = true;
        }

        search(word) {
            let node = this.root;
            for (let char of word) {
                if (!node.children[char]) {
                    return false;
                }
                node = node.children[char];
            }
            return node.isEndOfWord;
        }

        clear() {
            this.root = new TrieNode();
        }
    }

    const trie = new Trie();

    function displayTrie() {
        const showNode = (node, prefix) => {
            const div = document.createElement('div');
            div.textContent = prefix + (node.isEndOfWord ? ' *' : '');
            document.getElementById('trie-node').appendChild(div);
            for (const char in node.children) {
                showNode(node.children[char], prefix + char);
            }
        };

        document.getElementById('trie-node').innerHTML = '';
        showNode(trie.root, '');
    }

    document.getElementById('insert-button').onclick = () => {
        const word = document.getElementById('word-input').value;
        if (word) {
            trie.insert(word);
            displayTrie();
            document.getElementById('word-input').value = '';
        }
    };

    document.getElementById('search-button').onclick = () => {
        const word = document.getElementById('word-input').value;
        if (word) {
            alert(`"${word}" ${trie.search(word) ? 'exists' : 'does not exist'} in the trie.`);
            document.getElementById('word-input').value = '';
        }
    };

    document.getElementById('clear-button').onclick = () => {
        trie.clear();
        displayTrie();
    };
</script>

</body>
</html>
