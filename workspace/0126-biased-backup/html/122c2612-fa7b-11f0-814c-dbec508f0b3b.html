<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PageRank</title>
    <style>
        body {
            font-family: monospace;
            font-size: 12px;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        #input-container {
            width: 50%;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #input-container input {
            padding: 10px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        #button-container {
            margin-top: 20px;
        }
        #button-container button {
            padding: 10px 20px;
            width: 100%;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        #button-container button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div id="input-container">
        <input type="text" id="source-url" placeholder="Enter URL">
        <input type="number" id="max-iterations" placeholder="Max iterations">
        <input type="number" id=" damping-factor" placeholder="Damping factor">
        <input type="number" id="initial-link-count" placeholder="Initial link count">
        <button id="calculate-btn">Calculate PageRank</button>
        <button id="reset-btn">Reset</button>
    </div>
    <div id="button-container">
        <button id="previous-btn">Previous</button>
        <button id="next-btn">Next</button>
        <button id="clear-btn">Clear</button>
    </div>

    <script>
        let sourceUrl = document.getElementById('source-url').value;
        let maxIterations = parseInt(document.getElementById('max-iterations').value);
        let dampingFactor = parseFloat(document.getElementById('damping-factor').value);
        let initialLinkCount = parseInt(document.getElementById('initial-link-count').value);

        let pageRank = new PageRank(maxIterations, dampingFactor, initialLinkCount);
        let iterations = 0;

        document.getElementById('calculate-btn').addEventListener('click', function() {
            pageRank.calculate(sourceUrl, maxIterations, dampingFactor, initialLinkCount);
            iterations++;
            document.getElementById('iterations').innerHTML = `Iterations: ${iterations}`;
        });

        document.getElementById('reset-btn').addEventListener('click', function() {
            sourceUrl = '';
            maxIterations = 0;
            dampingFactor = 0.5;
            initialLinkCount = 0;
            document.getElementById('iterations').innerHTML = `Iterations: 0`;
            pageRank = new PageRank(maxIterations, dampingFactor, initialLinkCount);
        });

        document.getElementById('previous-btn').addEventListener('click', function() {
            if (iterations > 0) {
                iterations--;
                document.getElementById('iterations').innerHTML = `Iterations: ${iterations}`;
            }
        });

        document.getElementById('next-btn').addEventListener('click', function() {
            if (iterations < maxIterations) {
                iterations++;
                document.getElementById('iterations').innerHTML = `Iterations: ${iterations}`;
            }
        });

        document.getElementById('clear-btn').addEventListener('click', function() {
            sourceUrl = '';
            maxIterations = 0;
            dampingFactor = 0.5;
            initialLinkCount = 0;
            iterations = 0;
            document.getElementById('iterations').innerHTML = `Iterations: 0`;
            pageRank = new PageRank(maxIterations, dampingFactor, initialLinkCount);
        });

        function PageRank(maxIterations, dampingFactor, initialLinkCount) {
            let links = {};
            for (let i = 0; i < initialLinkCount; i++) {
                links[i] = sourceUrl;
            }

            let ranks = new Array(initialLinkCount).fill(0);

            for (let iteration = 0; iteration < maxIterations; iteration++) {
                let newRanks = new Array(initialLinkCount).fill(0);

                for (let i = 0; i < initialLinkCount; i++) {
                    let currentRank = ranks[i];
                    let currentLink = links[i];

                    let newLinkCount = 0;
                    for (let j = 0; j < initialLinkCount; j++) {
                        if (links[j] === currentLink) {
                            newLinkCount++;
                        }
                    }

                    let newLinkProb = 1 / newLinkCount;
                    for (let j = 0; j < initialLinkCount; j++) {
                        if (links[j] === currentLink) {
                            newLinkProb *= newRanks[j];
                        }
                    }

                    newRanks[i] = currentRank + dampingFactor * newLinkProb;
                }

                ranks = newRanks;
            }

            return ranks;
        }
    </script>
</body>
</html>
