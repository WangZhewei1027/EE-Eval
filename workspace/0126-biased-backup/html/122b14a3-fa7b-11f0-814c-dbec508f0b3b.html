<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red-Black Tree</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
        }
        #tree {
            border: 1px solid black;
            padding: 10px;
            border-radius: 5px;
            width: 800px;
            height: 600px;
            margin: 20px auto;
            background-color: #fff;
            border: 1px solid black;
        }
        #controls {
            margin-bottom: 10px;
        }
        #controls button {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #controls input {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="tree"></div>
    <div id="controls">
        <button id="insert-btn">Insert</button>
        <button id="delete-btn">Delete</button>
        <input id="value-input" type="number" placeholder="Enter value">
        <button id="search-btn">Search</button>
        <button id="print-btn">Print</button>
    </div>

    <script>
        class Node {
            constructor(key, color = 'red') {
                this.key = key;
                this.color = color;
                this.left = null;
                this.right = null;
            }
        }

        class RedBlackTree {
            constructor() {
                this.root = null;
            }

            insert(key) {
                let node = new Node(key, 'black');
                if (this.root === null) {
                    this.root = node;
                } else {
                    this._insert(this.root, node);
                }
            }

            _insert(node, newNode) {
                if (newNode.key < node.key) {
                    if (node.left === null) {
                        node.left = newNode;
                    } else {
                        this._insert(node.left, newNode);
                    }
                } else {
                    if (node.right === null) {
                        node.right = newNode;
                    } else {
                        this._insert(node.right, newNode);
                    }
                }
            }

            search(key) {
                return this._search(this.root, key);
            }

            _search(node, key) {
                if (node === null) {
                    return null;
                }
                if (key < node.key) {
                    return this._search(node.left, key);
                } else if (key > node.key) {
                    return this._search(node.right, key);
                } else {
                    return node;
                }
            }

            print() {
                this._print(this.root);
            }

            _print(node) {
                if (node !== null) {
                    this._print(node.left);
                    process.stdout.write(node.key + ' ');
                    this._print(node.right);
                }
            }
        }

        let tree = new RedBlackTree();

        function insert(key) {
            tree.insert(key);
        }

        function delete(key) {
            tree.root = tree.delete(key);
        }

        function search(key) {
            return tree.search(key);
        }

        function print() {
            tree.print();
        }

        function _insert(node, newNode) {
            if (newNode.key < node.key) {
                if (node.left === null) {
                    node.left = newNode;
                } else {
                    this._insert(node.left, newNode);
                }
            } else {
                if (node.right === null) {
                    node.right = newNode;
                } else {
                    this._insert(node.right, newNode);
                }
            }
        }

        function _search(node, key) {
            if (node === null) {
                return null;
            }
            if (key < node.key) {
                return this._search(node.left, key);
            } else if (key > node.key) {
                return this._search(node.right, key);
            } else {
                return node;
            }
        }

        function _print(node) {
            if (node !== null) {
                this._print(node.left);
                process.stdout.write(node.key + ' ');
                this._print(node.right);
            }
        }

        document.getElementById('insert-btn').addEventListener('click', () => {
            insert(Number(document.getElementById('value-input').value));
        });

        document.getElementById('delete-btn').addEventListener('click', () => {
            delete(Number(document.getElementById('value-input').value));
        });

        document.getElementById('search-btn').addEventListener('click', () => {
            let found = search(Number(document.getElementById('value-input').value));
            if (found !== null) {
                console.log(found.key);
            } else {
                console.log('Not found');
            }
        });

        document.getElementById('print-btn').addEventListener('click', () => {
            print();
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
