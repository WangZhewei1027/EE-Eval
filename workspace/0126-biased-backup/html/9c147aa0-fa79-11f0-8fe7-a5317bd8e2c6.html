<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Prim's Algorithm Interactive Demo</title>
<style>
/* Extremely minimal visual design: keep plain default styles */
body { font-family: sans-serif; margin: 8px; color: #000; background: #fff; }
#container { display: flex; gap: 8px; }
#controls { width: 360px; max-width: 40%; }
section { margin-bottom: 10px; padding: 6px; border: 1px solid #000; }
label { display: block; margin-top: 6px; }
input[type="range"] { width: 100%; }
svg { width: 800px; height: 600px; border: 1px solid #000; background: #fff; }
button { margin: 2px 2px 2px 0; }
.small { font-size: 12px; }
textarea { width: 100%; height: 100px; font-family: monospace; }
select { width: 100%; }
kbd { background: #fff; border: 1px solid #000; padding: 1px 3px; }
.panel-row { display: flex; gap: 6px; align-items: center; margin-top:6px; flex-wrap:wrap;}
#log { height: 140px; overflow:auto; white-space: pre-wrap; font-family: monospace; font-size:12px; }
#pqbox { font-family: monospace; font-size: 12px; height: 120px; overflow:auto; border:1px solid #000; padding:4px; }
input[type="number"] { width: 70px; }
#mode-indicator { font-weight: bold; }
</style>
</head>
<body>
<h2>Prim's Algorithm — Interactive Demonstration</h2>
<div id="container">
  <div id="controls">
    <section>
      <strong>Graph Construction</strong>
      <div class="panel-row">
        <button id="addNodeBtn">Add Node</button>
        <button id="addNodeRandBtn">Add Random Node</button>
        <button id="clearGraphBtn">Clear Graph</button>
      </div>
      <label>Random Graph
        <div class="panel-row">
          Nodes: <input id="randNodes" type="number" value="8" min="1" max="60">
          Density (%): <input id="randDensity" type="range" min="0" max="100" value="35">
          <span id="randDensityVal">35</span>
        </div>
        <div class="panel-row">
          Weight min: <input id="wmin" type="number" value="1" min="0"> max: <input id="wmax" type="number" value="20" min="1">
          <button id="genRandBtn">Generate Random</button>
        </div>
      </label>

      <label>Edge / Node Modes
        <div class="panel-row">
          <button id="edgeModeBtn">Toggle Add-Edge Mode</button>
          <button id="delModeBtn">Toggle Delete Mode</button>
          <button id="moveModeBtn">Toggle Move Nodes</button>
        </div>
        <div class="panel-row small">
          In Add-Edge Mode: click two nodes to add an edge. After selecting two nodes the weight input appears.
        </div>
      </label>

      <label>Selected Element
        <div id="selectedInfo">None</div>
        <div class="panel-row">
          <button id="editWeightBtn">Edit Weight</button>
          <button id="deleteBtn">Delete</button>
          <input id="editWeightInput" type="number" style="display:none" min="0">
          <button id="applyWeightBtn" style="display:none">Apply</button>
        </div>
      </label>
    </section>

    <section>
      <strong>Prim Controls</strong>
      <label>Start Node:
        <select id="startNodeSelect"></select>
      </label>
      <label>Tie-break:
        <select id="tieBreak">
          <option value="id">By Node ID</option>
          <option value="random">Random</option>
        </select>
      </label>
      <label>Priority Queue Implementation:
        <select id="pqImpl">
          <option value="binaryHeap">Binary Heap</option>
          <option value="simple">Simple Array</option>
        </select>
      </label>
      <label>Execution Controls
        <div class="panel-row">
          <button id="initPrimBtn">Init/Reset Algorithm</button>
          <button id="stepBtn">Step</button>
          <button id="nextBtn">Next (auto step)</button>
          <button id="prevBtn">Prev</button>
          <button id="runBtn">Run</button>
          <button id="pauseBtn">Pause</button>
          <button id="completeBtn">Complete</button>
        </div>
      </label>
      <label>Speed (ms per step)
        <input id="speed" type="range" min="50" max="2000" value="500">
        <span id="speedVal">500</span>
      </label>
      <label>Mode:
        <div class="panel-row">
          <select id="execMode">
            <option value="auto">Auto Trace</option>
            <option value="manual">Manual (pick next edge/node)</option>
            <option value="inspect">Inspect Only</option>
          </select>
          <div id="mode-indicator">Mode: auto</div>
        </div>
      </label>

      <div class="panel-row">
        <button id="computeMSTBtn">Compute MST (full)</button>
        <button id="compareKruskalBtn">Compare with Kruskal</button>
      </div>

      <div class="panel-row small"><strong>MST Weight:</strong> <span id="mstWeight">0</span> <strong>Edges:</strong> <span id="mstEdgesCount">0</span></div>
    </section>

    <section>
      <strong>Trace Controls & PQ</strong>
      <label>Priority Queue (live)</label>
      <div id="pqbox"></div>
      <label>Log / Trace
        <div id="log"></div>
        <div class="panel-row">
          <button id="clearLogBtn">Clear Log</button>
          <button id="saveSnapshotBtn">Save Snapshot</button>
          <button id="loadSnapshotBtn">Load Snapshot</button>
        </div>
      </label>
    </section>

    <section>
      <strong>Import / Export</strong>
      <div class="panel-row">
        <button id="exportBtn">Export JSON</button>
        <button id="importBtn">Import JSON</button>
      </div>
      <textarea id="jsonArea" placeholder="Graph JSON appears here for export/import"></textarea>
    </section>

    <section>
      <strong>Undo / Redo & States</strong>
      <div class="panel-row">
        <button id="undoBtn">Undo</button>
        <button id="redoBtn">Redo</button>
        <button id="snapshotListBtn">List Snapshots</button>
      </div>
      <div id="snapshotsList"></div>
    </section>

  </div>

  <div id="visual">
    <svg id="svg"></svg>
    <div class="panel-row" style="margin-top:6px;">
      <div><label><input id="showWeights" type="checkbox" checked> Show Weights</label></div>
      <div><label><input id="showNodeIds" type="checkbox" checked> Show Node IDs</label></div>
      <div><label><input id="showVisited" type="checkbox" checked> Show Visited</label></label></div>
      <div><label><input id="showMSTEdgesOnly" type="checkbox"> Show MST overlay only</label></div>
    </div>
    <div style="margin-top:6px;">
      <label>Adjacency List / Matrix (toggle)
        <div id="adjView" style="font-family: monospace; white-space: pre; margin-top:6px;"></div>
      </label>
    </div>
  </div>
</div>

<script>
/*
Prim's Algorithm Interactive Demo
- Minimal visual styling
- Rich interactivity: graph editing, random generation, step-by-step Prim, manual choices,
  PQ visualization, export/import, snapshots, undo/redo, compare with Kruskal.
*/

// Basic graph model
let Graph = {
  nodes: [], // {id, x, y}
  edges: [], // {id, u, v, w}
  nextNodeId: 1,
  nextEdgeId: 1
};

let stateHistory = [];
let historyIndex = -1;
let snapshots = [];

function saveHistory(label) {
  // Keep deep copy
  let copy = JSON.parse(JSON.stringify(Graph));
  stateHistory = stateHistory.slice(0, historyIndex + 1);
  stateHistory.push({graph: copy, label: label || ''});
  historyIndex++;
  updateSnapshotsUI();
}
function undo() {
  if (historyIndex <= 0) return;
  historyIndex--;
  Graph = JSON.parse(JSON.stringify(stateHistory[historyIndex].graph));
  rebuildAfterGraphChange();
}
function redo() {
  if (historyIndex >= stateHistory.length - 1) return;
  historyIndex++;
  Graph = JSON.parse(JSON.stringify(stateHistory[historyIndex].graph));
  rebuildAfterGraphChange();
}

function snapshotSave() {
  snapshots.push(JSON.parse(JSON.stringify(Graph)));
  updateSnapshotsUI();
}
function snapshotLoad(idx) {
  if (idx < 0 || idx >= snapshots.length) return;
  Graph = JSON.parse(JSON.stringify(snapshots[idx]));
  rebuildAfterGraphChange();
}

// Basic DOM refs
const svg = document.getElementById('svg');
const addNodeBtn = document.getElementById('addNodeBtn');
const addNodeRandBtn = document.getElementById('addNodeRandBtn');
const clearGraphBtn = document.getElementById('clearGraphBtn');
const genRandBtn = document.getElementById('genRandBtn');
const randNodes = document.getElementById('randNodes');
const randDensity = document.getElementById('randDensity');
const randDensityVal = document.getElementById('randDensityVal');
const wmin = document.getElementById('wmin');
const wmax = document.getElementById('wmax');
const edgeModeBtn = document.getElementById('edgeModeBtn');
const delModeBtn = document.getElementById('delModeBtn');
const moveModeBtn = document.getElementById('moveModeBtn');
const selectedInfo = document.getElementById('selectedInfo');
const editWeightBtn = document.getElementById('editWeightBtn');
const deleteBtn = document.getElementById('deleteBtn');
const editWeightInput = document.getElementById('editWeightInput');
const applyWeightBtn = document.getElementById('applyWeightBtn');

const startNodeSelect = document.getElementById('startNodeSelect');
const tieBreak = document.getElementById('tieBreak');
const pqImpl = document.getElementById('pqImpl');
const initPrimBtn = document.getElementById('initPrimBtn');
const stepBtn = document.getElementById('stepBtn');
const nextBtn = document.getElementById('nextBtn');
const prevBtn = document.getElementById('prevBtn');
const runBtn = document.getElementById('runBtn');
const pauseBtn = document.getElementById('pauseBtn');
const completeBtn = document.getElementById('completeBtn');
const speed = document.getElementById('speed');
const speedVal = document.getElementById('speedVal');
const execMode = document.getElementById('execMode');
const modeIndicator = document.getElementById('mode-indicator');
const computeMSTBtn = document.getElementById('computeMSTBtn');
const compareKruskalBtn = document.getElementById('compareKruskalBtn');

const pqbox = document.getElementById('pqbox');
const logBox = document.getElementById('log');
const clearLogBtn = document.getElementById('clearLogBtn');
const saveSnapshotBtn = document.getElementById('saveSnapshotBtn');
const loadSnapshotBtn = document.getElementById('loadSnapshotBtn');

const exportBtn = document.getElementById('exportBtn');
const importBtn = document.getElementById('importBtn');
const jsonArea = document.getElementById('jsonArea');

const showWeights = document.getElementById('showWeights');
const showNodeIds = document.getElementById('showNodeIds');
const showVisited = document.getElementById('showVisited');
const showMSTEdgesOnly = document.getElementById('showMSTEdgesOnly');
const adjView = document.getElementById('adjView');

const mstWeightSpan = document.getElementById('mstWeight');
const mstEdgesCountSpan = document.getElementById('mstEdgesCount');
const pqImplSelect = pqImpl;

const undoBtn = document.getElementById('undoBtn');
const redoBtn = document.getElementById('redoBtn');
const snapshotListBtn = document.getElementById('snapshotListBtn');
const snapshotsList = document.getElementById('snapshotsList');

randDensity.addEventListener('input', ()=> randDensityVal.textContent = randDensity.value);
speed.addEventListener('input', ()=> speedVal.textContent = speed.value);

let mode = {
  addEdge: false,
  delete: false,
  move: false
};

let selection = {type: null, id: null}; // type 'node' or 'edge'
let addEdgeSelection = []; // selected node ids when in add-edge mode

// Visualization state for algorithm
let algoState = null; // will hold algorithm simulation state object
let playTimer = null;

function log(msg) {
  let time = new Date().toISOString().slice(11,23);
  logBox.textContent += "[" + time + "] " + msg + "\n";
  logBox.scrollTop = logBox.scrollHeight;
}

// Helper: find node/edge by id
function getNodeById(id) { return Graph.nodes.find(n => n.id === id); }
function getEdgeById(id) { return Graph.edges.find(e => e.id === id); }

// Graph editing functions
function addNode(x, y) {
  const node = {id: Graph.nextNodeId++, x: x, y: y};
  Graph.nodes.push(node);
  saveHistory('addNode');
  redraw();
  return node;
}
function deleteNode(id) {
  Graph.nodes = Graph.nodes.filter(n => n.id !== id);
  Graph.edges = Graph.edges.filter(e => e.u !== id && e.v !== id);
  saveHistory('deleteNode');
  selection = {type:null, id:null};
  rebuildAfterGraphChange();
}
function addEdge(u, v, w) {
  if (u === v) return null;
  // ensure undirected uniqueness: canonical ordering
  let a = Math.min(u,v), b = Math.max(u,v);
  if (Graph.edges.some(e => (Math.min(e.u,e.v)===a && Math.max(e.u,e.v)===b))) {
    log("Edge already exists between " + a + " and " + b);
    return null;
  }
  const edge = {id: Graph.nextEdgeId++, u: u, v: v, w: w};
  Graph.edges.push(edge);
  saveHistory('addEdge');
  redraw();
  return edge;
}
function deleteEdge(id) {
  Graph.edges = Graph.edges.filter(e => e.id !== id);
  saveHistory('deleteEdge');
  selection = {type:null, id:null};
  redraw();
}
function setEdgeWeight(id, w) {
  let e = getEdgeById(id);
  if (!e) return;
  e.w = Number(w);
  saveHistory('setWeight');
  redraw();
}

function clearGraph() {
  Graph.nodes = [];
  Graph.edges = [];
  Graph.nextNodeId = 1;
  Graph.nextEdgeId = 1;
  saveHistory('clearGraph');
  redraw();
}

// Random graph generator
function generateRandomGraph(n, densityPercent, wMin, wMax, seed) {
  // clear existing and create nodes positioned in grid-ish
  Graph.nodes = [];
  Graph.edges = [];
  Graph.nextNodeId = 1;
  Graph.nextEdgeId = 1;
  // place nodes in SVG area
  const W = svg.clientWidth, H = svg.clientHeight;
  for (let i=0;i<n;i++) {
    let x = 40 + (i%10) * Math.min(60, (W-80)/Math.min(9, n-1));
    let y = 40 + Math.floor(i/10) * 60 + Math.random()*20;
    if (i%10===0 && i!==0) x = 40 + Math.random()*20;
    addNode(x + Math.random()*40, y + Math.random()*40);
  }
  // edges using probability
  for (let i=0;i<n;i++){
    for (let j=i+1;j<n;j++){
      if (Math.random() < densityPercent/100) {
        let w = wMin + Math.floor(Math.random() * (wMax - wMin + 1));
        Graph.edges.push({id: Graph.nextEdgeId++, u: Graph.nodes[i].id, v: Graph.nodes[j].id, w: w});
      }
    }
  }
  saveHistory('genRandom');
  rebuildAfterGraphChange();
}

// Redraw
function redraw() {
  // clear svg
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  // Draw edges (lower z-order)
  let edgesToDraw = Graph.edges.slice();
  if (showMSTEdgesOnly.checked && algoState && algoState.mstEdges) {
    // show only MST overlay edges but still draw silhouette for context minimal
    edgesToDraw = Graph.edges.filter(e => algoState.mstEdges.some(me => me.id === e.id));
  }
  edgesToDraw.forEach(e => {
    let u = getNodeById(e.u), v = getNodeById(e.v);
    if (!u || !v) return;
    let line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', u.x);
    line.setAttribute('y1', u.y);
    line.setAttribute('x2', v.x);
    line.setAttribute('y2', v.y);
    line.setAttribute('stroke','black');
    line.setAttribute('stroke-width', (algoState && algoState.mstEdges && algoState.mstEdges.some(me => me.id === e.id))? 4 : 1);
    line.setAttribute('data-edge-id', e.id);
    line.addEventListener('click', svgEdgeClick);
    svg.appendChild(line);

    if (showWeights.checked) {
      const tx = (u.x + v.x)/2;
      const ty = (u.y + v.y)/2;
      let text = document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('x', tx + 4);
      text.setAttribute('y', ty - 4);
      text.setAttribute('font-size','12');
      text.textContent = e.w;
      text.setAttribute('pointer-events','none');
      svg.appendChild(text);
    }
  });

  // Draw nodes on top
  Graph.nodes.forEach(n => {
    let group = document.createElementNS('http://www.w3.org/2000/svg','g');
    group.setAttribute('transform', `translate(${n.x},${n.y})`);
    group.setAttribute('data-node-id', n.id);

    let circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('r', 12);
    circle.setAttribute('cx', 0);
    circle.setAttribute('cy', 0);
    circle.setAttribute('fill','none');
    circle.setAttribute('stroke','black');
    circle.setAttribute('stroke-width','1');
    circle.addEventListener('mousedown', svgNodeDown);
    circle.addEventListener('click', svgNodeClick);
    group.appendChild(circle);

    if (showNodeIds.checked) {
      let text = document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('x', -6);
      text.setAttribute('y', 4);
      text.setAttribute('font-size','12');
      text.textContent = n.id;
      text.setAttribute('pointer-events','none');
      group.appendChild(text);
    }

    if (algoState && algoState.visited && algoState.visited.has(n.id) && showVisited.checked) {
      let small = document.createElementNS('http://www.w3.org/2000/svg','circle');
      small.setAttribute('r', 5);
      small.setAttribute('cx', 12);
      small.setAttribute('cy', -12);
      small.setAttribute('fill','none');
      small.setAttribute('stroke','black');
      small.setAttribute('stroke-width','1');
      group.appendChild(small);
    }

    svg.appendChild(group);
  });

  refreshUISelections();
  updateStartNodeSelect();
  updateAdjView();
}

function refreshUISelections() {
  // Selected info panel
  if (!selection.type) {
    selectedInfo.textContent = 'None';
    editWeightBtn.style.display = 'inline-block';
    deleteBtn.style.display = 'inline-block';
    editWeightInput.style.display = 'none';
    applyWeightBtn.style.display = 'none';
  } else if (selection.type === 'node') {
    let n = getNodeById(selection.id);
    if (n) {
      selectedInfo.textContent = 'Node ' + n.id + ' (x:' + Math.round(n.x) + ' y:' + Math.round(n.y) + ')';
    } else {
      selection = {type:null, id:null};
      selectedInfo.textContent = 'None';
    }
  } else if (selection.type === 'edge') {
    let e = getEdgeById(selection.id);
    if (e) {
      selectedInfo.textContent = 'Edge ' + e.id + ' (' + e.u + ' - ' + e.v + ') weight: ' + e.w;
    } else {
      selection = {type:null, id:null};
      selectedInfo.textContent = 'None';
    }
  }
  // toggle vis mode buttons highlight (purely textual)
  edgeModeBtn.textContent = mode.addEdge ? "Add-Edge Mode: ON" : "Toggle Add-Edge Mode";
  delModeBtn.textContent = mode.delete ? "Delete Mode: ON" : "Toggle Delete Mode";
  moveModeBtn.textContent = mode.move ? "Move Nodes: ON" : "Toggle Move Nodes";
}

function updateStartNodeSelect() {
  const cur = startNodeSelect.value;
  while (startNodeSelect.firstChild) startNodeSelect.removeChild(startNodeSelect.firstChild);
  Graph.nodes.forEach(n => {
    let opt = document.createElement('option');
    opt.value = n.id;
    opt.textContent = n.id;
    startNodeSelect.appendChild(opt);
  });
  if (cur) startNodeSelect.value = cur;
}

function updateAdjView() {
  // Show adjacency list and matrix (text)
  let out = "";
  let nmap = new Map();
  Graph.nodes.forEach((n,i)=> nmap.set(n.id,i));
  // adjacency list
  out += "Adjacency List:\n";
  Graph.nodes.forEach(n => {
    out += n.id + ": ";
    let arr = Graph.edges.filter(e => e.u === n.id || e.v === n.id).map(e => {
      let other = (e.u === n.id) ? e.v : e.u;
      return "(" + other + ", w=" + e.w + ")";
    });
    out += arr.join(", ") + "\n";
  });
  // matrix small
  out += "\nMatrix (rows/cols node ids):\n  ";
  out += Graph.nodes.map(n=>n.id).join(" ");
  out += "\n";
  Graph.nodes.forEach(r=>{
    out += r.id + " ";
    Graph.nodes.forEach(c=>{
      let e = Graph.edges.find(e2 => (e2.u===r.id && e2.v===c.id) || (e2.u===c.id && e2.v===r.id));
      out += (e? e.w : ".") + " ";
    });
    out += "\n";
  });
  adjView.textContent = out;
}

// SVG interactions
let dragState = null;

function svgNodeDown(evt) {
  let g = evt.target.parentNode;
  let id = Number(g.getAttribute('data-node-id'));
  if (!mode.move) return;
  // start dragging
  const pt = svg.createSVGPoint();
  dragState = {nodeId: id};
  window.addEventListener('mousemove', svgNodeMove);
  window.addEventListener('mouseup', svgNodeUp);
}
function svgNodeMove(evt) {
  if (!dragState) return;
  let node = getNodeById(dragState.nodeId);
  if (!node) return;
  const rect = svg.getBoundingClientRect();
  let x = evt.clientX - rect.left;
  let y = evt.clientY - rect.top;
  node.x = Math.max(20, Math.min(svg.clientWidth - 20, x));
  node.y = Math.max(20, Math.min(svg.clientHeight - 20, y));
  redraw();
}
function svgNodeUp(evt) {
  if (!dragState) return;
  saveHistory('moveNode');
  dragState = null;
  window.removeEventListener('mousemove', svgNodeMove);
  window.removeEventListener('mouseup', svgNodeUp);
}

function svgNodeClick(evt) {
  evt.stopPropagation();
  let id = Number(evt.target.parentNode.getAttribute('data-node-id'));
  if (mode.delete) {
    deleteNode(id);
    return;
  }
  if (mode.addEdge) {
    addEdgeSelection.push(id);
    log("Selected node " + id + " for edge creation.");
    if (addEdgeSelection.length === 2) {
      let u = addEdgeSelection[0], v = addEdgeSelection[1];
      let w = prompt("Edge weight between " + u + " and " + v + " (integer):", "1");
      if (w !== null) {
        let wi = parseInt(w,10);
        if (!isNaN(wi)) {
          addEdge(u, v, wi);
        }
      }
      addEdgeSelection = [];
    }
    return;
  }
  // selection
  selection = {type: 'node', id: id};
  refreshUISelections();
}
function svgEdgeClick(evt) {
  evt.stopPropagation();
  let id = Number(evt.target.getAttribute('data-edge-id'));
  if (mode.delete) {
    deleteEdge(id);
    return;
  }
  selection = {type: 'edge', id: id};
  refreshUISelections();
}

svg.addEventListener('click', (evt) => {
  // add node at click location
  if (mode.addEdge || mode.delete) {
    // clicking empty space cancels edge selection
    addEdgeSelection = [];
    return;
  }
  if (evt.target === svg) {
    const rect = svg.getBoundingClientRect();
    let x = evt.clientX - rect.left;
    let y = evt.clientY - rect.top;
    addNode(x, y);
  }
});

// Buttons
addNodeBtn.addEventListener('click', ()=> {
  addNode(svg.clientWidth/2 + Math.random()*40-20, svg.clientHeight/2 + Math.random()*40-20);
});
addNodeRandBtn.addEventListener('click', ()=> {
  addNode(40 + Math.random()*(svg.clientWidth-80), 40 + Math.random()*(svg.clientHeight-80));
});
clearGraphBtn.addEventListener('click', ()=> {
  if (confirm("Clear entire graph?")) clearGraph();
});
genRandBtn.addEventListener('click', ()=> {
  let n = Number(randNodes.value);
  let dens = Number(randDensity.value);
  let minw = Number(wmin.value);
  let maxw = Number(wmax.value);
  generateRandomGraph(n, dens, minw, maxw);
});
edgeModeBtn.addEventListener('click', ()=> {
  mode.addEdge = !mode.addEdge;
  mode.delete = false;
  refreshUISelections();
});
delModeBtn.addEventListener('click', ()=> {
  mode.delete = !mode.delete;
  if (mode.delete) mode.addEdge = false;
  refreshUISelections();
});
moveModeBtn.addEventListener('click', ()=> {
  mode.move = !mode.move;
  refreshUISelections();
});

editWeightBtn.addEventListener('click', ()=> {
  if (selection.type === 'edge') {
    let e = getEdgeById(selection.id);
    editWeightInput.value = e.w;
    editWeightInput.style.display = 'inline-block';
    applyWeightBtn.style.display = 'inline-block';
  } else {
    alert("Select an edge first to edit weight.");
  }
});
applyWeightBtn.addEventListener('click', ()=> {
  if (selection.type === 'edge') {
    let v = Number(editWeightInput.value);
    if (!isNaN(v)) {
      setEdgeWeight(selection.id, v);
      editWeightInput.style.display = 'none';
      applyWeightBtn.style.display = 'none';
    }
  }
});

// Algorithm Simulation
function initPrim(startId) {
  if (Graph.nodes.length === 0) {
    alert("Graph empty.");
    return;
  }
  // ensure graph connectivity check optional: Prim can run on each component
  let nodes = Graph.nodes.map(n=>n.id);
  // init data structures
  let dist = {};
  let parent = {};
  let visited = new Set();
  nodes.forEach(id => { dist[id] = Infinity; parent[id] = null; });
  if (!startId) startId = nodes[0];
  dist[startId] = 0;

  let actions = []; // action trace for step-by-step
  // Implementation with chosen PQ style
  if (pqImpl.value === 'binaryHeap') {
    actions = primTraceWithHeap(startId, dist, parent);
  } else {
    actions = primTraceWithArray(startId, dist, parent);
  }

  algoState = {
    startId: startId,
    dist: dist,
    parent: parent,
    visited: visited,
    actions: actions,
    actionIndex: 0,
    mstEdges: [],
    mstWeight: 0
  };
  log("Prim initialized starting at node " + startId + ". Actions: " + actions.length);
  redraw();
  updatePQBox();
  updateMSTMetrics();
  return algoState;
}

function primTraceWithHeap(startId, distInit, parentInit) {
  // We'll produce actions that describe the algorithm at a higher level.
  // Action formats: {type: 'visit', u}, {type: 'relax', u, v, old, new, parent}, {type:'addMST', edgeId}
  let edgesByNode = buildAdjList();
  let nodes = Graph.nodes.map(n=>n.id);
  let dist = Object.assign({}, distInit);
  let parent = Object.assign({}, parentInit);
  let visited = new Set();
  let actions = [];

  // simple binary heap implementing nodes keyed by dist
  class Heap {
    constructor() { this.a = []; }
    push(key, id) { this.a.push({k:key,id:id}); this.bubbleUp(this.a.length-1); }
    bubbleUp(i){ while(i>0){ let p=Math.floor((i-1)/2); if(this.a[p].k <= this.a[i].k) break; [this.a[p],this.a[i]]=[this.a[i],this.a[p]]; i=p; } }
    pop(){ if(this.a.length===0) return null; let top=this.a[0]; let last=this.a.pop(); if(this.a.length){ this.a[0]=last; this.sink(0);} return top; }
    sink(i){ while(true){ let l=2*i+1, r=2*i+2, smallest=i; if(l<this.a.length && this.a[l].k<this.a[smallest].k) smallest=l; if(r<this.a.length && this.a[r].k<this.a[smallest].k) smallest=r; if(smallest===i) break; [this.a[i],this.a[smallest]]=[this.a[smallest],this.a[i]]; i=smallest; } }
    isEmpty(){ return this.a.length===0; }
    dump(){ return this.a.map(x=>`${x.id}:${x.k}`).join(", "); }
  }

  let heap = new Heap();
  heap.push(0, startId);

  while (!heap.isEmpty()) {
    let t = heap.pop();
    let u = t.id;
    if (visited.has(u)) continue;
    actions.push({type:'visit', u:u});
    visited.add(u);
    if (parent[u] !== null) {
      // find edge id between u and parent[u]
      let e = Graph.edges.find(ed => (ed.u===u && ed.v===parent[u]) || (ed.v===u && ed.u===parent[u]));
      if (e) actions.push({type:'addMST', edgeId: e.id});
    }
    // relax neighbors
    for (let e of edgesByNode[u]) {
      let v = (e.u === u ? e.v : e.u);
      if (visited.has(v)) continue;
      let old = dist[v];
      if (e.w < old || (e.w === old && tieBreak.value === 'random' && Math.random()<0.5)) {
        dist[v] = e.w;
        parent[v] = u;
        actions.push({type:'relax', u:u, v:v, edgeId:e.id, old: old, newVal: e.w, parent:u});
        heap.push(dist[v], v);
      }
    }
  }
  return actions;
}

function primTraceWithArray(startId, distInit, parentInit) {
  // Simple O(n^2) style trace: pick min unvisited by scanning
  let edgesByNode = buildAdjList();
  let nodes = Graph.nodes.map(n=>n.id);
  let dist = Object.assign({}, distInit);
  let parent = Object.assign({}, parentInit);
  let visited = new Set();
  let actions = [];
  // initial
  let n = nodes.length;
  for (let iter=0; iter<n; iter++) {
    // pick min
    let minVal = Infinity; let minNode = null;
    for (let id of nodes) {
      if (!visited.has(id) && dist[id] < minVal) { minVal = dist[id]; minNode = id; }
    }
    if (minNode === null) break;
    actions.push({type:'visit', u:minNode});
    visited.add(minNode);
    if (parent[minNode] !== null) {
      let e = Graph.edges.find(ed => (ed.u===minNode && ed.v===parent[minNode]) || (ed.v===minNode && ed.u===parent[minNode]));
      if (e) actions.push({type:'addMST', edgeId: e.id});
    }
    // relax
    for (let e of edgesByNode[minNode]) {
      let v = (e.u === minNode ? e.v : e.u);
      if (visited.has(v)) continue;
      let old = dist[v];
      if (e.w < old || (e.w === old && tieBreak.value === 'random' && Math.random()<0.5)) {
        dist[v] = e.w;
        parent[v] = minNode;
        actions.push({type:'relax', u:minNode, v:v, edgeId:e.id, old: old, newVal: e.w, parent:minNode});
      }
    }
  }
  return actions;
}

// Build adjacency list
function buildAdjList() {
  let adj = {};
  Graph.nodes.forEach(n=> adj[n.id] = []);
  Graph.edges.forEach(e=>{
    if (!adj[e.u]) adj[e.u] = [];
    if (!adj[e.v]) adj[e.v] = [];
    adj[e.u].push(e);
    adj[e.v].push(e);
  });
  return adj;
}

// Execution control
initPrimBtn.addEventListener('click', ()=> {
  let start = Number(startNodeSelect.value) || (Graph.nodes[0] && Graph.nodes[0].id);
  initPrim(start);
});
stepBtn.addEventListener('click', ()=> doStep());
nextBtn.addEventListener('click', ()=> doStep());
prevBtn.addEventListener('click', ()=> undoStep());
runBtn.addEventListener('click', ()=> startAutoRun());
pauseBtn.addEventListener('click', ()=> stopAutoRun());
completeBtn.addEventListener('click', ()=> completeRun());
execMode.addEventListener('change', ()=> { modeIndicator.textContent = "Mode: " + execMode.value; });

function doStep() {
  if (!algoState) {
    alert("Initialize algorithm first (Init/Reset).");
    return;
  }
  if (algoState.actionIndex >= algoState.actions.length) {
    log("No more actions.");
    return;
  }
  let action = algoState.actions[algoState.actionIndex++];
  applyAction(action);
  updatePQBox();
  redraw();
  updateMSTMetrics();
}
function applyAction(action) {
  if (action.type === 'visit') {
    log("Visiting node " + action.u);
    algoState.visited.add(action.u);
    // when visiting, if parent exists MST edge added handled by addMST action that follows
  } else if (action.type === 'relax') {
    log("Relax edge " + action.edgeId + " connecting " + action.u + " -> " + action.v + " (old:" + action.old + " new:" + action.newVal + ")");
    algoState.dist[action.v] = action.newVal;
    algoState.parent[action.v] = action.parent;
    // PQ updated in updatePQBox
  } else if (action.type === 'addMST') {
    let e = getEdgeById(action.edgeId);
    if (e && !algoState.mstEdges.some(me=>me.id===e.id)) {
      algoState.mstEdges.push(e);
      algoState.mstWeight += e.w;
      log("Added edge " + e.id + " to MST (" + e.u + "-" + e.v + " w=" + e.w + ")");
    }
  } else {
    log("Unknown action: " + JSON.stringify(action));
  }
}

function undoStep() {
  if (!algoState) { alert("No algorithm state to undo."); return; }
  if (algoState.actionIndex <= 0) { log("At beginning of trace."); return; }
  // Recompute by replaying actions up to actionIndex-1
  algoState.visited = new Set();
  algoState.dist = {};
  algoState.parent = {};
  Graph.nodes.forEach(n => { algoState.dist[n.id] = Infinity; algoState.parent[n.id] = null; });
  algoState.dist[algoState.startId] = 0;
  algoState.mstEdges = [];
  algoState.mstWeight = 0;
  let target = algoState.actionIndex - 1;
  for (let i=0;i<target;i++) {
    let action = algoState.actions[i];
    if (action.type === 'visit') {
      algoState.visited.add(action.u);
    } else if (action.type === 'relax') {
      algoState.dist[action.v] = action.newVal;
      algoState.parent[action.v] = action.parent;
    } else if (action.type === 'addMST') {
      let e = getEdgeById(action.edgeId);
      if (e) { algoState.mstEdges.push(e); algoState.mstWeight += e.w; }
    }
  }
  algoState.actionIndex = target;
  redraw();
  updatePQBox();
  updateMSTMetrics();
  log("Stepped back to action " + algoState.actionIndex);
}

function startAutoRun() {
  if (!algoState) { alert("Initialize algorithm first."); return; }
  stopAutoRun();
  playTimer = setInterval(()=> {
    if (algoState.actionIndex >= algoState.actions.length) {
      stopAutoRun();
      log("Auto-run complete.");
      return;
    }
    if (execMode.value === 'manual') {
      stopAutoRun();
      log("Auto-run stopped because mode is manual.");
      return;
    }
    doStep();
  }, Number(speed.value));
  log("Auto-run started.");
}
function stopAutoRun() {
  if (playTimer) clearInterval(playTimer);
  playTimer = null;
  log("Auto-run paused.");
}
function completeRun() {
  if (!algoState) { alert("Initialize first."); return; }
  while (algoState.actionIndex < algoState.actions.length) doStep();
  log("Completed run.");
}

function updatePQBox() {
  if (!algoState) { pqbox.textContent = ""; return; }
  // For visualization purposes, compute a snapshot of PQ according to chosen implementation
  if (pqImpl.value === 'binaryHeap') {
    // Reconstruct heap by simulating pushes during actions up to current index
    // Simulate heap state by scanning relax actions so far and last visit pops
    let pushed = [];
    for (let i=0;i<algoState.actionIndex;i++) {
      let action = algoState.actions[i];
      if (action.type === 'relax') {
        pushed.push({id: action.v, k: action.newVal});
      } else if (action.type === 'visit') {
        // remove visited if present; pop would remove etc -> we'll mark
        pushed = pushed.filter(p => p.id !== action.u);
      }
    }
    pqbox.textContent = pushed.map(p => p.id + ":" + p.k).join(", ");
  } else {
    // simple array: show current dist for unvisited
    let arr = [];
    for (let n of Graph.nodes) {
      if (algoState.visited.has(n.id)) continue;
      arr.push(n.id + ":" + (algoState.dist[n.id]===Infinity ? "Inf" : algoState.dist[n.id]));
    }
    pqbox.textContent = arr.join(", ");
  }
}

function updateMSTMetrics() {
  if (!algoState) {
    mstWeightSpan.textContent = "0";
    mstEdgesCountSpan.textContent = "0";
  } else {
    mstWeightSpan.textContent = algoState.mstWeight;
    mstEdgesCountSpan.textContent = algoState.mstEdges.length;
  }
}

// Compute MST full (one-shot)
computeMSTBtn.addEventListener('click', ()=> {
  if (Graph.nodes.length === 0) return;

  initPrim(start);
  completeRun();

});

// Compare with Kruskal
compareKruskalBtn.addEventListener('click', ()=> {
  let kr = computeKruskal();
  let prim = algoState ? {weight: algoState.mstWeight, edges: (algoState.mstEdges || []).map(e=>e.id)} : null;
  alert("Kruskal MST weight: " + kr.weight + " edges: " + kr.edges.map(e=>e.id).join(", "));
  log("Kruskal produced weight " + kr.weight + ".");
});

// Kruskal implementation (for comparison)
function computeKruskal() {
  let edgesCopy = Graph.edges.slice().sort((a,b) => a.w - b.w);
  let parent = {};
  Graph.nodes.forEach(n => parent[n.id] = n.id);
  function find(x){ return parent[x] === x ? x : (parent[x] = find(parent[x])); }
  let mstEdges = [];
  let weight = 0;
  for (let e of edgesCopy) {
    let ru = find(e.u), rv = find(e.v);
    if (ru !== rv) {
      parent[ru] = rv;
      mstEdges.push(e);
      weight += e.w;
    }
  }
  return {edges: mstEdges, weight: weight};
}

// Misc: rebuild UI after Graph changes
function rebuildAfterGraphChange() {
  // ensure no selection invalid
  if (selection.type === 'node' && !getNodeById(selection.id)) selection = {type:null,id:null};
  if (selection.type === 'edge' && !getEdgeById(selection.id)) selection = {type:null,id:null};
  redraw();
  updateAdjView();
  updateStartNodeSelect();
  updatePQBox();
}

// Allow manual mode: pick next node/edge when execMode === 'manual'
svg.addEventListener('dblclick', (evt) => {
  // in manual mode, allow selecting an edge to add to MST if it's valid next step
  if (execMode.value !== 'manual') return;
  if (!algoState) { alert("Initialize algorithm first."); return; }
  // find nearest edge clicked
  let target = evt.target;
  if (target.tagName === 'line') {
    let id = Number(target.getAttribute('data-edge-id'));
    let e = getEdgeById(id);
    if (!e) return;
    // Manual rule:
    // It's valid to add edge (u,v) if exactly one endpoint is in visited and the other is not,
    // and the edge weight equals current dist of the outside node (i.e. it's the minimal connector).
    let uVisited = algoState.visited.has(e.u);
    let vVisited = algoState.visited.has(e.v);
    if (uVisited === vVisited) {
      alert("Edge must connect visited set with unvisited set.");
      return;
    }
    let outside = uVisited ? e.v : e.u;
    if (algoState.dist[outside] !== e.w && algoState.dist[outside] !== Infinity) {
      // Accept but warn: may not be minimal; user can force if they confirm
      if (!confirm("Edge weight not equal to current best known distance ("+algoState.dist[outside]+"). Force add?")) return;
    }
    // Add visit of outside node (simulate the corresponding visit and addMST)
    // find the visit action index corresponding to outside being visited; but we can simply apply actions: mark visited, add edge
    algoState.visited.add(outside);
    algoState.mstEdges.push(e);
    algoState.mstWeight += e.w;
    log("Manual: added edge " + e.id + " connecting " + e.u + "-" + e.v + " to MST.");
    // After manual add, relax neighbors of the newly visited node by scanning edges
    let edgesByNode = buildAdjList();
    for (let edge of edgesByNode[outside]) {
      let v = (edge.u === outside ? edge.v : edge.u);
      if (algoState.visited.has(v)) continue;
      if (edge.w < algoState.dist[v]) {
        algoState.dist[v] = edge.w;
        algoState.parent[v] = outside;
        log("Manual: relaxed neighbor " + v + " via edge " + edge.id + " new dist " + edge.w);
      }
    }
    redraw();
    updatePQBox();
    updateMSTMetrics();
  }
});

// Keyboard shortcuts
window.addEventListener('keydown', (e) => {

    if (playTimer) stopAutoRun(); else startAutoRun();

  if (e.key === 'ArrowRight') doStep();

});
