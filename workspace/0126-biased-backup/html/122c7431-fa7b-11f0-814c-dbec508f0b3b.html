<!DOCTYPE html>
<html>
<head>
    <title>Big-O Notation</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
            padding: 0;
            margin: 0;
        }
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Big-O Notation</h2>
        <p>Understanding Big-O notation is crucial for optimizing algorithms and understanding the time complexity of computer programs.</p>
        <button id="start-button">Start</button>
        <button id="reset-button">Reset</button>
        <button id="clear-button">Clear</button>
        <button id="maximize-button">Maximize</button>
        <div id="output"></div>
        <button id="interact-button">Interact</button>
        <input id="input-field" type="text" placeholder="Enter a number">
        <button id="add-button">Add</button>
        <button id="subtract-button">Subtract</button>
        <button id="multiply-button">Multiply</button>
        <button id="divide-button">Divide</button>
        <button id="clear-input-field">Clear Input Field</button>
        <button id="submit-button">Submit</button>
        <div id="results"></div>
    </div>

    <script>
        let output = document.getElementById('output');
        let inputField = document.getElementById('input-field');
        let interactButton = document.getElementById('interact-button');
        let startButton = document.getElementById('start-button');
        let resetButton = document.getElementById('reset-button');
        let clearButton = document.getElementById('clear-button');
        let maximizeButton = document.getElementById('maximize-button');
        let interactButtonElement = document.getElementById('interact-button');
        let inputElement = document.getElementById('input-field');
        let addButton = document.getElementById('add-button');
        let subtractButton = document.getElementById('subtract-button');
        let multiplyButton = document.getElementById('multiply-button');
        let divideButton = document.getElementById('divide-button');
        let clearInputFieldButton = document.getElementById('clear-input-field');
        let submitButton = document.getElementById('submit-button');

        startButton.addEventListener('click', start);
        resetButton.addEventListener('click', reset);
        clearButton.addEventListener('click', clear);
        maximizeButton.addEventListener('click', maximize);
        interactButton.addEventListener('click', interact);
        addButton.addEventListener('click', add);
        subtractButton.addEventListener('click', subtract);
        multiplyButton.addEventListener('click', multiply);
        divideButton.addEventListener('click', divide);
        clearInputFieldButton.addEventListener('click', clearInputField);

        function start() {
            let value = parseFloat(inputElement.value);
            output.textContent = `Big-O Notation of input: ${value}`;
            interactButtonElement.disabled = false;
            startButton.disabled = true;
            interactButtonElement.style.display = 'block';
            interactButtonElement.style.color = 'blue';
            interactButtonElement.textContent = 'Interact';
        }

        function reset() {
            output.textContent = '';
            interactButtonElement.disabled = true;
            startButton.disabled = false;
            interactButtonElement.style.display = 'none';
            interactButtonElement.style.color = 'black';
            interactButtonElement.textContent = 'Interact';
        }

        function clear() {
            inputElement.value = '';
            output.textContent = '';
            interactButtonElement.disabled = true;
            startButton.disabled = false;
            interactButtonElement.style.display = 'none';
            interactButtonElement.style.color = 'black';
            interactButtonElement.textContent = 'Interact';
        }

        function interact() {
            let value = parseFloat(inputElement.value);
            if (value > 100) {
                output.textContent = 'Too big!';
            } else {
                output.textContent = `Big-O Notation of input: ${value}`;
                interactButtonElement.disabled = true;
                startButton.disabled = false;
                interactButtonElement.style.display = 'none';
                interactButtonElement.style.color = 'black';
                interactButtonElement.textContent = 'Interact';
            }
        }

        function add() {
            let value = parseFloat(inputElement.value);
            let result = value * 2;
            output.textContent = `Big-O Notation of input: ${value}, Output: ${result}`;
            interactButtonElement.disabled = true;
            startButton.disabled = false;
            interactButtonElement.style.display = 'none';
            interactButtonElement.style.color = 'black';
            interactButtonElement.textContent = 'Interact';
        }

        function subtract() {
            let value = parseFloat(inputElement.value);
            let result = value - 5;
            output.textContent = `Big-O Notation of input: ${value}, Output: ${result}`;
            interactButtonElement.disabled = true;
            startButton.disabled = false;
            interactButtonElement.style.display = 'none';
            interactButtonElement.style.color = 'black';
            interactButtonElement.textContent = 'Interact';
        }

        function multiply() {
            let value = parseFloat(inputElement.value);
            let result = value * 10;
            output.textContent = `Big-O Notation of input: ${value}, Output: ${result}`;
            interactButtonElement.disabled = true;
            startButton.disabled = false;
            interactButtonElement.style.display = 'none';
            interactButtonElement.style.color = 'black';
            interactButtonElement.textContent = 'Interact';
        }

        function divide() {
            let value = parseFloat(inputElement.value);
            let result = value / 2;
            output.textContent = `Big-O Notation of input: ${value}, Output: ${result}`;
            interactButtonElement.disabled = true;
            startButton.disabled = false;
            interactButtonElement.style.display = 'none';
            interactButtonElement.style.color = 'black';
            interactButtonElement.textContent = 'Interact';
        }

        function clearInputField() {
            inputElement.value = '';
            output.textContent = '';
            interactButtonElement.disabled = true;
            startButton.disabled = false;
            interactButtonElement.style.display = 'none';
            interactButtonElement.style.color = 'black';
            interactButtonElement.textContent = 'Interact';
        }

        function maximize() {
            let value = parseFloat(inputElement.value);
            output.textContent = `Big-O Notation of input: ${value}`;
            interactButtonElement.disabled = true;
            startButton.disabled = false;
            interactButtonElement.style.display = 'none';
            interactButtonElement.style.color = 'black';
            interactButtonElement.textContent = 'Interact';
        }
    </script>
</body>
</html>
