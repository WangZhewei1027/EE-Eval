<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suffix Tree Interactive Demo</title>
    <script>
        class SuffixTreeNode {
            constructor() {
                this.children = {};
                this.isEndOfString = false;
        }
        }

        class SuffixTree {
            constructor() {
                this.root = new SuffixTreeNode();
            }

            insert(text) {
                for (let i = 0; i < text.length; i++) {
                    let currentNode = this.root;
                    for (let j = i; j < text.length; j++) {
                        const char = text[j];
                        if (!currentNode.children[char]) {
                            currentNode.children[char] = new SuffixTreeNode();
                        }
                        currentNode = currentNode.children[char];
                    }
                    currentNode.isEndOfString = true;
                }
            }

            search(pattern) {
                let currentNode = this.root;
                for (const char of pattern) {
                    if (!currentNode.children[char]) {
                        return false;
                    }
                    currentNode = currentNode.children[char];
                }
                return currentNode.isEndOfString;
            }

            getSuffixes() {
                const suffixes = [];
                const collectSuffixes = (node, path) => {
                    if (node.isEndOfString) {
                        suffixes.push(path);
                    }
                    for (const char in node.children) {
                        collectSuffixes(node.children[char], path + char);
                    }
                };
                collectSuffixes(this.root, "");
                return suffixes;
            }
        }

        let suffixTree = new SuffixTree();

        function insertText() {
            const input = document.getElementById("insertInput").value;
            if (input) {
                suffixTree.insert(input);
                document.getElementById("insertInput").value = "";
                updateSuffixes();
            }
        }

        function searchPattern() {
            const pattern = document.getElementById("searchInput").value;
            const result = suffixTree.search(pattern);
            alert(result ? "Pattern found!" : "Pattern not found!");
            document.getElementById("searchInput").value = "";
        }

        function updateSuffixes() {
            const suffixes = suffixTree.getSuffixes();
            const suffixList = document.getElementById("suffixes");
            suffixList.innerHTML = ""; // Clear existing list
            suffixes.forEach(suffix => {
                const listItem = document.createElement("li");
                listItem.textContent = suffix;
                suffixList.appendChild(listItem);
            });
        }
    </script>
</head>
<body>
    <h1>Suffix Tree Interactive Demo</h1>
    
    <div>
        <label for="insertInput">Insert Text:</label>
        <input type="text" id="insertInput">
        <button onclick="insertText()">Insert</button>
    </div>

    <div>
        <label for="searchInput">Search Pattern:</label>
        <input type="text" id="searchInput">
        <button onclick="searchPattern()">Search</button>
    </div>

    <h2>Generated Suffixes:</h2>
    <ul id="suffixes"></ul>
</body>
</html>
