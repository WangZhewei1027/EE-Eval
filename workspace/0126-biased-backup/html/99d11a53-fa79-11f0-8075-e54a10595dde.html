<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Forest Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<h1>Random Forest Interactive Demonstration</h1>

<div>
    <h3>Input Parameters</h3>
    <label for="numTrees">Number of Trees:</label>
    <input type="number" id="numTrees" value="10" min="1" max="100"/>
    <br/>
    
    <label for="maxDepth">Max Depth:</label>
    <input type="number" id="maxDepth" value="10" min="1" max="20"/>
    <br/>
    
    <label for="minSamplesSplit">Min Samples Split:</label>
    <input type="number" id="minSamplesSplit" value="2" min="1" max="10"/>
    <br/>
    
    <label for="minSamplesLeaf">Min Samples Leaf:</label>
    <input type="number" id="minSamplesLeaf" value="1" min="1" max="10"/>
    <br/>
    
    <button id="trainButton">Train Random Forest</button>
</div>

<div>
    <h3>Training Results</h3>
    <p id="output" class="hidden"></p>
</div>

<div>
    <h3>Test Input</h3>
    <label for="testInputs">Enter Test Sample (comma-separated values):</label>
    <input type="text" id="testInputs" placeholder="e.g., 5,1,3,2"/>
    <br/>
    
    <button id="predictButton" class="hidden">Predict</button>
    <p id="predictionResult" class="hidden"></p>
</div>

<script>
    document.getElementById('trainButton').addEventListener('click', function() {
        const numTrees = parseInt(document.getElementById('numTrees').value);
        const maxDepth = parseInt(document.getElementById('maxDepth').value);
        const minSamplesSplit = parseInt(document.getElementById('minSamplesSplit').value);
        const minSamplesLeaf = parseInt(document.getElementById('minSamplesLeaf').value);
        
        let message = `Training Random Forest with ${numTrees} trees, max depth of ${maxDepth}, ` +
                      `min samples split of ${minSamplesSplit}, and min samples leaf of ${minSamplesLeaf}.`;
        
        document.getElementById('output').innerText = message;
        document.getElementById('output').classList.remove('hidden');
        
        document.getElementById('predictButton').classList.remove('hidden');
    });

    document.getElementById('predictButton').addEventListener('click', function() {
        const testInput = document.getElementById('testInputs').value.split(',').map(Number);
        
        if (testInput.length === 0) {
            document.getElementById('predictionResult').innerText = "Please provide valid input.";
            document.getElementById('predictionResult').classList.remove('hidden');
            return;
        }

        const prediction = simulatePrediction(testInput);
        
        document.getElementById('predictionResult').innerText = `Predicted Class: ${prediction}`;
        document.getElementById('predictionResult').classList.remove('hidden');
    });

    function simulatePrediction(input) {
        // For demonstration, this function randomly predicts a class (0 or 1)
        return Math.random() < 0.5 ? 0 : 1;
    }
</script>

</body>
</html>
