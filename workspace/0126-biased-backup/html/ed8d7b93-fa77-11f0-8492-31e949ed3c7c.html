<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucket Sort Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            background: linear-gradient(to right, #ffe4e1, #ff7f50);
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            background: white;
            padding: 20px;
            width: 80%;
            max-width: 800px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #ff4500;
        }
        .buckets {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            width: 100%;
            height: 300px;
            border: 2px solid #ff4500;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .bucket {
            width: 10%;
            border-left: 1px solid #ff4500;
            background: #ffcccb;
            position: relative;
            transition: all 0.5s ease-in-out;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .bar {
            width: 100%;
            background: #ff6347;
            position: absolute;
            bottom: 0;
            transition: height 0.5s ease-in-out, background 0.5s ease-in-out;
        }
        button {
            padding: 10px 20px;
            font-size: 1.2em;
            color: #fff;
            background: #ff4500;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }
        button:hover {
            background: #ff6347;
        }
        .hidden {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bucket Sort Visualization</h1>
        <div class="buckets" id="buckets">
            <div class="bucket"><div class="bar hidden" style="height: 0%;"></div></div>
            <div class="bucket"><div class="bar hidden" style="height: 0%;"></div></div>
            <div class="bucket"><div class="bar hidden" style="height: 0%;"></div></div>
            <div class="bucket"><div class="bar hidden" style="height: 0%;"></div></div>
            <div class="bucket"><div class="bar hidden" style="height: 0%;"></div></div>
            <div class="bucket"><div class="bar hidden" style="height: 0%;"></div></div>
            <div class="bucket"><div class="bar hidden" style="height: 0%;"></div></div>
            <div class="bucket"><div class="bar hidden" style="height: 0%;"></div></div>
            <div class="bucket"><div class="bar hidden" style="height: 0%;"></div></div>
            <div class="bucket"><div class="bar hidden" style="height: 0%;"></div></div>
        </div>
        <button id="startButton">Start Sorting</button>
    </div>

    <script>
        const buckets = document.querySelectorAll('.bucket');
        const bars = document.querySelectorAll('.bar');
        const button = document.getElementById('startButton');

        const values = [25, 10, 50, 30, 15, 5, 45, 20, 40, 35];

        function animateBuckets(sortedValues) {
            sortedValues.forEach((value, index) => {
                setTimeout(() => {
                    const bucketIndex = Math.floor(value / 10);
                    const bar = bars[bucketIndex];
                    bar.style.height = `${value}%`;
                    bar.classList.remove('hidden');
                    bar.style.background = '#228B22';
                }, index * 500);
            });
        }

        button.addEventListener('click', () => {
            const sortedValues = bucketSort(values);
            animateBuckets(sortedValues);
        });

        function bucketSort(arr) {
            const buckets = Array.from({ length: 10 }, () => []);
            arr.forEach(value => {
                const index = Math.floor(value / 10);
                buckets[index].push(value);
            });
            return buckets.flat().sort((a, b) => a - b);
        }
    </script>
</body>
</html>
