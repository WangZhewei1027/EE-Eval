<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agile Methodology</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
        }
        p {
            font-size: 16px;
            margin-bottom: 20px;
        }
        button, input {
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover, input:hover {
            background-color: #ccc;
        }
        .button-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Agile Methodology</h1>
        <p>Agile is an iterative and incremental development process. It emphasizes collaboration, flexibility, and continuous improvement.</p>
        <div class="button-container">
            <button id="start-button">Start</button>
            <button id="cancel-button">Cancel</button>
            <button id="finish-button" disabled>Finish</button>
        </div>
        <div id="user-input-container">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email">
            <label for="message">Message:</label>
            <textarea id="message" name="message"></textarea>
        </div>
        <div id="complex-workflow-container">
            <h2>Complex Workflow</h2>
            <button id="add-button">Add</button>
            <button id="remove-button">Remove</button>
            <button id="update-button">Update</button>
            <button id="finish-workflow-button">Finish Workflow</button>
            <div id="workflow-container"></div>
        </div>
        <div id="exploration-container">
            <h2>Exploration</h2>
            <button id="next-button">Next</button>
            <button id="previous-button">Previous</button>
            <button id="back-button">Back</button>
        </div>
        <div id="feedback-container"></div>
    </div>

    <script>
        let currentState = "start";
        let currentWorkflow = "";
        let currentInput = "";
        let currentComplexWorkflow = "";
        let currentExploration = "";

        function start() {
            document.getElementById("start-button").disabled = true;
            document.getElementById("cancel-button").disabled = false;
            document.getElementById("finish-button").disabled = false;
            document.getElementById("user-input-container").disabled = false;
            document.getElementById("complex-workflow-container").disabled = false;
            document.getElementById("exploration-container").disabled = false;
            document.getElementById("feedback-container").innerHTML = "";
        }

        function cancel() {
            document.getElementById("start-button").disabled = false;
            document.getElementById("cancel-button").disabled = true;
            document.getElementById("finish-button").disabled = false;
            document.getElementById("user-input-container").disabled = true;
            document.getElementById("complex-workflow-container").disabled = true;
            document.getElementById("exploration-container").disabled = true;
            document.getElementById("feedback-container").innerHTML = "";
        }

        function finish() {
            document.getElementById("start-button").disabled = true;
            document.getElementById("cancel-button").disabled = false;
            document.getElementById("finish-button").disabled = false;
            document.getElementById("user-input-container").disabled = false;
            document.getElementById("complex-workflow-container").disabled = false;
            document.getElementById("exploration-container").disabled = false;
            document.getElementById("feedback-container").innerHTML = "Workflow finished.";
        }

        function add() {
            if (currentInput.length > 0) {
                currentInput = "";
            } else {
                currentInput += "<button type='button' onclick='addInput()'>Add</button>";
            }
        }

        function remove() {
            if (currentInput.length > 0) {
                currentInput = currentInput.substring(0, currentInput.length - 10);
            } else {
                currentInput = "";
            }
        }

        function update() {
            if (currentInput.length > 0) {
                currentInput += "<button type='button' onclick='updateInput()'>Update</button>";
            } else {
                currentInput = "";
            }
        }

        function finishWorkflow() {
            if (currentComplexWorkflow.length > 0) {
                currentComplexWorkflow = "";
            } else {
                currentComplexWorkflow += "<button type='button' onclick='finishComplexWorkflow()'>Finish Workflow</button>";
            }
        }

        function finishComplexWorkflow() {
            if (currentComplexWorkflow.length > 0) {
                currentComplexWorkflow = "";
            } else {
                finishWorkflow();
            }
        }

        function finishWorkflow() {
            if (currentInput.length > 0) {
                currentInput = "";
            } else {
                finishWorkflow();
            }
        }

        function updateInput() {
            if (currentInput.length > 0) {
                document.getElementById("feedback-container").innerHTML = "Input: " + currentInput;
            } else {
                document.getElementById("feedback-container").innerHTML = "";
            }
        }

        function updateInput() {
            if (currentInput.length > 0) {
                document.getElementById("feedback-container").innerHTML = "Input: " + currentInput;
            } else {
                document.getElementById("feedback-container").innerHTML = "";
            }
        }

        function addInput() {
            document.getElementById("feedback-container").innerHTML = "Input: " + currentInput;
            currentInput = "";
            add();
        }

        function updateInput() {
            document.getElementById("feedback-container").innerHTML = "Input: " + currentInput;
        }

        function finishComplexWorkflow() {
            document.getElementById("feedback-container").innerHTML = "Complex workflow finished.";
            finish();
        }

        function startWorkflow() {
            document.getElementById("feedback-container").innerHTML = "Workflow started.";
            start();
        }

        function cancelWorkflow() {
            document.getElementById("feedback-container").innerHTML = "Workflow cancelled.";
            cancel();
        }

        function next() {
            if (currentWorkflow.length > 0) {
                currentWorkflow = currentWorkflow.substring(0, currentWorkflow.length - 10);
            } else {
                currentWorkflow = "";
            }
            update();
        }

        function previous() {
            if (currentWorkflow.length > 0) {
                currentWorkflow = currentWorkflow.substring(0, currentWorkflow.length - 10);
            } else {
                currentWorkflow = "";
            }
            update();
        }

        function back() {
            if (currentWorkflow.length > 0) {
                currentWorkflow = currentWorkflow.substring(0, currentWorkflow.length - 10);
            } else {
                currentWorkflow = "";
            }
            update();
        }

        function add() {
            if (currentState === "start") {
                document.getElementById("complex-workflow-container").innerHTML = "";
                currentState = "complex-workflow";
            } else if (currentState === "complex-workflow") {
                document.getElementById("exploration-container").innerHTML = "";
                currentState = "exploration";
            } else if (currentState === "exploration") {
                document.getElementById("feedback-container").innerHTML = "";
                currentState = "feedback";
            } else if (currentState === "feedback") {
                document.getElementById("complex-workflow-container").innerHTML = "";
                currentState = "complex-workflow";
            }
        }

        function remove() {
            if (currentState === "start") {
                document.getElementById("complex-workflow-container").innerHTML = "";
                currentState = "complex-workflow";
            } else if (currentState === "complex-workflow") {
                document.getElementById("exploration-container").innerHTML = "";
                currentState = "exploration";
            } else if (currentState === "exploration") {
                document.getElementById("feedback-container").innerHTML = "";
                currentState = "feedback";
            } else if (currentState === "feedback") {
                document.getElementById("complex-workflow-container").innerHTML = "";
                currentState = "complex-workflow";
            }
        }

        function update() {
            if (currentState === "start") {
                document.getElementById("complex-workflow-container").innerHTML = "";
                currentState = "complex-workflow";
            } else if (currentState === "complex-workflow") {
                document.getElementById("exploration-container").innerHTML = "";
                currentState = "exploration";
            } else if (currentState === "exploration") {
                document.getElementById("feedback-container").innerHTML = "";
                currentState = "feedback";
            } else if (currentState === "feedback") {
                document.getElementById("complex-workflow-container").innerHTML = "";
                currentState = "complex-workflow";
            }
        }

        function finishWorkflow() {
            document.getElementById("complex-workflow-container").innerHTML = "";
            currentState = "start";
        }

        document.getElementById("start-button").addEventListener("click", start);
        document.getElementById("cancel-button").addEventListener("click", cancel);
        document.getElementById("finish-button").addEventListener("click", finish);
        document.getElementById("add-button").addEventListener("click", add);
        document.getElementById("remove-button").addEventListener("click", remove);
        document.getElementById("update-button").addEventListener("click", update);
        document.getElementById("next-button").addEventListener("click", next);
        document.getElementById("previous-button").addEventListener("click", previous);
        document.getElementById("back-button").addEventListener("click", back);
        document.getElementById("finish-workflow-button").addEventListener("click", finishWorkflow);
    </script>
</body>
</html>
