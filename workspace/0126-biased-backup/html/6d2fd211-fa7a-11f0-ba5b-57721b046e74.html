<!DOCTYPE html>
<html>
<head>
    <title>Space Complexity Explorer</title>
    <style>
        body {
            font-family: Arial, margin: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .panel {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
        }
        button, select, input {
            margin: 5px;
            padding: 5px;
        }
        .code {
            font-family: monospace;
            background-color: #f5f5f5;
            padding: 10px;
            overflow-x: auto;
        }
        .visualization {
            height: 300px;
            border: 1px solid #000;
            position: relative;
            overflow: hidden;
            margin: 20px 0;
        }
        .complexity-table {
            width: 100%;
            border-collapse: collapse;
        }
        .complexity-table th, .complexity-table td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Space Complexity Explorer</h1>
        
        <div class="panel">
            <h2>Algorithm Selector</h2>
            <select id="algorithmSelect">
                <option value="linear">Linear Search</option>
                <option value="binary">Binary Search</option>
                <option value="bubble">Bubble Sort</option>
                <option value="merge">Merge Sort</option>
                <option value="recursive">Recursive Fibonacci</option>
                <option value="dynamic">Dynamic Programming Fibonacci</option>
            </select>
            <button id="showCodeBtn">Show Code</button>
            <button id="analyzeBtn">Analyze Space Complexity</button>
            <button id="visualizeBtn">Visualize Memory Usage</button>
        </div>
        
        <div class="panel" id="codePanel" style="display:none;">
            <h2>Algorithm Code</h2>
            <div id="codeDisplay" class="code"></div>
            <div>
                <label>Input Size: <input type="range" id="inputSize" min="1" max="100" value="10"></label>
                <span id="inputSizeValue">10</span>
            </div>
        </div>
        
        <div class="analysisPanel" id="analysisPanel" style="display:none;">
            <h2>Space Complexity Analysis</h2>
            <div id="complexityExplanation"></div>
            <div class="visualization" id="memoryVisualization"></div>
            <div>
                <button id="stepForwardBtn">Step Forward</button>
                <button id="stepBackwardBtn">Step Backward</button>
                <button id="playBtn">Play</button>
                <button id="resetBtn">Reset</button>
                <span>Speed: </span>
                <input type="range" id="speedControl" min="1" max="10" value="5">
            </div>
        </div>
        
        <div class="panel" id="comparisonPanel" style="display:none;">
            <h2>Space Complexity Comparison</h2>
            <table class="complexity-table">
                <thead>
                    <tr>
                        <th>Algorithm</th>
                        <th>Best Case</th>
                        <th>Average Case</th>
                        <th>Worst Case</th>
                        <th>Compare</th>
                    </tr>
                </thead>
                <tbody id="comparisonTable">
                </tbody>
            </table>
            <button id="addToComparisonBtn">Add Current Algorithm to Comparison</button>
            <button id="clearComparisonBtn">Clear Comparison</button>
        </div>
        
        <div class="panel">
            <h2>Space Complexity Calculator</h2>
            <div>
                <label>Enter your algorithm's space complexity: </label>
                <input type="text" id="complexityInput" placeholder="e.g., O(n), O(1), O(n^2)">
                <button id="calculateBtn">Calculate</button>
            </div>
            <div id="calculationResult" style="margin-top:10px;"></div>
        </div>
    </div>

    <script>
        // Algorithm data
        const algorithms = {
            linear: {
                name: "Linear Search",
                code: `function linearSearch(arr, target) {
    for (let i = 0; i < arr.length; i++) {
        if (arr[i] === target) return i;
    }
    return -1;
}`,
                space: {
                    best: "O(1)",
                    average: "O(1)",
                    worst: "O(1)",
                    explanation: "Uses constant space for variables (i, arr, target) regardless of input size."
                }
            },
            binary: {
                name: "Binary Search",
                code: `function binarySearch(arr, target) {
    let left = 0;
    let right = arr.length - 1;
    
    while (left <= right) {
        const mid = Math.floor((left + right) / 2);
        if (arr[mid] === target) return mid;
        if (arr[mid] < target) left = mid + 1;
        else right = mid - 1;
    }
    return -1;
}`,
                space: {
                    best: "O(1)",
                    average: "O(1)",
                    worst: "O(1)",
                    explanation: "Uses constant space for variables (left, right, mid) regardless of input size."
                }
            },
            bubble: {
                name: "Bubble Sort",
                code: `function bubbleSort(arr) {
    let n = arr.length;
    for (let i = 0; i < n-1; i++) {
        for (let j = 0; j < n-i-1; j++) {
            if (arr[j] > arr[j+1]) {
                // Swap
                let temp = arr[j];
                arr[j] = arr[j+1];
                arr[j+1] = temp;
            }
        }
    }
    return arr;
}`,
                space: {
                    best: "O(1)",
                    average: "O(1)",
                    worst: "O(1)",
                    explanation: "Sorts in-place using constant extra space for temporary variables."
                }
            },
            merge: {
                name: "Merge Sort",
                code: `function mergeSort(arr) {
    if (arr.length <= 1) return arr;
    
    const mid = Math.floor(arr.length / 2);
    const left = mergeSort(arr.slice(0, mid));
    const right = mergeSort(arr.slice(mid));
    
    return merge(left, right);
}

function merge(left, right) {
    let result = [];
    let leftIndex = 0;
    let rightIndex = 0;
    
    while (leftIndex < left.length && rightIndex < right.length) {
        if (left[leftIndex] < right[rightIndex]) {
            result.push(left[leftIndex]);
        } else {
            result.push(right[rightIndex]);
        }
    }
    
    return result.concat(left.slice(leftIndex)).concat(right.slice(rightIndex));
}`,
                space: {
                    best: "O(n)",
                    average: "O(n)",
                    worst: "O(n)",
                    explanation: "Requires O(n) auxiliary space for temporary arrays during merging."
                }
            },
            recursive: {
                name: "Recursive Fibonacci",
                code: `function fibonacci(n) {
    if (n <= 1) return n;
    return fibonacci(n-1) + fibonacci(n-2);
}`,
                space: {
                    best: "O(n)",
                    average: "O(n)",
                    worst: "O(n)",
                    explanation: "Call stack grows linearly with n due to recursion depth."
                }
            },
            dynamic: {
                name: "Dynamic Programming Fibonacci",
                code: `function fibonacci(n) {
    if (n <= 1) return n;
    
    let fib = [0, 1];
    for (let i = 2; i <= n; i++) {
        fib[i] = fib[i-1] + fib[i-2];
    }
    
    return fib[n];
}`,
                space: {
                    best: "O(n)",
                    average: "O(n)",
                    worst: "O(n)",
                    explanation: "Uses an array of size n to store intermediate results."
                }
            }
        };

        // DOM elements
        const algorithmSelect = document.getElementById('algorithmSelect');
        const showCodeBtn = document.getElementById('showCodeBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const visualizeBtn = document.getElementById('visualizeBtn');
        const codePanel = document.getElementById('codePanel');
        const codeDisplay = document.getElementById('codeDisplay');
        const inputSize = document.getElementById('inputSize');
        const inputSizeValue = document.getElementById('inputSizeValue');
        const analysisPanel = document.getElementById('analysisPanel');
        const complexityExplanation = document.getElementById('complexityExplanation');
        const memoryVisualization = document.getElementById('memoryVisualization');
        const stepForwardBtn = document.getElementById('stepForwardBtn');
        const stepBackwardBtn = document.getElementById('stepBackwardBtn');
        const playBtn = document.getElementById('playBtn');
        const resetBtn = document.getElementById('resetBtn');
        const speedControl = document.getElementById('speedControl');
        const comparisonPanel = document.getElementById('comparisonPanel');
        const comparisonTable = document.getElementById('comparisonTable');
        const addToComparisonBtn = document.getElementById('addToComparisonBtn');
        const clearComparisonBtn = document.getElementById('clearComparisonBtn');
        const complexityInput = document.getElementById('complexityInput');
        const calculateBtn = document.getElementById('calculateBtn');
        const calculationResult = document.getElementById('calculationResult');

        // State
        let currentAlgorithm = 'linear';
        let currentStep = 0;
        let animationInterval = null;
        let comparisonAlgorithms = [];

        // Event listeners
        algorithmSelect.addEventListener('change', () => {
            currentAlgorithm = algorithmSelect.value;
            resetAnalysis();
        });

        showCodeBtn.addEventListener('click', () => {
            codeDisplay.textContent = algorithms[currentAlgorithm].code;
            codePanel.style.display = 'block';
            analysisPanel.style.display = 'none';
            comparisonPanel.style.display = 'none';
        });

        analyzeBtn.addEventListener('click', () => {
            const algo = algorithms[currentAlgorithm];
            complexityExplanation.innerHTML = `
                <h3>${algo.name} Space Complexity</h3>
                <p><strong>Best Case:</strong> ${algo.space.best}</p>
                <p><strong>Average Case:</strong> ${algo.space.average}</p>
                <p><strong>Worst Case:</strong> ${algo.space.worst}</p>
                <p><strong>Explanation:</strong> ${algo.space.explanation}</p>
            `;
            analysisPanel.style.display = 'block';
            codePanel.style.display = 'none';
            comparisonPanel.style.display = 'none';
        });

        visualizeBtn.addEventListener('click', () => {
            visualizeMemoryUsage();
            analysisPanel.style.display = 'block';
            codePanel.style.display = 'none';
            comparisonPanel.style.display = 'none';
        });

        inputSize.addEventListener('input', () => {
            inputSizeValue.textContent = inputSize.value;
        });

        stepForwardBtn.addEventListener('click', stepForward);
        stepBackwardBtn.addEventListener('click', stepBackward);
        playBtn.addEventListener('click', togglePlay);
        resetBtn.addEventListener('click', resetVisualization);
        speedControl.addEventListener('input', updateSpeed);

        addToComparisonBtn.addEventListener('click', addToComparison);
        clearComparisonBtn.addEventListener('click', clearComparison);

        calculateBtn.addEventListener('click', calculateComplexity);

        // Functions
        function resetAnalysis() {
            codePanel.style.display = 'none';
            analysisPanel.style.display = 'none';
            comparisonPanel.style.display = 'none';
            resetVisualization();
        }

        function visualizeMemoryUsage() {
            memoryVisualization.innerHTML = '';
            currentStep = 0;
            
            const algo = algorithms[currentAlgorithm];
            const size = parseInt(inputSize.value);
            
            if (currentAlgorithm === 'linear' || currentAlgorithm === 'binary') {
                // Simple visualization for constant space
                const container = document.createElement('div');
                container.style.position = 'absolute';
                container.style.bottom = '0';
                container.style.left = '50%';
                container.style.transform = 'translateX(-50%)';
                container.style.width = '100px';
                container.style.height = '50px';
                container.style.backgroundColor = '#ddd';
                container.style.border = '1px solid #000';
                container.textContent = 'Constant Space';
                memoryVisualization.appendChild(container);
            } 
            else if (currentAlgorithm === 'merge') {
                // Visualization for O(n) space
                const maxHeight = memoryVisualization.clientHeight - 20;
                const width = 20;
                const spacing = 5;
                
                for (let i = 0; i < size; i++) {
                    const bar = document.createElement('div');
                    bar.style.position = 'absolute';
                    bar.style.bottom = '0';
                    bar.style.left = `${i * (width + spacing)}px`;
                    bar.style.width = `${width}px`;
                    bar.style.height = `${maxHeight * 0.3}px`;
                    bar.style.backgroundColor = '#ddd';
                    bar.style.border = '1px solid #000';
                    bar.textContent = 'Aux';
                    memoryVisualization.appendChild(bar);
                }
            }
            else if (currentAlgorithm === 'recursive') {
                // Visualization for recursive call stack
                const maxHeight = memoryVisualization.clientHeight;
                const width = 30;
                
                for (let i = 0; i < Math.min(size, 10); i++) {
                    const frame = document.createElement('div');
                    frame.style.position = 'absolute';
                    frame.style.bottom = `${i * 30}px`;
                    frame.style.left = '50%';
                    frame.style.transform = 'translateX(-50%)';
                    frame.style.width = `${width + i * 5}px`;
                    frame.style.height = '25px';
                    frame.style.backgroundColor = '#ddd';
                    frame.style.border = '1px solid #000';
                    frame.textContent = `fib(${size - i})`;
                    memoryVisualization.appendChild(frame);
                }
            }
            else if (currentAlgorithm === 'dynamic') {
                // Visualization for DP array
                const maxHeight = memoryVisualization.clientHeight - 20;
                const width = 20;
                const spacing = 5;
                
                for (let i = 0; i < size; i++) {
                    const cell = document.createElement('div');
                    cell.style.position = 'absolute';
                    cell.style.bottom = '0';
                    cell.style.left = `${i * (width + spacing)}px`;
                    cell.style.width = `${width}px`;
                    cell.style.height = `${maxHeight * 0.5}px`;
                    cell.style.backgroundColor = '#ddd';
                    cell.style.border = '1px solid #000';
                    cell.textContent = i <= 1 ? i : '?';
                    memoryVisualization.appendChild(cell);
                }
            }
        }

        function stepForward() {
            // In a real implementation, this would advance the visualization step
            currentStep++;
            updateVisualization();
        }

        function stepBackward() {
            if (currentStep > 0) {
                currentStep--;
                updateVisualization();
            }
        }

        function togglePlay() {
            if (animationInterval) {
                clearInterval(animationInterval);
                animationInterval = null;
                playBtn.textContent = 'Play';
            } else {
                playBtn.textContent = 'Pause';
                animationInterval = setInterval(stepForward, 1000 / speedControl.value);
            }
        }

        function resetVisualization() {
            if (animationInterval) {
                clearInterval(animationInterval);
                animationInterval = null;
                playBtn.textContent = 'Play';
            }
            currentStep = 0;
            updateVisualization();
        }

        function updateVisualization() {
            // Update visualization based on current step
            // This is a simplified version - a real implementation would have more detailed steps
            const elements = memoryVisualization.querySelectorAll('div');
            elements.forEach((el, index) => {
                if (index < currentStep) {
                    el.style.backgroundColor = '#aaa';
                } else {
                    el.style.backgroundColor = '#ddd';
                }
            });
        }

        function updateSpeed() {
            if (animationInterval) {
                clearInterval(animationInterval);
                animationInterval = setInterval(stepForward, 1000 / speedControl.value);
            }
        }

        function addToComparison() {
            const algo = algorithms[currentAlgorithm];
            if (!comparisonAlgorithms.includes(currentAlgorithm)) {
                comparisonAlgorithms.push(currentAlgorithm);
                updateComparisonTable();
                comparisonPanel.style.display = 'block';
            }
        }

        function clearComparison() {
            comparisonAlgorithms = [];
            comparisonTable.innerHTML = '';
            comparisonPanel.style.display = 'none';
        }

        function updateComparisonTable() {
            comparisonTable.innerHTML = '';
            comparisonAlgorithms.forEach(algoKey => {
                const algo = algorithms[algoKey];
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${algo.name}</td>
                    <td>${algo.space.best}</td>
                    <td>${algo.space.average}</td>
                    <td>${algo.space.worst}</td>
                    <td><button onclick="removeFromComparison('${algoKey}')">Remove</button></td>
                `;
                comparisonTable.appendChild(row);
            });
        }

        function removeFromComparison(algoKey) {
            comparisonAlgorithms = comparisonAlgorithms.filter(a => a !== algoKey);
            updateComparisonTable();
            if (comparisonAlgorithms.length === 0) {
                comparisonPanel.style.display = 'none';
            }
        }

        function calculateComplexity() {
            const complexity = complexityInput.value.trim();
            const validComplexities = ['O(1)', 'O(log n)', 'O(n)', 'O(n log n)', 'O(n^2)', 'O(2^n)', 'O(n!)'];
            
            if (!validComplexities.includes(complexity)) {
                calculationResult.innerHTML = `<p style="color:red;">Invalid complexity notation. Please use one of: ${validComplexities.join(', ')}</p>`;
                return;
            }
            
            let explanation = '';
            let example = '';
            
            switch(complexity) {
                case 'O(1)':
                    explanation = 'Constant space - memory usage doesn't grow with input size.';
                    example = 'Example: A function that uses a fixed number of variables.';
                    break;
                case 'O(log n)':
                    explanation = 'Logarithmic space - memory usage increases logarithmically with input size.';
                    example = 'Example: Some recursive algorithms that divide the problem in half each step.';
                    break;
                case 'O(n)':
                    explanation = 'Linear space - memory usage grows proportionally with input size.';
                    example = 'Example: Creating a copy of an array or building a hash table.';
                    break;
                case 'O(n log n)':
                    explanation = 'Linearithmic space - memory usage is between linear and quadratic.';
                    example = 'Example: Some sorting algorithms that use additional space.';
                    break;
                case 'O(n^2)':
                    explanation = 'Quadratic space - memory usage grows with the square of input size.';
                    example = 'Example: Creating a 2D array or adjacency matrix.';
                    break;
                case 'O(2^n)':
                    explanation = 'Exponential space - memory usage grows very rapidly.';
                    example = 'Example: Some brute-force recursive algorithms.';
                    break;
                case 'O(n!)':
                    explanation = 'Factorial space - memory usage grows extremely rapidly.';
                    example = 'Example: Algorithms that generate all permutations.';
                    break;
            }
            
            calculationResult.innerHTML = `
                <h3>${complexity} Space Complexity</h3>
                <p><strong>Explanation:</strong> ${explanation}</p>
                <p><strong>Example:</strong> ${example}</p>
                <p><strong>When to use:</strong> ${getWhenToUse(complexity)}</p>
            `;
        }

        function getWhenToUse(complexity) {
            switch(complexity) {
                case 'O(1)': return 'Ideal - use whenever possible.';
                case 'O(log n)': return 'Excellent - scales very well with large inputs.';
                case 'O(n)': return 'Good - acceptable for most practical purposes.';
                case 'O(n log n)': return 'Fair - acceptable for moderate input sizes.';
                case 'O(n^2)': return 'Poor - avoid for large inputs.';
                case 'O(2^n)': return 'Very poor - only for very small inputs.';
                case 'O(n!)': return 'Extremely poor - avoid except for tiny inputs.';
                default: return '';
            }
        }

        // Make removeFromComparison available globally
        window.removeFromComparison = removeFromComparison;

        // Initialize
        resetAnalysis();
    </script>
</body>
</html>
