<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Typing Explorer</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.5;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }
        button, select, input {
            margin: 5px;
        }
        textarea {
            width: 100%;
            height: 100px;
            font-family: monospace;
        }
        .type-info {
            font-size: 0.9em;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Dynamic Typing Explorer</h1>
    
    <div class="container">
        <div>
            <div class="panel">
                <h2>Type Creation</h2>
                <div>
                    <button id="createNumber">Create Number</button>
                    <button id="createString">Create String</button>
                    <button id="createBoolean">Create Boolean</button>
                    <button id="createArray">Create Array</button>
                    <button id="createObject">Create Object</button>
                    <button id="createFunction">Create Function</button>
                </div>
                
                <div>
                    <label>Custom Value: <input type="text" id="customValue"></label>
                    <button id="evaluateCustom">Evaluate</button>
                </div>
                
                <div>
                    <h3>Type Conversion</h3>
                    <select id="conversionType">
                        <option value="string">String</option>
                        <option value="number">Number</option>
                        <option value="boolean">Boolean</option>
                    </select>
                    <button id="convertValue">Convert</button>
                </div>
            </div>
            
            <div class="panel">
                <h2>Operations</h2>
                <div>
                    <button id="addOperation">+ (Add)</button>
                    <button id="concatOperation">+ (Concatenate)</button>
                    <button id="compareOperation">== (Compare)</button>
                    <button id="strictCompareOperation">=== (Strict Compare)</button>
                </div>
                
                <div>
                    <h3>Mathematical Operations</h3>
                    <button id="increment">Increment ++</button>
                    <button id="decrement">Decrement --</button>
                    <button id="multiply">Multiply *</button>
                    <button id="divide">Divide /</button>
                </div>
            </div>
        </div>
        
        <div>
            <div class="panel">
                <h2>Current Variables</h2>
                <div id="variableList"></div>
                <div>
                    <label>Variable Name: <input type="text" id="varName"></label>
                    <button id="createVar">Create Variable</button>
                </div>
            </div>
            
            <div class="panel">
                <h2>Type Information</h2>
                <div id="typeOutput"></div>
                <textarea id="codeOutput" readonly></textarea>
            </div>
        </div>
    </div>
    
    <div class="panel">
        <h2>Type Playground</h2>
        <div>
            <label>Expression: <input type="text" id="expressionInput" size="50"></label>
            <button id="evaluateExpression">Evaluate</button>
        </div>
        <div id="expressionResult"></div>
    </div>
    
    <script>
        // State management
        const variables = {};
        let lastValue = null;
        
        // DOM elements
        const variableList = document.getElementById('variableList');
        const typeOutput = document.getElementById('typeOutput');
        const codeOutput = document.getElementById('codeOutput');
        const expressionResult = document.getElementById('expressionResult');
        
        // Update UI functions
        function updateVariableList() {
            variableList.innerHTML = '';
            for (const [name, value] of Object.entries(variables)) {
                const div = document.createElement('div');
                div.innerHTML = `<strong>${name}</strong>: ${value} (${typeof value})`;
                variableList.appendChild(div);
            }
        }
        
        function showTypeInfo(value) {
            lastValue = value;
            typeOutput.innerHTML = `
                <p><strong>Value:</strong> ${value}</p>
                <p><strong>Type:</strong> ${typeof value}</p>
                <p><strong>Constructor:</strong> ${value?.constructor?.name || 'primitive'}</p>
                <p class="type-info"><strong>toString():</strong> ${value?.toString()}</p>
                <p class="type-info"><strong>valueOf():</strong> ${value?.valueOf ? value.valueOf() : 'N/A'}</p>
            `;
            
            codeOutput.value = `// Current value\nconst value = ${JSON.stringify(value, null, 2)};\n\ntypeof value; // ${typeof value}\nvalue.constructor; // ${value?.constructor?.name || 'primitive'}`;
        }
        
        // Event handlers
        document.getElementById('createNumber').addEventListener('click', () => {
            const num = Math.floor(Math.random() * 100);
            showTypeInfo(num);
        });
        
        document.getElementById('createString').addEventListener('click', () => {
            const str = 'String ' + Math.random().toString(36).substring(2, 8);
            showTypeInfo(str);
        });
        
        document.getElementById('createBoolean').addEventListener('click', () => {
            showTypeInfo(Math.random() > 0.5);
        });
        
        document.getElementById('createArray').addEventListener('click', () => {
            const arr = [
                Math.floor(Math.random() * 100),
                'text',
                Math.random() > 0.5,
                { key: 'value' }
            ];
            showTypeInfo(arr);
        });
        
        document.getElementById('createObject').addEventListener('click', () => {
            const obj = {
                number: Math.floor(Math.random() * 100),
                string: 'property',
                boolean: Math.random() > 0.5,
                method: function() { return this.number; }
            };
            showTypeInfo(obj);
        });
        
        document.getElementById('createFunction').addEventListener('click', () => {
            const func = function(a, b) {
                return a + b;
            };
            showTypeInfo(func);
        });
        
        document.getElementById('evaluateCustom').addEventListener('click', () => {
            try {
                const value = eval(document.getElementById('customValue').value);
                showTypeInfo(value);
            } catch (e) {
                showTypeInfo(`Error: ${e.message}`);
            }
        });
        
        document.getElementById('convertValue').addEventListener('click', () => {
            if (lastValue === null) return;
            
            const conversionType = document.getElementById('conversionType').value;
            let converted;
            
            try {
                switch (conversionType) {
                    case 'string':
                        converted = String(lastValue);
                        break;
                    case 'number':
                        converted = Number(lastValue);
                        break;
                    case 'boolean':
                        converted = Boolean(lastValue);
                        break;
                }
                showTypeInfo(converted);
            } catch (e) {
                showTypeInfo(`Conversion error: ${e.message}`);
            }
        });
        
        document.getElementById('createVar').addEventListener('click', () => {
            const varName = document.getElementById('varName').value.trim();
            if (varName && lastValue !== null) {
                variables[varName] = lastValue;
                updateVariableList();
            }
        });
        
        // Operation handlers
        document.getElementById('addOperation').addEventListener('click', () => {
            if (lastValue === null) return;
            const other = prompt('Enter value to add:');
            try {
                const result = lastValue + Number(other);
                showTypeInfo(result);
            } catch (e) {
                showTypeInfo(`Error: ${e.message}`);
            }
        });
        
        document.getElementById('concatOperation').addEventListener('click', () => {
            if (lastValue === null) return;
            const other = prompt('Enter value to concatenate:');
            const result = lastValue + String(other);
            showTypeInfo(result);
        });
        
        document.getElementById('compareOperation').addEventListener('click', () => {
            if (lastValue === null) return;
            const other = prompt('Enter value to compare (==):');
            try {
                const result = lastValue == other;
                showTypeInfo(result);
            } catch (e) {
                showTypeInfo(`Error: ${e.message}`);
            }
        });
        
        document.getElementById('strictCompareOperation').addEventListener('click', () => {
            if (lastValue === null) return;
            const other = prompt('Enter value to strictly compare (===):');
            try {
                const result = lastValue === other;
                showTypeInfo(result);
            } catch (e) {
                showTypeInfo(`Error: ${e.message}`);
            }
        });
        
        document.getElementById('increment').addEventListener('click', () => {
            if (typeof lastValue === 'number') {
                showTypeInfo(++lastValue);
            } else {
                showTypeInfo("Can only increment numbers");
            }
        });
        
        document.getElementById('decrement').addEventListener('click', () => {
            if (typeof lastValue === 'number') {
                showTypeInfo(--lastValue);
            } else {
                showTypeInfo("Can only decrement numbers");
            }
        });
        
        document.getElementById('multiply').addEventListener('click', () => {
            if (lastValue === null) return;
            const other = prompt('Enter value to multiply by:');
            try {
                const result = lastValue * Number(other);
                showTypeInfo(result);
            } catch (e) {
                showTypeInfo(`Error: ${e.message}`);
            }
        });
        
        document.getElementById('divide').addEventListener('click', () => {
            if (lastValue === null) return;
            const other = prompt('Enter value to divide by:');
            try {
                const result = lastValue / Number(other);
                showTypeInfo(result);
            } catch (e) {
                showTypeInfo(`Error: ${e.message}`);
            }
        });
        
        document.getElementById('evaluateExpression').addEventListener('click', () => {
            try {
                const expr = document.getElementById('expressionInput').value;
                const result = eval(expr);
                expressionResult.innerHTML = `
                    <p><strong>Result:</strong> ${result}</p>
                    <p><strong>Type:</strong> ${typeof result}</p>
                `;
            } catch (e) {
                expressionResult.innerHTML = `<strong>Error:</strong> ${e.message}`;
            }
        });
        
        // Initialize
        showTypeInfo("Click buttons to explore dynamic typing");
    </script>
</body>
</html>
