<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Programming Visualizer</title>
    <style>
        body { font-family: Arial, sans-serif; }
        h1, h2 { margin: 0; }
        .container { margin: 20px; }
        .output { margin-top: 20px; }
        .controls { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dynamic Programming Visualizer</h1>
        
        <div class="controls">
            <label for="arrayInput">Enter rice amounts (comma separated):</label>
            <input type="text" id="arrayInput" placeholder="e.g. 1,2,3,4,5" />
            <button id="submitBtn">Submit</button>
        </div>
        
        <div class="controls">
            <label for="targetInput">Enter target amount:</label>
            <input type="number" id="targetInput" placeholder="e.g. 7" />
            <button id="calculateBtn">Calculate</button>
        </div>

        <button id="resetBtn">Reset</button>

        <div class="output">
            <h2>Results</h2>
            <pre id="resultsOutput"></pre>
        </div>
    </div>

    <script>
        let amounts = [];
        let target = 0;

        document.getElementById('submitBtn').onclick = function() {
            const input = document.getElementById('arrayInput').value;
            amounts = input.split(',').map(Number).filter(n => !isNaN(n));
            document.getElementById('resultsOutput').textContent = "Amounts set. " + JSON.stringify(amounts);
        };

        document.getElementById('calculateBtn').onclick = function() {
            target = parseInt(document.getElementById('targetInput').value);
            if (isNaN(target)) {
                document.getElementById('resultsOutput').textContent = "Please enter a valid target amount.";
                return;
            }

            const result = dynamicProgrammingMax(amounts, target);
            document.getElementById('resultsOutput').textContent = "Result for target " + target + ": " + JSON.stringify(result);
        };

        document.getElementById('resetBtn').onclick = function() {
            amounts = [];
            target = 0;
            document.getElementById('arrayInput').value = '';
            document.getElementById('targetInput').value = '';
            document.getElementById('resultsOutput').textContent = '';
        };

        function dynamicProgrammingMax(nums, target) {
            const dp = new Array(target + 1).fill(0);
            for (let i = 1; i <= target; i++) {
                for (let num of nums) {
                    if (i >= num) {
                        dp[i] = Math.max(dp[i], dp[i - num] + num);
                    }
                }
            }
            return dp[target];
        }
    </script>
</body>
</html>
