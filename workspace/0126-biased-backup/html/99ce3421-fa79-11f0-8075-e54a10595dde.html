<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Set Demonstration</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        input, button, select { margin: 5px; }
        .output { margin-top: 15px; }
    </style>
</head>
<body>
    <h1>Interactive Set Demonstration</h1>
    
    <h2>Create a Set</h2>
    <input type="text" id="setInput" placeholder="Enter a value" />
    <button onclick="addValue()">Add Value</button>
    <button onclick="clearSet()">Clear Set</button>

    <h2>Set Operations</h2>
    <button onclick="performUnion()">Union with Another Set</button>
    <button onclick="performIntersection()">Intersection with Another Set</button>
    <button onclick="performDifference()">Difference with Another Set</button>

    <h2>Explore the Set</h2>
    <button onclick="showValues()">Show Values</button>
    <button onclick="checkValue()">Check Existence of Value</button>
    <input type="text" id="checkInput" placeholder="Enter a value to check" />

    <h2>Manage Set</h2>
    <input type="text" id="removeInput" placeholder="Remove a value" />
    <button onclick="removeValue()">Remove Value</button>

    <div class="output">
        <h3>Current Set:</h3>
        <div id="outputSet"></div>
        <h3>Result:</h3>
        <div id="outputResult"></div>
    </div>

    <script>
        let currentSet = new Set();

        function addValue() {
            const value = document.getElementById("setInput").value;
            if (value) {
                currentSet.add(value);
                document.getElementById("setInput").value = '';
                updateOutput();
            }
        }

        function clearSet() {
            currentSet.clear();
            updateOutput();
        }

        function performUnion() {
            const newSetInput = prompt("Enter values for the new set, separated by commas:");
            if (newSetInput) {
                const newSet = new Set(newSetInput.split(',').map(v => v.trim()));
                const unionSet = new Set([...currentSet, ...newSet]);
                displayResult(unionSet);
            }
        }

        function performIntersection() {
            const newSetInput = prompt("Enter values for the new set, separated by commas:");
            if (newSetInput) {
                const newSet = new Set(newSetInput.split(',').map(v => v.trim()));
                const intersectionSet = new Set([...currentSet].filter(x => newSet.has(x)));
                displayResult(intersectionSet);
            }
        }

        function performDifference() {
            const newSetInput = prompt("Enter values for the new set, separated by commas:");
            if (newSetInput) {
                const newSet = new Set(newSetInput.split(',').map(v => v.trim()));
                const differenceSet = new Set([...currentSet].filter(x => !newSet.has(x)));
                displayResult(differenceSet);
            }
        }

        function showValues() {
            const values = Array.from(currentSet).join(', ');
            document.getElementById("outputResult").innerText = values || 'Set is empty';
        }

        function checkValue() {
            const value = document.getElementById("checkInput").value;
            const exists = currentSet.has(value) ? "exists" : "does not exist";
            document.getElementById("outputResult").innerText = `The value "${value}" ${exists} in the set.`;
        }

        function removeValue() {
            const value = document.getElementById("removeInput").value;
            if (currentSet.delete(value)) {
                document.getElementById("removeInput").value = '';
                updateOutput();
            } else {
                document.getElementById("outputResult").innerText = `Value "${value}" not found in the set.`;
            }
        }

        function updateOutput() {
            document.getElementById("outputSet").innerText = Array.from(currentSet).join(', ') || 'Set is empty';
            document.getElementById("outputResult").innerText = '';
        }

        function displayResult(resultSet) {
            document.getElementById("outputResult").innerText = Array.from(resultSet).join(', ') || 'Result set is empty';
        }
    </script>
</body>
</html>
