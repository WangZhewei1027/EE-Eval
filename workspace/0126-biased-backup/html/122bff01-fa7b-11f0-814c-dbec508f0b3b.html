<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellman-Ford Algorithm</title>
    <style>
        body {
            font-family: monospace;
        }
        label {
            display: block;
            margin-bottom: 10px;
        }
        input[type="number"] {
            width: 50px;
        }
        input[type="range"] {
            width: 50px;
        }
    </style>
</head>
<body>
    <h1>Bellman-Ford Algorithm</h1>
    <p>This algorithm is used to find the shortest paths from a source to all other nodes in a weighted graph.</p>
    <button id="start-button">Start</button>
    <button id="reset-button">Reset</button>
    <button id="display-button">Display</button>
    <button id="plot-button">Plot</button>

    <div id="graph-container">
        <canvas id="graph" width="400" height="400"></canvas>
    </div>

    <script>
        const startButton = document.getElementById('start-button');
        const resetButton = document.getElementById('reset-button');
        const displayButton = document.getElementById('display-button');
        const plotButton = document.getElementById('plot-button');
        const graphContainer = document.getElementById('graph-container');

        let graph = null;
        let distances = null;
        let previous = null;

        let inputFields = {};

        function createGraph() {
            graph = new Array(10).fill(0).map(() => new Array(10).fill(0));
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 10; j++) {
                    graph[i][j] = Math.random();
                }
            }
            distances = new Array(10).fill(Infinity);
            previous = new Array(10).fill(null);
        }

        function updateGraph() {
            graph = new Array(10).fill(0).map(() => new Array(10).fill(0));
            distances = new Array(10).fill(Infinity);
            previous = new Array(10).fill(null);
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 10; j++) {
                    distances[i][j] = graph[i][j];
                }
            }
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 10; j++) {
                    if (distances[i][j] === Infinity) {
                        distances[i][j] = 0;
                    }
                }
            }
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 10; j++) {
                    if (graph[i][j] > 0 && distances[i][j] > distances[i][previous[j]]) {
                        distances[i][j] = distances[i][previous[j]];
                        previous[j] = i;
                    }
                }
            }
        }

        function updateInputFields() {
            for (let i = 0; i < 10; i++) {
                inputFields[i] = document.createElement('input');
                inputFields[i].type = 'number';
                inputFields[i].value = distances[i][0];
                graphContainer.appendChild(inputFields[i]);
            }
        }

        function updateDisplayButton() {
            for (let i = 0; i < 10; i++) {
                const value = inputFields[i].value;
                if (value === Infinity) {
                    distances[i] = 0;
                    previous[i] = null;
                } else {
                    distances[i] = value;
                    previous[i] = null;
                }
                updateGraph();
            }
        }

        function updateResetButton() {
            for (let i = 0; i < 10; i++) {
                graph[i][i] = 0;
            }
            distances = null;
            previous = null;
            updateGraph();
        }

        function updatePlotButton() {
            const canvas = document.getElementById('graph');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 10; j++) {
                    ctx.beginPath();
                    ctx.arc(j * 20 + 100, i * 20 + 100, 10, 0, 2 * Math.PI);
                    ctx.fillStyle = 'black';
                    ctx.fill();
                }
            }
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 10; j++) {
                    if (distances[i][j] === Infinity) {
                        ctx.beginPath();
                        ctx.arc(j * 20 + 100, i * 20 + 100, 10, 0, 2 * Math.PI);
                        ctx.fillStyle = 'black';
                        ctx.fill();
                    }
                }
            }
            const minDistance = Math.min(...Object.values(distances));
            for (let i = 0; i < 10; i++) {
                if (distances[i] === minDistance) {
                    const text = document.createElement('span');
                    text.textContent = `Node ${i} has distance ${minDistance}`;
                    graphContainer.appendChild(text);
                }
            }
        }

        startButton.addEventListener('click', createGraph);
        resetButton.addEventListener('click', updateResetButton);
        displayButton.addEventListener('click', updateDisplayButton);
        plotButton.addEventListener('click', updatePlotButton);

        updateInputFields();
        updateDisplayButton();
        updateResetButton();
    </script>
    <script src="script.js"></script>
</body>
</html>
