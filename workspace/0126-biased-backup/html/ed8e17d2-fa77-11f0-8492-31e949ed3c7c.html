<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greedy Algorithms Visual Demo</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background-color: #34495e;
            border-radius: 15px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            padding: 20px;
            max-width: 600px;
        }

        h1 {
            font-size: 2.5em;
            margin: 0;
            animation: fadeIn 2s ease-in-out;
        }

        p {
            font-size: 1.2em;
            margin: 20px 0;
            line-height: 1.5;
            opacity: 0.7;
            animation: fadeIn 2s ease-in-out forwards;
            animation-delay: 1s;
        }

        .button {
            background-color: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 2s ease-in-out forwards;
            animation-delay: 2s;
        }

        .button:hover {
            background-color: #c0392b;
        }

        .visual {
            margin-top: 30px;
            height: 300px;
            background-image: url('https://images.unsplash.com/photo-1496824317831-0f536c01d5a3');
            background-size: cover;
            border-radius: 10px;
            animation: slideIn 2s ease-in-out forwards;
            opacity: 0;
            animation-delay: 2.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            0% {
                transform: translateY(100px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Greedy Algorithms</h1>
        <p>Observe the simple yet powerful approach of Greedy Algorithms to make optimal choices at each step.</p>
        <button class="button" onclick="startDemo()">Start Animation</button>
        <div class="visual" id="algorithmVisual"></div>
    </div>

    <script>
        function startDemo() {
            const visual = document.getElementById('algorithmVisual');
            visual.style.animation = 'none'; // Restart animation
            visual.offsetHeight; // Trigger a reflow
            visual.style.animation = ''; // Start the animation
        
            // For demonstration purposes, after the first animation, we can change the visual if needed
            setTimeout(() => {
                visual.style.backgroundImage = 'url("https://images.unsplash.com/photo-1521645469030-8303bc6ff0d2")';
            }, 1500);
        }
    </script>
</body>

</html>
