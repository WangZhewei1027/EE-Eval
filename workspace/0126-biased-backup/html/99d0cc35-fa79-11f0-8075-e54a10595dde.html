<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Syntax Tree Interactive Demo</title>
    <script>
        class ASTNode {
            constructor(type, value) {
                this.type = type;
                this.value = value || null;
                this.children = [];
            }

            addChild(node) {
                this.children.push(node);
            }
        }

        let rootNode = new ASTNode('Program', 'Root');
        let currentNode = rootNode;

        function renderAST() {
            const astViewer = document.getElementById('astViewer');
            astViewer.innerHTML = JSON.stringify(rootNode, null, 2);
        }

        function addNode() {
            const nodeType = document.getElementById('nodeType').value;
            const nodeValue = document.getElementById('nodeValue').value;
            const newNode = new ASTNode(nodeType, nodeValue);
            currentNode.addChild(newNode);
            renderAST();
        }

        function changeNode() {
            const nodeIndex = parseInt(document.getElementById('nodeIndex').value);
            const newNodeType = document.getElementById('newNodeType').value;
            const newNodeValue = document.getElementById('newNodeValue').value;

            if (currentNode.children[nodeIndex]) {
                currentNode.children[nodeIndex].type = newNodeType;
                currentNode.children[nodeIndex].value = newNodeValue;
                renderAST();
            } else {
                alert('Node index out of range');
            }
        }

        function deleteNode() {
            const nodeIndex = parseInt(document.getElementById('nodeIndex').value);

            if (currentNode.children[nodeIndex]) {
                currentNode.children.splice(nodeIndex, 1);
                renderAST();
            } else {
                alert('Node index out of range');
            }
        }

        function navigateToChild() {
            const nodeIndex = parseInt(document.getElementById('nodeIndex').value);
            if (currentNode.children[nodeIndex]) {
                currentNode = currentNode.children[nodeIndex];
                renderAST();
            } else {
                alert('Node index out of range');
            }
        }

        function navigateToParent() {
            if (currentNode !== rootNode) {
                // Note: This approach assumes a simple tree without parent pointers. Therefore, manual management of parent nodes is necessary to navigate back.
                alert('Navigating to parent is not implemented in this structure.');
            }
        }
    </script>
</head>
<body>
    <h1>Interactive Abstract Syntax Tree (AST) Demo</h1>
    
    <div>
        <h2>Add Node</h2>
        <label for="nodeType">Node Type: </label>
        <input type="text" id="nodeType">
        <label for="nodeValue">Node Value: </label>
        <input type="text" id="nodeValue">
        <button onclick="addNode()">Add Node</button>
    </div>

    <div>
        <h2>Change Node</h2>
        <label for="nodeIndex">Node Index: </label>
        <input type="text" id="nodeIndex">
        <label for="newNodeType">New Node Type: </label>
        <input type="text" id="newNodeType">
        <label for="newNodeValue">New Node Value: </label>
        <input type="text" id="newNodeValue">
        <button onclick="changeNode()">Change Node</button>
    </div>

    <div>
        <h2>Delete Node</h2>
        <label for="nodeIndex">Node Index: </label>
        <input type="text" id="nodeIndex">
        <button onclick="deleteNode()">Delete Node</button>
    </div>

    <div>
        <h2>Navigate</h2>
        <button onclick="navigateToChild()">Navigate to Child</button>
        <button onclick="navigateToParent()">Navigate to Parent</button>
    </div>

    <h2>AST Output</h2>
    <pre id="astViewer"></pre>

    <script>
        renderAST();
    </script>
</body>
</html>
