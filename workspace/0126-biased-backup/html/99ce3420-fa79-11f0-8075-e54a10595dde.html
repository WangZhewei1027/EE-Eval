<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Map Interactive Demo</title>
    <script>
        let hashMap = {};

        function addKeyValue() {
            const key = document.getElementById('keyInput').value;
            const value = document.getElementById('valueInput').value;
            if (key === "" || value === "") {
                alert("Both key and value must be filled in.");
                return;
            }
            hashMap[key] = value;
            updateDisplay();
            clearInputs();
        }

        function removeKey() {
            const key = document.getElementById('removeKeyInput').value;
            if (hashMap[key] !== undefined) {
                delete hashMap[key];
                updateDisplay();
                clearRemoveKeyInput();
            } else {
                alert("Key does not exist.");
            }
        }

        function getValue() {
            const key = document.getElementById('getKeyInput').value;
            const value = hashMap[key];
            document.getElementById('resultDisplay').innerText = value !== undefined ? value : "Key not found.";
        }

        function clearInputs() {
            document.getElementById('keyInput').value = '';
            document.getElementById('valueInput').value = '';
        }

        function clearRemoveKeyInput() {
            document.getElementById('removeKeyInput').value = '';
        }

        function clearGetKeyInput() {
            document.getElementById('getKeyInput').value = '';
        }

        function updateDisplay() {
            const display = document.getElementById('hashMapDisplay');
            display.innerHTML = JSON.stringify(hashMap, null, 2);
        }
    </script>
</head>
<body>

    <h1>Interactive Hash Map Demo</h1>

    <h2>Add Key-Value Pair</h2>
    Key: <input type="text" id="keyInput">
    Value: <input type="text" id="valueInput">
    <button onclick="addKeyValue()">Add</button>

    <h2>Remove Key</h2>
    Key: <input type="text" id="removeKeyInput">
    <button onclick="removeKey()">Remove</button>

    <h2>Get Value by Key</h2>
    Key: <input type="text" id="getKeyInput">
    <button onclick="getValue()">Get Value</button>
    <pre id="resultDisplay"></pre>

    <h2>Current Hash Map State</h2>
    <pre id="hashMapDisplay">{}</pre>

</body>
</html>
