<!DOCTYPE html>
<html>
<head>
    <title>Doubly Linked List Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .control-group {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }
        .visualization {
            min-height: 200px;
            border: 1px solid #000;
            padding: 20px;
            position: relative;
            overflow-x: auto;
        }
        .node {
            display: inline-flex;
            align-items: center;
            margin: 0 5px;
            position: relative;
        }
        .node-value {
            border: 1px solid #000;
            padding: 10px 15px;
            background: #fff;
        }
        .prev-pointer, .next-pointer {
            width: 30px;
            height: 2px;
            background: #000;
            position: relative;
        }
        .prev-pointer::after, .next-pointer::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
        }
        .prev-pointer::after {
            border-width: 5px 10px 5px 0;
            border-color: transparent #000 transparent transparent;
            left: 0;
            top: -4px;
        }
        .next-pointer::after {
            border-width: 5px 0 5px 10px;
            border-color: transparent transparent transparent #000;
            right: 0;
            top: -4px;
        }
        .node-actions {
            position: absolute;
            top: -20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 5px;
        }
        .node-actions button {
            font-size: 10px;
            padding: 2px 5px;
        }
        .head-marker, .tail-marker {
            position: absolute;
            font-size: 12px;
            top: -15px;
        }
        .head-marker {
            left: 10px;
        }
        .tail-marker {
            right: 10px;
        }
        .highlight {
            background-color: rgba(255, 255, 0, 0.3);
        }
        .traversal-path {
            position: absolute;
            bottom: 10px;
            left: 20px;
            right: 20px;
            height: 30px;
            border-top: 1px dashed #000;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Doubly Linked List Interactive Demo</h1>
        
        <div class="control-group">
            <h3>List Operations</h3>
            <div class="controls">
                <input type="number" id="nodeValue" placeholder="Value" min="0">
                <button id="addHead">Add to Head</button>
                <button id="addTail">Add to Tail</button>
                <button id="removeHead">Remove Head</button>
                <button id="removeTail">Remove Tail</button>
                <button id="clearList">Clear List</button>
            </div>
        </div>
        
        <div class="control-group">
            <h3>Node Operations</h3>
            <div class="controls">
                <input type="number" id="searchValue" placeholder="Search value">
                <button id="searchNode">Search</button>
                <input type="number" id="insertValue" placeholder="Insert value">
                <input type="number" id="afterValue" placeholder="After value">
                <button id="insertAfter">Insert After</button>
                <input type="number" id="removeValue" placeholder="Remove value">
                <button id="removeNode">Remove Node</button>
            </div>
        </div>
        
        <div class="control-group">
            <h3>Traversal</h3>
            <div class="controls">
                <button id="traverseForward">Traverse Forward</button>
                <button id="traverseBackward">Traverse Backward</button>
                <input type="number" id="traverseSteps" placeholder="Steps" min="1" value="1">
                <button id="stepForward">Step Forward</button>
                <button id="stepBackward">Step Backward</button>
                <button id="resetTraversal">Reset Traversal</button>
            </div>
        </div>
        
        <div class="control-group">
            <h3>List Information</h3>
            <div>
                <p>Length: <span id="listLength">0</span></p>
                <p>Head: <span id="headValue">null</span></p>
                <p>Tail: <span id="tailValue">null</span></p>
                <p>Current Node: <span id="currentNode">null</span></p>
            </div>
        </div>
        
        <div class="visualization" id="listVisualization">
            <div class="head-marker">Head</div>
            <div class="tail-marker">Tail</div>
            <div class="traversal-path" id="traversalPath"></div>
        </div>
    </div>

    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.prev = null;
                this.next = null;
            }
        }

        class DoublyLinkedList {
            constructor() {
                this.head = null;
                this.tail = null;
                this.length = 0;
                this.current = null;
            }

            addToHead(value) {
                const newNode = new Node(value);
                if (!this.head) {
                    this.head = newNode;
                    this.tail = newNode;
                } else {
                    newNode.next = this.head;
                    this.head.prev = newNode;
                    this.head = newNode;
                }
                this.length++;
                this.updateUI();
            }

            addToTail(value) {
                const newNode = new Node(value);
                if (!this.tail) {
                    this.head = newNode;
                    this.tail = newNode;
                } else {
                    newNode.prev = this.tail;
                    this.tail.next = newNode;
                    this.tail = newNode;
                }
                this.length++;
                this.updateUI();
            }

            removeHead() {
                if (!this.head) return null;
                const removed = this.head;
                if (this.head === this.tail) {
                    this.head = null;
                    this.tail = null;
                } else {
                    this.head = this.head.next;
                    this.head.prev = null;
                }
                this.length--;
                this.updateUI();
                return removed.value;
            }

            removeTail() {
                if (!this.tail) return null;
                const removed = this.tail;
                if (this.head === this.tail) {
                    this.head = null;
                    this.tail = null;
                } else {
                    this.tail = this.tail.prev;
                    this.tail.next = null;
                }
                this.length--;
                this.updateUI();
                return removed.value;
            }

            search(value) {
                let current = this.head;
                while (current) {
                    if (current.value === value) {
                        this.current = current;
                        this.updateUI();
                        return current;
                    }
                    current = current.next;
                }
                return null;
            }

            insertAfter(value, afterValue) {
                const afterNode = this.search(afterValue);
                if (!afterNode) return false;
                
                const newNode = new Node(value);
                newNode.prev = afterNode;
                newNode.next = afterNode.next;
                
                if (afterNode.next) {
                    afterNode.next.prev = newNode;
                } else {
                    this.tail = newNode;
                }
                
                afterNode.next = newNode;
                this.length++;
                this.updateUI();
                return true;
            }

            remove(value) {
                const nodeToRemove = this.search(value);
                if (!nodeToRemove) return false;
                
                if (nodeToRemove.prev) {
                    nodeToRemove.prev.next = nodeToRemove.next;
                } else {
                    this.head = nodeToRemove.next;
                }
                
                if (nodeToRemove.next) {
                    nodeToRemove.next.prev = nodeToRemove.prev;
                } else {
                    this.tail = nodeToRemove.prev;
                }
                
                this.length--;
                this.updateUI();
                return true;
            }

            traverseForward(steps = 1) {
                if (!this.current) this.current = this.head;
                if (!this.current) return;
                
                let i = 0;
                while (i < steps && this.current.next) {
                    this.current = this.current.next;
                    i++;
                }
                this.updateUI();
            }

            traverseBackward(steps = 1) {
                if (!this.current) this.current = this.tail;
                if (!this.current) return;
                
                let i = 0;
                while (i < steps && this.current.prev) {
                    this.current = this.current.prev;
                    i++;
                }
                this.updateUI();
            }

            resetTraversal() {
                this.current = null;
                this.updateUI();
            }

            clear() {
                this.head = null;
                this.tail = null;
                this.length = 0;
                this.current = null;
                this.updateUI();
            }

            updateUI() {
                const visualization = document.getElementById('listVisualization');
                visualization.innerHTML = `
                    <div class="head-marker">Head</div>
                    <div class="tail-marker">Tail</div>
                    <div class="traversal-path" id="traversalPath"></div>
                `;
                
                let current = this.head;
                let html = '';
                let position = 0;
                
                while (current) {
                    const isCurrent = this.current === current;
                    const isHead = current === this.head;
                    const isTail = current === this.tail;
                    
                    html += `
                        <div class="node" data-value="${current.value}" data-position="${position}">
                            <div class="node-actions">
                                <button class="set-current" data-value="${current.value}">Set Current</button>
                                <button class="remove-node" data-value="${current.value}">Remove</button>
                            </div>
                            <divPointer(current.prev, 'prev-pointer')}
                            <divPointer(current.next, 'next-pointer')}
                            <div class="node-value ${isCurrent ? 'highlight' : ''}">
                                ${current.value}
                                ${isHead ? ' (H)' : ''}
                                ${isTail ? ' (T)' : ''}
                            </div>
                        </div>
                    `;
                    
                    current = current.next;
                    position++;
                }
                
                visualization.insertAdjacentHTML('beforeend', html);
                
                document.getElementById('listLength').textContent = this.length;
                document.getElementById('headValue').textContent = this.head ? this.head.value : 'null';
                document.getElementById('tailValue').textContent = this.tail ? this.tail.value : 'null';
                document.getElementById('currentNode').textContent = this.current ? this.current.value : 'null';
                
                // Add event listeners to node action buttons
                document.querySelectorAll('.set-current').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const value = parseInt(e.target.getAttribute('data-value'));
                        list.search(value);
                    });
                });
                
                document.querySelectorAll('.remove-node').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const value = parseInt(e.target.getAttribute('data-value'));
                        list.remove(value);
                    });
                });
            }
        }

        function divPointer(node, className) {
            if (node) {
                return `<div class="${className}"></div>`;
            } else {
                return `<div class="${className}" style="visibility:hidden;"></div>`;
            }
        }

        const list = new DoublyLinkedList();

        // Event listeners
        document.getElementById('addHead').addEventListener('click', () => {
            const value = parseInt(document.getElementById('nodeValue').value);
            if (!isNaN(value)) {
                list.addToHead(value);
                document.getElementById('nodeValue').value = '';
            }
        });

        document.getElementById('addTail').addEventListener('click', () => {
            const value = parseInt(document.getElementById('nodeValue').value);
            if (!isNaN(value)) {
                list.addToTail(value);
                document.getElementById('nodeValue').value = '';
            }
        });

        document.getElementById('removeHead').addEventListener('click', () => {
            list.removeHead();
        });

        document.getElementById('removeTail').addEventListener('click', () => {
            list.removeTail();
        });

        document.getElementById('clearList').addEventListener('click', () => {
            list.clear();
        });

        document.getElementById('searchNode').addEventListener('click', () => {
            const value = parseInt(document.getElementById('searchValue').value);
            if (!isNaN(value)) {
                const found = list.search(value);
                if (!found) {
                    alert('Value not found in the list');
                }
                document.getElementById('searchValue').value = '';
            }
        });

        document.getElementById('insertAfter').addEventListener('click', () => {
            const value = parseInt(document.getElementById('insertValue').value);
            const afterValue = parseInt(document.getElementById('afterValue').value);
            if (!isNaN(value) && !isNaN(afterValue)) {
                const success = list.insertAfter(value, afterValue);
                if (!success) {
                    alert(`Could not insert ${value} after ${afterValue} - value not found`);
                }
                document.getElementById('insertValue').value = '';
                document.getElementById('afterValue').value = '';
            }
        });

        document.getElementById('removeNode').addEventListener('click', () => {
            const value = parseInt(document.getElementById('removeValue').value);
            if (!isNaN(value)) {
                const success = list.remove(value);
                if (!success) {
                    alert('Value not found in the list');
                }
                document.getElementById('removeValue').value = '';
            }
        });

        document.getElementById('traverseForward').addEventListener('click', () => {
            list.traverseForward();
        });

        document.getElementById('traverseBackward').addEventListener('click', () => {
            list.traverseBackward();
        });

        document.getElementById('stepForward').addEventListener('click', () => {
            const steps = parseInt(document.getElementById('traverseSteps').value) || 1;
            list.traverseForward(steps);
        });

        document.getElementById('stepBackward').addEventListener('click', () => {
            const steps = parseInt(document.getElementById('traverseSteps').value) || 1;
            list.traverseBackward(steps);
        });

        document.getElementById('resetTraversal').addEventListener('click', () => {
            list.resetTraversal();
        });

        // Initialize
        list.updateUI();
    </script>
</body>
</html>
