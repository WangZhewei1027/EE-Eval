<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Bucket Sort</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #output { margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Bucket Sort Visualization</h1>
    <label for="numbers">Enter numbers (comma separated): </label>
    <input type="text" id="numbers" placeholder="e.g. 3,5,1,6,2">
    <button onclick="prepareSort()">Prepare for Sort</button>
    <div id="output"></div>
    <h3>Control Bucket Count</h3>
    <label for="bucketCount">Number of Buckets: </label>
    <input type="number" id="bucketCount" min="1" value="5">
    <button onclick="sort()">Sort with Buckets</button>
    <h3>Sort Status</h3>
    <ul id="statusList"></ul>
    <script>
        function prepareSort() {
            const numbersInput = document.getElementById('numbers').value;
            const numbers = numbersInput.split(',').map(Number).filter(n => !isNaN(n));
            const bucketCountInput = document.getElementById('bucketCount').value;
            const bucketCount = Math.max(1, Math.floor(bucketCountInput));

            if (numbers.length === 0) {
                alert('Please enter valid numbers.');
                return;
            }

            // Clear previous output
            document.getElementById('output').innerText = `Input Numbers: [${numbers}] | Buckets: ${bucketCount}`;
            document.getElementById('statusList').innerHTML = '';
            localStorage.setItem('inputNumbers', JSON.stringify(numbers));
            localStorage.setItem('bucketCount', bucketCount);
        }

        function sort() {
            const numbers = JSON.parse(localStorage.getItem('inputNumbers'));
            const bucketCount = localStorage.getItem('bucketCount');

            if (!numbers || bucketCount === null) {
                alert('Please prepare numbers before sorting!');
                return;
            }

            const maxValue = Math.max(...numbers);
            const minValue = Math.min(...numbers);
            const bucketSize = (maxValue - minValue) / bucketCount;

            const buckets = Array.from({length: bucketCount}, () => []);
            numbers.forEach(num => {
                const index = Math.floor((num - minValue) / bucketSize);
                if (index >= bucketCount) {
                    buckets[bucketCount - 1].push(num);
                } else {
                    buckets[index].push(num);
                }
            });

            let sortedArray = [];
            buckets.forEach((bucket, i) => {
                if (bucket.length > 0) {
                    bucket.sort((a, b) => a - b);
                    sortedArray = sortedArray.concat(bucket);
                    const listItem = document.createElement('li');
                    listItem.innerText = `Bucket ${i + 1}: [${bucket}] sorted.`;
                    document.getElementById('statusList').appendChild(listItem);
                } else {
                    const listItem = document.createElement('li');
                    listItem.innerText = `Bucket ${i + 1}: empty.`;
                    document.getElementById('statusList').appendChild(listItem);
                }
            });

            document.getElementById('output').innerText += ` | Sorted Numbers: [${sortedArray}]`;
        }
    </script>
</body>
</html>
