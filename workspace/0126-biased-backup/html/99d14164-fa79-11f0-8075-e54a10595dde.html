<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overfitting Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Overfitting Demonstration</h1>
    
    <label for="data-points">Number of Data Points:</label>
    <input type="number" id="data-points" value="10" min="1" max="100" />
    <button id="generate-data">Generate Data</button>
    <button id="clear-data">Clear Data</button>

    <label for="model-complexity">Model Complexity:</label>
    <input type="range" id="model-complexity" min="1" max="10" value="1" />
    <span id="complexity-value">1</span>

    <button id="train-model">Train Model</button>
    <button id="show-plot">Show Plot</button>
    
    <h2>Data Visualization</h2>
    <div id="data-visualization"></div>

    <h2>Model Evaluation</h2>
    <div id="evaluation-result">Training Result: <span id="result">N/A</span></div>

    <script>
        let dataPoints = [];
        let modelComplexity = 1;

        document.getElementById('generate-data').onclick = function() {
            const numPoints = parseInt(document.getElementById('data-points').value);
            dataPoints = Array.from({ length: numPoints }, () => Math.random());
            document.getElementById('result').innerText = 'Data generated. ' + numPoints + ' points created.';
        };

        document.getElementById('clear-data').onclick = function() {
            dataPoints = [];
            document.getElementById('result').innerText = 'Data cleared.';
        };
        
        document.getElementById('model-complexity').oninput = function() {
            modelComplexity = parseInt(this.value);
            document.getElementById('complexity-value').innerText = modelComplexity;
        };

        document.getElementById('train-model').onclick = function() {
            if (dataPoints.length === 0) {
                alert('Please generate data points before training the model.');
                return;
            }
            const errorRate = Math.random() / modelComplexity; // Simulate overfitting scenario
            document.getElementById('result').innerText = `Model trained with complexity ${modelComplexity}. Error rate: ${errorRate.toFixed(4)}`;
        };

        document.getElementById('show-plot').onclick = function() {
            let visual = 'Data Visualization:\n' + dataPoints.map((d, i) => `Point ${i + 1}: ${d.toFixed(2)}`).join('\n');
            alert(visual);
        };
    </script>
</body>
</html>
