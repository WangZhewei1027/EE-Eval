<!DOCTYPE html>
<html>
<head>
    <title>Interactive Monitor System</title>
    <script>
        // System state
        let monitorState = {
            power: false,
            brightness: 50,
            contrast: 50,
            resolution: '1920x1080',
            inputSource: 'HDMI',
            colorProfile: 'sRGB',
            aspectRatio: '16:9',
            refreshRate: 60,
            volume: 30,
            isMenuOpen: false,
            activeMenu: null,
            presets: {
                gaming: {brightness: 70, contrast: 80, refreshRate: 144},
                movie: {brightness: 40, contrast: 60, refreshRate: 60},
                office: {brightness: 50, contrast: 50, refreshRate: 60}
            },
            customSettings: []
        };

        // DOM elements
        let elements = {};

        // Initialize the app
        function init() {
            // Cache DOM elements
            elements = {
                powerBtn: document.getElementById('powerBtn'),
                brightnessSlider: document.getElementById('brightnessSlider'),
                contrastSlider: document.getElementById('contrastSlider'),
                resolutionSelect: document.getElementById('resolutionSelect'),
                inputSelect: document.getElementById('inputSelect'),
                colorProfileSelect: document.getElementById('colorProfileSelect'),
                aspectRatioSelect: document.getElementById('aspectRatioSelect'),
                refreshRateSelect: document.getElementById('refreshRateSelect'),
                volumeSlider: document.getElementById('volumeSlider'),
                menuBtn: document.getElementById('menuBtn'),
                presetsSelect: document.getElementById('presetsSelect'),
                savePresetBtn: document.getElementById('savePresetBtn'),
                resetBtn: document.getElementById('resetBtn'),
                infoBtn: document.getElementById('infoBtn'),
                statusDisplay: document.getElementById('statusDisplay'),
                settingsPanel: document.getElementById('settingsPanel'),
                menuPanel: document.getElementById('menuPanel'),
                mainContent: document.getElementById('mainContent')
            };

            // Set up event listeners
            setupEventListeners();
            updateUI();
        }

        function setupEventListeners() {
            elements.powerBtn.addEventListener('click', togglePower);
            elements.brightnessSlider.addEventListener('input', updateBrightness);
            elements.contrastSlider.addEventListener('input', updateContrast);
            elements.resolutionSelect.addEventListener('change', updateResolution);
            elements.inputSelect.addEventListener('change', updateInputSource);
            elements.colorProfileSelect.addEventListener('change', updateColorProfile);
            elements.aspectRatioSelect.addEventListener('change', updateAspectRatio);
            elements.refreshRateSelect.addEventListener('change', updateRefreshRate);
            elements.volumeSlider.addEventListener('input', updateVolume);
            elements.menuBtn.addEventListener('click', toggleMenu);
            elements.presetsSelect.addEventListener('change', applyPreset);
            elements.savePresetBtn.addEventListener('click', saveCustomPreset);
            elements.resetBtn.addEventListener('click', resetSettings);
            elements.infoBtn.addEventListener('click', showSystemInfo);
        }

        // State update functions
        function togglePower() {
            monitorState.power = !monitorState.power;
            if (monitorState.power) {
                monitorState.isMenuOpen = false;
            }
            updateUI();
        }

        function updateBrightness() {
            monitorState.brightness = elements.brightnessSlider.value;
            updateStatus(`Brightness set to ${monitorState.brightness}`);
            updateUI();
        }

        function updateContrast() {
            monitorState.contrast = elements.contrastSlider.value;
            updateStatus(`Contrast set to ${monitorState.contrast}`);
            updateUI();
        }

        function updateResolution() {
            monitorState.resolution = elements.resolutionSelect.value;
            updateStatus(`Resolution set to ${monitorState.resolution}`);
            updateUI();
        }

        function updateInputSource() {
            monitorState.inputSource = elements.inputSelect.value;
            updateStatus(`Input source set to ${monitorState.inputSource}`);
            updateUI();
        }

        function updateColorProfile() {
            monitorState.colorProfile = elements.colorProfileSelect.value;
            updateStatus(`Color profile set to ${monitorState.colorProfile}`);
            updateUI();
        }

        function updateAspectRatio() {
            monitorState.aspectRatio = elements.aspectRatioSelect.value;
            updateStatus(`Aspect ratio set to ${monitorState.aspectRatio}`);
            updateUI();
        }

        function updateRefreshRate() {
            monitorState.refreshRate = elements.refreshRateSelect.value;
            updateStatus(`Refresh rate set to ${monitorState.refreshRate}Hz`);
            updateUI();
        }

        function updateVolume() {
            monitorState.volume = elements.volumeSlider.value;
            updateStatus(`Volume set to ${monitorState.volume}`);
            updateUI();
        }

        function toggleMenu() {
            if (!monitorState.power) return;
            monitorState.isMenuOpen = !monitorState.isMenuOpen;
            updateUI();
        }

        function applyPreset() {
            const presetName = elements.presetsSelect.value;
            if (presetName === 'custom') return;
            
            const preset = monitorState.presets[presetName];
            monitorState.brightness = preset.brightness;
            monitorState.contrast = preset.contrast;
            monitorState.refreshRate = preset.refreshRate;
            
            updateStatus(`Applied ${presetName} preset`);
            updateUI();
        }

        function saveCustomPreset() {
            const presetName = prompt('Enter name for new preset:');
            if (!presetName) return;
            
            monitorState.presets[presetName] = {
                brightness: monitorState.brightness,
                contrast: monitorState.contrast,
                refreshRate: monitorState.refreshRate
            };
            
            // Update presets dropdown
            const option = document.createElement('option');
            option.value = presetName;
            option.textContent = presetName;
            elements.presetsSelect.appendChild(option);
            
            updateStatus(`Saved "${presetName}" preset`);
        }

        function resetSettings() {
            if (confirm('Reset all settings to defaults?')) {
                monitorState.brightness = 50;
                monitorState.contrast = 50;
                monitorState.resolution = '1920x1080';
                monitorState.inputSource = 'HDMI';
                monitorState.colorProfile = 'sRGB';
                monitorState.aspectRatio = '16:9';
                monitorState.refreshRate = 60;
                monitorState.volume = 30;
                updateStatus('Settings reset to defaults');
                updateUI();
            }
        }

        function showSystemInfo() {
            const info = `Monitor Status:
Power: ${monitorState.power ? 'ON' : 'OFF'}
Brightness: ${monitorState.brightness}
Contrast: ${monitorState.contrast}
Resolution: ${monitorState.resolution}
Input: ${monitorState.inputSource}
Refresh Rate: ${monitorState.refreshRate}Hz
Color Profile: ${monitorState.colorProfile}
Aspect Ratio: ${monitorState.aspectRatio}
Volume: ${monitorState.volume}`;
            
            alert(info);
        }

        function updateStatus(message) {
            elements.statusDisplay.textContent = message;
            setTimeout(() => {
                if (elements.statusDisplay.textContent === message) {
                    elements.statusDisplay.textContent = '';
                }
            }, 3000);
        }

        // UI update function
        function updateUI() {
            // Update control states based on power
            const controls = [
                elements.brightnessSlider,
                elements.contrastSlider,
                elements.resolutionSelect,
                elements.inputSelect,
                elements.colorProfileSelect,
                elements.aspectRatioSelect,
                elements.refreshRateSelect,
                elements.volumeSlider,
                elements.menuBtn,
                elements.presetsSelect,
                elements.savePresetBtn,
                elements.resetBtn,
                elements.infoBtn
            ];
            
            controls.forEach(control => {
                control.disabled = !monitorState.power;
            });

            // Update control values
            elements.brightnessSlider.value = monitorState.brightness;
            elements.contrastSlider.value = monitorState.contrast;
            elements.resolutionSelect.value = monitorState.resolution;
            elements.inputSelect.value = monitorState.inputSource;
            elements.colorProfileSelect.value = monitorState.colorProfile;
            elements.aspectRatioSelect.value = monitorState.aspectRatio;
            elements.refreshRateSelect.value = monitorState.refreshRate;
            elements.volumeSlider.value = monitorState.volume;

            // Update power button text
            elements.powerBtn.textContent = monitorState.power ? 'Turn OFF' : 'Turn ON';

            // Update menu visibility
            elements.menuPanel.style.display = monitorState.isMenuOpen ? 'block' : 'none';
            elements.mainContent.style.display = monitorState.isMenuOpen ? 'none' : 'block';

            // Update monitor display simulation
            const display = document.getElementById('monitorDisplay');
            if (monitorState.power) {
                display.style.backgroundColor = '#f0f0f0';
                display.style.border = '1px solid #000';
                display.innerHTML = `
                    <div style="text-align:center;padding-top:20px;">
                        <div>${monitorState.inputSource} Input</div>
                        <div>${monitorState.resolution} @ ${monitorState.refreshRate}Hz</div>
                        <div>Brightness: ${monitorState.brightness}</div>
                        <div>Contrast: ${monitorState.contrast}</div>
                    </div>
                `;
            } else {
                display.style.backgroundColor = '#000';
                display.style.border = '1px solid #ccc';
                display.innerHTML = '<div style="color:#fff;text-align:center;padding-top:20px;">OFF</div>';
            }
        }
    </script>
</head>
<body onload="init()">
    <h1>Interactive Monitor Control System</h1>
    
    <div id="monitorDisplay" style="width:400px;height:250px;margin:20px auto;"></div>
    
    <div id="statusDisplay" style="height:20px;margin:10px;"></div>
    
    <div id="displayControls">
        <button id="powerBtn">Turn ON</button>
        <button id="menuBtn">Menu</button>
        <button id="infoBtn">System Info</button>
    </div>
    
    <div id="mainContent">
        <div>
            <label>Brightness: <input type="range" id="brightnessSlider" min="0" max="100" value="50"></label>
            <span id="brightnessValue">50</span>
        </div>
        <div>
            <label>Contrast: <input type="range" id="contrastSlider" min="0" max="100" value="50"></label>
            <span id="contrastValue">50</span>
        </div>
        <div>
            <label>Volume: <input type="range" id="volumeSlider" min="0" max="100" value="30"></label>
            <span id="volumeValue">30</span>
        </div>
    </div>
    
    <div id="menuPanel" style="display:none;">
        <h3>Monitor Settings</h3>
        
        <div>
            <label>Resolution:
                <select id="resolutionSelect">
                    <option value="1920x1080">1920x1080 (Full HD)</option>
                    <option value="2560x1440">2560x1440 (QHD)</option>
                    <option value="3840x2160">3840x2160 (4K UHD)</option>
                    <option value="1280x720">1280x720 (HD)</option>
                </select>
            </label>
        </div>
        
        <div>
            <label>Input Source:
                <select id="inputSelect">
                    <option value="HDMI">HDMI</option>
                    <option value="DisplayPort">DisplayPort</option>
                    <option value="DVI">DVI</option>
                    <option value="VGA">VGA</option>
                </select>
            </label>
        </div>
        
        <div>
            <label>Color Profile:
                <select id="colorProfileSelect">
                    <option value="sRGB">sRGB</option>
                    <option value="AdobeRGB">AdobeRGB</option>
                    <option value="DCI-P3">DCI-P3</option>
                    <option value="Custom">Custom</option>
                </select>
            </label>
        </div>
        
        <div>
            <label>Aspect Ratio:
                <select id="aspectRatioSelect">
                    <option value="16:9">16:9</option>
                    <option value="16:10">16:10</option>
                    <option value="4:3">4:3</option>
                    <option value="21:9">21:9 (Ultrawide)</option>
                </select>
            </label>
        </div>
        
        <div>
            <label>Refresh Rate (Hz):
                <select id="refreshRateSelect">
                    <option value="60">60</option>
                    <option value="75">75</option>
                    <option value="120">120</option>
                    <option value="144">144</option>
                    <option value="240">240</option>
                </select>
            </label>
        </div>
        
        <div>
            <label>Presets:
                <select id="presetsSelect">
                    <option value="gaming">Gaming</option>
                    <option value="movie">Movie</option>
                    <option value="office">Office</option>
                    <option value="custom">Custom...</option>
                </select>
            </label>
            <button id="savePresetBtn">Save Current as Preset</button>
        </div>
        
        <div>
            <button id="resetBtn">Reset to Defaults</button>
        </div>
    </div>
    
    <script>
        // Update value displays in real-time
        document.getElementById('brightnessSlider').addEventListener('input', function() {
            document.getElementById('brightnessValue').textContent = this.value;
        });
        
        document.getElementById('contrastSlider').addEventListener('input', function() {
            document.getElementById('contrastValue').textContent = this.value;
        });
        
        document.getElementById('volumeSlider').addEventListener('input', function() {
            document.getElementById('volumeValue').textContent = this.value;
        });
    </script>
</body>
</html>
