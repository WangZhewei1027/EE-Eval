<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Circular Linked List Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Raleway&display=swap');

  /* Reset and base */
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    background: linear-gradient(135deg, #1f1c2c 0%, #928dab 100%);
    font-family: 'Raleway', sans-serif;
    color: #e6e8f0;
    overflow: hidden;
    user-select: none;
  }
  h1 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 2.8rem;
    color: #f0f4f8;
    text-align: center;
    margin-top: 2rem;
    letter-spacing: 0.06em;
  }

  /* Container for visualization */
  #container {
    position: relative;
    width: 90vmin;
    height: 90vmin;
    max-width: 700px;
    max-height: 700px;
    margin: 3rem auto 5rem auto;
    perspective: 1200px;
  }

  /* Circular linked list ring */
  #circle {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    box-shadow:
      inset 0 0 50px 5px rgba(255 255 255 / 0.15),
      0 0 20px 2px rgba(240 244 248 / 0.25);
    background:
      radial-gradient(circle at center, #3a324b 15%, #1f1c2c 85%);
    display: flex;
    justify-content: center;
    align-items: center;
    filter: drop-shadow(0 0 18px #9fa6cca6);
  }

  svg {
    width: 100%; height: 100%;
  }

  /* Each node */
  .node-group {
    cursor: default;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: center center;
  }
  .node-circle {
    fill: #5d5ba7dd;
    stroke: #9090cacc;
    stroke-width: 2;
    filter:
      drop-shadow(0 2px 3px rgba(60,60,110,0.3));
    transition: fill 0.3s ease, filter 0.3s ease;
  }
  .node-text {
    fill: #e6e8f0ee;
    font-weight: 600;
    font-family: 'Montserrat', sans-serif;
    font-size: 1.15rem;
    user-select: none;
    pointer-events: none;
    filter: drop-shadow(0 0 6px #b4bbe677);
  }

  /* Arrow styling */
  .arrowed-path {
    fill: none;
    stroke: #a8a4d0cc;
    stroke-width: 3;
    filter:
      drop-shadow(0 0 8px #bcbdd9cc);
    opacity: 0.85;
    transition: stroke 0.4s ease;
  }
  .arrowhead {
    fill: #b0afe0bb;
    filter: drop-shadow(0 0 6px #a5a2dba8);
    transition: fill 0.3s ease;
    opacity: 0.9;
  }

  /* Highlight current node */
  .current node-circle {
    fill: #ffd166ff;
    stroke: #ffca0077;
    filter:
      drop-shadow(0 0 10px #ffea7dcc);
  }
  .current .node-text {
    fill: #4a3400;
    filter: drop-shadow(0 0 12px #d9b340cc);
  }

  /* Buttons container */
  #buttons {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 3rem;
  }

  button {
    background: #5D5BA7;
    border: none;
    border-radius: 12px;
    padding: 1rem 2.2rem;
    font-family: 'Montserrat', sans-serif;
    font-size: 1.15rem;
    color: #f0f4f8;
    box-shadow:
      0 10px 25px rgba(93, 91, 167, 0.5);
    cursor: pointer;
    transition:
      background-color 0.25s ease,
      box-shadow 0.3s ease,
      transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    user-select: none;
  }
  button:hover {
    background: #7e7adb;
    box-shadow:
      0 15px 35px rgba(126, 122, 219, 0.8);
    transform: translateY(-3px);
  }
  button:active {
    transform: translateY(1px);
    box-shadow: 0 6px 15px rgba(93, 91, 167, 0.4);
  }

  /* Footer text */
  footer {
    text-align: center;
    font-size: 0.85rem;
    color: #a8a6bfaa;
    font-family: 'Raleway', sans-serif;
    margin-bottom: 1rem;
  }

</style>
</head>
<body>

<h1>Circular Linked List Concept</h1>

<div id="container" aria-label="Circular linked list visualization with nodes and arrows">
  <svg aria-hidden="true" id="visual-svg" viewBox="0 0 700 700" role="img" >
    <defs>
      <marker id="arrowhead" markerWidth="14" markerHeight="11" refX="12" refY="5.5" orient="auto" markerUnits="strokeWidth">
        <path d="M 0 0 L 12 5.5 L 0 11 z" class="arrowhead"/>
      </marker>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%" >
        <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#f0e68cff" flood-opacity="0.65"/>
      </filter>
    </defs>
    <!-- Circle ring for subtle glow -->
    <circle cx="350" cy="350" r="320" fill="none" stroke="url(#gradientRing)" stroke-width="20" filter="url(#glow)" opacity="0.15" />
  </svg>
</div>

<div id="buttons" aria-label="Controls for circular linked list visualization">
  <button id="btnNext" aria-label="Highlight next node">Next</button>
  <button id="btnReset" aria-label="Reset to first node">Reset</button>
</div>

<footer>
  &copy; 2024 &nbsp; | &nbsp; Visualizing Data Structure Concepts 
</footer>

<script>
(() => {
  const SVG_NS = "http://www.w3.org/2000/svg";
  const container = document.getElementById('container');
  const svg = document.getElementById('visual-svg');

  // Configuration
  const NODE_COUNT = 10;
  const CENTER = { x: 350, y: 350 };
  const RADIUS = 270;
  const NODE_RADIUS = 32;

  // Data for nodes (simple indices as values)
  const nodes = Array.from({ length: NODE_COUNT }, (_, i) => ({
    id: i,
    value: `${i + 1}`
  }));

  // Hold references to node group elements for highlighting
  const nodeGroups = [];

  // Build arrowed curved path between nodes
  function createArrowedLink(from, to) {
    /* 
      For a smooth curved arrow between two points on circle
      We'll use a quadratic bezier curve, with control point shifted towards outside of circle
    */
    const startAngle = from.angle;
    const endAngle = to.angle;

    // Calculate start and end points on circle circumference
    const startX = CENTER.x + (RADIUS) * Math.cos(startAngle);
    const startY = CENTER.y + (RADIUS) * Math.sin(startAngle);
    const endX = CENTER.x + (RADIUS) * Math.cos(endAngle);
    const endY = CENTER.y + (RADIUS) * Math.sin(endAngle);

    // Control Point for bezier - hang outward from circle to create subtle arch
    // Mid angle between start and end
    let midAngle = (startAngle + endAngle) / 2;

    // For angles crossing zero line, adjust midAngle within [0, 2pi]
    if ((endAngle < startAngle) && (startAngle - endAngle > Math.PI)) {
      midAngle += Math.PI;
    }

    // Adjust midAngle so arch bulges outside the circle
    const controlRadius = RADIUS + 70; 
    const cx = CENTER.x + controlRadius * Math.cos(midAngle);
    const cy = CENTER.y + controlRadius * Math.sin(midAngle);

    // Path string quadratic bezier
    const d = `M ${startX.toFixed(3)} ${startY.toFixed(3)} Q ${cx.toFixed(3)} ${cy.toFixed(3)} ${endX.toFixed(3)} ${endY.toFixed(3)}`;
    return d;
  }

  // Create a node group with circle and text
  function createNode(node, angleRad, index) {
    const group = document.createElementNS(SVG_NS, 'g');
    group.classList.add('node-group');
    group.setAttribute('aria-label', `Node ${node.value}`);
    group.setAttribute('role', 'listitem');

    // Position around circle
    const x = CENTER.x + RADIUS * Math.cos(angleRad);
    const y = CENTER.y + RADIUS * Math.sin(angleRad);

    group.setAttribute('transform', `translate(${x},${y})`);

    // Circle
    const circle = document.createElementNS(SVG_NS, 'circle');
    circle.classList.add('node-circle');
    circle.setAttribute('r', NODE_RADIUS);
    circle.setAttribute('cx', 0);
    circle.setAttribute('cy', 0);
    group.appendChild(circle);

    // Text
    const text = document.createElementNS(SVG_NS, 'text');
    text.classList.add('node-text');
    text.setAttribute('x', 0);
    text.setAttribute('y', 7); // approximate vertical centering
    text.setAttribute('text-anchor', 'middle');
    text.textContent = node.value;
    group.appendChild(text);

    svg.appendChild(group);

    return { group, angle: angleRad };
  }

  // Create arrowed link path element
  function createLink(d) {
    const path = document.createElementNS(SVG_NS, 'path');
    path.setAttribute('d', d);
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('marker-end', 'url(#arrowhead)');
    path.classList.add('arrowed-path');
    svg.appendChild(path);
    return path;
  }

  // Prepare nodes with positions and elements
  nodes.forEach((node, i) => {
    const angleRad = (i / NODE_COUNT) * 2 * Math.PI - Math.PI / 2;
    node.angle = angleRad;
  });

  // Create nodes in SVG
  for(let i=0; i < NODE_COUNT; i++) {
    const { group } = createNode(nodes[i], nodes[i].angle, i);
    nodeGroups.push(group);
  }

  // Create circular links between nodes (last to first as well)
  const links = [];
  for(let i=0; i < NODE_COUNT; i++) {
    const fromNode = nodes[i];
    const toNode = nodes[(i+1)%NODE_COUNT];
    const d = createArrowedLink(fromNode, toNode);
    links.push(createLink(d));
  }

  // Highlight logic
  let currentIndex = 0;

  function updateHighlight(newIndex) {
    // Remove current highlights
    nodeGroups.forEach(g => g.classList.remove('current'));
    currentIndex = ((newIndex % NODE_COUNT) + NODE_COUNT) % NODE_COUNT;
    nodeGroups[currentIndex].classList.add('current');
    animatePulse(nodeGroups[currentIndex].querySelector('.node-circle'));
  }

  // Pulse animation on current node's circle
  function animatePulse(circle) {
    circle.animate([
      { filter: 'drop-shadow(0 0 10px #ffea7dcc)', r: NODE_RADIUS},
      { filter: 'drop-shadow(0 0 16px #ffea7dff)', r: NODE_RADIUS + 6 },
      { filter: 'drop-shadow(0 0 10px #ffea7dcc)', r: NODE_RADIUS }
    ], {
      duration: 900,
      easing: 'ease-out',
      iterations: 1
    });
  }

  // Initial highlight
  updateHighlight(0);

  // Button event handlers
  document.getElementById('btnNext').addEventListener('click', () => {
    updateHighlight(currentIndex + 1);
  });

  document.getElementById('btnReset').addEventListener('click', () => {
    updateHighlight(0);
  });

  // Extra subtle continuous slow rotation of the entire circle for mesmerizing effect
  let rotation = 0;
  function rotateCircle() {
    rotation += 0.05;
    svg.style.transform = `rotate(${rotation}deg)`;
    requestAnimationFrame(rotateCircle);
  }
  // Start rotation after short delay to not conflict with load animations
  setTimeout(() => requestAnimationFrame(rotateCircle), 800);

})();
</script>

</body>
</html>
