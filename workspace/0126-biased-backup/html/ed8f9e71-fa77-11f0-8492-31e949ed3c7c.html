<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Development Life Cycle</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ece9e6, #ffffff);
            color: #333;
            overflow: hidden;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }
        .cycle {
            position: relative;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            margin: 0 auto;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .step {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 5px solid #4A90E2;
            border-radius: 50%;
            text-align: center;
            line-height: 150px;
            font-size: 1.2rem;
            background-color: #fff;
            transition: transform 0.3s ease;
            will-change: transform;
        }
        .step:hover {
            transform: scale(1.1);
        }
        .step:nth-child(1) {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        .step:nth-child(2) {
            top: 95px;
            left: 80px;
        }
        .step:nth-child(3) {
            top: 95px;
            right: 80px;
        }
        .step:nth-child(4) {
            bottom: 20px;
            left: 50%;
            transform: translate(-50%, 0);
        }
        .step:nth-child(5) {
            bottom: 95px;
            left: 80px;
        }
        .step:nth-child(6) {
            bottom: 95px;
            right: 80px;
        }
        .button {
            padding: 10px 20px;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            transition: background 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .button:hover {
            background-color: #357ABD;
        }
        .description {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            text-align: center;
            font-size: 1.5rem;
            opacity: 0;
            transition: opacity 1s;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="cycle">
        <div class="step">Planning</div>
        <div class="step">Analysis</div>
        <div class="step">Design</div>
        <div class="step">Implementation</div>
        <div class="step">Testing</div>
        <div class="step">Maintenance</div>
        <button class="button" onclick="showDescription()">Learn More</button>
        <div class="description" id="description">This diagram represents the stages of the Software Development Life Cycle (SDLC): Planning, Analysis, Design, Implementation, Testing, and Maintenance.</div>
    </div>
</div>

<script>
    function showDescription() {
        var desc = document.getElementById('description');
        desc.style.opacity = '1';
    }
</script>

</body>
</html>
