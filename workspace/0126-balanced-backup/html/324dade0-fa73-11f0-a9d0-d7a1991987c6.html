<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interpolation Search Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input[type="number"] {
            width: 50px;
        }
        table {
            margin-top: 20px;
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Interpolation Search Demo</h1>
    <p>Enter a sorted array and the number to search for:</p>
    
    <textarea id="arrayInput" rows="4" cols="50" placeholder="Enter sorted numbers separated by commas"></textarea><br><br>
    <input type="number" id="searchValue" placeholder="Search for..." />
    <button onclick="performSearch()">Search</button>

    <h3 id="result"></h3>

    <h2>Steps:</h2>
    <table id="stepTable">
        <thead>
            <tr>
                <th>Step</th>
                <th>Low</th>
                <th>High</th>
                <th>Probe Index</th>
                <th>Current Value</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        function interpolationSearch(arr, x) {
            let low = 0;
            let high = arr.length - 1;
            let steps = [];

            while (low <= high && x >= arr[low] && x <= arr[high]) {
                // Calculate probe position
                let probeIndex = low + Math.floor(((high - low) / (arr[high] - arr[low])) * (x - arr[low]));

                // Log step
                steps.push({step: steps.length + 1, low: low, high: high, probeIndex: probeIndex, currentValue: arr[probeIndex]});

                // If we found the element
                if (arr[probeIndex] === x) {
                    return {index: probeIndex, steps: steps};
                }

                // If x is larger, x is in upper part
                if (arr[probeIndex] < x) {
                    low = probeIndex + 1;
                }
                // If x is smaller, x is in lower part
                else {
                    high = probeIndex - 1;
                }
            }

            // Element not found
            return {index: -1, steps: steps};
        }

        function performSearch() {
            const input = document.getElementById("arrayInput").value;
            const searchValue = parseInt(document.getElementById("searchValue").value);
            const resultElement = document.getElementById("result");
            const stepTableBody = document.getElementById("stepTable").querySelector("tbody");
            stepTableBody.innerHTML = '';

            const arr = input.split(',').map(Number).sort((a, b) => a - b);
            const searchResult = interpolationSearch(arr, searchValue);

            if (searchResult.index !== -1) {
                resultElement.textContent = `Found ${searchValue} at index: ${searchResult.index}`;
            } else {
                resultElement.textContent = `${searchValue} not found.`;
            }

            searchResult.steps.forEach(step => {
                let row = document.createElement("tr");
                row.innerHTML = `<td>${step.step}</td><td>${step.low}</td><td>${step.high}</td><td>${step.probeIndex}</td><td>${step.currentValue}</td>`;
                stepTableBody.appendChild(row);
            });
        }
    </script>
</body>
</html>
