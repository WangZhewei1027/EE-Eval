<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indexing Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .output {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <h1>Indexing Demonstration</h1>
    <p>Indexing is the process of mapping values to their positions in a data structure, making retrieval more efficient.</p>
    
    <h2>Example List of Items</h2>
    <input type="text" id="searchInput" placeholder="Search for an item..." />
    <button onclick="searchItem()">Search</button>
    
    <div class="output" id="resultOutput"></div>
    
    <script>
        // Sample data array
        const items = [
            { id: 0, name: "Apple" },
            { id: 1, name: "Banana" },
            { id: 2, name: "Orange" },
            { id: 3, name: "Grapes" },
            { id: 4, name: "Pineapple" },
            { id: 5, name: "Mango" },
            { id: 6, name: "Strawberry" }
        ];

        // Function to create an index
        function createIndex(data) {
            const index = {};
            data.forEach(item => {
                index[item.name.toLowerCase()] = item;
            });
            return index;
        }

        // Create index for fast lookup
        const indexedItems = createIndex(items);
        
        // Function to search for an item
        function searchItem() {
            const searchInput = document.getElementById("searchInput").value.toLowerCase();
            const resultOutput = document.getElementById("resultOutput");
            resultOutput.innerHTML = ""; // Clear previous results
            
            if (indexedItems[searchInput]) {
                const item = indexedItems[searchInput];
                resultOutput.innerHTML = `<strong>Found:</strong> ${item.name} (ID: ${item.id})`;
            } else {
                resultOutput.innerHTML = "Item not found.";
            }
        }
    </script>
</body>
</html>
