<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Simulation with JavaScript</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        input, button {
            margin: 5px;
        }
    </style>
</head>
<body>

<h1>SQL Simulation</h1>
<p>Use this simulation to understand SQL operations like SELECT, INSERT, and DELETE.</p>

<h2>Database Table</h2>
<table id="dataTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<h2>Commands</h2>
<input type="text" id="commandInput" placeholder="Enter SQL command (e.g. INSERT, SELECT, DELETE)" />
<button onclick="executeCommand()">Execute</button>

<p id="output"></p>

<script>
    const database = [];

    function renderTable() {
        const tbody = document.querySelector('#dataTable tbody');
        tbody.innerHTML = '';
        database.forEach((entry) => {
            const row = document.createElement('tr');
            row.innerHTML = `<td>${entry.id}</td><td>${entry.name}</td><td>${entry.age}</td>`;
            tbody.appendChild(row);
        });
    }

    function executeCommand() {
        const command = document.getElementById('commandInput').value.trim().toUpperCase();
        const output = document.getElementById('output');
        output.textContent = '';

        if (command.startsWith('INSERT')) {
            const parts = command.split(' ').slice(2); // Keep only the values
            const id = parseInt(parts[0]);
            const name = parts[1].replace(/'/g, ''); // Remove quotes
            const age = parseInt(parts[2]);
            if (id && name && age) {
                database.push({ id: id, name: name, age: age });
                output.textContent = 'Inserted successfully';
                renderTable();
            } else {
                output.textContent = 'Error: Invalid INSERT command';
            }
        } else if (command.startsWith('SELECT')) {
            output.textContent = JSON.stringify(database, null, 2);
        } else if (command.startsWith('DELETE')) {
            const parts = command.split(' ');
            const idToDelete = parseInt(parts[2]);
            const index = database.findIndex(entry => entry.id === idToDelete);
            if (index > -1) {
                database.splice(index, 1);
                output.textContent = 'Deleted successfully';
                renderTable();
            } else {
                output.textContent = 'Error: ID not found';
            }
        } else {
            output.textContent = 'Error: Unsupported command';
        }

        document.getElementById('commandInput').value = ''; // Clear input after execution
    }
</script>

</body>
</html>
