<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type System Demonstration</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { margin-top: 20px; }
        .output { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Type System Demonstration</h1>
    <p>Select a type system:</p>
    <select id="typeSelector">
        <option value="">Choose a type</option>
        <option value="string">String</option>
        <option value="number">Number</option>
        <option value="boolean">Boolean</option>
        <option value="object">Object</option>
        <option value="array">Array</option>
        <option value="function">Function</option>
    </select>
    
    <div class="container">
        <label for="inputValue">Enter a value:</label>
        <input type="text" id="inputValue" placeholder="Type something..."/>
        <button id="checkTypeButton">Check Type</button>
    </div>
    
    <div class="output" id="output"></div>

    <script>
        document.getElementById('checkTypeButton').addEventListener('click', function() {
            const selectedType = document.getElementById('typeSelector').value;
            const inputValue = document.getElementById('inputValue').value;
            let isValid = false;

            switch (selectedType) {
                case 'string':
                    isValid = typeof inputValue === 'string';
                    break;
                case 'number':
                    isValid = !isNaN(inputValue) && inputValue.trim() !== '';
                    break;
                case 'boolean':
                    isValid = (inputValue.toLowerCase() === 'true' || inputValue.toLowerCase() === 'false');
                    break;
                case 'object':
                    try {
                        isValid = typeof JSON.parse(inputValue) === 'object';
                    } catch (e) {
                        isValid = false;
                    }
                    break;
                case 'array':
                    try {
                        isValid = Array.isArray(JSON.parse(inputValue));
                    } catch (e) {
                        isValid = false;
                    }
                    break;
                case 'function':
                    isValid = inputValue.includes('function');
                    break;
                default:
                    alert('Please select a type to check.');
                    return;
            }

            document.getElementById('output').innerText = isValid 
                ? `The value "${inputValue}" is a valid ${selectedType}.`
                : `The value "${inputValue}" is NOT a valid ${selectedType}.`;
        });
    </script>
</body>
</html>
