<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integration Testing Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #result { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Integration Testing Demo</h1>
    
    <h2>User Registration Form</h2>
    <form id="registrationForm">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br>
        <button type="submit">Register</button>
    </form>
    
    <h2>Registered Users</h2>
    <ul id="userList"></ul>
    
    <div id="result"></div>

    <script>
        // Simulate a backend user registration service
        const userService = {
            users: [],
            registerUser: function(username, email) {
                const user = { username, email };
                this.users.push(user);
                return user;
            },
            getAllUsers: function() {
                return this.users;
            }
        };

        // Integration Function to handle form submission
        function handleFormSubmit(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;

            const newUser = userService.registerUser(username, email);
            updateUserList();
            displayResult(`User Registered: ${newUser.username} (${newUser.email})`);
            document.getElementById('registrationForm').reset();
        }

        function updateUserList() {
            const userList = document.getElementById('userList');
            userList.innerHTML = '';
            userService.getAllUsers().forEach(user => {
                const listItem = document.createElement('li');
                listItem.textContent = `${user.username} (${user.email})`;
                userList.appendChild(listItem);
            });
        }

        function displayResult(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = message;
        }

        document.getElementById('registrationForm').addEventListener('submit', handleFormSubmit);
    </script>
</body>
</html>
