<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stack Data Structure Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f7fa;
    color: #333;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    color: #2c3e50;
  }
  #stack-container {
    margin-top: 20px;
    width: 200px;
    min-height: 300px;
    border: 2px solid #3498db;
    border-radius: 6px;
    background: #ecf0f1;
    position: relative;
  }
  .stack-element {
    width: 180px;
    height: 40px;
    background: #2980b9;
    margin: 6px auto;
    border-radius: 4px;
    color: white;
    font-weight: bold;
    line-height: 40px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.15);
    transition: transform 0.3s ease;
  }
  .stack-element.top {
    background: #27ae60;
    box-shadow: 0 0 10px #27ae60;
  }
  .controls {
    margin-top: 30px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  input[type="text"] {
    padding: 8px;
    font-size: 1rem;
    border: 2px solid #3498db;
    border-radius: 4px;
    width: 140px;
  }
  button {
    padding: 8px 16px;
    font-size: 1rem;
    background: #3498db;
    border: none;
    border-radius: 4px;
    color: white;
    cursor: pointer;
    transition: background 0.25s ease;
  }
  button:hover:not(:disabled) {
    background: #2980b9;
  }
  button:disabled {
    background: #95a5a6;
    cursor: not-allowed;
  }
  #message {
    margin-top: 20px;
    min-height: 24px;
    font-size: 1rem;
    font-weight: 600;
    color: #c0392b;
  }
  #description {
    max-width: 600px;
    margin-bottom: 25px;
    line-height: 1.5;
    text-align: center;
  }
</style>
</head>
<body>

<h1>Stack Data Structure Demo</h1>
<div id="description">
  A <strong>Stack</strong> is a linear data structure which follows the <em>Last In, First Out (LIFO)</em> principle.
  You can <em>push</em> (add) elements onto the stack, <em>pop</em> (remove) elements from the top, and <em>peek</em> to see the top element without removing it.
</div>

<div id="stack-container" aria-label="Stack visualization" role="region">
  <!-- Stack elements will appear here -->
</div>

<div class="controls">
  <input type="text" id="inputValue" placeholder="Enter value" aria-label="Value to push" />
  <button id="pushBtn">Push</button>
  <button id="popBtn">Pop</button>
  <button id="peekBtn">Peek</button>
  <button id="clearBtn">Clear</button>
</div>

<div id="message" aria-live="polite" role="status"></div>

<script>
  class Stack {
    constructor() {
      this.items = [];
    }
    push(element) {
      this.items.push(element);
    }
    pop() {
      if(this.isEmpty()) {
        return null;
      }
      return this.items.pop();
    }
    peek() {
      if(this.isEmpty()) {
        return null;
      }
      return this.items[this.items.length - 1];
    }
    isEmpty() {
      return this.items.length === 0;
    }
    clear() {
      this.items = [];
    }
    size() {
      return this.items.length;
    }
    getElements() {
      return this.items.slice(); // return copy
    }
  }

  const stack = new Stack();

  const stackContainer = document.getElementById("stack-container");
  const inputValue = document.getElementById("inputValue");
  const pushBtn = document.getElementById("pushBtn");
  const popBtn = document.getElementById("popBtn");
  const peekBtn = document.getElementById("peekBtn");
  const clearBtn = document.getElementById("clearBtn");
  const message = document.getElementById("message");

  function renderStack() {
    stackContainer.innerHTML = "";
    const elements = stack.getElements();
    // We'll display bottom element at bottom, top at top visually
    // So reverse iterate to stack top at top:
    for(let i = elements.length -1; i >= 0; i--) {
      const elDiv = document.createElement("div");
      elDiv.className = "stack-element";
      if(i === elements.length - 1) {
        elDiv.classList.add("top");
      }
      elDiv.textContent = elements[i];
      stackContainer.appendChild(elDiv);
    }
    popBtn.disabled = stack.isEmpty();
    peekBtn.disabled = stack.isEmpty();
    clearBtn.disabled = stack.isEmpty();
  }

  function showMessage(msg, isError = false) {
    message.textContent = msg;
    message.style.color = isError ? "#c0392b" : "#27ae60";
  }

  pushBtn.addEventListener("click", () => {
    const val = inputValue.value.trim();
    if(val === "") {
      showMessage("Please enter a value to push.", true);
      return;
    }
    stack.push(val);
    renderStack();
    showMessage(`Pushed "${val}" onto the stack.`);
    inputValue.value = "";
    inputValue.focus();
  });

  popBtn.addEventListener("click", () => {
    const popped = stack.pop();
    if(popped === null) {
      showMessage("Stack is empty. Cannot pop.", true);
      return;
    }
    renderStack();
    showMessage(`Popped "${popped}" from the stack.`);
  });

  peekBtn.addEventListener("click", () => {
    const top = stack.peek();
    if(top === null) {
      showMessage("Stack is empty. Nothing to peek.", true);
      return;
    }
    showMessage(`Top element is "${top}".`);
  });

  clearBtn.addEventListener("click", () => {
    stack.clear();
    renderStack();
    showMessage("Stack cleared.");
  });

  inputValue.addEventListener("keydown", (event) => {
    if(event.key === "Enter") {
      pushBtn.click();
    }
  });

  // Initial render
  renderStack();
  showMessage("Stack is empty. Add elements by pushing values.");
</script>

</body>
</html>
