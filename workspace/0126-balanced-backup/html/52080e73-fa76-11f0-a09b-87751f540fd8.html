<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deque</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #deque {
            width: 300px;
            height: 200px;
            border: 1px solid #ccc;
            padding: 20px;
            margin: 40px auto;
        }
    </style>
</head>
<body>
    <h1>Deque Example</h1>
    <div id="deque"></div>

    <script>
        let deque = new Array(10).fill(null);

        function pushFront(element) {
            deque.unshift(element);
        }

        function pushBack(element) {
            deque.push(element);
        }

        function popFront() {
            if (deque.length > 0) {
                return deque.shift();
            } else {
                return null;
            }
        }

        function popBack() {
            if (deque.length > 0) {
                return deque.pop();
            } else {
                return null;
            }
        }

        function peekFront() {
            if (deque.length > 0) {
                return deque[0];
            } else {
                return null;
            }
        }

        function peekBack() {
            if (deque.length > 0) {
                return deque[deque.length - 1];
            } else {
                return null;
            }
        }

        console.log("Push Front: ", pushFront(1));
        console.log("Push Back: ", pushBack(2));
        console.log("Push Front: ", pushFront(3));
        console.log("Push Back: ", pushBack(4));

        console.log("Pop Front: ", popFront());
        console.log("Pop Front: ", popFront());
        console.log("Pop Back: ", popBack());
        console.log("Pop Back: ", popBack());

        console.log("Peek Front: ", peekFront());
        console.log("Peek Back: ", peekBack());
    </script>
</body>
</html>
