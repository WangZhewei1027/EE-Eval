<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Git Concept Demonstration</title>
<style>
  body {
    font-family: Arial, sans-serif;
    line-height: 1.5;
    margin: 20px;
    background: #f4f4f4;
  }
  h1 {
    text-align: center;
    color: #333;
  }
  #repo {
    background: #fff;
    border: 1px solid #ccc;
    padding: 15px;
    max-width: 750px;
    margin: 20px auto;
    border-radius: 5px;
  }
  #log {
    background: #222;
    color: #0f0;
    font-family: monospace;
    padding: 10px;
    height: 120px;
    overflow-y: auto;
    border-radius: 5px;
    margin-bottom: 15px;
  }
  #status {
    background: #eee;
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 15px;
    min-height: 70px;
  }
  button {
    margin: 3px;
    padding: 8px 12px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 3px;
    cursor: pointer;
    font-size: 14px;
  }
  button:disabled {
    background: #aaa;
    cursor: not-allowed;
  }
  .file-list {
    margin-top: 10px;
    margin-bottom: 10px;
  }
  label {
    margin-right: 10px;
  }
  input[type=text] {
    padding: 5px;
    font-size: 14px;
    width: 200px;
  }
  .branch-badge {
    background: #007bff;
    color: white;
    padding: 2px 6px;
    font-size: 12px;
    border-radius: 3px;
    margin-left: 5px;
  }
  .commit-hash {
    font-family: monospace;
    color: #555;
  }
</style>
</head>
<body>
<h1>Git Concept Demonstration</h1>
<div id="repo">
  <div>
    <strong>Current branch:</strong> <span id="current-branch"></span>
    <button id="btn-create-branch" title="Create a new branch">New Branch</button>
  </div>
  <div class="file-list">
    <strong>Repository Files:</strong>
    <ul id="files-list"></ul>
  </div>
  <div>
    <input type="text" id="file-name" placeholder="Filename (e.g. index.html)" />
    <button id="btn-add-file">Add / Modify File</button>
  </div>
  <div>
    <textarea id="file-content" rows="4" cols="60" placeholder="File content..."></textarea>
  </div>
  <div style="margin-top:10px;">
    <button id="btn-stage">Stage File</button>
    <button id="btn-commit">Commit</button>
    <input type="text" id="commit-msg" placeholder="Commit message" size="30" />
    <button id="btn-log">Show Log</button>
  </div>
  <div id="status"><em>Status will appear here</em></div>
  <div id="log"></div>
</div>

<script>
// Simulate a simple Git repository model

class Commit {
  constructor(hash, message, filesSnapshot, parent=null) {
    this.hash = hash;
    this.message = message;
    this.files = JSON.parse(JSON.stringify(filesSnapshot)); // deep copy files state
    this.parent = parent; // parent commit hash or null
  }
}

class Repository {
  constructor() {
    this.branches = {
      master: null // master branch points to latest commit (commit hash)
    };
    this.currentBranch = 'master';
    this.commits = {}; // hash -> Commit
    this.workingFiles = {}; // filename -> content (working directory files)
    this.stagingArea = {}; // staged files (filename -> content)
    this.commitCount = 0;
  }
  getHeadCommit() {
    const headHash = this.branches[this.currentBranch];
    return headHash ? this.commits[headHash] : null;
  }
  addOrModifyFile(filename, content) {
    this.workingFiles[filename] = content;
  }
  stageFile(filename) {
    if (!(filename in this.workingFiles)) {
      throw new Error(`File "${filename}" does not exist in working directory.`);
    }
    this.stagingArea[filename] = this.workingFiles[filename];
  }
  commit(message) {
    if (Object.keys(this.stagingArea).length === 0) {
      throw new Error('Nothing to commit. Staging area is empty.');
    }
    const parentCommit = this.getHeadCommit();
    // Start from parent commit's files snapshot or empty if no parent
    const parentFiles = parentCommit ? parentCommit.files : {};
    // Create new files snapshot by applying staged changes
    const newFilesSnapshot = {...parentFiles};
    for (let file in this.stagingArea) {
      newFilesSnapshot[file] = this.stagingArea[file];
    }
    // Generate a new commit hash (simple increment + timestamp)
    const newHash = `C${++this.commitCount}-${Date.now().toString(36)}`;
    const commit = new Commit(newHash, message, newFilesSnapshot, parentCommit ? parentCommit.hash : null);
    this.commits[newHash] = commit;
    this.branches[this.currentBranch] = newHash;
    this.stagingArea = {};
  }
  getStatus() {
    let statusText = '';
    // List files changed compared to last commit
    const head = this.getHeadCommit();
    const lastCommitFiles = head ? head.files : {};
    const changes = [];
    const added = [];
    const modified = [];
    const deleted = [];

    // In working directory:
    // - if file not in lastCommitFiles => added
    // - if file in lastCommitFiles but content differs => modified
    // - if file removed from workingFiles but in lastCommitFiles => deleted

    // Check added and modified
    for (let file in this.workingFiles) {
      if (!(file in lastCommitFiles)) {
        added.push(file);
      } else if (this.workingFiles[file] !== lastCommitFiles[file]) {
        modified.push(file);
      }
    }
    // Check deleted
    for (let file in lastCommitFiles) {
      if (!(file in this.workingFiles)) {
        deleted.push(file);
      }
    }

    if (added.length + modified.length + deleted.length === 0) {
      statusText = 'Working directory clean. No changes.';
    } else {
      if (added.length > 0) statusText += `Added files: ${added.join(', ')}\n`;
      if (modified.length > 0) statusText += `Modified files: ${modified.join(', ')}\n`;
      if (deleted.length > 0) statusText += `Deleted files: ${deleted.join(', ')}\n`;
    }

    // Show staged files
    const stagedFiles = Object.keys(this.stagingArea);
    if (stagedFiles.length > 0) {
      statusText += `\nStaged files: ${stagedFiles.join(', ')}`;
    } else {
      statusText += `\nNo files staged.`;
    }
    return statusText.trim();
  }
  createBranch(name) {
    if (this.branches[name]) {
      throw new Error(`Branch "${name}" already exists.`);
    }
    // New branch points to current commit
    this.branches[name] = this.branches[this.currentBranch];
  }
  checkoutBranch(name) {
    if (!this.branches[name]) {
      throw new Error(`Branch "${name}" does not exist.`);
    }
    if (this.currentBranch === name) {
      // Already on branch
      return;
    }
    this.currentBranch = name;
    // Update workingFiles to last commit of that branch or empty
    const commit = this.getHeadCommit();
    this.workingFiles = commit ? JSON.parse(JSON.stringify(commit.files)) : {};
    this.stagingArea = {};
  }
  getLog() {
    let logs = [];
    let commit = this.getHeadCommit();
    while (commit) {
      logs.push(`commit ${commit.hash}\n    ${commit.message}`);
      commit = commit.parent ? this.commits[commit.parent] : null;
    }
    return logs.length > 0 ? logs.join('\n\n') : 'No commits yet.';
  }
  listFiles() {
    // Return list of files currently in working directory
    return Object.keys(this.workingFiles).sort();
  }
}

const repo = new Repository();

// UI Elements
const currentBranchSpan = document.getElementById('current-branch');
const filesListUl = document.getElementById('files-list');
const statusDiv = document.getElementById('status');
const logDiv = document.getElementById('log');

const fileNameInput = document.getElementById('file-name');
const fileContentTextarea = document.getElementById('file-content');
const commitMsgInput = document.getElementById('commit-msg');

const btnAddFile = document.getElementById('btn-add-file');
const btnStage = document.getElementById('btn-stage');
const btnCommit = document.getElementById('btn-commit');
const btnLog = document.getElementById('btn-log');
const btnCreateBranch = document.getElementById('btn-create-branch');

const renderStatus = () => {
  statusDiv.textContent = repo.getStatus();
};

const renderCurrentBranch = () => {
  currentBranchSpan.textContent = repo.currentBranch;
};

const renderFiles = () => {
  const files = repo.listFiles();
  filesListUl.innerHTML = '';
  if (files.length === 0) {
    filesListUl.innerHTML = '<em>No files in working directory.</em>';
    return;
  }
  files.forEach(f => {
    const li = document.createElement('li');
    li.textContent = f;
    filesListUl.appendChild(li);
  });
};

const showAlert = (msg) => {
  alert(msg);
};

btnAddFile.addEventListener('click', () => {
  const name = fileNameInput.value.trim();
  const content = fileContentTextarea.value;
  if (!name) {
    showAlert('Please enter a filename.');
    return;
  }
  repo.addOrModifyFile(name, content);
  renderFiles();
  renderStatus();
  showAlert(`File "${name}" added/modified in working directory.`);
});

btnStage.addEventListener('click', () => {
  const name = fileNameInput.value.trim();
  if (!name) {
    showAlert('Please enter a filename to stage.');
    return;
  }
  try {
    repo.stageFile(name);
  } catch(e) {
    showAlert(e.message);
    return;
  }
  renderStatus();
  showAlert(`File "${name}" staged.`);
});

btnCommit.addEventListener('click', () => {
  const msg = commitMsgInput.value.trim();
  if (!msg) {
    showAlert('Please enter a commit message.');
    return;
  }
  try {
    repo.commit(msg);
  } catch(e) {
    showAlert(e.message);
    return;
  }
  commitMsgInput.value = '';
  renderStatus();
  renderFiles();
  showAlert(`Commit successful on branch "${repo.currentBranch}".`);
});

btnLog.addEventListener('click', () => {
  logDiv.textContent = repo.getLog();
});

btnCreateBranch.addEventListener('click', () => {
  const branch = prompt('Enter new branch name:');
  if (branch) {
    try {
      repo.createBranch(branch.trim());
      showAlert(`Branch "${branch.trim()}" created.`);
      // After branch creation, optionally checkout it
      const checkoutNow = confirm(`Checkout branch "${branch.trim()}" now?`);
      if (checkoutNow) {
        repo.checkoutBranch(branch.trim());
        renderCurrentBranch();
        renderFiles();
        renderStatus();
      }
    } catch(e) {
      showAlert(e.message);
    }
  }
});

currentBranchSpan.addEventListener('click', () => {
  const branches = Object.keys(repo.branches);
  let promptMsg = 'Available branches:\n';
  branches.forEach(b => {
    promptMsg += b + (b===repo.currentBranch ? ' (current)' : '') + '\n';
  });
  promptMsg += '\nEnter branch name to checkout:';
  const choice = prompt(promptMsg);
  if (choice && choice.trim() !== '' && repo.branches[choice.trim()]) {
    repo.checkoutBranch(choice.trim());
    renderCurrentBranch();
    renderFiles();
    renderStatus();
    showAlert(`Checked out branch "${choice.trim()}".`);
  } else if(choice !== null) {
    showAlert('Branch does not exist.');
  }
});

// Initial render
renderCurrentBranch();
renderFiles();
renderStatus();
</script>
</body>
</html>
