<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suffix Tree Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #tree {
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            white-space: nowrap;
        }
        .node {
            margin-left: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>Suffix Tree Visualization</h1>
    <label for="inputString">Enter a string:</label>
    <input type="text" id="inputString" value="ban">
    <button onclick="buildSuffixTree()">Build Suffix Tree</button>

    <div id="tree"></div>

    <script>
        class SuffixTreeNode {
            constructor() {
                this.children = {};
            }
        }

        class SuffixTree {
            constructor(text) {
                this.text = text;
                this.root = new SuffixTreeNode();
                this.buildTree();
            }

            buildTree() {
                const n = this.text.length;
                for (let i = 0; i < n; i++) {
                    this.addSuffix(i);
                }
            }

            addSuffix(index) {
                let currentNode = this.root;
                for (let i = index; i < this.text.length; i++) {
                    const char = this.text[i];
                    if (!currentNode.children[char]) {
                        currentNode.children[char] = new SuffixTreeNode();
                    }
                    currentNode = currentNode.children[char];
                }
            }

            visualize() {
                const container = document.getElementById('tree');
                container.innerHTML = '';
                this.recursiveVisualize(container, this.root, '');
            }

            recursiveVisualize(container, node, path) {
                for (const char in node.children) {
                    const newPath = path + char;
                    const newNode = document.createElement('div');
                    newNode.className = 'node';
                    newNode.textContent = newPath;
                    container.appendChild(newNode);
                    this.recursiveVisualize(container, node.children[char], newPath);
                }
            }
        }

        function buildSuffixTree() {
            const inputString = document.getElementById('inputString').value;
            const suffixTree = new SuffixTree(inputString);
            suffixTree.visualize();
        }
    </script>
</body>
</html>
