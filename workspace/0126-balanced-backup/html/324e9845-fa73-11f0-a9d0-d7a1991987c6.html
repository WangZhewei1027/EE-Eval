<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduling Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        #simulation {
            border: 1px solid #ccc;
            padding: 10px;
            background: white;
        }
        #processTable {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        #processTable th, #processTable td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        #processTable th {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

<h1>CPU Scheduling Simulation</h1>
<p>Select a scheduling algorithm:</p>
<select id="schedulingAlgorithm">
    <option value="fcfs">First-Come, First-Served (FCFS)</option>
    <option value="sjf">Shortest Job First (SJF)</option>
    <option value="rr">Round Robin (RR)</option>
</select>
<button onclick="runScheduling()">Run Scheduling</button>

<div id="simulation" style="display: none;">
    <h2>Process Execution Order</h2>
    <table id="processTable">
        <thead>
            <tr>
                <th>Process</th>
                <th>Burst Time</th>
                <th>Completion Time</th>
            </tr>
        </thead>
        <tbody id="processBody">
        </tbody>
    </table>
</div>

<script>
    const processes = [
        { id: "P1", burstTime: 5 },
        { id: "P2", burstTime: 2 },
        { id: "P3", burstTime: 8 },
        { id: "P4", burstTime: 3 },
        { id: "P5", burstTime: 6 },
    ];

    function runScheduling() {
        const algorithm = document.getElementById('schedulingAlgorithm').value;
        let result;

        switch (algorithm) {
            case 'fcfs':
                result = firstComeFirstServe(processes);
                break;
            case 'sjf':
                result = shortestJobFirst([...processes]);
                break;
            case 'rr':
                result = roundRobin(processes, 3);
                break;
        }

        displayResults(result);
    }

    function firstComeFirstServe(processes) {
        let time = 0;
        return processes.map(proc => {
            time += proc.burstTime;
            return { ...proc, completionTime: time };
        });
    }

    function shortestJobFirst(processes) {
        let time = 0;
        processes.sort((a, b) => a.burstTime - b.burstTime);
        return processes.map(proc => {
            time += proc.burstTime;
            return { ...proc, completionTime: time };
        });
    }

    function roundRobin(processes, quantum) {
        let time = 0;
        const queue = [...processes];
        const completionTimes = [];
        while (queue.length > 0) {
            const currentProc = queue.shift();
            if (currentProc.burstTime > quantum) {
                time += quantum;
                currentProc.burstTime -= quantum;
                queue.push(currentProc);
            } else {
                time += currentProc.burstTime;
                completionTimes.push({ ...currentProc, completionTime: time });
                currentProc.burstTime = 0;
            }
        }
        return completionTimes;
    }

    function displayResults(processes) {
        const processBody = document.getElementById('processBody');
        processBody.innerHTML = '';
        processes.forEach(proc => {
            const row = `<tr>
                <td>${proc.id}</td>
                <td>${proc.burstTime}</td>
                <td>${proc.completionTime}</td>
            </tr>`;
            processBody.insertAdjacentHTML('beforeend', row);
        });
        document.getElementById('simulation').style.display = 'block';
    }
</script>

</body>
</html>
