<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Load Balancing Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 1em;
    background: #f9f9f9;
    color: #333;
  }
  h1 {
    text-align: center;
  }
  .server-container {
    display: flex;
    justify-content: center;
    gap: 2em;
    margin: 1em 0;
  }
  .server {
    background: #fff;
    border: 2px solid #888;
    padding: 1em;
    border-radius: 8px;
    width: 180px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }
  .server h2 {
    margin-top: 0;
    text-align: center;
  }
  .load {
    background: #eee;
    padding: 0.5em;
    margin-top: 1em;
    border-radius: 4px;
  }
  .requests-log {
    max-height: 150px;
    overflow-y: auto;
    background: #fff;
    border: 1px solid #ccc;
    margin-top: 1em;
    padding: 0.5em;
    font-size: 0.9em;
    font-family: monospace;
    white-space: pre-wrap;
  }
  button {
    display: block;
    margin: 1em auto;
    font-size: 1.2em;
    padding: 0.5em 1.2em;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: #007bff;
    color: white;
    transition: background 0.3s ease;
  }
  button:hover:enabled {
    background: #0056b3;
  }
  button:disabled {
    background: #999;
    cursor: not-allowed;
  }
  .info {
    max-width: 600px;
    margin: 0 auto 2em;
    line-height: 1.5;
    font-size: 1.1em;
    text-align: center;
  }
</style>
</head>
<body>
  <h1>Load Balancing Demonstration</h1>
  <div class="info">
    <p>
      This demo simulates a <b>Load Balancer</b> distributing incoming requests across multiple backend servers.
      Click "Send Request" multiple times to see how requests get assigned to different servers using the
      <i>Round Robin</i> algorithm.
    </p>
  </div>

  <div class="server-container" id="servers">
    <!-- Servers will be dynamically created -->
  </div>

  <button id="sendRequestBtn">Send Request</button>

  <div class="requests-log" id="requestsLog" aria-live="polite" aria-atomic="true" role="log">
    <strong>Request Log:</strong>
  </div>

<script>
(() => {
  // Number of backend servers
  const SERVER_COUNT = 3;

  // Server representation
  class Server {
    constructor(id) {
      this.id = id;
      this.load = 0; // Number of current active requests
      this.element = null;
      this.requestsHandled = 0;
    }

    createElement() {
      const container = document.createElement('div');
      container.classList.add('server');

      const title = document.createElement('h2');
      title.textContent = `Server ${this.id + 1}`;
      container.appendChild(title);

      this.loadEl = document.createElement('div');
      this.loadEl.classList.add('load');
      this.updateLoadDisplay();
      container.appendChild(this.loadEl);

      this.element = container;
      return container;
    }

    updateLoadDisplay() {
      this.loadEl.textContent = `Active Requests: ${this.load}`;
    }

    assignRequest(requestId, onComplete) {
      this.load++;
      this.requestsHandled++;
      this.updateLoadDisplay();

      // Simulate request processing time between 1s and 3s
      const processingTime = 1000 + Math.random() * 2000;

      // Notify assignment
      logMessage(`Request #${requestId} assigned to Server ${this.id + 1} (processing ~${(processingTime / 1000).toFixed(2)}s)`);

      // Simulate async work
      setTimeout(() => {
        this.load--;
        this.updateLoadDisplay();
        logMessage(`Request #${requestId} completed on Server ${this.id + 1}`);
        if (onComplete) onComplete();
      }, processingTime);
    }
  }

  // LoadBalancer implementing Round Robin
  class LoadBalancer {
    constructor(servers) {
      this.servers = servers;
      this.nextServerIndex = 0;
    }

    assignRequest(requestId) {
      // Assign the request to the next server in the list and update index (Round Robin)
      const server = this.servers[this.nextServerIndex];
      this.nextServerIndex = (this.nextServerIndex + 1) % this.servers.length;
      server.assignRequest(requestId);
    }
  }

  // UI Elements
  const serversContainer = document.getElementById('servers');
  const sendRequestBtn = document.getElementById('sendRequestBtn');
  const requestsLog = document.getElementById('requestsLog');

  // Instantiate servers
  const servers = [];
  for (let i = 0; i < SERVER_COUNT; i++) {
    const srv = new Server(i);
    servers.push(srv);
    serversContainer.appendChild(srv.createElement());
  }

  // Instantiate load balancer
  const loadBalancer = new LoadBalancer(servers);

  // Request counter
  let requestCounter = 0;

  // Log function
  function logMessage(msg) {
    const time = new Date().toLocaleTimeString();
    requestsLog.textContent += `\n[${time}] ${msg}`;
    requestsLog.scrollTop = requestsLog.scrollHeight;
  }

  // Button click handler: send request
  sendRequestBtn.addEventListener('click', () => {
    requestCounter++;
    loadBalancer.assignRequest(requestCounter);
  });

})();
</script>
</body>
</html>
