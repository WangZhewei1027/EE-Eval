<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exponential Search Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f4f4f4;
            border-radius: 8px;
        }
        input[type="number"], input[type="text"], button {
            padding: 10px;
            margin: 10px 0;
        }
        .output {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Exponential Search Demonstration</h1>
    <p>Enter a sorted array and a target value to search for:</p>
    <input type="text" id="arrayInput" placeholder="Enter sorted array (comma-separated)">
    <input type="number" id="targetInput" placeholder="Enter target value">
    <button onclick="performExponentialSearch()">Search</button>

    <div class="output" id="result"></div>

    <script>
        function exponentialSearch(arr, x) {
            if (arr[0] === x) {
                return 0;
            }

            let i = 1;
            while (i < arr.length && arr[i] <= x) {
                i *= 2;
            }

            return binarySearch(arr, Math.floor(i / 2), Math.min(i, arr.length - 1), x);
        }

        function binarySearch(arr, left, right, x) {
            while (left <= right) {
                let mid = Math.floor((left + right) / 2);
                if (arr[mid] === x) {
                    return mid;
                }
                if (arr[mid] < x) {
                    left = mid + 1;
                } else {
                    right = mid - 1;
                }
            }
            return -1;
        }

        function performExponentialSearch() {
            const arrayInput = document.getElementById('arrayInput').value.split(',').map(num => parseInt(num.trim()));
            const targetInput = parseInt(document.getElementById('targetInput').value);
            const resultElement = document.getElementById('result');

            if (arrayInput.length === 0 || isNaN(targetInput)) {
                resultElement.innerHTML = "Please enter a valid sorted array and target value.";
                return;
            }

            const index = exponentialSearch(arrayInput, targetInput);
            if (index === -1) {
                resultElement.innerHTML = "Target value " + targetInput + " not found in the array.";
            } else {
                resultElement.innerHTML = "Target value " + targetInput + " found at index: " + index;
            }
        }
    </script>
</body>
</html>
