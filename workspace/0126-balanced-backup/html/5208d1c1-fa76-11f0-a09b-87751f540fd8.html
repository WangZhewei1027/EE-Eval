<!DOCTYPE html>
<html>
<head>
    <title>Merge Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Merge Sort</h1>
    <button id="merge-sort-btn">Merge Sort</button>
    <div id="merge-sort-output"></div>

    <script>
        function mergeSort(arr) {
            if (arr.length <= 1) {
                return arr;
            }

            const mid = Math.floor(arr.length / 2);
            const left = mergeSort(arr.slice(0, mid));
            const right = mergeSort(arr.slice(mid));

            return merge(left, right);
        }

        function merge(left, right) {
            const merged = [];
            let leftIndex = 0;
            let rightIndex = 0;

            while (leftIndex < left.length && rightIndex < right.length) {
                if (left[leftIndex] <= right[rightIndex]) {
                    merged.push(left[leftIndex]);
                    leftIndex++;
                } else {
                    merged.push(right[rightIndex]);
                    rightIndex++;
                }
            }

            merged.push(...left.slice(leftIndex));
            merged.push(...right.slice(rightIndex));

            return merged;
        }

        const arr = [64, 34, 25, 12, 22, 11, 90];
        const sortedArr = mergeSort(arr);
        const output = document.getElementById('merge-sort-output');
        output.innerHTML = 'Sorted array: ' + sortedArr.join(', ');

        // Merge Sort Button Click Event
        document.getElementById('merge-sort-btn').addEventListener('click', () => {
            arr = [64, 34, 25, 12, 22, 11, 90];
            const sortedArr = mergeSort(arr);
            const output = document.getElementById('merge-sort-output');
            output.innerHTML = 'Sorted array: ' + sortedArr.join(', ');
        });
    </script>
</body>
</html>
