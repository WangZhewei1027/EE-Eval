<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A* Search Algorithm Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            padding: 20px;
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(10, 40px);
            grid-template-rows: repeat(10, 40px);
            gap: 1px;
            margin: auto;
        }
        .cell {
            width: 40px;
            height: 40px;
            background-color: white;
            border: 1px solid #ccc;
        }
        .start {
            background-color: green;
        }
        .goal {
            background-color: red;
        }
        .path {
            background-color: blue;
        }
        .visited {
            background-color: yellow;
        }
    </style>
</head>
<body>

<h1>A* Search Algorithm Visualization</h1>
<div id="grid"></div>
<button id="startBtn">Start A* Search</button>
<script>
    const grid = document.getElementById('grid');
    const rows = 10;
    const cols = 10;
    let start, goal;
    const gridArray = [];

    // Initialize the grid and the start/goal points
    function initializeGrid() {
        for (let i = 0; i < rows; i++) {
            const row = [];
            for (let j = 0; j < cols; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.row = i;
                cell.dataset.col = j;
                cell.onclick = () => setCellData(cell);
                grid.appendChild(cell);
                row.push(cell);
            }
            gridArray.push(row);
        }
        // Set start and goal positions
        start = gridArray[0][0];
        start.classList.add('start');
        goal = gridArray[9][9];
        goal.classList.add('goal');
    }

    function setCellData(cell) {
        if (cell === start || cell === goal) return;
        if (cell.classList.contains('wall')) {
            cell.classList.remove('wall');
        } else {
            cell.classList.add('wall');
        }
    }

    // A* Search algorithm
    function aStarSearch() {
        const openSet = [];
        const closedSet = new Set();
        const gScore = Array.from({ length: rows }, () => Array(cols).fill(Infinity));
        const fScore = Array.from({ length: rows }, () => Array(cols).fill(Infinity));
        
        const startRow = parseInt(start.dataset.row);
        const startCol = parseInt(start.dataset.col);
        gScore[startRow][startCol] = 0;
        fScore[startRow][startCol] = heuristic(startRow, startCol, 9, 9);
        openSet.push({ cell: start, f: fScore[startRow][startCol] });

        while (openSet.length > 0) {
            openSet.sort((a, b) => a.f - b.f);
            const current = openSet.shift();
            closedSet.add(current.cell);

            if (current.cell === goal) {
                reconstructPath(current.cell);
                return;
            }

            const neighbors = getNeighbors(current.cell);
            for (const neighbor of neighbors) {
                if (closedSet.has(neighbor) || neighbor.classList.contains('wall')) {
                    continue;
                }
                const tentativeGScore = gScore[parseInt(current.cell.dataset.row)][parseInt(current.cell.dataset.col)] + 1;

                if (!openSet.some(item => item.cell === neighbor)) {
                    openSet.push({ cell: neighbor });
                } else if (tentativeGScore >= gScore[parseInt(neighbor.dataset.row)][parseInt(neighbor.dataset.col)]) {
                    continue;
                }

                gScore[parseInt(neighbor.dataset.row)][parseInt(neighbor.dataset.col)] = tentativeGScore;
                fScore[parseInt(neighbor.dataset.row)][parseInt(neighbor.dataset.col)] = tentativeGScore + heuristic(parseInt(neighbor.dataset.row), parseInt(neighbor.dataset.col), 9, 9);
                neighbor.classList.add('visited');
            }
        }
        alert('No path found!');
    }

    function heuristic(row, col, goalRow, goalCol) {
        return Math.abs(row - goalRow) + Math.abs(col - goalCol);
    }

    function getNeighbors(cell) {
        const row = parseInt(cell.dataset.row);
        const col = parseInt(cell.dataset.col);
        const neighbors = [];

        const directions = [
            { r: -1, c: 0 }, { r: 1, c: 0 },
            { r: 0, c: -1 }, { r: 0, c: 1 }
        ];

        directions.forEach(dir => {
            const newRow = row + dir.r;
            const newCol = col + dir.c;
            if (newRow >= 0 && newRow < rows && newCol >= 0 && newCol < cols) {
                neighbors.push(gridArray[newRow][newCol]);
            }
        });

        return neighbors;
    }

    function reconstructPath(cell) {
        let current = cell;
        while (current && current !== start) {
            if (!current.classList.contains('start') && !current.classList.contains('goal')) {
                current.classList.add('path');
            }
            // Logic to track back to the previous cell can be implemented here
            current = null;  // Placeholder, this needs to be set to the previous cell correctly
        }
    }

    document.getElementById('startBtn').addEventListener('click', aStarSearch);
    initializeGrid();
</script>

</body>
</html>
