<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Patterns Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        h2 {
            color: #333;
        }
        .pattern {
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 20px;
            background-color: #fff;
        }
    </style>
</head>
<body>
    <h1>Design Patterns in JavaScript</h1>
    
    <div class="pattern">
        <h2>Singleton Pattern</h2>
        <p>This pattern restricts the instantiation of a class to one single instance.</p>
        <button id="singletonButton">Get Singleton Instance</button>
        <pre id="singletonResult"></pre>
    </div>

    <div class="pattern">
        <h2>Factory Pattern</h2>
        <p>This pattern creates objects without having to specify the exact class of the object being created.</p>
        <button id="factoryButton">Create Animal</button>
        <pre id="factoryResult"></pre>
    </div>
    
    <script>
        // Singleton Pattern Implementation
        const Singleton = (function () {
            let instance;

            function createInstance() {
                const object = new Object("I am the instance");
                return object;
            }

            return {
                getInstance: function () {
                    if (!instance) {
                        instance = createInstance();
                    }
                    return instance;
                }
            };
        })();

        document.getElementById('singletonButton').addEventListener('click', function () {
            const instance1 = Singleton.getInstance();
            const instance2 = Singleton.getInstance();
            
            document.getElementById('singletonResult').textContent = 
                `Instance 1: ${instance1}\nInstance 2: ${instance2}\nSame instance: ${instance1 === instance2}`;
        });

        // Factory Pattern Implementation
        class Dog {
            speak() {
                return "Woof!";
            }
        }

        class Cat {
            speak() {
                return "Meow!";
            }
        }

        class AnimalFactory {
            createAnimal(type) {
                if (type === 'dog') {
                    return new Dog();
                } else if (type === 'cat') {
                    return new Cat();
                }
                return null;
            }
        }

        document.getElementById('factoryButton').addEventListener('click', function () {
            const factory = new AnimalFactory();
            const dog = factory.createAnimal('dog');
            const cat = factory.createAnimal('cat');
            document.getElementById('factoryResult').textContent = 
                `Dog says: ${dog.speak()}\nCat says: ${cat.speak()}`;
        });
    </script>
</body>
</html>
