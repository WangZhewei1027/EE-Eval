<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query Optimization Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .query-container {
            margin-bottom: 20px;
        }
        .result {
            background-color: #fff;
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Query Optimization Demo</h1>
    <p>This is a simple demonstration of how query optimization works.</p>

    <div class="query-container">
        <label for="query">Enter a SQL query:</label>
        <input type="text" id="query" placeholder="SELECT * FROM users WHERE age > 30">
        <button onclick="optimizeQuery()">Optimize Query</button>
    </div>
    
    <div class="result" id="result"></div>

    <script>
        function optimizeQuery() {
            const query = document.getElementById('query').value;
            let optimizedQuery = query;

            // Basic optimization techniques
            if (query.includes("SELECT *")) {
                optimizedQuery = optimizedQuery.replace("SELECT *", "SELECT id, name, email");
            }

            if (query.includes("WHERE")) {
                if (!query.includes("ORDER BY") && !query.includes("LIMIT")) {
                    optimizedQuery += " ORDER BY id LIMIT 10";
                }
            } else {
                optimizedQuery += " WHERE id IS NOT NULL";
            }

            // Display the optimized query
            document.getElementById('result').innerHTML = 
                `<strong>Original Query:</strong> ${query}<br>
                <strong>Optimized Query:</strong> ${optimizedQuery}`;
        }
    </script>
</body>
</html>
