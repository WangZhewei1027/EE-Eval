<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Typing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #input-field {
            width: 50%;
            padding: 10px;
            font-size: 20px;
            border: 1px solid #ccc;
        }
        #result {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Dynamic Typing</h1>
    <input id="input-field" type="text" placeholder="Enter a string">
    <div id="result"></div>
    <script>
        const inputField = document.getElementById('input-field');
        const resultDiv = document.getElementById('result');

        inputField.addEventListener('input', (e) => {
            const inputValue = e.target.value;
            if (inputValue.length < 3) {
                resultDiv.textContent = 'Please enter at least 3 characters';
            } else {
                resultDiv.textContent = 'You entered: ' + inputValue;
            }
        });
    </script>
</body>
</html>
