<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Syntax Tree</title>
    <style>
        body {
            font-family: monospace;
        }
        .tree {
            padding: 10px;
            border: 1px solid black;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .node {
            padding: 10px;
            border: 1px solid black;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .node-name {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Abstract Syntax Tree</h1>
    <div id="tree"></div>

    <script>
        function createNode(name, value) {
            return {
                name,
                value,
                children: []
            };
        }

        function addNode(parent, node) {
            parent.children.push(node);
        }

        function printTree(node, indent = 0) {
            const nodeElement = document.createElement('div');
            nodeElement.classList.add('node');
            nodeElement.innerHTML = `${indent}  ${node.name}: ${node.value}`;

            for (const child of node.children) {
                addNode(nodeElement, child);
            }

            return nodeElement;
        }

        const tree = {
            name: 'root',
            value: 'This is the root of the tree.',
            children: [
                {
                    name: 'child1',
                    value: 'This is the child 1.',
                    children: []
                },
                {
                    name: 'child2',
                    value: 'This is the child 2.',
                    children: []
                }
            ]
        };

        const treeElement = printTree(tree, 0);

        document.getElementById('tree').innerHTML = treeElement.outerHTML;
    </script>
</body>
</html>
