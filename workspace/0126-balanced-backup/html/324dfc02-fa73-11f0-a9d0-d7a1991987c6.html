<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topological Sort Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #343a40;
        }
        #graph {
            margin: 20px 0;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9ecef;
            border: 1px solid #ced4da;
        }
    </style>
</head>
<body>
    <h1>Topological Sort Demonstration</h1>
    <p>Input the edges of the directed graph below (format: start-end, e.g., A-B). Type "done" when you are finished:</p>
    <textarea id="edgesInput" rows="5" style="width: 100%;"></textarea>
    <button id="sortButton">Perform Topological Sort</button>
    
    <div id="result"></div>

    <script>
        document.getElementById('sortButton').addEventListener('click', function() {
            const edgesInput = document.getElementById('edgesInput').value.trim();
            const edges = edgesInput.split('\n').filter(edge => edge.trim() && edge !== 'done');
            const adjacencyList = {};

            // Build the adjacency list
            edges.forEach(edge => {
                const [start, end] = edge.split('-').map(e => e.trim());
                if (!adjacencyList[start]) adjacencyList[start] = [];
                if (!adjacencyList[end]) adjacencyList[end] = [];
                adjacencyList[start].push(end);
            });

            const visited = {};
            const stack = [];

            function topologicalSortUtil(v) {
                visited[v] = true;
                if (adjacencyList[v]) {
                    adjacencyList[v].forEach(neighbor => {
                        if (!visited[neighbor]) {
                            topologicalSortUtil(neighbor);
                        }
                    });
                }
                stack.push(v);
            }

            // Call the topological sort function for each vertex
            Object.keys(adjacencyList).forEach(vertex => {
                if (!visited[vertex]) {
                    topologicalSortUtil(vertex);
                }
            });

            const sortedOrder = stack.reverse().join(' -> ');
            document.getElementById('result').innerText = `Topological Sort Order: ${sortedOrder}`;
        });
    </script>
</body>
</html>
