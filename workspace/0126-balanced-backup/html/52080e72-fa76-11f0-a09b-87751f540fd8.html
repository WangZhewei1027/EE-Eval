<!DOCTYPE html>
<html>
<head>
    <title>Queue</title>
</head>
<body>
    <h1>Queue Example</h1>
    <p id="message"></p>
    <button id="enqueue">Enqueue</button>
    <button id="dequeue">Dequeue</button>
    <button id="peek">Peek</button>
    <button id="clear">Clear</button>

    <script>
        let queue = [];

        function enqueue(item) {
            queue.push(item);
            updateMessage();
        }

        function dequeue() {
            if (queue.length === 0) {
                updateMessage("Queue is empty.");
            } else {
                let item = queue.shift();
                updateMessage(item);
            }
        }

        function peek() {
            if (queue.length === 0) {
                updateMessage("Queue is empty.");
            } else {
                let item = queue[0];
                updateMessage(item);
            }
        }

        function clear() {
            queue = [];
            updateMessage("Queue cleared.");
        }

        function updateMessage(item) {
            document.getElementById("message").innerHTML = item;
        }

        document.getElementById("enqueue").addEventListener("click", enqueue);
        document.getElementById("dequeue").addEventListener("click", dequeue);
        document.getElementById("peek").addEventListener("click", peek);
        document.getElementById("clear").addEventListener("click", clear);
    </script>
</body>
</html>
