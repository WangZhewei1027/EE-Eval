<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #dns {
            width: 50%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #dns h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <h1>DNS Example</h1>
    <div id="dns"></div>
    <script>
        const dns = {
            'www.example.com': '192.0.2.1',
            'www.google.com': '216.58.194.174',
            'www.example.com.': '192.0.2.1'
        };

        function getDomainName(domain) {
            const parts = domain.split('.');
            let name = parts[parts.length - 2] + '.' + parts[parts.length - 1];
            return name;
        }

        function dnsQuery(domain) {
            if (dns[domain]) {
                return dns[domain];
            } else {
                return 'No DNS entry found for ' + domain;
            }
        }

        const dnsInput = document.getElementById('dns');
        dnsInput.value = dnsQuery('www.example.com');

        dnsInput.addEventListener('input', function() {
            dnsInput.value = dnsQuery(dnsInput.value);
        });
    </script>
</body>
</html>
