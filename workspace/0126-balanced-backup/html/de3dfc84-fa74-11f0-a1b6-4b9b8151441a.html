<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Vector Machine (SVM) Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            margin-top: 20px;
            position: relative;
        }
        .point {
            fill-opacity: 0.8;
            stroke: #fff;
            stroke-width: 1.5px;
        }
        .decision-boundary {
            fill: none;
            stroke: #333;
            stroke-width: 2px;
            stroke-dasharray: 5,5;
        }
        .margin {
            fill: none;
            stroke: #999;
            stroke-width: 1px;
            stroke-dasharray: 3,3;
        }
        .support-vector {
            stroke: #000;
            stroke-width: 2px;
        }
        .controls {
            margin: 20px 0;
        }
        button {
            padding: 8px 12px;
            margin: 0 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Support Vector Machine (SVM) Visualization</h1>
    <p>Click to add data points (alternate colors with each click). SVM will find the optimal decision boundary.</p>
    
    <div class="controls">
        <button id="reset-btn">Reset</button>
        <button id="random-btn">Add Random Points</button>
        <div>
            <label>Kernel: </label>
            <select id="kernel-select">
                <option value="linear">Linear</option>
                <option value="rbf">RBF (Gaussian)</option>
            </select>
        </div>
    </div>
    
    <div class="container" id="svm-container"></div>

    <script>
        // Configuration
        const width = 600;
        const height = 400;
        const margin = {top: 20, right: 20, bottom: 20, left: 20};
        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;
        
        // Create SVG
        const svg = d3.select("#svm-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);
        
        // Data storage
        let points = [];
        let currentColor = 0;
        const colors = ["steelblue", "orange"];
        
        // Training data for SVM (scaled to [0,1])
        let trainingData = [];
        
        // Initialize SVM
        let svm = {
            weights: [0, 0],
            bias: 0,
            margin: 0.1,
            kernel: 'linear',
            gamma: 10,
            predict: function(x, y) {
                const scaledX = x / innerWidth;
                const scaledY = y / innerHeight;
                
                if (this.kernel === 'linear') {
                    return this.weights[0] * scaledX + this.weights[1] * scaledY + this.bias;
                } else if (this.kernel === 'rbf') {
                    // RBF kernel - simplified for visualization
                    // In a real SVM, we'd compute kernel between test point and all support vectors
                    // Here we just look at distance to the margin line
                    const distToLine = Math.abs(this.weights[0] * scaledX + this.weights[1] * scaledY + this.bias) / 
                                      Math.sqrt(this.weights[0] * this.weights[0] + this.weights[1] * this.weights[1]);
                    const kernelVal = Math.exp(-this.gamma * distToLine * distToLine);
                    return kernelVal > 0.5 ? 1 : -1;
                }
            }
        };
        
        // Click handler to add points
        svg.on("click", function(event) {
            const [x, y] = d3.pointer(event);
            addPoint(x, y);
        });
        
        // Reset button
        d3.select("#reset-btn").on("click", function() {
            points = [];
            trainingData = [];
            currentColor = 0;
            svm.weights = [0, 0];
            svm.bias = 0;
            updateVisualization();
        });
        
        // Random points button
        d3.select("#random-btn").on("click", function() {
            for (let i = 0; i < 10; i++) {
                const x = Math.random() * innerWidth;
                const y = Math.random() * innerHeight;
                addPoint(x, y);
            }
        });
        
        // Kernel selector
        d3.select("#kernel-select").on("change", function() {
            svm.kernel = this.value;
            trainSVM();
            updateVisualization();
        });
        
        // Add a point to the visualization and training data
        function addPoint(x, y) {
            const color = colors[currentColor];
            currentColor = (currentColor + 1) % colors.length;
            
            points.push({x, y, color});
            trainingData.push({
                x: x / innerWidth,
                y: y / innerHeight,
                label: currentColor === 0 ? 1 : -1  // Alternate labels
            });
            
            trainSVM();
            updateVisualization();
        }
        
        // Simplified SVM training (not a real SVM implementation)
        function trainSVM() {
            if (trainingData.length < 2) return;
            
            // For visualization, we'll do a simplified version:
            // 1. Find class centroids
            let classA = {x: 0, y: 0, count: 0};
            let classB = {x: 0, y: 0, count: 0};
            
            trainingData.forEach(d => {
                if (d.label > 0) {
                    classA.x += d.x;
                    classA.y += d.y;
                    classA.count++;
                } else {
                    classB.x += d.x;
                    classB.y += d.y;
                    classB.count++;
                }
            });
            
            if (classA.count > 0) {
                classA.x /= classA.count;
                classA.y /= classA.count;
            }
            if (classB.count > 0) {
                classB.x /= classB.count;
                classB.y /= classB.count;
            }
            
            // 2. The weights vector is the vector between centroids
            svm.weights = [
                classB.x - classA.x,
                classB.y - classA.y
            ];
            
            // 3. The bias is set to be at the midpoint
            const midX = (classA.x + classB.x) / 2;
            const midY = (classA.y + classB.y) / 2;
            
            svm.bias = -svm.weights[0] * midX - svm.weights[1] * midY;
            
            // 4. For non-linear kernel, we'll just increase the margin
            svm.margin = svm.kernel === 'rbf' ? 0.2 : 0.1;
        }
        
        // Update visualization
        function updateVisualization() {
            // Clear previous elements
            svg.selectAll(".point").remove();
            svg.selectAll(".decision-boundary").remove();
            svg.selectAll(".margin").remove();
            
            // Draw points
            svg.selectAll(".point")
                .data(points)
                .enter()
                .append("circle")
                .attr("class", "point")
                .attr("cx", d => d.x)
                .attr("cy", d => d.y)
                .attr("r", 8)
                .attr("fill", d => d.color);
            
            if (trainingData.length >= 2) {
                // Draw decision boundary (where wTx + b = 0)
                if (svm.kernel === 'linear') {
                    const w = svm.weights;
                    const b = svm.bias;
                    
                    // Find two points on the boundary line (scaled coordinates)
                    let p1, p2;
                    
                    if (w[1] !== 0) {
                        // Solve for y when x=0 and x=1
                        p1 = {x: 0, y: (-b) / w[1]};
                        p2 = {x: 1, y: (-b - w[0]) / w[1]};
                    } else {
                        // Vertical line when w[1]=0
                        p1 = {x: -b / w[0], y: 0};
                        p2 = {x: -b / w[0], y: 1};
                    }
                    
                    // Scale back to pixel coordinates
                    p1.x *= innerWidth;
                    p1.y *= innerHeight;
                    p2.x *= innerWidth;
                    p2.y *= innerHeight;
                    
                    // Draw line
                    svg.append("line")
                        .attr("class", "decision-boundary")
                        .attr("x1", p1.x)
                        .attr("y1", p1.y)
                        .attr("x2", p2.x)
                        .attr("y2", p2.y);
                    
                    // Draw margin lines (where wTx + b = ±1)
                    const margin1P1 = {x: 0, y: (-b + 1) / w[1]};
                    const margin1P2 = {x: 1, y: (-b + 1 - w[0]) / w[1]};
                    const margin2P1 = {x: 0, y: (-b - 1) / w[1]};
                    const margin2P2 = {x: 1, y: (-b - 1 - w[0]) / w[1]};
                    
                    svg.append("line")
                        .attr("class", "margin")
                        .attr("x1", margin1P1.x * innerWidth)
                        .attr("y1", margin1P1.y * innerHeight)
                        .attr("x2", margin1P2.x * innerWidth)
                        .attr("y2", margin1P2.y * innerHeight);
                    
                    svg.append("line")
                        .attr("class", "margin")
                        .attr("x1", margin2P1.x * innerWidth)
                        .attr("y1", margin2P1.y * innerHeight)
                        .attr("x2", margin2P2.x * innerWidth)
                        .attr("y2", margin2P2.y * innerHeight);
                    
                } else if (svm.kernel === 'rbf') {
                    // For RBF kernel, create contour of the decision boundary
                    const gridSize = 10;
                    const gridData = [];
                    
                    for (let x = 0; x <= innerWidth; x += gridSize) {
                        for (let y = 0; y <= innerHeight; y += gridSize) {
                            gridData.push({x, y, val: svm.predict(x, y)});
                        }
                    }
                    
                    // Draw contours
                    const contourGenerator = d3.contourDensity()
                        .x(d => d.x)
                        .y(d => d.y)
                        .weight(d => d.val)
                        .size([innerWidth, innerHeight])
                        .bandwidth(20)
                        .thresholds([0]);
                    
                    svg.append("path")
                        .attr("class", "decision-boundary")
                        .attr("d", contourGenerator(gridData));
                }
                
                // Highlight support vectors (for visualization, we'll use points closest to margin)
                if (trainingData.length > 2) {
                    trainingData.forEach((d, i) => {
                        const dist = Math.abs(
                            svm.weights[0] * d.x + 
                            svm.weights[1] * d.y + 
                            svm.bias);
                        
                        if (dist < svm.margin) {
                            svg.append("circle")
                                .attr("class", "point support-vector")
                                .attr("cx", d.x * innerWidth)
                                .attr("cy", d.y * innerHeight)
                                .attr("r", 8)
                                .attr("fill", d.label > 0 ? colors[0] : colors[1])
                                .attr("stroke", "black");
                        }
                    });
                }
            }
        }
    </script>
</body>
</html>
