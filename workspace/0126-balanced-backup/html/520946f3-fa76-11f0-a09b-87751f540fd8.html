<!DOCTYPE html>
<html>
<head>
    <title>Floyd-Warshall Algorithm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Floyd-Warshall Algorithm</h1>
    <p>This algorithm is used to find the shortest path between all pairs of nodes in a weighted graph.</p>
    <button id="run-floyd-warshall">Run Floyd-Warshall Algorithm</button>
    <div id="graph"></div>

    <script>
        const runFloydWarshall = async () => {
            const graph = {
                'A': { 'B': 2, 'C': 3 },
                'B': { 'A': 2, 'B': 4, 'C': 1 },
                'C': { 'A': 3, 'B': 1, 'C': 2 }
            };

            const shortestDistances = {};

            for (const node in graph) {
                shortestDistances[node] = {};
                for (const neighbor in graph[node]) {
                    shortestDistances[node][neighbor] = Infinity;
                }
            }

            for (const node in graph) {
                for (const neighbor in graph[node]) {
                    for (const otherNeighbor in graph[node]) {
                        if (neighbor !== otherNeighbor && graph[node][neighbor] + graph[neighbor][otherNeighbor] < shortestDistances[node][otherNeighbor]) {
                            shortestDistances[node][otherNeighbor] = graph[node][neighbor] + graph[neighbor][otherNeighbor];
                        }
                    }
                }
            }

            const result = {};

            for (const node in graph) {
                result[node] = {};
                for (const neighbor in graph[node]) {
                    result[node][neighbor] = shortestDistances[node][neighbor];
                }
            }

            console.log("Shortest Distances:");
            console.log(result);

            const matrix = Object.values(result).map(row => row.map(distance => distance));
            const matrixHtml = matrix.map(row => row.join("<tr><td>" + row.join(" | ") + "</td></tr>"));

            document.getElementById("graph").innerHTML = matrixHtml.join("");
        };

        runFloydWarshall();
    </script>
</body>
</html>
