<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVL Tree Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #tree-container {
            width: 100%;
            height: 400px;
            position: relative;
            border: 1px solid #ccc;
        }
        .node {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: #4CAF50;
            color: white;
            border-radius: 20px;
            text-align: center;
            line-height: 40px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        .link {
            position: absolute;
            background-color: black;
            height: 2px;
            transition: height 0.2s, left 0.2s, top 0.2s;
        }
    </style>
</head>
<body>

<h1>AVL Tree Visualization</h1>
<div id="tree-container"></div>
<label for="nodeValue">Enter a number: </label>
<input type="number" id="nodeValue" />
<button onclick="insertNode()">Insert Node</button>

<script>
    class AVLTreeNode {
        constructor(value) {
            this.value = value;
            this.height = 1;
            this.left = null;
            this.right = null;
        }
    }

    class AVLTree {
        constructor() {
            this.root = null;
        }

        getHeight(node) {
            return node ? node.height : 0;
        }

        getBalance(node) {
            return node ? this.getHeight(node.left) - this.getHeight(node.right) : 0;
        }

        rightRotate(y) {
            let x = y.left;
            let T2 = x.right;
            x.right = y;
            y.left = T2;
            y.height = Math.max(this.getHeight(y.left), this.getHeight(y.right)) + 1;
            x.height = Math.max(this.getHeight(x.left), this.getHeight(x.right)) + 1;
            return x;
        }

        leftRotate(x) {
            let y = x.right;
            let T2 = y.left;
            y.left = x;
            x.right = T2;
            x.height = Math.max(this.getHeight(x.left), this.getHeight(x.right)) + 1;
            y.height = Math.max(this.getHeight(y.left), this.getHeight(y.right)) + 1;
            return y;
        }

        insert(node, value) {
            if (!node) return new AVLTreeNode(value);
            if (value < node.value) {
                node.left = this.insert(node.left, value);
            } else if (value > node.value) {
                node.right = this.insert(node.right, value);
            } else {
                return node;
            }

            node.height = Math.max(this.getHeight(node.left), this.getHeight(node.right)) + 1;

            let balance = this.getBalance(node);

            if (balance > 1 && value < node.left.value) return this.rightRotate(node);
            if (balance < -1 && value > node.right.value) return this.leftRotate(node);
            if (balance > 1 && value > node.left.value) {
                node.left = this.leftRotate(node.left);
                return this.rightRotate(node);
            }
            if (balance < -1 && value < node.right.value) {
                node.right = this.rightRotate(node.right);
                return this.leftRotate(node);
            }
            return node;
        }

        insertNode(value) {
            this.root = this.insert(this.root, value);
            this.renderTree();
        }

        renderTree() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';
            this.draw(this.root, container, window.innerWidth / 2, 50, 100);
        }

        draw(node, container, x, y, xOffset) {
            if (!node) return;
            const nodeElement = document.createElement('div');
            nodeElement.className = 'node';
            nodeElement.style.left = `${x}px`;
            nodeElement.style.top = `${y}px`;
            nodeElement.innerText = node.value;
            container.appendChild(nodeElement);

            if (node.left) {
                const leftX = x - xOffset;
                const leftY = y + 50;
                const link = this.createLink(x + 20, y + 40, leftX + 20, leftY);
                container.appendChild(link);
                this.draw(node.left, container, leftX, leftY, xOffset / 2);
            }
            if (node.right) {
                const rightX = x + xOffset;
                const rightY = y + 50;
                const link = this.createLink(x + 20, y + 40, rightX + 20, rightY);
                container.appendChild(link);
                this.draw(node.right, container, rightX, rightY, xOffset / 2);
            }
        }

        createLink(x1, y1, x2, y2) {
            const link = document.createElement('div');
            link.className = 'link';
            const height = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            link.style.width = `${height}px`;
            link.style.left = `${x1}px`;
            link.style.top = `${y1}px`;
            link.style.transform = `rotate(${Math.atan2(y2 - y1, x2 - x1)}rad)`;
            return link;
        }
    }

    const avlTree = new AVLTree();

    function insertNode() {
        const value = parseInt(document.getElementById('nodeValue').value);
        if (!isNaN(value)) {
            avlTree.insertNode(value);
            document.getElementById('nodeValue').value = '';
        } else {
            alert('Please enter a valid number');
        }
    }
</script>

</body>
</html>
