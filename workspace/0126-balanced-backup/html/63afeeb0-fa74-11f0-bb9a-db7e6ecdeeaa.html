<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Circular Linked List Demonstration</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f5f5f5;
  }
  h1 {
    color: #333;
  }
  #list-visual {
    margin: 20px 0;
    padding: 10px;
    background: white;
    border-radius: 8px;
    min-height: 80px;
    font-size: 18px;
    display: flex;
    align-items: center;
  }
  .node {
    background: #4a90e2;
    color: white;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    margin-right: 30px;
    font-weight: bold;
    user-select: none;
  }
  .node::after {
    content: '→';
    position: absolute;
    right: -25px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 24px;
    color: #4a90e2;
  }
  .node:last-child::after {
    content: '↺'; /* indicating circular link back to head */
    right: -30px;
    font-size: 28px;
    color: #e27d60;
  }
  button {
    margin: 5px 5px 15px 0;
    padding: 8px 15px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
  }
  button:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  #output {
    margin-top: 30px;
    background: white;
    padding: 15px;
    border-radius: 8px;
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
    font-family: monospace;
    border: 1px solid #ccc;
  }
  label {
    font-weight: 600;
  }
  input[type="number"] {
    width: 80px;
    padding: 5px;
    font-size: 16px;
    margin-right: 15px;
  }
</style>
</head>
<body>
  <h1>Circular Linked List Demo</h1>
  <p>
    A Circular Linked List is a linked list where all nodes are connected in a circle; the last node points back to the head.
  </p>
  <div>
    <label for="inputValue">Node Value:</label>
    <input type="number" id="inputValue" placeholder="Enter value" />
    <button id="appendBtn">Append Node</button>
    <button id="prependBtn">Prepend Node</button>
    <button id="removeBtn">Remove Node (by value)</button>
  </div>
  <div id="list-visual" aria-label="Circular Linked List Visualization" role="img">
    <!-- Nodes visualized here -->
  </div>
  <button id="traverseBtn">Traverse List</button>
  <button id="clearBtn">Clear List</button>

  <div id="output" aria-live="polite" aria-atomic="true"></div>

  <script>
    class CircularLinkedListNode {
      constructor(value) {
        this.value = value;
        this.next = null;
      }
    }

    class CircularLinkedList {
      constructor() {
        this.head = null;
      }

      isEmpty() {
        return this.head === null;
      }

      append(value) {
        const newNode = new CircularLinkedListNode(value);
        if (this.isEmpty()) {
          newNode.next = newNode;
          this.head = newNode;
          return;
        }
        // otherwise, find last node and insert newNode after it
        let current = this.head;
        while (current.next !== this.head) {
          current = current.next;
        }
        current.next = newNode;
        newNode.next = this.head;
      }

      prepend(value) {
        const newNode = new CircularLinkedListNode(value);
        if (this.isEmpty()) {
          newNode.next = newNode;
          this.head = newNode;
          return;
        }
        // Find last node
        let last = this.head;
        while (last.next !== this.head) {
          last = last.next;
        }
        newNode.next = this.head;
        this.head = newNode;
        last.next = this.head;
      }

      remove(value) {
        if (this.isEmpty()) return false;

        // Special case: head needs to be removed
        let current = this.head, prev = null;

        // Check if head is the only node and matches value
        if (current.value === value && current.next === this.head) {
          this.head = null;
          return true;
        }

        // General case: iterate till node with value is found
        do {
          if (current.value === value) {
            if (prev) {
              prev.next = current.next;
              // If removing head, update head pointer
              if (current === this.head) {
                this.head = current.next;
              }
            } else {
              // Removing head, but more nodes exist
              let last = this.head;
              while (last.next !== this.head) {
                last = last.next;
              }
              this.head = current.next;
              last.next = this.head;
            }
            return true;
          }
          prev = current;
          current = current.next;
        } while (current !== this.head);

        // Node not found
        return false;
      }

      traverse() {
        let values = [];
        if (this.isEmpty()) return values;
        let current = this.head;
        do {
          values.push(current.value);
          current = current.next;
        } while (current !== this.head);
        return values;
      }

      clear() {
        this.head = null;
      }
    }

    // ------- DOM and interaction logic -------

    const listVisual = document.getElementById('list-visual');
    const output = document.getElementById('output');
    const inputValue = document.getElementById('inputValue');
    const appendBtn = document.getElementById('appendBtn');
    const prependBtn = document.getElementById('prependBtn');
    const removeBtn = document.getElementById('removeBtn');
    const traverseBtn = document.getElementById('traverseBtn');
    const clearBtn = document.getElementById('clearBtn');

    const cll = new CircularLinkedList();

    function renderList() {
      listVisual.innerHTML = '';
      const nodes = cll.traverse();
      if (nodes.length === 0) {
        listVisual.textContent = 'List is empty.';
        return;
      }
      nodes.forEach((val, i) => {
        const nodeEl = document.createElement('div');
        nodeEl.classList.add('node');
        nodeEl.textContent = val;
        listVisual.appendChild(nodeEl);
      });
    }

    function printOutput(message) {
      output.textContent = message;
    }

    appendBtn.onclick = () => {
      const v = inputValue.value.trim();
      if (v === '') {
        alert('Please enter a node value.');
        return;
      }
      cll.append(v);
      printOutput(`Appended node with value: ${v}`);
      renderList();
      inputValue.value = '';
    };

    prependBtn.onclick = () => {
      const v = inputValue.value.trim();
      if (v === '') {
        alert('Please enter a node value.');
        return;
      }
      cll.prepend(v);
      printOutput(`Prepended node with value: ${v}`);
      renderList();
      inputValue.value = '';
    };

    removeBtn.onclick = () => {
      const v = inputValue.value.trim();
      if (v === '') {
        alert('Please enter a node value to remove.');
        return;
      }
      const removed = cll.remove(v);
      if (removed) {
        printOutput(`Removed node with value: ${v}`);
      } else {
        printOutput(`Node with value ${v} not found.`);
      }
      renderList();
      inputValue.value = '';
    };

    traverseBtn.onclick = () => {
      const nodes = cll.traverse();
      if (nodes.length === 0) {
        printOutput('The list is empty.');
      } else {
        let outputStr = 'Circular Linked List traversal:\n';
        outputStr += nodes.join(' → ') + ' → (back to head)';
        printOutput(outputStr);
      }
    };

    clearBtn.onclick = () => {
      cll.clear();
      printOutput('List cleared.');
      renderList();
    };

    // Initial render
    renderList();
  </script>
</body>
</html>
