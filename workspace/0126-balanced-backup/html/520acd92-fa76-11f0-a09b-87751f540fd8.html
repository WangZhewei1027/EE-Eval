<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routing Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #f0f0f0;
            padding: 20px;
            text-align: center;
        }
        .footer {
            background-color: #f0f0f0;
            padding: 20px;
            text-align: center;
            clear: both;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Routing Example</h1>
        </div>
        <div class="footer">
            &copy; 2023 Routing Example
        </div>
        <button id="route">Click Me!</button>
        <div id="route-content"></div>
    </div>

    <script>
        const routeButton = document.getElementById('route');
        const routeContentDiv = document.getElementById('route-content');

        routeButton.addEventListener('click', () => {
            const url = window.location.pathname;
            const route = `/pages/${url.replace(/\/$/, '')}`;

            routeContentDiv.innerHTML = `
                <h2>${route}</h2>
                <p>This is the content for ${route}</p>
            `;
        });
    </script>
</body>
</html>
