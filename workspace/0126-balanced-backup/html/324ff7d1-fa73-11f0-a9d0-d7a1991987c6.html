<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistic Regression Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;
        }
        .scatter {
            display: inline-block;
            position: relative;
            height: 400px;
            width: 400px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }
        .point {
            position: absolute;
            border-radius: 50%;
        }
        .line {
            position: absolute;
            height: 100%;
            width: 2px;
            background: red;
            top: 0;
        }
    </style>
</head>
<body>

<h1>Logistic Regression Demonstration</h1>
<div class="scatter" id="scatterPlot"></div>
<button onclick="trainModel()">Train Model</button>

<div id="message"></div>

<script>
    // Sample data: [x, y, class]
    const data = [
        [0.1, 0.2, 0],
        [0.4, 0.3, 0],
        [0.2, 0.5, 0],
        [0.6, 0.6, 1],
        [0.8, 0.9, 1],
        [0.9, 0.8, 1]
    ];

    let weights = [0, 0]; // Initialize weights for the model

    const scatterPlot = document.getElementById('scatterPlot');

    function plotData() {
        scatterPlot.innerHTML = '';
        data.forEach(point => {
            const [x, y, cls] = point;
            const color = cls === 1 ? 'blue' : 'green';
            const div = document.createElement('div');
            div.classList.add('point');
            div.style.backgroundColor = color;
            div.style.width = '10px';
            div.style.height = '10px';
            div.style.left = `${x * 400}px`; // Scale to the plot
            div.style.top = `${(1 - y) * 400}px`; // Invert y-axis
            scatterPlot.appendChild(div);
        });
    }

    function sigmoid(z) {
        return 1 / (1 + Math.exp(-z));
    }

    function predict(x1, x2) {
        return sigmoid(weights[0] + weights[1] * x1);
    }

    function trainModel() {
        const learningRate = 0.1;
        const epochs = 1000;

        for (let i = 0; i < epochs; i++) {
            data.forEach(point => {
                const [x1, x2, y] = point;
                const prediction = predict(x1, x2);
                const error = y - prediction;

                // Update weights
                weights[0] += learningRate * error * prediction * (1 - prediction);
                weights[1] += learningRate * error * prediction * (1 - prediction) * x1;
                weights[1] += learningRate * error * prediction * (1 - prediction) * x2;
            });
        }

        document.getElementById('message').innerText = 'Model trained.';
        drawDecisionBoundary();
    }

    function drawDecisionBoundary() {
        const line = document.createElement('div');
        line.classList.add('line');
        
        const x1 = 0; // start
        const x2 = 1; // end
        
        const y1 = predict(x1, 0); // intersect with y-axis
        const y2 = predict(x2, 1); // intersect with end

        const slope = (y2 - y1) / (x2 - x1);
        
        const angle = Math.atan(slope) * (180 / Math.PI);
        const distance = 400 * slope;

        line.style.transform = `rotate(${angle}deg)`;
        line.style.left = `${x1 * 400}px`;
        line.style.top = `${(1 - y1) * 400}px`;
        line.style.height = `${distance}px`;
        
        scatterPlot.appendChild(line);
    }
    
    plotData();

</script>
</body>
</html>
