<!DOCTYPE html>
<html>
<head>
    <title>Relational Database</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        table, tr, td {
            border: 1px solid #ddd;
            padding: 5px;
        }
        table {
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ccc;
            text-align: left;
        }
        th {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <h1>Relational Database</h1>
    <h2>Tables</h2>
    <table border="1">
        <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td>1</td>
            <td>John Smith</td>
            <td>20</td>
            <td>A</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Jane Doe</td>
            <td>21</td>
            <td>B</td>
        </tr>
    </table>
    <h2>Database</h2>
    <table border="1">
        <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td>1</td>
            <td>John Smith</td>
            <td>20</td>
            <td>A</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Jane Doe</td>
            <td>21</td>
            <td>B</td>
        </tr>
    </table>
    <h2>SQL Query</h2>
    <table border="1">
        <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td>1</td>
            <td>John Smith</td>
            <td>20</td>
            <td>A</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Jane Doe</td>
            <td>21</td>
            <td>B</td>
        </tr>
    </table>
    <h2>Inserting Data</h2>
    <form>
        <label for="studentId">Student ID:</label>
        <input type="number" id="studentId" name="studentId"><br><br>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age"><br><br>
        <label for="grade">Grade:</label>
        <select id="grade" name="grade">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
        </select><br><br>
        <input type="submit" value="Insert Data">
    </form>
    <h2>Updating Data</h2>
    <form>
        <label for="studentId">Student ID:</label>
        <input type="number" id="studentId" name="studentId"><br><br>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age"><br><br>
        <label for="grade">Grade:</label>
        <select id="grade" name="grade">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
        </select><br><br>
        <input type="submit" value="Update Data">
    </form>
    <h2>Deleting Data</h2>
    <form>
        <label for="studentId">Student ID:</label>
        <input type="number" id="studentId" name="studentId"><br><br>
        <input type="submit" value="Delete Data">
    </form>

</body>
</html>
