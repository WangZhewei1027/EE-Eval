<!DOCTYPE html>
<html>
<head>
    <title>Ternary Search</title>
</head>
<body>
    <h1>Ternary Search</h1>
    <button onclick="searchTernary(0, 10)">Start</button>

    <script>
        function searchTernary(start, end) {
            if (start > end) return; // base case: if start is greater than end, return
            let mid = Math.floor((start + end) / 2); // calculate the middle index
            let value = mid * 3 + 1; // calculate the value at the middle index
            console.log(`Searching for value ${value} between ${start} and ${end}`);
            if (value < 5) {
                searchTernary(start, mid - 1); // search in the left half
            } else if (value > 5) {
                searchTernary(mid + 1, end); // search in the right half
            } else {
                console.log(`Value ${value} found at index ${mid}`);
            }
        }
    </script>
</body>
</html>
