<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Complexity Demonstration</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #output { margin-top: 20px; }
        .btn { margin: 5px; padding: 10px; background-color: #007BFF; color: white; border: none; cursor: pointer; }
        .btn:hover { background-color: #0056b3; }
        .complexity { margin-top: 10px; padding: 10px; background-color: #f8f9fa; border: 1px solid #ced4da; }
    </style>
</head>
<body>

<h1>Space Complexity Demonstration</h1>
<p>Space complexity measures the amount of working storage an algorithm needs. It considers both the temporary space allocated by the algorithm and the space required to hold input values.</p>

<button class="btn" onclick="calculateSpace(['a', 'b', 'c', 'd', 'e'])">Calculate Space for Array of Size 5</button>
<button class="btn" onclick="calculateSpace(['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h', 'i', 'j'])">Calculate Space for Array of Size 10</button>
<button class="btn" onclick="calculateSpace(['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h', 'i', 'j', 'k', 'l', 'm', 'n', 'o', 'p'])">Calculate Space for Array of Size 16</button>

<div id="output"></div>

<script>
    function calculateSpace(array) {
        // Space complexity in terms of the input size
        const inputSize = array.length;
        
        // Let's say our algorithm also needs a few constant space variables
        const constantSpace = 3; // e.g., a counter, a result variable, etc.
        
        // This is an O(n) space complexity algorithm
        const spaceComplexity = `O(n) where n is the size of the array (${inputSize}).`;
        
        // Output the result
        document.getElementById('output').innerHTML = `
            <div class="complexity">
                Input Size: ${inputSize} elements<br>
                Total Space Used: ${inputSize + constantSpace} (elements + constant)<br>
                Space Complexity: ${spaceComplexity}
            </div>
        `;
    }
</script>

</body>
</html>
