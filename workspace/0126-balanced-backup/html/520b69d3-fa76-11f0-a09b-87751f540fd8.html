<!DOCTYPE html>
<html>
<head>
    <title>Linear Regression</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #graph {
            width: 800px;
            height: 600px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Linear Regression</h1>
    <p>Linear Regression is a supervised learning algorithm used for predicting continuous output variables based on one or more predictor variables.</p>
    <button id="load-data-btn">Load Data</button>
    <button id="plot-btn">Plot Regression Line</button>
    <div id="graph"></div>

    <script>
        let xData = [];
        let yData = [];
        let data = [
            {x: 1, y: 2},
            {x: 2, y: 3},
            {x: 3, y: 5},
            {x: 4, y: 7},
            {x: 5, y: 11},
            {x: 6, y: 13}
        ];

        function loadData() {
            let input = document.getElementById('load-data-btn');
            let output = document.getElementById('plot-btn');
            input.addEventListener('click', function() {
                let x = data.map(function(d) { return d.x; });
                let y = data.map(function(d) { return d.y; });
                let r = x.map(function(d) { return d - d.reduce(function(a, b) { return a + b, 0}); });
                let s = x.map(function(d) { return d - d.reduce(function(a, b) { return a + b, 0}, 0); });
                let m = x.reduce(function(a, b) { return a + b, 0}) / x.length;
                let b = y.reduce(function(a, b) { return a + b, 0}) / y.length - m * s.reduce(function(a, b) { return a + b, 0}) / s.length;
                xData = x;
                yData = y;
                let graph = document.getElementById('graph');
                graph.innerHTML = '';
                for (let i = 0; i < x.length; i++) {
                    let y = yData[i] + m * xData[i] + b;
                    let rect = document.createElement('rect');
                    rect.x = x[i];
                    rect.y = y;
                    rect.width = 1;
                    rect.height = 20;
                    rect.fill = 'blue';
                    graph.appendChild(rect);
                }
            });
        }

        loadData();
    </script>
</body>
</html>
