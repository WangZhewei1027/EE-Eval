<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directed Graph Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .graph-container {
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
            position: relative;
        }
        .node {
            width: 50px;
            height: 50px;
            background-color: #4CAF50;
            border-radius: 25px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            cursor: pointer;
        }
        .edge {
            position: absolute;
            width: 2px;
            background-color: #000;
        }
    </style>
</head>
<body>

<h1>Directed Graph Visualization</h1>
<div class="graph-container" id="graph-container"></div>

<script>
    const nodes = [
        { id: 'A', x: 50, y: 50 },
        { id: 'B', x: 200, y: 50 },
        { id: 'C', x: 120, y: 150 },
        { id: 'D', x: 300, y: 200 }
    ];

    const edges = [
        { from: 'A', to: 'B' },
        { from: 'A', to: 'C' },
        { from: 'B', to: 'D' },
        { from: 'C', to: 'D' }
    ];

    const container = document.getElementById('graph-container');

    // Function to create nodes
    function createNode(node) {
        const div = document.createElement('div');
        div.className = 'node';
        div.style.left = node.x + 'px';
        div.style.top = node.y + 'px';
        div.innerText = node.id;
        container.appendChild(div);
        return div;
    }

    // Function to create edges
    function createEdge(fromNode, toNode) {
        const edge = document.createElement('div');
        edge.className = 'edge';
        
        const fromRect = fromNode.getBoundingClientRect();
        const toRect = toNode.getBoundingClientRect();
        
        const x1 = fromRect.left + fromRect.width / 2;
        const y1 = fromRect.top + fromRect.height / 2;
        const x2 = toRect.left + toRect.width / 2;
        const y2 = toRect.top + toRect.height / 2;
        
        const length = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        const angle = Math.atan2(y2 - y1, x2 - x1) * (180 / Math.PI);

        edge.style.width = length + 'px';
        edge.style.transform = `rotate(${angle}deg)`;
        edge.style.left = x1 + 'px';
        edge.style.top = y1 + 'px';
        
        container.appendChild(edge);
    }

    // Create nodes and edges
    const createdNodes = nodes.map(createNode);
    edges.forEach(edge => {
        createEdge(createdNodes.find(node => node.innerText === edge.from), 
                    createdNodes.find(node => node.innerText === edge.to));
    });
</script>

</body>
</html>
