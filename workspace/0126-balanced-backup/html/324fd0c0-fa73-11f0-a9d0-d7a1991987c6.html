<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Typing Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

<h1>Dynamic Typing in JavaScript</h1>
<p>
    JavaScript is a dynamically typed language, meaning variables can hold values of any type 
    without explicit type definitions. Below, you can see how values can change types dynamically.
</p>

<button onclick="demonstrateDynamicTyping()">Demonstrate Dynamic Typing</button>

<div class="result" id="result"></div>

<script>
    function demonstrateDynamicTyping() {
        let dynamicVar; // Initially undefined
        let resultDiv = document.getElementById('result');
        resultDiv.innerHTML = ''; // Clear previous results

        // Assigning a number
        dynamicVar = 5;
        resultDiv.innerHTML += `<p>After assigning a number: <strong>${dynamicVar} (${typeof dynamicVar})</strong></p>`;

        // Assigning a string
        dynamicVar = "Hello, world!";
        resultDiv.innerHTML += `<p>After assigning a string: <strong>${dynamicVar} (${typeof dynamicVar})</strong></p>`;

        // Assigning a boolean
        dynamicVar = true;
        resultDiv.innerHTML += `<p>After assigning a boolean: <strong>${dynamicVar} (${typeof dynamicVar})</strong></p>`;

        // Assigning an array
        dynamicVar = [1, 2, 3];
        resultDiv.innerHTML += `<p>After assigning an array: <strong>${dynamicVar} (${typeof dynamicVar})</strong></p>`;

        // Assigning an object
        dynamicVar = { key: "value" };
        resultDiv.innerHTML += `<p>After assigning an object: <strong>${JSON.stringify(dynamicVar)} (${typeof dynamicVar})</strong></p>`;
        
        // Assigning null
        dynamicVar = null;
        resultDiv.innerHTML += `<p>After assigning null: <strong>${dynamicVar} (${typeof dynamicVar})</strong></p>`;
    }
</script>

</body>
</html>
