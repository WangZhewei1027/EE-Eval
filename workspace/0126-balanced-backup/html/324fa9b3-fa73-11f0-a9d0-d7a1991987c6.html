<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garbage Collection in JavaScript</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        #output {
            margin-top: 20px;
            border: 1px solid #000;
            padding: 10px;
            background-color: #f8f8f8;
        }
    </style>
</head>
<body>

    <h1>Garbage Collection in JavaScript</h1>
    <button id="createObject">Create Object</button>
    <button id="makeNull">Make Object Null</button>
    <div id="output"></div>

    <script>
        let myObject;

        document.getElementById('createObject').addEventListener('click', function () {
            myObject = { name: 'Garbage Collector' };
            document.getElementById('output').innerText = 'Object Created: ' + myObject.name;
            console.log(myObject);
        });

        document.getElementById('makeNull').addEventListener('click', function () {
            myObject = null; // Dereference the object
            document.getElementById('output').innerText = 'Object dereferenced. Garbage Collector will reclaim memory.';
            console.log('Object dereferenced.');
            // Assuming you have browser dev tools open to see memory usage:
            // You can check the memory heap to observe garbage collection.
        });

        setInterval(() => {
			// This function triggers every second to show memory status in the console
            console.log('Memory cleanup example running...');
        }, 1000);
    </script>

</body>
</html>
