<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signatures Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f4;
        }
        textarea {
            width: 100%;
            height: 100px;
        }
        button {
            margin-top: 10px;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background: #fff;
        }
    </style>
</head>
<body>
    <h1>Digital Signatures Demonstration</h1>
    <textarea id="message" placeholder="Enter your message here..."></textarea><br>
    <button id="signButton">Sign Message</button>
    <button id="verifyButton">Verify Signature</button>
    
    <div id="result"></div>

    <script>
        let privateKey, publicKey, signature;

        async function generateKeyPair() {
            const keys = await window.crypto.subtle.generateKey(
                {
                    name: "RSASSA-PKCS1-v1_5",
                    modulusLength: 2048,
                    publicExponent: new Uint8Array([1, 0, 1]),
                    hash: { name: "SHA-256" },
                },
                true,
                ["sign", "verify"]
            );
            return keys;
        }

        async function signMessage(message) {
            const encodedMessage = new TextEncoder().encode(message);
            const cryptoKeys = await generateKeyPair();
            privateKey = cryptoKeys.privateKey;
            publicKey = cryptoKeys.publicKey;
            
            const signatureBuffer = await window.crypto.subtle.sign(
                {
                    name: "RSASSA-PKCS1-v1_5",
                },
                privateKey,
                encodedMessage
            );

            signature = new Uint8Array(signatureBuffer);
            return signature;
        }

        async function verifyMessage(originalMessage, signature) {
            const encodedMessage = new TextEncoder().encode(originalMessage);
            const verification = await window.crypto.subtle.verify(
                {
                    name: "RSASSA-PKCS1-v1_5",
                },
                publicKey,
                signature,
                encodedMessage
            );
            return verification;
        }

        document.getElementById("signButton").addEventListener("click", async () => {
            const message = document.getElementById("message").value;
            if (!message) {
                alert("Please enter a message.");
                return;
            }

            const signed = await signMessage(message);
            document.getElementById("result").innerHTML = 
                `<strong>Message Signed!</strong><br>
                Signature (Base64): ${btoa(String.fromCharCode.apply(null, signed))}`;
        });

        document.getElementById("verifyButton").addEventListener("click", async () => {
            const message = document.getElementById("message").value;
            if (!signature || !message) {
                alert("Please sign a message first to verify.");
                return;
            }

            const isValid = await verifyMessage(message, signature);
            document.getElementById("result").innerHTML += `<br><strong>Verification Result:</strong> ${isValid ? 'Valid Signature' : 'Invalid Signature'}`;
        });
    </script>
</body>
</html>
