<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Means Clustering Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        canvas {
            border: 1px solid black;
            margin: 20px auto;
            display: block;
        }
    </style>
</head>
<body>
    <h1>K-Means Clustering Demo</h1>
    <canvas id="canvas" width="800" height="600"></canvas>
    <br>
    <button id="start">Start Clustering</button>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const numPoints = 100;
        const numClusters = 3;
        let points = [];
        let centroids = [];
        let assignments = [];
        let iteration = 0;

        // Generate random points
        function generatePoints() {
            points = [];
            for (let i = 0; i < numPoints; i++) {
                points.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height
                });
            }
        }

        // Initialize centroids
        function initializeCentroids() {
            centroids = [];
            for (let i = 0; i < numClusters; i++) {
                centroids.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height
                });
            }
        }

        // Assign points to the nearest centroid
        function assignClusters() {
            assignments = points.map(point => {
                let closestCentroidIndex = 0;
                let minDistance = Infinity;

                centroids.forEach((centroid, index) => {
                    const dist = Math.sqrt(Math.pow(point.x - centroid.x, 2) + Math.pow(point.y - centroid.y, 2));
                    if (dist < minDistance) {
                        closestCentroidIndex = index;
                        minDistance = dist;
                    }
                });

                return closestCentroidIndex;
            });
        }

        // Update centroids based on the current assignments
        function updateCentroids() {
            const newCentroids = Array.from({ length: numClusters }, () => ({ x: 0, y: 0, count: 0 }));

            points.forEach((point, index) => {
                const clusterIndex = assignments[index];
                newCentroids[clusterIndex].x += point.x;
                newCentroids[clusterIndex].y += point.y;
                newCentroids[clusterIndex].count++;
            });

            centroids = newCentroids.map(centroid => {
                return {
                    x: centroid.count > 0 ? centroid.x / centroid.count : Math.random() * canvas.width,
                    y: centroid.count > 0 ? centroid.y / centroid.count : Math.random() * canvas.height
                };
            });
        }

        // Draw points and centroids
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw points
            points.forEach((point, index) => {
                ctx.fillStyle = `hsl(${(assignments[index] * 360) / numClusters}, 100%, 50%)`;
                ctx.beginPath();
                ctx.arc(point.x, point.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });
            // Draw centroids
            centroids.forEach(centroid => {
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(centroid.x, centroid.y, 7, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // K-Means algorithm
        function kMeans() {
            assignClusters();
            updateCentroids();
            iteration++;
            draw();
            // Stop if no changes in assignments, or iterate 10 times as a max
            if (iteration < 10) {
                setTimeout(kMeans, 1000);
            }
        }

        document.getElementById('start').onclick = () => {
            generatePoints();
            initializeCentroids();
            iteration = 0;
            kMeans();
        };

        // Initial draw
        generatePoints();
        initializeCentroids();
        draw();
    </script>
</body>
</html>
