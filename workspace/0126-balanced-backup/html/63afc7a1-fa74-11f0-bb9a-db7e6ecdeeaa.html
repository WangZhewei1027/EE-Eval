<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Doubly Linked List Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      background: #f9f9f9;
      color: #333;
    }
    h1 {
      text-align: center;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 0 12px rgb(0 0 0 / 0.1);
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
      justify-content: center;
    }
    input[type="number"],
    input[type="text"] {
      padding: 0.5rem;
      font-size: 1rem;
      width: 100px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      cursor: pointer;
      padding: 0.5rem 1.2rem;
      border: none;
      background: #007bff;
      color: white;
      font-weight: bold;
      border-radius: 4px;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #0056b3;
    }
    .list-container {
      margin-top: 1.5rem;
      text-align: center;
      min-height: 80px;
      user-select: none;
    }
    .node {
      display: inline-flex;
      align-items: center;
      border: 2px solid #007bff;
      padding: 0.6rem 1rem;
      margin: 0 0.2rem;
      border-radius: 6px;
      background: #e7f0ff;
      position: relative;
      font-weight: 600;
      font-size: 1.1rem;
      box-shadow: 0 2px 5px rgb(0 123 255 / 0.2);
      min-width: 40px;
      justify-content: center;
    }
    .node .arrows {
      font-size: 1.3rem;
      user-select: none;
      margin: 0 0.2rem;
      color: #666;
    }
    .node.current {
      border-color: #28a745;
      background: #d4edda;
      box-shadow: 0 2px 10px rgb(40 167 69 / 0.6);
      color: #155724;
    }
    .info {
      margin-top: 1rem;
      background: #eef6ff;
      border: 1px solid #c3ddff;
      padding: 0.8rem 1rem;
      border-radius: 5px;
      font-family: monospace;
      font-size: 0.95rem;
      max-height: 120px;
      overflow-y: auto;
      white-space: pre-wrap;
      user-select: text;
    }
    label {
      font-weight: 600;
      margin-right: 0.25rem;
    }
    .note {
      font-size: 0.9rem;
      color: #555;
      margin-top: 0.5rem;
      text-align: center;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Doubly Linked List Demo</h1>
  <div class="container">
    <div class="controls">
      <input type="text" id="inputValue" placeholder="Value (any)" />
      <button id="addHeadBtn" title="Add node at head">Add Head</button>
      <button id="addTailBtn" title="Add node at tail">Add Tail</button>
      <button id="removeHeadBtn" title="Remove head node">Remove Head</button>
      <button id="removeTailBtn" title="Remove tail node">Remove Tail</button>
      <input type="number" id="searchValue" placeholder="Search value" />
      <button id="searchBtn" title="Search node by value">Search</button>
      <button id="clearSearchBtn" title="Clear search highlight">Clear Search</button>
      <button id="clearListBtn" title="Clear entire list">Clear List</button>
    </div>
    <div class="list-container" id="listContainer" aria-live="polite" aria-atomic="true" aria-label="Doubly linked list visualization">
      <!-- Nodes will render here -->
    </div>
    <div class="info" id="infoBox" aria-live="polite" aria-atomic="true"></div>
    <div class="note">
      <strong>Note:</strong> Each node shows its <code>value</code>. Arrows (⇄) show the bidirectional links.
    </div>
  </div>

  <script>
    // Doubly Linked List Implementation in JS
    class Node {
      constructor(value) {
        this.value = value;
        this.next = null;
        this.prev = null;
      }
    }

    class DoublyLinkedList {
      constructor() {
        this.head = null;
        this.tail = null;
        this.length = 0;
      }

      addHead(value) {
        const newNode = new Node(value);
        if (!this.head) {
          this.head = this.tail = newNode;
        } else {
          newNode.next = this.head;
          this.head.prev = newNode;
          this.head = newNode;
        }
        this.length++;
      }

      addTail(value) {
        const newNode = new Node(value);
        if (!this.tail) {
          this.head = this.tail = newNode;
        } else {
          newNode.prev = this.tail;
          this.tail.next = newNode;
          this.tail = newNode;
        }
        this.length++;
      }

      removeHead() {
        if (!this.head) return null;
        const removed = this.head;
        if (this.head === this.tail) {
          this.head = this.tail = null;
        } else {
          this.head = this.head.next;
          this.head.prev = null;
        }
        this.length--;
        return removed.value;
      }

      removeTail() {
        if (!this.tail) return null;
        const removed = this.tail;
        if (this.head === this.tail) {
          this.head = this.tail = null;
        } else {
          this.tail = this.tail.prev;
          this.tail.next = null;
        }
        this.length--;
        return removed.value;
      }

      // Search node by value, return the first matching node
      search(value) {
        let current = this.head;
        while (current) {
          if (current.value == value) {
            return current;
          }
          current = current.next;
        }
        return null;
      }

      toArray() {
        // Returns an array of nodes for visualization
        let arr = [];
        let current = this.head;
        while (current) {
          arr.push(current);
          current = current.next;
        }
        return arr;
      }

      clear() {
        this.head = null;
        this.tail = null;
        this.length = 0;
      }
    }

    // Visualization and interaction
    (function () {
      const list = new DoublyLinkedList();

      const listContainer = document.getElementById('listContainer');
      const infoBox = document.getElementById('infoBox');
      const inputValue = document.getElementById('inputValue');
      const searchValue = document.getElementById('searchValue');

      const addHeadBtn = document.getElementById('addHeadBtn');
      const addTailBtn = document.getElementById('addTailBtn');
      const removeHeadBtn = document.getElementById('removeHeadBtn');
      const removeTailBtn = document.getElementById('removeTailBtn');
      const searchBtn = document.getElementById('searchBtn');
      const clearSearchBtn = document.getElementById('clearSearchBtn');
      const clearListBtn = document.getElementById('clearListBtn');

      let highlightedNode = null;

      function renderList() {
        listContainer.innerHTML = '';
        let nodes = list.toArray();
        nodes.forEach((node, i) => {
          const nodeEl = document.createElement('span');
          nodeEl.classList.add('node');
          nodeEl.textContent = node.value;

          if (node === highlightedNode) {
            nodeEl.classList.add('current');
          }

          listContainer.appendChild(nodeEl);
          // Add arrows between nodes except after the last one
          if (i !== nodes.length - 1) {
            const arrow = document.createElement('span');
            arrow.classList.add('arrows');
            arrow.setAttribute('aria-hidden', 'true');
            arrow.textContent = '⇄';
            listContainer.appendChild(arrow);
          }
        });

        if (list.length === 0) {
          listContainer.innerHTML = '<em>The list is empty.</em>';
        }
      }

      function updateInfo(text) {
        infoBox.textContent = text;
      }

      function safeTrim(str){
        // trim and convert empty strings to null
        return str.trim() || null;
      }

      addHeadBtn.addEventListener('click', () => {
        const val = safeTrim(inputValue.value);
        if (val === null) {
          alert('Please enter a value to add.');
          return;
        }
        list.addHead(val);
        inputValue.value = '';
        highlightedNode = null;
        renderList();
        updateInfo(`Added "${val}" at head. List length: ${list.length}`);
        inputValue.focus();
      });

      addTailBtn.addEventListener('click', () => {
        const val = safeTrim(inputValue.value);
        if (val === null) {
          alert('Please enter a value to add.');
          return;
        }
        list.addTail(val);
        inputValue.value = '';
        highlightedNode = null;
        renderList();
        updateInfo(`Added "${val}" at tail. List length: ${list.length}`);
        inputValue.focus();
      });

      removeHeadBtn.addEventListener('click', () => {
        if (list.length === 0) {
          updateInfo('List is empty. Nothing to remove.');
          return;
        }
        const removed = list.removeHead();
        highlightedNode = null;
        renderList();
        updateInfo(`Removed head node with value "${removed}". List length: ${list.length}`);
      });

      removeTailBtn.addEventListener('click', () => {
        if (list.length === 0) {
          updateInfo('List is empty. Nothing to remove.');
          return;
        }
        const removed = list.removeTail();
        highlightedNode = null;
        renderList();
        updateInfo(`Removed tail node with value "${removed}". List length: ${list.length}`);
      });

      searchBtn.addEventListener('click', () => {
        const val = safeTrim(searchValue.value);
        if (val === null) {
          alert('Please enter a value to search.');
          return;
        }
        if (list.length === 0) {
          updateInfo('List is empty. Nothing to search.');
          highlightedNode = null;
          renderList();
          return;
        }
        const found = list.search(val);
        if (found) {
          highlightedNode = found;
          renderList();
          updateInfo(`Value "${val}" found in the list.`);
        } else {
          highlightedNode = null;
          renderList();
          updateInfo(`Value "${val}" not found in the list.`);
        }
      });

      clearSearchBtn.addEventListener('click', () => {
        highlightedNode = null;
        renderList();
        updateInfo('Search highlight cleared.');
        searchValue.value = '';
      });

      clearListBtn.addEventListener('click', () => {
        if (confirm('Are you sure you want to clear the entire list?')) {
          list.clear();
          highlightedNode = null;
          renderList();
          updateInfo('List cleared.');
        }
      });

      // Initial render
      renderList();
      updateInfo('Doubly Linked List is empty. Add some nodes!');

    })();
  </script>
</body>
</html>
