<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trie Data Structure Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input {
            padding: 10px;
            margin-top: 10px;
            width: 300px;
        }
        button {
            padding: 10px;
            margin-left: 10px;
        }
        #output {
            margin-top: 20px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Trie Data Structure Demo</h1>
    <input type="text" id="wordInput" placeholder="Enter a word" />
    <button onclick="insertWord()">Insert Word</button>
    <button onclick="searchWord()">Search Word</button>
    <button onclick="displayTrie()">Display Trie</button>
    <div id="output"></div>

    <script>
        class TrieNode {
            constructor() {
                this.children = {};
                this.isEndOfWord = false;
            }
        }

        class Trie {
            constructor() {
                this.root = new TrieNode();
            }

            insert(word) {
                let node = this.root;
                for (let char of word) {
                    if (!node.children[char]) {
                        node.children[char] = new TrieNode();
                    }
                    node = node.children[char];
                }
                node.isEndOfWord = true;
            }

            search(word) {
                let node = this.root;
                for (let char of word) {
                    if (!node.children[char]) {
                        return false;
                    }
                    node = node.children[char];
                }
                return node.isEndOfWord;
            }

            display(node = this.root, prefix = '') {
                let result = '';
                if (node.isEndOfWord) {
                    result += prefix + '\n';
                }
                for (let char in node.children) {
                    result += this.display(node.children[char], prefix + char);
                }
                return result;
            }
        }

        const trie = new Trie();

        function insertWord() {
            const input = document.getElementById('wordInput').value;
            trie.insert(input);
            document.getElementById('wordInput').value = '';
            document.getElementById('output').innerText = `Inserted: ${input}`;
        }

        function searchWord() {
            const input = document.getElementById('wordInput').value;
            const found = trie.search(input);
            document.getElementById('output').innerText = `Search "${input}": ${found ? "Found" : "Not Found"}`;
        }

        function displayTrie() {
            const trieStructure = trie.display();
            document.getElementById('output').innerText = `Trie Structure:\n${trieStructure}`;
        }
    </script>
</body>
</html>
