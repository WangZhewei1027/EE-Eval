<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Compiler Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f4;
        }
        textarea {
            width: 100%;
            height: 100px;
        }
        pre {
            background: #e7e7e7;
            padding: 10px;
            border: 1px solid #ccc;
            overflow: auto;
        }
        button {
            padding: 10px 15px;
            margin-top: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<h1>Simple JavaScript Compiler Concept Demonstration</h1>
<p>Type in a simple arithmetic expression (e.g., "2 + 2 * (3 - 1)") and click "Compile" to see the output of the evaluation.</p>

<textarea id="codeInput" placeholder="Enter expression here..."></textarea>
<button id="compileButton">Compile</button>

<h2>Output</h2>
<pre id="output"></pre>

<script>
    document.getElementById('compileButton').addEventListener('click', function() {
        const input = document.getElementById('codeInput').value;
        
        try {
            // Simple "compilation" step: directly evaluating the expression
            const result = eval(input);
            document.getElementById('output').textContent = `Result: ${result}`;
        } catch (error) {
            // Handle any errors in evaluating the expression
            document.getElementById('output').textContent = `Error: ${error.message}`;
        }
    });
</script>

</body>
</html>
