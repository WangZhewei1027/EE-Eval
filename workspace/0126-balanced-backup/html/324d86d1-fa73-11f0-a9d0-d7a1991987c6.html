<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Search Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Linear Search Example</h1>
    <p>Enter an array of numbers (comma-separated) and a number to search for:</p>
    <input type="text" id="arrayInput" placeholder="e.g. 1,2,3,4,5">
    <input type="text" id="searchInput" placeholder="Number to search">
    <button onclick="performLinearSearch()">Search</button>
    
    <div id="result"></div>

    <script>
        function performLinearSearch() {
            const arrayInput = document.getElementById('arrayInput').value;
            const searchInput = document.getElementById('searchInput').value;

            // Convert the input string into an array of numbers
            const array = arrayInput.split(',').map(num => parseInt(num.trim()));
            const target = parseInt(searchInput.trim());

            let foundIndex = -1;

            // Linear Search implementation
            for (let i = 0; i < array.length; i++) {
                if (array[i] === target) {
                    foundIndex = i;
                    break;
                }
            }

            // Display the result
            const resultDiv = document.getElementById('result');
            if (foundIndex !== -1) {
                resultDiv.innerHTML = `Number ${target} found at index ${foundIndex}.`;
            } else {
                resultDiv.innerHTML = `Number ${target} not found in the array.`;
            }
        }
    </script>
</body>
</html>
