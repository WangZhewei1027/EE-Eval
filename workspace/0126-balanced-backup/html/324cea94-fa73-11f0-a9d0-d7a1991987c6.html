<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Heap Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 20px;
        }
        #heap-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            justify-content: center;
            margin: 20px 0;
        }
        .heap-node {
            border: 2px solid #007BFF;
            border-radius: 4px;
            padding: 10px;
            margin: 5px;
            background-color: #fff;
        }
    </style>
</head>
<body>

<h1>Min Heap Visualization</h1>
<input type="text" id="value" placeholder="Enter a number" />
<button onclick="insert()">Insert</button>
<button onclick="removeMin()">Remove Min</button>
<button onclick="displayHeap()">Display Heap</button>

<div id="heap-container"></div>
<div id="heap-array"></div>

<script>
    class MinHeap {
        constructor() {
            this.heap = [];
        }

        insert(value) {
            this.heap.push(value);
            this.bubbleUp(this.heap.length - 1);
        }

        bubbleUp(index) {
            const element = this.heap[index];
            while (index > 0) {
                const parentIndex = Math.floor((index - 1) / 2);
                const parent = this.heap[parentIndex];
                if (parent <= element) break;

                this.heap[index] = parent;
                index = parentIndex;
            }
            this.heap[index] = element;
        }

        removeMin() {
            const min = this.heap[0];
            const end = this.heap.pop();
            if (this.heap.length > 0) {
                this.heap[0] = end;
                this.bubbleDown(0);
            }
            return min;
        }

        bubbleDown(index) {
            const element = this.heap[index];
            const length = this.heap.length;

            while (true) {
                let leftChildIndex = 2 * index + 1;
                let rightChildIndex = 2 * index + 2;
                let leftChild, rightChild;
                let swap = null;

                if (leftChildIndex < length) {
                    leftChild = this.heap[leftChildIndex];
                    if (leftChild < element) {
                        swap = leftChildIndex;
                    }
                }
                if (rightChildIndex < length) {
                    rightChild = this.heap[rightChildIndex];
                    if (
                        (swap === null && rightChild < element) ||
                        (swap !== null && rightChild < leftChild)
                    ) {
                        swap = rightChildIndex;
                    }
                }

                if (swap === null) break;

                this.heap[index] = this.heap[swap];
                this.heap[swap] = element;
                index = swap;
            }
        }

        display() {
            const container = document.getElementById('heap-container');
            container.innerHTML = '';
            this.heap.forEach((value) => {
                const node = document.createElement('div');
                node.className = 'heap-node';
                node.textContent = value;
                container.appendChild(node);
            });
            document.getElementById('heap-array').textContent = `Heap Array: [${this.heap.join(', ')}]`;
        }
    }

    const minHeap = new MinHeap();

    function insert() {
        const value = parseInt(document.getElementById('value').value);
        if (!isNaN(value)) {
            minHeap.insert(value);
            minHeap.display();
            document.getElementById('value').value = '';
        }
    }

    function removeMin() {
        const min = minHeap.removeMin();
        alert(`Removed Min: ${min}`);
        minHeap.display();
    }

    function displayHeap() {
        minHeap.display();
    }
</script>

</body>
</html>
