<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Testing Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .pass {
            color: green;
        }
        .fail {
            color: red;
        }
        button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Unit Testing Demonstration</h1>
    <p>This page demonstrates basic unit testing concepts with JavaScript.</p>

    <div class="test-section">
        <h2>Test 1: Simple Calculator Functions</h2>
        <div id="test1-results"></div>
        <button onclick="runCalculatorTests()">Run Calculator Tests</button>
    </div>

    <div class="test-section">
        <h2>Test 2: String Utilities</h2>
        <div id="test2-results"></div>
        <button onclick="runStringTests()">Run String Tests</button>
    </div>

    <div class="test-section">
        <h2>Test 3: Asynchronous Testing</h2>
        <div id="test3-results"></div>
        <button onclick="runAsyncTests()">Run Async Tests</button>
    </div>

    <script>
        // Simple test framework
        const test = {
            assertEquals: function(actual, expected, testName) {
                const resultElement = document.createElement('div');
                if (actual === expected) {
                    resultElement.className = 'pass';
                    resultElement.textContent = `✓ ${testName}: Passed`;
                } else {
                    resultElement.className = 'fail';
                    resultElement.textContent = `✗ ${testName}: Failed (Expected ${expected}, got ${actual})`;
                }
                return resultElement;
            },
            assertTrue: function(condition, testName) {
                return this.assertEquals(condition, true, testName);
            },
            assertFalse: function(condition, testName) {
                return this.assertEquals(condition, false, testName);
            }
        };

        // Function to test: Calculator
        const calculator = {
            add: (a, b) => a + b,
            subtract: (a, b) => a - b,
            multiply: (a, b) => a * b,
            divide: (a, b) => b === 0 ? 'Error' : a / b
        };

        // Function to test: String utilities
        const stringUtils = {
            reverse: str => str.split('').reverse().join(''),
            isPalindrome: str => {
                const cleaned = str.toLowerCase().replace(/[^a-z0-9]/g, '');
                return cleaned === cleaned.split('').reverse().join('');
            }
        };

        // Function to test: Async function
        const asyncFunctions = {
            fetchData: () => {
                return new Promise(resolve => {
                    setTimeout(() => {
                        resolve({ id: 1, name: 'Test Data' });
                    }, 500);
                });
            }
        };

        // Test cases for calculator
        function runCalculatorTests() {
            const resultsContainer = document.getElementById('test1-results');
            resultsContainer.innerHTML = '<h3>Running Calculator Tests...</h3>';
            
            setTimeout(() => {
                resultsContainer.innerHTML = '';
                
                // Test add function
                resultsContainer.appendChild(
                    test.assertEquals(calculator.add(2, 3), 5, 'Add 2 and 3')
                );
                
                // Test subtract function
                resultsContainer.appendChild(
                    test.assertEquals(calculator.subtract(5, 3), 2, 'Subtract 3 from 5')
                );
                
                // Test multiply function
                resultsContainer.appendChild(
                    test.assertEquals(calculator.multiply(2, 4), 8, 'Multiply 2 and 4')
                );
                
                // Test divide function
                resultsContainer.appendChild(
                    test.assertEquals(calculator.divide(10, 2), 5, 'Divide 10 by 2')
                );
                
                // Test divide by zero
                resultsContainer.appendChild(
                    test.assertEquals(calculator.divide(10, 0), 'Error', 'Divide by zero')
                );
            }, 500);
        }

        // Test cases for string utilities
        function runStringTests() {
            const resultsContainer = document.getElementById('test2-results');
            resultsContainer.innerHTML = '<h3>Running String Tests...</h3>';
            
            setTimeout(() => {
                resultsContainer.innerHTML = '';
                
                // Test reverse string
                resultsContainer.appendChild(
                    test.assertEquals(stringUtils.reverse('hello'), 'olleh', 'Reverse "hello"')
                );
                
                // Test palindrome detection
                resultsContainer.appendChild(
                    test.assertTrue(stringUtils.isPalindrome('racecar'), 'Check "racecar" is palindrome')
                );
                
                resultsContainer.appendChild(
                    test.assertFalse(stringUtils.isPalindrome('hello'), 'Check "hello" is not palindrome')
                );
                
                resultsContainer.appendChild(
                    test.assertTrue(stringUtils.isPalindrome('A man, a plan, a canal, Panama!'), 'Check complex palindrome')
                );
            }, 500);
        }

        // Test cases for async functions
        function runAsyncTests() {
            const resultsContainer = document.getElementById('test3-results');
            resultsContainer.innerHTML = '<h3>Running Async Tests...</h3>';
            
            asyncFunctions.fetchData()
                .then(data => {
                    resultsContainer.innerHTML = '';
                    
                    resultsContainer.appendChild(
                        test.assertEquals(data.id, 1, 'Check returned data id')
                    );
                    
                    resultsContainer.appendChild(
                        test.assertEquals(data.name, 'Test Data', 'Check returned data name')
                    );
                })
                .catch(error => {
                    resultsContainer.innerHTML = '';
                    const errorElement = document.createElement('div');
                    errorElement.className = 'fail';
                    errorElement.textContent = `Error: ${error.message}`;
                    resultsContainer.appendChild(errorElement);
                });
        }
    </script>
</body>
</html>
