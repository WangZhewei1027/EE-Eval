<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depth-First Search (DFS)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #graph {
            width: 800px;
            height: 600px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Depth-First Search (DFS)</h1>
    <canvas id="graph"></canvas>

    <script>
        let graph = {
            'A': ['B', 'C'],
            'B': ['A', 'D', 'E'],
            'C': ['A', 'F'],
            'D': ['B'],
            'E': ['B', 'F'],
            'F': ['C', 'E']
        };

        let visited = new Set();
        let stack = [];

        function dfs(node, parent) {
            visited.add(node);
            stack.push(node);

            for (let child of graph[node]) {
                if (!visited.has(child)) {
                    dfs(child, node);
                }
            }

            stack.pop();
        }

        function drawGraph() {
            let ctx = document.getElementById('graph').getContext('2d');
            let graphCanvas = document.createElement('canvas');
            graphCanvas.width = 800;
            graphCanvas.height = 600;
            graphCanvas.style.position = 'absolute';
            graphCanvas.style.top = '0px';
            graphCanvas.style.left = '0px';
            graphCanvas.style.width = '100%';
            graphCanvas.style.height = '100%';
            document.body.appendChild(graphCanvas);

            ctx = graphCanvas.getContext('2d');
            drawGraph();

            for (let node in graph) {
                for (let child of graph[node]) {
                    if (child !== parent) {
                        ctx.beginPath();
                        ctx.moveTo(100, 100);
                        ctx.lineTo(300, 100);
                        ctx.stroke();
                    }
                }
            }
        }

        function startDFS() {
            for (let node in graph) {
                if (!visited.has(node)) {
                    dfs(node, null);
                }
            }
        }

        startDFS();

        drawGraph();
    </script>
</body>
</html>
