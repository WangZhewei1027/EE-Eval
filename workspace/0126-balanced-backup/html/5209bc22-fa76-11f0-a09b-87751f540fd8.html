<!DOCTYPE html>
<html>
<head>
    <title>Branch and Bound</title>
    <style>
        #graph {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div id="graph"></div>
    <script>
        let graph = document.getElementById('graph');
        let nodes = [];
        let edges = [];

        function addNode(node) {
            nodes.push(node);
            graph.innerHTML += `<div class="node">${node}</div>`;
        }

        function addEdge(edge) {
            edges.push(edge);
        }

        function isLeaf(node) {
            return nodes.indexOf(node) === nodes.length - 1;
        }

        function branch(node, parent) {
            let left = nodes.filter(n => n !== parent && isLeaf(n) && n !== node);
            let right = nodes.filter(n => n !== parent && !isLeaf(n) && n !== node);

            if (left.length === 0 && right.length === 0) {
                return null;
            }

            if (left.length > 0) {
                let leftParent = left[0];
                let leftResult = branch(left[0], leftParent);
                if (leftResult !== null) {
                    return leftResult;
                }
            }

            if (right.length > 0) {
                let rightParent = right[0];
                let rightResult = branch(right[0], rightParent);
                if (rightResult !== null) {
                    return rightResult;
                }
            }

            return null;
        }

        function bound(node) {
            let parent = nodes.indexOf(node);
            let left = nodes.filter(n => n !== parent && isLeaf(n) && n !== node);
            let right = nodes.filter(n => n !== parent && !isLeaf(n) && n !== node);

            if (left.length === 0 && right.length === 0) {
                return null;
            }

            if (left.length > 0) {
                let leftParent = left[0];
                let leftResult = bound(left[0]);
                if (leftResult !== null) {
                    return leftResult;
                }
            }

            if (right.length > 0) {
                let rightParent = right[0];
                let rightResult = bound(right[0]);
                if (rightResult !== null) {
                    return rightResult;
                }
            }

            return null;
        }

        addNode('A');
        addNode('B');
        addNode('C');
        addNode('D');
        addNode('E');

        addEdge('A', 'B');
        addEdge('A', 'C');
        addEdge('B', 'D');
        addEdge('C', 'E');

        let result = branch('A', null);
        console.log(result);
        console.log(bound('A'));
    </script>
</body>
</html>
