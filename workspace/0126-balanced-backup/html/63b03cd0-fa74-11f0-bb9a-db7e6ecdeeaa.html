<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hash Map Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f9f9f9;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    .container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgb(0 0 0 / 0.1);
      padding: 1.5rem;
      margin-top: 1rem;
    }
    input, select, button {
      font-size: 1rem;
      padding: 0.4rem 0.6rem;
      margin-right: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    button {
      background-color: #3498db;
      color: white;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #2980b9;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 0.6rem;
      text-align: left;
    }
    th {
      background-color: #2c3e50;
      color: white;
    }
    .log {
      margin-top: 1rem;
      background: #eef6fc;
      border: 1px solid #b3d4fc;
      padding: 0.8rem;
      border-radius: 4px;
      height: 100px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.9rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Hash Map Concept Demo in JavaScript</h1>
  <div class="container" aria-label="HashMap operations">
    <p>This demo implements a simple <strong>Hash Map</strong> that stores key-value pairs using a hash function and handles collisions by chaining.</p>

    <div>
      <label for="keyInput">Key:</label>
      <input type="text" id="keyInput" placeholder="Enter key" />
      <label for="valueInput">Value:</label>
      <input type="text" id="valueInput" placeholder="Enter value" />
      <button id="putBtn">Put</button>
      <button id="getBtn">Get</button>
      <button id="removeBtn">Remove</button>
      <button id="clearBtn" style="background-color:#c0392b;">Clear</button>
    </div>

    <h2>Current Hash Map State</h2>
    <table aria-label="Hash map table">
      <thead>
        <tr>
          <th>Bucket Index</th>
          <th>Key-Value Pairs (Chain)</th>
        </tr>
      </thead>
      <tbody id="hashmapBody">
        <!-- Filled by JS -->
      </tbody>
    </table>

    <h2>Logs</h2>
    <div class="log" id="logArea" aria-live="polite"></div>
  </div>

  <script>
    class HashMap {
      constructor(size = 10) {
        this.size = size;
        this.buckets = new Array(size).fill(null).map(() => []);
      }

      // Simple hash function to convert string key to a bucket index
      hash(key) {
        let hashValue = 0;
        for (let char of key) {
          hashValue = (hashValue + char.charCodeAt(0) * 23) % this.size;
        }
        return hashValue;
      }

      // Insert or update key-value
      put(key, value) {
        const index = this.hash(key);
        const bucket = this.buckets[index];
        for (let entry of bucket) {
          if (entry.key === key) {
            entry.value = value;
            return `Updated key "${key}" with new value "${value}" in bucket ${index}.`;
          }
        }
        bucket.push({ key, value });
        return `Inserted key "${key}" with value "${value}" in bucket ${index}.`;
      }

      // Retrieve value by key
      get(key) {
        const index = this.hash(key);
        const bucket = this.buckets[index];
        for (let entry of bucket) {
          if (entry.key === key) {
            return `Value for key "${key}" found: "${entry.value}" (bucket ${index})`;
          }
        }
        return `Key "${key}" not found in bucket ${index}.`;
      }

      // Remove key-value pair
      remove(key) {
        const index = this.hash(key);
        const bucket = this.buckets[index];
        for (let i = 0; i < bucket.length; i++) {
          if (bucket[i].key === key) {
            bucket.splice(i, 1);
            return `Key "${key}" removed from bucket ${index}.`;
          }
        }
        return `Cannot remove: key "${key}" not found in bucket ${index}.`;
      }

      // Clear all entries
      clear() {
        this.buckets = new Array(this.size).fill(null).map(() => []);
        return "Hash map cleared.";
      }

      // Return the entire map for display
      entries() {
        return this.buckets.map((bucket, index) => ({
          index,
          pairs: bucket.map(e => `${e.key}: ${e.value}`)
        }));
      }
    }

    // UI Elements
    const keyInput = document.getElementById('keyInput');
    const valueInput = document.getElementById('valueInput');
    const putBtn = document.getElementById('putBtn');
    const getBtn = document.getElementById('getBtn');
    const removeBtn = document.getElementById('removeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const hashmapBody = document.getElementById('hashmapBody');
    const logArea = document.getElementById('logArea');

    // Initialize HashMap
    const map = new HashMap(10);

    function renderHashMap() {
      hashmapBody.innerHTML = '';
      const entries = map.entries();
      for (const { index, pairs } of entries) {
        const row = document.createElement('tr');
        const indexCell = document.createElement('td');
        indexCell.textContent = index;
        const pairsCell = document.createElement('td');
        pairsCell.textContent = pairs.length ? pairs.join(' → ') : '(empty)';
        row.appendChild(indexCell);
        row.appendChild(pairsCell);
        hashmapBody.appendChild(row);
      }
    }

    function log(message) {
      const time = new Date().toLocaleTimeString();
      logArea.textContent += `[${time}] ${message}\n`;
      logArea.scrollTop = logArea.scrollHeight;
    }

    putBtn.onclick = () => {
      const key = keyInput.value.trim();
      const value = valueInput.value.trim();
      if (!key) {
        alert('Please enter a key.');
        return;
      }
      if (!value) {
        alert('Please enter a value.');
        return;
      }
      const msg = map.put(key, value);
      log(msg);
      renderHashMap();
    };

    getBtn.onclick = () => {
      const key = keyInput.value.trim();
      if (!key) {
        alert('Please enter a key.');
        return;
      }
      const msg = map.get(key);
      log(msg);
    };

    removeBtn.onclick = () => {
      const key = keyInput.value.trim();
      if (!key) {
        alert('Please enter a key.');
        return;
      }
      const msg = map.remove(key);
      log(msg);
      renderHashMap();
    };

    clearBtn.onclick = () => {
      if (confirm('Are you sure you want to clear the entire hash map?')) {
        const msg = map.clear();
        log(msg);
        renderHashMap();
      }
    };

    // Initial render
    renderHashMap();
  </script>
</body>
</html>
