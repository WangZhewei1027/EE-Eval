<!DOCTYPE html>
<html>
<head>
    <title>HTTPS Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #example {
            width: 400px;
            margin: 40px auto;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>HTTPS Example</h1>
    <p>This is a simple webpage demonstrating the HTTPS protocol.</p>
    <button id="generate-https-link">Generate HTTPS Link</button>
    <div id="example"></div>

    <script>
        const generateHttpsLink = () => {
            const link = document.getElementById('generate-https-link');
            link.href = `https://example.com/https-example`;
            link.click();
        };

        document.getElementById('generate-https-link').addEventListener('click', generateHttpsLink);
    </script>
</body>
</html>
