<!DOCTYPE html>
<html>
<head>
    <title>Load Balancing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

            max-width: 500px;
            margin: 40px auto;

<body>
    <div class="container">
        <h1>Load Balancer Example</h1>
        <img src="https://picsum.photos/200/300" alt="Logo">
        <p>This is a simple load balancer example using JavaScript and HTML.</p>
    </div>
    
    <script>
        // Function to simulate load balancing
        function loadBalancer() {
            // Simulate a heavy load on the server
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    console.log("Server is busy, please wait...");
                }, i * 1000);
            }
        }
        
        // Initialize the load balancer
        loadBalancer();
        
        // Function to handle incoming requests
        function handleRequest(request) {
            // Simulate a request being handled
            console.log(`Handling request: ${request}`);
            return "Request handled";
        }
        
        // Function to handle incoming requests
        function handleRequest2(request) {
            // Simulate a request being handled
            console.log(`Handling request: ${request}`);
            return "Request handled";
        }
        
        // Initialize the load balancer
        loadBalancer();
        
        // Function to handle incoming requests
        function handleRequest3(request) {
            // Simulate a request being handled
            console.log(`Handling request: ${request}`);
            return "Request handled";
        }
        
        // Initialize the load balancer
        loadBalancer();
        
        // Function to handle incoming requests
        function handleRequest4(request) {
            // Simulate a request being handled
            console.log(`Handling request: ${request}`);
            return "Request handled";
        }
        
        // Initialize the load balancer
        loadBalancer();
    </script>
</body>
