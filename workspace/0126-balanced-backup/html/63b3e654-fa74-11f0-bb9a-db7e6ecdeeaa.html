<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Garbage Collection Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2rem;
    background: #f0f8ff;
    color: #333;
  }
  h1 {
    color: #0366d6;
  }
  #log {
    background: #eef6fc;
    border: 1px solid #b6d4fa;
    border-radius: 5px;
    padding: 1rem;
    max-height: 300px;
    overflow-y: auto;
    font-family: monospace;
    margin-top: 1rem;
  }
  button {
    background: #28a745;
    border: none;
    color: white;
    padding: 0.6rem 1.2rem;
    margin-top: 1rem;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 5px;
  }
  button:active {
    background: #218838;
  }
  .warning {
    color: #d6336c;
  }
</style>
</head>
<body>
<h1>JavaScript Garbage Collection Demonstration</h1>

<p>
  This demo explains how JavaScript's garbage collector works by managing objects' lifetimes.
  When objects are no longer referenced, the garbage collector frees that memory automatically.
</p>

<button id="createObjectsBtn">Create Objects</button>
<button id="dropReferencesBtn" disabled>Drop References</button>
<button id="forceGCBtn" disabled title="Force GC only works in some browsers with flags enabled">Request Garbage Collection (if available)</button>

<div id="log"></div>

<script>
(() => {
  const logEl = document.getElementById('log');
  const createBtn = document.getElementById('createObjectsBtn');
  const dropBtn = document.getElementById('dropReferencesBtn');
  const forceGCBtn = document.getElementById('forceGCBtn');

  // Store objects in closures to simulate references
  let objectsArray = null;

  // Helper to log messages with timestamp
  function log(msg, special = false) {
    const time = new Date().toLocaleTimeString();
    const p = document.createElement('p');
    if (special) p.classList.add('warning');
    p.textContent = `[${time}] ${msg}`;
    logEl.appendChild(p);
    logEl.scrollTop = logEl.scrollHeight;
  }

  // Class to monitor instances through FinalizationRegistry
  class DemoObject {
    constructor(id) {
      this.id = id;
    }
  }

  // Set up FinalizationRegistry to be notified when objects are GC'd
  const registry = new FinalizationRegistry((id) => {
    log(`🔄 Garbage Collector reclaimed DemoObject with id: ${id}`, true);
  });

  // Used to create objects and hold references
  function createObjects() {
    if(objectsArray !== null) {
      log("Objects already created. Drop references first.");
      return;
    }
    objectsArray = [];

    log("Creating 1000 DemoObject instances and registering them for finalization...");

    for(let i=0; i<1000; i++) {
      const obj = new DemoObject(i);
      // Register obj for finalization with its id as token
      registry.register(obj, i);
      objectsArray.push(obj);
    }

    log("1000 objects created and referenced in an array.");
    dropBtn.disabled = false;
    forceGCBtn.disabled = false;
    createBtn.disabled = true;
  }

  // Drop all references to allow GC to collect those objects
  function dropReferences() {
    if(objectsArray === null) {
      log("No objects to drop references from.");
      return;
    }
    objectsArray = null; 
    log("Dropped references to all objects. Now they are eligible for garbage collection.");
    dropBtn.disabled = true;
  }

  // Try to force garbage collection (only works in some browsers with flags)
  function forceGC() {
    if (window.gc) {
      log("Requesting garbage collection...");
      window.gc();
      log("Garbage collection requested.");
    } else {
      log("Garbage collection cannot be forced in this browser. It runs automatically.", true);
    }
  }

  // Add event listeners
  createBtn.addEventListener('click', createObjects);
  dropBtn.addEventListener('click', dropReferences);
  forceGCBtn.addEventListener('click', forceGC);

  // Initial log
  log("Welcome! Click 'Create Objects' to start.");
})();
</script>

</body>
</html>
