<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overfitting Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        #chart {
            width: 600px;
            height: 400px;
            margin: auto;
            background-color: white;
            border: 1px solid #ccc;
        }
        #controls {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Overfitting Demonstration</h1>
    <p>This demonstration shows the concept of overfitting in machine learning using a simple polynomial regression.</p>
    <div id="chart"></div>
    <div id="controls">
        <button onclick="drawGraph(1)">Underfitting</button>
        <button onclick="drawGraph(3)">Just Right</button>
        <button onclick="drawGraph(10)">Overfitting</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const ctx = document.getElementById('chart').getContext('2d');
        let myChart;

        function drawGraph(degree) {
            const dataX = Array.from({length: 30}, (_, i) => i / 5);
            const dataY = dataX.map(x => Math.sin(x) + (Math.random() * 0.2 - 0.1)); // Adding noise

            const polynomialCoefficients = Array.from({length: degree + 1}, () => Math.random() * 2 - 1); // Random coefficients

            const predictedY = dataX.map(x => {
                return polynomialCoefficients.reduce((sum, coeff, index) => sum + coeff * Math.pow(x, index), 0);
            });

            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: 'Data Points',
                        data: dataY.map((y, index) => ({ x: dataX[index], y })),
                        backgroundColor: 'rgba(75, 192, 192, 0.6)',
                        showLine: false,
                        pointRadius: 3
                    }, {
                        label: 'Polynomial Fit',
                        data: predictedY.map((y, index) => ({ x: dataX[index], y })),
                        borderColor: degree > 5 ? 'rgba(255, 99, 132, 1)' : 'rgba(54, 162, 235, 1)',
                        borderWidth: 2,
                        fill: false,
                        type: 'line'
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: false
                        }
                    }
                }
            });
        }

        // Draw the default graph
        drawGraph(1);
    </script>
</body>
</html>
