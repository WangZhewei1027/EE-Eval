<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijkstra's Algorithm Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #graph-container {
            width: 600px;
            height: 400px;
            border: 1px solid #ccc;
            margin: 20px 0;
            position: relative;
        }
        .node {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #4CAF50;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .node.start {
            background-color: #2196F3;
        }
        .node.end {
            background-color: #F44336;
        }
        .node.visited {
            background-color: #FFC107;
        }
        .node.path {
            background-color: #9C27B0;
        }
        .edge {
            position: absolute;
            height: 2px;
            background-color: #333;
            transform-origin: 0 0;
        }
        .weight {
            position: absolute;
            background-color: white;
            padding: 2px;
            font-size: 12px;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            padding: 8px 16px;
            margin: 0 5px;
            cursor: pointer;
        }
        #info-panel {
            margin-top: 20px;
            width: 600px;
            border: 1px solid #ddd;
            padding: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Dijkstra's Algorithm Visualization</h1>
    <div class="controls">
        <button id="add-node">Add Node</button>
        <button id="add-edge">Add Edge</button>
        <button id="set-start">Set Start Node</button>
        <button id="set-end">Set End Node</button>
        <button id="run-algorithm">Run Dijkstra's</button>
        <button id="reset">Reset</button>
    </div>
    <div id="graph-container"></div>
    <div id="info-panel">
        <h3>Algorithm Steps:</h3>
        <div id="steps"></div>
        <h3>Distance Table:</h3>
        <table id="distance-table">
            <thead>
                <tr>
                    <th>Node</th>
                    <th>Distance</th>
                    <th>Previous</th>
                    <th>Visited</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        // Graph representation
        const graph = {
            nodes: [],
            edges: [],
            startNode: null,
            endNode: null,
            nextNodeId: 1
        };

        // UI elements
        const graphContainer = document.getElementById('graph-container');
        const stepsDiv = document.getElementById('steps');
        const distanceTable = document.getElementById('distance-table').querySelector('tbody');
        const addNodeBtn = document.getElementById('add-node');
        const addEdgeBtn = document.getElementById('add-edge');
        const setStartBtn = document.getElementById('set-start');
        const setEndBtn = document.getElementById('set-end');
        const runAlgorithmBtn = document.getElementById('run-algorithm');
        const resetBtn = document.getElementById('reset');

        // State variables
        let mode = 'add-node';
        let edgeStart = null;

        // Initialize
        function init() {
            addNodeBtn.addEventListener('click', () => mode = 'add-node');
            addEdgeBtn.addEventListener('click', () => mode = 'add-edge');
            setStartBtn.addEventListener('click', () => mode = 'set-start');
            setEndBtn.addEventListener('click', () => mode = 'set-end');
            runAlgorithmBtn.addEventListener('click', runDijkstra);
            resetBtn.addEventListener('click', resetGraph);

            graphContainer.addEventListener('click', handleGraphClick);
        }

        // Handle graph clicks
        function handleGraphClick(e) {
            if (e.target === graphContainer) {
                // Clicked on empty space
                if (mode === 'add-node') {
                    addNode(e.clientX - graphContainer.getBoundingClientRect().left, 
                            e.clientY - graphContainer.getBoundingClientRect().top);
                }
            } else if (e.target.classList.contains('node')) {
                const nodeId = parseInt(e.target.getAttribute('data-id'));
                
                if (mode === 'add-edge') {
                    if (!edgeStart) {
                        edgeStart = nodeId;
                        e.target.classList.add('selected');
                    } else if (edgeStart !== nodeId) {
                        const weight = prompt('Enter edge weight:', '1');
                        if (weight && !isNaN(weight)) {
                            addEdge(edgeStart, nodeId, parseInt(weight));
                        }
                        document.querySelector(`.node[data-id="${edgeStart}"]`).classList.remove('selected');
                        edgeStart = null;
                    }
                } else if (mode === 'set-start') {
                    if (graph.startNode) {
                        document.querySelector(`.node[data-id="${graph.startNode}"]`).classList.remove('start');
                    }
                    graph.startNode = nodeId;
                    e.target.classList.add('start');
                } else if (mode === 'set-end') {
                    if (graph.endNode) {
                        document.querySelector(`.node[data-id="${graph.endNode}"]`).classList.remove('end');
                    }
                    graph.endNode = nodeId;
                    e.target.classList.add('end');
                }
            }
        }

        // Add a node to the graph
        function addNode(x, y) {
            const nodeId = graph.nextNodeId++;
            graph.nodes.push({
                id: nodeId,
                x: x,
                y: y
            });

            const nodeElement = document.createElement('div');
            nodeElement.className = 'node';
            nodeElement.setAttribute('data-id', nodeId);
            nodeElement.style.left = (x - 15) + 'px';
            nodeElement.style.top = (y - 15) + 'px';
            nodeElement.textContent = nodeId;
            graphContainer.appendChild(nodeElement);
        }

        // Add an edge to the graph
        function addEdge(from, to, weight) {
            // Check if edge already exists
            if (const existingEdge = graph.edges.find(e => 
                (e.from === from && e.to === to) || (e.from === to && e.to === from))) {
                return;
            }

            graph.edges.push({
                from: from,
                to: to,
                weight: weight
            });

            drawEdge(from, to, weight);
        }

        // Draw an edge on the canvas
        function drawEdge(from, to, weight) {
            const fromNode = graph.nodes.find(n => n.id === from);
            const toNode = graph.nodes.find(n => n.id === to);

            if (!fromNode || !toNode) return;

            const x1 = fromNode.x;
            const y1 = fromNode.y;
            const x2 = toNode.x;
            const y2 = toNode.y;

            // Calculate edge position and angle
            const length = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
            const angle = Math.atan2(y2 - y1, x2 - x1);

            // Create edge element
            const edgeElement = document.createElement('div');
            edgeElement.className = 'edge';
            edgeElement.setAttribute('data-from', from);
            edgeElement.setAttribute('data-to', to);
            edgeElement.style.left = x1 + 'px';
            edgeElement.style.top = y1 + 'px';
            edgeElement.style.width = length + 'px';
            edgeElement.style.transform = `rotate(${angle}rad)`;

            // Create weight element
            const weightElement = document.createElement('div');
            weightElement.className = 'weight';
            weightElement.textContent = weight;
            weightElement.style.left = (x1 + (x2 - x1) / 2 - 10) + 'px';
            weightElement.style.top = (y1 + (y2 - y1) / 2 - 10) + 'px';

            graphContainer.appendChild(edgeElement);
            graphContainer.appendChild(weightElement);
        }

        // Run Dijkstra's algorithm
        function runDijkstra() {
            if (!graph.startNode) {
                alert('Please set a start node');
                return;
            }

            // Reset all nodes
            document.querySelectorAll('.node').forEach(node => {
                node.classList.remove('visited', 'path');
            });

            // Initialize distances
            const distances = {};
            const previous = {};
            const visited = new Set();
            const unvisited = new Set(graph.nodes.map(n => n.id));

            graph.nodes.forEach(node => {
                distances[node.id] = node.id === graph.startNode ? 0 : Infinity;
                previous[node.id] = null;
            });

            stepsDiv.innerHTML = '';
            updateDistanceTable(distances, previous, visited);

            // Main algorithm loop
            while (unvisited.size > 0) {
                // Find node with smallest distance
                let current = null;
                let smallestDistance = Infinity;

                for (const nodeId of unvisited) {
                    if (distances[nodeId] < smallestDistance) {
                        smallestDistance = distances[nodeId];
                        current = nodeId;
                    }
                }

                if (current === null || smallestDistance === Infinity) {
                    break; // No more reachable nodes
                }

                // Mark as visited
                unvisited.delete(current);
                visited.add(current);
                document.querySelector(`.node[data-id="${current}"]`).classList.add('visited');

                // Update neighbors
                const neighbors = graph.edges.filter(e => e.from === current || e.to === current);
                for (const edge of neighbors) {
                    const neighbor = edge.from === current ? edge.to : edge.from;
                    if (visited.has(neighbor)) continue;

                    const newDistance = distances[current] + edge.weight;
                    if (newDistance < distances[neighbor]) {
                        distances[neighbor] = newDistance;
                        previous[neighbor] = current;
                    }
                }

                // Add to steps
                const step = document.createElement('div');
                step.textContent = `Visited node ${current}, updated distances to neighbors`;
                stepsDiv.appendChild(step);

                updateDistanceTable(distances, previous, visited);
            }

            // Highlight shortest path if end node is set
            if (graph.endNode && previous[graph.endNode] !== null) {
                let path = [];
                let current = graph.endNode;
                while (current !== null) {
                    path.unshift(current);
                    current = previous[current];
                }

                for (let i = 0; i < path.length; i++) {
                    document.querySelector(`.node[data-id="${path[i]}"]`).classList.add('path');
                }

                const pathStr = path.join(' → ');
                const pathDiv = document.createElement('div');
                pathDiv.innerHTML = `<strong>Shortest path from ${graph.startNode} to ${graph.endNode}:</strong> ${pathStr} (Distance: ${distances[graph.endNode]})`;
                stepsDiv.appendChild(pathDiv);
            }
        }

        // Update the distance table
        function updateDistanceTable(distances, previous, visited) {
            distanceTable.innerHTML = '';
            graph.nodes.forEach(node => {
                const row = document.createElement('tr');
                
                const idCell = document.createElement('td');
                idCell.textContent = node.id;
                row.appendChild(idCell);
                
                const distCell = document.createElement('td');
                distCell.textContent = distances[node.id] === Infinity ? '∞' : distances[node.id];
                row.appendChild(distCell);
                
                const prevCell = document.createElement('td');
                prevCell.textContent = previous[node.id] || '-';
                row.appendChild(prevCell);
                
                const visitedCell = document.createElement('td');
                visitedCell.textContent = visited.has(node.id) ? 'Yes' : 'No';
                row.appendChild(visitedCell);
                
                distanceTable.appendChild(row);
            });
        }

        // Reset the graph
        function resetGraph() {
            graph.nodes = [];
            graph.edges = [];
            graph.startNode = null;
            graph.endNode = null;
            graph.nextNodeId = 1;
            graphContainer.innerHTML = '';
            stepsDiv.innerHTML = '';
            distanceTable.innerHTML = '';
            mode = 'add-node';
            edgeStart = null;
        }

        // Initialize the app
        init();

        // Add some sample nodes and edges for demonstration
        function addSampleGraph() {
            // Add nodes
            addNode(100, 100);
            addNode(300, 100);
            addNode(100, 300);
            addNode(300, 300);
            addNode(500, 200);

            // Add edges
            addEdge(1, 2, 4);
            addEdge(1, 3, 2);
            addEdge(2, 3, 1);
            addEdge(2, 4, 5);
            addEdge(3, 4, 8);
            addEdge(4, 5, 3);

            // Set start and end nodes
            graph.startNode = 1;
            graph.endNode = 5;
            document.querySelector(`.node[data-id="1"]`).classList.add('start');
            document.querySelector(`.node[data-id="5"]`).classList.add('end');
        }

        // Uncomment to add sample graph on load
        // addSampleGraph();
    </script>
</body>
</html>
