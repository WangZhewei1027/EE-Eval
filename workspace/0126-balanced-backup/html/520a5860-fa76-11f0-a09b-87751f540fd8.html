<!DOCTYPE html>
<html>
<head>
    <title>Semaphore Example</title>
    <style>
        #semaphore {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 1px solid black;
            border-radius: 50%;
            display: inline-block;
            font-size: 24px;
            line-height: 50px;
            cursor: pointer;
        }

        #semaphore:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <button id="semaphore">Start</button>
    <p id="message"></p>

    <script>
        let semaphore = document.getElementById('semaphore');
        let message = document.getElementById('message');

        semaphore.addEventListener('click', function() {
            if (semaphore.classList.contains('running')) {
                semaphore.classList.remove('running');
                semaphore.textContent = 'Running';
                setTimeout(function() {
                    semaphore.classList.add('running');
                    semaphore.textContent = 'Waiting';
                    message.textContent = 'Waiting for semaphore to be released';
                }, 500);
            } else {
                semaphore.classList.remove('running');
                semaphore.textContent = 'Running';
                setTimeout(function() {
                    semaphore.classList.add('running');
                    semaphore.textContent = 'Waiting';
                    message.textContent = 'Semaphore released';
                }, 500);
            }
        });
    </script>
</body>
</html>
