<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Sort Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        .bar {
            display: inline-block;
            width: 20px;
            margin: 0 2px;
            background-color: teal;
        }
        .highlight {
            background-color: orange;
        }
        #array {
            display: flex;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<h1>Selection Sort Visualization</h1>
<div id="array"></div>
<button onclick="selectionSort()">Sort Array</button>
<button onclick="generateArray()">Generate New Array</button>

<script>
    let array = [];

    function generateArray() {
        array = [];
        for (let i = 0; i < 10; i++) {
            array.push(Math.floor(Math.random() * 100) + 1);
        }
        displayArray();
    }

    function displayArray() {
        const arrayDiv = document.getElementById('array');
        arrayDiv.innerHTML = '';
        array.forEach(value => {
            const bar = document.createElement('div');
            bar.classList.add('bar');
            bar.style.height = value * 2 + 'px';
            bar.textContent = value;
            arrayDiv.appendChild(bar);
        });
    }

    async function selectionSort() {
        let length = array.length;
        for (let i = 0; i < length - 1; i++) {
            let minIndex = i;
            highlightBar(i);
            for (let j = i + 1; j < length; j++) {
                highlightBar(j);
                await new Promise(resolve => setTimeout(resolve, 500));
                if (array[j] < array[minIndex]) {
                    if (minIndex !== i) {
                        resetHighlight(minIndex);
                    }
                    minIndex = j;
                    highlightBar(minIndex);
                } else {
                    resetHighlight(j);
                }
            }
            if (minIndex !== i) {
                [array[i], array[minIndex]] = [array[minIndex], array[i]];
                await new Promise(resolve => setTimeout(resolve, 500));
                displayArray();
            }
            resetHighlight(i);
        }
        highlightSortedIndices(length - 1);
    }

    function highlightBar(index) {
        const bars = document.querySelectorAll('.bar');
        bars[index].classList.add('highlight');
    }

    function resetHighlight(index) {
        const bars = document.querySelectorAll('.bar');
        bars[index].classList.remove('highlight');
    }

    function highlightSortedIndices(index) {
        const bars = document.querySelectorAll('.bar');
        bars[index].style.backgroundColor = 'green';
    }

    window.onload = generateArray;
</script>

</body>
</html>
