<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Linked List</title>
    <style>
        /* Style the list */
        #list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        #list li {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        
        #list li:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <h1>Circular Linked List</h1>
    <ul id="list">
        <li>Node 1</li>
        <li>Node 2</li>
        <li>Node 3</li>
        <li>Node 4</li>
        <li>Node 5</li>
    </ul>

    <script>
        class Node {
            constructor(data) {
                this.data = data;
                this.next = null;
            }
        }

        class CircularLinkedList {
            constructor() {
                this.head = null;
            }

            addNode(data) {
                if (!this.head) {
                    this.head = new Node(data);
                    this.head.next = this.head;
                } else {
                    let newNode = new Node(data);
                    let temp = this.head;
                    while (temp.next !== this.head) {
                        temp = temp.next;
                    }
                    temp.next = newNode;
                    newNode.next = this.head;
                }
            }

            printList() {
                let temp = this.head;
                let output = "";
                while (temp !== null) {
                    output += temp.data + " ";
                    temp = temp.next;
                }
                console.log(output);
            }
        }

        let list = new CircularLinkedList();
        list.addNode("Node 1");
        list.addNode("Node 2");
        list.addNode("Node 3");
        list.addNode("Node 4");
        list.addNode("Node 5");

        list.printList();
    </script>
</body>
</html>
