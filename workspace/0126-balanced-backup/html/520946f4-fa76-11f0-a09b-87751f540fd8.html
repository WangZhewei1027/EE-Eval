<!DOCTYPE html>
<html>
<head>
    <title>Kruskal's Algorithm</title>
    <style>
        table {
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>Kruskal's Algorithm</h1>
    <button id="generate-kmp-btn">Generate Graph</button>
    <button id="run-kmp-btn">Run Kruskal's Algorithm</button>
    <div id="graph"></div>
    <script>
        const graph = document.getElementById('graph');
        const generateGraphBtn = document.getElementById('generate-kmp-btn');
        const runKMPBtn = document.getElementById('run-kmp-btn');

        generateGraphBtn.addEventListener('click', generateGraph);
        runKMPBtn.addEventListener('click', runKMP);

        function generateGraph() {
            const edges = [
                { from: 0, to: 1, weight: 10 },
                { from: 1, to: 2, weight: 20 },
                { from: 2, to: 3, weight: 30 },
                { from: 3, to: 0, weight: 40 },
                { from: 0, to: 4, weight: 50 },
                { from: 4, to: 5, weight: 60 },
            ];

            const graphData = [];
            for (const edge of edges) {
                if (graphData[edge.from].length === 0 || graphData[edge.to].length === 0) {
                    graphData[edge.from] = [edge];
                    graphData[edge.to] = [edge];
                } else {
                    const minWeight = Math.min(...graphData[edge.from].map(node => node.weight));
                    const minIndex = graphData[edge.from].indexOf(node => node.weight === minWeight);
                    graphData[edge.from][minIndex].push(edge);
                    graphData[edge.to].push(edge);
                }
            }

            const edgesList = [];
            for (const node of graphData) {
                edgesList.push({ from: node[0], to: node[1], weight: node[2] });
            }

            const mst = kruskalAlgorithm(edgesList);
            const result = generateMST(mst);
            const html = result.map(node => `<tr><td>${node.from}</td><td>${node.to}</td><td>${node.weight}</td></tr>`).join('');
            graph.innerHTML = html;
        }

        function kruskalAlgorithm(edges) {
            edges.sort((a, b) => a.weight - b.weight);
            const mst = [];
            let parent = {};
            let rank = {};

            for (const edge of edges) {
                if (mst.length === 0 || edge.weight < mst[mst.length - 1].weight) {
                    mst.push(edge);
                    parent[edge.from] = edge.to;
                    rank[edge.to] = edge.to;
                } else if (edge.weight === mst[mst.length - 1].weight && edge.from !== mst[mst.length - 1].to) {
                    mst[mst.length - 1].weight = edge.weight;
                    parent[edge.from] = edge.to;
                    rank[edge.to] = edge.to;
                }
            }

            return mst;
        }

        function generateMST(mst) {
            const html = [];
            for (const edge of mst) {
                html.push(`<tr><td>${edge.from}</td><td>${edge.to}</td><td>${edge.weight}</td></tr>`);
            }
            return html.join('');
        }
    </script>
</body>
</html>
