<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interpreter Pattern Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <h1>Interpreter Pattern Demo</h1>
    <p>Input a mathematical expression using numbers and '+' or '-' operators:</p>
    <input type="text" id="expression" placeholder="e.g., 3 + 5 - 2">
    <button id="interpret-btn">Interpret</button>
    
    <div class="result" id="result"></div>

    <script>
        // Abstract expression
        class Expression {
            interpret() {
                throw new Error("This method should be implemented by the concrete class.");
            }
        }

        // Terminal expressions for numbers
        class NumberExpression extends Expression {
            constructor(value) {
                super();
                this.value = value;
            }
            
            interpret() {
                return this.value;
            }
        }

        // Non-terminal expression for addition
        class AddExpression extends Expression {
            constructor(left, right) {
                super();
                this.left = left;
                this.right = right;
            }

            interpret() {
                return this.left.interpret() + this.right.interpret();
            }
        }

        // Non-terminal expression for subtraction
        class SubtractExpression extends Expression {
            constructor(left, right) {
                super();
                this.left = left;
                this.right = right;
            }

            interpret() {
                return this.left.interpret() - this.right.interpret();
            }
        }

        // Function to parse the expression
        function parseExpression(expression) {
            const tokens = expression.split(" ");
            const stack = [];

            tokens.forEach(token => {
                if (!isNaN(token)) {
                    stack.push(new NumberExpression(parseInt(token)));
                } else if (token === '+') {
                    const right = stack.pop();
                    const left = stack.pop();
                    stack.push(new AddExpression(left, right));
                } else if (token === '-') {
                    const right = stack.pop();
                    const left = stack.pop();
                    stack.push(new SubtractExpression(left, right));
                }
            });

            return stack[0];
        }

        // Handle the button click event
        document.getElementById('interpret-btn').addEventListener('click', function() {
            const expressionInput = document.getElementById('expression').value;
            const expression = parseExpression(expressionInput);
            const result = expression.interpret();

            document.getElementById('result').textContent = 'Result: ' + result;
        });
    </script>
</body>
</html>
