<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Memory</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            width: 80%;
            margin: 40px auto;
            text-align: center;
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Virtual Memory Example</h1>
        <p>Imagine you have a computer with 16 GB of RAM, and you want to run 10 applications simultaneously.</p>
        <button id="run-apps">Run Apps</button>
        <button id="stop-apps">Stop Apps</button>
        <div id="memory-usage"></div>
    </div>

    <script>
        let apps = 10;
        let memoryUsage = 0;

        const runApps = () => {
            apps++;
            memoryUsage += 1000; // simulate memory usage
            document.getElementById('memory-usage').innerText = `Memory Usage: ${memoryUsage} MB`;
            if (apps > 16) {
                stopApps();
            }
        };

        const stopApps = () => {
            apps--;
            memoryUsage -= 1000; // simulate memory usage
            document.getElementById('memory-usage').innerText = `Memory Usage: ${memoryUsage} MB`;
            if (apps === 0) {
                alert('All apps stopped!');
            }
        };

        const handleButtonClick = (buttonId) => {
            switch (buttonId) {
                case 'run-apps':
                    runApps();
                    break;
                case 'stop-apps':
                    stopApps();
                    break;
            }
        };

        document.getElementById('run-apps').addEventListener('click', handleButtonClick);
        document.getElementById('stop-apps').addEventListener('click', handleButtonClick);
    </script>
</body>
</html>
