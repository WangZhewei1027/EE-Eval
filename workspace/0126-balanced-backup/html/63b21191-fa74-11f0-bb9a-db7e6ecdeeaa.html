<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Backtracking Demo: N-Queens Problem</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f0f0f0;
  }
  h1 {
    text-align: center;
  }
  #controls {
    text-align: center;
    margin-bottom: 20px;
  }
  input[type=number] {
    width: 50px;
    font-size: 16px;
    text-align: center;
  }
  button {
    font-size: 16px;
    padding: 5px 12px;
    margin-left: 10px;
    cursor: pointer;
  }
  #board {
    margin: 0 auto;
    width: fit-content;
    border: 2px solid #333;
    background: #fff;
  }
  .row {
    display: flex;
  }
  .cell {
    width: 40px;
    height: 40px;
    border: 1px solid #aaa;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    user-select: none;
    font-weight: bold;
  }
  .cell.black {
    background: #769656;
  }
  .cell.white {
    background: #eeeed2;
  }
  #log {
    max-width: 600px;
    margin: 20px auto 0 auto;
    background: #272822;
    color: #f8f8f2;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
    height: 180px;
    overflow-y: auto;
    border-radius: 5px;
    white-space: pre-wrap;
  }
  #status {
    text-align: center;
    margin-top: 15px;
    font-weight: bold;
  }
  a {
    color: #0066cc;
  }
</style>
</head>
<body>
<h1>Backtracking Visualization: N-Queens Problem</h1>
<div id="controls">
  <label for="nSize">Board size (N): </label>
  <input type="number" id="nSize" min="4" max="12" value="8" />
  <button id="startBtn">Start Backtracking</button>
  <button id="nextStepBtn" disabled>Next Step</button>
  <button id="autoRunBtn" disabled>Auto Run</button>
  <button id="resetBtn">Reset</button>
</div>
<div id="board"></div>
<div id="status"></div>
<div id="log" aria-live="polite" aria-atomic="true"></div>
<script>
(() => {
  const boardEl = document.getElementById('board');
  const nInput = document.getElementById('nSize');
  const startBtn = document.getElementById('startBtn');
  const nextStepBtn = document.getElementById('nextStepBtn');
  const resetBtn = document.getElementById('resetBtn');
  const autoRunBtn = document.getElementById('autoRunBtn');
  const statusEl = document.getElementById('status');
  const logEl = document.getElementById('log');

  let N = 8;
  let board = [];
  let solutionsCount = 0;
  let currentRow = 0;
  let running = false;
  let autoRunInterval = null;

  // Backtracking state holding variable
  // We'll create a generator function for backtracking, so we can "step" through it.

  function createBoard(n) {
    boardEl.innerHTML = '';
    boardEl.style.gridTemplateColumns = `repeat(${n}, 40px)`;
    boardEl.style.width = `${n * 40}px`;

    for (let r = 0; r < n; r++) {
      const row = document.createElement('div');
      row.classList.add('row');
      for (let c = 0; c < n; c++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        // color cells like chess board
        if ((r + c) % 2 === 1) {
          cell.classList.add('black');
        } else {
          cell.classList.add('white');
        }
        cell.id = `cell-${r}-${c}`;
        row.appendChild(cell);
      }
      boardEl.appendChild(row);
    }
  }

  // Update UI board from board array
  function updateBoardUI(boardArray) {
    const n = boardArray.length;
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        const cell = document.getElementById(`cell-${r}-${c}`);
        if (boardArray[r] === c) {
          cell.textContent = "♛"; // Queen Unicode symbol
          cell.style.color = '#d22';
        } else {
          cell.textContent = '';
        }
      }
    }
  }

  // Check if queen placement is safe
  function isSafe(board, row, col) {
    for (let i = 0; i < row; i++) {
      if (
        board[i] === col || // same column
        board[i] - i === col - row || // same diagonal \
        board[i] + i === col + row // same diagonal /
      ) {
        return false;
      }
    }
    return true;
  }

  // Generator for backtracking - yields after placing each queen and after each backtrack
  function* solveNQueens(n) {
    let board = new Array(n).fill(-1);

    function* backtrack(row) {
      if (row === n) {
        // Found a solution
        yield { type: 'solution', board: [...board] };
        return;
      }
      for (let col = 0; col < n; col++) {
        yield { type: 'try', row, col };
        if (isSafe(board, row, col)) {
          board[row] = col;
          yield { type: 'place', row, col, board: [...board] };
          yield* backtrack(row + 1);
          board[row] = -1; // backtrack
          yield { type: 'remove', row, col };
        } else {
          yield { type: 'fail', row, col };
        }
      }
    }
    yield* backtrack(0);
  }

  function logMessage(msg) {
    logEl.textContent += msg + '\n';
    logEl.scrollTop = logEl.scrollHeight;
  }

  let solverGen = null;

  function reset() {
    N = parseInt(nInput.value, 10);
    if (isNaN(N) || N < 4 || N > 12) {
      alert('Please enter a number between 4 and 12');
      N = 8;
      nInput.value = 8;
    }
    board = new Array(N).fill(-1);
    createBoard(N);
    updateBoardUI(board);
    solutionsCount = 0;
    currentRow = 0;
    running = false;
    solverGen = null;
    statusEl.textContent = '';
    logEl.textContent = '';
    nextStepBtn.disabled = true;
    autoRunBtn.disabled = true;
    startBtn.disabled = false;
    if (autoRunInterval) {
      clearInterval(autoRunInterval);
      autoRunInterval = null;
      autoRunBtn.textContent = 'Auto Run';
    }
  }

  function onStep() {
    if (!solverGen) return;
    const res = solverGen.next();
    if (res.done) {
      statusEl.textContent = `All solutions found: ${solutionsCount}`;
      nextStepBtn.disabled = true;
      autoRunBtn.disabled = true;
      startBtn.disabled = false;
      running = false;
      if (autoRunInterval) {
        clearInterval(autoRunInterval);
        autoRunInterval = null;
        autoRunBtn.textContent = 'Auto Run';
      }
      return;
    }
    const val = res.value;
    if (!val) return;

    switch (val.type) {
      case 'try':
        statusEl.textContent = `Trying to place queen at row ${val.row + 1}, col ${val.col + 1}...`;
        logMessage(`Trying (r${val.row + 1}, c${val.col + 1})`);
        break;
      case 'fail':
        logMessage(`Conflict detected at (r${val.row + 1}, c${val.col + 1}), cannot place queen.`);
        break;
      case 'place':
        board[val.row] = val.col;
        updateBoardUI(board);
        statusEl.textContent = `Placed queen at row ${val.row + 1}, col ${val.col + 1}.`;
        logMessage(`Placed queen at (r${val.row + 1}, c${val.col + 1})`);
        break;
      case 'remove':
        board[val.row] = -1;
        updateBoardUI(board);
        statusEl.textContent = `Backtracking from row ${val.row + 1}, removed queen from col ${val.col + 1}.`;
        logMessage(`Removing queen at (r${val.row + 1}, c${val.col + 1}) - backtrack`);
        break;
      case 'solution':
        solutionsCount++;
        updateBoardUI(val.board);
        statusEl.textContent = `Solution #${solutionsCount} found!`;
        logMessage(`=== Solution #${solutionsCount} ===`);
        break;
    }
  }

  function onAutoRun() {
    if (!solverGen) return;
    if (autoRunInterval) {
      clearInterval(autoRunInterval);
      autoRunInterval = null;
      autoRunBtn.textContent = 'Auto Run';
      nextStepBtn.disabled = false;
      startBtn.disabled = false;
    } else {
      autoRunBtn.textContent = 'Pause';
      nextStepBtn.disabled = true;
      startBtn.disabled = true;
      autoRunInterval = setInterval(() => {
        onStep();
        if (!running) {
          clearInterval(autoRunInterval);
          autoRunInterval = null;
          autoRunBtn.textContent = 'Auto Run';
          nextStepBtn.disabled = true;
          startBtn.disabled = false;
        }
      }, 150);
    }
  }

  startBtn.addEventListener('click', () => {
    reset();
    running = true;
    solverGen = solveNQueens(N);
    logMessage(`Starting backtracking for N=${N}...`);
    nextStepBtn.disabled = false;
    autoRunBtn.disabled = false;
    startBtn.disabled = true;
    onStep(); // Start with first step immediately
  });

  nextStepBtn.addEventListener('click', () => {
    if (!running) return;
    onStep();
  });

  resetBtn.addEventListener('click', () => {
    reset();
  });

  autoRunBtn.addEventListener('click', () => {
    if (!running) return;
    onAutoRun();
  });

  // Initialize on load
  reset();
})();
</script>
</body>
</html>
