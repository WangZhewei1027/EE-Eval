<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST API Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        #data {
            margin-top: 20px;
            padding: 10px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .user {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            margin-right: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-fetch { background-color: #3498db; color: white; }
        .btn-create { background-color: #2ecc71; color: white; }
    </style>
</head>
<body>

<h1>REST API Demo</h1>
<button class="btn-fetch" onclick="fetchUsers()">Fetch Users</button>
<button class="btn-create" onclick="createUser()">Create User</button>

<div id="data"></div>

<script>
    const apiUrl = 'https://jsonplaceholder.typicode.com/users';

    async function fetchUsers() {
        const response = await fetch(apiUrl);
        const users = await response.json();
        displayUsers(users);
    }

    async function createUser() {
        const newUser = {
            name: 'John Doe',
            email: 'johndoe@example.com'
        };

        const response = await fetch(apiUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(newUser)
        });

        const createdUser = await response.json();
        alert('User Created: ' + createdUser.name);
        fetchUsers(); // Refresh the user list
    }

    function displayUsers(users) {
        const dataDiv = document.getElementById('data');
        dataDiv.innerHTML = '';
        users.forEach(user => {
            const userDiv = document.createElement('div');
            userDiv.className = 'user';
            userDiv.innerHTML = `<strong>${user.name}</strong><br>Email: ${user.email}`;
            dataDiv.appendChild(userDiv);
        });
    }
</script>

</body>
</html>
