<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Trees</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        
        #tree {
            width: 50%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        #tree h2 {
            margin-top: 0;
        }
        
        #tree p {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Decision Trees</h1>
    <h2>Decision Tree Example</h2>
    <p>Decision trees are a type of machine learning model that use a tree-like structure to classify data into categories.</p>
    <div id="tree"></div>
    <script>
        let data = {
            "feature": ["age", "income"],
            "target": ["good", "bad"],
            "features": {
                "age": [25, 30, 35, 40, 45],
                "income": [50000, 60000, 70000, 80000, 90000]
            },
            "target_values": {
                "good": [1, 2, 3, 4, 5],
                "bad": [0, 1, 2, 3, 4]
            }
        };
        
        function createTree(features, target, target_values) {
            let feature = Object.keys(features)[0];
            let value = features[feature];
            let left = [];
            let right = [];
            
            for (let i = 0; i < target.length; i++) {
                if (value === target_values[target[i]]) {
                    left.push({feature: feature, value: value, left: [], right: []});
                    left[0].left.push({feature: feature, value: value, left: [], right: []});
                    left[0].right.push({feature: feature, value: value, left: [], right: []});
                } else {
                    right.push({feature: feature, value: value, left: [], right: []});
                    right[0].left.push({feature: feature, value: value, left: [], right: []});
                    right[0].right.push({feature: feature, value: value, left: [], right: []});
                }
            }
            
            return {
                feature: feature,
                value: value,
                left: left,
                right: right
            };
        }
        
        function buildTree(features, target, target_values, current) {
            let node = createTree(features, target, target_values);
            let html = `
                <div class="tree">
                    <h2>${node.feature}</h2>
                    <p>${node.value}</p>
                    <p>Left: ${node.left ? node.left.map(item => `<p>${item.feature}</p><p>${item.value}</p>`).join("") : ""}</p>
                    <p>Right: ${node.right ? node.right.map(item => `<p>${item.feature}</p><p>${item.value}</p>`).join("") : ""}</p>
                </div>
            `;
            document.getElementById("tree").innerHTML = html;
        }
        
        buildTree(data["features"], data["target"], data["target_values"], data["feature"]);
    </script>
</body>
</html>
