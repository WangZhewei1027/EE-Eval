<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACID Properties</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #result {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>ACID Properties</h1>
    <p>Atomicity: A transaction is atomic if it cannot be divided into smaller parts without leaving any inconsistency.</p>
    <div id="result"></div>
    <script>
        let transactions = [
            {
                id: 1,
                data: "Transaction 1"
            },
            {
                id: 2,
                data: "Transaction 2"
            },
            {
                id: 3,
                data: "Transaction 3"
            }
        ];

        let db = {
            transactions: transactions,
            currentTransactionId: 1
        };

        function atomicity() {
            let currentTransaction = db.transactions.find(transaction => transaction.id === db.currentTransactionId);
            if (currentTransaction) {
                let transactionsToExecute = currentTransaction.data.split(",");
                let executedTransactions = transactionsToExecute.filter(transaction => transaction !== "");
                if (executedTransactions.length === transactionsToExecute.length) {
                    console.log("Atomicity: Success");
                } else {
                    console.log("Atomicity: Failure");
                }
            } else {
                console.log("Atomicity: No transaction found");
            }
        }

        function consistency() {
            let currentTransaction = db.transactions.find(transaction => transaction.id === db.currentTransactionId);
            if (currentTransaction) {
                let transactionsToExecute = currentTransaction.data.split(",");
                let executedTransactions = transactionsToExecute.filter(transaction => transaction !== "");
                if (executedTransactions.length === transactionsToExecute.length) {
                    console.log("Consistency: Success");
                } else {
                    console.log("Consistency: Failure");
                }
            } else {
                console.log("Consistency: No transaction found");
            }
        }

        function isolation() {
            let currentTransaction = db.transactions.find(transaction => transaction.id === db.currentTransactionId);
            if (currentTransaction) {
                let transactionsToExecute = currentTransaction.data.split(",");
                let executedTransactions = transactionsToExecute.filter(transaction => transaction !== "");
                if (executedTransactions.length === transactionsToExecute.length) {
                    console.log("Isolation: Success");
                } else {
                    console.log("Isolation: Failure");
                }
            } else {
                console.log("Isolation: No transaction found");
            }
        }

        function durability() {
            let currentTransaction = db.transactions.find(transaction => transaction.id === db.currentTransactionId);
            if (currentTransaction) {
                let transactionsToExecute = currentTransaction.data.split(",");
                let executedTransactions = transactionsToExecute.filter(transaction => transaction !== "");
                if (executedTransactions.length === transactionsToExecute.length) {
                    console.log("Durability: Success");
                } else {
                    console.log("Durability: Failure");
                }
            } else {
                console.log("Durability: No transaction found");
            }
        }

        atomicity();
        consistency();
        isolation();
        durability();
    </script>
</body>
</html>
