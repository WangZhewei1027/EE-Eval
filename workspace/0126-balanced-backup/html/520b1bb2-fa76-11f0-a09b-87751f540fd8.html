<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Testing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Unit Testing Example</h1>
    <div id="container"></div>

    <script>
        // Define a function to be tested
        function add(a, b) {
            return a + b;
        }

        // Define a test suite
        function testAdd() {
            let result = add(2, 3);
            console.log(result);  // Expected output: 5

            // Test the add function with invalid inputs
            let result2 = add(2, 0);
            console.log(result2);  // Expected output: 2

            // Test the add function with negative numbers
            let result3 = add(-2, -3);
            console.log(result3);  // Expected output: -5
        }

        // Run the test suite
        testAdd();

        // Define a test runner
        function testRunner() {
            let test = new TestRunner();
            test.addTest(testAdd);
            test.run();
        }

        // Create a test runner
        let testRunner = new TestRunner();

        // Run the test suite
        testRunner.run();
    </script>

    <script>
        class TestRunner {
            addTest(test) {
                test.addFunction = test;
            }

            run() {
                // Run the test suite
                console.log("Running tests...");
                for (let test of test.addTest()) {
                    test();
                }
            }
        }

        // Add a test function to the test runner
        testRunner.addTest(testAdd);
    </script>

    <script>
        // Define a test function
        function testAdd() {
            let a = 2;
            let b = 3;
            console.log(a + b);
        }
    </script>

    <script>
        // Run the test suite
        let test = new TestRunner();
        test.addTest(testAdd);
        test.run();
    </script>

    <script>
        // Define a function with a side effect (console.log)
        function testAddSideEffect() {
            let a = 2;
            let b = 3;
            console.log(a + b);
            console.log("Side effect executed");
        }

        // Run the test suite
        let test = new TestRunner();
        test.addTest(testAddSideEffect);
        test.run();
    </script>
</body>
</html>
