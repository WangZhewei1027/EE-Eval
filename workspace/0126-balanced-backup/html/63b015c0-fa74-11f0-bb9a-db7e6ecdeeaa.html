<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deque (Double-Ended Queue) Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 1rem;
    max-width: 600px;
  }
  h1 {
    text-align: center;
  }
  #deque {
    display: flex;
    gap: 0.5rem;
    min-height: 50px;
    margin: 1rem 0;
    border: 2px solid #4a90e2;
    border-radius: 6px;
    padding: 0.5rem;
    background: #e6f0fa;
  }
  .item {
    background: #4a90e2;
    color: white;
    padding: 0.5rem 0.8rem;
    border-radius: 4px;
    font-weight: bold;
    min-width: 30px;
    text-align: center;
  }
  label, input, button {
    font-size: 1rem;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem 1.5rem;
    justify-content: center;
    margin-bottom: 1rem;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  button {
    background-color: #4a90e2;
    border: none;
    color: white;
    border-radius: 4px;
    padding: 0.4rem 1rem;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }
  button:hover {
    background-color: #357abd;
  }
  #log {
    background: #f9f9f9;
    border: 1px solid #999;
    border-radius: 4px;
    padding: 1rem;
    height: 140px;
    overflow-y: auto;
    font-family: monospace;
    white-space: pre-wrap;
  }
  footer {
    text-align: center;
    margin-top: 2rem;
    color: #666;
    font-size: 0.9rem;
  }
</style>
</head>
<body>
<h1>Deque (Double-Ended Queue) Demo</h1>

<div class="controls">
  <div class="control-group">
    <label for="inputValue">Value:</label>
    <input type="text" id="inputValue" placeholder="Enter value" />
  </div>
  <div class="control-group">
    <button id="addFrontBtn" title="Add value to the front">Add Front</button>
    <button id="addBackBtn" title="Add value to the back">Add Back</button>
  </div>
  <div class="control-group">
    <button id="removeFrontBtn" title="Remove value from front">Remove Front</button>
    <button id="removeBackBtn" title="Remove value from back">Remove Back</button>
  </div>
  <div class="control-group">
    <button id="clearBtn" title="Clear the deque">Clear Deque</button>
  </div>
</div>

<h3>Current Deque:</h3>
<div id="deque" aria-live="polite" aria-label="Deque contents"></div>

<h3>Operations Log:</h3>
<div id="log" aria-live="polite" aria-atomic="true"></div>

<script>
  // Deque class implementing double-ended queue functionality
  class Deque {
    constructor() {
      this.items = [];
    }
    addFront(element) {
      this.items.unshift(element);
    }
    addBack(element) {
      this.items.push(element);
    }
    removeFront() {
      return this.items.shift();
    }
    removeBack() {
      return this.items.pop();
    }
    clear() {
      this.items = [];
    }
    toArray() {
      return this.items.slice();
    }
    isEmpty() {
      return this.items.length === 0;
    }
    size() {
      return this.items.length;
    }
  }

  // Initialization
  const deque = new Deque();
  const dequeDiv = document.getElementById('deque');
  const logDiv = document.getElementById('log');
  const inputValue = document.getElementById('inputValue');

  function log(message) {
    const time = new Date().toLocaleTimeString();
    logDiv.textContent += `[${time}] ${message}\n`;
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  function renderDeque() {
    dequeDiv.innerHTML = ''; // Clear current display
    const items = deque.toArray();

    if (items.length === 0) {
      const emptyMsg = document.createElement('em');
      emptyMsg.textContent = 'Deque is empty';
      emptyMsg.style.color = '#777';
      dequeDiv.appendChild(emptyMsg);
      return;
    }

    items.forEach((item, index) => {
      const span = document.createElement('div');
      span.className = 'item';
      span.textContent = item;
      span.title = `Index: ${index}`;
      dequeDiv.appendChild(span);
    });
  }

  // Button click handlers
  document.getElementById('addFrontBtn').addEventListener('click', () => {
    const val = inputValue.value.trim();
    if (val === '') {
      alert('Please enter a value to add to the front.');
      inputValue.focus();
      return;
    }
    deque.addFront(val);
    log(`Added '${val}' to front`);
    renderDeque();
    inputValue.value = '';
    inputValue.focus();
  });

  document.getElementById('addBackBtn').addEventListener('click', () => {
    const val = inputValue.value.trim();
    if (val === '') {
      alert('Please enter a value to add to the back.');
      inputValue.focus();
      return;
    }
    deque.addBack(val);
    log(`Added '${val}' to back`);
    renderDeque();
    inputValue.value = '';
    inputValue.focus();
  });

  document.getElementById('removeFrontBtn').addEventListener('click', () => {
    if (deque.isEmpty()) {
      alert('Deque is empty, cannot remove from front.');
      return;
    }
    const removed = deque.removeFront();
    log(`Removed '${removed}' from front`);
    renderDeque();
  });

  document.getElementById('removeBackBtn').addEventListener('click', () => {
    if (deque.isEmpty()) {
      alert('Deque is empty, cannot remove from back.');
      return;
    }
    const removed = deque.removeBack();
    log(`Removed '${removed}' from back`);
    renderDeque();
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    deque.clear();
    log('Deque cleared');
    renderDeque();
  });

  // Initial rendering
  renderDeque();
</script>
<footer>
  &copy; 2024 Deque Concept Demo
</footer>
</body>
</html>
