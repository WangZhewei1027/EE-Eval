<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Paging Demonstration</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 40px;
    background: #f9f9f9;
  }

  h1 {
    text-align: center;
    color: #333;
  }

  #content {
    max-width: 600px;
    margin: 20px auto;
    background: white;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }

  #items {
    list-style: none;
    padding: 0;
    margin: 0 0 20px 0;
  }

  #items li {
    padding: 10px 15px;
    border-bottom: 1px solid #eee;
    font-size: 1.1em;
    color: #444;
  }

  #items li:last-child {
    border-bottom: none;
  }

  #paging-controls {
    text-align: center;
  }

  #paging-controls button {
    background: #007bff;
    color: white;
    border: none;
    margin: 0 5px;
    padding: 8px 14px;
    font-size: 1em;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.2s ease;
  }

  #paging-controls button:disabled {
    background: #bbb;
    cursor: default;
  }

  #paging-info {
    margin-top: 10px;
    font-size: 0.9em;
    color: #666;
  }
</style>
</head>
<body>

<h1>Paging Demonstration</h1>
<div id="content">
  <ul id="items"></ul>
  <div id="paging-controls">
    <button id="firstBtn">« First</button>
    <button id="prevBtn">‹ Prev</button>
    <button id="nextBtn">Next ›</button>
    <button id="lastBtn">Last »</button>
    <div id="paging-info"></div>
  </div>
</div>

<script>
  (function() {
    // Simulate a large data set
    const data = [];
    for(let i = 1; i <= 123; i++) {
      data.push(`Item ${i}`);
    }

    const pageSize = 10;            // Items per page
    const totalItems = data.length;
    const totalPages = Math.ceil(totalItems / pageSize);
    let currentPage = 1;

    // DOM references
    const itemsContainer = document.getElementById('items');
    const firstBtn = document.getElementById('firstBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const lastBtn = document.getElementById('lastBtn');
    const pagingInfo = document.getElementById('paging-info');

    // Render the current page's items
    function renderPage(page) {
      currentPage = page;

      // Calculate slice boundaries
      const start = (page - 1) * pageSize;
      const end = Math.min(start + pageSize, totalItems);

      // Clear previous items
      itemsContainer.innerHTML = '';

      // Add new items
      for(let i = start; i < end; i++) {
        const li = document.createElement('li');
        li.textContent = data[i];
        itemsContainer.appendChild(li);
      }

      // Update buttons
      firstBtn.disabled = page === 1;
      prevBtn.disabled = page === 1;
      nextBtn.disabled = page === totalPages;
      lastBtn.disabled = page === totalPages;

      // Update paging info
      pagingInfo.textContent = `Showing items ${start + 1} to ${end} of ${totalItems} (Page ${page} of ${totalPages})`;
    }

    // Event handlers for buttons
    firstBtn.addEventListener('click', () => renderPage(1));
    prevBtn.addEventListener('click', () => {
      if(currentPage > 1) renderPage(currentPage - 1);
    });
    nextBtn.addEventListener('click', () => {
      if(currentPage < totalPages) renderPage(currentPage + 1);
    });
    lastBtn.addEventListener('click', () => renderPage(totalPages));

    // Initial render
    renderPage(1);
  })();
</script>

</body>
</html>
