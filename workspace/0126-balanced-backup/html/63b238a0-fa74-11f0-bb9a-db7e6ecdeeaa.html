<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Two Pointers Technique Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2rem;
    background: #f0f0f0;
    color: #333;
  }
  h1 {
    text-align: center;
    margin-bottom: 1rem;
  }
  #container {
    max-width: 700px;
    margin: 0 auto;
    background: white;
    padding: 1.5rem;
    border-radius: 8px;
    box-shadow: 0 0 12px rgba(0,0,0,0.15);
  }
  label, select, button {
    font-size: 1rem;
  }
  label {
    display: block;
    margin-bottom: 0.25rem;
  }
  select {
    padding: 0.3rem;
    margin-bottom: 1rem;
    width: 100%;
    box-sizing: border-box;
  }
  button {
    padding: 0.5rem 1rem;
    margin-bottom: 1rem;
    cursor: pointer;
    background-color: #0078d7;
    border: none;
    color: white;
    border-radius: 4px;
  }
  button:hover {
    background-color: #005fa3;
  }
  #arrayDisplay {
    display: flex;
    justify-content: center;
    margin-bottom: 1rem;
  }
  .arrayItem {
    min-width: 40px;
    min-height: 40px;
    margin: 0 4px;
    background-color: #ddd;
    color: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 4px;
    position: relative;
    font-weight: 600;
    transition: background-color 0.3s;
  }
  .pointer-left {
    background-color: #4caf50;
    color: white;
  }
  .pointer-right {
    background-color: #f44336;
    color: white;
  }
  .pointer-both {
    background-color: #ff9800;
    color: white;
  }
  #log {
    background: #222;
    color: #0f0;
    font-family: monospace;
    height: 180px;
    overflow-y: auto;
    padding: 0.75rem;
    border-radius: 6px;
    white-space: pre-wrap;
  }
  #explanation {
    margin-top: 1rem;
    background: #e1f5fe;
    border-left: 6px solid #0277bd;
    padding: 0.75rem 1rem;
    border-radius: 4px;
  }
  a {
    color: #0277bd;
  }
</style>
</head>
<body>
  <div id="container">
    <h1>Two Pointers Technique Demonstration</h1>
    <p>
      The <strong>Two Pointers</strong> technique is a common algorithmic approach used to solve problems involving arrays or lists by using two indices that move towards each other or in the same direction, to efficiently find or check certain conditions.
    </p>

    <label for="demoSelect">Choose a demonstration:</label>
    <select id="demoSelect">
      <option value="pairSumSorted">Find Pair with Given Sum (Sorted Array)</option>
      <option value="removeDuplicates">Remove Duplicates from Sorted Array</option>
      <option value="palindromeCheck">Check if String is Palindrome</option>
    </select>
    <button id="startBtn">Start Demo</button>

    <div id="arrayDisplay"></div>

    <div id="log"></div>

    <div id="explanation"></div>
  </div>

<script>
(function(){
  const demoSelect = document.getElementById('demoSelect');
  const startBtn = document.getElementById('startBtn');
  const arrayDisplay = document.getElementById('arrayDisplay');
  const log = document.getElementById('log');
  const explanation = document.getElementById('explanation');

  // Clear display areas
  function resetDisplay() {
    arrayDisplay.innerHTML = '';
    log.textContent = '';
    explanation.innerHTML = '';
  }

  // Utility to log messages with scrolling
  function writeLog(msg) {
    log.textContent += msg + '\n';
    log.scrollTop = log.scrollHeight;
  }

  // Visualize an array with pointers
  // pointers: { left: index?, right: index? }
  function displayArray(arr, pointers) {
    arrayDisplay.innerHTML = '';
    for(let i = 0; i < arr.length; i++) {
      const div = document.createElement('div');
      div.classList.add('arrayItem');
      div.textContent = arr[i];
      let leftP = pointers.left === i;
      let rightP = pointers.right === i;

      if(leftP && rightP){
        div.classList.add('pointer-both');
      } else if (leftP){
        div.classList.add('pointer-left');
      } else if (rightP){
        div.classList.add('pointer-right');
      }
      arrayDisplay.appendChild(div);
    }
  }

  // Demo 1: Find pair with given sum in sorted array using two pointers (from both ends)
  async function demoPairSumSorted() {
    resetDisplay();
    explanation.innerHTML = `<strong>Problem:</strong> Given a sorted array, find if there is a pair of numbers which add up to a target sum.<br>
    <br>
    <strong>Approach:</strong> Use two pointers starting at the beginning and end. Move pointers depending on sum comparison.<br>
    <br>
    <a href="https://www.geeksforgeeks.org/two-pointers" target="_blank" rel="noopener">Learn more about Two Pointers</a>`;

    const arr = [1, 3, 4, 5, 7, 10, 12];
    const target = 9;
    writeLog(`Array: [${arr.join(', ')}]`);
    writeLog(`Target Sum: ${target}`);
    await sleep(1000);

    let left = 0;
    let right = arr.length - 1;
    
    while(left < right) {
      displayArray(arr, {left, right});
      const sum = arr[left] + arr[right];
      writeLog(`Checking: arr[${left}] + arr[${right}] = ${arr[left]} + ${arr[right]} = ${sum}`);

      if(sum === target) {
        writeLog(`Found pair: (${arr[left]}, ${arr[right]})`);
        displayArray(arr, {left, right});
        return;
      } else if(sum < target) {
        writeLog(`Sum less than target. Moving left pointer from index ${left} to ${left + 1}`);
        left++;
      } else {
        writeLog(`Sum greater than target. Moving right pointer from index ${right} to ${right - 1}`);
        right--;
      }
      await sleep(1500);
    }

    writeLog('No pair found with the given sum.');
    displayArray(arr, {});
  }

  // Demo 2: Remove duplicates from sorted array in-place using two pointers
  // Returns length of new array (unique elements)
  async function demoRemoveDuplicates() {
    resetDisplay();
    explanation.innerHTML = `<strong>Problem:</strong> Given a sorted array, remove duplicates in place such that each element appears only once.<br>
    Return the length of the modified array.<br>
    <br>
    <strong>Approach:</strong> Use two pointers: one for iterating (fast), and one for position to place unique items (slow).<br>
    <br>
    <a href="https://leetcode.com/problems/remove-duplicates-from-sorted-array/" target="_blank" rel="noopener">LeetCode #26</a>`;

    let arr = [0,0,1,1,1,2,2,3,3,4];
    writeLog(`Original array: [${arr.join(', ')}]`);
    await sleep(1000);

    let slow = 0;
    displayArray(arr, {left: slow, right: null});
    writeLog(`Starting with slow pointer at index ${slow}`);
    await sleep(1500);

    for(let fast = 1; fast < arr.length; fast++) {
      displayArray(arr, {left: slow, right: fast});
      writeLog(`Comparing arr[fast]: arr[${fast}] = ${arr[fast]} and arr[slow]: arr[${slow}] = ${arr[slow]}`);

      if(arr[fast] !== arr[slow]){
        slow++;
        writeLog(`Found new unique element ${arr[fast]}. Move slow pointer to ${slow} and update arr[${slow}]`);
        arr[slow] = arr[fast];
        displayArray(arr, {left: slow, right: fast});
      } else {
        writeLog(`Duplicate found: ${arr[fast]}. Moving fast pointer ahead.`);
      }
      await sleep(1200);
    }

    const length = slow + 1;
    writeLog(`\nFinal length of unique elements: ${length}`);
    writeLog(`Modified array (only first ${length} elements valid): [${arr.slice(0, length).join(', ')}]`);
    displayArray(arr, {});
  }

  // Demo 3: Check if string is palindrome using two pointers
  async function demoPalindromeCheck() {
    resetDisplay();
    explanation.innerHTML = `<strong>Problem:</strong> Check if a given string is a palindrome.<br>
    <br>
    <strong>Approach:</strong> Use two pointers, one at start and one at end, compare characters moving towards center.<br>
    <br>
    <a href="https://leetcode.com/problems/valid-palindrome/" target="_blank" rel="noopener">LeetCode #125</a>`;

    const s = "racecar";
    writeLog(`Checking string: "${s}"`);
    await sleep(1000);

    let left = 0;
    let right = s.length - 1;

    while(left < right) {
      displayString(s, left, right);
      writeLog(`Comparing s[${left}] = '${s[left]}' and s[${right}] = '${s[right]}'`);
      if(s[left] !== s[right]) {
        writeLog('Characters do not match. Not a palindrome.');
        displayString(s, left, right, false);
        return;
      }
      writeLog('Characters match. Move pointers inward.');
      left++;
      right--;
      await sleep(1300);
    }

    writeLog('All characters matched. It is a palindrome!');
    displayString(s, -1, -1, true);
  }

  // Visualize string with pointers
  function displayString(str, left, right, isPalindrome) {
    arrayDisplay.innerHTML = '';
    for(let i = 0; i < str.length; i++) {
      const div = document.createElement('div');
      div.classList.add('arrayItem');
      div.textContent = str[i];
      if(i === left && i === right){
        div.classList.add('pointer-both');
      } else if(i === left) {
        div.classList.add('pointer-left');
      } else if(i === right){
        div.classList.add('pointer-right');
      }
      arrayDisplay.appendChild(div);
    }
    if(isPalindrome === false){
      explanation.innerHTML += `<br><strong>Result:</strong> Not a palindrome.`;
    } else if(isPalindrome === true){
      explanation.innerHTML += `<br><strong>Result:</strong> It is a palindrome!`;
    }
  }

  // Simple sleep promise
  function sleep(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  async function startDemo() {
    startBtn.disabled = true;
    const val = demoSelect.value;

    if(val === 'pairSumSorted') {
      await demoPairSumSorted();
    } else if(val === 'removeDuplicates') {
      await demoRemoveDuplicates();
    } else if(val === 'palindromeCheck') {
      await demoPalindromeCheck();
    }

    writeLog('\nDemo finished.');
    startBtn.disabled = false;
  }

  startBtn.addEventListener('click', startDemo);
})();
</script>
</body>
</html>
