<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduling Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        .controls {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .process-input {
            margin-bottom: 10px;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #2980b9;
        }
        .gantt-chart {
            margin-top: 30px;
            overflow-x: auto;
        }
        .gantt-container {
            display: flex;
            margin-top: 10px;
        }
        .gantt-process {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border: 1px solid #333;
        }
        .time-marker {
            display: flex;
            margin-top: 5px;
        }
        .time-unit {
            width: 40px;
            text-align: center;
            font-size: 12px;
        }
        .stats {
            margin-top: 20px;
            background: #ecf0f1;
            padding: 15px;
            border-radius: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>CPU Scheduling Algorithms Visualization</h1>
    
    <div class="controls">
        <h2>Process Input</h2>
        <div id="process-inputs">
            <div class="process-input">
                Process 1:
                <input type="number" class="arrival-time" placeholder="Arrival Time" value="0">
                <input type="number" class="burst-time" placeholder="Burst Time" value="5">
                <button onclick="removeProcess(this)">Remove</button>
            </div>
            <div class="process-input">
                Process 2:
                <input type="number" class="arrival-time" placeholder="Arrival Time" value="1">
                <input type="number" class="burst-time" placeholder="Burst Time" value="3">
                <button onclick="removeProcess(this)">Remove</button>
            </div>
            <div class="process-input">
                Process 3:
                <input type="number" class="arrival-time" placeholder="Arrival Time" value="2">
                <input type="number" class="burst-time" placeholder="Burst Time" value="8">
                <button onclick="removeProcess(this)">Remove</button>
            </div>
            <div class="process-input">
                Process 4:
                <input type="number" class="arrival-time" placeholder="Arrival Time" value="3">
                <input type="number" class="burst-time" placeholder="Burst Time" value="6">
                <button onclick="removeProcess(this)">Remove</button>
            </div>
        </div>
        <button onclick="addProcess()">Add Process</button>
        
        <h2>Algorithm Selection</h2>
        <select id="algorithm">
            <option value="fcfs">First Come First Serve (FCFS)</option>
            <option value="sjf">Shortest Job First (SJF)</option>
            <option value="srtf">Shortest Remaining Time First (SRTF)</option>
            <option value="rr">Round Robin (RR)</option>
            <option value="priority">Priority Scheduling</option>
        </select>
        
        <div id="quantum-container" style="display: none;">
            Time Quantum: <input type="number" id="quantum" value="2" min="1">
        </div>
        
        <button onclick="runScheduling()">Run Scheduling</button>
    </div>
    
    <div class="gantt-chart">
        <h2>Gantt Chart</h2>
        <div id="gantt-container" class="gantt-container"></div>
        <div id="time-markers" class="time-marker"></div>
    </div>
    
    <div class="stats">
        <h2>Performance Metrics</h2>
        <table id="process-table">
            <thead>
                <tr>
                    <th>Process</th>
                    <th>Arrival Time</th>
                    <th>Burst Time</th>
                    <th>Completion Time</th>
                    <th>Turnaround Time</th>
                    <th>Waiting Time</th>
                </tr>
            </thead>
            <tbody id="process-table-body"></tbody>
        </table>
        <div id="avg-metrics"></div>
    </div>

    <script>
        // Process colors for visualization
        const processColors = [
            '#e74c3c', '#3498db', '#2ecc71', '#f39c12', 
            '#9b59b6', '#1abc9c', '#d35400', '#34495e'
        ];
        
        // Setup algorithm selection change
        document.getElementById('algorithm').addEventListener('change', function() {
            const quantumContainer = document.getElementById('quantum-container');
            if (this.value === 'rr') {
                quantumContainer.style.display = 'block';
            } else {
                quantumContainer.style.display = 'none';
            }
        });
        
        // Add a new process input
        function addProcess() {
            const inputsContainer = document.getElementById('process-inputs');
            const processCount = inputsContainer.children.length + 1;
            
            const newInput = document.createElement('div');
            newInput.className = 'process-input';
            newInput.innerHTML = `
                Process ${processCount}:
                <input type="number" class="arrival-time" placeholder="Arrival Time" value="0">
                <input type="number" class="burst-time" placeholder="Burst Time" value="1">
                <button onclick="removeProcess(this)">Remove</button>
            `;
            
            inputsContainer.appendChild(newInput);
        }
        
        // Remove a process input
        function removeProcess(button) {
            const inputsContainer = document.getElementById('process-inputs');
            if (inputsContainer.children.length > 1) {
                button.parentNode.remove();
                // Renumber remaining processes
                const inputs = inputsContainer.querySelectorAll('.process-input');
                inputs.forEach((input, index) => {
                    input.firstChild.textContent = `Process ${index + 1}: `;
                });
            } else {
                alert("You need at least one process!");
            }
        }
        
        // Run the selected scheduling algorithm
        function runScheduling() {
            const processes = getProcesses();
            const algorithm = document.getElementById('algorithm').value;
            
            // Clear previous results
            document.getElementById('gantt-container').innerHTML = '';
            document.getElementById('time-markers').innerHTML = '';
            document.getElementById('process-table-body').innerHTML = '';
            document.getElementById('avg-metrics').innerHTML = '';
            
            let result;
            switch(algorithm) {
                case 'fcfs':
                    result = FCFS(processes);
                    break;
                case 'sjf':
                    result = SJF(processes);
                    break;
                case 'srtf':
                    result = SRTF(processes);
                    break;
                case 'rr':
                    const quantum = parseInt(document.getElementById('quantum').value);
                    result = roundRobin(processes, quantum);
                    break;
                case 'priority':
                    // In a real implementation, you'd collect priority values
                    alert("Priority scheduling would require priority inputs for each process");
                    return;
                default:
                    result = FCFS(processes);
            }
            
            visualizeGanttChart(result.ganttChart);
            displayProcessMetrics(result.processes);
            displayAverageMetrics(result.processes);
        }
        
        // Get processes from input fields
        function getProcesses() {
            const inputs = document.querySelectorAll('.process-input');
            const processes = [];
            
            inputs.forEach((input, index) => {
                const arrivalTime = parseInt(input.querySelector('.arrival-time').value) || 0;
                const burstTime = parseInt(input.querySelector('.burst-time').value) || 1;
                
                processes.push({
                    id: index + 1,
                    arrivalTime: arrivalTime,
                    burstTime: burstTime,
                    remainingTime: burstTime,
                    completionTime: 0,
                    turnaroundTime: 0,
                    waitingTime: 0
                });
            });
            
            return processes;
        }
        
        // First Come First Serve algorithm
        function FCFS(processes) {
            // Sort by arrival time
            const sortedProcesses = [...processes].sort((a, b) => a.arrivalTime - b.arrivalTime);
            
            let currentTime = 0;
            const ganttChart = [];
            
            for (const process of sortedProcesses) {
                if (currentTime < process.arrivalTime) {
                    currentTime = process.arrivalTime;
                }
                
                ganttChart.push({
                    process: process.id,
                    start: currentTime,
                    end: currentTime + process.burstTime
                });
                
                process.completionTime = currentTime + process.burstTime;
                process.turnaroundTime = process.completionTime - process.arrivalTime;
                process.waitingTime = process.turnaroundTime - process.burstTime;
                
                currentTime = process.completionTime;
            }
            
            return { processes: sortedProcesses, ganttChart: ganttChart };
        }
        
        // Shortest Job First (non-preemptive)
        function SJF(processes) {
            let currentTime = 0;
            const completedProcesses = [];
            const remainingProcesses = [...processes];
            const ganttChart = [];
            
            while (remainingProcesses.length > 0) {
                // Get arrived processes
                const arrivedProcesses = remainingProcesses.filter(p => p.arrivalTime <= currentTime);
                
                if (arrivedProcesses.length === 0) {
                    currentTime++;
                    continue;
                }
                
                // Sort by burst time
                arrivedProcesses.sort((a, b) => a.burstTime - b.burstTime);
                
                const nextProcess = arrivedProcesses[0];
                
                ganttChart.push({
                    process: nextProcess.id,
                    start: currentTime,
                    end: currentTime + nextProcess.burstTime
                });
                
                nextProcess.completionTime = currentTime + nextProcess.burstTime;
                nextProcess.turnaroundTime = nextProcess.completionTime - nextProcess.arrivalTime;
                nextProcess.waitingTime = nextProcess.turnaroundTime - nextProcess.burstTime;
                
                currentTime = nextProcess.completionTime;
                
                // Remove from remaining processes
                remainingProcesses.splice(remainingProcesses.findIndex(p => p.id === nextProcess.id), 1);
                completedProcesses.push(nextProcess);
            }
            
            // Sort by process ID for display
            completedProcesses.sort((a, b) => a.id - b.id);
            
            return { processes: completedProcesses, ganttChart: ganttChart };
        }
        
        // Shortest Remaining Time First (preemptive)
        function SRTF(processes) {
            let currentTime = 0;
            const completedProcesses = [];
            const remainingProcesses = [...processes].map(p => ({
                ...p,
                remainingTime: p.burstTime
            }));
            const ganttChart = [];
            
            while (remainingProcesses.length > 0) {
                // Get arrived processes
                const arrivedProcesses = remainingProcesses.filter(p => p.arrivalTime <= currentTime);
                
                if (arrivedProcesses.length === 0) {
                    currentTime++;
                    continue;
                }
                
                // Sort by remaining time
                arrivedProcesses.sort((a, b) => a.remainingTime - b.remainingTime);
                
                const nextProcess = arrivedProcesses[0];
                
                // Find next event time (arrival or completion)
                let nextEventTime = currentTime + nextProcess.remainingTime;
                for (const p of remainingProcesses) {
                    if (p.id !== nextProcess.id && p.arrivalTime > currentTime && p.arrivalTime < nextEventTime) {
                        nextEventTime = p.arrivalTime;
                    }
                }
                
                const executionTime = nextEventTime - currentTime;
                
                ganttChart.push({
                    process: nextProcess.id,
                    start: currentTime,
                    end: currentTime + executionTime
                });
                
                nextProcess.remainingTime -= executionTime;
                currentTime += executionTime;
                
                if (nextProcess.remainingTime === 0) {
                    nextProcess.completionTime = currentTime;
                    nextProcess.turnaroundTime = nextProcess.completionTime - nextProcess.arrivalTime;
                    nextProcess.waitingTime = nextProcess.turnaroundTime - nextProcess.burstTime;
                    
                    // Remove from remaining processes
                    remainingProcesses.splice(remainingProcesses.findIndex(p => p.id === nextProcess.id), 1);
                    completedProcesses.push(nextProcess);
                }
            }
            
            // Sort by process ID for display
            completedProcesses.sort((a, b) => a.id - b.id);
            
            return { processes: completedProcesses, ganttChart: ganttChart };
        }
        
        // Round Robin algorithm
        function roundRobin(processes, quantum) {
            let currentTime = 0;
            const completedProcesses = [];
            const remainingProcesses = [...processes].map(p => ({
                ...p,
                remainingTime: p.burstTime
            }));
            const ganttChart = [];
            const queue = [];
            
            // Initial queue population
            remainingProcesses
                .filter(p => p.arrivalTime <= currentTime)
                .sort((a, b) => a.arrivalTime - b.arrivalTime)
                .forEach(p => queue.push(p));
            
            while (remainingProcesses.length > 0) {
                if (queue.length === 0) {
                    currentTime++;
                    // Check for new arrivals
                    remainingProcesses
                        .filter(p => p.arrivalTime <= currentTime && !queue.includes(p))
                        .sort((a, b) => a.arrivalTime - b.arrivalTime)
                        .forEach(p => queue.push(p));
                    continue;
                }
                
                const currentProcess = queue.shift();
                
                const executionTime = Math.min(quantum, currentProcess.remainingTime);
                
                ganttChart.push({
                    process: currentProcess.id,
                    start: currentTime,
                    end: currentTime + executionTime
                });
                
                currentProcess.remainingTime -= executionTime;
                currentTime += executionTime;
                
                // Check for new arrivals during this execution
                remainingProcesses
                    .filter(p => 
                        p.arrivalTime <= currentTime && 
                        !queue.includes(p) && 
                        p.id !== currentProcess.id
                    )
                    .sort((a, b) => a.arrivalTime - b.arrivalTime)
                    .forEach(p => queue.push(p));
                
                if (currentProcess.remainingTime === 0) {
                    currentProcess.completionTime = currentTime;
                    currentProcess.turnaroundTime = currentProcess.completionTime - currentProcess.arrivalTime;
                    currentProcess.waitingTime = currentProcess.turnaroundTime - currentProcess.burstTime;
                    
                    // Remove from remaining processes
                    remainingProcesses.splice(remainingProcesses.findIndex(p => p.id === currentProcess.id), 1);
                    completedProcesses.push(currentProcess);
                } else {
                    // Put back in queue
                    queue.push(currentProcess);
                }
            }
            
            // Sort by process ID for display
            completedProcesses.sort((a, b) => a.id - b.id);
            
            return { processes: completedProcesses, ganttChart: ganttChart };
        }
        
        // Visualize the Gantt chart
        function visualizeGanttChart(ganttChart) {
            const container = document.getElementById('gantt-container');
            const timeMarkers = document.getElementById('time-markers');
            
            if (ganttChart.length === 0) return;
            
            // Find max time for scaling
            const maxTime = ganttChart[ganttChart.length - 1].end;
            
            // Create time markers
            for (let i = 0; i <= maxTime; i++) {
                const timeUnit = document.createElement('div');
                timeUnit.className = 'time-unit';
                timeUnit.textContent = i;
                timeMarkers.appendChild(timeUnit);
            }
            
            // Create Gantt chart bars
            ganttChart.forEach((entry, index) => {
                const width = ((entry.end - entry.start) / maxTime) * 100;
                
                const processBar = document.createElement('div');
                processBar.className = 'gantt-process';
                processBar.textContent = `P${entry.process}`;
                processBar.style.width = `${width}%`;
                processBar.style.backgroundColor = processColors[(entry.process - 1) % processColors.length];
                
                // Add tooltip
                processBar.title = `P${entry.process}: ${entry.start}-${entry.end}`;
                
                container.appendChild(processBar);
            });
        }
        
        // Display process metrics in table
        function displayProcessMetrics(processes) {
            const tableBody = document.getElementById('process-table-body');
            
            processes.forEach(process => {
                const row = document.createElement('tr');
                
                row.innerHTML = `
                    <td>P${process.id}</td>
                    <td>${process.arrivalTime}</td>
                    <td>${process.burstTime}</td>
                    <td>${process.completionTime}</td>
                    <td>${process.turnaroundTime}</td>
                    <td>${process.waitingTime}</td>
                `;
                
                tableBody.appendChild(row);
            });
        }
        
        // Display average metrics
        function displayAverageMetrics(processes) {
            const totalTurnaround = processes.reduce((sum, p) => sum + p.turnaroundTime, 0);
            const totalWaiting = processes.reduce((sum, p) => sum + p.waitingTime, 0);
            
            const avgTurnaround = (totalTurnaround / processes.length).toFixed(2);
            const avgWaiting = (totalWaiting / processes.length).toFixed(2);
            
            const metricsDiv = document.getElementById('avg-metrics');
            metricsDiv.innerHTML = `
                <p><strong>Average Turnaround Time:</strong> ${avgTurnaround}</p>
                <p><strong>Average Waiting Time:</strong> ${avgWaiting}</p>
            `;
        }
    </script>
</body>
</html>
