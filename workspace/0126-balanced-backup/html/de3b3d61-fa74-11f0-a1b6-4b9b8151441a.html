<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVL Tree Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        input {
            padding: 8px;
            width: 60px;
        }
        button {
            padding: 8px 15px;
            cursor: pointer;
        }
        .tree-container {
            margin-top: 30px;
        }
        .node {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 2px solid #333;
            border-radius: 50%;
            text-align: center;
            line-height: 40px;
            margin: 0 10px;
            background-color: #f0f0f0;
            position: relative;
        }
        .node.highlight {
            background-color: #ffcc00;
        }
        .level {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        .line {
            position: absolute;
            background-color: #333;
            height: 2px;
            transform-origin: left center;
        }
        .output {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
            max-width: 600px;
            width: 100%;
        }
        .operations {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AVL Tree Visualization</h1>
        
        <div class="controls">
            <input type="number" id="insertValue" placeholder="Value">
            <button onclick="insertNode()">Insert</button>
            <input type="number" id="deleteValue" placeholder="Value">
            <button onclick="deleteNode()">Delete</button>
            <input type="number" id="searchValue" placeholder="Value">
            <button onclick="searchNode()">Search</button>
            <button onclick="clearTree()">Clear Tree</button>
        </div>
        
        <div class="operations">
            <button onclick="traverseInOrder()">In-Order Traversal</button>
            <button onclick="traversePreOrder()">Pre-Order Traversal</button>
            <button onclick="traversePostOrder()">Post-Order Traversal</button>
        </div>
        
        <div class="tree-container" id="tree"></div>
        
        <div class="output" id="output">
            Operations will be displayed here...
        </div>
    </div>

    <script>
        // AVL Tree Node
        class Node {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
                this.height = 1;
            }
        }

        // AVL Tree class
        class AVLTree {
            constructor() {
                this.root = null;
            }
            
            // Get height of node
            getHeight(node) {
                if (!node) return 0;
                return node.height;
            }
            
            // Update height of node
            updateHeight(node) {
                if (!node) return;
                node.height = Math.max(
                    this.getHeight(node.left),
                    this.getHeight(node.right)
                ) + 1;
            }
            
            // Get balance factor
            getBalance(node) {
                if (!node) return 0;
                return this.getHeight(node.left) - this.getHeight(node.right);
            }
            
            // Right rotation
            rightRotate(y) {
                const x = y.left;
                const T2 = x.right;
                
                // Perform rotation
                x.right = y;
                y.left = T2;
                
                // Update heights
                this.updateHeight(y);
                this.updateHeight(x);
                
                return x;
            }
            
            // Left rotation
            leftRotate(x) {
                const y = x.right;
                const T2 = y.left;
                
                // Perform rotation
                y.left = x;
                x.right = T2;
                
                // Update heights
                this.updateHeight(x);
                this.updateHeight(y);
                
                return y;
            }
            
            // Insert a value
            insert(value) {
                this.root = this._insert(this.root, value);
            }
            
            _insert(node, value) {
                // Standard BST insertion
                if (!node) return new Node(value);
                
                if (value < node.value) {
                    node.left = this._insert(node.left, value);
                } else if (value > node.value) {
                    node.right = this._insert(node.right, value);
                } else {
                    // Duplicate values not allowed
                    return node;
                }
                
                // Update height
                this.updateHeight(node);
                
                // Get balance factor
                const balance = this.getBalance(node);
                
                // Perform rotations if needed
                
                // Left Left Case
                if (balance > 1 && value < node.left.value) {
                    return this.rightRotate(node);
                }
                
                // Right Right Case
                if (balance < -1 && value > node.right.value) {
                    return this.leftRotate(node);
                }
                
                // Left Right Case
                if (balance > 1 && value > node.left.value) {
                    node.left = this.leftRotate(node.left);
                    return this.rightRotate(node);
                }
                
                // Right Left Case
                if (balance < -1 && value < node.right.value) {
                    node.right = this.rightRotate(node.right);
                    return this.leftRotate(node);
                }
                
                return node;
            }
            
            // Delete a value
            delete(value) {
                this.root = this._delete(this.root, value);
            }
            
            _delete(node, value) {
                // Standard BST delete
                if (!node) return node;
                
                if (value < node.value) {
                    node.left = this._delete(node.left, value);
                } else if (value > node.value) {
                    node.right = this._delete(node.right, value);
                } else {
                    // Node with only one child or no child
                    if (!node.left || !node.right) {
                        const temp = node.left || node.right;
                        
                        // No child case
                        if (!temp) {
                            node = null;
                        } else {
                            // One child case
                            node = temp;
                        }
                    } else {
                        // Node with two children: Get inorder successor
                        const temp = this.getMinNode(node.right);
                        node.value = temp.value;
                        node.right = this._delete(node.right, temp.value);
                    }
                }
                
                // If the tree had only one node then return
                if (!node) return node;
                
                // Update height
                this.updateHeight(node);
                
                // Get balance factor
                const balance = this.getBalance(node);
                
                // Perform rotations if needed
                
                // Left Left Case
                if (balance > 1 && this.getBalance(node.left) >= 0) {
                    return this.rightRotate(node);
                }
                
                // Left Right Case
                if (balance > 1 && this.getBalance(node.left) < 0) {
                    node.left = this.leftRotate(node.left);
                    return this.rightRotate(node);
                }
                
                // Right Right Case
                if (balance < -1 && this.getBalance(node.right) <= 0) {
                    return this.leftRotate(node);
                }
                
                // Right Left Case
                if (balance < -1 && this.getBalance(node.right) > 0) {
                    node.right = this.rightRotate(node.right);
                    return this.leftRotate(node);
                }
                
                return node;
            }
            
            // Search for a value
            search(value) {
                return this._search(this.root, value);
            }
            
            _search(node, value) {
                if (!node) return null;
                if (node.value === value) return node;
                if (value < node.value) return this._search(node.left, value);
                return this._search(node.right, value);
            }
            
            // Get node with minimum value
            getMinNode(node) {
                let current = node;
                while (current.left) {
                    current = current.left;
                }
                return current;
            }
            
            // In-order traversal
            inOrder() {
                const result = [];
                this._inOrder(this.root, result);
                return result;
            }
            
            _inOrder(node, result) {
                if (node) {
                    this._inOrder(node.left, result);
                    result.push(node.value);
                    this._inOrder(node.right, result);
                }
            }
            
            // Pre-order traversal
            preOrder() {
                const result = [];
                this._preOrder(this.root, result);
                return result;
            }
            
            _preOrder(node, result) {
                if (node) {
                    result.push(node.value);
                    this._preOrder(node.left, result);
                    this._preOrder(node.right, result);
                }
            }
            
            // Post-order traversal
            postOrder() {
                const result = [];
                this._postOrder(this.root, result);
                return result;
            }
            
            _postOrder(node, result) {
                if (node) {
                    this._postOrder(node.left, result);
                    this._postOrder(node.right, result);
                    result.push(node.value);
                }
            }
        }

        // Global AVL Tree instance
        const avlTree = new AVLTree();

        // DOM manipulation functions
        function renderTree() {
            const treeContainer = document.getElementById('tree');
            treeContainer.innerHTML = '';
            
            if (!avlTree.root) {
                return;
            }
            
            // Calculate tree levels
            const levels = [];
            const queue = [{ node: avlTree.root, level: 0 }];
            
            while (queue.length) {
                const { node, level } = queue.shift();
                
                if (!levels[level]) {
                    levels[level] = [];
                }
                
                levels[level].push(node);
                
                if (node.left) {
                    queue.push({ node: node.left, level: level + 1 });
                } else if (level < 10) { // Limit depth for visualization
                    // Push null for empty left child
                    levels[level + 1] = levels[level + 1] || [];
                    levels[level + 1].push(null);
                }
                
                if (node.right) {
                    queue.push({ node: node.right, level: level + 1 });
                } else if (level < 10) { // Limit depth for visualization
                    // Push null for empty right child
                    levels[level + 1] = levels[level + 1] || [];
                    levels[level + 1].push(null);
                }
            }
            
            // Render each level
            for (let i = 0; i < levels.length; i++) {
                const levelDiv = document.createElement('div');
                levelDiv.className = 'level';
                
                for (let j = 0; j < levels[i].length; j++) {
                    const node = levels[i][j];
                    
                    if (node) {
                        const nodeDiv = document.createElement('div');
                        nodeDiv.className = 'node';
                        nodeDiv.textContent = node.value;
                        nodeDiv.dataset.value = node.value;
                        
                        // Add height info
                        nodeDiv.title = `Height: ${node.height}`;
                        
                        levelDiv.appendChild(nodeDiv);
                        
                        // Add lines to children if they exist
                        const nextLevel = levels[i + 1];
                        if (nextLevel) {
                            const leftChild = nextLevel[j * 2];
                            const rightChild = nextLevel[j * 2 + 1];
                            
                            if (leftChild) {
                                addLine(nodeDiv, leftChild, 'left');
                            }
                            
                            if (rightChild) {
                                addLine(nodeDiv, rightChild, 'right');
                            }
                        }
                    } else {
                        // Empty space for null nodes
                        const emptyDiv = document.createElement('div');
                        emptyDiv.style.width = '40px';
                        emptyDiv.style.height = '40px';
                        emptyDiv.style.margin = '0 10px';
                        levelDiv.appendChild(emptyDiv);
                    }
                }
                
                treeContainer.appendChild(levelDiv);
            }
        }

        function addLine(parentNode, childNode, direction) {
            const line = document.createElement('div');
            line.className = 'line';
            
            const parentRect = parentNode.getBoundingClientRect();
            const parentX = parentRect.left + parentRect.width / 2;
            const parentY = parentRect.top + parentRect.height;
            
            const childRect = childNode.getBoundingClientRect();
            const childX = childRect.left + childRect.width / 2;
            const childY = childRect.top;
            
            const length = Math.sqrt(Math.pow(childX - parentX, 2) + Math.pow(childY - parentY, 2));
            const angle = Math.atan2(childY - parentY, childX - parentX) * 180 / Math.PI;
            
            line.style.width = `${length}px`;
            line.style.transform = `rotate(${angle}deg)`;
            line.style.left = `${parentRect.width / 2}px`;
            line.style.top = `${parentRect.height}px`;
            
            parentNode.appendChild(line);
            
            // Recalculate position after DOM update
            setTimeout(() => {
                const parentRect = parentNode.getBoundingClientRect();
                const parentX = parentRect.left + parentRect.width / 2;
                const parentY = parentRect.top + parentRect.height;
                
                const childRect = childNode.getBoundingClientRect();
                const childX = childRect.left + childRect.width / 2;
                const childY = childRect.top;
                
                const length = Math.sqrt(Math.pow(childX - parentX, 2) + Math.pow(childY - parentY, 2));
                const angle = Math.atan2(childY - parentY, childX - parentX) * 180 / Math.PI;
                
                line.style.width = `${length}px`;
                line.style.transform = `rotate(${angle}deg)`;
            }, 0);
        }

        function logOperation(message) {
            const output = document.getElementById('output');
            output.textContent = message;
        }

        // Button handlers
        function insertNode() {
            const value = parseInt(document.getElementById('insertValue').value);
            if (isNaN(value)) {
                logOperation('Please enter a valid number to insert.');
                return;
            }
            
            avlTree.insert(value);
            renderTree();
            logOperation(`Inserted value: ${value}`);
            
            document.getElementById('insertValue').value = '';
        }

        function deleteNode() {
            const value = parseInt(document.getElementById('deleteValue').value);
            if (isNaN(value)) {
                logOperation('Please enter a valid number to delete.');
                return;
            }
            
            const node = avlTree.search(value);
            if (!node) {
                logOperation(`Value ${value} not found in the tree.`);
                return;
            }
            
            avlTree.delete(value);
            renderTree();
            logOperation(`Deleted value: ${value}`);
            
            document.getElementById('deleteValue').value = '';
        }

        function searchNode() {
            const value = parseInt(document.getElementById('searchValue').value);
            if (isNaN(value)) {
                logOperation('Please enter a valid number to search.');
                return;
            }
            
            const node = avlTree.search(value);
            if (node) {
                // Highlight the found node
                const nodes = document.querySelectorAll('.node');
                nodes.forEach(n => {
                    n.classList.remove('highlight');
                    if (parseInt(n.dataset.value) === value) {
                        n.classList.add('highlight');
                    }
                });
                
                logOperation(`Found value: ${value}`);
            } else {
                logOperation(`Value ${value} not found in the tree.`);
            }
            
            document.getElementById('searchValue').value = '';
        }

        function clearTree() {
            avlTree.root = null;
            renderTree();
            logOperation('Tree cleared.');
        }

        function traverseInOrder() {
            const result = avlTree.inOrder();
            logOperation(`In-Order Traversal: ${result.join(', ')}`);
        }

        function traversePreOrder() {
            const result = avlTree.preOrder();
            logOperation(`Pre-Order Traversal: ${result.join(', ')}`);
        }

        function traversePostOrder() {
            const result = avlTree.postOrder();
            logOperation(`Post-Order Traversal: ${result.join(', ')}`);
        }

        // Initial render
        renderTree();
        logOperation('AVL Tree visualization ready. Insert values to build the tree.');
    </script>
</body>
</html>
