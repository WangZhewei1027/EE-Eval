<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Programming Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>
    <h1>Dynamic Programming Demo: Fibonacci Sequence</h1>
    <p>Calculate the nth Fibonacci number using Dynamic Programming</p>
    <label for="numInput">Enter a number (n): </label>
    <input type="number" id="numInput" min="0" value="0">
    <button onclick="calculateFibonacci()">Calculate Fibonacci</button>
    
    <div id="result"></div>

    <script>
        function calculateFibonacci() {
            const n = parseInt(document.getElementById('numInput').value);
            if (isNaN(n) || n < 0) {
                document.getElementById('result').innerText = 'Please enter a non-negative integer.';
                return;
            }
            
            const fib = fibonacci(n);
            document.getElementById('result').innerText = `Fibonacci(${n}) = ${fib}`;
        }

        function fibonacci(n) {
            if (n === 0) return 0;
            if (n === 1) return 1;
            
            const fibArray = new Array(n + 1);
            fibArray[0] = 0;
            fibArray[1] = 1;
            
            for (let i = 2; i <= n; i++) {
                fibArray[i] = fibArray[i - 1] + fibArray[i - 2];
            }
            return fibArray[n];
        }
    </script>
</body>
</html>
