<!DOCTYPE html>
<html>
<head>
    <title>Exponential Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #search-input {
            width: 50%;
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin: 10px;
        }
        #search-output {
            font-size: 24px;
            font-weight: bold;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Exponential Search</h1>
    <input type="text" id="search-input" placeholder="Enter a number to search for">
    <button id="search-button">Search</button>
    <div id="search-output"></div>

    <script>
        const searchInput = document.getElementById('search-input');
        const searchButton = document.getElementById('search-button');
        const searchOutput = document.getElementById('search-output');

        searchButton.addEventListener('click', () => {
            const input = searchInput.value.trim();
            if (input) {
                const numbers = input.split('').map(Number);
                const searchResult = exponentialSearch(numbers);
                if (searchResult) {
                    searchOutput.textContent = `Number ${numbers.indexOf(searchResult[0]) + 1} found in the list`;
                } else {
                    searchOutput.textContent = 'Number not found in the list';
                }
            } else {
                searchOutput.textContent = 'Please enter a number to search for';
            }
        });

        function exponentialSearch(numbers) {
            if (numbers.length === 0) {
                return null;
            }

            const target = numbers[0];
            const exponent = 2;

            while (exponent <= numbers.length) {
                const range = Math.min(numbers.length - exponent, numbers.length);
                const mid = Math.floor(exponent / 2) + 1;
                const midValue = numbers[mid - 1];

                if (midValue === target) {
                    return mid;
                } else if (midValue < target) {
                    exponent = mid;
                } else {
                    exponent = mid + 1;
                }
            }

            return null;
        }
    </script>
</body>
</html>
