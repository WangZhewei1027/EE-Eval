<!DOCTYPE html>
<html>
<head>
    <title>Topological Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .graph {
            width: 800px;
            margin: 40px auto;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .edge {
            width: 50px;
            height: 10px;
            margin: 5px;
            background-color: #ccc;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
        }
        .edge:hover {
            background-color: #eee;
        }
    </style>
</head>
<body>
    <h1>Topological Sort</h1>
    <canvas id="graph"></canvas>
    <script>
        const graph = document.getElementById('graph');
        const edges = [
            ['A', 'B'],
            ['A', 'C'],
            ['B', 'D'],
            ['B', 'E'],
            ['C', 'F'],
            ['D', 'E'],
            ['D', 'F'],
            ['E', 'F']
        ];
        const nodes = ['A', 'B', 'C', 'D', 'E', 'F'];

        const drawGraph = (edges, nodes) => {
            const canvas = document.createElement('canvas');
            canvas.width = 800;
            canvas.height = 600;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            for (let i = 0; i < edges.length; i++) {
                ctx.moveTo(edges[i][0].x, edges[i][0].y);
                ctx.lineTo(edges[i][1].x, edges[i][1].y);
                ctx.stroke();
            }
            for (let i = 0; i < nodes.length; i++) {
                ctx.fillStyle = 'blue';
                ctx.beginPath();
                ctx.arc(nodes[i].x, nodes[i].y, 20, 0, 2 * Math.PI);
                ctx.fill();
            }
            graph.innerHTML = '';
            graph.appendChild(canvas);
        }

        drawGraph(edges, nodes);
        const mouse = document.createEvent('Mouse');
        const event = document.createEvent('Mouse');
        event.initEvent('click', true, false);
        graph.addEventListener('click', (e) => {
            const rect = e.target.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const node = nodes[(y / 50) * 10];
            event = document.createEvent('Mouse', { clientX: x, clientY: y, button: 0, ctrl: false, alt: false });
            event.initEvent('click', true, false);
            event.target = e.target;
            graph.dispatchEvent(event);
        });

        const sort = (graph) => {
            const visited = new Array(graph.children.length).fill(false);
            const stack = [];
            const result = [];

            function dfs(node) {
                visited[node] = true;
                for (const edge of graph.children[node]) {
                    if (!visited[edge]) {
                        dfs(edge);
                    }
                }
                stack.push(node);
            }

            for (let i = 0; i < graph.children.length; i++) {
                if (!visited[i]) {
                    dfs(i);
                }
            }

            while (stack.length > 0) {
                const node = stack.pop();
                result.push(node);
                graph.children[node].forEach((edge) => {
                    visited[edge] = false;
                });
                for (const edge of graph.children[node]) {
                    if (!visited[edge]) {
                        stack.push(edge);
                    }
                }
            }

            return result.reverse();
        };

        const sorted = sort(graph);
        const sortedNodes = sorted.map((node) => nodes[node]);
        const sortedEdges = [];
        for (let i = 0; i < sorted.length; i++) {
            for (let j = i + 1; j < sorted.length; j++) {
                if (sorted[i] < sorted[j]) {
                    sortedEdges.push([sorted[i], sorted[j]]);
                }
            }
        }

        drawGraph(sortedEdges, sortedNodes);
    </script>
</body>
</html>
