<!DOCTYPE html>
<html>
<head>
    <title>Overfitting Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .chart {
            width: 800px;
            height: 400px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
<h1>Overfitting Example</h1>
<script>
    // Create a simple dataset
    const data = {
        labels: ['A', 'B', 'C', 'D', 'E'],
        datasets: [{
            label: 'Training',
            data: [10, 15, 7, 12, 20],
            backgroundColor: 'rgba(255, 99, 132, 0.2)',
            borderColor: 'rgba(255, 99, 132, 1)',
            borderWidth: 1
        }, {
            label: 'Test',
            data: [5, 8, 3, 7, 12],
            backgroundColor: 'rgba(54, 162, 235, 0.2)',
            borderColor: 'rgba(54, 162, 235, 1)',
            borderWidth: 1
        }]
    };

    // Create the chart
    const ctx = document.getElementById('chart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'bar',
        data: data,
        options: {
            title: {
                display: true,
                text: 'Overfitting Example'
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    // Train the model
    for (let i = 0; i < 100; i++) {
        // Simulate data generation
        const x = new Array(100).fill(0).map((_, index) => index);
        const y = new Array(100).fill(Math.sin(x).toFixed(2));

        // Train the model
        chart.data.datasets[0].data = y;
        chart.data.datasets[1].data = y;
        chart.update();
    }

    // Plot the data
    chart.data.datasets[0].data.forEach((value, index) => {
        document.getElementById('label').innerHTML = data.labels[index];
        document.getElementById('value').innerHTML = value;
    });
</script>
<div id="chart"></div>
<div id="label"></div>
<div id="value"></div>
</body>
</html>
