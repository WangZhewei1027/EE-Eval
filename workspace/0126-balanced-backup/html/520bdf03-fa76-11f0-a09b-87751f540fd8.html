<!DOCTYPE html>
<html>
<head>
    <title>Symmetric Cryptography</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 18px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Symmetric Cryptography</h1>
        <p>Symmetric cryptography is a method of secure communication where the same key is used for both encryption and decryption.</p>
        <p>It uses a single key for both encryption and decryption, and it is typically used for data that needs to be transmitted securely.</p>
        <button onclick="symmetricCryptography()">Symmetric Cryptography Example</button>
        <div id="output"></div>
    </div>

    <script>
        let symmetricCryptography = (key, data) => {
            let encrypted = crypto.subtle.encrypt({
                name: 'AES-GCM',
                iv: crypto.randomBytes(12),
                mode: 'gcm',
                padding: 'pkcs7',
                live: true
            }, key, data);
            return encrypted;
        };

        let encryptedData = symmetricCryptography('mySecretKey', 'Hello, World!');
        let decryptedData = symmetricCryptography(encryptedData, 'mySecretKey');
        document.getElementById('output').innerHTML = 'Encrypted: <pre>' + encryptedData + '</pre><br>Decrypted: <pre>' + decryptedData + '</pre>';
    </script>
</body>
</html>
