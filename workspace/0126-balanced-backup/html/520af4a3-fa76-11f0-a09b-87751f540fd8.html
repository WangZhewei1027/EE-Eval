<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .title {
            text-align: center;
            margin-bottom: 20px;
        }
        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Git Demo</h1>
        <p>Git is a version control system that allows multiple developers to work on the same project simultaneously.</p>
        <button class="button" id="git-clone-button">Clone Repository</button>
        <button class="button" id="git-push-button">Push to GitHub</button>
        <button class="button" id="git-branch-button">Create New Branch</button>
        <button class="button" id="git-commit-button">Commit Changes</button>
        <button class="button" id="git-status-button">Get Git Status</button>
    </div>

    <script>
        // Clone repository
        document.getElementById('git-clone-button').addEventListener('click', () => {
            const cloneUrl = 'https://github.com/your-username/your-repo-name.git';
            const cloneButton = document.getElementById('git-clone-button');
            cloneButton.href = cloneUrl;
            cloneButton.textContent = 'Clone Repository';
        });

        // Push to GitHub
        document.getElementById('git-push-button').addEventListener('click', () => {
            const pushUrl = 'https://github.com/your-username/your-repo-name.git';
            const pushButton = document.getElementById('git-push-button');
            pushButton.href = pushUrl;
            pushButton.textContent = 'Push to GitHub';
        });

        // Create new branch
        document.getElementById('git-branch-button').addEventListener('click', () => {
            const branchUrl = 'https://github.com/your-username/your-repo-name.git';
            const branchButton = document.getElementById('git-branch-button');
            branchButton.href = branchUrl;
            branchButton.textContent = 'Create New Branch';
        });

        // Commit changes
        document.getElementById('git-commit-button').addEventListener('click', () => {
            const commitUrl = 'https://github.com/your-username/your-repo-name.git';
            const commitButton = document.getElementById('git-commit-button');
            commitButton.href = commitUrl;
            commitButton.textContent = 'Commit Changes';
        });

        // Get Git status
        document.getElementById('git-status-button').addEventListener('click', () => {
            const statusUrl = 'https://github.com/your-username/your-repo-name.git';
            const statusButton = document.getElementById('git-status-button');
            statusButton.href = statusUrl;
            statusButton.textContent = 'Get Git Status';
        });
    </script>
</body>
</html>
