<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        #output {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            background-color: #fff;
            min-height: 50px;
        }
        #btnMonitor {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 16px;
        }
        #btnMonitor:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <h1>Monitor Concept Example</h1>
    <p>Click the button to start monitoring the function execution.</p>
    <button id="btnMonitor">Start Monitoring</button>

    <div id="output"></div>

    <script>
        let count = 0;
        const outputDiv = document.getElementById('output');

        function monitor(func) {
            return function(...args) {
                count++;
                outputDiv.innerHTML += `<p>Function called ${count} times with arguments: ${JSON.stringify(args)}</p>`;
                return func(...args);
            }
        }

        function someFunction(x, y) {
            return x + y;
        }

        const monitoredFunction = monitor(someFunction);

        document.getElementById('btnMonitor').addEventListener('click', () => {
            const result = monitoredFunction(2, 3);
            outputDiv.innerHTML += `<p>Result of function: ${result}</p>`;
        });
    </script>

</body>
</html>
