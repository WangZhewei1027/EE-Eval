<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Means Clustering Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        #canvas {
            border: 1px solid #000;
            margin: 20px auto;
            display: block;
        }
        .controls {
            margin: 10px;
        }
        button {
            padding: 8px 15px;
            margin: 5px;
            cursor: pointer;
        }
        .cluster-info {
            margin: 20px auto;
            max-width: 600px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>K-Means Clustering Visualization</h1>
    <div class="controls">
        <label for="kValue">Number of clusters (K):</label>
        <input type="number" id="kValue" min="1" max="10" value="3">
        <button id="resetBtn">Reset Points</button>
        <button id="clusterBtn">Run Clustering</button>
        <button id="stepBtn">Step</button>
    </div>
    <canvas id="canvas" width="600" height="400"></canvas>
    <div class="cluster-info" id="info"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resetBtn = document.getElementById('resetBtn');
        const clusterBtn = document.getElementById('clusterBtn');
        const stepBtn = document.getElementById('stepBtn');
        const kInput = document.getElementById('kValue');
        const infoDiv = document.getElementById('info');

        let points = [];
        let centroids = [];
        let clusters = [];
        let iteration = 0;
        let isRunning = false;
        let animationId = null;

        // Initialize the canvas with random points
        function initPoints() {
            points = [];
            const pointCount = 100;
            for (let i = 0; i < pointCount; i++) {
                points.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: Math.random() * (canvas.height - 40) + 20,
                    cluster: -1
                });
            }
            draw();
        }

        // Initialize centroids randomly
        function initCentroids() {
            centroids = [];
            const k = parseInt(kInput.value);
            
            // Select k distinct random points as initial centroids
            const shuffled = [...points].sort(() => 0.5 - Math.random());
            centroids = shuffled.slice(0, k).map(p => ({
                x: p.x,
                y: p.y,
                color: getRandomColor()
            }));
        }

        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        // Assign each point to the nearest centroid
        function assignClusters() {
            clusters = centroids.map(() => []);
            
            for (let point of points) {
                let minDist = Infinity;
                let closestCentroid = -1;
                
                for (let i = 0; i < centroids.length; i++) {
                    const dx = point.x - centroids[i].x;
                    const dy = point.y - centroids[i].y;
                    const dist = dx * dx + dy * dy; // squared distance
                    
                    if (dist < minDist) {
                        minDist = dist;
                        closestCentroid = i;
                    }
                }
                
                point.cluster = closestCentroid;
                clusters[closestCentroid].push(point);
            }
        }

        // Update centroids to be the mean of their cluster
        function updateCentroids() {
            let converged = true;
            
            for (let i = 0; i < centroids.length; i++) {
                if (clusters[i].length === 0) continue;
                
                const oldX = centroids[i].x;
                const oldY = centroids[i].y;
                
                // Calculate mean of cluster points
                let sumX = 0;
                let sumY = 0;
                for (let point of clusters[i]) {
                    sumX += point.x;
                    sumY += point.y;
                }
                
                centroids[i].x = sumX / clusters[i].length;
                centroids[i].y = sumY / clusters[i].length;
                
                // Check if centroid moved significantly
                const dx = centroids[i].x - oldX;
                const dy = centroids[i].y - oldY;
                if (dx * dx + dy * dy > 1) { // threshold of 1 pixel
                    converged = false;
                }
            }
            
            return converged;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw points
            for (let point of points) {
                if (point.cluster >= 0 && centroids[point.cluster]) {
                    ctx.fillStyle = centroids[point.cluster].color;
                } else {
                    ctx.fillStyle = '#999999';
                }
                ctx.beginPath();
                ctx.arc(point.x, point.y, 5, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw centroids
            for (let centroid of centroids) {
                ctx.fillStyle = centroid.color;
                ctx.beginPath();
                ctx.arc(centroid.x, centroid.y, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            // Display iteration info
            infoDiv.innerHTML = `
                <h3>Algorithm State</h3>
                <p>Iteration: ${iteration}</p>
                <p>Number of clusters: ${centroids.length}</p>
                <p>Click "Step" to see each step or "Run Clustering" to animate the process.</p>
            `;
        }

        function step() {
            if (centroids.length === 0) {
                initCentroids();
            }
            
            assignClusters();
            const converged = updateCentroids();
            iteration++;
            
            draw();
            
            if (converged) {
                infoDiv.innerHTML += `<p>Converged after ${iteration} iterations!</p>`;
                if (isRunning) {
                    cancelAnimationFrame(animationId);
                    isRunning = false;
                }
            }
        }

        function runClustering() {
            if (isRunning) return;
            
            isRunning = true;
            iteration = 0;
            
            function animate() {
                step();
                if (isRunning) {
                    animationId = requestAnimationFrame(animate);
                }
            }
            
            animate();
        }

        function stopClustering() {
            isRunning = false;
            cancelAnimationFrame(animationId);
        }

        // Event listeners
        resetBtn.addEventListener('click', () => {
            stopClustering();
            initPoints();
            centroids = [];
            clusters = [];
            iteration = 0;
        });

        clusterBtn.addEventListener('click', runClustering);
        stepBtn.addEventListener('click', step);

        // Initialize
        initPoints();
        draw();

        // Allow adding new points by clicking
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            points.push({
                x: x,
                y: y,
                cluster: -1
            });
            
            draw();
        });
    </script>
</body>
</html>
