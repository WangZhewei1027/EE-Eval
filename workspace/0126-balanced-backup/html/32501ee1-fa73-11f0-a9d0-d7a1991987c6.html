<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Nearest Neighbors Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        canvas { border: 1px solid black; }
    </style>
</head>
<body>
    <h1>K-Nearest Neighbors (KNN) Demo</h1>
    <canvas id="canvas" width="600" height="400"></canvas>
    <br>
    <button id="classifyButton">Classify Point</button>
    <div>
        <p>Click to add points (red = Class A, blue = Class B).</p>
        <p>Classify the new point (green) by clicking "Classify Point".</p>
    </div>
    <script>
        const canvas = document.getElementById("canvas");
        const context = canvas.getContext("2d");

        const points = [];
        const classes = [];
        let newPoint = null;
        const k = 3; // Number of neighbors to consider

        canvas.addEventListener("click", (event) => {
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            // Randomly assign color (class) for simplicity
            const classType = Math.random() > 0.5 ? 'A' : 'B';
            points.push({ x, y });
            classes.push(classType);
            drawPoints();
        });

        document.getElementById("classifyButton").addEventListener("click", () => {
            if (newPoint) {
                classifyNewPoint(newPoint.x, newPoint.y);
            } else {
                alert("Please add a new point by clicking on the canvas first!");
            }
        });

        canvas.addEventListener("dblclick", (event) => {
            const rect = canvas.getBoundingClientRect();
            newPoint = {
                x: event.clientX - rect.left,
                y: event.clientY - rect.top
            };
            drawNewPoint(newPoint.x, newPoint.y);
        });

        function drawPoints() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            points.forEach((point, index) => {
                context.fillStyle = classes[index] === 'A' ? 'red' : 'blue';
                context.beginPath();
                context.arc(point.x, point.y, 5, 0, Math.PI * 2);
                context.fill();
            });
            if (newPoint) {
                drawNewPoint(newPoint.x, newPoint.y);
            }
        }

        function drawNewPoint(x, y) {
            context.fillStyle = 'green';
            context.beginPath();
            context.arc(x, y, 5, 0, Math.PI * 2);
            context.fill();
        }

        function classifyNewPoint(x, y) {
            const distances = points.map((point, index) => {
                return {
                    index: index,
                    distance: Math.sqrt(Math.pow(point.x - x, 2) + Math.pow(point.y - y, 2))
                };
            });

            // Sort by distance
            distances.sort((a, b) => a.distance - b.distance);

            // Select K nearest neighbors
            const nearestNeighbors = distances.slice(0, k);

            // Count classes
            const classCount = {};
            nearestNeighbors.forEach(neighbor => {
                const className = classes[neighbor.index];
                classCount[className] = (classCount[className] || 0) + 1;
            });

            // Determine majority class
            const predictedClass = Object.keys(classCount).reduce((a, b) => classCount[a] > classCount[b] ? a : b);
            alert(`Predicted class for the new point: ${predictedClass}`);
        }
    </script>
</body>
</html>
