        let startVertex = 0;
        let endVertex = 0;

        function prim(graph) {
            graph.edges = [];
            for (let i = 0; i < graph.vertices.length; i++) {
                if (i === startVertex) continue;
                if (i === endVertex) break;
                graph.edges.push({ from: i, to: graph.vertices[i].id, weight: 0 });
            }

            graph.visited = [];
            graph.parent = {};

            let queue = [startVertex];
            while (queue.length > 0) {
                let vertex = queue.shift();
                if (vertex === endVertex) break;

                graph.visited.push(vertex);
                for (let edge of graph.edges) {
                    if (edge.to === vertex) continue;
                    if (graph.visited.includes(edge.to)) continue;
                    graph.edges.push({ from: edge.from, to: edge.to, weight: edge.weight });
                    queue.push(edge.to);
                }
            }

            if (graph.visited.includes(endVertex)) {
                console.log("Graph is not connected");
            } else {
                console.log("Graph is connected");
                console.log("Edges:", graph.edges);
            }
        }

            for (let i = 0; i < graph.vertices.length; i++) {
                ctx.beginPath();
                ctx.arc(graph.vertices[i].x, graph.vertices[i].y, 5, 0, 2 * Math.PI);
                ctx.fillStyle = "blue";
                ctx.fill();
            }

            for (let i = 0; i < graph.edges.length; i++) {
                let from = graph.edges[i].from;
                let to = graph.edges[i].to;
                let weight = graph.edges[i].weight;
                ctx.beginPath();
                ctx.moveTo(from, graph.vertices[from].y);
                ctx.lineTo(to, graph.vertices[to].y);
                ctx.strokeStyle = "red";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
