<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f4;
        }
        #array {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .element {
            width: 30px;
            height: 30px;
            margin: 0 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
        }
        .current {
            background-color: #ff9800;
        }
        .found {
            background-color: #2196F3;
        }
    </style>
</head>
<body>

<h1>Binary Search Visualization</h1>
<p>Enter a sorted array and a target number to find:</p>
<input type="text" id="arrayInput" placeholder="e.g. 1,2,3,4,5" />
<input type="number" id="targetInput" placeholder="Target number" />
<button id="searchButton">Search</button>

<div id="array"></div>
<p id="result"></p>

<script>
    document.getElementById('searchButton').addEventListener('click', function() {
        const arrayInput = document.getElementById('arrayInput').value;
        const targetInput = parseInt(document.getElementById('targetInput').value);
        const array = arrayInput.split(',').map(num => parseInt(num.trim()));

        displayArray(array);
        const result = binarySearch(array, targetInput);
        document.getElementById('result').innerText = result !== -1 ? 
            `Target found at index: ${result}` : 
            'Target not found';
    });

    function displayArray(array) {
        const arrayDiv = document.getElementById('array');
        arrayDiv.innerHTML = ''; // Clear previous array
        array.forEach((num) => {
            const element = document.createElement('div');
            element.className = 'element';
            element.innerText = num;
            arrayDiv.appendChild(element);
        });
    }

    async function binarySearch(array, target) {
        let left = 0;
        let right = array.length - 1;

        while (left <= right) {
            const mid = Math.floor((left + right) / 2);
            updateCurrentElement(mid);

            if (array[mid] === target) {
                markAsFound(mid);
                return mid;
            } else if (array[mid] < target) {
                left = mid + 1;
            } else {
                right = mid - 1;
            }

            await sleep(1000); // Wait before next iteration for visualization
            resetCurrentElement(mid);
        }
        return -1; // Not found
    }

    function updateCurrentElement(index) {
        const elements = document.getElementsByClassName('element');
        if (elements[index]) {
            elements[index].classList.add('current');
        }
    }

    function resetCurrentElement(index) {
        const elements = document.getElementsByClassName('element');
        if (elements[index]) {
            elements[index].classList.remove('current');
        }
    }

    function markAsFound(index) {
        const elements = document.getElementsByClassName('element');
        if (elements[index]) {
            elements[index].classList.add('found');
        }
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
</script>

</body>
</html>
