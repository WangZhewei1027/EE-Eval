<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big-Theta Notation Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #plot {
            margin-top: 20px;
        }
        canvas {
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <h1>Big-Theta Notation Demonstration</h1>
    <p>Big-Theta notation (<code>Θ</code>) provides a tight bound on the growth rate of a function. Specifically, it describes both an upper and lower bound.</p>
    <p>Let's visualize a function and show how to find Big-Theta by comparing it with linear and quadratic functions.</p>

    <label for="input-n">Enter a value for n: </label>
    <input type="number" id="input-n" value="10" min="1" max="100">
    <button onclick="drawGraphs()">Draw Graphs</button>

    <div id="plot">
        <canvas id="canvas" width="600" height="400"></canvas>
    </div>

    <script>
        function drawGraphs() {
            const n = parseInt(document.getElementById('input-n').value);
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            // Clear the canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const scale = 10; // Scale factors for drawing
            const offsetX = 50;
            const offsetY = 350;
            const maxHeight = 300;

            // Function f(n) = n
            drawLine(ctx, n, (x) => x, 'blue', 'f(n) = n');
            
            // Function g(n) = n^2
            drawLine(ctx, n, (x) => x * x, 'red', 'g(n) = n^2');
            
            // Big-Theta representation
            drawTheta(ctx, n, (x) => x * x, 'green', 'Θ(n^2)');

            // Draw Axes
            drawAxes(ctx);
        }

        function drawLine(ctx, n, func, color, label) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            for (let x = 1; x <= n; x++) {
                const y = func(x) / 10; // scale down for visibility
                const canvasX = x * 20 + 50;
                const canvasY = 350 - y;
                ctx.lineTo(canvasX, canvasY);
                ctx.fillText(`(${x}, ${Math.round(y)})`, canvasX, canvasY);
            }
            ctx.stroke();
            ctx.fillStyle = color;
            ctx.fillText(label, 20, n * 20 - 100);
        }

        function drawTheta(ctx, n, func, color, label) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            for (let x = 1; x <= n; x++) {
                const y = func(x) / 15; // scale down for visibility
                const canvasX = x * 20 + 50;
                const canvasY = 350 - y;
                ctx.lineTo(canvasX, canvasY);
            }
            ctx.stroke();
            ctx.fillStyle = color;
            ctx.fillText(label, 20, n * 20 - 100);
        }

        function drawAxes(ctx) {
            ctx.beginPath();
            ctx.moveTo(50, 350);
            ctx.lineTo(50, 50);
            ctx.lineTo(600, 50);
            ctx.stroke();
            ctx.fillText('n', 580, 370); // x-axis
            ctx.fillText('f(n)', 10, 20); // y-axis
        }

    </script>
</body>
</html>
