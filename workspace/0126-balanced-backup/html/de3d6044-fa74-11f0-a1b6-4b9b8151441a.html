<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version Control Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .commit {
            background-color: #f9f9f9;
            border-left: 4px solid #3498db;
            padding: 15px;
            margin: 15px 0;
            border-radius: 0 4px 4px 0;
        }
        .commit-title {
            font-weight: bold;
            color: #2c3e50;
        }
        .commit-message {
            margin-top: 5px;
            color: #7f8c8d;
        }
        .commit-hash {
            font-family: monospace;
            color: #3498db;
            font-size: 0.9em;
        }
        .branch {
            display: inline-block;
            background-color: #e74c3c;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.8em;
            margin-left: 10px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #2980b9;
        }
        .repository {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <h1>Version Control System Demonstration</h1>
    
    <p>This demo simulates a simple version control system with commits, branches, and merging.</p>
    
    <div id="controls">
        <button id="makeChange">Make a Change</button>
        <button id="createBranch">Create Branch</button>
        <button id="mergeBranch">Merge Branch</button>
        <button id="reset">Reset</button>
    </div>
    
    <h2>Current Branch: <span id="currentBranch">main</span></h2>
    
    <div class="repository">
        <h3>Repository History</h3>
        <div id="commitHistory"></div>
    </div>
    
    <div id="fileContent">
        <h3>File: demo.txt</h3>
        <pre id="fileText">Initial content</pre>
    </div>
    
    <script>
        // Simple version control system simulation
        class VersionControl {
            constructor() {
                this.commits = [];
                this.branches = ['main'];
                this.currentBranch = 'main';
                this.fileContent = 'Initial content';
                this.nextCommitId = 1;
                
                // Initial commit
                this.commit('Initial commit');
            }
            
            commit(message) {
                const commit = {
                    id: this.nextCommitId++,
                    hash: this.generateHash(),
                    branch: this.currentBranch,
                    message: message,
                    content: this.fileContent,
                    timestamp: new Date()
                };
                
                this.commits.push(commit);
                this.updateUI();
                return commit;
            }
            
            generateHash() {
                return Math.random().toString(36).substring(2, 10);
            }
            
            createBranch(name) {
                if (this.branches.includes(name)) {
                    alert('Branch already exists!');
                    return false;
                }
                
                this.branches.push(name);
                return true;
            }
            
            checkoutBranch(name) {
                if (!this.branches.includes(name)) {
                    alert('Branch does not exist!');
                    return false;
                }
                
                this.currentBranch = name;
                
                // Find the last commit on this branch
                const lastCommit = [...this.commits]
                    .reverse()
                    .find(commit => commit.branch === name);
                
                if (lastCommit) {
                    this.fileContent = lastCommit.content;
                }
                
                this.updateUI();
                return true;
            }
            
            mergeBranch(sourceBranch) {
                if (!this.branches.includes(sourceBranch)) {
                    alert('Source branch does not exist!');
                    return false;
                }
                
                if (sourceBranch === this.currentBranch) {
                    alert('Cannot merge a branch with itself!');
                    return false;
                }
                
                // In a real system, this would be more complex with conflict resolution
                const lastSourceCommit = [...this.commits]
                    .reverse()
                    .find(commit => commit.branch === sourceBranch);
                
                if (lastSourceCommit) {
                    this.fileContent = `MERGED:\n${this.fileContent}\n${lastSourceCommit.content}`;
                    this.commit(`Merge branch '${sourceBranch}' into '${this.currentBranch}'`);
                }
                
                return true;
            }
            
            makeRandomChange() {
                const changes = [
                    'Added new feature',
                    'Fixed a bug',
                    'Updated documentation',
                    'Refactored code',
                    'Improved performance',
                    'Added test cases'
                ];
                
                const change = changes[Math.floor(Math.random() * changes.length)];
                this.fileContent += `\n${change} (Commit ${this.nextCommitId})`;
                this.commit(change);
            }
            
            updateUI() {
                // Update current branch display
                document.getElementById('currentBranch').textContent = this.currentBranch;
                
                // Update file content
                document.getElementById('fileText').textContent = this.fileContent;
                
                // Update commit history
                const commitHistory = document.getElementById('commitHistory');
                commitHistory.innerHTML = '';
                
                this.commits.slice().reverse().forEach(commit => {
                    const commitElement = document.createElement('div');
                    commitElement.className = 'commit';
                    
                    const title = document.createElement('div');
                    title.className = 'commit-title';
                    title.textContent = commit.message;
                    
                    const hash = document.createElement('div');
                    hash.className = 'commit-hash';
                    hash.textContent = commit.hash.substring(0, 7);
                    
                    const message = document.createElement('div');
                    message.className = 'commit-message';
                    message.textContent = `Branch: ${commit.branch} - ${commit.timestamp.toLocaleString()}`;
                    
                    if (commit.branch === this.currentBranch) {
                        const branchTag = document.createElement('span');
                        branchTag.className = 'branch';
                        branchTag.textContent = 'HEAD';
                        title.appendChild(branchTag);
                    }
                    
                    commitElement.appendChild(title);
                    commitElement.appendChild(hash);
                    commitElement.appendChild(message);
                    commitHistory.appendChild(commitElement);
                });
            }
        }
        
        // Initialize the version control system
        const vcs = new VersionControl();
        
        // Set up event listeners
        document.getElementById('makeChange').addEventListener('click', () => {
            vcs.makeRandomChange();
        });
        
        document.getElementById('createBranch').addEventListener('click', () => {
            const branchName = prompt('Enter new branch name:');
            if (branchName && branchName.trim()) {
                if (vcs.createBranch(branchName)) {
                    if (confirm(`Switch to branch '${branchName}'?`)) {
                        vcs.checkoutBranch(branchName);
                    }
                }
            }
        });
        
        document.getElementById('mergeBranch').addEventListener('click', () => {
            const branchToMerge = prompt('Enter branch to merge:');
            if (branchToMerge && branchToMerge.trim()) {
                vcs.mergeBranch(branchToMerge);
            }
        });
        
        document.getElementById('reset').addEventListener('click', () => {
            if (confirm('Reset the entire repository?')) {
                window.location.reload();
            }
        });
    </script>
</body>
</html>
