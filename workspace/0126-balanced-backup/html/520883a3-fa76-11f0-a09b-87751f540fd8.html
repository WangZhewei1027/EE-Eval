<!DOCTYPE html>
<html>
<head>
    <title>Priority Queue</title>
    <style>
        #priority-queue {
            border: 1px solid black;
            padding: 10px;
            width: 300px;
        }
    </style>
</head>
<body>
    <h1>Priority Queue</h1>
    <button id="add-queue">Add Element</button>
    <button id="remove-queue">Remove Element</button>
    <button id="peek-queue">Peek Element</button>
    <button id="display-queue">Display Queue</button>
    <div id="priority-queue"></div>

    <script>
        class PriorityQueue {
            constructor() {
                this.queue = [];
            }

            enqueue(element, priority) {
                this.queue.push([element, priority]);
                this.queue.sort((a, b) => a[1] - b[1]);
            }

            dequeue() {
                return this.queue.shift();
            }

            peek() {
                return this.queue[0][0];
            }

            display() {
                return this.queue.map(element => `${element} (${element[1]})`).join('\n');
            }
        }

        let queue = new PriorityQueue();

        document.getElementById('add-queue').addEventListener('click', () => {
            let element = prompt('Enter an element:');
            if (element) {
                queue.enqueue(element, 1);
                document.getElementById('priority-queue').innerHTML += `<p>${element} (Priority: 1)</p>`;
            }
        });

        document.getElementById('remove-queue').addEventListener('click', () => {
            let element = prompt('Enter an element:');
            if (element) {
                let removed = queue.dequeue();
                document.getElementById('priority-queue').innerHTML += `<p>${removed} (${removed[1]})</p>`;
                if (removed[0] === element) {
                    document.getElementById('priority-queue').innerHTML += `<p>Removed: ${element}</p>`;
                }
            }
        });

        document.getElementById('peek-queue').addEventListener('click', () => {
            if (queue.queue.length > 0) {
                document.getElementById('priority-queue').innerHTML += `<p>${queue.peek()} (${queue.peek()[1]})</p>`;
            } else {
                document.getElementById('priority-queue').innerHTML += `<p>No elements in the queue</p>`;
            }
        });

        document.getElementById('display-queue').addEventListener('click', () => {
            document.getElementById('priority-queue').innerHTML = queue.display();
        });
    </script>
</body>
</html>
