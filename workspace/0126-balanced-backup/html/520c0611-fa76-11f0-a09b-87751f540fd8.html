<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signatures</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            width: 80%;
            margin: 40px auto;
            text-align: center;
        }
        .signature {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Digital Signatures</h1>
        <p>Digital signatures are a form of electronic signature that uses cryptography to ensure the authenticity and integrity of a message or document.</p>
        <button id="generate-signature">Generate Signature</button>
        <button id="verify-signature">Verify Signature</button>
        <div id="signature"></div>
        <script>
            const generateSignatureButton = document.getElementById('generate-signature');
            const verifySignatureButton = document.getElementById('verify-signature');
            const signatureElement = document.getElementById('signature');
            const signature = document.createElement('canvas');
            signature.width = 200;
            signature.height = 100;
            const ctx = signature.getContext('2d');
            let signatureData = '';

            generateSignatureButton.addEventListener('click', () => {
                const message = prompt('Enter a message to sign:');
                if (message) {
                    signatureData = message;
                    generateSignature();
                }
            });

            verifySignatureButton.addEventListener('click', () => {
                if (verifySignature()) {
                    signatureElement.innerText = 'Signature verified!';
                } else {
                    signatureElement.innerText = 'Signature verification failed!';
                }
            });

            function generateSignature() {
                const message = document.createElement('textarea');
                message.value = signatureData;
                message.style.display = 'block';
                generateSignatureButton.disabled = true;
                verifySignatureButton.disabled = false;

                let canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 100;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = '24px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillStyle = 'black';
                ctx.fillText(signatureData, 10, 10);
                ctx.stroke();

                signature = canvas.toDataURL();
                generateSignatureButton.disabled = false;
                verifySignatureButton.disabled = true;
            }

            function verifySignature() {
                const message = document.createElement('textarea');
                message.value = signature;
                message.style.display = 'block';
                generateSignatureButton.disabled = true;
                verifySignatureButton.disabled = false;

                let canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 100;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = '24px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillStyle = 'black';
                ctx.fillText(message.value, 10, 10);
                ctx.stroke();

                try {
                    const dataURL = canvas.toDataURL();
                    if (dataURL === signature) {
                        signatureElement.innerText = 'Signature verified!';
                    } else {
                        signatureElement.innerText = 'Signature verification failed!';
                    }
                } catch (e) {
                    signatureElement.innerText = 'Error: ' + e.message;
                }

                return false;
            }
        </script>
    </div>
</body>
</html>
