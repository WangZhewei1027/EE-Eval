<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agile Methodology Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .card {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 300px;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h3 {
            margin-top: 0;
            color: #3498db;
        }
        .sprint-board {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .status-column {
            background: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .task {
            background: #fff;
            padding: 8px;
            margin: 5px 0;
            border-left: 4px solid #3498db;
            cursor: pointer;
        }
        .task:hover {
            background: #f0f7fc;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #2980b9;
        }
        .burndown-container {
            width: 100%;
            height: 300px;
            margin: 20px 0;
        }
        #burndownChart {
            width: 100%;
            height: 100%;
            border: 1px solid #ddd;
            background: white;
        }
    </style>
</head>
<body>
    <h1>Agile Methodology Demonstration</h1>
    
    <div class="container">
        <div class="card">
            <h3>Agile Principles</h3>
            <ul id="principlesList"></ul>
        </div>
        
        <div class="card">
            <h3>Scrum Events</h3>
            <ul id="scrumEventsList"></ul>
        </div>
        
        <div class="card">
            <h3>Roles</h3>
            <ul id="rolesList"></ul>
        </div>
    </div>
    
    <h2>Sprint Simulation</h2>
    <div class="sprint-board">
        <h3>Sprint Backlog</h3>
        <div id="backlogItems" class="status-column"></div>
        
        <h3>Sprint Board</h3>
        <div class="container">
            <div style="width: 23%">
                <h4>To Do</h4>
                <div id="todoColumn" class="status-column"></div>
            </div>
            <div style="width: 23%">
                <h4>In Progress</h4>
                <div id="inProgressColumn" class="status-column"></div>
            </div>
            <div style="width: 23%">
                <h4>In Review</h4>
                <div id="reviewColumn" class="status-column"></div>
            </div>
            <div style="width: 23%">
                <h4>Done</h4>
                <div id="doneColumn" class="status-column"></div>
            </div>
        </div>
        
        <div>
            <button id="startSprintBtn">Start Sprint</button>
            <button id="dailyScrumBtn">Daily Scrum</button>
            <button id="completeTaskBtn">Complete Task</button>
            <button id="endSprintBtn">End Sprint</button>
        </div>
    </div>
    
    <div class="burndown-container">
        <h3>Burndown Chart</h3>
        <canvas id="burndownChart"></canvas>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Agile Data
        const agilePrinciples = [
            "Customer satisfaction through early and continuous delivery",
            "Welcome changing requirements, even late in development",
            "Deliver working software frequently",
            "Business people and developers work together daily",
            "Build projects around motivated individuals",
            "Face-to-face conversation is best",
            "Working software is the primary measure of progress",
            "Sustainable development pace",
            "Continuous attention to technical excellence",
            "Simplicity is essential",
            "Self-organizing teams create the best architectures",
            "Regular reflection and adaptation"
        ];
        
        const scrumEvents = [
            "Sprint Planning",
            "Daily Scrum",
            "Sprint Review",
            "Sprint Retrospective"
        ];
        
        const roles = [
            "Product Owner - Manages the product backlog",
            "Scrum Master - Facilitates the Scrum process",
            "Development Team - Cross-functional team that delivers the product"
        ];
        
        // Sprint Simulation Data
        let sprintBacklog = [];
        let todoTasks = [];
        let inProgressTasks = [];
        let reviewTasks = [];
        let doneTasks = [];
        let sprintActive = false;
        let sprintDaysRemaining = 0;
        let totalStoryPoints = 0;
        let remainingStoryPoints = 0;
        let burndownData = [];
        let burndownChart;
        
        // DOM Elements
        const principlesListEl = document.getElementById('principlesList');
        const scrumEventsListEl = document.getElementById('scrumEventsList');
        const rolesListEl = document.getElementById('rolesList');
        const backlogItemsEl = document.getElementById('backlogItems');
        const todoColumnEl = document.getElementById('todoColumn');
        const inProgressColumnEl = document.getElementById('inProgressColumn');
        const reviewColumnEl = document.getElementById('reviewColumn');
        const doneColumnEl = document.getElementById('doneColumn');
        const startSprintBtn = document.getElementById('startSprintBtn');
        const dailyScrumBtn = document.getElementById('dailyScrumBtn');
        const completeTaskBtn = document.getElementById('completeTaskBtn');
        const endSprintBtn = document.getElementById('endSprintBtn');
        
        // Initialize the page
        function init() {
            renderLists();
            setupSprintBacklog();
            setupEventListeners();
            initBurndownChart();
        }
        
        function renderLists() {
            agilePrinciples.forEach(principle => {
                const li = document.createElement('li');
                li.textContent = principle;
                principlesListEl.appendChild(li);
            });
            
            scrumEvents.forEach(event => {
                const li = document.createElement('li');
                li.textContent = event;
                scrumEventsListEl.appendChild(li);
            });
            
            roles.forEach(role => {
                const li = document.createElement('li');
                li.textContent = role;
                rolesListEl.appendChild(li);
            });
        }
        
        function setupSprintBacklog() {
            const sampleTasks = [
                { id: 1, title: "User login functionality", points: 5 },
                { id: 2, title: "Product listing page", points: 8 },
                { id: 3, title: "Shopping cart feature", points: 13 },
                { id: 4, title: "Checkout process", points: 8 },
                { id: 5, title: "User profile page", points: 3 },
                { id: 6, title: "Search functionality", points: 5 },
                { id: 7, title: "Admin dashboard", points: 8 }
            ];
            
            sprintBacklog = [...sampleTasks];
            renderBacklog();
        }
        
        function renderBacklog() {
            backlogItemsEl.innerHTML = '';
            sprintBacklog.forEach(task => {
                const taskEl = document.createElement('div');
                taskEl.className = 'task';
                taskEl.innerHTML = `<strong>${task.title}</strong> (${task.points} pts)`;
                taskEl.addEventListener('click', () => moveToSprint(task.id));
                backlogItemsEl.appendChild(taskEl);
            });
        }
        
        function moveToSprint(taskId) {
            if (!sprintActive) {
                const taskIndex = sprintBacklog.findIndex(t => t.id === taskId);
                if (taskIndex !== -1) {
                    const task = sprintBacklog[taskIndex];
                    todoTasks.push(task);
                    sprintBacklog.splice(taskIndex, 1);
                    renderBacklog();
                    renderSprintBoard();
                }
            } else {
                alert("Cannot add tasks during an active sprint!");
            }
        }
        
        function renderSprintBoard() {
            todoColumnEl.innerHTML = '';
            inProgressColumnEl.innerHTML = '';
            reviewColumnEl.innerHTML = '';
            doneColumnEl.innerHTML = '';
            
            todoTasks.forEach(task => {
                const taskEl = createTaskElement(task, 'todo');
                todoColumnEl.appendChild(taskEl);
            });
            
            inProgressTasks.forEach(task => {
                const taskEl = createTaskElement(task, 'inProgress');
                inProgressColumnEl.appendChild(taskEl);
            });
            
            reviewTasks.forEach(task => {
                const taskEl = createTaskElement(task, 'review');
                reviewColumnEl.appendChild(taskEl);
            });
            
            doneTasks.forEach(task => {
                const taskEl = createTaskElement(task, 'done');
                doneColumnEl.appendChild(taskEl);
            });
            
            updateBurndownChart();
        }
        
        function createTaskElement(task, status) {
            const taskEl = document.createElement('div');
            taskEl.className = 'task';
            taskEl.innerHTML = `<strong>${task.title}</strong> (${task.points} pts)`;
            
            if (status !== 'done') {
                taskEl.addEventListener('click', () => moveTask(task.id, status));
            }
            
            return taskEl;
        }
        
        function moveTask(taskId, currentStatus) {
            if (!sprintActive) return;
            
            let sourceArray, destArray;
            
            switch(currentStatus) {
                case 'todo':
                    sourceArray = todoTasks;
                    destArray = inProgressTasks;
                    break;
                case 'inProgress':
                    sourceArray = inProgressTasks;
                    destArray = reviewTasks;
                    break;
                case 'review':
                    sourceArray = reviewTasks;
                    destArray = doneTasks;
                    remainingStoryPoints -= sourceArray.find(t => t.id === taskId).points;
                    break;
                default:
                    return;
            }
            
            const taskIndex = sourceArray.findIndex(t => t.id === taskId);
            if (taskIndex !== -1) {
                const task = sourceArray[taskIndex];
                destArray.push(task);
                sourceArray.splice(taskIndex, 1);
                renderSprintBoard();
            }
        }
        
        function setupEventListeners() {
            startSprintBtn.addEventListener('click', startSprint);
            dailyScrumBtn.addEventListener('click', dailyScrum);
            completeTaskBtn.addEventListener('click', completeRandomTask);
            endSprintBtn.addEventListener('click', endSprint);
        }
        
        function startSprint() {
            if (todoTasks.length === 0) {
                alert("Please add tasks to the sprint before starting!");
                return;
            }
            
            sprintActive = true;
            sprintDaysRemaining = 14; // 2-week sprint
            totalStoryPoints = todoTasks.concat(inProgressTasks, reviewTasks, doneTasks)
                                       .reduce((sum, task) => sum + task.points, 0);
            remainingStoryPoints = totalStoryPoints - doneTasks.reduce((sum, task) => sum + task.points, 0);
            
            // Initialize burndown data
            burndownData = [remainingStoryPoints];
            
            startSprintBtn.disabled = true;
            dailyScrumBtn.disabled = false;
            completeTaskBtn.disabled = false;
            endSprintBtn.disabled = false;
            
            alert(`Sprint started! ${sprintDaysRemaining} days remaining.`);
            updateBurndownChart();
        }
        
        function dailyScrum() {
            if (!sprintActive) return;
            
            sprintDaysRemaining--;
            
            if (sprintDaysRemaining <= 0) {
                alert("Sprint completed! Time for the sprint review and retrospective.");
                endSprint();
                return;
            }
            
            // Move some tasks randomly to simulate progress
            if (Math.random() > 0.3 && inProgressTasks.length > 0) {
                const randomIndex = Math.floor(Math.random() * inProgressTasks.length);
                const task = inProgressTasks[randomIndex];
                reviewTasks.push(task);
                inProgressTasks.splice(randomIndex, 1);
            }
            
            if (Math.random() > 0.3 && todoTasks.length > 0) {
                const randomIndex = Math.floor(Math.random() * todoTasks.length);
                const task = todoTasks[randomIndex];
                inProgressTasks.push(task);
                todoTasks.splice(randomIndex, 1);
            }
            
            // Add to burndown data
            burndownData.push(remainingStoryPoints);
            
            renderSprintBoard();
            alert(`Daily scrum completed! ${sprintDaysRemaining} days remaining.`);
        }
        
        function completeRandomTask() {
            if (!sprintActive || reviewTasks.length === 0) return;
            
            const randomIndex = Math.floor(Math.random() * reviewTasks.length);
            const task = reviewTasks[randomIndex];
            doneTasks.push(task);
            reviewTasks.splice(randomIndex, 1);
            remainingStoryPoints -= task.points;
            
            renderSprintBoard();
            alert(`Task completed: ${task.title}`);
        }
        
        function endSprint() {
            sprintActive = false;
            
            // Calculate velocity
            const completedPoints = doneTasks.reduce((sum, task) => sum + task.points, 0);
            const velocity = completedPoints / 2; // points per week
            
            startSprintBtn.disabled = false;
            dailyScrumBtn.disabled = true;
            completeTaskBtn.disabled = true;
            endSprintBtn.disabled = true;
            
            alert(`Sprint ended! Team velocity: ${velocity.toFixed(1)} points per week.`);
            
            // Prepare for next sprint
            const incompleteTasks = todoTasks.concat(inProgressTasks, reviewTasks);
            todoTasks = [];
            inProgressTasks = [];
            reviewTasks = [];
            doneTasks = [];
            
            // Some tasks go back to backlog
            incompleteTasks.forEach(task => {
                if (Math.random() > 0.5) { // 50% chance to return to backlog
                    sprintBacklog.push(task);
                } else {
                    todoTasks.push(task); // carry over to next sprint
                }
            });
            
            renderBacklog();
            renderSprintBoard();
        }
        
        function initBurndownChart() {
            const ctx = document.getElementById('burndownChart').getContext('2d');
            burndownChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Remaining Story Points',
                        data: [],
                        borderColor: 'rgb(75, 192, 192)',
                        tension: 0.1,
                        fill: false
                    }, {
                        label: 'Ideal Burndown',
                        data: [],
                        borderColor: 'rgb(255, 99, 132)',
                        borderDash: [5, 5],
                        tension: 0,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Story Points'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Sprint Days'
                            }
                        }
                    }
                }
            });
        }
        
        function updateBurndownChart() {
            if (!burndownChart) return;
            
            const days = Array.from({length: burndownData.length}, (_, i) => i+1);
            const idealBurndown = [];
            
            if (burndownData.length > 0) {
                const increment = burndownData[0] / (days.length - 1);
                for (let i = 0; i < days.length; i++) {
                    idealBurndown.push(Math.max(0, burndownData[0] - (i * increment)));
                }
            }
            
            burndownChart.data.labels = days;
            burndownChart.data.datasets[0].data = burndownData;
            burndownChart.data.datasets[1].data = idealBurndown;
            burndownChart.update();
        }
        
        // Initialize the application
        init();
    </script>
</body>
</html>
