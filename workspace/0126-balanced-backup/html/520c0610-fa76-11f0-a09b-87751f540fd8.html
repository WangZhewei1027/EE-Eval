<!DOCTYPE html>
<html>
<head>
    <title>Hash Functions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Hash Functions</h1>
    <p>Hash functions are one-way functions that take input data and produce a fixed-size string of characters, known as a hash value or digest.</p>
    <p>Here's an example of a simple hash function in JavaScript, using the SHA-256 algorithm.</p>
    <script>
        function hashFunction(inputData) {
            const hash = crypto.createHash('sha256');
            hash.update(inputData);
            return hash.digest('hex');
        }

        const inputData = "Hello, World!";
        const hashValue = hashFunction(inputData);
        console.log(`Hash value for ${inputData}: ${hashValue}`);

        // Let's try a different hash function, MD5
        const md5Hash = crypto.createHash('md5');
        md5Hash.update(inputData);
        const md5HashValue = md5Hash.digest('hex');
        console.log(`MD5 hash value for ${inputData}: ${md5HashValue}`);
    </script>
</body>
</html>
