<!DOCTYPE html>
<html>
<head>
    <title>Heap (Min)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #heap {
            width: 50%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #heap h1 {
            margin-top: 0;
        }
        #heap p {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Heap (Min)</h1>
    <div id="heap"></div>
    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
            }
        }

        class Heap {
            constructor() {
                this.root = null;
            }

            parent(i) {
                return Math.floor((i - 1) / 2);
            }

            leftChild(i) {
                return 2 * i + 1;
            }

            rightChild(i) {
                return 2 * i + 2;
            }

            swap(i, j) {
                [this[i], this[j]] = [this[j], this[i]];
            }

            insert(value) {
                this.root = this.insertNode(this.root, value);
            }

            insertNode(node, value) {
                if (!node) {
                    return new Node(value);
                }

                if (value < node.value) {
                    node.left = this.insertNode(node.left, value);
                    this.heapifyUp(node);
                } else {
                    node.right = this.insertNode(node.right, value);
                    this.heapifyUp(node);
                }

                return node;
            }

            heapifyUp(node) {
                let parentIndex = this.parent(node.index);
                if (node.value < this[parentIndex].value) {
                    this.swap(node.index, parentIndex);
                    this.heapifyUp(parentIndex);
                }
            }

            printHeap() {
                let output = "";
                let queue = [this.root];
                while (queue.length > 0) {
                    let node = queue.shift();
                    output += `${node.value} `;
                    if (node.left) {
                        queue.push(node.left);
                    }
                    if (node.right) {
                        queue.push(node.right);
                    }
                }
                return output;
            }
        }

        let heap = new Heap();
        heap.insert(5);
        heap.insert(3);
        heap.insert(8);
        heap.insert(1);
        heap.insert(4);
        heap.insert(7);
        heap.insert(2);
        heap.insert(6);
        heap.insert(9);

        console.log("Heap (Min):", heap.printHeap());
    </script>
</body>
</html>
