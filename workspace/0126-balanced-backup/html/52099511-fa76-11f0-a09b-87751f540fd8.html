<!DOCTYPE html>
<html>
<head>
    <title>Recursion Example</title>
</head>
<body>
    <h1>Recursion Example</h1>
    <p>Recursion is a programming technique where a function calls itself repeatedly until it reaches a base case that stops the recursion.</p>
    <button id="run-recursion">Run Recursion</button>

    <script>
        function recursiveFunction(n) {
            if (n === 1) {
                return;
            } else {
                console.log(`Recursive call ${n}: ${recursiveFunction(n - 1)}`);
            }
        }

        recursiveFunction(10);
    </script>

    <script>
        document.getElementById('run-recursion').addEventListener('click', function() {
            recursiveFunction(10);
        });
    </script>
</body>
</html>
