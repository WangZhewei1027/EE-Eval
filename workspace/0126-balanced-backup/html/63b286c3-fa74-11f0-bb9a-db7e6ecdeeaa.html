<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Thread Concept Demonstration</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2rem;
  }
  .container {
    max-width: 700px;
    margin: auto;
  }
  button {
    padding: 0.5rem 1rem;
    font-size: 1rem;
  }
  #log {
    margin-top: 1rem;
    height: 300px;
    overflow-y: scroll;
    border: 1px solid #ccc;
    background: #f9f9f9;
    padding: 0.5rem;
    white-space: pre-line;
    font-family: monospace;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Thread Concept Demonstration (Using Web Workers)</h1>
  <p>
    This demo shows how <strong>threads</strong> enable multitasking in JavaScript using <em>Web Workers</em>.
    The main thread runs UI, while a worker thread computes a heavy task concurrently.
  </p>
  <button id="startBtn">Start Heavy Computation</button>
  <div id="log"></div>
</div>

<script>
  const logEl = document.getElementById('log');
  const startBtn = document.getElementById('startBtn');

  function log(message) {
    logEl.textContent += message + '\n';
    logEl.scrollTop = logEl.scrollHeight;
  }

  // Web Worker code as a Blob URL
  const workerCode = `
    self.onmessage = function(e) {
      const max = e.data;
      let count = 0;

      // Simulate heavy computation: count primes up to max
      function isPrime(n) {
        if (n < 2) return false;
        for(let i = 2; i*i <= n; i++) {
          if (n % i === 0) return false;
        }
        return true;
      }

      for(let i = 2; i <= max; i++) {
        if (isPrime(i)) count++;

        // Report progress every 10%
        if (i % Math.floor(max/10) === 0) {
          self.postMessage({ progress: Math.floor((i / max) * 100) });
        }
      }

      self.postMessage({ done: true, primes: count });
    };
  `;

  const blob = new Blob([workerCode], { type: 'application/javascript' });
  const workerURL = URL.createObjectURL(blob);

  startBtn.addEventListener('click', () => {
    logEl.textContent = '';
    log('Main thread: Starting heavy computation in worker thread...');
    startBtn.disabled = true;

    const worker = new Worker(workerURL);

    // Listen for messages from the worker thread
    worker.onmessage = function (e) {
      const data = e.data;
      if (data.progress !== undefined) {
        log(`Worker thread: Progress ${data.progress}%`);
      }
      if (data.done) {
        log(`Worker thread: Computation done! Number of primes found: ${data.primes}`);
        log('Main thread: Worker thread finished computation.');
        startBtn.disabled = false;
        worker.terminate();
      }
    };

    // Send a large number to worker for computation
    const maxNumber = 1_000_000;
    worker.postMessage(maxNumber);

    // Demonstrate main thread continues working
    let dots = 0;
    const intervalId = setInterval(() => {
      log(`Main thread: UI remains responsive${'.'.repeat(dots)}`);
      dots = (dots + 1) % 5;
      if (startBtn.disabled === false) {
        clearInterval(intervalId);
        log('Main thread: UI ready for next task.');
      }
    }, 1000);
  });
</script>
</body>
</html>
