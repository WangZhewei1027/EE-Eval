<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Window Concept</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #arrayInput {
            margin-top: 20px;
        }
        .result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Sliding Window Technique Demo</h1>
    <p>Enter an array of numbers and a window size to calculate the sum of each window.</p>

    <label for="array">Array (comma-separated):</label><br>
    <input type="text" id="array" placeholder="e.g. 1,2,3,4,5"><br>

    <label for="windowSize">Window Size:</label><br>
    <input type="number" id="windowSize" value="2" min="1"><br>

    <button onclick="calculateSlidingWindow()">Calculate Sliding Window Sums</button>

    <div class="result" id="result"></div>

    <script>
        function calculateSlidingWindow() {
            const inputArray = document.getElementById('array').value.split(',').map(Number);
            const windowSize = parseInt(document.getElementById('windowSize').value, 10);
            const resultElement = document.getElementById('result');

            if (isNaN(windowSize) || windowSize <= 0) {
                resultElement.innerText = "Please enter a valid window size.";
                return;
            }

            if (inputArray.length < windowSize) {
                resultElement.innerText = "Window size cannot be larger than the array.";
                return;
            }

            const sums = [];
            let currentSum = 0;

            // Calculate sum for the first window
            for (let i = 0; i < windowSize; i++) {
                currentSum += inputArray[i];
            }
            sums.push(currentSum);

            // Slide the window
            for (let i = windowSize; i < inputArray.length; i++) {
                currentSum += inputArray[i] - inputArray[i - windowSize];
                sums.push(currentSum);
            }

            resultElement.innerText = `Sliding window sums: ${sums.join(', ')}`;
        }
    </script>

</body>
</html>
