<!DOCTYPE html>
<html>
<head>
    <title>Set Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Set Demo</h1>
    <p id="set-demo"></p>
    <script>
        let mySet = new Set([1, 2, 3, 4, 5, 6]);
        console.log("Initial Set:", Array.from(mySet));
        
        mySet.add(7);
        console.log("After adding 7:", Array.from(mySet));
        
        mySet.delete(3);
        console.log("After deleting 3:", Array.from(mySet));
        
        console.log("Set contains 3:", mySet.has(3));
        
        mySet.clear();
        console.log("After clearing Set:", Array.from(mySet));
        
        mySet.add(7);
        mySet.add(8);
        console.log("After adding 8:", Array.from(mySet));
        
        console.log("Set contains 7:", mySet.has(7));
        
        console.log("Set contains 8:", mySet.has(8));
        
        mySet.delete(8);
        console.log("After deleting 8:", Array.from(mySet));
        
        console.log("Set contains 8:", mySet.has(8));
        
        mySet.delete(3);
        mySet.delete(4);
        console.log("After deleting 3 and 4:", Array.from(mySet));
        
        console.log("Set contains 3 and 4:", mySet.has(3) && mySet.has(4));
    </script>
</body>
</html>
