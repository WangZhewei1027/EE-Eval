<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A* Search</title>
    <style>
        #grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .cell {
            background-color: #f0f0f0;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .cell.selected {
            background-color: #4CAF50;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="grid"></div>
    <script>
        let grid = document.getElementById('grid');
        let cells = [];
        let start;
        let end;
        let path;
        let aStar = false;

        function createGrid() {
            cells = [];
            for (let i = 0; i < 50; i++) {
                let row = [];
                for (let j = 0; j < 50; j++) {
                    row.push('<div class="cell" id="cell' + i + ',' + j + '"></div>');
                }
                cells.push(row);
            }
        }

        function createStartAndEnd() {
            start = 0;
            end = 49;
            cells[start].classList.add('selected');
            cells[end].classList.add('selected');
        }

        function dijkstra(start) {
            let distances = {};
            for (let i = 0; i < 50; i++) {
                distances[i] = Infinity;
            }
            distances[start] = 0;
            let queue = [start];
            while (queue.length > 0) {
                let current = queue.shift();
                for (let i = 0; i < 50; i++) {
                    if (distances[i] > distances[current] + 1) {
                        distances[i] = distances[current] + 1;
                        queue.push(i);
                    }
                }
            }
            return distances;
        }

        function aStar(start, end) {
            let distances = dijkstra(start);
            path = [];
            let current = end;
            while (current !== start) {
                path.push(current);
                for (let i = 49; i >= 0; i--) {
                    if (cells[i].querySelector('.selected').classList.contains('selected')) {
                        current = i;
                        break;
                    }
                }
            }
            path.push(start);
            path.reverse();
            return path;
        }

        createGrid();
        createStartAndEnd();

        let startButton = document.createElement('button');
        startButton.textContent = 'Start';
        startButton.addEventListener('click', function() {
            start = parseInt(startButton.textContent);
            startButton.textContent = 'End';
            end = parseInt(startButton.textContent);
            startButton.textContent = 'Start';
            aStar = true;
            grid.innerHTML = '';
            for (let i = 0; i < 50; i++) {
                for (let j = 0; j < 50; j++) {
                    let cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.id = 'cell' + i + ',' + j;
                    grid.appendChild(cell);
                }
            }
            startButton.textContent = 'Start';
            startButton.addEventListener('click', function() {
                if (aStar) {
                    path = aStar(start, end);
                    console.log(path);
                    for (let i = 0; i < path.length - 1; i++) {
                        let row = path[i].split(',');
                        let cell = document.getElementById(row.join(','));
                        cell.style.background = 'red';
                    }
                    let row = path[path.length - 1].split(',');
                    let cell = document.getElementById(row.join(','));
                    cell.style.background = 'blue';
                }
            });
        });
    </script>
</body>
</html>
