<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Implementation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;
        }
        #queueDisplay {
            margin: 20px auto;
            width: 300px;
            text-align: left;
            border: 1px solid #ccc;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
        }
        input[type="text"] {
            padding: 5px;
            width: 200px;
        }
        button {
            padding: 5px 10px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<h1>Queue Implementation</h1>
<div id="queueDisplay"></div>

<input type="text" id="element" placeholder="Enter element">
<button onclick="enqueue()">Enqueue</button>
<button onclick="dequeue()">Dequeue</button>

<script>
    class Queue {
        constructor() {
            this.items = [];
        }

        enqueue(element) {
            this.items.push(element);
            this.displayQueue();
        }

        dequeue() {
            if (this.isEmpty()) {
                alert("Queue is empty!");
                return;
            }
            this.items.shift();
            this.displayQueue();
        }

        isEmpty() {
            return this.items.length === 0;
        }

        displayQueue() {
            const queueDisplay = document.getElementById('queueDisplay');
            queueDisplay.innerHTML = this.items.map(item => `<div>${item}</div>`).join('');
        }
    }

    const queue = new Queue();

    function enqueue() {
        const elementInput = document.getElementById('element');
        const element = elementInput.value;
        if (element) {
            queue.enqueue(element);
            elementInput.value = '';
        } else {
            alert("Please enter an element!");
        }
    }

    function dequeue() {
        queue.dequeue();
    }
</script>

</body>
</html>
