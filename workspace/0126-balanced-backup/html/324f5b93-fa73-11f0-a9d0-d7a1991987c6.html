<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version Control Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        .version-display {
            background: #fff;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .button {
            padding: 10px 15px;
            background-color: #5cb85c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
        }

        .button:hover {
            background-color: #4cae4c;
        }
    </style>
</head>

<body>

    <h1>Version Control Demonstration</h1>

    <div class="version-display">
        <strong>Current Version:</strong> <span id="current-version">1.0.0</span>
    </div>

    <button class="button" id="increment-version">Increment Version</button>
    <button class="button" id="reset-version">Reset Version</button>

    <script>
        let version = "1.0.0";

        function incrementVersion() {
            const versionParts = version.split('.');
            const patch = parseInt(versionParts[2]) + 1;
            versionParts[2] = patch.toString();
            version = versionParts.join('.');
            document.getElementById("current-version").textContent = version;
        }

        function resetVersion() {
            version = "1.0.0";
            document.getElementById("current-version").textContent = version;
        }

        document.getElementById("increment-version").addEventListener("click", incrementVersion);
        document.getElementById("reset-version").addEventListener("click", resetVersion);
    </script>

</body>

</html>
