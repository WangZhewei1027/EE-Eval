<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Depth-First Search (DFS) Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: #1e1e1e;
    color: #ddd;
  }
  h1 {
    text-align: center;
    margin: 1rem 0 0.5rem 0;
  }
  #container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #2b2b2b;
  }
  svg {
    background: #333;
    border-radius: 8px;
  }
  .node {
    cursor: pointer;
    stroke: #aaa;
    stroke-width: 2px;
    fill: #555;
    transition: fill 0.3s, stroke 0.3s;
  }
  .node.visited {
    fill: #4caf50;
    stroke: #81c784;
  }
  .node.current {
    fill: #2196f3;
    stroke: #64b5f6;
  }
  .node.start {
    fill: #ff9800;
    stroke: #ffb74d;
  }
  .edge {
    stroke: #999;
    stroke-width: 2px;
  }
  .edge.visited {
    stroke: #4caf50;
    stroke-width: 3px;
  }
  #controls {
    padding: 0.6rem;
    background: #222;
    display: flex;
    justify-content: center;
    gap: 1rem;
  }
  button {
    background: #444;
    border: none;
    color: #ddd;
    padding: 0.5rem 1rem;
    font-size: 1rem;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  button:hover:not(:disabled) {
    background: #666;
  }
  button:disabled {
    opacity: 0.5;
    cursor: default;
  }
  #legend {
    margin: 1rem auto;
    width: 90%;
    max-width: 600px;
    font-size: 0.9rem;
    display: flex;
    justify-content: space-around;
  }
  #legend div {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  #legend .box {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 2px solid #aaa;
  }
  #legend .visited {
    background: #4caf50;
    border-color: #81c784;
  }
  #legend .current {
    background: #2196f3;
    border-color: #64b5f6;
  }
  #legend .start {
    background: #ff9800;
    border-color: #ffb74d;
  }
</style>
</head>
<body>
<h1>Depth-First Search (DFS) Visualization</h1>
<div id="container">
<svg width="800" height="600" viewBox="0 0 800 600" id="graph"></svg>
</div>
<div id="controls">
  <button id="startBtn">Start DFS</button>
  <button id="resetBtn" disabled>Reset</button>
</div>
<div id="legend">
  <div><div class="box start"></div> Start Node</div>
  <div><div class="box current"></div> Current Node</div>
  <div><div class="box visited"></div> Visited Node / Edge</div>
</div>

<script>
// Graph Data: adjacency list with node positions for visualization
const nodes = [
  { id: 'A', x: 100, y: 100 },
  { id: 'B', x: 300, y: 100 },
  { id: 'C', x: 500, y: 100 },
  { id: 'D', x: 700, y: 100 },
  { id: 'E', x: 200, y: 250 },
  { id: 'F', x: 400, y: 250 },
  { id: 'G', x: 600, y: 250 },
  { id: 'H', x: 150, y: 400 },
  { id: 'I', x: 350, y: 400 },
  { id: 'J', x: 550, y: 400 },
  { id: 'K', x: 700, y: 400 }
];

// adjacency list edges: undirected graph
const edges = [
  ['A','B'], ['A','E'], ['B','C'], ['B','F'], ['C','D'], ['C','G'],
  ['E','F'], ['E','H'], ['F','G'], ['F','I'], ['G','J'], ['D','K'],
  ['J','K']
];

// Create lookup maps
const nodeById = new Map(nodes.map(n => [n.id, n]));
const adjacency = new Map();
nodes.forEach(n => adjacency.set(n.id, []));
edges.forEach(([u,v]) => {
  adjacency.get(u).push(v);
  adjacency.get(v).push(u);
});

// SVG Elements
const svg = document.getElementById('graph');

// Draw edges as lines
const edgeElements = [];
edges.forEach(([u,v], i) => {
  const n1 = nodeById.get(u);
  const n2 = nodeById.get(v);
  const line = document.createElementNS("http://www.w3.org/2000/svg","line");
  line.setAttribute('x1', n1.x);
  line.setAttribute('y1', n1.y);
  line.setAttribute('x2', n2.x);
  line.setAttribute('y2', n2.y);
  line.setAttribute('class', 'edge');
  line.dataset.nodes = JSON.stringify([u,v]);
  svg.appendChild(line);
  edgeElements.push(line);
});

// Draw nodes as circles with labels
const nodeElements = new Map();
nodes.forEach(n => {
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.classList.add('node');
  g.dataset.id = n.id;
  g.setAttribute('transform', `translate(${n.x},${n.y})`);
  const circle = document.createElementNS("http://www.w3.org/2000/svg","circle");
  circle.setAttribute('r', 20);
  circle.setAttribute('class', 'node-circle');
  g.appendChild(circle);
  const text = document.createElementNS("http://www.w3.org/2000/svg","text");
  text.textContent = n.id;
  text.setAttribute('text-anchor', 'middle');
  text.setAttribute('dy', '0.35em');
  text.setAttribute('fill', '#ddd');
  text.setAttribute('font-weight', 'bold');
  g.appendChild(text);
  svg.appendChild(g);
  nodeElements.set(n.id, g);
});

// Visual state helpers
function setNodeState(id, state) {
  const el = nodeElements.get(id);
  if (!el) return;
  el.classList.remove('visited', 'current', 'start');
  if(state) el.classList.add(state);
}

function setEdgeVisited(u, v) {
  const key1 = JSON.stringify([u,v]);
  const key2 = JSON.stringify([v,u]);
  // find edge line with matching nodes
  for(const line of edgeElements){
    const nodesArr = JSON.parse(line.dataset.nodes);
    if (
      (nodesArr[0] === u && nodesArr[1] === v) ||
      (nodesArr[1] === u && nodesArr[0] === v)
    ) {
      line.classList.add('visited');
      break;
    }
  }
}

function resetVisualization(){
  nodeElements.forEach((el) => el.classList.remove('visited', 'current', 'start'));
  edgeElements.forEach(l => l.classList.remove('visited'));
}

// DFS Algorithm Visualization
const startNode = 'A';
let visited = new Set();
let stack = [];
let animationInterval = null;
let animationSpeed = 600; // ms between steps

function dfsStep() {
  if(stack.length === 0) {
    // end animation
    clearInterval(animationInterval);
    animationInterval = null;
    buttons.start.disabled = false;
    buttons.reset.disabled = false;
    return;
  }
  // Current node from top of stack
  const current = stack[stack.length - 1];

  setNodeState(current, 'current');

  // Delay previous current if any
  if(dfsStep.prevNode && dfsStep.prevNode !== current){
    setNodeState(dfsStep.prevNode, 'visited');
  }
  dfsStep.prevNode = current;
  
  let foundUnvisited = false;
  for (let neighbor of adjacency.get(current)) {
    if (!visited.has(neighbor)) {
      visited.add(neighbor);
      stack.push(neighbor);
      setEdgeVisited(current, neighbor);
      foundUnvisited = true;
      break;
    }
  }
  if(!foundUnvisited) {
    stack.pop();
    setNodeState(current, 'visited'); // done here
  }
}

dfsStep.prevNode = null;

// Controls and start/reset logic
const buttons = {
  start: document.getElementById('startBtn'),
  reset: document.getElementById('resetBtn')
};

buttons.start.addEventListener('click', () => {
  resetVisualization();
  visited = new Set();
  stack = [];
  setNodeState(startNode, 'start');
  visited.add(startNode);
  stack.push(startNode);

  buttons.start.disabled = true;
  buttons.reset.disabled = true;

  animationInterval = setInterval(dfsStep, animationSpeed);
});

buttons.reset.addEventListener('click', () => {
  if(animationInterval) {
    clearInterval(animationInterval);
    animationInterval = null;
  }
  resetVisualization();
  buttons.start.disabled = false;
  buttons.reset.disabled = true;
  dfsStep.prevNode = null;
});

// Initialize with reset state
buttons.reset.disabled = true;

</script>
</body>
</html>
