<!DOCTYPE html>
<html>
<head>
	<title>Interpreter</title>
</head>
<body>
	<h1>Interpreter</h1>
	<p>This program will prompt the user to enter a number and then calculate its square.</p>
	<form>
		<label for="number">Enter a number:</label><br>
		<input type="number" id="number"><br>
		<button type="submit">Calculate</button>
	</form>
	<p>The result of the calculation is displayed below:</p>
	<p id="result"></p>
	<script>
		var number = document.getElementById("number").value;
		document.getElementById("result").innerHTML = "The square of " + number + " is " + Math.sqrt(number);
	</script>
</body>
</html>
