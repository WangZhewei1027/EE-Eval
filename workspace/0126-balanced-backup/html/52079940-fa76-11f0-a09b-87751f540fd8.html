<!DOCTYPE html>
<html>
<head>
    <title>Array Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #output {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Array Example</h1>
    <p id="output"></p>

    <script>
        let colors = ['red', 'green', 'blue', 'yellow', 'orange', 'purple'];
        let fruits = ['apple', 'banana', 'cherry', 'date', 'elderberry', 'fig'];

        // Create an array from two arrays
        let fruitsArray = [...fruits, 'grape', 'strawberry'];
        let colorsArray = [...colors, 'pink', 'brown'];

        console.log('Array of fruits:', fruitsArray);
        console.log('Array of colors:', colorsArray);

        // Accessing elements by index
        console.log('Fruit at index 2:', fruitsArray[2]);
        console.log('Color at index 1:', colorsArray[1]);

        // Modifying elements in the array
        fruitsArray[0] = 'mango';
        colorsArray[3] = 'black';
        console.log('Fruits after modification:', fruitsArray);
        console.log('Colors after modification:', colorsArray);

        // Adding elements to the array
        fruitsArray.push('kiwi');
        colorsArray.push('pink');
        console.log('Fruits after addition:', fruitsArray);
        console.log('Colors after addition:', colorsArray);

        // Removing elements from the array
        fruitsArray.pop();
        colorsArray.shift();
        console.log('Fruits after removal:', fruitsArray);
        console.log('Colors after removal:', colorsArray);

        // Updating elements in the array
        fruitsArray[0] = 'pineapple';
        colorsArray[1] = 'brown';
        console.log('Fruits after update:', fruitsArray);
        console.log('Colors after update:', colorsArray);
    </script>
</body>
</html>
