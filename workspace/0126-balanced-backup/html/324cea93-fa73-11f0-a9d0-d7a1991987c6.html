<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B+ Tree Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        #tree-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .node {
            border: 1px solid #ccc;
            background: #fff;
            margin: 5px;
            padding: 10px;
            border-radius: 5px;
            display: inline-block;
            text-align: center;
        }
        #insert-form {
            margin-top: 20px;
        }
        input[type="number"] {
            width: 60px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<h1>B+ Tree Visualization</h1>
<div id="tree-container"></div>
<div id="insert-form">
    <input type="number" id="valueInput" placeholder="Enter a number" />
    <button onclick="insertValue()">Insert</button>
</div>

<script>
    class BPlusTree {
        constructor(order) {
            this.root = new LeafNode(order);
            this.order = order;
        }

        insert(value) {
            const result = this.root.insert(value);
            if (result) {
                const newRoot = new InternalNode(this.order);
                newRoot.children.push(this.root);
                newRoot.children.push(result);
                newRoot.keys.push(result.keys[0]);
                this.root = newRoot;
            }
            this.render();
        }

        render() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';
            this.root.render(container);
        }
    }

    class Node {
        constructor(order) {
            this.keys = [];
            this.children = [];
            this.order = order;
        }
    }

    class LeafNode extends Node {
        constructor(order) {
            super(order);
        }

        insert(value) {
            this.keys.push(value);
            this.keys.sort((a, b) => a - b);
            if (this.keys.length > this.order) {
                const newLeaf = new LeafNode(this.order);
                const mid = Math.ceil(this.order / 2);
                newLeaf.keys = this.keys.splice(mid);
                return newLeaf;
            }
            return null;
        }

        render(container) {
            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'node';
            nodeDiv.innerHTML = `Leaf: ${this.keys.join(', ')}`;
            container.appendChild(nodeDiv);
        }
    }

    class InternalNode extends Node {
        constructor(order) {
            super(order);
        }

        insert(value) {
            let childIndex = this.children.length - 1;
            while (childIndex >= 0 && value < this.children[childIndex].keys[0]) {
                childIndex--;
            }
            childIndex++;
            const result = this.children[childIndex].insert(value);
            if (result) {
                this.keys.push(result.keys[0]);
                this.keys.sort((a, b) => a - b);
                this.children.splice(childIndex + 1, 0, result);
                if (this.keys.length > this.order) {
                    const newInternal = new InternalNode(this.order);
                    const mid = Math.floor(this.keys.length / 2);
                    newInternal.keys = this.keys.splice(mid + 1);
                    newInternal.children = this.children.splice(mid + 1);
                    return newInternal;
                }
            }
            return null;
        }

        render(container) {
            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'node';
            nodeDiv.innerHTML = `Internal: ${this.keys.join(', ')}`;
            container.appendChild(nodeDiv);
            for (const child of this.children) {
                child.render(container);
            }
        }
    }

    const bPlusTree = new BPlusTree(3);

    function insertValue() {
        const valueInput = document.getElementById('valueInput');
        const value = parseInt(valueInput.value);
        if (!isNaN(value)) {
            bPlusTree.insert(value);
            valueInput.value = '';
        } else {
            alert('Please enter a valid number.');
        }
    }
</script>

</body>
</html>
