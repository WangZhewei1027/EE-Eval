<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Set Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .set-demo {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
        }

        .set-output {
            margin-top: 10px;
            color: blue;
        }
    </style>
</head>

<body>

    <h1>JavaScript Set Example</h1>
    <p>A Set is a collection of values where each value must be unique. Let's explore the Set data structure with some examples.</p>

    <div class="set-demo">
        <h2>Basic Operations with Set</h2>
        <button id="addButton">Add Element</button>
        <input type="text" id="inputElement" placeholder="Enter an element" />
        <button id="deleteButton">Delete Element</button>
        <button id="hasButton">Check Element</button>
        <input type="text" id="hasInput" placeholder="Check if element exists" />
        <button id="showSetButton">Show Set</button>
        <div class="set-output" id="output"></div>
    </div>

    <script>
        // Create a new Set
        const mySet = new Set();

        // Function to display the current elements of the set
        function displaySet() {
            document.getElementById('output').innerText = `Current Set: [${[...mySet]}]`;
        }

        // Add element to the set
        document.getElementById('addButton').addEventListener('click', () => {
            const element = document.getElementById('inputElement').value;
            if (element) {
                mySet.add(element);
                displaySet();
                document.getElementById('inputElement').value = '';
            }
        });

        // Delete element from the set
        document.getElementById('deleteButton').addEventListener('click', () => {
            const element = document.getElementById('inputElement').value;
            if (element) {
                mySet.delete(element);
                displaySet();
                document.getElementById('inputElement').value = '';
            }
        });

        // Check if element exists in the set
        document.getElementById('hasButton').addEventListener('click', () => {
            const element = document.getElementById('hasInput').value;
            const exists = mySet.has(element);
            alert(exists ? `Yes, "${element}" exists in the set.` : `No, "${element}" does not exist in the set.`);
            document.getElementById('hasInput').value = '';
        });

        // Show current set elements
        document.getElementById('showSetButton').addEventListener('click', displaySet);
    </script>

</body>

</html>
