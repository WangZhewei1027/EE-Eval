<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Tree Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        #tree {
            margin: 20px auto;
            position: relative;
            width: 600px;
            height: 400px;
        }
        .node {
            width: 40px;
            height: 40px;
            background: #6ca0f6;
            color: white;
            border-radius: 50%;
            line-height: 40px;
            position: absolute;
            text-align: center;
            transition: background 0.3s;
        }
        .node:hover {
            background: #4a90e2;
        }
        .line {
            position: absolute;
            height: 2px;
            background: black;
            transform-origin: top left;
        }
    </style>
</head>
<body>

<h1>Binary Tree Visualization</h1>
<div id="tree"></div>
<button onclick="createBinaryTree()">Generate Binary Tree</button>

<script>
    class Node {
        constructor(value) {
            this.value = value;
            this.left = null;
            this.right = null;
        }
    }

    class BinaryTree {
        constructor() {
            this.root = null;
        }

        insert(value) {
            const newNode = new Node(value);
            if (!this.root) {
                this.root = newNode;
                return;
            }
            const queue = [this.root];
            while (queue.length > 0) {
                const current = queue.shift();
                if (!current.left) {
                    current.left = newNode;
                    return;
                } else if (!current.right) {
                    current.right = newNode;
                    return;
                }
                queue.push(current.left);
                queue.push(current.right);
            }
        }

        getNodes() {
            const nodes = [];
            const queue = [this.root];
            while (queue.length > 0) {
                const current = queue.shift();
                if (current) {
                    nodes.push(current);
                    queue.push(current.left);
                    queue.push(current.right);
                }
            }
            return nodes;
        }
    }

    function drawTree(tree) {
        const treeDiv = document.getElementById('tree');
        treeDiv.innerHTML = '';
        const nodes = tree.getNodes();
        const levels = Math.ceil(Math.log2(nodes.length + 1));
        const positions = [];

        for (let i = 0; i < nodes.length; i++) {
            const level = Math.floor(Math.log2(i + 1));
            const position = (i - Math.pow(2, level) + 1) / Math.pow(2, level);
            const x = (position + 0.5) * (treeDiv.clientWidth) / Math.pow(2, level + 1);
            const y = (level + 1) * (treeDiv.clientHeight) / (levels + 1);
            positions.push({ x, y });
        }

        for (let i = 0; i < nodes.length; i++) {
            const { x, y } = positions[i];
            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'node';
            nodeDiv.style.left = `${x - 20}px`;
            nodeDiv.style.top = `${y - 20}px`;
            nodeDiv.innerText = nodes[i].value;
            treeDiv.appendChild(nodeDiv);

            // Draw lines from parent to child
            if (i > 0) {
                const parentIndex = Math.floor((i - 1) / 2);
                const parentPos = positions[parentIndex];
                const lineDiv = document.createElement('div');
                lineDiv.className = 'line';
                lineDiv.style.left = `${parentPos.x}px`;
                lineDiv.style.top = `${parentPos.y}px`;
                lineDiv.style.width = `${Math.abs(x - parentPos.x)}px`;
                lineDiv.style.height = `${Math.abs(y - parentPos.y)}px`;
                lineDiv.style.transform = `rotate(${Math.atan2(y - parentPos.y, x - parentPos.x) * 180 / Math.PI}deg)`;
                treeDiv.appendChild(lineDiv);
            }
        }
    }

    function createBinaryTree() {
        const tree = new BinaryTree();
        for (let i = 1; i <= 15; i++) {
            tree.insert(i);
        }
        drawTree(tree);
    }

</script>
</body>
</html>
