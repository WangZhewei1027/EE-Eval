<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Tree Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        #tree {
            margin-top: 20px;
        }
        .node {
            display: inline-block;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 10px;
            margin: 5px;
            background-color: #fff;
        }
        .link {
            height: 20px;
            width: 50px;
            border-left: 2px solid #333;
            position: relative;
            top: 0;
            margin-left: 30px;
        }
    </style>
</head>
<body>

<div>
    <h2>B-Tree Visualization</h2>
    <input type="number" id="input" placeholder="Enter a number" />
    <button onclick="insert()">Insert</button>
    <div id="tree"></div>
</div>

<script>
    class BTreeNode {
        constructor(t) {
            this.t = t; // Minimum degree
            this.keys = [];
            this.children = [];
            this.leaf = true;
        }
    }

    class BTree {
        constructor(t) {
            this.root = new BTreeNode(t);
            this.t = t;
        }

        insert(k) {
            let root = this.root;
            if (root.keys.length === 2 * this.t - 1) {
                let s = new BTreeNode(this.t);
                this.root = s;
                s.leaf = false;
                s.children.push(root);
                this.splitChild(s, 0);
                this.insertNonFull(s, k);
            } else {
                this.insertNonFull(root, k);
            }
            this.draw();
        }

        insertNonFull(node, k) {
            let i = node.keys.length - 1;
            if (node.leaf) {
                node.keys.push(k);
                node.keys.sort((a, b) => a - b);
            } else {
                while (i >= 0 && k < node.keys[i]) {
                    i--;
                }
                i++;
                if (node.children[i].keys.length === 2 * this.t - 1) {
                    this.splitChild(node, i);
                    if (k > node.keys[i]) {
                        i++;
                    }
                }
                this.insertNonFull(node.children[i], k);
            }
        }

        splitChild(parent, i) {
            let t = this.t;
            let y = parent.children[i];
            let z = new BTreeNode(t);
            z.leaf = y.leaf;

            for (let j = 0; j < t - 1; j++) {
                z.keys.push(y.keys.pop());
            }

            parent.children.splice(i + 1, 0, z);
            parent.keys.splice(i, 0, y.keys.pop());
        }

        draw() {
            const treeDiv = document.getElementById('tree');
            treeDiv.innerHTML = '';  // Clear previous visualization
            this.drawNode(this.root, treeDiv);
        }

        drawNode(node, parentDiv) {
            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'node';
            nodeDiv.innerHTML = node.keys.join(', ');
            parentDiv.appendChild(nodeDiv);
            
            if (!node.leaf) {
                const childrenDiv = document.createElement('div');
                childrenDiv.style.display = 'flex';
                childrenDiv.style.justifyContent = 'center';

                for (let child of node.children) {
                    const linkDiv = document.createElement('div');
                    linkDiv.className = 'link';
                    childrenDiv.appendChild(linkDiv);
                    
                    this.drawNode(child, childrenDiv);
                }
                
                parentDiv.appendChild(childrenDiv);
            }
        }
    }

    const bTree = new BTree(2); // Create a B-Tree of minimum degree 2

    function insert() {
        const input = document.getElementById('input');
        const value = parseInt(input.value);
        if (!isNaN(value)) {
            bTree.insert(value);
            input.value = '';
        } else {
            alert('Please enter a valid number');
        }
    }
</script>

</body>
</html>
