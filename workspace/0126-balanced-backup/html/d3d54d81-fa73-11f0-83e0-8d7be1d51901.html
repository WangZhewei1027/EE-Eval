<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Binary Search Tree (BST) - Interactive Demo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg:#fafafa;
      --panel:#fff;
      --accent:#1565c0;
      --muted:#666;
      --success:#2e7d32;
      --danger:#c62828;
      --node:#fff;
      --node-border:#1e88e5;
    }
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}
    body{background:linear-gradient(180deg,#f7fbff 0%,var(--bg) 100%);padding:18px;box-sizing:border-box;color:#111}
    h1{margin:0 0 8px;font-size:20px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:360px 1fr;gap:16px;align-items:start}
    .panel{background:var(--panel);border-radius:10px;padding:14px;box-shadow:0 6px 18px rgba(17,24,32,0.06);border:1px solid rgba(16,24,40,0.04)}
    .controls label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px}
    .controls input[type="text"]{width:100%;padding:8px;border-radius:6px;border:1px solid #dfe7ef;font-size:14px}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    button{background:var(--accent);color:#fff;border:0;padding:8px 10px;border-radius:8px;cursor:pointer;font-weight:600}
    button.secondary{background:#e9f0ff;color:var(--accent);border:1px solid #cfe0ff}
    button.warn{background:var(--danger);}
    button.small{padding:6px 8px;font-size:13px}
    .log{height:140px;overflow:auto;border-radius:8px;margin-top:10px;padding:8px;background:#fbfbfb;border:1px dashed #eef5ff;font-size:13px;color:#222}
    .legend{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;font-size:13px}
    .legend .item{display:flex;gap:8px;align-items:center}
    .legend .sw{width:16px;height:16px;border-radius:4px;border:1px solid #ddd}
    .sw.search{background:#ffd54f}
    .sw.insert{background:#81c784}
    .sw.delete{background:#ef9a9a}
    .svg-wrap{width:100%;height:620px;background:linear-gradient(180deg,#fff 0%, #fbfdff 100%);display:flex;align-items:flex-start;justify-content:flex-start;padding:10px;border-radius:10px;overflow:auto}
    svg{width:100%;height:600px;overflow:visible}
    .node{cursor:pointer;transition:transform 180ms ease}
    .node circle{fill:var(--node);stroke:var(--node-border);stroke-width:2}
    .node text{font-weight:700;fill:#111;font-size:13px;text-anchor:middle;dominant-baseline:central}
    .edge{stroke:#9fbfe6;stroke-width:2;opacity:0.9}
    .highlight{filter:drop-shadow(0 4px 8px rgba(30,136,229,0.15))}
    .visited{stroke:#ffb300 !important;stroke-width:3 !important}
    .found{stroke:#2e7d32 !important;stroke-width:3 !important;fill:#e8f5e9 !important}
    .fade{opacity:0.35}
    .trace{font-size:13px;color:var(--muted);margin-top:8px}
    footer{margin-top:12px;font-size:13px;color:var(--muted)}
    .traversal-buttons{display:flex;gap:8px;margin-top:8px}
    pre{background:#0f1724;color:#dbeafe;padding:10px;border-radius:8px;overflow:auto;font-size:12px}
    .small-muted{font-size:13px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel controls">
      <h1>Binary Search Tree (BST)</h1>
      <div class="small-muted">Insert, search, delete values and watch the tree update. Click nodes to highlight or remove.</div>

      <label for="valueInput">Value(s) - single or comma separated integers</label>
      <input id="valueInput" type="text" placeholder="e.g. 12, 5, 18, 7" />

      <div class="btn-row">
        <button id="insertBtn">Insert</button>
        <button id="searchBtn" class="secondary">Search</button>
        <button id="deleteBtn" class="warn">Delete</button>
        <button id="randomBtn" class="secondary">Random Tree</button>
        <button id="clearBtn" class="secondary small">Clear</button>
      </div>

      <div class="traversal-buttons">
        <button id="inorderBtn" class="secondary small">In-order</button>
        <button id="preorderBtn" class="secondary small">Pre-order</button>
        <button id="postorderBtn" class="secondary small">Post-order</button>
        <button id="levelBtn" class="secondary small">Level-order</button>
      </div>

      <div class="legend">
        <div class="item"><div class="sw search"></div>Visiting</div>
        <div class="item"><div class="sw insert"></div>Inserted / Successor</div>
        <div class="item"><div class="sw delete"></div>Deleted</div>
      </div>

      <div class="log" id="log"></div>
      <div class="trace" id="trace">Trace: </div>

      <footer>
        Tip: You can click a node in the visualization to delete it. Hover nodes to see value.
      </footer>
    </div>

    <div class="panel svg-wrap" id="canvasWrap">
      <svg id="svg"></svg>
    </div>
  </div>

  <script>
    // Binary Search Tree Visualization Demo
    (function(){
      // Utilities
      const svg = document.getElementById('svg');
      const logBox = document.getElementById('log');
      const traceEl = document.getElementById('trace');
      const input = document.getElementById('valueInput');
      const insertBtn = document.getElementById('insertBtn');
      const searchBtn = document.getElementById('searchBtn');
      const deleteBtn = document.getElementById('deleteBtn');
      const randomBtn = document.getElementById('randomBtn');
      const clearBtn = document.getElementById('clearBtn');
      const inorderBtn = document.getElementById('inorderBtn');
      const preorderBtn = document.getElementById('preorderBtn');
      const postorderBtn = document.getElementById('postorderBtn');
      const levelBtn = document.getElementById('levelBtn');

      let ANIMATION_DELAY = 450; // ms per step

      function log(...args){
        const line = args.join(' ');
        const p = document.createElement('div');
        p.textContent = line;
        logBox.appendChild(p);
        logBox.scrollTop = logBox.scrollHeight;
      }
      function setTrace(s){
        traceEl.textContent = 'Trace: ' + s;
      }

      // BST Data Structure
      class Node {
        constructor(value){
          this.value = value;
          this.left = null;
          this.right = null;
          // visualization
          this.x = 0;
          this.y = 0;
          this.id = Node._nextId++;
        }
      }
      Node._nextId = 1;

      class BST {
        constructor(){
          this.root = null;
        }
        insert(value){
          const steps = [];
          if(this.root === null){
            this.root = new Node(value);
            steps.push({type:'insertRoot', node:this.root});
            return {steps, node: this.root};
          }
          let cur = this.root;
          while(true){
            steps.push({type:'visit', node:cur});
            if(value === cur.value){
              steps.push({type:'exists', node:cur});
              break;
            } else if(value < cur.value){
              if(cur.left === null){
                cur.left = new Node(value);
                steps.push({type:'insert', parent:cur, node:cur.left, side:'left'});
                break;
              } else {
                cur = cur.left;
              }
            } else {
              if(cur.right === null){
                cur.right = new Node(value);
                steps.push({type:'insert', parent:cur, node:cur.right, side:'right'});
                break;
              } else {
                cur = cur.right;
              }
            }
          }
          return {steps, node: null};
        }
        search(value){
          const steps = [];
          let cur = this.root;
          while(cur !== null){
            steps.push({type:'visit', node:cur});
            if(value === cur.value){
              steps.push({type:'found', node:cur});
              return {found:true, steps, node:cur};
            } else if(value < cur.value){
              cur = cur.left;
            } else {
              cur = cur.right;
            }
          }
          steps.push({type:'notfound'});
          return {found:false, steps};
        }
        delete(value){
          const steps = [];
          const {root, removed} = (function removeNode(node, value){
            if(node === null){
              steps.push({type:'notfound'});
              return {root:null, removed:false, node:null};
            }
            steps.push({type:'visit', node});
            if(value < node.value){
              const res = removeNode(node.left, value);
              node.left = res.root;
              return {root:node, removed:res.removed, node:node};
            } else if(value > node.value){
              const res = removeNode(node.right, value);
              node.right = res.root;
              return {root:node, removed:res.removed, node:node};
            } else {
              // node to delete
              steps.push({type:'target', node});
              if(node.left === null && node.right === null){
                steps.push({type:'deleteLeaf', node});
                return {root:null, removed:true, node:node};
              } else if(node.left === null){
                steps.push({type:'deleteSingle', node, child:node.right});
                return {root:node.right, removed:true, node:node};
              } else if(node.right === null){
                steps.push({type:'deleteSingle', node, child:node.left});
                return {root:node.left, removed:true, node:node};
              } else {
                // two children: find inorder successor (smallest in right subtree)
                let succParent = node;
                let succ = node.right;
                while(succ.left){
                  steps.push({type:'visit', node:succ});
                  succParent = succ;
                  succ = succ.left;
                }
                steps.push({type:'successor', succ, succParent});
                // replace value
                const oldVal = node.value;
                node.value = succ.value;
                steps.push({type:'replace', node, oldVal, newVal:node.value, succ});
                // delete successor node from right subtree
                const res = removeNode(node.right, succ.value);
                node.right = res.root;
                return {root:node, removed:true, node:node};
              }
            }
          })(this.root, value);
          this.root = root;
          return {steps, removed: removed};
        }
        inorder(){
          const res=[]; (function r(n){if(!n) return; r(n.left); res.push(n.value); r(n.right);})(this.root); return res;
        }
        preorder(){
          const res=[]; (function r(n){if(!n) return; res.push(n.value); r(n.left); r(n.right)})(this.root); return res;
        }
        postorder(){
          const res=[]; (function r(n){if(!n) return; r(n.left); r(n.right); res.push(n.value)})(this.root); return res;
        }
        levelorder(){
          const res=[]; if(!this.root) return res; const q=[this.root]; while(q.length){const n=q.shift();res.push(n.value); if(n.left) q.push(n.left); if(n.right) q.push(n.right);} return res;
        }
      }

      // Visualization helpers
      function clearSVG(){ while(svg.firstChild) svg.removeChild(svg.firstChild); }

      function layoutTree(root){
        // assign x positions based on inorder index
        let xCounter = 0;
        const levelHeight = 90;
        function dfs(node, depth){
          if(!node) return;
          dfs(node.left, depth+1);
          node.x = ++xCounter;
          node.y = depth;
          dfs(node.right, depth+1);
        }
        dfs(root, 0);
        // convert to pixel positions:
        const HSPACING = 60;
        const VSPACING = levelHeight;
        function setPixels(node){
          if(!node) return;
          node.px = node.x * HSPACING;
          node.py = node.y * VSPACING + 30;
          setPixels(node.left); setPixels(node.right);
        }
        setPixels(root);
        return {width: (xCounter+2)*HSPACING, height: ( (root?getDepth(root):0)+2)*VSPACING };
      }
      function getDepth(node){
        if(!node) return 0;
        return 1 + Math.max(getDepth(node.left), getDepth(node.right));
      }

      function drawTree(tree){
        clearSVG();
        if(!tree.root) return;
        const dims = layoutTree(tree.root);
        svg.setAttribute('viewBox', `0 0 ${Math.max(dims.width,600)} ${Math.max(dims.height,240)}`);
        // draw edges first
        (function drawEdges(n){
          if(!n) return;
          if(n.left){
            const line = document.createElementNS('http://www.w3.org/2000/svg','line');
            line.setAttribute('x1', n.px);
            line.setAttribute('y1', n.py);
            line.setAttribute('x2', n.left.px);
            line.setAttribute('y2', n.left.py);
            line.classList.add('edge');
            line.dataset.from = n.id;
            line.dataset.to = n.left.id;
            svg.appendChild(line);
          }
          if(n.right){
            const line = document.createElementNS('http://www.w3.org/2000/svg','line');
            line.setAttribute('x1', n.px);
            line.setAttribute('y1', n.py);
            line.setAttribute('x2', n.right.px);
            line.setAttribute('y2', n.right.py);
            line.classList.add('edge');
            line.dataset.from = n.id;
            line.dataset.to = n.right.id;
            svg.appendChild(line);
          }
          drawEdges(n.left); drawEdges(n.right);
        })(tree.root);

        // draw nodes
        (function drawNodes(n){
          if(!n) return;
          const g = document.createElementNS('http://www.w3.org/2000/svg','g');
          g.setAttribute('transform', `translate(${n.px},${n.py})`);
          g.classList.add('node');
          g.dataset.id = n.id;
          g.dataset.value = n.value;
          const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
          circle.setAttribute('r', 18);
          circle.setAttribute('cx', 0);
          circle.setAttribute('cy', 0);
          const text = document.createElementNS('http://www.w3.org/2000/svg','text');
          text.textContent = n.value;
          g.appendChild(circle);
          g.appendChild(text);
          // interaction
          g.addEventListener('mouseenter', ()=> g.classList.add('highlight'));
          g.addEventListener('mouseleave', ()=> g.classList.remove('highlight'));
          g.addEventListener('click', (e)=>{
            e.stopPropagation();
            // click = delete node shortcut
            if(confirm('Delete node with value ' + n.value + '?')) {
              performDelete(n.value);
            }
          });
          svg.appendChild(g);
          drawNodes(n.left); drawNodes(n.right);
        })(tree.root);
      }

      // Visual action runner
      function runSteps(tree, steps, opts={}){
        // opts: mode: 'insert'|'search'|'delete', onComplete
        const mode = opts.mode || 'search';
        let i = 0;
        const visitedElems = [];
        setTrace('');
        function step(){
          if(i >= steps.length){
            if(opts.onComplete) opts.onComplete();
            return;
          }
          const s = steps[i++];
          handleStep(s);
          setTimeout(step, ANIMATION_DELAY);
        }
        function findNodeElement(node){
          if(!node) return null;
          return svg.querySelector(`g.node[data-id="${node.id}"]`);
        }
        function handleStep(s){
          if(s.type === 'visit'){
            const el = findNodeElement(s.node);
            if(el){
              // highlight visited
              const circ = el.querySelector('circle');
              circ.classList.add('visited');
              visitedElems.push(circ);
              setTrace(prev => ('Visiting ' + s.node.value));
              log('Visit', s.node.value);
              // pulse
              el.animate([{transform:'scale(1)'},{transform:'scale(1.05)'},{transform:'scale(1)'}],{duration:ANIMATION_DELAY,iterations:1});
            }
          } else if(s.type === 'found'){
            const el = findNodeElement(s.node);
            if(el){
              const circ = el.querySelector('circle');
              circ.classList.add('found');
              setTrace('Found ' + s.node.value);
              log('Found', s.node.value);
            }
          } else if(s.type === 'insertRoot'){
            // re-draw tree to include new node, then highlight
            drawTree(tree);
            const el = findNodeElement(s.node);
            if(el){
              el.querySelector('circle').classList.add('found');
              setTrace('Inserted root ' + s.node.value);
              log('Insert root', s.node.value);
            }
          } else if(s.type === 'insert'){
            // redraw to place node
            drawTree(tree);
            const el = findNodeElement(s.node);
            if(el){
              el.querySelector('circle').classList.add('found');
              setTrace('Inserted ' + s.node.value + ' as ' + s.side + ' child of ' + s.parent.value);
              log('Insert', s.node.value, 'as', s.side, 'of', s.parent.value);
              // small pop animation
              el.animate([{transform:'scale(0.6)'},{transform:'scale(1.06)'},{transform:'scale(1)'}],{duration:ANIMATION_DELAY,iterations:1});
            }
          } else if(s.type === 'exists'){
            setTrace('Value already exists: ' + s.node.value);
            log('Value already exists:', s.node.value);
          } else if(s.type === 'notfound'){
            setTrace('Value not found');
            log('Value not found');
          } else if(s.type === 'target'){
            const el = findNodeElement(s.node);
            if(el){
              el.querySelector('circle').classList.add('visited');
              setTrace('Target ' + s.node.value);
              log('Target for deletion', s.node.value);
            }
          } else if(s.type === 'deleteLeaf'){
            // animate removal: fade node then redraw without it
            const el = findNodeElement(s.node);
            if(el){
              const circ = el.querySelector('circle');
              circ.classList.add('delete');
              el.animate([{opacity:1},{opacity:0}],{duration:ANIMATION_DELAY,fill:'forwards'});
            }
            // redraw after a short timeout
            setTimeout(()=>{ drawTree(tree); }, ANIMATION_DELAY/1.5);
            setTrace('Deleted leaf ' + s.node.value);
            log('Deleted leaf', s.node.value);
          } else if(s.type === 'deleteSingle'){
            const el = findNodeElement(s.node);
            if(el) el.animate([{opacity:1},{opacity:0}],{duration:ANIMATION_DELAY,fill:'forwards'});
            setTimeout(()=>{ drawTree(tree); }, ANIMATION_DELAY/1.5);
            setTrace('Deleted node ' + s.node.value + ', replaced by child ' + (s.child? s.child.value : ''));
            log('Deleted (one child) ', s.node.value, 'child', s.child? s.child.value:'-');
          } else if(s.type === 'successor'){
            // highlight successor and its parent
            const succEl = findNodeElement(s.succ);
            const pEl = findNodeElement(s.succParent);
            if(succEl) succEl.querySelector('circle').classList.add('found');
            if(pEl) pEl.querySelector('circle').classList.add('visited');
            setTrace('Successor is ' + s.succ.value);
            log('Successor', s.succ.value);
          } else if(s.type === 'replace'){
            // value replacement already done in data; redraw to reflect
            drawTree(tree);
            setTrace('Replaced value ' + s.oldVal + ' with ' + s.newVal);
            log('Replaced', s.oldVal, 'with', s.newVal);
          }
        }
        // start sequence
        step();
      }

      // Controller wiring
      const tree = new BST();

      function performInsert(values){
        const arr = parseValues(values);
        if(arr.length === 0) { alert('Enter at least one integer.'); return; }
        // insert sequentially; chain animations
        (function insertNext(index){
          if(index >= arr.length) return;
          const val = arr[index];
          const result = tree.insert(val);
          runSteps(tree, result.steps, {mode:'insert', onComplete: ()=> {
            drawTree(tree);
            insertNext(index+1);
          }});
        })(0);
      }
      function performSearch(value){
        const val = parseInt(value);
        if(Number.isNaN(val)){ alert('Enter an integer to search'); return;}
        const result = tree.search(val);
        runSteps(tree, result.steps, {mode:'search', onComplete:()=> {
          if(result.found) log('Search complete:', val, 'found'); else log('Search complete:', val, 'not found');
        }});
      }
      function performDelete(value){
        const val = parseInt(value);
        if(Number.isNaN(val)){ alert('Enter an integer to delete'); return;}
        const result = tree.delete(val);
        runSteps(tree, result.steps, {mode:'delete', onComplete: ()=> {
          drawTree(tree);
          if(result.removed) log('Deleted', val); else log('Value not found for deletion:', val);
        }});
      }

      function parseValues(s){
        if(!s) return [];
        return s.split(',').map(t=>t.trim()).filter(t=>t!=='').map(t=>parseInt(t)).filter(n=>!Number.isNaN(n));
      }

      insertBtn.addEventListener('click', ()=> {
        performInsert(input.value);
      });
      searchBtn.addEventListener('click', ()=> {
        performSearch(input.value);
      });
      deleteBtn.addEventListener('click', ()=> {
        performDelete(input.value);
      });
      randomBtn.addEventListener('click', ()=>{
        clearAll();
        const count = Math.floor(Math.random()*7)+5;
        const values = [];
        while(values.length < count){
          const v = Math.floor(Math.random()*90)+1;
          if(!values.includes(v)) values.push(v);
        }
        input.value = values.join(', ');
        performInsert(input.value);
      });
      clearBtn.addEventListener('click', ()=> clearAll());

      inorderBtn.addEventListener('click', ()=>{
        const arr = tree.inorder();
        if(arr.length === 0) { alert('Tree is empty'); return;}
        log('In-order: ' + arr.join(', '));
        alert('In-order traversal: ' + arr.join(', '));
      });
      preorderBtn.addEventListener('click', ()=>{
        const arr = tree.preorder();
        if(arr.length === 0) { alert('Tree is empty'); return;}
        log('Pre-order: ' + arr.join(', '));
        alert('Pre-order traversal: ' + arr.join(', '));
      });
      postorderBtn.addEventListener('click', ()=>{
        const arr = tree.postorder();
        if(arr.length === 0) { alert('Tree is empty'); return;}
        log('Post-order: ' + arr.join(', '));
        alert('Post-order traversal: ' + arr.join(', '));
      });
      levelBtn.addEventListener('click', ()=>{
        const arr = tree.levelorder();
        if(arr.length === 0) { alert('Tree is empty'); return;}
        log('Level-order: ' + arr.join(', '));
        alert('Level-order traversal: ' + arr.join(', '));
      });

      function clearAll(){
        tree.root = null;
        Node._nextId = 1;
        clearSVG();
        logBox.innerHTML = '';
        setTrace('');
        input.value = '';
      }

      // initialize with a small example
      (function initExample(){
        const seed = [50,30,70,20,40,60,80];
        input.value = seed.join(', ');
        performInsert(input.value);
      })();

      // click on empty canvas to clear highlights
      svg.addEventListener('click', ()=> {
        // redraw clears highlight state (we don't persist classes)
        drawTree(tree);
      });

      // expose for debugging
      window.__BST__ = {tree, drawTree, runSteps};

    })();
  </script>
</body>
</html>
