<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Priority Queue Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2rem;
    background: #f0f4f8;
    color: #333;
  }
  h1 {
    text-align: center;
    margin-bottom: 1rem;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
    background: #ffffff;
    padding: 1.5rem 2rem;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  label {
    display: block;
    margin-top: 1rem;
  }
  input[type="text"],
  input[type="number"] {
    width: 100%;
    padding: 0.4rem;
    margin-top: 0.25rem;
    box-sizing: border-box;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  button {
    margin-top: 1rem;
    padding: 0.6rem 1.2rem;
    font-size: 1rem;
    border-radius: 4px;
    border: none;
    background: #1976d2;
    color: white;
    cursor: pointer;
    transition: background-color 0.2s ease;
  }
  button:hover {
    background: #135ba1;
  }
  .queue-display, .output {
    background: #e9f0fe;
    border-radius: 4px;
    padding: 1rem;
    margin-top: 1.5rem;
    min-height: 50px;
    font-family: monospace;
    white-space: pre-wrap;
  }
  .footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 0.9rem;
    color: #666;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Priority Queue Demo</h1>

    <label for="element">Element (value):</label>
    <input type="text" id="element" placeholder="Enter element value" />

    <label for="priority">Priority (number, lower = higher priority):</label>
    <input type="number" id="priority" placeholder="Enter priority (e.g. 1 is highest)" min="0" />

    <button id="enqueueBtn">Enqueue</button>
    <button id="dequeueBtn">Dequeue</button>
    <button id="peekBtn">Peek</button>
    <button id="clearBtn">Clear Queue</button>

    <h3>Current Priority Queue:</h3>
    <div class="queue-display" id="queueDisplay">Queue is empty</div>

    <h3>Output:</h3>
    <div class="output" id="output"></div>

  </div>

<script>
  // PriorityQueue implementation (min-priority queue: smaller priorities come out first)
  class PriorityQueue {
    constructor() {
      this.items = [];
    }

    enqueue(element, priority) {
      // Create a queue element
      const queueElement = { element, priority };
      if (this.isEmpty()) {
        this.items.push(queueElement);
      } else {
        let added = false;
        // Insert element in sorted order by priority
        for (let i = 0; i < this.items.length; i++) {
          if (priority < this.items[i].priority) {
            this.items.splice(i, 0, queueElement);
            added = true;
            break;
          }
        }
        if (!added) {
          this.items.push(queueElement);
        }
      }
    }

    dequeue() {
      if (this.isEmpty()) return null;
      return this.items.shift();
    }

    peek() {
      if (this.isEmpty()) return null;
      return this.items[0];
    }

    isEmpty() {
      return this.items.length === 0;
    }

    clear() {
      this.items = [];
    }

    toString() {
      if (this.isEmpty()) return "Queue is empty";
      return this.items
        .map((item, index) => `[${index}] ${item.element} (priority: ${item.priority})`)
        .join("\n");
    }
  }

  // DOM elements
  const elementInput = document.getElementById('element');
  const priorityInput = document.getElementById('priority');
  const enqueueBtn = document.getElementById('enqueueBtn');
  const dequeueBtn = document.getElementById('dequeueBtn');
  const peekBtn = document.getElementById('peekBtn');
  const clearBtn = document.getElementById('clearBtn');
  const queueDisplay = document.getElementById('queueDisplay');
  const output = document.getElementById('output');

  // Create new priority queue
  const pq = new PriorityQueue();

  // Update queue display
  function updateDisplay() {
    queueDisplay.textContent = pq.toString();
  }

  // Enqueue handler
  enqueueBtn.addEventListener('click', () => {
    const element = elementInput.value.trim();
    const priorityValue = priorityInput.value.trim();

    if (element === "") {
      alert("Please enter an element value.");
      elementInput.focus();
      return;
    }

    if (priorityValue === "" || isNaN(priorityValue)) {
      alert("Please enter a valid priority number.");
      priorityInput.focus();
      return;
    }

    const priority = Number(priorityValue);
    if (priority < 0) {
      alert("Priority must be zero or positive.");
      priorityInput.focus();
      return;
    }

    pq.enqueue(element, priority);
    output.textContent = `Enqueued: "${element}" with priority ${priority}`;
    updateDisplay();

    // Clear inputs for next add
    elementInput.value = "";
    priorityInput.value = "";
    elementInput.focus();
  });

  // Dequeue handler
  dequeueBtn.addEventListener('click', () => {
    if (pq.isEmpty()) {
      output.textContent = "Cannot dequeue. Queue is empty.";
      return;
    }
    const removed = pq.dequeue();
    output.textContent = `Dequeued: "${removed.element}" with priority ${removed.priority}`;
    updateDisplay();
  });

  // Peek handler
  peekBtn.addEventListener('click', () => {
    if (pq.isEmpty()) {
      output.textContent = "Queue is empty.";
      return;
    }
    const peeked = pq.peek();
    output.textContent = `Front element: "${peeked.element}" with priority ${peeked.priority}`;
  });

  // Clear handler
  clearBtn.addEventListener('click', () => {
    pq.clear();
    output.textContent = "Queue cleared.";
    updateDisplay();
  });

  // Initialize display
  updateDisplay();

</script>
</body>
</html>
