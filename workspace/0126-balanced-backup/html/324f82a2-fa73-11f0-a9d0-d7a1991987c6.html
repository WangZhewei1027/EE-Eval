<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Testing Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #test-results {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            background-color: #f9f9f9;
        }
        .pass {
            color: green;
        }
        .fail {
            color: red;
        }
    </style>
</head>
<body>

<h1>Unit Testing Demo</h1>
<p>This simple unit test framework will test a sample function.</p>

<button id="run-tests">Run Tests</button>

<div id="test-results"></div>

<script>
    // Sample function to test
    function add(a, b) {
        return a + b;
    }

    // Unit Test Framework
    function unitTest(description, fn) {
        try {
            fn();
            document.getElementById('test-results').innerHTML += `<div class="pass">✔️ ${description} - Passed</div>`;
        } catch (error) {
            document.getElementById('test-results').innerHTML += `<div class="fail">❌ ${description} - Failed: ${error.message}</div>`;
        }
    }

    // Define the tests for the add function
    function runTests() {
        document.getElementById('test-results').innerHTML = ''; // Clear previous results

        unitTest("add(2, 3) should return 5", function () {
            const result = add(2, 3);
            if (result !== 5) throw new Error(`Expected 5 but got ${result}`);
        });

        unitTest("add(-1, 1) should return 0", function () {
            const result = add(-1, 1);
            if (result !== 0) throw new Error(`Expected 0 but got ${result}`);
        });

        unitTest("add(0, 0) should return 0", function () {
            const result = add(0, 0);
            if (result !== 0) throw new Error(`Expected 0 but got ${result}`);
        });

        unitTest("add(2, -3) should return -1", function () {
            const result = add(2, -3);
            if (result !== -1) throw new Error(`Expected -1 but got ${result}`);
        });
    }

    document.getElementById('run-tests').addEventListener('click', runTests);
</script>

</body>
</html>
