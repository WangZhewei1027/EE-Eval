<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runtime Environment Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .container {
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 20px;
            background-color: #fff;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }
        button {
            margin-top: 10px;
            padding: 10px 15px;
            cursor: pointer;
        }
        pre {
            background-color: #eee;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Understanding Runtime Environment</h1>
    <p>The runtime environment is where a program runs and can access the necessary resources it needs. It provides the necessary tools to execute programs written in a specific programming language.</p>
    
    <h2>Current Runtime Information</h2>
    <button id="showInfoBtn">Show Runtime Info</button>
    <pre id="runtimeInfo"></pre>
</div>

<script>
    document.getElementById('showInfoBtn').addEventListener('click', function() {
        const runtimeInfo = {
            'User Agent': navigator.userAgent,
            'Platform': navigator.platform,
            'Language': navigator.language,
            'Online Status': navigator.onLine
        };

        let infoText = JSON.stringify(runtimeInfo, null, 2);
        document.getElementById('runtimeInfo').textContent = infoText;
    });
</script>

</body>
</html>
