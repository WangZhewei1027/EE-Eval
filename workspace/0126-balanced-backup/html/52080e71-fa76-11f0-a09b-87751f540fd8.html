<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .stack {
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            width: 300px;
            margin: 50px auto;
            text-align: center;
        }
        .stack input[type="text"] {
            padding: 10px;
            margin: 5px;
            width: 100%;
        }
        .stack button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .stack button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="stack">
        <input type="text" placeholder="Enter a message" />
        <button>Insert</button>
        <button>Remove</button>
        <p>Messages:</p>
        <ul id="messages"></ul>
    </div>

    <script>
        let stack = new Stack();
        let messages = document.getElementById("messages");
        let insertButton = document.querySelector("button");
        let removeButton = document.querySelector("button");

        function push(message) {
            stack.push(message);
            insertMessage(message);
        }

        function pop() {
            if (stack.length > 0) {
                stack.pop();
                removeMessage();
            }
        }

        function insertMessage(message) {
            let li = document.createElement("li");
            li.textContent = message;
            messages.appendChild(li);
        }

        function removeMessage() {
            messages.removeChild(messages.lastChild);
        }

        insertButton.addEventListener("click", push);
        removeButton.addEventListener("click", pop);
    </script>
</body>
</html>
