<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>B-Tree Index Interactive Demo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg:#0f1724;
      --panel:#0b1220;
      --accent:#5eead4;
      --muted:#94a3b8;
      --node-bg:#071129;
      --node-border:#1f2937;
    }
    html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg),#041226);color:#e6eef8;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;}
    .app{
      display:flex;
      gap:18px;
      padding:18px;
      box-sizing:border-box;
      height:100%;
    }
    .panel{
      width:360px;
      max-width:36%;
      min-width:260px;
      background:linear-gradient(180deg,var(--panel),#061124);
      border-radius:12px;
      padding:14px;
      box-shadow:0 6px 18px rgba(2,6,23,0.6);
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .panel h2{margin:0;font-size:18px;color:var(--accent)}
    .controls{display:flex;flex-direction:column;gap:10px}
    .row{display:flex;gap:8px;align-items:center}
    input[type="number"],input[type="text"],select{
      background:#061520;border:1px solid #123;outline:none;color:#dff7ef;padding:8px;border-radius:8px;flex:1;
    }
    button{
      background:linear-gradient(180deg,#0ea5a4,#05847f);
      color:#012020;border:none;padding:8px 10px;border-radius:8px;cursor:pointer;font-weight:600;
      box-shadow:0 6px 12px rgba(0,0,0,0.4);
    }
    button.ghost{background:transparent;border:1px solid #123;color:var(--muted);box-shadow:none;}
    .small{padding:6px 8px;font-size:13px}
    .info{font-size:13px;color:var(--muted);line-height:1.35}
    .log{
      background:linear-gradient(180deg,#041726,#03121a);
      padding:8px;border-radius:8px;min-height:120px;overflow:auto;font-family:monospace;font-size:13px;color:#cfece3;border:1px solid rgba(255,255,255,0.02);
    }
    .canvas-wrap{
      flex:1;position:relative;overflow:auto;border-radius:12px;padding:18px;
      background:linear-gradient(180deg,#071627,#02111b);border:1px solid rgba(255,255,255,0.02);
    }
    svg{position:absolute;left:0;top:0;pointer-events:none}
    .node{
      position:absolute;
      display:flex;
      gap:0;
      align-items:stretch;
      height:40px;
      border-radius:8px;
      background:linear-gradient(180deg,var(--node-bg),#04122a);
      border:2px solid var(--node-border);
      box-sizing:border-box;
      padding:4px;
      transition:transform 200ms, box-shadow 200ms;
      transform-origin:center top;
      box-shadow:0 6px 14px rgba(2,8,18,0.6);
      font-weight:700;
    }
    .node.leaf{box-shadow:0 10px 28px rgba(4,12,30,0.45)}
    .key{
      min-width:28px;
      height:28px;
      line-height:28px;
      text-align:center;
      background:transparent;
      color:#c7f9ec;
      font-size:13px;
      border-right:1px solid rgba(255,255,255,0.03);
      padding:0 8px;
      display:inline-flex;align-items:center;justify-content:center;border-radius:6px;
    }
    .key:last-child{border-right:none}
    .key.highlight{background:linear-gradient(90deg,#63f6d0,#2dd4bf);color:#022;box-shadow:0 4px 12px rgba(45,212,191,0.14)}
    .node.split {transform:scale(1.06);box-shadow:0 12px 30px rgba(45,212,191,0.12)}
    .controls .hint{font-size:13px;color:var(--muted)}
    .footer{display:flex;gap:8px;align-items:center;justify-content:space-between}
    .kbd{background:#02121a;padding:6px 8px;border-radius:6px;border:1px solid rgba(255,255,255,0.02);font-size:13px;color:var(--muted)}
    .legend{display:flex;gap:8px;align-items:center;padding-top:6px}
    .dot{width:12px;height:12px;border-radius:3px}
    .dot.a{background:#2dd4bf}
    .dot.b{background:#60a5fa}
    .dot.c{background:#fbbf24}
    .controls .small-note{font-size:12px;color:var(--muted)}
    .topbar{display:flex;gap:8px;align-items:center;justify-content:space-between}
    .range{display:flex;align-items:center;gap:8px}
    .range input[type="range"]{width:120px}
    @media (max-width:880px){
      .app{flex-direction:column}
      .panel{width:100%;max-width:none}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <div class="topbar">
        <h2>B-Tree Index (interactive)</h2>
        <div class="kbd">B-Tree (min degree t)</div>
      </div>

      <div class="controls">
        <div class="row">
          <label style="min-width:80px;color:var(--muted)">min degree (t)</label>
          <div class="range">
            <input id="degree" type="range" min="2" max="5" value="2"/>
            <div id="degreeVal" class="kbd">t = 2</div>
          </div>
        </div>

        <div class="row">
          <input id="keyInput" type="text" placeholder="Enter key(s) comma separated e.g. 10,5,20" />
          <button id="insertBtn" class="small">Insert</button>
        </div>

        <div class="row">
          <input id="searchInput" type="number" placeholder="Search key" />
          <button id="searchBtn" class="small ghost">Search</button>
          <button id="randomBtn" class="small">Random</button>
        </div>

        <div class="row">
          <button id="clearBtn" class="small ghost">Reset</button>
          <button id="autoplayBtn" class="small ghost">Autoplay demo</button>
          <div style="flex:1"></div>
        </div>

        <div class="info">
          What is demonstrated:
          <ul style="margin:6px 0 0 18px;padding:0;color:var(--muted)">
            <li>Insert keys into a B-Tree (min-degree t)</li>
            <li>Splitting of full nodes (visualized)</li>
            <li>Search path highlighting</li>
          </ul>
        </div>

        <div>
          <strong>Log (algorithm steps)</strong>
          <div id="log" class="log" aria-live="polite"></div>
        </div>

        <div class="footer">
          <div class="small-note">Tip: try t = 2, insert 1..15 to see many splits</div>
          <div class="legend">
            <div style="color:var(--muted);font-size:13px">Highlights:</div>
            <div class="dot a" title="split/active"></div><div style="color:var(--muted);font-size:13px">split</div>
            <div class="dot b" title="search path" style="margin-left:8px"></div><div style="color:var(--muted);font-size:13px">search</div>
          </div>
        </div>
      </div>

    </div>

    <div id="canvas" class="canvas-wrap">
      <svg id="svg"></svg>
      <!-- nodes will be appended here -->
    </div>
  </div>

<script>
/*
  Interactive B-Tree demo
  - Implements B-Tree insertion (CLRS style) with splitChild.
  - Visualizes nodes and splitting with logs.
  - Search highlights path.
  - Min-degree t adjustable (2..5)
*/

(() => {
  // Utility
  const $ = id => document.getElementById(id);
  const logEl = $('log');
  const canvas = $('canvas');
  const svg = $('svg');

  function log(msg, kind='info'){
    const d = document.createElement('div');
    d.textContent = msg;
    d.style.padding = '2px 0';
    if(kind==='step') d.style.color = '#c7f3ea';
    else if(kind==='warn') d.style.color = '#ffd1a3';
    logEl.prepend(d);
  }
  function clearLog(){ logEl.innerHTML=''; }

  // BTree Node class
  class BNode {
    constructor(t, leaf=true){
      this.t = t;
      this.keys = [];      // array of keys
      this.children = [];  // array of BNode
      this.leaf = leaf;
      this.id = 'n' + Math.random().toString(36).slice(2,9);
    }
    isFull(){ return this.keys.length === (2*this.t - 1); }
  }

  // BTree with min degree t
  class BTree {
    constructor(t=2){
      this.t = t;
      this.root = new BNode(t,true);
    }

    search(k){
      // returns path of nodes visited and index where found or would be inserted
      const path = [];
      function _search(node){
        path.push({node, highlightIndex:null});
        let i=0;
        while(i < node.keys.length && k > node.keys[i]) i++;
        if(i < node.keys.length && k === node.keys[i]){
          path[path.length-1].highlightIndex = i;
          return {found:true,node,idx:i,path};
        } else if(node.leaf){
          return {found:false,node,idx:i,path};
        } else {
          // highlight decision at i
          path[path.length-1].highlightIndex = i;
          return _search(node.children[i]);
        }
      }
      return _search(this.root);
    }

    insert(k, animate=true){
      if(typeof k !== 'number' || Number.isNaN(k)) return;
      if(this.root.isFull()){
        // need to split root
        const s = new BNode(this.t,false);
        s.children[0] = this.root;
        this.root = s;
        if(animate){
          return this._splitAndInsert(s,0,k);
        } else {
          this._splitChild(s,0);
          this._insertNonFull(s,k);
          return Promise.resolve();
        }
      } else {
        if(animate) return this._insertWithAnimation(this.root,k);
        this._insertNonFull(this.root,k);
        return Promise.resolve();
      }
    }

    _insertNonFull(node,k){
      let i = node.keys.length - 1;
      if(node.leaf){
        // insert into keys[] keeping sorted
        while(i >= 0 && k < node.keys[i]) i--;
        node.keys.splice(i+1,0,k);
      } else {
        while(i >= 0 && k < node.keys[i]) i--;
        i++;
        if(node.children[i].isFull()){
          this._splitChild(node,i);
          if(k > node.keys[i]) i++;
        }
        this._insertNonFull(node.children[i],k);
      }
    }

    _splitChild(x, i){
      // split full child y = x.children[i]
      const t = this.t;
      const y = x.children[i];
      const z = new BNode(t, y.leaf);
      // z gets y.keys[t .. 2t-2], y keeps keys[0 .. t-2], median y.keys[t-1] moves up
      z.keys = y.keys.slice(t); // from index t to end (2t-1 - 1)
      const median = y.keys[t-1];
      y.keys = y.keys.slice(0, t-1);
      if(!y.leaf){
        z.children = y.children.slice(t);
        y.children = y.children.slice(0,t);
      }
      x.children.splice(i+1,0,z);
      x.keys.splice(i,0,median);
    }

    // Animated helpers (promise-based with timeouts)
    _delay(ms){ return new Promise(r=>setTimeout(r, ms)); }

    async _splitAndInsert(parent, childIndex, k){
      // Visualize new root and split at childIndex then continue insertion
      log('Root is full -> creating new root and splitting child', 'step');
      render(); await this._delay(650);

      // highlight child to split
      highlightNode(parent.children[childIndex], 'split');
      log(`Splitting child node (index ${childIndex})`, 'step');
      await this._delay(600);

      this._splitChild(parent, childIndex);
      render();
      // show split result
      highlightNode(parent, 'split');
      log('Promoted median to parent; child split into two nodes', 'step');
      await this._delay(700);

      // now insert non-full
      await this._insertWithAnimation(parent, k);
    }

    async _insertWithAnimation(node,k){
      // recursive animated insertion: emulate CLRS logic with highlighting
      let current = node;
      while(true){
        render();
        highlightNode(current, 'split'); // active node
        log(`At node ${current.id} keys=[${current.keys.join(', ')}]`, 'step');
        await this._delay(550);

        if(current.leaf){
          // insert into leaf
          let i = current.keys.length -1;
          while(i >= 0 && k < current.keys[i]) i--;
          current.keys.splice(i+1,0,k);
          render();
          log(`Inserted key ${k} into leaf`, 'step');
          highlightKey(current, k);
          await this._delay(650);
          clearHighlights();
          return;
        } else {
          // find child index
          let i=0;
          while(i < current.keys.length && k > current.keys[i]) i++;
          log(`Descending to child ${i}`, 'step');
          // if child is full, split and decide again
          if(current.children[i].isFull()){
            highlightNode(current.children[i], 'split');
            await this._delay(500);
            log(`Child ${i} is full -> splitting`, 'step');
            this._splitChild(current, i);
            render();
            highlightNode(current, 'split');
            await this._delay(700);
            // after split, if k greater than promoted key, go to i+1
            if(k > current.keys[i]) i++;
            clearHighlights();
          }
          current = current.children[i];
        }
      }
    }

    // helper to build tree from array (uses repeated insert)
    async insertBulk(arr){
      for(const v of arr){
        await this.insert(v, true);
      }
    }

  }

  // ---- Visualization state and functions ----
  let tree = new BTree(2);

  // DOM helpers for rendering nodes
  const nodeMap = new Map(); // node.id -> div
  const highlightMap = new Map();

  function clearCanvas(){
    // remove node elements
    const nodes = canvas.querySelectorAll('.node');
    nodes.forEach(n=>n.remove());
    svg.innerHTML = '';
    nodeMap.clear();
  }

  function render(){
    clearCanvas();
    // build layout positions
    const spacingX = 18;
    const spacingY = 72;
    const minNodeWidth = 54;
    const keyWidth = 34;

    function nodeWidth(node){
      return Math.max(minNodeWidth, node.keys.length * keyWidth + 12);
    }

    // compute subtree widths to layout children centered
    function computeWidth(node){
      if(node.leaf) return nodeWidth(node);
      let w = 0;
      for(const c of node.children) w += computeWidth(c) + spacingX;
      if(w>0) w -= spacingX;
      return Math.max(w, nodeWidth(node));
    }

    function place(node, x, y){
      // returns center x
      const w = computeWidth(node);
      if(node.leaf){
        const nx = x + w/2 - nodeWidth(node)/2;
        createNodeElement(node, nx, y);
        return nx + nodeWidth(node)/2;
      } else {
        // start children at x
        let cx = x;
        const childCenters = [];
        for(const c of node.children){
          const cw = computeWidth(c);
          const center = place(c, cx, y + spacingY);
          childCenters.push(center);
          cx += cw + spacingX;
        }
        // center this node above its children
        const center = (childCenters[0] + childCenters[childCenters.length-1]) / 2;
        const nx = center - nodeWidth(node)/2;
        createNodeElement(node, nx, y);
        // draw lines from node to children - deferred
        for(const c of node.children){
          drawEdge(node, c);
        }
        return center;
      }
    }

    // draw tree starting x=20
    const startX = 20;
    const startY = 20;
    place(tree.root, startX, startY);

    // adjust svg size to fit
    const rects = canvas.querySelectorAll('.node');
    let maxX = 0, maxY = 0;
    rects.forEach(el=>{
      const r = el.getBoundingClientRect();
      const c = canvas.getBoundingClientRect();
      const right = el.offsetLeft + el.offsetWidth;
      const bottom = el.offsetTop + el.offsetHeight;
      maxX = Math.max(maxX, right);
      maxY = Math.max(maxY, bottom);
    });
    svg.setAttribute('width', Math.max(maxX+40,c.offsetWidth));
    svg.setAttribute('height', Math.max(maxY+40,c.offsetHeight));
  }

  function createNodeElement(node, left, top){
    const div = document.createElement('div');
    div.className = 'node' + (node.leaf? ' leaf':'');
    div.style.left = Math.round(left) + 'px';
    div.style.top = Math.round(top) + 'px';
    div.dataset.id = node.id;
    // keys
    div.innerHTML = '';
    node.keys.forEach((k,idx)=>{
      const kdiv = document.createElement('div');
      kdiv.className = 'key';
      kdiv.textContent = k;
      kdiv.dataset.key = k;
      kdiv.dataset.index = idx;
      div.appendChild(kdiv);
    });
    canvas.appendChild(div);
    nodeMap.set(node.id, {el:div,node});
  }

  function drawEdge(parent, child){
    const p = nodeMap.get(parent.id);
    const c = nodeMap.get(child.id);
    if(!p || !c) return;
    const sx = p.el.offsetLeft + p.el.offsetWidth/2;
    const sy = p.el.offsetTop + p.el.offsetHeight;
    const tx = c.el.offsetLeft + c.el.offsetWidth/2;
    const ty = c.el.offsetTop;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    const dx = (tx - sx) * 0.35;
    const d = `M ${sx} ${sy} C ${sx} ${sy+20} ${sx+dx} ${ty-10} ${tx} ${ty}`;
    path.setAttribute('d', d);
    path.setAttribute('stroke','#0ea5a477');
    path.setAttribute('fill','none');
    path.setAttribute('stroke-width','2');
    svg.appendChild(path);
  }

  function clearHighlights(){
    for(const {el} of nodeMap.values()){
      el.classList.remove('split');
      const keys = el.querySelectorAll('.key');
      keys.forEach(k=>k.classList.remove('highlight'));
    }
  }

  function highlightNode(node, cls){
    clearHighlights();
    const entry = nodeMap.get(node.id);
    if(entry) entry.el.classList.add('split');
  }
  function highlightKey(node, key){
    const entry = nodeMap.get(node.id);
    if(!entry) return;
    const keys = entry.el.querySelectorAll('.key');
    keys.forEach(k=>{
      if(Number(k.textContent) === key) k.classList.add('highlight');
    });
  }
  function highlightSearchPath(path){
    clearHighlights();
    for(const p of path){
      const entry = nodeMap.get(p.node.id);
      if(entry){
        entry.el.classList.add('split');
        if(p.highlightIndex !== null){
          const idx = p.highlightIndex;
          const keyEl = entry.el.querySelector(`.key:nth-child(${idx+1})`);
          if(keyEl) keyEl.classList.add('highlight');
        }
      }
    }
  }

  // ---- UI wiring ----
  const degree = $('degree');
  const degreeVal = $('degreeVal');
  degree.addEventListener('input', ()=>{
    const t = Number(degree.value);
    degreeVal.textContent = `t = ${t}`;
  });

  $('insertBtn').addEventListener('click', async ()=>{
    const raw = $('keyInput').value.trim();
    if(!raw) return;
    const parts = raw.split(',').map(s=>s.trim()).filter(Boolean).map(Number);
    // update degree if changed
    const t = Number(degree.value);
    if(t !== tree.t){
      tree = new BTree(t);
      clearLog();
      log(`Reinitialized tree with t=${t}`, 'step');
    }
    for(const v of parts){
      log(`Insert ${v}`);
      await tree.insert(v, true);
    }
    render();
    $('keyInput').value = '';
  });

  $('randomBtn').addEventListener('click', async ()=>{
    const t = Number(degree.value);
    if(t !== tree.t){
      tree = new BTree(t);
      clearLog();
      log(`Reinitialized tree with t=${t}`, 'step');
    }
    // insert random 6 numbers
    const arr = [];
    for(let i=0;i<6;i++) arr.push(Math.floor(Math.random()*90)+1);
    log('Inserting random: ' + arr.join(', '));
    for(const v of arr){
      await tree.insert(v, true);
    }
    render();
  });

  $('searchBtn').addEventListener('click', ()=>{
    const raw = Number($('searchInput').value);
    if(Number.isNaN(raw)) return;
    const res = tree.search(raw);
    log(`Search ${raw} -> ${res.found ? 'FOUND' : 'NOT FOUND'}`, 'step');
    render();
    highlightSearchPath(res.path);
  });

  $('clearBtn').addEventListener('click', ()=>{
    const t = Number(degree.value);
    tree = new BTree(t);
    clearCanvas();
    clearLog();
    log(`Tree reset (t=${t})`, 'step');
    render();
  });

  // autoplay demo: insert sequence 1..n
  $('autoplayBtn').addEventListener('click', async ()=>{
    const t = Number(degree.value);
    tree = new BTree(t);
    clearLog();
    render();
    log(`Autoplay demo: inserting 1..15 with t=${t}`, 'step');
    const arr = [];
    for(let i=1;i<=15;i++) arr.push(i);
    for(const v of arr){
      log(`Insert ${v}`);
      await tree.insert(v, true);
    }
    render();
  });

  // initial render
  render();
  log('B-Tree demo ready. Set t and insert keys.', 'step');

  // small accessibility: click node shows its keys in log
  canvas.addEventListener('click', (e)=>{
    const nodeEl = e.target.closest('.node');
    if(!nodeEl) return;
    const id = nodeEl.dataset.id;
    const info = nodeMap.get(id);
    if(info){
      log(`Node ${id} keys=[${info.node.keys.join(', ')}]`, 'step');
    }
  });

  // expose some functions for debugging
  window._btree_demo = {tree, render, log};

})();
</script>
</body>
</html>
