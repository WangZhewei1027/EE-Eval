<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undirected Graph Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #graph {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .node {
            display: inline-block;
            margin: 5px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        .edges {
            display: flex;
            flex-wrap: wrap;
        }
        .edge {
            margin: 2px;
            color: #757575;
        }
    </style>
</head>
<body>

<h2>Undirected Graph Visualization</h2>
<div id="graph"></div>
<div>
    <input type="text" id="nodeInput" placeholder="Add Node (e.g., A)">
    <button onclick="addNode()">Add Node</button>
</div>
<div>
    <input type="text" id="edgeInput" placeholder="Add Edge (e.g., A-B)">
    <button onclick="addEdge()">Add Edge</button>
</div>

<script>
    const graph = {
        nodes: new Set(),
        edges: new Set()
    };

    function renderGraph() {
        const graphElement = document.getElementById('graph');
        graphElement.innerHTML = '';
        
        // Render Nodes
        for (const node of graph.nodes) {
            const nodeElement = document.createElement('div');
            nodeElement.classList.add('node');
            nodeElement.textContent = node;
            graphElement.appendChild(nodeElement);
        }

        // Render Edges
        const edgesElement = document.createElement('div');
        edgesElement.classList.add('edges');
        for (const edge of graph.edges) {
            const edgeElement = document.createElement('div');
            edgeElement.classList.add('edge');
            edgeElement.textContent = edge;
            edgesElement.appendChild(edgeElement);
        }

        graphElement.appendChild(edgesElement);
    }

    function addNode() {
        const nodeInput = document.getElementById('nodeInput');
        const nodeValue = nodeInput.value.trim();
        
        if (nodeValue) {
            graph.nodes.add(nodeValue);
            nodeInput.value = '';
            renderGraph();
        }
    }

    function addEdge() {
        const edgeInput = document.getElementById('edgeInput');
        const edgeValue = edgeInput.value.trim();

        if (edgeValue && edgeValue.includes('-')) {
            const [nodeA, nodeB] = edgeValue.split('-').map(n => n.trim());
            if (graph.nodes.has(nodeA) && graph.nodes.has(nodeB)) {
                graph.edges.add(`${nodeA} - ${nodeB}`);
                graph.edges.add(`${nodeB} - ${nodeA}`); // Undirected edge
                edgeInput.value = '';
                renderGraph();
            } else {
                alert('Both nodes must exist in the graph before creating an edge.');
            }
        }
    }
</script>

</body>
</html>
