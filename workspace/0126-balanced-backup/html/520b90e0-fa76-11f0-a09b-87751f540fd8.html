<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistic Regression</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 18px;
        }
        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Logistic Regression</h1>
            <p>Logistic Regression is a supervised learning algorithm used for binary classification problems.</p>
        </div>
        <p>Logistic Regression is a type of linear regression that uses logistic function to model the relationship between the input features and the target variable.</p>
        <div id="result"></div>
        <script>
            // Sample data
            let X = [
                [0, 0],
                [0, 1],
                [1, 0],
                [1, 1]
            ];
            let y = [
                0,
                1,
                1,
                1
            ];

            // Logistic Regression function
            function logisticRegression(X, y) {
                let m = X.length;
                let w = new Array(2).fill(0);
                for (let i = 0; i < m; i++) {
                    let sum = 0;
                    for (let j = 0; j < X[i].length; j++) {
                        sum += X[i][j] * w[j];
                    }
                    let prob = Math.exp(-sum) / (Math.exp(-sum) + 1);
                    w.push(1 / m * (y[i] - 1) * prob);
                }
                return w;
            }

            // Train the model
            let w = logisticRegression(X, y);

            // Make predictions
            function makePrediction(w, X) {
                let predictions = new Array(X.length).fill(0);
                for (let i = 0; i < X.length; i++) {
                    let sum = 0;
                    for (let j = 0; j < w.length; j++) {
                        sum += X[i][j] * w[j];
                    }
                    let prob = Math.exp(-sum) / (Math.exp(-sum) + 1);
                    predictions[i] = 1 if (prob > 0.5) else 0;
                }
                return predictions;
            }

            // Display the result
            function displayResult(predictions) {
                let result = document.getElementById("result");
                result.innerHTML = "Predictions: ";
                for (let i = 0; i < predictions.length; i++) {
                    result.innerHTML += predictions[i] + " ";
                }
            }

            // Train and make predictions
            let predictions = makePrediction(w, X);
            displayResult(predictions);
        </script>
    </div>
</body>
</html>
