<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutex Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #log {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            height: 200px;
            overflow-y: scroll;
        }
        #status {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Mutex Demonstration</h1>
    <button id="start">Start Mutex Operations</button>
    <div id="status"></div>
    <div id="log"></div>

    <script>
        class Mutex {
            constructor() {
                this.queue = [];
                this.locked = false;
            }

            async acquire() {
                if (this.locked) {
                    await new Promise(resolve => this.queue.push(resolve));
                }
                this.locked = true;
            }

            release() {
                if (this.queue.length > 0) {
                    const next = this.queue.shift();
                    next();
                } else {
                    this.locked = false;
                }
            }
        }

        const mutex = new Mutex();
        const log = document.getElementById('log');
        const statusDiv = document.getElementById('status');

        function logMessage(message) {
            log.innerHTML += `<div>${message}</div>`;
            log.scrollTop = log.scrollHeight; // Auto-scroll to the bottom
        }

        async function criticalSection(id) {
            await mutex.acquire(); // Acquire the mutex
            logMessage(`Thread ${id} has entered the critical section.`);
            statusDiv.textContent = `Thread ${id} is working...`;

            // Simulate some work
            await new Promise(resolve => setTimeout(resolve, 2000));

            logMessage(`Thread ${id} is leaving the critical section.`);
            statusDiv.textContent = `Thread ${id} has finished.`;
            mutex.release(); // Release the mutex
        }

        function startMutexOperation() {
            for (let i = 1; i <= 5; i++) {
                setTimeout(() => criticalSection(i), i * 500); // Stagger the calls
            }
        }

        document.getElementById('start').addEventListener('click', startMutexOperation);

    </script>
</body>
</html>
