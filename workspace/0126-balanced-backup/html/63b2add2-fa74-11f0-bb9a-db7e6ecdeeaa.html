<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mutex Demonstration</title>
<style>
  body {
    font-family: sans-serif;
    margin: 1em;
  }
  #log {
    background: #f0f0f0;
    border: 1px solid #ccc;
    height: 250px;
    overflow-y: scroll;
    padding: 0.5em;
    white-space: pre-wrap;
    font-family: monospace;
  }
  button {
    margin: 0.5em 0.2em;
    padding: 0.5em 1em;
    font-size: 1rem;
  }
</style>
</head>
<body>

<h1>Mutex Demo in JavaScript</h1>
<p>This demo simulates multiple async "tasks" trying to access a shared resource controlled by a mutex to ensure mutual exclusion.</p>

<button id="start">Start Tasks</button>
<button id="clear">Clear Log</button>

<div id="log"></div>

<script>
  // Simple async Mutex implementation
  class Mutex {
    constructor() {
      this._queue = [];
      this._locked = false;
    }
    
    lock() {
      // Returns a Promise that resolves when the lock is acquired
      const unlockNext = () => {
        if (this._queue.length > 0) {
          // Dequeue a resolver and call it
          const nextResolve = this._queue.shift();
          nextResolve(unlockNext);
        } else {
          this._locked = false;
        }
      };

      if (this._locked) {
        return new Promise(resolve => {
          this._queue.push(resolve);
        });
      } else {
        this._locked = true;
        return new Promise(resolve => {
          resolve(unlockNext);
        });
      }
    }
  }

  // Helper to log with timestamp
  function log(msg) {
    const logEl = document.getElementById('log');
    const timestamp = new Date().toLocaleTimeString();
    logEl.textContent += `[${timestamp}] ${msg}\n`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  // Simulate a shared resource
  let sharedCounter = 0;

  // Task function simulating work requiring mutex
  async function task(mutex, id, duration) {
    log(`Task ${id}: Waiting to acquire mutex...`);
    const unlock = await mutex.lock();

    try {
      log(`Task ${id}: Mutex acquired, entering critical section.`);
      // Critical section start
      const before = sharedCounter;
      // Simulate some asynchronous work
      await new Promise(r => setTimeout(r, duration));
      sharedCounter = before + 1;
      log(`Task ${id}: Updated sharedCounter from ${before} to ${sharedCounter}.`);
      // Critical section end
      log(`Task ${id}: Leaving critical section.`);
    } finally {
      unlock();
      log(`Task ${id}: Mutex released.`);
    }
  }

  document.getElementById('start').addEventListener('click', () => {
    sharedCounter = 0;
    log('Starting tasks...\n');

    const mutex = new Mutex();

    // Launch multiple tasks with varying durations
    task(mutex, 1, 1500);
    task(mutex, 2, 800);
    task(mutex, 3, 1200);
    task(mutex, 4, 1000);
    task(mutex, 5, 500);
  });

  document.getElementById('clear').addEventListener('click', () => {
    document.getElementById('log').textContent = '';
  });
</script>

</body>
</html>
