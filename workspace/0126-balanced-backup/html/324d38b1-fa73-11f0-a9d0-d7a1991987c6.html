<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Sort Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 20px;
        }
        #array-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .bar {
            width: 30px;
            margin: 0 2px;
            background-color: teal;
        }
    </style>
</head>
<body>

<h1>Bubble Sort Visualization</h1>
<p>Click the button to visualize the Bubble Sort algorithm.</p>
<div id="array-container"></div>
<button id="sort-button">Sort Array</button>

<script>
    const array = [5, 2, 9, 1, 5, 6, 3];
    const arrayContainer = document.getElementById('array-container');
    const sortButton = document.getElementById('sort-button');

    function createBars(arr) {
        arrayContainer.innerHTML = '';
        arr.forEach(num => {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = `${num * 20}px`; // Scale for visualization
            arrayContainer.appendChild(bar);
        });
    }

    async function bubbleSort(arr) {
        const bars = document.querySelectorAll('.bar');
        for (let i = 0; i < arr.length; i++) {
            for (let j = 0; j < arr.length - i - 1; j++) {
                // Change color of the bars being compared
                bars[j].style.backgroundColor = 'red';
                bars[j + 1].style.backgroundColor = 'red';

                // Compare and swap if needed
                if (arr[j] > arr[j + 1]) {
                    await new Promise(resolve => setTimeout(resolve, 300)); // Pause for visualization
                    [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                    createBars(arr);
                }
                // Reset color of the bars
                bars[j].style.backgroundColor = 'teal';
                bars[j + 1].style.backgroundColor = 'teal';
            }
            // Change color of the sorted element
            bars[arr.length - i - 1].style.backgroundColor = 'green';
        }
    }

    sortButton.addEventListener('click', () => {
        createBars(array);
        bubbleSort(array);
    });

    // Initial call to create the bars
    createBars(array);
</script>

</body>
</html>
