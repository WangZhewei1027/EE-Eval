<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floyd-Warshall Algorithm Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        td {
            border: 1px solid #444;
            padding: 10px;
            text-align: center;
            width: 50px;
        }
        input {
            width: 55px;
        }
        #output {
            margin-top: 20px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <h1>Floyd-Warshall Algorithm Visualizer</h1>
    <table id="matrix"></table>
    <button onclick="runFloydWarshall()">Run Floyd-Warshall Algorithm</button>
    <div id="output"></div>

    <script>
        const numVertices = 4;
        const inf = Infinity;

        // Build the initial adjacency matrix
        let dist = [
            [0, 3, inf, 7],
            [inf, 0, 1, inf],
            [inf, inf, 0, 2],
            [6, inf, inf, 0]
        ];

        // Function to create and display the matrix in a table
        function createMatrixTable() {
            const table = document.getElementById('matrix');
            table.innerHTML = '';
            for (let i = 0; i < numVertices; i++) {
                const row = document.createElement('tr');
                for (let j = 0; j < numVertices; j++) {
                    const cell = document.createElement('td');
                    if (dist[i][j] === inf) {
                        cell.innerHTML = '∞';
                    } else {
                        cell.innerHTML = dist[i][j];
                    }
                    row.appendChild(cell);
                }
                table.appendChild(row);
            }
        }

        // Function to run the Floyd-Warshall algorithm
        function runFloydWarshall() {
            let distances = JSON.parse(JSON.stringify(dist)); // deep copy of the distance array
            
            for (let k = 0; k < numVertices; k++) {
                for (let i = 0; i < numVertices; i++) {
                    for (let j = 0; j < numVertices; j++) {
                        if (distances[i][k] !== inf && distances[k][j] !== inf) {
                            distances[i][j] = Math.min(distances[i][j], distances[i][k] + distances[k][j]);
                        }
                    }
                }
            }
            displayOutput(distances);
        }

        // Function to display the final results on the page
        function displayOutput(result) {
            let outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '<h2>Shortest Path Distances</h2>';
            const resultTable = document.createElement('table');

            for (let i = 0; i < numVertices; i++) {
                const row = document.createElement('tr');
                for (let j = 0; j < numVertices; j++) {
                    const cell = document.createElement('td');
                    if (result[i][j] === inf) {
                        cell.innerHTML = '∞';
                    } else {
                        cell.innerHTML = result[i][j];
                    }
                    row.appendChild(cell);
                }
                resultTable.appendChild(row);
            }
            outputDiv.appendChild(resultTable);
        }

        // Initialize the matrix display
        createMatrixTable();
    </script>
</body>
</html>
