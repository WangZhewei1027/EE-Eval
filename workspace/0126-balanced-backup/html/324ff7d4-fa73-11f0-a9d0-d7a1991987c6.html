<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Vector Machine Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        canvas {
            max-width: 600px;
            margin: 20px auto;
        }
        .controls {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Support Vector Machine Demo</h1>
    <canvas id="scatterChart"></canvas>
    <div class="controls">
        <button onclick="generateData()">Generate Data</button>
    </div>

    <script>
        let dataPoints = [];
        const chartCtx = document.getElementById('scatterChart').getContext('2d');
        let scatterChart;

        function generateData() {
            dataPoints = [];
            for (let i = 0; i < 50; i++) {
                dataPoints.push({
                    x: Math.random() * 10,
                    y: Math.random() * 10,
                    label: 0 // Class 0
                });
                dataPoints.push({
                    x: Math.random() * 10 + 5,
                    y: Math.random() * 10 + 5,
                    label: 1 // Class 1
                });
            }
            drawChart();
        }

        function drawChart() {
            const labels = dataPoints.map(p => `(${p.x.toFixed(2)}, ${p.y.toFixed(2)})`);
            const datasets = [
                {
                    label: 'Class 0',
                    data: dataPoints.filter(dp => dp.label === 0).map(dp => ({ x: dp.x, y: dp.y })),
                    backgroundColor: 'rgba(75, 192, 192, 0.6)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    pointRadius: 5,
                },
                {
                    label: 'Class 1',
                    data: dataPoints.filter(dp => dp.label === 1).map(dp => ({ x: dp.x, y: dp.y })),
                    backgroundColor: 'rgba(255, 99, 132, 0.6)',
                    borderColor: 'rgba(255, 99, 132, 1)',
                    pointRadius: 5,
                }
            ];

            if (scatterChart) {
                scatterChart.destroy();
            }
          
            scatterChart = new Chart(chartCtx, {
                type: 'scatter',
                data: {
                    datasets: datasets,
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Feature 1'
                            },
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Feature 2'
                            },
                        }
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                        }
                    }
                },
            });
        }

        // Initial data generation
        generateData();
    </script>
</body>
</html>
