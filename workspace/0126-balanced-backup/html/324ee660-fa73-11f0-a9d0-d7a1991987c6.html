<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relational Database Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        th {
            background-color: #f2f2f2;
        }
        h2 {
            color: #333;
        }
    </style>
</head>
<body>

<h2>Relational Database Example</h2>

<div>
    <h3>Customers</h3>
    <table id="customersTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div>
    <h3>Orders</h3>
    <table id="ordersTable">
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Customer ID</th>
                <th>Product</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    // Sample Data
    const customers = [
        { id: 1, name: "Alice Smith", email: "alice@example.com" },
        { id: 2, name: "Bob Johnson", email: "bob@example.com" },
        { id: 3, name: "Charlie Brown", email: "charlie@example.com" }
    ];

    const orders = [
        { orderId: 101, customerId: 1, product: "Laptop", quantity: 1 },
        { orderId: 102, customerId: 1, product: "Mouse", quantity: 2 },
        { orderId: 103, customerId: 2, product: "Keyboard", quantity: 1 },
        { orderId: 104, customerId: 3, product: "Monitor", quantity: 1 },
        { orderId: 105, customerId: 2, product: "USB Cable", quantity: 5 }
    ];

    // Function to populate customers table
    function populateCustomersTable() {
        const customersTableBody = document.getElementById('customersTable').getElementsByTagName('tbody')[0];
        customers.forEach(customer => {
            const row = customersTableBody.insertRow();
            row.insertCell(0).innerText = customer.id;
            row.insertCell(1).innerText = customer.name;
            row.insertCell(2).innerText = customer.email;
        });
    }

    // Function to populate orders table
    function populateOrdersTable() {
        const ordersTableBody = document.getElementById('ordersTable').getElementsByTagName('tbody')[0];
        orders.forEach(order => {
            const row = ordersTableBody.insertRow();
            row.insertCell(0).innerText = order.orderId;
            row.insertCell(1).innerText = order.customerId;
            row.insertCell(2).innerText = order.product;
            row.insertCell(3).innerText = order.quantity;
        });
    }

    // Executing functions to populate tables on page load
    window.onload = () => {
        populateCustomersTable();
        populateOrdersTable();
    };
</script>

</body>
</html>
