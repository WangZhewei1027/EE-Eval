<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prim's Algorithm Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0; padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #f5f8fa;
  }
  h1 {
    margin: 1rem 0 0.5rem;
    color: #333;
  }
  #graph-container {
    margin-top: 10px;
    position: relative;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  canvas {
    background: #ffffff;
    display: block;
  }
  #controls {
    margin: 1rem 0 2rem;
  }
  button {
    font-size: 1rem;
    padding: 0.5em 1.2em;
    margin: 0 0.5em;
    border: none;
    border-radius: 4px;
    background: #3f51b5;
    color: white;
    cursor: pointer;
  }
  button:disabled {
    background: #999;
    cursor: default;
  }
  #info {
    max-width: 600px;
    text-align: center;
    color: #555;
    margin-bottom: 2rem;
  }
  #legend {
    max-width: 600px;
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.9rem;
    color: #444;
  }
  .legend-color {
    width: 20px; height: 20px;
    border-radius: 3px;
    border: 1px solid #aaa;
  }
  .color-edge { background: #bbb; }
  .color-selected { background: #4caf50; }
  .color-considered { background: #ff9800; }
  .color-node { background: #2196f3; }
  .color-mst-node { background: #4caf50; }
</style>
</head>
<body>
<h1>Prim's Algorithm Visualization</h1>
<div id="info">
  This visualization demonstrates Prim's Algorithm to find the Minimum Spanning Tree (MST)
  of a weighted undirected graph. Click <b>Start</b> to begin and watch the MST grow.
</div>
<div id="legend">
  <div class="legend-item"><div class="legend-color color-node"></div> Unvisited Node</div>
  <div class="legend-item"><div class="legend-color color-mst-node"></div> Node in MST</div>
  <div class="legend-item"><div class="legend-color color-edge"></div> Edge not considered</div>
  <div class="legend-item"><div class="legend-color color-considered"></div> Edge considered</div>
  <div class="legend-item"><div class="legend-color color-selected"></div> Edge selected in MST</div>
</div>
<div id="graph-container">
  <canvas id="graph" width="700" height="500"></canvas>
</div>
<div id="controls">
  <button id="startBtn">Start</button>
  <button id="stepBtn" disabled>Step</button>
  <button id="resetBtn" disabled>Reset</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('graph');
  const ctx = canvas.getContext('2d');
  const width = canvas.width;
  const height = canvas.height;

  const startBtn = document.getElementById('startBtn');
  const stepBtn = document.getElementById('stepBtn');
  const resetBtn = document.getElementById('resetBtn');

  // Graph Data - undirected, weighted graph

  /*
  Graph structure: nodes with fixed positions, edges with weights.
  We'll have 8 nodes for a clear medium example.

  Nodes: id and positions
  Edges: node1, node2, weight

  We'll keep adjacency list for Prim's and to draw edges.

  */

  const nodes = [
    {id: 0, x: 100, y: 100},
    {id: 1, x: 250, y: 80},
    {id: 2, x: 400, y: 100},
    {id: 3, x: 100, y: 250},
    {id: 4, x: 300, y: 250},
    {id: 5, x: 450, y: 250},
    {id: 6, x: 200, y: 400},
    {id: 7, x: 400, y: 400}
  ];

  // Edges bi-directional
  const edges = [
    {from: 0, to: 1, weight: 4},
    {from: 0, to: 3, weight: 8},
    {from: 1, to: 2, weight: 8},
    {from: 1, to: 4, weight: 11},
    {from: 2, to: 5, weight: 7},
    {from: 3, to: 4, weight: 2},
    {from: 3, to: 6, weight: 7},
    {from: 4, to: 5, weight: 4},
    {from: 4, to: 6, weight: 1},
    {from: 4, to: 7, weight: 6},
    {from: 5, to: 7, weight: 14},
    {from: 6, to: 7, weight: 9}
  ];

  // We'll create adjacency list: node id -> array of {node, weight, edgeId}
  const adjacency = {};
  nodes.forEach(n => adjacency[n.id] = []);
  edges.forEach((e, i) => {
    adjacency[e.from].push({node: e.to, weight: e.weight, edgeId: i});
    adjacency[e.to].push({node: e.from, weight: e.weight, edgeId: i});
  });

  // Visualization colors
  const colorNode = '#2196f3';         // blue for unvisited node
  const colorMstNode = '#4caf50';      // green for MST nodes
  const colorEdge = '#bbb';             // grey for normal edges
  const colorEdgeConsidered = '#ff9800'; // orange edges being considered
  const colorEdgeSelected = '#4caf50'; // green edge in MST

  // States to maintain
  let mstNodes = new Set();       // nodes included in MST
  let mstEdges = new Set();       // edge indices included in MST
  let consideredEdges = new Set();// edges currently being considered/displayed orange

  // Prim's algorithm state
  let pq = []; // priority queue for edges (min heap by weight)
  /*
    We'll push edges crossing the MST cut to pq:
    store {weight, from, to, edgeId}
  */

  let currentStep = 0;
  // Algorithm steps we'll define as generator
  let primGenerator;

  // Draw all - nodes and edges, colored by current states
  function drawGraph() {
    ctx.clearRect(0, 0, width, height);
    // Draw edges first
    edges.forEach(({from, to, weight}, i) => {
      const n1 = nodes[from];
      const n2 = nodes[to];
      let strokeStyle = colorEdge;
      let lineWidth = 2;
      if (mstEdges.has(i)) {
        strokeStyle = colorEdgeSelected;
        lineWidth = 4;
      } else if (consideredEdges.has(i)) {
        strokeStyle = colorEdgeConsidered;
        lineWidth = 3;
      }
      ctx.beginPath();
      ctx.moveTo(n1.x, n1.y);
      ctx.lineTo(n2.x, n2.y);
      ctx.strokeStyle = strokeStyle;
      ctx.lineWidth = lineWidth;
      ctx.lineCap = "round";
      ctx.stroke();

      // Draw weight text
      const midX = (n1.x + n2.x) / 2;
      const midY = (n1.y + n2.y) / 2;
      ctx.fillStyle = '#222';
      ctx.font = '14px Arial';
      ctx.fillText(weight, midX + 5, midY - 5);
    });

    // Draw nodes
    nodes.forEach(({id, x, y}) => {
      ctx.beginPath();
      ctx.arc(x, y, 16, 0, 2 * Math.PI);
      if (mstNodes.has(id)) {
        ctx.fillStyle = colorMstNode;
        ctx.shadowColor = '#4caf50cc';
        ctx.shadowBlur = 12;
      } else {
        ctx.fillStyle = colorNode;
        ctx.shadowBlur = 0;
      }
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.lineWidth = 3;
      ctx.strokeStyle = '#fff';
      ctx.stroke();

      // Draw node id inside circle
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(id, x, y);
    });
  }

  // Priority queue implementation using min-heap on weight
  // Minimal for this demo, assume small data.
  class MinHeap {
    constructor(){
      this.arr = [];
    }
    swap(i,j) {
      [this.arr[i], this.arr[j]] = [this.arr[j], this.arr[i]];
    }
    push(elem) {
      this.arr.push(elem);
      this.bubbleUp(this.arr.length - 1);
    }
    bubbleUp(idx) {
      if (idx === 0) return;
      let p = Math.floor((idx - 1)/2);
      if (this.arr[p].weight > this.arr[idx].weight) {
        this.swap(p, idx);
        this.bubbleUp(p);
      }
    }
    pop() {
      if (this.arr.length === 0) return null;
      if (this.arr.length === 1) return this.arr.pop();
      const res = this.arr[0];
      this.arr[0] = this.arr.pop();
      this.bubbleDown(0);
      return res;
    }
    bubbleDown(idx) {
      const left = 2*idx + 1;
      const right = 2*idx + 2;
      let smallest = idx;
      if (left < this.arr.length && this.arr[left].weight < this.arr[smallest].weight) smallest = left;
      if (right < this.arr.length && this.arr[right].weight < this.arr[smallest].weight) smallest = right;
      if (smallest !== idx) {
        this.swap(smallest, idx);
        this.bubbleDown(smallest);
      }
    }
    isEmpty() {
      return this.arr.length === 0;
    }
  }

  // Generator function that yields steps of Prim’s algorithm for visualization
  function* primAlgorithm(startNode = 0) {
    mstNodes = new Set();
    mstEdges = new Set();
    consideredEdges = new Set();
    const visited = new Set();
    const minHeap = new MinHeap();

    // Include start node in MST
    mstNodes.add(startNode);
    visited.add(startNode);

    // Add all edges from start node to heap
    adjacency[startNode].forEach(({node, weight, edgeId}) => {
      minHeap.push({weight, from: startNode, to: node, edgeId});
      consideredEdges.add(edgeId);
    });
    yield {mstNodes: new Set(mstNodes), mstEdges: new Set(mstEdges), consideredEdges: new Set(consideredEdges), action:"Add start node and initial edges"};

    while (!minHeap.isEmpty()) {
      let edge = minHeap.pop();
      // Update considered edges to remove all except current candidate
      consideredEdges.clear();
      consideredEdges.add(edge.edgeId);

      yield {mstNodes: new Set(mstNodes), mstEdges: new Set(mstEdges), consideredEdges: new Set(consideredEdges), action: `Consider edge (${edge.from} - ${edge.to}) with weight ${edge.weight}`};

      // If destination node already visited, skip
      if (visited.has(edge.to)) {
        consideredEdges.clear();
        yield {mstNodes: new Set(mstNodes), mstEdges: new Set(mstEdges), consideredEdges: new Set(consideredEdges), action: `Node ${edge.to} already in MST, skip edge`};
        continue;
      }

      // Accept this edge
      mstEdges.add(edge.edgeId);
      mstNodes.add(edge.to);
      visited.add(edge.to);
      consideredEdges.clear();

      yield {mstNodes: new Set(mstNodes), mstEdges: new Set(mstEdges), consideredEdges: new Set(consideredEdges), action: `Select edge (${edge.from} - ${edge.to}) to MST`};

      // Add all edges from newly included node that lead to unvisited nodes
      adjacency[edge.to].forEach(({node, weight, edgeId}) => {
        if (!visited.has(node)) {
          minHeap.push({weight, from: edge.to, to: node, edgeId});
          consideredEdges.add(edgeId);
        }
      });

      if (consideredEdges.size > 0) {
        yield {mstNodes: new Set(mstNodes), mstEdges: new Set(mstEdges), consideredEdges: new Set(consideredEdges), action: `Add edges from node ${edge.to} to consideration`};
      }
    }

    consideredEdges.clear();
    yield {mstNodes: new Set(mstNodes), mstEdges: new Set(mstEdges), consideredEdges: new Set(consideredEdges), action: "MST Complete"};
  }

  // State of visualization
  let currentState = null;

  // Draw according to current state
  function renderState(state) {
    if (!state) return;
    mstNodes = state.mstNodes;
    mstEdges = state.mstEdges;
    consideredEdges = state.consideredEdges;
    drawGraph();
    infoText.textContent = state.action;
  }

  // Info text
  const infoText = document.createElement('div');
  infoText.style.maxWidth = '600px';
  infoText.style.color = '#222';
  infoText.style.fontSize = '1.1rem';
  infoText.style.marginTop = '0';
  infoText.style.marginBottom = '1rem';
  document.body.insertBefore(infoText, document.getElementById('graph-container'));

  // Reset graph and controls
  function reset() {
    mstNodes.clear();
    mstEdges.clear();
    consideredEdges.clear();
    currentStep = 0;
    primGenerator = null;
    startBtn.disabled = false;
    stepBtn.disabled = true;
    resetBtn.disabled = true;
    infoText.textContent = 'Click Start to run Prim\'s Algorithm';
    drawGraph();
  }

  // Step forward one iteration
  function step() {
    if (!primGenerator) return;
    const {value, done} = primGenerator.next();
    if (done) {
      stepBtn.disabled = true;
      startBtn.disabled = true;
      resetBtn.disabled = false;
      infoText.textContent = "Prim's Algorithm completed! Minimum Spanning Tree found.";
      renderState(value);
      return;
    }
    renderState(value);
  }

  // Start running steps
  function start() {
    startBtn.disabled = true;
    stepBtn.disabled = false;
    resetBtn.disabled = false;
    primGenerator = primAlgorithm();
    step();
  }

  // Event listeners
  startBtn.addEventListener('click', () => {
    start();
  });

  stepBtn.addEventListener('click', () => {
    step();
  });

  resetBtn.addEventListener('click', () => {
    reset();
  });

  // Initial draw
  reset();

})();
</script>
</body>
</html>
