<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P vs NP Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f0f0f0;
        }
        h1 {
            text-align: center;
        }
        #container {
            display: flex;
            justify-content: space-between;
        }
        .box {
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 20px;
            width: 45%;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .button {
            margin-top: 10px;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>P vs NP Demonstration</h1>
    <div id="container">
        <div class="box" id="pBox">
            <h2>P Problems</h2>
            <p>Problems that can be solved in polynomial time. Example: Sorting a list.</p>
            <button class="button" onclick="solveP()">Solve a P problem</button>
            <pre id="pResult"></pre>
        </div>
        <div class="box" id="npBox">
            <h2>NP Problems</h2>
            <p>Problems for which a solution can be verified in polynomial time. Example: Sudoku.</p>
            <button class="button" onclick="solveNP()">Solve an NP problem</button>
            <pre id="npResult"></pre>
        </div>
    </div>

    <script>
        function solveP() {
            // Simulate solving a P problem
            const startTime = performance.now();
            const sortedArray = selfSort([5, 3, 8, 1, 2]);
            const endTime = performance.now();
            const timeTaken = (endTime - startTime).toFixed(2);
            document.getElementById('pResult').innerText = `Sorted Array: ${sortedArray}\nTime taken to sort: ${timeTaken} ms`;
        }

        function selfSort(arr) {
            return arr.sort((a, b) => a - b);
        }

        function solveNP() {
            const startTime = performance.now();
            const isSolution = npSampleProblem([3, 5, 7, 25, 1, 2, 8], 10); // Check if any two numbers sum to 10
            const endTime = performance.now();
            const timeTaken = (endTime - startTime).toFixed(2);
            document.getElementById('npResult').innerText = `Solution found: ${isSolution}\nTime taken for verification: ${timeTaken} ms`;
        }

        function npSampleProblem(arr, target) {
            const nums = new Set();
            for (let num of arr) {
                if (nums.has(target - num)) {
                    return true; // A pair was found
                }
                nums.add(num);
            }
            return false; // No such pair found
        }
    </script>
</body>
</html>
