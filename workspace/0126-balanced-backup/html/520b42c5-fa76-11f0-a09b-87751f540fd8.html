<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .type {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .type button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            transition: background-color 0.3s ease;
        }
        .type button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Type System</h2>
        <p>Let's create a type system with JavaScript.</p>
        <button id="type-button">Type A</button>
        <button id="type-button-2">Type B</button>
        <button id="type-button-3">Type C</button>
        <div id="type-output"></div>
    </div>

    <script>
        let typeA = 'Type A';
        let typeB = 'Type B';
        let typeC = 'Type C';

        function getTypeOutput(type) {
            let output = document.getElementById('type-output');
            output.innerHTML = `Type: ${type}`;
        }

        document.getElementById('type-button').addEventListener('click', function() {
            getTypeOutput(typeA);
        });

        document.getElementById('type-button-2').addEventListener('click', function() {
            getTypeOutput(typeB);
        });

        document.getElementById('type-button-3').addEventListener('click', function() {
            getTypeOutput(typeC);
        });
    </script>
</body>
</html>
