<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Networks</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const x = canvas.width / 2;
        const y = canvas.height / 2;
        const radius = Math.min(canvas.width, canvas.height) / 2;
        const learningRate = 0.1;
        const numInputs = 2;
        const numHidden = 2;
        const numOutputs = 1;
        const weightsHiddenToInput = Array(numHidden).fill(0).map(() => Array(numInputs).fill(0));
        const weightsInputToHidden = Array(numOutputs).fill(0).map(() => Array(numHidden).fill(0));
        const biasHidden = Array(numHidden).fill(0);
        const biasOutput = Array(numOutputs).fill(0);
        let input = [0, 0];
        let output = 0;
        let error = 0;

        function drawLine(x1, y1, x2, y2) {
            ctx.beginPath();
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }

        function drawCircle(x, y, radius) {
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, 2 * Math.PI);
            ctx.fillStyle = 'blue';
            ctx.fill();
        }

        function trainNetwork() {
            for (let i = 0; i < 10000; i++) {
                input[0] = x;
                input[1] = y;
                drawLine(x, y, x + 50, y + 50);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'black';
                drawCircle(x, y, 50);
                ctx.strokeStyle = 'black';
                for (let j = 0; j < 2; j++) {
                    for (let k = 0; k < 2; k++) {
                        ctx.beginPath();
                        ctx.arc(x + 25, y + 25, 10, 0, 2 * Math.PI);
                        ctx.fillStyle = 'blue';
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + 25, y + 25, 10, 0, 2 * Math.PI);
                        ctx.strokeStyle = 'blue';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
                ctx.fillStyle = 'black';
                drawCircle(x, y, 50);
                ctx.font = '24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = 'black';
                ctx.fillText(`Error: ${error}`, x + 25, y + 25);
                error = 0;
                for (let j = 0; j < 2; j++) {
                    for (let k = 0; k < 2; k++) {
                        weightsHiddenToInput[j][k] += learningRate * (input[j] * output[k] - biasHidden[k] - biasOutput[k]) * 10;
                    }
                }
                for (let j = 0; j < 2; j++) {
                    for (let k = 0; k < 2; k++) {
                        weightsInputToHidden[k][j] += learningRate * (input[k] * output[j] - biasInput[k] - biasOutput[k]) * 10;
                    }
                }
                biasHidden[0] += learningRate * (input[0] * output[0] - biasInput[0] - biasOutput[0]) * 10;
                biasOutput[0] += learningRate * (input[1] * output[0] - biasInput[1] - biasOutput[1]) * 10;
            }
        }

        function predict() {
            input[0] = x;
            input[1] = y;
            drawLine(x, y, x + 50, y + 50);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'black';
            drawCircle(x, y, 50);
            ctx.strokeStyle = 'black';
            for (let j = 0; j < 2; j++) {
                for (let k = 0; k < 2; k++) {
                    ctx.beginPath();
                    ctx.arc(x + 25, y + 25, 10, 0, 2 * Math.PI);
                    ctx.fillStyle = 'blue';
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + 25, y + 25, 10, 0, 2 * Math.PI);
                    ctx.strokeStyle = 'blue';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
            ctx.fillStyle = 'black';
            drawCircle(x, y, 50);
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'black';
            ctx.fillText(`Output: ${output}`, x + 25, y + 25);
            return output;
        }

        function handleMouseClick(x, y) {
            input[0] = x;
            input[1] = y;
            drawLine(x, y, x + 50, y + 50);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'black';
            drawCircle(x, y, 50);
            ctx.strokeStyle = 'black';
            for (let j = 0; j < 2; j++) {
                for (let k = 0; k < 2; k++) {
                    ctx.beginPath();
                    ctx.arc(x + 25, y + 25, 10, 0, 2 * Math.PI);
                    ctx.fillStyle = 'blue';
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + 25, y + 25, 10, 0, 2 * Math.PI);
                    ctx.strokeStyle = 'blue';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
            ctx.fillStyle = 'black';
            drawCircle(x, y, 50);
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'black';
            ctx.fillText(`Output: ${output}`, x + 25, y + 25);
            return output;
        }

        canvas.addEventListener('click', handleMouseClick);

        trainNetwork();

        while (true) {
            const event = window.event;
            if (event.type === 'click') {
                const x = event.clientX - canvas.offsetLeft;
                const y = event.clientY - canvas.offsetTop;
                output = predict();
                console.log(output);
            }
        }
    </script>
</body>
</html>
