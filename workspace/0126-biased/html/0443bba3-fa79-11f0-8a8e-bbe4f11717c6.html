<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relational Database</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 80%;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #666;
        }

        .header h1 {
            margin: 0;
        }

        .content {
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .button {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .button:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Relational Database</h1>
        </div>
        <div class="content">
            <p>Welcome to the relational database! This is a simple example of how to create a relational database using HTML, CSS, and JavaScript.</p>
            <button class="button" onclick="displayData()">View Data</button>
        </div>
    </div>

    <script>
        function displayData() {
            // Simulate data retrieval from a database
            const data = {
                "John": 25,
                "Alice": 30
            };

            // Display the data
            console.log("Displaying data:");
            for (const name in data) {
                console.log(`${name}: ${data[name]}`);
            }
        }
    </script>
</body>
</html>
