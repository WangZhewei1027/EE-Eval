<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVL Tree Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(160deg, #1f3c88, #2c9ed0);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        .tree {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .node {
            background: #4f83cc;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
            position: relative;
            transition: background 0.3s ease;
        }

        .node:hover {
            background: #3b5a8c;
        }

        .line {
            width: 2px;
            background-color: #fff;
            position: absolute;
            top: -50px;
            z-index: -1;
            transition: height 0.3s ease;
        }

        .line-parents {
            height: 50px;
        }

        .btn {
            padding: 10px 20px;
            background: #4f83cc;
            border: none;
            border-radius: 5px;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #3b5a8c;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animated {
            animation: fadeIn 1s ease-in-out forwards;
        }
    </style>
</head>
<body>
    <h1>AVL Tree Visualization</h1>

    <div class="tree animated">
        <div class="node">30<div class="line line-parents" style="left: 30px;"></div></div>
        <div class="node">20<div class="line line-parents" style="left: 30px;"></div></div>
        <div class="node">40<div class="line line-parents" style="left: 30px;"></div></div>
        <div class="node">10</div>
        <div class="node">25</div>
        <div class="node">35</div>
        <div class="node">50</div>
    </div>

    <button class="btn" onclick="alert('This is an AVL Tree!')">Learn More</button>

    <script>
        // JavaScript code for future expansion can go here, if needed.
    </script>
</body>
</html>
