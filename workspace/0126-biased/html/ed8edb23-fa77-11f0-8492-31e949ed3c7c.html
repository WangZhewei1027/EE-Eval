<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relational Database Concept</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            color: #333;
            background: linear-gradient(to right, #8e44ad, #3498db);
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            animation: fadeIn 1s;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            margin: auto;
            padding: 20px 40px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
        }

        .description {
            font-size: 1.2em;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 30px;
            color: #34495e;
        }

        .button {
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 15px 30px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s ease;
            display: block;
            margin: 0 auto;
        }

        .button:hover {
            background-color: #219150;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .graphics {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            animation: slideIn 1s ease forwards;
            opacity: 0.8;
        }

        @keyframes slideIn {
            from {
                transform: translate(-50%, -20%);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Understanding Relational Databases</h1>
        <div class="description">
            A relational database organizes data into tables which can relate to one another through shared keys. 
            This infrastructure enables efficient data management and complex queries for dynamic applications.
        </div>
        <button class="button" onclick="showAlert()">Learn More</button>
        <img class="graphics" src="https://via.placeholder.com/200x100.png?text=Database+Concept" alt="Database Illustration">
    </div>

    <script>
        function showAlert() {
            alert("This is a simplified overview of relational databases. Observe the structure and flow!");
        }
    </script>
</body>

</html>
