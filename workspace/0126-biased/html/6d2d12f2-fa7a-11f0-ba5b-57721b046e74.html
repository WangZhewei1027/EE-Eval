<!DOCTYPE html>
<html>
<head>
    <title>AVL Tree Interactive Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .control-group {
            border: 1px solid #ccc;
            padding: 10px;
            margin-right: 10px;
        }
        canvas {
            border: 1px solid #000;
            margin-top: 20px;
        }
        input, button, select {
            margin: 5px;
        }
        .tree-info {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>AVL Tree Interactive Visualization</h1>
    <div class="container">
        <div class="controls">
            <div class="control-group">
                <h3>Node Operations</h3>
                <input type="number" id="nodeValue" placeholder="Enter value">
                <button onclick="insertNode()">Insert</button>
                <button onclick="deleteNode()">Delete</button>
                <button onclick="findNode()">Find</button>
                <button onclick="clearTree()">Clear Tree</button>
            </div>
            
            <div class="control-group">
                <h3>Tree Generation</h3>
                <input type="number" id="randomCount" placeholder="Node count" min="1" max="50" value="10">
                <button onclick="generateRandomTree()">Generate Random Tree</button>
                <button onclick="generateBalancedTree()">Generate Balanced Tree</button>
            </div>
            
            <div class="control-group">
                <h3>Traversal</h3>
                <button onclick="traverse('inorder')">Inorder</button>
                <button onclick="traverse('preorder')">Preorder</button>
                <button onclick="traverse('postorder')">Postorder</button>
                <button onclick="traverse('levelorder')">Level Order</button>
            </div>
            
            <div class="control-group">
                <h3>Visualization</h3>
                <label>Node Size: <input type="range" id="nodeSize" min="20" max="100" value="40" onchange="updateVisualization()"></label>
                <label>Spacing: <input type="range" id="treeSpacing" min="50" max="300" value="150" onchange="updateVisualization()"></label>
                <label>Speed: <input type="range" id="animationSpeed" min="100" max="2000" value="500"></label>
                <button onclick="toggleDetails()">Toggle Details</button>
            </div>
        </div>
        
        <canvas id="treeCanvas" width="1200" height="600"></canvas>
        
        <div class="tree-info">
            <h3>Tree Information</h3>
            <div id="treeStats">Nodes: 0 | Height: 0 | Balanced: Yes</div>
            <div id="operationLog">No operations yet</div>
            <div id="traversalResult"></div>
        </div>
    </div>

    <script>
        // AVL Tree implementation
        class AVLNode {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
                this.height = 1;
                this.balanceFactor = 0;
            }
        }

        class AVLTree {
            constructor() {
                this.root = null;
                this.operations = [];
                this.highlightedNode = null;
            }

            getHeight(node) {
                return node ? node.height : 0;
            }

            updateHeight(node) {
                node.height = Math.max(this.getHeight(node.left), this.getHeight(node.right)) + 1;
                node.balanceFactor = this.getHeight(node.left) - this.getHeight(node.right);
            }

            rotateRight(y) {
                const x = y.left;
                const T2 = x.right;

                x.right = y;
                y.left = T2;

                this.updateHeight(y);
                this.updateHeight(x);

                this.operations(`Rotate right at ${y.value}`);
                return x;
            }

            rotateLeft(x) {
                const y = x.right;
                const T2 = y.left;

                y.left = x;
                x.right = T2;

                this.updateHeight(x);
                this.updateHeight(y);

                this.operations(`Rotate left at ${x.value}`);
                return y;
            }

            balance(node) {
                if (!node) return node;

                this.updateHeight(node);

                // Left heavy
                if (node.balanceFactor > 1) {
                    if (node.left.balanceFactor < 0) {
                        node.left = this.rotateLeft(node.left);
                    }
                    return this.rotateRight(node);
                }

                // Right heavy
                if (node.balanceFactor < -1) {
                    if (node.right.balanceFactor > 0) {
                        node.right = this.rotateRight(node.right);
                    }
                    return this.rotateLeft(node);
                }

                return node;
            }

            insert(value) {
                this.root = this._insert(this.root, value);
                this.operations(`Inserted ${value}`);
            }

            _insert(node, value) {
                if (!node) return new AVLNode(value);

                if (value < node.value) {
                    node.left = this._insert(node.left, value);
                } else if (value > node.value) {
                    node.right = this._insert(node.right, value);
                } else {
                    return node; // No duplicates
                }

                return this.balance(node);
            }

            delete(value) {
                this.root = this._delete(this.root, value);
                this.operations(`Deleted ${value}`);
            }

            _delete(node, value) {
                if (!node) return null;

                if (value < node.value) {
                    node.left = this._delete(node.left, value);
                } else if (value > node.value) {
                    node.right = this._delete(node.right, value);
                } else {
                    if (!node.left || !node.right) {
                        node = node.left || node.right;
                    } else {
                        const minRight = this.findMin(node.right);
                        node.value = minRight.value;
                        node.right = this._delete(node.right, minRight.value);
                    }
                }

                if (!node) return null;
                return this.balance(node);
            }

            findMin(node) {
                while (node && node.left) {
                    node = node.left;
                }
                return node;
            }

            find(value) {
                return this._find(this.root, value);
            }

            _find(node, value) {
                if (!node) return null;
                if (value === node.value) return node;
                if (value < node.value) return this._find(node.left, value);
                return this._find(node.right, value);
            }

            isBalanced() {
                return this._isBalanced(this.root);
            }

            _isBalanced(node) {
                if (!node) return true;
                const balance = Math.abs(this.getHeight(node.left) - this.getHeight(node.right)) <= 1;
                return balance && this._isBalanced(node.left) && this._isBalanced(node.right);
            }

            getNodeCount() {
                return this._getNodeCount(this.root);
            }

            _getNodeCount(node) {
                if (!node) return 0;
                return 1 + this._getNodeCount(node.left) + this._getNodeCount(node.right);
            }

            operations(message) {
                this.operations.push(message);
                updateOperationLog();
            }

            clear() {
                this.root = null;
                this.operations = [];
                this.highlightedNode = null;
                this.operations("Tree cleared");
            }
        }

        // Visualization
        const tree = new AVLTree();
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        let showDetails = true;
        let animationQueue = [];
        let isAnimating = false;

        function drawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (tree.root) {
                const nodeSize = parseInt(document.getElementById('nodeSize').value);
                const spacing = parseInt(document.getElementById('treeSpacing').value);
                drawNode(tree.root, canvas.width / 2, 50, spacing, nodeSize);
            }
        }

        function drawNode(node, x, y, spacing, nodeSize) {
            if (!node) return;

            // Draw left child
            if (node.left) {
                const leftX = x - spacing;
                const leftY = y + 80;
                ctx.beginPath();
                ctx.moveTo(x, y + nodeSize / 2);
                ctx.lineTo(leftX, leftY - nodeSize / 2);
                ctx.stroke();
                drawNode(node.left, leftX, leftY, spacing / 1.8, nodeSize);
            }

            // Draw right child
            if (node.right) {
                const rightX = x + spacing;
                const rightY = y + 80;
                ctx.beginPath();
                ctx.moveTo(x, y + nodeSize / 2);
                ctx.lineTo(rightX, rightY - nodeSize / 2);
                ctx.stroke();
                drawNode(node.right, rightX, rightY, spacing / 1.8, nodeSize);
            }

            // Draw node
            ctx.beginPath();
            ctx.arc(x, y, nodeSize / 2, 0, Math.PI * 2);
            // Highlight if this is the current node
            if (tree.highlightedNode === node) {
                ctx.fillStyle = 'rgba(200, 200, 0, 0.3)';
                ctx.fill();
            }
            ctx.stroke();

            // Draw value
            ctx.fillStyle = '#000';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `${Math.max(12, nodeSize / 3)}px Arial`;
            ctx.fillText(node.value, x, y);

            // Draw details if enabled
            if (showDetails) {
                ctx.font = `${Math.max(10, nodeSize / 4)}px Arial`;
                ctx.fillText(`h:${node.height}`, x, y + nodeSize / 2 + 15);
                ctx.fillText(`b:${node.balanceFactor}`, x, y + nodeSize / 2 + 30);
            }
        }

        function updateTreeStats() {
            const stats = document.getElementById('treeStats');
            const nodeCount = tree.getNodeCount();
            const height = tree.root ? tree.root.height : 0;
            const balanced = tree.isBalanced() ? "Yes" : "No";
            stats.textContent = `Nodes: ${nodeCount} | Height: ${height} | Balanced: ${balanced}`;
        }

        function updateOperationLog() {
            const log = document.getElementById('operationLog');
            log.textContent = tree.operations.slice(-5).join(" | ");
        }

        function updateVisualization() {
            drawTree();
        }

        function toggleDetails() {
            showDetails = !showDetails;
            drawTree();
        }

        // Tree operations
        function insertNode() {
            const value = parseInt(document.getElementById('nodeValue').value);
            if (isNaN(value)) return;
            
            tree.insert(value);
            updateTreeOperation(() => {
                updateTreeStats();
                drawTree();
            });
        }

        function deleteNode() {
            const value = parseInt(document.getElementById('nodeValue').value);
            if (isNaN(value)) return;
            
            tree.delete(value);
            updateTreeOperation(() => {
                updateTreeStats();
                drawTree();
            });
        }

        function findNode() {
            const value = parseInt(document.getElementById('nodeValue').value);
            if (isNaN(value)) return;
            
            const node = tree.find(value);
            if (node) {
                tree.highlightedNode = node;
                drawTree();
                setTimeout(() => {
                    tree.highlightedNode = null;
                    drawTree();
                }, 1000);
            }
        }

        function clearTree() {
            tree.clear();
            updateTreeStats();
            drawTree();
        }

        function generateRandomTree() {
            const count = parseInt(document.getElementById('randomCount').value);
            if (isNaN(count) || count < 1 || count > 50) return;
            
            tree.clear();
            const values = new Set();
            while (values.size < count) {
                values.add(Math.floor(Math.random() * 100) + 1);
            }
            
            Array.from(values).forEach(value => tree.insert(value));
            
            updateTreeOperation(() => {
                updateTreeStats();
                drawTree();
            });
        }

        function generateBalancedTree() {
            const count = parseInt(document.getElementById('randomCount').value);
            if (isNaN(count) || count < 1 || count > 50) return;
            
            tree.clear();
            const sortedValues = Array.from({length: count}, (_, i) => i + 1);
            buildBalancedTree(sortedValues, 0, sortedValues.length - 1);
            
            updateTreeOperation(() => {
                updateTreeStats();
                drawTree();
            });
        }

        function buildBalancedTree(sortedValues, start, end) {
            if (start > end) return;
            
            const mid = Math.floor((start + end) / 2);
            tree.insert(sortedValues[mid]);
            
            buildBalancedTree(sortedValues, start, mid - 1);
            buildBalancedTree(sortedValues, mid + 1, end);
        }

        // Traversal functions
        function traverse(type) {
            const resultDiv = document.getElementById('traversalResult');
            resultDiv.textContent = `${type.toUpperCase()} Traversal: `;
            
            const values = [];
            const speed = parseInt(document.getElementById('animationSpeed').value);
            
            switch (type) {
                case 'inorder':
                    inorderTraversal(tree.root, values);
                    break;
                case 'preorder':
                    preorderTraversal(tree.root, values);
                    break;
                case 'postorder':
                    postorderTraversal(tree.root, values);
                    break;
                case 'levelorder':
                    levelOrderTraversal(tree.root, values);
                    break;
            }
            
            // Clear previous highlights
            tree.highlightedNode = null;
            drawTree();
            
            // Animate traversal
            animateTraversal(values, speed, resultDiv);
        }

        function inorderTraversal(node, values) {
            if (!node) return;
            inorderTraversal(node.left, values);
            values.push(node);
            inorderTraversal(node.right, values);
        }

        function preorderTraversal(node, values) {
            if (!node) return;
            values.push(node);
            preorderTraversal(node.left, values);
            preorderTraversal(node.right, values);
        }

        function postorderTraversal(node, values) {
            if (!node) return;
            postorderTraversal(node.left, values);
            postorderTraversal(node.right, values);
            values.push(node);
        }

        function levelOrderTraversal(node, values) {
            if (!node) return;
            const queue = [node];
            while (queue.length > 0) {
                const current = queue.shift();
                values.push(current);
                if (current.left) queue.push(current.left);
                if (current.right) queue.push(current.right);
            }
        }

        function animateTraversal(nodes, speed, resultDiv) {
            let i = 0;
            const interval = setInterval(() => {
                if (i >= nodes.length) {
                    clearInterval(interval);
                    tree.highlightedNode = null;
                    drawTree();
                    return;
                }
                
                tree.highlightedNode = nodes[i];
                drawTree();
                resultDiv.textContent += nodes[i].value + (i < nodes.length - 1 ? ", " : "");
                i++;
            }, speed);
        }

        function updateTreeOperation(callback) {
            if (isAnimating) {
                animationQueue.push(callback);
                return;
            }
            
            isAnimating = true;
            const speed = parseInt(document.getElementById('animationSpeed').value);
            
            setTimeout(() => {
                callback();
                isAnimating = false;
                
                if (animationQueue.length > 0) {
                    const nextCallback = animationQueue.shift();
                    updateTreeOperation(nextCallback);
                }
            }, speed);
        }

        // Initialize
        drawTree();
        updateTreeStats();
    </script>
</body>
</html>
