<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>B-Tree Visualization — Exceptional Design</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@600&family=Quicksand:wght@400;700&display=swap');

  /* Reset */
  * {
    box-sizing: border-box;
  }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
    color: #e0e6f1;
    font-family: 'Quicksand', sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4rem 2rem 6rem;
    user-select: none;
  }

  /* Title */
  h1 {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 600;
    font-size: 3.5rem;
    margin-bottom: 0.25em;
    letter-spacing: 0.1em;
    color: #f0f4ff;
    text-shadow:
      0 0 8px #64ffda94,
      0 0 20px #64ffda94,
      0 0 30px #12fff7bb;
  }

  h2 {
    font-weight: 400;
    font-size: 1.25rem;
    color: #a3b1c6cc;
    margin-bottom: 3.5rem;
    letter-spacing: 0.06em;
  }

  /* Main container */
  #tree-container {
    position: relative;
    width: 100%;
    max-width: 900px;
    min-height: 420px;
    background: radial-gradient(circle at center, #1b2a47 80%, #152036ff 100%);
    border-radius: 24px;
    box-shadow:
      inset 0 0 40px #0ff6cc33,
      0 8px 32px -4px #00ffdacc;
    padding: 3rem 2rem 5rem;
    overflow: visible;
    display: flex;
    justify-content: center;
  }

  /* SVG styling */
  svg {
    overflow: visible;
    user-select: none;
  }

  /* Node styling */
  .bnode {
    transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    cursor: default;
    filter: drop-shadow(0 0 3px #1affd8cc);
  }

  .bnode rect {
    fill: linear-gradient(135deg, #004d40, #00796b);
    stroke: #12fff7;
    stroke-width: 2px;
    filter:
      drop-shadow(0 2px 4px rgba(0,255,222,0.45));
    rx: 12;
    ry: 12;
    transition: fill 0.4s ease, filter 0.4s ease;
  }

  .bnode:hover rect {
    fill: #00ffe6;
    filter: drop-shadow(0 0 12px #00ffe6cc);
  }

  text.bkey {
    fill: #e0f7fa;
    font-weight: 700;
    font-family: 'Josefin Sans', sans-serif;
    font-size: 1.15rem;
    user-select: none;
    pointer-events: none;
    text-shadow:
      0 0 2px #00fce344,
      0 0 4px #00ffe6aa;
    transition: fill 0.3s ease;
  }

  /* Edges styling */
  .edge {
    stroke: #00ffc4cc;
    stroke-width: 4;
    stroke-linejoin: round;
    fill: none;
    filter:
      drop-shadow(0 0 8px #00ffc477);
    opacity: 0.8;
    transition: stroke-width 0.3s ease;
  }

  /* Button styling */
  #controls {
    margin-top: 3rem;
    display: flex;
    gap: 1.25rem;
  }

  button {
    background: #00ffe6;
    border: none;
    color: #042a2b;
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    padding: 0.75rem 2rem;
    border-radius: 30px;
    box-shadow:
      0 0 10px #00ffe6cc,
      inset 0 -3px 10px #00a38866;
    cursor: pointer;
    transition:
      background-color 0.35s ease,
      box-shadow 0.35s ease,
      transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    user-select: none;
  }
  button:hover {
    background: #00c6b0;
    box-shadow:
      0 0 20px #00ffe6dd,
      inset 0 -5px 15px #00a388cc;
    transform: scale(1.05);
  }
  button:focus {
    outline: none;
    box-shadow:
      0 0 28px #00ffe6ff,
      0 0 40px #00ffe6ff inset;
  }

  /* Tooltip */
  #description {
    max-width: 900px;
    font-family: 'Quicksand', sans-serif;
    color: #9cd3e8cc;
    font-weight: 400;
    font-size: 1.1rem;
    line-height: 1.55;
    margin: 0 0 2rem 0;
    text-align: center;
    user-select: none;
    mix-blend-mode: screen;
  }

  /* Node group container to separate keys horizontally */
  .node-group {
    display: flex;
    gap: 0.7rem;
  }

  /* Bounce ease */
  @keyframes bounceIn {
    0% {
      transform: translateY(30px) scale(0.7);
      opacity: 0;
    }
    80% {
      transform: translateY(-6px) scale(1.05);
      opacity: 1;
    }
    100% {
      transform: translateY(0) scale(1);
      opacity: 1;
    }
  }

</style>
</head>
<body>
<h1>B-TREE</h1>
<h2>Balanced Multiway Search Tree Visualization</h2>

<div id="tree-container" aria-label="B-Tree Visualization">
  <svg id="btree-svg" width="860" height="400" viewBox="0 0 860 400" role="img" aria-labelledby="treeTitle" >
    <title id="treeTitle">B-Tree Structure</title>

    <!-- Edges -->
    <path class="edge" d="" id="edge-0-1" />
    <path class="edge" d="" id="edge-0-2" />
    <path class="edge" d="" id="edge-0-3" />

    <path class="edge" d="" id="edge-1-4" />
    <path class="edge" d="" id="edge-1-5" />
    <path class="edge" d="" id="edge-1-6" />

    <path class="edge" d="" id="edge-2-7" />
    <path class="edge" d="" id="edge-2-8" />
    <path class="edge" d="" id="edge-2-9" />

    <path class="edge" d="" id="edge-3-10" />
    <path class="edge" d="" id="edge-3-11" />
    <path class="edge" d="" id="edge-3-12" />


    <!-- Nodes -->

    <!-- Root -->
    <g class="bnode" id="node0" transform="translate(430 50)" aria-label="Node with keys 17, 35, 53" role="group" tabindex="0">
      <rect width="204" height="56" x="-102" y="-28" rx="14" ry="14" />
      <text class="bkey" x="-62" y="12">17</text>
      <text class="bkey" x="-2" y="12">35</text>
      <text class="bkey" x="58" y="12">53</text>
    </g>

    <!-- Level 1 -->
    <g class="bnode" id="node1" transform="translate(140 140)" aria-label="Node with keys 5, 11" role="group" tabindex="0">
      <rect width="132" height="48" x="-66" y="-24" rx="14" ry="14" />
      <text class="bkey" x="-42" y="10">5</text>
      <text class="bkey" x="18" y="10">11</text>
    </g>
    <g class="bnode" id="node2" transform="translate(410 140)" aria-label="Node with keys 23, 29, 31" role="group" tabindex="0">
      <rect width="180" height="48" x="-90" y="-24" rx="14" ry="14" />
      <text class="bkey" x="-66" y="10">23</text>
      <text class="bkey" x="-6" y="10">29</text>
      <text class="bkey" x="54" y="10">31</text>
    </g>
    <g class="bnode" id="node3" transform="translate(670 140)" aria-label="Node with keys 41, 47" role="group" tabindex="0">
      <rect width="132" height="48" x="-66" y="-24" rx="14" ry="14" />
      <text class="bkey" x="-42" y="10">41</text>
      <text class="bkey" x="18" y="10">47</text>
    </g>

    <!-- Level 2 -->
    <!-- children of node1 -->
    <g class="bnode" id="node4" transform="translate(40 230)" aria-label="Leaf node with key 1" role="group" tabindex="0">
      <rect width="72" height="40" x="-36" y="-20" rx="14" ry="14" />
      <text class="bkey" x="-10" y="8">1</text>
    </g>
    <g class="bnode" id="node5" transform="translate(110 230)" aria-label="Leaf node with key 7" role="group" tabindex="0">
      <rect width="72" height="40" x="-36" y="-20" rx="14" ry="14" />
      <text class="bkey" x="-10" y="8">7</text>
    </g>
    <g class="bnode" id="node6" transform="translate(195 230)" aria-label="Leaf node with key 15" role="group" tabindex="0">
      <rect width="72" height="40" x="-36" y="-20" rx="14" ry="14" />
      <text class="bkey" x="-12" y="8">15</text>
    </g>
    <!-- children of node2 -->
    <g class="bnode" id="node7" transform="translate(340 230)" aria-label="Leaf node with key 19" role="group" tabindex="0">
      <rect width="72" height="40" x="-36" y="-20" rx="14" ry="14" />
      <text class="bkey" x="-12" y="8">19</text>
    </g>
    <g class="bnode" id="node8" transform="translate(410 230)" aria-label="Leaf node with key 25" role="group" tabindex="0">
      <rect width="72" height="40" x="-36" y="-20" rx="14" ry="14" />
      <text class="bkey" x="-12" y="8">25</text>
    </g>
    <g class="bnode" id="node9" transform="translate(480 230)" aria-label="Leaf node with keys 27, 30" role="group" tabindex="0">
      <rect width="108" height="40" x="-54" y="-20" rx="14" ry="14" />
      <text class="bkey" x="-32" y="8">27</text>
      <text class="bkey" x="18" y="8">30</text>
    </g>
    <!-- children of node3 -->
    <g class="bnode" id="node10" transform="translate(595 230)" aria-label="Leaf node with key 37" role="group" tabindex="0">
      <rect width="72" height="40" x="-36" y="-20" rx="14" ry="14" />
      <text class="bkey" x="-12" y="8">37</text>
    </g>
    <g class="bnode" id="node11" transform="translate(670 230)" aria-label="Leaf node with key 43" role="group" tabindex="0">
      <rect width="72" height="40" x="-36" y="-20" rx="14" ry="14" />
      <text class="bkey" x="-12" y="8">43</text>
    </g>
    <g class="bnode" id="node12" transform="translate(740 230)" aria-label="Leaf node with key 49" role="group" tabindex="0">
      <rect width="72" height="40" x="-36" y="-20" rx="14" ry="14" />
      <text class="bkey" x="-12" y="8">49</text>
    </g>

  </svg>
</div>

<div id="description" aria-live="polite">
  A <strong>B-Tree</strong> is a self-balancing multiway search tree allowing efficient insertion, deletion, and search operations. Nodes store multiple keys, keeping the tree balanced by redistributing keys and children during updates.
</div>

<div id="controls" role="region" aria-label="B-Tree Controls">
  <button id="btnHighlightLeaves" aria-pressed="false" aria-label="Highlight leaf nodes">Highlight Leaves</button>
  <button id="btnReset" aria-label="Reset highlight">Reset</button>
</div>

<script>
  (() => {
    const svg = document.getElementById('btree-svg');
    const nodes = Array.from(svg.querySelectorAll('.bnode'));
    const edges = Array.from(svg.querySelectorAll('.edge'));
    const btnHighlight = document.getElementById('btnHighlightLeaves');
    const btnReset = document.getElementById('btnReset');

    // Node positions stored for edges drawing
    const nodeCenters = {};

    function getNodeCenter(node) {
      // <g> transform translate(x y)
      const tr = node.getAttribute('transform');
      if (!tr) return {x: 0, y: 0};
      const match = tr.match(/translate\(([-\d.]+)[ ,]+([-\d.]+)\)/);
      if (!match) return {x: 0, y: 0};
      return {x: +match[1], y: +match[2]};
    }

    function setupCenters() {
      nodes.forEach(node => {
        const center = getNodeCenter(node);
        nodeCenters[node.id] = center;
      });
    }

    function drawEdge(id, fromId, toId) {
      const edge = document.getElementById(id);
      if (!edge) return;
      const from = nodeCenters[fromId];
      const to = nodeCenters[toId];
      if (!from || !to) {
        edge.setAttribute('d', '');
        return;
      }
      const offsetYParent = 28; // half rect height approx
      const offsetYChild = 20;  // half leaf height approx

      // Start point bottom center of from node
      const startX = from.x;
      const startY = from.y + offsetYParent;
      // End point top center of to node
      const endX = to.x;
      const endY = to.y - offsetYChild;

      // Create a smooth Bezier curve path
      const ctrlY = (startY + endY)/2;
      const d = `M${startX},${startY} C${startX},${ctrlY} ${endX},${ctrlY} ${endX},${endY}`;
      edge.setAttribute('d', d);
    }

    // Draw all edges according to known structure:
    // Format: edge id, from node id, to node id
    const edgesMap = [
      ['edge-0-1','node0','node1'],
      ['edge-0-2','node0','node2'],
      ['edge-0-3','node0','node3'],

      ['edge-1-4','node1','node4'],
      ['edge-1-5','node1','node5'],
      ['edge-1-6','node1','node6'],

      ['edge-2-7','node2','node7'],
      ['edge-2-8','node2','node8'],
      ['edge-2-9','node2','node9'],

      ['edge-3-10','node3','node10'],
      ['edge-3-11','node3','node11'],
      ['edge-3-12','node3','node12'],
    ];

    function drawAllEdges() {
      edgesMap.forEach(([eid,fid,tid]) => {
        drawEdge(eid,fid,tid);
      });
    }

    // On load:
    setupCenters();
    drawAllEdges();

    // Highlight leaves handler - leaves are nodes 4 to 12 inclusive
    const leafNodes = [];
    for (let i=4; i<=12; i++) leafNodes.push(document.getElementById(`node${i}`));

    function highlightLeaves() {
      leafNodes.forEach(node => {
        const rect = node.querySelector('rect');
        rect.style.transition = 'fill 0.6s ease';
        rect.style.fill = '#00ffdbbb';
        rect.style.filter = 'drop-shadow(0 0 16px #00ffdacc)';
      });
      // Also dim internal nodes and edges gracefully
      nodes.filter(n => !leafNodes.includes(n)).forEach(n => {
        n.style.opacity = '0.5';
      });
      edges.forEach(e => e.style.opacity = '0.3');
      btnHighlight.setAttribute('aria-pressed', 'true');
      btnHighlight.disabled = true;
      btnReset.disabled = false;
    }
    function resetHighlight() {
      leafNodes.forEach(node => {
        const rect = node.querySelector('rect');
        rect.style.transition = 'fill 0.8s ease';
        rect.style.fill = '';
        rect.style.filter = '';
      });
      nodes.forEach(n => (n.style.opacity = '1'));
      edges.forEach(e => (e.style.opacity = '0.8'));
      btnHighlight.setAttribute('aria-pressed', 'false');
      btnHighlight.disabled = false;
      btnReset.disabled = true;
    }

    btnHighlight.addEventListener('click', highlightLeaves);
    btnReset.addEventListener('click', resetHighlight);
    btnReset.disabled = true;

    // Animate nodes on page load with subtle bounce
    nodes.forEach((node, i) => {
      node.style.opacity = '0';
      node.style.transformOrigin = 'center center';
      node.style.animation = `bounceIn 0.75s cubic-bezier(0.22, 1, 0.36, 1) forwards`;
      node.style.animationDelay = (i * 0.08) + 's';
    });
  })();
</script>
</body>
</html>
