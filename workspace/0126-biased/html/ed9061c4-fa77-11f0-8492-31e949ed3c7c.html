<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Encryption Visuals</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background: #0d0d0d;
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 50px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            transition: transform 0.5s;
        }

        .container:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            letter-spacing: 2px;
            color: #0ff;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
        }

        p {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
            max-width: 600px;
            margin: auto;
        }

        .button {
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.7), rgba(0, 170, 255, 0.7));
            color: #fff;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .button:hover {
            background: linear-gradient(90deg, rgba(0, 200, 200, 0.7), rgba(0, 120, 200, 0.7));
            transform: translateY(-5px);
        }

        .graphic {
            margin-top: 30px;
            max-width: 300px;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translatey(0px);
            }
            50% {
                transform: translatey(-10px);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Encryption Visualized</h1>
        <p>
            Discover the beauty behind encryption concepts as they intertwine with art and technology. Just as data is secured, so too can elegance and aesthetics carry a remarkable weight in communication.
        </p>
        <img src="https://via.placeholder.com/300/00ffff/ffffff?text=Encrypted" class="graphic" alt="Encryption Graphic">
        <br>
        <button class="button" onclick="showAlert()">Learn More</button>
    </div>

    <script>
        function showAlert() {
            alert("Embracing the art of encryption!");
        }
    </script>
</body>

</html>
