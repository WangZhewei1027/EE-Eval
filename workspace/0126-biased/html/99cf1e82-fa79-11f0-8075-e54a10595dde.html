<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Bellman-Ford Algorithm</title>
    <script>
        function runBellmanFord() {
            const vertices = parseInt(document.getElementById('vertices').value);
            const edges = getEdges();
            const source = parseInt(document.getElementById('source').value);
            const result = bellmanFord(vertices, edges, source);

            if (result) {
                displayResult(result);
            } else {
                alert("Error: Invalid graph input.");
            }
        }

        function getEdges() {
            const edgeInputs = document.querySelectorAll('.edge-input');
            const edges = [];
            for (const input of edgeInputs) {
                const values = input.value.split(',').map(x => parseInt(x));
                if (values.length === 3) {
                    edges.push({ source: values[0], destination: values[1], weight: values[2] });
                }
            }
            return edges;
        }

        function bellmanFord(vertices, edges, source) {
            const distances = Array(vertices).fill(Infinity);
            distances[source] = 0;

            for (let i = 0; i < vertices - 1; i++) {
                for (const edge of edges) {
                    if (distances[edge.source] !== Infinity && distances[edge.source] + edge.weight < distances[edge.destination]) {
                        distances[edge.destination] = distances[edge.source] + edge.weight;
                    }
                }
            }

            for (const edge of edges) {
                if (distances[edge.source] !== Infinity && distances[edge.source] + edge.weight < distances[edge.destination]) {
                    return null; // Indicates negative weight cycle
                }
            }

            return distances;
        }

        function displayResult(distances) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<h3>Shortest Distances</h3>';
            distances.forEach((d, index) => {
                resultDiv.innerHTML += `Vertex ${index}: ${d === Infinity ? 'Infinity' : d}<br>`;
            });
        }

        function addEdgeInput() {
            const edgeInputDiv = document.createElement('div');
            edgeInputDiv.className = 'edge-input';
            edgeInputDiv.innerHTML = 'Edge (source,destination,weight): <input type="text" class="edge-input" /> <button onclick="removeEdgeInput(this)">Remove</button>';
            document.getElementById('edges').appendChild(edgeInputDiv);
        }

        function removeEdgeInput(button) {
            button.parentElement.remove();
        }

        function reset() {
            document.getElementById('vertices').value = '';
            document.getElementById('source').value = '';
            document.getElementById('edges').innerHTML = '';
            document.getElementById('result').innerHTML = '';
        }
    </script>
</head>
<body>
    <h1>Bellman-Ford Algorithm Interactive Demo</h1>
    <label for="vertices">Number of Vertices:</label>
    <input type="number" id="vertices" min="1" /><br />

    <label for="source">Source Vertex:</label>
    <input type="number" id="source" min="0" /><br />

    <h3>Edges</h3>
    <div id="edges"></div>
    <button onclick="addEdgeInput()">Add Edge</button><br />

    <button onclick="runBellmanFord()">Run Bellman-Ford</button>
    <button onclick="reset()">Reset</button>

    <div id="result"></div>
</body>
</html>
