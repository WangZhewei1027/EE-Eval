<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radix Sort Interactive Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #arrayDisplay { margin: 10px 0; }
        #controls { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Radix Sort Interactive Demo</h1>
    <div id="controls">
        <label for="arrayInput">Enter array (comma-separated): </label>
        <input type="text" id="arrayInput" value="170,45,75,90,802,24,2,66">
        <button id="sortButton">Sort</button>
        <button id="resetButton">Reset</button>
        <label for="delaySlider">Delay (ms): </label>
        <input type="range" id="delaySlider" min="50" max="1000" value="300">
        <span id="delayValue">300</span>
    </div>
    <div id="arrayDisplay"></div>
    <script>
        let array = [];
        let delay = 300;

        document.getElementById('sortButton').addEventListener('click', () => {
            const input = document.getElementById('arrayInput').value;
            array = input.split(',').map(Number);
            delay = parseInt(document.getElementById('delaySlider').value);
            document.getElementById('arrayDisplay').innerText = `Array: ${array.join(", ")}`;
            radixSort(array);
        });

        document.getElementById('delaySlider').addEventListener('input', (event) => {
            delay = event.target.value;
            document.getElementById('delayValue').innerText = delay;
        });

        document.getElementById('resetButton').addEventListener('click', () => {
            array = [];
            document.getElementById('arrayInput').value = '';
            document.getElementById('arrayDisplay').innerText = '';
        });

        async function radixSort(arr) {
            const max = Math.max(...arr);
            const digits = max.toString().length;

            for (let i = 0; i < digits; i++) {
                await countingSort(arr, i);
                document.getElementById('arrayDisplay').innerText = `Array: ${arr.join(", ")}`;
            }
        }

        async function countingSort(arr, exp) {
            const output = new Array(arr.length);
            const count = new Array(10).fill(0);

            for (let i = 0; i < arr.length; i++) {
                const index = Math.floor(arr[i] / Math.pow(10, exp)) % 10;
                count[index]++;
            }

            for (let i = 1; i < count.length; i++) {
                count[i] += count[i - 1];
            }

            for (let i = arr.length - 1; i >= 0; i--) {
                const index = Math.floor(arr[i] / Math.pow(10, exp)) % 10;
                output[count[index] - 1] = arr[i];
                count[index]--;
                await new Promise(resolve => setTimeout(resolve, delay));
            }

            for (let i = 0; i < arr.length; i++) {
                arr[i] = output[i];
            }
        }
    </script>
</body>
</html>
