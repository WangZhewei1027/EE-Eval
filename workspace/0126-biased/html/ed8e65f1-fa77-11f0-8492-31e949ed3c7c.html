<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NP-Completeness Visualized</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #282c34;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 0.5em;
            text-align: center;
            color: #61dafb;
            animation: slideIn 0.5s ease-in;
        }

        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h2 {
            font-size: 1.5em;
            margin: 0.5em 0;
            text-align: center;
            color: #ffffff;
        }

        .canvas-container {
            position: relative;
            width: 80vw;
            height: 60vh;
            background-color: #20232a;
            border-radius: 15px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: slideIn 0.75s ease-in;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        .button {
            background-color: #61dafb;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            padding: 10px 20px;
            margin-top: 20px;
            transition: background-color 0.3s;
        }

        .button:hover {
            background-color: #21a1f1;
            transform: scale(1.05);
        }

        .footer {
            margin-top: auto;
            padding: 10px;
            font-size: 0.8em;
            color: #777;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Understanding NP-Completeness</h1>
    <h2>Visualizing Complex Problems</h2>
    
    <div class="canvas-container">
        <canvas id="npCanvas"></canvas>
    </div>
    
    <button class="button" id="startAnimation">Start Animation</button>

    <div class="footer">Visual Design by OpenAI</div>
    
    <script>
        const canvas = document.getElementById('npCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
    
        let animationId;
        let phase = 0;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#3b3f47';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const numPoints = 50;
            const radius = 100;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            ctx.fillStyle = '#61dafb';      
            for(let i = 0; i < numPoints; i++) {
                const angle = 2 * Math.PI * (i / numPoints + phase);
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fill();
            }

            phase += 0.01;
            animationId = requestAnimationFrame(draw);
        }

        document.getElementById('startAnimation').addEventListener('click', () => {
            if (!animationId) {
                draw();
            }
        });
    </script>
</body>
</html>
