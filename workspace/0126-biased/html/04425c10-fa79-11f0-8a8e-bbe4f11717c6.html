<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radix Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            border-bottom: 1px solid #444;
        }
        
        .header h1 {
            margin: 0;
        }
        
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #3e8e41;
        }
        
        .footer {
            background-color: #f0f0f0;
            padding: 10px;
            border-top: 1px solid #ddd;
        }
        
        .footer p {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Radix Sort</h1>
            <p>Learn about Radix Sort and its benefits.</p>
        </div>
        <div class="footer">
            <p>&copy; 2023 Radix Sort Example</p>
        </div>
        <div class="button" onclick="sortNumbers(10)">Sort Numbers</div>
        <div class="button" onclick="sortNumbers(20)">Sort Numbers (Again)</div>
    </div>
    <script>
        function sortNumbers(num) {
            const arr = Array.from({length: num}, (_, i) => i).map((index) => index);
            const max = Math.max(...arr);
            const min = Math.min(...arr);
            const step = Math.floor(max / num);
            const sortedArr = arr.map((value, index) => value + (index / step) * step);
            console.log(`Sorted ${num} elements: ${sortedArr}`);
        }
    </script>
</body>
</html>
