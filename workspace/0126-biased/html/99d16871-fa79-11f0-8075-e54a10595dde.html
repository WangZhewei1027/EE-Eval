<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmetric Cryptography Demo</title>
    <script>
        let secretKey = '';
        let plaintext = '';
        let ciphertext = '';

        function setKey() {
            secretKey = document.getElementById('keyInput').value;
            document.getElementById('keyStatus').innerText = 'Key Set: ' + secretKey;
        }

        function setPlaintext() {
            plaintext = document.getElementById('plaintextInput').value;
            document.getElementById('plaintextStatus').innerText = 'Plaintext Set: ' + plaintext;
        }

        function encrypt() {
            if (!secretKey || !plaintext) {
                alert('Please set both the key and plaintext');
                return;
            }
            ciphertext = btoa(plaintext + secretKey); // Simple reversible transformation for demonstration
            document.getElementById('ciphertextStatus').innerText = 'Ciphertext: ' + ciphertext;
        }

        function decrypt() {
            try {
                if (!secretKey || !ciphertext) {
                    alert('Please encrypt text first');
                    return;
                }
                const decrypted = atob(ciphertext);
                const originalText = decrypted.replace(secretKey, '');
                document.getElementById('decryptedStatus').innerText = 'Decrypted Text: ' + originalText;
            } catch (e) {
                alert('Error during decryption');
            }
        }

        function reset() {
            secretKey = '';
            plaintext = '';
            ciphertext = '';
            document.getElementById('keyInput').value = '';
            document.getElementById('plaintextInput').value = '';
            document.getElementById('ciphertextStatus').innerText = 'Ciphertext: ';
            document.getElementById('decryptedStatus').innerText = 'Decrypted Text: ';
            document.getElementById('keyStatus').innerText = 'Key Set: ';
            document.getElementById('plaintextStatus').innerText = 'Plaintext Set: ';
        }
    </script>
</head>
<body>
    <h1>Symmetric Cryptography Demo</h1>
    
    <div>
        <h2>Set Key</h2>
        <input type="text" id="keyInput" placeholder="Enter a secret key">
        <button onclick="setKey()">Set Key</button>
        <p id="keyStatus">Key Set: </p>
    </div>
    
    <div>
        <h2>Set Plaintext</h2>
        <input type="text" id="plaintextInput" placeholder="Enter text to encrypt">
        <button onclick="setPlaintext()">Set Plaintext</button>
        <p id="plaintextStatus">Plaintext Set: </p>
    </div>
    
    <div>
        <h2>Encrypt</h2>
        <button onclick="encrypt()">Encrypt</button>
        <p id="ciphertextStatus">Ciphertext: </p>
    </div>
    
    <div>
        <h2>Decrypt</h2>
        <button onclick="decrypt()">Decrypt</button>
        <p id="decryptedStatus">Decrypted Text: </p>
    </div>
    
    <div>
        <h2>Reset</h2>
        <button onclick="reset()">Reset</button>
    </div>
</body>
</html>
