<!DOCTYPE html>
<html>
<head>
    <title>REST API Demo</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
        }
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #ccc;
        }
        .input-field {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .input-field input[type="text"] {
            width: 100%;
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>REST API Demo</h1>
        <button class="button" onclick="createUser()">Create User</button>
        <button class="button" onclick="getUser()">Get User</button>
        <button class="button" onclick="updateUser()">Update User</button>
        <button class="button" onclick="deleteUser()">Delete User</button>
        <button class="button" onclick="createProduct()">Create Product</button>
        <button class="button" onclick="getProduct()">Get Product</button>
        <button class="button" onclick="updateProduct()">Update Product</button>
        <button class="button" onclick="deleteProduct()">Delete Product</button>
        <h2>Product</h2>
        <input type="text" class="input-field" id="productName" placeholder="Product Name">
        <button class="button" onclick="saveProduct()">Save Product</button>
        <button class="button" onclick="loadProduct()">Load Product</button>
        <h2>Product</h2>
        <table id="productTable">
            <tr>
                <th>Product ID</th>
                <th>Product Name</th>
                <th>Product Price</th>
                <th>Actions</th>
            </tr>
        </table>
    </div>

    <script>
        let users = [
            { id: 1, name: 'John Doe' },
            { id: 2, name: 'Jane Doe' },
        ];
        let products = [
            { id: 1, name: 'Product 1', price: 10.99 },
            { id: 2, name: 'Product 2', price: 9.99 },
        ];

        function createUser() {
            const productName = document.getElementById('productName').value;
            if (productName !== '') {
                const user = { id: users.length + 1, name: productName };
                users.push(user);
                alert('User created successfully!');
                updateProductTable();
            } else {
                alert('Please enter a product name!');
            }
        }

        function getUser() {
            const id = document.getElementById('productID').value;
            if (id !== '') {
                const user = users.find((user) => user.id === parseInt(id));
                if (user) {
                    alert('User retrieved successfully!');
                    updateProductTable();
                } else {
                    alert('User not found!');
                }
            } else {
                alert('Please enter a product ID!');
            }
        }

        function updateUser() {
            const id = document.getElementById('productID').value;
            const name = document.getElementById('productName').value;
            if (id !== '' && name !== '') {
                const user = users.find((user) => user.id === parseInt(id));
                if (user) {
                    user.name = name;
                    alert('User updated successfully!');
                    updateProductTable();
                } else {
                    alert('User not found!');
                }
            } else {
                alert('Please enter a product ID and a new name!');
            }
        }

        function deleteUser() {
            const id = document.getElementById('productID').value;
            if (id !== '') {
                const user = users.find((user) => user.id === parseInt(id));
                if (user) {
                    users.splice(user.id, 1);
                    alert('User deleted successfully!');
                    updateProductTable();
                } else {
                    alert('User not found!');
                }
            } else {
                alert('Please enter a product ID!');
            }
        }

        function createProduct() {
            const productName = document.getElementById('productName').value;
            if (productName !== '') {
                const product = { id: products.length + 1, name: productName, price: 9.99 };
                products.push(product);
                alert('Product created successfully!');
                updateProductTable();
            } else {
                alert('Please enter a product name!');
            }
        }

        function getProduct() {
            const id = document.getElementById('productID').value;
            if (id !== '') {
                const product = products.find((product) => product.id === parseInt(id));
                if (product) {
                    alert('Product retrieved successfully!');
                    updateProductTable();
                } else {
                    alert('Product not found!');
                }
            } else {
                alert('Please enter a product ID!');
            }
        }

        function updateProduct() {
            const id = document.getElementById('productID').value;
            const name = document.getElementById('productName').value;
            const price = document.getElementById('productPrice').value;
            if (id !== '' && name !== '' && price !== '') {
                const product = products.find((product) => product.id === parseInt(id));
                if (product) {
                    product.name = name;
                    product.price = parseFloat(price);
                    alert('Product updated successfully!');
                    updateProductTable();
                } else {
                    alert('Product not found!');
                }
            } else {
                alert('Please enter a product ID, a new name, and a price!');
            }
        }

        function deleteProduct() {
            const id = document.getElementById('productID').value;
            if (id !== '') {
                const product = products.find((product) => product.id === parseInt(id));
                if (product) {
                    products.splice(product.id, 1);
                    alert('Product deleted successfully!');
                    updateProductTable();
                } else {
                    alert('Product not found!');
                }
            } else {
                alert('Please enter a product ID!');
            }
        }

        function updateProductTable() {
            const table = document.getElementById('productTable');
            table.innerHTML = '';
            users.forEach((user) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.name}</td>
                    <td>${user.price}</td>
                    <td>
                        <button class="button" onclick="deleteProduct(${user.id})">Delete</button>
                        <button class="button" onclick="updateProduct(${user.id})">Update</button>
                    </td>
                `;
                table.appendChild(row);
            });
        }

        function saveProduct() {
            const productName = document.getElementById('productName').value;
            if (productName !== '') {
                const product = { id: products.length + 1, name: productName, price: 9.99 };
                products.push(product);
                alert('Product saved successfully!');
                updateProductTable();
            } else {
                alert('Please enter a product name!');
            }
        }

        function loadProduct() {
            const id = document.getElementById('productID').value;
            if (id !== '') {
                const product = products.find((product) => product.id === parseInt(id));
                if (product) {
                    alert('Product loaded successfully!');
                    updateProductTable();
                } else {
                    alert('Product not found!');
                }
            } else {
                alert('Please enter a product ID!');
            }
        }
    </script>
</body>
</html>
