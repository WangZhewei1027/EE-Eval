<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Tree Visual Symphony</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e74c3c;
            --light: #ecf0f1;
            --dark: #1a252f;
            --highlight: #f1c40f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--dark));
            color: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeIn 1.2s ease-out 0.3s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--light), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            opacity: 0.8;
            max-width: 600px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tree-container {
            position: relative;
            width: 100%;
            min-height: 500px;
            margin: 2rem 0;
            perspective: 1000px;
        }

        .tree {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transform: rotateX(10deg);
        }

        .node {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: center;
            opacity: 0;
        }

        .node.active {
            opacity: 1;
        }

        .node::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--secondary), var(--accent));
            z-index: -1;
            opacity: 0.7;
        }

        .keys {
            display: flex;
            gap: 0.5rem;
        }

        .key {
            background: rgba(255, 255, 255, 0.9);
            color: var(--dark);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .key.highlight {
            transform: scale(1.2);
            background: var(--highlight);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.6);
        }

        .children {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
        }

        .child-pointer {
            position: relative;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            opacity: 0.7;
            font-size: 1.5rem;
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: var(--light);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        .legend {
            margin-top: 2rem;
            display: flex;
            gap: 2rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem 2rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            opacity: 0;
            animation: fadeIn 1s ease-out 2s forwards;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .legend-color.key {
            background: rgba(255, 255, 255, 0.9);
        }

        .legend-color.highlight {
            background: var(--highlight);
        }

        .legend-color.pointer {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.7);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-500px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="header">
            <h1>B-Tree Index</h1>
            <p class="subtitle">A balanced tree data structure that maintains sorted data and allows efficient search, sequential access, insertions, and deletions.</p>
        </div>

        <div class="tree-container">
            <div class="tree" id="tree"></div>
        </div>

        <div class="controls">
            <button id="animateBtn">Animate Search</button>
            <button id="resetBtn">Reset View</button>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color key"></div>
                <span>Key Value</span>
            </div>
            <div class="legend-item">
                <div class="legend-color highlight"></div>
                <span>Search Target</span>
            </div>
            <div class="legend-item">
                <div class="legend-color pointer"></div>
                <span>Child Pointer</span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Create floating particles
            createParticles();

            // Build and render the B-Tree
            const bTree = createSampleBTree();
            renderBTree(bTree);

            // Button event listeners
            document.getElementById('animateBtn').addEventListener('click', () => {
                animateSearch(bTree, Math.floor(Math.random() * 50) + 10);
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                resetAnimation(bTree);
            });
        });

        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random properties
                const size = Math.random() * 3 + 1;
                const posX = Math.random() * 100;
                const delay = Math.random() * 15;
                const duration = Math.random() * 10 + 10;
                
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${posX}%`;
                particle.style.bottom = `-10px`;
                particle.style.animationDelay = `${delay}s`;
                particle.style.animationDuration = `${duration}s`;
                
                container.appendChild(particle);
            }
        }

        function createSampleBTree() {
            return {
                keys: [25],
                children: [
                    {
                        keys: [10, 20],
                        children: [
                            { keys: [5, 8], children: [] },
                            { keys: [12, 15], children: [] },
                            { keys: [22, 24], children: [] }
                        ]
                    },
                    {
                        keys: [35, 40],
                        children: [
                            { keys: [28, 30], children: [] },
                            { keys: [36, 38], children: [] },
                            { keys: [42, 45, 48], children: [] }
                        ]
                    }
                ]
            };
        }

        function renderBTree(tree, parentX = 50, parentY = 0, level = 0, nodeIdx = 0) {
            const treeContainer = document.getElementById('tree');
            const node = document.createElement('div');
            node.classList.add('node');
            
            // Calculate position based on tree level and node index
            const xPos = parentX + (nodeIdx - 1) * (30 - level * 5);
            const yPos = parentY + level * 120;
            
            // Set initial position
            node.style.left = `${xPos}%`;
            node.style.top = `${yPos}px`;
            
            // Create keys
            const keysContainer = document.createElement('div');
            keysContainer.classList.add('keys');
            
            tree.keys.forEach(key => {
                const keyElement = document.createElement('div');
                keyElement.classList.add('key');
                keyElement.textContent = key;
                keysContainer.appendChild(keyElement);
            });
            
            node.appendChild(keysContainer);
            
            // Add child pointers if they exist
            if (tree.children && tree.children.length > 0) {
                const childrenContainer = document.createElement('div');
                childrenContainer.classList.add('children');
                
                for (let i = 0; i <= tree.keys.length; i++) {
                    const pointer = document.createElement('div');
                    pointer.classList.add('child-pointer');
                    pointer.innerHTML = '↓';
                    childrenContainer.appendChild(pointer);
                }
                
                node.appendChild(childrenContainer);
            }
            
            treeContainer.appendChild(node);
            
            // Animate node appearance
            setTimeout(() => {
                node.classList.add('active');
            }, 200 + level * 200 + nodeIdx * 100);
            
            // Recursively render children
            if (tree.children && tree.children.length > 0) {
                const childCount = tree.children.length;
                const spread = Math.min(30, 80 / childCount);
                
                tree.children.forEach((child, idx) => {
                    const childX = xPos + ((idx - (childCount - 1) / 2) * spread);
                    renderBTree(child, childX, yPos + 100, level + 1, idx);
                });
            }
        }

        function animateSearch(tree, targetValue, path = [], delay = 0) {
            resetAnimation(tree);
            
            const nodes = document.querySelectorAll('.node');
            const keys = document.querySelectorAll('.key');
            
            // Reset all highlights
            keys.forEach(key => {
                key.classList.remove('highlight');
            });
            
            // Find the path to the target
            const searchPath = findSearchPath(tree, targetValue);
            
            // Animate each step in the path
            searchPath.forEach((step, index) => {
                setTimeout(() => {
                    const node = nodes[step.nodeIndex];
                    
                    // Highlight the node
                    node.style.transform = 'scale(1.05)';
                    node.style.boxShadow = '0 0 30px rgba(52, 152, 219, 0.6)';
                    
                    // Highlight the key being checked
                    if (step.keyIndex !== undefined) {
                        const keyIndex = Array.from(node.querySelectorAll('.key')).findIndex(
                            key => parseInt(key.textContent) === step.keyValue
                        );
                        
                        if (keyIndex !== -1) {
                            node.querySelectorAll('.key')[keyIndex].classList.add('highlight');
                        }
                    }
                    
                    // Return node to normal after delay
                    setTimeout(() => {
                        node.style.transform = '';
                        node.style.boxShadow = '';
                    }, 800);
                    
                }, index * 1200 + delay);
            });
            
            // Show result message
            const found = searchPath[searchPath.length - 1].found;
            setTimeout(() => {
                const message = found 
                    ? `Found value ${targetValue} in the B-Tree!`
                    : `Value ${targetValue} not found in the B-Tree.`;
                
                alert(message);
            }, searchPath.length * 1200 + delay);
        }

        function findSearchPath(tree, targetValue, path = [], nodeIndex = 0) {
            let keysChecked = [];
            let found = false;
            
            // Check each key in the node
            for (let i = 0; i < tree.keys.length; i++) {
                keysChecked.push({
                    nodeIndex: nodeIndex,
                    keyIndex: i,
                    keyValue: tree.keys[i],
                    found: false
                });
                
                if (targetValue === tree.keys[i]) {
                    keysChecked[keysChecked.length - 1].found = true;
                    found = true;
                    return keysChecked;
                }
                
                if (targetValue < tree.keys[i]) {
                    // Go to left child
                    if (tree.children && tree.children.length > i) {
                        const childPath = findSearchPath(
                            tree.children[i], 
                            targetValue, 
                            path, 
                            nodeIndex + 1 + i
                        );
                        return [...keysChecked, ...childPath];
                    }
                    break;
                }
            }
            
            // Check rightmost child if exists
            if (!found && tree.children && tree.children.length > tree.keys.length) {
                const childPath = findSearchPath(
                    tree.children[tree.children.length - 1], 
                    targetValue, 
                    path, 
                    nodeIndex + 1 + tree.keys.length
                );
                return [...keysChecked, ...childPath];
            }
            
            return keysChecked;
        }

        function resetAnimation(tree) {
            const nodes = document.querySelectorAll('.node');
            const keys = document.querySelectorAll('.key');
            
            nodes.forEach(node => {
                node.style.transform = '';
                node.style.boxShadow = '';
            });
            
            keys.forEach(key => {
                key.classList.remove('highlight');
            });
        }
    </script>
</body>
</html>
