<!DOCTYPE html>
<html>
<head>
    <title>Set</title>
    <style>
        body {
            font-family: monospace;
            background-color: white;
        }
        input {
            width: 50px;
            height: 20px;
            padding: 5px;
            margin-bottom: 10px;
            border: 1px solid black;
        }
        button {
            width: 100px;
            height: 30px;
            padding: 5px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
        #state {
            width: 50px;
            height: 20px;
            padding: 5px;
            margin-bottom: 10px;
            border: 1px solid black;
            display: inline-block;
        }
        #state span {
            display: block;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>Set</h1>
    <div id="state"></div>
    <div>
        <label for="value1">Value 1:</label>
        <input type="number" id="value1" value="0">
    </div>
    <div>
        <label for="value2">Value 2:</label>
        <input type="number" id="value2" value="0">
    </div>
    <button id="add">+</button>
    <button id="subtract">-</button>
    <button id="multiply">x</button>
    <button id="divide">/</button>
    <button id="reset">Reset</button>
    <button id="save">Save</button>
    <div id="output"></div>

    <script>
        let state = {
            value1: 0,
            value2: 0
        };

        const add = document.getElementById('add');
        const subtract = document.getElementById('subtract');
        const multiply = document.getElementById('multiply');
        const divide = document.getElementById('divide');
        const reset = document.getElementById('reset');
        const save = document.getElementById('save');
        const output = document.getElementById('output');

        add.addEventListener('click', () => {
            state.value1 += 1;
            updateOutput();
        });

        subtract.addEventListener('click', () => {
            if (state.value1 > 0) {
                state.value1 -= 1;
                updateOutput();
            }
        });

        multiply.addEventListener('click', () => {
            if (state.value1 > 0 && state.value2 > 0) {
                state.value1 *= state.value2;
                updateOutput();
            }
        });

        divide.addEventListener('click', () => {
            if (state.value1 > 0 && state.value2 > 0) {
                if (state.value2 !== 0) {
                    state.value1 /= state.value2;
                    updateOutput();
                }
            }
        });

        reset.addEventListener('click', () => {
            state.value1 = 0;
            state.value2 = 0;
            updateOutput();
        });

        save.addEventListener('click', () => {
            const outputText = `Value 1: ${state.value1}, Value 2: ${state.value2}`;
            localStorage.setItem('set', outputText);
            alert(`Set saved as ${outputText}`);
        });

        function updateOutput() {
            const outputText = `Value 1: ${state.value1}, Value 2: ${state.value2}`;
            output.textContent = outputText;
        }
    </script>
</body>
</html>
