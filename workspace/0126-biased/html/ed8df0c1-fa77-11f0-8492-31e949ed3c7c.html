<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topological Sort Visualization</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #1f1f1f;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 80vw;
            height: 70vh;
            background: linear-gradient(135deg, #143c61, #1f7a8a);
            border-radius: 15px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .node {
            background: #2b2b2b;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            width: 60px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .node:hover {
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.7);
            transform: scale(1.1);
        }

        .arrow {
            width: 50px;
            height: 20px;
            background: transparent;
            position: absolute;
            border-left: 4px solid #f0f0f0;
        }

        .arrow::after {
            content: '';
            position: absolute;
            left: 40px;
            top: 5px;
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 10px solid #f0f0f0;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 20px;
        }

        button {
            background: #f0a500;
            color: #1f1f1f;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #d88e00;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="nodes">
        <div class="node" style="position: absolute; top: 30%; left: 10%;">A</div>
        <div class="node" style="position: absolute; top: 40%; left: 40%;">B</div>
        <div class="node" style="position: absolute; top: 70%; left: 20%;">C</div>
        <div class="node" style="position: absolute; top: 80%; left: 60%;">D</div>
        <div class="node" style="position: absolute; top: 50%; left: 70%;">E</div>
        <div class="node" style="position: absolute; top: 20%; left: 80%;">F</div>
    </div>

    <div class="arrow" style="top: 35%; left: 12%;"></div>
    <div class="arrow" style="top: 45%; left: 48%; transform: rotate(60deg);"></div>
    <div class="arrow" style="top: 75%; left: 22%; transform: rotate(40deg);"></div>
    <div class="arrow" style="top: 25%; left: 72%; transform: rotate(-30deg);"></div>
    
    <div id="controls">
        <button id="startButton">Start Sort</button>
    </div>
</div>

<script>
    const startButton = document.getElementById('startButton');
    startButton.addEventListener('click', () => {
        alert('Topological Sort starts here!');
    });
</script>

</body>
</html>
