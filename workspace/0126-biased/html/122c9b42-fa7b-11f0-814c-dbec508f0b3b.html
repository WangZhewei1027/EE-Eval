<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: monospace;
            background-color: #fff;
            font-size: 14px;
            margin: 0;
            padding: 0;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <h1>NP-Completeness Demo</h1>
    <p>Explore the complexity of NP-Completeness with multiple interactive controls and user-driven workflows.</p>
    
    <button id="start-button">Start Experiment</button>
    <button id="reset-button">Reset Experiment</button>
    <button id="help-button">View Help</button>
    
    <div id="output"></div>
    
    <script>
        let state = 'normal';
        let maxIterations = 1000;
        let currentIteration = 0;
        let maxTime = 10;
        let timer = null;
        let inputFields = [];
        let buttons = [];
        let output = document.getElementById('output');
        
        function updateOutput() {
            output.innerHTML = `State: ${state}, Iteration: ${currentIteration}, Time: ${Math.floor((currentIteration / maxTime) * maxTime)}ms`;
        }
        
        function startExperiment() {
            state = 'running';
            timer = setInterval(() => {
                if (currentIteration < maxIterations) {
                    inputFields.forEach(field => field.value = '');
                    buttons.forEach(button => button.textContent = '');
                    currentIteration++;
                    updateOutput();
                } else {
                    clearInterval(timer);
                    state = 'finished';
                    output.innerHTML = `Time: ${Math.floor((currentIteration / maxTime) * maxTime)}ms`;
                }
            }, 100);
        }
        
        function resetExperiment() {
            state = 'normal';
            clearInterval(timer);
            inputFields = [];
            buttons = [];
            currentIteration = 0;
            updateOutput();
        }
        
        function addInputField(field) {
            inputFields.push(field);
            buttons.push(document.createElement('button'));
            buttons[buttons.length - 1].textContent = 'Submit';
            buttons[buttons.length - 1].addEventListener('click', () => {
                field.value = inputFields[0].value;
                inputFields.shift();
                buttons[buttons.length - 1].textContent = 'Submit';
            });
            inputFields[0].addEventListener('input', () => {
                field.value = inputFields[0].value;
                inputFields[0].focus();
            });
        }
        
        function addButton(button) {
            buttons.push(button);
            buttons[buttons.length - 1].addEventListener('click', () => {
                button.textContent = 'Reset';
                button.textContent = 'Help';
                buttons[buttons.length - 1].textContent = 'Reset';
            });
        }
        
        startExperiment();
        
        document.getElementById('start-button').addEventListener('click', startExperiment);
        document.getElementById('reset-button').addEventListener('click', resetExperiment);
        document.getElementById('help-button').addEventListener('click', () => {
            alert('NP-Completeness Demo');
        });
        
        function updateButtons() {
            buttons.forEach(button => button.disabled = false);
            buttons[buttons.length - 1].disabled = true;
        }
        
        function updateInputFields() {
            inputFields.forEach(field => field.disabled = false);
            inputFields[0].disabled = true;
        }
        
        document.getElementById('start-button').addEventListener('click', updateInputFields);
        document.getElementById('reset-button').addEventListener('click', updateInputFields);
        document.getElementById('help-button').addEventListener('click', updateInputFields);
        
        function updateOutputButtons() {
            buttons.forEach(button => button.disabled = true);
            buttons[buttons.length - 1].disabled = false;
            output.innerHTML = '';
        }
        
        document.getElementById('start-button').addEventListener('click', updateOutputButtons);
        document.getElementById('reset-button').addEventListener('click', updateOutputButtons);
        document.getElementById('help-button').addEventListener('click', updateOutputButtons);
        
        updateButtons();
        updateInputFields();
    </script>
</body>
</html>
