<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undirected Graph Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
        }
        h1 {
            position: absolute;
            top: 20px;
            font-size: 3em;
            color: #2c3e50;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.15);
        }
        #graph-container {
            width: 80vmin;
            height: 80vmin;
            border: 5px solid #2980b9;
            border-radius: 15px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .node {
            width: 40px;
            height: 40px;
            background-color: #3498db;
            border-radius: 50%;
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .node:hover {
            background-color: #2980b9;
        }
        .edge {
            position: absolute;
            height: 2px;
            background-color: #2980b9;
            transition: transform 0.3s ease;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #e74c3c;
            color: white;
            font-size: 1em;
            cursor: pointer;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <h1>Undirected Graph Visualization</h1>
    <div id="graph-container"></div>
    <button id="draw-graph">Draw Graph</button>

    <script>
        const nodes = [
            { id: 1, x: 100, y: 150 },
            { id: 2, x: 300, y: 50 },
            { id: 3, x: 200, y: 300 },
            { id: 4, x: 400, y: 200 }
        ];

        const edges = [
            { from: 1, to: 2 },
            { from: 1, to: 3 },
            { from: 2, to: 4 },
            { from: 3, to: 4 }
        ];

        function createGraph() {
            const container = document.getElementById('graph-container');
            container.innerHTML = ''; // Clear previous nodes/edges

            nodes.forEach(node => {
                const nodeElement = document.createElement('div');
                nodeElement.classList.add('node');
                nodeElement.textContent = node.id;
                nodeElement.style.left = `${node.x}px`;
                nodeElement.style.top = `${node.y}px`;
                container.appendChild(nodeElement);
            });

            edges.forEach(edge => {
                const fromNode = nodes.find(n => n.id === edge.from);
                const toNode = nodes.find(n => n.id === edge.to);
                const edgeElement = document.createElement('div');
                edgeElement.classList.add('edge');

                const length = Math.hypot(toNode.x - fromNode.x, toNode.y - fromNode.y);
                edgeElement.style.width = `${length}px`;
                edgeElement.style.transformOrigin = "0 0";
                edgeElement.style.transform = `translate(${fromNode.x}px, ${fromNode.y}px) rotate(${Math.atan2(toNode.y - fromNode.y, toNode.x - fromNode.x)}rad)`;

                container.appendChild(edgeElement);
            });
        }

        document.getElementById('draw-graph').addEventListener('click', createGraph);
    </script>

</body>
</html>
