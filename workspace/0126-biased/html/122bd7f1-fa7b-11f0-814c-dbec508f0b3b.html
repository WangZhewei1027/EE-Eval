<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exponential Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        #search-container {
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #search-input {
            padding: 10px;
            margin-bottom: 10px;
        }
        #search-button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #search-button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div id="search-container">
        <h2>Exponential Search</h2>
        <form id="search-form">
            <input type="text" id="search-input" placeholder="Search...">
            <button id="search-button">Search</button>
        </form>
        <div id="result-container"></div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const searchButton = document.getElementById('search-button');
        const resultContainer = document.getElementById('result-container');

        searchButton.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) {
                fetch(`https://api.exponential-search.com/v1/search?q=${query}`)
                    .then(response => response.json())
                    .then(data => {
                        const results = data.results;
                        resultContainer.innerHTML = '';
                        results.forEach(result => {
                            const resultElement = document.createElement('div');
                            resultElement.classList.add('result');
                            resultElement.innerHTML = `<h3>${result.title}</h3><p>${result.description}</p>`;
                            resultContainer.appendChild(resultElement);
                        });
                    })
                    .catch(error => console.error(error));
            } else {
                resultContainer.innerHTML = 'Please enter a query';
            }
        });

        searchInput.addEventListener('input', () => {
            searchButton.disabled = !searchInput.value.trim().length;
        });

        searchInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                searchButton.click();
            }
        });
    </script>
</body>
</html>
