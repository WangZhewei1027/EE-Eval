<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kruskal's Algorithm Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            color: #333;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 80vw;
            height: 80vh;
            border: 2px solid #2c3e50;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            background: white;
        }
        .button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: #3498db;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #2980b9;
        }
        #graph {
            position: absolute;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg id="graph"></svg>
        <button class="button" id="startBtn">Start Visualization</button>
    </div>
    <script>
        const svg = document.getElementById('graph');
        const edges = [
            { start: [50, 50], end: [200, 100], weight: 4 },
            { start: [200, 100], end: [300, 40], weight: 1 },
            { start: [50, 50], end: [250, 300], weight: 2 },
            { start: [250, 300], end: [400, 200], weight: 3 },
            { start: [200, 100], end: [400, 200], weight: 5 },
            { start: [50, 50], end: [400, 200], weight: 6 },
        ];

        function drawEdge(edge, strokeWidth) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', edge.start[0]);
            line.setAttribute('y1', edge.start[1]);
            line.setAttribute('x2', edge.end[0]);
            line.setAttribute('y2', edge.end[1]);
            line.setAttribute('stroke', '#34495e');
            line.setAttribute('stroke-width', strokeWidth);
            svg.appendChild(line);
        }

        function visualizeKruskal() {
            svg.innerHTML = ''; // Clear previous graph
            const sortedEdges = edges.slice().sort((a, b) => a.weight - b.weight);

            // For visual effect, animate edges being added
            const animationDelay = 800;
            let currentDelay = 0;

            sortedEdges.forEach(edge => {
                setTimeout(() => {
                    drawEdge(edge, 4);
                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', (edge.start[0] + edge.end[0]) / 2);
                    circle.setAttribute('cy', (edge.start[1] + edge.end[1]) / 2);
                    circle.setAttribute('r', 5);
                    circle.setAttribute('fill', '#e74c3c');
                    svg.appendChild(circle);
                }, currentDelay);
                currentDelay += animationDelay;
            });
        }

        document.getElementById('startBtn').addEventListener('click', visualizeKruskal);
    </script>
</body>
</html>
