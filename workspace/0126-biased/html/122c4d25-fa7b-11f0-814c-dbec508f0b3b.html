<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Window</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
        }
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .control-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        .control-label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .control-input {
            padding: 5px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
        }
        .control-button {
            padding: 5px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .slider {
            width: 50%;
            margin-bottom: 20px;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        .button {
            padding: 5px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sliding Window</h2>
        <form>
            <div class="control-group">
                <label for="width">Window Width:</label>
                <input type="range" id="width" min="10" max="100" value="50" step="10">
                <span id="width-value">50</span>
            </div>
            <div class="control-group">
                <label for="height">Window Height:</label>
                <input type="range" id="height" min="10" max="100" value="50" step="10">
                <span id="height-value">50</span>
            </div>
            <div class="control-group">
                <label for="duration">Duration:</label>
                <input type="range" id="duration" min="1" max="60" value="10" step="1">
                <span id="duration-value">10</span>
            </div>
            <div class="button-group">
                <button class="button" id="start-button">Start</button>
                <button class="button" id="stop-button">Stop</button>
                <button class="button" id="reset-button">Reset</button>
            </div>
        </form>
        <div id="result"></div>
    </div>

    <script>
        const width = document.getElementById('width');
        const height = document.getElementById('height');
        const duration = document.getElementById('duration');
        const startButton = document.getElementById('start-button');
        const stopButton = document.getElementById('stop-button');
        const resetButton = document.getElementById('reset-button');
        const resultDiv = document.getElementById('result');

        startButton.addEventListener('click', () => {
            const value = parseInt(document.getElementById('width-value').textContent);
            const result = `Window Width: ${value}px`;
            resultDiv.textContent = result;
            width.value = value;
        });

        stopButton.addEventListener('click', () => {
            const value = parseInt(document.getElementById('width-value').textContent);
            const result = `Window Width: ${value}px`;
            resultDiv.textContent = result;
            width.value = value;
        });

        resetButton.addEventListener('click', () => {
            width.value = 50;
            resultDiv.textContent = `Window Width: ${width.value}px`;
        });

        function updateResult() {
            const value = parseInt(document.getElementById('width-value').textContent);
            const result = `Window Width: ${value}px`;
            resultDiv.textContent = result;
            width.value = value;
        }

        duration.addEventListener('input', () => {
            const value = parseInt(document.getElementById('duration-value').textContent);
            const result = `Duration: ${value} seconds`;
            resultDiv.textContent = result;
            duration.value = value;
        });

        duration.value = 10;
    </script>
</body>
</html>
