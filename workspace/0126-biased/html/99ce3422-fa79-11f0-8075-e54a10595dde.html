<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiset Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        input, button, select {
            margin-top: 10px;
            margin-bottom: 10px;
            padding: 5px;
        }
        #multisetView {
            border-top: 1px solid black;
            margin-top: 20px;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<h1>Multiset Interactive Demo</h1>

<h3>Add Item</h3>
<input type="text" id="itemInput" placeholder="Enter item name">
<input type="number" id="countInput" value="1" min="1" placeholder="Count">
<button onclick="addItem()">Add</button>

<h3>Remove Item</h3>
<input type="text" id="removeItemInput" placeholder="Enter item to remove">
<input type="number" id="removeCountInput" value="1" min="1" placeholder="Count">
<button onclick="removeItem()">Remove</button>

<h3>Current Multiset</h3>
<div id="multisetView"></div>

<h3>Search Item</h3>
<input type="text" id="searchInput" placeholder="Enter item to search">
<button onclick="searchItem()">Search</button>
<div id="searchResult"></div>

<h3>Clear Multiset</h3>
<button onclick="clearMultiset()">Clear All</button>

<script>
    let multiset = {};

    function addItem() {
        const itemName = document.getElementById('itemInput').value.trim();
        const itemCount = parseInt(document.getElementById('countInput').value);
        if (itemName && itemCount > 0) {
            if (multiset[itemName]) {
                multiset[itemName] += itemCount;
            } else {
                multiset[itemName] = itemCount;
            }
            updateMultisetView();
            document.getElementById('itemInput').value = '';
            document.getElementById('countInput').value = '1';
        }
    }

    function removeItem() {
        const itemName = document.getElementById('removeItemInput').value.trim();
        const itemCount = parseInt(document.getElementById('removeCountInput').value);
        if (itemName && itemCount > 0 && multiset[itemName]) {
            multiset[itemName] -= itemCount;
            if (multiset[itemName] <= 0) {
                delete multiset[itemName];
            }
            updateMultisetView();
            document.getElementById('removeItemInput').value = '';
            document.getElementById('removeCountInput').value = '1';
        }
    }

    function searchItem() {
        const searchTerm = document.getElementById('searchInput').value.trim();
        const result = multiset[searchTerm] !== undefined ? multiset[searchTerm] : 0;
        document.getElementById('searchResult').innerText = `Count: ${result}`;
    }

    function clearMultiset() {
        multiset = {};
        updateMultisetView();
    }

    function updateMultisetView() {
        const display = Object.entries(multiset)
            .map(([key, value]) => `${key}: ${value}`)
            .join(', ') || 'Multiset is empty';
        document.getElementById('multisetView').innerText = display;
    }
</script>

</body>
</html>
