<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Semaphore Concept - Visual Elegance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

  /* Root and base styling */
  :root {
    --color-bg: #0a142f;
    --color-primary: #ff4e50;
    --color-secondary: #011627;
    --color-accent: #ff9a76;
    --color-neutral-light: #e6eaf0;
    --color-neutral-dark: #1d2d50;
    --color-green: #3ddc97;
    --color-red: #ff6b6b;
    --color-yellow: #ffd166;
    --shadow-glow: rgba(255, 78, 80, 0.4);
    --shadow-glow-green: rgba(61, 220, 151, 0.5);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: linear-gradient(135deg, var(--color-secondary), var(--color-bg));
    font-family: 'Poppins', sans-serif;
    color: var(--color-neutral-light);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 2rem 3rem 1rem 3rem;
    text-align: center;
  }

  header h1 {
    font-weight: 700;
    font-size: 3.4rem;
    letter-spacing: 0.06em;
    color: var(--color-primary);
    margin: 0 0 0.3rem 0;
    text-shadow: 0 0 8px var(--color-primary);
    user-select: none;
    font-variant: small-caps;
  }

  header p {
    font-weight: 500;
    font-size: 1.25rem;
    color: var(--color-accent);
    opacity: 0.85;
    margin-top: 0;
    user-select: none;
  }

  main {
    flex: 1 0 auto;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem 2rem 4rem 2rem;
  }

  .semaphore-container {
    background: var(--color-neutral-dark);
    border-radius: 1.5rem;
    box-shadow:
      0 0 40px 12px rgba(255, 78, 80, 0.12),
      inset 0 4px 15px 0 rgba(255, 78, 80, 0.15);
    width: 300px;
    height: 560px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 2rem 2.5rem 2rem;
  }

  /* Semaphore pole */
  .pole {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 20px;
    height: 380px;
    background: linear-gradient(180deg, #222b3a 0%, #151f2f 100%);
    border-radius: 10px;
    box-shadow:
      inset 0 5px 10px -2px rgba(255, 255, 255, 0.1),
      0 12px 20px -12px #ff4e50cc;
    transform: translateX(-50%);
    z-index: 1;
  }
  /* The base foot */
  .base-foot {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 120px;
    height: 36px;
    background: linear-gradient(90deg, #151f2f 0%, #222b3a 100%);
    border-radius: 18px/12px;
    box-shadow:
      inset 0 6px 14px -3px #ff4e50cc,
      0 3px 8px 0 rgba(0,0,0,0.6);
    transform: translateX(-50%);
    filter: drop-shadow(0 3px 3px rgba(0,0,0,0.2));
  }

  /* Semaphore light housing */
  .lights-housing {
    position: relative;
    width: 140px;
    height: 360px;
    background: linear-gradient(135deg, #1e2836, #2d394f);
    border-radius: 32px;
    box-shadow:
      0 10px 30px -5px var(--shadow-glow),
      inset 0 0 12px 4px #0b101a,
      inset 0 -5px 20px #ff4e50cc;
    border: 3.5px solid #ff4e50cc;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    padding: 30px 0;
    user-select: none;
  }

  /* Single light container */
  .light {
    position: relative;
    margin: 0 auto;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background-color: #111a2e;
    box-shadow:
      inset 0 -6px 12px #000a19,
      0 7px 19px -3px #000000aa;
    transition:
      background-color 0.8s ease,
      box-shadow 1.25s ease;
    cursor: default;
  }

  /* Lights colors and glow on active */
  .light.red {
    background: #331616;
  }
  .light.red.active {
    background: #ff6b6b;
    box-shadow:
      0 0 28px 9px #ff6b6b99,
      inset 0 -3px 10px 2px #ff6b6bcc;
  }
  .light.yellow {
    background: #3f3a16;
  }
  .light.yellow.active {
    background: #ffd166;
    box-shadow:
      0 0 28px 9px #ffd166cc,
      inset 0 -3px 10px 2px #ffd166ff;
  }
  .light.green {
    background: #16331a;
  }
  .light.green.active {
    background: #3ddc97;
    box-shadow:
      0 0 28px 9px #3ddc9799,
      inset 0 -3px 10px 2px #3ddc97cc;
  }

  /* Light halo effect */
  .light.active::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 120%;
    height: 120%;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.45;
    filter: blur(18px);
    z-index: -1;
  }
  .light.red.active::before {
    background-color: #ff6b6b;
  }
  .light.yellow.active::before {
    background-color: #ffd166;
  }
  .light.green.active::before {
    background-color: #3ddc97;
  }

  /* Semaphore title below */
  .semaphore-title {
    margin-top: 1rem;
    font-weight: 700;
    font-size: 2rem;
    color: var(--color-primary);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-shadow: 0 0 12px var(--color-primary);
    user-select: none;
  }

  /* Info panel */
  .info-panel {
    margin-top: 3.2rem;
    font-weight: 400;
    font-size: 1rem;
    color: var(--color-neutral-light);
    line-height: 1.6;
    max-width: 310px;
    text-align: center;
    font-style: italic;
    user-select: none;
    opacity: 0.8;
  }

  /* Controls */
  .controls {
    margin-top: 3rem;
    display: flex;
    justify-content: center;
    gap: 1.4rem;
  }

  button {
    background-color: var(--color-primary);
    border: none;
    padding: 0.85rem 2.25rem;
    border-radius: 32px;
    font-size: 1rem;
    font-weight: 600;
    color: var(--color-neutral-light);
    letter-spacing: 0.07em;
    cursor: pointer;
    box-shadow: 0 0 10px var(--shadow-glow);
    transition:
      background-color 0.35s ease,
      box-shadow 0.4s ease,
      transform 0.25s ease;
    user-select: none;
  }
  button:focus {
    outline: none;
    box-shadow:
      0 0 18px 3px var(--color-primary);
  }
  button:hover:not(:disabled) {
    background-color: var(--color-accent);
    box-shadow:
      0 0 28px 6px var(--color-accent);
    transform: translateY(-2px);
  }
  button:active:not(:disabled) {
    transform: translateY(0);
  }
  button:disabled {
    cursor: default;
    opacity: 0.35;
    box-shadow: none;
  }

  /* Footer */
  footer {
    text-align: center;
    color: var(--color-neutral-light);
    font-size: 0.9rem;
    font-weight: 400;
    padding-bottom: 1.5rem;
    opacity: 0.5;
    user-select: none;
  }

  /* Responsive */
  @media (max-width: 400px) {
    main {
      padding-left: 1rem;
      padding-right: 1rem;
    }
    .semaphore-container {
      width: 260px;
      height: 500px;
      padding: 2rem 1.5rem 2rem 1.5rem;
    }
    .lights-housing {
      width: 120px;
      height: 320px;
      border-radius: 26px;
      padding: 20px 0;
    }
    .light {
      width: 60px;
      height: 60px;
    }
    .semaphore-title {
      font-size: 1.6rem;
    }
    .info-panel {
      max-width: 260px;
      font-size: 0.95rem;
    }
  }
</style>
</head>
<body>
<header>
  <h1>Semaphore</h1>
  <p>Visualizing the Classic Signaling Concept</p>
</header>
<main>
  <section class="semaphore-container" aria-label="Semaphore signal illustration">
    <div class="pole" aria-hidden="true"></div>
    <div class="base-foot" aria-hidden="true"></div>
    <div class="lights-housing" role="presentation">
      <div class="light red" id="light-red" aria-label="Red Signal" tabindex="-1"></div>
      <div class="light yellow" id="light-yellow" aria-label="Yellow Signal" tabindex="-1"></div>
      <div class="light green" id="light-green" aria-label="Green Signal" tabindex="-1"></div>
    </div>
    <div class="semaphore-title" aria-live="polite" aria-atomic="true">Red</div>
    <div class="info-panel">
      Timeless semaphore uses clear color codes to signal stop, caution, and go. Observe the smooth transitions of lights illuminating in turn.
    </div>
    <div class="controls" aria-label="Semaphore Controls">
      <button id="btn-cycle" aria-describedby="cycle-desc">Cycle Signal</button>
      <button id="btn-auto" aria-pressed="false" aria-describedby="auto-desc">Start Auto</button>
    </div>
  </section>
</main>
<footer>
  &copy; 2024 &mdash; Semaphore Visualization
</footer>

<script>
  (() => {
    const lights = [
      { id: 'light-red', label: 'Red', colorClass: 'red' },
      { id: 'light-yellow', label: 'Yellow', colorClass: 'yellow' },
      { id: 'light-green', label: 'Green', colorClass: 'green' },
    ];
    let currentIndex = 0;

    const lightElements = lights.map(({id}) => document.getElementById(id));
    const semaphoreTitle = document.querySelector('.semaphore-title');
    const btnCycle = document.getElementById('btn-cycle');
    const btnAuto = document.getElementById('btn-auto');

    function setActiveLight(index) {
      lightElements.forEach((el, i) => {
        if(i === index) {
          el.classList.add('active');
        } else {
          el.classList.remove('active');
        }
      });
      semaphoreTitle.textContent = lights[index].label;
    }

    function nextSignal() {
      currentIndex = (currentIndex + 1) % lights.length;
      setActiveLight(currentIndex);
    }

    // Initialize red light active
    setActiveLight(currentIndex);

    // Button action — cycle signal once
    btnCycle.addEventListener('click', () => {
      if(autoCycle) return; // disable manual if auto running
      nextSignal();
    });

    // Auto cycling mechanism
    let autoCycle = false;
    let autoInterval = null;

    btnAuto.addEventListener('click', () => {
      autoCycle = !autoCycle;

      if(autoCycle) {
        btnAuto.textContent = 'Stop Auto';
        btnAuto.setAttribute('aria-pressed', 'true');
        btnCycle.disabled = true;
        autoInterval = setInterval(() => {
          nextSignal();
        }, 2800);
      } else {
        btnAuto.textContent = 'Start Auto';
        btnAuto.setAttribute('aria-pressed', 'false');
        btnCycle.disabled = false;
        clearInterval(autoInterval);
      }
    });
  })();
</script>
</body>
</html>
