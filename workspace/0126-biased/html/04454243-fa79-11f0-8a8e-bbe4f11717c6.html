<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signatures</title>
    <style>
        body {
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo img {
            width: 100px;
            height: 100px;
            margin: 0 auto;
        }

        .signature {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .button-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }

        .button:hover {
            background-color: #3e8e41;
        }

        .footer {
            background-color: #f2f2f2;
            padding: 10px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://picsum.photos/200/300" alt="Logo">
        </div>
        <div class="signature">Digital Signature</div>
        <div class="button-container">
            <button class="button" onclick="sign()">Sign</button>
            <button class="button" onclick="sig()">Sig</button>
        </div>
        <div class="footer">Designed by John Doe</div>
    </div>

    <script>
        function sign() {
            // Simple, limited action
            alert("Signed with digital signature");
        }

        function sig() {
            // Simple, limited action
            alert("Signed with signature");
        }
    </script>
</body>
</html>
