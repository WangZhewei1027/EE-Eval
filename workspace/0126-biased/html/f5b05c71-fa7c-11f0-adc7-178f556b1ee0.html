<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trie Explanation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .text-explanation {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .button {
            margin-top: 10px;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <h1>Trie Explanation</h1>
    <p id="text-explanation"></p>
    <p id="algorithm-explanation"></p>
    <p id="algorithm-description"></p>
    <p id="example"></p>
    <button id="demo-button">Run Demo</button>
    <script>
        const textExplanation = document.getElementById('text-explanation');
        const algorithmExplanation = document.getElementById('algorithm-explanation');
        const algorithmDescription = document.getElementById('algorithm-description');
        const demoButton = document.getElementById('demo-button');

        const textExample = `
            The Trie data structure is a tree-like data structure in which each node stores a string. It is used to store and retrieve strings efficiently.

            Here is how it works:
            - Each node in the Trie has a unique key (a string) and a set of child nodes (also strings).
            - When a string is inserted into the Trie, it is split into its constituent parts (or "leaves").
            - Each leaf node is then inserted into the Trie, creating a new path for the string.

            The Trie has several key benefits:
            - It allows for fast lookup of strings, with an average time complexity of O(m), where m is the length of the string.
            - It allows for efficient insertion and deletion of strings, with an average time complexity of O(m).
            - It can be used to store strings of varying lengths, with a maximum length of m.
        `;

        const algorithm = `
            Here is an example of how to implement a Trie in JavaScript:

            ```javascript
            class Trie {
                constructor() {
                    this.root = {};
                }

                insert(word) {
                    let node = this.root;
                    for (let char of word) {
                        if (!node[char]) {
                            node[char] = {};
                        }
                        node = node[char];
                    }
                    node.isWord = true;
                }

                search(word) {
                    let node = this.root;
                    for (let char of word) {
                        if (!node[char]) {
                            return false;
                        }
                        node = node[char];
                    }
                    return node.isWord;
                }

                startsWith(prefix) {
                    let node = this.root;
                    for (let char of prefix) {
                        if (!node[char]) {
                            return false;
                        }
                        node = node[char];
                    }
                    return true;
                }
            }
            ```

            To use the Trie, create a new instance and call the `insert` method to add words to the Trie, the `search` method to check if a word exists, and the `startsWith` method to check if a prefix exists.
        ``;

        const algorithmDescription = `
            A Trie (also known as a prefix tree) is a tree-like data structure in which each node stores a string. It is used to store and retrieve strings efficiently.

            The Trie is a powerful data structure with several key benefits:
            - It allows for fast lookup of strings, with an average time complexity of O(m), where m is the length of the string.
            - It allows for efficient insertion and deletion of strings, with an average time complexity of O(m).
            - It can be used to store strings of varying lengths, with a maximum length of m.
        `;

        textExplanation.textContent = textExample;
        algorithmExplanation.textContent = algorithm;
        algorithmDescription.textContent = algorithmDescription;

        demoButton.addEventListener('click', () => {
            console.log('Demo button clicked!');
        });
    </script>
</body>
</html>
