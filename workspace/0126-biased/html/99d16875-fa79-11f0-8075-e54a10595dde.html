<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<h1>Authentication Demonstration</h1>

<div id="loginForm">
    <h2>Login</h2>
    <label for="username">Username:</label>
    <input type="text" id="username" name="username"><br><br>
    
    <label for="password">Password:</label>
    <input type="password" id="password" name="password"><br><br>
    
    <button id="loginBtn">Login</button>
    <button id="showSignup">Sign Up</button>
</div>

<div id="signupForm" class="hidden">
    <h2>Sign Up</h2>
    <label for="newUsername">Username:</label>
    <input type="text" id="newUsername" name="newUsername"><br><br>
    
    <label for="newPassword">Password:</label>
    <input type="password" id="newPassword" name="newPassword"><br><br>
    
    <button id="signupBtn">Create Account</button>
    <button id="cancelSignup">Cancel</button>
</div>

<div id="authStatus" class="hidden">
    <h2>Status</h2>
    <p id="statusMessage">You are not logged in.</p>
    <button id="logoutBtn" class="hidden">Logout</button>
</div>

<script>
    document.getElementById('loginBtn').addEventListener('click', function() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        if (username && password) {
            // Mock authentication
            document.getElementById('authStatus').classList.remove('hidden');
            document.getElementById('statusMessage').innerText = `Welcome, ${username}! You are logged in.`;
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
        } else {
            alert("Please fill in both fields.");
        }
    });

    document.getElementById('showSignup').addEventListener('click', function() {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('signupForm').classList.remove('hidden');
    });

    document.getElementById('signupBtn').addEventListener('click', function() {
        const newUsername = document.getElementById('newUsername').value;
        const newPassword = document.getElementById('newPassword').value;

        if (newUsername && newPassword) {
            alert("Account created successfully! You can now log in.");
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        } else {
            alert("Please fill in both fields.");
        }
    });

    document.getElementById('cancelSignup').addEventListener('click', function() {
        document.getElementById('signupForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
    });

    document.getElementById('logoutBtn').addEventListener('click', function() {
        document.getElementById('authStatus').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('logoutBtn').classList.add('hidden');
        document.getElementById('statusMessage').innerText = "You are not logged in.";
    });
</script>

</body>
</html>
