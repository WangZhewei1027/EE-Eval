<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Socket Programming | Visual Concept</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Space+Mono&display=swap");

  /* Reset and base */
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Space Mono', monospace;
    color: #e0e6f0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  /* Container to center content */
  .container {
    max-width: 900px;
    width: 90vw;
    background: rgba(15, 32, 39, 0.85);
    border-radius: 24px;
    padding: 40px 60px;
    box-shadow:
      0 8px 24px rgba(255, 255, 255, 0.1),
      0 0 30px rgba(44, 83, 100, 0.7);
    position: relative;
    overflow: visible;
  }

  /* Heading with gradient stroke */
  h1 {
    margin: 0 0 14px 0;
    font-weight: 700;
    font-size: 3.6rem;
    background: linear-gradient(90deg, #7fffd4, #40e0d0, #7fffd4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 3px 6px #16c9c033);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* Subtitle */
  p.desc {
    margin: 0 0 38px 0;
    font-weight: 400;
    font-size: 1.15rem;
    color: #a3bac9dd;
    letter-spacing: 0.05em;
    line-height: 1.6;
  }

  /* Central visual panel */
  .visual {
    position: relative;
    width: 100%;
    height: 360px;
    background: radial-gradient(circle at center, #1c3b56 0%, #0b1824 85%);
    border-radius: 20px;
    box-shadow:
      inset 0 0 40px #0ff7ff44,
      0 0 20px #0ff7ffbb;
    overflow: visible;
    margin-bottom: 42px;
    cursor: default;
  }

  /* Socket node style */
  .socket {
    position: absolute;
    width: 36px;
    height: 36px;
    background: #0ff7ff;
    border-radius: 50%;
    box-shadow:
      0 0 12px #0ff7ffbb,
      0 0 24px #0ff7ffcc,
      inset 0 0 4px #a0ffffee;
    transition: transform 0.3s ease;
    will-change: transform;
  }

  /* Socket nodes positions */
  .socket.client { top: 50%; left: 8%; transform: translate(-50%, -50%);}
  .socket.server { top: 50%; right: 10%; transform: translate(50%, -50%);}
  .socket.router { top: 22%; left: 40%; transform: translate(-50%, -50%);}
  .socket.database { bottom: 26%; left: 60%; transform: translate(-50%, 50%);}
  .socket.firewall { bottom: 22%; right: 40%; transform: translate(50%, 50%);}

  /* Node labels */
  .node-label {
    position: absolute;
    color: #0ff7ffcc;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    mix-blend-mode: screen;
    user-select: none;
    pointer-events: none;
  }

  .label-client { top: 54%; left: 8%; transform: translate(-50%, 0); }
  .label-server { top: 54%; right: 10%; transform: translate(50%, 0); }
  .label-router { top: 18%; left: 40%; transform: translate(-50%, 0); }
  .label-database { bottom: 20%; left: 60%; transform: translate(-50%, 0); }
  .label-firewall { bottom: 18%; right: 40%; transform: translate(50%, 0); }

  /* Curved connection lines using SVG paths */
  svg.connections {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }

  path.connection-line {
    fill: none;
    stroke: #0ff7ffaa;
    stroke-width: 2.8;
    filter: drop-shadow(0 0 6px #0ff7ff66);
    stroke-linecap: round;
    animation: pulseStroke 3s ease-in-out infinite;
  }

  @keyframes pulseStroke {
    0%, 100% {
      stroke-dashoffset: 0;
      stroke-opacity: 0.9;
    }
    50% {
      stroke-dashoffset: 40;
      stroke-opacity: 0.5;
    }
  }

  /* Animated "Data Packet" circle traveling along paths */
  .packet {
    position: absolute;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #7fffd4;
    box-shadow:
      0 0 12px #7fffd4dd,
      0 0 20px #40e0d0cc;
    filter: drop-shadow(0 0 8px #7fffd4bb);
    pointer-events: none;
  }

  /* Controls style */
  .controls {
    text-align: center;
  }

  button {
    font-family: 'Space Mono', monospace;
    font-weight: 600;
    font-size: 1rem;
    padding: 12px 28px;
    margin: 0 14px;
    border-radius: 32px;
    border: none;
    background: linear-gradient(135deg, #7fffd4, #40e0d0);
    color: #082a2e;
    letter-spacing: 0.1em;
    cursor: pointer;
    box-shadow:
      0 6px 15px #00ffffaa,
      inset 0 -2px 6px #00ffefcc;
    transition: background 0.35s ease, transform 0.25s ease, box-shadow 0.3s ease;
    user-select: none;
  }

  button:hover,
  button:focus {
    background: linear-gradient(135deg, #40e0d0, #7fffd4);
    box-shadow:
      0 8px 24px #7fffd4ff,
      inset 0 -2px 12px #a0fff7ff;
    transform: scale(1.07);
    outline: none;
  }

  button:active {
    transform: scale(0.95);
  }

  /* Footer note */
  .footer-note {
    margin-top: 38px;
    font-size: 0.85rem;
    text-align: center;
    letter-spacing: 0.04em;
    color: #40e0d044;
  }
</style>
</head>
<body>
<div class="container" aria-label="Socket Programming Visual Concept">
  <h1>Socket Programming</h1>
  <p class="desc">
    Visualizing the seamless interplay of nodes and connections within the socket programming paradigm — illustrating data flow, network sockets, and real-time communication.
  </p>
  <div class="visual" aria-hidden="true">
    <!-- Socket nodes -->
    <div class="socket client" id="socket-client"></div>
    <div class="socket server" id="socket-server"></div>
    <div class="socket router" id="socket-router"></div>
    <div class="socket database" id="socket-database"></div>
    <div class="socket firewall" id="socket-firewall"></div>

    <!-- Labels -->
    <div class="node-label label-client">Client</div>
    <div class="node-label label-server">Server</div>
    <div class="node-label label-router">Router</div>
    <div class="node-label label-database">Database</div>
    <div class="node-label label-firewall">Firewall</div>

    <!-- SVG connections -->
    <svg class="connections" viewBox="0 0 900 360" preserveAspectRatio="none" aria-hidden="true">
      <!-- Connections paths -->
      <path id="path-client-router" class="connection-line" d="M72 180 C 200 60, 360 60, 360 80" />
      <path id="path-router-server" class="connection-line" d="M360 80 C 540 60, 700 180, 820 180" />
      <path id="path-router-database" class="connection-line" d="M360 80 C 480 140, 540 260, 540 280" />
      <path id="path-database-firewall" class="connection-line" d="M540 280 C 630 300, 720 280, 760 260" />
      <path id="path-firewall-server" class="connection-line" d="M760 260 C 800 220, 810 200, 820 180" />
    </svg>

    <!-- Data packet element -->
    <div class="packet" id="data-packet" aria-hidden="true"></div>
  </div>

  <div class="controls" role="region" aria-label="Socket programming data flow controls">
    <button id="btn-start" aria-live="polite">Start Flow</button>
    <button id="btn-reset" aria-live="polite" disabled>Reset</button>
  </div>

  <p class="footer-note">Crafted with ✨ | Visual concept &amp; animation by AI</p>
</div>

<script>
  (function() {
    const packet = document.getElementById('data-packet');
    const btnStart = document.getElementById('btn-start');
    const btnReset = document.getElementById('btn-reset');

    // Define paths for animation - correspond to SVG path IDs
    const pathIds = [
      'path-client-router',
      'path-router-server',
      'path-router-database',
      'path-database-firewall',
      'path-firewall-server'
    ];

    let paths = [];
    let pathLengths = [];
    let totalPathLength = 0;

    for(let i = 0; i < pathIds.length; i++) {
      const p = document.getElementById(pathIds[i]);
      paths.push(p);
      pathLengths.push(p.getTotalLength());
      totalPathLength += p.getTotalLength();
    }

    // Flatten the paths into a single linear travel distance
    // Packet moves along paths in sequence

    // Animation variables
    let animationId = null;
    let startTime = null;
    const duration = 12000; // 12 seconds for a full cycle

    // Function to find point on composite path at normalized t [0..1]
    function getPointAt(t) {
      let dist = t * totalPathLength;
      for(let i = 0; i < paths.length; i++) {
        if(dist <= pathLengths[i]) {
          return paths[i].getPointAtLength(dist);
        } else {
          dist -= pathLengths[i];
        }
      }
      // fallback last point on last path
      return paths[paths.length - 1].getPointAtLength(pathLengths[pathLengths.length -1]);
    }

    // Place packet initially offscreen
    function resetPacketPosition() {
      packet.style.transform = 'translate(-50%, -50%) translate3d(-40px, -40px, 0)';
    }

    // Animate the packet around paths in a loop
    function animate(time) {
      if(!startTime) startTime = time;
      let elapsed = (time - startTime) % duration;
      let progress = elapsed / duration;

      let point = getPointAt(progress);

      // Adjust for visual position inside the container
      // The SVG is 900x360, visual container is flexible so we need to scale accordingly

      const container = document.querySelector('.visual');
      const rect = container.getBoundingClientRect();

      let scaleX = rect.width / 900;
      let scaleY = rect.height / 360;

      let x = point.x * scaleX;
      let y = point.y * scaleY;

      packet.style.transform = `translate(-50%, -50%) translate3d(${x}px, ${y}px, 0)`;

      animationId = requestAnimationFrame(animate);
    }

    // Start animation
    function startFlow() {
      btnStart.disabled = true;
      btnReset.disabled = false;
      startTime = null;
      animationId = requestAnimationFrame(animate);
    }

    // Reset animation and UI
    function resetFlow() {
      btnStart.disabled = false;
      btnReset.disabled = true;
      cancelAnimationFrame(animationId);
      animationId = null;
      resetPacketPosition();
    }

    // Initial packet position
    resetPacketPosition();

    btnStart.addEventListener('click', startFlow);
    btnReset.addEventListener('click', resetFlow);

    // For responsiveness: reposition packet on window resize if animating
    window.addEventListener('resize', () => {
      if(animationId === null) {
        resetPacketPosition();
      }
    });
  })();
</script>
</body>
</html>
