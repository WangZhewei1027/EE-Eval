<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type System Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        input, button, select { margin: 5px; }
    </style>
</head>
<body>

<h1>Type System Demo</h1>

<div>
    <label for="dataType">Select Data Type:</label>
    <select id="dataType">
        <option value="string">String</option>
        <option value="number">Number</option>
        <option value="boolean">Boolean</option>
    </select>
</div>

<div>
    <label for="inputValue">Input Value:</label>
    <input type="text" id="inputValue">
    <button id="submitBtn">Submit</button>
</div>

<div id="output"></div>

<h2>Variable Manipulation</h2>
<div>
    <button id="increaseBtn">Increase Number</button>
    <button id="decreaseBtn">Decrease Number</button>
    <button id="resetBtn">Reset</button>
</div>
<div>
    Current Value: <span id="currentValue">0</span>
</div>

<h2>Boolean States</h2>
<div>
    <label for="booleanToggle">Boolean Switch:</label>
    <input type="checkbox" id="booleanToggle">
</div>
<div>
    <span id="booleanOutput">Boolean is OFF</span>
</div>

<script>
    const dataTypeSelect = document.getElementById('dataType');
    const inputValue = document.getElementById('inputValue');
    const submitBtn = document.getElementById('submitBtn');
    const outputDiv = document.getElementById('output');

    const increaseBtn = document.getElementById('increaseBtn');
    const decreaseBtn = document.getElementById('decreaseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const currentValueSpan = document.getElementById('currentValue');
    
    const booleanToggle = document.getElementById('booleanToggle');
    const booleanOutput = document.getElementById('booleanOutput');

    let currentValue = 0;

    dataTypeSelect.addEventListener('change', () => {
        inputValue.value = '';
        outputDiv.innerHTML = '';
    });

    submitBtn.addEventListener('click', () => {
        const selectedType = dataTypeSelect.value;
        const value = inputValue.value;

        if (selectedType === 'string') {
            outputDiv.innerHTML = `You entered a string: ${value}`;
        } else if (selectedType === 'number') {
            const numValue = parseFloat(value);
            if (!isNaN(numValue)) {
                outputDiv.innerHTML = `You entered a number: ${numValue}`;
            } else {
                outputDiv.innerHTML = `Invalid number!`;
            }
        } else if (selectedType === 'boolean') {
            if (value.toLowerCase() === "true") {
                outputDiv.innerHTML = `You entered a boolean: true`;
            } else if (value.toLowerCase() === "false") {
                outputDiv.innerHTML = `You entered a boolean: false`;
            } else {
                outputDiv.innerHTML = `Invalid boolean!`;
            }
        }
    });

    increaseBtn.addEventListener('click', () => {
        currentValue++;
        currentValueSpan.innerText = currentValue;
    });

    decreaseBtn.addEventListener('click', () => {
        currentValue--;
        currentValueSpan.innerText = currentValue;
    });

    resetBtn.addEventListener('click', () => {
        currentValue = 0;
        currentValueSpan.innerText = currentValue;
    });

    booleanToggle.addEventListener('change', () => {
        booleanOutput.innerText = booleanToggle.checked ? 'Boolean is ON' : 'Boolean is OFF';
    });
</script>

</body>
</html>
