<!DOCTYPE html>
<html>
<head>
    <title>Quick Sort Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .array-container {
            display: flex;
            margin: 20px 0;
            height: 100px;
            align-items: flex-end;
        }
        .array-element {
            flex: 30px;
            margin: 0 2px;
            background-color: #ddd;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 5px;
            position: relative;
        }
        .pivot {
            background-color: #aaa;
        }
        .partition {
            background-color: #ccc;
        }
        .sorted {
            background-color: #888;
        }
        .comparing {
            background-color: #666;
            color: white;
        }
        .controls {
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .control-group {
            margin-right: 20px;
            margin-bottom: 10px;
        }
        .explanation {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #ccc;
        }
        .log {
            height: 100px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Quick Sort Interactive Demo</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="arraySize">Array Size:</label>
                <input type="range" id="arraySize" min="5" max="30" value="10">
                <span id="arraySizeValue">10</span>
                <button id="generateArray">Generate New Array</button>
            </div>
            
            <div class="control-group">
                <button id="startSort">Start Quick Sort</button>
                <button id="stepForward">Step Forward</button>
                <button id="pauseSort">Pause</button>
                <button id="resetSort">Reset</button>
            </div>
            
            <div class="control-group">
                <label for="speed">Speed:</label>
                <input type="range" id="speed" min="100" max="2000" value="500" step="100">
                <span id="speedValue">500ms</span>
            </div>
            
            <div class="control-group">
                <label>
                    <input type="checkbox" id="showPartitions"> Show Partitions
                </label>
                <label>
                    <input type="checkbox" id="showPivot" checked> Show Pivot
                </label>
            </div>
            
            <div class="control-group">
                <label for="pivotStrategy">Pivot Strategy:</label>
                <select id="pivotStrategy">
                    <option value="first">First Element</option>
                    <option value="last">Last Element</option>
                    <option value="middle">Middle Element</option>
                    <option value="random">Random</option>
                </select>
            </div>
        </div>
        
        <div class="array-container" id="arrayContainer"></div>
        
        <div class="explanation" id="explanation">
            <h3>Current Step Explanation</h3>
            <p id="stepExplanation">Click "Start Quick Sort" to begin.</p>
        </div>
        
        <div class="log" id="log">
            <p>Log messages will appear here...</p>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <h3>Manual Partitioning</h3>
                <label for="partitionStart">Start Index:</label>
                <input type="number" id="partitionStart" min="0" max="9" value="0">
                <label for="partitionEnd">End Index:</label>
                <input type="number" id="partitionEnd" min="0" max="9" value="9">
                <button id="manualPartition">Partition This Range</button>
            </div>
        </div>
    </div>

    <script>
        // State variables
        let array = [];
        let originalArray = [];
        let animationSpeed = 500;
        let isSorting = false;
        let isPaused = false;
        let sortSteps = [];
        let currentStep = 0;
        let sortInterval = null;
        let callStack = [];
        
        // DOM elements
        const arrayContainer = document.getElementById('arrayContainer');
        const arraySizeInput = document.getElementById('arraySize');
        const arraySizeValue = document.getElementById('arraySizeValue');
        const generateArrayBtn = document.getElementById('generateArray');
        const startSortBtn = document.getElementById('startSort');
        const stepForwardBtn = document.getElementById('stepForward');
        const pauseSortBtn = document.getElementById('pauseSort');
        const resetSortBtn = document.getElementById('resetSort');
        const speedInput = document.getElementById('speed');
        const speedValue = document.getElementById('speedValue');
        const showPartitionsCheckbox = document.getElementById('showPartitions');
        const showPivotCheckbox = document.getElementById('showPivot');
        const pivotStrategySelect = document.getElementById('pivotStrategy');
        const stepExplanation = document.getElementById('stepExplanation');
        const logElement = document.getElementById('log');
        const partitionStartInput = document.getElementById('partitionStart');
        const partitionEndInput = document.getElementById('partitionEnd');
        const manualPartitionBtn = document.getElementById('manualPartition');
        
        // Initialize
        function init() {
            generateArray();
            setupEventListeners();
        }
        
        function setupEventListeners() {
            arraySizeInput.addEventListener('input', updateArraySizeValue);
            generateArrayBtn.addEventListener('click', generateArray);
            startSortBtn.addEventListener('click', startQuickSort);
            stepForwardBtn.addEventListener('click', stepForward);
            pauseSortBtn.addEventListener('click', togglePause);
            resetSortBtn.addEventListener('click', resetSort);
            speedInput.addEventListener('input', updateSpeed);
            manualPartitionBtn.addEventListener('click', manualPartition);
        }
        
        function updateArraySizeValue() {
            const size = arraySizeInput.value;
            arraySizeValue.textContent = size;
            partitionEndInput.max = size - 1;
            partitionEndInput.value = size - 1;
        }
        
        function updateSpeed() {
            animationSpeed = speedInput.value;
            speedValue.textContent = `${animationSpeed}ms`;
            
            if (isSorting && !isPaused) {
                clearInterval(sortInterval);
                sortInterval = setInterval(stepForward, animationSpeed);
            }
        }
        
        function generateArray() {
            const size = parseInt(arraySizeInput.value);
            array = [];
            for (let i = 0; i < size; i++) {
                array.push(Math.floor(Math.random() * 90) + 10);
            }
            originalArray = [...array];
            renderArray();
            resetSortState();
            logMessage(`Generated new array: ${array.join(', ')}`);
        }
        
        function renderArray(highlight = [], pivotIndex = -1, partitions = []) {
            arrayContainer.innerHTML = '';
            const maxValue = Math.max(...array, 10);
            
            array.forEach((value, index) => {
                const element = document.createElement('div');
                element.className = 'array-element';
                element.style.height = `${(value / maxValue) * 90}px`;
                element.textContent = value;
                
                if (partitions.length > 0 && showPartitionsCheckbox.checked) {
                    const [partStart, partEnd] = partitions[partitions.length - 1];
                    if (index >= partStart && index <= partEnd) {
                        element.classList.add('partition');
                    }
                }
                
                if (highlight.includes(index)) {
                    element.classList.add('comparing');
                }
                
                if (index === pivotIndex && showPivotCheckbox.checked) {
                    element.classList.add('pivot');
                }
                
                // Mark sorted positions
                if (callStack.some(call => call.sorted && index >= call.low && index <= call.high)) {
                    element.classList.add('sorted');
                }
                
                arrayContainer.appendChild(element);
            });
        }
        
        function logMessage(message) {
            const logEntry = document.createElement('p');
            logEntry.textContent = message;
            logElement.appendChild(logEntry);
            logElement.scrollTop = logElement.scrollHeight;
        }
        
        function resetSortState() {
            clearInterval(sortInterval);
            isSorting = false;
            isPaused = false;
            sortSteps = [];
            currentStep = 0;
            callStack = [];
            stepExplanation.textContent = 'Click "Start Quick Sort" to begin.';
            logMessage('Sorting state reset.');
        }
        
        function resetSort() {
            array = [...originalArray];
            renderArray();
            resetSortState();
            logMessage('Array reset to original state.');
        }
        
        function togglePause() {
            if (!isSorting) return;
            
            isPaused = !isPaused;
            pauseSortBtn.textContent = isPaused ? 'Resume' : 'Pause';
            
            if (isPaused) {
                clearInterval(sortInterval);
                logMessage('Sorting paused.');
            } else {
                sortInterval = setInterval(stepForward, animationSpeed);
                logMessage('Sorting resumed.');
            }
        }
        
        function startQuickSort() {
            if (isSorting) return;
            
            resetSortState();
            isSorting = true;
            callStack.push({ low: 0, high: array.length - 1, pivot: -1, state: 'start' });
            logMessage('Starting Quick Sort...');
            
            // Generate all steps for visualization
            quickSortSteps(0, array.length - 1);
            
            if (sortSteps.length > 0) {
                sortInterval = setInterval(stepForward, animationSpeed);
            }
        }
        
        function quickSortSteps(low, high) {
            if (low < high) {
                const pivotIndex = partitionSteps(low, high);
                
                // Push left partition to call stack
                callStack.push({ low, high: pivotIndex - 1, pivot: 'left', state: 'partition' });
                quickSortSteps(low, pivotIndex - 1);
                
                // Push right partition to call stack
                callStack.push({ low: pivotIndex + 1, high, pivot: 'right', state: 'partition' });
                quickSortSteps(pivotIndex + 1, high);
                
                // Mark this range as sorted
                callStack.push({ low, high, pivot: -1, state: 'sorted', sorted: true });
                sortSteps.push({ type: 'sorted', low, high });
            }
        }
        
        function partitionSteps(low, high) {
            let pivotIndex = choosePivot:
            const strategy = pivotStrategySelect.value;
            let pivotIndex;
            
            switch(strategy) {
                case 'first':
                    pivotIndex = low;
                    break;
                case 'last':
                    pivotIndex = high;
                    break;
                case 'middle':
                    pivotIndex = Math.floor((low + high) / 2);
                    break;
                case 'random':
                    pivotIndex = Math.floor(Math.random() * (high - low + 1)) + low;
                    break;
            }
            
            // Record pivot selection
            sortSteps.push({ 
                type: 'pivot', 
                pivotIndex,
                low,
                high,
                message: `Choosing pivot (${strategy} element): ${array[pivotIndex]} at index ${pivotIndex}`
            });
            
            // Swap pivot with last element
            if (pivotIndex !== high) {
                sortSteps.push({
                    type: 'swap',
                    indices: [pivotIndex, high],
                    message: `Moving pivot ${array[pivotIndex]} to end of partition (index ${high})`
                });
                [array[pivotIndex], array[high]] = [array[high], array[pivotIndex]];
                pivotIndex = high;
            }
            
            const pivotValue = array[pivotIndex];
            let i = low - 1;
            
            sortSteps.push({
                type: 'partition_start',
                pivotIndex,
                pivotValue,
                low,
                high,
                message: `Partitioning from ${low} to ${high} with pivot ${pivotValue}`
            });
            
            for (let j = low; j < high; j++) {
                sortSteps.push({
                    type: 'compare',
                    indices: [j, pivotIndex],
                    message: `Comparing ${array[j]} with pivot ${pivotValue}`
                });
                
                if (array[j] < pivotValue) {
                    i++;
                    if (i !== j) {
                        sortSteps.push({
                            type: 'swap',
                            indices: [i, j],
                            message: `Swapping ${array[i]} and ${array[j]} (both < ${pivotValue})`
                        });
                        [array[i], array[j]] = [array[j], array[i]];
                    }
                }
            }
            
            // Swap pivot into correct position
            if (i + 1 !== pivotIndex) {
                sortSteps.push({
                    type: 'final_swap',
                    indices: [i + 1, pivotIndex],
                    message: `Moving pivot ${pivotValue} to final position at index ${i + 1}`
                });
                [array[i + 1], array[pivotIndex]] = [array[pivotIndex], array[i + 1]];
                pivotIndex = i + 1;
            }
            
            sortSteps.push({
                type: 'partition_end',
                pivotIndex,
                message: `Partition complete. Pivot ${pivotValue} now at index ${pivotIndex}`
            });
            
            return pivotIndex;
        }
        
        function stepForward() {
            if (currentStep >= sortSteps.length) {
                clearInterval(sortInterval);
                isSorting = false;
                stepExplanation.textContent = 'Sorting complete!';
                logMessage('Quick Sort completed successfully!');
                return;
            }
            
            const step = sortSteps[currentStep];
            let highlight = [];
            let pivotIndex = -1;
            let partitions = [];
            
            switch(step.type) {
                case 'pivot':
                    pivotIndex = step.pivotIndex;
                    stepExplanation.textContent = step.message;
                    break;
                    
                case 'swap':
                case 'final_swap':
                    [array[step.indices[0]], array[step.indices[1]]] = 
                        [array[step.indices[1]], array[step.indices[0]]];
                    highlight = step.indices;
                    stepExplanation.textContent = step.message;
                    break;
                    
                case 'compare':
                    highlight = step.indices;
                    stepExplanation.textContent = step.message;
                    break;
                    
                case 'partition_start':
                    pivotIndex = step.pivotIndex;
                    partitions = [[step.low, step.high]];
                    stepExplanation.textContent = step.message;
                    break;
                    
                case 'partition_end':
                    pivotIndex = step.pivotIndex;
                    stepExplanation.textContent = step.message;
                    break;
                    
                case 'sorted':
                    stepExplanation.textContent = `Elements from index ${step.low} to ${step.high} are now in their final positions.`;
                    break;
            }
            
            renderArray(highlight, pivotIndex, partitions);
            if (step.message) logMessage(step.message);
            currentStep++;
        }
        
        function manualPartition() {
            if (isSorting) {
                logMessage('Cannot manually partition while sorting is in progress.');
                return;
            }
            
            const start = parseInt(partitionStartInput.value);
            const end = parseInt(partitionEndInput.value);
            
            if (start < 0 || end >= array.length || start >= end) {
                logMessage('Invalid partition range.');
                return;
            }
            
            logMessage(`Manually partitioning from index ${start} to ${end}...`);
            
            // Choose pivot based on current strategy
            const strategy = pivotStrategySelect.value;
            let pivotIndex;
            
            switch(strategy) {
                case 'first':
                    pivotIndex = start;
                    break;
                case 'last':
                    pivotIndex = end;
                    break;
                case 'middle':
                    pivotIndex = Math.floor((start + end) / 2);
                    break;
                case 'random':
                    pivotIndex = Math.floor(Math.random() * (end - start + 1)) + start;
                    break;
            }
            
            // Move pivot to end
            [array[pivotIndex], array[end]] = [array[end], array[pivotIndex]];
            pivotIndex = end;
            const pivotValue = array[pivotIndex];
            
            let i = start - 1;
            for (let j = start; j < end; j++) {
                if (array[j] < pivotValue) {
                    i++;
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }
            
            // Move pivot to final position
            [array[i + 1], array[pivotIndex]] = [array[pivotIndex], array[i + 1]];
            pivotIndex = i + 1;
            
            renderArray([], pivotIndex, [[start, end]]);
            logMessage(`Manual partition complete. Pivot ${pivotValue} now at index ${pivotIndex}`);
            stepExplanation.textContent = `Manual partition from ${start} to ${end} complete. Pivot is at index ${pivotIndex}.`;
        }
        
        // Initialize the app
        init();
    </script>
</body>
</html>
