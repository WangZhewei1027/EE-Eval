<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim Sort</title>
    <style>
        body {
            font-family: monospace;
        }
        input[type="text"], input[type="number"], select, button {
            padding: 0;
            margin: 0;
            width: 100%;
            box-sizing: border-box;
            font-size: 16px;
            font-family: monospace;
            border: none;
            background-color: #f0f0f0;
            color: #333;
        }
        button {
            padding: 0 20px;
            margin: 0 10px;
            cursor: pointer;
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            font-family: monospace;
            border: none;
            background-color: #f0f0f0;
            color: #333;
            cursor: pointer;
        }
        .button:hover {
            background-color: #ccc;
        }
        .button:active {
            background-color: #aaa;
        }
        .button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .button:disabled:active {
            background-color: #aaa;
        }
        .button:disabled:active:active {
            background-color: #ccc;
        }
        .button:disabled:active:disabled {
            background-color: #ccc;
        }
        .button:disabled:active:disabled:active {
            background-color: #aaa;
        }
        .button:disabled:active:disabled:active:disabled {
            background-color: #aaa;
        }
        .button:disabled:active:disabled:active:disabled:active {
            background-color: #aaa;
        }
        .button:disabled:active:disabled:active:disabled:active:active {
            background-color: #aaa;
        }
        .button:disabled:active:disabled:active:disabled:active:active:active {
            background-color: #aaa;
        }
    </style>
</head>
<body>
    <input type="text" id="input" placeholder="Enter text">
    <button id="add">Add</button>
    <button id="subtract">Subtract</button>
    <button id="multiply">Multiply</button>
    <button id="divide">Divide</button>
    <button id="equal">Equal</button>
    <button id="clear">Clear</button>
    <button id="undo">Undo</button>
    <button id="redo">Redo</button>
    <button id="next">Next</button>
    <button id="prev">Prev</button>
    <div id="output"></div>
    <script>
        let input = document.getElementById('input');
        let add = document.getElementById('add');
        let subtract = document.getElementById('subtract');
        let multiply = document.getElementById('multiply');
        let divide = document.getElementById('divide');
        let equal = document.getElementById('equal');
        let clear = document.getElementById('clear');
        let undo = document.getElementById('undo');
        let redo = document.getElementById('redo');
        let next = document.getElementById('next');
        let prev = document.getElementById('prev');
        let output = document.getElementById('output');

        add.addEventListener('click', addText);
        subtract.addEventListener('click', subtractText);
        multiply.addEventListener('click', multiplyText);
        divide.addEventListener('click', divideText);
        equal.addEventListener('click', equalText);
        clear.addEventListener('click', clearText);
        undo.addEventListener('click', undoText);
        redo.addEventListener('click', redoText);
        next.addEventListener('click', nextText);
        prev.addEventListener('click', prevText);

        function addText() {
            let text = input.value;
            if (text !== '') {
                output.innerText += text + '\n';
            }
        }

        function subtractText() {
            let text = input.value;
            if (text !== '') {
                output.innerText = output.innerText.slice(0, -1) + text + '\n';
            }
        }

        function multiplyText() {
            let text = input.value;
            if (text !== '') {
                output.innerText += text + '\n';
            }
        }

        function divideText() {
            let text = input.value;
            if (text !== '') {
                output.innerText += text + '\n';
            }
        }

        function equalText() {
            output.innerText = output.innerText.slice(0, -1) + input.value + '\n';
        }

        function clearText() {
            output.innerText = '';
            input.value = '';
        }

        function undoText() {
            if (output.innerText !== '') {
                output.innerText = output.innerText.slice(0, -1);
            }
        }

        function redoText() {
            if (output.innerText !== '') {
                output.innerText = output.innerText.slice(0, -1) + output.innerText.slice(-1);
            }
        }

        function nextText() {
            let text = output.innerText;
            if (text !== '') {
                output.innerText = text + '\n';
            } else {
                output.innerText = '';
            }
        }

        function prevText() {
            let text = output.innerText;
            if (text !== '') {
                output.innerText = text.slice(0, -1) + '\n';
            } else {
                output.innerText = '';
            }
        }
    </script>
</body>
</html>
