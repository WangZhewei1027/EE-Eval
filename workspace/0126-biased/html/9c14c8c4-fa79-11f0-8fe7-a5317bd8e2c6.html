<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sliding Window Maximum - Interactive Demo</title>
  <style>
    /* Minimal styling only to make text monospace for clarity */
    body { font-family: monospace; margin: 12px; }
    .row { margin: 6px 0; }
    .group { margin: 10px 0; padding: 6px 0; }
    button, input, select, textarea { font-family: monospace; }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Sliding Window Maximum — Interactive Demo</h2>

  <div class="group">
    <div class="row">
      <label>Array (comma or space separated):</label>
      <input id="arrayInput" size="60" value="9, 11, 8, 5, 7, 10, 6">
      <button id="loadArray">Load Array</button>
      <button id="clearArray">Clear</button>
    </div>

    <div class="row">
      <label>Randomize:</label>
      <input id="randomSize" type="number" min="1" value="10" style="width:60px">
      <input id="randomMin" type="number" value="0" style="width:60px">
      <input id="randomMax" type="number" value="20" style="width:60px">
      <button id="randomize">Randomize</button>
      <label> Seed (optional): </label><input id="randomSeed" size="12">
    </div>

    <div class="row">
      <label>Append value:</label>
      <input id="appendValue" size="8">
      <button id="appendBtn">Append</button>
      <label> Prepend value:</label>
      <input id="prependValue" size="8">
      <button id="prependBtn">Prepend</button>
      <label> Insert at index:</label>
      <input id="insertIndex" type="number" style="width:60px">
      <input id="insertValue" size="8">
      <button id="insertBtn">Insert</button>
    </div>

    <div class="row">
      <label>Window size k:</label>
      <input id="kInput" type="number" min="1" value="3" style="width:70px">
      <label> or quick slider: </label>
      <input id="kSlider" type="range" min="1" value="3" style="width:200px">
      <span id="kDisplay"></span>
      <button id="addMultiK">Add to Multi-windows</button>
      <button id="clearMultiK">Clear Multi-windows</button>
      <span id="multiKList"></span>
    </div>

    <div class="row">
      <label>Algorithm:</label>
      <select id="algorithm">
        <option value="deque">Deque (O(n))</option>
        <option value="brute">Brute-force (O(n·k))</option>
      </select>

      <label> Tie-breaking on equal values:</label>
      <select id="tieBreak">
        <option value="right">Prefer newest (pop when equal)</option>
        <option value="left">Prefer oldest (do not pop on equal)</option>
      </select>

      <label> Circular:</label>
      <input id="circular" type="checkbox">
      <label> Streaming mode:</label>
      <input id="streaming" type="checkbox">
    </div>
  </div>

  <div class="group">
    <div class="row">
      <button id="runFull">Run Full</button>
      <button id="resetRun">Reset</button>
      <button id="stepBack">Step Back</button>
      <button id="stepForward">Step Forward</button>
      <button id="playPause">Play</button>
      <label> Speed(ms): </label><input id="speed" type="number" value="600" style="width:80px">
      <label> Show indices:</label><input id="showIndices" type="checkbox" checked>
      <label> Show values:</label><input id="showValues" type="checkbox" checked>
      <label> Detailed ops:</label><input id="showOps" type="checkbox" checked>
    </div>

    <div class="row">
      <button id="stepExplain">Explain Current Step</button>
      <button id="exportJSON">Export Snapshot</button>
      <button id="importJSON">Import Snapshot</button>
      <input id="importText" size="60" placeholder="Paste JSON here then click Import">
      <button id="undoBtn">Undo</button>
      <button id="redoBtn">Redo</button>
    </div>
  </div>

  <div class="group">
    <strong>Streaming Controls (when streaming mode is on):</strong>
    <div class="row">
      <button id="streamAdd">Add Next Element</button>
      <button id="streamRemove">Remove Oldest</button>
      <label> Auto-add interval(ms):</label><input id="streamInterval" type="number" value="800" style="width:80px">
      <button id="streamAuto">Auto Stream</button>
      <button id="streamStop">Stop Stream</button>
    </div>
    <div class="row">
      <label>Next value to push:</label><input id="nextStreamValue" size="10">
      <label>Stream capacity (max elements stored):</label><input id="streamCapacity" type="number" value="100" style="width:80px">
    </div>
  </div>

  <div class="group">
    <strong>Visualization:</strong>
    <div class="row"><pre id="arrayView"></pre></div>
    <div class="row"><pre id="windowView"></pre></div>
    <div class="row"><pre id="dequeView"></pre></div>
    <div class="row"><pre id="resultView"></pre></div>
    <div class="row"><pre id="countersView"></pre></div>
    <div class="row"><pre id="logView"></pre></div>
    <div class="row"><pre id="explainView"></pre></div>
  </div>

  <script>
    // ====== Core state and utilities ======
    (function(){
      // State
      let state = {
        arr: [],                // original array
        n: 0,
        k: 3,
        ks: [],                // multi-window sizes
        algorithm: 'deque',
        tieBreak: 'right',
        circular: false,
        streaming: false,
        streamIndex: 0,        // for streaming synthetic data
        streamAutoTimer: null,
        trace: [],             // generated steps
        stepIndex: -1,         // current step index in trace
        playing: false,
        playTimer: null,
        playSpeed: 600,
        counters: { comparisons:0, dequeOps:0, steps:0 },
        undoStack: [],
        redoStack: [],
        showIndices: true,
        showValues: true,
        showOps: true
      };

      // DOM helpers
      const $ = id => document.getElementById(id);
      const arrayInput = $('arrayInput');
      const loadArrayBtn = $('loadArray');
      const clearArrayBtn = $('clearArray');
      const randomizeBtn = $('randomize');
      const randomSize = $('randomSize');
      const randomMin = $('randomMin');
      const randomMax = $('randomMax');
      const randomSeed = $('randomSeed');
      const appendValue = $('appendValue');
      const appendBtn = $('appendBtn');
      const prependValue = $('prependValue');
      const prependBtn = $('prependBtn');
      const insertIndex = $('insertIndex');
      const insertValue = $('insertValue');
      const insertBtn = $('insertBtn');
      const kInput = $('kInput');
      const kSlider = $('kSlider');
      const kDisplay = $('kDisplay');
      const algorithmSel = $('algorithm');
      const tieBreakSel = $('tieBreak');
      const circularChk = $('circular');
      const streamingChk = $('streaming');
      const runFullBtn = $('runFull');
      const resetRunBtn = $('resetRun');
      const stepBackBtn = $('stepBack');
      const stepForwardBtn = $('stepForward');
      const playPauseBtn = $('playPause');
      const speedInput = $('speed');
      const showIndicesChk = $('showIndices');
      const showValuesChk = $('showValues');
      const showOpsChk = $('showOps');
      const stepExplainBtn = $('stepExplain');
      const exportBtn = $('exportJSON');
      const importBtn = $('importJSON');
      const importText = $('importText');
      const undoBtn = $('undoBtn');
      const redoBtn = $('redoBtn');
      const streamAddBtn = $('streamAdd');
      const streamRemoveBtn = $('streamRemove');
      const streamInterval = $('streamInterval');
      const streamAutoBtn = $('streamAuto');
      const streamStopBtn = $('streamStop');
      const nextStreamValue = $('nextStreamValue');
      const streamCapacity = $('streamCapacity');
      const arrayView = $('arrayView');
      const windowView = $('windowView');
      const dequeView = $('dequeView');
      const resultView = $('resultView');
      const countersView = $('countersView');
      const logView = $('logView');
      const explainView = $('explainView');
      const addMultiKBtn = $('addMultiK');
      const clearMultiKBtn = $('clearMultiK');
      const multiKList = $('multiKList');

      // Initialize k slider later
      function pushUndoSnapshot() {
        const snapshot = JSON.stringify({
          arr: state.arr.slice(),
          k: state.k,
          ks: state.ks.slice(),
          algorithm: state.algorithm,
          tieBreak: state.tieBreak,
          circular: state.circular,
          streaming: state.streaming
        });
        state.undoStack.push(snapshot);
        if (state.undoStack.length > 50) state.undoStack.shift();
        state.redoStack = [];
        updateUndoRedoButtons();
      }
      function applySnapshot(snapStr) {
        try {
          const s = JSON.parse(snapStr);
          state.arr = s.arr.slice();
          state.k = s.k;
          state.ks = (s.ks||[]).slice();
          state.algorithm = s.algorithm;
          state.tieBreak = s.tieBreak;
          state.circular = s.circular;
          state.streaming = s.streaming;
          syncControlsFromState();
          rebuildTraceAndRender();
        } catch(e){ alert('Invalid snapshot'); }
      }
      function updateUndoRedoButtons() {
        undoBtn.disabled = state.undoStack.length===0;
        redoBtn.disabled = state.redoStack.length===0;
      }

      // Parse array text
      function parseArrayText(text) {
        if (!text.trim()) return [];
        const parts = text.trim().split(/[\s,]+/);
        const arr = [];
        for (let p of parts) {
          if (p==='') continue;
          const num = Number(p);
          if (isNaN(num)) {
            // allow strings? For this demo only numbers are handled.
            continue;
          }
          arr.push(num);
        }
        return arr;
      }

      function formatArrayDisplay(arr) {
        if (!arr.length) return '(empty array)';
        const parts = [];
        for (let i=0;i<arr.length;i++){
          const idx = '['+i+']';
          const val = String(arr[i]);
          parts.push(idx + ' ' + val);
        }
        return parts.join('  ');
      }

      // Build trace for deque algorithm or brute force
      function buildTrace() {
        state.trace = [];
        state.counters = { comparisons:0, dequeOps:0, steps:0 };
        const arr = state.arr.slice();
        const n = arr.length;
        if (n===0) return;
        const k = Math.max(1, Math.min(state.k, n));
        // If circular, extend by k-1 to simulate wrap
        let procArr = arr.slice();
        let indicesOffset = 0;
        if (state.circular) {
          const extra = procArr.slice(0, k-1);
          procArr = procArr.concat(extra);
        }
        if (state.algorithm === 'deque') {
          const deque = []; // will store indices (into procArr)
          for (let i=0;i<procArr.length;i++) {
            const step = { i:i, val: procArr[i], removedFromBack: [], removedFromFront: null, pushed: i, dequeBefore: deque.slice(), dequeAfter: null, windowStart:null, windowEnd:null, output:null, notes:[] };
            // Remove from back while new value is better
            while (deque.length>0) {
              state.counters.comparisons++;
              const backIdx = deque[deque.length-1];
              const backVal = procArr[backIdx];
              let shouldPop;
              if (state.tieBreak === 'right') {
                // prefer newest -> pop on >= so rightmost wins ties
                shouldPop = (procArr[i] >= backVal);
              } else {
                // prefer oldest -> pop only if strictly greater
                shouldPop = (procArr[i] > backVal);
              }
              if (shouldPop) {
                const removed = deque.pop();
                state.counters.dequeOps++;
                step.removedFromBack.push({ idx:removed, val: backVal });
                step.notes.push('Popped back idx '+removed+' val '+backVal);
              } else break;
            }
            // Push back current index
            deque.push(i);
            state.counters.dequeOps++;
            // Remove from front if out of window (only when we have reached full window size)
            const startIdx = i - (k-1);
            if (startIdx > 0) {
              // front index must be >= startIdx
              if (deque.length>0 && deque[0] < startIdx) {
                const removed = deque.shift();
                state.counters.dequeOps++;
                step.removedFromFront = { idx: removed, val: procArr[removed] };
                step.notes.push('Popped front idx '+removed+' val '+procArr[removed]);
              }
            }
            step.dequeAfter = deque.slice();
            step.windowStart = Math.max(0, startIdx);
            step.windowEnd = i;
            if (i >= k-1) {
              const outIdx = deque[0];
              step.output = { idx: outIdx, val: procArr[outIdx] };
            }
            state.trace.push(step);
            state.counters.steps++;
            // For circular mode, we should only create outputs for the first n windows if processed length > n
            if (state.circular && i >= k-1 && i - (k-1) >= n) {
              // do nothing; this extra window is beyond first n windows
            }
          }
        } else {
          // brute force: for each window starting position compute max by scanning
          const maxStart = state.circular ? n : (n - k + 1);
          for (let start = 0; start < maxStart; start++) {
            const step = { start: start, k: k, checks: [], maxIdx: null, maxVal: null, comparisons:0 };
            let bestIdx = start;
            let bestVal = procArr[start];
            for (let j=1;j<k;j++) {
              const idx = start + j;
              const val = procArr[idx];
              step.checks.push({ idx: idx, val: val, compareWith: bestVal });
              state.counters.comparisons++; step.comparisons++;
              if (val > bestVal || (val===bestVal && state.tieBreak==='right')) {
                bestVal = val; bestIdx = idx;
              }
            }
            step.maxIdx = bestIdx; step.maxVal = bestVal;
            state.trace.push(step);
            state.counters.steps++;
          }
        }
      }

      // Render functions
      function renderAll() {
        // array display
        arrayView.textContent = 'Array: ' + formatArrayDisplay(state.arr);
        // k display
        kDisplay.textContent = 'k = ' + state.k;
        kSlider.max = Math.max(1, state.arr.length || 1);
        kSlider.value = state.k;
        kInput.value = state.k;
        // multi-k
        multiKList.textContent = state.ks.length ? ('Multi windows: ['+state.ks.join(', ')+']') : 'Multi windows: (none)';

        // windowView & resultView
        if (state.trace.length===0) {
          windowView.textContent = '(no trace yet)';
          dequeView.textContent = '';
          resultView.textContent = '';
          countersView.textContent = 'Counters: ' + JSON.stringify(state.counters);
          logView.textContent = '';
          explainView.textContent = '';
          return;
        }

        // Based on current stepIndex show information
        let si = state.stepIndex;
        if (si < 0) si = 0;
        if (si >= state.trace.length) si = state.trace.length-1;
        const st = state.trace[si];

        // Show window/step context
        if (state.algorithm === 'deque') {
          const sb = [];
          sb.push('Step ' + si + ' / ' + (state.trace.length-1));
          sb.push('Processing index i = ' + st.i + ' (value = ' + st.val + ')');
          sb.push('Window range in processed array: start=' + st.windowStart + ' end=' + st.windowEnd);
          if (st.output) sb.push('Output available: max idx=' + st.output.idx + ' value=' + st.output.val);
          windowView.textContent = sb.join('\n');
          // Deque view
          const dq = [];
          dq.push('Deque before step: ' + formatDequeIndices(st.dequeBefore, state.arr, st));
          dq.push('Removed from back in this step: ' + (st.removedFromBack.length ? st.removedFromBack.map(x=>'['+x.idx+']='+x.val).join(', ') : '(none)'));
          dq.push('Removed from front in this step: ' + (st.removedFromFront ? ('['+st.removedFromFront.idx+']='+st.removedFromFront.val) : '(none)'));
          dq.push('Deque after step: ' + formatDequeIndices(st.dequeAfter, state.arr, st));
          dequeView.textContent = dq.join('\n');

          // Result view: show outputs up to this step
          const outputs = [];
          for (let t=0;t<=si;t++){
            const s = state.trace[t];
            if (s.output) {
              // Map output idx back into original array for circular mode
              const originalIdx = mapProcessedIdxToOriginal(s.output.idx);
              outputs.push({ windowEndIdx: s.i, maxIdxProc: s.output.idx, maxVal: s.output.val, maxIdxOrig: originalIdx });
            }
          }
          const resParts = outputs.map((o,ii)=> {
            const wstart = o.windowEndIdx - (state.k-1);
            const wstartOrig = mapProcessedIdxToOriginal(Math.max(0,wstart));
            return 'Window #' + ii + ' (proc end ' + o.windowEndIdx + '): max value=' + o.maxVal + ' (proc idx ' + o.maxIdxProc + ', orig idx ' + o.maxIdxOrig + ')';
          });
          resultView.textContent = 'Results so far:\n' + (resParts.length ? resParts.join('\n') : '(none)');
        } else {
          // brute force
          const sb = [];
          sb.push('Brute-force windows: showing step ' + si + ' / ' + (state.trace.length-1));
          sb.push('Window start = ' + st.start + ' length k=' + st.k);
          sb.push('Checks: ' + st.checks.map(c=>'['+c.idx+']='+c.val+' vs best='+c.compareWith).join(', '));
          sb.push('Result: max idx=' + st.maxIdx + ' val=' + st.maxVal);
          windowView.textContent = sb.join('\n');
          dequeView.textContent = '';
          // Results up to this step
          const results = state.trace.slice(0, si+1).map((s,idx)=>('Window '+idx+': max='+s.maxVal+' idx='+s.maxIdx));
          resultView.textContent = results.join('\n');
        }

        countersView.textContent = 'Counters: steps=' + state.counters.steps + ' comparisons=' + state.counters.comparisons + ' dequeOps=' + state.counters.dequeOps;

        // Log view: list of steps with short summary
        const lines = [];
        for (let t=0;t<state.trace.length;t++){
          const s = state.trace[t];
          if (state.algorithm === 'deque') {
            const out = s.output ? (' -> max '+s.output.val+'(idx:'+s.output.idx+')') : '';
            lines.push((t===state.stepIndex?'> ':'   ') + 'i=' + s.i + ' val=' + s.val + out);
          } else {
            lines.push((t===state.stepIndex?'> ':'   ') + 'start=' + s.start + ' max=' + s.maxVal);
          }
        }
        logView.textContent = lines.join('\n');
        // Explain view empty by default (fill when user asks)
        explainView.textContent = '';

        function formatDequeIndices(deq, baseArr, step) {
          if (!deq || !deq.length) return '(empty)';
          // Map processed indices back to original for display if circular
          return deq.map(idx => {
            const orig = mapProcessedIdxToOriginal(idx);
            return '['+idx+']='+ (baseArr[idx]!==undefined?baseArr[idx]:'?') + '(orig:'+orig+')';
          }).join(', ');
        }
      }

      function mapProcessedIdxToOriginal(procIdx) {
        if (!state.circular) return procIdx;
        const n = state.arr.length;
        if (procIdx < n) return procIdx;
        return procIdx % n;
      }

      // Rebuild trace and reset step
      function rebuildTraceAndRender() {
        buildTrace();
        if (state.trace.length>0) {
          state.stepIndex = 0;
        } else {
          state.stepIndex = -1;
        }
        renderAll();
      }

      // Play controls
      function play() {
        if (state.playing) return;
        state.playing = true;
        playPauseBtn.textContent = 'Pause';
        const tick = () => {
          if (!state.playing) return;
          stepForward();
          if (state.stepIndex >= state.trace.length-1) {
            // stop at end
            pause();
            return;
          }
          state.playTimer = setTimeout(tick, Math.max(10, state.playSpeed));
        };
        state.playTimer = setTimeout(tick, Math.max(10, state.playSpeed));
      }
      function pause() {
        state.playing = false;
        playPauseBtn.textContent = 'Play';
        if (state.playTimer) { clearTimeout(state.playTimer); state.playTimer = null; }
      }

      function stepForward() {
        if (state.trace.length===0) return;
        state.stepIndex = Math.min(state.trace.length-1, (state.stepIndex<0?0:state.stepIndex+1));
        renderAll();
      }
      function stepBack() {
        if (state.trace.length===0) return;
        state.stepIndex = Math.max(0, state.stepIndex-1);
        renderAll();
      }
      function resetRun() {
        if (state.trace.length===0) return;
        state.stepIndex = 0;
        renderAll();
      }

      // Explain current step in more detail
      function explainCurrentStep() {
        if (state.trace.length===0 || state.stepIndex<0) { explainView.textContent = '(no step)'; return; }
        const s = state.trace[state.stepIndex];
        const lines = [];
        if (state.algorithm === 'deque') {
          lines.push('Detailed explanation for step i=' + s.i + ' value=' + s.val);
          lines.push('Start with deque (indices): ' + (s.dequeBefore.length? s.dequeBefore.join(', ') : '(empty)'));
          if (s.removedFromBack.length) {
            lines.push('During this step, from back we removed: ' + s.removedFromBack.map(x=>'['+x.idx+']='+x.val).join(', '));
          } else {
            lines.push('No removals from back.');
          }
          if (s.removedFromFront) {
            lines.push('Also removed from front (out of window): ['+s.removedFromFront.idx+']='+s.removedFromFront.val);
          }
          lines.push('After operations, deque is: ' + (s.dequeAfter.length? s.dequeAfter.join(', ') : '(empty)'));
          if (s.output) {
            const origIdx = mapProcessedIdxToOriginal(s.output.idx);
            lines.push('Since i >= k-1, we output max = ' + s.output.val + ' (proc idx ' + s.output.idx + ', orig idx ' + origIdx + ')');
          } else {
            lines.push('No output yet, window not full.');
          }
          if (state.showOps) {
            lines.push('Notes: ' + (s.notes.length? s.notes.join('; ') : '(none)'));
          }
        } else {
          lines.push('Brute-force detail for window start=' + s.start);
          lines.push('Comparisons done: ' + (s.checks.length? s.checks.length : 0));
          s.checks.forEach((c, idx) => {
            lines.push('Compare proc index ' + c.idx + ' val=' + c.val + ' with current best ' + c.compareWith);
          });
          lines.push('Selected max idx=' + s.maxIdx + ' value=' + s.maxVal);
        }
        explainView.textContent = lines.join('\n');
      }

      // Export/import
      function exportSnapshot() {
        const payload = {
          arr: state.arr.slice(),
          k: state.k,
          ks: state.ks.slice(),
          algorithm: state.algorithm,
          tieBreak: state.tieBreak,
          circular: state.circular,
          streaming: state.streaming
        };
        const text = JSON.stringify(payload, null, 2);
        const win = window.open('', '_blank');
        win.document.write('<pre>' + text + '</pre>');
      }
      function importSnapshotFromText(text) {
        try {
          const obj = JSON.parse(text);
          pushUndoSnapshot();
          applySnapshot(JSON.stringify(obj));
        } catch(e){
          alert('Invalid JSON');
        }
      }

      // Helpers for UI-state sync
      function syncControlsFromState() {
        arrayInput.value = state.arr.join(', ');
        kInput.value = state.k;
        kSlider.value = state.k;
        algorithmSel.value = state.algorithm;
        tieBreakSel.value = state.tieBreak;
        circularChk.checked = state.circular;
        streamingChk.checked = state.streaming;
        showIndicesChk.checked = state.showIndices;
        showValuesChk.checked = state.showValues;
        showOpsChk.checked = state.showOps;
      }

      // UI event handlers
      loadArrayBtn.addEventListener('click', () => {
        const arr = parseArrayText(arrayInput.value);
        pushUndoSnapshot();
        state.arr = arr;
        state.n = arr.length;
        if (state.k > state.n) state.k = Math.max(1, state.n);
        rebuildTraceAndRender();
      });
      clearArrayBtn.addEventListener('click', () => {
        pushUndoSnapshot();
        state.arr = [];
        state.n = 0;
        state.k = 1;
        rebuildTraceAndRender();
      });
      randomizeBtn.addEventListener('click', () => {
        pushUndoSnapshot();
        const size = Math.max(1, Number(randomSize.value)||1);
        const min = Number(randomMin.value) || 0;
        const max = Number(randomMax.value) || 10;
        const seed = randomSeed.value || null;
        let rng;
        if (seed) {
          // simple seeded RNG using xmur3 + mulberry32
          function xmur3(str) {
            for(var i=0,x=0;i<str.length;i++) x = (x<<5) - x + str.charCodeAt(i);
            return function() {
              x += 0x6D2B79F5;
              var t = Math.imul(x ^ x>>>15, 1 | x);
              t = t + Math.imul(t ^ t>>>7, 61 | t) ^ t;
              return ((t ^ t>>>14) >>> 0) / 4294967296;
            }
          }
          rng = xmur3(seed);
        } else {
          rng = Math.random;
        }
        const arr = [];
        for (let i=0;i<size;i++) {
          const r = rng();
          const val = min + Math.floor(r * ((max-min+1)||1));
          arr.push(val);
        }
        state.arr = arr;
        state.n = arr.length;
        if (state.k > state.n) state.k = Math.max(1, state.n);
        rebuildTraceAndRender();
      });

      appendBtn.addEventListener('click', () => {
        const v = Number(appendValue.value);
        if (appendValue.value==='') return;
        pushUndoSnapshot();
        state.arr.push(v);
        state.n = state.arr.length;
        if (state.k > state.n) state.k = Math.max(1, state.n);
        rebuildTraceAndRender();
      });
      prependBtn.addEventListener('click', () => {
        const v = Number(prependValue.value);
        if (prependValue.value==='') return;
        pushUndoSnapshot();
        state.arr.unshift(v);
        state.n = state.arr.length;
        if (state.k > state.n) state.k = Math.max(1, state.n);
        rebuildTraceAndRender();
      });
      insertBtn.addEventListener('click', () => {
        const idx = Number(insertIndex.value);
        const v = Number(insertValue.value);
        if (isNaN(idx) || insertValue.value==='') return;
        pushUndoSnapshot();
        const clamped = Math.max(0, Math.min(state.arr.length, idx));
        state.arr.splice(clamped, 0, v);
        state.n = state.arr.length;
        if (state.k > state.n) state.k = Math.max(1, state.n);
        rebuildTraceAndRender();
      });

      kInput.addEventListener('change', () => {
        const k = Math.max(1, Math.min(Number(kInput.value)||1, Math.max(1,state.arr.length||1)));
        state.k = k;
        kSlider.max = Math.max(1, state.arr.length||1);
        kSlider.value = k;
        rebuildTraceAndRender();
      });
      kSlider.addEventListener('input', () => {
        const k = Math.max(1, Math.min(Number(kSlider.value)||1, Math.max(1,state.arr.length||1)));
        state.k = k;
        kInput.value = k;
        rebuildTraceAndRender();
      });

      algorithmSel.addEventListener('change', () => {
        state.algorithm = algorithmSel.value;
        pushUndoSnapshot();
        rebuildTraceAndRender();
      });
      tieBreakSel.addEventListener('change', () => {
        state.tieBreak = tieBreakSel.value;
        pushUndoSnapshot();
        rebuildTraceAndRender();
      });
      circularChk.addEventListener('change', () => {
        state.circular = circularChk.checked;
        pushUndoSnapshot();
        rebuildTraceAndRender();
      });
      streamingChk.addEventListener('change', () => {
        state.streaming = streamingChk.checked;
        pushUndoSnapshot();
        rebuildTraceAndRender();
      });

      runFullBtn.addEventListener('click', () => {
        rebuildTraceAndRender();
        // jump to end
        if (state.trace.length>0) {
          state.stepIndex = state.trace.length-1;
          renderAll();
        }
      });
      resetRunBtn.addEventListener('click', () => {
        resetRun();
      });
      stepBackBtn.addEventListener('click', () => { stepBack(); });
      stepForwardBtn.addEventListener('click', () => { stepForward(); });
      playPauseBtn.addEventListener('click', () => {
        state.playSpeed = Math.max(10, Number(speedInput.value) || 600);
        if (state.playing) pause(); else play();
      });
      speedInput.addEventListener('change', () => {
        state.playSpeed = Math.max(10, Number(speedInput.value) || 600);
      });

      showIndicesChk.addEventListener('change', ()=>{ state.showIndices = showIndicesChk.checked; renderAll(); });
      showValuesChk.addEventListener('change', ()=>{ state.showValues = showValuesChk.checked; renderAll(); });
      showOpsChk.addEventListener('change', ()=>{ state.showOps = showOpsChk.checked; renderAll(); });

      stepExplainBtn.addEventListener('click', () => { explainCurrentStep(); });

      exportBtn.addEventListener('click', () => exportSnapshot());
      importBtn.addEventListener('click', () => {
        const txt = importText.value;
        if (!txt) { alert('Paste snapshot JSON into the text box first.'); return; }
        pushUndoSnapshot();
        importSnapshotFromText(txt);
      });

      undoBtn.addEventListener('click', () => {
        if (state.undoStack.length===0) return;
        const snap = state.undoStack.pop();
        state.redoStack.push(JSON.stringify({
          arr: state.arr.slice(),
          k: state.k,
          ks: state.ks.slice(),
          algorithm: state.algorithm,
          tieBreak: state.tieBreak,
          circular: state.circular,
          streaming: state.streaming
        }));
        applySnapshot(snap);
        updateUndoRedoButtons();
      });
      redoBtn.addEventListener('click', () => {
        if (state.redoStack.length===0) return;
        const snap = state.redoStack.pop();
        state.undoStack.push(JSON.stringify({
          arr: state.arr.slice(),
          k: state.k,
          ks: state.ks.slice(),
          algorithm: state.algorithm,
          tieBreak: state.tieBreak,
          circular: state.circular,
          streaming: state.streaming
        }));
        applySnapshot(snap);
        updateUndoRedoButtons();
      });

      // Streaming controls
      let streamAutoTimer = null;
      streamAddBtn.addEventListener('click', () => {
        if (!state.streaming) { alert('Enable streaming mode first'); return; }
        const vStr = nextStreamValue.value;
        if (vStr==='') {
          alert('Enter a next value to push into the stream');
          return;
        }
        const v = Number(vStr);
        // push into arr and rebuild trace but keep sliding as streaming: we want to process only new appended elements
        pushUndoSnapshot();
        state.arr.push(v);
        if (state.arr.length > Number(streamCapacity.value) && Number(streamCapacity.value)>0) {
          state.arr.shift();
        }
        rebuildTraceAndRender();
        // move stepIndex to last
        if (state.trace.length>0) state.stepIndex = state.trace.length-1;
        renderAll();
      });
      streamRemoveBtn.addEventListener('click', () => {
        if (!state.streaming) { alert('Enable streaming mode first'); return; }
        if (state.arr.length===0) return;
        pushUndoSnapshot();
        state.arr.shift();
        rebuildTraceAndRender();
      });
      streamAutoBtn.addEventListener('click', () => {
        if (!state.streaming) { alert('Enable streaming mode first'); return; }
        if (streamAutoTimer) return;
        const interval = Math.max(50, Number(streamInterval.value) || 800);
        streamAutoTimer = setInterval(() => {
          // if nextStreamValue has numbers separated by commas we can cycle, otherwise random numbers
          const vStr = nextStreamValue.value;
          let v;
          if (vStr.indexOf(',')>=0) {
            const parts = vStr.split(',').map(s=>s.trim()).filter(s=>s!=='');
            if (parts.length) {
              const p = parts[state.streamIndex % parts.length];
              v = Number(p);
            } else v = Math.floor(Math.random()*10);
          } else if (vStr==='_rand' || vStr==='_random' || vStr==='') {
            v = Math.floor(Math.random()*20);
          } else {
            v = Number(vStr);
            if (isNaN(v)) v = Math.floor(Math.random()*20);
          }
          state.arr.push(v);
          if (state.arr.length > Number(streamCapacity.value) && Number(streamCapacity.value)>0) {
            state.arr.shift();
          }
          state.streamIndex++;
          rebuildTraceAndRender();
          if (state.trace.length>0) state.stepIndex = state.trace.length-1;
          renderAll();
        }, interval);
        streamAutoBtn.disabled = true;
        streamStopBtn.disabled = false;
      });
      streamStopBtn.addEventListener('click', () => {
        if (streamAutoTimer) {
          clearInterval(streamAutoTimer);
          streamAutoTimer = null;
        }
        streamAutoBtn.disabled = false;
        streamStopBtn.disabled = true;
      });

      // Multi-k management
      addMultiKBtn.addEventListener('click', () => {
        const v = Number(kInput.value)||1;
        if (!state.ks.includes(v)) {
          state.ks.push(v);
          rebuildTraceAndRender();
        }
      });
      clearMultiKBtn.addEventListener('click', () => {
        state.ks = [];
        rebuildTraceAndRender();
      });

      // Allow clicking in log to jump to a step (simple: click in logView to set step by line number)
      logView.addEventListener('click', (ev) => {
        const txt = logView.textContent;
        const pos = logView.selectionStart || 0;
        // approximate: compute clicked line by vertical offset: use caret position approach
        // fallback: prompt for step
        const input = prompt('Enter step index to jump to (0..' + Math.max(0, state.trace.length-1) + ')');
        const num = Number(input);
        if (!isNaN(num) && num>=0 && num < state.trace.length) {
          state.stepIndex = num;
          renderAll();
        }
      });

      // Keyboard shortcuts: n=next, p=prev, space=play/pause
      document.addEventListener('keydown', (e) => {
        if (e.key === 'n') stepForward();
        if (e.key === 'p') stepBack();
        if (e.key === ' ') { e.preventDefault(); if (state.playing) pause(); else play(); }
      });

      // Utility: map values for multi-k exploration (compute results for each k)
      function computeMultiWindowResults() {
        if (!state.ks.length) return null;
        const results = {};
        for (let k of state.ks) {
          const res = runOnceForK(k);
          results[k] = res;
        }
        return results;
      }
      function runOnceForK(k) {
        const arr = state.arr.slice();
        const n = arr.length;
        if (n === 0) return [];
        const kk = Math.max(1, Math.min(k, n));
        const output = [];
        if (!state.circular) {
          if (state.algorithm === 'deque') {
            const deque = [];
            for (let i=0;i<n;i++){
              while (deque.length && (state.tieBreak==='right' ? arr[i] >= arr[deque[deque.length-1]] : arr[i] > arr[deque[deque.length-1]])) deque.pop();
              deque.push(i);
              if (deque[0] <= i - kk) deque.shift();
              if (i >= kk-1) output.push(arr[deque[0]]);
            }
          } else {
            for (let start=0; start+kk<=n; start++) {
              let best = arr[start];
              for (let j=1;j<kk;j++){
                const val = arr[start+j];
                if (val > best || (val===best && state.tieBreak==='right')) best = val;
              }
              output.push(best);
            }
          }
        } else {
          // circular: extend
          const ext = arr.concat(arr.slice(0, kk-1));
          const limit = n;
          if (state.algorithm === 'deque') {
            const deque = [];
            for (let i=0;i<ext.length;i++){
              while (deque.length && (state.tieBreak==='right' ? ext[i] >= ext[deque[deque.length-1]] : ext[i] > ext[deque[deque.length-1]])) deque.pop();
              deque.push(i);
              if (deque[0] <= i - kk) deque.shift();
              if (i >= kk-1 && i - (kk-1) < limit) output.push(ext[deque[0]]);
            }
          } else {
            for (let start=0; start<limit; start++){
              let best = ext[start];
              for (let j=1;j<kk;j++){
                const val = ext[start+j];
                if (val > best || (val===best && state.tieBreak==='right')) best = val;
              }
              output.push(best);
            }
          }
        }
        return output;
      }

      // Helper: when user clicks "Run Full" we also compute multi-window results and show summary in explainView
      runFullBtn.addEventListener('click', () => {
        rebuildTraceAndRender();
        const mres = computeMultiWindowResults();
        if (mres) {
          const lines = ['Multi-window results:'];
          for (const k in mres) {
            lines.push('k=' + k + ' => [' + mres[k].join(', ') + ']');
          }
          explainView.textContent = lines.join('\n');
        }
      });

      // Initialize default state and render
      function init() {
        // set initial array from input
        state.arr = parseArrayText(arrayInput.value);
        state.n = state.arr.length;
        state.k = Math.max(1, Math.min(Number(kInput.value) || 1, Math.max(1, state.n || 1)));
        state.playSpeed = Number(speedInput.value) || 600;
        syncControlsFromState();
        pushUndoSnapshot();
        rebuildTraceAndRender();
        updateUndoRedoButtons();
        streamStopBtn.disabled = true;
      }

      init();

      // Expose some debug on window for advanced exploration
      window._slidingWindowState = state;
      window._rebuildTrace = rebuildTraceAndRender;
      window._computeForK = runOnceForK;
      window._exportState = () => JSON.stringify({
        arr: state.arr, k: state.k, ks: state.ks, algorithm: state.algorithm, tieBreak:state.tieBreak, circular: state.circular, streaming: state.streaming
      });

    })();
  </script>
</body>
</html>
