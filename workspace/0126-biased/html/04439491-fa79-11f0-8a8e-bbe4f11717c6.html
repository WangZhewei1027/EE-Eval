<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduling</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: bold;
        }
        
        .header p {
            font-size: 18px;
            color: #666;
        }
        
        .content {
            padding: 20px;
            background-color: #f9f9f9;
        }
        
        .content h2 {
            font-size: 18px;
            font-weight: bold;
        }
        
        .content p {
            font-size: 16px;
            color: #666;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
        }
        
        .footer p {
            font-size: 14px;
            color: #666;
        }
        
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CPU Scheduling</h1>
            <p>Learn how CPU scheduling works.</p>
        </div>
        <div class="content">
            <h2>CPU Scheduling Process</h2>
            <p>The CPU scheduling process is a critical component of computer architecture.</p>
            <p>Here's a step-by-step explanation:</p>
            <ol>
                <li>Preemptive Scheduling</li>
                <li>Non-Preemptive Scheduling</li>
            </ol>
        </div>
        <div class="footer">
            <p>&copy; 2023 CPU Scheduling</p>
        </div>
    </div>
    <script>
        // Define the CPU scheduling process
        const schedulingProcess = [
            {
                name: 'Preemptive Scheduling',
                description: 'The CPU is preempted by the operating system and given a short burst of time.',
                steps: [
                    {
                        name: 'Scheduling Algorithm',
                        description: 'A scheduling algorithm is used to determine which process to run next.',
                    },
                    {
                        name: 'Preemptive Interrupt',
                        description: 'The operating system interrupts the process to take control.',
                    },
                ],
            },
            {
                name: 'Non-Preemptive Scheduling',
                description: 'The CPU continues to run processes without interruption.',
                steps: [
                    {
                        name: 'Process Completion',
                        description: 'The process completes its execution time.',
                    },
                    {
                        name: 'Process Scheduling',
                        description: 'The operating system schedules the next process.',
                    },
                ],
            },
        ];

        // Function to display the CPU scheduling process
        function displaySchedulingProcess() {
            const process = schedulingProcess[0];
            const steps = process.steps;
            const html = steps.map((step) => {
                return `
                    <li>
                        <h3>${step.name}</h3>
                        <p>${step.description}</p>
                    </li>
                `;
            }).join('');
            document.getElementById('scheduling-process').innerHTML = html;
        }

        // Function to display the CPU scheduling process on hover
        function displaySchedulingProcessOnHover() {
            const process = schedulingProcess[0];
            const steps = process.steps;
            const html = steps.map((step) => {
                return `
                    <li>
                        <h3>${step.name}</h3>
                        <p>${step.description}</p>
                        <p>Hover over to learn more</p>
                    </li>
                `;
            }).join('');
            document.getElementById('scheduling-process-on-hover').innerHTML = html;
        }

        // Add event listeners to the buttons
        document.getElementById('preemptive-scheduling-button').addEventListener('click', displaySchedulingProcess);
        document.getElementById('non-preemptive-scheduling-button').addEventListener('click', displaySchedulingProcessOnHover);

        // Initialize the scheduling process
        displaySchedulingProcess();
    </script>
</body>
</html>
