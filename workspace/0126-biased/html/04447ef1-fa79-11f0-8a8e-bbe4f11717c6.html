<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Patterns</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            background-color: #4CAF50;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 20px;
        }
        
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        
        .button:hover {
            background-color: #3e8e41;
        }
        
        .footer {
            background-color: #4CAF50;
            color: #fff;
            padding: 20px;
            text-align: center;
            clear: both;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Design Patterns</h1>
            <p>This is a simple design pattern page.</p>
        </div>
        <div class="content">
            <h2>Design Patterns</h2>
            <p>Design patterns are reusable solutions for common problems in software design.</p>
            <h2>Creational Patterns</h2>
            <p>Creatational patterns are about creating objects and classes.</p>
            <p><a href="#" class="button">Learn More</a></p>
        </div>
        <div class="footer">
            <p>&copy; 2023</p>
        </div>
    </div>
    <script>
        function createObject() {
            console.log("Creating object...");
        }
        
        function createClass() {
            console.log("Creating class...");
        }
        
        createObject();
        createClass();
    </script>
</body>
</html>
