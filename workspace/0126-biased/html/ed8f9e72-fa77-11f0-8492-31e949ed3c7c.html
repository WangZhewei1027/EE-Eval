<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agile Methodology</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f2f4f8, #e1e9ee);
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: #333;
        }
        header {
            background: #008cba;
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }
        h1 {
            font-size: 3rem;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
            overflow: hidden;
            position: relative;
        }
        .content {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            padding: 30px;
            max-width: 800px;
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .button {
            background: #f39c12;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background 0.3s, transform 0.3s;
        }
        .button:hover {
            background: #e67e22;
            transform: translateY(-2px);
        }
        .footer {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #555;
        }
        .graphic {
            background: url('https://www.agilealliance.org/wp-content/uploads/2020/08/agile-methodology-illustration.jpg') no-repeat center center;
            background-size: cover;
            height: 400px;
            border-radius: 15px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Agile Methodology</h1>
    </header>
    <div class="container">
        <div class="content">
            <div class="graphic"></div>
            <h2>The Agile Mindset</h2>
            <p>Agile methodology focuses on delivering small, functional parts of a project quickly and iteratively. This promotes flexibility, collaboration and customer satisfaction.</p>
            <button class="button" onclick="showMore()">Learn More</button>
        </div>
    </div>
    <div class="footer">
        &copy; 2023 Agile Concepts. All rights reserved.
    </div>

    <script>
        function showMore() {
            alert("Agile encourages adaptive planning, evolutionary development, and ongoing improvement.");
        }
    </script>
</body>
</html>
