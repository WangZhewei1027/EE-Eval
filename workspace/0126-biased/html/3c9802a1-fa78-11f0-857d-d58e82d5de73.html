<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Topological Sort — Visualized Elegance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

  /* Reset and base */
  * {
    box-sizing: border-box;
    margin: 0; padding: 0;
  }
  html, body {
    height: 100%;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Montserrat', sans-serif;
    color: #fafafa;
    overflow: hidden;
  }

  #container {
    min-height: 100vh;
    padding: 3rem 2rem 5rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 3.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #f0eae8;
    text-shadow:
      0 0 7px #ffb74d99,
      0 0 20px #ff6f0099,
      0 0 30px #ff6f0022;
    margin-bottom: 1.2rem;
  }

  p.subtitle {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 1.2rem;
    letter-spacing: 0.04em;
    color: #b0bebfcc;
    max-width: 460px;
    margin-bottom: 3.5rem;
    user-select: text;
  }

  #canvas-wrapper {
    position: relative;
    width: 760px;
    height: 480px;
    background:
      radial-gradient(circle at center, #152f4d 40%, #0b1c2c 90%);
    border-radius: 18px;
    box-shadow:
      0 0 50px 6px #ff6f00aa inset,
      0 12px 40px #ff6f00dd;
    overflow: visible;
  }

  svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .node {
    cursor: default;
    filter: drop-shadow(0 0 2.2px #ffad4055);
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .node circle {
    fill: #ff6f00;
    stroke: #ffb74d;
    stroke-width: 2.5px;
    filter: drop-shadow(0 0 6px #ffb74dbb);
  }
  .node text {
    fill: #fff8e7;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 1.25rem;
    pointer-events: none;
    user-select: none;
    text-shadow: 0 0 4px rgba(255 255 255 / 0.25);
  }

  .edge {
    stroke: #ffa726cc;
    stroke-width: 2.2;
    fill: none;
    filter: drop-shadow(0 0 4px #ffa726aa);
    marker-end: url(#arrowhead);
    transition: stroke 0.4s ease;
  }

  /* Highlighted states during sort */
  .edge.active {
    stroke: #fff3e0;
    stroke-width: 3.8;
    filter: drop-shadow(0 0 10px #fff3e055);
  }
  .node.active circle {
    fill: #fff3e0;
    stroke: #ff6f00;
    filter: drop-shadow(0 0 14px #fff3e099);
  }
  .node.sorted circle {
    fill: #90caf9;
    stroke: #42a5f5;
    filter: drop-shadow(0 0 18px #42a5f599);
    transition: fill 1s ease, stroke 1s ease, filter 1s ease;
  }
  .node.sorted text {
    fill: #0d47a1;
    font-weight: 800;
    transition: fill 1s ease;
  }

  footer {
    margin-top: 4rem;
    font-size: 0.85rem;
    color: #ffb74dc0;
    font-family: 'Montserrat', sans-serif;
    user-select: none;
    text-align: center;
  }

  #btns {
    position: absolute;
    top: 12px;
    right: 14px;
    display: flex;
    gap: 12px;
  }

  button {
    background: linear-gradient(135deg, #ff6f00dd, #ffa726bb);
    border: none;
    border-radius: 8px;
    padding: 0.45rem 1.25rem;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    color: #fff;
    letter-spacing: 0.06em;
    cursor: pointer;
    user-select: none;
    box-shadow:
      0 3px 8px #ff6f0028,
      0 0 6px #ff6f0088 inset;
    transition:
      background 0.4s ease,
      box-shadow 0.4s ease,
      transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  button:hover,
  button:focus-visible {
    background: linear-gradient(135deg, #ffa726ff, #ffb74dcc);
    box-shadow:
      0 4px 14px #ffb74ddd,
      0 0 12px #ffb74ddd inset;
    outline: none;
  }
  button:active {
    transform: scale(0.95);
  }

  /* Tooltip */
  #tooltip {
    position: absolute;
    background: #ff6f0099;
    color: #fff3e0;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 0.25rem 0.6rem;
    border-radius: 6px;
    pointer-events: none;
    user-select: none;
    filter: drop-shadow(0 0 5px #ff6f0099);
    opacity: 0;
    transition: opacity 0.3s ease;
    white-space: nowrap;
    z-index: 5;
  }
</style>
</head>
<body>
<div id="container">
  <h1>Topological Sort</h1>
  <p class="subtitle">
    A linear ordering of the vertices in a <em>directed acyclic graph</em> so that for every directed edge <code>u → v</code>, <br /> <strong>u appears before v</strong> in the ordering.
  </p>

  <div id="canvas-wrapper" aria-label="Topological sort visualization" role="img">
    <svg viewBox="0 0 760 480" aria-hidden="true" id="graph-svg">

      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="7" 
          refX="23" refY="3.3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L8,3.3 L0,7 Z" fill="#ffa726cc"/>
        </marker>
      </defs>

      <!-- Edges -->
      <path id="edge-0-1" class="edge" d="M146 196 Q190 146 236 146" />
      <path id="edge-0-2" class="edge" d="M146 196 Q190 246 236 266" />
      <path id="edge-1-3" class="edge" d="M236 146 L340 146" />
      <path id="edge-2-3" class="edge" d="M236 266 Q280 246 343 186" />
      <path id="edge-3-4" class="edge" d="M343 186 L457 186" />
      <path id="edge-2-5" class="edge" d="M236 266 Q320 315 370 320" />
      <path id="edge-5-4" class="edge" d="M370 320 L457 186" />
      <path id="edge-4-6" class="edge" d="M457 186 L560 186" />
      <path id="edge-5-6" class="edge" d="M370 320 Q460 382 560 266" />

      <!-- Nodes -->
      <g class="node" id="node-0" transform="translate(146,196)" aria-label="Node 0">
        <circle r="30" />
        <text dominant-baseline="middle" text-anchor="middle">0</text>
      </g>
      <g class="node" id="node-1" transform="translate(236,146)" aria-label="Node 1">
        <circle r="30" />
        <text dominant-baseline="middle" text-anchor="middle">1</text>
      </g>
      <g class="node" id="node-2" transform="translate(236,266)" aria-label="Node 2">
        <circle r="30" />
        <text dominant-baseline="middle" text-anchor="middle">2</text>
      </g>
      <g class="node" id="node-3" transform="translate(343,186)" aria-label="Node 3">
        <circle r="30" />
        <text dominant-baseline="middle" text-anchor="middle">3</text>
      </g>
      <g class="node" id="node-4" transform="translate(457,186)" aria-label="Node 4">
        <circle r="30" />
        <text dominant-baseline="middle" text-anchor="middle">4</text>
      </g>
      <g class="node" id="node-5" transform="translate(370,320)" aria-label="Node 5">
        <circle r="30" />
        <text dominant-baseline="middle" text-anchor="middle">5</text>
      </g>
      <g class="node" id="node-6" transform="translate(560,186)" aria-label="Node 6">
        <circle r="30" />
        <text dominant-baseline="middle" text-anchor="middle">6</text>
      </g>

    </svg>

    <div id="btns" aria-label="Controls">
      <button id="start-btn" aria-pressed="false" aria-label="Start topological sort animation">Start Animation</button>
      <button id="reset-btn" disabled aria-label="Reset visualization to initial state">Reset</button>
    </div>
  </div>

  <footer>
    Visualization &mdash; Topological Sort Algorithm &mdash; &copy; 2024
  </footer>

</div>

<div id="tooltip" role="tooltip" aria-hidden="true"></div>

<script>
(() => {
  const graph = {
    nodes: 7,
    edges: [
      [0,1], [0,2], [1,3], [2,3], [3,4], [2,5], [5,4], [4,6], [5,6]
    ]
  };

  // References to DOM elements
  const nodesEl = Array.from({length: graph.nodes}, (_, i) => document.getElementById(`node-${i}`));
  const edgesEl = graph.edges.map(([from, to]) => document.getElementById(`edge-${from}-${to}`));
  const startBtn = document.getElementById('start-btn');
  const resetBtn = document.getElementById('reset-btn');
  const tooltip = document.getElementById('tooltip');

  // In-degree array
  let inDegree = [];
  let adjList = [];
  let sortedOrder = [];
  let animationIndex = 0;
  let animationTimer = null;

  // Initialize graph data structure
  function initGraph() {
    inDegree = Array(graph.nodes).fill(0);
    adjList = Array.from({length: graph.nodes}, () => []);
    for (const [u,v] of graph.edges) {
      adjList[u].push(v);
      inDegree[v]++;
    }
  }

  // Clear all highlights and states
  function clearAll() {
    nodesEl.forEach(n => {
      n.classList.remove('active','sorted');
      n.style.transform = 'translate(0,0)';
    });
    edgesEl.forEach(e => {
      e.classList.remove('active');
      e.style.transition = '';
      e.style.strokeDasharray = '';
      e.style.strokeDashoffset = '';
    });
    sortedOrder = [];
    animationIndex = 0;
    tooltip.style.opacity = '0';
    startBtn.disabled = false;
    startBtn.setAttribute('aria-pressed', 'false');
    resetBtn.disabled = true;
  }

  // Animate stroke dash offset for edges
  function animateEdgeHighlight(edge) {
    // Animate stroke drawing from start to end
    const length = edge.getTotalLength();
    edge.style.strokeDasharray = length;
    edge.style.strokeDashoffset = length;
    edge.style.transition = 'stroke-dashoffset 800ms ease-out, stroke 300ms';
    edge.classList.add('active');
    requestAnimationFrame(() => {
      edge.style.strokeDashoffset = '0';
    });
  }

  // Animate highlight on node with pulse effect
  function animateNodeHighlight(node) {
    node.classList.add('active');
    node.animate([
      { transform: 'scale(1)' },
      { transform: 'scale(1.13)' },
      { transform: 'scale(1)' }
    ], {
      duration: 700,
      easing: 'cubic-bezier(0.4,0,0.2,1)',
      fill: 'forwards'
    });
  }

  // Perform Kahn's topological sort step-by-step with animation
  function runTopologicalSortAnimation() {
    const queue = [];
    const inD = [...inDegree];
    const adj = adjList;

    // find all zero in-degree vertices at start
    for(let i=0; i<inD.length; i++){
      if(inD[i]===0) queue.push(i);
    }
    if(queue.length===0) return; // no valid topological sort (cycle)

    startBtn.disabled = true;
    startBtn.setAttribute('aria-pressed', 'true');
    resetBtn.disabled = false;

    animationIndex = 0;
    sortedOrder = [];
    tooltip.style.opacity = '0';

    // Custom iterative step animation
    function step() {
      if(queue.length === 0){
        // Completed - highlight sorted nodes in final style with delay
        sortedOrder.forEach((nodeIdx, i) => {
          setTimeout(() => {
            nodesEl[nodeIdx].classList.remove('active');
            nodesEl[nodeIdx].classList.add('sorted');
          }, i * 240);
        });
        return;
      }

      const nodeIdx = queue.shift();
      sortedOrder.push(nodeIdx);

      // Animate node highlight for the current visited node
      animateNodeHighlight(nodesEl[nodeIdx]);
      showTooltipOnNode(nodesEl[nodeIdx], `Processing node ${nodeIdx}`);

      // For all edges from current node, animate them and decrement in-degree
      let delay = 0;
      for(const neighbor of adj[nodeIdx]){
        // Highlight the edge node->neighbor with stroke animation
        const edgePath = document.getElementById(`edge-${nodeIdx}-${neighbor}`);
        if(edgePath){
          setTimeout(() => {
            animateEdgeHighlight(edgePath);
          }, delay);
        }
        delay += 280;
      }

      // After highlighting edges, reduce neighbors inDegree and add zero in-degree neighbors to queue
      setTimeout(() => {
        for(const neighbor of adj[nodeIdx]){
          inD[neighbor]--;
          if(inD[neighbor] === 0){
            queue.push(neighbor);
          }
        }
        animationIndex++;
        step();
      }, delay + 900);

    }
    step();
  }

  // Show tooltip next to a node with message - fade in/out
  function showTooltipOnNode(nodeEl, message) {
    const svgRect = document.getElementById('canvas-wrapper').getBoundingClientRect();
    const nodeCircle = nodeEl.querySelector('circle');
    const matrix = nodeEl.getCTM();
    const cx = +nodeCircle.getAttribute('r');
    const cy = +nodeCircle.getAttribute('r');

    // Node center coords in screen space
    const point = {
      x: matrix.e,
      y: matrix.f
    };

    tooltip.textContent = message;
    tooltip.style.opacity = '1';
    tooltip.style.left = `${svgRect.left + point.x + 36}px`;
    tooltip.style.top = `${svgRect.top + point.y - 18}px`;
    tooltip.setAttribute('aria-hidden', 'false');

    // Fade tooltip out after 1.6s
    clearTimeout(tooltip._fadeTimeout);
    tooltip._fadeTimeout = setTimeout(() => {
      tooltip.style.opacity = '0';
      tooltip.setAttribute('aria-hidden', 'true');
    }, 1600);
  }

  // On reset button click
  resetBtn.addEventListener('click', () => {
    if(animationTimer) clearTimeout(animationTimer);
    clearAll();
  });

  // Start animation on button click
  startBtn.addEventListener('click', () => {
    clearAll();
    runTopologicalSortAnimation();
  });

  // Initialize graph & UI
  initGraph();
  clearAll();

  // Accessibility: keyboard focus styles for buttons
  document.addEventListener('keydown', e => {
    if(e.key === 'Tab'){
      if(document.activeElement.tagName === 'BUTTON'){
        document.activeElement.style.boxShadow = '0 0 8px 3px #ffb74dcc';
      }
    }
  });
  document.addEventListener('focusout', e => {
    if(e.target.tagName === 'BUTTON'){
      e.target.style.boxShadow = 'none';
    }
  });
})();
</script>
</body>
</html>
