<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Monitor - Visual Showcase</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto+Slab&display=swap');

  /* Reset & Base */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }
  html, body {
    height: 100%;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Roboto Slab', serif;
    color: #e0e6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* Container that holds everything */
  .container {
    max-width: 960px;
    width: 90vw;
    aspect-ratio: 16 / 9;
    background: linear-gradient(145deg, #434a5e, #2f3443);
    border-radius: 32px;
    box-shadow:
      0 0 25px 6px #0ff,
      inset 0 0 30px #49f,
      inset 0 20px 45px -15px #77b7ff;
    position: relative;
    overflow: visible;
  }

  /* Monitor frame */
  .monitor-frame {
    position: absolute;
    top: 48px; bottom: 60px; left: 48px; right: 48px;
    border: 12px solid #0fc;
    border-radius: 24px 24px 20px 20px;
    background: #1b2332;
    box-shadow:
      inset 0 0 15px #0cf,
      0 0 20px #088,
      0 12px 24px rgba(0,204,255,0.3);
    overflow: hidden;
    backdrop-filter: brightness(0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1200px;
    transition: box-shadow 0.6s ease;
  }

  /* Monitor screen gradient effect */
  .monitor-screen {
    width: 100%;
    height: 100%;
    background:
      linear-gradient(60deg, rgba(66,135,245,0.3) 0%, transparent 25%),
      linear-gradient(120deg, rgba(0,255,255,0.15) 0%, transparent 40%),
      radial-gradient(circle at center, #0ff8 40%, transparent 80%);
    border-radius: 14px 14px 10px 10px;
    box-shadow:
      inset 0 0 70px 14px #09f8,
      0 0 48px 6px #19f8;
    position: relative;
    overflow: hidden;
    animation: screenPulse 6s ease-in-out infinite;
  }

  /* Subtle pulse animation on screen */
  @keyframes screenPulse {
    0%, 100% {
      filter: brightness(1) saturate(1);
      box-shadow:
        inset 0 0 70px 14px #09f8,
        0 0 48px 6px #19f8;
    }
    50% {
      filter: brightness(1.1) saturate(1.2);
      box-shadow:
        inset 0 0 90px 18px #0ff,
        0 0 60px 9px #2af;
    }
  }

  /* Screen content area with subtle layered effect */
  .screen-content {
    width: 90%;
    height: 90%;
    background: radial-gradient(circle at center, #092d43 55%, #062230 90%);
    border-radius: 8px;
    box-shadow:
      inset 0 0 20px #088,
      inset 0 20px 50px -10px #0bf8;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Montserrat', sans-serif;
    text-align: center;
    color: #9eefff;
    user-select: none;
  }

  /* Title inside the monitor */
  .screen-content h1 {
    font-size: 3.8rem;
    letter-spacing: 0.12rem;
    font-weight: 900;
    text-shadow:
      0 0 14px #15d8fa,
      0 3px 6px rgba(22, 195, 249, 0.3),
      0 4px 19px #0af;
    margin-bottom: 20px;
    line-height: 1.1;
    animation: flickerGlow 7s linear infinite alternate;
  }

  /* Subheading/Info */
  .screen-content p {
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: 0.07rem;
    color: #75d5ffdd;
    max-width: 75%;
    text-shadow:
      0 0 6px #15d8fa88,
      0 2px 4px #074f68aa;
    animation: subtlePulse 7s ease-in-out infinite;
  }

  /* Flickering glow on main text */
  @keyframes flickerGlow {
    0%, 100% {
      text-shadow:
        0 0 14px #15d8fa,
        0 3px 6px rgba(22, 195, 249, 0.3),
        0 4px 19px #0af;
      color: #9eefff;
    }
    45%, 55% {
      text-shadow:
        0 0 30px #57dbff,
        0 5px 15px #21c7ff,
        0 0 40px #21c7ff;
      color: #b5f0ff;
    }
    50% {
      text-shadow:
        0 0 50px #26c9ff,
        0 0 60px #0ffcff,
        0 0 80px #0fffff;
      color: #d4f8ff;
    }
  }

  /* Subtle pulsing on subtext */
  @keyframes subtlePulse {
    0%, 100% {
      opacity: 0.85;
      filter: blur(0.3px);
    }
    50% {
      opacity: 1;
      filter: blur(0);
    }
  }

  /* Bottom bezel with branding & LEDs */
  .monitor-bezel {
    position: absolute;
    bottom: 20px;
    left: 10%;
    right: 10%;
    height: 36px;
    border-radius: 0 0 28px 28px;
    background:
      linear-gradient(90deg, #0c283f, #112d40, #0d2940);
    box-shadow:
      inset 0 4px 20px #0de3ffcc,
      0 6px 18px #0ae5ff88;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    color: #06dafc;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    letter-spacing: 0.18rem;
    font-size: 1.1rem;
    text-shadow: 0 0 12px #1ae6ffcc;
  }

  /* LED lights on bezel */
  .led-container {
    display: flex;
    gap: 14px;
  }
  .led {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #0af6ff;
    box-shadow:
      0 0 15px #0af6ffaa,
      inset 0 0 6px #5fe7ffdd;
    animation: ledPulse 3.5s ease-in-out infinite;
  }
  .led:nth-child(2) {
    animation-delay: 0.4s;
  }
  .led:nth-child(3) {
    animation-delay: 0.8s;
  }

  @keyframes ledPulse {
    0%, 100% {
      opacity: 0.55;
      box-shadow:
        0 0 12px #03c7ffcc,
        inset 0 0 4px #43d5ffcc;
      transform: scale(1);
      filter: brightness(0.96);
    }
    50% {
      opacity: 1;
      box-shadow:
        0 0 22px #0afcffdd,
        inset 0 0 8px #36eeffdd;
      transform: scale(1.2);
      filter: brightness(1.3);
    }
  }

  /* Controls panel - minimalistic */
  .controls {
    position: absolute;
    top: 12px;
    right: 24px;
    display: flex;
    gap: 14px;
  }

  .btn {
    background: linear-gradient(145deg, #222c3a, #1b2330);
    border: 2px solid #06dafc88;
    border-radius: 12px;
    padding: 0.45em 1.4em;
    color: #06dafc;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    box-shadow:
      0 0 10px #06dafcbb;
    transition:
      background-color 0.3s ease,
      color 0.3s ease,
      box-shadow 0.4s ease;
    user-select: none;
  }
  .btn:hover,
  .btn:focus {
    background: #06dafc;
    color: #102e3d;
    box-shadow:
      0 0 20px #06dfffcc,
      0 0 35px #00e2ffdd;
    outline: none;
  }

  /* Simple fade in/out for content */
  .fade-enter {
    opacity: 0;
    transform: translateY(18px);
  }
  .fade-enter-active {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .fade-exit {
    opacity: 1;
    transform: translateY(0);
  }
  .fade-exit-active {
    opacity: 0;
    transform: translateY(-18px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  /* Responsive scaling */
  @media (max-width: 700px){
    .container {
      width: 95vw;
      aspect-ratio: 16 / 9;
    }
    .screen-content h1 {
      font-size: 2.8rem;
    }
    .screen-content p {
      font-size: 1rem;
      max-width: 90%;
    }
  }
</style>
</head>
<body>
  <div class="container" role="main" aria-label="Monitor presentation panel">
    <div class="monitor-frame" aria-hidden="true">
      <div class="monitor-screen" aria-hidden="true">
        <div class="screen-content" id="screen-content" aria-live="polite">
          <h1>Monitor</h1>
          <p>An epitome of visual clarity, elegance, and precision.</p>
        </div>
      </div>
    </div>

    <div class="monitor-bezel" aria-hidden="true">
      <div class="led-container" aria-hidden="true">
        <div class="led"></div>
        <div class="led"></div>
        <div class="led"></div>
      </div>
      <div>OPTICORE DISPLAY</div>
    </div>

    <div class="controls" role="region" aria-label="Content controls">
      <button type="button" id="btnToggle" class="btn" aria-pressed="false" aria-controls="screen-content" aria-live="polite">Toggle Message</button>
    </div>
  </div>

<script>
  (() => {
    const btn = document.getElementById('btnToggle');
    const content = document.getElementById('screen-content');
    let toggled = false;

    const messages = [
      {
        title: "Monitor",
        desc: "An epitome of visual clarity, elegance, and precision."
      },
      {
        title: "Experience",
        desc: "Immersive visuals with flawless design and smooth animations."
      }
    ];

    // Simple fade toggle implemented manually
    function fadeOut(element, callback){
      element.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
      element.style.opacity = '0';
      element.style.transform = 'translateY(-18px)';
      setTimeout(() => {
        callback();
        fadeIn(element);
      }, 600);
    }
    function fadeIn(element){
      element.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
      element.style.opacity = '1';
      element.style.transform = 'translateY(0)';
    }

    btn.addEventListener('click', () => {
      toggled = !toggled;
      btn.setAttribute('aria-pressed', toggled);
      fadeOut(content, () => {
        const msg = toggled ? messages[1] : messages[0];
        content.querySelector('h1').textContent = msg.title;
        content.querySelector('p').textContent = msg.desc;
      });
    });
  })();
</script>
</body>
</html>
