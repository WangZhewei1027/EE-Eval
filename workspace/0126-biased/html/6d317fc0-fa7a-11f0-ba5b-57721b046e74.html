<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Routing Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .view { display: none; margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .active { display: block; }
        button, input, select { margin: 5px; }
        .route-controls { margin: 10px 0; }
        .history-item { cursor: pointer; color: blue; text-decoration: underline; }
        .param-controls { margin: 10px 0; padding: 10px; border: 1px dashed #ccc; }
    </style>
</head>
<body>
    <h1>Advanced Routing System</h1>
    
    <div class="route-controls">
        <h2>Navigation Controls</h2>
        <button id="home-btn">Home</button>
        <button id="products-btn">Products</button>
        <button id="profile-btn">Profile</button>
        <button id="settings-btn">Settings</button>
        <button id="custom-btn">Custom Route</button>
        
        <div>
            <input type="text" id="custom-route-input" placeholder="Enter custom route">
            <button id="go-custom-btn">Go</button>
        </div>
        
        <div>
            <label>Animation:
                <select id="transition-select">
                    <option value="instant">Instant</option>
                    <option value="fade">Fade</option>
                    <option value="slide">Slide</option>
                </select>
            </label>
        </div>
    </div>
    
    <div class="param-controls">
        <h3>Route Parameters</h3>
        <div>
            <label>User ID: <input type="text" id="user-id-input"></label>
            <button id="apply-user-id">Apply</button>
        </div>
        <div>
            <label>Product Category: 
                <select id="category-select">
                    <option value="all">All</option>
                    <option value="electronics">Electronics</option>
                    <option value="clothing">Clothing</option>
                    <option value="books">Books</option>
                </select>
            </label>
        </div>
        <div>
            <label>Search Query: <input type="text" id="search-input"></label>
            <button id="apply-search">Search</button>
        </div>
        <div>
            <label>Page Size: 
                <input type="range" id="page-size-slider" min="5" max="50" value="10">
                <span id="page-size-value">10</span>
            </label>
        </div>
    </div>
    
    <div id="home-view" class="view active">
        <h2>Home</h2>
        <p>Welcome to the routing demo. Navigate using the controls above.</p>
        <div>
            <button id="home-action-1">Load Recommendations</button>
            <button id="home-action-2">Show Tutorial</button>
        </div>
        <div id="home-content"></div>
    </div>
    
    <div id="products-view" class="view">
        <h2>Products</h2>
        <div>
            <label>Sort by: 
                <select id="sort-select">
                    <option value="price-asc">Price (Low to High)</option>
                    <option value="price-desc">Price (High to Low)</option>
                    <option value="name-asc">Name (A-Z)</option>
                    <option value="name-desc">Name (Z-A)</option>
                </select>
            </label>
        </div>
        <div id="products-list"></div>
        <div>
            <button id="prev-page">Previous</button>
            <span id="page-number">Page 1</span>
            <button id="next-page">Next</button>
        </div>
    </div>
    
    <div id="profile-view" class="view">
        <h2>Profile</h2>
        <div id="profile-content">
            <p>Loading profile data...</p>
        </div>
        <div>
            <button id="edit-profile">Edit Profile</button>
            <button id="view-orders">View Orders</button>
            <button id="view-settings">Account Settings</button>
        </div>
    </div>
    
    <div id="settings-view" class="view">
        <h2>Settings</h2>
        <div>
            <label><input type="checkbox" id="dark-mode"> Dark Mode</label>
        </div>
        <div>
            <label>Notification Frequency: 
                <select id="notif-frequency">
                    <option value="instant">Instant</option>
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                </select>
            </label>
        </div>
        <div>
            <button id="save-settings">Save Settings</button>
            <button id="reset-settings">Reset to Defaults</button>
        </div>
    </div>
    
    <div id="custom-view" class="view">
        <h2>Custom Route</h2>
        <div id="custom-content"></div>
    </div>
    
    <div>
        <h3>Routing History</h3>
        <div id="history-list"></div>
        <button id="clear-history">Clear History</button>
    </div>
    
    <script>
        // State management
        const state = {
            currentRoute: 'home',
            previousRoute: null,
            routes: {
                home: { params: {} },
                products: { 
                    params: { 
                        category: 'all',
                        sort: 'price-asc',
                        page: 1,
                        pageSize: 10,
                        search: ''
                    } 
                },
                profile: { 
                    params: { 
                        userId: null,
                        section: 'overview'
                    } 
                },
                settings: { params: {} },
                custom: { params: {} }
            },
            history: []
        };
        
        // DOM elements
        const views = document.querySelectorAll('.view');
        const historyList = document.getElementById('history-list');
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Navigation buttons
            document.getElementById('home-btn').addEventListener('click', () => navigateTo('home'));
            document.getElementById('products-btn').addEventListener('click', () => navigateTo('products'));
            document.getElementById('profile-btn').addEventListener('click', () => navigateTo('profile'));
            document.getElementById('settings-btn').addEventListener('click', () => navigateTo('settings'));
            document.getElementById('custom-btn').addEventListener('click', () => navigateTo('custom'));
            document.getElementById('go-custom-btn').addEventListener('click', () => {
                const route = document.getElementById('custom-route-input').value;
                if (route) navigateTo(route);
            });
            
            // Parameter controls
            document.getElementById('apply-user-id').addEventListener('click', () => {
                const userId = document.getElementById('user-id-input').value;
                if (userId) {
                    state.routes.profile.params.userId = userId;
                    if (state.currentRoute === 'profile') updateView();
                }
            });
            
            document.getElementById('category-select').addEventListener('change', (e) => {
                state.routes.products.params.category = e.target.value;
                if (state.currentRoute === 'products') updateView();
            });
            
            document.getElementById('sort-select').addEventListener('change', (e) => {
                state.routes.products.params.sort = e.target.value;
                if (state.currentRoute === 'products') updateView();
            });
            
            document.getElementById('apply-search').addEventListener('click', () => {
                const searchQuery = document.getElementById('search-input').value;
                state.routes.products.params.search = searchQuery;
                if (state.currentRoute === 'products') updateView();
            });
            
            document.getElementById('page-size-slider').addEventListener('input', (e) => {
                const size = e.target.value;
                document.getElementById('page-size-value').textContent = size;
                state.routes.products.params.pageSize = parseInt(size);
                if (state.currentRoute === 'products') updateView();
            });
            
            // Pagination
            document.getElementById('prev-page').addEventListener('click', () => {
                if (state.routes.products.params.page > 1) {
                    state.routes.products.params.page--;
                    updateView();
                }
            });
            
            document.getElementById('next-page').addEventListener('click', () => {
                state.routes.products.params.page++;
                updateView();
            });
            
            // View actions
            document.getElementById('home-action-1').addEventListener('click', () => {
                document.getElementById('home-content').innerHTML = 
                    '<p>Recommended products loaded based on your preferences.</p>';
            });
            
            document.getElementById('home-action-2').addEventListener('click', () => {
                document.getElementById('home-content').innerHTML = 
                    '<p>Tutorial: Use the navigation buttons to explore different views.</p>' +
                    '<p>Modify parameters to see how they affect the routing.</p>';
            });
            
            document.getElementById('edit-profile').addEventListener('click', () => {
                state.routes.profile.params.section = 'edit';
                updateView();
            });
            
            document.getElementById('view-orders').addEventListener('click', () => {
                state.routes.profile.params.section = 'orders';
                updateView();
            });
            
            document.getElementById('view-settings').addEventListener('click', () => {
                navigateTo('settings');
            });
            
            document.getElementById('save-settings').addEventListener('click', () => {
                alert('Settings saved!');
            });
            
            document.getElementById('reset-settings').addEventListener('click', () => {
                document.getElementById('dark-mode').checked = false;
                document.getElementById('notif-frequency').value = 'instant';
            });
            
            // History controls
            document.getElementById('clear-history').addEventListener('click', () => {
                state.history = [];
                renderHistory();
            });
            
            // Initial view setup
            updateView();
        });
        
        // Navigation function
        function navigateTo(route, params = {}) {
            if (!state.routes[route]) {
                route = 'custom';
                state.routes.custom.params = { path: route, ...params };
            }
            
            state.previousRoute = state.currentRoute;
            state.currentRoute = route;
            
            // Merge new params with existing
            if (params) {
                state.routes[route].params = { ...state.routes[route].params, ...params };
            }
            
            // Add to history
            state.history.push({
                route,
                params: { ...state.routes[route].params },
                timestamp: new Date()
            });
            
            updateView();
            renderHistory();
        }
        
        // Update the current view
        function updateView() {
            // Hide all views
            views.forEach(view => view.classList.remove('active'));
            
            // Show current view
            document.getElementById(`${state.currentRoute}-view`).classList.add('active');
            
            // Update view-specific content
            switch (state.currentRoute) {
                case 'home':
                    // Home view doesn't need special handling
                    break;
                    
                case 'products':
                    renderProducts();
                    break;
                    
                case 'profile':
                    renderProfile();
                    break;
                    
                case 'settings':
                    // Settings view handles its own state
                    break;
                    
                case 'custom':
                    document.getElementById('custom-content').innerHTML = 
                        `<p>You are viewing custom route: ${state.routes.custom.params.path || 'none'}</p>` +
                        `<p>Parameters: ${JSON.stringify(state.routes.custom.params)}</p>`;
                    break;
            }
            
            // Update URL in the custom route input
            document.getElementById('custom-route-input').value = 
                `${state.currentRoute}?${new URLSearchParams(state.routes[state.currentRoute].params)}`;
        }
        
        // Render products view
        function renderProducts() {
            const params = state.routes.products.params;
            const products = generateMockProducts(params.category, params.search);
            
            // Sort products
            products.sort((a, b) => {
                switch (params.sort) {
                    case 'price-asc': return a.price - b.price;
                    case 'price-desc': return b.price - a.price;
                    case 'name-asc': return a.name.localeCompare(b.name);
                    case 'name-desc': return b.name.localeCompare(a.name);
                    default: return 0;
                }
            });
            
            // Pagination
            const startIdx = (params.page - 1) * params.pageSize;
            const paginatedProducts = products.slice(startIdx, startIdx + params.pageSize);
            
            // Update UI
            document.getElementById('products-list').innerHTML = 
                paginatedProducts.map(p => 
                    `<div>
                        <h4>${p.name} ($${p.price})</h4>
                        <p>${p.description}</p>
                    </div>`
                ).join('');
                
            document.getElementById('page-number').textContent = `Page ${params.page}`;
            document.getElementById('prev-page').disabled = params.page === 1;
        }
        
        // Render profile view
        function renderProfile() {
            const params = state.routes.profile.params;
            const userId = params.userId || 'current-user';
            
            let content = '';
            switch (params.section) {
                case 'overview':
                    content = `
                        <h3>Profile Overview (${userId})</h3>
                        <p>Welcome back to your profile.</p>
                        <p>Click the buttons below to edit or view more details.</p>
                    `;
                    break;
                case 'edit':
                    content = `
                        <h3>Edit Profile (${userId})</h3>
                        <form>
                            <div><label>Name: <input type="text" value="User ${userId}"></label></div>
                            <div><label>Email: <input type="email" value="user${userId}@example.com"></label></div>
                            <button type="button">Save Changes</button>
                        </form>
                    `;
                    break;
                case 'orders':
                    content = `
                        <h3>Order History (${userId})</h3>
                        <ul>
                            <li>Order #1001 - $49.99 - Delivered</li>
                            <li>Order #1002 - $129.99 - Shipped</li>
                            <li>Order #1003 - $24.99 - Processing</li>
                        </ul>
                    `;
                    break;
            }
            
            document.getElementById('profile-content').innerHTML = content;
        }
        
        // Render history
        function renderHistory() {
            historyList.innerHTML = state.history.slice().reverse().map((item, idx) => 
                `<div class="history-item" data-index="${state.history.length - 1 - idx}">
                    ${item.timestamp.toLocaleTimeString()}: ${item.route} (${JSON.stringify(item.params)})
                </div>`
            ).join('');
            
            // Add click handlers to history items
            document.querySelectorAll('.history-item').forEach(item => {
                item.addEventListener('click', () => {
                    const index = parseInt(item.getAttribute('data-index'));
                    const historyItem = state.history[index];
                    navigateTo(historyItem.route, historyItem.params);
                });
            });
        }
        
        // Helper function to generate mock products
        function generateMockProducts(category = 'all', search = '') {
            const allProducts = [
                { name: 'Laptop', price: 999, description: 'High performance laptop with SSD', category: 'electronics' },
                { name: 'Smartphone', price: 699, description: 'Latest model smartphone', category: 'electronics' },
                { name: 'T-Shirt', price: 19, description: 'Cotton t-shirt', category: 'clothing' },
                { name: 'Jeans', price: 49, description: 'Blue jeans', category: 'clothing' },
                { name: 'Sci-Fi Novel', price: 12, description: 'Bestselling science fiction', category: 'books' },
                { name: 'History Book', price: 25, description: 'World history volume', category: 'books' },
                { name: 'Headphones', price: 149, description: 'Noise-cancelling headphones', category: 'electronics' },
                { name: 'Smart Watch', price: 199, description: 'Fitness tracking smartwatch', category: 'electronics' }
            ];
            
            return allProducts.filter(p => 
                (category === 'all' || p.category === category) &&
                (search === '' || p.name.toLowerCase().includes(search.toLowerCase()) || 
                 p.description.toLowerCase().includes(search.toLowerCase()))
            );
        }
    </script>
</body>
</html>
