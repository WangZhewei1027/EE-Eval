<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asymmetric Cryptography Demo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.2.0/jsencrypt.min.js"></script>
    <script>
        let publicKey;
        let privateKey;
        let encryptInstance = new JSEncrypt();
        
        function generateKeys() {
            encryptInstance = new JSEncrypt();
            publicKey = encryptInstance.getPublicKey();
            privateKey = encryptInstance.getPrivateKey();
            document.getElementById("publicKey").innerText = publicKey;
            document.getElementById("privateKey").innerText = privateKey;
            alert("Keys generated!");
        }

        function encryptMessage() {
            const message = document.getElementById("message").value;
            encryptInstance.setPublicKey(publicKey);
            const encrypted = encryptInstance.encrypt(message);
            document.getElementById("encryptedMessage").innerText = encrypted ? encrypted : 'Encryption failed!';
        }

        function decryptMessage() {
            const encryptedMessage = document.getElementById("encryptedMessageInput").value;
            encryptInstance.setPrivateKey(privateKey);
            const decrypted = encryptInstance.decrypt(encryptedMessage);
            document.getElementById("decryptedMessage").innerText = decrypted ? decrypted : 'Decryption failed!';
        }
    </script>
</head>
<body>
    <h1>Asymmetric Cryptography Demo</h1>
    
    <h2>1. Generate Keys</h2>
    <button onclick="generateKeys()">Generate Public/Private Keys</button>
    <h3>Public Key:</h3>
    <pre id="publicKey"></pre>
    <h3>Private Key:</h3>
    <pre id="privateKey"></pre>

    <h2>2. Encrypt a Message</h2>
    <input type="text" id="message" placeholder="Enter message to encrypt">
    <button onclick="encryptMessage()">Encrypt Message</button>
    <h3>Encrypted Message:</h3>
    <pre id="encryptedMessage"></pre>

    <h2>3. Decrypt a Message</h2>
    <input type="text" id="encryptedMessageInput" placeholder="Enter encrypted message">
    <button onclick="decryptMessage()">Decrypt Message</button>
    <h3>Decrypted Message:</h3>
    <pre id="decryptedMessage"></pre>
</body>
</html>
