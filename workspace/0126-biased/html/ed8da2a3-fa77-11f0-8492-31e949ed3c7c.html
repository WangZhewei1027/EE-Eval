<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interpolation Search Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #282c34, #3c4251);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #container {
            text-align: center;
            border: 1px solid #ffffff;
            padding: 2rem;
            border-radius: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s;
        }
        #title {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: bold;
        }
        #description {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        #startButton {
            background-color: #61dafb;
            border: none;
            color: #282c34;
            padding: 1rem 2rem;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
        }
        #startButton:hover {
            background-color: #21a1f1;
            transform: scale(1.05);
        }
        #visualization {
            width: 100%;
            height: 300px;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }
        .step {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="title">Interpolation Search Visualization</div>
        <div id="description">
            Watch as the interpolation search algorithm efficiently finds an element in a sorted array. The visualization will guide you through its steps with smooth transitions.
        </div>
        <button id="startButton">Start Visualization</button>
        <div id="visualization"></div>
    </div>

    <script>
        const visualization = document.getElementById('visualization');
        const startButton = document.getElementById('startButton');
        let steps = [];
        let currentStepIndex = 0;

        function generateSteps() {
            steps = [
                "Step 1: Start with a sorted array.",
                "Step 2: Determine the range.",
                "Step 3: Calculate the probe position.",
                "Step 4: Check if the value is found.",
                "Step 5: Repeat for the lower or upper part.",
                "Step 6: Value found or not found."
            ];
        }

        function displayStep(stepIndex) {
            const stepDiv = document.createElement('div');
            stepDiv.className = 'step';
            stepDiv.textContent = steps[stepIndex];
            visualization.appendChild(stepDiv);
            
            setTimeout(() => {
                stepDiv.classList.add('active');
            }, 100);
        }

        function startVisualization() {
            generateSteps();
            currentStepIndex = 0;
            visualization.innerHTML = '';

            function showNextStep() {
                if (currentStepIndex < steps.length) {
                    displayStep(currentStepIndex);
                    currentStepIndex++;
                    setTimeout(showNextStep, 2000);
                }
            }

            showNextStep();
        }

        startButton.addEventListener('click', startVisualization);
    </script>
</body>
</html>
