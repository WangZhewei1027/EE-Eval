<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Set Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom right, #6a11cb, #2575fc);
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            animation: fadeIn 2s ease-in-out;
            background: -webkit-linear-gradient(45deg, #ff6a00, #ee0979);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            transition: transform 0.5s ease;
        }

        h1:hover {
            transform: scale(1.05);
        }

        .set-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .set-item {
            width: 100px;
            height: 100px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, background 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: #ffffff;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .set-item:hover {
            transform: scale(1.1);
            background-color: rgba(255, 255, 255, 0.2);
        }

        .button {
            padding: 10px 20px;
            background-color: #ff6a00;
            border: none;
            border-radius: 5px;
            font-size: 1.2rem;
            color: #ffffff;
            cursor: pointer;
            margin-top: 40px;
            transition: background 0.3s ease, transform 0.3s ease;
        }

        .button:hover {
            background-color: #ee0979;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Sets in Style</h1>
        <div class="set-container">
            <div class="set-item">A</div>
            <div class="set-item">B</div>
            <div class="set-item">C</div>
            <div class="set-item">D</div>
        </div>
        <button class="button" onclick="displayMessage()">Observe the Sets</button>
    </div>

    <script>
        function displayMessage() {
            alert("Enjoy observing the visual representation of Sets!");
        }
    </script>
</body>

</html>
