<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interpolation Search - Visualized Elegance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display&display=swap');

  /* Reset and base */
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #f0f0f3;
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  h1, h2 {
    font-family: 'Playfair Display', serif;
    margin: 0;
    user-select: none;
  }
  h1 {
    font-size: 3.5rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-align: center;
    margin-top: 1.5rem;
    margin-bottom: 0.25rem;
    color: #a0e9fd;
    text-shadow:
      0 1px 6px rgba(160, 233, 253, 0.7),
      0 0 12px rgba(160, 233, 253, 0.4);
  }
  h2 {
    color: #ddf4ffcc;
    font-weight: 400;
    font-size: 1.25rem;
    letter-spacing: 0.05em;
    user-select: none;
    margin-bottom: 2rem;
    text-align: center;
    font-style: italic;
    text-shadow: 0 0 7px rgba(223, 249, 255, 0.2);
  }

  /* Container and layout */
  main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0 2rem 3rem 2rem;
    perspective: 1200px;
    user-select: none;
  }
  #visualization {
    background: rgba(255 255 255 / 0.06);
    border-radius: 1.3rem;
    box-shadow: 
      inset 0 0 40px #41c3fb33,
      0 0 40px #2c90ff88;
    width: min(100vw, 860px);
    max-width: 860px;
    padding: 2.5rem 3rem 3.5rem 3rem;
    position: relative;
  }

  /* Array container */
  .array-container {
    display: flex;
    justify-content: center;
    flex-wrap: nowrap;
    gap: 0.7rem;
    margin-bottom: 3rem;
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: thin;
    scrollbar-color: #2aa1ff22 transparent;
  }
  .array-container::-webkit-scrollbar {
    height: 8px;
  }
  .array-container::-webkit-scrollbar-thumb {
    background: #2aa1ff33;
    border-radius: 4px;
  }

  /* Array elements */
  .element {
    --size: 48px;
    width: var(--size);
    height: var(--size);
    border-radius: 0.8rem;
    background: linear-gradient(145deg, #1c2846, #2d4370);
    box-shadow:
      inset 3px 3px 7px #3a558d,
      inset -3px -3px 7px #152542;
    color: #a0e9fd;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1.25rem;
    letter-spacing: 0.04em;
    font-family: 'Montserrat', sans-serif;
    user-select: none;
    position: relative;
    cursor: default;
    transition: 
      transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
      box-shadow 0.45s ease,
      background-color 0.45s ease;
  }
  .element.highlight-low {
    box-shadow:
      0 0 18px #5688ffcc,
      inset 3px 3px 9px #2250c9;
    background: linear-gradient(145deg, #1f49a1, #1150ee);
    transform: scale(1.2) translateY(-6px);
    color: #d2dfff;
  }
  .element.highlight-high {
    box-shadow:
      0 0 18px #ff9e57cc,
      inset 3px 3px 9px #c97c11;
    background: linear-gradient(145deg, #b36418, #f3a329);
    transform: scale(1.2) translateY(-6px);
    color: #fff2d6;
  }
  .element.highlight-mid {
    box-shadow:
      0 0 32px #51d8a4cc,
      inset 3px 3px 12px #2ab477;
    background: linear-gradient(145deg, #23b97a, #3bd49e);
    transform: scale(1.35) translateY(-12px);
    color: #e9fff9;
  }
  .element.found {
    box-shadow:
      0 0 38px #fefefe, 
      0 0 45px #51d8a4cc, 
      inset 0 0 20px #c8ffefcc;
    background: linear-gradient(145deg, #89fff0, #51d8a4);
    color: #051f17;
    font-weight: 800;
    transform: scale(1.5) translateY(-24px);
    transition-timing-function: cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }
  .element.excluded {
    filter: grayscale(100%) brightness(0.38);
    opacity: 0.3;
    pointer-events: none;
  }

  /* Controls */
  #controls {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: -2rem;
  }
  button {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 1.15rem;
    letter-spacing: 0.04em;
    padding: 0.6rem 2.2rem;
    border-radius: 2rem;
    border: none;
    cursor: pointer;
    background: linear-gradient(145deg, #37a2ff, #0a64c8);
    color: #e3f7ff;
    box-shadow:
      0 5px 15px #0a64c8bb,
      inset 0 -2px 8px #115db8;
    transition: 
      background-color 0.35s ease,
      box-shadow 0.35s ease,
      transform 0.2s ease;
    user-select: none;
  }
  button:focus-visible {
    outline-offset: 3px;
    outline: 3px solid #c4edffcc;
  }
  button:hover:not(:disabled) {
    background: linear-gradient(145deg, #1be1ff, #0389de);
    box-shadow:
      0 4px 22px #07aef0cc,
      inset 0 -2px 6px #117ec9;
    transform: translateY(-3px);
  }
  button:disabled {
    background: #465A84;
    box-shadow: none;
    cursor: default;
    transform: none;
    color: #a5b1cb;
  }

  /* Explanation block */
  #explanation {
    max-width: 720px;
    margin: 0 auto;
    font-size: 1rem;
    line-height: 1.65;
    color: #b7d3f8cc;
    text-align: center;
    font-family: 'Montserrat', sans-serif;
    user-select: none;
    letter-spacing: 0.02em;
  }
  mark {
    background: #51d8a4bb;
    border-radius: 0.35rem;
    padding: 0 6px;
    font-weight: 600;
    color: #013a2f;
  }

  /* Footer info */
  footer {
    text-align: center;
    padding: 1rem 0 2rem 0;
    font-size: 0.85rem;
    font-style: italic;
    color: #6f84a0cc;
    font-family: 'Montserrat', sans-serif;
    user-select: none;
  }

  /* Animations */
  @keyframes pulse-glow {
    0%, 100% {
      box-shadow:
        0 0 24px #51d8a499,
        inset 3px 3px 12px #0ca472a6;
    }
    50% {
      box-shadow:
        0 0 38px #51d8a4cc,
        inset 6px 6px 18px #12b67a;
    }
  }


  /* Subtle background shapes */
  body::before {
    content: '';
    position: fixed;
    top: -10vh; left: -10vw;
    width: 150vw;
    height: 140vh;
    background:
      radial-gradient(circle at 10% 25%, #2a80ff88, transparent 60%),
      radial-gradient(circle at 75% 70%, #03ffc488, transparent 65%),
      repeating-radial-gradient(circle at 50% 40%, #1261e144 0 2px, transparent 3px 10px);
    filter: blur(54px);
    z-index: 0;
    pointer-events: none;
  }
  #visualization::before {
    content: '';
    position: absolute;
    inset: 3.5rem;
    border-radius: 1.3rem;
    pointer-events: none;
    background:
      repeating-conic-gradient(from 30deg, #2bc1e522 0deg 7deg, transparent 7deg 40deg),
      linear-gradient(135deg, #344c83aa, #244172bb);
    filter: drop-shadow(0 0 16px #29d8f8cc);
    z-index: -1;
    animation: pulse-glow 8s ease-in-out infinite alternate;
  }
</style>
</head>
<body>
  <h1>Interpolation Search</h1>
  <h2>beautifully illustrated step-by-step visualization</h2>
  <main>
    <section id="visualization" aria-label="Visualization of Interpolation Search algorithm">
      <div class="array-container" aria-live="polite" aria-atomic="true">
        <!-- Array elements dynamically injected here -->
      </div>
      <div id="explanation" aria-live="polite" aria-atomic="true">
        <!-- Step explanation will be shown here -->
      </div>
      <div id="controls" role="region" aria-label="Control buttons for search steps">
        <button id="startBtn" type="button" aria-pressed="false" title="Start / Restart the interpolation search">Start Search</button>
        <button id="nextBtn" type="button" disabled title="Advance to next step of the interpolation search">Next Step</button>
      </div>
    </section>
  </main>
  <footer>© 2024 · Interpolation Search Visualization</footer>

<script>
(() => {
  'use strict';

  const arrayContainer = document.querySelector('.array-container');
  const explanation = document.getElementById('explanation');
  const startBtn = document.getElementById('startBtn');
  const nextBtn = document.getElementById('nextBtn');

  // Sorted array for demonstration (uniformly spaced-ish for aesthetic interpolation)
  // We'll keep the array size reasonable for quick comprehension.
  const sortedArray = [
    12, 17, 23, 29, 34, 37, 41, 44, 47, 51, 56, 59, 63, 68, 72, 77, 81, 86, 90, 95
  ];
  const arrayLength = sortedArray.length;

  // Target to search for demonstration (choose one existing value for nice found state)
  let target = 63;

  // State for the search
  let low, high, mid;
  let steps = [];
  let stepIndex = -1;
  let foundIndex = -1;

  // Create elements
  function renderArray(array) {
    arrayContainer.innerHTML = '';
    for (let i = 0; i < array.length; i++) {
      const el = document.createElement('div');
      el.className = 'element';
      el.textContent = array[i];
      el.dataset.index = i;
      arrayContainer.appendChild(el);
    }
  }

  // Reset styles and states
  function resetArrayElements() {
    const elements = arrayContainer.children;
    for (let el of elements) {
      el.className = 'element';
    }
  }

  // Disable/Enable buttons helper
  function toggleButtons(startDisabled, nextDisabled) {
    startBtn.disabled = startDisabled;
    nextBtn.disabled = nextDisabled;
  }

  // Explanation text generator with highlight
  function generateExplanation(low, high, mid, array, target) {
    const lowVal = array[low];
    const highVal = array[high];
    const midVal = array[mid];
    let explanationText = `
      Searching for <mark>${target}</mark> in the sorted array.<br>
      Considering current <mark>low</mark> index <strong>${low}</strong> (value ${lowVal}) and <mark>high</mark> index <strong>${high}</strong> (value ${highVal}).<br>
      Calculated <mark>mid</mark> index <strong>${mid}</strong> (estimated position), with value ${midVal}.
    `;

    if (midVal === target) {
      explanationText += `<br>Value at mid matches target <mark>${target}</mark>, <strong>search successful!</strong>`;
    } else if (midVal < target) {
      explanationText += `<br>Value at mid is less than target, so we move <mark>low</mark> to <strong>${mid + 1}</strong>.`;
    } else {
      explanationText += `<br>Value at mid is greater than target, so we move <mark>high</mark> to <strong>${mid - 1}</strong>.`;
    }
    return explanationText;
  }

  // Interpolation formula for mid
  function calculateMid(low, high, array, target) {
    const lowVal = array[low];
    const highVal = array[high];
    if (lowVal === highVal) return low; // Avoid divide by zero; fallback to low

    // Interpolation formula: mid = low + ((target - array[low]) * (high - low)) / (array[high] - array[low])
    const numerator = target - lowVal;
    const denominator = highVal - lowVal;
    let pos = low + Math.floor((numerator * (high - low)) / denominator);
    if (pos > high) pos = high;
    if (pos < low) pos = low;
    return pos;
  }

  // Generate all steps upfront for simplicity and smooth control
  function generateSteps() {
    steps = [];
    low = 0;
    high = arrayLength - 1;
    foundIndex = -1;

    while (low <= high && target >= sortedArray[low] && target <= sortedArray[high]) {
      mid = calculateMid(low, high, sortedArray, target);
      steps.push({low, high, mid, found: false});
      if (sortedArray[mid] === target) {
        foundIndex = mid;
        steps.push({low, high, mid, found: true});
        break;
      } else if (sortedArray[mid] < target) {
        low = mid + 1;
      } else {
        high = mid - 1;
      }
    }

    if (foundIndex === -1) {
      // Not found, add final step showing failure
      steps.push({low, high, mid: null, found: false, failed: true});
    }
  }

  // Visual update: highlight elements at low, mid, high and exclude impossible indices
  function renderStep(step) {
    resetArrayElements();
    const elems = arrayContainer.children;
    const {low, high, mid, found, failed} = step;

    for (let i = 0; i < elems.length; i++) {
      const el = elems[i];
      if (i < low || i > high) {
        el.classList.add('excluded');
      }
    }
    if (low !== null && low !== undefined) {
      elems[low].classList.add('highlight-low');
    }
    if (high !== null && high !== undefined) {
      elems[high].classList.add('highlight-high');
    }
    if (mid !== null && mid !== undefined && !failed) {
      // Mid highlight stronger
      elems[mid].classList.add(found ? 'found' : 'highlight-mid');
    }

    if (found) {
      explanation.innerHTML = generateExplanation(low, high, mid, sortedArray, target);
      nextBtn.disabled = true;
      startBtn.disabled = false;
      startBtn.textContent = 'Restart';
      startBtn.setAttribute('aria-pressed', 'false');
    } else if (failed) {
      explanation.innerHTML = `
        Unable to locate <mark>${target}</mark> in the array.<br>
        Search space exhausted between <mark>low=${low}</mark> and <mark>high=${high}</mark>.<br>
        <strong>Value not found.</strong>
      `;
      nextBtn.disabled = true;
      startBtn.disabled = false;
      startBtn.textContent = 'Restart';
      startBtn.setAttribute('aria-pressed', 'false');
    } else {
      explanation.innerHTML = generateExplanation(low, high, mid, sortedArray, target);
      nextBtn.disabled = false;
      startBtn.disabled = true;
    }
  }

  // Initialize array and UI
  function initialize() {
    renderArray(sortedArray);
    explanation.innerHTML = `Press <mark>Start Search</mark> to begin visualizing the Interpolation Search algorithm.`;
    nextBtn.disabled = true;
    startBtn.disabled = false;
    startBtn.textContent = 'Start Search';
    startBtn.setAttribute('aria-pressed', 'false');
    stepIndex = -1;
    foundIndex = -1;
    resetArrayElements();
  }

  // Step forward in visualization
  function nextStep() {
    stepIndex++;
    if (stepIndex >= steps.length) {
      nextBtn.disabled = true;
      return;
    }
    const step = steps[stepIndex];
    renderStep(step);
  }

  // Start or restart the visualization
  function start() {
    // Reset target if needed.
    // For aesthetic consistent demo, keep same target. Could randomize optionally.
    generateSteps();
    stepIndex = -1;
    nextBtn.disabled = false;
    startBtn.disabled = true;
    startBtn.textContent = 'Restart';
    startBtn.setAttribute('aria-pressed', 'true');
    nextStep(); // Show first step immediately
  }

  // Button event bindings
  startBtn.addEventListener('click', start);
  nextBtn.addEventListener('click', nextStep);

  // Initialize on page load
  initialize();
})();
</script>
</body>
</html>
