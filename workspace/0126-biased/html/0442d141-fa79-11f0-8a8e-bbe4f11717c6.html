<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topological Sort</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Topological Sort</h1>
        <p>Visualize the order of nodes in a directed acyclic graph (DAG) using a topological sort.</p>
        <div class="graph">
            <svg width="600" height="600" viewBox="0 0 600 600">
                <g id="nodes">
                    <circle cx="300" cy="300" r="150" fill="#FFC0CB" stroke="#FF0000" stroke-width="2" />
                    <circle cx="300" cy="350" r="150" fill="#FFC0CB" stroke="#FF0000" stroke-width="2" />
                    <circle cx="400" cy="300" r="150" fill="#FFC0CB" stroke="#FF0000" stroke-width="2" />
                    <circle cx="400" cy="350" r="150" fill="#FFC0CB" stroke="#FF0000" stroke-width="2" />
                </g>
                <g id="edges">
                    <line x1="300" y1="350" x2="400" y2="350" stroke="#000000" stroke-width="2" />
                    <line x1="300" y1="350" x2="400" y2="300" stroke="#000000" stroke-width="2" />
                    <line x1="400" y1="350" x2="400" y2="300" stroke="#000000" stroke-width="2" />
                    <line x1="400" y1="300" x2="300" y2="350" stroke="#000000" stroke-width="2" />
                </g>
            </svg>
        </div>
        <div class="controls">
            <button id="sort-button">Sort</button>
            <button id="reverse-button">Reverse</button>
        </div>
        <div class="result">
            <p id="result"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
