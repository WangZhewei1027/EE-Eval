<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Memory Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .control {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Virtual Memory Simulation</h1>
    <div class="control">
        <label for="totalPages">Total Pages (in virtual memory): </label>
        <input type="number" id="totalPages" value="5" min="1" />
    </div>
    <div class="control">
        <label for="pageSize">Page Size (in KB): </label>
        <input type="number" id="pageSize" value="4" min="1" />
    </div>
    <div class="control">
        <label for="processSize">Process Size (in KB): </label>
        <input type="number" id="processSize" value="12" min="1" />
    </div>
    <button id="calculate">Calculate Virtual Memory Usage</button>
    <button id="reset">Reset</button>

    <h2>Virtual Memory Usage</h2>
    <div id="memoryOutput"></div>

    <div class="control">
        <button id="addPage">Add Page to Process</button>
        <button id="removePage">Remove Page from Process</button>
    </div>
    <h3>Current Page Table</h3>
    <div id="pageTable"></div>

    <script>
        let totalPages = 5;
        let pageSize = 4; // in KB
        let processSize = 12; // in KB
        let pagesInProcess = 0;

        function updateMemoryOutput() {
            const totalMemory = totalPages * pageSize;
            const inUseMemory = pagesInProcess * pageSize;
            document.getElementById("memoryOutput").innerText = `Total Memory: ${totalMemory} KB, In Use: ${inUseMemory} KB`;
        }

        function updatePageTable() {
            const pageTable = [];
            for (let i = 0; i < pagesInProcess; i++) {
                pageTable.push(`Page ${i + 1}`);
            }
            document.getElementById("pageTable").innerText = pageTable.join(', ') || 'No pages allocated';
        }

        document.getElementById("calculate").addEventListener("click", function() {
            totalPages = parseInt(document.getElementById("totalPages").value);
            pageSize = parseInt(document.getElementById("pageSize").value);
            processSize = parseInt(document.getElementById("processSize").value);
            pagesInProcess = Math.ceil(processSize / pageSize);
            if (pagesInProcess > totalPages) {
                alert("Error: Process uses more pages than total available in memory!");
                pagesInProcess = totalPages; // Limit to total pages
            }
            updateMemoryOutput();
            updatePageTable();
        });

        document.getElementById("reset").addEventListener("click", function() {
            document.getElementById("totalPages").value = 5;
            document.getElementById("pageSize").value = 4;
            document.getElementById("processSize").value = 12;
            pagesInProcess = 0;
            updateMemoryOutput();
            updatePageTable();
        });

        document.getElementById("addPage").addEventListener("click", function() {
            if (pagesInProcess < totalPages) {
                pagesInProcess++;
                updateMemoryOutput();
                updatePageTable();
            } else {
                alert("Cannot add more pages - limit reached!");
            }
        });

        document.getElementById("removePage").addEventListener("click", function() {
            if (pagesInProcess > 0) {
                pagesInProcess--;
                updateMemoryOutput();
                updatePageTable();
            } else {
                alert("No more pages to remove!");
            }
        });

        // Initialize default memory output on load
        updateMemoryOutput();
        updatePageTable();
    </script>
</body>
</html>
