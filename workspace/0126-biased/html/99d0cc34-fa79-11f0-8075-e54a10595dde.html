<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Interpreter Demo</title>
    <style>
        body { font-family: monospace; }
        #output { white-space: pre; }
    </style>
</head>
<body>

<h1>Interactive Interpreter</h1>
<div>
    <textarea id="input" placeholder="Enter commands here..." rows="4" cols="50"></textarea><br>
    <button onclick="executeCommand()">Execute</button>
    <button onclick="clearOutput()">Clear Output</button>
</div>

<div>
    <label for="slider">Adjust Value:</label>
    <input type="range" id="slider" min="0" max="100" value="50" onchange="updateSliderValue()">
    <span id="sliderValue">50</span>
</div>

<div>
    <input type="text" id="variableKey" placeholder="Variable Key">
    <input type="text" id="variableValue" placeholder="Variable Value">
    <button onclick="setVariable()">Set Variable</button>
</div>

<h2>Variables</h2>
<div id="variablesOutput"></div>

<h2>Output</h2>
<div id="output"></div>

<script>
    let variables = {};

    function executeCommand() {
        const input = document.getElementById("input").value;
        const output = document.getElementById("output");
        let result = '';

        if (input.startsWith("print ")) {
            const variable = input.split(" ")[1];
            result = variables[variable] || `Variable "${variable}" not found.`;
        } else if (input.startsWith("set ")) {
            const [_, key, value] = input.split(" ");
            variables[key] = value;
            result = `Set "${key}" to "${value}".`;
            updateVariablesOutput();
        } else {
            result = "Unknown command.";
        }

        output.textContent += result + "\n";
        document.getElementById("input").value = '';
    }

    function clearOutput() {
        document.getElementById("output").textContent = '';
    }

    function updateSliderValue() {
        const sliderValue = document.getElementById("slider").value;
        document.getElementById("sliderValue").textContent = sliderValue;
    }

    function setVariable() {
        const key = document.getElementById("variableKey").value;
        const value = document.getElementById("variableValue").value;
        variables[key] = value;
        updateVariablesOutput();
        document.getElementById("variableKey").value = '';
        document.getElementById("variableValue").value = '';
    }

    function updateVariablesOutput() {
        const output = document.getElementById("variablesOutput");
        output.textContent = JSON.stringify(variables, null, 2);
    }
</script>

</body>
</html>
