<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        
        .container {
            width: 80%;
            margin: 40px auto;
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            border-bottom: 1px solid #444;
        }
        
        .content {
            padding: 20px;
        }
        
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #3e8e41;
        }
        
        .text {
            font-size: 16px;
            font-weight: bold;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Deadlock</h1>
        </div>
        <div class="content">
            <p>
                Deadlock is a programming concept where two or more threads are blocked indefinitely, waiting for each other to release resources.
            </p>
            <p>
                This animation demonstrates the deadlock scenario, where two threads are waiting for each other to release resources.
            </p>
            <button class="button" onclick="deadlock()">Click me</button>
        </div>
    </div>
    
    <script>
        function deadlock() {
            // Simulate a deadlock scenario
            // Thread 1 is waiting for Thread 2 to release a resource
            // Thread 2 is waiting for Thread 1 to release a resource
            // Both threads are stuck in an infinite loop
            alert("Thread 1 is waiting for Thread 2 to release a resource...");
            alert("Thread 2 is waiting for Thread 1 to release a resource...");
        }
    </script>
</body>
</html>
