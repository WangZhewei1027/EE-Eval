<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A* Search Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #controls {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<h2>A* Search Visualization</h2>
<div id="controls">
    <label for="start">Start Node:</label>
    <input type="text" id="start" value="A"><br>
    <label for="goal">Goal Node:</label>
    <input type="text" id="goal" value="E"><br>
    <label for="heuristic">Heuristic Weights (comma-separated):</label>
    <input type="text" id="heuristic" value="1,2,3,1,0"><br>
    <button id="runAStar">Run A* Search</button>
    <button id="reset">Reset</button>
</div>

<pre id="output"></pre>

<script>
    const graph = {
        A: { B: 1, C: 4 },
        B: { A: 1, C: 2, D: 5 },
        C: { A: 4, B: 2, D: 1, E: 3 },
        D: { B: 5, C: 1, E: 1 },
        E: { C: 3, D: 1 }
    };

    const runAStar = () => {
        const start = document.getElementById('start').value;
        const goal = document.getElementById('goal').value;
        const heuristicInput = document.getElementById('heuristic').value.split(',').map(Number);
        
        const heuristic = {};
        const nodes = Object.keys(graph);
        
        if (heuristicInput.length !== nodes.length) {
            document.getElementById('output').innerText = "Error: Heuristic weights must match number of nodes.";
            return;
        }

        for (let i = 0; i < nodes.length; i++) {
            heuristic[nodes[i]] = heuristicInput[i];
        }

        const openSet = [start];
        const cameFrom = {};
        const gScore = {};
        const fScore = {};
        
        for (const node of nodes) {
            gScore[node] = Infinity;
            fScore[node] = Infinity;
        }

        gScore[start] = 0;
        fScore[start] = heuristic[start];

        while (openSet.length > 0) {
            const current = openSet.reduce((a, b) => fScore[a] < fScore[b] ? a : b);
            if (current === goal) {
                reconstructPath(cameFrom, current);
                return;
            }

            openSet.splice(openSet.indexOf(current), 1);
            for (const neighbor in graph[current]) {
                const tentativeGScore = gScore[current] + graph[current][neighbor];
                if (tentativeGScore < gScore[neighbor]) {
                    cameFrom[neighbor] = current;
                    gScore[neighbor] = tentativeGScore;
                    fScore[neighbor] = gScore[neighbor] + heuristic[neighbor];
                    if (!openSet.includes(neighbor)) {
                        openSet.push(neighbor);
                    }
                }
            }
        }

        document.getElementById('output').innerText = "No path found.";
    };

    const reconstructPath = (cameFrom, current) => {
        const totalPath = [current];
        while (current in cameFrom) {
            current = cameFrom[current];
            totalPath.push(current);
        }
        totalPath.reverse();
        document.getElementById('output').innerText = "Path found: " + totalPath.join(" -> ");
    };

    document.getElementById('runAStar').onclick = runAStar;
    document.getElementById('reset').onclick = () => {
        document.getElementById('start').value = 'A';
        document.getElementById('goal').value = 'E';
        document.getElementById('heuristic').value = '1,2,3,1,0';
        document.getElementById('output').innerText = '';
    };
</script>

</body>
</html>
