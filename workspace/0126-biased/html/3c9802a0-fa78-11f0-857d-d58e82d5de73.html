<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prim's Algorithm Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

  :root {
    --bg-gradient-start: #141e30;
    --bg-gradient-end: #243b55;
    --primary-color: #ff6f61;
    --accent-color: #f9d423;
    --text-color-light: #f0f4f8;
    --shadow-light: rgba(255, 111, 97, 0.4);
    --shadow-glow: 0 0 12px var(--primary-color);
  }

  /* Reset and base */
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
    display: flex;
    flex-direction: column;
    font-family: 'Montserrat', sans-serif;
    color: var(--text-color-light);
    overflow: hidden;
    user-select: none;
  }

  header {
    padding: 2rem 2rem 1rem 2rem;
    text-align: center;
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(255 111 97 / 0.6);
  }
  header h1 {
    margin: 0;
    font-weight: 700;
    font-size: 2.8rem;
    line-height: 1.1;
  }
  header p {
    margin-top: 0.4rem;
    font-size: 1.1rem;
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.1em;
    color: var(--accent-color);
    text-shadow: 0 0 6px rgba(249, 212, 35, 0.7);
  }

  main {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 2rem 3rem 2rem;
  }

  /* Canvas area */
  #primCanvas {
    width: 700px;
    max-width: 100vw;
    height: 520px;
    border-radius: 24px;
    background: radial-gradient(circle at center, #1d2a48, #101a30);
    box-shadow:
      inset 0 0 60px rgba(255,111,97,0.2),
      0 0 40px rgba(255,111,97,0.3);
    cursor: default;
    display: block;
  }

  /* Control panel */
  #controls {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1.4rem;
  }

  button {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
    border: none;
    border-radius: 40px;
    padding: 0.8rem 2.4rem;
    color: var(--bg-gradient-start);
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow:
      0 4px 15px var(--shadow-light);
    transition: background 0.35s ease, box-shadow 0.35s ease, transform 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    user-select: none;
  }
  button:hover {
    background: linear-gradient(135deg, var(--accent-color), var(--primary-color));
    box-shadow:
      0 6px 25px var(--shadow-light),
      var(--shadow-glow);
    transform: scale(1.07);
  }
  button:active {
    transform: scale(0.95);
  }

  /* Tooltip style */
  #tooltip {
    position: absolute;
    pointer-events: none;
    padding: 0.3rem 0.6rem;
    background: rgba(249, 212, 35, 0.85);
    color: #141e30;
    font-weight: 600;
    font-size: 0.82rem;
    border-radius: 6px;
    box-shadow: 0 0 6px rgba(249, 212, 35, 0.6);
    white-space: nowrap;
    user-select: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    will-change: transform, opacity;
  }
</style>
</head>
<body>
  <header>
    <h1>Prim's Algorithm</h1>
    <p>Minimum Spanning Tree Visualized</p>
  </header>
  <main>
    <canvas id="primCanvas" width="700" height="520" aria-label="Prim's Algorithm visualization"></canvas>
    <div id="controls" aria-label="Controls">
      <button id="startBtn" aria-pressed="false" aria-label="Start Prim's Algorithm animation">Start Animation</button>
      <button id="resetBtn" aria-label="Reset visualization">Reset</button>
    </div>
    <div id="tooltip" role="tooltip"></div>
  </main>
  <script>
    (() => {
      const canvas = document.getElementById('primCanvas');
      const ctx = canvas.getContext('2d');
      const width = canvas.width;
      const height = canvas.height;

      const startBtn = document.getElementById('startBtn');
      const resetBtn = document.getElementById('resetBtn');
      const tooltip = document.getElementById('tooltip');

      // Color references
      const NODE_COLOR = '#ff6f61';
      const NODE_ACTIVE_COLOR = '#f9d423';
      const NODE_INACTIVE_COLOR = '#6e7986';
      const EDGE_COLOR = '#4a5e7a';
      const EDGE_ACTIVE_COLOR = '#f9d423';
      const EDGE_INACTIVE_COLOR = '#263347';

      // Node and graph parameters
      const NODE_RADIUS = 14;
      const ACTIVE_NODE_RADIUS = 18;

      // Animation timing
      const STEP_DURATION = 1200; // ms per step

      // Graph nodes preset (positioned with aesthetic layout)
      const nodes = [
        { id: 0, x: 140, y: 140 },
        { id: 1, x: 400, y: 90 },
        { id: 2, x: 590, y: 170 },
        { id: 3, x: 620, y: 400 },
        { id: 4, x: 460, y: 440 },
        { id: 5, x: 270, y: 440 },
        { id: 6, x: 100, y: 340 },
      ];

      // Edges defined as pairs with weights, undirected graph
      const edges = [
        { id: 0, from: 0, to: 1, weight: 14 },
        { id: 1, from: 0, to: 6, weight: 7 },
        { id: 2, from: 0, to: 5, weight: 9 },
        { id: 3, from: 1, to: 2, weight: 10 },
        { id: 4, from: 1, to: 6, weight: 2 },
        { id: 5, from: 2, to: 3, weight: 6 },
        { id: 6, from: 3, to: 4, weight: 4 },
        { id: 7, from: 4, to: 5, weight: 8 },
        { id: 8, from: 5, to: 6, weight: 11 },
        { id: 9, from: 2, to: 4, weight: 5 },
      ];

      // Graph adjacency list for quick access
      const adjacency = nodes.map(() => []);
      edges.forEach((e, i) => {
        adjacency[e.from].push({ to: e.to, weight: e.weight, edgeId: i });
        adjacency[e.to].push({ to: e.from, weight: e.weight, edgeId: i });
      });

      // State for visualization
      let mstEdges = new Set();
      let visited = new Set();
      let animationSteps = [];
      let animating = false;
      let animationStartTime = null;
      let currentStepIndex = 0;

      // Utility functions
      function lerp(a, b, t) {
        return a + (b - a) * t;
      }
      // Draw helpers
      function drawEdge(edge, highlight = false) {
        const fromNode = nodes[edge.from];
        const toNode = nodes[edge.to];
        ctx.lineCap = 'round';
        ctx.lineWidth = highlight ? 5 : 2;
        ctx.strokeStyle = highlight ? EDGE_ACTIVE_COLOR : EDGE_INACTIVE_COLOR;
        ctx.shadowColor = highlight ? EDGE_ACTIVE_COLOR : 'transparent';
        ctx.shadowBlur = highlight ? 8 : 0;
        ctx.beginPath();
        ctx.moveTo(fromNode.x, fromNode.y);
        ctx.lineTo(toNode.x, toNode.y);
        ctx.stroke();

        // Draw weight label at midpoint with slight offset
        const mx = (fromNode.x + toNode.x) / 2;
        const my = (fromNode.y + toNode.y) / 2;
        ctx.fillStyle = highlight ? EDGE_ACTIVE_COLOR : EDGE_INACTIVE_COLOR;
        ctx.font = '600 16px Montserrat';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowBlur = 6;
        ctx.shadowColor = highlight ? EDGE_ACTIVE_COLOR : 'transparent';
        ctx.fillText(edge.weight, mx, my - 16);
        ctx.shadowBlur = 0;
      }

      function drawNode(node, highlight = false, active = false) {
        ctx.shadowColor = highlight || active ? NODE_COLOR : 'transparent';
        ctx.shadowBlur = highlight || active ? 10 : 0;

        // Outer glow circle for active node
        if (active) {
          const gradient = ctx.createRadialGradient(node.x, node.y, NODE_RADIUS - 4, node.x, node.y, NODE_RADIUS + 36);
          gradient.addColorStop(0, 'rgba(249, 212, 35, 0.8)');
          gradient.addColorStop(1, 'rgba(249, 212, 35, 0)');
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(node.x, node.y, NODE_RADIUS + 36, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = highlight ? NODE_ACTIVE_COLOR : NODE_COLOR;
        ctx.beginPath();
        ctx.arc(node.x, node.y, active ? ACTIVE_NODE_RADIUS : NODE_RADIUS, 0, Math.PI * 2);
        ctx.fill();

        // Inner glow circle for highlight
        if (highlight) {
          const innerGradient = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, ACTIVE_NODE_RADIUS);
          innerGradient.addColorStop(0, 'rgba(249, 212, 35, 0.85)');
          innerGradient.addColorStop(1, 'rgba(255,111,97,0)');
          ctx.fillStyle = innerGradient;
          ctx.beginPath();
          ctx.arc(node.x, node.y, ACTIVE_NODE_RADIUS, 0, Math.PI * 2);
          ctx.fill();
        }

        // Node label (id + 1) centered
        ctx.fillStyle = '#141e30';
        ctx.font = '700 16px Montserrat';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowBlur = 8;
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.fillText(node.id + 1, node.x, node.y);
        ctx.shadowBlur = 0;
      }

      // Clear canvas with subtle radial background
      function clearCanvas() {
        const grad = ctx.createRadialGradient(width / 2, height / 2, height / 10, width / 2, height / 2, height);
        grad.addColorStop(0, '#1d2a48');
        grad.addColorStop(1, '#101a30');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);
      }

      // Draw full graph with MST edges highlighted
      function drawGraph(currentNodeId = null, nextEdge = null) {
        clearCanvas();

        // Draw all edges dimmed
        edges.forEach(edge => {
          const inMST = mstEdges.has(edge.id);
          const highlight = inMST;
          drawEdge(edge, highlight);
        });

        // Draw the next edge tentative highlight for step animation
        if (nextEdge !== null) {
          const edge = edges[nextEdge];
          drawEdge(edge, true);
        }

        // Draw nodes, highlight visited nodes and current active node
        nodes.forEach(node => {
          const isVisited = visited.has(node.id);
          const isCurrent = (node.id === currentNodeId);
          drawNode(node, isVisited, isCurrent);
        });
      }

      // Prim's algorithm logic with animation steps prep
      // We'll construct an array of steps: each step is selecting an edge to add to MST,
      // and updating visited nodes accordingly.
      // Steps format: { currentNode, chosenEdgeId }
      function prepareAnimationSteps() {
        // Reset state for the algorithm
        mstEdges.clear();
        visited.clear();
        animationSteps = [];

        const edgeCount = nodes.length - 1;

        // Use arrays and standard Prim's algorithm with showing step-by-step
        const key = Array(nodes.length).fill(Infinity);
        const parent = Array(nodes.length).fill(null);
        const inMST = Array(nodes.length).fill(false);

        key[0] = 0;

        for (let count = 0; count < nodes.length; count++) {
          // Pick the minimum key not in MST
          let u = -1;
          let minKey = Infinity;
          for (let v = 0; v < nodes.length; v++) {
            if (!inMST[v] && key[v] < minKey) {
              minKey = key[v];
              u = v;
            }
          }
          if (u === -1) break;
          inMST[u] = true;
          visited.add(u);

          if (parent[u] !== null) {
            // Find edge id for parent[u] <-> u
            const edgeId = edges.find(e => {
              return (e.from === u && e.to === parent[u]) || (e.to === u && e.from === parent[u]);
            }).id;
            animationSteps.push({ currentNode: u, chosenEdgeId: edgeId });
          } else {
            // Starting node, no edge chosen
            animationSteps.push({ currentNode: u, chosenEdgeId: null });
          }

          // Update key values
          adjacency[u].forEach(({ to, weight }) => {
            if (!inMST[to] && weight < key[to]) {
              key[to] = weight;
              parent[to] = u;
            }
          });
        }
      }

      // Animation loop variables
      let animationFrameId = null;

      function drawStep(stepIndex, progress = 1) {
        if (stepIndex >= animationSteps.length) {
          // Final draw with all edges visible
          drawGraph();
          return;
        }
        const step = animationSteps[stepIndex];
        const currentNode = step.currentNode;
        const edgeId = step.chosenEdgeId;

        // Show MST edges up to stepIndex-1
        mstEdges = new Set(animationSteps.slice(1, stepIndex).map(s => s.chosenEdgeId).filter(x => x !== null));
        // Draw current MST edges
        // Draw graph with current node highlighted
        // Animate drawing of the chosenEdge
        if (edgeId === null) {
          // First node, just draw graph with it active
          drawGraph(currentNode);
        } else {
          clearCanvas();

          // Draw edges already in MST
          edges.forEach(edge => {
            const inMST = mstEdges.has(edge.id);
            ctx.lineCap = 'round';
            ctx.lineWidth = inMST ? 5 : 2;
            ctx.strokeStyle = inMST ? EDGE_ACTIVE_COLOR : EDGE_INACTIVE_COLOR;
            ctx.shadowColor = inMST ? EDGE_ACTIVE_COLOR : 'transparent';
            ctx.shadowBlur = inMST ? 8 : 0;
            ctx.beginPath();

            if (edge.id === edgeId) {
              // Animate edge drawing from parent to current node
              const fromNode = nodes[edge.from];
              const toNode = nodes[edge.to];
              const t = progress; // progress 0 to 1

              let startX, startY, endX, endY;
              // Determine edge direction by parent/u definition:
              // Highlight from parent to current node for animation
              const step = animationSteps[stepIndex];

              if (toNode.id === currentNode) {
                startX = fromNode.x;
                startY = fromNode.y;
                endX = lerp(fromNode.x, toNode.x, t);
                endY = lerp(fromNode.y, toNode.y, t);
              } else {
                startX = toNode.x;
                startY = toNode.y;
                endX = lerp(toNode.x, fromNode.x, t);
                endY = lerp(toNode.y, fromNode.y, t);
              }
              ctx.moveTo(startX, startY);
              ctx.lineTo(endX, endY);
              ctx.stroke();

              // Draw partial edge weight label near end point
              ctx.fillStyle = EDGE_ACTIVE_COLOR;
              ctx.font = '600 16px Montserrat';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.shadowBlur = 6;
              ctx.shadowColor = EDGE_ACTIVE_COLOR;
              const labelX = lerp(fromNode.x, toNode.x, t);
              const labelY = lerp(fromNode.y, toNode.y, t) - 16;
              ctx.fillText(edges[edgeId].weight, labelX, labelY);
              ctx.shadowBlur = 0;

            } else {
              // Draw full edge but dimmed
              const fromNode = nodes[edge.from];
              const toNode = nodes[edge.to];
              ctx.moveTo(fromNode.x, fromNode.y);
              ctx.lineTo(toNode.x, toNode.y);
              ctx.stroke();

              // Weight label dim
              const mx = (fromNode.x + toNode.x) / 2;
              const my = (fromNode.y + toNode.y) / 2;
              ctx.fillStyle = EDGE_INACTIVE_COLOR;
              ctx.font = '600 16px Montserrat';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText(edge.weight, mx, my - 16);
            }
          });

          // Draw nodes with visited and current highlight
          nodes.forEach(node => {
            const visitedUntilNow = new Set(animationSteps.slice(0, stepIndex).map(s => s.currentNode));
            const isVisited = visitedUntilNow.has(node.id);
            const isCurrent = (node.id === currentNode);
            drawNode(node, isVisited, isCurrent);
          });
        }
      }

      function animate(timestamp) {
        if (!animationStartTime) animationStartTime = timestamp;
        const elapsed = timestamp - animationStartTime;
        const step = Math.floor(elapsed / STEP_DURATION);
        const progress = (elapsed % STEP_DURATION) / STEP_DURATION;

        if (step !== currentStepIndex && step < animationSteps.length) {
          currentStepIndex = step;
        }
        if (currentStepIndex < animationSteps.length) {
          drawStep(currentStepIndex, progress);
          animationFrameId = requestAnimationFrame(animate);
        } else {
          // End animation draw final
          drawStep(animationSteps.length);
          animating = false;
          startBtn.disabled = false;
          startBtn.setAttribute('aria-pressed', 'false');
        }
      }

      // Rounded shadow glow for canvas edges
      function applyCanvasGlow() {
        canvas.style.boxShadow =
          '0 0 30px 4px rgba(255,111,97,0.6), inset 0 0 15px rgba(249, 212, 35, 0.4)';
      }

      // Tooltip for nodes and edges to show info on hover (optional subtle effect)
      function handlePointerMove(e) {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const proximity = 22;

        // Check nodes proximity first
        let showTooltip = false;
        for (const node of nodes) {
          const dx = mx - node.x;
          const dy = my - node.y;
          if (dx * dx + dy * dy < proximity * proximity) {
            tooltip.innerText = `Node ${node.id + 1}`;
            tooltip.style.left = `${node.x + 18}px`;
            tooltip.style.top = `${node.y - 18}px`;
            tooltip.style.opacity = '1';
            showTooltip = true;
            return;
          }
        }
        // Check edges proximity (approximate with distance to closest point on line)
        for (const edge of edges) {
          const fromNode = nodes[edge.from];
          const toNode = nodes[edge.to];
          const dist = pointLineDistance(mx, my, fromNode.x, fromNode.y, toNode.x, toNode.y);
          if (dist < 14) {
            tooltip.innerText = `Edge (${edge.from + 1}, ${edge.to + 1}) Weight: ${edge.weight}`;
            const midX = (fromNode.x + toNode.x) / 2;
            const midY = (fromNode.y + toNode.y) / 2;
            tooltip.style.left = `${midX + 10}px`;
            tooltip.style.top = `${midY - 24}px`;
            tooltip.style.opacity = '1';
            showTooltip = true;
            return;
          }
        }
        if (!showTooltip) {
          tooltip.style.opacity = '0';
        }
      }
      // Distance from point (px,py) to line segment (x1,y1)-(x2,y2)
      function pointLineDistance(px, py, x1, y1, x2, y2) {
        const A = px - x1;
        const B = py - y1;
        const C = x2 - x1;
        const D = y2 - y1;

        const dot = A * C + B * D;
        const lenSq = C * C + D * D;
        let param = -1;
        if (lenSq !== 0) param = dot / lenSq;

        let xx, yy;

        if (param < 0) {
          xx = x1;
          yy = y1;
        } else if (param > 1) {
          xx = x2;
          yy = y2;
        } else {
          xx = x1 + param * C;
          yy = y1 + param * D;
        }

        const dx = px - xx;
        const dy = py - yy;
        return Math.sqrt(dx * dx + dy * dy);
      }

      // Initial draw
      function initialDraw() {
        mstEdges.clear();
        visited.clear();
        drawGraph();
      }

      // Button handlers
      function onStartClick() {
        if (animating) return;
        animating = true;
        startBtn.disabled = true;
        startBtn.setAttribute('aria-pressed', 'true');
        currentStepIndex = 0;
        animationStartTime = null;
        visited.clear();
        mstEdges.clear();

        prepareAnimationSteps();
        animationFrameId = requestAnimationFrame(animate);
      }
      function onResetClick() {
        if (animating) {
          cancelAnimationFrame(animationFrameId);
          animating = false;
          startBtn.disabled = false;
          startBtn.setAttribute('aria-pressed', 'false');
        }
        initialDraw();
        tooltip.style.opacity = '0';
      }

      // Accessibility: Enable keyboard button focus outlines elegantly
      function handleFocusVisible(e){
        if(e.target.matches('button')){
          e.target.style.outline = '2px solid var(--accent-color)';
          e.target.style.outlineOffset = '3px';
        }
      }
      function handleBlurVisible(e){
        if(e.target.matches('button')){
          e.target.style.outline = 'none';
        }
      }

      // Attach event listeners
      startBtn.addEventListener('click', onStartClick);
      resetBtn.addEventListener('click', onResetClick);
      canvas.addEventListener('pointermove', handlePointerMove);
      canvas.addEventListener('pointerleave', () => tooltip.style.opacity = '0');
      window.addEventListener('focus', () => { if(animating) animationFrameId = requestAnimationFrame(animate); });
      window.addEventListener('blur', () => { if(animating) cancelAnimationFrame(animationFrameId); });

      document.addEventListener('focusin', handleFocusVisible);
      document.addEventListener('focusout', handleBlurVisible);

      applyCanvasGlow();
      initialDraw();
    })();
  </script>
</body>
</html>
