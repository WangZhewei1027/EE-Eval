<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jump Search</title>
    <style>
        body {
            font-family: monospace;
            text-align: center;
        }
        #jump-search-container {
            width: 800px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #jump-search-container input, #jump-search-container select, #jump-search-container button {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
        }
        #jump-search-container button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #jump-search-container button:hover {
            background-color: #3e8e41;
        }
        #jump-search-container input[type="number"] {
            padding: 10px;
            margin-bottom: 20px;
        }
        #jump-search-container select {
            padding: 10px;
            margin-bottom: 20px;
        }
        #jump-search-container button[type="submit"] {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #jump-search-container button[type="submit"]:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div id="jump-search-container">
        <h2>Jump Search</h2>
        <form>
            <label for="word">Word:</label>
            <input type="text" id="word" name="word" placeholder="Enter word">
            <button type="submit">Search</button>
        </form>
        <button id="jump-button">Jump</button>
        <button id="max-button">Max</button>
        <button id="min-button">Min</button>
        <button id="step-button">Step</button>
        <button id="reset-button">Reset</button>
        <button id="add-button">Add</button>
    </div>

    <script>
        let jumpButton = document.getElementById('jump-button');
        let maxButton = document.getElementById('max-button');
        let minButton = document.getElementById('min-button');
        let stepButton = document.getElementById('step-button');
        let resetButton = document.getElementById('reset-button');
        let addButton = document.getElementById('add-button');
        let wordInput = document.getElementById('word');

        jumpButton.addEventListener('click', jumpSearch);
        maxButton.addEventListener('click', maxSearch);
        minButton.addEventListener('click', minSearch);
        stepButton.addEventListener('click', stepSearch);
        resetButton.addEventListener('click', resetSearch);
        addButton.addEventListener('click', addSearch);

        function jumpSearch() {
            let word = wordInput.value;
            let jump = parseInt(wordInput.value);
            let max = parseInt(maxInput.value);
            let min = parseInt(minInput.value);
            let step = parseInt(stepInput.value);

            if (jump < 1 || jump > 100) jump = 1;
            if (max < 1 || max > 100) max = 100;
            if (min < 1 || min > 100) min = 100;
            if (step < 1 || step > 10) step = 10;

            jumpSearchResult(word, jump, max, min, step);
        }

        function maxSearch() {
            let word = wordInput.value;
            let max = parseInt(maxInput.value);
            let jump = parseInt(jumpInput.value);
            let min = parseInt(minInput.value);
            let step = parseInt(stepInput.value);

            if (max < 1 || max > 100) max = 100;
            if (min < 1 || min > 100) min = 100;
            if (step < 1 || step > 10) step = 10;

            maxSearchResult(word, max, jump, min, step);
        }

        function minSearch() {
            let word = wordInput.value;
            let min = parseInt(minInput.value);
            let jump = parseInt(jumpInput.value);
            let max = parseInt(maxInput.value);
            let step = parseInt(stepInput.value);

            if (min < 1 || min > 100) min = 100;
            if (max < 1 || max > 100) max = 100;
            if (step < 1 || step > 10) step = 10;

            minSearchResult(word, min, jump, max, step);
        }

        function stepSearch() {
            let word = wordInput.value;
            let jump = parseInt(jumpInput.value);
            let max = parseInt(maxInput.value);
            let min = parseInt(minInput.value);
            let step = parseInt(stepInput.value);

            if (jump < 1 || jump > 100) jump = 1;
            if (max < 1 || max > 100) max = 100;
            if (min < 1 || min > 100) min = 100;
            if (step < 1 || step > 10) step = 10;

            stepSearchResult(word, jump, max, min, step);
        }

        function resetSearch() {
            jumpInput.value = '';
            maxInput.value = '';
            minInput.value = '';
            stepInput.value = '';
            wordInput.value = '';
        }

        function addSearch() {
            let word = wordInput.value;
            let jump = parseInt(jumpInput.value);
            let max = parseInt(maxInput.value);
            let min = parseInt(minInput.value);
            let step = parseInt(stepInput.value);

            jumpSearchResult(word, jump, max, min, step);
            wordInput.value = '';
            jumpInput.value = '';
            maxInput.value = '';
            minInput.value = '';
            stepInput.value = '';
        }

        function jumpSearchResult(word, jump, max, min, step) {
            let result = '';
            if (word.length > jump) result += 'Search too long';
            if (word.length > min) result += 'Search too short';
            if (word.length > max) result += 'Search too short';
            if (jump > max) result += 'Jump too high';
            if (jump < min) result += 'Jump too low';
            if (step > 10) result += 'Step too high';
            if (step < 1) result += 'Step too low';
            console.log(result);
        }

        function maxSearchResult(word, max, jump, min, step) {
            let result = '';
            if (word.length > max) result += 'Search too long';
            if (word.length > min) result += 'Search too short';
            if (jump > max) result += 'Jump too high';
            if (jump < min) result += 'Jump too low';
            if (step > 10) result += 'Step too high';
            if (step < 1) result += 'Step too low';
            console.log(result);
        }

        function minSearchResult(word, min, jump, max, step) {
            let result = '';
            if (word.length > min) result += 'Search too long';
            if (word.length > max) result += 'Search too short';
            if (jump > min) result += 'Jump too high';
            if (jump < min) result += 'Jump too low';
            if (step > 10) result += 'Step too high';
            if (step < 1) result += 'Step too low';
            console.log(result);
        }

        function stepSearchResult(word, jump, max, min, step) {
            let result = '';
            if (word.length > jump) result += 'Search too long';
            if (word.length > min) result += 'Search too short';
            if (jump > max) result += 'Jump too high';
            if (jump < min) result += 'Jump too low';
            if (step > 10) result += 'Step too high';
            if (step < 1) result += 'Step too low';
            console.log(result);
        }

        jumpButton.addEventListener('click', jumpSearch);
        maxButton.addEventListener('click', maxSearch);
        minButton.addEventListener('click', minSearch);
        stepButton.addEventListener('click', stepSearch);
        resetButton.addEventListener('click', resetSearch);
        addButton.addEventListener('click', addSearch);
    </script>
</body>
</html>
