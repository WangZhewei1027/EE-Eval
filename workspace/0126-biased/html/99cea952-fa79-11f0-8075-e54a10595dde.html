<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Sort Visualizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #arrayContainer {
            display: flex;
            align-items: flex-end;
            height: 200px;
            width: 100%;
            border: 1px solid black;
        }
        .bar {
            width: 20px;
            margin-right: 2px;
            background-color: black;
        }
    </style>
</head>
<body>

<h1>Selection Sort Visualizer</h1>
<label for="arrayInput">Enter comma-separated numbers:</label>
<input type="text" id="arrayInput" placeholder="e.g. 34,7,23,32,5" />
<button id="generateArray">Generate Array</button>
<button id="startSort">Start Selection Sort</button>
<button id="reset">Reset</button>

<div id="arrayContainer"></div>

<script>
    let array = [];
    let interval;

    document.getElementById('generateArray').onclick = function() {
        const input = document.getElementById('arrayInput').value;
        array = input.split(',').map(Number);
        renderArray();
    };

    document.getElementById('startSort').onclick = function() {
        if (array.length === 0) {
            alert('Please generate an array first.');
            return;
        }
        SelectionSort();
    };

    document.getElementById('reset').onclick = function() {
        clearInterval(interval);
        array = [];
        document.getElementById('arrayInput').value = '';
        document.getElementById('arrayContainer').innerHTML = '';
    };

    function renderArray() {
        const container = document.getElementById('arrayContainer');
        container.innerHTML = '';
        array.forEach(num => {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = num * 5 + 'px'; // height for visual representation
            container.appendChild(bar);
        });
    }

    function SelectionSort() {
        let n = array.length;
        let i = 0;
        let j = 0;
        let minIndex = 0;

        interval = setInterval(() => {
            if (i < n - 1) {
                minIndex = i;
                j = i + 1;

                if (j < n) {
                    if (array[j] < array[minIndex]) {
                        minIndex = j;
                    }
                    if (j === n - 1) {
                        [array[i], array[minIndex]] = [array[minIndex], array[i]];
                        i++;
                        renderArray();
                    }
                    j++;
                } 
            } else {
                clearInterval(interval);
            }
        }, 500);
    }
</script>

</body>
</html>
