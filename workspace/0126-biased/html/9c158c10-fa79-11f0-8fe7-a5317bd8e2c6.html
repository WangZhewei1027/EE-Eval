<script>
/*
  Minimal-visual SQL sandbox with rich interactivity.
  Features:
   - In-memory DB with tables, rows, indexes
   - Table creation, drop, insert, update, delete
   - Query builder with joins, where, group by, aggregates, having, order, limit, distinct
   - Explain / step-through execution stages
   - Transaction begin/commit/rollback
   - Index creation and simulated use
   - Query history and saved queries
   - Import/export DB JSON
   - Raw SQL parser (very limited)
*/

// Utility helpers
function clone(obj){ return JSON.parse(JSON.stringify(obj)); }
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function isObject(v){ return v && typeof v === 'object' && !Array.isArray(v); }

// Simple in-memory DB
class SimpleDB {
  constructor(){
    this.tables = {}; // tableName -> {columns: [{name,type}], rows: [rowObj], indexes: {col: Map(value->Set(rowId))}, nextIdCounter: int}
    this.txSnapshot = null;
    this.history = [];
    this.savedQueries = {};
  }

  createTable(name, cols){
    if(this.tables[name]) throw new Error('Table exists: '+name);
    const columns = cols.map(c => {
      if(typeof c === 'string'){
        const parts = c.split(':');
        return {name: parts[0].trim(), type: parts[1] ? parts[1].trim() : 'text'};
      } else return c;
    });
    this.tables[name] = {columns, rows: [], indexes: {}, nextIdCounter: 1};
  }

  dropTable(name){
    delete this.tables[name];
  }

  insert(table, rowObj){
    if(!this.tables[table]) throw new Error('No table: '+table);
    const id = this.tables[table].nextIdCounter++;
    const row = Object.assign({}, rowObj);
    row.__id = id;
    this.tables[table].rows.push(row);
    // update indexes
    for(const col in this.tables[table].indexes){
      const idx = this.tables[table].indexes[col];
      const val = row[col] === undefined ? null : row[col];
      if(!idx.has(val)) idx.set(val, new Set());
      idx.get(val).add(id);
    }
  }

  deleteWhere(table, predicate){
    const t = this.tables[table];
    if(!t) throw new Error('No table: '+table);
    const toKeep = [];
    for(const r of t.rows){
      if(!predicate(r)){
        toKeep.push(r);
      } else {
        // remove from indexes
        for(const col in t.indexes){
          const idx = t.indexes[col];
          const val = r[col] === undefined ? null : r[col];
          const s = idx.get(val);
          if(s) s.delete(r.__id);
        }
      }
    }
    t.rows = toKeep;
  }

  updateWhere(table, predicate, updater){
    const t = this.tables[table];
    if(!t) throw new Error('No table: '+table);
    for(const r of t.rows){
      if(predicate(r)){
        // remove old index entries for changed columns
        for(const col in t.indexes){
          if(r[col] !== undefined){
            const idx = t.indexes[col];
            const oldVal = r[col] === undefined ? null : r[col];
            const s = idx.get(oldVal);
            if(s) s.delete(r.__id);
          }
        }
        updater(r);
        // re-add to index
        for(const col in t.indexes){
          const idx = t.indexes[col];
          const val = r[col] === undefined ? null : r[col];
          if(!idx.has(val)) idx.set(val, new Set());
          idx.get(val).add(r.__id);
        }
      }
    }
  }

  createIndex(table, col){
    const t = this.tables[table];
    if(!t) throw new Error('No table: '+table);
    if(t.indexes[col]) return;
    const map = new Map();
    for(const r of t.rows){
      const val = r[col] === undefined ? null : r[col];
      if(!map.has(val)) map.set(val, new Set());
      map.get(val).add(r.__id);
    }
    t.indexes[col] = map;
  }

  dropIndex(table, col){
    const t = this.tables[table];
    if(!t) throw new Error('No table: '+table);
    delete t.indexes[col];
  }

  beginTransaction(){
    if(this.txSnapshot) throw new Error('Transaction already in progress');
    this.txSnapshot = clone(this.tables);
  }

  commit(){
    this.txSnapshot = null;
  }

  rollback(){
    if(!this.txSnapshot) throw new Error('No transaction');
    this.tables = this.txSnapshot;
    this.txSnapshot = null;
  }
}

const db = new SimpleDB();

// Example data setup

  db.createTable('users', ['id:int','name:text','email:text','age:int']);
  db.insert('users', {id:1, name:'Alice', email:'alice@example.com', age:30});

  db.insert('orders', {order_id:101, user_id:1, product:'Widget', amount:9.99, created:'2022-01-01'});

function refreshTableSelects(){
  tableSelect.innerHTML = '';
  fromTables.innerHTML = '';
  indexTableSelect.innerHTML = '';
  for(const t of Object.keys(db.tables)){
    const opt = document.createElement('option'); opt.value = t; opt.textContent = t;
    tableSelect.appendChild(opt);
    const opt2 = document.createElement('option'); opt2.value = t; opt2.textContent = t;
    fromTables.appendChild(opt2);
    const opt3 = document.createElement('option'); opt3.value = t; opt3.textContent = t;
    indexTableSelect.appendChild(opt3);
  }
}

function refreshUI(){
  refreshTableSelects();
  refreshColumnsArea();
  refreshIndexesArea();
  refreshHistory();
  refreshSavedQueries();
  tableView.innerHTML = '';
  tableEditControls.innerHTML = '';
  explainArea.innerHTML = '';
  queryResult.innerHTML = '';
}

function renderTable(name, editable){
  const t = db.tables[name];
  if(!t) { tableView.textContent = 'No such table'; return; }
  const maxDisplay = parseInt(rowDisplaySlider.value,10) || 50;
  const rows = t.rows.slice(0, maxDisplay);
  let html = '<table border="1"><thead><tr>';
  for(const c of t.columns) html += '<th>'+escapeHtml(c.name)+'</th>';
  html += '<th>__id</th><th>Actions</th></tr></thead><tbody>';
  for(const r of rows){
    html += '<tr>';
    for(const c of t.columns){
      html += '<td>'+escapeHtml(r[c.name]===undefined?'NULL':String(r[c.name])) +'</td>';
    }
    html += '<td>'+escapeHtml(r.__id)+'</td>';
    html += '<td>';
    html += '<button data-table="'+name+'" data-id="'+r.__id+'" class="editRowBtn">Edit</button> ';
    html += '<button data-table="'+name+'" data-id="'+r.__id+'" class="delRowBtn">Delete</button>';
    html += '</td></tr>';
  }
  html += '</tbody></table>';
  tableView.innerHTML = html;
  attachTableRowButtons();
}

function attachTableRowButtons(){
  const editBtns = document.querySelectorAll('.editRowBtn');
  for(const b of editBtns){
    b.onclick = function(){
      const tbl = this.dataset.table;
      const id = parseInt(this.dataset.id,10);
      showEditRowForm(tbl, id);
    };
  }
  const delBtns = document.querySelectorAll('.delRowBtn');
  for(const b of delBtns){
    b.onclick = function(){
      const tbl = this.dataset.table;
      const id = parseInt(this.dataset.id,10);
      if(confirm('Delete row '+id+' from '+tbl+'?')){
        db.deleteWhere(tbl, r=>r.__id===id);
        refreshUI();
        renderTable(tbl);
      }
    };
  }
}

function showEditRowForm(table, id){
  const t = db.tables[table];
  const row = t.rows.find(r=>r.__id===id);
  if(!row) return;
  const container = document.createElement('div');
  container.innerHTML = '<h4>Editing row '+id+' in '+table+'</h4>';
  const form = document.createElement('div');
  for(const c of t.columns){
    const input = document.createElement('input'); input.value = row[c.name]===undefined?'':row[c.name];
    input.dataset.col = c.name;
    form.appendChild(document.createTextNode(c.name+': '));
    form.appendChild(input);
    form.appendChild(document.createElement('br'));
  }
  const saveBtn = document.createElement('button'); saveBtn.textContent = 'Save';
  saveBtn.onclick = function(){
    const updates = {};
    for(const inp of form.querySelectorAll('input')){
      const col = inp.dataset.col;
      const val = inp.value;
      updates[col] = val === '' ? null : parseValue(val);
    }
    db.updateWhere(table, r => r.__id===id, r=>{
      for(const k in updates) r[k] = updates[k];
    });
    refreshUI();
    renderTable(table);
    container.remove();
  };
  const cancelBtn = document.createElement('button'); cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = ()=>container.remove();
  container.appendChild(form);
  container.appendChild(saveBtn);
  container.appendChild(cancelBtn);
  tableEditControls.innerHTML = '';
  tableEditControls.appendChild(container);
}

function parseValue(v){
  if(v === null || v === 'null') return null;
  if(v === 'true') return true;
  if(v === 'false') return false;
  if(!isNaN(Number(v)) && v.trim() !== '') return Number(v);
  return v;
}

// Query builder internals: dynamic controls
function refreshColumnsArea(){
  columnsArea.innerHTML = '';
  // if one table selected show its columns as checkboxes; if multiple show combined
  const selected = Array.from(fromTables.selectedOptions).map(o=>o.value);
  const allCols = {};
  for(const tName of selected){
    const t = db.tables[tName];
    if(!t) continue;
    for(const c of t.columns){
      const key = tName + '.' + c.name;
      allCols[key] = {table:tName, col:c.name};
    }
  }
  // Show list with checkboxes
  const container = document.createElement('div');
  for(const key of Object.keys(allCols)){
    const cb = document.createElement('input'); cb.type='checkbox'; cb.value=key;
    const lbl = document.createElement('label');
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(' '+key));
    container.appendChild(lbl);
    container.appendChild(document.createElement('br'));
  }
  // allow selecting all or none
  const selectAllBtn = document.createElement('button'); selectAllBtn.textContent = 'Select All';
  selectAllBtn.onclick = function(){
    for(const cb of container.querySelectorAll('input[type=checkbox]')) cb.checked = true;
  };
  const deselectBtn = document.createElement('button'); deselectBtn.textContent = 'Deselect';
  deselectBtn.onclick = function(){
    for(const cb of container.querySelectorAll('input[type=checkbox]')) cb.checked = false;
  };
  columnsArea.appendChild(selectAllBtn);
  columnsArea.appendChild(deselectBtn);
  columnsArea.appendChild(container);
}

// Join controls
function addJoinControl(prefill){
  const div = document.createElement('div');
  const leftTableSel = document.createElement('select');
  for(const t of Object.keys(db.tables)){ const o = document.createElement('option'); o.value=t; o.text = t; leftTableSel.appendChild(o); }
  const leftColSel = document.createElement('select');
  const rightTableSel = document.createElement('select');
  for(const t of Object.keys(db.tables)){ const o = document.createElement('option'); o.value=t; o.text = t; rightTableSel.appendChild(o); }
  const rightColSel = document.createElement('select');
  const typeSel = document.createElement('select');
  for(const typ of ['INNER','LEFT','RIGHT','CROSS']){ const o = document.createElement('option'); o.value=typ; o.text=typ; typeSel.appendChild(o); }
  function refreshCols(){
    const lt = db.tables[leftTableSel.value];
    const rt = db.tables[rightTableSel.value];
    leftColSel.innerHTML = ''; rightColSel.innerHTML = '';
    if(lt) for(const c of lt.columns){ const o=document.createElement('option'); o.value=c.name; o.text=c.name; leftColSel.appendChild(o); }
    if(rt) for(const c of rt.columns){ const o=document.createElement('option'); o.value=c.name; o.text=c.name; rightColSel.appendChild(o); }
  }
  leftTableSel.onchange = refreshCols;
  rightTableSel.onchange = refreshCols;
  refreshCols();
  div.appendChild(leftTableSel); div.appendChild(leftColSel); div.appendChild(typeSel); div.appendChild(rightTableSel); div.appendChild(rightColSel);
  const rem = document.createElement('button'); rem.textContent = 'Remove'; rem.onclick = ()=>div.remove();
  div.appendChild(rem);
  joinsArea.appendChild(div);
  if(prefill){
    if(prefill.leftTable) leftTableSel.value = prefill.leftTable;
    if(prefill.leftCol) { refreshCols(); leftColSel.value = prefill.leftCol; }
    if(prefill.rightTable) rightTableSel.value = prefill.rightTable;
    if(prefill.rightCol) { refreshCols(); rightColSel.value = prefill.rightCol; }
    if(prefill.type) typeSel.value = prefill.type;
  }
}

addJoinBtn.onclick = ()=>addJoinControl();
clearJoinsBtn.onclick = ()=>{ joinsArea.innerHTML = ''; };

// Where controls
function addCondition(area, prefill){
  const div = document.createElement('div');
  const tables = Array.from(fromTables.options).map(o=>o.value);
  const tableSel = document.createElement('select');
  for(const t of tables) { const o=document.createElement('option'); o.value=t; o.text=t; tableSel.appendChild(o); }
  const colSel = document.createElement('select');
  function refreshCols(){
    colSel.innerHTML='';
    const t = db.tables[tableSel.value];
    if(t) for(const c of t.columns){ const o=document.createElement('option'); o.value=c.name; o.text=c.name; colSel.appendChild(o); }
  }
  tableSel.onchange = refreshCols;
  refreshCols();
  const opSel = document.createElement('select');
  for(const op of ['=','!=','>','<','>=','<=','LIKE','IN','BETWEEN','IS NULL','IS NOT NULL']){ const o=document.createElement('option'); o.value=op; o.text=op; opSel.appendChild(o); }
  const valInput = document.createElement('input');
  valInput.placeholder = 'value (for IN use comma separated, BETWEEN use a and b)';
  const boolSel = document.createElement('select');
  for(const b of ['AND','OR']){ const o=document.createElement('option'); o.value=b; o.text=b; boolSel.appendChild(o); }
  const rem = document.createElement('button'); rem.textContent = 'Remove'; rem.onclick = ()=>div.remove();
  div.appendChild(boolSel); div.appendChild(tableSel); div.appendChild(document.createTextNode('.')); div.appendChild(colSel); div.appendChild(opSel); div.appendChild(valInput); div.appendChild(rem);
  if(prefill){
    if(prefill.table) tableSel.value = prefill.table;
    if(prefill.col) { refreshCols(); colSel.value = prefill.col; }
    if(prefill.op) opSel.value = prefill.op;
    if(prefill.val) valInput.value = prefill.val;
    if(prefill.bool) boolSel.value = prefill.bool;
  }
  area.appendChild(div);
}
addWhereBtn.onclick = ()=>addCondition(whereArea);
clearWhereBtn.onclick = ()=>whereArea.innerHTML = '';

// Group by
addGroupByBtn.onclick = function(){
  const div = document.createElement('div');
  const tableSel = document.createElement('select');
  for(const t of Object.keys(db.tables)){ const o=document.createElement('option'); o.value=t; o.text=t; tableSel.appendChild(o); }
  const colSel = document.createElement('select');
  tableSel.onchange = function(){
    colSel.innerHTML='';
    const t = db.tables[tableSel.value];
    if(t) for(const c of t.columns){ const o=document.createElement('option'); o.value=c.name; o.text=c.name; colSel.appendChild(o); }
  };
  tableSel.onchange();
  const rem = document.createElement('button'); rem.textContent='Remove'; rem.onclick=()=>div.remove();
  div.appendChild(tableSel); div.appendChild(document.createTextNode('.')); div.appendChild(colSel); div.appendChild(rem);
  groupByArea.appendChild(div);
};

// Aggregates
addAggBtn.onclick = function(){

              const s = new Set(setArr);
              map.set(k==='null'?null:k, s);

          }
          t.indexes[c] = map;
        }

    }

function captureQueryState(){
  // capture fromTables selection, columns selections, joins, where, group, aggs, having, order, limit, offset, distinct, expressions
  const state = {};
  state.fromTables = Array.from(fromTables.selectedOptions).map(o=>o.value);
  // columns: collect checked checkboxes and expressions
  state.columnsChecked = Array.from(columnsArea.querySelectorAll('input[type=checkbox]')).filter(c=>c.checked).map(c=>c.value);
  state.expressions = Array.from(columnsArea.querySelectorAll('div')).map(d=>{
    const inp = d.querySelector('input'); const alias = d.querySelectorAll('input')[1];
    if(!inp) return null;
    return {expr: inp.value, alias: alias?alias.value:''};
  }).filter(Boolean);
  // joins
  state.joins = Array.from(joinsArea.children).map(div=>{
    const sel = div.querySelectorAll('select');
    return {leftTable: sel[0].value, leftCol: sel[1].value, type: sel[2].value, rightTable: sel[3].value, rightCol: sel[4].value};
  });
  // where
  state.where = Array.from(whereArea.children).map(div=>{
    const selects = div.querySelectorAll('select'); const inputs = div.querySelectorAll('input');
    return {bool: selects[0].value, table: selects[1].value, col: selects[2].value, op: selects[3].value, val: inputs[0].value};
  });
  // group
  state.groupBy = Array.from(groupByArea.children).map(div=>{ const sels = div.querySelectorAll('select'); return {table:sels[0].value, col:sels[1].value}; });
  state.aggs = Array.from(aggArea.children).map(div=>{
    const sels = div.querySelectorAll('select'); const alias = div.querySelector('input'); return {func:sels[0].value, table:sels[1].value, col:sels[2].value, alias: alias?alias.value:''};
  });
  state.having = Array.from(havingArea.children).map(div=>{
    const sel = div.querySelectorAll('select'); const inp = div.querySelector('input');
    return {bool: sel[0].value, table: sel[1].value, col: sel[2].value, op: sel[3].value, val: inp.value};
  });
  state.order = Array.from(orderArea.children).map(div=>{
    const sel = div.querySelectorAll('select'); return {table: sel[0].value, col: sel[1].value, dir: sel[2].value};
  });
  state.limit = parseInt(limitSlider.value,10); state.offset = parseInt(offsetInput.value,10);
  state.distinct = document.getElementById('distinctChk').checked;
  return state;
}

// Query execution engine built from builder state
function buildQueryFromUI(){
  const q = {};
  q.fromTables = Array.from(fromTables.selectedOptions).map(o=>o.value);
  q.joins = Array.from(joinsArea.children).map(div=>{
    const sel = div.querySelectorAll('select');
    return {leftTable: sel[0].value, leftCol: sel[1].value, type: sel[2].value, rightTable: sel[3].value, rightCol: sel[4].value};
  });
  q.columns = Array.from(columnsArea.querySelectorAll('input[type=checkbox]')).filter(c=>c.checked).map(c=>{
    const [t,cname] = c.value.split('.');
    return {table:t, col:cname, expr:null, alias:cname};
  });
  // expressions
  const exprDivs = Array.from(columnsArea.children).filter(n=>n.tagName==='DIV');
  for(const div of exprDivs){
    const inputs = div.querySelectorAll('input');
    if(inputs.length){
      q.columns.push({table:null, col:null, expr: inputs[0].value, alias: inputs[1] ? inputs[1].value : ''});
    }
  }
  q.distinct = document.getElementById('distinctChk').checked;
  // where
  q.where = Array.from(whereArea.children).map(div=>{
    const sel = div.querySelectorAll('select'); const inp = div.querySelector('input');
    return {bool: sel[0].value, table: sel[1].value, col: sel[2].value, op: sel[3].value, val: inp.value};
  });
  // group
  q.groupBy = Array.from(groupByArea.children).map(div=>{ const sels = div.querySelectorAll('select'); return {table:sels[0].value, col:sels[1].value}; });
  // aggs
  q.aggs = Array.from(aggArea.children).map(div=>{
    const sels = div.querySelectorAll('select'); const alias = div.querySelector('input');
    return {func:sels[0].value, table:sels[1].value, col:sels[2].value, alias: alias?alias.value:''};
  });
  q.having = Array.from(havingArea.children).map(div=>{
    const sel = div.querySelectorAll('select'); const inp = div.querySelector('input');
    return {bool: sel[0].value, table: sel[1].value, col: sel[2].value, op: sel[3].value, val: inp.value};
  });
  q.order = Array.from(orderArea.children).map(div=>{
    const sel = div.querySelectorAll('select'); return {table: sel[0].value, col: sel[1].value, dir: sel[2].value};
  });
  q.limit = parseInt(limitSlider.value,10) || 0;
  q.offset = parseInt(offsetInput.value,10) || 0;
  return q;
}

// Generate SQL string from q
function generateSql(q){
  if(!q) q = buildQueryFromUI();
  const parts = [];
  parts.push('SELECT ' + (q.distinct ? 'DISTINCT ' : '') + (q.columns.length? q.columns.map(c=>{
    if(c.expr) return c.expr + (c.alias? ' AS '+c.alias:'');
    return (c.table? c.table+'.':'')+c.col + (c.alias? ' AS '+c.alias:'');
  }).join(', ') : '*'));
  if(q.fromTables.length) parts.push('FROM ' + q.fromTables.join(', '));
  if(q.joins.length){
    for(const j of q.joins){
      parts.push(`${j.type} JOIN ${j.rightTable} ON ${j.leftTable}.${j.leftCol} = ${j.rightTable}.${j.rightCol}`);
    }
  }
  if(q.where.length){
    parts.push('WHERE ' + q.where.map((w,i)=> (i>0 ? w.bool + ' ' : '') + `${w.table}.${w.col} ${w.op} ${w.val? w.val : ''}`).join(' '));
  }
  if(q.groupBy.length) parts.push('GROUP BY ' + q.groupBy.map(g=>g.table+'.'+g.col).join(', '));
  if(q.aggs.length) {
    // aggregates are in select already
  }
  if(q.having.length) parts.push('HAVING ' + q.having.map((h,i)=> (i>0 ? h.bool + ' ' : '') + `${h.table}.${h.col} ${h.op} ${h.val? h.val : ''}`).join(' '));
  if(q.order.length) parts.push('ORDER BY ' + q.order.map(o=> o.table+'.'+o.col+' '+o.dir).join(', '));
  if(q.limit) parts.push('LIMIT '+q.limit);
  if(q.offset) parts.push('OFFSET '+q.offset);
  return parts.join(' ');
}

generateSqlBtn.onclick = function(){
  const q = buildQueryFromUI();
  const sql = generateSql(q);
  explainArea.innerHTML = '<pre>'+escapeHtml(sql)+'</pre>';
};

// Query engine: evaluate q against db.tables
function evaluateQuery(q, stepCallback){
  // Step 0: Validation
  const steps = [];
  // Step 1: build base combined rows (cartesian if multiple fromTables) or single table
  let rows = [];
  if(q.fromTables.length === 0){
    // No table -> empty result
    rows = [];
  } else {
    // Start with first table rows as objects with table-qualified keys
    function rowWrap(table, row){
      const out = {};
      for(const c of db.tables[table].columns) out[table+'.'+c.name] = row[c.name] === undefined ? null : row[c.name];
      out['__meta'] = out['__meta'] || {};
      out['__meta'][table] = row;
      return out;
    }
    rows = db.tables[q.fromTables[0]] ? db.tables[q.fromTables[0]].rows.map(r=>rowWrap(q.fromTables[0], r)) : [];
    // If joins specified, apply them in order; otherwise if more than 1 from table and no joins, do cartesian product
    if(q.joins.length){
      for(const j of q.joins){
        const newRows = [];
        const rightRows = db.tables[j.rightTable] ? db.tables[j.rightTable].rows : [];
        // Check if we can use index on rightTable for equality
        const rightHasIndex = (db.tables[j.rightTable] && db.tables[j.rightTable].indexes[j.rightCol]);
        // For each existing combined row, join with right rows where leftTable.leftCol == rightTable.rightCol
        for(const r of rows){
          const leftVal = r[j.leftTable + '.' + j.leftCol];
          if(j.type === 'CROSS'){
            for(const rr of rightRows){
              const nw = Object.assign({}, r);
              const wrapped = {};
              for(const c of db.tables[j.rightTable].columns) wrapped[j.rightTable+'.'+c.name] = rr[c.name] === undefined ? null : rr[c.name];
              Object.assign(nw, wrapped);
              nw.__meta = nw.__meta || {}; nw.__meta[j.rightTable] = rr;
              newRows.push(nw);
            }
          } else {
            // Try index usage
            if(rightHasIndex && leftVal !== undefined && leftVal !== null){
              const idx = db.tables[j.rightTable].indexes[j.rightCol];
              const set = idx.get(leftVal);
              if(set && set.size){
                for(const rid of set){
                  const rr = db.tables[j.rightTable].rows.find(x=>x.__id===rid);
                  if(!rr) continue;
                  const nw = Object.assign({}, r);
                  const wrapped = {};
                  for(const c of db.tables[j.rightTable].columns) wrapped[j.rightTable+'.'+c.name] = rr[c.name] === undefined ? null : rr[c.name];
                  Object.assign(nw, wrapped);
                  nw.__meta = nw.__meta || {}; nw.__meta[j.rightTable] = rr;
                  newRows.push(nw);
                }
                continue;
              }
            }
            // fallback nested loop
            let matched = false;
            for(const rr of rightRows){
              if(rr[j.rightCol] === leftVal){
                matched = true;
                const nw = Object.assign({}, r);
                const wrapped = {};
                for(const c of db.tables[j.rightTable].columns) wrapped[j.rightTable+'.'+c.name] = rr[c.name] === undefined ? null : rr[c.name];
                Object.assign(nw, wrapped);
                nw.__meta = nw.__meta || {}; nw.__meta[j.rightTable] = rr;
                newRows.push(nw);
              }
            }
            if(!matched && j.type === 'LEFT'){
              // preserve left, right nulls
              const nw = Object.assign({}, r);
              const wrapped = {};
              for(const c of db.tables[j.rightTable].columns) wrapped[j.rightTable+'.'+c.name] = null;
              Object.assign(nw, wrapped);
              nw.__meta = nw.__meta || {}; nw.__meta[j.rightTable] = null;
              newRows.push(nw);
            }
            // RIGHT join: need to include right-only rows - handled later by reversing join direction if necessary
          }
        }
        rows = newRows;
      }
    } else {
      // No joins, if multiple tables in FROM do cartesian product
      for(let i=1;i<q.fromTables.length;i++){
        const t = q.fromTables[i];
        const newRows = [];
        for(const a of rows){
          for(const rr of (db.tables[t] ? db.tables[t].rows : [])){
            const nw = Object.assign({}, a);
            const wrapped = {};
            for(const c of db.tables[t].columns) wrapped[t+'.'+c.name] = rr[c.name] === undefined ? null : rr[c.name];
            Object.assign(nw, wrapped);
            nw.__meta = nw.__meta || {}; nw.__meta[t] = rr;
            newRows.push(nw);
          }
        }
        rows = newRows;
      }
    }
  }
  steps.push({step:'After FROM/JOIN', count: rows.length, sample: rows.slice(0,10)});

  // Step 2: WHERE filter
  if(q.where.length){
    function evalCond(row, cond){
      const left = row[cond.table + '.' + cond.col];
      const op = cond.op;
      const rawVal = cond.val;
      if(op === 'IS NULL') return left === null || left === undefined;
      if(op === 'IS NOT NULL') return !(left === null || left === undefined);
      if(op === 'IN'){
        const arr = rawVal.split(',').map(s=>parseValue(s.trim()));
        return arr.includes(left);
      }
      if(op === 'BETWEEN'){
        const parts = rawVal.split('and').map(s=>parseValue(s.trim()));
        if(parts.length < 2) return false;
        const a = parts[0], b = parts[1];
        return left >= a && left <= b;
      }
      if(op === 'LIKE'){
        const pattern = rawVal.replace(/%/g, '.*').replace(/_/g, '.');
        try{
          const re = new RegExp('^'+pattern+'$');
          return re.test(String(left));
        }catch(e){ return false; }
      }
      const right = parseValue(rawVal);
      switch(op){
        case '=': return left == right;
        case '!=': return left != right;
        case '>': return left > right;
        case '<': return left < right;
        case '>=': return left >= right;
        case '<=': return left <= right;
      }
      return false;
    }
    // Combine conditions with boolean logic (simple left-to-right, honoring AND/OR tokens)
    rows = rows.filter(row=>{
      let result = null;
      for(const c of q.where){
        const val = evalCond(row, c);
        if(result === null) result = val;
        else {
          if(c.bool === 'AND') result = result && val;
          else result = result || val;
        }
      }
      return result;
    });
    steps.push({step:'After WHERE', count: rows.length, sample: rows.slice(0,10)});
  } else {
    steps.push({step:'After WHERE', count: rows.length, sample: rows.slice(0,10)});
  }

  // Step 3: GROUP BY + Aggregates
  let grouped = null;
  if(q.groupBy.length){
    grouped = new Map();
    for(const r of rows){
      const keyParts = q.groupBy.map(g=> r[g.table + '.' + g.col]);
      const key = JSON.stringify(keyParts);
      if(!grouped.has(key)) grouped.set(key, {rows: [], keyParts});
      grouped.get(key).rows.push(r);
    }
    // compute aggregates for each group
    const groupResults = [];
    for(const [k, val] of grouped.entries()){
      const out = {};
      // attach group by columns with names like table.col
      q.groupBy.forEach((g, idx)=> out[g.table + '.' + g.col] = val.keyParts[idx]);
      // compute defined aggregates
      for(const a of q.aggs){
        const values = val.rows.map(rr => rr[a.table + '.' + a.col]).filter(v=>v!==null && v!==undefined);
        let aggVal = null;
        switch(a.func){
          case 'COUNT': aggVal = values.length; break;
          case 'SUM': aggVal = values.reduce((s,x)=>s+(Number(x)||0), 0); break;
          case 'AVG': aggVal = values.length? (values.reduce((s,x)=>s+(Number(x)||0),0)/values.length):null; break;
          case 'MIN': aggVal = values.length? values.reduce((m,x)=> x<m?x:m, values[0]) : null; break;
          case 'MAX': aggVal = values.length? values.reduce((m,x)=> x>m?x:m, values[0]) : null; break;
        }
        const name = a.alias || (a.func+'('+a.table+'.'+a.col+')');
        out[name] = aggVal;
      }
      groupResults.push(out);
    }
    rows = groupResults;
    steps.push({step:'After GROUP BY', count: rows.length, sample: rows.slice(0,10)});
  } else {
    // Possibly compute aggregates without group (global aggregates)
    if(q.aggs.length){
      const out = {};
      for(const a of q.aggs){
        const values = rows.map(rr=> rr[a.table + '.' + a.col]).filter(v=>v!==null && v!==undefined);
        let aggVal = null;
        switch(a.func){
          case 'COUNT': aggVal = values.length; break;
          case 'SUM': aggVal = values.reduce((s,x)=>s+(Number(x)||0), 0); break;
          case 'AVG': aggVal = values.length? (values.reduce((s,x)=>s+(Number(x)||0),0)/values.length):null; break;
          case 'MIN': aggVal = values.length? values.reduce((m,x)=> x<m?x:m, values[0]) : null; break;
          case 'MAX': aggVal = values.length? values.reduce((m,x)=> x>m?x:m, values[0]) : null; break;
        }
        const name = a.alias || (a.func+'('+a.table+'.'+a.col+')');
        out[name] = aggVal;
      }
      rows = [out];
      steps.push({step:'After AGGREGATE (no GROUP BY)', count: rows.length, sample: rows.slice(0,10)});
    } else {
      steps.push({step:'After GROUP BY', count: rows.length, sample: rows.slice(0,10)});
    }
  }

  // Step 4: HAVING
  if(q.having.length){
    function evalHaving(row, h){
      const left = row[h.table + '.' + h.col] !== undefined ? row[h.table + '.' + h.col] : row[h.col] !== undefined ? row[h.col] : null;
      const op = h.op;
      const right = parseValue(h.val);
      switch(op){
        case '=': return left == right;
        case '!=': return left != right;
        case '>': return left > right;
        case '<': return left < right;
        case '>=': return left >= right;
        case '<=': return left <= right;
      }
      return false;
    }
    rows = rows.filter(row=>{
      let res = null;
      for(const h of q.having){
        const val = evalHaving(row, h);
        if(res === null) res = val;
        else res = (h.bool === 'AND') ? (res && val) : (res || val);
      }
      return res;
    });
    steps.push({step:'After HAVING', count: rows.length, sample: rows.slice(0,10)});
  } else {
    steps.push({step:'After HAVING', count: rows.length, sample: rows.slice(0,10)});
  }

  // Step 5: Project SELECT columns / expressions
  let projected = [];
  if(q.columns.length === 0){
    projected = rows.map(r=> r);
  } else {
    for(const r of rows){
      const out = {};
      for(const c of q.columns){
        if(c.expr){
          // Evaluate expression in a safe sandbox: allow references to table.col as variables like t_col
          // We will replace occurrences like table.col with r['table.col']
          let expr = c.expr;
          // Replace table.column tokens with r[...] access
          expr = expr.replace(/([a-zA-Z_][a-zA-Z0-9_]*)\.([a-zA-Z_][a-zA-Z0-9_]*)/g, function(_, t, co){
            const key = t + '.' + co;
            const val = JSON.stringify(r[key] === undefined ? null : r[key]);
            return val;
          });
          // replace || with + for string concatenation fallback
          expr = expr.replace(/\|\|/g, '+');
          try{
            // eslint-disable-next-line no-new-func
            const val = Function('"use strict";return ('+expr+')')();
            out[c.alias || c.expr] = val;
          }catch(e){
            out[c.alias || c.expr] = null;
          }
        } else {
          out[c.alias || (c.table + '.' + c.col)] = r[c.table + '.' + c.col];
        }
      }
      projected.push(out);
    }
  }
  steps.push({step:'After SELECT/PROJECT', count: projected.length, sample: projected.slice(0,10)});

  // Step 6: DISTINCT
  if(q.distinct){
    const seen = new Set();
    const unique = [];
    for(const row of projected){
      const key = JSON.stringify(row);
      if(!seen.has(key)){ seen.add(key); unique.push(row); }
    }
    projected = unique;
    steps.push({step:'After DISTINCT', count: projected.length, sample: projected.slice(0,10)});
  } else {
    steps.push({step:'After DISTINCT', count: projected.length, sample: projected.slice(0,10)});
  }

  // Step 7: ORDER BY
  if(q.order.length){
    projected.sort((a,b)=>{
      for(const o of q.order){
        const aval = a[o.table+'.'+o.col] !== undefined ? a[o.table+'.'+o.col] : a[o.col];
        const bval = b[o.table+'.'+o.col] !== undefined ? b[o.table+'.'+o.col] : b[o.col];
        if(aval == bval) continue;
        if(o.dir === 'ASC') return (aval > bval) ? 1 : -1;
        else return (aval < bval) ? 1 : -1;
      }
      return 0;
    });
    steps.push({step:'After ORDER BY', count: projected.length, sample: projected.slice(0,10)});
  } else {
    steps.push({step:'After ORDER BY', count: projected.length, sample: projected.slice(0,10)});
  }

  // Step 8: OFFSET/LIMIT
  const start = q.offset || 0;
  const end = q.limit ? start + q.limit : projected.length;
  const finalRows = projected.slice(start, end);
  steps.push({step:'After OFFSET/LIMIT', count: finalRows.length, sample: finalRows.slice(0,50)});
  if(stepCallback) stepCallback(steps);
  return finalRows;
}

// Run query
runQueryBtn.onclick = function(){
  try{
    const q = buildQueryFromUI();
    const result = evaluateQuery(q, null);
    displayResult(result);
    addHistory(generateSql(q));
  }catch(e){ alert('Query failed: '+e.message); }
};

function displayResult(rows){
  queryResult.innerHTML = '';
  if(!rows || rows.length === 0){ queryResult.textContent = 'Empty result'; return; }
  const cols = Object.keys(rows[0]);
  const table = document.createElement('table'); table.border=1;
  const thead = document.createElement('thead'); const headRow = document.createElement('tr');
  for(const c of cols){ const th = document.createElement('th'); th.textContent = c; headRow.appendChild(th); }
  thead.appendChild(headRow); table.appendChild(thead);
  const tbody = document.createElement('tbody');
  const max = Math.min(rows.length, parseInt(rowDisplaySlider.value,10) || 50);
  for(let i=0;i<max;i++){
    const r = rows[i]; const tr = document.createElement('tr');
    for(const c of cols){ const td = document.createElement('td'); td.textContent = r[c] === null || r[c] === undefined ? 'NULL' : String(r[c]); tr.appendChild(td); }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  queryResult.appendChild(table);
  if(rows.length > max) queryResult.appendChild(document.createTextNode('... '+(rows.length-max)+' more rows'));
}

// Explain / Step through
explainBtn.onclick = function(){
  try{
    const q = buildQueryFromUI();
    let steps = [];
    evaluateQuery(q, s => { steps = s; });
    if(steps.length === 0) return;
    // build UI for stepping
    explainArea.innerHTML = '';
    const idxSpan = document.createElement('span');
    let idx = 0;
    function renderStep(){
      explainArea.innerHTML = '';
      const header = document.createElement('div'); header.textContent = 'Step '+(idx+1)+'/'+steps.length+': '+steps[idx].step+' (count: '+steps[idx].count+')';
      const pre = document.createElement('pre'); pre.textContent = JSON.stringify(steps[idx].sample, null, 2);
      const prev = document.createElement('button'); prev.textContent = 'Prev'; prev.disabled = idx===0; prev.onclick = ()=>{ idx--; renderStep(); };
      const next = document.createElement('button'); next.textContent = 'Next'; next.disabled = idx===steps.length-1; next.onclick = ()=>{ idx++; renderStep(); };
      const jumpToResult = document.createElement('button'); jumpToResult.textContent = 'Jump to Result'; jumpToResult.onclick = ()=>{ idx = steps.length-1; renderStep(); };
      explainArea.appendChild(header); explainArea.appendChild(prev); explainArea.appendChild(next); explainArea.appendChild(jumpToResult); explainArea.appendChild(pre);
    }
    renderStep();
  }catch(e){ alert('Explain failed: '+e.message); }
};

// Raw SQL limited parser and runner
runRawSqlBtn.onclick = function(){
  rawSqlResult.innerHTML = '';
  const sql = rawSqlInput.value.trim();
  if(!sql) return;
  const tokens = sql.split(/\s+/);
  const cmd = tokens[0].toUpperCase();
  try{
    if(cmd === 'SELECT'){
      // Very limited: expect "SELECT * FROM table WHERE table.col = value"
      // We'll attempt to parse FROM table and simple WHERE equality
      // This is just a convenience, encourage using builder
      // Try to find FROM
      const fromIdx = tokens.findIndex(t=>t.toUpperCase()==='FROM');
      if(fromIdx === -1) throw new Error('Only simple SELECT supported');
      const table = tokens[fromIdx+1];
      // Build q object minimally
      const q = {fromTables:[table], joins:[], columns:[], where:[], groupBy:[], aggs:[], having:[], order:[], limit:0, offset:0, distinct:false};
      // handle WHERE if exists
      const whereIdx = tokens.findIndex(t=>t.toUpperCase()==='WHERE');
      if(whereIdx !== -1){
        // rest naive
        const cond = tokens.slice(whereIdx+1).join(' ');
        // support "table.col = value"
        const m = cond.match(/([a-zA-Z0-9_]+\.[a-zA-Z0-9_]+)\s*([=!<>]+)\s*(.+)/);
        if(m){
          const parts = m[1].split('.');
          q.where.push({bool:'AND', table:parts[0], col:parts[1], op:m[2], val: m[3].replace(/;$/,'')});
        }
      }
      const rows = evaluateQuery(q);
      displayResult(rows);
    } else if(cmd === 'INSERT'){
      // Very limited: assume INSERT INTO table (col,...) VALUES (v1, v2)
      const m = sql.match(/INSERT\s+INTO\s+([a-zA-Z0-9_]+)\s*\(([^)]+)\)\s*VALUES\s*\(([^)]+)\)/i);
      if(!m) throw new Error('INSERT syntax not recognized');
      const table = m[1]; const cols = m[2].split(',').map(s=>s.trim()); const vals = m[3].split(',').map(s=>s.trim().replace(/^'|'$/g,''));
      const row = {};
      for(let i=0;i<cols.length;i++) row[cols[i]] = parseValue(vals[i]);
      db.insert(table, row);
      rawSqlResult.textContent = 'Inserted into '+table;
    } else if(cmd === 'UPDATE'){
      // naive update: UPDATE table SET col=val WHERE table.col=val
      const m = sql.match(/UPDATE\s+([a-zA-Z0-9_]+)\s+SET\s+([^W]+)(?:WHERE\s+(.+))?/i);
      if(!m) throw new Error('UPDATE syntax not recognized');
      const table = m[1]; const setPart = m[2]; const wherePart = m[3];
      const sets = {};
      for(const s of setPart.split(',')){
        const [k,v] = s.split('=').map(x=>x.trim());
        sets[k] = parseValue(v.replace(/^'|'$/g,''));
      }
      if(wherePart){
        // simple equality
        const wm = wherePart.match(/([a-zA-Z0-9_]+\.[a-zA-Z0-9_]+)\s*=\s*(.+)/);
        if(wm){
          const parts = wm[1].split('.');
          db.updateWhere(table, r => r[parts[1]] == parseValue(wm[2].replace(/^'|'$/g,'')), r=>{ for(const k in sets) r[k] = sets[k]; });
          rawSqlResult.textContent = 'Updated rows in '+table;
        }
      } else {
        db.updateWhere(table, r=>true, r=>{ for(const k in sets) r[k] = sets[k]; });
        rawSqlResult.textContent = 'Updated all rows in '+table;
      }
    } else if(cmd === 'DELETE'){
      // DELETE FROM table WHERE ...
      const m = sql.match(/DELETE\s+FROM\s+([a-zA-Z0-9_]+)(?:\s+WHERE\s+(.+))?/i);
      if(!m) throw new Error('DELETE syntax not recognized');
      const table = m[1]; const wherePart = m[2];
      if(wherePart){
        const wm = wherePart.match(/([a-zA-Z0-9_]+\.[a-zA-Z0-9_]+)\s*=\s*(.+)/);
        if(wm){
          const parts = wm[1].split('.');
          db.deleteWhere(table, r=> r[parts[1]] == parseValue(wm[2].replace(/^'|'$/g,'')));
          rawSqlResult.textContent = 'Deleted rows in '+table;
        }
      } else {
        db.tables[table].rows = [];
        rawSqlResult.textContent = 'Deleted all rows in '+table;
      }
    } else if(cmd === 'CREATE'){
      // only CREATE TABLE simple
      const m = sql.match(/CREATE\s+TABLE\s+([a-zA-Z0-9_]+)\s*\((.+)\)/i);
      if(!m) throw new Error('CREATE TABLE syntax not recognized');
      const name = m[1]; const cols = m[2].split(',').map(s=>s.trim().split(/\s+/)[0]);
      db.createTable(name, cols);
      rawSqlResult.textContent = 'Table '+name+' created';
    } else {
      throw new Error('Command not supported in raw mode');
    }
  }catch(e){ rawSqlResult.textContent = 'Error: '+e.message; }
};

// Saved queries persistence in localStorage
function saveSavedQueriesToStorage(){
  try{ localStorage.setItem('sql_sandbox_saved', JSON.stringify(db.savedQueries)); }catch(e){}
}
function loadSavedQueriesFromStorage(){
  try{
    const s = localStorage.getItem('sql_sandbox_saved');
    if(s) db.savedQueries = JSON.parse(s);
  }catch(e){}
}
window.addEventListener('beforeunload', saveSavedQueriesToStorage);
loadSavedQueriesFromStorage();

// On startup
loadExampleData();
refreshUI();

fromTables.onchange = refreshColumnsArea;

// When database changes update indexes area
indexTableSelect.onchange = function(){ indexColumnInput.value = ''; };

// Ensure UI stays in sync occasionally
setInterval(()=>{ refreshIndexesArea(); }, 3000);
