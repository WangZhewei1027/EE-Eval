<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiset</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Multiset</h1>
        <div class="section">
            <h2 class="section-title">What is a Multiset?</h2>
            <p class="section-text">A multiset is a data structure that stores unique elements as keys and their frequencies as values.</p>
        </div>
        <div class="section">
            <h2 class="section-title">How it Works</h2>
            <p class="section-text">To add an element to the multiset, you simply add it as a key with its frequency as the value.</p>
        </div>
        <div class="section">
            <h2 class="section-title">Visualizing the Multiset</h2>
            <div class="multiset">
                <div class="cell" data-value="apple">1</div>
                <div class="cell" data-value="banana">2</div>
                <div class="cell" data-value="apple">3</div>
                <div class="cell" data-value="orange">4</div>
            </div>
        </div>
        <button class="button" id="add-button">Add Element</button>
        <button class="button" id="remove-button" disabled>Remove Element</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
