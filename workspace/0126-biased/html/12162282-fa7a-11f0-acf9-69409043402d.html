<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OSI Model Interactive Exploration</title>
<style>
  body {
    font-family: monospace, monospace;
    margin: 1em;
    background: white;
    color: black;
  }
  #header {
    margin-bottom: 1em;
  }
  #controls > * {
    margin: 0.3em 0.5em 0.3em 0;
  }
  #output {
    margin-top: 1em;
    white-space: pre-wrap;
    border: 1px solid black;
    padding: 0.5em;
    max-height: 30em;
    overflow-y: auto;
  }
  fieldset {
    margin-top: 0.5em;
    border: 1px solid black;
    padding: 0.5em;
  }
  label {
    cursor: pointer;
  }
</style>
</head>
<body>
<h1 id="header">OSI Model Interactive Exploration</h1>

<div id="controls" aria-label="OSI Model controls">

  <fieldset>
    <legend>Current Layer Selection</legend>
    <select id="layer-select" aria-label="Select OSI Layer">
      <option value="7">7 - Application</option>
      <option value="6">6 - Presentation</option>
      <option value="5">5 - Session</option>
      <option value="4">4 - Transport</option>
      <option value="3">3 - Network</option>
      <option value="2">2 - Data Link</option>
      <option value="1">1 - Physical</option>
    </select>
    <button id="describe-layer" aria-label="Describe selected OSI layer">Describe Layer</button>
    <button id="show-functions" aria-label="Show common functions of layer">Show Functions</button>
    <button id="examples-btn" aria-label="Show real world examples at this layer">Show Examples</button>
  </fieldset>

  <fieldset>
    <legend>Packet / Data Simulation Controls</legend>
    <label for="message-input">Input Message (Text): </label>
    <input type="text" id="message-input" aria-label="Input message text" value="Hello OSI Model" size="30" />
    <br />
    <label for="start-layer">Start Layer: </label>
    <select id="start-layer" aria-label="Select starting layer">
      <option value="7">7 - Application</option>
      <option value="6">6 - Presentation</option>
      <option value="5">5 - Session</option>
      <option value="4">4 - Transport</option>
      <option value="3">3 - Network</option>
      <option value="2">2 - Data Link</option>
      <option value="1">1 - Physical</option>
    </select>
    <label for="end-layer">End Layer: </label>
    <select id="end-layer" aria-label="Select ending layer">
      <option value="1">1 - Physical</option>
      <option value="2">2 - Data Link</option>
      <option value="3">3 - Network</option>
      <option value="4">4 - Transport</option>
      <option value="5">5 - Session</option>
      <option value="6">6 - Presentation</option>
      <option value="7">7 - Application</option>
    </select>
    <br />
    <button id="simulate-down" aria-label="Simulate encapsulation from start to end layer">Simulate Encapsulation</button>
    <button id="simulate-up" aria-label="Simulate decapsulation from start to end layer">Simulate Decapsulation</button>
  </fieldset>

  <fieldset>
    <legend>Layer Parameter Controls</legend>
    <div>
      <label for="mtu-slider">MTU (bytes) at Network Layer (3): </label>
      <input type="range" id="mtu-slider" min="500" max="2000" step="10" value="1500" aria-label="MTU slider" />
      <span id="mtu-value">1500</span>
    </div>
    <div>
      <label for="window-size-input">Transport Layer (4) Window Size (segments): </label>
      <input type="number" id="window-size-input" min="1" max="100" value="5" aria-label="Window size input" />
    </div>
    <div>
      <label for="encryption-checkbox">Presentation Layer (6) Encryption Enabled: </label>
      <input type="checkbox" id="encryption-checkbox" aria-label="Encryption toggle" />
    </div>
    <div>
      <label for="compression-checkbox">Presentation Layer (6) Compression Enabled: </label>
      <input type="checkbox" id="compression-checkbox" aria-label="Compression toggle" />
    </div>
  </fieldset>

  <fieldset>
    <legend>User-Defined Protocol Message</legend>
    <textarea id="custom-message" aria-label="Custom protocol message" rows="4" cols="50" placeholder="Define a custom protocol message in JSON or structured format here..."></textarea>
    <br />
    <button id="parse-protocol" aria-label="Parse and analyze custom protocol message">Parse Protocol</button>
  </fieldset>
</div>

<div id="output" aria-live="polite" aria-atomic="true" aria-relevant="additions" tabindex="0" role="region" aria-label="Output log and descriptions">
</div>

<script>
(() => {
  'use strict';

  const layers = {
    7: {
      name: "Application",
      description:
        "The top OSI layer that interfaces directly with user applications. Responsible for network services to applications and protocol representation.",
      functions: [
        "Identifying communication partners",
        "Determining resource availability",
        "Synchronizing communication",
        "High-level APIs and services (HTTP, FTP, SMTP, DNS, etc.)",
      ],
      examples: [
        "HTTP, FTP, SMTP, DNS, Telnet, SSH",
        "Email clients, Web browsers",
      ],
    },
    6: {
      name: "Presentation",
      description:
        "Layer responsible for data translation, encryption and compression. Ensures that data is in a usable format for the application layer.",
      functions: [
        "Data format translation (e.g., character encoding)",
        "Encryption and decryption",
        "Compression and decompression",
      ],
      examples: [
        "SSL/TLS encryption",
        "JPEG, GIF, MPEG format translation",
      ],
    },
    5: {
      name: "Session",
      description:
        "Manages sessions between applications. Establishes, manages and terminates connections between local and remote applications.",
      functions: [
        "Dialog control (half/full duplex)",
        "Synchronization with checkpoints and recovery",
        "Session establishment, maintenance, termination",
      ],
      examples: [
        "NetBIOS, SAP, RPC",
        "Session management in video conferencing",
      ],
    },
    4: {
      name: "Transport",
      description:
        "Provides reliable data transfer services to upper layers. Responsible for flow control, error control and segmentation.",
      functions: [
        "Segmentation and reassembly",
        "Connection control (connection-oriented/connectionless)",
        "Flow control and error correction",
      ],
      examples: [
        "TCP (connection-oriented)",
        "UDP (connectionless)",
      ],
    },
    3: {
      name: "Network",
      description:
        "Controls the operation of the subnet, routing packets to their destination across multiple networks.",
      functions: [
        "Logical addressing (IP addressing)",
        "Routing and forwarding",
        "Packet sequencing and traffic control",
      ],
      examples: [
        "IP, ICMP, IPSec, IGMP",
        "Routers operate at this layer",
      ],
    },
    2: {
      name: "Data Link",
      description:
        "Provides node-to-node data transfer, framing, error detection/correction and manages physical addressing (MAC).",
      functions: [
        "Framing of packets",
        "Error detection and correction",
        "Physical addressing via MAC addresses",
        "Controls access to physical medium",
      ],
      examples: [
        "Ethernet, PPP, Switches",
        "MAC addresses, ARP",
      ],
    },
    1: {
      name: "Physical",
      description:
        "Transmits raw bits over physical medium. Defines mechanical, electrical, and timing characteristics.",
      functions: [
        "Transmission and reception of raw bit streams",
        "Physical connections (cables, connectors)",
        "Modulation and signal encoding",
      ],
      examples: [
        "Cables, fiber optics, radio signals",
        "USB, Ethernet physical layer, RS-232",
      ],
    },
  };

  // Output handling
  const outputEl = document.getElementById('output');

  function outln(text = '') {
    outputEl.textContent += text + '\n';
    outputEl.scrollTop = outputEl.scrollHeight;
  }
  function clearOutput() {
    outputEl.textContent = '';
  }

  // Layer selection controls
  const layerSelect = document.getElementById("layer-select");
  const describeLayerBtn = document.getElementById("describe-layer");
  const showFunctionsBtn = document.getElementById("show-functions");
  const examplesBtn = document.getElementById("examples-btn");

  describeLayerBtn.addEventListener('click', () => {
    clearOutput();
    let v = parseInt(layerSelect.value, 10);
    let layer = layers[v];
    outln(`Layer ${v} - ${layer.name}\n`);
    outln(layer.description);
  });

  showFunctionsBtn.addEventListener('click', () => {
    clearOutput();
    let v = parseInt(layerSelect.value, 10);
    let layer = layers[v];
    outln(`Common Functions of Layer ${v} - ${layer.name}:\n`);
    layer.functions.forEach((fn, i) => outln(`${i + 1}. ${fn}`));
  });

  examplesBtn.addEventListener('click', () => {
    clearOutput();
    let v = parseInt(layerSelect.value, 10);
    let layer = layers[v];
    outln(`Real World Examples at Layer ${v} - ${layer.name}:\n`);
    layer.examples.forEach((ex, i) => outln(`${i + 1}. ${ex}`));
  });

  // Simulation Controls
  const messageInput = document.getElementById("message-input");
  const startLayerSelectDown = document.getElementById("start-layer");
  const endLayerSelectDown = document.getElementById("end-layer");
  const simulateDownBtn = document.getElementById("simulate-down");
  const simulateUpBtn = document.getElementById("simulate-up");

  // Parameters
  const mtuSlider = document.getElementById("mtu-slider");
  const mtuValue = document.getElementById("mtu-value");
  const windowSizeInput = document.getElementById("window-size-input");
  const encryptionCheckbox = document.getElementById("encryption-checkbox");
  const compressionCheckbox = document.getElementById("compression-checkbox");

  mtuSlider.addEventListener('input', () => {
    mtuValue.textContent = mtuSlider.value;
  });

  /*
   Simulate Encapsulation & Decapsulation:
   We'll fake a layered packet structure.
   Encapsulation direction: from startLayer (default = 7) down to endLayer (default = 1)
   Decapsulation direction: from startLayer (default = 1) up to endLayer (default = 7)
   
   At each layer, some specific process is "applied"
   We'll maintain a "data" object with fields:
   - payload: raw message or encapsulated data
   - headers: Array of added headers (layer, details)
   - footers: Array of added footers (rfc822 style not required but just for realism)

   For realism, include effect of parameters:
   - MTU at layer 3 (limits packet size, fragment if too large)
   - Window size at layer 4 affects segmentation output
   - Encryption/compression at layer 6 modifies payload

  */

  // Simple utility functions

  // Simple compression simulation
  function compress(data) {
    // Naive compression: remove vowels (simulate compression ratio ~70%)
    return data.replace(/[aeiouAEIOU]/g, '');
  }
  // Simple decompression simulation (cannot truly restore without data)
  function decompress(data) {
    // Can't restore exactly, so say "Decompressed data"
    return `[Decompressed] ${data}`;
  }
  // Simple encryption simulation
  function encrypt(data) {
    // Caesar cipher +3 letters for demo
    return data.replace(/[a-z]/gi, (c) => {
      const base = c <= 'Z' ? 65 : 97;
      let code = c.charCodeAt(0) - base;
      code = (code + 3) % 26;
      return String.fromCharCode(code + base);
    });
  }
  // Simple decryption simulation (-3 letters)
  function decrypt(data) {
    return data.replace(/[a-z]/gi, (c) => {
      const base = c <= 'Z' ? 65 : 97;
      let code = c.charCodeAt(0) - base;
      code = (code - 3 + 26) % 26;
      return String.fromCharCode(code + base);
    });
  }

  // Fragment function for layer 3 (Network)
  function fragmentPacket(payload, mtu) {
    // Simple fragmentation: split payload into chunks of mtu size (assume 1 char = 1 byte for simulation)
    let fragments = [];
    let i = 0;
    while (i < payload.length) {
      fragments.push(payload.slice(i, i + mtu));
      i += mtu;
    }
    return fragments;
  }

  // Encapsulation step function by layer
  function encapsulateLayer(layerNum, packet, params) {
    // Packet: { payload, headers: [], footers: [] }
    const layer = layers[layerNum];
    switch (layerNum) {
      case 7: // Application
        // No header added for simulation, assume raw message input at this point
        packet.headers.push({ layer: layerNum, info: "Application Layer Data" });
        break;
      case 6: // Presentation
        // Apply compression/encryption optionally
        let data = packet.payload;
        if (params.compression) {
          data = compress(data);
          packet.headers.push({ layer: layerNum, info: "Compressed" });
        }
        if (params.encryption) {
          data = encrypt(data);
          packet.headers.push({ layer: layerNum, info: "Encrypted" });
        }
        packet.payload = data;
        break;
      case 5: // Session
        // Add a session header (session ID simulated)
        packet.headers.push({ layer: layerNum, info: "Session ID: 1234" });
        break;
      case 4: // Transport
        // Segment the data by window size
        const ws = params.windowSize;
        let segments = [];
        let segmentSize = Math.ceil(packet.payload.length / ws);
        for (let i = 0; i < ws; i++) {
          let segPayload = packet.payload.slice(i * segmentSize, (i + 1) * segmentSize);
          if (segPayload.length === 0) continue;
          segments.push({
            headers: [{ layer: 4, info: `Segment #${i + 1} (Window size=${ws})` }],
            payload: segPayload,
            footers: [],
          });
        }
        if (segments.length > 1) {
          // Overwrite packet as multiple segments (simulate)
          packet.segments = segments;
          packet.payload = null; // no single payload when segmented
          packet.headers.push({ layer: 4, info: `Segmented into ${segments.length} segments` });
        } else {
          // Add a simple header
          packet.headers.push({ layer: layerNum, info: "Single transport segment" });
        }
        break;
      case 3: // Network
        // Fragment packet if payload (or segment payloads) > MTU
        if (packet.segments) {
          // Fragment each segment if needed
          let fragSegments = [];
          packet.segments.forEach((seg) => {
            let frags = fragmentPacket(seg.payload, params.mtu);
            if (frags.length > 1) {
              frags.forEach((fragPayload, i) => {
                fragSegments.push({
                  headers: seg.headers.concat([{ layer: 3, info: `Fragment #${i + 1}/${frags.length}` }]),
                  payload: fragPayload,
                  footers: [],
                });
              });
            } else {
              fragSegments.push({
                headers: seg.headers.concat([{ layer: 3, info: "No Fragment Required" }]),
                payload: seg.payload,
                footers: [],
              });
            }
          });
          packet.segments = fragSegments;
          packet.headers.push({ layer: 3, info: `Fragmented into ${fragSegments.length} packets due to MTU=${params.mtu}` });
        } else {
          let payloadData = packet.payload;
          if (payloadData.length > params.mtu) {
            let frags = fragmentPacket(payloadData, params.mtu);
            if (frags.length > 1) {
              let fragPackets = frags.map((fragPayload, i) => ({
                headers: [{ layer: 3, info: `Fragment #${i + 1}/${frags.length}` }],
                payload: fragPayload,
                footers: [],
              }));
              packet.segments = fragPackets;
              packet.payload = null;
              packet.headers.push({ layer: 3, info: `Fragmented into ${frags.length} packets due to MTU=${params.mtu}` });
            }
          } else {
            packet.headers.push({ layer: 3, info: "Packet fits MTU, no fragmentation" });
          }
        }
        break;
      case 2: // Data Link
        // Add MAC addresses in header (simulate source/dest MAC)
        packet.headers.push({ layer: 2, info: "Src MAC: AA:BB:CC:DD:EE:FF, Dest MAC: 11:22:33:44:55:66" });
        break;
      case 1: // Physical
        // Add physical layer "bitstream" info - simulate conversion to bits
        if (packet.segments) {
          packet.segments.forEach((seg) => {
            seg.headers.push({ layer: 1, info: `Physical encoding of ${seg.payload.length} bytes` });
          });
        } else {
          packet.headers.push({ layer: 1, info: `Physical encoding of ${packet.payload.length} bytes` });
        }
        break;
      default:
        // Unknown layer
        packet.headers.push({ layer: layerNum, info: "(Unknown Layer Action)" });
        break;
    }
  }

  // Decapsulation step function by layer
  function decapsulateLayer(layerNum, packet, params) {
    // Reverse the encapsulation per layer
    switch (layerNum) {
      case 1: // Physical
        // Remove physical encoding header
        if (packet.segments) {
          packet.segments.forEach((seg) => {
            seg.headers = seg.headers.filter(h => h.layer !== 1);
          });
        } else {
          packet.headers = packet.headers.filter(h => h.layer !== 1);
        }
        break;
      case 2: // Data Link
        packet.headers = packet.headers.filter(h => h.layer !== 2);
        break;
      case 3: // Network
        // Reassemble fragments if any
        if (packet.segments) {
          // Check if segments have fragment info
          let fragSegments = packet.segments.filter(s => s.headers.some(h => h.info.includes("Fragment")));
          if (fragSegments.length > 0) {
            // Sort fragments
            let fragments = fragSegments.slice();
            fragments.sort((a, b) => {
              let aFrag = a.headers.find(h => h.layer === 3 && h.info.includes("Fragment"));
              let bFrag = b.headers.find(h => h.layer === 3 && h.info.includes("Fragment"));
              let aNum = parseInt(aFrag.info.match(/Fragment #(\d+)/)[1], 10);
              let bNum = parseInt(bFrag.info.match(/Fragment #(\d+)/)[1], 10);
              return aNum - bNum;
            });
            // Reassemble payload
            let reassembled = fragments.map(f => f.payload).join('');
            packet.payload = reassembled;
            packet.segments = null;
            packet.headers = packet.headers.filter(h => h.layer !== 3);
            packet.headers.push({ layer: 3, info: "Reassembled fragments" });
          } else {
            // No fragments
            packet.headers = packet.headers.filter(h => h.layer !== 3);
          }
        } else {
          packet.headers = packet.headers.filter(h => h.layer !== 3);
        }
        break;
      case 4: // Transport
        // Reassemble segments if any
        if (packet.segments) {
          // Sort segments by segment number in header
          let segs = packet.segments.filter(s => s.headers.some(h => h.layer === 4 && h.info.includes("Segment")));
          if (segs.length > 0) {
            segs.sort((a, b) => {
              let aSeg = a.headers.find(h => h.layer === 4 && h.info.match(/Segment #(\d+)/));
              let bSeg = b.headers.find(h => h.layer === 4 && h.info.match(/Segment #(\d+)/));
              let aNum = parseInt(aSeg.info.match(/Segment #(\d+)/)[1], 10);
              let bNum = parseInt(bSeg.info.match(/Segment #(\d+)/)[1], 10);
              return aNum - bNum;
            });
            let reassembled = segs.map(s => s.payload).join('');
            packet.payload = reassembled;
            packet.segments = null;
            packet.headers = packet.headers.filter(h => h.layer !== 4);
            packet.headers.push({ layer: 4, info: "Reassembled segments" });
          } else {
            packet.headers = packet.headers.filter(h => h.layer !== 4);
          }
        } else {
          packet.headers = packet.headers.filter(h => h.layer !== 4);
        }
        break;
      case 5: // Session
        packet.headers = packet.headers.filter(h => h.layer !== 5);
        break;
      case 6: // Presentation
        // Remove compression/encryption headers and revert payload
        let compressed = packet.headers.some(h => h.info === "Compressed");
        let encrypted = packet.headers.some(h => h.info === "Encrypted");
        if (encrypted) {
          packet.payload = decrypt(packet.payload);
        }
        if (compressed) {
          packet.payload = decompress(packet.payload);
        }
        packet.headers = packet.headers.filter(h => h.layer !== 6);
        break;
      case 7: // Application
        packet.headers = packet.headers.filter(h => h.layer !== 7);
        break;
      default:
        // Unknown layer
        break;
    }
  }

  // Display packet simulation result:
  // We have a packet object {payload, headers[], segments?}
  // We will print a detailed traversal showing headers and payload at each step
  function displayPacket(packet, direction) {
    // direction is "Encapsulation" or "Decapsulation"
    let lines = [];
    function describeSegment(seg, idx = null) {
      let prefix = idx !== null ? `  Segment ${idx + 1}:\n` : "";
      let str = prefix;
      if (seg.headers.length > 0) {
        str += "    Headers:\n";
        seg.headers.forEach(h => {
          str += `      - Layer ${h.layer} (${layers[h.layer].name}): ${h.info}\n`;
        });
      }
      str += `    Payload (${seg.payload.length} bytes):\n`;
      let pl = seg.payload.length > 60 ? seg.payload.slice(0, 60) + "..." : seg.payload;
      str += `      "${pl}"\n`;
      return str;
    }
    lines.push(`--- Packet ${direction} Result ---\n`);

    if (packet.segments) {
      lines.push(`Packet contains ${packet.segments.length} segment(s)/fragment(s):\n`);
      packet.segments.forEach((seg, i) => {
        lines.push(describeSegment(seg, i));
      });
    } else {
      lines.push(`Packet Headers:`);
      packet.headers.forEach(h => {
        lines.push(`  - Layer ${h.layer} (${layers[h.layer].name}): ${h.info}`);
      });
      lines.push(`Payload (${packet.payload.length} bytes):`);
      let pl = packet.payload.length > 100 ? packet.payload.slice(0, 100) + "..." : packet.payload;
      lines.push(`  "${pl}"`);
    }

    return lines.join('\n');
  }

  // Main simulation functions
  simulateDownBtn.addEventListener('click', () => {
    clearOutput();
    let start = parseInt(startLayerSelectDown.value, 10);
    let end = parseInt(endLayerSelectDown.value, 10);

    if (start < end) {
      outln("Error: Start layer must be >= end layer for encapsulation (top-down).");
      return;
    }

    let message = messageInput.value.trim();
    if (message.length === 0) {
      outln("Error: Message cannot be empty.");
      return;
    }

    // Initialize packet
    let packet = {
      payload: message,
      headers: [],
      footers: [],
    };

    // Prepare parameters
    let params = {
      mtu: parseInt(mtuSlider.value, 10),
      windowSize: parseInt(windowSizeInput.value, 10),
      encryption: encryptionCheckbox.checked,
      compression: compressionCheckbox.checked,
    };

    outln(`Encapsulating message from Layer ${start} to Layer ${end}...`);
    for (let layerNum = start; layerNum >= end; layerNum--) {
      outln(`\nEncapsulating at Layer ${layerNum} (${layers[layerNum].name}):`);
      encapsulateLayer(layerNum, packet, params);
      // Show incremental packet info if possible
      if (packet.segments) {
        outln(`  Packet segmented into ${packet.segments.length} parts.`);
      } else {
        outln(`  Current payload size: ${packet.payload.length} bytes.`);
      }
    }

    let result = displayPacket(packet, "Encapsulation");
    outln('\n' + result);
  });

  simulateUpBtn.addEventListener('click', () => {
    clearOutput();
    let start = parseInt(startLayerSelectDown.value, 10);
    let end = parseInt(endLayerSelectDown.value, 10);

    if (start > end) {
      outln("Error: Start layer must be <= end layer for decapsulation (bottom-up).");
      return;
    }

    let message = messageInput.value.trim();
    if (message.length === 0) {
      outln("Error: Message cannot be empty.");
      return;
    }

    // Initialize packet - simulate a packet encapsulated from layer end up to layer start
    // As we don't have prior encapsulation data for up simulation, assume direct
    let packet = {
      payload: message,
      headers: [],
      footers: [],
    };

    // We need a simulated packet suitable for decapsulation:
    // We'll simulate by generating a fully encapsulated packet from layer end up to start,
    // but reversing the direction: So we do a quick encapsulation first, then decapsulate.

    // But if start < end, error displayed above.

    // Prepare parameters
    let params = {
      mtu: parseInt(mtuSlider.value, 10),
      windowSize: parseInt(windowSizeInput.value, 10),
      encryption: encryptionCheckbox.checked,
      compression: compressionCheckbox.checked,
    };

    // Build a packet encapsulated from end layer to start layer (reverse order)
    let simulatedPacket = {
      payload: message,
      headers: [],
      footers: [],
    };
    for (let layerNum = end; layerNum <= start; layerNum++) {
      encapsulateLayer(layerNum, simulatedPacket, params);
    }

    // Now start decapsulation
    outln(`Decapsulating message from Layer ${start} to Layer ${end}...`);
    for (let layerNum = start; layerNum >= end; layerNum--) {
      outln(`\nDecapsulating at Layer ${layerNum} (${layers[layerNum].name}):`);
      decapsulateLayer(layerNum, simulatedPacket, params);
      if (simulatedPacket.segments) {
        outln(`  Packet segmented into ${simulatedPacket.segments.length} parts.`);
      } else if (simulatedPacket.payload) {
        outln(`  Current payload size: ${simulatedPacket.payload.length} bytes.`);
      }
    }

    let result = displayPacket(simulatedPacket, "Decapsulation");
    outln('\n' + result);
  });

  // User protocol message parsing feature: Accept JSON structure and describe
  const customMessageArea = document.getElementById('custom-message');
  const parseProtocolBtn = document.getElementById('parse-protocol');

  parseProtocolBtn.addEventListener('click', () => {
    clearOutput();
    let text = customMessageArea.value.trim();
    if (!text) {
      outln("Error: Protocol message is empty.");
      return;
    }
    try {
      let obj = JSON.parse(text);
      outln("Parsed protocol message JSON:\n");
      parseProtocolObject(obj, 0);
    } catch (e) {
      outln("Error: Invalid JSON format.\n" + e.message);
    }
  });

  function parseProtocolObject(obj, indentLevel) {
    const indent = '  '.repeat(indentLevel);
    if (typeof obj === 'object' && obj !== null) {
      if (Array.isArray(obj)) {
        outln(indent + "[");
        obj.forEach((item, idx) => {
          outln(indent + `  Item ${idx + 1}:`);
          parseProtocolObject(item, indentLevel + 2);
        });
        outln(indent + "]");
      } else {
        outln(indent + "{");
        for (let key in obj) {
          let val = obj[key];
          if (typeof val === 'object') {
            outln(indent + `  ${key}:`);
            parseProtocolObject(val, indentLevel + 2);
          } else {
            outln(indent + `  ${key}: ${val}`);
          }
        }
        outln(indent + "}");
      }
    } else {
      outln(indent + String(obj));
    }
  }

  // Initialize MTU slider display
  mtuValue.textContent = mtuSlider.value;

  // Accessibility: Focus output div on tab press for easier reading logs
  outputEl.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === 'PageDown' || e.key === 'PageUp') {
      e.stopPropagation();
    }
  });

})();
</script>
