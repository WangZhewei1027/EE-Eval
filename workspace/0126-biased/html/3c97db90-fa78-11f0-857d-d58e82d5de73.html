<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kruskal’s Algorithm — Elegant Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');
  /* Reset & base */
  *, *::before, *::after {
    box-sizing: border-box;
  }
  html, body {
    margin:0; padding:0; height:100%;
    background: linear-gradient(135deg, #1e2024, #272b35);
    font-family: 'Poppins', sans-serif;
    color: #f4f5f7;
    overflow: hidden;
    user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem 3rem;
    min-height: 100vh;
  }
  h1 {
    font-weight: 600;
    font-size: 3.2rem;
    margin: 0 0 1rem 0;
    letter-spacing: 0.04em;
    text-align: center;
    text-shadow:
      0 0 10px #6ee7b7cc,
      0 0 20px #3bcf99cc;
  }
  h2 {
    font-weight: 300;
    font-size: 1.15rem;
    letter-spacing: 0.06em;
    margin: 0 0 3rem 0;
    color: #9ca3afcc;
    text-align: center;
  }
  #container {
    position: relative;
    width: 720px;
    max-width: 90vw;
    aspect-ratio: 1 / 1;
    background: radial-gradient(ellipse at center, #15171b, #22272f);
    border-radius: 1.5rem;
    box-shadow:
      inset 0 0 50px #3bcf9980,
      0 0 40px #3bcf9970;
    padding: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  /* Nodes and edges */
  circle.node {
    fill: #272e38;
    stroke: #3bcf99;
    stroke-width: 3px;
    filter: drop-shadow(0 0 4px #3bcf99aa);
    transition: fill 0.4s ease, stroke-width 0.4s ease;
    cursor: default;
  }
  circle.node.active {
    fill: #6ee7b7;
    stroke-width: 6px;
    filter: drop-shadow(0 0 16px #6ee7b7dd);
  }
  text.node-label {
    font-weight: 600;
    font-size: 1.2rem;
    fill: #a5f3d1;
    pointer-events: none;
    filter: drop-shadow(0 0 2px #095235cc);
    user-select: none;
  }
  line.edge {
    stroke: #475762;
    stroke-width: 2.5px;
    filter: drop-shadow(0 0 3px #475762bb);
    transition: stroke 0.6s ease, stroke-width 0.6s ease, filter 0.6s ease;
    vector-effect: non-scaling-stroke;
  }
  line.edge.selected {
    stroke: #6ee7b7;
    stroke-width: 4.5px;
    filter:
      drop-shadow(0 0 15px #6ee7b7cc)
      drop-shadow(0 0 8px #3bcf99cc);
  }
  /* Button */
  #controls {
    margin-top: 2.5rem;
    display: flex;
    justify-content: center;
    gap: 1.5rem;
  }
  button {
    background: linear-gradient(145deg, #1b4739, #54d1a7);
    border: none;
    border-radius: 9999px;
    padding: 0.75rem 2.25rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    font-size: 1rem;
    color: #f0fdf9;
    box-shadow:
      0 6px 16px #235d45cc,
      inset 0 -3px 12px #70f0b8cc;
    cursor: pointer;
    user-select: none;
    transition:
      box-shadow 0.3s ease,
      transform 0.2s ease,
      background 0.3s ease;
  }
  button:hover {
    background: linear-gradient(145deg, #3bcf99, #87eac0);
    box-shadow:
      0 8px 28px #37b57edd,
      inset 0 -4px 14px #a4fefbcc;
    transform: translateY(-2px);
  }
  button:disabled {
    cursor: default;
    opacity: 0.4;
    box-shadow: none;
  }
  /* Footer text */
  footer {
    position: fixed;
    bottom: 1rem;
    width: 100%;
    font-size: 0.85rem;
    text-align: center;
    color: #3bcf9977;
    font-weight: 300;
    letter-spacing: 0.07em;
    filter: drop-shadow(0 0 3px #235d45bb);
  }
  /* Animations */
  @keyframes pulseGlow {
    0%, 100% {
      filter: drop-shadow(0 0 14px #6ee7b7cc);
    }
    50% {
      filter: drop-shadow(0 0 24px #3bcf99ff);
    }
  }
</style>
</head>
<body>
<h1>Kruskal’s Algorithm</h1>
<h2>Minimum Spanning Tree Visualization</h2>
<div id="container" aria-label="Visualization of Kruskal’s algorithm on a weighted graph">
  <svg viewBox="0 0 720 720" aria-hidden="true" role="img" >
    <!-- Edges -->
    <line class="edge" data-index="0" x1="150" y1="130" x2="580" y2="140" />
    <line class="edge" data-index="1" x1="150" y1="130" x2="390" y2="560" />
    <line class="edge" data-index="2" x1="580" y1="140" x2="390" y2="560" />
    <line class="edge" data-index="3" x1="580" y1="140" x2="440" y2="390" />
    <line class="edge" data-index="4" x1="390" y1="560" x2="440" y2="390" />
    <line class="edge" data-index="5" x1="150" y1="130" x2="240" y2="350" />
    <line class="edge" data-index="6" x1="240" y1="350" x2="440" y2="390" />
    <line class="edge" data-index="7" x1="240" y1="350" x2="390" y2="560" />
    <line class="edge" data-index="8" x1="440" y1="390" x2="580" y2="140" />
    <line class="edge" data-index="9" x1="240" y1="350" x2="580" y2="140" />
    <!-- Weights (edges labels) -->
    <text class="edge-weight" x="370" y="110" fill="#55dca9" font-weight="600" font-size="1rem" filter="drop-shadow(0 0 1px #09391f)">7</text>
    <text class="edge-weight" x="280" y="380" fill="#55dca9" font-weight="600" font-size="1rem" filter="drop-shadow(0 0 1px #09391f)">6</text>
    <text class="edge-weight" x="480" y="360" fill="#55dca9" font-weight="600" font-size="1rem" filter="drop-shadow(0 0 1px #09391f)">10</text>
    <text class="edge-weight" x="500" y="270" fill="#55dca9" font-weight="600" font-size="1rem" filter="drop-shadow(0 0 1px #09391f)">9</text>
    <text class="edge-weight" x="410" y="480" fill="#55dca9" font-weight="600" font-size="1rem" filter="drop-shadow(0 0 1px #09391f)">4</text>
    <text class="edge-weight" x="200" y="300" fill="#55dca9" font-weight="600" font-size="1rem" filter="drop-shadow(0 0 1px #09391f)">3</text>
    <text class="edge-weight" x="370" y="380" fill="#55dca9" font-weight="600" font-size="1rem" filter="drop-shadow(0 0 1px #09391f)">2</text>
    <text class="edge-weight" x="320" y="480" fill="#55dca9" font-weight="600" font-size="1rem" filter="drop-shadow(0 0 1px #09391f)">8</text>
    <text class="edge-weight" x="520" y="190" fill="#55dca9" font-weight="600" font-size="1rem" filter="drop-shadow(0 0 1px #09391f)">5</text>
    <text class="edge-weight" x="380" y="300" fill="#55dca9" font-weight="600" font-size="1rem" filter="drop-shadow(0 0 1px #09391f)">11</text>
    <!-- Nodes -->
    <g class="node-group" transform="translate(150 130)">
      <circle class="node" r="20" />
      <text class="node-label" text-anchor="middle" alignment-baseline="middle">A</text>
    </g>
    <g class="node-group" transform="translate(580 140)">
      <circle class="node" r="20" />
      <text class="node-label" text-anchor="middle" alignment-baseline="middle">B</text>
    </g>
    <g class="node-group" transform="translate(240 350)">
      <circle class="node" r="20" />
      <text class="node-label" text-anchor="middle" alignment-baseline="middle">C</text>
    </g>
    <g class="node-group" transform="translate(440 390)">
      <circle class="node" r="20" />
      <text class="node-label" text-anchor="middle" alignment-baseline="middle">D</text>
    </g>
    <g class="node-group" transform="translate(390 560)">
      <circle class="node" r="20" />
      <text class="node-label" text-anchor="middle" alignment-baseline="middle">E</text>
    </g>
  </svg>
</div>

<div id="controls" role="region" aria-label="Kruskal algorithm controls">
  <button id="startBtn" aria-live="polite" aria-pressed="false">Start Visualization</button>
  <button id="resetBtn" disabled>Reset</button>
</div>

<footer>
  Inspired by Kruskal’s algorithm for Minimum Spanning Tree (MST)
</footer>

<script>
(() => {
  'use strict';
  // Edge data: index matches line element data-index attribute
  // Format: {u: nodeId, v: nodeId, weight: number}
  // Node ids 0:A,1:B,2:C,3:D,4:E
  // Map node id to letter for semantics
  const nodesMap = ['A','B','C','D','E'];

  // Edge data consistent with svg edges and weights
  const edgesData = [
    {u: 0, v:1, weight:7},
    {u: 0, v:4, weight:6},
    {u: 1, v:4, weight:10},
    {u: 1, v:3, weight:9},
    {u: 4, v:3, weight:4},
    {u: 0, v:2, weight:3},
    {u: 2, v:3, weight:2},
    {u: 2, v:4, weight:8},
    {u: 3, v:1, weight:5},
    {u: 2, v:1, weight:11}
  ];

  // Get svg elements for edges
  const edgeElements = [...document.querySelectorAll('line.edge')];

  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');

  // Disjoint Set Union (Union Find) for cycle detection
  class DSU {
    constructor(n) {
      this.parent = new Array(n);
      this.rank = new Array(n);
      for(let i=0;i<n;i++){
        this.parent[i] = i;
        this.rank[i] = 0;
      }
    }
    find(x) {
      if(this.parent[x] !== x)
        this.parent[x] = this.find(this.parent[x]);
      return this.parent[x];
    }
    union(a,b) {
      a = this.find(a);
      b = this.find(b);
      if(a===b) return false;
      if(this.rank[a]<this.rank[b]) {
        this.parent[a] = b;
      } else if(this.rank[b]<this.rank[a]) {
        this.parent[b] = a;
      } else {
        this.parent[b] = a;
        this.rank[a]++;
      }
      return true;
    }
  }

  // Globals for animation state
  let animationInProgress = false;
  let animStep = 0;
  let animationTimer = null;

  // Sort edges by weight ascending for Kruskal
  const sortedEdges = [...edgesData].sort((a,b)=>a.weight-b.weight);

  // Clear selections
  function resetVisualization(){
    animationInProgress = false;
    animStep = 0;
    if(animationTimer) {
      clearTimeout(animationTimer);
      animationTimer = null;
    }
    // Reset edges style
    edgeElements.forEach(e => {
      e.classList.remove('selected');
      e.style.transition = 'none';
      e.style.stroke = '';
      e.style.strokeWidth = '';
      e.style.filter = '';
    });
    // Reset nodes style
    const nodeCircles = document.querySelectorAll('circle.node');
    nodeCircles.forEach(n=>{
      n.classList.remove('active');
      n.style.transition = 'none';
      n.style.fill = '';
      n.style.strokeWidth = '';
      n.style.filter = '';
    });
    startBtn.disabled = false;
    startBtn.setAttribute('aria-pressed', 'false');
    resetBtn.disabled = true;
  }

  // Animate choosing edges & building MST step by step
  // We highlight each edge considered, then select it or skip it.
  function animateKruskal(){
    if(animStep>=sortedEdges.length){
      // Finish
      animationInProgress = false;
      startBtn.disabled = true;
      resetBtn.disabled = false;
      startBtn.setAttribute('aria-pressed', 'true');
      return;
    }
    const dsu = new DSU(nodesMap.length);

    // Determine MST edges that have been selected so far
    // We'll keep track of selected edges in an array to animate.
    // But animation is one edge per step.
    // So we keep global MST state for animation to highlight edges cumulatively.
    if(!animateKruskal.selectedEdges) {
      animateKruskal.selectedEdges = [];
    }

    // We try to select edges one by one in sorted order if no cycle
    for(let i=0; i<animStep; i++){
      dsu.union(sortedEdges[i].u, sortedEdges[i].v);
    }

    // Edge currently considered
    const curEdge = sortedEdges[animStep];
    const curIndex = edgesData.findIndex(e => e.u === curEdge.u && e.v === curEdge.v && e.weight === curEdge.weight)
                    !== -1 ? edgesData.findIndex(e => e.u === curEdge.u && e.v === curEdge.v && e.weight === curEdge.weight)
                    : edgesData.findIndex(e => e.u === curEdge.v && e.v === curEdge.u && e.weight === curEdge.weight);

    // Remove highlight from previous (except selected edges)
    edgeElements.forEach((el,i)=>{
      if(!animateKruskal.selectedEdges.includes(i)) {
        el.classList.remove('selected');
      }
    });

    // Highlight current edge with pulse glow
    const curEdgeEl = edgeElements[curIndex];
    curEdgeEl.classList.add('selected');
    curEdgeEl.style.transition = 'stroke 0.8s ease, stroke-width 0.8s ease, filter 0.8s ease';
    curEdgeEl.style.animation = 'pulseGlow 1.8s ease-in-out';
    setTimeout(()=>{
      curEdgeEl.style.animation = '';
    },1800);

    // After a pause, decide to include or exclude edge from MST
    setTimeout(() => {
      const u = curEdge.u;
      const v = curEdge.v;
      // If no cycle, union and keep edge selected
      if(dsu.find(u)!==dsu.find(v)) {
        dsu.union(u,v);
        animateKruskal.selectedEdges.push(curIndex);

        // Make the edge glow permanently
        curEdgeEl.classList.add('selected');
        curEdgeEl.style.transition = 'stroke 1s ease, stroke-width 1s ease, filter 1s ease';

        // Also highlight connected nodes softly
        highlightNodes([u,v]);

      } else {
        // If cycle, edge deselect with a subtle fade
        curEdgeEl.classList.remove('selected');
        curEdgeEl.style.stroke = '#6b7280'; // cool gray
        curEdgeEl.style.strokeWidth = '2px';
        curEdgeEl.style.filter = 'drop-shadow(0 0 3px #6b728033)';
        dimNodes([curEdge.u, curEdge.v]);
      }
      animStep++;
      setTimeout(() => {
        animateKruskal();
      }, 1700);
    }, 2200);
  }

  function highlightNodes(nodeIds){
    const nodeCircles = document.querySelectorAll('circle.node');
    nodeCircles.forEach((c,i)=>{
      if(nodeIds.includes(i)){
        c.classList.add('active');
        c.style.animation = 'pulseGlow 2.4s ease-in-out infinite';
      }
    });
  }
  function dimNodes(nodeIds) {
    const nodeCircles = document.querySelectorAll('circle.node');
    nodeCircles.forEach((c,i)=>{
      if(nodeIds.includes(i)){
        c.classList.remove('active');
        c.style.fill = '#35434d';
        c.style.strokeWidth = '2px';
        c.style.filter = 'drop-shadow(0 0 2px #223236cc)';
        c.style.transition = 'fill 0.8s ease, stroke-width 0.8s ease, filter 0.8s ease';
      }
    });
  }

  startBtn.addEventListener('click', () => {
    if(animationInProgress) return;
    animationInProgress = true;
    startBtn.disabled = true;
    resetBtn.disabled = true;
    resetBtn.setAttribute('aria-disabled', 'true');
    animateKruskal.selectedEdges = [];
    animStep = 0;
    animateKruskal();
  });

  resetBtn.addEventListener('click', () => {
    resetVisualization();
  });

  // Initial reset to style nodes consistently
  resetVisualization();
})();
</script>
</body>
</html>
