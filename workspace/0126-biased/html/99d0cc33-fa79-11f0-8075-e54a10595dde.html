<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Compiler Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 10px;
        }
        .output-area, .input-area {
            border: 1px solid black;
            padding: 10px;
            margin-top: 10px;
            min-height: 50px;
        }
        button {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<h1>Interactive Compiler Demo</h1>

<div>
    <label for="source-code">Source Code:</label><br>
    <textarea id="source-code" rows="5" cols="50"></textarea><br>
    <button id="compile-button">Compile</button>
    <button id="reset-button">Reset</button>
</div>

<div>
    <label for="options">Select Optimization Level:</label><br>
    <select id="options">
        <option value="none">None</option>
        <option value="basic">Basic</option>
        <option value="advanced">Advanced</option>
    </select>
</div>

<div>
    <label for="output">Output:</label><br>
    <div id="output" class="output-area"></div>
</div>

<div>
    <label for="error-log">Error Log:</label><br>
    <div id="error-log" class="output-area"></div>
</div>

<div>
    <label for="memory-usage">Memory Usage:</label>
    <input type="range" id="memory-usage" min="0" max="100" value="0">
    <span id="memory-value">0</span>%
</div>

<div>
    <button id="increase-memory">Increase Memory</button>
    <button id="decrease-memory">Decrease Memory</button>
</div>

<script>
    let memoryUsage = 0;

    document.getElementById('compile-button').onclick = function() {
        const sourceCode = document.getElementById('source-code').value;
        const optimization = document.getElementById('options').value;
        let output = "";
        let errors = "";

        if (sourceCode.trim() === "") {
            errors = "Error: Source code is empty.";
        } else {
            output = `Compiled Code:\n${sourceCode}\nOptimization Level: ${optimization}`;
        }

        document.getElementById('output').innerText = output;
        document.getElementById('error-log').innerText = errors;
    };

    document.getElementById('reset-button').onclick = function() {
        document.getElementById('source-code').value = "";
        document.getElementById('output').innerText = "";
        document.getElementById('error-log').innerText = "";
        document.getElementById('options').selectedIndex = 0;
    };

    document.getElementById('memory-usage').oninput = function() {
        memoryUsage = this.value;
        document.getElementById('memory-value').innerText = memoryUsage;
    };

    document.getElementById('increase-memory').onclick = function() {
        if (memoryUsage < 100) {
            memoryUsage++;
            document.getElementById('memory-usage').value = memoryUsage;
            document.getElementById('memory-value').innerText = memoryUsage;
        }
    };

    document.getElementById('decrease-memory').onclick = function() {
        if (memoryUsage > 0) {
            memoryUsage--;
            document.getElementById('memory-usage').value = memoryUsage;
            document.getElementById('memory-value').innerText = memoryUsage;
        }
    };
</script>

</body>
</html>
