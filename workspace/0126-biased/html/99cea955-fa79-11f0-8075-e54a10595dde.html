<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quick Sort</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        #arrayDisplay { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Interactive Quick Sort</h1>
    <label for="arrayInput">Enter comma-separated integers:</label>
    <input type="text" id="arrayInput" value="3,6,8,10,1,2,1">
    <button id="sortButton">Sort</button>
    <button id="resetButton">Reset</button>
    
    <h3>Manual Controls</h3>
    <label for="lowIndex">Low Index:</label>
    <input type="number" id="lowIndex" value="0">
    <label for="highIndex">High Index:</label>
    <input type="number" id="highIndex" value="0">
    <button id="stepButton">Step</button>
    
    <div id="arrayDisplay"></div>
    <div id="statusDisplay"></div>

    <script>
        let array = [];
        let lowIndex = 0;
        let highIndex = 0;
        let steps = [];
        let currentStep = 0;

        document.getElementById('sortButton').onclick = function() {
            const input = document.getElementById('arrayInput').value;
            array = input.split(",").map(Number);
            highIndex = array.length - 1;
            steps = [];
            currentStep = 0;

            quickSort(array, 0, highIndex);
            displayArray();
        };

        document.getElementById('stepButton').onclick = function() {
            if (currentStep < steps.length) {
                lowIndex = steps[currentStep][0];
                highIndex = steps[currentStep][1];
                partition(array, lowIndex, highIndex);
            } else {
                document.getElementById('statusDisplay').innerText = "Sort Complete!";
            }
        };

        document.getElementById('resetButton').onclick = function() {
            array = [];
            lowIndex = 0;
            highIndex = 0;
            steps = [];
            currentStep = 0;
            displayArray();
            document.getElementById('statusDisplay').innerText = '';
        };

        function quickSort(arr, low, high) {
            if (low < high) {
                const pi = partition(arr, low, high);
                quickSort(arr, low, pi - 1);
                quickSort(arr, pi + 1, high);
                steps.push([low, high]);
            }
        }

        function partition(arr, low, high) {
            let pivot = arr[high];
            let i = (low - 1);

            for (let j = low; j <= high - 1; j++) {
                if (arr[j] < pivot) {
                    i++;
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
            }
            [arr[i + 1], arr[high]] = [arr[high], arr[i + 1]];
            displayArray();
            return i + 1;
        }

        function displayArray() {
            document.getElementById('arrayDisplay').innerText = "Array: " + array.join(", ");
        }
    </script>
</body>
</html>
