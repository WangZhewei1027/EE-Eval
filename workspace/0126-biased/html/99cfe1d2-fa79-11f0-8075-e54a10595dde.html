<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semaphore Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>Semaphore Control System</h1>
    <h2>Controls</h2>
    <button id="btnRequest">Request Access</button>
    <button id="btnRelease">Release Access</button>
    <h3>Status</h3>
    <div id="statusText">Available: 1</div>
    <h3>Count</h3>
    <input type="number" id="semaphoreCount" value="1" min="1" step="1">
    <button id="setCount">Set Semaphore Count</button>
    
    <h3>Users</h3>
    <div id="userContainer"></div>
    <input type="text" id="username" placeholder="Enter username">
    <button id="addUser">Add User</button>

    <h3>User Actions</h3>
    <select id="userSelect"></select>
    <button id="requestAccess">Request Access</button>
    <button id="releaseAccess">Release Access</button>

    <script>
        let semaphoreCount = 1;
        let availableCount = semaphoreCount;
        let userStates = {};
        let userList = [];
        
        document.getElementById("btnRequest").onclick = requestAccess;
        document.getElementById("btnRelease").onclick = releaseAccess;
        document.getElementById("setCount").onclick = updateSemaphoreCount;
        document.getElementById("addUser").onclick = addUser;
        document.getElementById("requestAccess").onclick = userRequestAccess;
        document.getElementById("releaseAccess").onclick = userReleaseAccess;

        function updateStatus() {
            document.getElementById("statusText").innerText = `Available: ${availableCount}`;
        }

        function requestAccess() {
            if (availableCount > 0) {
                availableCount--;
                updateStatus();
            } else {
                alert("No available permits!");
            }
        }

        function releaseAccess() {
            if (semaphoreCount > availableCount) {
                availableCount++;
                updateStatus();
            } else {
                alert("Cannot release more than available!");
            }
        }

        function updateSemaphoreCount() {
            const newCount = parseInt(document.getElementById("semaphoreCount").value);
            if (newCount >= 1) {
                semaphoreCount = newCount;
                availableCount = semaphoreCount;
                updateStatus();
            } else {
                alert("Count must be at least 1.");
            }
        }

        function addUser() {
            const username = document.getElementById("username").value;
            if (username && !userList.includes(username)) {
                userList.push(username);
                userStates[username] = {hasAccess: false};
                updateUserSelect();
                document.getElementById("username").value = "";
            } else {
                alert("Enter a valid username.");
            }
        }

        function updateUserSelect() {
            const userSelect = document.getElementById("userSelect");
            userSelect.innerHTML = "";
            userList.forEach(user => {
                const option = document.createElement("option");
                option.value = user;
                option.textContent = user;
                userSelect.appendChild(option);
            });
        }

        function userRequestAccess() {
            const selectedUser = document.getElementById("userSelect").value;
            if (selectedUser && availableCount > 0) {
                userStates[selectedUser].hasAccess = true;
                availableCount--;
                updateStatus();
            } else if (!selectedUser) {
                alert("Select a user.");
            } else {
                alert("No available permits!");
            }
        }

        function userReleaseAccess() {
            const selectedUser = document.getElementById("userSelect").value;
            if (selectedUser && userStates[selectedUser].hasAccess) {
                userStates[selectedUser].hasAccess = false;
                availableCount++;
                updateStatus();
            } else if (!selectedUser) {
                alert("Select a user.");
            } else {
                alert("User does not have access!");
            }
        }

        updateStatus();
    </script>
</body>
</html>
