<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACID Properties Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>ACID Properties Interactive Demonstration</h1>
    
    <h2>ACID Definitions</h2>
    <p>Atomicity, Consistency, Isolation, Durability.</p>
    
    <h2>Current State</h2>
    <div>
        <p id="currentState">No transactions yet</p>
    </div>
    
    <h2>Begin Transaction</h2>
    <button id="beginTransaction">Start Transaction</button>

    <h2>Actions</h2>
    <button id="commit" class="hidden">Commit Transaction</button>
    <button id="rollback" class="hidden">Rollback Transaction</button>

    <h2>Input Data</h2>
    <div>
        <input type="text" id="dataInput" placeholder="Enter some data">
        <button id="addData" class="hidden">Add Data</button>
    </div>

    <h2>Data Entries</h2>
    <div>
        <ul id="dataList"></ul>
    </div>

    <h2>Transaction History</h2>
    <div>
        <ul id="transactionHistory"></ul>
    </div>

    <script>
        let isTransactionActive = false;
        let dataEntries = [];
        let transactionHistory = [];
        
        document.getElementById('beginTransaction').onclick = function () {
            isTransactionActive = true;
            document.getElementById('currentState').innerText = "Transaction in progress...";
            document.getElementById('commit').classList.remove('hidden');
            document.getElementById('rollback').classList.remove('hidden');
            document.getElementById('addData').classList.remove('hidden');
        };

        document.getElementById('commit').onclick = function () {
            if (!isTransactionActive) return;
            let data = document.getElementById('dataInput').value;
            if (data) {
                dataEntries.push(data);
                transactionHistory.push("Committed: " + data);
                document.getElementById('dataInput').value = '';
            }
            updateDataList();
            updateTransactionHistory();
            finalizeTransaction("committed");
        };

        document.getElementById('rollback').onclick = function () {
            if (!isTransactionActive) return;
            finalizeTransaction("rolled back");
        };

        document.getElementById('addData').onclick = function () {
            if (!isTransactionActive) return;
            let data = document.getElementById('dataInput').value;
            if (data) {
                dataEntries.push(data);
                transactionHistory.push("Added: " + data);
                document.getElementById('dataInput').value = '';
                updateDataList();
                updateTransactionHistory();
            }
        };

        function finalizeTransaction(action) {
            isTransactionActive = false;
            document.getElementById('currentState').innerText = "Transaction " + action + ".";
            document.getElementById('commit').classList.add('hidden');
            document.getElementById('rollback').classList.add('hidden');
            document.getElementById('addData').classList.add('hidden');
        }

        function updateDataList() {
            const list = document.getElementById('dataList');
            list.innerHTML = '';
            dataEntries.forEach(entry => {
                const listItem = document.createElement('li');
                listItem.innerText = entry;
                list.appendChild(listItem);
            });
        }

        function updateTransactionHistory() {
            const history = document.getElementById('transactionHistory');
            history.innerHTML = '';
            transactionHistory.forEach(entry => {
                const historyItem = document.createElement('li');
                historyItem.innerText = entry;
                history.appendChild(historyItem);
            });
        }
    </script>
</body>
</html>
