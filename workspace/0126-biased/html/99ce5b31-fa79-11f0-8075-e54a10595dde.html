<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVL Tree Visualizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #tree {
            margin-top: 20px;
        }
        #controls {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<h1>AVL Tree Visualizer</h1>

<div id="controls">
    <label for="value">Enter a value: </label>
    <input type="number" id="value" />
    <button onclick="insertNode()">Insert</button>
    <button onclick="removeNode()">Remove</button>
    <button onclick="resetTree()">Reset Tree</button>
</div>

<div id="tree"></div>

<script>
    class TreeNode {
        constructor(value) {
            this.value = value;
            this.left = null;
            this.right = null;
            this.height = 1;
        }
    }

    class AVLTree {
        constructor() {
            this.root = null;
        }

        getHeight(node) {
            return node ? node.height : 0;
        }

        getBalance(node) {
            return node ? this.getHeight(node.left) - this.getHeight(node.right) : 0;
        }

        rightRotate(y) {
            const x = y.left;
            const T2 = x.right;

            x.right = y;
            y.left = T2;

            y.height = Math.max(this.getHeight(y.left), this.getHeight(y.right)) + 1;
            x.height = Math.max(this.getHeight(x.left), this.getHeight(x.right)) + 1;

            return x;
        }

        leftRotate(x) {
            const y = x.right;
            const T2 = y.left;

            y.left = x;
            x.right = T2;

            x.height = Math.max(this.getHeight(x.left), this.getHeight(x.right)) + 1;
            y.height = Math.max(this.getHeight(y.left), this.getHeight(y.right)) + 1;

            return y;
        }

        insert(node, value) {
            if (!node) return new TreeNode(value);
            if (value < node.value) {
                node.left = this.insert(node.left, value);
            } else {
                node.right = this.insert(node.right, value);
            }

            node.height = 1 + Math.max(this.getHeight(node.left), this.getHeight(node.right)));
            const balance = this.getBalance(node);

            if (balance > 1 && value < node.left.value) return this.rightRotate(node);
            if (balance < -1 && value > node.right.value) return this.leftRotate(node);
            if (balance > 1 && value > node.left.value) {
                node.left = this.leftRotate(node.left);
                return this.rightRotate(node);
            }
            if (balance < -1 && value < node.right.value) {
                node.right = this.rightRotate(node.right);
                return this.leftRotate(node);
            }

            return node;
        }

        remove(node, value) {
            if (!node) return node;

            if (value < node.value) {
                node.left = this.remove(node.left, value);
            } else if (value > node.value) {
                node.right = this.remove(node.right, value);
            } else {
                if (!node.left || !node.right) {
                    node = node.left ? node.left : node.right;
                } else {
                    let temp = this.getMinValueNode(node.right);
                    node.value = temp.value;
                    node.right = this.remove(node.right, temp.value);
                }
            }

            if (!node) return node;
            node.height = 1 + Math.max(this.getHeight(node.left), this.getHeight(node.right)));
            const balance = this.getBalance(node);

            if (balance > 1 && this.getBalance(node.left) >= 0) return this.rightRotate(node);
            if (balance < -1 && this.getBalance(node.right) <= 0) return this.leftRotate(node);
            if (balance > 1 && this.getBalance(node.left) < 0) {
                node.left = this.leftRotate(node.left);
                return this.rightRotate(node);
            }
            if (balance < -1 && this.getBalance(node.right) > 0) {
                node.right = this.rightRotate(node.right);
                return this.leftRotate(node);
            }

            return node;
        }

        getMinValueNode(node) {
            let current = node;
            while (current.left) current = current.left;
            return current;
        }

        insertValue(value) {
            this.root = this.insert(this.root, value);
            this.render();
        }

        removeValue(value) {
            this.root = this.remove(this.root, value);
            this.render();
        }

        reset() {
            this.root = null;
            this.render();
        }

        renderNode(node) {
            if (!node) return '';

            return `<div>${node.value}</div>
                <div style="display: flex; justify-content: space-between;">
                    <div>${this.renderNode(node.left)}</div>
                    <div>${this.renderNode(node.right)}</div>
                </div>`;
        }

        render() {
            document.getElementById("tree").innerHTML = this.renderNode(this.root);
        }
    }

    const avlTree = new AVLTree();

    function insertNode() {
        const value = parseInt(document.getElementById('value').value);
        if (!isNaN(value)) {
            avlTree.insertValue(value);
            document.getElementById('value').value = '';
        }
    }

    function removeNode() {
        const value = parseInt(document.getElementById('value').value);
        if (!isNaN(value)) {
            avlTree.removeValue(value);
            document.getElementById('value').value = '';
        }
    }

    function resetTree() {
        avlTree.reset();
    }
</script>

</body>
</html>
