<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="section">
            <h1>Recursion</h1>
            <p>Exploring the concept of recursion in a visually appealing way.</p>
        </div>
        <div class="section">
            <h2>Visual Aesthetics</h2>
            <div class="animation-container">
                <div class="animation" id="animation1">
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                </div>
                <div class="animation" id="animation2">
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                </div>
            </div>
        </div>
        <div class="section">
            <h2>Functionality</h2>
            <button id="button1">Click me!</button>
            <button id="button2">Click me again!</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
