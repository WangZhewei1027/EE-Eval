<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backpropagation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .button-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Backpropagation</h1>
        <p>Backpropagation is an algorithm used for training artificial neural networks. It works by iteratively adjusting the weights and biases of the network to minimize the error between the predicted and actual outputs.</p>
        <p>Here is a simple backpropagation example:</p>
        <div class="button-container">
            <button id="train-button">Train Network</button>
            <button id="predict-button">Predict</button>
        </div>
    </div>

    <script>
        let trainingData = [
            { input: [1, 2, 3], output: [4, 5, 6] },
            { input: [2, 3, 4], output: [5, 6, 7] },
            { input: [3, 4, 5], output: [6, 7, 8] }
        ];

        let weights = {};
        let biases = {};

        function trainNetwork() {
            let inputs = trainingData.map(data => data.input);
            let outputs = trainingData.map(data => data.output);
            let predictions = [];

            for (let i = 0; i < inputs.length; i++) {
                let prediction = predict(inputs[i], weights, biases);
                predictions.push(prediction);
            }

            for (let i = 0; i < inputs.length; i++) {
                let error = prediction - outputs[i];
                weights[i] += 0.1 * error * inputs[i];
                biases[i] += 0.1 * error * outputs[i];
            }

            console.log("Training complete.");
        }

        function predict(input) {
            let sum = 0;
            for (let i = 0; i < input.length; i++) {
                sum += input[i] * weights[i];
            }
            return sum;
        }

        let training = true;
        let input = [];
        let output = [];

        function updateWeightsAndBiases() {
            if (training) {
                let inputs = trainingData.map(data => data.input);
                let outputs = trainingData.map(data => data.output);
                let predictions = [];

                for (let i = 0; i < inputs.length; i++) {
                    let prediction = predict(inputs[i], weights, biases);
                    predictions.push(prediction);
                }

                for (let i = 0; i < inputs.length; i++) {
                    let error = prediction - outputs[i];
                    weights[i] += 0.1 * error * inputs[i];
                    biases[i] += 0.1 * error * outputs[i];
                }

                if (input.length < 10) {
                    input.push(...inputs);
                    output.push(...outputs);
                } else {
                    let inputs = input.slice(0, 10);
                    let outputs = output.slice(0, 10);
                    let predictions = [];

                    for (let i = 0; i < inputs.length; i++) {
                        let prediction = predict(inputs[i], weights, biases);
                        predictions.push(prediction);
                    }

                    for (let i = 0; i < inputs.length; i++) {
                        let error = prediction - outputs[i];
                        weights[i] += 0.1 * error * inputs[i];
                        biases[i] += 0.1 * error * outputs[i];
                    }

                    input = inputs.slice(10);
                    output = outputs.slice(10);
                }

                if (input.length < 10) {
                    input.push(...inputs);
                    output.push(...outputs);
                } else {
                    let inputs = input.slice(0, 10);
                    let outputs = output.slice(0, 10);
                    let predictions = [];

                    for (let i = 0; i < inputs.length; i++) {
                        let prediction = predict(inputs[i], weights, biases);
                        predictions.push(prediction);
                    }

                    for (let i = 0; i < inputs.length; i++) {
                        let error = prediction - outputs[i];
                        weights[i] += 0.1 * error * inputs[i];
                        biases[i] += 0.1 * error * outputs[i];
                    }

                    input = inputs.slice(10);
                    output = outputs.slice(10);
                }
            }
        }

        function updateWeightsAndBiasesButton() {
            if (training) {
                updateWeightsAndBiases();
            }
        }

        let button = document.getElementById("train-button");
        let button2 = document.getElementById("predict-button");
        button.addEventListener("click", trainNetwork);
        button2.addEventListener("click", updateWeightsAndBiasesButton);
    </script>
</body>
</html>
