<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B+ Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 80%;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .tree-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .tree {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .node {
            width: 20px;
            height: 20px;
            background-color: #f0f0f0;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #333;
            margin: 5px;
        }

        .node.selected {
            background-color: #ccc;
            color: #fff;
        }

        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }

        .button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tree-container">
            <div class="tree">
                <div class="node node-1" style="left: 10px; top: 10px;">
                    <span class="node-text">1</span>
                </div>
                <div class="node node-2" style="left: 40px; top: 10px;">
                    <span class="node-text">2</span>
                </div>
                <div class="node node-3" style="left: 90px; top: 10px;">
                    <span class="node-text">3</span>
                </div>
            </div>
        </div>
        <div class="button" style="left: 10px; top: 50px;">Click Me!</div>
    </div>

    <script>
        let tree = {
            nodes: [
                { id: 1, text: '1' },
                { id: 2, text: '2' },
                { id: 3, text: '3' }
            ],
            root: null,
            selection: null
        };

        function addNode(id, text) {
            const node = {
                id,
                text
            };
            tree.nodes.push(node);
            updateTree();
        }

        function updateTree() {
            const treeNodes = document.querySelectorAll('.node');
            tree.nodes.forEach(node => {
                const nodeElement = document.querySelector(`.node-${node.id}`);
                nodeElement.textContent = node.text;
                nodeElement.style.left = `${node.id * 20}px`;
            });
        }

        function selectNode(id) {
            tree.selection = id;
            updateTree();
        }

        function deselectNode() {
            tree.selection = null;
            updateTree();
        }

        const button = document.querySelector('.button');
        button.addEventListener('click', () => {
            selectNode(1);
        });

        addNode(1, '1');
        addNode(2, '2');
        addNode(3, '3');

        updateTree();
    </script>
</body>
</html>
