<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Load Balancer Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .control-group {
            margin: 10px 0;
        }
    </style>
</head>
<body>

<h1>Load Balancer Simulator</h1>

<div class="control-group">
    <label for="serverCount">Number of Servers:</label>
    <input type="number" id="serverCount" value="2" min="1" max="10">
</div>

<div class="control-group">
    <label for="requestCount">Number of Requests:</label>
    <input type="number" id="requestCount" value="10" min="1" max="100">
</div>

<div class="control-group">
    <label for="algorithm">Select Load Balancing Algorithm:</label>
    <select id="algorithm">
        <option value="roundRobin">Round Robin</option>
        <option value="leastConnections">Least Connections</option>
        <option value="random">Random</option>
    </select>
</div>

<div class="control-group">
    <button id="distributeButton">Distribute Requests</button>
</div>

<div class="control-group">
    <label for="log">Log:</label>
    <textarea id="log" rows="10" cols="50" readonly></textarea>
</div>

<script>
    document.getElementById('distributeButton').addEventListener('click', function() {
        const serverCount = parseInt(document.getElementById('serverCount').value);
        const requestCount = parseInt(document.getElementById('requestCount').value);
        const algorithm = document.getElementById('algorithm').value;
        
        const servers = Array.from({length: serverCount}, (_, i) => ({ id: i + 1, load: 0, requests: [] }));
        const logArea = document.getElementById('log');
        logArea.value = '';
        
        const distributeRequests = () => {
            for (let i = 0; i < requestCount; i++) {
                const requestId = i + 1;
                let serverIndex;

                if (algorithm === 'roundRobin') {
                    serverIndex = i % serverCount;
                } else if (algorithm === 'leastConnections') {
                    serverIndex = servers.reduce((prev, curr, index) => curr.load < servers[prev].load ? index : prev, 0);
                } else if (algorithm === 'random') {
                    serverIndex = Math.floor(Math.random() * serverCount);
                }

                servers[serverIndex].load++;
                servers[serverIndex].requests.push(requestId);
                logArea.value += `Request ${requestId} assigned to Server ${servers[serverIndex].id}\n`;
            }

            servers.forEach(server => {
                logArea.value += `Server ${server.id} handled requests: ${server.requests.join(', ')} with load: ${server.load}\n`;
            });
        };

        distributeRequests();
    });
</script>

</body>
</html>
