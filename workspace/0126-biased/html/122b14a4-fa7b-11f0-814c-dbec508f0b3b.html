<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Tree</title>
    <style>
        body {
            font-family: monospace;
            background-color: #fff;
            text-align: center;
        }
        #tree {
            width: 800px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #tree div {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
        }
        #tree div:hover {
            background-color: #f0f0f0;
        }
        #input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
        }
        #input label {
            display: block;
            margin-bottom: 10px;
        }
        #buttons {
            margin-top: 20px;
            text-align: right;
        }
        #buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #buttons button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <div id="tree"></div>
    <input id="input" type="text" placeholder="Enter key-value pair">
    <div id="buttons">
        <button id="add-btn">Add</button>
        <button id="remove-btn">Remove</button>
        <button id="update-btn">Update</button>
        <button id="clear-btn">Clear</button>
    </div>

    <script>
        class BTreeNode {
            constructor() {
                this.keys = [];
                this.values = [];
                this.children = [];
                this.size = 0;
                this.max = 1;
            }

            add(key, value) {
                this.keys.push(key);
                this.values.push(value);
            }

            remove(key) {
                const index = this.keys.indexOf(key);
                if (index !== -1) {
                    this.keys.splice(index, 1);
                    this.values.splice(index, 1);
                    this.size -= 2;
                }
            }

            update(key, value) {
                const index = this.keys.indexOf(key);
                if (index !== -1) {
                    this.values[index] = value;
                }
            }

            getKeys() {
                return this.keys;
            }

            getValues() {
                return this.values;
            }

            getChildren() {
                return this.children;
            }
        }

        class BTree {
            constructor() {
                this.root = new BTreeNode();
            }

            add(key, value) {
                this.root.add(key, value);
            }

            remove(key) {
                this.root.remove(key);
            }

            update(key, value) {
                this.root.update(key, value);
            }

            getKeys() {
                return this.root.getKeys();
            }

            getValues() {
                return this.root.getValues();
            }

            getChildren() {
                return this.root.getChildren();
            }

            search(key) {
                return this.root.search(key);
            }
        }

        const btree = new BTree();

        const addBtn = document.getElementById('add-btn');
        const removeBtn = document.getElementById('remove-btn');
        const updateBtn = document.getElementById('update-btn');
        const clearBtn = document.getElementById('clear-btn');

        addBtn.addEventListener('click', () => {
            const input = document.getElementById('input');
            const key = input.value;
            const value = input.value;
            btree.add(key, value);
            input.value = '';
        });

        removeBtn.addEventListener('click', () => {
            const input = document.getElementById('input');
            const key = input.value;
            btree.remove(key);
            input.value = '';
        });

        updateBtn.addEventListener('click', () => {
            const input = document.getElementById('input');
            const key = input.value;
            const value = input.value;
            btree.update(key, value);
            input.value = '';
        });

        clearBtn.addEventListener('click', () => {
            btree.root = new BTreeNode();
        });

        const treeDiv = document.getElementById('tree');
        const input = document.getElementById('input');

        function printTree(node, level = 0) {
            if (node) {
                treeDiv.innerHTML = '';
                for (const child of node.getChildren()) {
                    const div = document.createElement('div');
                    div.style.width = `${level * 20}px`;
                    div.style.padding = `${level * 10}px`;
                    div.style.border = '1px solid #ccc';
                    div.style.marginBottom = `${level * 10}px`;
                    treeDiv.appendChild(div);
                    printTree(child, level + 1);
                }
                if (node.keys.length > 0) {
                    const div = document.createElement('div');
                    div.style.width = `${level * 20}px`;
                    div.style.padding = `${level * 10}px`;
                    div.style.border = '1px solid #ccc';
                    div.style.marginBottom = `${level * 10}px`;
                    div.innerHTML = 'Keys: ' + node.keys.join(', ');
                    treeDiv.appendChild(div);
                }
                if (node.values.length > 0) {
                    const div = document.createElement('div');
                    div.style.width = `${level * 20}px`;
                    div.style.padding = `${level * 10}px`;
                    div.style.border = '1px solid #ccc';
                    div.style.marginBottom = `${level * 10}px`;
                    div.innerHTML = 'Values: ' + node.values.join(', ');
                    treeDiv.appendChild(div);
                }
            }
        }

        input.addEventListener('input', () => {
            printTree(btree.root);
        });

        for (const child of btree.root.getChildren()) {
            const div = document.createElement('div');
            div.style.width = '100%';
            div.style.padding = '10px';
            div.style.border = '1px solid #ccc';
            div.style.marginBottom = '10px';
            treeDiv.appendChild(div);
            div.innerHTML = 'Child ' + child.max;
            for (let i = 0; i < child.max; i++) {
                const div = document.createElement('div');
                div.style.width = '20px';
                div.style.padding = '5px';
                div.style.border = '1px solid #ccc';
                div.style.marginBottom = '5px';
                treeDiv.appendChild(div);
                div.innerHTML = i;
            }
        }
    </script>
</body>
</html>
