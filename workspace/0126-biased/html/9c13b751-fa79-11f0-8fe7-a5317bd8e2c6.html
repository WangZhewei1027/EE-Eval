<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Graph (Directed) - Interactive Demo</title>
  <style>
    /* Extremely minimal styling - plain black text on white background */
    html,body { height:100%; margin:0; font-family: sans-serif; color: black; background: white; }
    #app { display:flex; height:100vh; }
    #controls { width:360px; padding:8px; box-sizing:border-box; overflow:auto; border-right:1px solid #000; }
    #canvasWrap { flex:1; display:flex; flex-direction:column; }
    #toolbar { padding:6px; border-bottom:1px solid #000; }
    #svgContainer { flex:1; position:relative; }
    svg { width:100%; height:100%; display:block; background:white; }
    button,input,select,textarea { margin:4px 0; display:block; width:100%; }
    label { font-size:12px; margin-top:8px; display:block; }
    .small { width:auto; display:inline-block; margin-right:6px; }
    #log { height:140px; overflow:auto; border-top:1px solid #000; padding:6px; font-size:12px; }
    #algControls { padding:6px; border-top:1px solid #000; }
    .section { margin-bottom:12px; padding-bottom:6px; border-bottom:1px dashed #000; }
    pre { white-space:pre-wrap; word-wrap:break-word; margin:4px 0; }
  </style>
</head>
<body>
  <div id="app">
    <div id="controls">
      <h3>Graph (Directed) - Controls</h3>

      <div class="section">
        <label>Mode</label>
        <button id="mode_add_node">Add Node (click blank)</button>
        <button id="mode_add_edge">Add Edge (click source then target)</button>
        <button id="mode_move">Move Nodes (drag)</button>
        <button id="mode_select">Select</button>
        <button id="mode_delete">Delete (click)</button>
        <div>
          <label>Default new node label</label>
          <input id="newNodeLabel" value="N" />
          <label>Default edge weight</label>
          <input id="newEdgeWeight" value="1" />
        </div>
      </div>

      <div class="section">
        <label>Edit Selected</label>
        <div>
          <label>Selected ID (read-only)</label>
          <input id="selectedId" readonly />
          <label>Edit label</label>
          <input id="editLabel" />
          <label>Edit weight (for selected edge)</label>
          <input id="editWeight" />
          <button id="applyEdit">Apply Edit</button>
          <button id="reverseEdge">Reverse Edge Direction</button>
          <button id="duplicateNode">Duplicate Node</button>
        </div>
      </div>

      <div class="section">
        <label>Graph Operations</label>
        <button id="clearGraph">Clear Graph</button>
        <button id="sampleGraph">Load Sample Graph</button>
        <label>Random graph</label>
        <input id="rndN" class="small" type="number" value="6" /> nodes
        <input id="rndP" class="small" type="number" value="30" /> % edge probability
        <div>
          <label><input id="rndWeighted" type="checkbox" /> Weighted edges</label>
        </div>
        <button id="generateRnd">Generate Random Graph</button>
      </div>

      <div class="section">
        <label>Layout</label>
        <button id="layout_circular">Circular Layout</button>
        <button id="layout_grid">Grid Layout</button>
        <button id="layout_random">Randomize Positions</button>
        <button id="layout_topo">Layout by Topological Order</button>
        <button id="layout_force">Run Simple Force Layout</button>
        <label>Force iterations</label>
        <input id="forceIter" type="number" value="200" />
      </div>

      <div class="section">
        <label>Undo/Redo / Clipboard</label>
        <button id="undoBtn">Undo</button>
        <button id="redoBtn">Redo</button>
        <button id="copyBtn">Copy JSON</button>
        <button id="pasteBtn">Paste JSON</button>
        <textarea id="clipboard" placeholder="Paste/import JSON here" rows="4"></textarea>
        <button id="importBtn">Import Graph JSON</button>
        <button id="exportBtn">Export Graph JSON</button>
      </div>

      <div class="section">
        <label>Adjacency Views</label>
        <button id="showAdjList">Show Adjacency List</button>
        <button id="showAdjMatrix">Show Adjacency Matrix</button>
        <div id="adjOutput" style="white-space:pre-wrap; font-size:12px;"></div>
      </div>

      <div class="section">
        <label>Edge Tools</label>
        <button id="flipAll">Flip All Edges</button>
        <button id="removeSelfLoops">Remove Self-loops</button>
        <button id="contractEdge">Contract Selected Edge (merge nodes)</button>
      </div>

    </div>

    <div id="canvasWrap">
      <div id="toolbar">
        <label>Zoom: mouse wheel (Ctrl+wheel for fine)</label>
        <label>Pan: middle mouse drag or right drag</label>
        <label>Nodes: click to select, double-click to edit label</label>
      </div>
      <div id="svgContainer">
        <svg id="svg" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L10,3.5 L0,7 L2,3.5 z" fill="black" />
            </marker>
          </defs>
          <g id="viewport">
            <rect id="bg" x="0" y="0" width="100%" height="100%" fill="white" />
            <g id="edgesLayer"></g>
            <g id="nodesLayer"></g>
            <g id="tempLayer"></g>
          </g>
        </svg>
      </div>

      <div id="algControls">
        <div class="section">
          <label>Algorithms</label>
          <select id="algoSelect">
            <option value="bfs">BFS</option>
            <option value="dfs">DFS</option>
            <option value="dijkstra">Dijkstra</option>
            <option value="topo">Topological Sort (Kahn)</option>
            <option value="tarjan">SCC (Tarjan)</option>
          </select>
          <label>Start node (id)</label>
          <input id="algoStart" />
          <label>Target node (optional)</label>
          <input id="algoTarget" />
          <label>Step speed (ms)</label>
          <input id="speed" type="range" min="50" max="2000" value="500" />
          <div>
            <button id="runAlgo">Run Algorithm</button>
            <button id="stepBack">Step Back</button>
            <button id="stepNext">Step Next</button>
            <button id="playPause">Play</button>
            <button id="stopAlgo">Stop/Reset</button>
            <button id="highlightPath">Show Shortest Path (Dijkstra)</button>
          </div>
          <div>
            <label>Auto-play iterations per step (1..10)</label>
            <input id="autoStepCount" type="number" value="1" min="1" max="10" />
          </div>
        </div>
        <div class="section">
          <label>Algorithm Log</label>
          <div id="log"></div>
        </div>
      </div>
    </div>
  </div>

<script>
(function(){

// Minimal, feature-rich directed graph editor and algorithm demonstrator.
// No external libraries. Visuals intentionally plain (black on white).

// Data structures
let graph = { nodes: [], edges: [] };
let stateHistory = [], redoHistory = [];
let selected = { type: null, id: null }; // type: 'node'|'edge'|null
let mode = 'select'; // modes: add_node, add_edge, move, select, delete
let nextNodeId = 1;
let nextEdgeId = 1;

const svg = document.getElementById('svg');
const viewport = document.getElementById('viewport');
const nodesLayer = document.getElementById('nodesLayer');
const edgesLayer = document.getElementById('edgesLayer');
const tempLayer = document.getElementById('tempLayer');
const bg = document.getElementById('bg');

const newNodeLabelInput = document.getElementById('newNodeLabel');
const newEdgeWeightInput = document.getElementById('newEdgeWeight');

const selectedIdInput = document.getElementById('selectedId');
const editLabelInput = document.getElementById('editLabel');
const editWeightInput = document.getElementById('editWeight');

const logEl = document.getElementById('log');
const adjOutput = document.getElementById('adjOutput');

const speedInput = document.getElementById('speed');
const algoSelect = document.getElementById('algoSelect');
const algoStart = document.getElementById('algoStart');
const algoTarget = document.getElementById('algoTarget');

let tempEdge = null;
let edgeCreateFrom = null;

// Transform state (zoom/pan)
let transform = { x:0, y:0, k:1 };
let dragging = false;
let dragNode = null;
let dragType = null;
let panLast = null;

// Algorithm step playback
let algSteps = []; // array of {desc, nodesState, edgesState}
let algIndex = -1;
let algPlaying = false;
let algPlayTimer = null;

// Utility functions
function cloneGraph(g) {
  return {
    nodes: g.nodes.map(n => ({...n})),
    edges: g.edges.map(e => ({...e}))
  };
}
function pushHistory() {
  stateHistory.push(cloneGraph(graph));
  if (stateHistory.length > 200) stateHistory.shift();
  redoHistory = [];
}
function undo() {
  if (!stateHistory.length) return;
  redoHistory.push(cloneGraph(graph));
  graph = stateHistory.pop();
  refreshNextIds();
  render();
  log('Undo');
}
function redo() {
  if (!redoHistory.length) return;
  stateHistory.push(cloneGraph(graph));
  graph = redoHistory.pop();
  refreshNextIds();
  render();
  log('Redo');
}
function refreshNextIds(){
  nextNodeId = graph.nodes.reduce((m,n)=>Math.max(m, n.id),0)+1;
  nextEdgeId = graph.edges.reduce((m,e)=>Math.max(m, e.id),0)+1;
}

function log(msg) {
  const p = document.createElement('div');
  p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.appendChild(p);
  logEl.scrollTop = logEl.scrollHeight;
}

function findNodeAt(pos) {
  // find node under screen coords pos (clientX/clientY) -> convert to graph coords
  const pt = screenToGraph(pos.x, pos.y);
  for (let i = graph.nodes.length-1; i>=0; i--) {
    const n = graph.nodes[i];
    const r = n.r || 18;
    if ((pt.x - n.x)**2 + (pt.y - n.y)**2 <= r*r) return n;
  }
  return null;
}
function findEdgeAt(pos) {
  // naive: find nearest edge within threshold
  const pt = screenToGraph(pos.x, pos.y);
  let best = null;
  let bestDist = 12;
  for (const e of graph.edges) {
    const from = graph.nodes.find(n=>n.id===e.from);
    const to = graph.nodes.find(n=>n.id===e.to);
    if (!from || !to) continue;
    const d = pointToSegmentDistance(pt, from, to);
    if (d < bestDist) { bestDist = d; best = e; }
  }
  return best;
}
function pointToSegmentDistance(p, a, b) {
  const vx = b.x - a.x, vy = b.y - a.y;
  const wx = p.x - a.x, wy = p.y - a.y;
  const c = (vx*wx + vy*wy) / (vx*vx + vy*vy || 1);
  const t = Math.max(0, Math.min(1, c));
  const projx = a.x + vx*t, projy = a.y + vy*t;
  return Math.hypot(p.x-projx, p.y-projy);
}
function graphToScreen(x,y) {
  const bbox = svg.getBoundingClientRect();
  return { x: (x*transform.k + transform.x) + bbox.left, y: (y*transform.k + transform.y) + bbox.top };
}
function screenToGraph(sx, sy) {
  const bbox = svg.getBoundingClientRect();
  const x = (sx - bbox.left - transform.x) / transform.k;
  const y = (sy - bbox.top - transform.y) / transform.k;
  return { x,y };
}

// Rendering
function clearLayers() {
  while (nodesLayer.firstChild) nodesLayer.removeChild(nodesLayer.firstChild);
  while (edgesLayer.firstChild) edgesLayer.removeChild(edgesLayer.firstChild);
  while (tempLayer.firstChild) tempLayer.removeChild(tempLayer.firstChild);
}
function render() {
  clearLayers();
  // set transform on viewport group (we keep bg unchanged)
  viewport.setAttribute('transform', `translate(${transform.x},${transform.y}) scale(${transform.k})`);
  // render edges
  for (const e of graph.edges) {
    const from = graph.nodes.find(n=>n.id===e.from);
    const to = graph.nodes.find(n=>n.id===e.to);
    if (!from || !to) continue;
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    const id = `edge-${e.id}`;
    g.setAttribute('data-edge-id', e.id);
    // compute path (simple straight line with offset to avoid node overlap)
    const dx = to.x - from.x, dy = to.y - from.y;
    const dist = Math.hypot(dx,dy) || 1;
    const ux = dx/dist, uy = dy/dist;
    const fromR = from.r||18;
    const toR = to.r||18;
    let startX = from.x + ux*fromR;
    let startY = from.y + uy*fromR;
    let endX = to.x - ux*toR;
    let endY = to.y - uy*toR;
    // if self-loop, draw a loop
    let path;
    if (from.id === to.id) {
      const r = from.r||18;
      path = `M ${from.x} ${from.y - r} C ${from.x + 40} ${from.y - 60} ${from.x + 40} ${from.y + 60} ${from.x} ${from.y + r}`;
    } else {
      path = `M ${startX} ${startY} L ${endX} ${endY}`;
    }
    const pathEl = document.createElementNS('http://www.w3.org/2000/svg','path');
    pathEl.setAttribute('d', path);
    pathEl.setAttribute('fill','none');
    pathEl.setAttribute('stroke','black');
    pathEl.setAttribute('stroke-width', e._strokeWidth ? e._strokeWidth : 1);
    if (e._dash) pathEl.setAttribute('stroke-dasharray', e._dash);
    pathEl.setAttribute('marker-end','url(#arrow)');
    g.appendChild(pathEl);
    // weight label
    const midX = (startX + endX)/2, midY = (startY + endY)/2;
    const wt = document.createElementNS('http://www.w3.org/2000/svg','text');
    wt.setAttribute('x', midX);
    wt.setAttribute('y', midY - 6);
    wt.setAttribute('font-size', '12');
    wt.setAttribute('text-anchor','middle');
    wt.textContent = e.weight != null ? e.weight : '';
    g.appendChild(wt);
    edgesLayer.appendChild(g);
  }

  // render nodes
  for (const n of graph.nodes) {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform', `translate(${n.x},${n.y})`);
    g.setAttribute('data-node-id', n.id);
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('r', n.r || 18);
    circle.setAttribute('cx', 0);
    circle.setAttribute('cy', 0);
    circle.setAttribute('fill','white');
    circle.setAttribute('stroke','black');
    circle.setAttribute('stroke-width', n._strokeWidth ? n._strokeWidth : 1);
    if (n._dash) circle.setAttribute('stroke-dasharray', n._dash);
    g.appendChild(circle);
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',0);
    txt.setAttribute('y',4);
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('font-size','12');
    txt.textContent = n.label != null ? n.label : n.id;
    g.appendChild(txt);
    nodesLayer.appendChild(g);
  }

  updateSelectedUI();
}

function updateSelectedUI() {
  if (selected.type === 'node') {
    selectedIdInput.value = 'node:'+selected.id;
    const n = graph.nodes.find(x=>x.id===selected.id);
    editLabelInput.value = n ? n.label : '';
    editWeightInput.value = '';
  } else if (selected.type === 'edge') {
    selectedIdInput.value = 'edge:'+selected.id;
    const e = graph.edges.find(x=>x.id===selected.id);
    editLabelInput.value = '';
    editWeightInput.value = e ? e.weight : '';
  } else {
    selectedIdInput.value = '';
    editLabelInput.value = '';
    editWeightInput.value = '';
  }
}

// Mode controls
document.getElementById('mode_add_node').addEventListener('click', ()=>{ mode='add_node'; log('Mode: Add Node'); });
document.getElementById('mode_add_edge').addEventListener('click', ()=>{ mode='add_edge'; edgeCreateFrom=null; log('Mode: Add Edge'); });
document.getElementById('mode_move').addEventListener('click', ()=>{ mode='move'; log('Mode: Move'); });
document.getElementById('mode_select').addEventListener('click', ()=>{ mode='select'; log('Mode: Select'); });
document.getElementById('mode_delete').addEventListener('click', ()=>{ mode='delete'; log('Mode: Delete'); });

// Canvas interactions
svg.addEventListener('mousedown', function(e){
  if (e.button === 1) { // middle mouse for panning
    panLast = {x:e.clientX, y:e.clientY};
    dragType = 'pan';
    svg.style.cursor = 'move';
    e.preventDefault();
    return;
  }
  const pos = {x:e.clientX, y:e.clientY};
  const node = findNodeAt(pos);
  const edge = findEdgeAt(pos);
  if (mode === 'add_node') {
    const gpt = screenToGraph(e.clientX, e.clientY);
    pushHistory();
    const label = newNodeLabelInput.value || ('N'+nextNodeId);
    const nodeObj = { id: nextNodeId++, label: label + (label.match(/\d+$/)?'':'') , x:gpt.x, y:gpt.y, r:18 };
    graph.nodes.push(nodeObj);
    render();
    log('Added node '+nodeObj.id);
    return;
  }
  if (mode === 'add_edge') {
    if (node) {
      if (!edgeCreateFrom) {
        edgeCreateFrom = node;
        // temporary marker
        tempEdge = document.createElementNS('http://www.w3.org/2000/svg','line');
        tempEdge.setAttribute('x1', node.x);
        tempEdge.setAttribute('y1', node.y);
        tempEdge.setAttribute('x2', node.x);
        tempEdge.setAttribute('y2', node.y);
        tempEdge.setAttribute('stroke','black');
        tempEdge.setAttribute('stroke-width','1');
        tempLayer.appendChild(tempEdge);
        log('Edge creation: source node '+node.id);
      } else {
        // create edge from edgeCreateFrom to node
        pushHistory();
        const w = parseFloat(newEdgeWeightInput.value) || 0;
        const edgeObj = { id: nextEdgeId++, from: edgeCreateFrom.id, to: node.id, weight: w };
        graph.edges.push(edgeObj);
        tempLayer.removeChild(tempEdge);
        tempEdge = null;
        edgeCreateFrom = null;
        render();
        log('Added edge '+edgeObj.id+' '+edgeObj.from+' -> '+edgeObj.to);
      }
    } else {
      // clicked blank: cancel
      if (tempEdge) { tempLayer.removeChild(tempEdge); tempEdge=null; edgeCreateFrom=null; }
      log('Edge creation canceled');
    }
    return;
  }
  if (mode === 'move') {
    if (node) {
      dragNode = node;
      dragType = 'node';
      dragging = true;
      svg.style.cursor = 'grabbing';
      e.preventDefault();
    } else {
      // pan via left drag too
      panLast = {x:e.clientX, y:e.clientY};
      dragType = 'pan';
      svg.style.cursor = 'move';
    }
    return;
  }
  if (mode === 'select') {
    if (node) {
      selected = { type: 'node', id: node.id };
      updateSelectedUI();
      render();
      log('Selected node '+node.id);
    } else if (edge) {
      selected = { type: 'edge', id: edge.id };
      updateSelectedUI();
      render();
      log('Selected edge '+edge.id);
    } else {
      selected = { type:null, id:null };
      updateSelectedUI();
      render();
      log('Cleared selection');
    }
    return;
  }
  if (mode === 'delete') {
    if (node) {
      pushHistory();
      graph.nodes = graph.nodes.filter(n=>n.id!==node.id);
      graph.edges = graph.edges.filter(e=>e.from!==node.id && e.to!==node.id);
      selected = {type:null,id:null};
      render();
      log('Deleted node '+node.id);
    } else if (edge) {
      pushHistory();
      graph.edges = graph.edges.filter(e=>e.id!==edge.id);
      selected = {type:null,id:null};
      render();
      log('Deleted edge '+edge.id);
    } else {
      log('Delete clicked on blank');
    }
    return;
  }
});

svg.addEventListener('mousemove', function(e){
  if (tempEdge && edgeCreateFrom) {
    const gpt = screenToGraph(e.clientX, e.clientY);
    tempEdge.setAttribute('x2', gpt.x);
    tempEdge.setAttribute('y2', gpt.y);
  }
  if (dragType === 'pan' && panLast) {
    transform.x += e.clientX - panLast.x;
    transform.y += e.clientY - panLast.y;
    panLast = {x:e.clientX, y:e.clientY};
    render();
  }
  if (dragType === 'node' && dragNode) {
    const gpt = screenToGraph(e.clientX, e.clientY);
    dragNode.x = gpt.x;
    dragNode.y = gpt.y;
    render();
  }
});

svg.addEventListener('mouseup', function(e){
  if (dragType === 'node') {
    dragNode = null;
    dragging = false;
    dragType = null;
    svg.style.cursor = 'default';
    pushHistory();
    log('Node moved and saved');
  }
  if (dragType === 'pan') {
    panLast = null;
    dragType = null;
    svg.style.cursor = 'default';
  }
});

svg.addEventListener('dblclick', function(e){
  // edit label quickly
  const pos = {x:e.clientX, y:e.clientY};
  const node = findNodeAt(pos);
  if (node) {
    const newLabel = prompt('Edit node label', node.label);
    if (newLabel !== null) {
      pushHistory();
      node.label = newLabel;
      render();
      log('Node '+node.id+' label set to '+newLabel);
    }
  }
});

// Wheel zoom
svg.addEventListener('wheel', function(e){
  e.preventDefault();
  const speed = (e.ctrlKey ? 0.001 : 0.0025);
  const delta = -e.deltaY * speed;
  const factor = Math.exp(delta);
  const pt = screenToGraph(e.clientX, e.clientY);
  // zoom towards mouse point
  transform.x = e.clientX - (pt.x * transform.k * factor);
  transform.y = e.clientY - (pt.y * transform.k * factor);
  transform.k *= factor;
  render();
});

// Selection edits
document.getElementById('applyEdit').addEventListener('click', ()=>{
  if (!selected.type) return log('Nothing selected');
  pushHistory();
  if (selected.type === 'node') {
    const n = graph.nodes.find(x=>x.id===selected.id);
    if (n) {
      n.label = editLabelInput.value;
      render();
      log('Node '+n.id+' label updated');
    }
  } else if (selected.type === 'edge') {
    const e = graph.edges.find(x=>x.id===selected.id);
    if (e) {
      const w = parseFloat(editWeightInput.value);
      if (!isNaN(w)) e.weight = w;
      render();
      log('Edge '+e.id+' weight updated');
    }
  }
});

document.getElementById('reverseEdge').addEventListener('click', ()=>{
  if (selected.type !== 'edge') return log('Select an edge first');
  pushHistory();
  const e = graph.edges.find(x=>x.id===selected.id);
  if (e) {
    const t = e.from; e.from = e.to; e.to = t;
    render();
    log('Edge '+e.id+' reversed');
  }
});

document.getElementById('duplicateNode').addEventListener('click', ()=>{
  if (selected.type !== 'node') return log('Select a node first');
  const n = graph.nodes.find(x=>x.id===selected.id);
  if (!n) return;
  pushHistory();
  const copy = {...n, id: nextNodeId++, x: n.x+30, y: n.y+20};
  graph.nodes.push(copy);
  render();
  log('Duplicated node '+n.id+' to '+copy.id);
});

// Graph operations
document.getElementById('clearGraph').addEventListener('click', ()=>{
  pushHistory();
  graph = {nodes:[], edges:[]};
  selected = {type:null,id:null};
  render();
  log('Cleared graph');
});

document.getElementById('sampleGraph').addEventListener('click', ()=>{
  pushHistory();
  graph = {
    nodes: [
      {id:1,label:'A',x:80,y:60,r:18},
      {id:2,label:'B',x:220,y:40,r:18},
      {id:3,label:'C',x:220,y:140,r:18},
      {id:4,label:'D',x:360,y:100,r:18},
      {id:5,label:'E',x:120,y:200,r:18}
    ],
    edges: [
      {id:1,from:1,to:2,weight:2},
      {id:2,from:2,to:3,weight:1},
      {id:3,from:1,to:3,weight:4},
      {id:4,from:3,to:4,weight:3},
      {id:5,from:5,to:3,weight:1},
      {id:6,from:4,to:2,weight:2}
    ]
  };
  refreshNextIds();
  render();
  log('Loaded sample graph');

// Algorithms: produce steps arrays and step through
function resetAlgState() {
  algSteps = [];
  algIndex = -1;
  algPlaying = false;
  if (algPlayTimer) { clearInterval(algPlayTimer); algPlayTimer=null; }
  // clear visual statuses
  graph.nodes.forEach(n=>{ delete n._strokeWidth; delete n._dash; delete n._meta; });
  graph.edges.forEach(e=>{ delete e._strokeWidth; delete e._dash; delete e._meta; });

}

  if (algo === 'bfs') runBFS(startId, targetId);
  else if (algo === 'dfs') runDFS(startId, targetId);
  else if (algo === 'dijkstra') runDijkstra(startId, targetId);
  else if (algo === 'topo') runTopo();
  else if (algo === 'tarjan') runTarjan();
  else log('Unknown algorithm');

function algStep(direction) {
  if (algSteps.length === 0) { log('No algorithm running'); return; }
  if (direction > 0) {
    const count = Math.max(1, parseInt(document.getElementById('autoStepCount').value)||1);
    for (let i=0;i<count;i++){
      if (algIndex < algSteps.length-1) algIndex++;
    }
  } else {
    algIndex = Math.max(-1, algIndex-1);
  }
  if (algIndex === -1) {
    // reset visuals
    graph.nodes.forEach(n=>{ delete n._strokeWidth; delete n._dash; delete n._meta; });
    graph.edges.forEach(e=>{ delete e._strokeWidth; delete e._dash; delete e._meta; });
    render();
    log('Algorithm reset to start');
    return;
  }
  const step = algSteps[algIndex];
  // apply statuses
  graph.nodes.forEach(n=>{ delete n._strokeWidth; delete n._dash; delete n._meta; });
  graph.edges.forEach(e=>{ delete e._strokeWidth; delete e._dash; delete e._meta; });
  if (step.nodesState) {
    for (const [id,st] of Object.entries(step.nodesState)) {
      const n = graph.nodes.find(x=>x.id==id);
      if (!n) continue;
      if (st === 'current') n._strokeWidth = 5;
      else if (st === 'visited') n._strokeWidth = 3;
      else if (st === 'inqueue') { n._dash = '4 2'; n._strokeWidth = 2; }
      else if (st.startsWith('comp')) n._strokeWidth = 2;
      else if (st === 'finished') n._strokeWidth = 2;
    }
  }
  if (step.edgesState) {
    for (const [id,st] of Object.entries(step.edgesState)) {
      const e = graph.edges.find(x=>x.id==id);
      if (!e) continue;
      if (st === 'traversed') { e._strokeWidth = 3; e._dash='4 2'; }
      else if (st === 'relaxed') e._strokeWidth = 4;
    }
  }
  render();
  log('Step '+(algIndex+1)+'/'+algSteps.length+': '+(step.desc||''));
}

// Algorithm implementations that produce step records
function runBFS(startId, targetId) {
  if (!startId) return log('Provide start node id for BFS');
  const nodesMap = new Map(graph.nodes.map(n=>[n.id, n]));
  if (!nodesMap.has(startId)) return log('Start node not found');
  const q = [];
  const visited = new Set();
  const parent = new Map();
  q.push(startId);
  visited.add(startId);
  algSteps.push({desc:'Enqueue start '+startId, nodesState: {[startId]:'inqueue'} });
  while (q.length) {
    const u = q.shift();
    algSteps.push({desc:'Dequeue '+u, nodesState: {[u]:'current'} , edgesState:{}});
    if (u === targetId) { algSteps.push({desc:'Found target '+targetId}); break; }
    for (const e of graph.edges.filter(ed=>ed.from===u)) {
      const v = e.to;
      if (!visited.has(v)) {
        visited.add(v);
        parent.set(v,u);
        q.push(v);
        const nodesState = {}; nodesState[v] = 'inqueue'; nodesState[u] = 'visited';
        const edgesState = {}; edgesState[e.id] = 'traversed';
        algSteps.push({desc:'Discover '+v+' via edge '+e.id, nodesState, edgesState});
      } else {
        const edgesState={}; edgesState[e.id]='traversed';
        algSteps.push({desc:'Already visited '+v+' via edge '+e.id, edgesState});
      }
    }
    algSteps.push({desc:'Finished exploring '+u, nodesState: {[u]:'finished'}});
  }
  log('BFS produced '+algSteps.length+' steps');
  algIndex = -1;
  algStep(1);
}

function runDFS(startId, targetId) {
  if (!startId) return log('Provide start node id for DFS');
  const nodesMap = new Map(graph.nodes.map(n=>[n.id, n]));
  if (!nodesMap.has(startId)) return log('Start node not found');
  const visited = new Set();
  const parent = new Map();
  function dfs(u) {
    visited.add(u);
    algSteps.push({desc:'Visit '+u, nodesState: {[u]:'current'}});
    if (u === targetId) { algSteps.push({desc:'Found target '+u}); return true; }
    for (const e of graph.edges.filter(ed=>ed.from===u)) {
      const v = e.to;
      algSteps.push({desc:'Explore edge '+e.id+' to '+v, edgesState: {[e.id]:'traversed'}});
      if (!visited.has(v)) {
        parent.set(v,u);
        if (dfs(v)) return true;
      } else {
        algSteps.push({desc:'Already visited '+v});
      }
    }
    algSteps.push({desc:'Finish '+u, nodesState: {[u]:'finished'}});
    return false;
  }
  dfs(startId);
  log('DFS produced '+algSteps.length+' steps');
  algIndex = -1;
  algStep(1);
}

function runDijkstra(startId, targetId) {
  if (!startId) return log('Provide start node id for Dijkstra');
  const nodes = graph.nodes.map(n=>n.id);
  const dist = {}; const prev = {};
  nodes.forEach(id=>dist[id]=Infinity); dist[startId]=0;
  const Q = new Set(nodes);
  algSteps.push({desc:'Initialize distances', nodesState: Object.fromEntries(nodes.map(id=>[id, 'unvisited']))});
  while (Q.size) {
    let u = null; let best = Infinity;
    for (const id of Q) if (dist[id] < best) { best = dist[id]; u = id; }
    if (u===null) break;
    Q.delete(u);
    algSteps.push({desc:'Extract min '+u+' dist='+dist[u], nodesState: {[u]:'current'}});
    if (u === targetId) { algSteps.push({desc:'Reached target '+u}); break; }
    for (const e of graph.edges.filter(ed=>ed.from===u)) {
      const v = e.to;
      const w = isFinite(e.weight)?e.weight:1;
      const alt = dist[u] + w;
      const edgesState = {}; edgesState[e.id] = 'relaxed';
      if (alt < dist[v]) {
        dist[v] = alt; prev[v]=u;
        algSteps.push({desc:'Relax edge '+e.id+' improve '+v+' to '+alt, nodesState: {[v]:'inqueue'}, edgesState});
      } else {
        algSteps.push({desc:'Consider edge '+e.id+' no improvement', edgesState});
      }
    }
    algSteps.push({desc:'Mark finished '+u, nodesState: {[u]:'finished'}});
  }
  // Final state: annotate distances
  const finalNodes = {};
  for (const id of nodes) finalNodes[id] = (dist[id]===Infinity)?'unreachable':'finished';
  algSteps.push({desc:'Dijkstra complete. Distances: '+JSON.stringify(dist), nodesState: finalNodes});
  log('Dijkstra produced '+algSteps.length+' steps');
  algIndex = -1;
  algStep(1);
}

function runTopo() {
  const res = kahnSortWithSteps(graph);
  if (!res) {
    algSteps.push({desc:'Graph has cycle; topological order impossible'});
    log('Topological sort failed due to cycle');
  } else {
    for (const s of res.steps) algSteps.push(s);
    algSteps.push({desc:'Topological order: '+res.order.join(',')});
    log('Topological sort produced '+algSteps.length+' steps');
  }
  algIndex = -1;
  algStep(1);
}

function runTarjan() {
  // Tarjan algorithm with steps
  const index = {}, low = {}, onstack = {};
  const st = [];
  let idx = 0;
  const nodes = graph.nodes.map(n=>n.id);
  function dfs(v) {
    index[v]=low[v]=++idx;
    st.push(v); onstack[v]=true;
    algSteps.push({desc:'Push '+v+' index='+index[v], nodesState:{[v]:'current'}});
    for (const e of graph.edges.filter(ed=>ed.from===v)) {
      const w = e.to;
      if (!index[w]) {
        dfs(w);
        low[v] = Math.min(low[v], low[w]);
      } else if (onstack[w]) {
        low[v] = Math.min(low[v], index[w]);
      }
    }
    if (low[v] === index[v]) {
      const comp = [];
      let w;
      do {
        w = st.pop(); onstack[w]=false; comp.push(w);
      } while (w !== v);
      algSteps.push({desc:'Found SCC: '+comp.join(','), nodesState: Object.fromEntries(comp.map(id=>[id, 'comp'+idx]))});
    }
  }
  for (const v of nodes) if (!index[v]) dfs(v);
  algSteps.push({desc:'Tarjan complete'});
  log('Tarjan produced '+algSteps.length+' steps');
  algIndex = -1;
  algStep(1);
}

// Helper: Kahn's algorithm producing steps
function kahnSortWithSteps(g) {
  const indeg = {}; g.nodes.forEach(n=>indeg[n.id]=0);
  g.edges.forEach(e=> indeg[e.to] = (indeg[e.to]||0) + 1);
  const S = [];
  for (const id in indeg) if (indeg[id]===0) S.push(parseInt(id));
  const order = [];
  const steps = [];
  steps.push({desc:'Initial zero indegree nodes: '+S.join(',') , nodesState: Object.fromEntries(Object.keys(indeg).map(id=>[id,'unvisited']))});
  while (S.length) {
    const n = S.shift();
    order.push(n);
    steps.push({desc:'Remove node '+n, nodesState: {[n]:'current'}});
    for (const e of g.edges.filter(ed=>ed.from===n)) {
      indeg[e.to]--;
      steps.push({desc:'Decrease indegree of '+e.to+' via edge '+e.id, edgesState: {[e.id]:'traversed'}});
      if (indeg[e.to] === 0) { S.push(e.to); steps.push({desc:'Node '+e.to+' now zero indegree', nodesState: {[e.to]:'inqueue'}}); }
    }
    steps.push({desc:'Append '+n+' to order'});
  }
  if (order.length !== g.nodes.length) return null;
  return {order, steps};
}

function kahnSort(g) {
  const indeg = {}; g.nodes.forEach(n=>indeg[n.id]=0);
  g.edges.forEach(e=> indeg[e.to] = (indeg[e.to]||0) + 1);
  const S = [];
  for (const id in indeg) if (indeg[id]===0) S.push(parseInt(id));
  const order = [];
  while (S.length) {
    const n = S.shift();
    order.push(n);
    for (const e of g.edges.filter(ed=>ed.from===n)) {
      indeg[e.to]--;
      if (indeg[e.to] === 0) S.push(e.to);
    }
  }
  if (order.length !== g.nodes.length) return null;
  return order;
}

// Dijkstra helper for path retrieval
function dijkstraPath(g, startId, targetId) {
  const nodes = g.nodes.map(n=>n.id);
  const dist = {}; const prev = {};
  nodes.forEach(id=>dist[id]=Infinity); dist[startId]=0;
  const Q = new Set(nodes);
  while (Q.size) {
    let u = null; let best = Infinity;
    for (const id of Q) if (dist[id]<best) { best = dist[id]; u = id; }
    if (u===null || dist[u]===Infinity) break;
    Q.delete(u);
    if (u===targetId) break;
    for (const e of g.edges.filter(ed=>ed.from===u)) {
      const v = e.to, w = isFinite(e.weight)?e.weight:1;
      const alt = dist[u] + w;
      if (alt < dist[v]) { dist[v] = alt; prev[v]= {node:u, edge:e.id}; }
    }
  }
  if (!prev[targetId] && startId !== targetId) return {found:false};
  const pathNodes = [];
  const pathEdges = [];
  let cur = targetId;
  while (cur !== undefined) {
    pathNodes.unshift(cur);
    const p = prev[cur];
    if (!p) break;
    pathEdges.unshift(p.edge);
    cur = p.node;
  }
  return {found:true, pathNodes, pathEdges, cost: dist[targetId]};
}

// Simple force layout (very basic)
function simpleForceLayout(g, iterations, onTick) {
  const nodes = g.nodes;
  const edges = g.edges;
  const area = 1000;
  const k = Math.sqrt(area / Math.max(1,nodes.length));
  for (let it=0; it<iterations; it++){
    const disp = nodes.map(()=>({x:0,y:0}));
    // repulsion
    for (let i=0;i<nodes.length;i++){
      for (let j=i+1;j<nodes.length;j++){
        const dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y;
        let d = Math.hypot(dx,dy) || 0.01;
        const force = (k*k)/d;
        const fx = force * (dx/d), fy = force * (dy/d);
        disp[i].x -= fx; disp[i].y -= fy;
        disp[j].x += fx; disp[j].y += fy;
      }
    }
    // attraction (edges)
    for (const e of edges){
      const u = nodes.find(n=>n.id===e.from);
      const v = nodes.find(n=>n.id===e.to);
      if (!u||!v) continue;
      const dx = v.x - u.x, dy = v.y - u.y;
      let d = Math.hypot(dx,dy) || 0.01;
      const force = (d*d)/k;
      const fx = (dx/d) * force, fy = (dy/d)*force;
      const ui = nodes.indexOf(u), vi = nodes.indexOf(v);
      disp[ui].x += fx; disp[ui].y += fy;
      disp[vi].x -= fx; disp[vi].y -= fy;
    }
    // apply
    for (let i=0;i<nodes.length;i++){
      nodes[i].x += Math.max(-5, Math.min(5, disp[i].x));
      nodes[i].y += Math.max(-5, Math.min(5, disp[i].y));
    }
    if (it % 20 === 0) onTick(it);
  }
}
