<!DOCTYPE html>
<html>
<head>
    <title>Dijkstra's Algorithm Interactive Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #graph-container { margin: 20px 0; }
        #graph { border: 1px solid #000; }
        .control-group { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        button, input, select { margin: 5px; }
        table { border-collapse: collapse; margin: 10px 0; }
        th, td { border: 1px solid #000; padding: 5px; text-align: center; }
        .node { cursor: pointer; }
        .edge { stroke: #000; }
        .visited { stroke: #000; stroke-width: 3px; }
        .path { stroke: #000; stroke-width: 4px; }
        .distance { font-size: 10px; }
    </style>
</head>
<body>
    <h1>Dijkstra's Algorithm Interactive Demo</h1>
    
    <div class="control-group">
        <h2>Graph Construction</h2>
        <div>
            <button id="add-node">Add Node</button>
            <button id="add-edge">Add Edge (select two nodes)</button>
            <button id="clear-graph">Clear Graph</button>
            <button id="random-graph">Generate Random Graph</button>
        </div>
        <div>
            <label>Edge Weight: <input type="number" id="edge-weight" min="1" value="1"></label>
            <label>Random Nodes: <input type="number" id="random-nodes" min="2" max="15" value="5"></label>
            <label>Random Edges: <input type="number" id="random-edges" min="1" max="50" value="8"></label>
        </div>
    </div>
    
    <div class="control-group">
        <h2>Algorithm Controls</h2>
        <div>
            <label>Start Node: <select id="start-node"></select></label>
            <label>Target Node: <select id="target-node"></select></label>
            <button id="run-algorithm">Run Dijkstra's</button>
            <button id="step-algorithm">Step Through</button>
            <button id="reset-algorithm">Reset Visualization</button>
        </div>
        <div>
            <label>Animation Speed: <input type="range" id="speed" min="100" max="2000" value="500"></label>
        </div>
    </div>
    
    <div id="graph-container">
        <svg id="graph" width="600" height="400"></svg>
    </div>
    
    <div class="control-group">
        <h2>Algorithm State</h2>
        <div id="algorithm-state">Ready to begin</div>
        <div id="current-step"></div>
    </div>
    
    <div class="control-group">
        <h2>Distance Table</h2>
        <table id="distance-table">
            <thead>
                <tr>
                    <th>Node</th>
                    <th>Distance</th>
                    <th>Previous</th>
                    <th>Visited</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    
    <div class="control-group">
        <h2>Path Information</h2>
        <div id="path-result"></div>
        <div id="distance-result"></div>
    </div>
    
    <div class="control-group">
        <h2>Graph Information</h2>
        <div id="node-count">Nodes: 0</div>
        <div id="edge-count">Edges: 0</div>
        <div id="adjacency-list"></div>
    </div>

    <script>
        // Graph data structure
        const graph = {
            nodes: [],
            edges: [],
            adjacencyList: {},
            nextNodeId: 0,
            
            addNode: function(x, y) {
                const node = { id: this.nextNodeId++, x, y };
                this.nodes.push(node);
                this.adjacencyList[node.id] = [];
                this.updateUI();
                return node;
            },
            
            addEdge: function(source, target, weight) {
                const edge = { source, target, weight };
                this.edges.push(edge);
                this.adjacencyList[source].push({ node: target, weight });
                this.adjacencyList[target].push({ node: source, weight });
                this.updateUI();
                return edge;
            },
            
            clear: function() {
                this.nodes = [];
                this.edges = [];
                this.adjacencyList = {};
                this.nextNodeId = 0;
                this.updateUI();
            },
            
            generateRandom: function(nodeCount, edgeCount) {
                this.clear();
                
                // Add nodes
                for (let i = 0; i < nodeCount; i++) {
                    const x = 50 + Math.random() * 500;
                    const y = 50 + Math.random() * 300;
                    this.addNode(x, y);
                }
                
                // Add edges
                for (let i = 0; i < edgeCount; i++) {
                    const source = Math.floor(Math.random() * nodeCount);
                    let target = Math.floor(Math.random() * nodeCount);
                    while (target === source) {
                        target = Math.floor(Math.random() * nodeCount);
                    }
                    
                    // Check if edge already exists
                    const exists = this.edges.some(e => 
                        (e.source === source && e.target === target) || 
                        (e.source === target && e.target === source)
                    );
                    
                    if (!exists) {
                        const weight = 1 + Math.floor(Math.random() * 10);
                        this.addEdge(source, target, weight);
                    }
                }
            },
            
            updateUI: function() {
                // Update node and edge counts
                document.getElementById('node-count').textContent = `Nodes: ${this.nodes.length}`;
                document.getElementById('edge-count').textContent = `Edges: ${this.edges.length}`;
                
                // Update node dropdowns
                const startNodeSelect = document.getElementById('start-node');
                const targetNodeSelect = document.getElementById('target-node');
                
                startNodeSelect.innerHTML = '';
                targetNodeSelect.innerHTML = '';
                
                this.nodes.forEach(node => {
                    const option = document.createElement('option');
                    option.value = node.id;
                    option.textContent = `Node ${node.id}`;
                    startNodeSelect.appendChild(option.cloneNode(true));
                    targetNodeSelect.appendChild(option);
                });
                
                // Update adjacency list display
                const adjListDiv = document.getElementById('adjacency-list');
                adjListDiv.innerHTML = '<strong>Adjacency List:</strong><br>';
                
                for (const nodeId in this.adjacencyList) {
                    adjListDiv.innerHTML += `Node ${nodeId}: `;
                    this.adjacencyList[nodeId].forEach(neighbor => {
                        adjListDiv.innerHTML += `→ ${neighbor.node} (${neighbor.weight}) `;
                    });
                    adjListDiv.innerHTML += '<br>';
                }
                
                // Redraw graph
                this.drawGraph();
            },
            
            drawGraph: function() {
                const svg = document.getElementById('graph');
                svg.innerHTML = '';
                
                // Draw edges
                this.edges.forEach(edge => {
                    const sourceNode = this.nodes.find(n => n.id === edge.source);
                    const targetNode = this.nodes.find(n => n.id === edge.target);
                    
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', sourceNode.x);
                    line.setAttribute('y1', sourceNode.y);
                    line.setAttribute('x2', targetNode.x);
                    line.setAttribute('y2', targetNode.y);
                    line.setAttribute('class', 'edge');
                    line.setAttribute('data-source', edge.source);
                    line.setAttribute('data-target', edge.target);
                    svg.appendChild(line);
                    
                    // Add weight label
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    const midX = (sourceNode.x + targetNode.x) / 2;
                    const midY = (sourceNode.y + targetNode.y) / 2;
                    text.setAttribute('x', midX);
                    text.setAttribute('y', midY);
                    text.setAttribute('class', 'distance');
                    text.textContent = edge.weight;
                    svg.appendChild(text);
                });
                
                // Draw nodes
                this.nodes.forEach(node => {
                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', node.x);
                    circle.setAttribute('cy', node.y);
                    circle.setAttribute('r', 15);
                    circle.setAttribute('class', 'node');
                    circle.setAttribute('data-id', node.id);
                    svg.appendChild(circle);
                    
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    text.setAttribute('x', node.x);
                    text.setAttribute('y', node.y + 5);
                    text.setAttribute('text-anchor', 'middle');
                    text.textContent = node.id;
                    svg.appendChild(text);
                });
            }
        };
        
        // Dijkstra's algorithm implementation
        const dijkstra = {
            running: false,
            stepInterval: null,
            visitedEdges: [],
            pathEdges: [],
            currentStep: 0,
            distances: {},
            previous: {},
            unvisited: new Set(),
            
            initialize: function(startNode) {
                this.distances = {};
                this.previous = {};
                this.visited = new Set();
                this.visitedEdges = [];
                this.pathEdges = [];
                this.currentStep = 0;
                
                graph.nodes.forEach(node => {
                    this.distances[node.id] = Infinity;
                    this.previous[node.id] = null;
                    this.unvisited.add(node.id);
                });
                
                this.distances[startNode] = 0;
                this.updateDistanceTable();
            },
            
            run: function(startNode, targetNode, stepByStep = false) {
                if (this.running) return;
                this.running = true;
                
                this.initialize(startNode);
                document.getElementById('algorithm-state').textContent = 'Running Dijkstra\'s algorithm...';
                
                if (stepByStep) {
                    document.getElementById('step-algorithm').disabled = false;
                    document.getElementById('current-step').textContent = 'Step 0: Initialized distances';
                } else {
                    const speed = parseInt(document.getElementById('speed').value);
                    this.stepInterval = setInterval(() => {
                        if (!this.step(startNode, targetNode)) {
                            clearInterval(this.stepInterval);
                            this.running = false;
                        }
                    }, speed);
                }
            },
            
            step: function(startNode, targetNode) {
                if (this.unvisited.size === 0) {
                    this.reconstructPath(targetNode);
                    document.getElementById('algorithm-state').textContent = 'Algorithm completed';
                    return false;
                }
                
                // Get node with smallest distance
                let currentNode = null;
                let smallestDistance = Infinity;
                
                this.unvisited.forEach(nodeId => {
                    if (this.distances[nodeId] < smallestDistance) {
                        smallestDistance = this.distances[nodeId];
                        currentNode = nodeId;
                    }
                });
                
                if (currentNode === null || this.distances[currentNode] === Infinity) {
                    document.getElementById('algorithm-state').textContent = 'No path exists to some nodes';
                    return false;
                }
                
                // Mark as visited
                this.unvisited.delete(currentNode);
                this.currentStep++;
                
                // Update UI
                const stepText = `Step ${this.currentStep}: Visiting node ${currentNode} (distance: ${this.distances[currentNode]})`;
                document.getElementById('current-step').textContent = stepText;
                
                // Check neighbors
                graph.adjacencyList[currentNode].forEach(neighbor => {
                    if (this.unvisited.has(neighbor.node)) {
                        const distance = this.distances[currentNode] + neighbor.weight;
                        
                        if (distance < this.distances[neighbor.node]) {
                            this.distances[neighbor.node] = distance;
                            this.previous[neighbor.node] = currentNode;
                            
                            // Mark edge as visited
                            const edge = graph.edges.find(e => 
                                (e.source === currentNode && e.target === neighbor.node) || 
                                (e.source === neighbor.node && e.target === currentNode)
                            );
                            
                            if (edge && !this.visitedEdges.includes(edge)) {
                                this.visitedEdges.push(edge);
                            }
                        }
                    }
                });
                
                this.updateDistanceTable();
                this.highlightVisitedEdges();
                
                return true;
            },
            
            reconstructPath: function(targetNode) {
                const path = [];
                let currentNode = targetNode;
                
                while (currentNode !== null && this.previous[currentNode] !== null) {
                    path.unshift(currentNode);
                    const prevNode = this.previous[currentNode];
                    
                    // Find the edge between current and previous node
                    const edge = graph.edges.find(e => 
                        (e.source === prevNode && e.target === currentNode) || 
                        (e.source === currentNode && e.target === prevNode)
                    );
                    
                    if (edge) {
                        this.pathEdges.push(edge);
                    }
                    
                    currentNode = prevNode;
                }
                
                if (currentNode !== null) {
                    path.unshift(currentNode);
                }
                
                // Update UI with path information
                if (this.distances[targetNode] !== Infinity) {
                    document.getElementById('path-result').textContent = `Path: ${path.join(' → ')}`;
                    document.getElementById('distance-result').textContent = `Total distance: ${this.distances[targetNode]}`;
                } else {
                    document.getElementById('path-result').textContent = 'No path exists to target node';
                    document.getElementById('distance-result').textContent = '';
                }
                
                this.highlightPathEdges();
            },
            
            updateDistanceTable: function() {
                const tableBody = document.querySelector('#distance-table tbody');
                tableBody.innerHTML = '';
                
                graph.nodes.forEach(node => {
                    const row = document.createElement('tr');
                    
                    const nodeCell = document.createElement('td');
                    nodeCell.textContent = node.id;
                    row.appendChild(nodeCell);
                    
                    const distanceCell = document.createElement('td');
                    distanceCell.textContent = this.distances[node.id] === Infinity ? '∞' : this.distances[node.id];
                    row.appendChild(distanceCell);
                    
                    const previousCell = document.createElement('td');
                    previousCell.textContent = this.previous[node.id] === null ? 'None' : this.previous[node.id];
                    row.appendChild(previousCell);
                    
                    const visitedCell = document.createElement('td');
                    visitedCell.textContent = this.unvisited.has(node.id) ? 'No' : 'Yes';
                    row.appendChild(visitedCell);
                    
                    tableBody.appendChild(row);
                });
            },
            
            highlightVisitedEdges: function() {
                // Reset all edges to default
                document.querySelectorAll('.edge').forEach(edge => {
                    edge.classList.remove('visited');
                });
                
                // Highlight visited edges
                this.visitedEdges.forEach(edge => {
                    const edgeElement = document.querySelector(`.edge[data-source="${edge.source}"][data-target="${edge.target}"]`) || 
                                       document.querySelector(`.edge[data-source="${edge.source}"][data-target="${edge.target}"]`);
                    if (edgeElement) {
                        edgeElement.classList.add('visited');
                    }
                });
            },
            
            highlightPathEdges: function() {
                // Highlight path edges
                this.pathEdges.forEach(edge => {
                    const edgeElement = document.querySelector(`.edge[data-source="${edge.source}"][data-target="${edge.target}"]`) || 
                                       document.querySelector(`.edge[data-source="${edge.source}"][data-target="${edge.target}"]`);
                    if (edgeElement) {
                        edgeElement.classList.add('path');
                    }
                });
            },
            
            reset: function() {
                clearInterval(this.stepInterval);
                this.running = false;
                
                document.getElementById('algorithm-state').textContent = 'Ready to begin';
                document.getElementById('current-step').textContent = '';
                document.getElementById('path-result').textContent = '';
                document.getElementById('distance-result').textContent = '';
                document.getElementById('step-algorithm').disabled = false;
                
                // Reset edge highlighting
                document.querySelectorAll('.edge').forEach(edge => {
                    edge.classList.remove('visited', 'path');
                });
                
                // Clear distance table
                const tableBody = document.querySelector('#distance-table tbody');
                tableBody.innerHTML = '';
            }
        };
        
        // UI event handlers
        document.addEventListener('DOMContentLoaded', function() {
            // Graph construction
            document.getElementById('add-node').addEventListener('click', function() {
                const svg = document.getElementById('graph');
                const rect = svg.getBoundingClientRect();
                const x = Math.random() * (rect.width - 30) + 15;
                const y = Math.random() * (rect.height - 30) + 15;
                graph.addNode(x, y);
            });
            
            let edgeStartNode = null;
            document.getElementById('add-edge').addEventListener('click', function() {
                if (edgeStartNode === null) {
                    edgeStartNode = 'selecting';
                    this.textContent = 'Select first node';
                } else if (edgeStartNode === 'selecting') {
                    this.textContent = 'Add Edge (select two nodes)';
                    edgeStartNode = null;
                }
            });
            
            document.getElementById('graph').addEventListener('click', function(e) {
                if (edgeStartNode === 'selecting') {
                    const circle = e.target.closest('.node');
                    if (circle) {
                        const nodeId = parseInt(circle.getAttribute('data-id'));
                        edgeStartNode = nodeId;
                        document.getElementById('add-edge').textContent = 'Select second node';
                    }
                } else if (typeof edgeStartNode === 'number') {
                    const circle = e.target.closest('.node');
                    if (circle) {
                        const nodeId = parseInt(circle.getAttribute('data-id'));
                        if (nodeId !== edgeStartNode) {
                            const weight = parseInt(document.getElementById('edge-weight').value) || 1;
                            graph.addEdge(edgeStartNode, nodeId, weight);
                        }
                        edgeStartNode = null;
                        document.getElementById('add-edge').textContent = 'Add Edge (select two nodes)';
                    }
                }
            });
            
            document.getElementById('clear-graph').addEventListener('click', function() {
                graph.clear();
                dijkstra.reset();
            });
            
            document.getElementById('random-graph').addEventListener('click', function() {
                const nodeCount = parseInt(document.getElementById('random-nodes').value) || 5;
                const edgeCount = parseInt(document.getElementById('random-edges').value) || 8;
                graph.generateRandom(nodeCount, edgeCount);
                dijkstra.reset();
            });
            
            // Algorithm controls
            document.getElementById('run-algorithm').addEventListener('click', function() {
                const startNode = parseInt(document.getElementById('start-node').value);
                const targetNode = parseInt(document.getElementById('target-node').value);
                
                if (isNaN(startNode) || isNaN(targetNode)) {
                    alert('Please select both start and target nodes');
                    return;
                }
                
                dijkstra.run(startNode, targetNode);
            });
            
            document.getElementById('step-algorithm').addEventListener('click', function() {
                const startNode = parseInt(document.getElementById('start-node').value);
                const targetNode = parseInt(document.getElementById('target-node').value);
                
                if (isNaN(startNode) || isNaN(targetNode)) {
                    alert('Please select both start and target nodes');
                    return;
                }
                
                if (!dijkstra.running) {
                    dijkstra.run(startNode, targetNode, true);
                } else {
                    if (!dijkstra.step(startNode, targetNode)) {
                        this.disabled = true;
                    }
                }
            });
            
            document.getElementById('reset-algorithm').addEventListener('click', function() {
                dijkstra.reset();
            });
            
            // Initialize with a simple graph
            graph.addNode(100, 100);
            graph.addNode(200, 200);
            graph.addNode(300, 100);
            graph.addNode(400, 200);
            graph.addEdge(0, 1, 4);
            graph.addEdge(1, 2, 3);
            graph.addEdge(2, 3, 5);
            graph.addEdge(0, 2, 1);
        });
    </script>
</body>
</html>
