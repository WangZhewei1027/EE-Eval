<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        .hash-table {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .hash-table-header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        .hash-table-cell {
            padding: 10px;
            border-bottom: 1px solid #ccc;
            cursor: pointer;
        }

        .hash-table-cell:hover {
            background-color: #f0f0f0;
        }

        .hash-table-footer {
            background-color: #333;
            color: #fff;
            padding: 10px;
            border-top: 1px solid #ccc;
        }

        .hash-table-footer button {
            background-color: #333;
            color: #fff;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .hash-table-footer button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <div class="hash-table">
        <div class="hash-table-header">Hash Table</div>
        <div class="hash-table-cell">Cell 1</div>
        <div class="hash-table-cell">Cell 2</div>
        <div class="hash-table-cell">Cell 3</div>
        <div class="hash-table-cell">Cell 4</div>
        <div class="hash-table-cell">Cell 5</div>
        <div class="hash-table-cell">Cell 6</div>
        <div class="hash-table-cell">Cell 7</div>
        <div class="hash-table-cell">Cell 8</div>
        <div class="hash-table-cell">Cell 9</div>
        <div class="hash-table-cell">Cell 10</div>
    </div>

    <script>
        const hashTable = document.querySelector('.hash-table');

        const cell1 = document.querySelector('.hash-table-cell:first-child');
        const cell2 = document.querySelector('.hash-table-cell:second-child');
        const cell3 = document.querySelector('.hash-table-cell:third-child');
        const cell4 = document.querySelector('.hash-table-cell:fourth-child');
        const cell5 = document.querySelector('.hash-table-cell:fifth-child');
        const cell6 = document.querySelector('.hash-table-cell:sixth-child');
        const cell7 = document.querySelector('.hash-table-cell:seventh-child');
        const cell8 = document.querySelector('.hash-table-cell:eighth-child');
        const cell9 = document.querySelector('.hash-table-cell:ninth-child');
        const cell10 = document.querySelector('.hash-table-cell:tenth-child');

        cell1.addEventListener('click', () => {
            console.log('Cell 1 clicked!');
        });

        cell2.addEventListener('click', () => {
            console.log('Cell 2 clicked!');
        });

        cell3.addEventListener('click', () => {
            console.log('Cell 3 clicked!');
        });

        cell4.addEventListener('click', () => {
            console.log('Cell 4 clicked!');
        });

        cell5.addEventListener('click', () => {
            console.log('Cell 5 clicked!');
        });

        cell6.addEventListener('click', () => {
            console.log('Cell 6 clicked!');
        });

        cell7.addEventListener('click', () => {
            console.log('Cell 7 clicked!');
        });

        cell8.addEventListener('click', () => {
            console.log('Cell 8 clicked!');
        });

        cell9.addEventListener('click', () => {
            console.log('Cell 9 clicked!');
        });

        cell10.addEventListener('click', () => {
            console.log('Cell 10 clicked!');
        });
    </script>
</body>
</html>
