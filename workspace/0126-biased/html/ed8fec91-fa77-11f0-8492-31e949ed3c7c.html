<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Syntax Tree Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #52aaff, #6a82fb);
            color: #fff;
            overflow: hidden;
        }
        h1 {
            text-align: center;
            margin: 20px 0;
            font-size: 48px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6);
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }
        .tree {
            position: relative;
            width: 300px;
        }
        .node {
            background-color: #4a90e2;
            border-radius: 8px;
            text-align: center;
            padding: 20px;
            margin: 20px 0;
            transition: transform 0.3s ease;
        }
        .node:hover {
            transform: scale(1.05);
        }
        .node::before {
            content: '';
            display: block;
            width: 2px;
            height: 20px;
            background-color: #fff;
            position: absolute;
            left: 50%;
            top: -20px;
            transform: translateX(-50%);
        }
        .node:first-child::before {
            display: none;
        }
        .button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #fff;
            color: #4a90e2;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s ease, transform 0.3s ease;
        }
        .button:hover {
            background-color: #e6e6e6;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <h1>Abstract Syntax Tree</h1>
    <div class="container">
        <div class="tree">
            <div class="node">Program
                <div class="node">Function Declaration
                    <div class="node">Parameters
                        <div class="node">x</div>
                        <div class="node">y</div>
                    </div>
                    <div class="node">Body
                        <div class="node">Return Statement
                            <div class="node">Addition
                                <div class="node">x</div>
                                <div class="node">y</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <button class="button" onclick="alert('Visualization Loaded!')">Show Visualization</button>

    <script>
        // Placeholder for future animations or functionality
    </script>
</body>
</html>
