<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backtracking Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h2>Backtracking Demo</h2>
    <p>Use the controls to explore backtracking solutions for generating combinations of numbers.</p>

    <label for="target">Target Sum:</label>
    <input type="number" id="target" value="5" min="1" />
    <button onclick="startBacktracking()">Start Backtracking</button>
    <br><br>

    <p>Current Path: <span id="currentPath"></span></p>
    <p>All Results: <span id="results"></span></p>
    <p>Status: <span id="status"></span></p>
    <br>

    <h3>Controls</h3>
    <button onclick="backtrack()">Backtrack</button>
    <button onclick="reset()">Reset</button>
    <button onclick="next()">Next Step</button>
    <button onclick="previous()">Previous Step</button>
    
    <script>
        let targetSum = 0;
        let currentPath = [];
        let results = [];
        let explorationHistory = [];
        let currentStep = -1;

        function startBacktracking() {
            targetSum = Number(document.getElementById("target").value);
            currentPath = [];
            results = [];
            explorationHistory = [];
            currentStep = -1;
            document.getElementById("status").innerText = "Exploring...";
            backtrack(0);
            updateDisplay();
        }

        function backtrack(start) {
            if (calculateSum(currentPath) === targetSum) {
                results.push([...currentPath]);
            }

            for (let i = start; i <= targetSum; i++) {
                currentPath.push(i);
                explorationHistory.push([...currentPath]); // Store exploration history
                backtrack(i); // Explore with the next number
                currentPath.pop(); // Backtrack
            }
            if (currentStep < explorationHistory.length - 1) {
                currentStep++;
            }
        }

        function calculateSum(arr) {
            return arr.reduce((a, b) => a + b, 0);
        }

        function updateDisplay() {
            document.getElementById("currentPath").innerText = currentStep >= 0 ? explorationHistory[currentStep].join(", ") : "";
            document.getElementById("results").innerText = results.map(r => r.join(", ")).join(" | ") || "None";
            document.getElementById("status").innerText = currentStep < 0 ? "Ready to explore" : "Exploring...";
        }

        function backtrack() {
            if (currentStep > 0) {
                currentStep--;
                updateDisplay();
            }
        }

        function next() {
            if (currentStep < explorationHistory.length - 1) {
                currentStep++;
                updateDisplay();
            }
        }

        function previous() {
            if (currentStep > 0) {
                currentStep--;
                updateDisplay();
            }
        }

        function reset() {
            targetSum = 0;
            currentPath = [];
            results = [];
            explorationHistory = [];
            currentStep = -1;
            updateDisplay();
        }
    </script>
</body>
</html>
