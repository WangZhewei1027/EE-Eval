<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Sort</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .section {
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .section h2 {
            margin-top: 0;
        }
        .section p {
            margin-bottom: 10px;
        }
        .sort-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sort-button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .sort-button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="section">
            <h2>Quick Sort</h2>
            <p>Sort an array of numbers using the Quick Sort algorithm.</p>
            <button class="sort-button" id="sort-button">Sort</button>
            <button class="sort-button" id="reverse-button">Reverse</button>
        </div>
        <div class="section">
            <h2>Example Data:</h2>
            <p>Array of numbers:</p>
            <ul>
                <li>1</li>
                <li>3</li>
                <li>5</li>
                <li>7</li>
                <li>9</li>
            </ul>
            <p>Original array:</p>
            <pre>1 3 5 7 9</pre>
        </div>
    </div>

    <script>
        function quickSort(arr, low, high) {
            if (low < high) {
                const pivotIndex = partition(arr, low, high);
                quickSort(arr, low, pivotIndex - 1);
                quickSort(arr, pivotIndex + 1, high);
            }
        }

        function partition(arr, low, high) {
            const pivot = arr[high];
            let i = low - 1;
            for (let j = low; j < high; j++) {
                if (arr[j] < pivot) {
                    i++;
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
            }
            [arr[i + 1], arr[high]] = [arr[high], arr[i + 1]];
            return i + 1;
        }

        const arr = [1, 3, 5, 7, 9];
        quickSort(arr, 0, arr.length - 1);
        console.log("Sorted array:", arr);

        const reverseButton = document.getElementById("reverse-button");
        reverseButton.addEventListener("click", () => {
            arr = arr.slice().reverse();
            console.log("Array after reversing:", arr);
        });
    </script>
</body>
</html>
