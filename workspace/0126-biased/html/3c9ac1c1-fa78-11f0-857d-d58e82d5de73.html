<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Git Concept - Visualized</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

  /* Root & Body */
  :root {
    --color-bg: #0e1117;
    --color-primary: #1db954;
    --color-accent: #ff6f61;
    --color-light: #eaeaea;
    --color-muted: #767676;
    --font-sans: 'Inter', sans-serif;
    --transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    background: var(--color-bg);
    font-family: var(--font-sans);
    color: var(--color-light);
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* Container */
  .container {
    max-width: 1100px;
    margin: 3rem auto 5rem auto;
    padding: 0 2rem;
    display: flex;
    flex-direction: column;
    gap: 3rem;
  }

  /* Header */
  header {
    text-align: center;
    user-select: none;
  }
  header h1 {
    font-size: 3.6rem;
    font-weight: 900;
    background: linear-gradient(90deg, #1db954, #53d488, #1db954);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.15em;
    margin-bottom: 0.4rem;
    transition: color var(--transition);
  }
  header p.subheading {
    font-weight: 600;
    font-size: 1.3rem;
    color: var(--color-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Visual concept area */
  .visualization {
    background: linear-gradient(135deg, #0f121a 45%, #181c28 100%);
    border-radius: 20px;
    padding: 2.5rem;
    box-shadow:
      0 8px 20px rgb(29 185 84 / 0.25),
      inset 0 0 60px rgb(29 185 84 / 0.3);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 440px;
  }

  /* Git graph container */
  .git-graph {
    position: relative;
    width: 700px;
    height: 360px;
    user-select: none;
  }

  /* Branch lines */
  .branch-line {
    position: absolute;
    width: 6px;
    border-radius: 3px;
    background: var(--color-primary);
    box-shadow: 0 0 10px var(--color-primary);
    transition: background-color var(--transition), box-shadow var(--transition);
  }
  .branch-main {
    left: 350px;
    top: 20px;
    height: 320px;
    background: linear-gradient(180deg, #1db954, #148c3c);
    box-shadow: 0 0 20px #1db954;
  }
  .branch-feature {
    left: 520px;
    top: 100px;
    height: 240px;
    background: linear-gradient(180deg, #53d488, #1b5e2a);
    box-shadow: 0 0 18px #53d488;
    border-radius: 10px;
  }
  .branch-hotfix {
    left: 190px;
    top: 180px;
    height: 140px;
    background: linear-gradient(180deg, #ff6f61, #b9423b);
    box-shadow: 0 0 18px #ff6f61;
    border-radius: 10px;
  }

  /* Commit nodes */
  .commit {
    position: absolute;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--color-bg);
    border: 4px solid var(--color-primary);
    box-shadow: 0 0 8px var(--color-primary);
    cursor: default;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    filter: drop-shadow(0 0 2px var(--color-primary));
  }
  .commit.feature {
    border-color: #53d488;
    box-shadow: 0 0 12px #53d488;
    filter: drop-shadow(0 0 4px #53d488);
  }
  .commit.hotfix {
    border-color: #ff6f61;
    box-shadow: 0 0 12px #ff6f61;
    filter: drop-shadow(0 0 4px #ff6f61);
  }
  .commit:hover {
    border-width: 6px;
    box-shadow:
      0 0 15px var(--color-primary),
      0 0 25px var(--color-primary);
    z-index: 10;
  }
  .commit.feature:hover {
    border-width: 6px;
    box-shadow:
      0 0 15px #53d488,
      0 0 30px #53d488;
    z-index: 10;
  }
  .commit.hotfix:hover {
    border-width: 6px;
    box-shadow:
      0 0 15px #ff6f61,
      0 0 30px #ff6f61;
    z-index: 10;
  }

  /* Positions of commits on main branch */
  .commit.main-0 { top: 40px; left: 340px; }
  .commit.main-1 { top: 100px; left: 345px; }
  .commit.main-2 { top: 160px; left: 335px; }
  .commit.main-3 { top: 220px; left: 350px; }
  .commit.main-4 { top: 280px; left: 345px; }

  /* Feature branch commits */
  .commit.feature-0 { top: 120px; left: 510px; }
  .commit.feature-1 { top: 180px; left: 520px; }
  .commit.feature-2 { top: 240px; left: 510px; }

  /* Hotfix branch commits */
  .commit.hotfix-0 { top: 200px; left: 180px; }
  .commit.hotfix-1 { top: 260px; left: 190px; }

  /* Merge arcs and lines using SVG */
  .merge-svg {
    position: absolute;
    top: 0; left: 0;
    width: 700px;
    height: 360px;
    pointer-events: none;
    overflow: visible;
  }
  .merge-path {
    fill: none;
    stroke-width: 4px;
    stroke-linecap: round;
    filter: drop-shadow(0 0 5px var(--color-primary));
    transition: stroke var(--transition);
  }
  .merge-main {
    stroke: var(--color-primary);
  }
  .merge-feature {
    stroke: #53d488;
  }
  .merge-hotfix {
    stroke: #ff6f61;
  }

  /* Labels for branches and commits */
  .label-branch {
    position: absolute;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--color-muted);
    user-select: none;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .label-main {
    top: 5px;
    left: 320px;
    color: #1db954;
    font-weight: 900;
    font-size: 1.25rem;
    text-shadow: 0 0 8px #1db954;
  }
  .label-feature {
    top: 90px;
    left: 480px;
    color: #53d488;
    font-weight: 900;
    font-size: 1.15rem;
    text-shadow: 0 0 8px #53d488;
  }
  .label-hotfix {
    top: 170px;
    left: 150px;
    color: #ff6f61;
    font-weight: 900;
    font-size: 1.15rem;
    text-shadow: 0 0 8px #ff6f61;
  }
  .label-commit {
    position: absolute;
    font-size: 0.8rem;
    font-weight: 600;
    background: var(--color-bg);
    padding: 2px 6px;
    border-radius: 6px;
    white-space: nowrap;
    user-select: none;
    transform: translateX(-50%);
    color: var(--color-light);
    letter-spacing: 0.05em;
    opacity: 0.75;
    transition: opacity 0.3s ease;
  }
  .label-commit:hover {
    opacity: 1;
  }
  /* Commit labels on main */
  .label-main-0 { top: 15px; left: 340px; }
  .label-main-1 { top: 75px; left: 345px; }
  .label-main-2 { top: 135px; left: 335px; }
  .label-main-3 { top: 195px; left: 350px; }
  .label-main-4 { top: 255px; left: 345px; }
  /* Feature commits labels */
  .label-feature-0 { top: 95px; left: 510px; }
  .label-feature-1 { top: 155px; left: 520px; }
  .label-feature-2 { top: 215px; left: 510px; }
  /* Hotfix commits labels */
  .label-hotfix-0 { top: 175px; left: 180px; }
  .label-hotfix-1 { top: 235px; left: 190px; }

  /* Buttons container */
  .controls {
    text-align: center;
    margin-top: auto;
  }
  .btn {
    background: transparent;
    border: 2.5px solid var(--color-primary);
    color: var(--color-primary);
    padding: 0.65rem 2.2rem;
    font-weight: 700;
    font-size: 1.1rem;
    border-radius: 50px;
    cursor: pointer;
    transition: background-color 0.4s, color 0.4s, box-shadow 0.4s;
    user-select: none;
    box-shadow:
      0 0 8px var(--color-primary);
  }
  .btn:hover {
    background-color: var(--color-primary);
    color: var(--color-bg);
    box-shadow:
      0 0 20px var(--color-primary),
      0 0 30px var(--color-primary);
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 2rem 0 1rem 0;
    font-size: 0.85rem;
    color: var(--color-muted);
    font-weight: 600;
    user-select: none;
  }

  /* Animations for commits */
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 12px var(--color-primary); }
    50% { box-shadow: 0 0 25px var(--color-primary); }
  }
  .commit.pulse-main {
    animation: pulseGlow 3.6s ease-in-out infinite;
  }
  .commit.pulse-feature {
    animation: pulseGlow 4s ease-in-out infinite;
    box-shadow: 0 0 15px #53d488;
  }
  .commit.pulse-hotfix {
    animation: pulseGlow 3.2s ease-in-out infinite;
    box-shadow: 0 0 15px #ff6f61;
  }

</style>
</head>
<body>
<header>
  <h1>GIT</h1>
  <p class="subheading">Distributed Version Control Visualized</p>
</header>

<main class="container" role="region" aria-label="Git Visual Concept">
  <section class="visualization" aria-label="Git branch and commit visualization">
    <div class="git-graph" aria-hidden="true">
      <!-- Branch Lines -->
      <div class="branch-line branch-main"></div>
      <div class="branch-line branch-feature"></div>
      <div class="branch-line branch-hotfix"></div>

      <!-- Commits - Main Branch -->
      <div class="commit main-0 pulse-main" title="Commit: Initial commit"></div>
      <div class="commit main-1 pulse-main" title="Commit: Set up CI/CD pipeline"></div>
      <div class="commit main-2 pulse-main" title="Commit: Add README"></div>
      <div class="commit main-3 pulse-main" title="Commit: Refactor architecture"></div>
      <div class="commit main-4 pulse-main" title="Commit: Release v1.0.0"></div>

      <!-- Commits - Feature Branch -->
      <div class="commit feature feature-0 pulse-feature" title="Commit: Feature A start"></div>
      <div class="commit feature feature-1 pulse-feature" title="Commit: Feature A progress"></div>
      <div class="commit feature feature-2 pulse-feature" title="Commit: Feature A ready"></div>

      <!-- Commits - Hotfix Branch -->
      <div class="commit hotfix hotfix-0 pulse-hotfix" title="Commit: Hotfix critical bug"></div>
      <div class="commit hotfix hotfix-1 pulse-hotfix" title="Commit: Hotfix test passed"></div>

      <!-- Branch Labels -->
      <div class="label-branch label-main">main</div>
      <div class="label-branch label-feature">feature/A</div>
      <div class="label-branch label-hotfix">hotfix/bugfix</div>

      <!-- Commit Labels -->
      <span class="label-commit label-main-0" title="Commit: Initial commit">Initial commit</span>
      <span class="label-commit label-main-1" title="Commit: Set up CI/CD pipeline">CI/CD Pipeline</span>
      <span class="label-commit label-main-2" title="Commit: Add README">Add README</span>
      <span class="label-commit label-main-3" title="Commit: Refactor architecture">Refactor</span>
      <span class="label-commit label-main-4" title="Commit: Release v1.0.0">Release v1.0.0</span>

      <span class="label-commit label-feature-0" title="Commit: Feature A start">Feature Start</span>
      <span class="label-commit label-feature-1" title="Commit: Feature A progress">Feature Progress</span>
      <span class="label-commit label-feature-2" title="Commit: Feature A ready">Feature Ready</span>

      <span class="label-commit label-hotfix-0" title="Commit: Hotfix critical bug">Hotfix Bug</span>
      <span class="label-commit label-hotfix-1" title="Commit: Hotfix test passed">Hotfix Pass</span>

      <!-- Merge Arcs SVG -->
      <svg class="merge-svg" viewBox="0 0 700 360" aria-hidden="true" focusable="false" >
        <!-- Merge feature -> main -->
        <path class="merge-path merge-feature" d="M520 250 C480 280, 400 280, 350 285" stroke-linejoin="round"/>
        <path class="merge-path merge-feature" d="M510 250 L510 250" />

        <!-- Merge hotfix -> main -->
        <path class="merge-path merge-hotfix" d="M190 210 C230 200, 330 190, 350 200" stroke-linejoin="round"/>
        <path class="merge-path merge-hotfix" d="M180 210 L180 210" />
      </svg>
    </div>
  </section>

  <div class="controls" aria-label="Controls for Git visualization">
    <button class="btn" id="toggleGlowBtn" aria-pressed="true" aria-label="Toggle Pulsing Glow Animation">
      Toggle Glow Animation
    </button>
  </div>
</main>

<footer>
  &copy; 2024 &bull; Designed for clarity & elegance by ChatGPT
</footer>

<script>
  (function(){
    const toggleBtn = document.getElementById('toggleGlowBtn');
    const commits = document.querySelectorAll('.commit');

    let glowOn = true;

    toggleBtn.addEventListener('click', () => {
      glowOn = !glowOn;
      commits.forEach(commit => {
        if (glowOn) {
          if (commit.classList.contains('main-0') || commit.classList.contains('main-1') || commit.classList.contains('main-2') || commit.classList.contains('main-3') || commit.classList.contains('main-4')) {
            commit.classList.add('pulse-main');
          } else if (commit.classList.contains('feature')) {
            commit.classList.add('pulse-feature');
          } else if (commit.classList.contains('hotfix')) {
            commit.classList.add('pulse-hotfix');
          }
        } else {
          commit.classList.remove('pulse-main', 'pulse-feature', 'pulse-hotfix');
        }
      });
      toggleBtn.setAttribute('aria-pressed', glowOn.toString());
    });
  })();
</script>
</body>
</html>
