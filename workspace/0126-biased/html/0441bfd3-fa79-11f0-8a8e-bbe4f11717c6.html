<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .section {
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .section h2 {
            margin-top: 0;
        }
        .section p {
            margin-bottom: 10px;
        }
        .section button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .section button:hover {
            background-color: #3e8e41;
        }
        .section button:active {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="section">
            <h2>B-Tree</h2>
            <p>Implementation of B-Tree data structure</p>
            <button id="generate-bt">Generate B-Tree</button>
        </div>
        <div class="section">
            <h2>Node Properties</h2>
            <p>Node properties</p>
            <p>Key: <span id="key">Key</span></p>
            <p>Value: <span id="value">Value</span></p>
        </div>
    </div>

    <script>
        let bt = new BTree(10);

        document.getElementById("generate-bt").addEventListener("click", function() {
            bt.generate();
        });

        function generate() {
            bt.generateTree(0, 0, 0, 10);
        }

        function BTree(n) {
            this.root = new Node(0, 0, n);
        }

        BTree.prototype.generateTree = function(start, end, left, right) {
            if (start > end) {
                return;
            }

            let mid = Math.floor((start + end) / 2);

            let node = new Node(start, mid, right);
            node.left = new Node(start, mid, left);
            node.right = new Node(mid + 1, end, right);

            bt.root = node;
        }

        class Node {
            constructor(key, value, left, right) {
                this.key = key;
                this.value = value;
                this.left = left;
                this.right = right;
            }
        }
    </script>
</body>
</html>
