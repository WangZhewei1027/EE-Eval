<!DOCTYPE html>
<html>
<head>
    <title>Interactive SQL Explorer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .panel {
            border: 1px solid #ccc;
            padding: 15px;
        }
        textarea, input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            box-sizing: border-box;
        }
        button {
            padding: 8px 12px;
            margin: 5px 5px 5px 0;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .hidden {
            display: none;
        }
        .tabs {
            display: flex;
            margin-bottom: -1px;
        }
        .tab {
            padding: 10px 15px;
            cursor: 1px solid #ccc;
            background: #f1f1f1;
            margin-right: 5px;
            border: 1px solid #ccc;
            border-bottom: none;
        }
        .tab.active {
            background: white;
            border-bottom: 1px solid white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interactive SQL Explorer</h1>
        
        <div class="panel">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('query')">Query Builder</div>
                <div class="tab" onclick="switchTab('schema')">Database Schema</div>
                <div class="tab" onclick="switchTab('tutorial')">Tutorial</div>
            </div>
            
            <div id="query" class="tab-content active">
                <h3>SQL Query</h3>
                <textarea id="sqlQuery" rows="5">SELECT * FROM employees;</textarea>
                <div>
                    <button onclick="executeQuery()">Execute</button>
                    <button onclick="explainQuery()">Explain</button>
                    <button onclick="saveQuery()">Save Query</button>
                    <button onclick="loadQuery()">Load Query</button>
                    <button onclick="clearQuery()">Clear</button>
                </div>
                
                <div>
                    <label>Query Type:</label>
                    <select id="queryType" onchange="updateQueryTemplate()">
                        <option value="select">SELECT</option>
                        <option value="insert">INSERT</option>
                        <option value="update">UPDATE</option>
                        <option value="delete">DELETE</option>
                        <option value="join">JOIN</option>
                        <option value="subquery">Subquery</option>
                    </select>
                </div>
                
                <div id="queryOptions" class="hidden">
                    <div id="selectOptions">
                        <label>Table:</label>
                        <select id="selectTable" onchange="updateSelectColumns()">
                            <option value="employees">employees</option>
                            <option value="departments">departments</option>
                            <option value="projects">projects</option>
                        </select>
                        
                        <label>Columns:</label>
                        <div id="selectColumns"></div>
                        
                        <label>Conditions:</label>
                        <input type="text" id="selectWhere" placeholder="e.g., salary > 50000">
                        
                        <label>Order By:</label>
                        <input type="text" id="selectOrder" placeholder="e.g., last_name ASC">
                    </div>
                </div>
            </div>
            
            <div id="schema" class="tab-content">
                <h3>Database Schema</h3>
                <div>
                    <select id="schemaTable" onchange="showTableSchema()">
                        <option value="employees">employees</option>
                        <option value="departments">departments</option>
                        <option value="projects">projects</option>
                    </select>
                </div>
                <div id="tableSchema"></div>
            </div>
            
            <div id="tutorial" class="tab-content">
                <h3>SQL Tutorial</h3>
                <div>
                    <select id="tutorialTopic" onchange="showTutorial()">
                        <option value="basics">SQL Basics</option>
                        <option value="select">SELECT Statements</option>
                        <option value="joins">JOIN Operations</option>
                        <option value="subqueries">Subqueries</option>
                        <option value="functions">SQL Functions</option>
                    </select>
                </div>
                <div id="tutorialContent"></div>
            </div>
        </div>
        
        <div class="panel">
            <h3>Query Results</h3>
            <div id="queryResults"></div>
            <div id="queryStats"></div>
        </div>
        
        <div class="panel">
            <h3>Query History</h3>
            <div id="queryHistory"></div>
        </div>
    </div>

    <script>
        // Sample database
        const database = {
            employees: [
                { id: 1, first_name: 'John', last_name: 'Doe', email: 'john@example.com', salary: 60000, department_id: 1 },
                { id: 2, first_name: 'Jane', last_name: 'Smith', email: 'jane@example.com', salary: 75000, department_id: 2 },
                { id: 3, first_name: 'Bob', last_name: 'Johnson', email: 'bob@example.com', salary: 55000, department_id: 1 },
                { id: 4, first_name: 'Alice', last_name: 'Williams', email: 'alice@example.com', salary: 80000, department_id: 3 }
            ],
            departments: [
                { id: 1, name: 'Engineering', manager: 'John Doe', budget: 500000 },
                { id: 2, name: 'Marketing', manager: 'Jane Smith', budget: 300000 },
                { id: 3, name: 'Sales', manager: 'Alice Williams', budget: 400000 }
            ],
            projects: [
                { id: 1, name: 'Website Redesign', department_id: 2, budget: 50000, status: 'active' },
                { id: 2, name: 'Database Migration', department_id: 1, budget: 75000, status: 'completed' },
                { id: 3, name: 'Product Launch', department_id: 3, budget: 100000, status: 'planning' }
            ]
        };

        // Schema information
        const schema = {
            employees: [
                { name: 'id', type: 'INTEGER', description: 'Primary key' },
                { name: 'first_name', type: 'VARCHAR(50)', description: 'Employee first name' },
                { name: 'last_name', type: 'VARCHAR(50)', description: 'Employee last name' },
                { name: 'email', type: 'VARCHAR(100)', description: 'Employee email' },
                { name: 'salary', type: 'DECIMAL(10,2)', description: 'Annual salary' },
                { name: 'department_id', type: 'INTEGER', description: 'Foreign key to departments' }
            ],
            departments: [
                { name: 'id', type: 'INTEGER', description: 'Primary key' },
                { name: 'name', type: 'VARCHAR(50)', description: 'Department name' },
                { name: 'manager', type: 'VARCHAR(100)', description: 'Department manager' },
                { name: 'budget', type: 'DECIMAL(12,2)', description: 'Annual budget' }
            ],
            projects: [
                { name: 'id', type: 'INTEGER', description: 'Primary key' },
                { name: 'name', type: 'VARCHAR(100)', description: 'Project name' },
                { name: 'department_id', type: 'INTEGER', description: 'Owning department' },
                { name: 'budget', type: 'DECIMAL(10,2)', description: 'Project budget' },
                { name: 'status', type: 'VARCHAR(20)', description: 'Project status' }
            ]
        };

        // Tutorial content
        const tutorials = {
            basics: `
                <h4>SQL Basics</h4>
                <p>SQL (Structured Query Language) is used to manage relational databases.</p>
                <p>Basic SQL commands:</p>
                <ul>
                    <li>SELECT - retrieve data</li>
                    <li>INSERT - add new records</li>
                    <li>UPDATE - modify records</li>
                    <li>DELETE - remove records</li>
                </ul>
            `,
            select: `
                <h4>SELECT Statements</h4>
                <p>The SELECT statement retrieves data from one or more tables.</p>
                <p>Basic syntax:</p>
                <pre>SELECT column1, column2 FROM table_name WHERE condition;</pre>
                <p>Examples:</p>
                <pre>SELECT * FROM employees;</pre>
                <pre>SELECT first_name, last_name FROM employees WHERE salary > 50000;</pre>
            `,
            joins: `
                <h4>JOIN Operations</h4>
                <p>JOINs combine rows from two or more tables based on related columns.</p>
                <p>Types of JOINs:</p>
                <ul>
                    <li>INNER JOIN - returns matching rows</li>
                    <li>LEFT JOIN - returns all rows from left table</li>
                    <li>RIGHT JOIN - returns all rows from right table</li>
                    <li>FULL JOIN - returns all rows when there's a match</li>
                </ul>
                <p>Example:</p>
                <pre>SELECT e.first_name, e.last_name, d.name 
FROM employees e 
JOIN departments d ON e.department_id = d.id;</pre>
            `,
            subqueries: `
                <h4>Subqueries</h4>
                <p>A subquery is a query nested inside another query.</p>
                <p>Example:</p>
                <pre>SELECT first_name, last_name 
FROM employees 
WHERE department_id IN (SELECT id FROM departments WHERE name = 'Engineering');</pre>
            `,
            functions: `
                <h4>SQL Functions</h4>
                <p>Common SQL functions:</p>
                <ul>
                    <li>COUNT() - count rows</li>
                    <li>SUM() - calculate sum</li>
                    <li>AVG() - calculate average</li>
                    <li>MAX()/MIN() - find maximum/minimum</li>
                    <li>CONCAT() - combine strings</li>
                </ul>
                <p>Example:</p>
                <pre>SELECT COUNT(*) FROM employees;</pre>
                <pre>SELECT AVG(salary) FROM employees WHERE department_id = 1;</pre>
            `
        };

        // Query history
        let queryHistory = [];

        // Initialize the app
        function init() {
            updateSelectColumns();
            showTableSchema();
            showTutorial();
        }

        // Tab switching
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            document.querySelector(`.tab[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // Execute SQL query
        function executeQuery() {
            const query = document.getElementById('sqlQuery').value.trim();
            if (!query) return;
            
            try {
                const result = parseAndExecuteQuery(query);
                displayResults(result);
                addToHistory(query, result);
            } catch (error) {
                displayError(error.message);
            }
        }

        // Parse and execute query (simplified)
        function parseAndExecuteQuery(query) {
            query = query.toLowerCase();
            
            if (query.startsWith('select')) {
                return handleSelectQuery(query);
            } else if (query.startsWith('insert')) {
                return handleInsertQuery(query);
            } else if (query.startsWith('update')) {
                return handleUpdateQuery(query);
            } else if (query.startsWith('delete')) {
                return handleDeleteQuery(query);
            } else {
                throw new Error('Unsupported query type');
            }
        }

        // Handle SELECT queries
        function handleSelectQuery(query) {
            // Very simplified parser - just for demonstration
            const fromIndex = query.indexOf('from');
            if (fromIndex === -1) throw new Error('Invalid SELECT query');
            
            const tableName = query.substring(fromIndex + 5).split(' ')[0].trim();
            if (!database[tableName]) throw new Error(`Table ${tableName} not found`);
            
            // Get all columns or specified columns
            let columns = [];
            const selectPart = query.substring(6, fromIndex).trim();
            
            if (selectPart === '*') {
                columns = Object.keys(database[tableName][0]);
            } else {
                columns = selectPart.split(',').map(col => col.trim());
            }
            
            // Get the data
            const results = database[tableName].map(row => {
                const resultRow = {};
                columns.forEach(col => {
                    if (row[col] === undefined) throw new Error(`Column ${col} not found`);
                    resultRow[col] = row[col];
                });
                return resultRow;
            });
            
            return {
                type: 'SELECT',
                table: tableName,
                columns: columns,
                rows: results,
                count: results.length
            };
        }

        // Handle INSERT queries (simplified)
        function handleInsertQuery(query) {
            const intoIndex = query.indexOf('into');
            const valuesIndex = query.indexOf('values');
            
            if (intoIndex === -1 || valuesIndex === -1) throw new Error('Invalid INSERT query');
            
            const tableName = query.substring(intoIndex + 5, valuesIndex).trim().split(' ')[0];
            if (!database[tableName]) throw new Error(`Table ${tableName} not found`);
            
            // Very simplified - just for demo
            const valuesPart = query.substring(valuesIndex + 7).trim();
            const values = valuesPart.replace(/[()]/g, '').split(',').map(v => v.trim().replace(/'/g, ''));
            
            // Create new row (simplified - assumes order matches)
            const newRow = {};
            const columns = Object.keys(database[tableName][0]);
            
            columns.forEach((col, i) => {
                newRow[col] = values[i];
            });
            
            database[tableName].push(newRow);
            
            return {
                type: 'INSERT',
                table: tableName,
                affectedRows: 1
            };
        }

        // Handle UPDATE queries (simplified)
        function handleUpdateQuery(query) {
            const tableIndex = query.indexOf('update') + 7;
            const setIndex = query.indexOf('set');
            const whereIndex = query.indexOf('where');
            
            if (setIndex === -1) throw new Error('Invalid UPDATE query');
            
            const tableName = query.substring(tableIndex, setIndex).trim();
            if (!database[tableName]) throw new Error(`Table ${tableName} not found`);
            
            // Very simplified - just for demo
            let count = 0;
            database[tableName].forEach(row => {
                // In a real implementation, we would parse the WHERE clause
                // and only update matching rows
                row.salary = parseInt(row.salary) + 5000; // Simple demo update
                count++;
            });
            
            return {
                type: 'UPDATE',
                table: tableName,
                affectedRows: count
            };
        }

        // Handle DELETE queries (simplified)
        function handleDeleteQuery(query) {
            const fromIndex = query.indexOf('from');
            const whereIndex = query.indexOf('where');
            
            if (fromIndex === -1) throw new Error('Invalid DELETE query');
            
            const tableName = query.substring(fromIndex + 5, whereIndex !== -1 ? whereIndex : undefined).trim();
            if (!database[tableName]) throw new Error(`Table ${tableName} not found`);
            
            // Very simplified - just for demo
            const originalCount = database[tableName].length;
            database[tableName] = database[tableName].slice(0, -1); // Remove last item for demo
            const newCount = database[tableName].length;
            
            return {
                type: 'DELETE',
                table: tableName,
                affectedRows: originalCount - newCount
            };
        }

        // Display query results
        function displayResults(result) {
            const resultsDiv = document.getElementById('queryResults');
            const statsDiv = document.getElementById('queryStats');
            
            resultsDiv.innerHTML = '';
            statsDiv.innerHTML = '';
            
            if (result.type === 'SELECT') {
                if (result.rows.length === 0) {
                    resultsDiv.innerHTML = '<p>No results found</p>';
                } else {
                    const table = document.createElement('table');
                    
                    // Create header
                    const thead = document.createElement('thead');
                    const headerRow = document.createElement('tr');
                    result.columns.forEach(col => {
                        const th = document.createElement('th');
                        th.textContent = col;
                        headerRow.appendChild(th);
                    });
                    thead.appendChild(headerRow);
                    table.appendChild(thead);
                    
                    // Create rows
                    const tbody = document.createElement('tbody');
                    result.rows.forEach(row => {
                        const tr = document.createElement('tr');
                        result.columns.forEach(col => {
                            const td = document.createElement('td');
                            td.textContent = row[col];
                            tr.appendChild(td);
                        });
                        tbody.appendChild(tr);
                    });
                    table.appendChild(tbody);
                    
                    resultsDiv.appendChild(table);
                }
                
                statsDiv.innerHTML = `<p>Returned ${result.count} rows from table ${result.table}</p>`;
            } else {
                resultsDiv.innerHTML = `<p>${result.type} operation completed successfully</p>`;
                statsDiv.innerHTML = `<p>Affected ${result.affectedRows} rows in table ${result.table}</p>`;
            }
        }

        // Display error
        function displayError(message) {
            const resultsDiv = document.getElementById('queryResults');
            resultsDiv.innerHTML = `<p style="color:red">Error: ${message}</p>`;
        }

        // Add query to history
        function addToHistory(query, result) {
            queryHistory.unshift({
                query: query,
                timestamp: new Date(),
                result: result
            });
            
            updateHistoryDisplay();
        }

        // Update history display
        function updateHistoryDisplay() {
            const historyDiv = document.getElementById('queryHistory');
            historyDiv.innerHTML = '';
            
            queryHistory.slice(0, 5).forEach(item => {
                const div = document.createElement('div');
                div.style.marginBottom = '10px';
                div.style.padding = '5px';
                div.style.borderBottom = '1px solid #eee';
                
                const queryText = document.createElement('div');
                queryText.textContent = item.query;
                queryText.style.fontFamily = 'monospace';
                
                const meta = document.createElement('div');
                meta.style.fontSize = '0.8em';
                meta.style.color = '#666';
                meta.textContent = `${item.timestamp.toLocaleTimeString()} - ${item.result.type} (${item.result.affectedRows || item.result.count} rows)`;
                
                div.appendChild(queryText);
                div.appendChild(meta);
                historyDiv.appendChild(div);
            });
        }

        // Explain query
        function explainQuery() {
            const query = document.getElementById('sqlQuery').value.trim();
            if (!query) return;
            
            const resultsDiv = document.getElementById('queryResults');
            resultsDiv.innerHTML = `
                <h4>Query Explanation</h4>
                <p>This is a simplified explanation of what the query does:</p>
                <ul>
                    <li>Query type: ${query.split(' ')[0].toUpperCase()}</li>
                    <li>Tables accessed: ${query.includes('FROM') ? query.split('FROM')[1].split(' ')[1] : 'N/A'}</li>
                    <li>Conditions: ${query.includes('WHERE') ? query.split('WHERE')[1] : 'None'}</li>
                </ul>
                <p>Note: This is a simulation. A real database would provide more detailed execution plans.</p>
            `;
        }

        // Save query
        function saveQuery() {
            const query = document.getElementById('sqlQuery').value.trim();
            if (!query) return;
            
            localStorage.setItem('savedQuery', query);
            alert('Query saved to browser storage');
        }

        // Load query
        function loadQuery() {
            const savedQuery = localStorage.getItem('savedQuery');
            if (savedQuery) {
                document.getElementById('sqlQuery').value = savedQuery;
            } else {
                alert('No saved query found');
            }
        }

        // Clear query
        function clearQuery() {
            document.getElementById('sqlQuery').value = '';
        }

        // Update query template based on type
        function updateQueryTemplate() {
            const queryType = document.getElementById('queryType').value;
            const queryOptions = document.getElementById('queryOptions');
            
            queryOptions.classList.remove('hidden');
            
            switch(queryType) {
                case 'select':
                    document.getElementById('sqlQuery').value = 'SELECT * FROM employees;';
                    document.getElementById('selectOptions').style.display = 'block';
                    break;
                case 'insert':
                    document.getElementById('sqlQuery').value = 'INSERT INTO employees (id, first_name, last_name, email, salary, department_id) VALUES (5, "New", "Employee", "new@example.com", 50000, 1);';
                    break;
                case 'update':
                    document.getElementById('sqlQuery').value = 'UPDATE employees SET salary = 65000 WHERE id = 1;';
                    break;
                case 'delete':
                    document.getElementById('sqlQuery').value = 'DELETE FROM employees WHERE id = 1;';
                    break;
                case 'join':
                    document.getElementById('sqlQuery').value = 'SELECT e.first_name, e.last_name, d.name FROM employees e JOIN departments d ON e.department_id = d.id;';
                    break;
                case 'subquery':
                    document.getElementById('sqlQuery').value = 'SELECT first_name, last_name FROM employees WHERE department_id IN (SELECT id FROM departments WHERE name = "Engineering");';
                    break;
            }
        }

        // Update select columns when table changes
        function updateSelectColumns() {
            const tableName = document.getElementById('selectTable').value;
            const columnsDiv = document.getElementById('selectColumns');
            
            columnsDiv.innerHTML = '';
            
            if (database[tableName]) {
                Object.keys(database[tableName][0]).forEach(col => {
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = `col_${col}`;
                    checkbox.value = col;
                    checkbox.checked = true;
                    
                    const label = document.createElement('label');
                    label.htmlFor = `col_${col}`;
                    label.textContent = col;
                    
                    const div = document.createElement('div');
                    div.appendChild(checkbox);
                    div.appendChild(label);
                    
                    columnsDiv.appendChild(div);
                });
            }
        }

        // Show table schema
        function showTableSchema() {
            const tableName = document.getElementById('schemaTable').value;
            const schemaDiv = document.getElementById('tableSchema');
            
            if (schema[tableName]) {
                const table = document.createElement('table');
                
                // Header
                const thead = document.createElement('thead');
                const headerRow = document.createElement('tr');
                ['Column', 'Type', 'Description'].forEach(text => {
                    const th = document.createElement('th');
                    th.textContent = text;
                    headerRow.appendChild(th);
                });
                thead.appendChild(headerRow);
                table.appendChild(thead);
                
                // Rows
                const tbody = document.createElement('tbody');
                schema[tableName].forEach(col => {
                    const tr = document.createElement('tr');
                    
                    const tdName = document.createElement('td');
                    tdName.textContent = col.name;
                    tr.appendChild(tdName);
                    
                    const tdType = document.createElement('td');
                    tdType.textContent = col.type;
                    tr.appendChild(tdType);
                    
                    const tdDesc = document.createElement('td');
                    tdDesc.textContent = col.description;
                    tr.appendChild(tdDesc);
                    
                    tbody.appendChild(tr);
                });
                table.appendChild(tbody);
                
                schemaDiv.innerHTML = '';
                schemaDiv.appendChild(table);
            }
        }

        // Show tutorial
        function showTutorial() {
            const topic = document.getElementById('tutorialTopic').value;
            const tutorialDiv = document.getElementById('tutorialContent');
            
            if (tutorials[topic]) {
                tutorialDiv.innerHTML = tutorials[topic];
            }
        }

        // Initialize the app
        window.onload = init;
    </script>
</body>
</html>
