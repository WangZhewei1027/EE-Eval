<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trie</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
        }
        #trie {
            width: 800px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #buttons {
            margin-bottom: 20px;
        }
        #buttons button {
            margin: 5px;
        }
    </style>
</head>
<body>
    <div id="trie">
        <h1>Trie</h1>
        <p id="error-message"></p>
        <input id="input" type="text" placeholder="Enter a word">
        <button id="add-button">Add</button>
        <button id="remove-button">Remove</button>
        <button id="search-button">Search</button>
        <button id="display-button">Display</button>
        <input id="search-input" type="text" placeholder="Enter a word to search">
        <div id="output"></div>
        <button id="clear-button">Clear</button>
        <div id="result"></div>
    </div>

    <script>
        let trie = {
            children: {},
            word: '',
            result: ''
        };

        let addButton = document.getElementById('add-button');
        let removeButton = document.getElementById('remove-button');
        let searchButton = document.getElementById('search-button');
        let displayButton = document.getElementById('display-button');
        let clearButton = document.getElementById('clear-button');
        let searchInput = document.getElementById('search-input');
        let outputDiv = document.getElementById('output');
        let resultDiv = document.getElementById('result');

        addButton.addEventListener('click', addWord);
        removeButton.addEventListener('click', removeWord);
        searchButton.addEventListener('click', searchWord);
        displayButton.addEventListener('click', displayWord);
        clearButton.addEventListener('click', clear);
        searchInput.addEventListener('input', searchInputHandler);
        outputDiv.addEventListener('click', outputClick);
        resultDiv.addEventListener('click', resultClick);

        function addWord() {
            let word = searchInput.value;
            if (word) {
                let node = trie;
                for (let char of word) {
                    if (!node.children[char]) {
                        node.children[char] = {};
                    }
                    node = node.children[char];
                }
                node.word = word;
                node.result = '';
            } else {
                outputDiv.textContent = 'Error: Word cannot be empty';
            }
        }

        function removeWord() {
            let word = searchInput.value;
            if (word) {
                let node = trie;
                for (let char of word) {
                    if (node.children[char]) {
                        node = node.children[char];
                    } else {
                        outputDiv.textContent = 'Error: Word not found';
                        return;
                    }
                }
                if (node.word) {
                    delete node.word;
                    node.result = '';
                } else {
                    outputDiv.textContent = 'Error: Word not found';
                }
            } else {
                outputDiv.textContent = 'Error: Word cannot be empty';
            }
        }

        function searchWord() {
            let word = searchInput.value;
            if (word) {
                let node = trie;
                for (let char of word) {
                    if (!node.children[char]) {
                        outputDiv.textContent = 'Error: Word not found';
                        return;
                    }
                    node = node.children[char];
                }
                if (node.word) {
                    node.result = node.word;
                } else {
                    outputDiv.textContent = 'Error: Word not found';
                }
            } else {
                outputDiv.textContent = 'Error: Word cannot be empty';
            }
        }

        function displayWord() {
            let word = searchInput.value;
            if (word) {
                outputDiv.textContent = word;
            } else {
                outputDiv.textContent = 'Error: Word cannot be empty';
            }
        }

        function clear() {
            trie = {
                children: {},
                word: '',
                result: ''
            };
            outputDiv.textContent = '';
            resultDiv.textContent = '';
        }

        function outputClick() {
            if (outputDiv.children.length > 0) {
                let word = outputDiv.children[0].textContent;
                resultDiv.textContent = word + ' ' + trie.result;
            } else {
                resultDiv.textContent = '';
            }
        }

        function resultClick() {
            if (resultDiv.children.length > 0) {
                let word = resultDiv.children[0].textContent;
                outputDiv.textContent = word;
            } else {
                outputDiv.textContent = 'No result found';
            }
        }
    </script>
</body>
</html>
