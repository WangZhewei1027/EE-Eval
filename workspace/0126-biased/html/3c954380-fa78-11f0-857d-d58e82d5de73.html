<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dynamic Array — Visual Concept</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Playfair+Display&display=swap');

  /* Reset/Normalize */
  *, *::before, *::after {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #1f1f38 0%, #2e3a59 60%, #40607a 100%);
    color: #e0e6f1;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    padding: 2rem;
    user-select: none;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 3.6rem;
    margin-bottom: 0.2em;
    letter-spacing: 0.05em;
    text-align: center;
    color: #e0ecff;
    text-shadow:
       0 0 6px #a0c1ff88,
       0 0 15px #60a0ff99,
       0 0 20px #5088ffcc;
  }
  h2 {
    font-weight: 500;
    font-size: 1.25rem;
    margin-bottom: 3rem;
    text-align: center;
    color: #b0c5ffcc;
    letter-spacing: 0.07em;
  }

  /* Container for the array visualization */
  .array-container {
    position: relative;
    display: flex;
    gap: 1.6rem;
    perspective: 1200px;
  }

  /* Single dynamic array slot */
  .slot {
    width: 96px;
    height: 120px;
    border-radius: 1rem;
    background:
      linear-gradient(145deg,
        #728dc9,
        #5473c6);
    box-shadow:
      inset 2px 2px 8px #a6bdffcc,
      inset -3px -3px 12px #325b9d,
      0 10px 25px rgba(52, 101, 199, 0.35);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #f0f4ff;
    font-weight: 600;
    font-size: 1.85rem;
    letter-spacing: 0.21em;
    text-shadow: 0 0 4px #4968bcbb;
    transition:
      transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
      box-shadow 0.6s cubic-bezier(0.22, 1, 0.36, 1),
      background-color 0.8s,
      color 0.8s;
    cursor: default;
    user-select: none;
    position: relative;
  }
  .slot::before {
    content: attr(data-index);
    position: absolute;
    top: 10%;
    right: 10%;
    font-size: 0.8rem;
    font-weight: 700;
    color: #c3cdeacc;
    text-shadow: 0 0 3px #28448a;
    letter-spacing: 0.13em;
  }
  .slot[data-empty="true"] {
    filter: brightness(0.6);
    color: #8ea8c9cc;
    background:
      linear-gradient(145deg,
        #4a6ea4,
        #365185);
    box-shadow:
      inset 2px 2px 5px #2a3e67cc,
      inset -2px -2px 8px #3a5399,
      0 12px 22px rgba(26, 37, 63, 0.15);
  }

  /* Glow highlight for active slot */
  .slot.active {
    animation: pulseGlow 2.8s ease-in-out infinite;
    box-shadow:
      0 0 12px #7ea9ffcc,
      inset 1px 1px 8px #a5baffcc,
      0 18px 45px #7ea9ff66;
    color: #e9f0ff;
  }

  @keyframes pulseGlow {
    0%, 100% {
      box-shadow:
        0 0 8px #7ea9ffbb,
        inset 1px 1px 6px #a5baffbb,
        0 16px 38px #7ea9ff44;
    }
    50% {
      box-shadow:
        0 0 20px #a6c2ffdd,
        inset 3px 3px 12px #c3d0ffdd,
        0 24px 58px #a6c2ff88;
    }
  }

  /* Controls panel */
  .controls {
    margin-top: 4rem;
    display: flex;
    gap: 2.8rem;
  }
  button {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    background: linear-gradient(145deg, #3461a7, #2d599d);
    color: #e1eafc;
    border: none;
    border-radius: 1rem;
    padding: 0.75rem 2.4rem;
    box-shadow:
      0 3px 15px rgba(21, 58, 106, 0.6);
    cursor: pointer;
    transition:
      background-color 0.25s ease,
      box-shadow 0.3s ease,
      filter 0.3s ease;
    user-select: none;
  }
  button:hover, button:focus {
    background: linear-gradient(145deg, #4174d0, #3b6fc8);
    box-shadow:
      0 6px 30px rgba(65, 116, 208, 0.9);
    filter: brightness(1.05);
    outline: none;
  }
  button:active {
    background: linear-gradient(145deg, #2d599d, #265189);
    box-shadow: none;
    filter: brightness(0.9);
  }

  /* Footer note */
  footer {
    margin-top: 6rem;
    font-size: 0.75rem;
    font-style: italic;
    color: #8ea8df88;
    letter-spacing: 0.07em;
    user-select: none;
  }

  /* Responsive scaling */
  @media (max-width: 480px) {
    .array-container {
      gap: 1.1rem;
    }
    .slot {
      width: 64px;
      height: 80px;
      font-size: 1.25rem;
    }
    button {
      padding: 0.55rem 1.6rem;
      font-size: 0.85rem;
    }
  }

</style>
</head>
<body>
  <h1>Dynamic Array</h1>
  <h2>Visualizing Capacity & Growth</h2>

  <main aria-label="Dynamic array visualization" role="main">
    <div class="array-container" aria-live="polite" aria-atomic="true">
      <!-- Slots will be dynamically inserted here -->
    </div>
    <div class="controls" role="group" aria-label="Array controls">
      <button id="btn-add" type="button" aria-describedby="descAdd">Add Element</button>
      <button id="btn-reset" type="button" aria-describedby="descReset">Reset Array</button>
    </div>
  </main>

  <footer>
    &copy; 2024 | Crafted as an elegant concept demonstration
  </footer>

<script>
  // Dynamic Array conceptual demo:
  // Starts empty with capacity 4.
  // On each addition: inserts an element. If full, doubles capacity.
  // Visual: filled slots show values, empty slots dimmed.
  // Highlight the last inserted element briefly.

  const container = document.querySelector('.array-container');
  const btnAdd = document.getElementById('btn-add');
  const btnReset = document.getElementById('btn-reset');

  // Initial state
  let capacity = 4;
  let length = 0;
  let arrayValues = []; // store numeric values

  // Timing constants for animations
  const highlightDuration = 1200;

  // Initialize the array UI
  function renderArray() {
    container.innerHTML = '';
    for (let i = 0; i < capacity; i++) {
      const slot = document.createElement('div');
      slot.classList.add('slot');
      slot.setAttribute('data-index', i);
      if (i < length) {
        slot.textContent = arrayValues[i];
        slot.setAttribute('data-empty', 'false');
      } else {
        slot.textContent = '';
        slot.setAttribute('data-empty', 'true');
      }
      container.appendChild(slot);
    }
  }

  // Animate new insertion highlight
  function highlightSlot(index) {
    if (index < 0 || index >= capacity) return;
    const slots = container.querySelectorAll('.slot');
    const slot = slots[index];
    if (!slot) return;
    slot.classList.add('active');
    setTimeout(() => {
      slot.classList.remove('active');
    }, highlightDuration);
  }

  // Add element handler
  btnAdd.addEventListener('click', () => {
    if (length < capacity) {
      // Insert new value
      arrayValues.push(length * 10 + 7);
      length++;
      renderArray();
      highlightSlot(length - 1);
    } else {
      // Double capacity
      capacity *= 2;

      // Flash doubling effect on container
      container.style.transition = 'transform 0.6s ease';
      container.style.transformOrigin = 'center center';
      container.style.transform = 'scale(1.1)';
      
      setTimeout(() => {
        // New capacity: fill additional empty slots with empty
        renderArray();
        container.style.transform = 'scale(1)';
        
        // Animate highlight on last inserted (previous one)
        highlightSlot(length - 1);
      }, 600);
    }
  });

  // Reset array to initial state
  btnReset.addEventListener('click', () => {
    capacity = 4;
    length = 0;
    arrayValues = [];
    renderArray();
  });

  // Initial render
  renderArray();
</script>
</body>
</html>
