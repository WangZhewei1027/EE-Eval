<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refactoring Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>

<h1>Refactoring Interactive Demo</h1>

<h2>Settings</h2>
<button id="add">Add Entry</button>
<button id="clear">Clear All</button>
<input type="text" id="inputField" placeholder="Enter text" />
<button id="submit">Submit</button>

<h2>Entries</h2>
<ul id="entriesList"></ul>

<h2>Metrics</h2>
<p>Total Entries: <span id="totalEntries">0</span></p>
<p>Current Input Length: <span id="currentInputLength">0</span></p>
<p>Max Length: <span id="maxLength">0</span></p>

<h2>Adjust Max Length</h2>
<input type="range" id="maxLengthSlider" min="1" max="100" value="10" />
<span id="maxLengthValue">10</span>

<h2>Refactor Entry</h2>
<label for="refactorIndex">Entry Index:</label>
<input type="number" id="refactorIndex" min="0" />
<input type="text" id="refactorValue" placeholder="New Value" />
<button id="refactor">Refactor</button>

<div id="output"></div>

<script>
    let entries = [];
    let maxLength = 10;

    document.getElementById('add').addEventListener('click', () => {
        const entry = prompt('Enter new entry:');
        if (entry && entry.length <= maxLength) {
            entries.push(entry);
            updateEntriesList();
        } else {
            alert(`Entry must be less than or equal to ${maxLength} characters.`);
        }
    });

    document.getElementById('clear').addEventListener('click', () => {
        entries = [];
        updateEntriesList();
    });

    document.getElementById('submit').addEventListener('click', () => {
        const textValue = document.getElementById('inputField').value;
        if (textValue.length > 0 && textValue.length <= maxLength) {
            entries.push(textValue);
            updateEntriesList();
            document.getElementById('inputField').value = '';
        } else if (textValue.length > maxLength) {
            alert(`Input exceeds max length of ${maxLength}`);
        }
    });

    document.getElementById('maxLengthSlider').addEventListener('input', (event) => {
        maxLength = event.target.value;
        document.getElementById('maxLengthValue').innerText = maxLength;
    });

    document.getElementById('refactor').addEventListener('click', () => {
        const index = parseInt(document.getElementById('refactorIndex').value, 10);
        const newValue = document.getElementById('refactorValue').value;
        if (index >= 0 && index < entries.length) {
            entries[index] = newValue;
            updateEntriesList();
            document.getElementById('refactorIndex').value = '';
            document.getElementById('refactorValue').value = '';
        } else {
            alert("Invalid index");
        }
    });

    function updateEntriesList() {
        const list = document.getElementById('entriesList');
        list.innerHTML = '';
        entries.forEach((entry, index) => {
            const listItem = document.createElement('li');
            listItem.textContent = `${index}: ${entry}`;
            list.appendChild(listItem);
        });
        document.getElementById('totalEntries').innerText = entries.length;
        document.getElementById('currentInputLength').innerText = document.getElementById('inputField').value.length;
        document.getElementById('maxLength').innerText = maxLength;
    }

    document.getElementById('inputField').addEventListener('input', (event) => {
        document.getElementById('currentInputLength').innerText = event.target.value.length;
    });
</script>

</body>
</html>
