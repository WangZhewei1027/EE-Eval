<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Map Visual Representation</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #282c34;
            color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.5s;
        }

        .container {
            text-align: center;
            border-radius: 15px;
            padding: 20px;
            background: linear-gradient(135deg, #3b3e45, #4f5258);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            width: 80%;
            max-width: 800px;
            animation: fadeIn 1s;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 20px;
        }

        p {
            font-size: 1.2rem;
            margin: 0 0 30px;
            opacity: 0.8;
        }

        .hashmap {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .bucket {
            background-color: #61dafb;
            border-radius: 12px;
            margin: 10px;
            padding: 20px;
            width: 150px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
        }

        .bucket:hover {
            transform: scale(1.05);
        }

        .bucket h2 {
            font-size: 1.5rem;
            margin: 0 0 10px;
            color: #282c34;
        }

        .bucket p {
            margin: 0;
            color: #282c34;
            font-weight: bold;
        }

        button {
            background-color: #61dafb;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #21a1f1;
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hash Map Visualization</h1>
        <p>Observe how key-value pairs are stored in a hash map.</p>
        <div class="hashmap">
            <div class="bucket">
                <h2>Bucket 1</h2>
                <p>Key: 1</p>
                <p>Value: Apple</p>
            </div>
            <div class="bucket">
                <h2>Bucket 2</h2>
                <p>Key: 2</p>
                <p>Value: Banana</p>
            </div>
            <div class="bucket">
                <h2>Bucket 3</h2>
                <p>Key: 3</p>
                <p>Value: Cherry</p>
            </div>
            <div class="bucket">
                <h2>Bucket 4</h2>
                <p>Key: 4</p>
                <p>Value: Date</p>
            </div>
            <div class="bucket">
                <h2>Bucket 5</h2>
                <p>Key: 5</p>
                <p>Value: Elderberry</p>
            </div>
        </div>
        <button onclick="alert('This represents a Hash Map!')">Learn More</button>
    </div>

    <script>
        // Simple script to handle button action
        document.querySelector('button').addEventListener('click', function() {
            alert('This represents a Hash Map! Each "bucket" contains key-value pairs.');
        });
    </script>
</body>
</html>
