<!DOCTYPE html>
<html>
<head>
    <title>Interactive Linked List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .controls { margin-bottom: 20px; border: 1px solid #ccc; padding: 10px; }
        .control-group { margin-bottom: 10px; }
        button, input, select { margin-right: 5px; }
        .list-display { border: 1px solid #ccc; padding: 15px; min-height: 100px; }
        .node { display: inline-block; border: 1px solid #000; padding: 5px; margin: 5px; }
        .pointer { display: inline-block; margin: 0 5px; }
        .null { color: #999; }
        .stats { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interactive Linked List</h1>
        
        <div class="controls">
            <div class="control-group">
                <h3>Node Operations</h3>
                <input type="text" id="nodeValue" placeholder="Enter value">
                <button onclick="addToHead()">Add to Head</button>
                <button onclick="addToTail()">Add to Tail</button>
                <button onclick="removeFromHead()">Remove from Head</button>
                <button onclick="removeFromTail()">Remove from Tail</button>
                <button onclick="clearList()">Clear List</button>
            </div>
            
            <div class="control-group">
                <h3>Insert/Remove at Position</h3>
                <input type="number" id="insertPos" placeholder="Position" min="0">
                <input type="text" id="insertValue" placeholder="Value">
                <button onclick="insertAtPosition()">Insert</button>
                <input type="number" id="removePos" placeholder="Position" min="0">
                <button onclick="removeAtPosition()">Remove</button>
            </div>
            
            <div class="control-group">
                <h3>Search Operations</h3>
                <input type="text" id="searchValue" placeholder="Value to find">
                <button onclick="findValue()">Find Value</button>
                <button onclick="findAllOccurrences()">Find All Occurrences</button>
                <button onclick="countOccurrences()">Count Occurrences</button>
            </div>
            
            <div class="control-group">
                <h3>List Manipulation</h3>
                <button onclick="reverseList()">Reverse List</button>
                <button onclick="sortList()">Sort List</button>
                <button onclick="removeDuplicates()">Remove Duplicates</button>
                <button onclick="rotateList()">Rotate List</button>
                <input type="number" id="rotateBy" placeholder="Positions" min="1" value="1">
            </div>
            
            <div class="control-group">
                <h3>Traversal Control</h3>
                <button onclick="startTraversal()">Start Traversal</button>
                <button onclick="stepForward()">Step Forward</button>
                <button onclick="stepBackward()">Step Backward</button>
                <button onclick="stopTraversal()">Stop Traversal</button>
                <span>Speed:</span>
                <input type="range" id="traversalSpeed" min="100" max="2000" value="500">
            </div>
        </div>
        
        <div class="list-display" id="listDisplay">
            <p>List is empty</p>
        </div>
        
        <div class="stats">
            <h3>List Statistics</h3>
            <p>Length: <span id="listLength">0</span></p>
            <p>Head Value: <span id="headValue">null</span></p>
            <p>Tail Value: <span id="tailValue">null</span></p>
            <div id="searchResults"></div>
        </div>
        
        <div class="info">
            <h3>Current Operation Log</h3>
            <div id="operationLog"></div>
        </div>
    </div>

    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.next = null;
            }
        }

        class LinkedList {
            constructor() {
                this.head = null;
                this.tail = null;
                this.length = 0;
                this.traversalNode = null;
                this.traversalInterval = null;
                this.traversalHistory = [];
                this.traversalIndex = -1;
            }

            addToHead(value) {
                const newNode = new Node(value);
                if (!this.head) {
                    this.head = newNode;
                    this.tail = newNode;
                } else {
                    newNode.next = this.head;
                    this.head = newNode;
                }
                this.length++;
                return this;
            }

            addToTail(value) {
                const newNode = new Node(value);
                if (!this.head) {
                    this.head = newNode;
                    this.tail = newNode;
                } else {
                    this.tail.next = newNode;
                    this.tail = newNode;
                }
                this.length++;
                return this;
            }

            removeFromHead() {
                if (!this.head) return null;
                const removedValue = this.head.value;
                this.head = this.head.next;
                this.length--;
                if (this.length === 0) {
                    this.tail = null;
                }
                return removedValue;
            }

            removeFromTail() {
                if (!this.head) return null;
                if (this.length === 1) {
                    return this.removeFromHead();
                }
                let current = this.head;
                let newTail = current;
                while (current.next) {
                    newTail = current;
                    current = current.next;
                }
                this.tail = newTail;
                this.tail.next = null;
                this.length--;
                return current.value;
            }

            insertAt(position, value) {
                if (position < 0 || position > this.length) return false;
                if (position === 0) return !!this.addToHead(value);
                if (position === this.length) return !!this.addToTail(value);

                const newNode = new Node(value);
                let prev = this.getNodeAt(position - 1);
                newNode.next = prev.next;
                prev.next = newNode;
                this.length++;
                return true;
            }

            removeAt(position) {
                if (position < 0 || position >= this.length) return null;
                if (position === 0) return this.removeFromHead();
                if (position === this.length - 1) return this.removeFromTail();

                let prev = this.getNodeAt(position - 1);
                let removed = prev.next;
                prev.next = removed.next;
                this.length--;
                return removed.value;
            }

            getNodeAt(position) {
                if (position < 0 || position >= this.length) return null;
                let current = this.head;
                for (let i = 0; i < position; i++) {
                    current = current.next;
                }
                return current;
            }

            find(value) {
                let current = this.head;
                let position = 0;
                while (current) {
                    if (current.value === value) {
                        return position;
                    }
                    current = current.next;
                    position++;
                }
                return -1;
            }

            findAll(value) {
                let current = this.head;
                let positions = [];
                let index = 0;
                while (current) {
                    if (current.value === value) {
                        positions.push(index);
                    }
                    current = current.next;
                    index++;
                }
                return positions;
            }

            count(value) {
                let current = this.head;
                let count = 0;
                while (current) {
                    if (current.value === value) {
                        count++;
                    }
                    current = current.next;
                }
                return count;
            }

            reverse() {
                let node = null;
                let current = this.head;
                this.head = this.tail;
                this.tail = current;
                while (current) {
                    let next = current.next;
                    current.next = node;
                    node = current;
                    current = next;
                }
                return this;
            }

            sort() {
                const values = [];
                let current = this.head;
                while (current) {
                    values.push(current.value);
                    current = current.next;
                }
                values.sort((a, b) => a - b);
                this.clear();
                values.forEach(val => this.addToTail(val));
                return this;
            }

            removeDuplicates() {
                const seen = new Set();
                let current = this.head;
                let prev = null;
                while (current) {
                    if (seen.has(current.value)) {
                        prev.next = current.next;
                        this.length--;
                        if (!current.next) {
                            this.tail = prev;
                        }
                    } else {
                        seen.add(current.value);
                        prev = current;
                    }
                    current = current.next;
                }
                return this;
            }

            rotate(k) {
                if (this.length <= 1 || k % this.length === 0) return this;
                k = k % this.length;
                if (k < 0) k += this.length;

                let newTailPos = this.length - k - 1;
                let newTail = this.getNodeAt(newTailPos);
                let newHead = newTail.next;

                this.tail.next = this.head;
                this.head = newHead;
                this.tail = newTail;
                this.tail.next = null;

                return this;
            }

            clear() {
                this.head = null;
                this.tail = null;
                this.length = 0;
                return this;
            }

            startTraversal() {
                this.traversalNode = this.head;
                this.traversalHistory = [];
                this.traversalIndex = -1;
                this.recordTraversalState();
                return this.traversalNode;
            }

            stepForward() {
                if (!this.traversalNode) return null;
                this.traversalNode = this.traversalNode.next;
                this.recordTraversalState();
                return this.traversalNode;
            }

            stepBackward() {
                if (this.traversalIndex <= 0) return null;
                this.traversalIndex--;
                this.traversalNode = this.traversalHistory[this.traversalIndex].node;
                return this.traversalNode;
            }

            recordTraversalState() {
                this.traversalHistory = this.traversalHistory.slice(0, this.traversalIndex + 1);
                this.traversalHistory.push({
                    node: this.traversalNode,
                    time: new Date()
                });
                this.traversalIndex++;
            }

            autoTraverse(speed) {
                this.stopTraversal();
                this.startTraversal();
                this.traversalInterval = setInterval(() => {
                    if (!this.stepForward()) {
                        this.stopTraversal();
                    }
                    updateDisplay();
                }, speed);
            }

            stopTraversal() {
                if (this.traversalInterval) {
                    clearInterval(this.traversalInterval);
                    this.traversalInterval = null;
                }
            }
        }

        const list = new LinkedList();
        let highlightedNode = null;

        function updateDisplay() {
            const display = document.getElementById('listDisplay');
            const lengthDisplay = document.getElementById('listLength');
            const headDisplay = document.getElementById('headValue');
            const tailDisplay = document.getElementById('tailValue');
            
            display.innerHTML = '';
            lengthDisplay.textContent = list.length;
            headDisplay.textContent = list.head ? list.head.value : 'null';
            tailDisplay.textContent = list.tail ? list.tail.value : 'null';

            if (list.length === 0) {
                display.innerHTML = '<p>List is empty</p>';
                return;
            }

            let current = list.head;
            let position = 0;
            while (current) {
                const nodeElement = document.createElement('span');
                nodeElement.className = 'node';
                nodeElement.textContent = current.value;
                
                if (current === highlightedNode) {
                    nodeElement.style.backgroundColor = '#eee';
                    nodeElement.style.border = '2px solid #000';
                }
                
                if (current === list.traversalNode) {
                    nodeElement.style.fontWeight = 'bold';
                }
                
                display.appendChild(nodeElement);
                
                if (current.next) {
                    const pointer = document.createElement('span');
                    pointer.className = 'pointer';
                    pointer.textContent = '→';
                    display.appendChild(pointer);
                } else {
                    const nullPointer = document.createElement('span');
                    nullPointer.className = 'pointer null';
                    nullPointer.textContent = '→ null';
                    display.appendChild(nullPointer);
                }
                
                current = current.next;
                position++;
            }
        }

        function logOperation(operation) {
            const log = document.getElementById('operationLog');
            const entry = document.createElement('p');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${operation}`;
            log.prepend(entry);
        }

        function addToHead() {
            const value = document.getElementById('nodeValue').value;
            if (!value) return;
            list.addToHead(value);
            logOperation(`Added ${value} to head`);
            updateDisplay();
        }

        function addToTail() {
            const value = document.getElementById('nodeValue').value;
            if (!value) return;
            list.addToTail(value);
            logOperation(`Added ${value} to tail`);
            updateDisplay();
        }

        function removeFromHead() {
            const value = list.removeFromHead();
            if (value !== null) {
                logOperation(`Removed ${value} from head`);
            } else {
                logOperation('Attempted to remove from empty list');
            }
            updateDisplay();
        }

        function removeFromTail() {
            const value = list.removeFromTail();
            if (value !== null) {
                logOperation(`Removed ${value} from tail`);
            } else {
                logOperation('Attempted to remove from empty list');
            }
            updateDisplay();
        }

        function insertAtPosition() {
            const position = parseInt(document.getElementById('insertPos').value);
            const value = document.getElementById('insertValue').value;
            if (isNaN(position) || !value) return;
            
            if (list.insertAt(position, value)) {
                logOperation(`Inserted ${value} at position ${position}`);
            } else {
                logOperation(`Failed to insert at position ${position}`);
            }
            updateDisplay();
        }

        function removeAtPosition() {
            const position = parseInt(document.getElementById('removePos').value);
            if (isNaN(position)) return;
            
            const value = list.removeAt(position);
            if (value !== null) {
                logOperation(`Removed ${value} from position ${position}`);
            } else {
                logOperation(`Failed to remove from position ${position}`);
            }
            updateDisplay();
        }

        function findValue() {
            const value = document.getElementById('searchValue').value;
            if (!value) return;
            
            const position = list.find(value);
            const results = document.getElementById('searchResults');
            results.innerHTML = '';
            
            if (position >= 0) {
                results.innerHTML = `<p>Value ${value} found at position ${position}</p>`;
                highlightNode(list.getNodeAt(position));
                logOperation(`Found ${value} at position ${position}`);
            } else {
                results.innerHTML = `<p>Value ${value} not found in list</p>`;
                logOperation(`Value ${value} not found`);
            }
        }

        function findAllOccurrences() {
            const value = document.getElementById('searchValue').value;
            if (!value) return;
            
            const positions = list.findAll(value);
            const results = document.getElementById('searchResults');
            results.innerHTML = '';
            
            if (positions.length > 0) {
                results.innerHTML = `<p>Value ${value} found at positions: ${positions.join(', ')}</p>`;
                logOperation(`Found ${value} at positions: ${positions.join(', ')}`);
                
                // Highlight all occurrences
                positions.forEach(pos => {
                    const node = list.getNodeAt(pos);
                    if (node) {
                        setTimeout(() => {
                            highlightNode(node);
                            updateDisplay();
                        }, pos * 300);
                    }
                });
            } else {
                results.innerHTML = `<p>Value ${value} not found in list</p>`;
                logOperation(`Value ${value} not found`);
            }
        }

        function countOccurrences() {
            const value = document.getElementById('searchValue').value;
            if (!value) return;
            
            const count = list.count(value);
            const results = document.getElementById('searchResults');
            results.innerHTML = `<p>Value ${value} appears ${count} time(s) in the list</p>`;
            logOperation(`Counted ${count} occurrences of ${value}`);
        }

        function highlightNode(node) {
            highlightedNode = node;
            updateDisplay();
            setTimeout(() => {
                highlightedNode = null;
                updateDisplay();
            }, 2000);
        }

        function reverseList() {
            list.reverse();
            logOperation('List reversed');
            updateDisplay();
        }

        function sortList() {
            list.sort();
            logOperation('List sorted');
            updateDisplay();
        }

        function removeDuplicates() {
            list.removeDuplicates();
            logOperation('Duplicates removed');
            updateDisplay();
        }

        function rotateList() {
            const k = parseInt(document.getElementById('rotateBy').value) || 1;
            list.rotate(k);
            logOperation(`List rotated by ${k} positions`);
            updateDisplay();
        }

        function clearList() {
            list.clear();
            logOperation('List cleared');
            updateDisplay();
        }

        function startTraversal() {
            list.startTraversal();
            logOperation('Started traversal');
            updateDisplay();
        }

        function stepForward() {
            list.stepForward();
            logOperation('Traversal step forward');
            updateDisplay();
        }

        function stepBackward() {
            list.stepBackward();
            logOperation('Traversal step backward');
            updateDisplay();
        }

        function stopTraversal() {
            list.stopTraversal();
            logOperation('Stopped traversal');
            updateDisplay();
        }

        function autoTraverse() {
            const speed = document.getElementById('traversalSpeed').value;
            list.autoTraverse(speed);
            logOperation(`Started auto traversal (speed: ${speed}ms)`);
        }

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
