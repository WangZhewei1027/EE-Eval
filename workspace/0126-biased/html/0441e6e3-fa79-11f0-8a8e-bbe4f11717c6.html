<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Queue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="priority-queue">
            <div class="queue-container">
                <h2>Priority Queue</h2>
                <div class="queue">
                    <div class="item" id="item-1">
                        <h3>Item 1</h3>
                        <p>Priority: 1</p>
                        <button id="remove-item">Remove</button>
                    </div>
                    <div class="item" id="item-2">
                        <h3>Item 2</h3>
                        <p>Priority: 2</p>
                        <button id="remove-item-2">Remove</button>
                    </div>
                    <div class="item" id="item-3">
                        <h3>Item 3</h3>
                        <p>Priority: 3</p>
                        <button id="remove-item-3">Remove</button>
                    </div>
                </div>
            </div>
            <div class="priority-queue-actions">
                <button id="add-item">Add Item</button>
                <button id="clear-queue">Clear Queue</button>
            </div>
        </div>
        <script src="script.js"></script>
    </div>

    <script src="script.js"></script>
</body>
</html>
