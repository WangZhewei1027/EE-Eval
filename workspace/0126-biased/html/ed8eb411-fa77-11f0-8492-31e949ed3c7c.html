<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutex Visualization</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .container {
            width: 80vw;
            height: 80vh;
            border: 10px solid #0078D4;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #ffffff;
        }

        .mutex-circle {
            width: 300px;
            height: 300px;
            border: 16px solid #0078D4;
            border-radius: 50%;
            position: relative;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .mutex-circle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            background-color: #0078D4;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .button {
            background-color: #0078D4;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            position: absolute;
            bottom: 20px;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #005bb5;
        }

        .text {
            position: absolute;
            top: 10%;
            font-size: 24px;
            color: #333;
            text-align: center;
            width: 100%;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="text">
        <h1>Welcome to the Mutex Visualization</h1>
        <p>Observe the beauty of synchronization.</p>
    </div>
    <div class="mutex-circle"></div>
    <button class="button" onclick="alert('This is a Mutex!')">What is Mutex?</button>
</div>

<script>
    // Basic interactivity limited to button action
    // Alert to provide simple feedback
</script>

</body>
</html>
