<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim Sort Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #654ea3, #eaafc8);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 80%;
            max-width: 800px;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            padding: 20px;
        }
        .bar {
            background: #ff4081;
            transition: all 0.4s ease;
        }
        .sorted {
            background: #4caf50;
        }
        .button {
            margin: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #1e88e5;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .button:hover {
            background: #0d47a1;
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Tim Sort Visualization</h1>
        <div id="bars"></div>
        <button class="button" onclick="startTimSort()">Start Visualization</button>
    </div>

    <script>
        const array = [10, 5, 8, 3, 6, 7, 2, 9, 4, 1];
        const barsContainer = document.getElementById('bars');
        
        function createBars() {
            barsContainer.innerHTML = '';
            array.forEach(value => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${value * 20}px`;
                barsContainer.appendChild(bar);
            });
        }

        function highlightSorted(index) {
            const bars = document.getElementsByClassName('bar');
            bars[index].classList.add('sorted');
        }

        function startTimSort() {
            createBars();
            // Simulating Tim Sort Visualization
            setTimeout(() => highlightSorted(0), 800);
            setTimeout(() => highlightSorted(1), 1600);
            setTimeout(() => highlightSorted(2), 2400);
            setTimeout(() => highlightSorted(3), 3200);
            setTimeout(() => highlightSorted(4), 4000);
            setTimeout(() => highlightSorted(5), 4800);
            setTimeout(() => highlightSorted(6), 5600);
            setTimeout(() => highlightSorted(7), 6400);
            setTimeout(() => highlightSorted(8), 7200);
            setTimeout(() => highlightSorted(9), 8000);
        }
    </script>
</body>
</html>
