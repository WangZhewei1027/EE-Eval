<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Development Life Cycle</title>
    <style>
        body {
            background-color: #000;
        }
        label {
            display: block;
            margin-bottom: 10px;
        }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            background-color: #333;
            color: #fff;
            cursor: pointer;
        }
        button:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <h1>Software Development Life Cycle</h1>
    <p>Phase 1: Requirements Gathering</p>
    <div class="phase">
        <h2>Requirements Gathering</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name"><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email"><br><br>
            <label for="message">Message:</label>
            <textarea id="message" name="message"></textarea><br><br>
            <input type="submit" value="Submit">
        </form>
    </div>
    <p>Phase 2: Design</p>
    <div class="phase">
        <h2>Design</h2>
        <form>
            <label for="color">Color:</label>
            <select id="color" name="color">
                <option value="red">Red</option>
                <option value="green">Green</option>
                <option value="blue">Blue</option>
            </select><br><br>
            <label for="shape">Shape:</label>
            <select id="shape" name="shape">
                <option value="circle">Circle</option>
                <option value="square">Square</option>
                <option value="triangle">Triangle</option>
            </select><br><br>
            <label for="size">Size:</label>
            <input type="number" id="size" name="size"><br><br>
            <input type="submit" value="Submit">
        </form>
    </div>
    <p>Phase 3: Implementation</p>
    <div class="phase">
        <h2>Implementation</h2>
        <form>
            <label for="language">Language:</label>
            <select id="language" name="language">
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="javascript">JavaScript</option>
            </select><br><br>
            <label for="framework">Framework:</label>
            <select id="framework" name="framework">
                <option value="django">Django</option>
                <option value="flask">Flask</option>
                <option value="angular">Angular</option>
            </select><br><br>
            <label for="database">Database:</label>
            <select id="database" name="database">
                <option value="mysql">MySQL</option>
                <option value="postgres">Postgres</option>
                <option value="mongodb">MongoDB</option>
            </select><br><br>
            <input type="submit" value="Submit">
        </form>
    </div>
    <p>Phase 4: Testing</p>
    <div class="phase">
        <h2>Testing</h2>
        <form>
            <label for="test_type">Test Type:</label>
            <select id="test_type" name="test_type">
                <option value="unit">Unit</option>
                <option value="integration">Integration</option>
                <option value="system">System</option>
            </select><br><br>
            <label for="test_case">Test Case:</label>
            <input type="text" id="test_case" name="test_case"><br><br>
            <label for="expected_result">Expected Result:</label>
            <input type="text" id="expected_result" name="expected_result"><br><br>
            <input type="submit" value="Submit">
        </form>
    </div>
    <p>Phase 5: Deployment</p>
    <div class="phase">
        <h2>Deployment</h2>
        <form>
            <label for="deployment_type">Deployment Type:</label>
            <select id="deployment_type" name="deployment_type">
                <option value="web">Web</option>
                <option value="mobile">Mobile</option>
                <option value="desktop">Desktop</option>
            </select><br><br>
            <label for="deployment_method">Deployment Method:</label>
            <select id="deployment_method" name="deployment_method">
                <option value="git">Git</option>
                <option value="svn">SVN</option>
                <option value="mercurial">Mercurial</option>
            </select><br><br>
            <input type="submit" value="Submit">
        </form>
    </div>
    <p>Phase 6: Maintenance</p>
    <div class="phase">
        <h2>Maintenance</h2>
        <form>
            <label for="bug_report">Bug Report:</label>
            <textarea id="bug_report" name="bug_report"></textarea><br><br>
            <label for="solution">Solution:</label>
            <textarea id="solution" name="solution"></textarea><br><br>
            <input type="submit" value="Submit">
        </form>
    </div>
    <button onclick="generatePage()">Generate Page</button>
    <script>
        function generatePage() {
            var phase = document.querySelector('.phase');
            phase.innerHTML = '';
            phase.className = 'phase';

            var name = document.querySelector('#name');
            var email = document.querySelector('#email');
            var message = document.querySelector('#message');
            var color = document.querySelector('#color');
            var shape = document.querySelector('#shape');
            var size = document.querySelector('#size');
            var language = document.querySelector('#language');
            var framework = document.querySelector('#framework');
            var database = document.querySelector('#database');
            var test_type = document.querySelector('#test_type');
            var test_case = document.querySelector('#test_case');
            var expected_result = document.querySelector('#expected_result');
            var deployment_type = document.querySelector('#deployment_type');
            var deployment_method = document.querySelector('#deployment_method');
            var bug_report = document.querySelector('#bug_report');
            var solution = document.querySelector('#solution');

            name.value = 'John Doe';
            email.value = 'john.doe@example.com';
            message.value = 'This is a sample message.';
            color.value = 'red';
            shape.value = 'circle';
            size.value = 10;
            language.value = 'python';
            framework.value = 'django';
            database.value = 'mysql';
            test_type.value = 'unit';
            test_case.value = 'test1';
            expected_result.value = 'This is an expected result.';
            deployment_type.value = 'web';
            deployment_method.value = 'git';
            bug_report.value = 'This is a bug report.';
            solution.value = 'This is a solution.';
        }
    </script>
</body>
</html>
