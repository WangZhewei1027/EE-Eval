<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deque - Elegant Visual Exploration</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display&family=Space+Grotesk:wght@400;700&display=swap');

  /* Root and Reset */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }
  html, body {
    height: 100%;
    background: linear-gradient(135deg, #1f2937, #3b82f6);
    font-family: 'Space Grotesk', sans-serif;
    color: #e0e7ff;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Container */
  .container {
    width: 900px;
    max-width: 90vw;
    background: linear-gradient(145deg, #0f1624, #192736);
    border-radius: 35px;
    box-shadow:
      0 0 40px rgba(59,130,246,0.4),
      inset 0 0 30px #2563eb;
    padding: 3rem 4rem;
    overflow: hidden;
  }

  /* Heading */
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 3.8rem;
    color: #60a5fa;
    text-align: center;
    margin-bottom: 1rem;
    letter-spacing: 0.15em;
    user-select: none;
    text-shadow:
      0 0 8px #3b82f6cc,
      0 0 12px #2563ebcc;
  }

  /* Subtitle */
  .subtitle {
    font-weight: 600;
    font-size: 1.25rem;
    color: #93c5fd;
    text-align: center;
    margin-bottom: 3.5rem;
    font-style: italic;
    user-select: none;
    text-shadow: 0 0 6px #60a5faaa;
  }

  /* Deque Visual */
  .deque {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    perspective: 1500px;
  }

  /* Node Style */
  .node {
    position: relative;
    background: linear-gradient(145deg, #2563eb, #3b82f6);
    border-radius: 15px;
    width: 85px;
    height: 85px;
    box-shadow:
      0 10px 15px -3px rgba(14, 165, 233, 0.6),
      0 4px 6px -2px rgba(14, 165, 233, 0.4);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #ecfeff;
    font-weight: 700;
    font-size: 1.12rem;
    letter-spacing: 0.1em;
    user-select: none;
    text-transform: uppercase;
    transition: transform 0.6s ease;
    box-reflect: below 0
      linear-gradient(transparent, transparent 30%, rgba(96,165,250,0.3));
  }
  .node::before {
    content: "";
    position: absolute;
    top: -8px; left: -8px; right: -8px; bottom: -8px;
    border-radius: 22px;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 50%, #60a5fa88 15%, transparent 70%),
      conic-gradient(from 90deg, #2563eb44, #3b82f6aa);
    filter: blur(3.8px);
    opacity: 0.35;
    z-index: -1;
  }
  .node span.value {
    line-height: 1.15;
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
  }
  .node span.label {
    font-weight: 500;
    font-size: 0.75rem;
    margin-top: 5px;
    color: #bae6fdcc;
  }

  /* Arrows between nodes */
  .arrow {
    width: 40px;
    height: 24px;
    margin: auto 0;
    position: relative;
  }
  .arrow svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 0 2px #60a5fa88);
  }
  /* Pulsate animation for arrow */
  .arrow svg path {
    stroke: #93c5fddd;
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    animation: pulseArrow 2.8s linear infinite;
  }
  @keyframes pulseArrow {
    0%, 100% { stroke-dashoffset: 0; stroke-opacity: 1; }
    50% { stroke-dashoffset: 14; stroke-opacity: 0.5; }
  }

  /* Controls at bottom */
  .controls {
    margin-top: 4rem;
    display: flex;
    justify-content: center;
    gap: 2rem;
  }
  .button {
    background: #2563eb;
    border: none;
    border-radius: 12px;
    padding: 0.65rem 1.75rem;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: #ecfeff;
    cursor: pointer;
    box-shadow:
      0 6px 12px rgba(37, 99, 235, 0.7);
    transition:
      background-color 0.4s ease,
      box-shadow 0.4s ease,
      transform 0.25s ease;
    user-select: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .button:hover {
    background: #3b82f6;
    box-shadow:
      0 10px 18px rgba(59, 130, 246, 0.9);
    transform: translateY(-3px);
  }
  .button:active {
    transform: translateY(0);
    box-shadow:
      0 5px 10px rgba(37, 99, 235, 0.7);
  }

  /* Concept Description */
  .description {
    max-width: 760px;
    margin: 2rem auto 0 auto;
    font-size: 1.05rem;
    line-height: 1.5;
    color: #93c5fdcc;
    font-style: italic;
    text-align: center;
    user-select:none;
    pointer-events:none;
  }

  /* Glow highlight for active node */
  .node.active {
    animation: glowPulse 2.5s infinite ease-in-out;
    box-shadow:
      0 0 12px 3px #60a5fa,
      0 0 20px 8px #3b82f6aa;
  }

  @keyframes glowPulse {
    0%, 100% {
      box-shadow:
        0 0 12px 3px #60a5fa,
        0 0 20px 8px #3b82f6aa;
      filter: brightness(1);
    }
    50% {
      box-shadow:
        0 0 24px 5px #93c5fd,
        0 0 36px 14px #60a5faee;
      filter: brightness(1.1);
    }
  }

  /* Subtle background shapes - faint, layered */
  .bg-shapes {
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 120vw;
    height: 115vh;
    pointer-events: none;
    z-index: 0;
  }
  .bg-shapes svg {
    position: absolute;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .bg-shape1 {
    top: 12vh;
    left: 10vw;
    width: 260px; height: 260px;
    stroke: #2563eb33;
    filter: drop-shadow(0 0 30px #2563eb50);
    transform-origin: center;
    animation: rotateSlow 120s linear infinite;
  }
  .bg-shape2 {
    bottom: 15vh;
    right: 15vw;
    width: 320px; height: 320px;
    stroke: #3b82f633;
    filter: drop-shadow(0 0 40px #3b82f650);
    transform-origin: center;
    animation: rotateSlowReverse 85s linear infinite;
  }
  @keyframes rotateSlow {
    0% { transform: rotate(0deg);}
    100% { transform: rotate(360deg);}
  }
  @keyframes rotateSlowReverse {
    0% { transform: rotate(360deg);}
    100% { transform: rotate(0deg);}
  }
</style>
</head>
<body>
  <div class="container" role="main" aria-label="Deque visualization">
    <h1>DEQUE</h1>
    <div class="subtitle">Double-Ended Queue Data Structure Visualized</div>
    <div class="deque" aria-live="polite" aria-atomic="true" aria-relevant="additions removals">
      <!-- Nodes inserted dynamically -->
    </div>
    <div class="controls" role="region" aria-label="Deque controls">
      <button class="button" id="pushFront" aria-describedby="descPushFront">Push Front</button>
      <button class="button" id="popBack" aria-describedby="descPopBack">Pop Back</button>
    </div>
    <p class="description" id="descPushFront">Add a new element to the front of the deque.</p>
    <p class="description" id="descPopBack">Remove an element from the back of the deque.</p>
  </div>
  <div class="bg-shapes" aria-hidden="true">
    <svg viewBox="0 0 100 100" class="bg-shape1" >
      <circle cx="50" cy="50" r="48" stroke-dasharray="15 7" />
    </svg>
    <svg viewBox="0 0 100 100" class="bg-shape2" >
      <rect x="12" y="12" width="76" height="76" rx="24" ry="24" stroke-dasharray="18 5 8" />
    </svg>
  </div>

<script>
  (() => {
    const dequeEl = document.querySelector('.deque');
    const pushFrontBtn = document.getElementById('pushFront');
    const popBackBtn = document.getElementById('popBack');

    // Initial data in deque
    let deque = [18, 7, 35, 22];

    // Animate arrows - a smooth pulsating dash offset handled by CSS;

    // Render deque nodes with arrows
    function renderDeque() {
      dequeEl.innerHTML = '';
      for(let i=0; i<deque.length; i++) {
        const node = document.createElement('div');
        node.classList.add('node');
        // Mark active center-ish node for glow if length>2, else first
        if(deque.length >= 3 && i === Math.floor(deque.length/2)) {
          node.classList.add('active');
        } else if(deque.length < 3 && i === 0) {
          node.classList.add('active');
        }

        // Node content: large value and label
        node.innerHTML = `<span class="value">${deque[i]}</span><span class="label">Node</span>`;
        dequeEl.appendChild(node);

        // If not last node, add arrow between
        if(i < deque.length -1) {
          const arrow = document.createElement('div');
          arrow.classList.add('arrow');
          arrow.setAttribute('aria-hidden', 'true');
          arrow.innerHTML = `
            <svg viewBox="0 0 40 24" fill="none" xmlns="http://www.w3.org/2000/svg" >
              <path d="M2 12h36M30 6l8 6-8 6"/>
            </svg>
          `;
          dequeEl.appendChild(arrow);
        }
      }
    }

    // Utility: Generate random integer 10-99
    function randomValue() {
      return Math.floor(Math.random()*90)+10;
    }

    // Limit deque size visually & logically
    const MAX_SIZE = 7;

    // Push Front with subtle animation highlight
    pushFrontBtn.addEventListener('click', () => {
      if(deque.length >= MAX_SIZE) {
        // brief shake animation on container to indicate full
        dequeEl.classList.add('shake');
        setTimeout(() => dequeEl.classList.remove('shake'), 440);
        return;
      }
      const newVal = randomValue();
      deque.unshift(newVal);
      renderDeque();
      // small animation on new front node
      const firstNode = dequeEl.querySelector('.node');
      firstNode.style.transform = 'scale(1.25)';
      setTimeout(() => {
        firstNode.style.transition = 'transform 0.5s ease';
        firstNode.style.transform = 'scale(1)';
      },1);
      setTimeout(() => firstNode.style.transition = '', 520);
    });

    // Pop Back with highlight fade out
    popBackBtn.addEventListener('click', () => {
      if(deque.length === 0) {
        dequeEl.classList.add('shake');
        setTimeout(() => dequeEl.classList.remove('shake'), 440);
        return;
      }
      const lastNodeIndex = deque.length -1;
      // Animate fade of last node, then pop and rerender
      const nodes = dequeEl.querySelectorAll('.node');
      if(nodes[lastNodeIndex]) {
        nodes[lastNodeIndex].style.transition = 'transform 0.45s ease, opacity 0.45s ease';
        nodes[lastNodeIndex].style.transform = 'scale(0.65)';
        nodes[lastNodeIndex].style.opacity = '0';
        setTimeout(() => {
          deque.pop();
          renderDeque();
        },460);
      } else {
        // fallback
        deque.pop();
        renderDeque();
      }
    });

    // Initial render
    renderDeque();

    // Add subtle shake keyframes
    const style = document.createElement('style');
    style.textContent = `
      @keyframes shakeX {
        0%, 100% { transform: translateX(0) }
        25% { transform: translateX(-6px) }
        50% { transform: translateX(6px) }
        75% { transform: translateX(-4px) }
      }
      .shake {
        animation: shakeX 0.44s cubic-bezier(.36,.07,.19,.97);
      }
    `;
    document.head.appendChild(style);
  })();
</script>
</body>
</html>
