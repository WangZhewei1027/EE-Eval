<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Nearest Neighbors Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { font-size: 20px; }
        .control { margin: 10px 0; }
    </style>
</head>
<body>
    <h1>K-Nearest Neighbors Interactive Demo</h1>

    <div class="control">
        <label for="data-points">Number of Data Points (1-10): </label>
        <input type="number" id="data-points" min="1" max="10" value="5">
        <button id="generate-points">Generate Points</button>
    </div>

    <div id="points"></div>

    <div class="control">
        <label for="k-value">K (1-10): </label>
        <input type="number" id="k-value" min="1" max="10" value="3">
    </div>

    <div class="control">
        <label for="new-point">Add New Point (x,y): </label>
        <input type="text" id="new-point" placeholder="e.g. 4,5">
        <button id="add-point">Add Point</button>
    </div>

    <button id="run-knn">Run K-NN</button>

    <h2>Results</h2>
    <div id="results"></div>

    <script>
        let dataPoints = [];

        document.getElementById('generate-points').onclick = function() {
            const numPoints = parseInt(document.getElementById('data-points').value);
            dataPoints = [];
            for (let i = 0; i < numPoints; i++) {
                const x = Math.floor(Math.random() * 10);
                const y = Math.floor(Math.random() * 10);
                dataPoints.push({ x, y });
            }
            renderPoints();
        };

        document.getElementById('add-point').onclick = function() {
            const input = document.getElementById('new-point').value.split(',');
            if (input.length === 2) {
                const x = parseFloat(input[0].trim());
                const y = parseFloat(input[1].trim());
                dataPoints.push({ x, y });
                renderPoints();
            }
        };

        function renderPoints() {
            const pointsDiv = document.getElementById('points');
            pointsDiv.innerHTML = '<h3>Data Points</h3>' + dataPoints.map(p => `(${p.x}, ${p.y})`).join('<br>');
        }

        document.getElementById('run-knn').onclick = function() {
            const k = parseInt(document.getElementById('k-value').value);
            if (dataPoints.length < k) {
                alert('Number of data points is less than K.');
                return;
            }
            const distances = dataPoints.map(point => {
                const lastPoint = dataPoints[dataPoints.length - 1]; // last point is the new point we added
                const distance = Math.sqrt(Math.pow(point.x - lastPoint.x, 2) + Math.pow(point.y - lastPoint.y, 2));
                return { point, distance };
            });

            distances.sort((a, b) => a.distance - b.distance);
            const nearestNeighbors = distances.slice(0, k).map(d => d.point);
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `<strong>Nearest Neighbors:</strong><br>` + nearestNeighbors.map(p => `(${p.x}, ${p.y})`).join('<br>');
        };
    </script>
</body>
</html>
