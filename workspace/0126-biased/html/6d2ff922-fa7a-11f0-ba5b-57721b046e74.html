<!DOCTYPE html>
<html>
<head>
    <title>Thread Explorer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .thread {
            margin-bottom: 20px;
            border-left: 2px solid #000;
            padding-left: 10px;
        }
        .post {
            margin-bottom: 10px;
            padding: 5px;
        }
        .controls {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #000;
        }
        button, input, select {
            margin: 5px;
        }
        .hidden {
            display: none;
        }
        #threadVisualization {
            height: 300px;
            border: 1px solid #000;
            margin: 20px 0;
            overflow: auto;
        }
    </style>
</head>
<body>
    <h1>Thread Explorer</h1>
    
    <div class="controls">
        <h2>Thread Controls</h2>
        <button id="createThread">Create New Thread</button>
        <button id="loadDemo">Load Demo Thread</button>
        <button id="clearAll">Clear All</button>
        
        <div>
            <label>Thread Depth: <input type="range" id="threadDepth" min="1" max="10" value="3"></label>
            <span id="depthValue">3</span>
        </div>
        
        <div>
            <label>Branching Factor: <input type="range" id="branchingFactor" min="1" max="5" value="2"></label>
            <span id="branchValue">2</span>
        </div>
        
        <div>
            <label>Thread Style: 
                <select id="threadStyle">
                    <option value="linear">Linear</option>
                    <option value="tree">Tree</option>
                    <option value="web">Web</option>
                </select>
            </label>
        </div>
    </div>
    
    <div id="threadContainer"></div>
    
    <div class="controls">
        <h2>Post Controls</h2>
        <div id="postControls" class="hidden">
            <textarea id="postContent" rows="3" cols="50" placeholder="Enter your post content"></textarea>
            <button id="submitPost">Submit Post</button>
            <button id="replyToPost">Reply to This Post</button>
            <button id="editPost">Edit Post</button>
            <button id="deletePost">Delete Post</button>
            <button id="upvotePost">Upvote</button>
            <button id="downvotePost">Downvote</button>
            <span id="voteCount">Votes: 0</span>
        </div>
    </div>
    
    <div class="controls">
        <h2>Thread Analysis</h2>
        <button id="analyzeThread">Analyze Thread</button>
        <div id="analysisResults" class="hidden">
            <p>Post Count: <span id="postCount">0</span></p>
            <p>Max Depth: <span id="maxDepth">0</span></p>
            <p>Average Replies: <span id="avgReplies">0</span></p>
            <p>Most Active User: <span id="mostActiveUser">None</span></p>
        </div>
    </div>
    
    <div id="threadVisualization"></div>
    
    <script>
        // State management
        const state = {
            currentThread: null,
            selectedPost: null,
            posts: {},
            users: ['User1', 'User2', 'User3', 'User4'],
            nextPostId: 1
        };
        
        // DOM elements
        const elements = {
            threadContainer: document.getElementById('threadContainer'),
            postControls: document.getElementById('postControls'),
            postContent: document.getElementById('postContent'),
            submitPost: document.getElementById('submitPost'),
            replyToPost: document.getElementById('replyToPost'),
            editPost: document.getElementById('editPost'),
            deletePost: document.getElementById('deletePost'),
            upvotePost: document.getElementById('upvotePost'),
            downvotePost: document.getElementById('downvotePost'),
            voteCount: document.getElementById('voteCount'),
            createThread: document.getElementById('createThread'),
            loadDemo: document.getElementById('loadDemo'),
            clearAll: document.getElementById('clearAll'),
            threadDepth: document.getElementById('threadDepth'),
            depthValue: document.getElementById('depthValue'),
            branchingFactor: document.getElementById('branchingFactor'),
            branchValue: document.getElementById('branchValue'),
            threadStyle: document.getElementById('threadStyle'),
            analyzeThread: document.getElementById('analyzeThread'),
            analysisResults: document.getElementById('analysisResults'),
            postCount: document.getElementById('postCount'),
            maxDepth: document.getElementById('maxDepth'),
            avgReplies: document.getElementById('avgReplies'),
            mostActiveUser: document.getElementById('mostActiveUser'),
            threadVisualization: document.getElementById('threadVisualization')
        };
        
        // Event listeners
        elements.createThread.addEventListener('click', createNewThread);
        elements.loadDemo.addEventListener('click', loadDemoThread);
        elements.clearAll.addEventListener('click', clearAllThreads);
        elements.submitPost.addEventListener('click', submitPost);
        elements.replyToPost.addEventListener('click', replyToPost);
        elements.editPost.addEventListener('click', editPost);
        elements.deletePost.addEventListener('click', deletePost);
        elements.upvotePost.addEventListener('click', () => voteOnPost(1));
        elements.downvotePost.addEventListener('click', () => voteOnPost(-1));
        elements.analyzeThread.addEventListener('click', analyzeThread);
        elements.threadDepth.addEventListener('input', updateDepthValue);
        elements.branchingFactor.addEventListener('input', updateBranchValue);
        
        // Initialize
        updateDepthValue();
        updateBranchValue();
        
        // Functions
        function updateDepthValue() {
            elements.depthValue.textContent = elements.threadDepth.value;
        }
        
        function updateBranchValue() {
            elements.branchValue.textContent = elements.branchingFactor.value;
        }
        
        function createNewThread() {
            state.currentThread = {
                id: Date.now(),
                rootPost: null,
                style: elements.threadStyle.value
            };
            state.posts = {};
            state.nextPostId = 1;
            renderThreadControls();
            renderThread();
        }
        
        function loadDemoThread() {
            createNewThread();
            
            // Create demo posts
            const rootPost = createPost("Welcome to the demo thread! This is everyone doing today?", state.users[0]);
            state.currentThread.rootPost = rootPost.id;
            
            const reply1 = createPost("I'm doing great! Thanks for asking.", state.users[1], rootPost.id);
            const reply2 = createPost("Could be better, but not bad overall.", state.users[2], rootPost.id);
            
            const reply1_1 = createPost("That's awesome to hear!", state.users[3], reply1.id);
            const reply1_2 = createPost("What have you been up to?", state.users[0], reply1.id);
            
            const reply2_1 = createPost("Hope things improve for you soon.", state.users[1], reply2.id);
            
            renderThread();
        }
        
        function clearAllThreads() {
            state.currentThread = null;
            state.posts = {};
            state.selectedPost = null;
            elements.threadContainer.innerHTML = '';
            elements.postControls.classList.add('hidden');
            elements.analysisResults.classList.add('hidden');
        }
        
        function createPost(content, author, parentId = null) {
            const post = {
                id: state.nextPostId++,
                content: content,
                author: author,
                parentId: parentId,
                replies: [],
                votes: 0,
                timestamp: new Date()
            };
            
            state.posts[post.id] = post;
            
            if (parentId) {
                state.posts[parentId].replies.push(post.id);
            }
            
            return post;
        }
        
        function submitPost() {
            const content = elements.postContent.value.trim();
            if (!content) return;
            
            if (!state.selectedPost) {
                // New root post
                const post = createPost(content, getRandomUser());
                state.currentThread.rootPost = post.id;
            } else {
                // Reply to existing post
                createPost(content, getRandomUser(), state.selectedPost);
            }
            
            elements.postContent.value = '';
            renderThread();
        }
        
        function replyToPost() {
            if (!state.selectedPost) return;
            elements.postContent.focus();
        }
        
        function editPost() {
            if (!state.selectedPost) return;
            const post = state.posts[state.selectedPost];
            elements.postContent.value = post.content;
        }
        
        function deletePost() {
            if (!state.selectedPost) return;
            
            if (state.selectedPost === state.currentThread.rootPost) {
                // Deleting root post deletes entire thread
                clearAllThreads();
                return;
            }
            
            // Find parent and remove from replies
            const post = state.posts[state.selectedPost];
            if (post.parentId) {
                const parent = state.posts[post.parentId];
                parent.replies = parent.replies.filter(id => id !== post.id);
            }
            
            // Delete post and all its replies recursively
            deletePostAndReplies(post.id);
            
            state.selectedPost = null;
            elements.postControls.classList.add('hidden');
            renderThread();
        }
        
        function deletePostAndReplies(postId) {
            const post = state.posts[postId];
            if (!post) return;
            
            // First delete all replies
            post.replies.forEach(replyId => {
                deletePostAndReplies(replyId);
            });
            
            // Then delete the post itself
            delete state.posts[postId];
        }
        
        function voteOnPost(value) {
            if (!state.selectedPost) return;
            state.posts[state.selectedPost].votes += value;
            updateVoteDisplay();
        }
        
        function updateVoteDisplay() {
            if (!state.selectedPost) return;
            elements.voteCount.textContent = `Votes: ${state.posts[state.selectedPost].votes}`;
        }
        
        function getRandomUser() {
            return state.users[Math.floor(Math.random() * state.users.length)];
        }
        
        function selectPost(postId) {
            state.selectedPost = postId;
            elements.postControls.classList.remove('hidden');
            updateVoteDisplay();
        }
        
        function renderThread() {
            if (!state.currentThread || !state.currentThread.rootPost) {
                elements.threadContainer.innerHTML = '<p>No thread created yet.</p>';
                return;
            }
            
            elements.threadContainer.innerHTML = '';
            
            if (state.currentThread.style === 'linear') {
                renderLinearThread(state.currentThread.rootPost, 0);
            } else if (state.currentThread.style === 'tree') {
                renderTreeThread(state.currentThread.rootPost, 0);
            } else {
                renderWebThread(state.currentThread.rootPost);
            }
            
            updateVisualization();
        }
        
        function renderLinearThread(postId, depth) {
            const post = state.posts[postId];
            if (!post) return;
            
            const postElement = document.createElement('div');
            postElement.className = 'post';
            postElement.style.marginLeft = `${depth * 20}px`;
            postElement.innerHTML = `
                <p><strong>${post.author}</strong> - ${post.timestamp.toLocaleTimeString()}</p>
                <p>${post.content}</p>
                <p>Votes: ${post.votes}</p>
            `;
            postElement.addEventListener('click', (e) => {
                e.stopPropagation();
                selectPost(post.id);
            });
            
            elements.threadContainer.appendChild(postElement);
            
            // Render replies in order
            post.replies.forEach(replyId => {
                renderLinearThread(replyId, depth + 1);
            });
        }
        
        function renderTreeThread(postId, depth) {
            const post = state.posts[postId];
            if (!post) return;
            
            const threadElement = document.createElement('div');
            threadElement.className = 'thread';
            
            const postElement = document.createElement('div');
            postElement.className = 'post';
            postElement.innerHTML = `
                <p><strong>${post.author}</strong> - ${post.timestamp.toLocaleTimeString()}</p>
                <p>${post.content}</p>
                <p>Votes: ${post.votes}</p>
            `;
            postElement.addEventListener('click', (e) => {
                e.stopPropagation();
                selectPost(post.id);
            });
            
            threadElement.appendChild(postElement);
            
            // Render replies
            if (post.replies.length > 0) {
                const repliesContainer = document.createElement('div');
                post.replies.forEach(replyId => {
                    renderTreeThread(replyId, depth + 1, repliesContainer);
                });
                threadElement.appendChild(repliesContainer);
            }
            
            elements.threadContainer.appendChild(threadElement);
        }
        
        function renderWebThread(rootPostId) {
            // For web style, we'll show all posts and their connections
            elements.threadVisualization.innerHTML = '';
            
            // Create a container for the web visualization
            const webContainer = document.createElement('div');
            webContainer.style.position = 'relative';
            webContainer.style.height = '100%';
            webContainer.style.width = '100%';
            
            // Calculate positions for all posts
            const positions = calculateWebPositions(rootPostId);
            
            // Create post elements
            Object.keys(positions).forEach(postId => {
                const pos = positions[postId];
                const post = state.posts[postId];
                
                const postElement = document.createElement('div');
                postElement.style.position = 'absolute';
                postElement.style.left = `${pos.x}%`;
                postElement.style.top = `${pos.y}%`;
                postElement.style.width = '100px';
                postElement.style.border = '1px solid black';
                postElement.style.padding = '5px';
                postElement.style.backgroundColor = 'white';
                postElement.style.zIndex = '2';
                postElement.innerHTML = `
                    <p><small>${post.author}</small></p>
                    <p>${post.content.substring(0, 20)}${post.content.length > 20 ? '...' : ''}</p>
                `;
                postElement.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectPost(post.id);
                });
                
                webContainer.appendChild(postElement);
            });
            
            // Create connection lines
            Object.keys(state.posts).forEach(postId => {
                const post = state.posts[postId];
                if (post.parentId && positions[postId] && positions[post.parentId]) {
                    const line = document.createElement('div');
                    line.style.position = 'absolute';
                    line.style.borderTop = '1px solid black';
                    
                    const start = positions[post.parentId];
                    const end = positions[postId];
                    
                    // Calculate line position and rotation
                    const length = Math.sqrt(Math.pow(end.x - start.x, 2) + Math.pow(end.y - start.y, 2));
                    const angle = Math.atan2(end.y - start.y, end.x - start.x) * 180 / Math.PI;
                    
                    line.style.width = `${length}%`;
                    line.style.left = `${start.x}%`;
                    line.style.top = `${start.y}%`;
                    line.style.transformOrigin = '0 0';
                    line.style.transform = `rotate(${angle}deg)`;
                    line.style.zIndex = '1';
                    
                    webContainer.appendChild(line);
                }
            });
            
            elements.threadVisualization.appendChild(webContainer);
        }
        
        function calculateWebPositions(rootPostId) {
            const positions = {};
            const centerX = 50;
            const centerY = 50;
            const radius = 40;
            
            // Position root post at center
            positions[rootPostId] = { x: centerX, y: centerY };
            
            // Position other posts in a circle around their parent
            positionChildren(rootPostId, centerX, centerY, radius);
            
            return positions;
            
            function positionChildren(postId, parentX, parentY, radius) {
                const post = state.posts[postId];
                if (!post || post.replies.length === 0) return;
                
                const angleStep = 360 / post.replies.length;
                let currentAngle = 0;
                
                post.replies.forEach(replyId => {
                    const angleRad = currentAngle * Math.PI / 180;
                    const x = parentX + radius * Math.cos(angleRad);
                    const y = parentY + radius * Math.sin(angleRad);
                    
                    positions[replyId] = { x, y };
                    
                    // Position children with smaller radius
                    positionChildren(replyId, x, y, radius * 0.7);
                    
                    currentAngle += angleStep;
                });
            }
        }
        
        function updateVisualization() {
            if (!state.currentThread) return;
            
            if (state.currentThread.style === 'web') {
                renderWebThread(state.currentThread.rootPost);
            } else {
                elements.threadVisualization.innerHTML = '';
            }
        }
        
        function analyzeThread() {
            if (!state.currentThread) return;
            
            const postIds = Object.keys(state.posts);
            if (postIds.length === 0) return;
            
            // Calculate stats
            const postCount = postIds.length;
            
            let maxDepth = 0;
            let totalReplies = 0;
            const userActivity = {};
            
            postIds.forEach(postId => {
                const post = state.posts[postId];
                
                // Calculate depth
                let depth = 0;
                let current = post;
                while (current.parentId) {
                    depth++;
                    current = state.posts[current.parentId];
                }
                maxDepth = Math.max(maxDepth, depth);
                
                // Count user activity
                userActivity[post.author] = (userActivity[post.author] || 0) + 1;
                
                // Count replies (for average)
                if (post.parentId) {
                    totalReplies++;
                }
            });
            
            // Find most active user
            let mostActiveUser = 'None';
            let maxPosts = 0;
            for (const user in userActivity) {
                if (userActivity[user] > maxPosts) {
                    mostActiveUser = user;
                    maxPosts = userActivity[user];
                }
            }
            
            // Update UI
            elements.postCount.textContent = postCount;
            elements.maxDepth.textContent = maxDepth;
            elements.avgReplies.textContent = (totalReplies / postCount).toFixed(2);
            elements.mostActiveUser.textContent = mostActiveUser;
            
            elements.analysisResults.classList.remove('hidden');
        }
        
        // Initial render
        renderThread();
    </script>
</body>
</html>
