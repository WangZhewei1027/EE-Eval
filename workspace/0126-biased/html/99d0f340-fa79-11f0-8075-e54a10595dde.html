<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garbage Collection Simulation</title>
    <script>
        let objects = [];
        let maxObjects = 10;

        function createObject() {
            if (objects.length < maxObjects) {
                objects.push({ id: objects.length + 1, value: Math.random() });
                updateDisplay();
            } else {
                alert('Maximum object limit reached.');
            }
        }

        function collectGarbage() {
            objects = objects.filter(obj => obj.value > 0.5);
            updateDisplay();
        }

        function modifyObject(id) {
            const obj = objects.find(o => o.id === id);
            if (obj) {
                obj.value = Math.random();
                updateDisplay();
            }
        }

        function updateDisplay() {
            const list = document.getElementById('objectList');
            list.innerHTML = '';
            objects.forEach(obj => {
                const item = document.createElement('div');
                item.textContent = `Object ${obj.id}: ${obj.value.toFixed(2)}`;
                const button = document.createElement('button');
                button.textContent = 'Modify';
                button.onclick = () => modifyObject(obj.id);
                item.appendChild(button);
                list.appendChild(item);
            });
            document.getElementById('objectCount').textContent = `Objects in memory: ${objects.length}`;
        }

        function clearAllObjects() {
            objects = [];
            updateDisplay();
        }

        function setMaxObjects(value) {
            maxObjects = value;
            document.getElementById('maxObjectCount').textContent = `Max objects: ${maxObjects}`;
        }
    </script>
</head>
<body>
    <h1>Garbage Collection Simulation</h1>
    <div>
        <button onclick="createObject()">Create Object</button>
        <button onclick="collectGarbage()">Collect Garbage</button>
        <button onclick="clearAllObjects()">Clear All Objects</button>
    </div>
    <div>
        <label for="maxObjectsInput">Set Max Objects: </label>
        <input type="number" id="maxObjectsInput" min="1" value="10" onchange="setMaxObjects(this.value)">
    </div>
    <div id="objectCount">Objects in memory: 0</div>
    <div id="maxObjectCount">Max objects: 10</div>
    <div id="objectList"></div>
</body>
</html>
