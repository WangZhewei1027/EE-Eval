<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overfitting</title>
    <style>
        body {
            font-family: monospace;
            background-color: #000;
        }
        input, button, select {
            width: 100%;
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
        select {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        select:hover {
            background-color: #3e8e41;
        }
        .error {
            color: #ff0000;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h1>Overfitting</h1>
    <div id="controls">
        <label for="learning_rate">Learning Rate:</label>
        <input type="range" id="learning_rate" min="0.01" max="0.1" value="0.05">
        <span id="learning_rate_value">0.05</span>
        <br>
        <label for="batch_size">Batch Size:</label>
        <input type="range" id="batch_size" min="32" max="1024" value="128">
        <span id="batch_size_value">128</span>
        <br>
        <label for="epochs">Epochs:</label>
        <input type="range" id="epochs" min="1" max="100" value="10">
        <span id="epochs_value">10</span>
        <br>
        <label for="optimizer">Optimizer:</label>
        <select id="optimizer">
            <option value="adam">Adam</option>
            <option value="sgd">SGD</option>
            <option value="rmsprop">RMSProp</option>
        </select>
        <br>
        <button id="train_button">Train</button>
    </div>
    <div id="output">
        <h2>Output:</h2>
        <div id="graph"></div>
    </div>

    <script>
        let learning_rate = 0.05;
        let batch_size = 128;
        let epochs = 10;
        let optimizer = "adam";
        let graph = document.getElementById("graph");

        document.getElementById("train_button").addEventListener("click", train);

        function train() {
            // Simulate data generation
            let data = [];
            for (let i = 0; i < 100; i++) {
                data.push({
                    x: i,
                    y: Math.sin(i * 0.1) + Math.random() * 2 - 1
                });
            }

            // Train model
            let model = new Model(learning_rate, batch_size, epochs, optimizer);
            model.fit(data);

            // Plot data
            let x = Array.from({length: data.length}, (_, i) => i);
            let y = data.map(d => d.y);
            graph.innerHTML = "";
            graph.appendChild(new Graph(x, y));
        }

        function newGraph(x, y) {
            let graph = document.createElement("canvas");
            graph.style.width = "800";
            graph.style.height = "400";
            graph.style.border = "1px solid black";
            graph.style.position = "absolute";
            graph.style.top = "10px";
            graph.style.left = "10px";
            graph.style.zIndex = "1000";
            return graph;
        }

        function Model(learningRate, batchSize, epochs, optimizer) {
            this.learningRate = learningRate;
            this.batchSize = batchSize;
            this.epochs = epochs;
            this.optimizer = optimizer;
            this.model = new NeuralNetwork(this.learningRate, this.batchSize, this.epochs, this.optimizer);
        }

        function NeuralNetwork(learningRate, batchSize, epochs, optimizer) {
            this.learningRate = learningRate;
            this.batchSize = batchSize;
            this.epochs = epochs;
            this.optimizer = optimizer;
            this.weights = new Array(784).fill(0).map(() => new Array(784).fill(0));
            this.bias = new Array(784).fill(0);

            this.fit = function(data) {
                let predictions = new Array(data.length);
                for (let i = 0; i < data.length; i++) {
                    let input = new Input(this.weights, this.bias, data[i].x);
                    let output = this.model.predict(input);
                    predictions[i] = output;
                }
                return predictions;
            }

            this.predict = function(input) {
                let output = new Output(this.weights, this.bias, input);
                return output.output;
            }

            this.train = function(data) {
                for (let i = 0; i < data.length; i++) {
                    let prediction = this.predict(new Input(this.weights, this.bias, data[i].x));
                    let error = prediction.output - data[i].y;
                    this.updateWeights(error);
                }
            }

            this.updateWeights = function(error) {
                for (let i = 0; i < this.weights.length; i++) {
                    for (let j = 0; j < this.weights[i].length; j++) {
                        this.weights[i][j] += error * data[i].x * this.learningRate;
                    }
                }
                for (let i = 0; i < this.bias.length; i++) {
                    this.bias[i] += error * this.learningRate;
                }
            }

            this.model = new NeuralNetwork(this.learningRate, this.batchSize, this.epochs, this.optimizer);
        }
    </script>

    <script>
        function Input(weights, bias, x) {
            return new Input(weights, bias, x);
        }

        function Output(weights, bias, x) {
            return new Output(weights, bias, x);
        }

        class NeuralNetwork {
            constructor(learningRate, batchSize, epochs, optimizer) {
                this.learningRate = learningRate;
                this.batchSize = batchSize;
                this.epochs = epochs;
                this.optimizer = optimizer;
                this.weights = new Array(784).fill(0).map(() => new Array(784).fill(0));
                this.bias = new Array(784).fill(0);
            }

            predict(input) {
                let output = new Output(this.weights, this.bias, input);
                return output.output;
            }

            updateWeights(error) {
                for (let i = 0; i < this.weights.length; i++) {
                    for (let j = 0; j < this.weights[i].length; j++) {
                        this.weights[i][j] += error * this.learningRate;
                    }
                }
                for (let i = 0; i < this.bias.length; i++) {
                    this.bias[i] += error * this.learningRate;
                }
            }
        }

        class Input {
            constructor(weights, bias, x) {
                this.weights = weights;
                this.bias = bias;
                this.x = x;
            }
        }

        class Output {
            constructor(weights, bias, x) {
                this.weights = weights;
                this.bias = bias;
                this.x = x;
            }
        }
    </script>
</body>
</html>
