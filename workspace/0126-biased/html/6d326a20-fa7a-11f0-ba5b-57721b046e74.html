<!DOCTYPE html>
<html>
<head>
    <title>Interactive Type System Explorer</title>
    <style>
        body { font-family: monospace; margin: 20px; line-height: 1.5; }
        .container { display: flex; flex-direction: column; gap: 20px; }
        .panel { border: 1px solid #000; padding: 10px; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        button, select, input { font-family: monospace; }
        .output { min-height: 100px; border: 1px dashed #000; padding: 10px; }
        .error { color: red; }
        .type-example { cursor: pointer; text-decoration: underline; }
        .type-details { margin-top: 10px; padding: 5px; border-left: 3px solid #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Type System Explorer</h1>
        
        <div class="panel">
            <h2>Type Creation</h2>
            <div class="row">
                <select id="type-category">
                    <option value="primitive">Primitive</option>
                    <option value="composite">Composite</option>
                    <option value="function">Function</option>
                    <option value="generic">Generic</option>
                </select>
                <input type="text" id="type-name" placeholder="Type name">
                <button id="create-type">Create Type</button>
            </div>
            
            <div id="type-config" style="display: none;">
                <div id="primitive-config" class="type-config">
                    <div class="row">
                        <label><input type="radio" name="primitive-type" value="number" checked> Number</label>
                        <label><input type="radio" name="primitive-type" value="string"> String</label>
                        <label><input type="radio" name="primitive-type" value="boolean"> Boolean</label>
                        <label><input type="radio" name="primitive-type" value="null"> Null</label>
                        <label><input type="radio" name="primitive-type" value="undefined"> Undefined</label>
                    </div>
                </div>
                
                <div id="composite-config" class="type-config" style="display: none;">
                    <div class="row">
                        <select id="composite-type">
                            <option value="array">Array</option>
                            <option value="object">Object</option>
                            <option value="tuple">Tuple</option>
                            <option value="union">Union</option>
                            <option value="intersection">Intersection</option>
                        </select>
                    </div>
                    <div id="composite-details"></div>
                </div>
                
                <div id="function-config" class="type-config" style="display: none;">
                    <div class="row">
                        <div>
                            <h4>Parameters</h4>
                            <div id="function-params">
                                <div class="row">
                                    <input type="text" placeholder="param name" class="param-name">
                                    <select class="param-type">
                                        <option>number</option>
                                        <option>string</option>
                                        <option>boolean</option>
                                    </select>
                                    <button class="remove-param">×</button>
                                </div>
                            </div>
                            <button id="add-param">Add Parameter</button>
                        </div>
                        <div>
                            <h4>Return Type</h4>
                            <select id="return-type">
                                <option>number</option>
                                <option>string</option>
                                <option>boolean</option>
                                <option>void</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div id="generic-config" class="type-config" style="display: none;">
                    <div class="row">
                        <input type="text" id="generic-param" placeholder="Type parameter (e.g., T)">
                        <button id="add-generic-param">Add Parameter</button>
                    </div>
                    <div id="generic-params-list"></div>
                    <div class="row">
                        <select id="generic-base-type">
                            <option value="array">Array&lt;T&gt;</option>
                            <option value="function">Function</option>
                            <option value="object">Object</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <h2>Type Playground</h2>
            <div class="row">
                <select id="selected-type">
                    <option value="">Select a type...</option>
                </select>
                <input type="text" id="value-input" placeholder="Enter value">
                <button id="check-type">Check Type</button>
                <button id="infer-type">Infer Type</button>
            </div>
            <div class="output" id="type-result"></div>
        </div>
        
        <div class="panel">
            <h2>Type System Operations</h2>
            <div class="row">
                <select id="type-op1">
                    <option>Select type...</option>
                </select>
                <select id="type-operation">
                    <option value="assignable">Is Assignable To</option>
                    <option value="union">Union With</option>
                    <option value="intersection">Intersection With</option>
                    <option value="extends">Extends</option>
                </select>
                <select id="type-op2">
                    <option>Select type...</option>
                </select>
                <button id="perform-operation">Perform Operation</button>
            </div>
            <div class="output" id="operation-result"></div>
        </div>
        
        <div class="panel">
            <h2>Type Examples</h2>
            <div id="type-examples">
                <p class="type-example" data-type="number">42</p>
                <p class="type-example" data-type="string">"Hello"</p>
                <p class="type-example" data-type="boolean">true</p>
                <p class="type-example" data-type="array">[1, 2, 3]</p>
                <p class="type-example" data-type="object">{ name: "Alice", age: 30 }</p>
                <p class="type-example" data-type="tuple">[string, number]</p>
                <p class="type-example" data-type="union">string | number</p>
                <p class="type-example" data-type="function">(x: number) => string</p>
                <p class="type-example" data-type="generic">Array&lt;T&gt;</p>
            </div>
            <div class="type-details" id="example-details"></div>
        </div>
        
        <div class="panel">
            <h2>Type System Summary</h2>
            <div id="type-summary"></div>
        </div>
    </div>

    <script>
        // Type system state
        const typeSystem = {
            types: {
                number: { kind: 'primitive', name: 'number' },
                string: { kind: 'primitive', name: 'string' },
                boolean: { kind: 'primitive', name: 'boolean' },
                null: { kind: 'primitive', name: 'null' },
                undefined: { kind: 'primitive', name: 'undefined' },
                // More types will be added dynamically
            },
            createType(name, config) {
                this.types[name] = config;
                this.updateUI();
            },
            isAssignable(value, typeName) {
                const type = this.types[typeName];
                if (!type) return false;
                
                if (type.kind === 'primitive') {
                    return typeof value === type.name || 
                           (type.name === 'null' && value === null) ||
                           (type.name === 'undefined' && value === undefined);
                }
                
                if (type.kind === 'array') {
                    return Array.isArray(value) && 
                           (type.elementType ? value.every(item => this.isAssignable(item, type.elementType)) : true);
                }
                
                if (type.kind === 'object') {
                    if (typeof value !== 'object' || value === null) return false;
                    for (const [prop, propType] of Object.entries(type.properties)) {
                        if (!(prop in value) || !this.isAssignable(value[prop], propType)) {
                            return false;
                        }
                    }
                    return true;
                }
                
                return false;
            },
            inferType(value) {
                if (value === null) return 'null';
                if (Array.isArray(value)) {
                    if (value.length === 0) return 'any[]';
                    const elementType = this.inferType(value[0]);
                    return `Array<${elementType}>`;
                }
                if (typeof value === 'object') {
                    const props = Object.entries(value).map(([k, v]) => `${k}: ${this.inferType(v)}`).join(', ');
                    return `{ ${props} }`;
                }
                return typeof value;
            },
            updateUI() {
                // Update type selectors
                const typeSelectors = ['selected-type', 'type-op1', 'type-op2'];
                typeSelectors.forEach(selector => {
                    const select = document.getElementById(selector);
                    const currentValue = select.value;
                    select.innerHTML = `<option value="">Select a type...</option>` +
                        Object.keys(this.types).map(name => 
                            `<option value="${name}" ${name === currentValue ? 'selected' : ''}>${name}</option>`
                        ).join('');
                });
                
                // Update type summary
                const summary = document.getElementById('type-summary');
                summary.innerHTML = Object.entries(this.types).map(([name, type]) => {
                    let details = '';
                    if (type.kind === 'primitive') details = `Primitive type`;
                    if (type.kind === 'array') details = `Array of ${type.elementType || 'any'}`;
                    if (type.kind === 'object') {
                        details = `Object with properties: ${Object.entries(type.properties).map(([k, v]) => `${k}: ${v}`).join(', ')}`;
                    }
                    return `<div><strong>${name}</strong>: ${details}</div>`;
                }).join('');
            }
        };

        // UI Event Handlers
        document.getElementById('type-category').addEventListener('change', function() {
            document.querySelectorAll('.type-config').forEach(el => el.style.display = 'none');
            document.getElementById('type-config').style.display = 'block';
            document.getElementById(`${this.value}-config`).style.display = 'block';
        });

        document.getElementById('create-type').addEventListener('click', function() {
            const name = document.getElementById('type-name').value.trim();
            if (!name) {
                alert('Please enter a type name');
                return;
            }
            
            const category = document.getElementById('type-category').value;
            let config;
            
            if (category === 'primitive') {
                const type = document.querySelector('input[name="primitive-type"]:checked').value;
                config = { kind: 'primitive', name: type };
            }
            else if (category === 'composite') {
                const compositeType = document.getElementById('composite-type').value;
                if (compositeType === 'array') {
                    const elementType = prompt('Element type (e.g., number, string):', 'any');
                    config = { kind: 'array', elementType: elementType || 'any' };
                }
                else if (compositeType === 'object') {
                    const props = prompt('Enter properties (format: name:type, name:type):', 'age:number, name:string');
                    const properties = {};
                    if (props) {
                        props.split(',').forEach(pair => {
                            const [name, type] = pair.trim().split(':').map(s => s.trim());
                            if (name && type) properties[name] = type;
                        });
                    }
                    config = { kind: 'object', properties };
                }
                else if (compositeType === 'tuple') {
                    const elements = prompt('Enter tuple element types (comma separated):', 'string, number');
                    config = { kind: 'tuple', elements: elements ? elements.split(',').map(s => s.trim()) : [] };
                }
                else if (compositeType === 'union') {
                    const types = prompt('Enter union types (separated by |):', 'string | number');
                    config = { kind: 'union', types: types ? types.split('|').map(s => s.trim()) : [] };
                }
                else if (compositeType === 'intersection') {
                    const types = prompt('Enter intersection types (separated by &):', 'A & B');
                    config = { kind: 'intersection', types: types ? types.split('&').map(s => s.trim()) : [] };
                }
            }
            else if (category === 'function') {
                const params = Array.from(document.querySelectorAll('#function-params .row')).map(row => {
                    return {
                        name: row.querySelector('.param-name').value,
                        type: row.querySelector('.param-type').value
                    };
                });
                const returnType = document.getElementById('return-type').value;
                config = { kind: 'function', params, returnType };
            }
            else if (category === 'generic') {
                const params = Array.from(document.querySelectorAll('#generic-params-list .generic-param')).map(el => el.textContent);
                const baseType = document.getElementById('generic-base-type').value;
                config = { kind: 'generic', params, baseType };
            }
            
            typeSystem.createType(name, config);
        });

        document.getElementById('check-type').addEventListener('click', function() {
            const typeName = document.getElementById('selected-type').value;
            const valueInput = document.getElementById('value-input').value;
            let value;
            
            try {
                value = eval(`(${valueInput})`);
            } catch (e) {
                document.getElementById('type-result').innerHTML = `<div class="error">Invalid value syntax: ${e.message}</div>`;
                return;
            }
            
            const isValid = typeSystem.isAssignable(value, typeName);
            document.getElementById('type-result').innerHTML = `
                <div>Value: <code>${JSON.stringify(value)}</code></div>
                <div>Type: <code>${typeName}</code></div>
                <div>Result: <strong>${isValid ? 'Valid' : 'Invalid'}</strong></div>
                <div>Actual type: ${typeSystem.inferType(value)}</div>
            `;
        });

        document.getElementById('infer-type').addEventListener('click', function() {
            const valueInput = document.getElementById('value-input').value;
            let value;
            
            try {
                value = eval(`(${valueInput})`);
            } catch (e) {
                document.getElementById('type-result').innerHTML = `<div class="error">Invalid value syntax: ${e.message}</div>`;
                return;
            }
            
            const inferredType = typeSystem.inferType(value);
            document.getElementById('type-result').innerHTML = `
                <div>Value: <code>${JSON.stringify(value)}</code></div>
                <div>Inferred Type: <strong>${inferredType}</strong></div>
            `;
        });

        document.getElementById('perform-operation').addEventListener('click', function() {
            const type1 = document.getElementById('type-op1').value;
            const type2 = document.getElementById('type-op2').value;
            const operation = document.getElementById('type-operation').value;
            
            if (!type1 || !type2) {
                document.getElementById('operation-result').innerHTML = `<div class="error">Please select both types</div>`;
                return;
            }
            
            let result;
            if (operation === 'assignable') {
                // Simplified check - in real system this would be more complex
                result = type1 === type2 ? `${type1} is assignable to ${type2}` 
                                         : `${type1} is NOT assignable to ${type2}`;
            }
            else if (operation === 'union') {
                result = `${type1} | ${type2}`;
            }
            else if (operation === 'intersection') {
                result = `${type1} & ${type2}`;
            }
            else if (operation === 'extends') {
                // Simplified check
                result = type1 === type2 ? `${type1} extends ${type2}` 
                                         : `${type1} does not extend ${type2}`;
            }
            
            document.getElementById('operation-result').innerHTML = `
                <div>Operation: ${operation}</div>
                <div>Type 1: ${type1}</div>
                <div>Type 2: ${type2}</div>
                <div>Result: <strong>${result}</strong></div>
            `;
        });

        document.getElementById('add-param').addEventListener('click', function() {
            const container = document.getElementById('function-params');
            const div = document.createElement('div');
            div.className = 'row';
            div.innerHTML = `
                <input type="text" placeholder="param name" class="param-name">
                <select class="param-type">
                    <option>number</option>
                    <option>string</option>
                    <option>boolean</option>
                </select>
                <button class="remove-param">×</button>
            `;
            container.appendChild(div);
            div.querySelector('.remove-param').addEventListener('click', function() {
                container.removeChild(div);
            });
        });

        document.getElementById('add-generic-param').addEventListener('click', function() {
            const param = document.getElementById('generic-param').value.trim();
            if (!param) return;
            
            const container = document.getElementById('generic-params-list');
            const span = document.createElement('span');
            span.className = 'generic-param';
            span.textContent = param;
            container.appendChild(span);
            document.getElementById('generic-param').value = '';
        });

        document.querySelectorAll('.type-example').forEach(el => {
            el.addEventListener('click', function() {
                const type = this.getAttribute('data-type');
                let details = '';
                
                if (type === 'number') details = 'Primitive numeric type. Examples: 42, 3.14, -1';
                else if (type === 'string') details = 'Primitive string type. Examples: "hello", \'world\', `template`';
                else if (type === 'boolean') details = 'Primitive boolean type. Values: true or false';
                else if (type === 'array') details = 'Composite type representing an array of values. Example: number[] for array of numbers';
                else if (type === 'object') details = 'Composite type representing an object with specific properties';
                else if (type === 'tuple') details = 'Fixed-length array with specific types at each position';
                else if (type === 'union') details = 'Type that can be one of several types';
                else if (type === 'function') details = 'Function type with parameter types and return type';
                else if (type === 'generic') details = 'Type that can work with multiple types using type parameters';
                
                document.getElementById('example-details').innerHTML = `
                    <h3>${type}</h3>
                    <p>${details}</p>
                    <p>Example: <code>${this.textContent}</code></p>
                `;
            });
        });

        // Initialize
        typeSystem.updateUI();
    </script>
</body>
</html>
