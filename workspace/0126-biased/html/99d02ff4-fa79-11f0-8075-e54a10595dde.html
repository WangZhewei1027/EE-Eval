<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Transaction System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>Transaction System</h1>

    <h2>Input Transaction Details</h2>
    <label for="amount">Amount:</label>
    <input type="number" id="amount" value="0"><br><br>

    <label for="transactionType">Transaction Type:</label>
    <select id="transactionType">
        <option value="debit">Debit</option>
        <option value="credit">Credit</option>
    </select><br><br>

    <button onclick="performTransaction()">Submit Transaction</button>
    <button onclick="resetTransaction()">Reset</button><br><br>

    <h2>Transaction History</h2>
    <ul id="transactionHistory"></ul>

    <h2>Calculate Balance</h2>
    <button onclick="calculateBalance()">Calculate Balance</button>
    <p id="balance">Current Balance: 0</p>

    <script>
        let balance = 0;
        let transactionHistory = [];

        function performTransaction() {
            const amount = parseFloat(document.getElementById('amount').value);
            const transactionType = document.getElementById('transactionType').value;
            if (transactionType === 'debit') {
                balance -= amount;
                transactionHistory.push(`Debited: ${amount}`);
            } else {
                balance += amount;
                transactionHistory.push(`Credited: ${amount}`);
            }
            updateHistory();
            document.getElementById('amount').value = 0;
        }

        function updateHistory() {
            const historyList = document.getElementById('transactionHistory');
            historyList.innerHTML = '';
            transactionHistory.forEach((entry) => {
                const li = document.createElement('li');
                li.textContent = entry;
                historyList.appendChild(li);
            });
        }

        function calculateBalance() {
            document.getElementById('balance').textContent = `Current Balance: ${balance}`;
        }

        function resetTransaction() {
            balance = 0;
            transactionHistory = [];
            document.getElementById('balance').textContent = 'Current Balance: 0';
            updateHistory();
            document.getElementById('amount').value = 0;
        }
    </script>
</body>
</html>
