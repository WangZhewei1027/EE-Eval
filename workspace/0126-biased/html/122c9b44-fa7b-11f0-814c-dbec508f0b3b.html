<!DOCTYPE html>
<html>
<head>
    <title>Amortized Analysis</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .button-container {
            margin-top: 20px;
        }
        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #4CAF50;
            color: #fff;
            font-size: 16px;
        }
        .button:hover {
            background-color: #3e8e41;
        }
        .slider-container {
            margin-top: 20px;
        }
        .slider {
            width: 100%;
            height: 10px;
            margin-bottom: 10px;
        }
        .slider input[type="range"] {
            width: 100%;
            height: 10px;
            margin-bottom: 10px;
        }
        .slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background-color: #fff;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
        }
        .slider input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background-color: #fff;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
        }
        .slider input[type="range"]::-ms-thumb {
            width: 20px;
            height: 20px;
            background-color: #fff;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
        }
        .slider label {
            display: inline-block;
            width: 20px;
            height: 20px;
            background-color: #fff;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
        }
        .slider label:hover {
            background-color: #ccc;
        }
        .button-container input[type="submit"] {
            margin-top: 20px;
        }
        .button-container input[type="submit"]:hover {
            background-color: #3e8e41;
        }
        .text {
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Amortized Analysis</h1>
        <div class="button-container">
            <button class="button" onclick="calculate()">Calculate</button>
            <button class="button" onclick="save()">Save</button>
            <button class="button" onclick="clear()">Clear</button>
        </div>
        <div class="slider-container">
            <label for="amount">Amount:</label>
            <input type="range" id="amount" min="1" max="10000" value="1000" onChange="calculate()">
            <span id="amount-value"></span>
        </div>
        <div class="slider-container">
            <label for="rate">Rate:</label>
            <input type="range" id="rate" min="0.1" max="10" value="1" onChange="calculate()">
            <span id="rate-value"></span>
        </div>
        <div class="slider-container">
            <label for="duration">Duration:</label>
            <input type="range" id="duration" min="1" max="1000" value="10" onChange="calculate()">
            <span id="duration-value"></span>
        </div>
    </div>
    <div class="text">
        <p>Amortized Analysis is a method of calculating the present value of a future amount based on the future value of an investment or loan.</p>
        <p>It takes into account the interest rate and duration of the investment or loan to estimate the present value.</p>
    </div>

    <script>
        let amount = 0;
        let rate = 0;
        let duration = 0;

        function calculate() {
            amount = parseInt(document.getElementById('amount').value);
            rate = parseFloat(document.getElementById('rate').value);
            duration = parseInt(document.getElementById('duration').value);

            let presentValue = 0;

            for (let i = 0; i < duration; i++) {
                presentValue += amount * (1 + rate / 100) ** i;
            }

            document.getElementById('amount-value').innerHTML = 'Present Value: $' + presentValue.toFixed(2);
        }

        function save() {
            localStorage.setItem('amount', amount);
            localStorage.setItem('rate', rate);
            localStorage.setItem('duration', duration);
        }

        function clear() {
            amount = 0;
            rate = 0;
            duration = 0;
            document.getElementById('amount-value').innerHTML = 'Present Value: $0.00';
        }
    </script>
</body>
</html>
