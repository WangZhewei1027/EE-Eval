<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indexing Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #4A90E2, #50E3C2);
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #container {
            text-align: center;
            animation: fadeIn 1.5s ease-in-out;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 0.5em;
            text-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
        }

        p {
            font-size: 1.2em;
            margin-bottom: 2em;
            opacity: 0.9;
        }

        button {
            background-color: #FF4F81;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.2em;
            color: #ffffff;
            cursor: pointer;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-5px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .indexing-visual {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 20px;
            animation: riseUp 1.5s ease-in-out forwards;
        }

        .indexing-box {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            backdrop-filter: blur(10px);
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.5);
        }

        @keyframes riseUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div id="container">
        <h1>Indexing</h1>
        <p>Visualizing the concept of indexing through visual elegance and aesthetics.</p>
        <div class="indexing-visual">
            <div class="indexing-box">1</div>
            <div class="indexing-box">2</div>
            <div class="indexing-box">3</div>
            <div class="indexing-box">4</div>
            <div class="indexing-box">5</div>
            <div class="indexing-box">6</div>
            <div class="indexing-box">7</div>
            <div class="indexing-box">8</div>
            <div class="indexing-box">9</div>
        </div>
        <button onclick="alert('Embrace the elegance of indexing!')">Learn More</button>
    </div>
    <script>
        // Minimal interaction: this will display an alert when the button is clicked.           
    </script>
</body>

</html>
