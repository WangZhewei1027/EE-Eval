<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Map</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="hash-map">
        <div class="hash-map-header">
            <h1>Hash Map</h1>
            <button id="add-button">Add</button>
        </div>
        <div class="hash-map-body">
            <div class="hash-map-row">
                <div class="hash-map-cell"></div>
                <div class="hash-map-cell"></div>
                <div class="hash-map-cell"></div>
            </div>
            <div class="hash-map-row">
                <div class="hash-map-cell"></div>
                <div class="hash-map-cell"></div>
                <div class="hash-map-cell"></div>
            </div>
        </div>
        <div class="hash-map-footer">
            <button id="clear-button">Clear</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
