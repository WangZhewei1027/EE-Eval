<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paging Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
        }
        #content {
            margin-bottom: 20px;
        }
        input, button, select {
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>Paging Example</h1>

    <div id="controls">
        <label for="itemsPerPage">Items per Page:</label>
        <input type="number" id="itemsPerPage" value="5" min="1" onchange="updateItemsPerPage()"><br>
        
        <label for="totalItems">Total Items:</label>
        <input type="number" id="totalItems" value="50" min="1" onchange="updateTotalItems()"><br>
        
        <button onclick="goToPage(1)">First Page</button>
        <button onclick="goToPreviousPage()">Previous Page</button>
        <button onclick="goToNextPage()">Next Page</button>
        <button onclick="goToPage(totalPages)">Last Page</button>

        <label for="goToPage">Go to Page:</label>
        <input type="number" id="goToPageInput" value="1" min="1" onchange="goToPage(parseInt(this.value))"><br>

        <div id="pageInfo"></div>
    </div>

    <div id="content"></div>

    <script>
        let currentPage = 1;
        let itemsPerPage = 5;
        let totalItems = 50;
        let totalPages = Math.ceil(totalItems / itemsPerPage);

        function updateItemsPerPage() {
            itemsPerPage = parseInt(document.getElementById("itemsPerPage").value);
            totalPages = Math.ceil(totalItems / itemsPerPage);
            currentPage = Math.min(currentPage, totalPages);
            render();
        }

        function updateTotalItems() {
            totalItems = parseInt(document.getElementById("totalItems").value);
            totalPages = Math.ceil(totalItems / itemsPerPage);
            currentPage = Math.min(currentPage, totalPages);
            render();
        }

        function goToPreviousPage() {
            if (currentPage > 1) {
                currentPage--;
                render();
            }
        }

        function goToNextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                render();
            }
        }

        function goToPage(page) {
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                render();
            }
        }

        function render() {
            document.getElementById("pageInfo").innerText = `Page ${currentPage} of ${totalPages}`;
            const content = document.getElementById("content");
            content.innerHTML = '';

            const start = (currentPage - 1) * itemsPerPage;
            const end = Math.min(start + itemsPerPage, totalItems);

            for (let i = start + 1; i <= end; i++) {
                const item = document.createElement('div');
                item.textContent = `Item ${i}`;
                content.appendChild(item);
            }

            document.getElementById("goToPageInput").max = totalPages;
        }

        render();
    </script>
</body>
</html>
