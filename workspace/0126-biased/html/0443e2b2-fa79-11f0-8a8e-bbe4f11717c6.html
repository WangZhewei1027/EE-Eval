<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Tree Index</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>B-Tree Index</h1>
        <div class="tree">
            <div class="node" id="root">
                <div class="key">5</div>
                <div class="value">12345</div>
            </div>
            <div class="node" id="5">
                <div class="key">1</div>
                <div class="value">23456</div>
            </div>
            <div class="node" id="1">
                <div class="key">4</div>
                <div class="value">56789</div>
            </div>
            <div class="node" id="4">
                <div class="key">3</div>
                <div class="value">876543</div>
            </div>
            <div class="node" id="3">
                <div class="key">2</div>
                <div class="value">012345</div>
            </div>
            <div class="node" id="2">
                <div class="key">1</div>
                <div class="value">56789</div>
            </div>
        </div>
        <button id="add-node">Add Node</button>
        <button id="delete-node">Delete Node</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
