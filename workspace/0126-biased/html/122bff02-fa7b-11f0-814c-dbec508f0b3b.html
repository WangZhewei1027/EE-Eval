<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floyd-Warshall Algorithm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #floyd-warshall {
            width: 800px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #floyd-warshall h1 {
            margin-bottom: 10px;
        }
        #floyd-warshall button {
            margin: 5px;
        }
    </style>
</head>
<body>
    <div id="floyd-warshall">
        <h1>Floyd-Warshall Algorithm</h1>
        <button id="reset-btn">Reset</button>
        <button id="solve-btn">Solve</button>
        <button id="view-btn">View</button>
        <input id="n-btn" type="number" placeholder="Enter number of vertices">
        <input id="d-btn" type="number" placeholder="Enter maximum distance">
        <input id="epsilon-btn" type="number" placeholder="Enter epsilon value">
        <textarea id="f-w-btn" rows="10" cols="50" placeholder="Enter Floyd-Warshall matrix values"></textarea>
        <textarea id="w-btn" rows="10" cols="50" placeholder="Enter weight matrix values"></textarea>
        <textarea id="w2-btn" rows="10" cols="50" placeholder="Enter weight matrix values"></textarea>
        <textarea id="w3-btn" rows="10" cols="50" placeholder="Enter weight matrix values"></textarea>
        <textarea id="w4-btn" rows="10" cols="50" placeholder="Enter weight matrix values"></textarea>
    </div>

    <script>
        let n = 0;
        let d = 0;
        let epsilon = 0;
        let fW = [];
        let w = [];
        let w2 = [];
        let w3 = [];
        let w4 = [];

        function initialize() {
            n = parseInt(document.getElementById('n-btn').value);
            d = parseInt(document.getElementById('d-btn').value);
            epsilon = parseInt(document.getElementById('epsilon-btn').value);
            fW = [];
            w = [];
            w2 = [];
            w3 = [];
            w4 = [];

            for (let i = 0; i < n; i++) {
                fW[i] = [];
                w[i] = [];
                w2[i] = [];
                w3[i] = [];
                w4[i] = [];
            }

            document.getElementById('f-w-btn').value = '';
            document.getElementById('w-btn').value = '';
            document.getElementById('w2-btn').value = '';
            document.getElementById('w3-btn').value = '';
            document.getElementById('w4-btn').value = '';
        }

        function displayMatrix(matrix) {
            document.getElementById('f-w-btn').value = matrix.toString();
        }

        function displayWeightMatrix(matrix) {
            document.getElementById('w-btn').value = matrix.toString();
        }

        function displayWeightMatrix2(matrix) {
            document.getElementById('w2-btn').value = matrix.toString();
        }

        function displayWeightMatrix3(matrix) {
            document.getElementById('w3-btn').value = matrix.toString();
        }

        function displayWeightMatrix4(matrix) {
            document.getElementById('w4-btn').value = matrix.toString();
        }

        function updateMatrix(matrix, weight) {
            fW[matrix[0][0]][matrix[0][1]] = weight;
            fW[matrix[0][1]][matrix[0][0]] = weight;
            fW[matrix[1][0]][matrix[1][1]] = weight;
            fW[matrix[1][1]][matrix[1][0]] = weight;
        }

        function calculateDijkstra() {
            let distance = new Array(n).fill(0).map(() => new Array(n).fill(0));
            for (let i = 0; i < n; i++) {
                distance[i][i] = 0;
            }
            for (let k = 0; k < n; k++) {
                for (let i = 0; i < n; i++) {
                    for (let j = 0; j < n; j++) {
                        if (distance[i][k] + distance[k][j] < distance[i][j]) {
                            distance[i][j] = distance[i][k] + distance[k][j];
                        }
                    }
                }
            }
            return distance;
        }

        function updateMatrix2(matrix, weight) {
            w[matrix[0][0]][matrix[0][1]] = weight;
            w[matrix[0][1]][matrix[0][0]] = weight;
            w[matrix[1][0]][matrix[1][1]] = weight;
            w[matrix[1][1]][matrix[1][0]] = weight;
        }

        function calculateDijkstra2() {
            let distance = new Array(n).fill(0).map(() => new Array(n).fill(0));
            for (let i = 0; i < n; i++) {
                distance[i][i] = 0;
            }
            for (let k = 0; k < n; k++) {
                for (let i = 0; i < n; i++) {
                    for (let j = 0; j < n; j++) {
                        if (distance[i][k] + distance[k][j] < distance[i][j]) {
                            distance[i][j] = distance[i][k] + distance[k][j];
                        }
                    }
                }
            }
            return distance;
        }

        function updateMatrix3(matrix, weight) {
            w2[matrix[0][0]][matrix[0][1]] = weight;
            w2[matrix[0][1]][matrix[0][0]] = weight;
            w2[matrix[1][0]][matrix[1][1]] = weight;
            w2[matrix[1][1]][matrix[1][0]] = weight;
        }

        function calculateDijkstra3() {
            let distance = new Array(n).fill(0).map(() => new Array(n).fill(0));
            for (let i = 0; i < n; i++) {
                distance[i][i] = 0;
            }
            for (let k = 0; k < n; k++) {
                for (let i = 0; i < n; i++) {
                    for (let j = 0; j < n; j++) {
                        if (distance[i][k] + distance[k][j] < distance[i][j]) {
                            distance[i][j] = distance[i][k] + distance[k][j];
                        }
                    }
                }
            }
            return distance;
        }

        function updateMatrix4(matrix, weight) {
            w3[matrix[0][0]][matrix[0][1]] = weight;
            w3[matrix[0][1]][matrix[0][0]] = weight;
            w3[matrix[1][0]][matrix[1][1]] = weight;
            w3[matrix[1][1]][matrix[1][0]] = weight;
        }

        function calculateDijkstra4() {
            let distance = new Array(n).fill(0).map(() => new Array(n).fill(0));
            for (let i = 0; i < n; i++) {
                distance[i][i] = 0;
            }
            for (let k = 0; k < n; k++) {
                for (let i = 0; i < n; i++) {
                    for (let j = 0; j < n; j++) {
                        if (distance[i][k] + distance[k][j] < distance[i][j]) {
                            distance[i][j] = distance[i][k] + distance[k][j];
                        }
                    }
                }
            }
            return distance;
        }

        function solve() {
            let distance = calculateDijkstra();
            let matrix = new Array(n).fill(0).map(() => new Array(n).fill(0));
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    matrix[i][j] = distance[i][j];
                }
            }
            let result = [];
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    result.push(matrix[i][j]);
                }
            }
            displayMatrix(result);
        }

        function view() {
            let matrix = new Array(n).fill(0).map(() => new Array(n).fill(0));
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    matrix[i][j] = 1;
                }
            }
            displayMatrix(matrix);
        }

        function update() {
            let matrix = new Array(n).fill(0).map(() => new Array(n).fill(0));
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    matrix[i][j] = 1;
                }
            }
            updateMatrix(matrix, 1);
            updateMatrix2(matrix, 1);
            updateMatrix3(matrix, 1);
            updateMatrix4(matrix, 1);
            updateMatrix2(matrix, 1);
            updateMatrix3(matrix, 1);
            updateMatrix4(matrix, 1);
        }

        function reset() {
            initialize();
            update();
            solve();
        }

        document.getElementById('reset-btn').addEventListener('click', reset);
        document.getElementById('solve-btn').addEventListener('click', solve);
        document.getElementById('view-btn').addEventListener('click', view);
        document.getElementById('n-btn').addEventListener('input', function() {
            n = parseInt(this.value);
            update();
            solve();
        });
        document.getElementById('d-btn').addEventListener('input', function() {
            d = parseInt(this.value);
            update();
            solve();
        });
        document.getElementById('epsilon-btn').addEventListener('input', function() {
            epsilon = parseInt(this.value);
            update();
            solve();
        });
        document.getElementById('f-w-btn').addEventListener('change', function() {
            displayMatrix(document.getElementById('f-w-btn').value);
        });
        document.getElementById('w-btn').addEventListener('change', function() {
            displayWeightMatrix(document.getElementById('w-btn').value);
        });
        document.getElementById('w2-btn').addEventListener('change', function() {
            displayWeightMatrix2(document.getElementById('w2-btn').value);
        });
        document.getElementById('w3-btn').addEventListener('change', function() {
            displayWeightMatrix3(document.getElementById('w3-btn').value);
        });
        document.getElementById('w4-btn').addEventListener('change', function() {
            displayWeightMatrix4(document.getElementById('w4-btn').value);
        });
    </script>
</body>
</html>
