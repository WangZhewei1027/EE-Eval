<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Heap Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
        }

        #heap-container {
            position: relative;
            margin: 20px 0;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .heap-node {
            width: 40px;
            height: 40px;
            background-color: #e74c3c;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            position: absolute;
            transition: transform 0.3s ease;
        }

        #controls {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            background-color: #3498db;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s;
            margin: 5px 0;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>
    <h1>Max Heap Visualization</h1>
    <div id="heap-container"></div>
    <div id="controls">
        <button onclick="startHeap()">Start</button>
        <button onclick="resetHeap()">Reset</button>
    </div>

    <script>
        const heapContainer = document.getElementById('heap-container');
        let heap = [30, 20, 25, 15, 10, 5];

        function clearHeap() {
            heapContainer.innerHTML = '';
        }

        function displayHeap() {
            clearHeap();
            const positions = getPositions(heap.length);
            heap.forEach((value, index) => {
                const node = document.createElement('div');
                node.className = 'heap-node';
                node.innerText = value;
                const { top, left } = positions[index];
                node.style.transform = `translate(${left}px, ${top}px)`;
                heapContainer.appendChild(node);
            });
        }

        function getPositions(count) {
            const positions = [];
            const levels = Math.ceil(Math.log2(count + 1));
            const spacing = 80; // space between nodes
            for (let level = 0; level < levels; level++) {
                const nodesInLevel = Math.pow(2, level);
                for (let i = 0; i < nodesInLevel && (i + Math.pow(2, level) - 1) < count; i++) {
                    const x = (i - nodesInLevel / 2 + 0.5) * spacing * (levels - level);
                    const y = -level * spacing;
                    positions.push({ top: y, left: x });
                }
            }
            return positions;
        }

        function startHeap() {
            displayHeap();
        }

        function resetHeap() {
            heap = [30, 20, 25, 15, 10, 5];
            displayHeap();
        }
    </script>
</body>

</html>
