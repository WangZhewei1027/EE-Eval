<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP Visual Concept</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #b3e0ff 0%, #c2c2f0 100%);
            overflow: hidden;
            animation: backgroundChange 20s infinite alternate;
        }

        h1 {
            font-size: 48px;
            text-align: center;
            color: #4a4e69;
            margin-top: 50px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1s forwards;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 100px);
            transition: transform 0.8s;
        }

        .info {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            padding: 20px 30px;
            max-width: 500px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: slideIn 1s forwards;
        }

        .button {
            display: inline-block;
            background: #4a4e69;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s ease;
        }

        .button:hover {
            background: #9a8c98;
        }

        @keyframes backgroundChange {
            0% { background: linear-gradient(135deg, #b3e0ff 0%, #c2c2f0 100%); }
            100% { background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>Understanding HTTP</h1>
    <div class="container">
        <div class="info">
            <p>HTTP, or HyperText Transfer Protocol, is the foundation of data communication on the web.</p>
            <p>It is an application layer protocol for transmitting hypermedia documents, such as HTML.</p>
            <p>Experience seamless web surfing through its stateless, request-response model!</p>
        </div>
        <button class="button" onclick="showMore()">Learn More</button>
    </div>

    <script>
        function showMore() {
            alert('HTTP stands for HyperText Transfer Protocol. It governs how messages are formatted and transmitted on the internet.');
        }
    </script>
</body>
</html>
