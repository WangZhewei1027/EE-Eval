<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Branch and Bound Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Playfair+Display:ital,wght@1,700&display=swap');

  /* Reset and base */
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    background: linear-gradient(135deg, #1f1c2c, #928dab);
    font-family: 'Montserrat', sans-serif;
    color: #e5e5e5;
    overflow-x: hidden;
    user-select: none;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 3.8rem;
    margin: 1rem 0 0.4rem 0;
    letter-spacing: 0.1em;
    color: #f8f7ff;
    text-shadow:
      0 0 10px rgba(250, 240, 255, 0.8),
      0 0 30px #a28cf7cc,
      0 0 60px #6f5afdcc;
  }

  h2 {
    font-weight: 600;
    letter-spacing: 0.12em;
    color: #d3d3ffdd;
    font-size: 1.3rem;
    font-family: 'Montserrat', sans-serif;
    margin-bottom: 2rem;
    text-transform: uppercase;
  }

  .container {
    max-width: 1100px;
    padding: 0 40px 80px 40px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* The Tree Container */
  #tree-container {
    position: relative;
    width: 100%;
    max-width: 900px;
    aspect-ratio: 16 / 9;
    background: radial-gradient(circle at center, #3b3863 0%, #1f1c2c 90%);
    border-radius: 1.4rem;
    box-shadow:
      inset 0 0 120px #8e8ad825,
      0 20px 50px rgba(90,75,255,0.45);
    overflow: visible;
    user-select: none;
  }

  /* Nodes */

  .node {
    position: absolute;
    width: 96px;
    height: 96px;
    background: linear-gradient(135deg, #6f5afd, #3b3863);
    border: 3.5px solid #b8a7ffdd;
    border-radius: 50%;
    box-shadow:
      0 0 8px #b8a7ffaa,
      0 6px 12px #3f3bcfcc,
      inset 0 2px 5px #a89eff55;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: default;
    opacity: 0;
    transform: scale(0.7);
    transition:
      opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1),
      transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .node.show {
    opacity: 1;
    transform: scale(1);
  }

  .node.branch {
    background: linear-gradient(135deg, #5040e5, #2a2363);
    border-color: #6c4df5cc;
    box-shadow:
      0 0 12px #925affdd,
      0 8px 15px #6c4df5bb,
      inset 0 2px 8px #b8a7ff88;
  }

  .node.bound {
    background: linear-gradient(135deg, #fb6376, #7a1e36);
    border-color: #ff5962cc;
    box-shadow:
      0 0 15px #ff5962ff,
      0 10px 20px #de3247cc,
      inset 0 3px 8px #ff8497aa;
  }

  .node .label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: #fff;
    text-shadow: 0 0 4px #0008;
    user-select: none;
  }
  .node .value {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.9rem;
    color: #ffd5ff;
    letter-spacing: 0.02em;
    margin-top: 0.1rem;
    text-shadow:
      0 0 8px #ba97ffdd,
      0 0 16px #c48affee;
    user-select: none;
  }

  /* Connecting Lines */

  svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  line.connector {
    stroke: #6f5affc9;
    stroke-width: 3.4;
    stroke-linecap: round;
    filter:
      drop-shadow(0 0 5px #8c7affaa);
    transition: stroke 1s ease;
  }

  line.connector.bound {
    stroke: #f95e72cc;
    filter:
      drop-shadow(0 0 10px #fb6376dd);
  }

  line.connector.faded {
    stroke: #665fa294;
    stroke-width: 2;
    filter: none;
  }

  /* Controls */

  #controls {
    margin: 38px 0 0 0;
    display: flex;
    gap: 28px;
  }

  button {
    background: linear-gradient(145deg, #452edb, #1f169e);
    border: none;
    padding: 14px 34px;
    border-radius: 28px;
    color: #e9e9ff;
    font-weight: 700;
    font-family: 'Montserrat', sans-serif;
    font-size: 1.12rem;
    cursor: pointer;
    user-select: none;
    box-shadow:
      0 0 10px #5b46ffcc,
      inset 0 0 8px #8c7affcc;
    transition:
      background 0.4s ease,
      box-shadow 0.4s ease,
      transform 0.15s ease;
  }
  button:active {
    transform: scale(0.95);
    background: linear-gradient(145deg, #381fc4, #160f7d);
    box-shadow:
      0 0 5px #452edbcc inset;
  }
  button:focus-visible {
    outline-offset: 3px;
    outline: 3px solid #8c7affaa;
  }

  /* Footer */

  footer {
    margin-top: 64px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.9rem;
    color: #9d9aae;
    user-select: none;
  }

</style>
</head>
<body>
  <div class="container" role="main" aria-label="Branch and Bound Visualization">
    <h1>Branch &amp; Bound</h1>
    <h2>Visualizing the pruning of solution space</h2>

    <div id="tree-container" aria-describedby="desc-tree" tabindex="0">
      <svg id="connectors" aria-hidden="true"></svg>
      <!-- Nodes will be dynamically generated -->
    </div>

    <div id="controls" aria-label="Controls">
      <button id="btn-start" aria-live="polite" aria-pressed="false">▶ Start Visualization</button>
      <button id="btn-reset" aria-live="polite" aria-pressed="false" disabled>⟲ Reset</button>
    </div>
  </div>

  <footer>
    Created with 🌌 by AI &mdash; Branch and Bound Algorithm Visualization
  </footer>

<script>
  // Description for screenreaders
  const treeContainer = document.getElementById('tree-container');
  const desc = document.createElement('p');
  desc.id = 'desc-tree';
  desc.className = 'sr-only';
  desc.textContent = 'This visualization shows a binary search tree representing a Branch and Bound algorithm exploring and pruning candidate solutions. Nodes highlight best solutions, pruning decisions, and bounding. A smooth animation reveals nodes and edges step-by-step.';
  treeContainer.appendChild(desc);

  // Setup nodes data for a small fixed example binary tree for Branch & Bound
  // Each node: id, parentId, label, value, type (branch/bound/neutral)
  // This simplistic tree will have 7 nodes: root + 2 levels
  // Values represent solution estimates or bounds
  // Branch nodes are active search points
  // Bound nodes are pruned branches
  // Neutral nodes are unexplored or neutral
  const nodesData = [
    { id: 'N1', parent: null, label: 'Root', value: 112, type: 'branch', pos: [50, 8] },
    { id: 'N2', parent: 'N1', label: 'Left', value: 90, type: 'branch', pos: [25, 30] },
    { id: 'N3', parent: 'N1', label: 'Right', value: 60, type: 'bound', pos: [75, 30] },
    { id: 'N4', parent: 'N2', label: 'Left-Left', value: 45, type: 'branch', pos: [12, 52] },
    { id: 'N5', parent: 'N2', label: 'Left-Right', value: 55, type: 'bound', pos: [38, 52] },
    { id: 'N6', parent: 'N3', label: 'Right-Left', value: 31, type: 'bound', pos: [62, 52] },
    { id: 'N7', parent: 'N3', label: 'Right-Right', value: 25, type: 'branch', pos: [88, 52] }
  ];

  // We'll animate the exploration in sequence, highlighting active nodes (branch) and pruning bounds
  // We show the tree building line by line with easing fade and scale
  // Lines will highlight with different colors for pruned edges

  // Globals
  const tree = document.getElementById('tree-container');
  const svg = document.getElementById('connectors');
  const btnStart = document.getElementById('btn-start');
  const btnReset = document.getElementById('btn-reset');

  // Convert % pos to pixels in container
  function posToPixels(xPercent, yPercent) {
    const w = tree.clientWidth;
    const h = tree.clientHeight;
    return { x: (xPercent / 100) * w, y: (yPercent / 100) * h };
  }

  // Create an SVG line connector
  function createConnector(x1, y1, x2, y2, pruned = false) {
    const line = document.createElementNS("http://www.w3.org/2000/svg", 'line');
    line.classList.add('connector');
    if (pruned) line.classList.add('bound');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x1);
    line.setAttribute('y2', y1);
    return line;
  }

  // Create a Node HTML element
  function createNode(id, label, value, type, posPercent) {
    const node = document.createElement('div');
    node.className = `node ${type}`;
    node.setAttribute('data-id', id);
    node.setAttribute('role', 'img');
    node.setAttribute('aria-label', `${label} node with estimated value ${value}. ${type === 'bound' ? 'Pruned branch.' : 'Active branch.'}`);

    // Position
    const { x, y } = posToPixels(posPercent[0], posPercent[1]);
    // Offset half width and height for centering
    node.style.left = `${x - 48}px`;
    node.style.top = `${y - 48}px`;

    // Inner content
    const labelElem = document.createElement('div');
    labelElem.className = 'label';
    labelElem.textContent = label;
    node.appendChild(labelElem);

    const valueElem = document.createElement('div');
    valueElem.className = 'value';
    valueElem.textContent = value;
    node.appendChild(valueElem);

    return node;
  }

  // State variables
  let nodesMap = new Map();
  let connectorsMap = new Map();
  let animationPhase = 0; // Steps through phases 0-9
  let animationTimeout = null;

  // Clear tree SVG and nodes
  function clearTree() {
    svg.innerHTML = '';
    nodesMap.clear();
    connectorsMap.clear();
    tree.querySelectorAll('.node').forEach(n => n.remove());
    animationPhase = 0;
  }

  // Build tree base (nodes hidden, no edges)
  // We add all nodes but keep opacity to 0 (handled in CSS)
  function buildTreeBase() {
    nodesData.forEach(nd => {
      const nodeEl = createNode(nd.id, nd.label, nd.value, nd.type, nd.pos);
      tree.appendChild(nodeEl);
      nodesMap.set(nd.id, nodeEl);
    });
  }

  // Animate next step with smooth scaling/fading and connector growth
  function animateStep(step) {
    switch(step) {
      case 1:
        // show root node
        showNode('N1');
        break;
      case 2:
        // draw edge Root->Left and show Left node
        drawConnector('N1', 'N2', false);
        showNode('N2');
        break;
      case 3:
        // draw edge Root->Right (pruned) and show Right node as bound pruned
        drawConnector('N1', 'N3', true);
        showNode('N3');
        break;
      case 4:
        // draw Left->Left edge and show Left-Left node
        drawConnector('N2', 'N4', false);
        showNode('N4');
        break;
      case 5:
        // draw Left->Right edge (pruned) and show Left-Right node
        drawConnector('N2', 'N5', true);
        showNode('N5');
        break;
      case 6:
        // draw Right->Left edge (pruned) and show Right-Left node
        drawConnector('N3', 'N6', true);
        showNode('N6');
        break;
      case 7:
        // draw Right->Right edge and show Right-Right node
        drawConnector('N3', 'N7', false);
        showNode('N7');
        break;
      case 8:
        // highlight best candidate nodes scaling up briefly (root, Left-Left, Right-Right)
        highlightBestNodes(['N1', 'N4', 'N7']);
        break;
      case 9:
        // dim all bound nodes and edges for final clarity
        dimBoundNodesAndEdges();
        break;
      default:
        // end.
        btnStart.disabled = false;
        btnReset.disabled = false;
        btnStart.setAttribute('aria-pressed', 'false');
        btnReset.setAttribute('aria-pressed', 'false');
        break;
    }
  }

  // Show node with fade and scale
  function showNode(id) {
    const node = nodesMap.get(id);
    if (!node) return;
    node.classList.add('show');
  }

  // Draw connector line from p to c. If pruned = true, line is tinted differently
  // Animate line growth.
  function drawConnector(pId, cId, pruned = false) {
    const pNode = nodesMap.get(pId);
    const cNode = nodesMap.get(cId);
    if (!pNode || !cNode) return;

    // get center coords of source and target nodes
    // computed from style left/top + 48 (half width)
    const pRect = pNode.getBoundingClientRect();
    const cRect = cNode.getBoundingClientRect();
    const treeRect = tree.getBoundingClientRect();

    // relative position inside tree container
    const x1 = pRect.left + pRect.width / 2 - treeRect.left;
    const y1 = pRect.top + pRect.height / 2 - treeRect.top;
    const x2 = cRect.left + cRect.width / 2 - treeRect.left;
    const y2 = cRect.top + cRect.height / 2 - treeRect.top;

    const line = createConnector(x1, y1, x2, y2, pruned);
    svg.appendChild(line);
    connectorsMap.set(`${pId}-${cId}`, line);

    // Animate line growth from p to c
    // We'll animate the line's x2/y2 attr from x1/y1 to x2/y2 over 700ms
    const duration = 700;
    const startTime = performance.now();

    function animateLine(time) {
      const elapsed = time - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const curX = x1 + (x2 - x1) * progress;
      const curY = y1 + (y2 - y1) * progress;
      line.setAttribute('x2', curX);
      line.setAttribute('y2', curY);
      if (progress < 1) {
        requestAnimationFrame(animateLine);
      }
    }
    requestAnimationFrame(animateLine);
  }

  // Highlight best candidate nodes for final focus
  // Scale up and glow with subtle animation for 1.5s
  function highlightBestNodes(nodeIds) {
    nodeIds.forEach(id => {
      const node = nodesMap.get(id);
      if (!node) return;
      node.style.transition = 'transform 0.6s ease, box-shadow 0.6s ease';
      node.style.transform = 'scale(1.2)';
      node.style.boxShadow =
        '0 0 18px #ffc6ffcc, 0 0 40px #ff8afccc, inset 0 0 16px #ff8afcaa';

      // Restore back after delay
      setTimeout(() => {
        node.style.transform = 'scale(1)';
        node.style.boxShadow =
          node.classList.contains('branch')
            ? '0 0 12px #925affdd, 0 8px 15px #6c4df5bb, inset 0 2px 8px #b8a7ff88'
            : node.classList.contains('bound')
            ? '0 0 15px #ff5962ff, 0 10px 20px #de3247cc, inset 0 3px 8px #ff8497aa'
            : '0 0 8px #b8a7ffaa, 0 6px 12px #3f3bcfcc, inset 0 2px 5px #a89eff55';
      }, 1600);
    });
  }

  // Dim all bound nodes and edges by applying CSS faded styles
  function dimBoundNodesAndEdges() {
    // Nodes
    nodesMap.forEach(node => {
      if (node.classList.contains('bound')) {
        node.style.opacity = '0.45';
      }
    });
    // Edges
    connectorsMap.forEach((line, key) => {
      if (line.classList.contains('bound')) {
        line.classList.add('faded');
      }
    });
  }

  // Run animation sequence automatically with timing
  function runAnimation() {
    btnStart.disabled = true;
    btnReset.disabled = false;
    btnStart.setAttribute('aria-pressed', 'true');
    btnReset.setAttribute('aria-pressed', 'false');

    animationPhase = 1;

    function step() {
      animateStep(animationPhase);
      animationPhase++;
      if (animationPhase <= 9) {
        // Timing:
        // steps 1-7: nodes/edges ~900ms each,
        // step 8 highlight 1800ms,
        // step 9 dim 900ms,
        // then finish
        let delay;
        if (animationPhase <= 7) delay = 900;
        else if (animationPhase === 8) delay = 1800;
        else if (animationPhase === 9) delay = 900;
        else delay = 0;

        if (delay > 0) {
          animationTimeout = setTimeout(step, delay);
        }
      }
    }
    step();
  }

  // Reset visualization
  function resetVisualization() {
    btnStart.disabled = false;
    btnReset.disabled = true;
    btnStart.setAttribute('aria-pressed', 'false');
    btnReset.setAttribute('aria-pressed', 'false');
    clearTimeout(animationTimeout);
    clearTree();
    buildTreeBase();

    // Reset styles
    nodesMap.forEach(node => {
      node.style.opacity = '';
      node.style.transform = '';
      node.style.boxShadow = '';
      node.classList.remove('show');
    });
  }

  // On window resize, reposition nodes and lines
  function reposition() {
    // Update node positions
    nodesData.forEach(nd => {
      const node = nodesMap.get(nd.id);
      if (!node) return;
      const { x, y } = posToPixels(nd.pos[0], nd.pos[1]);
      node.style.left = `${x - 48}px`;
      node.style.top = `${y - 48}px`;
    });

    // Update connectors position if any lines drawn
    connectorsMap.forEach((line, key) => {
      const [pId, cId] = key.split('-');
      const pNode = nodesMap.get(pId);
      const cNode = nodesMap.get(cId);
      if (!pNode || !cNode) return;

      const pRect = pNode.getBoundingClientRect();
      const cRect = cNode.getBoundingClientRect();
      const treeRect = tree.getBoundingClientRect();

      const x1 = pRect.left + pRect.width / 2 - treeRect.left;
      const y1 = pRect.top + pRect.height / 2 - treeRect.top;
      const x2 = cRect.left + cRect.width / 2 - treeRect.left;
      const y2 = cRect.top + cRect.height / 2 - treeRect.top;

      line.setAttribute('x1', x1);
      line.setAttribute('y1', y1);

      // If line fully drawn, snap x2/y2 to new pos
      // Or if animating, do not override the animation progress, but this is fine for resize
      if (Number(line.getAttribute('x2')) !== x1 || Number(line.getAttribute('y2')) !== y1) {
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
      }
    });
  }

  // Initial setup
  clearTree();
  buildTreeBase();

  // Event listeners
  btnStart.addEventListener('click', () => {
    if (btnStart.disabled) return;
    runAnimation();
  });

  btnReset.addEventListener('click', () => {
    resetVisualization();
  });

  window.addEventListener('resize', () => {
    reposition();
  });

  // Accessibility support: add some keyboard focus styles
  treeContainer.addEventListener('focus', () => {
    treeContainer.style.outline = '2px solid #8c7affcc';
    treeContainer.style.outlineOffset = '8px';
  });
  treeContainer.addEventListener('blur', () => {
    treeContainer.style.outline = 'none';
  });

</script>
</body>
</html>
