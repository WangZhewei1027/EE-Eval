<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket Programming</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .footer {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
            clear: both;
        }
        
        .footer p {
            margin-bottom: 10px;
        }
        
        .button-container {
            margin-top: 20px;
        }
        
        .button {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #444;
        }
        
        .icon {
            font-size: 24px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Socket Programming</h1>
        </div>
        <div class="footer">
            <p>&copy; 2023 Socket Programming</p>
        </div>
        <div class="button-container">
            <button id="socketButton">Connect to Server</button>
            <button id="disconnectButton">Disconnect from Server</button>
        </div>
    </div>
    
    <script>
        const socket = new WebSocket('ws://localhost:8080');

        document.getElementById('socketButton').addEventListener('click', () => {
            socket.connect();
            console.log('Connected to server');
        });

        document.getElementById('disconnectButton').addEventListener('click', () => {
            if (socket.readyState === WebSocket.OPEN) {
                socket.close();
                console.log('Disconnected from server');
            }
        });

        socket.onmessage = (event) => {
            console.log(`Received message: ${event.data}`);
        };

        socket.onopen = () => {
            console.log('Connected to server');
        };

        socket.onerror = (error) => {
            console.log('Error occurred:', error);
        };
    </script>
</body>
</html>
