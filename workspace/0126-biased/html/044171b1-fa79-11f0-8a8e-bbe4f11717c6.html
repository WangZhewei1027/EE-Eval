<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deque</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        .deque {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        .deque-item {
            margin-right: 10px;
        }

        .deque-button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .deque-button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Deque</h1>
        <div class="deque">
            <div class="deque-item">Item 1</div>
            <div class="deque-item">Item 2</div>
            <div class="deque-item">Item 3</div>
            <div class="deque-item">Item 4</div>
            <div class="deque-item">Item 5</div>
        </div>
        <div class="deque-button">Add Item</div>
    </div>

    <script>
        const deque = document.querySelector('.deque');
        const addButton = document.querySelector('.deque-button');

        addButton.addEventListener('click', () => {
            const item = document.createElement('div');
            item.textContent = 'Item 6';
            deque.appendChild(item);
        });
    </script>
</body>
</html>
