<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bellman-Ford Algorithm Interactive Demo</title>
  <style>
    /* Extremely minimal styling: keep plain, black-on-white, simple layout */
    html, body { margin: 8px; padding: 0; font-family: Arial, Helvetica, sans-serif; color: black; background: white; }
    .row { display: flex; gap: 12px; margin-bottom: 8px; align-items: center; }
    .col { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 13px; }
    input, button, select, textarea { font-size: 13px; }
    button { cursor: pointer; }
    table { border-collapse: collapse; font-size: 13px; }
    td, th { padding: 4px 6px; border: 1px solid #000; }
    canvas { border: 1px solid #000; background: white; }
    pre { background: #fff; padding: 6px; border: 1px solid #000; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Bellman-Ford Algorithm — Interactive Demo (Plain UI)</h2>

  <!-- Graph Construction Controls -->
  <div class="row">
    <div class="col" style="min-width:360px;">
      <div><strong>Graph Construction</strong></div>

      <div class="row">
        <label>Number of nodes:</label>
        <input id="nodeCount" type="number" min="1" value="5" style="width:60px;">
        <button id="generateNodesBtn">Generate Nodes (grid layout)</button>
        <button id="clearGraphBtn">Clear Graph</button>
      </div>

      <div class="row">
        <label>Add single node:</label>
        <input id="addNodeLabel" placeholder="Label (optional)">
        <button id="addNodeBtn">Add Node</button>
      </div>

      <div class="row">
        <label>Add edge:</label>
        <select id="edgeFrom"></select>
        <select id="edgeTo"></select>
        <input id="edgeWeight" type="number" value="1" style="width:70px;">
        <label><input id="edgeDirected" type="checkbox"> directed</label>
        <button id="addEdgeBtn">Add Edge</button>
      </div>

      <div class="row">
        <label>Random graph:</label>
        <input id="rndNodes" type="number" value="6" min="1" style="width:60px;">
        <label>Density (0-1):</label>
        <input id="rndDensity" type="number" min="0" max="1" step="0.1" value="0.4" style="width:60px;">
        <label>Weight range:</label>
        <input id="rndMin" type="number" value="-5" style="width:60px;">
        <input id="rndMax" type="number" value="10" style="width:60px;">
        <button id="rndBtn">Generate Random</button>
      </div>

      <div class="row">
        <label>Import / Export:</label>
        <button id="exportGraphBtn">Export Graph JSON</button>
        <button id="importGraphBtn">Load JSON from textarea</button>
      </div>

      <textarea id="importExportArea" rows="6" style="width:100%;"></textarea>
    </div>

    <!-- Edge list and edit -->
    <div class="col" style="flex:1;">
      <div><strong>Edges (click to edit weight or delete)</strong></div>
      <div id="edgesContainer" style="max-height:240px; overflow:auto; border:1px solid #000; padding:4px;">
        <!-- Edge table inserted here -->
      </div>

      <div class="row">
        <label>Directed mode for new edges:</label>
        <select id="defaultDirected">
          <option value="true">Directed</option>
          <option value="false">Undirected</option>
        </select>
        <button id="autoLayoutBtn">Auto Layout Nodes</button>
        <button id="snapPositionsBtn">Snap to Grid</button>
      </div>

      <div class="row">
        <label>Graph state:</label>
        <button id="saveStateBtn">Save Full State JSON</button>
        <button id="loadStateBtn">Load State JSON from textarea</button>
      </div>
    </div>
  </div>

  <!-- Algorithm Controls -->
  <div class="row">
    <div class="col" style="min-width:360px;">
      <div><strong>Bellman-Ford Controls</strong></div>

      <div class="row">
        <label>Source:</label>
        <select id="sourceSelect"></select>

        <label>Mode:</label>
        <select id="runMode">
          <option value="auto">Auto iteration order</option>
          <option value="manual">Manual relax (click edge)</option>
        </select>

        <label>Preserve state on edit:</label>
        <input id="preserveOnEdit" type="checkbox" checked>
      </div>

      <div class="row">
        <button id="initBtn">Initialize / Reset Distances</button>
        <button id="stepBtn">Step (one edge relaxation)</button>
        <button id="stepBackBtn">Step Back</button>
        <button id="runBtn">Run to Completion</button>
        <button id="autoRunBtn">Auto Run</button>
        <button id="pauseBtn">Pause</button>
      </div>

      <div class="row">
        <label>Speed (ms per step):</label>
        <input id="speedRange" type="range" min="50" max="2000" step="50" value="500">
        <span id="speedVal">500</span> ms
      </div>

      <div class="row">
        <button id="detectNegBtn">Check Negative Cycle (quick test)</button>
        <button id="markNegCycleBtn">Highlight Negative Cycle if detected</button>
      </div>

      <div class="row">
        <button id="undoBtn">Undo</button>
        <button id="redoBtn">Redo</button>
        <button id="clearHistoryBtn">Clear History</button>
      </div>

      <div class="row">
        <label>Explanation mode:</label>
        <select id="explainLevel">
          <option value="none">None</option>
          <option value="brief">Brief</option>
          <option value="detailed">Detailed</option>
        </select>
      </div>
    </div>

    <!-- Algorithm state display -->
    <div class="col" style="flex:1;">
      <div><strong>Current Algorithm State</strong></div>
      <div class="row">
        <label>Iteration (k):</label>
        <span id="iterationLabel">0</span>
        <label>Edge index (i):</label>
        <span id="edgeIndexLabel">0</span>
        <label>Finished:</label>
        <span id="finishedLabel">false</span>
      </div>

      <div class="row">
        <label>Distances:</label>
        <div id="distContainer" style="flex:1;"></div>
      </div>

      <div class="row">
        <label>Predecessors:</label>
        <div id="predContainer" style="flex:1;"></div>
      </div>

      <div class="row">
        <label>Target for path reconstruction:</label>
        <select id="targetSelect"></select>
        <button id="reconstructBtn">Reconstruct Path</button>
      </div>

      <div class="row">
        <label>Path:</label>
        <div id="pathContainer" style="flex:1;"></div>
      </div>

    </div>
  </div>

  <!-- Canvas Visualization + Step Explanation -->
  <div class="row">
    <div class="col" style="min-width:560px;">
      <div><strong>Graph Visualization (click edges/nodes for actions)</strong></div>
      <canvas id="graphCanvas" width="720" height="420"></canvas>
      <div class="row">
        <label>Canvas actions:</label>
        <button id="canvasAddNodeBtn">Add Node at center</button>
        <button id="canvasCenterBtn">Center Layout</button>
        <button id="canvasClearPositionsBtn">Clear Positions</button>
      </div>
    </div>

    <div class="col" style="flex:1;">
      <div><strong>Step Explanation / History</strong></div>
      <div id="explainBox" style="height:220px; overflow:auto; border:1px solid #000; padding:6px;"></div>
      <div><strong>History</strong></div>
      <div id="historyBox" style="height:180px; overflow:auto; border:1px solid #000; padding:6px;"></div>
    </div>
  </div>

  <script>
/*
  Bellman-Ford Interactive Demo
  - Extremely minimal UI (black text on white)
  - Rich controls for building graph, stepping algorithm, manual relax
  - History, undo/redo, random generator, import/export, path reconstruction
*/

/* ----------- Data Model ----------- */
let state = {
  nodes: [],        // {id, label, x, y}
  edges: [],        // {id, u, v, w, directed}
  nextNodeId: 1,
  nextEdgeId: 1,
  // Algorithm runtime variables
  distances: {},
  pred: {},
  source: null,
  iteration: 0,
  edgeIndex: 0,
  nIterations: 0,
  finished: false,
  negativeCycle: null, // array of node ids if detected
};

// History and undo/redo
let history = [];
let future = [];

// Autoplay timer
let autoTimer = null;

// Canvas and UI references
const canvas = document.getElementById('graphCanvas');
const ctx = canvas.getContext('2d');

const nodeCountInput = document.getElementById('nodeCount');
const generateNodesBtn = document.getElementById('generateNodesBtn');
const clearGraphBtn = document.getElementById('clearGraphBtn');
const addNodeBtn = document.getElementById('addNodeBtn');
const addNodeLabel = document.getElementById('addNodeLabel');

const edgeFrom = document.getElementById('edgeFrom');
const edgeTo = document.getElementById('edgeTo');
const edgeWeight = document.getElementById('edgeWeight');
const edgeDirected = document.getElementById('edgeDirected');
const addEdgeBtn = document.getElementById('addEdgeBtn');

const rndBtn = document.getElementById('rndBtn');
const rndNodes = document.getElementById('rndNodes');
const rndDensity = document.getElementById('rndDensity');
const rndMin = document.getElementById('rndMin');
const rndMax = document.getElementById('rndMax');

const edgesContainer = document.getElementById('edgesContainer');
const sourceSelect = document.getElementById('sourceSelect');
const initBtn = document.getElementById('initBtn');
const stepBtn = document.getElementById('stepBtn');
const stepBackBtn = document.getElementById('stepBackBtn');
const runBtn = document.getElementById('runBtn');
const autoRunBtn = document.getElementById('autoRunBtn');
const pauseBtn = document.getElementById('pauseBtn');
const speedRange = document.getElementById('speedRange');
const speedVal = document.getElementById('speedVal');
const runMode = document.getElementById('runMode');
const detectNegBtn = document.getElementById('detectNegBtn');
const markNegCycleBtn = document.getElementById('markNegCycleBtn');
const iterationLabel = document.getElementById('iterationLabel');
const edgeIndexLabel = document.getElementById('edgeIndexLabel');
const finishedLabel = document.getElementById('finishedLabel');
const distContainer = document.getElementById('distContainer');
const predContainer = document.getElementById('predContainer');
const reconstructBtn = document.getElementById('reconstructBtn');
const targetSelect = document.getElementById('targetSelect');
const pathContainer = document.getElementById('pathContainer');
const explainBox = document.getElementById('explainBox');
const historyBox = document.getElementById('historyBox');
const exportGraphBtn = document.getElementById('exportGraphBtn');
const importGraphBtn = document.getElementById('importGraphBtn');
const importExportArea = document.getElementById('importExportArea');
const saveStateBtn = document.getElementById('saveStateBtn');
const loadStateBtn = document.getElementById('loadStateBtn');
const undoBtn = document.getElementById('undoBtn');
const redoBtn = document.getElementById('redoBtn');
const clearHistoryBtn = document.getElementById('clearHistoryBtn');
const defaultDirected = document.getElementById('defaultDirected');
const autoLayoutBtn = document.getElementById('autoLayoutBtn');
const snapPositionsBtn = document.getElementById('snapPositionsBtn');
const preserveOnEdit = document.getElementById('preserveOnEdit');
const explainLevel = document.getElementById('explainLevel');
const detectNegBtnEl = detectNegBtn;
const markNegCycleBtnEl = markNegCycleBtn;
const canvasAddNodeBtn = document.getElementById('canvasAddNodeBtn');
const canvasCenterBtn = document.getElementById('canvasCenterBtn');
const canvasClearPositionsBtn = document.getElementById('canvasClearPositionsBtn');
const saveStateJSONBtn = saveStateBtn;
const loadStateJSONBtn = loadStateBtn;
const exportGraphJSONBtn = exportGraphBtn;
const importGraphJSONBtn = importGraphBtn;

/* ----------- Utilities ----------- */
function cloneStateForHistory() {
  // store a serialized snapshot of relevant parts of state
  return JSON.parse(JSON.stringify({
    nodes: state.nodes,
    edges: state.edges,
    nextNodeId: state.nextNodeId,
    nextEdgeId: state.nextEdgeId,
    distances: state.distances,
    pred: state.pred,
    source: state.source,
    iteration: state.iteration,
    edgeIndex: state.edgeIndex,
    finished: state.finished,
    negativeCycle: state.negativeCycle
  }));
}

function pushHistory(label) {
  history.push({ label: label || 'action', snapshot: cloneStateForHistory() });
  // limit history length to avoid huge memory use
  if (history.length > 200) history.shift();
  future = [];
  renderHistory();
}

function applySnapshot(snapshot) {
  state.nodes = JSON.parse(JSON.stringify(snapshot.nodes));
  state.edges = JSON.parse(JSON.stringify(snapshot.edges));
  state.nextNodeId = snapshot.nextNodeId;
  state.nextEdgeId = snapshot.nextEdgeId;
  state.distances = snapshot.distances;
  state.pred = snapshot.pred;
  state.source = snapshot.source;
  state.iteration = snapshot.iteration;
  state.edgeIndex = snapshot.edgeIndex;
  state.finished = snapshot.finished;
  state.negativeCycle = snapshot.negativeCycle;
  updateAll();
}

function undo() {
  if (history.length === 0) return;
  const last = history.pop();
  future.push({ label: last.label, snapshot: cloneStateForHistory() });
  if (history.length > 0) {
    const prev = history[history.length - 1].snapshot;
    applySnapshot(prev);
  } else {
    // no history: clear
    resetStateToEmpty();
  }
  renderHistory();
}

function redo() {
  if (future.length === 0) return;
  const next = future.pop();
  pushHistory(next.label);
  applySnapshot(next.snapshot);
}

/* ----------- Graph Editing ----------- */
function resetStateToEmpty() {
  state = {
    nodes: [],
    edges: [],
    nextNodeId: 1,
    nextEdgeId: 1,
    distances: {},
    pred: {},
    source: null,
    iteration: 0,
    edgeIndex: 0,
    nIterations: 0,
    finished: false,
    negativeCycle: null
  };
  history = [];
  future = [];
  updateAll();
}

function addNode(label, x, y) {
  const id = state.nextNodeId++;
  const node = { id: id.toString(), label: (label || ('v' + id)), x: (x || Math.random() * (canvas.width - 80) + 40), y: (y || Math.random() * (canvas.height - 80) + 40) };
  state.nodes.push(node);
  updateNodeSelects();
  pushHistory('add node ' + node.label);
  updateAll();
  return node;
}

function removeNode(nodeId) {
  // remove edges attached
  state.edges = state.edges.filter(e => e.u !== nodeId && e.v !== nodeId);
  state.nodes = state.nodes.filter(n => n.id !== nodeId);
  if (state.source === nodeId) state.source = null;
  updateNodeSelects();
  pushHistory('remove node ' + nodeId);
  updateAll();
}

function addEdge(u, v, w, directed) {
  if (!u || !v) return null;
  const id = (state.nextEdgeId++).toString();
  const e = { id, u, v, w: Number(w), directed: Boolean(directed) };
  state.edges.push(e);
  pushHistory('add edge ' + id);
  updateAll();
  return e;
}

function removeEdge(edgeId) {
  state.edges = state.edges.filter(e => e.id !== edgeId);
  pushHistory('delete edge ' + edgeId);
  updateAll();
}

function updateEdgeWeight(edgeId, newWeight) {
  const e = state.edges.find(x => x.id === edgeId);
  if (!e) return;
  e.w = Number(newWeight);
  pushHistory('edit weight ' + edgeId + ' -> ' + newWeight);
  if (!preserveOnEdit.checked) {
    initializeAlgorithm(false);
  } else {
    updateAll();
  }
}

/* ----------- UI Synchronization ----------- */
function updateNodeSelects() {
  // Edge from/to, source, target selects
  [edgeFrom, edgeTo, sourceSelect, targetSelect].forEach(sel => {
    const old = sel.value;
    sel.innerHTML = '';
    state.nodes.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n.id;
      opt.textContent = n.label || n.id;
      sel.appendChild(opt);
    });
    if (state.nodes.length > 0) {
      if (sel === sourceSelect && state.source) {
        sel.value = state.source;
      } else if (old) {
        if ([...sel.options].some(o => o.value === old)) sel.value = old;
      }
    }
  });
  renderEdgesList();
}

function renderEdgesList() {
  // Render table of edges with inline edit
  const table = document.createElement('table');
  const header = document.createElement('tr');
  ['ID','From','To','Weight','Directed','Actions'].forEach(t => {
    const th = document.createElement('th'); th.textContent = t; header.appendChild(th);
  });
  table.appendChild(header);

  state.edges.forEach(e => {
    const tr = document.createElement('tr');
    const fromNode = state.nodes.find(n => n.id === e.u);
    const toNode = state.nodes.find(n => n.id === e.v);
    const fromLabel = fromNode ? fromNode.label : e.u;
    const toLabel = toNode ? toNode.label : e.v;

    const tdId = document.createElement('td'); tdId.textContent = e.id; tr.appendChild(tdId);
    const tdFrom = document.createElement('td'); tdFrom.textContent = fromLabel; tr.appendChild(tdFrom);
    const tdTo = document.createElement('td'); tdTo.textContent = toLabel; tr.appendChild(tdTo);
    const tdW = document.createElement('td');
    const wInput = document.createElement('input'); wInput.type='number'; wInput.value=e.w; wInput.style.width='80px';
    wInput.addEventListener('change', ()=> updateEdgeWeight(e.id, wInput.value));
    tdW.appendChild(wInput); tr.appendChild(tdW);
    const tdDir = document.createElement('td'); tdDir.textContent = e.directed ? 'yes' : 'no'; tr.appendChild(tdDir);
    const tdAct = document.createElement('td');
    const delBtn = document.createElement('button'); delBtn.textContent='Delete';
    delBtn.addEventListener('click', ()=> removeEdge(e.id));
    tdAct.appendChild(delBtn);
    tr.appendChild(tdAct);
    table.appendChild(tr);
  });
  edgesContainer.innerHTML = '';
  edgesContainer.appendChild(table);
}

/* ----------- Algorithm Implementation ----------- */

function initializeAlgorithm(pushHistoryFlag = true) {
  // Setup distances and preds
  state.distances = {};
  state.pred = {};
  state.nodes.forEach(n => { state.distances[n.id] = Infinity; state.pred[n.id] = null; });
  if (!state.source && state.nodes.length > 0) {
    state.source = state.nodes[0].id;
  }
  if (state.source) state.distances[state.source] = 0;
  state.iteration = 0;
  state.edgeIndex = 0;
  state.finished = false;
  state.negativeCycle = null;
  state.nIterations = Math.max(0, state.nodes.length - 1);
  if (pushHistoryFlag) pushHistory('initialize BF, source=' + state.source);
  updateAll();
}

function relaxEdge(edge) {
  // Attempt relax on edge {u,v,w,directed}
  const u = edge.u, v = edge.v, w = Number(edge.w);
  let applied = false;
  if (state.distances[u] !== undefined && state.distances[u] !== Infinity) {
    if (state.distances[u] + w < state.distances[v]) {
      const old = state.distances[v];
      state.distances[v] = state.distances[u] + w;
      state.pred[v] = u;
      applied = true;
    }
  }
  // For undirected edges we also relax reverse as separate conceptual edge
  return applied;
}

function stepBF() {
  if (state.finished) {
    explain('Algorithm already finished; run initialize to restart.');
    return;
  }
  if (!state.source) {
    explain('No source node selected.');
    return;
  }
  if (runMode.value === 'manual') {
    explain('Manual mode: Step will not automatically choose an edge. Click an edge in the canvas or in the edge list to relax it manually.');
    return;
  }
  // auto mode: perform one relaxation for the current edgeIndex in current iteration
  if (state.iteration >= state.nIterations) {
    // after n-1 iterations, do final pass to detect negative cycles
    const neg = detectNegativeCycleInternal();
    state.negativeCycle = neg;
    state.finished = true;
    pushHistory('final negative cycle check');
    updateAll();
    explain('Completed main iterations. Negative cycle detection performed.');
    return;
  }
  if (state.edgeIndex >= state.edges.length) {
    // end of this iteration; move to next
    state.iteration++;
    state.edgeIndex = 0;
    pushHistory('end iteration -> ' + state.iteration);
    explain('Iteration advanced to ' + state.iteration);
    updateAll();
    return;
  }
  const edge = state.edges[state.edgeIndex];
  const info = {
    edgeId: edge.id,
    u: edge.u,
    v: edge.v,
    w: edge.w,
    preDistU: state.distances[edge.u],
    preDistV: state.distances[edge.v]
  };
  // Attempt relax
  const applied = relaxEdge(edge);
  state.edgeIndex++;
  pushHistory('relax edge ' + edge.id + (applied ? ' applied' : 'no change'));
  updateAll();
  explainRelax(info, applied);
}

function manualRelax(edgeId) {
  if (state.finished) {
    explain('Algorithm already finished.');
    return;
  }
  const edge = state.edges.find(e => e.id === edgeId);
  if (!edge) return;
  const info = {
    edgeId: edge.id,
    u: edge.u,
    v: edge.v,
    w: edge.w,
    preDistU: state.distances[edge.u],
    preDistV: state.distances[edge.v]
  };
  const applied = relaxEdge(edge);
  pushHistory('manual relax edge ' + edge.id + (applied ? ' applied' : 'no change'));
  updateAll();
  explainRelax(info, applied);
}

function explainRelax(info, applied) {
  let text = '';
  if (explainLevel.value === 'none') {
    addExplain((applied ? 'Relaxed edge ' : 'No change for edge ') + info.edgeId);
    return;
  }
  if (explainLevel.value === 'brief') {
    text = (applied ? 'Relaxed: ' : 'No change: ') + 'edge ' + info.edgeId + ' (' + info.u + '->' + info.v + ' w=' + info.w + ')';
  } else {
    text = 'Processing edge ' + info.edgeId + ': ' + info.u + ' -> ' + info.v + ' with weight ' + info.w + '.\n';
    text += 'Distance(' + info.u + ') before = ' + (info.preDistU === Infinity ? '∞' : info.preDistU) + '. ';
    text += 'Distance(' + info.v + ') before = ' + (info.preDistV === Infinity ? '∞' : info.preDistV) + '.\n';
    if (info.preDistU === Infinity) {
      text += 'Cannot relax because source to ' + info.u + ' is unreachable.\n';
    } else {
      const candidate = info.preDistU + Number(info.w);
      text += 'Candidate distance for ' + info.v + ' = ' + candidate + '.\n';
      if (candidate < info.preDistV) {
        text += 'Candidate is better -> relax and update predecessor.\n';
      } else {
        text += 'Candidate not better -> no update.\n';
      }
    }
  }
  addExplain(text);
}

function runToCompletion() {
  if (state.finished) {
    explain('Already finished.');
    return;
  }
  while (!state.finished) {
    // We simulate steps until finished, but push history for each step to preserve undo-able actions.
    if (runMode.value === 'manual') {
      explain('Switch to "auto" mode for automated run-to-completion or relax edges manually.');
      return;
    }
    // Single iteration over edges
    if (state.iteration >= state.nIterations) {
      const neg = detectNegativeCycleInternal();
      state.negativeCycle = neg;
      state.finished = true;
      pushHistory('final negative cycle check');
      break;
    }
    if (state.edges.length === 0) {
      // nothing to relax: just finish
      state.iteration = state.nIterations;
      state.finished = true;
      pushHistory('no edges - finished');
      break;
    }
    // Loop edges
    for (; state.edgeIndex < state.edges.length; state.edgeIndex++) {
      const e = state.edges[state.edgeIndex];
      relaxEdge(e);
      pushHistory('relax edge ' + e.id + ' (batch run)');
    }
    // end of iteration
    state.iteration++;
    state.edgeIndex = 0;
    pushHistory('end iteration -> ' + state.iteration);
  }
  updateAll();
  explain('Run to completion finished. Negative cycle: ' + (state.negativeCycle ? 'detected' : 'not detected'));
}

function autoRunStart() {
  if (autoTimer) {
    explain('Auto-run already active.');
    return;
  }
  if (state.finished) {
    explain('Already finished. Initialize to run again.');
    return;
  }
  if (runMode.value === 'manual') {
    explain('Auto-run works in auto mode. Switch run mode to "auto".');
    return;
  }
  const speed = Number(speedRange.value);
  autoTimer = setInterval(() => {
    if (state.finished) {
      clearInterval(autoTimer); autoTimer = null;
      explain('Auto-run completed.');
      return;
    }
    stepBF();
  }, speed);
  explain('Auto-run started at ' + speed + ' ms per step.');
}

function autoRunPause() {
  if (autoTimer) {
    clearInterval(autoTimer); autoTimer = null;
    explain('Auto-run paused.');
  } else {
    explain('Auto-run is not active.');
  }
}

function detectNegativeCycleInternal() {
  // After n-1 iterations, perform one pass. If any distance can be reduced, negative cycle exists.
  const n = state.nodes.length;
  const snapshotDistances = Object.assign({}, state.distances);
  for (const e of state.edges) {
    if (snapshotDistances[e.u] !== undefined && snapshotDistances[e.u] !== Infinity) {
      if (snapshotDistances[e.u] + e.w < snapshotDistances[e.v]) {
        // found potential negative cycle; attempt to extract cycle by following preds
        const cycle = findNegativeCycleNodes(e.v);
        return cycle;
      }
    }
  }
  return null;
}

function findNegativeCycleNodes(start) {
  // Use predecessor chain to detect repeating nodes; start from 'start' and walk up to n steps
  let x = start;
  const seen = {};
  for (let i = 0; i < state.nodes.length; i++) {
    if (!state.pred[x]) break;
    x = state.pred[x];
  }
  // Now take n steps to capture cycle nodes
  const cycleNodes = [];
  let cur = x;
  for (let i = 0; i < state.nodes.length + 5; i++) {
    if (cycleNodes.includes(cur)) break;
    cycleNodes.push(cur);
    cur = state.pred[cur] || cur;
  }
  return cycleNodes;
}

/* ----------- Rendering / Canvas ----------- */

function updateAll() {
  // Refresh UI components and canvas
  updateNodeSelects();
  renderEdgesList();

}

function updateLabels() {

function renderDistances() {
  // Show distances and predecessors as inline lists
  distContainer.innerHTML = '';
  predContainer.innerHTML = '';
  const dl = document.createElement('div');
  state.nodes.forEach(n => {
    const span = document.createElement('div');

    span.textContent = (n.label || n.id) + ': ' + (d === Infinity ? '∞' : d);
    dl.appendChild(span);

  const pl = document.createElement('div');
  state.nodes.forEach(n => {
    const p = state.pred[n.id];
    const span = document.createElement('div');
    span.textContent = (n.label || n.id) + ': ' + (p ? (state.nodes.find(x=>x.id===p)?.label || p) : '-');
    pl.appendChild(span);
  });

}

function addExplain(text) {
  const para = document.createElement('div');
  para.textContent = text;
  explainBox.insertBefore(para, explainBox.firstChild);
}

function explain(text) {
  addExplain(text);
}

function renderHistory() {
  historyBox.innerHTML = '';
  for (let i = history.length - 1; i >= 0; i--) {
    const item = history[i];
    const div = document.createElement('div');
    div.style.marginBottom = '4px';
    const btn = document.createElement('button');
    btn.textContent = 'Revert';
    btn.addEventListener('click', () => {
      applySnapshot(item.snapshot);
      pushHistory('revert to ' + item.label);
    });
    div.appendChild(btn);
    const span = document.createElement('span');
    span.textContent = ' ' + item.label;
    div.appendChild(span);
    historyBox.appendChild(div);
  }
}

/* Canvas drawing basics - minimal visual representation */
function drawGraph() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Draw edges
  for (const e of state.edges) {
    const u = state.nodes.find(n => n.id === e.u);
    const v = state.nodes.find(n => n.id === e.v);
    if (!u || !v) continue;
    // Draw line
    ctx.beginPath();
    ctx.moveTo(u.x, u.y);
    ctx.lineTo(v.x, v.y);
    ctx.strokeStyle = "#000";
    ctx.lineWidth = (state.edgeIndex > 0 && state.edgeIndex <= state.edges.length && state.edges[state.edgeIndex-1]?.id === e.id) ? 3 : 1;
    ctx.stroke();
    // Arrow for directed
    if (e.directed) {
      drawArrowHead(u.x, u.y, v.x, v.y);
    }
    // Weight label at midpoint
    const mx = (u.x + v.x) / 2;
    const my = (u.y + v.y) / 2;
    ctx.fillStyle = "#000";
    ctx.font = "12px sans-serif";
    ctx.fillText('w=' + e.w, mx + 6, my + 6);
  }
  // Draw nodes
  for (const n of state.nodes) {
    ctx.beginPath();
    ctx.fillStyle = "#fff";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 1;
    ctx.arc(n.x, n.y, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = "#000";
    ctx.font = "12px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const label = n.label || n.id;
    ctx.fillText(label, n.x, n.y);
    // Distance displayed below node
    const d = state.distances[n.id];
    ctx.font = "11px sans-serif";
    ctx.fillText((d === Infinity ? '∞' : d), n.x, n.y + 26);
    // Highlight source and negative cycle nodes if any
    if (state.source === n.id) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, 22, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

function drawArrowHead(x1, y1, x2, y2) {
  // minimal arrowhead
  const dx = x2 - x1;
  const dy = y2 - y1;
  const angle = Math.atan2(dy, dx);
  const len = 10;
  const hx = x2 - Math.cos(angle) * 20;
  const hy = y2 - Math.sin(angle) * 20;
  ctx.beginPath();
  ctx.moveTo(hx, hy);
  ctx.lineTo(hx - len * Math.cos(angle - Math.PI/6), hy - len * Math.sin(angle - Math.PI/6));
  ctx.lineTo(hx - len * Math.cos(angle + Math.PI/6), hy - len * Math.sin(angle + Math.PI/6));
  ctx.closePath();
  ctx.fillStyle = "#000";
  ctx.fill();
}

/* ----------- Path Reconstruction ----------- */
function reconstructPathTo(targetId) {
  if (!state.source) { pathContainer.textContent = 'No source'; return; }
  const path = [];
  let cur = targetId;
  const visited = {};
  while (cur && !visited[cur]) {
    visited[cur] = true;
    path.push(cur);
    if (cur === state.source) break;
    cur = state.pred[cur];
    if (!cur) break;
  }
  if (path[path.length-1] !== state.source) {
    pathContainer.textContent = 'No path from source to target.';
    return;
  }
  path.reverse();
  const labels = path.map(id => state.nodes.find(n=>n.id===id)?.label || id);
  pathContainer.textContent = 'Path: ' + labels.join(' -> ') + '  (cost=' + state.distances[targetId] + ')';
}

/* ----------- Negative Cycle Highlighting ----------- */
function markNegativeCycle() {
  if (!state.negativeCycle || state.negativeCycle.length === 0) {
    explain('No negative cycle recorded.');
    return;
  }
  // We will highlight nodes of cycle by drawing small boxes in explanation
  addExplain('Negative cycle nodes: ' + state.negativeCycle.join(', '));
  // Visually indicate by slightly offsetting nodes - minimal: mark their labels in explain
}

/* ----------- Random Graph Generator ----------- */
function generateRandomGraph(n, density, wmin, wmax) {
  resetStateToEmpty();
  for (let i = 0; i < n; i++) addNode('v' + (i+1));
  // create edges with probability density between all ordered pairs
  for (let i = 0; i < state.nodes.length; i++) {
    for (let j = 0; j < state.nodes.length; j++) {
      if (i === j) continue;
      if (Math.random() < density) {
        const w = Math.floor(Math.random() * (wmax - wmin + 1)) + wmin;
        const directed = true;
        addEdge(state.nodes[i].id, state.nodes[j].id, w, directed);
      }
    }
  }
  updateAll();
  pushHistory('random graph generated');
}

/* ----------- Import / Export  ----------- */
function exportGraphJSON() {
  const out = {
    nodes: state.nodes,
    edges: state.edges
  };
  importExportArea.value = JSON.stringify(out, null, 2);
}

function importGraphJSON() {
  if (!importExportArea.value) { explain('No JSON in textarea.'); return; }
  try {
    const obj = JSON.parse(importExportArea.value);
    resetStateToEmpty();
    // Basic validation
    if (Array.isArray(obj.nodes)) {
      obj.nodes.forEach(n => {
        const id = (state.nextNodeId++).toString();
        state.nodes.push({ id, label: n.label || n.id, x: n.x || Math.random() * canvas.width, y: n.y || Math.random() * canvas.height });
      });
    }
    if (Array.isArray(obj.edges)) {
      obj.edges.forEach(e => {
        const u = e.u;
        const v = e.v;
        // find closest existing node by label if u/v not matching ids
        const findNodeId = (val) => {
          const found = state.nodes.find(n => n.label === val || n.id === val);
          return found ? found.id : null;
        };
        const uid = findNodeId(e.u) || e.u;
        const vid = findNodeId(e.v) || e.v;
        addEdge(uid, vid, e.w || 0, e.directed !== undefined ? e.directed : true);
      });
    }
    updateAll();
    pushHistory('import graph JSON');
  } catch (err) {
    explain('Invalid JSON: ' + err.message);
  }
}

function saveStateJSON() {
  const snapshot = cloneStateForHistory();
  importExportArea.value = JSON.stringify(snapshot, null, 2);
}

function loadStateJSON() {
  if (!importExportArea.value) { explain('Textarea empty.'); return; }
  try {
    const obj = JSON.parse(importExportArea.value);
    applySnapshot(obj);
    pushHistory('load state JSON');
  } catch (err) {
    explain('Invalid JSON state: ' + err.message);
  }
}

/* ----------- Canvas interactions (click to manual relax / move nodes) ----------- */
let draggingNodeId = null;
let dragOffset = {x:0,y:0};

canvas.addEventListener('mousedown', (ev) => {
  const p = getCanvasCoords(ev);
  // detect node hit first
  const hitNode = state.nodes.find(n => distance(n.x,n.y,p.x,p.y) <= 18);
  if (hitNode) {
    // start dragging
    draggingNodeId = hitNode.id;
    dragOffset.x = p.x - hitNode.x;
    dragOffset.y = p.y - hitNode.y;
    return;
  }
  // detect edge click: approximate by checking distance to each segment
  const hitEdge = state.edges.find(e => {
    const u = state.nodes.find(n => n.id === e.u);
    const v = state.nodes.find(n => n.id === e.v);
    if (!u || !v) return false;
    const d = distanceToSegment(p.x,p.y,u.x,u.y,v.x,v.y);
    return d <= 6;
  });
  if (hitEdge) {
    if (runMode.value === 'manual') {
      manualRelax(hitEdge.id);
    } else {
      explain('Edge clicked: ' + hitEdge.id + '. Switch to manual mode to relax by click.');
    }
  }
});

canvas.addEventListener('mousemove', (ev) => {
  if (!draggingNodeId) return;
  const p = getCanvasCoords(ev);
  const node = state.nodes.find(n => n.id === draggingNodeId);
  if (!node) return;
  node.x = Math.max(20, Math.min(canvas.width - 20, p.x - dragOffset.x));
  node.y = Math.max(20, Math.min(canvas.height - 20, p.y - dragOffset.y));
  drawGraph();
});

canvas.addEventListener('mouseup', ()=> { draggingNodeId = null; });

canvas.addEventListener('mouseleave', ()=> { draggingNodeId = null; });

function getCanvasCoords(ev) {
  const rect = canvas.getBoundingClientRect();
  return { x: ev.clientX - rect.left, y: ev.clientY - rect.top };
}

function distance(x1,y1,x2,y2) {
  return Math.hypot(x1-x2,y1-y2);
}

function distanceToSegment(px,py,x1,y1,x2,y2) {
  // projection
  const l2 = (x2-x1)*(x2-x1)+(y2-y1)*(y2-y1);
  if (l2 === 0) return distance(px,py,x1,y1);
  let t = ((px-x1)*(x2-x1)+(py-y1)*(y2-y1))/l2;
  t = Math.max(0, Math.min(1,t));
  const projx = x1 + t*(x2-x1);
  const projy = y1 + t*(y2-y1);
  return distance(px,py,projx,projy);
}

/* ----------- Misc Controls ----------- */

generateNodesBtn.addEventListener('click', () => {
  const n = Number(nodeCountInput.value) || 0;
  resetStateToEmpty();
  // grid layout
  const cols = Math.ceil(Math.sqrt(n));
  const rows = Math.ceil(n / cols);
  const margin = 40;
  const w = canvas.width - margin*2;
  const h = canvas.height - margin*2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if ((r*cols + c) >= n) break;
      const x = margin + (c + 0.5) * (w / cols);
      const y = margin + (r + 0.5) * (h / rows);
      addNode('v' + (state.nextNodeId), x, y);
    }
  }
  updateAll();
  pushHistory('generate nodes ' + n);
});

});

undoBtn.addEventListener('click', () => { undo(); });
redoBtn.addEventListener('click', () => { redo(); });
clearHistoryBtn.addEventListener('click', () => { history = []; future = []; renderHistory(); });

defaultDirected.addEventListener('change', () => { edgeDirected.checked = (defaultDirected.value === 'true'); });

autoLayoutBtn.addEventListener('click', () => {
  // simple circular layout
  const n = state.nodes.length;
  const cx = canvas.width / 2, cy = canvas.height / 2, r = Math.min(canvas.width, canvas.height)/3;
  state.nodes.forEach((node, i) => {
    node.x = cx + r * Math.cos(2 * Math.PI * i / n);
    node.y = cy + r * Math.sin(2 * Math.PI * i / n);
  });
  pushHistory('auto layout');
  updateAll();
});

snapPositionsBtn.addEventListener('click', () => {
  state.nodes.forEach(n => {
    n.x = Math.round(n.x / 10) * 10;
    n.y = Math.round(n.y / 10) * 10;
  });
  pushHistory('snap positions');
  updateAll();
});

canvasAddNodeBtn.addEventListener('click', () => {
  addNode('v' + state.nextNodeId, canvas.width/2, canvas.height/2);
});

canvasCenterBtn.addEventListener('click', () => {
  // re-center nodes to canvas center by subtracting bounding box center
  if (state.nodes.length === 0) return;
  const xs = state.nodes.map(n=>n.x);
  const ys = state.nodes.map(n=>n.y);
  const minx = Math.min(...xs), maxx = Math.max(...xs);
  const miny = Math.min(...ys), maxy = Math.max(...ys);
  const cx = (minx + maxx)/2, cy = (miny + maxy)/2;
  const dx = canvas.width/2 - cx, dy = canvas.height/2 - cy;
  state.nodes.forEach(n => { n.x += dx; n.y += dy; });
  pushHistory('center nodes');
  updateAll();
});

canvasClearPositionsBtn.addEventListener('click', () => {
  state.nodes.forEach(n => { n.x = Math.random() * canvas.width; n.y = Math.random() * canvas.height; });
  pushHistory('randomize positions');
  updateAll();
});
