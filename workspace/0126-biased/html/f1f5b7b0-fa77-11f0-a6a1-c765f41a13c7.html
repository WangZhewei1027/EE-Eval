<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Quick Sort — Visual Elegance</title>
<style>
  :root{
    --bg-1:#081225;
    --bg-2:#071826;
    --glass: rgba(255,255,255,0.04);
    --glass-2: rgba(255,255,255,0.02);
    --accent-1: #7bd389;
    --accent-2: #6aa7ff;
    --muted: rgba(255,255,255,0.65);
    --tile-h: 120px;
    --tile-w: 64px;
    --duration: 420ms;
    --soft: 24px;
  }

  /* Reset */
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    min-height:100vh;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    background: radial-gradient(1200px 600px at 12% 18%, rgba(106,167,255,0.06), transparent 6%),
                radial-gradient(900px 500px at 86% 82%, rgba(123,211,137,0.04), transparent 5%),
                linear-gradient(180deg,var(--bg-1),var(--bg-2));
    color: #e8f0ff;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    padding:48px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:32px;
    overflow:hidden;
  }

  /* Decorative orbs */
  .orbit{
    position:absolute;
    filter: blur(40px) saturate(120%);
    mix-blend-mode:screen;
    opacity:0.9;
    pointer-events:none;
  }
  .orb-1{width:420px;height:420px;left:-160px;top:-120px;background:conic-gradient(from 140deg,#6aa7ff, #7bd389 40%, rgba(122,160,255,0.02)); border-radius:50%;}
  .orb-2{width:300px;height:300px;right:-120px;bottom:-160px;background:radial-gradient(circle at 30% 30%, rgba(123,211,137,0.2), transparent 30%),linear-gradient(90deg, rgba(106,167,255,0.08), rgba(123,211,137,0.02)); border-radius:50%;}
  .grain{
    position:absolute;inset:0;opacity:0.06;background-image:radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);background-size:4px 4px;pointer-events:none;
  }

  /* Card */
  .stage{
    width:1100px;
    max-width:calc(100vw - 96px);
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:20px;
    box-shadow: 0 10px 40px rgba(6,14,26,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
    padding:28px;
    display:flex;
    flex-direction:column;
    gap:20px;
    position:relative;
    overflow:visible;
    border: 1px solid rgba(255,255,255,0.03);
  }

  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
  }
  .title{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .label{
    font-size:20px;
    font-weight:700;
    letter-spacing: -0.02em;
    color: #ecf8ff;
    display:flex;
    gap:10px;
    align-items:center;
  }
  .subtitle{
    font-size:13px;
    color:var(--muted);
    max-width:56ch;
  }

  /* Controls */
  .controls{
    display:flex;
    gap:12px;
    align-items:center;
  }
  .btn{
    --bgh: rgba(255,255,255,0.03);
    padding:10px 14px;
    background: linear-gradient(180deg,var(--bgh), rgba(255,255,255,0.01));
    color: #eaf6ff;
    border-radius:12px;
    border: 1px solid rgba(255,255,255,0.04);
    font-weight:600;
    cursor:pointer;
    display:inline-flex;
    gap:10px;
    align-items:center;
    transition:transform 220ms cubic-bezier(.2,.9,.2,1), box-shadow 220ms;
    box-shadow: 0 6px 18px rgba(2,8,23,0.45);
    backdrop-filter: blur(6px) saturate(120%);
  }
  .btn:active{transform:translateY(1px) scale(.998);}
  .btn:disabled{opacity:.45;cursor:not-allowed; transform:none}
  .btn.play{
    background: linear-gradient(90deg,var(--accent-2), var(--accent-1));
    color:#041223;
    font-weight:700;
    border:none;
    box-shadow: 0 8px 28px rgba(106,167,255,0.12), 0 2px 8px rgba(123,211,137,0.06);
  }

  /* Visualization area */
  .viz{
    display:flex;
    gap:16px;
    align-items:center;
    justify-content:center;
    padding:22px;
    border-radius:14px;
    background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
    border:1px solid rgba(255,255,255,0.02);
    position:relative;
    overflow:visible;
    min-height:240px;
  }

  .lane{
    width:100%;
    height:var(--tile-h);
    position:relative;
    display:block;
    user-select:none;
  }

  /* Tiles */
  .tile{
    position:absolute;
    bottom:8px;
    width:var(--tile-w);
    height: calc(var(--tile-h) - 16px);
    border-radius:14px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    transition: transform var(--duration) cubic-bezier(.2,.9,.2,1), box-shadow 200ms, filter 200ms;
    will-change:transform;
    padding:8px;
    gap:6px;
    box-shadow: 0 6px 22px rgba(2,8,23,0.6);
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.03);
    backdrop-filter: blur(6px) saturate(120%);
    cursor:default;
  }
  .tile .bar{
    width:100%;
    background: linear-gradient(180deg, rgba(122,160,255,0.18), rgba(123,211,137,0.06));
    border-radius:10px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    color:#021723;
    font-weight:800;
    font-size:12px;
    padding-bottom:10px;
    letter-spacing: -0.02em;
    box-shadow: inset 0 6px 18px rgba(255,255,255,0.02);
  }
  .tile .num{
    position:absolute;
    top:-22px;
    font-size:12px;
    color:var(--muted);
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    padding:6px 8px;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.03);
    transform:translateY(-2px);
    white-space:nowrap;
  }

  /* Highlights */
  .pivot{
    box-shadow: 0 12px 34px rgba(123,211,137,0.12), 0 4px 12px rgba(106,167,255,0.06);
    transform: translateY(-6px) scale(1.02);
    z-index:30;
    outline: 2px solid rgba(123,211,137,0.12);
  }
  .compare{
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 8px 28px rgba(106,167,255,0.08);
    z-index:20;
    outline: 1px dashed rgba(106,167,255,0.08);
  }
  .swap{
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 22px 48px rgba(106,167,255,0.14);
    z-index:40;
    filter: saturate(140%);
  }

  /* Small info row */
  .info{
    display:flex;
    gap:12px;
    align-items:center;
    color:var(--muted);
    font-size:13px;
    margin-top:6px;
  }
  .badge{
    padding:8px 12px;
    border-radius:999px;
    background: rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.02);
    display:inline-flex;
    gap:8px;
    align-items:center;
    font-weight:600;
    color:var(--muted);
  }

  /* Footer decorative code preview */
  .footer{
    display:flex;
    align-items:center;
    gap:12px;
    justify-content:space-between;
    margin-top:8px;
  }
  .mini{
    font-size:12px;
    color:var(--muted);
    display:flex;
    gap:8px;
    align-items:center;
  }

  /* Responsiveness */
  @media (max-width:900px){
    .stage{padding:18px;}
    .title .label{font-size:18px}
    .viz{padding:14px}
  }
</style>
</head>
<body>
  <div class="orbit orb-1"></div>
  <div class="orbit orb-2"></div>
  <div class="grain"></div>

  <main class="stage" aria-label="Quick Sort visualization">
    <div class="header">
      <div class="title">
        <div class="label">
          Quick Sort
          <svg width="36" height="24" viewBox="0 0 36 24" fill="none" aria-hidden>
            <defs>
              <linearGradient id="g" x1="0" x2="1">
                <stop offset="0" stop-color="#6aa7ff"/>
                <stop offset="1" stop-color="#7bd389"/>
              </linearGradient>
            </defs>
            <rect x="0" y="0" width="36" height="24" rx="6" fill="url(#g)" opacity="0.14"/>
            <path d="M8 15l6-6 6 6" stroke="#fff" stroke-opacity="0.92" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="subtitle">Divide · Conquer · Elegance — Observe Quick Sort partitioning, pivots, and swaps with a graceful animation.</div>
      </div>

      <div class="controls" role="group" aria-label="Controls">
        <button class="btn" id="shuffleBtn" title="Shuffle the array">Shuffle</button>
        <button class="btn play" id="playBtn" title="Run Quick Sort">Play</button>
      </div>
    </div>

    <section class="viz" aria-hidden="false">
      <div class="lane" id="lane" aria-live="polite"></div>
    </section>

    <div class="info">
      <div class="badge" id="status">Status: Idle</div>
      <div class="mini">Elements: <strong id="count">14</strong></div>
      <div class="mini">Steps: <strong id="steps">0</strong></div>
      <div class="mini" style="margin-left:auto;color:var(--muted)">Pivot highlighted in green • Comparisons glow blue • Swaps lift tiles</div>
    </div>
  </main>

<script>
(function(){
  const lane = document.getElementById('lane');
  const playBtn = document.getElementById('playBtn');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const status = document.getElementById('status');
  const stepsEl = document.getElementById('steps');
  const countEl = document.getElementById('count');

  const COUNT = 14;
  const TILE_W = 64;
  const GAP = 16;
  const DURATION = 420; // ms, should match CSS --duration

  let values = [];
  let nodes = [];
  let running = false;
  let steps = 0;

  function randUnique(n, min=6, max=98){
    const set = new Set();
    while(set.size < n){
      set.add(Math.floor(Math.random()*(max-min+1))+min);
    }
    return Array.from(set);
  }

  function createTiles(arr){
    lane.innerHTML = '';
    nodes = [];
    const lw = (TILE_W + GAP) * arr.length - GAP;
    lane.style.width = lw + 'px';
    lane.style.height = '160px';

    arr.forEach((v,i)=>{
      const el = document.createElement('div');
      el.className = 'tile';
      el.style.left = (i*(TILE_W + GAP)) + 'px';
      el.style.transitionDuration = DURATION + 'ms';
      el.dataset.value = v;
      el.dataset.index = i;
      el.innerHTML = `
        <div class="num">${v}</div>
        <div class="bar" style="height:${Math.max(12, Math.round((v/100)*100))}%">
          <div style="width:100%;height:100%"></div>
        </div>
      `;
      lane.appendChild(el);
      nodes.push(el);
    });

    // small hairline arrangement for more polished aesthetic: slight staggered heights
    nodes.forEach((nd, idx)=> {
      nd.style.transform = `translateY(0) translateX(0)`;
    });

    countEl.textContent = arr.length;
  }

  function layout(){
    nodes.forEach((nd, idx)=>{
      nd.style.left = (idx*(TILE_W + GAP)) + 'px';
      nd.style.zIndex = 10 + idx;
    });
  }

  function shuffleArray(){
    if(running) return;
    values = randUnique(COUNT);
    createTiles(values);
    steps = 0;
    stepsEl.textContent = steps;
    status.textContent = 'Status: Shuffled';
  }

  function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

  function highlight(idx, cls){
    if(idx < 0 || idx >= nodes.length) return;
    nodes[idx].classList.add(cls);
  }
  function unhighlight(idx, cls){
    if(idx < 0 || idx >= nodes.length) return;
    nodes[idx].classList.remove(cls);
  }

  // Swap nodes in place (DOM positions are absolute, so swap nodes array and update left)
  function swap(i,j){
    if(i===j) return;
    const tmp = nodes[i];
    nodes[i] = nodes[j];
    nodes[j] = tmp;
    // animate by updating left positions
    layout();
  }

  // Visual quick sort with async steps
  async function quickSortVisual(){
    running = true;
    playBtn.textContent = 'Running…';
    playBtn.disabled = true;
    shuffleBtn.disabled = true;
    status.textContent = 'Status: Sorting — Quick Sort in progress';
    steps = 0;
    stepsEl.textContent = steps;

    async function partition(l, r){
      // pivot is nodes[r]
      highlight(r, 'pivot');
      await sleep(180);
      let pivotVal = parseInt(nodes[r].dataset.value,10);
      let i = l - 1;

      for(let j = l; j <= r - 1; j++){
        highlight(j, 'compare');
        steps++; stepsEl.textContent = steps;
        await sleep(260);

        const curVal = parseInt(nodes[j].dataset.value,10);
        if(curVal <= pivotVal){
          i++;
          if(i !== j){
            // visual swap
            highlight(i,'swap'); highlight(j,'swap');
            swap(i,j);
            // update dataset indices (not mandatory but helpful)
            await sleep(DURATION + 40);
            unhighlight(i, 'swap'); unhighlight(j, 'swap');
          }
        }
        unhighlight(j, 'compare');
      }

      // place pivot
      if(i+1 !== r){
        highlight(i+1,'swap'); highlight(r,'swap');
        swap(i+1, r);
        await sleep(DURATION + 40);
        unhighlight(i+1,'swap'); unhighlight(r,'swap');
      }
      unhighlight(i+1,'pivot');
      return i+1;
    }

    async function qsort(l, r, depth=0){
      if(l >= r) return;
      // show recursion depth (visual subtle)
      status.textContent = `Status: Sorting — depth ${depth}`;
      const p = await partition(l, r);
      // recursing left
      await qsort(l, p-1, depth+1);
      // recursing right
      await qsort(p+1, r, depth+1);
    }

    await qsort(0, nodes.length - 1, 0);

    status.textContent = 'Status: Sorted — Completed';
    playBtn.textContent = 'Play';
    playBtn.disabled = false;
    shuffleBtn.disabled = false;
    running = false;
  }

  // Initial setup
  shuffleArray();

  // Interactions
  shuffleBtn.addEventListener('click', ()=>{
    shuffleArray();
  });

  playBtn.addEventListener('click', ()=>{
    if(running) return;
    // Reset any highlighting
    nodes.forEach(n=> n.classList.remove('pivot','compare','swap'));
    quickSortVisual();
  });

  // Small flourish: gentle idle animation for tiles to give life
  let idle = true;
  setInterval(()=>{
    if(running) return;
    // subtle bobbing
    nodes.forEach((nd, i)=>{
      const t = 1 + (Math.sin((Date.now()/1200) + i*0.4) * 0.8);
      nd.style.transform = `translateY(${(Math.sin((Date.now()/900) + i*0.3) * 4)}px)`;
    });
  }, 60);

  // Initialize layout after fonts/styles loaded to ensure crisp positions
  window.addEventListener('load', ()=>{
    layout();
  });

  // Accessibility: expose initial instructions briefly
  setTimeout(()=> {
    status.textContent = 'Status: Ready — Shuffle to randomize, Play to watch Quick Sort';
  }, 800);

})();
</script>
</body>
</html>
