<!DOCTYPE html>
<html>
<head>
    <title>Recursion Explorer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .control-panel {
            border: flex;
            padding: 10px;
            margin-bottom: 20px;
        }
        .visualization {
            min-height: 300px;
            border: 1px solid #ccc;
            padding: 10px;
            font-family: monospace;
            white-space: pre;
            overflow: auto;
        }
        .stack-trace {
            min-height: 200px;
            border: 1px solid #ccc;
            padding: 10px;
            font-family: monospace;
            overflow: auto;
        }
        button, select {
            margin-right: 10px;
            margin-bottom: 10px;
        }
        input[type="range"] {
            width: 200px;
        }
        .function-selector {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Recursion Explorer</h1>
    
    <div class="container">
        <div class="control-panel">
            <div class="function-selector">
                <h3>Select Recursive Function:</h3>
                <select id="functionSelect">
                    <option value="factorial">Factorial</option>
                    <option value="fibonacci">Fibonacci</option>
                    <option value="sum">Sum of Digits</option>
                    <option value="power">Power</option>
                    <option value="gcd">GCD</option>
                    <option value="hanoi">Tower of Hanoi</option>
                </select>
                <button id="updateFunction">Update Function</button>
            </div>
            
            <div id="parameterControls">
                <h3>Parameters:</h3>
                <div id="param1Control">
                    <label for="param1">n:</label>
                    <input type="range" id="param1" min="0" max="10" value="5">
                    <span id="param1Value">5</span>
                </div>
                <div id="param2Control" style="display:none;">
                    <label for="param2">m:</label>
                    <input type="range" id="param2" min="1" max="10" value="3">
                    <span id="param2Value">3</span>
                </div>
            </div>
            
            <div>
                <h3>Execution Control:</h3>
                <button id="runFull">Run Full Recursion</button>
                <button id="stepForward">Step Forward</button>
                <button id="stepBackward">Step Backward</button>
                <button id="reset">Reset</button>
                <label>
                    <input type="checkbox" id="showStack" checked> Show Call Stack
                </label>
                <label>
                    <input type="checkbox" id="showTree" checked> Show Recursion Tree
                </label>
                <label>
                    Delay (ms): <input type="number" id="delay" min="500" max="3000" value="1000">
                </label>
            </div>
        </div>
        
        <div class="visualization" id="recursionTree"></div>
        
        <div class="stack-trace" id="callStack"></div>
        
        <div id="codeDisplay">
            <h3>Current Function Code:</h3>
            <pre id="functionCode"></pre>
        </div>
    </div>

    <script>
        // State management
        const state = {
            currentFunction: 'factorial',
            param1: 5,
            param2: 3,
            executionStack: [],
            currentStep: -1,
            steps: [],
            isRunning: false,
            showStack: true,
            showTree: true,
            delay: 1000
        };

        // Function definitions
        const functions = {
            factorial: {
                name: 'factorial',
                params: ['n'],
                code: `function factorial(n) {
    if (n <= 1) return 1;
    return n * factorial(n - 1);
}`,
                func: function(n) {
                    if (n <= 1) return {value: 1, depth: 0};
                    const child = this.func(n - 1);
                    return {value: n * child.value, depth: child.depth + 1};
                }
            },
            fibonacci: {
                name: 'fibonacci',
                params: ['n'],
                code: `function fibonacci(n) {
    if (n <= 1) return n;
    return fibonacci(n - 1) + fibonacci(n - 2);
}`,
                func: function(n) {
                    if (n <= 1) return {value: n, depth: 0};
                    const child1 = this.func(n - 1);
                    const child2 = this.func(n - 2);
                    return {value: child1.value + child2.value, depth: Math.max(child1.depth, child2.depth) + 1};
                }
            },
            sum: {
                name: 'sum',
                params: ['n'],
                code: `function sum(n) {
    if (n < 10) return n;
    return (n % 10) + sum(Math.floor(n / 10));
}`,
                func: function(n) {
                    if (n < 10) return {value: n, depth: 0};
                    const child = this.func(Math.floor(n / 10));
                    return {value: (n % 10) + child.value, depth: child.depth + 1};
                }
            },
            power: {
                name: 'power',
                params: ['base', 'exp'],
                code: `function power(base, exp) {
    if (exp === 0) return 1;
    return base * power(base, exp - 1);
}`,
                func: function(base, exp) {
                    if (exp === 0) return {value: 1, depth: 0};
                    const child = this.func(base, exp - 1);
                    return {value: base * child.value, depth: child.depth + 1};
                }
            },
            gcd: {
                name: 'gcd',
                params: ['a', 'b'],
                code: `function gcd(a, b) {
    if (b === 0) return a;
    return gcd(b, a % b);
}`,
                func: function(a, b) {
                    if (b === 0) return {value: a, depth: 0};
                    const child = this.func(b, a % b);
                    return {value: child.value, depth: child.depth + 1};
                }
            },
            hanoi: {
                name: 'hanoi',
                params: ['n'],
                code: `function hanoi(n, from, to, aux) {
    if (n === 1) {
        return [[from, to]];
    }
    const moves1 = hanoi(n - 1, from, aux, to);
    const moves2 = [[from, to]];
    const moves3 = hanoi(n - 1, aux, to, from);
    return [...moves1, ...moves2, ...moves3];
}`,
                func: function(n, from = 'A', to = 'C', aux = 'B') {
                    if (n === 1) {
                        return {value: [[from, to]], depth: 0};
                    }
                    const child1 = this.func(n - 1, from, aux, to);
                    const child2 = this.func(n - 1, aux, to, from);
                    const moves = [...child1.value, [from, to], ...child2.value];
                    return {value: moves, depth: Math.max(child1.depth, child2.depth) + 1};
                }
            }
        };

        // DOM elements
        const elements = {
            functionSelect: document.getElementById('functionSelect'),
            updateFunction: document.getElementById('updateFunction'),
            param1Control: document.getElementById('param1Control'),
            param1: document.getElementById('param1'),
            param1Value: document.getElementById('param1Value'),
            param2Control: document.getElementById('param2Control'),
            param2: document.getElementById('param2'),
            param2Value: document.getElementById('param2Value'),
            runFull: document.getElementById('runFull'),
            stepForward: document.getElementById('stepForward'),
            stepBackward: document.getElementById('stepBackward'),
            reset: document.getElementById('reset'),
            showStack: document.getElementById('showStack'),
            showTree: document.getElementById('showTree'),
            delay: document.getElementById('delay'),
            recursionTree: document.getElementById('recursionTree'),
            callStack: document.getElementById('callStack'),
            functionCode: document.getElementById('functionCode')
        };

        // Event listeners
        elements.updateFunction.addEventListener('click', updateFunction);
        elements.param1.addEventListener('input', updateParam1);
        elements.param2.addEventListener('input', updateParam2);
        elements.runFull.addEventListener('click', runFullRecursion);
        elements.stepForward.addEventListener('click', stepForward);
        elements.stepBackward.addEventListener('click', stepBackward);
        elements.reset.addEventListener('click', reset);
        elements.showStack.addEventListener('change', toggleStackVisibility);
        elements.showTree.addEventListener('change', toggleTreeVisibility);
        elements.delay.addEventListener('change', updateDelay);

        // Initialize
        updateFunction();
        updateCodeDisplay();
        reset();

        function updateFunction() {
            state.currentFunction = elements.functionSelect.value;
            const func = functions[state.currentFunction];
            
            // Update parameter controls
            if (func.params.length > 1) {
                elements.param2Control.style.display = 'block';
            } else {
                elements.param2Control.style.display = 'none';
            }
            
            updateCodeDisplay();
            reset();
        }

        function updateParam1() {
            state.param1 = parseInt(elements.param1.value);
            elements.param1Value.textContent = state.param1;
            reset();
        }

        function updateParam2() {
            state.param2 = parseInt(elements.param2.value);
            elements.param2Value.textContent = state.param2;
            reset();
        }

        function updateDelay() {
            state.delay = parseInt(elements.delay.value);
        }

        function toggleStackVisibility() {
            state.showStack = elements.showStack.checked;
            updateVisualization();
        }

        function toggleTreeVisibility() {
            state.showTree = elements.showTree.checked;
            updateVisualization();
        }

        function updateCodeDisplay() {
            elements.functionCode.textContent = functions[state.currentFunction].code;
        }

        function reset() {
            state.executionStack = [];
            state.steps = [];
            state.currentStep = -1;
            const func = functions[state.currentFunction];
            
            // Initialize the execution
            if (func.params.length > 1) {
                state.steps = buildSteps(func.func(state.param1, state.param2));
            } else {
                state.steps = buildSteps(func.func(state.param1));
            }
            
            updateVisualization();
        }

        function buildSteps(result, prefix = '', depth = 0) {
            const steps = [];
            
            if (result.depth === 0) {
                // Base case
                steps.push({
                    action: 'base',
                    value: result.value,
                    prefix: prefix,
                    depth: depth
                });
            } else {
                // Recursive case
                steps.push({
                    action: 'enter',
                    prefix: prefix,
                    depth: depth
                });
                
                if (Array.isArray(result.children)) {
                    // For functions with multiple recursive calls (like fibonacci)
                    result.children.forEach((child, i) => {
                        steps.push(...buildSteps(child, prefix + i + '.', depth + 1));
                    });
                } else {
                    // For functions with single recursive call
                    steps.push(...buildSteps(result.child, prefix + '1.', depth + 1));
                }
                
                steps.push({
                    action: 'exit',
                    value: result.value,
                    prefix: prefix,
                    depth: depth
                });
            }
            
            return steps;
        }

        function runFullRecursion() {
            if (state.isRunning) return;
            state.isRunning = true;
            
            state.currentStep = -1;
            const totalSteps = state.steps.length;
            
            const interval = setInterval(() => {
                state.currentStep++;
                updateVisualization();
                
                if (state.currentStep >= totalSteps - 1) {
                    clearInterval(interval);
                    state.isRunning = false;
                }
            }, state.delay);
        }

        function stepForward() {
            if (state.currentStep < state.steps.length - 1) {
                state.currentStep++;
                updateVisualization();
            }
        }

        function stepBackward() {
            if (state.currentStep > 0) {
                state.currentStep--;
                updateVisualization();
            }
        }

        function updateVisualization() {
            // Clear previous visualization
            elements.recursionTree.innerHTML = '';
            elements.callStack.innerHTML = '';
            
            if (state.showTree) {
                // Build recursion tree visualization
                const treeDiv = document.createElement('div');
                
                for (let i = 0; i <= state.currentStep; i++) {
                    const step = state.steps[i];
                    const line = document.createElement('div');
                    line.style.marginLeft = (step.depth * 20) + 'px';
                    
                    if (step.action === 'enter') {
                        line.textContent = `${step.prefix} Calling ${state.currentFunction}(${getCurrentParams(step.depth)})`;
                    } else if (step.action === 'exit') {
                        line.textContent = `${step.prefix} ${state.currentFunction}(${getCurrentParams(step.depth)}) returned ${step.value}`;
                        line.style.fontWeight = 'bold';
                    } else if (step.action === 'base') {
                        line.textContent = `${step.prefix} Base case reached: returned ${step.value}`;
                        line.style.color = '#666';
                    }
                    
                    treeDiv.appendChild(line);
                }
                
                elements.recursionTree.appendChild(treeDiv);
            }
            
            if (state.showStack) {
                // Build call stack visualization
                const stackDiv = document.createElement('div');
                const currentDepth = state.currentStep >= 0 ? state.steps[state.currentStep].depth : -1;
                
                for (let depth = currentDepth; depth >= 0; depth--) {
                    // Find the most recent step at this depth
                    let step;
                    for (let i = state.currentStep; i >= 0; i--) {
                        if (state.steps[i].depth === depth) {
                            step = state.steps[i];
                            break;
                        }
                    }
                    
                    if (step) {
                        const frame = document.createElement('div');
                        frame.style.padding = '5px';
                        frame.style.margin = '2px 0';
                        frame.style.borderBottom = '1px solid #ccc';
                        
                        if (step.action === 'enter') {
                            frame.textContent = `${state.currentFunction}(${getCurrentParams(depth)})`;
                        } else if (step.action === 'exit') {
                            frame.textContent = `${state.currentFunction}(${getCurrentParams(depth)}) → ${step.value}`;
                            frame.style.fontWeight = 'bold';
                        } else if (step.action === 'base') {
                            frame.textContent = `${state.currentFunction}(${getCurrentParams(depth)}) → ${step.value} (base case)`;
                            frame.style.color = '#666';
                        }
                        
                        stackDiv.appendChild(frame);
                    }
                }
                
                elements.callStack.appendChild(stackDiv);
            }
        }

        function getCurrentParams(depth) {
            // This is a simplified version - in a real app you'd track parameters at each depth
            const func = functions[state.currentFunction];
            if (func.params.length > 1) {
                return `${state.param1 - depth}, ${state.param2 - depth}`;
            } else {
                return state.param1 - depth;
            }
        }
    </script>
</body>
</html>
