<!DOCTYPE html>
<html>
<head>
    <title>Depth-First Search (DFS) Interactive Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { display: flex; flex-direction: column; gap: 10px; }
        .control-panel { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .panel { border: 1px solid black; padding: 10px; margin-bottom: 10px; }
        button, select, input { padding: 5px; }
        #graph-container { position: relative; height: 400px; border: 1px solid black; }
        .node { position: absolute; width: 30px; height: 30px; border: 1px solid black; 
                border-radius: 15px; display: flex; justify-content: center; 
                align-items: center; cursor: pointer; }
        .edge { position: absolute; height: 2px; background: black; transform-origin: 0 0; }
        .visited { background-color: #ccc; }
        .current { background-color: #888; }
        .stack-display { border: 1px solid black; padding: 5px; min-height: 100px; }
        .log { border: 1px solid black; padding: 5px; height: 150px; overflow-y: scroll; }
    </style>
</head>
<body>
    <h1>Depth-First Search (DFS) Interactive Demo</h1>
    
    <div class="container">
        <div class="control-panel">
            <div class="panel">
                <h3>Graph Construction</h3>
                <button id="add-node">Add Node</button>
                <button id="add-edge">Add Edge (select 2 nodes)</button>
                <button id="clear-graph">Clear Graph</button>
                <div>
                    <label>Edge Direction: </label>
                    <select id="edge-direction">
                        <option value="directed">Directed</option>
                        <option value="undirected">Undirected</option>
                    </select>
                </div>
            </div>
            
            <div class="panel">
                <h3>DFS Controls</h3>
                <button id="start-dfs">Start DFS</button>
                <button id="step-dfs">Step</button>
                <button id="reset-dfs">Reset</button>
                <div>
                    <label>Start Node: </label>
                    <select id="start-node"></select>
                </div>
                <div>
                    <label>Speed: </label>
                    <input type="range" id="speed" min="100" max="2000" value="500">
                </div>
            </div>
            
            <div class="panel">
                <h3>Graph Type</h3>
                <button id="load-tree">Load Binary Tree</button>
                <button id="load-dag">Load DAG</button>
                <button id="load-cyclic">Load Cyclic Graph</button>
            </div>
        </div>
        
        <div id="graph-container"></div>
        
        <div class="panel">
            <h3>DFS Stack</h3>
            <div id="stack-display" class="stack-display"></div>
        </div>
        
        <div class="panel">
            <h3>Algorithm Log</h3>
            <div id="log" class="log"></div>
        </div>
        
        <div class="panel">
            <h3>DFS Details</h3>
            <div>
                <label><input type="checkbox" id="show-visit-order"> Show Visit Order</label>
                <label><input type="checkbox" id="show-parents"> Show Parent Relationships</label>
            </div>
            <div id="visit-order"></div>
            <div id="parent-relationships"></div>
        </div>
    </div>

    <script>
        // Graph data structure
        let graph = {
            nodes: [],
            edges: [],
            adjacencyList: {}
        };
        
        // DFS state
        let dfsState = {
            running: false,
            visited: new Set(),
            stack: [],
            visitOrder: [],
            parents: {},
            timer: null,
            currentStep: 0,
            speed: 500
        };
        
        // DOM elements
        const graphContainer = document.getElementById('graph-container');
        const addNodeBtn = document.getElementById('add-node');
        const addEdgeBtn = document.getElementById('add-edge');
        const clearGraphBtn = document.getElementById('clear-graph');
        const startDfsBtn = document.getElementById('start-dfs');
        const stepDfsBtn = document.getElementById('step-dfs');
        const resetDfsBtn = document.getElementById('reset-dfs');
        const startNodeSelect = document.getElementById('start-node');
        const speedSlider = document.getElementById('speed');
        const stackDisplay = document.getElementById('stack-display');
        const logElement = document.getElementById('log');
        const visitOrderDisplay = document.getElementById('visit-order');
        const parentRelationshipsDisplay = document.getElementById('parent-relationships');
        const showVisitOrderCheckbox = document.getElementById('show-visit-order');
        const showParentsCheckbox = document.getElementById('show-parents');
        const loadTreeBtn = document.getElementById('load-tree');
        const loadDagBtn = document.getElementById('load-dag');
        const loadCyclicBtn = document.getElementById('load-cyclic');
        
        // Node tracking for edge creation
        let selectedNodes = [];
        
        // Initialize
        init();
        
        function init() {
            addEventListeners();
            updateStartNodeSelect();
        }
        
        function addEventListeners() {
            addNodeBtn.addEventListener('click', addRandomNode);
            addEdgeBtn.addEventListener('click', () => {
                if (selectedNodes.length === 2) {
                    addEdge(selectedNodes[0], selectedNodes[1]);
                    selectedNodes = [];
                    updateNodeSelection();
                }
            });
            clearGraphBtn.addEventListener('click', clearGraph);
            startDfsBtn.addEventListener('click', startDFS);
            stepDfsBtn.addEventListener('click', stepDFS);
            resetDfsBtn.addEventListener('click', resetDFS);
            speedSlider.addEventListener('input', updateSpeed);
            showVisitOrderCheckbox.addEventListener('change', updateVisitOrderDisplay);
            showParentsCheckbox.addEventListener('change', updateParentRelationships);
            loadTreeBtn.addEventListener('click', loadBinaryTree);
            loadDagBtn.addEventListener('click', loadDAG);
            loadCyclicBtn.addEventListener('click', loadCyclicGraph);
        }
        
        function addRandomNode() {
            const nodeId = `N${graph.nodes.length + 1}`;
            const x = Math.floor(Math.random() * (graphContainer.clientWidth - 40)) + 20;
            const y = Math.floor(Math.random() * (graphContainer.clientHeight - 40)) + 20;
            
            graph.nodes.push({ id: nodeId, x, y });
            graph.adjacencyList[nodeId] = [];
            
            renderGraph();
            updateStartNodeSelect();
            log(`Added node ${nodeId}`);
        }
        
        function addEdge(nodeId1, nodeId2) {
            const edgeExists = document.getElementById('edge-direction').value === 'directed' 
                ? graph.edges.some(e => e.from === nodeId1 && e.to === nodeId2)
                : graph.edges.some(e => 
                    (e.from === nodeId1 && e.to === nodeId2) || 
                    (e.from === nodeId2 && e.to === nodeId1));
            
            if (nodeId1 === nodeId2) {
                log("Cannot create edge to the same node");
                return;
            }
            
            if (edgeExists) {
                log("Edge already exists");
                return;
            }
            
            graph.edges.push({ from: nodeId1, to: nodeId2 });
            graph.adjacencyList[nodeId1].push(nodeId2);
            
            if (document.getElementById('edge-direction').value === 'undirected') {
                graph.adjacencyList[nodeId2].push(nodeId1);
            }
            
            renderGraph();
            log(`Added edge from ${nodeId1} to ${nodeId2}`);
        }
        
        function clearGraph() {
            graph = {
                nodes: [],
                edges: [],
                adjacencyList: {}
            };
            resetDFS();
            renderGraph();
            updateStartNodeSelect();
            log("Graph cleared");
        }
        
        function renderGraph() {
            graphContainer.innerHTML = '';
            
            // Render edges first (so they appear behind nodes)
            graph.edges.forEach(edge => {
                const fromNode = graph.nodes.find(n => n.id === edge.from);
                const toNode = graph.nodes.find(n => n.id === edge.to);
                
                if (fromNode && toNode) {
                    const edgeElement = document.createElement('div');
                    edgeElement.className = 'edge';
                    
                    const dx = toNode.x - fromNode.x;
                    const dy = toNode.y - fromNode.y;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                    
                    edgeElement.style.width = `${length}px`;
                    edgeElement.style.left = `${fromNode.x}px`;
                    edgeElement.style.top = `${fromNode.y}px`;
                    edgeElement.style.transform = `rotate(${angle}deg)`;
                    
                    graphContainer.appendChild(edgeElement);
                }
            });
            
            // Render nodes
            graph.nodes.forEach(node => {
                const nodeElement = document.createElement('div');
                nodeElement.className = 'node';
                nodeElement.id = `node-${node.id}`;
                nodeElement.textContent = node.id;
                nodeElement.style.left = `${node.x - 15}px`;
                nodeElement.style.top = `${node.y - 15}px`;
                
                if (dfsState.visited.has(node.id)) {
                    nodeElement.classList.add('visited');
                }
                
                if (dfsState.stack.includes(node.id)) {
                    nodeElement.classList.add('current');
                }
                
                nodeElement.addEventListener('click', () => {
                    if (!dfsState.running) {
                        if (document.getElementById('add-edge').classList.contains('active')) {
                            selectedNodes.push(node.id);
                            if (selectedNodes.length > 2) {
                                selectedNodes.shift();
                            }
                            updateNodeSelection();
                        } else {
                            // Select as start node
                            startNodeSelect.value = node.id;
                        }
                    }
                });
                
                graphContainer.appendChild(nodeElement);
            });
        }
        
        function updateNodeSelection() {
            // Clear previous selection
            document.querySelectorAll('.node').forEach(node => {
                node.style.border = '1px solid black';
            });
            
            // Highlight selected nodes
            selectedNodes.forEach(nodeId => {
                const node = document.getElementById(`node-${nodeId}`);
                if (node) {
                    node.style.border = '2px solid red';
                }
            });
        }
        
        function updateStartNodeSelect() {
            startNodeSelect.innerHTML = '';
            graph.nodes.forEach(node => {
                const option = document.createElement('option');
                option.value = node.id;
                option.textContent = node.id;
                startNodeSelect.appendChild(option);
            });
        }
        
        function startDFS() {
            if (dfsState.running) return;
            if (graph.nodes.length === 0) {
                log("No nodes in graph");
                return;
            }
            
            const startNode = startNodeSelect.value || graph.nodes[0].id;
            
            resetDFS();
            dfsState.running = true;
            dfsState.stack.push(startNode);
            dfsState.visited.add(startNode);
            dfsState.visitOrder.push(startNode);
            dfsState.parents[startNode] = null;
            
            updateStackDisplay();
            renderGraph();
            log(`DFS started from node ${startNode}`);
            
            dfsState.timer = setInterval(() => {
                if (dfsState.stack.length === 0) {
                    clearInterval(dfsState.timer);
                    dfsState.running = false;
                    log("DFS completed");
                    return;
                }
                stepDFS();
            }, dfsState.speed);
        }
        
        function stepDFS() {
            if (dfsState.stack.length === 0) {
                log("DFS completed");
                dfsState.running = false;
                if (dfsState.timer) clearInterval(dfsState.timer);
                return;
            }
            
            const currentNode = dfsState.stack.pop();
            dfsState.currentStep++;
            
            // Highlight current node
            document.querySelectorAll('.node').forEach(node => {
                node.classList.remove('current');
            });
            const currentNodeElement = document.getElementById(`node-${currentNode}`);
            if (currentNodeElement) {
                currentNodeElement.classList.add('current');
            }
            
            log(`Processing node ${currentNode}`);
            
            // Process neighbors
            const neighbors = graph.adjacencyList[currentNode] || [];
            neighbors.forEach(neighbor => {
                if (!dfsState.visited.has(neighbor)) {
                    dfsState.visited.add(neighbor);
                    dfsState.stack.push(neighbor);
                    dfsState.visitOrder.push(neighbor);
                    dfsState.parents[neighbor] = currentNode;
                    log(`Discovered node ${neighbor} from ${currentNode}`);
                }
            });
            
            updateStackDisplay();
            renderGraph();
            updateVisitOrderDisplay();
            updateParentRelationships();
        }
        
        function resetDFS() {
            clearInterval(dfsState.timer);
            dfsState = {
                running: false,
                visited: new Set(),
                stack: [],
                visitOrder: [],
                parents: {},
                timer: null,
                currentStep: 0,
                speed: parseInt(speedSlider.value)
            };
            stackDisplay.innerHTML = '';
            logElement.innerHTML = '';
            visitOrderDisplay.innerHTML = '';
            parentRelationshipsDisplay.innerHTML = '';
            renderGraph();
            log("DFS reset");
        }
        
        function updateSpeed() {
            dfsState.speed = parseInt(speedSlider.value);
            if (dfsState.running) {
                clearInterval(dfsState.timer);
                dfsState.timer = setInterval(() => {
                    if (dfsState.stack.length === 0) {
                        clearInterval(dfsState.timer);
                        dfsState.running = false;
                        log("DFS completed");
                        return;
                    }
                    stepDFS();
                }, dfsState.speed);
            }
        }
        
        function updateStackDisplay() {
            stackDisplay.innerHTML = '<strong>DFS Stack:</strong><br>' + 
                dfsState.stack.map(node => 
                    `<div>${dfsState.stack[dfsState.stack.length-1] === node ? 'font-weight:bold;' : ''}> ${node}</div>`
                ).join('');
        }
        
        function updateVisitOrderDisplay() {
            if (showVisitOrderCheckbox.checked) {
                visitOrderDisplay.innerHTML = '<strong>Visit Order:</strong> ' + 
                    dfsState.visitOrder.join(' → ');
            } else {
                visitOrderDisplay.innerHTML = '';
            }
        }
        
        function updateParentRelationships() {
            if (showParentsCheckbox.checked) {
                let html = '<strong>Parent Relationships:</strong><br>';
                for (const [child, parent] of Object.entries(dfsState.parents)) {
                    html += `${child} → ${parent || 'null'}<br>`;
                }
                parentRelationshipsDisplay.innerHTML = html;
            } else {
                parentRelationshipsDisplay.innerHTML = '';
            }
        }
        
        function log(message) {
            const logEntry = document.createElement('div');
            logEntry.textContent = `Step ${dfsState.currentStep}: ${message}`;
            logElement.appendChild(logEntry);
            logElement.scrollTop = logElement.scrollHeight;
        }
        
        function loadBinaryTree() {
            clearGraph();
            
            // Create a simple binary tree
            const nodes = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
            const edges = [
                ['A', 'B'], ['A', 'C'],
                ['B', 'D'], ['B', 'E'],
                ['C', 'F'], ['C', 'G']
            ];
            
            // Position nodes in a tree layout
            const positions = {
                'A': { x: 200, y: 50 },
                'B': { x: 100, y: 150 },
                'C': { x: 300, y: 150 },
                'D': { x: 50, y: 250 },
                'E': { x: 150, y: 250 },
                'F': { x: 250, y: 250 },
                'G': { x: 350, y: 250 }
            };
            
            nodes.forEach(node => {
                graph.nodes.push({ id: node, x: positions[node].x, y: positions[node].y });
                graph.adjacencyList[node] = [];
            });
            
            edges.forEach(([from, to]) => {
                graph.edges.push({ from, to });
                graph.adjacencyList[from].push(to);
            });
            
            renderGraph();
            updateStartNodeSelect();
            log("Loaded binary tree graph");
        }
        
        function loadDAG() {
            clearGraph();
            
            // Create a Directed Acyclic Graph (DAG)
            const nodes = ['A', 'B', 'C', 'D', 'E', 'F'];
            const edges = [
                ['A', 'B'], ['A', 'C'],
                ['B', 'D'], ['B', 'E'],
                ['C', 'D'], ['D', 'F'], ['E', 'F']
            ];
            
            // Position nodes
            const positions = {
                'A': { x: 100, y: 50 },
                'B': { x: 50, y: 150 },
                'C': { x: 150, y: 150 },
                'D': { x: 50, y: 250 },
                'E': { x: 150, y: 250 },
                'F': { x: 100, y: 350 }
            };
            
            nodes.forEach(node => {
                graph.nodes.push({ id: node, x: positions[node].x, y: positions[node].y });
                graph.adjacencyList[node] = [];
            });
            
            edges.forEach(([from, to]) => {
                graph.edges.push({ from, to });
                graph.adjacencyList[from].push(to);
            });
            
            renderGraph();
            updateStartNodeSelect();
            log("Loaded Directed Acyclic Graph (DAG)");
        }
        
        function loadCyclicGraph() {
            clearGraph();
            
            // Create a cyclic graph
            const nodes = ['A', 'B', 'C', 'D', 'E'];
            const edges = [
                ['A', 'B'], ['B', 'C'],
                ['C', 'D'], ['D', 'E'],
                ['E', 'A'], ['B', 'D']
            ];
            
            // Position nodes in a circle
            const centerX = 200, centerY = 200, radius = 150;
            nodes.forEach((node, i) => {
                const angle = (i * 2 * Math.PI / nodes.length) - Math.PI/2;
                graph.nodes.push({
                    id: node,
                    x: centerX + radius * Math.cos(angle),
                    y: centerY + radius * Math.sin(angle)
                });
                graph.adjacencyList[node] = [];
            });
            
            edges.forEach(([from, to]) => {
                graph.edges.push({ from, to });
                graph.adjacencyList[from].push(to);
            });
            
            renderGraph();
            updateStartNodeSelect();
            log("Loaded cyclic graph");
        }
    </script>
</body>
</html>
