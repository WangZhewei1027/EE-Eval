<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistic Regression</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
        }
        .header p {
            margin: 0;
        }
        .main {
            padding: 20px;
        }
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Logistic Regression</h1>
            <p>Modeling Binary Classification</p>
        </div>
        <div class="main">
            <h2>Modeling the Relationship</h2>
            <p>Logistic regression is a supervised learning algorithm used for binary classification problems.</p>
            <button id="button1">Learn More</button>
            <button id="button2">View Code</button>
        </div>
    </div>
    <script>
        let model = null;

        function learnMore() {
            console.log("Logistic Regression is a type of supervised learning algorithm used for binary classification problems.");
            console.log("It is a linear model and is used to predict the probability of a binary outcome.");
            console.log("The model uses the sigmoid function to compute the probability of the positive class.");
            model = new LogisticRegression();
        }

        function viewCode() {
            console.log("Viewing the code for logistic regression...");
            console.log("You can view the code on GitHub or other online platforms.");
        }

        function trainModel() {
            if (model === null) {
                console.log("Model not trained yet.");
                return;
            }
            model.train({
                x: [1, 2, 3, 4, 5],
                y: [0, 1, 1, 0, 1]
            });
        }

        function predict() {
            if (model === null) {
                console.log("Model not trained yet.");
                return;
            }
            let input = [4, 5];
            let output = model.predict(input);
            console.log("Predicted probability:", output);
        }

        let button1 = document.getElementById("button1");
        let button2 = document.getElementById("button2");

        button1.addEventListener("click", learnMore);
        button2.addEventListener("click", viewCode);
        button1.addEventListener("click", trainModel);
        button2.addEventListener("click", predict);

        trainModel();
    </script>
</body>
</html>
