<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Depth-First Search (DFS) Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

  /* Reset & base */
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    background: linear-gradient(135deg, #1f2235, #2d3246);
    font-family: 'Poppins', sans-serif;
    color: #e6eaf3;
    overflow: hidden;
    user-select: none;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Title */
  header {
    padding: 2rem 3rem 1rem 3rem;
    text-align: center;
    position: relative;
    z-index: 20;
  }
  header h1 {
    font-weight: 700;
    font-size: 3rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #aaccec;
    filter: drop-shadow(0 0 6px #3ca4ff88);
    margin: 0;
  }
  header p {
    font-weight: 400;
    font-size: 1.1rem;
    margin-top: 0.3rem;
    color: #abb7d1;
    letter-spacing: 0.07em;
  }

  /* Main container */
  main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Graph container */
  #graph {
    position: relative;
    width: 650px;
    height: 600px;
    background: radial-gradient(circle at center, #2e364d 50%, #212837 90%);
    border-radius: 28px;
    box-shadow:
      0 0 15px 4px #1456d680,
      inset 0 0 25px #4169e1cc;
    overflow: visible;
  }

  /* SVG styling */
  svg {
    width: 100%;
    height: 100%;
  }

  /* Edges */
  .edge {
    stroke: #374785;
    stroke-width: 3;
    fill: none;
    filter: drop-shadow(0 0 1.5px #2a3aeb88);
    transition: stroke 0.4s ease;
    stroke-linecap: round;
  }

  .edge.visited {
    stroke: #3ca4ff;
    stroke-width: 5;
    filter: drop-shadow(0 0 8px #3ca4ffcc);
    transition: stroke 0.6s ease, stroke-width 0.6s ease, filter 0.6s ease;
  }

  /* Nodes */
  .node {
    cursor: default;
    transition: transform 0.4s ease;
    filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.2));
  }

  /* Circles */
  .node circle {
    fill: #344a97;
    stroke: #24365b;
    stroke-width: 4;
    filter: drop-shadow(0 0 13px #3766ffaa);
    transition: fill 0.5s ease, filter 0.5s ease, stroke-width 0.5s ease;
  }

  .node.visited circle {
    fill: #3ca4ff;
    stroke: #75baff;
    stroke-width: 6;
    filter: drop-shadow(0 0 20px #3ca4ffdd);
  }

  /* Node labels */
  .node text {
    fill: #cfd8fa;
    font-size: 1.15rem;
    font-weight: 700;
    pointer-events: none;
    user-select: none;
    filter: drop-shadow(0 0 2px #1f2837);
    transition: fill 0.4s ease;
  }

  .node.visited text {
    fill: #d2e8ff;
  }

  /* Highlight pulsing effect for current node */
  .node.current circle {
    animation: pulseGlow 2s infinite alternate ease-in-out;
  }

  @keyframes pulseGlow {
    0% {
      filter: drop-shadow(0 0 20px #3ca4ffdd);
      stroke-width: 8;
    }
    100% {
      filter: drop-shadow(0 0 36px #3ca4ffee);
      stroke-width: 9;
    }
  }

  /* Info panel */
  #infoPanel {
    position: absolute;
    top: 2rem;
    right: 3rem;
    width: 300px;
    background: rgba(30,40,60,0.85);
    padding: 1.5rem 2rem;
    border-radius: 20px;
    box-shadow:
      0 0 15px 3px #3ca4ffaa,
      inset 0 0 10px #3ca4ffbb;
    font-weight: 400;
    color: #b6c5e2dd;
    line-height: 1.5;
    user-select: none;
    font-size: 1.05rem;
  }
  #infoPanel h2 {
    font-weight: 700;
    font-size: 1.6rem;
    margin-bottom: 0.6rem;
    color: #a8c6ffcc;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: center;
    text-shadow: 0 0 8px #3ca4ffcc;
  }

  /* Footer controls */
  footer {
    padding: 1.3rem 3rem;
    text-align: center;
    background: #1f223537;
    backdrop-filter: blur(8px);
    border-top: 1px solid #3ca4ff44;
    user-select: none;
  }
  button {
    background: #3ca4ffcc;
    border: none;
    border-radius: 50px;
    padding: 0.85rem 2.6rem;
    color: #e4f0ff;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    box-shadow: 0 0 22px 3px #3ca4ffbb;
    transition: background 0.4s ease;
    outline-offset: 3px;
    outline-color: #6db9ff77;
  }
  button:hover {
    background: #72b9ffee;
  }
  button:focus-visible {
    outline: 3.5px solid #72b9ffdd;
  }
  button:disabled {
    background: #3ca4ff88;
    cursor: default;
    box-shadow: none;
  }

  @media (max-width: 720px) {
    #graph {
      width: 90vw;
      height: 90vw;
      max-height: 90vw;
    }
    #infoPanel {
      position: static;
      width: 100%;
      margin: 1rem auto 0 auto;
      border-radius: 16px;
      box-shadow: none;
      background: transparent;
      color: #aec8ffcc;
      font-size: 1rem;
      text-align: center;
      padding: 0.7rem 1rem;
    }
    main {
      flex-direction: column;
      padding-bottom: 0.7rem;
    }
  }
</style>
</head>
<body>
<header>
  <h1>Depth-First Search (DFS)</h1>
  <p>Visual demonstration of DFS traversal on a graph with a solitary control</p>
</header>
<main>
  <div id="graph" aria-label="Depth First Search graph visualization" role="img">
    <svg viewBox="0 0 650 600" aria-hidden="true" focusable="false">
      <!-- Edges defined dynamically -->
    </svg>
  </div>

  <div id="infoPanel" aria-live="polite" aria-atomic="true" aria-relevant="text">
    <h2>Traversal Info</h2>
    <p><strong>Current Node:</strong> <span id="currentNode">-</span></p>
    <p><strong>Visited Order:</strong></p>
    <ol id="visitedList" style="max-height: 220px; overflow-y: auto; padding-left: 1.2rem; color:#9db9ffcc; font-size:0.95rem;"></ol>
  </div>
</main>
<footer>
  <button id="startBtn" aria-label="Start DFS traversal">Start DFS</button>
</footer>

<script>
  (() => {
    /** Graph data (nodes and edges), positions for nice layout **/
    const nodes = [
      { id: 'A', x: 320, y: 60 },
      { id: 'B', x: 160, y: 150 },
      { id: 'C', x: 480, y: 150 },
      { id: 'D', x: 110, y: 320 },
      { id: 'E', x: 270, y: 310 },
      { id: 'F', x: 370, y: 310 },
      { id: 'G', x: 530, y: 320 },
      { id: 'H', x: 260, y: 470 },
      { id: 'I', x: 380, y: 470 }
    ];

    /** Adjacency list describing graph edges **/
    const adjacency = {
      'A': ['B', 'C'],
      'B': ['A', 'D', 'E'],
      'C': ['A', 'F', 'G'],
      'D': ['B', 'H'],
      'E': ['B', 'H', 'I'],
      'F': ['C', 'I'],
      'G': ['C'],
      'H': ['D', 'E'],
      'I': ['E', 'F']
    };

    const svg = document.querySelector('svg');
    const currentNodeEl = document.getElementById('currentNode');
    const visitedListEl = document.getElementById('visitedList');
    const startBtn = document.getElementById('startBtn');
    const graphDiv = document.getElementById('graph');

    /** Create edges as lines and append to SVG **/
    const edgesElements = [];
    for (const u in adjacency) {
      const fromNode = nodes.find(n => n.id === u);
      adjacency[u].forEach(v => {
        // To prevent duplicated edges, draw only if u<v lex order
        if (u < v) {
          const toNode = nodes.find(n => n.id === v);
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('class', 'edge');
          line.setAttribute('x1', fromNode.x);
          line.setAttribute('y1', fromNode.y);
          line.setAttribute('x2', toNode.x);
          line.setAttribute('y2', toNode.y);
          line.setAttribute('data-from', u);
          line.setAttribute('data-to', v);
          svg.appendChild(line);
          edgesElements.push(line);
        }
      });
    }

    /** Create nodes as groups with circle and text and append to SVG **/
    const nodeElements = {};
    nodes.forEach(({ id, x, y }) => {
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'node');
      g.setAttribute('transform', `translate(${x},${y})`);
      g.setAttribute('data-id', id);

      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('r', 28);

      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'middle');
      text.textContent = id;

      g.appendChild(circle);
      g.appendChild(text);
      svg.appendChild(g);
      nodeElements[id] = g;
    });

    /** Helper: highlight edge between nodes **/
    function highlightEdge(u, v, add) {
      // find line matching the edge
      const edge = edgesElements.find(line => {
        const f = line.getAttribute('data-from'),
              t = line.getAttribute('data-to');
        return (f === u && t === v) || (f === v && t === u);
      });
      if (!edge) return;
      if (add) {
        edge.classList.add('visited');
      } else {
        edge.classList.remove('visited');
      }
    }

    /** DFS traversal variables **/
    let visitedOrder = [];
    let visitedSet = new Set();
    let stack = [];

    /** Clear all highlights **/
    function resetStyles() {
      visitedOrder = [];
      visitedSet.clear();
      stack = [];
      Object.values(nodeElements).forEach(n => {
        n.classList.remove('visited');
        n.classList.remove('current');
      });
      edgesElements.forEach(line => {
        line.classList.remove('visited');
      });
      currentNodeEl.textContent = '-';
      visitedListEl.innerHTML = '';
      startBtn.disabled = false;
    }

    /** Animate DFS traversal recursively with async delay **/
    const delay = ms => new Promise(res => setTimeout(res, ms));

    async function dfs(startId) {
      startBtn.disabled = true;
      resetStyles();
      stack.push(startId);

      while (stack.length > 0) {
        const nodeId = stack.pop();

        if (!visitedSet.has(nodeId)) {
          // Mark current node
          nodeElements[nodeId].classList.add('current');
          currentNodeEl.textContent = nodeId;

          // Animate delay for current selection
          await delay(1200);

          // Mark as visited
          visitedSet.add(nodeId);
          visitedOrder.push(nodeId);
          updateVisitedList();

          nodeElements[nodeId].classList.add('visited');
          nodeElements[nodeId].classList.remove('current');

          // Highlight edges to neighbors visited next
          const neighbors = adjacency[nodeId]
            .filter(n => !visitedSet.has(n))
            .sort((a,b) => a.localeCompare(b)); // keep lex order for consistent traversal

          // Push neighbors in reverse order so DFS stack pops them in lex order
          neighbors.reverse().forEach(nb => {
            stack.push(nb);
            highlightEdge(nodeId, nb, true);
          });

          // Remove highlight from edges to already visited or skipped neighbors
          adjacency[nodeId].forEach(nb => {
            if (visitedSet.has(nb)) {
              highlightEdge(nodeId, nb, true);
            }
          });
        }
      }

      currentNodeEl.textContent = 'Completed';
      startBtn.disabled = false;
    }

    /** Update visited nodes list display **/
    function updateVisitedList() {
      visitedListEl.innerHTML = '';
      visitedOrder.forEach((nodeId, i) => {
        const li = document.createElement('li');
        li.textContent = `${nodeId} (${i + 1})`;
        visitedListEl.appendChild(li);
      });
      // Autoscroll to bottom
      visitedListEl.scrollTop = visitedListEl.scrollHeight;
    }

    /** Initialize button */
    startBtn.addEventListener('click', () => {
      dfs('A');
    });

  })();
</script>
</body>
</html>
