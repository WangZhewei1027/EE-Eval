<!DOCTYPE html>
<html>
<head>
    <title>Logistic Regression</title>
    <style>
        body {
            background-color: #f0f0f0;
        }
        #interface {
            width: 800px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        #controls button {
            width: 20%;
            height: 30px;
            margin: 10px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #controls input {
            width: 20%;
            height: 30px;
            margin: 10px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #controls input[type="submit"] {
            width: 20%;
            height: 30px;
            margin: 10px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #results {
            font-size: 24px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="interface">
        <h1>Logistic Regression</h1>
        <h2>Multiple Interactive Controls</h2>
        <div id="controls">
            <button id="button1">Button 1</button>
            <button id="button2">Button 2</button>
            <input id="input1" type="text" placeholder="Input 1">
            <input id="input2" type="text" placeholder="Input 2">
            <input id="input3" type="text" placeholder="Input 3">
            <button id="submit-button">Submit</button>
        </div>
        <div id="results"></div>
    </div>

    <script>
        const button1 = document.getElementById('button1');
        const button2 = document.getElementById('button2');
        const input1 = document.getElementById('input1');
        const input2 = document.getElementById('input2');
        const input3 = document.getElementById('input3');
        const submitButton = document.getElementById('submit-button');
        const resultsDiv = document.getElementById('results');

        button1.addEventListener('click', () => {
            input1.value = 'Hello, World!';
        });

        button2.addEventListener('click', () => {
            input2.value = 'This is a test input.';
        });

        input1.addEventListener('input', () => {
            input3.value = input1.value;
        });

        input2.addEventListener('input', () => {
            input3.value = input2.value;
        });

        submitButton.addEventListener('click', () => {
            const inputs = [input1, input2, input3];
            const values = inputs.map(input => input.value);
            const predictions = predict(values);
            resultsDiv.innerHTML = `Predictions: ${predictions.join(', ')}`;
        });

        function predict(values) {
            // Simple logistic regression implementation
            const weights = [0.5, 0.3];
            const bias = 0.2;
            let sum = 0;
            for (let i = 0; i < values.length; i++) {
                sum += weights[i] * Math.exp(-values[i] * bias);
            }
            return 1 / (1 + Math.exp(-sum));
        }
    </script>
</body>
</html>
