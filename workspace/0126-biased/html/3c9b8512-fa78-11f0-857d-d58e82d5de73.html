<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Linear Regression — Aesthetic Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:ital,wght@1,700&display=swap');

  /* Root Colors */
  :root {
    --deep-indigo: #2c3e50;
    --slate-gray: #4f5d75;
    --soft-cyan: #00bcd4;
    --warm-peach: #ff6f61;
    --light-gray: #f3f4f6;
    --dark-bg: #1a202c;
    --accent-gradient: linear-gradient(135deg, #00bcd4 0%, #ff6f61 100%);
    --point-color: #ff6f61;
    --line-color: #00bcd4;
  }

  /* Reset & base */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  body {
    background: var(--dark-bg);
    color: var(--light-gray);
    font-family: 'Poppins', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
    padding: 3rem 2rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
    user-select: none;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 3.8rem;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.04em;
    text-shadow:
      0 2px 5px rgba(0,0,0,0.3),
      0 4px 15px rgba(255,111,97,0.4);
    margin-bottom: 0.2rem;
    line-height: 1;
    transition: color 0.6s ease;
  }

  header p {
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--slate-gray);
    letter-spacing: 0.02em;
  }

  main {
    background: linear-gradient(135deg, #141a29 0%, #263247 100%);
    max-width: 900px;
    width: 100%;
    border-radius: 2rem;
    padding: 3rem 3.5rem 4rem;
    box-shadow:
      0 8px 24px rgba(0,188,212,0.25),
      inset 0 0 50px rgba(255,111,97,0.15);
    position: relative;
    user-select: none;
  }

  /* Canvas and border frame */
  #regressionCanvas {
    width: 100%;
    height: 420px;
    border-radius: 1.5rem;
    background: #121a2c;
    box-shadow:
      inset 0 0 20px rgba(0,188,212,0.3),
      inset 0 0 50px rgba(255,111,97,0.25),
      0 12px 36px rgba(0,188,212,0.15);
    display: block;
    margin: 0 auto 3rem;
    transition: box-shadow 0.6s ease;
  }

  /* Subtitle under canvas */
  .caption {
    font-size: 1rem;
    font-weight: 500;
    color: var(--soft-cyan);
    text-align: center;
    letter-spacing: 0.04em;
    user-select: none;
    margin-bottom: 2.5rem;
    text-shadow:
      0 0 8px rgba(0,188,212,0.55);
  }

  /* Control button styles */
  .controls {
    display: flex;
    justify-content: center;
    gap: 2rem;
  }

  button {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    padding: 0.75rem 2.4rem;
    font-size: 1rem;
    border-radius: 1.25rem;
    border: 2.5px solid var(--soft-cyan);
    color: var(--soft-cyan);
    background: transparent;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition:
      color 0.4s ease,
      background 0.5s ease,
      box-shadow 0.4s ease;
    box-shadow:
      0 0 12px rgba(0,188,212,0.5);
  }

  button::before {
    content: '';
    position: absolute;
    width: 120%;
    height: 0;
    top: 50%;
    left: -10%;
    background: var(--soft-cyan);
    opacity: 0.2;
    filter: blur(24px);
    transform: translateY(-50%);
    border-radius: 50%;
    transition: height 0.4s ease;
    z-index: 0;
  }

  button:hover {
    background: var(--soft-cyan);
    color: var(--dark-bg);
    box-shadow:
      0 0 18px 3px rgba(0,188,212,0.8);
  }
  button:hover::before {
    height: 300%;
  }

  /* Footer */
  footer {
    margin-top: 4rem;
    font-size: 0.95rem;
    color: var(--slate-gray);
    user-select: none;
    opacity: 0.65;
  }

  /* Responsive text scaling */
  @media screen and (max-width: 600px) {
    header h1 {
      font-size: 3rem;
    }
    main {
      padding: 2rem 2.5rem 3rem;
    }
    #regressionCanvas {
      height: 340px;
    }
  }
</style>
</head>
<body>
<header>
  <h1>Linear Regression</h1>
  <p>The Art and Geometry of Best-Fit Lines</p>
</header>
<main>
  <canvas id="regressionCanvas" width="860" height="420" aria-label="Linear regression visualization"></canvas>
  <div class="caption">Observe the elegant fit of a line minimizing squared errors</div>
  <div class="controls">
    <button id="animateBtn" aria-pressed="false" aria-label="Toggle animation of regression fit">Animate</button>
  </div>
</main>
<footer>
  &copy; 2024 &bull; Crafted with 🌟 aesthetics in mind
</footer>

<script>
(() => {

  const canvas = document.getElementById('regressionCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // Data points (x, y) with some noise, visually aesthetic placement
  let points = [
    {x: 70, y: 320},
    {x: 130, y: 280},
    {x: 190, y: 250},
    {x: 255, y: 230},
    {x: 310, y: 215},
    {x: 370, y: 195},
    {x: 430, y: 175},
    {x: 480, y: 150},
    {x: 530, y: 140},
    {x: 595, y: 125},
    {x: 645, y: 115},
    {x: 700, y: 95},
    {x: 750, y: 85},
    {x: 810, y: 70},
  ];

  // Normalize & transform for coordinate system
  // Canvas origin top-left; y grows downward
  // We keep our points as is for direct drawing.

  // Regression utilities
  function linearRegression(data) {
    const n = data.length;
    let sumX=0, sumY=0, sumXY=0, sumXX=0;
    for(let i=0; i<n; i++) {
      sumX += data[i].x;
      sumY += data[i].y;
      sumXY += data[i].x * data[i].y;
      sumXX += data[i].x * data[i].x;
    }
    const denominator = n*sumXX - sumX*sumX;
    if (denominator === 0) return {m:0,b:0};
    const m = (n*sumXY - sumX*sumY) / denominator;
    const b = (sumY - m*sumX)/n;
    return {m,b};
  }

  // Colors for elements
  const COLOR_BG = 'rgba(18, 26, 44, 1)';
  const COLOR_GRID = 'rgba(72, 90, 124, 0.15)';
  const COLOR_AXES = 'rgba(0,188,212,0.5)';
  const COLOR_LINE = 'rgba(0,188,212,0.9)';
  const COLOR_POINT = 'rgba(255,111,97,1)';
  const COLOR_POINT_SHADOW = 'rgba(255,111,97,0.28)';

  // Drawing grid with subtle glowing lines
  function drawGrid() {
    ctx.save();
    ctx.lineWidth = 1;
    ctx.strokeStyle = COLOR_GRID;
    ctx.shadowColor = 'rgba(0,188,212,0.11)';
    ctx.shadowBlur = 4;

    const stepX = 60;
    const stepY = 40;

    for(let x=0; x<=W; x+=stepX){
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for(let y=0; y<=H; y+=stepY){
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Draw axes with labels
  function drawAxes() {
    ctx.save();

    ctx.lineWidth = 2;
    ctx.strokeStyle = COLOR_AXES;
    ctx.shadowColor = COLOR_AXES;
    ctx.shadowBlur = 6;
    ctx.lineCap = 'round';

    // X axis bottom
    ctx.beginPath();
    ctx.moveTo(50, H-50);
    ctx.lineTo(W-20, H-50);
    ctx.stroke();

    // Y axis left
    ctx.beginPath();
    ctx.moveTo(50, H-50);
    ctx.lineTo(50, 20);
    ctx.stroke();

    // Arrows
    // X arrow
    ctx.beginPath();
    ctx.moveTo(W-25,H-55);
    ctx.lineTo(W-20,H-50);
    ctx.lineTo(W-25,H-45);
    ctx.fillStyle = COLOR_AXES;
    ctx.fill();

    // Y arrow
    ctx.beginPath();
    ctx.moveTo(45, 25);
    ctx.lineTo(50, 20);
    ctx.lineTo(55, 25);
    ctx.fill();

    // Labels
    ctx.font = "600 15px Poppins, sans-serif";
    ctx.fillStyle = COLOR_AXES;
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    ctx.shadowBlur = 12;
    ctx.shadowColor = 'rgba(0,188,212,0.4)';

    ctx.fillText("X", W-40, H-45);
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.fillText("Y", 40, 30);

    ctx.restore();
  }

  // Draw points with halo glow
  function drawPoints(points) {
    points.forEach(({x,y}) => {
      // Shadow glow
      ctx.save();
      ctx.shadowColor = COLOR_POINT_SHADOW;
      ctx.shadowBlur = 14;
      ctx.fillStyle = COLOR_POINT;
      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      // Inner point
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(x, y, 3.8, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // Draw the regression line with gradient glow
  function drawRegressionLine(m, b, glowAlpha=1) {
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineWidth = 3.5;

    // Gradient line glow
    let grad = ctx.createLinearGradient(50, 0, W-20, 0);
    grad.addColorStop(0, `rgba(0,188,212,${0.2*glowAlpha})`);
    grad.addColorStop(0.4, `rgba(255,111,97,${0.7*glowAlpha})`);
    grad.addColorStop(0.7, `rgba(255,111,97,${0.9*glowAlpha})`);
    grad.addColorStop(1, `rgba(0,188,212,${0.3*glowAlpha})`);

    ctx.strokeStyle = grad;
    ctx.shadowColor = `rgba(255,111,97,${0.25*glowAlpha})`;
    ctx.shadowBlur = 16;

    // Calculate endpoints limited to canvas
    // y = mx + b
    const x1 = 50;
    const y1 = m*x1 + b;
    const x2 = W - 20;
    const y2 = m*x2 + b;

    // Draw main line
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    // Outer soft halo
    ctx.lineWidth = 14;
    ctx.strokeStyle = `rgba(255,111,97,${0.1*glowAlpha})`;
    ctx.shadowBlur = 28;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    ctx.restore();
  }

  // Draw vertical residual lines from point to regression line
  function drawResiduals(points, m, b, alpha=0.15) {
    ctx.save();
    ctx.strokeStyle = `rgba(255,111,97,${alpha})`;
    ctx.lineWidth = 1.6;
    ctx.setLineDash([6, 10]);
    ctx.shadowColor = `rgba(255,111,97,${alpha*0.3})`;
    ctx.shadowBlur = 6;
    points.forEach(({x,y}) => {
      const yOnLine = m*x + b;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x, yOnLine);
      ctx.stroke();
    });
    ctx.restore();
  }

  // Animate regression line progressively from initial to fit line
  let animating = false;
  let animationProgress = 0;
  let animId;

  let initialM = 0.07;  // starting slope
  let initialB = 360;   // starting y-offset

  let finalReg = linearRegression(points);
  if (finalReg.m > 0) finalReg.m *= -1; // flip slope for visual aesthetics
  if (finalReg.b < 100) finalReg.b += 100; // slight offset mod

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function animate() {
    ctx.clearRect(0, 0, W, H);
    drawGrid();
    drawAxes();
    drawPoints(points);

    let m = lerp(initialM, finalReg.m, animationProgress);
    let b = lerp(initialB, finalReg.b, animationProgress);

    drawResiduals(points, m, b, lerp(0,0.2,animationProgress));
    drawRegressionLine(m, b, animationProgress);

    animationProgress += 0.013;
    if (animationProgress > 1) {
      animationProgress = 1;
      animating = false;
      document.getElementById('animateBtn').textContent="Animate";
      document.getElementById('animateBtn').setAttribute('aria-pressed', 'false');
      cancelAnimationFrame(animId);
    } else {
      animId = requestAnimationFrame(animate);
    }
  }

  // Final static draw for initial view
  function drawStaticView() {
    ctx.clearRect(0, 0, W, H);
    drawGrid();
    drawAxes();
    drawPoints(points);
    drawResiduals(points, finalReg.m, finalReg.b, 0.2);
    drawRegressionLine(finalReg.m, finalReg.b, 1);
  }

  // Initial draw
  drawStaticView();

  // Button toggle animation
  const btn = document.getElementById('animateBtn');
  btn.addEventListener('click', () => {
    if (animating) return;
    animating = true;
    animationProgress = 0;
    btn.textContent = 'Animating…';
    btn.setAttribute('aria-pressed', 'true');
    animate();
  });

})();
</script>
</body>
</html>
