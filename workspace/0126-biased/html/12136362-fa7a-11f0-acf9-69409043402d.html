<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interactive Trie Explorer</title>
<style>
  /* Minimal styling for layout: no colors, no fonts, no animations */
  body { margin: 1em; font-family: monospace, monospace; }
  button, input, select, label { margin: 0.1em 0.3em 0.1em 0; }
  textarea { width: 100%; height: 6em; font-family: monospace; font-size: 1em; margin-top: 0.5em; }
  fieldset { margin-top: 1em; padding: 0.5em; }
  legend { font-weight: bold; }
  .output { margin-top: 1em; white-space: pre-wrap; }
  .inline-block { display: inline-block; vertical-align: middle; }
  .controls-row { margin-bottom: 0.7em; }
  hr { margin: 1em 0; }
</style>
</head>
<body>

<h1>Interactive Trie Explorer</h1>

<div class="controls-row">
  <label for="inputWord">Word/Input:</label>
  <input id="inputWord" type="text" size="20" aria-label="Word or string input" />
  <button id="btnInsert">Insert Word</button>
  <button id="btnDelete">Delete Word</button>
  <button id="btnSearch">Search Word</button>
</div>

<div class="controls-row">
  <label for="autoCompletePrefix">Autocomplete prefix:</label>
  <input id="autoCompletePrefix" type="text" size="15" aria-label="Autocomplete prefix input" />
  <button id="btnAutocompleteUpto10">Autocomplete up to 10 results</button>
  <button id="btnAutocompleteAll">Autocomplete all results</button>
</div>

<div class="controls-row">
  <label for="prefixCountInput">Prefix count:</label>
  <input id="prefixCountInput" type="text" size="12" aria-label="Prefix count input" />
  <button id="btnCountPrefix">Count Words With Prefix</button>
</div>

<div class="controls-row">
  <label for="deletePrefixInput">Delete all with prefix:</label>
  <input id="deletePrefixInput" type="text" size="12" aria-label="Prefix to delete input" />
  <button id="btnDeletePrefix">Delete Words With Prefix</button>
</div>

<hr />

<fieldset>
  <legend>Bulk Operations</legend>
  <label for="bulkWords">Paste words (one per line):</label><br />
  <textarea id="bulkWords" aria-label="Bulk words input area"></textarea><br />
  <button id="btnBulkInsert">Bulk Insert Words</button>
  <button id="btnBulkDelete">Bulk Delete Words</button>
  <button id="btnResetTrie">Reset Trie (clear all)</button>
</fieldset>

<hr />

<fieldset>
  <legend>Trie Exploration and Visualization Controls</legend>
  <div>
    <label>Traverse From Root to Node:</label>
    <input id="traversePathInput" type="text" size="20" placeholder="e.g. cat" aria-label="Traverse path input" />
    <button id="btnTraverseNode">Traverse to Node</button>
    <button id="btnShowAllWordsUnderNode">List Words Under Node</button>
  </div>
  <div style="margin-top:0.5em;">
    <label for="depthLimitRange">Traversal Depth Limit:</label>
    <input type="range" id="depthLimitRange" min="1" max="20" value="10" />
    <span id="depthLimitValue">10</span>
  </div>
  <div style="margin-top:0.5em;">
    <button id="btnShowTrieStructure">Show Trie Structure (textual)</button>
  </div>
</fieldset>

<hr />

<fieldset>
  <legend>Advanced Query</legend>
  <label for="fuzzySearchInput">Fuzzy Search (max edit distance):</label>
  <input id="fuzzySearchInput" type="text" size="15" aria-label="Fuzzy search input" />
  <label for="fuzzyDistanceInput">Distance (0-3):</label>
  <select id="fuzzyDistanceInput" aria-label="Select max edit distance">
    <option value="0">0</option>
    <option value="1" selected>1</option>
    <option value="2">2</option>
    <option value="3">3</option>
  </select>
  <button id="btnFuzzySearch">Run Fuzzy Search</button>
</fieldset>

<hr />

<div>
  <h2>Output</h2>
  <pre id="outputArea" class="output" aria-live="polite" aria-atomic="true"></pre>
</div>

<script>
// ******************** TRIE DATA STRUCTURE ********************

class TrieNode {
  constructor() {
    this.children = new Map(); // char -> TrieNode
    this.endOfWord = false;
    this.countSubtreeWords = 0; // number of complete words in subtree rooted here
  }
}

class Trie {
  constructor() {
    this.root = new TrieNode();
  }

  insert(word) {
    if (typeof word !== 'string' || word.length === 0) return false;
    let node = this.root;
    let createdNew = false;
    for (const c of word) {
      if (!node.children.has(c)) {
        node.children.set(c, new TrieNode());
        createdNew = true;
      }
      node = node.children.get(c);
    }
    if (!node.endOfWord) {
      node.endOfWord = true;
      createdNew = true;
      // Update countSubtreeWords on insert path
      this._updateCounts(word, 1);
    }
    return createdNew;
  }

  _updateCounts(word, delta) {
    // delta = +1 for insert, -1 for deletion
    let node = this.root;
    node.countSubtreeWords += delta;
    for (const c of word) {
      node = node.children.get(c);
      node.countSubtreeWords += delta;
    }
  }

  search(word) {
    if (typeof word !== 'string' || word.length === 0) return false;
    let node = this.root;
    for (const c of word) {
      if (!node.children.has(c)) return false;
      node = node.children.get(c);
    }
    return node.endOfWord === true;
  }

  delete(word) {
    if (!this.search(word)) return false;
    this._delete(this.root, word, 0);
    return true;
  }

  _delete(node, word, index) {
    if (index === word.length) {
      if (!node.endOfWord) return false;
      node.endOfWord = false;
      this._updateCounts(word, -1);
      return node.children.size === 0;
    }
    const c = word[index];
    const childNode = node.children.get(c);
    if (!childNode) return false;
    const shouldDelete = this._delete(childNode, word, index + 1);
    if (shouldDelete) {
      node.children.delete(c);
      return !node.endOfWord && node.children.size === 0;
    }
    return false;
  }

  startsWith(prefix) {
    if (typeof prefix !== 'string') return false;
    let node = this.root;
    for (const c of prefix) {
      if (!node.children.has(c)) return null;
      node = node.children.get(c);
    }
    return node;
  }

  countWordsWithPrefix(prefix) {
    const node = this.startsWith(prefix);
    if (!node) return 0;
    return node.countSubtreeWords;
  }

  listWords(prefix="", limit=Infinity) {
    // returns up to limit words lexicographically under prefix
    const node = this.startsWith(prefix);
    if (!node) return [];
    const results = [];
    function dfs(currentNode, path) {
      if (results.length >= limit) return;
      if (currentNode.endOfWord) results.push(prefix + path.join(''));
      for (const [char, nextNode] of [...currentNode.children.entries()].sort((a,b)=>a[0].localeCompare(b[0]))) {
        path.push(char);
        dfs(nextNode, path);
        path.pop();
        if (results.length >= limit) return;
      }
    }
    dfs(node, []);
    return results;
  }

  deleteWordsWithPrefix(prefix) {
    // Deletes all words with the prefix and updates counts accordingly
    const node = this.startsWith(prefix);
    if (!node) return 0;
    const count = node.countSubtreeWords;
    if (count === 0) return 0;
    // To delete words, we need to remove the subtree for prefix from root
    // But partial nodes may need preservation
    // Strategy:
    // We will walk down to prefix node, then remove subtree reference from parent
    // and update counts upward
    if (prefix.length === 0) { // delete all trie content
      this.root = new TrieNode();
      return count;
    }
    let pathNodes = [this.root];
    let nodeCurrent = this.root;
    for (const c of prefix) {
      nodeCurrent = nodeCurrent.children.get(c);
      pathNodes.push(nodeCurrent);
    }
    // remove subtree at prefix node from parent
    let parent = pathNodes[pathNodes.length - 2];
    parent.children.delete(prefix[prefix.length - 1]);
    // update counts backwards
    for(let i = pathNodes.length - 2; i >= 0; i--) {
      pathNodes[i].countSubtreeWords -= count;
    }
    return count;
  }

  // Traverse to node by path and return node or null
  traverse(path) {
    if(typeof path !== 'string') return null;
    let node = this.root;
    for(const c of path) {
      if(!node.children.has(c)) return null;
      node = node.children.get(c);
    }
    return node;
  }

  // Show textual structure from node:
  // Represented with indentation, maxDepth limits recursion depth
  // format: c [* if endOfWord] (countSubtreeWords)
  textualStructure(node=this.root, indent="", maxDepth=10) {
    if(maxDepth <0) return '';
    let lines = [];
    for (const [char, childNode] of [...node.children.entries()].sort((a,b)=>a[0].localeCompare(b[0]))) {
      const wordEndMark = childNode.endOfWord ? "*" : "";
      lines.push(`${indent}${char}${wordEndMark} (${childNode.countSubtreeWords})`);
      if(maxDepth>0) {
        lines = lines.concat(this.textualStructure(childNode, indent+"  ", maxDepth-1));
      }
    }
    return lines.join("\n");
  }

  // List all words under node with depth limit
  listWordsUnderNode(node, prefix, limit, maxDepth) {
    const results = [];
    function dfs(currentNode, path, depth){
      if(results.length>=limit)return;
      if(depth<0)return;
      if(currentNode.endOfWord)results.push(prefix + path.join(''));
      for(const [char, nextNode] of [...currentNode.children.entries()].sort((a,b)=>a[0].localeCompare(b[0]))){
        path.push(char);
        dfs(nextNode, path, depth-1);
        path.pop();
        if(results.length>=limit)return;
      }
    }
    dfs(node, [], maxDepth);
    return results;
  }

  // Fuzzy search with max edit distance (using a simple DP approach)
  // Returns words with edit distance <= maxDistance
  fuzzySearch(word, maxDistance=1, maxResults=1000) {
    const results = [];
    const root = this.root;
    const wlen = word.length;

    // Using a standard algorithm (trie + edit distance DP)
    function recursiveSearch(node, prefix, previousRow) {
      if(results.length >= maxResults) return;
      const columns = wlen + 1;
      for (const [char, childNode] of node.children.entries()) {
        const currentRow = [previousRow[0] + 1];
        for(let i=1; i<columns; i++) {
          const insertCost = currentRow[i - 1] + 1;
          const deleteCost = previousRow[i] + 1;
          const replaceCost = word[i - 1] === char ? previousRow[i - 1] : previousRow[i - 1] + 1;
          currentRow.push(Math.min(insertCost, deleteCost, replaceCost));
        }
        if(currentRow[currentRow.length - 1] <= maxDistance && childNode.endOfWord) {
          results.push(prefix + char);
          if(results.length >= maxResults) return;
        }
        if(Math.min(...currentRow) <= maxDistance) {
          recursiveSearch(childNode, prefix + char, currentRow);
          if(results.length >= maxResults) return;
        }
      }
    }

    recursiveSearch(root, "", Array.from({length:wlen+1}, (_,i)=>i));
    return results;
  }
}


// ******************** UI AND LOGIC ********************

const trie = new Trie();

const outputArea = document.getElementById("outputArea");

function log(msg) {
  outputArea.textContent = msg;
}

function appendLog(msg) {
  outputArea.textContent += msg + "\n";
}

// Buttons and inputs
const inputWord = document.getElementById("inputWord");
const btnInsert = document.getElementById("btnInsert");
const btnDelete = document.getElementById("btnDelete");
const btnSearch = document.getElementById("btnSearch");

const autoCompletePrefix = document.getElementById("autoCompletePrefix");
const btnAutocompleteUpto10 = document.getElementById("btnAutocompleteUpto10");
const btnAutocompleteAll = document.getElementById("btnAutocompleteAll");

const prefixCountInput = document.getElementById("prefixCountInput");
const btnCountPrefix = document.getElementById("btnCountPrefix");

const deletePrefixInput = document.getElementById("deletePrefixInput");
const btnDeletePrefix = document.getElementById("btnDeletePrefix");

const bulkWords = document.getElementById("bulkWords");
const btnBulkInsert = document.getElementById("btnBulkInsert");
const btnBulkDelete = document.getElementById("btnBulkDelete");
const btnResetTrie = document.getElementById("btnResetTrie");

const traversePathInput = document.getElementById("traversePathInput");
const btnTraverseNode = document.getElementById("btnTraverseNode");
const btnShowAllWordsUnderNode = document.getElementById("btnShowAllWordsUnderNode");

const depthLimitRange = document.getElementById("depthLimitRange");
const depthLimitValue = document.getElementById("depthLimitValue");

const btnShowTrieStructure = document.getElementById("btnShowTrieStructure");

const fuzzySearchInput = document.getElementById("fuzzySearchInput");
const fuzzyDistanceInput = document.getElementById("fuzzyDistanceInput");
const btnFuzzySearch = document.getElementById("btnFuzzySearch");


function sanitizeWord(w) {
  if(typeof w !== 'string') return '';
  return w.trim().toLowerCase();
}

// >>> Insert Word
btnInsert.addEventListener('click', () => {
  const w = sanitizeWord(inputWord.value);
  if (w.length === 0) {
    log("Please enter a non-empty word to insert.");
    return;
  }
  if(trie.insert(w))
    log(`Inserted word: "${w}"`);
  else
    log(`Word "${w}" already in trie.`);
  inputWord.value = "";
});

// >>> Delete Word
btnDelete.addEventListener('click', () => {
  const w = sanitizeWord(inputWord.value);
  if (w.length === 0) {
    log("Please enter a non-empty word to delete.");
    return;
  }
  if(trie.delete(w))
    log(`Deleted word: "${w}"`);
  else
    log(`Word "${w}" not found in trie.`);
  inputWord.value = "";
});

// >>> Search Word
btnSearch.addEventListener('click', () => {
  const w = sanitizeWord(inputWord.value);
  if (w.length === 0) {
    log("Please enter a non-empty word to search.");
    return;
  }
  if(trie.search(w))
    log(`Word "${w}" FOUND in trie.`);
  else
    log(`Word "${w}" NOT found in trie.`);
});

// >>> Autocomplete up to 10
btnAutocompleteUpto10.addEventListener('click', () => {
  const prefix = sanitizeWord(autoCompletePrefix.value);
  if (prefix.length === 0) {
    log("Please enter a prefix to autocomplete.");
    return;
  }
  const matches = trie.listWords(prefix, 10);
  if (matches.length === 0) {
    log(`No autocomplete results for prefix "${prefix}".`);
  } else {
    log(`Autocomplete up to 10 for prefix "${prefix}":\n` + matches.join("\n"));
  }
});

// >>> Autocomplete all
btnAutocompleteAll.addEventListener('click', () => {
  const prefix = sanitizeWord(autoCompletePrefix.value);
  if (prefix.length === 0) {
    log("Please enter a prefix to autocomplete.");
    return;
  }
  const matches = trie.listWords(prefix, 10000);
  if (matches.length === 0) {
    log(`No autocomplete results for prefix "${prefix}".`);
  } else {
    log(`Autocomplete all results for prefix "${prefix}":\n` + matches.join("\n"));
  }
});

// >>> Count words with prefix
btnCountPrefix.addEventListener('click', () => {
  const prefix = sanitizeWord(prefixCountInput.value);
  if(prefix.length === 0) {
    log("Please enter a prefix to count words.");
    return;
  }
  const count = trie.countWordsWithPrefix(prefix);
  log(`Number of words with prefix "${prefix}": ${count}`);
});

// >>> Delete words with prefix
btnDeletePrefix.addEventListener('click', () => {
  const prefix = sanitizeWord(deletePrefixInput.value);
  if(prefix.length === 0) {
    log("Please enter a prefix to delete words.");
    return;
  }
  const count = trie.deleteWordsWithPrefix(prefix);
  if(count === 0) {
    log(`No words found with prefix "${prefix}" to delete.`);
  } else {
    log(`Deleted ${count} word(s) with prefix "${prefix}".`);
  }
});

// >>> Bulk insert words
btnBulkInsert.addEventListener('click', () => {
  const text = bulkWords.value;
  if(text.trim().length === 0) {
    log("Please paste words (one per line) to bulk insert.");
    return;
  }
  const words = text.split(/\r?\n/).map(w=>sanitizeWord(w)).filter(w=>w.length>0);
  let insertedCount = 0;
  for(const w of words) {
    if(trie.insert(w)) insertedCount++;
  }
  log(`Bulk Insert: ${insertedCount} new word(s) inserted out of ${words.length} lines.`);
  bulkWords.value = "";
});

// >>> Bulk delete words
btnBulkDelete.addEventListener('click', () => {
  const text = bulkWords.value;
  if(text.trim().length === 0) {
    log("Please paste words (one per line) to bulk delete.");
    return;
  }
  const words = text.split(/\r?\n/).map(w=>sanitizeWord(w)).filter(w=>w.length>0);
  let deletedCount = 0;
  for(const w of words) {
    if(trie.delete(w)) deletedCount++;
  }
  log(`Bulk Delete: ${deletedCount} word(s) deleted out of ${words.length} lines.`);
  bulkWords.value = "";
});

// >>> Reset Trie
btnResetTrie.addEventListener('click', () => {
  if(confirm("Are you sure you want to reset the trie and erase all words?")) {
    trie.root = new TrieNode();
    log("Trie has been reset.");
  } else {
    log("Reset cancelled.");
  }
});

// >>> Traverse to node by path
btnTraverseNode.addEventListener('click', () => {
  const path = sanitizeWord(traversePathInput.value);
  if(path.length === 0) {
    log("Please enter a path to traverse.");
    return;
  }
  const node = trie.traverse(path);
  if(node === null) {
    log(`Path "${path}" does NOT exist in the trie.`);
    return;
  }
  log(`Traversed to node "${path}".\nEnd Of Word: ${node.endOfWord}\nWords in Subtree: ${node.countSubtreeWords}`);
});

// >>> Show all words under node
btnShowAllWordsUnderNode.addEventListener('click', () => {
  const path = sanitizeWord(traversePathInput.value);
  if(path.length === 0) {
    log("Please enter a path to show words under the node.");
    return;
  }
  const node = trie.traverse(path);
  if(node === null) {
    log(`Node "${path}" does NOT exist in the trie.`);
    return;
  }
  const maxDepth = parseInt(depthLimitRange.value, 10);
  const limit = 1000; // safety limit to avoid huge dumps
  const words = trie.listWordsUnderNode(node, path, limit, maxDepth);
  if(words.length === 0) {
    log(`No words under node "${path}" up to depth ${maxDepth}.`);
  } else {
    log(`Words under node "${path}" (depth limit ${maxDepth}, max ${limit}):\n${words.join('\n')}`);
  }
});

// >>> Depth limit slider sync
depthLimitRange.addEventListener('input', () => {
  depthLimitValue.textContent = depthLimitRange.value;
});

// >>> Show whole Trie structure textual
btnShowTrieStructure.addEventListener('click', () => {
  const maxDepth = parseInt(depthLimitRange.value, 10);
  const structureText = trie.textualStructure(trie.root, "", maxDepth);
  if(structureText === "") {
    log("(The trie is empty.)");
  } else {
    log("Trie structure (max depth "+maxDepth+"):\n" + structureText);
  }
});

// >>> Fuzzy search
btnFuzzySearch.addEventListener('click', () => {
  const pattern = sanitizeWord(fuzzySearchInput.value);
  if(pattern.length === 0) {
    log("Please enter a word/pattern for fuzzy search.");
    return;
  }
  const maxDist = parseInt(fuzzyDistanceInput.value, 10);
  const maxResults = 1000; // limit results
  log(`Running fuzzy search for "${pattern}" with max distance ${maxDist}... Please wait.`);
  setTimeout(() => {
    const results = trie.fuzzySearch(pattern, maxDist, maxResults);
    if(results.length === 0) {
      log(`No words found within edit distance ${maxDist} of "${pattern}".`);
    } else {
      log(`Fuzzy search results for "${pattern}" (max distance ${maxDist}, up to ${maxResults} results):\n` + results.join("\n"));
    }
  }, 10);
});


// >>> Keyboard shortcuts: Enter triggers Insert for inputWord if focused
inputWord.addEventListener('keydown', e => {
  if(e.key === 'Enter') {
    e.preventDefault();
    btnInsert.click();
  }
});

autoCompletePrefix.addEventListener('keydown', e => {
  if(e.key==='Enter'){
    e.preventDefault();
    btnAutocompleteUpto10.click();
  }
});

prefixCountInput.addEventListener('keydown', e => {
  if(e.key === 'Enter') {
    e.preventDefault();
    btnCountPrefix.click();
  }
});

deletePrefixInput.addEventListener('keydown', e => {
  if(e.key === 'Enter') {
    e.preventDefault();
    btnDeletePrefix.click();
  }
});

traversePathInput.addEventListener('keydown', e => {
  if(e.key==='Enter'){
    e.preventDefault();
    btnTraverseNode.click();
  }
});

fuzzySearchInput.addEventListener('keydown', e => {
  if(e.key === 'Enter') {
    e.preventDefault();
    btnFuzzySearch.click();
  }
});

// On load show instructions
log(
  "Trie Interactive Explorer Ready.\n"+
  "Available operations:\n"+
  "- Insert/Search/Delete words\n"+
  "- Autocomplete with prefix\n"+
  "- Count/Delete words with prefix\n"+
  "- Bulk insert/delete and reset\n"+
  "- Traverse nodes and list words under nodes with depth limit\n"+
  "- Show textual trie structure\n"+
  "- Fuzzy search (edit distance 0-3)\n\n"+
  "Try inserting words then exploring the trie!"
);

</script>

</body>
</html>
