<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Process Demonstrator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            position: relative;
            padding: 20px;
        }
        .hidden {
            display: none;
        }
        .step {
            margin: 10px 0;
        }
    </style>
</head>
<body>

<h1>Interactive Process Demonstrator</h1>

<div id="workflowContainer">
    <div class="step" id="step1">
        <h2>Step 1: Choose an Action</h2>
        <button onclick="nextStep(1)">Start Process</button>
    </div>

    <div class="step hidden" id="step2">
        <h2>Step 2: Configure Options</h2>
        <label for="inputA">Option A:</label>
        <input type="text" id="inputA" placeholder="Type something...">
        <br>
        <label for="sliderB">Slider B:</label>
        <input type="range" id="sliderB" min="0" max="100" value="50" oninput="updateSliderValueB();">
        <span id="sliderBValue">50</span>
        <br>
        <button onclick="nextStep(2)">Next Step</button>
        <button onclick="previousStep(2)">Back</button>
    </div>

    <div class="step hidden" id="step3">
        <h2>Step 3: Confirm Options</h2>
        <p>Option A: <span id="displayInputA"></span></p>
        <p>Slider B Value: <span id="displaySliderB"></span></p>
        <button onclick="nextStep(3)">Confirm</button>
        <button onclick="previousStep(3)">Back</button>
    </div>

    <div class="step hidden" id="step4">
        <h2>Step 4: Review Process</h2>
        <p>Thank you for configuring your options!</p>
        <button onclick="resetProcess()">Reset Process</button>
    </div>
</div>

<script>
    function nextStep(currentStep) {
        document.getElementById('step' + currentStep).classList.add('hidden');

        if (currentStep === 1) {
            document.getElementById('step2').classList.remove('hidden');
        } else if (currentStep === 2) {
            const inputA = document.getElementById('inputA').value;
            const sliderBValue = document.getElementById('sliderB').value;
            document.getElementById('displayInputA').textContent = inputA;
            document.getElementById('displaySliderB').textContent = sliderBValue;
            document.getElementById('step3').classList.remove('hidden');
        } else if (currentStep === 3) {
            document.getElementById('step4').classList.remove('hidden');
        }
    }

    function previousStep(currentStep) {
        document.getElementById('step' + currentStep).classList.add('hidden');

        if (currentStep === 2) {
            document.getElementById('step1').classList.remove('hidden');
        } else if (currentStep === 3) {
            document.getElementById('step2').classList.remove('hidden');
        }
    }

    function updateSliderValueB() {
        const sliderBValue = document.getElementById('sliderB').value;
        document.getElementById('sliderBValue').textContent = sliderBValue;
    }

    function resetProcess() {
        for (let i = 1; i <= 4; i++) {
            document.getElementById('step' + i).classList.add('hidden');
        }
        document.getElementById('step1').classList.remove('hidden');
        document.getElementById('inputA').value = '';
        document.getElementById('sliderB').value = 50;
        document.getElementById('sliderBValue').textContent = '50';
        document.getElementById('displayInputA').textContent = '';
        document.getElementById('displaySliderB').textContent = '';
    }
</script>

</body>
</html>
