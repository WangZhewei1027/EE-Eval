<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trie Visualization</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #131313;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .trie-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            position: relative;
            height: 300px;
            width: 500px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            background: linear-gradient(180deg, #1b1b1b 0%, #202020 100%);
        }

        .node {
            width: 50px;
            height: 50px;
            background-color: #4a90e2;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 5px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .node:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.5);
        }

        .edge {
            height: 50px;
            width: 2px;
            background-color: rgba(255, 255, 255, 0.3);
            position: absolute;
            transition: height 0.3s ease;
        }

        .button {
            background-color: #4a90e2;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s ease;
            font-size: 16px;
        }

        .button:hover {
            background-color: #357ab8;
        }
    </style>
</head>
<body>
    <h1>Trie Visualization</h1>
    <div class="trie-container">
        <div class="edge" style="left: 50px; height: 150px;"></div>
        <div class="edge" style="left: 105px; height: 100px;"></div>
        <div class="edge" style="left: 160px; height: 50px;"></div>

        <div class="node">T</div>
        <div class="node" style="margin-left: 50px;">R</div>
        <div class="node" style="margin-left: 55px;">I</div>
        <div class="node" style="margin-left: 45px;">E</div>

        <div class="node" style="margin-left: 100px;">A</div>
        <div class="node" style="margin-left: 110px;">B</div>
        <div class="node" style="margin-left: 65px;">O</div>
    </div>
    <button class="button" onclick="alert('Visualizing Trie...')">Visualize</button>

    <script>
        // Basic Button functionality (minimal interactivity)
        document.querySelector('.button').addEventListener('click', () => {
            alert('Meet the Trie data structure!');
        });
    </script>
</body>
</html>
