<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Array Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input, button, select {
            margin: 5px;
        }
        #arrayDisplay {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            width: 300px;
        }
    </style>
</head>
<body>

<h1>Dynamic Array Manipulation</h1>

<label for="elementInput">Add Element:</label>
<input type="number" id="elementInput">
<button id="addButton">Add</button>

<label for="removeIndex">Remove Element at Index:</label>
<input type="number" id="removeIndex">
<button id="removeButton">Remove</button>

<button id="resetButton">Reset Array</button>

<label for="bulkInput">Bulk Add Elements (comma separated):</label>
<input type="text" id="bulkInput">
<button id="bulkAddButton">Bulk Add</button>

<h2>Current Array:</h2>
<div id="arrayDisplay">Array is empty</div>

<script>
    let dynamicArray = [];

    const arrayDisplay = document.getElementById('arrayDisplay');
    const elementInput = document.getElementById('elementInput');
    const removeIndex = document.getElementById('removeIndex');
    const bulkInput = document.getElementById('bulkInput');

    const updateDisplay = () => {
        arrayDisplay.innerText = dynamicArray.length > 0 ? JSON.stringify(dynamicArray) : 'Array is empty';
    };

    document.getElementById('addButton').addEventListener('click', () => {
        const value = Number(elementInput.value);
        if (!isNaN(value)) {
            dynamicArray.push(value);
            elementInput.value = '';
            updateDisplay();
        }
    });

    document.getElementById('removeButton').addEventListener('click', () => {
        const index = Number(removeIndex.value);
        if (!isNaN(index) && index >= 0 && index < dynamicArray.length) {
            dynamicArray.splice(index, 1);
            removeIndex.value = '';
            updateDisplay();
        }
    });

    document.getElementById('resetButton').addEventListener('click', () => {
        dynamicArray = [];
        updateDisplay();
    });

    document.getElementById('bulkAddButton').addEventListener('click', () => {
        const values = bulkInput.value.split(',').map(val => Number(val.trim()));
        for (let value of values) {
            if (!isNaN(value)) {
                dynamicArray.push(value);
            }
        }
        bulkInput.value = '';
        updateDisplay();
    });
</script>

</body>
</html>
