<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Radix Sort • Visualized</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-1: #071421;
      --bg-2: #081826;
      --accent: #7ee7ff;
      --accent-2: #b388ff;
      --muted: #90a4ae;
      --glass: rgba(255,255,255,0.04);
      --glass-2: rgba(255,255,255,0.03);
      --success: #7ee7c7;
      --card-h: 62px;
    }
    html,body{
      height:100%;
      margin:0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(120,60,255,0.08), transparent 8%),
                  radial-gradient(900px 400px at 90% 90%, rgba(126,231,255,0.04), transparent 10%),
                  linear-gradient(180deg,var(--bg-1) 0%, var(--bg-2) 100%);
      color:#e6f3fb;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow:hidden;
    }

    /* Subtle animated nebula */
    .nebula {
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      opacity:0.7;
      filter: blur(30px) saturate(120%);
      mix-blend-mode: screen;
      background:
        radial-gradient(600px 240px at 15% 25%, rgba(179,136,255,0.06), transparent 15%),
        radial-gradient(420px 160px at 85% 70%, rgba(126,231,255,0.05), transparent 12%);
      animation: floatNeb 10s linear infinite alternate;
    }
    @keyframes floatNeb {
      from { transform: translateY(-10px) rotate(-1deg); }
      to { transform: translateY(10px) rotate(1deg); }
    }

    .app {
      position:relative;
      z-index:5;
      padding:36px;
      display:flex;
      flex-direction:column;
      gap:28px;
      height:100%;
      box-sizing:border-box;
    }

    .header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
    }
    .title {
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .title h1 {
      margin:0;
      font-family: "Playfair Display", serif;
      font-size:28px;
      letter-spacing:0.2px;
      color:linear-gradient(90deg,#fff,#dfefff);
      text-shadow: 0 6px 30px rgba(120,60,255,0.12);
    }
    .title p {
      margin:0;
      color:var(--muted);
      font-size:13px;
      font-weight:600;
      letter-spacing:0.6px;
      text-transform:uppercase;
    }

    .controls {
      display:flex;
      gap:12px;
      align-items:center;
    }
    .btn {
      border:0;
      outline:0;
      background:linear-gradient(90deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      color:var(--accent);
      padding:10px 14px;
      border-radius:12px;
      font-weight:700;
      letter-spacing:0.6px;
      cursor:pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,0.5), inset 0 -1px 0 rgba(255,255,255,0.02);
      transition: transform .18s cubic-bezier(.2,.9,.2,1), box-shadow .18s;
      display:inline-flex;
      gap:10px;
      align-items:center;
      font-size:13px;
    }
    .btn:active{ transform:translateY(1px) }
    .btn.secondary{
      color:#dbeaff;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.015));
      border: 1px solid rgba(255,255,255,0.03);
    }
    .btn.primary{
      background:linear-gradient(90deg, rgba(126,231,255,0.12), rgba(179,136,255,0.08));
      color:#02121a;
      box-shadow: 0 8px 28px rgba(120,60,255,0.12), 0 2px 6px rgba(0,0,0,0.5);
    }

    .stage {
      position:relative;
      flex:1 1 auto;
      display:flex;
      gap:20px;
      align-items:center;
      justify-content:center;
      min-height:480px;
    }

    /* Main visual card */
    .panel {
      width:1100px;
      max-width:calc(100% - 72px);
      height:480px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:20px;
      padding:28px;
      box-shadow: 0 10px 40px rgba(6,10,15,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.03);
      overflow:hidden;
      position:relative;
      display:flex;
      flex-direction:column;
    }

    .panel-top {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      margin-bottom:10px;
    }
    .panel-top .label {
      display:flex;
      gap:12px;
      align-items:center;
    }
    .badge {
      height:44px;
      min-width:150px;
      background:linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:12px;
      padding:10px 14px;
      display:flex;
      align-items:center;
      gap:12px;
      border:1px solid rgba(255,255,255,0.03);
    }
    .badge strong { font-weight:800; color:#fff; font-size:16px; letter-spacing:0.6px; }
    .badge span { color:var(--muted); font-size:13px; font-weight:600; }

    .legend {
      color:var(--muted);
      font-size:13px;
      display:flex;
      gap:18px;
      align-items:center;
    }

    .visual {
      position:relative;
      flex:1 1 auto;
      display:block;
      margin-top:6px;
    }

    /* Input row */
    .input-row {
      position:absolute;
      left:48px;
      right:48px;
      top:44px;
      height:var(--card-h);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      pointer-events:none;
    }
    .input-track {
      position:relative;
      height:var(--card-h);
      width:calc(100% - 180px);
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
    }

    .card {
      width:92px;
      height:var(--card-h);
      border-radius:14px;
      background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:20px;
      color:#fff;
      letter-spacing:0.6px;
      box-shadow: 0 8px 30px rgba(4,10,20,0.6);
      border:1px solid rgba(255,255,255,0.04);
      position:relative;
      transform-origin:center;
      transition: transform .6s cubic-bezier(.2,.9,.25,1), box-shadow .3s;
      will-change:transform;
      pointer-events:auto;
    }
    .card .sub {
      position:absolute;
      left:10px;
      top:9px;
      font-size:11px;
      color:var(--muted);
      font-weight:700;
      letter-spacing:0.6px;
    }
    .card .val {
      z-index:2;
      text-shadow: 0 6px 26px rgba(50,80,120,0.18);
    }

    .card.glow {
      box-shadow: 0 18px 48px rgba(120,60,255,0.14), 0 6px 24px rgba(0,0,0,0.6);
      transform:translateY(-6px) scale(1.02);
    }

    /* Buckets arc */
    .buckets {
      position:absolute;
      left:34px;
      right:34px;
      bottom:28px;
      height:260px;
      pointer-events:none;
    }
    .bucket {
      position:absolute;
      width:92px;
      height:140px;
      border-radius:14px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:8px;
      padding-top:12px;
      border:1px solid rgba(255,255,255,0.03);
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      will-change:transform;
    }
    .bucket .label {
      font-weight:800;
      color:var(--muted);
      font-size:15px;
      margin-top:6px;
    }
    .bucket .slot {
      width:86px;
      height:84px;
      border-radius:10px;
      margin-top:6px;
      background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:6px;
      gap:8px;
      box-sizing:border-box;
      overflow:visible;
    }

    /* Pass badge */
    .pass-indicator {
      position:absolute;
      left:48px;
      top:120px;
      background:linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      padding:10px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.03);
      color:var(--muted);
      font-weight:700;
      font-size:13px;
      display:flex;
      gap:12px;
      align-items:center;
      box-shadow: 0 6px 18px rgba(0,0,0,0.6);
    }

    .hint {
      position:absolute;
      right:48px;
      bottom:18px;
      color:var(--muted);
      font-size:13px;
      display:flex;
      gap:8px;
      align-items:center;
    }

    /* Tiny accent sparkles */
    .spark {
      position:absolute;
      width:12px;
      height:12px;
      border-radius:50%;
      background:radial-gradient(circle at 40% 35%, #fff, rgba(255,255,255,0.2) 40%, rgba(255,255,255,0) 60%);
      filter:blur(6px) drop-shadow(0 2px 6px rgba(120,60,255,0.2));
      opacity:0.9;
      transform:translate(-50%,-50%);
      pointer-events:none;
      mix-blend-mode: screen;
      animation: twinkle 3s infinite;
    }
    .spark.s1 { left:72px; top:68px; background: radial-gradient(circle at 40% 35%, #b388ff, rgba(179,136,255,0.25) 40%, rgba(179,136,255,0) 60%); animation-delay:0s;}
    .spark.s2 { left:980px; top:48px; background: radial-gradient(circle at 40% 35%, #7ee7ff, rgba(126,231,255,0.22) 40%, rgba(126,231,255,0) 60%); animation-delay:0.7s;}
    .spark.s3 { left:540px; top:420px; background: radial-gradient(circle at 40% 35%, #b388ff, rgba(179,136,255,0.12) 40%, rgba(179,136,255,0) 60%); animation-delay:1.2s;}
    @keyframes twinkle {
      0% { transform:translate(-50%,-50%) scale(.6); opacity:.7 }
      50% { transform:translate(-50%,-46%) scale(1.15); opacity:1 }
      100% { transform:translate(-50%,-50%) scale(.6); opacity:.7 }
    }

    /* Responsive */
    @media (max-width:1200px){
      .panel{ height:420px; }
      .buckets { height:220px; }
    }
    @media (max-width:800px){
      .panel{ width:100%; padding:18px; }
      .input-row { left:18px; right:18px; top:36px; }
      .badge { min-width:120px }
    }
  </style>
</head>
<body>
  <div class="nebula"></div>
  <div class="app">
    <div class="header">
      <div class="title">
        <h1>Radix Sort — LSD Visualized</h1>
        <p>Elegant, step-by-step animation of Least Significant Digit Radix Sort</p>
      </div>
      <div class="controls" aria-hidden="true">
        <button id="shuffleBtn" class="btn secondary" title="Shuffle numbers">
          Shuffle
        </button>
        <button id="startBtn" class="btn primary" title="Start animation">
          Start Animation
        </button>
      </div>
    </div>

    <div class="stage">
      <div class="panel" role="main" aria-live="polite">
        <div class="panel-top">
          <div class="label">
            <div class="badge">
              <strong>Radix Sort</strong>
              <span>Least Significant Digit</span>
            </div>
            <div style="width:16px"></div>
            <div class="legend">
              <div style="display:flex;flex-direction:column">
                <small style="color:var(--muted);font-weight:700">Elements</small>
                <strong id="countLabel">8 items</strong>
              </div>
              <div style="display:flex;flex-direction:column">
                <small style="color:var(--muted);font-weight:700">Digits</small>
                <strong id="digitsLabel">3 passes</strong>
              </div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <small style="color:var(--muted);font-weight:700">Concept</small>
            <div style="font-weight:700;color:var(--muted);font-size:13px">Distribute by digits → Collect → Repeat</div>
          </div>
        </div>

        <div class="visual" id="visual">
          <div class="input-row" id="inputRow">
            <div class="input-track" id="inputTrack"></div>
          </div>

          <div class="pass-indicator" id="passIndicator">Pass: 0 / 0</div>

          <div class="buckets" id="buckets"></div>

          <div class="hint">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="opacity:.9"><path d="M12 2v6" stroke="#7ee7ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 9.5L12 2l7 7.5" stroke="#b388ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div style="color:var(--muted)">Observe the distribution of elements into buckets 0–9 by digit.</div>
          </div>

          <div class="spark s1"></div>
          <div class="spark s2"></div>
          <div class="spark s3"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Radix Sort Visualizer (LSD) — minimal controls: Shuffle & Start
    (function(){
      const startBtn = document.getElementById('startBtn');
      const shuffleBtn = document.getElementById('shuffleBtn');
      const inputTrack = document.getElementById('inputTrack');
      const bucketsEl = document.getElementById('buckets');
      const passIndicator = document.getElementById('passIndicator');
      const countLabel = document.getElementById('countLabel');
      const digitsLabel = document.getElementById('digitsLabel');

      const STATE = {
        values: [],
        cardEls: [],
        buckets: [],
        animating: false,
        maxDigits: 1,
      };

      const CARD_W = 92;
      const CARD_H = 62;

      // Initialize UI
      function init(){
        generateValues();
        buildBuckets();
        placeCards();
        updateLabels();
      }

      function generateValues(){
        // Create 8 values in range 0..999, varied digits
        const n = 8;
        const arr = [];
        for(let i=0;i<n;i++){
          // ensure variety: some small, some 2-digit, some 3-digit
          const r = Math.random();
          let v;
          if(r < 0.35) v = Math.floor(Math.random()*30); // small
          else if(r < 0.75) v = Math.floor(Math.random()*200); // medium
          else v = Math.floor(Math.random()*900)+100; // large
          arr.push(v);
        }
        STATE.values = arr;
        STATE.maxDigits = Math.max(...arr).toString().length || 1;
      }

      function buildBuckets(){
        // create 10 bucket DOMs arranged on an arc
        bucketsEl.innerHTML = '';
        STATE.buckets = [];
        for(let d=0; d<10; d++){
          const be = document.createElement('div');
          be.className = 'bucket';
          be.dataset.digit = d;
          be.innerHTML = `
            <div class="label">${d}</div>
            <div class="slot"></div>
          `;
          bucketsEl.appendChild(be);
          STATE.buckets.push(be);
        }
        positionBucketsArc();
      }

      function positionBucketsArc(){
        // place 10 buckets along a subtle semicircular arc within bucketsEl
        const rect = bucketsEl.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;
        const cx = w / 2;
        const cy = h * 1.1; // circle center below container to make arc
        const radius = Math.min(w / 1.8, h * 2); // adjust radius
        STATE.buckets.forEach((b, i) => {
          const t = i / 9; // 0..1
          const angle = (Math.PI * 0.9) * (1 - t) + (Math.PI * 0.05); // left->right along arc
          const bx = cx + Math.cos(angle) * radius - b.offsetWidth / 2;
          const by = cy - Math.sin(angle) * radius - b.offsetHeight / 2;
          b.style.transform = `translate(${bx}px, ${by}px)`;
          // apply slight color gradient
          const hue = 180 + (i/9)*80;
          b.style.background = `linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.008))`;
        });
      }

      function placeCards(){
        // clear existing
        inputTrack.innerHTML = '';
        STATE.cardEls = [];
        const vals = STATE.values;
        vals.forEach((v, idx) => {
          const ce = document.createElement('div');
          ce.className = 'card';
          ce.dataset.value = v;
          ce.dataset.index = idx;
          ce.innerHTML = `<div class="sub">#${idx+1}</div><div class="val">${v}</div>`;
          inputTrack.appendChild(ce);
          STATE.cardEls.push(ce);
        });
        // ensure initial positions by forcing layout
        requestAnimationFrame(()=> {
          // style cards with slight gradient accents
          STATE.cardEls.forEach((c,i) => {
            const g1 = i % 2 === 0 ? 'rgba(126,231,255,0.10)' : 'rgba(179,136,255,0.10)';
            c.style.background = `linear-gradient(180deg, ${g1}, rgba(255,255,255,0.02))`;
            c.style.border = '1px solid rgba(255,255,255,0.04)';
            c.style.transition = 'transform .68s cubic-bezier(.2,.9,.25,1), box-shadow .28s';
            // reset transform
            c.style.transform = 'translate3d(0,0,0)';
          });
        });
        // Reposition buckets in case of resize
        setTimeout(()=> positionBucketsArc(), 80);
      }

      // Utility: get numeric digit at place d (0 = LSD)
      function digitAt(num, d){
        return Math.floor(Math.abs(num) / Math.pow(10,d)) % 10;
      }

      // Animate moving card to target (x,y) (absolute coordinates relative to visual container)
      function animateMoveTo(cardEl, targetX, targetY, opts = {}){
        return new Promise(resolve => {
          const visualRect = document.getElementById('visual').getBoundingClientRect();
          // compute current center
          const cr = cardEl.getBoundingClientRect();
          const curX = cr.left + cr.width/2 - visualRect.left;
          const curY = cr.top + cr.height/2 - visualRect.top;
          const dx = targetX - curX;
          const dy = targetY - curY;
          // apply transform translate
          // make transform relative to current by using translate3d
          cardEl.style.transition = `transform ${opts.duration || 600}ms cubic-bezier(.2,.9,.25,1), box-shadow ${Math.min(opts.duration||600,420)}ms`;
          cardEl.style.zIndex = 2000;
          if(opts.glow) cardEl.classList.add('glow');
          cardEl.style.transform = `translate3d(${dx}px, ${dy}px, 0)`;
          // optional slight rotate
          if(opts.rotate) cardEl.style.transform += ` rotate(${opts.rotate}deg)`;
          setTimeout(()=>{
            if(opts.glow) cardEl.classList.remove('glow');
            cardEl.style.zIndex = '';
            resolve();
          }, opts.duration || 600);
        });
      }

      // Get center of a bucket's slot area
      function getBucketSlotCenter(bucketEl, stackIndex){
        const visualRect = document.getElementById('visual').getBoundingClientRect();
        const br = bucketEl.getBoundingClientRect();
        const slot = bucketEl.querySelector('.slot').getBoundingClientRect();
        // stack cards inside slot bottom-up
        const x = slot.left + slot.width/2 - visualRect.left;
        // base on slot bottom minus card heights offset
        const baseY = slot.top + slot.height - visualRect.top;
        const y = baseY - (CARD_H/2) - (stackIndex * (CARD_H*0.34)); // slight overlap
        return {x, y};
      }

      async function animateRadix(){
        if(STATE.animating) return;
        STATE.animating = true;
        startBtn.disabled = true;
        shuffleBtn.disabled = true;

        const maxDigits = STATE.maxDigits;
        passIndicator.textContent = `Pass: 0 / ${maxDigits}`;
        for(let pass = 0; pass < maxDigits; pass++){
          passIndicator.textContent = `Pass: ${pass+1} / ${maxDigits}`;
          // create bucket arrays
          const buckets = Array.from({length:10}, ()=>[]);
          const bucketStacks = Array.from({length:10}, ()=>0);

          // Distribute: move each card to its bucket based on digit
          for(let i=0;i<STATE.cardEls.length;i++){
            const card = STATE.cardEls[i];
            const value = Number(card.dataset.value);
            const d = digitAt(value, pass);
            const bucketEl = STATE.buckets[d];
            const stackIdx = bucketStacks[d]++;
            buckets[d].push(card);

            // Compute target center for this stack position
            const center = getBucketSlotCenter(bucketEl, stackIdx);
            // small rotation randomly for aesthetic
            const rotate = (Math.random()*12 - 6);
            await animateMoveTo(card, center.x, center.y, {duration: 550, glow:true, rotate});
            // After move, pin card to new location by setting transform relative to parent visual container
            // We will keep transform as is; mark card as in-bucket
            card.dataset.location = `bucket-${d}`;
            // slight pause between elements for cascading effect
            await wait(80);
          }

          // Small pause before collection
          await wait(450);

          // Collect: take cards from buckets 0..9 in order and move them back into input positions
          // New order: flatten buckets
          const newOrder = [];
          for(let b=0;b<10;b++){
            for(const c of buckets[b]) newOrder.push(c);
          }

          // Recompute positions where to place cards in inputTrack centerline
          // We want to animate them to a neat row center
          const visualRect = document.getElementById('visual').getBoundingClientRect();
          const trackRect = inputTrack.getBoundingClientRect();
          const centerX = trackRect.left + trackRect.width/2 - visualRect.left;
          const y = trackRect.top + trackRect.height/2 - visualRect.top;
          const total = newOrder.length;
          const spacing = 110; // space between centers
          const rowWidth = (total - 1) * spacing;
          // target centers for each index
          const targets = newOrder.map((c, idx) => {
            const tx = centerX - rowWidth/2 + idx * spacing;
            return {x: tx, y: y};
          });

          // move each card to its new input position in sequence with stylish easing
          for(let i=0;i<newOrder.length;i++){
            const card = newOrder[i];
            const t = targets[i];
            await animateMoveTo(card, t.x, t.y, {duration: 520, glow:true, rotate:0});
            card.dataset.location = `row-${i}`;
            // After moved, snap to input row styling
            await wait(70);
          }

          // Reorder internal cardEls array to match collected order
          STATE.cardEls = newOrder.slice();

          // brief pause before next pass
          await wait(540);
        }

        passIndicator.textContent = `Completed • ${STATE.maxDigits} passes`;
        // subtle final highlight
        for(const c of STATE.cardEls){
          c.classList.add('glow');
        }
        await wait(900);
        for(const c of STATE.cardEls) c.classList.remove('glow');

        STATE.animating = false;
        startBtn.disabled = false;
        shuffleBtn.disabled = false;
      }

      function wait(ms){ return new Promise(r=>setTimeout(r, ms)); }

      // Shuffle handler
      function shuffle(){
        if(STATE.animating) return;
        // Randomize values and re-render
        generateValues();
        placeCards();
        updateLabels();
        passIndicator.textContent = `Ready • ${STATE.maxDigits} passes`;
      }

      function updateLabels(){
        countLabel.textContent = `${STATE.values.length} items`;
        digitsLabel.textContent = `${STATE.maxDigits} passes`;
        passIndicator.textContent = `Ready • ${STATE.maxDigits} passes`;
      }

      // Responsive repositioning
      window.addEventListener('resize', ()=> {
        positionBucketsArc();
        // ensure card transforms remain consistent (quick fix: reset transforms)
        STATE.cardEls.forEach(c => { c.style.transform = 'translate3d(0,0,0)'; });
        // reposition cards to row
        requestAnimationFrame(()=> {
          const visualRect = document.getElementById('visual').getBoundingClientRect();
          const trackRect = inputTrack.getBoundingClientRect();
          const centerX = trackRect.left + trackRect.width/2 - visualRect.left;
          const y = trackRect.top + trackRect.height/2 - visualRect.top;
          const total = STATE.cardEls.length;
          const spacing = 110;
          const rowWidth = (total - 1) * spacing;
          STATE.cardEls.forEach((c,i)=>{
            const tx = centerX - rowWidth/2 + i * spacing;
            c.style.transform = `translate3d(${tx - (c.getBoundingClientRect().left + c.getBoundingClientRect().width/2 - visualRect.left)}px, ${y - (c.getBoundingClientRect().top + c.getBoundingClientRect().height/2 - visualRect.top)}px, 0)`;
          });
        });
      });

      // Attach handlers
      startBtn.addEventListener('click', async ()=>{
        if(STATE.animating) return;
        // recompute max digits (in case of changes)
        STATE.maxDigits = Math.max(1, ...STATE.values.map(v => v.toString().length));
        digitsLabel.textContent = `${STATE.maxDigits} passes`;
        await animateRadix();
      });
      shuffleBtn.addEventListener('click', shuffle);

      // Initial
      init();

      // Place initial cards nicely in row with spacing by computing transforms
      requestAnimationFrame(()=> {
        const visualRect = document.getElementById('visual').getBoundingClientRect();
        const trackRect = inputTrack.getBoundingClientRect();
        const centerX = trackRect.left + trackRect.width/2 - visualRect.left;
        const y = trackRect.top + trackRect.height/2 - visualRect.top;
        const total = STATE.cardEls.length;
        const spacing = 110;
        const rowWidth = (total - 1) * spacing;
        STATE.cardEls.forEach((c,i)=>{
          const cx = c.getBoundingClientRect().left + c.getBoundingClientRect().width/2 - visualRect.left;
          const cy = c.getBoundingClientRect().top + c.getBoundingClientRect().height/2 - visualRect.top;
          const tx = centerX - rowWidth/2 + i * spacing;
          const dx = tx - cx;
          const dy = y - cy;
          c.style.transform = `translate3d(${dx}px, ${dy}px, 0)`;
        });
      });

    })();
  </script>
</body>
