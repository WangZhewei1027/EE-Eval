<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST API Visual Experience</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0D0E12;
            color: #EAEAEA;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            position: relative;
            animation: fadeIn 2s ease-in-out;
        }
        h1 {
            font-size: 4em;
            margin: 0;
            letter-spacing: 1.5px;
            color: #FFD700;
            text-shadow: 2px 2px 8px rgba(255, 215, 0, 0.5);
            transition: transform 0.5s;
        }
        h1:hover {
            transform: scale(1.05);
        }
        p {
            font-size: 1.5em;
            margin: 20px 0;
            color: #B0BEC5;
            animation: fadeIn 3s ease-in-out;
        }
        .button {
            background-color: #FFD700;
            color: #0D0E12;
            border: none;
            border-radius: 20px;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            outline: none;
            transition: background-color 0.3s ease, transform 0.3s ease;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.2);
        }
        .button:hover {
            background-color: #FFC107;
            transform: translateY(-2px);
        }
        .api-data {
            margin-top: 40px;
            font-size: 1.2em;
            color: #8BC34A;
            transition: opacity 0.5s ease;
            opacity: 0;
        }
        .fadeIn {
            opacity: 1;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Explore REST APIs</h1>
        <p>Beautifully designed interfaces. Seamless data interactions.</p>
        <button class="button" id="fetchButton">Fetch Data</button>
        <div class="api-data" id="apiData">
            <p id="apiContent">API data will appear here...</p>
        </div>
    </div>
    <script>
        document.getElementById('fetchButton').addEventListener('click', function() {
            const apiDataDiv = document.getElementById('apiData');
            const apiContent = document.getElementById('apiContent');
            apiContent.textContent = 'Fetching data from the API...';
            
            // Simulate API fetch with setTimeout
            setTimeout(() => {
                apiContent.textContent = 'Data retrieved: {"message": "Hello, World!", "status": "success"}';
                apiDataDiv.classList.add('fadeIn');
            }, 2000);
        });
    </script>
</body>
</html>
