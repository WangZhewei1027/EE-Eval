<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runtime Environment | Visual Exploration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap');
        
        :root {
            --primary: #3a86ff;
            --secondary: #8338ec;
            --accent: #ff006e;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark);
            color: var(--light);
            overflow-x: hidden;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
            position: relative;
            z-index: 1;
        }
        
        header {
            text-align: center;
            margin-bottom: 4rem;
            position: relative;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1s ease forwards 0.2s;
        }
        
        .subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1s ease forwards 0.4s;
        }
        
        .visualization {
            position: relative;
            height: 500px;
            margin: 4rem 0;
            overflow: hidden;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            transform: scale(0.95);
            animation: fadeInScale 1s ease forwards 0.6s;
        }
        
        .runtime-core {
            position: absolute;
            width: 150px;
            height: 150px;
            background: var(--primary);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 60px rgba(58, 134, 255, 0.4);
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
        }
        
        .module {
            position: absolute;
            width: 80px;
            height: 80px;
            background: var(--secondary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            z-index: 1;
            box-shadow: 0 10px 30px rgba(131, 56, 236, 0.3);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .module:hover {
            transform: scale(1.1) !important;
            box-shadow: 0 15px 40px rgba(131, 56, 236, 0.5);
        }
        
        .connection {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transform-origin: left center;
            z-index: 0;
            transition: var(--transition);
        }
        
        .memory-pool {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            overflow: hidden;
        }
        
        .memory-block {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            margin-right: 10px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .memory-block.active {
            background: var(--accent);
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(255, 0, 110, 0.3);
        }
        
        .controls {
            display: flex;
            justify-content: center;
            margin-top: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease forwards 0.8s;
        }
        
        .btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(58, 134, 255, 0.3);
            margin: 0 1rem;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(58, 134, 255, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            transform-origin: left center;
            animation: progress 8s linear infinite;
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInScale {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes progress {
            0% {
                transform: scaleX(0);
            }
            100% {
                transform: scaleX(1);
            }
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s infinite ease-in-out;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
            }
            50% {
                transform: translateY(-20px) translateX(10px);
            }
        }
        
        footer {
            text-align: center;
            margin-top: 4rem;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Runtime Environment</h1>
            <p class="subtitle">A visual representation of the execution context where programs run, including memory allocation, modules, and system resources.</p>
        </header>
        
        <div class="visualization" id="runtimeViz">
            <div class="runtime-core">Runtime Core</div>
            <div class="memory-pool" id="memoryPool"></div>
            <div class="status-bar"></div>
        </div>
        
        <div class="controls">
            <button class="btn" id="runBtn">Run Process</button>
            <button class="btn btn-secondary" id="resetBtn">Reset</button>
        </div>
    </div>
    
    <footer>
        <p>Visual Exploration of Runtime Environments © 2023</p>
    </footer>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Create particles
            const viz = document.getElementById('runtimeViz');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 6}s`;
                viz.appendChild(particle);
            }
            
            // Create memory blocks
            const memoryPool = document.getElementById('memoryPool');
            for (let i = 0; i < 12; i++) {
                const block = document.createElement('div');
                block.classList.add('memory-block');
                memoryPool.appendChild(block);
            }
            
            // Create modules and connections
            const positions = [
                { top: '20%', left: '20%', name: 'Compiler' },
                { top: '20%', left: '80%', name: 'I/O' },
                { top: '60%', left: '10%', name: 'Security' },
                { top: '60%', left: '90%', name: 'Network' },
                { top: '80%', left: '50%', name: 'Storage' }
            ];
            
            positions.forEach(pos => {
                const module = document.createElement('div');
                module.classList.add('module');
                module.style.top = pos.top;
                module.style.left = pos.left;
                module.textContent = pos.name;
                
                // Connect to core
                const coreRect = document.querySelector('.runtime-core').getBoundingClientRect();
                const moduleRect = { 
                    top: parseFloat(pos.top) * viz.offsetHeight / 100,
                    left: parseFloat(pos.left) * viz.offsetWidth / 100
                };
                
                const coreCenter = {
                    x: coreRect.left - viz.getBoundingClientRect().left + coreRect.width / 2,
                    y: coreRect.top - viz.getBoundingClientRect().top + coreRect.height / 2
                };
                
                const moduleCenter = {
                    x: moduleRect.left,
                    y: moduleRect.top
                };
                
                const length = Math.sqrt(
                    Math.pow(moduleCenter.x - coreCenter.x, 2) + 
                    Math.pow(moduleCenter.y - coreCenter.y, 2)
                );
                
                const angle = Math.atan2(
                    moduleCenter.y - coreCenter.y,
                    moduleCenter.x - coreCenter.x
                );
                
                const connection = document.createElement('div');
                connection.classList.add('connection');
                connection.style.width = `${length}px`;
                connection.style.left = `${coreCenter.x}px`;
                connection.style.top = `${coreCenter.y}px`;
                connection.style.transform = `rotate(${angle}rad)`;
                connection.style.opacity = '0.5';
                
                viz.appendChild(connection);
                viz.appendChild(module);
            });
            
            // Button interactions
            const runBtn = document.getElementById('runBtn');
            const resetBtn = document.getElementById('resetBtn');
            const memoryBlocks = document.querySelectorAll('.memory-block');
            
            runBtn.addEventListener('click', function() {
                // Animate modules
                const modules = document.querySelectorAll('.module');
                modules.forEach((mod, i) => {
                    setTimeout(() => {
                        mod.style.transform = 'scale(1.2)';
                        setTimeout(() => {
                            mod.style.transform = '';
                        }, 500);
                    }, i * 200);
                });
                
                // Animate memory blocks
                memoryBlocks.forEach((block, i) => {
                    setTimeout(() => {
                        block.classList.add('active');
                        setTimeout(() => {
                            block.classList.remove('active');
                        }, 1000);
                    }, i * 150);
                });
                
                // Pulse core
                const core = document.querySelector('.runtime-core');
                core.style.boxShadow = '0 0 80px rgba(58, 134, 255, 0.8)';
                setTimeout(() => {
                    core.style.boxShadow = '0 0 60px rgba(58, 134, 255, 0.4)';
                }, 1000);
            });
            
            resetBtn.addEventListener('click', function() {
                memoryBlocks.forEach(block => {
                    block.classList.remove('active');
                });
                
                const core = document.querySelector('.runtime-core');
                core.style.boxShadow = '0 0 60px rgba(58, 134, 255, 0.4)';
            });
        });
    </script>
</body>
</html>
