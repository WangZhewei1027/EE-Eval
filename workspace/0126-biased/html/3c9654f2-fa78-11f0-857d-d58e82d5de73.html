<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>B+ Tree Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
  /* Reset & base */
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    font-family: 'Poppins', sans-serif;
    color: #e0e6f3;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    user-select: none;
    overflow-x: hidden;
  }

  h1 {
    font-weight: 600;
    font-size: 3.2rem;
    letter-spacing: 0.08em;
    margin: 0 0 0.25rem 0;
    color: #f2f7fe;
    text-shadow:
      2px 2px 6px rgba(42, 82, 152, 0.85),
      0 0 8px rgba(255, 255, 255, 0.3);
  }

  h2 {
    font-weight: 400;
    font-size: 1.25rem;
    color: #c0cde8cc;
    margin: 0 0 2rem 0;
  }

  /* Container */
  #container {
    background: linear-gradient(145deg, #2c4a82, #1d2e61);
    border-radius: 1.25rem;
    box-shadow: 0 0 20px #426cb040 inset, 0 10px 40px rgba(0, 0, 0, 0.8);
    max-width: 1000px;
    width: 100%;
    padding: 2rem 3rem 4rem;
    position: relative;
  }

  /* Controls area */
  #controls {
    text-align: center;
    margin-bottom: 3rem;
  }
  button {
    background: #5878b4;
    border: none;
    color: #d9e1ef;
    font-weight: 600;
    font-size: 1.05rem;
    padding: 0.65rem 1.8rem;
    margin: 0 10px;
    border-radius: 9999px;
    box-shadow:
      0 4px 15px rgba(88, 120, 180, 0.6),
      inset 0 -2px 8px rgba(255, 255, 255, 0.12);
    cursor: pointer;
    user-select: none;
    transition: background 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  button:hover, button:focus {
    outline: none;
    background: #7293d3;
    box-shadow:
      0 6px 26px rgba(114, 147, 211, 0.8),
      inset 0 -3px 12px rgba(255, 255, 255, 0.15);
  }
  button:active {
    transform: translateY(2px);
    box-shadow:
      0 2px 8px rgba(88, 120, 180, 0.4),
      inset 0 0 10px rgba(255, 255, 255, 0.1);
  }

  /* SVG tree container */
  #tree-svg {
    display: block;
    margin: 0 auto;
    max-width: 100%;
    height: 520px;
  }

  /* Node styling */
  .node-group {
    cursor: default;
    filter: drop-shadow(0 6px 6px rgba(0, 8, 32, 0.15));
    transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
  }

  .node-rect {
    fill: url(#nodeGradient);
    stroke: #a3bddc;
    stroke-width: 2;
    rx: 14;
    ry: 14;
    filter: drop-shadow(0 2px 6px rgba(21, 44, 71, 0.3));
    transition: fill 0.3s ease;
  }

  .node-rect.leaf {
    fill: url(#leafGradient);
    stroke: #8dd4c7;
  }

  .node-rect.focused {
    stroke: #ffca3a;
    stroke-width: 3.5;
    filter:
      drop-shadow(0 0 9px #ffc43acc)
      drop-shadow(0 0 14px #ffdea3aa);
  }

  .node-text {
    font-weight: 600;
    fill: #eaf6ffdd;
    font-size: 18px;
    user-select: none;
    pointer-events: none;
    letter-spacing: 0.005em;
    text-shadow:
      0 1px 1px rgba(0,0,0,0.18);
    transition: fill 0.3s ease;
  }

  /* Internal separator lines between keys */
  .sep-line {
    stroke: #718dbf99;
    stroke-width: 2;
  }

  /* Pointer lines */
  .pointer-line {
    stroke: #8a9acbcc;
    stroke-width: 3;
    stroke-linejoin: round;
    stroke-linecap: round;
    transition: stroke 0.3s ease;
  }
  /* Pointer circles */
  .pointer-circle {
    fill: #8a9acbd9;
    stroke: none;
  }

  /* Key highlight animations */
  .key-highlight {
    animation: pulseGlow 2.5s infinite forwards;
  }

  @keyframes pulseGlow {
    0%, 100% {
      fill: #ffca3a;
      filter: drop-shadow(0 0 12px #ffc43a);
    }
    50% {
      fill: #fff5cc;
      filter: none;
    }
  }

  /* Footer text */
  footer {
    margin-top: 4rem;
    font-size: 0.9rem;
    color: #aab6fb90;
    user-select: none;
  }

  /* Responsive tweaks */
  @media (max-width: 600px) {
    #container {
      padding: 1.5rem 1.75rem 3rem;
    }
    h1 {
      font-size: 2.4rem;
    }
    h2 {
      font-size: 1rem;
      margin-bottom: 1.25rem;
    }
    #tree-svg {
      height: 350px;
    }
  }
</style>
</head>
<body>
  <h1>B+ Tree</h1>
  <h2>Data Structure Visualization — Observe the layered elegance</h2>
  <div id="container" role="main" aria-label="B Plus Tree Visualization">
    <div id="controls" aria-label="Controls to highlight keys">
      <button id="highlightRoot" aria-pressed="false" aria-label="Highlight root keys">Highlight Root Keys</button>
      <button id="highlightLeaves" aria-pressed="false" aria-label="Highlight leaf keys">Highlight Leaf Keys</button>
    </div>
    <svg id="tree-svg" viewBox="0 0 1000 520" aria-hidden="true" role="img" focusable="false">
      <defs>
        <!-- Gradient for internal nodes -->
        <linearGradient id="nodeGradient" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4070d5"/>
          <stop offset="100%" stop-color="#2a3c79"/>
        </linearGradient>
        <!-- Gradient for leaf nodes -->
        <linearGradient id="leafGradient" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4ecdc4"/>
          <stop offset="100%" stop-color="#379a99"/>
        </linearGradient>
        <!-- Glow filter for emphasis -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%" >
          <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#ffca3a" flood-opacity="0.8"/>
        </filter>
      </defs>
      <!-- Tree structure -->

      <!-- Root Node -->
      <g class="node-group root" transform="translate(400,80)">
        <rect class="node-rect" width="200" height="56" />
        <!-- Keys -->
        <!-- 3 keys: 17 | 35 | 66 -->
        <text class="node-text" x="25" y="36">17</text>
        <line class="sep-line" x1="70" y1="8" x2="70" y2="48" />
        <text class="node-text" x="94" y="36">35</text>
        <line class="sep-line" x1="140" y1="8" x2="140" y2="48" />
        <text class="node-text" x="165" y="36">66</text>
      </g>

      <!-- Level 1 internal nodes -->
      <!-- Left node -->
      <g class="node-group internal" transform="translate(145,190)">
        <rect class="node-rect" width="160" height="48" />
        <!-- Keys: 5 | 12 -->
        <text class="node-text" x="20" y="30">5</text>
        <line class="sep-line" x1="65" y1="6" x2="65" y2="42" />
        <text class="node-text" x="95" y="30">12</text>
      </g>

      <!-- Middle node -->
      <g class="node-group internal" transform="translate(400,190)">
        <rect class="node-rect" width="140" height="48" />
        <!-- Keys: 40 | 49 -->
        <text class="node-text" x="20" y="30">40</text>
        <line class="sep-line" x1="65" y1="6" x2="65" y2="42" />
        <text class="node-text" x="95" y="30">49</text>
      </g>

      <!-- Right node -->
      <g class="node-group internal" transform="translate(670,190)">
        <rect class="node-rect" width="130" height="48" />
        <!-- Keys: 72 | 93 -->
        <text class="node-text" x="20" y="30">72</text>
        <line class="sep-line" x1="65" y1="6" x2="65" y2="42" />
        <text class="node-text" x="95" y="30">93</text>
      </g>

      <!-- Level 2 leaf nodes -->
      <!-- L1 leaf nodes on left -->
      <g class="node-group leaf" transform="translate(40,310)">
        <rect class="node-rect leaf" width="160" height="52" />
        <!-- Keys: 1 | 3 | 4 -->
        <text class="node-text" x="20" y="34">1</text>
        <line class="sep-line" x1="50" y1="10" x2="50" y2="42" />
        <text class="node-text" x="75" y="34">3</text>
        <line class="sep-line" x1="110" y1="10" x2="110" y2="42" />
        <text class="node-text" x="135" y="34">4</text>
        <!-- Next leaf pointer circle right side -->
        <circle class="pointer-circle" cx="160" cy="26" r="7" />
      </g>

      <g class="node-group leaf" transform="translate(220,310)">
        <rect class="node-rect leaf" width="160" height="52" />
        <!-- Keys: 6 | 10 | 15 -->
        <text class="node-text" x="20" y="34">6</text>
        <line class="sep-line" x1="53" y1="10" x2="53" y2="42" />
        <text class="node-text" x="80" y="34">10</text>
        <line class="sep-line" x1="115" y1="10" x2="115" y2="42" />
        <text class="node-text" x="140" y="34">15</text>
        <circle class="pointer-circle" cx="160" cy="26" r="7" />
      </g>

      <!-- Middle leaf nodes -->
      <g class="node-group leaf" transform="translate(365,310)">
        <rect class="node-rect leaf" width="140" height="52" />
        <!-- Keys: 36 | 38 -->
        <text class="node-text" x="20" y="34">36</text>
        <line class="sep-line" x1="65" y1="10" x2="65" y2="42" />
        <text class="node-text" x="95" y="34">38</text>
        <circle class="pointer-circle" cx="140" cy="26" r="7" />
      </g>

      <g class="node-group leaf" transform="translate(515,310)">
        <rect class="node-rect leaf" width="150" height="52" />
        <!-- Keys: 41 | 44 | 47 -->
        <text class="node-text" x="20" y="34">41</text>
        <line class="sep-line" x1="53" y1="10" x2="53" y2="42" />
        <text class="node-text" x="80" y="34">44</text>
        <line class="sep-line" x1="115" y1="10" x2="115" y2="42" />
        <text class="node-text" x="140" y="34">47</text>
        <circle class="pointer-circle" cx="150" cy="26" r="7" />
      </g>

      <!-- Right leaf nodes -->
      <g class="node-group leaf" transform="translate(655,310)">
        <rect class="node-rect leaf" width="130" height="52" />
        <!-- Keys: 69 | 71 -->
        <text class="node-text" x="20" y="34">69</text>
        <line class="sep-line" x1="67" y1="10" x2="67" y2="42" />
        <text class="node-text" x="100" y="34">71</text>
        <circle class="pointer-circle" cx="130" cy="26" r="7" />
      </g>

      <g class="node-group leaf" transform="translate(800,310)">
        <rect class="node-rect leaf" width="160" height="52" />
        <!-- Keys: 75 | 88 | 90 | 95 -->
        <text class="node-text" x="20" y="34">75</text>
        <line class="sep-line" x1="48" y1="10" x2="48" y2="42" />
        <text class="node-text" x="70" y="34">88</text>
        <line class="sep-line" x1="100" y1="10" x2="100" y2="42" />
        <text class="node-text" x="125" y="34">90</text>
        <line class="sep-line" x1="145" y1="10" x2="145" y2="42" />
        <text class="node-text" x="155" y="34">95</text>
        <circle class="pointer-circle" cx="160" cy="26" r="7" />
      </g>

      <!-- Pointer lines from root to level 1 -->
      <line class="pointer-line" x1="400" y1="136" x2="220" y2="190" />
      <line class="pointer-line" x1="460" y1="136" x2="470" y2="190" />
      <line class="pointer-line" x1="600" y1="136" x2="735" y2="190" />

      <!-- Pointer lines from level 1 to leaf nodes -->
      <line class="pointer-line" x1="165" y1="238" x2="120" y2="310" />
      <line class="pointer-line" x1="250" y1="238" x2="300" y2="310" />

      <line class="pointer-line" x1="435" y1="238" x2="435" y2="310" />
      <line class="pointer-line" x1="490" y1="238" x2="575" y2="310" />

      <line class="pointer-line" x1="740" y1="238" x2="720" y2="310" />
      <line class="pointer-line" x1="785" y1="238" x2="875" y2="310" />
    </svg>
  </div>
  <footer>Designed &amp; coded with elegance by AI — B+ Tree Concept Demonstration</footer>

<script>
  (() => {
    const highlightRootBtn = document.getElementById('highlightRoot');
    const highlightLeavesBtn = document.getElementById('highlightLeaves');

    // Select root keys (texts inside root node)
    const rootNode = document.querySelector('.node-group.root');
    const rootKeys = rootNode ? rootNode.querySelectorAll('text.node-text') : [];

    // Select leaf nodes (node-rect.leaf) and their keys
    const leafNodes = document.querySelectorAll('.node-group.leaf');
    const leafKeys = [];
    leafNodes.forEach(leaf => {
      leafKeys.push(...leaf.querySelectorAll('text.node-text'));
    });

    // Helpers
    function toggleHighlight(elements, enabled) {
      elements.forEach(el => {
        if (enabled) {
          el.classList.add('key-highlight');
        } else {
          el.classList.remove('key-highlight');
        }
      });
    }

    // States
    let rootHighlighted = false;
    let leavesHighlighted = false;

    highlightRootBtn.addEventListener('click', () => {
      rootHighlighted = !rootHighlighted;
      highlightRootBtn.setAttribute('aria-pressed', rootHighlighted);
      toggleHighlight(rootKeys, rootHighlighted);
      if (rootHighlighted) {
        // If root highlighted, dehighlight leaves for clarity
        leavesHighlighted = false;
        highlightLeavesBtn.setAttribute('aria-pressed', 'false');
        toggleHighlight(leafKeys, false);
      }
    });

    highlightLeavesBtn.addEventListener('click', () => {
      leavesHighlighted = !leavesHighlighted;
      highlightLeavesBtn.setAttribute('aria-pressed', leavesHighlighted);
      toggleHighlight(leafKeys, leavesHighlighted);
      if (leavesHighlighted) {
        // If leaves highlighted, dehighlight root for clarity
        rootHighlighted = false;
        highlightRootBtn.setAttribute('aria-pressed', 'false');
        toggleHighlight(rootKeys, false);
      }
    });
  })();
</script>
</body>
</html>
