<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Tree Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        #tree {
            position: relative;
            height: 500px;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .node {
            width: 60px;
            height: 60px;
            background: #3a7bd5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            position: absolute;
            transition: transform 0.3s ease;
        }
        .line {
            position: absolute;
            height: 2px;
            background: #aaa;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <h1>Binary Tree Visualization</h1>
    <div id="tree"></div>
    <button id="animateBtn">Animate Tree</button>

    <script>
        const tree = document.getElementById("tree");
        const animateBtn = document.getElementById("animateBtn");
        let animated = false;

        function createNode(value, x, y) {
            const node = document.createElement("div");
            node.className = "node";
            node.innerHTML = value;
            node.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
            return node;
        }

        function createLine(x1, y1, x2, y2) {
            const line = document.createElement("div");
            line.className = "line";
            const x = Math.min(x1, x2) + Math.abs(x2 - x1) / 2;
            const y = Math.min(y1, y2) + Math.abs(y2 - y1) / 2;
            line.style.left = `${x}px`;
            line.style.top = `${y}px`;
            line.style.width = `${Math.abs(x2 - x1)}px`;
            line.style.transform = `translate(-50%, -50%) rotate(${Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI}deg)`;
            return line;
        }

        function drawTree() {
            const nodesData = [
                { value: '1', x: 400, y: 50 },
                { value: '2', x: 200, y: 150 },
                { value: '3', x: 600, y: 150 },
                { value: '4', x: 100, y: 250 },
                { value: '5', x: 300, y: 250 },
                { value: '6', x: 500, y: 250 },
                { value: '7', x: 700, y: 250 }
            ];

            nodesData.forEach(nodeData => {
                const node = createNode(nodeData.value, nodeData.x, nodeData.y);
                tree.appendChild(node);
            });

            const edges = [
                { from: { x: 400, y: 50 }, to: { x: 200, y: 150 } },
                { from: { x: 400, y: 50 }, to: { x: 600, y: 150 } },
                { from: { x: 200, y: 150 }, to: { x: 100, y: 250 } },
                { from: { x: 200, y: 150 }, to: { x: 300, y: 250 } },
                { from: { x: 600, y: 150 }, to: { x: 500, y: 250 } },
                { from: { x: 600, y: 150 }, to: { x: 700, y: 250 } }
            ];

            edges.forEach(edge => {
                const line = createLine(edge.from.x, edge.from.y, edge.to.x, edge.to.y);
                tree.appendChild(line);
            });
        }

        animateBtn.addEventListener("click", () => {
            if (!animated) {
                tree.style.transform = "translateY(-10px)";
                setTimeout(() => {
                    tree.style.transform = "translateY(10px)";
                }, 200);
                setTimeout(() => {
                    tree.style.transform = "translateY(0)";
                }, 400);
                animated = true;
            } else {
                alert("Animation already played!");
            }
        });

        drawTree();

    </script>
</body>
</html>
