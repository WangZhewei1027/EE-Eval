<!DOCTYPE html>
<html>
<head>
    <title>Git</title>
    <style>
        body {
            font-family: monospace;
            background-color: white;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px;
            border: 1px solid black;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>

<h1>Git</h1>

<div id="input1" class="error"></div>
<input id="input1" type="text" placeholder="Git Input 1" oninput="updateError1()">
<div id="input2" class="error"></div>
<input id="input2" type="text" placeholder="Git Input 2" oninput="updateError2()">
<button id="add">Add</button>
<div id="output1"></div>
<div id="output2"></div>

<script>
    let errors = [];

    function updateError1() {
        errors[0] = "Error 1";
        document.getElementById("output1").innerHTML = "Error 1: " + errors[0];
    }

    function updateError2() {
        errors[1] = "Error 2";
        document.getElementById("output2").innerHTML = "Error 2: " + errors[1];
    }

    document.getElementById("add").addEventListener("click", function() {
        if (errors.length === 0) {
            errors.push("Success");
            document.getElementById("output1").innerHTML = "Success: " + errors[0];
            document.getElementById("output2").innerHTML = "Success: " + errors[1];
        } else {
            alert("Error: " + errors[0]);
        }
    });

    document.getElementById("input1").addEventListener("input", function() {
        updateError1();
    });

    document.getElementById("input2").addEventListener("input", function() {
        updateError2();
    });
</script>

</body>
</html>
