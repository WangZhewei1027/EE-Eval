<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Query Optimization – Visual Concept</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

  /* Reset */
  *, *::before, *::after {
    box-sizing: border-box;
  } 

  body {
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Inter', sans-serif;
    color: #e6ebf1;
    overflow-x: hidden;
    user-select: none;
  }

  h1 {
    font-weight: 600;
    font-size: 3.5rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin: 2rem 0 0.25rem 0;
    text-align: center;
    color: #a8d0ff;
    text-shadow:
      0 0 8px #a8d0ff, 
      0 0 25px #3a78ff;
  }

  h2 {
    font-weight: 400;
    font-size: 1.25rem;
    color: #9ab8d9bb;
    text-align: center;
    margin: 0 0 3rem 0;
    letter-spacing: 0.04em;
  }

  main {
    max-width: 960px;
    margin: auto;
    padding: 0 1rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Container of visualization */
  .visualization {
    position: relative;
    width: 900px;
    max-width: 90vw;
    height: 600px;
    background:
      radial-gradient(ellipse at center, #1a3146 30%, transparent 70%),
      linear-gradient(45deg, #16293b 0%, #1b3554 100%);
    border-radius: 1.25rem;
    box-shadow:
      0 20px 40px rgba(10, 26, 43, 0.9),
      inset 0 0 60px #274a7c,
      inset 0 -10px 40px #1a2b41;
    overflow: visible;
    user-select: none;
  }

  /* Flow container */
  .flow {
    position: absolute;
    top: 50px;
    left: 50px;
    right: 50px;
    bottom: 50px;
    pointer-events: none;
  }

  /* Query Input */
  .query-input {
    position: absolute;
    top: 40px;
    left: 60px;
    width: 180px;
    height: 100px;
    background: #1e3a68e0;
    border-radius: 14px;
    box-shadow: 
      0 0 8px #5584ffaa,
      inset 0 0 10px #446eace0;
    border: 2px solid #4a77d1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #a8c1ff;
    font-weight: 600;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    text-align: center;
    user-select: none;
  }
  .query-input span {
    font-size: 1.8rem;
    margin-bottom: 0.35rem;
    color: #83aaffdb;
  }
  /* Parse stage */
  .parse-stage {
    position: absolute;
    top: 200px;
    left: 60px;
    width: 180px;
    height: 90px;
    background: #222f54cc;
    border-radius: 14px;
    box-shadow:
      0 0 15px #4867b9cc,
      inset 0 2px 10px #1e2a4ecc;
    border: 2px solid #3e57a8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #7da5f3;
    font-weight: 600;
    font-size: 1.1rem;
    letter-spacing: 0.04em;
    text-align: center;
    user-select: none;
  }

  /* Optimization stage */
  .opt-stage {
    position: absolute;
    top: 200px;
    left: calc(50% - 90px);
    width: 180px;
    height: 90px;
    background: #27486eee;
    border-radius: 14px;
    box-shadow:
      0 0 20px #5d93ffcc,
      inset 0 0 15px #3d6ca2cc;
    border: 2px solid #6fb0ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #a2c5ff;
    font-weight: 700;
    font-size: 1.2rem;
    letter-spacing: 0.04em;
    text-align: center;
    user-select: none;
    filter: drop-shadow(0 0 10px #6fb0ff99);
  }

  /* Plan generation */
  .plan-stage {
    position: absolute;
    top: 200px;
    right: 60px;
    width: 180px;
    height: 90px;
    background: #1a2b4aee;
    border-radius: 14px;
    box-shadow:
      0 0 15px #4472adcc,
      inset 0 0 14px #2a4478cc;
    border: 2px solid #4c7bc1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #91afff;
    font-weight: 600;
    font-size: 1.1rem;
    letter-spacing: 0.04em;
    text-align: center;
    user-select: none;
  }

  /* Execution stage */
  .exec-stage {
    position: absolute;
    bottom: 60px;
    left: calc(50% - 90px);
    width: 180px;
    height: 100px;
    background: #0f316fdd;
    border-radius: 14px;
    box-shadow:
      0 0 30px #2d65e0cc,
      inset 0 4px 15px #134b8ecc;
    border: 2px solid #4b7de2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #97bcff;
    font-weight: 700;
    font-size: 1.3rem;
    letter-spacing: 0.06em;
    text-align: center;
    user-select: none;
  }

  /* Arrows - animated */

  svg {
    position: absolute;
    pointer-events: none;
    overflow: visible;
  }

  /* Arrow lines */
  .arrow-line {
    stroke: #6ea2ffcc;
    stroke-width: 3;
    stroke-linecap: round;
    filter: drop-shadow(0 0 2px #5493ff99);
    animation: dashmove 2.5s linear infinite;
  }

  .arrow-head {
    fill: #7db3ffdd;
    filter: drop-shadow(0 0 3px #7db3ffbb);
    transition: fill 0.35s ease;
  }

  /* Animate dashed line */
  @keyframes dashmove {
    to {
      stroke-dashoffset: -20;
    }
  }

  /* Hover arrow highlight on optimize stage button hover */
  #btnOptimize:hover ~ .flow svg .arrow-line,
  #btnOptimize:hover ~ .flow svg .arrow-head {
    stroke: #a4c8ff;
    fill: #b3d0ff;
    animation-play-state: paused;
  }

  /* Pulsing glow effect */
  .pulse-glow {
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% {
      filter: drop-shadow(0 0 15px #6fb0ffcc);
    }
    50% {
      filter: drop-shadow(0 0 30px #a4c8ffdd);
    }
  }

  /* Control Buttons container */
  .controls {
    margin-top: 1.75rem;
    display: flex;
    gap: 1.1rem;
    justify-content: center;
  }
  button {
    background: #1e3a68cc;
    border: 2.5px solid #4c7bc1;
    color: #a8c1ffdd;
    font-weight: 600;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    padding: 0.55rem 2.25rem;
    border-radius: 12px;
    cursor: pointer;
    user-select: none;
    transition:
      background 0.4s ease,
      border-color 0.3s ease,
      color 0.35s ease,
      box-shadow 0.7s ease;
    box-shadow: 0 0 12px #4c7bc1aa;
  }
  button:hover {
    background: #4c86f7ee;
    border-color: #91b2ffcc;
    color: #e3ecff;
    box-shadow: 0 0 22px #a4c8ff99;
  }
  button:active {
    background: #2d548dee;
    border-color: #5c89ffcc;
    box-shadow: 0 0 12px #5eb3ffbb;
  }
  button:focus-visible {
    outline-offset: 2.5px;
    outline: 2.7px solid #95b4ffcc;
  }

  /* Tooltip */
  .tooltip {
    position: absolute;
    top: -0.85rem;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: #b1cfffdd;
    user-select: none;
    pointer-events: none;
    text-shadow: 0 0 6px #000000cc;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  button[data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    top: -2.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: #274f94dd;
    padding: 0.35rem 1rem;
    border-radius: 10px;
    color: #e0ebffdd;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    pointer-events: none;
    opacity: 1;
    white-space: nowrap;
    box-shadow: 0 0 12px #2f63c8cc;
    transition: opacity 0.35s ease;
  }

  /* Small subtle shine on stage boxes */
  .stage-shine {
    position: absolute;
    top: 8px;
    left: -10px;
    width: 60px;
    height: 150%;
    background: linear-gradient(130deg, #9fc5ff44 0%, transparent 80%);
    border-radius: 15px;
    opacity: 0.15;
    pointer-events: none;
    mix-blend-mode: screen;
    animation: shineMove 6s linear infinite;
  }
  .parse-stage > .stage-shine {
    animation-delay: 0s;
  }
  .opt-stage > .stage-shine {
    animation-delay: 1.5s;
  }
  .plan-stage > .stage-shine {
    animation-delay: 3s;
  }
  .query-input > .stage-shine {
    animation-delay: 4.2s;
  }
  .exec-stage > .stage-shine {
    animation-delay: 5s;
  }
  @keyframes shineMove {
    0% {
      transform: translateX(-100%) skewX(-15deg);
      opacity: 0.15;
    }
    50% {
      opacity: 0.35;
    }
    100% {
      transform: translateX(150%) skewX(-15deg);
      opacity: 0.15;
    }
  }

  /* Subtle floating animation for optimization stage */
  .opt-stage.pulse-glow {
    animation: pulse 3.5s ease-in-out infinite;
  }
  .opt-stage.float {
    animation: floatUpDown 4s ease-in-out infinite;
  }
  @keyframes floatUpDown {
    0%, 100% {
      transform: translateY(0);
      filter: drop-shadow(0 0 13px #6fb0ffcc);
    }
    50% {
      transform: translateY(-8px);
      filter: drop-shadow(0 0 30px #a4c8ffdd);
    }
  }

  /* Footer text */
  footer {
    text-align: center;
    font-size: 0.85rem;
    margin: 3rem 1rem 2rem;
    color: #5d7abfaa;
    font-weight: 500;
    letter-spacing: 0.06em;
  }

  /* Responsive adjustments */
  @media (max-width: 620px) {
    h1 {
      font-size: 2.4rem;
    }
    h2 {
      font-size: 1rem;
    }
    .visualization {
      height: 480px;
    }
    .query-input,
    .parse-stage,
    .opt-stage,
    .plan-stage,
    .exec-stage {
      width: 140px !important;
      height: 75px !important;
      font-size: 1rem !important;
    }
    main {
      padding-bottom: 2rem;
    }
    .exec-stage {
      height: 85px !important;
    }
  }
</style>
</head>
<body>
<main>
  <h1>Query Optimization</h1>
  <h2>Visualizing the flow of query transformation & execution</h2>

  <section class="visualization" aria-label="Query optimization flow diagram">
    <div class="flow" aria-hidden="true">

      <!-- Query Input Block -->
      <div class="query-input" id="queryInput">
        <div class="stage-shine"></div>
        <span>SELECT</span>
        query text
      </div>

      <!-- Parsing Stage -->
      <div class="parse-stage" id="parseStage">
        <div class="stage-shine"></div>
        <span>Parsing</span>
        &amp; Syntax Check
      </div>

      <!-- Optimization Stage -->
      <div class="opt-stage pulse-glow float" id="optimizeStage" tabindex="0" aria-describedby="optStageDesc">
        <div class="stage-shine"></div>
        <span>Query</span>
        <br />
        <strong>Optimization</strong>
        <br />
        <small id="optStageDesc" style="font-weight:400; font-size:80%; color:#7ea3dfff;letter-spacing:0.02em;">
          Analyze & improve plan
        </small>
      </div>

      <!-- Plan Generation Stage -->
      <div class="plan-stage" id="planStage">
        <div class="stage-shine"></div>
        <span>Plan</span>
        <br />
        Generation
      </div>

      <!-- Execution Stage -->
      <div class="exec-stage" id="execStage">
        <div class="stage-shine"></div>
        <span>Execution</span>
        <br />
        Result Returned
      </div>

      <!-- Arrows connecting boxes -->
      <svg width="800" height="540" style="top: 30px; left: 50px;" >
        <!-- Query Input → Parsing -->
        <line class="arrow-line" x1="180" y1="80" x2="180" y2="185" stroke-dasharray="10 10" />
        <polygon class="arrow-head" points="176,185 184,185 180,195" />

        <!-- Parsing → Optimization -->
        <line class="arrow-line" x1="240" y1="240" x2="380" y2="240" stroke-dasharray="12 10" />
        <polygon class="arrow-head" points="380,236 390,240 380,244" />

        <!-- Optimization → Plan -->
        <line class="arrow-line" x1="560" y1="240" x2="700" y2="240" stroke-dasharray="12 10" />
        <polygon class="arrow-head" points="700,236 710,240 700,244" />

        <!-- Plan → Execution -->
        <line class="arrow-line" x1="620" y1="290" x2="450" y2="460" stroke-dasharray="10 10" />
        <polygon class="arrow-head" points="455,460 446,468 455,471" />

        <!-- Optimization → Execution (Direct Improvement) -->
        <line class="arrow-line" x1="470" y1="240" x2="470" y2="430" stroke-dasharray="6 8" stroke-opacity="0.55" />
        <polygon class="arrow-head" points="466,430 474,430 470,440" fill="#7db3ff80" />
      </svg>
    </div>

    <div class="controls" aria-label="Control buttons for query optimization visualization">
      <button id="btnOptimize" data-tooltip="Emphasize Optimization Stage">Highlight Optimize</button>
      <button id="btnReset" data-tooltip="Reset Visualization">Reset</button>
    </div>
  </section>
</main>

<footer>
  &copy; 2024 • Conceptual Visualization by ChatGPT &nbsp;&bull;&nbsp; Query Optimization Flow
</footer>

<script>
  (() => {
    const btnOptimize = document.getElementById('btnOptimize');
    const btnReset = document.getElementById('btnReset');
    const optimizeStage = document.getElementById('optimizeStage');

    btnOptimize.addEventListener('click', () => {
      // Toggle strong highlight animation to emphasize optimization stage
      if (optimizeStage.classList.contains('highlighted')) {
        optimizeStage.classList.remove('highlighted');
        optimizeStage.style.filter = '';
        optimizeStage.style.transition = 'filter 1.5s ease';
      } else {
        optimizeStage.classList.add('highlighted');
        optimizeStage.style.filter = 'drop-shadow(0 0 20px #2878ffcc) brightness(1.3)';
        optimizeStage.style.transition = 'filter 1.5s ease';
      }
    });

    btnReset.addEventListener('click', () => {
      optimizeStage.classList.remove('highlighted');
      optimizeStage.style.filter = '';
      optimizeStage.style.transition = 'filter 1.5s ease';
    });

    // Accessibility: Allow keyboard focus for optimization box, gently bounce on focus
    optimizeStage.addEventListener('focus', () => {
      optimizeStage.style.animationPlayState = 'paused';
      optimizeStage.style.filter = 'drop-shadow(0 0 30px #75aaffcc) brightness(1.3)';
    });
    optimizeStage.addEventListener('blur', () => {
      optimizeStage.style.animationPlayState = '';
      optimizeStage.style.filter = '';
    });
  })();
</script>
</body>
</html>
