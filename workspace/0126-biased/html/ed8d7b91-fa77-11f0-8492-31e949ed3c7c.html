<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Sort Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: #4A90E2;
            margin-bottom: 20px;
        }

        .bars {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 300px;
            width: 80%;
            border: 2px solid #4A90E2;
            border-radius: 10px;
            overflow: hidden;
        }

        .bar {
            width: calc(100% / 10);
            background-color: #6BBF59;
            margin: 0 1px;
            transition: height 0.5s ease, background-color 0.5s ease;
        }

        .bar-sorted {
            background-color: #FF6F61;
        }

        .button {
            background-color: #4A90E2;
            color: white;
            padding: 15px 30px;
            margin-top: 20px;
            border: none;
            border-radius: 5px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #2A6F95;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Counting Sort Visualization</h1>
        <div class="bars" id="barsContainer"></div>
        <button class="button" id="startButton">Start Sorting</button>
    </div>

    <script>
        const barsContainer = document.getElementById('barsContainer');
        const startButton = document.getElementById('startButton');

        // Example input array
        const inputArray = [3, 6, 4, 8, 1, 3, 9, 5, 2, 7];

        function renderBars(array, sortedIndex = -1) {
            barsContainer.innerHTML = '';
            for (let i = 0; i < array.length; i++) {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = (array[i] * 30) + 'px';
                if (i <= sortedIndex) {
                    bar.classList.add('bar-sorted');
                }
                barsContainer.appendChild(bar);
            }
        }

        function countingSort(array) {
            let maxVal = Math.max(...array);
            let count = new Array(maxVal + 1).fill(0);
            let sortedIndex = -1;

            // Count occurrences
            for (let num of array) {
                count[num]++;
            }

            // Update original array
            for (let i = 0; i <= maxVal; i++) {
                while (count[i] > 0) {
                    sortedIndex++;
                    array[sortedIndex] = i;
                    count[i]--;

                    // Render bars for each step
                    renderBars(array, sortedIndex);
                }
            }
        }

        startButton.onclick = () => {
            renderBars([...inputArray]); // Render initial bars
            countingSort([...inputArray]); // Start sorting after rendering
        };
    </script>
</body>
</html>
