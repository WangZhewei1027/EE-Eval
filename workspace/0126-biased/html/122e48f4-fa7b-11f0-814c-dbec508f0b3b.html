<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backpropagation</title>
    <style>
        body {
            font-family: monospace;
        }
        input, select, button {
            margin: 0;
            padding: 0;
            border: none;
            width: 100%;
            height: 30px;
            font-size: 16px;
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        input, select, button {
            cursor: pointer;
        }
        .button-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .button {
            width: 20%;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="button-container">
        <button class="button" onclick="backpropagation()">Backpropagation</button>
        <button class="button" onclick="maximization()">Maximization</button>
        <button class="button" onclick="exploration()">Exploration</button>
        <button class="button" onclick="complexity()">Complexity</button>
        <button class="button" onclick="interactivity()">Interactivity</button>
        <button class="button" onclick="results()">Results</button>
    </div>
    <div id="results"></div>

    <script>
        function backpropagation() {
            const inputs = document.querySelectorAll('input, select, button');
            const results = document.getElementById('results');
            const outputs = document.getElementById('outputs');

            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    const value = input.value;
                    outputs.textContent = value;
                    results.textContent = 'Value: ' + value;
                });
            });
        }

        function maximization() {
            const inputs = document.querySelectorAll('input, select, button');
            const results = document.getElementById('results');
            const outputs = document.getElementById('outputs');

            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    const value = input.value;
                    outputs.textContent = value;
                    results.textContent = 'Value: ' + value;
                });
            });
        }

        function exploration() {
            const inputs = document.querySelectorAll('input, select, button');
            const results = document.getElementById('results');
            const outputs = document.getElementById('outputs');

            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    const value = input.value;
                    outputs.textContent = value;
                    results.textContent = 'Value: ' + value;
                });
            });
        }

        function complexity() {
            const inputs = document.querySelectorAll('input, select, button');
            const results = document.getElementById('results');
            const outputs = document.getElementById('outputs');

            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    const value = input.value;
                    outputs.textContent = value;
                    results.textContent = 'Value: ' + value;
                });
            });
        }

        function interaction() {
            const inputs = document.querySelectorAll('input, select, button');
            const results = document.getElementById('results');
            const outputs = document.getElementById('outputs');

            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    const value = input.value;
                    outputs.textContent = value;
                    results.textContent = 'Value: ' + value;
                });
            });
        }

        function results() {
            const inputs = document.querySelectorAll('input, select, button');
            const outputs = document.getElementById('outputs');

            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    const value = input.value;
                    outputs.textContent = value;
                });
            });
        }
    </script>
</body>
</html>
