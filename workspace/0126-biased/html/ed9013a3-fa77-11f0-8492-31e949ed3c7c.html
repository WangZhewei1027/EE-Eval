<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistic Regression Visualizer</title>
    <style>
        body {
            background: linear-gradient(to right, #283E51, #0A2342);
            color: #fff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            background-color: rgba(10, 35, 66, 0.9);
            border-radius: 15px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 0.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        p {
            font-size: 1.2em;
            margin-bottom: 1.5em;
            line-height: 1.5em;
        }

        .chart {
            width: 100%;
            height: 300px;
            background: url('https://i.imgur.com/C2UToQA.png') no-repeat center;
            background-size: cover;
            border: 2px solid #fff;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            animation: slideIn 1s ease-in-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .hide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 1s;
        }

        .show {
            opacity: 1;
        }

        button {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #00BFFF;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            outline: none;
            margin-top: 20px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #1E90FF;
        }

        footer {
            margin-top: 30px;
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Logistic Regression Visualizer</h1>
        <p>Observe how logistic regression classifies data points with a sigmoid curve.</p>
        <div class="chart" id="chart">
            <div class="hide" id="overlay">Data classification in progress...</div>
        </div>
        <button id="showDataButton">Show Data</button>
        <footer>© 2023 Logistic Regression Visualization Project</footer>
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        const showDataButton = document.getElementById('showDataButton');

        showDataButton.addEventListener('click', () => {
            overlay.classList.toggle('show');
            if (overlay.classList.contains('show')) {
                showDataButton.textContent = 'Hide Data';
            } else {
                showDataButton.textContent = 'Show Data';
            }
        });
    </script>
</body>

</html>
