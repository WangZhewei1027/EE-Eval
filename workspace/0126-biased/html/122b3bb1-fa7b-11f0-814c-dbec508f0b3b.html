<!DOCTYPE html>
<html>
<head>
    <title>Heap (Min)</title>
    <style>
        body {
            background-color: #f0f0f0;
        }
        #container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #controls {
            margin-bottom: 20px;
        }
        button, input {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover, input:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <div id="container">
        <h2>Heap (Min)</h2>
        <div id="controls">
            <button id="min-btn">Min</button>
            <button id="max-btn">Max</button>
            <button id="reset-btn">Reset</button>
            <input id="size-input" type="number" value="5">
            <label for="size-input">Size:</label>
            <input id="data-input" type="text" placeholder="Enter data">
            <button id="add-btn">Add</button>
            <button id="clear-btn">Clear</button>
        </div>
        <div id="data-container"></div>
        <div id="output-container"></div>
    </div>

    <script>
        let heap = null;
        let size = 5;
        let data = [];
        let output = [];

        const minBtn = document.getElementById('min-btn');
        const maxBtn = document.getElementById('max-btn');
        const resetBtn = document.getElementById('reset-btn');
        const sizeInput = document.getElementById('size-input');
        const dataInput = document.getElementById('data-input');
        const addBtn = document.getElementById('add-btn');
        const clearBtn = document.getElementById('clear-btn');

        minBtn.addEventListener('click', () => {
            heap = new MinHeap(size);
            addBtn.disabled = true;
            clearBtn.disabled = true;
        });

        maxBtn.addEventListener('click', () => {
            heap = new MaxHeap(size);
            addBtn.disabled = false;
            clearBtn.disabled = false;
        });

        sizeInput.addEventListener('input', () => {
            size = parseInt(sizeInput.value);
        });

        dataInput.addEventListener('input', () => {
            data = JSON.parse(dataInput.value);
        });

        addBtn.addEventListener('click', () => {
            heap = new MinHeap(size);
            addBtn.disabled = true;
            clearBtn.disabled = true;
            data.push(...dataInput.value.split(',').map(x => parseInt(x)));
        });

        clearBtn.addEventListener('click', () => {
            heap = new MinHeap(size);
            data = [];
            output = [];
            addBtn.disabled = false;
            clearBtn.disabled = true;
        });

        function printHeap() {
            output.push(JSON.stringify(heap));
            document.getElementById('output-container').innerHTML = output.join('\n');
        }

        function printData() {
            output.push(JSON.stringify(data));
            document.getElementById('data-container').innerHTML = output.join('\n');
        }

        function updateOutput() {
            printHeap();
            printData();
        }

        function updateOutputData() {
            document.getElementById('output-container').innerHTML = output.join('\n');
        }

        addBtn.addEventListener('click', updateOutputData);
        clearBtn.addEventListener('click', updateOutputData);

        function updateHeap() {
            heap = new MinHeap(size);
            updateOutput();
        }

        function updateMaxHeap() {
            heap = new MaxHeap(size);
            updateOutput();
        }

        function updateMinHeap() {
            heap = new MinHeap(size);
            updateOutput();
        }
    </script>
</body>
</html>
