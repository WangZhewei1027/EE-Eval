<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Insertion Sort Visualization — Aesthetic Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

  :root {
    --clr-bg: #0f2027;
    --clr-bg-gradient: linear-gradient(135deg, #2c5364 0%, #203a43 50%, #0f2027 100%);
    --clr-primary: #ffb347;
    --clr-primary-dark: #ff8c00;
    --clr-secondary: #00d2ff;
    --clr-accent: #a8edea;
    --clr-text-light: #f0f6f8;
    --clr-text-muted: #7a8a99;
    --clr-bar: #668cff;
    --clr-bar-sorted: #7ee8fa;
    --clr-bar-highlight: #ffb347;
    --transition-speed: 0.5s;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--clr-bg-gradient);
    font-family: 'Montserrat', sans-serif;
    color: var(--clr-text-light);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 2rem 1rem 4rem;
  }

  h1 {
    font-weight: 700;
    font-size: 2.8rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    user-select: none;
    text-shadow:
      0 0 8px var(--clr-primary),
      0 0 20px var(--clr-primary-dark);
  }

  h2 {
    font-weight: 500;
    font-size: 1.1rem;
    color: var(--clr-text-muted);
    margin-top: 0;
    margin-bottom: 3rem;
    font-style: italic;
    letter-spacing: 1.5px;
    user-select: none;
  }

  #container {
    position: relative;
    width: 100%;
    max-width: 900px;
    height: 330px;
    background: rgba(34, 49, 63, 0.6);
    border-radius: 1.25rem;
    box-shadow:
      inset 0 0 24px 1px rgba(255 179 71 / 0.3),
      0 0 36px 6px rgba(255 179 71 / 0.2);
    padding: 2rem 2rem 3rem;
    user-select: none;
    overflow: visible;
  }

  #bars {
    display: flex;
    align-items: flex-end;
    height: 100%;
    gap: 9px;
    perspective: 600px;
    margin-bottom: 0;
  }

  .bar {
    position: relative;
    background: linear-gradient(180deg, var(--clr-bar-sorted) 0%, var(--clr-bar) 100%);
    border-radius: 0.625rem 0.625rem 0 0;
    transform-style: preserve-3d;
    flex: 1 1 auto;
    cursor: default;
    transition: background var(--transition-speed) ease, transform var(--transition-speed) ease;

    will-change: transform, background-color;
    box-shadow:
      0 3px 10px rgba(35, 102, 255, 0.4),
      inset 0 -4px 12px rgba(255 255 255 / 0.2);
  }

  .bar.highlight {
    background: linear-gradient(180deg, var(--clr-bar-highlight) 0%, #e39600 100%);
    box-shadow:
      0 0 20px 3px #ffb347c4,
      inset 0 -6px 18px #ffb347c9;
    transform: scale(1.1) translateZ(20px);
    z-index: 2;
  }

  .bar.sorted {
    background: linear-gradient(180deg, var(--clr-bar-sorted) 0%, #81e7fa 100%);
    box-shadow:
      0 0 24px 3px #69dae9cc,
      inset 0 -6px 18px #4cdff0ba;
  }

  #controls {
    margin-top: 1.25rem;
    user-select: none;
    display: flex;
    gap: 1rem;
    justify-content: center;
  }

  button {
    background: linear-gradient(135deg, var(--clr-primary), var(--clr-primary-dark));
    border: none;
    border-radius: 9999px;
    padding: 0.78rem 2.2rem;
    font-weight: 700;
    font-family: 'Montserrat', sans-serif;
    font-size: 1.08rem;
    color: #0f2027;
    cursor: pointer;
    box-shadow:
      0 4px 15px rgba(255 179 71 / 0.7);
    transition: background 0.4s ease, transform 0.25s ease;
    user-select: none;
    text-transform: uppercase;
    letter-spacing: 2px;
    outline-offset: 4px;
  }

  button:hover,
  button:focus {
    background: linear-gradient(135deg, #ffc75f, #ff9300);
    outline: 2px solid #ffb347;
    outline-offset: 6px;
    transform: scale(1.08);
  }

  /* Tooltip style */
  #tooltip {
    position: absolute;
    bottom: 100%;
    padding: 0.25rem 0.6rem;
    background: rgba(0, 0, 0, 0.75);
    color: var(--clr-primary);
    font-size: 0.78rem;
    border-radius: 0.38rem;
    pointer-events: none;
    user-select: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    letter-spacing: 0.6px;
    font-weight: 600;
    font-family: 'Montserrat', sans-serif;
  }

  /* Subtle shimmering background highlight inside container */
  #container::before {
    content: "";
    position: absolute;
    pointer-events: none;
    top: -20%;
    left: -40%;
    width: 180%;
    height: 140%;
    z-index: 0;
    background:
      radial-gradient(ellipse 80px 80px at 25% 30%, #ffb34730, transparent 70%),
      radial-gradient(ellipse 80px 80px at 77% 45%, #00d2ff3b, transparent 70%),
      radial-gradient(ellipse 100px 130px at 50% 70%, #a8edea40, transparent 60%);
    filter: blur(40px);
    animation: shimmer 12s linear infinite;
    border-radius: 1.25rem;
  }

  @keyframes shimmer {
    0% {
      background-position: 0% 0%, 0% 0%, 0% 0%;
    }
    100% {
      background-position: 180% 90%, 180% 90%, 180% 90%;
    }
  }

  /* Info panel */
  #info {
    margin-top: 2rem;
    max-width: 700px;
    font-weight: 400;
    font-size: 1rem;
    color: var(--clr-text-muted);
    line-height: 1.42;
    text-align: center;
    font-style: italic;
    user-select: none;
  }

  /* Responsive */
  @media (max-width: 600px) {
    #container {
      height: 250px;
      padding: 1.5rem 1.5rem 2.5rem;
    }

    h1 {
      font-size: 2.2rem;
    }

    h2 {
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    button {
      padding: 0.65rem 1.6rem;
      font-size: 0.9rem;
    }
  }
</style>
</head>
<body>
  <h1>Insertion Sort</h1>
  <h2>Visualizing the elegance of "inserting" numbers in order</h2>

  <div id="container" aria-label="Insertion sort visualization" role="img">
    <div id="bars" aria-live="polite" aria-atomic="true"></div>
  </div>

  <div id="controls" aria-label="Controls">
    <button id="startBtn" type="button" aria-pressed="false" aria-label="Start sorting animation">Start</button>
    <button id="resetBtn" type="button" aria-label="Reset array">Reset</button>
  </div>

  <p id="info">Watch how the algorithm picks each element and inserts it into the sorted part step by step. The golden bar shows the element currently being considered. Smooth transitions reveal the subtle beauty behind sorting.</p>

<script>
(() => {
  'use strict';

  // Parameters
  const NUM_BARS = 22;
  const MIN_VAL = 12;
  const MAX_VAL = 280;

  const container = document.getElementById('bars');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');

  let bars = [];
  let values = [];
  let sorting = false;
  let sortGenerator = null;

  // Generate random array with unique-ish values for elegant aesthetics
  function generateArray() {
    const arr = [];
    const step = Math.floor((MAX_VAL - MIN_VAL) / NUM_BARS);
    for(let i=0; i<NUM_BARS; i++) {
      // Spread values with jitter for aesthetics
      arr.push(MIN_VAL + i*step + Math.floor((Math.random()-0.5)*(step*0.7)));
    }
    // Shuffle a bit to disorder the array
    for(let i=0; i < arr.length*3; i++) {
      const idx1 = Math.floor(Math.random()*NUM_BARS);
      const idx2 = Math.floor(Math.random()*NUM_BARS);
      [arr[idx1], arr[idx2]] = [arr[idx2], arr[idx1]];
    }
    return arr;
  }

  function createBars(array) {
    container.innerHTML = '';
    bars = [];
    for(let val of array) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.height = `${val}px`;
      bars.push(bar);
      container.appendChild(bar);
    }
  }

  // Animate swapping of bars by adjusting heights, with smooth CSS transition
  // We won't swap DOM nodes, just change heights and colors
  // This keeps the layout stable and visually elegant

  // Insertion sort generator for stepwise iteration
  function* insertionSortGen(array) {
    let arr = array.slice();
    let n = arr.length;
    yield {type: 'init', array: arr.slice(), current: null, sorted: []};

    for(let i = 1; i < n; i++) {
      let key = arr[i];
      let j = i - 1;
      yield {type: 'select', index: i, key: key, sorted: arr.slice(0,i)};

      while(j >= 0 && arr[j] > key) {
        arr[j+1] = arr[j];
        yield {type: 'shift', from: j, to: j+1, key: key, sorted: arr.slice(0,i)};
        j = j - 1;
      }
      arr[j+1] = key;
      yield {type: 'insert', index: j+1, key: key, array: arr.slice(), sorted: arr.slice(0,i+1)};
    }
    yield {type: 'done', array: arr.slice(), sorted: arr.slice()};
  }

  // Update bars heights and colors
  // Highlights array indices: highlightIndex is the "key" bar being inserted
  // sortedIndices - array of sorted elements indices
  // shiftFrom and shiftTo for highlighting shifts
  function updateBars(state) {
    const arr = state.array || values;
    for(let i=0; i < bars.length; i++) {
      bars[i].style.height = arr[i] + 'px';
      bars[i].classList.remove('highlight','sorted');
    }

    if(state.type === 'init') {
      // No highlights, no sorted bars
    } else if(state.type === 'select') {
      // Highlight "key" bar
      const i = state.index;
      if (bars[i]) bars[i].classList.add('highlight');
      // Mark sorted bars
      for(let s=0; s < i; s++) bars[s].classList.add('sorted');
    } else if(state.type === 'shift') {
      // The bar at shiftFrom is being moved to shiftTo by shifting height visually
      // Highlight the shifted bar at shiftTo
      const to = state.to;
      if (bars[to]) bars[to].classList.add('highlight');
      // Mark sorted bars before i, we don't have i here exactly but approximate it
      const sortedCount = state.sorted.length;
      for(let s=0; s < sortedCount; s++) bars[s].classList.add('sorted');
    } else if(state.type === 'insert') {
      // After insertion - mark sorted bars and highlight the inserted
      const idx = state.index;
      if (bars[idx]) bars[idx].classList.add('highlight');
      for(let s=0; s < state.sorted.length; s++) bars[s].classList.add('sorted');
    } else if(state.type === 'done') {
      for(let i=0; i < bars.length; i++) {
        bars[i].classList.add('sorted');
      }
    }
  }

  // Delay helper for animation pacing
  function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // Run insertion sort with animations and generator
  async function runSort() {
    sorting = true;
    startBtn.disabled = true;
    resetBtn.disabled = true;
    startBtn.setAttribute('aria-pressed', 'true');

    sortGenerator = insertionSortGen(values);
    let next = sortGenerator.next();

    while(!next.done && sorting) {
      updateBars(next.value);

      // Tune delay depending on step type
      if(next.value.type === 'shift') {
        await delay(140);
      } else if(next.value.type === 'select' || next.value.type === 'insert') {
        await delay(350);
      } else {
        await delay(270);
      }

      next = sortGenerator.next();
    }

    if (!sorting) {
      // If ended early by reset, do nothing
      updateBars({type:'init', array: values});
    } else {
      updateBars({type:'done', array: values});
    }

    sorting = false;
    startBtn.disabled = false;
    resetBtn.disabled = false;
    startBtn.setAttribute('aria-pressed', 'false');
  }

  function reset() {
    sorting = false;
    if(sortGenerator && typeof sortGenerator.return === 'function') {
      sortGenerator.return();
    }
    values = generateArray();
    createBars(values);
    updateBars({type:'init', array: values});
  }

  // Initialize
  reset();

  startBtn.addEventListener('click', () => {
    if(!sorting) runSort();
  });

  resetBtn.addEventListener('click', () => {
    if(!sorting) reset();
  });

})();
</script>
</body>
</html>
