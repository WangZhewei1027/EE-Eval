<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Programming</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .content {
            padding: 20px;
        }
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dynamic Programming</h1>
        </div>
        <div class="content">
            <p>
                Dynamic programming is an algorithmic technique used to solve complex problems by breaking them down into smaller subproblems and solving each subproblem only once. This approach can significantly reduce the time and space complexity of a problem.
            </p>
            <button class="button" onclick="solveProblem()">Solve Problem</button>
        </div>
    </div>

    <script>
        function solveProblem() {
            // Simulate some time-consuming calculation
            setTimeout(function() {
                console.log("Result: ", "Hello, World!");
            }, 2000);
        }
    </script>
</body>
</html>
