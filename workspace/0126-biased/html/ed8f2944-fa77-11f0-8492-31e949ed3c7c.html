<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCP/IP Visual Concept</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #002F4B, #DC4225);
            color: #ffffff;
            overflow: hidden;
        }
        .container {
            text-align: center;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            max-width: 600px;
            animation: fade-in 1s ease-in-out;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        h1:hover {
            transform: scale(1.05);
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .button {
            background: #DC4225;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: background 0.3s;
        }
        .button:hover {
            background: #c63920;
        }
        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .graphic {
            position: relative;
            margin: 30px 0;
        }
        .graphic div {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            position: absolute;
            animation: pulse 2s infinite;
        }
        .server { background: #4CAF50; top: 0; left: calc(50% - 50px); }
        .client { background: #2196F3; bottom: 0; left: calc(50% - 50px); }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Understanding TCP/IP</h1>
        <p>Transmission Control Protocol / Internet Protocol (TCP/IP) is a set of communication protocols used for the Internet and similar networks. It enables devices to connect and communicate seamlessly.</p>
        
        <div class="graphic">
            <div class="server"></div>
            <div class="client"></div>
        </div>

        <button class="button" onclick="alert('Learn More Coming Soon!')">Learn More</button>
    </div>
</body>
</html>
