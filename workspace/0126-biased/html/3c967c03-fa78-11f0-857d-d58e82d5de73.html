<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trie Data Structure – Visual Journey</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

  :root {
    --bg-dark: #110a1f;
    --shade-dark: #1a142e;
    --shade-medium: #392f58;
    --shade-light: #7a6cc6;
    --accent-primary: #ff6b6b;
    --accent-secondary: #6c5ce7;
    --text-light: #eeeafc;
    --text-muted: #bbb8d0;
    --node-glow: #ae7cfa;
    --highlight-node: #ff8fa3;
    --shadow-glow: rgba(174, 124, 250, 0.6);
    --transition-fast: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-smooth: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Reset & Base */
  *,
  *::before,
  *::after {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: linear-gradient(135deg, var(--bg-dark), var(--shade-dark));
    font-family: 'Poppins', sans-serif;
    color: var(--text-light);
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  h1 {
    font-weight: 600;
    font-size: 3.6rem;
    letter-spacing: 0.1em;
    color: var(--accent-primary);
    margin: 0 0 0.5rem 0;
    text-transform: uppercase;
    text-shadow:
      0 0 6px var(--accent-primary),
      0 0 12px var(--accent-primary),
      0 0 24px var(--accent-primary);
  }
  h2 {
    font-weight: 300;
    font-size: 1.4rem;
    letter-spacing: 0.06em;
    color: var(--shade-light);
    margin: 0 0 2.5rem 0;
    font-style: italic;
    user-select: none;
  }

  main {
    flex: 1 0 auto;
    max-width: 960px;
    width: 100%;
    background: radial-gradient(circle at top center, var(--shade-dark) 0%, var(--bg-dark) 95%);
    border-radius: 30px;
    box-shadow:
      0 4px 30px var(--shadow-glow),
      inset 0 0 12px var(--node-glow);
    padding: 3rem 3.5rem 4rem;
    overflow-x: auto;
  }

  /* Canvas Container */
  #trie-container {
    position: relative;
    width: 100%;
    height: 480px;
    background:
      radial-gradient(circle at 50% 50%, transparent 30%, var(--shade-dark) 90%);
    border-radius: 20px;
    box-shadow:
      0 0 30px var(--node-glow),
      inset 0 0 25px var(--shade-light);
    overflow: visible;
  }

  svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* Node Style */
  .node-group {
    cursor: default;
    transition: transform var(--transition-fast);
  }
  .node-circle {
    fill: var(--shade-light);
    stroke: var(--accent-secondary);
    stroke-width: 2.4;
    filter: drop-shadow(0 0 3px var(--accent-secondary));
    transform-origin: center center;
    transition: fill 0.4s ease, stroke-width 0.3s ease;
  }

  .node-text {
    font-weight: 600;
    font-size: 1.2rem;
    fill: var(--text-light);
    user-select: none;
    pointer-events: none;
    font-feature-settings: 'liga' off;
  }

  /* Highlight root nodes distinctly */
  .node-root .node-circle {
    fill: var(--accent-primary);
    stroke: var(--accent-primary);
    filter: drop-shadow(0 0 6px var(--accent-primary));
  }

  /* Highlight leaf nodes distinctly */
  .node-leaf .node-circle {
    fill: var(--accent-secondary);
    stroke: var(--shade-light);
    filter: drop-shadow(0 0 5px var(--shade-light));
  }

  /* Connections */
  .link {
    stroke: var(--shade-light);
    stroke-width: 2;
    filter: drop-shadow(0 0 3px var(--shade-light));
    fill: none;
    opacity: 0.85;
    transition: stroke var(--transition-fast);
  }

  /* Buttons Bar */
  #controls {
    margin: 3rem 0 0 0;
    display: flex;
    justify-content: center;
    gap: 1rem;
  }
  button {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 1.1rem;
    padding: 0.72rem 1.8rem;
    border-radius: 35px;
    border: none;
    cursor: pointer;
    color: var(--text-light);
    background: var(--accent-primary);
    box-shadow:
      0 6px 15px var(--accent-primary);
    transition:
      background var(--transition-fast),
      box-shadow var(--transition-fast),
      transform var(--transition-fast);
    user-select: none;
  }
  button:hover, button:focus {
    background: var(--accent-secondary);
    box-shadow:
      0 8px 20px var(--accent-secondary);
    outline: none;
    transform: scale(1.06);
  }
  button:active {
    transform: scale(0.97);
  }


  /* Tooltip */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(50, 40, 70, 0.85);
    color: var(--text-light);
    padding: 0.32rem 0.65rem;
    font-size: 0.85rem;
    border-radius: 10px;
    font-weight: 500;
    letter-spacing: 0.03em;
    opacity: 0;
    transition: opacity 0.4s ease;
    user-select: none;
    z-index: 1000;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <h1>TRIE</h1>
  <h2>Prefix Tree Visualization – Elegant & Illuminated</h2>
  <main>
    <div id="trie-container" aria-label="Trie Data Structure Visualization" role="img"></div>
  </main>
  <div id="controls" aria-label="Controls for Trie Visualization">
    <button id="toggleAnimation" aria-pressed="false" aria-controls="trie-container">Toggle Animation</button>
    <button id="highlightLeaves" aria-pressed="false" aria-controls="trie-container">Highlight Leaves</button>
  </div>
  <div id="tooltip" role="tooltip" aria-hidden="true"></div>

<script>
// Data for Trie demo - a simple handwritten insertion of "TRIE", "TRY", "TRICK", "CAT", "CAR", "CARE"
const trieData = {
  c: {
    a: {
      r: {
        e: { _end: true },
        _end: true,
      },
      _end: true,
    }
  },
  t: {
    r: {
      i: {
        e: { _end: true },
        c: {
          k: { _end: true }
        }
      },
      y: { _end: true }
    }
  }
};

// Visualization constants
const nodeRadius = 26;
const verticalSpacing = 90;
const horizontalSpacing = 130;

const container = document.getElementById('trie-container');
const tooltip = document.getElementById('tooltip');
const toggleAnimationBtn = document.getElementById('toggleAnimation');
const highlightLeavesBtn = document.getElementById('highlightLeaves');

let animationActive = true;
let leavesHighlighted = false;

// Create SVG Element
const SVG_NS = "http://www.w3.org/2000/svg";
const svg = document.createElementNS(SVG_NS, 'svg');
svg.setAttribute('aria-hidden', 'true');
container.appendChild(svg);

// Utility: Clean text label (uppercase)
function cleanLabel(str){
  return str.toUpperCase();
}

// Store dynamically created nodes and links for animation
const allNodes = [];
const allLinks = [];

// Positioning & drawing logic:

/**
 * Recursively parses trie object, lays out nodes horizontally,
 * returns x and y positions for each node,
 * draws circle/text for each character, and connects edges.
 * @param {Object} node - current trie node object
 * @param {number} depth - depth in trie (root = 0)
 * @param {number} xStart - horizontal position start for this group
 * @param {number} yStart - vertical position (depends on depth)
 * @returns {Object} {size, centerX} where size is total width used by subtree
 */
function layoutTrie(node, depth=0, xStart=0, yStart=0) {
  const keys = Object.keys(node).filter(k => k !== '_end').sort();

  // If no children, leaf node: render node only
  if (keys.length === 0) {
    // Draw leaf node at xStart,yStart
    drawNode(xStart, yStart, '_', depth === 0, true);
    return { size: horizontalSpacing, centerX: xStart };
  }

  // Recursively layout children horizontally, then draw parent above center
  let subtreeWidth = 0;
  let childCenters = [];

  for (const k of keys) {
    const result = layoutTrie(node[k], depth + 1, xStart + subtreeWidth, yStart + verticalSpacing);
    childCenters.push({char: k, x: result.centerX, y: yStart + verticalSpacing, nodeObj: node[k]});
    subtreeWidth += result.size;
  }

  // Center parent node above children
  const centerX = xStart + subtreeWidth / 2;

  // Draw parent node with char label (for root no char, use "")
  // For root at depth=0 we don't have a char because data object has multiple keys directly (like "c","t")
  // But our function is called for each child of root individually so char is passed up top?
  // We must make an adapter function to call layoutTrie for each root child:

  // Since we don't have parent's char here, return the center position for this subtree. Parent node drawn in the caller.

  return { size: subtreeWidth, centerX: centerX, childCenters: childCenters };
}

/**
 * Draw edges (Bezier curves) between parent and children nodes.
 * @param {Array} childCenters - array of objects {char,x,y,nodeObj} of children
 * @param {number} parentX - X coordinate of parent node
 * @param {number} parentY - Y coordinate of parent node
 */
function drawLinks(childCenters, parentX, parentY) {
  for (const ch of childCenters) {
    const link = document.createElementNS(SVG_NS, 'path');
    // Cubic bezier curve from parent down to child with smooth curve
    const startX = parentX;
    const startY = parentY + nodeRadius * 0.9;
    const endX = ch.x;
    const endY = ch.y - nodeRadius * 0.9;

    // Control points for smooth monotone curve
    const controlY1 = startY + (endY - startY) / 2;
    const controlY2 = controlY1;

    const d = `
      M${startX},${startY}
      C${startX},${controlY1} ${endX},${controlY2} ${endX},${endY}
    `;

    link.setAttribute('d', d);
    link.setAttribute('class', 'link');
    svg.appendChild(link);
    allLinks.push(link);
  }
}

/**
 * Draw single node circle + label.
 * @param {number} x - X coordinate center
 * @param {number} y - Y coordinate center
 * @param {string} char - character to display
 * @param {boolean} isRoot - if this node is root of trie or branch root
 * @param {boolean} isLeaf - if this node is leaf
 */
function drawNode(x, y, char, isRoot = false, isLeaf = false) {
  const group = document.createElementNS(SVG_NS, 'g');
  group.setAttribute('transform', `translate(${x},${y})`);
  group.setAttribute('class', 'node-group');
  group.setAttribute('role', 'listitem');
  group.setAttribute('tabindex', '-1');

  // Circle
  const circle = document.createElementNS(SVG_NS, 'circle');
  circle.setAttribute('r', nodeRadius);
  circle.setAttribute('class', 'node-circle');
  if (isRoot) circle.classList.add('node-root');
  if (isLeaf) circle.classList.add('node-leaf');
  group.appendChild(circle);

  // Text
  const text = document.createElementNS(SVG_NS, 'text');
  text.setAttribute('class', 'node-text');
  text.setAttribute('text-anchor', 'middle');
  text.setAttribute('dy', '0.38em'); // optical centering vertically
  text.textContent = char.toUpperCase();
  group.appendChild(text);

  svg.appendChild(group);
  allNodes.push({group, circle, text, isLeaf, isRoot, char, x, y});

  // Tooltip hover
  group.addEventListener('mouseenter', (e) => {
    showTooltip(`${char.toUpperCase()} node`, e.clientX, e.clientY);
    if (animationActive) {
      group.style.transform = 'scale(1.2)';
      circle.style.fill = 'var(--highlight-node)';
      circle.style.strokeWidth = '3.3';
    }
  });
  group.addEventListener('mouseleave', () => {
    hideTooltip();
    if (animationActive) {
      group.style.transform = 'scale(1)';
      circle.style.fill = isRoot ? getComputedStyle(circle).getPropertyValue('--accent-primary') : isLeaf ? getComputedStyle(circle).getPropertyValue('--accent-secondary') : '';
      circle.style.strokeWidth = '2.4';
    }
  });
}

/**
 * Show tooltip near cursor
 * @param {string} text - text to show
 * @param {number} x - cursor x
 * @param {number} y - cursor y
 */
function showTooltip(text, x, y) {
  tooltip.textContent = text;
  tooltip.style.opacity = '1';
  tooltip.style.left = (x + 14) + 'px';
  tooltip.style.top = (y + 14) + 'px';
  tooltip.setAttribute('aria-hidden', 'false');
}
/**
 * Hide tooltip
 */
function hideTooltip() {
  tooltip.style.opacity = '0';
  tooltip.setAttribute('aria-hidden', 'true');
}

// Build full layout recursively – returns layout info for each root child
function buildFullLayout(data, startX=0, y=60){
  const keys = Object.keys(data).filter(k => k !== '_end').sort();

  let totalWidth = 0;
  // We'll compute each top-level branch's width, starting spread horizontally with gaps.
  const branches = [];

  // First pass to get children's layout sizes and positions
  for (const k of keys) {
    // recursive layout of subtree
    const res = layoutTrie(data[k], 1, totalWidth, y + verticalSpacing);
    // res contains {size, centerX, childCenters}
    const branch = {
      char: k,
      childrenLayout: res.childCenters,
      centerX: totalWidth + res.size / 2,
      width: res.size,
      nodeData: data[k]
    };
    branches.push(branch);
    totalWidth += res.size;
  }

  // Now draw root nodes for each top-level key at y
  for (const br of branches) {
    // Draw root node
    drawNode(br.centerX, y, br.char, true, false);
    // Draw links & children nodes
    drawLinks(br.childrenLayout, br.centerX, y);
    // Draw children nodes recursively
    drawNodesRecursive(br.nodeData, br.centerX, y + verticalSpacing);
  }
}

/**
 * Recursively draw nodes below a parent node (except root nodes already drawn)
 * @param {Object} node - current trie node
 * @param {number} parentX - x coordinate of parent
 * @param {number} parentY - y coordinate of parent
 */
function drawNodesRecursive(node, parentX, parentY) {
  const keys = Object.keys(node).filter(k => k !== '_end').sort();

  if (keys.length === 0) return;

  for (const k of keys) {
    // For each child, we need to know its pre-calculated centerX from layoutTrie
    // But we didn't store it. We'll compute layout again but just for positioning.

    // Using layoutTrie again to find position of child:
    const layoutRes = layoutTrie(node, 0, 0, 0);
    // Find child's centerX:
    const childCenters = layoutRes.childCenters;
    if (!childCenters) continue;

    const child = childCenters.find(c => c.char === k);
    if (!child) continue;

    const isLeaf = (Object.keys(node[k]).filter(x => x !== '_end').length === 0);
    drawNode(child.x, child.y, k, false, isLeaf);

    // Draw links between parent and child
    drawLinks([{char:k, x:child.x, y:child.y, nodeObj:node[k]}], parentX, parentY);

    // Recursive for child's children
    drawNodesRecursive(node[k], child.x, child.y);
    // Avoid double drawing links for the same parent-child as drawLinks called twice? Refactored above calls drawLinks only for current children not recursively.
  }
}

/**
 * Animate glowing nodes in sequence in a subtle loop
 */
let animationInterval = null;
function startAnimation() {
  let idx = 0;
  animationInterval = setInterval(() => {
    allNodes.forEach((n,i) => {
      const intensity = (i === idx) ? 1 : 0.2;
      n.circle.style.filter = `drop-shadow(0 0 ${6 * intensity}px var(--accent-secondary)) drop-shadow(0 0 ${14 * intensity}px var(--accent-primary))`;
      n.circle.style.transition = 'filter 0.6s ease';
      n.text.style.opacity = 0.8 + 0.2 * intensity;
      n.group.style.transform = `scale(${1 + 0.07 * intensity})`;
      n.group.style.transition = 'transform 0.6s ease';
    });
    idx = (idx + 1) % allNodes.length;
  }, 1300);
}

function stopAnimation() {
  clearInterval(animationInterval);
  allNodes.forEach(n => {
    n.circle.style.filter = '';
    n.text.style.opacity = 1;
    n.group.style.transform = 'scale(1)';
  });
}

// Highlight leaf nodes style toggle
function toggleLeavesHighlight() {
  leavesHighlighted = !leavesHighlighted;
  allNodes.forEach(n => {
    if (n.isLeaf) {
      if (leavesHighlighted) {
        n.circle.style.fill = 'var(--accent-primary)';
        n.circle.style.stroke = 'var(--accent-primary)';
        n.circle.style.filter = 'drop-shadow(0 0 10px var(--accent-primary))';
      } else {
        n.circle.style.fill = 'var(--accent-secondary)';
        n.circle.style.stroke = 'var(--shade-light)';
        n.circle.style.filter = 'drop-shadow(0 0 5px var(--shade-light))';
      }
    }
  });
}

// Clear SVG content and redraw entire trie
function resetTrie() {
  svg.innerHTML = '';
  allLinks.length = 0;
  allNodes.length = 0;
  buildFullLayout(trieData);
  if (animationActive) startAnimation();
}
// Init
resetTrie();

// Button toggles:

toggleAnimationBtn.addEventListener('click', () => {
  animationActive = !animationActive;
  toggleAnimationBtn.setAttribute('aria-pressed', animationActive.toString());
  toggleAnimationBtn.textContent = animationActive ? 'Pause Animation' : 'Play Animation';
  if (animationActive) {
    startAnimation();
  } else {
    stopAnimation();
  }
});

highlightLeavesBtn.addEventListener('click', () => {
  leavesHighlighted = !leavesHighlighted;
  highlightLeavesBtn.setAttribute('aria-pressed', leavesHighlighted.toString());
  highlightLeavesBtn.textContent = leavesHighlighted ? 'Unhighlight Leaves' : 'Highlight Leaves';
  toggleLeavesHighlight();
});

// Accessibility & Keyboard hints
toggleAnimationBtn.title = "Toggle node glow animation on/off";
highlightLeavesBtn.title = "Toggle highlight on leaf nodes";

// On window resize, no dynamic reposition required as SVG is fixed size & absolutely positioned

// Tooltip position update on mouse move
document.addEventListener('mousemove', (e) => {
  if (tooltip.style.opacity === '1') {
    const offsetX = 14;
    const offsetY = 14;
    let left = e.clientX + offsetX;
    let top = e.clientY + offsetY;

    // Keep inside viewport horizontally
    if (left + tooltip.offsetWidth > window.innerWidth) {
      left = e.clientX - tooltip.offsetWidth - offsetX;
    }
    // Keep inside viewport vertically
    if (top + tooltip.offsetHeight > window.innerHeight) {
      top = e.clientY - tooltip.offsetHeight - offsetY;
    }
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  }
});

</script>
</body>
</html>
