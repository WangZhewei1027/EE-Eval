<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Programming Explorer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .section {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        button, select, input {
            padding: 5px 10px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        .memo-table {
            display: grid;
            gap: 2px;
        }
        .memo-cell {
            border: 1px solid #ddd;
            padding: 5px;
            text-align: center;
            min-width: 30px;
        }
        .highlight {
            background-color: #e6f7ff;
        }
        .explanation {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dynamic Programming Explorer</h1>
        
        <div class="section">
            <h2>Fibonacci Sequence</h2>
            <div class="controls">
                <input type="number" id="fib-input" min="0" max="20" value="5">
                <button onclick="calculateFibonacci()">Calculate</button>
                <select id="fib-method" onchange="updateFibonacciExplanation()">
                    <option value="recursive">Recursive</option>
                    <option value="memoization">Memoization</option>
                    <option value="dp">Dynamic Programming</option>
                </select>
                <button onclick="stepThroughFibonacci()">Step Through</button>
                <button onclick="resetFibonacci()">Reset</button>
            </div>
            <div id="fib-result"></div>
            <div id="fib-steps"></div>
            <div id="fib-explanation" class="explanation"></div>
            <div id="fib-memo-table" class="memo-table" style="display: none;"></div>
        </div>
        
        <div class="section">
            <h2>Knapsack Problem</h2>
            <div class="controls">
                <input type="number" id="knapsack-capacity" min="1" max="20" value="5">
                <button onclick="generateKnapsackItems()">Generate Items</button>
                <button onclick="solveKnapsack()">Solve</button>
                <button onclick="stepThroughKnapsack()">Step Through</button>
                <button onclick="resetKnapsack()">Reset</button>
            </div>
            <div id="knapsack-items"></div>
            <div id="knapsack-result"></div>
            <div id="knapsack-steps"></div>
            <div id="knapsack-explanation" class="explanation"></div>
            <div id="knapsack-dp-table" style="overflow-x: auto;"></div>
        </div>
        
        <div class="section">
            <h2>Longest Common Subsequence</h2>
            <div class="controls">
                <input type="text" id="lcs-str1" value="ABCDGH">
                <input type="text" id="lcs-str2" value="AEDFHR">
                <button onclick="calculateLCS()">Calculate</button>
                <button onclick="stepThroughLCS()">Step Through</button>
                <button onclick="resetLCS()">Reset</button>
            </div>
            <div id="lcs-result"></div>
            <div id="lcs-steps"></div>
            <div id="lcs-explanation" class="explanation"></div>
            <div id="lcs-dp-table" style="overflow-x: auto;"></div>
        </div>
    </div>

    <script>
        // Fibonacci Sequence
        let fibSteps = [];
        let currentFibStep = 0;
        let fibMemo = {};
        
        function calculateFibonacci() {
            const n = parseInt(document.getElementById('fib-input').value);
            const method = document.getElementById('fib-method').value;
            let result;
            
            if (method === 'recursive') {
                result = fibRecursive(n);
                document.getElementById('fib-result').innerHTML = `Fibonacci(${n}) = ${result} (Recursive)`;
            } else if (method === 'memoization') {
                fibMemo = {};
                result = fibMemoization(n);
                document.getElementById('fib-result').innerHTML = `Fibonacci(${n}) = ${result} (Memoization)`;
                displayFibMemoTable(n);
            } else {
                result = fibDP(n);
                document.getElementById('fib-result').innerHTML = `Fibonacci(${n}) = ${result} (DP)`;
                displayFibDPTable(n);
            }
            
            updateFibonacciExplanation();
        }
        
        function fibRecursive(n) {
            if (n <= 1) return n;
            return fibRecursive(n-1) + fibRecursive(n-2);
        }
        
        function fibMemoization(n) {
            if (n in fibMemo) return fibMemo[n];
            if (n <= 1) return n;
            fibMemo[n] = fibMemoization(n-1) + fibMemoization(n-2);
            return fibMemo[n];
        }
        
        function fibDP(n) {
            if (n <= 1) return n;
            let dp = [0, 1];
            for (let i = 2; i <= n; i++) {
                dp[i] = dp[i-1] + dp[i-2];
            }
            return dp[n];
        }
        
        function displayFibMemoTable(n) {
            const tableDiv = document.getElementById('fib-memo-table');
            tableDiv.style.display = 'block';
            tableDiv.innerHTML = '<h3>Memoization Table</h3>';
            
            const table = document.createElement('div');
            table.className = 'memo-table';
            table.style.gridTemplateColumns = `repeat(${n+1}, 1fr)`;
            
            for (let i = 0; i <= n; i++) {
                const cell = document.createElement('div');
                cell.className = 'memo-cell';
                cell.textContent = i in fibMemo ? fibMemo[i] : '';
                cell.id = `fib-memo-${i}`;
                table.appendChild(cell);
            }
            
            tableDiv.appendChild(table);
        }
        
        function displayFibDPTable(n) {
            const tableDiv = document.getElementById('fib-memo-table');
            tableDiv.style.display = 'block';
            tableDiv.innerHTML = '<h3>DP Array</h3>';
            
            const table = document.createElement('div');
            table.className = 'memo-table';
            table.style.gridTemplateColumns = `repeat(${n+1}, 1fr)`;
            
            let dp = [0, 1];
            for (let i = 2; i <= n; i++) {
                dp[i] = dp[i-1] + dp[i-2];
            }
            
            for (let i = 0; i <= n; i++) {
                const cell = document.createElement('div');
                cell.className = 'memo-cell';
                cell.textContent = dp[i];
                cell.id = `fib-dp-${i}`;
                table.appendChild(cell);
            }
            
            tableDiv.appendChild(table);
        }
        
        function stepThroughFibonacci() {
            const n = parseInt(document.getElementById('fib-input').value);
            const method = document.getElementById('fib-method').value;
            
            if (fibSteps.length === 0) {
                if (method === 'recursive') {
                    generateFibRecursiveSteps(n);
                } else if (method === 'memoization') {
                    generateFibMemoSteps(n);
                } else {
                    generateFibDPSteps(n);
                }
                currentFibStep = 0;
            }
            
            if (currentFibStep < fibSteps.length) {
                document.getElementById('fib-steps').innerHTML = fibSteps[currentFibStep].message;
                
                if (fibSteps[currentFibStep].highlight) {
                    const cells = document.querySelectorAll('.memo-cell');
                    cells.forEach(cell => cell.classList.remove('highlight'));
                    
                    fibSteps[currentFibStep].highlight.forEach(id => {
                        const cell = document.getElementById(`fib-${id}`);
                        if (cell) cell.classList.add('highlight');
                    });
                }
                
                currentFibStep++;
            } else {
                document.getElementById('fib-steps').innerHTML = "All steps completed!";
            }
        }
        
        function generateFibRecursiveSteps(n) {
            fibSteps = [];
            fibSteps.push({
                message: `Calculating Fibonacci(${n}) recursively...`,
                highlight: []
            });
            // More steps would be added in a real implementation
        }
        
        function generateFibMemoSteps(n) {
            fibSteps = [];
            fibMemo = {};
            fibSteps.push({
                message: `Initializing memoization table for Fibonacci(${n})...`,
                highlight: []
            });
            // More steps would be added in a real implementation
        }
        
        function generateFibDPSteps(n) {
            fibSteps = [];
            fibSteps.push({
                message: `Initializing DP array with Fibonacci(0) = 0 and Fibonacci(1) = 1...`,
                highlight: ['dp-0', 'dp-1']
            });
            // More steps would be added in a real implementation
        }
        
        function resetFibonacci() {
            fibSteps = [];
            currentFibStep = 0;
            document.getElementById('fib-steps').innerHTML = '';
            document.getElementById('fib-result').innerHTML = '';
            document.getElementById('fib-memo-table').innerHTML = '';
            document.getElementById('fib-memo-table').style.display = 'none';
            const cells = document.querySelectorAll('.memo-cell');
            cells.forEach(cell => cell.classList.remove('highlight'));
        }
        
        function updateFibonacciExplanation() {
            const method = document.getElementById('fib-method').value;
            let explanation = '';
            
            if (method === 'recursive') {
                explanation = `
                    <h3>Recursive Approach</h3>
                    <p>This is the naive recursive solution that directly implements the mathematical definition:</p>
                    <p>fib(n) = fib(n-1) + fib(n-2)</p>
                    <p>Time complexity: O(2^n) (exponential)</p>
                    <p>Space complexity: O(n) (call stack)</p>
                `;
            } else if (method === 'memoization') {
                explanation = `
                    <h3>Memoization (Top-Down DP)</h3>
                    <p>This approach stores the results of subproblems to avoid redundant calculations.</p>
                    <p>Time complexity: O(n)</p>
                    <p>Space complexity: O(n)</p>
                `;
            } else {
                explanation = `
                    <h3>Dynamic Programming (Bottom-Up)</h3>
                    <p>This approach solves subproblems in order and stores results in a table.</p>
                    <p>Time complexity: O(n)</p>
                    <p>Space complexity: O(n) (can be optimized to O(1))</p>
                `;
            }
            
            document.getElementById('fib-explanation').innerHTML = explanation;
        }
        
        // Knapsack Problem
        let knapsackItems = [];
        let knapsackSteps = [];
        let currentKnapsackStep = 0;
        
        function generateKnapsackItems() {
            const capacity = parseInt(document.getElementById('knapsack-capacity').value);
            const count = Math.min(5, Math.max(3, Math.floor(capacity / 2)));
            
            knapsackItems = [];
            for (let i = 0; i < count; i++) {
                knapsackItems.push({
                    weight: Math.floor(Math.random() * capacity / 2) + 1,
                    value: Math.floor(Math.random() * 20) + 5
                });
            }
            
            displayKnapsackItems();
        }
        
        function displayKnapsackItems() {
            let html = '<h3>Items</h3><table><tr><th>Item</th><th>Weight</th><th>Value</th></tr>';
            knapsackItems.forEach((item, index) => {
                html += `<tr><td>${index+1}</td><td>${item.weight}</td><td>${item.value}</td></tr>`;
            });
            html += '</table>';
            document.getElementById('knapsack-items').innerHTML = html;
        }
        
        function solveKnapsack() {
            const capacity = parseInt(document.getElementById('knapsack-capacity').value);
            const n = knapsackItems.length;
            
            // Initialize DP table
            let dp = Array(n + 1).fill().map(() => Array(capacity + 1).fill(0));
            
            for (let i = 1; i <= n; i++) {
                for (let w = 1; w <= capacity; w++) {
                    if (knapsackItems[i-1].weight <= w) {
                        dp[i][w] = Math.max(
                            knapsackItems[i-1].value + dp[i-1][w - knapsackItems[i-1].weight],
                            dp[i-1][w]
                        );
                    } else {
                        dp[i][w] = dp[i-1][w];
                    }
                }
            }
            
            // Find selected items
            let selectedItems = [];
            let w = capacity;
            for (let i = n; i > 0; i--) {
                if (dp[i][w] !== dp[i-1][w]) {
                    selectedItems.push(i-1);
                    w -= knapsackItems[i-1].weight;
                }
            }
            
            // Display result
            const totalValue = dp[n][capacity];
            const totalWeight = selectedItems.reduce((sum, idx) => sum + knapsackItems[idx].weight, 0);
            let itemsList = selectedItems.map(idx => `Item ${idx+1} (w:${knapsackItems[idx].weight}, v:${knapsackItems[idx].value})`).join(', ');
            
            document.getElementById('knapsack-result').innerHTML = `
                <p>Maximum value: ${totalValue}</p>
                <p>Total weight: ${totalWeight}/${capacity}</p>
                <p>Selected items: ${itemsList}</p>
            `;
            
            // Display DP table
            displayKnapsackDPTable(dp, capacity);
        }
        
        function displayKnapsackDPTable(dp, capacity) {
            const n = knapsackItems.length;
            let html = '<h3>DP Table</h3><table><tr><th>Item \ Weight</th>';
            
            // Header row (weights)
            for (let w = 0; w <= capacity; w++) {
                html += `<th>${w}</th>`;
            }
            html += '</tr>';
            
            // Data rows
            for (let i = 0; i <= n; i++) {
                html += `<tr><th>${i > 0 ? i : ''}</th>`;
                for (let w = 0; w <= capacity; w++) {
                    html += `<td id="knapsack-cell-${i}-${w}">${dp[i][w]}</td>`;
                }
                html += '</tr>';
            }
            html += '</table>';
            
            document.getElementById('knapsack-dp-table').innerHTML = html;
        }
        
        function stepThroughKnapsack() {
            // Implementation would be similar to Fibonacci stepping
            document.getElementById('knapsack-steps').innerHTML = "Step-by-step execution would be implemented here...";
        }
        
        function resetKnapsack() {
            knapsackSteps = [];
            currentKnapsackStep = 0;
            document.getElementById('knapsack-steps').innerHTML = '';
            document.getElementById('knapsack-result').innerHTML = '';
            document.getElementById('knapsack-dp-table').innerHTML = '';
        }
        
        // Longest Common Subsequence
        let lcsSteps = [];
        let currentLcsStep = 0;
        
        function calculateLCS() {
            const str1 = document.getElementById('lcs-str1').value;
            const str2 = document.getElementById('lcs-str2').value;
            
            const m = str1.length;
            const n = str2.length;
            
            // Create DP table
            let dp = Array(m + 1).fill().map(() => Array(n + 1).fill(0));
            
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (str1[i-1] === str2[j-1]) {
                        dp[i][j] = dp[i-1][j-1] + 1;
                    } else {
                        dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
                    }
                }
            }
            
            // Find the LCS string
            let lcs = '';
            let i = m, j = n;
            while (i > 0 && j > 0) {
                if (str1[i-1] === str2[j-1]) {
                    lcs = str1[i-1] + lcs;
                    i--;
                    j--;
                } else if (dp[i-1][j] > dp[i][j-1]) {
                    i--;
                } else {
                    j--;
                }
            }
            
            document.getElementById('lcs-result').innerHTML = `
                <p>LCS Length: ${dp[m][n]}</p>
                <p>LCS String: ${lcs}</p>
            `;
            
            displayLcsDPTable(dp, str1, str2);
        }
        
        function displayLcsDPTable(dp, str1, str2) {
            const m = str1.length;
            const n = str2.length;
            
            let html = '<h3>DP Table</h3><table><tr><th></th><th></th>';
            
            // Header row (str2)
            for (let j = 0; j < n; j++) {
                html += `<th>${str2[j]}</th>`;
            }
            html += '</tr>';
            
            // Data row 0 (empty string)
            html += '<tr><th></th><th>0</th>';
            for (let j = 0; j <= n; j++) {
                html += `<td>${dp[0][j]}</td>`;
            }
            html += '</tr>';
            
            // Data rows
            for (let i = 1; i <= m; i++) {
                html += `<tr><th>${str1[i-1]}</th><th>${i}</th>`;
                for (let j = 0; j <= n; j++) {
                    html += `<td id="lcs-cell-${i}-${j}">${dp[i][j]}</td>`;
                }
                html += '</tr>';
            }
            html += '</table>';
            
            document.getElementById('lcs-dp-table').innerHTML = html;
        }
        
        function stepThroughLCS() {
            // Implementation would be similar to Fibonacci stepping
            document.getElementById('lcs-steps').innerHTML = "Step-by-step execution would be implemented here...";
        }
        
        function resetLCS() {
            lcsSteps = [];
            currentLcsStep = 0;
            document.getElementById('lcs-steps').innerHTML = '';
            document.getElementById('lcs-result').innerHTML = '';
            document.getElementById('lcs-dp-table').innerHTML = '';
        }
        
        // Initialize
        updateFibonacciExplanation();
        generateKnapsackItems();
    </script>
</body>
</html>
