<!DOCTYPE html>
<html>
<head>
    <title>Hash Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            margin: 0;
            padding: 0;
        }
        
        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        input[type="text"], input[type="number"], input[type="password"] {
            padding: 10px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #3e8e41;
        }
        
        .result {
            padding: 10px 20px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        
        .error {
            padding: 10px 20px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hash Table</h1>
        <h2>Adding Elements</h2>
        <input type="text" id="input1" placeholder="Key">
        <input type="number" id="input2" placeholder="Value">
        <button id="add-btn">Add</button>
        <div class="result"></div>
        
        <h2>Removing Elements</h2>
        <input type="text" id="input3" placeholder="Key">
        <button id="remove-btn">Remove</button>
        <div class="result"></div>
        
        <h2>Searching Elements</h2>
        <input type="text" id="input4" placeholder="Key">
        <button id="search-btn">Search</button>
        <div class="result"></div>
        
        <h2>Updating Elements</h2>
        <input type="text" id="input5" placeholder="Key">
        <input type="number" id="input6" placeholder="New Value">
        <button id="update-btn">Update</button>
        <div class="result"></div>
        
        <h2>Clearing Hash Table</h2>
        <button id="clear-btn">Clear</button>
        <div class="result"></div>
        
        <h2>Error Handling</h2>
        <div class="error"></div>
        <div class="error"></div>
        
        <h2>Complex State Transitions</h2>
        <button id="toggle-btn">Toggle</button>
        <div class="result"></div>
        
        <h2>Interactive State Transitions</h2>
        <button id="transition-btn">Transition</button>
        <div class="result"></div>
        
        <h2>Deep Exploration Capabilities</h2>
        <button id="explore-btn">Explore</button>
        <div class="result"></div>
        
        <h2>Many Possible Interaction Paths</h2>
        <button id="path-btn">Path</button>
        <div class="result"></div>
    </div>
    
    <script>
        const input1 = document.getElementById('input1');
        const input2 = document.getElementById('input2');
        const addBtn = document.getElementById('add-btn');
        const removeBtn = document.getElementById('remove-btn');
        const searchBtn = document.getElementById('search-btn');
        const updateBtn = document.getElementById('update-btn');
        const clearBtn = document.getElementById('clear-btn');
        const toggleBtn = document.getElementById('toggle-btn');
        const transitionBtn = document.getElementById('transition-btn');
        const exploreBtn = document.getElementById('explore-btn');
        const pathBtn = document.getElementById('path-btn');
        
        addBtn.addEventListener('click', addElement);
        removeBtn.addEventListener('click', removeElement);
        searchBtn.addEventListener('click', searchElement);
        updateBtn.addEventListener('click', updateElement);
        clearBtn.addEventListener('click', clearHashTable);
        toggleBtn.addEventListener('click', toggleState);
        transitionBtn.addEventListener('click', transitionState);
        exploreBtn.addEventListener('click', exploreState);
        pathBtn.addEventListener('click', pathState);
        
        function addElement() {
            const key = input1.value;
            const value = input2.value;
            if (key !== '') {
                const hashTable = {};
                hashTable[key] = value;
                const result = document.getElementById('result');
                result.innerHTML = `Added ${key}: ${value}`;
            } else {
                document.getElementById('error').innerHTML = 'Please enter a key';
            }
        }
        
        function removeElement() {
            const key = input3.value;
            if (key !== '') {
                const hashTable = {};
                delete hashTable[key];
                const result = document.getElementById('result');
                result.innerHTML = `Removed ${key}`;
            } else {
                document.getElementById('error').innerHTML = 'Please enter a key';
            }
        }
        
        function searchElement() {
            const key = input4.value;
            if (key !== '') {
                const hashTable = {};
                for (const [k, v] of Object.entries(hashTable)) {
                    if (k === key) {
                        const result = document.getElementById('result');
                        result.innerHTML = `Found ${key}: ${v}`;
                    } else {
                        const result = document.getElementById('error');
                        result.innerHTML = `Not found ${key}`;
                    }
                }
            } else {
                document.getElementById('error').innerHTML = 'Please enter a key';
            }
        }
        
        function updateElement() {
            const key = input5.value;
            const newValue = input6.value;
            if (key !== '') {
                const hashTable = {};
                for (const [k, v] of Object.entries(hashTable)) {
                    if (k === key) {
                        hashTable[key] = newValue;
                        const result = document.getElementById('result');
                        result.innerHTML = `Updated ${key}: ${newValue}`;
                    } else {
                        const result = document.getElementById('error');
                        result.innerHTML = `Not found ${key}`;
                    }
                }
            } else {
                document.getElementById('error').innerHTML = 'Please enter a key';
            }
        }
        
        function clearHashTable() {
            const hashTable = {};
            const result = document.getElementById('result');
            result.innerHTML = '';
            for (const [k, v] of Object.entries(hashTable)) {
                const element = document.createElement('div');
                element.textContent = `${k}: ${v}`;
                result.appendChild(element);
            }
        }
        
        function toggleState() {
            const state = document.getElementById('toggle-btn').value;
            if (state === 'on') {
                document.getElementById('toggle-btn').textContent = 'Off';
                document.getElementById('toggle-btn').style.backgroundColor = 'green';
            } else {
                document.getElementById('toggle-btn').textContent = 'On';
                document.getElementById('toggle-btn').style.backgroundColor = 'red';
            }
        }
        
        function transitionState() {
            const state = document.getElementById('transition-btn').value;
            if (state === 'on') {
                document.getElementById('transition-btn').textContent = 'Off';
                document.getElementById('transition-btn').style.backgroundColor = 'green';
            } else {
                document.getElementById('transition-btn').textContent = 'On';
                document.getElementById('transition-btn').style.backgroundColor = 'red';
            }
        }
        
        function exploreState() {
            const state = document.getElementById('explore-btn').value;
            if (state === 'on') {
                document.getElementById('explore-btn').textContent = 'Off';
                document.getElementById('explore-btn').style.backgroundColor = 'green';
            } else {
                document.getElementById('explore-btn').textContent = 'On';
                document.getElementById('explore-btn').style.backgroundColor = 'red';
            }
        }
        
        function pathState() {
            const state = document.getElementById('path-btn').value;
            if (state === 'on') {
                document.getElementById('path-btn').textContent = 'Off';
                document.getElementById('path-btn').style.backgroundColor = 'green';
            } else {
                document.getElementById('path-btn').textContent = 'On';
                document.getElementById('path-btn').style.backgroundColor = 'red';
            }
        }
        
        function clearHashTable() {
            const hashTable = {};
            const result = document.getElementById('result');
            result.innerHTML = '';
            for (const [k, v] of Object.entries(hashTable)) {
                const element = document.createElement('div');
                element.textContent = `${k}: ${v}`;
                result.appendChild(element);
            }
        }
    </script>
</body>
</html>
