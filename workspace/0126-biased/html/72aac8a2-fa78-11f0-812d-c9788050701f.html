<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divide & Conquer | Algorithmic Beauty</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #f8f9fa;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.05em;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 400;
            color: #d1d5db;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .divider {
            height: 1px;
            width: 100px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            margin: 2rem auto;
        }

        .algo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 3rem;
        }

        .problem-container {
            width: 600px;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            margin-bottom: 3rem;
            overflow: hidden;
        }

        .problem {
            font-size: 1.5rem;
            font-weight: 600;
            color: #f3f4f6;
        }

        .subproblem-container {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .subproblem {
            width: 280px;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .subproblem::before, .problem-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            z-index: -1;
            border-radius: inherit;
        }

        .solution-container {
            width: 600px;
            height: 100px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.5), rgba(99, 102, 241, 0.5));
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            margin-top: 3rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s;
        }

        .solution {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
        }

        .solution-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0));
            z-index: -1;
            border-radius: inherit;
        }

        .solution-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: conic-gradient(from 0deg at 50% 50%, rgba(124, 58, 237, 0), rgba(99, 102, 241, 0.5), rgba(124, 58, 237, 0));
            z-index: -2;
            border-radius: inherit;
            animation: rotate 6s linear infinite;
        }

        .connector {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            width: 2px;
            height: 50px;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
        }

        .subproblem .connector {
            height: 60px;
            bottom: -60px;
        }

        .btn-container {
            margin-top: 4rem;
            display: flex;
            justify-content: center;
        }

        .btn {
            background: linear-gradient(135deg, #7c3aed, #6366f1);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0.3), rgba(255,255,255,0));
            transform: rotate(30deg);
            transition: all 0.3s ease;
        }

        .btn:hover::after {
            left: 110%;
        }

        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-element {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(99, 102, 241, 0.2));
            filter: blur(20px);
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(20px, 20px) rotate(5deg);
            }
            50% {
                transform: translate(-20px, 20px) rotate(-5deg);
            }
            75% {
                transform: translate(20px, -20px) rotate(5deg);
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .active .subproblem-container {
            transform: translateY(0) !important;
            opacity: 1 !important;
        }

        .active .solution-container {
            opacity: 1;
            transform: translateY(0);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="floating-elements">
        <div class="floating-element" style="width: 300px; height: 300px; top: 10%; left: 5%;"></div>
        <div class="floating-element" style="width: 400px; height: 400px; bottom: 10%; right: 5%;"></div>
        <div class="floating-element" style="width: 200px; height: 200px; top: 50%; left: 30%;"></div>
    </div>

    <div class="container">
        <header>
            <h1>Divide & Conquer</h1>
            <div class="divider"></div>
            <h2>A powerful algorithmic paradigm that breaks problems into smaller subproblems, solves them recursively, and combines solutions.</h2>
        </header>

        <div class="algo-container">
            <div class="problem-container">
                <div class="connector"></div>
                <div class="problem">Complex Problem</div>
            </div>

            <div class="subproblem-container" style="transform: translateY(-20px); opacity: 0;">
                <div class="subproblem">
                    <div class="connector"></div>
                    <div class="problem">Subproblem 1</div>
                </div>
                <div class="subproblem">
                    <div class="connector"></div>
                    <div class="problem">Subproblem 2</div>
                </div>
            </div>

            <div class="solution-container">
                <div class="solution">Combined Solution</div>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn" id="demoBtn">Visualize Algorithm</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const demoBtn = document.getElementById('demoBtn');
            const algoContainer = document.querySelector('.algo-container');
            
            demoBtn.addEventListener('click', () => {
                // Toggle active state
                algoContainer.classList.toggle('active');
                
                // Change button text
                if (algoContainer.classList.contains('active')) {
                    demoBtn.textContent = 'Reset Visualization';
                } else {
                    demoBtn.textContent = 'Visualize Algorithm';
                }
            });

            // Initial animation after short delay
            setTimeout(() => {
                document.querySelector('.problem-container').style.transform = 'translateY(0)';
                document.querySelector('.problem-container').style.opacity = '1';
            }, 300);
        });
    </script>
</body>
</html>
