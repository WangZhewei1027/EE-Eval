<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Typing</title>
    <style>
        body {
            background-color: white;
            font-family: monospace;
        }
        input, select, textarea {
            font-size: 16px;
            padding: 10px;
            margin-bottom: 20px;
            width: 100%;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #ccc;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <h1>Static Typing</h1>
    <p id="error-message"></p>
    <input id="input-field" type="text" placeholder="Type something">
    <button id="submit-button">Submit</button>
    <button id="clear-button">Clear</button>
    <div id="output-container"></div>
    <script>
        let inputField = document.getElementById('input-field');
        let submitButton = document.getElementById('submit-button');
        let clearButton = document.getElementById('clear-button');
        let outputContainer = document.getElementById('output-container');
        let errorMessage = document.getElementById('error-message');
        let inputFieldContent = '';
        let submitButtonContent = '';
        let clearButtonContent = '';

        let inputFieldHandler = (e) => {
            inputFieldContent = inputField.value;
            if (inputFieldContent.length > 100) {
                errorMessage.textContent = 'Input too long!';
            } else {
                errorMessage.textContent = '';
            }
            updateOutput();
        };

        let submitButtonHandler = () => {
            if (inputFieldContent) {
                // TO DO: implement some logic here
                console.log('Submit button clicked!');
            } else {
                errorMessage.textContent = 'Please type something!';
            }
            updateOutput();
        };

        let clearButtonHandler = () => {
            inputFieldContent = '';
            errorMessage.textContent = '';
            updateOutput();
        };

        submitButton.addEventListener('click', submitButtonHandler);
        clearButton.addEventListener('click', clearButtonHandler);

        function updateOutput() {
            outputContainer.innerHTML = '';
            if (inputFieldContent) {
                outputContainer.insertAdjacentHTML('beforeend', `<p>Input: ${inputFieldContent}</p>`);
            } else {
                outputContainer.insertAdjacentHTML('beforeend', `<p>Error: Please type something!</p>`);
            }
        }
    </script>
</body>
</html>
