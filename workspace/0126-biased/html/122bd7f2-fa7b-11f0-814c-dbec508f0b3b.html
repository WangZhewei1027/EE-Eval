<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ternary Search</title>
    <style>
        body {
            font-family: monospace;
        }
        input[type="text"] {
            width: 100%;
            height: 20px;
            padding: 0;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            height: 20px;
            padding: 0;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #ccc;
        }
        #ternary-search-container {
            width: 80%;
            height: 500px;
            padding: 20px;
            border: 1px solid black;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        #ternary-search-container input[type="number"] {
            width: 100%;
            height: 20px;
            padding: 0;
            margin-bottom: 10px;
        }
        #ternary-search-container input[type="text"] {
            width: 100%;
            height: 20px;
            padding: 0;
            margin-bottom: 10px;
        }
        #ternary-search-container button {
            width: 100%;
            height: 20px;
            padding: 0;
            margin-bottom: 10px;
        }
        #ternary-search-container button:hover {
            background-color: #ccc;
        }
        #ternary-search-container .search-button {
            width: 100%;
            height: 20px;
            padding: 0;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #ternary-search-container .search-button:hover {
            background-color: #ccc;
        }
        #ternary-search-container .search-button:active {
            background-color: #aaa;
        }
        #ternary-search-container .search-input {
            width: 100%;
            height: 20px;
            padding: 0;
            margin-bottom: 10px;
        }
        #ternary-search-container .search-input input[type="text"] {
            width: 100%;
            height: 20px;
            padding: 0;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="ternary-search-container">
        <input type="number" id="ternary-search-input" placeholder="Search...">
        <button id="ternary-search-button">Search</button>
        <button id="ternary-search-clear">Clear</button>
        <div id="ternary-search-results"></div>
    </div>

    <script>
        let ternarySearchResults = [];
        const ternarySearchInput = document.getElementById('ternary-search-input');
        const ternarySearchButton = document.getElementById('ternary-search-button');
        const ternarySearchClearButton = document.getElementById('ternary-search-clear');
        const ternarySearchResultsDiv = document.getElementById('ternary-search-results');

        ternarySearchButton.addEventListener('click', searchTernary);
        ternarySearchClearButton.addEventListener('click', clearTernarySearch);

        function searchTernary() {
            const searchValue = ternarySearchInput.value.trim();
            if (searchValue === '') {
                return;
            }
            ternarySearchResults = [];
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 10; j++) {
                    for (let k = 0; k < 10; k++) {
                        ternarySearchResults.push({
                            i,
                            j,
                            k,
                            value: searchValue
                        });
                    }
                }
            }
            ternarySearchResults.sort((a, b) => a.value.localeCompare(b.value));
            displayTernarySearchResults();
        }

        function displayTernarySearchResults() {
            ternarySearchResultsDiv.innerHTML = '';
            for (let i = 0; i < ternarySearchResults.length; i++) {
                const result = ternarySearchResults[i];
                const row = document.createElement('div');
                row.className = 'ternary-search-result';
                row.innerHTML = `${result.i} ${result.j} ${result.k} ${result.value}`;
                ternarySearchResultsDiv.appendChild(row);
            }
        }

        function clearTernarySearch() {
            ternarySearchResults = [];
            displayTernarySearchResults();
        }
    </script>
</body>
</html>
