<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Radix Sort Interactive Simulator</title>
  <style>
    /* Extremely minimal visual design: plain black text on white background */
    html,body { margin: 8px; padding: 0; font-family: monospace; color: black; background: white; }
    .section { margin-bottom: 12px; }
    label { display: inline-block; min-width: 120px; }
    input[type="text"], input[type="number"], select, textarea { font-family: monospace; }
    textarea { width: 98%; height: 56px; }
    button { margin: 2px; }
    .row { margin-bottom: 6px; }
    .buckets { white-space: pre; font-family: monospace; }
    .panel { border: 1px solid #00000010; padding: 6px; margin-bottom: 6px; }
    .small { font-size: 12px; }
    .log { height: 160px; overflow: auto; border: 1px solid #ccc; padding: 4px; }
    .history-list { height: 160px; overflow: auto; border: 1px solid #ccc; padding: 4px; }
    .inline { display: inline-block; vertical-align: middle; }
    /* keep visuals minimal; subtle borders only */
  </style>
</head>
<body>
  <h1>Radix Sort Interactive Simulator</h1>

  <div class="section panel" id="inputPanel">
    <div class="row">
      <label>Array (comma sep):</label>
      <input type="text" id="arrayInput" size="80" value="170,45,75,90,802,24,2,66">
      <button id="loadArrayBtn">Load Array</button>
      <button id="clearArrayBtn">Clear</button>
    </div>

    <div class="row">
      <label>Randomize:</label>
      Size: <input type="number" id="randSize" value="8" min="1" style="width:60px">
      Min: <input type="number" id="randMin" value="0" style="width:60px">
      Max: <input type="number" id="randMax" value="999" style="width:80px">
      <button id="randBtn">Randomize</button>
      <label class="inline small">Presets:</label>
      <select id="presets">
        <option value="">-- select preset --</option>
        <option value="170,45,75,90,802,24,2,66">Classic Example</option>
        <option value="3,1,4,1,5,9,2,6,5,3,5">Small Repeated</option>
        <option value="1000,100,10,1,0">Descending Magnitudes</option>
        <option value="-5,-1,-3,2,0,1,-2">Negatives Mixed</option>
        <option value="255,128,64,32,16,8,4,2,1">Powers of Two</option>
      </select>
    </div>

    <div class="row">
      <label>Add value:</label>
      <input type="text" id="addValue" size="10">
      <button id="addBtn">Add</button>
      <label style="min-width:80px;">Remove index:</label>
      <input type="number" id="removeIndex" style="width:60px">
      <button id="removeBtn">Remove</button>
    </div>

    <div class="row">
      <label>Edit current array:</label>
      <button id="editCurrentBtn">Edit Current State Array</button>
      <button id="recomputeFromHereBtn">Recompute From Here</button>
    </div>

  </div>

  <div class="section panel" id="settingsPanel">
    <div class="row">
      <label>Variant:</label>
      <select id="variant">
        <option value="LSD">LSD (Least Significant Digit)</option>
        <option value="MSD">MSD (Most Significant Digit)</option>
      </select>

      <label style="min-width:80px;">Base (radix):</label>
      <input type="number" id="base" value="10" min="2" max="36" style="width:60px">
      <label style="min-width:80px;">Mode:</label>
      <select id="placementMode">
        <option value="buckets">Bucket Append</option>
        <option value="counting">Counting-Stable</option>
      </select>
    </div>

    <div class="row">
      <label>Max digits:</label>
      <input type="number" id="maxDigits" value="auto" style="width:80px">
      <label style="min-width:80px;">Auto:</label>
      <input type="checkbox" id="autoDigits" checked>
      <label style="min-width:80px;">Stable (force):</label>
      <input type="checkbox" id="forceStable" checked>
    </div>

    <div class="row">
      <label>Handle negatives:</label>
      <input type="checkbox" id="handleNeg" checked>
      <label style="min-width:80px;">Direction:</label>
      <select id="direction">
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
      </select>
      <label style="min-width:80px;">Representation:</label>
      <select id="repr">
        <option value="dec">Decimal</option>
        <option value="bin">Binary</option>
        <option value="hex">Hex</option>
      </select>
    </div>

    <div class="row">
      <label>Show details:</label>
      <input type="checkbox" id="showCounts" checked>Counts
      <input type="checkbox" id="showLogs" checked>Logs
      <input type="checkbox" id="showHistory" checked>History
    </div>
  </div>

  <div class="section panel" id="simControl">
    <div class="row">
      <button id="buildBtn">Build Full History</button>
      <button id="playBtn">Play</button>
      <button id="pauseBtn">Pause</button>
      <button id="stepBackBtn">Step Back</button>
      <button id="stepForwardBtn">Step Forward</button>
      <button id="toStartBtn">To Start</button>
      <button id="toEndBtn">To End</button>
    </div>

    <div class="row">
      <label>Speed (ms):</label>
      <input type="range" id="speed" min="50" max="2000" value="500">
      <span id="speedVal">500</span>
      <label style="min-width:80px;">Auto-run:</label>
      <input type="checkbox" id="autorun">
      <label style="min-width:80px;">Step index:</label>
      <input type="number" id="stepIndexInput" style="width:80px">
      <button id="gotoStepBtn">Go</button>
    </div>

    <div class="row">
      <label>Bookmarks:</label>
      <input type="text" id="bookmarkName" placeholder="name">
      <button id="addBookmarkBtn">Add Bookmark</button>
      <select id="bookmarksList"></select>
      <button id="gotoBookmarkBtn">Go</button>
      <button id="delBookmarkBtn">Delete</button>
    </div>
  </div>

  <div class="section panel" id="statusPanel">
    <div class="row">
      <label>Current Step:</label>
      <span id="currentStep">0</span> / <span id="totalSteps">0</span>
      <label style="min-width:120px;">Pass / Digit:</label>
      <span id="currentPass">-</span>
      <label style="min-width:120px;">Action:</label>
      <span id="currentAction">-</span>
    </div>
  </div>

  <div class="section panel" id="visualPanel">
    <div class="row">
      <label>Main array:</label>
      <div id="mainArray" class="inline"></div>
    </div>

    <div class="row">
      <label>Buckets:</label>
      <div id="buckets" class="buckets"></div>
    </div>

    <div class="row" id="countsRow">
      <label>Counts / Prefix:</label>
      <div id="counts" class="inline"></div>
    </div>

    <div class="row">
      <label>Digit extraction (per element):</label>
      <div id="digitMap" class="inline small"></div>
    </div>
  </div>

  <div class="section panel" id="historyPanel">
    <div class="row">
      <label>History (click to jump):</label>
      <div id="historyList" class="history-list"></div>
    </div>

    <div class="row">
      <label>Logs:</label>
      <div id="logArea" class="log"></div>
    </div>

    <div class="row">
      <label>Export / Import History:</label>
      <button id="exportBtn">Export JSON</button>
      <button id="importBtn">Import JSON</button>
      <textarea id="exportArea" placeholder="history JSON appears here or paste JSON to import"></textarea>
      <div>
        <button id="clearHistoryBtn">Clear History</button>
      </div>
    </div>
  </div>

  <script>
    // Radix Sort Interactive Simulator
    (function(){
      // DOM refs
      const arrayInput = document.getElementById('arrayInput');
      const loadArrayBtn = document.getElementById('loadArrayBtn');
      const clearArrayBtn = document.getElementById('clearArrayBtn');
      const randBtn = document.getElementById('randBtn');
      const randSize = document.getElementById('randSize');
      const randMin = document.getElementById('randMin');
      const randMax = document.getElementById('randMax');
      const presets = document.getElementById('presets');
      const addValue = document.getElementById('addValue');
      const addBtn = document.getElementById('addBtn');
      const removeIndex = document.getElementById('removeIndex');
      const removeBtn = document.getElementById('removeBtn');
      const editCurrentBtn = document.getElementById('editCurrentBtn');
      const recomputeFromHereBtn = document.getElementById('recomputeFromHereBtn');

      const variantSelect = document.getElementById('variant');
      const baseInput = document.getElementById('base');
      const placementMode = document.getElementById('placementMode');
      const maxDigitsInput = document.getElementById('maxDigits');
      const autoDigits = document.getElementById('autoDigits');
      const forceStable = document.getElementById('forceStable');
      const handleNeg = document.getElementById('handleNeg');
      const directionSelect = document.getElementById('direction');
      const reprSelect = document.getElementById('repr');
      const showCounts = document.getElementById('showCounts');
      const showLogs = document.getElementById('showLogs');
      const showHistory = document.getElementById('showHistory');

      const buildBtn = document.getElementById('buildBtn');
      const playBtn = document.getElementById('playBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const stepBackBtn = document.getElementById('stepBackBtn');
      const stepForwardBtn = document.getElementById('stepForwardBtn');
      const toStartBtn = document.getElementById('toStartBtn');
      const toEndBtn = document.getElementById('toEndBtn');
      const speed = document.getElementById('speed');
      const speedVal = document.getElementById('speedVal');
      const autorun = document.getElementById('autorun');
      const stepIndexInput = document.getElementById('stepIndexInput');
      const gotoStepBtn = document.getElementById('gotoStepBtn');

      const addBookmarkBtn = document.getElementById('addBookmarkBtn');
      const bookmarkName = document.getElementById('bookmarkName');
      const bookmarksList = document.getElementById('bookmarksList');
      const gotoBookmarkBtn = document.getElementById('gotoBookmarkBtn');
      const delBookmarkBtn = document.getElementById('delBookmarkBtn');

      const currentStepSpan = document.getElementById('currentStep');
      const totalStepsSpan = document.getElementById('totalSteps');
      const currentPassSpan = document.getElementById('currentPass');
      const currentActionSpan = document.getElementById('currentAction');

      const mainArrayDiv = document.getElementById('mainArray');
      const bucketsDiv = document.getElementById('buckets');
      const countsDiv = document.getElementById('counts');
      const digitMapDiv = document.getElementById('digitMap');

      const historyListDiv = document.getElementById('historyList');
      const logArea = document.getElementById('logArea');

      const exportBtn = document.getElementById('exportBtn');
      const importBtn = document.getElementById('importBtn');
      const exportArea = document.getElementById('exportArea');
      const clearHistoryBtn = document.getElementById('clearHistoryBtn');

      // State
      let workingArray = []; // base array
      let history = []; // array of state snapshots
      let currentIndex = 0;
      let playTimer = null;
      let bookmarks = {};
      speedVal.textContent = speed.value;

      // Utility helpers
      function parseArrayString(s){
        if(!s || !s.trim()) return [];
        return s.split(',').map(x=>x.trim()).filter(x=>x.length>0).map(x=>{
          const n = Number(x);
          return Number.isFinite(n) ? n : parseInt(x, 10) || 0;
        });
      }

      function snapshot(state){ // deep snapshot helper
        return JSON.parse(JSON.stringify(state));
      }

      function formatValue(v){
        const repr = reprSelect.value;
        if(repr === 'dec') return String(v);
        if(repr === 'bin') return '0b' + (v>>>0).toString(2);
        if(repr === 'hex') return '0x' + (v>>>0).toString(16).toUpperCase();
        return String(v);
      }

      // Digit extraction dealing with negatives via offset
      function computeOffsetIfNeeded(arr, useNeg){
        if(!useNeg) return 0;
        const min = arr.reduce((m,x)=>Math.min(m,x), Infinity);
        return (min < 0) ? -min : 0;
      }

      function getDigit(value, pos, base, offset){
        let v = value + (offset||0);
        v = Math.abs(v);
        const d = Math.floor(v / Math.pow(base, pos)) % base;
        return Math.floor(d);
      }

      function maxDigitsForArray(arr, base, offset){
        const mx = arr.reduce((m,x)=>Math.max(m, Math.abs(x + (offset||0))), 0);
        if(mx === 0) return 1;
        return Math.floor(Math.log(mx) / Math.log(base)) + 1;
      }

      // History builder for LSD with options of bucket append or counting-stable
      function buildHistoryFromArray(arr, options){
        // options: {variant, base, maxDigits, autoDigits, placementMode, direction, stable, handleNeg}
        const states = [];
        const base = options.base;
        const variant = options.variant;
        const placementMode = options.placementMode;
        const direction = options.direction;
        const stableForced = options.stable;
        const handleNeg = options.handleNeg;
        // compute offset for negatives
        const offset = computeOffsetIfNeeded(arr, handleNeg);
        const working = arr.slice();
        const maxDigits = options.autoDigits ? maxDigitsForArray(working, base, offset) : Math.max(1, options.maxDigits);

        // Add initial state
        states.push(snapshot({
          pass: -1,
          digitPos: -1,
          array: working.slice(),
          buckets: null,
          counts: null,
          action: 'Initial array',
          variant,
          base,
          offset
        }));

        if(variant === 'LSD'){
          for(let digitPos=0; digitPos<maxDigits; digitPos++){
            // start pass
            let buckets = new Array(base);
            for(let i=0;i<base;i++) buckets[i]=[];
            states.push(snapshot({
              pass: digitPos,
              digitPos,
              array: working.slice(),
              buckets: buckets.map(b=>b.slice()),
              counts: null,
              action: 'Start pass ' + digitPos + ' (LSD)',
              variant,
              base,
              offset
            }));
            if(placementMode === 'buckets'){
              // place each element into bucket with per-element steps
              for(let i=0;i<working.length;i++){
                const val = working[i];
                const d = getDigit(val, digitPos, base, offset);
                states.push(snapshot({
                  pass: digitPos,
                  digitPos,
                  array: working.slice(),
                  buckets: buckets.map(b=>b.slice()),
                  counts: null,
                  action: `Taking element index ${i} value ${val} -> digit ${d}`,
                  highlight: {index:i, bucket:d},
                  variant,
                  base,
                  offset
                }));
                buckets[d].push(val);
                states.push(snapshot({
                  pass: digitPos,
                  digitPos,
                  array: working.slice(),
                  buckets: buckets.map(b=>b.slice()),
                  counts: null,
                  action: `Placed ${val} into bucket ${d}`,
                  highlight: {index:i, bucket:d},
                  variant,
                  base,
                  offset
                }));
              }
              // Flatten buckets with per-extraction steps
              const old = working.slice();
              const newArr = [];
              const bucketOrder = (direction === 'asc') ? [...Array(base).keys()] : [...Array(base).keys()].reverse();
              states.push(snapshot({
                pass: digitPos,
                digitPos,
                array: old.slice(),
                buckets: buckets.map(b=>b.slice()),
                counts: null,
                action: `Flattening buckets (order: ${bucketOrder.join(',')})`,
                variant, base, offset
              }));
              for(const bIdx of bucketOrder){
                while(buckets[bIdx].length>0){
                  const v = buckets[bIdx].shift();
                  newArr.push(v);
                  states.push(snapshot({
                    pass: digitPos,
                    digitPos,
                    array: old.slice(), // keep old until after flatten finishes? show many micro-steps with new output as a separate field
                    buckets: buckets.map(b=>b.slice()),
                    counts: null,
                    outputBuilding: newArr.slice(),
                    action: `Moved ${v} from bucket ${bIdx} to output`,
                    variant, base, offset
                  }));
                }
              }
              // update working
              working.length = 0;
              newArr.forEach(x=>working.push(x));
              states.push(snapshot({
                pass: digitPos,
                digitPos,
                array: working.slice(),
                buckets: buckets.map(b=>b.slice()),
                counts: null,
                action: `After pass ${digitPos}, array = [${working.join(', ')}]`,
                variant, base, offset
              }));
            } else if(placementMode === 'counting'){
              // Counting-stable approach (typical stable LSD)
              const counts = new Array(base).fill(0);
              states.push(snapshot({
                pass: digitPos,
                digitPos,
                array: working.slice(),
                buckets: null,
                counts: counts.slice(),
                action: 'Counting digits',
                variant, base, offset
              }));
              // count digits
              for(let i=0;i<working.length;i++){
                const v = working[i];
                const d = getDigit(v, digitPos, base, offset);
                counts[d]++;
                states.push(snapshot({
                  pass: digitPos,
                  digitPos,
                  array: working.slice(),
                  buckets: null,
                  counts: counts.slice(),
                  action: `Counted digit ${d} from element ${v} (counts updated)`,
                  highlight: {index:i, bucket:d},
                  variant, base, offset
                }));
              }
              // prefix sums
              const prefix = counts.slice();
              for(let i=1;i<prefix.length;i++) prefix[i]+=prefix[i-1];
              states.push(snapshot({
                pass: digitPos,
                digitPos,
                array: working.slice(),
                buckets: null,
                counts: prefix.slice(),
                action: 'Prefix sums computed',
                variant, base, offset
              }));
              // build output by iterating original array in reverse for stability
              const output = new Array(working.length);
              for(let i=working.length-1;i>=0;i--){
                const v = working[i];
                const d = getDigit(v, digitPos, base, offset);
                prefix[d]--;
                const pos = prefix[d];
                output[pos] = v;
                states.push(snapshot({
                  pass: digitPos,
                  digitPos,
                  array: working.slice(),
                  buckets: null,
                  counts: prefix.slice(),
                  outputBuilding: output.slice(),
                  action: `Placed ${v} at output[${pos}] using digit ${d}`,
                  highlight: {index:i, bucket:d},
                  variant, base, offset
                }));
              }
              // finalize
              working.length = 0;
              output.forEach(x=>working.push(x));
              if(direction === 'desc') working.reverse();
              states.push(snapshot({
                pass: digitPos,
                digitPos,
                array: working.slice(),
                buckets: null,
                counts: null,
                action: `After pass ${digitPos} (counting), array = [${working.join(', ')}]`,
                variant, base, offset
              }));
            }
          }
          // final state
          states.push(snapshot({
            pass: maxDigits,
            digitPos: maxDigits,
            array: working.slice(),
            buckets: null,
            counts: null,
            action: 'Completed LSD radix sort',
            variant, base, offset
          }));
        } else if(variant === 'MSD'){
          // MSD: recursive partitioning starting from highest digit
          // We'll generate steps that show partitioning and then recursively sort buckets if necessary.
          const maxd = maxDigits;
          function msdRecursive(subArr, digitPos, pathPrefix){
            // subArr is array, digitPos is current digit (starting from maxd-1 down to 0)
            const startState = {
              pass: digitPos,
              digitPos,
              array: null,
              buckets: null,
              counts: null,
              action: `MSD partition at digit ${digitPos} for segment ${pathPrefix}`,
              variant, base, offset
            };
            // create buckets
            const buckets = new Array(base);
            for(let i=0;i<base;i++) buckets[i]=[];
            // put items into buckets (per-element steps)
            for(let i=0;i<subArr.length;i++){
              const v = subArr[i];
              const d = getDigit(v, digitPos, base, offset);
              states.push(snapshot({
                pass: digitPos,
                digitPos,
                array: null,
                buckets: buckets.map(b=>b.slice()),
                counts: null,
                action: `${pathPrefix}: taking ${v} -> digit ${d}`,
                highlight: {value:v, bucket:d},
                variant, base, offset
              }));
              buckets[d].push(v);
              states.push(snapshot({
                pass: digitPos,
                digitPos,
                array: null,
                buckets: buckets.map(b=>b.slice()),
                counts: null,
                action: `${pathPrefix}: placed ${v} into bucket ${d}`,
                variant, base, offset
              }));
            }
            // record partition completion
            states.push(snapshot({
              pass: digitPos,
              digitPos,
              array: null,
              buckets: buckets.map(b=>b.slice()),
              counts: null,
              action: `${pathPrefix}: partitioned into ${buckets.map(b=>b.length).join(',')}`,
              variant, base, offset
            }));
            // recursively sort each non-empty bucket if digitPos > 0
            let rebuilt = [];
            const bucketOrder = (direction === 'asc') ? [...Array(base).keys()] : [...Array(base).keys()].reverse();
            for(const bIdx of bucketOrder){
              const bucket = buckets[bIdx];
              if(bucket.length>1 && digitPos>0){
                states.push(snapshot({
                  pass: digitPos,
                  digitPos,
                  array: null,
                  buckets: buckets.map(b=>b.slice()),
                  counts: null,
                  action: `${pathPrefix}: descending into bucket ${bIdx} (size ${bucket.length})`,
                  variant, base, offset
                }));
                const sortedBucket = msdRecursive(bucket, digitPos-1, pathPrefix + '['+bIdx+']');
                // sortedBucket is array
                rebuilt = rebuilt.concat(sortedBucket);
              } else {
                // no recursion needed, append as-is
                rebuilt = rebuilt.concat(bucket);
              }
            }
            // after combining buckets
            states.push(snapshot({
              pass: digitPos,
              digitPos,
              array: rebuilt.slice(),
              buckets: buckets.map(b=>b.slice()),
              counts: null,
              action: `${pathPrefix}: after combining buckets at digit ${digitPos}`,
              variant, base, offset
            }));
            return rebuilt;
          }

          // Kick off MSD by creating an initial bucket partition at highest digit
          const initialMax = maxDigits - 1;
          // record initial pass
          states.push(snapshot({
            pass: initialMax,
            digitPos: initialMax,
            array: arr.slice(),
            buckets: null,
            counts: null,
            action: `Start MSD with highest digit ${initialMax}`,
            variant, base, offset
          }));
          // run recursive
          const sorted = msdRecursive(arr.slice(), initialMax, 'root');
          states.push(snapshot({
            pass: -999,
            digitPos: -999,
            array: sorted.slice(),
            buckets: null,
            counts: null,
            action: 'Completed MSD radix sort',
            variant, base, offset
          }));
        }

        return states;
      }

      // Rendering functions
      function renderCurrent(){
        const total = history.length;
        if(total === 0){
          currentIndex = 0;
          currentStepSpan.textContent = '0';
          totalStepsSpan.textContent = '0';
          mainArrayDiv.textContent = '';
          bucketsDiv.textContent = '';
          countsDiv.textContent = '';
          digitMapDiv.textContent = '';
          currentPassSpan.textContent = '-';
          currentActionSpan.textContent = '-';
          historyListDiv.innerHTML = '';
          logArea.textContent = '';
          return;
        }
        if(currentIndex < 0) currentIndex = 0;
        if(currentIndex >= total) currentIndex = total - 1;
        const st = history[currentIndex];
        currentStepSpan.textContent = currentIndex;
        totalStepsSpan.textContent = total - 1;
        currentPassSpan.textContent = (typeof st.pass === 'number' ? st.pass : '-');
        currentActionSpan.textContent = st.action || '-';
        // main array display
        const arr = st.array || (st.outputBuilding ? st.outputBuilding : null) || [];
        const arrDisplay = (arr && arr.length>0) ? arr.map((v,i)=>`[${i}]: ${formatValue(v)}`).join('  ') : '(empty)';
        mainArrayDiv.textContent = arrDisplay;
        // buckets
        if(st.buckets && Array.isArray(st.buckets)){
          const bucketLines = st.buckets.map((b,i)=>`${i}: [${b.map(x=>formatValue(x)).join(', ')}]`);
          bucketsDiv.textContent = bucketLines.join('\n');
        } else {
          bucketsDiv.textContent = '(none)';
        }
        // counts
        if(showCounts.checked && st.counts){
          countsDiv.textContent = '[' + st.counts.join(', ') + ']';
        } else {
          countsDiv.textContent = '';
        }
        // digit map for current array and digitPos
        if(st.array && typeof st.digitPos === 'number' && st.digitPos >= 0 && st.base){
          const dm = st.array.map(v=>`${formatValue(v)}->${getDigit(v, st.digitPos, st.base, st.offset)}`).join('  ');
          digitMapDiv.textContent = dm;
        } else if(st.array){
          // show digits for next possible digit pos 0
          const dm = st.array.map(v=>`${formatValue(v)}`).join('  ');
          digitMapDiv.textContent = dm;
        } else digitMapDiv.textContent = '';

        // logs
        if(showLogs.checked){
          // show a small amount of log: present action list up to current step
          logArea.textContent = history.slice(0, currentIndex+1).map((s,i)=>`${i}: ${s.action}`).join('\n');
        } else {
          logArea.textContent = '';
        }

        // history list clickable
        if(showHistory.checked){
          historyListDiv.innerHTML = '';
          history.forEach((s,i)=>{
            const el = document.createElement('div');
            el.textContent = `${i}: ${s.action}`;
            el.style.cursor = 'pointer';
            el.onclick = ()=>{ currentIndex = i; renderCurrent(); pause(); };
            if(i === currentIndex) el.style.fontWeight = 'bold';
            historyListDiv.appendChild(el);
          });
        } else {
          historyListDiv.innerHTML = '';
        }
        stepIndexInput.value = currentIndex;
      }

      function buildAndRender(){
        // parse current input into workingArray
        workingArray = parseArrayString(arrayInput.value);
        const options = {
          variant: variantSelect.value,
          base: Math.max(2, Math.min(36, parseInt(baseInput.value) || 10)),
          placementMode: placementMode.value,
          direction: directionSelect.value,
          autoDigits: autoDigits.checked,
          maxDigits: (autoDigits.checked ? 0 : Math.max(1, parseInt(maxDigitsInput.value) || 1)),
          stable: forceStable.checked,
          handleNeg: handleNeg.checked
        };
        history = buildHistoryFromArray(workingArray, options);
        currentIndex = 0;
        renderCurrent();
      }

      // Controls actions
      loadArrayBtn.addEventListener('click', ()=>{ workingArray = parseArrayString(arrayInput.value); buildAndRender(); });
      clearArrayBtn.addEventListener('click', ()=>{ arrayInput.value=''; workingArray=[]; buildAndRender(); });
      presets.addEventListener('change', ()=>{
        if(presets.value) arrayInput.value = presets.value;
      });
      randBtn.addEventListener('click', ()=>{
        const size = Math.max(1, parseInt(randSize.value) || 8);
        const min = parseInt(randMin.value) || 0;
        const max = parseInt(randMax.value) || (min+100);
        const arr = [];
        for(let i=0;i<size;i++){
          const r = Math.floor(Math.random()*(max-min+1))+min;
          // include some negatives randomly
          if(handleNeg.checked && Math.random()<0.15) arr.push(r * -1);
          else arr.push(r);
        }
        arrayInput.value = arr.join(', ');
        workingArray = arr.slice();
        buildAndRender();
      });

      addBtn.addEventListener('click', ()=>{
        const v = addValue.value.trim();
        if(!v) return;
        const n = Number(v);
        if(!isNaN(n)) workingArray.push(n);
        else workingArray.push(parseInt(v,10) || 0);
        arrayInput.value = workingArray.join(', ');
        buildAndRender();
      });

      removeBtn.addEventListener('click', ()=>{
        const idx = parseInt(removeIndex.value);
        if(!Number.isFinite(idx)) return;
        if(idx<0 || idx>=workingArray.length) return;
        workingArray.splice(idx,1);
        arrayInput.value = workingArray.join(', ');
        buildAndRender();
      });

      editCurrentBtn.addEventListener('click', ()=>{
        if(history.length === 0) return;
        const st = history[currentIndex];
        const arr = st.array || [];
        const newStr = prompt('Edit the array at current state (comma-separated). Note: changes only affect subsequent recomputation if you choose "Recompute From Here".', arr.join(', '));
        if(newStr === null) return;
        try {
          const newArr = parseArrayString(newStr);
          // place edited snapshot into current state array for visual editing only
          history[currentIndex].array = newArr.slice();
          // show editing but not recompute automatically
          renderCurrent();
        } catch(e){
          alert('Invalid input');
        }
      });

      recomputeFromHereBtn.addEventListener('click', ()=>{
        if(history.length === 0) return;
        // Ask whether to recompute full history from this state using its array snapshot
        const st = history[currentIndex];
        const arr = st.array || [];
        const should = confirm('Recompute full history from this state array and current settings? This will discard history and rebuild from this array.');
        if(!should) return;
        arrayInput.value = arr.join(', ');
        workingArray = arr.slice();
        buildAndRender();
      });

      buildBtn.addEventListener('click', ()=>{
        buildAndRender();
      });

      // Playback controls
      function play(){
        if(history.length === 0) return;
        if(playTimer) clearInterval(playTimer);
        playTimer = setInterval(()=>{
          currentIndex++;
          if(currentIndex >= history.length){
            clearInterval(playTimer);
            playTimer = null;
            return;
          }
          renderCurrent();
        }, parseInt(speed.value));
      }
      function pause(){
        if(playTimer) clearInterval(playTimer);
        playTimer = null;
      }
      playBtn.addEventListener('click', ()=>{ play(); });
      pauseBtn.addEventListener('click', ()=>{ pause(); });

      stepForwardBtn.addEventListener('click', ()=>{
        if(currentIndex < history.length-1) currentIndex++;
        renderCurrent();
      });
      stepBackBtn.addEventListener('click', ()=>{
        if(currentIndex > 0) currentIndex--;
        renderCurrent();
      });
      toStartBtn.addEventListener('click', ()=>{
        currentIndex = 0;
        renderCurrent();
      });
      toEndBtn.addEventListener('click', ()=>{
        currentIndex = Math.max(0, history.length-1);
        renderCurrent();
      });

      speed.addEventListener('input', ()=>{
        speedVal.textContent = speed.value;
        if(playTimer){
          // restart timer with new speed
          pause();
          play();
        }
      });

      gotoStepBtn.addEventListener('click', ()=>{
        const idx = parseInt(stepIndexInput.value);
        if(Number.isFinite(idx) && idx>=0 && idx<history.length){
          currentIndex = idx;
          renderCurrent();
        }
      });

      // Bookmarks
      addBookmarkBtn.addEventListener('click', ()=>{
        const name = bookmarkName.value.trim() || ('bm' + Date.now());
        bookmarks[name] = currentIndex;
        refreshBookmarksUI();
      });
      gotoBookmarkBtn.addEventListener('click', ()=>{
        const nm = bookmarksList.value;
        if(!nm) return;
        const idx = bookmarks[nm];
        if(Number.isFinite(idx)) currentIndex = idx;
        renderCurrent();
      });
      delBookmarkBtn.addEventListener('click', ()=>{
        const nm = bookmarksList.value;
        if(!nm) return;
        delete bookmarks[nm];
        refreshBookmarksUI();
      });
      function refreshBookmarksUI(){
        bookmarksList.innerHTML = '';
        Object.keys(bookmarks).forEach(k=>{
          const opt = document.createElement('option');
          opt.value = k;
          opt.textContent = k + ' -> ' + bookmarks[k];
          bookmarksList.appendChild(opt);
        });
      }

      // History export/import
      exportBtn.addEventListener('click', ()=>{
        exportArea.value = JSON.stringify(history);
      });
      importBtn.addEventListener('click', ()=>{
        const txt = exportArea.value.trim();
        if(!txt) return;
        try {
          const imported = JSON.parse(txt);
          if(!Array.isArray(imported)) throw new Error('Invalid history JSON');
          history = imported;
          currentIndex = 0;
          renderCurrent();
        } catch(e){
          alert('Import failed: ' + e.message);
        }
      });

      clearHistoryBtn.addEventListener('click', ()=>{
        history = [];
        currentIndex = 0;
        renderCurrent();
      });

      // Clicking on log lines jumps to that step
      logArea.addEventListener('click', (ev)=>{
        // try to parse clicked line number from caret position
        const text = logArea.textContent;
        const pos = logArea.selectionStart || 0;
        // fallback: jump to next line index if cannot determine
      });

      // Initialize with default build
      buildAndRender();

      // Auto-run if set
      autorun.addEventListener('change', ()=>{
        if(autorun.checked) play();
        else pause();
      });

      // Keyboard shortcuts (simple)
      window.addEventListener('keydown', (ev)=>{
        if(ev.key === 'ArrowRight') { stepForwardBtn.click(); ev.preventDefault(); }
        else if(ev.key === 'ArrowLeft') { stepBackBtn.click(); ev.preventDefault(); }
        else if(ev.key === ' ') { if(playTimer) pause(); else play(); ev.preventDefault(); }
      });

      // Basic input validation when settings change
      baseInput.addEventListener('change', ()=>{ if(parseInt(baseInput.value)<2) baseInput.value = 2; });
      maxDigitsInput.addEventListener('change', ()=>{ if(maxDigitsInput.value === '' || maxDigitsInput.value === 'auto') { autoDigits.checked = true; } });

      // Re-render when toggling labels or options for immediate feedback (doesn't rebuild history)
      [reprSelect, showCounts, showLogs, showHistory].forEach(el=>{
        el.addEventListener('change', ()=>{ renderCurrent(); });
      });

    })();
  </script>
</body>
</html>
