<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduling Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .output {
            margin-top: 20px;
            border: 1px solid black;
            padding: 10px;
            min-height: 50px;
        }
    </style>
</head>
<body>
    <h1>CPU Scheduling Simulator</h1>
    
    <h2>Add a Process</h2>
    Process ID: <input type="text" id="processID"><br>
    Burst Time: <input type="number" id="burstTime"><br>
    Arrival Time: <input type="number" id="arrivalTime"><br>
    <button onclick="addProcess()">Add Process</button>
    
    <h2>Scheduling Algorithms</h2>
    <button onclick="scheduleFCFS()">First Come First Serve (FCFS)</button>
    <button onclick="scheduleSJF()">Shortest Job First (SJF)</button>
    <button onclick="scheduleRR()">Round Robin (RR)</button><br>
    Time Quantum (for RR): <input type="number" id="timeQuantum" value="2"><br>

    <h2>Process List</h2>
    <div id="processList" class="output"></div>

    <h2>Scheduling Output</h2>
    <div id="schedulingOutput" class="output"></div>

    <script>
        let processList = [];

        function addProcess() {
            const id = document.getElementById('processID').value;
            const burst = parseInt(document.getElementById('burstTime').value);
            const arrival = parseInt(document.getElementById('arrivalTime').value);

            if (id && !isNaN(burst) && !isNaN(arrival)) {
                processList.push({ id, burst, arrival });
                updateProcessList();
            }
        }

        function updateProcessList() {
            const processDiv = document.getElementById('processList');
            processDiv.innerHTML = JSON.stringify(processList, null, 2);
        }

        function scheduleFCFS() {
            let time = 0;
            let output = [];
            processList.sort((a, b) => a.arrival - b.arrival);

            for (let process of processList) {
                if (time < process.arrival) time = process.arrival;
                output.push(`Process ${process.id} starts at ${time} and finishes at ${time + process.burst}`);
                time += process.burst;
            }
            document.getElementById('schedulingOutput').innerText = output.join('\n');
        }

        function scheduleSJF() {
            let time = 0;
            let output = [];
            let processes = [...processList];

            while (processes.length > 0) {
                processes.sort((a, b) => a.burst - b.burst);
                const process = processes.find(p => p.arrival <= time);

                if (process) {
                    output.push(`Process ${process.id} starts at ${time} and finishes at ${time + process.burst}`);
                    time += process.burst;
                    processes = processes.filter(p => p.id !== process.id);
                } else {
                    time++;
                }
            }

            document.getElementById('schedulingOutput').innerText = output.join('\n');
        }

        function scheduleRR() {
            const timeQuantum = parseInt(document.getElementById('timeQuantum').value);
            let time = 0;
            let output = [];
            let queue = [...processList];

            while (queue.length > 0) {
                let process = queue.shift();
                if (process.arrival <= time) {
                    const slice = Math.min(process.burst, timeQuantum);
                    output.push(`Process ${process.id} starts at ${time} and runs for ${slice}`);
                    time += slice;

                    process.burst -= slice;

                    if (process.burst > 0) {
                        queue.push(process);
                    } else {
                        output.push(`Process ${process.id} finishes at ${time}`);
                    }
                } else {
                    queue.push(process);
                }
            }

            document.getElementById('schedulingOutput').innerText = output.join('\n');
        }
    </script>
</body>
</html>
