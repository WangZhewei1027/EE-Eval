<!DOCTYPE html>
<html>
<head>
    <title>Interactive Binary Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .control-group {
            border: 1px solid #ccc;
            padding: 10px;
            margin-right: 10px;
        }
        canvas {
            border: 1px solid #000;
            margin-top: 20px;
        }
        input, button, select {
            margin: 5px;
        }
        .node-info {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Interactive Binary Tree</h1>
    <div class="container">
        <div class="controls">
            <div class="control-group">
                <h3>Tree Construction</h3>
                <input type="number" id="insertValue" placeholder="Enter value">
                <button onclick="insertNode()">Insert Node</button>
                <button onclick="deleteNode()">Delete Node</button>
                <button onclick="generateRandomTree()">Random Tree</button>
                <button onclick="clearTree()">Clear Tree</button>
            </div>

            <div class="control-group">
                <h3>Traversal</h3>
                <button onclick="traverse('inorder')">Inorder</button>
                <button onclick="traverse('preorder')">Preorder</button>
                <button onclick="traverse('postorder')">Postorder</button>
                <button onclick="traverse('levelorder')">Level Order</button>
            </div>

            <div class="control-group">
                <h3>Tree Properties</h3>
                <button onclick="showHeight()">Show Height</button>
                <button onclick="showSize()">Show Size</button>
                <button onclick="showMinMax()">Show Min/Max</button>
                <button onclick="checkBalanced()">Check Balanced</button>
                <button onclick="checkBST()">Check BST</button>
            </div>

            <div class="control-group">
                <h3>Visual Settings</h3>
                <label>Node Radius: <input type="range" id="nodeSize" min="10" max="50" value="20" onchange="redrawTree()"></label>
                <label>Level Spacing: <input type="range" id="levelSpacing" min="30" max="150" value="80" onchange="redrawTree()"></label>
                <label>Horizontal Spacing: <input type="range" id="horizontalSpacing" min="20" max="100" value="50" onchange="redrawTree()"></label>
                <select id="treeStyle" onchange="redrawTree()">
                    <option value="standard">Standard</option>
                    <option value="compact">Compact</option>
                    <option value="wide">Wide</option>
                </select>
            </div>

            <div class="control-group">
                <h3>Search & Path</h3>
                <input type="number" id="searchValue" placeholder="Enter value">
                <button onclick="findNode()">Find Node</button>
                <button onclick="findPath()">Find Path to Node</button>
                <button onclick="findLCA()">Find Lowest Common Ancestor</button>
            </div>
        </div>

        <canvas id="treeCanvas" width="1000" height="600"></canvas>

        <div class="node-info" id="nodeInfo">
            Node information will appear here
        </div>

        <div class="control-group">
            <h3>Tree Operations</h3>
            <button onclick="mirrorTree()">Mirror Tree</button>
            <button onclick="invertTree()">Invert Tree</button>
            <button onclick="doubleTree()">Double Tree</button>
            <button onclick="convertToBST()">Convert to BST</button>
            <div>
                <input type="number" id="kthValue" placeholder="Enter k">
                <button onclick="findKthSmallest()">Find k-th Smallest</button>
                <button onclick="findKthLargest()">Find k-th Largest</button>
            </div>
        </div>
    </div>

    <script>
        // Binary Tree implementation
        class TreeNode {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
                this.x = 0;
                this.y = 0;
                this.highlighted = false;
                this.visited = false;
            }
        }

        let root = null;
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        let traversalResult = [];
        let traversalIndex = 0;
        let traversalInterval = null;

        // Tree operations
        function insertNode() {
            const value = parseInt(document.getElementById('insertValue').value);
            if (isNaN(value)) return;
            
            if (!root) {
                root = new TreeNode(value);
            } else {
                insertNodeRecursive(root, value);
            }
            redrawTree();
            document.getElementById('insertValue').value = '';
        }

        function insertNodeRecursive(node, value) {
            if (value < node.value) {
                if (node.left === null) {
                    node.left = new TreeNode(value);
                } else {
                    insertNodeRecursive(node.left, value);
                }
            } else {
                if (node.right === null) {
                    node.right = new TreeNode(value);
                } else {
                    insertNodeRecursive(node.right, value);
                }
            }
        }

        function deleteNode() {
            const value = parseInt(document.getElementById('insertValue').value);
            if (isNaN(value)) return;
            
            root = deleteNodeRecursive(root, value);
            redrawTree();
            document.getElementById('insertValue').value = '';
        }

        function deleteNodeRecursive(node, value) {
            if (node === null) return null;
            
            if (value < node.value) {
                node.left = deleteNodeRecursive(node.left, value);
            } else if (value > node.value) {
                node.right = deleteNodeRecursive(node.right, value);
            } else {
                if (node.left === null) return node.right;
                if (node.right === null) return node.left;
                
                const minNode = findMin(node.right);
                node.value = minNode.value;
                node.right = deleteNodeRecursive(node.right, minNode.value);
            }
            return node;
        }

        function findMin(node) {
            while (node.left !== null) node = node.left;
            return node;
        }

        function generateRandomTree() {
            clearTree();
            const nodeCount = Math.floor(Math.random() * 15) + 5;
            for (let i = 0; i < nodeCount; i++) {
                const value = Math.floor(Math.random() * 100);
                if (!root) {
                    root = new TreeNode(value);
                } else {
                    insertNodeRecursive(root, value);
                }
            }
            redrawTree();
        }

        function clearTree() {
            root = null;
            clearTraversal();
            redrawTree();
        }

        // Traversals
        function traverse(type) {
            clearTraversal();
            traversalResult = [];
            
            switch (type) {
                case 'inorder':
                    inorderTraversal(root);
                    break;
                case 'preorder':
                    preorderTraversal(root);
                    break;
                case 'postorder':
                    postorderTraversal(root);
                    break;
                case 'levelorder':
                    levelOrderTraversal(root);
                    break;
            }
            
            startTraversalAnimation();
        }

        function inorderTraversal(node) {
            if (node === null) return;
            inorderTraversal(node.left);
            traversalResult.push(node);
            inorderTraversal(node.right);
        }

        function preorderTraversal(node) {
            if (node === null) return;
            traversalResult.push(node);
            preorderTraversal(node.left);
            preorderTraversal(node.right);
        }

        function postorderTraversal(node) {
            if (node === null) return;
            postorderTraversal(node.left);
            postorderTraversal(node.right);
            traversalResult.push(node);
        }

        function levelOrderTraversal(node) {
            if (node === null) return;
            const queue = [node];
            while (queue.length > 0) {
                const current = queue.shift();
                traversalResult.push(current);
                if (current.left) queue.push(current.left);
                if (current.right) queue.push(current.right);
            }
        }

        function startTraversalAnimation() {
            if (traversalInterval) clearInterval(traversalInterval);
            
            traversalIndex = 0;
            traversalInterval = setInterval(() => {
                if (traversalIndex >= traversalResult.length) {
                    clearTraversal();
                    return;
                }
                
                // Reset all nodes
                resetNodeHighlights();
                
                // Highlight current node
                const node = traversalResult[traversalIndex];
                node.highlighted = true;
                document.getElementById('nodeInfo').textContent = `Traversal Step ${traversalIndex + 1}/${traversalResult.length}: Node ${node.value}`;
                
                redrawTree();
                traversalIndex++;
            }, 800);
        }

        function clearTraversal() {
            if (traversalInterval) clearInterval(traversalInterval);
            traversalInterval = null;
            traversalResult = [];
            traversalIndex = 0;
            resetNodeHighlights();
            document.getElementById('nodeInfo').textContent = 'Node information will appear here';
            redrawTree();
        }

        function resetNodeHighlights() {
            function reset(node) {
                if (node === null) return;
                node.highlighted = false;
                node.visited = false;
                reset(node.left);
                reset(node.right);
            }
            reset(root);
        }

        // Tree properties
        function showHeight() {
            const height = calculateHeight(root);
            document.getElementById('nodeInfo').textContent = `Tree height: ${height}`;
        }

        function calculateHeight(node) {
            if (node === null) return 0;
            return 1 + Math.max(calculateHeight(node.left), calculateHeight(node.right));
        }

        function showSize() {
            const size = calculateSize(root);
            document.getElementById('nodeInfo').textContent = `Tree size: ${size} nodes`;
        }

        function calculateSize(node) {
            if (node === null) return 0;
            return 1 + calculateSize(node.left) + calculateSize(node.right);
        }

        function showMinMax() {
            if (!root) {
                document.getElementById('nodeInfo').textContent = 'Tree is empty';
                return;
            }
            
            const min = findMinValue(root);
            const max = findMaxValue(root);
            document.getElementById('nodeInfo').textContent = `Min value: ${min}, Max value: ${max}`;
        }

        function findMinValue(node) {
            while (node.left !== null) node = node.left;
            return node.value;
        }

        function findMaxValue(node) {
            while (node.right !== null) node = node.right;
            return node.value;
        }

        function checkBalanced() {
            const isBalanced = isTreeBalanced(root);
            document.getElementById('nodeInfo').textContent = isBalanced ? 
                'Tree is balanced' : 'Tree is not balanced';
        }

        function isTreeBalanced(node) {
            if (node === null) return true;
            
            const leftHeight = calculateHeight(node.left);
            const rightHeight = calculateHeight(node.right);
            
            return Math.abs(leftHeight - rightHeight) <= 1 && 
                   isTreeBalanced(node.left) && 
                   isTreeBalanced(node.right);
        }

        function checkBST() {
            const isBST = isBinarySearchTree(root);
            document.getElementById('nodeInfo').textContent = isBST ? 
                'Tree is a Binary Search Tree' : 'Tree is NOT a Binary Search Tree';
        }

        function isBinarySearchTree(node, min = -Infinity, max = Infinity) {
            if (node === null) return true;
            
            if (node.value <= min || node.value >= max) return false;
            
            return isBinarySearchTree(node.left, min, node.value) && 
                   isBinarySearchTree(node.right, node.value, max);
        }

        // Search operations
        function findNode() {
            const value = parseInt(document.getElementById('searchValue').value);
            if (isNaN(value)) return;
            
            const node = findNodeRecursive(root, value);
            if (node) {
                resetNodeHighlights();
                node.highlighted = true;
                redrawTree();
                document.getElementById('nodeInfo').textContent = `Found node with value ${value}`;
            } else {
                document.getElementById('nodeInfo').textContent = `Node with value ${value} not found`;
            }
        }

        function findNodeRecursive(node, value) {
            if (node === null) return null;
            if (node.value === value) return node;
            
            if (value < node.value) {
                return findNodeRecursive(node.left, value);
            } else {
                return findNodeRecursive(node.right, value);
            }
        }

        function findPath() {
            const value = parseInt(document.getElementById('searchValue').value);
            if (isNaN(value)) return;
            
            const path = [];
            const found = findPathRecursive(root, value, path);
            
            if (found) {
                resetNodeHighlights();
                path.forEach(node => node.highlighted = true);
                redrawTree();
                const pathValues = path.map(node => node.value).join(' → ');
                document.getElementById('nodeInfo').textContent = `Path to ${value}: ${pathValues}`;
            } else {
                document.getElementById('nodeInfo').textContent = `Node with value ${value} not found`;
            }
        }

        function findPathRecursive(node, value, path) {
            if (node === null) return false;
            
            path.push(node);
            
            if (node.value === value) return true;
            
            if (findPathRecursive(node.left, value, path) || 
                findPathRecursive(node.right, value, path)) {
                return true;
            }
            
            path.pop();
            return false;
        }

        function findLCA() {
            const value1 = parseInt(prompt("Enter first node value:"));
            const value2 = parseInt(prompt("Enter second node value:"));
            
            if (isNaN(value1) || isNaN(value2)) return;
            
            const node1 = findNodeRecursive(root, value1);
            const node2 = findNodeRecursive(root, value2);
            
            if (!node1 || !node2) {
                document.getElementById('nodeInfo').textContent = 
                    `One or both nodes (${value1}, ${value2}) not found`;
                return;
            }
            
            const lca = findLCARecursive(root, node1, node2);
            
            resetNodeHighlights();
            node1.highlighted = true;
            node2.highlighted = true;
            lca.highlighted = true;
            redrawTree();
            
            document.getElementById('nodeInfo').textContent = 
                `Lowest Common Ancestor of ${value1} and ${value2} is ${lca.value}`;
        }

        function findLCARecursive(node, node1, node2) {
            if (node === null) return null;
            if (node === node1 || node === node2) return node;
            
            const left = findLCARecursive(node.left, node1, node2);
            const right = findLCARecursive(node.right, node1, node2);
            
            if (left && right) return node;
            return left ? left : right;
        }

        // Tree operations
        function mirrorTree() {
            mirrorTreeRecursive(root);
            redrawTree();
            document.getElementById('nodeInfo').textContent = 'Tree has been mirrored';
        }

        function mirrorTreeRecursive(node) {
            if (node === null) return;
            
            const temp = node.left;
            node.left = node.right;
            node.right = temp;
            
            mirrorTreeRecursive(node.left);
            mirrorTreeRecursive(node.right);
        }

        function invertTree() {
            root = invertTreeRecursive(root);
            redrawTree();
            document.getElementById('nodeInfo').textContent = 'Tree has been inverted';
        }

        function invertTreeRecursive(node) {
            if (node === null) return null;
            
            const left = invertTreeRecursive(node.left);
            const right = invertTreeRecursive(node.right);
            
            node.left = right;
            node.right = left;
            
            return node;
        }

        function doubleTree() {
            doubleTreeRecursive(root);
            redrawTree();
            document.getElementById('nodeInfo').textContent = 'Tree has been doubled';
        }

        function doubleTreeRecursive(node) {
            if (node === null) return;
            
            doubleTreeRecursive(node.left);
            doubleTreeRecursive(node.right);
            
            const oldLeft = node.left;
            node.left = new TreeNode(node.value);
            node.left.left = oldLeft;
        }

        function convertToBST() {
            const nodes = [];
            storeInorder(root, nodes);
            root = buildBSTFromSortedArray(nodes);
            redrawTree();
            document.getElementById('nodeInfo').textContent = 'Tree converted to BST';
        }

        function storeInorder(node, nodes) {
            if (node === null) return;
            storeInorder(node.left, nodes);
            nodes.push(node.value);
            storeInorder(node.right, nodes);
        }

        function buildBSTFromSortedArray(nodes) {
            return buildBSTFromSortedArrayRecursive(nodes, 0, nodes.length - 1);
        }

        function buildBSTFromSortedArrayRecursive(nodes, start, end) {
            if (start > end) return null;
            
            const mid = Math.floor((start + end) / 2);
            const node = new TreeNode(nodes[mid]);
            
            node.left = buildBSTFromSortedArrayRecursive(nodes, start, mid - 1);
            node.right = buildBSTFromSortedArrayRecursive(nodes, mid + 1, end);
            
            return node;
        }

        function findKthSmallest() {
            const k = parseInt(document.getElementById('kthValue').value);
            if (isNaN(k)) return;
            
            const result = {count: 0, value: null};
            findKthSmallestRecursive(root, k, result);
            
            if (result.value !== null) {
                const node = findNodeRecursive(root, result.value);
                if (node) {
                    resetNodeHighlights();
                    node.highlighted = true;
                    redrawTree();
                }
                document.getElementById('nodeInfo').textContent = `${k}-th smallest element: ${result.value}`;
            } else {
                document.getElementById('nodeInfo').textContent = `Tree has fewer than ${k} nodes`;
            }
        }

        function findKthSmallestRecursive(node, k, result) {
            if (node === null || result.count >= k) return;
            
            findKthSmallestRecursive(node.left, k, result);
            
            result.count++;
            if (result.count === k) {
                result.value = node.value;
                return;
            }
            
            findKthSmallestRecursive(node.right, k, result);
        }

        function findKthLargest() {
            const k = parseInt(document.getElementById('kthValue').value);
            if (isNaN(k)) return;
            
            const size = calculateSize(root);
            if (k > size) {
                document.getElementById('nodeInfo').textContent = `Tree has fewer than ${k} nodes`;
                return;
            }
            
            findKthSmallest(); // Reuse the smallest function with size - k + 1
            document.getElementById('kthValue').value = size - k + 1;
        }

        // Drawing functions
        function redrawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (!root) return;
            
            const nodeSize = parseInt(document.getElementById('nodeSize').value);
            const levelSpacing = parseInt(document.getElementById('levelSpacing').value);
            const horizontalSpacing = parseInt(document.getElementById('horizontalSpacing').value);
            
            // Calculate positions
            calculatePositions(root, canvas.width / 2, 50, levelSpacing, horizontalSpacing);
            
            // Draw lines first
            drawTreeLines(root);
            
            // Then draw nodes
            drawTreeNodes(root, nodeSize);
        }

        function calculatePositions(node, x, y, levelSpacing, horizontalSpacing) {
            if (node === null) return;
            
            node.x = x;
            node.y = y;
            
            if (node.left) {
                calculatePositions(node.left, x - horizontalSpacing, y + levelSpacing, levelSpacing, horizontalSpacing / 1.5);
            }
            if (node.right) {
                calculatePositions(node.right, x + horizontalSpacing, y + levelSpacing, levelSpacing, horizontalSpacing / 1.5);
            }
        }

        function drawTreeLines(node) {
            if (node === null) return;
            
            if (node.left) {
                ctx.beginPath();
                ctx.moveTo(node.x, node.y);
                ctx.lineTo(node.left.x, node.left.y);
                ctx.stroke();
                drawTreeLines(node.left);
            }
            
            if (node.right) {
                ctx.beginPath();
                ctx.moveTo(node.x, node.y);
                ctx.lineTo(node.right.x, node.right.y);
                ctx.stroke();
                drawTreeLines(node.right);
            }
        }

        function drawTreeNodes(node, nodeSize) {
            if (node === null) return;
            
            // Draw node
            ctx.beginPath();
            ctx.arc(node.x, node.y, nodeSize, 0, 2 * Math.PI);
            
            if (node.highlighted) {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                ctx.fill();
            }
            
            ctx.stroke();
            
            // Draw value
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#000';
            ctx.fillText(node.value, node.x, node.y);
            
            // Recursively draw child nodes
            drawTreeNodes(node.left, nodeSize);
            drawTreeNodes(node.right, nodeSize);
        }

        // Initialize with a small tree
        function init() {
            root = new TreeNode(50);
            root.left = new TreeNode(30);
            root.right = new TreeNode(70);
            root.left.left = new TreeNode(20);
            root.left.right = new TreeNode(40);
            root.right.left = new TreeNode(60);
            root.right.right = new TreeNode(80);
            redrawTree();
        }

        // Initialize on load
        window.onload = init;
    </script>
</body>
</html>
