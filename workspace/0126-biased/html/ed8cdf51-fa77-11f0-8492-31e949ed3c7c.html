<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiset Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #3a6073, #3a8a5c);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
            animation: fadeIn 2s ease-in-out;
        }

        p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .button {
            background: #3a8a5c;
            color: #fff;
            border: none;
            border-radius: 25px;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .button:hover {
            background: #2d6a46;
            transform: scale(1.05);
        }

        .graphic {
            margin-top: 2rem;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            animation: slideIn 2s ease-in-out;
        }

        .element {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 1.5rem;
            font-size: 2rem;
            text-align: center;
            transition: transform 0.3s, background 0.3s;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.3);
        }

        .element:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Multiset Visualization</h1>
        <p>Observe the beautiful elements of a multiset.</p>
        <div class="graphic">
            <div class="element">A</div>
            <div class="element">A</div>
            <div class="element">B</div>
            <div class="element">C</div>
            <div class="element">B</div>
            <div class="element">C</div>
            <div class="element">A</div>
            <div class="element">D</div>
            <div class="element">D</div>
            <div class="element">E</div>
        </div>
        <button class="button" onclick="alert('Thanks for watching!')">Click Me</button>
    </div>
</body>
</html>
