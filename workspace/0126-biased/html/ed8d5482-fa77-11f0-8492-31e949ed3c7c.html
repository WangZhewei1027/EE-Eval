<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insertion Sort Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f3f4f6, #cbd5e1);
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #container {
            width: 80%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #1e3a8a;
        }
        .bar {
            display: inline-block;
            width: 20px;
            margin: 0 3px;
            background-color: #60a5fa;
            border-radius: 5px;
            transition: height 0.3s ease, background-color 0.3s ease;
        }
        .active {
            background-color: #f97316;
        }
        .sorted {
            background-color: #4ade80;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #2563eb;
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #3b82f6;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Insertion Sort Visualization</h1>
        <div id="bars"></div>
        <br>
        <button onclick="startSorting()">Start Sort</button>
    </div>

    <script>
        const bars = [];
        const numberOfBars = 20;

        // Generate random bars
        for (let i = 0; i < numberOfBars; i++) {
            const height = Math.floor(Math.random() * 200) + 20;
            bars.push(height);
        }

        const renderBars = () => {
            const barsContainer = document.getElementById('bars');
            barsContainer.innerHTML = '';
            bars.forEach((height) => {
                const bar = document.createElement('div');
                bar.style.height = height + 'px';
                bar.className = 'bar';
                barsContainer.appendChild(bar);
            });
        }
        
        const startSorting = async () => {
            for (let i = 1; i < bars.length; i++) {
                let key = bars[i];
                let j = i - 1;

                // Mark current item as active
                document.getElementsByClassName('bar')[i].classList.add('active');
                await new Promise(resolve => setTimeout(resolve, 300));
                
                while (j >= 0 && bars[j] > key) {
                    bars[j + 1] = bars[j];
                    j--;

                    // Update bars during sort
                    renderBars();
                    await new Promise(resolve => setTimeout(resolve, 300));
                }
                bars[j + 1] = key;

                // Unmark current item
                document.getElementsByClassName('bar')[i].classList.remove('active');
                document.getElementsByClassName('bar')[j + 1].classList.add('sorted');
            }
            renderBars();
        };

        renderBars();
    </script>
</body>
</html>
