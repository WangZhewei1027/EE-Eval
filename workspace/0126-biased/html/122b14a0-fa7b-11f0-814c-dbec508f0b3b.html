<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        label {
            display: block;
            margin-bottom: 10px;
        }
        input[type="text"], input[type="number"], select {
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        input[type="text"], input[type="number"], select {
            width: 50%;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #ccc;
        }
        .tree {
            margin-top: 20px;
        }
        .tree ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .tree li {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        .tree li:last-child {
            border-bottom: none;
        }
        .tree li input[type="text"], .tree li select {
            display: block;
            margin-bottom: 10px;
        }
        .tree li button {
            float: right;
            margin-left: 10px;
        }
        .tree li button:hover {
            background-color: #ccc;
        }
        .tree li button:active {
            background-color: #aaa;
        }
    </style>
</head>
<body>
    <div class="tree">
        <ul>
            <li>
                <input type="text" placeholder="Enter a value" />
                <button>Insert</button>
                <button>Remove</button>
                <button>Update</button>
                <button>Print</button>
            </li>
            <li>
                <input type="text" placeholder="Enter a value" />
                <button>Insert</button>
                <button>Remove</button>
                <button>Update</button>
                <button>Print</button>
            </li>
            <li>
                <input type="text" placeholder="Enter a value" />
                <button>Insert</button>
                <button>Remove</button>
                <button>Update</button>
                <button>Print</button>
            </li>
            <li>
                <input type="text" placeholder="Enter a value" />
                <button>Insert</button>
                <button>Remove</button>
                <button>Update</button>
                <button>Print</button>
            </li>
        </ul>
        <button>Clear Tree</button>
    </div>

    <script>
        let tree = document.querySelector('.tree');
        let treeElement = tree.querySelector('ul');
        let values = [];

        function insert(value) {
            values.push(value);
            updateTree();
        }

        function remove(value) {
            values = values.filter(v => v !== value);
            updateTree();
        }

        function updateTree() {
            treeElement.innerHTML = '';
            values.forEach((value, index) => {
                let li = document.createElement('li');
                li.textContent = `${index + 1}. ${value}`;
                treeElement.appendChild(li);
                let input = document.createElement('input');
                input.type = 'text';
                input.value = value;
                li.appendChild(input);
                let buttons = document.createElement('button');
                buttons.textContent = 'Remove';
                buttons.addEventListener('click', remove);
                li.appendChild(buttons);
                let button = document.createElement('button');
                button.textContent = 'Update';
                button.addEventListener('click', update);
                li.appendChild(button);
                let button2 = document.createElement('button');
                button2.textContent = 'Print';
                button2.addEventListener('click', print);
                li.appendChild(button2);
            });
        }

        function print() {
            console.log(values.join(', '));
        }

        function update(value) {
            values = values.map(v => v + ' -> ' + value);
            updateTree();
        }

        function clear() {
            values = [];
            updateTree();
        }

        document.querySelectorAll('input[type="text"]').forEach(input => {
            input.addEventListener('input', insert);
        });

        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', remove);
        });

        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', update);
        });

        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', print);
        });

        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', clear);
        });
    </script>
</body>
</html>
