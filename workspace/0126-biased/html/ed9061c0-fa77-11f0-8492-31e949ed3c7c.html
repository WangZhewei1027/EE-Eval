<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Nearest Neighbors Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f6f6f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 80vw;
            height: 80vh;
            border: 2px solid #4a90e2;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            background-color: #fff;
        }

        .header {
            text-align: center;
            background-color: #4a90e2;
            color: white;
            padding: 10px;
        }

        .title {
            font-size: 2em;
            margin: 0;
        }

        .canvas {
            position: relative;
            width: 100%;
            height: calc(100% - 50px);
        }

        .point {
            position: absolute;
            border-radius: 50%;
            transition: all 0.4s ease;
        }

        .button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #45a049;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="title">K-Nearest Neighbors Visualization</h1>
    </div>
    <div class="canvas" id="canvas"></div>
    <button class="button" onclick="generateData()">Generate New Data</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    
    function generateData() {
        canvas.innerHTML = ''; // Clear previous points
        const points = 50;

        for (let i = 0; i < points; i++) {
            const pointDiv = document.createElement('div');
            const x = Math.random() * 100; 
            const y = Math.random() * 100; 
            pointDiv.classList.add('point');
            pointDiv.style.width = '10px';
            pointDiv.style.height = '10px';
            pointDiv.style.backgroundColor = Math.random() > 0.5 ? '#ff6347' : '#1e90ff';
            pointDiv.style.left = `${x}%`;
            pointDiv.style.top = `${y}%`;
            canvas.appendChild(pointDiv);
        }
    }

    // Generate initial data on load
    generateData();
</script>

</body>
</html>
