<!DOCTYPE html>
<html>
<head>
    <title>Congestion Control</title>
    <style>
        body {
            background-color: white;
        }
        input[type="text"] {
            width: 50%;
            padding: 10px;
            margin: 20px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        button {
            width: 30%;
            padding: 10px;
            margin: 20px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }
        select {
            width: 50%;
            padding: 10px;
            margin: 20px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button-container {
            display: flex;
            justify-content: space-between;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="button-container">
        <button id="max-traffic">Max Traffic</button>
        <button id="low-traffic">Low Traffic</button>
        <button id="medium-traffic">Medium Traffic</button>
        <button id="high-traffic">High Traffic</button>
    </div>
    <div class="form-container">
        <input type="text" id="traffic-volume" placeholder="Enter traffic volume">
        <button id="submit-traffic">Submit</button>
    </div>
    <div class="result-container">
        <p id="traffic-status"></p>
    </div>

    <script>
        let trafficVolume = 0;
        let trafficStatus = "Low Traffic";

        const maxTrafficButton = document.getElementById("max-traffic");
        const lowTrafficButton = document.getElementById("low-traffic");
        const mediumTrafficButton = document.getElementById("medium-traffic");
        const highTrafficButton = document.getElementById("high-traffic");

        const trafficVolumeInput = document.getElementById("traffic-volume");
        const submitTrafficButton = document.getElementById("submit-traffic");

        const trafficStatusElement = document.getElementById("traffic-status");

        maxTrafficButton.addEventListener("click", () => {
            trafficStatus = "Max Traffic";
            trafficVolume = 100;
            trafficStatusElement.textContent = "Max Traffic";
        });

        lowTrafficButton.addEventListener("click", () => {
            trafficStatus = "Low Traffic";
            trafficVolume = 50;
            trafficStatusElement.textContent = "Low Traffic";
        });

        mediumTrafficButton.addEventListener("click", () => {
            trafficStatus = "Medium Traffic";
            trafficVolume = 75;
            trafficStatusElement.textContent = "Medium Traffic";
        });

        highTrafficButton.addEventListener("click", () => {
            trafficStatus = "High Traffic";
            trafficVolume = 100;
            trafficStatusElement.textContent = "High Traffic";
        });

        trafficVolumeInput.addEventListener("input", () => {
            trafficVolume = parseInt(trafficVolumeInput.value);
            trafficStatusElement.textContent = `Traffic Volume: ${trafficVolume} units`;
        });

        submitTrafficButton.addEventListener("click", () => {
            if (trafficVolume <= 100) {
                trafficStatus = "Traffic is under control";
            } else {
                trafficStatus = "Traffic is congested";
            }
            trafficStatusElement.textContent = `Traffic Status: ${trafficStatus}`;
        });
    </script>
</body>
</html>
