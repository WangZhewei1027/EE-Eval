<!DOCTYPE html>
<html>
<head>
    <title>Circular Linked List Interactive Demo</title>
    <style>
        body {
            font-family: Arial, margin: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .controls {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
        }
        .control-group {
            margin-bottom: 10px;
        }
        button, input, select {
            margin: 5px;
            padding: 5px;
        }
        .visualization {
            min-height: 200px;
            border: 1px solid #ccc;
            padding: 20px;
            position: relative;
            overflow-x: auto;
        }
        .node {
            display: inline-block;
            border: 1px solid black;
            padding: 10px;
            margin: 5px;
            position: relative;
        }
        .data {
            font-weight: bold;
        }
        .next-pointer {
            font-size: 20px;
            margin: 0 5px;
        }
        .highlight {
            background-color: #f0f0f0;
        }
        .stats {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Circular Linked List Interactive Demo</h1>
        
        <div class="controls">
            <div class="control-group">
                <h3>List Operations</h3>
                <input type="text" id="nodeValue" placeholder="Enter value">
                <button onclick="insertAtBeginning()">Insert at Beginning</button>
                <button onclick="insertAtEnd()">Insert at End</button>
                <button onclick="insertAfterNode()">Insert After Node</button>
                <button onclick="deleteNode()">Delete Node</button>
                <button onclick="searchNode()">Search Node</button>
                <button onclick="reverseList()">Reverse List</button>
                <button onclick="clearList()">Clear List</button>
            </div>
            
            <div class="control-group">
                <h3>Traversal Controls</h3>
                <button onclick="startTraversal()">Start Traversal</button>
                <button onclick="stopTraversal()">Stop Traversal</button>
                <button onclick="stepForward()">Step Forward</button>
                <button onclick="stepBackward()">Step Backward</button>
                <span>Speed:</span>
                <input type="range" id="traversalSpeed" min="100" max="2000" value="500" onchange="updateTraversalSpeed()">
            </div>
            
            <div class="control-group">
                <h3>List Configuration</h3>
                <span>Max Nodes:</span>
                <input type="number" id="maxNodes" min="1" max="20" value="10">
                <span>Randomize Data:</span>
                <input type="checkbox" id="randomData" checked>
                <button onclick="generateRandomList()">Generate Random List</button>
            </div>
        </div>
        
        <div class="visualization" id="listVisualization">
            <!-- List will be rendered here -->
        </div>
        
        <div class="stats">
            <h3>List Statistics</h3>
            <div>Length: <span id="listLength">0</span></div>
            <div>Current Node: <span id="currentNode">None</span></div>
            <div>Head Node: <span id="headNode">None</span></div>
            <div>Tail Node: <span id="tailNode">None</span></div>
            <div>Traversal Status: <span id="traversalStatus">Inactive</span></div>
        </div>
        
        <div class="controls">
            <h3>Debug Information</h3>
            <button onclick="showListStructure()">Show List Structure</button>
            <button onclick="exportList()">Export List</button>
            <button onclick="importList()">Import List</button>
            <div id="debugInfo"></div>
        </div>
    </div>

    <script>
        // Circular Linked List implementation
        class Node {
            constructor(data) {
                this.data = data;
                this.next = null;
            }
        }

        class CircularLinkedList {
            constructor() {
                this.head = null;
                this.tail = null;
                this.length = 0;
                this.current = null;
                this.traversalInterval = null;
                this.traversalSpeed = 500;
                this.traversalDirection = 1; // 1 for forward, -1 for backward
                this.isTraversing = false;
            }

            insertAtBeginning(data) {
                const newNode = new Node(data);
                
                if (!this.head) {
                    this.head = newNode;
                    this.tail = newNode;
                    newNode.next = newNode;
                } else {
                    newNode.next = this.head;
                    this.head = newNode;
                    this.tail.next = newNode;
                }
                
                this.length++;
                this.current = newNode;
                return newNode;
            }

            insertAtEnd(data) {
                const newNode = new Node(data);
                
                if (!this.head) {
                    return this.insertAtBeginning(data);
                }
                
                newNode.next = this.head;
                this.tail.next = newNode;
                this.tail = newNode;
                this.length++;
                return newNode;
            }

            insertAfter(nodeData, newData) {
                if (!this.head) return null;
                
                let current = this.head;
                do {
                    if (current.data === nodeData) {
                        const newNode = new Node(newData);
                        newNode.next = current.next;
                        current.next = newNode;
                        
                        if (current === this.tail) {
                            this.tail = newNode;
                        }
                        
                        this.length++;
                        return newNode;
                    }
                    current = current.next;
                } while (current !== this.head);
                
                return null;
            }

            deleteNode(data) {
                if (!this.head) return null;
                
                let current = this.head;
                let prev = this.tail;
                do {
                    if (current.data === data) {
                        if (current === this.head) {
                            this.head === this.head.next ? this.head = null : this.head = this.head.next;
                            this.tail.next = this.head;
                        } else {
                            prev.next = current.next;
                            if (current === this.tail) {
                                this.tail = prev;
                            }
                        }
                        
                        if (this.current === current) {
                            this.current = prev;
                        }
                        
                        this.length--;
                        if (this.length === 0) {
                            this.head = null;
                            this.tail = null;
                            this.current = null;
                        }
                        return current;
                    }
                    prev = current;
                    current = current.next;
                } while (current !== this.head);
                
                return null;
            }

            search(data) {
                if (!this.head) return null;
                
                let current = this.head;
                do {
                    if (current.data === data) {
                        return current;
                    }
                    current = current.next;
                } while (current !== this.head);
                
                return null;
            }

            reverse() {
                if (!this.head || this.head.next === this.head) return;
                
                let prev = this.tail;
                let current = this.head;
                let next = null;
                
                do {
                    next = current.next;
                    current.next = prev;
                    prev = current;
                    current = next;
                } while (current !== this.head);
                
                this.head = prev;
                this.tail = current;
            }

            clear() {
                this.head = null;
                this.tail = null;
                this.current = null;
                this.length = 0;
                clearInterval(this.traversalInterval);
                this.isTraversing = false;
            }

            traverseForward() {
                this.current = this.current ? this.current.next : this.head;
                return this.current;
            }

            traverseBackward() {
                if (!this.current) return null;
                
                let node = this.head;
                while (node.next !== this.current) {
                    node = node.next;
                }
                this.current = node;
                return this.current;
            }

            startTraversal(direction = 1) {
                if (this.isTraversing) return;
                if (!this.head) return;
                
                this.traversalDirection = direction;
                this.isTraversing = true;
                
                this.traversalInterval = setInterval(() => {
                    if (this.traversalDirection === 1) {
                        this.traverseForward();
                    } else {
                        this.traverseBackward();
                    }
                    renderList();
                }, this.traversalSpeed);
            }

            stopTraversal() {
                if (!this.isTraversing) return;
                
                clearInterval(this.traversalInterval);
                this.isTraversing = false;
            }

            setTraversalSpeed(speed) {
                this.traversalSpeed = speed;
                if (this.isTraversing) {
                    this.stopTraversal();
                    this.startTraversal(this.traversalDirection);
                }
            }

            getListAsArray() {
                const result = [];
                if (!this.head) return result;
                
                let current = this.head;
                do {
                    result.push(current.data);
                    current = current.next;
                } while (current !== this.head);
                
                return result;
            }

            getStructure() {
                const result = [];
                if (!this.head) return result;
                
                let current = this.head;
                do {
                    result.push({
                        data: current.data,
                        next: current.next ? current.next.data : null
                    });
                    current = current.next;
                } while (current !== this.head);
                
                return result;
            }
        }

        // Create a new circular linked list
        const cll = new CircularLinkedList();

        // DOM manipulation functions
        function renderList() {
            const visualization = document.getElementById('listVisualization');
            visualization.innerHTML = '';
            
            if (!cll.head) {
                visualization.textContent = 'List is empty';
                updateStats();
                return;
            }
            
            let current = cll.head;
            do {
                const nodeElement = document.createElement('div');
                nodeElement.className = 'node';
                if (current === cll.current) {
                    nodeElement.classList.add('highlight');
                }
                
                nodeElement.innerHTML = `
                    <div class="data">${current.data}</div>
                    <div class="next-pointer">→</div>
                `;
                
                visualization.appendChild(nodeElement);
                current = current.next;
            } while (current !== cll.head);
            
            // Add circular connection indicator
            const circularIndicator = document.createElement('div');
            circularIndicator.textContent = '↻ (circular)';
            circularIndicator.style.marginTop = '10px';
            circularIndicator.style.fontStyle = 'italic';
            visualization.appendChild(circularIndicator);
            
            updateStats();
        }

        function updateStats() {
            document.getElementById('listLength').textContent = cll.length;
            document.getElementById('currentNode').textContent = cll.current ? cll.current.data : 'None';
            document.getElementById('headNode').textContent = cll.head ? cll.head.data : 'None';
            document.getElementById('tailNode').textContent = cll.tail ? cll.tail.data : 'None';
            document.getElementById('traversalStatus').textContent = cll.isTraversing ? 
                `Active (${cll.traversalDirection === 1 ? 'Forward' : 'Backward'})` : 'Inactive';
        }

        // Operation functions
        function getInputValue() {
            const input = document.getElementById('nodeValue');
            const value = input.value.trim();
            input.value = '';
            return value;
        }

        function insertAtBeginning() {
            const value = getInputValue();
            if (!value) return;
            
            cll.insertAtBeginning(value);
            renderList();
        }

        function insertAtEnd() {
            const value = getInputValue();
            if (!value) return;
            
            cll.insertAtEnd(value);
            renderList();
        }

        function insertAfterNode() {
            const value = getInputValue();
            if (!value) return;
            
            const afterValue = prompt('Enter the node value after which to insert:');
            if (!afterValue) return;
            
            const result = cll.insertAfter(afterValue, value);
            if (result) {
                renderList();
            } else {
                alert(`Node with value ${afterValue} not found`);
            }
        }

        function deleteNode() {
            const value = getInputValue();
            if (!value) return;
            
            const result = cll.deleteNode(value);
            if (result) {
                renderList();
            } else {
                alert(`Node with value ${value} not found`);
            }
        }

        function searchNode() {
            const value = getInputValue();
            if (!value) return;
            
            const result = cll.search(value);
            if (result) {
                cll.current = result;
                renderList();
            } else {
                alert(`Node with value ${value} not found`);
            }
        }

        function reverseList() {
            cll.reverse();
            renderList();
        }

        function clearList() {
            cll.clear();
            renderList();
        }

        function startTraversal() {
            cll.startTraversal();
            renderList();
        }

        function stopTraversal() {
            cll.stopTraversal();
            renderList();
        }

        function stepForward() {
            cll.traverseForward();
            renderList();
        }

        function stepBackward() {
            cll.traverseBackward();
            renderList();
        }

        function updateTraversalSpeed() {
            const speed = parseInt(document.getElementById('traversalSpeed').value);
            cll.setTraversalSpeed(speed);
        }

        function generateRandomList() {
            cll.clear();
            
            const maxNodes = parseInt(document.getElementById('maxNodes').value);
            const useRandomData = document.getElementById('randomData').checked;
            
            for (let i = 0; i < maxNodes; i++) {
                const value = useRandomData ? 
                    Math.floor(Math.random() * 100) : 
                    `Node ${i + 1}`;
                
                cll.insertAtEnd(value);
            }
            
            renderList();
        }

        function showListStructure() {
            const structure = cll.getStructure();
            const debugInfo = document.getElementById('debugInfo');
            
            if (structure.length === 0) {
                debugInfo.textContent = 'List is empty';
                return;
            }
            
            let output = 'List Structure:\n';
            structure.forEach(node => {
                output += `[Data: ${node.data}, Next: ${node.next}]\n`;
            });
            
            debugInfo.textContent = output;
        }

        function exportList() {
            const listData = cll.getListAsArray();
            const dataStr = JSON.stringify(listData);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            
            const exportName = 'circular_list_export.json';
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportName);
            linkElement.click();
        }

        function importList() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                
                reader.onload = event => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (!Array.isArray(data)) {
                            throw new Error('Invalid data format');
                        }
                        
                        cll.clear();
                        data.forEach(item => {
                            cll.insertAtEnd(item);
                        });
                        
                        renderList();
                    } catch (error) {
                        alert('Error importing list: ' + error.message);
                    }
                };
                
                reader.readAsText(file);
            };
            
            input.click();
        }

        // Initialize
        renderList();
    </script>
</body>
</html>
