<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock Simulation</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .control { margin: 10px; }
    </style>
</head>
<body>

<h1>Deadlock Simulation</h1>
<p>This simulation illustrates the concept of a deadlock in a resource allocation scenario.</p>

<div class="control">
    <label for="resourceA">Resource A:</label>
    <input type="number" id="resourceA" value="1" min="0" max="10" />
</div>
<div class="control">
    <label for="resourceB">Resource B:</label>
    <input type="number" id="resourceB" value="1" min="0" max="10" />
</div>

<div class="control">
    <button id="requestA">Request Resource A for Process 1</button>
    <button id="requestB">Request Resource B for Process 2</button>
    <button id="releaseA">Release Resource A from Process 1</button>
    <button id="releaseB">Release Resource B from Process 2</button>
</div>

<div class="control">
    <h3>Deadlock State:</h3>
    <p id="state">No deadlock detected.</p>
</div>

<div class="control">
    <button id="reset">Reset Simulation</button>
</div>

<script>
    let resourceA = 1;
    let resourceB = 1;
    let allocatedA = 0;
    let allocatedB = 0;

    document.getElementById('requestA').onclick = function() {
        if (resourceA > 0 && allocatedB < 1) {
            allocatedA++;
            resourceA--;
            checkDeadlock();
        } else {
            alert("Process 1 cannot request Resource A.");
        }
    };

    document.getElementById('requestB').onclick = function() {
        if (resourceB > 0 && allocatedA < 1) {
            allocatedB++;
            resourceB--;
            checkDeadlock();
        } else {
            alert("Process 2 cannot request Resource B.");
        }
    };

    document.getElementById('releaseA').onclick = function() {
        if (allocatedA > 0) {
            allocatedA--;
            resourceA++;
            checkDeadlock();
        } else {
            alert("No Resource A allocated to release.");
        }
    };

    document.getElementById('releaseB').onclick = function() {
        if (allocatedB > 0) {
            allocatedB--;
            resourceB++;
            checkDeadlock();
        } else {
            alert("No Resource B allocated to release.");
        }
    };

    document.getElementById('reset').onclick = function() {
        resourceA = 1;
        resourceB = 1;
        allocatedA = 0;
        allocatedB = 0;
        updateState("Simulation reset.");
    };

    function checkDeadlock() {
        if (allocatedA > 0 && allocatedB > 0) {
            updateState("Deadlock detected between Process 1 and Process 2.");
        } else {
            updateState("No deadlock detected.");
        }
    }

    function updateState(message) {
        document.getElementById('state').innerText = message;
    }
</script>

</body>
</html>
