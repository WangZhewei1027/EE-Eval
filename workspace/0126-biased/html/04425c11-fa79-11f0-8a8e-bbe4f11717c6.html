<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucket Sort</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Bucket Sort</h1>
        <p>Sort a list of numbers using Bucket Sort.</p>
        <div class="bucket-sort-container">
            <div class="bucket-sort-group">
                <input type="number" id="numbers" placeholder="Enter numbers">
                <button id="sort-btn">Sort</button>
                <div class="bucket-sort">
                    <div class="bucket" id="bucket-1"></div>
                    <div class="bucket" id="bucket-2"></div>
                    <div class="bucket" id="bucket-3"></div>
                    <div class="bucket" id="bucket-4"></div>
                    <div class="bucket" id="bucket-5"></div>
                    <div class="bucket" id="bucket-6"></div>
                </div>
            </div>
            <div class="bucket-sort-group">
                <input type="number" id="numbers2" placeholder="Enter numbers">
                <button id="sort-btn2">Sort</button>
                <div class="bucket-sort">
                    <div class="bucket" id="bucket-7"></div>
                    <div class="bucket" id="bucket-8"></div>
                    <div class="bucket" id="bucket-9"></div>
                    <div class="bucket" id="bucket-10"></div>
                    <div class="bucket" id="bucket-11"></div>
                    <div class="bucket" id="bucket-12"></div>
                </div>
            </div>
        </div>
        <div class="results">
            <p id="results"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
