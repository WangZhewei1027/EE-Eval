<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch and Bound Algorithm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .text-explanation {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .text-example {
            margin-bottom: 20px;
        }
        .text-demonstration {
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Branch and Bound Algorithm</h1>
    <p id="explanation"></p>
    <p id="example"></p>
    <p id="demonstration"></p>
    <button id="demonstration-button">Demonstrate Branch and Bound</button>

    <script>
        // Explanation
        function explanation() {
            var explanationText = `
                The Branch and Bound algorithm is a recursive algorithm used for solving problems in combinatorial optimization.
                It works by dividing the problem into smaller sub-problems, solving each sub-problem, and then combining the solutions to find the optimal solution.
                The algorithm is named after its creators, Richard Korf and John L. Markowitz, who used it to solve the traveling salesman problem.
                The algorithm is particularly useful for problems that have a tree-like structure, such as scheduling, graph coloring, and network flow.
            `;
            document.getElementById("explanation").innerHTML = explanationText;
        }

        // Example
        function example() {
            var exampleText = `
                Example: 3-SAT Problem
                Given a set of clauses (e.g., x ∨ y ∨ z, ¬x ∧ y, x ∧ ¬y), determine the assignment of values to the variables that satisfies all the clauses.
                The Branch and Bound algorithm can be used to solve this problem by recursively dividing the problem into smaller sub-problems and combining the solutions to find the optimal solution.
            `;
            document.getElementById("example").innerHTML = exampleText;
        }

        // Demonstration
        function demonstration() {
            var demonstrationText = `
                Demonstration:
                The Branch and Bound algorithm works by recursively dividing the problem into smaller sub-problems and combining the solutions to find the optimal solution.
                For the 3-SAT problem, the algorithm starts by dividing the problem into smaller sub-problems, such as the clause ¬x ∧ y.
                It then recursively divides the sub-problems into smaller sub-sub-problems and combines the solutions to find the optimal solution.
                The algorithm continues to divide and combine the solutions until it finds the optimal solution.
            `;
            document.getElementById("demonstration").innerHTML = demonstrationText;
        }

        // Button event handler
        document.getElementById("demonstration-button").addEventListener("click", demonstration);

        // Initialize the algorithm
        explanation();
        example();
        demonstration();
    </script>
</body>
</html>
