<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Tree Index Visualization</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            border: 2px solid #007acc;
            border-radius: 10px;
            padding: 20px;
            background: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #007acc;
            transition: color 0.3s;
        }

        h1:hover {
            color: #005a8e;
        }

        .b-tree {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .node {
            background: #0084ff;
            color: white;
            border-radius: 5px;
            padding: 10px 20px;
            margin: 5px;
            font-size: 1.5em;
            transition: transform 0.5s;
            cursor: default;
        }

        .node:hover {
            transform: scale(1.1);
        }

        .button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .button:hover {
            background-color: #005a8e;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>B-Tree Index Visualization</h1>
    <div class="b-tree">
        <div class="node">10</div>
        <div class="node">20</div>
        <div class="node">30</div>
        <div class="node">40</div>
        <div class="node">50</div>
        <div class="node">60</div>
    </div>
    <button class="button" id="animateButton">Animate</button>
</div>

<script>
    document.getElementById('animateButton').addEventListener('click', function() {
        const nodes = document.querySelectorAll('.node');
        nodes.forEach((node, index) => {
            setTimeout(() => {
                node.style.transform = 'translateY(-20px)';
                setTimeout(() => {
                    node.style.transform = 'translateY(0)';
                }, 300);
            }, index * 500);
        });
    });
</script>

</body>
</html>
