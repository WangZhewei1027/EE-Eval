<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heap (Max) Explanation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .text {
            font-size: 16px;
            margin-bottom: 10px;
        }
        .button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <h1>Heap (Max) Explanation</h1>
    <p id="text"></p>
    <button id="demonstration-button">Demonstrate Heap (Max) Operation</button>

    <script>
        const textElement = document.getElementById('text');
        const demonstrationButton = document.getElementById('demonstration-button');

        // Define the Heap (Max) data structure
        class Heap {
            constructor() {
                this.heap = [];
            }

            // Insert a new element into the heap
            insert(element) {
                this.heap.push(element);
                this.heapifyUp(this.heap.length - 1);
            }

            // Remove and return the maximum element from the heap
            extractMax() {
                if (this.heap.length === 0) {
                    return null;
                }
                if (this.heap.length === 1) {
                    return this.heap.pop();
                }
                const maxElement = this.heap[0];
                this.heap[0] = this.heap.pop();
                this.heapifyDown(0);
                return maxElement;
            }

            // Heapify the heap upwards from the given index
            heapifyUp(index) {
                if (index === 0) {
                    return;
                }
                const parentIndex = Math.floor((index - 1) / 2);
                if (this.heap[parentIndex] <= this.heap[index]) {
                    return;
                }
                this.swap(parentIndex, index);
                this.heapifyUp(parentIndex);
            }

            // Heapify the heap downwards from the given index
            heapifyDown(index) {
                const leftChildIndex = 2 * index + 1;
                const rightChildIndex = 2 * index + 2;
                let largestIndex = index;
                if (leftChildIndex < this.heap.length && this.heap[leftChildIndex] > this.heap[largestIndex]) {
                    largestIndex = leftChildIndex;
                }
                if (rightChildIndex < this.heap.length && this.heap[rightChildIndex] > this.heap[largestIndex]) {
                    largestIndex = rightChildIndex;
                }
                if (largestIndex !== index) {
                    this.swap(largestIndex, index);
                    this.heapifyDown(largestIndex);
                }
            }

            // Swap two elements in the heap
            swap(i, j) {
                const temp = this.heap[i];
                this.heap[i] = this.heap[j];
                this.heap[j] = temp;
            }
        }

        // Example usage
        function demonstrateHeapMax() {
            const heap = new Heap();
            heap.insert(5);
            heap.insert(10);
            heap.insert(3);
            heap.insert(8);
            heap.insert(1);
            console.log("Heap (Max) elements:", heap.heap);
            const maxElement = heap.extractMax();
            console.log("Extracted maximum element:", maxElement);
            console.log("Updated heap:", heap.heap);
            maxElement = heap.extractMax();
            console.log("Extracted maximum element:", maxElement);
            console.log("Updated heap:", heap.heap);
            maxElement = heap.extractMax();
            console.log("Extracted maximum element:", maxElement);
            console.log("Updated heap:", heap.heap);
        }

        demonstrationButton.addEventListener('click', demonstrateHeapMax);
    </script>
</body>
</html>
