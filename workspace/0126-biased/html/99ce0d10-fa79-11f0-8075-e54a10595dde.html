<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        input, button {
            margin: 5px;
        }
        #queueContainer {
            margin-top: 20px;
        }
        .item {
            margin: 2px 0;
        }
    </style>
</head>
<body>
    <h1>Queue Demonstration</h1>
    <label for="itemInput">Enter an item: </label>
    <input type="text" id="itemInput" />
    <button onclick="enqueue()">Enqueue</button>
    <button onclick="dequeue()">Dequeue</button>
    <button onclick="peek()">Peek</button>
    <button onclick="clearQueue()">Clear Queue</button>
    
    <h2>Queue State</h2>
    <div id="queueContainer"></div>
    <div>
        <label for="capacityInput">Set Maximum Capacity: </label>
        <input type="number" id="capacityInput" value="5" min="1" onchange="setCapacity()" />
    </div>
    <div>
        <button onclick="printQueue()">Print Queue</button>
    </div>

    <script>
        let queue = [];
        let maxCapacity = 5;

        function enqueue() {
            const itemInput = document.getElementById('itemInput');
            const item = itemInput.value;
            if (item !== '' && queue.length < maxCapacity) {
                queue.push(item);
                itemInput.value = '';
                renderQueue();
            } else if (queue.length >= maxCapacity) {
                alert('Queue is full! Cannot enqueue.');
            }
        }

        function dequeue() {
            if (queue.length > 0) {
                queue.shift();
                renderQueue();
            } else {
                alert('Queue is empty! Cannot dequeue.');
            }
        }

        function peek() {
            if (queue.length > 0) {
                alert('Front item: ' + queue[0]);
            } else {
                alert('Queue is empty!');
            }
        }

        function clearQueue() {
            queue = [];
            renderQueue();
        }

        function setCapacity() {
            const capacityInput = document.getElementById('capacityInput');
            maxCapacity = parseInt(capacityInput.value);
            if (queue.length > maxCapacity) {
                alert('Current queue exceeds new capacity! Please dequeue items.');
            }
        }

        function printQueue() {
            console.log(queue);
            alert('Check the console for the current queue.');
        }

        function renderQueue() {
            const queueContainer = document.getElementById('queueContainer');
            queueContainer.innerHTML = '';
            for (let item of queue) {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = item;
                queueContainer.appendChild(div);
            }
        }
    </script>
</body>
</html>
