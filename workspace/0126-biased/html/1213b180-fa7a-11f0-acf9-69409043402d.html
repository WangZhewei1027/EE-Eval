<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Interactive Bubble Sort Demo</title>
<style>
  /* Minimal styling: black text on white background */
  body {
    background: white;
    color: black;
    font-family: monospace, monospace;
    margin: 10px;
  }
  textarea, input, button, select {
    font-family: monospace, monospace;
    font-size: 14px;
    margin: 2px 0;
  }
  #arrayDisplay span {
    display: inline-block;
    min-width: 18px;
    text-align: center;
    border: 1px solid black;
    margin: 0 1px;
    padding: 2px 3px;
    user-select: none;
  }
  #arrayDisplay span.highlight-compare {
    font-weight: bold;
    text-decoration: underline;
  }
  #arrayDisplay span.highlight-swap {
    font-weight: bold;
  }
  #log {
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
    border: 1px solid black;
    padding: 4px;
    margin-top: 6px;
  }
  label {
    display: inline-block;
    width: 220px;
  }
  section {
    margin-bottom: 14px;
  }
</style>
</head>
<body>

<h1>Interactive Bubble Sort Demonstration</h1>

<section>
  <label for="arrayInput">Enter array values (comma separated integers):</label><br />
  <input type="text" id="arrayInput" size="50" value="5,3,8,4,2" />
  <button id="setArrayBtn" title="Set new array to sort">Set Array</button>
  <button id="generateRandomBtn" title="Generate random array">Random Array</button>
  <input type="number" id="randomSize" min="1" max="50" value="10" style="width:60px;" title="Size of random array" /> elements
</section>

<section>
  <label for="speedRange">Sorting speed (delay in ms between steps):</label><br />
  <input type="range" id="speedRange" min="10" max="2000" value="500" step="10" />
  <span id="speedValue">500ms</span>
</section>

<section>
  <label for="modeSelect">Select sort mode:</label><br />
  <select id="modeSelect">
    <option value="auto">Automatic Sort</option>
    <option value="step">Step-by-Step Manual</option>
    <option value="inspect">Deep Inspect Mode</option>
  </select>
</section>

<section>
  <button id="startBtn">Start</button>
  <button id="pauseBtn" disabled>Pause</button>
  <button id="stepBtn" disabled>Step</button>
  <button id="resetBtn" disabled>Reset</button>
  <button id="skipToEndBtn" disabled>Skip To End</button>
</section>

<section>
  <label>Current Array State:</label><br />
  <div id="arrayDisplay" aria-live="polite" aria-atomic="true"></div>
</section>

<section>
  <label>Sorting Log and Controls:</label><br />
  <textarea id="log" readonly rows="10" aria-label="Sorting Log"></textarea>
</section>

<section>
  <label for="inspectIndex">Inspect element at index:</label>
  <input type="number" id="inspectIndex" min="0" value="0" style="width:60px;" />
  <button id="inspectValueBtn">Show Value</button>
</section>

<section>
  <label for="compareIndices">Compare two indices (comma separated):</label>
  <input type="text" id="compareIndices" size="10" value="0,1" />
  <button id="compareBtn">Compare</button>
</section>

<section>
  <label for="swapIndices">Swap two indices (comma separated):</label>
  <input type="text" id="swapIndices" size="10" value="0,1" />
  <button id="swapBtn">Swap</button>
</section>

<section>
  <label>Save / Load Array (JSON format):</label><br />
  <textarea id="saveLoadArea" rows="3" cols="50" aria-label="Save or load array"></textarea><br />
  <button id="saveBtn">Save Current Array</button>
  <button id="loadBtn">Load Array</button>
</section>

<script>
(() => {
  const arrayInput = document.getElementById('arrayInput');
  const setArrayBtn = document.getElementById('setArrayBtn');
  const generateRandomBtn = document.getElementById('generateRandomBtn');
  const randomSizeInput = document.getElementById('randomSize');
  const speedRange = document.getElementById('speedRange');
  const speedValue = document.getElementById('speedValue');
  const modeSelect = document.getElementById('modeSelect');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const stepBtn = document.getElementById('stepBtn');
  const resetBtn = document.getElementById('resetBtn');
  const skipToEndBtn = document.getElementById('skipToEndBtn');
  const arrayDisplay = document.getElementById('arrayDisplay');
  const logArea = document.getElementById('log');
  const inspectIndexInput = document.getElementById('inspectIndex');
  const inspectValueBtn = document.getElementById('inspectValueBtn');
  const compareIndicesInput = document.getElementById('compareIndices');
  const compareBtn = document.getElementById('compareBtn');
  const swapIndicesInput = document.getElementById('swapIndices');
  const swapBtn = document.getElementById('swapBtn');
  const saveLoadArea = document.getElementById('saveLoadArea');
  const saveBtn = document.getElementById('saveBtn');
  const loadBtn = document.getElementById('loadBtn');

  let array = [];
  let originalArray = [];
  let sorting = false;
  let paused = false;
  let currentI = 0;
  let currentJ = 0;
  let sorted = false;
  let timerId = null;
  let compareHighlightIndices = [];
  let swapHighlightIndices = [];
  let logHistory = [];
  
  // Store full Bubble Sort state to support step and pause:
  // i iterates from 0 to n-1
  // j iterates from 0 to n-1-i-1

  function log(msg) {
    logHistory.push(msg);
    // Limit log length to 1000 lines
    if (logHistory.length > 1000) logHistory.shift();
    logArea.value = logHistory.join('\n');
    logArea.scrollTop = logArea.scrollHeight;
  }

  function clearLog() {
    logHistory = [];
    logArea.value = '';
  }

  function parseArrayInput(text) {
    // Parse comma separated integers, ignoring empty parts
    const parts = text.split(',');
    const nums = [];
    for(let p of parts){
      const v = p.trim();
      if(v.length === 0) continue;
      if(!/^[-+]?\d+$/.test(v)) return null;
      nums.push(parseInt(v, 10));
    }
    return nums;
  }

  function displayArray(highlightCompare = [], highlightSwap = []) {
    arrayDisplay.innerHTML = '';
    for(let k=0; k<array.length; k++){
      const span = document.createElement('span');
      span.textContent = array[k];
      span.setAttribute('data-index', k);
      if(highlightCompare.includes(k)) {
        span.classList.add('highlight-compare');
      }
      if(highlightSwap.includes(k)) {
        span.classList.add('highlight-swap');
      }
      span.title = `Value: ${array[k]}\nIndex: ${k}`;
      arrayDisplay.appendChild(span);
    }
  }

  function resetSortingState() {
    sorting = false;
    paused = false;
    timerId = null;
    currentI = 0;
    currentJ = 0;
    sorted = false;
    compareHighlightIndices = [];
    swapHighlightIndices = [];
    displayArray();
    clearLog();
    log(`Array reset: [${array.join(', ')}]`);
  }

  function setArray(newArray) {
    if(!Array.isArray(newArray)) {
      alert('Invalid array.');
      return;
    }
    array = newArray.slice();
    originalArray = newArray.slice();
    resetSortingState();
    enableControlButtons(true);
    displayArray();
  }

  function generateRandomArray(size) {
    const maxVal = 999;
    const minVal = -999;
    const arr = [];
    for(let i=0; i<size; i++){
      arr.push(Math.floor(Math.random() * (maxVal-minVal+1)) + minVal);
    }
    return arr;
  }

  function enableControlButtons(enabled) {
    pauseBtn.disabled = !enabled;
    stepBtn.disabled = !enabled;
    resetBtn.disabled = !enabled;
    skipToEndBtn.disabled = !enabled;
  }

  function disableAllControls() {
    pauseBtn.disabled = true;
    stepBtn.disabled = true;
    resetBtn.disabled = true;
    skipToEndBtn.disabled = true;
    startBtn.disabled = true;
  }

  function enableAllControls() {
    startBtn.disabled = false;
    setArrayBtn.disabled = false;
    generateRandomBtn.disabled = false;
    speedRange.disabled = false;
    modeSelect.disabled = false;
    inspectValueBtn.disabled = false;
    compareBtn.disabled = false;
    swapBtn.disabled = false;
    saveBtn.disabled = false;
    loadBtn.disabled = false;
    pauseBtn.disabled = true;
    stepBtn.disabled = true;
    resetBtn.disabled = true;
    skipToEndBtn.disabled = true;
  }

  function updateSpeedDisplay(){
    speedValue.textContent = speedRange.value + 'ms';
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // Bubble Sort step function returns true if sorting finished
  function bubbleSortStep() {
    if(sorted) return true;

    const n = array.length;
    if(currentI >= n - 1) {
      sorted = true;
      return true;
    }

    if(currentJ >= n - 1 - currentI) {
      log(`Pass ${currentI+1} complete. No more comparisons in this pass.`);
      currentI++;
      currentJ = 0;
      return currentI >= n-1;
    }

    compareHighlightIndices = [currentJ, currentJ+1];
    displayArray(compareHighlightIndices);

    log(`Comparing indices ${currentJ} and ${currentJ+1} (values ${array[currentJ]} and ${array[currentJ+1]})`);
    if(array[currentJ] > array[currentJ+1]) {
      // Swap
      log(`Swapping since ${array[currentJ]} > ${array[currentJ+1]}`);
      const temp = array[currentJ];
      array[currentJ] = array[currentJ+1];
      array[currentJ+1] = temp;
      swapHighlightIndices = [currentJ, currentJ+1];
      displayArray(swapHighlightIndices);
    } else {
      swapHighlightIndices = [];
    }

    currentJ++;
    return false;
  }

  async function autoSort() {
    startBtn.disabled = true;
    pauseBtn.disabled = false;
    resetBtn.disabled = false;
    stepBtn.disabled = true;
    skipToEndBtn.disabled = false;
    setArrayBtn.disabled = true;
    generateRandomBtn.disabled = true;
    modeSelect.disabled = true;
    speedRange.disabled = true;

    sorting = true;
    paused = false;
    sorted = false;
    currentI = 0;
    currentJ = 0;
    log('Automatic sorting started.');
    while(sorting && !sorted) {
      if(paused) {
        log('Paused.');
        break;
      }
      const finish = bubbleSortStep();
      if(finish) {
        sorted = true;
        log('Sorting finished.');
        displayArray();
        break;
      }
      await sleep(parseInt(speedRange.value, 10));
    }
    if(sorted) {
      sorting = false;
      pauseBtn.disabled = true;
      stepBtn.disabled = true;
      startBtn.disabled = false;
      setArrayBtn.disabled = false;
      generateRandomBtn.disabled = false;
      modeSelect.disabled = false;
      speedRange.disabled = false;
      skipToEndBtn.disabled = true;
    }
  }

  function stepModeSortingStep() {
    if(sorted) {
      log('Array is already sorted.');
      return;
    }
    const finish = bubbleSortStep();
    if(finish) {
      sorted = true;
      log('Sorting finished.');
      displayArray();
    }
  }

  function pauseSorting() {
    if(!sorting) return;
    paused = true;
    pauseBtn.disabled = true;
    stepBtn.disabled = false;
    startBtn.disabled = false;
    log('Sorting paused.');
  }

  function resetSort() {
    array = originalArray.slice();
    sorting = false;
    paused = false;
    currentI = 0;
    currentJ = 0;
    sorted = false;
    compareHighlightIndices = [];
    swapHighlightIndices = [];
    displayArray();
    clearLog();
    log(`Array reset: [${array.join(', ')}]`);
    startBtn.disabled = false;
    pauseBtn.disabled = true;
    stepBtn.disabled = true;
    resetBtn.disabled = false;
    skipToEndBtn.disabled = true;
    setArrayBtn.disabled = false;
    generateRandomBtn.disabled = false;
    modeSelect.disabled = false;
    speedRange.disabled = false;
  }

  async function skipToEnd() {
    if(sorted) {
      log('Already sorted.');
      return;
    }
    disableAllControls();
    log('Skipping to end...');
    while(!sorted) {
      // step without delay for speed
      sorted = false;
      while(true){
        const finish = bubbleSortStep();
        if(finish) {
          sorted = true;
          break;
        }
      }
      displayArray();
    }
    log('Sorting finished (skip to end).');
    enableAllControls();
    resetBtn.disabled = false;
    skipToEndBtn.disabled = true;
  }

  // Event handlers

  setArrayBtn.addEventListener('click', () => {
    if(sorting) {
      alert('Cannot set array while sorting is active.');
      return;
    }
    const inputText = arrayInput.value;
    const arr = parseArrayInput(inputText);
    if(arr === null) {
      alert('Input invalid. Please enter comma separated integers.');
      return;
    }
    setArray(arr);
  });

  generateRandomBtn.addEventListener('click', () => {
    if(sorting) {
      alert('Cannot generate array while sorting is active.');
      return;
    }
    let size = parseInt(randomSizeInput.value, 10);
    if(isNaN(size) || size < 1) size = 10;
    else if(size > 50) size = 50;
    const arr = generateRandomArray(size);
    arrayInput.value = arr.join(', ');
    setArray(arr);
  });

  speedRange.addEventListener('input', () => {
    updateSpeedDisplay();
  });
  updateSpeedDisplay();

  modeSelect.addEventListener('change', () => {
    if(sorting) {
      alert('Cannot change mode while sorting.');
      modeSelect.value = sortingMode;
      return;
    }
    if(modeSelect.value === 'auto') {
      stepBtn.disabled = true;
      pauseBtn.disabled = true;
      skipToEndBtn.disabled = false;
      startBtn.disabled = false;
    } else if(modeSelect.value === 'step') {
      stepBtn.disabled = false;
      pauseBtn.disabled = true;
      skipToEndBtn.disabled = false;
      startBtn.disabled = true;
    } else if(modeSelect.value === 'inspect') {
      stepBtn.disabled = true;
      pauseBtn.disabled = true;
      skipToEndBtn.disabled = true;
      startBtn.disabled = true;
    }
  });

  startBtn.addEventListener('click', () => {
    if(sorting) {
      alert('Already sorting.');
      return;
    }
    if(array.length === 0) {
      alert('Empty array. Set or generate an array first.');
      return;
    }
    if(modeSelect.value === 'auto') {
      autoSort();
    } else if(modeSelect.value === 'step') {
      log('In step-by-step mode, press Step button to advance.');
      sorting = true;
      paused = false;
      sorted = false;
      currentI = 0;
      currentJ = 0;
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      stepBtn.disabled = false;
      resetBtn.disabled = false;
      skipToEndBtn.disabled = false;
    }
  });

  pauseBtn.addEventListener('click', () => {
    pauseSorting();
  });

  stepBtn.addEventListener('click', () => {
    if(!sorting) {
      alert('Sorting is not active.');
      return;
    }
    if(modeSelect.value === 'step') {
      stepModeSortingStep();
    }
  });

  resetBtn.addEventListener('click', () => {
    if(sorting) {
      sorting = false;
      paused = false;
    }
    resetSort();
  });

  skipToEndBtn.addEventListener('click', () => {
    if(modeSelect.value === 'auto' || modeSelect.value === 'step') {
      skipToEnd();
    }
  });

  inspectValueBtn.addEventListener('click', () => {
    const idx = parseInt(inspectIndexInput.value, 10);
    if(isNaN(idx) || idx < 0 || idx >= array.length) {
      alert('Invalid index to inspect.');
      return;
    }
    alert(`Value at index ${idx} is ${array[idx]}.`);
    log(`Inspected value at index ${idx}: ${array[idx]}`);
  });

  compareBtn.addEventListener('click', () => {
    const text = compareIndicesInput.value.trim();
    const parts = text.split(',');
    if(parts.length !== 2) {
      alert('Enter exactly two indices separated by a comma.');
      return;
    }
    const i1 = parseInt(parts[0].trim(), 10);
    const i2 = parseInt(parts[1].trim(), 10);
    if(isNaN(i1) || isNaN(i2) || i1<0 || i1>=array.length || i2<0 || i2>=array.length){
      alert('Invalid indices for compare.');
      return;
    }
    displayArray([i1, i2]);
    let comp = 0;
    if(array[i1] < array[i2]) comp = -1;
    else if(array[i1] > array[i2]) comp = 1;
    alert(`Compare result: array[${i1}] (${array[i1]}) ${comp < 0 ? '<' : comp > 0 ? '>' : '=='} array[${i2}] (${array[i2]}).`);
    log(`Manual compare indices ${i1} and ${i2}: ${array[i1]} vs ${array[i2]}`);
  });

  swapBtn.addEventListener('click', () => {
    const text = swapIndicesInput.value.trim();
    const parts = text.split(',');
    if(parts.length !== 2) {
      alert('Enter exactly two indices separated by a comma.');
      return;
    }
    const i1 = parseInt(parts[0].trim(), 10);
    const i2 = parseInt(parts[1].trim(), 10);
    if(isNaN(i1) || isNaN(i2) || i1<0 || i1>=array.length || i2<0 || i2>=array.length){
      alert('Invalid indices for swap.');
      return;
    }
    if(i1 === i2) {
      alert('Swapping same index does nothing.');
      return;
    }
    // Perform swap
    const temp = array[i1];
    array[i1] = array[i2];
    array[i2] = temp;
    log(`Manually swapped indices ${i1} and ${i2}: new array [${array.join(', ')}]`);
    displayArray([i1, i2]);
  });

  saveBtn.addEventListener('click', () => {
    saveLoadArea.value = JSON.stringify(array);
    log('Array saved to text box.');
  });

  loadBtn.addEventListener('click', () => {
    const text = saveLoadArea.value.trim();
    try {
      const loadedArray = JSON.parse(text);
      if(!Array.isArray(loadedArray)) throw new Error('Not an array');
      if(loadedArray.some(x => typeof x !== 'number' || !Number.isInteger(x))) {
        alert('Array must contain only integers.');
        return;
      }
      setArray(loadedArray);
      log('Array loaded from text box.');
      alert('Array loaded successfully.');
    } catch(e) {
      alert('Invalid array JSON input.');
    }
  });

  // Initialize with default array
  setArray(parseArrayInput(arrayInput.value));
  updateSpeedDisplay();

  // Keyboard shortcuts for step and pause in step mode
  document.addEventListener('keydown', e => {
    if(modeSelect.value === 'step' && sorting) {
      if(e.key === ' ') {
        e.preventDefault();
        stepModeSortingStep();
      } else if(e.key.toLowerCase() === 'p') {
        e.preventDefault();
        pauseSorting();
      }
    }
  });
})();
</script>

</body>
</html>
