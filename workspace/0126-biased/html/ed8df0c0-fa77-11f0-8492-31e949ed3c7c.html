<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prim's Algorithm Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            background-color: #2C3E50;
            color: #ECF0F1;
            overflow: hidden;
        }
        h1 {
            text-align: center;
            margin-top: 20px;
            font-size: 2.5em;
        }
        #canvas {
            display: block;
            margin: 40px auto;
            border: 2px solid #2980B9;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        button {
            background: #2980B9;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #3498DB;
        }
    </style>
</head>
<body>
    <h1>Visualizing Prim's Algorithm</h1>
    <canvas id="canvas" width="800" height="600"></canvas>
    <div class="controls">
        <button id="startButton">Start Animation</button>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const vertices = [
            { x: 100, y: 100 },
            { x: 700, y: 100 },
            { x: 700, y: 500 },
            { x: 100, y: 500 },
            { x: 400, y: 300 },
        ];

        const edges = [
            { from: 0, to: 1, weight: 1 },
            { from: 1, to: 2, weight: 5 },
            { from: 2, to: 3, weight: 3 },
            { from: 3, to: 0, weight: 4 },
            { from: 0, to: 4, weight: 2 },
            { from: 1, to: 4, weight: 3 },
            { from: 2, to: 4, weight: 2 },
        ];

        let mstEdges = [];
        let visited = new Array(vertices.length).fill(false);
        let currentEdgeIndex = 0;

        function drawVertices() {
            vertices.forEach((vertex, idx) => {
                ctx.fillStyle = visited[idx] ? '#27AE60' : '#E74C3C';
                ctx.beginPath();
                ctx.arc(vertex.x, vertex.y, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ECF0F1';
                ctx.stroke();
                ctx.font = '14px Arial';
                ctx.fillStyle = '#ECF0F1';
                ctx.fillText(idx, vertex.x - 5, vertex.y - 15);
            });
        }

        function drawEdges() {
            ctx.strokeStyle = '#BDC3C7';
            edges.forEach(edge => {
                ctx.beginPath();
                ctx.moveTo(vertices[edge.from].x, vertices[edge.from].y);
                ctx.lineTo(vertices[edge.to].x, vertices[edge.to].y);
                ctx.stroke();
            });

            ctx.strokeStyle = '#F39C12';
            mstEdges.forEach(edge => {
                ctx.beginPath();
                ctx.moveTo(vertices[edge.from].x, vertices[edge.from].y);
                ctx.lineTo(vertices[edge.to].x, vertices[edge.to].y);
                ctx.stroke();
            });
        }

        function primAlgorithm() {
            let startVertex = 0;
            visited[startVertex] = true;

            const addEdges = () => {
                const availableEdges = edges.filter(edge => visited[edge.from] !== visited[edge.to]);
                availableEdges.sort((a, b) => a.weight - b.weight);
                if (availableEdges.length) {
                    const nextEdge = availableEdges[0];
                    if (!visited[nextEdge.to]) {
                        visited[nextEdge.to] = true;
                        mstEdges.push(nextEdge);
                    }
                }
            };

            const animationLoop = () => {
                if (mstEdges.length < vertices.length - 1) {
                    addEdges();
                    drawCanvas();
                    setTimeout(animationLoop, 1000); 
                }
            };
            
            animationLoop();
        }

        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawEdges();
            drawVertices();
        }

        document.getElementById('startButton').onclick = () => {
            if (mstEdges.length === 0) {
                primAlgorithm();
            }
        };

        drawCanvas(); // Initial draw
    </script>
</body>
</html>
