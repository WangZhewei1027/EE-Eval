<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Quick Sort Interactive Simulator</title>
  <style>
    /* Minimal plain styling only to keep layout readable. No colors, no animations. */
    html,body { font-family: monospace; margin: 10px; padding: 0; }
    .row { display: block; margin-bottom: 8px; }
    label { margin-right: 6px; }
    input[type="text"], input[type="number"], select { width: 160px; }
    button { margin-right: 6px; }
    pre { background: none; border: 1px solid #000; padding: 6px; white-space: pre-wrap; }
    .pane { display: inline-block; vertical-align: top; margin-right: 10px; }
    .pane small { display:block; margin-top:4px; }
    .array-item { display:inline-block; padding:2px 6px; margin-right:4px; border:1px solid #000; }
    .control-group { border: 1px solid #000; padding:8px; margin-bottom:8px; }
    .list { max-height: 300px; overflow:auto; border:1px solid #000; padding:6px; }
    .btn-small { padding:2px 6px; }
  </style>
</head>
<body>
  <h2>Quick Sort Interactive Simulator</h2>

  <div class="control-group">
    <div class="row">
      <label>Array (comma separated):</label>
      <input id="arrayInput" type="text" value="8,3,7,1,9,2,5,4,6">
      <button id="applyArray">Apply</button>
      <button id="shuffleArray">Shuffle</button>
      <button id="randomArray">Random</button>
      <label>Size:</label><input id="randSize" type="number" value="10" min="1" style="width:60px">
      <label>Min:</label><input id="randMin" type="number" value="1" style="width:60px">
      <label>Max:</label><input id="randMax" type="number" value="20" style="width:60px">
    </div>

    <div class="row">
      <label>Partition scheme:</label>
      <select id="partitionScheme">
        <option value="lomuto">Lomuto</option>
        <option value="hoare">Hoare</option>
      </select>

      <label>Pivot strategy:</label>
      <select id="pivotStrategy">
        <option value="last">Last element</option>
        <option value="first">First element</option>
        <option value="middle">Middle element</option>
        <option value="random">Random</option>
        <option value="median3">Median of three</option>
        <option value="manual">Manual (click to set)</option>
      </select>

      <label>Order:</label>
      <select id="order">
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
      </select>

      <label>Break on depth >=</label>
      <input id="breakDepth" type="number" value="999" style="width:60px">
    </div>

    <div class="row">
      <button id="startBtn">Start Sort</button>
      <button id="pauseBtn">Pause</button>
      <button id="stepBtn">Step</button>
      <button id="backBtn">Step Back</button>
      <button id="runPartitionBtn">Run Current Partition</button>
      <button id="runRecursionBtn">Finish Current Recursion</button>
      <button id="fastForwardBtn">Run To End</button>
      <label>Speed (ms):</label><input id="speed" type="range" min="10" max="2000" value="300">
      <span id="speedVal">300</span>
    </div>

    <div class="row">
      <button id="undoBtn">Undo (history back)</button>
      <button id="redoBtn">Redo (history forward)</button>
      <button id="exportBtn">Export State</button>
      <button id="importBtn">Import State</button>
      <input id="importArea" type="text" placeholder="Paste JSON here" style="width:360px">
    </div>

    <div class="row">
      <label>Manual swap indices (i,j):</label>
      <input id="swapI" type="number" style="width:60px">
      <input id="swapJ" type="number" style="width:60px">
      <button id="manualSwapBtn">Swap</button>
      <label>Set element at idx to value:</label>
      <input id="setIdx" type="number" style="width:60px">
      <input id="setVal" type="number" style="width:80px">
      <button id="setValBtn">Set</button>
    </div>

    <div class="row">
      <button id="compareStrategiesBtn">Compare Strategies</button>
      <label>Compare with:</label>
      <select id="compareStrategy">
        <option value="median3">Median of three</option>
        <option value="random">Random</option>
        <option value="first">First</option>
        <option value="last">Last</option>
      </select>
      <button id="resetAllBtn">Reset All</button>
    </div>
  </div>

  <div class="row">
    <div class="pane" style="width:60%;">
      <div><strong>Array view (click an element when pivot strategy = Manual to choose pivot):</strong></div>
      <div id="arrayView" style="min-height:40px; margin-top:6px;"></div>
      <small>Markers: [p]=pivot index; < = left pointer; > = right pointer; * = compared; S = sorted element</small>
    </div>

    <div class="pane" style="width:35%;">
      <div><strong>Call stack / Segments</strong></div>
      <div id="stackView" class="list" style="width:320px"></div>
      <div style="margin-top:8px"><strong>Stats</strong></div>
      <div id="statsView"></div>
    </div>
  </div>

  <div class="row">
    <div style="width:49%; display:inline-block; vertical-align:top;">
      <div><strong>History (click to jump)</strong></div>
      <div id="historyView" class="list" style="width:100%;"></div>
    </div>

    <div style="width:49%; display:inline-block; vertical-align:top;">
      <div><strong>Log / Operations</strong></div>
      <div id="logView" class="list" style="width:100%;"></div>
    </div>
  </div>

  <script>
    // Quick Sort Interactive Simulator
    (function(){
      // Utilities
      function cloneArr(a){ return a.slice(); }
      function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
      function parseArrayText(txt){
        const items = txt.split(',').map(s=>s.trim()).filter(s=>s.length);
        const nums = items.map(s=>Number(s));
        if (nums.some(n=>Number.isNaN(n))) return null;
        return nums;
      }

      // DOM refs
      const arrayInput = document.getElementById('arrayInput');
      const applyArrayBtn = document.getElementById('applyArray');
      const shuffleArrayBtn = document.getElementById('shuffleArray');
      const randomArrayBtn = document.getElementById('randomArray');
      const randSize = document.getElementById('randSize');
      const randMin = document.getElementById('randMin');
      const randMax = document.getElementById('randMax');

      const partitionSchemeSel = document.getElementById('partitionScheme');
      const pivotStrategySel = document.getElementById('pivotStrategy');
      const orderSel = document.getElementById('order');

      const startBtn = document.getElementById('startBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const stepBtn = document.getElementById('stepBtn');
      const backBtn = document.getElementById('backBtn');
      const runPartitionBtn = document.getElementById('runPartitionBtn');
      const runRecursionBtn = document.getElementById('runRecursionBtn');
      const fastForwardBtn = document.getElementById('fastForwardBtn');
      const speed = document.getElementById('speed');
      const speedVal = document.getElementById('speedVal');

      const breakDepthInput = document.getElementById('breakDepth');

      const arrayView = document.getElementById('arrayView');
      const stackView = document.getElementById('stackView');
      const historyView = document.getElementById('historyView');
      const logView = document.getElementById('logView');
      const statsView = document.getElementById('statsView');

      const undoBtn = document.getElementById('undoBtn');
      const redoBtn = document.getElementById('redoBtn');
      const exportBtn = document.getElementById('exportBtn');
      const importBtn = document.getElementById('importBtn');
      const importArea = document.getElementById('importArea');

      const swapI = document.getElementById('swapI');
      const swapJ = document.getElementById('swapJ');
      const manualSwapBtn = document.getElementById('manualSwapBtn');
      const setIdx = document.getElementById('setIdx');
      const setVal = document.getElementById('setVal');
      const setValBtn = document.getElementById('setValBtn');

      const compareStrategiesBtn = document.getElementById('compareStrategiesBtn');
      const compareStrategySel = document.getElementById('compareStrategy');
      const resetAllBtn = document.getElementById('resetAllBtn');

      // State
      let baseArray = parseArrayText(arrayInput.value) || [8,3,7,1,9,2,5,4,6];
      let currentStateIndex = 0;
      let history = []; // array of state objects
      let branches = {}; // branchId => list of states (ids)
      let branchCounter = 1;
      let running = false;
      let paused = false;
      let autoTimer = null;
      let genController = null; // object controlling generator and resume values
      let redoStack = [];

      // Stats accumulation for current "run" (per branch)
      function makeInitialState(arr){
        return {
          arr: cloneArr(arr),
          pointers: {i:null,j:null,pivot:null,low:null,high:null},
          op: 'init',
          desc: 'Initial array',
          stack: [],
          stats: {swaps:0,comps:0,calls:0,maxDepth:0},
          timestamp: Date.now(),
          branchId: 0,
          parent: null,
          id: history.length
        };
      }

      // Initialize history
      function resetHistory(arr){
        history = [];
        branches = {};
        branchCounter = 1;
        const s = makeInitialState(arr);
        s.branchId = 0;
        branches[0] = [0];
        history.push(s);
        currentStateIndex = 0;
        redoStack = [];
        genController = null;
        running = false;
        paused = false;
        updateViews();
      }

      // Render array view with markers
      function renderArrayView(state){
        arrayView.innerHTML = '';
        const arr = state.arr;
        const p = state.pointers;
        for (let idx=0; idx<arr.length; idx++){
          const span = document.createElement('span');
          span.className = 'array-item';
          span.dataset.index = idx;
          let label = String(arr[idx]);
          let markers = [];
          if (p.pivot === idx) markers.push('[p]');
          if (p.i === idx) markers.push('<');
          if (p.j === idx) markers.push('>');
          if (p.compared && p.compared.indexOf(idx)!==-1) markers.push('*');
          if (p.sortedRange && p.sortedRange.includes(idx)) markers.push('S');
          if (markers.length) label += ' ' + markers.join('');
          span.textContent = label;
          span.onclick = onArrayItemClick;
          arrayView.appendChild(span);
        }
      }

      function renderStackView(state){
        stackView.innerHTML = '';
        const s = state.stack || [];
        if (!s.length) stackView.textContent = '(empty)';
        else {
          s.slice().reverse().forEach((seg, idx)=>{
            const div = document.createElement('div');
            div.textContent = 'depth ' + (s.length-idx) + ': [' + seg.lo + ',' + seg.hi + '] ' + (seg.note || '');
            stackView.appendChild(div);
          });
        }
      }

      function renderStats(state){
        const st = state.stats || {};
        statsView.innerHTML = '';
        statsView.appendChild(document.createTextNode('Comparisons: ' + (st.comps||0)));
        statsView.appendChild(document.createElement('br'));
        statsView.appendChild(document.createTextNode('Swaps: ' + (st.swaps||0)));
        statsView.appendChild(document.createElement('br'));
        statsView.appendChild(document.createTextNode('Calls: ' + (st.calls||0)));
        statsView.appendChild(document.createElement('br'));
        statsView.appendChild(document.createTextNode('Max depth seen: ' + (st.maxDepth||0)));
      }

      function renderHistory(){
        historyView.innerHTML = '';
        history.forEach((st, idx)=>{
          const div = document.createElement('div');
          div.textContent = idx + ': ' + st.op + ' | ' + st.desc;
          div.style.cursor = 'pointer';
          if (idx === currentStateIndex) div.textContent = '* ' + div.textContent;
          div.onclick = ()=>{ jumpToState(idx); };
          historyView.appendChild(div);
        });
      }

      function log(msg){
        const d = document.createElement('div');
        d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
        logView.insertBefore(d, logView.firstChild);
      }

      function updateViews(){
        const state = history[currentStateIndex];
        renderArrayView(state);
        renderStackView(state);
        renderStats(state);
        renderHistory();
      }

      // Manage history snapshots, branching
      function pushState(state){
        // state is snapshot-like (we will clone to freeze)
        const s = {
          arr: cloneArr(state.arr),
          pointers: JSON.parse(JSON.stringify(state.pointers || {})),
          op: state.op || 'op',
          desc: state.desc || '',
          stack: JSON.parse(JSON.stringify(state.stack || [])),
          stats: JSON.parse(JSON.stringify(state.stats || {})),
          timestamp: Date.now(),
          parent: currentStateIndex,
          branchId: state.branchId !== undefined ? state.branchId : (history[currentStateIndex] ? history[currentStateIndex].branchId : 0),
          id: history.length
        };

        // If we're not at the tip of history (currentStateIndex !== last), we create a branch
        if (currentStateIndex !== history.length - 1){
          s.parent = currentStateIndex;
          s.branchId = branchCounter++;
          branches[s.branchId] = [];
          log('Created new branch ' + s.branchId + ' from state ' + s.parent);
        }

        history.push(s);
        currentStateIndex = history.length - 1;
        if (!branches[s.branchId]) branches[s.branchId] = [];
        branches[s.branchId].push(s.id);
        redoStack = [];
        updateViews();
      }

      function jumpToState(idx){
        if (idx < 0 || idx >= history.length) return;
        currentStateIndex = idx;
        updateViews();
      }

      function stepBack(){
        if (currentStateIndex > 0){
          currentStateIndex--;
          updateViews();
        }
      }

      // Export/Import
      function exportState(){
        const data = {history: history, current: currentStateIndex, branches: branches};
        return JSON.stringify(data);
      }
      function importState(json){
        try {
          const parsed = JSON.parse(json);
          if (!parsed.history) throw 'Invalid JSON';
          history = parsed.history;
          currentStateIndex = parsed.current || 0;
          branches = parsed.branches || {};
          updateViews();
        } catch(e){
          alert('Import failed: ' + e);
        }
      }

      // QuickSort operation generator
      // We yield operation objects. Controller will act, push states, and can resume generator with value for manual pivot.
      function* quicksortGenerator(arr, options){
        // options: partition: 'lomuto'|'hoare', pivotStrategy, order asc|desc, breakDepth int
        // We'll implement iterative stack controlling recursion depth explicitly for clearer visuals.
        const a = arr;
        const n = a.length;
        const stats = {swaps:0, comps:0, calls:0, maxDepth:0};
        // stack frames: {lo,hi,stage,depth}
        let stack = [];
        stack.push({lo:0, hi:n-1, stage:'enter', depth:1});
        while (stack.length){
          const frame = stack.pop();
          stats.calls++;
          stats.maxDepth = Math.max(stats.maxDepth, frame.depth);
          // update display: entering a call
          yield {op:'callEnter', desc:'Enter ['+frame.lo+','+frame.hi+']', stack: stack.concat([frame]), stats: {...stats}, pointers:{low:frame.lo, high:frame.hi}};
          if (frame.lo >= frame.hi){
            // nothing to sort
            // mark as sorted range
            yield {op:'doneSegment', desc:'Range ['+frame.lo+','+frame.hi+'] sorted (base case)', stack: stack.concat([frame]), stats:{...stats}, pointers:{low:frame.lo, high:frame.hi, sortedRange:range(frame.lo, frame.hi)}};
            continue;
          }

          // Breakpoint by depth
          if (frame.depth >= (options.breakDepth||9999)){
            yield {op:'breakpoint', desc:'Breakpoint at depth ' + frame.depth, stack: stack.concat([frame]), stats:{...stats}, pointers:{low:frame.lo, high:frame.hi}, control:'await'};
            // controller can decide to continue or modify options
          }

          // Choose pivot index based on strategy. If 'manual' and controller returns an index, support that via next(value).
          let pivotIndex = choosePivot(a, frame.lo, frame.hi, options.pivotStrategy);
          if (options.pivotStrategy === 'manual'){
            // Ask controller for manual pivot
            const manual = yield {op:'awaitPivot', desc:'Await manual pivot for ['+frame.lo+','+frame.hi+']', stack: stack.concat([frame]), stats:{...stats}, pointers:{low:frame.lo, high:frame.hi}};
            if (typeof manual === 'number' && manual >= frame.lo && manual <= frame.hi){
              pivotIndex = manual;
            } else {
              pivotIndex = Math.max(frame.lo, Math.min(frame.hi, Math.floor((frame.lo+frame.hi)/2)));
            }
          }

          yield {op:'selectPivot', desc:'Selected pivot index ' + pivotIndex + ' value ' + String(a[pivotIndex]), stack: stack.concat([frame]), stats:{...stats}, pointers:{pivot:pivotIndex, low:frame.lo, high:frame.hi}};

          // Partition using chosen scheme
          if (options.partition === 'lomuto'){
            // Move pivot to end
            if (pivotIndex !== frame.hi){
              swap(a, pivotIndex, frame.hi);
              stats.swaps++;
              yield {op:'swap', desc:'Swap pivot into end: '+pivotIndex+'<->'+frame.hi, stack: stack.concat([frame]), stats:{...stats}, pointers:{i:pivotIndex, j:frame.hi}};
              pivotIndex = frame.hi;
            }
            // Lomuto partition
            let store = frame.lo;
            for (let k = frame.lo; k < frame.hi; k++){
              stats.comps++;
              yield {op:'compare', desc:'Compare a['+k+'] vs pivot', stack: stack.concat([frame]), stats:{...stats}, pointers:{i:k, pivot:pivotIndex, low:frame.lo, high:frame.hi}, compared:[k,pivotIndex]};
              let cond = options.order === 'asc' ? a[k] < a[pivotIndex] : a[k] > a[pivotIndex];
              if (cond){
                if (k !== store){
                  swap(a, k, store);
                  stats.swaps++;
                  yield {op:'swap', desc:'Swap '+k+' <-> '+store, stack: stack.concat([frame]), stats:{...stats}, pointers:{i:k, j:store}};
                } else {
                  yield {op:'nop', desc:'No-op swap at '+k, stack: stack.concat([frame]), stats:{...stats}, pointers:{i:k}};
                }
                store++;
              }
            }
            // final swap pivot to correct position
            if (store !== frame.hi){
              swap(a, store, frame.hi);
              stats.swaps++;
              yield {op:'swap', desc:'Place pivot at index '+store+' (swap '+store+'<->'+frame.hi+')', stack: stack.concat([frame]), stats:{...stats}, pointers:{i:store, j:frame.hi}};
            } else {
              yield {op:'nop', desc:'Pivot already in place at '+store, stack: stack.concat([frame]), stats:{...stats}, pointers:{i:store}};
            }
            // After partition complete
            const pivotPos = store;
            yield {op:'partition', desc:'Partition finished at '+pivotPos, stack: stack.concat([frame]), stats:{...stats}, pointers:{pivot:pivotPos, low:frame.lo, high:frame.hi}, sortedRange:range(frame.lo,frame.hi)};
            // push right and left segments
            // push larger segment first to keep stack size smaller if we wanted to emulate tail call optimization (not necessary)
            const leftLen = pivotPos - frame.lo;
            const rightLen = frame.hi - pivotPos;
            // push bigger first so smaller processed next (to keep depth smaller)
            if (leftLen < rightLen){
              if (pivotPos+1 < frame.hi) stack.push({lo:pivotPos+1, hi:frame.hi, stage:'enter', depth:frame.depth+1});
              if (frame.lo < pivotPos-1) stack.push({lo:frame.lo, hi:pivotPos-1, stage:'enter', depth:frame.depth+1});
            } else {
              if (frame.lo < pivotPos-1) stack.push({lo:frame.lo, hi:pivotPos-1, stage:'enter', depth:frame.depth+1});
              if (pivotPos+1 < frame.hi) stack.push({lo:pivotPos+1, hi:frame.hi, stage:'enter', depth:frame.depth+1});
            }
          } else { // hoare
            // choose pivot value and set two indices
            const pv = a[pivotIndex];
            yield {op:'pivotValue', desc:'Hoare pivot value ' + pv, stack: stack.concat([frame]), stats:{...stats}, pointers:{pivot:pivotIndex, low:frame.lo, high:frame.hi}};
            let i = frame.lo - 1;
            let j = frame.hi + 1;
            while (true){
              do {
                i++;
                stats.comps++;
                yield {op:'compare', desc:'Compare a['+i+'] with pivot', stack: stack.concat([frame]), stats:{...stats}, pointers:{i:i, pivot:pivotIndex}, compared:[i,pivotIndex]};
              } while ( (options.order==='asc') ? a[i] < pv : a[i] > pv );
              do {
                j--;
                stats.comps++;
                yield {op:'compare', desc:'Compare a['+j+'] with pivot', stack: stack.concat([frame]), stats:{...stats}, pointers:{j:j, pivot:pivotIndex}, compared:[j,pivotIndex]};
              } while ( (options.order==='asc') ? a[j] > pv : a[j] < pv );
              if (i >= j){
                yield {op:'partition', desc:'Hoare partition returned j='+j, stack: stack.concat([frame]), stats:{...stats}, pointers:{i:i,j:j}};
                // push subranges
                if (frame.lo < j) stack.push({lo:frame.lo, hi:j, stage:'enter', depth:frame.depth+1});
                if (j+1 < frame.hi) stack.push({lo:j+1, hi:frame.hi, stage:'enter', depth:frame.depth+1});
                break;
              }
              swap(a,i,j);
              stats.swaps++;
              yield {op:'swap', desc:'Swap '+i+' <-> '+j, stack: stack.concat([frame]), stats:{...stats}, pointers:{i:i,j:j}};
            }
          }
        }
        // finished
        yield {op:'done', desc:'Array fully sorted', stack:[], stats:{...stats}, pointers:{}, final:true};
      }

      // Helpers for generator
      function range(lo,hi){
        const arr = [];
        for (let i=lo;i<=hi;i++) arr.push(i);
        return arr;
      }
      function swap(a,i,j){
        const tmp = a[i];
        a[i] = a[j];
        a[j] = tmp;
      }
      function choosePivot(a, lo, hi, strategy){
        if (strategy === 'last') return hi;
        if (strategy === 'first') return lo;
        if (strategy === 'middle') return Math.floor((lo+hi)/2);
        if (strategy === 'random') return randInt(lo,hi);
        if (strategy === 'median3'){
          const mid = Math.floor((lo+hi)/2);
          const trio = [[a[lo],lo],[a[mid],mid],[a[hi],hi]];
          trio.sort((x,y)=> (x[0]-y[0]));
          return trio[1][1];
        }
        if (strategy === 'manual') return Math.floor((lo+hi)/2);
        return hi;
      }

      // Controller to run generator and integrate with UI/history
      function startSortController(){
        if (genController) {
          // already running sorts; ignore or restart?
          log('A sort is already active. Pause and reset to start new.');
          return;
        }
        // Use current array as starting point of run
        const startState = history[currentStateIndex];
        const arrCopy = cloneArr(startState.arr);
        const options = {
          partition: partitionSchemeSel.value,
          pivotStrategy: pivotStrategySel.value,
          order: orderSel.value,
          breakDepth: Number(breakDepthInput.value) || 9999
        };
        const gen = quicksortGenerator(arrCopy, options);
        genController = {gen:gen, arr:arrCopy, options:options, lastYield:null};
        running = true; paused = false;
        log('Started sort with options: ' + JSON.stringify(options));
        // Create a run root state tying to parent current
        const base = {
          arr: arrCopy,
          pointers: {},
          op: 'runStart',
          desc: 'Start run',
          stack: [],
          stats: {swaps:0,comps:0,calls:0,maxDepth:0},
          branchId: history[currentStateIndex].branchId
        };
        pushState(base);
        proceedGenerator(); // step once to process until first yield
      }

      function proceedGenerator(resumeValue){
        if (!genController) return;
        const {gen} = genController;
        let step;
        try {
          step = gen.next(resumeValue);
        } catch (e){
          log('Generator error: ' + e);
          genController = null;
          running = false;
          paused = false;
          return;
        }
        if (step.done){
          // final state
          const final = {arr: genController.arr, pointers:{}, op: step.value && step.value.op ? step.value.op : 'done', desc: step.value && step.value.desc ? step.value.desc : 'Finished', stack:[], stats: step.value && step.value.stats ? step.value.stats : {}};
          pushState(final);
          log('Sort finished.');
          genController = null;
          running = false;
          paused = false;
          return;
        } else {
          const op = step.value;
          // Apply the op to genController.arr if it modified directly (generator already mutated arr)
          const snapshot = {
            arr: genController.arr,
            pointers: op.pointers || {},
            op: op.op || 'op',
            desc: op.desc || '',
            stack: op.stack || [],
            stats: op.stats || {},
            branchId: history[currentStateIndex].branchId
          };
          pushState(snapshot);
          log('Op: ' + snapshot.op + ' - ' + snapshot.desc);
          genController.lastYield = op;

          // Special control messages: awaitPivot or breakpoint
          if (op.op === 'awaitPivot' || op.op === 'breakpoint'){
            paused = true;
            running = false;
            log('Paused at ' + op.op + ': ' + op.desc);
            return;
          }

          // If not paused, and running, schedule auto next step
          if (!paused && running){
            scheduleAutoStep();
          }
        }
      }

      // Auto step scheduling
      function scheduleAutoStep(){
        clearTimeout(autoTimer);
        const delay = Number(speed.value) || 300;
        autoTimer = setTimeout(()=>{ proceedGenerator(); }, delay);
      }

      // Pause, resume functions
      function pauseSort(){
        paused = true;
        running = false;
        clearTimeout(autoTimer);
        log('Paused.');
      }
      function resumeSort(){
        if (!genController){
          log('No active sort to resume.');
          return;
        }
        paused = false;
        running = true;
        log('Resuming sort...');
        scheduleAutoStep();
      }

      // Step execution: single step from generator
      function stepOnce(){
        if (!genController){
          // user can create a new sort implicitly via step?
          startSortController();
          return;
        }
        if (paused) { paused = false; proceedGenerator(); paused = true; } else {
          proceedGenerator();
        }
      }

      // Step back handled by history-based approach (no need to manipulate generator)
      // If user steps back and then steps forward while generator exists, we'll resume from generator's internal state (not aligned). So we disallow stepping back while active generator exists.
      function safeStepBack(){
        if (genController){
          // Cancel generator to avoid mismatch
          const ok = confirm('Stepping back will cancel the active run. Proceed?');
          if (!ok) return;
          genController = null;
          running = false;
          paused = false;
        }
        stepBack();
      }

      // Run partition: we finish until next partition op completes
      function runPartition(){
        if (!genController){
          startSortController();
          return;
        }
        paused = false;
        running = true;
        function loop(){
          if (!genController) return;
          const last = genController.lastYield;
          proceedGenerator();
          const nextLast = genController && genController.lastYield ? genController.lastYield.op : null;
          if (!genController) return;
          if (nextLast !== 'partition' && nextLast !== 'done' && nextLast !== 'doneSegment'){
            // continue
            setTimeout(loop, 10);
          } else {
            paused = true; running = false;
            log('Partition completed and paused.');
          }
        }
        loop();
      }

      // Finish current recursion call: run until callExit or return to parent (we detect callEnter/callExit by stack length changes)
      function runRecursion(){
        if (!genController){
          startSortController();
          return;
        }
        paused = false;
        running = true;
        let initialDepth = (genController.lastYield && genController.lastYield.stack) ? genController.lastYield.stack.length : 0;
        function loop(){
          if (!genController) return;
          proceedGenerator();
          if (!genController) return;
          const curDepth = genController.lastYield && genController.lastYield.stack ? genController.lastYield.stack.length : 0;
          if (curDepth < initialDepth){
            paused = true; running = false;
            log('Returned from recursion and paused.');
            return;
          }
          setTimeout(loop, 10);
        }
        loop();
      }

      // Fast forward to end
      function runToEnd(){
        if (!genController){
          startSortController();
          return;
        }
        paused = false;
        running = true;
        function loop(){
          if (!genController) return;
          proceedGenerator();
          if (!genController) return;
          setTimeout(loop, 0);
        }
        loop();
      }

      // Event handlers
      applyArrayBtn.onclick = ()=>{
        const txt = arrayInput.value;
        const parsed = parseArrayText(txt);
        if (!parsed){
          alert('Invalid array input. Use comma separated numbers.');
          return;
        }
        baseArray = parsed;
        resetHistory(baseArray);
        log('Applied new array.');
      };

      shuffleArrayBtn.onclick = ()=>{
        const idx = currentStateIndex;
        const a = cloneArr(history[idx].arr);
        for (let i=a.length-1;i>0;i--){
          const j = randInt(0,i);
          swap(a,i,j);
        }
        const s = {arr:a, pointers:{}, op:'shuffle', desc:'Shuffled array', branchId: history[idx].branchId};
        pushState(s);
        log('Shuffled array relative to state ' + idx);
      };

      randomArrayBtn.onclick = ()=>{
        const size = Number(randSize.value)||10;
        const min = Number(randMin.value)||1;
        const max = Number(randMax.value)||20;
        const a = [];
        for (let i=0;i<size;i++) a.push(randInt(min,max));
        arrayInput.value = a.join(',');
        baseArray = a;
        resetHistory(baseArray);
        log('Generated random array.');
      };

      startBtn.onclick = ()=> startSortController();
      pauseBtn.onclick = ()=> { if (running) pauseSort(); else if (genController) resumeSort(); else log('No active run.'); };
      stepBtn.onclick = ()=> { stepOnce(); };
      backBtn.onclick = ()=> { safeStepBack(); };
      runPartitionBtn.onclick = ()=> { runPartition(); };
      runRecursionBtn.onclick = ()=> { runRecursion(); };
      fastForwardBtn.onclick = ()=> { runToEnd(); };

      speed.oninput = ()=> { speedVal.textContent = speed.value; };

      undoBtn.onclick = ()=> { stepBack(); };
      redoBtn.onclick = ()=> {
        if (currentStateIndex < history.length - 1){
          currentStateIndex++;
          updateViews();
        }
      };
      exportBtn.onclick = ()=> { importArea.value = exportState(); log('Exported state to text box.'); };
      importBtn.onclick = ()=> {
        if (importArea.value.trim()){
          importState(importArea.value.trim());
          log('Imported state.');
        } else {
          alert('Paste JSON into the box first.');
        }
      };

      manualSwapBtn.onclick = ()=>{
        const i = Number(swapI.value);
        const j = Number(swapJ.value);
        if (!Number.isInteger(i) || !Number.isInteger(j)) { alert('Indices must be integers'); return; }
        const st = history[currentStateIndex];
        const arr = cloneArr(st.arr);
        if (i < 0 || i >= arr.length || j < 0 || j >= arr.length) { alert('Index out of bounds'); return; }
        swap(arr,i,j);
        const s = {arr:arr, pointers:{i:i,j:j}, op:'manualSwap', desc:'Manual swap '+i+'<->'+j, branchId: st.branchId};
        pushState(s);
        log('Manual swap executed.');
      };

      setValBtn.onclick = ()=>{
        const idx = Number(setIdx.value);
        const val = Number(setVal.value);
        if (!Number.isInteger(idx)) { alert('Index must be integer'); return; }
        const st = history[currentStateIndex];
        const arr = cloneArr(st.arr);
        if (idx < 0 || idx >= arr.length) { alert('Index out of bounds'); return; }
        arr[idx] = val;
        const s = {arr:arr, pointers:{}, op:'setValue', desc:'Set a['+idx+']='+val, branchId: st.branchId};
        pushState(s);
        log('Element set manually.');
      };

      compareStrategiesBtn.onclick = ()=>{
        // Run two strategies on copies of the array and compare stats (synchronously, non-visual)
        const base = history[currentStateIndex].arr;
        const stratA = pivotStrategySel.value;
        const stratB = compareStrategySel.value;
        // Run quicksort twice to gather stats
        function runOnce(arrCopy, options){
          // We'll run the generator to completion and gather the last stats object
          const gen = quicksortGenerator(arrCopy, options);
          let last = null;
          while (true){
            const val = gen.next();
            if (val.done){
              if (val.value && val.value.stats) last = val.value.stats;
              break;
            } else {
              last = val.value.stats || last;
            }
          }
          return {arr:arrCopy, stats:last};
        }
        const optA = {partition: partitionSchemeSel.value, pivotStrategy: stratA, order: orderSel.value, breakDepth: 9999};
        const optB = {partition: partitionSchemeSel.value, pivotStrategy: stratB, order: orderSel.value, breakDepth: 9999};
        const copyA = cloneArr(base);
        const copyB = cloneArr(base);
        const resA = runOnce(copyA, optA);
        const resB = runOnce(copyB, optB);
        // Present comparative result as a new state snapshot with info
        const desc = 'Comparison ' + stratA + ' vs ' + stratB + ' | A comps/swaps: ' + resA.stats.comps + '/' + resA.stats.swaps + ' B comps/swaps: ' + resB.stats.comps + '/' + resB.stats.swaps;
        const s = {arr: cloneArr(base), pointers:{}, op:'compare', desc:desc, branchId: history[currentStateIndex].branchId};
        pushState(s);
        log('Strategy comparison pushed. ' + desc);
        alert('Comparison result:\n' + desc);
      };

      resetAllBtn.onclick = ()=> {
        if (!confirm('Reset history and generator?')) return;
        baseArray = parseArrayText(arrayInput.value) || baseArray;
        resetHistory(baseArray);
        genController = null;
        running = false;
        paused = false;
        log('Reset all.');
      };

      // Handle clicking on array items (for manual pivot selection and for setting indices)
      function onArrayItemClick(e){
        const idx = Number(e.currentTarget.dataset.index);
        if (pivotStrategySel.value === 'manual' && genController && genController.lastYield && genController.lastYield.op === 'awaitPivot'){
          // resume generator with this index
          log('Manual pivot chosen at index ' + idx);
          // resume generator passing index
          paused = false; running = true;
          proceedGenerator(idx);
          paused = true; running = false;
        } else {
          // not in manual pivot mode; we can still set the current pointer to highlight this element (user-driven exploration)
          const st = cloneArr(history[currentStateIndex].arr);
          const s = {arr: st, pointers:{selected: idx}, op:'select', desc:'Selected index '+idx, branchId: history[currentStateIndex].branchId};
          pushState(s);
          log('Selected element ' + idx + ' for exploration.');
        }
      }

      // Initialize
      resetHistory(baseArray);
      updateViews();

      // Informational log
      log('Simulator ready. Load an array and use controls to explore Quick Sort.');

      // Expose some internals for advanced exploration in console (if user wants)
      window._qsSim = {
        history: ()=> history,
        jump: jumpToState,
        pushState: (s)=> pushState(s),
        generator: ()=> genController
      };

    })();
  </script>
</body>
</html>
