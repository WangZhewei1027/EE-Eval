<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thread</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="thread-container">
        <div class="thread">
            <h2>Thread Title</h2>
            <p>This is a sample thread title.</p>
        </div>
        <div class="thread-actions">
            <button id="add-thread-btn">Add Thread</button>
            <button id="delete-thread-btn">Delete Thread</button>
        </div>
        <div class="thread-body">
            <h2>Thread Body</h2>
            <p>This is a sample thread body.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
