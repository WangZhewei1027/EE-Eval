<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heap (Max)</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
        }
        #heap {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #heap h1 {
            margin-bottom: 10px;
        }
        #controls {
            margin-bottom: 20px;
        }
        #controls button {
            margin-right: 10px;
        }
        #controls input[type="number"] {
            width: 50px;
        }
        #controls input[type="text"] {
            width: 100px;
        }
    </style>
</head>
<body>
    <h1>Heap (Max)</h1>
    <div id="heap"></div>
    <div id="controls">
        <button id="add-heap-btn">Add Heap</button>
        <input type="number" id="heap-size" value="10">
        <input type="number" id="heap-size-max" value="100">
        <button id="clear-heap-btn">Clear Heap</button>
        <input type="text" id="heap-input" value="[]">
    </div>

    <script>
        let heap = null;
        let input = null;

        function createHeap() {
            const heapElement = document.getElementById("heap");
            heap = new Heap();
            heapElement.innerHTML = "";
            heapElement.appendChild(createHeapElement(heap));
        }

        function createHeapElement(heap) {
            const element = document.createElement("div");
            element.className = "heap-element";
            element.style.width = "100px";
            element.style.height = "50px";
            element.style.backgroundColor = "black";
            element.style.border = "1px solid black";
            element.style.padding = "10px";
            element.style.margin = "10px";
            element.style.borderRadius = "10px";
            element.style.boxShadow = "0 0 10px rgba(0,0,0,0.1)";
            element.appendChild(createHeapButton(heap));
            element.appendChild(createInputField(heap));
            return element;
        }

        function createHeapButton(heap) {
            const button = document.createElement("button");
            button.textContent = "Add";
            button.style.width = "100px";
            button.style.height = "30px";
            button.style.backgroundColor = "black";
            button.style.border = "none";
            button.style.padding = "10px";
            button.style.margin = "10px";
            button.style.borderRadius = "10px";
            button.style.boxShadow = "0 0 10px rgba(0,0,0,0.1)";
            button.onclick = () => {
                heap.add();
            };
            return button;
        }

        function createInputField(heap) {
            const input = document.createElement("input");
            input.type = "number";
            input.id = "heap-input";
            input.value = "";
            return input;
        }

        function add() {
            const heapSize = parseInt(document.getElementById("heap-size").value);
            const maxHeapSize = parseInt(document.getElementById("heap-size-max").value);
            if (heapSize > maxHeapSize) {
                alert("Heap size cannot be greater than max heap size");
                return;
            }
            heap.add(heapSize);
            updateHeap();
        }

        function clearHeap() {
            heap.clear();
            updateHeap();
        }

        function updateHeap() {
            const heapElement = document.getElementById("heap");
            heapElement.innerHTML = "";
            for (let i = 0; i < heap.heap.length; i++) {
                const element = createHeapElement(heap.heap[i]);
                heapElement.appendChild(element);
            }
        }

        createHeap();
        document.getElementById("add-heap-btn").addEventListener("click", add);
        document.getElementById("clear-heap-btn").addEventListener("click", clearHeap);
        document.getElementById("heap-input").addEventListener("input", updateHeap);
    </script>
</body>
</html>
