<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Neural Networks Interactive Sandbox</title>
  <style>
    /* Minimal styling: only to make layout readable. No colors, no animations. */
    body { font-family: sans-serif; margin: 12px; color: black; background: white; }
    section { margin-bottom: 12px; padding: 6px; border: 1px solid #00000020; }
    label { display: inline-block; width: 140px; }
    input[type="number"] { width: 80px; }
    textarea { width: 100%; height: 120px; }
    canvas { border: 1px solid #000; display: block; margin-bottom: 6px; }
    table { border-collapse: collapse; }
    td, th { border: 1px solid #ccc; padding: 4px; }
    .row { margin-bottom: 6px; }
    .small { font-size: 12px; }
  </style>
</head>
<body>

<h1>Neural Networks Interactive Sandbox</h1>

<section id="architecture">
  <strong>1) Network Architecture</strong>
  <div class="row">
    <label>Layers (input first):</label>
    <span id="layersList"></span>
  </div>
  <div class="row">
    <label>Add layer neurons:</label>
    <input id="newNeurons" type="number" value="4" min="1">
    <label>Activation:</label>
    <select id="newActivation">
      <option value="linear">linear</option>
      <option value="sigmoid" selected>sigmoid</option>
      <option value="tanh">tanh</option>
      <option value="relu">relu</option>
    </select>
    <button id="addLayer">Add Layer</button>
    <button id="removeLayer">Remove Last</button>
  </div>
  <div class="row">
    <button id="applyArchitecture">Apply / Rebuild Network</button>
    <button id="randomInit">Random Init (normal)</button>
    <button id="xavierInit">Xavier Init</button>
    <button id="zeroInit">Zero Init</button>
  </div>
</section>

<section id="dataset">
  <strong>2) Dataset</strong>
  <div class="row">
    <label>Type:</label>
    <select id="dataType">
      <option value="linear">Linear Separable</option>
      <option value="xor">XOR</option>
      <option value="circle">Circle</option>
      <option value="blobs">Blobs</option>
      <option value="custom">Custom (manual points)</option>
    </select>
    <label>Points:</label>
    <input id="numPoints" type="number" value="200" min="4">
    <label>Noise:</label>
    <input id="noise" type="number" value="0.1" step="0.01" min="0">
    <button id="generateData">Generate</button>
  </div>
  <div class="row">
    <label>Canvas size:</label>
    <input id="canvasSize" type="number" value="400" min="100">
    <button id="resizeCanvas">Resize</button>
    <button id="drawDecision">Draw Decision Grid</button>
    <button id="clearCanvas">Clear Canvas</button>
  </div>
  <canvas id="dataCanvas" width="400" height="400"></canvas>
  <div class="row">
    <label>Manual points (x,y,label per line):</label>
    <textarea id="customPoints" placeholder="0.1,0.2,0"></textarea>
    <div><button id="applyCustom">Apply Custom Points</button></div>
  </div>
</section>

<section id="training">
  <strong>3) Training & Controls</strong>
  <div class="row">
    <label>Learning rate:</label>
    <input id="lr" type="number" step="0.001" value="0.1" min="0.0001">
    <label>Momentum:</label>
    <input id="momentum" type="number" step="0.01" value="0.0" min="0">
    <label>Weight decay:</label>
    <input id="decay" type="number" step="0.0001" value="0.0" min="0">
  </div>
  <div class="row">
    <label>Batch size:</label>
    <input id="batchSize" type="number" value="16" min="1">
    <label>Epochs:</label>
    <input id="epochs" type="number" value="100" min="1">
    <label>Loss:</label>
    <select id="lossFunc">
      <option value="mse">MSE</option>
      <option value="bce">Binary Cross-Entropy</option>
    </select>
  </div>
  <div class="row">
    <label>Mode:</label>
    <select id="trainMode">
      <option value="sgd">SGD (sample)</option>
      <option value="batch">Batch</option>
    </select>
    <button id="trainAll">Train Full</button>
    <button id="trainStep">Train Single Epoch</button>
    <button id="stopTrain">Stop</button>
  </div>
  <div class="row">
    <label>Auto-stop target loss:</label>
    <input id="targetLoss" type="number" step="0.0001" value="0.01" min="0">
    <button id="trainUntil">Train Until</button>
  </div>
  <div class="row">
    <label>Grid-search LR (comma):</label>
    <input id="gridLR" type="text" value="0.1,0.01,0.001">
    <label>Decay list:</label>
    <input id="gridDecay" type="text" value="0,0.0001">
    <button id="gridSearch">Run Grid Search</button>
  </div>

  <div class="row">
    <label>Loss plot:</label>
    <canvas id="lossCanvas" width="600" height="120"></canvas>
    <button id="clearLoss">Clear Loss</button>
  </div>

  <div class="row">
    <label>Snapshot name:</label>
    <input id="snapshotName" type="text" value="">
    <button id="saveSnapshot">Save Snapshot</button>
    <select id="snapshots"></select>
    <button id="loadSnapshot">Load Snapshot</button>
    <button id="deleteSnapshot">Delete Snapshot</button>
  </div>
</section>

<section id="inspect">
  <strong>4) Inspect / Manual Control</strong>
  <div class="row">
    <label>Input values (comma):</label>
    <input id="forwardInput" type="text" value="0.5,0.5">
    <button id="forwardRun">Forward</button>
    <label>Sample index:</label>
    <input id="sampleIndex" type="number" value="0" min="0">
    <button id="inspectSample">Inspect Sample</button>
  </div>
  <div class="row">
    <label>Activations:</label>
    <textarea id="activations" readonly></textarea>
  </div>
  <div class="row">
    <label>Weights (editable):</label>
    <div id="weightsTableWrap"></div>
    <button id="downloadNetwork">Export JSON</button>
    <button id="importNetwork">Import JSON</button>
    <textarea id="networkJSON" placeholder="Paste JSON here to import"></textarea>
  </div>
  <div class="row">
    <label>Manual Backprop Step:</label>
    <button id="bpStepForward">Step Forward</button>
    <button id="bpComputeGrad">Compute Gradients</button>
    <button id="bpApply">Apply Gradients</button>
    <div class="small">Use these to step through the backprop process manually for one sample.</div>
  </div>
</section>

<section id="logs">
  <strong>5) Logs & History</strong>
  <div class="row">
    <label>Console:</label>
    <textarea id="logConsole" readonly></textarea>
    <div>
      <button id="clearLog">Clear Log</button>
      <button id="downloadLog">Download Log</button>
    </div>
  </div>
</section>

<script>
/*
  Neural Networks Interactive Sandbox
  - Minimal visual styling
  - Lots of interactive controls and workflows
  - Plain JS implementation of small fully connected neural net
*/

/* Utility */
function randn() {
  // Box-Muller
  let u = 0, v = 0;
  while(u === 0) u = Math.random();
  while(v === 0) v = Math.random();
  return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}
function zeros(n) { return Array(n).fill(0); }
function range(n) { return Array.from({length:n}, (_,i)=>i); }
function clone(obj) { return JSON.parse(JSON.stringify(obj)); }
function nowStr() { return (new Date()).toISOString().replace('T',' ').split('.')[0]; }

/* Logging */
function log(msg) {
  const ta = document.getElementById('logConsole');
  ta.value += `[${nowStr()}] ${msg}\n`;
  ta.scrollTop = ta.scrollHeight;
}

/* Activation functions and derivatives */
const Activations = {
  linear: {
    f: x => x,
    df: x => 1
  },
  sigmoid: {
    f: x => 1 / (1 + Math.exp(-x)),
    df: y => y * (1 - y) // expects y = sigmoid(x)
  },
  tanh: {
    f: x => Math.tanh(x),
    df: y => 1 - (y*y) // expects y = tanh(x)
  },
  relu: {
    f: x => Math.max(0, x),
    df: x => x > 0 ? 1 : 0 // expects raw pre-activation
  }
};

/* Simple fully connected network representation */
let Net = {
  layers: [], // each layer: { size, activation }
  weights: [], // for l from 1..L-1 weights[l-1] = matrix size: layers[l].size x (layers[l-1].size + 1) including bias
  velocities: [], // same shape for momentum
  initialized: false
};

function createNetwork(sizes, activations) {
  Net.layers = sizes.map((s,i)=>({size:s, activation: activations[i]||'linear'}));
  Net.weights = [];
  Net.velocities = [];
  for (let l = 1; l < Net.layers.length; l++) {
    let rows = Net.layers[l].size;
    let cols = Net.layers[l-1].size + 1;
    let W = Array.from({length:rows}, () => Array.from({length:cols}, ()=>0));
    let V = Array.from({length:rows}, () => Array.from({length:cols}, ()=>0));
    Net.weights.push(W);
    Net.velocities.push(V);
  }
  Net.initialized = true;
}

/* Initialization */
function randomInit(std=0.1, seed=null) {
  for (let l = 0; l < Net.weights.length; l++) {
    for (let i = 0; i < Net.weights[l].length; i++) {
      for (let j = 0; j < Net.weights[l][i].length; j++) {
        Net.weights[l][i][j] = randn() * std;
        Net.velocities[l][i][j] = 0;
      }
    }
  }
}

function xavierInit() {
  for (let l = 0; l < Net.weights.length; l++) {
    let inSize = Net.weights[l][0].length - 1;
    let std = Math.sqrt(2 / (inSize + Net.weights[l].length));
    for (let i = 0; i < Net.weights[l].length; i++) {
      for (let j = 0; j < Net.weights[l][i].length; j++) {
        Net.weights[l][i][j] = randn() * std;
        Net.velocities[l][i][j] = 0;
      }
    }
  }
}

function zeroInit() {
  for (let l = 0; l < Net.weights.length; l++) {
    for (let i = 0; i < Net.weights[l].length; i++) {
      for (let j = 0; j < Net.weights[l][i].length; j++) {
        Net.weights[l][i][j] = 0;
        Net.velocities[l][i][j] = 0;
      }
    }
  }
}

/* Forward pass for a single input */
function forward(input) {
  let activations = [input.slice()]; // no bias in stored activations
  let preacts = [null];
  for (let l = 1; l < Net.layers.length; l++) {
    let W = Net.weights[l-1];
    let prev = activations[l-1];
    let row = [];
    let zrow = [];
    for (let i = 0; i < Net.layers[l].size; i++) {
      let z = 0;
      for (let j = 0; j < prev.length; j++) z += W[i][j] * prev[j];
      let bias = W[i][W[i].length - 1];
      z += bias;
      zrow.push(z);
      let actName = Net.layers[l].activation;
      let a;
      if (actName === 'relu') a = Activations.relu.f(z);
      else if (actName === 'sigmoid') a = Activations.sigmoid.f(z);
      else if (actName === 'tanh') a = Activations.tanh.f(z);
      else a = z;
      row.push(a);
    }
    preacts.push(zrow);
    activations.push(row);
  }
  return {activations, preacts};
}

/* Compute loss and derivative */
function computeLoss(pred, target, lossType='mse') {
  if (lossType === 'mse') {
    let s = 0;
    for (let i = 0; i < pred.length; i++) s += 0.5 * Math.pow(pred[i] - target[i], 2);
    return s;
  } else if (lossType === 'bce') {
    // binary cross entropy for single output assumed
    let p = Math.min(Math.max(pred[0], 1e-12), 1-1e-12);
    let t = target[0];
    return -(t * Math.log(p) + (1-t) * Math.log(1-p));
  }
  return 0;
}

/* Backprop for a single sample -> returns gradients (same shape as weights) */
function backprop(sampleInput, sampleTarget, lossType='mse') {
  let {activations, preacts} = forward(sampleInput);
  let L = Net.layers.length - 1;
  // initialize gradients
  let grads = Net.weights.map(layer => layer.map(row => row.map(_=>0)));
  // output layer delta
  let output = activations[L];
  let delta = Array(output.length).fill(0);
  if (lossType === 'mse') {
    for (let i = 0; i < output.length; i++) {
      let diff = output[i] - sampleTarget[i];
      let actName = Net.layers[L].activation;
      let dAct;
      if (actName === 'sigmoid') dAct = Activations.sigmoid.df(output[i]);
      else if (actName === 'tanh') dAct = Activations.tanh.df(output[i]);
      else if (actName === 'relu') dAct = Activations.relu.df(preacts[L][i]);
      else dAct = 1;
      delta[i] = diff * dAct;
    }
  } else if (lossType === 'bce') {
    // assuming single output
    let p = output[0];
    let t = sampleTarget[0];
    let dLoss = (p - t) / (p * (1-p) + 1e-12); // derivative wrt pre-activation for sigmoid
    let actName = Net.layers[L].activation;
    let dAct;
    if (actName === 'sigmoid') dAct = Activations.sigmoid.df(output[0]);
    else if (actName === 'tanh') dAct = Activations.tanh.df(output[0]);
    else if (actName === 'relu') dAct = Activations.relu.df(preacts[L][0]);
    else dAct = 1;
    delta[0] = dLoss * dAct;
  }
  // compute gradient for output layer
  for (let i = 0; i < delta.length; i++) {
    let prev = activations[L-1];
    for (let j = 0; j < prev.length; j++) grads[L-1][i][j] = delta[i] * prev[j];
    grads[L-1][i][prev.length] = delta[i] * 1; // bias
  }
  // propagate backward
  for (let l = L-1; l >= 1; l--) {
    let nextW = Net.weights[l]; // weights from layer l to l+1
    let newdelta = Array(Net.layers[l].size).fill(0);
    for (let i = 0; i < Net.layers[l].size; i++) {
      let sum = 0;
      for (let k = 0; k < nextW.length; k++) {
        sum += nextW[k][i] * delta[k];
      }
      // derivative of activation at layer l
      let actName = Net.layers[l].activation;
      let dAct;
      let a = activations[l][i];
      if (actName === 'sigmoid') dAct = Activations.sigmoid.df(a);
      else if (actName === 'tanh') dAct = Activations.tanh.df(a);
      else if (actName === 'relu') dAct = Activations.relu.df(preacts[l][i]);
      else dAct = 1;
      newdelta[i] = sum * dAct;
    }
    delta = newdelta;
    // gradients for layer l-1 parameters (weights[l-1])
    for (let i = 0; i < delta.length; i++) {
      let prev = activations[l-1];
      for (let j = 0; j < prev.length; j++) grads[l-1][i][j] = delta[i] * prev[j];
      grads[l-1][i][prev.length] = delta[i] * 1;
    }
  }
  return grads;
}

/* Apply gradients with learning rate, momentum, decay */
function applyGradients(grads, lr=0.1, momentum=0.0, decay=0.0) {
  for (let l = 0; l < Net.weights.length; l++) {
    for (let i = 0; i < Net.weights[l].length; i++) {
      for (let j = 0; j < Net.weights[l][i].length; j++) {
        // velocity update
        Net.velocities[l][i][j] = momentum * Net.velocities[l][i][j] - lr * grads[l][i][j];
        Net.weights[l][i][j] += Net.velocities[l][i][j];
        // weight decay (L2)
        if (decay) Net.weights[l][i][j] *= (1 - decay);
      }
    }
  }
}

/* Dataset handling */
let Dataset = {
  X: [], // array of input arrays
  Y: []  // array of target arrays
};

function generateData(type, n=200, noise=0.1) {
  let X = [], Y = [];
  if (type === 'linear') {
    for (let i = 0; i < n; i++) {
      let x1 = Math.random()*2 - 1;
      let x2 = Math.random()*2 - 1;
      let label = (x1 + x2 + randn()*noise) > 0 ? 1 : 0;
      X.push([x1, x2]);
      Y.push([label]);
    }
  } else if (type === 'xor') {
    // few clusters
    for (let i = 0; i < n; i++) {
      let sx = (Math.random() < 0.5) ? -1 : 1;
      let sy = (Math.random() < 0.5) ? -1 : 1;
      let x1 = sx*0.6 + randn()*noise;
      let x2 = sy*0.6 + randn()*noise;
      let label = (sx * sy) > 0 ? 0 : 1; // opposite quadrants
      X.push([x1, x2]);
      Y.push([label]);
    }
  } else if (type === 'circle') {
    for (let i = 0; i < n; i++) {
      let r = Math.random()*1.2;
      let a = Math.random() * Math.PI * 2;
      let x1 = Math.cos(a) * r + randn()*noise;
      let x2 = Math.sin(a) * r + randn()*noise;
      let label = (r < 0.6) ? 1 : 0;
      X.push([x1, x2]);
      Y.push([label]);
    }
  } else if (type === 'blobs') {
    let centers = [[-0.6,-0.6],[0.6,0.6],[0.6,-0.6],[-0.6,0.6]];
    for (let i = 0; i < n; i++) {
      let c = centers[Math.floor(Math.random()*centers.length)];
      let x1 = c[0] + randn()*noise;
      let x2 = c[1] + randn()*noise;
      let label = (centers.indexOf(c) % 2) === 0 ? 0 : 1;
      X.push([x1,x2]);
      Y.push([label]);
    }
  } else {
    // custom; leave empty – handled separately
  }
  Dataset.X = X;
  Dataset.Y = Y;
  log(`Generated dataset: type=${type} size=${X.length}`);
  drawData();
}

/* Canvas drawing utilities */
const dataCanvas = document.getElementById('dataCanvas');
const dataCtx = dataCanvas.getContext('2d');

function toCanvasCoords(x,y) {
  const size = dataCanvas.width;
  // assume input range approx [-1.5, 1.5]
  const range = 1.5;
  const cx = Math.round(((x + range) / (2*range)) * size);
  const cy = Math.round(((1 - (y + range) / (2*range))) * size);
  return [cx, cy];
}

function drawData(clear=false) {
  const ctx = dataCtx;
  ctx.clearRect(0,0,dataCanvas.width,dataCanvas.height);
  // draw points
  for (let i = 0; i < Dataset.X.length; i++) {
    let x = Dataset.X[i][0], y = Dataset.X[i][1];
    let lab = Dataset.Y[i][0];
    let [cx, cy] = toCanvasCoords(x,y);
    ctx.beginPath();
    if (lab === 0) {
      ctx.rect(cx-3, cy-3, 6, 6);
      ctx.stroke();
    } else {
      ctx.moveTo(cx-4, cy-4);
      ctx.lineTo(cx+4, cy+4);
      ctx.moveTo(cx+4, cy-4);
      ctx.lineTo(cx-4, cy+4);
      ctx.stroke();
    }
  }
}

/* Decision grid */
function drawDecisionGrid(res=80, threshold=0.5) {
  const ctx = dataCtx;
  let size = dataCanvas.width;
  let step = size / res;
  for (let i = 0; i < res; i++) {
    for (let j = 0; j < res; j++) {
      // center of cell -> convert to x,y
      let px = (i + 0.5) * step;
      let py = (j + 0.5) * step;
      // convert to coordinate space [-range,range]
      let range = 1.5;
      let x = (px / size) * 2*range - range;
      let y = (1 - py / size) * 2*range - range;
      if (!Net.initialized) continue;
      let out = forward([x,y]).activations.slice(-1)[0][0];
      // draw small filled rectangle scaled by output
      ctx.beginPath();
      let alpha = Math.max(0, Math.min(1, out));
      // draw as grayscale by filling with black at varying alpha
      ctx.globalAlpha = 0.08 + 0.84 * alpha; // visual; still monochrome
      ctx.fillRect(i*step, j*step, step, step);
      ctx.globalAlpha = 1.0;
    }
  }
  // draw points on top
  drawData();
}

/* Loss plotting */
const lossCanvas = document.getElementById('lossCanvas');
const lossCtx = lossCanvas.getContext('2d');
let lossHistory = [];

function plotLoss() {
  let ctx = lossCtx;
  ctx.clearRect(0,0,lossCanvas.width, lossCanvas.height);
  if (lossHistory.length === 0) return;
  let w = lossCanvas.width, h = lossCanvas.height;
  let maxL = Math.max(...lossHistory);
  let minL = Math.min(...lossHistory);
  if (maxL === minL) { maxL = minL + 1e-6; }
  ctx.beginPath();
  for (let i = 0; i < lossHistory.length; i++) {
    let x = (i / (lossHistory.length - 1 || 1)) * w;
    let y = h - ((lossHistory[i] - minL) / (maxL - minL)) * h;
    if (i === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();
}

/* Weights table */
function renderWeightsTable() {
  const wrap = document.getElementById('weightsTableWrap');
  wrap.innerHTML = '';
  if (!Net.initialized) { wrap.innerText = 'Network not initialized'; return; }
  let table = document.createElement('table');
  let headerRow = document.createElement('tr');
  headerRow.appendChild(document.createElement('th')).innerText = 'Layer';
  headerRow.appendChild(document.createElement('th')).innerText = 'Neuron';
  headerRow.appendChild(document.createElement('th')).innerText = 'Weights (inputs...,bias)';
  table.appendChild(headerRow);
  for (let l = 0; l < Net.weights.length; l++) {
    for (let i = 0; i < Net.weights[l].length; i++) {
      let tr = document.createElement('tr');
      let tdL = document.createElement('td'); tdL.innerText = `${l+1}`;
      let tdN = document.createElement('td'); tdN.innerText = `${i}`;
      let tdW = document.createElement('td');
      for (let j = 0; j < Net.weights[l][i].length; j++) {
        let inp = document.createElement('input');
        inp.type = 'number';
        inp.step = '0.0001';
        inp.value = Net.weights[l][i][j].toFixed(6);
        inp.dataset.layer = l;
        inp.dataset.row = i;
        inp.dataset.col = j;
        inp.style.width = '90px';
        inp.addEventListener('change', (ev)=>{
          let L = parseInt(ev.target.dataset.layer);
          let R = parseInt(ev.target.dataset.row);
          let C = parseInt(ev.target.dataset.col);
          Net.weights[L][R][C] = parseFloat(ev.target.value);
          log(`Weight edited L${L} R${R} C${C} set to ${ev.target.value}`);
        });
        tdW.appendChild(inp);
      }
      tr.appendChild(tdL); tr.appendChild(tdN); tr.appendChild(tdW);
      table.appendChild(tr);
    }
  }
  wrap.appendChild(table);
}

/* Export / Import network */
function exportNetworkJSON() {
  let obj = {
    layers: Net.layers,
    weights: Net.weights
  };
  return JSON.stringify(obj, null, 2);
}
function importNetworkJSON(json) {
  try {
    let obj = JSON.parse(json);
    Net.layers = obj.layers;
    Net.weights = obj.weights;
    Net.velocities = Net.weights.map(layer => layer.map(row => row.map(_=>0)));
    Net.initialized = true;
    renderLayersListUI();
    renderWeightsTable();
    log('Imported network JSON');
  } catch (e) {
    log('Import failed: ' + e.message);
  }
}

/* Training loop management */
let training = { running: false, stopRequested: false };

async function trainFull(epochs, lr, batchSize, momentum, decay, mode='sgd', lossType='mse', onEpoch=null) {
  training.running = true; training.stopRequested = false;
  let N = Dataset.X.length;
  for (let epoch = 0; epoch < epochs; epoch++) {
    if (training.stopRequested) break;
    // shuffle indices
    let idx = range(N);
    for (let i = N-1; i > 0; i--) {
      let r = Math.floor(Math.random() * (i+1));
      [idx[i], idx[r]] = [idx[r], idx[i]];
    }
    if (mode === 'sgd') {
      for (let t = 0; t < N; t++) {
        let i = idx[t];
        let grads = backprop(Dataset.X[i], Dataset.Y[i], lossType);
        applyGradients(grads, lr, momentum, decay);
      }
    } else if (mode === 'batch') {
      // full batch gradient accumulate
      let accum = Net.weights.map(layer => layer.map(row => row.map(_=>0)));
      for (let t = 0; t < N; t++) {
        let i = idx[t];
        let g = backprop(Dataset.X[i], Dataset.Y[i], lossType);
        // accumulate
        for (let l = 0; l < accum.length; l++) {
          for (let ii = 0; ii < accum[l].length; ii++) {
            for (let j = 0; j < accum[l][ii].length; j++) {
              accum[l][ii][j] += g[l][ii][j];
            }
          }
        }
      }
      // average
      for (let l = 0; l < accum.length; l++) {
        for (let ii = 0; ii < accum[l].length; ii++) {
          for (let j = 0; j < accum[l][ii].length; j++) {
            accum[l][ii][j] /= N;
          }
        }
      }
      applyGradients(accum, lr, momentum, decay);
    }
    // compute epoch loss
    let totalLoss = 0;
    for (let i = 0; i < N; i++) {
      let pred = forward(Dataset.X[i]).activations.slice(-1)[0];
      totalLoss += computeLoss(pred, Dataset.Y[i], lossType);
    }
    let avgLoss = totalLoss / N;
    lossHistory.push(avgLoss);
    plotLoss();
    if (onEpoch) onEpoch(epoch, avgLoss);
    await new Promise(res => setTimeout(res, 1)); // allow UI update
  }
  training.running = false;
  if (training.stopRequested) log('Training stopped by user.');
  else log('Training finished.');
}

/* Grid search */
async function runGridSearch(lrList, decayList) {
  log('Starting grid search');
  let results = [];
  let originalNet = { layers: clone(Net.layers), weights: clone(Net.weights) };
  for (let lr of lrList) {
    for (let dec of decayList) {
      // restore
      Net.layers = clone(originalNet.layers);
      Net.weights = clone(originalNet.weights);
      Net.velocities = Net.weights.map(layer => layer.map(row => row.map(_=>0)));
      // quick train few epochs
      await trainFull(30, lr, 16, 0.0, dec, 'sgd', document.getElementById('lossFunc').value, (ep,loss)=>{
        // noop
      });
      // evaluate
      let total = 0;
      for (let i = 0; i < Dataset.X.length; i++) {
        let pred = forward(Dataset.X[i]).activations.slice(-1)[0];
        let l = computeLoss(pred, Dataset.Y[i], document.getElementById('lossFunc').value);
        total += l;
      }
      let avg = total / Dataset.X.length;
      results.push({lr:lr, decay:dec, loss:avg});
      log(`Grid lr=${lr} decay=${dec} -> loss=${avg.toFixed(6)}`);
    }
  }
  // restore original
  Net.layers = originalNet.layers;
  Net.weights = originalNet.weights;
  Net.velocities = Net.weights.map(layer => layer.map(row => row.map(_=>0)));
  renderWeightsTable();
  log('Grid search finished');
  // show results
  let txt = 'LR,Decay,Loss\n' + results.map(r=>`${r.lr},${r.decay},${r.loss}`).join('\n');
  alert('Grid search results:\n' + txt);
}

/* UI wiring */
function renderLayersListUI() {
  const span = document.getElementById('layersList');
  span.innerHTML = '';
  if (!Net.initialized) {
    span.innerText = 'Not built';
    return;
  }
  for (let i = 0; i < Net.layers.length; i++) {
    let s = document.createElement('span');
    s.innerText = `[${i} ${Net.layers[i].size} ${Net.layers[i].activation}] `;
    span.appendChild(s);
  }
}

/* Snapshot store */
let Snapshots = {};

function saveSnapshot(name) {
  if (!name) name = nowStr();
  Snapshots[name] = {
    layers: clone(Net.layers),
    weights: clone(Net.weights)
  };
  updateSnapshotsList();
  log(`Saved snapshot: ${name}`);
}
function loadSnapshot(name) {
  if (!Snapshots[name]) { log('Snapshot not found'); return; }
  Net.layers = clone(Snapshots[name].layers);
  Net.weights = clone(Snapshots[name].weights);
  Net.velocities = Net.weights.map(layer => layer.map(row => row.map(_=>0)));
  Net.initialized = true;
  renderLayersListUI();
  renderWeightsTable();
  log(`Loaded snapshot: ${name}`);
}
function deleteSnapshot(name) {
  delete Snapshots[name];
  updateSnapshotsList();
}
function updateSnapshotsList() {
  let sel = document.getElementById('snapshots');
  sel.innerHTML = '';
  for (let k of Object.keys(Snapshots)) {
    let opt = document.createElement('option');
    opt.value = k; opt.innerText = k;
    sel.appendChild(opt);
  }
}

/* UI events binding */
document.getElementById('addLayer').addEventListener('click', ()=>{
  let n = parseInt(document.getElementById('newNeurons').value) || 1;
  let act = document.getElementById('newActivation').value;
  if (!Net.initialized) {
    // start with input layer default 2
    createNetwork([2, n], ['linear', act]);
  } else {
    Net.layers.push({size:n, activation:act});
    // add weight matrix from prev to new
    let prev = Net.layers[Net.layers.length - 2].size;
    let rows = n, cols = prev + 1;
    let W = Array.from({length:rows}, ()=>Array.from({length:cols}, ()=>randn()*0.1));
    let V = Array.from({length:rows}, ()=>Array.from({length:cols}, ()=>0));
    Net.weights.push(W);
    Net.velocities.push(V);
  }
  renderLayersListUI();
  renderWeightsTable();
});
document.getElementById('removeLayer').addEventListener('click', ()=>{
  if (!Net.initialized) return;
  if (Net.layers.length <= 2) { log('Cannot remove: need at least input and output'); return; }
  Net.layers.pop();
  Net.weights.pop();
  Net.velocities.pop();
  renderLayersListUI();
  renderWeightsTable();
});
document.getElementById('applyArchitecture').addEventListener('click', ()=>{
  // build from displayed layers string? allow quick prompt to set sizes and activations
  let promptStr = prompt('Enter layer sizes comma separated (e.g. 2,4,4,1):', Net.layers.length ? Net.layers.map(l=>l.size).join(',') : '2,4,1');
  if (!promptStr) return;
  let sizes = promptStr.split(',').map(s=>parseInt(s.trim())).filter(s=>!isNaN(s) && s>0);
  if (sizes.length < 2) { alert('Need at least input and output'); return; }
  // ask activations
  let actsPrompt = prompt('Enter activations for each layer comma separated (optional). Example: linear,sigmoid,sigmoid', sizes.map((s,i)=> i===0?'linear':'sigmoid').join(','));
  let acts = actsPrompt ? actsPrompt.split(',').map(s=>s.trim()) : sizes.map((s,i)=> i===0?'linear':'sigmoid');
  createNetwork(sizes, acts);
  randomInit(0.1);
  renderLayersListUI();
  renderWeightsTable();
  log('Network rebuilt with sizes: ' + sizes.join(','));
});
document.getElementById('randomInit').addEventListener('click', ()=>{
  randomInit(0.1);
  renderWeightsTable();
  log('Random init applied');
});
document.getElementById('xavierInit').addEventListener('click', ()=>{
  xavierInit();
  renderWeightsTable();
  log('Xavier init applied');
});
document.getElementById('zeroInit').addEventListener('click', ()=>{
  zeroInit();
  renderWeightsTable();
  log('Zero init applied');
});

/* Dataset UI */
document.getElementById('generateData').addEventListener('click', ()=>{
  let type = document.getElementById('dataType').value;
  let n = parseInt(document.getElementById('numPoints').value);
  let noise = parseFloat(document.getElementById('noise').value);
  generateData(type, n, noise);
});
document.getElementById('resizeCanvas').addEventListener('click', ()=>{
  let s = parseInt(document.getElementById('canvasSize').value);
  dataCanvas.width = s; dataCanvas.height = s;
  drawData();
});
document.getElementById('drawDecision').addEventListener('click', ()=>{
  drawDecisionGrid();
});
document.getElementById('clearCanvas').addEventListener('click', ()=>{
  dataCtx.clearRect(0,0,dataCanvas.width,dataCanvas.height);
});
document.getElementById('applyCustom').addEventListener('click', ()=>{
  let txt = document.getElementById('customPoints').value.trim();
  if (!txt) return;
  let lines = txt.split('\n');
  let X=[], Y=[];
  for (let ln of lines) {
    let parts = ln.split(',').map(s=>s.trim());
    if (parts.length < 3) continue;
    let x = parseFloat(parts[0]), y = parseFloat(parts[1]), lab = parseFloat(parts[2]);
    if (isNaN(x) || isNaN(y) || isNaN(lab)) continue;
    X.push([x,y]); Y.push([lab]);
  }
  Dataset.X = X; Dataset.Y = Y;
  drawData();
  log('Applied custom dataset with ' + X.length + ' points');
});

/* Training UI */
document.getElementById('trainAll').addEventListener('click', async ()=>{
  if (!Net.initialized) { alert('Build network first'); return; }
  if (Dataset.X.length === 0) { alert('Generate dataset first'); return; }
  let lr = parseFloat(document.getElementById('lr').value);
  let momentum = parseFloat(document.getElementById('momentum').value);
  let decay = parseFloat(document.getElementById('decay').value);
  let epochs = parseInt(document.getElementById('epochs').value);
  let batch = parseInt(document.getElementById('batchSize').value);
  let mode = document.getElementById('trainMode').value;
  let loss = document.getElementById('lossFunc').value;
  lossHistory = [];
  plotLoss();
  log(`Starting training: epochs=${epochs} lr=${lr} mode=${mode} loss=${loss}`);
  training.stopRequested = false;
  await trainFull(epochs, lr, batch, momentum, decay, mode, loss, (ep, avgLoss)=>{
    log(`Epoch ${ep+1}/${epochs} loss=${avgLoss.toFixed(6)}`);
    // update weights table occasionally
    if ((ep + 1) % Math.max(1, Math.floor(epochs/10)) === 0) renderWeightsTable();
  });
  renderWeightsTable();
});
document.getElementById('trainStep').addEventListener('click', async ()=>{
  if (!Net.initialized) { alert('Build network first'); return; }
  if (Dataset.X.length === 0) { alert('Generate dataset first'); return; }
  let lr = parseFloat(document.getElementById('lr').value);
  let momentum = parseFloat(document.getElementById('momentum').value);
  let decay = parseFloat(document.getElementById('decay').value);
  let batch = parseInt(document.getElementById('batchSize').value);
  let mode = document.getElementById('trainMode').value;
  let loss = document.getElementById('lossFunc').value;
  await trainFull(1, lr, batch, momentum, decay, mode, loss, (ep, lossVal)=>{
    log(`Single epoch done loss=${lossVal.toFixed(6)}`);
  });
  renderWeightsTable();
});
document.getElementById('stopTrain').addEventListener('click', ()=>{
  training.stopRequested = true;
  log('Stop requested');
});
document.getElementById('trainUntil').addEventListener('click', async ()=>{
  if (!Net.initialized) { alert('Build network first'); return; }
  let target = parseFloat(document.getElementById('targetLoss').value);
  let lr = parseFloat(document.getElementById('lr').value);
  let momentum = parseFloat(document.getElementById('momentum').value);
  let decay = parseFloat(document.getElementById('decay').value);
  let mode = document.getElementById('trainMode').value;
  let loss = document.getElementById('lossFunc').value;
  let epochs = 10000;
  lossHistory = [];
  let reached = false;
  training.stopRequested = false;
  await trainFull(epochs, lr, parseInt(document.getElementById('batchSize').value), momentum, decay, mode, loss, (ep, avgLoss)=>{
    if (avgLoss <= target) { training.stopRequested = true; reached = true; }
  });
  if (reached) log('Target loss reached.');
  renderWeightsTable();
});
document.getElementById('gridSearch').addEventListener('click', async ()=>{
  if (!Net.initialized) { alert('Build network first'); return; }
  let lrs = document.getElementById('gridLR').value.split(',').map(s=>parseFloat(s.trim())).filter(s=>!isNaN(s));
  let decs = document.getElementById('gridDecay').value.split(',').map(s=>parseFloat(s.trim())).filter(s=>!isNaN(s));
  await runGridSearch(lrs, decs);
});
document.getElementById('clearLoss').addEventListener('click', ()=>{ lossHistory = []; plotLoss(); });

/* Snapshot controls */
document.getElementById('saveSnapshot').addEventListener('click', ()=>{
  let name = document.getElementById('snapshotName').value || nowStr();
  saveSnapshot(name);
});
document.getElementById('loadSnapshot').addEventListener('click', ()=>{
  let sel = document.getElementById('snapshots');
  if (!sel.value) { alert('Select snapshot'); return; }
  loadSnapshot(sel.value);
});
document.getElementById('deleteSnapshot').addEventListener('click', ()=>{
  let sel = document.getElementById('snapshots');
  if (!sel.value) return;
  deleteSnapshot(sel.value);
});

/* Inspect controls */
document.getElementById('forwardRun').addEventListener('click', ()=>{
  if (!Net.initialized) { alert('Build network first'); return; }
  let txt = document.getElementById('forwardInput').value;
  let parts = txt.split(',').map(s=>parseFloat(s.trim()));
  let res = forward(parts);
  document.getElementById('activations').value = JSON.stringify(res.activations, null, 2);
  log('Forward run with input: ' + parts.join(','));
});
document.getElementById('inspectSample').addEventListener('click', ()=>{
  let idx = parseInt(document.getElementById('sampleIndex').value);
  if (isNaN(idx) || idx < 0 || idx >= Dataset.X.length) { alert('Invalid sample index'); return; }
  let x = Dataset.X[idx], y = Dataset.Y[idx];
  let res = forward(x);
  document.getElementById('activations').value = 'Input: ' + JSON.stringify(x) + '\nTarget: ' + JSON.stringify(y) + '\nActivations:\n' + JSON.stringify(res.activations, null, 2);
  log('Inspected sample ' + idx);
});

/* Export / import */
document.getElementById('downloadNetwork').addEventListener('click', ()=>{
  let json = exportNetworkJSON();
  document.getElementById('networkJSON').value = json;
  log('Exported network JSON to textbox');
});
document.getElementById('importNetwork').addEventListener('click', ()=>{
  let json = document.getElementById('networkJSON').value;

  importNetworkJSON(json);
});

/* Manual backprop stepping */
let manualState = {
  sample: null,
  forwardResult: null,
  grads: null
};
document.getElementById('bpStepForward').addEventListener('click', ()=>{
  let idx = parseInt(document.getElementById('sampleIndex').value);
  if (isNaN(idx) || idx < 0 || idx >= Dataset.X.length) { alert('Invalid sample index'); return; }
  manualState.sample = idx;
  manualState.forwardResult = forward(Dataset.X[idx]);
  manualState.grads = null;
  document.getElementById('activations').value = 'Forward result:\n' + JSON.stringify(manualState.forwardResult.activations, null, 2);
  log('Manual forward for sample ' + idx);
});
document.getElementById('bpComputeGrad').addEventListener('click', ()=>{
  if (manualState.sample === null) { alert('Run forward first'); return; }
  manualState.grads = backprop(Dataset.X[manualState.sample], Dataset.Y[manualState.sample], document.getElementById('lossFunc').value);
  document.getElementById('activations').value += '\n\nComputed gradients (first layer shown):\n';
  document.getElementById('activations').value += JSON.stringify(manualState.grads.slice(0,2), null, 2);
  log('Computed gradients for sample ' + manualState.sample);
});
document.getElementById('bpApply').addEventListener('click', ()=>{
  if (!manualState.grads) { alert('Compute gradients first'); return; }
  let lr = parseFloat(document.getElementById('lr').value);
  let momentum = parseFloat(document.getElementById('momentum').value);
  let decay = parseFloat(document.getElementById('decay').value);
  applyGradients(manualState.grads, lr, momentum, decay);
  renderWeightsTable();
  log('Applied manual gradients for sample ' + manualState.sample);
});

/* Logs controls */
document.getElementById('clearLog').addEventListener('click', ()=>{ document.getElementById('logConsole').value = ''; });
document.getElementById('downloadLog').addEventListener('click', ()=>{
  let text = document.getElementById('logConsole').value;
  let blob = new Blob([text], {type: 'text/plain'});
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  a.href = url; a.download = 'nn_log.txt';
  a.click();
  URL.revokeObjectURL(url);
});

  randomInit(0.1);
  renderLayersListUI();
  renderWeightsTable();
  // default dataset
  generateData('xor', 200, 0.15);
  plotLoss();
  updateSnapshotsList();
  log('Interactive sandbox ready.');
})();
