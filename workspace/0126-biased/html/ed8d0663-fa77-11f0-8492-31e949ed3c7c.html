<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B+ Tree Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #3a4764;
        }
        .bptree {
            position: relative;
            display: inline-block;
            margin: 10px;
        }
        .node {
            background: #4a90e2;
            border-radius: 10px;
            color: white;
            padding: 10px 15px;
            display: inline-block;
            transition: transform 0.3s ease;
            width: 60px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        .link {
            width: 2px;
            background: #4a90e2;
            position: absolute;
            transition: height 0.3s ease;
        }
        .buttons {
            margin-top: 20px;
        }
        button {
            background: #ff6f61;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 1rem;
            margin: 5px;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #ff4b3a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>B+ Tree Visualization</h1>
        <div class="bptree" id="bptree">
            <div class="node">20</div>
            <div class="link" style="height: 70px; top: 30px; left: 30px;"></div>
            <div class="node" style="position: absolute; top: 100px; left: 0;">10</div>
            <div class="node" style="position: absolute; top: 100px; left: 80px;">15</div>
            <div class="link" style="height: 70px; top: 30px; left: 90px;"></div>
            <div class="node" style="position: absolute; top: 100px; left: 160px;">30</div>
            <div class="node" style="position: absolute; top: 100px; left: 240px;">35</div>
        </div>
        <div class="buttons">
            <button onclick="animateTree()">Animate Tree</button>
            <button onclick="resetTree()">Reset</button>
        </div>
    </div>

    <script>
        function animateTree() {
            const nodes = document.querySelectorAll('.node');
            nodes.forEach((node, index) => {
                node.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    node.style.transform = 'translateY(0)';
                }, index * 300);
            });
        }

        function resetTree() {
            const nodes = document.querySelectorAll('.node');
            nodes.forEach(node => {
                node.style.transform = 'translateY(0)';
            });
        }
    </script>
</body>
</html>
