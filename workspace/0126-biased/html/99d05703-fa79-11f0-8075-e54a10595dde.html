<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP Interactive Model</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #response { margin-top: 20px; }
    </style>
</head>
<body>

<h1>Interactive HTTP Model</h1>

<div>
    <h2>Request Configuration</h2>
    <label for="method">Method:</label>
    <select id="method">
        <option value="GET">GET</option>
        <option value="POST">POST</option>
        <option value="PUT">PUT</option>
        <option value="DELETE">DELETE</option>
    </select>
    
    <label for="url">URL:</label>
    <input type="text" id="url" placeholder="Enter URL" />

    <label for="header">Header:</label>
    <input type="text" id="header" placeholder="Enter Header" />

    <label for="body">Body:</label>
    <textarea id="body" rows="4" placeholder="Enter request body..."></textarea>

    <button id="sendRequest">Send Request</button>
</div>

<div id="response">
    <h3>Response</h3>
    <pre id="responseDisplay"></pre>
</div>

<div>
    <h2>Custom State Management</h2>
    <label for="stateInput">State Input:</label>
    <input type="text" id="stateInput" placeholder="Enter state value" />
    <button id="updateState">Update State</button>
    <button id="resetState">Reset State</button>
    <h3>Current State Value:</h3>
    <div id="currentState">N/A</div>
</div>

<div>
    <h2>Simulated Environment</h2>
    <label for="envInput">Environment Variable:</label>
    <input type="text" id="envInput" placeholder="Set environment variable" />
    <button id="setEnv">Set Env</button>
    <div id="envDisplay"></div>
</div>

<script>
    document.getElementById('sendRequest').addEventListener('click', function() {
        const method = document.getElementById('method').value;
        const url = document.getElementById('url').value;
        const header = document.getElementById('header').value;
        const body = document.getElementById('body').value;

        // Simulate a basic HTTP response
        const response = {
            method: method,
            url: url,
            header: header,
            body: body,
            status: 200,
            message: "Success"
        };

        document.getElementById('responseDisplay').innerText = JSON.stringify(response, null, 2);
    });

    let currentState = 'Initial State';
    document.getElementById('updateState').addEventListener('click', function() {
        currentState = document.getElementById('stateInput').value;
        document.getElementById('currentState').innerText = currentState;
    });

    document.getElementById('resetState').addEventListener('click', function() {
        currentState = 'Initial State';
        document.getElementById('currentState').innerText = currentState;
    });

    let envVar = '';
    document.getElementById('setEnv').addEventListener('click', function() {
        envVar = document.getElementById('envInput').value;
        document.getElementById('envDisplay').innerText = "Environment Variable Set: " + envVar;
    });
</script>

</body>
</html>
