<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Patterns Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { margin: 20px; }
        .section { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Design Patterns Demonstration</h1>
        
        <div class="section">
            <h2>1. Singleton Pattern</h2>
            <button onclick="singletonDemo()">Toggle Singleton Counter</button>
            <div id="singletonOutput">Initialized: 0</div>
        </div>

        <div class="section">
            <h2>2. Factory Pattern</h2>
            <button onclick="createObject('A')">Create Object A</button>
            <button onclick="createObject('B')">Create Object B</button>
            <div id="factoryOutput"></div>
        </div>

        <div class="section">
            <h2>3. Observer Pattern</h2>
            <input type="text" id="observerInput" placeholder="Notify Observers..." />
            <button onclick="notifyObservers()">Notify Observers</button>
            <div id="observerOutput"></div>
        </div>

        <div class="section">
            <h2>4. Command Pattern</h2>
            <button onclick="executeCommand('Action 1')">Execute Command 1</button>
            <button onclick="executeCommand('Action 2')">Execute Command 2</button>
            <div id="commandOutput">Commands executed:</div>
        </div>
        
        <div class="section">
            <h2>5. State Pattern</h2>
            <button onclick="changeState()">Toggle State</button>
            <div id="stateOutput">Current State: Off</div>
        </div>
    </div>

    <script>
        // Singleton Pattern
        let Singleton = (function() {
            let instance;
            function createInstance() {
                let count = 0;
                return {
                    increment: function() { count++; return count; },
                    getCount: function() { return count; }
                };
            }
            return {
                getInstance: function() {
                    if (!instance) {
                        instance = createInstance();
                    }
                    return instance;
                }
            };
        })();

        function singletonDemo() {
            const singleton = Singleton.getInstance();
            const output = singleton.increment();
            document.getElementById("singletonOutput").innerText = "Initialized: " + output;
        }

        // Factory Pattern
        function createObject(type) {
            let output = "Created: ";
            switch (type) {
                case 'A':
                    output += "Object A";
                    break;
                case 'B':
                    output += "Object B";
                    break;
                default:
                    output = "Unknown Object";
            }
            document.getElementById("factoryOutput").innerText += output + "\n";
        }

        // Observer Pattern
        let observers = [];
        function addObserver(observer) {
            observers.push(observer);
        }
        function notifyObservers() {
            const message = document.getElementById("observerInput").value;
            observers.forEach(observer => observer(message));
            document.getElementById("observerOutput").innerText += "Notification: " + message + "\n";
        }
        addObserver(output => console.log("Observer 1 received: " + output));
        addObserver(output => console.log("Observer 2 received: " + output));

        // Command Pattern
        let commandHistory = [];
        function executeCommand(action) {
            commandHistory.push(action);
            document.getElementById("commandOutput").innerText += action + "\n";
        }

        // State Pattern
        let currentState = false;
        function changeState() {
            currentState = !currentState;
            document.getElementById("stateOutput").innerText = "Current State: " + (currentState ? "On" : "Off");
        }
    </script>
</body>
</html>
