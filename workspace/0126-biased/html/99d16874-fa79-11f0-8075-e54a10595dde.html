<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signature Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        input, button, textarea {
            margin: 5px;
        }
    </style>
</head>
<body>

<h2>Digital Signature Demo</h2>

<h3>1. Document Input</h3>
<textarea id="documentInput" rows="4" cols="50" placeholder="Type your document here..."></textarea><br>
<button onclick="loadDocument()">Load Document</button>

<h3>2. Signature Key Generation</h3>
<button onclick="generateKeys()">Generate Key Pair</button>
<div>
    <h4>Public Key:</h4>
    <textarea id="publicKey" rows="2" cols="50" readonly></textarea>
    
    <h4>Private Key:</h4>
    <textarea id="privateKey" rows="2" cols="50" readonly></textarea>
</div>

<h3>3. Sign Document</h3>
<button onclick="signDocument()">Sign Document</button>
<h4>Signature:</h4>
<textarea id="signature" rows="2" cols="50" readonly></textarea>

<h3>4. Verify Signature</h3>
<input type="text" id="signatureInput" placeholder="Enter Signature to verify...">
<button onclick="verifySignature()">Verify Signature</button>
<p id="verificationResult"></p>

<h3>5. Change Keys</h3>
<label for="keyChange">Change RSA Key Size:</label>
<input type="range" id="keyChange" min="512" max="4096" step="128" value="2048" onchange="updateKeySize()">
<p>Current Key Size: <span id="keySizeDisplay">2048</span></p>

<script>
    let publicKey, privateKey, currentKeySize = 2048;

    function loadDocument() {
        const documentInput = document.getElementById("documentInput").value;
        alert("Document Loaded: " + documentInput);
    }

    function generateKeys() {
        // Simulated key generation (replace with actual cryptographic library in practice)
        publicKey = "MockPublicKey_" + currentKeySize;
        privateKey = "MockPrivateKey_" + currentKeySize;
        document.getElementById("publicKey").value = publicKey;
        document.getElementById("privateKey").value = privateKey;
        alert("Key Pair Generated");
    }

    function signDocument() {
        // Simulated signing (this would require actual cryptographic implementations)
        const documentText = document.getElementById("documentInput").value;
        if (documentText === "") {
            alert("Please load a document first.");
            return;
        }
        if (!privateKey) {
            alert("Please generate a key pair first.");
            return;
        }
        const signature = "Signature_" + btoa(documentText);
        document.getElementById("signature").value = signature;
        alert("Document Signed");
    }

    function verifySignature() {
        const signatureInput = document.getElementById("signatureInput").value;
        const expectedSignature = document.getElementById("signature").value;
        const result = expectedSignature === signatureInput ? "Signature Valid" : "Signature Invalid";
        document.getElementById("verificationResult").textContent = result;
    }

    function updateKeySize() {
        currentKeySize = document.getElementById("keyChange").value;
        document.getElementById("keySizeDisplay").textContent = currentKeySize;
    }
</script>

</body>
</html>
