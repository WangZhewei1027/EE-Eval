<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #ccc;
        }
        
        .icon {
            font-size: 24px;
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tim Sort</h1>
        <div class="buttons">
            <button onclick="sort('low')">Lowest</button>
            <button onclick="sort('mid')">Middle</button>
            <button onclick="sort('high')">Highest</button>
        </div>
    </div>
    
    <script>
        function sort(key) {
            if (key === 'low') {
                document.querySelector('.container').classList.add('sort-low');
                document.querySelector('.container').classList.remove('sort-high');
            } else if (key === 'mid') {
                document.querySelector('.container').classList.add('sort-mid');
                document.querySelector('.container').classList.remove('sort-low');
                document.querySelector('.container').classList.remove('sort-high');
            } else {
                document.querySelector('.container').classList.add('sort-high');
                document.querySelector('.container').classList.remove('sort-low');
                document.querySelector('.container').classList.remove('sort-mid');
            }
        }
    </script>
</body>
</html>
