<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trie</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
        }

        .body {
            padding: 20px;
        }

        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Trie Demo</h1>
        </div>
        <div class="body">
            <p>Trie is a data structure that uses a tree-like structure to store a collection of strings.</p>
            <p>It is commonly used for tasks such as autocomplete, spell checking, and language translation.</p>
        </div>
    </div>
    <script>
        class TrieNode {
            constructor() {
                this.children = {};
                this.isEndOfWord = false;
            }
        }

        class Trie {
            constructor() {
                this.root = new TrieNode();
            }

            insert(word) {
                let node = this.root;
                for (let char of word) {
                    if (!node.children[char]) {
                        node.children[char] = new TrieNode();
                    }
                    node = node.children[char];
                }
                node.isEndOfWord = true;
            }

            search(word) {
                let node = this.root;
                for (let char of word) {
                    if (!node.children[char]) {
                        return false;
                    }
                    node = node.children[char];
                }
                return node.isEndOfWord;
            }

            startsWith(prefix) {
                let node = this.root;
                for (let char of prefix) {
                    if (!node.children[char]) {
                        return false;
                    }
                    node = node.children[char];
                }
                return true;
            }
        }

        let trie = new Trie();
        let inputField = document.getElementById('inputField');
        let searchButton = document.getElementById('searchButton');
        let startsWithButton = document.getElementById('startsWithButton');

        inputField.addEventListener('input', () => {
            trie.insert(inputField.value);
            updateUI();
        });

        searchButton.addEventListener('click', () => {
            let word = inputField.value;
            if (word) {
                if (trie.search(word)) {
                    console.log(`Word '${word}' found`);
                } else {
                    console.log(`Word '${word}' not found`);
                }
            } else {
                console.log('Please enter a word');
            }
        });

        startsWithButton.addEventListener('click', () => {
            let prefix = inputField.value;
            if (prefix) {
                if (trie.startsWith(prefix)) {
                    console.log(`Prefix '${prefix}' found`);
                } else {
                    console.log(`Prefix '${prefix}' not found`);
                }
            } else {
                console.log('Please enter a prefix');
            }
        });

        function updateUI() {
            let output = document.getElementById('output');
            output.innerHTML = '';
            for (let word in trie.root.children) {
                let node = trie.root.children[word];
                output.innerHTML += `<p>${word}: ${node.isEndOfWord ? 'End of word' : ''} (${node.children ? 'Has children' : ''})</p>`;
            }
        }
    </script>
</body>
</html>
