<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Hash Table</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { margin: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interactive Hash Table</h1>
        
        <div>
            <h2>Controls</h2>
            <input type="text" id="keyInput" placeholder="Enter Key">
            <input type="text" id="valueInput" placeholder="Enter Value">
            <button id="addBtn">Add to Hash Table</button>
            <button id="removeBtn">Remove from Hash Table</button>
            <button id="searchBtn">Search Hash Table</button>
        </div>
        
        <div>
            <h2>Key</h2>
            <input type="text" id="searchKey" placeholder="Enter Key to Search">
            <button id="searchKeyBtn">Search Key</button>
            <div id="searchResult"></div>
        </div>

        <h2>Current Hash Table</h2>
        <pre id="hashTableContent"></pre>
    </div>

    <script>
        class HashTable {
            constructor(size) {
                this.size = size;
                this.table = new Array(size);
            }

            _hash(key) {
                let hash = 0;
                for (let char of key) {
                    hash += char.charCodeAt(0);
                }
                return hash % this.size;
            }

            add(key, value) {
                const index = this._hash(key);
                this.table[index] = { key, value };
            }

            remove(key) {
                const index = this._hash(key);
                if (this.table[index] && this.table[index].key === key) {
                    this.table[index] = undefined;
                } else {
                    return "Key not found";
                }
            }

            search(key) {
                const index = this._hash(key);
                return this.table[index] && this.table[index].key === key
                    ? this.table[index].value
                    : "Key not found";
            }
        }

        const hashTable = new HashTable(10);

        document.getElementById('addBtn').onclick = function() {
            const key = document.getElementById('keyInput').value;
            const value = document.getElementById('valueInput').value;
            hashTable.add(key, value);
            updateHashTableContent();
            clearInputs();
        };

        document.getElementById('removeBtn').onclick = function() {
            const key = document.getElementById('keyInput').value;
            const result = hashTable.remove(key);
            updateHashTableContent();
            clearInputs();
        };

        document.getElementById('searchKeyBtn').onclick = function() {
            const key = document.getElementById('searchKey').value;
            const result = hashTable.search(key);
            document.getElementById('searchResult').innerText = result;
        };

        function updateHashTableContent() {
            document.getElementById('hashTableContent').innerText = JSON.stringify(hashTable.table, null, 2);
        }

        function clearInputs() {
            document.getElementById('keyInput').value = '';
            document.getElementById('valueInput').value = '';
            document.getElementById('searchKey').value = '';
        }
    </script>
</body>
</html>
