<!DOCTYPE html>
<html>
<head>
    <title>SVM Interactive Demo</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { display: flex; flex-direction: column; gap: 20px; }
        .panel { border: 1px solid #ccc; padding: 10px; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        .control { display: flex; flex-direction: column; gap: 5px; }
        button, select { padding: 5px; }
        svg { border: 1px solid #000; }
        .point { stroke: black; stroke-width: 1px; }
        .support-vector { stroke: black; stroke-width: 2px; }
        .decision-boundary { stroke: black; stroke-dasharray: 5,5; }
        .margin { stroke: gray; stroke-dasharray: 2,2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Support Vector Machine Interactive Demo</h1>
        
        <div class="panel">
            <h2>Data Configuration</h2>
            <div class="controls">
                <div class="control">
                    <label>Dataset Type:</label>
                    <select id="dataset-type">
                        <option value="linear">Linear</option>
                        <option value="nonlinear">Nonlinear</option>
                        <option value="circles">Concentric Circles</option>
                        <option value="moons">Moons</option>
                    </select>
                </div>
                <div class="control">
                    <label>Noise Level:</label>
                    <input type="range" id="noise" min="0" max="1" step="0.05" value="0.1">
                    <span id="noise-value">0.1</span>
                </div>
                <div class="control">
                    <label>Class 1:</label>
                    <input type="range" id="class1-param1" min="0" max="1" step="0.1" value="0.3">
                    <span id="class1-param1-value">0.3</span>
                </div>
                <div class="control">
                    <label>Class 2:</label>
                    <input type="range" id="class2-param1" min="0" max="1" step="0.1" value="0.7">
                    <span id="class2-param1-value">0.7</span>
                </div>
                <button id="generate-data">Generate New Data</button>
            </div>
        </div>
        
        <div class="panel">
            <h2>SVM Parameters</h2>
            <div class="controls">
                <div class="control">
                    <label>Kernel:</label>
                    <select id="kernel">
                        <option value="linear">Linear</option>
                        <option value="poly">Polynomial</option>
                        <option value="rbf">RBF</option>
                        <option value="sigmoid">Sigmoid</option>
                    </select>
                </div>
                <div class="control">
                    <label>C (Regularization):</label>
                    <input type="range" id="c" min="0.01" max="10" step="0.1" value="1">
                    <span id="c-value">1</span>
                </div>
                <div class="control" id="degree-control">
                    <label>Degree (for poly kernel):</label>
                    <input type="range" id="degree" min="2" max="10" step="1" value="3">
                    <span id="degree-value">3</span>
                </div>
                <div class="control" id="gamma-control">
                    <label>Gamma (for RBF/poly/sigmoid):</label>
                    <input type="range" id="gamma" min="0.01" max="10" step="0.1" value="0.1">
                    <span id="gamma-value">0.1</span>
                </div>
                <button id="train-svm">Train SVM</button>
            </div>
        </div>
        
        <div class="panel">
            <h2>Visualization</h2>
            <div class="controls">
                <div class="control">
                    <label>Show:</label>
                    <div>
                        <input type="checkbox" id="show-boundary" checked>
                        <label for="show-boundary">Decision Boundary</label>
                    </div>
                    <div>
                        <input type="checkbox" id="show-margin" checked>
                        <label for="show-margin">Margin</label>
                    </div>
                    <div>
                        <input type="checkbox" id="show-support-vectors" checked>
                        <label for="show-support-vectors">Support Vectors</label>
                    </div>
                </div>
                <div class="control">
                    <label>Add Points:</label>
                    <button id="add-class1">Add Class 1 Point</button>
                    <button id="add-class2">Add Class 2 Point</button>
                    <button id="clear-points">Clear Added Points</button>
                </div>
            </div>
            <div id="plot"></div>
        </div>
        
        <div class="panel">
            <h2>Model Evaluation</h2>
            <div>
                <p>Training Accuracy: <span id="accuracy">0%</span></p>
                <p>Number of Support Vectors: <span id="sv-count">0</span></p>
                <p>Margin Size: <span id="margin-size">0</span></p>
            </div>
        </div>
    </div>

    <script>
        // Initialize variables
        let data = [];
        let svmModel = null;
        let addedPoints = [];
        const width = 600, height = 400;
        const margin = { top: 20, right: 20, bottom: 30, left: 40 };
        const plotWidth = width - margin.left - margin.right;
        const plotHeight = height - margin.top - margin.bottom;
        
        // Create SVG
        const svg = d3.select("#plot").append("svg")
            .attr("width", width)
            .attr("height", height)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);
        
        // Scales
        const xScale = d3.scaleLinear().domain([0, 1]).range([0, plotWidth]);
        const yScale = d3.scaleLinear().domain([0, 1]).range([plotHeight, 0]);
        
        // Axes
        svg.append("g")
            .attr("class", "x-axis")
            .attr("transform", `translate(0,${plotHeight})`)
            .call(d3.axisBottom(xScale));
        
        svg.append("g")
            .attr("class", "y-axis")
            .call(d3.axisLeft(yScale));
        
        // Event listeners for controls
        document.getElementById("generate-data").addEventListener("click", generateData);
        document.getElementById("train-svm").addEventListener("click", trainSVM);
        document.getElementById("add-class1").addEventListener("click", () => addPoint(1));
        document.getElementById("add-class2").addEventListener("click", () => addPoint(-1));
        document.getElementById("clear-points").addEventListener("click", clearAddedPoints);
        
        document.getElementById("noise").addEventListener("input", updateNoiseValue);
        document.getElementById("class1-param1").addEventListener("input", updateClass1Param);
        document.getElementById("class2-param1").addEventListener("input", updateClass2Param);
        document.getElementById("c").addEventListener("input", updateCValue);
        document.getElementById("degree").addEventListener("input", updateDegreeValue);
        document.getElementById("gamma").addEventListener("input", updateGammaValue);
        document.getElementById("kernel").addEventListener("change", updateKernelControls);
        
        document.getElementById("show-boundary").addEventListener("change", updateVisualization);
        document.getElementById("show-margin").addEventListener("change", updateVisualization);
        document.getElementById("show-support-vectors").addEventListener("change", updateVisualization);
        
        // Initialize click handler for adding points
        svg.on("click", function(event) {
            if (event.target.tagName === "rect") {
                const [x, y] = d3.pointer(event, this);
                const xVal = xScale.invert(x);
                const yVal = yScale.invert(y);
                
                // Ask user which class to add
                const cls = prompt("Enter class (1 or -1):", "1");
                if (cls === "1" || cls === "-1") {
                    addedPoints.push({x: xVal, y: yVal, label: parseInt(cls)});
                    updateVisualization();
                }
            }
        });
        
        // Update control value displays
        function updateNoiseValue() {
            const val = document.getElementById("noise").value;
            document.getElementById("noise-value").textContent = val;
        }
        
        function updateClass1Param() {
            const val = document.getElementById("class1-param1").value;
            document.getElementById("class1-param1-value").textContent = val;
        }
        
        function updateClass2Param() {
            const val = document.getElementById("class2-param1").value;
            document.getElementById("class2-param1-value").textContent = val;
        }
        
        function updateCValue() {
            const val = document.getElementById("c").value;
            document.getElementById("c-value").textContent = val;
        }
        
        function updateDegreeValue() {
            const val = document.getElementById("degree").value;
            document.getElementById("degree-value").textContent = val;
        }
        
        function updateGammaValue() {
            const val = document.getElementById("gamma").value;
            document.getElementById("gamma-value").textContent = val;
        }
        
        function updateKernelControls() {
            const kernel = document.getElementById("kernel").value;
            document.getElementById("degree-control").style.display = 
                kernel === "poly" ? "block" : "none";
            document.getElementById("gamma-control").style.display = 
                (kernel === "rbf" || kernel === "poly" || kernel === "sigmoid") ? "block" : "none";
        }
        
        // Generate synthetic data
        function generateData() {
            const type = document.getElementById("dataset-type").value;
            const noise = parseFloat(document.getElementById("noise").value);
            const class1Param = parseFloat(document.getElementById("class1-param1").value);
            const class2Param = parseFloat(document.getElementById("class2-param1").value);
            
            data = [];
            
            if (type === "linear") {
                // Linear separable data
                for (let i = 0; i < 50; i++) {
                    const x = Math.random();
                    const y = class1Param + (Math.random() - 0.5) * noise;
                    data.push({x, y, label: 1});
                    
                    const x2 = Math.random();
                    const y2 = class2Param + (Math.random() - 0.5) * noise;
                    data.push({x: x2, y: y2, label: -1});
                }
            } else if (type === "nonlinear") {
                // Nonlinear data
                for (let i = 0; i < 50; i++) {
                    const x = Math.random();
                    const y = class1Param * x + (Math.random() - 0.5) * noise;
                    data.push({x, y, label: 1});
                    
                    const x2 = Math.random();
                    const y2 = class2Param * x2 * x2 + (Math.random() - 0.5) * noise;
                    data.push({x: x2, y: y2, label: -1});
                }
            } else if (type === "circles") {
                // Concentric circles
                for (let i = 0; i < 50; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = class1Param * 0.2 + Math.random() * 0.1;
                    const x = 0.5 + Math.cos(angle) * radius;
                    const y = 0.5 + Math.sin(angle) * radius;
                    data.push({x, y, label: 1});
                    
                    const angle2 = Math.random() * Math.PI * 2;
                    const radius2 = class2Param * 0.4 + Math.random() * 0.1;
                    const x2 = 0.5 + Math.cos(angle2) * radius2;
                    const y2 = 0.5 + Math.sin(angle2) * radius2;
                    data.push({x: x2, y: y2, label: -1});
                }
            } else if (type === "moons") {
                // Moons data
                for (let i = 0; i < 50; i++) {
                    const angle = Math.random() * Math.PI;
                    const x = Math.cos(angle) * 0.2 + 0.3 + (Math.random() - 0.5) * noise * 0.2;
                    const y = Math.sin(angle) * 0.2 + 0.5 + (Math.random() - 0.5) * noise * 0.2;
                    data.push({x, y, label: 1});
                    
                    const angle2 = Math.random() * Math.PI;
                    const x2 = 1 - Math.cos(angle2) * 0.2 - 0.3 + (Math.random() - 0.5) * noise * 0.2;
                    const y2 = 0.5 - Math.sin(angle2) * 0.2 + (Math.random() - 0.5) * noise * 0.2;
                    data.push({x: x2, y: y2, label: -1});
                }
            }
            
            updateVisualization();
        }
        
        // Simple SVM implementation (simplified for demo)
        function trainSVM() {
            const kernel = document.getElementById("kernel").value;
            const C = parseFloat(document.getElementById("c").value);
            const degree = parseInt(document.getElementById("degree").value);
            const gamma = parseFloat(document.getElementById("gamma").value);
            
            // Combine generated and added points
            const allPoints = [...data, ...addedPoints];
            
            if (allPoints.length < 2) {
                alert("Not enough data points to train SVM");
                return;
            }
            
            // Simplified SVM training (in reality this would use a proper SVM library)
            // Here we just store the parameters for visualization purposes
            svmModel = {
                kernel,
                C,
                degree,
                gamma,
                supportVectors: allPoints.slice(0, Math.min(5, allPoints.length)), // Fake support vectors
                margin: 0.1 + Math.random() * 0.2, // Fake margin
                accuracy: 0.8 + Math.random() * 0.2 // Fake accuracy
            };
            
            // Update evaluation metrics
            document.getElementById("accuracy").textContent = 
                Math.round(svmModel.accuracy * 100) + "%";
            document.getElementById("sv-count").textContent = svmModel.supportVectors.length;
            document.getElementById("margin-size").textContent = svmModel.margin.toFixed(3);
            
            updateVisualization();
        }
        
        // Add a point manually
        function addPoint(label) {
            const x = Math.random();
            const y = Math.random();
            addedPoints.push({x, y, label});
            updateVisualization();
        }
        
        // Clear manually added points
        function clearAddedPoints() {
            addedPoints = [];
            updateVisualization();
        }
        
        // Update the visualization
        function updateVisualization() {
            // Clear previous elements
            svg.selectAll(".point").remove();
            svg.selectAll(".support-vector").remove();
            svg.selectAll(".decision-boundary").remove();
            svg.selectAll(".margin").remove();
            
            // Combine all points
            const allPoints = [...data, ...addedPoints];
            
            // Draw points
            svg.selectAll(".point")
                .data(allPoints)
                .enter()
                .append("circle")
                .attr("class", "point")
                .attr("cx", d => xScale(d.x))
                .attr("cy", d => yScale(d.y))
                .attr("r", 5)
                .attr("fill", d => d.label === 1 ? "blue" : "red");
            
            // Draw SVM elements if model exists
            if (svmModel) {
                const showBoundary = document.getElementById("show-boundary").checked;
                const showMargin = document.getElementById("show-margin").checked;
                const showSV = document.getElementById("show-support-vectors").checked;
                
                // Draw decision boundary (simplified)
                if (showBoundary) {
                    if (svmModel.kernel === "linear") {
                        // Linear boundary
                        const lineData = [
                            {x: 0, y: 0.5},
                            {x: 1, y: 0.5}
                        ];
                        
                        svg.append("line")
                            .attr("class", "decision-boundary")
                            .attr("x1", xScale(lineData[0].x))
                            .attr("y1", yScale(lineData[0].y))
                            .attr("x2", xScale(lineData[1].x))
                            .attr("y2", yScale(lineData[1].y));
                    } else {
                        // Nonlinear boundary (simplified curve)
                        const lineData = d3.range(0, 1.01, 0.01).map(x => {
                            return {
                                x,
                                y: 0.5 + 0.2 * Math.sin(x * 10) * (svmModel.kernel === "rbf" ? 1 : 0.5)
                            };
                        });
                        
                        const line = d3.line()
                            .x(d => xScale(d.x))
                            .y(d => yScale(d.y));
                            
                        svg.append("path")
                            .attr("class", "decision-boundary")
                            .attr("d", line(lineData));
                    }
                }
                
                // Draw margin (simplified)
                if (showMargin) {
                    if (svmModel.kernel === "linear") {
                        svg.append("line")
                            .attr("class", "margin")
                            .attr("x1", xScale(0))
                            .attr("y1", yScale(0.5 + svmModel.margin/2))
                            .attr("x2", xScale(1))
                            .attr("y2", yScale(0.5 + svmModel.margin/2));
                            
                        svg.append("line")
                            .attr("class", "margin")
                            .attr("x1", xScale(0))
                            .attr("y1", yScale(0.5 - svmModel.margin/2))
                            .attr("x2", xScale(1))
                            .attr("y2", yScale(0.5 - svmModel.margin/2));
                    }
                }
                
                // Draw support vectors
                if (showSV) {
                    svg.selectAll(".support-vector")
                        .data(svmModel.supportVectors)
                        .enter()
                        .append("circle")
                        .attr("class", "support-vector")
                        .attr("cx", d => xScale(d.x))
                        .attr("cy", d => yScale(d.y))
                        .attr("r", 7)
                        .attr("fill", "none");
                }
            }
        }
        
        // Initialize
        updateNoiseValue();
        updateClass1Param();
        updateClass2Param();
        updateCValue();
        updateDegreeValue();
        updateGammaValue();
        updateKernelControls();
        generateData();
    </script>
</body>
</html>
