<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Design Sample</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 20%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px 15px 0 0;
            z-index: 0;
        }

        h1 {
            color: #fff;
            font-size: 2.5em;
            z-index: 1;
            margin: 0;
            animation: fadeIn 1s ease-in-out;
        }

        p {
            color: #fff;
            z-index: 1;
            margin: 10px 0 30px 0;
            animation: fadeIn 1.5s ease-in-out;
            opacity: 0.8;
        }

        .button {
            background: #fff;
            color: #6a11cb;
            padding: 15px 30px;
            border-radius: 25px;
            border: none;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.4s, transform 0.2s;
            position: relative;
            z-index: 1;
        }

        .button:hover {
            background: #6a11cb;
            color: #fff;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Secure Authentication</h1>
        <p>Experience seamless and secure login with cutting-edge technology.</p>
        <button class="button" onclick="observeAction()">Learn More</button>
    </div>

    <script>
        function observeAction() {
            alert("Visuals and design are key! \nThank you for observing.");
        }
    </script>
</body>
</html>
