<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bucket Sort Interactive Demo</title>
<style>
  body {
    font-family: monospace, monospace;
    margin: 1em;
    background: white;
    color: black;
  }
  textarea {
    width: 100%;
    height: 5em;
  }
  button, input, select {
    font: inherit;
    margin: 0.2em 0.5em 0.2em 0;
  }
  fieldset {
    margin-top: 1em;
    padding: 0.5em;
  }
  legend {
    font-weight: bold;
  }
  pre {
    border: 1px solid black;
    padding: 0.5em;
    max-height: 12em;
    overflow-y: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  label {
    user-select: none;
  }
  #bucketContainer {
    margin-top: 1em;
    border-top: 1px solid black;
    padding-top: 1em;
    max-height: 14em;
    overflow-y: auto;
  }
  .bucket {
    white-space: nowrap;
    margin-bottom: 0.3em;
    font-size: 0.9em;
  }
  .highlight {
    font-weight: bold;
    text-decoration: underline;
  }
  .controls-row {
    margin-bottom: 0.5em;
  }
</style>
</head>
<body>
<h1>Bucket Sort Interactive Demo</h1>

<section id="inputSection">
  <label for="inputArray">Enter array of numbers (comma or space separated):</label><br/>
  <textarea id="inputArray" aria-label="Array input" placeholder="Example: 4, 2, 1, 5, 3"></textarea><br/>

  <label for="numBucketsInput">Number of buckets (integer ≥1):</label>
  <input type="number" id="numBucketsInput" min="1" step="1" value="5" aria-label="Number of buckets" />
  
  <button id="btnInitialize">Initialize Sort</button>
  <button id="btnReset" disabled>Reset</button>
</section>

<form id="controlsForm" style="margin-top:1em; display:none;" aria-label="Bucket Sort controls">
  <fieldset>
    <legend>Sort Controls</legend>
    <div class="controls-row">
      <button id="btnStep" type="button" disabled>Step</button>
      <button id="btnAuto" type="button" disabled>Start Auto Sort</button>
      <button id="btnPause" type="button" disabled>Pause Auto</button>
      <button id="btnFastForward" type="button" disabled>Fast Forward</button>
      <button id="btnBackStep" type="button" disabled>Back Step</button>
      <button id="btnResetStep" type="button" disabled>Reset Steps</button>
    </div>

    <label for="autoDelayRange">Auto Step Delay (ms): </label>
    <input type="range" id="autoDelayRange" min="50" max="2000" step="50" value="500" />
    <span id="autoDelayValue">500</span> ms
  </fieldset>

  <fieldset>
    <legend>Bucket & Sorting Options</legend>
    <label for="bucketSortType">Sort algorithm inside buckets:</label>
    <select id="bucketSortType" aria-label="Choose bucket sorting algorithm">
      <option value="insertion">Insertion Sort (default)</option>
      <option value="jsbuiltin">JavaScript Built-in Sort</option>
      <option value="selection">Selection Sort</option>
      <option value="bubble">Bubble Sort</option>
    </select>
    <button id="btnRebucket" type="button" disabled>Rebucket Current Array</button>
  </fieldset>
</form>

<section id="stateSection" style="margin-top:1em;">
  <fieldset aria-live="polite" aria-atomic="true">
    <legend>Bucket Sort State & Logs</legend>
    <div id="statusLine" aria-live="polite"></div>
    <pre id="logArea" aria-label="Sort logs"></pre>
  </fieldset>
</section>

<section id="bucketContainer" aria-label="Buckets container" tabindex="0" style="margin-top:1em;"></section>

<section id="finalOutputSection" style="margin-top:1em;display:none;">
  <fieldset>
    <legend>Final Sorted Array</legend>
    <pre id="finalSortedArray"></pre>
    <button id="btnShowSortedArray" type="button">Show/Hide Sorted Array</button>
  </fieldset>
</section>

<script>
(function(){
  // Internal state and logic

  // Utility parsing function
  function parseInputArray(str) {
    // Split by comma or spaces
    const items = str.trim().split(/[\s,]+/);
    const arr = [];
    for(let i=0; i<items.length; i++) {
      if(items[i].length === 0) continue;
      let n = Number(items[i]);
      if(!Number.isFinite(n)) return null;
      arr.push(n);
    }
    return arr;
  }

  // Sort algorithms for buckets:
  // Insertion sort
  function insertionSort(arr, recordStep) {
    let logSteps = [];
    for(let i=1; i<arr.length; i++) {
      let key = arr[i];
      let j = i-1;
      while(j>=0 && arr[j]>key) {
        arr[j+1] = arr[j];
        j--;
        if(recordStep) logSteps.push(arr.slice());
      }
      arr[j+1] = key;
      if(recordStep) logSteps.push(arr.slice());
    }
    return logSteps;
  }
  // Selection sort
  function selectionSort(arr, recordStep) {
    let logSteps = [];
    for(let i=0; i<arr.length-1; i++) {
      let minIdx = i;
      for(let j=i+1; j<arr.length; j++) {
        if(arr[j]<arr[minIdx]) minIdx = j;
      }
      if(minIdx !== i) {
        [arr[i], arr[minIdx]] = [arr[minIdx], arr[i]];
        if(recordStep) logSteps.push(arr.slice());
      }
    }
    return logSteps;
  }
  // Bubble sort
  function bubbleSort(arr, recordStep) {
    let logSteps = [];
    let n = arr.length;
    let swapped;
    do {
      swapped = false;
      for(let i=1; i<n; i++) {
        if(arr[i-1]>arr[i]) {
          [arr[i-1], arr[i]] = [arr[i], arr[i-1]];
          swapped = true;
          if(recordStep) logSteps.push(arr.slice());
        }
      }
      n--;
    } while(swapped);
    return logSteps;
  }

  // Safe to use JS builtin Array.prototype.sort with numeric comparator
  function builtinSort(arr, recordStep) {
    // Because sort() is opaque, just do one step: full sorted.
    arr.sort((a,b)=>a-b);
    return [arr.slice()];
  }

  // Step-by-step bucket sort states:
  // States will guide UI interactivity and allow steps back/forward
  // State stages:
  //   0 = initial input not yet initialized
  //   1 = buckets created & empty
  //   2 = distribution of elements across buckets step-by-step
  //   3 = bucket sorting step-by-step for each bucket
  //   4 = buckets concatenated forming final array
  //   5 = done

  // Major properties:
  // - original input array (originalArray)
  // - current array (curArray)
  // - buckets: array of arrays
  // - number of buckets
  // - min value and max value for bucketing 
  // - bucket ranges (for log display)
  // - current state
  // - step indexes for distribution, bucket sorting, concatenation
  // - sorting logs per bucket for more detailed steps

  // Global state object:
  let state = {
    originalArray: [],
    curArray: [],
    buckets: [],
    numBuckets: 5,
    minVal: 0,
    maxVal: 0,
    bucketRanges: [],
    stage: 0,
    // distribution step index: index of the next element to place into bucket
    distIndex: 0,
    // bucket sort info: sortingSteps for each bucket and current step index per bucket sorting
    bucketSortType: 'insertion',
    bucketSortingSteps: [], // array of arrays of states per bucket
    bucketSortingStepIndices: [], // current index per bucket in its sortingSteps
    curSortingBucket: 0, // which bucket is currently being sorted
    concatenated: [],
    concatIndex: 0, // index for concatenation process
    // Logs:
    logs: [],
    // Last sorted array after final step
    sortedArray: null,
    // Auto stepping state
    autoTimer: null,
    autoDelay: 500,
    autoActive: false,
    autoForward: true,
    history: [], // history of snapshots for backstep (deep copy states)
    historyPointer: -1,
  };

  // HTML Elements references
  const inputArrayEl = document.getElementById('inputArray');
  const numBucketsEl = document.getElementById('numBucketsInput');
  const btnInitialize = document.getElementById('btnInitialize');
  const btnReset = document.getElementById('btnReset');
  const btnStep = document.getElementById('btnStep');
  const btnAuto = document.getElementById('btnAuto');
  const btnPause = document.getElementById('btnPause');
  const btnFastForward = document.getElementById('btnFastForward');
  const btnBackStep = document.getElementById('btnBackStep');
  const btnResetStep = document.getElementById('btnResetStep');
  const autoDelayRange = document.getElementById('autoDelayRange');
  const autoDelayValue = document.getElementById('autoDelayValue');
  const bucketSortTypeSel = document.getElementById('bucketSortType');
  const btnRebucket = document.getElementById('btnRebucket');
  const statusLine = document.getElementById('statusLine');
  const logArea = document.getElementById('logArea');
  const bucketContainer = document.getElementById('bucketContainer');
  const finalOutputSection = document.getElementById('finalOutputSection');
  const finalSortedArrayPre = document.getElementById('finalSortedArray');
  const btnShowSortedArray = document.getElementById('btnShowSortedArray');
  const controlsForm = document.getElementById('controlsForm');

  // Helpers for deep copying arrays and state
  function deepCopyState(st) {
    // Only copy fields that matter for history
    return {
      originalArray: st.originalArray.slice(),
      curArray: st.curArray.slice(),
      buckets: st.buckets.map(b=>b.slice()),
      numBuckets: st.numBuckets,
      minVal: st.minVal,
      maxVal: st.maxVal,
      bucketRanges: st.bucketRanges.slice(),
      stage: st.stage,
      distIndex: st.distIndex,
      bucketSortType: st.bucketSortType,
      bucketSortingSteps: st.bucketSortingSteps.map(arrs=>arrs.map(a=>a.slice())),
      bucketSortingStepIndices: st.bucketSortingStepIndices.slice(),
      curSortingBucket: st.curSortingBucket,
      concatenated: st.concatenated.slice(),
      concatIndex: st.concatIndex,
      logs: st.logs.slice(),
      sortedArray: st.sortedArray ? st.sortedArray.slice() : null,
    };
  }
  function restoreState(snapshot) {
    state.originalArray = snapshot.originalArray.slice();
    state.curArray = snapshot.curArray.slice();
    state.buckets = snapshot.buckets.map(b=>b.slice());
    state.numBuckets = snapshot.numBuckets;
    state.minVal = snapshot.minVal;
    state.maxVal = snapshot.maxVal;
    state.bucketRanges = snapshot.bucketRanges.slice();
    state.stage = snapshot.stage;
    state.distIndex = snapshot.distIndex;
    state.bucketSortType = snapshot.bucketSortType;
    state.bucketSortingSteps = snapshot.bucketSortingSteps.map(arrs=>arrs.map(a=>a.slice()));
    state.bucketSortingStepIndices = snapshot.bucketSortingStepIndices.slice();
    state.curSortingBucket = snapshot.curSortingBucket;
    state.concatenated = snapshot.concatenated.slice();
    state.concatIndex = snapshot.concatIndex;
    state.logs = snapshot.logs.slice();
    state.sortedArray = snapshot.sortedArray ? snapshot.sortedArray.slice() : null;
  }

  // State machine step handlers
  // Stage 1: Create buckets
  // Stage 2: Distribute elements from curArray to buckets, one step = one element placed
  // Stage 3: Sort buckets stepwise; each bucket sorts fully before moving to next
  // Stage 4: Concatenate buckets one by one to concatenated array
  // Stage 5: Finished; sortedArray available

  // Calculate bucket ranges for display and bucketing
  function calculateBucketRanges(minV,maxV,numB) {
    let ranges = [];
    if(numB === 1) {
      ranges.push({min:minV, max:maxV});
      return ranges;
    }
    let interval = (maxV - minV)/numB;
    for(let i=0; i<numB; i++) {
      let start = minV + i*interval;
      let end = (i===numB-1) ? maxV : start+interval;
      ranges.push({min: start, max: end});
    }
    return ranges;
  }

  // Given a number, find bucket index
  function findBucketIndex(num, ranges) {
    for(let i=0; i<ranges.length; i++) {
      // inclusive min, exclusive max for all except last bucket inclusive max
      if(i<ranges.length-1) {
        if(num >= ranges[i].min && num < ranges[i].max) return i;
      } else {
        if(num >= ranges[i].min && num <= ranges[i].max) return i;
      }
    }
    return 0; // fallback bucket index
  }

  // Log helper
  function log(msg) {
    state.logs.push(msg);
    if(state.logs.length > 1000) {
      state.logs.shift();
    }
  }

  // Update UI print states
  function updateUI() {
    // Status line
    let statusMsg = '';
    if(state.stage === 0) {
      statusMsg = 'Initialize with input array and number of buckets.';
    } else if(state.stage === 1) {
      statusMsg = `Buckets Created: ${state.numBuckets} buckets from ${state.minVal} to ${state.maxVal}`;
    } else if(state.stage === 2) {
      statusMsg = `Distributing element ${state.distIndex+1} of ${state.originalArray.length} into buckets.`;
    } else if(state.stage === 3) {
      statusMsg = `Sorting bucket ${state.curSortingBucket+1} of ${state.numBuckets} - Step ${state.bucketSortingStepIndices[state.curSortingBucket]+1} of ${state.bucketSortingSteps[state.curSortingBucket].length}`;
    } else if(state.stage === 4) {
      statusMsg = `Concatenating buckets - bucket ${state.concatIndex+1} of ${state.numBuckets}`;
    } else if(state.stage === 5) {
      statusMsg = `Sort completed. Final sorted array ready.`;
    }
    statusLine.textContent = statusMsg;

    // Log area
    logArea.textContent = state.logs.join('\n');

    // Bucket container
    bucketContainer.innerHTML = '';
    // Show bucket ranges and contents
    for(let i=0; i<state.numBuckets; i++) {
      let b = state.buckets[i];
      let range = state.bucketRanges[i];
      let bucketText = b.length > 0 ? b.join(', ') : '(empty)';
      let bucketLabel = `Bucket ${i+1} [${range.min.toFixed(2)} - ${range.max.toFixed(2)}]: ${bucketText}`;
      // Highlight step focus elements:
      let highlightIndices = [];
      if(state.stage === 2 && state.distIndex < state.originalArray.length) {
        // Highlight element about to distribute if belongs here?
        let curEl = state.originalArray[state.distIndex];
        let idx = b.indexOf(curEl);
        if(idx >= 0 && i === findBucketIndex(curEl,state.bucketRanges)) highlightIndices.push(idx);
      }
      if(state.stage === 3 && i === state.curSortingBucket) {
        // Highlight elements changed in sorting step
        const stepI = state.bucketSortingStepIndices[i];
        if(stepI >= 0 && stepI < state.bucketSortingSteps[i].length) {
          let arrStep = state.bucketSortingSteps[i][stepI];
          bucketLabel += ` (Sorting step ${stepI+1}/${state.bucketSortingSteps[i].length})`;
        }
      }

      let div = document.createElement('div');
      div.className = 'bucket';
      div.textContent = bucketLabel;
      bucketContainer.appendChild(div);
    }

    // Buttons enable states based on stage and auto running
    const autoOn = state.autoActive;
    btnStep.disabled = autoOn || (state.stage === 0) || (state.stage === 5);
    btnAuto.disabled = autoOn || (state.stage === 0) || (state.stage === 5);
    btnPause.disabled = !autoOn;
    btnFastForward.disabled = autoOn || (state.stage === 0) || (state.stage === 5);
    btnBackStep.disabled = (state.historyPointer <= 0);
    btnResetStep.disabled = (state.stage === 0);
    btnRebucket.disabled = (state.stage === 0 || state.stage === 5);
  }

  // Initialize bucket sort state from inputs (called on Initialize)
  function initializeBucketSort() {
    let arr = parseInputArray(inputArrayEl.value);
    if(!arr || arr.length===0) {
      alert('Invalid input array. Please enter valid numbers separated by comma or spaces.');
      return false;
    }
    let nb = Number(numBucketsEl.value);
    if(!Number.isInteger(nb) || nb<1) {
      alert('Number of buckets must be an integer ≥ 1.');
      return false;
    }

    // Init state properties:
    state.originalArray = arr.slice();
    state.curArray = arr.slice();
    state.numBuckets = nb;
    state.minVal = Math.min(...arr);
    state.maxVal = Math.max(...arr);
    if(state.minVal === state.maxVal) {
      // If all values equal, create 1 bucket only.
      state.numBuckets = 1;
      numBucketsEl.value = 1;
      alert('All numbers equal, number of buckets set to 1.');
    }
    state.bucketRanges = calculateBucketRanges(state.minVal, state.maxVal, state.numBuckets);
    state.buckets = new Array(state.numBuckets).fill(null).map(_=>[]);
    state.stage = 1;
    state.distIndex = 0;
    state.bucketSortingStepIndices = new Array(state.numBuckets).fill(-1);
    state.bucketSortingSteps = new Array(state.numBuckets);
    state.curSortingBucket = 0;
    state.concatenated = [];
    state.concatIndex = 0;
    state.logs = [];
    state.sortedArray = null;
    state.bucketSortType = bucketSortTypeSel.value;

    // Preset bucketSortingSteps and bucketSortingStepIndices to empty
    for(let i=0; i < state.numBuckets; i++) {
      state.bucketSortingSteps[i] = [];
      state.bucketSortingStepIndices[i] = -1;
    }

    // Clear history and save first snapshot after initialization
    state.history = [];
    state.historyPointer = -1;
    saveHistory();

    log(`Initialized with array of length ${arr.length}, ${state.numBuckets} bucket(s).`);
    log(`Value range: min=${state.minVal}, max=${state.maxVal}`);
    updateUI();

    // Show controls form
    controlsForm.style.display = 'block';
    btnReset.disabled = false;

    return true;
  }

  // Save snapshot to history for backstep
  function saveHistory() {
    // Drop all states forward of current pointer
    if(state.historyPointer < state.history.length-1) {
      state.history = state.history.slice(0,state.historyPointer+1);
    }
    const snap = deepCopyState(state);
    state.history.push(snap);
    state.historyPointer++;
  }

  // Step distribution: place one element in bucket
  function distributionStepForward() {
    if(state.stage !== 1 && state.stage !== 2) {
      log('Cannot distribute elements now.');
      return false;
    }
    if(state.distIndex >= state.originalArray.length) {
      // Distribution done; prepare sorting steps
      prepareBucketsSortingSteps();
      state.stage = 3;
      log('Distribution complete. Proceeding to bucket sorting.');
      saveHistory();
      return true;
    }
    let val = state.originalArray[state.distIndex];
    let bidx = findBucketIndex(val, state.bucketRanges);
    state.buckets[bidx].push(val);
    state.distIndex++;
    state.stage = 2;
    log(`Placed element ${val} into bucket ${bidx+1}`);
    saveHistory();
    return true;
  }

  // Step distribution backward (only if stage=2)
  function distributionStepBackward() {
    if(state.stage !== 2) return false;
    if(state.distIndex <= 0) return false;
    state.distIndex--;
    let val = state.originalArray[state.distIndex];
    let bidx = findBucketIndex(val, state.bucketRanges);
    let b = state.buckets[bidx];
    // Remove last occurrence of val from bucket (should be last element)
    for(let i=b.length-1; i>=0; i--) {
      if(b[i] === val) {
        b.splice(i,1);
        break;
      }
    }
    log(`Removed element ${val} from bucket ${bidx+1}`);
    saveHistory();
    return true;
  }

  // Prepare bucketSortingSteps for each bucket based on chosen algorithm
  // Each will store array states per sorting step for that bucket
  function prepareBucketsSortingSteps() {
    const sortAlgo = state.bucketSortType;
    for(let i=0; i<state.numBuckets; i++) {
      let b = state.buckets[i].slice();
      let steps = [];
      if(b.length <= 1) {
        // No steps needed; 0 steps
        steps = [b.slice()];
      } else {
        if(sortAlgo === 'insertion') {
          steps = insertionSort(b.slice(), true);
        } else if(sortAlgo === 'selection') {
          steps = selectionSort(b.slice(), true);
        } else if(sortAlgo === 'bubble') {
          steps = bubbleSort(b.slice(), true);
        } else if(sortAlgo === 'jsbuiltin') {
          steps = builtinSort(b.slice(), true);
        } else {
          // Default fallback
          steps = insertionSort(b.slice(), true);
        }
      }
      state.bucketSortingSteps[i] = steps;
      state.bucketSortingStepIndices[i] = -1;
    }
    state.curSortingBucket = 0;
    log(`Prepared sorting steps per bucket with algorithm: ${sortAlgo}`);
  }

  // Step sorting in current bucket forward
  // Returns true if step advanced, false if bucket done
  function bucketSortStepForward() {
    if(state.stage !== 3) return false;
    let cb = state.curSortingBucket;
    if(cb < 0 || cb >= state.numBuckets) return false;
    let stepIdx = state.bucketSortingStepIndices[cb];
    let steps = state.bucketSortingSteps[cb];
    if(stepIdx + 1 < steps.length) {
      state.bucketSortingStepIndices[cb]++;
      // Update bucket to current step array
      state.buckets[cb] = steps[state.bucketSortingStepIndices[cb]].slice();
      log(`Sorting bucket ${cb+1}, step ${state.bucketSortingStepIndices[cb]+1} of ${steps.length}`);
      saveHistory();
      return true;
    } else {
      // Current bucket done, move to next bucket
      log(`Bucket ${cb+1} sorted.`);
      state.curSortingBucket++;
      if(state.curSortingBucket >= state.numBuckets) {
        // All buckets sorted, move to concatenation
        state.stage = 4;
        state.concatIndex = 0;
        state.concatenated = [];
        log('All buckets sorted. Starting concatenation.');
        saveHistory();
      }
      return false;
    }
  }

  // Step sorting backward in current or previous buckets
  function bucketSortStepBackward() {
    if(state.stage !== 3) return false;
    let cb = state.curSortingBucket;
    // If currently past last bucket (all done), move back into last bucket sorting state.
    if(cb >= state.numBuckets) {
      state.curSortingBucket = state.numBuckets-1;
      cb = state.curSortingBucket;
      let steps = state.bucketSortingSteps[cb];
      state.bucketSortingStepIndices[cb] = steps.length-1;
      state.buckets[cb] = steps[steps.length-1].slice();
      log(`Back stepped into last bucket ${cb+1}, last sorting step.`);
      saveHistory();
      return true;
    }

    let stepIdx = state.bucketSortingStepIndices[cb];
    if(stepIdx > 0) {
      state.bucketSortingStepIndices[cb]--;
      state.buckets[cb] = state.bucketSortingSteps[cb][state.bucketSortingStepIndices[cb]].slice();
      log(`Back stepped sorting bucket ${cb+1} to step ${state.bucketSortingStepIndices[cb]+1}`);
      saveHistory();
      return true;
    } else if(stepIdx === 0) {
      // Move to previous bucket if any
      if(cb === 0) {
        // No previous bucket; can't step back more in sorting
        return false;
      }
      let prevBucket = cb - 1;
      let steps = state.bucketSortingSteps[prevBucket];
      state.curSortingBucket = prevBucket;
      state.bucketSortingStepIndices[prevBucket] = steps.length - 1;
      state.buckets[prevBucket] = steps[steps.length - 1].slice();
      log(`Back stepped to previous bucket ${prevBucket+1}, last sorting step.`);
      saveHistory();
      return true;
    }
    return false;
  }

  // Step concatenation forward: add one bucket's contents
  function concatenationStepForward() {
    if(state.stage !== 4) return false;
    if(state.concatIndex >= state.numBuckets) {
      // Finish concatenation
      state.stage = 5;
      state.sortedArray = state.concatenated.slice();
      log('Concatenation done. Sorting complete.');
      saveHistory();
      return true;
    }
    // Append this bucket elements to concatenated array (one whole bucket per step)
    state.concatenated = state.concatenated.concat(state.buckets[state.concatIndex]);
    log(`Concatenated bucket ${state.concatIndex+1} with ${state.buckets[state.concatIndex].length} elements.`);
    state.concatIndex++;
    saveHistory();
    return true;
  }

  // Step concatenation backward: remove last concatenated bucket
  function concatenationStepBackward() {
    if(state.stage !== 4) return false;
    if(state.concatIndex === 0) return false;
    state.concatIndex--;
    // Remove last bucket elements from concatenated array
    let b = state.buckets[state.concatIndex];
    if(b.length > 0) {
      state.concatenated.splice(state.concatenated.length - b.length, b.length);
    }
    log(`Removed concatenated bucket ${state.concatIndex+1}`);
    saveHistory();
    return true;
  }

  // Execute one forward step depending on stage
  function stepForward() {
    if(state.stage === 0) {
      log('Please initialize first.');
      return false;
    } else if(state.stage === 1 || state.stage === 2) {
      return distributionStepForward();
    } else if(state.stage === 3) {
      // Try sort step; if current bucket done, automatically try next bucket next step
      return bucketSortStepForward();
    } else if(state.stage === 4) {
      let res = concatenationStepForward();
      if(state.stage === 5) {
        // Auto stop if done
        stopAuto();
      }
      return res;
    } else if(state.stage === 5) {
      log('Sorting already complete.');
      return false;
    }
  }

  // Execute one backward step depending on stage
  function stepBackward() {
    if(state.historyPointer <= 0) return false; // no prev history
    if(state.autoActive) return false;

    // Restore previous state snapshot
    if(state.historyPointer >= 1) {
      state.historyPointer--;
      let prev = state.history[state.historyPointer];
      restoreState(prev);
      log('Stepped backward.');
      updateUI();
      return true;
    }
    return false;
  }

  // Reset step state (not whole), to starting state of distribution or sorting
  function resetSteps() {
    if(state.stage === 0) return;
    if(state.stage === 5) {
      alert('Sort already complete. Please Reset and Initialize again.');
      return;
    }
    // Undo all steps to beginning of stage 1 (buckets created but empty)
    // Reinitialize buckets empty and reset distribution index to zero
    state.buckets = new Array(state.numBuckets).fill(null).map(_=>[]);
    state.distIndex = 0;
    state.stage = 1;
    state.bucketSortingStepIndices = new Array(state.numBuckets).fill(-1);
    state.bucketSortingSteps = new Array(state.numBuckets);
    for(let i=0; i < state.numBuckets; i++) {
      state.bucketSortingSteps[i] = [];
    }
    state.curSortingBucket = 0;
    state.concatenated = [];
    state.concatIndex = 0;
    state.sortedArray = null;
    state.logs = [];
    log('Steps reset. Buckets emptied.');
    saveHistory();
    updateUI();
  }

  // Auto Step functions
  function autoStep() {
    if(!state.autoActive) return;
    let stepDone = stepForward();
    updateUI();
    if(!stepDone) {
      // Stop auto if cannot advance
      stopAuto();
      return;
    }
    state.autoTimer = setTimeout(autoStep, state.autoDelay);
  }
  function startAuto() {
    if(state.autoActive) return;
    state.autoActive = true;
    btnAuto.disabled = true;
    btnPause.disabled = false;
    btnStep.disabled = true;
    btnFastForward.disabled = true;
    btnBackStep.disabled = true;
    autoStep();
  }
  function stopAuto() {
    if(state.autoTimer) {
      clearTimeout(state.autoTimer);
      state.autoTimer = null;
    }
    state.autoActive = false;
    btnAuto.disabled = false;
    btnPause.disabled = true;
    btnStep.disabled = false;
    btnFastForward.disabled = false;
    btnBackStep.disabled = (state.historyPointer <= 0);
  }

  // Fast forward: run until completion or max steps
  function fastForward() {
    if(state.stage === 0 || state.stage === 5) return;
    const maxSteps = 10000; // safety max to prevent infinite loops
    let stepsCount = 0;
    while(state.stage !== 5 && stepsCount < maxSteps) {
      let advanced = stepForward();
      if(!advanced) break;
      stepsCount++;
    }
    if(state.stage === 5) {
      log(`Fast forward done after ${stepsCount} steps.`);
    } else {
      log(`Fast forward stopped after ${stepsCount} steps.`);
    }
    saveHistory();
    updateUI();
  }

  // Rebucket current array with current bucket counts etc, without resetting all state
  function rebucket() {
    if(state.stage === 0) return;
    // Reset buckets empty and redistribute current array values
    // State stage will become 1 to 2 with distIndex=0 after rebucket start
    state.buckets = new Array(state.numBuckets).fill(null).map(_=>[]);
    state.distIndex = 0;
    state.curArray = [].concat(...state.buckets); // empty
    // But curArray should be equal to originalArray now
    // So reset curArray to originalArray
    state.curArray = state.originalArray.slice();
    state.stage = 1;
    state.bucketSortingSteps = new Array(state.numBuckets);
    for(let i=0; i < state.numBuckets; i++) state.bucketSortingSteps[i] = [];
    state.bucketSortingStepIndices = new Array(state.numBuckets).fill(-1);
    state.curSortingBucket = 0;
    state.concatenated = [];
    state.concatIndex = 0;
    state.sortedArray = null;
    state.logs = [];
    log('Rebucketed current array.');
    saveHistory();
    updateUI();
  }

  // Show/hide final sorted array
  let finalArrayVisible = true;
  function toggleFinalArrayDisplay() {
    if(finalArrayVisible) {
      finalSortedArrayPre.style.display = 'none';
      finalArrayVisible = false;
    } else {
      finalSortedArrayPre.style.display = 'block';
      finalArrayVisible = true;
    }
  }

  // --- Event Listeners ---

  btnInitialize.addEventListener('click', function(){
    if(initializeBucketSort()){
      btnStep.disabled = false;
      btnAuto.disabled = false;
      btnFastForward.disabled = false;
      btnBackStep.disabled = true;
      btnResetStep.disabled = false;
    }
  });

  btnReset.addEventListener('click', function(){
    if(state.autoActive) stopAuto();
    state = {
      originalArray: [],
      curArray: [],
      buckets: [],
      numBuckets: 5,
      minVal: 0,
      maxVal: 0,
      bucketRanges: [],
      stage: 0,
      distIndex: 0,
      bucketSortType: 'insertion',
      bucketSortingSteps: [],
      bucketSortingStepIndices: [],
      curSortingBucket: 0,
      concatenated: [],
      concatIndex: 0,
      logs: [],
      sortedArray: null,
      autoTimer: null,
      autoDelay: 500,
      autoActive: false,
      autoForward: true,
      history: [],
      historyPointer: -1,
    };
    inputArrayEl.value = '';
    numBucketsEl.value = '5';
    bucketSortTypeSel.value = 'insertion';
    btnStep.disabled = true;
    btnAuto.disabled = true;
    btnPause.disabled = true;
    btnFastForward.disabled = true;
    btnBackStep.disabled = true;
    btnResetStep.disabled = true;
    btnRebucket.disabled = true;
    controlsForm.style.display = 'none';
    bucketContainer.innerHTML = '';
    statusLine.textContent = '';
    logArea.textContent = '';
    finalOutputSection.style.display = 'none';
  });

  btnStep.addEventListener('click', function(){
    if(state.autoActive) return;
    let changed = stepForward();
    updateUI();
    if(state.stage === 5) {
      // Show final output
      finalSortedArrayPre.textContent = state.sortedArray.join(', ');
      finalOutputSection.style.display = 'block';
    }
  });

  btnBackStep.addEventListener('click', function(){
    if(state.autoActive) return;
    let changed = stepBackward();
    updateUI();
    if(state.stage !== 5) {
      finalOutputSection.style.display = 'none';
    }
  });

  btnResetStep.addEventListener('click', function(){
    if(state.autoActive) return;
    resetSteps();
    updateUI();
    finalOutputSection.style.display = 'none';
  });

  btnAuto.addEventListener('click', function(){
    if(state.stage === 5) return;
    startAuto();
  });

  btnPause.addEventListener('click', function(){
    stopAuto();
    updateUI();
  });

  btnFastForward.addEventListener('click', function(){
    if(state.stage === 5) return;
    fastForward();
  });

  autoDelayRange.addEventListener('input', function(){
    let val = Number(autoDelayRange.value);
    state.autoDelay = val;
    autoDelayValue.textContent = val;
  });

  bucketSortTypeSel.addEventListener('change', function(){
    state.bucketSortType = bucketSortTypeSel.value;
  });

  btnRebucket.addEventListener('click', function(){
    if(state.stage === 0) return;
    rebucket();
    updateUI();
    finalOutputSection.style.display = 'none';
  });

  btnShowSortedArray.addEventListener('click', function(){
    toggleFinalArrayDisplay();
  });

  // Keyboard shortcuts for step and backstep
  document.body.addEventListener('keydown', function(e){
    if(e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if(state.autoActive) return;

    switch(e.key) {
      case 'ArrowRight':
      case ' ':
      case 'Enter':
        e.preventDefault();
        btnStep.click();
        break;
      case 'ArrowLeft':
        e.preventDefault();
        btnBackStep.click();
        break;
      case 'a':
      case 'A':
        e.preventDefault();
        btnAuto.click();
        break;
      case 'p':
      case 'P':
        e.preventDefault();
        btnPause.click();
        break;
      case 'f':
      case 'F':
        e.preventDefault();
        btnFastForward.click();
        break;
      case 'r':
      case 'R':
        e.preventDefault();
        btnResetStep.click();
        break;
    }
  });

  // On load initialize UI states
  updateUI();

})();
</script>
</body>
</html>
