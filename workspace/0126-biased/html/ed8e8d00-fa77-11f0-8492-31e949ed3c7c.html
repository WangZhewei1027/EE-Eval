<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Thread</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            background-color: white;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            margin: 0;
            animation: fadeIn 2s forwards;
        }

        p {
            font-size: 1.2rem;
            color: #666;
            margin-top: 10px;
            animation: fadeIn 2s forwards 0.5s;
        }

        .animation-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .thread {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f953c6 0%, #b91d73 100%);
            position: absolute;
            animation: float 2.5s ease-in-out infinite;
            opacity: 0.7;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .button {
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #FF6B6B;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }

        .button:hover {
            background-color: #FF4C4C;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Visual Thread</h1>
        <p>Observe the beauty of design and interaction.</p>
        <div class="animation-container">
            <div class="thread" style="animation-delay: 0s; top: 20%; left: 25%;"></div>
            <div class="thread" style="animation-delay: 0.5s; top: 40%; left: 50%;"></div>
            <div class="thread" style="animation-delay: 1s; top: 60%; left: 75%;"></div>
            <div class="thread" style="animation-delay: 1.5s; top: 80%; left: 30%;"></div>
            <div class="thread" style="animation-delay: 2s; top: 20%; left: 70%;"></div>
        </div>
        <button class="button" onclick="alert('You are observing beauty!')">Observe</button>
    </div>
    
    <script>
        // Limited JavaScript for a simple interactivity
        document.querySelector('.button').addEventListener('click', function() {
            console.log('Button clicked: Observe');
        });
    </script>
</body>
</html>
