<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Interactive Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .output { margin-top: 20px; }
        .button { cursor: pointer; }
        .input-group { margin-bottom: 10px; }
    </style>
</head>
<body>

<h1>Interactive Git Demo</h1>

<div class="input-group">
    <label for="commitMessage">Commit Message:</label>
    <input type="text" id="commitMessage" />
</div>

<div class="input-group">
    <label for="branchName">Branch Name:</label>
    <input type="text" id="branchName" />
</div>

<button class="button" onclick="createBranch()">Create Branch</button>
<button class="button" onclick="commitChanges()">Commit Changes</button>
<button class="button" onclick="mergeBranches()">Merge Branches</button>
<button class="button" onclick="viewLogs()">View Logs</button>

<div class="output" id="output"></div>

<script>
    const repository = {
        branches: {},
        currentBranch: 'main',
        commitHistory: [],
    };

    function createBranch() {
        const branchName = document.getElementById('branchName').value;
        if (branchName) {
            repository.branches[branchName] = [];
            appendOutput(`Branch '${branchName}' created.`);
        } else {
            appendOutput("Please enter a branch name.");
        }
    }

    function commitChanges() {
        const message = document.getElementById('commitMessage').value;
        if (message) {
            if (!repository.branches[repository.currentBranch]) {
                repository.branches[repository.currentBranch] = [];
            }
            repository.branches[repository.currentBranch].push(message);
            repository.commitHistory.push({ branch: repository.currentBranch, message });
            appendOutput(`Committed to '${repository.currentBranch}': ${message}`);
        } else {
            appendOutput("Please enter a commit message.");
        }
    }

    function mergeBranches() {
        const branchToMerge = document.getElementById('branchName').value;
        if (repository.branches[branchToMerge]) {
            const commits = repository.branches[branchToMerge];
            commits.forEach(commit => {
                repository.branches[repository.currentBranch].push(commit);
                repository.commitHistory.push({ branch: repository.currentBranch, message: commit });
            });
            appendOutput(`Merged branch '${branchToMerge}' into '${repository.currentBranch}'.`);
        } else {
            appendOutput(`Branch '${branchToMerge}' does not exist.`);
        }
    }

    function viewLogs() {
        let logs = "Commit Logs:\n";
        repository.commitHistory.forEach(entry => {
            logs += `${entry.branch}: ${entry.message}\n`;
        });
        appendOutput(logs.replace(/\n/g, '<br/>'));
    }

    function appendOutput(message) {
        const outputDiv = document.getElementById('output');
        outputDiv.innerHTML += message + '<br/>';
    }
</script>

</body>
</html>
