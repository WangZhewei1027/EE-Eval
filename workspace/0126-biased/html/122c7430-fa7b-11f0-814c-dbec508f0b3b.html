<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Pointers</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button-container {
            margin-bottom: 20px;
        }
        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #4CAF50;
            color: #fff;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #3e8e41;
        }
        .input-field {
            padding: 10px;
            margin-bottom: 10px;
        }
        .input-field input {
            padding: 5px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Two Pointers</h1>
        <button class="button" id="start-button">Start</button>
        <button class="button" id="reset-button">Reset</button>
        <div class="button-container">
            <button class="button" id="save-button">Save</button>
            <button class="button" id="load-button">Load</button>
        </div>
        <div class="button-container">
            <button class="button" id="next-button">Next</button>
            <button class="button" id="previous-button">Previous</button>
        </div>
        <div class="input-field">
            <label for="point1">Point 1:</label>
            <input type="number" id="point1" value="0">
            <label for="point2">Point 2:</label>
            <input type="number" id="point2" value="0">
            <button id="add-point-button">Add Point</button>
        </div>
        <div class="input-field">
            <label for="points">Points:</label>
            <input type="number" id="points" value="0">
            <button id="reset-points-button">Reset Points</button>
        </div>
    </div>

    <script>
        let points = 0;
        let currentPoint = 0;
        let pointsArray = [];

        document.getElementById('start-button').addEventListener('click', function() {
            points = parseInt(document.getElementById('point1').value);
            document.getElementById('point1').value = '';
            document.getElementById('point2').value = '';
            document.getElementById('next-button').disabled = false;
            document.getElementById('previous-button').disabled = false;
            document.getElementById('add-point-button').disabled = false;
        });

        document.getElementById('reset-button').addEventListener('click', function() {
            points = 0;
            document.getElementById('point1').value = '0';
            document.getElementById('point2').value = '0';
            document.getElementById('next-button').disabled = true;
            document.getElementById('previous-button').disabled = true;
            document.getElementById('add-point-button').disabled = true;
        });

        document.getElementById('save-button').addEventListener('click', function() {
            pointsArray.push(points);
            document.getElementById('points').value = pointsArray.join(',');
            document.getElementById('reset-points-button').disabled = true;
        });

        document.getElementById('load-button').addEventListener('click', function() {
            let points = document.getElementById('points').value.split(',');
            pointsArray = points.map(Number);
            points = parseInt(points[0]);
            currentPoint = 0;
            document.getElementById('point1').value = pointsArray[0];
            document.getElementById('point2').value = pointsArray[1];
            document.getElementById('next-button').disabled = false;
            document.getElementById('previous-button').disabled = false;
            document.getElementById('add-point-button').disabled = false;
        });

        document.getElementById('next-button').addEventListener('click', function() {
            if (currentPoint < pointsArray.length - 1) {
                currentPoint++;
            } else {
                document.getElementById('next-button').disabled = true;
            }
        });

        document.getElementById('previous-button').addEventListener('click', function() {
            if (currentPoint > 0) {
                currentPoint--;
            } else {
                document.getElementById('previous-button').disabled = true;
            }
        });

        document.getElementById('add-point-button').addEventListener('click', function() {
            points++;
            document.getElementById('point1').value = points;
            document.getElementById('point2').value = points;
            document.getElementById('next-button').disabled = false;
            document.getElementById('previous-button').disabled = false;
            document.getElementById('add-point-button').disabled = false;
        });

        document.getElementById('reset-points-button').addEventListener('click', function() {
            points = 0;
            document.getElementById('point1').value = '0';
            document.getElementById('point2').value = '0';
            document.getElementById('next-button').disabled = true;
            document.getElementById('previous-button').disabled = true;
            document.getElementById('add-point-button').disabled = true;
        });
    </script>
</body>
</html>
