<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Functions Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #47597e, #1e1e2f);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            animation: fadeIn 2s;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            animation: fadeIn 2s 0.5s;
        }
        .hash-container {
            position: relative;
            margin-bottom: 20px;
            overflow: hidden;
            height: 250px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.15);
            animation: zoomIn 2s;
        }
        .hash-output {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            letter-spacing: 2px;
            opacity: 0;
            animation: popIn 1s forwards;
            animation-delay: 2s;
        }
        button {
            background: linear-gradient(90deg, #3b82f6, #9333ea);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 20px;
        }
        button:hover {
            transform: scale(1.05);
            background: linear-gradient(90deg, #9333ea, #3b82f6);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { transform: scale(0.8); }
            to { transform: scale(1); }
        }
        @keyframes popIn {
            0% { opacity: 0; transform: translate(-50%, -80%); }
            100% { opacity: 1; transform: translate(-50%, -50%); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Understanding Hash Functions</h1>
        <p>Watch how data transforms through hash functions to create unique outputs.</p>
        <div class="hash-container">
            <div class="hash-output" id="hashOutput">Hash: 12345abcde</div>
        </div>
        <button id="generateHash">Generate Hash</button>
    </div>
    
    <script>
        document.getElementById('generateHash').addEventListener('click', function() {
            // Example hash - in a real application this would be generated
            const exampleHash = Math.random().toString(36).substring(2, 15);
            document.getElementById('hashOutput').textContent = `Hash: ${exampleHash}`;
        });
    </script>
</body>
</html>
