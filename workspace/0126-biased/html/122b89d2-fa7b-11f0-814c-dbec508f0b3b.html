<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heap Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #output {
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>Heap Sort</h1>
    <button id="sort-button">Heap Sort</button>
    <input id="data-input" type="text" placeholder="Enter numbers separated by spaces">
    <button id="sort-button-2">Heap Sort (2nd pass)</button>
    <button id="sort-button-3">Heap Sort (3rd pass)</button>
    <button id="sort-button-4">Heap Sort (4th pass)</button>
    <button id="sort-button-5">Heap Sort (5th pass)</button>
    <div id="output"></div>
    <script>
        let data = [];
        let sortButton = document.getElementById('sort-button');
        let dataInput = document.getElementById('data-input');
        let sortButton2 = document.getElementById('sort-button-2');
        let sortButton3 = document.getElementById('sort-button-3');
        let sortButton4 = document.getElementById('sort-button-4');
        let sortButton5 = document.getElementById('sort-button-5');
        let outputDiv = document.getElementById('output');

        sortButton.addEventListener('click', sortHeap);
        dataInput.addEventListener('input', updateData);

        function sortHeap() {
            data = dataInput.value.split(' ').map(Number);
            outputDiv.innerHTML = '';

            for (let i = 0; i < data.length; i++) {
                outputDiv.innerHTML += `${data[i]} `;
            }

            heapify(data, 0);
            heapSort(data, 0, data.length - 1);
        }

        function heapify(data, n, i) {
            let largest = i;
            let left = 2 * i + 1;
            let right = 2 * i + 2;

            if (left < n && data[i] < data[left]) {
                largest = left;
            }

            if (right < n && data[largest] < data[right]) {
                largest = right;
            }

            if (largest !== i) {
                swap(data, i, largest);
                heapify(data, n, largest);
            }
        }

        function heapSort(data, n, k) {
            if (k < 0 || n === 0) return;

            for (let i = n - 1; i > k; i--) {
                swap(data, i, i - 1);
                heapify(data, i, i - 1);
            }
        }

        function swap(data, i, j) {
            let temp = data[i];
            data[i] = data[j];
            data[j] = temp;
        }

        function updateData() {
            dataInput.value = data.map(x => x.toString());
        }
    </script>
</body>
</html>
