<!DOCTYPE html>
<html>
<head>
    <title>Interactive Trie Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .control-group {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }
        .trie-container {
            border: 1px solid #000;
            padding: 20px;
            min-height: 300px;
            position: relative;
        }
        .node {
            display: inline-block;
            margin: 1px;
            padding: 5px;
            border: 1px solid #000;
            position: relative;
        }
        .node-end {
            background-color: #f0f0f0;
        }
        .children {
            margin-left: 20px;
            display: flex;
            flex-wrap: wrap;
        }
        .node {
            display: inline-block;
            margin: 0 5px;
        }
        .highlight {
            border: 2px solid red;
        }
        .search-results {
            margin-top: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interactive Trie Visualization</h1>
        
        <div class="controls">
            <div class="control-group">
                <h3>Trie Operations</h3>
                <input type="text" id="wordInput" placeholder="Enter word">
                <button onclick="insertWord()">Insert Word</button>
                <button onclick="deleteWord()">Delete Word</button>
                <button onclick="searchWord()">Search Word</button>
                <button onclick="clearTrie()">Clear Trie</button>
            </div>
            
            <div class="control-group">
                <h3>Bulk Operations</h3>
                <textarea id="bulkWords" placeholder="Enter multiple words, one per line"></textarea>
                <button onclick="insertBulkWords()">Insert All</button>
                <button onclick="deleteBulkWords()">Delete All</button>
            </div>
            
            <div class="control-group">
                <h3>Auto-generation</h3>
                <input type="number" id="wordCount" min="1" max="20" value="5">
                <button onclick="generateRandomWords()">Generate Random Words</button>
                <div>
                    <label>
                        <input type="checkbox" id="autoInsert" checked>
                        Auto-insert generated words
                    </label>
                </div>
            </div>
            
            <div class="control-group">
                <h3>Visualization Options</h3>
                <label>
                    <input type="checkbox" id="showCharLabels" checked>
                    Show character labels
                </label>
                <label>
                    <input type="checkbox" id="showEndMarkers" checked>
                    Show end-of-word markers
                </label>
                <label>
                    <input type="checkbox" id="compactView">
                    Compact view
                </label>
            </div>
            
            <div class="control-group">
                <h3>Prefix Operations</h3>
                <input type="text" id="prefixInput" placeholder="Enter prefix">
                <button onclick="findAllWithPrefix()">Find Words with Prefix</button>
                <button onclick="deletePrefix()">Delete Prefix</button>
                <div id="prefixResults" class="search-results"></div>
            </div>
        </div>
        
        <div class="trie-container" id="trieVisualization">
            <p>Trie will be visualized here</p>
        </div>
        
        <div class="operation-log" id="operationLog">
            <h3>Operation Log</h3>
            <div id="logContent"></div>
        </div>
    </div>

    <script>
        class TrieNode {
            constructor() {
                this.children = {};
                this.isEndOfWord = false;
            }
        }

        class Trie {
            constructor() {
                this.root = new TrieNode();
            }
            
            insert(word) {
                let node = this.root;
                for (const char of word) {
                    if (!node.children[char]) {
                        node.children[char] = new TrieNode();
                    }
                    node = node.children[char];
                }
                node.isEndOfWord = true;
            }
            
            search(word) {
                let node = this.root;
                for (const char of word) {
                    if (!node.children[char]) {
                        return false;
                    }
                    node = node.children[char];
                }
                return node.isEndOfWord;
            }
            
            startsWith(prefix) {
                let node = this.root;
                for (const char of prefix) {
                    if (!node.children[char]) {
                        return false;
                    }
                    node = node.children[char];
                }
                return true;
            }
            
            delete(word) {
                this._delete(this.root, word, 0);
            }
            
            _delete(node, word, index) {
                if (index === word.length) {
                    if (!node.isEndOfWord) {
                        return false;
                    }
                    node.isEndOfWord = false;
                    return Object.keys(node.children).length === 0;
                }
                
                const char = word[index];
                if (!node.children[char]) {
                    return false;
                }
                
                const shouldDeleteChild = this._delete(node.children[char], word, index + 1);
                
                if (shouldDeleteChild) {
                    delete node.children[char];
                    return Object.keys(node.children).length === 0 && !node.isEndOfWord;
                }
                
                return false;
            }
            
            getAllWords() {
                const words = [];
                this._getAllWords(this.root, '', words);
                return words;
            }
            
            _getAllWords(node, currentWord, words) {
                if (node.isEndOfWord) {
                    words.push(currentWord);
                }
                
                for (const [char, childNode] of Object.entries(node.children)) {
                    this._getAllWords(childNode, currentWord + char, words);
                }
            }
            
            getWordsWithPrefix(prefix) {
                let node = this.root;
                for (const char of prefix) {
                    if (!node.children[char]) {
                        return [];
                    }
                    node = node.children[char];
                }
                
                const words = [];
                this._getAllWords(node, prefix, words);
                return words;
            }
            
            deletePrefix(prefix) {
                if (prefix === '') return false;
                
                let node = this.root;
                const path = [node];
                
                for (const char of prefix) {
                    if (!node.children[char]) {
                        return false;
                    }
                    node = node.children[char];
                    path.push(node);
                }
                
                // Delete the entire subtree
                const firstChar = prefix[0];
                if (path.length === 1) {
                    delete this.root.children[firstChar];
                } else {
                    const parent = path[path.length - 2];
                    delete parent.children[prefix[prefix.length - 1]];
                }
                
                return true;
            }
        }

        const trie = new Trie();
        let highlightedNodes = [];
        
        function renderTrie() {
            const container = document.getElementById('trieVisualization');
            container.innerHTML = '';
            
            const showCharLabels = document.getElementById('showCharLabels').checked;
            const showEndMarkers = document.getElementById('showEndMarkers').checked;
            const compactView = document.getElementById('compactView').checked;
            
            function renderNode(node, currentPath = '') {
                const nodeElement = document.createElement('div');
                nodeElement.className = 'node';
                
                if (node.isEndOfWord && showEndMarkers) {
                    nodeElement.classList.add('node-end');
                }
                
                if (highlightedNodes.includes(currentPath)) {
                    nodeElement.classList.add('highlight');
                }
                
                if (showCharLabels && currentPath) {
                    const charLabel = document.createElement('div');
                    charLabel.className = 'node-char';
                    charLabel.textContent = currentPath.slice(-1);
                    nodeElement.appendChild(charLabel);
                }
                
                if (!compactView && Object.keys(node.children).length > 0) {
                    const childrenContainer = document.createElement('div');
                    childrenContainer.className = 'children';
                    
                    for (const [char, childNode] of Object.entries(node.children)) {
                        childrenContainer.appendChild(renderNode(childNode, currentPath + char));
                    }
                    
                    nodeElement.appendChild(childrenContainer);
                }
                
                return nodeElement;
            }
            
            container.appendChild(renderNode(trie.root));
            
            if (compactView) {
                const words = trie.getAllWords();
                const wordsContainer = document.createElement('div');
                wordsContainer.className = 'words-list';
                
                words.forEach(word => {
                    const wordElement = document.createElement('div');
                    wordElement.className = 'word';
                    wordElement.textContent = word;
                    if (highlightedNodes.includes(word)) {
                        wordElement.classList.add('highlight');
                    }
                    wordsContainer.appendChild(wordElement);
                });
                
                container.appendChild(wordsContainer);
            }
        }
        
        function logOperation(message) {
            const logContent = document.getElementById('logContent');
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContent.prepend(entry);
        }
        
        function insertWord() {
            const word = document.getElementById('wordInput').value.trim();
            if (!word) return;
            
            trie.insert(word);
            logOperation(`Inserted word: "${word}"`);
            renderTrie();
        }
        
        function deleteWord() {
            const word = document.getElementById('wordInput').value.trim();
            if (!word) return;
            
            if (trie.search(word)) {
                trie.delete(word);
                logOperation(`Deleted word: "${word}"`);
            } else {
                logOperation(`Word not found: "${word}"`);
            }
            renderTrie();
        }
        
        function searchWord() {
            const word = document.getElementById('wordInput').value.trim();
            if (!word) return;
            
            highlightedNodes = [];
            let node = trie.root;
            let currentPath = '';
            
            for (const char of word) {
                if (!node.children[char]) {
                    logOperation(`Search failed for: "${word}" (stopped at "${currentPath}")`);
                    renderTrie();
                    return;
                }
                currentPath += char;
                highlightedNodes.push(currentPath);
                node = node.children[char];
            }
            
            if (node.isEndOfWord) {
                logOperation(`Found word: "${word}"`);
                highlightedNodes.push(word);
            } else {
                logOperation(`Prefix found but not complete word: "${word}"`);
            }
            
            renderTrie();
        }
        
        function clearTrie() {
            trie.root = new TrieNode();
            highlightedNodes = [];
            logOperation('Cleared entire trie');
            renderTrie();
        }
        
        function insertBulkWords() {
            const bulkText = document.getElementById('bulkWords').value.trim();
            if (!bulkText) return;
            
            const words = bulkText.split('\n').map(w => w.trim()).filter(w => w);
            words.forEach(word => trie.insert(word));
            
            logOperation(`Inserted ${words.length} words from bulk input`);
            renderTrie();
        }
        
        function deleteBulkWords() {
            const bulkText = document.getElementById('bulkWords').value.trim();
            if (!bulkText) return;
            
            const words = bulkText.split('\n').map(w => w.trim()).filter(w => w);
            let deletedCount = 0;
            
            words.forEach(word => {
                if (trie.search(word)) {
                    trie.delete(word);
                    deletedCount++;
                }
            });
            
            logOperation(`Deleted ${deletedCount} words from bulk input`);
            renderTrie();
        }
        
        function generateRandomWords() {
            const count = parseInt(document.getElementById('wordCount').value) || 5;
            const words = [];
            const chars = 'abcdefghijklmnopqrstuvwxyz';
            
            for (let i = 0; i < count; i++) {
                const length = Math.floor(Math.random() * 5) + 3;
                let word = '';
                for (let j = 0; j < length; j++) {
                    word += chars[Math.floor(Math.random() * chars.length)];
                }
                words.push(word);
            }
            
            document.getElementById('bulkWords').value = words.join('\n');
            if (document.getElementById('autoInsert').checked) {
                insertBulkWords();
            } else {
                logOperation(`Generated ${count} random words`);
            }
        }
        
        function findAllWithPrefix() {
            const prefix = document.getElementById('prefixInput').value.trim();
            if (!prefix) return;
            
            const words = trie.getWordsWithPrefix(prefix);
            const resultsDiv = document.getElementById('prefixResults');
            resultsDiv.innerHTML = '';
            
            if (words.length > 0) {
                resultsDiv.textContent = `Words with prefix "${prefix}": ${words.join(', ')}`;
                logOperation(`Found ${words.length} words with prefix "${prefix}"`);
                
                // Highlight the prefix path
                highlightedNodes = [];
                let node = trie.root;
                let currentPath = '';
                
                for (const char of prefix) {
                    if (!node.children[char]) break;
                    currentPath += char;
                    highlightedNodes.push(currentPath);
                    node = node.children[char];
                }
            } else {
                resultsDiv.textContent = `No words found with prefix "${prefix}"`;
                logOperation(`No words found with prefix "${prefix}"`);
            }
            
            renderTrie();
        }
        
        function deletePrefix() {
            const prefix = document.getElementById('prefixInput').value.trim();
            if (!prefix) return;
            
            if (trie.deletePrefix(prefix)) {
                logOperation(`Deleted all words starting with prefix: "${prefix}"`);
            } else {
                logOperation(`No words found with prefix: "${prefix}"`);
            }
            
            document.getElementById('prefixResults').textContent = '';
            renderTrie();
        }
        
        // Initialize with some sample words
        trie.insert('apple');
        trie.insert('app');
        trie.insert('application');
        trie.insert('banana');
        trie.insert('band');
        trie.insert('bandana');
        trie.insert('cat');
        trie.insert('category');
        trie.insert('dog');
        renderTrie();
        logOperation('Initialized with sample words');
        
        // Set up event handlers for visualization options
        document.getElementById('showCharLabels').addEventListener('change', renderTrie);
        document.getElementById('showEndMarkers').addEventListener('change', renderTrie);
        document.getElementById('compactView').addEventListener('change', renderTrie);
    </script>
</body>
</html>
