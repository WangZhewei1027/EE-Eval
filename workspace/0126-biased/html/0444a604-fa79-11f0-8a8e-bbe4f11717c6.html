<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Typing</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        .button {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .button:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dynamic Typing</h1>
            <p>Experience the magic of dynamic typing</p>
        </div>
        <div class="button-container">
            <button class="button" onclick="alert('You clicked me!')">Click Me!</button>
        </div>
    </div>

    <script>
        let typedText = '';
        let timer = 0;

        function startTyping() {
            typedText = document.getElementById('typedText').value;
            let timerId = setInterval(() => {
                if (typedText.length === 0) {
                    clearInterval(timerId);
                } else {
                    document.getElementById('typedText').value = typedText.substring(0, typedText.length - 1);
                }
            }, 100);
        }

        document.getElementById('typedText').addEventListener('input', startTyping);
    </script>
</body>
</html>
