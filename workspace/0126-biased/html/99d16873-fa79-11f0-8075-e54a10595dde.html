<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Functions Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #output {
            margin-top: 20px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h1>Hash Functions Interactive Demo</h1>

<div>
    <label for="inputText">Input Text:</label>
    <input type="text" id="inputText" value="Hello World">
</div>

<div>
    <label for="hashFunction">Select Hash Function:</label>
    <select id="hashFunction">
        <option value="md5">MD5</option>
        <option value="sha256">SHA-256</option>
        <option value="sha512">SHA-512</option>
    </select>
</div>

<div>
    <label for="customSalt">Custom Salt:</label>
    <input type="text" id="customSalt" placeholder="Optional Salt">
</div>

<div>
    <button id="computeHash">Compute Hash</button>
</div>

<div id="output">
    <strong>Output:</strong>
    <div id="hashOutput"></div>
    <div id="hashLength"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.9-1/crypto-js.js"></script>
<script>
    document.getElementById('computeHash').addEventListener('click', function() {
        const inputText = document.getElementById('inputText').value;
        const hashFunction = document.getElementById('hashFunction').value;
        const customSalt = document.getElementById('customSalt').value;
        let hash;

        if (customSalt) {
            inputText += customSalt;
        }

        switch (hashFunction) {
            case 'md5':
                hash = CryptoJS.MD5(inputText).toString();
                break;
            case 'sha256':
                hash = CryptoJS.SHA256(inputText).toString();
                break;
            case 'sha512':
                hash = CryptoJS.SHA512(inputText).toString();
                break;
            default:
                hash = 'Invalid hash function';
        }

        document.getElementById('hashOutput').innerText = hash;
        document.getElementById('hashLength').innerText = 'Length: ' + hash.length;
    });

    // Enable deep exploration with additional inputs
    const explorationDiv = document.createElement('div');
    document.body.appendChild(explorationDiv);

    function addDynamicInput() {
        const wrapper = document.createElement('div');
        const input = document.createElement('input');
        const button = document.createElement('button');
        button.textContent = 'Compute with this Input';
        
        button.addEventListener('click', function() {
            const customInputText = input.value;
            const hashFunction = document.getElementById('hashFunction').value;
            let hash;

            switch (hashFunction) {
                case 'md5':
                    hash = CryptoJS.MD5(customInputText).toString();
                    break;
                case 'sha256':
                    hash = CryptoJS.SHA256(customInputText).toString();
                    break;
                case 'sha512':
                    hash = CryptoJS.SHA512(customInputText).toString();
                    break;
            }

            const output = document.createElement('div');
            output.innerText = `Hash of "${customInputText}": ${hash} (Length: ${hash.length})`;
            wrapper.appendChild(output);
        });

        wrapper.appendChild(input);
        wrapper.appendChild(button);
        explorationDiv.appendChild(wrapper);
    }

    for (let i = 0; i < 3; i++) {
        addDynamicInput();
    }
</script>

</body>
</html>
