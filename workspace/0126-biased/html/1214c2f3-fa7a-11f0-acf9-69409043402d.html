<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dynamic Programming Interactive Demo</title>
<style>
  body {
    font-family: monospace, monospace;
  }
  #output {
    white-space: pre-wrap;
    border: 1px solid black;
    padding: 8px;
    height: 200px;
    overflow-y: scroll;
    margin-bottom: 1em;
  }
  label, button {
    display: block;
    margin-top: 0.5em;
  }
  input[type=number] {
    width: 5em;
  }
  select {
    width: 15em;
  }
</style>
</head>
<body>
<h1>Dynamic Programming Interactive Demo</h1>

<div>
  <label for="problem">Select a DP Problem:</label>
  <select id="problem">
    <option value="fib">Fibonacci Sequence</option>
    <option value="knapsack">0/1 Knapsack Problem</option>
    <option value="lcs">Longest Common Subsequence</option>
    <option value="coinchange">Coin Change (Min Coins)</option>
    <option value="editdistance">Edit Distance</option>
  </select>
</div>

<div id="inputs-area"></div>

<button id="reset">Reset Inputs</button>
<button id="run">Run / Step Execute</button>
<button id="autoRun">Auto Run Complete</button>
<button id="prevStep" disabled>Previous Step</button>
<button id="nextStep" disabled>Next Step</button>

<div>
  <label>
    Step Delay (ms) for Auto Run:
    <input type="number" id="stepDelay" value="500" min="50" max="5000" step="50" />
  </label>
</div>

<hr />

<div><b>State / Memo Table:</b></div>
<div id="tableOutput" style="font-family: monospace; white-space: pre;"></div>

<hr />

<div><b>Trace / Explanation:</b></div>
<div id="output"></div>

<script>
(() => {
  // Core: We'll implement 5 classic DP problems with full state step-by-step interactive solving.
  // Supported Problems:
  // fib: Fibonacci sequence (basic 1-d array)
  // knapsack: 0/1 Knapsack problem
  // lcs: Longest Common Subsequence
  // coinchange: Minimum number of coins for change
  // editdistance: Edit distance between two strings

  // UI Elements
  const problemSelect = document.getElementById("problem");
  const inputsArea = document.getElementById("inputs-area");
  const resetBtn = document.getElementById("reset");
  const runBtn = document.getElementById("run");
  const autoRunBtn = document.getElementById("autoRun");
  const prevStepBtn = document.getElementById("prevStep");
  const nextStepBtn = document.getElementById("nextStep");
  const outputDiv = document.getElementById("output");
  const tableOutput = document.getElementById("tableOutput");
  const stepDelayInp = document.getElementById("stepDelay");

  // Global state
  let currentProblem = null;
  let currentInputs = {};
  let solver = null;
  let steps = [];
  let stepIndex = -1;
  let autoRunning = false;
  let autoIntervalID = null;

  // UTILITIES
  function clearOutput() {
    outputDiv.textContent = "";
    tableOutput.textContent = "";
  }

  function printOutput(text) {
    outputDiv.textContent += text + "\n";
    outputDiv.scrollTop = outputDiv.scrollHeight;
  }

  function printTable(text) {
    tableOutput.textContent = text;
  }

  // Base class for problems
  class DPProblem {
    constructor(inputs) {
      this.inputs = inputs;
      this.steps = [];
      this.stepIndex = -1;
    }
    // Advance one step forward, returns false if no more steps
    stepForward() { return false; }
    // Step backward one step, optional (to support prevStep)
    stepBackward() { return false; }
    // Reset state and prepare steps for a fresh start
    reset() {}
    // Provide ASCII representation of memo/state table(s)
    renderTable() { return ""; }
    // Provide explanation / trace for current stepIndex
    renderExplanation() { return ""; }
  }


  // PROBLEM 1: Fibonacci (bottom-up)
  class FibProblem extends DPProblem {
    constructor(inputs) {
      super(inputs);
      this.n = inputs.n;
      this.dp = Array(this.n+1).fill(null);
      this.stepIndex = -1;
      this.stateHistory = [];
      this.reset();
    }
    reset() {
      this.dp = Array(this.n+1).fill(null);
      this.dp[0] = 0;
      if(this.n>=1) this.dp[1] = 1;
      this.stepIndex = 1; // starting from i=2
      this.stateHistory = [{
        dp: this.dp.slice(),
        i: 1,
        explanation: "Initialized dp[0]=0, dp[1]=1"
      }];
    }
    stepForward() {
      if(this.stepIndex >= this.n) return false;
      let i = this.stepIndex+1;
      // dp[i] = dp[i-1] + dp[i-2]
      this.dp[i] = this.dp[i-1] + this.dp[i-2];
      this.stepIndex++;
      this.stateHistory.push({
        dp: this.dp.slice(),
        i,
        explanation: `Computed dp[${i}] = dp[${i-1}] + dp[${i-2}] = ${this.dp[i-1]} + ${this.dp[i-2]} = ${this.dp[i]}`
      });
      return true;
    }
    stepBackward() {
      if(this.stepIndex <= 1) return false;
      this.stepIndex--;
      this.stateHistory.pop();
      this.dp = this.stateHistory[this.stateHistory.length -1].dp.slice();
      return true;
    }
    renderTable() {
      let s = "Index i: ";
      for(let i=0; i<=this.n; i++) s += i.toString().padStart(4," ") + " ";
      s += "\ndp[i] : ";
      for(let i=0; i<=this.n; i++) {
        let val = this.dp[i];
        s += (val===null?"  .":val.toString().padStart(4," ")) + " ";
      }
      return s;
    }
    renderExplanation() {
      if(this.stepIndex < 0) return "";
      return `Step ${this.stepIndex}: ` + this.stateHistory[this.stepIndex].explanation + "\n" +
        `Current dp array state:\n${this.renderTable()}`;
    }
  }

  // PROBLEM 2: 0/1 Knapsack (bottom-up tabulation)
  class KnapsackProblem extends DPProblem {
    // inputs: weights[], values[], capacity (integer)
    constructor(inputs) {
      super(inputs);
      this.weights = inputs.weights.slice();
      this.values = inputs.values.slice();
      this.capacity = inputs.capacity;
      this.n = this.weights.length;
      // dp[i][w] = max value for first i items with max weight w
      this.dp = [];
      this.i = 0;
      this.w = -1;
      this.history = [];
      this.reset();
    }
    reset() {
      // initialize dp with zeros
      this.dp = Array(this.n+1);
      for(let i=0; i<=this.n; i++) {
        this.dp[i] = Array(this.capacity+1).fill(0);
      }
      this.i = 0;
      this.w = 0;
      this.history = [];
      this.history.push(this._recordState("Initialized dp table with zeros"));
    }
    _recordState(note, chosen=null) {
      // chosen: true/false if item i chosen for current cell
      return {
        dp: this.dp.map(row => row.slice()),
        i: this.i,
        w: this.w,
        note,
        chosen
      };
    }
    stepForward() {
      // Move through dp[i][w] row-major order (i:1..n, w:0..capacity)
      if(this.i > this.n) return false;
      this.w++;
      if(this.w > this.capacity) {
        this.i++;
        this.w = 0;
      }
      if(this.i > this.n) return false;

      let i = this.i;
      let w = this.w;
      let wi = (i>0 ? this.weights[i-1] : 0);
      let vi = (i>0 ? this.values[i-1] : 0);

      if(i === 0) {
        // dp[0][w]=0 always
        this.dp[i][w] = 0;
        this.history.push(this._recordState(`dp[0][${w}] set to 0 (no items)`));
      } else {
        if(wi > w) {
          this.dp[i][w] = this.dp[i-1][w];
          this.history.push(this._recordState(
            `Weight of item ${i} (${wi}) > current capacity ${w}; dp[${i}][${w}] = dp[${i-1}][${w}] = ${this.dp[i][w]}`,
            false));
        } else {
          // pick max of excluding or including item
          let exclude = this.dp[i-1][w];
          let include = this.dp[i-1][w - wi] + vi;
          if(include > exclude) {
            this.dp[i][w] = include;
            this.history.push(this._recordState(
              `Include item ${i} (weight ${wi}, value ${vi}): dp[${i}][${w}] = max(${exclude}, ${include}) = ${include}`,
              true));
          } else {
            this.dp[i][w] = exclude;
            this.history.push(this._recordState(
              `Exclude item ${i}: dp[${i}][${w}] = max(${exclude}, ${include}) = ${exclude}`,
              false));
          }
        }
      }
      return true;
    }
    stepBackward() {
      // undo last step if possible
      if(this.history.length <= 1) return false;
      this.history.pop();
      let lastState = this.history[this.history.length -1];
      this.dp = lastState.dp.map(row => row.slice());
      this.i = lastState.i;
      this.w = lastState.w;
      return true;
    }
    renderTable() {
      // print dp table for i=0..n, w=0..capacity
      let header = "w:     ";
      for(let w=0; w<=this.capacity; w++) header += w.toString().padStart(4," ") + " ";
      let lines = [header];
      for(let i=0; i<=this.n; i++) {
        let row = (i===0 ? "0(Itm)" : i.toString().padStart(3," ") + `(W=${this.weights[i-1]||"-"})`) + ": ";
        for(let w=0; w<=this.capacity; w++) {
          row += this.dp[i][w].toString().padStart(4," ") + " ";
        }
        lines.push(row);
      }
      return lines.join("\n");
    }
    renderExplanation() {
      let st = this.history[this.history.length-1];
      if(!st) return "";
      let chosenStr = st.chosen === true ? "Item chosen" : (st.chosen === false ? "Item excluded" : "");
      return `Step [i=${st.i}, w=${st.w}]:\n${st.note}\n${chosenStr}\n\nTable snippet:\n${this.renderTable()}`;
    }
  }

  // PROBLEM 3: Longest Common Subsequence (bottom-up)
  class LCSProblem extends DPProblem {
    // inputs: string s1, string s2
    constructor(inputs) {
      super(inputs);
      this.s1 = inputs.s1;
      this.s2 = inputs.s2;
      this.m = this.s1.length;
      this.n = this.s2.length;
      this.dp = [];
      this.i = 0;
      this.j = -1;
      this.history = [];
      this.reset();
    }
    reset() {
      // dp[i][j] = length of LCS of s1[0..i-1], s2[0..j-1]
      this.dp = Array(this.m+1);
      for(let i=0; i<=this.m; i++) {
        this.dp[i] = Array(this.n+1).fill(0);
      }
      this.i = 0;
      this.j = 0;
      this.history = [];
      this.history.push(this._recordState("Initialized dp table with zeros"));
    }
    _recordState(note, matched=null) {
      return {
        dp: this.dp.map(row => row.slice()),
        i: this.i,
        j: this.j,
        note,
        matched
      };
    }
    stepForward() {
      if(this.i > this.m) return false;
      this.j++;
      if(this.j > this.n) {
        this.i++;
        this.j = 0;
      }
      if(this.i > this.m) return false;
      if(this.i === 0 || this.j === 0) {
        this.dp[this.i][this.j] = 0;
        this.history.push(this._recordState(`dp[${this.i}][${this.j}] = 0 (base case)`));
      } else {
        if(this.s1[this.i-1] === this.s2[this.j-1]) {
          this.dp[this.i][this.j] = this.dp[this.i-1][this.j-1] + 1;
          this.history.push(this._recordState(
            `s1[${this.i-1}] == s2[${this.j-1}] ('${this.s1[this.i-1]}') --> dp[${this.i}][${this.j}] = dp[${this.i-1}][${this.j-1}] + 1 = ${this.dp[this.i-1][this.j-1]} + 1 = ${this.dp[this.i][this.j]}`, true));
        } else {
          this.dp[this.i][this.j] = Math.max(this.dp[this.i-1][this.j], this.dp[this.i][this.j-1]);
          this.history.push(this._recordState(
            `s1[${this.i-1}] != s2[${this.j-1}] ('${this.s1[this.i-1]}' vs '${this.s2[this.j-1]}') --> dp[${this.i}][${this.j}] = max(dp[${this.i-1}][${this.j}] = ${this.dp[this.i-1][this.j]}, dp[${this.i}][${this.j-1}] = ${this.dp[this.i][this.j-1]}) = ${this.dp[this.i][this.j]}`, false));
        }
      }
      return true;
    }
    stepBackward() {
      if(this.history.length <= 1) return false;
      this.history.pop();
      let st = this.history[this.history.length -1];
      this.dp = st.dp.map(row => row.slice());
      this.i = st.i;
      this.j = st.j;
      return true;
    }
    renderTable() {
      let header = "j→  ";
      for(let j=0; j<=this.n; j++) header += j.toString().padStart(4," ") +" ";
      let lines = [header];
      for(let i=0; i<=this.m; i++) {
        let row = (i===0 ? "0(i)" : i.toString().padStart(3," ") + "(i)") + ": ";
        for(let j=0; j<=this.n; j++) {
          row += this.dp[i][j].toString().padStart(4," ") + " ";
        }
        lines.push(row);
      }
      return lines.join("\n");
    }
    renderExplanation() {
      let st = this.history[this.history.length-1];
      if(!st) return "";
      return `Step at dp[${st.i}][${st.j}]:\n${st.note}\n\nTable:\n${this.renderTable()}`;
    }
  }

  // PROBLEM 4: Coin Change (minimum number of coins)
  class CoinChangeProblem extends DPProblem {
    // inputs: coins[], amount
    constructor(inputs) {
      super(inputs);
      this.coins = inputs.coins.slice();
      this.amount = inputs.amount;
      this.dp = [];
      this.i = 0;
      this.j = -1;
      this.history = [];
      this.reset();
    }
    reset() {
      this.dp = Array(this.coins.length + 1);
      for(let i=0; i<=this.coins.length; i++) {
        this.dp[i] = Array(this.amount+1).fill(Infinity);
      }
      // base case dp[0][0]=0, no coins needed to make amount=0
      for(let i=0; i<=this.coins.length; i++) {
        this.dp[i][0] = 0;
      }
      this.i = 0;
      this.j = 0;
      this.history = [];
      this.history.push(this._recordState("Initialized dp table; dp[i][0]=0"));
    }
    _recordState(note, coinUsed=null) {
      return {
        dp: this.dp.map(row => row.slice()),
        i: this.i,
        j: this.j,
        note,
        coinUsed
      };
    }
    stepForward() {
      if(this.i > this.coins.length) return false;
      this.j++;
      if(this.j > this.amount) {
        this.i++;
        this.j = 0;
      }
      if(this.i > this.coins.length) return false;

      if(this.j === 0) {
        this.dp[this.i][this.j] = 0;
        this.history.push(this._recordState(`dp[${this.i}][0] = 0 (amount zero)`));
      } else if(this.i === 0) {
        // no coins to use, amount>0 no solution
        this.dp[this.i][this.j] = Infinity;
        this.history.push(this._recordState(`dp[0][${this.j}] = ∞ (no coins)`));
      } else {
        let coin = this.coins[this.i-1];
        if(coin > this.j) {
          this.dp[this.i][this.j] = this.dp[this.i-1][this.j];
          this.history.push(this._recordState(
            `Coin (${coin}) > current amount (${this.j}), dp[${this.i}][${this.j}] = dp[${this.i-1}][${this.j}] = ${this.dp[this.i][this.j]}`, false));
        } else {
          let exclude = this.dp[this.i-1][this.j];
          let include = this.dp[this.i][this.j - coin] + 1;
          if(include < exclude) {
            this.dp[this.i][this.j] = include;
            this.history.push(this._recordState(
              `Include coin ${coin}: dp[${this.i}][${this.j}] = min(${exclude}, ${include}) = ${include}`, true));
          } else {
            this.dp[this.i][this.j] = exclude;
            this.history.push(this._recordState(
              `Exclude coin ${coin}: dp[${this.i}][${this.j}] = min(${exclude}, ${include}) = ${exclude}`, false));
          }
        }
      }
      return true;
    }
    stepBackward() {
      if(this.history.length <= 1) return false;
      this.history.pop();
      let st = this.history[this.history.length-1];
      this.dp = st.dp.map(row => row.slice());
      this.i = st.i;
      this.j = st.j;
      return true;
    }
    renderTable() {
      let header = "amt→  ";
      for(let a=0; a<=this.amount; a++) {
        header += a.toString().padStart(4," ") + " ";
      }
      let lines = [header];
      for(let i=0; i<=this.coins.length; i++) {
        let row = (i===0 ? "0(coins)" : i.toString().padStart(3," ") + "(c" + this.coins[i-1] + ")") + ": ";
        for(let a=0; a<=this.amount; a++) {
          let val = this.dp[i][a];
          row += (val === Infinity ? "  ∞" : val.toString().padStart(4," ")) + " ";
        }
        lines.push(row);
      }
      return lines.join("\n");
    }
    renderExplanation() {
      let st = this.history[this.history.length-1];
      if(!st) return "";
      let coinUsed = st.coinUsed === true ? "Coin included" : (st.coinUsed === false ? "Coin excluded" : "");
      return `Step [i=${st.i}, amount=${st.j}]:\n${st.note}\n${coinUsed}\n\nTable snippet:\n${this.renderTable()}`;
    }
  }

  // PROBLEM 5: Edit Distance (Levenshtein distance)
  class EditDistanceProblem extends DPProblem {
    // inputs: string s1, string s2
    constructor(inputs) {
      super(inputs);
      this.s1 = inputs.s1;
      this.s2 = inputs.s2;
      this.m = this.s1.length;
      this.n = this.s2.length;
      this.dp = [];
      this.i = 0;
      this.j = -1;
      this.history = [];
      this.reset();
    }
    reset() {
      // dp[i][j] = minimal edit operations to convert s1[0..i-1] to s2[0..j-1]
      this.dp = Array(this.m+1);
      for(let i=0; i<=this.m; i++) {
        this.dp[i] = Array(this.n+1).fill(0);
      }
      for(let i=0; i<=this.m; i++) this.dp[i][0] = i;
      for(let j=0; j<=this.n; j++) this.dp[0][j] = j;
      this.i = 0;
      this.j = 0;
      this.history = [];
      this.history.push(this._recordState("Initialized dp table for base cases"));
    }
    _recordState(note, operation=null) {
      return {
        dp: this.dp.map(row => row.slice()),
        i: this.i,
        j: this.j,
        note,
        operation
      };
    }
    stepForward() {
      if(this.i > this.m) return false;
      this.j++;
      if(this.j > this.n) {
        this.i++;
        this.j = 0;
      }
      if(this.i > this.m) return false;

      if(this.i === 0) {
        // First row
        this.dp[this.i][this.j] = this.j;
        this.history.push(this._recordState(`dp[0][${this.j}] = ${this.j} (base case; insertions)`));
      } else if(this.j === 0) {
        this.dp[this.i][0] = this.i;
        this.history.push(this._recordState(`dp[${this.i}][0] = ${this.i} (base case; deletions)`));
      } else {
        if(this.s1[this.i-1] === this.s2[this.j-1]) {
          this.dp[this.i][this.j] = this.dp[this.i-1][this.j-1];
          this.history.push(this._recordState(
            `Chars match (${this.s1[this.i-1]}), dp[${this.i}][${this.j}] = dp[${this.i-1}][${this.j-1}] = ${this.dp[this.i][this.j]}`, "match"));
        } else {
          let insert = this.dp[this.i][this.j-1] + 1;
          let remove = this.dp[this.i-1][this.j] + 1;
          let replace = this.dp[this.i-1][this.j-1] + 1;
          let minOp = Math.min(insert, remove, replace);
          this.dp[this.i][this.j] = minOp;

          let opStr = "";
          if(minOp === insert) opStr = "insert";
          else if(minOp === remove) opStr = "remove";
          else opStr = "replace";

          this.history.push(this._recordState(
            `Chars differ (${this.s1[this.i-1]} vs ${this.s2[this.j-1]}), dp[${this.i}][${this.j}] = min(insert=${insert}, remove=${remove}, replace=${replace}) = ${minOp} (${opStr})`,
            opStr));
        }
      }
      return true;
    }
    stepBackward() {
      if(this.history.length <= 1) return false;
      this.history.pop();
      let st = this.history[this.history.length-1];
      this.dp = st.dp.map(row => row.slice());
      this.i = st.i;
      this.j = st.j;
      return true;
    }
    renderTable() {
      let header = "j→  ";
      for(let j=0; j<=this.n; j++) {
        header += j.toString().padStart(4," ") + " ";
      }
      let lines = [header];
      for(let i=0; i<=this.m; i++) {
        let row = (i===0 ? "0(i)" : i.toString().padStart(3," ") + "(i)") + ": ";
        for(let j=0; j<=this.n; j++) {
          row += this.dp[i][j].toString().padStart(4," ") + " ";
        }
        lines.push(row);
      }
      return lines.join("\n");
    }
    renderExplanation() {
      let st = this.history[this.history.length-1];
      if(!st) return "";
      let op = st.operation ? `Operation: ${st.operation}` : "";
      return `Step [i=${st.i}, j=${st.j}]:\n${st.note}\n${op}\n\nTable:\n${this.renderTable()}`;
    }
  }


  // INPUTS CONTROLS SETUP for each problem
  function createFibInputs() {
    return `
      <label>
        Enter n (max Fibonacci term index, integer ≥ 2):
        <input id="fib_n" type="number" min="2" max="50" step="1" value="10" />
      </label>
    `;
  }

  function createKnapsackInputs() {
    return `
      <label>
        Enter weights (comma-separated integers):
        <input id="knapsack_weights" type="text" value="1,3,4,5" />
      </label>
      <label>
        Enter values (comma-separated integers):
        <input id="knapsack_values" type="text" value="1,4,5,7" />
      </label>
      <label>
        Enter capacity (integer):
        <input id="knapsack_capacity" type="number" min="1" max="50" step="1" value="7" />
      </label>
    `;
  }

  function createLCSInputs() {
    return `
      <label>
        Enter string s1 (max length 20):
        <input id="lcs_s1" type="text" maxlength="20" value="ABCBDAB" />
      </label>
      <label>
        Enter string s2 (max length 20):
        <input id="lcs_s2" type="text" maxlength="20" value="BDCABA" />
      </label>
    `;
  }

  function createCoinChangeInputs() {
    return `
      <label>
        Enter coin denominations (comma-separated integers):
        <input id="coinchange_coins" type="text" value="1,2,5" />
      </label>
      <label>
        Enter amount (integer):
        <input id="coinchange_amount" type="number" min="1" max="50" step="1" value="11" />
      </label>
    `;
  }

  function createEditDistanceInputs() {
    return `
      <label>
        Enter string s1 (max length 20):
        <input id="editdistance_s1" type="text" maxlength="20" value="horse" />
      </label>
      <label>
        Enter string s2 (max length 20):
        <input id="editdistance_s2" type="text" maxlength="20" value="ros" />
      </label>
    `;
  }

  // Inputs parser for each problem
  function parseFibInputs() {
    let n = parseInt(document.getElementById("fib_n").value, 10);
    if(isNaN(n) || n < 2 || n > 50) throw new Error("n must be integer between 2 and 50");
    return { n };
  }

  function parseKnapsackInputs() {
    let wsRaw = document.getElementById("knapsack_weights").value.trim();
    let vsRaw = document.getElementById("knapsack_values").value.trim();
    let cRaw = document.getElementById("knapsack_capacity").value.trim();
    if(!wsRaw || !vsRaw || !cRaw) throw new Error("All inputs required");
    let weights = wsRaw.split(",").map(s=>parseInt(s.trim(),10));
    let values = vsRaw.split(",").map(s=>parseInt(s.trim(),10));
    let capacity = parseInt(cRaw,10);
    if(weights.length !== values.length) throw new Error("Weights and values arrays must be the same length");
    if(weights.some(w=>isNaN(w) || w<=0)) throw new Error("Weights must be positive integers");
    if(values.some(v=>isNaN(v) || v<0)) throw new Error("Values must be non-negative integers");
    if(isNaN(capacity) || capacity <= 0) throw new Error("Capacity must be positive integer");
    if(weights.length > 20) throw new Error("Too many items (max 20)");
    if(capacity > 50) throw new Error("Capacity too large (max 50)");
    return { weights, values, capacity };
  }

  function parseLCSInputs() {
    let s1 = document.getElementById("lcs_s1").value;
    let s2 = document.getElementById("lcs_s2").value;
    if(!s1 || !s2) throw new Error("Both strings required");
    if(s1.length > 20 || s2.length > 20) throw new Error("String length max is 20");
    return { s1, s2 };
  }

  function parseCoinChangeInputs() {
    let coinsRaw = document.getElementById("coinchange_coins").value.trim();
    let amountRaw = document.getElementById("coinchange_amount").value.trim();
    if(!coinsRaw || !amountRaw) throw new Error("All inputs required");
    let coins = coinsRaw.split(",").map(s=>parseInt(s.trim(),10));
    let amount = parseInt(amountRaw,10);
    if(coins.some(c=>isNaN(c) || c <= 0)) throw new Error("Coins must be positive integers");
    if(amount <= 0 || isNaN(amount)) throw new Error("Amount must be positive integer");
    if(coins.length > 20) throw new Error("Too many coin types (max 20)");
    if(amount > 50) throw new Error("Amount too large (max 50)");
    return { coins, amount };
  }

  function parseEditDistanceInputs() {
    let s1 = document.getElementById("editdistance_s1").value;
    let s2 = document.getElementById("editdistance_s2").value;
    if(!s1 || !s2) throw new Error("Both strings required");
    if(s1.length > 20 || s2.length > 20) throw new Error("String length max is 20");
    return { s1, s2 };
  }


  // On problem selection change, redraw inputs
  function updateInputs() {
    clearOutput();
    let val = problemSelect.value;
    let html = "";
    try {
      switch(val) {
        case "fib": html = createFibInputs(); break;
        case "knapsack": html = createKnapsackInputs(); break;
        case "lcs": html = createLCSInputs(); break;
        case "coinchange": html = createCoinChangeInputs(); break;
        case "editdistance": html = createEditDistanceInputs(); break;
        default: html = ""; break;
      }
      inputsArea.innerHTML = html;
    } catch(e) {
      inputsArea.innerHTML = "Error loading inputs.";
    }
  }

  problemSelect.addEventListener("change", () => {
    updateInputs();
    solver = null;
    steps = [];
    stepIndex = -1;
    prevStepBtn.disabled = true;
    nextStepBtn.disabled = true;
    runBtn.disabled = false;
    autoRunBtn.disabled = false;
    clearOutput();
    printOutput("Please enter inputs and click Run / Step Execute.");
  });

  resetBtn.addEventListener("click", () => {
    if(!solver) {
      printOutput("No solver active.");
      return;
    }
    solver.reset();
    stepIndex = 0;
    prevStepBtn.disabled = true;
    nextStepBtn.disabled = true;
    autoRunBtn.disabled = false;
    runBtn.disabled = false;
    clearOutput();
    printTable(solver.renderTable());
    printOutput("Reset completed. Use Run / Step buttons to execute.");
  });

  runBtn.addEventListener("click", () => {
    if(autoRunning) return;
    if(!solver) {
      try {
        initSolverFromInputs();
      } catch(e) {
        clearOutput();
        printOutput("Error parsing inputs: " + e.message);
        return;
      }
    }
    // perform one step forward
    let res = solver.stepForward();
    if(!res) {
      printOutput("Reached end of computation.");
      runBtn.disabled = true;
      nextStepBtn.disabled = true;
      autoRunBtn.disabled = true;
      prevStepBtn.disabled = false;
    } else {
      prevStepBtn.disabled = false;
      nextStepBtn.disabled = false;
      autoRunBtn.disabled = false;
      runBtn.disabled = false;
    }
    printTable(solver.renderTable());
    clearOutput();
    printOutput(solver.renderExplanation());
  });

  autoRunBtn.addEventListener("click", () => {
    if(autoRunning) return;
    if(!solver) {
      try {
        initSolverFromInputs();
      } catch(e) {
        clearOutput();
        printOutput("Error parsing inputs: " + e.message);
        return;
      }
    }
    autoRunning = true;
    runBtn.disabled = true;
    autoRunBtn.disabled = true;
    prevStepBtn.disabled = true;
    nextStepBtn.disabled = true;

    let delay = parseInt(stepDelayInp.value, 10);
    if(isNaN(delay) || delay < 50) delay = 500;

    function iterate() {
      let res = solver.stepForward();
      printTable(solver.renderTable());
      clearOutput();
      printOutput(solver.renderExplanation());
      if(!res) {
        autoRunning = false;
        runBtn.disabled = true;
        autoRunBtn.disabled = true;
        prevStepBtn.disabled = false;
        nextStepBtn.disabled = false;
        return;
      }
      autoIntervalID = setTimeout(iterate, delay);
    }
    iterate();
  });

  prevStepBtn.addEventListener("click", () => {
    if(autoRunning) return;
    if(!solver) {
      printOutput("No solver active.");
      return;
    }
    let res = solver.stepBackward();
    if(!res) {
      printOutput("Cannot go further back.");
      prevStepBtn.disabled = true;
      return;
    }
    runBtn.disabled = false;
    autoRunBtn.disabled = false;
    nextStepBtn.disabled = false;
    prevStepBtn.disabled = solver.history && solver.history.length <= 1;
    printTable(solver.renderTable());
    clearOutput();
    printOutput(solver.renderExplanation());
  });

  nextStepBtn.addEventListener("click", () => {
    if(autoRunning) return;
    if(!solver) {
      printOutput("No solver active.");
      return;
    }
    let res = solver.stepForward();
    if(!res) {
      printOutput("Reached end of computation.");
      runBtn.disabled = true;
      nextStepBtn.disabled = true;
      autoRunBtn.disabled = true;
      return;
    }
    prevStepBtn.disabled = false;
    runBtn.disabled = false;
    autoRunBtn.disabled = false;
    printTable(solver.renderTable());
    clearOutput();
    printOutput(solver.renderExplanation());
  });

  // Init solver from current inputs per problem
  function initSolverFromInputs() {
    clearOutput();
    printOutput("Initializing solver...");
    let val = problemSelect.value;
    let inputs;
    switch(val) {
      case "fib":
        inputs = parseFibInputs();
        solver = new FibProblem(inputs);
        break;
      case "knapsack":
        inputs = parseKnapsackInputs();
        solver = new KnapsackProblem(inputs);
        break;
      case "lcs":
        inputs = parseLCSInputs();
        solver = new LCSProblem(inputs);
        break;
      case "coinchange":
        inputs = parseCoinChangeInputs();
        solver = new CoinChangeProblem(inputs);
        break;
      case "editdistance":
        inputs = parseEditDistanceInputs();
        solver = new EditDistanceProblem(inputs);
        break;
      default:
        throw new Error("Unknown problem");
    }
    solver.reset();
    printTable(solver.renderTable());
    printOutput("Initialized. Click Run/Step Execute to start stepping.");
  }

  // Initial page setup
  updateInputs();
  clearOutput();
  printOutput("Select a DP problem, adjust inputs, then run or step through the computation.");
})();
</script>
</body>
</html>
