<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Red-Black Tree Visualization — Elegant Demo</title>
<style>
  /* === Reset and base === */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
  *, *::before, *::after {
    box-sizing: border-box;
  }
  body {
    margin: 0; background: #121418; color: #E6E8EA;
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow-x: hidden;
    user-select: none;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  h1 {
    font-weight: 700; font-size: 2.8rem; color: #F5F7FA;
    letter-spacing: 1.1px; margin-bottom: .2em;
    text-align: center;
  }
  h2 {
    font-weight: 600; font-size: 1.4rem; color: #8AA1B1;
    text-align: center;
    margin-top: 0;
    margin-bottom: 1.5em;
    font-style: italic;
  }
  /* Container */
  #app {
    max-width: 960px;
    margin: 2rem auto 3rem;
    padding: 0 20px 64px;
    display: flex; flex-direction: column; align-items: center;
  }
  /* Control buttons container */
  #controls {
    margin-bottom: 2em;
    display: flex; gap: 1.5rem;
  }
  button {
    background: linear-gradient(145deg, #2A2F38, #262B33);
    border: none; border-radius: 12px;
    padding: 0.75em 1.6em;
    font-weight: 600;
    font-size: 1rem;
    color: #A3B1C2;
    letter-spacing: 0.03em;
    cursor: pointer;
    box-shadow:
       inset 3px 3px 6px #1E2229,
       inset -3px -3px 6px #343C4A,
       4px 4px 7px rgba(20,23,30,0.4);
    transition:
      color 0.3s ease,
      box-shadow 0.4s ease,
      background 0.5s ease;
    user-select: none;
  }
  button:hover, button:focus {
    color: #DDE6EA;
    box-shadow:
       inset 2px 2px 5px #3F4558,
       inset -2px -2px 5px #222831,
       6px 6px 13px rgba(30,40,60,0.7);
    background: linear-gradient(145deg, #343A48, #2B303C);
    outline: none;
  }
  button:active {
    box-shadow:
       inset 1px 1px 3px #20252C,
       inset -1px -1px 3px #3D4453;
    background: linear-gradient(145deg, #292F39, #232832);
    color: #C1D0E0;
  }

  /* === SVG Tree Container === */
  #tree-container {
    width: 100%;
    max-width: 960px;
    aspect-ratio: 16 / 9;
    position: relative;
    filter:
      drop-shadow(0 0 4px #FF3C3C88)
      drop-shadow(0 0 7px #ED5858BB)
      drop-shadow(0 0 18px #FC6262AA);
  }

  svg {
    display: block;
    width: 100%; height: 100%;
  }

  /* Lines between nodes */
  .link {
    stroke: #7A869B55;
    stroke-width: 2;
    stroke-linecap: round;
    transition: stroke 0.5s ease;
  }
  .link:hover {
    stroke: #FC6262EE;
    stroke-width: 3.5;
  }

  /* Node style */
  .node {
    cursor: default;
    filter:
      drop-shadow(0 0 2px rgba(0,0,0,0.25));
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .node:hover {
    transform: scale(1.1);
  }
  /* Circle base */
  .node circle {
    transition:
      fill 0.6s ease,
      stroke 0.4s ease;
    stroke-width: 3.5;
    stroke: #1A2133;
    filter:
      drop-shadow(0 5px 8px rgba(0,0,0,0.22));
  }

  /* Red node fill */
  .node.red circle {
    fill: #FF4545;
    stroke: #991B1B;
    filter:
      drop-shadow(0 0 12px #FF555580);
  }
  /* Black node fill */
  .node.black circle {
    fill: #1A2133;
    stroke: #666F86;
    filter:
      drop-shadow(0 0 7px #3A4B9B50);
  }

  /* Node text */
  .node text {
    fill: #E6E8EA;
    font-weight: 700;
    font-size: 1.3rem;
    pointer-events: none;
    user-select: none;
    font-feature-settings: "tnum";
    text-shadow:
      0 0 4px #0009;
  }

  /* Highlight node on insertion step */
  .highlight circle {
    stroke: #FCEC3D !important;
    stroke-width: 5 !important;
    filter:
      drop-shadow(0 0 16px #FCEC3DCC);
  }
  /* Subtitle below node value */
  .node .subtitle {
    font-weight: 400;
    font-size: 0.7rem;
    fill: #8899B2AA;
    font-style: italic;
    user-select:none;
    pointer-events:none;
    text-anchor: middle;
    dominant-baseline: hanging;
  }

  /* Footer */
  footer {
    text-align: center;
    font-size: 0.8rem;
    color: #556677;
    margin-top: 6rem;
  }
  footer a {
    color: #8899B2;
    text-decoration: none;
    transition: color 0.3s ease;
  }
  footer a:hover {
    color: #FC6262;
  }

</style>
</head>
<body>
  <div id="app" aria-label="Red-Black Tree Visualization">
    <h1>Red-Black Tree</h1>
    <h2>Balanced Binary Search Tree — Visualized Elegantly</h2>
    <div id="controls" role="group" aria-label="Simple controls">
      <button id="btnReset" aria-label="Reset tree">Reset</button>
      <button id="btnStep" aria-label="Next insertion step">Next Step</button>
    </div>
    <div id="tree-container" aria-live="polite" aria-atomic="true" aria-relevant="additions removals">
      <svg id="tree-svg" viewBox="0 0 960 540" role="img" aria-describedby="desc-tree" aria-label="Red-Black Tree graph"></svg>
    </div>
  </div>

  <footer>
    &copy; 2024 — Aesthetic Data Structures Demo
  </footer>

<script>
(() => {
  /*
  Red-Black Tree Visualization Demo
  Limited interactivity: Reset & Step insertion
  */

  // === Data Structures ===

  // We'll visualize insertion of a fixed sequence of keys into an initially empty tree,
  // showing each step. The tree will re-balance as per Red-Black tree rules.

  // Red-Black tree node class
  class RBNode {
    constructor(key, color='red', left=null, right=null, parent=null) {
      this.key = key;
      this.color = color; // 'red' or 'black'
      this.left = left;
      this.right = right;
      this.parent = parent;
    }
  }

  // Red-Black Tree class, only insertion implemented here
  class RedBlackTree {
    constructor() {
      this.NIL = new RBNode(null, 'black'); // Sentinel NIL node
      this.root = this.NIL;
    }

    leftRotate(x) {
      let y = x.right;
      x.right = y.left;
      if (y.left !== this.NIL) y.left.parent = x;
      y.parent = x.parent;
      if (x.parent === null) this.root = y;
      else if (x === x.parent.left) x.parent.left = y;
      else x.parent.right = y;
      y.left = x;
      x.parent = y;
    }

    rightRotate(y) {
      let x = y.left;
      y.left = x.right;
      if (x.right !== this.NIL) x.right.parent = y;
      x.parent = y.parent;
      if (y.parent === null) this.root = x;
      else if (y === y.parent.right) y.parent.right = x;
      else y.parent.left = x;
      x.right = y;
      y.parent = x;
    }

    insert(key) {
      let newNode = new RBNode(key);
      newNode.left = this.NIL;
      newNode.right = this.NIL;

      let y = null;
      let x = this.root;

      while (x !== this.NIL) {
        y = x;
        if (newNode.key < x.key) x = x.left;
        else x = x.right;
      }
      newNode.parent = y;
      if (y === null) this.root = newNode;
      else if (newNode.key < y.key) y.left = newNode;
      else y.right = newNode;

      newNode.color = 'red';

      this.insertFixup(newNode);
      return newNode;
    }

    insertFixup(z) {
      while (z.parent && z.parent.color === 'red') {
        if (z.parent === z.parent.parent.left) {
          let y = z.parent.parent.right;
          if (y.color === 'red') {
            z.parent.color = 'black';
            y.color = 'black';
            z.parent.parent.color = 'red';
            z = z.parent.parent;
          } else {
            if (z === z.parent.right) {
              z = z.parent;
              this.leftRotate(z);
            }
            z.parent.color = 'black';
            z.parent.parent.color = 'red';
            this.rightRotate(z.parent.parent);
          }
        } else {
          let y = z.parent.parent.left;
          if (y.color === 'red') {
            z.parent.color = 'black';
            y.color = 'black';
            z.parent.parent.color = 'red';
            z = z.parent.parent;
          } else {
            if (z === z.parent.left) {
              z = z.parent;
              this.rightRotate(z);
            }
            z.parent.color = 'black';
            z.parent.parent.color = 'red';
            this.leftRotate(z.parent.parent);
          }
        }
      }
      this.root.color = 'black';
    }

    // Helper for visualization: returns array of nodes in tree with positions
    // We'll compute x,y positions for each node for the SVG layout.
    computePositions() {
      const positions = [];
      const nodePositions = new Map();

      let maxDepth = 0;

      // step 1: BFS to assign depth and gather nodes per depth level
      let levels = [];
      function dfs(node, depth = 0) {
        if (node === null || node.key === null) return;
        if (!levels[depth]) levels[depth] = [];
        levels[depth].push(node);
        if(depth > maxDepth) maxDepth = depth;
        dfs(node.left, depth+1);
        dfs(node.right, depth+1);
      }
      dfs(this.root);

      // horizontal spacing constants
      const svgWidth = 960;
      const svgHeight = 540;
      const marginX = 80;
      const marginY = 40;

      // For each level, assign x positions spread evenly
      for (let d = 0; d <= maxDepth; d++) {
        const levelNodes = levels[d] || [];
        const count = levelNodes.length;
        for (let i = 0; i < count; i++) {
          const node = levelNodes[i];
          // x spread equally within marginX..svgWidth-marginX
          const x = marginX + i * ((svgWidth - 2*marginX)/ (count ? count : 1));
          // y in steps by depth
          const y = marginY + d * ((svgHeight - 2 * marginY)/ (maxDepth ? maxDepth : 1));
          nodePositions.set(node, {x, y});
        }
      }

      // Step 2: Return node-positions map and also parent-child connections for lines
      const links = [];
      for (let d = 0; d <= maxDepth; d++) {
        (levels[d] || []).forEach(node => {
          if(node.left && node.left.key !== null)
            links.push([node, node.left]);
          if(node.right && node.right.key !== null)
            links.push([node, node.right]);
        });
      }

      return { nodePositions, links };
    }
  }


  // === Visualization ===

  const svg = document.getElementById('tree-svg');
  const btnReset = document.getElementById('btnReset');
  const btnStep = document.getElementById('btnStep');

  // Insertion sequence fixed (balanced-ish)
  const insertionSequence = [11, 2, 14, 1, 7, 15, 5, 8, 4];

  let tree = null;
  let currentStep = 0;
  let highlightNode = null;

  // Clear SVG children utility
  function clearSVG() {
    while(svg.firstChild) svg.removeChild(svg.firstChild);
  }

  // Create SVG element helper
  function createSVGElement(tag, attrs = {}) {
    const ns = "http://www.w3.org/2000/svg";
    const el = document.createElementNS(ns, tag);
    Object.entries(attrs).forEach(([k,v]) => {
      if (v != null) el.setAttribute(k,v);
    });
    return el;
  }

  // Render the current tree state
  function renderTree(tree, highlightNode=null) {
    clearSVG();

    if (tree.root === tree.NIL) {
      // empty tree message
      const emptyText = createSVGElement('text', {
        x: '50%', y: '50%',
        fill: '#8899AA55',
        'text-anchor': 'middle',
        'dominant-baseline': 'middle',
        'font-size': '2rem',
        'font-weight': '600',
        'font-style': 'italic',
        'pointer-events': 'none',
        'user-select': 'none'
      });
      emptyText.textContent = 'Tree is empty';
      svg.appendChild(emptyText);
      return;
    }

    // compute positions
    const { nodePositions, links } = tree.computePositions();

    // Draw edges (links) - curved smooth lines
    links.forEach(([p,c]) => {
      const pPos = nodePositions.get(p);
      const cPos = nodePositions.get(c);

      // Draw a nice smooth cubic Bezier curve
      // control points horizontally between parent and child
      const dx = Math.abs(cPos.x - pPos.x);
      // create path d attribute
      const d = `
        M${pPos.x} ${pPos.y + 27}
        C${pPos.x} ${pPos.y + 27 + dx*0.45},
         ${cPos.x} ${cPos.y - 27 - dx*0.45},
         ${cPos.x} ${cPos.y - 27}
      `;

      const link = createSVGElement('path', {
        d: d.trim(),
        class: 'link',
        'aria-hidden': 'true',
        fill: 'none'
      });
      svg.appendChild(link);
    });

    // Draw nodes
    // Sorting nodes by depth (y) descending so circles with higher y (lower nodes) appear below parent nodes for neat shadows
    const nodesToDraw = Array.from(nodePositions.entries()).sort((a,b) => a[1].y - b[1].y);

    nodesToDraw.forEach(([node, pos]) => {
      const group = createSVGElement('g', {class: 'node ' + node.color});
      group.setAttribute('transform', `translate(${pos.x},${pos.y})`);

      if (node === highlightNode) {
        group.classList.add('highlight');
      }

      // Circle
      const circle = createSVGElement('circle', {
        r: 27,
        role: 'img',
        'aria-label': `${node.key}, ${node.color} node`
      });
      group.appendChild(circle);

      // Node key text
      const text = createSVGElement('text', {
        'text-anchor': 'middle',
        'dominant-baseline': 'central',
        role: 'presentation',
        'pointer-events': 'none',
      });
      text.textContent = node.key;
      group.appendChild(text);

      svg.appendChild(group);
    });
  }

  // === Step logic ===

  // We'll reveal the tree step by step, each step inserting next node

  function resetTree() {
    tree = new RedBlackTree();
    currentStep = 0;
    highlightNode = null;
    renderTree(tree);
  }

  function nextStep() {
    if (currentStep >= insertionSequence.length) {
      highlightNode = null;
      btnStep.disabled = true;
      return;
    }
    const key = insertionSequence[currentStep];
    const insertedNode = tree.insert(key);
    highlightNode = insertedNode;
    renderTree(tree, highlightNode);
    currentStep++;

    if (currentStep >= insertionSequence.length) {
      btnStep.disabled = true;
      highlightNode = null;
    }
  }

  // === Initialization ===

  // On load
  resetTree();

  btnReset.addEventListener('click', () => {
    btnStep.disabled = false;
    resetTree();
  });

  btnStep.addEventListener('click', () => {
    nextStep();
  });

})();
</script>
</body>
</html>
