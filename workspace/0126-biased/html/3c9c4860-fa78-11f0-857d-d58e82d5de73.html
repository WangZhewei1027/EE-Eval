<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Neural Networks — A Visual Journey</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

  /* Root and body style */
  :root {
    --primary-color: #4A90E2;
    --secondary-color: #50E3C2;
    --accent-color: #F5A623;
    --bg-dark: #121212;
    --bg-darker: #0D0D0D;
    --text-light: #E0E0E0;
    --shadow-glow: rgba(74, 144, 226, 0.6);
  }
  /* Reset */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: linear-gradient(135deg, #121212 0%, #0D0D0D 100%);
    font-family: 'Poppins', sans-serif;
    color: var(--text-light);
    overflow: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  /* Title */
  header {
    text-align: center;
    margin-bottom: 2rem;
    z-index: 10;
  }
  h1 {
    font-weight: 600;
    font-size: 3.5rem;
    background: linear-gradient(90deg, #50E3C2, #4A90E2);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 8px var(--shadow-glow));
    letter-spacing: 0.05em;
    user-select: none;
  }
  h2 {
    font-weight: 300;
    font-size: 1.2rem;
    letter-spacing: 0.15em;
    margin-top: 0.5em;
    color: #7f8fa6;
    user-select: none;
    font-style: italic;
  }

  /* Container for visualization and controls */
  main {
    position: relative;
    width: 90vw;
    max-width: 960px;
    aspect-ratio: 16 / 9;
    background: #1B1B1B;
    border-radius: 20px;
    box-shadow:
      inset 0 0 20px #222,
      0 0 60px var(--shadow-glow);
    overflow: hidden;
    user-select: none;
    display: flex;
    flex-direction: column;
  }

  /* Visualization canvas */
  #nn-canvas {
    flex-grow: 1;
    display: block;
    border-radius: 20px 20px 0 0;
    background: radial-gradient(circle at center, #111827, #0B0B0B 80%);
    cursor: default;
  }

  /* Controls panel */
  .controls {
    background: #0E0E0E;
    padding: 1rem 1.5rem;
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    border-radius: 0 0 20px 20px;
  }

  button {
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    border: none;
    border-radius: 50px;
    padding: 0.6rem 2rem;
    font-weight: 600;
    font-size: 1rem;
    color: white;
    box-shadow: 0 8px 15px rgba(74,144,226,0.4);
    cursor: pointer;
    transition: all 0.3s ease;
    user-select: none;
  }

  button:focus-visible {
    outline: 2px solid var(--accent-color);
    outline-offset: 4px;
  }

  button:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(74,144,226,0.65);
  }
  button:active {
    transform: translateY(-1px);
    box-shadow: 0 8px 15px rgba(74,144,226,0.5);
  }

  /* Tooltip for layer info */
  #tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(10, 10, 10, 0.85);
    color: #a0cce7;
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 0.875rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    opacity: 0;
    transition: opacity 0.3s ease;
    user-select: none;
    z-index: 15;
    font-family: 'Poppins', sans-serif;
    box-shadow: 0 0 15px var(--shadow-glow);
  }
</style>
</head>
<body>
<header>
  <h1>NEURAL NETWORKS</h1>
  <h2>Visualizing the Intelligence Inside</h2>
</header>

<main>
  <canvas id="nn-canvas" width="900" height="506" aria-label="Neural network visualization"></canvas>
  <div class="controls" role="region" aria-label="Controls for visualization">
    <button id="toggleAnimation" aria-pressed="true" aria-label="Pause neural network animation">Pause Animation</button>
    <button id="shuffleWeights" aria-label="Shuffle connections weights to random values">Shuffle Weights</button>
  </div>
  <div id="tooltip" role="tooltip"></div>
</main>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('nn-canvas');
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('tooltip');
  const toggleBtn = document.getElementById('toggleAnimation');
  const shuffleBtn = document.getElementById('shuffleWeights');

  const dpr = window.devicePixelRatio || 1;
  const width = canvas.width;
  const height = canvas.height;

  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';

  // Adjust canvas for retina
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  ctx.scale(dpr, dpr);

  // Neural network configuration
  const layersConfig = [6, 10, 8, 5, 2]; // Number of neurons per layer

  // Colors for neurons based on their layer index
  const neuronColors = [
    '#4A90E2',
    '#50E3C2',
    '#F5A623',
    '#E94E77',
    '#9B59B6'
  ];

  // Neuron radius
  const neuronRadius = 18;

  // Animation control
  let animationActive = true;
  let time = 0;

  // Store neurons with positions and properties
  let neurons = [];
  // Store connections with weight values and animation state
  let connections = [];

  // Initialize neurons positions and structure
  function initNeurons() {
    neurons = [];
    const marginX = 80;
    const marginY = 60;
    const usableWidth = width - 2 * marginX;
    const usableHeight = height - 2 * marginY;

    layersConfig.forEach((count, layerIndex) => {
      const layerX = marginX + (usableWidth / (layersConfig.length - 1)) * layerIndex;
      const gapY = usableHeight / (count - 1 || 1);
      for (let i = 0; i < count; i++) {
        const y = marginY + (count === 1 ? usableHeight / 2 : gapY * i);
        neurons.push({
          id: `${layerIndex}-${i}`,
          layer: layerIndex,
          x: layerX,
          y: y,
          radius: neuronRadius,
          color: neuronColors[layerIndex] || '#888',
          activation: 0,
        });
      }
    });
  }

  // Initialize connections between subsequent layers
  function initConnections() {
    connections = [];
    for(let l = 0; l < layersConfig.length - 1; l++) {
      const currentLayerCount = layersConfig[l];
      const nextLayerCount = layersConfig[l + 1];
      for(let i = 0; i < currentLayerCount; i++) {
        const startNeuron = neurons.find(n => n.layer === l && n.id.endsWith(`-${i}`));
        for(let j = 0; j < nextLayerCount; j++) {
          const endNeuron = neurons.find(n => n.layer === l + 1 && n.id.endsWith(`-${j}`));
          // Initialize weight with random -1 to 1
          const weight = Math.random() * 2 - 1;
          connections.push({
            start: startNeuron,
            end: endNeuron,
            weight: weight,
            animationPhase: Math.random() * 2 * Math.PI, // phase offset for animation
          });
        }
      }
    }
  }

  // Activation pulse animation for each neuron across layers
  function updateActivations(t) {
    neurons.forEach(neuron => {
      // Pulse activations synced by layer but with different phase offset
      const pulseSpeed = 1.3;
      const basePhase = (neuron.layer * 1.2 + neuron.y / height * 2) * Math.PI * 1.3;
      neuron.activation = 0.5 + 0.5 * Math.sin(t * pulseSpeed + basePhase);
    });
  }

  // Draw neurons
  function drawNeurons() {
    neurons.forEach(n => {
      const glow = n.activation * 0.6 + 0.3;
      ctx.shadowColor = n.color;
      ctx.shadowBlur = 20 * glow;
      // Outer glow circle
      ctx.beginPath();
      ctx.fillStyle = `rgba(255 255 255 / ${0.05 + glow * 0.14})`;
      ctx.arc(n.x, n.y, n.radius + 8 * glow, 0, 2 * Math.PI);
      ctx.fill();
      ctx.closePath();

      // Main neuron circle
      ctx.beginPath();
      const gradient = ctx.createRadialGradient(n.x, n.y, n.radius/4, n.x, n.y, n.radius);
      gradient.addColorStop(0, `rgba(255 255 255 / ${0.75 * n.activation})`);
      gradient.addColorStop(1, n.color);

      ctx.fillStyle = gradient;
      ctx.arc(n.x, n.y, n.radius, 0, 2 * Math.PI);
      ctx.fill();
      ctx.closePath();

      // Inner small bright spot for depth
      ctx.beginPath();
      ctx.fillStyle = `rgba(255 255 255 / ${0.6 * n.activation})`;
      ctx.arc(n.x - n.radius/3, n.y - n.radius/3, n.radius/4, 0, 2 * Math.PI);
      ctx.fill();
      ctx.closePath();

      ctx.shadowBlur = 0;
    });
  }

  // Get color representing weight strength and sign
  function weightToColor(weight) {
    // Positive: turquoise-blueish, Negative: coral-redish
    const p = Math.min(1, Math.abs(weight)); // clamp
    if(weight >= 0) {
      // interpolate light turquoise to blue
      const r = Math.floor(80 + 105 * (1 - p));
      const g = Math.floor(230 + 25 * (1 - p));
      const b = Math.floor(194 + 61 * (1 - p));
      return `rgb(${r},${g},${b})`; // approx turquoise shades
    } else {
      // interpolate light coral to red
      const r = Math.floor(245 + 10 * (1 - p));
      const g = Math.floor(166 - 120 * p);
      const b = Math.floor(35 - 35 * p);
      return `rgb(${r},${g > 0 ? g : 0},${b > 0 ? b : 0})`;
    }
  }

  // Draw connections with animated pulse on weight strength
  function drawConnections(t) {
    connections.forEach(conn => {
      const {start, end, weight, animationPhase} = conn;

      // Animate alpha and width with sine wave
      const alphaBase = 0.15;
      const alphaPulse = 0.6 * Math.abs(Math.sin(t * 4 + animationPhase));
      const alpha = Math.min(1, alphaBase + alphaPulse);
      const widthBase = 0.6;
      const widthPulse = 1.4 * Math.abs(Math.sin(t * 4 + animationPhase));
      const width = widthBase + widthPulse;

      // Stroke style based on weight
      const color = weightToColor(weight);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.shadowColor = color;
      ctx.shadowBlur = 8 * (alpha);

      // Draw connection line with smooth bezier curve
      ctx.beginPath();
      const cp1x = start.x + (end.x - start.x) * 0.4;
      const cp1y = start.y;
      const cp2x = start.x + (end.x - start.x) * 0.6;
      const cp2y = end.y;
      ctx.moveTo(start.x, start.y);
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, end.x, end.y);
      ctx.stroke();
      ctx.closePath();

      ctx.shadowBlur = 0;
    });
  }

  // Clear canvas
  function clear() {
    ctx.clearRect(0, 0, width, height);
    // Subtle dark overlay for fading trails effect
    ctx.fillStyle = 'rgba(18,18,18,0.2)';
    ctx.fillRect(0, 0, width, height);
  }

  // Main draw loop
  function drawLoop(timestamp = 0) {
    if(animationActive) {
      time = timestamp * 0.001;
    }
    clear();
    updateActivations(time);
    drawConnections(time);
    drawNeurons();
    if(animationActive) {
      window.requestAnimationFrame(drawLoop);
    }
  }

  // Button event handlers
  toggleBtn.addEventListener('click', () => {
    animationActive = !animationActive;
    toggleBtn.textContent = animationActive ? 'Pause Animation' : 'Play Animation';
    toggleBtn.setAttribute('aria-pressed', animationActive.toString());
    if(animationActive) {
      window.requestAnimationFrame(drawLoop);
    }
  });

  shuffleBtn.addEventListener('click', () => {
    // Randomize weights
    connections.forEach(conn => {
      conn.weight = Math.random() * 2 - 1;
      conn.animationPhase = Math.random() * 2 * Math.PI;
    });
    // Visual feedback: flash background subtle color shift
    flashBackground();
  });

  // Flash background on shuffle for nice effect
  function flashBackground() {
    const duration = 350;
    let start = null;
    function flash(ts) {
      if(!start) start = ts;
      const elapsed = ts - start;
      const progress = Math.min(1, elapsed / duration);

      const pulse = 0.15 * (1 - progress);
      const color = `rgba(80, 227, 194, ${pulse})`;
      canvas.style.boxShadow = `
        inset 0 0 40px ${color},
        0 0 120px ${color}
      `;

      if(progress < 1) {
        requestAnimationFrame(flash);
      } else {
        canvas.style.boxShadow = '';
      }
    }
    requestAnimationFrame(flash);
  }

  // Hover neuron highlighting & tooltip
  function getNearestNeuron(mx, my) {
    let minDist = Infinity;
    let closest = null;
    neurons.forEach(n => {
      const dx = n.x - mx;
      const dy = n.y - my;
      const dist = dx*dx + dy*dy;
      if(dist < minDist && dist < 30*30) {
        minDist = dist;
        closest = n;
      }
    });
    return closest;
  }

  function onMouseMove(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const hoveredNeuron = getNearestNeuron(mx, my);

    if(hoveredNeuron) {
      tooltip.style.opacity = '1';
      tooltip.style.left = (mx + 20) + 'px';
      tooltip.style.top = (my + 20) + 'px';

      tooltip.textContent = `Layer ${hoveredNeuron.layer + 1} | Neuron ${(hoveredNeuron.id.split('-')[1]) + 1}\nActivation: ${(hoveredNeuron.activation * 100).toFixed(1)}%`;
    } else {
      tooltip.style.opacity = '0';
      tooltip.textContent = '';
    }
  }
  function onMouseLeave() {
    tooltip.style.opacity = '0';
    tooltip.textContent = '';
  }

  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseleave', onMouseLeave);

  // Initialize and start animation
  function init() {
    initNeurons();
    initConnections();
    drawLoop();
  }

  init();

  // Responsive resizing handling (optional)
  window.addEventListener('resize', () => {
    // We keep fixed size for crisp visuals and layout constraints
  });
})();
</script>
</body>
</html>
