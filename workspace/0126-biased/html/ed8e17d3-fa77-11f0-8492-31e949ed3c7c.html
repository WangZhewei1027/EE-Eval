<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backtracking Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: #f0f4f8;
            color: #333;
            overflow: hidden;
        }
        header {
            text-align: center;
            padding: 20px;
            background: #3f51b5;
            color: white;
            border-bottom: 5px solid #303f9f;
        }
        h1 {
            font-size: 2.5em;
            margin: 0;
            animation: fadeIn 1s forwards;
        }
        #visualization {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 100px);
            position: relative;
            overflow: hidden;
        }
        .node {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #4caf50;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.5s, background 0.5s;
            position: absolute;
        }
        .node.active {
            background: #ff9800;
            transform: scale(1.1);
        }
        .node.visited {
            background: #2196f3;
        }
        .button {
            background: #3f51b5;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            margin: 20px;
            transition: background 0.3s;
        }
        .button:hover {
            background: #303f9f;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Backtracking Visualization</h1>
    </header>
    <div id="visualization"></div>
    <div style="text-align: center;">
        <button class="button" id="start-btn">Start Visualization</button>
    </div>

    <script>
        const visualization = document.getElementById('visualization');
        const startButton = document.getElementById('start-btn');

        const nodes = [];
        const gridSize = 5;

        function createGrid() {
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    const node = document.createElement('div');
                    node.classList.add('node');
                    node.style.left = `${j * 60}px`;
                    node.style.top = `${i * 60}px`;
                    visualization.appendChild(node);
                    nodes.push(node);
                }
            }
        }

        function backtracking(index = 0) {
            if (index >= nodes.length) return;

            nodes[index].classList.add('active');
            setTimeout(() => {
                nodes[index].classList.add('visited');
                if (index > 0) nodes[index - 1].classList.remove('active');
                backtracking(index + 1);
            }, 1000);
        }

        startButton.addEventListener('click', () => {
            nodes.forEach(node => node.classList.remove('visited', 'active'));
            backtracking();
        });

        createGrid();
    </script>
</body>
</html>
