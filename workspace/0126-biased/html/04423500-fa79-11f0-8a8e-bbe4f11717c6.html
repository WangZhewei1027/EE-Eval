<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insertion Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        .header h1 {
            margin: 0;
        }
        .footer {
            background-color: #e74c3c;
            color: #fff;
            padding: 10px;
            border-top: 1px solid #ccc;
        }
        .footer h1 {
            margin: 0;
        }
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Insertion Sort</h1>
            <p>Learn how to implement this efficient sorting algorithm in JavaScript</p>
        </div>
        <div class="footer">
            <p>&copy; 2023 Insertion Sort Tutorial</p>
        </div>
        <div class="button">
            <button id="sort-btn">Sort Array</button>
        </div>
        <div class="button">
            <button id="clear-btn">Clear Array</button>
        </div>
        <div class="button">
            <button id="reset-btn">Reset Array</button>
        </div>
        <div class="button">
            <button id="sort-btn-2">Sort Array (Descending)</button>
        </div>
        <div class="button">
            <button id="clear-btn-2">Clear Array (Descending)</button>
        </div>
        <div class="button">
            <button id="reset-btn-2">Reset Array (Descending)</button>
        </div>
    </div>

    <script>
        let array = [64, 34, 25, 12, 22, 11, 90];
        let sortBtn = document.getElementById('sort-btn');
        let clearBtn = document.getElementById('clear-btn');
        let resetBtn = document.getElementById('reset-btn');
        let sortBtn2 = document.getElementById('sort-btn-2');
        let clearBtn2 = document.getElementById('clear-btn-2');
        let resetBtn2 = document.getElementById('reset-btn-2');

        function sortArray(array) {
            for (let i = 0; i < array.length; i++) {
                for (let j = i + 1; j < array.length; j++) {
                    if (array[i] > array[j]) {
                        let temp = array[i];
                        array[i] = array[j];
                        array[j] = temp;
                    }
                }
            }
            return array;
        }

        function clearArray(array) {
            array = [];
            return array;
        }

        function resetArray(array) {
            array = [];
            return array;
        }

        sortBtn.addEventListener('click', () => {
            array = sortArray(array);
            document.getElementById('array').innerHTML = 'Sorted Array: ' + array.join(', ');
        });

        clearBtn.addEventListener('click', () => {
            array = clearArray(array);
            document.getElementById('array').innerHTML = 'Array after clearing: ' + array.join(', ');
        });

        resetBtn.addEventListener('click', () => {
            array = resetArray(array);
            document.getElementById('array').innerHTML = 'Array after resetting: ' + array.join(', ');
        });

        sortBtn2.addEventListener('click', () => {
            array = sortArray(array);
            document.getElementById('array-2').innerHTML = 'Sorted Array (Descending): ' + array.join(', ');
        });

        clearBtn2.addEventListener('click', () => {
            array = clearArray(array);
            document.getElementById('array-2').innerHTML = 'Array after clearing (Descending): ' + array.join(', ');
        });

        resetBtn2.addEventListener('click', () => {
            array = resetArray(array);
            document.getElementById('array-2').innerHTML = 'Array after resetting (Descending): ' + array.join(', ');
        });
    </script>

    <div id="array"></div>
    <div id="array-2"></div>
</body>
</html>
