<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topological Sort Interactive Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .hidden { display: none; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Topological Sort Interactive Demo</h1>
    <p>Define your directed graph below:</p>
    <textarea id="graph-input" rows="10" cols="30" placeholder="Enter edges as 'A B' for A -> B, one per line"></textarea><br>
    <button id="submit-graph">Set Graph</button>
    <button id="perform-sort" class="hidden">Perform Topological Sort</button>
    <div id="output"></div>

    <script>
        let graph = {};
        const outputDiv = document.getElementById('output');

        document.getElementById('submit-graph').addEventListener('click', function() {
            const input = document.getElementById('graph-input').value.trim();
            const edges = input.split('\n');
            graph = {};
            edges.forEach(edge => {
                const [from, to] = edge.split(' ');
                if (!graph[from]) graph[from] = [];
                graph[from].push(to);
                if (!graph[to]) graph[to] = []; // ensures all nodes are initialized
            });
            document.getElementById('perform-sort').classList.remove('hidden');
            outputDiv.innerHTML = 'Graph set. Ready to perform topological sort.';
        });

        document.getElementById('perform-sort').addEventListener('click', function() {
            const sorted = topologicalSort(graph);
            outputDiv.innerHTML = sorted.length ? 'Topological Sort Order: ' + sorted.join(', ') : 'Graph has cycles or is invalid.';
        });

        function topologicalSort(graph) {
            const inDegree = {};
            Object.keys(graph).forEach(node => {
                inDegree[node] = 0;
            });
            Object.keys(graph).forEach(node => {
                graph[node].forEach(neighbor => {
                    inDegree[neighbor]++;
                });
            });

            const queue = Object.keys(inDegree).filter(node => inDegree[node] === 0);
            const sortedOrder = [];
  
            while (queue.length) {
                const currentNode = queue.shift();
                sortedOrder.push(currentNode);

                graph[currentNode].forEach(neighbor => {
                    inDegree[neighbor]--;
                    if (inDegree[neighbor] === 0) {
                        queue.push(neighbor);
                    }
                });
            }

            return sortedOrder.length === Object.keys(graph).length ? sortedOrder : [];
        }
    </script>
</body>
</html>
