<!DOCTYPE html>
<html>
<head>
    <title>Tim Sort Interactive Demo</title>
    <style>
        body { font-family: monospace; margin: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; }
        .controls { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .control-group { margin-bottom: 10px; }
        button, input, select { margin-right: 10px; }
        .array-container { margin: 20px 0; }
        .array-element { display: inline-block; padding: 5px; margin: 2px; border: 1px solid #000; }
        .run { background-color: #f0f0f0; }
        .current { background-color: #d0d0d0; }
        .min-run { border: 1px dashed #000; }
        .merged { border: 1px solid #f00; }
        .log { height: 200px; overflow-y: scroll; border: 1px solid #000; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tim Sort Interactive Demo</h1>
        
        <div class="controls">
            <div class="control-group">
                <label>Array Size: <input type="range" id="arraySize" min="10" max="100" value="30"></label>
                <span id="arraySizeValue">30</span>
            </div>
            
            <div class="control-group">
                <label>Initial Order:
                    <select id="initialOrder">
                        <option value="random">Random</option>
                        <option value="sorted">Sorted</option>
                        <option value="reverse">Reverse Sorted</option>
                        <option value="partially">Partially Sorted</option>
                    </select>
                </label>
            </div>
            
            <div class="control-group">
                <label>Min Run Size: <input type="range" id="minRunSize" min="4" max="32" value="16"></label>
                <span id="minRunSizeValue">16</span>
            </div>
            
            <div class="control-group">
                <button id="generateArray">Generate New Array</button>
                <button id="stepForward">Step Forward</button>
                <button id="runToEnd">Run to Completion</button>
                <button id="reset">Reset</button>
            </div>
            
            <div class="control-group">
                <label>Speed: <input type="range" id="speed" min="100" max="2000" value="500"></label>
                <span id="speedValue">500ms</span>
            </div>
        </div>
        
        <div class="array-container" id="arrayContainer"></div>
        
        <div class="log" id="log"></div>
        
        <div class="info">
            <h3>Tim Sort Information</h3>
            <p>Current State: <span id="currentState">Initial</span></p>
            <p>Current Step: <span id="currentStep">0</span></p>
            <p>Runs Identified: <span id="runsCount">0</span></p>
            <p>Merges Performed: <span id="mergesCount">0</span></p>
            <p>Comparisons: <span id="comparisonsCount">0</span></p>
        </div>
    </div>

    <script>
        // State variables
        let array = [];
        let originalArray = [];
        let runs = [];
        let currentRunIndex = 0;
        let mergeStack = [];
        let currentStep = 0;
        let isRunning = false;
        let runInterval = null;
        let comparisons = 0;
        let merges = 0;
        
        // DOM elements
        const arrayContainer = document.getElementById('arrayContainer');
        const logElement = document.getElementById('log');
        const arraySizeInput = document.getElementById('arraySize');
        const arraySizeValue = document.getElementById('arraySizeValue');
        const minRunSizeInput = document.getElementById('minRunSize');
        const minRunSizeValue = document.getElementById('minRunSizeValue');
        const speedInput = document.getElementById('speed');
        const speedValue = document.getElementById('speedValue');
        const currentStateElement = document.getElementById('currentState');
        const currentStepElement = document.getElementById('currentStep');
        const runsCountElement = document.getElementById('runsCount');
        const mergesCountElement = document.getElementById('mergesCount');
        const comparisonsCountElement = document.getElementById('comparisonsCount');
        
        // Event listeners
        document.getElementById('generateArray').addEventListener('click', generateArray);
        document.getElementById('stepForward').addEventListener('click', stepForward);
        document.getElementById('runToEnd').addEventListener('click', runToEnd);
        document.getElementById('reset').addEventListener('click', reset);
        arraySizeInput.addEventListener('input', updateArraySizeValue);
        minRunSizeInput.addEventListener('input', updateMinRunSizeValue);
        speedInput.addEventListener('input', updateSpeedValue);
        
        // Initialize
        generateArray();
        
        // Helper functions
        function updateArraySizeValue() {
            arraySizeValue.textContent = arraySizeInput.value;
        }
        
        function updateMinRunSizeValue() {
            minRunSizeValue.textContent = minRunSizeInput.value;
        }
        
        function updateSpeedValue() {
            speedValue.textContent = speedInput.value + 'ms';
        }
        
        function log(message) {
            logElement.innerHTML += message> ' + message + '<br>';
            logElement.scrollTop = logElement.scrollHeight;
        }
        
        function updateStats() {
            currentStepElement.textContent = currentStep;
            runsCountElement.textContent = runs.length;
            mergesCountElement.textContent = merges;
            comparisonsCountElement.textContent = comparisons;
        }
        
        function generateArray() {
            const size = parseInt(arraySizeInput.value);
            const order = document.getElementById('initialOrder').value;
            
            array = [];
            originalArray = [];
            
            // Generate base array
            for (let i = 0; i < size; i++) {
                array.push(Math.floor(Math.random() * 100) + 1);
            }
            
            // Apply ordering
            if (order === 'sorted') {
                array.sort((a, b) => a - b);
            } else if (order === 'reverse') {
                array.sort((a, b) => b - a);
            } else if (order === 'partially') {
                array.sort((a, b) => a - b);
                // Randomly swap some elements
                for (let i = 0; i < size / 4; i++) {
                    const idx1 = Math.floor(Math.random() * size);
                    const idx2 = Math.floor(Math.random() * size);
                    [array[idx1], array[idx2]] = [array[idx2], array[idx1]];
                }
            }
            
            originalArray = [...array];
            reset();
            renderArray();
            log('Generated new array with ' + size + ' elements (' + order + ' order)');
        }
        
        function reset() {
            array = [...originalArray];
            runs = [];
            currentRunIndex = 0;
            mergeStack = [];
            currentStep = 0;
            comparisons = 0;
            merges = 0;
            isRunning = false;
            clearInterval(runInterval);
            currentStateElement.textContent = 'Initial';
            updateStats();
            renderArray();
            log('Reset to initial state');
        }
        
        function renderArray() {
            arrayContainer.innerHTML = '';
            
            for (let i = 0; i < array.length; i++) {
                const element = document.createElement('div');
                element.className = 'array-element';
                element.textContent = array[i];
                
                // Highlight runs
                for (const run of runs) {
                    if (i >= run.start && i <= run.end) {
                        element.classList.add('run');
                        break;
                    }
                }
                
                // Highlight current run
                if (runs[currentRunIndex] && i >= runs[currentRunIndex].start && i <= runs[currentRunIndex].end) {
                    element.classList.add('current');
                }
                
                // Highlight min runs
                const minRunSize = parseInt(minRunSizeInput.value);
                for (const run of runs) {
                    if (run.artificial && i >= run.start && i <= run.end) {
                        element.classList.add('min-run');
                        break;
                    }
                }
                
                arrayContainer.appendChild(element);
            }
        }
        
        function stepForward() {
            if (currentStep === 0) {
                findRuns();
                currentStateElement.textContent = 'Finding Runs';
                log('Starting Tim Sort - finding runs');
            } else if (currentRunIndex < runs.length - 1) {
                // Check if we need to merge
                const run1 = runs[currentRunIndex];
                const run2 = runs[currentRunIndex + 1];
                
                if (shouldMerge(run1, run2)) {
                    mergeRuns(currentRunIndex, currentRunIndex + 1);
                    currentStateElement.textContent = 'Merging Runs';
                    log('Merging runs ' + currentRunIndex + ' and ' + (currentRunIndex + 1));
                    merges++;
                } else {
                    currentRunIndex++;
                    currentStateElement.textContent = 'Checking Next Run';
                    log('Moving to next run: ' + (currentRunIndex + 1));
                }
            } else if (mergeStack.length > 1) {
                // Merge remaining runs in stack
                const run1 = mergeStack[mergeStack.length - 2];
                const run2 = mergeStack[mergeStack.length - 1];
                mergeRunsInStack();
                currentStateElement.textContent = 'Merging Stack';
                log('Merging runs in stack');
                merges++;
            } else if (runs.length === 1 && mergeStack.length === 0) {
                currentStateElement.textContent = 'Completed';
                log('Sorting finished!');
                return;
            } else {
                // Push remaining runs to stack
                while (currentRunIndex < runs.length) {
                    mergeStack.push(runs[currentRunIndex]);
                    log('Pushing run ' + currentRunIndex + ' to stack');
                    currentRunIndex++;
                }
            }
            
            currentStep++;
            updateStats();
            renderArray();
        }
        
        function runToEnd() {
            if (isRunning) {
                clearInterval(runInterval);
                isRunning = false;
                document.getElementById('runToEnd').textContent = 'Run to Completion';
                return;
            }
            
            isRunning = true;
            document.getElementById('runToEnd').textContent = 'Stop';
            
            runInterval = setInterval(() => {
                stepForward();
                
                if (currentStateElement.textContent === 'Completed') {
                    clearInterval(runInterval);
                    isRunning = false;
                    document.getElementById('runToEnd').textContent = 'Run to Completion';
                }
            }, parseInt(speedInput.value));
        }
        
        function findRuns() {
            const minRun = parseInt(minRunSizeInput.value);
            let i = 0;
            const n = array.length;
            
            while (i < n) {
                let j = i;
                
                // Find natural run
                if (i < n - 1) {
                    if (array[i] <= array[i + 1]) {
                        while (j < n - 1 && array[j] <= array[j + 1]) {
                            j++;
                            comparisons++;
                        }
                    } else {
                        while (j < n - 1 && array[j] > array[j + 1]) {
                            j++;
                            comparisons++;
                        }
                        // Reverse descending run
                        reverse(i, j);
                    }
                }
                
                // If run is too short, extend it
                if (j - i + 1 < minRun) {
                    const end = Math.min(i + minRun - 1, n - 1);
                    insertionSort(i, end);
                    j = end;
                }
                
                runs.push({
                    start: i,
                    end: j,
                    artificial: (j - i + 1) >= minRun ? false : true
                });
                
                i = j + 1;
            }
            
            log('Found ' + runs.length + ' runs');
        }
        
        function reverse(start, end) {
            while (start < end) {
                [array[start], array[end]] = [array[end], array[start]];
                start++;
                end--;
            }
        }
        
        function insertionSort(start, end) {
            for (let i = start + 1; i <= end; i++) {
                const key = array[i];
                let j = i - 1;
                
                while (j >= start && array[j] > key) {
                    array[j + 1] = array[j];
                    j--;
                    comparisons++;
                }
                
                array[j + 1] = key;
                comparisons++;
            }
        }
        
        function shouldMerge(run1, run2) {
            // Check if run2 can be merged with run1
            if (mergeStack.length >= 2) {
                const stackRun1 = mergeStack[mergeStack.length - 2];
                const stackRun2 = mergeStack[mergeStack.length - 1];
                
                if (stackRun1.end - stackRun1.start + 1 <= stackRun2.end - stackRun2.start + 1 + run2.end - run2.start + 1) {
                    return true;
                }
            }
            
            if (mergeStack.length >= 1) {
                const stackRun = mergeStack[mergeStack.length - 1];
                if (stackRun.end - stackRun.start + 1 <= run2.end - run2.start + 1) {
                    return true;
                }
            }
            
            return false;
        }
        
        function mergeRuns(runIndex1, runIndex2) {
            const run1 = runs[runIndex1];
            const run2 = runs[runIndex2];
            
            const merged = array.slice(run1.start, run2.end + 1).sort((a, b) => a - b);
            comparisons += Math.floor(Math.log2(merged.length)) * merged.length;
            
            // Copy merged array back
            for (let i = 0; i < merged.length; i++) {
                array[run1.start + i] = merged[i];
            }
            
            // Update runs
            runs.splice(runIndex1, 2, {
                start: run1.start,
                end: run2.end,
                artificial: false
            });
            
            currentRunIndex = Math.max(0, runIndex1 - 1);
        }
        
        function mergeRunsInStack() {
            if (mergeStack.length < 2) return;
            
            const run1 = mergeStack[mergeStack.length - 2];
            const run2 = mergeStack[mergeStack.length - 1];
            
            const merged = array.slice(run1.start, run2.end + 1).sort((a, b) => a - b);
            comparisons += Math.floor(Math.log2(merged.length)) * merged.length;
            
            // Copy merged array back
            for (let i = 0; i < merged.length; i++) {
                array[run1.start + i] = merged[i];
            }
            
            // Update stack
            mergeStack.splice(mergeStack.length - 2, 2, {
                start: run1.start,
                end: run2.end,
                artificial: false
            });
        }
    </script>
</body>
</html>
