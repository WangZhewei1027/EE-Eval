<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AVL Tree Interactive Demo</title>
<style>
  body {
    font-family: monospace, monospace;
    white-space: pre;
    line-height: 1.2em;
  }
  #output {
    border: 1px solid black;
    height: 300px;
    overflow: auto;
    font-family: monospace;
    margin-top: 10px;
  }
  #controls > * {
    margin: 4px 4px 4px 0;
  }
  input[type=number] {
    width: 60px;
  }
</style>
</head>
<body>
<h1>AVL Tree Interactive Demo</h1>

<div id="controls">
  <fieldset>
    <legend>Insert / Remove / Search</legend>
    <label for="valInput">Key: </label><input type="number" id="valInput" />
    <button id="insertBtn">Insert</button>
    <button id="removeBtn">Remove</button>
    <button id="searchBtn">Search</button>
    <button id="clearBtn">Clear Tree</button>
  </fieldset>

  <fieldset>
    <legend>Traversal / Display</legend>
    <select id="traversalSelect" aria-label="Select Traversal">
      <option value="inorder">In-order</option>
      <option value="preorder">Pre-order</option>
      <option value="postorder">Post-order</option>
      <option value="levelorder">Level-order</option>
    </select>
    <button id="showTraversalBtn">Show Traversal</button>
    <button id="showTreeBtn">Show Tree Structure</button>
    <button id="showBalanceBtn">Show Node Balances</button>
  </fieldset>

  <fieldset>
    <legend>Bulk Insertion</legend>
    <label for="bulkInput" title="Comma or space separated integers">Values: </label>
    <input type="text" id="bulkInput" placeholder="e.g. 5,3,7,2" size="30" />
    <button id="bulkInsertBtn">Insert All</button>
  </fieldset>

  <fieldset>
    <legend>Controls</legend>
    <label for="delayRange" title="Animation delay for insert/remove (ms)">Delay: </label>
    <input type="range" id="delayRange" min="0" max="2000" step="100" value="0" />
    <span id="delayVal">0 ms</span>
    <button id="stepBtn" title="Perform one queued step">Step</button>
    <button id="autoRunBtn">Auto Run</button>
    <button id="pauseBtn" disabled>Pause</button>
    <label>
      <input type="checkbox" id="showStepsCheckbox" />
      Show Steps Output
    </label>
  </fieldset>

  <fieldset>
    <legend>Find Min / Max / Height / Size</legend>
    <button id="minBtn">Find Min</button>
    <button id="maxBtn">Find Max</button>
    <button id="heightBtn">Get Height</button>
    <button id="sizeBtn">Get Size</button>
  </fieldset>

  <fieldset>
    <legend>Tree Rotations Demo</legend>
    <button id="demoLL">Demo LL (Right Rotation)</button>
    <button id="demoRR">Demo RR (Left Rotation)</button>
    <button id="demoLR">Demo LR (Left-Right Rotation)</button>
    <button id="demoRL">Demo RL (Right-Left Rotation)</button>
  </fieldset>

  <fieldset>
    <legend>Node Probe</legend>
    <label for="probeInput">Key: </label>
    <input type="number" id="probeInput" />
    <button id="probeBtn">Show Node Details</button>
  </fieldset>

</div>

<div id="output" aria-live="polite" aria-atomic="true"></div>

<script>
(function(){
  'use strict';

  // AVL Node definition
  class AVLNode {
    constructor(key) {
      this.key = key;
      this.left = null;
      this.right = null;
      this.height = 1;
    }
  }

  class AVLTree {
    constructor() {
      this.root = null;
    }

    getHeight(node) {
      return node ? node.height : 0;
    }

    getBalance(node) {
      if (!node) return 0;
      return this.getHeight(node.left) - this.getHeight(node.right);
    }

    rightRotate(y) {
      const x = y.left;
      const T2 = x.right;

      // Perform rotation
      x.right = y;
      y.left = T2;

      // Update heights
      y.height = Math.max(this.getHeight(y.left), this.getHeight(y.right)) + 1;
      x.height = Math.max(this.getHeight(x.left), this.getHeight(x.right)) + 1;

      return x;
    }

    leftRotate(x) {
      const y = x.right;
      const T2 = y.left;

      // Perform rotation
      y.left = x;
      x.right = T2;

      // Update heights
      x.height = Math.max(this.getHeight(x.left), this.getHeight(x.right)) + 1;
      y.height = Math.max(this.getHeight(y.left), this.getHeight(y.right)) + 1;

      return y;
    }

    insert(node, key, steps) {
      if (!node) {
        steps.push(`Insert key ${key}: New node created.`);
        return new AVLNode(key);
      }

      if (key === node.key) {
        steps.push(`Insert key ${key}: Key already exists; no insertion.`);
        return node; // no duplicates allowed
      } else if (key < node.key) {
        steps.push(`Insert key ${key}: Descend left from node with key ${node.key}.`);
        node.left = this.insert(node.left, key, steps);
      } else {
        steps.push(`Insert key ${key}: Descend right from node with key ${node.key}.`);
        node.right = this.insert(node.right, key, steps);
      }

      // update height
      node.height = 1 + Math.max(this.getHeight(node.left), this.getHeight(node.right));

      const balance = this.getBalance(node);
      steps.push(`Check balance at node ${node.key}: ${balance}.`);

      // cases
      // Left Left
      if (balance > 1 && key < node.left.key) {
        steps.push(`Imbalance detected: Left Left case at node ${node.key}. Perform right rotation.`);
        return this.rightRotate(node);
      }
      // Right Right
      if (balance < -1 && key > node.right.key) {
        steps.push(`Imbalance detected: Right Right case at node ${node.key}. Perform left rotation.`);
        return this.leftRotate(node);
      }
      // Left Right
      if (balance > 1 && key > node.left.key) {
        steps.push(`Imbalance detected: Left Right case at node ${node.key}. Perform left rotation at left child, then right rotation at current node.`);
        node.left = this.leftRotate(node.left);
        return this.rightRotate(node);
      }
      // Right Left
      if (balance < -1 && key < node.right.key) {
        steps.push(`Imbalance detected: Right Left case at node ${node.key}. Perform right rotation at right child, then left rotation at current node.`);
        node.right = this.rightRotate(node.right);
        return this.leftRotate(node);
      }

      return node;
    }

    minValueNode(node) {
      let current = node;
      while (current.left !== null) current = current.left;
      return current;
    }

    maxValueNode(node) {
      let current = node;
      while (current.right !== null) current = current.right;
      return current;
    }

    remove(node, key, steps) {
      if (!node) {
        steps.push(`Remove key ${key}: Key not found.`);
        return node;
      }

      if (key < node.key) {
        steps.push(`Remove key ${key}: Descend left from node ${node.key}.`);
        node.left = this.remove(node.left, key, steps);
      } else if (key > node.key) {
        steps.push(`Remove key ${key}: Descend right from node ${node.key}.`);
        node.right = this.remove(node.right, key, steps);
      } else {
        steps.push(`Remove key ${key}: Node found.`);

        // node with one or no child
        if (!node.left || !node.right) {
          const temp = node.left ? node.left : node.right;
          if (!temp) {
            steps.push(`Node ${node.key} is a leaf; removing it.`);
            node = null;
          } else {
            steps.push(`Node ${node.key} has one child; replacing with the child.`);
            node = temp;
          }
        } else {
          // node with two children
          steps.push(`Node ${node.key} has two children; finding inorder successor.`);
          const temp = this.minValueNode(node.right);
          steps.push(`Inorder successor is ${temp.key}. Replacing node ${node.key} key with ${temp.key}.`);
          node.key = temp.key;
          node.right = this.remove(node.right, temp.key, steps);
        }
      }

      // if tree had only one node then return
      if (!node) return node;

      // update height
      node.height = 1 + Math.max(this.getHeight(node.left), this.getHeight(node.right));

      const balance = this.getBalance(node);
      steps.push(`Check balance at node ${node.key} after removal: ${balance}.`);

      // Balancing the node
      // Left Left
      if (balance > 1 && this.getBalance(node.left) >= 0) {
        steps.push(`Imbalance detected: Left Left case at node ${node.key}. Perform right rotation.`);
        return this.rightRotate(node);
      }
      // Left Right
      if (balance > 1 && this.getBalance(node.left) < 0) {
        steps.push(`Imbalance detected: Left Right case at node ${node.key}. Perform left rotation at left child, then right rotation.`);
        node.left = this.leftRotate(node.left);
        return this.rightRotate(node);
      }
      // Right Right
      if (balance < -1 && this.getBalance(node.right) <= 0) {
        steps.push(`Imbalance detected: Right Right case at node ${node.key}. Perform left rotation.`);
        return this.leftRotate(node);
      }
      // Right Left
      if (balance < -1 && this.getBalance(node.right) > 0) {
        steps.push(`Imbalance detected: Right Left case at node ${node.key}. Perform right rotation at right child, then left rotation.`);
        node.right = this.rightRotate(node.right);
        return this.leftRotate(node);
      }

      return node;
    }

    search(node, key, path) {
      if (!node) {
        path.push(`Key ${key} not found.`);
        return null;
      }
      path.push(`Visiting node ${node.key}.`);
      if (key === node.key) {
        path.push(`Found key ${key}.`);
        return node;
      }
      if (key < node.key) {
        path.push(`Going left.`);
        return this.search(node.left, key, path);
      } else {
        path.push(`Going right.`);
        return this.search(node.right, key, path);
      }
    }

    inorder(node, arr) {
      if (node) {
        this.inorder(node.left, arr);
        arr.push(node.key);
        this.inorder(node.right, arr);
      }
    }
    preorder(node, arr) {
      if (node) {
        arr.push(node.key);
        this.preorder(node.left, arr);
        this.preorder(node.right, arr);
      }
    }
    postorder(node, arr) {
      if (node) {
        this.postorder(node.left, arr);
        this.postorder(node.right, arr);
        arr.push(node.key);
      }
    }
    levelOrder(node, arr) {
      if (!node) return;
      let queue = [node];
      while(queue.length > 0){
        let size = queue.length;
        let level = [];
        for(let i=0;i<size;i++){
          let n = queue.shift();
          level.push(n.key);
          if(n.left) queue.push(n.left);
          if(n.right) queue.push(n.right);
        }
        arr.push(level);
      }
    }

    size(node) {
      if (!node) return 0;
      return 1 + this.size(node.left) + this.size(node.right);
    }

    height(node) {
      return node ? node.height : 0;
    }

    // Produce a textual structured view of the tree
    treeString(node, prefix="", isLeft=true) {
      if (!node) return prefix + (isLeft ? "└── (null)\n" : "┌── (null)\n");
      let str = "";
      if (node.right) {
        str += this.treeString(node.right, prefix + (isLeft ? "│   " : "    "), false);
      } else {
        str += prefix + (isLeft ? "│   " : "    ") + "┌── (null)\n";
      }
      str += prefix + (isLeft ? "└── " : "┌── ") + node.key + "\n";
      if (node.left) {
        str += this.treeString(node.left, prefix + (isLeft ? "    " : "│   "), true);
      } else {
        str += prefix + (isLeft ? "    " : "│   ") + "└── (null)\n";
      }
      return str;
    }

    // Produce a textual view of node keys and their balance factors
    balanceString(node, prefix = "", isLeft = true) {
      if (!node) return prefix + (isLeft ? "└── (null)\n" : "┌── (null)\n");
      let str = "";
      if (node.right) {
        str += this.balanceString(node.right, prefix + (isLeft ? "│   " : "    "), false);
      } else {
        str += prefix + (isLeft ? "│   " : "    ") + "┌── (null)\n";
      }
      let bal = this.getBalance(node);
      str += prefix + (isLeft ? "└── " : "┌── ") + node.key + " (B: " + bal + ")\n";
      if (node.left) {
        str += this.balanceString(node.left, prefix + (isLeft ? "    " : "│   "), true);
      } else {
        str += prefix + (isLeft ? "    " : "│   ") + "└── (null)\n";
      }
      return str;
    }
  }

  // Utility parse text for bulk insertion
  function parseBulkInput(text) {
    let values = text.split(/[\s,]+/).filter((v)=>v.trim()!=='' );
    let nums = [];
    for(let v of values){
      let n = Number(v);
      if (!Number.isInteger(n)) return null;
      nums.push(n);
    }
    return nums;
  }

  // DOM Elements
  const valInput = document.getElementById('valInput');
  const insertBtn = document.getElementById('insertBtn');
  const removeBtn = document.getElementById('removeBtn');
  const searchBtn = document.getElementById('searchBtn');
  const clearBtn = document.getElementById('clearBtn');

  const traversalSelect = document.getElementById('traversalSelect');
  const showTraversalBtn = document.getElementById('showTraversalBtn');
  const showTreeBtn = document.getElementById('showTreeBtn');
  const showBalanceBtn = document.getElementById('showBalanceBtn');

  const bulkInput = document.getElementById('bulkInput');
  const bulkInsertBtn = document.getElementById('bulkInsertBtn');

  const delayRange = document.getElementById('delayRange');
  const delayVal = document.getElementById('delayVal');
  const stepBtn = document.getElementById('stepBtn');
  const autoRunBtn = document.getElementById('autoRunBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const showStepsCheckbox = document.getElementById('showStepsCheckbox');

  const minBtn = document.getElementById('minBtn');
  const maxBtn = document.getElementById('maxBtn');
  const heightBtn = document.getElementById('heightBtn');
  const sizeBtn = document.getElementById('sizeBtn');

  const demoLL = document.getElementById('demoLL');
  const demoRR = document.getElementById('demoRR');
  const demoLR = document.getElementById('demoLR');
  const demoRL = document.getElementById('demoRL');

  const probeInput = document.getElementById('probeInput');
  const probeBtn = document.getElementById('probeBtn');

  const output = document.getElementById('output');

  // AVL Tree instance
  const tree = new AVLTree();

  // Step queue for animation and stepping
  let stepQueue = [];
  let autoRunInterval = null;

  function outputAppend(text) {
    if (showStepsCheckbox.checked) {
      output.textContent += text + "\n";
      output.scrollTop = output.scrollHeight;
    }
  }

  function outputSet(text) {
    output.textContent = text;
  }

  // Insert wrapper with steps & optional animation delay
  function insertKey(key) {
    stepQueue.push({
      type: "insert",
      key: key,
      steps: []
    });
    processStepQueue();
  }

  // Remove wrapper
  function removeKey(key) {
    stepQueue.push({
      type: "remove",
      key: key,
      steps: []
    });
    processStepQueue();
  }

  // Process one step in the queue, returns true if something processed
  function processStep() {
    if (stepQueue.length === 0) return false;
    let current = stepQueue[0];
    if (!current.processed) {
      if (current.type === "insert") {
        current.steps.length = 0;
        tree.root = tree.insert(tree.root, current.key, current.steps);
        current.processed = true;
        outputAppend(`=== Insertion of ${current.key} ===`);
        current.stepIndex = 0;
      } else if (current.type === "remove") {
        current.steps.length = 0;
        tree.root = tree.remove(tree.root, current.key, current.steps);
        current.processed = true;
        outputAppend(`=== Removal of ${current.key} ===`);
        current.stepIndex = 0;
      }
    }
    if (current.stepIndex < current.steps.length) {
      outputAppend(current.steps[current.stepIndex]);
      current.stepIndex++;
      return true;
    } else {
      stepQueue.shift();
      return processStep(); // immediately run next if any steps remain
    }
  }

  // Process full queue at once with no delay
  function processAllSteps() {
    while(stepQueue.length > 0){
      let current = stepQueue.shift();
      if (current.type === "insert") {
        current.steps.length = 0;
        tree.root = tree.insert(tree.root, current.key, current.steps);
        outputAppend(`=== Insertion of ${current.key} ===`);
      } else if (current.type === "remove") {
        current.steps.length = 0;
        tree.root = tree.remove(tree.root, current.key, current.steps);
        outputAppend(`=== Removal of ${current.key} ===`);
      }
      for(let s of current.steps){
        outputAppend(s);
      }
    }
  }

  // Process Step Queue with delay given by slider
  function processStepQueue() {
    if (autoRunInterval) return;

    let delay = +delayRange.value;
    if (delay === 0) {
      processAllSteps();
    } else {
      stepBtn.disabled = true;
      autoRunBtn.disabled = true;
      pauseBtn.disabled = false;
      // Run automatically with delay
      autoRunInterval = setInterval(()=>{
        let somethingDone = false;
        if (stepQueue.length > 0){
          let current = stepQueue[0];
          if (!current.processed) {
            current.steps.length = 0;
            if (current.type === "insert") {
              tree.root = tree.insert(tree.root, current.key, current.steps);
            } else if (current.type === "remove") {
              tree.root = tree.remove(tree.root, current.key, current.steps);
            }
            outputAppend(`=== ${current.type === "insert" ? 'Insertion' : 'Removal'} of ${current.key} ===`);
            current.processed = true;
            current.stepIndex=0;
          }
          if(current.stepIndex < current.steps.length) {
            outputAppend(current.steps[current.stepIndex]);
            current.stepIndex++;
            somethingDone = true;
          } else {
            stepQueue.shift();
            somethingDone = true;
          }
        } else {
          clearInterval(autoRunInterval);
          autoRunInterval = null;
          outputAppend('All steps complete.');
          stepBtn.disabled = false;
          autoRunBtn.disabled = false;
          pauseBtn.disabled = true;
        }
      }, delay);
    }
  }

  // Single step function for manual stepping
  function stepOnce() {
    if (autoRunInterval) {
      // Do nothing if auto running
      return;
    }
    if (stepQueue.length === 0) {
      outputAppend("No actions in queue.");
      return;
    }
    const current = stepQueue[0];
    if (!current.processed) {
      current.steps.length = 0;
      if (current.type === "insert") {
        tree.root = tree.insert(tree.root, current.key, current.steps);
      } else if (current.type === "remove") {
        tree.root = tree.remove(tree.root, current.key, current.steps);
      }
      outputAppend(`=== ${current.type === "insert" ? 'Insertion' : 'Removal'} of ${current.key} ===`);
      current.processed = true;
      current.stepIndex=0;
    }
    if (current.stepIndex < current.steps.length) {
      outputAppend(current.steps[current.stepIndex]);
      current.stepIndex++;
    } else {
      stepQueue.shift();
      if (stepQueue.length === 0) {
        outputAppend("All steps processed.");
      }
    }
  }

  // Auto run button press
  function autoRun() {
    if (autoRunInterval) return; // already running
    processStepQueue();
  }

  // Pause button press
  function pause() {
    if(autoRunInterval){
      clearInterval(autoRunInterval);
      autoRunInterval = null;
      outputAppend("Auto run paused.");
      stepBtn.disabled = false;
      autoRunBtn.disabled = false;
      pauseBtn.disabled = true;
    }
  }

  // Show traversal outputs
  function showTraversal() {
    if (!tree.root) {
      outputSet("Tree is empty.");
      return;
    }
    let arr = [];
    let t = traversalSelect.value;
    if (t === "inorder") {
      tree.inorder(tree.root, arr);
      outputSet("Inorder traversal:\n" + arr.join(" "));
    } else if (t === "preorder") {
      tree.preorder(tree.root, arr);
      outputSet("Preorder traversal:\n" + arr.join(" "));
    } else if (t === "postorder") {
      tree.postorder(tree.root, arr);
      outputSet("Postorder traversal:\n" + arr.join(" "));
    } else if (t === "levelorder") {
      tree.levelOrder(tree.root, arr);
      let lines = arr.map(level => level.join(" "));
      outputSet("Level-order traversal:\n" + lines.join("\n"));
    }
  }

  // Show tree structure in textual form
  function showTreeStructure() {
    if (!tree.root) {
      outputSet("Tree is empty.");
      return;
    }
    let str = "Tree structure (rotated - root center):\n";
    str += tree.treeString(tree.root);
    outputSet(str);
  }

  // Show node balances along with tree structure
  function showBalances() {
    if (!tree.root) {
      outputSet("Tree is empty.");
      return;
    }
    let str = "Tree structure with balance factors (B):\n";
    str += tree.balanceString(tree.root);
    outputSet(str);
  }

  // Find min key
  function showMin() {
    if (!tree.root) {
      outputSet("Tree is empty.");
      return;
    }
    let node = tree.minValueNode(tree.root);
    outputSet("Minimum key: " + node.key);
  }

  // Find max key
  function showMax() {
    if (!tree.root) {
      outputSet("Tree is empty.");
      return;
    }
    let node = tree.maxValueNode(tree.root);
    outputSet("Maximum key: " + node.key);
  }

  // Show height (root height = height of tree)
  function showHeight() {
    if (!tree.root) {
      outputSet("Tree is empty.");
      return;
    }
    outputSet("Tree height: " + tree.height(tree.root));
  }

  // Show size (number of nodes)
  function showSize() {
    if (!tree.root) {
      outputSet("Tree is empty.");
      return;
    }
    outputSet("Tree size (number of nodes): " + tree.size(tree.root));
  }

  // Show node details by key probe
  function probeNode() {
    const key = parseInt(probeInput.value, 10);
    if (Number.isNaN(key)) {
      outputSet("Input is not a valid integer.");
      return;
    }
    let path = [];
    let node = tree.search(tree.root, key, path);
    outputSet("Node probe path:\n" + path.join("\n") + "\n\n" +
      (node ? `Node details:\nKey: ${node.key}\nHeight: ${node.height}\nBalance factor: ${tree.getBalance(node)}\nLeft child: ${node.left ? node.left.key : 'null'}\nRight child: ${node.right ? node.right.key : 'null'}` : "Node not found in tree."));
  }

  // Demo insertions for rotations
  function demoLLRotation() {
    // Clear tree, then insert to produce LL imbalance => right rotation
    tree.root = null;
    stepQueue.length = 0;
    outputSet("Demo LL rotation:\nInserting 30, 20, 10 to trigger LL imbalance.");
    stepQueue.push({type:"insert", key:30, steps:[], processed:false});
    stepQueue.push({type:"insert", key:20, steps:[], processed:false});
    stepQueue.push({type:"insert", key:10, steps:[], processed:false});
    processStepQueue();
  }

  function demoRRRotation() {
    tree.root = null;
    stepQueue.length = 0;
    outputSet("Demo RR rotation:\nInserting 10, 20, 30 to trigger RR imbalance.");
    stepQueue.push({type:"insert", key:10, steps:[], processed:false});
    stepQueue.push({type:"insert", key:20, steps:[], processed:false});
    stepQueue.push({type:"insert", key:30, steps:[], processed:false});
    processStepQueue();
  }

  function demoLRRotation() {
    tree.root = null;
    stepQueue.length = 0;
    outputSet("Demo LR rotation:\nInserting 30, 10, 20 to trigger LR imbalance.");
    stepQueue.push({type:"insert", key:30, steps:[], processed:false});
    stepQueue.push({type:"insert", key:10, steps:[], processed:false});
    stepQueue.push({type:"insert", key:20, steps:[], processed:false});
    processStepQueue();
  }

  function demoRLRotation() {
    tree.root = null;
    stepQueue.length = 0;
    outputSet("Demo RL rotation:\nInserting 10, 30, 20 to trigger RL imbalance.");
    stepQueue.push({type:"insert", key:10, steps:[], processed:false});
    stepQueue.push({type:"insert", key:30, steps:[], processed:false});
    stepQueue.push({type:"insert", key:20, steps:[], processed:false});
    processStepQueue();
  }

  // Event listeners

  insertBtn.addEventListener('click', () => {
    const key = parseInt(valInput.value, 10);
    if (Number.isNaN(key)) {
      outputSet("Insert: Please input a valid integer.");
      return;
    }
    insertKey(key);
    valInput.value = "";
  });

  removeBtn.addEventListener('click', () => {
    const key = parseInt(valInput.value, 10);
    if (Number.isNaN(key)) {
      outputSet("Remove: Please input a valid integer.");
      return;
    }
    removeKey(key);
    valInput.value = "";
  });

  searchBtn.addEventListener('click', () => {
    const key = parseInt(valInput.value, 10);
    if (Number.isNaN(key)) {
      outputSet("Search: Please input a valid integer.");
      return;
    }
    let path = [];
    let node = tree.search(tree.root, key, path);
    outputSet("Search path:\n" + path.join("\n") + "\n\n" +
      (node ? `Key ${key} found in tree.` : `Key ${key} not found.`));
    valInput.value = "";
  });

  clearBtn.addEventListener('click', () => {
    tree.root = null;
    stepQueue.length = 0;
    outputSet("Tree has been cleared.");
  });

  showTraversalBtn.addEventListener('click', () => {
    showTraversal();
  });

  showTreeBtn.addEventListener('click', () => {
    showTreeStructure();
  });

  showBalanceBtn.addEventListener('click', () => {
    showBalances();
  });

  bulkInsertBtn.addEventListener('click', () => {
    let nums = parseBulkInput(bulkInput.value);
    if (!nums) {
      outputSet("Bulk Insert: Input must be space or comma separated integers only.");
      return;
    }
    for(let n of nums){
      stepQueue.push({type:"insert", key: n, steps: [], processed:false});
    }
    bulkInput.value = "";
    processStepQueue();
  });

  delayRange.addEventListener('input', () => {
    delayVal.textContent = delayRange.value + " ms";
  });

  stepBtn.addEventListener('click', () => {
    stepOnce();
  });

  autoRunBtn.addEventListener('click', () => {
    autoRun();
  });

  pauseBtn.addEventListener('click', () => {
    pause();
  });

  minBtn.addEventListener('click', () => {
    showMin();
  });

  maxBtn.addEventListener('click', () => {
    showMax();
  });

  heightBtn.addEventListener('click', () => {
    showHeight();
  });

  sizeBtn.addEventListener('click', () => {
    showSize();
  });

  demoLL.addEventListener('click', () => {
    demoLLRotation();
  });

  demoRR.addEventListener('click', () => {
    demoRRRotation();
  });

  demoLR.addEventListener('click', () => {
    demoLRRotation();
  });

  demoRL.addEventListener('click', () => {
    demoRLRotation();
  });

  probeBtn.addEventListener('click', () => {
    probeNode();
  });

  // Initialize UI display for delay
  delayVal.textContent = delayRange.value + " ms";
})();
</script>

</body>
</html>
