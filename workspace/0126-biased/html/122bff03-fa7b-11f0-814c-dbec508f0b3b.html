<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kruskal's Algorithm</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
        }
        #input-container {
            display: inline-block;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #input-container input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
        }
        #kruskal-button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #kruskal-button:hover {
            background-color: #3e8e41;
        }
        #kruskal-output {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Kruskal's Algorithm</h1>
    <div id="input-container">
        <input type="number" id="m" value="3">
        <label for="m">Maximum edges:</label>
        <br>
        <input type="number" id="e" value="0">
        <label for="e">Minimum edges:</label>
        <br>
        <input type="number" id="k" value="4">
        <label for="k">Number of edges:</label>
        <br>
        <button id="kruskal-button">Kruskal's Algorithm</button>
        <br>
        <button id="run-button">Run</button>
    </div>
    <div id="kruskal-output"></div>

    <script>
        const m = parseInt(document.getElementById('m').value);
        const e = parseInt(document.getElementById('e').value);
        const k = parseInt(document.getElementById('k').value);

        const edges = [];

        function addEdge(u, v) {
            edges.push([u, v]);
        }

        function kruskal() {
            edges.sort((a, b) => a[1] - b[1]);
            let result = [];
            let i = 0;
            let j = 0;

            while (i < edges.length && j < edges.length) {
                if (edges[i][0] < edges[j][0]) {
                    result.push(edges[i]);
                    i++;
                } else if (edges[i][0] > edges[j][0]) {
                    result.push(edges[j]);
                    j++;
                } else {
                    i++;
                    j++;
                }
            }

            return result;
        }

        function run() {
            const result = kruskal();
            const output = result.map((edge, i) => {
                return `<${i+1}> ${edge[0]} - ${edge[1]} (${edge[1] - edge[0]})`;
            }).join('\n');

            document.getElementById('kruskal-output').innerHTML = output;
        }

        document.getElementById('run-button').addEventListener('click', run);

        document.getElementById('kruskal-button').addEventListener('click', () => {
            run();
        });
    </script>
</body>
</html>
