<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doubly Linked List</title>
    <style>
        body {
            font-family: monospace;
            font-size: 12px;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        #list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #list li {
            padding: 5px;
            border-bottom: 1px solid #ccc;
        }
        #list li:last-child {
            border-bottom: none;
        }
        #add {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        #remove {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        #prev, #next {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        #prev:hover, #next:hover {
            background-color: #ccc;
        }
        #prev, #next, #add, #remove {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Doubly Linked List</h1>
    <ul id="list"></ul>
    <div>
        <input id="add" type="text" placeholder="Add node">
        <button id="add-btn">Add</button>
        <button id="remove-btn">Remove</button>
        <button id="prev-btn">Previous</button>
        <button id="next-btn">Next</button>
    </div>

    <script>
        let head = document.createElement('head');
        document.body.appendChild(head);

        let list = document.getElementById('list');
        let add = document.getElementById('add');
        let remove = document.getElementById('remove');
        let prev = document.getElementById('prev');
        let next = document.getElementById('next');
        let addBtn = document.getElementById('add-btn');
        let removeBtn = document.getElementById('remove-btn');

        addBtn.addEventListener('click', addNode);
        removeBtn.addEventListener('click', removeNode);
        prev.addEventListener('click', movePrev);
        next.addEventListener('click', moveNext);

        let headNode = {
            value: '',
            prev: null,
            next: null
        };

        let tailNode = {
            value: '',
            prev: null,
            next: null
        };

        function addNode() {
            let value = add.value.trim();
            if (value !== '') {
                let newNode = {
                    value,
                    prev: headNode,
                    next: headNode.next
                };
                if (headNode === null) {
                    headNode = newNode;
                } else {
                    tailNode.next = newNode;
                    newNode.next.prev = tailNode;
                }
                list.innerHTML += `<li>${newNode.value}</li>`;
                add.value = '';
            }
        }

        function removeNode() {
            list.innerHTML = '';
            let value = remove.value.trim();
            if (value !== '') {
                let node = list.querySelector(`li[value="${value}"]`);
                if (node !== null) {
                    if (node === headNode) {
                        headNode = headNode.next;
                    } else {
                        node.next.prev = node.prev;
                    }
                    if (node.prev === null) {
                        tailNode = node;
                    } else {
                        node.prev.next = node.next;
                    }
                    list.innerHTML = '';
                    node.value = '';
                }
            }
        }

        function movePrev() {
            let current = list.querySelector('li[value="'];
            if (current !== null) {
                let prevNode = current.prev;
                if (prevNode !== null) {
                    list.innerHTML = '';
                    let value = prevNode.value;
                    let newNode = {
                        value,
                        prev: headNode,
                        next: headNode.next
                    };
                    if (headNode === null) {
                        headNode = newNode;
                    } else {
                        tailNode.next = newNode;
                        newNode.next.prev = tailNode;
                    }
                    list.innerHTML += `<li>${newNode.value}</li>`;
                    prevNode.value = '';
                    current.value = value;
                    current.prev.value = '';
                }
            }
        }

        function moveNext() {
            let current = list.querySelector('li[value="'];
            if (current !== null) {
                let nextNode = current.next;
                if (nextNode !== null) {
                    list.innerHTML = '';
                    let value = nextNode.value;
                    let newNode = {
                        value,
                        prev: headNode,
                        next: headNode.next
                    };
                    if (headNode === null) {
                        headNode = newNode;
                    } else {
                        tailNode.next = newNode;
                        newNode.next.prev = tailNode;
                    }
                    list.innerHTML += `<li>${newNode.value}</li>`;
                    nextNode.value = '';
                    current.value = value;
                    current.next.value = '';
                }
            }
        }
    </script>
</body>
</html>
