<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Search Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Linear Search Demonstration</h1>
    
    <label for="arrayInput">Enter numbers (comma-separated):</label>
    <input type="text" id="arrayInput" placeholder="e.g. 1, 2, 3, 4, 5">
    
    <label for="targetInput">Enter target number:</label>
    <input type="number" id="targetInput" placeholder="Target number">
    
    <button id="searchButton">Search</button>
    
    <h2>Search Result:</h2>
    <p id="resultOutput"></p>
    
    <h2>Search Steps:</h2>
    <ul id="stepsOutput"></ul>
    
    <script>
        document.getElementById('searchButton').addEventListener('click', function() {
            const arrayInput = document.getElementById('arrayInput').value;
            const target = parseInt(document.getElementById('targetInput').value);
            const array = arrayInput.split(',').map(num => parseInt(num.trim()));
            let result = 'Not Found';
            let steps = [];
            
            for (let i = 0; i < array.length; i++) {
                steps.push(`Checking index ${i}: value ${array[i]}`);
                if (array[i] === target) {
                    result = `Found at index ${i}`;
                    break;
                }
            }

            document.getElementById('resultOutput').innerText = result;
            document.getElementById('stepsOutput').innerHTML = steps.map(step => `<li>${step}</li>`).join('');
        });
    </script>
</body>
</html>
