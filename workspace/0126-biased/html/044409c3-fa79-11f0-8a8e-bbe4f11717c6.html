<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .main {
            padding: 20px;
        }
        
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>HTTP</h1>
        </div>
        <div class="main">
            <p>HTTP is a protocol for transferring data over the internet.</p>
            <button class="button" id="get-started">Get Started</button>
            <button class="button" id="get-learned">Get Learned</button>
        </div>
    </div>

    <script>
        const button1 = document.getElementById('get-started');
        const button2 = document.getElementById('get-learned');

        button1.addEventListener('click', () => {
            console.log('Button 1 clicked');
        });

        button2.addEventListener('click', () => {
            console.log('Button 2 clicked');
        });
    </script>
</body>
</html>
