<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Trees</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .text {
            font-size: 14px;
            margin-bottom: 20px;
        }
        .example {
            margin-bottom: 20px;
        }
        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <h1>Decision Trees</h1>
    <p id="concept"></p>
    <p id="theory"></p>
    <p id="algorithms"></p>
    <p id="textual-explanations"></p>
    <p id="educational-content"></p>
    <button id="demo-button">Explore Decision Trees</button>
    <div id="interactivity"></div>

    <script>
        // Concept
        const conceptText = `
            A decision tree is a tree-like data structure used for data classification, feature selection, and model selection. It is a type of supervised learning algorithm that uses a set of rules to make predictions on new, unseen data.
        `;
        document.getElementById("concept").innerHTML = conceptText;

        // Theory
        const theoryText = `
            A decision tree consists of a root node, which represents the entire dataset, and one or more leaf nodes, which represent the predicted class or outcome. The tree is constructed by recursively partitioning the data into subsets based on a feature or attribute.
            The tree is then traversed from the root node to the leaf nodes, using a set of rules (also known as decision rules or decision nodes) to classify the data. The rules are based on the feature or attribute and the relationship between the feature and the target variable.
        `;
        document.getElementById("theory").innerHTML = theoryText;

        // Algorithms
        const algorithmsText = `
            There are several algorithms used to construct decision trees, including:
                1. ID3 (Iterative Dichotomizer 3): This is a popular algorithm for building decision trees. It works by recursively partitioning the data into subsets based on the most informative feature.
                2. C4.5 (Decision Trees with 5 Leaves): This algorithm is similar to ID3, but it uses a different set of rules to classify the data.
                3. C5.0 (Decision Trees with 5 Leaves): This algorithm is similar to C4.5, but it uses a different set of rules to classify the data.
        `;
        document.getElementById("algorithms").innerHTML = algorithmsText;

        // Textual explanations
        const textualExplanationsText = `
            Decision trees are useful for classification problems, as they can be used to predict the most likely class or outcome for new, unseen data.
            The tree is constructed by recursively partitioning the data into subsets based on a feature or attribute.
            The tree is then traversed from the root node to the leaf nodes, using a set of rules (also known as decision rules or decision nodes) to classify the data.
            The rules are based on the feature or attribute and the relationship between the feature and the target variable.
            Decision trees can be used for feature selection, as they can be used to identify the most important features in the data.
            Decision trees can be used for model selection, as they can be used to identify the best model for a given dataset.
            Decision trees can be used for hyperparameter tuning, as they can be used to identify the best hyperparameters for a given model.
        `;
        document.getElementById("textual-explanations").innerHTML = textualExplanationsText;

        // Educational content
        const educationalContentText = `
            Here are some key concepts to keep in mind when building decision trees:
                1. The root node represents the entire dataset.
                2. The tree is constructed by recursively partitioning the data into subsets based on a feature or attribute.
                3. The tree is then traversed from the root node to the leaf nodes, using a set of rules (also known as decision rules or decision nodes) to classify the data.
                4. The rules are based on the feature or attribute and the relationship between the feature and the target variable.
            To build a decision tree, start by selecting a feature or attribute that is most relevant to the problem.
            Then, use the feature to partition the data into subsets.
            Next, use the rules to classify the data in each subset.
            Finally, use the decision tree to make predictions on new, unseen data.
        `;
        document.getElementById("educational-content").innerHTML = educationalContentText;

        // Demo button
        const demoButton = document.getElementById("demo-button");
        demoButton.addEventListener("click", function() {
            // Simple demonstration of a decision tree
            const data = [
                { feature: "age", value: 25 },
                { feature: "age", value: 30 },
                { feature: "age", value: 35 },
                { feature: "age", value: 40 },
                { feature: "age", value: 45 },
                { feature: "age", value: 50 }
            ];
            const tree = buildDecisionTree(data);
            displayTree(tree);
        });

        // Function to build a decision tree
        function buildDecisionTree(data) {
            // Simple implementation of ID3 algorithm
            let tree = {};
            let bestFeature = null;
            let bestThreshold = null;
            for (let i = 0; i < data.length; i++) {
                let feature = data[i].feature;
                let value = data[i].value;
                if (bestFeature === null || bestThreshold === null) {
                    tree[feature] = value;
                    bestFeature = feature;
                    bestThreshold = value;
                } else if (bestFeature !== feature) {
                    let left = {};
                    let right = {};
                    if (value < bestThreshold) {
                        left[feature] = value;
                    } else {
                        right[feature] = value;
                    }
                    tree[feature] = { left, right };
                    bestFeature = feature;
                    bestThreshold = value;
                }
            }
            return tree;
        }

        // Function to display a decision tree
        function displayTree(tree, indent = 0) {
            let html = "";
            for (let feature in tree) {
                html += "  <div style='margin-left: " + (indent * 2) + "px;'>" + feature + "</div>";
                if (tree[feature].left && tree[feature].left !== null) {
                    html += "<div style='margin-left: " + ((indent + 1) * 2) + "px;'>" + displayTree(tree[feature].left, indent + 1) + "</div>";
                }
                if (tree[feature].right && tree[feature].right !== null) {
                    html += "<div style='margin-left: " + ((indent + 1) * 2) + "px;'>" + displayTree(tree[feature].right, indent + 1) + "</div>";
                }
            }
            document.getElementById("interactivity").innerHTML = html;
        }
    </script>
</body>
</html>
