<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Patterns</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .slider {
            width: 50%;
            margin: 20px auto;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .input-field {
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .button:hover, .slider:hover, .input-field:hover {
            background-color: #ccc;
        }
        
        .error-message {
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Design Patterns</h1>
        <p>This example demonstrates several design patterns in a simple interactive interface.</p>
        
        <div class="button-group">
            <button class="button" onclick="addPerson()">Add Person</button>
            <button class="button" onclick="deletePerson()">Delete Person</button>
        </div>
        
        <div class="slider">
            <input type="range" id="personSlider" min="1" max="10" value="5">
            <label for="personSlider">Person Slider:</label>
        </div>
        
        <div class="input-field">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="John">
            <span id="errorMessage"></span>
        </div>
        
        <div class="button-group">
            <button class="button" onclick="saveData()">Save Data</button>
            <button class="button" onclick="clearData()">Clear Data</button>
        </div>
    </div>
    
    <script>
        function addPerson() {
            var name = document.getElementById("name").value;
            if (name.length < 2) {
                document.getElementById("errorMessage").innerHTML = "Name must be at least 2 characters.";
            } else {
                document.getElementById("errorMessage").innerHTML = "";
                // Add person to data storage
            }
        }
        
        function deletePerson() {
            var name = document.getElementById("name").value;
            if (name.length < 2) {
                document.getElementById("errorMessage").innerHTML = "Name must be at least 2 characters.";
            } else {
                // Delete person from data storage
            }
        }
        
        function saveData() {
            var data = {
                name: document.getElementById("name").value,
                age: parseInt(document.getElementById("age").value)
            };
            // Save data to storage
        }
        
        function clearData() {
            document.getElementById("name").value = "";
            document.getElementById("age").value = "";
        }
    </script>
</body>
</html>
