<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Decision Trees Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .description {
            font-size: 1.2rem;
            color: #34495e;
            margin-bottom: 40px;
        }

        .tree-container {
            width: 500px;
            height: 500px;
            position: relative;
            margin: auto;
            border: 5px solid #8e44ad;
            border-radius: 15px;
            overflow: hidden;
            background: linear-gradient(to bottom right, #ffffff, #eaeaea);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: fadeIn 1s ease-in-out;
        }

        .node {
            position: absolute;
            padding: 15px 25px;
            background: #2ecc71;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .node:hover {
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .button {
            padding: 10px 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 5px;
            background-color: #2980b9;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 20px;
        }

        .button:hover {
            background-color: #3498db;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Decision Trees Visualization</h1>
        <p class="description">Observe the beauty of decision-making represented through trees!</p>
        
        <div class="tree-container">
            <div class="node" style="top: 30%; left: 40%;">Root Node</div>
            <div class="node" style="top: 60%; left: 20%;">Left Child</div>
            <div class="node" style="top: 60%; left: 60%;">Right Child</div>
            <div class="node" style="top: 80%; left: 10%;">Left Left Grandchild</div>
            <div class="node" style="top: 80%; left: 30%;">Left Right Grandchild</div>
            <div class="node" style="top: 80%; left: 50%;">Right Left Grandchild</div>
            <div class="node" style="top: 80%; left: 70%;">Right Right Grandchild</div>
        </div>
        
        <button class="button" onclick="alert('This is an informative visualization of Decision Trees!')">Learn More</button>
    </div>

    <script>
        // JavaScript for minimal interactivity can be added here if needed,
        // but it's purposefully limited for this example
    </script>
</body>

</html>
