<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizing Random Forest</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #002e5d, #2a9d8f);
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 800px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.7);
            animation: fadeIn 1s ease-in;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        .button {
            padding: 10px 20px;
            font-size: 1.2em;
            border: none;
            border-radius: 5px;
            background: #e76f51;
            color: white;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
        }
        .button:hover {
            background: #d24a37;
            transform: scale(1.05);
        }
        .chart-container {
            position: relative;
            width: 100%;
            height: 400px;
            margin-top: 20px;
            background: url('https://images.unsplash.com/photo-1582567656978-dc65e95c5116?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MXwyMDg0NzR8MHwxfGFsbHwxfHx8fHx8fHwxNjMwNDk3NjA5&ixlib=rb-1.2.1&q=80&w=1080') no-repeat center center/cover;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }
        .tree {
            width: 400px;
            height: 400px;
            margin: 0 auto;
            opacity: 0;
            animation: fadeIn 2s forwards;
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Visualizing Random Forest</h1>
        <p>Explore the beauty of machine learning with the Random Forest algorithm, where each tree contributes to the final decision.</p>
        <button class="button" id="showTrees">Show Trees</button>
        <div class="chart-container">
            <img id="treeImage" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Decision_Tree_Classifier_%26_Regression_Tree_%28DTC%29.svg/673px-Decision_Tree_Classifier_%26_Regression_Tree_%28DTC%29.svg.png" class="tree" alt="Random Forest Visualization" />
        </div>
    </div>

    <script>
        document.getElementById('showTrees').addEventListener('click', function () {
            const treeImg = document.getElementById('treeImage');
            treeImg.style.opacity = '1';
        });
    </script>
</body>
</html>
