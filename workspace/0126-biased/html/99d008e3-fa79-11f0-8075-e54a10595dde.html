<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relational Database Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<h1>Relational Database Demo</h1>

<h2>Add User</h2>
<input type="text" id="username" placeholder="Enter Username">
<button onclick="addUser()">Add User</button>

<h2>Users</h2>
<ul id="userList"></ul>

<h2>Add Post</h2>
<input type="text" id="postContent" placeholder="Enter Post Content">
<select id="userSelect"></select>
<button onclick="addPost()">Add Post</button>

<h2>Posts</h2>
<ul id="postList"></ul>

<h2>Filter Posts</h2>
<select id="filterUserSelect" onchange="filterPosts()"></select>

<script>
    let users = [];
    let posts = [];

    function addUser() {
        const username = document.getElementById('username').value;
        if (username) {
            users.push(username);
            document.getElementById('username').value = '';
            updateUserList();
            updateUserSelect();
            updateFilterUserSelect();
        }
    }

    function updateUserList() {
        const userList = document.getElementById('userList');
        userList.innerHTML = '';
        users.forEach((user, index) => {
            const li = document.createElement('li');
            li.textContent = user;
            userList.appendChild(li);
        });
    }

    function addPost() {
        const postContent = document.getElementById('postContent').value;
        const userIndex = document.getElementById('userSelect').value;
        if (postContent && userIndex !== "") {
            posts.push({ content: postContent, user: users[userIndex] });
            document.getElementById('postContent').value = '';
            updatePostList();
        }
    }

    function updatePostList() {
        const postList = document.getElementById('postList');
        postList.innerHTML = '';
        posts.forEach(post => {
            const li = document.createElement('li');
            li.textContent = `${post.user}: ${post.content}`;
            postList.appendChild(li);
        });
    }

    function updateUserSelect() {
        const userSelect = document.getElementById('userSelect');
        userSelect.innerHTML = '';
        users.forEach((user, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.textContent = user;
            userSelect.appendChild(option);
        });
    }

    function updateFilterUserSelect() {
        const filterUserSelect = document.getElementById('filterUserSelect');
        filterUserSelect.innerHTML = '';
        filterUserSelect.add(new Option("All Users", ""));
        users.forEach((user, index) => {
            filterUserSelect.add(new Option(user, index));
        });
    }

    function filterPosts() {
        const userIndex = document.getElementById('filterUserSelect').value;
        const postList = document.getElementById('postList');
        postList.innerHTML = '';
        posts.forEach(post => {
            if (userIndex === "" || users[userIndex] === post.user) {
                const li = document.createElement('li');
                li.textContent = `${post.user}: ${post.content}`;
                postList.appendChild(li);
            }
        });
    }
</script>

</body>
</html>
