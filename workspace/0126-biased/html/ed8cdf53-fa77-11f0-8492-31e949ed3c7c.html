<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree Visualization</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #4A90E2;
            margin-bottom: 40px;
        }
        #bst-container {
            position: relative;
            max-width: 900px;
            margin: auto;
            padding: 20px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .node {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #8E44AD;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            transition: transform 0.5s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .link {
            position: absolute;
            width: 2px;
            background-color: #555;
            transition: height 0.5s;
        }
        button {
            margin: 20px auto;
            display: block;
            padding: 15px 30px;
            font-size: 16px;
            color: white;
            background-color: #4A90E2;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        button:hover {
            background-color: #357ABD;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Binary Search Tree Visualization</h1>
    <div id="bst-container"></div>
    <button id="showTree">Show BST</button>

    <script>
        const bstData = [
            { value: 8, left: 3, right: 10 },
            { value: 3, left: 1, right: 6 },
            { value: 10, left: null, right: 14 },
            { value: 6, left: 4, right: 7 },
            { value: 1, left: null, right: null },
            { value: 4, left: null, right: null },
            { value: 7, left: null, right: null },
            { value: 14, left: 13, right: null },
            { value: 13, left: null, right: null }
        ];

        const bstContainer = document.getElementById('bst-container');

        function createNode(node, x, y) {
            const nodeElem = document.createElement('div');
            nodeElem.className = 'node';
            nodeElem.style.left = `${x}px`;
            nodeElem.style.top = `${y}px`;
            nodeElem.innerText = node.value;
            bstContainer.appendChild(nodeElem);
            return nodeElem;
        }

        function createLink(parentX, parentY, childX, childY) {
            const link = document.createElement('div');
            link.className = 'link';
            link.style.left = `${parentX + 25}px`;
            link.style.top = `${parentY + 50}px`;
            const height = childY - parentY - 50;
            link.style.height = `${height}px`;
            bstContainer.appendChild(link);
        }

        function positionNodes(nodes, x, y, spacing) {
            if (nodes.length === 0) return;
            const midIndex = Math.floor(nodes.length / 2);
            const node = nodes[midIndex];

            const nodeElem = createNode(node, x, y);
            const leftX = x - spacing / 2;
            const rightX = x + spacing / 2;

            if (node.left !== null) {
                const leftNode = nodes.find(n => n.value === node.left);
                createLink(x, y, leftX, y + 100);
                positionNodes([leftNode], leftX, y + 100, spacing / 2);
            }
            if (node.right !== null) {
                const rightNode = nodes.find(n => n.value === node.right);
                createLink(x, y, rightX, y + 100);
                positionNodes([rightNode], rightX, y + 100, spacing / 2);
            }
        }

        document.getElementById('showTree').addEventListener('click', () => {
            bstContainer.innerHTML = '';
            positionNodes(bstData, 400, 20, 400);
        });
    </script>
</body>
</html>
