<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Queue</h1>
        <p>Observing the queue, waiting for my turn.</p>
        <button id="start-button">Start</button>
        <button id="end-button" disabled>End</button>
        <div class="queue-container">
            <div class="queue-item" id="item-1"></div>
            <div class="queue-item" id="item-2"></div>
            <div class="queue-item" id="item-3"></div>
        </div>
        <div class="animation-container">
            <div class="animation-item"></div>
            <div class="animation-item"></div>
            <div class="animation-item"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
