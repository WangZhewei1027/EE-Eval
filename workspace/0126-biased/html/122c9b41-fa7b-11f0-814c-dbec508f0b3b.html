<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Complexity</title>
    <style>
        body {
            background-color: #fff;
            font-family: Arial, sans-serif;
        }
        label {
            display: block;
            margin-bottom: 10px;
        }
        input[type="text"], input[type="number"] {
            width: 50%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
        button {
            width: 20%;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <h1>Space Complexity</h1>
    <p>Enter the maximum number of elements in a list:</p>
    <input type="number" id="max-elements" value="10">
    <button id="add-element">Add Element</button>
    <button id="remove-element">Remove Element</button>
    <button id="expand">Expand</button>
    <button id="collapse">Collapse</button>
    <button id="zoom">Zoom</button>
    <button id="reset">Reset</button>
    <button id="clear">Clear</button>
    <p id="result"></p>

    <script>
        let maxElements = 10;
        let currentElements = 0;
        let elements = [];

        // Add event listener to add element button
        document.getElementById("add-element").addEventListener("click", () => {
            const element = document.getElementById("max-elements").value;
            if (element > maxElements) {
                alert("Maximum number of elements exceeded!");
            } else {
                elements.push(element);
                currentElements += element;
                updateResult();
            }
        });

        // Add event listener to remove element button
        document.getElementById("remove-element").addEventListener("click", () => {
            const index = elements.indexOf(document.getElementById("max-elements").value);
            if (index !== -1) {
                elements.splice(index, 1);
                currentElements -= elements.length;
                updateResult();
            }
        });

        // Add event listener to expand button
        document.getElementById("expand").addEventListener("click", () => {
            if (currentElements > maxElements) {
                document.getElementById("max-elements").value = currentElements;
            } else {
                alert("Maximum number of elements exceeded!");
            }
        });

        // Add event listener to collapse button
        document.getElementById("collapse").addEventListener("click", () => {
            const currentElement = elements.length - 1;
            const currentElements = currentElement;
            document.getElementById("max-elements").value = currentElements;
            updateResult();
        });

        // Add event listener to zoom button
        document.getElementById("zoom").addEventListener("click", () => {
            const currentElement = elements.length - 1;
            const currentElements = currentElement;
            document.getElementById("max-elements").value = currentElements;
            updateResult();
        });

        // Add event listener to reset button
        document.getElementById("reset").addEventListener("click", () => {
            currentElements = 0;
            elements = [];
            updateResult();
        });

        // Add event listener to clear button
        document.getElementById("clear").addEventListener("click", () => {
            elements = [];
            updateResult();
        });

        // Add event listener to update result text
        document.getElementById("result").addEventListener("click", () => {
            if (currentElements === 0) {
                document.getElementById("result").innerHTML = "No elements";
            } else {
                document.getElementById("result").innerHTML = "You have " + currentElements + " elements.";
            }
        });

        function updateResult() {
            const result = "You have " + currentElements + " elements.";
            document.getElementById("result").innerHTML = result;
        }
    </script>
</body>
</html>
