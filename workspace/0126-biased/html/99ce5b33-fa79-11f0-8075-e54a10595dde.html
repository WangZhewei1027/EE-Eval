<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Tree Visualization</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #btreeDisplay { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>B-Tree Interactive Demo</h1>

    <label for="order">B-Tree Order (Number of Children): </label>
    <input type="number" id="order" value="3" min="2" max="10">
    <button id="createTree">Create B-Tree</button>
    
    <h2>Tree Operations</h2>
    <label for="insertValue">Insert Value: </label>
    <input type="number" id="insertValue">
    <button id="insertButton">Insert</button>

    <br><br>

    <label for="deleteValue">Delete Value: </label>
    <input type="number" id="deleteValue">
    <button id="deleteButton">Delete</button>
    
    <h2>B-Tree Structure</h2>
    <div id="btreeDisplay"></div>

    <script>
        class BTreeNode {
            constructor(t, leaf = true) {
                this.t = t; // Minimum degree
                this.leaf = leaf; // True if leaf node
                this.keys = []; // Array of keys
                this.children = []; // Child array
            }

            insertNonFull(key) {
                let i = this.keys.length - 1;

                if (this.leaf) {
                    while (i >= 0 && key < this.keys[i]) {
                        i--;
                    }
                    this.keys.splice(i + 1, 0, key);
                } else {
                    while (i >= 0 && key < this.keys[i]) {
                        i--;
                    }
                    if (this.children[i + 1].keys.length === 2 * this.t - 1) {
                        this.splitChild(i + 1);
                        if (key > this.keys[i + 1]) {
                            i++;
                        }
                    }
                    this.children[i + 1].insertNonFull(key);
                }
            }

            splitChild(i) {
                const t = this.t;
                const y = this.children[i];
                const z = new BTreeNode(y.t, y.leaf);
                
                this.keys.splice(i, 0, y.keys[t - 1]);
                this.children.splice(i + 1, 0, z);
                
                z.keys = y.keys.splice(t, t - 1);
                if (!y.leaf) {
                    z.children = y.children.splice(t, t);
                }
            }
        }

        class BTree {
            constructor(t) {
                this.root = new BTreeNode(t);
                this.t = t;
            }

            insert(key) {
                const root = this.root;
                if (root.keys.length === 2 * this.t - 1) {
                    const s = new BTreeNode(this.t, false);
                    s.children.push(root);
                    s.splitChild(0);
                    s.insertNonFull(key);
                    this.root = s;
                } else {
                    root.insertNonFull(key);
                }
            }

            delete(key) {
                // Deletion logic can be implemented if necessary
            }

            display(node = this.root) {
                let result = "Keys: " + node.keys.join(", ") + "<br>";
                if (!node.leaf) {
                    for (let i = 0; i < node.children.length; i++) {
                        result += this.display(node.children[i]);
                    }
                }
                return result;
            }
        }

        let bTree;

        document.getElementById('createTree').onclick = function() {
            const order = parseInt(document.getElementById('order').value);
            bTree = new BTree(order);
            document.getElementById('btreeDisplay').innerHTML = "B-Tree created with order " + order;
        };

        document.getElementById('insertButton').onclick = function() {
            const value = parseInt(document.getElementById('insertValue').value);
            if (bTree) {
                bTree.insert(value);
                document.getElementById('btreeDisplay').innerHTML = bTree.display();
            } else {
                alert("Please create a B-Tree first.");
            }
        };

        document.getElementById('deleteButton').onclick = function() {
            const value = parseInt(document.getElementById('deleteValue').value);
            if (bTree) {
                bTree.delete(value);
                // Update display after deletion (not implemented)
                // document.getElementById('btreeDisplay').innerHTML = bTree.display();
            } else {
                alert("Please create a B-Tree first.");
            }
        };
    </script>
</body>
</html>
