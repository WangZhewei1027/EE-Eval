<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deque Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #1c1f26, #1e2128);
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            background-color: #25282d;
            width: 90%;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5em;
            margin: 0;
            padding: 0 0 20px 0;
            background: linear-gradient(90deg, #4a90e2, #50e3c2);
            -webkit-background-clip: text;
            color: transparent;
            animation: glow 1.5s infinite alternate;
        }
        @keyframes glow {
            0% { text-shadow: 0 0 20px rgba(74, 144, 226, 0.7); }
            100% { text-shadow: 0 0 40px rgba(74, 144, 226, 1); }
        }
        .deque {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #4a90e2;
            border-radius: 10px;
            background: #2a2e35;
            transition: transform 0.5s ease-in-out;
        }
        .node {
            background: #4a90e2;
            border-radius: 10px;
            padding: 15px 20px;
            margin: 0 5px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .node:hover {
            transform: scale(1.1);
            background: #50e3c2;
        }
        .button {
            background: #4a90e2;
            border: none;
            border-radius: 5px;
            color: white;
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s ease, transform 0.3s ease;
        }
        .button:hover {
            background: #50e3c2;
            transform: translateY(-2px);
        }
        .button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Deque Visualization</h1>
        <div class="deque" id="deque">
            <div class="node">1</div>
            <div class="node">2</div>
            <div class="node">3</div>
            <div class="node">4</div>
            <div class="node">5</div>
        </div>
        <button class="button" id="addButton">Add Node</button>
    </div>
    
    <script>
        const deque = document.getElementById('deque');
        const addButton = document.getElementById('addButton');
        let count = 6;

        addButton.addEventListener('click', () => {
            const newNode = document.createElement('div');
            newNode.classList.add('node');
            newNode.textContent = count++;
            deque.appendChild(newNode);
            deque.style.transform = 'scale(1.05)';
            setTimeout(() => {
                deque.style.transform = 'scale(1)';
            }, 300);
        });
    </script>
</body>
</html>
