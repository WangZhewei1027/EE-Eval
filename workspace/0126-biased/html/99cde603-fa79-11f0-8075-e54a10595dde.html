<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack Interaction Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #stackContainer { margin-top: 20px; }
        #stackDisplay { margin-bottom: 20px; }
    </style>
</head>
<body>

<h2>Interactive Stack Demo</h2>

<label for="inputValue">Enter a value to push to the stack:</label>
<input type="text" id="inputValue" />
<button id="pushButton">Push</button>
<button id="popButton">Pop</button>
<button id="peekButton">Peek</button>
<button id="isEmptyButton">Is Empty?</button>
<button id="clearButton">Clear Stack</button>

<div id="stackContainer">
    <h3>Stack Display:</h3>
    <div id="stackDisplay"></div>
</div>

<script>
    const stack = [];
    const stackDisplay = document.getElementById("stackDisplay");
    const inputValue = document.getElementById("inputValue");

    function renderStack() {
        stackDisplay.innerText = stack.length === 0 ? "Stack is empty" : stack.join(", ");
    }

    document.getElementById("pushButton").onclick = function() {
        const value = inputValue.value;
        if(value) {
            stack.push(value);
            inputValue.value = "";
            renderStack();
        } else {
            alert("Please enter a value to push.");
        }
    };

    document.getElementById("popButton").onclick = function() {
        if (stack.length === 0) {
            alert("Stack is already empty.");
        } else {
            stack.pop();
            renderStack();
        }
    };

    document.getElementById("peekButton").onclick = function() {
        if (stack.length === 0) {
            alert("Stack is empty. No top element.");
        } else {
            alert("Top element: " + stack[stack.length - 1]);
        }
    };

    document.getElementById("isEmptyButton").onclick = function() {
        alert(stack.length === 0 ? "Stack is empty." : "Stack is not empty.");
    };

    document.getElementById("clearButton").onclick = function() {
        stack.length = 0;
        renderStack();
    };
</script>

</body>
</html>
