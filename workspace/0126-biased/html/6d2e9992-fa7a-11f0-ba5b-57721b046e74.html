<!DOCTYPE html>
<html>
<head>
    <title>Floyd-Warshall Algorithm Interactive</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .container { display: flex; flex-direction: column; gap: 20px; }
        .panel { border: 1px solid #ccc; padding: 15px; }
        .matrix-container { overflow-x: auto; }
        table { border-collapse: collapse; margin: 10px 0; }
        th, td { border: 1px solid #000; padding: 5px 10px; text-align: center; }
        input { width: 50px; text-align: center; }
        button { margin: 5px; padding: 5px 10px; }
        .highlight { background-color: #eee; }
        .current { background-color: #ddd; }
        .path { font-weight: bold; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; }
        .control-group { display: flex; flex-direction: column; margin-right: 20px; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        #graph-container { min-height: 300px; border: 1px solid #000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Floyd-Warshall Algorithm Interactive</h1>
        
        <div class="panel">
            <h2>Graph Configuration</h2>
            <div class="controls">
                <div class="control-group">
                    <label>Number of Nodes: <input type="number" id="nodeCount" min="2" max="10" value="4"></label>
                    <button id="updateSize">Update Size</button>
                </div>
                <div class="control-group">
                    <label>Edge Probability: <span id="probValue">50</span>% )</label>
                    <div class="slider-container">
                        <input type="range" id="edgeProbability" min="0" max="100" value="50">
                        <button id="randomGraph">Generate Random Graph</button>
                    </div>
                </div>
                <div class="control-group">
                    <label>Max Edge Weight: <input type="number" id="maxWeight" min="1" value="10"></label>
                </div>
            </div>
            
            <div class="matrix-container">
                <h3>Adjacency Matrix</h3>
                <div id="matrixEditor"></div>
            </div>
        </div>
        
        <div class="panel">
            <h2>Algorithm Execution</h2>
            <div class="controls">
                <button id="runStep">Step Forward</button>
                <button id="runFull">Run to Completion</button>
                <button id="reset">Reset</button>
                <div class="slider-container">
                    <label>Speed: <span id="speedValue">1x</span></label>
                    <input type="range" id="speedControl" min="1" max="10" value="1">
                </div>
            </div>
            
            <div>
                <h3>Current State (k = <span id="currentK">0</span>)</h3>
                <div id="currentMatrix"></div>
            </div>
            
            <div>
                <h3>Current Operation</h3>
                <div id="operationInfo">Not started</div>
            </div>
        </div>
        
        <div class="panel">
            <h2>Path Finder</h2>
            <div class="controls">
                <label>From: 
                    <select id="pathFrom"></select>
                </label>
                <label>To: 
                    <select id="pathTo"></select>
                </label>
                <button id="findPath">Find Shortest Path</button>
            </div>
            <div id="pathResult"></div>
            <div id="pathSteps"></div>
        </div>
        
        <div class="panel">
            <h2>Graph Representation</h2>
            <div id="graph-container"></div>
        </div>
    </div>

    <script>
        // Global state
        let graph = [];
        let n = 4;
        let currentK = 0;
        let distanceMatrix = [];
        let nextMatrix = [];
        let isRunning = false;
        let animationSpeed = 1;
        let animationId = null;
        let pathHighlightTimeout = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeControls();
            createMatrixEditor(n);
            generateRandomGraph();
            updateVisualization();
            
            // Event listeners
            document.getElementById('updateSize').addEventListener('click', function() {
                n = parseInt(document.getElementById('nodeCount').value);
                createMatrixEditor(n);
                generateRandomGraph();
                updateVisualization();
            });
            
            document.getElementById('randomGraph').addEventListener('click', function() {
                generateRandomGraph();
                updateVisualization();
            });
            
            document.getElementById('edgeProbability').addEventListener('input', function() {
                document.getElementById('probValue').textContent = this.value;
            });
            
            document.getElementById('runStep').addEventListener('click', function() {
                if (currentK >= n) return;
                performStep();
                updateVisualization();
            });
            
            document.getElementById('runFull').addEventListener('click', function() {
                if (isRunning) {
                    cancelAnimationFrame(animationId);
                    isRunning = false;
                    this.textContent = 'Run to Completion';
                } else {
                    isRunning = true;
                    this.textContent = 'Stop';
                    runAlgorithm();
                }
            });
            
            document.getElementById('reset').addEventListener('click', function() {
                resetAlgorithm();
                updateVisualization();
            });
            
            document.getElementById('speedControl').addEventListener('input', function() {
                animationSpeed = parseInt(this.value);
                document.getElementById('speedValue').textContent = animationSpeed + 'x';
            });
            
            document.getElementById('findPath').addEventListener('click', function() {
                findShortestPath();
            });
        });
        
        function initializeControls() {
            // Initialize path finder dropdowns
            updatePathSelects();
        }
        
        function updatePathSelects() {
            const fromSelect = document.getElementById('pathFrom');
            const toSelect = document.getElementById('pathTo');
            
            fromSelect.innerHTML = '';
            toSelect.innerHTML = '';
            
            for (let i = 0; i < n; i++) {
                const option1 = document.createElement('option');
                option1.value = i;
                option1.textContent = 'Node ' + i;
                
                const option2 = document.createElement('option');
                option2.value = i;
                option2.textContent = 'Node ' + i;
                
                fromSelect.appendChild(option1);
                toSelect.appendChild(option2);
            }
        }
        
        function createMatrixEditor(size) {
            const container = document.getElementById('matrixEditor');
            container.innerHTML = '';
            
            const table = document.createElement('table');
            const thead = document.createElement('thead');
            const tbody = document.createElement('tbody');
            
            // Create header row
            const headerRow = document.createElement('tr');
            const emptyHeader = document.createElement('th');
            headerRow.appendChild(emptyHeader);
            
            for (let i = 0; i < size; i++) {
                const th = document.createElement('th');
                th.textContent = i;
                headerRow.appendChild(th);
            }
            thead.appendChild(headerRow);
            
            // Create data rows
            for (let i = 0; i < size; i++) {
                const row = document.createElement('tr');
                const rowHeader = document.createElement('th');
                rowHeader.textContent = i;
                row.appendChild(rowHeader);
                
                for (let j = 0; j < size; j++) {
                    const cell = document.createElement('td');
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.id = `edge-${i}-${j}`;
                    input.value = i === j ? '0' : '';
                    input.placeholder = '∞';
                    cell.appendChild(input);
                    row.appendChild(cell);
                }
                tbody.appendChild(row);
            }
            
            table.appendChild(thead);
            table.appendChild(tbody);
            container.appendChild(table);
        }
        
        function generateRandomGraph() {
            n = parseInt(document.getElementById('nodeCount').value);
            const probability = parseInt(document.getElementById('edgeProbability').value) / 100;
            const maxWeight = parseInt(document.getElementById('maxWeight').value);
            
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    const input = document.getElementById(`edge-${i}-${j}`);
                    if (i === j) {
                        input.value = '0';
                    } else {
                        if (Math.random() < probability) {
                            input.value = Math.floor(Math.random() * maxWeight) + 1;
                        } else {
                            input.value = '';
                        }
                    }
                }
            }
            
            updatePathSelects();
        }
        
        function getGraphFromInput() {
            const matrix = [];
            for (let i = 0; i < n; i++) {
                matrix[i] = [];
                for (let j = 0; j < n; j++) {
                    const input = document.getElementById(`edge-${i}-${j}`);
                    matrix[i][j] = input.value === '' ? Infinity : parseInt(input.value);
                }
            }
            return matrix;
        }
        
        function resetAlgorithm() {
            currentK = 0;
            graph = getGraphFromInput();
            distanceMatrix = JSON.parse(JSON.stringify(graph));
            nextMatrix = Array(n).fill().map(() => Array(n).fill(null));
            
            // Initialize next matrix for path reconstruction
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    if (i !== j && isFinite(distanceMatrix[i][j])) {
                        nextMatrix[i][j] = j;
                    }
                }
            }
            
            document.getElementById('currentK').textContent = currentK;
            document.getElementById('operationInfo').textContent = 'Algorithm reset';
            isRunning = false;
            document.getElementById('runFull').textContent = 'Run to Completion';
            
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            if (pathHighlightTimeout) {
                clearTimeout(pathHighlightTimeout);
                pathHighlightTimeout = null;
            }
        }
        
        function performStep() {
            if (currentK >= n) return;
            
            const k = currentK;
            document.getElementById('operationInfo').textContent = `Processing intermediate node ${k}`;
            
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    if (distanceMatrix[i][k] + distanceMatrix[k][j] < distanceMatrix[i][j]) {
                        distanceMatrix[i][j] = distanceMatrix[i][k] + distanceMatrix[k][j];
                        nextMatrix[i][j] = nextMatrix[i][k];
                    }
                }
            }
            
            currentK++;
            document.getElementById('currentK').textContent = currentK;
            
            if (currentK >= n) {
                document.getElementById('operationInfo').textContent = 'Algorithm completed';
            }
        }
        
        function runAlgorithm() {
            if (currentK >= n) return;
            
            performStep();
            updateVisualization();
            
            if (currentK < n) {
                animationId = setTimeout(runAlgorithm, 1000 / animationSpeed);
            } else {
                isRunning = false;
                document.getElementById('runFull').textContent = 'Run to Completion';
            }
        }
        
        function updateVisualization() {
            updateCurrentMatrix();
            drawGraph();
        }
        
        function updateCurrentMatrix() {
            const container = document.getElementById('currentMatrix');
            container.innerHTML = '';
            
            const table = document.createElement('table');
            const thead = document.createElement('thead');
            const tbody = document.createElement('tbody');
            
            // Create header row
            const headerRow = document.createElement('tr');
            const emptyHeader = document.createElement('th');
            headerRow.appendChild(emptyHeader);
            
            for (let i = 0; i < n; i++) {
                const th = document.createElement('th');
                th.textContent = i;
                headerRow.appendChild(th);
            }
            thead.appendChild(headerRow);
            
            // Create data rows
            for (let i = 0; i < n; i++) {
                const row = document.createElement('tr');
                const rowHeader = document.createElement('th');
                rowHeader.textContent = i;
                row.appendChild(rowHeader);
                
                for (let j = 0; j < n; j++) {
                    const cell = document.createElement('td');
                    cell.textContent = distanceMatrix[i][j] === Infinity ? '∞' : distanceMatrix[i][j];
                    
                    // Highlight cells that might be updated in current step
                    if (currentK > 0 && currentK <= n) {
                        const k = currentK - 1;
                        if (i === k || j === k) {
                            cell.classList.add('highlight');
                        }
                        
                        // Highlight cells that were updated
                        if (i !== k && j !== k && k < currentK) {
                            const original = graph[i][j];
                            const throughK = graph[i][k] + graph[k][j];
                            if (throughK < original) {
                                cell.classList.add('current');
                            }
                        }
                    }
                    
                    row.appendChild(cell);
                }
                tbody.appendChild(row);
            }
            
            table.appendChild(thead);
            table.appendChild(tbody);
            container.appendChild(table);
        }
        
        function findShortestPath() {
            const from = parseInt(document.getElementById('pathFrom').value);
            const to = parseInt(document.getElementById('pathTo').value);
            
            if (currentK < n) {
                document.getElementById('pathResult').textContent = 'Algorithm must complete first';
                return;
            }
            
            if (!isFinite(distanceMatrix[from][to])) {
                document.getElementById('pathResult').textContent = `No path exists from ${from} to ${to}`;
                document.getElementById('pathSteps').innerHTML = '';
                return;
            }
            
            const path = reconstructPath(from, to);
            document.getElementById('pathResult').textContent = `Shortest path from ${from} to ${to}: ${path.join(' → ')} (Total weight: ${distanceMatrix[from][to]})`;
            
            // Show path steps
            let stepsHTML = '<h4>Path Reconstruction Steps:</h4><ol>';
            for (let i = 0; i < path.length - 1; i++) {
                const u = path[i];
                const v = path[i+1];
                stepsHTML += `<li>Direct edge from ${u} to ${v} (weight: ${graph[u][v]})</li>`;
            }
            stepsHTML += '</ol>';
            document.getElementById('pathSteps').innerHTML = stepsHTML;
            
            // Highlight path in visualization
            highlightPath(path);
        }
        
        function reconstructPath(u, v) {
            if (nextMatrix[u][v] === null) return [];
            
            const path = [u];
            while (u !== v) {
                u = nextMatrix[u][v];
                path.push(u);
            }
            return path;
        }
        
        function highlightPath(path) {
            // Clear previous highlights
            const cells = document.querySelectorAll('#currentMatrix td');
            cells.forEach(cell => cell.classList.remove('path'));
            
            // Highlight path in distance matrix
            for (let i = 0; i < path.length - 1; i++) {
                const u = path[i];
                const v = path[i+1];
                const cell = document.querySelector(`#currentMatrix tr:nth-child(${u+2}) td:nth-child(${v+2})`);
                if (cell) cell.classList.add('path');
            }
            
            // Also highlight in graph visualization
            drawGraph(path);
            
            // Remove highlights after 5 seconds
            if (pathHighlightTimeout) {
                clearTimeout(pathHighlightTimeout);
            }
            pathHighlightTimeout = setTimeout(() => {
                cells.forEach(cell => cell.classList.remove('path'));
                drawGraph();
                pathHighlightTimeout = null;
            }, 5000);
        }
        
        function drawGraph(highlightPath = []) {
            const container = document.getElementById('graph-container');
            container.innerHTML = '';
            
            const canvas = document.createElement('canvas');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            container.appendChild(canvas);
            
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(canvas.width, canvas.height) * 0.4;
            
            // Draw edges first
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    if (i !== j && isFinite(graph[i][j])) {
                        const angle1 = (i / n) * Math.PI * 2;
                        const angle2 = (j / n) * Math.PI * 2;
                        
                        const x1 = centerX + Math.cos(angle1) * radius;
                        const y1 = centerY + Math.sin(angle1) * radius;
                        const x2 = centerX + Math.cos(angle2) * radius;
                        const y2 = centerY + Math.sin(angle2) * radius;
                        
                        // Check if this edge is part of the highlighted path
                        const isPathEdge = highlightPath.length > 0 && 
                            highlightPath.includes(i) && highlightPath.includes(j) &&
                            Math.abs(highlightPath.indexOf(i) - highlightPath.indexOf(j)) === 1;
                        
                        if (isPathEdge) {
                            ctx.strokeStyle = '#f00';
                            ctx.lineWidth = 3;
                        } else {
                            ctx.strokeStyle = '#000';
                            ctx.lineWidth = 1;
                        }
                        
                        // Draw arrow
                        drawArrow(ctx, x1, y1, x2, y2);
                        
                        // Draw weight
                        const midX = (x1 + x2) / 2;
                        const midY = (y1 + y2) / 2;
                        
                        ctx.fillStyle = isPathEdge ? '#f00' : '#000';
                        ctx.fillText(graph[i][j], midX, midY);
                    }
                }
            }
            
            // Draw nodes
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            
            for (let i = 0; i < n; i++) {
                const angle = (i / n) * Math.PI * 2;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                
                const isPathNode = highlightPath.includes(i);
                if (isPathNode) {
                    ctx.fillStyle = '#f88';
                } else {
                    ctx.fillStyle = '#fff';
                }
                
                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                
                ctx.fillStyle = '#000';
                ctx.fillText(i, x, y);
            }
        }
        
        function drawArrow(ctx, fromX, fromY, toX, toY) {
            const headLength = 10;
            const angle = Math.atan2(toY - fromY, toX - fromX);
            
            // Adjust start and end points to account for node radius
            const adjustedFromX = fromX + Math.cos(angle) * 20;
            const adjustedFromY = fromY + Math.sin(angle) * 20;
            const adjustedToX = toX - Math.cos(angle) * 20;
            const adjustedToY = toY - Math.sin(angle) * 20;
            
            // Draw line
            ctx.beginPath();
            ctx.moveTo(adjustedFromX, adjustedFromY);
            ctx.lineTo(adjustedToX, adjustedToY);
            ctx.stroke();
            
            // Draw arrow head
            ctx.beginPath();
            ctx.moveTo(adjustedToX, adjustedToY);
            ctx.lineTo(
                adjustedToX - headLength * Math.cos(angle - Math.PI / 6),
                adjustedToY - headLength * Math.sin(angle - Math.PI / 6)
            );
            ctx.lineTo(adjustedToX, adjustedToY);
            ctx.lineTo(
                adjustedToX - headLength * Math.cos(angle + Math.PI / 6),
                adjustedToY - headLength * Math.sin(angle + Math.PI / 6)
            );
            ctx.stroke();
        }
        
        // Initialize
        resetAlgorithm();
    </script>
</body>
</html>
