<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prim's Algorithm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        
        .container {
            width: 80%;
            margin: 40px auto;
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .graph {
            width: 100%;
            height: 80vh;
            background-color: #f0f0f0;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .button {
            width: 20%;
            margin: 10px auto;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Prim's Algorithm</h1>
        <p>This algorithm is used to find the minimum spanning tree of a graph.</p>
    </div>
    
    <div class="graph">
        <canvas id="graph-canvas" width="800" height="600"></canvas>
    </div>
    
    <script>
        const canvas = document.getElementById('graph-canvas');
        const ctx = canvas.getContext('2d');
        
        function drawGraph() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.moveTo(100, 50);
            ctx.lineTo(200, 100);
            ctx.lineTo(300, 200);
            ctx.lineTo(400, 50);
            ctx.lineTo(500, 100);
            ctx.lineTo(600, 200);
            ctx.lineTo(700, 50);
            ctx.stroke();
            ctx.font = '16px Arial';
            ctx.fillStyle = '#4CAF50';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText('Graph', 10, 10);
        }
        
        function drawNodes() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.arc(100, 100, 20, 0, 2 * Math.PI);
            ctx.fillStyle = '#4CAF50';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(200, 100, 20, 0, 2 * Math.PI);
            ctx.fillStyle = '#4CAF50';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(300, 200, 20, 0, 2 * Math.PI);
            ctx.fillStyle = '#4CAF50';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(400, 200, 20, 0, 2 * Math.PI);
            ctx.fillStyle = '#4CAF50';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(500, 200, 20, 0, 2 * Math.PI);
            ctx.fillStyle = '#4CAF50';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(600, 200, 20, 0, 2 * Math.PI);
            ctx.fillStyle = '#4CAF50';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(700, 100, 20, 0, 2 * Math.PI);
            ctx.fillStyle = '#4CAF50';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(800, 100, 20, 0, 2 * Math.PI);
            ctx.fillStyle = '#4CAF50';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(900, 100, 20, 0, 2 * Math.PI);
            ctx.fillStyle = '#4CAF50';
            ctx.fill();
        }
        
        function drawEdges() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.moveTo(100, 50);
            ctx.lineTo(200, 100);
            ctx.lineTo(300, 200);
            ctx.lineTo(400, 50);
            ctx.lineTo(500, 100);
            ctx.lineTo(600, 200);
            ctx.lineTo(700, 50);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(200, 100);
            ctx.lineTo(300, 200);
            ctx.lineTo(400, 50);
            ctx.lineTo(500, 100);
            ctx.lineTo(600, 200);
            ctx.lineTo(700, 50);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(300, 200);
            ctx.lineTo(400, 50);
            ctx.lineTo(500, 100);
            ctx.lineTo(600, 200);
            ctx.lineTo(700, 50);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(400, 50);
            ctx.lineTo(500, 100);
            ctx.lineTo(600, 200);
            ctx.lineTo(700, 50);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(500, 100);
            ctx.lineTo(600, 200);
            ctx.lineTo(700, 50);
            ctx.stroke();
        }
        
        drawGraph();
        drawNodes();
        drawEdges();
        
        const graphCanvas = document.getElementById('graph-canvas');
        const graphCtx = graphCanvas.getContext('2d');
        graphCtx.strokeStyle = '#f0f0f0';
        graphCtx.lineWidth = 2;
        graphCtx.lineCap = 'round';
        graphCtx.lineJoin = 'round';
        
        const button = document.createElement('button');
        button.textContent = 'Draw Graph';
        button.addEventListener('click', drawGraph);
        document.body.appendChild(button);
        
        const button2 = document.createElement('button');
        button2.textContent = 'Draw Nodes';
        button2.addEventListener('click', drawNodes);
        document.body.appendChild(button2);
        
        const button3 = document.createElement('button');
        button3.textContent = 'Draw Edges';
        button3.addEventListener('click', drawEdges);
        document.body.appendChild(button3);
    </script>
</body>
</html>
