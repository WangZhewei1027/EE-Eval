<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paging</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px auto;
        }

        .button:hover {
            background-color: #3e8e41;
        }

        .pagination {
            text-align: center;
            margin-top: 20px;
        }

        .pagination li {
            display: inline-block;
            margin: 0 10px;
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
        }

        .pagination li.active {
            background-color: #4CAF50;
            color: #fff;
        }

        .pagination li a {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Paging</h1>
        <p>Beautiful, polished UI with smooth animations and transitions</p>
        <p>Professional color schemes and typography</p>
        <p>Visually stunning graphics and layouts</p>
        <p>Aesthetic appeal as the PRIMARY goal</p>

        <button class="button" onclick="page(1)">Previous</button>
        <button class="button" onclick="page(2)">Next</button>

        <div class="pagination">
            <li class="active" onclick="page(1)">1</li>
            <li onclick="page(2)">2</li>
            <li onclick="page(3)">3</li>
            <li onclick="page(4)">4</li>
            <li onclick="page(5)">5</li>
        </div>
    </div>

    <script>
        function page(pageNumber) {
            document.querySelector('.pagination li.active').classList.remove('active');
            document.querySelector(`.pagination li:nth-child(${pageNumber + 1})`).classList.add('active');
            document.querySelector('.container').style pageTransition = `opacity: ${pageNumber / 5};`;
        }
    </script>
</body>
</html>
