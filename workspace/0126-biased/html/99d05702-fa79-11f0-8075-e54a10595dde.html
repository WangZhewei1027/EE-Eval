<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCP/IP Simulation</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .control { margin: 5px; }
        #output { margin-top: 15px; border: 1px solid #000; padding: 5px; }
    </style>
</head>
<body>

<h1>TCP/IP Simulation</h1>
<div class="control">
    <label for="ipAddress">Enter IP Address:</label>
    <input type="text" id="ipAddress" placeholder="e.g. 192.168.1.1">
</div>
<div class="control">
    <label for="port">Enter Port:</label>
    <input type="number" id="port" value="80" min="1" max="65535">
</div>
<div class="control">
    <button id="connectBtn">Connect</button>
</div>
<div class="control">
    <label for="dataToSend">Data to Send:</label>
    <input type="text" id="dataToSend" placeholder="Enter data here...">
    <button id="sendDataBtn">Send Data</button>
</div>
<div class="control">
    <button id="disconnectBtn">Disconnect</button>
</div>
<div class="control">
    <input type="checkbox" id="verboseLogging">
    <label for="verboseLogging">Enable Verbose Logging</label>
</div>
<div class="control">
    <button id="resetBtn">Reset Simulation</button>
</div>

<div id="output"></div>

<script>
    let connectionState = "disconnected";
    let logOutput = "";
    
    document.getElementById('connectBtn').addEventListener('click', function() {
        const ip = document.getElementById('ipAddress').value;
        const port = document.getElementById('port').value;
        if (ip && port) {
            connectionState = "connected";
            logOutput += `Connected to ${ip}:${port}\n`;
            updateOutput();
        } else {
            alert("Please enter a valid IP address and port.");
        }
    });

    document.getElementById('sendDataBtn').addEventListener('click', function() {
        if (connectionState === "connected") {
            const data = document.getElementById('dataToSend').value;
            logOutput += `Sent data: ${data}\n`;
            updateOutput();
        } else {
            alert("You must be connected to send data.");
        }
    });

    document.getElementById('disconnectBtn').addEventListener('click', function() {
        if (connectionState === "connected") {
            connectionState = "disconnected";
            logOutput += `Disconnected.\n`;
            updateOutput();
        } else {
            alert("You are not connected.");
        }
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
        connectionState = "disconnected";
        logOutput = "Simulation reset.\n";
        updateOutput();
    });

    function updateOutput() {
        document.getElementById('output').textContent = logOutput;
        if (document.getElementById('verboseLogging').checked) {
            logOutput += `[Verbose Mode On] - Current State: ${connectionState}\n`;
            document.getElementById('output').textContent = logOutput;
        }
    }
</script>

</body>
</html>
