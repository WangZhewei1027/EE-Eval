<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Web Graph</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        :root {
            --space: #0b0d17;
            --nebula: #641f91;
            --star: #f3e5ff;
            --planet: #c792ea;
            --comet: #4fc1ff;
            --aurora: #0dc5dd;
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--space);
            font-family: 'Orbitron', sans-serif;
            color: var(--star);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }
        
        header {
            padding: 2rem;
            text-align: center;
            z-index: 10;
        }
        
        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(45deg, var(--comet), var(--aurora));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(79, 193, 255, 0.3);
        }
        
        .subtitle {
            font-size: 0.9rem;
            margin-top: 0.5rem;
            opacity: 0.8;
            letter-spacing: 2px;
        }
        
        .graph-container {
            position: relative;
            width: 90%;
            height: 70%;
            margin: auto;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .controls {
            position: absolute;
            bottom: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 10;
        }
        
        button {
            background: rgba(100, 31, 145, 0.3);
            border: 1px solid var(--nebula);
            color: var(--star);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(100, 31, 145, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.7rem;
        }
        
        button:hover {
            background: rgba(100, 31, 145, 0.6);
            box-shadow: 0 0 25px rgba(100, 31, 145, 0.8);
        }
        
        .node-info {
            position: absolute;
            bottom: 5rem;
            background: rgba(15, 15, 30, 0.8);
            border-radius: 10px;
            padding: 1rem;
            max-width: 300px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
            backdrop-filter: blur(5px);
            border: 1px solid var(--comet);
        }
        
        .node-info.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            background-color: var(--star);
            border-radius: 50%;
            opacity: 0.5;
            animation: float linear infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-1000px) rotate(720deg); }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <header>
        <h1>GALACTIC GRAPH</h1>
        <div class="subtitle">UNDIRECTED NEBULA NETWORK</div>
    </header>
    
    <div class="graph-container">
        <canvas id="graph"></canvas>
        <div class="node-info" id="nodeInfo">
            <h3>NODE DATA</h3>
            <p id="infoText">Select a node to view information</p>
        </div>
    </div>
    
    <div class="controls">
        <button id="recenter">Recenter Map</button>
        <button id="pulse">Pulse Network</button>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Create star particles
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 5;
                const posX = Math.random() * window.innerWidth;
                const duration = Math.random() * 30 + 20;
                const delay = Math.random() * 30;
                
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${posX}px`;
                particle.style.bottom = `-${size}px`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;
                
                particlesContainer.appendChild(particle);
            }
            
            // Graph setup
            const canvas = document.getElementById('graph');
            const ctx = canvas.getContext('2d');
            
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            const nodes = [];
            const edges = [];
            
            // Create cosmic nodes
            const nodeCount = 8;
            const radius = 20;
            const distance = Math.min(canvas.width, canvas.height) * 0.35;
            
            for (let i = 0; i < nodeCount; i++) {
                const angle = (i / nodeCount) * Math.PI * 2;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                
                nodes.push({
                    x: centerX + dx,
                    y: centerY + dy,
                    radius: radius,
                    color: getRandomColor(),
                    label: `NEBULA-${i+1}`,
                    connections: getRandomConnections(nodes.length, nodeCount)
                });
            }
            
            // Create connections between nodes
            nodes.forEach((node, i) => {
                node.connections.forEach(connIndex => {
                    if (!edges.some(edge => 
                        (edge.from === i && edge.to === connIndex) || 
                        (edge.from === connIndex && edge.to === i))) {
                        edges.push({
                            from: i,
                            to: connIndex
                        });
                    }
                });
            });
            
            // Animation variables
            let hoveredNode = null;
            let pulseActive = false;
            let pulseTime = 0;
            let rotationAngle = 0;
            
            // Main animation loop
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw connections with glow effect
                edges.forEach(edge => {
                    const fromNode = nodes[edge.from];
                    const toNode = nodes[edge.to];
                    
                    if (pulseActive) {
                        const pulseIntensity = Math.sin(pulseTime * 5) * 0.5 + 0.5;
                        
                        // Inner glow
                        ctx.beginPath();
                        ctx.moveTo(fromNode.x, fromNode.y);
                        ctx.lineTo(toNode.x, toNode.y);
                        ctx.strokeStyle = `rgba(79, 193, 255, ${0.3 * pulseIntensity})`;
                        ctx.lineWidth = 10;
                        ctx.stroke();
                        
                        // Outer glow
                        ctx.beginPath();
                        ctx.moveTo(fromNode.x, fromNode.y);
                        ctx.lineTo(toNode.x, toNode.y);
                        ctx.strokeStyle = `rgba(13, 197, 221, ${0.2 * pulseIntensity})`;
                        ctx.lineWidth = 30;
                        ctx.stroke();
                    }
                    
                    // Main connection line
                    drawConnectionLine(fromNode, toNode);
                });
                
                // Draw floating nodes
                nodes.forEach(node => {
                    drawNode(node);
                });
                
                // Rotate everything slowly
                nodes.forEach(node => {
                    const x = node.x - centerX;
                    const y = node.y - centerY;
                    const rotatedX = x * Math.cos(rotationAngle) - y * Math.sin(rotationAngle);
                    const rotatedY = x * Math.sin(rotationAngle) + y * Math.cos(rotationAngle);
                    node.x = centerX + rotatedX;
                    node.y = centerY + rotatedY;
                });
                
                rotationAngle += 0.0005;
                
                if (pulseActive) {
                    pulseTime += 0.05;
                    if (pulseTime >= Math.PI) {
                        pulseActive = false;
                    }
                }
                
                requestAnimationFrame(animate);
            }
            
            function drawNode(node) {
                // Node glow
                const gradient = ctx.createRadialGradient(
                    node.x, node.y, 0,
                    node.x, node.y, node.radius * 2
                );
                
                gradient.addColorStop(0, node.color);
                gradient.addColorStop(0.7, 'rgba(199, 146, 234, 0.5)');
                gradient.addColorStop(1, 'rgba(100, 31, 145, 0)');
                
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // Node core
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.fillStyle = node.color;
                ctx.fill();
                
                // Label
                if (node === hoveredNode) {
                    ctx.font = 'bold 12px Orbitron';
                    ctx.fillStyle = node.color;
                    ctx.textAlign = 'center';
                    ctx.fillText(node.label, node.x, node.y + node.radius + 20);
                }
            }
            
            function drawConnectionLine(fromNode, toNode) {
                ctx.beginPath();
                ctx.moveTo(fromNode.x, fromNode.y);
                ctx.lineTo(toNode.x, toNode.y);
                ctx.strokeStyle = 'rgba(79, 193, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            function getRandomColor() {
                const colors = ['#c792ea', '#4fc1ff', '#0dc5dd', '#f78c6c', '#ffcb6b'];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            function getRandomConnections(currentIndex, totalNodes) {
                const connCount = Math.floor(Math.random() * 3) + 1;
                const connections = new Set();
                
                while (connections.size < connCount) {
                    const randomNode = Math.floor(Math.random() * totalNodes);
                    if (randomNode !== currentIndex) {
                        connections.add(randomNode);
                    }
                }
                
                return Array.from(connections);
            }
            
            // Handle mouse events
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                hoveredNode = null;
                
                nodes.forEach(node => {
                    const dx = mouseX - node.x;
                    const dy = mouseY - node.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < node.radius * 2) {
                        hoveredNode = node;
                        
                        // Show node info
                        const nodeInfo = document.getElementById('nodeInfo');
                        const infoText = document.getElementById('infoText');
                        
                        nodeInfo.classList.add('show');
                        infoText.innerHTML = `
                            <span style="color: ${node.color}">●</span> ${node.label}<br>
                            Connections: ${node.connections.length}<br>
                            Sector: ${Math.floor(Math.random() * 1000) + 1000}
                        `;
                    }
                });
                
                if (!hoveredNode) {
                    document.getElementById('nodeInfo').classList.remove('show');
                }
            });
            
            // Button controls
            document.getElementById('recenter').addEventListener('click', () => {
                rotationAngle = 0;
            });
            
            document.getElementById('pulse').addEventListener('click', () => {
                pulseActive = true;
                pulseTime = 0;
            });
            
            // Start animation
            animate();
            
            // Handle resize
            window.addEventListener('resize', () => {
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                
                const newCenterX = canvas.width / 2;
                const newCenterY = canvas.height / 2;
                
                nodes.forEach(node => {
                    node.x = newCenterX + (node.x - centerX);
                    node.y = newCenterY + (node.y - centerY);
                });
                
                centerX = newCenterX;
                centerY = newCenterY;
            });
        });
    </script>
</body>
</html>
