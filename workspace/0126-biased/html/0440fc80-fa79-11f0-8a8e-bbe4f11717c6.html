<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        .container {
            width: 80%;
            margin: 40px auto;
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .footer {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
            clear: both;
        }
        
        .footer p {
            margin-bottom: 10px;
        }
        
        .button {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s ease;
        }
        
        .button:hover {
            background-color: #444;
        }
        
        .array {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .array h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .array p {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .array img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            margin-bottom: 20px;
        }
        
        .array button {
            width: 100%;
            height: 30px;
            margin-bottom: 10px;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s ease;
        }
        
        .array button:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Array</h1>
        </div>
        <div class="footer">
            <p>&copy; 2023 Array</p>
        </div>
        <div class="array">
            <h2>Example Array</h2>
            <p>This is an example array of numbers from 1 to 10.</p>
            <img src="https://picsum.photos/200/300" alt="Array Image">
            <div class="array button">
                <button onclick="printArray()">Print Array</button>
            </div>
            <div class="array button">
                <button onclick="printArray()">Print Array with Animation</button>
            </div>
        </div>
    </div>
    
    <script>
        function printArray() {
            console.log("Array: ", Array.from({length: 10}, (_, i) => i + 1));
            console.log("Array with Image: ", Array.from({length: 10}, (_, i) => i + 1).concat(["<img src='https://picsum.photos/200/300'>"]));
        }
    </script>
</body>
</html>
