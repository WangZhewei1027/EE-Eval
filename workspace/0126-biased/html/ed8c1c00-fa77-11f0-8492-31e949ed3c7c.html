<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Aesthetics</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #e6f7ff, #ccf2ff);
            color: #333;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            margin-top: 50px;
            color: #006699;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
            flex-wrap: wrap;
            position: relative;
            overflow: hidden;
        }

        .array-item {
            width: 120px;
            height: 120px;
            margin: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #4dd0e1;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            font-size: 2rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .array-item:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .footer {
            text-align: center;
            margin: 30px 0;
            font-size: 1.2rem;
            color: #4d4d4d;
            opacity: 0.7;
        }

        button {
            background-color: #006699;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #005f7f;
        }
    </style>
</head>
<body>

    <h1>Visualizing an Array</h1>
    <div class="container" id="arrayContainer">
        <!-- Array Items will be dynamically generated here -->
    </div>

    <div class="footer">
        <button id="shuffleButton">Shuffle Array</button>
        <p>Click to rearrange the items visually.</p>
    </div>

    <script>
        const arrayContainer = document.getElementById("arrayContainer");
        const shuffleButton = document.getElementById("shuffleButton");
        let arrayItems = [1, 2, 3, 4, 5, 6, 7, 8, 9];

        function renderArray() {
            arrayContainer.innerHTML = '';
            arrayItems.forEach(item => {
                const div = document.createElement("div");
                div.classList.add("array-item");
                div.textContent = item;
                arrayContainer.appendChild(div);
            });
        }

        function shuffleArray() {
            for (let i = arrayItems.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arrayItems[i], arrayItems[j]] = [arrayItems[j], arrayItems[i]];
            }
            renderArray();
        }

        shuffleButton.addEventListener("click", shuffleArray);

        // Initial render
        renderArray();
    </script>

</body>
</html>
