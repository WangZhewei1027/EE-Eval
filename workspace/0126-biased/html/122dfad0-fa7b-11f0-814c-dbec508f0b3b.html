<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runtime Environment</title>
    <style>
        body {
            background-color: #000;
        }
        input, button {
            padding: 5px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
        .button-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="button-container">
        <button id="reset-button">Reset</button>
        <button id="maximize-button">Maximize</button>
        <button id="minimize-button">Minimize</button>
        <button id="close-button">Close</button>
        <input type="text" id="search-input" placeholder="Search...">
        <input type="button" id="clear-button" value="Clear">
        <button id="save-button">Save</button>
        <button id="load-button">Load</button>
    </div>

    <script>
        let controls = [
            { id: 'reset-button', label: 'Reset' },
            { id: 'maximize-button', label: 'Maximize' },
            { id: 'minimize-button', label: 'Minimize' },
            { id: 'close-button', label: 'Close' },
            { id: 'search-input', label: 'Search...' },
            { id: 'clear-button', label: 'Clear' },
            { id: 'save-button', label: 'Save' },
            { id: 'load-button', label: 'Load' }
        ];

        let currentControl = null;
        let currentState = null;

        function updateControl() {
            const currentControl = controls.find(control => control.id === currentControl);
            const currentState = currentControl ? currentControl.label : '';

            document.getElementById('current-control').innerText = currentControl ? currentControl.label : 'No control selected';
            document.getElementById('current-state').innerText = currentState;
        }

        function toggleControl() {
            currentControl = controls.find(control => control.id === currentControl);
            updateControl();

            if (currentControl) {
                currentState = currentControl.label;
            }
        }

        function switchControl(newControl) {
            currentControl = newControl;
            updateControl();

            if (currentControl) {
                currentState = currentControl.label;
            }
        }

        document.getElementById('search-input').addEventListener('input', () => {
            currentControl = controls.find(control => control.id === 'search-input');
            updateControl();
        });

        document.getElementById('clear-button').addEventListener('click', () => {
            currentControl = controls.find(control => control.id === 'clear-button');
            updateControl();
        });

        document.getElementById('save-button').addEventListener('click', () => {
            currentControl = controls.find(control => control.id === 'save-button');
            updateControl();
        });

        document.getElementById('load-button').addEventListener('click', () => {
            currentControl = controls.find(control => control.id === 'load-button');
            updateControl();
        });

        document.getElementById('reset-button').addEventListener('click', () => {
            switchControl(null);
        });

        document.getElementById('maximize-button').addEventListener('click', () => {
            switchControl('Maximize');
        });

        document.getElementById('minimize-button').addEventListener('click', () => {
            switchControl('Minimize');
        });

        document.getElementById('close-button').addEventListener('click', () => {
            document.body.style.maxWidth = '0px';
            document.body.style.minWidth = '0px';
            document.body.style.maxHeight = '0px';
            document.body.style.minHeight = '0px';
            document.body.style.width = '0px';
            document.body.style.height = '0px';
            document.body.style.overflow = 'hidden';
            document.body.style.display = 'block';
            document.body.style.position = 'fixed';
            document.body.style.zIndex = '1000';
            document.body.style.background = 'none';
            document.body.style.border = 'none';
            document.body.style.boxSizing = 'border-box';
            document.body.style.mozBorder = 'none';
            document.body.style.msBorder = 'none';
            document.body.style.oBorder = 'none';
            document.body.style.webBorder = 'none';
            document.getElementById('reset-button').style.display = 'none';
            document.getElementById('maximize-button').style.display = 'none';
            document.getElementById('minimize-button').style.display = 'none';
            document.getElementById('close-button').style.display = 'none';
            document.getElementById('search-input').style.display = 'none';
            document.getElementById('clear-button').style.display = 'none';
            document.getElementById('save-button').style.display = 'none';
            document.getElementById('load-button').style.display = 'none';
            document.getElementById('button-container').style.display = 'none';
        });

        document.getElementById('maximize-button').addEventListener('click', () => {
            switchControl('Maximize');
        });

        document.getElementById('minimize-button').addEventListener('click', () => {
            switchControl('Minimize');
        });
    </script>
</body>
</html>
