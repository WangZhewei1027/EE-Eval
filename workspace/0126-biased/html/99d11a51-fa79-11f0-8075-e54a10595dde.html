<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistic Regression Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>Logistic Regression Interactive Demo</h1>
    
    <div>
        <label for="coef0">Coefficient 0 (Intercept):</label>
        <input type="number" id="coef0" value="0" step="0.1">
    </div>
    
    <div>
        <label for="coef1">Coefficient 1:</label>
        <input type="number" id="coef1" value="1" step="0.1">
    </div>
    
    <div>
        <label for="coef2">Coefficient 2:</label>
        <input type="number" id="coef2" value="1" step="0.1">
    </div>

    <div>
        <button id="updateButton">Update Model</button>
    </div>

    <h2>Input Value for Prediction</h2>
    <div>
        <label for="inputValue">Value:</label>
        <input type="number" id="inputValue" value="0" step="0.1">
    </div>
    
    <div>
        <button id="predictButton">Predict</button>
    </div>
    
    <h2>Output</h2>
    <div id="output"></div>
    
    <script>
        let coef0 = parseFloat(document.getElementById("coef0").value);
        let coef1 = parseFloat(document.getElementById("coef1").value);
        let coef2 = parseFloat(document.getElementById("coef2").value);
        
        document.getElementById("updateButton").addEventListener("click", function() {
            coef0 = parseFloat(document.getElementById("coef0").value);
            coef1 = parseFloat(document.getElementById("coef1").value);
            coef2 = parseFloat(document.getElementById("coef2").value);
            alert("Model Updated!");
        });
        
        document.getElementById("predictButton").addEventListener("click", function() {
            const inputValue = parseFloat(document.getElementById("inputValue").value);
            const z = coef0 + coef1 * inputValue + coef2 * Math.pow(inputValue, 2);
            const prediction = 1 / (1 + Math.exp(-z));
            document.getElementById("output").innerText = `Predicted Probability: ${prediction}`;
        });
    </script>
</body>
</html>
