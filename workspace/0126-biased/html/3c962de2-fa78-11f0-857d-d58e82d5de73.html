<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AVL Tree Concept Showcase</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;500;700&family=Playfair+Display:wght@600&display=swap');

  /* Reset and base */
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0; padding: 0;
    background: linear-gradient(135deg, #1f242f, #3a4762);
    color: #e0e6f1;
    font-family: 'Fira Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
    user-select: none;
  }

  header {
    width: 100%;
    padding: 2rem 0 1rem;
    text-align: center;
    color: #94a6d3;
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 2.25rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-shadow:
      0 0 8px rgba(77, 120, 251, 0.8),
      0 0 25px rgba(77, 120, 251, 0.7);
  }
  header small {
    display: block;
    font-weight: 300;
    font-size: 1rem;
    margin-top: 0.4rem;
    color: #7688b3cc;
    letter-spacing: 0.12em;
  }

  main {
    flex-grow: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 4rem;
    width: 100%;
    max-width: 1200px;
  }

  #avl-container {
    position: relative;
    width: 920px;
    height: 540px;
    background: radial-gradient(circle at center, #292e3e 35%, #1e2332 90%);
    border-radius: 18px;
    box-shadow:
      inset 0 0 70px #3651a5cc,
      0 0 30px rgba(85, 105, 230, 0.8),
      0 20px 40px rgba(30, 40, 70, 0.8);
    overflow: visible;
  }

  svg {
    display: block;
    margin: auto;
    overflow: visible;
  }

  /* Node Styles */
  .node-circle {
    fill: #466ef2;
    filter: drop-shadow(0 0 6px #78aaffcc);
    stroke: #aac6ff;
    stroke-width: 3px;
    transition: fill 0.4s ease, filter 0.4s ease;
    cursor: default;
  }
  .node-circle.balance-pos {
    fill: #5fc97f;
    filter: drop-shadow(0 0 10px #7eeaa3cc);
  }
  .node-circle.balance-neg {
    fill: #f26e66;
    filter: drop-shadow(0 0 10px #fb928dcc);
  }

  /* Node text */
  .node-text {
    font-family: 'Fira Sans', sans-serif;
    font-weight: 700;
    font-size: 20px;
    fill: #e2e8ff;
    pointer-events: none;
    user-select: none;
    filter: drop-shadow(0 0 2px #374978cc);
  }

  /* Balance factor text small circle */
  .balance-circle {
    fill: #1b264fcc;
    stroke: transparent;
    stroke-width: 0;
  }
  .balance-text {
    fill: #a7bbffcc;
    font-family: 'Fira Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    pointer-events: none;
    user-select: none;
  }

  /* Edges */
  .edge-line {
    stroke: #8ea0d3cc;
    stroke-width: 3;
    stroke-linecap: round;
    filter: drop-shadow(0 0 8px #7b8ccadd);
    transition: stroke 0.5s ease;
  }

  /* Glow keyframe for balanced nodes */
  @keyframes glowPulse {
    0%, 100% {
      filter: drop-shadow(0 0 12px #7eeaa3cc);
    }
    50% {
      filter: drop-shadow(0 0 20px #aaffcc99);
    }
  }
  .node-circle.balanced {
    animation: glowPulse 3s ease-in-out infinite;
  }

  /* Buttons styling */
  #controls {
    margin-top: 20px;
    display: flex;
    gap: 16px;
  }
  button {
    background: #2f3b7a;
    border: none;
    border-radius: 25px;
    padding: 12px 28px;
    font-family: 'Fira Sans', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #cbd5ff;
    box-shadow:
      0 0 8px #5473d7cc,
      inset 0 -3px 6px #20336a;
    cursor: pointer;
    transition:
      background-color 0.4s ease,
      box-shadow 0.5s ease,
      transform 0.15s ease;
    user-select: none;
    letter-spacing: 0.05em;
  }
  button:hover, button:focus {
    outline: none;
    background: #5273f5;
    box-shadow:
      0 0 20px #799dffdd,
      inset 0 -3px 7px #2f4ac9;
    transform: translateY(-2px);
  }
  button:active {
    transform: translateY(0);
    box-shadow: 0 0 10px #4661c1cc inset;
  }

  /* Tooltip style on nodes to show balance factor meaning */
  #tip {
    position: absolute;
    padding: 7px 14px;
    background: #222946dd;
    border-radius: 14px;
    box-shadow:
      0 0 13px 4px #567adcaa;
    color: #d1defd;
    font-family: 'Fira Sans', sans-serif;
    font-weight: 500;
    font-size: 13px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s ease;
    user-select: none;
    white-space: nowrap;
  }

  /* Footer */
  footer {
    font-family: 'Fira Sans', sans-serif;
    font-weight: 300;
    font-size: 13px;
    color: #7688b3aa;
    margin-top: 8px;
    letter-spacing: 0.1em;
    user-select: none;
  }
</style>
</head>
<body>
<header>
  AVL TREE CONCEPT
  <small>Balanced Binary Search Tree Visualization</small>
</header>

<main>
  <div id="avl-container" aria-label="AVL Tree visualization" role="img" aria-live="polite">
    <svg id="avl-svg" width="920" height="540" viewBox="0 0 920 540" aria-hidden="true" focusable="false" >
      <!-- Edges and nodes will be drawn here -->
    </svg>
    <div id="tip" role="tooltip" aria-hidden="true"></div>
  </div>
</main>

<div id="controls" role="region" aria-label="AVL Tree controls">
  <button id="btn-rotate" aria-describedby="btn-desc-rotate" title="Show next rotation example">Next Rotation</button>
  <button id="btn-reset" aria-describedby="btn-desc-reset" title="Reset to balanced state">Reset</button>
</div>
<div style="position: absolute; width: 1px; height: 1px; overflow: hidden; left: -10000px;" id="btn-desc-rotate">Demonstrates the next AVL tree rotation to restore balance</div>
<div style="position: absolute; width: 1px; height: 1px; overflow: hidden; left: -10000px;" id="btn-desc-reset">Resets the tree to the initial balanced state</div>

<footer>
  Crafted for exceptional visual clarity & aesthetics — © 2024
</footer>

<script>
/**
 * AVL Tree Visualization with polished aesthetics and minimal interactivity.
 * We present a single AVL tree that transitions between different rotation states.
 */

(() => {
  const svg = document.getElementById('avl-svg');
  const tip = document.getElementById('tip');
  const btnRotate = document.getElementById('btn-rotate');
  const btnReset = document.getElementById('btn-reset');

  // Layout constants
  const width = 920, height = 540;
  const nodeRadius = 30;
  const verticalGap = 130;
  const horizontalGap = 180;

  /**
   * AVL node structure for drawing
   * Each node has:
   * - id: unique identifier
   * - value: displayed number
   * - bf: balance factor (-1,0,1)
   * - x, y: position on canvas
   * - children: [leftNode, rightNode]
   */
  class Node {
    constructor(id, value, bf, x, y, left = null, right = null) {
      this.id = id;
      this.value = value;
      this.bf = bf;
      this.x = x;
      this.y = y;
      this.left = left;
      this.right = right;
    }
  }

  // We will show a sequence of 4 AVL tree states illustrating "Next Rotation":
  // 1) Balanced tree
  // 2) Imbalanced left-left
  // 3) After right rotation (balanced again)
  // 4) Imbalanced left-right (for more nuance)

  // Coordinates for root centered at (460,80)

  // STATES: array of root nodes with full subtree structure and positioning

  // Helper to create node with children including position
  // This info is hardcoded for beautiful layout, balanced by eye with symmetry.

  // State 0: Balanced AVL Tree
  const state0 = new Node('n1', 30, 0, 460, 80,
    new Node('n2', 20, 0, 280, 210,
      new Node('n4', 10, 0, 170, 340),
      new Node('n5', 25, 0, 370, 340)
    ),
    new Node('n3', 40, 0, 640, 210,
      null,
      new Node('n6', 50, 0, 740, 340)
    )
  );

  // State 1: Imbalanced left-left (bf = +2 at root), requires right rotation
  const state1 = new Node('n1', 30, +2, 460, 80,
    new Node('n2', 20, +1, 280, 210,
      new Node('n4', 10, 0, 170, 340),
      null
    ),
    new Node('n3', 40, 0, 640, 210, null, null)
  );

  // State 2: After right rotation - balanced
  const state2 = new Node('n2', 20, 0, 460, 80,
    new Node('n4', 10, 0, 280, 210),
    new Node('n1', 30, 0, 640, 210,
      null,
      new Node('n3', 40, 0, 740, 340)
    )
  );

  // State 3: Imbalanced left-right (bf at root = +2, left child bf = -1)
  // This will demonstrate needing Left-Right rotation
  const state3 = new Node('n1', 30, +2, 460, 80,
    new Node('n2', 20, -1, 280, 210,
      null,
      new Node('n5', 25, 0, 370, 340)
    ),
    new Node('n3', 40, 0, 640, 210)
  );

  // State 4: After left-right double rotation balanced (for Reset, same as state0)
  const states = [state0, state1, state2, state3];

  let currentIndex = 0;

  // Clear SVG children
  function clearSVG() {
    while (svg.firstChild) svg.removeChild(svg.firstChild);
  }

  // Create an SVG element with namespace
  function createSVGElement(name, attrs = {}) {
    const el = document.createElementNS("http://www.w3.org/2000/svg", name);
    for (let key in attrs) {
      if (attrs[key] !== null && attrs[key] !== undefined) {
        el.setAttribute(key, attrs[key]);
      }
    }
    return el;
  }

  // Traverse nodes and draw edges and nodes recursively
  function drawTree(root) {
    clearSVG();

    // We'll create edges before nodes, so edges are beneath nodes
    const edgesGroup = createSVGElement('g', {class: 'edges'});
    const nodesGroup = createSVGElement('g', {class: 'nodes'});

    // Recursively collect edges and nodes for the tree
    function traverse(node) {
      if (!node) return;

      const {x, y} = node;
      // Draw edges to left child
      if (node.left) {
        drawEdge(x, y, node.left.x, node.left.y, edgesGroup);
        traverse(node.left);
      }
      // Draw edges to right child
      if (node.right) {
        drawEdge(x, y, node.right.x, node.right.y, edgesGroup);
        traverse(node.right);
      }

      // Draw the node after edges
      drawNode(node, nodesGroup);
    }

    // Draw edges as smooth curved paths
    function drawEdge(x1, y1, x2, y2, container) {
      // We'll draw a quadratic Bezier curve to create a smooth edge

      // Control point is horizontally centered between nodes, vertical is y1 + (y2 - y1)/2
      const cx = (x1 + x2) / 2;
      const cy = y1 + (y2 - y1)/2;

      const path = createSVGElement('path', {
        d: `M ${x1} ${y1 + nodeRadius} Q ${cx} ${cy} ${x2} ${y2 - nodeRadius}`,
        class: 'edge-line',
        'aria-hidden': 'true',
      });
      container.appendChild(path);
    }

    // Draw single node circle with text and small bf circle
    function drawNode(node, container) {
      const g = createSVGElement('g', {class: 'node-group', 'aria-label': `Node ${node.value} balance factor ${node.bf}`, role: 'img'});

      // Node circle color based on bf value:
      // bf === 0 balanced, bf > 0 left-heavy, bf < 0 right-heavy
      let circleClass = 'node-circle';
      if (node.bf === 0) circleClass += ' balanced';
      else if (node.bf > 0) circleClass += ' balance-pos';
      else if (node.bf < 0) circleClass += ' balance-neg';

      const circle = createSVGElement('circle', {
        class: circleClass,
        cx: node.x,
        cy: node.y,
        r: nodeRadius,
        tabindex: -1,
      });
      g.appendChild(circle);

      // Node value text
      const text = createSVGElement('text', {
        class: 'node-text',
        x: node.x,
        y: node.y + 7,
        'text-anchor': 'middle',
        'aria-hidden': 'true',
        tabindex: -1,
      });
      text.textContent = node.value;
      g.appendChild(text);

      // Small circle for balance factor on lower right
      const bfCircleRadius = 14;
      const bfCircleX = node.x + nodeRadius - bfCircleRadius + 2;
      const bfCircleY = node.y + nodeRadius - bfCircleRadius + 4;

      const bfCircle = createSVGElement('circle', {
        class: 'balance-circle',
        cx: bfCircleX,
        cy: bfCircleY,
        r: bfCircleRadius,
        tabindex: -1,
        'aria-hidden': 'true',
      });
      g.appendChild(bfCircle);

      // BF text inside small circle
      const bfText = createSVGElement('text', {
        class: 'balance-text',
        x: bfCircleX,
        y: bfCircleY + 5,
        'text-anchor': 'middle',
        'aria-hidden': 'true',
        tabindex: -1,
      });
      bfText.textContent = node.bf;
      g.appendChild(bfText);

      // Hover tooltip note for balance factor
      g.addEventListener('mouseenter', () => {
        const desc = describeBF(node.bf);
        showTip(`${desc}`, bfCircleX + 25, bfCircleY);
      });
      g.addEventListener('mouseleave', hideTip);

      container.appendChild(g);
    }

    traverse(root);

    svg.appendChild(edgesGroup);
    svg.appendChild(nodesGroup);
  }

  // Describe the balance factor for tooltip
  function describeBF(bf){
    if (bf === 0) return "Balance Factor: 0 (Perfectly balanced)";
    if (bf === 1) return "Balance Factor: +1 (Slightly left-heavy)";
    if (bf === -1) return "Balance Factor: -1 (Slightly right-heavy)";
    if (bf === 2) return "Balance Factor: +2 (Unbalanced - heavy on left)";
    if (bf === -2) return "Balance Factor: -2 (Unbalanced - heavy on right)";
    if (bf > 2) return `Balance Factor: +${bf} (Severely left-heavy)`;
    if (bf < -2) return `Balance Factor: ${bf} (Severely right-heavy)`;
    return `Balance Factor: ${bf}`;
  }

  // Tooltip functions
  function showTip(text, x, y) {
    tip.textContent = text;
    tip.style.left = (x + 15) + 'px';
    tip.style.top = (y + 15) + 'px';
    tip.style.opacity = '1';
    tip.setAttribute('aria-hidden', 'false');
  }
  function hideTip() {
    tip.style.opacity = '0';
    tip.setAttribute('aria-hidden', 'true');
  }

  // Animate transitions by morphing between states
  // For simplicity, we just redraw new tree for each state with fade effect

  function fadeOut(el, duration = 400) {
    el.style.transition = `opacity ${duration}ms ease`;
    el.style.opacity = 0;
    return new Promise(resolve => setTimeout(resolve, duration));
  }
  function fadeIn(el, duration = 400) {
    el.style.transition = `opacity ${duration}ms ease`;
    el.style.opacity = 1;
    return new Promise(resolve => setTimeout(resolve, duration));
  }

  // Render a given state index
  async function renderState(index) {
    const root = states[index];
    await fadeOut(svg);
    drawTree(root);
    await fadeIn(svg);
  }

  // Initial render
  renderState(currentIndex);

  // Button Handlers
  btnRotate.addEventListener('click', () => {
    currentIndex++;
    if (currentIndex >= states.length) currentIndex = 0;
    renderState(currentIndex);
  });

  btnReset.addEventListener('click', () => {
    currentIndex = 0;
    renderState(currentIndex);
  });

  // Responsive resizing - adjust the container for smaller screens
  function resize() {
    const container = document.getElementById('avl-container');
    if (window.innerWidth < 980) {
      container.style.width = '100%';
      container.style.height = 'auto';
      svg.setAttribute('width', Math.min(window.innerWidth - 40, 900));
      svg.setAttribute('height', Math.min((window.innerWidth - 40)/1.7, 540));
    } else {
      container.style.width = '920px';
      container.style.height = '540px';
      svg.setAttribute('width', 920);
      svg.setAttribute('height', 540);
    }
  }
  window.addEventListener('resize', resize);
  resize();

})();
</script>
</body>
</html>
