<!DOCTYPE html>
<html>
<head>
    <title>Binary Search</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: monospace;
        }
        #binary-search-container {
            width: 800px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #binary-search-container h1 {
            margin-top: 0;
        }
        #binary-search-container .controls {
            margin-bottom: 20px;
        }
        #binary-search-container .control {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
        }
        #binary-search-container .control:hover {
            background-color: #ccc;
        }
        #binary-search-container .slider {
            width: 50%;
            margin-bottom: 20px;
        }
        #binary-search-container .slider input[type="range"] {
            width: 100%;
        }
        #binary-search-container .slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background-color: #ccc;
            border-radius: 5px;
            cursor: pointer;
        }
        #binary-search-container .slider input[type="range"]::-moz-thumb {
            width: 20px;
            height: 20px;
            background-color: #ccc;
            border-radius: 5px;
            cursor: pointer;
        }
        #binary-search-container .slider input[type="range"]::-ms-thumb {
            width: 20px;
            height: 20px;
            background-color: #ccc;
            border-radius: 5px;
            cursor: pointer;
        }
        #binary-search-container .slider input[type="range"]::-ms-thumb-glow {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background-color: #ccc;
            border-radius: 5px;
            cursor: pointer;
        }
        #binary-search-container .slider input[type="range"]::-ms-thumb-glow-out {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background-color: #ccc;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="binary-search-container">
        <h1>Binary Search</h1>
        <div class="controls">
            <button id="start-button">Start</button>
            <button id="reset-button">Reset</button>
            <div class="slider">
                <input type="range" id="range-slider" min="1" max="100" value="50">
                <label for="range-slider">Range:</label>
                <input type="range" id="step-slider" min="1" max="100" value="5">
                <label for="step-slider">Step:</label>
                <input type="range" id="range-step-slider" min="1" max="100" value="10">
                <label for="range-step-slider">Range Step:</label>
            </div>
        </div>
        <div class="result-container">
            <p id="result"></p>
        </div>
    </div>

    <script>
        let range = 50;
        let step = 5;
        let result = '';

        document.getElementById('start-button').addEventListener('click', start);
        document.getElementById('reset-button').addEventListener('click', reset);

        function start() {
            let startValue = parseInt(document.getElementById('range-slider').value);
            let endValue = parseInt(document.getElementById('step-slider').value);
            let startValueStr = startValue.toString();
            let endValueStr = endValue.toString();
            let rangeStep = parseInt(document.getElementById('range-step-slider').value);
            let rangeStepStr = rangeStep.toString();

            let resultStr = '';
            let stepValue = 0;

            while (startValue >= endValue) {
                resultStr += 'End of range\n';
                startValue -= rangeStep;
                stepValue++;
            }

            while (startValue > endValue) {
                resultStr += 'Start of range\n';
                startValue += rangeStep;
                stepValue++;
            }

            while (stepValue > 0) {
                let value = startValue;
                let valueStr = value.toString();
                resultStr += 'Step ' + valueStr + '\n';

                while (value >= endValue) {
                    resultStr += 'End of range\n';
                    value -= rangeStep;
                    stepValue--;
                }

                while (value < startValue) {
                    resultStr += 'Start of range\n';
                    value += rangeStep;
                    stepValue--;
                }

                startValue = value;
                stepValue--;
            }

            document.getElementById('result').innerHTML = resultStr;
        }

        function reset() {
            range = 50;
            step = 5;
            result = '';
            document.getElementById('result').innerHTML = '';
        }
    </script>
</body>
</html>
