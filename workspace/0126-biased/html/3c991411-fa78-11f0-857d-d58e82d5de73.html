<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Thread - Visual Concept</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto+Slab&display=swap');

  /* Reset and base */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    background: radial-gradient(circle at center, #0a1f3d 0%, #050a12 90%);
    font-family: 'Roboto Slab', serif;
    overflow: hidden;
    color: #fff;
    user-select: none;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .container {
    max-width: 900px;
    width: 100%;
    text-align: center;
  }

  /* Header */
  header {
    margin-bottom: 50px;
  }

  header h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 3.8rem;
    letter-spacing: 0.18em;
    color: #88c0d0;
    text-shadow:
      0 0 12px #5e9fbf88,
      0 0 20px #67bbf888,
      0 0 30px #4ea4d888;
    animation: glowPulse 4s ease-in-out infinite;
    user-select: none;
  }

  @keyframes glowPulse {
    0%, 100% {
      text-shadow:
        0 0 12px #5e9fbf88,
        0 0 20px #67bbf888,
        0 0 30px #4ea4d888;
      color: #88c0d0;
    }
    50% {
      text-shadow:
        0 0 20px #a0d8f7cc,
        0 0 35px #8ec9f7bb,
        0 0 50px #6fbceeaa;
      color: #a0d8f7;
    }
  }

  /* Thread canvas wrapper */
  .thread-visual {
    position: relative;
    width: 100%;
    height: 420px;
    border-radius: 28px;
    background:
      linear-gradient(135deg, #1a293f 0%, #243a59 100%);
    box-shadow:
      inset 0 0 25px #0c1725,
      0 10px 50px rgba(31, 58, 84, 0.9);
    overflow: visible;
  }

  canvas#threadCanvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 28px;
  }

  /* Caption */
  .caption {
    margin-top: 28px;
    font-size: 1.2rem;
    font-style: italic;
    color: #b0c7d8;
    letter-spacing: 0.05em;
  }

  /* Controls */
  .controls {
    margin-top: 40px;
  }

  .btn {
    background: linear-gradient(145deg, #2b4969, #1e3044);
    border: none;
    border-radius: 18px;
    padding: 14px 36px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: #a8d0ff;
    box-shadow:
      3px 3px 7px #19304f,
      -3px -3px 7px #3a6287;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(.4,0,.2,1);
    user-select: none;
    margin: 0 12px;
    position: relative;
    overflow: hidden;
  }

  .btn:before {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 0%;
    height: 300%;
    background: rgba(136, 192, 208, 0.35);
    transform: translate(-50%, -50%) rotate(25deg);
    transition: width 0.5s ease;
    z-index: 0;
    border-radius: 50px;
  }

  .btn:hover:before {
    width: 180%;
  }

  .btn:hover {
    color: #d0e9ff;
    box-shadow:
      4px 4px 18px #79b2db,
      -4px -4px 18px #a9d6ff;
  }

  .btn:focus {
    outline: none;
    box-shadow:
      0 0 8px 3px #6fbceeaa;
  }

  /* FOOTER */
  footer {
    margin-top: 84px;
    font-size: 0.85rem;
    color: #345670bb;
    letter-spacing: 0.12em;
    font-style: italic;
  }

</style>
</head>
<body>

  <div class="container" role="main" aria-label="Thread Concept Visual">

    <header>
      <h1>THREAD</h1>
    </header>

    <div class="thread-visual" aria-hidden="true">
      <canvas id="threadCanvas" width="900" height="420"></canvas>
    </div>

    <div class="caption">A seamless connection of intertwined strands, weaving complexity with elegance.</div>

    <div class="controls" aria-label="Thread visualization controls">
      <button class="btn" id="toggleMotion" aria-pressed="true" aria-label="Pause or resume thread animation">Pause Animation</button>
      <button class="btn" id="regenThread" aria-label="Regenerate thread pattern for a new visual arrangement">New Thread</button>
    </div>

    <footer>
      Crafted with care by AI • Inspired by the beauty of complexity
    </footer>

  </div>

<script>
  (() => {
    const canvas = document.getElementById('threadCanvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.width;
    let height = canvas.height;

    // Resize support (keep ratio)
    function resize() {
      const containerWidth = canvas.parentElement.clientWidth;
      const ratio = width / height;
      let w = containerWidth;
      let h = w / ratio;
      if (h > 420) {
        h = 420;
        w = h * ratio;
      }
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
    }
    window.addEventListener('resize', resize);
    resize();

    // Thread parameters
    const NUM_THREADS = 12;
    const POINTS_PER_THREAD = 80;
    const THREAD_COLORS = [
      '#88c0d0', '#81a1c1', '#5e81ac',
      '#4b6a96', '#3a5677', '#2c4460',
      '#266280', '#3a85b8', '#70b3e5',
      '#4d9ed3', '#2f78b7', '#296491'
    ];

    // Each thread is a spline made of points oscillating smoothly
    // We'll generate control points in vertical space with horizontal oscillations.

    class Thread {
      constructor(index, total) {
        this.index = index;
        this.total = total;
        this.color = THREAD_COLORS[index % THREAD_COLORS.length];
        this.points = [];
        this.phaseOffsets = [];
        this.amplitude = 16 + Math.random() * 12;
        this.speed = 0.013 + Math.random() * 0.013;
        this.baseY = height * 0.15 + (index / total) * (height * 0.7);
        this.generateInitialPoints();
      }

      generateInitialPoints() {
        this.points = [];
        this.phaseOffsets = [];
        const stepX = width / (POINTS_PER_THREAD - 1);
        for (let i = 0; i < POINTS_PER_THREAD; i++) {
          // X evenly spaced
          let x = i * stepX;
          // Y oscillates with phase offset
          let phase = Math.random() * Math.PI * 2;
          this.phaseOffsets.push(phase);
          this.points.push({ x, y: this.baseY });
        }
      }

      update(t) {
        for (let i = 0; i < this.points.length; i++) {
          // Sine oscillation horizontally
          let phase = this.phaseOffsets[i];
          let oscillation = Math.sin(t * this.speed * 1000 + phase + this.index) * this.amplitude;
          this.points[i].y = this.baseY + oscillation + Math.sin(t * this.speed * 1500 + phase * 2) * (this.amplitude * 0.35);
          // perturb x slightly for subtle twist effect
          this.points[i].x = (i * (width / (POINTS_PER_THREAD - 1))) + Math.cos(t * this.speed * 800 + phase + this.index) * 4;
        }
      }

      draw(ctx) {
        // Path with smooth curve
        ctx.beginPath();
        ctx.lineWidth = 3.4;
        let gradient = ctx.createLinearGradient(0, this.points[0].y, width, this.points[this.points.length-1].y);
        gradient.addColorStop(0, this.color + 'ee');
        gradient.addColorStop(1, '#111f2f00');

        ctx.strokeStyle = gradient;
        ctx.shadowColor = this.color + 'bb';
        ctx.shadowBlur = 8;

        // Draw smooth Catmull-Rom spline
        const pts = this.points;
        ctx.moveTo(pts[0].x, pts[0].y);

        for (let i = 0; i < pts.length - 1; i++) {
          const p0 = pts[Math.max(0, i - 1)];
          const p1 = pts[i];
          const p2 = pts[i + 1];
          const p3 = pts[Math.min(pts.length - 1, i + 2)];

          // Catmull-Rom spline control points
          let cp1x = p1.x + (p2.x - p0.x) / 6;
          let cp1y = p1.y + (p2.y - p0.y) / 6;

          let cp2x = p2.x - (p3.x - p1.x) / 6;
          let cp2y = p2.y - (p3.y - p1.y) / 6;

          ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
        }
        ctx.stroke();
      }
    }

    let threads = [];
    for(let i=0; i < NUM_THREADS; i++) {
      threads.push(new Thread(i, NUM_THREADS));
    }

    let running = true;
    let lastTime = null;

    // Animation loop
    function animate(time = 0) {
      if (!lastTime) lastTime = time;
      const delta = time - lastTime;
      lastTime = time;

      ctx.clearRect(0, 0, width, height);

      // Draw subtle background sparkle
      drawBackgroundSparkles(ctx, width, height);

      // Draw threads from back to front for layering effect
      for (let i = 0; i < threads.length; i++) {
        threads[i].update(time);
      }
      for (let i = 0; i < threads.length; i++) {
        threads[i].draw(ctx);
      }

      // Overlay soft light glow behind threads center
      drawCenterGlow(ctx, width, height);

      if (running) requestAnimationFrame(animate);
    }

    // Subtle sparkle background effect
    const sparkleCount = 70;
    const sparkles = [];
    for(let i=0; i < sparkleCount; i++) {
      sparkles.push({
        x: Math.random() * width,
        y: Math.random() * height,
        radius: 0.8 + Math.random() * 1.5,
        alpha: 0.1 + Math.random() * 0.2,
        speed: 0.002 + Math.random() * 0.004,
        phase: Math.random() * Math.PI * 2
      });
    }

    function drawBackgroundSparkles(ctx, w, h) {
      ctx.save();
      for(let s of sparkles) {
        s.phase += s.speed * 20;
        let alpha = 0.15 + 0.15 * Math.sin(s.phase);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
        ctx.fillStyle = `rgba(136,192,208,${alpha.toFixed(3)})`;
        ctx.shadowBlur = 6;
        ctx.shadowColor = "rgba(136,192,208,0.15)";
        ctx.fill();
      }
      ctx.restore();
    }

    // Central glowing ellipse under threads
    function drawCenterGlow(ctx, w, h) {
      const grd = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w/3);
      grd.addColorStop(0, 'rgba(136,192,208, 0.32)');
      grd.addColorStop(0.45, 'rgba(136,192,208, 0.12)');
      grd.addColorStop(1, 'rgba(136,192,208, 0)');
      ctx.save();
      ctx.fillStyle = grd;
      ctx.filter = 'blur(20px)';
      ctx.beginPath();
      ctx.ellipse(w/2, h/2 + 10, w / 3, h / 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Controls & Actions
    const toggleBtn = document.getElementById('toggleMotion');
    const regenBtn = document.getElementById('regenThread');

    toggleBtn.addEventListener('click', () => {
      running = !running;
      if (running) {
        toggleBtn.textContent = 'Pause Animation';
        toggleBtn.setAttribute('aria-pressed', 'true');
        lastTime = null;
        requestAnimationFrame(animate);
      } else {
        toggleBtn.textContent = 'Play Animation';
        toggleBtn.setAttribute('aria-pressed', 'false');
      }
    });

    regenBtn.addEventListener('click', () => {
      for(let i=0; i < threads.length; i++) {
        threads[i] = new Thread(i, NUM_THREADS);
      }
    });

    // Initial animation start
    requestAnimationFrame(animate);

  })();
</script>

</body>
</html>
