<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doubly Linked List Interactive Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Doubly Linked List Interactive Demo</h1>
    
    <h2>Add Node</h2>
    <input type="text" id="newNodeValue" placeholder="Enter node value" />
    <button onclick="addNodeAtEnd()">Add Node at End</button>
    <button onclick="addNodeAtStart()">Add Node at Start</button>
    
    <h2>Remove Node</h2>
    <input type="number" id="removeNodeIndex" placeholder="Enter index to remove" />
    <button onclick="removeNode()">Remove Node</button>

    <h2>Traversal</h2>
    <button onclick="traverseForward()">Traverse Forward</button>
    <button onclick="traverseBackward()">Traverse Backward</button>

    <h2>Search Node</h2>
    <input type="text" id="searchNodeValue" placeholder="Enter value to search" />
    <button onclick="searchNode()">Search Node</button>

    <h2>Output</h2>
    <div id="output"></div>

    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.next = null;
                this.prev = null;
            }
        }

        class DoublyLinkedList {
            constructor() {
                this.head = null;
                this.tail = null;
            }

            addToEnd(value) {
                const newNode = new Node(value);
                if (this.tail) { 
                    this.tail.next = newNode; 
                    newNode.prev = this.tail;
                } else { 
                    this.head = newNode; 
                }
                this.tail = newNode;
            }

            addToStart(value) {
                const newNode = new Node(value);
                if (this.head) {
                    newNode.next = this.head; 
                    this.head.prev = newNode;
                } else {
                    this.tail = newNode; 
                }
                this.head = newNode;
            }

            removeAtIndex(index) {
                if (index < 0) return;
                let current = this.head;
                let i = 0;
                while (current && i < index) {
                    current = current.next;
                    i++;
                }
                if (!current) return; 

                if (current.prev) {
                    current.prev.next = current.next; 
                } else {
                    this.head = current.next; 
                }
                if (current.next) {
                    current.next.prev = current.prev; 
                } else {
                    this.tail = current.prev; 
                }
            }

            forwardTraversal() {
                let current = this.head;
                let result = [];
                while (current) {
                    result.push(current.value);
                    current = current.next;
                }
                return result.join(' <-> ');
            }

            backwardTraversal() {
                let current = this.tail;
                let result = [];
                while (current) {
                    result.push(current.value);
                    current = current.prev;
                }
                return result.join(' <-> ');
            }

            search(value) {
                let current = this.head;
                while (current) {
                    if (current.value === value) {
                        return true;
                    }
                    current = current.next;
                }
                return false;
            }
        }

        const list = new DoublyLinkedList();

        function addNodeAtEnd() {
            const value = document.getElementById('newNodeValue').value;
            if (value) {
                list.addToEnd(value);
                document.getElementById('output').innerText = 'Node added at end. Current List: ' + list.forwardTraversal();
                document.getElementById('newNodeValue').value = '';
            }
        }

        function addNodeAtStart() {
            const value = document.getElementById('newNodeValue').value;
            if (value) {
                list.addToStart(value);
                document.getElementById('output').innerText = 'Node added at start. Current List: ' + list.forwardTraversal();
                document.getElementById('newNodeValue').value = '';
            }
        }

        function removeNode() {
            const index = parseInt(document.getElementById('removeNodeIndex').value);
            list.removeAtIndex(index);
            document.getElementById('output').innerText = 'Node removed. Current List: ' + list.forwardTraversal();
        }

        function traverseForward() {
            document.getElementById('output').innerText = 'Current List (Forward): ' + list.forwardTraversal();
        }

        function traverseBackward() {
            document.getElementById('output').innerText = 'Current List (Backward): ' + list.backwardTraversal();
        }

        function searchNode() {
            const value = document.getElementById('searchNodeValue').value;
            const found = list.search(value);
            if (found) {
                document.getElementById('output').innerText = 'Node with value "' + value + '" found.';
            } else {
                document.getElementById('output').innerText = 'Node with value "' + value + '" not found.';
            }
        }
    </script>
</body>
</html>
