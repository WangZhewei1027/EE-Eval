<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Floyd-Warshall Algorithm - Visual Concept</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

  /* Reset, base */
  * {
    box-sizing: border-box;
  }
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Poppins', sans-serif;
    color: #e0e6f0;
    overflow: hidden;
    user-select: none;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Container & Layout */
  .container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
    padding: 2rem 3rem;
    backdrop-filter: saturate(180%) blur(15px);
    background: rgba(28, 43, 66, 0.75);
    border-radius: 20px;
    box-shadow: 0 30px 50px -10px rgba(10, 40, 80, 0.8);
  }

  header {
    flex-shrink: 0;
    text-align: center;
    margin-bottom: 1.8rem;
  }

  header h1 {
    font-weight: 600;
    letter-spacing: 0.15em;
    font-size: 2.8rem;
    color: #f0f5fc;
    text-shadow:
      0 0 20px #3ddc97aa,
      0 0 30px #3ddc97aa,
      0 0 40px #3ddc97aa;
    margin-bottom: 0.15rem;
  }

  header p {
    font-weight: 300;
    font-size: 1.1rem;
    color: #9fcdfcaa;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  /* Graph Container */
  main {
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1400px;
  }

  /* Board for matrix and nodes */
  #graph {
    position: relative;
    width: 620px;
    height: 620px;
    border-radius: 30px;
    background:
      radial-gradient(circle at center, #042233 0%, #01121d 85%),
      linear-gradient(45deg, #0b2541 50%, transparent 50%);
    box-shadow:
      inset 0 0 40px #093254,
      0 0 70px #04b575aa,
      0 8px 30px -4px #03a364aa;
    transition: box-shadow 0.6s ease;
    transform-style: preserve-3d;
  }

  /* Nodes on the circle */
  .node {
    position: absolute;
    width: 48px;
    height: 48px;
    background: linear-gradient(145deg, #0aed98, #0f9e6a);
    box-shadow:
      0 6px 10px #04b575bb,
      inset 0 -3px 5px #13d6a1,
      inset 0 5px 8px #0a5f3b;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 600;
    font-size: 1.2rem;
    color: #e0f7ee;
    text-shadow: 0 0 6px #03b66899;
    cursor: default;
    user-select: none;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .node:hover {
    transform: scale(1.28);
    filter: drop-shadow(0 0 12px #00ffbcdd);
    z-index: 11;
  }

  /* Edges */
  svg {
    position: absolute;
    top: 0; left: 0;
    width: 620px;
    height: 620px;
    pointer-events: none;
    overflow: visible;
  }

  line.edge {
    stroke: #04b575dd;
    stroke-width: 2;
    stroke-linecap: round;
  }
  line.edge.highlighted {
    stroke: #03ffb6ff;
    stroke-width: 3;
    filter: drop-shadow(0 0 10px #20f7b8);
    transition: stroke 0.5s, stroke-width 0.5s;
  }

  /* Edge label (weight) */
  .weight-label {
    position: absolute;
    pointer-events: none;
    user-select: none;
    font-size: 0.8rem;
    font-weight: 600;
    color: #afffffcc;
    text-shadow:
      0 0 6px #03f1d6aa;
    transform: translate(-50%, -50%);
    font-family: 'Poppins', sans-serif;
  }

  /* Matrix display */
  #matrix-container {
    margin-top: 2rem;
    width: 100%;
    max-width: 620px;
    margin-left: auto;
    margin-right: auto;
    background: #0a3949dd;
    border-radius: 20px;
    overflow: hidden;
    box-shadow:
      inset 0 0 50px #00d2a3aa,
      0 8px 40px -20px #00ce9ebb;
    user-select: none;
  }
  #matrix-container h2 {
    margin: 1rem 0 0.5rem;
    font-weight: 600;
    font-size: 1.4rem;
    color: #b9ffe7;
    text-align: center;
    font-family: 'Poppins', sans-serif;
    text-shadow: 0 0 8px #0ff5dccc;
    letter-spacing: 0.15em;
  }
  #matrix {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 1rem;
  }
  #matrix thead tr {
    background: linear-gradient(45deg, #06a36e, #00ffa5);
  }
  #matrix thead th {
    padding: 0.65rem 0.3rem;
    font-weight: 600;
    font-size: 1rem;
    color: #daf7f2;
    border-right: 1px solid #00ffbaa0;
    text-shadow:
      0 0 4px #12f7ceaa;
  }
  #matrix thead th:last-child {
    border-right: none;
  }
  #matrix tbody td {
    padding: 0.65rem 0.4rem;
    text-align: center;
    font-weight: 600;
    font-size: 1.05rem;
    color: #a2f7d1cc;
    border-top: 1px solid #00885c8a;
    border-right: 1px solid #00ffbb90;
    transition: background-color 0.4s ease, color 0.4s ease;
    font-family: 'Poppins', sans-serif;
  }
  #matrix tbody td:last-child {
    border-right: none;
  }
  #matrix tbody tr.highlight td {
    background-color: #0bf2bc88;
    color: #001a0e;
  }

  /* Button Panel */
  #controls {
    display: flex;
    justify-content: center;
    margin-top: 1rem;
    gap: 1.3rem;
  }
  button {
    background: linear-gradient(135deg, #05c37f, #00ffa9);
    border: none;
    padding: 0.75rem 2.2rem;
    border-radius: 25px;
    font-weight: 600;
    font-size: 1.05rem;
    color: white;
    letter-spacing: 0.1em;
    cursor: pointer;
    box-shadow:
      0 0 18px #0fffbbcc,
      0 8px 28px -4px #03e19fbb;
    transition: all 0.3s ease;
    font-family: 'Poppins', sans-serif;
    user-select: none;
    filter: drop-shadow(0 0 5px #07ffaeaa);
  }
  button:hover:not(:disabled),
  button:focus:not(:disabled) {
    filter: drop-shadow(0 0 22px #00ffbdcc);
    background: linear-gradient(135deg, #00ffa9, #05c37f);
    outline: none;
  }
  button:disabled {
    opacity: 0.45;
    cursor: default;
    filter: none;
  }

  /* Footer */
  footer {
    margin-top: 1.7rem;
    text-align: center;
    font-weight: 300;
    font-size: 0.9rem;
    color: #658f9f88;
    font-family: 'Poppins', sans-serif;
    user-select: none;
  }

  /* Scrollbar hidden for matrix container */
  #matrix-container::-webkit-scrollbar {
    display: none;
  }
  #matrix-container {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
</style>
</head>
<body>
<div class="container" role="main" aria-label="Floyd-Warshall algorithm visualization">
  <header>
    <h1>FLOYD&#8209;WARSHALL</h1>
    <p>All-Pairs Shortest Path Algorithm</p>
  </header>
  <main>
    <div id="graph" aria-label="Graph visualization of nodes and edges with weights">
      <svg aria-hidden="true" id="edges-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </main>
  <div id="matrix-container" aria-label="Current distance matrix table">
    <h2>Distance Matrix</h2>
    <table id="matrix" aria-live="polite" aria-relevant="all" aria-atomic="true" role="grid">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
  <div id="controls" aria-label="Controls for Floyd-Warshall visualization">
    <button id="nextStepBtn" type="button" aria-describedby="desc-next">Next Step</button>
    <button id="resetBtn" type="button" aria-describedby="desc-reset">Reset Visualization</button>
  </div>
  <footer>
    &copy; 2024 &bull; Crafted with care &bull; Visualization inspired by graph theory
  </footer>
</div>

<script>
(() => {
  'use strict';

  /*
  Floyd-Warshall Algorithm Visual Concept
  Graph:
    6 nodes labeled 0 to 5 in a circle
    Weighted edges (directed)
  Show distance matrix updates step-by-step with highlight on updating edges
  */

  const N = 6;

  // Graph data: adjacency matrix with distances, -1 means no direct edge
  // Symmetric or directed, some edges missing
  const INF = 9999;
  const graphWeights = [
    /* 0 */ [0, 3, 8, INF, -4, INF],
    /* 1 */ [INF, 0, INF, 1, 7, INF],
    /* 2 */ [INF, 4, 0, INF, INF, INF],
    /* 3 */ [2, INF, -5, 0, INF, INF],
    /* 4 */ [INF, INF, INF, 6, 0, 9],
    /* 5 */ [INF, INF, INF, INF, INF, 0],
  ];

  // Elements
  const graphEl = document.getElementById('graph');
  const edgesSvg = document.getElementById('edges-svg');
  const matrixTable = document.getElementById('matrix');
  const matrixHead = matrixTable.querySelector('thead');
  const matrixBody = matrixTable.querySelector('tbody');
  const nextStepBtn = document.getElementById('nextStepBtn');
  const resetBtn = document.getElementById('resetBtn');

  // Positions for nodes in circle
  const radius = 260;
  const centerX = 310;
  const centerY = 310;

  // Nodes data {id, x, y, el}
  let nodes = [];

  // Create nodes (circles with labels)
  function createNodes() {
    nodes = [];
    for(let i=0; i<N; i++) {
      const angle = (2 * Math.PI * i) / N - Math.PI / 2; // start top
      let x = centerX + radius * Math.cos(angle);
      let y = centerY + radius * Math.sin(angle);

      const nodeEl = document.createElement('div');
      nodeEl.className = 'node';
      nodeEl.textContent = i;
      nodeEl.style.left = `${x - 24}px`;
      nodeEl.style.top = `${y - 24}px`;
      nodeEl.setAttribute('aria-label', `Node ${i}`);
      graphEl.appendChild(nodeEl);

      nodes.push({ id: i, x, y, el: nodeEl });
    }
  }

  // Create edges as SVG lines and weight labels
  // Keep them in arrays to update style and highlights
  let edgeElements = [];
  let weightLabels = [];

  function clearEdges() {
    edgesSvg.innerHTML = '';
    edgeElements = [];
    weightLabels.forEach(label => label.remove());
    weightLabels = [];
  }
  function createEdges() {
    clearEdges();

    for(let i=0; i<N; i++) {
      for(let j=0; j<N; j++) {
        let w = graphWeights[i][j];
        if(w !== INF && i !== j) {
          const start = nodes[i];
          const end = nodes[j];
          // Draw a curved edge for non-adjacent nodes to prevent overlap
          let dx = end.x - start.x;
          let dy = end.y - start.y;
          let dist = Math.hypot(dx, dy);

          // SVG line or path? We want smooth curves for edges between nodes, especially for reverse of edges
          // We'll use quadratic Bezier paths between nodes with slight offset

          const midX = (start.x + end.x) / 2;
          const midY = (start.y + end.y) / 2;

          // Calculate perpendicular offset vector for curve control point
          const offsetAmount = 30;
          const normX = -dy / dist;
          const normY = dx / dist;
          // To prevent reverse edges overlapping same curve, add offset direction by order of nodes
          const direction = (i < j) ? 1 : -1;
          const ctrlX = midX + normX * offsetAmount * direction;
          const ctrlY = midY + normY * offsetAmount * direction;

          // Create path element
          const path = document.createElementNS("http://www.w3.org/2000/svg","path");

          const pathD = `M${start.x},${start.y} Q${ctrlX},${ctrlY} ${end.x},${end.y}`;
          path.setAttribute('d', pathD);
          path.setAttribute('stroke', '#04b575dd');
          path.setAttribute('stroke-width', '2');
          path.setAttribute('fill', 'none');
          path.setAttribute('class', 'edge');
          edgesSvg.appendChild(path);

          // For accessibility & data linkage
          path.dataset.from = i;
          path.dataset.to = j;

          edgeElements.push(path);

          // Create weight label element as div, positioned near control point
          const weightLabel = document.createElement('div');
          weightLabel.className = 'weight-label';
          weightLabel.textContent = w < INF ? w : '∞';

          // Position label slightly away from curve control point toward mid point
          // Weighted midpoint closer to control point, but shifted slightly so not exactly on curve
          // We'll shift it toward ctrl point by 0.6 and mid point by 0.4
          const labelX = ctrlX * 0.6 + midX * 0.4;
          const labelY = ctrlY * 0.6 + midY * 0.4;
          // Offset up for negative weights to avoid overlap with the path
          const finalX = labelX;
          const finalY = (w < 0) ? labelY - 12 : labelY + 12;

          weightLabel.style.left = `${finalX}px`;
          weightLabel.style.top = `${finalY}px`;

          graphEl.appendChild(weightLabel);
          weightLabels.push(weightLabel);
        }
      }
    }
  }


  // Distance matrix displayed & updated
  // Copy of current distances in algorithm progress
  let dist;

  // k-step index:
  let kStep = -1;

  // Initialize distance matrix copy
  function initDist() {
    dist = graphWeights.map(row => row.slice());
  }

  // Render matrix table (thead, tbody)
  function renderMatrix(highlightRow=-1) {
    matrixHead.innerHTML = '';
    matrixBody.innerHTML = '';

    // Header row for matrix 0..N-1
    const trHead = document.createElement('tr');
    // Empty corner cell
    trHead.appendChild(document.createElement('th'));
    for(let c=0; c<N; c++) {
      const th = document.createElement('th');
      th.textContent = c;
      th.setAttribute('scope', 'col');
      trHead.appendChild(th);
    }
    matrixHead.appendChild(trHead);

    // Rows
    for(let r=0; r<N; r++) {
      const tr = document.createElement('tr');
      if(r === highlightRow) tr.classList.add('highlight');
      const th = document.createElement('th');
      th.textContent = r;
      th.setAttribute('scope', 'row');
      tr.appendChild(th);

      for(let c=0; c<N; c++) {
        const td = document.createElement('td');
        let val = dist[r][c];
        if(val === INF) {
          td.textContent = "∞";
        } else {
          td.textContent = val;
        }
        tr.appendChild(td);
      }

      matrixBody.appendChild(tr);
    }
  }

  // Highlight edges that are used/updated on step k
  // We'll highlight edges that change based on Floyd-Warshall update step
  // Floyd-Warshall: for all i,j: dist[i][j] = min(dist[i][j], dist[i][k] + dist[k][j])
  // Each step fixes k and tries to improve all i,j using k as intermediary

  // On each step k, show update animation for all i,j changed by using k

  // We'll keep track of animations so they're smooth

  // Clear all highlights from edges and nodes
  function clearHighlights() {
    edgeElements.forEach(el => {
      el.classList.remove('highlighted');
      el.style.transition = 'stroke 0.5s ease, stroke-width 0.5s ease';
    });
  }

  // Animate edge highlight for edge i->j, then revert
  // We'll chain all changes on the same step with small delay per updated cell
  // Also highlight the row k (as intermediary) in matrix

  // Keep array of updates for current step, each: {i, j, oldVal, newVal}
  let currentStepUpdates = [];

  function floydWarshallSteps() {
    // Prepare list of all updates at k step
    if (kStep >= N) return false;

    currentStepUpdates = [];

    const k = kStep;

    for (let i=0; i<N; i++) {
      for(let j=0; j<N; j++) {
        if(dist[i][k] === INF || dist[k][j] === INF) continue;

        let newDist = dist[i][k] + dist[k][j];
        if(newDist < dist[i][j]) {
          currentStepUpdates.push({ i, j, oldVal: dist[i][j], newVal: newDist });
          dist[i][j] = newDist;
        }
      }
    }
    return true;
  }

  // Animate step with highlights & matrix update
  // Highlights edges from i->k and k->j, and updates i->j distance cell in matrix

  async function animateStep() {
    if(kStep >= N) {
      nextStepBtn.disabled = true;
      return;
    }

    clearHighlights();

    // Show highlight of k's row in matrix, k column in nodes maybe
    renderMatrix(kStep);

    if(kStep === -1) {
      kStep++;
      return;
    }

    const k = kStep;

    // Prepare updates for this step
    floydWarshallSteps();

    if(currentStepUpdates.length === 0) {
      // Nothing updated this step
      highlightNode(k);
      kStep++;
      return;
    }

    // We'll animate each update with delay:

    // Highlight node k strongly
    highlightNode(k);

    for(let u=0; u<currentStepUpdates.length; u++) {
      const upd = currentStepUpdates[u];
      const {i,j, oldVal, newVal} = upd;

      clearHighlights();

      // Edges: i->k and k->j
      highlightEdge(i, k, true);
      highlightEdge(k, j, true);

      // Highlight updating edge (i->j) to show new path
      highlightEdge(i, j, false, 300);

      // Update matrix visually, highlight row i and column j
      renderMatrix(i);

      // Update the particular cell after short delay, fade in new value
      // We'll do a subtle flicker effect on the updating cell

      await delay(1000);
    }

    kStep++;
    if(kStep >= N) nextStepBtn.disabled = true;
  }

  // Simple highlight edges by adding CSS class
  // strong highlight: true = edges used directly to improve path
  // fade highlight time (ms) optional on updated path edge
  function highlightEdge(i,j,strong = true, fade = 0) {
    for(const el of edgeElements) {
      if(+el.dataset.from === i && +el.dataset.to === j) {
        if(strong) {
          el.classList.add('highlighted');
          if(fade > 0) {
            el.style.transition = `stroke 0.3s ease ${fade}ms, stroke-width 0.3s ease ${fade}ms`;
          } else {
            el.style.transition = 'stroke 0.45s ease, stroke-width 0.45s ease';
          }
        }
      }
    }
  }

  // Highlight a node by glowing border for current k
  function highlightNode(k) {
    nodes.forEach((n, idx) => {
      if(idx === k) {
        n.el.style.boxShadow = `
          0 0 12px 3px #00ffc0cc,
          inset 0 0 14px 5px #0fffeea7,
          0 0 25px #05f7b9`;
        n.el.style.transition = 'box-shadow 0.8s ease';
      } else {
        n.el.style.boxShadow = '';
      }
    });
  }

  // Reset visual state for start
  function resetVisuals() {
    clearHighlights();
    nodes.forEach(n => n.el.style.boxShadow = '');
    nextStepBtn.disabled = false;
    kStep = 0;
    initDist();
    renderMatrix();
  }

  // Delay helper
  function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // Initialize graph on page load
  function init() {
    createNodes();
    createEdges();
    initDist();
    renderMatrix();
    nextStepBtn.disabled = false;
  }

  // Attach events:
  nextStepBtn.addEventListener('click', async () => {
    nextStepBtn.disabled = true;
    await animateStep();
    if(kStep < N) nextStepBtn.disabled = false;
  });

  resetBtn.addEventListener('click', () => {
    resetVisuals();
  });

  window.addEventListener('load', () => {
    init();
  });
})();
</script>
</body>
</html>
