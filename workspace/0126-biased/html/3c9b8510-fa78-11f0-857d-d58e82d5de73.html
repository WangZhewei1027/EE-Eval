<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dynamic Typing — A Visual Concept</title>
<style>
  /* Import a refined serif font for elegance */
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display&family=Source+Code+Pro&display=swap');

  /* CSS Reset */
  *, *::before, *::after {
    box-sizing: border-box;
  }
  
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Playfair Display', serif;
    color: #f0f3f7;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 3rem 1.5rem;
    min-height: 100vh;
  }

  /* Container card with subtle glass effect */
  .card {
    background: rgba(255 255 255 / 0.05);
    border-radius: 24px;
    max-width: 720px;
    width: 90vw;
    padding: 3.5rem 3rem 3.5rem 3rem;
    box-shadow:
      0 0 30px 2px rgba(255 255 255 / 0.1),
      inset 0 0 60px rgba(255 255 255 / 0.05);
    backdrop-filter: blur(18px);
    border: 1.5px solid rgba(255 255 255 / 0.15);
    user-select: none;
  }

  h1 {
    font-weight: 700;
    font-size: 3.8rem;
    letter-spacing: 0.15em;
    margin-bottom: 1.2rem;
    color: #87f1ff;
    text-shadow:
      0 0 10px #4dd0ffcc,
      0 0 25px #09f,
      0 0 40px #0ff,
      0 0 60px #0ffee7;
    text-align: center;
  }

  /* Subtitle with subtle glow */
  .subtitle {
    font-family: 'Source Code Pro', monospace;
    font-weight: 500;
    font-size: 1.1rem;
    color: #a2d9ffcc;
    text-align: center;
    margin-bottom: 3rem;
    letter-spacing: 0.1em;
  }

  /* Typing area container */
  .typing-area {
    position: relative;
    background: rgba(0 0 0 / 0.18);
    border-radius: 1rem;
    padding: 2rem 2.5rem;
    min-height: 140px;
    box-shadow: 
      0 4px 30px rgba(0, 255, 255, 0.12),
      inset 0 0 25px rgba(0, 255, 255, 0.18);
    font-family: 'Source Code Pro', monospace;
    color: #a1fffb;
    font-size: 1.3rem;
    line-height: 1.6;
    letter-spacing: 0.06em;
    overflow-wrap: break-word;
    cursor: default;
    user-select: text;
    position: relative;
    max-height: 250px;
    overflow-y: auto;
  }

  /* Glowing caret effect */
  .caret {
    display: inline-block;
    width: 3px;
    height: 1.3em;
    background: #00f9ff;
    border-radius: 2px;
    margin-left: 6px;
    animation: blink 1.3s infinite;
    vertical-align: bottom;
    filter: drop-shadow(0 0 2px #00e3ff);
  }

  @keyframes blink {
    0%, 20%, 50%, 80%, 100% {
      opacity: 1;
    }
    40%, 60% {
      opacity: 0;
    }
  }

  /* Buttons container */
  .controls {
    margin-top: 3rem;
    text-align: center;
  }

  button {
    all: unset;
    cursor: pointer;
    font-family: 'Source Code Pro', monospace;
    font-weight: 600;
    font-size: 1rem;
    padding: 0.54em 2.3em;
    border-radius: 40px;
    border: 2px solid #00eaff;
    color: #00eaff;
    background: transparent;
    transition:
      color 0.3s ease,
      background 0.3s ease,
      box-shadow 0.3s ease;
    box-shadow: 0 0 8px #00eaff70;
    user-select: none;
  }

  button:hover,
  button:focus {
    background: #00eaff22;
    color: #b1ffff;
    box-shadow:
      0 0 14px 3px #00eaffaa,
      0 0 30px 6px #00eaff44;
    outline: none;
  }

  button:active {
    background: #00eaff44;
    box-shadow:
      0 0 7px 3px #00c2eaee,
      0 0 15px 3px #00c2ea99 inset;
  }

  /* Scrollbar for typing area */
  .typing-area::-webkit-scrollbar {
    width: 8px;
  }

  .typing-area::-webkit-scrollbar-track {
    background: rgba(255 255 255 / 0.05);
    border-radius: 10px;
  }

  .typing-area::-webkit-scrollbar-thumb {
    background: #00eaff88;
    border-radius: 10px;
    box-shadow: 0 0 12px #00eaffcc inset;
  }

  /* Info footer with subtle style */
  footer {
    margin-top: 4rem;
    font-family: 'Source Code Pro', monospace;
    font-weight: 400;
    font-size: 0.85rem;
    color: #39e6ff88;
    user-select: none;
    letter-spacing: 0.1em;
  }

  /* Animated background shapes (subtle and elegant) */
  .background-shapes {
    pointer-events: none;
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: visible;
  }
  
  .shape {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.14;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
    animation-direction: alternate;
    mix-blend-mode: screen;
  }

  .shape-1 {
    width: 320px;
    height: 320px;
    background: linear-gradient(45deg, #00ffea, #0040ff);
    top: 15%;
    left: 10%;
    animation-name: float1;
    animation-duration: 20s;
  }

  .shape-2 {
    width: 280px;
    height: 280px;
    background: linear-gradient(45deg, #ff0099, #6600cc);
    bottom: 20%;
    right: 12%;
    animation-name: float2;
    animation-duration: 18s;
  }

  .shape-3 {
    width: 260px;
    height: 260px;
    background: linear-gradient(135deg, #00ffb8, #0082ff);
    bottom: 35%;
    left: 15%;
    animation-name: float3;
    animation-duration: 22s;
  }

  @keyframes float1 {
    0%   { transform: translateY(0) translateX(0) scale(1); }
    100% { transform: translateY(-24px) translateX(20px) scale(1.1); }
  }

  @keyframes float2 {
    0%   { transform: translateY(0) translateX(0) scale(1); }
    100% { transform: translateY(30px) translateX(-15px) scale(0.92); }
  }

  @keyframes float3 {
    0%   { transform: translateY(0) translateX(0) scale(1); }
    100% { transform: translateY(-15px) translateX(30px) scale(1.07); }
  }
</style>
</head>
<body>
  <div class="background-shapes" aria-hidden="true">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <main class="card" role="main" aria-label="Demonstration of Dynamic Typing Concept">
    <h1>Dynamic Typing</h1>
    <p class="subtitle">An elegant visual demonstration of type flexibility & runtime behavior</p>
    <section aria-live="polite" class="typing-area" id="typingArea" aria-atomic="true" tabindex="0" role="textbox" aria-readonly="true" aria-label="Dynamic typing code example output">
      <!-- Typed text will appear here -->
      <span id="typedText"></span><span class="caret"></span>
    </section>

    <div class="controls" aria-label="Controls for the demonstration">
      <button id="restartBtn" title="Restart Animation" aria-live="polite" aria-atomic="true">Restart Animation</button>
    </div>
  </main>

<script>
(() => {
  'use strict';
  
  // Lines demonstrating dynamic typing behavior and concept,
  // visually "typed" with pauses and style.
  const lines = [
    'let dynamicVariable = 10;',                 // int assignment
    'console.log(dynamicVariable); // Output: 10',
    '',
    'dynamicVariable = "Now I am a string!";',  // string reassignment
    'console.log(dynamicVariable); // Output: "Now I am a string!"',
    '',
    'dynamicVariable = true;',                    // boolean reassignment
    'console.log(dynamicVariable); // Output: true',
    '',
    '// No fixed type — flexible and powerful.',
    '// Types are resolved at runtime.',
  ];

  // Configuration for typing speed and pause durations
  const TYPE_SPEED = 40;        // ms per char
  const PAUSE_BETWEEN_LINES = 900; // ms after finishing a line

  // References
  const typedTextEl = document.getElementById('typedText');
  const restartBtn = document.getElementById('restartBtn');

  // State variables
  let lineIndex = 0;
  let charIndex = 0;
  let typingTimer = null;
  let paused = false;

  // Clear all text
  function clearText() {
    typedTextEl.textContent = '';
  }

  // Type one character
  function typeChar() {
    if (paused) return;
    const currentLine = lines[lineIndex];
    if (charIndex < currentLine.length) {
      typedTextEl.textContent += currentLine.charAt(charIndex);
      charIndex++;
      typingTimer = setTimeout(typeChar, TYPE_SPEED);
    } else {
      // Line finished, pause before next line
      lineIndex++;
      typingTimer = setTimeout(() => {
        typedTextEl.textContent += '\n';
        charIndex = 0;
        if (lineIndex < lines.length) {
          typeChar();
        } else {
          // All lines done: glow pulse effect on caret
          caretPulse();
        }
      }, PAUSE_BETWEEN_LINES);
    }
  }

  // Pulse the caret indefinitely after typing finished
  function caretPulse() {
    const caret = document.querySelector('.caret');
    caret.style.animation = 'blink 1.3s infinite, pulseGlow 2.5s infinite alternate';
  }

  // Stop pulse animation (before restart)
  function resetCaretAnimation() {
    const caret = document.querySelector('.caret');
    caret.style.animation = 'blink 1.3s infinite';
  }

  // Public method to start typing animation from beginning
  function startTyping() {
    paused = false;
    lineIndex = 0;
    charIndex = 0;
    clearText();
    resetCaretAnimation();
    typeChar();
  }

  // Restart control button handler
  restartBtn.addEventListener('click', () => {
    paused = true;
    clearTimeout(typingTimer);
    startTyping();
    restartBtn.focus();
  });

  // Trigger animation on page load
  window.addEventListener('load', startTyping);

  // Additional animation for glow pulse on caret when done
  const styleSheet = document.createElement('style');
  styleSheet.type = 'text/css';
  styleSheet.textContent = `
    @keyframes pulseGlow {
      0% { filter: drop-shadow(0 0 3px #00e3ff) drop-shadow(0 0 12px #00e3ffcc);}
      100% { filter: drop-shadow(0 0 16px #00eaff) drop-shadow(0 0 23px #00eaffcc);}
    }
  `;
  document.head.appendChild(styleSheet);
})();
</script>
</body>
</html>
