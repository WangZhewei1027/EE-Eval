<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runtime Environment Showcase</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #1c1c3f, #4a4a8d);
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            backdrop-filter: blur(8px);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            background-color: rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: fadeIn 2s ease-in;
        }
        p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            animation: fadeIn 2.5s ease-in;
        }
        button {
            padding: 15px 25px;
            border: none;
            border-radius: 5px;
            background-color: #457b9d;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
            outline: none;
        }
        button:hover {
            background-color: #2a9d8f;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #dfe6ec;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Runtime Environment</h1>
        <p>Observe the seamless integration of processes in action.</p>
        <button id="startButton">Start Visualization</button>
        <div id="animationArea" style="margin-top: 20px; display: none;">
            <div style="width: 100px; height: 100px; background-color: #e63946; margin: auto; border-radius: 50%; animation: pulse 1.5s infinite;"></div>
        </div>
        <div class="footer">© 2023 Runtime Design Showcase</div>
    </div>

    <script>
        document.getElementById('startButton').addEventListener('click', function() {
            document.getElementById('animationArea').style.display = 'block';
        });
    </script>
</body>
</html>
