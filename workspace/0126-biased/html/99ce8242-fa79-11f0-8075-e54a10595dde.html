<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Queue Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            margin-top: 20px;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h2>Interactive Priority Queue</h2>
    <label for="value">Enter value:</label>
    <input type="number" id="value" placeholder="Value">
    
    <label for="priority">Enter priority:</label>
    <input type="number" id="priority" placeholder="Priority">

    <button onclick="enqueue()">Enqueue</button>
    <button onclick="dequeue()">Dequeue</button>
    <button onclick="viewQueue()">View Queue</button>
    
    <h3>Queue:</h3>
    <table id="queueTable">
        <tr>
            <th>Value</th>
            <th>Priority</th>
        </tr>
    </table>

    <script>
        class PriorityQueue {
            constructor() {
                this.queue = [];
            }

            enqueue(value, priority) {
                const newNode = { value, priority };
                let added = false;
                for(let i = 0; i < this.queue.length; i++) {
                    if(newNode.priority > this.queue[i].priority) {
                        this.queue.splice(i, 0, newNode);
                        added = true;
                        break;
                    }
                }
                if(!added) {
                    this.queue.push(newNode);
                }
            }

            dequeue() {
                return this.queue.shift();
            }

            getQueue() {
                return this.queue;
            }
        }

        const priorityQueue = new PriorityQueue();

        function enqueue() {
            const value = document.getElementById('value').value;
            const priority = document.getElementById('priority').value;

            if (value === '' || priority === '') {
                alert('Please enter both value and priority.');
                return;
            }

            priorityQueue.enqueue(Number(value), Number(priority));
            document.getElementById('value').value = '';
            document.getElementById('priority').value = '';
            viewQueue();
        }

        function dequeue() {
            const removed = priorityQueue.dequeue();
            if (removed) {
                alert(`Dequeued: Value ${removed.value}, Priority ${removed.priority}`);
            } else {
                alert('Queue is empty.');
            }
            viewQueue();
        }

        function viewQueue() {
            const table = document.getElementById('queueTable');
            while (table.rows.length > 1) {
                table.deleteRow(1);
            }
            const queue = priorityQueue.getQueue();
            queue.forEach(item => {
                const row = table.insertRow();
                const cellValue = row.insertCell(0);
                const cellPriority = row.insertCell(1);
                cellValue.textContent = item.value;
                cellPriority.textContent = item.priority;
            });
        }
    </script>
</body>
</html>
