<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red-Black Tree Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }

        #tree-container {
            position: relative;
            width: 80%;
            height: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .node {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            color: white;
            transition: transform 0.5s, background-color 0.5s;
        }

        .red {
            background-color: #e63946;
        }

        .black {
            background-color: #1d3557;
        }

        .link {
            position: absolute;
            height: 2px;
            background: #333;
            transition: height 0.5s;
        }

        #controls {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            background-color: #457b9d;
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
            margin: 0 5px;
        }

        button:hover {
            background-color: #1d3557;
        }
    </style>
</head>
<body>
    <div>
        <h1>Red-Black Tree Visualization</h1>
        <div id="tree-container">
            <div class="node red" style="top: 50%; left: 50%;">10</div>
            <div class="node black" style="top: 30%; left: 25%;">5</div>
            <div class="node black" style="top: 30%; left: 75%;">15</div>
            <div class="node red" style="top: 10%; left: 15%;">3</div>
            <div class="node red" style="top: 10%; left: 35%;">7</div>
            <div class="node red" style="top: 10%; left: 65%;">12</div>
            <div class="node red" style="top: 10%; left: 85%;">20</div>
            <!-- Example connection lines -->
            <div class="link" style="top: 50%; left: 50%; width: 2px; height: 22%; transform: translateX(25%);"></div>
            <div class="link" style="top: 50%; left: 50%; width: 2px; height: 22%; transform: translateX(-25%);"></div>
            <div class="link" style="top: 30%; left: 25%; width: 2px; height: 22%; transform: translateY(10%);"></div>
            <div class="link" style="top: 30%; left: 75%; width: 2px; height: 22%; transform: translateY(10%);"></div>
        </div>
        <div id="controls">
            <button onclick="toggleView()">Toggle View</button>
            <button onclick="resetView()">Reset</button>
        </div>
    </div>

    <script>
        const nodes = document.querySelectorAll('.node');
        let isBold = true;

        function toggleView() {
            nodes.forEach(node => {
                node.style.transform = isBold ? 'scale(1.1)' : 'scale(1)';
                isBold = !isBold;
            });
        }

        function resetView() {
            nodes.forEach(node => {
                node.style.transform = 'scale(1)';
            });
            isBold = true;
        }
    </script>
</body>
</html>
