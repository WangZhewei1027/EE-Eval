<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jump Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 18px;
            color: #666;
        }

        .jump-search {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .jump-search button {
            width: 200px;
            height: 50px;
            font-size: 18px;
            font-weight: bold;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .jump-search button:hover {
            background-color: #3e8e41;
        }

        .search-bar {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .search-bar input[type="text"] {
            width: 80%;
            padding: 10px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .search-results {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .search-results p {
            font-size: 18px;
            color: #666;
        }

        .search-results button {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .search-results button:hover {
            background-color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Jump Search</h1>
            <p>Discover new things with our efficient search algorithm</p>
        </div>
        <div class="jump-search">
            <button id="jump-search-btn">Start</button>
            <input type="text" id="search-bar" placeholder="Search...">
            <div class="search-results"></div>
        </div>
    </div>

    <script>
        let searchResults = [];
        let jumpSearchButton = document.getElementById('jump-search-btn');
        let searchBar = document.getElementById('search-bar');
        let searchResultsDiv = document.getElementById('search-results');

        jumpSearchButton.addEventListener('click', startJumpSearch);

        function startJumpSearch() {
            let searchQuery = searchBar.value.trim();
            if (searchQuery !== '') {
                searchResults = [];
                searchResultsDiv.innerHTML = '';
                for (let i = 0; i < 10; i++) {
                    let result = generateRandomResult();
                    searchResultsDiv.innerHTML += `<p>${result}</p>`;
                    searchResults.push(result);
                }
                searchResultsDiv.innerHTML = 'Search results: ' + searchResults.join('\n');
            }
        }

        function generateRandomResult() {
            let genre = Math.floor(Math.random() * 3) + 1;
            let title = 'Title ' + genre;
            let author = 'Author ' + genre;
            return `${title} by ${author}`;
        }
    </script>
</body>
</html>
