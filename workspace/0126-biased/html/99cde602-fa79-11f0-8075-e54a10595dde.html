<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Linked List Demonstration</title>
</head>
<body>

<h1>Circular Linked List Demonstration</h1>

<div>
    <h2>Controls</h2>
    <input type="text" id="nodeInput" placeholder="Enter node value">
    <button onclick="addNode()">Add Node</button>
    <button onclick="deleteNode()">Delete Node</button>
    <button onclick="viewList()">View List</button>
    <button onclick="traverseList()">Traverse List</button>
    <input type="number" id="traverseCount" placeholder="Steps to traverse">
</div>

<div>
    <h2>List Operations</h2>
    <p id="listOutput"></p>
</div>

<script>
    class Node {
        constructor(data) {
            this.data = data;
            this.next = null;
        }
    }

    class CircularLinkedList {
        constructor() {
            this.head = null;
            this.tail = null;
        }

        addNode(data) {
            const newNode = new Node(data);
            if (!this.head) {
                this.head = newNode;
                this.tail = newNode;
                newNode.next = newNode; // Point to itself
            } else {
                this.tail.next = newNode;
                newNode.next = this.head;
                this.tail = newNode;
            }
        }

        deleteNode() {
            if (!this.head) return; // List is empty
            if (this.head === this.tail) {
                this.head = null;
                this.tail = null;
                return;
            }
            this.tail.next = this.head.next;
            this.head = this.head.next;
        }

        traverse(steps) {
            if (!this.head) return "";
            let current = this.head;
            let output = '';
            for (let i = 0; i < steps; i++) {
                output += current.data + " ";
                current = current.next;
            }
            return output.trim();
        }

        viewList() {
            if (!this.head) return "List is empty";
            let output = [];
            let current = this.head;
            do {
                output.push(current.data);
                current = current.next;
            } while (current !== this.head);
            return output.join(" -> ");
        }
    }

    const circularList = new CircularLinkedList();

    function addNode() {
        const value = document.getElementById('nodeInput').value;
        if (value) {
            circularList.addNode(value);
            document.getElementById('nodeInput').value = '';
            alert("Node added: " + value);
        }
    }

    function deleteNode() {
        circularList.deleteNode();
        alert("Node deleted.");
    }

    function viewList() {
        const output = circularList.viewList();
        document.getElementById('listOutput').innerText = "List: " + output;
    }

    function traverseList() {
        const steps = parseInt(document.getElementById('traverseCount').value) || 0;
        const output = circularList.traverse(steps);
        document.getElementById('listOutput').innerText = "Traversed: " + output;
    }
</script>
</body>
</html>
