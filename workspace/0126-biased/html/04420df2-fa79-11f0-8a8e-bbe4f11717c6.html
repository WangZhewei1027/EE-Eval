<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph (Undirected) UI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="graph-container">
        <div class="graph">
            <div class="node" style="background-color: #f2f2f2; border: 1px solid #ddd; padding: 10px; border-radius: 10px; margin: 10px; font-size: 24px; font-weight: bold; text-align: center; text-shadow: 0 0 5px rgba(0,0,0,0.2);"></div>
            <div class="edge" style="background-color: #ccc; border: 1px solid #ddd; padding: 5px; border-radius: 5px; margin: 5px; font-size: 18px; font-weight: bold; text-align: center; text-shadow: 0 0 5px rgba(0,0,0,0.2);"></div>
            <div class="edge" style="background-color: #ccc; border: 1px solid #ddd; padding: 5px; border-radius: 5px; margin: 5px; font-size: 18px; font-weight: bold; text-align: center; text-shadow: 0 0 5px rgba(0,0,0,0.2);"></div>
            <div class="edge" style="background-color: #ccc; border: 1px solid #ddd; padding: 5px; border-radius: 5px; margin: 5px; font-size: 18px; font-weight: bold; text-align: center; text-shadow: 0 0 5px rgba(0,0,0,0.2);"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
