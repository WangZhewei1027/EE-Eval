<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big-Theta Notation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        
        .container {
            width: 80%;
            margin: 40px auto;
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #3e8e41;
        }
        
        .footer {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px;
            border-top: 1px solid #ccc;
            text-align: center;
        }
        
        .footer p {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Big-Theta Notation</h1>
            <p>Learn about the Big-Theta notation and its applications in computer science.</p>
        </div>
        <div class="footer">
            <p>&copy; 2023 Big-Theta Notation</p>
        </div>
        <div class="button-container">
            <button class="button">Learn More</button>
            <button class="button">View Examples</button>
        </div>
    </div>
    <script>
        const buttonContainer = document.querySelector('.button-container');
        const learnMoreButton = document.querySelector('.button');
        const viewExamplesButton = document.querySelector('.button');
        
        learnMoreButton.addEventListener('click', () => {
            console.log('Learn More button clicked');
        });
        
        viewExamplesButton.addEventListener('click', () => {
            console.log('View Examples button clicked');
        });
    </script>
</body>
</html>
