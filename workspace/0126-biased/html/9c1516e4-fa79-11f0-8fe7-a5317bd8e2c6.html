<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Process Simulator — Interactive</title>
<style>
/* Extremely minimal layout */
html,body{height:100%;margin:8px;font-family:system-ui,Segoe UI,Arial;}
.container{display:flex;gap:8px;align-items:flex-start;}
.panel{flex:1;min-width:260px;max-width:50%;padding:6px;border:1px solid #000;}
.panel h3{margin:6px 0 8px 0;font-size:14px;}
.small{font-size:12px}
.row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.col{display:flex;flex-direction:column;gap:6px}
textarea,input,select,button{font:12px/1.2 monospace;padding:4px}
textarea{width:100%;height:80px}
.list{max-height:200px;overflow:auto;border:1px solid #000;padding:4px}
pre{white-space:pre-wrap;font-family:monospace;font-size:12px}
button{cursor:pointer}
fieldset{padding:6px}
</style>
</head>
<body>
<h2>Process Simulator — "Process"</h2>
<div class="container">
  <div class="panel" id="designer">
    <h3>Process Designer</h3>
    <div class="row">
      <input id="procName" placeholder="Process name" value="Example Process">
      <button id="newProc">New</button>
      <button id="loadSample">Load Sample</button>
      <button id="exportProc">Export JSON</button>
      <button id="importProc">Import JSON</button>
    </div>

    <fieldset>
      <legend>Add / Manage Steps</legend>
      <div class="row">
        <input id="stepName" placeholder="Step name">
        <select id="stepType">
          <option value="task">task</option>
          <option value="decision">decision</option>
          <option value="manual">manual (approval)</option>
          <option value="timer">timer</option>
          <option value="parallel-start">parallel-start</option>
          <option value="parallel-end">parallel-end</option>
        </select>
        <button id="addStep">Add Step</button>
      </div>

      <div class="row">
        <label>Steps:</label>
        <select id="stepsList" size="6" style="flex:1"></select>
      </div>

      <div id="stepEditor" style="display:none">
        <div class="row">
          <label>ID:</label><input id="editId" readonly>
          <label>Name:</label><input id="editName">
        </div>
        <div class="row">
          <label>Type:</label>
          <select id="editType">
            <option value="task">task</option>
            <option value="decision">decision</option>
            <option value="manual">manual</option>
            <option value="timer">timer</option>
            <option value="parallel-start">parallel-start</option>
            <option value="parallel-end">parallel-end</option>
          </select>
          <label>Duration(ms):</label><input id="editDuration" type="number" min="0" value="500" style="width:85px">
        </div>
        <div class="row">
          <label>Success prob (0-1):</label><input id="editProb" type="number" min="0" max="1" step="0.01" value="1" style="width:80px">
          <label>Condition (for decision):</label><input id="editCondition" placeholder="e.g., vars.x>10 || true" style="flex:1">
        </div>
        <div class="row">
          <label>Action script (JS):</label>
          <button id="insertScriptExample">Insert example</button>
        </div>
        <textarea id="editScript" placeholder="// function run(vars,meta){ return {vars:{x:vars.x+1}} }"></textarea>
        <div class="row">
          <label>Parallel group ID:</label><input id="editParallelGroup" placeholder="group1" style="width:100px">
          <label><input type="checkbox" id="editBreakpoint"> Breakpoint</label>
          <button id="saveStep">Save</button>
          <button id="deleteStep">Delete</button>
          <button id="duplicateStep">Duplicate</button>
        </div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Transitions</legend>
      <div class="row">
        <select id="transFrom"></select>
        <select id="transTo"></select>
        <input id="transCond" placeholder="Condition (optional)">
        <button id="addTrans">Add</button>
      </div>
      <div class="list" id="transList"></div>
    </fieldset>
  </div>

  <div class="panel" id="runner">
    <h3>Runner & Control</h3>
    <div class="row">
      <button id="startRun">Start Run</button>
      <button id="startMultiple">Start N</button>
      <input id="startCount" type="number" value="1" min="1" style="width:60px">
      <label>Mode:</label>
      <select id="runMode"><option>auto</option><option>step</option></select>
      <label>Speed:</label><input id="speed" type="range" min="10" max="2000" value="500">
      <span id="speedVal">500ms</span>
    </div>

    <div class="row">
      <label><input type="checkbox" id="useGlobalVars"> Use global variables</label>
      <label><input type="checkbox" id="logVerbose" checked> Verbose logs</label>
      <button id="pauseAll">Pause</button>
      <button id="resumeAll">Resume</button>
      <button id="abortAll">Abort</button>
    </div>

    <fieldset>
      <legend>Active Runs</legend>
      <div id="runsList" class="list"></div>
    </fieldset>

    <fieldset>
      <legend>Selected Run Controls</legend>
      <div class="row">
        <label>Selected Run ID:</label><input id="selectedRunId" readonly style="width:100px">
        <button id="stepForward">Step Forward</button>
        <button id="stepBack">Step Back</button>
        <button id="approveManual">Approve</button>
        <button id="rejectManual">Reject</button>
        <button id="showSnapshot">Snapshot</button>
      </div>
      <div class="row">
        <label>Jump to step ID:</label>
        <input id="jumpStepId" style="width:80px">
        <button id="jumpToStep">Jump</button>
        <button id="toggleBreakpoint">Toggle Breakpoint for Step</button>
      </div>
    </fieldset>

    <fieldset>
      <legend>Run History / Controls</legend>
      <div class="row">
        <button id="exportRun">Export Run</button>
        <button id="replayRun">Replay</button>
        <button id="clearCompleted">Clear Completed</button>
      </div>
    </fieldset>
  </div>

  <div class="panel" id="inspector">
    <h3>Variables & Logs</h3>

    <fieldset>
      <legend>Global Variables</legend>
      <div class="row">
        <input id="varKey" placeholder="key">
        <input id="varVal" placeholder="value">
        <button id="setVar">Set</button>
        <button id="delVar">Delete</button>
        <button id="clearVars">Clear All</button>
      </div>
      <pre id="varsView">{}</pre>
    </fieldset>

    <fieldset>
      <legend>Watches & Eval</legend>
      <div class="row">
        <input id="watchExpr" placeholder="expression using vars">
        <button id="addWatch">Add</button>
      </div>
      <div class="list" id="watches"></div>
      <div class="row">
        <label>Eval:</label>
        <input id="evalExpr" placeholder="vars.x+1">
        <button id="evalBtn">Eval</button>
      </div>
      <pre id="evalResult"></pre>
    </fieldset>

    <fieldset>
      <legend>Logs</legend>
      <div class="row">
        <input id="logFilter" placeholder="filter">
        <button id="clearLogs">Clear</button>
        <button id="exportLogs">Export</button>
      </div>
      <div class="list" id="logs"></div>
    </fieldset>

  </div>
</div>

<script>
/*
Process Simulator
- Minimal UI, many interactive controls.
- Steps, transitions, runs, variables, actions, breakpoints, manual approvals, parallel flows.
*/

(function(){
  // Utilities
  const $ = id=>document.getElementById(id);
  const now = ()=>new Date().toISOString();
  function log(msg,meta){ addLog({time:now(),msg,meta}); }
  function addLog(obj){ logs.unshift(obj); renderLogs(); }
  function deepClone(obj){ return JSON.parse(JSON.stringify(obj)); }

  // Model
  let processDef = { id:1, name:'Example Process', steps:[], transitions:[] };
  let nextStepId = 1;
  let logs = [];
  let globalVars = {};
  let watches = [];
  let runs = []; // active and completed runs
  let replaying = false;

  // UI references
  const stepsList = $('stepsList');
  const transFrom = $('transFrom');
  const transTo = $('transTo');
  const transList = $('transList');
  const runsList = $('runsList');
  const varsView = $('varsView');
  const logsDiv = $('logs');
  const watchesDiv = $('watches');
  const watchesInput = $('watchExpr');

  // Init
  function resetProcess(){
    processDef = { id:1, name:$('procName').value||'Process', steps:[], transitions:[] };
    nextStepId = 1;
    logs = [];
    globalVars = {};
    runs = [];
    renderAll();
    addLog({time:now(),msg:'Created new process'});
  }

  function loadSample(){
    resetProcess();
    processDef.name = 'Sample Order Process';
    const s1 = makeStep('Start','task',{duration:200,prob:1,script:'// set initial\nreturn {vars:{count:0}}'});
    const s2 = makeStep('Check inventory','task',{duration:300,prob:1});
    const s3 = makeStep('Decision: in stock?','decision',{condition:'vars.count>0',duration:50});
    const s4 = makeStep('Pickup & Ship','task',{duration:400,prob:0.9});
    const s5 = makeStep('Notify customer','manual',{duration:0});
    const s6 = makeStep('Wait timer','timer',{duration:1000});
    const s7 = makeStep('Parallel start','parallel-start',{});
    const s8 = makeStep('Task A','task',{duration:300});
    const s9 = makeStep('Task B','task',{duration:500});
    const s10 = makeStep('Parallel end','parallel-end',{});
    processDef.steps.push(s1,s2,s3,s4,s5,s6,s7,s8,s9,s10);
    processDef.transitions.push(
      {from:s1.id,to:s2.id,cond:''},
      {from:s2.id,to:s3.id,cond:''},
      {from:s3.id,to:s4.id,cond:'vars.count>0'},
      {from:s3.id,to:s6.id,cond:'!(vars.count>0)'},
      {from:s4.id,to:s7.id,cond:''},
      {from:s7.id,to:s8.id,cond:''},
      {from:s7.id,to:s9.id,cond:''},
      {from:s8.id,to:s10.id,cond:''},
      {from:s9.id,to:s10.id,cond:''},
      {from:s10.id,to:s5.id,cond:''},
      {from:s6.id,to:s5.id,cond:''}
    );
    nextStepId = processDef.steps.reduce((m,s)=>Math.max(m,s.id),0)+1;
    addLog({time:now(),msg:'Loaded sample process'});
    renderAll();
  }

  function makeStep(name,type,opts){
    return {
      id: nextStepId++,
      name: name||('Step '+(nextStepId)),
      type: type||'task',
      duration: opts.duration||500,
      prob: opts.prob==null?1:opts.prob,
      condition: opts.condition||'',
      script: opts.script||'',
      parallelGroup: opts.parallelGroup||'',
      breakpoint: opts.breakpoint||false
    };
  }

  // Render functions
  function renderSteps(){
    stepsList.innerHTML = '';
    transFrom.innerHTML = '';
    transTo.innerHTML = '';
    processDef.steps.forEach(s=>{
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = `[${s.id}] ${s.name} (${s.type})`;
      stepsList.appendChild(opt);
      const opt2 = opt.cloneNode(true);
      transFrom.appendChild(opt2);
      transTo.appendChild(opt.cloneNode(true));
    });
  }
  function renderTransitions(){
    transList.innerHTML = '';
    processDef.transitions.forEach((t,i)=>{
      const from = findStep(t.from), to = findStep(t.to);
      const div = document.createElement('div');
      div.textContent = `${i}: [${t.from}] ${from?from.name:'<missing>'} -> [${t.to}] ${to?to.name:'<missing>'}  cond: "${t.cond||t.condition||''}"`;
      const btn = document.createElement('button'); btn.textContent='Delete'; btn.onclick=()=>{ processDef.transitions.splice(i,1); renderTransitions(); addLog({time:now(), msg:'Deleted transition '+i}); };
      div.appendChild(btn);
      transList.appendChild(div);
    });
  }
  function renderAll(){
    $('procName').value = processDef.name;
    renderSteps();
    renderTransitions();
    renderVars();
    renderLogs();
    renderRuns();
    renderWatches();
  }

  function findStep(id){ return processDef.steps.find(s=>s.id==id) }
  function findStepIndex(id){ return processDef.steps.findIndex(s=>s.id==id) }

  // Designer events
  $('addStep').onclick = ()=>{
    const name = $('stepName').value || ('Step '+nextStepId);
    const type = $('stepType').value;
    const step = makeStep(name,type,{duration:500,prob:1,condition:''});
    processDef.steps.push(step);
    renderAll();
    addLog({time:now(),msg:`Added step [${step.id}] ${step.name} (${step.type})`});
  };

  $('stepsList').addEventListener('change',()=>{
    const id = +stepsList.value;
    if(!id){ $('stepEditor').style.display='none'; return; }
    const s = findStep(id);
    if(!s) return;
    $('stepEditor').style.display='block';
    $('editId').value = s.id;
    $('editName').value = s.name;
    $('editType').value = s.type;
    $('editDuration').value = s.duration||0;
    $('editProb').value = s.prob==null?1:s.prob;
    $('editCondition').value = s.condition||s.cond||'';
    $('editScript').value = s.script||'';
    $('editParallelGroup').value = s.parallelGroup||'';
    $('editBreakpoint').checked = !!s.breakpoint;
  });

  $('saveStep').onclick = ()=>{
    const id = +$('editId').value;
    const s = findStep(id);
    if(!s) return;
    s.name = $('editName').value;
    s.type = $('editType').value;
    s.duration = +$('editDuration').value||0;
    s.prob = Number($('editProb').value) || 0;
    s.condition = $('editCondition').value;
    s.script = $('editScript').value;
    s.parallelGroup = $('editParallelGroup').value;
    s.breakpoint = $('editBreakpoint').checked;
    renderAll();
    addLog({time:now(),msg:`Saved step [${s.id}] ${s.name}`});
  };

  $('deleteStep').onclick = ()=>{
    const id = +$('editId').value;
    const idx = findStepIndex(id);
    if(idx>=0){
      processDef.steps.splice(idx,1);
      processDef.transitions = processDef.transitions.filter(t=>t.from!==id && t.to!==id);
      renderAll();
      addLog({time:now(),msg:`Deleted step [${id}]`});
    }
  };

  $('duplicateStep').onclick = ()=>{
    const id = +$('editId').value;
    const s = findStep(id);
    if(!s) return;
    const clone = deepClone(s);
    clone.id = nextStepId++;
    clone.name = s.name + ' (copy)';
    processDef.steps.push(clone);
    renderAll();
    addLog({time:now(),msg:`Duplicated step [${id}] -> [${clone.id}]`});
  };

  $('addTrans').onclick = ()=>{
    const from = Number(transFrom.value);
    const to = Number(transTo.value);
    const cond = $('transCond').value || '';
    if(!from || !to){ alert('Select from and to'); return; }
    processDef.transitions.push({from,to,cond});
    renderTransitions();
    addLog({time:now(),msg:`Added transition [${from}] -> [${to}] cond:${cond}`});
  };

  $('insertScriptExample').onclick = ()=>{
    $('editScript').value = "// Example: modify vars, meta contains runId and stepId\nfunction run(vars,meta){ vars.count = (vars.count||0)+1; return {vars:vars, note:'incremented'} }\n// Return object: {vars: {...}}";
  };

  // Export / Import
  $('exportProc').onclick = ()=>{
    const data = JSON.stringify(processDef,null,2);
    const blob = new Blob([data],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = (processDef.name||'process')+'.json'; a.click();
    URL.revokeObjectURL(url);
  };
  $('importProc').onclick = ()=>{
    const txt = prompt('Paste process JSON');
    if(!txt) return;
    try{
      const obj = JSON.parse(txt);
      processDef = obj;
      nextStepId = processDef.steps.reduce((m,s)=>Math.max(m,s.id),0)+1;
      renderAll();
      addLog({time:now(),msg:'Imported process JSON'});
    }catch(e){ alert('Invalid JSON: '+e.message) }
  };

  $('newProc').onclick = resetProcess;
  $('loadSample').onclick = loadSample;

  // Variables
  function renderVars(){
    varsView.textContent = JSON.stringify(globalVars,null,2);
  }
  $('setVar').onclick = ()=>{
    const k = $('varKey').value.trim();
    const v = $('varVal').value;
    if(!k) return alert('Enter key');
    try{
      globalVars[k] = JSON.parse(v);
    }catch(e){
      globalVars[k] = v;
    }
    renderVars();
    addLog({time:now(),msg:`Set variable ${k}`});
  };
  $('delVar').onclick = ()=>{
    const k = $('varKey').value.trim();
    delete globalVars[k];
    renderVars();
    addLog({time:now(),msg:`Deleted variable ${k}`});
  };
  $('clearVars').onclick = ()=>{
    globalVars = {};
    renderVars();
    addLog({time:now(),msg:'Cleared globals'});
  };

  // Watches & eval
  function renderWatches(){
    watchesDiv.innerHTML = '';
    watches.forEach((w,i)=>{
      const d = document.createElement('div');
      const span = document.createElement('span');
      let val = '';
      try{ val = JSON.stringify(evalInContext(w.expr, currentVarsForEval() ),null,2); }catch(e){ val = 'ERR: '+e.message; }
      span.textContent = `${i}: ${w.expr} => ${val}`;
      const del = document.createElement('button'); del.textContent='X'; del.onclick=()=>{ watches.splice(i,1); renderWatches(); };
      d.appendChild(span); d.appendChild(del);
      watchesDiv.appendChild(d);
    });
  }
  $('addWatch').onclick = ()=>{
    const e = watchesInput.value.trim();
    if(!e) return;
    watches.push({expr:e});
    watchesInput.value='';
    renderWatches();
  };
  $('evalBtn').onclick = ()=>{
    const expr = $('evalExpr').value;
    try{
      const res = evalInContext(expr, currentVarsForEval());
      $('evalResult').textContent = '=> ' + JSON.stringify(res,null,2);
    }catch(e){
      $('evalResult').textContent = 'Error: '+e.message;
    }
  };

  function currentVarsForEval(){
    // use selected run variables if any, else global
    const runId = $('selectedRunId').value;
    if(runId){
      const r = runs.find(x=>x.id==runId);
      if(r) return deepClone(r.vars);
    }
    return deepClone(globalVars);
  }

  function evalInContext(expr, vars){
    // Provide 'vars' as available
    const fn = new Function('vars','meta','return ('+expr+')');
    return fn(vars, {});
  }

  // Logs
  function renderLogs(){
    logsDiv.innerHTML = '';
    const filter = $('logFilter').value.trim().toLowerCase();
    for(let i=0;i<logs.length;i++){
      const l = logs[i];
      const s = document.createElement('div');
      const text = `${l.time} - ${l.msg}${l.meta?(' '+JSON.stringify(l.meta)):''}`;
      if(filter && text.toLowerCase().indexOf(filter)===-1) continue;
      s.textContent = text;
      logsDiv.appendChild(s);
    }
  }
  $('clearLogs').onclick = ()=>{ logs = []; renderLogs(); };
  $('exportLogs').onclick = ()=>{
    const data = JSON.stringify(logs,null,2);
    const blob = new Blob([data],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'logs.json'; a.click();
    URL.revokeObjectURL(url);
  };

  // Runner core
  let runCounter = 1;
  function createRun(useGlobal){
    const r = {
      id: 'run-'+(runCounter++),
      procName: processDef.name,
      vars: useGlobal ? globalVars : deepClone(globalVars),
      tokens: [], // active tokens, each token has current stepId or null for not started
      stepStates: {}, // stepId -> {status:'pending'|'running'|'completed'|'failed'}
      history: [], // snapshots
      createdAt: now(),
      status: 'ready', // running/paused/completed/aborted
      paused: false,
      waitingManual: [], // tokens waiting for manual approval {tokenId, stepId}
    };
    // initialize states
    processDef.steps.forEach(s=> r.stepStates[s.id] = {status:'pending'});
    // create initial token(s): find start steps (no inbound transitions)
    const inbound = new Set(processDef.transitions.map(t=>t.to));
    const startSteps = processDef.steps.filter(s=>!inbound.has(s.id));
    if(startSteps.length===0 && processDef.steps.length>0) startSteps.push(processDef.steps[0]);
    startSteps.forEach(s=> r.tokens.push({id:Math.random().toString(36).slice(2), stepId:s.id}));
    runs.push(r);
    renderRuns();
    addLog({time:now(),msg:`Created run ${r.id}`,meta:{startSteps:startSteps.map(s=>s.id)}});
    return r;
  }

  async function executeRun(r){
    r.status = 'running';
    r.startTime = Date.now();
    saveSnapshot(r);
    renderRuns();
    while(true){
      if(r.status==='aborted'){ addLog({time:now(),msg:`Run ${r.id} aborted`}); break; }
      if(r.paused){ await sleep(200); continue; }
      if(r.tokens.length===0){
        r.status = 'completed';
        addLog({time:now(),msg:`Run ${r.id} completed`});
        renderRuns();
        break;
      }
      // pick next token
      const token = r.tokens.shift();
      const step = findStep(token.stepId);
      if(!step){
        addLog({time:now(),msg:`Run ${r.id} token reached missing step ${token.stepId}`});
        continue;
      }
      // Breakpoint check
      if(step.breakpoint){
        r.paused = true;
        addLog({time:now(),msg:`Run ${r.id} paused at breakpoint step [${step.id}] ${step.name}`});
        r.currentToken = token;
        renderRuns();
        continue;
      }
      try{
        await runStepForToken(r,token,step);
      }catch(e){
        addLog({time:now(),msg:`Run ${r.id} error executing step ${step.id}: ${e.message}`});
      }
      saveSnapshot(r);
      renderRuns();
      // If step mode, pause after each step
      if($('runMode').value === 'step'){ r.paused = true; renderRuns(); await sleep(50); continue; }
    }
  }

  function saveSnapshot(r){
    const snap = {
      time: now(),
      vars: deepClone(r.vars),
      stepStates: deepClone(r.stepStates),
      tokens: deepClone(r.tokens),
    };
    r.history.push(snap);
    if(r.history.length>100) r.history.shift();
  }

  async function runStepForToken(r, token, step){
    r.stepStates[step.id] = {status:'running',started:now()};
    addLog({time:now(),msg:`Run ${r.id} running step [${step.id}] ${step.name}`});
    renderRuns();
    // Execute action
    if(step.type==='task' || step.type==='parallel-start' || step.type==='parallel-end'){
      await delayWithSpeed(parseInt(step.duration||0));
      // script execution optionally modifies vars
      if(step.script && step.script.trim()){
        try{
          const res = runUserScript(step.script, r.vars, {runId:r.id,stepId:step.id});
          if(res && res.vars) Object.assign(r.vars, res.vars);
        }catch(e){
          addLog({time:now(),msg:`Script error at step ${step.id}: ${e.message}`});
        }
      }
      // simulate success/failure by prob
      const p = (step.prob==null?1:step.prob);
      const ok = Math.random()<=p;
      if(!ok){ r.stepStates[step.id] = {status:'failed',finished:now()}; addLog({time:now(),msg:`Step [${step.id}] failed on run ${r.id}`}); return; }
      r.stepStates[step.id] = {status:'completed',finished:now()};
      // Transitions:
      if(step.type==='parallel-start'){
        // start all outgoing transitions as separate tokens
        const outs = outgoing(step.id).map(t=>t.to);
        outs.forEach(toId=> r.tokens.push({id:Math.random().toString(36).slice(2), stepId:toId}));
      }else if(step.type==='parallel-end'){
        // move to outgoing transitions only if all incoming in that parallel group are completed
        const outs = outgoing(step.id).map(t=>t.to);
        outs.forEach(toId=> r.tokens.push({id:Math.random().toString(36).slice(2), stepId:toId}));
      }else{
        // normal: pick eligible transitions by evaluating conditions
        const outs = outgoing(step.id);
        let pushed=false;
        for(const t of outs){
          const cond = t.cond || t.condition || '';
          if(!cond){ r.tokens.push({id:Math.random().toString(36).slice(2), stepId:t.to}); pushed=true; continue; }
          try{
            const ok = (new Function('vars','meta','return ('+cond+')'))(r.vars, {runId:r.id,stepId:step.id});
            if(ok){ r.tokens.push({id:Math.random().toString(36).slice(2), stepId:t.to}); pushed=true; }
          }catch(e){ addLog({time:now(),msg:`Condition eval error: ${e.message}`}); }
        }
        // no outgoing: token ends
        if(!pushed && outs.length===0){ /* token finished */ }
      }
    }else if(step.type==='decision'){
      // evaluate condition and follow matching transition(s)
      await delayWithSpeed(parseInt(step.duration||0));
      let matched=false;
      const outs = outgoing(step.id);
      for(const t of outs){
        const cond = t.cond || t.condition || '';
        try{
          const ok = cond ? (new Function('vars','meta','return ('+cond+')'))(r.vars,{runId:r.id,stepId:step.id}) : false;
          if(ok){ r.tokens.push({id:Math.random().toString(36).slice(2), stepId:t.to}); matched=true; }
        }catch(e){ addLog({time:now(),msg:`Decision eval error: ${e.message}`}); }
      }
      if(!matched){
        // if none matched and there's a default (no cond) push them
        outs.filter(t=>!(t.cond||t.condition)).forEach(t=> r.tokens.push({id:Math.random().toString(36).slice(2), stepId:t.to}));
      }
      r.stepStates[step.id] = {status:'completed',finished:now()};
    }else if(step.type==='timer'){
      // wait for configured delay; can be aborted via pause/abort
      await delayWithSpeed(parseInt(step.duration||0));
      r.stepStates[step.id] = {status:'completed',finished:now()};
      outgoing(step.id).forEach(t=> r.tokens.push({id:Math.random().toString(36).slice(2), stepId:t.to}));
    }else if(step.type==='manual'){
      // wait until user approves/rejects this token: add to waitingManual and pause run loop until resolved
      r.waitingManual.push({token,step});
      r.paused = true;
      addLog({time:now(),msg:`Run ${r.id} awaiting manual approval at step [${step.id}]`});
      renderRuns();
      // Wait until manual resolves (approval triggers resume and pushes next tokens)
      return;
    }else{
      // unknown type: mark completed
      r.stepStates[step.id] = {status:'completed',finished:now()};
    }
  }

  function outgoing(stepId){
    return processDef.transitions.filter(t=>t.from===stepId);
  }

  function runUserScript(script, vars, meta){
    // Expected to return object with vars
    // Provide basic sandbox: provide vars and meta
    const fnBody = script.trim().startsWith('function') ? '('+script+')' : script;
    try{
      const fn = new Function('vars','meta','return (('+fnBody+')(vars,meta))');
      return fn(deepClone(vars), meta) || {};
    }catch(e){
      // try to evaluate as code returning an object
      const wrapper = new Function('vars','meta', script);
      return wrapper(deepClone(vars), meta) || {};
    }
  }

  // Controls to start runs
  $('startRun').onclick = ()=>{
    const useGlobal = $('useGlobalVars').checked;
    const r = createRun(useGlobal);
    executeRun(r).catch(e=>addLog({time:now(),msg:'Run error: '+e.message}));
    renderRuns();
  };
  $('startMultiple').onclick = ()=>{
    const n = Math.max(1,parseInt($('startCount').value)||1);
    for(let i=0;i<n;i++){
      const r = createRun($('useGlobalVars').checked);
      executeRun(r).catch(e=>addLog({time:now(),msg:'Run error: '+e.message}));
    }
  };

  // pause/resume/abort global
  $('pauseAll').onclick = ()=>{ runs.forEach(r=> r.paused = true); renderRuns(); addLog({time:now(),msg:'Paused all runs'}); };
  $('resumeAll').onclick = ()=>{ runs.forEach(r=> r.paused = false); renderRuns(); addLog({time:now(),msg:'Resumed all runs'}); };
  $('abortAll').onclick = ()=>{ runs.forEach(r=> r.status='aborted'); renderRuns(); addLog({time:now(),msg:'Aborted all runs'}); };

  // per-run UI render
  function renderRuns(){
    runsList.innerHTML = '';
    runs.forEach(r=>{
      const d = document.createElement('div');
      d.style.borderTop = '1px solid #000'; d.style.paddingTop='4px'; d.style.marginTop='4px';
      const title = document.createElement('div');
      title.textContent = `${r.id} - ${r.status} - tokens:${r.tokens.length} paused:${r.paused}`;
      d.appendChild(title);
      const info = document.createElement('pre');
      info.textContent = `vars: ${JSON.stringify(r.vars)}\nstates: ${JSON.stringify(simpleStates(r.stepStates))}\nwaitingManual:${r.waitingManual.length}`;
      d.appendChild(info);
      const selBtn = document.createElement('button'); selBtn.textContent='Select'; selBtn.onclick=()=>{ $('selectedRunId').value=r.id; renderRuns(); };
      d.appendChild(selBtn);
      const pause = document.createElement('button'); pause.textContent='Pause'; pause.onclick=()=>{ r.paused=true; renderRuns(); };
      const resume = document.createElement('button'); resume.textContent='Resume'; resume.onclick=()=>{ r.paused=false; renderRuns(); };
      const abort = document.createElement('button'); abort.textContent='Abort'; abort.onclick=()=>{ r.status='aborted'; renderRuns(); };
      const exportBtn = document.createElement('button'); exportBtn.textContent='Export'; exportBtn.onclick=()=>{ const data=JSON.stringify(r,null,2); const blob=new Blob([data],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=r.id+'.json'; a.click(); URL.revokeObjectURL(url); };
      d.appendChild(pause); d.appendChild(resume); d.appendChild(abort); d.appendChild(exportBtn);
      // manual approvals control per run
      if(r.waitingManual.length){
        r.waitingManual.forEach((w,i)=>{
          const mdiv = document.createElement('div');
          mdiv.textContent = `Manual #${i} at step [${w.step.id}] ${w.step.name}`;
          const apro = document.createElement('button'); apro.textContent='Approve'; apro.onclick=()=>{ handleManualDecision(r,w,true); };
          const rej = document.createElement('button'); rej.textContent='Reject'; rej.onclick=()=>{ handleManualDecision(r,w,false); };
          mdiv.appendChild(apro); mdiv.appendChild(rej);
          d.appendChild(mdiv);
        });
      }
      runsList.appendChild(d);
    });
    renderVars(); renderLogs(); renderWatches();
  }

  function simpleStates(ss){
    const o={};
    for(const k in ss) o[k]=ss[k].status;
    return o;
  }

  // Manual approval handling
  function handleManualDecision(r,w,approved){
    // Remove waitingManual entry
    const idx = r.waitingManual.indexOf(w);
    if(idx>=0) r.waitingManual.splice(idx,1);
    r.stepStates[w.step.id] = {status: approved ? 'completed' : 'failed', finished: now()};
    addLog({time:now(),msg:`Run ${r.id} manual ${approved?'approved':'rejected'} at step [${w.step.id}]`});
    if(approved){
      // push outgoing tokens
      outgoing(w.step.id).forEach(t=> r.tokens.push({id:Math.random().toString(36).slice(2), stepId:t.to}));
    }
    r.paused = false;
    renderRuns();
  }

  // Selected run controls (step forward/back etc)
  $('stepForward').onclick = ()=>{
    const r = getSelectedRun(); if(!r) return alert('Select a run');
    // resume run to process one token
    r.paused = false;
    // if paused at breakpoint and currentToken exists, process it
    if(r.currentToken){ const t = r.currentToken; r.currentToken=null; runStepForToken(r,t,findStep(t.stepId)).then(()=>{ saveSnapshot(r); renderRuns(); }); return; }
    // if tokens exist, unpause and allow loop to proceed; create a minimal tick by running executeRun if not active
    if(r.status==='ready' || r.status==='running') { r.paused=false; renderRuns(); } else { executeRun(r); }
  };
  $('stepBack').onclick = ()=>{
    const r = getSelectedRun(); if(!r) return;
    if(r.history.length<2) return alert('No previous snapshot');
    // pop last snapshot and restore previous
    r.history.pop();
    const snap = deepClone(r.history[r.history.length-1]);
    r.vars = snap.vars; r.tokens = snap.tokens; r.stepStates = snap.stepStates;
    renderRuns();
    addLog({time:now(),msg:`Rewound run ${r.id} one step`});
  };

  $('approveManual').onclick = ()=>{
    const r = getSelectedRun(); if(!r) return;
    if(r.waitingManual.length===0) return alert('No manual waiting');
    handleManualDecision(r,r.waitingManual[0],true);
  };
  $('rejectManual').onclick = ()=>{
    const r = getSelectedRun(); if(!r) return;
    if(r.waitingManual.length===0) return alert('No manual waiting');
    handleManualDecision(r,r.waitingManual[0],false);
  };

  $('showSnapshot').onclick = ()=>{
    const r = getSelectedRun(); if(!r) return;
    alert(JSON.stringify(r.history[r.history.length-1]||{},null,2));
  };

  $('jumpToStep').onclick = ()=>{
    const r = getSelectedRun(); if(!r) return;
    const id = Number($('jumpStepId').value);
    if(!id) return alert('Enter step id');
    r.tokens.push({id:Math.random().toString(36).slice(2), stepId:id});
    r.paused=false;
    renderRuns();
    addLog({time:now(),msg:`Jumped run ${r.id} to step ${id}`});
  };

  $('toggleBreakpoint').onclick = ()=>{
    const id = Number($('jumpStepId').value);
    if(!id) return alert('Enter step id');
    const s = findStep(id);
    if(!s) return alert('Step not found');
    s.breakpoint = !s.breakpoint;
    renderAll();
    addLog({time:now(),msg:`Toggled breakpoint on step ${id} => ${s.breakpoint}`});
  };

  $('exportRun').onclick = ()=>{
    const r = getSelectedRun(); if(!r) return;
    const data = JSON.stringify(r,null,2);
    const blob = new Blob([data],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = r.id+'.json'; a.click();
    URL.revokeObjectURL(url);
  };

  $('replayRun').onclick = ()=>{
    const r = getSelectedRun(); if(!r) return;
    if(!r.history || r.history.length===0) return alert('No history to replay');
    // Replay through history snapshots
    (async ()=>{
      replaying = true;
      for(const snap of r.history){
        if(!replaying) break;
        $('selectedRunId').value = r.id;
        // show snapshot
        alert('Replay snapshot:\n'+JSON.stringify(snap,null,2).slice(0,2000));
        await sleep(300);
      }
      replaying = false;
    })();
  };

  $('clearCompleted').onclick = ()=>{
    runs = runs.filter(r=> r.status !== 'completed' && r.status!=='aborted');
    renderRuns();
    addLog({time:now(),msg:'Cleared completed runs'});
  };

  function getSelectedRun(){ const id = $('selectedRunId').value; return runs.find(r=>r.id===id); }

  // Manual approve via UI for waiting manual tokens is handled in per-run render.

  // Step helper functions
  function delayWithSpeed(ms){
    const speed = Number($('speed').value) || 500;
    const multiplier = Math.max(1, 500 / speed); // inverse mapping: higher speed -> smaller wait
    const actual = Math.max(0, Math.round(ms * multiplier));
    return sleep(actual);
  }
  function sleep(ms){ return new Promise(res=>setTimeout(res, ms)); }

  // Logs array functions
  function addLogEntry(msg,meta){ logs.unshift({time:now(),msg,meta}); renderLogs(); }

  // Script runner util
  // Provide secure-ish sandbox? Running user code via Function. Acceptable for this demo.

  // Speed slider
  $('speed').oninput = ()=>{ $('speedVal').textContent = $('speed').value+'ms'; };
  $('logFilter').oninput = renderLogs;

  // Misc UI binding
  $('importProc').addEventListener('click', ()=>{ /* handled above */ });

  // Initialize
  resetProcess();

  // Helpers for testing and advanced control
  window.__processSimulator = {
    getProcess: ()=>processDef,
    getRuns: ()=>runs,
    getLogs: ()=>logs,
    setGlobalVars: v=>{ globalVars=v; renderVars(); },
    addLog: (m)=>addLog({time:now(),msg:m}),
  };

  // Utilities for safe evaluation
  function runFunctionSource(src,vars,meta){
    const fn = new Function('vars','meta','return ('+src+')');
    return fn(vars,meta);
  }

  // Simple UI-driven import prompt for process JSON in sidebar
  // The "Import JSON" button above uses prompt.

  // Render initial
  renderAll();

  // Add keyboard shortcuts: N new proc, S start, P pause, R resume
  document.addEventListener('keydown',(e)=>{
    if(e.ctrlKey && e.key==='n'){ resetProcess(); e.preventDefault(); }
    if(e.ctrlKey && e.key==='s'){ $('startRun').click(); e.preventDefault(); }
    if(e.ctrlKey && e.key==='p'){ $('pauseAll').click(); e.preventDefault(); }
    if(e.ctrlKey && e.key==='r'){ $('resumeAll').click(); e.preventDefault(); }
  });

  // Expose some UI functions for debugging
  window.psim = {
    addStep: ()=>$('addStep').click(),
    start: ()=>$('startRun').click(),
    runs: ()=>runs,
    proc: ()=>processDef,
    logs: ()=>logs
  };

})();
</script>
</body>
</html>
