<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Decision Trees • Visual Concept</title>
<style>
  /* Reset and base */
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

  *, *::before, *::after {
    box-sizing: border-box;
  }

  body {
    margin:0; 
    min-height: 100vh;
    background: linear-gradient(135deg, #141e30 0%, #243b55 100%);
    font-family: 'Montserrat', sans-serif;
    color: #f2f2f2;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2rem;
  }

  header {
    text-align: center;
    max-width: 700px;
    margin-bottom: 2rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 3.4rem;
    letter-spacing: 0.1em;
    margin: 0;
    color: #f0f8ff;
    text-shadow:
      0 0 6px rgba(240,248,255,0.8),
      0 4px 12px rgba(35,70,130,0.6);
    user-select: none;
  }
  header p {
    font-size: 1.15rem;
    color: #a2b9d8cc;
    margin-top: 0.5rem;
    line-height: 1.5;
    user-select: none;
  }

  /* Container for tree */
  #tree-container {
    position: relative;
    width: 100%;
    max-width: 900px;
    aspect-ratio: 4 / 3;
    background: radial-gradient(circle at top center, #314A72, #1b2a47);
    border-radius: 1.25rem;
    box-shadow:
      inset 0 0 80px 15px rgba(100,140,200,0.25),
      0 20px 60px rgba(0,0,0,0.6);
    overflow: visible;
    padding: 40px 0 80px 0;
    user-select: none;
  }

  /* The decision tree visual will be an SVG with stylized nodes and edges */
  svg {
    width: 100%;
    height: 100%;
  }

  /* Node styling */
  .node {
    cursor: default;
    fill: #335C81;
    stroke: #A7C7E7;
    stroke-width: 3px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .node:hover {
    filter: drop-shadow(0 0 12px #A7C7E7);
  }

  .node-decision {
    fill: #3B6AA0;
    rx: 14;
    ry: 14;
  }

  .node-leaf {
    fill: #65AADD;
    rx: 20;
    ry: 20;
  }

  .node-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 14px;
    fill: #E0E7FF;
    pointer-events: none;
    user-select: none;
    text-shadow: 0 0 2px #2c3e50bb;
  }

  /* Edge styling */
  .edge {
    fill: none;
    stroke: #9cc7ffdd;
    stroke-width: 2.5px;
    filter: drop-shadow(0 0 3px #8bb5ffcc);
    transition: stroke 0.4s ease;
  }
  .edge.path-highlight {
    stroke: #ffd369cc;
    stroke-width: 3.8px;
    filter: drop-shadow(0 0 14px #ffd369dd);
  }

  /* Labels on edges */
  .edge-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    fill: #c9d1ffcc;
    user-select: none;
    pointer-events: none;
  }

  /* Buttons */
  #controls {
    margin-top: 1.5rem;
    display: flex;
    justify-content: center;
    gap: 1rem;
  }
  button {
    background: linear-gradient(145deg, #38598c, #2b4264);
    border: none;
    padding: 0.75rem 1.8rem;
    border-radius: 50px;
    box-shadow:
      3px 3px 8px #1d2a43,
      -3px -3px 10px #4a6998;
    color: #dce6ff;
    font-weight: 600;
    font-size: 1rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition:
      background-color 0.25s ease,
      box-shadow 0.35s ease;
    user-select: none;
  }
  button:hover, button:focus {
    outline: none;
    background: linear-gradient(145deg, #4d6ea6, #3a5181);
    box-shadow:
      4px 4px 14px #5f83bc,
      -4px -4px 16px #2e4383;
  }
  button:active {
    transform: scale(0.95);
  }

  /* Footer */
  footer {
    margin-top: 3rem;
    text-align: center;
    font-size: 0.85rem;
    color: #7a8ebf88;
    user-select: none;
  }

  /* Animations for node entrance */
  .node-group {
    transform-origin: center center;
    animation: nodeAppear 0.6s ease forwards;
    opacity: 0;
  }
  .node-group:nth-child(1) {
    animation-delay: 0.1s;
  }
  .node-group:nth-child(2) {
    animation-delay: 0.25s;
  }
  .node-group:nth-child(3) {
    animation-delay: 0.4s;
  }
  .node-group:nth-child(4) {
    animation-delay: 0.55s;
  }
  .node-group:nth-child(5) {
    animation-delay: 0.7s;
  }
  .node-group:nth-child(6) {
    animation-delay: 0.85s;
  }

  @keyframes nodeAppear {
    0% {
      transform: scale(0.5) translateY(20px);
      opacity: 0;
      filter: drop-shadow(0 0 0 transparent);
    }
    100% {
      transform: scale(1) translateY(0);
      opacity: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }
  }

</style>
</head>
<body>
<header>
  <h1>Decision Trees</h1>
  <p>
    A decision tree is a flowchart-like structure in machine learning and statistics that represents decisions and their possible consequences. Nodes denote decisions or outcomes; edges capture branching conditions.
  </p>
</header>
<div id="tree-container" aria-label="Decision Tree Visualization">
  <svg viewBox="0 0 800 600" role="img" aria-describedby="desc">
    <desc id="desc">Illustration of a decision tree with nodes and branches.</desc>

    <!-- Edges (Bezier curves) with labels -->
    <path id="e1" class="edge" d="M400 130 C 400 210, 260 230, 260 310" />
    <text class="edge-label" x="320" y="200" text-anchor="middle">Yes</text>

    <path id="e2" class="edge" d="M400 130 C 400 210, 540 230, 540 310" />
    <text class="edge-label" x="480" y="200" text-anchor="middle">No</text>

    <path id="e3" class="edge" d="M260 310 C 260 350, 180 360, 180 420" />
    <text class="edge-label" x="220" y="360" text-anchor="middle">True</text>

    <path id="e4" class="edge" d="M260 310 C 260 350, 340 360, 340 420" />
    <text class="edge-label" x="300" y="360" text-anchor="middle">False</text>

    <path id="e5" class="edge" d="M540 310 C 540 350, 600 360, 600 420" />
    <text class="edge-label" x="570" y="360" text-anchor="middle">Over 50%</text>

    <path id="e6" class="edge" d="M540 310 C 540 350, 480 360, 480 420" />
    <text class="edge-label" x="510" y="360" text-anchor="middle">Under 50%</text>

    <!-- Node groups (circle + text) -->
    <g class="node-group" id="node-root" transform="translate(400 130)" tabindex="0" aria-label="Root Decision Node: Is Outlook Sunny?">
      <rect class="node node-decision" x="-90" y="-35" width="180" height="70" rx="14" ry="14" />
      <text class="node-text" x="0" y="8" text-anchor="middle" dominant-baseline="middle">Is Outlook Sunny?</text>
    </g>

    <g class="node-group" id="node-left" transform="translate(260 310)" tabindex="0" aria-label="Decision Node: Is Humidity High?">
      <rect class="node node-decision" x="-80" y="-35" width="160" height="70" rx="14" ry="14" />
      <text class="node-text" x="0" y="8" text-anchor="middle" dominant-baseline="middle">Is Humidity High?</text>
    </g>
    <g class="node-group" id="node-right" transform="translate(540 310)" tabindex="0" aria-label="Decision Node: Is Wind Strong?">
      <rect class="node node-decision" x="-80" y="-35" width="160" height="70" rx="14" ry="14" />
      <text class="node-text" x="0" y="8" text-anchor="middle" dominant-baseline="middle">Is Wind Strong?</text>
    </g>

    <g class="node-group" id="node-left-true" transform="translate(180 420)" tabindex="0" aria-label="Leaf Node: Don't Play">
      <ellipse class="node node-leaf" cx="0" cy="0" rx="90" ry="35" />
      <text class="node-text" x="0" y="5" text-anchor="middle" dominant-baseline="middle">Don't Play</text>
    </g>

    <g class="node-group" id="node-left-false" transform="translate(340 420)" tabindex="0" aria-label="Leaf Node: Play">
      <ellipse class="node node-leaf" cx="0" cy="0" rx="90" ry="35" />
      <text class="node-text" x="0" y="5" text-anchor="middle" dominant-baseline="middle">Play</text>
    </g>

    <g class="node-group" id="node-right-false" transform="translate(480 420)" tabindex="0" aria-label="Leaf Node: Play">
      <ellipse class="node node-leaf" cx="0" cy="0" rx="90" ry="35" />
      <text class="node-text" x="0" y="5" text-anchor="middle" dominant-baseline="middle">Play</text>
    </g>

    <g class="node-group" id="node-right-true" transform="translate(600 420)" tabindex="0" aria-label="Leaf Node: Don't Play">
      <ellipse class="node node-leaf" cx="0" cy="0" rx="90" ry="35" />
      <text class="node-text" x="0" y="5" text-anchor="middle" dominant-baseline="middle">Don't Play</text>
    </g>

  </svg>
</div>

<div id="controls" aria-label="Controls to highlight decision paths">
  <button id="btn-reset" aria-label="Reset highlighting">Reset Highlighting</button>
  <button id="btn-highlight" aria-label="Highlight sample decision path">Highlight Example Path</button>
</div>

<footer>
  <small>© 2024 Decision Tree Visual Concept — Crafted with care &amp; css artistry</small>
</footer>

<script>
  (() => {
    const edges = {
      e1: document.getElementById('e1'),
      e2: document.getElementById('e2'),
      e3: document.getElementById('e3'),
      e4: document.getElementById('e4'),
      e5: document.getElementById('e5'),
      e6: document.getElementById('e6')
    };

    // Define an example path for highlighting:
    // Root (Is Outlook Sunny?) → Yes (left) → Is Humidity High? → False → Play
    // Corresponding edges to highlight: e1 (root to left), e4 (left to left-false)
    // and nodes along those edges: node-root, node-left, node-left-false

    const nodesToHighlight = [
      'node-root',
      'node-left',
      'node-left-false'
    ];
    const edgesToHighlight = ['e1', 'e4'];

    const allEdges = Object.values(edges);
    const allNodes = [...document.querySelectorAll('.node-group')];

    const highlightClass = 'path-highlight';

    function resetHighlight() {
      allEdges.forEach(e => e.classList.remove(highlightClass));
      allNodes.forEach(n => n.querySelector('.node').style.filter = '');
    }

    function highlightExamplePath() {
      resetHighlight();
      edgesToHighlight.forEach(id => {
        edges[id].classList.add(highlightClass);
      });
      nodesToHighlight.forEach(id => {
        const group = document.getElementById(id);
        if (!group) return;
        const nodeShape = group.querySelector('.node');
        nodeShape.style.filter = 'drop-shadow(0 0 12px #ffd369cc)';
      });
    }

    document.getElementById('btn-reset').addEventListener('click', resetHighlight);
    document.getElementById('btn-highlight').addEventListener('click', highlightExamplePath);

    // Initial: no highlight, so no action

    // Accessibility hint: allow focus highlight override
    allNodes.forEach(node => {
      node.addEventListener('focus', () => {
        const shape = node.querySelector('.node');
        shape.style.filter = 'drop-shadow(0 0 14px #ffd369cc)';
      });
      node.addEventListener('blur', () => {
        const shape = node.querySelector('.node');
        shape.style.filter = '';
      });
    });
  })();
</script>
</body>
</html>
