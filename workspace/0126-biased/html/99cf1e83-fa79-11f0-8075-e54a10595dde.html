<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floyd-Warshall Algorithm Interactive Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        table { border-collapse: collapse; margin: 20px 0; }
        td, th { border: 1px solid black; padding: 5px; text-align: center; }
    </style>
</head>
<body>
    <h1>Floyd-Warshall Algorithm Interactive Demo</h1>
    <p>
        Enter the number of vertices: <input type="number" id="vertexCount" value="3" min="1" max="10">
        <button onclick="initializeGraph()">Initialize Graph</button>
    </p>
    <table id="graphTable"></table>
    <button onclick="calculateFloydWarshall()">Calculate Shortest Paths</button>
    
    <h2>Results:</h2>
    <table id="resultTable"></table>

    <script>
        let graph = [];
        let vertices = 0;

        function initializeGraph() {
            vertices = document.getElementById('vertexCount').value;
            graph = Array.from({ length: vertices }, () => Array(vertices).fill(Infinity));
            for (let i = 0; i < vertices; i++) {
                graph[i][i] = 0; // Distance to self is 0
            }
            renderGraphInput();
        }

        function renderGraphInput() {
            const table = document.getElementById('graphTable');
            table.innerHTML = '';
            for (let i = 0; i < vertices; i++) {
                const row = table.insertRow();
                for (let j = 0; j < vertices; j++) {
                    const cell = row.insertCell();
                    if (i !== j) {
                        cell.innerHTML = `<input type="number" id="edge-${i}-${j}" value="${graph[i][j] === Infinity ? '' : graph[i][j]}"/>`;
                    } else {
                        cell.innerHTML = '0';
                    }
                }
            }
        }

        function calculateFloydWarshall() {
            for (let i = 0; i < vertices; i++) {
                for (let j = 0; j < vertices; j++) {
                    const edgeValue = document.getElementById(`edge-${i}-${j}`).value;
                    graph[i][j] = edgeValue !== '' ? parseInt(edgeValue) : Infinity;
                }
            }

            const result = floydWarshall(graph);
            renderResult(result);
        }

        function floydWarshall(graph) {
            const dist = graph.map(row => row.slice()); // Deep copy
            for (let k = 0; k < vertices; k++) {
                for (let i = 0; i < vertices; i++) {
                    for (let j = 0; j < vertices; j++) {
                        if (dist[i][k] + dist[k][j] < dist[i][j]) {
                            dist[i][j] = dist[i][k] + dist[k][j];
                        }
                    }
                }
            }
            return dist;
        }

        function renderResult(result) {
            const table = document.getElementById('resultTable');
            table.innerHTML = '';
            for (let i = 0; i < result.length; i++) {
                const row = table.insertRow();
                for (let j = 0; j < result[i].length; j++) {
                    const cell = row.insertCell();
                    cell.innerHTML = result[i][j] === Infinity ? '∞' : result[i][j];
                }
            }
        }
    </script>
</body>
</html>
