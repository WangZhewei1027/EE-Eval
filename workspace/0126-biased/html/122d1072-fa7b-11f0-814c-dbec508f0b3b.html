<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Tree Index</title>
    <style>
        body {
            background-color: white;
        }
        input[type="text"] {
            width: 50%;
            height: 20px;
            margin-bottom: 10px;
            padding: 10px;
        }
        button {
            width: 20%;
            height: 30px;
            margin-bottom: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <h1>B-Tree Index</h1>
    <p>Insert 5 records into the B-Tree Index.</p>
    <form>
        <input type="text" id="record" placeholder="Enter record">
        <button id="insert">Insert</button>
        <button id="search">Search</button>
        <button id="delete">Delete</button>
        <button id="clear">Clear</button>
        <button id="add">Add</button>
    </form>
    <div id="result"></div>

    <script>
        let records = [];
        let searchResults = [];
        let deleteIndex = [];

        function insertRecord() {
            records.push({
                id: 1,
                name: "John Doe",
                age: 30
            });
            updateResult();
        }

        function searchRecord() {
            searchResults = records.filter(record => record.name.toLowerCase().includes(searchInput.value.toLowerCase()));
            updateResult();
        }

        function deleteRecord() {
            deleteIndex = records.filter(record => record.id !== parseInt(idInput.value));
            updateResult();
        }

        function clearRecords() {
            records = [];
            updateResult();
        }

        function addRecord() {
            records.push({
                id: 2,
                name: "Jane Doe",
                age: 25
            });
            updateResult();
        }

        function updateResult() {
            let resultDiv = document.getElementById("result");
            resultDiv.innerHTML = "";
            records.forEach(record => {
                let div = document.createElement("div");
                div.innerHTML = `${record.id} - ${record.name} - ${record.age}`;
                resultDiv.appendChild(div);
            });
        }

        let idInput = document.getElementById("record");
        let searchInput = document.getElementById("search");
        let deleteInput = document.getElementById("delete");
        let clearInput = document.getElementById("clear");
        let addInput = document.getElementById("add");

        let insertButton = document.getElementById("insert");
        let searchButton = document.getElementById("search");
        let deleteButton = document.getElementById("delete");
        let clearButton = document.getElementById("clear");
        let addButton = document.getElementById("add");

        insertButton.addEventListener("click", insertRecord);
        searchButton.addEventListener("click", searchRecord);
        deleteButton.addEventListener("click", deleteRecord);
        clearButton.addEventListener("click", clearRecords);
        addButton.addEventListener("click", addRecord);

        searchInput.addEventListener("input", searchRecord);
        idInput.addEventListener("input", updateResult);
        deleteInput.addEventListener("input", updateResult);
        clearInput.addEventListener("input", updateResult);
        addInput.addEventListener("input", updateResult);
    </script>
</body>
</html>
