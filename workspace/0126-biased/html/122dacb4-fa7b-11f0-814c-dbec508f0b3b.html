<!DOCTYPE html>
<html>
<head>
    <title>Compiler</title>
    <style>
        body {
            font-family: monospace;
            background-color: #000;
        }
        input[type="text"], input[type="number"], select {
            padding: 5px;
            margin: 5px;
            border: 1px solid #000;
            width: 50%;
        }
        button {
            padding: 5px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #000;
            color: #fff;
            cursor: pointer;
        }
        button:hover {
            background-color: #000;
        }
        label {
            display: block;
            margin-bottom: 10px;
        }
        .button-container {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="button-container">
        <button id="compiler-start">Start Compiler</button>
        <button id="compiler-stop">Stop Compiler</button>
        <button id="compiler-run">Run Compiler</button>
        <button id="compiler-quit">Quit Compiler</button>
    </div>
    <div class="input-container">
        <label for="input1">Input 1:</label>
        <input type="text" id="input1" placeholder="Enter input">
    </div>
    <div class="input-container">
        <label for="input2">Input 2:</label>
        <input type="text" id="input2" placeholder="Enter input">
    </div>
    <div class="input-container">
        <label for="input3">Input 3:</label>
        <input type="text" id="input3" placeholder="Enter input">
    </div>
    <div class="input-container">
        <label for="output1">Output 1:</label>
        <input type="text" id="output1" placeholder="Enter output">
    </div>
    <div class="input-container">
        <label for="output2">Output 2:</label>
        <input type="text" id="output2" placeholder="Enter output">
    </div>
    <script>
        let inputs = document.querySelectorAll('input[type="text"], input[type="number"], select');
        let outputs = document.querySelectorAll('input[type="text"]');
        let startButton = document.getElementById('compiler-start');
        let stopButton = document.getElementById('compiler-stop');
        let runButton = document.getElementById('compiler-run');
        let quitButton = document.getElementById('compiler-quit');
        let input1 = document.getElementById('input1');
        let input2 = document.getElementById('input2');
        let input3 = document.getElementById('input3');
        let output1 = document.getElementById('output1');
        let output2 = document.getElementById('output2');

        function startCompiler() {
            startButton.disabled = true;
            stopButton.disabled = false;
            runButton.disabled = false;
            runButton.textContent = 'Stop Compiler';
            runButton.style.backgroundColor = '#000';
            runButton.style.color = '#fff';
            runButton.style.cursor = 'pointer';
            runButton.addEventListener('click', () => {
                runButton.textContent = 'Run Compiler';
                runButton.style.backgroundColor = '#fff';
                runButton.style.color = '#000';
                runButton.style.cursor = 'pointer';
                inputs.forEach(input => input.disabled = true);
                outputs.forEach(output => output.disabled = true);
                inputs.forEach(input => input.value = '');
                outputs.forEach(output => output.value = '');
            });
        }

        function stopCompiler() {
            stopButton.disabled = true;
            startButton.disabled = false;
            runButton.disabled = false;
            runButton.textContent = 'Stop Compiler';
            runButton.style.backgroundColor = '#000';
            runButton.style.color = '#fff';
            runButton.style.cursor = 'pointer';
            runButton.addEventListener('click', () => {
                stopButton.textContent = 'Start Compiler';
                stopButton.style.backgroundColor = '#fff';
                stopButton.style.color = '#000';
                stopButton.style.cursor = 'pointer';
                runButton.disabled = true;
                startButton.disabled = false;
                inputs.forEach(input => input.disabled = false);
                outputs.forEach(output => output.disabled = false);
                inputs.forEach(input => input.value = '');
                outputs.forEach(output => output.value = '');
            });
        }

        function runCompiler() {
            startCompiler();
        }

        function quitCompiler() {
            stopCompiler();
        }

        startButton.addEventListener('click', runCompiler);
        stopButton.addEventListener('click', quitCompiler);
        runButton.addEventListener('click', runCompiler);
    </script>
</body>
</html>
