<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Directed Graph Visualization">
    <title>Directed Graph Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f0f8ff, #e6e6fa);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .graph-container {
            position: relative;
            width: 80vw;
            height: 80vh;
            border: 2px solid #4a90e2;
            border-radius: 15px;
            background: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .node {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #4a90e2;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            transition: transform 0.3s ease;
        }
        .arrow {
            position: absolute;
            border-left: 2px solid #4a90e2;
            margin-left: 25px;
            transition: all 0.3s ease;
        }
        .arrow::before {
            content: '';
            position: absolute;
            left: 100%;
            top: 50%;
            border: 6px solid transparent;
            border-left-color: #4a90e2;
            margin-top: -6px;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
        }
        button {
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #357ab8;
        }
        h1 {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="graph-container">
        <h1>Directed Graph Visualization</h1>
        <div class="node" style="top: 20%; left: 10%;">A</div>
        <div class="node" style="top: 40%; left: 30%;">B</div>
        <div class="node" style="top: 60%; left: 70%;">C</div>
        <div class="node" style="top: 80%; left: 50%;">D</div>

        <div class="arrow" style="top: 40%; left: 15%; height: 50px;"></div>
        <div class="arrow" style="top: 60%; left: 50%; height: 50px;"></div>

        <div class="controls">
            <button onclick="showAlert()">Info</button>
        </div>
    </div>

    <script>
        function showAlert() {
            alert("This is a directed graph. Nodes represent entities and arrows represent relationships.");
        }
    </script>
</body>
</html>
