<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Hash Map</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap');
        
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #fd79a8;
            --dark: #2d3436;
            --light: #f5f6fa;
            --success: #00b894;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }
        
        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease-out;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: var(--dark);
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            position: relative;
        }
        
        .hash-map-visual {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            margin-bottom: 3rem;
        }
        
        .hash-function {
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            width: fit-content;
            text-align: center;
            position: relative;
            z-index: 2;
            transition: all 0.3s ease;
            animation: float 4s ease-in-out infinite;
        }
        
        .hash-function:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        
        .hash-function h3 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        
        .hash-function p {
            font-family: monospace;
            font-size: 1.2rem;
            color: var(--dark);
        }
        
        .buckets-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            width: 100%;
            position: relative;
        }
        
        .bucket {
            background: white;
            border-radius: 10px;
            width: 120px;
            min-height: 180px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
            animation: fadeInUp 0.8s ease-out forwards;
            animation-delay: calc(var(--order) * 0.1s);
            opacity: 0;
        }
        
        .bucket-header {
            background: var(--primary);
            color: white;
            padding: 0.5rem;
            text-align: center;
            font-weight: 600;
        }
        
        .bucket-items {
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .key-value-pair {
            background: var(--light);
            border-radius: 6px;
            padding: 0.5rem;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            transform-origin: top;
        }
        
        .key {
            font-weight: 600;
            color: var(--primary);
        }
        
        .value {
            color: var(--dark);
        }
        
        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
        }
        
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
        }
        
        button:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(253, 121, 168, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            background: var(--secondary);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s infinite ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        @keyframes highlight {
            0% { background: white; }
            50% { background: rgba(162, 155, 254, 0.3); }
            100% { background: white; }
        }
        
        .highlight {
            animation: highlight 1.5s ease-out;
        }
        
        .decoration {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(162, 155, 254, 0.2) 0%, rgba(255,255,255,0) 70%);
            z-index: -1;
        }
        
        .decoration-1 {
            top: -100px;
            left: -100px;
        }
        
        .decoration-2 {
            bottom: -100px;
            right: -100px;
        }
        
        footer {
            margin-top: 3rem;
            text-align: center;
            color: var(--dark);
            opacity: 0.7;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    
    <header>
        <h1>Visual Hash Map</h1>
        <p class="subtitle">A beautifully designed visualization of key-value pair storage using hash functions</p>
    </header>
    
    <div class="container">
        <div class="hash-map-visual">
            <div class="hash-function">
                <h3>Hash Function</h3>
                <p>hash(key) = key.length % 7</p>
            </div>
            
            <div class="buckets-container" id="buckets">
                <!-- Buckets will be generated by JavaScript -->
            </div>
            
            <div class="controls">
                <button id="addBtn">Add Random Item</button>
                <button id="highlightBtn">Show Hashing</button>
            </div>
        </div>
    </div>
    
    <div class="particles" id="particles"></div>
    
    <footer>
        <p>© 2023 Visual Data Structures | Designed for aesthetic appreciation</p>
    </footer>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Create particles
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.width = `${Math.random() * 10 + 5}px`;
                particle.style.height = particle.style.width;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                particle.style.animationDuration = `${Math.random() * 5 + 3}s`;
                particlesContainer.appendChild(particle);
            }
            
            // Sample data
            const sampleData = [
                { key: "apple", value: "red fruit" },
                { key: "banana", value: "yellow fruit" },
                { key: "cherry", value: "small red fruit" },
                { key: "date", value: "sweet fruit" },
                { key: "elderberry", value: "dark berry" },
                { key: "fig", value: "soft fruit" },
                { key: "grape", value: "small fruit" },
                { key: "honeydew", value: "melon" },
                { key: "kiwi", value: "fuzzy fruit" },
                { key: "lemon", value: "citrus fruit" }
            ];
            
            // Initialize hash map with 7 buckets
            const bucketCount = 7;
            const bucketsContainer = document.getElementById('buckets');
            
            // Create buckets
            for (let i = 0; i < bucketCount; i++) {
                const bucket = document.createElement('div');
                bucket.classList.add('bucket');
                bucket.style.setProperty('--order', i);
                
                const header = document.createElement('div');
                header.classList.add('bucket-header');
                header.textContent = `Bucket ${i}`;
                
                const items = document.createElement('div');
                items.classList.add('bucket-items');
                items.id = `bucket-${i}`;
                
                bucket.appendChild(header);
                bucket.appendChild(items);
                bucketsContainer.appendChild(bucket);
            }
            
            // Hash function
            function hash(key) {
                return key.length % bucketCount;
            }
            
            // Add item to hash map
            function addItem(key, value) {
                const bucketIndex = hash(key);
                const bucket = document.getElementById(`bucket-${bucketIndex}`);
                
                const pair = document.createElement('div');
                pair.classList.add('key-value-pair');
                
                const keyEl = document.createElement('span');
                keyEl.classList.add('key');
                keyEl.textContent = key;
                
                const valueEl = document.createElement('span');
                valueEl.classList.add('value');
                valueEl.textContent = value;
                
                pair.appendChild(keyEl);
                pair.appendChild(valueEl);
                bucket.appendChild(pair);
                
                return bucketIndex;
            }
            
            // Add some initial items
            sampleData.slice(0, 5).forEach(item => {
                addItem(item.key, item.value);
            });
            
            // Add random item button
            document.getElementById('addBtn').addEventListener('click', function() {
                const randomIndex = Math.floor(Math.random() * sampleData.length);
                const item = sampleData[randomIndex];
                const bucketIndex = addItem(item.key, item.value);
                
                // Highlight the bucket that was modified
                const bucket = document.getElementById(`bucket-${bucketIndex}`);
                bucket.parentElement.classList.add('highlight');
                setTimeout(() => {
                    bucket.parentElement.classList.remove('highlight');
                }, 1500);
            });
            
            // Highlight hashing process button
            document.getElementById('highlightBtn').addEventListener('click', function() {
                const randomIndex = Math.floor(Math.random() * sampleData.length);
                const item = sampleData[randomIndex];
                
                // Highlight the hash function
                const hashFunc = document.querySelector('.hash-function');
                hashFunc.classList.add('highlight');
                
                setTimeout(() => {
                    hashFunc.classList.remove('highlight');
                    
                    // Show the bucket it would go to
                    const bucketIndex = hash(item.key);
                    const bucket = document.getElementById(`bucket-${bucketIndex}`);
                    bucket.parentElement.classList.add('highlight');
                    
                    setTimeout(() => {
                        bucket.parentElement.classList.remove('highlight');
                    }, 1500);
                }, 1000);
            });
        });
    </script>
</body>
</html>
