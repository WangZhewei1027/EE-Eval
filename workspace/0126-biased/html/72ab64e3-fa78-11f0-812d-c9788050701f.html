<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Harmony</title>
    <style>
        :root {
            --primary: #2a2358;
            --secondary: #9a7bb0;
            --accent: #e8c7c8;
            --text: #f0e6ef;
            --space-dark: #0c0b1d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--space-dark);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        @font-face {
            font-family: 'Montserrat';
            src: url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');
        }

        .header {
            position: absolute;
            top: 5%;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 300;
            margin-bottom: 1rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeIn 2s ease forwards 0.5s;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.3rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 2s ease forwards 1s;
        }

        .cosmic-scene {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .galaxy {
            position: relative;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle at center, transparent 40%, var(--primary) 100%);
            box-shadow: 0 0 200px var(--secondary);
            transform-style: preserve-3d;
            animation: rotate 120s linear infinite;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            filter: blur(1px);
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        .planet {
            position: absolute;
            border-radius: 50%;
            transform-style: preserve-3d;
        }

        .planet-1 {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            box-shadow: 0 0 50px var(--accent);
            top: 20%;
            left: 20%;
            animation: orbit-1 40s linear infinite;
        }

        .planet-2 {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #7bb0b0, #4d8b8b);
            box-shadow: 0 0 30px #7bb0b0;
            top: 60%;
            left: 70%;
            animation: orbit-2 30s linear infinite;
        }

        .planet-3 {
            width: 160px;
            height: 160px;
            background: linear-gradient(135deg, #b07b9a, #8b4d6e);
            box-shadow: 0 0 60px #b07b9a;
            top: 70%;
            left: 30%;
            animation: orbit-3 50s linear infinite;
        }

        .control-panel {
            position: absolute;
            bottom: 10%;
            display: flex;
            gap: 2rem;
            z-index: 10;
        }

        .btn {
            padding: 1rem 2rem;
            background: transparent;
            color: var(--text);
            border: 1px solid var(--secondary);
            border-radius: 50px;
            font-size: 1rem;
            letter-spacing: 0.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 2s ease forwards 1.5s;
        }

        .btn:hover {
            background: var(--secondary);
            box-shadow: 0 0 20px var(--secondary);
            transform: translateY(-3px);
        }

        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(154, 123, 176, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(232, 199, 200, 0.2) 0%, transparent 50%);
            opacity: 0.5;
            z-index: -1;
        }

        @keyframes rotate {
            0% { transform: rotateZ(0deg); }
            100% { transform: rotateZ(360deg); }
        }

        @keyframes orbit-1 {
            0% { transform: rotateZ(0deg) translateX(250px) rotateZ(0deg); }
            100% { transform: rotateZ(360deg) translateX(250px) rotateZ(360deg); }
        }

        @keyframes orbit-2 {
            0% { transform: rotateZ(0deg) translateX(180px) rotateZ(0deg); }
            100% { transform: rotateZ(360deg) translateX(180px) rotateZ(360deg); }
        }

        @keyframes orbit-3 {
            0% { transform: rotateZ(0deg) translateX(300px) rotateZ(0deg); }
            100% { transform: rotateZ(360deg) translateX(300px) rotateZ(360deg); }
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .pulse {
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(154, 123, 176, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(154, 123, 176, 0); }
            100% { box-shadow: 0 0 0 0 rgba(154, 123, 176, 0); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Cosmic Harmony</h1>
        <p class="subtitle">A Celestial Dance of Light and Motion</p>
    </div>

    <div class="cosmic-scene">
        <div class="nebula"></div>
        <div class="galaxy pulse">
            <!-- Stars will be generated by JS -->
        </div>
        <div class="planet planet-1"></div>
        <div class="planet planet-2"></div>
        <div class="planet planet-3"></div>
    </div>

    <div class="control-panel">
        <button class="btn" id="pauseBtn">Pause Motion</button>
        <button class="btn" id="themeBtn">Change Theme</button>
    </div>

    <script>
        // Create stars
        const galaxy = document.querySelector('.galaxy');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            
            // Random size between 1-3px
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            
            // Random position within galaxy
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            
            // Random animation delay
            star.style.animationDelay = `${Math.random() * 4}s`;
            
            galaxy.appendChild(star);
        }

        // Minimal interactivity
        const pauseBtn = document.getElementById('pauseBtn');
        const themeBtn = document.getElementById('themeBtn');
        let isPaused = false;
        let currentTheme = 'default';

        const themes = {
            default: {
                primary: '#2a2358',
                secondary: '#9a7bb0',
                accent: '#e8c7c8'
            },
            nebula: {
                primary: '#1a1b3a',
                secondary: '#7b9ab0',
                accent: '#c7e8e0'
            },
            cosmic: {
                primary: '#3a1b5a',
                secondary: '#b07b7b',
                accent: '#e8c7d8'
            }
        };

        pauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            const planets = document.querySelectorAll('.planet');
            const galaxy = document.querySelector('.galaxy');
            
            if (isPaused) {
                planets.forEach(p => p.style.animationPlayState = 'paused');
                galaxy.style.animationPlayState = 'paused';
                pauseBtn.textContent = 'Resume Motion';
            } else {
                planets.forEach(p => p.style.animationPlayState = 'running');
                galaxy.style.animationPlayState = 'running';
                pauseBtn.textContent = 'Pause Motion';
            }
        });

        themeBtn.addEventListener('click', () => {
            const themeKeys = Object.keys(themes);
            currentTheme = themeKeys[(themeKeys.indexOf(currentTheme) + 1) % themeKeys.length];
            
            document.documentElement.style.setProperty('--primary', themes[currentTheme].primary);
            document.documentElement.style.setProperty('--secondary', themes[currentTheme].secondary);
            document.documentElement.style.setProperty('--accent', themes[currentTheme].accent);
        });
    </script>
</body>
</html>
