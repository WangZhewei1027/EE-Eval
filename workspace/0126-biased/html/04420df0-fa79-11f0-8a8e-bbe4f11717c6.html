<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suffix Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 800px;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .suffix-tree {
            width: 80%;
            margin: 0 auto;
        }

        .suffix-tree .node {
            background-color: #fff;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suffix-tree .node h2 {
            margin: 0;
        }

        .suffix-tree .node p {
            margin: 0;
        }

        .suffix-tree .node button {
            background-color: #4CAF50;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .suffix-tree .node button:hover {
            background-color: #3e8e41;
        }

        .suffix-tree .node button:active {
            background-color: #2e6da4;
        }

        .suffix-tree .node button:hover .icon {
            color: #fff;
        }

        .suffix-tree .icon {
            margin: 5px;
        }

        .suffix-tree .node button:active .icon {
            color: #fff;
            margin: 0;
        }

        .suffix-tree .node button:active .icon svg {
            fill: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="suffix-tree">
            <h2>Suffix Tree</h2>
            <p>This is a basic implementation of a suffix tree.</p>
            <p>Click the button to toggle the tree.</p>
        </div>
    </div>

    <script>
        let suffixTree = {
            nodes: [],
            root: null
        };

        function createNode(text) {
            let node = {
                text,
                children: []
            };
            suffixTree.nodes.push(node);
            return node;
        }

        function addTextToNode(node, text) {
            if (node.text === '') {
                node.text = text;
                return;
            }
            for (let child of node.children) {
                addTextToNode(child, text);
            }
        }

        function buildSuffixTree(text) {
            let node = createNode(text);
            addTextToNode(node, text);
            suffixTree.root = node;
            return node;
        }

        function toggleTree() {
            if (suffixTree.root) {
                suffixTree.root.children = suffixTree.root.children.filter(child => child !== suffixTree.root);
                suffixTree.root = suffixTree.root.children[0];
            }
        }

        let text = 'banana';
        let node = buildSuffixTree(text);
        toggleTree();
    </script>
</body>
</html>
