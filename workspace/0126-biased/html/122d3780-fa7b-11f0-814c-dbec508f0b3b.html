<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query Optimization</title>
    <style>
        body {
            font-family: monospace;
            font-size: 10pt;
            background-color: #f0f0f0;
        }
        label {
            font-size: 12pt;
            font-weight: bold;
            margin-bottom: 0.5em;
        }
        input[type="text"], input[type="number"], input[type="checkbox"] {
            padding: 0.1em;
            margin-bottom: 0.5em;
            border: none;
            border-radius: 0.1em;
        }
        select {
            padding: 0.1em;
            margin-bottom: 0.5em;
            border: none;
            border-radius: 0.1em;
            width: 100%;
        }
        button {
            padding: 0.1em;
            margin-bottom: 0.5em;
            border: none;
            border-radius: 0.1em;
            cursor: pointer;
        }
        button:hover {
            background-color: #ccc;
        }
        .button-container {
            display: flex;
            justify-content: space-around;
            margin-top: 1em;
        }
    </style>
</head>
<body>
    <div class="button-container">
        <button class="button" onclick="start()">Start</button>
        <button class="button" onclick="reset()">Reset</button>
        <button class="button" onclick="save()">Save</button>
        <button class="button" onclick="clear()">Clear</button>
    </div>
    <div class="input-container">
        <label>Query:</label>
        <input type="text" id="query" />
        <label>Condition:</label>
        <input type="text" id="condition" />
        <label>Filter:</label>
        <input type="text" id="filter" />
        <label>Sort:</label>
        <select id="sort">
            <option value="asc">Ascending</option>
            <option value="desc">Descending</option>
        </select>
    </div>
    <div class="output-container">
        <label>Results:</label>
        <div id="results"></div>
    </div>

    <script>
        let query = document.getElementById("query").value;
        let condition = document.getElementById("condition").value;
        let filter = document.getElementById("filter").value;
        let sort = document.getElementById("sort").value;

        function start() {
            // Simulate query optimization process
            setTimeout(function() {
                document.getElementById("results").innerHTML = "Optimized Query: " + query + " with " + condition + " and " + filter + " applied. Sorting: " + sort;
                document.getElementById("results").style.color = "green";
            }, 1000);
        }

        function reset() {
            // Reset query, condition, filter, and sort
            query = document.getElementById("query").value;
            condition = document.getElementById("condition").value;
            filter = document.getElementById("filter").value;
            sort = document.getElementById("sort").value;
            document.getElementById("results").innerHTML = "Optimized Query: " + query + " with " + condition + " and " + filter + " applied. Sorting: " + sort;
            document.getElementById("results").style.color = "black";
        }

        function save() {
            // Simulate saving query to a file
            document.getElementById("results").innerHTML = "Saved Query: " + query + " with " + condition + " and " + filter + " applied. Sorting: " + sort;
            document.getElementById("results").style.color = "green";
        }

        function clear() {
            // Clear query, condition, filter, and sort
            query = document.getElementById("query").value = "";
            condition = document.getElementById("condition").value = "";
            filter = document.getElementById("filter").value = "";
            sort = document.getElementById("sort").value = "";
            document.getElementById("results").innerHTML = "Optimized Query: " + query + " with " + condition + " and " + filter + " applied. Sorting: " + sort;
            document.getElementById("results").style.color = "black";
        }
    </script>
</body>
</html>
