<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interpreter Concept Showcase</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #6e7c94, #2a2d34);
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .container:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            animation: fadeIn 1s ease;
        }

        p {
            font-size: 1.2rem;
            animation: fadeIn 1.2s ease;
            opacity: 0.8;
        }

        button {
            background-color: #008cba;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 20px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #005f75;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1506784232023-5947c85b14b8?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&ixlib=rb-1.2.1&q=80&w=1080') no-repeat center center/cover;
            animation: slide 15s infinite alternate;
            z-index: -1;
            filter: blur(8px);
        }

        @keyframes slide {
            0% { transform: translateX(0); }
            100% { transform: translateX(-10%); }
        }

    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container">
        <h1>Interpreter Concept Showcase</h1>
        <p>Visualizing the intricacies of interpretation in programming languages with elegance.</p>
        <button onclick="showMessage()">Learn More</button>
    </div>

    <script>
        function showMessage() {
            alert("This is a demonstration of the Interpreter concept. Observe how it works behind the scenes!");
        }
    </script>
</body>
</html>
