<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Pointers Interactive Demo</title>
    <style>
        /* Minimal CSS for basic layout */
        body { font-family: Arial, sans-serif; }
        .control { margin: 10px 0; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Two Pointers Interactive Demo</h1>
    
    <div class="control">
        <label for="arraySize">Array Size:</label>
        <input type="number" id="arraySize" min="2" max="100" value="5">
        <button onclick="generateArray()">Generate Array</button>
    </div>
    
    <div class="control">
        <label for="target">Target Sum:</label>
        <input type="number" id="target" value="10">
    </div>
    
    <div class="control">
        <button onclick="findPairs()">Find Pairs</button>
    </div>

    <div id="output"></div>
        
    <script>
        let arr = [];

        function generateArray() {
            const size = document.getElementById("arraySize").value;
            arr = Array.from({length: size}, () => Math.floor(Math.random() * 20));
            document.getElementById("output").innerText = "Generated Array: " + arr.join(", ");
        }

        function findPairs() {
            const target = parseInt(document.getElementById("target").value);
            const result = [];
            let left = 0;
            let right = arr.length - 1;
            let sortedArray = [...arr].sort((a, b) => a - b);
            document.getElementById("output").innerText += "\nSorted Array: " + sortedArray.join(", ");

            while (left < right) {
                const currentSum = sortedArray[left] + sortedArray[right];
                if (currentSum === target) {
                    result.push([sortedArray[left], sortedArray[right]]);
                    left++;
                    right--;
                } else if (currentSum < target) {
                    left++;
                } else {
                    right--;
                }
            }

            if (result.length > 0) {
                document.getElementById("output").innerText += "\nFound Pairs: " + result.map(pair => pair.join(", ")).join(" | ");
            } else {
                document.getElementById("output").innerText += "\nNo Pairs Found.";
            }
        }
    </script>
</body>
</html>
