<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Trees</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
        }
        
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .button-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #3e8e41;
        }
        
        .graph-container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .graph {
            width: 100%;
            height: 400px;
            margin: 20px auto;
            background-color: #f2f2f2;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .graph .line {
            width: 100%;
            height: 100%;
            background-color: #4CAF50;
            border: 1px solid #4CAF50;
        }
        
        .graph .node {
            width: 20%;
            height: 100%;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
        }
        
        .graph .node .text {
            font-weight: bold;
            font-size: 14px;
        }
        
        .graph .node .circle {
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="button-container">
            <button class="button" onclick="showTree()">Show Tree</button>
            <button class="button" onclick="hideTree()">Hide Tree</button>
        </div>
        <div class="graph-container">
            <div class="graph">
                <div class="line" id="line1"></div>
                <div class="node">
                    <span class="text">A</span>
                    <div class="circle" id="circle1"></div>
                </div>
                <div class="line" id="line2"></div>
                <div class="node">
                    <span class="text">B</span>
                    <div class="circle" id="circle2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showTree() {
            var tree = document.getElementById("graph");
            tree.style.display = "block";
        }

        function hideTree() {
            var tree = document.getElementById("graph");
            tree.style.display = "none";
        }
    </script>
</body>
</html>
