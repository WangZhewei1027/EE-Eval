<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Backpropagation Simulation</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Backpropagation Interactive Simulation</h1>

    <h2>Network Configuration</h2>
    <label for="numLayers">Number of Layers (1-5): </label>
    <input type="number" id="numLayers" min="1" max="5" value="3"><br><br>

    <label for="neuronsPerLayer">Neurons per Layer (1-10): </label>
    <input type="number" id="neuronsPerLayer" min="1" max="10" value="5"><br><br>

    <h2>Training Configuration</h2>
    <label for="learningRate">Learning Rate (0.01 - 1): </label>
    <input type="number" step="0.01" id="learningRate" min="0.01" max="1" value="0.1"><br><br>

    <label for="numEpochs">Number of Epochs (1-100): </label>
    <input type="number" id="numEpochs" min="1" max="100" value="10"><br><br>

    <button id="initialize">Initialize Network</button>
    <button id="train">Train Network</button>

    <div id="output"></div>

    <script>
        let network = {};
        
        document.getElementById('initialize').addEventListener('click', function() {
            const numLayers = parseInt(document.getElementById('numLayers').value);
            const neuronsPerLayer = parseInt(document.getElementById('neuronsPerLayer').value);
            network = createNetwork(numLayers, neuronsPerLayer);
            document.getElementById('output').innerText = `Network initialized with ${numLayers} layers and ${neuronsPerLayer} neurons each.`;
        });

        document.getElementById('train').addEventListener('click', function() {
            const learningRate = parseFloat(document.getElementById('learningRate').value);
            const numEpochs = parseInt(document.getElementById('numEpochs').value);
            const results = trainNetwork(network, learningRate, numEpochs);
            document.getElementById('output').innerText = results;
        });

        function createNetwork(numLayers, neuronsPerLayer) {
            let network = [];
            for (let i = 0; i < numLayers; i++) {
                let layer = [];
                for (let j = 0; j < neuronsPerLayer; j++) {
                    layer.push({ weight: Math.random(), bias: Math.random() });
                }
                network.push(layer);
            }
            return network;
        }

        function trainNetwork(network, learningRate, numEpochs) {
            let errorSum = 0;
            // Simulate training process and error calculation
            for (let epoch = 0; epoch < numEpochs; epoch++) {
                let error = Math.random();  // Dummy error calculation
                errorSum += error;
                // Update weights and biases
                for (let layer of network) {
                    for (let neuron of layer) {
                        neuron.weight -= learningRate * error;
                        neuron.bias -= learningRate * error;
                    }
                }
            }
            return `Training complete. Total Error: ${errorSum.toFixed(4)}`;
        }
    </script>

</body>
</html>
