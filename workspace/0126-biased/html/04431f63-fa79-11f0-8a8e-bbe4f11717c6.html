<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Window</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .content {
            padding: 20px;
        }

        .content h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #4CAF50;
            color: #fff;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #3e8e41;
        }

        .button:active {
            background-color: #3e8e41;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sliding Window</h1>
        </div>
        <div class="content">
            <h2>Sliding Window Example</h2>
            <p>This is a sliding window example with a simple design.</p>
            <p>It is designed to be visually appealing and easy to understand.</p>
            <button class="button">Click Me</button>
        </div>
        <div class="button-container">
            <button class="button">Click Again</button>
        </div>
    </div>
    <script>
        let windowSize = {
            width: 800,
            height: 600
        };

        let x = 0;
        let y = 0;

        function updateWindow() {
            x = Math.min(x + 20, windowSize.width - 20);
            y = Math.min(y + 20, windowSize.height - 20);
            document.getElementById("window").style.left = x + "px";
            document.getElementById("window").style.top = y + "px";
        }

        function init() {
            document.getElementById("window").style.width = windowSize.width + "px";
            document.getElementById("window").style.height = windowSize.height + "px";
            document.getElementById("window").style.left = "0px";
            document.getElementById("window").style.top = "0px";
            document.getElementById("window").style.background = "white";
            updateWindow();
            window.addEventListener("resize", init);
        }

        init();
    </script>
</body>
</html>
