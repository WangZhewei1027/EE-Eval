<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Complexity Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            color: #ecf0f1;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }
        .graph-container {
            position: relative;
            width: 80%;
            max-width: 800px;
            height: 400px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            background: linear-gradient(135deg, #3498db 0%, #9b59b6 100%);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
        }
        .bar {
            position: absolute;
            bottom: 0;
            background-color: #e74c3c;
            transition: height 0.4s ease-in-out, transform 0.4s ease-in-out;
            border-radius: 5px 5px 0 0;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #16a085;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: background 0.3s, transform 0.3s;
        }
        button:hover {
            background-color: #1abc9c;
            transform: scale(1.05);
        }
        button:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Time Complexity Visualization</h1>
        <div class="graph-container" id="graph-container">
            <!-- Bars will be created here -->
        </div>
        <button id="visualizeButton">Visualize Complexity</button>
    </div>

    <script>
        const complexities = [
            { name: 'O(1)', height: 40 },
            { name: 'O(log n)', height: 70 },
            { name: 'O(n)', height: 100 },
            { name: 'O(n log n)', height: 150 },
            { name: 'O(n^2)', height: 200 },
            { name: 'O(2^n)', height: 300 },
            { name: 'O(n!)', height: 350 },
        ];

        const graphContainer = document.getElementById('graph-container');
        const visualizeButton = document.getElementById('visualizeButton');

        visualizeButton.onclick = () => {
            graphContainer.innerHTML = '';
            complexities.forEach((complexity, index) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.width = `${(index + 1) * 10}%`;
                bar.style.height = `${complexity.height}px`;
                bar.style.transform = `translateX(${10 * index}%)`;
                bar.innerText = complexity.name;
                bar.style.display = 'flex';
                bar.style.alignItems = 'center';
                bar.style.justifyContent = 'center';
                bar.style.color = '#ecf0f1';
                bar.style.fontSize = '1.2em';
                bar.style.marginLeft = `${5}px`;
                graphContainer.appendChild(bar);
                bar.style.transitionDelay = `${index * 100}ms`; // stagger the animation
            });
        };
    </script>
</body>
</html>
