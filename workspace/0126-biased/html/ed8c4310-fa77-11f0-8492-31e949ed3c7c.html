<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Array Showcase</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            animation: fadeIn 1s ease;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.2);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 0.5em;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }
        p {
            font-size: 1.2em;
            margin: 0.5em 0 1.5em;
            opacity: 0.85;
        }
        .dynamic-array {
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            padding: 20px;
            width: 80vw;
            height: 200px;
            position: relative;
            background: rgba(255, 255, 255, 0.1);
        }
        .element {
            width: 60px;
            height: 60px;
            margin: 0 10px;
            background: #ff4081;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            opacity: 0.9;
            transition: transform 0.5s ease;
        }
        .element:hover {
            transform: scale(1.1);
        }
        button {
            background-color: #ffffff;
            color: #6a11cb;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            padding: 10px 20px;
            margin-top: 1em;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.3s ease;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }
        button:hover {
            background-color: #ff4081;
            transform: translateY(-2px);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dynamic Array Showcase</h1>
        <p>Observe the dynamic behavior of elements as they shift and grow!</p>
        <div class="dynamic-array" id="dynamicArray"></div>
        <button id="addElementBtn">Add Element</button>
    </div>
    <script>
        const dynamicArray = document.getElementById('dynamicArray');
        const addElementBtn = document.getElementById('addElementBtn');
        let count = 0;

        addElementBtn.addEventListener('click', () => {
            if (count < 10) {
                count++;
                const newElement = document.createElement('div');
                newElement.className = 'element';
                newElement.textContent = count;
                dynamicArray.appendChild(newElement);
            }
        });
    </script>
</body>
</html>
