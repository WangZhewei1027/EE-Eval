<!DOCTYPE html>
<html>
<head>
    <title>TCP/IP Interactive Explorer</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .panel { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
        .hidden { display: none; }
        button, input, select { margin: 5px; }
        .packet { border: 1px solid #000; padding: 10px; margin: 5px; }
        .layer { margin-left: 20px; }
        table { border-collapse: collapse; width: 100%; }
        td, th { border: 1px solid #000; padding: 5px; text-align: left; }
    </style>
</head>
<body>
    <h1>TCP/IP Interactive Explorer</h1>
    
    <div class="panel">
        <h2>Network Configuration</h2>
        <div>
            <label>Protocol: </label>
            <select id="protocol">
                <option value="tcp">TCP</option>
                <option value="udp">UDP</option>
                <option value="icmp">ICMP</option>
            </select>
        </div>
        <div>
            <label>Source IP: </label>
            <input type="text" id="srcIp" value="192.168.1.1">
        </div>
        <div>
            <label>Destination IP: </label>
            <input type="text" id="destIp" value="10.0.0.1">
        </div>
        <div>
            <label>Source Port: </label>
            <input type="number" id="srcPort" value="5000" min="1" max="65535">
        </div>
        <div>
            <label>Destination Port: </label>
            <input type="number" id="destPort" value="80" min="1" max="65535">
        </div>
        <div>
            <label>Data: </label>
            <input type="text" id="data" value="Hello, TCP/IP!">
        </div>
        <button onclick="sendPacket()">Send Packet</button>
    </div>

    <div class="panel">
        <h2>Packet Construction</h2>
        <div>
            <label>Show Layers: </label>
            <button onclick="showLayer('application')">Application</button>
            <button onclick="showLayer('transport')">Transport</button>
            <button onclick="showLayer('network')">Network</button>
            <button onclick="showLayer('link')">Link</button>
            <button onclick="showLayer('physical')">Physical</button>
        </div>
        <div id="packetView"></div>
    </div>

    <div class="panel">
        <h2>Connection Simulation</h2>
        <div>
            <button onclick="startConnection()">Start TCP Handshake</button>
            <button onclick="closeConnection()">Close Connection</button>
            <button onclick="simulatePacketLoss()">Simulate Packet Loss</button>
            <button onclick="simulateRetransmission()">Simulate Retransmission</button>
        </div>
        <div id="connectionStatus">Status: Not established</div>
        <div id="connectionLog"></div>
    </div>

    <div class="panel">
        <h2>Protocol Analysis</h2>
        <div>
            <label>Window Size: </label>
            <input type="range" id="windowSize" min="1" max="20" value="10" oninput="updateWindowSize()">
            <span id="windowSizeValue">10</span>
        </div>
        <div>
            <label>MSS (Maximum Segment Size): </label>
            <input type="number" id="mss" value="1460" min="100" max="1500" onchange="updateMSS()">
        </div>
        <div>
            <label>Timeout: </label>
            <input type="number" id="timeout" value="2000" min="100" max="10000" step="100" onchange="updateTimeout()"> ms
        </div>
        <div id="analysisResults"></div>
    </div>

    <div class="panel">
        <h2>Packet Inspector</h2>
        <div id="packetList"></div>
        <div id="packetDetails"></div>
    </div>

    <script>
        let connectionState = 'closed';
        let sequenceNumber = 1000;
        let ackNumber = 0;
        let packets = [];
        let windowSize = 10;
        let mss = 1460;
        let timeout = 2000;

        function sendPacket() {
            const protocol = document.getElementById('protocol').value;
            const srcIp = document.getElementById('srcIp').value;
            const destIp = document.getElementById('destIp').value;
            const srcPort = document.getElementById('srcPort').value;
            const destPort = document.getElementById('destPort').value;
            const data = document.getElementById('data').value;

            const packet = {
                id: Date.now(),
                protocol,
                srcIp,
                destIp,
                srcPort,
                destPort,
                data,
                timestamp: new Date().toLocaleTimeString(),
                layers: buildLayers(protocol, srcIp, destIp, srcPort, destPort, data)
            };

            packets.push(packet);
            updatePacketList();
            displayPacket(packet);
            logEvent(`Packet sent from ${srcIp}:${srcPort} to ${destIp}:${destPort} (${protocol})`);
        }

        function buildLayers(protocol, srcIp, destIp, srcPort, destPort, data) {
            const layers = {
                application: {
                    protocol: protocol.toUpperCase(),
                    data: data
                },
                transport: {
                    sourcePort: srcPort,
                    destinationPort: destPort,
                    sequenceNumber: sequenceNumber,
                    ackNumber: ackNumber,
                    windowSize: windowSize,
                    flags: protocol === 'tcp' ? 'SYN' : ''
                },
                network: {
                    version: 4,
                    headerLength: 20,
                    ttl: 64,
                    protocol: protocol === 'tcp' ? 6 : (protocol === 'udp' ? 17 : 1),
                    sourceAddress: srcIp,
                    destinationAddress: destIp
                },
                link: {
                    sourceMAC: '00:1A:2B:3C:4D:5E',
                    destinationMAC: '00:5E:4D:2B:1A:00',
                    type: 'IPv4'
                },
                physical: {
                    encoding: 'NRZ',
                    voltageLevels: '0V (0), +5V (1)',
                    bitRate: '100 Mbps'
                }
            };

            if (protocol === 'tcp') {
                sequenceNumber += data.length;
            }

            return layers;
        }

        function showLayer(layer) {
            const packet = packets[packets.length - 1];
            if (!packet) return;

            const layerData = packet.layers[layer];
            let html = `<h3>${layer.toUpperCase()} Layer</h3><div class="layer"><pre>${JSON.stringify(layerData, null, 2)}</pre></div>`;
            document.getElementById('packetView').innerHTML = html;
        }

        function startConnection() {
            if (connectionState !== 'closed') {
                logEvent('Connection already established or in progress');
                return;
            }

            logEvent('Initiating TCP 3-way handshake...');
            connectionState = 'syn_sent';
            
            // SYN
            setTimeout(() => {
                logEvent('SYN sent (sequence number: ' + sequenceNumber + ')');
                connectionState = 'syn_received';
                
                // SYN-ACK
                setTimeout(() => {
                    ackNumber = sequenceNumber + 1;
                    sequenceNumber = 5000; // Server's initial sequence number
                    logEvent('SYN-ACK received (ack number: ' + ackNumber + ', sequence number: ' + sequenceNumber + ')');
                    connectionState = 'established';
                    
                    // ACK
                    setTimeout(() => {
                        ackNumber = sequenceNumber + 1;
                        logEvent('ACK sent (ack number: ' + ackNumber + ')');
                        document.getElementById('connectionStatus').textContent = 'Status: Connection established';
                        logEvent('TCP connection established successfully');
                    }, 1000);
                }, 1000);
            }, 1000);
        }

        function closeConnection() {
            if (connectionState !== 'established') {
                logEvent('No active connection to close');
                return;
            }

            logEvent('Initiating TCP connection termination...');
            connectionState = 'fin_wait_1';
            
            // FIN
            setTimeout(() => {
                logEvent('FIN sent (sequence number: ' + sequenceNumber + ')');
                connectionState = 'fin_wait_2';
                
                // ACK
                setTimeout(() => {
                    ackNumber = sequenceNumber + 1;
                    logEvent('ACK received (ack number: ' + ackNumber + ')');
                    
                    // FIN from other side
                    setTimeout(() => {
                        sequenceNumber = ackNumber;
                        logEvent('FIN received (sequence number: ' + sequenceNumber + ')');
                        connectionState = 'time_wait';
                        
                        // Final ACK
                        setTimeout(() => {
                            ackNumber = sequenceNumber + 1;
                            logEvent('ACK sent (ack number: ' + ackNumber + ')');
                            connectionState = 'closed';
                            document.getElementById('connectionStatus').textContent = 'Status: Connection closed';
                            logEvent('TCP connection closed successfully');
                        }, 1000);
                    }, 1000);
                }, 1000);
            }, 1000);
        }

        function simulatePacketLoss() {
            logEvent('Simulating packet loss...');
            const lostPacket = {
                id: 'lost-' + Date.now(),
                protocol: document.getElementById('protocol').value,
                srcIp: document.getElementById('srcIp').value,
                destIp: document.getElementById('destIp').value,
                srcPort: document.getElementById('srcPort').value,
                destPort: document.getElementById('destPort').value,
                data: 'LOST PACKET',
                timestamp: new Date().toLocaleTimeString(),
                status: 'LOST'
            };
            
            packets.push(lostPacket);
            updatePacketList();
            logEvent('Packet lost in transmission!');
            
            if (connectionState === 'established') {
                setTimeout(() => {
                    logEvent('Timeout detected, initiating retransmission...');
                    sendPacket();
                }, timeout * 1.5);
            }
        }

        function simulateRetransmission() {
            if (packets.length === 0) return;
            const lastPacket = packets[packets.length - 1];
            logEvent('Retransmitting last packet...');
            
            const retransmittedPacket = {
                ...lastPacket,
                id: 'retransmit-' + Date.now(),
                timestamp: new Date().toLocaleTimeString(),
                status: 'RETRANSMITTED'
            };
            
            packets.push(retransmittedPacket);
            updatePacketList();
            displayPacket(retransmittedPacket);
            logEvent('Packet retransmitted');
        }

        function updateWindowSize() {
            const value = document.getElementById('windowSize').value;
            document.getElementById('windowSizeValue').textContent = value;
            windowSize = parseInt(value);
            document.getElementById('analysisResults').innerHTML = 
                `Window size updated to ${value}. This affects flow control and throughput.`;
        }

        function updateMSS() {
            mss = document.getElementById('mss').value;
            document.getElementById('analysisResults').innerHTML = 
                `MSS updated to ${mss}. This affects how data is segmented for transmission.`;
        }

        function updateTimeout() {
            timeout = document.getElementById('timeout').value;
            document.getElementById('analysisResults').innerHTML = 
                `Timeout updated to ${timeout}ms. This affects how long to wait before retransmitting lost packets.`;
        }

        function logEvent(message) {
            const log = document.getElementById('connectionLog');
            log.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${message}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        function updatePacketList() {
            const list = document.getElementById('packetList');
            list.innerHTML = '<h3>Captured Packets</h3>';
            
            packets.forEach((packet, index) => {
                const status = packet.status ? ` (${packet.status})` : '';
                list.innerHTML += `
                    <div class="packet" onclick="displayPacketAtIndex(${index})">
                        #${index + 1}: ${packet.protocol} ${packet.srcIp}:${packet.srcPort} → ${packet.destIp}:${packet.destPort} 
                        [${packet.timestamp}]${status}
                    </div>
                `;
            });
        }

        function displayPacketAtIndex(index) {
            if (index >= 0 && index < packets.length) {
                displayPacket(packets[index]);
            }
        }

        function displayPacket(packet) {
            const details = document.getElementById('packetDetails');
            details.innerHTML = `
                <h3>Packet Details</h3>
                <table>
                    <tr><th>Field</th><th>Value</th></tr>
                    <tr><td>Protocol</td><td>${packet.protocol.toUpperCase()}</td></tr>
                    <tr><td>Source</td><td>${packet.srcIp}:${packet.srcPort}</td></tr>
                    <tr><td>Destination</td><td>${packet.destIp}:${packet.destPort}</td></tr>
                    <tr><td>Timestamp</td><td>${packet.timestamp}</td></tr>
                    <tr><td>Status</td><td>${packet.status || 'Normal'}</td></tr>
                    <trIfExists(packet, 'sequenceNumber')}
                    <trIfExists(packet, 'ackNumber')}
                    <tr><td>Data</td><td>${packet.data}</td></tr>
                </table>
                <h4>Layers</h4>
                <button onclick="showLayerForPacket('application', ${packets.indexOf(packet)})">Application</button>
                <button onclick="showLayerForPacket('transport', ${packets.indexOf(packet)})">Transport</button>
                <button onclick="showLayerForPacket('network', ${packets.indexOf(packet)})">Network</button>
                <button onclick="showLayerForPacket('link', ${packets.indexOf(packet)})">Link</button>
                <button onclick="showLayerForPacket('physical', ${packets.indexOf(packet)})">Physical</button>
            `;
        }

        function trIfExists(packet, field) {
            if (packet[field] !== undefined) {
                return `<tr><td>${field}</td><td>${packet[field]}</td></tr>`;
            }
            return '';
        }

        function showLayerForPacket(layer, index) {
            if (index >= 0 && index < packets.length) {
                const packet = packets[index];
                const layerData = packet.layers[layer];
                let html = `<h3>${layer.toUpperCase()} Layer</h3><div class="layer"><pre>${JSON.stringify(layerData, null, 2)}</pre></div>`;
                document.getElementById('packetDetails').innerHTML += html;
            }
        }
    </script>
</body>
</html>
