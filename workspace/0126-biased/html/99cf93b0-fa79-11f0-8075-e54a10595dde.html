<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big-Theta Notation Interactive Explorer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .control {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Big-Theta Notation Explorer</h1>
    <div class="control">
        <label for="inputFunction">Input Function (n):</label>
        <input type="number" id="inputFunction" value="1" min="1" onchange="updateGraph()">
    </div>
    <div class="control">
        <label for="thetaFunction">Theta Function:</label>
        <select id="thetaFunction" onchange="updateGraph()">
            <option value="n">Θ(n)</option>
            <option value="nLogN">Θ(n log n)</option>
            <option value="nSquared">Θ(n²)</option>
            <option value="logN">Θ(log n)</option>
            <option value="constant">Θ(1)</option>
        </select>
    </div>
    <div class="control">
        <label for="nValue">Value of n:</label>
        <input type="range" id="nValue" min="1" max="100" value="10" onchange="updateGraph()">
        <span id="rangeValue">10</span>
    </div>
    <button onclick="calculate()">Calculate Big-Theta</button>
    <div id="output"></div>

    <script>
        function updateGraph() {
            const nInput = document.getElementById('inputFunction').value;
            const thetaFunc = document.getElementById('thetaFunction').value;
            const nValue = document.getElementById('nValue').value;
            document.getElementById('rangeValue').textContent = nValue;

            document.getElementById('output').innerHTML = `
                Current Input (n): ${nInput} <br>
                Selected Theta Function: ${thetaFunc} <br>
                Evaluated at n = ${nValue}: ${calculateTheta(thetaFunc, nValue)} <br>
            `;
        }

        function calculateTheta(func, n) {
            n = parseInt(n);
            switch (func) {
                case "n":
                    return `${n}`;
                case "nLogN":
                    return `${n * Math.log(n).toFixed(2)}`;
                case "nSquared":
                    return `${n * n}`;
                case "logN":
                    return `${Math.log(n).toFixed(2)}`;
                case "constant":
                    return `1`;
                default:
                    return `Undefined`;
            }
        }

        function calculate() {
            updateGraph();
        }
    </script>
</body>
</html>
