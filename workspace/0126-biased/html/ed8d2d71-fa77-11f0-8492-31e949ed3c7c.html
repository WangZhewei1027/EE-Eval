<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Queue Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #6A82FB, #FC5C7D);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            width: 500px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .queue {
            position: relative;
            width: 100%;
            height: 300px;
            border: 2px solid #FFF;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            background: rgba(255, 255, 255, 0.1);
        }
        .element {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: transform 0.3s ease;
            opacity: 0.85;
        }
        .element.high {
            background-color: #FF3B30;
        }
        .element.medium {
            background-color: #FFCC00;
        }
        .element.low {
            background-color: #4CD964;
        }
        .button {
            background-color: #FFF;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            margin-top: 20px;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            outline: none;
        }
        .button:hover {
            background-color: #e0e0e0;
        }
        .button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Priority Queue Visualization</h1>
    <div class="queue" id="queue"></div>
    <button class="button" onclick="startAnimation()">Watch Queue</button>
</div>

<script>
    const queueContainer = document.getElementById('queue');
    const priorities = [
        { value: 'A', priority: 'high' },
        { value: 'B', priority: 'medium' },
        { value: 'C', priority: 'low' },
        { value: 'D', priority: 'medium' },
        { value: 'E', priority: 'high' },
    ];
    
    function createElement(value, priority, index) {
        const element = document.createElement('div');
        element.className = `element ${priority}`;
        element.innerText = value;
        element.style.bottom = `${index * 60}px`;  // stack elements vertically
        return element;
    }

    function addElementsToQueue() {
        queueContainer.innerHTML = ""; // Clear queue
        priorities.forEach((item, index) => {
            const el = createElement(item.value, item.priority, index);
            queueContainer.appendChild(el);
        });
    }

    function startAnimation() {
        addElementsToQueue();
        const elements = document.querySelectorAll('.element');

        elements.forEach((el, index) => {
            el.style.transform = `translateY(${Math.random() * 50}px)`;
            setTimeout(() => {
                el.style.transform = 'translateY(0)';
                el.style.opacity = '1';
            }, index * 200);
        });
    }
    
    startAnimation(); // Automatically start the animation when the page loads
</script>

</body>
</html>
