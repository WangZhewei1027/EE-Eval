<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        #container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #container h1 {
            margin-bottom: 10px;
        }
        #container button, #container input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #container input[type="text"] {
            width: 50%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
        }
        #container button[type="button"] {
            width: 20%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #container button[type="submit"] {
            width: 20%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #container button[type="button"]:hover {
            width: 25%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Binary Search Tree</h1>
        <button id="add-branch">Add Branch</button>
        <button id="remove-branch">Remove Branch</button>
        <input id="input-text" type="text" placeholder="Enter node value">
        <button id="add-node">Add Node</button>
        <button id="remove-node">Remove Node</button>
        <button id="clear-branch">Clear Branch</button>
        <button id="clear-node">Clear Node</button>
        <button id="search-node">Search Node</button>
        <button id="insert-node">Insert Node</button>
        <button id="delete-node">Delete Node</button>
        <button id="print-bst">Print BST</button>
        <button id="reset-bst">Reset BST</button>
        <button id="display-bst">Display BST</button>
    </div>

    <script>
        let bst = new BinarySearchTree();
        let inputText = document.getElementById('input-text');
        let addBranchButton = document.getElementById('add-branch');
        let removeBranchButton = document.getElementById('remove-branch');
        let addNodeButton = document.getElementById('add-node');
        let removeNodeButton = document.getElementById('remove-node');
        let clearBranchButton = document.getElementById('clear-branch');
        let clearNodeButton = document.getElementById('clear-node');
        let searchNodeButton = document.getElementById('search-node');
        let insertNodeButton = document.getElementById('insert-node');
        let deleteNodeButton = document.getElementById('delete-node');
        let printBstButton = document.getElementById('print-bst');
        let resetBstButton = document.getElementById('reset-bst');
        let displayBstButton = document.getElementById('display-bst');

        addBranchButton.addEventListener('click', addBranch);
        removeBranchButton.addEventListener('click', removeBranch);
        addNodeButton.addEventListener('click', addNode);
        removeNodeButton.addEventListener('click', removeNode);
        clearBranchButton.addEventListener('click', clearBranch);
        clearNodeButton.addEventListener('click', clearNode);
        searchNodeButton.addEventListener('click', searchNode);
        insertNodeButton.addEventListener('click', insertNode);
        deleteNodeButton.addEventListener('click', deleteNode);
        printBstButton.addEventListener('click', printBst);
        resetBstButton.addEventListener('click', resetBst);
        displayBstButton.addEventListener('click', displayBst);

        function addBranch() {
            let value = inputText.value.trim();
            if (value) {
                bst.add(value);
                inputText.value = '';
            }
        }

        function removeBranch() {
            bst.remove();
            inputText.value = '';
        }

        function addNode() {
            let value = inputText.value.trim();
            if (value) {
                bst.addNode(value);
                inputText.value = '';
            }
        }

        function removeNode() {
            bst.removeNode(inputText.value.trim());
            inputText.value = '';
        }

        function searchNode() {
            let value = inputText.value.trim();
            if (value) {
                bst.search(value);
                inputText.value = '';
            }
        }

        function insertNode() {
            let value = inputText.value.trim();
            if (value) {
                bst.insert(value);
                inputText.value = '';
            }
        }

        function deleteNode() {
            bst.delete(inputText.value.trim());
            inputText.value = '';
        }

        function printBst() {
            bst.print();
        }

        function resetBst() {
            bst.reset();
        }

        function displayBst() {
            bst.display();
        }

        function print() {
            let output = '';
            bst.print().forEach(node => output += `${node.value} -> ${node.left ? node.left.value : ''} -> ${node.right ? node.right.value : ''}\n`);
            console.log(output);
        }

        function reset() {
            bst.reset();
        }

        function clear() {
            bst.clear();
        }

        function clearNode() {
            bst.clearNode(inputText.value.trim());
            inputText.value = '';
        }

        function clearBranch() {
            bst.clearBranch(inputText.value.trim());
            inputText.value = '';
        }

        function display() {
            bst.display();
        }
    </script>
</body>
</html>
