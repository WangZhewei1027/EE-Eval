<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Context Switching - Visual Concept</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');
  /* Reset */
  * {
    box-sizing: border-box;
  }
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: linear-gradient(135deg, #2c3e50 0%, #4ca1af 100%);
    font-family: 'Poppins', sans-serif;
    color: #f0f4f8;
    overflow-x: hidden;
    user-select: none;
  }
  h1 {
    font-weight: 600;
    font-size: 3.4rem;
    letter-spacing: 0.06em;
    margin: 0 0 0.3em 0;
  }
  h2 {
    font-weight: 300;
    font-size: 1.2rem;
    color: rgba(240,244,248,0.7);
    margin: 0 0 2.4em 0;
    letter-spacing: 0.06em;
  }
  .wrapper {
    max-width: 960px;
    margin: 3.5rem auto 6rem;
    padding: 0 2rem;
    text-align: center;
  }
  .button-container {
    margin-top: 3rem;
  }
  button {
    background: #6dd5ed;
    background: linear-gradient(45deg, #6dd5ed 0%, #2193b0 100%);
    border: none;
    border-radius: 32px;
    color: #f0f4f8;
    font-weight: 600;
    font-size: 1.1rem;
    letter-spacing: 0.06em;
    padding: 0.95rem 3.2rem;
    cursor: pointer;
    box-shadow: 0 8px 16px rgb(33 147 176 / 0.5);
    transition: background 0.4s ease, box-shadow 0.4s ease, transform 0.2s ease;
  }
  button:hover {
    background: #43cea2;
    background: linear-gradient(45deg, #43cea2 0%, #185a9d 100%);
    box-shadow: 0 14px 24px rgb(24 90 157 / 0.6);
    transform: translateY(-3px);
  }
  button:active {
    transform: translateY(0);
    box-shadow: 0 6px 12px rgb(24 90 157 / 0.45);
  }
  /* Context Switcher Container */
  #contextSwitcher {
    position: relative;
    height: 420px;
    margin: 0 auto;
    max-width: 900px;
    border-radius: 28px;
    background: radial-gradient(circle at center, #1f3a5f 0%, #122a44 85%);
    box-shadow:
      inset 0 0 40px #3fa9f5aa,
      0 15px 40px #0e243fcc;
    overflow: visible;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Circle background representing brain/task bubble */
  .brain-area {
    position: absolute;
    border-radius: 50%;
    filter: drop-shadow(0 0 4px #5dc1ffaa);
    animation: pulseGlow 4s ease-in-out infinite alternate;
  }
  .brain-primary {
    width: 320px;
    height: 320px;
    background: radial-gradient(circle at 30% 30%, #5599ffcc 0%, #1b2e5fcc 85%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    box-shadow:
      0 0 30px 14px #5599ff88 inset,
      0 8px 28px #5599ffbb;
    border: 2.4px solid #7db9ffcc;
  }
  .brain-secondary {
    width: 220px;
    height: 220px;
    background: radial-gradient(circle at 70% 70%, #42d392cc 0%, #266e5199 80%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 0 6px #42d392dd);
    border: 1.8px solid #4ade8088;
  }
  @keyframes pulseGlow {
    0% {
      box-shadow:
        inset 0 0 30px #5599ff99,
        0 0 40px #5599ffbb;
    }
    100% {
      box-shadow:
        inset 0 0 40px #7fb9ffcc,
        0 0 55px #7fb9ffcc;
    }
  }
  /* Context labels and nodes */
  .context-node {
    position: absolute;
    width: 88px;
    height: 88px;
    background: linear-gradient(145deg, #1f3e6f 0%, #3f6ecf 80%);
    border-radius: 18px;
    box-shadow: 0 0 18px #58a1ffee, 0 14px 24px #3d6bccaa;
    color: #d9e6ff;
    font-weight: 600;
    font-size: 1.1rem;
    text-align: center;
    line-height: 1.2;
    padding: 1.7rem 0.8rem 0 0.8rem;
    user-select: none;
    letter-spacing: 0.04em;
    transition:
      transform 0.9s cubic-bezier(0.4, 0.0, 0.2, 1),
      box-shadow 0.7s ease,
      background 0.8s ease;
  }
  .context-node p {
    margin: 0;
    color: #bbd7ffcc;
    font-weight: 300;
    font-size: 0.72rem;
    opacity: 0.75;
    letter-spacing: 0.04em;
  }
  /* Positions for the 5 contexts */
  .context1 { top: 46%; left: 18%; }
  .context2 { top: 18%; left: 70%; }
  .context3 { top: 72%; left: 72%; }
  .context4 { top: 80%; left: 32%; }
  .context5 { top: 32%; left: 48%; }

  /* Highlight active context node */
  .active {
    background: linear-gradient(135deg, #ff9a59 0%, #ff6040 100%);
    box-shadow:
      0 0 26px #ff8540cc,
      0 12px 28px #ff4f260f,
      0 0 18px #ff613426 inset;
    color: #ffe8d4;
  }
  .active p {
    color: #ffd9bbdd;
  }

  /* Connecting Arcs (Context Switching Paths) */
  svg.connections {
    position: absolute;
    top: 50%; left: 50%;
    width: 680px; height: 400px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    overflow: visible;
  }
  svg.connections path {
    fill: none;
    stroke: #619fdfbb;
    stroke-width: 2.8;
    stroke-linecap: round;
    filter: drop-shadow(0 0 12px #619fdf66);
    transition: stroke 0.7s ease;
  }

  svg.connections path.active-path {
    stroke: #ff7c42cc;
    stroke-width: 3.6;
    filter: drop-shadow(0 0 18px #ff7c4266);
    animation: pathGlow 1.8s ease-in-out infinite alternate;
  }
  @keyframes pathGlow {
    0% {
      stroke-width: 3.6;
      filter: drop-shadow(0 0 18px #ff7c4266);
      stroke-opacity: 0.65;
    }
    100% {
      stroke-width: 4.4;
      filter: drop-shadow(0 0 26px #ff7c4277);
      stroke-opacity: 1;
    }
  }

  /* Tooltip styling for node labels on hover (optional minimal) */
  .context-node:hover {
    box-shadow:
      0 0 28px #81b3ffdd,
      0 16px 32px #3a71ccbb;
    transition: box-shadow 0.3s ease;
  }

  /* Subtitle with subtle shadow */
  .tagline {
    font-weight: 300;
    font-size: 1.05rem;
    color: #aacedfbb;
    margin-bottom: 7rem;
    letter-spacing: 0.1em;
    text-shadow: 0 0 8px #2b5673bb;
  }
</style>
</head>
<body>
  <div class="wrapper" role="main" aria-label="Context Switching visualization">
    <h1>Context Switching</h1>
    <h2 class="tagline">Seamlessly shifting your mental focus between diverse tasks</h2>
    <div id="contextSwitcher" aria-live="polite" aria-atomic="true" aria-label="Context switching visualization">
      <div class="brain-area brain-secondary"></div>
      <div class="brain-area brain-primary"></div>

      <!-- Context Nodes -->
      <div class="context-node context1 active" data-index="0" aria-label="Context 1: Email Management" tabindex="0">
        Email<br/><p>Management</p>
      </div>
      <div class="context-node context2" data-index="1" aria-label="Context 2: Code Review" tabindex="0">
        Code<br/><p>Review</p>
      </div>
      <div class="context-node context3" data-index="2" aria-label="Context 3: Meeting Prep" tabindex="0">
        Meeting<br/><p>Prep</p>
      </div>
      <div class="context-node context4" data-index="3" aria-label="Context 4: Design Work" tabindex="0">
        Design<br/><p>Work</p>
      </div>
      <div class="context-node context5" data-index="4" aria-label="Context 5: Documentation" tabindex="0">
        Documentation<br/><p>Tasks</p>
      </div>

      <!-- SVG Connections -->
      <svg class="connections" aria-hidden="true" focusable="false" viewBox="0 0 680 400" >
        <!-- Arcs connecting nodes in sequence -->
        <path class="connection-path" d="M120 190 Q170 60 430 80" />
        <path class="connection-path" d="M430 80 Q470 150 515 287" />
        <path class="connection-path" d="M515 287 Q510 350 280 335" />
        <path class="connection-path" d="M280 335 Q150 330 120 200" />
        <path class="connection-path" d="M120 200 Q210 250 335 160" />
      </svg>
    </div>
    <div class="button-container" role="region" aria-label="Control buttons to switch context">
      <button id="prevBtn" aria-controls="contextSwitcher" aria-label="Switch to previous context">← Previous</button>
      <button id="nextBtn" aria-controls="contextSwitcher" aria-label="Switch to next context">Next →</button>
    </div>
  </div>

<script>
  (() => {
    const contexts = [
      { label: "Email Management" },
      { label: "Code Review" },
      { label: "Meeting Prep" },
      { label: "Design Work" },
      { label: "Documentation Tasks" },
    ];
    const nodes = document.querySelectorAll('.context-node');
    const paths = document.querySelectorAll('.connections path.connection-path');
    let activeIndex = 0;

    // Helper: Update UI for active context
    function updateActiveContext(newIndex) {
      if (newIndex === activeIndex) return;
      // Remove active classes from old node
      nodes[activeIndex].classList.remove('active');
      paths[activeIndex].classList.remove('active-path');
      // Clear aria-live for old node
      nodes[activeIndex].setAttribute('aria-pressed', 'false');

      activeIndex = newIndex;

      // Add active classes on new node
      nodes[activeIndex].classList.add('active');
      paths[activeIndex].classList.add('active-path');
      nodes[activeIndex].setAttribute('aria-pressed', 'true');

      // For accessibility: announce new focus
      const liveRegion = document.getElementById('contextSwitcher');
      liveRegion.setAttribute('aria-label', `Context switching visualization: Current context is ${contexts[activeIndex].label}`);

      // Animate subtle context "pulse" on active node
      pulseNode(nodes[activeIndex]);
    }

    // Subtle pulse animation on node for emphasis
    function pulseNode(node) {
      node.animate([
        { transform: 'scale(1)', boxShadow: '0 0 18px #ff8540cc, 0 12px 28px #ff4f260f, 0 0 18px #ff613426 inset' },
        { transform: 'scale(1.08)', boxShadow: '0 0 27px #ff9e6022, 0 22px 38px #ff7c420d, 0 0 22px #fb6e2012 inset' },
        { transform: 'scale(1)', boxShadow: '0 0 18px #ff8540cc, 0 12px 28px #ff4f260f, 0 0 18px #ff613426 inset' }
      ], {
        duration: 700,
        easing: 'ease-in-out',
        iterations: 1
      });
    }

    // Handle button clicks
    document.getElementById('prevBtn').addEventListener('click', () => {
      let newIndex = (activeIndex - 1 + contexts.length) % contexts.length;
      updateActiveContext(newIndex);
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      let newIndex = (activeIndex + 1) % contexts.length;
      updateActiveContext(newIndex);
    });

    // Initialize active path style for first active context
    paths[activeIndex].classList.add('active-path');
    nodes[activeIndex].setAttribute('aria-pressed', 'true');

  })();
</script>
</body>
</html>
