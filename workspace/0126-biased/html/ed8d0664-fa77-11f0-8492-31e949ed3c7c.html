<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Heap Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom right, #0f2027, #2c5364);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            position: relative;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 0.5em;
        }

        .heap {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin: 20px 0;
        }

        .node {
            width: 50px;
            height: 50px;
            background-color: #007f7f;
            border-radius: 10px;
            position: relative;
            margin: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
            color: #ffffff;
            transition: transform 0.3s ease;
        }

        .node:hover {
            transform: scale(1.1);
        }

        button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 1.5em;
            margin: 15px 0;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Min Heap Visualization</h1>
        <div class="heap" id="heapContainer">
            <div class="node">1</div>
            <div class="node">2</div>
            <div class="node">3</div>
            <div class="node">4</div>
            <div class="node">5</div>
            <div class="node">6</div>
        </div>
        <button id="animateButton">Animate</button>
        <footer>Heap Animation by YourName</footer>
    </div>

    <script>
        let isAnimating = false;

        document.getElementById('animateButton').addEventListener('click', () => {
            if (!isAnimating) {
                isAnimating = true;
                const nodes = document.querySelectorAll('.node');
                nodes.forEach((node, index) => {
                    setTimeout(() => {
                        node.style.transform = 'translateY(-20px)';
                        setTimeout(() => {
                            node.style.transform = 'translateY(0)';
                        }, 500);
                    }, index * 300);
                });
                setTimeout(() => isAnimating = false, nodes.length * 300 + 500);
            }
        });
    </script>
</body>
</html>
