<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Complexity</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .controls {
            margin-top: 20px;
        }
        
        .button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        
        .slider {
            width: 100%;
            height: 10px;
            margin-bottom: 10px;
        }
        
        .input-field {
            width: 100%;
            height: 10px;
            margin-bottom: 10px;
            padding: 5px;
        }
        
        .button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Time Complexity</h1>
        </div>
        <div class="controls">
            <div class="button">
                <button id="start-button">Start</button>
            </div>
            <div class="button">
                <button id="stop-button">Stop</button>
            </div>
            <div class="button">
                <button id="reset-button">Reset</button>
            </div>
            <div class="slider">
                <input type="range" id="duration-slider" min="1" max="100" value="10">
                <label for="duration-slider">Duration (s)</label>
            </div>
            <div class="input-field">
                <input type="text" id="time-input" placeholder="Enter time in seconds">
            </div>
            <div class="button">
                <button id="calculate-button">Calculate</button>
            </div>
        </div>
    </div>
    
    <script>
        let startButton = document.getElementById('start-button');
        let stopButton = document.getElementById('stop-button');
        let resetButton = document.getElementById('reset-button');
        let durationSlider = document.getElementById('duration-slider');
        let timeInput = document.getElementById('time-input');
        let calculateButton = document.getElementById('calculate-button');
        
        let duration = 10;
        let time = 0;
        
        startButton.addEventListener('click', start);
        stopButton.addEventListener('click', stop);
        resetButton.addEventListener('click', reset);
        
        function start() {
            startButton.disabled = true;
            stopButton.disabled = false;
            calculateButton.disabled = false;
            durationSlider.disabled = false;
            timeInput.disabled = false;
            calculateButton.style.backgroundColor = 'green';
        }
        
        function stop() {
            startButton.disabled = false;
            stopButton.disabled = true;
            calculateButton.disabled = true;
            durationSlider.disabled = true;
            timeInput.disabled = true;
            calculateButton.style.backgroundColor = 'red';
        }
        
        function reset() {
            startButton.disabled = true;
            stopButton.disabled = false;
            calculateButton.disabled = false;
            durationSlider.disabled = false;
            timeInput.disabled = false;
            calculateButton.style.backgroundColor = 'green';
            duration = 10;
            time = 0;
            startButton.disabled = false;
            stopButton.disabled = true;
            calculateButton.disabled = true;
        }
        
        function calculate() {
            time = duration * time;
            timeInput.value = time;
            calculateButton.style.backgroundColor = 'green';
        }
        
        durationSlider.addEventListener('input', calculate);
        timeInput.addEventListener('input', calculate);
    </script>
</body>
</html>
