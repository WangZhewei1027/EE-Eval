<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijkstra's Algorithm Interactive Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #graph { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Dijkstra's Algorithm Interactive Demo</h1>

    <label for="nodes">Enter Nodes (comma separated):</label>
    <input type="text" id="nodes" placeholder="A,B,C,D,E" />
    
    <label for="edges">Enter Edges (e.g., A-B:1,B-C:2,...):</label>
    <input type="text" id="edges" placeholder="A-B:1,B-C:2" />
    
    <button id="createGraph">Create Graph</button>
    <button id="findShortestPath">Find Shortest Path</button>
    
    <div id="graph"></div>
    <div id="result"></div>

    <script>
        let graph = {};
        let startNode = '';
        let endNode = '';

        document.getElementById("createGraph").onclick = function() {
            const nodesInput = document.getElementById("nodes").value.split(',').map(n => n.trim());
            const edgesInput = document.getElementById("edges").value.split(',').map(e => e.trim());

            graph = {};
            nodesInput.forEach(node => {
                graph[node] = {};
            });

            edgesInput.forEach(edge => {
                const [connection, weight] = edge.split(':');
                const [nodeA, nodeB] = connection.split('-');
                graph[nodeA][nodeB] = parseInt(weight);
                graph[nodeB][nodeA] = parseInt(weight); // undirected graph
            });

            document.getElementById("result").innerText = "Graph created. You can now find the shortest path.";
        };

        document.getElementById("findShortestPath").onclick = function() {
            startNode = prompt("Enter start node:");
            endNode = prompt("Enter end node:");
            const shortestPath = dijkstra(graph, startNode, endNode);
            document.getElementById("result").innerText = shortestPath 
                ? `Shortest path from ${startNode} to ${endNode}: ${shortestPath.path.join(" -> ")} with cost ${shortestPath.cost}` 
                : "Path not found.";
        };

        function dijkstra(graph, start, end) {
            const distances = {};
            const previous = {};
            const unvisited = new Set();

            for (let node in graph) {
                distances[node] = Infinity;
                previous[node] = null;
                unvisited.add(node);
            }

            distances[start] = 0;

            while (unvisited.size > 0) {
                const currentNode = Array.from(unvisited).reduce((minNode, node) => 
                    distances[node] < distances[minNode] ? node : minNode);
                
                if (currentNode === end) {
                    const path = [];
                    let cost = distances[currentNode];
                    while (currentNode) {
                        path.push(currentNode);
                        currentNode = previous[currentNode];
                    }
                    return { path: path.reverse(), cost: cost };
                }

                unvisited.delete(currentNode);
                for (let neighbor in graph[currentNode]) {
                    const edgeWeight = graph[currentNode][neighbor];
                    const newDistance = distances[currentNode] + edgeWeight;

                    if (newDistance < distances[neighbor]) {
                        distances[neighbor] = newDistance;
                        previous[neighbor] = currentNode;
                    }
                }
            }
            return null; // If no path found
        }
    </script>
</body>
</html>
