<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack Visualization</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-size: 18px;
        }

        h1 {
            position: absolute;
            top: 20px;
            text-align: center;
            color: #fff;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        .container {
            position: relative;
            width: 300px;
            height: 400px;
            perspective: 1000px;
        }

        .stack {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transform: rotateX(0);
            transition: transform 0.6s ease;
        }

        .block {
            position: absolute;
            width: 100%;
            height: calc(100% / 5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 1.5em;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
            border-radius: 8px;
        }

        .block:nth-child(1) {
            background-color: #ff6b6b;
            transform: translateZ(-50px);
        }

        .block:nth-child(2) {
            background-color: #ff9474;
            transform: translateZ(-30px);
        }

        .block:nth-child(3) {
            background-color: #ffc65b;
            transform: translateZ(-10px);
        }

        .block:nth-child(4) {
            background-color: #84e0a1;
            transform: translateZ(10px);
        }

        .block:nth-child(5) {
            background-color: #56b7f1;
            transform: translateZ(30px);
        }

        .button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.8);
            color: #0072ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2em;
            transition: background-color 0.3s, transform 0.3s;
        }

        .button:hover {
            background-color: rgba(255, 255, 255, 1);
            transform: scale(1.05);
        }

        .button:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <h1>Stack Visualization</h1>
    <div class="container">
        <div class="stack">
            <div class="block">1</div>
            <div class="block">2</div>
            <div class="block">3</div>
            <div class="block">4</div>
            <div class="block">5</div>
        </div>
    </div>
    <button class="button" onclick="toggleRotate()">Toggle Rotate</button>

    <script>
        let rotated = false; // Track rotation state
        function toggleRotate() {
            const stack = document.querySelector('.stack');
            if (!rotated) {
                stack.style.transform = 'rotateX(360deg)'; // Rotate stack
            } else {
                stack.style.transform = 'rotateX(0deg)'; // Reset rotation
            }
            rotated = !rotated; // Toggle state
        }
    </script>
</body>
</html>
