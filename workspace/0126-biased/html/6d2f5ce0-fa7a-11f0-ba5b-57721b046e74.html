<!DOCTYPE html>
<html>
<head>
    <title>Backtracking Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .visualization {
            border: 1px solid #000;
            padding: 10px;
            min-height: 300px;
            font-family: monospace;
            white-space: pre;
            overflow: auto;
        }
        .state-info {
            margin-top: 20px;
            border-top: 1px solid #000;
            padding-top: 10px;
        }
        button, select, input {
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Backtracking Algorithm Explorer</h1>
        
        <div class="controls">
            <div>
                <h3>Problem Type</h3>
                <select id="problemType">
                    <option value="nqueens">N-Queens</option>
                    <option value="sudoku">Sudoku</option>
                    <option value="maze">Maze Solver</option>
                    <option value="subset">Subset Sum</option>
                </select>
            </div>
            
            <div>
                <h3>Problem Size</h3>
                <input type="range" id="problemSize" min="3" max="10" value="4">
                <span id="sizeValue">4</span>
            </div>
            
            <div>
                <h3>Speed</h3>
                <input type="range" id="speed" min="50" max="2000" value="500">
                <span id="speedValue">500ms</span>
            </div>
            
            <div>
                <h3>Algorithm Control</h3>
                <button id="startBtn">Start</button>
                <button id="stepBtn">Step</button>
                <button id="resetBtn">Reset</button>
            </div>
            
            <div>
                <h3>Visualization Mode</h3>
                <select id="visualMode">
                    <option value="full">Full State</option>
                    <option value="current">Current Path</option>
                    <option value="compact">Compact</option>
                </select>
            </div>
            
            <div>
                <h3>Heuristics</h3>
                <select id="heuristic">
                    <option value="none">None</option>
                    <option value="mrv">Minimum Remaining Values</option>
                    <option value="degree">Degree Heuristic</option>
                </select>
            </div>
        </div>
        
        <div class="visualization" id="visualization"></div>
        
        <div class="state-info">
            <h3>Current State Information</h3>
            <div id="stateDetails"></div>
            <div id="backtrackCount">Backtracks: 0</div>
            <div id="stepsCount">Steps: 0</div>
        </div>
    </div>

    <script>
        // Global state
        let currentProblem = 'nqueens';
        let problemSize = 4;
        let speed = 500;
        let running = false;
        let intervalId = null;
        let steps = 0;
        let backtracks = 0;
        let currentState = [];
        let solution = [];
        let history = [];
        let currentIndex = 0;
        
        // DOM elements
        const problemTypeSelect = document.getElementById('problemType');
        const problemSizeInput = document.getElementById('problemSize');
        const sizeValueSpan = document.getElementById('sizeValue');
        const speedInput = document.getElementById('speed');
        const speedValueSpan = document.getElementById('speedValue');
        const startBtn = document.getElementById('startBtn');
        const stepBtn = document.getElementById('stepBtn');
        const resetBtn = document.getElementById('resetBtn');
        const visualModeSelect = document.getElementById('visualMode');
        const heuristicSelect = document.getElementById('heuristic');
        const visualizationDiv = document.getElementById('visualization');
        const stateDetailsDiv = document.getElementById('stateDetails');
        const backtrackCountDiv = document.getElementById('backtrackCount');
        const stepsCountDiv = document.getElementById('stepsCount');
        
        // Event listeners
        problemTypeSelect.addEventListener('change', (e) => {
            currentProblem = e.target.value;
            resetProblem();
        });
        
        problemSizeInput.addEventListener('input', (e) => {
            problemSize = parseInt(e.target.value);
            sizeValueSpan.textContent = problemSize;
            resetProblem();
        });
        
        speedInput.addEventListener('input', (e) => {
            speed = parseInt(e.target.value);
            speedValueSpan.textContent = speed + 'ms';
            if (running) {
                clearInterval(intervalId);
                startAlgorithm();
            }
        });
        
        startBtn.addEventListener('click', () => {
            if (running) {
                stopAlgorithm();
                startBtn.textContent = 'Start';
            } else {
                startAlgorithm();
                startBtn.textContent = 'Stop';
            }
        });
        
        stepBtn.addEventListener('click', () => {
            if (!running) {
                performStep();
            }
        });
        
        resetBtn.addEventListener('click', () => {
            resetProblem();
        });
        
        visualModeSelect.addEventListener('change', () => {
            updateVisualization();
        });
        
        // Initialize
        resetProblem();
        
        // Problem-specific functions
        function initializeProblem() {
            steps = 0;
            backtracks = 0;
            currentIndex = 0;
            history = [];
            
            switch(currentProblem) {
                case 'nqueens':
                    currentState = Array(problemSize).fill(-1);
                    break;
                case 'sudoku':
                    currentState = Array(problemSize*problemSize).fill(0);
                    // Add some fixed numbers for Sudoku
                    for (let i = 0; i < Math.floor(problemSize/2); i++) {
                        const pos = Math.floor(Math.random() * problemSize*problemSize);
                        const num = Math.floor(Math.random() * problemSize) + 1;
                        currentState[pos] = num;
                    }
                    break;
                case 'maze':
                    currentState = Array(problemSize*problemSize).fill(0);
                    // Create walls
                    for (let i = 0; i < problemSize*2; i++) {
                        const pos = Math.floor(Math.random() * problemSize*problemSize);
                        currentState[pos] = 1; // 1 represents a wall
                    }
                    // Set start and end
                    currentState[0] = 2; // Start
                    currentState[problemSize*problemSize-1] = 3; // End
                    break;
                case 'subset':
                    currentState = Array(problemSize).fill(0).map((_, i) => i+1);
                    solution = [];
                    break;
            }
            
            updateVisualization();
            updateStateDetails();
        }
        
        function performStep() {
            if (isSolutionFound()) {
                stopAlgorithm();
                return;
            }
            
            steps++;
            stepsCountDiv.textContent = `Steps: ${steps}`;
            
            switch(currentProblem) {
                case 'nqueens':
                    stepNQueens();
                    break;
                case 'sudoku':
                    stepSudoku();
                    break;
                case 'maze':
                    stepMaze();
                    break;
                case 'subset':
                    stepSubsetSum();
                    break;
            }
            
            updateVisualization();
            updateStateDetails();
        }
        
        function stepNQueens() {
            let row = currentState.indexOf(-1);
            if (row === -1) return;
            
            for (let col = 0; col < problemSize; col++) {
                if (isQueenSafe(row, col)) {
                    // Save current state to history
                    history.push([...currentState]);
                    currentIndex = history.length;
                    
                    currentState[row] = col;
                    return;
                }
            }
            
            // No valid position found, need to previous state
            backtracks();
        }
        
        function isQueenSafe(row, col) {
            for (let i = 0; i < row; i++) {
                // Check column
                if (currentState[i] === col) return false;
                
                // Check diagonals
                if (Math.abs(currentState[i] - col) === Math.abs(i - row)) return false;
            }
            return true;
        }
        
        function stepSudoku() {
            const emptyCell = currentState.indexOf(0);
            if (emptyCell === -1) return;
            
            const row = Math.floor(emptyCell / problemSize);
            const col = emptyCell % problemSize;
            
            for (let num = 1; num <= problemSize; num++) {
                if (isSudokuValid(row, col, num)) {
                    history.push([...currentState]);
                    currentIndex = history.length;
                    
                    currentState[emptyCell] = num;
                    return;
                }
            }
            
            // No valid number found, backtrack
            backtracks();
        }
        
        function isSudokuValid(row, col, num) {
            // Check row
            for (let i = 0; i < problemSize; i++) {
                if (currentState[row * problemSize + i] === num) return false;
            }
            
            // Check column
            for (let i = 0; i < problemSize; i++) {
                if (currentState[i * problemSize + col] === num) return false;
            }
            
            // Check subgrid (for simplicity, assuming perfect square size)
            const subSize = Math.sqrt(problemSize);
            const startRow = row - row % subSize;
            const startCol = col - col % subSize;
            
            for (let i = 0; i < subSize; i++) {
                for (let j = 0; j < subSize; j++) {
                    if (currentState[(startRow + i) * problemSize + (startCol + j)] === num) return false;
                }
            }
            
            return true;
        }
        
        function stepMaze() {
            // Simplified maze solver - just finds a path
            const pos = currentState.indexOf(2); // Start position
            const nextPos = findNextMove(pos);
            
            if (nextPos === -1) {
                backtracks();
            } else {
                history.push([...currentState]);
                currentIndex = history.length;
                
                currentState[pos] = 4; // Mark as visited
                currentState[nextPos] = 2; // Move to new position
            }
        }
        
        function findNextMove(pos) {
            const row = Math.floor(pos / problemSize);
            const col = pos % problemSize;
            const directions = [
                {dr: -1, dc: 0}, // up
                {dr: 1, dc: 0},  // down
                {dr: 0, dc: -1}, // left
                {dr: 0, dc: 1}   // right
            ];
            
            for (const dir of directions) {
                const newRow = row + dir.dr;
                const newCol = col + dir.dc;
                if (newRow >= 0 && newRow < problemSize && newCol >= 0 && newCol < problemSize) {
                    const newPos = newRow * problemSize + newCol;
                    if (currentState[newPos] === 3) return newPos; // Found exit
                    if (currentState[newPos] === 0) return newPos; // Empty cell
                }
            }
            
            return -1;
        }
        
        function stepSubsetSum() {
            // Target sum is half of total sum (partition problem)
            const totalSum = currentState.reduce((a, b) => a + b, 0);
            const target = Math.floor(totalSum / 2);
            
            if (solution.reduce((a, b) => a + b, 0) === target) {
                return; // Solution found
            }
            
            if (solution.length >= currentState.length) {
                backtracks();
                return;
            }
            
            // Try adding next number
            const nextNum = currentState[solution.length];
            history.push([...solution]);
            currentIndex = history.length;
            
            solution.push(nextNum);
        }
        
        function backtracks() {
            backtracks++;
            backtrackCountDiv.textContent = `Backtracks: ${backtracks}`;
            
            if (history.length === 0) {
                // No more backtracking possible
                stopAlgorithm();
                return;
            }
            
            // Revert to previous state
            currentIndex--;
            if (currentIndex < 0) currentIndex = 0;
            
            switch(currentProblem) {
                case 'nqueens':
                case 'sudoku':
                case 'maze':
                    currentState = [...history[currentIndex]];
                    break;
                case 'subset':
                    solution = [...history[currentIndex]];
                    break;
            }
            
            // Remove future history
            history = history.slice(0, currentIndex);
        }
        
        function isSolutionFound() {
            switch(currentProblem) {
                case 'nqueens':
                    return currentState.includes(-1) === false;
                case 'sudoku':
                    return currentState.includes(0) === false;
                case 'maze':
                    const pos = currentState.indexOf(2); // Current position
                    const endPos = currentState.indexOf(3); // End position
                    return pos === endPos;
                case 'subset':
                    const totalSum = currentState.reduce((a, b) => a + b, 0);
                    const target = Math.floor(totalSum / 2);
                    return solution.reduce((a, b) => a + b, 0) === target;
            }
            return false;
        }
        
        function updateVisualization() {
            let visualization = '';
            const visualMode = visualModeSelect.value;
            
            switch(currentProblem) {
                case 'nqueens':
                    if (visualMode === 'compact') {
                        visualization = currentState.map((col, row) => 
                            `Row ${row}: ${col === -1 ? 'Empty' : 'Queen at column ' + col}`
                        ).join('\n');
                    } else {
                        for (let row = 0; row < problemSize; row++) {
                            for (let col = 0; col < problemSize; col++) {
                                visualization += currentState[row] === col ? 'Q ' : '. ';
                            }
                            visualization += '\n';
                        }
                    }
                    break;
                    
                case 'sudoku':
                    for (let row = 0; row < problemSize; row++) {
                        for (let col = 0; col < problemSize; col++) {
                            const val = currentState[row * problemSize + col];
                            visualization += (val === 0 ? '.' : val) + ' ';
                            if ((col + 1) % Math.sqrt(problemSize) === 0 && col !== problemSize - 1) {
                                visualization += '| ';
                            }
                        }
                        visualization += '\n';
                        if ((row + 1) % Math.sqrt(problemSize) === 0 && row !== problemSize - 1) {
                            visualization += '-'.repeat(problemSize * 2 + Math.sqrt(problemSize) * 2 - 3) + '\n';
                        }
                    }
                    break;
                    
                case 'maze':
                    for (let row = 0; row < problemSize; row++) {
                        for (let col = 0; col < problemSize; col++) {
                            const val = currentState[row * problemSize + col];
                            visualization += 
                                val === 0 ? '. ' : 
                                val === 1 ? '# ' : 
                                val === 2 ? 'S ' : 
                                val === 3 ? 'E ' : 'V ';
                        }
                        visualization += '\n';
                    }
                    break;
                    
                case 'subset':
                    visualization = `Set: [${currentState.join(', ')}]\n`;
                    visualization += `Current subset: [${solution.join(', ')}]\n`;
                    visualization += `Sum: ${solution.reduce((a, b) => a + b, 0)}`;
                    visualization += ` (Target: ${Math.floor(currentState.reduce((a, b) => a + b, 0) / 2)})`;
                    break;
            }
            
            visualizationDiv.textContent = visualization;
        }
        
        function updateStateDetails() {
            let details = '';
            
            switch(currentProblem) {
                case 'nqueens':
                    const placedQueens = currentState.filter(x => x !== -1).length;
                    details = `Placed queens: ${placedQueens}/${problemSize}`;
                    break;
                    
                case 'sudoku':
                    const emptyCells = currentState.filter(x => x === 0).length;
                    details = `Empty cells: ${emptyCells}`;
                    break;
                    
                case 'maze':
                    const pos = currentState.indexOf(2);
                    details = `Current position: (${Math.floor(pos / problemSize)}, ${pos % problemSize})`;
                    break;
                    
                case 'subset':
                    details = `Subset size: ${solution.length}/${currentState.length}`;
                    break;
            }
            
            if (isSolutionFound()) {
                details += '\nSOLUTION FOUND!';
            }
            
            stateDetailsDiv.textContent = details;
        }
        
        function startAlgorithm() {
            running = true;
            intervalId = setInterval(performStep, speed);
        }
        
        function stopAlgorithm() {
            running = false;
            clearInterval(intervalId);
            startBtn.textContent = 'Start';
        }
        
        function resetProblem() {
            stopAlgorithm();
            initializeProblem();
        }
    </script>
</body>
</html>
