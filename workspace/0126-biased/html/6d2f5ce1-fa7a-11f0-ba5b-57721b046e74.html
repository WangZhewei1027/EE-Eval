<!DOCTYPE html>
<html>
<head>
    <title>Branch and Bound Algorithm</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .container { display: flex; flex-direction: column; gap: 20px; }
        .panel { border: 1px solid #ccc; padding: 15px; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        button, input, select { padding: 5px; }
        table { border-collapse: collapse; width: 100%; }
        td, th { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .active { background-color: #f0f0f0; }
        .pruned { color: #999; text-decoration: line-through; }
        .solution { font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Branch and Bound Algorithm</h1>
        
        <div class="panel">
            <h2>Problem Setup</h2>
            <div class="row">
                <label>Problem Type:</label>
                <select id="problemType">
                    <option value="knapsack">0/1 Knapsack</option>
                    <option value="tsp">Traveling Salesman</option>
                </select>
            </div>
            
            <div id="knapsackSetup">
                <div class="row">
                    <label>Capacity:</label>
                    <input type="number" id="capacity" value="10" min="1">
                </div>
                <div class="row">
                    <label>Items (weight,value):</label>
                    <input type="text" id="items" value="2,5 3,8 5,10 7,15">
                    <button id="randomItems">Random Items</button>
                </div>
            </div>
            
            <div id="tspSetup" style="display:none;">
                <div class="row">
                    <label>Cities:</label>
                    <input type="number" id="numCities" value="4" min="2" max="8">
                    <button id="randomMatrix">Generate Distance Matrix</button>
                </div>
                <div id="distanceMatrix"></div>
            </div>
            
            <div class="row">
                <button id="initProblem">Initialize Problem</button>
            </div>
        </div>
        
        <div class="panel" id="executionPanel" style="display:none;">
            <h2>Algorithm Execution</h2>
            <div class="row">
                <button id="stepForward">Step Forward</button>
                <button id="stepBackward">Step Backward</button>
                <button id="runToEnd">Run to Completion</button>
                <button id="reset">Reset</button>
            </div>
            <div class="row">
                <label>Speed:</label>
                <input type="range" id="speed" min="100" max="2000" value="500">
                <span id="speedValue">500ms</span>
            </div>
            <div class="row">
                <label>Branching Strategy:</label>
                <select id="branchStrategy">
                    <option value="depth">Depth-First</option>
                    <option value="breadth">Breadth-First</option>
                    <option value="best">Best-Bound First</option>
                </select>
            </div>
        </div>
        
        <div class="panel" id="visualizationPanel" style="display:none;">
            <h2>Search Tree Visualization</h2>
            <div id="treeContainer" style="overflow: auto; max-height: 400px;"></div>
            <div class="row">
                <label>Current Best Solution:</label>
                <span id="bestSolution">None</span>
                <label>Value:</label>
                <span id="bestValue">-∞</span>
            </div>
        </div>
        
        <div class="panel" id="explorationPanel" style="display:none;">
            <h2>Node Exploration</h2>
            <div class="row">
                <label>Selected Node:</label>
                <span id="selectedNode">None</span>
            </div>
            <div class="row">
                <label>Node Details:</label>
                <textarea id="nodeDetails" rows="4" style="width:100%;" readonly></textarea>
            </div>
            <div class="row">
                <button id="exploreNode">Explore This Node</button>
                <button id="pruneNode">Prune This Node</button>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let state = {
            problem: null,
            tree: null,
            currentNode: null,
            bestSolution: null,
            bestValue: -Infinity,
            history: [],
            currentStep: -1,
            running: false,
            timer: null
        };

        // DOM elements
        const elements = {
            problemType: document.getElementById('problemType'),
            knapsackSetup: document.getElementById('knapsackSetup'),
            tspSetup: document.getElementById('tspSetup'),
            capacity: document.getElementById('capacity'),
            items: document.getElementById('items'),
            randomItems: document.getElementById('randomItems'),
            numCities: document.getElementById('numCities'),
            randomMatrix: document.getElementById('randomMatrix'),
            distanceMatrix: document.getElementById('distanceMatrix'),
            initProblem: document.getElementById('initProblem'),
            executionPanel: document.getElementById('executionPanel'),
            visualizationPanel: document.getElementById('visualizationPanel'),
            explorationPanel: document.getElementById('explorationPanel'),
            stepForward: document.getElementById('stepForward'),
            stepBackward: document.getElementById('stepBackward'),
            runToEnd: document.getElementById('runToEnd'),
            reset: document.getElementById('reset'),
            speed: document.getElementById('speed'),
            speedValue: document.getElementById('speedValue'),
            branchStrategy: document.getElementById('branchStrategy'),
            treeContainer: document.getElementById('treeContainer'),
            bestSolution: document.getElementById('bestSolution'),
            bestValue: document.getElementById('bestValue'),
            selectedNode: document.getElementById('selectedNode'),
            nodeDetails: document.getElementById('nodeDetails'),
            exploreNode: document.getElementById('exploreNode'),
            pruneNode: document.getElementById('pruneNode')
        };

        // Event listeners
        elements.problemType.addEventListener('change', toggleProblemType);
        elements.randomItems.addEventListener('click', generateRandomItems);
        elements.randomMatrix.addEventListener('click', generateRandomMatrix);
        elements.initProblem.addEventListener('click', initializeProblem);
        elements.stepForward.addEventListener('click', stepForward);
        elements.stepBackward.addEventListener('click', stepBackward);
        elements.runToEnd.addEventListener('click', runToEnd);
        elements.reset.addEventListener('click', resetAlgorithm);
        elements.speed.addEventListener('input', updateSpeed);
        elements.exploreNode.addEventListener('click', exploreSelectedNode);
        elements.pruneNode.addEventListener('click', pruneSelectedNode);
        elements.treeContainer.addEventListener('click', handleTreeClick);

        // Problem classes
        class KnapsackProblem {
            constructor(capacity, items) {
                this.type = 'knapsack';
                this.capacity = capacity;
                this.items = items;
            }
            
            getInitialNode() {
                return {
                    level: -1,
                    taken: [],
                    weight: 0,
                    value: 0,
                    bound: this.calculateBound([], 0, 0)
                };
            }
            
            calculateBound(taken, currentWeight, currentValue) {
                let bound = currentValue;
                let weight = currentWeight;
                let nextItem = taken.length;
                
                while (nextItem < this.items.length && weight + this.items[nextItem].weight <= this.capacity) {
                    weight += this.items[nextItem].weight;
                    bound += this.items[nextItem].value;
                    nextItem++;
                }
                
                if (nextItem < this.items.length) {
                    bound += (this.capacity - weight) * (this.items[nextItem].value / this.items[nextItem].weight);
                }
                
                return bound;
            }
            
            branch(node) {
                const nextLevel = node.level + 1;
                if (nextLevel >= this.items.length) return [];
                
                const leftNode = {
                    level: nextLevel,
                    taken: [...node.taken, 0],
                    weight: node.weight,
                    value: node.value,
                    bound: this.calculateBound([...node.taken, 0], node.weight, node.value)
                };
                
                const rightNode = {
                    level: nextLevel,
                    taken: [...node.taken, 1],
                    weight: node.weight + this.items[nextLevel].weight,
                    value: node.value + this.items[nextLevel].value,
                    bound: this.calculateBound([...node.taken, 1], 
                        node.weight + this.items[nextLevel].weight, 
                        node.value + this.items[nextLevel].value)
                };
                
                return [leftNode, rightNode];
            }
            
            isSolution(node) {
                return node.level === this.items.length - 1;
            }
            
            nodeToString(node) {
                return `Level: ${node.level}\nTaken: ${node.taken.join('')}\nWeight: ${node.weight}/${this.capacity}\nValue: ${node.value}\nBound: ${node.bound}`;
            }
        }

        class TSPProblem {
            constructor(distances) {
                this.type = 'tsp';
                this.distances = distances;
                this.numCities = distances.length;
            }
            
            getInitialNode() {
                return {
                    path: [0],
                    cost: 0,
                    bound: this.calculateBound([0], 0)
                };
            }
            
            calculateBound(path, currentCost) {
                // Simplified lower bound calculation
                let bound = currentCost;
                const n = this.numCities;
                const visited = new Set(path);
                
                // Add minimum outgoing edge for each unvisited city
                for (let i = 0; i < n; i++) {
                    if (!visited.has(i)) {
                        let minEdge = Infinity;
                        for (let j = 0; j < n; j++) {
                            if (i !== j && (path.length === n || j !== path[0])) {
                                minEdge = Math.min(minEdge, this.distances[i][j]);
                            }
                        }
                        bound += minEdge;
                    }
                }
                
                return bound;
            }
            
            branch(node) {
                if (node.path.length === this.numCities) return [];
                
                const visited = new Set(node.path);
                const children = [];
                
                for (let i = 0; i < this.numCities; i++) {
                    if (!visited.has(i)) {
                        const newPath = [...node.path, i];
                        const newCost = node.cost + this.distances[node.path[node.path.length-1]][i];
                        children.push({
                            path: newPath,
                            cost: newCost,
                            bound: this.calculateBound(newPath, newCost)
                        });
                    }
                }
                
                return children;
            }
            
            isSolution(node) {
                return node.path.length === this.numCities;
            }
            
            nodeToString(node) {
                return `Path: ${node.path.join('→')}\nCost: ${node.cost}\nBound: ${node.bound}`;
            }
        }

        // UI functions
        function toggleProblemType() {
            if (elements.problemType.value === 'knapsack') {
                elements.knapsackSetup.style.display = 'block';
                elements.tspSetup.style.display = 'none';
            } else {
                elements.knapsackSetup.style.display = 'none';
                elements.tspSetup.style.display = 'block';
                generateRandomMatrix();
            }
        }

        function generateRandomItems() {
            const numItems = 4 + Math.floor(Math.random() * 3);
            let items = [];
            for (let i = 0; i < numItems; i++) {
                const weight = 1 + Math.floor(Math.random() * 10);
                const value = 1 + Math.floor(Math.random() * 20);
                items.push(`${weight},${value}`);
            }
            elements.items.value = items.join(' ');
        }

        function generateRandomMatrix() {
            const n = parseInt(elements.numCities.value);
            let matrix = '<table><tr><th></th>';
            
            for (let i = 0; i < n; i++) {
                matrix += `<th>${i}</th>`;
            }
            matrix += '</tr>';
            
            for (let i = 0; i < n; i++) {
                matrix += `<tr><th>${i}</th>`;
                for (let j = 0; j < n; j++) {
                    if (i === j) {
                        matrix += '<td>0</td>';
                    } else {
                        const dist = 1 + Math.floor(Math.random() * 20);
                        matrix += `<td>${dist}</td>`;
                    }
                }
                matrix += '</tr>';
            }
            
            matrix += '</table>';
            elements.distanceMatrix.innerHTML = matrix;
        }

        function initializeProblem() {
            if (elements.problemType.value === 'knapsack') {
                const capacity = parseInt(elements.capacity.value);
                const items = elements.items.value.split(' ')
                    .map(pair => pair.split(','))
                    .map(([w, v]) => ({ weight: parseInt(w), value: parseInt(v) }));
                
                // Sort items by value/weight ratio in non-increasing order
                items.sort((a, b) => (b.value / b.weight) - (a.value / a.weight));
                
                state.problem = new KnapsackProblem(capacity, items);
            } else {
                const rows = elements.distanceMatrix.querySelectorAll('tr:not(:first-child)');
                const distances = [];
                
                for (let i = 0; i < rows.length; i++) {
                    const cells = rows[i].querySelectorAll('td');
                    const row = [];
                    for (let j = 0; j < cells.length; j++) {
                        if (j > 0) { // Skip first cell (header)
                            row.push(parseInt(cells[j].textContent));
                        }
                    }
                    distances.push(row);
                }
                
                state.problem = new TSPProblem(distances);
            }
            
            state.tree = {
                nodes: [state.problem.getInitialNode()],
                active: [0],
                pruned: [],
                children: {}
            };
            
            state.currentNode = 0;
            state.bestSolution = null;
            state.bestValue = -Infinity;
            state.history = [JSON.parse(JSON.stringify(state.tree))];
            state.currentStep = 0;
            
            elements.executionPanel.style.display = 'block';
            elements.visualizationPanel.style.display = 'block';
            elements.explorationPanel.style.display = 'block';
            
            updateVisualization();
            updateNodeDetails();
        }

        function stepForward() {
            if (state.currentStep >= state.history.length - 1) {
                performStep();
            } else {
                state.currentStep++;
                state.tree = JSON.parse(JSON.stringify(state.history[state.currentStep]));
                updateVisualization();
                updateNodeDetails();
            }
        }

        function stepBackward() {
            if (state.currentStep > 0) {
                state.currentStep--;
                state.tree = JSON.parse(JSON.stringify(state.history[state.currentStep]));
                updateVisualization();
                updateNodeDetails();
            }
        }

        function runToEnd() {
            if (state.running) {
                clearInterval(state.timer);
                state.running = false;
                elements.runToEnd.textContent = 'Run to Completion';
                return;
            }
            
            state.running = true;
            elements.runToEnd.textContent = 'Stop';
            
            state.timer = setInterval(() => {
                if (state.currentStep >= state.history.length - 1) {
                    if (!performStep()) {
                        clearInterval(state.timer);
                        state.running = false;
                        elements.runToEnd.textContent = 'Run to Completion';
                    }
                } else {
                    state.currentStep++;
                    state.tree = JSON.parse(JSON.stringify(state.history[state.currentStep]));
                    updateVisualization();
                    updateNodeDetails();
                }
            }, elements.speed.value);
        }

        function resetAlgorithm() {
            if (state.running) {
                clearInterval(state.timer);
                state.running = false;
                elements.runToEnd.textContent = 'Run to Completion';
            }
            
            if (state.problem) {
                state.tree = {
                    nodes: [state.problem.getInitialNode()],
                    active: [0],
                    pruned: [],
                    children: {}
                };
                
                state.currentNode = 0;
                state.bestSolution = null;
                state.bestValue = -Infinity;
                state.history = [JSON.parse(JSON.stringify(state.tree))];
                state.currentStep = 0;
                
                updateVisualization();
                updateNodeDetails();
            }
        }

        function updateSpeed() {
            elements.speedValue.textContent = `${elements.speed.value}ms`;
            if (state.running) {
                clearInterval(state.timer);
                state.timer = setInterval(() => {
                    if (state.currentStep >= state.history.length - 1) {
                        if (!performStep()) {
                            clearInterval(state.timer);
                            state.running = false;
                            elements.runToEnd.textContent = 'Run to Completion';
                        }
                    } else {
                        state.currentStep++;
                        state.tree = JSON.parse(JSON.stringify(state.history[state.currentStep]));
                        updateVisualization();
                        updateNodeDetails();
                    }
                }, elements.speed.value);
            }
        }

        function exploreSelectedNode() {
            if (state.selectedNode.textContent !== 'None') {
                state.currentNode = parseInt(state.selectedNode.textContent);
                performStep();
            }
        }

        function pruneSelectedNode() {
            const nodeId = parseInt(state.selectedNode.textContent);
            if (!isNaN(nodeId) && state.tree.active.includes(nodeId)) {
                state.tree.active = state.tree.active.filter(id => id !== nodeId);
                state.tree.pruned.push(nodeId);
                
                // Save to history
                state.history = state.history.slice(0, state.currentStep + 1);
                state.history.push(JSON.parse(JSON.stringify(state.tree)));
                state.currentStep++;
                
                updateVisualization();
                updateNodeDetails();
            }
        }

        function handleTreeClick(event) {
            const nodeElement = event.target.closest('.node');
            if (nodeElement) {
                const nodeId = parseInt(nodeElement.dataset.nodeId);
                state.selectedNode.textContent = nodeId;
                
                const node = state.tree.nodes[nodeId];
                if (node) {
                    elements.nodeDetails.value = state.problem.nodeToString(node);
                }
            }
        }

        // Algorithm functions
        function performStep() {
            if (state.tree.active.length === 0) {
                return false; // No more nodes to explore
            }
            
            // Select next node based on strategy
            let nextIndex;
            switch (elements.branchStrategy.value) {
                case 'depth':
                    nextIndex = state.tree.active.length - 1;
                    break;
                case 'breadth':
                    nextIndex = 0;
                    break;
                case 'best':
                    nextIndex = 0;
                    let bestBound = -Infinity;
                    for (let i = 0; i < state.tree.active.length; i++) {
                        const node = state.tree.nodes[state.tree.active[i]];
                        if (node.bound > bestBound) {
                            bestBound = node.bound;
                            nextIndex = i;
                        }
                    }
                    break;
            }
            
            const nodeId = state.tree.active[nextIndex];
            state.currentNode = nodeId;
            const node = state.tree.nodes[nodeId];
            
            // Remove from active list
            state.tree.active.splice(nextIndex, 1);
            
            // Check if node can be pruned
            if (node.bound <= state.bestValue) {
                state.tree.pruned.push(nodeId);
                
                // Save to history
                state.history = state.history.slice(0, state.currentStep + 1);
                state.history.push(JSON.parse(JSON.stringify(state.tree)));
                state.currentStep++;
                
                updateVisualization();
                updateNodeDetails();
                return true;
            }
            
            // Check if node is a solution
            if (state.problem.isSolution(node)) {
                let nodeValue;
                if (state.problem.type === 'knapsack') {
                    nodeValue = node.value;
                } else { // TSP
                    // Add return to start cost
                    nodeValue = node.cost + state.problem.distances[node.path[node.path.length-1]][0];
                }
                
                if (nodeValue > state.bestValue) {
                    state.bestValue = nodeValue;
                    state.bestSolution = nodeId;
                }
                
                // Save to history
                state.history = state.history.slice(0, state.currentStep + 1);
                state.history.push(JSON.parse(JSON.stringify(state.tree)));
                state.currentStep++;
                
                updateVisualization();
                updateNodeDetails();
                return true;
            }
            
            // Branch the node
            const children = state.problem.branch(node);
            const childIds = [];
            
            for (const child of children) {
                const childId = state.tree.nodes.length;
                state.tree.nodes.push(child);
                state.tree.active.push(childId);
                childIds.push(childId);
            }
            
            state.tree.children[nodeId] = childIds;
            
            // Save to history
            state.history = state.history.slice(0, state.currentStep + 1);
            state.history.push(JSON.parse(JSON.stringify(state.tree)));
            state.currentStep++;
            
            updateVisualization();
            updateNodeDetails();
            return true;
        }

        // Visualization functions
        function updateVisualization() {
            let html = '<div class="tree">';
            
            // Build tree structure
            const rootId = 0;
            html += buildTreeLevel(rootId, 0);
            
            html += '</div>';
            elements.treeContainer.innerHTML = html;
            
            // Update best solution display
            if (state.bestSolution !== null) {
                const solution = state.tree.nodes[state.bestSolution];
                if (state.problem.type === 'knapsack') {
                    elements.bestSolution.textContent = solution.taken.join('');
                    elements.bestValue.textContent = solution.value;
                } else {
                    elements.bestSolution.textContent = solution.path.join('→') + '→0';
                    elements.bestValue.textContent = solution.cost + state.problem.distances[solution.path[solution.path.length-1]][0];
                }
            } else {
                elements.bestSolution.textContent = 'None';
                elements.bestValue.textContent = '-∞';
            }
        }

        function buildTreeLevel(nodeId, depth) {
            const node = state.tree.nodes[nodeId];
            let classes = ['node'];
            
            if (nodeId === state.currentNode) classes.push('active');
            if (state.tree.pruned.includes(nodeId)) classes.push('pruned');
            if (nodeId === state.bestSolution) classes.push('solution');
            
            let nodeContent;
            if (state.problem.type === 'knapsack') {
                nodeContent = `Node ${nodeId}<br>${node.taken.join('')}<br>V:${node.value} B:${node.bound.toFixed(1)}`;
            } else {
                nodeContent = `Node ${nodeId}<br>${node.path.join('→')}<br>C:${node.cost} B:${node.bound.toFixed(1)}`;
            }
            
            let html = `<div class="${classes.join(' ')}" data-node-id="${nodeId}">${nodeContent}</div>`;
            
            if (state.tree.children[nodeId]) {
                html += '<div class="children">';
                for (const childId of state.tree.children[nodeId]) {
                    html += buildTreeLevel(childId, depth + 1);
                }
                html += '</div>';
            }
            
            return html;
        }

        function updateNodeDetails() {
            if (state.currentNode !== null && state.tree.nodes[state.currentNode]) {
                const node = state.tree.nodes[state.currentNode];
                elements.nodeDetails.value = state.problem.nodeToString(node);
            } else {
                elements.nodeDetails.value = 'No node selected';
            }
        }

        // Initialize
        toggleProblemType();
    </script>
</body>
</html>
