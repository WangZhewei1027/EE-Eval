<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree Interactive Demo</title>
    <script>
        class Node {
            constructor(key) {
                this.left = null;
                this.right = null;
                this.value = key;
            }
        }

        class BST {
            constructor() {
                this.root = null;
            }

            insert(key) {
                this.root = this._insertRec(this.root, key);
            }

            _insertRec(root, key) {
                if (root === null) {
                    return new Node(key);
                }
                if (key < root.value) {
                    root.left = this._insertRec(root.left, key);
                } else if (key > root.value) {
                    root.right = this._insertRec(root.right, key);
                }
                return root;
            }

            search(key) {
                return this._searchRec(this.root, key);
            }

            _searchRec(root, key) {
                if (root === null || root.value === key) {
                    return root;
                }
                if (key < root.value) {
                    return this._searchRec(root.left, key);
                }
                return this._searchRec(root.right, key);
            }

            delete(key) {
                this.root = this._deleteRec(this.root, key);
            }

            _deleteRec(root, key) {
                if (root === null) return root;
                if (key < root.value) {
                    root.left = this._deleteRec(root.left, key);
                } else if (key > root.value) {
                    root.right = this._deleteRec(root.right, key);
                } else {
                    if (root.left === null) return root.right;
                    if (root.right === null) return root.left;
                    root.value = this.minValueNode(root.right).value;
                    root.right = this._deleteRec(root.right, root.value);
                }
                return root;
            }

            minValueNode(root) {
                let current = root;
                while (current.left !== null) {
                    current = current.left;
                }
                return current;
            }

            inorder() {
                return this._inorderRec(this.root);
            }

            _inorderRec(root) {
                return root ? [...this._inorderRec(root.left), root.value, ...this._inorderRec(root.right)] : [];
            }
        }

        let bst = new BST();

        function insertNode() {
            const value = parseInt(document.getElementById("insertValue").value);
            if (!isNaN(value)) {
                bst.insert(value);
                updateDisplay();
                document.getElementById("insertValue").value = '';
            }
        }

        function searchNode() {
            const value = parseInt(document.getElementById("searchValue").value);
            const result = bst.search(value) ? "Found" : "Not Found";
            document.getElementById("searchResult").innerText = result;
            document.getElementById("searchValue").value = '';
        }

        function deleteNode() {
            const value = parseInt(document.getElementById("deleteValue").value);
            if (!isNaN(value)) {
                bst.delete(value);
                updateDisplay();
                document.getElementById("deleteValue").value = '';
            }
        }

        function updateDisplay() {
            document.getElementById("bstDisplay").innerText = bst.inorder().join(', ');
        }
    </script>
</head>
<body>
    <h1>Binary Search Tree (BST) Interactive Demo</h1>
    <div>
        <h2>Insert Node</h2>
        Value: <input type="text" id="insertValue">
        <button onclick="insertNode()">Insert</button>
    </div>
    <div>
        <h2>Search Node</h2>
        Value: <input type="text" id="searchValue">
        <button onclick="searchNode()">Search</button>
        <div id="searchResult"></div>
    </div>
    <div>
        <h2>Delete Node</h2>
        Value: <input type="text" id="deleteValue">
        <button onclick="deleteNode()">Delete</button>
    </div>
    <h2>Current BST Inorder:</h2>
    <div id="bstDisplay"></div>
</body>
</html>
