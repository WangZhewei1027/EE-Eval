<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heap Sort Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #arrayDisplay {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Heap Sort Visualization</h1>
    <input type="text" id="arrayInput" placeholder="Enter numbers separated by commas" />
    <button id="createArray">Create Array</button>
    <button id="sortArray">Sort Array</button>
    <button id="reset">Reset</button>
    <div id="arrayDisplay"></div>
    <div>
        <label for="delay">Set Delay (ms): </label>
        <input type="number" id="delay" value="500" min="0" />
    </div>
    <script>
        let array = [];
        const arrayDisplay = document.getElementById('arrayDisplay');

        document.getElementById('createArray').onclick = function() {
            const input = document.getElementById('arrayInput').value;
            array = input.split(',').map(num => parseInt(num)).filter(num => !isNaN(num));
            updateDisplay();
        };

        document.getElementById('sortArray').onclick = function() {
            heapSort(array.slice());
        };

        document.getElementById('reset').onclick = function() {
            array = [];
            updateDisplay();
        };

        function updateDisplay() {
            arrayDisplay.innerText = `Current Array: [${array.join(', ')}]`;
        }

        async function heapSort(arr) {
            const n = arr.length;
            await buildMaxHeap(arr, n);
            for (let i = n - 1; i > 0; i--) {
                await swap(arr, 0, i);
                await maxHeapify(arr, 0, i);
            }
            updateDisplay();
        }

        async function buildMaxHeap(arr, n) {
            for (let i = Math.floor(n / 2); i >= 0; i--) {
                await maxHeapify(arr, i, n);
            }
        }

        async function maxHeapify(arr, i, n) {
            let largest = i;
            const left = 2 * i + 1;
            const right = 2 * i + 2;

            if (left < n && arr[left] > arr[largest]) {
                largest = left;
            }
            if (right < n && arr[right] > arr[largest]) {
                largest = right;
            }
            if (largest !== i) {
                await swap(arr, i, largest);
                await maxHeapify(arr, largest, n);
            }
        }

        async function swap(arr, i, j) {
            const temp = arr[i];
            arr[i] = arr[j];
            arr[j] = temp;
            updateDisplay();
            await delay();
        }

        function delay() {
            return new Promise(resolve => setTimeout(resolve, parseInt(document.getElementById('delay').value)));
        }
    </script>
</body>
</html>
