<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Means Clustering Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #canvas { border: 1px solid black; }
        #controls { margin-top: 20px; }
    </style>
</head>
<body>

<h1>K-Means Clustering Simulation</h1>
<canvas id="canvas" width="600" height="400"></canvas>
<div id="controls">
    <label for="k-input">Number of Clusters (K): </label>
    <input type="number" id="k-input" value="3" min="1" max="10" />
    <button id="generate-data">Generate Data</button>
    <button id="cluster">Run K-Means</button>
    <button id="clear">Clear</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let dataPoints = [];
    let centroids = [];
    let k = 3;

    document.getElementById('k-input').addEventListener('input', (event) => {
        k = parseInt(event.target.value);
    });

    document.getElementById('generate-data').addEventListener('click', () => {
        dataPoints = [];
        for (let i = 0; i < 50; i++) {
            dataPoints.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height
            });
        }
        drawPoints();
    });

    document.getElementById('cluster').addEventListener('click', () => {
        centroids = [];
        for (let i = 0; i < k; i++) {
            centroids.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height
            });
        }
        let clusters;
        for (let iteration = 0; iteration < 10; iteration++) {
            clusters = Array.from({ length: k }, () => []);
            for (const point of dataPoints) {
                let closestCentroid = 0;
                let minDistance = Infinity;
                centroids.forEach((centroid, index) => {
                    const distance = Math.sqrt((point.x - centroid.x) ** 2 + (point.y - centroid.y) ** 2);
                    if (distance < minDistance) {
                        minDistance = distance;
                        closestCentroid = index;
                    }
                });
                clusters[closestCentroid].push(point);
            }
            for (let i = 0; i < k; i++) {
                if (clusters[i].length > 0) {
                    centroids[i] = {
                        x: clusters[i].reduce((sum, p) => sum + p.x, 0) / clusters[i].length,
                        y: clusters[i].reduce((sum, p) => sum + p.y, 0) / clusters[i].length,
                    };
                }
            }
        }
        drawClusters(clusters);
    });

    document.getElementById('clear').addEventListener('click', () => {
        dataPoints = [];
        centroids = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    function drawPoints() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'black';
        dataPoints.forEach(point => {
            ctx.fillRect(point.x, point.y, 2, 2);
        });
    }

    function drawClusters(clusters) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'black';
        clusters.forEach((cluster, index) => {
            ctx.fillStyle = index === 0 ? 'red' : index === 1 ? 'green' : 'blue';
            cluster.forEach(point => {
                ctx.fillRect(point.x, point.y, 2, 2);
            });
            ctx.fillStyle = 'black';
            const centroid = centroids[index];
            ctx.fillRect(centroid.x, centroid.y, 5, 5);
        });
    }
</script>

</body>
</html>
