<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integration Testing Showcase</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #6e7f80, #3b4e6d);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            animation: backgroundAnimation 5s infinite alternate;
        }

        @keyframes backgroundAnimation {
            0% { background: linear-gradient(135deg, #6e7f80, #3b4e6d); }
            100% { background: linear-gradient(135deg, #3b4e6d, #6e7f80); }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }

        .container:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        p {
            font-size: 24px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .button {
            background-color: #f39c12;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
        }

        .button:hover {
            background-color: #e67e22;
            transform: translateY(-3px);
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Integration Testing</h1>
        <p>Experience the seamless integration of different components in this stunning showcase of technology.</p>
        <button class="button" onclick="showMessage()">Learn More</button>
    </div>
    <footer>&copy; 2023 Beautiful Integration Testing</footer>

    <script>
        function showMessage() {
            alert("Integration Testing ensures that components work together as expected.");
        }
    </script>
</body>
</html>
