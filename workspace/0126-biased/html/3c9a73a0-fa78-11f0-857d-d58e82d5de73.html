<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Routing – A Visual Journey</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

  /* Root & base */
  :root {
    --primary: #2a9d8f;
    --secondary: #264653;
    --accent: #e76f51;
    --background: #f0f4f8;
    --shadow-light: rgba(255, 255, 255, 0.7);
    --shadow-dark: rgba(0, 0, 0, 0.15);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--background);
    color: var(--secondary);
    overflow-x: hidden;
  }

  /* Container */
  .container {
    max-width: 900px;
    margin: 3rem auto 4rem;
    padding: 0 1.5rem;
    user-select: none;
  }

  /* Title */
  h1 {
    font-weight: 600;
    font-size: 3.5rem;
    text-align: center;
    color: var(--secondary);
    margin-bottom: 0.2em;
    letter-spacing: 0.08em;
    position: relative;
    text-transform: uppercase;
  }
  h1::after {
    content: 'Conceptual Routing';
    position: absolute;
    left: 50%;
    top: 120%;
    transform: translateX(-50%);
    font-weight: 300;
    font-size: 1.15rem;
    letter-spacing: 0.12em;
    color: var(--primary);
    opacity: 0.7;
  }

  /* Subtitle */
  p.subtitle {
    text-align: center;
    margin-top: 0.4em;
    font-weight: 300;
    font-size: 1.15rem;
    letter-spacing: 0.06em;
    color: var(--accent);
    filter: drop-shadow(0 0 3px var(--accent));
  }

  /* Visual routing container */
  .routing-visual {
    margin-top: 4rem;
    position: relative;
    background: white;
    border-radius: 1.5rem;
    box-shadow:
      10px 10px 30px var(--shadow-dark),
      inset 0 0 15px var(--shadow-light);
    padding: 2rem 2.5rem;
    overflow: visible;
  }

  /* Nodes container */
  .nodes {
    display: flex;
    justify-content: space-between;
    position: relative;
    z-index: 10;
  }

  /* Node basics */
  .node {
    background: #eaf4f3;
    border-radius: 2.2rem;
    width: 5.5rem;
    height: 5.5rem;
    box-shadow:
      inset 5px 5px 12px #c1d6d4,
      7px 7px 15px #a7c0bd;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--secondary);
    font-weight: 600;
    font-size: 1.85rem;
    letter-spacing: 0.1em;
    user-select: none;
    position: relative;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .node[data-active="true"] {
    background: var(--primary);
    color: white;
    box-shadow:
      0 0 16px var(--primary),
      inset 0 0 20px #46bdb3;
    transform: scale(1.15);
    z-index: 20;
  }
  .node.subtitle {
    font-weight: 300;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--accent);
    user-select: none;
    margin-top: 0.5rem;
  }

  /* Connecting paths */
  .connection {
    position: absolute;
    top: 2.75rem;
    height: 6px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 3px;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.08));
    transition: background 0.8s ease;
    will-change: background;
    z-index: 5;
  }
  .connection.active {
    background: linear-gradient(90deg, #f4a261, #e76f51);
    box-shadow:
      0 0 15px #e76f51cc;
  }
  .connection.inactive {
    background: linear-gradient(90deg, #a8c5c2, #9ab2ad);
  }

  /* Curved SVG routes for style */
  svg.routes {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 9rem;
    overflow: visible;
    pointer-events: none;
    filter: drop-shadow(0 3px 5px rgba(0,0,0,0.1));
    z-index: 1;
  }

  /* Route paths */
  path.route-path {
    fill: none;
    stroke: url(#grad);
    stroke-width: 6;
    stroke-linecap: round;
    filter: drop-shadow(0 0 6px var(--primary));
    transition: stroke 1s ease;
  }
  path.route-highlight {
    stroke: url(#grad-accent);
    stroke-width: 8;
    filter: drop-shadow(0 0 20px #e76f5188);
  }

  /* Buttons */
  .controls {
    margin-top: 3rem;
    text-align: center;
  }

  button {
    background: var(--primary);
    color: white;
    border: none;
    outline: none;
    padding: 0.65rem 1.8rem;
    margin: 0 0.6rem;
    border-radius: 1.2rem;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    box-shadow:
      0 3px 10px #2a9d8faa,
      inset 0 -3px 8px #207467;
    transition:
      background-color 0.35s ease,
      box-shadow 0.35s ease,
      transform 0.2s ease;
    user-select: none;
  }
  button:hover {
    background: var(--accent);
    box-shadow:
      0 7px 18px #e76f5188,
      inset 0 -4px 12px #bb4c34;
    transform: scale(1.07);
  }
  button:active {
    transform: scale(0.96);
  }

  /* Footer small print */
  footer {
    text-align: center;
    font-size: 0.85rem;
    color: var(--secondary);
    letter-spacing: 0.07em;
    opacity: 0.5;
    margin-top: 5rem;
    font-weight: 300;
  }

  /* Responsive tweaks */
  @media (max-width: 600px) {
    h1 {
      font-size: 2.8rem;
    }
    .node {
      width: 4.5rem;
      height: 4.5rem;
      font-size: 1.4rem;
    }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Routing</h1>
  <p class="subtitle">Visualizing the Elegant Flow of Paths and Decisions</p>

  <div class="routing-visual" aria-label="Routing concept visualization" role="img">
    <!-- Nodes and connections container -->
    <div class="nodes" aria-hidden="true">
      <!-- Nodes: Representing route segments -->
      <div class="node" data-id="0" data-active="true" aria-label="Home route node">Home</div>
      <div class="node" data-id="1" data-active="false" aria-label="About route node">About</div>
      <div class="node" data-id="2" data-active="false" aria-label="Services route node">Srvcs</div>
      <div class="node" data-id="3" data-active="false" aria-label="Portfolio route node">Port</div>
      <div class="node" data-id="4" data-active="false" aria-label="Contact route node">Cont</div>
    </div>
    <!-- Connections between nodes -->
    <div class="connection connection-0 active" style="left:70px; width:140px;"></div>
    <div class="connection connection-1 inactive" style="left:240px; width:140px;"></div>
    <div class="connection connection-2 inactive" style="left:410px; width:140px;"></div>
    <div class="connection connection-3 inactive" style="left:580px; width:140px;"></div>

    <!-- SVG Curved routing lines behind nodes -->
    <svg class="routes" aria-hidden="true" viewBox="0 0 700 90" preserveAspectRatio="none" >
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#2a9d8f;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#e76f51;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad-accent" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#f4a261;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#e76f51;stop-opacity:1" />
        </linearGradient>
      </defs>
      <path id="route-0" class="route-path route-highlight" d="M45 70 C130 5, 190 5, 275 70" />
      <path id="route-1" class="route-path" d="M215 70 C300 5, 360 5, 445 70" />
      <path id="route-2" class="route-path" d="M385 70 C470 5, 530 5, 615 70" />
      <path id="route-3" class="route-path" d="M555 70 C640 5, 700 5, 785 70" />
    </svg>
  </div>

  <div class="controls" role="region" aria-label="Routing navigation controls">
    <button id="prevBtn" aria-label="Active route previous">Previous</button>
    <button id="nextBtn" aria-label="Active route next">Next</button>
  </div>
</div>
<footer>
  &copy; 2024 &nbsp;|&nbsp; <em>Routing Concept &mdash; Aesthetic Visualization</em>
</footer>

<script>
  (() => {
    const nodes = [...document.querySelectorAll('.node')];
    const connections = [...document.querySelectorAll('.connection')];
    const routes = [...document.querySelectorAll('path.route-path')];
    let activeIndex = 0;

    const setActive = (idx) => {
      // Clamp the index
      if (idx < 0) idx = nodes.length - 1;
      else if (idx >= nodes.length) idx = 0;
      activeIndex = idx;

      // Update nodes
      nodes.forEach((node, i) => {
        node.dataset.active = (i === activeIndex).toString();
        node.setAttribute('aria-current', i === activeIndex ? 'page' : 'false');
      });

      // Update connections
      connections.forEach((conn, i) => {
        if (i === activeIndex - 1) {
          conn.classList.add('active');
          conn.classList.remove('inactive');
        } else {
          conn.classList.add('inactive');
          conn.classList.remove('active');
        }
      });

      // Update SVG routes highlight
      routes.forEach((path, i) => {
        if (i === activeIndex - 1) {
          path.classList.add('route-highlight');
        } else {
          path.classList.remove('route-highlight');
        }
      });
    };

    // Buttons
    document.getElementById('prevBtn').addEventListener('click', () => {
      setActive(activeIndex - 1);
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      setActive(activeIndex + 1);
    });

    // Initialize states
    setActive(0);
  })();
</script>
</body>
</html>
