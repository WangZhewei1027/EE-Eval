<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Linked List Visualization</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            font-family: 'Arial', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }
        .node {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #FFCE54;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .node:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        .button-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }
        .button {
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            background-color: #FF6F61;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #FF4C31;
        }
    </style>
</head>
<body>
    <div class="container" id="circle">
        <div class="node" style="transform: rotate(0deg) translate(250px) rotate(0deg);">A</div>
        <div class="node" style="transform: rotate(60deg) translate(250px) rotate(-60deg);">B</div>
        <div class="node" style="transform: rotate(120deg) translate(250px) rotate(-120deg);">C</div>
        <div class="node" style="transform: rotate(180deg) translate(250px) rotate(-180deg);">D</div>
        <div class="node" style="transform: rotate(240deg) translate(250px) rotate(-240deg);">E</div>
        <div class="node" style="transform: rotate(300deg) translate(250px) rotate(-300deg);">F</div>
    </div>
    <div class="button-container">
        <button class="button" onclick="startAnimation()">Start Animation</button>
        <button class="button" onclick="resetAnimation()">Reset</button>
    </div>

    <script>
        let angle = 0;
        let intervalId;

        function startAnimation() {
            if (intervalId) return; // Prevent multiple intervals
            intervalId = setInterval(() => {
                angle = (angle + 6) % 360; // Rotate by 6 degrees
                document.querySelectorAll('.node').forEach((node, index) => {
                    node.style.transform = `rotate(${angle + (index * 60)}deg) translate(250px) rotate(-${angle + (index * 60)}deg)`;
                });
            }, 100);
        }

        function resetAnimation() {
            clearInterval(intervalId);
            intervalId = null;
            angle = 0;
            document.querySelectorAll('.node').forEach((node, index) => {
                node.style.transform = `rotate(${(index * 60)}deg) translate(250px) rotate(-${(index * 60)}deg)`;
            });
        }
    </script>
</body>
</html>
