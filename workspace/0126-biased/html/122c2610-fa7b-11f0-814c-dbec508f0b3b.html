<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topological Sort</title>
    <style>
        body {
            font-family: monospace;
            background-color: #fff;
        }
        .container {
            width: 800px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .button:hover {
            background-color: #ccc;
        }
        .slider {
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .slider input[type="range"] {
            width: 100%;
        }
        .slider label {
            display: block;
            margin-bottom: 10px;
        }
        .input-field {
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .input-field input[type="text"] {
            width: 100%;
        }
        .sort-button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            border: none;
            border-radius: 5px;
            color: #fff;
        }
        .sort-button:hover {
            background-color: #3e8e41;
        }
        .button-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Topological Sort</h2>
        <button class="button" id="sort-button">Sort</button>
        <div class="button-container">
            <label for="num-vertices">Number of Vertices:</label>
            <input type="range" id="num-vertices" min="3" max="100" value="10">
            <span id="num-vertices-value">10</span>
        </div>
        <div class="button-container">
            <label for="num-edges">Number of Edges:</label>
            <input type="range" id="num-edges" min="3" max="100" value="10">
            <span id="num-edges-value">10</span>
        </div>
        <div class="button-container">
            <label for="max-edges">Maximum Edges:</label>
            <input type="range" id="max-edges" min="3" max="100" value="10">
            <span id="max-edges-value">10</span>
        </div>
        <div class="button-container">
            <label for="num-vertices-min">Minimum Vertices:</label>
            <input type="range" id="num-vertices-min" min="2" max="10" value="2">
            <span id="num-vertices-min-value">2</span>
        </div>
        <div class="button-container">
            <label for="num-edges-min">Minimum Edges:</label>
            <input type="range" id="num-edges-min" min="2" max="100" value="2">
            <span id="num-edges-min-value">2</span>
        </div>
        <div class="button-container">
            <label for="max-edges-min">Minimum Maximum Edges:</label>
            <input type="range" id="max-edges-min" min="2" max="100" value="2">
            <span id="max-edges-min-value">2</span>
        </div>
        <button class="sort-button" id="sort-button-2">Sort</button>
        <div class="button-container">
            <label for="num-vertices-2">Number of Vertices:</label>
            <input type="range" id="num-vertices-2" min="3" max="100" value="10">
            <span id="num-vertices-2-value">10</span>
        </div>
        <div class="button-container">
            <label for="num-edges-2">Number of Edges:</label>
            <input type="range" id="num-edges-2" min="3" max="100" value="10">
            <span id="num-edges-2-value">10</span>
        </div>
        <div class="button-container">
            <label for="max-edges-2">Maximum Edges:</label>
            <input type="range" id="max-edges-2" min="3" max="100" value="10">
            <span id="max-edges-2-value">10</span>
        </div>
        <button class="sort-button" id="sort-button-3">Sort</button>
        <div class="button-container">
            <label for="num-vertices-3">Number of Vertices:</label>
            <input type="range" id="num-vertices-3" min="3" max="100" value="10">
            <span id="num-vertices-3-value">10</span>
        </div>
        <div class="button-container">
            <label for="num-edges-3">Number of Edges:</label>
            <input type="range" id="num-edges-3" min="3" max="100" value="10">
            <span id="num-edges-3-value">10</span>
        </div>
        <div class="button-container">
            <label for="max-edges-3">Maximum Edges:</label>
            <input type="range" id="max-edges-3" min="3" max="100" value="10">
            <span id="max-edges-3-value">10</span>
        </div>
        <button class="sort-button" id="sort-button-4">Sort</button>
        <div class="button-container">
            <label for="num-vertices-4">Number of Vertices:</label>
            <input type="range" id="num-vertices-4" min="3" max="100" value="10">
            <span id="num-vertices-4-value">10</span>
        </div>
        <div class="button-container">
            <label for="num-edges-4">Number of Edges:</label>
            <input type="range" id="num-edges-4" min="3" max="100" value="10">
            <span id="num-edges-4-value">10</span>
        </div>
        <div class="button-container">
            <label for="max-edges-4">Maximum Edges:</label>
            <input type="range" id="max-edges-4" min="3" max="100" value="10">
            <span id="max-edges-4-value">10</span>
        </div>
    </div>

    <script>
        let numVertices = 10;
        let numEdges = 10;
        let maxEdges = 10;
        let numVerticesMin = 2;
        let numEdgesMin = 2;
        let maxEdgesMin = 2;
        let numVertices2 = 10;
        let numEdges2 = 10;
        let maxEdges2 = 10;
        let numVertices3 = 10;
        let numEdges3 = 10;
        let maxEdges3 = 10;
        let numVertices4 = 10;
        let numEdges4 = 10;
        let maxEdges4 = 10;

        let sortButton = document.getElementById('sort-button');
        let numVerticesValue = document.getElementById('num-vertices-value');
        let numEdgesValue = document.getElementById('num-edges-value');
        let maxEdgesValue = document.getElementById('max-edges-value');
        let numVertices2Value = document.getElementById('num-vertices-2-value');
        let numEdges2Value = document.getElementById('num-edges-2-value');
        let maxEdges2Value = document.getElementById('max-edges-2-value');
        let numVertices3Value = document.getElementById('num-vertices-3-value');
        let numEdges3Value = document.getElementById('num-edges-3-value');
        let maxEdges3Value = document.getElementById('max-edges-3-value');
        let numVertices4Value = document.getElementById('num-vertices-4-value');
        let numEdges4Value = document.getElementById('num-edges-4-value');
        let maxEdges4Value = document.getElementById('max-edges-4-value');

        let slider1 = document.getElementById('num-vertices');
        let slider2 = document.getElementById('num-edges');
        let slider3 = document.getElementById('max-edges');
        let slider4 = document.getElementById('num-vertices');
        let slider5 = document.getElementById('num-edges');
        let slider6 = document.getElementById('max-edges');

        let sortButton2 = document.getElementById('sort-button-2');
        let sortButton3 = document.getElementById('sort-button-3');
        let sortButton4 = document.getElementById('sort-button-4');

        let sortButton2Value = document.getElementById('sort-button-2-value');
        let sortButton3Value = document.getElementById('sort-button-3-value');
        let sortButton4Value = document.getElementById('sort-button-4-value');

        function sort() {
            numVertices = parseInt(numVerticesValue.value);
            numEdges = parseInt(numEdgesValue.value);
            maxEdges = parseInt(maxEdgesValue.value);
            numVerticesMin = parseInt(numVerticesMinValue.value);
            numEdgesMin = parseInt(numEdgesMinValue.value);
            maxEdgesMin = parseInt(maxEdgesMinValue.value);
            numVertices2 = parseInt(numVertices2Value.value);
            numEdges2 = parseInt(numEdges2Value.value);
            maxEdges2 = parseInt(maxEdges2Value.value);
            numVertices3 = parseInt(numVertices3Value.value);
            numEdges3 = parseInt(numEdges3Value.value);
            maxEdges3 = parseInt(maxEdges3Value.value);
            numVertices4 = parseInt(numVertices4Value.value);
            numEdges4 = parseInt(numEdges4Value.value);
            maxEdges4 = parseInt(maxEdges4Value.value);

            sortButton.style.display = 'block';
            sortButton2.style.display = 'none';
            sortButton3.style.display = 'none';
            sortButton4.style.display = 'none';

            document.getElementById('sort-button').textContent = 'Sort';
            document.getElementById('sort-button-2').textContent = 'Sort';
            document.getElementById('sort-button-3').textContent = 'Sort';
            document.getElementById('sort-button-4').textContent = 'Sort';

            sortButton2.style.display = 'none';
            sortButton3.style.display = 'none';
            sortButton4.style.display = 'none';

            document.getElementById('sort-button-2').textContent = 'Sort';
            document.getElementById('sort-button-3').textContent = 'Sort';
            document.getElementById('sort-button-4').textContent = 'Sort';

            sortButton2Value = document.getElementById('sort-button-2-value');
            sortButton3Value = document.getElementById('sort-button-3-value');
            sortButton4Value = document.getElementById('sort-button-4-value');

            sortButton2.addEventListener('click', () => sort());
            sortButton3.addEventListener('click', () => sort());
            sortButton4.addEventListener('click', () => sort());

            document.getElementById('num-vertices').value = numVertices;
            document.getElementById('num-edges').value = numEdges;
            document.getElementById('max-edges').value = maxEdges;
            document.getElementById('num-vertices-min').value = numVerticesMin;
            document.getElementById('num-edges-min').value = numEdgesMin;
            document.getElementById('max-edges-min').value = maxEdgesMin;
            document.getElementById('num-vertices-2').value = numVertices2;
            document.getElementById('num-edges-2').value = numEdges2;
            document.getElementById('max-edges-2').value = maxEdges2;
            document.getElementById('num-vertices-3').value = numVertices3;
            document.getElementById('num-edges-3').value = numEdges3;
            document.getElementById('max-edges-3').value = maxEdges3;
            document.getElementById('num-vertices-4').value = numVertices4;
            document.getElementById('num-edges-4').value = numEdges4;
            document.getElementById('max-edges-4').value = maxEdges4;

            document.getElementById('num-vertices-2-value').value = numVertices2;
            document.getElementById('num-edges-2-value').value = numEdges2;
            document.getElementById('max-edges-2-value').value = maxEdges2;
            document.getElementById('num-vertices-3-value').value = numVertices3;
            document.getElementById('num-edges-3-value').value = numEdges3;
            document.getElementById('max-edges-3-value').value = maxEdges3;
            document.getElementById('num-vertices-4-value').value = numVertices4;
            document.getElementById('num-edges-4-value').value = numEdges4;
            document.getElementById('max-edges-4-value').value = maxEdges4;

            document.getElementById('sort-button-2').textContent = 'Sort';
            document.getElementById('sort-button-3').textContent = 'Sort';
            document.getElementById('sort-button-4').textContent = 'Sort';
        }

        function sortButton() {
            let numVertices = parseInt(document.getElementById('num-vertices').value);
            let numEdges = parseInt(document.getElementById('num-edges').value);
            let maxEdges = parseInt(document.getElementById('max-edges').value);
            let numVerticesMin = parseInt(document.getElementById('num-vertices-min').value);
            let numEdgesMin = parseInt(document.getElementById('num-edges-min').value);
            let maxEdgesMin = parseInt(document.getElementById('max-edges-min').value);
            let numVertices2 = parseInt(document.getElementById('num-vertices-2').value);
            let numEdges2 = parseInt(document.getElementById('num-edges-2').value);
            let maxEdges2 = parseInt(document.getElementById('max-edges-2').value);
            let numVertices3 = parseInt(document.getElementById('num-vertices-3').value);
            let numEdges3 = parseInt(document.getElementById('num-edges-3').value);
            let maxEdges3 = parseInt(document.getElementById('max-edges-3').value);
            let numVertices4 = parseInt(document.getElementById('num-vertices-4').value);
            let numEdges4 = parseInt(document.getElementById('num-edges-4').value);
            let maxEdges4 = parseInt(document.getElementById('max-edges-4').value);

            if (numVertices >= numVerticesMin && numEdges >= numEdgesMin && maxEdges >= maxEdgesMin && numVertices2 >= numVerticesMin && numEdges2 >= numEdgesMin && maxEdges2 >= maxEdgesMin && numVertices3 >= numVerticesMin && numEdges3 >= numEdgesMin && maxEdges3 >= maxEdgesMin && numVertices4 >= numVerticesMin && numEdges4 >= numEdgesMin) {
                let sortedVertices = [...Array(numVertices)].map(() => Array(numVertices).fill(0));
                let sortedEdges = [...Array(numEdges)].map(() => Array(numEdges).fill(0));

                for (let i = 0; i < numVertices; i++) {
                    for (let j = 0; j < numVertices; j++) {
                        if (i !== j) {
                            sortedVertices[i][j] = 1;
                        }
                    }
                }

                for (let i = 0; i < numEdges; i++) {
                    for (let j = 0; j < numEdges; j++) {
                        if (i !== j) {
                            sortedEdges[i][j] = 1;
                        }
                    }
                }

                for (let i = 0; i < numVertices; i++) {
                    for (let j = 0; j < numVertices; j++) {
                        if (sortedVertices[i][j] === 1) {
                            sortedVertices[i][j] = 0;
                        }
                    }
                }

                for (let i = 0; i < numEdges; i++) {
                    for (let j = 0; j < numEdges; j++) {
                        if (sortedEdges[i][j] === 1) {
                            sortedEdges[i][j] = 0;
                        }
                    }
                }

                let sortedVerticesString = sortedVertices.map(row => row.join('')).join('\n');
                let sortedEdgesString = sortedEdges.map(row => row.join('')).join('\n');

                document.getElementById('sort-button').textContent = 'Sorted';
                document.getElementById('sort-button-2').textContent = 'Sorted';
                document.getElementById('sort-button-3').textContent = 'Sorted';
                document.getElementById('sort-button-4').textContent = 'Sorted';

                document.getElementById('sort-button-2').style.display = 'none';
                document.getElementById('sort-button-3').style.display = 'none';
                document.getElementById('sort-button-4').style.display = 'none';

                document.getElementById('sort-button-2').textContent = 'Sorted';
                document.getElementById('sort-button-3').textContent = 'Sorted';
                document.getElementById('sort-button-4').textContent = 'Sorted';

                sortButton2.style.display = 'none';
                sortButton3.style.display = 'none';
                sortButton4.style.display = 'none';

                document.getElementById('sort-button-2').textContent = 'Sorted';
                document.getElementById('sort-button-3').textContent = 'Sorted';
                document.getElementById('sort-button-4').textContent = 'Sorted';
            } else {
                document.getElementById('sort-button').textContent = 'Not Sorted';
                document.getElementById('sort-button-2').textContent = 'Not Sorted';
                document.getElementById('sort-button-3').textContent = 'Not Sorted';
                document.getElementById('sort-button-4').textContent = 'Not Sorted';
            }

            document.getElementById('num-vertices').value = numVertices;
            document.getElementById('num-edges').value = numEdges;
            document.getElementById('max-edges').value = maxEdges;
            document.getElementById('num-vertices-min').value = numVerticesMin;
            document.getElementById('num-edges-min').value = numEdgesMin;
            document.getElementById('max-edges-min').value = maxEdgesMin;
            document.getElementById('num-vertices-2').value = numVertices2;
            document.getElementById('num-edges-2').value = numEdges2;
            document.getElementById('max-edges-2').value = maxEdges2;
            document.getElementById('num-vertices-3').value = numVertices3;
            document.getElementById('num-edges-3').value = numEdges3;
            document.getElementById('max-edges-3').value = maxEdges3;
            document.getElementById('num-vertices-4').value = numVertices4;
            document.getElementById('num-edges-4').value = numEdges4;
            document.getElementById('max-edges-4').value = maxEdges4;

            document.getElementById('num-vertices-2-value').value = numVertices2;
            document.getElementById('num-edges-2-value').value = numEdges2;
            document.getElementById('max-edges-2-value').value = maxEdges2;
            document.getElementById('num-vertices-3-value').value = numVertices3;
            document.getElementById('num-edges-3-value').value = numEdges3;
            document.getElementById('max-edges-3-value').value = maxEdges3;
            document.getElementById('num-vertices-4-value').value = numVertices4;
            document.getElementById('num-edges-4-value').value = numEdges4;
            document.getElementById('max-edges-4-value').value = maxEdges4;

            document.getElementById('sort-button-2').textContent = 'Sort';
            document.getElementById('sort-button-3').textContent = 'Sort';
            document.getElementById('sort-button-4').textContent = 'Sort';
        }

        let sortButton2Value = document.getElementById('sort-button-2-value');
        let sortButton3Value = document.getElementById('sort-button-3-value');
        let sortButton4Value = document.getElementById('sort-button-4-value');

        document.getElementById('sort-button-2').addEventListener('click', sort);
        document.getElementById('sort-button-3').addEventListener('click', sort);
        document.getElementById('sort-button-4').addEventListener('click', sort);

        document.getElementById('num-vertices-2-value').addEventListener('input', () => {
            sortButton2Value.value = document.getElementById('num-vertices-2-value').value;
        });

        document.getElementById('num-edges-2-value').addEventListener('input', () => {
            sortButton2Value.value = document.getElementById('num-edges-2-value').value;
        });

        document.getElementById('max-edges-2-value').addEventListener('input', () => {
            sortButton2Value.value = document.getElementById('max-edges-2-value').value;
        });

        document.getElementById('num-vertices-3-value').addEventListener('input', () => {
            sortButton3Value.value = document.getElementById('num-vertices-3-value').value;
        });

        document.getElementById('num-edges-3-value').addEventListener('input', () => {
            sortButton3Value.value = document.getElementById('num-edges-3-value').value;
        });

        document.getElementById('max-edges-3-value').addEventListener('input', () => {
            sortButton3Value.value = document.getElementById('max-edges-3-value').value;
        });

        document.getElementById('num-vertices-4-value').addEventListener('input', () => {
            sortButton4Value.value = document.getElementById('num-vertices-4-value').value;
        });

        document.getElementById('num-edges-4-value').addEventListener('input', () => {
            sortButton4Value.value = document.getElementById('num-edges-4-value').value;
        });

        document.getElementById('max-edges-4-value').addEventListener('input', () => {
            sortButton4Value.value = document.getElementById('max-edges-4-value').value;
        });
    </script>
</body>
</html>
