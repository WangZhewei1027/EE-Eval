<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interpreter</title>
    <style>
        body {
            font-family: monospace;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        #input {
            padding: 10px;
            border: 1px solid black;
            width: 50%;
        }
        #output {
            padding: 10px;
            border: 1px solid black;
            width: 50%;
            height: 100px;
        }
    </style>
</head>
<body>
    <div id="input">
        <input type="text" id="input1" placeholder="Enter a string">
        <button id="submit">Submit</button>
    </div>
    <div id="output">
        <pre id="output1"></pre>
    </div>

    <script>
        let input1 = document.getElementById('input1');
        let submitButton = document.getElementById('submit');
        let output1 = document.getElementById('output1');

        function handleInput() {
            let inputStr = input1.value;
            if (inputStr.length > 100) {
                output1.innerText = "Input too long. Please enter a string less than 100 characters.";
                return;
            }
            output1.innerText = "";
            submitButton.disabled = false;
            submitButton.textContent = "Submit";
            let time = 0;
            let intervalId = setInterval(() => {
                time++;
                if (time > 100) {
                    clearInterval(intervalId);
                    output1.innerText = "You have submitted the input for 100 iterations. Please try again.";
                    submitButton.disabled = true;
                    submitButton.textContent = "Submit";
                }
            }, 1000);
        }

        submitButton.addEventListener('click', handleInput);
    </script>
</body>
</html>
