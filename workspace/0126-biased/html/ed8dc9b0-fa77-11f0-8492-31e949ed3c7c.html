<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depth-First Search Visualizer</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f0f4f8, #a4c8e1);
            color: #333;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 80vw;
            height: 80vh;
            border: 2px solid #0d47a1;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            background-color: #fff;
            overflow: hidden;
        }
        #title {
            text-align: center;
            font-size: 2.5rem;
            margin: 20px 0;
            color: #0d47a1;
        }
        .node {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ff5722;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            transition: background 0.5s ease;
        }
        .visited {
            background: #4caf50 !important;
            transition: background 0.5s ease;
        }
        button {
            background-color: #0d47a1;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
            position: relative;
            margin: 20px auto;
            display: block;
        }
        button:hover {
            background-color: #1565c0;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="title">Visualizing Depth-First Search (DFS)</div>
    <div class="node" style="top: 50px; left: 50px;">A</div>
    <div class="node" style="top: 150px; left: 150px;">B</div>
    <div class="node" style="top: 50px; left: 250px;">C</div>
    <div class="node" style="top: 250px; left: 50px;">D</div>
    <div class="node" style="top: 250px; left: 250px;">E</div>
    <div class="node" style="top: 150px; left: 350px;">F</div>
    <button id="startButton">Start DFS</button>
</div>

<script>
    const nodes = document.querySelectorAll('.node');
    const startButton = document.getElementById('startButton');
    
    const stack = [];
    let index = 0;

    startButton.addEventListener('click', () => {
        if (index < nodes.length) {
            stack.push(index);
            dfs();
        }
    });

    function dfs() {
        if (stack.length === 0) return;

        const currentIndex = stack.pop();
        const currentNode = nodes[currentIndex];
        
        currentNode.classList.add('visited');

        setTimeout(() => {
            index++;
            if (index < nodes.length) {
                stack.push(index);
                dfs();
            }
        }, 1000);
    }
</script>

</body>
</html>
