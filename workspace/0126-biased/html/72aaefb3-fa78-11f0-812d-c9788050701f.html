<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch and Bound Visualization</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #fd79a8;
            --light: #f8f9fa;
            --dark: #2d3436;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #d63031;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            color: var(--dark);
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--dark);
            opacity: 0.8;
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            padding: 2rem;
            position: relative;
            overflow: hidden;
            animation: slideUp 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 3rem;
            gap: 1rem;
        }

        button {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(255,255,255,0.2));
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        button:hover::after {
            transform: translateX(0);
        }

        .visualization {
            width: 100%;
            min-height: 500px;
            position: relative;
        }

        .tree-container {
            width: 100%;
            overflow: auto;
            padding: 2rem 0;
            display: flex;
            justify-content: center;
        }

        .node {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            border: 3px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-weight: bold;
            color: var(--primary);
            transition: all 0.5s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            z-index: 2;
        }

        .node.active {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
        }

        .node.pruned {
            border-color: var(--danger);
            color: var(--danger);
            opacity: 0.6;
            transform: scale(0.9);
        }

        .node.solution {
            border-color: var(--success);
            background: var(--success);
            color: white;
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.4);
        }

        .connector {
            position: absolute;
            background: var(--secondary);
            height: 2px;
            transform-origin: left center;
            z-index: 1;
        }

        .level {
            display: flex;
            justify-content: center;
            gap: 80px;
            margin-bottom: 40px;
            position: relative;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .bound-value {
            position: absolute;
            top: -30px;
            font-size: 0.8rem;
            background: white;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .bound-value.show {
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(50px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        footer {
            margin-top: 4rem;
            text-align: center;
            color: var(--dark);
            opacity: 0.7;
            font-size: 0.9rem;
            animation: fadeIn 2s ease-out;
        }
    </style>
</head>
<body>
    <header>
        <h1>Branch and Bound</h1>
        <p class="subtitle">A visual demonstration of the optimization algorithm that systematically searches solution spaces while pruning unpromising branches</p>
    </header>

    <div class="container">
        <div class="controls">
            <button id="startBtn">Start Visualization</button>
            <button id="resetBtn">Reset</button>
        </div>

        <div class="visualization">
            <div class="tree-container" id="tree"></div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: var(--primary);"></div>
                <span>Active Node</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: var(--success);"></div>
                <span>Optimal Solution</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="border: 2px solid var(--danger); background: white;"></div>
                <span>Pruned Branch</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="border: 2px solid var(--primary); background: white;"></div>
                <span>Unexplored Node</span>
            </div>
        </div>
    </div>

    <footer>
        <p>Branch and Bound Visualization • Aesthetic Algorithm Demonstration</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const treeContainer = document.getElementById('tree');
            const startBtn = document.getElementById('startBtn');
            const resetBtn = document.getElementById('resetBtn');
            
            // Create the tree structure
            const tree = {
                value: 0,
                bound: 0,
                level: 0,
                children: [
                    {
                        value: 5,
                        bound: 25,
                        level: 1,
                        children: [
                            {
                                value: 8,
                                bound: 18,
                                level: 2,
                                children: [
                                    { value: 12, bound: 12, level: 3, children: [] },
                                    { value: 10, bound: 10, level: 3, children: [] }
                                ]
                            },
                            {
                                value: 7,
                                bound: 20,
                                level: 2,
                                children: [
                                    { value: 11, bound: 11, level: 3, children: [] },
                                    { value: 9, bound: 9, level: 3, children: [] }
                                ]
                            }
                        ]
                    },
                    {
                        value: 6,
                        bound: 22,
                        level: 1,
                        children: [
                            {
                                value: 9,
                                bound: 19,
                                level: 2,
                                children: [
                                    { value: 13, bound: 13, level: 3, children: [] },
                                    { value: 11, bound: 11, level: 3, children: [] }
                                ]
                            },
                            {
                                value: 8,
                                bound: 21,
                                level: 2,
                                children: [
                                    { value: 12, bound: 12, level: 3, children: [] },
                                    { value: 14, bound: 14, level: 3, children: [], isSolution: true }
                                ]
                            }
                        ]
                    }
                ]
            };

            let currentBound = Infinity;
            let optimalSolution = null;
            let visitedNodes = [];
            let prunedNodes = [];
            let timeoutIds = [];

            // Render the initial tree
            renderTree();

            startBtn.addEventListener('click', startVisualization);
            resetBtn.addEventListener('click', resetVisualization);

            function startVisualization() {
                startBtn.disabled = true;
                performBranchAndBound(tree);
            }

            function resetVisualization() {
                // Clear all timeouts
                timeoutIds.forEach(id => clearTimeout(id));
                timeoutIds = [];
                
                visitedNodes = [];
                prunedNodes = [];
                currentBound = Infinity;
                optimalSolution = null;
                
                // Reset all nodes
                document.querySelectorAll('.node').forEach(node => {
                    node.classList.remove('active', 'pruned', 'solution');
                });
                
                document.querySelectorAll('.bound-value').forEach(el => {
                    el.classList.remove('show');
                });
                
                startBtn.disabled = false;
            }

            function performBranchAndBound(node) {
                if (!node) return;

                // Mark node as visited
                visitedNodes.push(node);
                
                // Highlight current node
                const delay = visitedNodes.length * 1000;
                
                timeoutIds.push(setTimeout(() => {
                    highlightNode(node, 'active');
                    
                    // Show bound value
                    const boundEl = document.querySelector(`.node[data-id="${node.value}"] + .bound-value`);
                    if (boundEl) boundEl.classList.add('show');
                    
                    // Check if this node is a solution
                    if (node.children.length === 0) {
                        if (!optimalSolution || node.value > optimalSolution.value) {
                            if (optimalSolution) {
                                const prevOptimal = document.querySelector(`.node[data-id="${optimalSolution.value}"]`);
                                prevOptimal.classList.remove('solution');
                            }
                            optimalSolution = node;
                            currentBound = node.value;
                            
                            timeoutIds.push(setTimeout(() => {
                                highlightNode(node, 'solution');
                                pulseSolution(node);
                            }, 1000));
                        }
                    } else {
                        // Explore children if their bound is better than current solution
                        node.children.forEach(child => {
                            if (child.bound >= (optimalSolution ? optimalSolution.value : 0)) {
                                timeoutIds.push(setTimeout(() => {
                                    performBranchAndBound(child);
                                }, 1000));
                            } else {
                                prunedNodes.push(child);
                                timeoutIds.push(setTimeout(() => {
                                    highlightNode(child, 'pruned');
                                }, 1000));
                            }
                        });
                    }
                }, delay));
            }

            function highlightNode(node, className) {
                const nodeEl = document.querySelector(`.node[data-id="${node.value}"]`);
                if (nodeEl) {
                    nodeEl.classList.remove('active', 'pruned', 'solution');
                    nodeEl.classList.add(className);
                }
            }

            function pulseSolution(node) {
                const nodeEl = document.querySelector(`.node[data-id="${node.value}"]`);
                if (nodeEl) {
                    nodeEl.classList.add('pulse');
                }
            }

            function renderTree() {
                treeContainer.innerHTML = '';
                const maxLevel = getMaxLevel(tree);
                
                // Create levels
                for (let i = 0; i <= maxLevel; i++) {
                    const levelEl = document.createElement('div');
                    levelEl.className = 'level';
                    levelEl.dataset.level = i;
                    treeContainer.appendChild(levelEl);
                }
                
                // Render nodes recursively
                renderNode(tree, null);
                
                // Position nodes and connectors
                positionNodes();
            }

            function renderNode(node, parent) {
                const levelEl = document.querySelector(`.level[data-level="${node.level}"]`);
                
                // Create node element
                const nodeEl = document.createElement('div');
                nodeEl.className = 'node';
                nodeEl.dataset.id = node.value;
                nodeEl.textContent = node.value;
                
                // Create bound value element
                const boundEl = document.createElement('div');
                boundEl.className = 'bound-value';
                boundEl.textContent = `Bound: ${node.bound}`;
                
                levelEl.appendChild(nodeEl);
                levelEl.appendChild(boundEl);
                
                // Create connector if there's a parent
                if (parent) {
                    const connector = document.createElement('div');
                    connector.className = 'connector';
                    treeContainer.appendChild(connector);
                }
                
                // Render children
                node.children.forEach(child => renderNode(child, node));
            }

            function positionNodes() {
                const levels = document.querySelectorAll('.level');
                const nodePositions = {};
                
                // Calculate vertical positions for levels
                levels.forEach((level, levelIndex) => {
                    const nodes = level.querySelectorAll('.node');
                    const levelHeight = levelIndex * 120 + 50;
                    
                    // Calculate horizontal positions for nodes in level
                    nodes.forEach((node, nodeIndex) => {
                        const nodeId = node.dataset.id;
                        const nodeWidth = 60;
                        const spacing = 80;
                        const totalWidth = (nodes.length - 1) * spacing + nodeWidth;
                        const startX = (treeContainer.offsetWidth - totalWidth) / 2;
                        const nodeX = startX + nodeIndex * spacing;
                        
                        node.style.left = `${nodeX}px`;
                        node.style.top = `${levelHeight}px`;
                        
                        // Store position for connectors
                        nodePositions[nodeId] = {
                            x: nodeX + nodeWidth / 2,
                            y: levelHeight + nodeWidth / 2
                        };
                        
                        // Position bound value
                        const boundValue = node.nextElementSibling;
                        if (boundValue && boundValue.classList.contains('bound-value')) {
                            boundValue.style.left = `${nodeX}px`;
                            boundValue.style.top = `${levelHeight - 30}px`;
                        }
                    });
                });
                
                // Position connectors
                const connectors = document.querySelectorAll('.connector');
                let connectorIndex = 0;
                
                document.querySelectorAll('.level').forEach(level => {
                    const nodes = level.querySelectorAll('.node');
                    
                    nodes.forEach(node => {
                        const nodeId = node.dataset.id;
                        const childNodes = node.parentNode.querySelectorAll('.node');
                        
                        if (childNodes.length > 0 && connectors[connectorIndex]) {
                            const parentPos = nodePositions[nodeId];
                            
                            childNodes.forEach(childNode => {
                                const childId = childNode.dataset.id;
                                const childPos = nodePositions[childId];
                                
                                if (parentPos && childPos) {
                                    const connector = connectors[connectorIndex];
                                    const length = Math.sqrt(
                                        Math.pow(childPos.x - parentPos.x, 2) + 
                                        Math.pow(childPos.y - parentPos.y, 2)
                                    );
                                    const angle = Math.atan2(
                                        childPos.y - parentPos.y, 
                                        childPos.x - parentPos.x
                                    );
                                    
                                    connector.style.width = `${length}px`;
                                    connector.style.left = `${parentPos.x}px`;
                                    connector.style.top = `${parentPos.y}px`;
                                    connector.style.transform = `rotate(${angle}rad)`;
                                    
                                    connectorIndex++;
                                }
                            });
                        }
                    });
                });
            }

            function getMaxLevel(node) {
                if (node.children.length === 0) return node.level;
                let max = node.level;
                node.children.forEach(child => {
                    const childMax = getMaxLevel(child);
                    if (childMax > max) max = childMax;
                });
                return max;
            }
        });
    </script>
</body>
</html>
