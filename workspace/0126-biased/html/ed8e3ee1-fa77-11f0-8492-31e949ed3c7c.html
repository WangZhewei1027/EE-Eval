<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big-O Notation Visualizer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #4a90e2, #d4d4d4);
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            font-size: 3rem;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        h2 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
        }
        .graph-container {
            width: 60%;
            max-width: 800px;
            height: 400px;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .line {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 0;
            background: linear-gradient(to right, #ff6b6b, #f7c6c7);
            z-index: 1;
            transition: height 0.5s ease-in-out;
        }
        button {
            margin-top: 20px;
            background-color: #4a90e2;
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        footer {
            position: absolute;
            bottom: 10px;
            font-size: 0.8rem;
            color: #fff;
        }
    </style>
</head>
<body>

    <h1>Big-O Notation Visualizer</h1>
    <h2>Observe Different Growth Rates</h2>
    
    <div class="graph-container">
        <div class="line" id="line1" style="width: 20%; opacity: 0.8;"></div>
        <div class="line" id="line2" style="width: 30%; opacity: 0.6;"></div>
        <div class="line" id="line3" style="width: 40%; opacity: 0.4;"></div>
    </div>
    
    <button id="startAnimation">Start Animation</button>
    
    <footer>Visualizing Big-O Notation | © 2023</footer>

    <script>
        function animateGraphs() {
            const line1 = document.getElementById("line1");
            const line2 = document.getElementById("line2");
            const line3 = document.getElementById("line3");

            line1.style.height = '40%';  // O(n)
            line2.style.height = '70%';  // O(n log n)
            line3.style.height = '90%';  // O(n^2)
        }

        document.getElementById("startAnimation").onclick = animateGraphs;
    </script>

</body>
</html>
