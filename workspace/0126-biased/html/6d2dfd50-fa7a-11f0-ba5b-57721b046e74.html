<!DOCTYPE html>
<html>
<head>
    <title>Radix Sort Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .control-group {
            border: 1px solid #ccc;
            padding: 10px;
            margin-right: 10px;
        }
        .array-display {
            font-family: monospace;
            font-size: 18px;
            min-height: 100px;
            border: 1px solid #000;
            padding: 10px;
            white-space: pre-wrap;
        }
        .step-info {
            border: 1px solid #000;
            padding: 10px;
            min-height: 50px;
        }
        .buckets-display {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        .bucket {
            border: 1px solid #000;
            padding: 5px;
            min-width: 100px;
        }
        .current-digit {
            background-color: #eee;
        }
        .sorted {
            font-weight: bold;
        }
        button {
            padding: 5px 10px;
            margin: 2px;
        }
        input[type="range"] {
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Radix Sort Interactive Demo</h1>
        
        <div class="control-panel">
            <div class="control-group">
                <h3>Array Configuration</h3>
                <div>
                    <label>Array Size: <span id="sizeValue">10</span></label>
                    <input type="range" id="arraySize" min="5" max="30" value="10">
                </div>
                <div>
                    <label>Number Range: 0 to <span id="rangeValue">999</span></label>
                    <input type="range" id="numberRange" min="100" max="9999" value="999" step="1">
                </div>
                <button id="randomize">Generate Random Array</button>
                <button id="manualInput">Enter Manually</button>
                <div id="manualInputArea" style="display: none;">
                    <textarea id="manualArray" rows="2" cols="30" placeholder="e.g. 123, 45, 678"></textarea>
                    <button id="submitManual">Submit</button>
                </div>
            </div>
            
            <div class="control-group">
                <h3>Sorting Controls</h3>
                <div>
                    Base: 
                    <select id="baseSelect">
                        <option value="2">Binary (2)</option>
                        <option value="8">Octal (8)</option>
                        <option value="10" selected>Decimal (10)</option>
                        <option value="16">Hexadecimal (16)</option>
                    </select>
                </div>
                <div>
                    Direction: 
                    <select id="directionSelect">
                        <option value="lsd">Least Significant Digit (LSD)</option>
                        <option value="msd">Most Significant Digit (MSD)</option>
                    </select>
                </div>
                <button id="startSort">Start Sorting</button>
                <button id="nextStep" disabled>Next Step</button>
                <button id="autoStep" disabled>Auto Step (0.5s)</button>
                <button id="reset">Reset</button>
            </div>
            
            <div class="control-group">
                <h3>Visualization</h3>
                <div>
                    <label>Speed: <span id="speedValue">500</span>ms</label>
                    <input type="range" id="speedControl" min="100" max="2000" value="500" step="100">
                </div>
                <div>
                    <input type="checkbox" id="showBinary" checked>
                    <label for="showBinary">Show binary representation</label>
                </div>
                <div>
                    <input type="checkbox" id="showCount" checked>
                    <label for="showCount">Show counting phase</label>
                </div>
            </div>
        </div>
        
        <div class="step-info" id="stepDescription">
            Click "Generate Random Array" or "Enter Manually" to begin.
        </div>
        
        <div class="array-display" id="arrayDisplay"></div>
        
        <div id="countingPhase" style="display: none;">
            <h3>Counting Phase</h3>
            <div id="countArray"></div>
        </div>
        
        <div id="bucketsPhase" style="display: none;">
            <h3>Buckets (Digit <span id="currentDigit">0</span>)</h3>
            <div class="buckets-display" id="bucketsDisplay"></div>
        </div>
        
        <div id="sortInfo">
            <h3>Sorting Information</h3>
            <div>Max digits: <span id="maxDigits">0</span></div>
            <div>Current pass: <span id="currentPass">0</span>/<span id="totalPasses">0</span></div>
            <div>Current digit position: <span id="digitPosition">0</span> (from right)</div>
        </div>
    </div>

    <script>
        // State variables
        let originalArray = [];
        let workingArray = [];
        let sortState = {
            isSorting: false,
            currentPass: 0,
            currentDigit: 0,
            maxDigits: 0,
            base: 10,
            direction: 'lsd',
            autoStepInterval: null
        };
        
        // DOM elements
        const arrayDisplay = document.getElementById('arrayDisplay');
        const stepDescription = document.getElementById('stepDescription');
        const bucketsDisplay = document.getElementById('bucketsDisplay');
        const countArray = document.getElementById('countArray');
        const currentDigitSpan = document.getElementById('currentDigit');
        const maxDigitsSpan = document.getElementById('maxDigits');
        const currentPassSpan = document.getElementById('currentPass');
        const totalPassesSpan = document.getElementById('totalPasses');
        const digitPositionSpan = document.getElementById('digitPosition');
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateArraySizeDisplay();
            generateRandomArray();
            
            // Event listeners
            document.getElementById('arraySize').addEventListener('input', updateArraySizeDisplay);
            document.getElementById('numberRange').addEventListener('input', updateNumberRangeDisplay);
            document.getElementById('randomize').addEventListener('click', generateRandomArray);
            document.getElementById('manualInput').addEventListener('click', toggleManualInput);
            document.getElementById('submitManual').addEventListener('click', submitManualArray);
            document.getElementById('startSort').addEventListener('click', startSorting);
            document.getElementById('nextStep').addEventListener('click', performNextStep);
            document.getElementById('autoStep').addEventListener('click', toggleAutoStep);
            document.getElementById('reset').addEventListener('click', resetSort);
            document.getElementById('baseSelect').addEventListener('change', updateBase);
            document.getElementById('directionSelect').addEventListener('change', updateDirection);
            document.getElementById('speedControl').addEventListener('input', updateSpeed);
        });
        
        function updateArraySizeDisplay() {
            document.getElementById('sizeValue').textContent = document.getElementById('arraySize').value;
        }
        
        function updateNumberRangeDisplay() {
            document.getElementById('rangeValue').textContent = document.getElementById('numberRange').value;
        }
        
        function updateSpeed() {
            const speed = document.getElementById('speedControl').value;
            document.getElementById('speedValue').textContent = speed;
        }
        
        function updateBase() {
            sortState.base = parseInt(document.getElementById('baseSelect').value);
        }
        
        function updateDirection() {
            sortState.direction = document.getElementById('directionSelect').value;
        }
        
        function generateRandomArray() {
            const size = parseInt(document.getElementById('arraySize').value);
            const max = parseInt(document.getElementById('numberRange').value);
            
            originalArray = [];
            for (let i = 0; i < size; i++) {
                originalArray.push(Math.floor(Math.random() * (max + 1)));
            }
            
            resetSort();
        }
        
        function toggleManualInput() {
            const manualInputArea = document.getElementById('manualInputArea');
            manualInputArea.style.display = manualInputArea.style.display === 'none' ? 'block' : 'none';
        }
        
        function submitManualArray() {
            const input = document.getElementById('manualArray').value;
            try {
                originalArray = input.split(',')
                    .map(item => parseInt(item.trim()))
                    .filter(item => !isNaN(item));
                
                if (originalArray.length === 0) {
                    throw new Error("No valid numbers entered");
                }
                
                document.getElementById('manualInputArea').style.display = 'none';
                resetSort();
            } catch (e) {
                stepDescription.textContent = "Invalid input. Please use comma-separated numbers.";
            }
        }
        
        function resetSort() {
            workingArray = [...originalArray];
            sortState.isSorting = false;
            sortState.currentPass = 0;
            sortState.currentDigit = 0;
            sortState.maxDigits = getMaxDigits();
            
            document.getElementById('nextStep').disabled = false;
            document.getElementById('autoStep').disabled = false;
            document.getElementById('startSort').disabled = false;
            
            if (sortState.autoStepInterval) {
                clearInterval(sortState.autoStepInterval);
                sortState.autoStepInterval = null;
                document.getElementById('autoStep').textContent = 'Auto Step (0.5s)';
            }
            
            updateDisplay();
            document.getElementById('countingPhase').style.display = 'none';
            document.getElementById('bucketsPhase').style.display = 'none';
            
            maxDigitsSpan.textContent = sortState.maxDigits;
            currentPassSpan.textContent = sortState.currentPass;
            totalPassesSpan.textContent = sortState.maxDigits;
            digitPositionSpan.textContent = sortState.direction === 'lsd' ? '0' : (sortState.maxDigits - 1);
            
            stepDescription.textContent = 'Ready to sort. Click "Start Sorting" to begin.';
        }
        
        function getMaxDigits() {
            const base = sortState.base;
            let max = Math.max(...originalArray);
            let digits = 0;
            
            while (max > 0) {
                digits++;
                max = Math.floor(max / base);
            }
            
            return digits || 1; // At least 1 digit
        }
        
        function startSorting() {
            sortState.isSorting = true;
            document.getElementById('startSort').disabled = true;
            stepDescription.textContent = 'Sorting started. Click "Next Step" to proceed.';
            
            if (sortState.direction === 'msd') {
                sortState.currentDigit = sortState.maxDigits - 1;
            } else {
                sortState.currentDigit = 0;
            }
            
            updateDisplay();
        }
        
        function performNextStep() {
            if (!sortState.isSorting) return;
            
            const base = sortState.base;
            const digitPos = sortState.direction === 'lsd' ? 
                sortState.currentDigit : 
                (sortState.maxDigits - 1 - sortState.currentDigit);
            
            // Show counting phase if enabled
            if (document.getElementById('showCount').checked) {
                showCountingPhase(digitPos);
                return;
            }
            
            // Perform the actual sorting step
            const buckets = Array.from({ length: base }, () => []);
            
            for (const num of workingArray) {
                const digit = getDigit(num, digitPos, base);
                buckets[digit].push(num);
            }
            
            // For LSD, concatenate all buckets in order
            if (sortState.direction === 'lsd') {
                workingArray = buckets.flat();
            } 
            // For MSD, we need to recursively sort each bucket
            else {
                workingArray = [];
                for (let i = 0; i < buckets.length; i++) {
                    if (buckets[i].length > 1 && sortState.currentDigit < sortState.maxDigits - 1) {
                        // For MSD, we'd normally recursively sort here, but for simplicity we'll just concatenate
                        // In a full implementation, we'd need to track recursion state
                        workingArray.push(...buckets[i]);
                    } else {
                        workingArray.push(...buckets[i]);
                    }
                }
            }
            
            // Update state for next step
            sortState.currentPass++;
            if (sortState.direction === 'lsd') {
                sortState.currentDigit++;
            } else {
                sortState.currentDigit--;
            }
            
            // Check if sorting is complete
            const isComplete = sortState.direction === 'lsd' ? 
                sortState.currentDigit >= sortState.maxDigits : 
                sortState.currentDigit < 0;
            
            if (isComplete) {
                sortState.isSorting = false;
                stepDescription.textContent = 'Sorting complete!';
                document.getElementById('nextStep').disabled = true;
                document.getElementById('autoStep').disabled = true;
                
                if (sortState.autoStepInterval) {
                    clearInterval(sortState.autoStepInterval);
                    sortState.autoStepInterval = null;
                    document.getElementById('autoStep').textContent = 'Auto Step (0.5s)';
                }
            } else {
                stepDescription.textContent = `Processing ${sortState.direction.toUpperCase()} digit position ${digitPos}`;
            }
            
            // Update display
            currentPassSpan.textContent = sortState.currentPass;
            digitPositionSpan.textContent = digitPos;
            
            updateDisplay();
            showBuckets(buckets, digitPos);
        }
        
        function showCountingPhase(digitPos) {
            const base = sortState.base;
            const count = Array(base).fill(0);
            
            for (const num of workingArray) {
                const digit = getDigit(num, digitPos, base);
                count[digit]++;
            }
            
            // Display counting array
            let countHTML = '<div>Counting digits at position ' + digitPos + ':</div><div>';
            for (let i = 0; i < base; i++) {
                countHTML += `<span style="margin-right: 20px;">${i}: ${count[i]}</span>`;
            }
            countHTML += '</div>';
            
            countArray.innerHTML = countHTML;
            document.getElementById('countingPhase').style.display = 'block';
            
            // After showing counting, the next step will be the actual sorting
            document.getElementById('showCount').checked = false;
            stepDescription.textContent = 'Counting phase complete. Next step will distribute numbers into buckets.';
        }
        
        function getDigit(num, position, base) {
            return Math.floor(num / Math.pow(base, position)) % base;
        }
        
        function showBuckets(buckets, digitPos) {
            currentDigitSpan.textContent = digitPos;
            
            let bucketsHTML = '';
            for (let i = 0; i < buckets.length; i++) {
                bucketsHTML += `<div class="bucket">
                    <div>Digit ${i}:</div>
                    <div>${buckets[i].join(', ')}</div>
                </div>`;
            }
            
            bucketsDisplay.innerHTML = bucketsHTML;
            document.getElementById('bucketsPhase').style.display = 'block';
        }
        
        function toggleAutoStep() {
            if (sortState.autoStepInterval) {
                clearInterval(sortState.autoStepInterval);
                sortState.autoStepInterval = null;
                document.getElementById('autoStep').textContent = 'Auto Step (0.5s)';
            } else {
                const speed = parseInt(document.getElementById('speedControl').value);
                sortState.autoStepInterval = setInterval(() => {
                    if (sortState.isSorting) {
                        performNextStep();
                    } else {
                        clearInterval(sortState.autoStepInterval);
                        sortState.autoStepInterval = null;
                        document.getElementById('autoStep').textContent = 'Auto Step (0.5s)';
                    }
                }, speed);
                document.getElementById('autoStep').textContent = 'Stop Auto Step';
            }
        }
        
        function updateDisplay() {
            const showBinary = document.getElementById('showBinary').checked;
            let displayText = '';
            
            for (let i = 0; i < workingArray.length; i++) {
                const num = workingArray[i];
                let numStr = num.toString();
                
                if (showBinary) {
                    numStr += ` (${num.toString(sortState.base)})`;
                }
                
                displayText += numStr;
                if (i < workingArray.length - 1) {
                    displayText += ', ';
                }
            }
            
            arrayDisplay.textContent = displayText;
        }
    </script>
</body>
</html>
