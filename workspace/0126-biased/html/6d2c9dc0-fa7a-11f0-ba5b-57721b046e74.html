<!DOCTYPE html>
<html>
<head>
    <title>Interactive Stack Visualization</title>
    <style>
        body {
            font-family: Arial, margin: 0;
            padding: 20px;
            background: white;
            color: black;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .control-group {
            border: 1px solid #ccc;
            padding: 10px;
            margin-right: 10px;
        }
        .stack-container {
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            min-height: 300px;
            border: 1px solid #000;
            padding: 20px;
        }
        .stack-item {
            width: 200px;
            padding: 10px;
            text-align: center;
            border: 1px solid #000;
            margin-bottom: 5px;
            background: #f0f0f0;
        }
        .stack-top {
            font-weight: bold;
            background: #e0e0e0;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #000;
        }
        input, button, select {
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interactive Stack</h1>
        
        <div class="controls">
            <div class="control-group">
                <h3>Stack Operations</h3>
                <input type="text" id="pushValue" placeholder="Enter value to push">
                <button onclick="pushToStack()">Push</button>
                <button onclick="popFromStack()">Pop</button>
                <button onclick="peekStack()">Peek</button>
                <button onclick="clearStack()">Clear Stack</button>
            </div>
            
            <div class="control-group">
                <h3>Stack Configuration</h3>
                <label>Max Size: <input type="number" id="maxSize" min="1" max="20" value="10"></label>
                <button onclick="updateMaxSize()">Update</button>
                <div>
                    <label><input type="checkbox" id="autoResize"> Allow overflow</label>
                </div>
            </div>
            
            <div class="control-group">
                <h3>Stack Simulation</h3>
                <button onclick="generateRandomStack()">Generate Random Stack</button>
                <label>Items: <input type="number" id="randomCount" min="1" max="20" value="5"></label>
                <div>
                    <label>Operation Speed: 
                        <input type="range" id="speed" min="50" max="1000" value="300">
                    </label>
                </div>
            </div>
            
            <div class="control-group">
                <h3>Stack Analysis</h3>
                <button onclick="checkEmpty()">Is Empty?</button>
                <button onclick="checkFull()">Is Full?</button>
                <button onclick="getSize()">Get Size</button>
                <button onclick="searchStack()">Search Value</button>
                <input type="text" id="searchValue" placeholder="Value to search">
            </div>
        </div>
        
        <div class="stack-container" id="stackVisualization">
            <!-- Stack items will be added here dynamically -->
            <div class="stack-message">Stack is empty</div>
        </div>
        
        <div class="status" id="statusMessage">
            Ready. Stack operations will be shown here.
        </div>
        
        <div class="control-group">
            <h3>Operation History</h3>
            <select id="historyList" size="5" style="width: 100%;"></select>
            <button onclick="undoOperation()">Undo Last Operation</button>
            <button onclick="replayHistory()">Replay All Operations</button>
        </div>
    </div>

    <script>
        let stack = [];
        let maxSize = 10;
        let operationHistory = [];
        let operationSpeed = 300;
        
        document.getElementById('speed').addEventListener('input', function() {
            operationSpeed = parseInt(this.value);
        });
        
        function updateStackVisualization() {
            const stackContainer = document.getElementById('stackVisualization');
            stackContainer.innerHTML = '';
            
            if (stack.length === 0) {
                stackContainer.innerHTML = '<div class="stack-message">Stack is empty</div>';
                return;
            }
            
            // Create a copy and reverse to show top at the top
            const reversedStack = [...stack].reverse();
            
            reversedStack.forEach((item, index) => {
                const stackItem = document.createElement('div');
                stackItem.className = 'stack-item';
                if (index === 0) {
                    stackItem.classList.add('stack-top');
                }
                stackItem.textContent = item;
                stackContainer.appendChild(stackItem);
            });
        }
        
        function updateStatus(message) {
            const statusElement = document.getElementById('statusMessage');
            statusElement.textContent = message;
            
            // Add to history
            const historyEntry = `${new Date().toLocaleTimeString()}: ${message}`;
            operationHistory.push(historyEntry);
            const historyList = document.getElementById('historyList');
            const option = document.createElement('option');
            option.textContent = historyEntry;
            historyList.appendChild(option);
            historyList.scrollTop = historyList.scrollHeight;
        }
        
        function pushToStack() {
            const value = document.getElementById('pushValue').value.trim();
            if (!value) {
                updateStatus('Error: Please enter a value to push');
                return;
            }
            
            const autoResize = document.getElementById('autoResize').checked;
            
            if (stack.length >= maxSize && !autoResize) {
                updateStatus(`Error: Stack overflow (max size: ${maxSize})`);
                return;
            }
            
            if (stack.length >= maxSize && autoResize) {
                maxSize = stack.length + 1;
                document.getElementById('maxSize').value = maxSize;
            }
            
            stack.push(value);
            updateStackVisualization();
            updateStatus(`Pushed "${value}" to stack. Size: ${stack.length}/${maxSize}`);
            document.getElementById('pushValue').value = '';
        }
        
        function popFromStack() {
            if (stack.length === 0) {
                updateStatus('Error: Stack underflow (stack is empty)');
                return;
            }
            
            const value = stack.pop();
            updateStackVisualization();
            updateStatus(`Popped "${value}" from stack. Size: ${stack.length}/${maxSize}`);
        }
        
        function peekStack() {
            if (stack.length === 0) {
                updateStatus('Stack is empty - nothing to peek');
                return;
            }
            
            const value = stack[stack.length - 1];
            updateStatus(`Top of stack: "${value}"`);
            
            // Highlight the top item briefly
            const stackItems = document.querySelectorAll('.stack-item');
            if (stackItems.length > 0) {
                const originalClass = stackItems[0].className;
                stackItems[0].className = originalClass + ' stack-top-highlight';
                setTimeout(() => {
                    stackItems[0].className = originalClass;
                }, 1000);
            }
        }
        
        function clearStack() {
            stack = [];
            updateStackVisualization();
            updateStatus('Stack cleared');
        }
        
        function updateMaxSize() {
            const newSize = parseInt(document.getElementById('maxSize').value);
            if (isNaN(newSize) || newSize < 1) {
                updateStatus('Error: Invalid max size');
                return;
            }
            
            if (newSize < stack.length) {
                if (confirm(`Reducing stack size will remove ${stack.length - newSize} items. Continue?`)) {
                    stack = stack.slice(0, newSize);
                    updateStackVisualization();
                } else {
                    document.getElementById('maxSize').value = maxSize;
                    return;
                }
            }
            
            maxSize = newSize;
            updateStatus(`Stack max size updated to ${maxSize}`);
        }
        
        function generateRandomStack() {
            const count = parseInt(document.getElementById('randomCount').value);
            if (isNaN(count) || count < 1) {
                updateStatus('Error: Invalid item count');
                return;
            }
            
            const autoResize = document.getElementById('autoResize').checked;
            if (count > maxSize && !autoResize) {
                updateStatus(`Error: Requested ${count} items exceeds max size of ${maxSize}`);
                return;
            }
            
            if (count > maxSize && autoResize) {
                maxSize = count;
                document.getElementById('maxSize').value = maxSize;
            }
            
            stack = [];
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            for (let i = 0; i < count; i++) {
                const randomValue = 'Item-' + Array.from({length: 4}, () => 
                    chars.charAt(Math.floor(Math.random() * chars.length))).join('');
                stack.push(randomValue);
            }
            
            updateStackVisualization();
            updateStatus(`Generated random stack with ${count} items`);
        }
        
        function checkEmpty() {
            updateStatus(stack.length === 0 ? 'Stack is empty' : 'Stack is not empty');
        }
        
        function checkFull() {
            updateStatus(stack.length >= maxSize ? `Stack is full (${maxSize}/${maxSize})` : `Stack is not full (${stack.length}/${maxSize})`);
        }
        
        function getSize() {
            updateStatus(`Stack size: ${stack.length} items (max: ${maxSize})`);
        }
        
        function searchStack() {
            const value = document.getElementById('searchValue').value.trim();
            if (!value) {
                updateStatus('Error: Please enter a value to search');
                return;
            }
            
            const index = [];
            for (let i = 0; i < stack.length; i++) {
                if (stack[i] === value) {
                    index.push(stack.length - i); // Show position from top
                }
            }
            
            if (index.length === 0) {
                updateStatus(`"${value}" not found in stack`);
            } else {
                updateStatus(`"${value}" found at position(s) from top: ${index.join(', ')}`);
            }
        }
        
        function undoOperation() {
            if (operationHistory.length === 0) {
                updateStatus('No operations to undo');
                return;
            }
            
            // Simple undo - just pop the last item
            if (stack.length > 0) {
                stack.pop();
                updateStackVisualization();
                updateStatus('Undid last operation (removed top item)');
            } else {
                updateStatus('Cannot undo - stack is empty');
            }
        }
        
        function replayHistory() {
            if (operationHistory.length === 0) {
                updateStatus('No operations to replay');
                return;
            }
            
            updateStatus('Replaying all operations...');
            stack = [];
            updateStackVisualization();
            
            const history = [...operationHistory];
            operationHistory = [];
            document.getElementById('historyList').innerHTML = '';
            
            let delay = 0;
            history.forEach((entry, index) => {
                setTimeout(() => {
                    // Simulate operations based on history
                    if (entry.includes('Pushed')) {
                        const value = entry.match(/"([^"]+)"/)[1];
                        stack.push(value);
                        updateStackVisualization();
                    } else if (entry.includes('Popped') && stack.length > 0) {
                        stack.pop();
                        updateStackVisualization();
                    } else if (entry.includes('cleared')) {
                        stack = [];
                        updateStackVisualization();
                    }
                    
                    // Add back to history
                    operationHistory.push(entry);
                    const historyList = document.getElementById('historyList');
                    const option = document.createElement('option');
                    option.textContent = entry;
                    historyList.appendChild(option);
                    historyList.scrollTop = historyList.scrollHeight;
                    
                    if (index === history.length - 1) {
                        updateStatus('Replay complete');
                    }
                }, delay);
                
                delay += operationSpeed;
            });
        }
        
        // Initialize
        updateStackVisualization();
    </script>
</body>
</html>
