<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Networks</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #1c1c1e;
            color: #f1f1f1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            font-size: 3rem;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: #00BFFF;
            text-shadow: 0 0 10px rgba(0, 186, 255, 0.7);
        }
        #container {
            position: relative;
            width: 800px;
            height: 500px;
            background: linear-gradient(90deg, #282828, #444);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }
        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .neuron {
            width: 20px;
            height: 20px;
            background-color: #00BFFF;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .connections {
            stroke: rgba(0, 191, 255, 0.5);
            stroke-width: 2;
        }
        .button {
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #005f7f;
        }
        #info {
            text-align: center;
            font-size: 1rem;
            margin-top: 10px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div>
        <h1>Neural Networks</h1>
        <div id="container">
            <div class="layer" style="top: 20px;">
                <div class="neuron" style="margin-left: 75px;"></div>
                <div class="neuron" style="margin-left: 150px;"></div>
                <div class="neuron" style="margin-left: 225px;"></div>
            </div>
            <div class="layer" style="top: 220px;">
                <div class="neuron" style="margin-left: 50px;"></div>
                <div class="neuron" style="margin-left: 200px;"></div>
            </div>
            <div class="layer" style="top: 420px;">
                <div class="neuron" style="margin-left: 125px;"></div>
            </div>
        </div>
        <button class="button" onclick="displayInfo()">Learn More</button>
        <div id="info" style="display:none;">Neural Networks are a subset of Machine Learning.</div>
    </div>

    <script>
        function displayInfo() {
            const info = document.getElementById('info');
            if (info.style.display === 'none') {
                info.style.display = 'block';
            } else {
                info.style.display = 'none';
            }
        }
    </script>
</body>
</html>
