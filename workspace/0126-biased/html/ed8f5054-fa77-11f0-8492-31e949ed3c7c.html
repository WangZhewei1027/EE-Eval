<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congestion Control Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: #ffffff;
        }

        .container {
            max-width: 800px;
            background: linear-gradient(135deg, #4e54c8, #8f94fb);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
            text-align: center;
        }

        h1 {
            margin: 20px;
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 1px 1px 10px rgba(0, 0, 0, 0.5);
        }

        .traffic {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 300px;
            position: relative;
            border-top: 5px solid #ffcc00;
            overflow: hidden;
        }

        .packet {
            background-color: #ff5733;
            width: 30px;
            height: 30px;
            border-radius: 5px;
            position: absolute;
            bottom: 0;
            animation: move 5s infinite ease-in-out;
            opacity: 0.9;
        }

        @keyframes move {
            0% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(300px);
            }
            100% {
                transform: translateX(0);
            }
        }

        .description {
            padding: 20px;
            font-size: 1.2rem;
            line-height: 1.5;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 5px;
            margin: 20px;
        }

        .button-container {
            margin: 20px;
        }

        .button {
            background-color: #28a745;
            border: none;
            color: white;
            padding: 15px 30px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 1.2rem;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #218838;
        }

    </style>
</head>

<body>
    <div class="container">
        <h1>Congestion Control Visualization</h1>
        <div class="traffic">
            <div class="packet"></div>
            <div class="packet" style="animation-delay: 1s;"></div>
            <div class="packet" style="animation-delay: 2s;"></div>
            <div class="packet" style="animation-delay: 3s;"></div>
            <div class="packet" style="animation-delay: 4s;"></div>
        </div>
        <div class="description">
            <p>
                Congestion control is a vital mechanism in network communications that ensures data packets are
                transmitted efficiently. Watch the packets flow in the diagram above, demonstrating the fundamental
                concept of congestion in a network.
            </p>
        </div>
        <div class="button-container">
            <button class="button" onclick="alert('Watch the packets flow and notice the effects of congestion control!')">Learn More</button>
        </div>
    </div>
    <script>
        // Simple interaction is programmed; functionality is limited as per request.
        // This could be expanded to more educational material in the future.
    </script>
</body>

</html>
