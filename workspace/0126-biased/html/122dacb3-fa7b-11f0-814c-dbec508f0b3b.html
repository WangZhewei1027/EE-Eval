<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refactoring Demo</title>
    <style>
        body {
            font-family: monospace;
            background-color: #fff;
        }
        input[type="text"], input[type="password"], input[type="date"] {
            width: 100%;
            padding: 10px;
            margin: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
        input[type="submit"] {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #3e8e41;
        }
        .error {
            color: #f00;
        }
    </style>
</head>
<body>
    <h1>Refactoring Demo</h1>
    <p id="error"></p>
    <button id="save-btn">Save</button>
    <form id="refactoring-form">
        <input type="text" id="name" placeholder="Name">
        <input type="password" id="password" placeholder="Password">
        <input type="date" id="birthdate" placeholder="Birthdate">
        <textarea id="message" placeholder="Message"></textarea>
        <button id="submit-btn">Refactor</button>
        <button id="clear-btn">Clear</button>
    </form>
    <script>
        const form = document.getElementById('refactoring-form');
        const saveBtn = document.getElementById('save-btn');
        const submitBtn = document.getElementById('submit-btn');
        const clearBtn = document.getElementById('clear-btn');
        const errorDiv = document.getElementById('error');

        saveBtn.addEventListener('click', saveRefactoring);
        submitBtn.addEventListener('click', submitRefactoring);
        clearBtn.addEventListener('click', clearRefactoring);

        function saveRefactoring() {
            const name = document.getElementById('name').value;
            const password = document.getElementById('password').value;
            const birthdate = document.getElementById('birthdate').value;
            const message = document.getElementById('message').value;

            if (name && password && birthdate && message) {
                console.log('Refactoring saved successfully!');
                errorDiv.textContent = '';
            } else {
                errorDiv.textContent = 'Please fill in all fields.';
            }
        }

        function submitRefactoring() {
            const refactoring = {
                name: document.getElementById('name').value,
                password: document.getElementById('password').value,
                birthdate: document.getElementById('birthdate').value,
                message: document.getElementById('message').value
            };

            console.log('Refactoring submitted:', refactoring);

            errorDiv.textContent = '';
        }

        function clearRefactoring() {
            form.reset();
            errorDiv.textContent = '';
        }
    </script>
</body>
</html>
