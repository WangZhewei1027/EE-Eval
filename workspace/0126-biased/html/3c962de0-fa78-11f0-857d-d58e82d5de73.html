<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Binary Tree — Visual Concept</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

  /* Reset and base */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Poppins', sans-serif;
    color: #eaeaea;
    overflow: hidden;
    user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2rem 1rem 4rem 1rem;
  }

  h1 {
    font-weight: 600;
    font-size: 3.2rem;
    letter-spacing: 0.1em;
    margin-bottom: 0.8rem;
    text-transform: uppercase;
    text-align: center;
    color: #cdf0ea;
    text-shadow: 0 0 6px #9ee3e8aa;
    user-select: none;
  }

  h2 {
    font-weight: 300;
    font-size: 1.2rem;
    color: #a3b1c6cc;
    margin-bottom: 3rem;
    text-align: center;
    max-width: 380px;
    line-height: 1.4;
  }

  #container {
    position: relative;
    width: 860px;
    max-width: 95vw;
    aspect-ratio: 1 / 0.75;
    background: rgba(255 255 255 / 0.05);
    border-radius: 1.2rem;
    box-shadow:
      inset 0 0 24px #34e0e099,
      0 8px 32px rgba(18,138,198,0.4);
    padding-top: 3rem;
  }

  svg {
    width: 100%;
    height: 100%;
    overflow: visible;
    user-select: none;
  }

  /* COLORS & GLOW */
  :root {
    --node-fill: #1f456e;
    --node-glow: #35d8ff;
    --line-color: #5cc8ffcc;
    --line-glow: #4bcfffaa;
    --highlight-fill: #33d9b2;
    --highlight-glow: #2adea9cc;
  }

  /* Node style */
  .node {
    cursor: default;
    filter:
      drop-shadow(0 0 4px var(--node-glow))
      drop-shadow(0 0 10px var(--node-glow));
    transition: filter 0.3s ease;
  }

  .node circle {
    fill: var(--node-fill);
    stroke: #b4eaffcc;
    stroke-width: 2;
    transition: fill 0.3s ease, stroke 0.3s ease;
  }

  .node text {
    fill: #c4ecffdd;
    font-weight: 600;
    font-size: 14px;
    user-select: none;
    pointer-events: none;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.07em;
  }

  /* Lines style */
  .link {
    stroke: var(--line-color);
    stroke-width: 3;
    transition: stroke 0.3s ease;
    filter: drop-shadow(0 0 4px var(--line-glow));
  }

  /* Hover effect to highlight branches */
  /* Limited interactivity - subtle glow on hover on node */
  .node:hover circle {
    fill: var(--highlight-fill);
    stroke: #92ffe9cc;
    filter:
      drop-shadow(0 0 8px var(--highlight-glow))
      drop-shadow(0 0 20px var(--highlight-glow));
  }
  .node:hover ~ .link {
    stroke: var(--highlight-glow);
    stroke-width: 3.5;
    filter: drop-shadow(0 0 8px var(--highlight-glow));
  }

  /* BUTTONS panel */
  #buttons {
    margin-top: 2rem;
    display: flex;
    gap: 1rem;
    justify-content: center;
  }

  button {
    background: #1c3c5c;
    border: 2px solid #2eccdbcc;
    border-radius: 9999px;
    color: #a4f9f8;
    font-weight: 600;
    font-size: 1rem;
    padding: 0.65rem 1.6rem;
    cursor: pointer;
    transition:
      background-color 0.35s ease,
      color 0.35s ease,
      border-color 0.35s ease,
      box-shadow 0.35s ease;
    user-select: none;
    box-shadow: 0 0 16px #31dbdbaa;
    text-shadow: 0 0 6px #31dbdbbb;
  }
  button:focus {
    outline: none;
    box-shadow: 0 0 24px #48f9f9dd;
  }
  button:hover {
    background-color: #27e5f9;
    border-color: #19b8ca99;
    color: #064d56;
    box-shadow:
      0 0 24px #00f3ffdd,
      0 2px 14px #00e0ffcc;
  }

  /* Animations */

  /* subtle fade-in for entire container */
  #container {
    opacity: 0;
    animation: fadeInSmooth 2s ease forwards;
  }

  @keyframes fadeInSmooth {
    to {
      opacity: 1;
    }
  }

  /* Animate edges drawing */
  .link {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: drawLine 1.2s forwards;
    animation-timing-function: cubic-bezier(.19,1,.22,1);
  }

  /* Each line will have delay, set later in JS */

  @keyframes drawLine {
    to {
      stroke-dashoffset: 0;
    }
  }

  /* Nodes fade & scale in */
  .node {
    opacity: 0;
    transform-origin: center center;
    animation: appearNode 0.7s forwards;
    animation-timing-function: cubic-bezier(0.39,0.575,0.565,1);
  }

  /* Delays added in JS for stagger */

  @keyframes appearNode {
    0% {
      opacity: 0;
      transform: scale(0.5);
    }
    100% {
      opacity: 1;
      transform: scale(1);
    }
  }

  /* Footer text */
  #footer {
    margin-top: 3rem;
    font-weight: 300;
    font-size: 0.85rem;
    color: #5080a999;
    font-style: italic;
    user-select: none;
  }
</style>
</head>
<body>
  <h1>Binary Tree</h1>
  <h2>An elegant, animated visualization of the canonical binary tree structure with balanced geometry and luminous aesthetic.</h2>
  <div id="container" aria-label="Binary Tree Visualization">
    <svg viewBox="0 0 860 645" aria-hidden="true" role="img" >
      <g id="links" stroke-linecap="round" stroke-linejoin="round">
        <!-- Links inserted by JS -->
      </g>
      <g id="nodes" >
        <!-- Nodes inserted by JS -->
      </g>
    </svg>
  </div>
  <div id="buttons" aria-label="Controls">
    <button id="btnExpand" aria-pressed="false" aria-label="Toggle expand or collapse tree">Expand Tree</button>
  </div>
  <div id="footer">© Visual Concept by ChatGPT &mdash; June 2024</div>

<script>
  (() => {
    /* Binary Tree representation with positions for aesthetics
      Node IDs follow a 1-based system:
        1
       / \
      2   3
     / \ / \
    4  5 6  7
    We provide balanced x,y coords for nice visual.

    Two tree states:
      - Collapsed: only root and 2 children (levels 1 and 2)
      - Expanded: full tree with level 3 nodes
    */
    
    const svgNS = "http://www.w3.org/2000/svg";

    // Node positioning for expanded tree (7 nodes)
    // (x,y) in SVG viewbox coords (860x645)
    // Balanced horizontally by levels

    const expandedNodes = [
      {id:1, val:1, x: 430, y: 70},
      {id:2, val:2, x: 220, y: 200},
      {id:3, val:3, x: 640, y: 200},
      {id:4, val:4, x: 120, y: 350},
      {id:5, val:5, x: 320, y: 350},
      {id:6, val:6, x: 545, y: 350},
      {id:7, val:7, x: 740, y: 350},
    ];

    // Links between nodes for expanded tree
    const expandedLinks = [
      {from:1, to:2},
      {from:1, to:3},
      {from:2, to:4},
      {from:2, to:5},
      {from:3, to:6},
      {from:3, to:7},
    ];

    // Collapsed tree (3 nodes) positions:
    const collapsedNodes = [
      {id:1, val:1, x: 430, y: 70},
      {id:2, val:2, x: 250, y: 250},
      {id:3, val:3, x: 610, y: 250},
    ];
    // Collapsed links:
    const collapsedLinks = [
      {from:1, to:2},
      {from:1, to:3},
    ];

    const svg = document.querySelector("#container svg");
    const nodesGroup = document.getElementById("nodes");
    const linksGroup = document.getElementById("links");
    const btnExpand = document.getElementById("btnExpand");

    // Generic function to create svg element
    function createSVG(tag, attrs = {}, extraClass = '') {
      const el = document.createElementNS(svgNS, tag);
      for (let [k,v] of Object.entries(attrs)) {
        el.setAttribute(k, v);
      }
      if(extraClass) el.classList.add(extraClass);
      return el;
    }

    // Create line link element with animation delay
    function createLink(fromNode, toNode, delay) {
      const line = createSVG("line", {
        class:"link",
        'x1': fromNode.x,
        'y1': fromNode.y,
        'x2': toNode.x,
        'y2': toNode.y,
        style: `animation-delay: ${delay}s`,
        // accessibility no need, lines are decorative so aria-hidden
        'aria-hidden': 'true',
      });
      return line;
    }

    // Create a node group with circle and text
    function createNode(nodeData, delay) {
      /*
        We'll create a group <g> with class 'node' and animation delay.
        Circle radius 26 px.
        Text with node value centered vertically and horizontally.
      */
      const g = createSVG("g", {
        class: "node",
        style: `animation-delay: ${delay}s`,
        tabindex: "-1",
        role: "img",
        'aria-label': `Node ${nodeData.val}`
      }, 'node');

      // Circle with subtle ripple gradient fill
      const circ = createSVG("circle", {
        cx: nodeData.x,
        cy: nodeData.y,
        r: 26,
        filter: "url(#glow)",
        'aria-hidden': 'true',
      });

      // Text for value (centered)
      const txt = createSVG("text", {
        x: nodeData.x,
        y: nodeData.y + 5,
        'text-anchor': 'middle',
        'dominant-baseline': 'middle',        
      });
      txt.textContent = nodeData.val;

      g.appendChild(circ);
      g.appendChild(txt);
      return g;
    }

    // Clear current nodes and links
    function clearTree() {
      while(nodesGroup.firstChild) nodesGroup.removeChild(nodesGroup.firstChild);
      while(linksGroup.firstChild) linksGroup.removeChild(linksGroup.firstChild);
    }

    // Render tree given nodes and links arrays
    function renderTree(nodes, links) {
      clearTree();

      // Animate: We'll stagger nodes and links with small delays
      // Draw all links first (so lines behind nodes)
      links.forEach((link,i) => {
        // Delay on each link 0.2 + i*0.15
        const fromNode = nodes.find(n=>n.id===link.from);
        const toNode = nodes.find(n=>n.id===link.to);
        const delay = 0.35 + i*0.17;
        if(fromNode && toNode) {
          const linkEl = createLink(fromNode,toNode,delay);
          linksGroup.appendChild(linkEl);
        }
      });

      // Draw nodes
      nodes.forEach((node,i) => {
        const delay = 0.1 + i*0.15;
        const nodeEl = createNode(node, delay);
        nodesGroup.appendChild(nodeEl);
      });
    }

    // Create SVG glow filter for nodes (for sophisticated neon look)
    function createGlows() {
      const defs = createSVG('defs');
      const filter = createSVG('filter', { id: 'glow', x:'-50%', y:'-50%', width:'200%', height:'200%' });

      const feGaussianBlur = createSVG('feDropShadow', {
        dx: '0',
        dy: '0',
        stdDeviation: '5',
        floodColor: '#2ae0ff',
        floodOpacity: '0.7'
      });

      filter.appendChild(feGaussianBlur);
      defs.appendChild(filter);
      svg.appendChild(defs);
    }

    createGlows();

    // State management
    let expanded = false;

    function updateUI() {
      if(expanded) {
        renderTree(expandedNodes, expandedLinks);
        btnExpand.textContent = "Collapse Tree";
        btnExpand.setAttribute('aria-pressed', 'true');
      } else {
        renderTree(collapsedNodes, collapsedLinks);
        btnExpand.textContent = "Expand Tree";
        btnExpand.setAttribute('aria-pressed', 'false');
      }
    }

    // Initial render
    updateUI();

    // Button event for toggling expand/collapse
    btnExpand.addEventListener('click', () => {
      expanded = !expanded;
      updateUI();
    });

  })();
</script>
</body>
</html>
