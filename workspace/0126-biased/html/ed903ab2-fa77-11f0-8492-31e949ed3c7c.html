<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Vector Machine Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f3f4f6, #e2e8f0);
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 800px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            position: relative;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #4a5568;
        }
        .chart {
            width: 100%;
            height: 400px;
            position: relative;
            margin: 0 auto;
            border: 2px solid #4a5568;
            border-radius: 10px;
            overflow: hidden;
        }
        .dot {
            border-radius: 50%;
            position: absolute;
            transition: transform 0.3s;
        }
        .button {
            display: inline-block;
            background: #4a5568;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 1rem;
            font-size: 1rem;
            transition: background-color 0.3s;
        }
        .button:hover {
            background: #2d3748;
        }
        .line {
            position: absolute;
            background: rgba(74, 85, 104, 0.8);
            height: 2px;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
            transition: transform 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Support Vector Machine Visualization</h1>
        <div class="chart" id="chart">
            <div class="line" id="decisionBoundary"></div>
        </div>
        <button class="button" onclick="animatePoints()">Visualize SVM</button>
        <div id="info" style="margin-top: 1rem; color: #4a5568;">Watch as the Support Vector Machine classifies data points!</div>
    </div>

    <script>
        function getRandomPosition() {
            return Math.floor(Math.random() * 300) + 50; // Generate random position within bounds
        }

        function createPoints() {
            const chart = document.getElementById('chart');
            const numPoints = 20;
            const points = [];
            for (let i = 0; i < numPoints; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.style.width = '10px';
                dot.style.height = '10px';
                dot.style.background = Math.random() > 0.5 ? '#4a5568' : '#e53e3e'; // Change color based on class
                dot.style.left = getRandomPosition() + 'px';
                dot.style.top = getRandomPosition() + 'px';
                chart.appendChild(dot);
                points.push(dot);
            }
            return points;
        }

        function animatePoints() {
            const points = createPoints();
            let counter = 0;
            const interval = setInterval(() => {
                if (counter >= points.length) {
                    clearInterval(interval);
                } else {
                    points[counter].style.transform = 'scale(1.5)';
                    counter++;
                }
            }, 500);
        }
    </script>
</body>
</html>
