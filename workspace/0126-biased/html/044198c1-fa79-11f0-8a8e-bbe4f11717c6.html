<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .main p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        .button {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #444;
        }
        
        .footer {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
            clear: both;
        }
        
        .footer p {
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Set</h1>
            <p>Learn the art of the set</p>
        </div>
        <div class="main">
            <p>This is a set. It's a collection of things. It's a collection of sets.</p>
            <p>Learn about sets and how they work. Learn about the different types of sets and how to use them.</p>
            <button>Learn More</button>
        </div>
        <div class="footer">
            <p>&copy; 2023 Set</p>
        </div>
    </div>
    <script>
        const button = document.querySelector('.button');
        button.addEventListener('click', () => {
            alert('You clicked the button!');
        });
    </script>
</body>
</html>
