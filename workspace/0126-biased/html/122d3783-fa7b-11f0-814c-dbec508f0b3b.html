<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP Example</title>
    <style>
        body {
            background-color: #000;
            font-family: monospace;
        }
        input[type="text"], input[type="number"], input[type="checkbox"], select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #000;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background-color: #000;
            color: #fff;
            cursor: pointer;
        }
        button:hover {
            background-color: #000000;
        }
        label {
            display: block;
            margin-bottom: 10px;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <h1>HTTP Example</h1>
    <p id="message"></p>
    <form id="form">
        <label for="url">URL:</label>
        <input type="text" id="url" name="url" placeholder="Enter URL">
        <button id="submit">Submit</button>
        <button id="clear">Clear</button>
        <button id="refresh">Refresh</button>
        <button id="reset">Reset</button>
        <button id="submit-error">Submit (Error Handling)</button>
    </form>
    <div id="output"></div>

    <script>
        let message = document.getElementById('message');
        let form = document.getElementById('form');
        let urlInput = document.getElementById('url');
        let submitButton = document.getElementById('submit');
        let clearButton = document.getElementById('clear');
        let refreshButton = document.getElementById('refresh');
        let resetButton = document.getElementById('reset');
        let submitWithErrorButton = document.getElementById('submit-error');

        // URL Input
        urlInput.addEventListener('input', () => {
            message.textContent = 'URL: ' + urlInput.value;
        });

        // Submit Button
        submitButton.addEventListener('click', () => {
            if (urlInput.value.trim() !== '') {
                fetch(urlInput.value)
                    .then(response => response.json())
                    .then(data => {
                        message.textContent = 'Success: ' + data.message;
                        form.reset();
                    })
                    .catch(error => {
                        message.textContent = 'Error: ' + error.message;
                    });
            } else {
                message.textContent = 'Please enter a URL';
            }
        });

        // Clear Button
        clearButton.addEventListener('click', () => {
            message.textContent = '';
            form.reset();
        });

        // Refresh Button
        refreshButton.addEventListener('click', () => {
            fetch('https://api.github.com/users/octocat')
                .then(response => response.json())
                .then(data => {
                    message.textContent = 'Success: ' + data.message;
                    form.reset();
                })
                .catch(error => {
                    message.textContent = 'Error: ' + error.message;
                });
        });

        // Reset Button
        resetButton.addEventListener('click', () => {
            message.textContent = '';
            form.reset();
        });

        // Submit with Error Handling
        submitWithErrorButton.addEventListener('click', () => {
            fetch(urlInput.value)
                .then(response => response.json())
                .then(data => {
                    message.textContent = 'Success: ' + data.message;
                    form.reset();
                })
                .catch(error => {
                    message.textContent = 'Error: ' + error.message;
                });
        });
    </script>
</body>
</html>
