<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Typing</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #ccc;
        }
        
        .input-field {
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .input-field input[type="text"] {
            width: 100%;
        }
        
        .button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        
        .button-container button {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dynamic Typing</h1>
        </div>
        <div class="button-container">
            <button class="button">Button 1</button>
            <button class="button">Button 2</button>
            <button class="button">Button 3</button>
            <button class="button">Button 4</button>
            <button class="button">Button 5</button>
            <button class="button">Button 6</button>
            <button class="button">Button 7</button>
            <button class="button">Button 8</button>
            <button class="button">Button 9</button>
            <button class="button">Button 10</button>
            <button class="button">Button 11</button>
            <button class="button">Button 12</button>
            <button class="button">Button 13</button>
            <button class="button">Button 14</button>
            <button class="button">Button 15</button>
            <button class="button">Button 16</button>
            <button class="button">Button 17</button>
            <button class="button">Button 18</button>
            <button class="button">Button 19</button>
            <button class="button">Button 20</button>
        </div>
        <div class="input-field">
            <input type="text" placeholder="Enter your name">
            <button class="button">Submit</button>
        </div>
    </div>
    <script>
        let buttonCount = 0;
        let inputField = document.querySelector('.input-field');
        let inputFieldInput = document.querySelector('input[type="text"]');
        
        inputFieldInput.addEventListener('input', function() {
            buttonCount++;
            document.querySelector('.button-container button').textContent = buttonCount;
        });
        
        document.querySelector('.button-container button').addEventListener('click', function() {
            inputFieldInput.value = inputFieldInput.value.toUpperCase();
        });
        
        document.querySelector('.button-container button').addEventListener('click', function() {
            inputFieldInput.value = inputFieldInput.value.toLowerCase();
        });
        
        document.querySelector('.button-container button').addEventListener('click', function() {
            inputFieldInput.value = inputFieldInput.value.charAt(0).toUpperCase() + inputFieldInput.value.slice(1);
        });
        
        document.querySelector('.button-container button').addEventListener('click', function() {
            inputFieldInput.value = inputFieldInput.value + 'Hello';
        });
        
        document.querySelector('.button-container button').addEventListener('click', function() {
            inputFieldInput.value = inputFieldInput.value + ' World';
        });
        
        document.querySelector('.button-container button').addEventListener('click', function() {
            inputFieldInput.value = inputFieldInput.value + ' ' + inputFieldInput.value;
        });
        
        document.querySelector('.button-container button').addEventListener('click', function() {
            inputFieldInput.value = inputFieldInput.value + ' ' + inputFieldInput.value.charAt(0).toUpperCase() + inputFieldInput.value.slice(1);
        });
        
        document.querySelector('.button-container button').addEventListener('click', function() {
            inputFieldInput.value = inputFieldInput.value + ' ' + inputFieldInput.value.charAt(0).toUpperCase() + inputFieldInput.value.slice(1).toLowerCase();
        });
        
        document.querySelector('.button-container button').addEventListener('click', function() {
            inputFieldInput.value = inputFieldInput.value + ' ' + inputFieldInput.value.charAt(0).toUpperCase() + inputFieldInput.value.slice(1).toUpperCase();
        });
        
        document.querySelector('.button-container button').addEventListener('click', function() {
            inputFieldInput.value = inputFieldInput.value + ' ' + inputFieldInput.value.charAt(0).toUpperCase() + inputFieldInput.value.slice(1).toLowerCase().toUpperCase();
        });
        
        document.querySelector('.button-container button').addEventListener('click', function() {
            inputFieldInput.value = inputFieldInput.value + ' ' + inputFieldInput.value.charAt(0).toUpperCase() + inputFieldInput.value.slice(1).toUpperCase().toLowerCase();
        });
        
        document.querySelector('.button-container button').addEventListener('click', function() {
            inputFieldInput.value = inputFieldInput.value + ' ' + inputFieldInput.value.charAt(0).toUpperCase() + inputFieldInput.value.slice(1).toLowerCase().toLowerCase();
        });
        
        document.querySelector('.button-container button').addEventListener('click', function() {
            inputFieldInput.value = inputFieldInput.value + ' ' + inputFieldInput.value.charAt(0).toUpperCase() + inputFieldInput.value.slice(1).toLowerCase().toLowerCase().toUpperCase();
        });
    </script>
</body>
</html>
