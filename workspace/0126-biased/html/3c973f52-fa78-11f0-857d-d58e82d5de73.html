<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jump Search Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');
  /* Reset and base */
  * {
    box-sizing: border-box;
  }
  body, html {
    margin: 0; padding: 0;
    height: 100%;
    background: linear-gradient(135deg, #1f2335, #3a406e);
    font-family: 'Poppins', sans-serif;
    color: #e0e0e0;
    overflow: hidden;
    user-select: none;
  }
  #container {
    max-width: 960px;
    margin: 2rem auto 4rem;
    padding: 0 2rem 3rem;
    background: linear-gradient(145deg, #2d314d, #3f4671);
    border-radius: 20px;
    box-shadow:
      0 10px 30px rgba(25,25,75,0.7),
      inset 0 0 40px #4a529c50;
    position: relative;
    min-height: 540px;
  }
  h1 {
    text-align: center;
    font-weight: 600;
    font-size: 3rem;
    letter-spacing: 0.08em;
    color: #9bc8ff;
    text-shadow: 0 0 6px #72a7ffcc, 0 0 10px #2a3e9ccc;
    margin-bottom: 0.6rem;
  }
  h2 {
    text-align: center;
    font-weight: 300;
    font-style: italic;
    font-size: 1.1rem;
    color: #b0c3ff99;
    margin-bottom: 2.4rem;
    letter-spacing: 0.06em;
  }

  /* Array container */
  #array {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 60px;
  }
  .block {
    position: relative;
    width: 48px;
    height: 64px;
    background: linear-gradient(135deg, #4e557f, #6a73bd);
    border-radius: 12px;
    box-shadow:
      inset 0 2px 10px #8a9cfff2,
      0 6px 12px rgba(18,24,68,0.9);
    color: #e0e0fff;
    font-weight: 600;
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
    transition:
      background 0.5s ease,
      box-shadow 0.5s ease,
      transform 0.5s cubic-bezier(0.645,0.045,0.355,1);
  }
  .block:hover {
    box-shadow:
      0 0 12px #8098ffcc,
      inset 0 0 30px #a2b2ffff;
  }

  /* States for blocks */
  .block.jumped {
    background: #3d73d6;
    box-shadow:
      0 0 20px #76a3ffcc,
      inset 0 0 40px #264c91;
    color: #d0dfff;
    transform: scale(1.02);
  }
  .block.checked {
    background: #e27979;
    box-shadow:
      0 0 20px #ff4c4ccc,
      inset 0 0 40px #b74040;
    color: #fff5f5;
    transform: scale(1.1) translateY(-6px);
  }
  .block.found {
    background: #6adc91;
    box-shadow:
      0 0 30px #55ce80cc,
      inset 0 0 45px #1d5e30;
    color: #f0fff5;
    font-weight: 700;
    transform: scale(1.15) translateY(-8px);
  }

  /* Labels under blocks for jumps */
  .label {
    position: absolute;
    top: 72px;
    width: 48px;
    font-size: 0.7rem;
    color: #a3b2eccc;
    text-align: center;
    letter-spacing: 0.05em;
    user-select: none;
    pointer-events: none;
    font-weight: 500;
  }

  /* Controls */
  #controls {
    position: absolute;
    bottom: 24px;
    right: 24px;
    display: flex;
    gap: 14px;
  }
  button {
    background: #5c6bc0;
    border: none;
    padding: 14px 24px;
    border-radius: 24px;
    color: #e8ebff;
    font-weight: 600;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    box-shadow:
      0 2px 12px #5c6bc099,
      inset 0 -3px 10px #2b3873;
    text-transform: uppercase;
    transition:
      background 0.4s ease,
      box-shadow 0.4s ease,
      color 0.4s ease;
  }
  button:hover {
    background: #4255a7;
    box-shadow:
      0 4px 20px #4c62b533,
      inset 0 -4px 14px #1d2958;
    color: #b8c2f2;
  }
  button:disabled {
    background: #3b425f88;
    box-shadow: none;
    color: #8f97b1aa;
    cursor: default;
  }

  /* Explanation Panel */
  #explanation {
    max-width: 880px;
    margin: 0 auto;
    font-style: italic;
    font-weight: 300;
    font-size: 1rem;
    line-height: 1.55;
    color: #bcc4ffcc;
    text-align: center;
    min-height: 64px;
    user-select: none;
    filter: drop-shadow(0 0 4px #20294a99);
  }

  /* Jump Arrow & Search Indicators with SVG */
  svg#arrows {
    position: absolute;
    top: 98px;
    left: 50%;
    width: 860px;
    height: 100px;
    transform: translateX(-50%);
    pointer-events: none;
    overflow: visible;
  }
  .arrow-path {
    fill: none;
    stroke: #77a6ffcc;
    stroke-width: 5;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.7;
    filter: drop-shadow(0 0 4px #71a1ffb3);
    transition: stroke 0.6s ease;
  }
  .arrow-head {
    fill: #77a6ffcc;
    filter: drop-shadow(0 0 3px #72a7ffcc);
    opacity: 0.7;
    transition: fill 0.6s ease;
  }
  .arrow-highlight {
    stroke: #f5bb52ff !important;
    opacity: 1 !important;
  }
  .arrow-head-highlight {
    fill: #f5bb52ff !important;
    opacity: 1 !important;
  }

  /* Smooth appear */
  .fade-in {
    opacity: 1 !important;
    transition: opacity 1s ease;
  }

</style>
</head>
<body>
  <div id="container" role="main" aria-label="Jump Search Algorithm visualization">
    <h1>Jump Search</h1>
    <h2>Understanding Search with Elegant Visuals</h2>

    <div id="array" aria-live="polite" aria-atomic="true"></div>

    <svg id="arrows" aria-hidden="true" ></svg>

    <div id="explanation" aria-live="polite"></div>

    <div id="controls" aria-label="Simulation controls">
      <button id="startBtn" type="button" aria-pressed="false" aria-label="Start Jump Search simulation">Start</button>
      <button id="resetBtn" type="button" aria-label="Reset visualization" disabled>Reset</button>
    </div>
  </div>

<script>
(() => {
  const arrSize = 20;
  const sortedArray = [];
  for(let i=1; i<=arrSize; i++) {
    sortedArray.push(i * 5);
  }
  const target = 73;  // Chosen target, not in the array (or could be). Let's put target=73 (between 65 and 75)

  const arrayContainer = document.getElementById('array');
  const explanation = document.getElementById('explanation');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const arrowsSVG = document.getElementById('arrows');

  // Calculate optimal jump size for jump search: usually sqrt(n)
  const jumpSize = Math.floor(Math.sqrt(arrSize));

  // Create the blocks with labels for indexes
  function createBlocks() {
    arrayContainer.innerHTML = '';
    for(let i=0; i<arrSize; i++) {
      const b = document.createElement('div');
      b.classList.add('block');
      b.id = `block-${i}`;
      b.textContent = sortedArray[i];
      // Label with index below
      const label = document.createElement('div');
      label.classList.add('label');
      label.textContent = i;
      b.appendChild(label);
      arrayContainer.appendChild(b);
    }
  }

  // Draw arrows under the blocks for jump steps using SVG paths/arrows
  // We'll draw arrows jumping from block 0 to block jumpSize, to 2*jumpSize, ... and final partial jump to arrSize-1
  function drawJumpArrows() {
    arrowsSVG.innerHTML = '';
    const blocks = Array.from(document.querySelectorAll('.block'));
    if(blocks.length === 0) return;

    const startY = 8;
    const arrowHeadSize = 12;
    const strokeWidth = 5;

    const coords = blocks.map(b => {
      const rect = b.getBoundingClientRect();
      const containerRect = arrayContainer.getBoundingClientRect();
      // Relative to svg container
      return {
        x: rect.left - containerRect.left + rect.width/2,
        y: startY
      };
    });

    // Helper to create arrow path from startIdx to endIdx
    function createArrowPath(startIdx, endIdx, id) {
      const startX = coords[startIdx].x;
      const endX = coords[endIdx].x;
      const midX = (startX + endX)/2;
      const ampY = 40; // vertical amplitude

      // Path animates a smooth curving arc under the blocks
      // Start horizontal line down, arc, then horizontal line back up to arrowhead.
      // For simplicity an arch using cubic bezier

      // Points:
      // M startX, startY
      // C startX, startY+ampY, endX, startY+ampY, endX, startY

      return `
        <path id="${id}" class="arrow-path" d="
          M ${startX} ${startY}
          C ${startX} ${startY + ampY}, ${endX} ${startY + ampY}, ${endX} ${startY}
        " />
        <polygon class="arrow-head" points="
          ${endX - arrowHeadSize/2} ${startY - arrowHeadSize/3},
          ${endX} ${startY},
          ${endX - arrowHeadSize/2} ${startY + arrowHeadSize/3}
        " />
      `;
    }

    // Draw arrows for jumps
    for(let i=0; i<Math.ceil(arrSize/jumpSize)-1; i++) {
      const startIdx = i*jumpSize;
      const endIdx = Math.min((i+1)*jumpSize, arrSize-1);
      arrowsSVG.insertAdjacentHTML('beforeend', createArrowPath(startIdx,endIdx,`arrow-${i}`));
    }
  }

  // Reset states
  function reset() {
    // Clear highlights and roles
    for(let i=0; i<arrSize; i++) {
      const b = document.getElementById(`block-${i}`);
      b.classList.remove('jumped','checked','found');
    }
    arrowsSVG.querySelectorAll('.arrow-path,.arrow-head').forEach(el=>{
      el.classList.remove('arrow-highlight','arrow-head-highlight');
    });
    explanation.textContent = 'Click Start to see how Jump Search finds the target value with elegant leaps and steps.';
    startBtn.disabled = false;
    resetBtn.disabled = true;
    startBtn.setAttribute('aria-pressed','false');
  }

  // Animate jump search steps 
  // Limited interactivity per request: just this simple sequence play

  function jumpSearch() {
    startBtn.disabled = true;
    resetBtn.disabled = false;
    startBtn.setAttribute('aria-pressed','true');

    let currentJump = 0;
    let lastJumpIdx = -1;
    let interval = null;
    let foundIdx = -1;

    const blocks = [];
    for(let i=0; i<arrSize; i++) {
      blocks.push(document.getElementById(`block-${i}`));
    }

    // Highlight jump block and arrow, explain jump stage
    function highlightJump(i) {
      if(lastJumpIdx>=0) {
        blocks[lastJumpIdx].classList.remove('jumped');
        const prevArrowPath = arrowsSVG.querySelector(`#arrow-${lastJumpIdx} .arrow-path`);
        const prevArrowHead = arrowsSVG.querySelector(`#arrow-${lastJumpIdx} .arrow-head`);
        if(prevArrowPath) prevArrowPath.classList.remove('arrow-highlight');
        if(prevArrowHead) prevArrowHead.classList.remove('arrow-head-highlight');
      }
      const jumpIdx = i * jumpSize;
      if(jumpIdx>=arrSize) return false;
      blocks[jumpIdx].classList.add('jumped');
      const arrowPath = arrowsSVG.querySelector(`#arrow-${i} .arrow-path`);
      const arrowHead = arrowsSVG.querySelector(`#arrow-${i} .arrow-head`);
      if(arrowPath) arrowPath.classList.add('arrow-highlight');
      if(arrowHead) arrowHead.classList.add('arrow-head-highlight');
      explanation.textContent = `Jumping to index ${jumpIdx} (value: ${blocks[jumpIdx].textContent}) to check if target (${target}) might be here or beyond.`;
      lastJumpIdx = jumpIdx;
      return jumpIdx;
    }

    // When jump search determines the block to linear search inside
    // We highlight the range and then search linearly

    // Find block where target is <= block value or end
    function findBlockForLinearSearch() {
      let block = 0;
      while(block + jumpSize < arrSize && sortedArray[block + jumpSize -1] < target) {
        block += jumpSize;
      }
      return block;
    }

    // Linear search inside block ranges
    function linearSearchInBlock(fromIdx, toIdx, step=0) {
      if(step > (toIdx-fromIdx)) {
        explanation.textContent = `Target (${target}) is not in the array. Completed linear search without a match.`;
        startBtn.disabled = true;
        resetBtn.disabled = false;
        return;
      }
      // Highlight checked block
      if(step>0) {
        blocks[fromIdx+step-1].classList.remove('checked');
      }
      const idx = fromIdx + step;
      blocks[idx].classList.add('checked');
      explanation.textContent = `Checking index ${idx} (value: ${blocks[idx].textContent}) linearly for target ${target}.`;

      // If found
      if(sortedArray[idx] === target) {
        blocks[idx].classList.remove('checked');
        blocks[idx].classList.add('found');
        explanation.textContent = `Target found at index ${idx} with value ${target}! Search complete.`;
        startBtn.disabled = true;
        resetBtn.disabled = false;
        return;
      }
      // If value exceed target, no found
      if(sortedArray[idx] > target) {
        explanation.textContent = `Value at index ${idx} exceeds target (${target}). Target not found; search ends.`;
        startBtn.disabled = true;
        resetBtn.disabled = false;
        return;
      }

      // Continue next check after delay
      setTimeout(() => {
        linearSearchInBlock(fromIdx,toIdx,step+1);
      }, 1100);
    }

    // Animate jump steps sequentially with delay
    // Prepare jump indices to check
    const jumpIndices = [];
    for(let i=0; i <= Math.ceil(arrSize/jumpSize)-1; i++) {
      let jumpIdx = Math.min(i*jumpSize, arrSize-1);
      if(jumpIdx>=arrSize) break;
      jumpIndices.push(jumpIdx);
    }

    let i=0;
    function jumpStep() {
      if(i>=jumpIndices.length) {
        // Linear search phase start
        explanation.textContent = 'Determine linear search block and proceed.';
        const startBlock = findBlockForLinearSearch();
        const endBlock = Math.min(startBlock + jumpSize - 1, arrSize-1);
        explanation.textContent = `Linear search between indices ${startBlock} to ${endBlock}.`;
        // Highlight jump block last highlight off
        blocks[lastJumpIdx].classList.remove('jumped');
        arrowsSVG.querySelectorAll('.arrow-path,.arrow-head').forEach(el=>{
          el.classList.remove('arrow-highlight','arrow-head-highlight');
        });
        linearSearchInBlock(startBlock, endBlock);
        return;
      }
      const jumpIdx = jumpIndices[i];
      blocks.forEach(b=>b.classList.remove('jumped'));
      blocks[jumpIdx].classList.add('jumped');
      // Highlight arrow for this jump
      arrowsSVG.querySelectorAll('.arrow-path,.arrow-head').forEach(el=>{
        el.classList.remove('arrow-highlight','arrow-head-highlight');
      });
      if(i>0) {
        const prevArrowPath = arrowsSVG.querySelector(`#arrow-${i-1} .arrow-path`);
        const prevArrowHead = arrowsSVG.querySelector(`#arrow-${i-1} .arrow-head`);
        if(prevArrowPath) prevArrowPath.classList.remove('arrow-highlight');
        if(prevArrowHead) prevArrowHead.classList.remove('arrow-head-highlight');
      }
      if(i < jumpIndices.length - 1) {
        const arrowPath = arrowsSVG.querySelector(`#arrow-${i} .arrow-path`);
        const arrowHead = arrowsSVG.querySelector(`#arrow-${i} .arrow-head`);
        if(arrowPath) arrowPath.classList.add('arrow-highlight');
        if(arrowHead) arrowHead.classList.add('arrow-head-highlight');
      }
      explanation.textContent = `Jumping to index ${jumpIdx} (value: ${sortedArray[jumpIdx]}) to check against target (${target}).`;
      // Check if target <= current block value - then jump here is boundary
      if(sortedArray[jumpIdx] >= target) {
        explanation.textContent = `Target (${target}) is within this block or before index ${jumpIdx}. Proceeding to linear search.`;
        setTimeout(() => {
          const startBlock = Math.max(0, jumpIdx - jumpSize + 1);
          const endBlock = jumpIdx;
          // Remove jump highlights
          blocks.forEach(b=>b.classList.remove('jumped'));
          arrowsSVG.querySelectorAll('.arrow-path,.arrow-head').forEach(el=>{
            el.classList.remove('arrow-highlight','arrow-head-highlight');
          });
          explanation.textContent = `Linear search from index ${startBlock} to ${endBlock}.`;
          linearSearchInBlock(startBlock, endBlock);
        }, 1300);
        return;
      }
      // Else continue jumps
      i++;
      setTimeout(jumpStep,1300);
    }

    jumpStep();
  }

  // Initialization
  createBlocks();
  explanation.textContent = 'Click Start to see how Jump Search finds the target value with elegant leaps and steps.';
  drawJumpArrows();

  startBtn.addEventListener('click', () => {
    jumpSearch();
  });
  resetBtn.addEventListener('click', () => {
    reset();
  });
  window.addEventListener('resize', () => {
    drawJumpArrows();
  });

  // Initial reset call to set state properly
  reset();

})();
</script>

</body>
</html>
