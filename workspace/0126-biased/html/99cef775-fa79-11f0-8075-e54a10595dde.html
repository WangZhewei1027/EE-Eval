<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depth-First Search (DFS) Visualizer</title>
    <style>
        #output {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Depth-First Search (DFS) Visualizer</h1>
    <label for="startNode">Start Node (0-based index):</label>
    <input type="number" id="startNode" value="0" min="0">
    
    <label for="graph">Graph (Comma-separated values):</label>
    <input type="text" id="graph" value="0,1,0,0,0,2,1,3,0,4,0,0">
    
    <button id="runDFS">Run DFS</button>
    <button id="reset">Reset</button>
    
    <h2>Output:</h2>
    <div id="output"></div>

    <script>
        let adjacencyList = [];

        document.getElementById("runDFS").onclick = function() {
            const startNode = parseInt(document.getElementById("startNode").value);
            const graphInput = document.getElementById("graph").value.split(",").map(Number);
            buildGraph(graphInput);
            const visited = new Set();
            const result = [];
            dfs(startNode, visited, result);
            document.getElementById("output").innerText = "DFS Order: " + result.join(", ");
        };

        document.getElementById("reset").onclick = function() {
            document.getElementById("startNode").value = "0";
            document.getElementById("graph").value = "0,1,0,0,0,2,1,3,0,4,0,0";
            document.getElementById("output").innerText = "";
            adjacencyList = [];
        };

        function buildGraph(graphInput) {
            adjacencyList = [];
            for (let i = 0; i < graphInput.length; i += 2) {
                let node = graphInput[i];
                adjacencyList[node] = adjacencyList[node] || [];
                if (i + 1 < graphInput.length) {
                    adjacencyList[node].push(graphInput[i + 1]);
                }
            }
        }

        function dfs(node, visited, result) {
            visited.add(node);
            result.push(node);
            if (adjacencyList[node]) {
                for (const neighbor of adjacencyList[node]) {
                    if (!visited.has(neighbor)) {
                        dfs(neighbor, visited, result);
                    }
                }
            }
        }
    </script>
</body>
</html>
