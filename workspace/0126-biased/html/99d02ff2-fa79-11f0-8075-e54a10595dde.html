<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Tree Index Demo</title>
    <style>
        body { font-family: monospace; }
    </style>
</head>
<body>
    <h1>B-Tree Index Demo</h1>
    <div>
        <label for="order">B-Tree Order (Max Children): </label>
        <input type="number" id="order" value="3" min="2">
        <button id="createTree">Create B-Tree</button>
    </div>
    <div>
        <h2>Tree Structure</h2>
        <pre id="treeStructure"></pre>
    </div>
    <div>
        <h2>Insert Value</h2>
        <input type="number" id="insertValue">
        <button id="insertBtn">Insert</button>
    </div>
    <div>
        <h2>Search Value</h2>
        <input type="number" id="searchValue">
        <button id="searchBtn">Search</button>
        <p id="searchResult"></p>
    </div>
    <div>
        <h2>Delete Value</h2>
        <input type="number" id="deleteValue">
        <button id="deleteBtn">Delete</button>
    </div>
    
    <script>
        class BTreeNode {
            constructor(order, leaf = true) {
                this.order = order;
                this.leaf = leaf;
                this.keys = [];
                this.children = [];
            }
    
            insertNonFull(key) {
                let i = this.keys.length - 1;
                if (this.leaf) {
                    while (i >= 0 && key < this.keys[i]) {
                        i--;
                    }
                    this.keys.splice(i + 1, 0, key);
                } else {
                    while (i >= 0 && key < this.keys[i]) {
                        i--;
                    }
                    i++;
                    if (this.children[i].keys.length === this.order - 1) {
                        this.splitChild(i);
                        if (key > this.keys[i]) {
                            i++;
                        }
                    }
                    this.children[i].insertNonFull(key);
                }
            }
    
            splitChild(i) {
                const newNode = new BTreeNode(this.order, this.children[i].leaf);
                const midKey = this.children[i].keys[this.order / 2 - 1];
                newNode.keys = this.children[i].keys.slice(this.order / 2);
                this.children[i].keys = this.children[i].keys.slice(0, this.order / 2 - 1);
                if (!this.children[i].leaf) {
                    newNode.children = this.children[i].children.slice(this.order / 2);
                    this.children[i].children = this.children[i].children.slice(0, this.order / 2);
                }
                this.keys.splice(i, 0, midKey);
                this.children.splice(i + 1, 0, newNode);
            }
        }
    
        class BTree {
            constructor(order) {
                this.root = new BTreeNode(order);
                this.order = order;
            }
    
            insert(key) {
                if (this.root.keys.length === this.order - 1) {
                    const newRoot = new BTreeNode(this.order, false);
                    newRoot.children.push(this.root);
                    newRoot.splitChild(0);
                    newRoot.insertNonFull(key);
                    this.root = newRoot;
                } else {
                    this.root.insertNonFull(key);
                }
            }
    
            search(key, node = this.root) {
                let i = 0;
                while (i < node.keys.length && key > node.keys[i]) {
                    i++;
                }
                if (i < node.keys.length && key === node.keys[i]) {
                    return true;
                }
                if (node.leaf) {
                    return false;
                }
                return this.search(key, node.children[i]);
            }
    
            delete(key) {
                // Deletion is complex; can be implemented if required.
                // Here, we retain keys but do not delete for simplicity.
            }
    
            toString(node = this.root) {
                let result = "";
                for (let i = 0; i < node.keys.length; i++) {
                    if (!node.leaf) {
                        result += this.toString(node.children[i]);
                    }
                    result += node.keys[i] + " ";
                }
                if (!node.leaf) {
                    result += this.toString(node.children[node.keys.length]);
                }
                return result;
            }
        }
    
        let btree;
    
        document.getElementById('createTree').onclick = function() {
            const order = parseInt(document.getElementById('order').value);
            btree = new BTree(order);
            document.getElementById('treeStructure').textContent = "B-Tree Created with Order: " + order;
        };
    
        document.getElementById('insertBtn').onclick = function() {
            const key = parseInt(document.getElementById('insertValue').value);
            btree.insert(key);
            document.getElementById('treeStructure').textContent = btree.toString();
            document.getElementById('insertValue').value = '';
        };
    
        document.getElementById('searchBtn').onclick = function() {
            const key = parseInt(document.getElementById('searchValue').value);
            const found = btree.search(key);
            document.getElementById('searchResult').textContent = found ? "Value Found" : "Value Not Found";
            document.getElementById('searchValue').value = '';
        };
    
        document.getElementById('deleteBtn').onclick = function() {
            const key = parseInt(document.getElementById('deleteValue').value);
            btree.delete(key);
            document.getElementById('treeStructure').textContent = btree.toString();
            document.getElementById('deleteValue').value = '';
        };
    </script>
</body>
</html>
