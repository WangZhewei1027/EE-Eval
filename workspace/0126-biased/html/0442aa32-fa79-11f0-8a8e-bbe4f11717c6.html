<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellman-Ford Algorithm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button {
            width: 200px;
            height: 50px;
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #3e8e41;
        }
        .graph {
            width: 100%;
            height: 500px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bellman-Ford Algorithm</h1>
        <p>Find the shortest path from a source to all other nodes in a graph.</p>
        <button id="start-button">Start</button>
        <button id="stop-button" disabled>Stop</button>
        <div class="graph"></div>
    </div>

    <script>
        let graph = {
            'source': {
                'nodes': ['A', 'B', 'C', 'D', 'E'],
                'edges': [
                    ['A', 'B', 1],
                    ['A', 'C', 4],
                    ['B', 'C', 2],
                    ['B', 'D', 5],
                    ['C', 'D', 1],
                    ['C', 'E', 3],
                    ['D', 'E', 4]
                ]
            },
            'distances': {
                'A': 0,
                'B': 1,
                'C': 4,
                'D': 5,
                'E': 7
            }
        };

        let queue = ['A'];
        let distances = { 'A': 0 };

        while (queue.length > 0) {
            let currentVertex = queue.shift();
            for (let neighbor in graph[currentVertex]['edges']) {
                let distance = graph[currentVertex]['edges'][neighbor][0] + graph[currentVertex]['edges'][neighbor][1];
                if (distances[neighbor] === undefined || distances[neighbor] > distance) {
                    distances[neighbor] = distance;
                    queue.push(neighbor);
                }
            }
        }

        let result = '';
        for (let vertex in distances) {
            result += `Vertex: ${vertex}, Distance: ${distances[vertex]}\n`;
        }
        document.getElementById('result').innerHTML = result;
    </script>
</body>
</html>
