<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Binary Search Tree (BST) Visualization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

  /* Reset and base */
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  h1 {
    margin: 1.2rem 0 .3rem 0;
    font-weight: 700;
    font-size: 2.8rem;
    letter-spacing: 0.12em;
    color: #f4d35e;
    text-shadow:
      0 0 8px #f4d35e,
      0 0 20px #f4d35e88;
  }

  h2 {
    font-weight: 500;
    color: #abedd8;
    letter-spacing: 0.07em;
    margin: 0 0 1.8rem 0;
    font-size: 1.2rem;
  }

  .container {
    position: relative;
    width: 100%;
    max-width: 960px;
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding-bottom: 3rem;
  }

  svg {
    width: 100%;
    height: 100%;
    max-height: 600px;
    overflow: visible;
  }

  /* Node styles */
  .node {
    cursor: default;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25));
  }
  .node circle {
    fill: linear-gradient(135deg, #f4d35e, #ee964b);
    fill: #f4d35e;
    filter:
      drop-shadow(0 0 6px #f4d35e99);
    transition: fill 0.3s ease;
  }
  .node text {
    font-weight: 700;
    fill: #1a1a2e;
    font-size: 1.2rem;
    user-select: none;
    dominant-baseline: middle;
    text-anchor: middle;
    pointer-events: none;
    font-family: 'Montserrat', sans-serif;
  }

  /* Connectors */
  .link {
    fill: none;
    stroke: #5fb4a9;
    stroke-width: 3;
    stroke-linecap: round;
    filter: drop-shadow(0 1px 3px #5fb4a933);
    transition: stroke 0.3s ease;
  }

  /* Buttons Panel */
  .controls {
    position: absolute;
    bottom: 1.5rem;
    display: flex;
    gap: 1rem;
    user-select: none;
  }
  button {
    background: #16213e;
    border: 2.5px solid #f4d35e;
    color: #f4d35e;
    font-weight: 700;
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 0.07em;
    padding: 0.6em 1.6em;
    border-radius: 30px;
    cursor: pointer;
    box-shadow:
      0 0 10px #f4d35e77;
    transition:
      background-color 0.35s ease,
      color 0.35s ease,
      box-shadow 0.5s ease;
  }
  button:hover,
  button:focus {
    background-color: #f4d35e;
    color: #16213e;
    outline: none;
    box-shadow:
      0 0 18px #f4d35eff,
      0 0 30px #f4d35eff;
  }

  /* Tooltip for nodes */
  .tooltip {
    position: absolute;
    background: #16213edd;
    color: #f4d35e;
    padding: 6px 12px;
    font-weight: 600;
    border-radius: 12px;
    pointer-events: none;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    opacity: 0;
    transform: translate(-50%, -140%);
    transition: opacity 0.3s ease;
    white-space: nowrap;
    user-select: none;
  }
  .tooltip.visible {
    opacity: 1;
  }
</style>
</head>
<body>
  <h1>BINARY SEARCH TREE</h1>
  <h2>Aesthetic & Elegant Visualization</h2>

  <div class="container">
    <svg id="bst-svg" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" aria-label="Binary Search Tree Visualization" role="img" />
  </div>
  <div class="controls" aria-label="Tree controls">
    <button id="buttonInsert" aria-pressed="false" title="Insert next node">Insert Node</button>
    <button id="buttonReset" title="Reset tree">Reset</button>
  </div>

  <div id="tooltip" class="tooltip" role="tooltip" aria-hidden="true"></div>

<script>
  /**
   * Binary Search Tree visualization with progressive insertion animations
   * Minimal interaction: Insert Node button and Reset button
   * Nodes appear smoothly with elastic scale and connectors stroke-drawn
   * Visual approach: nodes arranged in balanced fashion for clarity and beauty
   */

  // Tree node class for data and position
  class BSTNode {
    constructor(value) {
      this.value = value;
      this.left = null;
      this.right = null;
      this.parent = null;
      // position for rendering
      this.x = 0;
      this.y = 0;
      this.depth = 0;
    }
  }

  // Main BST class handles insertion and layout
  class BSTree {
    constructor(svg) {
      this.svg = svg;
      this.root = null;
      this.nodes = [];
      this.links = [];
      this.animationDuration = 900;
      this.insertedValues = [];
    }

    insert(value) {
      let newNode = new BSTNode(value);
      if (!this.root) {
        this.root = newNode;
        this.nodes.push(newNode);
        this.computePositions();
        this.redraw();
        return newNode;
      }

      let current = this.root;
      while (true) {
        if (value === current.value) {
          // no duplicates - skip insertion
          return null;
        }
        if (value < current.value) {
          if (!current.left) {
            current.left = newNode;
            newNode.parent = current;
            this.nodes.push(newNode);
            break;
          } else {
            current = current.left;
          }
        } else {
          if (!current.right) {
            current.right = newNode;
            newNode.parent = current;
            this.nodes.push(newNode);
            break;
          } else {
            current = current.right;
          }
        }
      }
      this.computePositions();
      this.redraw();
      return newNode;
    }

    clear() {
      this.root = null;
      this.nodes = [];
      this.links = [];
      this.svg.innerHTML = '';
    }

    computePositions() {
      // Assign depth for each node and clear position
      this._setDepths(this.root, 0);

      // Calculate horizontal positions with inorder traversal
      let xPos = 0;
      function inorderPositions(node) {
        if (!node) return;
        inorderPositions(node.left);
        node.x = xPos++;
        inorderPositions(node.right);
      }
      xPos = 0;
      inorderPositions(this.root);

      // Normalize x and y for the SVG viewport
      // X scale: space nodes by about 80 px horizontally (minimum)
      // Y scale: 100 px per depth level with top margin

      const horizontalSpacing = 80;
      const verticalSpacing = 100;
      const marginX = 60;
      const marginY = 80;

      this.nodes.forEach(n => {
        n.cx = marginX + n.x * horizontalSpacing;
        n.cy = marginY + n.depth * verticalSpacing;
      });

      // Prepare links from parent to children
      this.links = [];
      this.nodes.forEach(n => {
        if (n.left) this.links.push({ from: n, to: n.left });
        if (n.right) this.links.push({ from: n, to: n.right });
      });
    }

    _setDepths(node, depth) {
      if (!node) return;
      node.depth = depth;
      this._setDepths(node.left, depth + 1);
      this._setDepths(node.right, depth + 1);
    }

    redraw() {
      // Clear existing svg
      this.svg.innerHTML = '';

      // Draw links first
      this.links.forEach(({ from, to }) => {
        let path = createLinkPath(from.cx, from.cy, to.cx, to.cy);
        path.classList.add('link');
        this.svg.appendChild(path);
        strokeDrawAnimation(path);
      });

      // Draw nodes
      this.nodes.forEach(node => {
        let g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.classList.add('node');
        g.style.transformOrigin = `${node.cx}px ${node.cy}px`;
        g.setAttribute('data-value', node.value);
        g.setAttribute('tabindex', '-1');

        let circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', node.cx);
        circle.setAttribute('cy', node.cy);
        circle.setAttribute('r', 24);
        g.appendChild(circle);

        let text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', node.cx);
        text.setAttribute('y', node.cy);
        text.textContent = node.value;
        g.appendChild(text);

        // Animate node with elastic scale and fade in from 0
        g.style.opacity = '0';
        g.style.transform = 'scale(0)';

        this.svg.appendChild(g);

        setTimeout(() => {
          g.style.transition = 'transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55), opacity 0.6s ease-out';
          g.style.opacity = '1';
          g.style.transform = 'scale(1)';
        }, 50);
      });
    }
  }

  // Helper: creates a smooth curved path between two points for BST connector
  function createLinkPath(x1, y1, x2, y2) {
    // Use a cubic Bezier curve that bends downward
    let deltaX = (x2 - x1) / 2;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    let d = `M${x1},${y1} C${x1},${y1 + deltaX} ${x2},${y2 - deltaX} ${x2},${y2}`;
    path.setAttribute('d', d);
    return path;
  }

  // Animate stroke-dashoffset on path for drawing effect
  function strokeDrawAnimation(path) {
    const length = path.getTotalLength();
    path.style.strokeDasharray = length;
    path.style.strokeDashoffset = length;
    path.getBoundingClientRect(); // trigger layout
    path.style.transition = 'stroke-dashoffset 0.8s ease-out';
    path.style.strokeDashoffset = '0';
  }

  // Set up base tree and controls
  const svg = document.getElementById('bst-svg');
  const bst = new BSTree(svg);

  // Data sequence for insertion, balanced-ish for visual harmony
  const insertionSequence = [50, 30, 70, 20, 40, 60, 80, 10, 25, 35, 45, 55, 65, 75, 85];

  let insertionIndex = 0;

  // Insert next node, with small delay for smooth viewing
  function insertNextNode() {
    if (insertionIndex >= insertionSequence.length) {
      buttonInsert.disabled = true;
      buttonInsert.setAttribute('aria-pressed', 'true');
      return;
    }
    let val = insertionSequence[insertionIndex++];
    let inserted = bst.insert(val);
    if (!inserted) insertNextNode(); // skip duplicates (shouldn't happen here)
  }

  // Reset entire tree
  function resetTree() {
    insertionIndex = 0;
    bst.clear();
    buttonInsert.disabled = false;
    buttonInsert.setAttribute('aria-pressed', 'false');
  }

  let buttonInsert = document.getElementById('buttonInsert');
  let buttonReset = document.getElementById('buttonReset');

  buttonInsert.addEventListener('click', () => {
    insertNextNode();
  });

  buttonReset.addEventListener('click', () => {
    resetTree();
  });

  // Optional tooltip for node values on hover (a subtle aesthetic touch)
  const tooltip = document.getElementById('tooltip');

  svg.addEventListener('mousemove', e => {
    // Find closest node under cursor
    let target = e.target;
    if (target.tagName === 'circle' || target.tagName === 'text') {
      let g = target.parentNode;
      if (g && g.classList.contains('node')) {
        const value = g.getAttribute('data-value');
        let pt = svg.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        let cursor = pt;

        tooltip.textContent = `Value: ${value}`;
        tooltip.style.left = `${e.pageX}px`;
        tooltip.style.top = `${e.pageY}px`;
        tooltip.classList.add('visible');
        tooltip.setAttribute('aria-hidden', 'false');
        return;
      }
    }
    tooltip.classList.remove('visible');
    tooltip.setAttribute('aria-hidden', 'true');
  });

  svg.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
    tooltip.setAttribute('aria-hidden', 'true');
  });

  // Initial prompt message in SVG
  const promptText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  promptText.setAttribute('x', '50%');
  promptText.setAttribute('y', '50%');
  promptText.setAttribute('text-anchor', 'middle');
  promptText.setAttribute('dominant-baseline', 'middle');
  promptText.setAttribute('fill', '#5fb4a9cc');
  promptText.setAttribute('font-size', '1.4rem');
  promptText.setAttribute('font-weight', '600');
  promptText.style.userSelect = 'none';
  promptText.style.fontFamily = "'Montserrat', sans-serif";
  promptText.style.letterSpacing = '0.15em';
  promptText.textContent = 'Click "Insert Node" to build the BST';
  svg.appendChild(promptText);
</script>
</body>
</html>
