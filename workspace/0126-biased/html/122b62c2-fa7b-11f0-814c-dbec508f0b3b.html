<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph (Undirected)</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
        }
        #graph-container {
            width: 800px;
            height: 600px;
            border: 1px solid black;
            padding: 10px;
            margin: 20px auto;
        }
        #graph {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div id="graph-container"></div>
    <script>
        let graph = {
            nodes: [],
            edges: [],
            selectedNode: null,
            currentNode: null,
            clickHandler: function(node) {
                if (node === this.selectedNode) return;
                this.selectedNode = node;
                this.updateGraph();
            },
            updateGraph: function() {
                const graphElement = document.getElementById('graph');
                graphElement.innerHTML = '';
                graph.nodes.forEach(node => {
                    const nodeElement = document.createElement('div');
                    nodeElement.classList.add('node');
                    nodeElement.textContent = node.name;
                    graphElement.appendChild(nodeElement);
                });
                graph.edges.forEach(edge => {
                    const edgeElement = document.createElement('div');
                    edgeElement.classList.add('edge');
                    edgeElement.textContent = edge.description;
                    graphElement.appendChild(edgeElement);
                });
            },
            addNode: function(name) {
                this.nodes.push({ name, color: 'black' });
                this.updateGraph();
            },
            addEdge: function(description) {
                this.edges.push({ description, color: 'black' });
                this.updateGraph();
            },
            removeNode: function(node) {
                this.nodes = this.nodes.filter(n => n !== node);
                this.updateGraph();
            },
            removeEdge: function(edge) {
                this.edges = this.edges.filter(e => e !== edge);
                this.updateGraph();
            },
            selectNode: function(node) {
                this.selectedNode = node;
                this.updateGraph();
            },
            deselectNode: function() {
                this.selectedNode = null;
                this.updateGraph();
            },
            toggleNode: function(node) {
                if (node.color === 'black') {
                    node.color = 'white';
                } else {
                    node.color = 'black';
                }
                this.updateGraph();
            },
            toggleEdge: function(edge) {
                if (edge.color === 'black') {
                    edge.color = 'white';
                } else {
                    edge.color = 'black';
                }
                this.updateGraph();
            }
        };

        const graphElement = document.getElementById('graph');
        graphElement.style.position = 'relative';
        graphElement.style.width = '800px';
        graphElement.style.height = '600px';
        graphElement.style.border = '1px solid black';
        graphElement.style.padding = '10px';

        const nodeInput = document.getElementById('node-input');
        const edgeInput = document.getElementById('edge-input');
        const nodeColorSelect = document.getElementById('node-color-select');
        const edgeDescriptionInput = document.getElementById('edge-description-input');

        nodeInput.oninput = function() {
            graph.addNode(this.value);
        };

        edgeInput.oninput = function() {
            graph.addEdge(this.value);
        };

        nodeColorSelect.onchange = function() {
            graph.toggleNode(graph.nodes.find(node => node.name === this.value));
        };

        edgeDescriptionInput.oninput = function() {
            graph.toggleEdge(this.value);
        };

        graphElement.addEventListener('click', function(event) {
            if (event.target.classList.contains('node')) {
                graph.selectNode(event.target);
            } else if (event.target.classList.contains('edge')) {
                graph.toggleEdge(event.target);
            }
        });

        graph.nodes.forEach(function(node) {
            const nodeElement = document.createElement('div');
            nodeElement.classList.add('node');
            nodeElement.textContent = node.name;
            graphElement.appendChild(nodeElement);
        });
        graph.edges.forEach(function(edge) {
            const edgeElement = document.createElement('div');
            edgeElement.classList.add('edge');
            edgeElement.textContent = edge.description;
            graphElement.appendChild(edgeElement);
        });
    </script>
</body>
</html>
