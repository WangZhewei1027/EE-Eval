<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursion Visualizer</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom right, #1a2a6c, #b21f1f, #fdbb2d);
            color: white;
        }
        
        .container {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: relative;
            text-align: center;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 0.5em;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }
        
        p {
            font-size: 1.2em;
            margin-bottom: 1.5em;
        }
        
        #visualization {
            position: relative;
            width: 400px;
            height: 400px;
            border: 5px solid rgba(255, 255, 255, 0.6);
            border-radius: 15px;
            overflow: hidden;
        }
        
        .circle {
            position: absolute;
            border: 5px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: fade-in 2s ease-in;
        }
        
        @keyframes fade-in {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
        
        button {
            background-color: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-size: 1em;
        }
        
        button:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }
        
    </style>
</head>
<body>
    <div class="container">
        <h1>Recursion Visualizer</h1>
        <p>Observe the beauty of recursion through this animated visualization.</p>
        <div id="visualization"></div>
        <button onclick="startRecursion()">Start Visualization</button>
    </div>

    <script>
        let depth = 0;

        function drawCircle(x, y, radius) {
            const circle = document.createElement('div');
            circle.className = 'circle';
            circle.style.width = circle.style.height = (radius * 2) + 'px';
            circle.style.left = (x - radius) + 'px';
            circle.style.top = (y - radius) + 'px';
            document.getElementById('visualization').appendChild(circle);
        }

        function recursion(x, y, radius) {
            if (radius < 5) return;
            drawCircle(x, y, radius);
            const newRadius = radius * 0.5;
            recursion(x + newRadius, y, newRadius); // Right
            recursion(x - newRadius, y, newRadius); // Left
            recursion(x, y + newRadius, newRadius); // Down
            recursion(x, y - newRadius, newRadius); // Up
        }

        function startRecursion() {
            depth++;
            const startRadius = 100;
            document.getElementById('visualization').innerHTML = '';
            recursion(200, 200, startRadius);
        }
    </script>
</body>
</html>
