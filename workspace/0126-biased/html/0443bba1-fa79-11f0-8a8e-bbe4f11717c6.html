<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Memory</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        
        .header h1 {
            margin: 0;
        }
        
        .header p {
            margin: 0;
        }
        
        .footer {
            background-color: #f0f0f0;
            padding: 10px;
            border-top: 1px solid #ddd;
            text-align: center;
        }
        
        .footer p {
            margin: 0;
        }
        
        .section {
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .section h2 {
            margin: 0;
        }
        
        .section p {
            margin: 0;
        }
        
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .button:hover {
            background-color: #3e8e41;
        }
        
        .icon {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Virtual Memory</h1>
            <p>Explore the limits of memory with our interactive demo.</p>
        </div>
        <div class="section">
            <h2>Memory Usage</h2>
            <p>Click to simulate a memory allocation event.</p>
            <button class="button" onclick="simulateMemoryAllocation()">Allocate Memory</button>
        </div>
        <div class="section">
            <h2>Memory De-allocation</h2>
            <p>Click to simulate a memory deallocation event.</p>
            <button class="button" onclick="simulateMemoryDeallocation()">Deallocate Memory</button>
        </div>
        <div class="footer">
            <p>&copy; 2023 Virtual Memory Demo</p>
        </div>
    </div>

    <script>
        function simulateMemoryAllocation() {
            // Simulate memory allocation
            console.log('Memory allocated!');
        }

        function simulateMemoryDeallocation() {
            // Simulate memory deallocation
            console.log('Memory deallocated!');
        }
    </script>
</body>
</html>
