<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Regression Interactive Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #dataPoints {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Linear Regression Interactive Demo</h1>

    <div id="dataPoints">
        <h2>Data Points</h2>
        <label for="numPoints">Number of Points:</label>
        <input type="number" id="numPoints" value="5" min="2" max="20"><br><br>
        <button id="generatePoints">Generate Points</button>
        <button id="clearPoints">Clear Points</button>
    </div>

    <div id="pointControls">
        <h2>Point Controls</h2>
        <label for="xValue">X Value:</label>
        <input type="number" id="xValue"><br>
        <label for="yValue">Y Value:</label>
        <input type="number" id="yValue"><br>
        <button id="addPoint">Add Point</button>
        <button id="removePoint">Remove Last Point</button>
    </div>

    <div id="regressionControls">
        <h2>Regression Controls</h2>
        <button id="calculateRegression">Calculate Regression</button>
        <button id="resetRegression">Reset Regression</button>
    </div>

    <div id="output">
        <h2>Output</h2>
        <p id="outputPoints"></p>
        <p id="outputRegression"></p>
    </div>

    <script>
        let points = [];

        document.getElementById('generatePoints').addEventListener('click', () => {
            const numPoints = parseInt(document.getElementById('numPoints').value);
            points = Array.from({length: numPoints}, (_, i) => {
                return { x: Math.random() * 10, y: Math.random() * 10 };
            });
            updateOutput();
        });

        document.getElementById('addPoint').addEventListener('click', () => {
            const x = parseFloat(document.getElementById('xValue').value);
            const y = parseFloat(document.getElementById('yValue').value);
            if (!isNaN(x) && !isNaN(y)) {
                points.push({ x, y });
                updateOutput();
            }
        });

        document.getElementById('removePoint').addEventListener('click', () => {
            if (points.length > 0) {
                points.pop();
                updateOutput();
            }
        });

        document.getElementById('calculateRegression').addEventListener('click', () => {
            const n = points.length;
            const sumX = points.reduce((sum, point) => sum + point.x, 0);
            const sumY = points.reduce((sum, point) => sum + point.y, 0);
            const sumXY = points.reduce((sum, point) => sum + point.x * point.y, 0);
            const sumXX = points.reduce((sum, point) => sum + point.x * point.x, 0);

            const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
            const intercept = (sumY - slope * sumX) / n;

            const regressionLine = `y = ${slope.toFixed(2)}x + ${intercept.toFixed(2)}`;
            document.getElementById('outputRegression').innerText = regressionLine;
        });

        document.getElementById('clearPoints').addEventListener('click', () => {
            points = [];
            updateOutput();
        });

        document.getElementById('resetRegression').addEventListener('click', () => {
            document.getElementById('outputRegression').innerText = '';
        });

        function updateOutput() {
            const pointsList = points.map(point => `(${point.x.toFixed(2)}, ${point.y.toFixed(2)})`).join(', ');
            document.getElementById('outputPoints').innerText = `Points: ${pointsList}`;
        }
    </script>
</body>
</html>
