<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Max Heap Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f9f9f9;
  }
  h1 {
    text-align: center;
  }
  #controls {
    text-align: center;
    margin-bottom: 20px;
  }
  input[type="number"] {
    width: 80px;
    font-size: 1em;
    padding: 5px;
  }
  button {
    font-size: 1em;
    padding: 6px 12px;
    margin-left: 10px;
    cursor: pointer;
  }
  #heapContainer {
    display: flex;
    justify-content: center;
    margin-top: 30px;
  }
  svg {
    width: 100%;
    max-width: 700px;
    height: 360px;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  .node {
    fill: #4a90e2;
    stroke: #2c64b8;
    stroke-width: 2px;
    cursor: default;
  }
  .node-text {
    fill: white;
    font-weight: bold;
    font-size: 16px;
    pointer-events: none;
  }
  line {
    stroke: #555;
    stroke-width: 2;
  }
  #log {
    max-width: 700px;
    margin: 20px auto;
    height: 140px;
    background: #222;
    color: #eee;
    padding: 10px;
    border-radius: 6px;
    overflow-y: auto;
    font-family: "Courier New", Courier, monospace;
    font-size: 0.9em;
  }
  #log strong {
    color: #4a90e2;
  }
</style>
</head>
<body>
<h1>Max Heap Visualization</h1>
<div id="controls">
  <input id="inputValue" type="number" placeholder="Enter number" />
  <button id="insertBtn">Insert</button>
  <button id="extractBtn">Extract Max</button>
  <button id="clearBtn">Clear</button>
</div>
<div id="heapContainer">
  <svg id="heapSVG" viewBox="0 0 700 360" aria-label="Max heap visualization" role="img"></svg>
</div>
<div id="log" aria-live="polite" aria-atomic="true"></div>

<script>
(() => {
  // Max Heap Class
  class MaxHeap {
    constructor() {
      this.data = [];
    }
    insert(value) {
      this.data.push(value);
      this._siftUp(this.data.length - 1);
    }
    extractMax() {
      if (this.data.length === 0) return null;
      if (this.data.length === 1) return this.data.pop();
      const max = this.data[0];
      this.data[0] = this.data.pop();
      this._siftDown(0);
      return max;
    }
    _parent(i) {
      return Math.floor((i - 1) / 2);
    }
    _left(i) {
      return 2 * i + 1;
    }
    _right(i) {
      return 2 * i + 2;
    }
    _siftUp(i) {
      while (i > 0) {
        let p = this._parent(i);
        if (this.data[p] < this.data[i]) {
          [this.data[p], this.data[i]] = [this.data[i], this.data[p]];
          i = p;
        } else {
          break;
        }
      }
    }
    _siftDown(i) {
      while (true) {
        let left = this._left(i);
        let right = this._right(i);
        let largest = i;
        if (left < this.data.length && this.data[left] > this.data[largest]) largest = left;
        if (right < this.data.length && this.data[right] > this.data[largest]) largest = right;
        if (largest !== i) {
          [this.data[i], this.data[largest]] = [this.data[largest], this.data[i]];
          i = largest;
        } else {
          break;
        }
      }
    }
  }

  // Visualization and UI
  const heap = new MaxHeap();
  const svg = document.getElementById('heapSVG');
  const insertBtn = document.getElementById('insertBtn');
  const extractBtn = document.getElementById('extractBtn');
  const clearBtn = document.getElementById('clearBtn');
  const inputValue = document.getElementById('inputValue');
  const logEl = document.getElementById('log');

  // Constants defining node placement
  const nodeRadius = 20;
  const maxLevels = 5;
  const width = 700;
  const height = 360;
  const levelHeight = height / maxLevels;

  function log(message) {
    const p = document.createElement('div');
    p.textContent = message;
    logEl.appendChild(p);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function clearLog() {
    logEl.textContent = '';
  }

  /**
   * Given index in heap array, calculate the (x,y) position in SVG coordinate
   * Uses a binary tree layout formula - nodes horizontally spaced by their index at level.
   */
  function calculateNodePosition(index) {
    // level of node:
    let level = 0;
    let count = 1;
    while (index >= count) {
      index -= count;
      count *= 2;
      level++;
    }
    const nodesInLevel = 2 ** level;
    const xGap = width / (nodesInLevel + 1);
    const x = xGap * (index + 1);
    const y = levelHeight * (level + 0.5);
    return { x, y };
  }

  function clearSVG() {
    while (svg.firstChild) {
      svg.removeChild(svg.firstChild);
    }
  }

  /** Draw lines between parent and children **/
  function drawEdges(data) {
    for (let i = 0; i < data.length; i++) {
      const parentPos = calculateNodePosition(i);
      const leftIndex = 2 * i + 1;
      const rightIndex = 2 * i + 2;
      if (leftIndex < data.length) {
        const leftPos = calculateNodePosition(leftIndex);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', parentPos.x);
        line.setAttribute('y1', parentPos.y + nodeRadius);
        line.setAttribute('x2', leftPos.x);
        line.setAttribute('y2', leftPos.y - nodeRadius);
        svg.appendChild(line);
      }
      if (rightIndex < data.length) {
        const rightPos = calculateNodePosition(rightIndex);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', parentPos.x);
        line.setAttribute('y1', parentPos.y + nodeRadius);
        line.setAttribute('x2', rightPos.x);
        line.setAttribute('y2', rightPos.y - nodeRadius);
        svg.appendChild(line);
      }
    }
  }

  /** Draw nodes with circles and text **/
  function drawNodes(data) {
    data.forEach((val, i) => {
      const { x, y } = calculateNodePosition(i);

      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', x);
      circle.setAttribute('cy', y);
      circle.setAttribute('r', nodeRadius);
      circle.setAttribute('class', 'node');
      svg.appendChild(circle);

      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', x);
      text.setAttribute('y', y + 6);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('class', 'node-text');
      text.textContent = val;
      svg.appendChild(text);
    });
  }

  function renderHeap() {
    clearSVG();
    const data = heap.data;
    if (data.length === 0) return;
    drawEdges(data);
    drawNodes(data);
  }

  insertBtn.addEventListener('click', () => {
    const val = Number(inputValue.value);
    if (!Number.isFinite(val)) {
      alert('Please enter a valid number.');
      inputValue.value = '';
      return;
    }
    heap.insert(val);
    log(`Inserted <strong>${val}</strong> into the heap.`);
    renderHeap();
    inputValue.value = '';
    inputValue.focus();
  });

  extractBtn.addEventListener('click', () => {
    const max = heap.extractMax();
    if (max === null) {
      alert('Heap is empty. Nothing to extract.');
      return;
    }
    log(`Extracted max <strong>${max}</strong> from the heap.`);
    renderHeap();
  });

  clearBtn.addEventListener('click', () => {
    heap.data = [];
    clearSVG();
    clearLog();
    inputValue.value = '';
    inputValue.focus();
    log('Heap cleared.');
  });

  inputValue.addEventListener('keydown', e => {
    if (e.key === 'Enter') insertBtn.click();
  });

  // Initial example heap for demo
  (function initialDemo() {
    const demoValues = [40, 30, 20, 15, 10, 12, 18];
    demoValues.forEach(v => heap.insert(v));
    log('Initial heap built with values: ' + demoValues.join(', '));
    renderHeap();
  })();
})();
</script>
</body>
</html>
