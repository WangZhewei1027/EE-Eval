<!DOCTYPE html>
<html>
<head>
    <title>Dijkstra's Algorithm</title>
    <style>
        #graph {
            border: 1px solid black;
            width: 800px;
            height: 600px;
            margin: 50px auto;
        }
    </style>
</head>
<body>
    <h1>Dijkstra's Algorithm</h1>
    <canvas id="graph"></canvas>
    <script>
        let graph = {
            'A': {'B': 1, 'C': 4, 'D': 7},
            'B': {'A': 1, 'C': 2, 'D': 5},
            'C': {'A': 4, 'B': 2, 'D': 1},
            'D': {'A': 7, 'B': 5, 'C': 1}
        };

        function dijkstra(graph, start) {
            let distances = {};
            let unvisited = Object.keys(graph);
            distances[start] = 0;

            while (unvisited.length > 0) {
                let minDistance = Infinity;
                let minNode = null;

                for (let node of unvisited) {
                    if (distances[node] < minDistance) {
                        minDistance = distances[node];
                        minNode = node;
                    }
                }

                unvisited.splice(unvisited.indexOf(minNode), 1);

                for (let neighbor in graph[minNode]) {
                    let distance = graph[minNode][neighbor];
                    let newDistance = distances[minNode] + distance;

                    if (newDistance < distances[neighbor]) {
                        distances[neighbor] = newDistance;
                    }
                }
            }

            return distances;
        }

        let startNode = 'A';
        let distances = dijkstra(graph, startNode);

        let node = Object.keys(distances).map(node => [node, distances[node]]).sort((a, b) => a[1] - b[1])[0][0];
        let shortestPath = dijkstra(graph, node);

        console.log("Shortest distances from", startNode, ":", distances);
        console.log("Shortest path:", shortestPath);
    </script>
</body>
</html>
