<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Concept Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .transaction-container {
            background: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            padding: 20px;
            max-width: 400px;
            margin: auto;
        }
        .transaction {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        button {
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="transaction-container">
    <h2>Transaction Demonstration</h2>
    <div id="transactions"></div>
    <button id="processTransaction">Process Transaction</button>
</div>

<script>
    const transactions = [
        { id: 1, amount: 100, type: 'deposit' },
        { id: 2, amount: 50, type: 'withdrawal' },
        { id: 3, amount: 200, type: 'deposit' },
        { id: 4, amount: 25, type: 'withdrawal' }
    ];

    function displayTransactions() {
        const transactionsDiv = document.getElementById('transactions');
        transactionsDiv.innerHTML = ''; // Clear current transactions
        transactions.forEach(transaction => {
            const transactionElement = document.createElement('div');
            transactionElement.classList.add('transaction');
            transactionElement.innerText = `Transaction ID: ${transaction.id}, Type: ${transaction.type}, Amount: $${transaction.amount}`;
            transactionsDiv.appendChild(transactionElement);
        });
    }

    function processTransaction() {
        try {
            if (transactions.length === 0) {
                throw new Error("No transactions to process");
            }

            // Simulating the processing of each transaction
            transactions.forEach(transaction => {
                if (transaction.type === 'deposit') {
                    console.log(`Deposited $${transaction.amount}`);
                } else if (transaction.type === 'withdrawal') {
                    console.log(`Withdrew $${transaction.amount}`);
                } else {
                    throw new Error("Unknown transaction type");
                }
            });

            alert('All transactions processed successfully!');
        } catch (error) {
            console.error(error);
            alert('Error processing transactions: ' + error.message);
        }
    }

    document.getElementById('processTransaction').addEventListener('click', processTransaction);
    displayTransactions();
</script>

</body>
</html>
