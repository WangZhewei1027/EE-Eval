<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deadlock Demonstration</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }
  h1 {
    text-align:center;
  }
  #log {
    white-space: pre-wrap;
    background-color: #f4f4f4;
    border: 1px solid #ccc;
    height: 300px;
    overflow-y: scroll;
    padding: 10px;
    margin-top: 20px;
  }
  button {
    display: block;
    margin: 0 auto;
    padding: 10px 20px;
    font-size: 16px;
  }
</style>
</head>
<body>
<h1>Deadlock Demonstration</h1>
<p>This example simulates a deadlock situation between two simulated "threads" trying to acquire two resources in opposite order.</p>
<button id="startBtn">Start Deadlock Simulation</button>

<div id="log"></div>

<script>
// Simulate resources as locks
class Lock {
  constructor(name) {
    this.name = name;
    this.isLocked = false;
    this.queue = [];
  }

  acquire(taskName) {
    return new Promise(resolve => {
      const attemptLock = () => {
        if (!this.isLocked) {
          this.isLocked = true;
          log(`${taskName} acquired lock on ${this.name}`);
          resolve();
        } else {
          // Push attemptLock to queue to retry later
          this.queue.push(attemptLock);
        }
      };
      attemptLock();
    });
  }

  release(taskName) {
    this.isLocked = false;
    log(`${taskName} released lock on ${this.name}`);
    if (this.queue.length > 0) {
      const nextAttempt = this.queue.shift();
      // Schedule next attempt asynchronously to avoid call stack overflow
      setTimeout(nextAttempt, 0);
    }
  }
}

// Simple log utility
const logDiv = document.getElementById("log");
function log(msg) {
  const time = new Date().toLocaleTimeString();
  logDiv.textContent += `[${time}] ${msg}\n`;
  logDiv.scrollTop = logDiv.scrollHeight;
}

// Deadlock simulation
async function task(name, firstLock, secondLock) {
  log(`${name} started and tries to acquire ${firstLock.name}`);
  await firstLock.acquire(name);

  // Simulate some processing delay before trying to acquire second lock
  await sleep(1000);

  log(`${name} tries to acquire ${secondLock.name}`);
  await secondLock.acquire(name);

  // If both locks acquired, simulate some work then release both
  log(`${name} acquired both locks. Working...`);
  await sleep(1000);

  secondLock.release(name);
  firstLock.release(name);
  log(`${name} finished its work and released both locks.`);
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

document.getElementById("startBtn").addEventListener("click", () => {
  logDiv.textContent = "";
  log("Starting deadlock simulation...");

  const resourceA = new Lock("Resource A");
  const resourceB = new Lock("Resource B");

  // Task1 tries to lock Resource A then Resource B
  task("Task 1", resourceA, resourceB);

  // Task2 tries to lock Resource B then Resource A
  task("Task 2", resourceB, resourceA);

  // Because each task holds one resource and waits for the other
  // this creates a deadlock, resulting in neither task finishing.
  log("Both tasks started. They will deadlock trying to acquire the second resource.");
});
</script>
</body>
</html>
