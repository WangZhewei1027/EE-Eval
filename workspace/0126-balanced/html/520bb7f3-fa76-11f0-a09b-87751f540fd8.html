<!DOCTYPE html>
<html>
<head>
    <title>K-Nearest Neighbors</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            width: 80%;
            margin: 40px auto;
            text-align: center;
        }
        .input-field {
            width: 50%;
            margin: 20px auto;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>K-Nearest Neighbors</h2>
        <form>
            <label for="features">Features:</label>
            <input type="text" id="features" required>
            <button type="button" class="button" onclick="findKNN()">Find KNN</button>
        </form>
        <div id="result"></div>
    </div>

    <script>
        function findKNN(features) {
            // Assume we have a dataset of features and their corresponding labels
            let dataset = [
                { label: 'A', features: [1, 2, 3, 4, 5] },
                { label: 'B', features: [2, 3, 4, 5, 6] },
                { label: 'C', features: [3, 4, 5, 6, 7] },
                { label: 'D', features: [4, 5, 6, 7, 8] },
                { label: 'E', features: [5, 6, 7, 8, 9] }
            ];

            // Convert features to a numerical representation
            let numericalFeatures = dataset.map(feature => {
                let sum = 0;
                let count = 0;
                feature.forEach((value, index) => {
                    sum += value;
                    count++;
                });
                return sum / count;
            });

            // Calculate the Euclidean distance between each feature in the input features
            let inputFeatures = features.map(feature => numericalFeatures[dataset.indexOf(feature)]);
            let distances = [];
            for (let i = 0; i < inputFeatures.length; i++) {
                let distance = 0;
                for (let j = 0; j < inputFeatures.length; j++) {
                    if (i !== j) {
                        distance += Math.pow(inputFeatures[i] - inputFeatures[j], 2);
                    }
                }
                distances.push(distance);
            }

            // Get the k nearest neighbors
            let k = parseInt(document.getElementById('features').value.split(',').length);
            let nearestNeighbors = [];
            for (let i = 0; i < distances.length; i++) {
                if (distances[i] <= 10) {
                    nearestNeighbors.push([distances[i], i]);
                }
            }
            nearestNeighbors.sort((a, b) => a[0] - b[0]);

            // Print the k nearest neighbors
            for (let i = 0; i < nearestNeighbors.length; i++) {
                let index = nearestNeighbors[i][1];
                let label = dataset[index].label;
                let distance = distances[index];
                document.getElementById('result').innerHTML += `<p>The ${label} feature has a distance of ${distance} to the nearest neighbors.</p>`;
            }
        }
    </script>
</body>
</html>
