<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim Sort Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 20px;
        }
        #array {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .bar {
            width: 20px;
            margin: 0 1px;
            background color: #3498db;
        }
    </style>
</head>
<body>
    <h1>Tim Sort Visualization</h1>
    <div id="array"></div>
    <button onclick="startTimSort()">Sort Array</button>
    <script>
        const MIN_RUN = 32;
        let array = [...Array(100).keys()].sort(() => Math.random() - 0.5);
        
        function displayArray(arr, highlightedIndices = []) {
            const arrayDiv = document.getElementById('array');
            arrayDiv.innerHTML = '';
            arr.forEach((value, index) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${value * 2}px`;
                bar.style.backgroundColor = highlightedIndices.includes(index) ? '#e74c3c' : '#3498db';
                arrayDiv.appendChild(bar);
            });
        }

        function insertionSort(arr, left, right) {
            for (let i = left + 1; i <= right; i++) {
                let key = arr[i];
                let j = i - 1;
                while (j >= left && arr[j] > key) {
                    arr[j + 1] = arr[j];
                    j--;
                }
                arr[j + 1] = key;
            }
        }

        function merge(arr, left, mid, right) {
            const len1 = mid - left + 1;
            const len2 = right - mid;
            let leftArr = new Array(len1);
            let rightArr = new Array(len2);

            for (let i = 0; i < len1; i++) {
                leftArr[i] = arr[left + i];
            }
            for (let j = 0; j < len2; j++) {
                rightArr[j] = arr[mid + 1 + j];
            }

            let i = 0, j = 0, k = left;
            while (i < len1 && j < len2) {
                if (leftArr[i] <= rightArr[j]) {
                    arr[k] = leftArr[i];
                    i++;
                } else {
                    arr[k] = rightArr[j];
                    j++;
                }
                k++;
            }
            while (i < len1) {
                arr[k] = leftArr[i];
                i++;
                k++;
            }
            while (j < len2) {
                arr[k] = rightArr[j];
                j++;
                k++;
            }
        }

        function timSort(arr) {
            const n = arr.length;

            for (let i = 0; i < n; i += MIN_RUN) {
                const end = Math.min(i + MIN_RUN - 1, n - 1);
                insertionSort(arr, i, end);
            }

            for (let size = MIN_RUN; size < n; size *= 2) {
                for (let left = 0; left < n; left += 2 * size) {
                    const mid = left + size - 1;
                    const right = Math.min((left + 2 * size - 1), (n - 1));
                    if (mid < right) {
                        merge(arr, left, mid, right);
                    }
                }
            }
        }

        function startTimSort() {
            const originalArray = [...array];
            displayArray(originalArray);
            setTimeout(() => {
                timSort(originalArray);
                displayArray(originalArray);
            }, 1000);
        }

        window.onload = () => displayArray(array);
    </script>
</body>
</html>
