<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greedy Algorithms Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #fff;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Greedy Algorithms Demonstration</h1>
<div class="container">
    <button onclick="runGreedyAlgorithm()">Run Coin Change Greedy Algorithm</button>
    <div class="result" id="result"></div>
</div>

<script>
    function runGreedyAlgorithm() {
        const coins = [25, 10, 5, 1]; // Coin denominations in cents
        const amount = 63; // Amount to make change for
        const result = greedyCoinChange(coins, amount);
        
        // Display the result
        document.getElementById('result').innerHTML = 
            `<strong>Amount:</strong> $${(amount / 100).toFixed(2)}<br>` +
            `<strong>Coins used:</strong> ${result.coins.join(', ')}<br>` +
            `<strong>Total coins:</strong> ${result.totalCoins}`;
    }

    function greedyCoinChange(coins, amount) {
        const result = [];
        let totalCoins = 0;
        
        for (let coin of coins) {
            while (amount >= coin) {
                amount -= coin;
                result.push(coin);
                totalCoins++;
            }
        }
        
        return {
            coins: result,
            totalCoins: totalCoins
        };
    }
</script>

</body>
</html>
