<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version Control</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #versionControl {
            width: 500px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #versionControl h1 {
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="versionControl">
        <h1>Version Control</h1>
        <p>This is a simple version control system. We will be using Git to track changes.</p>
        <button id="addFile">Add File</button>
        <button id="commitChanges">Commit Changes</button>
        <button id="pullChanges">Pull Changes</button>
        <button id="listChanges">List Changes</button>
    </div>

    <script>
        const addFileButton = document.getElementById('addFile');
        const commitChangesButton = document.getElementById('commitChanges');
        const pullChangesButton = document.getElementById('pullChanges');
        const listChangesButton = document.getElementById('listChanges');
        const versionControlElement = document.getElementById('versionControl');

        addFileButton.addEventListener('click', () => {
            const file = prompt('Enter the name of the file you want to add:');
            if (file) {
                const fileContent = prompt('Enter the content of the file:');
                if (fileContent) {
                    const newFile = document.createElement('div');
                    newFile.textContent = fileContent;
                    newFile.style.width = '100%';
                    newFile.style.height = '100px';
                    newFile.style.padding = '10px';
                    newFile.style.border = '1px solid #ccc';
                    newFile.style.boxShadow = '0 0 10px rgba(0, 0, 0, 0.1)';
                    newFile.style.background = 'lightgray';
                    versionControlElement.appendChild(newFile);
                }
            }
        });

        commitChangesButton.addEventListener('click', () => {
            const fileContent = document.getElementById('fileContent').value;
            if (fileContent) {
                const newFile = document.createElement('div');
                newFile.textContent = fileContent;
                newFile.style.width = '100%';
                newFile.style.height = '100px';
                newFile.style.padding = '10px';
                newFile.style.border = '1px solid #ccc';
                newFile.style.boxShadow = '0 0 10px rgba(0, 0, 0, 0.1)';
                newFile.style.background = 'lightgray';
                versionControlElement.appendChild(newFile);
                document.getElementById('fileContent').value = '';
            }
        });

        pullChangesButton.addEventListener('click', () => {
            const fileContent = document.getElementById('fileContent').value;
            if (fileContent) {
                const newFile = document.createElement('div');
                newFile.textContent = fileContent;
                newFile.style.width = '100%';
                newFile.style.height = '100px';
                newFile.style.padding = '10px';
                newFile.style.border = '1px solid #ccc';
                newFile.style.boxShadow = '0 0 10px rgba(0, 0, 0, 0.1)';
                newFile.style.background = 'lightgray';
                versionControlElement.appendChild(newFile);
                document.getElementById('fileContent').value = '';
            }
        });

        listChangesButton.addEventListener('click', () => {
            const fileContent = document.getElementById('fileContent').value;
            if (fileContent) {
                const newFile = document.createElement('div');
                newFile.textContent = fileContent;
                newFile.style.width = '100%';
                newFile.style.height = '100px';
                newFile.style.padding = '10px';
                newFile.style.border = '1px solid #ccc';
                newFile.style.boxShadow = '0 0 10px rgba(0, 0, 0, 0.1)';
                newFile.style.background = 'lightgray';
                versionControlElement.appendChild(newFile);
            }
        });

        const fileContent = document.getElementById('fileContent').value;
        if (fileContent) {
            const newFile = document.createElement('div');
            newFile.textContent = fileContent;
            newFile.style.width = '100%';
            newFile.style.height = '100px';
            newFile.style.padding = '10px';
            newFile.style.border = '1px solid #ccc';
            newFile.style.boxShadow = '0 0 10px rgba(0, 0, 0, 0.1)';
            newFile.style.background = 'lightgray';
            versionControlElement.appendChild(newFile);
            document.getElementById('fileContent').value = '';
        }
    </script>
</body>
</html>
