<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Syntax Tree Demo</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #output { margin-top: 20px; }
        .node { margin-left: 20px; }
        .node-label { font-weight: bold; }
    </style>
</head>
<body>
    <h1>Abstract Syntax Tree Demo</h1>
    <p>Type an arithmetic expression below to see its Abstract Syntax Tree (AST).</p>
    <input type="text" id="expression" placeholder="Enter expression (e.g., 3 + 5)" />
    <button id="generateAST">Generate AST</button>
    
    <div id="output"></div>

    <script>
        document.getElementById('generateAST').addEventListener('click', function() {
            const expression = document.getElementById('expression').value;
            const ast = generateAST(expression);
            displayAST(ast);
        });

        function generateAST(expression) {
            // Simple tokenization and AST generation for basic arithmetic expressions
            const tokens = tokenize(expression);
            return parse(tokens);
        }

        function tokenize(expression) {
            const regex = /\s*(=>|{|}|[()\-+*\/]|\d+)\s*/g;
            let tokens = [];
            let match;
            while (match = regex.exec(expression)) {
                if (match[1]) {
                    tokens.push(match[1]);
                }
            }
            return tokens;
        }

        function parse(tokens) {
            // Simple parsing for demonstration, handle + and - operators
            let index = 0;

            function parseExpression() {
                let left = parseTerm();
                while (index < tokens.length && (tokens[index] === '+' || tokens[index] === '-')) {
                    const operator = tokens[index++];
                    const right = parseTerm();
                    left = { type: 'BinaryExpression', operator, left, right };
                }
                return left;
            }

            function parseTerm() {
                const token = tokens[index++];
                if (!isNaN(token)) {
                    return { type: 'Literal', value: Number(token) };
                }
                throw new Error('Unexpected token: ' + token);
            }

            return parseExpression();
        }

        function displayAST(ast, outputDiv = document.getElementById('output')) {
            outputDiv.innerHTML = '';
            const tree = createTreeElement(ast);
            outputDiv.appendChild(tree);
        }

        function createTreeElement(node) {
            const div = document.createElement('div');
            div.className = 'node';
            div.innerHTML = `<span class="node-label">${node.type}</span>`;

            for (const key in node) {
                if (node.hasOwnProperty(key) && key !== 'type') {
                    const child = createTreeElement(node[key]);
                    div.appendChild(child);
                }
            }
            return div;
        }
    </script>
</body>
</html>
