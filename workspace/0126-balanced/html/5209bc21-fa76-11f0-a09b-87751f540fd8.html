<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backtracking</title>
    <style>
        #canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let board = Array(3).fill(null).map(() => Array(3).fill(null));
        let moves = 0;
        let selectedCell = null;
        let gameOver = false;

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    if (board[i][j] !== null) {
                        ctx.fillStyle = 'black';
                        ctx.fillRect(j * 100, i * 100, 100, 100);
                        ctx.fillStyle = 'white';
                        ctx.font = '24px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = 'black';
                        ctx.fillText(board[i][j], j * 100 + 50, i * 100 + 50);
                    }
                }
            }
            if (gameOver) {
                ctx.fillStyle = 'red';
                ctx.font = '48px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2);
            }
        }

        function makeMove(x, y) {
            if (selectedCell !== null && selectedCell.x === x && selectedCell.y === y) {
                gameOver = true;
                selectedCell = null;
                return;
            }
            if (board[x][y] !== null) {
                selectedCell = { x, y };
                return;
            }
            board[x][y] = moves;
            moves++;
            drawBoard();
            if (moves === 9) {
                console.log('You Win!');
                gameOver = true;
                selectedCell = null;
            }
        }

        function resetGame() {
            board = Array(3).fill(null).map(() => Array(3).fill(null));
            moves = 0;
            selectedCell = null;
            gameOver = false;
            drawBoard();
        }

        function checkWinner() {
            const winningCombinations = [
                [[0, 0, 0], [1, 1, 1], [2, 2, 2]],
                [[0, 1, 2], [1, 0, 1], [2, 0, 1]],
                [[0, 2, 1], [1, 0, 2], [2, 0, 1]],
                [[0, 1, 2], [1, 1, 0], [2, 2, 0]],
                [[0, 2, 1], [2, 0, 2], [2, 0, 1]],
            ];
            for (const combination of winningCombinations) {
                if (combination.every(cell => cell === board[0][0])) {
                    return true;
                }
            }
            return false;
        }

        function handleMouseMove(e) {
            const x = e.clientX / canvas.width * 100;
            const y = e.clientY / canvas.height * 100;
            if (selectedCell !== null) {
                if (board[selectedCell.x][selectedCell.y] === null) {
                    makeMove(selectedCell.x, selectedCell.y);
                }
            }
        }

        canvas.addEventListener('mousemove', handleMouseMove);

        drawBoard();

        document.addEventListener('click', () => {
            const x = Math.floor(e.clientX / canvas.width * 100);
            const y = Math.floor(e.clientY / canvas.height * 100);
            makeMove(x, y);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                resetGame();
            }
        });
    </script>
</body>
</html>
