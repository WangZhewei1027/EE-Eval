<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congestion Control</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        
        #traffic-light {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid black;
            border-radius: 10px;
            padding: 10px;
            font-size: 24px;
            color: white;
        }
        
        #traffic-light-red {
            background-color: red;
        }
        
        #traffic-light-green {
            background-color: green;
        }
        
        #traffic-light-yellow {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div id="traffic-light" class="traffic-light"></div>
    <script>
        let trafficLight = document.getElementById('traffic-light');
        let red = document.createElement('div');
        red.classList.add('traffic-light-red');
        trafficLight.appendChild(red);
        
        let green = document.createElement('div');
        green.classList.add('traffic-light-green');
        trafficLight.appendChild(green);
        
        let yellow = document.createElement('div');
        yellow.classList.add('traffic-light-yellow');
        trafficLight.appendChild(yellow);
        
        let intervalId = setInterval(() => {
            if (trafficLight.style.backgroundColor === 'red') {
                green.style.backgroundColor = 'yellow';
                trafficLight.style.backgroundColor = 'yellow';
                clearInterval(intervalId);
            } else if (trafficLight.style.backgroundColor === 'green') {
                green.style.backgroundColor = 'yellow';
                trafficLight.style.backgroundColor = 'green';
                clearInterval(intervalId);
            } else if (trafficLight.style.backgroundColor === 'yellow') {
                green.style.backgroundColor = 'yellow';
                trafficLight.style.backgroundColor = 'green';
                clearInterval(intervalId);
            }
        }, 1000);
    </script>
</body>
</html>
