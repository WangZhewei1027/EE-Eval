<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Symmetric Cryptography Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2rem; 
    background: #f9f9f9;
    color: #222;
  }
  h1 {
    text-align: center;
    color: #004085;
  }
  .container {
    max-width: 600px;
    margin: auto;
    background: white;
    border-radius: 8px;
    box-shadow: 0 0 10px #ccc;
    padding: 1.5rem 2rem;
  }
  label {
    display: block;
    margin: 1rem 0 0.4rem 0;
    font-weight: bold;
  }
  textarea, input[type="text"] {
    width: 100%;
    padding: 0.5rem;
    font-size: 1rem;
    border-radius: 4px;
    border: 1px solid #bbb;
    resize: vertical;
  }
  button {
    margin: 1rem 0;
    padding: 0.7rem 1.5rem;
    font-size: 1rem;
    font-weight: bold;
    border: none;
    border-radius: 4px;
    background: #007bff;
    color: white;
    cursor: pointer;
    transition: background-color 0.25s ease;
  }
  button:hover:not(:disabled) {
    background: #0056b3;
  }
  button:disabled {
    background: #a0a0a0;
    cursor: not-allowed;
  }
  .output {
    word-wrap: break-word;
    background: #e9ecef;
    padding: 0.7rem;
    border-radius: 4px;
    font-family: monospace;
    white-space: pre-wrap;
    min-height: 50px;
  }
  small {
    color: #666;
  }
</style>
</head>
<body>
  <h1>Symmetric Cryptography Demo</h1>
  <div class="container">
    <p>
      This demo shows <strong>Symmetric Cryptography</strong>, where the same key is used to both <em>encrypt</em> and <em>decrypt</em> a message.
    </p>

    <label for="keyInput">Secret Key (16 characters):</label>
    <input id="keyInput" maxlength="16" placeholder="Enter a 16-char secret key" />

    <label for="plaintextInput">Plaintext Message:</label>
    <textarea id="plaintextInput" rows="4" placeholder="Type your message here..."></textarea>

    <button id="encryptBtn" disabled>Encrypt</button>

    <label for="ciphertextOutput">Encrypted Message (Base64):</label>
    <textarea id="ciphertextOutput" rows="4" readonly placeholder="Encrypted message will appear here"></textarea>

    <button id="decryptBtn" disabled>Decrypt</button>

    <label for="decryptedOutput">Decrypted Message:</label>
    <textarea id="decryptedOutput" rows="4" readonly placeholder="Decrypted message will appear here"></textarea>

    <p style="margin-top:2rem; font-size: 0.9rem; color: #555;">
      <strong>Note:</strong> This demo uses AES-GCM with a 128-bit key and the Web Crypto API.<br>
      You must enter a 16-character key to enable encryption and decryption.
    </p>
  </div>

<script>
(() => {
  const enc = new TextEncoder();
  const dec = new TextDecoder();

  const keyInput = document.getElementById("keyInput");
  const plaintextInput = document.getElementById("plaintextInput");
  const encryptBtn = document.getElementById("encryptBtn");
  const ciphertextOutput = document.getElementById("ciphertextOutput");
  const decryptBtn = document.getElementById("decryptBtn");
  const decryptedOutput = document.getElementById("decryptedOutput");

  let cryptoKey = null;
  let iv = null; // Initialization vector for AES-GCM

  // Enable or disable buttons based on inputs
  function updateButtons() {
    const hasValidKey = keyInput.value.length === 16;
    encryptBtn.disabled = !(hasValidKey && plaintextInput.value.trim() !== "");
    decryptBtn.disabled = ciphertextOutput.value.trim() === "" || !hasValidKey;
  }

  // Convert a base64 string to ArrayBuffer
  function base64ToArrayBuffer(base64) {
    const binary = window.atob(base64);
    const length = binary.length;
    const bytes = new Uint8Array(length);
    for (let i = 0; i < length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }
    return bytes.buffer;
  }

  // Convert ArrayBuffer to base64 string
  function arrayBufferToBase64(buffer) {
    const bytes = new Uint8Array(buffer);
    let binary = "";
    for (let i = 0; i < bytes.byteLength; i++) {
      binary += String.fromCharCode(bytes[i]);
    }
    return window.btoa(binary);
  }

  // Import raw AES key (expects length 16 bytes for AES-128)
  async function importKey(rawKey) {
    return await crypto.subtle.importKey(
      "raw",
      rawKey,
      { name: "AES-GCM" },
      false,
      ["encrypt", "decrypt"]
    );
  }

  // Encrypt plaintext using AES-GCM
  async function encryptMessage(key, plaintext) {
    iv = crypto.getRandomValues(new Uint8Array(12)); // 96-bit IV recommended for AES-GCM
    const encoded = enc.encode(plaintext);
    const cipherBuffer = await crypto.subtle.encrypt(
      { name: "AES-GCM", iv: iv },
      key,
      encoded
    );

    // Combine IV + cipher text for transport
    const combined = new Uint8Array(iv.byteLength + cipherBuffer.byteLength);
    combined.set(iv, 0);
    combined.set(new Uint8Array(cipherBuffer), iv.byteLength);
    return combined.buffer;
  }

  // Decrypt ciphertext using AES-GCM (expects combined IV + ciphertext)
  async function decryptMessage(key, combinedBuffer) {
    const combined = new Uint8Array(combinedBuffer);
    const iv = combined.slice(0, 12); // First 12 bytes = IV
    const ciphertext = combined.slice(12);
    const decryptedBuffer = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: iv },
      key,
      ciphertext
    );
    return dec.decode(decryptedBuffer);
  }

  // Event listeners
  keyInput.addEventListener("input", async () => {
    if (keyInput.value.length === 16) {
      try {
        cryptoKey = await importKey(enc.encode(keyInput.value));
      } catch {
        cryptoKey = null;
      }
    } else {
      cryptoKey = null;
    }
    updateButtons();
  });

  plaintextInput.addEventListener("input", () => {
    updateButtons();
  });

  encryptBtn.addEventListener("click", async () => {
    if (!cryptoKey) {
      alert("Invalid key");
      return;
    }
    const plaintext = plaintextInput.value;
    try {
      const encryptedBuffer = await encryptMessage(cryptoKey, plaintext);
      const b64 = arrayBufferToBase64(encryptedBuffer);
      ciphertextOutput.value = b64;
      decryptedOutput.value = "";
      decryptBtn.disabled = false;
    } catch (e) {
      alert("Encryption failed: " + e.message);
    }
  });

  decryptBtn.addEventListener("click", async () => {
    if (!cryptoKey) {
      alert("Invalid key");
      return;
    }
    const ciphertextB64 = ciphertextOutput.value;
    if (!ciphertextB64) {
      alert("No ciphertext to decrypt");
      return;
    }
    try {
      const combinedBuffer = base64ToArrayBuffer(ciphertextB64);
      const decryptedText = await decryptMessage(cryptoKey, combinedBuffer);
      decryptedOutput.value = decryptedText;
    } catch (e) {
      alert("Decryption failed: " + e.message);
      decryptedOutput.value = "";
    }
  });

  updateButtons();
})();
</script>
</body>
</html>
