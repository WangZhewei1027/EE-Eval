<!DOCTYPE html>
<html>
<head>
    <title>Binary Search</title>
</head>
<body>
    <h1>Binary Search</h1>
    <input type="number" id="searchValue" placeholder="Enter a value to search for">
    <button id="searchButton">Search</button>
    <div id="result"></div>

    <script>
        function binarySearch(value, array) {
            let left = 0;
            let right = array.length - 1;
            let mid;

            while (left <= right) {
                mid = Math.floor((left + right) / 2);
                if (value === array[mid]) {
                    return true;
                } else if (value < array[mid]) {
                    right = mid - 1;
                } else {
                    left = mid + 1;
                }
            }

            return false;
        }

        const array = [2, 5, 8, 12, 16, 23, 38, 56, 72, 91];
        const searchValue = parseInt(document.getElementById("searchValue").value);

        const result = document.getElementById("result");
        result.innerHTML = "";

        if (binarySearch(searchValue, array)) {
            result.innerHTML = "Value found: " + searchValue;
        } else {
            result.innerHTML = "Value not found";
        }
    </script>
</body>
</html>
