<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucket Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

       .bucket {
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 50%;
        }

        button {
            margin-top: 20px;
            padding: 10px 30px;
            background-color: blue;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="bucket"></div>

    <button onclick="sortBuckets()">Sort Buckets</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bucketsort/4.3.0/dist/bucketsort.min.js"></script>

    <script>
        function sortBuckets() {
            const bucketItems = document.querySelectorAll('.bucket');
            let bucketIndex = 0;

            while (bucketItems.length > 0) {
                const currentBucket = bucketItems[bucketIndex];
                let currentItem = document.querySelector('.item');

                if (currentItem.style.display === 'none') {
                    bucketItems.splice(bucketIndex, 1);
                    bucketIndex++;
                } else {
                    currentItem.style.display = '';
                }
            }

            const sortedItems = [...bucketItems];

            for (let i = 0; i < sortedItems.length; i++) {
                sortedItems[i].textContent = sortedItems[i].innerHTML;
            }
        }
    </script>
</body>
</html>
