<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Forest Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        #chart {
            margin-top: 20px;
        }
        
        #info {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

<h1>Random Forest Visualization</h1>
<p>This simple demonstration explains the concept of Random Forest by simulating a classification task.</p>
<button id="run">Run Random Forest Simulation</button>

<div id="chart"></div>

<div id="info">
    <h3>Model Summary</h3>
    <pre id="modelSummary"></pre>
</div>

<script>
    // Simulating a dataset with 2 classes
    const data = [];
    for (let i = 0; i < 100; i++) {
        // Class 0
        data.push({ x: Math.random(), y: Math.random(), label: 0 }); 
        // Class 1
        data.push({ x: Math.random() + 0.5, y: Math.random() + 0.5, label: 1 });
    }

    function createRandomForest(data, nTrees) {
        const trees = [];

        for (let i = 0; i < nTrees; i++) {
            // Bootstrap sampling
            const sample = [];
            const sampleIndices = new Set();
            while (sample.length < data.length) {
                const randomIndex = Math.floor(Math.random() * data.length);
                if (!sampleIndices.has(randomIndex)) {
                    sample.push(data[randomIndex]);
                    sampleIndices.add(randomIndex);
                }
            }
            trees.push(buildTree(sample));
        }

        return trees;
    }

    function buildTree(data) {
        // This function currently only classifies based on majority vote
        const counts = {};
        data.forEach(d => {
            counts[d.label] = (counts[d.label] || 0) + 1;
        });
        return counts[0] > counts[1] ? 0 : 1;
    }

    function classify(trees, point) {
        const votes = {};
        trees.forEach(tree => {
            const prediction = tree;
            votes[prediction] = (votes[prediction] || 0) + 1;
        });
        return Object.keys(votes).reduce((a, b) => votes[a] > votes[b] ? a : b);
    }

    document.getElementById('run').addEventListener('click', () => {
        const nTrees = 10;
        const trees = createRandomForest(data, nTrees);
        const predictions = data.map(point => classify(trees, point));

        // Display classification results
        const modelSummary = `
        Number of Trees: ${nTrees}
        Predictions: [${predictions.join(', ')}]
        `;
        document.getElementById('modelSummary').innerText = modelSummary;

        // Draw chart to visualize points and their labels
        drawChart(data, predictions);
    });

    function drawChart(data, predictions) {
        const canvas = document.createElement('canvas');
        canvas.width = 400;
        canvas.height = 400;
        document.getElementById('chart').innerHTML = ''; // Clear previous chart
        document.getElementById('chart').appendChild(canvas);
        const ctx = canvas.getContext('2d');

        data.forEach((point, index) => {
            ctx.fillStyle = predictions[index] == 0 ? 'skyblue' : 'salmon';
            ctx.beginPath();
            ctx.arc(point.x * 400, point.y * 400, 5, 0, Math.PI * 2);
            ctx.fill();
        });
    }
</script>

</body>
</html>
