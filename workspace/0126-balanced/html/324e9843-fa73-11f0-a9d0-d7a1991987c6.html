<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Thread Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        #output {
            margin-top: 20px;
            background-color: #fff;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>JavaScript Thread Example</h1>
    <button id="startThreadButton">Start Thread Simulation</button>
    <div id="output"></div>

    <script>
        document.getElementById("startThreadButton").addEventListener("click", simulateThread);

        function simulateThread() {
            const outputDiv = document.getElementById("output");
            outputDiv.innerHTML = ""; // Clear previous output
            
            outputDiv.innerHTML += "<strong>Starting multiple tasks...</strong><br>";

            // Simulating threads using setTimeout (as JS is single-threaded)
            const tasks = [task1, task2, task3, task4];

            tasks.forEach((task, index) => {
                // Simulating each task to run asynchronously
                setTimeout(() => {
                    outputDiv.innerHTML += "Task " + (index + 1) + " is running...<br>";
                    task();
                }, Math.random() * 2000); // Random delay to simulate concurrency
            });
        }

        function task1() {
            setTimeout(() => {
                document.getElementById("output").innerHTML += "Task 1 completed!<br>";
            }, 1000);
        }

        function task2() {
            setTimeout(() => {
                document.getElementById("output").innerHTML += "Task 2 completed!<br>";
            }, 1500);
        }

        function task3() {
            setTimeout(() => {
                document.getElementById("output").innerHTML += "Task 3 completed!<br>";
            }, 1200);
        }

        function task4() {
            setTimeout(() => {
                document.getElementById("output").innerHTML += "Task 4 completed!<br>";
            }, 800);
        }
    </script>
</body>
</html>
