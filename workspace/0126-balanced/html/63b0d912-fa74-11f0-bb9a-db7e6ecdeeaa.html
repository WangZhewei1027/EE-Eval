<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Undirected Graph Demonstration</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0; padding: 0;
    background: #fafafa;
  }
  header {
    background: #2c3e50;
    color: white;
    padding: 1rem;
    text-align: center;
  }
  #canvas-container {
    display: flex;
    justify-content: center;
    margin-top: 1em;
  }
  canvas {
    border: 1px solid #ccc;
    background: white;
  }
  #info {
    max-width: 700px;
    margin: 20px auto;
    background: white;
    padding: 1em;
    border-radius: 5px;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
  }
  ul {
    list-style: none;
    padding-left: 0;
  }
  .node {
    font-weight: bold;
  }
</style>
</head>
<body>
<header>
  <h1>Undirected Graph Visualization</h1>
  <p>Drag nodes to reposition. Hover edges to see connections.</p>
</header>

<div id="canvas-container">
  <canvas id="graphCanvas" width="700" height="500"></canvas>
</div>

<div id="info">
  <h2>Graph Representation (Adjacency List):</h2>
  <pre id="adjList"></pre>
  <h3>Details:</h3>
  <p>This graph is <strong>undirected</strong>, meaning edges have no direction. Edges connect two nodes bi-directionally.</p>
</div>

<script>
// Undirected Graph Data and Visualization

class UndirectedGraph {
  constructor() {
    this.adjList = new Map();
  }
  
  addVertex(v) {
    if (!this.adjList.has(v)) {
      this.adjList.set(v, new Set());
    }
  }
  
  addEdge(v, w) {
    this.addVertex(v);
    this.addVertex(w);
    this.adjList.get(v).add(w);
    this.adjList.get(w).add(v);
  }
  
  getVertices() {
    return Array.from(this.adjList.keys());
  }
  
  getEdges() {
    const edges = new Set();
    for(let [v, neighbors] of this.adjList.entries()) {
      for(let w of neighbors) {
        // Sort pair to avoid duplicates since undirected
        const edge = [v,w].sort().join('-');
        edges.add(edge);
      }
    }
    return Array.from(edges).map(e => e.split('-'));
  }
  
  toString() {
    let str = '';
    for(let [v, neighbors] of this.adjList.entries()) {
      str += v + ' -> ' + Array.from(neighbors).join(', ') + '\n';
    }
    return str.trim();
  }
}

// Setup graph
const graph = new UndirectedGraph();

// Example graph with 7 nodes
const nodes = ['A','B','C','D','E','F','G'];
nodes.forEach(n => graph.addVertex(n));

graph.addEdge('A','B');
graph.addEdge('A','C');
graph.addEdge('B','D');
graph.addEdge('C','D');
graph.addEdge('C','E');
graph.addEdge('D','F');
graph.addEdge('E','F');
graph.addEdge('F','G');

const canvas = document.getElementById('graphCanvas');
const ctx = canvas.getContext('2d');

const NODE_RADIUS = 20;

// Nodes with their positions
const nodePositions = {
  A: {x: 150, y: 100},
  B: {x: 100, y: 200},
  C: {x: 200, y: 200},
  D: {x: 150, y: 300},
  E: {x: 300, y: 200},
  F: {x: 250, y: 350},
  G: {x: 300, y: 450}
};

// We'll make nodes draggable
let dragNode = null;
let offsetX = 0;
let offsetY = 0;

function drawGraph() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw edges first
  ctx.strokeStyle = '#34495e';
  ctx.lineWidth = 2;
  ctx.font = '14px Arial';

  let edges = graph.getEdges();
  
  edges.forEach(edge => {
    const [v,w] = edge;
    const p1 = nodePositions[v];
    const p2 = nodePositions[w];
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  });
  
  // Draw nodes
  for(let v of graph.getVertices()) {
    const p = nodePositions[v];
    // Circle
    ctx.beginPath();
    ctx.fillStyle = '#2980b9';
    ctx.strokeStyle = '#1c5980';
    ctx.lineWidth = 3;
    ctx.arc(p.x, p.y, NODE_RADIUS, 0, 2 * Math.PI);
    ctx.fill();
    ctx.stroke();
    // Text
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 18px Arial';
    ctx.fillText(v, p.x, p.y);
  }
}

// Utility to check if point is inside a node
function getNodeAtPosition(x, y) {
  for(let v of graph.getVertices()) {
    let p = nodePositions[v];
    let dx = x - p.x;
    let dy = y - p.y;
    if (dx*dx + dy*dy <= NODE_RADIUS*NODE_RADIUS) {
      return v;
    }
  }
  return null;
}

// Mouse events for dragging nodes
canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;
  let node = getNodeAtPosition(x, y);
  if (node) {
    dragNode = node;
    offsetX = x - nodePositions[node].x;
    offsetY = y - nodePositions[node].y;
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;
  
  if (dragNode) {
    nodePositions[dragNode].x = x - offsetX;
    nodePositions[dragNode].y = y - offsetY;
    drawGraph();
  } else {
    // Optional: change cursor style on hover
    if(getNodeAtPosition(x,y)) {
      canvas.style.cursor = 'pointer';
    } else {
      canvas.style.cursor = 'default';
    }
  }
});

canvas.addEventListener('mouseup', e => {
  dragNode = null;
});

canvas.addEventListener('mouseleave', e => {
  dragNode = null;
});

// Display adjacency list in info box
function displayAdjacency() {
  const adjListElem = document.getElementById('adjList');
  adjListElem.textContent = graph.toString();
}

displayAdjacency();
drawGraph();

</script>
</body>
</html>
