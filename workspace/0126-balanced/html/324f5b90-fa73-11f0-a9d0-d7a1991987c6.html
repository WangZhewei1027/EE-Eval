<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Load Balancing Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .server {
            display: inline-block;
            width: 150px;
            height: 120px;
            margin: 10px;
            border: 2px solid #007bff;
            border-radius: 8px;
            background-color: #fff;
        }
        .server h3 {
            margin: 0;
            padding: 10px;
            color: #007bff;
        }
        .requests {
            font-size: 24px;
            color: green;
        }
    </style>
</head>
<body>

<h1>Load Balancing Simulation</h1>
<p>Click the button to send requests to servers.</p>

<div>
    <div class="server" id="server1">
        <h3>Server 1</h3>
        <div class="requests" id="load1">0</div>
    </div>
    <div class="server" id="server2">
        <h3>Server 2</h3>
        <div class="requests" id="load2">0</div>
    </div>
    <div class="server" id="server3">
        <h3>Server 3</h3>
        <div class="requests" id="load3">0</div>
    </div>
</div>

<button onclick="sendRequest()">Send Request</button>

<script>
    let loads = [0, 0, 0]; // Array to store load of each server

    function sendRequest() {
        // Find the server with the least load
        let minLoadIndex = loads.indexOf(Math.min(...loads));
        
        // Increment the load of the selected server
        loads[minLoadIndex]++;
        
        // Update the UI
        document.getElementById(`load${minLoadIndex + 1}`).innerText = loads[minLoadIndex];
        console.log(`Request sent to Server ${minLoadIndex + 1}. Current load: ${loads[minLoadIndex]}`);
    }
</script>

</body>
</html>
