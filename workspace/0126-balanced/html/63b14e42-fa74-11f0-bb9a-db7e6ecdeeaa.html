<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jump Search Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f8f9fa;
  }
  h1 {
    text-align: center;
    margin-bottom: 5px;
  }
  p {
    text-align: center;
    max-width: 700px;
    margin: 0 auto 20px;
    color: #555;
  }
  #array-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 720px;
    margin: 0 auto 20px;
  }
  .array-element {
    width: 40px;
    height: 40px;
    border: 2px solid #666;
    margin: 3px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 600;
    font-size: 16px;
    border-radius: 6px;
    background-color: white;
    transition: background-color 0.4s ease, border-color 0.4s ease;
    user-select: none;
  }
  .default {
    background-color: white;
    border-color: #666;
    color: #333;
  }
  .jumped {
    background-color: #cce5ff;
    border-color: #339af0;
    color: #1c7ed6;
  }
  .block {
    background-color: #ffe066;
    border-color: #fcc419;
    color: #a67600;
  }
  .current {
    background-color: #69db7c;
    border-color: #38b000;
    color: #1b4332;
    font-weight: 700;
  }
  .found {
    background-color: #51cf66;
    border-color: #2f9e44;
    color: #073b12;
    font-weight: 700;
  }
  #controls {
    max-width: 720px;
    margin: 10px auto 20px;
    text-align: center;
  }
  input[type="number"] {
    width: 80px;
    padding: 6px 8px;
    font-size: 16px;
    border-radius: 4px;
    border: 1.5px solid #aaa;
    margin-right: 10px;
    text-align: center;
  }
  button {
    background-color: #339af0;
    border: none;
    color: white;
    padding: 10px 18px;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }
  button:hover:not(:disabled) {
    background-color: #1c7ed6;
  }
  button:disabled {
    background-color: #a5d8ff;
    cursor: default;
  }
  #log {
    max-width: 720px;
    margin: 0 auto;
    background-color: #e9ecef;
    border-radius: 6px;
    padding: 15px;
    min-height: 100px;
    font-size: 14px;
    white-space: pre-line;
    color: #212529;
    overflow-y: auto;
    max-height: 250px;
  }
</style>
</head>
<body>
<h1>Jump Search Visualization</h1>
<p>
  Jump Search is an efficient search algorithm for sorted arrays. It works by jumping ahead by fixed steps and then performing a linear search within the identified block.
</p>

<div id="array-container"></div>

<div id="controls">
  <label for="search-value">Search Value:</label>
  <input type="number" id="search-value" placeholder="Enter number" />
  <button id="start-btn">Start Search</button>
  <button id="reset-btn" disabled>Reset</button>
</div>

<div id="log" aria-live="polite" aria-atomic="true"></div>

<script>
(() => {
  const arr = [];
  const ARRAY_SIZE = 30;  
  const maxVal = 100;

  const arrayContainer = document.getElementById('array-container');
  const searchInput = document.getElementById('search-value');
  const startBtn = document.getElementById('start-btn');
  const resetBtn = document.getElementById('reset-btn');
  const logContainer = document.getElementById('log');

  let blocks = [];
  let animationSpeed = 800; // ms per step

  // Initialize and generate sorted array of unique numbers
  function generateArray() {
    arr.length = 0;
    let used = new Set();
    while (arr.length < ARRAY_SIZE) {
      let val = Math.floor(Math.random() * maxVal) + 1;
      if (!used.has(val)) {
        used.add(val);
        arr.push(val);
      }
    }
    arr.sort((a,b) => a - b);
  }

  // Render array elements on the page
  function renderArray() {
    arrayContainer.innerHTML = '';
    for(let i=0; i<arr.length; i++) {
      const elem = document.createElement('div');
      elem.classList.add('array-element', 'default');
      elem.textContent = arr[i];
      elem.dataset.index = i;
      arrayContainer.appendChild(elem);
    }
  }

  // Reset styles and log
  function reset() {
    document.querySelectorAll('.array-element').forEach(el=>{
      el.className = 'array-element default';
    });
    logContainer.textContent = '';
    searchInput.value = '';
    startBtn.disabled = false;
    resetBtn.disabled = true;
  }

  // Sleep Promise helper
  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // Get element by index
  function getElement(i) {
    return arrayContainer.querySelector(`.array-element[data-index="${i}"]`);
  }

  // Log message with automatic scrolling
  function log(msg) {
    logContainer.textContent += msg + '\n';
    logContainer.scrollTop = logContainer.scrollHeight;
  }

  // Jump Search Algorithm with visualization and logging
  async function jumpSearch(arr, x) {
    const n = arr.length;
    const step = Math.floor(Math.sqrt(n));

    log(`Array length: ${n}, Optimal jump step: ${step}`);
    log(`Searching for value: ${x}`);

    // Mark the jump step blocks
    // We'll visualize jumps and the block we search linearly.
    // Clear previous styles
    document.querySelectorAll('.array-element').forEach(el=>{
      el.className = 'array-element default';
    });

    let prev = 0;
    let current = 0;

    // Jump in blocks
    log('Starting jump phase:');
    while(current < n && arr[current] < x) {
      // Highlight jump step element
      if(prev > 0) {
        getElement(prev - 1).className = 'array-element default'; // previous block end reset
      }
      getElement(current).className = 'array-element jumped';
      log(`Jump to index ${current} (value: ${arr[current]})`);
      await sleep(animationSpeed);

      if(arr[current] >= x) break;
      prev = current;
      current += step;
      if(current > n - 1) current = n - 1;
    }

    // Highlight block where linear search will happen
    if(prev > 0) {
      // Mark block from prev to current
      for(let i = prev; i <= Math.min(current, n-1); i++){
        getElement(i).className = 'array-element block';
      }
    } else {
      // If search value smaller or equal first element, block is first step's elements
      for(let i=0; i <= Math.min(current, n-1); i++) {
        getElement(i).className = 'array-element block';
      }
    }
    log(`Linear search in block: index ${prev} to ${current}`);
    await sleep(animationSpeed);

    // Linear search within the block
    const end = Math.min(current, n - 1);
    for(let i = prev; i <= end; i++) {
      getElement(i).className = 'array-element current';
      log(`Checking index ${i} (value: ${arr[i]})`);
      await sleep(animationSpeed/1.5);

      if(arr[i] === x) {
        getElement(i).className = 'array-element found';
        log(`Value ${x} found at index ${i}! 🎉`);
        return i;
      }
      // revert back to block color if not found
      if(i !== end) getElement(i).className = 'array-element block';
    }

    log(`Value ${x} not found in array.`);
    return -1;
  }

  // Initialize app
  function init() {
    generateArray();
    renderArray();
    reset();
  }

  startBtn.addEventListener('click', async () => {
    const val = Number(searchInput.value);
    if(isNaN(val)) {
      alert('Please enter a valid number to search.');
      return;
    }
    if(val < arr[0] || val > arr[arr.length-1]) {
      alert(`Value out of array range (${arr[0]} - ${arr[arr.length-1]}).`);
      return;
    }
    startBtn.disabled = true;
    resetBtn.disabled = true;
    searchInput.disabled = true;

    await jumpSearch(arr, val);

    resetBtn.disabled = false;
    searchInput.disabled = false;
  });

  resetBtn.addEventListener('click', () => {
    init();
  });

  init();

})();
</script>
</body>
</html>
