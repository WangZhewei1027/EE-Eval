<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TCP/IP Concept Demonstration</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f0f4f8;
    color: #222;
  }
  h1 {
    text-align: center;
    color: #0b3d91;
  }
  #network {
    margin: 20px auto;
    width: 90%;
    max-width: 900px;
    border: 2px solid #0b3d91;
    border-radius: 10px;
    background: white;
    padding: 20px;
  }
  .device {
    border: 2px solid #0b3d91;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    width: 180px;
    margin: 10px;
    background: #e3ecf9;
    position: relative;
  }
  .device h3 {
    margin: 5px 0 10px;
    font-weight: 700;
  }
  .ip {
    font-family: monospace;
    font-size: 0.9em;
    background: #d0d7ea;
    padding: 3px 6px;
    border-radius: 5px;
    display: inline-block;
    margin-bottom: 10px;
  }
  #devicesContainer {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
  }
  #eventsLog {
    max-height: 180px;
    overflow-y: auto;
    background: #222;
    color: #eee;
    padding: 12px;
    border-radius: 5px;
    font-family: monospace;
    font-size: 0.9em;
    margin-top: 20px;
  }
  #sendControls {
    margin-top: 20px;
    text-align: center;
  }
  select, button {
    font-size: 1em;
    padding: 8px 12px;
    margin: 0 8px 8px 8px;
    border-radius: 6px;
    border: 1px solid #0b3d91;
    background: white;
    cursor: pointer;
  }
  button:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  svg {
    width: 100%;
    height: 150px;
    margin-top: 10px;
  }
  .segment, .packet {
    cursor: pointer;
    user-select: none;
  }
  #legend {
    margin-top: 25px;
    font-size: 0.9em;
  }
  .box {
    display: inline-block;
    width: 18px;
    height: 18px;
    margin-right: 6px;
    vertical-align: middle;
    border-radius: 3px;
  }
  .ipBox { background: #4178be; }
  .tcpBox { background: #f39c12; }
  .dataBox { background: #27ae60; }
  .packetBox { background: #8e44ad; }
</style>
</head>
<body>
<h1>TCP/IP Concept Demonstration</h1>
<div id="network" aria-label="Network demonstration">
  <div id="devicesContainer" role="list">
    <!-- Devices will be generated here -->
  </div>
  <div id="sendControls" aria-label="Controls to send packet">
    <label for="sourceSelect">Source:</label>
    <select id="sourceSelect" aria-describedby="descSource">
    </select>
    <label for="destSelect">Destination:</label>
    <select id="destSelect" aria-describedby="descDest">
    </select>
    <button id="sendButton">Send Message</button>
    <div id="descSource" style="display:none;">Select source device IP address.</div>
    <div id="descDest" style="display:none;">Select destination device IP address.</div>
  </div>
  <svg id="networkDiagram" aria-hidden="true"></svg>
  <div id="legend" aria-label="Legend">
    <div><span class="box ipBox"></span> IP Layer</div>
    <div><span class="box tcpBox"></span> TCP Layer</div>
    <div><span class="box dataBox"></span> Data (Payload)</div>
    <div><span class="box packetBox"></span> Packet traveling</div>
  </div>
  <h2>Events Log</h2>
  <div id="eventsLog" aria-live="polite" aria-atomic="false"></div>
</div>

<script>
(() => {
  // Devices on the simulated network
  const devices = [
    { name: 'Computer A', ip: '192.168.1.2' },
    { name: 'Computer B', ip: '192.168.1.3' },
    { name: 'Router', ip: '192.168.1.1' },
    { name: 'Server', ip: '10.0.0.5' }
  ];

  // DOM references
  const devicesContainer = document.getElementById('devicesContainer');
  const sourceSelect = document.getElementById('sourceSelect');
  const destSelect = document.getElementById('destSelect');
  const sendButton = document.getElementById('sendButton');
  const eventsLog = document.getElementById('eventsLog');
  const networkDiagram = document.getElementById('networkDiagram');

  // Clear logs
  function logEvent(text) {
    const time = new Date().toLocaleTimeString();
    const entry = document.createElement('div');
    entry.textContent = `[${time}] ${text}`;
    eventsLog.appendChild(entry);
    eventsLog.scrollTop = eventsLog.scrollHeight;
  }

  // Create device cards in UI
  function createDeviceCards() {
    devices.forEach(device => {
      const div = document.createElement('div');
      div.className = 'device';
      div.setAttribute('role', 'listitem');
      div.id = `device-${device.ip.replace(/\./g, '-')}`;
      div.innerHTML = `
        <h3>${device.name}</h3>
        <div class="ip">${device.ip}</div>
        <strong>Layers:</strong>
        <ul style="list-style:none; padding-left:0; text-align:left; font-size:0.9em;">
          <li><span class="ipBox box"></span>IP Layer</li>
          <li><span class="tcpBox box"></span>TCP Layer</li>
          <li><span class="dataBox box"></span>Application/Data</li>
        </ul>
      `;
      devicesContainer.appendChild(div);
    });
  }

  // Populate source/dest selects
  function populateSelects() {
    devices.forEach(device => {
      const optionSrc = document.createElement('option');
      optionSrc.value = device.ip;
      optionSrc.textContent = `${device.name} (${device.ip})`;
      sourceSelect.appendChild(optionSrc);

      const optionDest = document.createElement('option');
      optionDest.value = device.ip;
      optionDest.textContent = `${device.name} (${device.ip})`;
      destSelect.appendChild(optionDest);
    });
    // Default selections
    sourceSelect.selectedIndex = 0;
    destSelect.selectedIndex = devices.length > 1 ? 1 : 0;
  }

  // Coordinates for devices on SVG canvas for packet animation
  // We'll position devices horizontally spaced
  let devicePositions = {};

  function setupNetworkDiagram() {
    const svgWidth = networkDiagram.clientWidth || 800;
    const svgHeight = networkDiagram.clientHeight || 150;
    networkDiagram.setAttribute('viewBox', `0 0 ${svgWidth} ${svgHeight}`);
    networkDiagram.innerHTML = '';

    const marginX = 80;
    const marginY = svgHeight / 2;

    // Position devices evenly across width
    const stepX = (svgWidth - 2 * marginX) / (devices.length - 1);

    devices.forEach((device, i) => {
      const x = marginX + stepX * i;
      const y = marginY;
      devicePositions[device.ip] = { x, y };

      // Draw device circle
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', x);
      circle.setAttribute('cy', y);
      circle.setAttribute('r', 25);
      circle.setAttribute('fill', '#4178be');
      circle.setAttribute('stroke', '#0b3d91');
      circle.setAttribute('stroke-width', '3');
      circle.setAttribute('aria-label', `${device.name} at IP ${device.ip}`);
      networkDiagram.appendChild(circle);

      // Device label
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', x);
      text.setAttribute('y', y + 45);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('font-family', 'Arial, sans-serif');
      text.setAttribute('font-size', '13');
      text.setAttribute('fill', '#222');
      text.textContent = device.name;
      networkDiagram.appendChild(text);

      // IP label below name
      const ipText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      ipText.setAttribute('x', x);
      ipText.setAttribute('y', y + 62);
      ipText.setAttribute('text-anchor', 'middle');
      ipText.setAttribute('font-family', 'monospace');
      ipText.setAttribute('font-size', '11');
      ipText.setAttribute('fill', '#555');
      ipText.textContent = device.ip;
      networkDiagram.appendChild(ipText);

      // Draw lines between devices (full mesh for demo)
      if(i > 0) {
        const prevDevice = devices[i - 1];
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', devicePositions[prevDevice.ip].x);
        line.setAttribute('y1', marginY);
        line.setAttribute('x2', x);
        line.setAttribute('y2', marginY);
        line.setAttribute('stroke', '#a0b8d5');
        line.setAttribute('stroke-width', '2');
        networkDiagram.insertBefore(line, circle);
      }
    });
  }

  // Simulate building layers and sending a packet
  // We'll show step-by-step logs and animate the packet traveling on SVG

  function createPacketSVG() {
    // A rectangle representing a packet traveling area
    const packet = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    packet.setAttribute('width', 20);
    packet.setAttribute('height', 14);
    packet.setAttribute('fill', '#8e44ad');
    packet.setAttribute('rx', 4);
    packet.setAttribute('ry', 4);
    packet.classList.add('packet');
    networkDiagram.appendChild(packet);
    return packet;
  }

  // Animate the packet from source to destination along line
  function animatePacket(packet, fromPos, toPos, onComplete) {
    // We will animate translation from fromPos to toPos with easing
    const duration = 3500; // 3.5 seconds
    const start = performance.now();

    function step(time) {
      const elapsed = time - start;
      const progress = Math.min(elapsed / duration, 1);
      // ease in-out cubic
      const easeProgress = progress < 0.5 ?
        4 * progress * progress * progress :
        1 - Math.pow(-2 * progress + 2, 3) / 2;

      const x = fromPos.x + (toPos.x - fromPos.x) * easeProgress - 10; // subtract half width
      const y = fromPos.y + (toPos.y - fromPos.y) * easeProgress - 7;  // subtract half height

      packet.setAttribute('x', x);
      packet.setAttribute('y', y);

      if(progress < 1) {
        requestAnimationFrame(step);
      } else {
        onComplete();
      }
    }
    requestAnimationFrame(step);
  }

  // Demonstrate TCP/IP layers encapsulation and transmission
  // For simplified explanation:
  // Application Layer: message data
  // TCP Layer: segments message, adds TCP header info
  // IP Layer: encapsulates TCP segment inside IP packet, adds IP header with source and destination
  // Packet is sent over network (animation)
  // Then reversed on recipient device (decapsulation)

  function sendMessage(sourceIp, destIp, message) {
    sendButton.disabled = true;

    logEvent(`User requests sending message from ${sourceIp} to ${destIp}`);

    // Step 1: Application Layer
    logEvent(`[Application Layer] Message to send: "${message}"`);

    // Step 2: TCP Layer - segment creation with ports
    logEvent('[TCP Layer] Encapsulating message into TCP segment...');
    const tcpSegment = {
      sourcePort: 12345,  // arbitrary example ports
      destPort: 80,
      sequenceNumber: Math.floor(Math.random() * 10000),
      payload: message
    };
    logEvent(`TCP Segment created: Seq#${tcpSegment.sequenceNumber}, SrcPort:${tcpSegment.sourcePort}, DestPort:${tcpSegment.destPort}`);

    // Step 3: IP Layer - encapsulate TCP segment into IP packet
    logEvent('[IP Layer] Encapsulating TCP segment into IP packet...');
    const ipPacket = {
      sourceIp,
      destIp,
      protocol: 'TCP',
      tcpSegment
    };
    logEvent(`IP Packet created: SrcIP:${ipPacket.sourceIp}, DestIP:${ipPacket.destIp}, Protocol:${ipPacket.protocol}`);

    // Step 4: Transmit packet over network - animate packet traveling
    // Show moving rectangle from source to destination

    const sourcePos = devicePositions[sourceIp];
    const destPos = devicePositions[destIp];

    if(!sourcePos || !destPos) {
      logEvent('Error: Invalid source or destination IP address.');
      sendButton.disabled = false;
      return;
    }

    logEvent(`Sending packet from ${sourceIp} to ${destIp} over the network...`);

    const packet = createPacketSVG();

    animatePacket(packet, sourcePos, destPos, () => {
      logEvent('Packet arrived at destination device.');
      networkDiagram.removeChild(packet);

      // Step 5: Decapsulation on destination device

      logEvent('[IP Layer] Decapsulating IP packet...');
      logEvent(`[IP Layer] Validating destination IP: ${ipPacket.destIp}`);

      if (ipPacket.destIp !== destIp) {
        logEvent('[IP Layer] Destination IP mismatch. Packet dropped.');
        sendButton.disabled = false;
        return;
      }
      logEvent('[IP Layer] IP header processed successfully.');

      logEvent('[TCP Layer] Process segment...');
      logEvent(`TCP Segment details: Seq#${tcpSegment.sequenceNumber}, SrcPort:${tcpSegment.sourcePort}, DestPort:${tcpSegment.destPort}`);

      logEvent('[Application Layer] Delivering message to application...');
      logEvent(`Message received: "${tcpSegment.payload}"`);

      sendButton.disabled = false;
    });
  }

  function setupEventListeners() {
    sendButton.addEventListener('click', () => {
      const sourceIp = sourceSelect.value;
      const destIp = destSelect.value;

      if(sourceIp === destIp) {
        alert('Source and destination IP cannot be the same.');
        return;
      }
      const message = prompt('Enter the message to send:', 'Hello TCP/IP!');

      if(message === null || message.trim() === '') {
        alert('Message cannot be empty.');
        return;
      }

      sendMessage(sourceIp, destIp, message.trim());
    });
  }

  // Initialize UI and SVG diagram
  function init() {
    createDeviceCards();
    populateSelects();
    setupNetworkDiagram();
    setupEventListeners();
    logEvent('TCP/IP Simulation Ready.');
  }

  // Responsive: redraw on window resize
  window.addEventListener('resize', () => {
    setupNetworkDiagram();
  });

  init();
})();
</script>
</body>
</html>
