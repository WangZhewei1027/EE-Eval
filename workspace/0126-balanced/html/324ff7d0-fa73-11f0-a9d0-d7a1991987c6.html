<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Regression Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px;
        }
        canvas {
            border: 1px solid #ccc;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Linear Regression Demo</h1>
    <button onclick="performLinearRegression()">Calculate Linear Regression</button>
    <canvas id="regressionCanvas" width="600" height="400"></canvas>

    <script>
        // Sample Data
        const dataPoints = [
            { x: 1, y: 2 },
            { x: 2, y: 3 },
            { x: 3, y: 5 },
            { x: 4, y: 4 },
            { x: 5, y: 6 },
            { x: 6, y: 7 }
        ];

        function performLinearRegression() {
            const n = dataPoints.length;
            let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;

            // Calculating sums
            dataPoints.forEach(point => {
                sumX += point.x;
                sumY += point.y;
                sumXY += point.x * point.y;
                sumXX += point.x * point.x;
            });

            // Calculating slope (m) and intercept (b)
            const m = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
            const b = (sumY - m * sumX) / n;

            drawChart(m, b);
        }

        function drawChart(m, b) {
            const canvas = document.getElementById('regressionCanvas');
            const ctx = canvas.getContext('2d');

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw axes
            ctx.beginPath();
            ctx.moveTo(40, canvas.height - 40);
            ctx.lineTo(40, 20);
            ctx.moveTo(40, canvas.height - 40);
            ctx.lineTo(canvas.width - 20, canvas.height - 40);
            ctx.stroke();

            // Draw data points
            ctx.fillStyle = 'blue';
            dataPoints.forEach(point => {
                ctx.beginPath();
                ctx.arc(point.x * 80 + 40, canvas.height - (point.y * 40 + 40), 5, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw regression line
            ctx.strokeStyle = 'red';
            ctx.beginPath();
            const x0 = 0;
            const y0 = m * x0 + b;
            const x1 = 7; // Adjust as needed
            const y1 = m * x1 + b;
            ctx.moveTo(x0 * 80 + 40, canvas.height - (y0 * 40 + 40));
            ctx.lineTo(x1 * 80 + 40, canvas.height - (y1 * 40 + 40));
            ctx.stroke();
        }
    </script>

</body>
</html>
