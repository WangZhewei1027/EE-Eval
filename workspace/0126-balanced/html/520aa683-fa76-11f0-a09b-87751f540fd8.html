<!DOCTYPE html>
<html>
<head>
  <title>TCP/IP Demonstration</title>
  <style>
    body {
      font-family: monospace;
    }
  </style>
</head>
<body>

<h1>TCP/IP Demonstration</h1>

<div id="client"></div>
<div id="server"></div>

<script>
  let clientSocket = null;
  let serverSocket = null;

  // Establish connection with server
  function establishConnection() {
    serverSocket = new WebSocket("ws://localhost:8080");
    console.log("Connected to server");
  }

  // Receive data from server
  function receiveData() {
    if (clientSocket) {
      clientSocket.send("Hello from client");
      let data = clientSocket.read().then(response => {
        console.log("Received data:", response);
        return response;
      });
      return data;
    } else {
      console.log("No connection established");
    }
  }

  // Send data to server
  function sendData() {
    if (clientSocket) {
      clientSocket.send("Hello from server");
      let data = clientSocket.read().then(response => {
        console.log("Sent data:", response);
        return response;
      });
      return data;
    } else {
      console.log("No connection established");
    }
  }

  // Handle client connection
  function handleClient() {
    clientSocket.onmessage = event => {
      console.log("Received message:", event.data);
    };
    clientSocket.onopen = establishConnection;
    clientSocket.onerror = event => {
      console.log("Error occurred:", event);
    };
    clientSocket.onclose = event => {
      console.log("Connection closed");
    };
  }

  // Handle server connection
  function handleServer() {
    serverSocket.onmessage = event => {
      console.log("Received message:", event.data);
    };
    serverSocket.onerror = event => {
      console.log("Error occurred:", event);
    };
    serverSocket.onopen = establishConnection;
    serverSocket.onclose = event => {
      console.log("Connection closed");
    };
  }

  // Main function
  function main() {
    handleClient();
    handleServer();
  }

  main();
</script>

</body>
</html>
