<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Context Switching</title>
    <style>
        body {
            font-family: monospace;
            font-size: 12px;
            background-color: #f0f0f0;
        }
        .text {
            background-color: #c9e4ca;
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .text.success {
            background-color: #c9e4ca;
            color: #33cc33;
        }
        .text.error {
            background-color: #ff9900;
            color: #fff;
        }
    </style>
</head>
<body>
    <h1>Context Switching</h1>
    <button onclick="switchContext()">Switch Context</button>
    <div id="context1" class="text success"></div>
    <div id="context2" class="text error"></div>
    <script>
        let currentContext = "context1";
        const contextElements = document.querySelectorAll(".text");

        function switchContext() {
            if (currentContext === "context1") {
                contextElements[0].style.backgroundColor = "#c9e4ca";
                contextElements[0].classList.add("success");
                contextElements[1].style.backgroundColor = "#ff9900";
                contextElements[1].classList.add("error");
                currentContext = "context2";
            } else {
                contextElements[0].style.backgroundColor = "#ff9900";
                contextElements[0].classList.add("error");
                contextElements[1].style.backgroundColor = "#c9e4ca";
                contextElements[1].classList.add("success");
                currentContext = "context1";
            }
        }
    </script>
</body>
</html>
