<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree</title>
    <style>
        #bst {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            position: relative;
        }
        .node {
            border: 1px solid #000;
            border-radius: 5px;
            padding: 10px;
            text-align: center;
            position: absolute;
        }
    </style>
</head>
<body>

<h1>Binary Search Tree Visualization</h1>
<input type="number" id="value" placeholder="Enter a number">
<button id="insertBtn">Insert</button>
<button id="clearBtn">Clear</button>
<div id="bst"></div>

<script>
    class TreeNode {
        constructor(value) {
            this.value = value;
            this.left = null;
            this.right = null;
        }
    }

    class BinarySearchTree {
        constructor() {
            this.root = null;
        }

        insert(value) {
            const newNode = new TreeNode(value);
            if (!this.root) {
                this.root = newNode;
            } else {
                this.insertNode(this.root, newNode);
            }
        }

        insertNode(node, newNode) {
            if (newNode.value < node.value) {
                if (!node.left) {
                    node.left = newNode;
                } else {
                    this.insertNode(node.left, newNode);
                }
            } else {
                if (!node.right) {
                    node.right = newNode;
                } else {
                    this.insertNode(node.right, newNode);
                }
            }
        }

        draw(node, x, y, offsetX, offsetY) {
            if (!node) return;

            const nodeElement = document.createElement('div');
            nodeElement.className = 'node';
            nodeElement.innerHTML = node.value;

            nodeElement.style.left = `${x}px`;
            nodeElement.style.top = `${y}px`;

            document.getElementById('bst').appendChild(nodeElement);

            const newY = y + offsetY;

            if (node.left) {
                const newX = x - offsetX;
                this.draw(node.left, newX, newY, offsetX / 2, offsetY);
            }
            
            if (node.right) {
                const newX = x + offsetX;
                this.draw(node.right, newX, newY, offsetX / 2, offsetY);
            }
        }

        render() {
            const bstContainer = document.getElementById('bst');
            bstContainer.innerHTML = '';
            this.draw(this.root, bstContainer.clientWidth / 2, 20, 200, 60);
        }
    }

    const bst = new BinarySearchTree();

    document.getElementById('insertBtn').addEventListener('click', () => {
        const value = parseInt(document.getElementById('value').value);
        if (!isNaN(value)) {
            bst.insert(value);
            bst.render();
            document.getElementById('value').value = '';
        }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
        bst.root = null;
        bst.render();
    });
</script>

</body>
</html>
