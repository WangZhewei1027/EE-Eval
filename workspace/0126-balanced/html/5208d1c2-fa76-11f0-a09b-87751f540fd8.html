<!DOCTYPE html>
<html>
<head>
    <title>Quick Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #result {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Quick Sort</h1>
    <button id="sort-button">Sort</button>
    <div id="result"></div>

    <script>
        function quickSort(arr) {
            if (arr.length <= 1) {
                return arr;
            }
            let pivot = arr[Math.floor(arr.length / 2)];
            let left = [];
            let right = [];
            for (let i = 0; i < arr.length; i++) {
                if (arr[i] < pivot) {
                    left.push(arr[i]);
                } else {
                    right.push(arr[i]);
                }
            }
            return quickSort(left).concat(pivot, quickSort(right));
        }

        let arr = [9, 4, 7, 1, 5, 3, 6, 8, 2];
        let sortedArr = quickSort(arr);
        document.getElementById("result").innerHTML = "Sorted array: " + sortedArr.join(', ');
    </script>
</body>
</html>
