<!DOCTYPE html>
<html>
<head>
    <title>Bubble Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #bubble-sort {
            width: 50%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="bubble-sort">
        <h2>Bubble Sort</h2>
        <p>Original List: <pre><code class="list">[8, 3, 4, 2, 1, 6, 5, 7, 9]</code></pre></p>
        <button onclick="bubbleSort(8, 3, 4, 2, 1, 6, 5, 7, 9)">Sort</button>
        <p>Sorted List: <pre><code class="list">[1, 2, 3, 4, 5, 6, 7, 8, 9]</code></pre></p>
    </div>

    <script>
        function bubbleSort(arr) {
            let n = arr.length;
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n - i - 1; j++) {
                    if (arr[j] > arr[j + 1]) {
                        // Swap arr[j] and arr[j+1]
                        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                        console.log(`Swapped ${arr[j]} and ${arr[j + 1]}`);
                    }
                }
            }
            return arr;
        }

        let arr = [8, 3, 4, 2, 1, 6, 5, 7, 9];
        console.log("Original List:", arr);
        bubbleSort(arr);
        console.log("Sorted List:", arr);
    </script>
</body>
</html>
