<!DOCTYPE html>
<html>
<head>
    <title>Runtime Environment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #runtime-env {
            width: 800px;
            height: 600px;
            margin: 50px auto;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div id="runtime-env"></div>
    <script>
        const runtimeEnv = {
            name: "JavaScript",
            version: "ES2022",
            compiler: "V8",
            platform: "Windows 10",
            os: "Windows 10",
            architecture: "x64"
        };

        const language = runtimeEnv.name;
        const languageVersion = runtimeEnv.version;
        const compiler = runtimeEnv.compiler;
        const compilerVersion = runtimeEnv.compiler;
        const platform = runtimeEnv.platform;
        const platformVersion = runtimeEnv.platform;
        const os = runtimeEnv.os;
        const osVersion = runtimeEnv.os;
        const architecture = runtimeEnv.architecture;

        console.log(`Language: ${language}`);
        console.log(`Language Version: ${languageVersion}`);
        console.log(`Compiler: ${compiler}`);
        console.log(`Compiler Version: ${compilerVersion}`);
        console.log(`Platform: ${platform}`);
        console.log(`Platform Version: ${platformVersion}`);
        console.log(`OS: ${os}`);
        console.log(`OS Version: ${osVersion}`);
        console.log(`Architecture: ${architecture}`);
    </script>
</body>
</html>
