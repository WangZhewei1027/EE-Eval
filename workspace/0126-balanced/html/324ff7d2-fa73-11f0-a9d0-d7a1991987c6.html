<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Trees Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .decision-tree {
            text-align: center;
            margin: 20px;
            padding: 20px;
            border: 2px solid #007BFF;
            background-color: #fff;
            border-radius: 8px;
        }
        .node {
            margin: 20px;
        }
        .node > div {
            padding: 10px;
            border: 2px solid #007BFF;
            border-radius: 6px;
            display: inline-block;
        }
        .child {
            margin-left: 50px;
        }
    </style>
</head>
<body>

<h1>Decision Trees Demo</h1>
<div class="decision-tree" id="treeContainer">
    <div class="node">
        <div onclick="showChildren('A')" id="A">Is it raining?</div>
    </div>
</div>

<script>
    const treeData = {
        A: {
            yes: {
                question: "Is it cold?",
                yes: "Take an umbrella and wear a coat.",
                no: "Take an umbrella."
            },
            no: {
                question: "Is it hot?",
                yes: "Wear sunglasses.",
                no: "Enjoy your day."
            }
        }
    };

    const showChildren = (node) => {
        const container = document.getElementById('treeContainer');
        container.innerHTML = ''; // Clear the current content

        const children = treeData[node];

        if (children) {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'node';
            questionDiv.innerHTML = children.question;

            const yesButton = document.createElement('div');
            yesButton.innerHTML = 'Yes';
            yesButton.onclick = () => showResult(children.yes);
            questionDiv.appendChild(yesButton);

            const noButton = document.createElement('div');
            noButton.innerHTML = 'No';
            noButton.onclick = () => showResult(children.no);
            questionDiv.appendChild(noButton);

            container.appendChild(questionDiv);
        }
    };

    const showResult = (result) => {
        const container = document.getElementById('treeContainer');
        container.innerHTML = `<div class="node"><strong>Result:</strong> ${result}</div>`;
        
        // Optionally, you could add navigation back to restart the question flow
        const backButton = document.createElement('div');
        backButton.innerHTML = 'Restart';
        backButton.onclick = () => {
            container.innerHTML = `
                <div class="node">
                    <div onclick="showChildren('A')" id="A">Is it raining?</div>
                </div>`;
        };
        container.appendChild(backButton);
    };

    // Initialize the decision tree on page load
    window.onload = () => {
        showChildren('A');
    };
</script>

</body>
</html>
