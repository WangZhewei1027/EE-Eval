<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Syntax Tree Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            font-family: monospace;
        }
        button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        #astOutput {
            border: 1px solid #ddd;
            padding: 15px;
            background-color: #f9f9f9;
            white-space: pre-wrap;
            font-family: monospace;
            min-height: 200px;
        }
        .node {
            margin-left: 20px;
        }
        .node-type {
            font-weight: bold;
            color: #0066cc;
        }
        .node-value {
            color: #009933;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Abstract Syntax Tree Demo</h1>
        <p>Enter a simple JavaScript expression below to see its AST representation:</p>
        
        <textarea id="codeInput" placeholder="Enter JavaScript code (e.g., 2 + 3 * 5)">2 + 3 * 5</textarea>
        
        <button id="parseButton">Generate AST</button>
        
        <h2>AST Output:</h2>
        <div id="astOutput">Click "Generate AST" to see the tree structure of your code.</div>
    </div>

    <script>
        document.getElementById('parseButton').addEventListener('click', function() {
            const code = document.getElementById('codeInput').value.trim();
            if (!code) {
                alert('Please enter some JavaScript code');
                return;
            }

            try {
                // Simple AST parser for basic expressions
                const ast = parseExpression(code);
                displayAST(ast);
            } catch (e) {
                document.getElementById('astOutput').textContent = 'Error: ' + e.message;
            }
        });

        // Simple tokenizer
        function tokenize(code) {
            const tokens = [];
            let current = 0;
            
            while (current < code.length) {
                let char = code[current];
                
                // Skip whitespace
                if (/\s/.test(char)) {
                    current++;
                    continue;
                }
                
                // Handle numbers
                if (/[0-9]/.test(char)) {
                    let value = '';
                    while (/[0-9]/.test(code[current])) {
                        value += code[current];
                        current++;
                    }
                    tokens.push({ type: 'NUMBER', value });
                    continue;
                }
                
                // Handle operators
                if (/[\+\-\*\/]/.test(char)) {
                    tokens.push({ type: 'OPERATOR', value: char });
                    current++;
                    continue;
                }
                
                throw new Error(`Unknown character: ${char}`);
            }
            
            return tokens;
        }

        // Simple parser for basic arithmetic expressions
        function parseExpression(code) {
            const tokens = tokenize(code);
            let current = 0;
            
            function walk() {
                let token = tokens[current];
                
                // Handle numbers
                if (token.type === 'NUMBER') {
                    current++;
                    return {
                        type: 'NumberLiteral',
                        value: token.value
                    };
                }
                
                // Handle binary expressions
                if (token.type === 'OPERATOR') {
                    const operator = token.value;
                    current++;
                    
                    const left = walk();
                    const right = walk();
                    
                    return {
                        type: 'BinaryExpression',
                        operator,
                        left,
                        right
                    };
                }
                
                throw new Error(`Unknown token type: ${token.type}`);
            }
            
            return walk();
        }

        // Display the AST in a readable format
        function displayAST(node, indent = 0) {
            const output = document.getElementById('astOutput');
            let html = '';
            
            function traverse(node, depth) {
                const indentStr = '&nbsp;'.repeat(depth * 4);
                
                if (node.type === 'NumberLiteral') {
                    html += `${indentStr}<span class="node-type">NumberLiteral</span>: <span class="node-value">${node.value}</span><br>`;
                } else if (node.type === 'BinaryExpression') {
                    html += `${indentStr}<span class="node-type">BinaryExpression</span> (${node.operator}):<br>`;
                    html += `${indentStr}<div class="node">`;
                    traverse(node.left, depth + 1);
                    traverse(node.right, depth + 1);
                    html += `${indentStr}</div>`;
                }
            }
            
            traverse(node, 0);
            output.innerHTML = html;
        }
    </script>
</body>
</html>
