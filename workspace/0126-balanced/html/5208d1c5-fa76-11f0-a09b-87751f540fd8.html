<!DOCTYPE html>
<html>
<head>
    <title>Radix Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Radix Sort</h1>
    <p>Radix Sort is a non-comparative sorting algorithm that sorts data with integer keys by grouping keys by the individual digits (or by radix)</p>
    <button onclick="sortArray(12345)">Sort Array</button>
    <button onclick="sortArray(67890)">Sort Array</button>
    <div id="result"></div>

    <script>
        function sortArray(arr) {
            let n = arr.length;
            let max = Math.max(...arr);
            let exp = 1;

            while (max / exp > 0) {
                let count = new Array(10).fill(0);
                for (let i = 0; i < n; i++) {
                    let digit = (arr[i] / exp) % 10;
                    count[digit] += 1;
                }

                let i = 0;
                while (i < 10) {
                    let maxElement = Math.max(...count);
                    let maxElementIndex = count[maxElement] - 1;
                    let temp = arr[i];
                    for (let j = 0; j < maxElementIndex; j++) {
                        arr[i + j] = arr[i + j + 1];
                    }
                    count[maxElement]--;
                    i++;
                }

                exp *= 10;
            }

            return arr;
        }
    </script>
</body>
</html>
