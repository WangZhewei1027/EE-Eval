<!DOCTYPE html>
<html>
<head>
    <title>Suffix Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Suffix Tree</h1>
        <p>Concept: A tree-like data structure used for efficient searching and retrieval of strings.</p>
        <p>Example: <code>
            <span class="header">Word</span>
            <span class="header">Word</span>
            <span class="header">Word</span>
            <span class="header">Word</span>
            <span class="header">Word</span>
        </code></p>
        <button onclick="generateSuffixTree('word', 'word')">Generate Suffix Tree</button>
        <div id="tree"></div>
    </div>

    <script>
        function generateSuffixTree(word, suffix) {
            if (word.length === 0) {
                return '';
            } else if (word[0] === suffix[0]) {
                return generateSuffixTree(word.slice(1), suffix + word[0]);
            } else {
                let suffixTree = '';
                for (let i = 0; i < word.length; i++) {
                    suffixTree += '<span class="header">' + word[i] + '</span>';
                    let remainingWord = word.slice(i + 1);
                    let remainingSuffix = suffix + word[i];
                    let remainingSuffixTree = generateSuffixTree(remainingWord, remainingSuffix);
                    suffixTree += '<span class="header">' + remainingSuffixTree + '</span>';
                }
                return suffixTree;
            }
        }

        let word = 'word';
        let suffix = 'word';
        let tree = generateSuffixTree(word, suffix);
        document.getElementById('tree').innerHTML = '<div id="tree"></div>';
        document.getElementById('tree').innerHTML += tree;
    </script>
</body>
</html>
