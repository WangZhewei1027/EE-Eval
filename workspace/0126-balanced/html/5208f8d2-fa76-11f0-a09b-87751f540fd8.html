<!DOCTYPE html>
<html>
<head>
    <title>Linear Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Linear Search</h1>
    <p>Enter the number of elements to search:</p>
    <input type="number" id="numElements" value="5" min="1" max="100">
    <button onclick="searchLinear()">Search</button>
    <div id="result"></div>

    <script>
        function searchLinear() {
            let numElements = parseInt(document.getElementById("numElements").value);
            let result = document.getElementById("result");

            for (let i = 0; i < numElements; i++) {
                let num = parseInt(document.getElementById(`numElement${i+1}`).value);
                if (num === i + 1) {
                    result.innerHTML = `Found ${num} at position ${i + 1}`;
                    return;
                }
            }
            result.innerHTML = `Not found`;
        }
    </script>
</body>
</html>
