<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Branch and Bound Demonstration - Knapsack Problem</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2rem;
    background: #f0f2f5;
  }
  h1 {
    text-align: center;
  }
  #knapsack-table {
    border-collapse: collapse;
    margin: 1rem 0;
    width: 100%;
    max-width: 600px;
  }
  #knapsack-table th, #knapsack-table td {
    border: 1px solid #bbb;
    padding: 0.5rem 0.75rem;
    text-align: center;
  }
  #output {
    margin-top: 1rem;
    white-space: pre-wrap;
    background: #fff;
    padding: 1rem;
    border-radius: 5px;
    max-height: 400px;
    overflow-y: scroll;
    font-family: monospace;
  }
  button {
    background-color: #007bff; 
    color: white;
    border: none;
    padding: 0.6rem 1rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 1rem;
    margin-top: 1rem;
  }
  button:disabled {
    background-color: #999;
    cursor: default;
  }
  #controls {
    text-align: center;
  }
</style>
</head>
<body>

<h1>Branch and Bound Demo: 0/1 Knapsack Problem</h1>

<p>This demo illustrates the Branch and Bound technique on a classic 0/1 knapsack problem.</p>

<table id="knapsack-table" aria-label="Items for knapsack problem">
  <thead>
    <tr>
      <th>Item #</th>
      <th>Weight</th>
      <th>Value</th>
      <th>Value / Weight</th>
    </tr>
  </thead>
  <tbody id="items-body"></tbody>
</table>

<div id="controls">
  <button id="start-btn">Start Branch and Bound</button>
</div>

<pre id="output" aria-live="polite" aria-label="Branch and Bound step by step output"></pre>

<script>
  (function(){
    // Items for the knapsack problem (weight,value)
    const items = [
      {weight: 2, value: 40},
      {weight: 3.14, value: 50},
      {weight: 1.98, value: 100},
      {weight: 5, value: 95},
      {weight: 3, value: 30}
    ];

    // Maximum weight capacity
    const maxWeight = 10;

    const itemsBody = document.getElementById('items-body');
    const output = document.getElementById('output');
    const startBtn = document.getElementById('start-btn');

    // Add items to table sorted by value/weight ratio descending
    const itemsWithRatio = items.map((it, idx) => ({
      ...it,
      index: idx,
      ratio: it.value / it.weight
    })).sort((a,b) => b.ratio - a.ratio);

    function renderItems() {
      itemsBody.innerHTML = '';
      itemsWithRatio.forEach(({index, weight, value, ratio}) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${weight.toFixed(2)}</td>
          <td>${value}</td>
          <td>${ratio.toFixed(2)}</td>
        `;
        itemsBody.appendChild(row);
      });
    }

    // Node class for Branch and Bound tree
    class Node {
      constructor(level = -1, profit = 0, weight = 0, bound = 0, contains = []) {
        this.level = level;       // index of last item considered
        this.profit = profit;     // total value so far
        this.weight = weight;     // total weight so far
        this.bound = bound;       // upper bound of total profit in subtree
        this.contains = contains; // array of booleans if item included
      }
    }

    // Compute upper bound on profit in subtree rooted at node
    // Using fractional knapsack approach
    function bound(node) {
      if (node.weight >= maxWeight) return 0; // infeasible

      let profitBound = node.profit;
      let j = node.level + 1;
      let totweight = node.weight;

      // add items fractionally starting from j
      while (j < itemsWithRatio.length && totweight + itemsWithRatio[j].weight <= maxWeight) {
        totweight += itemsWithRatio[j].weight;
        profitBound += itemsWithRatio[j].value;
        j++;
      }

      // if j is not out of range, add fraction of next item
      if (j < itemsWithRatio.length) {
        const remain = maxWeight - totweight;
        profitBound += itemsWithRatio[j].ratio * remain;
      }

      return profitBound;
    }

    // Branch and Bound algorithm for Knapsack
    // Will step through the algorithm showing nodes explored
    async function branchAndBound() {
      output.textContent = '';
      startBtn.disabled = true;
      // Priority queue for live nodes - sorted by bound descending (max heap)
      let Q = [];

      let u = new Node();
      let v = new Node();

      let maxProfit = 0;
      let bestItems = [];

      u.bound = bound(u);

      function printNode(n, msg) {
        const level = n.level >= 0 ? n.level + 1 : "start";
        output.textContent += `[Level: ${level}] Profit: ${n.profit}, Weight: ${n.weight.toFixed(2)}, Bound: ${n.bound.toFixed(2)}\n`;
        if(msg) output.textContent += `  ${msg}\n`;
      }

      // Initialize queue
      Q.push(u);

      while(Q.length > 0) {
        // Sort Q by decreasing bound to behave like a max priority queue
        Q.sort((a,b) => b.bound - a.bound);
        u = Q.shift(); // node with best bound

        printNode(u, "Popped node from queue.");

        if(u.bound > maxProfit && u.level < itemsWithRatio.length - 1) {
          // Next item index
          const idx = u.level + 1;

          // Check taking the next item
          v.level = idx;
          v.weight = u.weight + itemsWithRatio[idx].weight;
          v.profit = u.profit + itemsWithRatio[idx].value;
          v.contains = u.contains.slice();
          v.contains[idx] = true;

          if(v.weight <= maxWeight && v.profit > maxProfit) {
            maxProfit = v.profit;
            bestItems = v.contains.slice();
            printNode(v, `Found new max profit with item #${itemsWithRatio[idx].index+1} included.`);
          }

          v.bound = bound(v);
          if(v.bound > maxProfit) {
            Q.push(new Node(v.level, v.profit, v.weight, v.bound, v.contains));
            printNode(v, "Adding node with item included to queue.");
          } else {
            printNode(v, "Pruned node with item included (bound <= maxProfit).");
          }

          // Check NOT taking the next item
          v.weight = u.weight;
          v.profit = u.profit;
          v.contains = u.contains.slice();
          v.contains[idx] = false;
          v.bound = bound(v);

          if(v.bound > maxProfit) {
            Q.push(new Node(v.level, v.profit, v.weight, v.bound, v.contains));
            printNode(v, "Adding node without item to queue.");
          } else {
            printNode(v, "Pruned node without item (bound <= maxProfit).");
          }
        } else {
          if(u.bound <= maxProfit) {
            printNode(u, "Pruned node (bound <= maxProfit).");
          }
        }
        output.scrollTop = output.scrollHeight;
        await new Promise(r => setTimeout(r, 700)); // pause for visualization
      }

      // Show final solution items in original order
      const solution = Array(items.length).fill(false);
      bestItems.forEach((included, idx) => {
        if(included) {
          // item index from sorted list to original index
          solution[itemsWithRatio[idx].index] = true;
        }
      });

      output.textContent += '\n=== Optimal Solution ===\n';
      let totalWeight = 0;
      let totalValue = 0;
      solution.forEach((inc, i) => {
        if(inc) {
          output.textContent += `Item #${i+1} INCLUDED (Weight: ${items[i].weight}, Value: ${items[i].value})\n`;
          totalWeight += items[i].weight;
          totalValue += items[i].value;
        } else {
          output.textContent += `Item #${i+1} excluded\n`;
        }
      });
      output.textContent += `\nTotal Weight: ${totalWeight.toFixed(2)} / Capacity: ${maxWeight}\n`;
      output.textContent += `Total Value: ${totalValue}\n`;

      startBtn.disabled = false;
    }

    renderItems();

    startBtn.addEventListener('click', branchAndBound);
  })();
</script>

</body>
</html>
