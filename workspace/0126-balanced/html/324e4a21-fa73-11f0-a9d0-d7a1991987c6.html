<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backtracking Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #output {
            margin-top: 20px;
            white-space: pre-wrap; /* Preserve whitespace */
        }
        .btn {
            padding: 10px 20px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Backtracking Demo: N-Queens Problem</h1>
<p>This demo demonstrates the backtracking algorithm using the N-Queens problem, where we place N queens on an N×N chessboard such that no two queens threaten each other.</p>
<div>
    <label for="n">Enter the number of queens (N): </label>
    <input type="number" id="n" value="4" min="1" />
    <button class="btn" id="solve">Solve</button>
</div>

<h2>Solution(s)</h2>
<pre id="output"></pre>

<script>
    function isSafe(board, row, col, N) {
        // Check this row on left side
        for (let i = 0; i < col; i++) {
            if (board[row][i]) return false;
        }
        // Check upper diagonal on left side
        for (let i = row, j = col; i >= 0 && j >= 0; i--, j--) {
            if (board[i][j]) return false;
        }
        // Check lower diagonal on left side
        for (let i = row, j = col; j >= 0 && i < N; i++, j--) {
            if (board[i][j]) return false;
        }
        return true;
    }

    function solveNQueensUtil(board, col, N, solutions) {
        if (col >= N) {
            const solution = board.map(row => row.map(val => (val ? 'Q' : '.')).join('')).join('\n');
            solutions.push(solution);
            return;
        }

        for (let i = 0; i < N; i++) {
            if (isSafe(board, i, col, N)) {
                board[i][col] = true; // Place queen
                solveNQueensUtil(board, col + 1, N, solutions); // Recur to place the rest
                board[i][col] = false; // Backtrack
            }
        }
    }

    function solveNQueens(N) {
        const board = Array.from({ length: N }, () => Array(N).fill(false));
        const solutions = [];
        solveNQueensUtil(board, 0, N, solutions);
        return solutions;
    }

    document.getElementById('solve').addEventListener('click', () => {
        const N = parseInt(document.getElementById('n').value);
        const outputElement = document.getElementById('output');
        outputElement.textContent = '';

        if (N < 1) {
            outputElement.textContent = 'Please enter a valid number of queens.';
            return;
        }

        const solutions = solveNQueens(N);
        if (solutions.length === 0) {
            outputElement.textContent = 'No solutions found.';
        } else {
            outputElement.textContent = solutions.join('\n\n'); // separate solutions
        }
    });
</script>

</body>
</html>
