<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paging</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        table {
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <h1>Paging</h1>
    <table>
        <thead>
            <tr>
                <th>Page Number</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Age</th>
                <th>City</th>
            </tr>
        </thead>
        <tbody id="data">
            <!-- data will be generated dynamically -->
        </tbody>
    </table>
    <script>
        let data = [];
        let currentPage = 1;
        let totalPages = 10;

        function loadData() {
            fetch('data.json')
                .then(response => response.json())
                .then(data => {
                    let body = document.getElementById('data');
                    body.innerHTML = '';
                    data.forEach(item => {
                        let row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${item.pageNumber}</td>
                            <td>${item.firstName}</td>
                            <td>${item.lastName}</td>
                            <td>${item.age}</td>
                            <td>${item.city}</td>
                        `;
                        body.appendChild(row);
                    });
                });
        }

        function paging() {
            loadData();
            let paginatedData = [];
            for (let i = 0; i < data.length; i += 10) {
                paginatedData.push(data.slice(i, i + 10));
            }
            let startIndex = (currentPage - 1) * 10;
            let endIndex = startIndex + 10;
            paginatedData = paginatedData.slice(startIndex, endIndex);
            let tableBody = document.getElementById('data');
            tableBody.innerHTML = '';
            paginatedData.forEach(item => {
                let row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.pageNumber}</td>
                    <td>${item.firstName}</td>
                    <td>${item.lastName}</td>
                    <td>${item.age}</td>
                    <td>${item.city}</td>
                `;
                tableBody.appendChild(row);
            });
            currentPage++;
        }

        loadData();
        paging();
    </script>
</body>
</html>
