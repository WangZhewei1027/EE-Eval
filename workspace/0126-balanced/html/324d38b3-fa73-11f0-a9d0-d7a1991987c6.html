<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insertion Sort Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 50px;
        }
        #array {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .bar {
            width: 30px;
            margin: 0 2px;
            background-color: teal;
            display: inline-block;
            transition: background-color 0.3s;
        }
    </style>
</head>
<body>

<h1>Insertion Sort Visualization</h1>
<div id="array"></div>
<button id="sortButton">Start Insertion Sort</button>

<script>
    const array = [5, 3, 8, 4, 2];
    const arrayContainer = document.getElementById('array');

    function visualizeArray(array) {
        arrayContainer.innerHTML = '';
        array.forEach(value => {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = `${value * 30}px`;
            arrayContainer.appendChild(bar);
        });
    }

    async function insertionSort(arr) {
        for (let i = 1; i < arr.length; i++) {
            let key = arr[i];
            let j = i - 1;

            while (j >= 0 && arr[j] > key) {
                arr[j + 1] = arr[j];
                visualizeArray(arr);
                await new Promise(resolve => setTimeout(resolve, 500));
                j--;
            }
            arr[j + 1] = key;
            visualizeArray(arr);
            await new Promise(resolve => setTimeout(resolve, 500));
        }
    }

    document.getElementById('sortButton').addEventListener('click', () => {
        const arrCopy = [...array];
        visualizeArray(arrCopy);
        insertionSort(arrCopy);
    });

    visualizeArray(array); // Initial visualization
</script>
</body>
</html>
