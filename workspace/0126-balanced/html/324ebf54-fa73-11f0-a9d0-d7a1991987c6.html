<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Memory Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #memory, #virtualMemory {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
            height: 150px;
            overflow: auto;
        }
        .memory-slot {
            margin: 5px 0;
            padding: 5px;
            border: 1px solid #999;
            background-color: #f0f0f0;
        }
        .active {
            background-color: #c8e6c9;
        }
    </style>
</head>
<body>

    <h1>Virtual Memory Simulation</h1>

    <div>
        <button onclick="loadProcess()">Load Process</button>
    </div>

    <h2>Physical Memory (RAM)</h2>
    <div id="memory"></div>

    <h2>Virtual Memory (Disk)</h2>
    <div id="virtualMemory"></div>

    <script>
        const physicalMemorySize = 4; // Simulate 4 physical memory slots
        const virtualMemorySize = 10; // Simulate 10 virtual memory slots
        let physicalMemory = [];
        let virtualMemory = [];

        function loadProcess() {
            if (virtualMemory.length < virtualMemorySize) {
                const processIndex = virtualMemory.length;
                virtualMemory.push(`Process ${processIndex + 1}`);
                updateVirtualMemoryDisplay();

                if (physicalMemory.length < physicalMemorySize) {
                    loadIntoPhysicalMemory(processIndex);
                } else {
                    console.log('Physical Memory Full! Swapping needed.');
                    swapMemory();
                }
            } else {
                console.log('Virtual Memory Full! Cannot load more processes.');
            }
        }

        function loadIntoPhysicalMemory(index) {
            physicalMemory.push(`Process ${index + 1}`);
            updatePhysicalMemoryDisplay();
        }

        function updatePhysicalMemoryDisplay() {
            const memoryDiv = document.getElementById('memory');
            memoryDiv.innerHTML = physicalMemory.map((process, index) => 
                `<div class="memory-slot">${process}</div>`
            ).join('');
        }

        function updateVirtualMemoryDisplay() {
            const virtualMemoryDiv = document.getElementById('virtualMemory');
            virtualMemoryDiv.innerHTML = virtualMemory.map((process, index) => 
                `<div class="memory-slot">${process}</div>`
            ).join('');
        }

        function swapMemory() {
            const oldestProcess = physicalMemory.shift(); // Remove from the front
            physicalMemory.push(oldestProcess); // Add to the back (simulate using it)
            console.log(`${oldestProcess} swapped to virtual memory.`);
            updatePhysicalMemoryDisplay();
        }
    </script>
</body>
</html>
