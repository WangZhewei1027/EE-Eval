<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red-Black Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        
        .node {
            width: 50px;
            height: 50px;
            border: 1px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }
        
        .node.red {
            background-color: red;
        }
        
        .node.black {
            background-color: black;
        }
    </style>
</head>
<body>
    <h1>Red-Black Tree</h1>
    <p id="tree"></p>

    <script>
        class Node {
            constructor(value, color = 'red') {
                this.value = value;
                this.color = color;
                this.left = null;
                this.right = null;
            }
        }

        function insert(root, value) {
            if (root === null) {
                return new Node(value, 'black');
            } else if (value < root.value) {
                root.left = insert(root.left, value);
            } else {
                root.right = insert(root.right, value);
            }
            return root;
        }

        function printTree(root, indent = 0) {
            if (root !== null) {
                console.log(' '.repeat(indent) + root.value);
                printTree(root.left, indent + 2);
                printTree(root.right, indent + 2);
            }
        }

        function redBlackTree(root) {
            if (root !== null) {
                root.color = 'black';
                if (root.left !== null) {
                    root.left.color = 'red';
                    redBlackTree(root.left);
                }
                if (root.right !== null) {
                    root.right.color = 'red';
                    redBlackTree(root.right);
                }
            }
        }

        let root = null;

        // Insert values into the tree
        root = insert(root, 10);
        root = insert(root, 5);
        root = insert(root, 15);
        root = insert(root, 3);
        root = insert(root, 7);
        root = insert(root, 12);
        root = insert(root, 17);

        // Print the tree
        printTree(root);

        // Red-Black Tree
        root = null;
        root = insert(root, 10);
        root = insert(root, 5);
        root = insert(root, 15);
        root = insert(root, 3);
        root = insert(root, 7);
        root = insert(root, 12);
        root = insert(root, 17);

        // Print the Red-Black Tree
        printTree(root);
    </script>
</body>
</html>
