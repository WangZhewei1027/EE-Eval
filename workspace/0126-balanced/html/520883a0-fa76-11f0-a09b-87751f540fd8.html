<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B+ Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .bplus-tree {
            display: inline-block;
            margin: 20px;
        }
        .bplus-tree-node {
            background-color: #f0f0f0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin: 5px;
            display: inline-block;
            vertical-align: top;
        }
        .bplus-tree-node-content {
            display: inline-block;
            vertical-align: top;
        }
    </style>
</head>
<body>
    <div class="bplus-tree">
        <div class="bplus-tree-node">
            <div class="bplus-tree-node-content">A</div>
            <div class="bplus-tree-node-content">B</div>
        </div>
        <div class="bplus-tree-node">
            <div class="bplus-tree-node-content">C</div>
            <div class="bplus-tree-node-content">D</div>
        </div>
        <div class="bplus-tree-node">
            <div class="bplus-tree-node-content">E</div>
            <div class="bplus-tree-node-content">F</div>
        </div>
        <div class="bplus-tree-node">
            <div class="bplus-tree-node-content">G</div>
            <div class="bplus-tree-node-content">H</div>
        </div>
    </div>

    <script>
        class Node {
            constructor(key, value, left = null, right = null) {
                this.key = key;
                this.value = value;
                this.left = left;
                this.right = right;
            }
        }

        class BPlusTree {
            constructor() {
                this.root = new Node(null, null);
            }

            insert(key, value) {
                if (this.root.key === null) {
                    this.root = new Node(key, value);
                } else {
                    this._insert(this.root, key, value);
                }
            }

            _insert(node, key, value) {
                if (key < node.key) {
                    if (node.left === null) {
                        node.left = new Node(key, value);
                    } else {
                        this._insert(node.left, key, value);
                    }
                } else {
                    if (node.right === null) {
                        node.right = new Node(key, value);
                    } else {
                        this._insert(node.right, key, value);
                    }
                }
            }

            search(key) {
                return this._search(this.root, key);
            }

            _search(node, key) {
                if (node === null) {
                    return null;
                }
                if (key === node.key) {
                    return node.value;
                }
                if (key < node.key) {
                    return this._search(node.left, key);
                }
                return this._search(node.right, key);
            }

            delete(key) {
                this.root = this._delete(this.root, key);
            }

            _delete(node, key) {
                if (node === null) {
                    return null;
                }
                if (key < node.key) {
                    node.left = this._delete(node.left, key);
                } else if (key > node.key) {
                    node.right = this._delete(node.right, key);
                } else {
                    if (node.left === null && node.right === null) {
                        return null;
                    } else if (node.left === null) {
                        return node.right;
                    } else if (node.right === null) {
                        return node.left;
                    } else {
                        let min = this._findMin(node.right);
                        node.key = min.key;
                        node.value = min.value;
                        node.right = this._delete(node.right, min.key);
                    }
                }
                return node;
            }

            _findMin(node) {
                while (node.left !== null) {
                    node = node.left;
                }
                return node;
            }
        }

        let tree = new BPlusTree();
        tree.insert(5, 'five');
        tree.insert(2, 'two');
        tree.insert(8, 'eight');
        tree.insert(3, 'three');
        tree.insert(9, 'nine');
        tree.insert(1, 'one');
        tree.insert(4, 'four');

        console.log(tree.search(5)); // five
        console.log(tree.search(8)); // eight
        console.log(tree.search(3)); // three
        console.log(tree.search(9)); // nine
        console.log(tree.search(1)); // one
        console.log(tree.search(4)); // four

        tree.delete(5);
        console.log(tree.search(5)); // null
    </script>
</body>
</html>
