<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Heap Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        #heap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }
        .node {
            width: 40px;
            height: 40px;
            border: 2px solid #007bff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px;
            position: relative;
        }
        .line {
            width: 2px;
            height: 30px;
            background-color: #007bff;
            position: absolute;
        }
    </style>
</head>
<body>

<h1>Max Heap Visualization</h1>
<div id="heap"></div>

<input type="number" id="value" placeholder="Enter a number" />
<button onclick="insert()">Insert</button>

<script>
    class MaxHeap {
        constructor() {
            this.heap = [];
        }

        insert(value) {
            this.heap.push(value);
            this.bubbleUp();
            this.drawHeap();
        }

        bubbleUp() {
            let index = this.heap.length - 1;
            const element = this.heap[index];

            while (index > 0) {
                const parentIndex = Math.floor((index - 1) / 2);
                const parent = this.heap[parentIndex];

                if (element <= parent) break;

                this.heap[index] = parent;
                index = parentIndex;
            }
            this.heap[index] = element;
        }

        drawHeap() {
            const heapDiv = document.getElementById('heap');
            heapDiv.innerHTML = '';
            this.drawLevel(heapDiv, 0, 0);
        }

        drawLevel(parent, level, index) {
            if (index >= this.heap.length) return;

            if (level === 0) {
                const node = this.createNode(this.heap[index]);
                parent.appendChild(node);
            } else {
                const levelDiv = document.createElement('div');
                const leftIndex = 2 * index + 1;
                const rightIndex = 2 * index + 2;

                levelDiv.appendChild(this.createNode(this.heap[index]));

                if (leftIndex < this.heap.length) {
                    const leftNode = this.createNode(this.heap[leftIndex]);
                    levelDiv.appendChild(this.createLine());
                    levelDiv.appendChild(leftNode);
                }

                if (rightIndex < this.heap.length) {
                    const rightNode = this.createNode(this.heap[rightIndex]);
                    levelDiv.appendChild(this.createLine());
                    levelDiv.appendChild(rightNode);
                }

                parent.appendChild(levelDiv);
            }

            this.drawLevel(parent, level + 1, 2 * index + 1);
            this.drawLevel(parent, level + 1, 2 * index + 2);
        }

        createNode(value) {
            const node = document.createElement('div');
            node.classList.add('node');
            node.innerText = value;
            return node;
        }

        createLine() {
            const line = document.createElement('div');
            line.classList.add('line');
            return line;
        }
    }

    const maxHeap = new MaxHeap();

    function insert() {
        const input = document.getElementById('value');
        const value = parseInt(input.value);

        if (!isNaN(value)) {
            maxHeap.insert(value);
            input.value = '';
        }
    }
</script>

</body>
</html>
