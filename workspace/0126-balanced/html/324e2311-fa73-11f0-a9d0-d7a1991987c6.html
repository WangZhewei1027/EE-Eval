<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PageRank Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        canvas {
            border: 1px solid #ccc;
            margin-top: 20px;
        }
        #nodes {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>PageRank Algorithm Demonstration</h1>
    <p>Click the button to see the PageRank values of the nodes.</p>
    <button onclick="calculatePageRank()">Calculate PageRank</button>
    <div id="nodes"></div>
    <canvas id="canvas" width="500" height="500"></canvas>

    <script>
        const graph = {
            A: ['B', 'C'],
            B: ['A', 'C'],
            C: ['A'],
            D: ['C'],
            E: ['B', 'D']
        };

        const d = 0.85; // Damping factor
        const numIterations = 100; // Number of iterations
        
        function calculatePageRank() {
            let ranks = {};
            let numNodes = Object.keys(graph).length;

            // Initialize ranks
            for (const node in graph) {
                ranks[node] = 1 / numNodes;
            }

            // Iterate to calculate PageRank
            for (let i = 0; i < numIterations; i++) {
                let newRanks = {};
                for (const node in graph) {
                    newRanks[node] = (1 - d) / numNodes;
                    for (const neighbor in graph) {
                        if (graph[neighbor].includes(node)) {
                            newRanks[node] += d * (ranks[neighbor] / graph[neighbor].length);
                        }
                    }
                }
                ranks = newRanks;
            }

            displayRanks(ranks);
            drawGraph(ranks);
        }

        function displayRanks(ranks) {
            const nodesDiv = document.getElementById('nodes');
            nodesDiv.innerHTML = "<h2>PageRank Values</h2>";
            for (const node in ranks) {
                nodesDiv.innerHTML += `<p>${node}: ${ranks[node].toFixed(4)}</p>`;
            }
        }

        function drawGraph(ranks) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const nodePositions = {
                A: { x: 100, y: 100 },
                B: { x: 300, y: 80 },
                C: { x: 250, y: 200 },
                D: { x: 400, y: 180 },
                E: { x: 200, y: 300 }
            };

            for (const node in nodePositions) {
                ctx.beginPath();
                const radius = ranks[node] * 300; // Scale size by PageRank
                ctx.arc(nodePositions[node].x, nodePositions[node].y, radius, 0, 2 * Math.PI);
                ctx.fillStyle = `rgba(0, 0, 255, ${ranks[node]})`;
                ctx.fill();
                ctx.stroke();
                ctx.closePath();
                ctx.fillStyle = "#000";
                ctx.fillText(node, nodePositions[node].x - 5, nodePositions[node].y + 5);
            }
        }
    </script>
</body>
</html>
