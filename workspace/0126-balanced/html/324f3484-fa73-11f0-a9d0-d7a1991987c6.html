<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congestion Control Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            display: none;
            justify-content: center;
            align-items: center;
        }
        #status {
            margin: 20px;
            font-size: 20px;
        }
        #container {
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s;
        }
    </style>
</head>
<body>

<h1>Congestion Control Simulation</h1>
<p>Click the button to simulate data packet transmission!</p>
<button id="startButton">Start Transmission</button>

<div id="container">
    <div id="status">Current State: Idle</div>
    <div id="overlay">Congestion Detected! Adjusting transmission rate...</div>
    <div id="trafficCircle" style="width: 50px; height: 50px; border-radius: 50%; background: green;"></div>
</div>

<script>
    let congestionThreshold = 5; // Number of successful transmissions before congestion
    let transmissionCount = 0; // Count of successful transmissions
    let isCongested = false;

    document.getElementById('startButton').addEventListener('click', startTransmission);

    function startTransmission() {
        // Reset values
        transmissionCount = 0;
        isCongested = false;
        updateStatus('Transmission started...');
        simulateTransmission();
    }

    function simulateTransmission() {
        if (isCongested) return;

        for (let i = 0; i < 10; i++) {
            setTimeout(() => {
                transmissionCount++;
                // Randomly simulate congestion
                if (Math.random() < 0.3) { // 30% chance of inducing congestion
                    induceCongestion();
                } else {
                    updateCircle('green');
                    if (transmissionCount >= congestionThreshold) {
                        updateStatus('Transmission successful! No congestion.');
                    } else {
                        updateStatus(`Current State: Transmitting... (${transmissionCount})`);
                    }
                }
            }, i * 1000); // Simulating 1-second intervals of transmission
        }
    }

    function induceCongestion() {
        isCongested = true;
        updateCircle('red');
        updateStatus('Current State: Congested!');

        // Show overlay for congestion detected
        document.getElementById('overlay').style.display = 'flex';
        
        // Simulate congestion control: wait for a short while, then resolve
        setTimeout(() => {
            isCongested = false;
            document.getElementById('overlay').style.display = 'none';
            transmissionCount = 0; // Reset the count after congestion
            updateCircle('yellow');
            updateStatus('Congestion resolved, adjusting transmission rate...');
            setTimeout(simulateTransmission, 3000); // Retry transmission after 3 seconds
        }, 2000);
    }

    function updateCircle(color) {
        document.getElementById('trafficCircle').style.background = color;
    }

    function updateStatus(message) {
        document.getElementById('status').innerText = message;
    }
</script>

</body>
</html>
