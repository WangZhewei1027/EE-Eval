<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple Routing Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f5f5f5;
    }
    header {
      background: #007acc;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    nav {
      background: #004d99;
      padding: 0.5rem;
      text-align: center;
    }
    nav a {
      color: white;
      margin: 0 1rem;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }
    nav a:hover {
      text-decoration: underline;
    }
    main {
      padding: 2rem;
      min-height: 60vh;
      background: white;
      max-width: 600px;
      margin: 2rem auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border-radius: 4px;
    }
    footer {
      text-align: center;
      padding: 1rem;
      color: #666;
    }
  </style>
</head>
<body>
  <header>
    <h1>Simple JavaScript Routing Demo</h1>
  </header>
  <nav>
    <a href="/" data-link>Home</a>
    <a href="/about" data-link>About</a>
    <a href="/contact" data-link>Contact</a>
  </nav>
  <main id="app">
    <!-- Content will be loaded here -->
  </main>
  <footer>
    &copy; 2024 Routing Demo
  </footer>

  <script>
    // Pages/templates
    const routes = {
      "/": `<h2>Home Page</h2><p>Welcome to our simple routing demo site! Click the links above to navigate.</p>`,
      "/about": `<h2>About Us</h2><p>This demonstration shows basic client-side routing using JavaScript and the History API.</p>`,
      "/contact": `<h2>Contact</h2>
        <p>You can reach us by email at <a href="mailto:contact@example.com">contact@example.com</a>.</p>`
    };

    const appDiv = document.getElementById('app');

    // Render route contents
    function render(path) {
      if (routes[path]) {
        appDiv.innerHTML = routes[path];
      } else {
        appDiv.innerHTML = `<h2>404 - Not Found</h2>
        <p>The page you are looking for does not exist.</p>`;
      }
    }

    // Handle navigation
    function onNavigate(event) {
      if (event.target.matches('a[data-link]')) {
        event.preventDefault();
        const href = event.target.getAttribute('href');
        history.pushState(null, null, href);
        render(href);
      }
    }

    // Handle back/forward buttons
    window.addEventListener('popstate', () => {
      render(window.location.pathname);
    });

    // Initial render
    document.addEventListener('DOMContentLoaded', () => {
      render(window.location.pathname);
      document.body.addEventListener('click', onNavigate);
    });
  </script>
</body>
</html>
