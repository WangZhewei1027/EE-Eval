<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked List Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        #listContainer {
            border: 1px solid #ccc;
            border-radius: 8px;
            background: white;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: row;
            overflow: auto;
        }
        .node {
            border: 1px solid #007bff;
            border-radius: 5px;
            padding: 10px;
            margin: 0 5px;
            position: relative;
        }
        .node:hover {
            background-color: #e7f3ff;
        }
        .arrow {
            width: 30px;
            height: 30px;
            position: relative;
            margin: 0 -15px;
        }
        .arrow:after {
            content: '→';
            font-size: 30px;
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>

<h1>Linked List Visualization</h1>
<div id="listContainer"></div>
<input type="text" id="nodeValue" placeholder="Enter node value" />
<button id="addNodeButton">Add Node</button>
<button id="deleteNodeButton">Delete Node</button>
<button id="clearListButton">Clear List</button>

<script>
    class Node {
        constructor(value) {
            this.value = value;
            this.next = null;
        }
    }

    class LinkedList {
        constructor() {
            this.head = null;
        }

        add(value) {
            const newNode = new Node(value);
            if (!this.head) {
                this.head = newNode;
            } else {
                let current = this.head;
                while (current.next) {
                    current = current.next;
                }
                current.next = newNode;
            }
            this.render();
        }

        delete(value) {
            if (!this.head) return;

            if (this.head.value === value) {
                this.head = this.head.next;
            } else {
                let current = this.head;
                while (current.next && current.next.value !== value) {
                    current = current.next;
                }
                if (current.next) {
                    current.next = current.next.next;
                }
            }
            this.render();
        }

        clear() {
            this.head = null;
            this.render();
        }

        render() {
            const container = document.getElementById('listContainer');
            container.innerHTML = '';
            let current = this.head;
            while (current) {
                const nodeDiv = document.createElement('div');
                nodeDiv.className = 'node';
                nodeDiv.textContent = current.value;
                container.appendChild(nodeDiv);

                if (current.next) {
                    const arrowDiv = document.createElement('div');
                    arrowDiv.className = 'arrow';
                    container.appendChild(arrowDiv);
                }

                current = current.next;
            }
        }
    }

    const linkedList = new LinkedList();
    
    document.getElementById('addNodeButton').onclick = function() {
        const value = document.getElementById('nodeValue').value;
        if (value) {
            linkedList.add(value);
            document.getElementById('nodeValue').value = '';
        }
    };

    document.getElementById('deleteNodeButton').onclick = function() {
        const value = document.getElementById('nodeValue').value;
        if (value) {
            linkedList.delete(value);
            document.getElementById('nodeValue').value = '';
        }
    };

    document.getElementById('clearListButton').onclick = function() {
        linkedList.clear();
    };
</script>

</body>
</html>
