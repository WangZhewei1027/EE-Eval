<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Networks Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 50px;
        }
        #canvas {
            border: 1px solid #555;
            display: block;
            margin: 0 auto;
        }
        .info {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>Simple Neural Network Demonstration</h1>
<p>This demonstration will show how a simple neural network can learn to classify points.</p>

<canvas id="canvas" width="600" height="400"></canvas>
<div class="info">
    <button id="trainBtn">Train Neural Network</button>
    <h2>Result:</h2>
    <div id="result"></div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const width = canvas.width;
    const height = canvas.height;

    // Neural Network constructor
    class NeuralNetwork {
        constructor() {
            this.weights = [
                [Math.random(), Math.random()],
                [Math.random(), Math.random()],
                [Math.random(), Math.random()]
            ];
            this.learningRate = 0.1;
        }

        // Activation function
        sigmoid(x) {
            return 1 / (1 + Math.exp(-x));
        }

        // Predict function
        predict(inputs) {
            const sum = this.weights[0][0] * inputs[0] + this.weights[1][0] * inputs[1] + this.weights[2][0];
            return this.sigmoid(sum);
        }

        // Train function
        train(data) {
            data.forEach((item) => {
                const inputs = item.inputs;
                const target = item.output;

                // Predict output
                const predicted = this.predict(inputs);
                const error = target - predicted;

                // Adjust weights
                this.weights.forEach((weight, index) => {
                    weight[0] += this.learningRate * error * inputs[index];
                });
            });
        }
    }

    const nn = new NeuralNetwork();
    const trainingData = [
        { inputs: [0, 0], output: 0 },
        { inputs: [0, 1], output: 1 },
        { inputs: [1, 0], output: 1 },
        { inputs: [1, 1], output: 0 }
    ];

    // Visualizing data points and neural network predictions
    function draw(points, predictions) {
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = 'black';
        
        // Draw data points
        points.forEach((point, index) => {
            ctx.beginPath();
            ctx.arc(point[0] * width, point[1] * height, 5, 0, 2 * Math.PI);
            ctx.fillStyle = point[2] === 1 ? 'blue' : 'red';
            ctx.fill();
        });

        // Draw results of neural network
        for (let x = 0; x <= width; x += 5) {
            for (let y = 0; y <= height; y += 5) {
                const prediction = nn.predict([x / width, y / height]);
                ctx.fillStyle = prediction > 0.5 ? 'rgba(0, 0, 255, 0.2)' : 'rgba(255, 0, 0, 0.2)';
                ctx.fillRect(x, y, 5, 5);
            }
        }
    }

    document.getElementById('trainBtn').onclick = function() {
        for (let i = 0; i < 10000; i++) {
            nn.train(trainingData);
        }
        const predictions = trainingData.map(item => nn.predict(item.inputs));
        draw(trainingData.map((item, index) => [...item.inputs, item.output]), predictions);
        document.getElementById('result').innerText = 'Neural Network Trained!';
    };

    draw(trainingData.map(item => [...item.inputs, item.output]), []);
</script>

</body>
</html>
