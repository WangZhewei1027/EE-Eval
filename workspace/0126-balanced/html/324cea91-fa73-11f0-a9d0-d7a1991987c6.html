<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red-Black Tree Visualization</title>
    <style>
        .node {
            display: inline-block;
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            text-align: center;
            position: relative;
        }
        .red {
            background-color: red;
            color: white;
        }
        .black {
            background-color: black;
            color: white;
        }
        .line {
            border-left: 2px solid black;
            height: 20px;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
        }
        .tree {
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <h1>Red-Black Tree Visualization</h1>
    <input type="number" id="value" placeholder="Enter value" />
    <button onclick="insert()">Insert</button>
    <div class="tree" id="tree"></div>

    <script>
        class Node {
            constructor(data) {
                this.data = data;
                this.color = 'red';  // New nodes are red
                this.left = null;
                this.right = null;
                this.parent = null;
            }
        }

        class RedBlackTree {
            constructor() {
                this.TNULL = new Node(0); // Sentinel node
                this.TNULL.color = 'black'; // TNULL is always black
                this.root = this.TNULL;
            }

            insert(data) {
                let node = new Node(data);
                node.parent = null;
                node.left = this.TNULL;
                node.right = this.TNULL;

                let y = null;
                let x = this.root;

                while (x !== this.TNULL) {
                    y = x;
                    if (node.data < x.data) {
                        x = x.left;
                    } else {
                        x = x.right;
                    }
                }

                node.parent = y;
                if (y === null) {
                    this.root = node;
                } else if (node.data < y.data) {
                    y.left = node;
                } else {
                    y.right = node;
                }

                node.color = 'red'; // New node is red
                this.fixInsert(node);
            }

            fixInsert(k) {
                while (k.parent && k.parent.color === 'red') {
                    if (k.parent === k.parent.parent.left) {
                        let uncle = k.parent.parent.right;
                        if (uncle && uncle.color === 'red') {
                            k.parent.color = 'black';
                            uncle.color = 'black';
                            k.parent.parent.color = 'red';
                            k = k.parent.parent;
                        } else {
                            if (k === k.parent.right) {
                                k = k.parent;
                                this.leftRotate(k);
                            }
                            k.parent.color = 'black';
                            k.parent.parent.color = 'red';
                            this.rightRotate(k.parent.parent);
                        }
                    } else {
                        let uncle = k.parent.parent.left;
                        if (uncle && uncle.color === 'red') {
                            k.parent.color = 'black';
                            uncle.color = 'black';
                            k.parent.parent.color = 'red';
                            k = k.parent.parent;
                        } else {
                            if (k === k.parent.left) {
                                k = k.parent;
                                this.rightRotate(k);
                            }
                            k.parent.color = 'black';
                            k.parent.parent.color = 'red';
                            this.leftRotate(k.parent.parent);
                        }
                    }
                }
                this.root.color = 'black';
            }

            leftRotate(x) {
                let y = x.right;
                x.right = y.left;

                if (y.left !== this.TNULL) {
                    y.left.parent = x;
                }
                y.parent = x.parent;

                if (x.parent === null) {
                    this.root = y;
                } else if (x === x.parent.left) {
                    x.parent.left = y;
                } else {
                    x.parent.right = y;
                }
                y.left = x;
                x.parent = y;
            }

            rightRotate(x) {
                let y = x.left;
                x.left = y.right;

                if (y.right !== this.TNULL) {
                    y.right.parent = x;
                }
                y.parent = x.parent;

                if (x.parent === null) {
                    this.root = y;
                } else if (x === x.parent.right) {
                    x.parent.right = y;
                } else {
                    x.parent.left = y;
                }
                y.right = x;
                x.parent = y;
            }

            display(node, container) {
                if (node !== this.TNULL) {
                    this.display(node.left, container);
                    const div = document.createElement('div');
                    div.className = `node ${node.color}`;
                    div.innerText = node.data;
                    container.appendChild(div);

                    if (node.color !== 'black') {
                        const line = document.createElement('div');
                        line.className = 'line';
                        container.appendChild(line);
                    }

                    this.display(node.right, container);
                }
            }
        }

        const tree = new RedBlackTree();

        function insert() {
            const value = document.getElementById('value').value;
            if (value) {
                tree.insert(parseInt(value));
                document.getElementById('tree').innerHTML = '';
                tree.display(tree.root, document.getElementById('tree'));
                document.getElementById('value').value = '';
            } else {
                alert("Please enter a valid number.");
            }
        }
    </script>
</body>
</html>
