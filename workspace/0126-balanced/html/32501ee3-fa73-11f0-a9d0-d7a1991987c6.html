<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backpropagation Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        #output {
            margin-top: 20px;
        }
        .layer {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        .neuron {
            width: 50px;
            height: 50px;
            border: 2px solid #3498db;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
            background-color: #ecf0f1;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Backpropagation Neural Network Demo</h1>
    <div class="layer" id="inputLayer">
        <div class="neuron">x1</div>
        <div class="neuron">x2</div>
    </div>
    <div class="layer" id="hiddenLayer">
        <div class="neuron">h1</div>
        <div class="neuron">h2</div>
    </div>
    <div class="layer" id="outputLayer">
        <div class="neuron">y</div>
    </div>
    <button onclick="train()">Train Neural Network</button>
    <div id="output"></div>

    <script>
        // Simple Example of Backpropagation

        // Inputs (x1, x2)
        const inputs = [
            [0, 0],
            [0, 1],
            [1, 0],
            [1, 1]
        ];

        // Expected output
        const expectedOutputs = [0, 0, 0, 1]; // AND operation

        // Initialize weights (hidden layer)
        let weightsHidden = [
            [Math.random(), Math.random()],
            [Math.random(), Math.random()]
        ];
        let outputWeights = [Math.random(), Math.random()];

        function sigmoid(x) {
            return 1 / (1 + Math.exp(-x));
        }

        function sigmoidDerivative(x) {
            return x * (1 - x);
        }

        function feedForward(input) {
            // Hidden layer
            let hiddenLayerOutput = weightsHidden.map(weights => 
                sigmoid(weights.reduce((sum, weight, i) => 
                    sum + weight * input[i], 0)
                )
            );

            // Output layer
            let output = sigmoid(hiddenLayerOutput.reduce((sum, weight, i) =>
                sum + outputWeights[i] * weight, 0)
            );

            return { hiddenLayerOutput, output };
        }

        function train() {
            const learningRate = 0.1;

            for (let epoch = 0; epoch < 5000; epoch++) {
                inputs.forEach((input, index) => {
                    // Feed forward
                    let { hiddenLayerOutput, output } = feedForward(input);

                    // Calculate error
                    let outputError = expectedOutputs[index] - output;

                    // Backpropagation
                    let outputDelta = outputError * sigmoidDerivative(output);

                    // Update output weights
                    outputWeights = outputWeights.map((w, i) => 
                        w + learningRate * outputDelta * hiddenLayerOutput[i]
                    );

                    hiddenLayerOutput.forEach((hOut, i) => {
                        // Calculate error for hidden layer
                        let hiddenError = outputDelta * outputWeights[i];
                        let hiddenDelta = hiddenError * sigmoidDerivative(hOut);

                        // Update hidden weights
                        weightsHidden[i] = weightsHidden[i].map((w, j) => 
                            w + learningRate * hiddenDelta * input[j]
                        );
                    });
                });
            }
            
            displayResults();
        }

        function displayResults() {
            let resultText = "Weights after training:<br>";
            resultText += "Hidden Weights:<br>";
            weightsHidden.forEach((weights, i) => {
                resultText += `h${i+1}: [${weights.join(', ')}]<br>`;
            });
            resultText += "Output Weights:<br>";
            resultText += `[${outputWeights.join(', ')}]<br>`;
            document.getElementById("output").innerHTML = resultText;
        }
    </script>
</body>
</html>
