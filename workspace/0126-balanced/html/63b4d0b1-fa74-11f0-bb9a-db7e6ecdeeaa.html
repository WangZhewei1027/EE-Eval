<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Authentication Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2rem;
    background: #f5f7fa;
    color: #333;
  }
  h1 {
    text-align: center;
    color: #0275d8;
  }
  #loginForm, #welcomeMessage {
    max-width: 350px;
    margin: 1.5rem auto;
    background: white;
    padding: 1.5rem;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  label {
    display: block;
    margin-bottom: .25rem;
    font-weight: bold;
  }
  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: .5rem;
    margin-bottom: 1rem;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  button {
    background-color: #0275d8;
    border: none;
    padding: 0.6rem 1.2rem;
    color: white;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    width: 100%;
  }
  button:hover {
    background-color: #025aa5;
  }
  #errorMessage {
    color: #d9534f;
    margin-bottom: 1rem;
    text-align: center;
  }
  #logoutBtn {
    background-color: #d9534f;
    margin-top: 1rem;
  }
  #logoutBtn:hover {
    background-color: #c9302c;
  }
  .note {
    font-size: 0.85rem;
    color: #555;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>

<h1>Simple Authentication Demo</h1>

<div id="loginForm">
  <div id="errorMessage"></div>
  <label for="username">Username:</label>
  <input type="text" id="username" autocomplete="username" />
  <label for="password">Password:</label>
  <input type="password" id="password" autocomplete="current-password" />
  <button id="loginBtn">Login</button>
  <div class="note">Try: <strong>user123 / pass123</strong></div>
</div>

<div id="welcomeMessage" style="display:none;">
  <h2>Welcome, <span id="userDisplay"></span>!</h2>
  <p>You are now logged in.</p>
  <button id="logoutBtn">Logout</button>
</div>

<script>
  /*
   * Authentication Demo:
   * This example demonstrates a very basic authentication flow on the client side.
   * WARNING: This is NOT secure for real production use.
   * It uses a hardcoded username/password and stores a token in sessionStorage
   * just to show the concept of signing in, signing out and state persistence.
   */

  (function() {
    // Hardcoded user "database"
    const USERS = {
      'user123': 'pass123'
    };

    // Elements
    const loginForm = document.getElementById('loginForm');
    const welcomeMessage = document.getElementById('welcomeMessage');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const errorMessage = document.getElementById('errorMessage');
    const userDisplay = document.getElementById('userDisplay');

    // Simple token generator for demo (not secure)
    function generateToken(username) {
      return btoa(username + ':' + new Date().getTime());
    }

    // Check if user is authenticated on page load
    function checkAuth() {
      const token = sessionStorage.getItem('authToken');
      const user = sessionStorage.getItem('authUser');
      if(token && user) {
        showWelcome(user);
      } else {
        showLogin();
      }
    }

    // Show login form
    function showLogin() {
      welcomeMessage.style.display = 'none';
      loginForm.style.display = 'block';
      errorMessage.textContent = '';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('username').focus();
    }

    // Show welcome message after login
    function showWelcome(username) {
      userDisplay.textContent = username;
      loginForm.style.display = 'none';
      welcomeMessage.style.display = 'block';
    }

    // Handle login attempt
    function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if(!username || !password) {
        errorMessage.textContent = 'Please enter both username and password.';
        return;
      }

      if(USERS[username] && USERS[username] === password) {
        // Auth success: store token and user in sessionStorage
        const token = generateToken(username);
        sessionStorage.setItem('authToken', token);
        sessionStorage.setItem('authUser', username);
        showWelcome(username);
      } else {
        errorMessage.textContent = 'Invalid username or password.';
      }
    }

    // Handle logout
    function logout() {
      sessionStorage.removeItem('authToken');
      sessionStorage.removeItem('authUser');
      showLogin();
    }

    // Event listeners
    loginBtn.addEventListener('click', login);
    logoutBtn.addEventListener('click', logout);

    // Also allow Enter key to submit login form
    loginForm.addEventListener('keyup', function(e) {
      if(e.key === 'Enter') {
        login();
      }
    });

    // On load check if already authenticated
    checkAuth();
  })();
</script>

</body>
</html>
