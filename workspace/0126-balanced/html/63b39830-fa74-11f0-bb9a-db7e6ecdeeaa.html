<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>REST API Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2rem;
    background: #f4f7f8;
    color: #333;
  }
  h1 {
    color: #007acc;
  }
  button {
    background-color: #007acc;
    color: white;
    border: none;
    padding: 0.5rem 1rem;
    margin: 0.5rem 0;
    cursor: pointer;
    border-radius: 4px;
    font-size: 1rem;
  }
  button:disabled {
    background-color: #99cbee;
    cursor: not-allowed;
  }
  pre {
    background: #e8f0fe;
    padding: 1rem;
    border-radius: 4px;
    overflow-x: auto;
  }
  .container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 2rem;
    border-radius: 8px;
    box-shadow: 0 0 10px #ccc;
  }
  label {
    font-weight: bold;
    display: block;
    margin: 1rem 0 0.25rem;
  }
  input, select {
    width: 100%;
    padding: 0.4rem 0.6rem;
    font-size: 1rem;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>REST API Demo</h1>
  <p>This demo shows how to interact with a <strong>REST API</strong> using JavaScript's <code>fetch()</code> method.</p>

  <label for="method">HTTP Method:</label>
  <select id="method">
    <option value="GET">GET</option>
    <option value="POST">POST</option>
    <option value="PUT">PUT</option>
    <option value="DELETE">DELETE</option>
  </select>

  <label for="url">API Endpoint URL:</label>
  <input type="text" id="url" readonly value="https://jsonplaceholder.typicode.com/posts" />

  <label for="payload">Request Payload (JSON):</label>
  <textarea id="payload" placeholder='e.g. {"title": "foo","body": "bar","userId": 1}' rows="5" style="width: 100%; font-family: monospace;"></textarea>

  <button id="sendBtn">Send Request</button>

  <h2>Response:</h2>
  <pre id="responseArea">Click "Send Request" to perform a REST API call.</pre>
</div>

<script>
  const methodSelect = document.getElementById('method');
  const payloadInput = document.getElementById('payload');
  const sendBtn = document.getElementById('sendBtn');
  const responseArea = document.getElementById('responseArea');

  function updatePayloadVisibility() {
    // GET and DELETE usually do not have body
    const method = methodSelect.value;
    if (method === 'GET' || method === 'DELETE') {
      payloadInput.disabled = true;
      payloadInput.value = '';
      payloadInput.placeholder = 'No request payload for GET or DELETE';
    } else {
      payloadInput.disabled = false;
      payloadInput.placeholder = 'e.g. {"title": "foo","body": "bar","userId": 1}';
    }
  }

  methodSelect.addEventListener('change', updatePayloadVisibility);
  updatePayloadVisibility();

  async function sendRequest() {
    const method = methodSelect.value;
    const url = document.getElementById('url').value.trim();

    let options = {
      method,
      headers: {
        'Accept': 'application/json',
      },
    };

    if (method === 'POST' || method === 'PUT') {
      if (!payloadInput.value.trim()) {
        alert('Please enter valid JSON payload for ' + method + ' request.');
        return;
      }
      try {
        JSON.parse(payloadInput.value); // validate JSON
      } catch (e) {
        alert('Invalid JSON payload: ' + e.message);
        return;
      }
      options.headers['Content-Type'] = 'application/json; charset=UTF-8';
      options.body = payloadInput.value;
    }

    sendBtn.disabled = true;
    responseArea.textContent = 'Sending request...';

    try {
      const res = await fetch(url, options);
      const contentType = res.headers.get('content-type') || '';

      let responseText;
      if (contentType.includes('application/json')) {
        const json = await res.json();
        responseText = JSON.stringify(json, null, 2);
      } else {
        responseText = await res.text();
      }

      responseArea.textContent = 
        `Status: ${res.status} ${res.statusText}\n\nHeaders:\n` +
        [...res.headers.entries()]
          .map(([k,v]) => `${k}: ${v}`)
          .join('\n') +
        `\n\nBody:\n${responseText}`;
    } catch (err) {
      responseArea.textContent = 'Error: ' + err.message;
    } finally {
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', sendRequest);
</script>
</body>
</html>
