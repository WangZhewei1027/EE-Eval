<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Array</title>
    <style>
        #dynamic-array {
            width: 500px;
            height: 200px;
            border: 1px solid #ccc;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Dynamic Array</h1>
    <button id="add-btn">Add Element</button>
    <button id="remove-btn">Remove Element</button>
    <button id="update-btn">Update Element</button>
    <button id="clear-btn">Clear Array</button>
    <div id="array-container"></div>

    <script>
        let dynamicArray = [];

        document.getElementById('add-btn').addEventListener('click', function() {
            let element = document.createElement('button');
            element.textContent = 'Dynamic Array ' + dynamicArray.length + ' elements';
            element.onclick = function() {
                dynamicArray.push(element.textContent);
                updateDisplay();
            };
            document.body.appendChild(element);
        });

        document.getElementById('remove-btn').addEventListener('click', function() {
            let index = parseInt(document.getElementById('remove-index').value);
            if (index >= 0 && index < dynamicArray.length) {
                dynamicArray.splice(index, 1);
                updateDisplay();
            } else {
                alert('Invalid index');
            }
        });

        document.getElementById('update-btn').addEventListener('click', function() {
            let index = parseInt(document.getElementById('update-index').value);
            if (index >= 0 && index < dynamicArray.length) {
                document.getElementById('update-value').value = dynamicArray[index];
                updateDisplay();
            } else {
                alert('Invalid index');
            }
        });

        document.getElementById('clear-btn').addEventListener('click', function() {
            dynamicArray = [];
            updateDisplay();
        });

        function updateDisplay() {
            let display = document.getElementById('array-container');
            display.innerHTML = '';
            dynamicArray.forEach(function(element) {
                let div = document.createElement('div');
                div.textContent = element;
                div.onclick = function() {
                    element.parentNode.removeChild(element);
                    updateDisplay();
                };
                display.appendChild(div);
            });
        }

        let removeIndex = 0;
        let updateIndex = 0;
        let updateValue = '';

        function addElement() {
            dynamicArray.push(document.createElement('button'));
            updateDisplay();
        }

        function removeElement() {
            if (removeIndex < dynamicArray.length) {
                document.getElementById('remove-index').value = removeIndex;
                updateDisplay();
            } else {
                alert('No elements to remove');
            }
        }

        function updateElement() {
            if (updateIndex < dynamicArray.length) {
                document.getElementById('update-index').value = updateIndex;
                document.getElementById('update-value').value = dynamicArray[updateIndex];
                updateDisplay();
            } else {
                alert('No elements to update');
            }
        }

        addElement();
    </script>
</body>
</html>
