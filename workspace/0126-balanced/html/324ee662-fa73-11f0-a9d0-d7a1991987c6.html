<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoSQL Concept Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: white;
        }
        h2 {
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }
        #output {
            margin-top: 20px;
            border: 1px solid #ddd;
            padding: 10px;
            background: #f0f0f0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>NoSQL Database Simulation</h2>
    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="email" placeholder="Enter Email">
    <button id="addDataBtn">Add Data</button>
    <button id="showDataBtn">Show Data</button>

    <div id="output"></div>
</div>

<script>
    // Simulated NoSQL Database using a simple JavaScript object
    let noSqlDatabase = {
        users: []
    };

    // Function to add user data
    function addUser() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;

        if (name && email) {
            noSqlDatabase.users.push({ name, email });
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            alert('User added.');
        } else {
            alert('Please fill in both fields.');
        }
    }

    // Function to show stored user data
    function showData() {
        const output = document.getElementById('output');
        output.innerHTML = JSON.stringify(noSqlDatabase, null, 2);
    }

    // Event listeners
    document.getElementById('addDataBtn').addEventListener('click', addUser);
    document.getElementById('showDataBtn').addEventListener('click', showData);
</script>

</body>
</html>
