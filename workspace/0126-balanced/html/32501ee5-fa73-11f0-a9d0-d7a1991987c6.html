<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encryption Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
        }
        input, button {
            margin-top: 10px;
        }
        textarea {
            width: 100%;
            height: 100px;
        }
    </style>
</head>
<body>
    <h1>Simple Encryption Example</h1>
    <label for="inputText">Enter Text to Encrypt:</label>
    <textarea id="inputText" placeholder="Type your message here..."></textarea>
    
    <button onclick="encryptText()">Encrypt Text</button>
    <button onclick="decryptText()">Decrypt Text</button>
    
    <h2>Output:</h2>
    <textarea id="outputText" placeholder="Encrypted or Decrypted text will appear here..." readonly></textarea>

    <script>
        const shift = 3; // Simple Caesar cipher shift value

        function encryptText() {
            const inputText = document.getElementById('inputText').value;
            const encryptedText = caesarCipher(inputText, shift);
            document.getElementById('outputText').value = encryptedText;
        }

        function decryptText() {
            const outputText = document.getElementById('outputText').value;
            const decryptedText = caesarCipher(outputText, -shift);
            document.getElementById('outputText').value = decryptedText;
        }

        function caesarCipher(str, shift) {
            return str.split('').map(char => {
                if (char.match(/[a-z]/i)) {
                    const code = char.charCodeAt();
                    const base = char <= 'Z' ? 65 : 97; // base for uppercase and lowercase
                    return String.fromCharCode(((code - base + shift) % 26 + 26) % 26 + base);
                }
                return char; // Return the character unchanged if it's not a letter
            }).join('');
        }
    </script>
</body>
</html>
