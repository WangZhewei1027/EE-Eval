<!DOCTYPE html>
<html>
<head>
    <title>B-Tree Index</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>B-Tree Index</h1>
    <table id="tree">
        <tr>
            <th>Key</th>
            <th>Value</th>
        </tr>
        <tr>
            <td>1</td>
            <td>10</td>
        </tr>
        <tr>
            <td>2</td>
            <td>20</td>
        </tr>
        <tr>
            <td>3</td>
            <td>30</td>
        </tr>
    </table>
    <script>
        class Node {
            constructor(key, value, left = null, right = null) {
                this.key = key;
                this.value = value;
                this.left = left;
                this.right = right;
            }
        }

        class BTree {
            constructor(root = null) {
                this.root = root;
            }

            insert(key, value) {
                if (this.root === null) {
                    this.root = new Node(key, value);
                } else {
                    this.root.insert(key, value);
                }
            }

            search(key) {
                return this.searchNode(this.root, key);
            }

            searchNode(node, key) {
                if (node === null) {
                    return null;
                }
                if (key < node.key) {
                    return this.searchNode(node.left, key);
                } else if (key > node.key) {
                    return this.searchNode(node.right, key);
                } else {
                    return node.value;
                }
            }

            delete(key) {
                this.root = this.root.delete(key);
            }
        }

        let tree = new BTree();

        function insert(node, key, value) {
            if (key < node.key) {
                if (node.left === null) {
                    node.left = new Node(key, value);
                } else {
                    insert(node.left, key, value);
                }
            } else if (key > node.key) {
                if (node.right === null) {
                    node.right = new Node(key, value);
                } else {
                    insert(node.right, key, value);
                }
            }
        }

        function search(node, key) {
            if (node === null) {
                return null;
            }
            if (key < node.key) {
                return search(node.left, key);
            } else if (key > node.key) {
                return search(node.right, key);
            } else {
                return node.value;
            }
        }

        function deleteNode(node, key) {
            if (node === null) {
                return null;
            }
            if (key < node.key) {
                node.left = deleteNode(node.left, key);
            } else if (key > node.key) {
                node.right = deleteNode(node.right, key);
            } else {
                if (node.left === null && node.right === null) {
                    return null;
                } else if (node.left === null) {
                    return node.right;
                } else if (node.right === null) {
                    return node.left;
                } else {
                    let min = findMin(node.right);
                    node.key = min.key;
                    node.value = min.value;
                    node.right = deleteNode(node.right, min.key);
                }
            }
            return node;
        }

        function findMin(node) {
            while (node.left !== null) {
                node = node.left;
            }
            return node;
        }

        function printTree(node, level = 0) {
            if (node !== null) {
                printTree(node.right, level + 1);
                console.log(' '.repeat(4 * level) + '| ' + ' '.repeat(4 * level - 1) + node.key + ' | ' + node.value);
                printTree(node.left, level + 1);
            }
        }

        tree.insert(1, 10);
        tree.insert(2, 20);
        tree.insert(3, 30);

        console.log('Search result: ', search(tree.root, 1).key, ' | ', search(tree.root, 1).value);
        console.log('Delete 1');
        tree.delete(1);
        console.log('Search result: ', search(tree.root, 1).key, ' | ', search(tree.root, 1).value);
        printTree(tree.root);
    </script>
</body>
</html>
