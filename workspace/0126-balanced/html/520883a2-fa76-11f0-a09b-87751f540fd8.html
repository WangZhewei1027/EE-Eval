<!DOCTYPE html>
<html>
<head>
    <title>Heap (Max)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #heap {
            width: 300px;
            height: 200px;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 20px;
            margin: 40px auto;
            text-align: center;
        }
        #heap input[type="number"] {
            width: 100%;
            height: 30px;
            margin-bottom: 10px;
            padding: 5px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Heap (Max)</h1>
    <div id="heap"></div>
    <input type="number" id="input" value="5">
    <button onclick="heapifyUp()">Heapify Up</button>
    <button onclick="heapifyDown()">Heapify Down</button>

    <script>
        function heapifyUp() {
            let n = parseInt(document.getElementById('input').value);
            let temp = n;
            while (temp > 1) {
                let parent = Math.floor(temp / 2);
                if (n > parent) {
                    let tempValue = n;
                    let temp2Value = parent;
                    if (n > parent) {
                        if (n > parent * 2) {
                            tempValue = parent * 2;
                        } else {
                            tempValue = parent * 2 + 1;
                        }
                    }
                    if (tempValue < temp2Value) {
                        let temp3 = temp;
                        let temp4 = temp2;
                        if (tempValue < temp) {
                            temp3 = temp;
                            temp4 = temp2;
                        }
                        if (tempValue < temp2Value) {
                            tempValue = temp2Value;
                            temp2Value = temp3;
                        }
                        [temp, temp2] = [temp2, temp3];
                        temp = temp2Value;
                        temp2 = temp4;
                    }
                    temp = tempValue;
                }
                n = temp;
            }
        }

        function heapifyDown() {
            let n = parseInt(document.getElementById('input').value);
            let temp = n;
            let left = 2 * temp;
            let right = 2 * temp + 1;
            let smallest = temp;
            if (left < n && parseInt(document.getElementById('heap').innerHTML) < parseInt(document.getElementById('heap').innerHTML).split(' ')[left - 1]) {
                smallest = left;
                if (right < n && parseInt(document.getElementById('heap').innerHTML) < parseInt(document.getElementById('heap').innerHTML).split(' ')[right - 1]) {
                    smallest = right;
                }
            }
            if (smallest < n) {
                let tempValue = parseInt(document.getElementById('heap').innerHTML);
                let temp2Value = parseInt(document.getElementById('heap').innerHTML).split(' ')[smallest - 1];
                if (smallest < left) {
                    let temp3 = parseInt(document.getElementById('heap').innerHTML);
                    let temp4 = parseInt(document.getElementById('heap').innerHTML).split(' ')[smallest - 1];
                    if (smallest < left) {
                        tempValue = parseInt(document.getElementById('heap').innerHTML).split(' ')[left - 1];
                        temp2Value = temp3;
                        temp3 = temp4;
                    }
                    if (smallest < right) {
                        tempValue = parseInt(document.getElementById('heap').innerHTML).split(' ')[right - 1];
                        temp2Value = temp3;
                        temp3 = temp4;
                    }
                    [temp, temp2] = [temp2, temp3];
                    temp = temp2Value;
                    temp2 = temp4;
                }
                temp = smallest;
                temp2 = temp4;
            }
            temp = smallest;
            temp2 = temp4;
            if (temp < n) {
                let temp3 = temp;
                let temp4 = temp2;
                if (temp < left) {
                    temp3 = left;
                    temp4 = left + 1;
                }
                if (temp < right) {
                    temp3 = right;
                    temp4 = right + 1;
                }
                [temp, temp2] = [temp2, temp3];
                temp = temp2Value;
                temp2 = temp4Value;
            }
            temp = tempValue;
            temp2 = temp4Value;
            document.getElementById('heap').innerHTML = temp + ' ' + temp2;
        }
    </script>
</body>
</html>
