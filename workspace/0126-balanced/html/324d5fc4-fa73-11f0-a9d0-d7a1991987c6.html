<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucket Sort Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        .array-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin: 20px 0;
        }
        .bar {
            width: 30px;
            margin: 0 5px;
            background-color: teal;
            display: inline-block;
            transition: height 0.2s;
        }
    </style>
</head>
<body>

<h1>Bucket Sort Visualization</h1>
<button onclick="startBucketSort()">Sort Array</button>
<div class="array-container" id="array-container"></div>

<script>
    const array = [0.78, 0.17, 0.39, 0.26, 0.72, 0.94, 0.21, 0.12, 0.55, 0.89];

    function renderArray(arr) {
        const container = document.getElementById('array-container');
        container.innerHTML = '';
        arr.forEach(value => {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = `${value * 300}px`; // Scale the height for better visibility
            container.appendChild(bar);
        });
    }

    function bucketSort(arr) {
        const buckets = Array.from({ length: 10 }, () => []);

        // Distributing values into buckets
        arr.forEach((value) => {
            const index = Math.floor(value * 10);
            buckets[index].push(value);
        });

        // Sorting each bucket and concatenating
        return buckets.flatMap(bucket => bucket.sort((a, b) => a - b));
    }

    function startBucketSort() {
        renderArray(array);
        const sortedArray = bucketSort(array);
        renderArray(sortedArray);
    }

    // Initial render
    renderArray(array);
</script>

</body>
</html>
