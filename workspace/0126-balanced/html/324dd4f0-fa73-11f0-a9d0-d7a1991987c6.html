<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijkstra's Algorithm Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        canvas {
            border: 1px solid #ccc;
            background-color: #fff;
        }
        #controls {
            margin: 20px 0;
        }
        .node {
            fill: #3498db;
            cursor: pointer;
        }
        .visited {
            fill: #2ecc71;
        }
        .line {
            stroke: #34495e;
            stroke-width: 2;
        }
    </style>
</head>
<body>

<h1>Dijkstra's Algorithm Visualization</h1>
<canvas id="graphCanvas" width="600" height="400"></canvas>
<div id="controls">
    <button id="startButton">Start Dijkstra's Algorithm</button>
</div>
<script>
    const canvas = document.getElementById("graphCanvas");
    const ctx = canvas.getContext("2d");

    const nodes = [
        { id: 0, x: 100, y: 100, edges: [{ to: 1, weight: 4 }, { to: 2, weight: 1 }] },
        { id: 1, x: 300, y: 100, edges: [{ to: 3, weight: 1 }] },
        { id: 2, x: 100, y: 300, edges: [{ to: 1, weight: 2 }, { to: 3, weight: 5 }] },
        { id: 3, x: 300, y: 300, edges: [] }
    ];
    
    let shortestPaths = [];
    const startNode = 0;

    function drawGraph() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        nodes.forEach(node => {
            // Draw edges
            node.edges.forEach(edge => {
                const targetNode = nodes[edge.to];
                ctx.beginPath();
                ctx.moveTo(node.x, node.y);
                ctx.lineTo(targetNode.x, targetNode.y);
                ctx.strokeStyle = "rgba(52, 73, 94, 0.5)";
                ctx.stroke();
                ctx.fillText(edge.weight, (node.x + targetNode.x) / 2, (node.y + targetNode.y) / 2);
            });

            // Draw nodes
            ctx.beginPath();
            ctx.arc(node.x, node.y, 20, 0, Math.PI * 2);
            ctx.fillStyle = shortestPaths[node.id] ? "#2ecc71" : "#3498db"; // Visited or not
            ctx.fill();
            ctx.stroke();
            ctx.fillText(node.id, node.x - 5, node.y + 5); // Node ID
        });
    }

    async function dijkstra() {
        const distances = new Array(nodes.length).fill(Infinity);
        const visited = new Array(nodes.length).fill(false);
        distances[startNode] = 0;

        for (let i = 0; i < nodes.length; i++) {
            // Get the unvisited node with the smallest distance
            let minDistance = Infinity;
            let currentNode = -1;

            for (let j = 0; j < nodes.length; j++) {
                if (!visited[j] && distances[j] < minDistance) {
                    minDistance = distances[j];
                    currentNode = j;
                }
            }

            if (currentNode === -1) break; // All remaining nodes are inaccessible

            visited[currentNode] = true;
            shortestPaths[currentNode] = true;
            drawGraph();

            await new Promise(resolve => setTimeout(resolve, 1000)); // Slow down for visualization

            nodes[currentNode].edges.forEach(edge => {
                const newDist = distances[currentNode] + edge.weight;
                if (newDist < distances[edge.to]) {
                    distances[edge.to] = newDist;
                }
            });
        }
        
        drawGraph();
        console.log("Shortest Distances: ", distances);
    }

    document.getElementById("startButton").addEventListener("click", () => {
        shortestPaths = [];
        drawGraph();
        dijkstra();
    });

    drawGraph();
</script>

</body>
</html>
