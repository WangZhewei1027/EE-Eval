<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heap Sort Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }
        #array {
            display: flex;
            justify-content: center;
            margin: 10px 0;
        }
        .bar {
            width: 20px;
            margin: 0 2px;
            background-color: #007bff;
            display: inline-block;
            transition: 0.3s;
        }
        #controls {
            margin: 20px;
        }
    </style>
</head>
<body>

    <h1>Heap Sort Visualization</h1>
    <div id="array"></div>

    <div id="controls">
        <button onclick="startHeapSort()">Start Heap Sort</button>
        <button onclick="generateArray()">Generate Random Array</button>
    </div>

    <script>
        let array = [];
        const arraySize = 20;

        function generateArray() {
            array = Array.from({length: arraySize}, () => Math.floor(Math.random() * 100) + 1);
            drawArray();
        }

        function drawArray() {
            const arrayElement = document.getElementById('array');
            arrayElement.innerHTML = '';
            array.forEach(value => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${value * 3}px`;
                arrayElement.appendChild(bar);
            });
        }

        function heapify(arr, n, i) {
            let largest = i;
            let left = 2 * i + 1;
            let right = 2 * i + 2;

            if (left < n && arr[left] > arr[largest]) {
                largest = left;
            }

            if (right < n && arr[right] > arr[largest]) {
                largest = right;
            }

            if (largest !== i) {
                [arr[i], arr[largest]] = [arr[largest], arr[i]];
                drawArray();
                // Simulate delay for visualization
                return new Promise(resolve => setTimeout(resolve, 300))
                         .then(() => heapify(arr, n, largest));
            }
            return Promise.resolve();
        }

        async function heapSort() {
            const n = array.length;

            for (let i = Math.floor(n / 2) - 1; i >= 0; i--) {
                await heapify(array, n, i);
            }

            for (let i = n - 1; i > 0; i--) {
                [array[0], array[i]] = [array[i], array[0]];
                drawArray();                
                // Simulate delay for visualization
                await new Promise(resolve => setTimeout(resolve, 300));
                await heapify(array, i, 0);
            }
        }

        function startHeapSort() {
            heapSort();
        }

        window.onload = generateArray; // Generate initial array on page load.
    </script>

</body>
</html>
