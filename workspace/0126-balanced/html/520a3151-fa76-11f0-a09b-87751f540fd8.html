<!DOCTYPE html>
<html>
<head>
    <title>Deadlock Example</title>
</head>
<body>
    <h1>Deadlock Example</h1>
    <button id="button1">Button 1</button>
    <button id="button2">Button 2</button>
    <button id="button3">Button 3</button>
    <button id="button4">Button 4</button>

    <script>
        let buttons = document.querySelectorAll('button');
        let locks = {
            button1: {
                locked: false,
                id: 'lock1'
            },
            button2: {
                locked: false,
                id: 'lock2'
            },
            button3: {
                locked: false,
                id: 'lock3'
            },
            button4: {
                locked: false,
                id: 'lock4'
            }
        };

        function lockButton(button) {
            if (buttons[button].locked) {
                alert('Button is already locked');
                return;
            }
            buttons[button].locked = true;
            console.log(`Button ${button} is now locked`);
            setTimeout(() => {
                buttons[button].locked = false;
                console.log(`Button ${button} is now unlocked`);
            }, 1000);
        }

        function unlockButton(button) {
            if (!buttons[button].locked) {
                alert('Button is already unlocked');
                return;
            }
            buttons[button].locked = false;
            console.log(`Button ${button} is now unlocked`);
        }

        function deadlock() {
            setTimeout(() => {
                lockButton(buttons[0]);
                lockButton(buttons[1]);
                lockButton(buttons[2]);
                lockButton(buttons[3]);
            }, 2000);
        }

        buttons[0].addEventListener('click', deadlock);
        buttons[1].addEventListener('click', deadlock);
        buttons[2].addEventListener('click', deadlock);
        buttons[3].addEventListener('click', deadlock);
    </script>
</body>
</html>
