<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket Programming Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #messages {
            border: 1px solid #ccc;
            padding: 10px;
            height: 200px;
            overflow-y: scroll;
        }
        #form {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>WebSocket Socket Programming Demo</h1>
    <div id="messages"></div>
    <form id="form">
        <input type="text" id="messageInput" placeholder="Type a message..." required />
        <button type="submit">Send</button>
    </form>

    <script>
        // Create a new WebSocket connection
        const socket = new WebSocket('ws://localhost:8080');

        // DOM Elements
        const messagesDiv = document.getElementById('messages');
        const form = document.getElementById('form');
        const messageInput = document.getElementById('messageInput');

        // Listen for messages from the server
        socket.addEventListener('message', (event) => {
            const message = event.data;
            messagesDiv.innerHTML += `<div>${message}</div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight; // Scroll to bottom
        });

        // Handling form submission
        form.addEventListener('submit', (event) => {
            event.preventDefault(); // Prevent form from refreshing the page
            const message = messageInput.value;
            socket.send(message); // Send message to server
            messageInput.value = ''; // Clear input field
        });

        // Handle connection open
        socket.addEventListener('open', () => {
            messagesDiv.innerHTML += '<div>Connected to server</div>';
        });

        // Handle connection close
        socket.addEventListener('close', () => {
            messagesDiv.innerHTML += '<div>Disconnected from server</div>';
        });
        
        // Handle errors
        socket.addEventListener('error', (error) => {
            console.error('WebSocket error:', error);
        });
    </script>

    <script>
        // Simple WebSocket server setup using Node.js
        const WebSocket = require('ws');
        const server = new WebSocket.Server({ port: 8080 });

        server.on('connection', (ws) => {
            console.log('Client connected');

            ws.on('message', (message) => {
                console.log('Received: %s', message);
                // Broadcast the message to all connected clients
                server.clients.forEach((client) => {
                    if (client.readyState === WebSocket.OPEN) {
                        client.send(message);
                    }
                });
            });

            ws.on('close', () => {
                console.log('Client disconnected');
            });
        });

        console.log('WebSocket server is running on ws://localhost:8080');
    </script>
</body>
</html>
