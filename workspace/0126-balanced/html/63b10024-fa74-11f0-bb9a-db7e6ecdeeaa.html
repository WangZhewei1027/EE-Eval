<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Heap Sort Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 1em;
    background: #f5f5f5;
    color: #333;
  }
  h1 {
    text-align: center;
  }
  #arrayContainer {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    margin: 2em 0;
    height: 200px;
  }
  .bar {
    margin: 0 2px;
    background-color: #4a90e2;
    width: 20px;
    transition: all 0.3s ease;
    border-radius: 3px 3px 0 0;
  }
  .bar.active {
    background-color: #e94e77;
  }
  .bar.sorted {
    background-color: #28a745;
  }
  #controls {
    text-align: center;
  }
  #controls button, #controls input {
    font-size: 1em;
    margin: 0 0.25em;
    padding: 0.5em 1em;
  }
  #log {
    max-height: 200px;
    overflow-y: auto;
    background: #eee;
    border-radius: 5px;
    padding: 1em;
    font-family: monospace;
    font-size: 0.9em;
  }
</style>
</head>
<body>
<h1>Heap Sort Visualization</h1>
<div id="arrayContainer"></div>
<div id="controls">
  <label for="arraySize">Array Size: </label>
  <input type="number" id="arraySize" min="5" max="50" value="20" />
  <button id="generateBtn">Generate New Array</button>
  <button id="startBtn">Start Heap Sort</button>
</div>
<h3>Log / Steps</h3>
<div id="log"></div>

<script>
(() => {
  const arrayContainer = document.getElementById('arrayContainer');
  const generateBtn = document.getElementById('generateBtn');
  const startBtn = document.getElementById('startBtn');
  const logContainer = document.getElementById('log');
  const arraySizeInput = document.getElementById('arraySize');

  let array = [];
  let bars = [];
  let heapSize = 0;
  let sorting = false;

  function log(message) {
    const el = document.createElement('div');
    el.textContent = message;
    logContainer.appendChild(el);
    logContainer.scrollTop = logContainer.scrollHeight;
  }

  function generateArray(size) {
    array = [];
    for (let i = 0; i < size; i++) {
      array.push(Math.floor(Math.random() * 150) + 20);
    }
    renderArray();
    logContainer.innerHTML = "";
    log(`Generated new array: [${array.join(', ')}]`);
  }

  function renderArray(activeIndices = [], sortedIndices = []) {
    arrayContainer.innerHTML = '';
    bars = [];
    const maxVal = Math.max(...array);
    array.forEach((value, idx) => {
      const bar = document.createElement('div');
      bar.classList.add('bar');
      const heightPercent = (value / maxVal) * 100;
      bar.style.height = heightPercent + '%';
      if (activeIndices.includes(idx)) bar.classList.add('active');
      if (sortedIndices.includes(idx)) bar.classList.add('sorted');
      bar.title = value;
      bars.push(bar);
      arrayContainer.appendChild(bar);
    });
  }

  // Swap elements in array and update bars
  function swap(i, j) {
    [array[i], array[j]] = [array[j], array[i]];
  }

  // Heapify subtree rooted with node i, size is heapSize
  async function heapify(n, i) {
    let largest = i;
    let left = 2 * i + 1;
    let right = 2 * i + 2;

    renderArray([i, left, right].filter(x => x < n));
    await pause(500);

    if (left < n && array[left] > array[largest]) {
      largest = left;
    }
    if (right < n && array[right] > array[largest]) {
      largest = right;
    }

    if (largest !== i) {
      log(`Swapping elements at indices ${i} (${array[i]}) and ${largest} (${array[largest]})`);
      swap(i, largest);
      renderArray([i, largest]);
      await pause(500);
      await heapify(n, largest);
    }
  }

  // Pause helper
  function pause(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // Build a maxheap
  async function buildHeap(n) {
    log("Building max heap...");
    // Index of last non-leaf node
    for (let i = Math.floor(n / 2) - 1; i >= 0; i--) {
      log(`Heapifying subtree rooted at index ${i}`);
      await heapify(n, i);
    }
    log("Max heap built.");
  }

  async function heapSort() {
    if (sorting) return;
    sorting = true;
    logContainer.innerHTML = '';
    log(`Starting Heap Sort on array: [${array.join(', ')}]`);
    let n = array.length;

    await buildHeap(n);

    for (let i = n - 1; i > 0; i--) {
      log(`Swapping root (${array[0]}) with element at index ${i} (${array[i]})`);
      swap(0, i);
      renderArray([], Array.from({length: n - i}, (_, idx) => n - 1 - idx));
      await pause(700);
      await heapify(i, 0);
    }
    renderArray([], Array.from({length: n}, (_, idx) => idx));
    log("Heap Sort complete. Array sorted.");
    sorting = false;
  }

  generateBtn.onclick = () => {
    if (sorting) return;
    let size = parseInt(arraySizeInput.value);
    if (isNaN(size) || size < 5 || size > 50) {
      alert("Array size must be between 5 and 50.");
      return;
    }
    generateArray(size);
  };

  startBtn.onclick = () => {
    if (sorting) return;
    heapSort();
  };

  // Initialize with default size
  generateArray(parseInt(arraySizeInput.value));
})();
</script>
</body>
</html>
