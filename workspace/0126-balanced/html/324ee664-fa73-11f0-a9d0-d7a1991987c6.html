<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Tree Index Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #bTree {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .node {
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #000;
            border-radius: 5px;
            margin: 5px;
            padding: 10px;
            width: 60px;
            background-color: #f9f9f9;
        }
        .link {
            display: block;
            border-left: 1px solid #000;
            height: 20px;
            margin-left: 29px;
        }
    </style>
</head>
<body>

<h1>B-Tree Index Demonstration</h1>
<p>This simulation illustrates how a B-Tree Index works with insertion and search operations.</p>
<div id="controls">
    <input type="number" id="valueInput" placeholder="Value to insert" min="0">
    <button onclick="insertNode()">Insert Node</button>
    <button onclick="searchNode()">Search Node</button>
</div>
<div id="searchResult"></div>

<div id="bTree"></div>

<script>
    class BTreeNode {
        constructor(t) {
            this.leaf = true;
            this.keys = [];
            this.children = [];
            this.t = t; // Minimum degree
        }
    }

    class BTree {
        constructor(t) {
            this.root = null;
            this.t = t;
        }

        insert(k) {
            if (!this.root) {
                this.root = new BTreeNode(this.t);
                this.root.keys.push(k);
            } else {
                if (this.root.keys.length === 2 * this.t - 1) {
                    let s = new BTreeNode(this.t);
                    s.leaf = false;
                    s.children.push(this.root);
                    this.splitChild(s, 0);
                    this.insertNonFull(s, k);
                    this.root = s;
                } else {
                    this.insertNonFull(this.root, k);
                }
            }
            this.render();
        }

        insertNonFull(node, k) {
            let i = node.keys.length - 1;
            if (node.leaf) {
                node.keys.push(null);
                while (i >= 0 && k < node.keys[i]) {
                    node.keys[i + 1] = node.keys[i];
                    i--;
                }
                node.keys[i + 1] = k;
            } else {
                while (i >= 0 && k < node.keys[i]) {
                    i--;
                }
                i++;
                if (node.children[i].keys.length === 2 * this.t - 1) {
                    this.splitChild(node, i);
                    if (k > node.keys[i]) {
                        i++;
                    }
                }
                this.insertNonFull(node.children[i], k);
            }
        }

        splitChild(parent, i) {
            let t = this.t;
            let y = parent.children[i];
            let z = new BTreeNode(t);
            z.leaf = y.leaf;
            for (let j = 0; j < t - 1; j++) {
                z.keys.push(y.keys[j + t]);
            }
            if (!y.leaf) {
                for (let j = 0; j < t; j++) {
                    z.children.push(y.children[j + t]);
                }
            }
            parent.children.splice(i + 1, 0, z);
            parent.keys.splice(i, 0, y.keys[t - 1]);
            y.keys.splice(t - 1, t);
        }

        search(k, node) {
            if (!node) {
                return false;
            }
            let i = 0;
            while (i < node.keys.length && k > node.keys[i]) {
                i++;
            }
            if (i < node.keys.length && k === node.keys[i]) {
                return true;
            }
            return node.leaf ? false : this.search(k, node.children[i]);
        }

        render() {
            const bTreeDiv = document.getElementById('bTree');
            bTreeDiv.innerHTML = '';
            this.renderNode(this.root, bTreeDiv);
        }

        renderNode(node, parentDiv) {
            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'node';
            nodeDiv.textContent = node.keys.join(', ');

            parentDiv.appendChild(nodeDiv);

            if (!node.leaf) {
                node.children.forEach(child => {
                    const link = document.createElement('div');
                    link.className = 'link';
                    parentDiv.appendChild(link);
                    this.renderNode(child, parentDiv);
                });
            }
        }
    }

    const bTree = new BTree(2);

    function insertNode() {
        const valueInput = document.getElementById('valueInput');
        const value = parseInt(valueInput.value, 10);
        if (!isNaN(value)) {
            bTree.insert(value);
            valueInput.value = '';
        }
    }

    function searchNode() {
        const valueInput = document.getElementById('valueInput');
        const value = parseInt(valueInput.value, 10);
        const result = bTree.search(value, bTree.root);
        const searchResultDiv = document.getElementById('searchResult');
        searchResultDiv.textContent = result ? `Value ${value} found in the B-Tree.` : `Value ${value} not found in the B-Tree.`;
    }

</script>

</body>
</html>
