<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Encryption Demonstration</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 2rem;
    background: #f4f6f8;
    color: #333;
  }
  h1 {
    text-align: center;
    color: #20435c;
  }
  .container {
    max-width: 600px;
    margin: 1rem auto;
    background: white;
    padding: 1.5rem 2rem;
    border-radius: 8px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
  }
  label {
    font-weight: bold;
    display: block;
    margin-top: 1rem;
    margin-bottom: .4rem;
  }
  textarea, input[type="text"] {
    width: 100%;
    box-sizing: border-box;
    font-size: 1rem;
    padding: .5rem;
    border-radius: 4px;
    border: 1px solid #ccc;
  }
  button {
    margin-top: 1.2rem;
    padding: 0.6rem 1.2rem;
    background: #20435c;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 1rem;
  }
  button:hover {
    background: #1a3550;
  }
  .output {
    margin-top: 1rem;
    padding: 1rem;
    background: #eef5f9;
    border-radius: 4px;
    font-family: "Courier New", monospace;
    white-space: pre-wrap;
    word-break: break-all;
    user-select: all;
  }
  .note {
    font-size: 0.9rem;
    color: #666;
    margin-top: 0.4rem;
  }
</style>
</head>
<body>

<h1>Encryption Concept Demonstration</h1>

<div class="container">
  <label for="plaintext">Step 1: Enter Plaintext (Message to Encrypt)</label>
  <textarea id="plaintext" rows="4" placeholder="Type your message here..."></textarea>
  
  <label for="key">Step 2: Enter Key (Secret phrase)</label>
  <input type="text" id="key" placeholder="Enter secret key" />

  <button id="encryptBtn">Encrypt Message</button>

  <label for="ciphertext">Encrypted Output (Ciphertext)</label>
  <div id="ciphertext" class="output" aria-live="polite" aria-atomic="true"></div>

  <button id="decryptBtn" style="display:none;">Decrypt Message</button>

  <label for="decrypted" style="display:none;">Decrypted Output (Original message)</label>
  <div id="decrypted" class="output" style="display:none;" aria-live="polite" aria-atomic="true"></div>

  <p class="note">
    This demo uses the Vigenère cipher, a classical encryption method, to illustrate how encryption and decryption work with a key.
  </p>
</div>

<script>
// Vigenère cipher encryption/decryption implementation

function isLetter(char) {
  return /[A-Z]/i.test(char);
}

function toCharCodeUpper(char) {
  return char.toUpperCase().charCodeAt(0) - 65; // 0-based index A=0 ... Z=25
}

function fromCharCodeUpper(code) {
  return String.fromCharCode(code + 65);
}

function vigenereEncrypt(plaintext, key) {
  let result = '';
  key = key.toUpperCase().replace(/[^A-Z]/g, '');
  if (key.length === 0) return null;
  let keyIndex = 0;

  for (let char of plaintext) {
    if (isLetter(char)) {
      let p = toCharCodeUpper(char);
      let k = toCharCodeUpper(key[keyIndex % key.length]);
      let c = (p + k) % 26;
      // Preserve original case
      result += char === char.toUpperCase() ? fromCharCodeUpper(c) : fromCharCodeUpper(c).toLowerCase();
      keyIndex++;
    } else {
      result += char;
    }
  }
  return result;
}

function vigenereDecrypt(ciphertext, key) {
  let result = '';
  key = key.toUpperCase().replace(/[^A-Z]/g, '');
  if (key.length === 0) return null;
  let keyIndex = 0;

  for (let char of ciphertext) {
    if (isLetter(char)) {
      let c = toCharCodeUpper(char);
      let k = toCharCodeUpper(key[keyIndex % key.length]);
      let p = (c - k + 26) % 26;
      result += char === char.toUpperCase() ? fromCharCodeUpper(p) : fromCharCodeUpper(p).toLowerCase();
      keyIndex++;
    } else {
      result += char;
    }
  }
  return result;
}

// DOM elements
const plaintextInput = document.getElementById('plaintext');
const keyInput = document.getElementById('key');
const encryptBtn = document.getElementById('encryptBtn');
const ciphertextOutput = document.getElementById('ciphertext');
const decryptBtn = document.getElementById('decryptBtn');
const decryptedOutput = document.getElementById('decrypted');
const decryptedLabel = decryptedOutput.previousElementSibling;

// Event listeners

encryptBtn.addEventListener('click', () => {
  let plaintext = plaintextInput.value.trim();
  let key = keyInput.value.trim();

  if (!plaintext) {
    alert('Please enter a message to encrypt.');
    return;
  }
  if (!key) {
    alert('Please enter a secret key.');
    return;
  }

  let ciphertext = vigenereEncrypt(plaintext, key);
  if (ciphertext === null) {
    alert('The key must contain at least one alphabetical character.');
    return;
  }

  ciphertextOutput.textContent = ciphertext;
  decryptBtn.style.display = 'inline-block';
  decryptedOutput.style.display = 'none';
  decryptedLabel.style.display = 'none';
});

decryptBtn.addEventListener('click', () => {
  let ciphertext = ciphertextOutput.textContent.trim();
  let key = keyInput.value.trim();

  if (!ciphertext) {
    alert('No ciphertext to decrypt.');
    return;
  }
  if (!key) {
    alert('Please enter the secret key used for encryption.');
    return;
  }

  let decrypted = vigenereDecrypt(ciphertext, key);
  if (decrypted === null) {
    alert('The key must contain at least one alphabetical character.');
    return;
  }

  decryptedOutput.textContent = decrypted;
  decryptedOutput.style.display = 'block';
  decryptedLabel.style.display = 'block';
});
</script>

</body>
</html>
