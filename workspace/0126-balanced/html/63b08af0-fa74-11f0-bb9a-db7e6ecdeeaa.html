<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Red-Black Tree Visualization and Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 10px;
    background: #f9f9f9;
    overflow-x: hidden;
  }
  h1 {
    text-align: center;
  }
  #controls {
    max-width: 600px;
    margin: 0 auto 15px;
    text-align: center;
  }
  #controls input[type="number"] {
    width: 100px;
    padding: 6px;
    font-size: 1rem;
  }
  #controls button {
    padding: 6px 15px;
    font-size: 1rem;
    margin-left: 5px;
    cursor: pointer;
  }
  #message {
    max-width: 600px;
    margin: 5px auto;
    text-align: center;
    min-height: 1.4em;
    font-weight: bold;
  }
  #treeContainer {
    display: flex;
    justify-content: center;
    overflow-x: auto;
    margin-top: 15px;
    padding-bottom: 40px;
  }
  svg {
    background: white;
    border: 1px solid #ccc;
    border-radius: 6px;
  }
</style>
</head>
<body>
<h1>Red-Black Tree Visualization & Demonstration</h1>

<div id="controls">
  <input type="number" id="inputValue" placeholder="Enter integer" />
  <button id="insertBtn">Insert</button>
  <button id="clearBtn">Clear Tree</button>
</div>
<div id="message"></div>
<div id="treeContainer">
  <svg id="treeSVG" width="1000" height="500"></svg>
</div>

<script>
  /*
    Simple Red-Black Tree implementation with visualization.
    Node colors: Red or Black.
   
    Properties:
      1. Every node is either red or black.
      2. The root is always black.
      3. All leaves (NIL) are black.
      4. If a red node has children, the children are always black (no two reds in a row).
      5. Every path from a node to its descendant NIL nodes contains the same number of black nodes.
  */

  // Define colors
  const RED = 'red';
  const BLACK = 'black';

  // Node class for RB tree
  class RBNode {
    constructor(key) {
      this.key = key;
      this.color = RED;
      this.left = null;
      this.right = null;
      this.parent = null;
    }
  }

  // Nil node for leaves (always black)
  const NIL = new RBNode(null);
  NIL.color = BLACK;
  NIL.left = null;
  NIL.right = null;
  NIL.parent = null;

  class RedBlackTree {
    constructor() {
      this.root = NIL;
    }

    leftRotate(x) {
      const y = x.right;
      x.right = y.left;
      if (y.left !== NIL) {
        y.left.parent = x;
      }
      y.parent = x.parent;
      if (x.parent === null) {
        this.root = y;
      } else if (x === x.parent.left) {
        x.parent.left = y;
      } else {
        x.parent.right = y;
      }
      y.left = x;
      x.parent = y;
    }

    rightRotate(y) {
      const x = y.left;
      y.left = x.right;
      if (x.right !== NIL) {
        x.right.parent = y;
      }
      x.parent = y.parent;
      if (y.parent === null) {
        this.root = x;
      } else if (y === y.parent.right) {
        y.parent.right = x;
      } else {
        y.parent.left = x;
      }
      x.right = y;
      y.parent = x;
    }

    insert(key) {
      const newNode = new RBNode(key);
      newNode.left = NIL;
      newNode.right = NIL;

      let y = null;
      let x = this.root;

      while (x !== NIL) {
        y = x;
        if (newNode.key === x.key) {
          // Duplicate key — do not insert
          return false;
        } else if (newNode.key < x.key) {
          x = x.left;
        } else {
          x = x.right;
        }
      }

      newNode.parent = y;
      if (y === null) {
        this.root = newNode;
      } else if (newNode.key < y.key) {
        y.left = newNode;
      } else {
        y.right = newNode;
      }

      newNode.color = RED;
      this.insertFixup(newNode);
      return true;
    }

    insertFixup(z) {
      while (z.parent && z.parent.color === RED) {
        if (z.parent === z.parent.parent.left) {
          const y = z.parent.parent.right;
          if (y.color === RED) {
            z.parent.color = BLACK;
            y.color = BLACK;
            z.parent.parent.color = RED;
            z = z.parent.parent;
          } else {
            if (z === z.parent.right) {
              z = z.parent;
              this.leftRotate(z);
            }
            z.parent.color = BLACK;
            z.parent.parent.color = RED;
            this.rightRotate(z.parent.parent);
          }
        } else {
          const y = z.parent.parent.left;
          if (y.color === RED) {
            z.parent.color = BLACK;
            y.color = BLACK;
            z.parent.parent.color = RED;
            z = z.parent.parent;
          } else {
            if (z === z.parent.left) {
              z = z.parent;
              this.rightRotate(z);
            }
            z.parent.color = BLACK;
            z.parent.parent.color = RED;
            this.leftRotate(z.parent.parent);
          }
        }
      }
      this.root.color = BLACK;
    }

    // For visualization: convert tree to a structure with x,y coordinates and parent link positions
    getVisualNodes() {
      if (this.root === NIL) return [];

      // Assign coordinates via BFS layer traversal + horizontal positioning using inorder index
      const nodes = [];
      const levels = [];

      // First assign levels and references
      const queue = [{ node: this.root, depth: 0, parent: null }];
      while (queue.length > 0) {
        const { node, depth, parent } = queue.shift();
        if (!levels[depth]) levels[depth] = [];
        levels[depth].push(node);

        node._depth = depth;
        node._parent = parent;

        if (node.left !== NIL) queue.push({ node: node.left, depth: depth + 1, parent: node });
        if (node.right !== NIL) queue.push({ node: node.right, depth: depth + 1, parent: node });
      }

      // Get inorder nodes to assign horizontal positions
      let inorderNodes = [];
      function inorder(n) {
        if (n === NIL) return;
        inorder(n.left);
        inorderNodes.push(n);
        inorder(n.right);
      }
      inorder(this.root);

      // Assign x positions based on inorder index spacing
      const horizontalSpacing = 45;
      const verticalSpacing = 70;
      inorderNodes.forEach((node, i) => {
        node._x = (i + 1) * horizontalSpacing;
        node._y = node._depth * verticalSpacing + 40;
      });

      return inorderNodes;
    }
  }

  // Visualization
  const svg = document.getElementById('treeSVG');
  const insertBtn = document.getElementById('insertBtn');
  const inputValue = document.getElementById('inputValue');
  const clearBtn = document.getElementById('clearBtn');
  const messageBox = document.getElementById('message');

  const tree = new RedBlackTree();

  function clearSVG() {
    while (svg.firstChild) {
      svg.removeChild(svg.firstChild);
    }
  }

  function createSVGElement(tag, attrs) {
    const elem = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const k in attrs) {
      if (k === 'textContent') {
        elem.textContent = attrs[k];
      } else {
        elem.setAttribute(k, attrs[k]);
      }
    }
    return elem;
  }

  function drawTree() {
    clearSVG();
    const nodes = tree.getVisualNodes();
    if (nodes.length === 0) {
      messageBox.textContent = "Tree is empty";
      return;
    } else {
      messageBox.textContent = "";
    }

    // Draw edges
    nodes.forEach((node) => {
      if (node._parent && node._parent !== null) {
        // Draw a line from parent to this node
        const line = createSVGElement('line', {
          x1: node._parent._x,
          y1: node._parent._y + 15,
          x2: node._x,
          y2: node._y - 15,
          stroke: '#888',
          'stroke-width': 2,
        });
        svg.appendChild(line);
      }
    });

    // Draw nodes
    nodes.forEach((node) => {
      const group = createSVGElement('g', {});

      // Circle for node
      const circle = createSVGElement('circle', {
        cx: node._x,
        cy: node._y,
        r: 15,
        fill: node.color === RED ? '#e74c3c' : '#34495e',
        stroke: '#333',
        'stroke-width': 2,
      });
      group.appendChild(circle);

      // Text inside circle
      const text = createSVGElement('text', {
        x: node._x,
        y: node._y + 5,
        'text-anchor': 'middle',
        'font-size': '14px',
        fill: '#fff',
        'font-weight': 'bold',
        'pointer-events': 'none',
        textContent: node.key,
      });
      group.appendChild(text);

      svg.appendChild(group);
    });
  }

  insertBtn.addEventListener('click', () => {
    let val = inputValue.value.trim();
    if (val === '') {
      messageBox.textContent = 'Please enter a number.';
      return;
    }
    let num = Number(val);
    if (!Number.isInteger(num)) {
      messageBox.textContent = 'Please enter an integer value.';
      return;
    }
    if (num < -999999 || num > 999999) {
      messageBox.textContent = 'Please enter a number between -999999 and 999999.';
      return;
    }
    const inserted = tree.insert(num);
    if (!inserted) {
      messageBox.textContent = `Value ${num} already exists in the tree.`;
    } else {
      messageBox.textContent = `Inserted value: ${num}`;
      drawTree();
    }
    inputValue.value = '';
    inputValue.focus();
  });

  clearBtn.addEventListener('click', () => {
    tree.root = NIL;
    clearSVG();
    messageBox.textContent = 'Tree cleared.';
  });

  // Initial draw empty tree
  drawTree();

  // Enable inserting nodes by pressing Enter
  inputValue.addEventListener('keydown', (ev) => {
    if (ev.key === 'Enter') {
      insertBtn.click();
    }
  });
</script>
</body>
</html>
