<!DOCTYPE html>
<html>
<head>
    <title>Sliding Window</title>
    <style>
        #window {
            width: 400px;
            height: 200px;
            border: 1px solid black;
            padding: 10px;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div id="window"></div>
    <script>
        let windowSize = 20;
        let elements = ["apple", "banana", "cherry", "date", "elderberry"];
        let currentElement = 0;
        let windowStart = 0;
        let windowEnd = 0;
        let result = [];

        function slidingWindow() {
            if (currentElement >= elements.length) {
                return;
            }

            let windowStart = Math.max(windowStart, currentElement - windowSize);
            let windowEnd = Math.min(windowEnd, currentElement + windowSize);
            result.push(elements[currentElement]);

            if (windowStart > windowEnd) {
                windowStart = 0;
                windowEnd = currentElement - windowSize;
            }

            currentElement++;
        }

        slidingWindow();

        console.log(result);
    </script>
</body>
</html>
