<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduling</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .cpu {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            margin: 10px;
        }
        .process {
            width: 100px;
            height: 100px;
            border: 1px solid red;
            margin: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>CPU Scheduling</h1>
    <div class="cpu">
        <div class="process">Process 1</div>
        <div class="process">Process 2</div>
        <div class="process">Process 3</div>
    </div>
    <script>
        // Create an array to store the processes
        let processes = [
            { id: 1, name: 'Process 1', priority: 1, timeSpent: 0 },
            { id: 2, name: 'Process 2', priority: 2, timeSpent: 0 },
            { id: 3, name: 'Process 3', priority: 3, timeSpent: 0 }
        ];

        // Define a function to schedule the processes
        function scheduleProcesses(processes) {
            // Sort the processes based on their priority and timeSpent
            processes.sort((a, b) => b.priority - a.priority || a.timeSpent - b.timeSpent);

            // Initialize the current time
            let currentTime = 0;

            // Iterate over the sorted processes
            for (let process of processes) {
                // Print the process name
                console.log(`Process ${process.name} started at ${currentTime} seconds`);

                // Update the current time
                currentTime += process.timeSpent;

                // Print the process name
                console.log(`Process ${process.name} finished at ${currentTime} seconds`);

                // Update the timeSpent
                process.timeSpent = currentTime;
            }
        }

        // Schedule the processes
        scheduleProcesses(processes);

        // Create an array to store the processes with their execution time
        let processesWithTime = [
            { id: 1, name: 'Process 1', priority: 1, timeSpent: 10 },
            { id: 2, name: 'Process 2', priority: 2, timeSpent: 5 },
            { id: 3, name: 'Process 3', priority: 3, timeSpent: 8 }
        ];

        // Define a function to execute the processes
        function executeProcesses(processesWithTime) {
            // Initialize the current time
            let currentTime = 0;

            // Iterate over the processes with their execution time
            for (let process of processesWithTime) {
                // Print the process name
                console.log(`Process ${process.name} started at ${currentTime} seconds`);

                // Update the current time
                currentTime += process.timeSpent;

                // Print the process name
                console.log(`Process ${process.name} finished at ${currentTime} seconds`);

                // Update the timeSpent
                process.timeSpent = currentTime;
            }
        }

        // Execute the processes
        executeProcesses(processesWithTime);
    </script>
</body>
</html>
