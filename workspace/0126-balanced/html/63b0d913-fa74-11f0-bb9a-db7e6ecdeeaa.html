<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bubble Sort Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 1rem;
    background: #f0f4f8;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    margin-bottom: 0.2rem;
  }
  #array-container {
    margin-top: 2rem;
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 200px;
    width: 90vw;
    max-width: 600px;
    border-bottom: 2px solid #333;
  }
  .bar {
    background-color: #48a9e6;
    width: 20px;
    transition: background-color 0.3s ease;
    border-radius: 3px 3px 0 0;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    color: white;
    font-size: 12px;
    user-select: none;
  }
  .bar.comparing {
    background-color: #f08c00;
  }
  .bar.swapped {
    background-color: #e63946;
  }
  button {
    margin-top: 1rem;
    padding: 0.5rem 1.5rem;
    font-size: 1rem;
    cursor: pointer;
    border: none;
    background-color: #48a9e6;
    color: white;
    border-radius: 4px;
    transition: background-color 0.3s ease;
  }
  button:disabled {
    background-color: #a0c8f8;
    cursor: not-allowed;
  }
  #description {
    max-width: 600px;
    margin-top: 1rem;
    text-align: center;
  }
</style>
</head>
<body>
<h1>Bubble Sort Visualization</h1>
<div id="array-container"></div>
<button id="start-btn">Start Bubble Sort</button>
<div id="description">
  <p>
    Bubble Sort is a simple sorting algorithm that works by repeatedly swapping adjacent elements if they are in the wrong order.
  </p>
  <p>
    The largest values "bubble" to the end of the array with each pass.
  </p>
</div>

<script>
  const container = document.getElementById('array-container');
  const startBtn = document.getElementById('start-btn');

  const ARRAY_SIZE = 20;
  const DELAY = 250; // ms delay for visualization

  // Generate a random array of integers
  let array = [];
  function generateArray() {
    array = [];
    for (let i = 0; i < ARRAY_SIZE; i++) {
      array.push(Math.floor(Math.random() * 150) + 10);
    }
  }

  // Render the array as bars
  function renderArray(arr, highlighted = [], swapped = []) {
    container.innerHTML = '';
    for (let i = 0; i < arr.length; i++) {
      const bar = document.createElement('div');
      bar.classList.add('bar');
      bar.style.height = arr[i] + 'px';
      bar.textContent = arr[i];

      if (highlighted.includes(i)) bar.classList.add('comparing');
      if (swapped.includes(i)) bar.classList.add('swapped');

      container.appendChild(bar);
    }
  }

  // Sleep function for delay
  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // Bubble Sort with visualization
  async function bubbleSort(arr) {
    const n = arr.length;
    let swappedSomething = false;
    for (let i = 0; i < n - 1; i++) {
      swappedSomething = false;
      for (let j = 0; j < n - i - 1; j++) {
        renderArray(arr, [j, j+1]);
        await sleep(DELAY);

        if (arr[j] > arr[j + 1]) {
          // Swap
          [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
          swappedSomething = true;

          renderArray(arr, [], [j, j + 1]);
          await sleep(DELAY);
        }
      }
      if (!swappedSomething) break; // If no swaps, array is sorted
    }
    renderArray(arr); // Final render with no highlights
  }

  // Initialize and render random array
  generateArray();
  renderArray(array);

  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    await bubbleSort(array);
    startBtn.disabled = false;
  });
</script>
</body>
</html>
