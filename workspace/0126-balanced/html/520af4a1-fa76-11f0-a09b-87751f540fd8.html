<!DOCTYPE html>
<html>
<head>
    <title>REST API Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>REST API Demo</h2>
            <p>This is a REST API demo that uses Node.js and Express.js.</p>
        </div>
        <button class="button" onclick="getUsers()">Get Users</button>
        <div id="users"></div>
    </div>

    <script>
        const express = require('express');
        const app = express();
        const port = 3000;

        // In-memory data store
        const users = [
            { id: 1, name: 'John Doe', email: 'john@example.com' },
            { id: 2, name: 'Jane Doe', email: 'jane@example.com' },
            { id: 3, name: 'Bob Smith', email: 'bob@example.com' }
        ];

        // GET /users
        app.get('/users', (req, res) => {
            res.json(users);
        });

        // POST /users
        app.post('/users', (req, res) => {
            const { name, email } = req.body;
            users.push({ id: users.length + 1, name, email });
            res.json(users);
        });

        // PUT /users/:id
        app.put('/users/:id', (req, res) => {
            const id = parseInt(req.params.id);
            const { name, email } = req.body;
            users[id - 1] = { id, name, email };
            res.json(users);
        });

        // DELETE /users/:id
        app.delete('/users/:id', (req, res) => {
            const id = parseInt(req.params.id);
            users = users.filter((user) => user.id !== id);
            res.json(users);
        });

        // GET /users/:id
        app.get('/users/:id', (req, res) => {
            const id = parseInt(req.params.id);
            const user = users.find((user) => user.id === id);
            if (user) {
                res.json(user);
            } else {
                res.status(404).json({ message: 'User not found' });
            }
        });

        // POST /users
        app.post('/users', (req, res) => {
            const { name, email } = req.body;
            users.push({ id: users.length + 1, name, email });
            res.json(users);
        });

        // PUT /users/:id
        app.put('/users/:id', (req, res) => {
            const id = parseInt(req.params.id);
            const { name, email } = req.body;
            users[id - 1] = { id, name, email };
            res.json(users);
        });

        // DELETE /users/:id
        app.delete('/users/:id', (req, res) => {
            const id = parseInt(req.params.id);
            users = users.filter((user) => user.id !== id);
            res.json(users);
        });

        // GET /users
        app.get('/users', (req, res) => {
            res.json(users);
        });

        // POST /users
        app.post('/users', (req, res) => {
            const { name, email } = req.body;
            users.push({ id: users.length + 1, name, email });
            res.json(users);
        });

        // PUT /users/:id
        app.put('/users/:id', (req, res) => {
            const id = parseInt(req.params.id);
            const { name, email } = req.body;
            users[id - 1] = { id, name, email };
            res.json(users);
        });

        // DELETE /users/:id
        app.delete('/users/:id', (req, res) => {
            const id = parseInt(req.params.id);
            users = users.filter((user) => user.id !== id);
            res.json(users);
        });

        // GET /users/:id
        app.get('/users/:id', (req, res) => {
            const id = parseInt(req.params.id);
            const user = users.find((user) => user.id === id);
            if (user) {
                res.json(user);
            } else {
                res.status(404).json({ message: 'User not found' });
            }
        });

        // POST /users
        app.post('/users', (req, res) => {
            const { name, email } = req.body;
            users.push({ id: users.length + 1, name, email });
            res.json(users);
        });

        // PUT /users/:id
        app.put('/users/:id', (req, res) => {
            const id = parseInt(req.params.id);
            const { name, email } = req.body;
            users[id - 1] = { id, name, email };
            res.json(users);
        });

        // DELETE /users/:id
        app.delete('/users/:id', (req, res) => {
            const id = parseInt(req.params.id);
            users = users.filter((user) => user.id !== id);
            res.json(users);
        });

        app.listen(port, () => {
            console.log(`Server listening on port ${port}`);
        });
    </script>
</body>
</html>
