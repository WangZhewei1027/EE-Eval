<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integration Testing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #result {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Integration Testing</h1>
    <button id="test-btn">Run Integration Test</button>
    <div id="result"></div>

    <script>
        const testBtn = document.getElementById('test-btn');
        const resultDiv = document.getElementById('result');

        testBtn.addEventListener('click', () => {
            const url = 'https://example.com/integration-test';
            fetch(url)
                .then(response => response.text())
                .then(data => {
                    resultDiv.textContent = `Integration Test Result: ${data}`;
                })
                .catch(error => {
                    resultDiv.textContent = `Integration Test Error: ${error.message}`;
                });
        });
    </script>
</body>
</html>
