<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch and Bound - Knapsack Problem</title>
    <style>
        body { font-family: Arial, sans-serif; }
        h1 { text-align: center; }
        #inputs { display: flex; flex-direction: column; align-items: center; margin: 20px; }
        label { margin: 5px; }
        button { margin-top: 10px; }
        pre { background-color: #f0f0f0; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<h1>Branch and Bound - Knapsack Problem</h1>
<div id="inputs">
    <label for="weights">Weights (comma-separated):</label>
    <input type="text" id="weights" placeholder="e.g. 2,3,4,5">
    
    <label for="values">Values (comma-separated):</label>
    <input type="text" id="values" placeholder="e.g. 3,4,5,6">
    
    <label for="capacity">Capacity of Knapsack:</label>
    <input type="number" id="capacity" value="5">
    
    <button onclick="solveKnapsack()">Solve Knapsack</button>
</div>

<pre id="result"></pre>

<script>
    class Item {
        constructor(value, weight) {
            this.value = value;
            this.weight = weight;
            this.ratio = value / weight; // Value-to-weight ratio
        }
    }

    function solveKnapsack() {
        const weightsInput = document.getElementById('weights').value.split(',').map(Number);
        const valuesInput = document.getElementById('values').value.split(',').map(Number);
        const capacity = parseInt(document.getElementById('capacity').value);

        const items = weightsInput.map((weight, index) => new Item(valuesInput[index], weight));
        items.sort((a, b) => b.ratio - a.ratio); // Sort items by value-to-weight ratio

        let maxValue = 0;
        let result = '';
        
        const n = items.length;
        const queue = [{ level: 0, value: 0, weight: 0, bound: bound(0, 0, capacity, items) }]; // Initial node

        while (queue.length > 0) {
            const node = queue.shift(); // Remove the first item

            if (node.level === n) continue;

            // Explore left branch (include current item)
            const includeNode = {
                level: node.level + 1,
                value: node.value + items[node.level].value,
                weight: node.weight + items[node.level].weight,
                bound: bound(node.level + 1, node.value + items[node.level].value, capacity, items)
            };

            if (includeNode.weight <= capacity && includeNode.value > maxValue) {
                maxValue = includeNode.value;
                result = `Max Value Updated: ${maxValue} with Weight: ${includeNode.weight}`;
            }

            if (includeNode.bound > maxValue) {
                queue.push(includeNode); // Only add to queue if it can possibly improve maxValue
            }

            // Explore right branch (exclude current item)
            const excludeNode = {
                level: node.level + 1,
                value: node.value,
                weight: node.weight,
                bound: bound(node.level + 1, node.value, capacity, items)
            };

            if (excludeNode.bound > maxValue) {
                queue.push(excludeNode); // Only add to queue if it can possibly improve maxValue
            }
        }

        document.getElementById('result').innerText = `Maximum Value: ${maxValue}\n${result}`;
    }

    function bound(level, value, capacity, items) {
        if (capacity <= 0) return 0;

        let totalValue = value;
        let j = level;
        let totalWeight = 0;

        while (j < items.length && totalWeight + items[j].weight <= capacity) {
            totalWeight += items[j].weight;
            totalValue += items[j].value;
            j++;
        }

        if (j < items.length) {
            totalValue += (capacity - totalWeight) * items[j].ratio; // fractional part
        }

        return totalValue;
    }
</script>

</body>
</html>
