<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Linked List Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        #output {
            margin-top: 20px;
        }
        button {
            margin: 5px;
        }
    </style>
</head>
<body>

<h1>Circular Linked List Demonstration</h1>
<div>
    <input type="text" id="nodeValue" placeholder="Enter node value">
    <button onclick="addNode()">Add Node</button>
    <button onclick="displayList()">Display List</button>
</div>
<div id="output"></div>

<script>
    class Node {
        constructor(value) {
            this.value = value;
            this.next = null;
        }
    }

    class CircularLinkedList {
        constructor() {
            this.head = null;
            this.tail = null;
        }

        add(value) {
            const newNode = new Node(value);
            if (!this.head) {
                this.head = newNode;
                this.tail = newNode;
                newNode.next = this.head; // Point to itself to make it circular
            } else {
                this.tail.next = newNode;
                this.tail = newNode;
                newNode.next = this.head; // Maintain the circular nature
            }
        }

        display() {
            if (!this.head) return "List is empty.";
            let result = [];
            let current = this.head;
            do {
                result.push(current.value);
                current = current.next;
            } while (current !== this.head);
            return result.join(" -> ") + " (circular)";
        }
    }

    const circularList = new CircularLinkedList();

    function addNode() {
        const nodeValue = document.getElementById('nodeValue').value;
        if (nodeValue) {
            circularList.add(nodeValue);
            document.getElementById('nodeValue').value = '';
            alert(`Node with value '${nodeValue}' added!`);
        } else {
            alert("Please enter a valid node value.");
        }
    }

    function displayList() {
        const output = circularList.display();
        document.getElementById('output').innerText = output;
    }
</script>

</body>
</html>
