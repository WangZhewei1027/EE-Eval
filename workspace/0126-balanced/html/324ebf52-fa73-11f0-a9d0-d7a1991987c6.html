<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semaphore Concept Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        #semaphore {
            width: 100px;
            height: 300px;
            border: 5px solid #333;
            position: relative;
            margin: 0 20px;
        }
        .light {
            width: 100%;
            height: 100px;
            border-radius: 50%;
            margin: 5px 0;
            opacity: 0.3;
            transition: opacity 0.5s;
        }
        #red { background: red; }
        #yellow { background: yellow; }
        #green { background: green; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="semaphore">
    <div id="red" class="light"></div>
    <div id="yellow" class="light"></div>
    <div id="green" class="light"></div>
</div>
<button onclick="startSemaphore()">Start Semaphore</button>

<script>
    let currentLight = 0; // start with the red light
    const lights = ['red', 'yellow', 'green'];
    
    function startSemaphore() {
        currentLight = 0; // reset to red
        setLight(currentLight);
        
        // Change lights every 2 seconds
        setInterval(() => {
            currentLight = (currentLight + 1) % lights.length; // cycle through lights
            setLight(currentLight);
        }, 2000);
    }

    function setLight(index) {
        // Turn off all lights
        document.querySelectorAll('.light').forEach(light => {
            light.style.opacity = '0.3';
        });
        // Turn on current light
        document.getElementById(lights[index]).style.opacity = '1';
    }
</script>

</body>
</html>
