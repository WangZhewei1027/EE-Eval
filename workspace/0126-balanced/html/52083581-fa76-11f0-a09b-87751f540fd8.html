<!DOCTYPE html>
<html>
<head>
    <title>Hash Map Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            width: 50%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .map-container {
            width: 80%;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hash Map Demo</h1>
        <div class="map-container">
            <canvas id="hash-map"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('hash-map');
        const ctx = canvas.getContext('2d');
        const mapData = {
            '0,0': '#ff0000',
            '0,1': '#00ff00',
            '0,2': '#0000ff',
            '1,0': '#ffff00',
            '1,1': '#ff00ff',
            '1,2': '#00ffff',
            '2,0': '#ffff00',
            '2,1': '#ff00ff',
            '2,2': '#0000ff'
        };

        const hashMap = new Map();
        let points = [];

        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let [key, value] of Object.entries(mapData)) {
                const [x, y] = key.split(',').map(Number);
                ctx.fillStyle = value;
                ctx.beginPath();
                ctx.arc(x, y, 10, 0, 2 * Math.PI);
                ctx.fill();
            }
        }

        function addPoint(x, y) {
            points.push([x, y]);
            hashMap.set(`${x},${y}`, `Point ${points.length}`);
        }

        function removePoint(x, y) {
            const pointIndex = points.findIndex(([pX, pY]) => pX === x && pY === y);
            if (pointIndex !== -1) {
                points.splice(pointIndex, 1);
                hashMap.delete(`${x},${y}`);
            }
        }

        canvas.addEventListener('click', (e) => {
            if (e.target.classList.contains('point')) {
                const [x, y] = e.target.getAttribute('data-x').split(',').map(Number);
                addPoint(x, y);
            } else if (e.target.classList.contains('point')) {
                const [x, y] = e.target.getAttribute('data-x').split(',').map(Number);
                removePoint(x, y);
            }
        });

        drawMap();
    </script>
</body>
</html>
