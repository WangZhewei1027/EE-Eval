<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Counting Sort Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f9f9f9;
    color: #222;
  }
  h1 {
    text-align: center;
  }
  #inputArray {
    width: 100%;
    padding: 10px;
    font-size: 1.1em;
  }
  #btnSort {
    margin-top: 10px;
    padding: 10px 20px;
    font-size: 1.1em;
    cursor: pointer;
  }
  #visualization {
    margin-top: 30px;
  }
  .section {
    margin-bottom: 40px;
  }
  .stepTitle {
    font-weight: bold;
    margin-bottom: 10px;
    font-size: 1.2em;
    color: #333;
  }
  .arrayContainer {
    display: flex;
    flex-wrap: nowrap;
    gap: 6px;
    margin-bottom: 15px;
  }
  .elem {
    background-color: #4CAF50;
    color: white;
    padding: 8px 12px;
    border-radius: 4px;
    font-weight: bold;
    min-width: 28px;
    text-align: center;
    user-select: none;
    transition: background-color 0.3s ease;
  }
  .elem.highlight {
    background-color: #FF5722;
  }
  .countElem {
    background-color: #2196F3;
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    min-width: 24px;
    text-align: center;
    font-weight: 600;
    user-select: none;
  }
  .countElem.highlight {
    background-color: #FF9800;
  }
  #speedControl {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }
  #speedLabel {
    min-width: 100px;
  }
  #message {
    margin-top: 15px;
    font-style: italic;
    color: #555;
    min-height: 24px;
  }
  footer {
    margin-top: 50px;
    font-size: 0.9em;
    color: #666;
    text-align: center;
  }
  a {
    color: #2196F3;
  }
</style>
</head>
<body>
<h1>Counting Sort Visualization</h1>
<p>Enter a list of non-negative integers separated by commas or spaces (e.g. <code>4, 2, 2, 8, 3, 3, 1</code>):</p>
<textarea id="inputArray" rows="3" placeholder="Example: 4, 2, 2, 8, 3, 3, 1">4, 2, 2, 8, 3, 3, 1</textarea>
<br />
<button id="btnSort">Start Counting Sort</button>
<div id="speedControl">
  <label id="speedLabel" for="speedRange">Animation speed:</label>
  <input type="range" id="speedRange" min="100" max="2000" step="100" value="700" />
  <span id="speedValue">700 ms</span>
</div>

<div id="visualization">
  <!-- Visualization steps will be inserted here -->
</div>
<div id="message"></div>

<footer>
  <p>Counting Sort Visualization &mdash; Algorithm explanation and step-by-step demonstration.</p>
</footer>

<script>
(() => {
  const inputArea = document.getElementById('inputArray');
  const btnSort = document.getElementById('btnSort');
  const viz = document.getElementById('visualization');
  const message = document.getElementById('message');
  const speedRange = document.getElementById('speedRange');
  const speedValue = document.getElementById('speedValue');

  function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // Helper to create a container with title and array flex container
  function createStepContainer(titleText) {
    const container = document.createElement('div');
    container.className = 'section';
    const title = document.createElement('div');
    title.className = 'stepTitle';
    title.textContent = titleText;
    container.appendChild(title);
    const arrContainer = document.createElement('div');
    arrContainer.className = 'arrayContainer';
    container.appendChild(arrContainer);
    return {container, arrContainer};
  }

  // Render array elements with optional highlights
  function renderArray(arrContainer, array, highlights = []) {
    arrContainer.innerHTML = '';
    array.forEach((val, i) => {
      const elem = document.createElement('div');
      elem.className = 'elem';
      elem.textContent = val;
      if (highlights.includes(i)) {
        elem.classList.add('highlight');
      }
      arrContainer.appendChild(elem);
    });
  }

  // Render count array
  function renderCountArray(arrContainer, counts, highlights = []) {
    arrContainer.innerHTML = '';
    counts.forEach((count, i) => {
      const elem = document.createElement('div');
      elem.className = 'countElem';
      elem.textContent = count;
      if (highlights.includes(i)) elem.classList.add('highlight');
      elem.title = `Value ${i} count`;
      arrContainer.appendChild(elem);
    });
  }

  // Parse and validate input array
  function parseInput(text) {
    if (!text.trim()) return null;
    // Split by commas or spaces
    let parts = text.split(/[\s,]+/);
    let arr = [];
    for (const p of parts) {
      if (p === '') continue;
      let num = Number(p);
      if (!Number.isInteger(num) || num < 0) return null;
      arr.push(num);
    }
    if (arr.length === 0) return null;
    return arr;
  }

  // Main async function for sorting and visualizing step by step
  async function countingSortVisual(array, speed) {
    viz.innerHTML = '';
    message.textContent = '';
    btnSort.disabled = true;
    inputArea.disabled = true;
    speedRange.disabled = true;

    // Step 1: Show original array
    const step1 = createStepContainer('Original Array');
    viz.appendChild(step1.container);
    renderArray(step1.arrContainer, array);
    message.textContent = 'This is the input array we want to sort.';
    await delay(speed);

    // Find max value in array for count size
    const maxVal = Math.max(...array);

    // Step 2: Initialize count array
    let count = new Array(maxVal + 1).fill(0);
    const step2 = createStepContainer(`Initialize Count Array (size = max value + 1 = ${maxVal + 1})`);
    viz.appendChild(step2.container);
    renderCountArray(step2.arrContainer, count);
    message.textContent = 'Create an array to store counts for each integer value.';
    await delay(speed);

    // Step 3: Count occurrences
    message.textContent = 'Counting the occurrences of each value...';
    for (let i = 0; i < array.length; i++) {
      count[array[i]]++;
      renderCountArray(step2.arrContainer, count, [array[i]]);
      renderArray(step1.arrContainer, array, [i]);
      message.textContent = `Counting value ${array[i]} (index ${i})...`;
      await delay(speed);
    }

    // Step 4: Cumulative sum in count array
    message.textContent = 'Computing cumulative counts (prefix sums)...';
    for (let i = 1; i < count.length; i++) {
      count[i] += count[i - 1];
      renderCountArray(step2.arrContainer, count, [i, i - 1]);
      await delay(speed);
    }

    // Step 5: Output array initialization
    let output = new Array(array.length).fill(0);
    const step3 = createStepContainer('Build Output Array');
    viz.appendChild(step3.container);
    renderArray(step3.arrContainer, output);
    message.textContent = 'Build the sorted output array by placing elements at their correct positions.';
    await delay(speed);

    // Step 6: Build output array by iterating input array backward for stable sort
    for (let i = array.length - 1; i >= 0; i--) {
      const val = array[i];
      count[val]--;
      const pos = count[val];
      output[pos] = val;
      renderCountArray(step2.arrContainer, count, [val]);
      renderArray(step1.arrContainer, array, [i]);
      renderArray(step3.arrContainer, output, [pos]);
      message.textContent = `Placing value ${val} from input index ${i} to output index ${pos}.`;
      await delay(speed);
    }

    // Step 7: Final sorted array
    message.textContent = 'Sorting complete! Here is the sorted array.';
    renderArray(step3.arrContainer, output);
    btnSort.disabled = false;
    inputArea.disabled = false;
    speedRange.disabled = false;
  }

  btnSort.addEventListener('click', () => {
    const rawInput = inputArea.value;
    const arr = parseInput(rawInput);
    if (!arr) {
      alert('Please enter a valid list of non-negative integers, separated by commas or spaces.');
      return;
    }
    countingSortVisual(arr, Number(speedRange.value));
  });

  speedRange.addEventListener('input', () => {
    speedValue.textContent = speedRange.value + ' ms';
  });

  // Initial speed display
  speedValue.textContent = speedRange.value + ' ms';
})();
</script>
</body>
</html>
