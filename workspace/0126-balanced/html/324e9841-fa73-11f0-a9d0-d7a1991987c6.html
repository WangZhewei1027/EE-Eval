<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amortized Analysis Demonstration</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #output { white-space: pre; }
        button { margin: 10px 0; }
    </style>
</head>
<body>

    <h1>Amortized Analysis Demonstration</h1>
    <p>This demonstration illustrates the concept of amortized analysis using a dynamic array that grows when needed.</p>

    <button id="add">Add Element</button>
    <button id="reset">Reset</button>
    
    <h2>Dynamic Array Operations</h2>
    <div id="output"></div>

    <script>
        class DynamicArray {
            constructor() {
                this.array = new Array(2); // Start with an initial capacity
                this.size = 0;
                this.operations = 0;
            }

            add(element) {
                if (this.size >= this.array.length) {
                    // Need to resize array
                    this.resize();
                }
                this.array[this.size] = element;
                this.size++;
                this.operations++;
                this.report();
            }

            resize() {
                this.operations++; // Account for the resizing operation
                const newArray = new Array(this.array.length * 2);
                for (let i = 0; i < this.size; i++) {
                    newArray[i] = this.array[i];
                }
                this.array = newArray;
            }

            report() {
                const output = `Total Array Size: ${this.array.length}, Elements: ${this.size}, Operations: ${this.operations}\n`;
                document.getElementById('output').textContent += output;
            }
        }

        const dynamicArray = new DynamicArray();

        document.getElementById('add').addEventListener('click', () => {
            const element = Math.floor(Math.random() * 100);
            dynamicArray.add(element);
        });

        document.getElementById('reset').addEventListener('click', () => {
            location.reload();
        });

    </script>
</body>
</html>
