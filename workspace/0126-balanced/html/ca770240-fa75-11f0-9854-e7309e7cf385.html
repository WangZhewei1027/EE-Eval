<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heap</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/heapjs/2.9.6/heap.js"></script>
</head>
<body>
  <div id="heap"></div>

  <script>
    var heap = new Heap();
    heap.push(1);
    heap.push(2);
    heap.push(3);
    heap.push(4);

    while (heap.length > 0) {
      console.log(heap.pop());
    }
  </script>
