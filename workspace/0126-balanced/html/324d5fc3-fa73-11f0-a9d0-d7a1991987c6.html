<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radix Sort Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .bar {
            display: inline-block;
            width: 20px;
            margin: 1px;
            background-color: #3498db;
        }
        #arrayContainer {
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Radix Sort Visualization</h1>
    <div id="arrayContainer"></div>
    <button onclick="startSorting()">Sort Array</button>

    <script>
        let array = [170, 45, 75, 90, 802, 24, 2, 66];
        let maxDigits = 3;

        function startSorting() {
            radixSort(array);
        }

        function displayArray(arr, highlightIndex = -1) {
            const container = document.getElementById('arrayContainer');
            container.innerHTML = '';
            arr.forEach((num, index) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${num * 2}px`; // Scale the bar height
                if (index === highlightIndex) {
                    bar.style.backgroundColor = 'red'; // Highlighting the current digit processing
                }
                container.appendChild(bar);
            });
        }

        function getDigit(num, digit) {
            return Math.floor(Math.abs(num) / Math.pow(10, digit)) % 10;
        }

        function getMax(arr) {
            return Math.max(...arr);
        }

        function countingSort(arr, digit) {
            const output = new Array(arr.length);
            const count = Array.from({ length: 10 }, () => 0);

            for (let i = 0; i < arr.length; i++) {
                const digitValue = getDigit(arr[i], digit);
                count[digitValue]++;
            }

            for (let i = 1; i < count.length; i++) {
                count[i] += count[i - 1];
            }

            for (let i = arr.length - 1; i >= 0; i--) {
                const digitValue = getDigit(arr[i], digit);
                output[count[digitValue] - 1] = arr[i];
                count[digitValue]--;
                displayArray(output);
            }

            for (let i = 0; i < arr.length; i++) {
                arr[i] = output[i];
            }
        }

        function radixSort(arr) {
            const max = getMax(arr);
            const maxDigits = Math.floor(Math.log10(max)) + 1;

            for (let digit = 0; digit < maxDigits; digit++) {
                countingSort(arr, digit);
                displayArray(arr, digit); // Highlight the current digit being sorted
            }
        }

        // Initial display
        displayArray(array);
    </script>
</body>
</html>
