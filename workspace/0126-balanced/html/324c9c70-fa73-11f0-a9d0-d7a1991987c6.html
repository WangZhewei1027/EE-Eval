<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deque Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        #deque {
            margin: 20px 0;
            border: 1px solid #ccc;
            padding: 10px;
            min-height: 40px;
            display: flex;
            flex-direction: row;
            align-items: center;
        }
        .item {
            margin: 5px;
            padding: 5px 10px;
            background-color: #e7f3fe;
            border: 1px solid #b3d7ff;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<h2>Deque (Double-Ended Queue) Demonstration</h2>
<div id="deque"></div>

<input type="number" id="inputValue" placeholder="Enter a number" />
<button onclick="addFront()">Add to Front</button>
<button onclick="addBack()">Add to Back</button>
<button onclick="removeFront()">Remove from Front</button>
<button onclick="removeBack()">Remove from Back</button>

<script>
    class Deque {
        constructor() {
            this.items = [];
        }

        addFront(element) {
            this.items.unshift(element);
            this.render();
        }

        addBack(element) {
            this.items.push(element);
            this.render();
        }

        removeFront() {
            if (this.isEmpty()) {
                alert('Deque is empty!');
                return;
            }
            this.items.shift();
            this.render();
        }

        removeBack() {
            if (this.isEmpty()) {
                alert('Deque is empty!');
                return;
            }
            this.items.pop();
            this.render();
        }

        isEmpty() {
            return this.items.length === 0;
        }

        render() {
            const dequeElement = document.getElementById('deque');
            dequeElement.innerHTML = '';
            this.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = item;
                dequeElement.appendChild(div);
            });
        }
    }

    const deque = new Deque();

    function addFront() {
        const value = document.getElementById('inputValue').value;
        if (value) {
            deque.addFront(value);
            document.getElementById('inputValue').value = '';
        } else {
            alert('Please enter a value');
        }
    }

    function addBack() {
        const value = document.getElementById('inputValue').value;
        if (value) {
            deque.addBack(value);
            document.getElementById('inputValue').value = '';
        } else {
            alert('Please enter a value');
        }
    }

    function removeFront() {
        deque.removeFront();
    }

    function removeBack() {
        deque.removeBack();
    }
</script>

</body>
</html>
