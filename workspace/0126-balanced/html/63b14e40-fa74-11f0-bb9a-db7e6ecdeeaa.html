<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Linear Search Demonstration</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      background: #f9f9f9;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-bottom: 0.3rem;
      font-weight: bold;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 0.4rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }
    button {
      display: block;
      width: 100%;
      background: #2980b9;
      color: #fff;
      border: none;
      padding: 0.6rem;
      font-size: 1.1rem;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #1f6391;
    }
    .output {
      margin-top: 1.5rem;
      font-size: 1.1rem;
      min-height: 2.5rem;
    }
    .array-display {
      font-family: monospace;
      padding: 0.5rem;
      background: #ecf0f1;
      border-radius: 4px;
      margin-bottom: 1rem;
      word-wrap: break-word;
    }
    .step {
      margin-top: 0.8rem;
      font-family: monospace;
      background: #dff0d8;
      border-left: 5px solid #3c763d;
      padding: 0.4rem 0.8rem;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Linear Search Algorithm Demo</h1>
    <label for="arrayInput">Enter elements (comma separated):</label>
    <input type="text" id="arrayInput" placeholder="e.g. 4, 2, 7, 1, 3" value="4, 2, 7, 1, 3, 9, 8" />
    <label for="targetInput">Enter target value to search:</label>
    <input type="number" id="targetInput" placeholder="e.g. 7" />
    <button id="searchBtn">Perform Linear Search</button>
    <div class="output" id="output"></div>
  </div>

  <script>
    const arrayInput = document.getElementById('arrayInput');
    const targetInput = document.getElementById('targetInput');
    const searchBtn = document.getElementById('searchBtn');
    const output = document.getElementById('output');

    // Utility to clear output area
    function clearOutput() {
      output.innerHTML = '';
    }

    // Display the array nicely
    function displayArray(arr) {
      const div = document.createElement('div');
      div.className = 'array-display';
      div.textContent = `[ ${arr.join(', ')} ]`;
      output.appendChild(div);
    }

    // Create a step element for each step
    function displayStep(index, valueChecked, target) {
      const stepDiv = document.createElement('div');
      stepDiv.className = 'step';
      stepDiv.textContent = `Checking index ${index}: value = ${valueChecked} ${valueChecked === target ? '✔️ (Match found!)' : '✖️'}`;
      output.appendChild(stepDiv);
    }

    // Linear search function (with stepwise display)
    function linearSearch(arr, target) {
      clearOutput();
      output.innerHTML = '<strong>Array to search:</strong>';
      displayArray(arr);
      output.innerHTML += `<strong>Target value:</strong> ${target}<br><br>`;

      for (let i = 0; i < arr.length; i++) {
        displayStep(i, arr[i], target);
        if (arr[i] === target) {
          output.innerHTML += `<br><strong>Result:</strong> Target found at index <em>${i}</em>.`;
          return i;
        }
      }
      output.innerHTML += `<br><strong>Result:</strong> Target not found in the array.`;
      return -1;
    }

    // Event listener for button click
    searchBtn.addEventListener('click', () => {
      const arrStr = arrayInput.value.trim();
      const targetStr = targetInput.value.trim();

      if (!arrStr) {
        alert('Please enter array elements.');
        return;
      }
      if (targetStr === '') {
        alert('Please enter a target value to search.');
        return;
      }

      // Parse input array
      let arr = arrStr.split(',').map(s => s.trim());

      // Make sure all elements are numbers
      const numericArr = [];
      for(let i = 0; i < arr.length; i++) {
        const n = Number(arr[i]);
        if (isNaN(n)) {
          alert(`Invalid number encountered in array: "${arr[i]}"`);
          return;
        }
        numericArr.push(n);
      }

      const target = Number(targetStr);

      linearSearch(numericArr, target);
    });
  </script>
</body>
</html>
