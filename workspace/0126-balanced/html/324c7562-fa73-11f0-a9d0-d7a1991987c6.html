<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack Implementation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        #stack-container {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #fff;
            border-radius: 5px;
        }
        #stack {
            list-style-type: none;
            padding: 0;
        }
        #stack li {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        #stack li:last-child {
            border: none;
        }
    </style>
</head>
<body>

<h1>Stack Implementation</h1>
<div id="stack-container">
    <h3>Stack Contents:</h3>
    <ul id="stack"></ul>
</div>
<input type="text" id="inputElement" placeholder="Enter a value to push" />
<button onclick="push()">Push</button>
<button onclick="pop()">Pop</button>
<button onclick="viewStack()">View Stack</button>

<script>
    class Stack {
        constructor() {
            this.items = [];
        }

        push(element) {
            this.items.push(element);
        }

        pop() {
            if (this.isEmpty()) {
                return "Underflow";
            }
            return this.items.pop();
        }

        peek() {
            if (this.isEmpty()) {
                return "No elements in stack";
            }
            return this.items[this.items.length - 1];
        }

        isEmpty() {
            return this.items.length === 0;
        }

        size() {
            return this.items.length;
        }

        print() {
            return this.items.toString();
        }
    }

    const stack = new Stack();

    function push() {
        const inputElement = document.getElementById("inputElement");
        const value = inputElement.value.trim();
        if (value) {
            stack.push(value);
            inputElement.value = "";
            updateStackDisplay();
        } else {
            alert("Please enter a value to push.");
        }
    }

    function pop() {
        const poppedValue = stack.pop();
        if (poppedValue !== "Underflow") {
            alert(`Popped: ${poppedValue}`);
        } else {
            alert("Stack is empty, cannot pop.");
        }
        updateStackDisplay();
    }

    function updateStackDisplay() {
        const stackDisplay = document.getElementById("stack");
        stackDisplay.innerHTML = "";
        stack.items.forEach(item => {
            let li = document.createElement("li");
            li.textContent = item;
            stackDisplay.appendChild(li);
        });
    }

    function viewStack() {
        alert(`Current Stack: ${stack.print()}`);
    }
</script>

</body>
</html>
