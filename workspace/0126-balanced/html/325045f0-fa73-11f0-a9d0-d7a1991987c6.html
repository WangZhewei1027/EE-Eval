<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmetric Cryptography Demo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            max-width: 600px;
            background-color: #f9f9f9;
        }
        input, button, textarea {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Symmetric Cryptography Demo</h1>
    <p>This demo demonstrates the concept of symmetric cryptography using the CryptoJS library.</p>
    
    <label for="key">Key (Secret Key):</label>
    <input type="text" id="key" placeholder="Enter a secret key" />

    <label for="plaintext">Plaintext:</label>
    <textarea id="plaintext" rows="4" placeholder="Enter text to encrypt"></textarea>

    <button onclick="encrypt()">Encrypt</button>
    <button onclick="decrypt()">Decrypt</button>

    <h2>Results</h2>
    <label for="ciphertext">Ciphertext:</label>
    <textarea id="ciphertext" rows="4" placeholder="Encrypted text will appear here" readonly></textarea>

    <label for="decryptedtext">Decrypted Text:</label>
    <textarea id="decryptedtext" rows="4" placeholder="Decrypted text will appear here" readonly></textarea>

    <script>
        function encrypt() {
            const key = document.getElementById("key").value;
            const plaintext = document.getElementById("plaintext").value;

            // Encrypting the plaintext using the secret key
            const ciphertext = CryptoJS.AES.encrypt(plaintext, key).toString();
            document.getElementById("ciphertext").value = ciphertext;
        }

        function decrypt() {
            const key = document.getElementById("key").value;
            const ciphertext = document.getElementById("ciphertext").value;

            // Decrypting the ciphertext using the secret key
            const bytes = CryptoJS.AES.decrypt(ciphertext, key);
            const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
            document.getElementById("decryptedtext").value = decryptedText || "Decryption failed! Check your key!";
        }
    </script>
</body>
</html>
