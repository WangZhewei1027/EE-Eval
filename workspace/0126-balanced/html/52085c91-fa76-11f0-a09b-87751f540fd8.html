<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #tree {
            width: 800px;
            margin: 40px auto;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="tree"></div>

    <script>
        class Node {
            constructor(key) {
                this.key = key;
                this.left = null;
                this.right = null;
            }
        }

        function insert(root, key) {
            if (root === null) {
                return new Node(key);
            } else {
                if (key < root.key) {
                    root.left = insert(root.left, key);
                } else {
                    root.right = insert(root.right, key);
                }
            }
            return root;
        }

        function inorder(root) {
            if (root !== null) {
                inorder(root.left);
                document.getElementById("tree").innerHTML += "<br>Key: " + root.key + " - Left: " + root.left.key + " - Right: " + root.right.key + "<br>";
                inorder(root.right);
            }
        }

        function search(root, key) {
            if (root === null || root.key === key) {
                return root;
            } else if (key < root.key) {
                return search(root.left, key);
            } else {
                return search(root.right, key);
            }
        }

        function deleteNode(root, key) {
            if (root === null) {
                return root;
            } else if (key < root.key) {
                root.left = deleteNode(root.left, key);
            } else if (key > root.key) {
                root.right = deleteNode(root.right, key);
            } else {
                if (root.left === null && root.right === null) {
                    return null;
                } else if (root.left === null) {
                    return root.right;
                } else if (root.right === null) {
                    return root.left;
                } else {
                    let minVal = root.left.key;
                    let minIndex = 0;
                    for (let i = 0; i < root.right.length; i++) {
                        if (root.right[i].key < minVal) {
                            minVal = root.right[i].key;
                            minIndex = i;
                        }
                    }
                    root.key = minVal;
                    root.right = deleteNode(root.right, minVal);
                }
            }
            return root;
        }

        let root = null;

        // Insert keys into the BST
        for (let i = 0; i < 10; i++) {
            root = insert(root, i);
        }

        // Display keys in the BST using inorder traversal
        inorder(root);

        // Search for a key in the BST
        let found = search(root, 5);
        if (found !== null) {
            document.getElementById("tree").innerHTML += "<br>Key: " + found.key + " - Left: " + found.left.key + " - Right: " + found.right.key + "<br>";
        } else {
            document.getElementById("tree").innerHTML += "<br>Key not found in the BST";
        }

        // Delete a key from the BST
        root = deleteNode(root, 5);
        inorder(root);
    </script>
</body>
</html>
