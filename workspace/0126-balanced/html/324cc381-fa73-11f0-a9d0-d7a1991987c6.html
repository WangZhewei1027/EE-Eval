<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiset Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #multiset {
            margin-top: 20px;
        }
        .element {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<h1>Multiset Demonstration</h1>
<p>A multiset is a generalized concept of a set that allows for multiple occurrences of the same element.</p>

<h2>Operations:</h2>
<button onclick="addElement()">Add Element</button>
<input type="text" id="elementInput" placeholder="Enter element" />
<button onclick="removeElement()">Remove Element</button>

<div id="multiset"></div>

<script>
    class Multiset {
        constructor() {
            this.elements = {};
        }

        add(element) {
            if (this.elements[element]) {
                this.elements[element]++;
            } else {
                this.elements[element] = 1;
            }
            this.display();
        }

        remove(element) {
            if (this.elements[element]) {
                this.elements[element]--;
                if (this.elements[element] === 0) {
                    delete this.elements[element];
                }
            }
            this.display();
        }

        display() {
            const multisetDiv = document.getElementById('multiset');
            multisetDiv.innerHTML = '';
            for (const [element, count] of Object.entries(this.elements)) {
                const elementDiv = document.createElement('div');
                elementDiv.className = 'element';
                elementDiv.textContent = `${element}: ${count}`;
                multisetDiv.appendChild(elementDiv);
            }
        }
    }

    const myMultiset = new Multiset();

    function addElement() {
        const input = document.getElementById('elementInput');
        const element = input.value.trim();
        if (element) {
            myMultiset.add(element);
            input.value = '';
        }
    }

    function removeElement() {
        const input = document.getElementById('elementInput');
        const element = input.value.trim();
        if (element) {
            myMultiset.remove(element);
            input.value = '';
        }
    }
</script>

</body>
</html>
