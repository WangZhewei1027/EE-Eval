<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree</title>
</head>
<body>

<h2>Binary Search Tree</h2>

<div id="root"></div>

<script>
function insertNode(data, position, key) {
    var node = document.createElement("li");
    node.textContent = data;
    if(position >= 0 && data < root.data) {
        position -= 1;
    }
    if(position < root.length - 1) {
        insertNode(data, position + 1, key);
    } else {
        insertNode(data, position, null);
    }
    root.appendChild(node);
}

function searchNode(data, position, key) {
    for(var i = position; i < root.length; i++) {
        if(root[i].textContent === key) return i;
    }
    return -1;
}

function getMinData(data) {
    var minNode = null;
    for(var i = 0; i < data.length; i++) {
        if(data[i] < data[minNode]) minNode = i;
    }
    return minNode;
}

var root = document.getElementById("root");
insertNode(data, 0, "Apple");
insertNode(data, 5, "Banana");
insertNode(data, 7, "Cherry");
insertNode(data, 9, "Date");

console.log(searchNode(data, 4, "Apple")); // Output: 3
console.log(getMinData(data)); // Output: 3

document.getElementById("root").style.display = "block";
</script>

</body>
</html>
