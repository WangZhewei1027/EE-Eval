<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tim Sort Demonstration</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f4f4f4;
  }
  h1 {
    text-align: center;
  }
  #inputArea, #outputArea {
    margin: 15px auto;
    max-width: 600px;
    background: white;
    padding: 15px;
    border-radius: 5px;
    box-shadow: 0 0 8px #ccc;
  }
  textarea {
    width: 100%;
    height: 100px;
    font-family: monospace;
    font-size: 14px;
  }
  button {
    margin-top: 10px;
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
  }
  #steplog {
    height: 300px;
    overflow-y: scroll;
    background: #222;
    color: #eee;
    font-family: monospace;
    padding: 10px;
    border-radius: 5px;
    white-space: pre-wrap;
  }
  .highlight {
    background-color: #ffd54f;
  }
  .merge-step {
    color: #81c784;
  }
  .run-detection-step {
    color: #64b5f6;
  }
</style>
</head>
<body>
<h1>Tim Sort Visualization & Explanation</h1>

<div id="inputArea">
  <label for="arrayInput"><strong>Enter array of numbers to sort (comma separated):</strong></label><br/>
  <textarea id="arrayInput">5, 21, 7, 23, 19, 3, 17, 11, 9, 15, 14, 8</textarea><br />
  <button id="startBtn">Start Tim Sort Demo</button>
</div>

<div id="outputArea">
  <h2>Sorting Steps Log</h2>
  <div id="steplog"></div>
</div>

<script>
/*
  TimSort is a hybrid stable sorting algorithm derived from merge sort and insertion sort,
  designed to perform well on many kinds of real-world data.
  It exploits runs of consecutive ordered elements within the data and merges them efficiently.
*/

// Constants for TimSort
const MIN_MERGE = 32;

function minRunLength(n) {
  // Returns the minimum run length for TimSort on array size n.
  let r = 0;
  while (n >= MIN_MERGE) {
    r |= (n & 1);
    n >>= 1;
  }
  return n + r;
}

class TimSortDemo {
  constructor(array, logElement) {
    this.array = array;
    this.minRun = minRunLength(array.length);
    this.logElement = logElement;
    this.runs = [];
  }

  log(message, type = '') {
    const p = document.createElement('div');
    if(type) p.classList.add(type);
    p.textContent = message;
    this.logElement.appendChild(p);
    this.logElement.scrollTop = this.logElement.scrollHeight;
  }

  insertionSort(left, right) {
    this.log(`Insertion sort on subarray [${left}..${right}]`, 'run-detection-step');
    for(let i = left + 1; i <= right; i++) {
      let key = this.array[i];
      let j = i - 1;
      while(j >= left && this.array[j] > key) {
        this.array[j+1] = this.array[j];
        j--;
      }
      this.array[j+1] = key;

      this.log(`  Inserted ${key} into sorted part: [${this.array.slice(left, right+1).join(', ')}]`);
    }
  }

  countRunAndMakeAscending(lo) {
    let runHi = lo + 1;
    if(runHi === this.array.length) return 1;
    // Identify run direction (ascending or descending)
    if(this.array[runHi] < this.array[lo]) {
      // Descending run
      while(runHi < this.array.length -1 && this.array[runHi+1] < this.array[runHi]) {
        runHi++;
      }
      this.reverseRange(lo, runHi);
      this.log(`Found descending run [${lo}..${runHi}] reversed to ascending`, 'run-detection-step');
    } else {
      // Ascending run
      while(runHi < this.array.length -1 && this.array[runHi+1] >= this.array[runHi]) {
        runHi++;
      }
      this.log(`Found ascending run [${lo}..${runHi}]`, 'run-detection-step');
    }
    return runHi - lo + 1;
  }

  reverseRange(lo, hi) {
    while(lo < hi) {
      [this.array[lo], this.array[hi]] = [this.array[hi], this.array[lo]];
      lo++;
      hi--;
    }
  }

  pushRun(runBase, runLen) {
    this.runs.push({runBase, runLen});
    this.log(`Pushed run: base=${runBase}, length=${runLen} => [${this.array.slice(runBase, runBase + runLen).join(', ')}]`, 'run-detection-step');
  }

  mergeAt(i) {
    let run1 = this.runs[i];
    let run2 = this.runs[i+1];
    this.log(`Merging runs at indices ${i} and ${i+1}:
      Run1 [${run1.runBase}..${run1.runBase + run1.runLen -1}]: [${this.array.slice(run1.runBase, run1.runBase + run1.runLen).join(', ')}]
      Run2 [${run2.runBase}..${run2.runBase + run2.runLen -1}]: [${this.array.slice(run2.runBase, run2.runBase + run2.runLen).join(', ')}]`, 'merge-step');

    let base1 = run1.runBase, len1 = run1.runLen;
    let base2 = run2.runBase, len2 = run2.runLen;

    // Merge runs into temp array
    let merged = [];
    let i1 = base1, i2 = base2;

    while(i1 < base1 + len1 && i2 < base2 + len2) {
      if(this.array[i1] <= this.array[i2]) merged.push(this.array[i1++]);
      else merged.push(this.array[i2++]);
    }
    while(i1 < base1 + len1) merged.push(this.array[i1++]);
    while(i2 < base2 + len2) merged.push(this.array[i2++]);

    // Copy merged array back
    for(let k = 0; k < merged.length; k++) {
      this.array[base1 + k] = merged[k];
    }

    this.runs[i] = {runBase: base1, runLen: len1 + len2};
    this.runs.splice(i+1, 1);

    this.log(`Result after merge: [${this.array.slice(base1, base1 + len1 + len2).join(', ')}]`, 'merge-step');
  }

  // Maintains the invariants:
  //   1. len[-3] > len[-2] + len[-1]
  //   2. len[-2] > len[-1]
  // If invariants are not held, merge runs accordingly.
  mergeCollapse() {
    while(this.runs.length > 1) {
      let n = this.runs.length;
      if(n >= 3) {
        let A = this.runs[n - 3].runLen;
        let B = this.runs[n - 2].runLen;
        let C = this.runs[n - 1].runLen;

        if(A <= B + C) {
          if(A < C) {
            this.mergeAt(n - 3);
          } else {
            this.mergeAt(n - 2);
          }
          continue;
        } else if(B <= C) {
          this.mergeAt(n - 2);
          continue;
        }
      }

      if(this.runs.length > 1 && this.runs[this.runs.length - 2].runLen <= this.runs[this.runs.length - 1].runLen) {
        this.mergeAt(this.runs.length - 2);
      } else {
        break;
      }
    }
  }

  mergeForceCollapse() {
    while(this.runs.length > 1) {
      let n = this.runs.length;
      if(n >= 2) {
        this.mergeAt(n - 2);
      }
    }
  }

  timSort() {
    this.log(`Starting TimSort on array length ${this.array.length} with minRun=${this.minRun}\n`);

    let n = this.array.length;
    let lo = 0;
    while(lo < n) {
      let runLen = this.countRunAndMakeAscending(lo);

      if(runLen < this.minRun) {
        let forceLen = Math.min(this.minRun, n - lo);
        this.insertionSort(lo, lo + forceLen - 1);
        runLen = forceLen;
      }

      this.pushRun(lo, runLen);
      this.mergeCollapse();

      lo += runLen;
    }

    this.mergeForceCollapse();

    this.log(`\nFinal sorted array:\n[${this.array.join(', ')}]`);
  }
}

document.getElementById('startBtn').addEventListener('click', () => {
  let input = document.getElementById('arrayInput').value.trim();
  if(!input) return alert('Please enter a comma separated list of numbers.');

  let arr = input.split(',').map(s => Number(s.trim())).filter(n => !isNaN(n));
  if(arr.length === 0) return alert('Please enter valid numbers.');

  let logElement = document.getElementById('steplog');
  logElement.innerHTML = ''; // Clear

  let sorter = new TimSortDemo(arr, logElement);
  sorter.timSort();
});
</script>
</body>
</html>
