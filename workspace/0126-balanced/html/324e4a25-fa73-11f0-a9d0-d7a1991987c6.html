<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big-O Notation Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }
        h1 {
            color: #333;
        }
        .code {
            background-color: #eee;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            overflow-x: auto;
        }
        .button {
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Understanding Big-O Notation</h1>
<p>Click the buttons below to see how different algorithms perform with increasing input sizes.</p>

<button class="button" onclick="testLinear()">O(n) - Linear Time</button>
<button class="button" onclick="testQuadratic()">O(n^2) - Quadratic Time</button>
<button class="button" onclick="testConstant()">O(1) - Constant Time</button>

<h2>Results</h2>
<div id="result" class="result"></div>

<script>
    function testLinear() {
        const n = 1000; // size of input
        let sum = 0;
        for (let i = 0; i < n; i++) {
            sum += i; // Linear operation
        }
        document.getElementById('result').innerText = `O(n): Processed ${n} elements. Sum = ${sum}`;
    }

    function testQuadratic() {
        const n = 100; // size of input
        let count = 0;
        for (let i = 0; i < n; i++) {
            for (let j = 0; j < n; j++) {
                count++; // Quadratic operation
            }
        }
        document.getElementById('result').innerText = `O(n^2): Processed ${n} * ${n} elements. Count = ${count}`;
    }

    function testConstant() {
        const n = 1000; // size of input
        const result = 42; // Constant operation
        document.getElementById('result').innerText = `O(1): Processed ${n} elements. Result = ${result}`;
    }
</script>

</body>
</html>
