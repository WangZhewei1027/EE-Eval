<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP Demonstration</title>
    <script>
        function makeRequest() {
            // Create a new XMLHttpRequest object
            const xhr = new XMLHttpRequest();

            // Configure it: GET-request for the URL
            const url = 'https://jsonplaceholder.typicode.com/posts/1'; // Example endpoint
            xhr.open('GET', url, true);

            // Set up a function to handle the response
            xhr.onload = function () {
                if (xhr.status >= 200 && xhr.status < 300) {
                    // Successfully received a response
                    const response = JSON.parse(xhr.responseText);
                    document.getElementById('result').innerText = 
                        `Title: ${response.title}\nBody: ${response.body}`;
                } else {
                    // Handle errors
                    document.getElementById('result').innerText = 
                        `Error: ${xhr.status} - ${xhr.statusText}`;
                }
            };

            // Handle network errors
            xhr.onerror = function () {
                document.getElementById('result').innerText = 
                    'Network Error';
            };

            // Send the request
            xhr.send();
        }
    </script>
</head>
<body>
    <h1>HTTP Request Demonstration</h1>
    <button onclick="makeRequest()">Send HTTP GET Request</button>
    <pre id="result" style="margin-top: 20px; background: #f3f3f3; padding: 10px;"></pre>
</body>
</html>
