<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Socket Programming Demo (WebSocket)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 1rem;
      background: #f0f0f0;
    }
    h1 {
      text-align: center;
      color: #222;
    }
    #status {
      margin-bottom: 1rem;
      padding: 0.5rem;
      font-weight: bold;
    }
    #messages {
      height: 300px;
      border: 1px solid #ccc;
      background: #fff;
      overflow-y: auto;
      padding: 0.5rem;
      margin-bottom: 1rem;
      white-space: pre-wrap;
      font-family: monospace;
    }
    #inputSection {
      display: flex;
      gap: 0.5rem;
    }
    #messageInput {
      flex-grow: 1;
      padding: 0.5rem;
      font-size: 1rem;
    }
    button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      cursor: pointer;
    }
    #footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #666;
      text-align: center;
    }
    a {
      color: #0066cc;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Socket Programming Demo with WebSocket</h1>
  <div id="status">Connecting to WebSocket server...</div>
  <div id="messages"></div>
  <div id="inputSection">
    <input type="text" id="messageInput" placeholder="Enter message here" autocomplete="off" />
    <button id="sendBtn" disabled>Send</button>
  </div>

  <div id="footer">
    Using public <a href="wss://echo.websocket.org" target="_blank" rel="noopener noreferrer">Echo WebSocket Server</a> for demo.<br/>
    This server echos back any message you send, demonstrating basic socket communication.
  </div>

  <script>
    /*
     * This demo uses the WebSocket API in the browser to demonstrate socket programming concepts.
     * WebSocket is a protocol providing full-duplex communication channels over a single TCP connection.
     * Here, the client connects to a public echo WebSocket server.
     * When you type a message and send it, the server echoes it back.
     */

    (function() {
      const statusEl = document.getElementById('status');
      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');

      // Public echo websocket server
      const wsUrl = 'wss://echo.websocket.org';

      let socket;

      // Helper to add message to messages area
      function addMessage(prefix, message, isError = false) {
        const time = new Date().toLocaleTimeString();
        const line = `[${time}] ${prefix}: ${message}`;
        const span = document.createElement('div');
        span.textContent = line;
        if (isError) {
          span.style.color = 'red';
        }
        messagesEl.appendChild(span);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function setStatus(text, color = '#333') {
        statusEl.textContent = text;
        statusEl.style.color = color;
      }

      function connect() {
        socket = new WebSocket(wsUrl);

        setStatus('Connecting to WebSocket server...');
        sendBtn.disabled = true;

        socket.onopen = () => {
          setStatus('Connected ✅', 'green');
          addMessage('System', 'WebSocket connection established.');
          sendBtn.disabled = false;
          inputEl.focus();
        };

        socket.onmessage = (event) => {
          addMessage('Server', event.data);
        };

        socket.onclose = (event) => {
          setStatus(`Disconnected (code: ${event.code})`, 'orange');
          addMessage('System', 'WebSocket connection closed.');
          sendBtn.disabled = true;
          // Try reconnecting after 3 seconds
          setTimeout(() => {
            addMessage('System', 'Reconnecting...');
            connect();
          }, 3000);
        };

        socket.onerror = (error) => {
          setStatus('WebSocket error ❌', 'red');
          addMessage('Error', 'WebSocket error occurred.', true);
          sendBtn.disabled = true;
        };
      }

      // Send message when button clicked or Enter pressed
      function sendMessage() {
        const msg = inputEl.value.trim();
        if (!msg) return;
        if (socket.readyState === WebSocket.OPEN) {
          socket.send(msg);
          addMessage('You', msg);
          inputEl.value = '';
          inputEl.focus();
        } else {
          addMessage('System', 'Cannot send: WebSocket is not open.', true);
        }
      }

      sendBtn.addEventListener('click', sendMessage);
      inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          sendMessage();
          e.preventDefault();
        }
      });

      connect();
    })();
  </script>
</body>
</html>
