<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thread Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #thread {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Thread Example</h1>
    <div id="thread"></div>

    <script>
        let thread = [];
        let currentThread = 0;

        function createThread() {
            const threadElement = document.getElementById("thread");
            thread.push(threadElement);
            threadElement.innerHTML = `<p>Thread ${currentThread + 1}: ${ThreadName(currentThread)}</p>`;
            threadElement.style.display = "block";
            currentThread++;
            if (currentThread < thread.length) {
                updateThread();
            }
        }

        function updateThread() {
            const threadElement = document.getElementById("thread");
            threadElement.innerHTML = "";
            thread.forEach((element, index) => {
                element.innerHTML = `<p>Thread ${index + 1}: ${ThreadName(index)}</p>`;
            });
        }

        function ThreadName(index) {
            switch (index) {
                case 0:
                    return "Thread 0";
                case 1:
                    return "Thread 1";
                case 2:
                    return "Thread 2";
                default:
                    return `Thread ${index}`;
            }
        }

        createThread();
    </script>
</body>
</html>
