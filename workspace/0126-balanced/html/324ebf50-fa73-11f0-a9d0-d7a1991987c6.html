<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        .status {
            margin-top: 20px;
            font-weight: bold;
            color: red;
        }
    </style>
</head>
<body>

<h1>Deadlock Simulation</h1>
<button id="start">Start Simulation</button>
<div class="status" id="status"></div>

<script>
    let resourceA = false;
    let resourceB = false;

    function process1() {
        // Process 1 tries to acquire resource A
        console.log('Process 1: Requesting Resource A...');
        resourceA = true;
        console.log('Process 1: Acquired Resource A.');

        // Simulating some operation with Resource A before requesting Resource B
        setTimeout(() => {
            console.log('Process 1: Requesting Resource B...');
            if (resourceB) {
                console.log('Process 1: Waiting for Resource B...');
                document.getElementById('status').innerText = 'Deadlock: Process 1 is waiting for Resource B.';
            } else {
                resourceB = true;
                console.log('Process 1: Acquired Resource B.');
                document.getElementById('status').innerText = 'Process 1: Acquired Resource B and completed.';
            }
        }, 1000);
    }

    function process2() {
        // Process 2 tries to acquire resource B
        console.log('Process 2: Requesting Resource B...');
        resourceB = true;
        console.log('Process 2: Acquired Resource B.');

        // Simulating some operation with Resource B before requesting Resource A
        setTimeout(() => {
            console.log('Process 2: Requesting Resource A...');
            if (resourceA) {
                console.log('Process 2: Waiting for Resource A...');
                document.getElementById('status').innerText = 'Deadlock: Process 2 is waiting for Resource A.';
            } else {
                resourceA = true;
                console.log('Process 2: Acquired Resource A.');
                document.getElementById('status').innerText = 'Process 2: Acquired Resource A and completed.';
            }
        }, 500);
    }

    document.getElementById('start').addEventListener('click', () => {
        // Reset resources and status
        resourceA = false;
        resourceB = false;
        document.getElementById('status').innerText = '';

        // Start both processes
        process1();
        process2();
    });
</script>

</body>
</html>
