<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Queue Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        h1 {
            text-align: center;
        }
        #queueContainer {
            margin-top: 20px;
        }
        #queueList {
            list-style-type: none;
            padding: 0;
        }
        #queueList li {
            background-color: #f4f4f4;
            margin: 5px 0;
            padding: 10px;
            border-radius: 3px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <h1>Priority Queue Demonstration</h1>
    
    <div>
        <label for="item">Add Item:</label>
        <input type="text" id="item" placeholder="Item (e.g., Task1)" />
        <label for="priority">Priority:</label>
        <input type="number" id="priority" min="1" placeholder="Priority (a number)" />
        <button onclick="enqueue()">Add to Queue</button>
    </div>

    <div id="queueContainer">
        <h3>Current Priority Queue</h3>
        <ul id="queueList"></ul>
    </div>

    <button onclick="dequeue()">Process Next Item</button>
    
    <script>
        class PriorityQueue {
            constructor() {
                this.elements = [];
            }

            isEmpty() {
                return this.elements.length === 0;
            }

            enqueue(item, priority) {
                this.elements.push({ item, priority });
                this.elements.sort((a, b) => a.priority - b.priority);
            }

            dequeue() {
                return this.elements.shift();
            }

            peek() {
                return this.elements[0];
            }

            getQueue() {
                return this.elements;
            }
        }

        const queue = new PriorityQueue();

        function updateQueueUI() {
            const queueList = document.getElementById('queueList');
            queueList.innerHTML = '';
            const elements = queue.getQueue();
            elements.forEach(element => {
                const li = document.createElement('li');
                li.textContent = `${element.item} (Priority: ${element.priority})`;
                queueList.appendChild(li);
            });
        }

        function enqueue() {
            const itemInput = document.getElementById('item');
            const priorityInput = document.getElementById('priority');
            const item = itemInput.value.trim();
            const priority = parseInt(priorityInput.value);

            if (item && !isNaN(priority)) {
                queue.enqueue(item, priority);
                updateQueueUI();
                itemInput.value = '';
                priorityInput.value = '';
            } else {
                alert('Please enter a valid item and priority.');
            }
        }

        function dequeue() {
            if (!queue.isEmpty()) {
                const processed = queue.dequeue();
                alert(`Processed: ${processed.item} (Priority: ${processed.priority})`);
                updateQueueUI();
            } else {
                alert('The queue is empty!');
            }
        }
    </script>
</body>
</html>
