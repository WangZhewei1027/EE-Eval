<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Table Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f8f8f8;
        }
        h1 {
            color: #333;
        }
        input {
            margin: 5px 0;
        }
        button {
            margin: 5px 10px;
            padding: 5px 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #output {
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<h1>Hash Table Demo</h1>
<label for="key">Key:</label>
<input type="text" id="key" placeholder="Enter key"><br>
<label for="value">Value:</label>
<input type="text" id="value" placeholder="Enter value"><br>
<button id="insert">Insert</button>
<button id="retrieve">Retrieve</button>
<button id="delete">Delete</button>

<div id="output"></div>

<script>
    class HashTable {
        constructor(size) {
            this.table = new Array(size);
        }

        // Hash function
        hash(key) {
            let total = 0;
            for (let char of key) {
                total += char.charCodeAt(0);
            }
            return total % this.table.length;
        }

        // Insert key-value pair
        insert(key, value) {
            const index = this.hash(key);
            if (!this.table[index]) {
                this.table[index] = [];
            }
            // Check if the key already exists and update the value
            const existingPair = this.table[index].find(pair => pair[0] === key);
            if (existingPair) {
                existingPair[1] = value;
            } else {
                this.table[index].push([key, value]);
            }
        }

        // Retrieve value by key
        retrieve(key) {
            const index = this.hash(key);
            const bucket = this.table[index];
            if (bucket) {
                const pair = bucket.find(pair => pair[0] === key);
                return pair ? pair[1] : undefined;
            }
            return undefined;
        }

        // Delete key-value pair
        remove(key) {
            const index = this.hash(key);
            const bucket = this.table[index];
            if (bucket) {
                this.table[index] = bucket.filter(pair => pair[0] !== key);
            }
        }

        // Display hash table content
        display() {
            let output = "";
            for (let i = 0; i < this.table.length; i++) {
                if (this.table[i]) {
                    output += `Index ${i}: ${JSON.stringify(this.table[i])}<br>`;
                }
            }
            return output || "Hash Table is empty.";
        }
    }

    const hashTable = new HashTable(10);

    document.getElementById("insert").onclick = function() {
        const key = document.getElementById("key").value;
        const value = document.getElementById("value").value;
        hashTable.insert(key, value);
        document.getElementById("output").innerHTML = "Inserted: " + JSON.stringify({ key, value }) + "<br>" + hashTable.display();
    };

    document.getElementById("retrieve").onclick = function() {
        const key = document.getElementById("key").value;
        const value = hashTable.retrieve(key);
        document.getElementById("output").innerHTML = value !== undefined ? "Retrieved value: " + value : "Key not found.";
    };

    document.getElementById("delete").onclick = function() {
        const key = document.getElementById("key").value;
        hashTable.remove(key);
        document.getElementById("output").innerHTML = "Deleted key: " + key + "<br>" + hashTable.display();
    };
</script>

</body>
</html>
