<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Sort Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        #arrayDiv {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .bar {
            width: 30px;
            margin: 1px;
            background-color: teal;
            text-align: center;
            color: white;
            line-height: 30px;
        }
        #output {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>Counting Sort Visualization</h1>
<p>Enter numbers (0-9) separated by commas:</p>
<input type="text" id="inputArray" value="4,2,2,8,3,3,1">
<button onclick="performCountingSort()">Sort</button>

<h2>Original Array</h2>
<div id="arrayDiv"></div>

<h2>Sorted Array</h2>
<div id="output"></div>

<script>
function displayArray(array, containerId) {
    const arrayDiv = document.getElementById(containerId);
    arrayDiv.innerHTML = '';
    for (let number of array) {
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = `${number * 10}px`;
        bar.textContent = number;
        arrayDiv.appendChild(bar);
    }
}

function countingSort(array) {
    const max = Math.max(...array);
    const count = new Array(max + 1).fill(0);
    const output = new Array(array.length);

    // Store the count of each number
    for (let num of array) {
        count[num]++;
    }

    // Change count[i] so that it now contains the actual
    // position of this number in output[]
    for (let i = 1; i <= max; i++) {
        count[i] += count[i - 1];
    }

    // Build the output array
    for (let i = array.length - 1; i >= 0; i--) {
        output[count[array[i]] - 1] = array[i];
        count[array[i]]--;
    }

    return output;
}

function performCountingSort() {
    const input = document.getElementById('inputArray').value;
    const array = input.split(',').map(Number);
    
    // Display original array
    displayArray(array, 'arrayDiv');
    
    // Sort the array
    const sortedArray = countingSort(array);
    
    // Display sorted array
    displayArray(sortedArray, 'output');
}
</script>

</body>
</html>
