<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        
        #monitor {
            width: 50%;
            margin: 40px auto;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        #monitor h1 {
            margin-top: 0;
        }
        
        #monitor p {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="monitor">
        <h1>Monitor</h1>
        <p>This is a simple monitor application.</p>
    </div>

    <script>
        const monitor = document.getElementById('monitor');
        const text = document.createElement('p');
        text.textContent = 'This is a simple monitor application.';
        monitor.appendChild(text);

        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = 'Enter text to display on the monitor';
        monitor.appendChild(input);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const textToDisplay = input.value.trim();
                if (textToDisplay) {
                    monitor.appendChild(document.createTextNode(textToDisplay));
                    input.value = '';
                }
            }
        });
    </script>
</body>
</html>
