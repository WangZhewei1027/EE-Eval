<!DOCTYPE html>
<html>
<head>
    <title>SQL Demo</title>
</head>
<body>
    <h1>SQL Demo</h1>
    <p>Connecting to a SQLite Database</p>
    <script>
        // Connect to the SQLite database
        var db = new SQLite.Database('example.db');

        // Create a table
        db.serialize(function() {
            db.run("CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT, email TEXT)");
        });

        // Insert data into the table
        db.run("INSERT INTO users (name, email) VALUES ('John Doe', 'john.doe@example.com')");

        // Query the table
        db.all("SELECT * FROM users", function(err, rows) {
            if (err) {
                throw err;
            }
            console.log(rows);
        });

        // Update data in the table
        db.run("UPDATE users SET email = 'john.doe2@example.com' WHERE id = 1");

        // Delete data from the table
        db.run("DELETE FROM users WHERE id = 1");

        // Close the database connection
        db.close();
    </script>
</body>
</html>
