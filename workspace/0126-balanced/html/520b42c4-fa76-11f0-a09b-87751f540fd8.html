<!DOCTYPE html>
<html>
<head>
  <title>Garbage Collection</title>
  <style>
    body {
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>Garbage Collection</h1>
  <p id="gc-log"></p>
  <script>
    let heap = new Array(1000).fill(0);
    let garbage = new Set();

    function garbageCollection() {
      console.log("Garbage Collection: ", garbage);
      for (let i of garbage) {
        heap[i] = 0;
        garbage.delete(i);
      }
    }

    function collectGarbage() {
      let log = "";
      for (let i = 0; i < heap.length; i++) {
        if (heap[i] > 0) {
          log += `Heap ${i}: Garbage collected\n`;
          heap[i] = 0;
        } else {
          log += `Heap ${i}: No garbage\n`;
        }
      }
      document.getElementById("gc-log").innerHTML = log;
    }

    setInterval(collectGarbage, 1000);

    let gcLog = document.getElementById("gc-log");
    garbageCollection();
  </script>
</body>
</html>
