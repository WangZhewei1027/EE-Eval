<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Binary Search Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 40px;
    background: #f9f9f9;
  }
  h1 {
    text-align: center;
  }
  .container {
    max-width: 600px;
    margin: auto;
  }
  label, input, button {
    font-size: 1rem;
  }
  input[type="number"] {
    width: 80px;
    padding: 6px;
    margin-right: 10px;
  }
  .array-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin: 20px 0;
    gap: 6px;
  }
  .element {
    width: 40px;
    height: 40px;
    background: #ddd;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 4px;
    user-select: none;
    font-weight: bold;
    transition: background-color 0.3s, transform 0.3s;
  }
  .element.low {
    background: #a0c4ff;
  }
  .element.high {
    background: #ffadad;
  }
  .element.mid {
    background: #ffd6a5;
    transform: scale(1.2);
    font-weight: 900;
  }
  .element.found {
    background: #9bf6ff;
    font-weight: 900;
    color: #005f73;
  }
  .status {
    font-size: 1.1rem;
    margin-top: 20px;
    min-height: 1.5em;
    text-align: center;
  }
  button {
    cursor: pointer;
    background: #0077b6;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 4px;
  }
  button:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  small {
    display: block;
    margin-top: 10px;
    color: #555;
    font-style: italic;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Binary Search Visualization</h1>
    <p>Array is sorted. Enter a number to search:</p>
    <input type="number" id="searchValue" placeholder="Value" />
    <button id="startBtn">Start Search</button>
    <button id="resetBtn" disabled>Reset</button>
    <div class="array-container" id="arrayContainer"></div>
    <div class="status" id="status"></div>
    <small>Elements in blue: low index, red: high index, orange: middle, cyan: found</small>
  </div>

<script>
(() => {
  // Sorted array to search in
  const array = [3, 7, 12, 19, 23, 27, 31, 38, 44, 49, 53, 59, 63, 67, 72, 78, 85, 90, 95, 99];

  const arrayContainer = document.getElementById('arrayContainer');
  const searchInput = document.getElementById('searchValue');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const statusDiv = document.getElementById('status');

  let low = 0;
  let high = array.length - 1;
  let mid = null;
  let searching = false;
  let timer = null;

  function renderArray(highlight = {}) {
    // highlight: {low, mid, high, found}
    arrayContainer.innerHTML = '';
    for (let i = 0; i < array.length; i++) {
      const div = document.createElement('div');
      div.textContent = array[i];

      if (i === highlight.found) {
        div.classList.add('element', 'found');
      } else if (i === highlight.mid) {
        div.classList.add('element', 'mid');
      } else if (i === highlight.low) {
        div.classList.add('element', 'low');
      } else if (i === highlight.high) {
        div.classList.add('element', 'high');
      } else {
        div.classList.add('element');
      }
      arrayContainer.appendChild(div);
    }
  }

  function binarySearchStep(target) {
    if (low > high) {
      // Not found
      statusDiv.textContent = `Value ${target} not found in the array.`;
      renderArray({});
      searching = false;
      startBtn.disabled = false;
      resetBtn.disabled = false;
      return;
    }

    mid = Math.floor((low + high) / 2);

    renderArray({low, mid, high});

    statusDiv.textContent = `Low index: ${low} (value: ${array[low]}), High index: ${high} (value: ${array[high]}), Mid index: ${mid} (value: ${array[mid]})`;

    if (array[mid] === target) {
      // Found target
      renderArray({found: mid});
      statusDiv.textContent = `Found value ${target} at index ${mid}!`;
      searching = false;
      startBtn.disabled = false;
      resetBtn.disabled = false;
      return;
    } else if (array[mid] < target) {
      low = mid + 1;
    } else {
      high = mid - 1;
    }

    // Continue steps after short delay
    timer = setTimeout(() => binarySearchStep(target), 1000);
  }

  function startSearch() {
    const val = parseInt(searchInput.value, 10);
    if (isNaN(val)) {
      alert('Please enter a valid number.');
      return;
    }
    low = 0;
    high = array.length - 1;
    mid = null;
    searching = true;
    startBtn.disabled = true;
    resetBtn.disabled = false;
    statusDiv.textContent = 'Starting binary search...';
    binarySearchStep(val);
  }

  function reset() {
    if (timer) {
      clearTimeout(timer);
      timer = null;
    }
    searching = false;
    low = 0;
    high = array.length - 1;
    mid = null;
    renderArray({});
    statusDiv.textContent = '';
    startBtn.disabled = false;
    resetBtn.disabled = true;
  }

  // Initial render
  renderArray({});

  startBtn.addEventListener('click', () => {
    if (!searching) {
      startSearch();
    }
  });

  resetBtn.addEventListener('click', () => {
    reset();
  });

})();
</script>

</body>
</html>
