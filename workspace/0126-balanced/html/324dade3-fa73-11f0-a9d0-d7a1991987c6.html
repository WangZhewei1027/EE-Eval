<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depth-First Search (DFS) Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #graph {
            margin: 20px;
        }
        .node {
            display: inline-block;
            border: 1px solid #000;
            padding: 10px;
            border-radius: 5px;
            margin: 10px;
            position: relative;
        }
        .edge {
            height: 20px;
            position: absolute;
            background-color: #000;
        }
    </style>
</head>
<body>

<h1>Depth-First Search (DFS) Visualization</h1>
<div id="graph"></div>
<button onclick="startDFS()">Start DFS</button>

<script>
    // Representation of the graph using an adjacency list
    const graph = {
        A: ['B', 'C'],
        B: ['D', 'E'],
        C: ['F'],
        D: [],
        E: ['F'],
        F: []
    };

    let visited = new Set();

    function createGraphVisual() {
        const graphContainer = document.getElementById('graph');
        graphContainer.innerHTML = ''; // Clear previous graph

        // Create nodes
        Object.keys(graph).forEach(node => {
            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'node';
            nodeDiv.innerText = node;
            nodeDiv.id = node;
            graphContainer.appendChild(nodeDiv);
        });

        // Create edges
        for (let node in graph) {
            graph[node].forEach(neighbour => {
                const edge = document.createElement('div');
                edge.className = 'edge';
                const nodeDiv = document.getElementById(node);
                const neighbourDiv = document.getElementById(neighbour);
                edge.style.width = Math.abs(nodeDiv.offsetLeft - neighbourDiv.offsetLeft) + 'px';
                edge.style.top = nodeDiv.offsetTop + nodeDiv.offsetHeight / 2 + 'px';
                edge.style.left = Math.min(nodeDiv.offsetLeft, neighbourDiv.offsetLeft) + nodeDiv.offsetWidth + 'px';
                graphContainer.appendChild(edge);
            });
        }
    }

    function dfs(node) {
        if (!node || visited.has(node)) return;
        console.log(node);  // Visit the node
        visited.add(node);

        const nodeElement = document.getElementById(node);
        nodeElement.style.backgroundColor = 'lightgreen'; // Highlight the node

        // Recursive DFS for adjacent nodes
        for (const neighbor of graph[node]) {
            dfs(neighbor);
        }
    }

    function startDFS() {
        visited.clear(); // Reset visited set
        createGraphVisual();
        setTimeout(() => { dfs('A'); }, 1000); // Start DFS after a brief pause
    }

    // Initialize graph visual on load
    window.onload = createGraphVisual;
</script>

</body>
</html>
