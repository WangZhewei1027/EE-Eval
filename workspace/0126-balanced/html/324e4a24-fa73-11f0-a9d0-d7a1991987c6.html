<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Pointers Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        input {
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
            margin-left: 10px;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>Two Pointers Demonstration</h1>
    <p>Enter a sorted array of numbers (comma-separated):</p>
    <input type="text" id="arrayInput" placeholder="e.g., -4,-1,0,3,5,9">
    <button id="runButton">Run Example</button>

    <div id="result"></div>

    <script>
        document.getElementById('runButton').addEventListener('click', function() {
            const input = document.getElementById('arrayInput').value;
            const nums = input.split(',').map(Number);
            const result = removeDuplicates(nums);
            document.getElementById('result').innerText = `Unique elements: [${result.join(', ')}]`;
        });

        function removeDuplicates(arr) {
            if (arr.length === 0) return [];

            let left = 0;  // First pointer
            for (let right = 1; right < arr.length; right++) {  // Second pointer
                if (arr[left] !== arr[right]) {
                    left++;
                    arr[left] = arr[right];  // Move unique element to the left pointer
                }
            }
            return arr.slice(0, left + 1);
        }
    </script>

</body>
</html>
