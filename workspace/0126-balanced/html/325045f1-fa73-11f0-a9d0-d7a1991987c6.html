<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asymmetric Cryptography Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        #box {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

<div id="box">
    <h1>Asymmetric Cryptography Demo</h1>
    <button id="generateKeys">Generate Keys</button>
    <button id="encryptMessage" disabled>Encrypt Message</button>
    <button id="decryptMessage" disabled>Decrypt Message</button>

    <h3>Public Key:</h3>
    <pre id="publicKey"></pre>
    
    <h3>Private Key:</h3>
    <pre id="privateKey"></pre>
    
    <h3>Message:</h3>
    <textarea id="message" rows="4" cols="50"></textarea>
    
    <h3>Encrypted Message:</h3>
    <pre id="encryptedMessage"></pre>

    <h3>Decrypted Message:</h3>
    <pre id="decryptedMessage"></pre>
</div>

<script>
    let publicKey, privateKey;

    async function generateKeys() {
        const { publicKey: pubKey, privateKey: privKey } = await window.crypto.subtle.generateKey(
            {
                name: "RSA-OAEP",
                modulusLength: 2048,
                publicExponent: new Uint8Array([1, 0, 1]),
                hash: "SHA-256"
            },
            true,
            ["encrypt", "decrypt"]
        );

        publicKey = pubKey;
        privateKey = privKey;

        const exportedPublicKey = await window.crypto.subtle.exportKey("spki", pubKey);
        const exportedPrivateKey = await window.crypto.subtle.exportKey("pkcs8", privKey);

        document.getElementById("publicKey").textContent = base64ArrayBuffer(exportedPublicKey);
        document.getElementById("privateKey").textContent = base64ArrayBuffer(exportedPrivateKey);
        
        document.getElementById("encryptMessage").disabled = false;
        document.getElementById("decryptMessage").disabled = false;
        
        alert("Keys generated successfully!");
    }

    async function encryptMessage() {
        const message = document.getElementById("message").value;
        const encodedMessage = new TextEncoder().encode(message);

        const encryptedMessage = await window.crypto.subtle.encrypt(
            {
                name: "RSA-OAEP"
            },
            publicKey,
            encodedMessage
        );

        document.getElementById("encryptedMessage").textContent = base64ArrayBuffer(encryptedMessage);
    }

    async function decryptMessage() {
        const encryptedMessage = document.getElementById("encryptedMessage").textContent;
        const decryptedData = await window.crypto.subtle.decrypt(
            {
                name: "RSA-OAEP"
            },
            privateKey,
            base64ToArrayBuffer(encryptedMessage)
        );

        const decryptedMessage = new TextDecoder().decode(decryptedData);
        document.getElementById("decryptedMessage").textContent = decryptedMessage;
    }

    function base64ArrayBuffer(arrayBuffer) {
        let bytes = new Uint8Array(arrayBuffer);
        let binary = '';
        let len = bytes.byteLength;
        for (let i = 0; i < len; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return window.btoa(binary);
    }

    function base64ToArrayBuffer(base64) {
        let binaryString = window.atob(base64);
        let len = binaryString.length;
        let bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        return bytes.buffer;
    }

    document.getElementById("generateKeys").addEventListener("click", generateKeys);
    document.getElementById("encryptMessage").addEventListener("click", encryptMessage);
    document.getElementById("decryptMessage").addEventListener("click", decryptMessage);
</script>

</body>
</html>
