<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Array Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        button {
            margin-top: 10px;
            padding: 10px 15px;
            font-size: 16px;
        }
        pre {
            background-color: #f4f4f4;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>JavaScript Array Demonstration</h1>

<p>Click the button below to see the array operations in action!</p>
<button id="run-array-demo">Run Array Demo</button>

<h2>Output:</h2>
<pre id="output"></pre>

<script>
    document.getElementById('run-array-demo').addEventListener('click', function() {
        // Initialize an array
        let fruits = ['Apple', 'Banana', 'Cherry'];

        // Display original array
        let output = 'Original array: ' + JSON.stringify(fruits) + '\n\n';

        // Add an element
        fruits.push('Mango');
        output += 'After adding Mango: ' + JSON.stringify(fruits) + '\n';

        // Remove an element
        fruits.pop();
        output += 'After removing last element: ' + JSON.stringify(fruits) + '\n';

        // Access an element by index
        output += 'First fruit: ' + fruits[0] + '\n';

        // Loop through the array
        output += 'All fruits:\n';
        for (let i = 0; i < fruits.length; i++) {
            output += (i + 1) + ': ' + fruits[i] + '\n';
        }

        // Array length
        output += 'Total number of fruits: ' + fruits.length;

        // Display the output
        document.getElementById('output').innerText = output;
    });
</script>

</body>
</html>
