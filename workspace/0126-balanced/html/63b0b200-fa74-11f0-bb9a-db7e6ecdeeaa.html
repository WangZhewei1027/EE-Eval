<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Min Heap Visualization and Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f5f7fa;
    color: #333;
  }
  h1 {
    text-align: center;
    margin-bottom: 5px;
  }
  .container {
    max-width: 700px;
    margin: 0 auto;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 8px 20px rgb(0 0 0 / 0.1);
    padding: 25px;
  }
  .heap-array {
    margin-top: 1rem;
    font-family: monospace;
    font-size: 1.2rem;
    background: #e1ecfc;
    padding: 10px 15px;
    border-radius: 6px;
    user-select: none;
  }
  .controls {
    display: flex;
    gap: 15px;
    margin-top: 15px;
    flex-wrap: wrap;
  }
  .controls > div {
    flex: 1 1 120px;
  }
  input[type="number"] {
    width: 100%;
    padding: 8px 10px;
    font-size: 1rem;
    border: 2px solid #2980b9;
    border-radius: 5px;
  }
  button {
    width: 100%;
    padding: 10px 0;
    background-color: #2980b9;
    color: white;
    border: none;
    border-radius: 5px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.25s ease;
  }
  button:disabled {
    background-color: #999;
    cursor: not-allowed;
  }
  button:hover:not(:disabled) {
    background-color: #1c5980;
  }
  #message {
    margin-top: 1rem;
    min-height: 1.5em;
    font-weight: 600;
    color: #2980b9;
  }
  .heap-tree {
    margin-top: 25px;
    text-align: center;
  }
  svg {
    max-width: 100%;
    height: 250px;
  }
  .node-circle {
    fill: #2980b9;
    stroke: #1c5980;
    stroke-width: 2px;
  }
  .node-text {
    fill: white;
    font-weight: 600;
    user-select: none;
  }
  .edge-line {
    stroke: #7f8c8d;
    stroke-width: 2px;
  }
  footer {
    margin-top: 40px;
    text-align: center;
    font-size: 0.9rem;
    color: #666;
  }
  @media (max-width: 480px) {
    .controls {
      flex-direction: column;
    }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Min Heap (Binary Heap) Demo</h1>
  <p>A Min Heap maintains the smallest element at the root. Each parent node is less than or equal to its children.</p>

  <div class="controls">
    <div>
      <input type="number" id="insertValue" placeholder="Value to insert" />
      <button id="insertBtn">Insert</button>
    </div>
    <div>
      <button id="extractBtn">Extract Min</button>
    </div>
    <div>
      <button id="peekBtn">Peek Min</button>
    </div>
    <div>
      <button id="clearBtn">Clear Heap</button>
    </div>
  </div>
  <div id="message"></div>

  <h2>Heap Array Representation</h2>
  <div class="heap-array" id="heapArray">[]</div>

  <h2>Heap Tree Visualization</h2>
  <div class="heap-tree">
    <svg id="heapSvg" viewBox="0 0 600 250" aria-label="Min Heap Tree"></svg>
  </div>
</div>
<footer>
  &copy; 2024 Min Heap Demo
</footer>

<script>
  class MinHeap {
    constructor() {
      this.heap = [];
    }
    size() {
      return this.heap.length;
    }
    insert(value) {
      this.heap.push(value);
      this._bubbleUp(this.heap.length - 1);
    }
    peek() {
      if (this.size() === 0) return null;
      return this.heap[0];
    }
    extractMin() {
      if (this.size() === 0) return null;
      if (this.size() === 1) return this.heap.pop();
      const min = this.heap[0];
      this.heap[0] = this.heap.pop();
      this._bubbleDown(0);
      return min;
    }
    _bubbleUp(index) {
      while (index > 0) {
        const parentIndex = Math.floor((index - 1) / 2);
        if (this.heap[index] < this.heap[parentIndex]) {
          [this.heap[index], this.heap[parentIndex]] = [this.heap[parentIndex], this.heap[index]];
          index = parentIndex;
        } else {
          break;
        }
      }
    }
    _bubbleDown(index) {
      const size = this.size();
      while (true) {
        let smallest = index;
        const left = 2 * index + 1;
        const right = 2 * index + 2;

        if (left < size && this.heap[left] < this.heap[smallest]) {
          smallest = left;
        }
        if (right < size && this.heap[right] < this.heap[smallest]) {
          smallest = right;
        }
        if (smallest === index) break;
        [this.heap[index], this.heap[smallest]] = [this.heap[smallest], this.heap[index]];
        index = smallest;
      }
    }
    clear() {
      this.heap = [];
    }
  }

  // Visualization code
  const svgNS = "http://www.w3.org/2000/svg";

  function clearSvg(svg) {
    while (svg.firstChild) {
      svg.removeChild(svg.firstChild);
    }
  }

  // Binary heap tree positions:
  // We will display nodes in levels with fixed vertical spacing
  // Horizontally, nodes equally spaced depending on how many can fit at that level

  // Constants for visualization
  const levelHeight = 70;
  const nodeRadius = 20;
  const svgWidth = 600;
  const svgHeight = 250;

  function drawHeapTree(svg, heap) {
    clearSvg(svg);
    if (heap.length === 0) {
      // Display "Empty Heap" text centered
      const emptyText = document.createElementNS(svgNS, "text");
      emptyText.textContent = "Heap is empty";
      emptyText.setAttribute("x", svgWidth / 2);
      emptyText.setAttribute("y", svgHeight / 2);
      emptyText.setAttribute("font-size", "18");
      emptyText.setAttribute("fill", "#666");
      emptyText.setAttribute("text-anchor", "middle");
      emptyText.setAttribute("dominant-baseline", "middle");
      svg.appendChild(emptyText);
      return;
    }

    // Compute positions for each node based on heap index
    // Level order: level of node i is floor(log2(i+1))
    // Number of nodes at level L is 2^L

    // Precompute positions
    const positions = [];

    const totalLevels = Math.floor(Math.log2(heap.length)) + 1;

    for (let i = 0; i < heap.length; i++) {
      const level = Math.floor(Math.log2(i + 1));
      const indexInLevel = i - (Math.pow(2, level) - 1);
      const nodesInLevel = Math.pow(2, level);

      const horizontalGap = svgWidth / (nodesInLevel + 1);
      const x = horizontalGap * (indexInLevel + 1);
      const y = levelHeight * (level + 1);

      positions.push({ x, y });
    }

    // Draw edges first (lines from parents to children)
    for (let i = 0; i < heap.length; i++) {
      const leftChild = 2 * i + 1;
      const rightChild = 2 * i + 2;
      const from = positions[i];
      if (leftChild < heap.length) {
        const to = positions[leftChild];
        const line = document.createElementNS(svgNS, "line");
        line.setAttribute("x1", from.x);
        line.setAttribute("y1", from.y + nodeRadius);
        line.setAttribute("x2", to.x);
        line.setAttribute("y2", to.y - nodeRadius);
        line.setAttribute("class", "edge-line");
        svg.appendChild(line);
      }
      if (rightChild < heap.length) {
        const to = positions[rightChild];
        const line = document.createElementNS(svgNS, "line");
        line.setAttribute("x1", from.x);
        line.setAttribute("y1", from.y + nodeRadius);
        line.setAttribute("x2", to.x);
        line.setAttribute("y2", to.y - nodeRadius);
        line.setAttribute("class", "edge-line");
        svg.appendChild(line);
      }
    }

    // Draw nodes (circles + text)
    for (let i = 0; i < heap.length; i++) {
      const { x, y } = positions[i];
      
      const circle = document.createElementNS(svgNS, "circle");
      circle.setAttribute("cx", x);
      circle.setAttribute("cy", y);
      circle.setAttribute("r", nodeRadius);
      circle.setAttribute("class", "node-circle");
      svg.appendChild(circle);

      const text = document.createElementNS(svgNS, "text");
      text.setAttribute("x", x);
      text.setAttribute("y", y + 5);
      text.setAttribute("class", "node-text");
      text.setAttribute("text-anchor", "middle");
      text.textContent = heap[i];
      svg.appendChild(text);
    }
  }

  // DOM elements
  const heapArrayEl = document.getElementById("heapArray");
  const insertValueInput = document.getElementById("insertValue");
  const insertBtn = document.getElementById("insertBtn");
  const extractBtn = document.getElementById("extractBtn");
  const peekBtn = document.getElementById("peekBtn");
  const clearBtn = document.getElementById("clearBtn");
  const messageEl = document.getElementById("message");
  const heapSvg = document.getElementById("heapSvg");

  const heap = new MinHeap();

  function updateDisplay() {
    heapArrayEl.textContent = `[ ${heap.heap.join(", ")} ]`;
    drawHeapTree(heapSvg, heap.heap);
  }

  function showMessage(text, isError = false) {
    messageEl.textContent = text;
    messageEl.style.color = isError ? "#c0392b" : "#2980b9";
  }

  insertBtn.addEventListener("click", () => {
    const val = insertValueInput.value.trim();
    if (val === "") {
      showMessage("Please enter a number to insert", true);
      return;
    }
    const num = Number(val);
    if (isNaN(num)) {
      showMessage("Invalid input. Enter a valid number.", true);
      return;
    }
    heap.insert(num);
    showMessage(`Inserted value ${num} into the heap.`);
    insertValueInput.value = "";
    updateDisplay();
  });

  extractBtn.addEventListener("click", () => {
    if (heap.size() === 0) {
      showMessage("Heap is empty. Cannot extract min.", true);
      return;
    }
    const min = heap.extractMin();
    showMessage(`Extracted minimum value: ${min}`);
    updateDisplay();
  });

  peekBtn.addEventListener("click", () => {
    if (heap.size() === 0) {
      showMessage("Heap is empty.");
      return;
    }
    const min = heap.peek();
    showMessage(`Minimum value (peek): ${min}`);
  });

  clearBtn.addEventListener("click", () => {
    heap.clear();
    showMessage("Heap cleared.");
    updateDisplay();
  });

  // Initialize display
  updateDisplay();
</script>
</body>
</html>
