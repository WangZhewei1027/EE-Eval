<!DOCTYPE html>
<html>
<head>
    <title>Heap Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Heap Sort</h2>
        <p>Heap Sort is a comparison-based sorting algorithm that uses a binary heap data structure.</p>
        <button onclick="heapSort(array, 0, array.length - 1)">Heap Sort</button>
        <div id="result"></div>
    </div>

    <script>
        function heapSort(array, start, end) {
            if (start < end) {
                // Swap the root with the last element
                let root = array[start];
                let last = end;
                while (last > start && array[last] > root) {
                    // Swap the elements
                    let temp = array[last];
                    array[last] = root;
                    root = temp;
                    last--;
                }

                // Heapify the reduced heap
                heapify(array, start, last);
            }
        }

        function heapify(array, start, end) {
            let largest = start;
            let left = 2 * start + 1;
            let right = 2 * start + 2;

            if (left < end && array[left] > array[largest]) {
                largest = left;
            }

            if (right < end && array[right] > array[largest]) {
                largest = right;
            }

            if (largest !== start) {
                let temp = array[start];
                array[start] = array[largest];
                array[largest] = temp;
                heapify(array, start, largest);
            }
        }

        let array = [12, 11, 13, 5, 6, 7];
        let result = document.getElementById("result");
        result.innerHTML = "Original array: ";
        for (let i = 0; i < array.length; i++) {
            result.innerHTML += array[i] + " ";
        }
        heapSort(array, 0, array.length - 1);
        result.innerHTML = "Sorted array: ";
        for (let i = 0; i < array.length; i++) {
            result.innerHTML += array[i] + " ";
        }
    </script>
</body>
</html>
