<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refactoring Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .result {
            font-size: 20px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Refactoring Example</h1>
    <input type="number" id="num1" placeholder="Enter first number" />
    <input type="number" id="num2" placeholder="Enter second number" />
    <button onclick="calculateSum()">Calculate Sum</button>
    <div class="result" id="result"></div>

    <script>
        // Original function without refactoring
        function calculateSum() {
            var num1 = parseFloat(document.getElementById('num1').value);
            var num2 = parseFloat(document.getElementById('num2').value);
            var result;

            if (!isNaN(num1) && !isNaN(num2)) {
                result = num1 + num2;
            } else {
                result = "Please enter valid numbers";
            }

            document.getElementById('result').innerText = result;
        }

        // Refactored version of the original function
        function calculateSumRefactored() {
            const num1 = getNumberValue('num1');
            const num2 = getNumberValue('num2');
            const result = computeSum(num1, num2);

            displayResult(result);
        }

        function getNumberValue(id) {
            const value = parseFloat(document.getElementById(id).value);
            return isNaN(value) ? null : value;
        }

        function computeSum(num1, num2) {
            if (num1 !== null && num2 !== null) {
                return num1 + num2;
            }
            return "Please enter valid numbers";
        }

        function displayResult(result) {
            document.getElementById('result').innerText = result;
        }

        // To use the refactored function
        document.querySelector('button').onclick = calculateSumRefactored;
    </script>
</body>
</html>
