<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Typing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #container {
            width: 50%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #container h1 {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Static Typing Example</h1>
        <p>This is a static typing example.</p>
        <p>This paragraph will not be rendered.</p>
        <script>
            // Define a function with static typing
            function greet(name) {
                return `Hello, ${name}!`;
            }
            
            // Call the function with a variable
            console.log(greet("John"));
        </script>
    </div>
</body>
</html>
