<!DOCTYPE html>
<html>
<head>
    <title>Two Pointers</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Two Pointers Example</h1>
    <p>Two Pointers</p>
    <button id="two-pointers-example">Two Pointers Example</button>
    <script>
        function twoPointers() {
            let arr = [1, 2, 3, 4, 5];
            let sum1 = 0;
            let sum2 = 0;

            // Initialize two pointers at the beginning of the array
            let left = 0;
            let right = arr.length - 1;

            // Traverse the array using two pointers
            while (left <= right) {
                sum1 += arr[left];
                sum2 += arr[right];

                // Move the pointers based on the sum of elements at the pointers
                if (sum1 > sum2) {
                    left++;
                } else {
                    right--;
                }
            }

            // Print the result
            console.log("Sum of elements at the two pointers:", sum1);
            console.log("Sum of elements at the other two pointers:", sum2);
        }

        // Add a button to trigger the two pointers example
        document.getElementById("two-pointers-example").addEventListener("click", twoPointers);
    </script>
</body>
</html>
