<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Vector Machine</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .container {
            width: 50%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .container h1 {
            margin-top: 0;
        }
        .container p {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Support Vector Machine</h1>
        <p>Imagine a line in the plane that maximizes the margin between the line and the data points.</p>
        <button id="generate-button">Generate SVM</button>
        <div id="svm-output"></div>
    </div>

    <script>
        const generateButton = document.getElementById('generate-button');
        const svmOutputDiv = document.getElementById('svm-output');

        generateButton.addEventListener('click', () => {
            const data = {
                features: [1, 2, 3, 4, 5],
                labels: [0, 0, 0, 1, 1]
            };

            const svm = new SVMModel();
            svm.train(data);

            const predictions = svm.predict(data.features.map(feature => feature[0]));
            const output = predictions.map(label => label === 1 ? 'Positive' : 'Negative');

            svmOutputDiv.innerHTML = `
                <h2>SVM Output:</h2>
                <p>Positive: ${output.join(', ')}</p>
            `;
        });
    </script>
</body>
</html>
