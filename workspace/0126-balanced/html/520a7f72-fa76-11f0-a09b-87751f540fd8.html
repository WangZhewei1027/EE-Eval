<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indexing Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #indexing {
            width: 80%;
            margin: 40px auto;
            text-align: center;
        }
        #indexing h2 {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h2>Indexing Example</h2>
    <div id="indexing">
        <h2>Original List:</h2>
        <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>
        <h2>Indexed List:</h2>
        <ol>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ol>
    </div>

    <script>
        // Original list
        let originalList = ['Item 1', 'Item 2', 'Item 3'];
        console.log('Original List:', originalList);

        // Indexing
        let indexedList = originalList.map((item, index) => `${index + 1}. ${item}`);
        console.log('Indexed List:', indexedList);

        // Update the original list with the indexed list
        originalList = indexedList;
        console.log('Updated Original List:', originalList);
    </script>
</body>
</html>
