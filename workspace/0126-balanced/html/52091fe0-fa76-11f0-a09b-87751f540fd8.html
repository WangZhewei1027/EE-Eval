<!DOCTYPE html>
<html>
<head>
    <title>Interpolation Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #search-container {
            width: 300px;
            margin: 40px auto;
        }
    </style>
</head>
<body>
    <h1>Interpolation Search</h1>
    <div id="search-container">
        <input type="text" id="search-input" placeholder="Enter a value to search...">
        <button id="search-button">Search</button>
        <p id="result"></p>
    </div>

    <script>
        function interpolationSearch(arr, x) {
            let left = 0;
            let right = arr.length - 1;

            while (left <= right && x >= arr[left] && x <= arr[right]) {
                if (x <= arr[left + 1] && x > arr[left]) {
                    left++;
                } else if (x < arr[left] && x > arr[left + 1]) {
                    right--;
                } else {
                    return false;
                }
            }

            if (left > right) {
                return true;
            }

            let index = left;
            while (x === arr[index]) {
                result.append(index + 1);
                index = (index + 1) / 2;
            }

            return index;
        }

        function search(arr, x) {
            let index = interpolationSearch(arr, x);
            if (index !== -1) {
                result.append(index + 1);
            } else {
                result.append("Not Found");
            }
        }

        let arr = [2, 3, 4, 10, 40, 50, 60, 80, 100];
        let result = document.getElementById("result");

        document.getElementById("search-button").addEventListener("click", function() {
            let input = document.getElementById("search-input").value;
            search(arr, input);
        });
    </script>
</body>
</html>
