<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insertion Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Insertion Sort Example</h1>
    <button id="insertion-sort-btn">Sort by Insertion</button>
    <div id="result"></div>

    <script>
        function insertionSort(arr) {
            for (let i = 1; i < arr.length; i++) {
                let key = arr[i];
                let j = i - 1;

                while (j >= 0 && arr[j] > key) {
                    arr[j + 1] = arr[j];
                    j--;
                }

                arr[j + 1] = key;
            }

            return arr;
        }

        let arr = [64, 34, 25, 12, 22, 11, 90];
        let result = insertionSort(arr);

        console.log("Sorted array:", result);

        document.getElementById("insertion-sort-btn").addEventListener("click", function() {
            let arr = [64, 34, 25, 12, 22, 11, 90];
            let result = insertionSort(arr);

            document.getElementById("result").innerHTML = "Sorted array: " + result.join(" ");
        });
    </script>
</body>
</html>
