<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Map Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input {
            margin-bottom: 10px;
        }
        #output {
            margin-top: 20px;
            white-space: pre-wrap;
            background-color: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>Hash Map Demonstration</h1>

<label for="key">Key:</label>
<input type="text" id="key">
<br>
<label for="value">Value:</label>
<input type="text" id="value">
<br>
<button id="addButton">Add to Hash Map</button>
<button id="getButton">Get from Hash Map</button>
<button id="removeButton">Remove from Hash Map</button>

<h2>Hash Map Contents:</h2>
<div id="output"></div>

<script>
    class HashMap {
        constructor() {
            this.map = {};
        }

        // Add key-value pair to the Hash Map
        set(key, value) {
            this.map[key] = value;
        }

        // Get value by key
        get(key) {
            return this.map[key] !== undefined ? this.map[key] : "Key not found.";
        }

        // Remove key-value pair
        remove(key) {
            if (this.map[key]) {
                delete this.map[key];
                return `${key} removed.`;
            }
            return "Key not found.";
        }

        // Get all key-value pairs as a string
        getAll() {
            return JSON.stringify(this.map, null, 4);
        }
    }

    const hashMap = new HashMap();
    const outputDiv = document.getElementById('output');

    document.getElementById('addButton').onclick = function () {
        const key = document.getElementById('key').value;
        const value = document.getElementById('value').value;
        hashMap.set(key, value);
        updateOutput();
        clearInputs();
    };

    document.getElementById('getButton').onclick = function () {
        const key = document.getElementById('key').value;
        const result = hashMap.get(key);
        outputDiv.textContent = `Value for "${key}": ${result}`;
    };

    document.getElementById('removeButton').onclick = function () {
        const key = document.getElementById('key').value;
        const result = hashMap.remove(key);
        outputDiv.textContent = result;
        updateOutput();
    };

    function updateOutput() {
        outputDiv.textContent = hashMap.getAll();
    }

    function clearInputs() {
        document.getElementById('key').value = '';
        document.getElementById('value').value = '';
    }
</script>

</body>
</html>
