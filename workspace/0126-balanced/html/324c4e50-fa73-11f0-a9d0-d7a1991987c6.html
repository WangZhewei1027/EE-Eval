<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Array Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        #array-output {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            min-height: 50px;
        }
    </style>
</head>
<body>

    <h1>Dynamic Array Demonstration</h1>
    <input type="text" id="element-input" placeholder="Enter a new element" />
    <button id="add-button">Add Element</button>
    <button id="remove-button">Remove Last Element</button>
    <div id="array-output">Dynamic Array: []</div>

    <script>
        // Initialize an empty array
        let dynamicArray = [];

        // Function to update the displayed output
        function updateOutput() {
            document.getElementById('array-output').innerText = `Dynamic Array: [${dynamicArray.join(', ')}]`;
        }

        // Function to add an element to the dynamic array
        document.getElementById('add-button').onclick = function() {
            const newElement = document.getElementById('element-input').value;
            if (newElement) {
                dynamicArray.push(newElement);
                document.getElementById('element-input').value = ''; // Clear input
                updateOutput(); // Update displayed output
            } else {
                alert('Please enter a valid element.');
            }
        };

        // Function to remove the last element from the dynamic array
        document.getElementById('remove-button').onclick = function() {
            if (dynamicArray.length > 0) {
                dynamicArray.pop();
                updateOutput(); // Update displayed output
            } else {
                alert('No elements to remove.');
            }
        };
    </script>

</body>
</html>
