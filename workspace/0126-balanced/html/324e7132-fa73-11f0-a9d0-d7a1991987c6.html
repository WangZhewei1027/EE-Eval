<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Complexity Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Time Complexity Demonstration</h1>
    
    <button id="constant-time">O(1) - Constant Time</button>
    <button id="linear-time">O(n) - Linear Time</button>
    <button id="quadratic-time">O(n^2) - Quadratic Time</button>

    <div id="result"></div>

    <script>
        function constantTime() {
            let result = "O(1) - Constant Time: This operation takes the same amount of time regardless of input size.";
            document.getElementById('result').innerText = result;
        }

        function linearTime(n) {
            let start = Date.now();
            let sum = 0;
            for (let i = 0; i < n; i++) {
                sum += i; // This loop runs 'n' times
            }
            let end = Date.now();
            let timeTaken = end - start;
            let result = `O(n) - Linear Time: Time taken for n = ${n} is ${timeTaken} milliseconds.`;
            document.getElementById('result').innerText = result;
        }

        function quadraticTime(n) {
            let start = Date.now();
            let sum = 0;
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    sum += i * j; // This nested loop runs 'n*n' times
                }
            }
            let end = Date.now();
            let timeTaken = end - start;
            let result = `O(n^2) - Quadratic Time: Time taken for n = ${n} is ${timeTaken} milliseconds.`;
            document.getElementById('result').innerText = result;
        }

        document.getElementById('constant-time').addEventListener('click', constantTime);

        document.getElementById('linear-time').addEventListener('click', function() {
            linearTime(10000); // Running with n = 10000 to get a measurable linear time
        });

        document.getElementById('quadratic-time').addEventListener('click', function() {
            quadraticTime(100); // Running with n = 100 to keep the quadratic time manageable
        });
    </script>
</body>
</html>
