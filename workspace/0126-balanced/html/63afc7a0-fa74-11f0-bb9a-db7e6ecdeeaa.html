<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Linked List Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }
  h1 {
    margin-bottom: 5px;
  }
  #controls {
    margin-bottom: 15px;
  }
  input[type="number"] {
    width: 60px;
    padding: 4px;
    margin-right: 8px;
  }
  button {
    padding: 6px 12px;
    margin-right: 8px;
  }
  #linkedList {
    margin-top: 20px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
  }
  .node {
    background-color: #4a90e2;
    color: white;
    padding: 12px 18px;
    border-radius: 6px;
    margin-right: 12px;
    position: relative;
    font-weight: bold;
    min-width: 40px;
    text-align: center;
  }
  .node::after {
    content: "→";
    color: #666;
    font-weight: normal;
    position: absolute;
    right: -18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 24px;
  }
  .node:last-child::after {
    content: "null";
    color: #999;
    font-weight: normal;
    right: -38px;
    font-size: 14px;
  }
  #output {
    margin-top: 20px;
    white-space: pre-wrap;
    background: #f9f9f9;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 4px;
    max-height: 180px;
    overflow-y: auto;
  }
</style>
</head>
<body>
<h1>Linked List Demo</h1>
<div id="controls">
  <input type="number" id="valueInput" placeholder="Value" />
  <button id="appendBtn">Append</button>
  <button id="prependBtn">Prepend</button>
  <button id="removeHeadBtn">Remove Head</button>
  <button id="removeTailBtn">Remove Tail</button>
  <button id="clearBtn">Clear List</button>
</div>
<div id="linkedList" aria-label="Linked list visualization"></div>
<div id="output" aria-live="polite"></div>

<script>
  // Linked List Node class
  class ListNode {
    constructor(value) {
      this.value = value;
      this.next = null;
    }
  }

  // Linked List class
  class LinkedList {
    constructor() {
      this.head = null;
      this.tail = null;
      this.length = 0;
    }

    append(value) {
      const newNode = new ListNode(value);
      if (!this.head) {
        this.head = newNode;
        this.tail = newNode;
      } else {
        this.tail.next = newNode;
        this.tail = newNode;
      }
      this.length++;
    }

    prepend(value) {
      const newNode = new ListNode(value);
      if (!this.head) {
        this.head = newNode;
        this.tail = newNode;
      } else {
        newNode.next = this.head;
        this.head = newNode;
      }
      this.length++;
    }

    removeHead() {
      if (!this.head) return null;
      const removedValue = this.head.value;
      this.head = this.head.next;
      if (!this.head) this.tail = null;
      this.length--;
      return removedValue;
    }

    removeTail() {
      if (!this.head) return null;
      if (this.length === 1) {
        const val = this.head.value;
        this.head = null;
        this.tail = null;
        this.length = 0;
        return val;
      }

      let current = this.head;
      while (current.next !== this.tail) {
        current = current.next;
      }
      const removedVal = this.tail.value;
      current.next = null;
      this.tail = current;
      this.length--;
      return removedVal;
    }

    clear() {
      this.head = null;
      this.tail = null;
      this.length = 0;
    }

    values() {
      const vals = [];
      let current = this.head;
      while (current) {
        vals.push(current.value);
        current = current.next;
      }
      return vals;
    }
  }

  // UI elements
  const listContainer = document.getElementById("linkedList");
  const output = document.getElementById("output");
  const valueInput = document.getElementById("valueInput");
  const appendBtn = document.getElementById("appendBtn");
  const prependBtn = document.getElementById("prependBtn");
  const removeHeadBtn = document.getElementById("removeHeadBtn");
  const removeTailBtn = document.getElementById("removeTailBtn");
  const clearBtn = document.getElementById("clearBtn");

  // Instantiate a linked list
  const linkedList = new LinkedList();

  // Function to render linked list visually
  function renderList() {
    listContainer.innerHTML = "";
    if (!linkedList.head) {
      listContainer.textContent = "The list is empty.";
      return;
    }
    let current = linkedList.head;
    while (current) {
      const nodeDiv = document.createElement("div");
      nodeDiv.className = "node";
      nodeDiv.textContent = current.value;
      listContainer.appendChild(nodeDiv);
      current = current.next;
    }
  }

  // Function to write output messages
  function writeOutput(message) {
    output.textContent = message;
  }

  // Add event listeners
  appendBtn.addEventListener("click", () => {
    const val = valueInput.value.trim();
    if (val === "") {
      writeOutput("Please enter a value to append.");
      return;
    }
    linkedList.append(val);
    writeOutput(`Appended "${val}" to the list.`);
    renderList();
    valueInput.value = "";
    valueInput.focus();
  });

  prependBtn.addEventListener("click", () => {
    const val = valueInput.value.trim();
    if (val === "") {
      writeOutput("Please enter a value to prepend.");
      return;
    }
    linkedList.prepend(val);
    writeOutput(`Prepended "${val}" to the list.`);
    renderList();
    valueInput.value = "";
    valueInput.focus();
  });

  removeHeadBtn.addEventListener("click", () => {
    const removed = linkedList.removeHead();
    if (removed === null) {
      writeOutput("List is empty. Nothing to remove from the head.");
    } else {
      writeOutput(`Removed "${removed}" from the head of the list.`);
      renderList();
    }
  });

  removeTailBtn.addEventListener("click", () => {
    const removed = linkedList.removeTail();
    if (removed === null) {
      writeOutput("List is empty. Nothing to remove from the tail.");
    } else {
      writeOutput(`Removed "${removed}" from the tail of the list.`);
      renderList();
    }
  });

  clearBtn.addEventListener("click", () => {
    linkedList.clear();
    writeOutput("Cleared the entire list.");
    renderList();
  });

  // Initial render
  renderList();
  writeOutput("Enter a value and use buttons to modify the linked list.");
</script>
</body>
</html>
