<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVL Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #tree {
            width: 50%;
            margin: 40px auto;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>AVL Tree</h1>
    <div id="tree"></div>

    <script>
        class Node {
            constructor(key, left = null, right = null) {
                this.key = key;
                this.left = left;
                this.right = right;
            }
        }

        class AVLTree {
            constructor() {
                this.root = null;
            }

            insert(key) {
                this.root = this._insert(this.root, key);
            }

            _insert(node, key) {
                if (node === null) {
                    return new Node(key);
                }

                if (key < node.key) {
                    node.left = this._insert(node.left, key);
                } else {
                    node.right = this._insert(node.right, key);
                }

                // Balance the tree
                if (this._balance(node) > 1) {
                    if (key < node.left.key) {
                        return this._rightRotate(node);
                    } else {
                        node.left = this._leftRotate(node.left);
                        return this._rightRotate(node);
                    }
                }

                if (this._balance(node) < -1) {
                    if (key > node.right.key) {
                        return this._leftRotate(node);
                    } else {
                        node.right = this._rightRotate(node.right);
                        return this._leftRotate(node);
                    }
                }

                return node;
            }

            _balance(node) {
                let height = this._getHeight(node);
                return height - 1;
            }

            _getHeight(node) {
                if (node === null) {
                    return 0;
                }

                return Math.max(this._getHeight(node.left), this._getHeight(node.right)) + 1;
            }

            _leftRotate(node) {
                let newRoot = node.right;
                node.right = newRoot.left;
                newRoot.left = node;
                return newRoot;
            }

            _rightRotate(node) {
                let newRoot = node.left;
                node.left = newRoot.right;
                newRoot.right = node;
                return newRoot;
            }

            _printTree(node, level = 0) {
                if (node !== null) {
                    this._printTree(node.right, level + 1);
                    console.log('  '.repeat(level) + node.key + ' ');
                    this._printTree(node.left, level + 1);
                }
            }
        }

        let tree = new AVLTree();
        tree.insert(10);
        tree.insert(20);
        tree.insert(5);
        tree.insert(15);
        tree.insert(25);
        tree.insert(7);
        tree.insert(12);
        tree.insert(18);
        tree.insert(22);
        tree.insert(17);

        tree._printTree(tree.root);
    </script>
</body>
</html>
