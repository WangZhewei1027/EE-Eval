<!DOCTYPE html>
<html>
<head>
    <title>B+ Tree</title>
    <style>
        #tree {
            width: 100%;
            height: 50vh;
            border-radius: 5px;
        }

        #node {
            width: 200px;
            height: 200px;
            background-color: #ccc;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid black;
        }
    </style>
</head>
<body>

<h1>B+ Tree</h1>

<div id="tree"></div>

<script>
    const nodes = document.getElementById('tree');
    
    function addNode() {
        let newNode = document.createElement('div');
        
        newNode.classList.add('node');
        
        if (nodes.appendChild(newNode)) {
            console.log("Node added successfully");
        } else {
            console.log("Failed to add node");
        }
    }

    // Add some nodes here
    
    addNode();
</script>

</body>
</html>
