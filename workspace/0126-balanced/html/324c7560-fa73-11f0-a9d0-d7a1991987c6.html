<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doubly Linked List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #listContainer {
            margin-top: 20px;
        }
        .node {
            display: inline-block;
            margin: 5px;
            padding: 10px;
            border: 1px solid #000;
            border-radius: 5px;
        }
        .pointer {
            margin: 0 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Doubly Linked List Visualization</h1>
<input type="text" id="nodeValue" placeholder="Enter node value" />
<button onclick="addNode()">Add Node</button>
<button onclick="removeNode()">Remove Node</button>
<div id="listContainer"></div>

<script>
    class Node {
        constructor(value) {
            this.value = value;
            this.prev = null;
            this.next = null;
        }
    }

    class DoublyLinkedList {
        constructor() {
            this.head = null;
            this.tail = null;
        }

        add(value) {
            const newNode = new Node(value);
            if (!this.head) {
                this.head = newNode;
                this.tail = newNode;
            } else {
                newNode.prev = this.tail;
                this.tail.next = newNode;
                this.tail = newNode;
            }
            this.render();
        }

        remove() {
            if (!this.tail) return; // Nothing to remove
            if (this.tail.prev) {
                this.tail = this.tail.prev;
                this.tail.next = null;
            } else {
                this.head = null;
                this.tail = null;
            }
            this.render();
        }

        render() {
            const listContainer = document.getElementById("listContainer");
            listContainer.innerHTML = "";
            let currentNode = this.head;

            while (currentNode) {
                const nodeElement = document.createElement("div");
                nodeElement.className = "node";
                nodeElement.innerText = currentNode.value;

                if (currentNode.prev) {
                    const backPointer = document.createElement("span");
                    backPointer.className = 'pointer';
                    backPointer.innerText = "<-";
                    listContainer.appendChild(backPointer);
                }

                listContainer.appendChild(nodeElement);

                if (currentNode.next) {
                    const forwardPointer = document.createElement("span");
                    forwardPointer.className = 'pointer';
                    forwardPointer.innerText = "->";
                    listContainer.appendChild(forwardPointer);
                }

                currentNode = currentNode.next;
            }
        }
    }

    const doublyLinkedList = new DoublyLinkedList();

    function addNode() {
        const nodeValue = document.getElementById("nodeValue").value;
        if (nodeValue) {
            doublyLinkedList.add(nodeValue);
            document.getElementById("nodeValue").value = ""; // Clear input
        }
    }

    function removeNode() {
        doublyLinkedList.remove();
    }
</script>

</body>
</html>
