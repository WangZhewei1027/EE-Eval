<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jump Search Algorithm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
        }
        input[type="text"], button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
        }
        button:hover {
            background-color: #218838;
        }
        .result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Jump Search Algorithm</h1>
    <input type="text" id="arrayInput" placeholder="Enter sorted numbers (comma separated)" />
    <input type="text" id="targetInput" placeholder="Enter number to find" />
    <button onclick="performJumpSearch()">Search</button>
    <div class="result" id="resultOutput"></div>
</div>

<script>
    function jumpSearch(arr, target) {
        let n = arr.length;
        let step = Math.floor(Math.sqrt(n)); // Finding the optimal jump size
        let prev = 0;

        // Jump forward until the next block has a value greater than target
        while (arr[Math.min(step, n) - 1] < target) {
            prev = step;
            step += Math.floor(Math.sqrt(n));
            if (prev >= n) return -1; // Target is not in the array
        }

        // Perform linear search in the identified block
        while (arr[prev] < target) {
            prev++;
            if (prev === Math.min(step, n)) return -1; // Target is not found
        }

        // If we found our target
        if (arr[prev] === target) {
            return prev; // Return the index
        }

        return -1; // Target is not in the array
    }

    function performJumpSearch() {
        const arrayInput = document.getElementById('arrayInput').value;
        const targetInput = document.getElementById('targetInput').value;

        const arr = arrayInput.split(',').map(num => parseInt(num.trim())).filter(num => !isNaN(num));
        const target = parseInt(targetInput);

        if (!Array.isArray(arr) || arr.length === 0 || isNaN(target)) {
            document.getElementById('resultOutput').innerText = "Please enter a valid sorted array and a target number.";
            return;
        }

        const resultIndex = jumpSearch(arr, target);

        if (resultIndex !== -1) {
            document.getElementById('resultOutput').innerText = `Element ${target} found at index ${resultIndex}.`;
        } else {
            document.getElementById('resultOutput').innerText = `Element ${target} not found in the array.`;
        }
    }
</script>

</body>
</html>
