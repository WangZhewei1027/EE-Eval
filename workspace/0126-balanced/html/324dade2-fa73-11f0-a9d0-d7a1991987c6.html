<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ternary Search Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            max-width: 600px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }
        button {
            padding: 10px 15px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Ternary Search Demo</h2>
<p>Enter a sorted array of numbers (comma separated) and a target number to search:</p>

<input type="text" id="arrayInput" placeholder="e.g., 1, 2, 3, 4, 5, 6, 7">
<input type="text" id="targetInput" placeholder="Enter target number">
<button onclick="performTernarySearch()">Search</button>

<div class="result" id="result"></div>

<script>
    function ternarySearch(arr, left, right, target) {
        if (right >= left) {
            const partitionSize = Math.floor((right - left) / 3);
            const mid1 = left + partitionSize;
            const mid2 = right - partitionSize;

            // Check if the target is present at mid1
            if (arr[mid1] === target) {
                return mid1;
            }

            // Check if the target is present at mid2
            if (arr[mid2] === target) {
                return mid2;
            }

            // Decide which segment to search next
            if (target < arr[mid1]) {
                return ternarySearch(arr, left, mid1 - 1, target);
            } else if (target > arr[mid2]) {
                return ternarySearch(arr, mid2 + 1, right, target);
            } else {
                return ternarySearch(arr, mid1 + 1, mid2 - 1, target);
            }
        }
        return -1; // Target not found
    }

    function performTernarySearch() {
        const arrayInput = document.getElementById("arrayInput").value;
        const targetInput = document.getElementById("targetInput").value;

        const arr = arrayInput.split(",").map(num => parseInt(num.trim())).sort((a, b) => a - b);
        const target = parseInt(targetInput);

        const resultIndex = ternarySearch(arr, 0, arr.length - 1, target);
        const resultDiv = document.getElementById("result");

        if (resultIndex !== -1) {
            resultDiv.innerText = `Target ${target} found at index: ${resultIndex} in the array [${arr}]`;
        } else {
            resultDiv.innerText = `Target ${target} not found in the array [${arr}]`;
        }
    }
</script>

</body>
</html>
