<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doubly Linked List</title>
    <style>
        table {
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>Doubly Linked List</h1>
    <table>
        <tr>
            <th>Node 1</th>
            <th>Node 2</th>
            <th>Next</th>
            <th>Prev</th>
        </tr>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
            <td>7</td>
            <td>8</td>
        </tr>
        <tr>
            <td>9</td>
            <td>10</td>
            <td>11</td>
            <td>12</td>
        </tr>
    </table>
    <script>
        class Node {
            constructor(data) {
                this.data = data;
                this.next = null;
                this.prev = null;
            }
        }

        class DoublyLinkedList {
            constructor() {
                this.head = null;
                this.tail = null;
            }

            append(data) {
                if (!this.head) {
                    this.head = new Node(data);
                    this.tail = this.head;
                } else {
                    let newNode = new Node(data);
                    this.tail.next = newNode;
                    newNode.prev = this.tail;
                    this.tail = newNode;
                }
            }

            prepend(data) {
                if (!this.head) {
                    this.head = new Node(data);
                    this.tail = this.head;
                } else {
                    let newNode = new Node(data);
                    this.head.prev = newNode;
                    newNode.next = this.head;
                    this.head = newNode;
                }
            }

            printList() {
                let currentNode = this.head;
                while (currentNode) {
                    console.log(currentNode.data);
                    currentNode = currentNode.next;
                }
            }

            deleteNode(data) {
                if (this.head.data === data) {
                    if (this.head === this.tail) {
                        this.head = null;
                        this.tail = null;
                    } else {
                        let currentNode = this.head;
                        while (currentNode.next !== this.tail) {
                            currentNode = currentNode.next;
                        }
                        currentNode.next = this.tail.next;
                        this.tail.prev = currentNode;
                        this.tail = currentNode;
                    }
                } else {
                    let currentNode = this.head;
                    while (currentNode.next !== this.tail) {
                        currentNode = currentNode.next;
                    }
                    currentNode.next = this.tail.next;
                    this.tail.prev = currentNode;
                    this.tail = currentNode;
                }
            }
        }

        let dll = new DoublyLinkedList();
        dll.append(1);
        dll.append(2);
        dll.append(3);
        dll.append(4);
        dll.append(5);
        dll.prepend(0);
        dll.printList();
        dll.deleteNode(1);
        dll.printList();
    </script>
</body>
</html>
