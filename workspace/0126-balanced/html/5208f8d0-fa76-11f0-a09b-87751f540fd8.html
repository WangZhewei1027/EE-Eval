<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucket Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .bucket-container {
            display: inline-block;
            margin: 10px;
        }
        .bucket {
            width: 100px;
            height: 50px;
            background-color: #ccc;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>Bucket Sort</h1>
    <div class="bucket-container">
        <div class="bucket" id="bucket-1">1-10</div>
        <div class="bucket" id="bucket-2">11-20</div>
        <div class="bucket" id="bucket-3">21-30</div>
        <div class="bucket" id="bucket-4">31-40</div>
        <div class="bucket" id="bucket-5">41-50</div>
    </div>

    <script>
        let buckets = document.querySelectorAll('.bucket');
        let numbers = Array.from({length: 51}, (_, i) => i);

        numbers.forEach((number) => {
            buckets[number].innerHTML = `Number: ${number}, Bucket: ${buckets[number].textContent}`;
        });

        let array = Array.from({length: 50}, (_, i) => i);
        let sortedNumbers = array.sort((a, b) => a - b);

        console.log('Unsorted array:', array);

        sortedNumbers.forEach((number) => {
            buckets[number].innerHTML = `Number: ${number}, Bucket: ${buckets[number].textContent}`;
        });

        console.log('Sorted array:', sortedNumbers);
    </script>
</body>
</html>
