<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked List</title>
    <style>
        /* Style for the list */
        .linked-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: inline-block;
            width: 100%;
        }
        
        /* Style for each node */
        .node {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        
        /* Style for the last node */
        .last-node {
            padding: 10px;
            border-bottom: 1px solid #ccc;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="linked-list">
        <div class="node">1</div>
        <div class="last-node">2</div>
        <div class="node">3</div>
        <div class="node">4</div>
        <div class="node">5</div>
    </div>

    <script>
        class Node {
            constructor(data) {
                this.data = data;
                this.next = null;
            }
        }

        class LinkedList {
            constructor() {
                this.head = null;
            }

            append(data) {
                if (!this.head) {
                    this.head = new Node(data);
                } else {
                    let current = this.head;
                    while (current.next) {
                        current = current.next;
                    }
                    current.next = new Node(data);
                }
            }

            display() {
                let elements = [];
                let current = this.head;
                while (current) {
                    elements.push(current.data);
                    current = current.next;
                }
                return elements;
            }

            remove(node) {
                if (node === this.head) {
                    this.head = node.next;
                } else {
                    let current = this.head;
                    while (current.next) {
                        if (current.next === node) {
                            current.next = node.next;
                            return;
                        }
                        current = current.next;
                    }
                }
            }
        }

        let ll = new LinkedList();
        ll.append(1);
        ll.append(2);
        ll.append(3);
        ll.append(4);
        ll.append(5);

        console.log(ll.display()); // Output: [1, 2, 3, 4, 5]

        ll.remove(ll.head.next); // Output: [1, 2, 3, 4]

        console.log(ll.display()); // Output: [1, 2, 3, 4]
    </script>
</body>
</html>
