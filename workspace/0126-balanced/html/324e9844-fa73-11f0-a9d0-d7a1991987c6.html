<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Context Switching Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
        }
        #process-container {
            margin-top: 20px;
            border: 1px solid #333;
            padding: 10px;
            background-color: #f9f9f9;
        }
        .process {
            margin: 5px 0;
            padding: 5px;
            border: 1px solid #007bff;
            background-color: #e7f1ff;
        }
    </style>
</head>
<body>

<h1>Context Switching Demo</h1>
<p>Click the "Switch Context" button to simulate context switching between multiple processes.</p>

<button id="switch-button">Switch Context</button>

<div id="process-container"></div>

<script>
    // Simulated processes
    const processes = [
        { id: 1, name: 'Process 1', state: 'Running' },
        { id: 2, name: 'Process 2', state: 'Waiting' },
        { id: 3, name: 'Process 3', state: 'Running' },
        { id: 4, name: 'Process 4', state: 'Waiting' }
    ];

    let currentProcessIndex = 0;

    function renderProcesses() {
        const container = document.getElementById('process-container');
        container.innerHTML = ''; // Clear previous processes
        processes.forEach(process => {
            const processDiv = document.createElement('div');
            processDiv.className = 'process';
            processDiv.innerText = `${process.name} - State: ${process.state}`;
            if (process.id === processes[currentProcessIndex].id) {
                processDiv.style.fontWeight = 'bold'; // Highlight the current process
            }
            container.appendChild(processDiv);
        });
    }

    function switchContext() {
        // Change the state of the current process
        processes[currentProcessIndex].state = 'Waiting';
        // Move to the next process
        currentProcessIndex = (currentProcessIndex + 1) % processes.length;
        // Set the new current process to running
        processes[currentProcessIndex].state = 'Running';
        // Rerender the processes
        renderProcesses();
    }

    // Event handler
    document.getElementById('switch-button').addEventListener('click', switchContext);

    // Initial render
    renderProcesses();
</script>

</body>
</html>
