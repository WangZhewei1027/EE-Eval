<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch and Bound Algorithm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        .container {
            background-color: #f9f9f9;
            border-radius: 5px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .matrix {
            margin: 20px 0;
            border-collapse: collapse;
        }
        .matrix th, .matrix td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        .matrix th {
            background-color: #f2f2f2;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4fc;
            border-radius: 4px;
            display: none;
        }
        .node {
            margin: 10px 0;
            padding: 10px;
            background-color: #eaf7ea;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Branch and Bound Algorithm</h1>
    
    <div class="container">
        <h2>Traveling Salesman Problem</h2>
        <p>The Branch and Bound algorithm is demonstrated here by solving a Traveling Salesman Problem (TSP) instance.</p>
        
        <table class="matrix">
            <tr>
                <th></th>
                <th>A</th>
                <th>B</th>
                <th>C</th>
                <th>D</th>
            </tr>
            <tr>
                <th>A</th>
                <td>0</td>
                <td>10</td>
                <td>15</td>
                <td>20</td>
            </tr>
            <tr>
                <th>B</th>
                <td>10</td>
                <td>0</td>
                <td>35</td>
                <td>25</td>
            </tr>
            <tr>
                <th>C</th>
                <td>15</td>
                <td>35</td>
                <td>0</td>
                <td>30</td>
            </tr>
            <tr>
                <th>D</th>
                <td>20</td>
                <td>25</td>
                <td>30</td>
                <td>0</td>
            </tr>
        </table>
        
        <button id="solveBtn">Solve with Branch and Bound</button>
        
        <div id="result" class="result">
            <h3>Solution:</h3>
            <div id="solution"></div>
            <h3>Algorithm Steps:</h3>
            <div id="steps"></div>
        </div>
    </div>

    <script>
        document.getElementById('solveBtn').addEventListener('click', solveTSP);

        function solveTSP() {
            const adjacencyMatrix = [
                [0, 10, 15, 20],
                [10, 0, 35, 25],
                [15, 35, 0, 30],
                [20, 25, 30, 0]
            ];
            
            const n = adjacencyMatrix.length;
            const visited = new Array(n).fill(false);
            const finalPath = [];
            let finalRes = Infinity;
            
            // Start with node 0 (A)
            visited[0] = true;
            finalPath.push(0);
            
            const stepsContainer = document.getElementById('steps');
            stepsContainer.innerHTML = '';
            
            // Recursive function to find the shortest path
            function branchAndBound(currentBound, currentWeight, level, currentPath) {
                // Base case: when we reach the last node
                if (level === n) {
                    // Check if there's an edge from last to first node
                    if (adjacencyMatrix[currentPath[level-1]][currentPath[0]] !== 0) {
                        // Total weight of solution
                        const currRes = currentWeight + adjacencyMatrix[currentPath[level-1]][currentPath[0]];
                        
                        // Update final path and result if better
                        if (currRes < finalRes) {
                            for (let i = 0; i < currentPath.length; i++) {
                                finalPath[i] = currentPath[i];
                            }
                            finalPath[n] = currentPath[0];
                            finalRes = currRes;
                            
                            // Display this step
                            const stepDiv = document.createElement('div');
                            stepDiv.className = 'node';
                            stepDiv.innerHTML = `
                                <strong>New Best Path Found!</strong><br>
                                Path: ${getPathString(finalPath)}<br>
                                Total Cost: ${finalRes}
                            `;
                            stepsContainer.appendChild(stepDiv);
                        }
                    }
                    return;
                }
                
                // Explore all nodes not visited yet
                for (let i = 0; i < n; i++) {
                    if (adjacencyMatrix[currentPath[level-1]][i] !== 0 && !visited[i]) {
                        const tempBound = currentBound;
                        let currentWeightTemp = currentWeight + adjacencyMatrix[currentPath[level-1]][i];
                        
                        // Calculate lower bound for next level
                        let currentBoundTemp = currentBound;
                        if (level === 1) {
                            currentBoundTemp -= ((firstMin(adjacencyMatrix, currentPath[level-1]) + firstMin(adjacencyMatrix, i)) / 2);
                        } else {
                            currentBoundTemp -= ((secondMin(adjacencyMatrix, currentPath[level-1]) + firstMin(adjacencyMatrix, i)) / 2);
                        }
                        
                        // If current lower bound + current weight is less than final result, explore further
                        if (currentBoundTemp + currentWeightTemp < finalRes) {
                            currentPath[level] = i;
                            visited[i] = true;
                            
                            // Display this branch
                            const stepDiv = document.createElement('div');
                            stepDiv.className = 'node';
                            stepDiv.innerHTML = `
                                <strong>Branching on Node ${String.fromCharCode(65 + i)}</strong><br>
                                Current Path: ${getPathString(currentPath.slice(0, level+1))}<br>
                                Current Cost: ${currentWeightTemp}<br>
                                Lower Bound: ${currentBoundTemp + currentWeightTemp}
                            `;
                            stepsContainer.appendChild(stepDiv);
                            
                            // Recursive call
                            branchAndBound(currentBoundTemp, currentWeightTemp, level + 1, currentPath);
                        } else {
                            // Display pruned branch
                            const stepDiv = document.createElement('div');
                            stepDiv.className = 'node';
                            stepDiv.style.backgroundColor = '#fceaea';
                            stepDiv.innerHTML = `
                                <strong>Pruned Branch to Node ${String.fromCharCode(65 + i)}</strong><br>
                                Reason: Lower bound (${currentBoundTemp + currentWeightTemp}) ≥ current best (${finalRes})
                            `;
                            stepsContainer.appendChild(stepDiv);
                        }
                        
                        // Reset visited and currentWeight for next iteration
                        currentWeight -= adjacencyMatrix[currentPath[level-1]][i];
                        visited.fill(false);
                        for (let j = 0; j < level; j++) {
                            visited[currentPath[j]] = true;
                        }
                    }
                }
            }
            
            // Calculate initial bound
            let initialBound = 0;
            for (let i = 0; i < n; i++) {
                initialBound += (firstMin(adjacencyMatrix, i) + secondMin(adjacencyMatrix, i));
            }
            initialBound = Math.ceil(initialBound / 2);
            
            // Display initial bound
            const initialDiv = document.createElement('div');
            initialDiv.className = 'node';
            initialDiv.innerHTML = `
                <strong>Starting Branch and Bound</strong><br>
                Initial Lower Bound: ${initialBound}
            `;
            stepsContainer.appendChild(initialDiv);
            
            // Start the algorithm
            branchAndBound(initialBound, 0, 1, [...finalPath]);
            
            // Display final result
            document.getElementById('solution').innerHTML = `
                <p>Optimal Path: ${getPathString(finalPath)}</p>
                <p>Minimum Cost: ${finalRes}</p>
            `;
            document.getElementById('result').style.display = 'block';
        }
        
        // Utility function to get first minimum edge cost
        function firstMin(matrix, i) {
            let min = Infinity;
            for (let k = 0; k < matrix.length; k++) {
                if (matrix[i][k] < min && i !== k) {
                    min = matrix[i][k];
                }
            }
            return min;
        }
        
        // Utility function to get second minimum edge cost
        function secondMin(matrix, i) {
            let first = Infinity, second = Infinity;
            for (let k = 0; k < matrix.length; k++) {
                if (i === k) continue;
                
                if (matrix[i][k] <= first) {
                    second = first;
                    first = matrix[i][k];
                } else if (matrix[i][k] <= second && matrix[i][k] !== first) {
                    second = matrix[i][k];
                }
            }
            return second;
        }
        
        // Helper function to convert node indices to letters (A, B, C, D)
        function getPathString(path) {
            return path.map(node => String.fromCharCode(65 + node)).join(' → ');
        }
    </script>
</body>
</html>
