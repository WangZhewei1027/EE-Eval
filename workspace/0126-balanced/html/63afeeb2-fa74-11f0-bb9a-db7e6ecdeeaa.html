<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Queue Demonstration</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      background: #f0f4f8;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    .container {
      max-width: 600px;
      margin: 1rem auto;
      background: #fff;
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 4px 10px rgb(0 0 0 / 0.1);
    }
    label {
      display: block;
      margin-bottom: 0.25rem;
      font-weight: 600;
    }
    input[type="text"] {
      width: calc(100% - 110px);
      padding: 0.5rem;
      font-size: 1rem;
      margin-right: 0.5rem;
    }
    button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      margin-top: 0.5rem;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      transition: background-color 0.3s ease;
    }
    button.enqueue {
      background-color: #27ae60;
      color: white;
    }
    button.enqueue:hover {
      background-color: #219150;
    }
    button.dequeue {
      background-color: #e74c3c;
      color: white;
    }
    button.dequeue:hover {
      background-color: #c0392b;
    }
    button.clear {
      background-color: #95a5a6;
      color: white;
    }
    button.clear:hover {
      background-color: #7f8c8d;
    }
    .queue-display {
      margin-top: 1rem;
      padding: 1rem;
      background: #ecf0f1;
      min-height: 60px;
      border-radius: 6px;
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      overflow-x: auto;
    }
    .queue-item {
      background-color: #3498db;
      color: white;
      padding: 0.5rem 1rem;
      margin-right: 0.5rem;
      border-radius: 4px;
      font-weight: bold;
      white-space: nowrap;
      user-select: none;
      position: relative;
    }
    .queue-item::after {
      content: "→";
      position: absolute;
      right: -12px;
      top: 50%;
      transform: translateY(-50%);
      color: #2980b9;
      font-weight: bold;
    }
    .queue-item:last-child::after {
      content: "";
    }
    .info {
      margin-top: 1rem;
      font-style: italic;
      color: #555;
    }
    @media(max-width: 400px) {
      input[type="text"] {
        width: 100%;
        margin-bottom: 0.5rem;
      }
      button.enqueue {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>Queue Concept Demonstration</h1>
  <div class="container">
    <label for="enqueueValue">Enter value to enqueue:</label>
    <input type="text" id="enqueueValue" placeholder="e.g. 5 or Apple" />
    <button class="enqueue" id="enqueueBtn">Enqueue</button>

    <div>
      <button class="dequeue" id="dequeueBtn">Dequeue</button>
      <button class="clear" id="clearBtn">Clear Queue</button>
    </div>

    <div class="queue-display" id="queueDisplay" aria-live="polite" aria-label="Queue contents">
      <!-- Queue items will appear here -->
    </div>

    <div class="info" id="info">
      The queue is empty.
    </div>
  </div>

  <script>
    // Basic queue class
    class Queue {
      constructor() {
        this.items = [];
      }
      enqueue(element) {
        this.items.push(element);
      }
      dequeue() {
        if (this.isEmpty()) return null;
        return this.items.shift();
      }
      front() {
        if (this.isEmpty()) return null;
        return this.items[0];
      }
      isEmpty() {
        return this.items.length === 0;
      }
      size() {
        return this.items.length;
      }
      clear() {
        this.items = [];
      }
      toArray() {
        return this.items.slice();
      }
    }

    const queue = new Queue();

    const enqueueBtn = document.getElementById("enqueueBtn");
    const dequeueBtn = document.getElementById("dequeueBtn");
    const clearBtn = document.getElementById("clearBtn");
    const enqueueInput = document.getElementById("enqueueValue");
    const queueDisplay = document.getElementById("queueDisplay");
    const info = document.getElementById("info");

    function updateDisplay() {
      queueDisplay.innerHTML = "";
      const arr = queue.toArray();
      if (arr.length === 0) {
        info.textContent = "The queue is empty.";
        return;
      }
      info.textContent = `Queue size: ${queue.size()}. Front: ${queue.front()}`;

      arr.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "queue-item";
        div.textContent = item;
        if(index === 0) {
          div.title = "Front of the queue";
        } else if (index === arr.length - 1) {
          div.title = "Rear of the queue";
        }
        queueDisplay.appendChild(div);
      });
    }

    enqueueBtn.addEventListener("click", () => {
      const value = enqueueInput.value.trim();
      if (value === "") {
        alert("Please enter a value to enqueue.");
        enqueueInput.focus();
        return;
      }
      queue.enqueue(value);
      enqueueInput.value = "";
      enqueueInput.focus();
      updateDisplay();
    });

    dequeueBtn.addEventListener("click", () => {
      if (queue.isEmpty()) {
        alert("Queue is empty. Nothing to dequeue.");
        return;
      }
      const dequeued = queue.dequeue();
      alert("Dequeued: " + dequeued);
      updateDisplay();
    });

    clearBtn.addEventListener("click", () => {
      if (confirm("Are you sure you want to clear the queue?")) {
        queue.clear();
        updateDisplay();
      }
    });

    // Allow hitting Enter key to enqueue
    enqueueInput.addEventListener("keydown", e => {
      if(e.key === "Enter") {
        enqueueBtn.click();
      }
    });

    // Initialize display
    updateDisplay();
  </script>
</body>
</html>
