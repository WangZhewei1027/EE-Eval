<!DOCTYPE html>
<html>
<head>
    <title>Mutex Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Mutex Example</h1>
    <p>Mutex is a lock that allows only one thread to access a shared resource at a time.</p>
    <button id="mutex">Start Mutex</button>
    <div id="mutex-lock"></div>

    <script>
        let mutexLock = null;

        document.getElementById('mutex').addEventListener('click', () => {
            if (mutexLock) {
                mutexLock = null;
                document.getElementById('mutex-lock').innerHTML = 'Mutex unlocked';
            } else {
                mutexLock = new Mutex();
                mutexLock.run(() => {
                    document.getElementById('mutex-lock').innerHTML = 'Mutex locked';
                });
            }
        });
    </script>
    <script>
        class Mutex {
            constructor() {
                this.lock = false;
            }

            async run(callback) {
                while (this.lock) {
                    await new Promise(resolve => setTimeout(resolve, 10));
                }
                try {
                    await callback();
                } finally {
                    this.lock = false;
                }
            }
        }
    </script>
</body>
</html>
