<!DOCTYPE html>
<html>
<head>
    <title>Encryption</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #output {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Encryption</h1>
    <button id="encrypt-btn">Encrypt</button>
    <button id="decrypt-btn">Decrypt</button>
    <div id="output"></div>

    <script>
        const encryptBtn = document.getElementById('encrypt-btn');
        const decryptBtn = document.getElementById('decrypt-btn');
        const outputDiv = document.getElementById('output');

        encryptBtn.addEventListener('click', () => {
            const text = 'This is a secret message';
            const key = prompt('Enter the encryption key:', '123456');
            if (key) {
                const encryptedText = encrypt(text, key);
                outputDiv.innerText = `Encrypted text: ${encryptedText}`;
            } else {
                alert('Please enter a valid key');
            }
        });

        decryptBtn.addEventListener('click', () => {
            const text = 'This is a secret message';
            const key = prompt('Enter the decryption key:', '123456');
            if (key) {
                const decryptedText = decrypt(text, key);
                outputDiv.innerText = `Decrypted text: ${decryptedText}`;
            } else {
                alert('Please enter a valid key');
            }
        });

        function encrypt(text, key) {
            const encryptedText = '';
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char.match(/[a-zA-Z]/)) {
                    const asciiOffset = char === char.toUpperCase() ? 65 : 97;
                    encryptedText += String.fromCharCode((char.charCodeAt(0) - asciiOffset + key.charCodeAt(0) - 65) % 26 + asciiOffset);
                } else {
                    encryptedText += char;
                }
            }
            return encryptedText;
        }

        function decrypt(text, key) {
            const decryptedText = '';
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char.match(/[a-zA-Z]/)) {
                    const asciiOffset = char === char.toUpperCase() ? 65 : 97;
                    decryptedText += String.fromCharCode((char.charCodeAt(0) - asciiOffset - key.charCodeAt(0) + 65) % 26 + asciiOffset);
                } else {
                    decryptedText += char;
                }
            }
            return decryptedText;
        }
    </script>
</body>
</html>
