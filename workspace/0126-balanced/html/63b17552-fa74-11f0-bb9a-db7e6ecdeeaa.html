<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Breadth-First Search (BFS) Visualization</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f0f2f5;
  }
  h1 {
    text-align: center;
  }
  #graph {
    margin: 20px auto;
    width: 600px;
    height: 400px;
    border: 2px solid #444;
    background: #fff;
    position: relative;
    border-radius: 8px;
  }
  .node {
    position: absolute;
    width: 40px;
    height: 40px;
    background: #89CFF0;
    border-radius: 50%;
    border: 2px solid #2176FF;
    line-height: 40px;
    text-align: center;
    font-weight: bold;
    color: #034078;
    user-select: none;
    transition: background-color 0.3s, border-color 0.3s;
    z-index: 2;
  }
  .node.visited {
    background: #ffb347;
    border-color: #ff6f00;
    color: #4a2700;
  }
  .node.current {
    background: #00c176;
    border-color: #007737;
    color: white;
    font-weight: 900;
  }
  svg {
    position: absolute;
    left: 0;
    top: 0;
    pointer-events: none;
    z-index: 1;
  }
  #controls {
    width: 600px;
    margin: 0 auto 20px auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #startNode {
    font-weight: bold;
    width: 50px;
    padding: 5px;
  }
  button {
    background-color: #2176FF;
    border: none;
    color: white;
    padding: 10px 15px;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    user-select: none;
    transition: background-color 0.25s ease;
  }
  button:hover:not(:disabled) {
    background-color: #0141a9;
  }
  button:disabled {
    background-color: #a0aec0;
    cursor: default;
  }
  #log {
    width: 600px;
    margin: 0 auto;
    height: 140px;
    background: white;
    border: 2px solid #444;
    border-radius: 8px;
    overflow-y: auto;
    padding: 10px;
    font-family: "Courier New", Courier, monospace;
    font-size: 14px;
    box-sizing: border-box;
  }
  #log .step {
    margin-bottom: 8px;
  }
  #footer {
    margin-top: 40px;
    font-size: 0.9em;
    color: #666;
    text-align: center;
    font-style: italic;
  }
</style>
</head>
<body>
<h1>Breadth-First Search (BFS) Visualization</h1>
<div id="controls">
  <label for="startNode">Start Node: </label>
  <select id="startNode" aria-label="Select start node for BFS"></select>
  <button id="startBtn">Start BFS</button>
  <button id="resetBtn" disabled>Reset</button>
</div>
<div id="graph" aria-label="Graph visualization area" role="region" tabindex="0"></div>
<div id="log" aria-live="polite" aria-atomic="true" aria-label="BFS step log"></div>
<div id="footer">Demonstration of BFS traversal on an undirected graph.</div>

<script>
(() => {
  // Graph data: adjacency list representation and node positions for display
  const graphData = {
    nodes: [
      { id: 'A', x: 100, y: 50 },
      { id: 'B', x: 250, y: 100 },
      { id: 'C', x: 400, y: 50 },
      { id: 'D', x: 500, y: 150 },
      { id: 'E', x: 400, y: 250 },
      { id: 'F', x: 250, y: 270 },
      { id: 'G', x: 100, y: 220 },
      { id: 'H', x: 150, y: 150 },
    ],
    edges: [
      ['A', 'B'],
      ['A', 'H'],
      ['B', 'C'],
      ['B', 'H'],
      ['C', 'D'],
      ['D', 'E'],
      ['E', 'F'],
      ['F', 'G'],
      ['G', 'H'],
      ['H', 'F'],
    ],
  };

  // Build adjacency list from edges
  const adjacencyList = {};
  for (const node of graphData.nodes) adjacencyList[node.id] = [];
  for (const [u, v] of graphData.edges) {
    adjacencyList[u].push(v);
    adjacencyList[v].push(u);
  }

  // DOM Elements
  const graphDiv = document.getElementById('graph');
  const logDiv = document.getElementById('log');
  const startNodeSelect = document.getElementById('startNode');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');

  // Create SVG for edges
  const svgNS = "http://www.w3.org/2000/svg";
  const svgEdges = document.createElementNS(svgNS, 'svg');
  svgEdges.setAttribute('width', '600');
  svgEdges.setAttribute('height', '400');
  graphDiv.appendChild(svgEdges);

  // Store references to node divs
  const nodeElements = {};

  // Initialize the graph display
  function createGraph() {
    // Clear any previous nodes
    graphDiv.querySelectorAll('.node').forEach(n => n.remove());
    // Draw edges lines
    while (svgEdges.firstChild) svgEdges.removeChild(svgEdges.firstChild);

    // Draw edges as lines
    for (const [u, v] of graphData.edges) {
      const fromNode = graphData.nodes.find(n => n.id === u);
      const toNode = graphData.nodes.find(n => n.id === v);
      const line = document.createElementNS(svgNS, 'line');
      line.setAttribute('x1', fromNode.x + 20);
      line.setAttribute('y1', fromNode.y + 20);
      line.setAttribute('x2', toNode.x + 20);
      line.setAttribute('y2', toNode.y + 20);
      line.setAttribute('stroke', '#888');
      line.setAttribute('stroke-width', '2');
      svgEdges.appendChild(line);
    }

    // Create nodes
    for (const { id, x, y } of graphData.nodes) {
      const div = document.createElement('div');
      div.classList.add('node');
      div.textContent = id;
      div.style.left = x + 'px';
      div.style.top = y + 'px';
      div.setAttribute('role', 'button');
      div.setAttribute('tabindex', '0');
      div.setAttribute('aria-label', 'Node ' + id);
      graphDiv.appendChild(div);
      nodeElements[id] = div;
    }
  }

  // Fill start node selection dropdown
  function populateStartNodeSelect() {
    for (const { id } of graphData.nodes) {
      const option = document.createElement('option');
      option.value = id;
      option.textContent = id;
      startNodeSelect.appendChild(option);
    }
  }

  // BFS algorithm as async generator for step-by-step demonstration
  async function* bfs(graph, start) {
    let queue = [];
    let visited = new Set();

    queue.push(start);
    visited.add(start);

    while (queue.length > 0) {
      const current = queue.shift();
      yield { type: 'visit', node: current };

      for (const neighbor of graph[current]) {
        if (!visited.has(neighbor)) {
          visited.add(neighbor);
          queue.push(neighbor);
          yield { type: 'enqueue', node: neighbor };
        }
      }
    }
  }

  // Delay helper
  const delay = ms => new Promise(res => setTimeout(res, ms));

  // BFS visualization controller
  let bfsIterator = null;
  let running = false;

  async function runBFS(startNode) {
    running = true;
    startBtn.disabled = true;
    resetBtn.disabled = false;
    startNodeSelect.disabled = true;
    logDiv.textContent = '';
    // Reset all nodes classes
    for (const id in nodeElements) {
      nodeElements[id].classList.remove('visited', 'current');
    }

    bfsIterator = bfs(adjacencyList, startNode);
    const visitedOrder = [];

    while (running) {
      const { value, done } = await bfsIterator.next();
      if (done) break;

      if (value.type === 'visit') {
        // Mark current node
        for (const id in nodeElements) {
          nodeElements[id].classList.remove('current');
        }
        nodeElements[value.node].classList.add('current', 'visited');
        visitedOrder.push(value.node);
        logStep(`Visited node: ${value.node}`);
      } else if (value.type === 'enqueue') {
        logStep(`Enqueued node: ${value.node}`);
      }
      await delay(1000);
    }

    // Final cleanup, remove current markers
    for (const id in nodeElements) {
      nodeElements[id].classList.remove('current');
    }

    logStep('BFS complete. Order of visit: ' + visitedOrder.join(', '));
    running = false;
    startBtn.disabled = true;
    resetBtn.disabled = false;
    startNodeSelect.disabled = true;
  }

  // Logging helper
  function logStep(text) {
    const p = document.createElement('div');
    p.className = 'step';
    p.textContent = text;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  // Reset the visualization
  function reset() {
    running = false;
    bfsIterator = null;
    startBtn.disabled = false;
    resetBtn.disabled = true;
    startNodeSelect.disabled = false;
    logDiv.textContent = '';
    for (const id in nodeElements) {
      nodeElements[id].classList.remove('visited', 'current');
    }
  }

  // User interaction events
  startBtn.addEventListener('click', () => {
    const startNode = startNodeSelect.value;
    if (startNode) {
      runBFS(startNode);
    }
  });
  resetBtn.addEventListener('click', () => {
    reset();
  });

  // Initialize the page
  createGraph();
  populateStartNodeSelect();
  reset();
})();
</script>
</body>
</html>
