<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Table</title>
    <style>
        table {
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>Hash Table Demo</h1>
    <table id="hash-table">
        <tr>
            <th Key</th>
            <th Value</th>
        </tr>
        <tr>
            <td>Apple</td>
            <td>5</td>
        </tr>
        <tr>
            <td>Orange</td>
            <td>3</td>
        </tr>
        <tr>
            <td>Banana</td>
            <td>2</td>
        </tr>
    </table>

    <script>
        let hashTable = {};

        function add(key, value) {
            if (key in hashTable) {
                console.log("Key already exists in the Hash Table");
            } else {
                hashTable[key] = value;
                console.log("Key added successfully");
            }
        }

        function display() {
            console.log("Hash Table:");
            for (let key in hashTable) {
                console.log(`${key}: ${hashTable[key]}`);
            }
        }

        function remove(key) {
            if (key in hashTable) {
                delete hashTable[key];
                console.log("Key removed successfully");
            } else {
                console.log("Key does not exist in the Hash Table");
            }
        }

        function update(key, value) {
            if (key in hashTable) {
                hashTable[key] = value;
                console.log("Key updated successfully");
            } else {
                console.log("Key does not exist in the Hash Table");
            }
        }

        function search(key) {
            if (key in hashTable) {
                console.log(`Key: ${key}, Value: ${hashTable[key]}`);
            } else {
                console.log("Key does not exist in the Hash Table");
            }
        }

        function clear() {
            for (let key in hashTable) {
                delete hashTable[key];
            }
            console.log("Hash Table cleared successfully");
        }

        display();

        add("Apple", 5);
        add("Orange", 3);
        add("Banana", 2);

        display();

        remove("Orange");

        display();

        update("Banana", 4);

        display();

        search("Apple");

        display();

        clear();

        display();
    </script>
</body>
</html>
