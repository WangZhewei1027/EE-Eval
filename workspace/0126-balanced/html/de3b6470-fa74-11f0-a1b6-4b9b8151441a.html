<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Heap Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
        }
        input {
            padding: 8px;
            width: 60px;
        }
        .heap-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .heap-level {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }
        .heap-node {
            width: 50px;
            height: 50px;
            border: 2px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background-color: #f0f0f0;
            position: relative;
        }
        .heap-node::before {
            content: '';
            position: absolute;
            width: 2px;
            background-color: #333;
            display: none;
        }
        .heap-node.left::before {
            display: block;
            height: 30px;
            transform: rotate(-30deg);
            top: -30px;
            left: 50%;
        }
        .heap-node.right::before {
            display: block;
            height: 30px;
            transform: rotate(30deg);
            top: -30px;
            right: 50%;
        }
        .array-display {
            margin-top: 30px;
            font-size: 18px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <h1>Max Heap Visualization</h1>
    <div class="controls">
        <input type="number" id="insertValue" placeholder="Value">
        <button onclick="insertValue()">Insert</button>
        <button onclick="extractMax()">Extract Max</button>
        <button onclick="clearHeap()">Clear Heap</button>
        <button onclick="generateRandomHeap()">Random Heap</button>
    </div>
    <div class="heap-container" id="heapContainer"></div>
    <div class="array-display">
        Array representation: <span id="arrayDisplay">[]</span>
    </div>

    <script>
        class MaxHeap {
            constructor() {
                this.heap = [];
            }

            parentIndex(index) {
                return Math.floor((index - 1) / 2);
            }

            leftChildIndex(index) {
                return 2 * index + 1;
            }

            rightChildIndex(index) {
                return 2 * index + 2;
            }

            swap(index1, index2) {
                [this.heap[index1], this.heap[index2]] = [this.heap[index2], this.heap[index1]];
            }

            insert(value) {
                this.heap.push(value);
                this.heapifyUp();
            }

            heapifyUp() {
                let currentIndex = this.heap.length - 1;
                while (currentIndex > 0 && 
                       this.heap[currentIndex] > this.heap[this.parentIndex(currentIndex)]) {
                    this.swap(currentIndex, this.parentIndex(currentIndex));
                    currentIndex = this.parentIndex(currentIndex);
                }
            }

            extractMax() {
                if (this.heap.length === 0) return null;
                const max = this.heap[0];
                const last = this.heap.pop();
                if (this.heap.length > 0) {
                    this.heap[0] = last;
                    this.heapifyDown();
                }
                return max;
            }

            heapifyDown() {
                let currentIndex = 0;
                let nextIndex = null;
                
                while (this.leftChildIndex(currentIndex) < this.heap.length) {
                    const leftIndex = this.leftChildIndex(currentIndex);
                    const rightIndex = this.rightChildIndex(currentIndex);
                    
                    if (rightIndex < this.heap.length && 
                        this.heap[rightIndex] > this.heap[leftIndex]) {
                        nextIndex = rightIndex;
                    } else {
                        nextIndex = leftIndex;
                    }
                    
                    if (this.heap[currentIndex] >= this.heap[nextIndex]) {
                        break;
                    }
                    
                    this.swap(currentIndex, nextIndex);
                    currentIndex = nextIndex;
                }
            }

            clear() {
                this.heap = [];
            }

            generateRandom(size = 10) {
                this.clear();
                for (let i = 0; i < size; i++) {
                    this.insert(Math.floor(Math.random() * 100) + 1);
                }
            }
        }

        const maxHeap = new MaxHeap();
        const heapContainer = document.getElementById('heapContainer');
        const arrayDisplay = document.getElementById('arrayDisplay');

        function renderHeap() {
            heapContainer.innerHTML = '';
            arrayDisplay.textContent = `[${maxHeap.heap.join(', ')}]`;

            if (maxHeap.heap.length === 0) return;

            // Calculate heap levels and nodes per level
            let level = 0;
            let nodesInLevel = 1;
            let index = 0;

            while (index < maxHeap.heap.length) {
                const levelContainer = document.createElement('div');
                levelContainer.className = 'heap-level';

                for (let i = 0; i < nodesInLevel && index < maxHeap.heap.length; i++, index++) {
                    const node = document.createElement('div');
                    node.className = 'heap-node';
                    node.textContent = maxHeap.heap[index];

                    // Add left child connector if exists
                    const leftChildIndex = maxHeap.leftChildIndex(index);
                    if (leftChildIndex < maxHeap.heap.length) {
                        node.classList.add('left');
                    }

                    // Add right child connector if exists
                    const rightChildIndex = maxHeap.rightChildIndex(index);
                    if (rightChildIndex < maxHeap.heap.length) {
                        node.classList.add('right');
                    }

                    levelContainer.appendChild(node);
                }

                heapContainer.appendChild(levelContainer);
                level++;
                nodesInLevel *= 2;
            }
        }

        function insertValue() {
            const valueInput = document.getElementById('insertValue');
            const value = parseInt(valueInput.value);
            
            if (!isNaN(value)) {
                maxHeap.insert(value);
                renderHeap();
                valueInput.value = '';
                valueInput.focus();
            }
        }

        function extractMax() {
            const max = maxHeap.extractMax();
            if (max !== null) {
                alert(`Extracted max value: ${max}`);
                renderHeap();
            } else {
                alert('Heap is empty!');
            }
        }

        function clearHeap() {
            maxHeap.clear();
            renderHeap();
        }

        function generateRandomHeap() {
            maxHeap.generateRandom();
            renderHeap();
        }

        // Initialize with a small example
        maxHeap.insert(30);
        maxHeap.insert(20);
        maxHeap.insert(10);
        maxHeap.insert(15);
        maxHeap.insert(5);
        maxHeap.insert(25);
        renderHeap();
    </script>
</body>
</html>
