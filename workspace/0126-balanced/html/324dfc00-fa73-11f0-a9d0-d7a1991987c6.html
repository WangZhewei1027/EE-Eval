<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kruskal's Algorithm Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        #canvas {
            border: 1px solid #000;
            margin: 20px auto;
            display: block;
            background: #fff;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<h1>Kruskal's Algorithm Visualization</h1>
<canvas id="canvas" width="600" height="400"></canvas><br>
<button onclick="runKruskal()">Run Kruskal's Algorithm</button>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    class DisjointSet {
        constructor(size) {
            this.parent = Array.from({length: size}, (_, i) => i);
            this.rank = Array(size).fill(0);
        }

        find(v) {
            if (this.parent[v] !== v) {
                this.parent[v] = this.find(this.parent[v]);
            }
            return this.parent[v];
        }

        union(v1, v2) {
            const root1 = this.find(v1);
            const root2 = this.find(v2);
            if (root1 !== root2) {
                if (this.rank[root1] > this.rank[root2]) {
                    this.parent[root2] = root1;
                } else if (this.rank[root1] < this.rank[root2]) {
                    this.parent[root1] = root2;
                } else {
                    this.parent[root2] = root1;
                    this.rank[root1]++;
                }
            }
        }
    }

    const edges = [
        {from: 0, to: 1, weight: 10},
        {from: 0, to: 2, weight: 6},
        {from: 0, to: 3, weight: 5},
        {from: 1, to: 3, weight: 15},
        {from: 2, to: 3, weight: 4}
    ];

    function drawGraph(selectedEdges) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const vertices = {0: {x: 100, y: 100}, 1: {x: 300, y: 100}, 2: {x: 200, y: 200}, 3: {x: 100, y: 300}};
        
        // Draw vertices
        for (let v in vertices) {
            ctx.beginPath();
            ctx.arc(vertices[v].x, vertices[v].y, 20, 0, Math.PI * 2);
            ctx.fillStyle = "#00f";
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = "#fff";
            ctx.fillText(v, vertices[v].x - 5, vertices[v].y + 5);
        }

        // Draw edges
        for (let edge of edges) {
            const start = vertices[edge.from];
            const end = vertices[edge.to];
            ctx.beginPath();
            ctx.moveTo(start.x, start.y);
            ctx.lineTo(end.x, end.y);
            ctx.strokeStyle = selectedEdges.includes(edge) ? 'green' : 'black';
            ctx.lineWidth = selectedEdges.includes(edge) ? 3 : 1;
            ctx.stroke();
            ctx.fillText(edge.weight, (start.x + end.x) / 2, (start.y + end.y) / 2 - 10);
        }
    }

    function runKruskal() {
        edges.sort((a, b) => a.weight - b.weight);
        const disjointSet = new DisjointSet(4);
        const mst = [];
        let selectedEdges = [];

        for (let edge of edges) {
            if (disjointSet.find(edge.from) !== disjointSet.find(edge.to)) {
                disjointSet.union(edge.from, edge.to);
                mst.push(edge);
                selectedEdges.push(edge);
                drawGraph(selectedEdges);
            }
        }
        console.log('Minimum Spanning Tree:', mst);
    }

</script>
</body>
</html>
