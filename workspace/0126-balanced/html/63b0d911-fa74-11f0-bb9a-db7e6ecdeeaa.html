<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Directed Graph Demonstration</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }
  #graphCanvas {
    border: 1px solid #ccc;
    background-color: #f9f9f9;
  }
  #info {
    margin-top: 10px;
  }
  h1 {
    margin-bottom: 0;
  }
  #legend {
    margin-top: 15px;
  }
  #graphRepresentation {
    white-space: pre;
    background: #f0f0f0;
    border: 1px solid #ddd;
    padding: 10px;
    margin-top: 10px;
    font-family: monospace;
  }
  button {
    margin-top: 10px;
  }
</style>
</head>
<body>
<h1>Directed Graph Visualization</h1>
<p>This example shows a <strong>directed graph</strong>. Arrows indicate the direction from one node to another.</p>

<canvas id="graphCanvas" width="700" height="450"></canvas>

<div id="info"></div>

<div id="legend">
  <strong>Legend:</strong>
  <ul>
    <li><span style="color: #2c7be5;">●</span> Nodes</li>
    <li><span style="border: solid #444; border-width: 0 2px 2px 0; display:inline-block; padding:3px; transform:rotate(-45deg); -webkit-transform:rotate(-45deg);"></span> Directed edges (arrows)</li>
  </ul>
</div>

<button id="showAdjacency">Show Adjacency List</button>
<pre id="graphRepresentation"></pre>

<script>
(() => {
  const canvas = document.getElementById("graphCanvas");
  const ctx = canvas.getContext("2d");
  const width = canvas.width;
  const height = canvas.height;

  // Define nodes with positions
  const nodes = [
    { id: "A", x: 120, y: 100 },
    { id: "B", x: 320, y: 80 },
    { id: "C", x: 500, y: 100 },
    { id: "D", x: 210, y: 300 },
    { id: "E", x: 430, y: 280 },
    { id: "F", x: 600, y: 350 }
  ];

  // Directed edges (from -> to)
  const edges = [
    { from: "A", to: "B" },
    { from: "A", to: "D" },
    { from: "B", to: "C" },
    { from: "B", to: "E" },
    { from: "C", to: "F" },
    { from: "D", to: "E" },
    { from: "E", to: "F" },
    { from: "F", to: "C" } // Back edge to demonstrate direction
  ];

  // Circle radius for nodes
  const nodeRadius = 20;

  // Draw an arrow from (x1,y1) to (x2,y2)
  // with a small margin from source and target centers (so arrow doesn't overlap nodes)
  function drawArrow(ctx, x1, y1, x2, y2, color = "#444") {
    const headLength = 10;
    const angle = Math.atan2(y2 - y1, x2 - x1);

    // Offset start and end points so arrow touches node edges, not centers
    const startX = x1 + nodeRadius * Math.cos(angle);
    const startY = y1 + nodeRadius * Math.sin(angle);
    const endX = x2 - nodeRadius * Math.cos(angle);
    const endY = y2 - nodeRadius * Math.sin(angle);

    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 2;

    // Draw line
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.stroke();

    // Draw arrowhead
    ctx.beginPath();
    ctx.moveTo(endX, endY);
    ctx.lineTo(
      endX - headLength * Math.cos(angle - Math.PI / 6),
      endY - headLength * Math.sin(angle - Math.PI / 6)
    );
    ctx.lineTo(
      endX - headLength * Math.cos(angle + Math.PI / 6),
      endY - headLength * Math.sin(angle + Math.PI / 6)
    );
    ctx.lineTo(endX, endY);
    ctx.fill();
  }

  // Draw node circle and label
  function drawNode(ctx, node, highlight = false) {
    ctx.beginPath();
    ctx.fillStyle = highlight ? "#2c7be5" : "#69a3f3";
    ctx.strokeStyle = highlight ? "#16478c" : "#1a3d7c";
    ctx.lineWidth = highlight ? 4 : 2;
    ctx.shadowColor = "rgba(0,0,0,0.15)";
    ctx.shadowBlur = 4;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 2;

    ctx.arc(node.x, node.y, nodeRadius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    ctx.stroke();

    // Text
    ctx.fillStyle = "#fff";
    ctx.font = "bold 16px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(node.id, node.x, node.y);
  }

  // Find node by id
  function findNode(id) {
    return nodes.find((n) => n.id === id);
  }

  // Clear canvas
  function clear() {
    ctx.clearRect(0, 0, width, height);
  }

  // Draw entire graph
  function drawGraph(highlightedNodeId = null) {
    clear();

    // Draw edges first
    for (const edge of edges) {
      const fromNode = findNode(edge.from);
      const toNode = findNode(edge.to);

      // Highlight edges starting from highlightedNodeId
      if (highlightedNodeId && edge.from === highlightedNodeId) {
        drawArrow(ctx, fromNode.x, fromNode.y, toNode.x, toNode.y, "#e63946");
      } else {
        drawArrow(ctx, fromNode.x, fromNode.y, toNode.x, toNode.y);
      }
    }

    // Draw nodes on top
    for (const node of nodes) {
      drawNode(ctx, node, node.id === highlightedNodeId);
    }
  }

  // Detect if a point (px, py) is inside a node
  function isPointInNode(px, py, node) {
    const dx = px - node.x;
    const dy = py - node.y;
    return dx * dx + dy * dy <= nodeRadius * nodeRadius;
  }

  // Show adjacency list for a node
  function adjacencyList(nodeId) {
    return edges
      .filter((e) => e.from === nodeId)
      .map((e) => e.to);
  }

  // Show adjacency list of entire graph
  function graphAdjacencyList() {
    const adj = {};
    nodes.forEach((n) => {
      adj[n.id] = adjacencyList(n.id);
    });
    return adj;
  }

  // Update info text below canvas
  function updateInfo(nodeId) {
    const infoDiv = document.getElementById("info");
    if (!nodeId) {
      infoDiv.textContent = "Click a node to see its outgoing edges.";
      return;
    }
    const neighbors = adjacencyList(nodeId);
    if (neighbors.length === 0) {
      infoDiv.textContent = `Node ${nodeId} has no outgoing edges.`;
    } else {
      infoDiv.textContent = `Node ${nodeId} has edges to: ${neighbors.join(", ")}.`;
    }
  }

  // Initial draw
  drawGraph();
  updateInfo(null);

  // Handle canvas clicks
  canvas.addEventListener("click", (e) => {
    const rect = canvas.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const clickY = e.clientY - rect.top;

    // Find if clicked on a node
    const clickedNode = nodes.find((node) => isPointInNode(clickX, clickY, node));

    if (clickedNode) {
      drawGraph(clickedNode.id);
      updateInfo(clickedNode.id);
    } else {
      drawGraph(null);
      updateInfo(null);
    }
  });

  // Show adjacency list for whole graph when button clicked
  document.getElementById("showAdjacency").addEventListener("click", () => {
    const adj = graphAdjacencyList();
    let text = "Adjacency List (Directed Graph):\n";
    for (const [node, neighbors] of Object.entries(adj)) {
      text += `${node} → ${neighbors.length > 0 ? neighbors.join(", ") : "(no outgoing edges)"}\n`;
    }
    document.getElementById("graphRepresentation").textContent = text;
  });
})();
</script>
</body>
</html>
