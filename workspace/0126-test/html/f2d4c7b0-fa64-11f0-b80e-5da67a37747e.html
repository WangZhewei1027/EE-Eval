<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Sort Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        #array-container {
            width: 80%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 300px;
            border: 1px solid #000;
            margin-bottom: 20px;
        }
        .bar {
            width: 30px;
            margin: 0 2px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>Bubble Sort Visualization</h1>
    <div id="array-container"></div>
    <button onclick="startBubbleSort()">Start Bubble Sort</button>

    <script>
        // Generate random array of heights for bars
        let array = Array.from({length: 20}, () => Math.floor(Math.random() * 100) + 10);

        // Function to render array as bars
        function renderArray() {
            const container = document.getElementById('array-container');
            container.innerHTML = '';
            array.forEach(value => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${value}px`;
                bar.style.backgroundColor = 'blue';
                container.appendChild(bar);
            });
        }

        // Function to perform Bubble Sort
        async function bubbleSort() {
            const bars = document.querySelectorAll('.bar');
            let len = array.length;
            for (let i = 0; i < len; i++) {
                for (let j = 0; j < len - i - 1; j++) {
                    if (array[j] > array[j + 1]) {
                        // Swap
                        [array[j], array[j + 1]] = [array[j + 1], array[j]];
                        renderArray();
                        bars[j].style.backgroundColor = 'red';
                        bars[j + 1].style.backgroundColor = 'red';
                        await new Promise(resolve => setTimeout(resolve, 100));
                        bars[j].style.backgroundColor = 'blue';
                        bars[j + 1].style.backgroundColor = 'blue';
                    }
                }
            }
        }

        // Start Bubble Sort process
        function startBubbleSort() {
            bubbleSort();
        }

        // Initial render of the array
        renderArray();
    </script>
</body>
</html>
