<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .bst-node {
            border: 1px solid #333;
            border-radius: 5px;
            padding: 10px;
            text-align: center;
            position: relative;
        }
        .tree {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .connection {
            position: absolute;
            width: 50px;
            height: 20px;
            background-color: transparent;
        }
    </style>
</head>
<body>

    <h1>Binary Search Tree Visualization</h1>
    <input type="number" id="valueInput" placeholder="Enter a number" />
    <button onclick="insertNode()">Insert Node</button>
    <div id="bstContainer"></div>

    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
            }
        }

        class BinarySearchTree {
            constructor() {
                this.root = null;
            }

            insert(value) {
                const node = new Node(value);
                if (this.root === null) {
                    this.root = node;
                } else {
                    this.insertNode(this.root, node);
                }
            }

            insertNode(root, node) {
                if (node.value < root.value) {
                    if (root.left === null) {
                        root.left = node;
                    } else {
                        this.insertNode(root.left, node);
                    }
                } else {
                    if (root.right === null) {
                        root.right = node;
                    } else {
                        this.insertNode(root.right, node);
                    }
                }
            }

            // Method to visualize the tree
            visualize() {
                const container = document.getElementById("bstContainer");
                container.innerHTML = ""; // clear current tree visualization
                this.createTree(this.root, container);
            }

            createTree(node, parentContainer) {
                if (node !== null) {
                    const nodeDiv = document.createElement("div");
                    nodeDiv.className = "bst-node";
                    nodeDiv.textContent = node.value;

                    parentContainer.appendChild(nodeDiv);

                    // Recursively create the left and right subtrees
                    const leftContainer = document.createElement("div");
                    const rightContainer = document.createElement("div");
                    
                    leftContainer.className = "tree";
                    rightContainer.className = "tree";

                    // Draw connections
                    if (node.left) {
                        const leftConnection = document.createElement("div");
                        leftConnection.className = "connection";
                        leftContainer.appendChild(leftConnection);
                    }

                    if (node.right) {
                        const rightConnection = document.createElement("div");
                        rightConnection.className = "connection";
                        rightContainer.appendChild(rightConnection);
                    }

                    this.createTree(node.left, leftContainer);
                    this.createTree(node.right, rightContainer);

                    parentContainer.appendChild(leftContainer);
                    parentContainer.appendChild(rightContainer);
                }
            }
        }

        const bst = new BinarySearchTree();

        function insertNode() {
            const value = parseInt(document.getElementById("valueInput").value);
            if (!isNaN(value)) {
                bst.insert(value);
                bst.visualize();
                document.getElementById("valueInput").value = ''; // clear input
            } else {
                alert("Please enter a valid number.");
            }
        }
    </script>
</body>
</html>
