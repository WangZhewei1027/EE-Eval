<!DOCTYPE html>
<html>
<head>
    <title>Binary Search Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        
        #tree {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .node {
            padding: 20px;
            border-bottom: 1px solid #ccc;
        }
        
        .node:hover {
            cursor: pointer;
        }
        
        .node:hover .left {
            background-color: #f0f0f0;
        }
        
        .node:hover .right {
            background-color: #ccc;
        }
        
        .node:hover .value {
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Binary Search Tree</h1>
    <input type="text" id="search-input" placeholder="Enter a value">
    <button id="search-btn">Search</button>
    <div id="tree"></div>

    <script>
        class Node {
            constructor(value, left = null, right = null) {
                this.value = value;
                this.left = left;
                this.right = right;
            }
        }

        class BST {
            constructor() {
                this.root = null;
            }

            insert(value) {
                if (this.root === null) {
                    this.root = new Node(value);
                } else {
                    this._insert(this.root, value);
                }
            }

            _insert(node, value) {
                if (value < node.value) {
                    if (node.left === null) {
                        node.left = new Node(value);
                    } else {
                        this._insert(node.left, value);
                    }
                } else {
                    if (node.right === null) {
                        node.right = new Node(value);
                    } else {
                        this._insert(node.right, value);
                    }
                }
            }

            search(value) {
                return this._search(this.root, value);
            }

            _search(node, value) {
                if (node === null) {
                    return null;
                }
                if (value < node.value) {
                    return this._search(node.left, value);
                } else if (value > node.value) {
                    return this._search(node.right, value);
                } else {
                    return node.value;
                }
            }

            inorder() {
                this._inorder(this.root);
            }

            _inorder(node) {
                if (node !== null) {
                    this._inorder(node.left);
                    document.getElementById("tree").innerHTML += "<span class='node'>" + node.value + "</span>";
                    this._inorder(node.right);
                }
            }
        }

        const bst = new BST();

        document.getElementById("search-input").addEventListener("input", () => {
            const value = document.getElementById("search-input").value;
            bst.search(value);
            bst.inorder();
        });

        document.getElementById("search-btn").addEventListener("click", () => {
            const value = document.getElementById("search-input").value;
            const result = bst.search(value);
            document.getElementById("tree").innerHTML = "<span class='node'>" + result + "</span>";
        });
    </script>
</body>
</html>
