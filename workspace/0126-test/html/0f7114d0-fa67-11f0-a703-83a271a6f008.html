<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree</title>
    <style>
       .root {
            width: 200px;
            height: 200px;
            background-color: #f9f9f9;
            position: relative;
            border-radius: 50%;
        }
        
       .node {
            width: 50px;
            height: 50px;
            border: 2px solid black;
            cursor: pointer;
            position: absolute;
            z-index: 10;
        }
        
       .left {
            left: 50px;
        }
        
       .right {
            right: 50px;
        }
        
       .left-child {
            left: -50px;
        }
        
       .right-child {
            right: -50px;
        }
        
       .middlechild {
            bottom: -50px;
        }
        
       .centerchild {
            bottom: 0;
        }
    </style>
</head>
<body>
    <div class="root">
        <div class="node">
            <span class="left">A</span>
            <span class="right">B</span>
            <span class="middlechild">C</span>
            <span class="centerchild">D</span>
        </div>
        <div class="node">
            <span class="left">E</span>
            <span class="right">F</span>
            <span class="middlechild">G</span>
            <span class="centerchild">H</span>
        </div>
        <div class="node">
            <span class="left">I</span>
            <span class="right">J</span>
            <span class="middlechild">K</span>
            <span class="centerchild">L</span>
        </div>
        <div class="node">
            <span class="left">M</span>
            <span class="right">N</span>
            <span class="middlechild">O</span>
            <span class="centerchild">P</span>
        </div>
    </div>

    <script>
        const BST = new Node(0);

        function insertNode(data, index) {
            if (index < 0 || index > BST.size()) {
                return;
            }

            const node = BST.insert(index);
            BST[index] = data;

            console.log(`Node ${index + 1}:`);
            console.log(node.data);
        }

        function searchNode(data, index) {
            if (index < 0 || index >= BST.size()) {
                return null;
            }

            const node = BST[index];

            if (node.data === data) {
                return node;
            } else if (data < node.data) {
                return searchNode(data, node.left);
            } else {
                return searchNode(data, node.right);
            }
        }

        const root = insertNode('A', 0);
        const leftChild = insertNode('B', 0);
        const middleChild = insertNode('C', 1);
        const rightChild = insertNode('D', 1);
        const centerChild = insertNode('E', 1);

        const binarySearchTree = searchNode('E', 1);
        console.log(binarySearchTree);

        console.log(root);
    </script>
</body>
</html>
