<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #tree {
            margin: 20px;
            width: 300px;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .node {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        .node:hover {
            border-bottom: 2px solid #ccc;
        }
        .node:hover .left-child {
            transform: rotateX(45deg);
        }
        .node:hover .right-child {
            transform: rotateX(-45deg);
        }
        .node:hover .leaf {
            display: block;
        }
    </style>
</head>
<body>
    <h1>Binary Search Tree</h1>
    <form id="tree-form">
        <input type="text" id="root" placeholder="Enter the root of the BST">
        <button id="add-tree">Add</button>
    </form>
    <div id="tree-container"></div>

    <script>
        let tree = null;
        let nodes = [];

        function addNode(root) {
            if (!root) {
                return;
            }

            let input = document.getElementById('root').value;
            let node = {};

            if (root.left) {
                node.left = addNode(root.left);
            } else {
                node.left = null;
            }

            if (root.right) {
                node.right = addNode(root.right);
            } else {
                node.right = null;
            }

            node.value = input;
            node.left = null;
            node.right = null;

            nodes.push(node);

            if (input === '1') {
                tree = new BinarySearchTree(root);
            }
        }

        function displayTree(node) {
            if (node) {
                let children = node.left ? '<div class="left-child"></div>' : '<div class="left-child"></div>';
                let leaf = node.value === '1' ? '<div class="leaf"></div>' : '<div class="leaf"></div>';

                let html = `<div class="node">
                            <div class="node-value">${node.value}</div>
                            ${children}
                            ${leaf}
                        </div>`;

                document.getElementById('tree-container').innerHTML += html;
            }
        }

        function addTree() {
            let root = document.getElementById('root').value;
            addNode(root);
            displayTree(tree);
        }

        function displayAllTrees() {
            for (let node of nodes) {
                displayTree(node);
            }
        }

        addTree();
    </script>
</body>
</html>
