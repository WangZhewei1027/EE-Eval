<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #tree {
            border: 1px solid black;
            margin: 10px;
        }
        .node {
            padding: 10px;
            border: 1px solid black;
            cursor: pointer;
        }
        .node:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <h1>Binary Search Tree</h1>
    <button id="add-btn">Add Node</button>
    <button id="search-btn">Search</button>
    <button id="delete-btn">Delete</button>
    <button id="display-btn">Display</button>
    <div id="tree"></div>

    <script>
        class Node {
            constructor(data) {
                this.data = data;
                this.left = null;
                this.right = null;
            }
        }

        class BinarySearchTree {
            constructor() {
                this.root = null;
            }

            add(data) {
                if (this.root === null) {
                    this.root = new Node(data);
                } else {
                    this._add(data, this.root);
                }
            }

            _add(data, node) {
                if (data < node.data) {
                    if (node.left === null) {
                        node.left = new Node(data);
                    } else {
                        this._add(data, node.left);
                    }
                } else {
                    if (node.right === null) {
                        node.right = new Node(data);
                    } else {
                        this._add(data, node.right);
                    }
                }
            }

            search(data) {
                return this._search(data, this.root);
            }

            _search(data, node) {
                if (node === null || node.data === data) {
                    return node;
                } else if (data < node.data) {
                    return this._search(data, node.left);
                } else {
                    return this._search(data, node.right);
                }
            }

            delete(data) {
                this.root = this._delete(data, this.root);
            }

            _delete(data, node) {
                if (node === null) {
                    return node;
                } else {
                    if (data < node.data) {
                        node.left = this._delete(data, node.left);
                    } else if (data > node.data) {
                        node.right = this._delete(data, node.right);
                    } else {
                        if (node.left === null && node.right === null) {
                            return null;
                        } else if (node.left === null) {
                            return node.right;
                        } else if (node.right === null) {
                            return node.left;
                        } else {
                            let minNode = this._findMin(node.right);
                            node.data = minNode.data;
                            node.right = this._delete(minNode.data, node.right);
                        }
                    }
                    return node;
                }
            }

            _findMin(node) {
                while (node.left !== null) {
                    node = node.left;
                }
                return node;
            }

            display() {
                this._display(this.root);
            }

            _display(node) {
                if (node !== null) {
                    this._display(node.left);
                    document.getElementById("tree").innerHTML += "<p>Data: " + node.data + "</p>";
                    this._display(node.right);
                }
            }
        }

        let bst = new BinarySearchTree();

        document.getElementById("add-btn").addEventListener("click", () => {
            let data = prompt("Enter a data to add:");
            bst.add(data);
            document.getElementById("tree").innerHTML = "<p>Data: " + bst.root.data + "</p>";
        });

        document.getElementById("search-btn").addEventListener("click", () => {
            let data = prompt("Enter a data to search:");
            let result = bst.search(data);
            if (result !== null) {
                document.getElementById("tree").innerHTML = "<p>Data: " + result.data + "</p>";
            } else {
                document.getElementById("tree").innerHTML = "<p>No data found.</p>";
            }
        });

        document.getElementById("delete-btn").addEventListener("click", () => {
            let data = prompt("Enter a data to delete:");
            bst.delete(data);
            document.getElementById("tree").innerHTML = "<p>Data: " + bst.root.data + "</p>";
        });

        document.getElementById("display-btn").addEventListener("click", () => {
            bst.display();
        });
    </script>
</body>
</html>
