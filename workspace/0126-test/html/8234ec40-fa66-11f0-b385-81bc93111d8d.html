<!DOCTYPE html>
<html>
<head>
    <title>Bubble Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        table {
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>Bubble Sort</h1>
    <p>Enter numbers separated by spaces:</p>
    <input type="text" id="numbers" placeholder="Enter numbers separated by spaces">
    <button id="sort-button">Sort</button>
    <table id="sorted-table">
        <tr>
            <th>Number</th>
        </tr>
        <tr id="sorted-row"></tr>
    </table>

    <script>
        const numbers = document.getElementById('numbers');
        const sortButton = document.getElementById('sort-button');
        const sortedTable = document.getElementById('sorted-table');
        const sortedRow = document.getElementById('sorted-row');

        sortButton.addEventListener('click', () => {
            const numbersArray = numbers.value.split(' ').map(Number);
            console.log(numbersArray);

            let i = 0;
            while (i < numbersArray.length) {
                for (let j = i + 1; j < numbersArray.length; j++) {
                    if (numbersArray[i] > numbersArray[j]) {
                        // Swap numbers
                        [numbersArray[i], numbersArray[j]] = [numbersArray[j], numbersArray[i]];
                        // Add the swapped numbers to the sorted row
                        sortedRow.innerHTML = '';
                        for (let k = 0; k < numbersArray.length; k++) {
                            if (k === i) {
                                sortedRow.insertAdjacentHTML('beforeend', '<th>' + numbersArray[k] + '</th>');
                            } else {
                                sortedRow.insertAdjacentHTML('beforeend', '<td>' + numbersArray[k] + '</td>');
                            }
                        }
                        sortedRow.insertAdjacentHTML('beforeend', '<tr><td>' + numbersArray[i] + '</td></tr>');
                        sortedRow.insertAdjacentHTML('beforeend', '<tr><td>' + numbersArray[j] + '</td></tr>');
                        i++;
                    }
                }
            }
            sortedTable.innerHTML = '';
            sortedRow.innerHTML = '';
            for (let i = 0; i < numbersArray.length; i++) {
                sortedTable.insertAdjacentHTML('beforeend', '<td>' + numbersArray[i] + '</td>');
            }
        });
    </script>
</body>
</html>
