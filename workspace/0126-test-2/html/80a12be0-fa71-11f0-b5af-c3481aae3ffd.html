<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Sort Visualization</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .array-display { margin-top: 20px; }
        .element { display: inline-block; width: 30px; text-align: center; }
    </style>
</head>
<body>

<h1>Bubble Sort Visualization</h1>

<label for="arraySize">Array Size: </label>
<input type="number" id="arraySize" min="2" max="20" value="5">
<button id="generateArray">Generate Array</button>
<button id="startSort">Start Bubble Sort</button>
<button id="stopSort" disabled>Stop</button>

<div class="array-display" id="arrayDisplay"></div>

<script>
    let array = [];
    let intervalId;
    let currentIndex = 0;
    let sorted = false;

    document.getElementById('generateArray').onclick = function() {
        const size = parseInt(document.getElementById('arraySize').value);
        array = Array.from({ length: size }, () => Math.floor(Math.random() * 100));
        displayArray();
        document.getElementById('startSort').disabled = false;
        document.getElementById('stopSort').disabled = false;
    }

    function displayArray() {
        const arrayDisplay = document.getElementById('arrayDisplay');
        arrayDisplay.innerHTML = '';
        array.forEach(value => {
            const element = document.createElement('div');
            element.className = 'element';
            element.textContent = value;
            arrayDisplay.appendChild(element);
        });
    }

    document.getElementById('startSort').onclick = function() {
        if (sorted) {
            alert('Array is already sorted. Generate a new array to sort again.');
            return;
        }
        
        currentIndex = 0;
        sorted = false;
        clearInterval(intervalId);
        
        intervalId = setInterval(bubbleSortStep, 1000);
    }

    document.getElementById('stopSort').onclick = function() {
        clearInterval(intervalId);
        alert('Sorting stopped.');
    }

    function bubbleSortStep() {
        if (currentIndex >= array.length - 1) {
            if (sorted) {
                clearInterval(intervalId);
                alert('Sorting complete!');
                return;
            }
            currentIndex = 0;
            sorted = true;
        }

        const arrayDisplayElements = document.querySelectorAll('.element');
        for (let j = 0; j < array.length - 1 - currentIndex; j++) {
            if (array[j] > array[j + 1]) {
                // Swap elements
                const temp = array[j];
                array[j] = array[j + 1];
                array[j + 1] = temp;
                sorted = false;
            }
            // Update displayed array
            arrayDisplayElements[j].textContent = array[j];
            arrayDisplayElements[j + 1].textContent = array[j + 1];
        }

        currentIndex++;
    }
</script>

</body>
</html>
