<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree (BST)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #tree {
            width: 50%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .node {
            background-color: #f0f0f0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .node h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <h1>Binary Search Tree (BST)</h1>
    <div id="tree">
        <div class="node">
            <h2>Node 1</h2>
            <p>Value: 5</p>
            <p>Left Child: <a href="#" id="node-1">Node 2</a></p>
            <p>Right Child: <a href="#" id="node-2">Node 3</a></p>
        </div>
        <div class="node">
            <h2>Node 2</h2>
            <p>Value: 3</p>
            <p>Left Child: <a href="#" id="node-3">Node 4</a></p>
            <p>Right Child: <a href="#" id="node-4">Node 5</a></p>
        </div>
        <div class="node">
            <h2>Node 3</h2>
            <p>Value: 4</p>
            <p>Left Child: <a href="#" id="node-5">Node 6</a></p>
            <p>Right Child: <a href="#" id="node-6">Node 7</a></p>
        </div>
    </div>

    <script>
        class Node {
            constructor(value, left = null, right = null) {
                this.value = value;
                this.left = left;
                this.right = right;
            }
        }

        class BinarySearchTree {
            constructor() {
                this.root = null;
            }

            insert(value) {
                if (this.root === null) {
                    this.root = new Node(value);
                } else {
                    this._insert(this.root, value);
                }
            }

            _insert(node, value) {
                if (value < node.value) {
                    if (node.left === null) {
                        node.left = new Node(value);
                    } else {
                        this._insert(node.left, value);
                    }
                } else {
                    if (node.right === null) {
                        node.right = new Node(value);
                    } else {
                        this._insert(node.right, value);
                    }
                }
            }

            inorder() {
                if (this.root !== null) {
                    this._inorder(this.root);
                }
            }

            _inorder(node) {
                if (node !== null) {
                    this._inorder(node.left);
                    console.log(node.value);
                    this._inorder(node.right);
                }
            }
        }

        let bst = new BinarySearchTree();

        bst.insert(5);
        bst.insert(3);
        bst.insert(7);
        bst.insert(2);
        bst.insert(4);
        bst.insert(6);
        bst.insert(8);

        bst.inorder();
    </script>
</body>
</html>
