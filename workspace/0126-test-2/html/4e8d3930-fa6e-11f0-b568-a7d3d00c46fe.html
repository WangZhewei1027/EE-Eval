<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree Visualization</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #bst-container { margin: 20px; }
        .node { display: inline-block; margin: 10px; padding: 10px; border: 1px solid #000; border-radius: 5px; }
        .line { position: absolute; width: 2px; background: #000; }
    </style>
</head>
<body>
    <h1>Binary Search Tree Visualization</h1>
    <div id="bst-container"></div>
    <input type="number" id="value" placeholder="Enter a number" />
    <button onclick="insertNode()">Insert Node</button>
    <script>
        class Node {
            constructor(data) {
                this.data = data;
                this.left = null;
                this.right = null;
            }
        }

        class BST {
            constructor() {
                this.root = null;
            }

            insert(data) {
                let newNode = new Node(data);
                if (!this.root) {
                    this.root = newNode;
                } else {
                    this.insertNode(this.root, newNode);
                }
                this.draw();
            }

            insertNode(node, newNode) {
                if (newNode.data < node.data) {
                    if (node.left === null) {
                        node.left = newNode;
                    } else {
                        this.insertNode(node.left, newNode);
                    }
                } else {
                    if (node.right === null) {
                        node.right = newNode;
                    } else {
                        this.insertNode(node.right, newNode);
                    }
                }
            }

            draw() {
                const container = document.getElementById('bst-container');
                container.innerHTML = ''; // Clear previous drawing
                this.drawNode(this.root, container, window.innerWidth / 2, 20, 100);
            }

            drawNode(node, container, x, y, offset) {
                if (node) {
                    const nodeDiv = document.createElement("div");
                    nodeDiv.className = "node";
                    nodeDiv.textContent = node.data;
                    nodeDiv.style.position = 'absolute';
                    nodeDiv.style.left = `${x}px`;
                    nodeDiv.style.top = `${y}px`;
                    container.appendChild(nodeDiv);

                    if (node.left) {
                        const leftX = x - offset;
                        const leftY = y + 50;
                        this.drawLine(x + 15, y + 30, leftX + 15, leftY);
                        this.drawNode(node.left, container, leftX, leftY, offset / 2);
                    }

                    if (node.right) {
                        const rightX = x + offset;
                        const rightY = y + 50;
                        this.drawLine(x + 15, y + 30, rightX + 15, rightY);
                        this.drawNode(node.right, container, rightX, rightY, offset / 2);
                    }
                }
            }

            drawLine(x1, y1, x2, y2) {
                const line = document.createElement("div");
                line.className = 'line';
                const deltaX = x2 - x1;
                const deltaY = y2 - y1;
                const length = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                line.style.height = `${length}px`;
                line.style.transformOrigin = '0 0';
                line.style.transform = `rotate(${Math.atan2(deltaY, deltaX)}rad)`;
                line.style.left = `${x1}px`;
                line.style.top = `${y1}px`;
                document.getElementById('bst-container').appendChild(line);
            }
        }

        const bst = new BST();

        function insertNode() {
            const valueInput = document.getElementById('value');
            const value = parseInt(valueInput.value);
            if (!isNaN(value)) {
                bst.insert(value);
                valueInput.value = '';
            }
        }
    </script>
</body>
</html>
