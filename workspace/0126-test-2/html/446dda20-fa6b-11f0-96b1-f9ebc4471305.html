<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Sort Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        #array-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .bar {
            width: 30px;
            margin: 0 2px;
            background-color: teal;
            display: inline-block;
        }

        #controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<h1>Bubble Sort Visualization</h1>
<div id="array-container"></div>

<div id="controls">
    <button id="start">Start Sorting</button>
    <button id="generate">Generate New Array</button>
</div>

<script>
    let array = [];

    function generateArray(size = 10) {
        array = Array.from({ length: size }, () => Math.floor(Math.random() * 100) + 1);
        renderArray();
    }

    function renderArray() {
        const container = document.getElementById('array-container');
        container.innerHTML = '';
        array.forEach(value => {
            const bar = document.createElement('div');
            bar.style.height = `${value * 3}px`;
            bar.classList.add('bar');
            container.appendChild(bar);
        });
    }

    async function bubbleSort() {
        const bars = document.querySelectorAll('.bar');
        for (let i = 0; i < array.length - 1; i++) {
            for (let j = 0; j < array.length - i - 1; j++) {
                bars[j].style.backgroundColor = 'red';
                bars[j + 1].style.backgroundColor = 'red';
                await new Promise(resolve => setTimeout(resolve, 100)); // Delay for visualization
                if (array[j] > array[j + 1]) {
                    [array[j], array[j + 1]] = [array[j + 1], array[j]]; // Swap
                }
                renderArray();
                bars[j].style.backgroundColor = 'teal';
                bars[j + 1].style.backgroundColor = 'teal';
            }
        }
    }

    document.getElementById('start').addEventListener('click', () => {
        bubbleSort();
    });

    document.getElementById('generate').addEventListener('click', () => {
        generateArray();
    });

    // Generate an initial array
    generateArray();
</script>

</body>
</html>
