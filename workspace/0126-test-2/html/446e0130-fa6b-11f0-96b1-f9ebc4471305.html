<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f9f9f9;
        }
        #bst-container {
            margin-top: 20px;
            position: relative;
            height: 400px;
        }
        .node {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            border-radius: 8px;
            padding: 10px 15px;
            margin: 5px;
        }
        .level {
            display: flex;
            justify-content: center;
            position: relative;
        }
    </style>
</head>
<body>
    <h1>Binary Search Tree Visualization</h1>
    <input type="text" id="value" placeholder="Enter value">
    <button onclick="insertNode()">Insert Node</button>
    <div id="bst-container"></div>

    <script>
        class TreeNode {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
            }
        }

        class BinarySearchTree {
            constructor() {
                this.root = null;
            }

            insert(value) {
                const newNode = new TreeNode(value);
                if (this.root === null) {
                    this.root = newNode;
                } else {
                    this.insertNode(this.root, newNode);
                }
                this.render();
            }

            insertNode(node, newNode) {
                if (newNode.value < node.value) {
                    if (node.left === null) {
                        node.left = newNode;
                    } else {
                        this.insertNode(node.left, newNode);
                    }
                } else {
                    if (node.right === null) {
                        node.right = newNode;
                    } else {
                        this.insertNode(node.right, newNode);
                    }
                }
            }

            render() {
                const container = document.getElementById('bst-container');
                container.innerHTML = '';
                this.renderNode(this.root, container, 0);
            }

            renderNode(node, container, level) {
                if (node === null) return;

                const div = document.createElement('div');
                div.className = 'node';
                div.textContent = node.value;

                const levelDiv = document.createElement('div');
                levelDiv.className = 'level';
                levelDiv.style.marginLeft = `${level * 50}px`;
                levelDiv.appendChild(div);

                if (level > 0) {
                    const leftLine = document.createElement('div');
                    leftLine.style.width = '50px';
                    leftLine.style.borderBottom = '1px solid black';
                    leftLine.style.position = 'absolute';
                    leftLine.style.left = `${(level - 1) * 50 + 20}px`;
                    leftLine.style.top = '-20px';
                    levelDiv.appendChild(leftLine);

                    const rightLine = document.createElement('div');
                    rightLine.style.width = '50px';
                    rightLine.style.borderBottom = '1px solid black';
                    rightLine.style.position = 'absolute';
                    rightLine.style.right = '0';
                    rightLine.style.top = '-20px';
                    levelDiv.appendChild(rightLine);
                }

                container.appendChild(levelDiv);
                this.renderNode(node.left, container, level + 1);
                this.renderNode(node.right, container, level + 1);
            }
        }

        const bst = new BinarySearchTree();

        function insertNode() {
            const valueInput = document.getElementById('value');
            const value = parseInt(valueInput.value);
            if (!isNaN(value)) {
                bst.insert(value);
                valueInput.value = '';
            } else {
                alert('Please enter a valid number.');
            }
        }
    </script>
</body>
</html>
