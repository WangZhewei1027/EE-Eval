<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree Interactive Demo</title>
    <style>
        body { font-family: monospace; }
        input, button { margin: 5px; }
        #tree { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Binary Search Tree Interactive Demo</h1>
    <div>
        <label for="node-input">Enter a value to insert:</label>
        <input type="number" id="node-input" />
        <button id="insert-btn">Insert</button>
        
        <button id="min-btn">Find Minimum</button>
        <button id="max-btn">Find Maximum</button>
        <button id="inorder-btn">In-order Traversal</button>
        <button id="preorder-btn">Pre-order Traversal</button>
        <button id="postorder-btn">Post-order Traversal</button>
        
        <label for="delete-input">Enter a value to delete:</label>
        <input type="number" id="delete-input" />
        <button id="delete-btn">Delete</button>

        <label for="search-input">Enter a value to search:</label>
        <input type="number" id="search-input" />
        <button id="search-btn">Search</button>
    </div>

    <div id="tree"></div>
    
    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
            }
        }

        class BinarySearchTree {
            constructor() {
                this.root = null;
            }

            insert(value) {
                const newNode = new Node(value);
                if (!this.root) {
                    this.root = newNode;
                    return;
                }
                this._insertNode(this.root, newNode);
            }

            _insertNode(node, newNode) {
                if (newNode.value < node.value) {
                    if (!node.left) {
                        node.left = newNode;
                    } else {
                        this._insertNode(node.left, newNode);
                    }
                } else {
                    if (!node.right) {
                        node.right = newNode;
                    } else {
                        this._insertNode(node.right, newNode);
                    }
                }
            }

            findMin(node) {
                while (node && node.left) {
                    node = node.left;
                }
                return node;
            }

            findMax(node) {
                while (node && node.right) {
                    node = node.right;
                }
                return node;
            }

            inorder(node, arr = []) {
                if (node) {
                    this.inorder(node.left, arr);
                    arr.push(node.value);
                    this.inorder(node.right, arr);
                }
                return arr;
            }

            preorder(node, arr = []) {
                if (node) {
                    arr.push(node.value);
                    this.preorder(node.left, arr);
                    this.preorder(node.right, arr);
                }
                return arr;
            }

            postorder(node, arr = []) {
                if (node) {
                    this.postorder(node.left, arr);
                    this.postorder(node.right, arr);
                    arr.push(node.value);
                }
                return arr;
            }

            delete(value) {
                this.root = this._deleteNode(this.root, value);
            }

            _deleteNode(node, value) {
                if (!node) return node;
                if (value < node.value) {
                    node.left = this._deleteNode(node.left, value);
                } else if (value > node.value) {
                    node.right = this._deleteNode(node.right, value);
                } else {
                    if (!node.left && !node.right) return null;
                    if (!node.left) return node.right;
                    if (!node.right) return node.left;

                    const minNode = this.findMin(node.right);
                    node.value = minNode.value;
                    node.right = this._deleteNode(node.right, minNode.value);
                }
                return node;
            }
        }

        const bst = new BinarySearchTree();

        document.getElementById('insert-btn').addEventListener('click', () => {
            const value = parseInt(document.getElementById('node-input').value);
            if (!isNaN(value)) {
                bst.insert(value);
                document.getElementById('node-input').value = '';
                drawTree();
            }
        });

        document.getElementById('min-btn').addEventListener('click', () => {
            const minNode = bst.findMin(bst.root);
            alert(minNode ? `Minimum value: ${minNode.value}` : 'Tree is empty');
        });

        document.getElementById('max-btn').addEventListener('click', () => {
            const maxNode = bst.findMax(bst.root);
            alert(maxNode ? `Maximum value: ${maxNode.value}` : 'Tree is empty');
        });

        document.getElementById('inorder-btn').addEventListener('click', () => {
            alert(`In-order Traversal: ${bst.inorder(bst.root).join(', ')}`);
        });

        document.getElementById('preorder-btn').addEventListener('click', () => {
            alert(`Pre-order Traversal: ${bst.preorder(bst.root).join(', ')}`);
        });

        document.getElementById('postorder-btn').addEventListener('click', () => {
            alert(`Post-order Traversal: ${bst.postorder(bst.root).join(', ')}`);
        });

        document.getElementById('delete-btn').addEventListener('click', () => {
            const value = parseInt(document.getElementById('delete-input').value);
            if (!isNaN(value)) {
                bst.delete(value);
                document.getElementById('delete-input').value = '';
                drawTree();
            }
        });

        document.getElementById('search-btn').addEventListener('click', () => {
            const value = parseInt(document.getElementById('search-input').value);
            if (!isNaN(value)) {
                const found = search(bst.root, value);
                alert(found ? `Value ${value} found` : `Value ${value} not found`);
            }
        });

        function search(node, value) {
            if (!node) return false;
            if (value === node.value) return true;
            return value < node.value ? search(node.left, value) : search(node.right, value);
        }

        function drawTree() {
            const treeDiv = document.getElementById('tree');
            treeDiv.innerHTML = JSON.stringify(bst.root, null, 2).replace(/\,/g, ',<br>').replace(/\{/g, '{<br>').replace(/\}/g, '<br>}');
        }
    </script>
</body>
</html>
