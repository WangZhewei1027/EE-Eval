<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        #bst {
            margin: 20px auto;
            width: 600px;
            height: 400px;
            position: relative;
        }
        .node {
            position: absolute;
            width: 50px;
            height: 50px;
            background: lightblue;
            border: 1px solid #000;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }
        .line {
            position: absolute;
            border: 1px solid #000;
        }
    </style>
</head>
<body>

<h1>Binary Search Tree Visualization</h1>
<input type="number" id="valueInput" placeholder="Enter a number" />
<button onclick="insertNode()">Insert Node</button>
<div id="bst"></div>

<script>
    class TreeNode {
        constructor(value) {
            this.value = value;
            this.left = null;
            this.right = null;
        }
    }

    class BinarySearchTree {
        constructor() {
            this.root = null;
        }

        insert(value) {
            const newNode = new TreeNode(value);
            if (this.root === null) {
                this.root = newNode;
            } else {
                this.insertNode(this.root, newNode);
            }
        }

        insertNode(node, newNode) {
            if (newNode.value < node.value) {
                if (node.left === null) {
                    node.left = newNode;
                } else {
                    this.insertNode(node.left, newNode);
                }
            } else {
                if (node.right === null) {
                    node.right = newNode;
                } else {
                    this.insertNode(node.right, newNode);
                }
            }
        }
    }

    const bst = new BinarySearchTree();
    const bstContainer = document.getElementById('bst');

    function insertNode() {
        const value = parseInt(document.getElementById('valueInput').value);
        if (!isNaN(value)) {
            bst.insert(value);
            drawBST();
        } else {
            alert("Please enter a valid number.");
        }
    }

    function drawBST() {
        bstContainer.innerHTML = '';
        drawNode(bst.root, 300, 20, 100);
    }

    function drawNode(node, x, y, offset) {
        if (node) {
            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'node';
            nodeDiv.style.left = `${x}px`;
            nodeDiv.style.top = `${y}px`;
            nodeDiv.innerText = node.value;
            bstContainer.appendChild(nodeDiv);

            if (node.left) {
                const leftX = x - offset;
                const leftY = y + 80;
                drawLine(x + 25, y + 50, leftX + 25, leftY);
                drawNode(node.left, leftX, leftY, offset / 2);
            }

            if (node.right) {
                const rightX = x + offset;
                const rightY = y + 80;
                drawLine(x + 25, y + 50, rightX + 25, rightY);
                drawNode(node.right, rightX, rightY, offset / 2);
            }
        }
    }

    function drawLine(fromX, fromY, toX, toY) {
        const line = document.createElement('div');
        line.className = 'line';
        line.style.left = `${fromX}px`;
        line.style.top = `${fromY}px`;
        line.style.width = `${Math.abs(toX - fromX)}px`;
        line.style.height = '1px';
        line.style.transform = `rotate(${Math.atan2(toY - fromY, toX - fromX)}rad)`;
        line.style.transformOrigin = '0 0';
        bstContainer.appendChild(line);
    }
</script>

</body>
</html>
