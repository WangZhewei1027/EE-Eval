<!DOCTYPE html>
<html>
<head>
    <title>Bubble Sort</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Bubble Sort</h1>
    <p>Original List: <pre>{{originalList}}</pre></p>
    <button id="sort-button">Sort</button>
    <script>
        const originalList = ['dog', 'cat', 'apple', 'banana', 'elephant'];
        let swapped = true;

        function bubbleSort(arr) {
            while (swapped) {
                swapped = false;
                for (let i = 0; i < arr.length - 1; i++) {
                    if (arr[i] > arr[i + 1]) {
                        [arr[i], arr[i + 1]] = [arr[i + 1], arr[i]];
                        swapped = true;
                    }
                }
            }
        }

        document.getElementById('sort-button').addEventListener('click', () => {
            bubbleSort(originalList);
            console.log('Sorted List:', originalList);
        });
    </script>
</body>
</html>
