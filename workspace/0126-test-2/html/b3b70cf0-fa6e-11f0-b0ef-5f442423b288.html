<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        #bst {
            margin-top: 20px;
        }
        .node {
            display: inline-block;
            width: 40px;
            height: 40px;
            line-height: 40px;
            border: 2px solid #007BFF;
            border-radius: 5px;
            background-color: #E7F3FF;
            position: relative;
            font-size: 16px;
        }
        .branch {
            position: absolute;
            top: -20px;
            left: 20px;
            width: 1px;
            height: 20px;
            background: #007BFF;
        }
    </style>
</head>
<body>

<h1>Binary Search Tree (BST) Visualization</h1>
<input type="number" id="value-input" placeholder="Enter a number">
<button onclick="insertValue()">Insert</button>

<div id="bst"></div>

<script>
    class Node {
        constructor(value) {
            this.value = value;
            this.left = null;
            this.right = null;
        }
    }

    class BST {
        constructor() {
            this.root = null;
        }

        insert(value) {
            const newNode = new Node(value);
            if (!this.root) {
                this.root = newNode;
                return;
            }
            this.insertNode(this.root, newNode);
        }

        insertNode(node, newNode) {
            if (newNode.value < node.value) {
                if (!node.left) {
                    node.left = newNode;
                } else {
                    this.insertNode(node.left, newNode);
                }
            } else {
                if (!node.right) {
                    node.right = newNode;
                } else {
                    this.insertNode(node.right, newNode);
                }
            }
        }

        clear() {
            this.root = null;
        }

        visualize() {
            const bstDiv = document.getElementById('bst');
            bstDiv.innerHTML = ''; // Clear previous visualization
            if (!this.root) return;

            this.visualizeNode(this.root, bstDiv, 0);
        }

        visualizeNode(node, parentDiv, level) {
            if (!node) return;

            const nodeDiv = document.createElement('div');
            nodeDiv.className = 'node';
            nodeDiv.innerText = node.value;
            parentDiv.appendChild(nodeDiv);

            const branch = document.createElement('div');
            branch.className = 'branch';
            nodeDiv.appendChild(branch);

            const leftDiv = document.createElement('div');
            const rightDiv = document.createElement('div');

            if (node.left) {
                this.visualizeNode(node.left, leftDiv, level + 1);
                parentDiv.appendChild(leftDiv);
            }

            if (node.right) {
                this.visualizeNode(node.right, rightDiv, level + 1);
                parentDiv.appendChild(rightDiv);
            }
        }
    }

    const bst = new BST();

    function insertValue() {
        const valueInput = document.getElementById('value-input');
        const value = parseInt(valueInput.value, 10);
        if (!isNaN(value)) {
            bst.insert(value);
            bst.visualize();
            valueInput.value = ''; // Clear input after insertion
        } else {
            alert('Please enter a valid number.');
        }
    }
</script>

</body>
</html>
