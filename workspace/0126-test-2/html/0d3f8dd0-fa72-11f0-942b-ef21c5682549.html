<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree Demo</title>
    <style>
        #bst-container {
            position: relative;
            width: 100%;
            height: 400px;
            border: 1px solid #000;
        }
        .node {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: lightblue;
            border: 1px solid #000;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            user-select: none;
        }
        .line {
            position: absolute;
            width: 2px;
            background-color: black;
            transform-origin: top left;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <h1>Binary Search Tree (BST) Visualization</h1>
    <input type="number" id="valueInput" placeholder="Enter a number to insert">
    <button id="insertButton">Insert</button>
    <div id="bst-container"></div>

    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
            }
        }

        class BST {
            constructor() {
                this.root = null;
            }

            insert(value) {
                const newNode = new Node(value);
                if (!this.root) {
                    this.root = newNode;
                } else {
                    this.insertNode(this.root, newNode);
                }
                this.render();
            }

            insertNode(node, newNode) {
                if (newNode.value < node.value) {
                    if (!node.left) {
                        node.left = newNode;
                    } else {
                        this.insertNode(node.left, newNode);
                    }
                } else {
                    if (!node.right) {
                        node.right = newNode;
                    } else {
                        this.insertNode(node.right, newNode);
                    }
                }
            }

            render() {
                const container = document.getElementById('bst-container');
                container.innerHTML = '';
                this.drawTree(this.root, container, window.innerWidth / 2, 30, 100);
            }

            drawTree(node, container, x, y, offset) {
                if (!node) return;

                // Create node element
                const nodeElement = document.createElement('div');
                nodeElement.classList.add('node');
                nodeElement.innerText = node.value;
                container.appendChild(nodeElement);
                nodeElement.style.left = `${x}px`;
                nodeElement.style.top = `${y}px`;

                // Draw edges and position children
                const leftX = x - offset;
                const rightX = x + offset;
                const childY = y + 50;

                if (node.left) {
                    this.drawLine(x + 15, y + 30, leftX + 15, childY);
                    this.drawTree(node.left, container, leftX, childY, offset / 2);
                }

                if (node.right) {
                    this.drawLine(x + 15, y + 30, rightX + 15, childY);
                    this.drawTree(node.right, container, rightX, childY, offset / 2);
                }
            }

            drawLine(x1, y1, x2, y2) {
                const line = document.createElement('div');
                line.classList.add('line');
                const length = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
                const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;

                line.style.width = `${length}px`;
                line.style.transform = `rotate(${angle}deg)`;
                line.style.left = `${x1}px`;
                line.style.top = `${y1}px`;
                document.getElementById('bst-container').appendChild(line);
            }
        }

        const bst = new BST();
        document.getElementById('insertButton').onclick = function() {
            const value = parseInt(document.getElementById('valueInput').value);
            if (!isNaN(value)) {
                bst.insert(value);
                document.getElementById('valueInput').value = '';
            }
        };
    </script>
</body>
</html>
