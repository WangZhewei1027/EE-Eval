<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #tree {
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Binary Search Tree</h1>
    <div id="tree"></div>

    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
            }
        }

        class BinarySearchTree {
            constructor() {
                this.root = null;
            }

            insert(value) {
                if (this.root === null) {
                    this.root = new Node(value);
                } else {
                    this._insert(this.root, value);
                }
            }

            _insert(node, value) {
                if (value < node.value) {
                    if (node.left === null) {
                        node.left = new Node(value);
                    } else {
                        this._insert(node.left, value);
                    }
                } else {
                    if (node.right === null) {
                        node.right = new Node(value);
                    } else {
                        this._insert(node.right, value);
                    }
                }
            }

            inorder() {
                if (this.root !== null) {
                    this._inorder(this.root);
                }
            }

            _inorder(node) {
                if (node !== null) {
                    this._inorder(node.left);
                    document.getElementById("tree").innerHTML += `<p>${node.value}</p>`;
                    this._inorder(node.right);
                }
            }
        }

        let bst = new BinarySearchTree();
        let values = ["5", "2", "8", "3", "9", "1", "6", "7", "4"];

        for (let value of values) {
            bst.insert(value);
        }

        bst.inorder();
    </script>
</body>
</html>
