<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Sort Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        .bar {
            display: inline-block;
            width: 20px;
            margin: 2px;
            background-color: #007bff;
        }
        #arrayContainer {
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 200px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Bubble Sort Visualization</h1>
    <div id="arrayContainer"></div>
    <button onclick="bubbleSort()">Sort Array</button>
    
    <script>
        const array = [5, 1, 4, 2, 8, 3, 6, 7];
        const arrayContainer = document.getElementById('arrayContainer');

        function renderArray() {
            arrayContainer.innerHTML = '';
            array.forEach(num => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${num * 20}px`;
                arrayContainer.appendChild(bar);
            });
        }

        async function bubbleSort() {
            const len = array.length;
            for (let i = 0; i < len - 1; i++) {
                for (let j = 0; j < len - i - 1; j++) {
                    if (array[j] > array[j + 1]) {
                        // Swap
                        [array[j], array[j + 1]] = [array[j + 1], array[j]];
                        renderArray();
                        await new Promise(resolve => setTimeout(resolve, 500)); // Pause for visualization
                    }
                }
                renderArray(); // Render after each outer loop iteration
            }
        }

        // Initial render
        renderArray();
    </script>
</body>
</html>
