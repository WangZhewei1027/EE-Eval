<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        #canvas {
            border: 1px solid black;
            margin: 20px auto;
            height: 400px;
            width: 600px;
        }
        input {
            width: 50px;
        }
    </style>
</head>
<body>
    <h1>Binary Search Tree Visualization</h1>
    <input type="number" id="value" placeholder="Enter value" />
    <button id="insertBtn">Insert</button>
    <button id="inorderBtn">Inorder Traversal</button>
    <div id="canvas"></div>
    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
            }
        }

        class BST {
            constructor() {
                this.root = null;
            }

            insert(value) {
                const newNode = new Node(value);
                if (!this.root) {
                    this.root = newNode;
                } else {
                    this.insertNode(this.root, newNode);
                }
            }

            insertNode(node, newNode) {
                if (newNode.value < node.value) {
                    if (!node.left) {
                        node.left = newNode;
                    } else {
                        this.insertNode(node.left, newNode);
                    }
                } else {
                    if (!node.right) {
                        node.right = newNode;
                    } else {
                        this.insertNode(node.right, newNode);
                    }
                }
            }

            inorderTraversal(node, result = []) {
                if (node) {
                    this.inorderTraversal(node.left, result);
                    result.push(node.value);
                    this.inorderTraversal(node.right, result);
                }
                return result;
            }

            draw(ctx, node, x, y, offset) {
                if (node) {
                    ctx.beginPath();
                    ctx.arc(x, y, 20, 0, Math.PI * 2);
                    ctx.fillStyle = "skyblue";
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = "black";
                    ctx.fillText(node.value, x - 5, y + 5);

                    if (node.left) {
                        ctx.moveTo(x, y);
                        ctx.lineTo(x - offset, y + 60);
                        ctx.stroke();
                        this.draw(ctx, node.left, x - offset, y + 60, offset / 2);
                    }
                    if (node.right) {
                        ctx.moveTo(x, y);
                        ctx.lineTo(x + offset, y + 60);
                        ctx.stroke();
                        this.draw(ctx, node.right, x + offset, y + 60, offset / 2);
                    }
                }
            }
        }

        const bst = new BST();
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        document.getElementById("insertBtn").onclick = () => {
            const value = parseInt(document.getElementById("value").value);
            if (!isNaN(value)) {
                bst.insert(value);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                bst.draw(ctx, bst.root, canvas.width / 2, 20, 200);
                document.getElementById("value").value = '';
            }
        };

        document.getElementById("inorderBtn").onclick = () => {
            const result = bst.inorderTraversal(bst.root);
            alert("Inorder Traversal: " + result.join(', '));
        };
    </script>
</body>
</html>
