<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Sort Visualization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 20px;
        }

        #arrayContainer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 300px;
            margin: 20px 0;
        }

        .bar {
            width: 30px;
            margin: 0 2px;
            background-color: #4CAF50;
            display: inline-block;
        }

        .active {
            background-color: #FF5722;
        }

        .sorted {
            background-color: #2196F3;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>Bubble Sort Visualization</h1>
<div id="arrayContainer"></div>
<button id="startSort">Start Bubble Sort</button>

<script>
    const arrayContainer = document.getElementById('arrayContainer');
    const startSortButton = document.getElementById('startSort');
    let array = [];

    function generateRandomArray(size) {
        array = [];
        for (let i = 0; i < size; i++) {
            array.push(Math.floor(Math.random() * 100) + 1);
        }
        renderArray();
    }

    function renderArray() {
        arrayContainer.innerHTML = '';
        array.forEach(value => {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = `${value * 3}px`;
            bar.innerText = value;
            arrayContainer.appendChild(bar);
        });
    }

    async function bubbleSort() {
        const bars = document.querySelectorAll('.bar');
        let n = array.length;

        for (let i = 0; i < n-1; i++) {
            for (let j = 0; j < n-i-1; j++) {
                bars[j].classList.add('active');
                bars[j + 1].classList.add('active');

                if (array[j] > array[j + 1]) {
                    await new Promise(resolve => setTimeout(resolve, 100)); // Delay for visualization
                    [array[j], array[j + 1]] = [array[j + 1], array[j]];
                }
                renderArray();

                bars[j].classList.remove('active');
                bars[j + 1].classList.remove('active');
            }
            bars[n-i-1].classList.add('sorted'); // Mark the last element in this pass as sorted
        }
        // Mark the whole array as sorted
        renderArray();
        for (let k = 0; k < n; k++) {
            bars[k].classList.add('sorted');
        }
    }

    startSortButton.addEventListener('click', async () => {
        generateRandomArray(10); // Generate a new random array of size 10
        await bubbleSort();
    });

    generateRandomArray(10); // Initial array generation
</script>

</body>
</html>
