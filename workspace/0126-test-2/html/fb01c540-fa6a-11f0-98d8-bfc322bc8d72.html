<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #tree {
            width: 50%;
            margin: 40px auto;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>Binary Search Tree</h1>
    <input id="value" type="number" placeholder="Enter a value">
    <button id="insert">Insert</button>
    <button id="search">Search</button>
    <button id="delete">Delete</button>
    <div id="tree"></div>

    <script>
        class Node {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
            }
        }

        class BinarySearchTree {
            constructor() {
                this.root = null;
            }

            insert(value) {
                if (this.root === null) {
                    this.root = new Node(value);
                } else {
                    this._insertRecursive(this.root, value);
                }
            }

            _insertRecursive(node, value) {
                if (value < node.value) {
                    if (node.left === null) {
                        node.left = new Node(value);
                    } else {
                        this._insertRecursive(node.left, value);
                    }
                } else {
                    if (node.right === null) {
                        node.right = new Node(value);
                    } else {
                        this._insertRecursive(node.right, value);
                    }
                }
            }

            search(value) {
                return this._searchRecursive(this.root, value);
            }

            _searchRecursive(node, value) {
                if (node === null) {
                    return false;
                } else if (value < node.value) {
                    return this._searchRecursive(node.left, value);
                } else if (value > node.value) {
                    return this._searchRecursive(node.right, value);
                } else {
                    return true;
                }
            }

            delete(value) {
                this.root = this._deleteRecursive(this.root, value);
            }

            _deleteRecursive(node, value) {
                if (node === null) {
                    return null;
                } else if (value < node.value) {
                    node.left = this._deleteRecursive(node.left, value);
                } else if (value > node.value) {
                    node.right = this._deleteRecursive(node.right, value);
                } else {
                    if (node.left === null && node.right === null) {
                        return null;
                    } else if (node.left === null) {
                        return node.right;
                    } else if (node.right === null) {
                        return node.left;
                    } else {
                        let minNode = this._findMin(node.right);
                        node.value = minNode.value;
                        node.right = this._deleteRecursive(node.right, minNode.value);
                    }
                }
                return node;
            }

            _findMin(node) {
                while (node.left !== null) {
                    node = node.left;
                }
                return node;
            }
        }

        let bst = new BinarySearchTree();
        document.getElementById("value").addEventListener("input", function() {
            bst.insert(this.value);
        });

        document.getElementById("search").addEventListener("click", function() {
            let value = parseInt(document.getElementById("value").value);
            if (bst.search(value)) {
                document.getElementById("tree").innerHTML = `<p>Found: ${value}</p>`;
            } else {
                document.getElementById("tree").innerHTML = `<p>Not Found</p>`;
            }
        });

        document.getElementById("delete").addEventListener("click", function() {
            let value = parseInt(document.getElementById("value").value);
            bst.delete(value);
            document.getElementById("tree").innerHTML = `<p>Tree after deletion: ${bst.tree}</p>`;
        });

        function printTree(node, level = 0) {
            if (node !== null) {
                console.log("  ".repeat(level) + node.value);
                printTree(node.left, level + 1);
                printTree(node.right, level + 1);
            }
        }

        printTree(bst.root);
    </script>
</body>
</html>
