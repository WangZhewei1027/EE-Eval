<!DOCTYPE html>
<html>
<head>
    <title>Bubble Sort Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #output {
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Bubble Sort Example</h1>
    <input type="number" id="input" placeholder="Enter numbers separated by spaces">
    <button id="sort-button">Sort</button>
    <div id="output"></div>

    <script>
        function bubbleSort(arr) {
            let n = arr.length;
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n - i - 1; j++) {
                    if (arr[j] > arr[j + 1]) {
                        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                    }
                }
            }
            return arr;
        }

        document.getElementById('sort-button').addEventListener('click', function() {
            let inputValue = document.getElementById('input').value;
            let arr = inputValue.split(' ').map(Number);
            let sortedArr = bubbleSort(arr);
            document.getElementById('output').innerHTML = 'Sorted array: ' + sortedArr.join(' ');
        });
    </script>
</body>
</html>
