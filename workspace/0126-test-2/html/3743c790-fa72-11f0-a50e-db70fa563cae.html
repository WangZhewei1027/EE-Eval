<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Color Mixer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
        }
        .color-box {
            width: 200px;
            height: 200px;
            margin: 20px;
            border: 2px solid #000;
            display: inline-block;
        }
        input[type="range"] {
            width: 300px;
        }
        input[type="number"] {
            width: 80px;
            margin: 0 10px;
        }
        button {
            margin: 5px;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Interactive Color Mixer</h1>
    <div>
        <div class="color-box" id="colorDisplay" style="background-color: rgb(255, 255, 255);"></div>
    </div>
    <div>
        <label for="red">Red:</label>
        <input type="range" id="red" min="0" max="255" value="255">
        <input type="number" id="redValue" min="0" max="255" value="255">

        <label for="green">Green:</label>
        <input type="range" id="green" min="0" max="255" value="255">
        <input type="number" id="greenValue" min="0" max="255" value="255">

        <label for="blue">Blue:</label>
        <input type="range" id="blue" min="0" max="255" value="255">
        <input type="number" id="blueValue" min="0" max="255" value="255">
    </div>
    <button id="reset">Reset Colors</button>
    <p></p>
    <div>
        <button id="darken">Darken</button>
        <button id="lighten">Lighten</button>
    </div>
</div>

<script>
    const redSlider = document.getElementById('red');
    const greenSlider = document.getElementById('green');
    const blueSlider = document.getElementById('blue');

    const redValue = document.getElementById('redValue');
    const greenValue = document.getElementById('greenValue');
    const blueValue = document.getElementById('blueValue');

    const colorDisplay = document.getElementById('colorDisplay');
    const resetButton = document.getElementById('reset');
    const darkenButton = document.getElementById('darken');
    const lightenButton = document.getElementById('lighten');

    function updateColor() {
        const r = redSlider.value;
        const g = greenSlider.value;
        const b = blueSlider.value;

        colorDisplay.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        redValue.value = r;
        greenValue.value = g;
        blueValue.value = b;
    }

    redSlider.addEventListener('input', updateColor);
    greenSlider.addEventListener('input', updateColor);
    blueSlider.addEventListener('input', updateColor);

    redValue.addEventListener('input', () => {
        redSlider.value = redValue.value;
        updateColor();
    });
    greenValue.addEventListener('input', () => {
        greenSlider.value = greenValue.value;
        updateColor();
    });
    blueValue.addEventListener('input', () => {
        blueSlider.value = blueValue.value;
        updateColor();
    });

    resetButton.addEventListener('click', () => {
        redSlider.value = 255;
        greenSlider.value = 255;
        blueSlider.value = 255;
        updateColor();
    });

    const adjustColor = (direction) => {
        const r = parseInt(redSlider.value);
        const g = parseInt(greenSlider.value);
        const b = parseInt(blueSlider.value);
        const adjustment = direction === 'darken' ? -30 : 30;

        redSlider.value = Math.min(255, Math.max(0, r + adjustment));
        greenSlider.value = Math.min(255, Math.max(0, g + adjustment));
        blueSlider.value = Math.min(255, Math.max(0, b + adjustment));
        updateColor();
    };

    darkenButton.addEventListener('click', () => adjustColor('darken'));
    lightenButton.addEventListener('click', () => adjustColor('lighten'));

    // Initial color
    updateColor();
</script>

</body>
</html>
