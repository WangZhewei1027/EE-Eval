<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Tree Visualization</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4ff;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 80%;
            height: 80%;
            margin: auto;
            border: 2px solid #0077cc;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .node {
            width: 60px;
            height: 60px;
            background-color: #0077cc;
            color: white;
            text-align: center;
            line-height: 60px;
            border-radius: 50%;
            position: absolute;
            transition: transform 0.3s ease;
        }
        .line {
            position: absolute;
            width: 2px;
            background-color: #333;
            transition: height 0.3s ease;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background-color: #0077cc;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #005fa3;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="tree"></div>
        <button id="generateTree">Generate BST</button>
    </div>
    <script>
        function generateBST() {
            const nodes = [15, 10, 20, 8, 12, 17, 25];
            const positions = [
                {x: 320, y: 50}, {x: 210, y: 150}, {x: 430, y: 150},
                {x: 160, y: 250}, {x: 260, y: 250}, {x: 380, y: 250}, {x: 480, y: 250}
            ];
            const treeContainer = document.getElementById('tree');
            treeContainer.innerHTML = '';
            drawNodes(nodes, positions);
            drawLines(positions);
        }

        function drawNodes(nodes, positions) {
            nodes.forEach((node, index) => {
                const nodeElement = document.createElement('div');
                nodeElement.className = 'node';
                nodeElement.innerText = node;
                nodeElement.style.transform = `translate(${positions[index].x}px, ${positions[index].y}px)`;
                document.getElementById('tree').appendChild(nodeElement);
            });
        }

        function drawLines(positions) {
            const linesPositions = [
                {start: positions[1], end: positions[0]}, // 10 -> 15
                {start: positions[2], end: positions[0]}, // 20 -> 15
                {start: positions[3], end: positions[1]}, // 8 -> 10
                {start: positions[4], end: positions[1]}, // 12 -> 10
                {start: positions[5], end: positions[2]}, // 17 -> 20
                {start: positions[6], end: positions[2]}  // 25 -> 20
            ];

            linesPositions.forEach(linePos => {
                const line = document.createElement('div');
                line.className = 'line';
                const height = Math.abs(linePos.start.y - linePos.end.y);
                line.style.height = height + 'px';
                line.style.transform = `translate(${linePos.start.x + 28}px, ${linePos.start.y}px) rotate(${Math.atan2(linePos.end.y - linePos.start.y, linePos.end.x - linePos.start.x) * 180 / Math.PI}deg)`;
                document.getElementById('tree').appendChild(line);
            });
        }

        document.getElementById("generateTree").addEventListener("click", generateBST);
    </script>
</body>
</html>
