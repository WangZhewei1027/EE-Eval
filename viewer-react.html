    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // FSM状态配色方案 - 按功能分类
      const STATE_COLORS = {
        // 开始状态 - 绿色系
        idle: "#4caf50",

        // 输入验证 - 橙色系
        validating_input: "#ff9800",
        validating_front_input: "#ff9800",
        validating_back_input: "#ffb74d",

        // 执行动作 - 蓝色系
        inserting_node: "#2196f3",
        adding_to_front: "#1976d2",
        adding_to_back: "#42a5f5",
        removing_from_front: "#ff5722",
        removing_from_back: "#ff7043",
        performing_front_removal: "#ff5722",
        performing_back_removal: "#ff7043",

        // 显示更新 - 紫色系
        drawing_tree: "#9c27b0",
        updating_display: "#ab47bc",
        clearing_input: "#ba68c8",

        // 错误处理 - 红色系
        error_alert: "#f44336",

        // 结束状态 - 灰色系
        tree_resetting: "#607d8b",
      };

      // 获取状态类型的函数
      const getStateCategory = (stateName) => {
        const name = stateName.toLowerCase();
        if (name.includes("idle") || name.includes("initial")) return "start";
        if (name.includes("validating") || name.includes("input"))
          return "input";
        if (
          name.includes("adding") ||
          name.includes("removing") ||
          name.includes("inserting") ||
          name.includes("performing")
        )
          return "action";
        if (
          name.includes("updating") ||
          name.includes("drawing") ||
          name.includes("display") ||
          name.includes("clearing")
        )
          return "display";
        if (name.includes("error") || name.includes("alert")) return "error";
        if (
          name.includes("resetting") ||
          name.includes("done") ||
          name.includes("complete")
        )
          return "end";
        return "action";
      };

      // 智能截图-状态匹配函数
      const isScreenshotForState = (screenshot, stateName) => {
        // 直接状态匹配
        if (screenshot.state === stateName) {
          return true;
        }

        const filename = screenshot.filename.toLowerCase();
        const state = stateName.toLowerCase();

        // 直接文件名匹配
        if (filename.includes(state)) {
          return true;
        }

        // 特殊状态映射规则
        const stateMapping = {
          idle: ["initial", "empty", "idle"],
          validating_front_input: ["validating", "front", "input"],
          validating_back_input: ["validating", "back", "input"],
          adding_to_front: ["add_front", "front", "unshift"],
          adding_to_back: ["add_back", "back", "push"],
          removing_from_front: ["remove_front", "front", "shift"],
          removing_from_back: ["remove_back", "back", "pop"],
          performing_front_removal: ["remove_front", "front", "shift"],
          performing_back_removal: ["remove_back", "back", "pop"],
          updating_display: ["complete", "update", "display"],
          clearing_input: ["clear", "input"],
          // 传统BST状态
          validating_input: ["validating", "input"],
          error_alert: ["error", "alert"],
          inserting_node: ["inserting", "node", "tree_node"],
          drawing_tree: ["drawing", "tree", "tree_with"],
          tree_resetting: ["resetting", "reset"],
        };

        const keywords = stateMapping[state] || [state];
        return keywords.some((keyword) => filename.includes(keyword));

      // EvaluationModal Component

        const fetchEvaluation = async () => {

          try {

            );

              const data = await response.json();
              setEvaluation(data);

              setEvaluation(null);
            } else {

        // 获取截图数据
        const fetchScreenshots = async () => {
          if (!fileId || !workspace) return;

        // 执行新的评估
        const runEvaluation = async (e) => {

          if (!fileId || !workspace) return;

          setEvaluating(true);
          setError(null);

          try {
            const response = await fetch(
              `http://localhost:3000/api/evaluation/${workspace}/${fileId}.html`,

              const result = await response.json();
              setEvaluation(result.evaluation);

              throw new Error(errorData.error || "Evaluation failed");

        // 当模态框显示时获取评估数据和截图

                      {evaluation.metadata && (

                      {/* 截图展示部分 */}

                              const categorized = categorizeScreenshots(

                                              <div className="screenshot-caption">

                                    >

                      )}

                  )}
                </div>
              </div>
            </div>
          </>
        );
      };

      // Universal FSMGraph Component
      const FSMGraph = ({ fsmData, screenshots, onStateClick }) => {
        const svgRef = useRef();
        const [graphData, setGraphData] = useState({ nodes: [], links: [] });
        const [zoomLevel, setZoomLevel] = useState(1);
        const zoomBehavior = useRef(null);
        const [showLegend, setShowLegend] = useState(true);

        useEffect(() => {
          if (!fsmData) return;

          // Build graph data from the new JSON structure, with fallbacks for old format
          let nodes = [];
          let links = [];

          // Handle new JSON structure
          if (fsmData.states && Array.isArray(fsmData.states)) {
            nodes = fsmData.states.map((state) => ({
              id: state.id || state.name || state.label,
              label: state.label || state.name || state.id,
              type: state.type || "atomic",
              entryActions: state.entry_actions || state.onEnter || [],
              exitActions: state.exit_actions || state.onExit || [],
              hasScreenshots: screenshots.some((img) => {
                const stateIdentifier = state.id || state.name || state.label;
                return isScreenshotForState(img, stateIdentifier);
              }),
            }));
          }
          // Handle old XState format as fallback
          else if (fsmData.states && typeof fsmData.states === "object") {
            nodes = Object.entries(fsmData.states).map(([key, state]) => ({
              id: key,
              label: state.meta?.label || key,
              type: state.type || "atomic",
              entryActions: state.onEnter || [],
              exitActions: state.onExit || [],
              hasScreenshots: screenshots.some((img) =>
                isScreenshotForState(img, key),
              ),
            }));
          }

          // Handle transitions for new format
          if (fsmData.transitions && Array.isArray(fsmData.transitions)) {
            links = fsmData.transitions.map((transition) => ({
              source: transition.from,
              target: transition.to,
              event: transition.event,
              guard: transition.guard,
              actions: transition.actions || [],
              timeout: transition.timeout,
            }));
          }
          // Handle old format transitions
          else if (fsmData.states) {
            const stateEntries = Array.isArray(fsmData.states)
              ? fsmData.states.map((s) => [s.id, s])
              : Object.entries(fsmData.states);

            stateEntries.forEach(([stateKey, state]) => {
              if (state.on || state.transitions) {
                const transitions = state.on || state.transitions || {};
                Object.entries(transitions).forEach(([event, target]) => {
                  if (typeof target === "string") {
                    links.push({
                      source: stateKey,
                      target: target,
                      event: event,
                    });
                  } else if (target && target.target) {
                    links.push({
                      source: stateKey,
                      target: target.target,
                      event: event,
                      guard: target.cond,
                      actions: target.actions || [],
                    });
                  }
                });
              }
            });
          }

          setGraphData({ nodes, links });
        }, [fsmData, screenshots]);

        useEffect(() => {
          if (!graphData.nodes.length) return;

          const svg = d3.select(svgRef.current);
          svg.selectAll("*").remove();

          // Validate that we have nodes and at least try to render
          if (graphData.nodes.length === 0) {
            svg
              .append("text")
              .attr("x", 500)
              .attr("y", 300)
              .attr("text-anchor", "middle")
              .attr("fill", "#666")
              .attr("font-size", "16px")
              .text("No FSM data to display");
            return;
          }

          const width = 1000;
          const height = 550;

          // Define arrow markers
          svg
            .append("defs")
            .append("marker")
            .attr("id", "arrowhead")
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", 30)
            .attr("refY", 0)
            .attr("markerWidth", 6)
            .attr("markerHeight", 6)
            .attr("orient", "auto")
            .append("path")
            .attr("d", "M0,-5L10,0L0,5")
            .attr("fill", "#666");

          const simulation = d3
            .forceSimulation(graphData.nodes)
            .force(
              "link",
              d3
                .forceLink(graphData.links)
                .id((d) => d.id)
                .distance(150),
            )
            .force("charge", d3.forceManyBody().strength(-800))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(60))
            .alpha(0.1)
            .alphaDecay(0.1)
            .velocityDecay(0.9);

          // Smart node positioning by state type and semantic analysis
          const layoutNodesByType = (nodes, width, height) => {
            const categories = {
              idle: [],
              atomic: [],
              composite: [],
              error: [],
              final: [],
            };

            nodes.forEach((node) => {
              const type = node.type.toLowerCase();
              const label = (node.label || node.id).toLowerCase();

              // Categorize by type first, then by semantic meaning
              if (
                type === "idle" ||
                label.includes("idle") ||
                label.includes("initial") ||
                label.includes("start")
              ) {
                categories.idle.push(node);
              } else if (
                type === "error" ||
                label.includes("error") ||
                label.includes("alert") ||
                label.includes("exception")
              ) {
                categories.error.push(node);
              } else if (
                label.includes("final") ||
                label.includes("complete") ||
                label.includes("reset") ||
                label.includes("done") ||
                label.includes("end") ||
                label.includes("finish")
              ) {
                categories.final.push(node);
              } else if (
                type === "composite" ||
                label.includes("composite") ||
                label.includes("complex")
              ) {
                categories.composite.push(node);
              } else {
                // Default to atomic for processing states
                categories.atomic.push(node);
              }
            });

            // Enhanced layouts with better spacing
            const layouts = {
              idle: {
                x: width * 0.15,
                y: height * 0.5,
                spread: 80,
                color: "#4caf50",
              },
              atomic: {
                x: width * 0.5,
                y: height * 0.5,
                spread: 160,
                color: "#2196f3",
              },
              composite: {
                x: width * 0.75,
                y: height * 0.35,
                spread: 100,
                color: "#ff9800",
              },
              error: {
                x: width * 0.25,
                y: height * 0.8,
                spread: 80,
                color: "#f44336",
              },
              final: {
                x: width * 0.85,
                y: height * 0.65,
                spread: 80,
                color: "#607d8b",
              },
            };

            Object.keys(categories).forEach((category) => {
              const categoryNodes = categories[category];
              const layout = layouts[category];

              if (categoryNodes.length === 0) return;

              categoryNodes.forEach((node, i) => {
                if (categoryNodes.length === 1) {
                  node.x = layout.x + (Math.random() - 0.5) * 30;
                  node.y = layout.y + (Math.random() - 0.5) * 30;
                } else if (categoryNodes.length === 2) {
                  // Two nodes: place them vertically or horizontally
                  const isVertical =
                    category === "atomic" || category === "composite";
                  if (isVertical) {
                    node.x = layout.x + (Math.random() - 0.5) * 40;
                    node.y = layout.y + (i - 0.5) * 80;
                  } else {
                    node.x = layout.x + (i - 0.5) * 100;
                    node.y = layout.y + (Math.random() - 0.5) * 40;
                  }
                } else {
                  // Multiple nodes: circular or grid arrangement
                  const angle = (i / categoryNodes.length) * 2 * Math.PI;
                  const radius = layout.spread / 3 + (Math.random() - 0.5) * 20;
                  node.x = layout.x + Math.cos(angle) * radius;

          node.each(function (d) {

              const words = label.split(/(?=[A-Z])|_|-/);
              const lines = [];
              let currentLine = "";

              words.forEach((word) => {

                  currentLine.length > 0

                  .attr("fill", "white")
                  .attr("text-anchor", "middle")

                const dy = d.target.y - d.source.y;
                const dr = Math.sqrt(dx * dx + dy * dy);

                if (dr === 0)
                  return `M${d.source.x},${d.source.y}L${d.source.x},${d.source.y}`;

                const sourceX = d.source.x + (dx * 35) / dr;
                const sourceY = d.source.y + (dy * 35) / dr;
                const targetX = d.target.x - (dx * 35) / dr;
                const targetY = d.target.y - (dy * 35) / dr;

                return `M${sourceX},${sourceY}L${targetX},${targetY}`;

              simulation.alpha(0);

              d.fy = null;

                          • {rec}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                <div style={{ textAlign: "center" }}>
                  <button
                    onClick={onClose}
                    style={{
                      background: "#667eea",
                      color: "white",
                      border: "none",
                      padding: "10px 24px",
                      borderRadius: "6px",
                      cursor: "pointer",
                      fontSize: "0.9rem",
                      fontWeight: "500",
                    }}
                  >
                    Close Report
                  </button>
                </div>
              </div>
            </div>
          </>
        );
      };

      // FSMVisualizerModal Component
      const FSMVisualizerModal = ({ show, onClose, fileId, workspace }) => {
        const [fsmData, setFsmData] = useState(null);
        const [idealFsmData, setIdealFsmData] = useState(null);
        const [topic, setTopic] = useState("");
        const [screenshots, setScreenshots] = useState([]);
        const [selectedState, setSelectedState] = useState("");
        const [showScreenshots, setShowScreenshots] = useState(false);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");
        const [showIdealFsm, setShowIdealFsm] = useState(false);
        const [hasIdealFsmFolder, setHasIdealFsmFolder] = useState(false);
        const [similarityAnalysis, setSimilarityAnalysis] = useState(null);
        const [showSimilarityAnalysis, setShowSimilarityAnalysis] =
          useState(false);
        const [computingSimilarity, setComputingSimilarity] = useState(false);

        useEffect(() => {
          if (show && fileId && workspace) {
            loadFSMData();
          }
        }, [show, fileId, workspace]);

        const loadFSMData = async () => {
          setLoading(true);
          setError("");

          try {
            console.log("Loading FSM data for:", { workspace, fileId });

            // Load topic from data file first
            let currentTopic = "";
            try {
              const dataResponse = await fetch(
                `http://localhost:3000/api/data/${workspace}/${fileId}`,
              );
              if (dataResponse.ok) {
                const dataFile = await dataResponse.json();
                currentTopic = dataFile.topic || dataFile.question || "";
                setTopic(currentTopic);
                console.log("Topic extracted:", currentTopic);
              }
            } catch (e) {
              console.warn("Could not load data file for topic:", e);
            }

            // Check if ideal-fsm folder exists
            try {
              const idealFsmCheckResponse = await fetch(
                `http://localhost:3000/api/workspace/${workspace}/has-ideal-fsm`,
              );
              if (idealFsmCheckResponse.ok) {
                const hasIdeal = await idealFsmCheckResponse.json();
                setHasIdealFsmFolder(hasIdeal.exists);
                console.log("Ideal FSM folder exists:", hasIdeal.exists);
              }
            } catch (e) {
              console.warn("Could not check for ideal-fsm folder:", e);
              setHasIdealFsmFolder(false);
            }

            // Use the correct API endpoint for FSM JSON files
            const fsmApiEndpoint = `http://localhost:3000/api/fsm/${workspace}/${fileId}`;
            console.log("Trying FSM API endpoint:", fsmApiEndpoint);

            const fsmResponse = await fetch(fsmApiEndpoint);

            if (fsmResponse.ok) {
              const fsm = await fsmResponse.json();
              console.log("FSM data loaded successfully:", fsm);
              setFsmData(fsm);
            } else {
              const errorText = await fsmResponse.text();
              throw new Error(
                `无法加载FSM数据 (${fsmResponse.status}): ${errorText}`,
              );
            }

            // Try to load ideal FSM if folder exists and we have a topic
            if (currentTopic) {
              try {
                const idealFsmEndpoint = `http://localhost:3000/api/ideal-fsm/${workspace}/${encodeURIComponent(
                  currentTopic,
                )}`;
                console.log("Trying to load ideal FSM:", idealFsmEndpoint);

                const idealFsmResponse = await fetch(idealFsmEndpoint);
                if (idealFsmResponse.ok) {
                  const idealFsm = await idealFsmResponse.json();
                  console.log("Ideal FSM loaded successfully:", idealFsm);
                  setIdealFsmData(idealFsm);
                } else {
                  console.warn(
                    "Could not load ideal FSM:",
                    idealFsmResponse.status,
                  );
                  setIdealFsmData(null);
                }
              } catch (idealError) {
                console.warn("Error loading ideal FSM:", idealError);
                setIdealFsmData(null);
              }
            }

            // Load screenshots (optional)
            try {
              const screenshotEndpoints = [
                `http://localhost:3000/api/screenshots/${workspace}/${fileId}`,
                `http://localhost:3000/workspace/${workspace}/screenshots/${fileId}/`,
                `workspace/${workspace}/screenshots/${fileId}/`,
              ];

              let screenshotResponse = null;
              for (const endpoint of screenshotEndpoints) {
                try {
                  screenshotResponse = await fetch(endpoint);
                  if (screenshotResponse.ok) break;
                } catch (e) {
                  // Continue to next endpoint
                }
              }

              if (screenshotResponse && screenshotResponse.ok) {
                const screenshots = await screenshotResponse.json();
                setScreenshots(screenshots);
              } else {
                console.warn(
                  "Could not load screenshots, continuing without them",
                );
                setScreenshots([]);
              }
            } catch (screenshotError) {
              console.warn("Screenshot loading failed:", screenshotError);
              setScreenshots([]);
            }
          } catch (error) {
            setError(error.message);
            console.error("加载FSM数据失败:", error);
          } finally {
            setLoading(false);
          }
        };

        const handleStateClick = (stateName) => {
          setSelectedState(stateName);
          setShowScreenshots(true);
        };

        const closeScreenshots = () => {
          setShowScreenshots(false);
          setSelectedState("");
        };

        // FSM Similarity Calculation Core Functions
        const normalizeFSM = (fsm) => {
          console.log("Normalizing FSM:", fsm);

          const normalized = {
            states: new Set(),
            transitions: [],
            initialState: null,
            finalStates: new Set(),
          };

          // Handle different FSM data structures
          if (fsm) {
            // Try nodes/edges structure
            if (fsm.nodes && Array.isArray(fsm.nodes)) {
              fsm.nodes.forEach((node) => {
                const nodeId = node.id || node.name || node.label;
                if (nodeId) {
                  normalized.states.add(nodeId);
                  if (node.initial || node.start)
                    normalized.initialState = nodeId;
                  if (node.final || node.accepting || node.end)
                    normalized.finalStates.add(nodeId);
                }
              });
            }

            if (fsm.edges && Array.isArray(fsm.edges)) {
              fsm.edges.forEach((edge) => {
                normalized.transitions.push({
                  from: edge.source || edge.from || edge.sourceId,
                  to: edge.target || edge.to || edge.targetId,
                  label: edge.label || edge.symbol || edge.event || "",
                });
              });
            }

            // Try links structure (D3.js format)
            if (fsm.links && Array.isArray(fsm.links)) {
              fsm.links.forEach((link) => {
                normalized.transitions.push({
                  from: link.source.id || link.source || link.sourceId,
                  to: link.target.id || link.target || link.targetId,
                  label: link.label || link.symbol || link.event || "",
                });
              });
            }

            // Try states/transitions structure
            if (fsm.states && Array.isArray(fsm.states)) {
              fsm.states.forEach((state) => {
                const stateId = state.id || state.name || state.label;
                if (stateId) {
                  normalized.states.add(stateId);
                  if (state.initial || state.start)
                    normalized.initialState = stateId;
                  if (state.final || state.accepting || state.end)
                    normalized.finalStates.add(stateId);
                }
              });
            }

            if (fsm.transitions && Array.isArray(fsm.transitions)) {
              fsm.transitions.forEach((transition) => {
                normalized.transitions.push({
                  from:
                    transition.from || transition.source || transition.sourceId,
                  to: transition.to || transition.target || transition.targetId,
                  label:
                    transition.label ||
                    transition.symbol ||
                    transition.event ||
                    "",
                });
              });
            }
          }

          console.log("Normalized FSM:", normalized);
          return normalized;
        };

        const computeStructuralSimilarity = (fsm1, fsm2) => {
          const maxStates = Math.max(fsm1.states.size, fsm2.states.size);
          const maxTransitions = Math.max(
            fsm1.transitions.length,
            fsm2.transitions.length,
          );

          let statesSimilarity = 1; // Default to 1 if both are 0
          let transitionsSimilarity = 1; // Default to 1 if both are 0

          if (maxStates > 0) {
            statesSimilarity =
              1 - Math.abs(fsm1.states.size - fsm2.states.size) / maxStates;
          }

          if (maxTransitions > 0) {
            transitionsSimilarity =
              1 -
              Math.abs(fsm1.transitions.length - fsm2.transitions.length) /
                maxTransitions;
          }

          return {
            states: Math.max(0, statesSimilarity),
            transitions: Math.max(0, transitionsSimilarity),
            overall: (statesSimilarity + transitionsSimilarity) / 2,
          };
        };

        const computeSemanticSimilarity = (fsm1, fsm2) => {
          const alphabet1 = new Set();
          const alphabet2 = new Set();

          fsm1.transitions.forEach((t) => alphabet1.add(t.label));
          fsm2.transitions.forEach((t) => alphabet2.add(t.label));

          const intersection = new Set(
            [...alphabet1].filter((x) => alphabet2.has(x)),
          );
          const union = new Set([...alphabet1, ...alphabet2]);

          const alphabetSimilarity =
            union.size > 0 ? intersection.size / union.size : 1;

          return {
            alphabet: alphabetSimilarity,
            overall: alphabetSimilarity,
          };
        };

        const compareFSMs = (actualFSM, idealFSM) => {
          const normalizedActual = normalizeFSM(actualFSM);
          const normalizedIdeal = normalizeFSM(idealFSM);

          const structural = computeStructuralSimilarity(
            normalizedActual,
            normalizedIdeal,
          );
          const semantic = computeSemanticSimilarity(
            normalizedActual,
            normalizedIdeal,
          );

          const overallSimilarity = (structural.overall + semantic.overall) / 2;

          // Generate recommendations
          const recommendations = [];
          const keyDifferences = [];

          if (structural.states < 0.8) {
            recommendations.push(
              "State count differs significantly - review state definitions",
            );
            keyDifferences.push(
              `State count difference: Actual ${normalizedActual.states.size}, Ideal ${normalizedIdeal.states.size}`,
            );
          }
          if (structural.transitions < 0.8) {
            recommendations.push(
              "Transition count differs significantly - review state transition logic",
            );
            keyDifferences.push(
              `Transition count difference: Actual ${normalizedActual.transitions.length}, Ideal ${normalizedIdeal.transitions.length}`,
            );
          }
          if (semantic.alphabet < 0.7) {
            recommendations.push(
              "Input alphabet differs significantly - review event definitions",
            );
            keyDifferences.push(
              "Input event types have significant differences",
            );
          }

          // Create interpretation based on similarity score
          let interpretation = "";
          if (overallSimilarity >= 0.9) {
            interpretation =
              "Excellent - FSM structure highly matches ideal model";
          } else if (overallSimilarity >= 0.7) {
            interpretation =
              "Good - FSM structure mostly meets requirements with minor differences";
          } else if (overallSimilarity >= 0.5) {
            interpretation =
              "Fair - FSM structure has notable differences from ideal model";
          } else {
            interpretation =
              "Poor - FSM structure requires significant improvements";
          }

          const analysis = {
            combined_similarity: overallSimilarity,
            structural_similarity: {
              overall: structural.overall,
              node_count_similarity: structural.states,
              edge_count_similarity: structural.transitions,
              density_similarity:
                (structural.states + structural.transitions) / 2,
            },
            semantic_similarity: {
              overall: semantic.overall,
              state_category_similarity: semantic.alphabet,
              event_type_similarity: semantic.alphabet,
              action_similarity: semantic.alphabet,
            },
            isomorphism_similarity: overallSimilarity, // Simplified for now
            summary: {
              interpretation,
              key_differences: keyDifferences,
              recommendations,
            },
            details: {
              fsm1_stats: {
                concept: "实际FSM",
                nodes: normalizedActual.states.size,
                edges: normalizedActual.transitions.length,
                categories: { 状态: normalizedActual.states.size },
              },
              fsm2_stats: {
                concept: "理想FSM",
                nodes: normalizedIdeal.states.size,
                edges: normalizedIdeal.transitions.length,
                categories: { 状态: normalizedIdeal.states.size },
              },
            },
          };

          return analysis;
        };

        // FSM Similarity Comparison Function
        const computeSimilarity = () => {
          if (!fsmData || !idealFsmData) {
            alert("需要同时有实际FSM和理想FSM才能进行比较");
            return;
          }

          setComputingSimilarity(true);
          setSimilarityAnalysis(null);

          try {
            console.log("Computing FSM similarity...");
            console.log("Actual FSM Data:", fsmData);
            console.log("Ideal FSM Data:", idealFsmData);

            const result = compareFSMs(fsmData, idealFsmData);
            console.log("Similarity result:", result);

            setSimilarityAnalysis(result);
            setShowSimilarityAnalysis(true);
            setComputingSimilarity(false);
          } catch (error) {
            console.error("Error computing similarity:", error);
            alert("相似度计算失败: " + error.message);
            setComputingSimilarity(false);
          }
        };

        const closeSimilarityAnalysis = () => {
          setShowSimilarityAnalysis(false);
        };

        if (!show) return null;

        return (
          <div className="fsm-modal show">
            <div className="fsm-modal-content">
              <div className="fsm-modal-header">
                <div className="fsm-modal-title">
                  FSM Visualization - {fileId}
                  {fsmData?.meta?.concept && (
                    <span style={{ fontSize: "0.8em", opacity: 0.8 }}>
                      {" "}
                      ({fsmData.meta.concept})
                    </span>
                  )}
                  {topic && (
                    <span
                      style={{
                        fontSize: "0.8rem",
                        opacity: 0.9,
                        marginLeft: "20px",
                      }}
                    >
                      Topic: {topic}
                    </span>
                  )}
                  {fsmData && idealFsmData && (
                    <button
                      onClick={computeSimilarity}
                      disabled={computingSimilarity}
                      style={{
                        padding: "6px 12px",
                        borderRadius: "6px",
                        border: "none",
                        background: "#667eea",
                        color: "white",
                        cursor: computingSimilarity ? "not-allowed" : "pointer",
                        fontSize: "0.85rem",
                        fontWeight: "500",
                        opacity: computingSimilarity ? 0.6 : 1,
                        marginLeft: "20px",
                      }}
                    >
                      {computingSimilarity
                        ? "Computing..."
                        : "📊 Analyze Similarity"}
                    </button>
                  )}
                </div>
                <button className="fsm-close-btn" onClick={onClose}>
                  ×
                </button>
              </div>

              <div className="fsm-modal-body">
                {loading && (
                  <div
                    style={{
                      textAlign: "center",
                      padding: "40px",
                      color: "#666",
                    }}
                  >
                    Loading FSM data...
                  </div>
                )}

                {error && (
                  <div
                    style={{
                      textAlign: "center",
                      padding: "40px",
                      color: "#f44336",
                      background: "#ffebee",
                      borderRadius: "8px",
                      margin: "20px",
                    }}
                  >
                    {error}
                  </div>
                )}

                {/* Side-by-side FSM display */}
                {fsmData && !loading && (
                  <>
                    {/* Comparison Summary */}
                    {idealFsmData && (
                      <div
                        style={{
                          background: "#f5f5f5",
                          padding: "12px 20px",
                          borderRadius: "6px",
                          marginBottom: "15px",
                          display: "flex",
                          justifyContent: "space-between",
                          alignItems: "center",
                        }}
                      >
                        <div>
                          <strong>Actual FSM:</strong>{" "}
                          {fsmData.states?.length || 0} states,{" "}
                          {fsmData.transitions?.length || 0} transitions
                        </div>
                        <div>
                          <strong>Ideal FSM:</strong>{" "}
                          {idealFsmData.states?.length || 0} states,{" "}
                          {idealFsmData.transitions?.length || 0} transitions
                        </div>
                      </div>
                    )}

                    {/* Dual-pane layout */}
                    <div style={{ display: "flex", gap: "20px" }}>
                      {/* Actual FSM Pane */}
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div
                          style={{
                            background: "#f8f9fa",
                            padding: "12px",
                            borderRadius: "6px",
                            marginBottom: "10px",
                          }}
                        >
                          <h3
                            style={{
                              margin: "0 0 10px 0",
                              fontSize: "1.1rem",
                              color: "#2196f3",
                            }}
                          >
                            Extracted FSM
                          </h3>
                          <div style={{ fontSize: "0.85rem", color: "#666" }}>
                            <div>
                              <strong>Concept:</strong>{" "}
                              {fsmData.meta?.concept || "N/A"}
                            </div>
                            <div>
                              <strong>Topic:</strong>{" "}
                              {fsmData.meta?.topic || "N/A"}
                            </div>
                            <div>
                              <strong>States:</strong>{" "}
                              {fsmData.states?.length || 0} |{" "}
                              <strong>Events:</strong>{" "}
                              {fsmData.events?.length || 0} |{" "}
                              <strong>Transitions:</strong>{" "}
                              {fsmData.transitions?.length || 0}
                            </div>
                          </div>
                        </div>
                        <FSMGraph
                          fsmData={fsmData}
                          screenshots={screenshots}
                          onStateClick={handleStateClick}
                        />
                        {screenshots.length > 0 && (
                          <div
                            style={{ textAlign: "center", marginTop: "10px" }}
                          >
                            <button
                              className="card-btn view"
                              onClick={() => setShowScreenshots(true)}
                              style={{
                                padding: "8px 16px",
                                fontSize: "0.9rem",
                              }}
                            >
                              View Screenshots ({screenshots.length})
                            </button>
                          </div>
                        )}
                      </div>

                      {/* Ideal FSM Pane */}
                      <div style={{ flex: 1, minWidth: 0 }}>
                        {idealFsmData ? (
                          <>
                            <div
                              style={{
                                background: "#f0f8f0",
                                padding: "12px",
                                borderRadius: "6px",
                                marginBottom: "10px",
                              }}
                            >
                              <h3
                                style={{
                                  margin: "0 0 10px 0",
                                  fontSize: "1.1rem",
                                  color: "#4caf50",
                                }}
                              >
                                Ideal FSM
                              </h3>
                              <div
                                style={{ fontSize: "0.85rem", color: "#666" }}
                              >
                                <div>
                                  <strong>Concept:</strong>{" "}
                                  {idealFsmData.meta?.concept || "N/A"}
                                </div>
                                <div>
                                  <strong>Topic:</strong>{" "}
                                  {idealFsmData.meta?.topic || "N/A"}
                                </div>
                                <div>
                                  <strong>States:</strong>{" "}
                                  {idealFsmData.states?.length || 0} |{" "}
                                  <strong>Events:</strong>{" "}
                                  {idealFsmData.events?.length || 0} |{" "}
                                  <strong>Transitions:</strong>{" "}
                                  {idealFsmData.transitions?.length || 0}
                                </div>
                              </div>
                            </div>
                            <FSMGraph
                              fsmData={idealFsmData}
                              screenshots={[]}
                              onStateClick={() => {}}
                            />
                            {idealFsmData.meta?.expected_interactions && (
                              <div
                                style={{
                                  marginTop: "10px",
                                  padding: "10px",
                                  background: "#f0f8f0",
                                  borderRadius: "6px",
                                  fontSize: "0.85rem",
                                }}
                              >
                                <strong>Expected Interactions:</strong>{" "}
                                {idealFsmData.meta.expected_interactions.join(
                                  ", ",
                                )}
                              </div>
                            )}
                          </>
                        ) : (
                          <div
                            style={{
                              background: "#f5f5f5",
                              padding: "40px",
                              borderRadius: "6px",
                              textAlign: "center",
                              color: "#999",
                            }}
                          >
                            <div
                              style={{ fontSize: "3rem", marginBottom: "10px" }}
                            >
                              📋
                            </div>
                            <div
                              style={{ fontSize: "1rem", marginBottom: "5px" }}
                            >
                              No Ideal FSM Available
                            </div>
                            <div style={{ fontSize: "0.85rem" }}>
                              Topic "{topic}" can be generated using --ideal-fsm
                              mode
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>

            <ScreenshotPanel
              show={showScreenshots}
              onClose={closeScreenshots}
              selectedState={selectedState}
              screenshots={screenshots}
            />

            <SimilarityAnalysisModal
              show={showSimilarityAnalysis}
              onClose={closeSimilarityAnalysis}
              analysis={similarityAnalysis}
            />
          </div>
        );
      };

      // FilterControls Component
      const FilterControls = ({
        filters,
        onFilterChange,
        onClearFilters,
        allData,
      }) => {
        // 获取所有可用的模型
        const availableModels = [
          ...new Set(Object.values(allData).map((item) => item.model)),
        ].sort();

        // 获取所有可用的标签
        const availableTags = [
          ...new Set(Object.values(allData).flatMap((item) => item.tags || [])),
        ].sort();

        return (
          <div className="filters-container">
            <div className="filters-title">🔍 筛选器</div>

            <div className="filters-grid">
              <div className="filter-group">
                <div className="filter-label">模型</div>
                <select
                  className="filter-select"
                  value={filters.model}
                  onChange={(e) => onFilterChange("model", e.target.value)}
                >
                  <option value="">所有模型</option>
                  {availableModels.map((model) => (
                    <option key={model} value={model}>
                      {model}
                    </option>
                  ))}
                </select>
              </div>

              <div className="filter-group">
                <div className="filter-label">标签</div>
                <select
                  className="filter-select"
                  value={filters.tag}
                  onChange={(e) => onFilterChange("tag", e.target.value)}
                >
                  <option value="">所有标签</option>
                  {availableTags.map((tag) => (
                    <option key={tag} value={tag}>
                      {tag}
                    </option>
                  ))}
                </select>
              </div>

              <div className="filter-group">
                <div className="filter-label">问题关键词</div>
                <input
                  type="text"
                  className="filter-input"
                  placeholder="输入关键词..."
                  value={filters.question}
                  onChange={(e) => onFilterChange("question", e.target.value)}
                />
              </div>

              <div className="filter-group">
                <div className="filter-label">日期范围</div>
                <select
                  className="filter-select"
                  value={filters.dateRange}
                  onChange={(e) => onFilterChange("dateRange", e.target.value)}
                >
                  <option value="">所有时间</option>
                  <option value="today">今天</option>
                  <option value="week">近一周</option>
                  <option value="month">近一月</option>
                </select>
              </div>
            </div>

            <div className="filter-buttons">
              <button className="filter-btn clear" onClick={onClearFilters}>
                清除筛选
              </button>
            </div>
          </div>
        );
      };

      // WorkspaceSelector Component
      const WorkspaceSelector = ({
        onWorkspaceChange,
        workspaces,
        loading,
        error,
      }) => {
        return (
          <div className="workspace-selector">
            <select
              onChange={(e) => onWorkspaceChange(e.target.value)}
              disabled={loading}
            >
              <option value="">Select workspace...</option>
              {workspaces.map((workspace) => (
                <option
                  key={workspace.name}
                  value={workspace.name}
                  disabled={!workspace.hasData}
                >
                  {workspace.name}
                  {workspace.hasData ? "" : " (数据不完整)"}
                </option>
              ))}
            </select>
            {error && (
              <div className="error" style={{ marginTop: "10px" }}>
                {error}
              </div>
            )}
          </div>
        );
      };

      // Message Component
      const Message = ({ message }) => {
        const roleClass = `message-${message.role}`;
        const roleText =
          message.role === "system"
            ? "系统"
            : message.role === "user"
              ? "用户"
              : message.role;

        return (
          <div className={`message-item ${roleClass}`}>
            <div className="message-role">{roleText}</div>
            <div className="message-content">{message.content}</div>
          </div>
        );
      };

      // HtmlCard Component
      const HtmlCard = ({
        data,
        workspace,
        fileId,
        onFSMClick,
        onEvaluationClick,
      }) => {
        const handleViewClick = () => {
          window.open(`./workspace/${workspace}/html/${fileId}.html`, "_blank");
        };

        const handleFSMClick = (e) => {
          e.stopPropagation();
          onFSMClick(fileId);
        };

        const handleEvaluationClick = (e) => {
          e.stopPropagation();
          onEvaluationClick(fileId);
        };

        return (
          <div className="html-card">
            <iframe
              className="card-preview"
              src={`./workspace/${workspace}/html/${fileId}.html`}
              scrolling="no"
              title={`Preview of ${fileId}`}
            />
            <div className="card-info">
              <div className="card-buttons">
                <button className="card-btn view" onClick={handleViewClick}>
                  View Page
                </button>
                <button className="card-btn fsm" onClick={handleFSMClick}>
                  FSM Visualization
                </button>
                <button
                  className="card-btn evaluation"
                  onClick={handleEvaluationClick}
                >
                  Visual Evaluation
                </button>
              </div>
              <div className="card-title">{fileId}</div>
              <div className="card-model">Model: {data.model}</div>
              <div className="card-timestamp">
                {new Date(data.timestamp).toLocaleString("en-US")}
              </div>
              {data.messages && data.messages.length > 0 && (
                <div className="card-messages">
                  {data.messages.map((message, index) => (
                    <Message key={index} message={message} />
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      };

      // GridContainer Component
      const GridContainer = ({
        htmlFiles,
        currentData,
        workspace,
        loading,
        totalCount,
        onFSMClick,
        onEvaluationClick,
      }) => {
        if (loading) {
          return <div className="loading">加载中...</div>;
        }

        if (htmlFiles.length === 0 && totalCount > 0) {
          return (
            <div className="no-files">No files matching filter criteria</div>
          );
        }

        if (htmlFiles.length === 0) {
          return (
            <div className="no-files">No HTML files in current workspace</div>
          );
        }

        const filteredCount = htmlFiles.filter(
          (fileId) => currentData[fileId],
        ).length;

        return (
          <>
            {totalCount > 0 && (
              <div className="results-count">
                显示 {filteredCount} / {totalCount} 个文件
              </div>
            )}
            <div className="grid-container">
              {htmlFiles.map((fileId) => {
                const data = currentData[fileId];
                if (!data) return null;

                return (
                  <HtmlCard
                    key={fileId}
                    data={data}
                    workspace={workspace}
                    fileId={fileId}
                    onFSMClick={onFSMClick}
                    onEvaluationClick={onEvaluationClick}
                  />
                );
              })}
            </div>
          </>
        );
      };

      // Main App Component
      const App = () => {
        const [workspaces, setWorkspaces] = useState([]);
        const [currentWorkspace, setCurrentWorkspace] = useState("");
        const [currentData, setCurrentData] = useState({});
        const [htmlFiles, setHtmlFiles] = useState([]);
        const [allFiles, setAllFiles] = useState([]);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");
        const [filters, setFilters] = useState({
          model: "",
          tag: "",
          question: "",
          dateRange: "",
        });

        // FSM相关状态
        const [showFSMModal, setShowFSMModal] = useState(false);
        const [currentFSMFile, setCurrentFSMFile] = useState("");

        // 评估相关状态
        const [showEvaluationModal, setShowEvaluationModal] = useState(false);
        const [currentEvaluationFile, setCurrentEvaluationFile] = useState("");

        // Load workspaces on mount
        useEffect(() => {
          loadWorkspaces();
        }, []);

        const loadWorkspaces = async () => {
          try {
            // 尝试从API获取工作空间列表
            const response = await fetch(
              "http://localhost:3000/api/workspaces",
            );
            if (!response.ok) {
              throw new Error("API服务器未启动或无法访问");
            }

            const workspaceData = await response.json();
            setWorkspaces(workspaceData);
            console.log(`✅ 成功加载 ${workspaceData.length} 个工作空间`);
          } catch (apiError) {
            console.warn("API不可用，使用备用方案:", apiError.message);

            // 备用方案：手动添加已知工作空间
            const fallbackWorkspaces = [
              { name: "10-04", hasData: true },
              { name: "test", hasData: true },
            ];
            setWorkspaces(fallbackWorkspaces);

            setError(
              "API服务器未启动，使用离线模式。请运行 'node api.mjs' 启动服务器以获得完整功能。",
            );
          }
        };

        const loadWorkspaceData = async (workspace) => {
          if (!workspace) {
            setHtmlFiles([]);
            setCurrentData({});
            return;
          }

          setLoading(true);
          setError("");

          try {
            // 首先尝试从API获取数据
            let data;
            try {
              const apiResponse = await fetch(
                `http://localhost:3000/api/workspaces/${workspace}/data`,
              );
              if (apiResponse.ok) {
                data = await apiResponse.json();
                console.log(`✅ 从API加载工作空间 ${workspace} 的数据`);
              } else {
                throw new Error("API响应失败");
              }
            } catch (apiError) {
              console.warn("API不可用，使用直接访问:", apiError.message);
              // 备用方案：直接访问文件
              const dataResponse = await fetch(
                `./workspace/${workspace}/data/data.json`,
              );
              if (!dataResponse.ok) {
                throw new Error(`无法加载 ${workspace} 的数据文件`);
              }
              data = await dataResponse.json();
            }

            const newCurrentData = {};
            // 将数据按ID索引
            data.forEach((item) => {
              newCurrentData[item.id] = item;
            });

            setCurrentData(newCurrentData);
            // 获取HTML文件列表（根据数据推断）
            const fileIds = data.map((item) => item.id);
            setAllFiles(fileIds);
            setHtmlFiles(fileIds);

            // 显示统计信息（如果API可用）
            try {
              const statsResponse = await fetch(
                `http://localhost:3000/api/workspaces/${workspace}/stats`,
              );
              if (statsResponse.ok) {
                const stats = await statsResponse.json();
                console.log(`📊 工作空间统计:`, stats);
              }
            } catch (statsError) {
              // 统计信息获取失败不影响主要功能
            }
          } catch (error) {
            setError(error.message);
            console.error("Failed to load data:", error);
          } finally {
            setLoading(false);
          }
        };

        const handleWorkspaceChange = (workspace) => {
          setCurrentWorkspace(workspace);
          loadWorkspaceData(workspace);
          // 重置筛选器
          setFilters({
            model: "",
            tag: "",
            question: "",
            dateRange: "",
          });
        };

        // 筛选功能
        const applyFilters = (data, filterOptions) => {
          return data.filter((fileId) => {
            const item = currentData[fileId];
            if (!item) return false;

            // 模型筛选
            if (filterOptions.model && item.model !== filterOptions.model) {
              return false;
            }

            // 标签筛选
            if (
              filterOptions.tag &&
              (!item.tags || !item.tags.includes(filterOptions.tag))
            ) {
              return false;
            }

            // 问题关键词筛选
            if (
              filterOptions.question &&
              !item.question
                .toLowerCase()
                .includes(filterOptions.question.toLowerCase())
            ) {
              return false;
            }

            // 日期范围筛选
            if (filterOptions.dateRange) {
              const itemDate = new Date(item.timestamp);
              const now = new Date();
              const diffTime = Math.abs(now - itemDate);
              const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

              switch (filterOptions.dateRange) {
                case "today":
                  if (diffDays > 1) return false;
                  break;
                case "week":
                  if (diffDays > 7) return false;
                  break;
                case "month":
                  if (diffDays > 30) return false;
                  break;
              }
            }

            return true;
          });
        };

        // 处理筛选器变化
        const handleFilterChange = (key, value) => {
          const newFilters = { ...filters, [key]: value };
          setFilters(newFilters);

          // 应用筛选
          const filteredFiles = applyFilters(allFiles, newFilters);
          setHtmlFiles(filteredFiles);
        };

        // 清除筛选
        const handleClearFilters = () => {
          const emptyFilters = {
            model: "",
            tag: "",
            question: "",
            dateRange: "",
          };
          setFilters(emptyFilters);
          setHtmlFiles(allFiles);
        };

        // FSM相关处理函数
        const handleFSMClick = (fileId) => {
          setCurrentFSMFile(fileId);
          setShowFSMModal(true);
        };

        const closeFSMModal = () => {
          setShowFSMModal(false);
          setCurrentFSMFile("");
        };

        // 评估相关处理函数
        const handleEvaluationClick = (fileId) => {
          setCurrentEvaluationFile(fileId);
          setShowEvaluationModal(true);
        };

        const closeEvaluationModal = () => {
          setShowEvaluationModal(false);
          setCurrentEvaluationFile("");
        };

        return (
          <div className="container">
            <h1>HTML Files Viewer - React Edition</h1>

            <WorkspaceSelector
              onWorkspaceChange={handleWorkspaceChange}
              workspaces={workspaces}
              loading={loading}
              error={error}
            />

            {currentWorkspace && Object.keys(currentData).length > 0 && (
              <FilterControls
                filters={filters}
                onFilterChange={handleFilterChange}
                onClearFilters={handleClearFilters}
                allData={currentData}
              />
            )}

            <GridContainer
              htmlFiles={htmlFiles}
              currentData={currentData}
              workspace={currentWorkspace}
              loading={loading}
              totalCount={allFiles.length}
              onFSMClick={handleFSMClick}
              onEvaluationClick={handleEvaluationClick}
            />

            <FSMVisualizerModal
              show={showFSMModal}
              onClose={closeFSMModal}
              fileId={currentFSMFile}
              workspace={currentWorkspace}
            />

            <EvaluationModal
              show={showEvaluationModal}
              onClose={closeEvaluationModal}
              fileId={currentEvaluationFile}
              workspace={currentWorkspace}
            />
          </div>
        );
      };

      // Render the app
      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
